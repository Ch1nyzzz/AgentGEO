</span><p data-dcnode-id="4960"><span data-dcnode-id="4966" instrument_node="">Red and blue cannot be primary colors because they lack the "blue" or short wavelength reflectance (for red) or "red" or long wavelength reflectance (for blue) that must be present in both colors to allow red and blue to mix a violet color. Blue also lacks the "green" or mid wavelength reflectance necessary to mix a saturated green with yellow. As </span><a class="text" data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color14.html%23harris"><span data-dcnode-id="4965" instrument_node="">Moses Harris</span></a><span data-dcnode-id="4963" instrument_node=""> pointed out 260 years ago, </span><i data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">"red and blue will not make a fine purple, which every painter knows".</span></i></p><span data-dcnode-id="4959" instrument_node="">
</span><p data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">It will be helpful to understand the double life of primary colors, as conceptual colors and material colors, over the past three centuries. On the one hand, "primary" pigments, inks or dyes must be available to be used, and the availability of colorants has depended on pigment manufacturing technology. On the other hand, the choice of primary colors has always focused on practical considerations — colorant cost, physical attributes, and the color mixtures that result.</span></p></td><td colspan="2" data-dcnode-id="4945" valign="top"><span data-dcnode-id="4954" instrument_node="">
</span><p class="imgS" data-dcnode-id="4952"><img data-dcnode-id="4953" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/CIE64.gif&amp;raw" width="200"></p><span data-dcnode-id="4951" instrument_node="">
</span><p class="SC" data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">all primary colors are either imaginary or imperfect</span></p><span data-dcnode-id="4948" instrument_node="">
</span><p class="subSC" data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">spectral primaries RGB, which are visible, can't mix all colors; mathematical primaries XYZ, which explain all color mixtures, are invisible</span></p></td></tr><tr data-dcnode-id="4548"><td colspan="2" data-dcnode-id="4940"></td><td align="left" data-dcnode-id="4561" valign="top"><p data-dcnode-id="4929"><b data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">Available Colorants</span></b><span data-dcnode-id="4936" instrument_node="">. There have been truly amazing advances in pigment chemistry over the past 300 years. (For a history, see </span><i data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">Bright Earth: The Art and Invention of Color</span></i><span data-dcnode-id="4933" instrument_node=""> by </span><a class="text" data-dcnode-id="4931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book2.html"><span data-dcnode-id="4932" instrument_node="">Philip Ball</span></a><span data-dcnode-id="4930" instrument_node="">.) Adapting to these changes in art materials, traditional color theory has fixed on very different choices of "red", "yellow" or "blue" primary paints.</span></p><span data-dcnode-id="4928" instrument_node="">
</span><p data-dcnode-id="4910"><span data-dcnode-id="4927" instrument_node="">In the earliest subtractive color printing system, devised by </span><a class="text" data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23leblon"><span data-dcnode-id="4926" instrument_node="">Le Blon</span></a><span data-dcnode-id="4924" instrument_node=""> in the early 1700's, the primary colors were a mixture of carmine, madder lake and vermilion (mixed to make red), yellow lake, and iron blue (</span><a class="text" data-dcnode-id="4922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterb.html%23PB27"><span data-dcnode-id="4923" instrument_node="">PB27</span></a><span data-dcnode-id="4921" instrument_node="">) — the best pigments for the job available in the early 18th century. The artists' color wheel proposed by </span><a class="text" data-dcnode-id="4919" href="#harris"><span data-dcnode-id="4920" instrument_node="">Moses Harris</span></a><span data-dcnode-id="4918" instrument_node=""> in 1772 used vermilion, orpiment and natural ultramarine blue; </span><a class="text" data-dcnode-id="4916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23lambert"><span data-dcnode-id="4917" instrument_node="">Johann Lambert</span></a><span data-dcnode-id="4915" instrument_node=""> in 1785 preferred gamboge, carmine and iron blue. Charles Winter's 20th century </span><a class="text" data-dcnode-id="4913" href="#sloan"><span data-dcnode-id="4914" instrument_node="">mixing triangle</span></a><span data-dcnode-id="4912" instrument_node=""> used alizarin crimson, cadmium lemon and phthalo blue. Contemporary painters and printers would probably prefer a benzimidazolone yellow, quinacridone magenta, and phthalo cyan.</span><a data-dcnode-id="4911" name="pigchoices"></a></p><span data-dcnode-id="4909" instrument_node="">
</span><p data-dcnode-id="4898"><span data-dcnode-id="4908" instrument_node="">As a reference, the diagram (right) shows the location of the </span><a class="text" data-dcnode-id="4906" href="#idealsub"><span data-dcnode-id="4907" instrument_node="">"ideal" subtractive primaries</span></a><span data-dcnode-id="4905" instrument_node=""> magenta, yellow and cyan, defined as optimal colors (the most saturated surface colors possible) located on the </span><a class="text" data-dcnode-id="4903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23CIELAB"><span data-dcnode-id="4904" instrument_node="">CIELAB</span></a><span data-dcnode-id="4902" instrument_node=""> </span><b data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">a*b*</span></b><span data-dcnode-id="4899" instrument_node=""> plane.</span></p><span data-dcnode-id="4897" instrument_node="">
</span><p data-dcnode-id="4877"><span data-dcnode-id="4896" instrument_node="">Painters and color theorists since the 18th century have chosen their </span><a class="text" data-dcnode-id="4894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette4c.html"><span data-dcnode-id="4895" instrument_node="">primary triad palette</span></a><span data-dcnode-id="4893" instrument_node=""> from among the labeled pigments. Thus, the "true" primary red was originally either vermilion (</span><a class="text" data-dcnode-id="4891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterr.html%23PR106"><span data-dcnode-id="4892" instrument_node="">PR106</span></a><span data-dcnode-id="4890" instrument_node="">) or a lake of cochineal or madder (</span><a class="text" data-dcnode-id="4888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterc.html%23NR4"><span data-dcnode-id="4889" instrument_node="">NR4</span></a><span data-dcnode-id="4887" instrument_node="">). Late in the 19th century the primary red became alizarin crimson (</span><a class="text" data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterr.html%23PR83"><span data-dcnode-id="4886" instrument_node="">PR83</span></a><span data-dcnode-id="4884" instrument_node="">), and today the most popular recommendation is a violet red quinacridone (</span><a class="text" data-dcnode-id="4882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterc.html%23PR122"><span data-dcnode-id="4883" instrument_node="">PR122</span></a><span data-dcnode-id="4881" instrument_node=""> or </span><a class="text" data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterc.html%23PV19R"><span data-dcnode-id="4880" instrument_node="">PV19</span></a><span data-dcnode-id="4878" instrument_node="">). Notice that all these primary colors are very far from the ideal magenta hue.</span></p><span data-dcnode-id="4876" instrument_node="">
</span><p data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">The ultramarine blue primary chosen by Harris is actually closer to the ideal magenta than to the ideal cyan, and since his time the pigments used for primary blue have evolved only about half way toward the ideal cyan hue. And while the primary yellow pigments have always been closest to the ideal, they are still shifted toward the red primary by a significant amount.</span></p><span data-dcnode-id="4873" instrument_node="">
</span><p data-dcnode-id="4860"><b data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">Practical Considerations</span></b><span data-dcnode-id="4870" instrument_node="">. Pigment availability is not the only reason for these shifts away from the ideal subtractive primary colors. The "ideal" pigments cobalt violet (</span><a class="text" data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterv.html%23PV49"><span data-dcnode-id="4869" instrument_node="">PV49</span></a><span data-dcnode-id="4867" instrument_node="">), cobalt teal blue (</span><a class="text" data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterg.html%23PG50"><span data-dcnode-id="4866" instrument_node="">PG50</span></a><span data-dcnode-id="4864" instrument_node="">) and bismuth yellow (</span><a class="text" data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watery.html%23PY184"><span data-dcnode-id="4863" instrument_node="">PY184</span></a><span data-dcnode-id="4861" instrument_node="">), underlined, are commonly available today: why don't artists and printers use them?</span></p><span data-dcnode-id="4859" instrument_node="">
</span><p data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">One issue is cost. Cobalt violet, which appears to be the "ideal" subtractive primary magenta, is one of the most expensive pigments available — even when compared to micronized quinacridone pigments.</span></p><span data-dcnode-id="4856" instrument_node="">
</span><p data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">A more important issue is handling attributes. Cobalt violet has a weak tinting strength, and it only appears to have a strong saturation when the particle sizes are relatively large (when ground into fine particles, the color becomes weak and whitened). To get a strong color, a dense, thick application of coarse pigment would be required, and this would appear unpleasantly crusty on a printed page. Cobalt teal blue and bismuth yellow have a similar gritty, grainy texture, so all three would clog up a printing press and intrude in a printed texture. They are also opaque, which would make overprinted colors hard to control and turn their subtractive mixtures muddy.</span></p><span data-dcnode-id="4853" instrument_node="">
</span><p data-dcnode-id="4848"><span data-dcnode-id="4852" instrument_node="">A third issue is </span><a class="text" data-dcnode-id="4850" href="#paintlightfastness"><span data-dcnode-id="4851" instrument_node="">lightfastness</span></a><span data-dcnode-id="4849" instrument_node="">. While painters and printers historically have been nonchalant on this issue, by the 20th century they had learned to avoid the most fugitive dyes available, and have generally migrated toward more lightfast pigments as soon as they became available. Thus, 18th century carmine lakes provide very handsome violet reds, but those colors faded relatively quickly, and by the 19th century substitute pigments were being used instead.</span></p><span data-dcnode-id="4847" instrument_node="">
</span><p data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">But the most important issue is the color mixtures that pigment choices can produce. Even if a physically ideal (transparent, finely divided, intensely saturated, light valued) red violet pigment were available, the orange mixtures it would make with yellow would be relatively dull, compared to oranges mixed with a violet red. For these reasons, painters happily use a hue of "primary" yellow that is theoretically too red, and a "primary" magenta that is theoretically too yellow, because the resulting range of color mixtures is, on the whole, the most satisfying to the eye. Printers and painters focus on the entire range of color mixtures that a subtractive palette can actually create, not on the theoretical or ideal color of the paints or inks by themselves.</span></p><span data-dcnode-id="4844" instrument_node="">
</span><p data-dcnode-id="4833"><span data-dcnode-id="4843" instrument_node="">What makes these tradeoffs feasible — and often unnoticeable in practice — is the remarkable ability of our color vision to </span><b data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">accept different color images as equivalent or identical</span></b><span data-dcnode-id="4840" instrument_node="">, provided the </span><a class="text" data-dcnode-id="4838" href="#gamuts"><span data-dcnode-id="4839" instrument_node="">gamuts</span></a><span data-dcnode-id="4837" instrument_node=""> used to reproduce the images retain the </span><i data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">relative relationships</span></i><span data-dcnode-id="4834" instrument_node=""> between all the colors in the image, especially the relative differences in lightness and hue.</span></p><span data-dcnode-id="4832" instrument_node="">
</span><p data-dcnode-id="4826"><span data-dcnode-id="4831" instrument_node="">And pigment innovation is still creating new primary palettes and new systems of color mixing. Thus, </span><a class="text" data-dcnode-id="4829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette1.html%23violetred"><span data-dcnode-id="4830" instrument_node="">violet red</span></a><span data-dcnode-id="4828" instrument_node=""> (magenta) was not standardized as a subtractive primary color until the CMYK printing system was invented by Alexander Murray in 1934. The CMYK system, in turn, cannot reproduce many saturated oranges, violets, blues and yellow greens, and in specific applications where brighter colors are required, newer printing systems with larger gamuts — Hexachrome™ (six primary colors of ink) or Heptatone™ (seven primary colors) — can be used instead.</span><a data-dcnode-id="4827" name="ctprin17"></a></p><span data-dcnode-id="4825" instrument_node="">
</span><p data-dcnode-id="4822"><b data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">17. The choice of primary colors is arbitrary; colorant selections depend on cost, availability, convenience, medium and image quality.</span></b></p><span data-dcnode-id="4821" instrument_node="">
</span><p data-dcnode-id="4807"><span data-dcnode-id="4820" instrument_node="">It is remarkable how hidebound traditional color theorists have become. A case in point: </span><a class="text" data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23edwards"><span data-dcnode-id="4819" instrument_node="">Betty Edwards</span></a><span data-dcnode-id="4817" instrument_node=""> recommends the use of the 19th century pigment alizarin crimson (</span><a class="text" data-dcnode-id="4815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterr.html%23PR83"><span data-dcnode-id="4816" instrument_node="">PR83</span></a><span data-dcnode-id="4814" instrument_node="">) because, she claims, there is no better red violet pigment available. This is factually false: there are several quinacridone pigments, including quinacridone rose (</span><a class="text" data-dcnode-id="4812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterc.html%23PV19R"><span data-dcnode-id="4813" instrument_node="">PV19</span></a><span data-dcnode-id="4811" instrument_node="">) and quinacridone magenta (</span><a class="text" data-dcnode-id="4809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterc.html%23PR122"><span data-dcnode-id="4810" instrument_node="">PR122</span></a><span data-dcnode-id="4808" instrument_node="">), that produce far more saturated and variegated mixtures than alizarin crimson — and are far more lightfast.</span></p><span data-dcnode-id="4806" instrument_node="">
</span><p data-dcnode-id="4800"><span data-dcnode-id="4805" instrument_node="">As another example, some traditional color theory texts assert that there is one set of primary colors used in printing and a different set used in painting. This is a remarkable misconception, because modern paints and printing inks are manufactured using </span><i data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">exactly the same chemical pigments.</span></i><span data-dcnode-id="4802" instrument_node=""> The real constraint here is that modern printers have adapted to use pigments that mix the widest range of colors, while painters cling to the primary pigments that were used a century ago.</span><a data-dcnode-id="4801" name="ctprin18"></a></p><span data-dcnode-id="4799" instrument_node="">
</span><p data-dcnode-id="4796"><b data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">18. The subtractive primary hues are the same in all printing, painting and photographic media. The optimal subtractive primary pigments are identical in painting and in printing.</span></b></p><span data-dcnode-id="4795" instrument_node="">
</span><p data-dcnode-id="4786"><span data-dcnode-id="4794" instrument_node="">The missing qualification is, of course, </span><i data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">... for painters that actually use a primary color palette.</span></i><span data-dcnode-id="4791" instrument_node=""> I know of no living painter who does so exclusively. Even in the 18th century, painters used as many different pigments as they could afford to lay their hands on, and that is still true today. In modern color theory there are only </span><a class="text" data-dcnode-id="4789" href="#paletteprimary"><span data-dcnode-id="4790" instrument_node="">palette primaries</span></a><span data-dcnode-id="4788" instrument_node="">, and these can be literally any number and color of paints an artists prefers.</span><a data-dcnode-id="4787" name="cterror04"></a></p><span data-dcnode-id="4785" instrument_node="">
</span><p data-dcnode-id="4775"><span class="rubric" data-dcnode-id="4777"><span data-dcnode-id="4784" instrument_node="">4. You can't mix a primary </span><i data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">red, yellow</span></i><span data-dcnode-id="4781" instrument_node=""> or </span><i data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">blue</span></i><span data-dcnode-id="4778" instrument_node=""> using any other colors</span></span><span data-dcnode-id="4776" instrument_node="">.</span></p><span data-dcnode-id="4774" instrument_node="">
</span><p data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node="">The keystone belief in traditional color theory has always been that it is not possible to mix a "primary" color using other colors. This has been for three centuries the ultimate guarantee that primary colors really are "primary".</span></p><span data-dcnode-id="4771" instrument_node="">
</span><p data-dcnode-id="4757"><span data-dcnode-id="4770" instrument_node="">As you might guess by now, this claim too is false. Every painter knows that it is possible to mix a very fine turquoise from ultramarine blue (</span><a class="text" data-dcnode-id="4768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterb.html%23PB29"><span data-dcnode-id="4769" instrument_node="">PB29</span></a><span data-dcnode-id="4767" instrument_node="">) and phthalocyanine green (</span><a class="text" data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterg.html%23PG7"><span data-dcnode-id="4766" instrument_node="">PG7</span></a><span data-dcnode-id="4764" instrument_node="">), or a decent red from cobalt violet (</span><a class="text" data-dcnode-id="4762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterv.html%23PV14"><span data-dcnode-id="4763" instrument_node="">PV14</span></a><span data-dcnode-id="4761" instrument_node="">) and cadmium orange (</span><a class="text" data-dcnode-id="4759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watero.html%23PO20"><span data-dcnode-id="4760" instrument_node="">PO20</span></a><span data-dcnode-id="4758" instrument_node="">) (image, below).</span></p><span data-dcnode-id="4756" instrument_node="">
</span><p class="imgC" data-dcnode-id="4754"><img data-dcnode-id="4755" height="194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/mixes.jpg&amp;raw" width="380"></p><span data-dcnode-id="4753" instrument_node="">
</span><p class="CC" data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">traditional color theory has decreed it</span></p><span data-dcnode-id="4750" instrument_node="">
</span><p class="subCC" data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">matching violet blue ultramarine (PB29) or red orange pyrrole (PO73) is "possible"; matching cadmium red deep (PR108) or phthalo green blue (PB17) is "impossible"</span></p><span data-dcnode-id="4747" instrument_node="">
</span><p data-dcnode-id="4727"><span data-dcnode-id="4746" instrument_node="">Certainly these mixtures are somewhat dull, but not any duller than the orange one gets by mixing "primary" quinacridone magenta (</span><a class="text" data-dcnode-id="4744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterc.html%23PR122"><span data-dcnode-id="4745" instrument_node="">PR122</span></a><span data-dcnode-id="4743" instrument_node="">) and "primary" cadmium yellow (</span><a class="text" data-dcnode-id="4741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watery.html%23PY35"><span data-dcnode-id="4742" instrument_node="">PY35</span></a><span data-dcnode-id="4740" instrument_node="">), or the violet blue one gets by mixing "primary" quinacridone magenta with "primary" phthalocyanine blue (</span><a class="text" data-dcnode-id="4738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterb.html%23PB15"><span data-dcnode-id="4739" instrument_node="">PB15</span></a><span data-dcnode-id="4737" instrument_node="">). When we compare these mixtures to single pigment violet blue, green blue (</span><a class="text" data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterb.html%23PB17"><span data-dcnode-id="4736" instrument_node="">PB17</span></a><span data-dcnode-id="4734" instrument_node="">), red (</span><a class="text" data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterr.html%23PR108"><span data-dcnode-id="4733" instrument_node="">PR108</span></a><span data-dcnode-id="4731" instrument_node="">) or orange paints (</span><a class="text" data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watero.html%23PO73"><span data-dcnode-id="4730" instrument_node="">PO73</span></a><span data-dcnode-id="4728" instrument_node="">), the "possible" and "impossible" mixtures look pretty much the same.</span></p><span data-dcnode-id="4726" instrument_node="">
</span><p data-dcnode-id="4723"><span data-dcnode-id="4725" instrument_node="">If we believe traditional color theory, then certain dull or dark mixtures are just fine, whereas other dull or dark mixtures are "impossible". We confront the special pleading, or outright misconception, that is necessary to keep the shaky "primary" color dogma on its feet. Modern color theory simply sticks to the facts:</span><a data-dcnode-id="4724" name="ctprin19"></a></p><span data-dcnode-id="4722" instrument_node="">
</span><p data-dcnode-id="4719"><b data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">19. Every hue can be mixed by two other hues, provided the two hues are not directly opposite each other on the hue circle, and the hue to be mixed is located within the shorter distance between them.</span></b></p><span data-dcnode-id="4718" instrument_node="">
</span><p data-dcnode-id="4712"><span data-dcnode-id="4717" instrument_node="">Yellow is a special case, because a mixed yellow will appear dark and greenish, as a raw umber or green gold. However this is because our visual system distinguishes between a saturated and unsaturated yellow with a visual contrast that does not appear in magenta or cyan hues, as </span><a class="text" data-dcnode-id="4715" href="#cterror06"><span data-dcnode-id="4716" instrument_node="">explained below</span></a><span data-dcnode-id="4714" instrument_node="">.</span><a data-dcnode-id="4713" name="cterror05"></a></p><span data-dcnode-id="4711" instrument_node="">
</span><p data-dcnode-id="4707"><span class="rubric" data-dcnode-id="4709"><span data-dcnode-id="4710" instrument_node="">5. Saturated hue is the defining or "pure" color attribute</span></span><span data-dcnode-id="4708" instrument_node="">.</span></p><span data-dcnode-id="4706" instrument_node="">
</span><p data-dcnode-id="4702"><span data-dcnode-id="4705" instrument_node="">The rigamarole about what can or cannot be mixed with primary colors reveals a subtle but important prejudice in traditional color theory: that "color" is synonymous with </span><i data-dcnode-id="4703"><span data-dcnode-id="4704" instrument_node="">saturated hue.</span></i></p><span data-dcnode-id="4701" instrument_node="">
</span><p data-dcnode-id="4696"><span data-dcnode-id="4700" instrument_node="">This is most apparent in the abbreviated way that colors are specified in traditional color theory discussions of color design. When the color crank Johannes Itten announces that </span><i data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">"yellow against purple provides a very large contrast between light and dark"</span></i><span data-dcnode-id="4697" instrument_node=""> he visualizes a saturated (light valued) yellow and a saturated (dark valued) purple. Dark valued yellows are blackish, and light valued purples are whitish, but he ignores those variations.</span></p><span data-dcnode-id="4695" instrument_node="">
</span><p data-dcnode-id="4684"><span data-dcnode-id="4694" instrument_node="">As we've seen, color is defined by at least </span><a class="text" data-dcnode-id="4692" href="#colormakingattributes"><span data-dcnode-id="4693" instrument_node="">three attributes</span></a><span data-dcnode-id="4691" instrument_node=""> (lightness, hue and chroma/saturation), but color theory generally uses hue labels alone — </span><i data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">primary yellow, pure yellow</span></i><span data-dcnode-id="4688" instrument_node=""> — to denote colors. This code works as follows: designate a hue, then find the </span><a class="text" data-dcnode-id="4686" href="#chromabyhue"><span data-dcnode-id="4687" instrument_node="">lightness that produces the maximum chroma</span></a><span data-dcnode-id="4685" instrument_node=""> in that hue, and that is the hue, lightness and chroma that is intended. "Yellow" means a light valued, high chroma yellow hue.</span></p><span data-dcnode-id="4683" instrument_node="">
</span><p data-dcnode-id="4674"><span data-dcnode-id="4682" instrument_node="">This seems sensible, because it is how we naturally talk about color. If someone says "she was wearing a red dress", you do not imagine the dress as maroon or pink, which are also red hues. But the code is unproductive when only saturated hues are used to generalize about color design, for example as a contrast between </span><i data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">yellow</span></i><span data-dcnode-id="4679" instrument_node=""> and </span><i data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">violet.</span></i><span data-dcnode-id="4676" instrument_node=""> In modern color theory, any meaningful statement about color relationships has to specify all three color attributes.
</span><a data-dcnode-id="4675" name="ctprin20"></a></p><span data-dcnode-id="4673" instrument_node="">
</span><p data-dcnode-id="4670"><b data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">20. All three colormaking attributes — lightness, chroma and hue — are equally important to evaluate visual colors and create color designs.</span></b></p><span data-dcnode-id="4669" instrument_node="">
</span><p data-dcnode-id="4663"><span data-dcnode-id="4668" instrument_node="">Much of the traditional color theory design recommendations depend on the preference for saturated color and a </span><a class="text" data-dcnode-id="4666" href="#ctprin31"><span data-dcnode-id="4667" instrument_node="">distaste for "mud"</span></a><span data-dcnode-id="4665" instrument_node=""> or dull color, but these prejudices get in the way of choosing the best color design for a specific application.</span><a data-dcnode-id="4664" name="ctprin21"></a></p><span data-dcnode-id="4662" instrument_node="">
</span><p data-dcnode-id="4659"><b data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">21. The relative importance and optimal values of color lightness, chroma and hue in a color design depend entirely on visual style, the materials used, the purpose of color choices and the context in which color will be viewed.</span></b></p><span data-dcnode-id="4658" instrument_node="">
</span><p data-dcnode-id="4649"><span data-dcnode-id="4657" instrument_node="">Traditional color theorists are fond of using the term "spectrum" to denote a color, as in "spectrum yellow" or "spectrum red". This means, apparently, either a "pure" yellow or red, or a yellow or red of a specific hue. The usage is silly, as </span><i data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">all hues</span></i><span data-dcnode-id="4654" instrument_node=""> of yellow are present and equally at maximum saturation or hue purity in the light spectrum, and because a "pure" red is actually not visible in the spectrum at all — it is an extraspectral mixture of "red" light tinted with "violet" light. But spectral hues are the most saturated color stimuli possible, and (for traditional color theorists) </span><i data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">saturated color</span></i><span data-dcnode-id="4651" instrument_node=""> is the defining color attribute.</span><a data-dcnode-id="4650" name="cterror06"></a></p><span data-dcnode-id="4648" instrument_node="">
</span><p data-dcnode-id="4644"><span class="rubric" data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">6. The color of a paint is identical with the color of light it reflects</span></span><span data-dcnode-id="4645" instrument_node="">.</span></p><span data-dcnode-id="4643" instrument_node="">
</span><p data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">Mention of the term "spectrum" takes us in a different direction and introduces the story of color itself. Why do paints have the colors they do? The traditional color theory answer is that the color of the paint is identical with the color of light it refects. Here Isaac Newton is the 18th century authority:</span></p><span data-dcnode-id="4640" instrument_node="">
</span><p data-dcnode-id="4629"><i data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">All colour'd Powders do suppress and stop</span></i><span data-dcnode-id="4637" instrument_node=""> [absorb] </span><i data-dcnode-id="4635"><span data-dcnode-id="4636" instrument_node=""> in them a very considerable Part of the Light by which they are illuminated. For they become colour'd by reflecting the Light of their own Colours more copiously, and that of all other colors more sparingly."</span></i><span data-dcnode-id="4634" instrument_node=""> (</span><i data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">Opticks,</span></i><span data-dcnode-id="4631" instrument_node=""> Book I, Part II, Experiment 15)</span><a data-dcnode-id="4630" name="reflectancecurve"></a></p><span data-dcnode-id="4628" instrument_node="">
</span><p data-dcnode-id="4617"><span data-dcnode-id="4627" instrument_node="">This is true in a figurative sense: materials differ in the light they reflect, and these differences are the material </span><i data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">cause</span></i><span data-dcnode-id="4624" instrument_node=""> of the visual color. For that reason radiant color is described with a </span><i data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">spectral reflectance profile</span></i><span data-dcnode-id="4621" instrument_node=""> or </span><b data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">reflectance curve</span></b><span data-dcnode-id="4618" instrument_node="">, which shows the proportion (between 0% to 100%) of "white" light  that is reflected by the material at each visible wavelength.</span></p><span data-dcnode-id="4616" instrument_node="">
</span><p class="imgC" data-dcnode-id="4614"><img data-dcnode-id="4615" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/rcPV19R.jpg&amp;raw" width="200"></p><span data-dcnode-id="4613" instrument_node="">
</span><p class="CC" data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">reflectance curve of a violet red paint</span></p><span data-dcnode-id="4610" instrument_node="">
</span><p data-dcnode-id="4602"><span data-dcnode-id="4609" instrument_node="">The error is that different sections of the spectrum appear to have different visual color, but these are </span><i data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">not the same</span></i><span data-dcnode-id="4606" instrument_node=""> as the visual color of the same light as reflected from material surfaces. The difference arises in the complex processes by which our eyes and mind </span><i data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">interpret</span></i><span data-dcnode-id="4603" instrument_node=""> light as visual color. This interpretation frequently causes the color of materials to differ from the color of the light they reflect.</span></p><span data-dcnode-id="4601" instrument_node="">
</span><p data-dcnode-id="4595"><span data-dcnode-id="4600" instrument_node="">For example: </span><a class="text" data-dcnode-id="4598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23wilcox"><span data-dcnode-id="4599" instrument_node="">Michael Wilcox</span></a><span data-dcnode-id="4597" instrument_node=""> adopts the 19th century explanation of color mixure in terms of six complementary hues, but to make this explanation plausible he must describe yellow paint as a material that reflects primarily "yellow" light (diagram, below).</span><a data-dcnode-id="4596" name="wilcoxyellow"></a></p><span data-dcnode-id="4594" instrument_node="">
</span><p class="imgC" data-dcnode-id="4592"><img data-dcnode-id="4593" height="100&quot;" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/coxcolor.gif&amp;raw" width="350"></p><span data-dcnode-id="4591" instrument_node="">
</span><p class="CC" data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">"colored light" reflected from a greenish yellow paint</span></p><span data-dcnode-id="4588" instrument_node="">
</span><p class="subCC" data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">the Michael Wilcox story using six basic hues (left), and the way it really is (right)</span></p><span data-dcnode-id="4585" instrument_node="">
</span><p data-dcnode-id="4568"><span data-dcnode-id="4584" instrument_node="">Why would Wilcox describe the light mixture reflected from yellow paint ("red" and "green") as if it were a paint mixture (yellow mixed with some green)? Because he is quoting a traditional color theory </span><a class="text" data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color14.html%23chevreul"><span data-dcnode-id="4583" instrument_node="">paint mixing calculus</span></a><span data-dcnode-id="4581" instrument_node="">. To operate this calculus, the artist "deconstructs" the </span><i data-dcnode-id="4579"><span data-dcnode-id="4580" instrument_node="">visual color</span></i><span data-dcnode-id="4578" instrument_node=""> of the paint into six traditional </span><a class="text" data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23secondary"><span data-dcnode-id="4577" instrument_node="">complementary colors</span></a><span data-dcnode-id="4575" instrument_node=""> (the six colored bars in the diagram). These hues are mutually exclusive: yellow cancels violet, orange cancels blue, red cancels green, in each case resulting in a gray mixture. The calculation is done from the verbal labels: if the artist mixes an </span><i data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node="">orange yellow</span></i><span data-dcnode-id="4572" instrument_node=""> with a </span><i data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">green blue,</span></i><span data-dcnode-id="4569" instrument_node=""> he can assume that the orange cancels the blue to produce gray, and this gray will dull the mixture of green and yellow that remains.</span></p><span data-dcnode-id="4567" instrument_node="">
</span><p data-dcnode-id="4562"><span data-dcnode-id="4566" instrument_node="">However, "yellow light plus some green light" is not what appears in the reflectance curve of a saturated yellow paint (diagram, above), which reflects nearly all the incident "red", "orange", "yellow" and "green" light. This is necessary for the yellow to create attractive </span><a class="text" data-dcnode-id="4564" href="#theorysub"><span data-dcnode-id="4565" instrument_node="">subtractive color mixtures</span></a><span data-dcnode-id="4563" instrument_node="">.</span></p></td><td colspan="2" data-dcnode-id="4550" valign="top"><span data-dcnode-id="4559" instrument_node="">
</span><p class="imgS" data-dcnode-id="4557"><img data-dcnode-id="4558" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/optsub.gif&amp;raw" width="200"></p><span data-dcnode-id="4556" instrument_node="">
</span><p class="SC" data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">subtractive primaries as optimal colors and as available pigments</span></p><span data-dcnode-id="4553" instrument_node="">
</span><p class="subSC" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">as located on the CIELAB a*b* plane</span></p></td></tr><tr data-dcnode-id="4353"><td colspan="2" data-dcnode-id="4545"></td><td align="left" data-dcnode-id="4366" valign="top"><p data-dcnode-id="4536"><span data-dcnode-id="4543" instrument_node="">If we take traditional color theory at its word, then some ideal material that reflects </span><i data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">only visual yellow light</span></i><span data-dcnode-id="4540" instrument_node=""> should appear to be a remarkably pure yellow. Although such a material apparently does not exist, it is possible with the tools of </span><a class="text" data-dcnode-id="4538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23colorimetry"><span data-dcnode-id="4539" instrument_node="">colorimetry</span></a><span data-dcnode-id="4537" instrument_node=""> to specify what such a "perfect yellow" material would look like. And this color theory yellow turns out to be — a dark umber or dark green gold (diagram, right)!</span></p><span data-dcnode-id="4535" instrument_node="">
</span><p data-dcnode-id="4522"><span data-dcnode-id="4534" instrument_node="">The problem here is that the eye places a special requirement on yellow hues: they must not only reflect red, orange and yellow light, they must reflect </span><i data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">nearly all</span></i><span data-dcnode-id="4531" instrument_node=""> the red, orange and yellow light that falls on them. Materials that reflect only some of the light fall in the </span><a class="text" data-dcnode-id="4529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23unzones"><span data-dcnode-id="4530" instrument_node="">unsaturated color zones</span></a><span data-dcnode-id="4528" instrument_node=""> and appear instead to be umber or green gold. The problem is not in the </span><i data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">color</span></i><span data-dcnode-id="4525" instrument_node=""> of the reflected light, since this is almost identical between a saturated and dull </span><i data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">orange yellow:</span></i></p><span data-dcnode-id="4521" instrument_node="">
</span><p class="imgC" data-dcnode-id="4519"><img data-dcnode-id="4520" height="150&quot;" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/yellcon.gif&amp;raw" width="380"></p><span data-dcnode-id="4518" instrument_node="">
</span><p class="CC" data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">reflectance curves of two orange yellow paints</span></p><span data-dcnode-id="4515" instrument_node="">
</span><p class="subCC" data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">(left) cadmium yellow deep, PY65; (right) quinacridone gold, PO49, with visual color samples matched in Lab color space</span></p><span data-dcnode-id="4512" instrument_node="">
</span><p data-dcnode-id="4506"><span data-dcnode-id="4511" instrument_node="">Instead, the most important factor is the </span><a class="text" data-dcnode-id="4509" href="#illuminancecontrast"><span data-dcnode-id="4510" instrument_node="">luminance contrast</span></a><span data-dcnode-id="4508" instrument_node=""> between the color and surrounding surfaces. The quinacridone gold reflects marginally less light than the cadmium yellow deep, and therefore appears darker. This is enough to make the color appear quite different, as shown by the visual color samples.</span><a data-dcnode-id="4507" name="ctprin22"></a></p><span data-dcnode-id="4505" instrument_node="">
</span><p data-dcnode-id="4502"><b data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">22. The color of a paint is not in the reflected light, but in the visual interpretation of the reflected light.</span></b></p><span data-dcnode-id="4501" instrument_node="">
</span><p data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">The yellow example highlights the three major reasons visual color differs from radiant color:</span></p><span data-dcnode-id="4498" instrument_node="">
</span><p data-dcnode-id="4493"><span data-dcnode-id="4497" instrument_node="">•&nbsp;the light is interpreted by the eye as an </span><a class="text" data-dcnode-id="4495" href="#additivemixture"><span data-dcnode-id="4496" instrument_node="">additive mixture</span></a><span data-dcnode-id="4494" instrument_node="">, which has its own peculiar rules: among them, that "red" light and "green" light make yellow, or that "red" light and "violet" light make magenta.</span></p><span data-dcnode-id="4492" instrument_node="">
</span><p data-dcnode-id="4481"><span data-dcnode-id="4491" instrument_node="">•&nbsp;the additive mixture in surface colors is interpreted not as a quantity of light, but as a </span><i data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">proportion of incident light:</span></i><span data-dcnode-id="4488" instrument_node=""> in some cases, as in difference between yellow and ochre, a material reflects </span><i data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">most</span></i><span data-dcnode-id="4485" instrument_node=""> of the incident light and still appear to be a different color than a material that reflects </span><i data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">almost all</span></i><span data-dcnode-id="4482" instrument_node=""> the light.</span></p><span data-dcnode-id="4480" instrument_node="">
</span><p data-dcnode-id="4472"><span data-dcnode-id="4479" instrument_node="">•&nbsp;the proportion of incident light is interpreted as a </span><i data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">contrast within the light environment:</span></i><span data-dcnode-id="4476" instrument_node=""> regardless of the proportion of light it reflects, the same surface can appear </span><a class="text" data-dcnode-id="4474" href="#illuminancecontrast"><span data-dcnode-id="4475" instrument_node="">orange, brown or black</span></a><span data-dcnode-id="4473" instrument_node=""> depending on the contrast between its luminance (total reflected light) and the average luminance of the surfaces around it.</span></p><span data-dcnode-id="4471" instrument_node="">
</span><p data-dcnode-id="4465"><span data-dcnode-id="4470" instrument_node="">These issues get us ahead of the story and into the problems of </span><a class="text" data-dcnode-id="4468" href="#geometry"><span data-dcnode-id="4469" instrument_node="">visual color relationships</span></a><span data-dcnode-id="4467" instrument_node="">. For now, let's pursue the causes of color as these are explained in traditional color theory.
</span><a data-dcnode-id="4466" name="cterror07"></a></p><span data-dcnode-id="4464" instrument_node="">
</span><p data-dcnode-id="4457"><span class="rubric" data-dcnode-id="4459"><span data-dcnode-id="4463" instrument_node="">7. Primary colors of paint cannot mix all possible colors, because paints are </span><i data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">impure</span></i><span data-dcnode-id="4460" instrument_node=""> colors</span></span><span data-dcnode-id="4458" instrument_node="">.</span></p><span data-dcnode-id="4456" instrument_node="">
</span><p data-dcnode-id="4449"><span data-dcnode-id="4455" instrument_node="">The previous error exposes the fundamental strategy in traditional color theory: to rationalize rather than explain color mixtures. This appears clearly in the next error: that "primary" paints cannot mix colors as they ought to because paint colors are </span><i data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">impure</span></i><span data-dcnode-id="4452" instrument_node=""> or </span><i data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">imperfect.</span></i></p><span data-dcnode-id="4448" instrument_node="">
</span><p data-dcnode-id="4440"><span data-dcnode-id="4447" instrument_node="">This assertion also goes back to the misconceptions of the 18th century. It is alluded to in the color wheel text by </span><a class="text" data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23harris"><span data-dcnode-id="4446" instrument_node="">Moses Harris</span></a><span data-dcnode-id="4444" instrument_node="">, and it is repeated without challenge in Michel-Eugène Chevreul's </span><a class="text" data-dcnode-id="4442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23chevreul"><span data-dcnode-id="4443" instrument_node="">Principles of Color Harmony and Contrast</span></a><span data-dcnode-id="4441" instrument_node=""> (1839):</span></p><span data-dcnode-id="4439" instrument_node="">
</span><p data-dcnode-id="4426"><i data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node="">We know of no substance</span></i><span data-dcnode-id="4436" instrument_node=""> [pigment or dye] </span><i data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">that represents a primary color — that is, that reflects only one kind of colored light, whether pure red, blue or yellow. ... As pure colored materials do not exist, how can one say that violet, green and orange are composed of two simple colors mixed in equal proportions? ... Instead we discover that most of the red, blue or yellow colored substances we know of, when mixed with each other, produce violets, greens and oranges of an inferior intensity and clarity to those pure violet, green or orange colored materials found in nature. They</span></i><span data-dcnode-id="4433" instrument_node=""> [the authors of color mixing systems] </span><i data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">could explain this if they admitted that the colored materials mixed together reflect at least two kinds of colored light</span></i><span data-dcnode-id="4430" instrument_node=""> [that is, two of the three primary colors], </span><i data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">and if they agreed with painters and dyers that a mixture of materials which separately reflect red, yellow and blue will produce some quantity of black, which dulls the intensity of the mixture.</span></i><span data-dcnode-id="4427" instrument_node=""> [1839, ¶¶157-158; my translation]</span></p><span data-dcnode-id="4425" instrument_node="">
</span><p data-dcnode-id="4408"><span data-dcnode-id="4424" instrument_node="">There are three answers to the traditional color theory accusation that material or radiant colors are "impure" or "imperfect". The first answer is: yes, </span><i data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">all primary colors are either imaginary or imperfect</span></i><span data-dcnode-id="4421" instrument_node=""> — as </span><a class="text" data-dcnode-id="4419" href="#cterror02"><span data-dcnode-id="4420" instrument_node="">explained above</span></a><span data-dcnode-id="4418" instrument_node="">. However the fault here is not in any way connected to the materials, or to the fact that they reflect "different kinds of light", but in the overlap among the </span><b data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">L</span></b><span data-dcnode-id="4415" instrument_node="">, </span><b data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">M</span></b><span data-dcnode-id="4412" instrument_node=""> and </span><b data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">S</span></b><span data-dcnode-id="4409" instrument_node=""> cone sensitivity curves.</span></p><span data-dcnode-id="4407" instrument_node="">
</span><p data-dcnode-id="4367"><span data-dcnode-id="4406" instrument_node="">The second answer is that </span><i data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">radiant colors must be "impure", to make attractive color mixtures.</span></i><span data-dcnode-id="4403" instrument_node=""> The </span><a class="text" data-dcnode-id="4401" href="#theorysub"><span data-dcnode-id="4402" instrument_node="">subtractive color mixture</span></a><span data-dcnode-id="4400" instrument_node=""> of two paints only reflects the light that </span><i data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">both</span></i><span data-dcnode-id="4397" instrument_node=""> paints reflect separately. This is because subtractive mixture </span><a class="text" data-dcnode-id="4395" href="#subtractivemixture"><span data-dcnode-id="4396" instrument_node="">increases the light absorptance</span></a><span data-dcnode-id="4394" instrument_node=""> of the materials that are mixed: any reflectance that is lacking in one of the paints will also be substantially lacking in the mixture. As a result, </span><i data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">yellow</span></i><span data-dcnode-id="4391" instrument_node=""> and </span><i data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">blue</span></i><span data-dcnode-id="4388" instrument_node=""> must both be high in "green" reflectance to make a saturated </span><i data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">green</span></i><span data-dcnode-id="4385" instrument_node=""> mixture; </span><i data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">yellow</span></i><span data-dcnode-id="4382" instrument_node=""> and </span><i data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">magenta</span></i><span data-dcnode-id="4379" instrument_node=""> must both be high in "orange" and "red" reflectance to make a saturated </span><i data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">orange</span></i><span data-dcnode-id="4376" instrument_node=""> mixture. So </span><b data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">subtractive mixture requires the primary colors to be "impure"</span></b><span data-dcnode-id="4373" instrument_node=""> in order for them to be "primary". Each primary must reflect light from </span><a class="text" data-dcnode-id="4371" href="#idealsub"><span data-dcnode-id="4372" instrument_node="">most parts of the spectrum</span></a><span data-dcnode-id="4370" instrument_node="">.</span><br data-dcnode-id="4369"><a data-dcnode-id="4368" name="WCK"></a></p></td><td colspan="2" data-dcnode-id="4355" valign="top"><span data-dcnode-id="4364" instrument_node="">
</span><p class="imgS" data-dcnode-id="4362"><img data-dcnode-id="4363" height="230&quot;" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/coxcolory.gif&amp;raw" width="170"></p><span data-dcnode-id="4361" instrument_node="">
</span><p class="SC" data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">color theory yellow</span></p><span data-dcnode-id="4358" instrument_node="">
</span><p class="subSC" data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">the color appearance of a "pure" yellow paint that reflects 100% of "yellow" light</span></p></td></tr><tr data-dcnode-id="3978"><td colspan="2" data-dcnode-id="4350"></td><td align="left" data-dcnode-id="3982" valign="top"><p data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">There is, however, a pervasive kind of "impurity" that does reduce the lightness and saturation of all material colors. But it is not a kind of impurity that is described in traditional color theory.</span></p><span data-dcnode-id="4347" instrument_node="">
</span><p class="imgC" data-dcnode-id="4345"><img data-dcnode-id="4346" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/matcol2.gif&amp;raw" width="380"></p><span data-dcnode-id="4344" instrument_node="">
</span><p class="CC" data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">the three components of material color</span></p><span data-dcnode-id="4341" instrument_node="">
</span><p data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">The diagram (above) shows how three components of color arise in the three separate outcomes that occur when a light photon strikes a material surface:</span></p><span data-dcnode-id="4338" instrument_node="">
</span><p data-dcnode-id="4327"><span data-dcnode-id="4337" instrument_node="">•&nbsp;</span><b data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">scattering</span></b><span data-dcnode-id="4334" instrument_node="">: when light strikes any surface, some amount of it does not affect a change in the electron distribution within the molecules that compose the material. The light is simply reflected back into the environment, in random directions that depend on microscopic variations in the surface. This is </span><i data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">surface scattering</span></i><span data-dcnode-id="4331" instrument_node=""> of light, and it adds </span><i data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">whiteness</span></i><span data-dcnode-id="4328" instrument_node=""> to the visual color.

</span></p><span data-dcnode-id="4326" instrument_node="">
</span><p data-dcnode-id="4315"><span data-dcnode-id="4325" instrument_node="">•&nbsp;</span><b data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">chromatic reflectance</span></b><span data-dcnode-id="4322" instrument_node="">: a substantial portion of the light does throw its energy into the molecules that compose the material, which disrupts the electron energies within the molecules that compose the material. This light promptly emitted at specific wavelengths that aggregate into the </span><i data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">chromatic reflectance</span></i><span data-dcnode-id="4319" instrument_node=""> of the material. Some materials produce better chromatic reflectance than others, but many synthetic red, orange and yellow pigments produce chromatic reflectance with a hue purity that is very close to the </span><a class="text" data-dcnode-id="4317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23huepurity"><span data-dcnode-id="4318" instrument_node="">physically possible maximum</span></a><span data-dcnode-id="4316" instrument_node="">.</span></p><span data-dcnode-id="4314" instrument_node="">
</span><p data-dcnode-id="4306"><span data-dcnode-id="4313" instrument_node="">•&nbsp;</span><b data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">infrared reflectance</span></b><span data-dcnode-id="4310" instrument_node="">: the remainder of the light is transformed by interaction with the material molecules into heat. Some of this heat is held in the material, the rest is emitted back into the environment. However heat is invisible to the human eye — light goes in, nothing visible comes out — so the reflected heat adds a component of </span><i data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">blackness</span></i><span data-dcnode-id="4307" instrument_node=""> to the visual color.</span></p><span data-dcnode-id="4305" instrument_node="">
</span><p data-dcnode-id="4302"><span data-dcnode-id="4304" instrument_node="">This is the accurate statement of the "impurity" in material colors:</span><a data-dcnode-id="4303" name="ctprin23"></a></p><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4298"><b data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">23. All visual colors originating in materials comprise a proportion of chromatic reflectance (C), a proportion of whiteness (W) caused by surface scattering, and a proportion of blackness (K) caused by the loss of light as heat:
</span></b></p><p align="center" data-dcnode-id="4295"><b data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">
visual color = W + C + K</span></b></p><span data-dcnode-id="4294" instrument_node="">
</span><p data-dcnode-id="4274"><span data-dcnode-id="4293" instrument_node="">Nearly all </span><a class="text" data-dcnode-id="4291" href="#modeltypes"><span data-dcnode-id="4292" instrument_node="">double cone color models</span></a><span data-dcnode-id="4290" instrument_node="">, such as Wilhem Ostwald's </span><i data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">Farbkörper</span></i><span data-dcnode-id="4287" instrument_node=""> (1919) or the Swedish </span><a class="text" data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23NCS"><span data-dcnode-id="4286" instrument_node="">Natural Color System</span></a><span data-dcnode-id="4284" instrument_node=""> (1981) require the sum of </span><b data-dcnode-id="4282"><span data-dcnode-id="4283" instrument_node="">W</span></b><span data-dcnode-id="4281" instrument_node=""> (including white scattering and whiteness increased with a white pigment), </span><b data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">C</span></b><span data-dcnode-id="4278" instrument_node=""> and </span><b data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">K</span></b><span data-dcnode-id="4275" instrument_node=""> (including blackness increased by a black pigment) to equal a constant (1 or 100) for all colors.</span></p><span data-dcnode-id="4273" instrument_node="">
</span><p data-dcnode-id="4270"><span data-dcnode-id="4272" instrument_node="">Finally, with reference to the material surface attributes:</span><a data-dcnode-id="4271" name="ctprin24"></a></p><span data-dcnode-id="4269" instrument_node="">
</span><p data-dcnode-id="4266"><b data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">24. The proportion of white light scattering is decreased by surface gloss; the proportion of black absorptance is increased by a transparent vehicle.</span></b></p><span data-dcnode-id="4265" instrument_node="">
</span><p data-dcnode-id="4263"><span data-dcnode-id="4264" instrument_node="">Materials generally present both darker and more saturated visual color when they are enclosed in a transparent medium (such as acrylic or water) than when they are viewed as dry powders or embedded in an opaque vehicle. The transparent medium tends to trap the light and permit it to interact with more of the colorant molecules, increasing the probability that it will be transformed into heat or chromatic reflectance; it also presents a smoother surface, which greatly reduces surface scattering.</span></p><span data-dcnode-id="4262" instrument_node="">
</span><p data-dcnode-id="4244"><span data-dcnode-id="4261" instrument_node="">Although </span><b data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">W</span></b><span data-dcnode-id="4258" instrument_node="">, </span><b data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">C</span></b><span data-dcnode-id="4255" instrument_node=""> and </span><b data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">K</span></b><span data-dcnode-id="4252" instrument_node=""> are aspects of material color, they only become recognizable as attributes of visual color through properties of reflected light within the light environment, specifically through the interaction of </span><a class="text" data-dcnode-id="4250" href="#illuminancecontrast"><span data-dcnode-id="4251" instrument_node="">luminance contrast</span></a><span data-dcnode-id="4249" instrument_node=""> and </span><i data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">chromaticity contrast</span></i><span data-dcnode-id="4246" instrument_node="">.</span><a data-dcnode-id="4245" name="ctprin25"></a></p><span data-dcnode-id="4243" instrument_node="">
</span><p data-dcnode-id="4240"><b data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">25. The visual color attributes W, C and K are perceived through luminance and chromaticity contrasts within a light environment, and therefore can be mimicked by contrasts between light stimuli presented as contiguous color areas.</span></b></p><span data-dcnode-id="4239" instrument_node="">
</span><p data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">This is how we can perceive blackened or whitened surfaces in an image presented on a computer monitor, television screen or projected transparency. The overall luminance of the image is interpreted as the light environment in much the same way as it would be in a physical environment, and the luminance and chromaticity contrasts are interpreted in the same way as they would be in surfaces.</span></p><span data-dcnode-id="4236" instrument_node="">
</span><p data-dcnode-id="4233"><span data-dcnode-id="4235" instrument_node="">However, the fact that we can simulate surface color attributes in the pure spectrum colors held in such high esteem by traditional color theorists only demonstrates that the imperfections we can simulate are also inherent in our visual response to the world, and therefore — once again! — are due to our eyes and mind, which anticipate the three part "impurity" of material colors.</span><a data-dcnode-id="4234" name="cterror08"></a></p><span data-dcnode-id="4232" instrument_node="">
</span><p data-dcnode-id="4225"><span class="rubric" data-dcnode-id="4227"><span data-dcnode-id="4231" instrument_node="">8. A "split primary" palette overcomes the </span><i data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">impurity</span></i><span data-dcnode-id="4228" instrument_node=""> of paint colors</span></span><span data-dcnode-id="4226" instrument_node="">.</span></p><span data-dcnode-id="4224" instrument_node="">
</span><p data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">We've seen that the "impurity" of material color is inherent in material colorants, is essential for subtractive mixture to work properly, and is even essential to the visual color of a saturated yellow. Nevertheless, traditional color theory has attempted to fix this impurity. Let's see how.</span></p><span data-dcnode-id="4221" instrument_node="">
</span><p data-dcnode-id="4216"><span data-dcnode-id="4220" instrument_node="">The passage from Chevreul's </span><a class="text" data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23chevreul"><span data-dcnode-id="4219" instrument_node="">The Principles of Color Harmony and Contrast</span></a><span data-dcnode-id="4217" instrument_node="">, quoted above, continues this way:</span></p><span data-dcnode-id="4215" instrument_node="">
</span><p data-dcnode-id="4205"><i data-dcnode-id="4207"><span data-dcnode-id="4214" instrument_node="">It is also certain that the violets, greens and oranges resulting from a mixture of colored materials are much more intense when the colors of these materials are more similar in hue. For example: when we mix blue and red to form violet, the result will be better if we take a red </span><u data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">tinted with blue</span></u><span data-dcnode-id="4211" instrument_node="">, and
a blue </span><u data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">tinted with red</span></u><span data-dcnode-id="4208" instrument_node="">, rather than a red or blue leaning toward yellow; in the same way, a blue tinted with green, mixed with a yellow tinted with blue, will yield a purer green than if red were part of either color.</span></i><span data-dcnode-id="4206" instrument_node=""> (1839, ¶¶157-158; my translation; emphasis in original)</span></p><span data-dcnode-id="4204" instrument_node="">
</span><p data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">According the Chevreul, a yellow primary paint must reflect "yellow" light mixed with some "blue" or "red" light, which dulls the pure yellow color. As we can't avoid this color pollution, we minimize it by mixing colors tinted with each other — so the thinking goes.</span></p><span data-dcnode-id="4201" instrument_node="">
</span><p data-dcnode-id="4193"><span data-dcnode-id="4200" instrument_node="">This is the basis for the traditional color theory remedy for dull paint mixtures — the </span><a class="text" data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette4r.html"><span data-dcnode-id="4199" instrument_node="">split "primary" palette</span></a><span data-dcnode-id="4197" instrument_node="">. It is based on Chevreul's concept of "taint". The strategy is to </span><i data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">increase the taint</span></i><span data-dcnode-id="4194" instrument_node=""> by splitting the paint primary colors into a "warm" and "cool" pair that are "tainted" or lean toward each of the other two primaries.</span></p><span data-dcnode-id="4192" instrument_node="">
</span><p data-dcnode-id="4169"><span data-dcnode-id="4191" instrument_node="">Thus we split primary yellow into a "warm" </span><i data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">orange yellow</span></i><span data-dcnode-id="4188" instrument_node=""> (tainted with some of primary red) and a "cool" </span><i data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">green yellow</span></i><span data-dcnode-id="4185" instrument_node=""> (tainted with some of the primary blue); we split primary red into a "warm" </span><i data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">orange red</span></i><span data-dcnode-id="4182" instrument_node=""> (tainted with some of primary yellow) and a "cool" </span><i data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">violet red</span></i><span data-dcnode-id="4179" instrument_node=""> (tainted with some of the primary blue); and we split primary blue into a "warm" </span><i data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">violet blue</span></i><span data-dcnode-id="4176" instrument_node=""> (tainted with some of primary red) and a "cool" </span><i data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">green blue</span></i><span data-dcnode-id="4173" instrument_node=""> (tainted with some of the primary yellow). The primary palette of three paints becomes a split primary palette of </span><i data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">six</span></i><span data-dcnode-id="4170" instrument_node=""> paints.</span></p><span data-dcnode-id="4168" instrument_node="">
</span><p data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">Then, by mixing the primary paints that lean toward each other, taint mixing with taint is the same as color mixed with color. In theory, then, this solves the problem of dull orange, green and purple mixtures in a primary triad palette.</span></p><span data-dcnode-id="4165" instrument_node="">
</span><p data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">So let's hold the split primary palette to its key claim: that splitting the paint primary colors into a "warm" and "cool" pair allows us to mix the most vibrant secondary colors (orange, purple and green).</span></p><span data-dcnode-id="4162" instrument_node="">
</span><p data-dcnode-id="4157"><span data-dcnode-id="4161" instrument_node="">We evaluate the "vibrant color" justification for the split primary palette by comparing it to any other palette of six paints, for example the </span><a class="text" data-dcnode-id="4159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette4e.html"><span data-dcnode-id="4160" instrument_node="">secondary palette</span></a><span data-dcnode-id="4158" instrument_node="">, to see which paint selection is superior. There are two ways to do this.</span></p><span data-dcnode-id="4156" instrument_node="">
</span><p data-dcnode-id="4135"><span data-dcnode-id="4155" instrument_node="">A simple "back of the envelope" approach is to print out a copy of the pigment map presented on the </span><a class="text" data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/camwheel.html"><span data-dcnode-id="4154" instrument_node="">CIECAM a</span><sub data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">C</span></sub><span data-dcnode-id="4151" instrument_node="">b</span><sub data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">C</span></sub><span data-dcnode-id="4148" instrument_node=""> plane</span></a><span data-dcnode-id="4146" instrument_node="">, identify on this map the location of the pigments used in all paints in the palette (use the </span><a class="text" data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette1.html"><span data-dcnode-id="4145" instrument_node="">complete palette</span></a><span data-dcnode-id="4143" instrument_node=""> to identify pigments from the </span><a class="text" data-dcnode-id="4141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/pigmt6.html%23ciname"><span data-dcnode-id="4142" instrument_node="">color index name</span></a><span data-dcnode-id="4140" instrument_node=""> printed on the paint tube label), then connect these pigment markers to form the largest possible, straight sided enclosure (see examples below). The enclosed area is approximately the </span><a class="text" data-dcnode-id="4138" href="#gamut"><span data-dcnode-id="4139" instrument_node="">gamut</span></a><span data-dcnode-id="4137" instrument_node=""> of the palette — the range of hue and saturation that it is possible to mix with that selection of paints. The palette with the larger gamut will create a wider variety of color mixtures.</span><a data-dcnode-id="4136" name="drawlines"></a></p><span data-dcnode-id="4134" instrument_node="">
</span><p class="imgC" data-dcnode-id="4131"><a class="text" data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/camwheel.html"><img border="0" data-dcnode-id="4133" height="152" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/cw51.gif&amp;raw" width="322"></a></p><span data-dcnode-id="4130" instrument_node="">
</span><p class="CC" data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">comparing the gamut of two palettes</span></p><span data-dcnode-id="4127" instrument_node="">
</span><p class="subCC" data-dcnode-id="4117"><span data-dcnode-id="4126" instrument_node="">split primary palette (left) and secondary palette (right)</span><br data-dcnode-id="4125"><span data-dcnode-id="4124" instrument_node="">on the CIECAM a</span><sub data-dcnode-id="4122"><span data-dcnode-id="4123" instrument_node="">C</span></sub><span data-dcnode-id="4121" instrument_node="">b</span><sub data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">C</span></sub><span data-dcnode-id="4118" instrument_node=""> plane</span></p><span data-dcnode-id="4116" instrument_node="">
</span><p data-dcnode-id="4110"><span data-dcnode-id="4115" instrument_node="">This comparison shows that the split primary palette (at left) creates a lozenge of color mixtures that is skewed toward the "warm" colors of the palette, and creates dull mixtures in the greens and violets (the boundary lines of the palette pass close to the gray center in these hues). In contrast, with the more equally spaced </span><a class="text" data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette4e.html"><span data-dcnode-id="4114" instrument_node="">secondary palette</span></a><span data-dcnode-id="4112" instrument_node=""> (at right), we get a substantially increased range in color mixtures. This is because a single intense pigment anchors each primary and secondary hue, which pushes back the limits of the color space as far as possible (particularly on the green side).</span><a data-dcnode-id="4111" name="mixcomp"></a></p><span data-dcnode-id="4109" instrument_node="">
</span><p data-dcnode-id="4101"><span data-dcnode-id="4108" instrument_node="">The alternative (and better) way to compare palettes is to use each one to mix the twelve colors of a </span><a class="text" data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23tertiary"><span data-dcnode-id="4107" instrument_node="">tertiary color wheel</span></a><span data-dcnode-id="4105" instrument_node="">. Display these mixtures either side by side or as matching </span><a class="text" data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/tech15.html"><span data-dcnode-id="4104" instrument_node="">paint wheels</span></a><span data-dcnode-id="4102" instrument_node=""> (below), and see what you get.</span></p><span data-dcnode-id="4100" instrument_node="">
</span><p class="imgC" data-dcnode-id="4098"><img data-dcnode-id="4099" height="179" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/secsplit.gif&amp;raw" width="380"></p><span data-dcnode-id="4097" instrument_node="">
</span><p class="CC" data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">comparing paint wheels made with two palettes</span></p><span data-dcnode-id="4094" instrument_node="">
</span><p class="subCC" data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">split primary palette (left) and secondary palette (right)</span></p><span data-dcnode-id="4091" instrument_node="">
</span><p data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">This side by side comparison confirms the gamut differences identified with the palette schemes. The mixed red orange in the split primary palette (left) is so dull it is close to brown; the purple is dark and grayish, and the mixed greens are drab across the entire range. In contrast, the secondary palette (at right) is obviously much brighter in the greens, produces a more evenly saturated range of warm hues, and gets juicy purples as well.</span></p><span data-dcnode-id="4088" instrument_node="">
