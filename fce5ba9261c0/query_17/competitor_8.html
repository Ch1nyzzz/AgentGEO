</span><p data-dcnode-id="4079"><span data-dcnode-id="4087" instrument_node="">The problem here is </span><a class="text" data-dcnode-id="4085" href="#satcosts"><span data-dcnode-id="4086" instrument_node="">saturation costs</span></a><span data-dcnode-id="4084" instrument_node="">. Assuming two paints are both saturated to begin with, then the rule of saturation costs is: </span><i data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">the farther apart on the hue circle two paint colors are, the duller their mixture will be.</span></i><span data-dcnode-id="4081" instrument_node=""> The obvious solution to saturation costs is to use a larger number of saturated paints, spaced equally around the hue circle.</span><a data-dcnode-id="4080" name="ctprin26"></a></p><span data-dcnode-id="4078" instrument_node="">
</span><p data-dcnode-id="4075"><b data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">26. Given an arbitrary limit on the number of paints or inks in a palette, the largest variety of saturated color mixtures is obtained by choosing the most saturated pigments in hues equally spaced around the hue circle.</span></b></p><span data-dcnode-id="4074" instrument_node="">
</span><p data-dcnode-id="4065"><span data-dcnode-id="4073" instrument_node="">Choosing two paints or inks that are more similar in hue </span><i data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">does</span></i><span data-dcnode-id="4070" instrument_node=""> increase the intensity of their mixture, as Chevreul says. But these saturation costs again have nothing to do with the contamination of one primary color with another. They appear even when we mix two monochromatic (single wavelength) lights that are completely free of tint by any other hue. In fact, mixing spectral lights was originally how </span><a class="text" data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23extraspectral"><span data-dcnode-id="4069" instrument_node="">Newton discovered</span></a><span data-dcnode-id="4067" instrument_node=""> saturation costs, and devised the hue circle to explain them!</span><a data-dcnode-id="4066" name="cterror09"></a></p><span data-dcnode-id="4064" instrument_node="">
</span><p data-dcnode-id="4060"><span class="rubric" data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">9. With a split primary palette, do not mix colors "across the line" of a primary color</span></span><span data-dcnode-id="4061" instrument_node="">.</span></p><span data-dcnode-id="4059" instrument_node="">
</span><p data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">The modern prejudice in favor of high chroma color became potent in the late 19th and 20th centuries, and watercolor tutorials that advocated the split primary palette began to disparage dull color mixtures and  warned painters to avoid them.</span></p><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4051"><span data-dcnode-id="4055" instrument_node="">Among practitioners of the split primary palette, the "taint mixed with taint" rationale developed a complementary prohibition: do not mix colors on opposite sides of a "primary" color. This was called "crossing the line" and the mixture was called </span><i data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">"mud"</span></i><span data-dcnode-id="4052" instrument_node="">.</span></p><span data-dcnode-id="4050" instrument_node="">
</span><p class="imgC" data-dcnode-id="4048"><img data-dcnode-id="4049" height="195" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/cross.gif&amp;raw" width="375"></p><span data-dcnode-id="4047" instrument_node="">
</span><p class="CC" data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">"crossing the line" in a split primary palette</span></p><span data-dcnode-id="4044" instrument_node="">
</span><p data-dcnode-id="4036"><span data-dcnode-id="4043" instrument_node="">In the examples, we mix the same </span><i data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">hue</span></i><span data-dcnode-id="4040" instrument_node=""> of color (yellow green, orange or violet) using two split primary paints with the same "taint", or two primaries with a taint fromt the third primary. In each case, the result is a </span><i data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">duller</span></i><span data-dcnode-id="4037" instrument_node=""> color mixture, a color closer to or even equal to "mud".</span></p><span data-dcnode-id="4035" instrument_node="">
</span><p data-dcnode-id="4029"><span data-dcnode-id="4034" instrument_node="">However, once the painter understands </span><a class="text" data-dcnode-id="4032" href="#satcosts"><span data-dcnode-id="4033" instrument_node="">saturation costs</span></a><span data-dcnode-id="4031" instrument_node="">, and chooses paint colors that are equally spaced around the hue circle rather than split from the three primary colors, this prohibition is irrelevant. And certainly dull, dark colors are too often useful to prohibit them in painting styles — the "mud" green in the diagram (above) is actually a handsome landscape foliage color.</span><a data-dcnode-id="4030" name="ctprin27"></a></p><span data-dcnode-id="4028" instrument_node="">
</span><p data-dcnode-id="4025"><b data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">27. "Mud" is a perjorative label for color mixtures that occur widely in nature and are indispensable in all historical and most contemporary painting styles.</span></b></p><span data-dcnode-id="4024" instrument_node="">
</span><p data-dcnode-id="4015"><span data-dcnode-id="4023" instrument_node="">Traditional color theory teaches color mixing </span><i data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">rules</span></i><span data-dcnode-id="4020" instrument_node=""> and an antiquated, judgmental approach to color mixtures. Modern color theory teaches color mixing </span><i data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">skills</span></i><span data-dcnode-id="4017" instrument_node=""> and the insights necessary to create whatever color is needed for any purpose.</span><a data-dcnode-id="4016" name="cterror10"></a></p><span data-dcnode-id="4014" instrument_node="">
</span><p data-dcnode-id="4010"><span class="rubric" data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">10. Transparent watercolors achieve "luminosity" because light is reflected from the paper through the pigments, "like light through a stained glass window"</span></span><span data-dcnode-id="4011" instrument_node="">.</span></p><span data-dcnode-id="4009" instrument_node="">
</span><p data-dcnode-id="4004"><span data-dcnode-id="4008" instrument_node="">A very popular misconception in traditional color theory is that watercolors present a special "luminosity" that is due to the </span><i data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">stained glass</span></i><span data-dcnode-id="4005" instrument_node=""> action of the watercolor pigments.</span></p><span data-dcnode-id="4003" instrument_node="">
</span><p data-dcnode-id="3995"><span data-dcnode-id="4002" instrument_node="">These two metaphors arose in the 19th century as part of the </span><a class="text" data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/artist07.html"><span data-dcnode-id="4001" instrument_node="">rivalrous disputes</span></a><span data-dcnode-id="3999" instrument_node=""> between watercolor societies — or rather, between painters who used "muddy" gouache or body color, and those who insisted on using only "pure" transparent paints. Given the traditional color theory emphasis on color "purity", the churchly image of a stained glass window should arouse immediate suspicion. And, as I </span><a class="text" data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/tech16.html%23transparencymyth"><span data-dcnode-id="3998" instrument_node="">explain in detail</span></a><span data-dcnode-id="3996" instrument_node=""> elsewhere, the metaphor is false.</span></p><span data-dcnode-id="3994" instrument_node="">
</span><p data-dcnode-id="3986"><span data-dcnode-id="3993" instrument_node="">If a pigment particle absorbs light to create </span><a class="text" data-dcnode-id="3991" href="#WCK"><span data-dcnode-id="3992" instrument_node="">chromatic reflectance</span></a><span data-dcnode-id="3990" instrument_node="">, then that light is not available to be absorbed a second time. Light does not </span><i data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">pass through</span></i><span data-dcnode-id="3987" instrument_node=""> a pigment particle — it is either absorbed as heat, reflected as color or scattered as "white" light — so light that is reflected from the painting to the viewer that has not been affected by pigment is only reflected from the paper.</span></p><span data-dcnode-id="3985" instrument_node="">
</span><p data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">This paper reflected light also does not pass through pigment particles, though it can hit a pigment particle on its way out. But this action will not be different from the light that is reflected from a gessoed canvas back through an acrylic or oil paint layer, so it can't be an advantage that watercolors have over other paint media.</span></p></td><td align="right" colspan="2" data-dcnode-id="3980" valign="top"></td></tr><tr data-dcnode-id="3746"><td colspan="2" data-dcnode-id="3975"></td><td align="left" data-dcnode-id="3756" valign="top"><p data-dcnode-id="3967"><span data-dcnode-id="3974" instrument_node="">In fact, watercolor paints </span><i data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">do not</span></i><span data-dcnode-id="3971" instrument_node=""> form a paint layer, but scatter pigment particles around on the surface of the paper like gravel on a shag carpet (image, right). It's apparent in the photo that the paper fibers are as likely to scatter or block light as they are to send it back to the viewer, because </span><b data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">there is no paint layer in watercolors</span></b><span data-dcnode-id="3968" instrument_node=""> — the gum vehicle has dried around the fibers and pigment particles and sunk into the paper pulp.</span></p><span data-dcnode-id="3966" instrument_node="">
</span><p data-dcnode-id="3961"><span data-dcnode-id="3965" instrument_node="">Acrylic and oil paints do form a transparent layer. Light reflected within this layer </span><i data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">can</span></i><span data-dcnode-id="3962" instrument_node=""> strike pigment particles twice, and has a greater chance of hitting a pigment particle once before it leaves the paint layer, which (along with reduction in white light scattering from the transparent binder surface) is why pigments in acrylic and oil paints can achieve a higher chroma than the same pigments in watercolors.</span></p><span data-dcnode-id="3960" instrument_node="">
</span><p data-dcnode-id="3955"><span data-dcnode-id="3959" instrument_node="">So what explains the special color appearance of a watercolor painting, or its apparent transparency? The fact, as shown in the photo, that so much bare paper can reflect light. This adds whiteness and </span><i data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">brightness</span></i><span data-dcnode-id="3956" instrument_node=""> (luminance, not chroma) to the color, reducing the chroma and reducing the contrast ratio between the white and the darkest values. To see this contrast reducing effect more dramatically, hold a watercolor painting against the sun and observe light actually passing through the paper.
</span></p><span data-dcnode-id="3954" instrument_node="">
</span><p data-dcnode-id="3951"><span data-dcnode-id="3953" instrument_node="">Watercolors also show the paper texture in the paint surface, instead of a shiny, obviously material layer, so that the image appears insubstantial and somehow floating in front of the paper. In fact, letting paint build up until it "bronzes" or acquires a shiny surface is considered a painting flaw. The visible paper surface, or the lack of visible paint layer, creates the impression of something transparent like a stained glass window, but it is not a special form of "luminosity".</span><a data-dcnode-id="3952" name="ctprin28"></a></p><span data-dcnode-id="3950" instrument_node="">
</span><p data-dcnode-id="3944"><b data-dcnode-id="3945"><span data-dcnode-id="3949" instrument_node="">28. The "luminosity" in watercolors arises from the reflection from the white paper, which reduces the contrast ratio and increases the brightness of the painting surface; it does not come from light </span><i data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">passing through</span></i><span data-dcnode-id="3946" instrument_node=""> pigment particles.</span></b></p><span data-dcnode-id="3943" instrument_node="">
</span><p data-dcnode-id="3934"><span data-dcnode-id="3942" instrument_node="">The fixation of some watercolor painters on "transparent" pigments is also misdirected. </span><i data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">All pigments</span></i><span data-dcnode-id="3939" instrument_node=""> can appear transparent, if they are diluted with enough water and applied as a smooth, seamless wash. Transparency happens </span><i data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">between</span></i><span data-dcnode-id="3936" instrument_node=""> pigment particles. The key is to avoid a buildup of paint that appears as a paint layer (the real objection to gouache), or to soak the paper so much that the pigment particles migrate into the paper, where they are shadowed by the paper fibers.</span><a data-dcnode-id="3935" name="ctprin29"></a></p><span data-dcnode-id="3933" instrument_node="">
</span><p data-dcnode-id="3930"><b data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">29. The "transparency" in watercolors is not in the pigments, but in the spacing between the pigment particles: opaque or "sedimentary" paints can be made transparent by diluting them, applying as a seamless wash, and avoiding paint buildup into a visible paint layer.</span></b></p><span data-dcnode-id="3929" instrument_node="">
</span><p data-dcnode-id="3926"><span data-dcnode-id="3928" instrument_node="">Use thick paint sparingly, and work as much as possible on dry or freshly wet paper, and you'll have all the "luminosity" you can handle.</span><a data-dcnode-id="3927" name="cterror11"></a></p><span data-dcnode-id="3925" instrument_node="">
</span><p data-dcnode-id="3915"><span class="rubric" data-dcnode-id="3917"><span data-dcnode-id="3924" instrument_node="">11. </span><i data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">Secondary</span></i><span data-dcnode-id="3921" instrument_node=""> colors are 1:1 mixtures of two primary colors, and </span><i data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">tertiary</span></i><span data-dcnode-id="3918" instrument_node=""> colors are 1:1 mixtures of two secondary colors</span></span><span data-dcnode-id="3916" instrument_node="">.</span></p><span data-dcnode-id="3914" instrument_node="">
</span><p data-dcnode-id="3910"><span data-dcnode-id="3913" instrument_node="">Most of the hallmark concepts of traditional color theory have been antiquated by the progress in color science, colorant manufacture, media technologies and painting styles. A simple example is the change that has occurred in the definition of </span><i data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">tertiary colors.</span></i></p><span data-dcnode-id="3909" instrument_node="">
</span><p data-dcnode-id="3889"><span data-dcnode-id="3908" instrument_node="">Traditional color theory starts with the three primary colors, </span><a class="text" data-dcnode-id="3906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23secondary"><span data-dcnode-id="3907" instrument_node="">secondary colors</span></a><span data-dcnode-id="3905" instrument_node=""> are produced by the equal mixture of two primary colors. These are </span><i data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">orange</span></i><span data-dcnode-id="3902" instrument_node=""> (</span><b data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">O</span></b><span data-dcnode-id="3899" instrument_node="">), green (</span><b data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">G</span></b><span data-dcnode-id="3896" instrument_node="">) and </span><i data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">violet</span></i><span data-dcnode-id="3893" instrument_node=""> (</span><b data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">V</span></b><span data-dcnode-id="3890" instrument_node="">), as shown in the diagram (below).</span></p><span data-dcnode-id="3888" instrument_node="">
</span><p class="imgC" data-dcnode-id="3886"><img data-dcnode-id="3887" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/modtri.gif&amp;raw" width="380"></p><span data-dcnode-id="3885" instrument_node="">
</span><p class="CC" data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">color theory tertiary colors</span></p><span data-dcnode-id="3882" instrument_node="">
</span><p class="subCC" data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">the traditional tertiary colors (left) and the modern tertiary hues (right)</span></p><span data-dcnode-id="3879" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3878" instrument_node="">In the traditional concept (based on the 18th century </span><i data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">red, yellow</span></i><span data-dcnode-id="3875" instrument_node=""> and </span><i data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">blue</span></i><span data-dcnode-id="3872" instrument_node=""> primaries), </span><a class="text" data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23tertdefs"><span data-dcnode-id="3871" instrument_node="">tertiary colors</span></a><span data-dcnode-id="3869" instrument_node=""> are produced by the equal mixture of two secondary colors, which creates the three tertiaries </span><i data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">maroon</span></i><span data-dcnode-id="3866" instrument_node=""> (dull red), </span><i data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">olive</span></i><span data-dcnode-id="3863" instrument_node=""> (dull yellow) and </span><i data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">slate</span></i><span data-dcnode-id="3860" instrument_node=""> (dull blue).</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3850"><span data-dcnode-id="3857" instrument_node="">Dull color mixtures were fundamental to painting styles in 18th century painting practice — so much so that the English entomologist </span><a class="text" data-dcnode-id="3855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23harris"><span data-dcnode-id="3856" instrument_node="">Moses Harris</span></a><span data-dcnode-id="3854" instrument_node="">, in his </span><i data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">Natural System of Colours</span></i><span data-dcnode-id="3851" instrument_node=""> (1766), devoted a separate color wheel to them, as mixtures of orange, green and purple (image, below).</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p class="imgC" data-dcnode-id="3847"><img data-dcnode-id="3848" height="189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/harris.jpg&amp;raw" width="380"></p><span data-dcnode-id="3846" instrument_node="">
</span><p class="CC" data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">the color wheels of moses harris (1766)</span></p><span data-dcnode-id="3843" instrument_node="">
</span><p class="subCC" data-dcnode-id="3835"><span data-dcnode-id="3842" instrument_node="">a 20th century reconstruction of the Harris color wheels; </span><i data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">(left)</span></i><span data-dcnode-id="3839" instrument_node=""> mixtures of the "primitive" colors red, yellow and blue; </span><i data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">(right)</span></i><span data-dcnode-id="3836" instrument_node=""> mixtures of the "compound" colors orange, green and purple</span></p><span data-dcnode-id="3834" instrument_node="">
</span><p data-dcnode-id="3826"><span data-dcnode-id="3833" instrument_node="">These traditional tertiaries anchored the useful dull color mixtures in relation to the primary colors, using secondary colors as a bridging framework. This integrative role of the traditional tertiary colors appears in the three alternative formulas for a tertiary mixture. The equal mixture of two secondary colors amounts to a 2:1:1 mixture of </span><i data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">all three</span></i><span data-dcnode-id="3830" instrument_node=""> primaries, for example in </span><i data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">olive</span></i><span data-dcnode-id="3827" instrument_node="">:</span></p><span data-dcnode-id="3825" instrument_node="">
</span><span data-dcnode-id="3824" instrument_node="">
</span><span data-dcnode-id="3813" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="3" data-dcnode-id="3811" style="font-family:Verdana; color:#333366; font-size:13px;" width="100%"><tbody data-dcnode-id="3812"><tr data-dcnode-id="3814"><td align="left" data-dcnode-id="3821"><b data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">2 O[1Y+1R] + 2 G[1Y+1B]</span></b></td><td data-dcnode-id="3818"><b data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">=</span></b></td><td data-dcnode-id="3815"><b data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">4 OLIVE [2Y+1R+1B]</span></b></td></tr></tbody></table><span data-dcnode-id="3810" instrument_node="">
</span><br data-dcnode-id="3809"><span data-dcnode-id="3808" instrument_node="">
</span><p data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">Simply by rearranging the mixture components, we prove that the same tertiary color is equal to a 1:1 mixture of yellow and its complement, violet:</span></p><span data-dcnode-id="3805" instrument_node="">
</span><span data-dcnode-id="3804" instrument_node="">
</span><span data-dcnode-id="3793" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="3" data-dcnode-id="3791" style="font-family:Verdana; color:#333366; font-size:13px;" width="100%"><tbody data-dcnode-id="3792"><tr align="left" data-dcnode-id="3794"><td data-dcnode-id="3801"><b data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">2 O[1Y+1R] + 2 G[1Y+1B]</span></b></td><td data-dcnode-id="3798"><b data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">=</span></b></td><td data-dcnode-id="3795"><b data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">2 Y[2Y] + 2 V[1R+1B]</span></b></td></tr></tbody></table><span data-dcnode-id="3790" instrument_node="">
</span><br data-dcnode-id="3789"><span data-dcnode-id="3788" instrument_node="">
</span><p data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">or to a 1:3 (!) mixture of a primary color with the darkest gray (near black) that can be mixed with the three primaries:</span></p><span data-dcnode-id="3785" instrument_node="">
</span><span data-dcnode-id="3784" instrument_node="">
</span><span data-dcnode-id="3773" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="3" data-dcnode-id="3771" style="font-family:Verdana; color:#333366; font-size:13px;" width="100%"><tbody data-dcnode-id="3772"><tr align="left" data-dcnode-id="3774"><td data-dcnode-id="3781"><b data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">2 O[1Y+1R] + 2 G[1Y+1B]</span></b></td><td data-dcnode-id="3778"><b data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">=</span></b></td><td data-dcnode-id="3775"><b data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">1 Y[1Y] + 3 K[1Y+1R+1B]</span></b></td></tr></tbody></table><span data-dcnode-id="3770" instrument_node="">
</span><br data-dcnode-id="3769"><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">... the last formula showing that the three traditional tertiaries are simply dulled versions of the three primary colors, creating a muted, dark, "minor key" primary triad palette.</span></p><span data-dcnode-id="3765" instrument_node="">
</span><p data-dcnode-id="3760"><span data-dcnode-id="3764" instrument_node="">This is all "in theory": to use these recipes in practice, we must have three primary paints of matching </span><a class="text" data-dcnode-id="3762" href="#painttinting"><span data-dcnode-id="3763" instrument_node="">tinting strength</span></a><span data-dcnode-id="3761" instrument_node="">, which we get by first diluting the blue and red paints until an equal mixture with yellow produces an achromatic dark gray.</span></p><span data-dcnode-id="3759" instrument_node="">
</span><p data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">And there theory ends. We cannot duplicate these results by using these proportions in three primary paints out of the tube, and we certainly cannot get these results by using separate colors of yellow, orange, green, black and violet paint. For example, 3 parts carbon black will overwhelm 1 part yellow, and 1 part dioxazine violet will overwhelm 1 part yellow, because the black and violet are very dark and strongly tinting paints.</span></p></td><td colspan="2" data-dcnode-id="3748" valign="top"><span data-dcnode-id="3754" instrument_node="">
</span><p class="imgS" data-dcnode-id="3752"><img data-dcnode-id="3753" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/paintpix.jpg&amp;raw" width="107"></p><span data-dcnode-id="3751" instrument_node="">
</span><p class="SC" data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">microscope image of an ultramarine blue wash on cold pressed watercolor paper</span></p></td></tr><tr data-dcnode-id="3066"><td colspan="2" data-dcnode-id="3743"></td><td align="left" data-dcnode-id="3070" valign="top"><p data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">However, by the early 20th century, vast improvements in synthetic pigment manufacture, and the use of strongly saturated colorants in painting and advertising, had shifted the color theory emphasis to the circumference of the color wheel and to the most saturated version of all hues.</span></p><span data-dcnode-id="3740" instrument_node="">
</span><p data-dcnode-id="3687"><span data-dcnode-id="3739" instrument_node="">So in the modern concept (based on the 20th century </span><i data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">magenta, yellow</span></i><span data-dcnode-id="3736" instrument_node=""> and </span><i data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">cyan</span></i><span data-dcnode-id="3733" instrument_node=""> primaries), </span><a class="text" data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23tertiary"><span data-dcnode-id="3732" instrument_node="">tertiary hues</span></a><span data-dcnode-id="3730" instrument_node=""> became the equal mixture of a primary hue and either of the secondary hues next to it. This creates the </span><i data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">six</span></i><span data-dcnode-id="3727" instrument_node=""> tertiary hues </span><i data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">yellow orange</span></i><span data-dcnode-id="3724" instrument_node=""> (</span><b data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">yo</span></b><span data-dcnode-id="3721" instrument_node="">), </span><i data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">red</span></i><span data-dcnode-id="3718" instrument_node=""> (</span><b data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">r</span></b><span data-dcnode-id="3715" instrument_node="">), </span><i data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">violet</span></i><span data-dcnode-id="3712" instrument_node=""> (</span><b data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">v</span></b><span data-dcnode-id="3709" instrument_node="">), </span><i data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">blue</span></i><span data-dcnode-id="3706" instrument_node=""> (</span><b data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">b</span></b><span data-dcnode-id="3703" instrument_node="">), </span><i data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">blue green</span></i><span data-dcnode-id="3700" instrument_node=""> (</span><b data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">bg</span></b><span data-dcnode-id="3697" instrument_node="">) and </span><i data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">yellow green</span></i><span data-dcnode-id="3694" instrument_node=""> (</span><b data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">yg</span></b><span data-dcnode-id="3691" instrument_node="">). This has been the usage taught in the Famous Artists' Courses since the 1950's, and is the standard usage cited in the </span><i data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">American Heritage Dictionary of the English Language</span></i><span data-dcnode-id="3688" instrument_node=""> (4th edition).</span></p><span data-dcnode-id="3686" instrument_node="">
</span><p data-dcnode-id="3674"><span data-dcnode-id="3685" instrument_node="">In modern color theory there is no need for the </span><i data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">tertiary</span></i><span data-dcnode-id="3682" instrument_node=""> label, as a color in the "third rank" below </span><i data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">primary,</span></i><span data-dcnode-id="3679" instrument_node=""> because we do not rely on primary mixtures to create them (instead artists use single pigment paints, and printers use spot colors); nor is there any need for </span><i data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">secondary</span></i><span data-dcnode-id="3676" instrument_node=""> to describe "second rank" hues such as orange and green that are often more important and useful in painting than red violet or green blue.</span><a data-dcnode-id="3675" name="ctprin30"></a></p><span data-dcnode-id="3673" instrument_node="">
</span><p data-dcnode-id="3670"><b data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">30. The designation of hues as "secondary" or "tertiary" has no relevance in modern color theory.</span></b></p><span data-dcnode-id="3669" instrument_node="">
</span><p data-dcnode-id="3663"><span data-dcnode-id="3668" instrument_node="">In place of these archaic labels, artists use the six basic hue categories and twelve compound hue categories </span><a class="text" data-dcnode-id="3666" href="#huecategories"><span data-dcnode-id="3667" instrument_node="">described above</span></a><span data-dcnode-id="3665" instrument_node=""> to denote hues. There is no ranking of importance among hues; they are all equally important in color design.</span><a data-dcnode-id="3664" name="cterror12"></a></p><span data-dcnode-id="3662" instrument_node="">
</span><p data-dcnode-id="3658"><span class="rubric" data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">12. Painters use the primary color framework to analyze visual colors and paint color mixtures</span></span><span data-dcnode-id="3659" instrument_node="">.</span></p><span data-dcnode-id="3657" instrument_node="">
</span><p data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">There are two final misconceptions necessary to clear up. The first is that the traditional color theory framework is a powerful way for painters to think about conceptual colors, analyze visual colors, or guide paint color mixtures.</span></p><span data-dcnode-id="3654" instrument_node="">
</span><p data-dcnode-id="3647"><b data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">Analysis of Complementary Hues</span></b><span data-dcnode-id="3651" instrument_node="">. Let's first test these claims on one of the central color theory preoccupations: identifying the </span><a class="text" data-dcnode-id="3649" href="#complementaryhues"><span data-dcnode-id="3650" instrument_node="">complementary color</span></a><span data-dcnode-id="3648" instrument_node=""> to a given color — for example, a yellow orange mixture (diagram, below).</span></p><span data-dcnode-id="3646" instrument_node="">
</span><p class="imgC" data-dcnode-id="3644"><img data-dcnode-id="3645" height="434" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/36mix.gif&amp;raw" width="368"></p><span data-dcnode-id="3643" instrument_node="">
</span><p class="CC" data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">identifying complementary hues</span></p><span data-dcnode-id="3640" instrument_node="">
</span><p class="subCC" data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">(top) using the traditional primary triad (left) requires insertion of secondary hues (right); (bottom) using the modern opponent dimensions</span></p><span data-dcnode-id="3637" instrument_node="">
</span><p data-dcnode-id="3617"><span data-dcnode-id="3636" instrument_node="">We start with the primary triad (</span><b data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">C</span></b><span data-dcnode-id="3633" instrument_node="">, </span><b data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">Y</span></b><span data-dcnode-id="3630" instrument_node=""> and </span><b data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">M</span></b><span data-dcnode-id="3627" instrument_node="">), centered on the achromatic mixture (</span><b data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">K</span></b><span data-dcnode-id="3624" instrument_node="">) of all three primaries in equal proportions at equal tinting strength. We have created the most saturated possible yellow orange mixture from some quantity of yellow and magenta paint (</span><b data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">y,m</span></b><span data-dcnode-id="3621" instrument_node="">). What then is its visual or mixing complementary color (</span><b data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">C(y,m)</span></b><span data-dcnode-id="3618" instrument_node="">)?</span></p><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3605"><span data-dcnode-id="3615" instrument_node="">Since any two complementary colors must mix to gray, the answer is simply to subtract the primary quantities in </span><b data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">y,m</span></b><span data-dcnode-id="3612" instrument_node=""> from the </span><b data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">c,y,m</span></b><span data-dcnode-id="3609" instrument_node=""> quantities in the achromatic mixture. To do that, we only have to make the larger of the two quantities in the </span><b data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">y,m</span></b><span data-dcnode-id="3606" instrument_node=""> mixture equal to its quantity in the gray mixture. Thus, if we know that:</span></p><span data-dcnode-id="3604" instrument_node="">
</span><p data-dcnode-id="3599"><b data-dcnode-id="3600"><span data-dcnode-id="3603" instrument_node="">K = 20(C) + 33(Y) + 27(M)</span><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">

y,m = 60(Y) + 40(M)</span></b></p><span data-dcnode-id="3598" instrument_node="">
</span><p data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">then we standardize the larger quantity (60 parts of yellow) on the matching achromatic quantity (33 parts of yellow):</span></p><span data-dcnode-id="3595" instrument_node="">
</span><p data-dcnode-id="3592"><b data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">33/60 = 0.55</span></b></p><span data-dcnode-id="3591" instrument_node="">
</span><p data-dcnode-id="3586"><span data-dcnode-id="3590" instrument_node="">we adjust the </span><b data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">y,m</span></b><span data-dcnode-id="3587" instrument_node=""> proportions by that amount:</span></p><span data-dcnode-id="3585" instrument_node="">
</span><p data-dcnode-id="3582"><b data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">0.55*[60(Y) + 40(M)] = 33(Y) + 22(M)</span></b></p><span data-dcnode-id="3581" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3580" instrument_node="">and finally subtract those quantities from the achromatic quantities to get the complementary mixture </span><b data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">C(y,m)</span></b><span data-dcnode-id="3577" instrument_node="">:</span></p><span data-dcnode-id="3575" instrument_node="">
</span><p data-dcnode-id="3569"><b data-dcnode-id="3571"><span data-dcnode-id="3574" instrument_node="">C(y,m) = (20-0)(C) + (33-33)(Y) + (27-22)(M)</span><br data-dcnode-id="3573"><span data-dcnode-id="3572" instrument_node="">
C(y,m) = 20(C) + 5(M)</span></b><span data-dcnode-id="3570" instrument_node="">.</span></p><span data-dcnode-id="3568" instrument_node="">
</span><p data-dcnode-id="3560"><span data-dcnode-id="3567" instrument_node="">Now, although </span><a class="text" data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23rood"><span data-dcnode-id="3566" instrument_node="">Ogden Rood</span></a><span data-dcnode-id="3564" instrument_node=""> showed artists how to make similar calculations within a visual color triangle using mixture quantities from a </span><a class="text" data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/colortop.html"><span data-dcnode-id="3563" instrument_node="">color top</span></a><span data-dcnode-id="3561" instrument_node="">, I believe very few artists ever found their complementary paint mixtures by this kind of calculation!</span></p><span data-dcnode-id="3559" instrument_node="">
</span><p data-dcnode-id="3545"><span data-dcnode-id="3558" instrument_node="">That is because Moses Harris mooted the problem when he inserted the secondary or "compound" colors, the complements to the primary colors, in his color wheel. Now we are no longer working within a triangle but a circle, and the complement of the mixture </span><b data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">y,o</span></b><span data-dcnode-id="3555" instrument_node=""> is the mixture </span><b data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">v,c</span></b><span data-dcnode-id="3552" instrument_node=""> in the same relative proportions. And Harris explained that this is how his color wheel </span><a class="text" data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23harris"><span data-dcnode-id="3551" instrument_node="">should be used</span></a><span data-dcnode-id="3549" instrument_node=""> </span><i data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">"if a contrast is wanting to any color or teint".</span></i><span data-dcnode-id="3546" instrument_node=""> The complementary colors get us out of the calculations: we judge colors visually instead.</span></p><span data-dcnode-id="3544" instrument_node="">
</span><p data-dcnode-id="3506"><span data-dcnode-id="3543" instrument_node="">Modern color theory goes one step further. It replaces the traditional primary/secondary framework with two opponent color dimensions, defined as visual hue relationships: </span><i data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">violet red/blue green</span></i><span data-dcnode-id="3540" instrument_node=""> (</span><b data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">a+/a–</span></b><span data-dcnode-id="3537" instrument_node="">) and </span><i data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">yellow/blue violet</span></i><span data-dcnode-id="3534" instrument_node=""> (</span><b data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">b+/b–</span></b><span data-dcnode-id="3531" instrument_node="">). These, along with a </span><i data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">lightness/brightness</span></i><span data-dcnode-id="3528" instrument_node=""> (</span><b data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">J/Q</span></b><span data-dcnode-id="3525" instrument_node="">) or </span><i data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">white/black</span></i><span data-dcnode-id="3522" instrument_node=""> (</span><b data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">W/K</span></b><span data-dcnode-id="3519" instrument_node="">) dimension, are the </span><a class="text" data-dcnode-id="3517" href="#modernhuegeometry"><span data-dcnode-id="3518" instrument_node="">modern primaries</span></a><span data-dcnode-id="3516" instrument_node="">, descended by a long and indirect path from ideas first proposed by </span><a class="text" data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23heringtheory"><span data-dcnode-id="3515" instrument_node="">Evald Hering</span></a><span data-dcnode-id="3513" instrument_node="">. They are more commonly known as the </span><a class="text" data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette4d.html"><span data-dcnode-id="3512" instrument_node="">artist's primaries</span></a><span data-dcnode-id="3510" instrument_node="">, and were the primary colors identified in the days before traditional color theory by painters such as </span><a class="text" data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23dyers"><span data-dcnode-id="3509" instrument_node="">Leonardo da Vinci</span></a><span data-dcnode-id="3507" instrument_node="">.</span></p><span data-dcnode-id="3505" instrument_node="">
</span><p data-dcnode-id="3481"><span data-dcnode-id="3504" instrument_node="">In this color definition, the relative quantities of two visual primaries in a color (</span><b data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">q</span></b><sub data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">y</span></sub><span data-dcnode-id="3499" instrument_node=""> and </span><b data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">q</span></b><sub data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">r</span></sub><span data-dcnode-id="3494" instrument_node=""> for the </span><b data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">y,r</span></b><span data-dcnode-id="3491" instrument_node=""> or yellow orange mixture) define, to a good approximation, the proportions of yellow and violet red </span><i data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">paints</span></i><span data-dcnode-id="3488" instrument_node=""> of equal tinting strength that will create that hue as a material mixture. And these proportions are simply applied to the opposing primaries (in the example, </span><i data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">blue green</span></i><span data-dcnode-id="3485" instrument_node=""> and </span><i data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">blue violet</span></i><span data-dcnode-id="3482" instrument_node="">) to mix the complementary hue.</span></p><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3479" instrument_node="">However, with a modern </span><a class="text" data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/cwheel06.html"><span data-dcnode-id="3478" instrument_node="">artist's color wheel</span></a><span data-dcnode-id="3476" instrument_node=""> (the </span><a class="text" data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23CIECAMab"><span data-dcnode-id="3475" instrument_node="">CIECAM a</span><sub data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">C</span></sub><span data-dcnode-id="3472" instrument_node="">b</span><sub data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">C</span></sub><span data-dcnode-id="3469" instrument_node=""> plane</span></a><span data-dcnode-id="3467" instrument_node="">) even that indirection is not necessary. The hue plane is populated with hue and chroma markers for all important modern pigments used in art materials.</span></p><span data-dcnode-id="3465" instrument_node="">
</span><p class="imgC" data-dcnode-id="3462"><a class="text" data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/cwheel06.html"><img border="0" data-dcnode-id="3464" height="279" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/cwheelj.gif&amp;raw" width="370"></a></p><span data-dcnode-id="3461" instrument_node="">
</span><p class="imgC" data-dcnode-id="3460"></p><hr align="center" data-dcnode-id="3459" noshade="" size="1" width="350"><span data-dcnode-id="3458" instrument_node="">
</span><p class="CC" data-dcnode-id="3455"><a class="text" data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/cwheel06.html"><span data-dcnode-id="3457" instrument_node="">click on image for a larger view</span></a></p><a class="text" data-dcnode-id="3453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/cwheel06.html"><span data-dcnode-id="3454" instrument_node="">
</span></a><p class="CC" data-dcnode-id="3448"><a class="text" data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/cwheel06.html"></a><a class="text" data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/cwheel06.pdf"><span data-dcnode-id="3451" instrument_node="">click here</span></a><span data-dcnode-id="3449" instrument_node=""> for a full page, printer friendly (Adobe Acrobat PDF) version</span></p><span data-dcnode-id="3447" instrument_node="">
</span><p align="center" class="smalltext" data-dcnode-id="3443"><span data-dcnode-id="3446" instrument_node="">To print the color wheel, set page orientation</span><br data-dcnode-id="3445"><span data-dcnode-id="3444" instrument_node="">to "landscape" and print at 50% size or to fit an 8.5" x 11" sheet of paper.</span></p><span data-dcnode-id="3442" instrument_node="">
</span><hr align="center" data-dcnode-id="3441" noshade="" size="1" width="350"><span data-dcnode-id="3440" instrument_node="">
</span><p data-dcnode-id="3431"><span data-dcnode-id="3439" instrument_node="">Simply by </span><a class="text" data-dcnode-id="3437" href="#typicalgamut"><span data-dcnode-id="3438" instrument_node="">drawing a line</span></a><span data-dcnode-id="3436" instrument_node=""> from any chosen yellow orange pigment (color) through the "black" center of the color wheel and extending it to the opposite side, the artist locates the closest pigments to the visual complement of the chosen color, and can mix a perfect hue match from any two pigments on opposite sides of the line. Thus, the perfect visual complement of isoindolinone yellow (</span><a class="text" data-dcnode-id="3434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watery.html%23PY110"><span data-dcnode-id="3435" instrument_node="">PY110</span></a><span data-dcnode-id="3433" instrument_node="">) is ... cobalt blue (PB28), phthalo blue RS (PB15:1) or prussian [iron] blue (PB27).</span><a data-dcnode-id="3432" name="ctprin31"></a></p><span data-dcnode-id="3430" instrument_node="">
</span><p data-dcnode-id="3427"><b data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">31. The a+/a– and b+/b– opponent dimensions of modern perceptual color spaces are the most effective framework for analyzing complementary color relationships.</span></b></p><span data-dcnode-id="3426" instrument_node="">
</span><p data-dcnode-id="3421"><span data-dcnode-id="3425" instrument_node="">Consider, as an illustration, how the artist might analyze </span><a class="text" data-dcnode-id="3423" href="#warmcool"><span data-dcnode-id="3424" instrument_node="">warm/cool relationships</span></a><span data-dcnode-id="3422" instrument_node=""> in the color design or color harmony in a painting.</span></p><span data-dcnode-id="3420" instrument_node="">
</span><p data-dcnode-id="3388"><span data-dcnode-id="3419" instrument_node="">The traditional </span><a class="text" data-dcnode-id="3417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette4c.html"><span data-dcnode-id="3418" instrument_node="">primary triad palette</span></a><span data-dcnode-id="3416" instrument_node=""> includes a red (</span><b data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">R</span></b><span data-dcnode-id="3413" instrument_node="">) such as cadmium red (</span><a class="text" data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterr.html%23PR108"><span data-dcnode-id="3412" instrument_node="">PR108</span></a><span data-dcnode-id="3410" instrument_node="">) or alizarin crimson (</span><a class="text" data-dcnode-id="3408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterr.html%23PR83"><span data-dcnode-id="3409" instrument_node="">PR83</span></a><span data-dcnode-id="3407" instrument_node="">) that contains more yellow than a violet red, and a blue (</span><b data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">B</span></b><span data-dcnode-id="3404" instrument_node="">) such as cobalt blue (</span><a class="text" data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterb.html%23PB28"><span data-dcnode-id="3403" instrument_node="">PB28</span></a><span data-dcnode-id="3401" instrument_node="">) or ultramarine blue (</span><a class="text" data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterb.html%23PB29"><span data-dcnode-id="3400" instrument_node="">PB29</span></a><span data-dcnode-id="3398" instrument_node="">) that contains more violet than a green blue. As a result, the primary palette is skewed to one side of the warm/cool dimension between </span><i data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">red orange</span></i><span data-dcnode-id="3395" instrument_node=""> and </span><i data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">green blue;</span></i><span data-dcnode-id="3392" instrument_node=""> yellow (</span><b data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">Y</span></b><span data-dcnode-id="3389" instrument_node="">) is the only color anchor above the line (diagram, below).</span></p><span data-dcnode-id="3387" instrument_node="">
</span><p class="imgC" data-dcnode-id="3385"><img data-dcnode-id="3386" height="196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/324.gif&amp;raw" width="380"></p><span data-dcnode-id="3384" instrument_node="">
</span><p class="CC" data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">traditional and modern analysis of warm/cool contrast</span></p><span data-dcnode-id="3381" instrument_node="">
</span><p class="subCC" data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">(left) traditional RYB triad, plus green; (right) modern primaries</span></p><span data-dcnode-id="3378" instrument_node="">
</span><p data-dcnode-id="3373"><span data-dcnode-id="3377" instrument_node="">Which brings us to green. Traditional color theory does not usually explain the various ways to mix an orange or brown, or a violet or maroon — but it always has quite a lot to say about </span><i data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">green.</span></i><span data-dcnode-id="3374" instrument_node=""> And this is because green is necessary to balance color mixtures around the warm/cool axis.</span></p><span data-dcnode-id="3372" instrument_node="">
</span><p data-dcnode-id="3358"><span data-dcnode-id="3371" instrument_node="">In contrast, the modern primaries (</span><b data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">R</span></b><span data-dcnode-id="3368" instrument_node="">, </span><b data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">Y</span></b><span data-dcnode-id="3365" instrument_node="">, </span><b data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">G</span></b><span data-dcnode-id="3362" instrument_node=""> and </span><b data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">V</span></b><span data-dcnode-id="3359" instrument_node="">) provide this balance naturally, and considerable nuance in varying color so that it is warmer either toward yellow or toward red, and cooler either toward green or toward blue.</span></p><span data-dcnode-id="3357" instrument_node="">
</span><p data-dcnode-id="3351"><span data-dcnode-id="3356" instrument_node="">The traditional color theory prohibition against using premixed greens, or having a green paint on the palette, is difficult to understand if one is concerned with either mixing convenience or color mixture variety. The prohibition against green pigments, or </span><a class="text" data-dcnode-id="3354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterg.html%23convenience"><span data-dcnode-id="3355" instrument_node="">convenience green paints</span></a><span data-dcnode-id="3353" instrument_node=""> made with green pigments, is that they "pop out" of the primary triad as too chromatic or colorful.</span><a data-dcnode-id="3352" name="ctprin32"></a></p><span data-dcnode-id="3350" instrument_node="">
</span><p data-dcnode-id="3347"><b data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">32. Adding a green "primary" in concept, and use of a green paint in practice, is an efficient and accurate framework for color analysis and paint mixing that is sanctioned by a long painting tradition.</span></b></p><span data-dcnode-id="3346" instrument_node="">
</span><p data-dcnode-id="3341"><span data-dcnode-id="3345" instrument_node="">Medieval painters, supposedly encumbered by the false Aristotelian theory of colors, understood this clearly, because they remained much closer to their materials. For example, the common portrait painting method was to lay down the modeling of a face in a dull green paint, such as </span><i data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">terre verte,</span></i><span data-dcnode-id="3342" instrument_node=""> then apply a glaze of transparent carmine. The result, which is striking the first time you try it, is that the color blossoms into a beautifully glowing dull orange or deep yellow tone.</span></p><span data-dcnode-id="3340" instrument_node="">
</span><p data-dcnode-id="3332"><span data-dcnode-id="3339" instrument_node="">This dynamic arises because the eye is adept at compensating for colored illumination (the illuminant) if it exists, or imputing colored illumination to an image if the color balance appears limited or skewed in some way. Because traditional color theory assigns a separate set of "primary" colors (</span><a class="text" data-dcnode-id="3337" href="#additiveprimaries"><span data-dcnode-id="3338" instrument_node="">red, green and blue</span></a><span data-dcnode-id="3336" instrument_node=""> or </span><b data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">RGB</span></b><span data-dcnode-id="3333" instrument_node="">) to the eye and the eye's response to light, radiant color is detached from material color in a completely unnatural way.</span></p><span data-dcnode-id="3331" instrument_node="">
</span><p data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Here for example is a painting of hands made entirely in red and green paints (excepting the yellow and blue accents in the colored bracelet): the pure paint colors (slightly different for the hands and table background) are presented in the dowels inset into the table surface.</span></p><span data-dcnode-id="3328" instrument_node="">
</span><p class="imgC" data-dcnode-id="3326"><img data-dcnode-id="3327" height="270" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/hands.jpg&amp;raw" width="380"></p><span data-dcnode-id="3325" instrument_node="">
</span><p class="CC" data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">a painting made entirely of red and green paints</span></p><span data-dcnode-id="3322" instrument_node="">
</span><p class="subCC" data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">(except for the bracelet); party chick by Bruce MacEvoy © 2006</span></p><span data-dcnode-id="3319" instrument_node="">
</span><p data-dcnode-id="3314"><span data-dcnode-id="3318" instrument_node="">How is it possible to mix a satisfactory painting using only two colors? Simple: the eye supplies the "missing" color! We interpret the painting as representing a pair of pale hands under a "cool" greenish or bluish illuminant (color of light), not as a pair of ghoulish green hands under a "white" illuminant. Finally, the concern with the subtractive primary triad distracts painters from It's really the </span><i data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">eye,</span></i><span data-dcnode-id="3315" instrument_node=""> not the paints, that provides the color in a painting.</span></p><span data-dcnode-id="3313" instrument_node="">
</span><p data-dcnode-id="3305"><span data-dcnode-id="3312" instrument_node="">I </span><a class="text" data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23wcequalsyb"><span data-dcnode-id="3311" instrument_node="">describe elsewhere</span></a><span data-dcnode-id="3309" instrument_node=""> the color transitions produced by natural changes in daylight, weather and time of year, and the color transitions in incandescent artificial light. When defined as </span><a class="text" data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23cct"><span data-dcnode-id="3308" instrument_node="">correlated color temperatures</span></a><span data-dcnode-id="3306" instrument_node="">, these conveniently fit within the modern primary framework where they can be matched to specific paint hues.</span></p><span data-dcnode-id="3304" instrument_node="">
</span><p class="imgC" data-dcnode-id="3302"><img data-dcnode-id="3303" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/cw11.gif&amp;raw" width="300"></p><span data-dcnode-id="3301" instrument_node="">
</span><p class="CC" data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">color analogs to daylight spectra chromaticities</span></p><span data-dcnode-id="3298" instrument_node="">
</span><p class="subCC" data-dcnode-id="3294"><span data-dcnode-id="3297" instrument_node="">the hue of blackbody temperatures illustrated as spectral locations on the </span><a class="index1" data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23huespace"><span data-dcnode-id="3296" instrument_node="">CIECAM a*b* plane</span></a></p><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3275"><span data-dcnode-id="3292" instrument_node="">Because </span><a class="text" data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23chromaadapt"><span data-dcnode-id="3291" instrument_node="">chromatic adaptation</span></a><span data-dcnode-id="3289" instrument_node=""> occurs through changes in the eye's </span><b data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">RGB</span></b><span data-dcnode-id="3286" instrument_node=""> color sensitivity and through rebalancing of the </span><b data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">ab</span></b><span data-dcnode-id="3283" instrument_node=""> opponent dimensions, the modern primaries are a better framework than the traditional </span><b data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">RYB</span></b><span data-dcnode-id="3280" instrument_node=""> or modern </span><b data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">CYM</span></b><span data-dcnode-id="3277" instrument_node=""> subtractive primaries for analyzing the eye's response to landscape and light.</span><a data-dcnode-id="3276" name="ctprin33"></a></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3270"><b data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">33. Because the adaption of the eye to natural light is organized around the a+/a– and b+/b– dimensions, the modern primaries provide a comprehensive framework to analyze the relations between illumination, visible color and paint mixture.</span></b><span data-dcnode-id="3271" instrument_node="">
</span></p><p align="center" data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">•</span></p><span data-dcnode-id="3267" instrument_node="">
</span><p data-dcnode-id="3258"><span data-dcnode-id="3266" instrument_node="">We have identified the two fundamental problems with 18th century color theory: a </span><b data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">failure to embrace materials</span></b><span data-dcnode-id="3263" instrument_node=""> as the focus of artistic understanding, and a </span><b data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">misunderstanding of color perception</span></b><span data-dcnode-id="3260" instrument_node=""> that begins with the idea of "color in the light" and extends to the geometry of color relationships. These are not complications or obstacles to a modern color theory: they demonstrate that color theory has for centuries been talking about color in the abstract, as conceptual colors and ideal color mixtures. But color is not only a specific sensation, it is also always in part a specific stimulus — a specific material, or a specific mixture of lights.</span><a data-dcnode-id="3259" name="addsub"></a></p><span data-dcnode-id="3257" instrument_node="">
</span><p class="floatArrow" data-dcnode-id="3254"><a data-dcnode-id="3255" href="#top"><img border="0" data-dcnode-id="3256" height="14" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/nabup.gif&amp;raw" width="10"></a></p><h3 data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">additive &amp; subtractive color mixing</span></h3><span data-dcnode-id="3251" instrument_node="">
</span><p data-dcnode-id="3248"><img align="left" data-dcnode-id="3250" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="60"><span data-dcnode-id="3249" instrument_node="">The previous section has confronted the most important color misconceptions foisted on painters by traditional color theory. Now we start the process of building a modern color theory, beginning with color mixture.</span></p><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3242"><span data-dcnode-id="3246" instrument_node="">Painters mix their paints to shape the light reflected from a painting, and the viewer's eye interprets this reflected light as color under light in space. These two extremes of color experience — the mixed paints, and the interpreting eye — are described by two separate and unequal color mixing theories, explained in full in the page </span><a class="text" data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color5.html"><span data-dcnode-id="3245" instrument_node="">additive &amp; subtractive color mixing</span></a><span data-dcnode-id="3243" instrument_node="">.</span></p><span data-dcnode-id="3241" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">There are two surprises when we learn about color mixture. The first is that subtractive color mixture is nothing more than additive color mixture, in an expanded form that tries to compensate for the light absorbing effects of material mixtures.</span></p><span data-dcnode-id="3238" instrument_node="">
</span><p data-dcnode-id="3235"><span data-dcnode-id="3237" instrument_node="">The second is that additive color mixture is a rigorous explanation of color vision, a true scientific theory; but subtractive color mixture is only an idealized and unreliable approximation of the actual complexity and diversity of material color mixture.</span><a data-dcnode-id="3236" name="additivemixture"></a></p><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3224"><span class="rubric" data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Additive Color Mixing</span></span><span data-dcnode-id="3231" instrument_node="">. </span><b data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Additive color mixing</span></b><span data-dcnode-id="3228" instrument_node=""> explains </span><i data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">how the eye interprets light wavelengths</span></i><span data-dcnode-id="3225" instrument_node=""> in the perception of color.</span></p><span data-dcnode-id="3223" instrument_node="">
</span><p data-dcnode-id="3215"><span data-dcnode-id="3222" instrument_node="">Additive mixture is always based on </span><i data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">four</span></i><span data-dcnode-id="3219" instrument_node=""> primary colors, called the </span><a class="text" data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23whitepoint"><span data-dcnode-id="3218" instrument_node="">four cardinal lights</span></a><span data-dcnode-id="3216" instrument_node="">. These are most commonly red orange, middle green, blue violet, and the white light defined by mixing all three colored lights together. The white light defines the relative brightness or tinting strength of the three chromatic lights, so that they can be used to define color mixtures precisely.</span></p><span data-dcnode-id="3214" instrument_node="">
</span><p data-dcnode-id="3200"><span data-dcnode-id="3213" instrument_node="">This </span><a class="text" data-dcnode-id="3211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23helmholtz"><span data-dcnode-id="3212" instrument_node="">trichromatic foundation</span></a><span data-dcnode-id="3210" instrument_node=""> is in turn the basis for all modern </span><a class="text" data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color1.html%23chromaticity"><span data-dcnode-id="3209" instrument_node="">chromaticity diagrams</span></a><span data-dcnode-id="3207" instrument_node="">, the identification of </span><a class="text" data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23compprobs"><span data-dcnode-id="3206" instrument_node="">visual complementary colors</span></a><span data-dcnode-id="3204" instrument_node="">, and the definition of modern trichromatic </span><a class="text" data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23CIECAM"><span data-dcnode-id="3203" instrument_node="">color models</span></a><span data-dcnode-id="3201" instrument_node="">.</span></p><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3192"><b data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">Additive Mixtures Occur In The Eye</span></b><span data-dcnode-id="3196" instrument_node="">. The beauty of additive color mixing principles lies in their narrow scope. They focus on a single sensory process — the average or typical responses of the </span><a class="text" data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color1.html%23receptors"><span data-dcnode-id="3195" instrument_node="">L, M and S photoreceptors</span></a><span data-dcnode-id="3193" instrument_node=""> to light — for the explanation of color mixtures.</span></p><span data-dcnode-id="3191" instrument_node="">
</span><p data-dcnode-id="3176"><span data-dcnode-id="3190" instrument_node="">But wait ... isn't additive color mixture really a theory of how </span><i data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">light</span></i><span data-dcnode-id="3187" instrument_node=""> mixtures behave? No, it is not. This misconception arises because light is obviously the only stimulus that the eye responds to, and because lights of various colors are explicitly manipulated in </span><a class="text" data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23colormatching"><span data-dcnode-id="3186" instrument_node="">color matching experiments</span></a><span data-dcnode-id="3184" instrument_node=""> used to measure additive color mixtures. But light is the stimulus, and </span><b data-dcnode-id="3179"><span data-dcnode-id="3183" instrument_node="">additive color mixing describes the </span><i data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">response</span></i><span data-dcnode-id="3180" instrument_node=""> of the eye to a light stimulus</span></b><span data-dcnode-id="3178" instrument_node="">.</span><a data-dcnode-id="3177" name="additiveprimaries"></a></p><span data-dcnode-id="3175" instrument_node="">
</span><p data-dcnode-id="3153"><b data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">The RGB Additive "Primary" Lights</span></b><span data-dcnode-id="3172" instrument_node="">. How do we illustrate, verify or measure the rules of additive color mixing? Obviously, by manipulating the outputs of the separate </span><b data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">L</span></b><span data-dcnode-id="3169" instrument_node="">, </span><b data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">M</span></b><span data-dcnode-id="3166" instrument_node=""> and </span><b data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">S</span></b><span data-dcnode-id="3163" instrument_node=""> cones. How do we manipulate these outputs? By stimulating them with </span><b data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">three colored lights — red, green, and blue violet</span></b><span data-dcnode-id="3160" instrument_node=""> (abbreviated </span><b data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">RGB</span></b><span data-dcnode-id="3157" instrument_node="">). Necessarily, these lights create a fourth "primary": the </span><a class="text" data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23whitepoint"><span data-dcnode-id="3156" instrument_node="">"white" light mixture</span></a><span data-dcnode-id="3154" instrument_node=""> of them all.</span></p><span data-dcnode-id="3152" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">The image below displays the "primary" RGB colors of your computer monitor. Note that the green primary contains too much yellow, and the blue primary not enough violet, which dulls the purple and blue green mixtures, and sharply reduces the number of visually different green mixtures possible on a computer monitor.</span></p><span data-dcnode-id="3149" instrument_node="">
</span><p class="imgC" data-dcnode-id="3147"><img data-dcnode-id="3148" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/rgb.gif&amp;raw" width="380"></p><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3143"><span data-dcnode-id="3145" instrument_node="">The illustration (below) shows the typical demonstration of additive light mixtures, made by shining three overlapping circles of filtered light onto an achromatic (gray or white) surface. If the surface is illuminated by both the red and green lights, but not by the blue light, then the eye responds with the color sensation of yellow. A magenta color results from the mixture of red and blue violet light, and cyan from the mixture of blue violet and green. In additive color mixing, yellow and blue don't make green — they make white!</span><a data-dcnode-id="3144" name="adddemo"></a></p><span data-dcnode-id="3142" instrument_node="">
</span><p class="imgC" data-dcnode-id="3140"><img data-dcnode-id="3141" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/addmix.gif&amp;raw" width="150"></p><span data-dcnode-id="3139" instrument_node="">
</span><p class="CC" data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">additive color mixtures</span></p><span data-dcnode-id="3136" instrument_node="">
</span><p class="subCC" data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">as demonstrated with filtered lights; note that each pair of RGB primaries mixes one of the subtractive (CYM) primaries</span></p><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3125"><span data-dcnode-id="3132" instrument_node="">It's handy to think of additive mixing as </span><b data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">the "white" color theory</span></b><span data-dcnode-id="3129" instrument_node="">. Mixing light wavelengths from the "red," "green" and "blue violet" parts of the spectrum </span><b data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">adds luminosity and negates hue</span></b><span data-dcnode-id="3126" instrument_node=""> to shift the mixture color of lights from dim pure hues toward bright whites.</span></p><span data-dcnode-id="3124" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3123" instrument_node="">The key principle is that the eye always </span><i data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">adds together</span></i><span data-dcnode-id="3120" instrument_node=""> all the wavelengths of light incident on the retina — nothing is lost — and it is this total light sensation that the eye interprets as color.</span><a data-dcnode-id="3119" name="addmetamerism"></a></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3109"><span data-dcnode-id="3116" instrument_node="">The foundation of additive color mixing is called </span><a class="text" data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23metamerism"><span data-dcnode-id="3115" instrument_node="">trichromatic metamerism</span></a><span data-dcnode-id="3113" instrument_node="">: the color produced by any combination of light wavelengths, no matter how complex it may be, can be exactly matched by the visual mixture of no more than three lights. The match can be created with three strongly saturated (single wavelength or monochromatic) lights, or at most two monochromatic lights mixed with a "white" light. </span><b data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">All physically possible light colors can be reduced to a specific mixture of at most three lights</span></b><span data-dcnode-id="3110" instrument_node="">.</span></p><span data-dcnode-id="3108" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3107" instrument_node="">This additive behavior leads to an important constant in color vision: </span><b data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">the chromaticity and brightness of lights predicts the chromaticity and brightness of their mixture</span></b><span data-dcnode-id="3104" instrument_node=""> for moderately dim to bright lights. This is true regardless of whether the lights are monochromatic (a very pure hue, as we see in a single wavelength of light) or complex (such as daylight).</span></p><span data-dcnode-id="3102" instrument_node="">
