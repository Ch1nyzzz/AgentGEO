</span><table class="main" data-dcnode-id="4"><tbody data-dcnode-id="5"><tr data-dcnode-id="7153"><td data-dcnode-id="7167"><img data-dcnode-id="7168" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="30"></td><td data-dcnode-id="7164"><img data-dcnode-id="7165" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="80"></td><td data-dcnode-id="7161"><img data-dcnode-id="7162" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="460"></td><td data-dcnode-id="7158"><img data-dcnode-id="7159" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="200"></td><td data-dcnode-id="7155"><img data-dcnode-id="7156" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="30"></td></tr><tr data-dcnode-id="7149"><td colspan="5" data-dcnode-id="7150" height="40"><span data-dcnode-id="7151" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="6863"><td colspan="2" data-dcnode-id="7146"></td><td class="main" data-dcnode-id="6908"><span data-dcnode-id="7144" instrument_node="">
</span><h2 data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">modern color theory (concepts)</span></h2><span data-dcnode-id="7141" instrument_node="">
</span><p data-dcnode-id="7138"><img align="left" data-dcnode-id="7140" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="160"><span data-dcnode-id="7139" instrument_node="">This page introduces the conceptual basis of artists' "color theory" — the traditional body of lore applied by painters and photographers to the design and creation of images. The addition of "modern" indicates that I compare the traditional (and still popular) tenets of color theory to the answers provided by modern color science.</span></p><span data-dcnode-id="7137" instrument_node="">
</span><p data-dcnode-id="7132"><span data-dcnode-id="7136" instrument_node="">The companion page on </span><a class="text" data-dcnode-id="7134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color18b.html"><span data-dcnode-id="7135" instrument_node="">modern color theory (applications)</span></a><span data-dcnode-id="7133" instrument_node=""> provides practical insights into pigment attributes, paint formulation, the behavior of color mixtures, palette design and the principles of color contrast — the practical knowledge necessary to put color theory concepts to work.</span></p><span data-dcnode-id="7131" instrument_node="">
</span><p data-dcnode-id="7123"><span data-dcnode-id="7130" instrument_node="">This page is a condensed summary of the content included in my pages on </span><a class="text" data-dcnode-id="7128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/LS/CVS/color.html"><span data-dcnode-id="7129" instrument_node="">color science</span></a><span data-dcnode-id="7127" instrument_node=""> and artistic </span><a class="text" data-dcnode-id="7125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/wcolor.html"><span data-dcnode-id="7126" instrument_node="">color theory</span></a><span data-dcnode-id="7124" instrument_node="">.</span></p><span data-dcnode-id="7122" instrument_node="">
</span><p data-dcnode-id="7115"><span data-dcnode-id="7121" instrument_node="">Before we start: </span><b data-dcnode-id="7117"><span data-dcnode-id="7120" instrument_node="">what is color theory </span><i data-dcnode-id="7118"><span data-dcnode-id="7119" instrument_node="">for?</span></i></b><span data-dcnode-id="7116" instrument_node=""> Historically, its teaching literature has claimed to provide artists with four broad of knowledge:</span></p><span data-dcnode-id="7114" instrument_node="">
</span><p data-dcnode-id="7109"><span data-dcnode-id="7113" instrument_node="">•&nbsp;Insight into </span><b data-dcnode-id="7111"><span data-dcnode-id="7112" instrument_node="">subtractive color mixing</span></b><span data-dcnode-id="7110" instrument_node=""> with paints, inks or dyes.</span></p><span data-dcnode-id="7108" instrument_node="">
</span><p data-dcnode-id="7103"><span data-dcnode-id="7107" instrument_node="">•&nbsp;Prediction of the </span><b data-dcnode-id="7105"><span data-dcnode-id="7106" instrument_node="">color context effects</span></b><span data-dcnode-id="7104" instrument_node=""> produced in colors that are viewed in contrasting surrounds or visual patterns.</span></p><span data-dcnode-id="7102" instrument_node="">
</span><p data-dcnode-id="7097"><span data-dcnode-id="7101" instrument_node="">•&nbsp;Guidance in the selection of </span><b data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">color schemes</span></b><span data-dcnode-id="7098" instrument_node=""> or color design used in paintings, furnishings and architectural interiors.</span></p><span data-dcnode-id="7096" instrument_node="">
</span><p data-dcnode-id="7091"><span data-dcnode-id="7095" instrument_node="">•&nbsp;Identification of the relationship between individual colors and ideas or emotions — usually called </span><b data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">color symbolism</span></b><span data-dcnode-id="7092" instrument_node="">.</span></p><span data-dcnode-id="7090" instrument_node="">
</span><p data-dcnode-id="7085"><span data-dcnode-id="7089" instrument_node="">An exploration of the issues important to color design is provided on the page </span><a class="text" data-dcnode-id="7087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color17.html"><span data-dcnode-id="7088" instrument_node="">color harmony &amp; contrast</span></a><span data-dcnode-id="7086" instrument_node="">.</span></p><span data-dcnode-id="7084" instrument_node="">
</span><p data-dcnode-id="7076"><span data-dcnode-id="7083" instrument_node="">Traditional color theory has implicitly been about </span><a class="text" data-dcnode-id="7081" href="#fourcolors"><span data-dcnode-id="7082" instrument_node="">conceptual color</span></a><span data-dcnode-id="7080" instrument_node="">, my term for color treated in the abstract rather than as physical paints or </span><a class="text" data-dcnode-id="7078" href="#geometry"><span data-dcnode-id="7079" instrument_node="">visual color relationships</span></a><span data-dcnode-id="7077" instrument_node="">. Conceptual color is divorced from materials or colorants, independent of viewing context, and mixes according to idealized rules. In both this page and the next, I emphasize the differences between conceptual and material color, as each influences the visual color we experience through our eyes.</span></p><a data-dcnode-id="7075" name="colorterms"></a><span data-dcnode-id="7074" instrument_node="">
</span><p class="floatArrow" data-dcnode-id="7071"><a data-dcnode-id="7072" href="#top"><img border="0" data-dcnode-id="7073" height="14" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/nabup.gif&amp;raw" width="10"></a></p><h3 data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">talking about color</span></h3><span data-dcnode-id="7068" instrument_node="">
</span><p data-dcnode-id="7064"><img align="left" data-dcnode-id="7067" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="60"><i data-dcnode-id="7065"><span data-dcnode-id="7066" instrument_node="">"When I use a word," Humpty Dumpty said, in a rather scornful tone, "it means just what I choose it to mean — neither more nor less."</span></i></p><span data-dcnode-id="7063" instrument_node="">
</span><p align="right" data-dcnode-id="7059"><span data-dcnode-id="7062" instrument_node="">— Lewis Carroll, </span><i data-dcnode-id="7060"><span data-dcnode-id="7061" instrument_node="">Through the Looking Glass</span></i></p><span data-dcnode-id="7058" instrument_node="">
</span><p data-dcnode-id="7050"><span data-dcnode-id="7057" instrument_node="">When you consider that painters are in the business of manipulating color, it is surprising that very few artists can describe color clearly. In fact, a muddled color lexicon is one of the hallmarks of "color theory" past — and of color theory even today. </span><a class="text" data-dcnode-id="7055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23edwards"><span data-dcnode-id="7056" instrument_node="">Betty Edwards</span></a><span data-dcnode-id="7054" instrument_node="">, in her recent </span><i data-dcnode-id="7052"><span data-dcnode-id="7053" instrument_node="">Color: A Course In Mastering the Art of Mixing Colors</span></i><span data-dcnode-id="7051" instrument_node=""> (2006), is an enthusiastic contributor to this carefree performance tradition.</span></p><span data-dcnode-id="7049" instrument_node="">
</span><p data-dcnode-id="7046"><span data-dcnode-id="7048" instrument_node="">Why do artists need to talk about color accurately and clearly? Simply because how we talk about color affects how we understand color, and how we understand color affects how we identify, manipulate and use colors in painting.</span><a data-dcnode-id="7047" name="fourcolors"></a></p><span data-dcnode-id="7045" instrument_node="">
</span><p data-dcnode-id="7040"><span class="rubric" data-dcnode-id="7043"><span data-dcnode-id="7044" instrument_node="">Four Kinds of Color</span></span><span data-dcnode-id="7042" instrument_node="">. One of the difficulties in talking about color is that color seems to exist in several different forms. Indeed, Paul Green-Armytage, in one of the many web pages now lost to oblivion, claimed to identify seven types of color. For the artist, however, it is helpful to discriminate between four types of color.</span><a data-dcnode-id="7041" name="ctprin01"></a></p><span data-dcnode-id="7039" instrument_node="">
</span><p data-dcnode-id="7036"><b data-dcnode-id="7037"><span data-dcnode-id="7038" instrument_node="">1. There are four fundamental categories of color: material color, radiant color, visual color, and conceptual color.</span></b></p><span data-dcnode-id="7035" instrument_node="">
</span><p data-dcnode-id="7030"><span data-dcnode-id="7034" instrument_node="">•&nbsp;</span><b data-dcnode-id="7032"><span data-dcnode-id="7033" instrument_node="">material color</span></b><span data-dcnode-id="7031" instrument_node=""> is the physical pigment, dye, filter, pigmented or dyed material, or light source that originates the experience of color. Artists very often speak of "mixing different colors" or of "choosing colors for a painting", and what they are talking about is material color (pigments).</span></p><span data-dcnode-id="7029" instrument_node="">
</span><p data-dcnode-id="7013"><span data-dcnode-id="7028" instrument_node="">Material color is the sense in which we equate color with the physical world, and speak of a pigment as </span><i data-dcnode-id="7026"><span data-dcnode-id="7027" instrument_node="">cadmium orange</span></i><span data-dcnode-id="7025" instrument_node=""> or </span><i data-dcnode-id="7023"><span data-dcnode-id="7024" instrument_node="">phthalo green,</span></i><span data-dcnode-id="7022" instrument_node=""> or a dye as </span><i data-dcnode-id="7020"><span data-dcnode-id="7021" instrument_node="">yellow number two,</span></i><span data-dcnode-id="7019" instrument_node=""> or talk about a </span><i data-dcnode-id="7017"><span data-dcnode-id="7018" instrument_node="">white shirt</span></i><span data-dcnode-id="7016" instrument_node=""> or a </span><i data-dcnode-id="7014"><span data-dcnode-id="7015" instrument_node="">red sky.</span></i></p><span data-dcnode-id="7012" instrument_node="">
</span><p data-dcnode-id="7004"><span data-dcnode-id="7011" instrument_node="">•&nbsp;</span><b data-dcnode-id="7009"><span data-dcnode-id="7010" instrument_node="">radiant color</span></b><span data-dcnode-id="7008" instrument_node=""> is the mixture of light wavelengths emitted by a light source, or transmitted by a filter or other semitransparent medium, or reflected from an opaque material such as paint, ink, dye, or photographic emulsion. This defines color very narrowly, as a </span><i data-dcnode-id="7006"><span data-dcnode-id="7007" instrument_node="">physical stimulus</span></i><span data-dcnode-id="7005" instrument_node=""> independent of any other lights or surfaces around it.</span></p><span data-dcnode-id="7003" instrument_node="">
</span><p data-dcnode-id="6995"><span data-dcnode-id="7002" instrument_node="">Radiant color is exactly specified as a </span><a class="text" data-dcnode-id="7000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23reflectance"><span data-dcnode-id="7001" instrument_node="">spectrophotometric curve</span></a><span data-dcnode-id="6999" instrument_node="">, which can be measured in lights, filters, surfaces and colored substances such as pigments, inks or dyes. When measuring radiant color, the principal assumption is that the surface attributes of the material color (including color unevenness, texture, </span><i data-dcnode-id="6997"><span data-dcnode-id="6998" instrument_node="">gloss</span></i><span data-dcnode-id="6996" instrument_node=""> or mirrorlike reflectivity, iridescence, and translucency) do not significantly affect the spectrophotometric measurement.</span></p><span data-dcnode-id="6994" instrument_node="">
</span><p data-dcnode-id="6992"><span data-dcnode-id="6993" instrument_node="">Radiant color is not equivalent to the material color of a pigment, dye or filter: we never experience material color directly, but only through the radiant color it creates. In addition, a pigment's radiant color changes as it is diluted, mixed with different vehicles, applied to different surfaces, or viewed from different angles or under different types of light. The same "color" (material color) can produce an enormous range of different "colors" (radiant colors). </span></p><span data-dcnode-id="6991" instrument_node="">
</span><p data-dcnode-id="6986"><span data-dcnode-id="6990" instrument_node="">•&nbsp;</span><b data-dcnode-id="6988"><span data-dcnode-id="6989" instrument_node="">visual color</span></b><span data-dcnode-id="6987" instrument_node=""> is the perception of radiant color in a specific viewing context — usually as a physical surface in a specific place under a specific intensity and color of illumination. </span></p><span data-dcnode-id="6985" instrument_node="">
</span><p data-dcnode-id="6983"><span data-dcnode-id="6984" instrument_node="">Visual color literally does not exist outside individual consciousness. There is an enormous body of evidence to show that color experience is remarkably personal: it varies significantly across individuals, for a variety of reasons (genetics, age, experience). In addition, the same radiant color can appear as very different visual colors, depending on the intensity of the light and the context in which it is viewed. As a practical matter, then, the connection between a material color and visual color can be highly variable across individuals and viewing contexts.</span></p><span data-dcnode-id="6982" instrument_node="">
</span><p data-dcnode-id="6974"><span data-dcnode-id="6981" instrument_node="">Although visual color is personal, it does not have to be private. We can fairly reliably communicate visual color to other people through a variety of </span><i data-dcnode-id="6979"><span data-dcnode-id="6980" instrument_node="">color specification strategies.</span></i><span data-dcnode-id="6978" instrument_node=""> For these to be effective, five conditions must be met when a radiant color is visually examined: (1) distractions caused by the surface qualities of the material color (such as color irregularities, surface reflections or iridescence) are eliminated or minimized; (2) the material color is illuminated to approximately daylight brightness; (3) the illumination is both "daylight white" and broadband (i.e., the light includes all visible wavelengths at roughly equal energy); (4) the material or radiant color is surrounded by a medium gray background; and (5) the viewer's eye is accustomed or </span><i data-dcnode-id="6976"><span data-dcnode-id="6977" instrument_node="">adapted</span></i><span data-dcnode-id="6975" instrument_node=""> to the background color and intensity of the illumination.</span></p><span data-dcnode-id="6973" instrument_node="">
</span><p data-dcnode-id="6962"><span data-dcnode-id="6972" instrument_node="">When these conditions are met, visual colors can be specified by mathematically translating the radiant color (the </span><a class="text" data-dcnode-id="6970" href="#reflectancecurve"><span data-dcnode-id="6971" instrument_node="">reflectance curve</span></a><span data-dcnode-id="6969" instrument_node="">) into a color appearance specification on the three </span><i data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">colormaking attributes</span></i><span data-dcnode-id="6966" instrument_node=""> (discussed below); or by finding the best visual match between the visual color and a material color sample published as a standard </span><i data-dcnode-id="6964"><span data-dcnode-id="6965" instrument_node="">color atlas</span></i><span data-dcnode-id="6963" instrument_node="">; or by matching the material color to a colorant mixture defined as a color "address" in a color reproduction system (such as the code "#336699" in the digital RGB color space or the formula "30-50-15-5" in the Pantone CYMK system). Note that these are not "different kinds" of color, but rather different ways to specify the material or radiant stimulus for the visual color. </span></p><span data-dcnode-id="6961" instrument_node="">
</span><p data-dcnode-id="6956"><span data-dcnode-id="6960" instrument_node="">•&nbsp;</span><b data-dcnode-id="6958"><span data-dcnode-id="6959" instrument_node="">conceptual color</span></b><span data-dcnode-id="6957" instrument_node=""> is color as an abstract concept, a sensory memory, a color label that calls to mind a visual or material color that is not present as a physical exemplar or as a visual perception. It is color defined primarily through language, memory, custom and habit.</span></p><span data-dcnode-id="6955" instrument_node="">
</span><p data-dcnode-id="6929"><span data-dcnode-id="6954" instrument_node="">Conceptual colors can be communicated as single color words (</span><i data-dcnode-id="6952"><span data-dcnode-id="6953" instrument_node="">auburn, chartreuse</span></i><span data-dcnode-id="6951" instrument_node="">), compound color descriptions (</span><i data-dcnode-id="6949"><span data-dcnode-id="6950" instrument_node="">brilliant dark blue</span></i><span data-dcnode-id="6948" instrument_node="">), the average color of a variable environmental stimulus (</span><i data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">sky blue, sea green, cherry red</span></i><span data-dcnode-id="6945" instrument_node="">), a color in color theory (</span><i data-dcnode-id="6943"><span data-dcnode-id="6944" instrument_node="">primary blue; "yellow</span></i><span data-dcnode-id="6942" instrument_node=""> and </span><i data-dcnode-id="6940"><span data-dcnode-id="6941" instrument_node="">blue</span></i><span data-dcnode-id="6939" instrument_node=""> make </span><i data-dcnode-id="6937"><span data-dcnode-id="6938" instrument_node="">green</span></i><span data-dcnode-id="6936" instrument_node="">"), an imaginary color ("no paint can be a </span><i data-dcnode-id="6934"><span data-dcnode-id="6935" instrument_node="">pure red</span></i><span data-dcnode-id="6933" instrument_node="">") a metaphorical color ("a </span><i data-dcnode-id="6931"><span data-dcnode-id="6932" instrument_node="">golden</span></i><span data-dcnode-id="6930" instrument_node=""> sunset"), and much more.</span></p><span data-dcnode-id="6928" instrument_node="">
</span><p data-dcnode-id="6914"><span data-dcnode-id="6927" instrument_node="">Compared to material, radiant and visual colors, conceptual colors are simplifications in three respects: (1) they are </span><i data-dcnode-id="6925"><span data-dcnode-id="6926" instrument_node="">categorical colors</span></i><span data-dcnode-id="6924" instrument_node=""> that apply equally to many different kinds of material or visual color (</span><i data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">blue</span></i><span data-dcnode-id="6921" instrument_node=""> can refer to eyes, skies, berries, plastics, flowers, textiles, ceramics, paints, stained glass, photographic emulsions, television screens and lakes); (2) they can refer to colors that are unknown to the person to whom the color is being described ("</span><i data-dcnode-id="6919"><span data-dcnode-id="6920" instrument_node="">yellow</span></i><span data-dcnode-id="6918" instrument_node=""> is the color of my true love's hair"); (3) they disregard variation produced by individual differences in color sensitivity and viewing conditions (a lawn viewed at twilight is still called </span><i data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">green</span></i><span data-dcnode-id="6915" instrument_node="">); and (4) they assume that color descriptions mean approximately the same thing to all people. These simplifications make conceptual colors very useful in the social framework of talking about color, but unreliable as the basis to specify color for any specific purpose.</span></p><span data-dcnode-id="6913" instrument_node="">
</span><p data-dcnode-id="6909"><span data-dcnode-id="6912" instrument_node="">It is extremely helpful to keep in mind the differences between material, radiant, visual and conceptual colors when thinking about color across the many topics in color theory.</span><br data-dcnode-id="6911"><a data-dcnode-id="6910" name="colormakingattributes"></a></p></td><td class="main" colspan="2" data-dcnode-id="6865"><span data-dcnode-id="6906" instrument_node="">
</span><span data-dcnode-id="6905" instrument_node="">
</span><span data-dcnode-id="6900" instrument_node="">
</span><span data-dcnode-id="6873" instrument_node="">
</span><table class="index" data-dcnode-id="6866"><tbody data-dcnode-id="6867"><tr data-dcnode-id="6901"><td data-dcnode-id="6902" height="80" valign="top"><h1 data-dcnode-id="6903"><span data-dcnode-id="6904" instrument_node="">color theory</span></h1></td></tr><tr data-dcnode-id="6874"><td align="right" data-dcnode-id="6875" height="450" valign="top"><span data-dcnode-id="6899" instrument_node="">
</span><p data-dcnode-id="6896"><a class="index1" data-dcnode-id="6897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color18b.html"><span data-dcnode-id="6898" instrument_node="">modern color theory (applications)</span></a></p><span data-dcnode-id="6895" instrument_node="">
</span><p data-dcnode-id="6892"><a class="index1" data-dcnode-id="6893" href="#colorterms"><span data-dcnode-id="6894" instrument_node="">talking about color</span></a></p><span data-dcnode-id="6891" instrument_node="">
</span><p data-dcnode-id="6888"><a class="index1" data-dcnode-id="6889" href="#heritage"><span data-dcnode-id="6890" instrument_node="">misconceptions in traditional color theory</span></a></p><span data-dcnode-id="6887" instrument_node="">
</span><p data-dcnode-id="6884"><a class="index1" data-dcnode-id="6885" href="#addsub"><span data-dcnode-id="6886" instrument_node="">additive &amp; subtractive color mixing</span></a></p><span data-dcnode-id="6883" instrument_node="">
</span><p data-dcnode-id="6880"><a class="index1" data-dcnode-id="6881" href="#geometry"><span data-dcnode-id="6882" instrument_node="">visual color relationships</span></a></p><span data-dcnode-id="6879" instrument_node="">
</span><p data-dcnode-id="6876"><a class="index1" data-dcnode-id="6877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/princsum.html"><span data-dcnode-id="6878" instrument_node="">summary of modern color theory</span></a></p></td></tr><tr data-dcnode-id="6868"><td data-dcnode-id="6869" height="50" valign="top"><p class="imgS" data-dcnode-id="6870"><a class="text" data-dcnode-id="6871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/wcolor.html"><img border="0" data-dcnode-id="6872" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/whorlwht.gif&amp;raw" width="48"></a></p></td></tr></tbody></table></td></tr><tr data-dcnode-id="6655"><td colspan="2" data-dcnode-id="6860"></td><td align="left" data-dcnode-id="6659" valign="top"><p data-dcnode-id="6852"><span class="rubric" data-dcnode-id="6857"><span data-dcnode-id="6858" instrument_node="">The Colormaking Attributes</span></span><span data-dcnode-id="6856" instrument_node="">. A standard, unambiguous language for visual color description is an innovation of 19th century color scientists. And the foundation of this color language is the idea of a "color container" or </span><i data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node="">color space.</span></i><a data-dcnode-id="6853" name="ctprin02"></a></p><span data-dcnode-id="6851" instrument_node="">
</span><p data-dcnode-id="6839"><b data-dcnode-id="6840"><span data-dcnode-id="6850" instrument_node="">2. Vision scientists have identified three </span><a class="text" data-dcnode-id="6848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23colormaking"><span data-dcnode-id="6849" instrument_node="">colormaking attributes</span></a><span data-dcnode-id="6847" instrument_node=""> — </span><i data-dcnode-id="6845"><span data-dcnode-id="6846" instrument_node="">lightness, hue</span></i><span data-dcnode-id="6844" instrument_node=""> and </span><i data-dcnode-id="6842"><span data-dcnode-id="6843" instrument_node="">hue purity</span></i><span data-dcnode-id="6841" instrument_node=""> — that are sufficient to precisely specify any visual color.</span></b></p><span data-dcnode-id="6838" instrument_node="">
</span><p data-dcnode-id="6830"><span data-dcnode-id="6837" instrument_node="">(</span><i data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">Brightness</span></i><span data-dcnode-id="6834" instrument_node=""> replaces lightness when we want to describe lights or the light falling on or reflected from surfaces, and </span><i data-dcnode-id="6832"><span data-dcnode-id="6833" instrument_node="">colorfulness</span></i><span data-dcnode-id="6831" instrument_node=""> replaces chroma when we want to describe lights or surfaces in comparison to an ideal or imaginary, "pure" hue.)</span></p><span data-dcnode-id="6829" instrument_node="">
</span><p data-dcnode-id="6826"><span data-dcnode-id="6828" instrument_node="">Let's consider each colormaking attribute separately, to understand how the attributes arise in radiant colors, and how we should describe (as conceptual colors) the color perceptions (the visual colors) they produce.</span><a data-dcnode-id="6827" name="colormakinglightness"></a></p><span data-dcnode-id="6825" instrument_node="">
</span><p data-dcnode-id="6814"><b data-dcnode-id="6823"><span data-dcnode-id="6824" instrument_node="">Brightness/Lightness</span></b><span data-dcnode-id="6822" instrument_node="">. The </span><a class="text" data-dcnode-id="6820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color11.html%23dominance"><span data-dcnode-id="6821" instrument_node="">visually most important</span></a><span data-dcnode-id="6819" instrument_node=""> colormaking attribute is the </span><b data-dcnode-id="6817"><span data-dcnode-id="6818" instrument_node="">light or dark of a color</span></b><span data-dcnode-id="6816" instrument_node=""> as it appears in emitted or reflected light. This is perceived in two distinct ways:</span><a data-dcnode-id="6815" name="ctprin03"></a></p><span data-dcnode-id="6813" instrument_node="">
</span><p data-dcnode-id="6810"><b data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">3. Brightness is the sensation of light emitted or reflected from an object that is greater than the light reflected from a matte "white" surface under the same illumination.</span></b></p><span data-dcnode-id="6809" instrument_node="">
</span><p data-dcnode-id="6803"><span data-dcnode-id="6808" instrument_node="">Brightness is only weakly correlated with the actual </span><a class="text" data-dcnode-id="6806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23luminance"><span data-dcnode-id="6807" instrument_node="">luminance</span></a><span data-dcnode-id="6805" instrument_node=""> of an object. For example, car headlights appear painfully bright at night, but in noon daylight they may be barely visible. The luminance is the same, but the apparent brightness varies with context.</span><a data-dcnode-id="6804" name="ctprin04"></a></p><span data-dcnode-id="6802" instrument_node="">
</span><p data-dcnode-id="6799"><b data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">4. Lightness is the sensation of light emitted or reflected from a surface as a proportion of the light emitted or reflected from the brightest surface (or a matte "white" surface) under the same illumination.</span></b></p><span data-dcnode-id="6798" instrument_node="">
</span><p data-dcnode-id="6787"><span data-dcnode-id="6797" instrument_node="">Lightness is strongly correlated with the overall </span><a class="text" data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23reflectance"><span data-dcnode-id="6796" instrument_node="">reflectance</span></a><span data-dcnode-id="6794" instrument_node=""> (</span><i data-dcnode-id="6792"><span data-dcnode-id="6793" instrument_node="">luminance factor</span></i><span data-dcnode-id="6791" instrument_node=""> or </span><i data-dcnode-id="6789"><span data-dcnode-id="6790" instrument_node="">albedo</span></i><span data-dcnode-id="6788" instrument_node="">) of surfaces, provided that different surfaces are in view at the same time and all surfaces are illuminated within the same light environment.</span></p><span data-dcnode-id="6786" instrument_node="">
</span><p data-dcnode-id="6778"><span data-dcnode-id="6785" instrument_node="">Artists commonly use the term </span><b data-dcnode-id="6783"><span data-dcnode-id="6784" instrument_node="">value</span></b><span data-dcnode-id="6782" instrument_node=""> to refer to lightness, a term made standard through the </span><a class="text" data-dcnode-id="6780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23MUNSELL"><span data-dcnode-id="6781" instrument_node="">Munsell Color System</span></a><span data-dcnode-id="6779" instrument_node="">.</span></p><span data-dcnode-id="6777" instrument_node="">
</span><p data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">The example below shows variations in the lightness of a blue hue with low chroma.</span></p><span data-dcnode-id="6774" instrument_node="">
</span><p class="imgC" data-dcnode-id="6772"><img data-dcnode-id="6773" height="60" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/att1.gif&amp;raw" width="350"></p><span data-dcnode-id="6771" instrument_node="">
</span><p class="CC" data-dcnode-id="6769"><span data-dcnode-id="6770" instrument_node="">differences in lightness or value</span></p><span data-dcnode-id="6768" instrument_node="">
</span><p class="subCC" data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">hue and chroma held constant</span></p><span data-dcnode-id="6765" instrument_node="">
</span><p data-dcnode-id="6740"><span data-dcnode-id="6764" instrument_node="">Extremes of lightness or value are described as </span><i data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">dark</span></i><span data-dcnode-id="6761" instrument_node=""> or </span><i data-dcnode-id="6759"><span data-dcnode-id="6760" instrument_node="">black</span></i><span data-dcnode-id="6758" instrument_node=""> up to </span><i data-dcnode-id="6756"><span data-dcnode-id="6757" instrument_node="">light</span></i><span data-dcnode-id="6755" instrument_node=""> or </span><i data-dcnode-id="6753"><span data-dcnode-id="6754" instrument_node="">white;</span></i><span data-dcnode-id="6752" instrument_node=""> for self luminous areas (lights) the extremes of brightness are described as </span><i data-dcnode-id="6750"><span data-dcnode-id="6751" instrument_node="">faint</span></i><span data-dcnode-id="6749" instrument_node=""> or </span><i data-dcnode-id="6747"><span data-dcnode-id="6748" instrument_node="">dim</span></i><span data-dcnode-id="6746" instrument_node=""> up to </span><i data-dcnode-id="6744"><span data-dcnode-id="6745" instrument_node="">brilliant</span></i><span data-dcnode-id="6743" instrument_node=""> or </span><i data-dcnode-id="6741"><span data-dcnode-id="6742" instrument_node="">bright.</span></i></p><span data-dcnode-id="6739" instrument_node="">
</span><p data-dcnode-id="6734"><span data-dcnode-id="6738" instrument_node="">Perceptions of lightness form a continuous achromatic series, called a </span><a class="text" data-dcnode-id="6736" href="#lightnessgeometry"><span data-dcnode-id="6737" instrument_node="">gray scale</span></a><span data-dcnode-id="6735" instrument_node=""> of values, extending from perceptual black through grays of increasing lightness to perceptual white.
All colors, disregarding their hue and chroma, can be matched to a step on this lightness scale, either visually or by measuring their reflectance with a spectrophotometer.</span></p><span data-dcnode-id="6733" instrument_node="">
</span><p data-dcnode-id="6725"><span data-dcnode-id="6732" instrument_node="">In technical color models, </span><a class="text" data-dcnode-id="6730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/pigmt8.html%23valrange"><span data-dcnode-id="6731" instrument_node="">lightness</span></a><span data-dcnode-id="6729" instrument_node=""> is measured on a scale from 0 (black) to 100 (white); painters and photographers use printed gray scales that may contain anywhere from 5 to 20 gray scale steps. Different naming or numbering categories are used in these systems; see for example my </span><a class="text" data-dcnode-id="6727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23lightnesscategories"><span data-dcnode-id="6728" instrument_node="">Handprint lightness categories</span></a><span data-dcnode-id="6726" instrument_node="">.</span></p><span data-dcnode-id="6724" instrument_node="">
</span><p class="imgC" data-dcnode-id="6722"><img data-dcnode-id="6723" height="136" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/scala1.gif&amp;raw" width="380"></p><span data-dcnode-id="6721" instrument_node="">
</span><p class="CC" data-dcnode-id="6719"><span data-dcnode-id="6720" instrument_node="">perceptions of lightness form a gray scale that is much smaller than physical reflectance limits</span></p><span data-dcnode-id="6718" instrument_node="">
</span><p data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">The physical basis of lightness is essentially the overall proportion of light shining on a surface that is reflected from the surface: dark surfaces reflect very little light, and pale or white surfaces reflect a lot of light.</span></p><span data-dcnode-id="6715" instrument_node="">
</span><p data-dcnode-id="6707"><span data-dcnode-id="6714" instrument_node="">However this does not mean that our perception of lightness is fixed on extreme physical reflectance values of almost 0% ("pure black") and 100% ("pure white"). Instead, the </span><i data-dcnode-id="6712"><span data-dcnode-id="6713" instrument_node="">perceptual</span></i><span data-dcnode-id="6711" instrument_node=""> white and black values are </span><a class="text" data-dcnode-id="6709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23anchoring"><span data-dcnode-id="6710" instrument_node="">anchored</span></a><span data-dcnode-id="6708" instrument_node=""> on the most extreme light and dark surfaces within the field of view — and by remembering how familiar surfaces look under normal light. These relative contrasts can define a complete range of grays in surface luminances that do not vary by more than 20 to 1. In fact, we typically perceive as "black" surfaces that reflect as much as 10% of the light falling on them, and as "white" surfaces that reflect only 90% of the light — a reflectance ratio of just 9&nbsp;to&nbsp;1.</span></p><span data-dcnode-id="6706" instrument_node="">
</span><p data-dcnode-id="6700"><span data-dcnode-id="6705" instrument_node="">In addition, judgments of light and dark can change when surface comparisons change: think of laying an old white sheet you consider "white" against a brand new white sheet. Lightness is affected by the </span><a class="text" data-dcnode-id="6703" href="#lightnesscontrast"><span data-dcnode-id="6704" instrument_node="">relative lightness contrast</span></a><span data-dcnode-id="6702" instrument_node=""> among all visible surfaces. Changes in illumination have less impact on perceived lightness, provided the same surface contrasts are in view or the surfaces are already familiar.</span><a data-dcnode-id="6701" name="colormakinghue"></a></p><span data-dcnode-id="6699" instrument_node="">
</span><p data-dcnode-id="6692"><b data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">Hue</span></b><span data-dcnode-id="6696" instrument_node="">. This is the most familiar color attribute, the one that answers the question, </span><i data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">what color is it?</span></i><span data-dcnode-id="6693" instrument_node=""> The example below shows several different hues.</span></p><span data-dcnode-id="6691" instrument_node="">
</span><p class="imgC" data-dcnode-id="6689"><img data-dcnode-id="6690" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/att5.gif&amp;raw" width="350"></p><span data-dcnode-id="6688" instrument_node="">
</span><p class="CC" data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">differences in hue</span></p><span data-dcnode-id="6685" instrument_node="">
</span><p class="subCC" data-dcnode-id="6682"><span data-dcnode-id="6684" instrument_node="">colors in the same column are the same hue: (top row) hues at maximum chroma; (middle &amp; bottom rows) dark and light hues, with chroma and lightness held constant (colors of equal nuance) in each row</span><a data-dcnode-id="6683" name="ctprin05"></a></p><span data-dcnode-id="6681" instrument_node="">
</span><p data-dcnode-id="6678"><b data-dcnode-id="6679"><span data-dcnode-id="6680" instrument_node="">5. Hue is the attribute of color matched by a single wavelength of light or by a mixture of "violet" and "red" wavelengths of light.</span></b></p><span data-dcnode-id="6677" instrument_node="">
</span><p data-dcnode-id="6663"><span data-dcnode-id="6676" instrument_node="">Hues arise because the light incident on a surface is reflected unequally at different wavelengths. The eye combines these different wavelengths into a single hue perception. This hue can usually be matched by the color of a single wavelength of light, called the </span><b data-dcnode-id="6674"><span data-dcnode-id="6675" instrument_node="">dominant wavelength</span></b><span data-dcnode-id="6673" instrument_node=""> of the hue, notated as the wavelength number, e.g. a pure yellow is indicated by the wavelength number </span><i data-dcnode-id="6671"><span data-dcnode-id="6672" instrument_node="">575.</span></i><span data-dcnode-id="6670" instrument_node=""> Hues that do not appear in the spectrum are matched by a mixture of two wavelengths of light, one violet and one red. As these two wavelength mixtures or </span><b data-dcnode-id="6668"><span data-dcnode-id="6669" instrument_node="">extraspectral hues</span></b><span data-dcnode-id="6667" instrument_node=""> are awkward to specify for technical reasons, they are usually denoted by the wavelength number of the hue directly opposite on the hue circle: thus an extraspectral magenta is notated by its complementary "green" wavelength, </span><i data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">c560.</span></i><span data-dcnode-id="6664" instrument_node=""> </span></p><span data-dcnode-id="6662" instrument_node="">
</span><p data-dcnode-id="6660"><span data-dcnode-id="6661" instrument_node="">The artistic description of hue departs from everyday color description in two ways:</span></p></td><td colspan="2" data-dcnode-id="6657"></td></tr><tr data-dcnode-id="6476"><td colspan="2" data-dcnode-id="6652"></td><td align="left" data-dcnode-id="6489" valign="top"><p data-dcnode-id="6628"><span data-dcnode-id="6650" instrument_node="">•&nbsp;</span><b data-dcnode-id="6648"><span data-dcnode-id="6649" instrument_node="">Hue names are limited to six</span></b><span data-dcnode-id="6647" instrument_node="">: the </span><a class="text" data-dcnode-id="6645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23names"><span data-dcnode-id="6646" instrument_node="">spectrum hues</span></a><span data-dcnode-id="6644" instrument_node=""> — </span><i data-dcnode-id="6642"><span data-dcnode-id="6643" instrument_node="">red, orange, yellow, green, blue</span></i><span data-dcnode-id="6641" instrument_node=""> and the </span><a class="text" data-dcnode-id="6639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23extraspectral"><span data-dcnode-id="6640" instrument_node="">extraspectral hue</span></a><span data-dcnode-id="6638" instrument_node=""> </span><i data-dcnode-id="6636"><span data-dcnode-id="6637" instrument_node="">violet</span></i><span data-dcnode-id="6635" instrument_node=""> (or </span><i data-dcnode-id="6633"><span data-dcnode-id="6634" instrument_node="">purple,</span></i><span data-dcnode-id="6632" instrument_node=""> which I use to describe a dark violet). Note that the extraspectral range includes many hues commonly labeled </span><i data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">red</span></i><span data-dcnode-id="6629" instrument_node=""> (diagram, right).</span></p><span data-dcnode-id="6627" instrument_node="">
</span><p data-dcnode-id="6617"><span data-dcnode-id="6626" instrument_node="">•&nbsp;</span><b data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">Dull colors are named as spectrum hues</span></b><span data-dcnode-id="6623" instrument_node="">. The unique names for dull or muted colors — such as </span><i data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">brown, maroon, pink, tan, gold, russet, olive</span></i><span data-dcnode-id="6620" instrument_node=""> and so forth — do not describe spectral colors, and this means they are not hue names, even though they may be appropriate informal replies to the question, </span><i data-dcnode-id="6618"><span data-dcnode-id="6619" instrument_node="">what color is it?</span></i></p><span data-dcnode-id="6616" instrument_node="">
</span><p data-dcnode-id="6610"><span data-dcnode-id="6615" instrument_node="">For the spectral wavelength and paint pigment hues corresponding to the major hue categories, see my </span><a class="text" data-dcnode-id="6613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23huecategories"><span data-dcnode-id="6614" instrument_node="">Handprint hue categories</span></a><span data-dcnode-id="6612" instrument_node="">.</span><a data-dcnode-id="6611" name="huecategories"></a></p><span data-dcnode-id="6609" instrument_node="">
</span><p data-dcnode-id="6604"><span data-dcnode-id="6608" instrument_node="">Spectral hues blend continuously, each into its neighbors, to form a circle of hues, in spectral order from red to violet. Extraspectral hues (reds and violets mixed from a blend of "red" and "violet" light) close the hue circle. Hue only specifies the location of a color around the circumference of this circle, usually specified as an angle (the </span><a class="text" data-dcnode-id="6606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/pigmt8.html%23hueangle"><span data-dcnode-id="6607" instrument_node="">hue angle</span></a><span data-dcnode-id="6605" instrument_node="">) measured from an arbitrary starting hue (usually red or yellow).</span></p><span data-dcnode-id="6603" instrument_node="">
</span><p data-dcnode-id="6589"><span data-dcnode-id="6602" instrument_node="">Blends of the basic hues are named with two neighbor hue names, following the rule </span><b data-dcnode-id="6600"><span data-dcnode-id="6601" instrument_node="">the tinting hue name precedes the dominant hue name</span></b><span data-dcnode-id="6599" instrument_node="">, as adjective before noun. Thus </span><i data-dcnode-id="6597"><span data-dcnode-id="6598" instrument_node="">red orange</span></i><span data-dcnode-id="6596" instrument_node=""> is an orange leaning toward red, </span><i data-dcnode-id="6594"><span data-dcnode-id="6595" instrument_node="">blue violet</span></i><span data-dcnode-id="6593" instrument_node=""> is a violet leaning toward blue, and so on. This creates six basic and twelve compound hue categories. These are illustrated below, in the approximate spacing that the hues display in a </span><a class="text" data-dcnode-id="6591" href="#visualhuecircle"><span data-dcnode-id="6592" instrument_node="">visual hue circle</span></a><span data-dcnode-id="6590" instrument_node="">.</span></p><p data-dcnode-id="6588"></p><span data-dcnode-id="6587" instrument_node="">
</span><p class="imgC" data-dcnode-id="6585"><img data-dcnode-id="6586" height="285" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/scala3.gif&amp;raw" width="375"></p><span data-dcnode-id="6584" instrument_node="">
</span><p class="CC" data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">perceptions of spectral hues form a hue circle</span></p><span data-dcnode-id="6581" instrument_node="">
</span><p class="subCC" data-dcnode-id="6579"><span data-dcnode-id="6580" instrument_node="">six basic hues and twelve compound hues, with achromatic white, gray or black</span></p><span data-dcnode-id="6578" instrument_node="">
</span><p data-dcnode-id="6543"><span data-dcnode-id="6577" instrument_node="">This hue circle may seem erratic, but in fact the locations of </span><i data-dcnode-id="6575"><span data-dcnode-id="6576" instrument_node="">red, yellow, green, blue</span></i><span data-dcnode-id="6574" instrument_node=""> and </span><i data-dcnode-id="6572"><span data-dcnode-id="6573" instrument_node="">violet</span></i><span data-dcnode-id="6571" instrument_node=""> are equally spaced around the hue circle, and match up with the five basic hue categories of the </span><a class="text" data-dcnode-id="6569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23MUNSELL"><span data-dcnode-id="6570" instrument_node="">Munsell Color System</span></a><span data-dcnode-id="6568" instrument_node=""> (</span><b data-dcnode-id="6566"><span data-dcnode-id="6567" instrument_node="">5R</span></b><span data-dcnode-id="6565" instrument_node="">, </span><b data-dcnode-id="6563"><span data-dcnode-id="6564" instrument_node="">5Y</span></b><span data-dcnode-id="6562" instrument_node="">, </span><b data-dcnode-id="6560"><span data-dcnode-id="6561" instrument_node="">5G</span></b><span data-dcnode-id="6559" instrument_node="">, </span><b data-dcnode-id="6557"><span data-dcnode-id="6558" instrument_node="">5B</span></b><span data-dcnode-id="6556" instrument_node=""> and </span><b data-dcnode-id="6554"><span data-dcnode-id="6555" instrument_node="">5P</span></b><span data-dcnode-id="6553" instrument_node="">); </span><i data-dcnode-id="6551"><span data-dcnode-id="6552" instrument_node="">orange</span></i><span data-dcnode-id="6550" instrument_node=""> has been added to discriminate among the very large number of </span><a class="text" data-dcnode-id="6548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette1.html%23greenyellow"><span data-dcnode-id="6549" instrument_node="">artists' pigments</span></a><span data-dcnode-id="6547" instrument_node=""> in the yellow to red hues. (Exemplars of the hue categories are </span><a class="text" data-dcnode-id="6545" href="#hueexemplars"><span data-dcnode-id="6546" instrument_node="">presented below</span></a><span data-dcnode-id="6544" instrument_node="">.)</span></p><span data-dcnode-id="6542" instrument_node="">
</span><p data-dcnode-id="6516"><span data-dcnode-id="6541" instrument_node="">Some blended hues are more familiar as unique color names (especially </span><i data-dcnode-id="6539"><span data-dcnode-id="6540" instrument_node="">magenta</span></i><span data-dcnode-id="6538" instrument_node=""> for </span><i data-dcnode-id="6536"><span data-dcnode-id="6537" instrument_node="">violet red</span></i><span data-dcnode-id="6535" instrument_node=""> and </span><i data-dcnode-id="6533"><span data-dcnode-id="6534" instrument_node="">cyan</span></i><span data-dcnode-id="6532" instrument_node=""> for </span><i data-dcnode-id="6530"><span data-dcnode-id="6531" instrument_node="">green blue</span></i><span data-dcnode-id="6529" instrument_node="">), but other names for compound hues are unfamiliar or infrequently used (</span><i data-dcnode-id="6527"><span data-dcnode-id="6528" instrument_node="">chartreuse</span></i><span data-dcnode-id="6526" instrument_node=""> for </span><i data-dcnode-id="6524"><span data-dcnode-id="6525" instrument_node="">yellow green</span></i><span data-dcnode-id="6523" instrument_node="">). Naming hues with matching pigment names ("ultramarine" for </span><i data-dcnode-id="6521"><span data-dcnode-id="6522" instrument_node="">violet blue,</span></i><span data-dcnode-id="6520" instrument_node=""> "vermilion" for </span><i data-dcnode-id="6518"><span data-dcnode-id="6519" instrument_node="">orange red</span></i><span data-dcnode-id="6517" instrument_node="">) should be avoided, to prevent confusion between colors and paints.</span></p><span data-dcnode-id="6515" instrument_node="">
</span><p data-dcnode-id="6490"><i data-dcnode-id="6513"><span data-dcnode-id="6514" instrument_node="">Achromatic</span></i><span data-dcnode-id="6512" instrument_node=""> colors, including </span><i data-dcnode-id="6510"><span data-dcnode-id="6511" instrument_node="">white, gray</span></i><span data-dcnode-id="6509" instrument_node=""> or </span><i data-dcnode-id="6507"><span data-dcnode-id="6508" instrument_node="">black,</span></i><span data-dcnode-id="6506" instrument_node=""> are not hue categories, but are used to describe colors of paint (</span><i data-dcnode-id="6504"><span data-dcnode-id="6505" instrument_node="">davy's gray</span></i><span data-dcnode-id="6503" instrument_node="">), gradations in lightness (a </span><i data-dcnode-id="6501"><span data-dcnode-id="6502" instrument_node="">dark gray value</span></i><span data-dcnode-id="6500" instrument_node="">), dull color appearance (a </span><i data-dcnode-id="6498"><span data-dcnode-id="6499" instrument_node="">gray green</span></i><span data-dcnode-id="6497" instrument_node="">), or even levels of luminance (a </span><i data-dcnode-id="6495"><span data-dcnode-id="6496" instrument_node="">gray day,</span></i><span data-dcnode-id="6494" instrument_node=""> a </span><i data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">black night</span></i><span data-dcnode-id="6491" instrument_node="">). </span></p></td><td colspan="2" data-dcnode-id="6478" valign="top"><span data-dcnode-id="6487" instrument_node="">
</span><p class="imgS" data-dcnode-id="6485"><img data-dcnode-id="6486" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/extrah.gif&amp;raw" width="200"></p><span data-dcnode-id="6484" instrument_node="">
</span><p class="SC" data-dcnode-id="6482"><span data-dcnode-id="6483" instrument_node="">the extraspectral hues</span></p><span data-dcnode-id="6481" instrument_node="">
</span><p class="subSC" data-dcnode-id="6479"><span data-dcnode-id="6480" instrument_node="">these include all hues between blue&nbsp;violet (left) and orange red (right)</span></p></td></tr><tr data-dcnode-id="6165"><td colspan="2" data-dcnode-id="6473"></td><td align="left" data-dcnode-id="6179" valign="top"><span data-dcnode-id="6471" instrument_node="">To assist you in learning the hue categories, this site uses a palette scheme icon (right) to identify pigment categories and to identify artist </span><a class="text" data-dcnode-id="6469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/paletfs.html"><span data-dcnode-id="6470" instrument_node="">palette paint selections</span></a><span data-dcnode-id="6468" instrument_node="">. Click on the icon anywhere it appears to view the </span><a class="text" data-dcnode-id="6466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/colormap.html"><span data-dcnode-id="6467" instrument_node="">key to the palette scheme</span></a><span data-dcnode-id="6465" instrument_node="">; click on any hue marker in the palette scheme to see a listing of watercolor pigments currently available in that hue category (as listed on the </span><a class="text" data-dcnode-id="6463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/palette1.html"><span data-dcnode-id="6464" instrument_node="">complete palette</span></a><span data-dcnode-id="6462" instrument_node=""> page).</span><p data-dcnode-id="6461"></p><span data-dcnode-id="6460" instrument_node="">
</span><p data-dcnode-id="6455"><span data-dcnode-id="6459" instrument_node="">An artist's color mixing skill is greatly aided by learning the correct hue designations for dull colors. "Brown" for example is actually a near neutral, dark valued orange with a dominant wavelength around 610&nbsp;nm. Of course you would not normally describe your coffee as </span><i data-dcnode-id="6457"><span data-dcnode-id="6458" instrument_node="">dark orange.</span></i><span data-dcnode-id="6456" instrument_node=""> But accurate hue naming makes it clear how a color should be mixed with paints and how a color is likely to change when in shadow.</span></p><span data-dcnode-id="6454" instrument_node="">
</span><p data-dcnode-id="6445"><span data-dcnode-id="6453" instrument_node="">For example, </span><i data-dcnode-id="6451"><span data-dcnode-id="6452" instrument_node="">red orange</span></i><span data-dcnode-id="6450" instrument_node=""> can be mixed as orange paint tinted with some red paint; </span><i data-dcnode-id="6448"><span data-dcnode-id="6449" instrument_node="">dark orange</span></i><span data-dcnode-id="6447" instrument_node=""> (brown) can be mixed by darkening an orange paint with black; and an orange surface in deep shadow shoud be painted with brown paint.</span><a data-dcnode-id="6446" name="colormakingchroma"></a></p><span data-dcnode-id="6444" instrument_node="">
</span><p data-dcnode-id="6439"><b data-dcnode-id="6442"><span data-dcnode-id="6443" instrument_node="">Hue Purity</span></b><span data-dcnode-id="6441" instrument_node="">. The third colormaking attribute represents the quality of color commonly called chroma or saturation.</span><a data-dcnode-id="6440" name="ctprin06"></a></p><span data-dcnode-id="6438" instrument_node="">
</span><p data-dcnode-id="6429"><b data-dcnode-id="6430"><span data-dcnode-id="6437" instrument_node="">6. Hue purity is the concentration or intensity of hue independent of its luminance or lightness, commonly termed the</span><i data-dcnode-id="6435"><span data-dcnode-id="6436" instrument_node=""> colorfulness, chroma </span></i><span data-dcnode-id="6434" instrument_node="">or</span><i data-dcnode-id="6432"><span data-dcnode-id="6433" instrument_node=""> saturation </span></i><span data-dcnode-id="6431" instrument_node="">of a color.</span></b></p><span data-dcnode-id="6428" instrument_node="">
</span><p data-dcnode-id="6425"><span data-dcnode-id="6427" instrument_node="">The example below shows variations in the chroma of a green and red at constant hue and lightness.</span><a data-dcnode-id="6426" name="chromarules"></a></p><span data-dcnode-id="6424" instrument_node="">
</span><p class="imgC" data-dcnode-id="6422"><img data-dcnode-id="6423" height="93" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/att6.gif&amp;raw" width="350"></p><span data-dcnode-id="6421" instrument_node="">
</span><p class="CC" data-dcnode-id="6419"><span data-dcnode-id="6420" instrument_node="">differences in chroma (saturation)</span></p><span data-dcnode-id="6418" instrument_node="">
</span><p class="subCC" data-dcnode-id="6416"><span data-dcnode-id="6417" instrument_node="">hue and lightness held constant</span></p><span data-dcnode-id="6415" instrument_node="">
</span><p data-dcnode-id="6404"><span data-dcnode-id="6414" instrument_node="">This basic attribute of "hue purity" has gone by many names — </span><i data-dcnode-id="6412"><span data-dcnode-id="6413" instrument_node="">Sättigung, colorfulness, chromaticness, chroma, saturation, excitation purity, colorimetric purity, chromatic content, brilliance</span></i><span data-dcnode-id="6411" instrument_node=""> — each definition anchored to a specific stimulus attribute or color comparison. Artists can use either </span><b data-dcnode-id="6409"><span data-dcnode-id="6410" instrument_node="">chroma</span></b><span data-dcnode-id="6408" instrument_node=""> or </span><b data-dcnode-id="6406"><span data-dcnode-id="6407" instrument_node="">saturation</span></b><span data-dcnode-id="6405" instrument_node=""> to describe hue purity without worrying about the technical distinction between the two terms:</span></p><span data-dcnode-id="6403" instrument_node="">
</span><p data-dcnode-id="6395"><span data-dcnode-id="6402" instrument_node="">•&nbsp;</span><i data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">Chroma</span></i><span data-dcnode-id="6399" instrument_node=""> was first used by Albert Munsell in his </span><a class="text" data-dcnode-id="6397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23MUNSELL"><span data-dcnode-id="6398" instrument_node="">Munsell Color System</span></a><span data-dcnode-id="6396" instrument_node=""> (1915), and the term now has widespread application in technical color systems.</span></p><span data-dcnode-id="6394" instrument_node="">
</span><p data-dcnode-id="6383"><span data-dcnode-id="6393" instrument_node="">•&nbsp;</span><i data-dcnode-id="6391"><span data-dcnode-id="6392" instrument_node="">Saturation</span></i><span data-dcnode-id="6390" instrument_node=""> goes back to 19th century color science; </span><i data-dcnode-id="6388"><span data-dcnode-id="6389" instrument_node="">saturated color</span></i><span data-dcnode-id="6387" instrument_node=""> is recognized in common speech and conveys the juicy metaphor of a surface </span><i data-dcnode-id="6385"><span data-dcnode-id="6386" instrument_node="">soaked</span></i><span data-dcnode-id="6384" instrument_node=""> in pure hue.</span></p><span data-dcnode-id="6382" instrument_node="">
</span><p data-dcnode-id="6362"><span data-dcnode-id="6381" instrument_node="">Chroma or saturation varies from </span><i data-dcnode-id="6379"><span data-dcnode-id="6380" instrument_node="">dull</span></i><span data-dcnode-id="6378" instrument_node=""> for weakly tinted sensations to </span><i data-dcnode-id="6376"><span data-dcnode-id="6377" instrument_node="">intense</span></i><span data-dcnode-id="6375" instrument_node=""> for pure hue sensations. The terms </span><b data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">neutral</span></b><span data-dcnode-id="6372" instrument_node=""> or </span><b data-dcnode-id="6370"><span data-dcnode-id="6371" instrument_node="">achromatic</span></b><span data-dcnode-id="6369" instrument_node=""> apply to colorless (white, gray or black) surfaces. (Note that </span><i data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">lights</span></i><span data-dcnode-id="6366" instrument_node=""> can never appear gray or black, but only as a bright or dim.) For a chroma naming system and visual examples, see my </span><a class="text" data-dcnode-id="6364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23chromacategories"><span data-dcnode-id="6365" instrument_node="">Handprint chroma/saturation categories</span></a><span data-dcnode-id="6363" instrument_node="">.</span></p><span data-dcnode-id="6361" instrument_node="">
</span><p data-dcnode-id="6353"><span data-dcnode-id="6360" instrument_node="">In visual colors (and by extension, in the material colors that stimulate the visual colors), hue purity is defined as the </span><b data-dcnode-id="6358"><span data-dcnode-id="6359" instrument_node="">proportion of black, gray or white in a color</span></b><span data-dcnode-id="6357" instrument_node=""> relative to the proportion of "pure hue" (in materials, the pigment or dye) in the color. Colors with low chroma or saturation appear very similar to a white, gray or black. The perception of chroma forms a scale anchored in achromatic colors at one end and extending to the most chromatic stimulus at the other. In modern color models, chroma is measured from zero (achromatic) to a maximum value at the </span><a class="text" data-dcnode-id="6355" href="#chromalimits"><span data-dcnode-id="6356" instrument_node="">perceptual or physical chroma boundary</span></a><span data-dcnode-id="6354" instrument_node="">.</span></p><span data-dcnode-id="6352" instrument_node="">
</span><p class="imgC" data-dcnode-id="6350"><img data-dcnode-id="6351" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/scala2.gif&amp;raw" width="380"></p><span data-dcnode-id="6349" instrument_node="">
</span><p class="CC" data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">perceptions of chroma are anchored on achromatic surfaces matching the white point</span></p><span data-dcnode-id="6346" instrument_node="">
</span><p data-dcnode-id="6341"><span data-dcnode-id="6345" instrument_node="">The perception of achromatic or zero chroma surfaces is strongly affected by the chromaticity (the combination of hue and hue purity) of the illumination. Our visual system naturally adapts to weakly tinted illumination so that it appears as "white" or achromatic light. It is then the </span><b data-dcnode-id="6343"><span data-dcnode-id="6344" instrument_node="">white point</span></b><span data-dcnode-id="6342" instrument_node=""> or standard of zero chroma. Any surface tinted with the same hue will appear achromatic (white or gray), but this judgment will change if the color of the illumination changes.</span></p><span data-dcnode-id="6340" instrument_node="">
</span><p data-dcnode-id="6317"><span data-dcnode-id="6339" instrument_node="">There are two language pitfalls to avoid when talking about gradations in chroma or saturation. The first involves color adjectives that can mean either </span><i data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">quantity of light</span></i><span data-dcnode-id="6336" instrument_node=""> or </span><i data-dcnode-id="6334"><span data-dcnode-id="6335" instrument_node="">concentration of color</span></i><span data-dcnode-id="6333" instrument_node=""> — these include </span><i data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">intense, brilliant, shining, glowing, bright</span></i><span data-dcnode-id="6330" instrument_node=""> or </span><i data-dcnode-id="6328"><span data-dcnode-id="6329" instrument_node="">luminous.</span></i><span data-dcnode-id="6327" instrument_node=""> If you say the setting sun is a </span><i data-dcnode-id="6325"><span data-dcnode-id="6326" instrument_node="">more brilliant red</span></i><span data-dcnode-id="6324" instrument_node=""> than an apple, it is unclear whether you are pointing at </span><i data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">brightness</span></i><span data-dcnode-id="6321" instrument_node=""> or </span><i data-dcnode-id="6319"><span data-dcnode-id="6320" instrument_node="">saturation</span></i><span data-dcnode-id="6318" instrument_node=""> or both.</span></p><span data-dcnode-id="6316" instrument_node="">
</span><p data-dcnode-id="6298"><span data-dcnode-id="6315" instrument_node="">The same pitfall involves adjectives borrowed from the material connotations of </span><i data-dcnode-id="6313"><span data-dcnode-id="6314" instrument_node="">purity</span></i><span data-dcnode-id="6312" instrument_node=""> — such as </span><i data-dcnode-id="6310"><span data-dcnode-id="6311" instrument_node="">pure, clean, concentrated, fresh</span></i><span data-dcnode-id="6309" instrument_node=""> or </span><i data-dcnode-id="6307"><span data-dcnode-id="6308" instrument_node="">strong</span></i><span data-dcnode-id="6306" instrument_node=""> and their antonyms </span><i data-dcnode-id="6304"><span data-dcnode-id="6305" instrument_node="">impure, dirty, diluted, faded</span></i><span data-dcnode-id="6303" instrument_node=""> and </span><i data-dcnode-id="6301"><span data-dcnode-id="6302" instrument_node="">weak.</span></i><span data-dcnode-id="6300" instrument_node=""> Here the ambiguity is material — a faded color may be inherently drab, or mixed with white; a diluted color may be inherently dull, or diluted with water. These terms also introduce a judgmental tone that is pointless when talking about color.</span><a data-dcnode-id="6299" name="warmcool"></a></p><span data-dcnode-id="6297" instrument_node="">
</span><p data-dcnode-id="6288"><span data-dcnode-id="6296" instrument_node="">•&nbsp;</span><b data-dcnode-id="6294"><span data-dcnode-id="6295" instrument_node="">Warm</span></b><span data-dcnode-id="6293" instrument_node=""> and </span><b data-dcnode-id="6291"><span data-dcnode-id="6292" instrument_node="">Cool</span></b><span data-dcnode-id="6290" instrument_node="">. Trades that use color for artistic, design or decorative purposes commonly use two terms to denote a "metacomplementary" hue contrast across the hue circle.</span><a data-dcnode-id="6289" name="ctprin07"></a></p><span data-dcnode-id="6287" instrument_node="">
</span><p data-dcnode-id="6278"><b data-dcnode-id="6279"><span data-dcnode-id="6286" instrument_node="">7. Artists use </span><i data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">warm</span></i><span data-dcnode-id="6283" instrument_node=""> to refer to red, orange and yellow hues, and </span><i data-dcnode-id="6281"><span data-dcnode-id="6282" instrument_node="">cool</span></i><span data-dcnode-id="6280" instrument_node=""> to refer to blue green and blue hues.</span></b></p><span data-dcnode-id="6277" instrument_node="">
</span><p data-dcnode-id="6272"><span data-dcnode-id="6276" instrument_node="">These terms are used to describe </span><a class="text" data-dcnode-id="6274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23warmcool"><span data-dcnode-id="6275" instrument_node="">hue contrasts</span></a><span data-dcnode-id="6273" instrument_node=""> in two different ways:</span></p><span data-dcnode-id="6271" instrument_node="">
</span><p data-dcnode-id="6260"><span data-dcnode-id="6270" instrument_node="">(1) as a </span><i data-dcnode-id="6268"><span data-dcnode-id="6269" instrument_node="">fundamental</span></i><span data-dcnode-id="6267" instrument_node=""> contrast between hues that are yellow, orange, red without a tint of green or blue (</span><i data-dcnode-id="6265"><span data-dcnode-id="6266" instrument_node="">warm</span></i><span data-dcnode-id="6264" instrument_node="">) as opposed to hues from green to blue without a tint of yellow or red (</span><i data-dcnode-id="6262"><span data-dcnode-id="6263" instrument_node="">cool</span></i><span data-dcnode-id="6261" instrument_node="">).</span></p><span data-dcnode-id="6259" instrument_node="">
</span><p data-dcnode-id="6248"><span data-dcnode-id="6258" instrument_node="">(2) as a </span><i data-dcnode-id="6256"><span data-dcnode-id="6257" instrument_node="">relative</span></i><span data-dcnode-id="6255" instrument_node=""> contrast between two similar or analogous hues, where one of the hues appears to contain more yellow or red (is </span><i data-dcnode-id="6253"><span data-dcnode-id="6254" instrument_node="">warmer</span></i><span data-dcnode-id="6252" instrument_node="">), or more green or blue (is </span><i data-dcnode-id="6250"><span data-dcnode-id="6251" instrument_node="">cooler</span></i><span data-dcnode-id="6249" instrument_node="">), than the other.</span></p><span data-dcnode-id="6247" instrument_node="">
</span><p data-dcnode-id="6233"><span data-dcnode-id="6246" instrument_node="">The fundamental warm/cool contrast is typically anchored on the hues </span><i data-dcnode-id="6244"><span data-dcnode-id="6245" instrument_node="">red orange</span></i><span data-dcnode-id="6243" instrument_node=""> and </span><i data-dcnode-id="6241"><span data-dcnode-id="6242" instrument_node="">green blue,</span></i><span data-dcnode-id="6240" instrument_node=""> or more simply between </span><i data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">orange</span></i><span data-dcnode-id="6237" instrument_node=""> and </span><i data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">blue</span></i><span data-dcnode-id="6234" instrument_node="">. Either way, the warm/cool axis is not placed through the centers of the warm and cool hue groups, because the spacing of the warm and cool hues is unequal (although each group contains about a half dozen hue categories).</span></p><span data-dcnode-id="6232" instrument_node="">
</span><p class="imgC" data-dcnode-id="6230"><img data-dcnode-id="6231" height="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/cw7.gif&amp;raw" width="370"></p><span data-dcnode-id="6229" instrument_node="">
</span><p class="CC" data-dcnode-id="6227"><span data-dcnode-id="6228" instrument_node="">the warm/cool contrast</span></p><span data-dcnode-id="6226" instrument_node="">
</span><p data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">Most color theory texts categorize greens and purples as either warm or cool. This is inaccurate. The hues from green yellow to green, and from violet blue to violet red, are neither warm nor cool. In these hues blue and red, or yellow and green, visibly mix, so violet and yellow green are warm/cool hybrids. Note also that the complementary contrast between yellow green and violet is not as strident as the contrast between red and green or yellow and violet blue.</span></p><span data-dcnode-id="6223" instrument_node="">
</span><p data-dcnode-id="6194"><span data-dcnode-id="6222" instrument_node="">However, a minority of artists anchor the contrast on </span><i data-dcnode-id="6220"><span data-dcnode-id="6221" instrument_node="">orange yellow</span></i><span data-dcnode-id="6219" instrument_node=""> and </span><i data-dcnode-id="6217"><span data-dcnode-id="6218" instrument_node="">violet blue:</span></i><span data-dcnode-id="6216" instrument_node=""> in that case orange is warmer than red, and blue is cooler than blue green. This usage corresponds to the contrast between </span><i data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">optimal orange</span></i><span data-dcnode-id="6213" instrument_node=""> (the color produced by all long wavelength light above 570&nbsp;nm) and </span><i data-dcnode-id="6211"><span data-dcnode-id="6212" instrument_node="">optimal blue</span></i><span data-dcnode-id="6210" instrument_node=""> (the color produced by all short wavelength light below 485&nbsp;nm), as identified in the </span><a class="text" data-dcnode-id="6208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color19.html%23sixcolors"><span data-dcnode-id="6209" instrument_node="">synthesis of color vision</span></a><span data-dcnode-id="6207" instrument_node="">. These colors are most closely matched by the pigments nickel dioxine yellow (</span><a class="text" data-dcnode-id="6205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watery.html%23PY153"><span data-dcnode-id="6206" instrument_node="">PY153</span></a><span data-dcnode-id="6204" instrument_node="">) and ultramarine blue (</span><a class="text" data-dcnode-id="6202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterb.html%23PB29"><span data-dcnode-id="6203" instrument_node="">PB29</span></a><span data-dcnode-id="6201" instrument_node="">). Visually, this preference is strongly justified by the importance of the yellow/blue axis as the major dimension of variation in the chromaticity of </span><a class="text" data-dcnode-id="6199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23wcequalsyb"><span data-dcnode-id="6200" instrument_node="">natural light</span></a><span data-dcnode-id="6198" instrument_node=""> and in particular in the atmospheric and diurnal variations of </span><a class="text" data-dcnode-id="6196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23colorlight"><span data-dcnode-id="6197" instrument_node="">landscape light</span></a><span data-dcnode-id="6195" instrument_node="">.</span></p><span data-dcnode-id="6193" instrument_node="">
</span><p data-dcnode-id="6180"><span data-dcnode-id="6192" instrument_node="">Many artists also use </span><i data-dcnode-id="6190"><span data-dcnode-id="6191" instrument_node="">warm</span></i><span data-dcnode-id="6189" instrument_node=""> and </span><i data-dcnode-id="6187"><span data-dcnode-id="6188" instrument_node="">cool</span></i><span data-dcnode-id="6186" instrument_node=""> to describe a relative </span><i data-dcnode-id="6184"><span data-dcnode-id="6185" instrument_node="">chroma contrast</span></i><span data-dcnode-id="6183" instrument_node=""> between warm or cool hues: brown is warmer than gray but cooler than red orange, and iron blue is warmer than cobalt blue but cooler than gray. These distinctions are especially useful to analyze subtractive color mixtures, because blue can be made into indigo, or gray into brown, by mixing them with red or orange paint (or colored light), and red orange can be made into brown, and gray into indigo, by mixing with blue paint (or colored light). This highlights the benefit, mentioned in the labeling of hue categories (above), of matching color labeling to the logic of color mixtures in paints.
</span><br data-dcnode-id="6182"><a data-dcnode-id="6181" name="otherterms"></a></p></td><td colspan="2" data-dcnode-id="6167" valign="top"><span data-dcnode-id="6177" instrument_node="">
</span><p class="imgS" data-dcnode-id="6174"><a border="0" data-dcnode-id="6175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/colormap.html"><img border="0" data-dcnode-id="6176" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/palet33.gif&amp;raw" width="150"></a></p><span data-dcnode-id="6173" instrument_node="">
</span><p class="SC" data-dcnode-id="6171"><span data-dcnode-id="6172" instrument_node="">the palette scheme used throughout this site</span></p><span data-dcnode-id="6170" instrument_node="">
</span><p class="subSC" data-dcnode-id="6168"><span data-dcnode-id="6169" instrument_node="">click on the icon to go to the key to the palette scheme</span></p></td></tr><tr data-dcnode-id="5907"><td colspan="2" data-dcnode-id="6162"></td><td align="left" data-dcnode-id="5911" valign="top"><span data-dcnode-id="6160" instrument_node="">Other Material Color Terms. Although the colormaking attributes are necessary to specify a visual color, they are not sufficient to describe certain physical attributes of a colored substance.</span><a data-dcnode-id="6159" name="ctprin08"></a><p data-dcnode-id="6158"></p><span data-dcnode-id="6157" instrument_node="">
</span><p data-dcnode-id="6142"><b data-dcnode-id="6143"><span data-dcnode-id="6156" instrument_node="">8. Physical or surface qualities of color materials are described with the terms </span><i data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">gloss, translucency</span></i><span data-dcnode-id="6153" instrument_node=""> or </span><i data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">transparency, fluorescence,</span></i><span data-dcnode-id="6150" instrument_node=""> and </span><i data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">iridescence</span></i><span data-dcnode-id="6147" instrument_node=""> or </span><i data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">pearlescence</span></i><span data-dcnode-id="6144" instrument_node="">.</span></b></p><span data-dcnode-id="6141" instrument_node="">
</span><p data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">These additional color attributes are defined as follows:</span></p><span data-dcnode-id="6138" instrument_node="">
