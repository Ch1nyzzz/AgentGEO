</span><p data-dcnode-id="6121"><span data-dcnode-id="6137" instrument_node="">•&nbsp;</span><b data-dcnode-id="6135"><span data-dcnode-id="6136" instrument_node="">Gloss</span></b><span data-dcnode-id="6134" instrument_node="">. All materials reflect some light from their surfaces much as a sheet of glass does. This light does not get absorbed or reflected by any colorant within the material, so the reflected light is effectively "white". </span><i data-dcnode-id="6132"><span data-dcnode-id="6133" instrument_node="">High gloss</span></i><span data-dcnode-id="6131" instrument_node=""> materials have the property of reflecting most or nearly all of this "white" light in one direction, which produces a </span><i data-dcnode-id="6129"><span data-dcnode-id="6130" instrument_node="">highlight</span></i><span data-dcnode-id="6128" instrument_node=""> or image of the light source on the surface. </span><i data-dcnode-id="6126"><span data-dcnode-id="6127" instrument_node="">Low gloss</span></i><span data-dcnode-id="6125" instrument_node=""> materials reflect this "white" light in all directions, producing a nonreflective, </span><i data-dcnode-id="6123"><span data-dcnode-id="6124" instrument_node="">matte</span></i><span data-dcnode-id="6122" instrument_node=""> or "flat" surface color. In matte surfaces we always see some of this diffuse white light mixed into the surface color, so a material with a matte surface always appears both duller and lighter than the same material with a gloss finish.</span></p><span data-dcnode-id="6120" instrument_node="">
</span><p data-dcnode-id="6097"><span data-dcnode-id="6119" instrument_node="">•&nbsp;</span><b data-dcnode-id="6117"><span data-dcnode-id="6118" instrument_node="">Translucency/Transparency</span></b><span data-dcnode-id="6116" instrument_node="">. Many materials allow light to penetrate below the surface, or even pass through an object entirely: they </span><i data-dcnode-id="6114"><span data-dcnode-id="6115" instrument_node="">transmit</span></i><span data-dcnode-id="6113" instrument_node=""> light. If a material transmits so much light that a bright, clear image can be seen through it, the material is </span><i data-dcnode-id="6111"><span data-dcnode-id="6112" instrument_node="">transparent.</span></i><span data-dcnode-id="6110" instrument_node=""> If the material transmits light only as a diffuse glow or vague image, then it is </span><i data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">translucent.</span></i><span data-dcnode-id="6107" instrument_node=""> If a material transmits no light, it is </span><i data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">opaque.</span></i><span data-dcnode-id="6104" instrument_node=""> (Note that paint attributes are described differently, using the separate concepts </span><a class="text" data-dcnode-id="6102" href="#painttransparency"><span data-dcnode-id="6103" instrument_node="">transparency</span></a><span data-dcnode-id="6101" instrument_node=""> and </span><a class="text" data-dcnode-id="6099" href="#painthiding"><span data-dcnode-id="6100" instrument_node="">hiding power</span></a><span data-dcnode-id="6098" instrument_node=""> or hiding.)</span></p><span data-dcnode-id="6096" instrument_node="">
</span><p data-dcnode-id="6091"><span data-dcnode-id="6095" instrument_node="">•&nbsp;</span><b data-dcnode-id="6093"><span data-dcnode-id="6094" instrument_node="">Fluorescence</span></b><span data-dcnode-id="6092" instrument_node="">. Surfaces seem to glow or fluoresce if they appear to emit more light than is shining on them. This usually occurs because the substance absorbs light in the invisible short (ultraviolet) wavelengths, then emits the energy as light in the visible wavelengths, or because it absorbs light in the bright ("green") wavelengths, and emits it in the dim ("red") wavelengths.</span></p><span data-dcnode-id="6090" instrument_node="">
</span><p data-dcnode-id="6078"><span data-dcnode-id="6089" instrument_node="">•&nbsp;</span><b data-dcnode-id="6087"><span data-dcnode-id="6088" instrument_node="">Iridescence</span></b><span data-dcnode-id="6086" instrument_node=""> and </span><b data-dcnode-id="6084"><span data-dcnode-id="6085" instrument_node="">Pearlescence</span></b><span data-dcnode-id="6083" instrument_node="">. These terms describe the appearance of different colors in the same spatial location, or colors that change depending on the angle between the object and light or the object and our point of view. Both are usually produced by some form of </span><a class="text" data-dcnode-id="6081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color10.html%23refraction"><span data-dcnode-id="6082" instrument_node="">diffraction or refraction</span></a><span data-dcnode-id="6080" instrument_node=""> — which is the production of spectral hues by reflection from a complex surface (as from a compact disc, or a film of grease on water) or by optical bending within a transparent material (as by a lens or prism).</span><a data-dcnode-id="6079" name="basiccolorterms"></a></p><span data-dcnode-id="6077" instrument_node="">
</span><p data-dcnode-id="6073"><b data-dcnode-id="6075"><span data-dcnode-id="6076" instrument_node="">A Basic Color Vocabulary</span></b><span data-dcnode-id="6074" instrument_node="">. The colormaking attributes provide the artist with a clear and simple way to talk and think about color. Every artist must understand how to describe any color in terms of:</span></p><span data-dcnode-id="6072" instrument_node="">
</span><p data-dcnode-id="6046"><span data-dcnode-id="6071" instrument_node="">•&nbsp;relative luminance, which is </span><b data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">lightness</span></b><span data-dcnode-id="6068" instrument_node=""> in surfaces (from </span><i data-dcnode-id="6066"><span data-dcnode-id="6067" instrument_node="">light</span></i><span data-dcnode-id="6065" instrument_node=""> to </span><i data-dcnode-id="6063"><span data-dcnode-id="6064" instrument_node="">dark</span></i><span data-dcnode-id="6062" instrument_node=""> for chromatic colors and </span><i data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">white</span></i><span data-dcnode-id="6059" instrument_node=""> to </span><i data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">black</span></i><span data-dcnode-id="6056" instrument_node=""> for achromatic colors), and </span><b data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">brightness</span></b><span data-dcnode-id="6053" instrument_node=""> in lights (from </span><i data-dcnode-id="6051"><span data-dcnode-id="6052" instrument_node="">bright</span></i><span data-dcnode-id="6050" instrument_node=""> to </span><i data-dcnode-id="6048"><span data-dcnode-id="6049" instrument_node="">dim,</span></i><span data-dcnode-id="6047" instrument_node=""> whether chromatic or not).</span></p><span data-dcnode-id="6045" instrument_node="">
</span><p data-dcnode-id="6031"><span data-dcnode-id="6044" instrument_node="">•&nbsp;</span><b data-dcnode-id="6042"><span data-dcnode-id="6043" instrument_node="">hue</span></b><span data-dcnode-id="6041" instrument_node=""> as either </span><i data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">red, orange, yellow, green, blue</span></i><span data-dcnode-id="6038" instrument_node=""> or </span><i data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">violet;</span></i><span data-dcnode-id="6035" instrument_node=""> or any compound of two adjacent hue words, with the dominant hue named after the subordinate hue (as noun after adjective): </span><i data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">red violet</span></i><span data-dcnode-id="6032" instrument_node=""> is a violet tinted with some red.</span></p><span data-dcnode-id="6030" instrument_node="">
</span><p data-dcnode-id="6010"><span data-dcnode-id="6029" instrument_node="">•&nbsp;</span><b data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">hue purity</span></b><span data-dcnode-id="6026" instrument_node=""> as either </span><i data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">chroma</span></i><span data-dcnode-id="6023" instrument_node=""> or </span><i data-dcnode-id="6021"><span data-dcnode-id="6022" instrument_node="">saturation</span></i><span data-dcnode-id="6020" instrument_node=""> and using the adjectives </span><i data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">near neutral</span></i><span data-dcnode-id="6017" instrument_node=""> or </span><i data-dcnode-id="6015"><span data-dcnode-id="6016" instrument_node="">dull</span></i><span data-dcnode-id="6014" instrument_node=""> (for low chroma color) and </span><i data-dcnode-id="6012"><span data-dcnode-id="6013" instrument_node="">intense</span></i><span data-dcnode-id="6011" instrument_node=""> (for high or maximum chroma color).</span></p><span data-dcnode-id="6009" instrument_node="">
</span><p data-dcnode-id="5992"><span data-dcnode-id="6008" instrument_node="">•&nbsp;</span><b data-dcnode-id="6006"><span data-dcnode-id="6007" instrument_node="">warm vs. cool</span></b><span data-dcnode-id="6005" instrument_node=""> — </span><i data-dcnode-id="6003"><span data-dcnode-id="6004" instrument_node="">warm</span></i><span data-dcnode-id="6002" instrument_node=""> colors are hues of yellow, orange and red that contain no visible blue or green; </span><i data-dcnode-id="6000"><span data-dcnode-id="6001" instrument_node="">cool</span></i><span data-dcnode-id="5999" instrument_node=""> colors are hues of blue and green that contain no visible yellow or red; </span><i data-dcnode-id="5997"><span data-dcnode-id="5998" instrument_node="">warmer</span></i><span data-dcnode-id="5996" instrument_node=""> colors are closer to red orange, and </span><i data-dcnode-id="5994"><span data-dcnode-id="5995" instrument_node="">cooler</span></i><span data-dcnode-id="5993" instrument_node=""> colors are closer to green blue.</span></p><span data-dcnode-id="5991" instrument_node="">
</span><p data-dcnode-id="5980"><span data-dcnode-id="5990" instrument_node="">•&nbsp;</span><b data-dcnode-id="5988"><span data-dcnode-id="5989" instrument_node="">physical attributes</span></b><span data-dcnode-id="5987" instrument_node="">, either of the surface texture or of the internal transmittance and/or refraction of light, can be described with terms such as </span><i data-dcnode-id="5985"><span data-dcnode-id="5986" instrument_node="">gloss, transparency, translucency, pearlescence, iridescence</span></i><span data-dcnode-id="5984" instrument_node=""> and </span><i data-dcnode-id="5982"><span data-dcnode-id="5983" instrument_node="">fluorescence.</span></i><a data-dcnode-id="5981" name="colorspace"></a></p><span data-dcnode-id="5979" instrument_node="">
</span><p data-dcnode-id="5968"><span class="rubric" data-dcnode-id="5977"><span data-dcnode-id="5978" instrument_node="">The Color Space</span></span><span data-dcnode-id="5976" instrument_node="">. The colormaking attributes are useful because they correspond to the visually most important differences among colors, and because they can be arranged to define a three dimensional </span><b data-dcnode-id="5974"><span data-dcnode-id="5975" instrument_node="">color space</span></b><span data-dcnode-id="5973" instrument_node="">, the geometrical framework for all </span><a class="text" data-dcnode-id="5971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html"><span data-dcnode-id="5972" instrument_node="">modern color models</span></a><span data-dcnode-id="5970" instrument_node="">.</span><a data-dcnode-id="5969" name="ctprin09"></a></p><span data-dcnode-id="5967" instrument_node="">
</span><p data-dcnode-id="5955"><b data-dcnode-id="5956"><span data-dcnode-id="5966" instrument_node="">9. All colors can be uniquely identified and related to each other as locations within a </span><i data-dcnode-id="5964"><span data-dcnode-id="5965" instrument_node="">color space,</span></i><span data-dcnode-id="5963" instrument_node=""> specified by the dimensions of </span><i data-dcnode-id="5961"><span data-dcnode-id="5962" instrument_node="">brightness/lightness, hue</span></i><span data-dcnode-id="5960" instrument_node=""> and </span><i data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">hue purity</span></i><span data-dcnode-id="5957" instrument_node="">.</span></b></p><span data-dcnode-id="5954" instrument_node="">
</span><p data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">The figure below shows how a color space is put together.</span></p><span data-dcnode-id="5951" instrument_node="">
</span><p class="imgC" data-dcnode-id="5949"><img data-dcnode-id="5950" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/hsv.gif&amp;raw" width="278"></p><span data-dcnode-id="5948" instrument_node="">
</span><p class="CC" data-dcnode-id="5944"><span data-dcnode-id="5947" instrument_node="">the geometry of colormaking attributes</span><br data-dcnode-id="5946"><span data-dcnode-id="5945" instrument_node="">in a modern color space</span></p><span data-dcnode-id="5943" instrument_node="">
</span><p data-dcnode-id="5920"><span data-dcnode-id="5942" instrument_node="">The vertical dimension is the </span><i data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">lightness or value</span></i><span data-dcnode-id="5939" instrument_node=""> of a color; by itself, this dimension defines a </span><b data-dcnode-id="5937"><span data-dcnode-id="5938" instrument_node="">gray scale</span></b><span data-dcnode-id="5936" instrument_node=""> of values from black to white. The circumference of the horizontal disk, perpendicular to the lightness dimension, is the </span><i data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">hue</span></i><span data-dcnode-id="5933" instrument_node=""> of a color; this defines a </span><b data-dcnode-id="5931"><span data-dcnode-id="5932" instrument_node="">hue circle</span></b><span data-dcnode-id="5930" instrument_node=""> that places hues in their spectrum order. The lateral distance or radius on this disk, measured from the center outward, is the </span><i data-dcnode-id="5928"><span data-dcnode-id="5929" instrument_node="">hue purity</span></i><span data-dcnode-id="5927" instrument_node=""> of a color, usually stated as its relative </span><i data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">chroma</span></i><span data-dcnode-id="5924" instrument_node=""> or absolute </span><i data-dcnode-id="5922"><span data-dcnode-id="5923" instrument_node="">colorfulness.</span></i><a data-dcnode-id="5921" name="modeltypes"></a></p><span data-dcnode-id="5919" instrument_node="">
</span><p data-dcnode-id="5912"><span data-dcnode-id="5918" instrument_node="">You will find color models in many different shapes, proposed by </span><a class="text" data-dcnode-id="5916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colorcube.com/articles/models/model.htm"><span data-dcnode-id="5917" instrument_node="">different color experts</span></a><span data-dcnode-id="5915" instrument_node="">. However, modern color spaces are generally of two types (diagram, right):</span><br data-dcnode-id="5914"><a data-dcnode-id="5913" name="ctprin10"></a></p></td><td colspan="2" data-dcnode-id="5909" valign="top"></td></tr><tr data-dcnode-id="5241"><td colspan="2" data-dcnode-id="5904"></td><td align="left" data-dcnode-id="5256" valign="top"><span data-dcnode-id="5902" instrument_node="">10. Modern color spaces are of two types: a </span><i data-dcnode-id="5900"><span data-dcnode-id="5901" instrument_node="">colorant</span></i><span data-dcnode-id="5899" instrument_node=""> space is based on mixtures of real or imaginary "primary" colors, and a </span><i data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">perceptual</span></i><span data-dcnode-id="5896" instrument_node=""> color space is based on the visual colormaking attributes.</span><p data-dcnode-id="5895"></p><span data-dcnode-id="5894" instrument_node="">
</span><p data-dcnode-id="5883"><span data-dcnode-id="5893" instrument_node="">•&nbsp;The </span><i data-dcnode-id="5891"><span data-dcnode-id="5892" instrument_node="">colorant color spaces</span></i><span data-dcnode-id="5890" instrument_node=""> (for example, the Swedish </span><a class="text" data-dcnode-id="5888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23NCSmodel"><span data-dcnode-id="5889" instrument_node="">Natural Color System</span></a><span data-dcnode-id="5887" instrument_node=""> or the </span><a class="text" data-dcnode-id="5885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/RGB_color_space"><span data-dcnode-id="5886" instrument_node="">RGB color space</span></a><span data-dcnode-id="5884" instrument_node="">) all stipulate that (1) the color space will have a simple geometrical form; (2) the geometrical distances between three or four "primary" colors are equal; (3) colors are defined as the proportional mixture of primary colors necessary to match the color.</span></p><span data-dcnode-id="5882" instrument_node="">
</span><p data-dcnode-id="5876"><span data-dcnode-id="5881" instrument_node="">•&nbsp;The </span><i data-dcnode-id="5879"><span data-dcnode-id="5880" instrument_node="">perceptual color spaces,</span></i><span data-dcnode-id="5878" instrument_node=""> (for example, the recent CIE models CIELAB or CIECAM, Manfred Richter's DIN, the OSA UCS system) do not impose colorant boundaries or a specific geometrical shape on the distribution of colors. They only require the hue circle and chroma to be perpendicular to the lightness dimension: colors are located by measuring their actual lightness, hue and hue purity.</span><a data-dcnode-id="5877" name="spacedifferences"></a></p><span data-dcnode-id="5875" instrument_node="">
</span><p data-dcnode-id="5870"><span data-dcnode-id="5874" instrument_node="">Peceptual color spaces describe all visual colors, either of light or of materials or both, and are standard in color vision research. Colorant color models are not visual color spaces, because lightness/brightness, hue and hue purity are not defined within them. Instead they are </span><a class="text" data-dcnode-id="5872" href="#schematicgamuts"><span data-dcnode-id="5873" instrument_node="">schematic gamuts</span></a><span data-dcnode-id="5871" instrument_node=""> — geometrically simplified diagrams of the colors produced by all possible mixture proportions among the primary colorants used in subtractive (paints, inks) or additive (phosphors, lights) color reproduction media.</span></p><span data-dcnode-id="5869" instrument_node="">
</span><p data-dcnode-id="5861"><span data-dcnode-id="5868" instrument_node="">For the purposes of the study of color harmony and contrast, it is useful to understand all color models or color spaces can be categorized into one of two categories — </span><i data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">colorant spaces</span></i><span data-dcnode-id="5865" instrument_node=""> and </span><i data-dcnode-id="5863"><span data-dcnode-id="5864" instrument_node="">perceptual spaces</span></i><span data-dcnode-id="5862" instrument_node="">:
</span></p><span data-dcnode-id="5860" instrument_node="">

9"><hr data-dcnode-id="5760" size="0" width="100%"></td></tr><tr align="center" data-dcnode-id="5747"><td data-dcnode-id="5754"><i data-dcnode-id="5755"><span data-dcnode-id="5756" instrument_node="">Luminance</span></i></td><td data-dcnode-id="5751"><b data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">Black</span></b></td><td data-dcnode-id="5748"><b data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">Lightness</span></b></td></tr><tr align="center" data-dcnode-id="5736"><td data-dcnode-id="5743"><i data-dcnode-id="5744"><span data-dcnode-id="5745" instrument_node="">Hue</span></i></td><td data-dcnode-id="5740"><b data-dcnode-id="5741"><span data-dcnode-id="5742" instrument_node="">Pure Pigment(s)</span></b></td><td data-dcnode-id="5737"><b data-dcnode-id="5738"><span data-dcnode-id="5739" instrument_node="">Opponent Dimensions</span></b></td></tr><tr align="center" data-dcnode-id="5725"><td data-dcnode-id="5732"><i data-dcnode-id="5733"><span data-dcnode-id="5734" instrument_node="">Hue Purity</span></i></td><td data-dcnode-id="5729"><b data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">White</span></b></td><td data-dcnode-id="5726"><b data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">Chroma</span></b></td></tr><tr align="center" data-dcnode-id="5712"><td data-dcnode-id="5721"><i data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">Examples</span></i></td><td data-dcnode-id="5717"><span data-dcnode-id="5720" instrument_node="">NCS, DIN,</span><br data-dcnode-id="5719"><span data-dcnode-id="5718" instrument_node="">CYMK</span></td><td data-dcnode-id="5713"><span data-dcnode-id="5716" instrument_node="">CIELAB</span><br data-dcnode-id="5715"><span data-dcnode-id="5714" instrument_node="">CIECAM (with J)</span></td></tr><tr align="center" data-dcnode-id="5708"><td colspan="3" data-dcnode-id="5709"><hr data-dcnode-id="5710" size="2" width="100%"></td></tr></tbody></table><span data-dcnode-id="5704" instrument_node="">
</span></td></tr></tbody></table><p data-dcnode-id="5698"></p><span data-dcnode-id="5697" instrument_node="">
</span><p data-dcnode-id="5689"><span data-dcnode-id="5696" instrument_node="">The fundamental difference is whether the color model first chooses a limited set of "primary" colorants — real or imaginary, additive or subtractive — and generates all color combinations from all possible mixture proportions of those primaries within a </span><i data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">mixture gamut</span></i><span data-dcnode-id="5693" instrument_node="">, or first defines fundamental perceptual dimensions of equal color difference, then locates colors within the </span><i data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">perceptual limits</span></i><span data-dcnode-id="5690" instrument_node=""> of normal (average) color vision.</span></p><span data-dcnode-id="5688" instrument_node="">
</span><p data-dcnode-id="5683"><span data-dcnode-id="5687" instrument_node="">These models tend to have a characteristic form, as well. Colorant models are often represented in a </span><i data-dcnode-id="5685"><span data-dcnode-id="5686" instrument_node="">double conical</span></i><span data-dcnode-id="5684" instrument_node=""> geometry, in which the hue circle is mixed with various proportions of white and/or black. In contrast perceptual models, as they enclose the irregular shape of perceptual color limits, choose instead a cylindrical form that does not impose any arbitrary geometry on the distribution of colors.</span></p><span data-dcnode-id="5682" instrument_node="">
</span><p class="imgC" data-dcnode-id="5680"><img data-dcnode-id="5681" height="482" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/cssolid.gif&amp;raw" width="380"></p><span data-dcnode-id="5679" instrument_node="">
</span><p class="CC" data-dcnode-id="5677"><span data-dcnode-id="5678" instrument_node="">anatomy of a colorant model</span></p><span data-dcnode-id="5676" instrument_node="">
</span><p data-dcnode-id="5662"><span data-dcnode-id="5675" instrument_node="">The diagram (above) shows the logical structure of a pigment color solid of white (</span><b data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">W</span></b><span data-dcnode-id="5672" instrument_node="">), black (</span><b data-dcnode-id="5670"><span data-dcnode-id="5671" instrument_node="">K</span></b><span data-dcnode-id="5669" instrument_node="">) and "pure color" pigment (</span><b data-dcnode-id="5667"><span data-dcnode-id="5668" instrument_node="">C</span></b><span data-dcnode-id="5666" instrument_node="">). (Note that the "pure color" </span><b data-dcnode-id="5664"><span data-dcnode-id="5665" instrument_node="">C</span></b><span data-dcnode-id="5663" instrument_node=""> must often be a mixture of two other pigments, which is necessary to produce the hue variety around the hue circle.)</span></p><span data-dcnode-id="5661" instrument_node="">
</span><p data-dcnode-id="5653"><span data-dcnode-id="5660" instrument_node="">The upper figure shows how the proportions of </span><b data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">W</span></b><span data-dcnode-id="5657" instrument_node=""> and </span><b data-dcnode-id="5655"><span data-dcnode-id="5656" instrument_node="">K</span></b><span data-dcnode-id="5654" instrument_node=""> are varied across a hue slice, each contributing from 0% to 100% of the total mixture and their combined percentages ranging from 0% at the side apex to 100% along the central axis or gray scale. The "pure color" is increased from 0% at the gray scale to 100% at the side apex of the hue slice. When the three pigments are combined according to these percentages, along with the complementary color opposite, the result is a diamond shaped slice through the color solid (lower figure). Equivalent slices are produced for incremental complementary hues all the way around the hue circle.</span></p><span data-dcnode-id="5652" instrument_node="">
</span><p data-dcnode-id="5647"><span data-dcnode-id="5651" instrument_node="">When a pigment color solid (indeed </span><i data-dcnode-id="5649"><span data-dcnode-id="5650" instrument_node="">any</span></i><span data-dcnode-id="5648" instrument_node=""> media color solid, including the RGB color space of your computer monitor) is located within a uniform color space (such as CIELAB or CIECAM), the tidy triangular geometry appears significantly altered (diagram, below).</span></p><span data-dcnode-id="5646" instrument_node="">
</span><p class="imgC" data-dcnode-id="5644"><img data-dcnode-id="5645" height="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/csspace.gif&amp;raw" width="380"></p><span data-dcnode-id="5643" instrument_node="">
</span><p class="CC" data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">the colorant model in a uniform color space (CIELAB)</span></p><span data-dcnode-id="5640" instrument_node="">
</span><p data-dcnode-id="5638"><span data-dcnode-id="5639" instrument_node="">In this example, the perceived differences among the orange red mixtures are much greater than those among the green blue mixtures; the pure green blue, orange red and middle gray are all of a different value (lightness); and the contours of the K, W and C mixtures are curved rather than straight. These three differences are the inevitable result of producing a color solid through material pigment mixtures, and they are disguised by displaying the pigment mixtures within a rigid geometrical framework. The distortions result from differences in the lightness and chroma of the two pigments (or pigment mixtures) used to define complementary "pure" colors, and from differences in the relative tinting strength of the pigments in relation to black and white.</span></p><span data-dcnode-id="5637" instrument_node="">
</span><p data-dcnode-id="5623"><span data-dcnode-id="5636" instrument_node="">The variety of mixture models is enormous — including the </span><a class="text" data-dcnode-id="5634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23Ypsf"><span data-dcnode-id="5635" instrument_node="">CIE Yxy</span></a><span data-dcnode-id="5633" instrument_node=""> model based on imaginary (invisible) primary lights, the electronic </span><a class="text" data-dcnode-id="5631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/RGB_color_model"><span data-dcnode-id="5632" instrument_node="">RGB</span></a><span data-dcnode-id="5630" instrument_node=""> standard based on real phosphors or lights, the </span><a class="text" data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23NCS"><span data-dcnode-id="5629" instrument_node="">Natural Color System</span></a><span data-dcnode-id="5627" instrument_node=""> (NCS) based on imaginary (visualized) pure hues, or the various print regimes based on real </span><a class="text" data-dcnode-id="5625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/CMYK_color_model"><span data-dcnode-id="5626" instrument_node="">CYMK</span></a><span data-dcnode-id="5624" instrument_node=""> inks. These models are generally developed for specific color reproduction applications (which use the specific primary colors in the model), are easy to implement, and have high practical utility.</span></p><span data-dcnode-id="5622" instrument_node="">
</span><p data-dcnode-id="5605"><span data-dcnode-id="5621" instrument_node="">The </span><i data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">uniform color space</span></i><span data-dcnode-id="5618" instrument_node=""> (UCS) models, in contrast, , pigment models include the </span><a class="text" data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23runge"><span data-dcnode-id="5617" instrument_node="">Runge</span></a><span data-dcnode-id="5615" instrument_node=""> and </span><a class="text" data-dcnode-id="5613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23hemisphere"><span data-dcnode-id="5614" instrument_node="">Chevreul</span></a><span data-dcnode-id="5612" instrument_node=""> color solids and the Ostwald and </span><a class="text" data-dcnode-id="5610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23NCS"><span data-dcnode-id="5611" instrument_node="">Swedish NCS</span></a><span data-dcnode-id="5609" instrument_node=""> color models. These are generally closer to the painter's traditional conceptions of color mixing; </span><i data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">saturation</span></i><span data-dcnode-id="5606" instrument_node=""> is the preferred measure of hue purity, and hues are proportional mixtures of "pure colors" that are commonly either the painter's primaries (CYM) or artist's primaries (RYGB).</span></p><span data-dcnode-id="5604" instrument_node="">
</span><p data-dcnode-id="5583"><span data-dcnode-id="5603" instrument_node="">What is a color space good for? First, it provides an unambiguous way to systematically label and display colors using the colormaking attributes: any possible combination of lightness, hue and hue purity (chroma or saturation) locates a specific point in the color space, and that point represents every surface or object with those three color attributes. Second, a color space provides an explicit way to compare colors: similar colors will be located near each other in the color space, and very dissimilar colors will be located far apart, so we can use </span><i data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">distance</span></i><span data-dcnode-id="5600" instrument_node=""> within the color space to specify the </span><i data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">perceived difference</span></i><span data-dcnode-id="5597" instrument_node=""> between any two colors. Third, the color space allows the conceptual description or grouping of colors according to their </span><i data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node="">relative position</span></i><span data-dcnode-id="5594" instrument_node=""> within the color space — such as </span><i data-dcnode-id="5592"><span data-dcnode-id="5593" instrument_node="">complementary, triadic, analogous, nuance, shade, tone</span></i><span data-dcnode-id="5591" instrument_node=""> or </span><i data-dcnode-id="5589"><span data-dcnode-id="5590" instrument_node="">tint.</span></i><span data-dcnode-id="5588" instrument_node=""> Of course, this third purpose is how the hue circle, as a </span><a class="text" data-dcnode-id="5586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html"><span data-dcnode-id="5587" instrument_node="">color wheel</span></a><span data-dcnode-id="5585" instrument_node="">, has been used in traditional color theory.</span><a data-dcnode-id="5584" name="heritage"></a></p><span data-dcnode-id="5582" instrument_node="">
</span><p class="floatArrow" data-dcnode-id="5579"><a data-dcnode-id="5580" href="#top"><img border="0" data-dcnode-id="5581" height="14" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/nabup.gif&amp;raw" width="10"></a></p><h3 data-dcnode-id="5577"><span data-dcnode-id="5578" instrument_node="">misconceptions in traditional color theory</span></h3><span data-dcnode-id="5576" instrument_node="">
</span><p data-dcnode-id="5570"><img align="left" data-dcnode-id="5575" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="60"><span data-dcnode-id="5574" instrument_node="">A large portion of the color theory taught to artists today is </span><a class="text" data-dcnode-id="5572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23edwards"><span data-dcnode-id="5573" instrument_node="">traditional color knowledge</span></a><span data-dcnode-id="5571" instrument_node="">. Traditional means, established a long time ago — in the 18th and 19th centuries, in fact. As with many ideas commonly believed in the 18th century (such as the inferiority of women, or the divine right of kings), most of these ideas are either patently false or useless as a guide to painting technique.</span></p><span data-dcnode-id="5569" instrument_node="">
</span><p data-dcnode-id="5567"><span data-dcnode-id="5568" instrument_node="">Before we can lay out a modern color theory, we have to address and dispell the most significant of these traditional color misconceptions. The most important, and the most enlightening to explore, involve "primary" colors and color mixtures.

</span></p><hr data-dcnode-id="5566" rule="" width="100%"><p data-dcnode-id="5565"></p><span data-dcnode-id="5564" instrument_node="">
</span><p class="CC" data-dcnode-id="5562"><span data-dcnode-id="5563" instrument_node="">12 misconceptions in traditional color theory</span></p><span data-dcnode-id="5561" instrument_node="">
</span><p data-dcnode-id="5553"><span data-dcnode-id="5560" instrument_node="">•&nbsp;"Color" is either </span><i data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">in</span></i><span data-dcnode-id="5557" instrument_node=""> light or </span><i data-dcnode-id="5555"><span data-dcnode-id="5556" instrument_node="">in</span></i><span data-dcnode-id="5554" instrument_node=""> pigments.</span></p><span data-dcnode-id="5552" instrument_node="">
</span><p data-dcnode-id="5550"><span data-dcnode-id="5551" instrument_node="">•&nbsp;All color is created by the mixture of three "primary" colors.</span></p><span data-dcnode-id="5549" instrument_node="">
</span><p data-dcnode-id="5542"><span data-dcnode-id="5548" instrument_node="">•&nbsp;The three primary colors of paint are </span><i data-dcnode-id="5546"><span data-dcnode-id="5547" instrument_node="">red, yellow</span></i><span data-dcnode-id="5545" instrument_node=""> and </span><i data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">blue.</span></i></p><span data-dcnode-id="5541" instrument_node="">
</span><p data-dcnode-id="5533"><span data-dcnode-id="5540" instrument_node="">•&nbsp;You cannot mix a primary </span><i data-dcnode-id="5538"><span data-dcnode-id="5539" instrument_node="">red, yellow</span></i><span data-dcnode-id="5537" instrument_node=""> or </span><i data-dcnode-id="5535"><span data-dcnode-id="5536" instrument_node="">blue</span></i><span data-dcnode-id="5534" instrument_node=""> using any other colors.</span></p><span data-dcnode-id="5532" instrument_node="">
</span><p data-dcnode-id="5527"><span data-dcnode-id="5531" instrument_node="">•&nbsp;</span><i data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">Saturated hue</span></i><span data-dcnode-id="5528" instrument_node=""> is the defining or "pure" color attribute.</span></p><span data-dcnode-id="5526" instrument_node="">
</span><p data-dcnode-id="5524"><span data-dcnode-id="5525" instrument_node="">•&nbsp;The color of a paint is identical with the color of light it reflects.</span></p><span data-dcnode-id="5523" instrument_node="">
</span><p data-dcnode-id="5518"><span data-dcnode-id="5522" instrument_node="">•&nbsp;Primary colors of paint cannot mix all possible colors, because paints are </span><i data-dcnode-id="5520"><span data-dcnode-id="5521" instrument_node="">impure</span></i><span data-dcnode-id="5519" instrument_node=""> colors.</span></p><span data-dcnode-id="5517" instrument_node="">
</span><p data-dcnode-id="5512"><span data-dcnode-id="5516" instrument_node="">•&nbsp;A "split primary" palette overcomes the </span><i data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">impurity</span></i><span data-dcnode-id="5513" instrument_node=""> of paint colors.</span></p><span data-dcnode-id="5511" instrument_node="">
</span><p data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">•&nbsp;With a split primary palette, do not mix colors "across the line" of a primary color.</span></p><span data-dcnode-id="5508" instrument_node="">
</span><p data-dcnode-id="5506"><span data-dcnode-id="5507" instrument_node="">•&nbsp;Transparent watercolors achieve pure color because light is reflected from the paper through the pigments, "like light through a stained glass window".</span></p><span data-dcnode-id="5505" instrument_node="">
</span><p data-dcnode-id="5497"><span data-dcnode-id="5504" instrument_node="">•&nbsp;</span><i data-dcnode-id="5502"><span data-dcnode-id="5503" instrument_node="">Secondary</span></i><span data-dcnode-id="5501" instrument_node=""> colors are 1:1 mixtures of two primary colors, and </span><i data-dcnode-id="5499"><span data-dcnode-id="5500" instrument_node="">tertiary</span></i><span data-dcnode-id="5498" instrument_node=""> colors are 1:1 mixtures of two secondary colors.</span></p><span data-dcnode-id="5496" instrument_node="">
</span><p data-dcnode-id="5494"><span data-dcnode-id="5495" instrument_node="">•&nbsp;Painters use the primary color framework to analyze visual colors and paint mixtures.
</span></p><hr data-dcnode-id="5493" rule="" width="100%"><p data-dcnode-id="5492"></p><span data-dcnode-id="5491" instrument_node="">
</span><p data-dcnode-id="5488"><span data-dcnode-id="5490" instrument_node="">I will address each misconception in turn, and either explain or demonstrate factually why it is wrong.</span><a data-dcnode-id="5489" name="cterror01"></a></p><span data-dcnode-id="5487" instrument_node="">
</span><p data-dcnode-id="5477"><span class="rubric" data-dcnode-id="5479"><span data-dcnode-id="5486" instrument_node="">1. "Color" is either </span><i data-dcnode-id="5484"><span data-dcnode-id="5485" instrument_node="">in</span></i><span data-dcnode-id="5483" instrument_node=""> light or </span><i data-dcnode-id="5481"><span data-dcnode-id="5482" instrument_node="">in</span></i><span data-dcnode-id="5480" instrument_node=""> pigments</span></span><span data-dcnode-id="5478" instrument_node="">.</span></p><span data-dcnode-id="5476" instrument_node="">
</span><p data-dcnode-id="5465"><span data-dcnode-id="5475" instrument_node="">We start with the traditional conception of what color </span><i data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">is.</span></i><span data-dcnode-id="5472" instrument_node=""> To unravel this conception, ask yourself: </span><i data-dcnode-id="5467"><span data-dcnode-id="5471" instrument_node="">"what </span><u data-dcnode-id="5469"><span data-dcnode-id="5470" instrument_node="">kind</span></u><span data-dcnode-id="5468" instrument_node=""> of color is a primary color?"</span></i><span data-dcnode-id="5466" instrument_node=""> Is the color in a paint, or in the light, or in the mind? Can we have an ounce of yellow, or a lux of yellow, or a sensory unit of pure imagined yellow? Where is the yellow we are talking about?</span></p><span data-dcnode-id="5464" instrument_node="">
</span><p data-dcnode-id="5456"><span data-dcnode-id="5463" instrument_node="">Though references to three "primary" or "primitive" colors can be found as far back as the writings of the ancient Greeks and Romans, the primary color dogma as we have it today was first explicitly advanced in the early 1700's. The entrepreneurial German printer </span><b data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">Jakob Christoffel Le&nbsp;Blon</span></b><span data-dcnode-id="5460" instrument_node=""> (1667-1741) stated the basic principles clearly in his </span><i data-dcnode-id="5458"><span data-dcnode-id="5459" instrument_node="">Coloritto: or the Harmony of Coloring in Painting Reduced to Mechanical Practice</span></i><span data-dcnode-id="5457" instrument_node=""> (1725):</span></p><span data-dcnode-id="5455" instrument_node="">
</span><p data-dcnode-id="5398"><i data-dcnode-id="5453"><span data-dcnode-id="5454" instrument_node="">Painting can represent all</span></i><span data-dcnode-id="5452" instrument_node=""> visible </span><i data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">Objects with three Colours,</span></i><span data-dcnode-id="5449" instrument_node=""> Yellow, Red</span><i data-dcnode-id="5447"><span data-dcnode-id="5448" instrument_node=""> and</span></i><span data-dcnode-id="5446" instrument_node=""> Blue;</span><i data-dcnode-id="5444"><span data-dcnode-id="5445" instrument_node=""> for all other Colours can be compos'd of these</span></i><span data-dcnode-id="5443" instrument_node=""> Three, </span><i data-dcnode-id="5441"><span data-dcnode-id="5442" instrument_node="">which I call</span></i><span data-dcnode-id="5440" instrument_node=""> Primitive. ... </span><i data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">And a mixture of those</span></i><span data-dcnode-id="5437" instrument_node=""> Three original Colours makes a Black, </span><i data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">and all</span></i><span data-dcnode-id="5434" instrument_node=""> other </span><i data-dcnode-id="5432"><span data-dcnode-id="5433" instrument_node="">Colours whatsoever. ... I am only speaking of</span></i><span data-dcnode-id="5431" instrument_node=""> Material</span><i data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node=""> Colours, or those used by</span></i><span data-dcnode-id="5428" instrument_node=""> Painters;</span><i data-dcnode-id="5426"><span data-dcnode-id="5427" instrument_node=""> for a mixture of</span></i><span data-dcnode-id="5425" instrument_node=""> all </span><i data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">the primitive</span></i><span data-dcnode-id="5422" instrument_node=""> impalpable </span><i data-dcnode-id="5420"><span data-dcnode-id="5421" instrument_node="">Colours</span></i><span data-dcnode-id="5419" instrument_node=""> [of light], </span><i data-dcnode-id="5417"><span data-dcnode-id="5418" instrument_node="">that cannot be felt, will not produce</span></i><span data-dcnode-id="5416" instrument_node=""> Black,</span><i data-dcnode-id="5414"><span data-dcnode-id="5415" instrument_node=""> but the very Contrary,</span></i><span data-dcnode-id="5413" instrument_node=""> White, </span><i data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">as the great Sir Isaac Newton has demonstrated in his Opticks.</span></i><span data-dcnode-id="5410" instrument_node=""> White,</span><i data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node=""> is a Concentration, or an</span></i><span data-dcnode-id="5407" instrument_node=""> Excess</span><i data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node=""> of Lights.</span></i><span data-dcnode-id="5404" instrument_node=""> Black</span><i data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node=""> is a deep Hiding, or</span></i><span data-dcnode-id="5401" instrument_node=""> Privation </span><i data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">of Lights.</span></i></p><span data-dcnode-id="5397" instrument_node="">
</span><p data-dcnode-id="5381"><span data-dcnode-id="5396" instrument_node="">Although LeBlon emphasizes the distinction between colors of paint and colors of light, traditional color theorists quickly agreed that </span><i data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">all color is in the light,</span></i><span data-dcnode-id="5393" instrument_node=""> as "colored light". They simply ignored the fact that Isaac Newton, in his </span><i data-dcnode-id="5391"><span data-dcnode-id="5392" instrument_node="">Opticks</span></i><span data-dcnode-id="5390" instrument_node=""> (1704), </span><a class="text" data-dcnode-id="5388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23colormind"><span data-dcnode-id="5389" instrument_node="">carefully dismissed this idea</span></a><span data-dcnode-id="5387" instrument_node="">, stating instead that </span><b data-dcnode-id="5385"><span data-dcnode-id="5386" instrument_node="">color is a sensation in the mind</span></b><span data-dcnode-id="5384" instrument_node="">: </span><i data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">"For the Rays [of light] to speak properly are not coloured. In them there is nothing else than a certain Power and Disposition to stir up a Sensation of this or that Colour."</span></i></p><span data-dcnode-id="5380" instrument_node="">
</span><p data-dcnode-id="5371"><span data-dcnode-id="5379" instrument_node="">Well, </span><i data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">how</span></i><span data-dcnode-id="5376" instrument_node=""> does light create the color sensation? The answer turns out to be both </span><a class="text" data-dcnode-id="5374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/LS/CVS/color.html"><span data-dcnode-id="5375" instrument_node="">incredibly complex</span></a><span data-dcnode-id="5373" instrument_node=""> and still in part unknown. But artists can be guided by three basic concepts:</span><a data-dcnode-id="5372" name="ctprin11"></a></p><span data-dcnode-id="5370" instrument_node="">
</span><p data-dcnode-id="5366"><b data-dcnode-id="5368"><span data-dcnode-id="5369" instrument_node="">11. Color displays the relationship between light and light reflecting surfaces in space.</span></b><a data-dcnode-id="5367" name="ctprin12"></a></p><span data-dcnode-id="5365" instrument_node="">
</span><p data-dcnode-id="5362"><b data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">12. The five components of visual color context are: (1)&nbsp;the total illuminance level, (2) the illuminant (chromaticity of the illuminance), (3)&nbsp;the illuminance contrast between color areas, (4)&nbsp;the colormaking contrasts between color areas, and (5)&nbsp;spatial factors (size of color area, pattern, location in space).</span></b></p><span data-dcnode-id="5361" instrument_node="">
</span><p class="imgC" data-dcnode-id="5359"><img data-dcnode-id="5360" height="216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/vizcol.gif&amp;raw" width="326"></p><span data-dcnode-id="5358" instrument_node="">
</span><p class="CC" data-dcnode-id="5356"><span data-dcnode-id="5357" instrument_node="">the five components of visual color context</span></p><span data-dcnode-id="5355" instrument_node="">
</span><p data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">The five components are:</span></p><span data-dcnode-id="5352" instrument_node="">
</span><p data-dcnode-id="5340"><span data-dcnode-id="5351" instrument_node="">•&nbsp;</span><b data-dcnode-id="5348"><u data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">total illuminance level</span></u></b><span data-dcnode-id="5347" instrument_node=""> - this is the total quantity of light incident on (falling on) the colored surfaces or objects; a portion of this light is reflected by the surfaces to create their </span><i data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">luminance</span></i><span data-dcnode-id="5344" instrument_node=""> or quantity of radiated light, which in turn affects the </span><a class="text" data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23sensitivity"><span data-dcnode-id="5343" instrument_node="">luminance adaptation</span></a><span data-dcnode-id="5341" instrument_node=""> of the eye, the apparent brightness of the surfaces, and the range of lightness contrast.</span></p><span data-dcnode-id="5339" instrument_node="">
</span><p data-dcnode-id="5327"><span data-dcnode-id="5338" instrument_node="">•&nbsp;</span><b data-dcnode-id="5335"><u data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">illuminant</span></u></b><span data-dcnode-id="5334" instrument_node=""> - the combined hue and saturation (chromaticity) of all the light incident on the colored surfaces; this affects the </span><a class="text" data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23chromaadapt"><span data-dcnode-id="5333" instrument_node="">chromatic adaptation</span></a><span data-dcnode-id="5331" instrument_node=""> of the eye, the </span><a class="text" data-dcnode-id="5329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23colorrendering"><span data-dcnode-id="5330" instrument_node="">color rendering</span></a><span data-dcnode-id="5328" instrument_node=""> properties of the light, and the range of apparent chromatic contrast.
</span></p><span data-dcnode-id="5326" instrument_node="">
</span><p data-dcnode-id="5317"><span data-dcnode-id="5325" instrument_node="">•&nbsp;</span><b data-dcnode-id="5322"><u data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">illuminance contrasts</span></u></b><span data-dcnode-id="5321" instrument_node=""> - the quantity of light incident on the colored surfaces relative to the light incident on surrounding surfaces; a </span><a class="text" data-dcnode-id="5319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23lumcontrast"><span data-dcnode-id="5320" instrument_node="">disparity between the two</span></a><span data-dcnode-id="5318" instrument_node=""> will increase or decrease the lightness and chromaticity contrast between the color area and the surround.</span></p><span data-dcnode-id="5316" instrument_node="">
</span><p data-dcnode-id="5307"><span data-dcnode-id="5315" instrument_node="">•&nbsp;</span><b data-dcnode-id="5312"><u data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">colormaking contrasts</span></u></b><span data-dcnode-id="5311" instrument_node=""> - the visual color difference in lightness, hue and hue purity between the color area and the surround when both are viewed under the same "white" illumination; this may cause a variety of localized </span><a class="text" data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23chromainduct"><span data-dcnode-id="5310" instrument_node="">chromatic induction</span></a><span data-dcnode-id="5308" instrument_node=""> and chromatic adaptation effects.</span></p><span data-dcnode-id="5306" instrument_node="">
</span><p class="imgC" data-dcnode-id="5304"><img data-dcnode-id="5305" height="380" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/bartleson.jpg&amp;raw" width="380"></p><span data-dcnode-id="5303" instrument_node="">
</span><p class="CC" data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">color changes induced by simultaneous contrast on lightness</span></p><span data-dcnode-id="5300" instrument_node="">
</span><p data-dcnode-id="5295"><span data-dcnode-id="5299" instrument_node="">The example above illustrates the </span><a class="text" data-dcnode-id="5297" href="#bartbren"><span data-dcnode-id="5298" instrument_node="">Bartleson-Breneman effect</span></a><span data-dcnode-id="5296" instrument_node="">, or the change in lightness contrast induced by the lightness of the background. The gray panels in each row have exactly the same lightness, from light to dark, but the column on the far right appears to show the full range of lightness (from white to black) because it is on a light background; in the column on the far left the lightness contrasts appear condensed. This is why paintings and photographs are generally mounted on white, not black, mats.</span></p><span data-dcnode-id="5294" instrument_node="">
</span><p data-dcnode-id="5285"><span data-dcnode-id="5293" instrument_node="">•&nbsp;</span><b data-dcnode-id="5290"><u data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">spatial factors</span></u></b><span data-dcnode-id="5289" instrument_node=""> - the </span><a class="text" data-dcnode-id="5287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4a.html%23spatialcolor"><span data-dcnode-id="5288" instrument_node="">spatial interpretation</span></a><span data-dcnode-id="5286" instrument_node=""> of the color area in relation to the total visual field; these include the visual size of the color area, its location within a surface pattern, and its location in three dimensional space — relative to the viewer, to the light source, and to other surfaces or objects that may shadow or reflect light.</span></p><span data-dcnode-id="5284" instrument_node="">
</span><p class="imgC" data-dcnode-id="5282"><img data-dcnode-id="5283" height="380" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/partmix.gif&amp;raw" width="380"></p><span data-dcnode-id="5281" instrument_node="">
</span><p class="CC" data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">color changes induced by surface color patterns</span></p><span data-dcnode-id="5278" instrument_node="">
</span><p data-dcnode-id="5273"><span data-dcnode-id="5277" instrument_node="">The three examples (diagram above, top row and lower left) show the remarkable color changes that can occur in the same green color of "background" when overlaid by different colors of bands; the fourthe example (lower right) shows that these effects extend to achromatic contrasts as well. These complex and visually powerful pattern effects, as they appear in textile patterns, were the original impetus for the famous 19th century color studies by </span><a class="text" data-dcnode-id="5275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23chevreul"><span data-dcnode-id="5276" instrument_node="">Michel-Eugène Chevreul</span></a><span data-dcnode-id="5274" instrument_node="">.</span></p><span data-dcnode-id="5272" instrument_node="">
</span><p data-dcnode-id="5264"><span data-dcnode-id="5271" instrument_node="">Our natural way to talk about color is that it is </span><i data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">in</span></i><span data-dcnode-id="5268" instrument_node=""> something — in light or in paints. In fact, it is in </span><i data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">both</span></i><span data-dcnode-id="5265" instrument_node=""> lights and materials, and in their spatial relationships as well.</span></p><span data-dcnode-id="5263" instrument_node="">
</span><p data-dcnode-id="5257"><span data-dcnode-id="5262" instrument_node="">What is color </span><i data-dcnode-id="5260"><span data-dcnode-id="5261" instrument_node="">for?</span></i><span data-dcnode-id="5259" instrument_node=""> — to reveal the world.</span><a data-dcnode-id="5258" name="ctprin13"></a></p></td><td colspan="2" data-dcnode-id="5243" valign="top"><span data-dcnode-id="5254" instrument_node="">
</span><p class="imgS" data-dcnode-id="5252"><img data-dcnode-id="5253" height="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/modmod.gif&amp;raw" width="200"></p><span data-dcnode-id="5251" instrument_node="">
</span><p class="SC" data-dcnode-id="5247"><span data-dcnode-id="5250" instrument_node="">characteristic geometry of</span><br data-dcnode-id="5249"><span data-dcnode-id="5248" instrument_node="">color spaces</span></p><span data-dcnode-id="5246" instrument_node="">
</span><p class="subSC" data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">colorant spaces typically have a double cone structure (left); perceptual spaces have a cylindrical structure (right)</span></p></td></tr><tr data-dcnode-id="5080"><td colspan="2" data-dcnode-id="5238"></td><td align="left" data-dcnode-id="5093" valign="top"><p data-dcnode-id="5234"><b data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node="">13. Color vision compensates for illuminance variation, minimizes illuminant color and enhances colormaking contrasts as necessary to make light and color consistent with spatial factors (objects in space).</span></b></p><span data-dcnode-id="5233" instrument_node="">
</span><p data-dcnode-id="5228"><span data-dcnode-id="5232" instrument_node="">There are many striking and delightful illustrations of the effect that spatial factors can exert on color appearance, and these are </span><a class="text" data-dcnode-id="5230" href="#spatialcontrast"><span data-dcnode-id="5231" instrument_node="">explored below</span></a><span data-dcnode-id="5229" instrument_node="">. For now, the example of an illuminated cube (image, right) will demonstrate the basic effect.</span></p><span data-dcnode-id="5227" instrument_node="">
</span><p data-dcnode-id="5225"><span data-dcnode-id="5226" instrument_node="">Vision interprets this image as a cube under illumination that falls unequally on the three visible sides; and it construes the three sides as showing an identical tiled pattern consisting of 1 very dark central tile, surrounded by 4 dark tiles, surrounded by 8 light tiles, in a field of 12 white tiles. Color vision adopts the perception of a uniform pattern on each face of the cube to compensate for the variations in illumination, so that the pattern on each face seems to consist of the "same" four colors.</span></p><span data-dcnode-id="5224" instrument_node="">
</span><p data-dcnode-id="5212"><span data-dcnode-id="5223" instrument_node="">However, if we eliminate the illumination cues from extraneous tiles, we discover that the </span><i data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">very dark</span></i><span data-dcnode-id="5220" instrument_node=""> tile in the top pattern is actually the same digital color as the 4 </span><i data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">dark</span></i><span data-dcnode-id="5217" instrument_node=""> tiles on the left side and the 12 </span><i data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">white</span></i><span data-dcnode-id="5214" instrument_node=""> tiles on the right side! In other words, color vision has taken perceptually dark color areas and subjectively lightened them so that the are consistent both with an identical surface pattern on each face of the cube and with differences in illumination across different faces of the cube.</span><a data-dcnode-id="5213" name="ctprin14"></a></p><span data-dcnode-id="5211" instrument_node="">
</span><p data-dcnode-id="5208"><b data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">14. Surfaces in space define areas of reduced color contrast separated by edges and colors of enhanced color contrast.</span></b></p><span data-dcnode-id="5207" instrument_node="">
</span><p data-dcnode-id="5202"><span data-dcnode-id="5206" instrument_node="">Color adheres to our world, it appears firmly woven into materials and light. It is an essential dimension of our experience of space. All of this is the result of complex processes of </span><a class="text" data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html"><span data-dcnode-id="5205" instrument_node="">adaptation, anchoring and contrast</span></a><span data-dcnode-id="5203" instrument_node="">.</span></p><span data-dcnode-id="5201" instrument_node="">
</span><p data-dcnode-id="5190"><span data-dcnode-id="5200" instrument_node="">Despite the complexity, much of color perception is </span><i data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">implicit.</span></i><span data-dcnode-id="5197" instrument_node=""> We are rarely conscious of the judgmental process that goes into defining color in a specific situation, under a specific kind of light in a specific spatial location. We simply </span><i data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">see</span></i><span data-dcnode-id="5194" instrument_node=""> the color </span><i data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">as</span></i><span data-dcnode-id="5191" instrument_node=""> illuminated objects in space.</span></p><span data-dcnode-id="5189" instrument_node="">
</span><p data-dcnode-id="5187"><span data-dcnode-id="5188" instrument_node="">The color of surfaces and objects is fundamentally sensitive to the light illuminating them — the intensity of the light, and its color.</span></p><span data-dcnode-id="5186" instrument_node="">
</span><p data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">Color changes radically as the intensity of illuminance changes from faint (such as moonlight) to bright (such as noon daylight). As light increases, colors become more saturated, hues expand into subtle shades, and the contrast between lights and darks increases. In darkness, all colors are reduced to gradations of gray.</span></p><span data-dcnode-id="5183" instrument_node="">
</span><p data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">The color of the light mixes subtractively with surface colors. Under yellow light, green blues appear green, reds appear orange, grays appear yellow, and blues appear gray.</span></p><span data-dcnode-id="5180" instrument_node="">
</span><p data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">The eye preserves these color changes but the mind disregards them.</span></p><span data-dcnode-id="5177" instrument_node="">
</span><p data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">Color vision is designed to create a clear image of the physical world. To do this, it contains numerous processes that adjust color appearance to match a sensible idea of what we are looking at.</span></p><span data-dcnode-id="5174" instrument_node="">
</span><p data-dcnode-id="5171"><span data-dcnode-id="5173" instrument_node="">As objects recede in the distance their color variations average out and their edges become more indistinct. As objects approach, their surface color variations increase and their edges become more distinct.</span><a data-dcnode-id="5172" name="cterror02"></a></p><span data-dcnode-id="5170" instrument_node="">
</span><p data-dcnode-id="5166"><span class="rubric" data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">2. All color is created by the mixture of three "primary" colors</span></span><span data-dcnode-id="5167" instrument_node="">.</span></p><span data-dcnode-id="5165" instrument_node="">
</span><p data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">An artist aware of the first three color principles immediately understands how "color is created by primary colors" is an inadequate description of color experience.</span></p><span data-dcnode-id="5162" instrument_node="">
</span><p data-dcnode-id="5159"><span data-dcnode-id="5161" instrument_node="">But, even if we limit the discussion to how colors can be mixed, or duplicated, or perceived by the eye, the belief that "primary" colors can create all colors is false.</span><a data-dcnode-id="5160" name="ctprin15"></a></p><span data-dcnode-id="5158" instrument_node="">
</span><p data-dcnode-id="5155"><b data-dcnode-id="5156"><span data-dcnode-id="5157" instrument_node="">15. All "primary" colors are either imaginary concept colors or imperfect material colors. No visual color is "primary".</span></b></p><span data-dcnode-id="5154" instrument_node="">
</span><p data-dcnode-id="5143"><span data-dcnode-id="5153" instrument_node="">If we chase primary colors down to their fundamental nature, we find there are actually </span><i data-dcnode-id="5151"><span data-dcnode-id="5152" instrument_node="">two kinds</span></i><span data-dcnode-id="5150" instrument_node=""> of primary colors: the "primary" colors we use to </span><b data-dcnode-id="5148"><span data-dcnode-id="5149" instrument_node="">explain color mixtures</span></b><span data-dcnode-id="5147" instrument_node=""> (for example, "red, green and blue primaries mix all colors of light"), and the primary colors we use to actually </span><b data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">make color mixtures</span></b><span data-dcnode-id="5144" instrument_node=""> ("to match that orange color, mix three parts yellow and one part red paint").</span></p><span data-dcnode-id="5142" instrument_node="">
</span><p data-dcnode-id="5137"><span data-dcnode-id="5141" instrument_node="">And if we examine the behavior of these two different kinds of primary colors, we discover a remarkable </span><b data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">primary color paradox</span></b><span data-dcnode-id="5138" instrument_node="">:</span></p><span data-dcnode-id="5136" instrument_node="">
</span><p data-dcnode-id="5133"><i data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">The three primary colors we use to EXPLAIN COLOR MIXTURES are all imaginary: they are invisible to our eyes and have no physical reality.</span></i></p><span data-dcnode-id="5132" instrument_node="">
</span><p data-dcnode-id="5129"><i data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">The three primary colors we use to MAKE COLOR MIXTURES are all imperfect: they cannot mix all colors.</span></i></p><span data-dcnode-id="5128" instrument_node="">
</span><p data-dcnode-id="5111"><span data-dcnode-id="5127" instrument_node="">The detailed explanation of this paradox is provided on </span><a class="text" data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23imaginary"><span data-dcnode-id="5126" instrument_node="">another page</span></a><span data-dcnode-id="5124" instrument_node="">, but both these facts arise from the design of the eye: specifically, the way our </span><b data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">L</span></b><span data-dcnode-id="5121" instrument_node="">, </span><b data-dcnode-id="5119"><span data-dcnode-id="5120" instrument_node="">M</span></b><span data-dcnode-id="5118" instrument_node=""> and </span><b data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">S</span></b><span data-dcnode-id="5115" instrument_node=""> </span><a class="text" data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color1.html%23normconesens"><span data-dcnode-id="5114" instrument_node="">cone sensitivity curves</span></a><span data-dcnode-id="5112" instrument_node=""> overlap in responding to light wavelengths.</span></p><span data-dcnode-id="5110" instrument_node="">
</span><p data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">This is easiest to see if we look at the proportion of the eye's total color response that comes from each of the three types of cones, for each single wavelength (hue) across the visible spectrum (diagram, below).</span></p><span data-dcnode-id="5107" instrument_node="">
</span><p class="imgC" data-dcnode-id="5105"><img data-dcnode-id="5106" height="278" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/satsens.gif&amp;raw" width="369"></p><span data-dcnode-id="5104" instrument_node="">
</span><p class="CC" data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">L, M and S cone responses to light</span></p><span data-dcnode-id="5101" instrument_node="">
</span><p class="subCC" data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">proportion of total color signal from each type of cone produced by a single spectral wavelength, across the visible spectrum; every wavelength stimulates at least two types of cone</span></p><span data-dcnode-id="5098" instrument_node="">
</span><p data-dcnode-id="5094"><span data-dcnode-id="5097" instrument_node="">Single wavelengths of light create the most saturated color sensations possible. Yet, as the diagram shows, any single wavelength of light will stimulate at least two and (at wavelengths less than ~570&nbsp;nm) all three cones at the same time. There is no wavelength that stimulates one cone 100% and the other two cones 0%. So we never see a "pure" response from any single cone, and we never see "pure primaries" in our visual experience. We always see only </span><i data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">visual color mixtures.</span></i></p></td><td colspan="2" data-dcnode-id="5082" valign="top"><span data-dcnode-id="5091" instrument_node="">
</span><p class="imgS" data-dcnode-id="5089"><img data-dcnode-id="5090" height="446" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/purves03.jpg&amp;raw" width="200"></p><span data-dcnode-id="5088" instrument_node="">
</span><p class="SC" data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">spatial interpretation strongly affects color appearance</span></p><span data-dcnode-id="5085" instrument_node="">
</span><p class="subSC" data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">a cube tiled in four colors (top); tiles that are the same digital color (bottom)</span></p></td></tr><tr data-dcnode-id="4943"><td colspan="2" data-dcnode-id="5077"></td><td align="left" data-dcnode-id="4956" valign="top"><p data-dcnode-id="5059"><span data-dcnode-id="5075" instrument_node="">When we map these proportional </span><b data-dcnode-id="5073"><span data-dcnode-id="5074" instrument_node="">L</span></b><span data-dcnode-id="5072" instrument_node="">, </span><b data-dcnode-id="5070"><span data-dcnode-id="5071" instrument_node="">M</span></b><span data-dcnode-id="5069" instrument_node=""> and </span><b data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">S</span></b><span data-dcnode-id="5066" instrument_node=""> cone outputs in what is called a </span><a class="text" data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color1.html%23triprinciples"><span data-dcnode-id="5065" instrument_node="">trilinear mixing triangle</span></a><span data-dcnode-id="5063" instrument_node="">, we discover that these overlapping cone responses to single wavelength light create a curved limit on the maximum chroma possible across hues from yellow green to blue. This curved boundary encloses the area of all possible hue and chroma combinations, called a </span><b data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">chromaticity diagram</span></b><span data-dcnode-id="5060" instrument_node=""> (diagram, right).</span></p><span data-dcnode-id="5058" instrument_node="">
</span><p data-dcnode-id="5053"><span data-dcnode-id="5057" instrument_node="">This curved boundary </span><b data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">makes a visible primary color that can mix all other colors impossible</span></b><span data-dcnode-id="5054" instrument_node="">. Here's why:</span></p><span data-dcnode-id="5052" instrument_node="">
</span><p data-dcnode-id="5032"><span data-dcnode-id="5051" instrument_node="">•&nbsp;If we choose three </span><i data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">real</span></i><span data-dcnode-id="5048" instrument_node=""> primary colors of light (</span><b data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">R</span></b><span data-dcnode-id="5045" instrument_node="">, </span><b data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">G</span></b><span data-dcnode-id="5042" instrument_node=""> and </span><b data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">B</span></b><span data-dcnode-id="5039" instrument_node="">, diagram right), the mixtures possible with those three "primaries" create a mixing triangle (an </span><b data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">RGB</span></b><span data-dcnode-id="5036" instrument_node=""> gamut) that does not contain the entire chromaticity space — the </span><i data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">real</span></i><span data-dcnode-id="5033" instrument_node=""> primaries cannot mix all colors.</span></p><span data-dcnode-id="5031" instrument_node="">
</span><p data-dcnode-id="5005"><span data-dcnode-id="5030" instrument_node="">•&nbsp;If we define three </span><i data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">mathematical</span></i><span data-dcnode-id="5027" instrument_node=""> primary colors (</span><b data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">X</span></b><span data-dcnode-id="5024" instrument_node="">, </span><b data-dcnode-id="5022"><span data-dcnode-id="5023" instrument_node="">Y</span></b><span data-dcnode-id="5021" instrument_node=""> and </span><b data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">Z</span></b><span data-dcnode-id="5018" instrument_node="">, diagram right), whose </span><b data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">XYZ</span></b><span data-dcnode-id="5015" instrument_node=""> gamut contains the entire chromaticity diagram and therefore explains all possible colors, then these imaginary "primaries" must be located </span><i data-dcnode-id="5013"><span data-dcnode-id="5014" instrument_node="">outside</span></i><span data-dcnode-id="5012" instrument_node=""> the chromaticity diagram, and are therefore invisible. And how can a color be a </span><i data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">color,</span></i><span data-dcnode-id="5009" instrument_node=""> if you can't </span><i data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">see</span></i><span data-dcnode-id="5006" instrument_node=""> it?</span></p><span data-dcnode-id="5004" instrument_node="">
</span><p data-dcnode-id="4999"><span data-dcnode-id="5003" instrument_node="">Because it is impossible to create a primary color that is both a real (visible) color and that can mix all other colors, </span><b data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">all color theory primary colors are either conceptual or material: either imaginary or imperfect</span></b><span data-dcnode-id="5000" instrument_node="">.</span></p><span data-dcnode-id="4998" instrument_node="">
</span><p data-dcnode-id="4989"><span data-dcnode-id="4997" instrument_node="">Again, when it is important to keep this distinction in mind, </span><i data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">conceptual color</span></i><span data-dcnode-id="4994" instrument_node=""> identifies an abstract or ideal color instead of a real or physically possible color, and </span><i data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">material color</span></i><span data-dcnode-id="4991" instrument_node=""> identifies a physical colorant or light that can or does create a color perception in actual experience.</span><a data-dcnode-id="4990" name="cterror03"></a></p><span data-dcnode-id="4988" instrument_node="">
</span><p data-dcnode-id="4979"><span class="rubric" data-dcnode-id="4981"><span data-dcnode-id="4987" instrument_node="">3. The three primary colors of paint are </span><i data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node="">red, yellow</span></i><span data-dcnode-id="4984" instrument_node=""> and </span><i data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">blue</span></i></span><span data-dcnode-id="4980" instrument_node="">.</span></p><span data-dcnode-id="4978" instrument_node="">
</span><p data-dcnode-id="4972"><span data-dcnode-id="4977" instrument_node="">The first misconception to set aside is the old "red, yellow and blue" nursery rhyme. As I </span><a class="text" data-dcnode-id="4975" href="#subtractiveprimaries"><span data-dcnode-id="4976" instrument_node="">explain below</span></a><span data-dcnode-id="4974" instrument_node="">, the subtractive (paint mixing) primaries can be precisely defined:</span><a data-dcnode-id="4973" name="ctprin16"></a></p><span data-dcnode-id="4971" instrument_node="">
</span><p data-dcnode-id="4968"><b data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">16. The ideal subtractive primary hues are red violet [magenta], yellow and green blue [cyan].</span></b></p><span data-dcnode-id="4967" instrument_node="">
