_parallax_layout_bg_size&quot;:&quot;auto&quot;,&quot;jet_parallax_layout_bg_size_tablet&quot;:&quot;&quot;,&quot;jet_parallax_layout_bg_size_mobile&quot;:&quot;&quot;,&quot;jet_parallax_layout_animation_prop&quot;:&quot;transform&quot;,&quot;jet_parallax_layout_on&quot;:[&quot;desktop&quot;,&quot;tablet&quot;]}]}" id="'top'"><div class="jet-parallax-section__layout elementor-repeater-item-9aea6e2 jet-parallax-section__scroll-layout" data-dcnode-id="655"><div class="jet-parallax-section__image" data-dcnode-id="656" style="background-position: 50% 50%; background-image: url(&quot;&quot;); transform: translateY(88px);"></div></div><div class="elementor-container elementor-column-gap-default" data-dcnode-id="435"><div class="elementor-row" data-dcnode-id="436"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-e8014fd" data-dcnode-id="437" data-element_type="column" data-id="e8014fd"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="438"><div class="elementor-widget-wrap" data-dcnode-id="439"><div class="elementor-element elementor-element-ecd1cef elementor-widget elementor-widget-text-editor" data-dcnode-id="624" data-element_type="widget" data-id="ecd1cef" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="625"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="626"><h2 data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Does Cultural Identity Influence Art?</span></h2><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Does Cultural Identity Influence Art or does Art influence culture? Cultural identity is a person’s sense of belonging to a particular culture, but Does Cultural Identity Influence the Creation of Art? Each person needs a certain regulation of his life, which he can find only in the community of other people, which determines the existence of cultural identity. A person’s awareness of his own belonging to a community, allowing him to understand his place in the socio-cultural space and freely navigate the world around him, is associated with the concept of cultural identity.</span></p><h2 data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">How Does Culture Affect Your Identity?</span></h2><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">The essence of cultural identity lies in the fact that a person consciously accepts the appropriate cultural norms and patterns of behaviour, value orientations, and language. Cultural identity has a decisive influence on the process of intercultural communication. So, it presupposes a set of certain stable qualities, thanks to which certain cultural phenomena or people evoke in us a feeling of sympathy or antipathy. Depending on this, we choose the appropriate type, manner, and form of communication with them.</span></p><h2 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Finding your Cultural Identity</span></h2><div data-dcnode-id="642"><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">So how would you go about finding or reconnecting with your cultural identity? Maybe you could try eating new types of food, and travel to your parents home country, if it is different to the country in which you live now. Learn something new or bring back a cultural ritual, and share your discoveries with family and friends. You might even find that this provides you with a fresh outlook on life, and a new sense of identity.</span></p></div><h2 data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Cultural Identity Psychology</span></h2><div data-dcnode-id="637"><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">In a modern society where the process of globalisation continues to deepen, continuous contact between individuals from different cultural backgrounds will trigger thinking about cultural identity. Cultural identity is the cornerstone of personal and national identity. In recent years, it has become an important field of interdisciplinary and one of the topics of interest to psychologists. From the perspective of psychology, the research on cultural identity mainly focuses on developmental psychology, social psychology, and cross-cultural psychology.</span></p></div><div data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">The perspective of developmental psychology emphasises that the construction and formation of individual cultural identity is a complex process of change. Social identity theory focuses on the relationship between cultural identity and self-esteem. A strong and safe national identity will promote the improvement of individual self-esteem.</span></div><div data-dcnode-id="634"></div><h2 data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Importance of Maintaining Cultural Identity</span></h2><div data-dcnode-id="629"><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Preservation of cultural identity is very important in view of the need for protecting the feeling of oneness and belongingness among the members of a particular cultural group. Cultural heritage includes an array of matters like poetry, traditions, dance forms, songs, rituals, and language handed over to the present generation by forefathers. It sometimes feels that its very survival is under threat as a consequent to busy life patterns, and overwhelming social obligations of the present day.</span></p></div><div data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Protection of cultural identity is the basis of the preservation of cultural heritage. Cultural heritage is our right that needs to be protected by the laws of the land. Only through the preservation of our cultural heritage, will the new generation and the coming generations, be able to understand and live according to the standards perceived by our ancestors.</span></div></div></div></div><div class="elementor-element elementor-element-502bab1 elementor-blockquote--skin-border elementor-blockquote--button-color-official elementor-widget elementor-widget-blockquote" data-dcnode-id="615" data-element_type="widget" data-id="502bab1" data-widget_type="blockquote.default"><div class="elementor-widget-container" data-dcnode-id="616"><blockquote class="elementor-blockquote" data-dcnode-id="617"><p class="elementor-blockquote__content" data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">
"When one has weighed the sun in the balance, and measured the steps of the moon, and mapped out the seven heavens, there still remains oneself. Who can calculate the orbit of his own soul?”</span></p><footer data-dcnode-id="618"><span data-dcnode-id="621" instrument_node="">
</span><cite class="elementor-blockquote__author" data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Oscar Wilde - De Profundis: The Ballad of Reading Gaol and Other Writings (1905)</span></cite></footer></blockquote></div></div><div class="elementor-element elementor-element-d115c34 elementor-widget elementor-widget-spacer" data-dcnode-id="611" data-element_type="widget" data-id="d115c34" data-widget_type="spacer.default"><div class="elementor-widget-container" data-dcnode-id="612"><div class="elementor-spacer" data-dcnode-id="613"><div class="elementor-spacer-inner" data-dcnode-id="614"></div></div></div></div><div class="elementor-element elementor-element-a520684 elementor-widget elementor-widget-text-editor" data-dcnode-id="583" data-element_type="widget" data-id="a520684" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="584"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="585"><h2 data-dcnode-id="608"><span data-dcnode-id="609" style="font-weight: normal; text-transform: inherit;"><span data-dcnode-id="610" instrument_node="">How Does Culture Influence Art?</span></span></h2><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">We often hear the words ‘Culture’ and ‘Art’, but sometimes we do not fully understand what these words mean, how deeply they have a meaning. How are they interrelated? Philosophers, political scientists, educationists, and many others have studied culture. The ancient Greeks associated culture with good breeding, education, love for the land.</span></p><p data-dcnode-id="602"><strong data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Physical culture</span></strong><span data-dcnode-id="603" instrument_node=""> is a component of general culture, designed to improve a person, develop physical skills. Physical culture was formed at the early stages of the development of society, its improvement continues to this day. Now physical education means not the only concern for health, but also the degree of importance of a person as a social being. This kind of culture is used both in pedagogy and in family life, in work, in education.</span></p><p data-dcnode-id="598"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Spiritual culture</span></strong><span data-dcnode-id="599" instrument_node=""> is a series of knowledge about religion, communication, creativity, morality. Spiritual culture is formed due to a person’s ideas about the world around him and himself as a part of this world.</span></p><p data-dcnode-id="594"><strong data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Artistic culture</span></strong><span data-dcnode-id="595" instrument_node=""> is a collection of artistic values with aesthetic value. Art, as the embodiment of artistic culture, affects the feelings and emotions of a person. It is necessary to preserve not only the best elements of ancient art but also to introduce new ideas into the modern understanding of art.</span></p><p data-dcnode-id="590"><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Popular culture</span></strong><span data-dcnode-id="591" instrument_node="">, as part of folk culture, is formed based on the tastes of numerous people in a particular society. It represents all kinds of entertainment: music, television, the internet, sports. Art influences society by developing opinions, imbuing regards, and unravelling experiences across the real world. Painting, music, composing and various articulations are routinely seen as the storage facility of an overall population’s total memory.</span></p><h2 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Teaching Culture through Art</span></h2><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">One of the best ways to teach culture, be it differences or similarities, is through hands-on art experiences. Many arts and crafts projects can engage all the senses and be enjoyed by participants of all ages. Particularly for young children, the combination of sensory learning and cognitive development is very valuable.&nbsp;I`m sure many readers have tangible items taken home from school and remembered to this very day!</span></p></div></div></div><div class="elementor-element elementor-element-2868547 elementor-blockquote--skin-border elementor-blockquote--button-color-official elementor-widget elementor-widget-blockquote" data-dcnode-id="574" data-element_type="widget" data-id="2868547" data-widget_type="blockquote.default"><div class="elementor-widget-container" data-dcnode-id="575"><blockquote class="elementor-blockquote" data-dcnode-id="576"><p class="elementor-blockquote__content" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">
“If you talk to a man in a language he understands, that goes to his head. If you talk to him in his language, that goes to his heart."</span></p><footer data-dcnode-id="577"><span data-dcnode-id="580" instrument_node="">
</span><cite class="elementor-blockquote__author" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Nelson Mandela</span></cite></footer></blockquote></div></div><div class="elementor-element elementor-element-6a7981e elementor-widget elementor-widget-spacer" data-dcnode-id="570" data-element_type="widget" data-id="6a7981e" data-widget_type="spacer.default"><div class="elementor-widget-container" data-dcnode-id="571"><div class="elementor-spacer" data-dcnode-id="572"><div class="elementor-spacer-inner" data-dcnode-id="573"></div></div></div></div><div class="elementor-element elementor-element-a6c673e elementor-widget elementor-widget-text-editor" data-dcnode-id="440" data-element_type="widget" data-id="a6c673e" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="441"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="442"><h2 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">How does Culture Influence Art?</span></h2><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Art is a very important aspect of society. History can clearly prove that art is more than what is recognizable by the senses but it is also a reflection of how colourful culture is. There are various cultures that have shaped and influenced art and made it appear as how it does these days. One example that would surely be listed is the Greeks. They were the ones who created a very vivid definition of what art is all about. Greek art is known to have mainly five forms. These forms include painting, jewellery making, sculpture, architecture, and pottery.</span></p><h2 data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">The Greeks</span></h2><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Greek panel painting was referred to as the most respected form of art by authors such as Pliny and Pausanias. Panel paintings are individually-created mobile paintings on wooden boards. The techniques that were used in this form of art include encaustic painting and tempera. These kinds of paintings usually depict figural scenes such as portraits and still lives. Wall painting is also a form of painting that Greeks have gain popularity.</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">The tradition of this art can be traced back up to the Minoan and Mycenean eras. Some famous examples of wall paintings are the “Tomb of Persephone” that can be found in Vergina, Macedonia, and the “Grace of Phillip.” Polychromy or the usage of various colours was also a product of the Greek’s imaginative type of thinking. It has been used to enhance the visual characteristics of Greek edifices and sculptures.</span></p><h2 data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Artists and Cultural Identity in Art</span></h2><p data-dcnode-id="549"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Alja Horvat</span></strong><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">The work of this young Slovenian artist is inspired by the culture of the 60s, 70s, and 80s. </span><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljahorvat.com/" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Horvat</span></strong></a><span data-dcnode-id="550" instrument_node=""> prefers to create illustrations on a graphic tablet but also likes to use gouache and acrylic paints. The peculiarity of her work is the skilful combination of pastel shades, as well as the image of greenery, the moon, stars, or the sun in all her works.</span></p><p data-dcnode-id="544"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Brunna Mancusa</span></strong><br data-dcnode-id="546"><span data-dcnode-id="545" instrument_node="">Brunna Mancusa has extensive experience in the creative field and currently works with publishers and advertising agencies. At the same time, Brunna sees in her work a large space for experimentation in art with the help of other tools such as ceramics, embroidery, and engraving. The watercolour illustrations brought fame to the artist – they can be described as bold, modern, and feminine.</span></p><p data-dcnode-id="533"><b data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">George Grosz</span></b><br data-dcnode-id="541"><strong data-dcnode-id="538"><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Grosz" rel="noopener nofollow" target="_blank"><span data-dcnode-id="540" instrument_node="">Grosz</span></a></strong><span data-dcnode-id="537" instrument_node=""> was a German artist known mostly for his </span><span data-dcnode-id="535" data-slate-fragment="JTVCJTdCJTIydHlwZSUyMiUzQSUyMnBhcmFncmFwaCUyMiUyQyUyMmFsaWduJTIyJTNBJTIybGVmdCUyMiUyQyUyMmNoaWxkcmVuJTIyJTNBJTVCJTdCJTIydGV4dCUyMiUzQSUyMmNhcmljYXR1cmVkJTIwJTIyJTdEJTVEJTJDJTIya2V5JTIyJTNBMzUlMkMlMjJkZWNvcmVkQmxvY2slMjIlM0ElMjJvZmYlMjIlN0QlNUQ="><span data-dcnode-id="536" instrument_node="">caricatured </span></span><span data-dcnode-id="534" instrument_node=""> drawings and paintings of Berlin life in the 1920s. He was fiercely anti-Nazi, and his work is a very powerful visual record of German society of the time. He moved to America during the war, becoming a naturalized citizen of the U.S. in 1938, and returned to Berlin in 1959.</span></p><p data-dcnode-id="516"><strong data-dcnode-id="530"><span data-dcnode-id="532" instrument_node="">Banksy</span><br data-dcnode-id="531"></strong><span data-dcnode-id="529" instrument_node="">I would be extremely surprised if you have not heard of this artist before. Banksy’s work manages to brilliantly pass commentary on a variety of subjects, both by being influenced by culture and influencing culture itself. I recommend checking out both </span><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dismaland" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Dismaland</span></strong></a><span data-dcnode-id="525" instrument_node=""> and </span><strong data-dcnode-id="522"><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//walledoffhotel.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="524" instrument_node="">The Walled Off Hotel</span></a></strong><span data-dcnode-id="521" instrument_node="">, or by going directly to </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.banksy.co.uk/" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Banksy’s website</span></strong></a><span data-dcnode-id="517" instrument_node="">.</span></p><h2 data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">How does Culture affect an Artist’s Work?</span></h2><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">This is actually a worthy question. The growth environment and political environment are compared vertically to the artist’s personal artistic career, rather than the comparison of different artists under different cultural growth. The growth environment will of course affect the aesthetics and preferences of the artist’s creation, and the artist’s entire artistic career and even his life may be affected. It means culture affects an artist’s artwork. All artworks are, to some extent, the products of their culture, and they reflect prevailing assumptions and beliefs. The greatest works of art, however, have the capacity to transcend the times in which they were created.</span></p><h2 data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Expressing Cultural Identity through Art</span></h2><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Artists sometimes explore or portray their identity through self-portraits, or symbolically in work that relates to ancestry or culture. This is maybe to try to see how they fit within contemporary culture. The investigation of self, plays an important role in how artists understand their environment and the world around them.</span></p><h2 data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Expressing Tradition through Art</span></h2><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Over the centuries, many artists have used art as a vehicle for exploring questions about identity. Even though our ethnic heritage or sexuality informs who we are, identity is fluid rather than fixed. Our personal experiences as well as the socio-political realities of our time can revise how we see ourselves or how others perceive us. As both individuals and members of communities, we keep reconsidering our place in the world, wherever we live. This is especially true for those of us who are immigrants.</span></p><h2 data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">What is my Cultural Identity?</span></h2><p data-dcnode-id="495"><span data-dcnode-id="501" instrument_node="">Well, I am sure that the theme of “split identity” will resonate with many of you. I have deep connections between two nations, that have a close yet complicated history.&nbsp; The lyrics to </span><strong data-dcnode-id="497"><em data-dcnode-id="498"><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irish_Blood%2C_English_Heart" rel="noopener nofollow" target="_blank"><span data-dcnode-id="500" instrument_node="">“Irish Blood, English Heart”</span></a></em></strong><span data-dcnode-id="496" instrument_node=""> by Morrissey, is a good starting point.</span></p><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Over time identity develops, I class myself as a European, leaning naïvely towards Internationalism. I believe that humans should unite across national, political, cultural, racial, or class boundaries to advance their common interests. Governments should cooperate, because I believe mutual long-term interests are of greater importance than short-term disputes.</span></p><h2 data-dcnode-id="491" style="margin-left: -.25pt;"><span data-dcnode-id="492" instrument_node="">Conclusion</span></h2><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Does Cultural Identity Influence the Creation of Art?, well I think it is clear that art mirrors the way of life, our environment and world.&nbsp; It’s an emblematic structure where it reflects the human territory on earth. Art has various structures like engineering, design, drawing, painting, and our predecessors likewise settled on the choice of communicating their craft.</span></p><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Culture is eventually “human scholarly accomplishment respected of all things considered”. Art is subsequently naturally a piece of and an impression of the bigger component of culture. At the point when we study or are motivated by glancing back at history, we are being affected by the way of life that existed at that point.</span></p><h2 data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Learn More Now</span></h2><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">If you have enjoyed this post you can find out more on how cultural identity has impacted other different regions of the world via the links below. Don’t forget to share if you know anyone who might be interested in reading this series, and please get in contact if you have any comments.</span></p><ul data-dcnode-id="443"><li data-dcnode-id="478"><span data-dcnode-id="482" instrument_node="">10 ways cultural identity has influenced </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adrianreynolds.ie/cultural-identity-african-art/"><strong data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">African Art</span></strong></a></li><li data-dcnode-id="473"><span data-dcnode-id="477" instrument_node="">10 ways cultural identity has influenced </span><a data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adrianreynolds.ie/cultural-identity-asian-art/"><b data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Asian Art</span></b></a></li><li data-dcnode-id="468"><span data-dcnode-id="472" instrument_node="">10 ways cultural identity has influenced </span><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adrianreynolds.ie/cultural-identity-caribbean-art/"><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Caribbean Art</span></strong></a></li><li data-dcnode-id="463"><span data-dcnode-id="467" instrument_node="">10 ways cultural identity has influenced </span><strong data-dcnode-id="464"><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adrianreynolds.ie/cultural-identity-european-art/"><span data-dcnode-id="466" instrument_node="">European Art</span></a></strong></li><li data-dcnode-id="458"><span data-dcnode-id="462" instrument_node="">10 ways cultural identity has influenced </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adrianreynolds.ie/cultural-identity-north-americas-art/"><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">North America’s Art</span></strong></a></li><li data-dcnode-id="453"><span data-dcnode-id="457" instrument_node="">10 ways cultural identity has influenced </span><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adrianreynolds.ie/south-american-art-cultural-identity/"><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">South America’s Art</span></strong></a></li><li data-dcnode-id="448"><span data-dcnode-id="452" instrument_node="">10 ways cultural identity has influenced </span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adrianreynolds.ie/cultural-identity-oceania-art-2/"><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Oceania Art</span></strong></a></li><li data-dcnode-id="444"><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adrianreynolds.ie/famous-irish-art/"><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Famous Irish Art and Cultural Identity</span></strong></a></li></ul></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-b8f88a7 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="409" data-element_type="section" data-id="b8f88a7" data-settings="{&quot;jet_parallax_layout_list&quot;:[]}"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="410"><div class="elementor-row" data-dcnode-id="411"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-a0dee4c" data-dcnode-id="412" data-element_type="column" data-id="a0dee4c"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="413"><div class="elementor-widget-wrap" data-dcnode-id="414"><div class="elementor-element elementor-element-a974936 elementor-cta--layout-image-left elementor-cta--skin-classic elementor-animated-content elementor-bg-transform elementor-bg-transform-zoom-in elementor-widget elementor-widget-call-to-action" data-dcnode-id="419" da
