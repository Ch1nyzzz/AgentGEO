</span><table align="center" border="0" cellpadding="5" cellspacing="2" data-dcnode-id="65" width="750"><tbody data-dcnode-id="66"><tr data-dcnode-id="68"><td data-dcnode-id="245" valign="top" width="200"><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">&nbsp;</span></p><span data-dcnode-id="246" instrument_node="">
</span></td><td data-dcnode-id="70" valign="top" width="524"><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="239"><font data-dcnode-id="240" face="Verdana" size="2"><b data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Red</span></b></font></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="235"><font data-dcnode-id="236" face="Verdana" size="2"><span data-dcnode-id="237" instrument_node="">Red (the word derives from Old English 
        "Read" and the Indo European root "reudh-") is one 
        of the additive primary colours of light, complementary to cyan, in RGB 
        (Red, Green, Blue) colour systems. In addition, Red is one of the subtractive 
        primary colours of RYB (Red, Yellow, Blue) colour space.</span></font></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="226"><font data-dcnode-id="227" face="Verdana" size="2"><b data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Red Pigments</span></b><span data-dcnode-id="231" instrument_node=""> include: Alizarin crimson, 
        Cadmium red, Carmine, Cinnibar, Folium, Indian red, Kermes, Light red 
        (English red, Prussian red, colcothar, and Persian red), Madder, Minium, 
        Safflower, Sinopia, Terra Pozzuoli, and Vermilion. </span><b data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Shades of red</span></b><span data-dcnode-id="228" instrument_node=""> 
        include: Alizarin, Amaranth, Burgundy, Cardinal, Carmine, Carnelian, Cerise, 
        Crimson, Fire engine red, Fuchsia, Magenta, Maroon, Orange-red, Persimmon, 
        Ruby, Rust, Scarlet, Terra cotta, Venetian red, Vermilion.</span></font></p><span data-dcnode-id="225" instrument_node="">
</span><p data-dcnode-id="221"><font data-dcnode-id="222" face="Verdana" size="2"><b data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Pink</span></b></font></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="212"><font data-dcnode-id="213" face="Verdana" size="2"><span data-dcnode-id="219" instrument_node="">Pink is a pale tint of red, obtained by 
        adding white. The word was first used in the late 17th century to describe 
        flowering plants. </span><b data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Shades of pink</span></b><span data-dcnode-id="216" instrument_node=""> include: Amaranth, Brink pink, 
        Carmine, Carnation, Cerise, Cherry pink, Coral, Deep carmine, French rose, 
        Fuchsia pink, Hot magenta, Hot pink, Lavender rose,</span><br data-dcnode-id="215"><span data-dcnode-id="214" instrument_node="">
        Magenta, Persian pink, Puce, Rose, Salmon pink, Shocking pink.</span></font></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="207"><font data-dcnode-id="208" face="Verdana" size="2"><b data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Orange</span></b></font></p><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="200"><font data-dcnode-id="201" face="Verdana" size="2"><span data-dcnode-id="205" instrument_node="">The colour orange is mid-way between red 
        and yellow in RGB colour space, and is one of the tertiary colours on 
        the HSV colour scale. The colour is named after the fruit which was first 
        imported into Europe as "naranja". The word "orange" 
        was first used as a colour-term in 1512. Previously, the colour was simply 
        known as yellow-red. </span><b data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Shades of orange</span></b><span data-dcnode-id="202" instrument_node=""> include: Amber, Apricot, 
        Burnt orange, Carrot, Peach, Mandarin, Portland Orange, Pumpkin, Tangerine.</span></font></p><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="195"><font data-dcnode-id="196" face="Verdana" size="2"><b data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Brown</span></b></font></p><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="191"><font data-dcnode-id="192" face="Verdana" size="2"><span data-dcnode-id="193" instrument_node="">The tertiary colour brown refers to dark 
        yellow, orange, or reddish hues. Brown pigment can be obtained by adding 
        black or their complementary colours to rose, red, orange, or yellow. 
        The first recorded use of brown as a colour term occurred around 1000 
        CE.</span></font></p><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="180"><font data-dcnode-id="181" face="Verdana" size="2"><b data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Brown Pigments</span></b><span data-dcnode-id="187" instrument_node=""> include: Asphaltum 
        (Bitumen), Bistre, Mummy (Egyptian brown), Sepia, Sienna, Umber and Van 
        Dyck brown. </span><b data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Shades of brown</span></b><span data-dcnode-id="184" instrument_node=""> include: Auburn, Beige, Bistre, Bole, 
        Bronze, Burnt Sienna, Burnt Umber,</span><br data-dcnode-id="183"><span data-dcnode-id="182" instrument_node="">
        Chocolate, Copper, Khaki, Liver, Mahogany, Ochre, Olive, Russet, Rust, 
        Sandy brown, Sepia, Sienna, Tan, Taupe.</span></font></p><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="175"><font data-dcnode-id="176" face="Verdana" size="2"><b data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Yellow</span></b></font></p><span data-dcnode-id="174" instrument_node="">
</span><p data-dcnode-id="171"><font data-dcnode-id="172" face="Verdana" size="2"><span data-dcnode-id="173" instrument_node="">Yellow (the word comes from the Old English 
        "geolu", or "geolwe") is one of the subtractive primary 
        hues. Its traditional RYB complementary colour is purple, violet, or indigo; 
        its complementary colour in both RGB and CMYK colour systems is blue.</span></font></p><span data-dcnode-id="170" instrument_node="">
</span><p data-dcnode-id="162"><font data-dcnode-id="163" face="Verdana" size="2"><b data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">Yellow Pigments</span></b><span data-dcnode-id="167" instrument_node=""> include: Aureolin, 
        Aurora yellow, Cadmium yellow, Chrome yellow, Fustic, Gallstone, Gamboge, 
        Gold, Indian yellow, Massicot, Naples yellow, Orpiment, Quercitron yellow, 
        Saffron, Turner's yellow, Turpeth mineral, and Yellow Ochre. </span><b data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Shades 
        of yellow</span></b><span data-dcnode-id="164" instrument_node=""> include: Amber, Apricot, Beige, Cream, Flax, Gamboge, Golden 
        yellow, Lemon, Metallic gold, Mustard, Papaya, Peach-yellow, Tangerine 
        yellow.</span></font></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="157"><font data-dcnode-id="158" face="Verdana" size="2"><b data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Grey (also gray)</span></b></font></p><span data-dcnode-id="156" instrument_node="">
</span><p data-dcnode-id="153"><font data-dcnode-id="154" face="Verdana" size="2"><span data-dcnode-id="155" instrument_node="">The term grey, first coined in England 
        around 700 CE, describes the tints and shades from black to white. Low 
        in chroma, these, colours are known as achromatic or neutral colours.</span></font></p><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="144"><font data-dcnode-id="145" face="Verdana" size="2"><b data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Grey Pigments</span></b><span data-dcnode-id="149" instrument_node=""> include: Davy's grey, 
        Neutral tint (lampblack, Winsor blue and alizarin crimson), and Payne's 
        grey. </span><b data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Shades of gray</span></b><span data-dcnode-id="146" instrument_node=""> include: Arsenic, Bistre, Charcoal, Davy's 
        grey, Feldgrau, Payne's grey, Silver Slate.</span></font></p><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="139"><font data-dcnode-id="140" face="Verdana" size="2"><b data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">Green</span></b></font></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="135"><font data-dcnode-id="136" face="Verdana" size="2"><span data-dcnode-id="137" instrument_node="">In the subtractive system, Green is a secondary 
        colour obtained from a combination of yellow and blue, or yellow and cyan. 
        But it remains one of the additive primary colours. In the HSV colour 
        wheel, its complementary colour is magenta - a purple hue with an equal 
        mixture of red and blue light. On the RYB colour wheel its complementary 
        colour is red. The word green derives from the Old English "grene" 
        or "groeni", words closely related to the Old English word "growan", 
        meaning "to grow".</span></font></p><span data-dcnode-id="134" instrument_node="">
</span><p data-dcnode-id="126"><font data-dcnode-id="127" face="Verdana" size="2"><b data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Green Pigments</span></b><span data-dcnode-id="131" instrument_node=""> include: Emerald 
        (Schweinfurt green, Scheele's green), Hooker's green, Malachite, Oxide 
        of Chromium, Sap green, Terre Verte, Verdigris, and Viridian. </span><b data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">Shades 
        of green</span></b><span data-dcnode-id="128" instrument_node=""> include: Army green, Asparagus, Bright green, British racing 
        green, Celadon, Emerald, Fern, Frog, Jade, Lime, Moss green, Olive green, 
        Pine, Shamrock green, Viridian.</span></font></p><span data-dcnode-id="125" instrument_node="">
</span><p data-dcnode-id="121"><font data-dcnode-id="122" face="Verdana" size="2"><b data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Cyan</span></b></font></p><span data-dcnode-id="120" instrument_node="">
</span><p data-dcnode-id="117"><font data-dcnode-id="118" face="Verdana" size="2"><span data-dcnode-id="119" instrument_node="">Can refer to a variety of colours in the 
        blue/green section of the spectrum. It is sometimes called aqua-green 
        or blue-green, and used to be called "cyan blue". Analogous 
        colours include "baby blue", "turquoise" and "aquamarine".</span></font></p><span data-dcnode-id="116" instrument_node="">
</span><p data-dcnode-id="112"><font data-dcnode-id="113" face="Verdana" size="2"><b data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">Blue</span></b></font></p><span data-dcnode-id="111" instrument_node="">
</span><p data-dcnode-id="108"><font data-dcnode-id="109" face="Verdana" size="2"><span data-dcnode-id="110" instrument_node="">Blue (derived from the French word "bleu") 
        is considered one of the additive primary colours. On the HSV Colour Wheel, 
        its complementary colour is yellow. On a colour wheel based on traditional 
        colour theory (RYB), its complement is orange. The English language commonly 
        uses "blue" to refer to any colour from navy blue to cyan.</span></font></p><span data-dcnode-id="107" instrument_node="">
</span><p data-dcnode-id="99"><font data-dcnode-id="100" face="Verdana" size="2"><b data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">Blue Pigments</span></b><span data-dcnode-id="104" instrument_node=""> include: Azurite, 
        Cerulean, Cobalt blue, Cornflower blue, Egyptian blue (Alexandrian blue, 
        Vestorian blue), French ultramarine, Frit, Indigo, Phthalocyanine blue, 
        Prussian blue, Smalt, Ultramarine, Ultramarine ash, and Woad. </span><b data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">Shades 
        of blue</span></b><span data-dcnode-id="101" instrument_node=""> include: Air Force blue, Azure, Baby blue, Cobalt blue, Cornflower, 
        Denim, Electric blue, Klein blue, Midnight blue, Navy blue, Prussian blue, 
        Royal blue, Sapphire, Ultramarine.</span></font></p><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="94"><font data-dcnode-id="95" face="Verdana" size="2"><b data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">Violet</span></b></font></p><span data-dcnode-id="93" instrument_node="">
</span><p data-dcnode-id="84"><font data-dcnode-id="85" face="Verdana" size="2"><span data-dcnode-id="92" instrument_node="">First used about 1400 to describe violets, 
        the term usually describes a shade of purple, that is, a mixture of red 
        and blue light. </span><b data-dcnode-id="90"><span data-dcnode-id="91" instrument_node="">Violet pigments</span></b><span data-dcnode-id="89" instrument_node=""> include: Archil and Tyrian purple. 
        </span><b data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">Shades of violet</span></b><span data-dcnode-id="86" instrument_node=""> include: Amethyst, Fuchsia, Heliotrope, Indigo, 
        Lavender, Lilac, Mauve, Purple.</span></font></p><span data-dcnode-id="83" instrument_node="">
</span><p data-dcnode-id="79"><font data-dcnode-id="80" face="Verdana" size="2"><b data-dcnode-id="81"><span data-dcnode-id="82" instrument_node="">Black</span></b></font></p><span data-dcnode-id="78" instrument_node="">
</span><p data-dcnode-id="72"><font data-dcnode-id="73" face="Verdana" size="2"><span data-dcnode-id="77" instrument_node="">Black reflects no light, and is not a colour 
        of the spectrum, nor does it appear on the colour wheel. Even so, as a 
        pigment it is added to other colours to create darker variants or shades. 
        </span><b data-dcnode-id="75"><span data-dcnode-id="76" instrument_node="">Black Pigments</span></b><span data-dcnode-id="74" instrument_node=""> include: Black lead, Ivory Black, Lamp Black, and 
        Vine Black.</span></font></p><span data-dcnode-id="71" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="64" instrument_node="">
