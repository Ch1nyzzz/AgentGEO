</span><p data-dcnode-id="2139"><font data-dcnode-id="2140" face="Verdana" size="2"><b data-dcnode-id="2141"><a data-dcnode-id="2143" name="colour"></a><span data-dcnode-id="2142" instrument_node="">The Importance 
        of Colour</span></b></font></p><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2123"><font data-dcnode-id="2124" face="Verdana" size="2"><span data-dcnode-id="2137" instrument_node="">In keeping with its status as one of the 
        leading "visual" arts, painting is heavily dependent upon the 
        use of colour for its impact, mood and depth. The impact of colour on 
        the visual senses of the viewer is extremely potent and even one tiny 
        dab of brightly coloured pigment in an otherwise monochromatic picture 
        can transform the work. Even the earliest exponents of prehistoric </span><a data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/prehistoric/cave-painting.htm"><span data-dcnode-id="2136" instrument_node="">cave 
        painting</span></a><span data-dcnode-id="2134" instrument_node=""> (30,000-12,000 BCE) were experts in the use of primitive 
        pigments, as exemplified in the monochromatic </span><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/prehistoric/chauvet-cave-paintings.htm"><span data-dcnode-id="2133" instrument_node="">Chauvet 
        paintings</span></a><span data-dcnode-id="2131" instrument_node="">, the polychrome </span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/prehistoric/lascaux-cave-paintings.htm"><span data-dcnode-id="2130" instrument_node="">Lascaux 
        murals</span></a><span data-dcnode-id="2128" instrument_node=""> and the vivid paintings at </span><a data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/prehistoric/altamira-cave-paintings.htm"><span data-dcnode-id="2127" instrument_node="">Altamira</span></a><span data-dcnode-id="2125" instrument_node="">.</span></font></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2113"><font data-dcnode-id="2114" face="Verdana" size="2"><span data-dcnode-id="2121" instrument_node="">With the invention of </span><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/oil-painting.htm"><span data-dcnode-id="2120" instrument_node="">oil 
        painting</span></a><span data-dcnode-id="2118" instrument_node=""> in Europe during the early 15th century, which greatly improved 
        the colour luminosity and richness achievable by both tempera on wood 
        panels and fresco </span><a data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/painting/murals.htm"><span data-dcnode-id="2117" instrument_node="">mural painting</span></a><span data-dcnode-id="2115" instrument_node="">, the 
        practice of colour painting took a significant leap forward.</span></font></p><span data-dcnode-id="2112" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2105" instrument_node="">

</span><table align="center" border="0" cellpadding="5" cellspacing="2" data-dcnode-id="1985" width="750"><tbody data-dcnode-id="1986"><tr data-dcnode-id="1988"><td data-dcnode-id="2049" valign="top" width="200"><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2095"><font data-dcnode-id="2096" face="Arial" size="1"><b data-dcnode-id="2097"><font color="#FF0000" data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">What is a Hue?</span></font><br data-dcnode-id="2099"><span data-dcnode-id="2098" instrument_node="">
      Hue is a synonym for colour.</span></b></font></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2079"><b data-dcnode-id="2080"><font color="#FF0000" data-dcnode-id="2092" face="Arial" size="1"><span data-dcnode-id="2093" instrument_node="">What is a Shade?</span></font><font data-dcnode-id="2081" face="Arial" size="1"><br data-dcnode-id="2091"><span data-dcnode-id="2090" instrument_node="">
        A shade is a dark value of a colour</span><br data-dcnode-id="2089"><span data-dcnode-id="2088" instrument_node="">
        (eg. dark blue), as opposed to a tint,</span><br data-dcnode-id="2087"><span data-dcnode-id="2086" instrument_node="">
        which is a lighter hue (eg. light blue).</span><br data-dcnode-id="2085"><span data-dcnode-id="2084" instrument_node="">
        Shades of a particular colour are</span><br data-dcnode-id="2083"><span data-dcnode-id="2082" instrument_node="">
        obtained by adding black.</span></font></b></p><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2067"><b data-dcnode-id="2068"><font color="#FF0000" data-dcnode-id="2076" face="Arial" size="1"><span data-dcnode-id="2077" instrument_node="">What is a Tint?</span></font><font data-dcnode-id="2069" face="Arial" size="1"><br data-dcnode-id="2075"><span data-dcnode-id="2074" instrument_node="">
        Tints are paler variants of a particular</span><br data-dcnode-id="2073"><span data-dcnode-id="2072" instrument_node="">
        colour, obtained by adding white.</span><br data-dcnode-id="2071"><span data-dcnode-id="2070" instrument_node="">
        For example, pink is a tint of red.</span></font></b></p><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2051"><b data-dcnode-id="2052"><font color="#FF0000" data-dcnode-id="2064" face="Arial" size="1"><span data-dcnode-id="2065" instrument_node="">What are Primary colours?</span></font><font data-dcnode-id="2053" face="Arial" size="1"><br data-dcnode-id="2063"><span data-dcnode-id="2062" instrument_node="">
        These are red, blue, and yellow;</span><br data-dcnode-id="2061"><span data-dcnode-id="2060" instrument_node="">
        the colours that can be mixed to</span><br data-dcnode-id="2059"><span data-dcnode-id="2058" instrument_node="">
        produce other "secondary" colours</span><br data-dcnode-id="2057"><span data-dcnode-id="2056" instrument_node="">
        but cannot themselves be produced</span><br data-dcnode-id="2055"><span data-dcnode-id="2054" instrument_node="">
        from mixtures.</span></font></b></p><span data-dcnode-id="2050" instrument_node="">
</span></td><td data-dcnode-id="1990" valign="top" width="524"><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2042"><font data-dcnode-id="2043" face="Verdana" size="2"><b data-dcnode-id="2044"><a data-dcnode-id="2046" name="effects"></a><span data-dcnode-id="2045" instrument_node="">The Effect of 
        Colour</span></b></font></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2026"><font data-dcnode-id="2027" face="Verdana" size="2"><span data-dcnode-id="2040" instrument_node="">The effects of colour can be purely </span><i data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">optical</span></i><span data-dcnode-id="2037" instrument_node=""> 
        (eg. draws the viewer's eye), </span><i data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">emotional</span></i><span data-dcnode-id="2034" instrument_node=""> (eg. cool colours like 
        blue or green have a calming effect, while red or yellow are more stimulating 
        to the senses), or </span><i data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">aesthetic</span></i><span data-dcnode-id="2031" instrument_node=""> (eg. the beauty that springs from 
        the juxtaposition of two or more harmonious colours), to name but three. 
        In keeping with the principles of </span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/artist-paints/colour-theory-painting.htm"><span data-dcnode-id="2030" instrument_node="">colour 
        theory</span></a><span data-dcnode-id="2028" instrument_node=""> and the layout of the colour-wheel, all these effects on the 
        viewer will also vary according to the combination of hues (actual colours) 
        present, their luminosity (the degree of light or dark they possess) and 
        chroma (the purity of the hue). In addition, a colour's impact varies 
        according to its neighbouring colours on the canvas. A grey surrounded 
        by blue will appear cool, while grey surrounded by yellow appears warm. 
        A final influence on how colour is perceived, is the overall range of 
        tones present in the painting - known sometimes as the tonal key. A dab 
        of (say) yellow on a canvas with an overall low (dark) tonal key (eg. 
        a Rembrandt picture) will have different impact than in one with a high 
        tonal key.</span></font></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2020"><font data-dcnode-id="2021" face="Verdana" size="2"><b data-dcnode-id="2022"><a data-dcnode-id="2024" name="theory"></a><span data-dcnode-id="2023" instrument_node="">Early Colour Theory</span></b></font></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="1992"><font data-dcnode-id="1993" face="Verdana" size="2"><span data-dcnode-id="2018" instrument_node="">The earliest principles of colour theory 
        in </span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/fine-art.htm"><span data-dcnode-id="2017" instrument_node="">fine art</span></a><span data-dcnode-id="2015" instrument_node=""> were set out by Leon 
        Battista Alberti (1404-72) in his treatise "On Painting" </span><i data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Della 
        Pittura</span></i><span data-dcnode-id="2012" instrument_node=""> (1435), and by the High Renaissance genius Leonardo da Vinci 
        in his notebooks (c.1490). In any event, the importance of "</span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/painting/colorito.htm"><span data-dcnode-id="2011" instrument_node="">colorito</span></a><span data-dcnode-id="2009" instrument_node="">" 
        was taken especially seriously by the great </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters.htm"><span data-dcnode-id="2008" instrument_node="">Old 
        Masters of European art</span></a><span data-dcnode-id="2006" instrument_node="">, who were experts in the mixing and application 
        of pigments, and meticulous students of the tonal effects of light. They 
        understood the principles of colour theory - including colour-hues, intensity, 
        and tones - and knew exactly when to use certain colours and how to harmonize 
        them across the canvas. Seen from a distance, their skill levels are even 
        more impressive due to the lack of manufactured paints, and the fact that 
        most pigments (some of which were extremely expensive) had to be ground 
        by hand, a messy and time-consuming process. Further colour theory appeared 
        at the end of the Baroque with the publication of Isaac Newton's </span><i data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Opticks</span></i><span data-dcnode-id="2003" instrument_node=""> 
        (1704). But the practice of colour painting only really changed during 
        the 19th century when </span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/impressionism.htm"><span data-dcnode-id="2002" instrument_node="">Impressionism</span></a><span data-dcnode-id="2000" instrument_node=""> 
        startled many art critics with its revolutionary light-related optical 
        theories and colour practices, which introduced a whole new pictorial 
        language into </span><a data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/fine-art-painting.htm"><span data-dcnode-id="1999" instrument_node="">fine art painting</span></a><span data-dcnode-id="1997" instrument_node="">. For 
        more on this, please see: </span><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/impressionism-characteristics.htm"><span data-dcnode-id="1996" instrument_node="">Characteristics 
        of Impressionist Painting</span></a><span data-dcnode-id="1994" instrument_node=""> 1870-1910.</span></font></p><span data-dcnode-id="1991" instrument_node="">

</span><p data-dcnode-id="1962"><b data-dcnode-id="1963"><font color="#FF0000" data-dcnode-id="1979" face="Arial" size="1"><span data-dcnode-id="1980" instrument_node="">What are Secondary Colours?</span></font><font data-dcnode-id="1964" face="Arial" size="1"><br data-dcnode-id="1978"><span data-dcnode-id="1977" instrument_node="">
        These are the hues produced by</span><br data-dcnode-id="1976"><span data-dcnode-id="1975" instrument_node="">
        mixing primary colours: eg. a</span><br data-dcnode-id="1974"><span data-dcnode-id="1973" instrument_node="">
        mixture of red and blue gives the</span><br data-dcnode-id="1972"><span data-dcnode-id="1971" instrument_node="">
        secondary colour violet; a mix</span><br data-dcnode-id="1970"><span data-dcnode-id="1969" instrument_node="">
        of red and yellow yields orange;</span><br data-dcnode-id="1968"><span data-dcnode-id="1967" instrument_node="">
        while combining yellow with blue</span><br data-dcnode-id="1966"><span data-dcnode-id="1965" instrument_node="">
        gives green.</span></font></b></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1942"><b data-dcnode-id="1943"><font color="#FF0000" data-dcnode-id="1959" face="Arial" size="1"><span data-dcnode-id="1960" instrument_node="">What are Complementary 
        colours?</span></font><font data-dcnode-id="1944" face="Arial" size="1"><br data-dcnode-id="1958"><span data-dcnode-id="1957" instrument_node="">
        These colours lie directly opposite</span><br data-dcnode-id="1956"><span data-dcnode-id="1955" instrument_node="">
        each other in the colour wheel: like</span><br data-dcnode-id="1954"><span data-dcnode-id="1953" instrument_node="">
        blue and orange, red and green,</span><br data-dcnode-id="1952"><span data-dcnode-id="1951" instrument_node="">
        violet and yellow. Each primary hue</span><br data-dcnode-id="1950"><span data-dcnode-id="1949" instrument_node="">
        - red, yellow, blue - has it's own,</span><br data-dcnode-id="1948"><span data-dcnode-id="1947" instrument_node="">
        exclusive, complementary colour</span><br data-dcnode-id="1946"><span data-dcnode-id="1945" instrument_node="">
        - green, purple, orange.</span></font></b></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1926"><b data-dcnode-id="1927"><font color="#FF0000" data-dcnode-id="1939" face="Arial" size="1"><span data-dcnode-id="1940" instrument_node="">What are Tertiary Colours?</span></font><font data-dcnode-id="1928" face="Arial" size="1"><br data-dcnode-id="1938"><span data-dcnode-id="1937" instrument_node="">
        These result from the mixing of a</span><br data-dcnode-id="1936"><span data-dcnode-id="1935" instrument_node="">
        primary and a secondary colour</span><br data-dcnode-id="1934"><span data-dcnode-id="1933" instrument_node="">
        (like red and green) or two</span><br data-dcnode-id="1932"><span data-dcnode-id="1931" instrument_node="">
        secondary colours (like green and</span><br data-dcnode-id="1930"><span data-dcnode-id="1929" instrument_node="">
        orange).</span></font></b></p><span data-dcnode-id="1925" instrument_node="">
</span></td><td data-dcnode-id="1880" valign="top" width="524"><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1917"><font data-dcnode-id="1918" face="Verdana" size="2"><b data-dcnode-id="1919"><a data-dcnode-id="1921" name="ingredients"></a><span data-dcnode-id="1920" instrument_node="">What Are the 
        Ingredients of Colour Paint?</span></b></font></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1913"><font data-dcnode-id="1914" face="Verdana" size="2"><span data-dcnode-id="1915" instrument_node="">The colour (hue) of a paint which comes 
        from its pigment, is mixed with other basic ingredients as follows:</span></font></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1882"><font data-dcnode-id="1883" face="Verdana" size="2"><b data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Oil Paint</span></b><br data-dcnode-id="1909"><span data-dcnode-id="1908" instrument_node="">
        Basically, oil paint is a combination of three things: </span><i data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">pigment</span></i><span data-dcnode-id="1905" instrument_node="">, 
        </span><i data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">linseed oil</span></i><span data-dcnode-id="1902" instrument_node=""> and </span><i data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">turpentine</span></i><span data-dcnode-id="1899" instrument_node="">. The pigment provides the </span><i data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">colour</span></i><span data-dcnode-id="1896" instrument_node="">; 
        the linseed oil is the </span><i data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">binder</span></i><span data-dcnode-id="1893" instrument_node=""> - that is, the ingredient that holds 
        the pigment and allows it to be spread onto the canvas, board or whatever 
        support is to be painted; the turpentine is the </span><i data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">thinner</span></i><span data-dcnode-id="1890" instrument_node=""> - the ingredient 
        that thins the oil/colour mixture and makes it easy to apply with a brush. 
        Oil paint may contain other oils (eg. poppyseed or walnut), provided they 
        are </span><i data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">siccative</span></i><span data-dcnode-id="1887" instrument_node=""> oils - that is, oils that dry by </span><i data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">oxidation</span></i><span data-dcnode-id="1884" instrument_node="">. 
        The point is, unlike most other paints, oils do not dry by evaporation 
        but as a result of oxidation - the oil reacts with oxygen in the air and 
        turns into a gel, then a solid.</span></font></p><span data-dcnode-id="1881" instrument_node="">

</span><p data-dcnode-id="1856"><b data-dcnode-id="1857"><font color="#FF0000" data-dcnode-id="1869" face="Arial" size="1"><span data-dcnode-id="1870" instrument_node="">What are Analogous colours?</span></font><font data-dcnode-id="1858" face="Arial" size="1"><br data-dcnode-id="1868"><span data-dcnode-id="1867" instrument_node="">
        Any set of three or five colours that</span><br data-dcnode-id="1866"><span data-dcnode-id="1865" instrument_node="">

        usually found next to each other</span><br data-dcnode-id="1862"><span data-dcnode-id="1861" instrument_node="">
        on the colour wheel - such as blue,</span><br data-dcnode-id="1860"><span data-dcnode-id="1859" instrument_node="">
        blue-green, and green.</span></font></b></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1842"><b data-dcnode-id="1843"><font color="#FF0000" data-dcnode-id="1853" face="Arial" size="1"><span data-dcnode-id="1854" instrument_node="">What is the Colour Wheel?</span></font><font data-dcnode-id="1844" face="Arial" size="1"><br data-dcnode-id="1852"><span data-dcnode-id="1851" instrument_node="">
        The colour wheel is a circular diagram</span><br data-dcnode-id="1850"><span data-dcnode-id="1849" instrument_node="">
        showing the relationships between</span><br data-dcnode-id="1848"><span data-dcnode-id="1847" instrument_node="">
        primary, secondary, tertiary and</span><br data-dcnode-id="1846"><span data-dcnode-id="1845" instrument_node="">
        complementary colours.</span></font></b></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1825"><font data-dcnode-id="1826" face="Arial" size="1"><b data-dcnode-id="1827"><font color="#FF0000" data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">MEANING OF ART</span></font><br data-dcnode-id="1838"><span data-dcnode-id="1837" instrument_node="">

</span><p data-dcnode-id="1810"><b data-dcnode-id="1811"><font color="#FF0000" data-dcnode-id="1822" face="Arial" size="1"><span data-dcnode-id="1823" instrument_node="">QUESTIONS ABOUT FINE ARTS</span></font><font data-dcnode-id="1812" face="Arial" size="1"><br data-dcnode-id="1821"><span data-dcnode-id="1820" instrument_node="">

</span><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/painting-glossary.htm"><span data-dcnode-id="1815" instrument_node="">Painting Glossary</span></a><span data-dcnode-id="1813" instrument_node="">.</span></font></b></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1788"><font data-dcnode-id="1789" face="Arial" size="1"><b data-dcnode-id="1790"><font color="#FF0000" data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Masstone</span></font><br data-dcnode-id="1806"><span data-dcnode-id="1805" instrument_node="">
        A thick swatch of paint: useful for</span><br data-dcnode-id="1804"><span data-dcnode-id="1803" instrument_node="">
        painters who tend to use thick or</span><br data-dcnode-id="1802"><span data-dcnode-id="1801" instrument_node="">
        impasto painting techniques. An</span><br data-dcnode-id="1800"><span data-dcnode-id="1799" instrument_node="">
        excellent way to indicate inherent</span><br data-dcnode-id="1798"><span data-dcnode-id="1797" instrument_node="">
        attributes of a paint, like opacity</span><br data-dcnode-id="1796"><span data-dcnode-id="1795" instrument_node="">
        and gloss. For instance, when</span><br data-dcnode-id="1794"><span data-dcnode-id="1793" instrument_node="">
        Phthalo Blue is thickly applied,</span><br data-dcnode-id="1792"><span data-dcnode-id="1791" instrument_node="">
        the masstone appears black.</span></b></font></p><span data-dcnode-id="1787" instrument_node="">
</span></td><td data-dcnode-id="1738" valign="top" width="524"><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1769"><font data-dcnode-id="1770" face="Verdana" size="2"><b data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Watercolour and Gouache Paint</span></b><br data-dcnode-id="1781"><span data-dcnode-id="1780" instrument_node="">
        Technically, </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/watercolour-painting.htm"><span data-dcnode-id="1779" instrument_node="">watercolour</span></a><span data-dcnode-id="1777" instrument_node=""> is any 
        paint medium soluble in water, like tempera or gouache. Here, however, 
        watercolour refers to the technique of painting with washes of colour, 
        as developed in England during the 18th/19th century. Basically, this 
        type of watercolour paint consists of pigment (colour) and gum arabic 
        (a water-soluble binder), to which water is added. </span><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/painting/gouache.htm"><span data-dcnode-id="1776" instrument_node="">Gouache</span></a><span data-dcnode-id="1774" instrument_node=""> 
        paint is opaque watercolour paint, created by adding materials such as 
        talc, zinc white or china clay. </span><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/painting/tempera.htm"><span data-dcnode-id="1773" instrument_node="">Tempera</span></a><span data-dcnode-id="1771" instrument_node=""> 
        consists of pigment (colour), and egg-yolk (the binder), to which water 
        is added.</span></font></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1759"><font data-dcnode-id="1760" face="Verdana" size="2"><b data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Acrylics</span></b><br data-dcnode-id="1765"><span data-dcnode-id="1764" instrument_node="">
</span><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/acrylic-painting.htm"><span data-dcnode-id="1763" instrument_node="">Acrylic painting</span></a><span data-dcnode-id="1761" instrument_node=""> is a wholly synthetic 
        painting medium, based on acrylic polymer resin, and comes in a wide variety 
        of finishes. In its simplest form, acrylic paint consists of pigment (colour), 
        inside an emulsion of acrylic polymer (plastic) resins (the binder) and 
        water. The combination of pigment and plastic resins dries extremely quickly 
        by evaporation of the water (and other solvents it contains) to form a 
        tough, flexible film.</span></font></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1753"><font data-dcnode-id="1754" face="Verdana" size="2"><b data-dcnode-id="1755"><a data-dcnode-id="1757" name="attributes"></a><span data-dcnode-id="1756" instrument_node="">Do All Paint 
        Pigments Behave in the Same Way?</span></b></font></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1740"><font data-dcnode-id="1741" face="Verdana" size="2"><span data-dcnode-id="1751" instrument_node="">No. </span><i data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Acrylic paint</span></i><span data-dcnode-id="1748" instrument_node=""> is the fastest-drying, 
        and its colour changes slightly as it dries. </span><i data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Watercolour</span></i><span data-dcnode-id="1745" instrument_node=""> is also 
        quite fast-drying and watercolours also change hue during the drying process. 
        In contrast, </span><i data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">oil paint</span></i><span data-dcnode-id="1742" instrument_node=""> dries much more slowly, and its hues do 
        not change. Moreover, as it dries, more paint can be added, to create 
        exceptionally rich colours. These attributes of workability and luscious 
        colour tone make oil paint the preferred choice of most master painters.</span></font></p><span data-dcnode-id="1739" instrument_node="">

</span><p data-dcnode-id="1451"><font data-dcnode-id="1452" face="Verdana" size="2"><b data-dcnode-id="1453"><a data-dcnode-id="1455" name="pigments"></a><span data-dcnode-id="1454" instrument_node="">What Exactly 
        Are Pigments?</span></b></font></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1447"><font data-dcnode-id="1448" face="Verdana" size="2"><span data-dcnode-id="1449" instrument_node="">Pigments and dyes are the ingredients that 
        impart colour to the paint. The word "colourant" is commonly 
        used for both dyes (and other dyestuffs) and pigments. The basic difference 
        between pigments and dyes is solubility (their ability to dissolve in 
        water). Whereas a dye is, or can be made, soluble, a pigment tends to 
        be more insoluble. Thus pigments must be ground into a fine powder and 
        then very thoroughly mixed with their carrier liquid, such as oil/water, 
        before being applied. Pigments can be made from dyes via a special process.</span></font></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1441"><font data-dcnode-id="1442" face="Verdana" size="2"><b data-dcnode-id="1443"><a data-dcnode-id="1445" name="sources"></a><span data-dcnode-id="1444" instrument_node="">What are the Main 
        Sources of Pigments?</span></b></font></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1437"><font data-dcnode-id="1438" face="Verdana" size="2"><span data-dcnode-id="1439" instrument_node="">Most paint-pigments come from metals (metallic 
        ores or compounds) or plants, although some derive from animal or fish 
        products, as well as charred wood or bone.</span></font></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1430"><font data-dcnode-id="1431" face="Verdana" size="2"><b data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Artist Pigments Derived From Metals</span></b><br data-dcnode-id="1433"><span data-dcnode-id="1432" instrument_node="">
        Metal-based colours include pigments such as: Cadmium (eg. Cadmium Yellow, 
        Cadmium Red), Chromium (eg. Chrome Yellow, Chrome Green); Cobalt (eg. 
        Cobalt Blue, Cerulean Blue, Aureolin, Cobalt Violet); Copper (eg. Han 
        Purple, Egyptian Blue, Verdigris, Viridian); Lead (eg. Lead White, Naples 
        Yellow, Red Lead); Mercury (eg. Vermilion); Titanium (eg. Titanium White, 
        Titanium Yellow); Zinc (eg. Zinc White); Lapis Lazuli (eg. Ultramarine); 
        Iron oxide (eg. Red Ochre, Sanguine, Caput Mortuum, Venetian Red, Sinopia, 
        Turkey Red, Pompeian Red, and Persian Red; tinted clays (eg. Yellow Ochre, 
        Raw Sienna, Burnt Sienna, Raw Umber, Burnt Umber).</span></font></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1420"><font data-dcnode-id="1421" face="Verdana" size="2"><b data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Artist Pigments/Dyes Derived From Plants</span></b><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">
        Natural plant-based pigments (most of which are now obsolete) include: 
        Cornflower Blue (an 18th century watercolour pigment from Cornflower petals); 
        Dragon's Blood (a ruby-red resinous colour from the tree </span><i data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Calamus draco</span></i><span data-dcnode-id="1422" instrument_node="">); 
        Fustic (a yellowish dye from the plant Chlorophona tinctoria); Gamboge 
        (a yellow gum from Thailand); Indigo (made from the Indigofera family 
        of plants); Logwood (a dark pigment from a South American tree); Madder 
        (a reddish colour from Madder plants); Pink (a yellow made from a mixture 
        of unripe buckthorn berries, weld, and broom); Quercitron Yellow (from 
        the bark of the American black quercitron oak); Safflower Pigment (a red 
        lake known as Carthame, made from the flowers of the Safflower plant); 
        Saffron (a yellow from the flowers of an Indian plant); Sap Green (from 
        the unripe berries of the Buckthorn plant); Turnsole (a purple/blue from 
        the Heliotrope plant of the borage family); Weld (a yellow from the plant); 
        Woad (a blue/indigo from the woad or dyerswoad herb of the mustard family).</span></font></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1413"><font data-dcnode-id="1414" face="Verdana" size="2"><b data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Artist Pigments Derived From Animal/Fish 
        Products</span></b><br data-dcnode-id="1416"><span data-dcnode-id="1415" instrument_node="">
        Now all obsolete (synthesized), these include: the crimson Carmine, made 
        from the Cochineal female insect of the Americas; the dark yellow Gallstone, 
        from the gallstone of an ox; Indian Yellow, produced from the urine of 
        cattle fed on mango leaves; Sepia, a black colourant from the ink sacs 
        of the cuttlefish. Tyrian Purple, a crimson pigment made from shell fish.</span></font></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1406"><font data-dcnode-id="1407" face="Verdana" size="2"><b data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Artist Pigments Made From Charred Wood/Bone</span></b><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">
        All now obsolete, these include: Bistre, a brown made by burning Beech 
        wood; Bone White, from burning bones to a white ash; Carbon Black, made 
        from charcoal or charred bone; Ivory Black, from burnt ivory; Vine Black, 
        from charred grape vines; Lamp Black, from soot taken from oil lamps.</span></font></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1400"><font data-dcnode-id="1401" face="Verdana" size="2"><b data-dcnode-id="1402"><a data-dcnode-id="1404" name="history"></a><span data-dcnode-id="1403" instrument_node="">What is the History 
        of Pigments?</span></b></font></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1390"><font data-dcnode-id="1391" face="Verdana" size="2"><b data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Colour Painting During the Stone Age</span></b><br data-dcnode-id="1396"><span data-dcnode-id="1395" instrument_node="">
        In the famous prehistoric cave paintings at Chauvet, Lascaux and Altamira, 
        Stone Age artists relied on basic earth pigments like clay ochres, in 
        yellow, brown and various hues of red, along with charcoal. (For details, 
        please see: </span><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/artist-paints/prehistoric-colour-palette.htm"><span data-dcnode-id="1394" instrument_node="">Prehistoric 
        Colour Palette</span></a><span data-dcnode-id="1392" instrument_node="">.)</span></font></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1380"><font data-dcnode-id="1381" face="Verdana" size="2"><b data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Colour Painting in Egypt</span></b><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">
        This crude but effective colour scheme was extended during early Antiquity 
        by Egyptian artists who decorated their temples and tombs with murals 
        and panel paintings which included new paint colours like: Egyptian Blue 
        Frit, the rich lemon yellow pigment Orpiment, the red-orange realgar, 
        the green Malachite and its blue variant Azurite. White colours were derived 
        from Gypsum and Chalk. (For details, see: </span><a data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/artist-paints/egyptian-colour-palette.htm"><span data-dcnode-id="1384" instrument_node="">Egyptian 
        Colour Palette</span></a><span data-dcnode-id="1382" instrument_node="">.)</span></font></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1370"><font data-dcnode-id="1371" face="Verdana" size="2"><b data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Colour Painting in Ancient Greece and 
        Rome</span></b><br data-dcnode-id="1376"><span data-dcnode-id="1375" instrument_node="">
        From Greek archaic painting onwards (c.650 BCE), the available range of 
        colours for both panel paintings and frescos was adequately wide. Greek 
        painting techniques were tempera and fresco; on wood and marble, encaustic 
        and tempera - a process in which colours were mixed with wax, painted 
        onto the surface and then 'burnt in'. In addition to the range of pigments 
        used in Ancient Egypt, Greek artists added new reds like the gum "Dragons 
        Blood", and Vermilion. New purples included Indigo, Madder and Tyrian 
        purple, while new greens featured. Verdigris and green earth (Terre Verte). 
        Massicot and Naples Yellow were two new yellows. (For details, see: </span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/artist-paints/classical-colour-palette.htm"><span data-dcnode-id="1374" instrument_node="">Classical 
        Colour Palette</span></a><span data-dcnode-id="1372" instrument_node="">.)</span></font></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1360"><font data-dcnode-id="1361" face="Verdana" size="2"><b data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Colour Painting in the Renaissance</span></b><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">
        Painting during the Renaissance was transformed by the development of 
        oil painting. This new medium made colours look extra good, and added 
        a new dimension of reality to figurative works, notably portraiture. Not 
        surprisingly it stimulated the discovery and use of many new hues. These 
        included the red pigments Carmine (Americas), "Red Lac" (India) 
        and a new red Vermilion; plus the fabulous dark-blue Ultramarine and the 
        yellow Gamboge, as well as Lead White. (For details, see: </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/artist-paints/renaissance-colour-palette.htm"><span data-dcnode-id="1364" instrument_node="">Renaissance 
        Colour Palette</span></a><span data-dcnode-id="1362" instrument_node="">.)</span></font></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1334"><font data-dcnode-id="1335" face="Verdana" size="2"><b data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Academic Traditions of Colour Painting</span></b><br data-dcnode-id="1356"><span data-dcnode-id="1355" instrument_node="">
        Several important principles of fine art were laid down by </span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/renaissance-art.htm"><span data-dcnode-id="1354" instrument_node="">Renaissance 
        art</span></a><span data-dcnode-id="1352" instrument_node="">. These principles consisted of conventions relating to all aspects 
        of picture-making, including subject, composition, line, and colour. Colour 
        (</span><i data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">colorito</span></i><span data-dcnode-id="1349" instrument_node="">) was regarded as secondary to the overall design (</span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/drawing/disegno.htm"><i data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">disegno</span></i></a><span data-dcnode-id="1345" instrument_node="">), 
        as illustrated by the fact that art students or apprentices spent the 
        vast majority of their time learning </span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/drawing.htm"><span data-dcnode-id="1344" instrument_node="">drawing</span></a><span data-dcnode-id="1342" instrument_node="">, 
        and only learned the art of pigments and colouring at a much later stage. 
        But see also: </span><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/titian-venetian-colour.htm"><span data-dcnode-id="1341" instrument_node="">Titian 
        and Venetian Colour Painting</span></a><span data-dcnode-id="1339" instrument_node=""> (c.1500-76), and </span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/venetian-painting-legacy.htm"><span data-dcnode-id="1338" instrument_node="">Legacy 
        of Venetian Painting</span></a><span data-dcnode-id="1336" instrument_node="">.</span></font></p><span data-dcnode-id="1333" instrument_node="">
