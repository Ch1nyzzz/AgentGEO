</span><p data-dcnode-id="1085"><font data-dcnode-id="1086" face="Arial" size="1"><b data-dcnode-id="1087"><font color="#FF0000" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">WORLD'S GREATEST 
        ART WORKS</span></font><br data-dcnode-id="1094"><span data-dcnode-id="1093" instrument_node="">
        For a list of masterpieces, see:</span><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">
</span><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/greatest-paintings-ever.htm"><span data-dcnode-id="1090" instrument_node="">Greatest Paintings Ever</span></a><span data-dcnode-id="1088" instrument_node="">.</span></b></font></p><span data-dcnode-id="1084" instrument_node="">
</span></td><td data-dcnode-id="878" valign="top" width="524"><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1058"><font data-dcnode-id="1059" face="Verdana" size="2"><b data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Colour Painting During the 17th and 
        18th Century</span></b><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">
        After the Renaissance, this approach to fine art painting was adopted 
        by all the major European Academies and became enshrined in the style 
        known as academic art. Painting was not even on the curriculum of most 
        academies - students had to learn painting skills in the atelier of a 
        master - and colour continued to have a secondary function, as more of 
        a supportive element. Thus during the Baroque </span><i data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Rubens</span></i><span data-dcnode-id="1074" instrument_node=""> attracted 
        criticism for his dramatic use of pigment, while </span><i data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Nicolas Poussin</span></i><span data-dcnode-id="1071" instrument_node=""> 
        was revered as an exemplar of more balanced colourism. A century or so 
        later, the same debate errupted over the respective colour practices of 
        the Romantic painter </span><i data-dcnode-id="1068"><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/delacroix.htm"><span data-dcnode-id="1070" instrument_node="">Delacroix</span></a></i><span data-dcnode-id="1067" instrument_node=""> 
        versus those of the more sobre </span><i data-dcnode-id="1064"><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters/ingres-jean-auguste-dominique.htm"><span data-dcnode-id="1066" instrument_node="">Jean 
        Auguste Dominique Ingres</span></a></i><span data-dcnode-id="1063" instrument_node="">. One of the cardinal principles of academic 
        painting concerned the primacy of the naturalistic palette: colours were 
        to reflect the natural colours found in nature, thus grass was green, 
        the sea was blue, and skin was flesh-coloured. This situation endured 
        until the 19th century when a revolution occurred. No major new colours 
        were discovered in the 17th century, but Prussian Blue was produced during 
        the 18th century, as were several new Cobalt and Chrome colours. (For 
        details, see: </span><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/artist-paints/colour-palette-eighteenth-century.htm"><span data-dcnode-id="1062" instrument_node="">Eighteenth 
        Century Colour Palette</span></a><span data-dcnode-id="1060" instrument_node="">.)</span></font></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1039"><font data-dcnode-id="1040" face="Verdana" size="2"><b data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">19th Century: Impressionism and Other 
        Schools</span></b><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">
        The 19th century - essentially the start of </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/modern-art.htm"><span data-dcnode-id="1052" instrument_node="">modern 
        art</span></a><span data-dcnode-id="1050" instrument_node=""> - was a period of massive change for both oil painters and watercolourists. 
        New pigments seemed to pop up every few years. Cobalt Blue emerged first, 
        then Chromium Green Oxide, followed by Indian Yellow, Cadmium Yellow, 
        Cerulean Blue, a cheap synthetic Ultramarine, Zinc White, Rose Madder, 
        Aureolin, Viridian, and Cobalt Violet. Nineteenth century painters now 
        possessed a cheaper, more convenient and more reliable means of colour 
        painting. The </span><i data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Fauvists</span></i><span data-dcnode-id="1047" instrument_node=""> and </span><i data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">German Expressionists</span></i><span data-dcnode-id="1044" instrument_node=""> took full 
        advantage of these technological advances in pigmentation to produce an 
        outburst of multi-coloured pictures. (For details, see: </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/artist-paints/colour-palette-nineteenth-century.htm"><span data-dcnode-id="1043" instrument_node="">Nineteenth 
        Century Colour Palette</span></a><span data-dcnode-id="1041" instrument_node="">.)</span></font></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1019"><font data-dcnode-id="1020" face="Verdana" size="2"><b data-dcnode-id="1035"><a data-dcnode-id="1037" name="impressionism"></a><span data-dcnode-id="1036" instrument_node="">The Impressionist 
        Revolution</span></b><br data-dcnode-id="1034"><span data-dcnode-id="1033" instrument_node="">
</span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/impressionist-painters.htm"><span data-dcnode-id="1032" instrument_node="">Impressionist painters</span></a><span data-dcnode-id="1030" instrument_node=""> 
        caused a revolution in the theory and practice of colour painting by their 
        insistence on capturing the "fleeting moment": the exact condition 
        of light/colour which they perceived when painting plein-air from nature. 
        Thus for example, if during this fleeting moment a tree-trunk - which 
        is "naturally" brown - appeared red in the light of a setting 
        sun, Impressionists (like Monet, Renoir, Pissarro and Sisley) painted 
        it red. In fact, it might appear in any of several differing hues, depending 
        on the effect of light, and was coloured accordingly. The "paint-what-you-see" 
        approach to colour seen in most </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/impressionist-paintings.htm"><span data-dcnode-id="1029" instrument_node="">Impressionist 
        paintings</span></a><span data-dcnode-id="1027" instrument_node=""> shattered the conventions of the time, and opened the gates 
        to further experimentation by schools, such as </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/neo-impressionism.htm"><span data-dcnode-id="1026" instrument_node="">Neo-Impressionism</span></a><span data-dcnode-id="1024" instrument_node=""> 
        (with its technique of </span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/pointillism.htm"><span data-dcnode-id="1023" instrument_node="">Pointillism</span></a><span data-dcnode-id="1021" instrument_node="">), 
        as practised by Georges Seurat and Paul Signac.</span></font></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="993"><font data-dcnode-id="994" face="Verdana" size="2"><b data-dcnode-id="1015"><a data-dcnode-id="1017" name="expressionism"></a><span data-dcnode-id="1016" instrument_node="">Expressionism</span></b><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">
        Impressionism represented the ultimate in "copying nature". 
        But after two decades of slavish copying, progressive artists rebelled. 
        Tired of simply "painting-what-they-saw" they injected more 
        subjectivity into their canvases, in a general style known as </span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/expressionism.htm"><span data-dcnode-id="1012" instrument_node="">Expressionism</span></a><span data-dcnode-id="1010" instrument_node="">. 
        Pioneered by Paul Gauguin and Vincent Van Gogh, the </span><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/expressionist-movement.htm"><span data-dcnode-id="1009" instrument_node="">expressionist 
        movement</span></a><span data-dcnode-id="1007" instrument_node=""> was developed first by so-called </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/fauvist-painters.htm"><span data-dcnode-id="1006" instrument_node="">Fauvist 
        painters</span></a><span data-dcnode-id="1004" instrument_node=""> in 1905. For two years Fauvism was the hot thing in Paris: 
        everyone tried it, even Georges Braque. Its influence spread to Germany 
        triggering an explosion of German Expressionism spearheaded by progressive 
        art groups like Der Blaue Reiter and Die Brucke. It also spread to Britain 
        where it influenced the </span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/scottish-colourists.htm"><span data-dcnode-id="1003" instrument_node="">Scottish 
        Colourists</span></a><span data-dcnode-id="1001" instrument_node=""> and others. For more information, see: </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/expressionist-painting-origins.htm"><span data-dcnode-id="1000" instrument_node="">History 
        of Expressionism</span></a><span data-dcnode-id="998" instrument_node="">. For artists involved, see: </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/expressionist-painters.htm"><span data-dcnode-id="997" instrument_node="">Expressionist 
        Painters</span></a><span data-dcnode-id="995" instrument_node="">.</span></font></p><span data-dcnode-id="992" instrument_node="">
</span><blockquote data-dcnode-id="974"><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="976"><font data-dcnode-id="977" face="Verdana" size="2"><span data-dcnode-id="990" instrument_node="">Note: The Russian strain of 20th century 
          colourism is most evident in the fabulous theatrical sets created for 
          </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/diaghilev.htm"><span data-dcnode-id="989" instrument_node="">Sergei Diaghilev</span></a><span data-dcnode-id="987" instrument_node=""> and his 
          </span><i data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Ballets Russes</span></i><span data-dcnode-id="984" instrument_node="">. by designers like </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/leon-bakst.htm"><span data-dcnode-id="983" instrument_node="">Leon 
          Bakst</span></a><span data-dcnode-id="981" instrument_node=""> (1866-1924) and </span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/alexander-benois.htm"><span data-dcnode-id="980" instrument_node="">Alexander 
          Benois</span></a><span data-dcnode-id="978" instrument_node=""> (1870-1960).</span></font></p><span data-dcnode-id="975" instrument_node="">
</span></blockquote><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="941"><font data-dcnode-id="942" face="Verdana" size="2"><b data-dcnode-id="970"><a data-dcnode-id="972" name="abstractexpressionism"></a><span data-dcnode-id="971" instrument_node="">Abstract 
        Expressionism/Colour Field Painting</span></b><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">
        Colour experimentation errupted again during the immediate post-World 
        War II period in America, where European emigrant artists (eg. </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/arshile-gorky.htm"><span data-dcnode-id="967" instrument_node="">Arshile 
        Gorky</span></a><span data-dcnode-id="965" instrument_node="">, Josef Albers, </span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/mark-rothko.htm"><span data-dcnode-id="964" instrument_node="">Mark 
        Rothko</span></a><span data-dcnode-id="962" instrument_node=""> and others) mixed with locals like, </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/clyfford-still.htm"><span data-dcnode-id="961" instrument_node="">Clyfford 
        Still</span></a><span data-dcnode-id="959" instrument_node=""> and </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/barnett-newman.htm"><span data-dcnode-id="958" instrument_node="">Barnett Newman</span></a><span data-dcnode-id="956" instrument_node=""> 
        to produce a style of </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/abstract-expressionism.htm"><span data-dcnode-id="955" instrument_node="">Abstract 
        Expressionism</span></a><span data-dcnode-id="953" instrument_node=""> known as </span><i data-dcnode-id="950"><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/colour-field-painting.htm"><span data-dcnode-id="952" instrument_node="">Colour 
        Field Painting</span></a></i><span data-dcnode-id="949" instrument_node="">. Typically, this featured huge canvases containing 
        large areas of colour which were designed to "envelope" the 
        viewer and engender an emotional reaction. See, for instance, </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/mark-rothko-paintings.htm"><span data-dcnode-id="948" instrument_node="">Mark 
        Rothko's paintings</span></a><span data-dcnode-id="946" instrument_node=""> (1938-70). Pigment was now "the" key 
        element of the canvas: it was the high point of colour painting. And despite 
        the eventual collapse of the movement in the early 1960s, colour has continued 
        to maintain its independent status in the process of </span><i data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">disegno</span></i><span data-dcnode-id="943" instrument_node="">.</span></font></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="935"><font data-dcnode-id="936" face="Verdana" size="2"><b data-dcnode-id="937"><a data-dcnode-id="939" name="manufacture"></a><span data-dcnode-id="938" instrument_node="">Impact of 
        Manufacturing Technology on Colour Painting</span></b></font></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="930"><font data-dcnode-id="931" face="Verdana" size="2"><b data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">New Paints</span></b></font></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="926"><font data-dcnode-id="927" face="Verdana" size="2"><span data-dcnode-id="928" instrument_node="">Impressionism coincided with the invention 
        of the collapsible tin paint tube in 1841, by American painter John Rand, 
        which made more pre-mixed colours available in a convenient medium. In 
        addition, paint manufacturers like the Sherwin-Williams Company began 
        urgently trying to perfect a formula that would keep fine paint particles 
        suspended in Linseed oil. In 1880, after more than a decade of chemical 
        research, the company produced a formula that far exceeded the quality 
        of oil paints then available. Since then, artist-paint manufacturers have 
        produced an ever-growing range of pre-mixed oil paints, virtually eliminating 
        the need for hand-ground pigments, and revolutionizing the practice of 
        oil painting in the process.</span></font></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="922"><font data-dcnode-id="923" face="Verdana" size="2"><span data-dcnode-id="924" instrument_node="">In addition, the appearance of acrylic 
        painting in the 1940s (initially developed by the German chemist Dr. Otto 
        Rohm) has provided painters with an even more convenient alternative to 
        slow-drying oil colours. Thus technological advances in the manufacture 
        of oil-based and now acrylic-based pigments has (and continues to have) 
        a major influence on the theory and practice of colour painting.</span></font></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="917"><font data-dcnode-id="918" face="Verdana" size="2"><b data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">New Synthetic Colourants</span></b></font></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="880"><font data-dcnode-id="881" face="Verdana" size="2"><span data-dcnode-id="915" instrument_node="">The laboratory invention of synthetic pigments 
        to replace the more costly colours made from organic or other naturally 
        occurring dyestuffs, has also had a huge impact on paint manufacture, 
        and thus on fine art painting. One of the first modern synthetic pigments, 
        discovered by chance in 1704, was </span><i data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Prussian Blue</span></i><span data-dcnode-id="912" instrument_node="">. Many other natural 
        pigments were successfully synthesized by chemists, including </span><i data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Raw Sienna</span></i><span data-dcnode-id="909" instrument_node="">, 
        </span><i data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Raw Umber</span></i><span data-dcnode-id="906" instrument_node="">, </span><i data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Burnt Sienna</span></i><span data-dcnode-id="903" instrument_node="">, and </span><i data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Burnt Umber</span></i><span data-dcnode-id="900" instrument_node="">. By the 
        early 19th century, more synthetic blue pigments had been created, including 
        </span><i data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">French ultramarine</span></i><span data-dcnode-id="897" instrument_node="">, an artificial form of </span><i data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">lapis lazuli</span></i><span data-dcnode-id="894" instrument_node="">, 
        along with laboratory versions of </span><i data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Cobalt</span></i><span data-dcnode-id="891" instrument_node=""> and </span><i data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Cerulean Blue</span></i><span data-dcnode-id="888" instrument_node="">. 
        In the early 20th century, organic chemists created </span><i data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Phthalo Blue</span></i><span data-dcnode-id="885" instrument_node="">, 
        a synthetic pigment with enormous tinting power. By the end of the 19th 
        century, thanks to both the organic chemists and the paint manufacturers, 
        a wide range of oil paint colours - such as red, crimson, blue, and purple 
        - had become available in affordable formats. Furthermore, because many 
        pigments were now being made from chemical components under laboratory 
        conditions, much higher standards of quality and consistence - in the 
        composition and durability of colours - became possible. Thus in 1905, 
        chemists were able to develop the </span><i data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Munsell Color System</span></i><span data-dcnode-id="882" instrument_node="">, a measurement 
        system which became the foundation for a series of colour models. Among 
        other things, the system classified colours by hue, value (lightness), 
        and chroma (purity of colour).</span></font></p><span data-dcnode-id="879" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="872" instrument_node="">
</span><span data-dcnode-id="871" instrument_node="">
</span><span data-dcnode-id="870" instrument_node="">
</span><span data-dcnode-id="864" instrument_node="">
</span><span data-dcnode-id="667" instrument_node="">
</span><span data-dcnode-id="665" instrument_node="">
</span><table align="center" border="0" cellpadding="5" cellspacing="2" data-dcnode-id="663" width="750"><tbody data-dcnode-id="664"><tr data-dcnode-id="666"><td data-dcnode-id="865" valign="top" width="200"><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">&nbsp;</span></p><span data-dcnode-id="866" instrument_node="">
</span></td><td data-dcnode-id="668" valign="top" width="524"><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="858"><font data-dcnode-id="859" face="Verdana" size="2"><b data-dcnode-id="860"><a data-dcnode-id="862" name="classification"></a><span data-dcnode-id="861" instrument_node="">New Standardized 
        Colour Systems</span></b></font></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="854"><font data-dcnode-id="855" face="Verdana" size="2"><span data-dcnode-id="856" instrument_node="">One of the major developments in colour 
        painting during the 20th century has been the creation of a number of 
        colour systems designed to classify and standardize the attributes of 
        pigments, to improve manufacturing and labelling consistency. The main 
        systems include:</span></font></p><span data-dcnode-id="853" instrument_node="">
</span><blockquote data-dcnode-id="802"><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="846"><font data-dcnode-id="847" face="Verdana" size="2"><b data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">The American Society for Testing and 
          Materials (ASTM) System</span></b><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">
          The ASTM is the organization mainly responsible for setting minimum 
          standards for the testing and quality of artists' materials, notably 
          in the labelling of paint products. First published in 1984, these standards 
          provide the only assurance, outside of Federal and State mandated health 
          warnings, that (eg) acrylics and oil paints are accurately labelled.</span></font></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="839"><font data-dcnode-id="840" face="Verdana" size="2"><b data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">The Colour Index</span></b><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
          First published in 1925 by The Society Of Dyers and Colourists of the 
          UK, and presently managed in conjunction with the American Association 
          of Textile Chemists and Colorists, The Colour Index is the official 
          index of all commercially available colourants. Grouped by colour, each 
          hue is assigned a C.I. (Colour Index) Generic Name, Constitution Number, 
          and a listing of Common Names associated with the dye or pigment. The 
          greatest value of this system is that it offers a standardized, dependable 
          way of knowing exactly which pigments are in a paint.</span></font></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="832"><font data-dcnode-id="833" face="Verdana" size="2"><b data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Colorimetry and the Measure of Colour</span></b><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
          Although highly useful, the Colour Index’s principal focus remains 
          the cataloging of commercially available pigments. It does not classify 
          colour in a particularly scientific way. For this, experts turned to 
          the science of Colorimetry, the field concerned with the quantitative 
          measurement of colour in general, and two main models have emerged - 
          Munsell and CIE Lab - along with two alternate systems - CMYK and RGB 
          - which are widely employed in the print and display industries.</span></font></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="825"><font data-dcnode-id="826" face="Verdana" size="2"><b data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Munsell</span></b><br data-dcnode-id="828"><span data-dcnode-id="827" instrument_node="">
          Created by the American artist and educator, Albert H. Munsell, in 1905, 
          the Munsell colour system was an early attempt to arrange colours into 
          a logical order. It is based around three attributes: Hue, or the quality 
          that differentiates one colour from another; Chroma, a concept similar 
          to Saturation; and Value, the lightness/darkness of a colour.</span></font></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="818"><font data-dcnode-id="819" face="Verdana" size="2"><b data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">CIE LAB</span></b><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">
          In 1976 the Commission Internationale d’Eclairage (CIE), the organization 
          that promulgates official standards for the scientific measurement of 
          colour, developed a model known as CIE Lab in order to describe all 
          perceptible colours in a uniform manner.</span></font></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="811"><font data-dcnode-id="812" face="Verdana" size="2"><b data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">RGB and CMYK</span></b><br data-dcnode-id="814"><span data-dcnode-id="813" instrument_node="">
          These systems cover the classification of colours and pigments appearing 
          on monitors, televisions, printers, scanners, digital cameras, and mobile 
          phones. All these devices operate quite differently from the CIE Lab 
          and Munsell systems. In the latter, a set of well-defined variables 
          delineate a unique colour. In comparison, RGB and CMYK values purport 
          to describe ratios between generalized inputs: additive primary colours, 
          in the case of RGB, or subtractive primary colours for printing inks 
          in CMYK. Put simply, these systems provide a recipe for mixing a colour 
          rather than its definition.</span></font></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="804"><font data-dcnode-id="805" face="Verdana" size="2"><b data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Pantone®</span></b><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
          A third system employed in printing is the Pantone system. Its Pantone 
          Matching System (PMS) allows printers to accurately reproduce every 
          known hue of ink.</span></font></p><span data-dcnode-id="803" instrument_node="">
</span></blockquote><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="796"><font data-dcnode-id="797" face="Verdana" size="2"><b data-dcnode-id="798"><a data-dcnode-id="800" name="colourists"></a><span data-dcnode-id="799" instrument_node="">The Greatest 
        Colourists in Fine Art Painting </span></b></font></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="792"><font data-dcnode-id="793" face="Verdana" size="2"><span data-dcnode-id="794" instrument_node="">Before listing some of the most famous 
        exponents of colour work, it is important to remember that, (as described 
        above), between roughly 1400 and 1800 painters were severely circumscribed 
        in their application of colour, due to prevailing academic theories of 
        fine art. Colour was an integral but supportive element in the process 
        of picturemaking, and artists were obliged to be extremely subtle in their 
        choice and use of pigments. Thus the greatest colourists were those whose 
        palette captured and celebrated the precise mood of their picture, rather 
        than those who employed the most vivid pigmentation. Only later, in the 
        19th century, did painters feel at liberty to treat colour as an independent 
        form of expression and endow it with the importance it deserved. Modern 
        colourists are therefore noted for much greater freedom in this area.</span></font></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="787"><font data-dcnode-id="788" face="Verdana" size="2"><b data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Renaissance Colourists</span></b></font></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="773"><font data-dcnode-id="774" face="Verdana" size="2"><span data-dcnode-id="785" instrument_node="">• </span><b data-dcnode-id="782"><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters/jan-van-eyck.htm"><span data-dcnode-id="784" instrument_node="">Jan 
        van Eyck</span></a></b><span data-dcnode-id="781" instrument_node=""> (1390-1441)</span><br data-dcnode-id="780"><span data-dcnode-id="779" instrument_node="">
        One of the earliest pioneers of oil paint, his unique colour work is illustrated 
        in his powerful </span><i data-dcnode-id="776"><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-paintings/portrait-of-man-in-red-turban.htm"><span data-dcnode-id="778" instrument_node="">Portrait 
        of a Man in a Red Turban</span></a></i><span data-dcnode-id="775" instrument_node=""> (1433, oil on wood, National Gallery, 
        London), with its thin layers of transparent pigment.</span></font></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="760"><font data-dcnode-id="761" face="Verdana" size="2"><span data-dcnode-id="771" instrument_node="">• </span><b data-dcnode-id="768"><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters/raphael.htm"><span data-dcnode-id="770" instrument_node="">Raphael</span></a></b><span data-dcnode-id="767" instrument_node=""> 
        (1483-1520)</span><br data-dcnode-id="766"><span data-dcnode-id="765" instrument_node="">
        Said to be the greatest painter of the High Renaissance. His colour work 
        is exemplified by </span><i data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Madonna della Sedia</span></i><span data-dcnode-id="762" instrument_node=""> (1512-14, oil on panel, Galleria 
        Palatina, Palazzo Pitti, Florence), the greatest example of Renaissance 
        Madonnas.</span></font></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="744"><font data-dcnode-id="745" face="Verdana" size="2"><span data-dcnode-id="758" instrument_node="">• </span><b data-dcnode-id="755"><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters/titian.htm"><span data-dcnode-id="757" instrument_node="">Titian</span></a></b><span data-dcnode-id="754" instrument_node=""> 
        (c.1477-1576)</span><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">
        The most celebrated member of the school of </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/venetian-painting.htm"><span data-dcnode-id="751" instrument_node="">Venetian 
        painting</span></a><span data-dcnode-id="749" instrument_node="">, Titian's colour work is represented by </span><i data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The Assumption 
        of the Virgin</span></i><span data-dcnode-id="746" instrument_node=""> (1516-18, oil on panel, Santa Maria Gloriosa dei Frari, 
        Venice), whose strong colours, golden light and gesticulating figures 
        caused a sensation when the picture was unveiled in 1518.</span></font></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="731"><font data-dcnode-id="732" face="Verdana" size="2"><span data-dcnode-id="742" instrument_node="">• </span><b data-dcnode-id="739"><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters/tintoretto.htm"><span data-dcnode-id="741" instrument_node="">Jacopo 
        Tintoretto</span></a></b><span data-dcnode-id="738" instrument_node=""> (1518-94)</span><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node="">
        Another supreme Venetian artist, his </span><i data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">St Mark Freeing the Slave</span></i><span data-dcnode-id="733" instrument_node=""> 
        (1547-8, oil on canvas, Galleria dell'Accademia, Venice) shows Tintoretto's 
        peerless mid-tonal palette incorporating beautiful pinks, browns, ochres 
        and reds.</span></font></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="713"><font data-dcnode-id="714" face="Verdana" size="2"><span data-dcnode-id="729" instrument_node="">• </span><b data-dcnode-id="726"><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters/paolo-veronese.htm"><span data-dcnode-id="728" instrument_node="">Paolo 
        Veronese</span></a></b><span data-dcnode-id="725" instrument_node=""> (1528-88)</span><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node="">
        Said to be even greater than Titian, his masterpieces are undoubtedly 
        the monumental paintings </span><i data-dcnode-id="720"><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-paintings/wedding-feast-at-cana.htm"><span data-dcnode-id="722" instrument_node="">The 
        Wedding Feast at Cana</span></a></i><span data-dcnode-id="719" instrument_node=""> (1562-3, Louvre, Paris) and </span><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-paintings/feast-in-the-house-of-levi.htm"><i data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Feast 
        in the House of Levi</span></i></a><span data-dcnode-id="715" instrument_node=""> (1573, Venice Academy) with their glowing 
        colours.</span></font></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="708"><font data-dcnode-id="709" face="Verdana" size="2"><b data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">17th Century Colourists</span></b></font></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="690"><font data-dcnode-id="691" face="Verdana" size="2"><span data-dcnode-id="706" instrument_node="">• </span><b data-dcnode-id="703"><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters/rubens.htm"><span data-dcnode-id="705" instrument_node="">Peter 
        Paul Rubens</span></a></b><span data-dcnode-id="702" instrument_node=""> (1577-1640)</span><br data-dcnode-id="701"><span data-dcnode-id="700" instrument_node="">
        The colourism of this great Counter-Reformation painter is well illustrated 
        by </span><i data-dcnode-id="697"><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-paintings/descent-from-the-cross-rubens.htm"><span data-dcnode-id="699" instrument_node="">Descent 
        from the Cross (Rubens)</span></a></i><span data-dcnode-id="696" instrument_node=""> (1612-14, oil on panel, Antwerp), and 
        </span><i data-dcnode-id="693"><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-paintings/samson-and-delilah.htm"><span data-dcnode-id="695" instrument_node="">Samson and Delilah</span></a></i><span data-dcnode-id="692" instrument_node=""> 
        (1609, oil on wood, National Gallery, London), with their rich red cloaks 
        and drapery.</span></font></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="670"><font data-dcnode-id="671" face="Verdana" size="2"><span data-dcnode-id="688" instrument_node="">• </span><b data-dcnode-id="685"><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters/jan-vermeer.htm"><span data-dcnode-id="687" instrument_node="">Jan 
        Vermeer</span></a></b><span data-dcnode-id="684" instrument_node=""> (1632-1675)</span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">
        The most famous of Dutch Realists, along with Rembrandt, Vermeer's colour 
        work is exemplified by the cool blues and sensuous whites of </span><i data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Girl with 
        a Pearl Earring</span></i><span data-dcnode-id="679" instrument_node=""> (c.1600, oil on canvas, Mauritshuis Museum, The Hague) 
        and </span><i data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Lady Seated at a Virginal</span></i><span data-dcnode-id="676" instrument_node=""> (1632, oil on canvas, National Gallery, 
        London), in severe contrast with the rich vermilion/scarlet of </span><i data-dcnode-id="673"><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-paintings/girl-with-red-hat.htm"><span data-dcnode-id="675" instrument_node="">Girl 
        with a Red Hat</span></a></i><span data-dcnode-id="672" instrument_node=""> (1671-2, oil on panel, National Gallery, Washington 
        DC)</span></font></p><span data-dcnode-id="669" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="662" instrument_node="">

</span><span data-dcnode-id="257" instrument_node="">
</span><span data-dcnode-id="255" instrument_node="">
</span><table align="center" border="0" cellpadding="5" cellspacing="2" data-dcnode-id="253" width="750"><tbody data-dcnode-id="254"><tr data-dcnode-id="256"><td data-dcnode-id="655" valign="top" width="200"><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">&nbsp;</span></p><span data-dcnode-id="656" instrument_node="">
</span></td><td data-dcnode-id="258" valign="top" width="524"><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="649"><font data-dcnode-id="650" face="Verdana" size="2"><b data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">18th Century Colourists</span></b></font></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="635"><font data-dcnode-id="636" face="Verdana" size="2"><span data-dcnode-id="647" instrument_node="">• </span><b data-dcnode-id="644"><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/old-masters/tiepolo-giambattista.htm"><span data-dcnode-id="646" instrument_node="">Giambattista 
        Tiepolo</span></a></b><span data-dcnode-id="643" instrument_node=""> (1696-1770)</span><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">
        The greatest post-Renaissance fresco painter, Tiepolo's colouristic work 
        is aptly illustrated by his </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-paintings/wurzburg-residence-frescoes.htm"><i data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Wurzburg 
        Palace frescos</span></i></a><span data-dcnode-id="637" instrument_node=""> (1750-3). Their pale limpid colours add luminosity 
        to the sky and overall optics.</span></font></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="630"><font data-dcnode-id="631" face="Verdana" size="2"><b data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">19th Century Colourists</span></b></font></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="616"><font data-dcnode-id="617" face="Verdana" size="2"><span data-dcnode-id="628" instrument_node="">• </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/delacroix.htm"><b data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Eugene 
        Delacroix</span></b></a><span data-dcnode-id="624" instrument_node=""> (1798-1863)</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">
        A great admirer of Venetian colourists like Titian and Paolo Veronese, 
        as well as the Baroque master Rubens, Delacroix was also influenced by 
        English painters like Turner, Constable and Richard Parkes Bonnington. 
        Among his great colourist works is </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/paintings-analysis/death-of-sardanapalus.htm"><i data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The 
        Death of Sardanapalus</span></i></a><span data-dcnode-id="618" instrument_node=""> (1827, Louvre, Paris). </span></font></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="599"><font data-dcnode-id="600" face="Verdana" size="2"><span data-dcnode-id="614" instrument_node="">• </span><b data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Pre-Raphaelites</span></b><span data-dcnode-id="611" instrument_node=""> (c.1848-60)</span><br data-dcnode-id="610"><span data-dcnode-id="609" instrument_node="">
        Several members of the English Pre-Raphaelite Brotherhood were masters 
        of colour, notably </span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/dante-gabriel-rossetti.htm"><b data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Dante 
        Gabriel Rossetti</span></b></a><span data-dcnode-id="605" instrument_node=""> (1828-82) and </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/ford-madox-brown.htm"><b data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Ford 
        Madox Brown</span></b></a><span data-dcnode-id="601" instrument_node=""> (1821-93).</span></font></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="583"><font data-dcnode-id="584" face="Verdana" size="2"><span data-dcnode-id="597" instrument_node="">• </span><b data-dcnode-id="594"><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/monet.htm"><span data-dcnode-id="596" instrument_node="">Claude 
        Monet</span></a></b><span data-dcnode-id="593" instrument_node=""> (1840-1926)</span><br data-dcnode-id="592"><span data-dcnode-id="591" instrument_node="">
        Monet's colourism is best exemplified by his extraordinary large-scale 
        canvases of his waterlily pond at Giverny, such as </span><i data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">The Japanese Bridge 
        at Giverny</span></i><span data-dcnode-id="588" instrument_node=""> (1918-24, oil on canvas, Marmottan Museum, Paris), a precursor 
        of the later Abstract Expressionism movement. See too the Irish colourist 
        </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/irish-artists/roderic-oconor.htm"><span data-dcnode-id="587" instrument_node="">Roderic O'Conor</span></a><span data-dcnode-id="585" instrument_node="">.</span></font></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="571"><font data-dcnode-id="572" face="Verdana" size="2"><span data-dcnode-id="581" instrument_node="">• </span><b data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Vittore Grubicy De Dragon</span></b><span data-dcnode-id="578" instrument_node=""> 
        (1851–1920)</span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">
        Painter, writer and art dealer, largely responsible for the </span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/italian-divisionism.htm"><span data-dcnode-id="575" instrument_node="">Italian 
        Divisionism</span></a><span data-dcnode-id="573" instrument_node=""> movement, a variant of French Neo-Impressionism and Pointillism.</span></font></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="551"><font data-dcnode-id="552" face="Verdana" size="2"><span data-dcnode-id="569" instrument_node="">• </span><b data-dcnode-id="566"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/seurat-georges.htm"><span data-dcnode-id="568" instrument_node="">Georges 
        Seurat</span></a></b><span data-dcnode-id="565" instrument_node=""> (1859-1891)</span><br data-dcnode-id="564"><span data-dcnode-id="563" instrument_node="">
        His application of Pointillist colour theory is exemplified by his famous 
        masterpiece, </span><i data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">A Sunday Afternoon on the Island of La Grande Jatte</span></i><span data-dcnode-id="560" instrument_node=""> 
        (1884-6, oil on canvas, Art Institute of Chicago). Seurat's work into 
        </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/divisionism.htm"><span data-dcnode-id="559" instrument_node="">Divisionism</span></a><span data-dcnode-id="557" instrument_node=""> and Chromoluminarism 
        was significantly developed by </span><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/paul-signac.htm"><b data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Paul 
        Signac</span></b></a><span data-dcnode-id="553" instrument_node=""> (1863-1935).</span></font></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="529"><font data-dcnode-id="530" face="Verdana" size="2"><span data-dcnode-id="549" instrument_node="">• </span><b data-dcnode-id="546"><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/emil-nolde.htm"><span data-dcnode-id="548" instrument_node="">Emil 
        Nolde</span></a></b><span data-dcnode-id="545" instrument_node=""> (1867-1956)</span><br data-dcnode-id="544"><span data-dcnode-id="543" instrument_node="">
        A member of the </span><i data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Die Brucke</span></i><span data-dcnode-id="540" instrument_node=""> Expressionist group, Nolde's work is 
        full of examples of his colourist painting. Wonderful examples include: 
        </span><i data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Early Morning Flight</span></i><span data-dcnode-id="537" instrument_node=""> (1950, Nolde Foundation) with its blues and 
        greens, and </span><i data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Still Life with Dancers</span></i><span data-dcnode-id="534" instrument_node=""> (1914, oil on canvas, Museum 
        of Modern Art, Paris) with its primitive red and yellow </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/symbolism.htm"><span data-dcnode-id="533" instrument_node="">symbolism</span></a><span data-dcnode-id="531" instrument_node="">.</span></font></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="500"><font data-dcnode-id="501" face="Verdana" size="2"><span data-dcnode-id="527" instrument_node="">• </span><b data-dcnode-id="524"><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/gauguin-paul.htm"><span data-dcnode-id="526" instrument_node="">Paul 
        Gauguin</span></a></b><span data-dcnode-id="523" instrument_node=""> (1848-1903)</span><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">
        For Gauguin, colour had symbolic and emotional significance, as in</span><i data-dcnode-id="519"><span data-dcnode-id="520" instrument_node=""> 
        Vision After the Sermon</span></i><span data-dcnode-id="518" instrument_node=""> (1888, National Gallery of Scotland) or </span><i data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Where 
        do we come from? What are we? Where are we going?</span></i><span data-dcnode-id="515" instrument_node=""> (1897, oil on canvas, 
        Museum of Fine Arts, Boston). His use of flat areas of pure colour was 
        known as </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/synthetism.htm"><span data-dcnode-id="514" instrument_node="">Synthetism</span></a><span data-dcnode-id="512" instrument_node="">, while 
        his followers at the </span><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/pont-aven.htm"><span data-dcnode-id="511" instrument_node="">Pont-Aven 
        School</span></a><span data-dcnode-id="509" instrument_node=""> (Louis Anquetin and </span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/emile-bernard.htm"><span data-dcnode-id="508" instrument_node="">Emile 
        Bernard</span></a><span data-dcnode-id="506" instrument_node="">) developed the use of heavy outline filled with pure colour, 
        as in medieval enamels - a style known as </span><i data-dcnode-id="503"><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/cloisonnism.htm"><span data-dcnode-id="505" instrument_node="">Cloisonnism</span></a></i><span data-dcnode-id="502" instrument_node="">.</span></font></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="484"><font data-dcnode-id="485" face="Verdana" size="2"><span data-dcnode-id="498" instrument_node="">• </span><b data-dcnode-id="495"><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/van-gogh.htm"><span data-dcnode-id="497" instrument_node="">Vincent 
        Van Gogh</span></a></b><span data-dcnode-id="494" instrument_node=""> (1853-1890)</span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">
        The vivid palette of Van Gogh's powerful </span><i data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Wheat Field with Crows</span></i><span data-dcnode-id="489" instrument_node=""> 
        (1890, oil on canvas, </span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/museums/van-gogh.htm"><span data-dcnode-id="488" instrument_node="">Van Gogh Museum</span></a><span data-dcnode-id="486" instrument_node="">, 
        Amsterdam) with its "blazing" corn field and threatening black 
        crows perfectly exemplifies his use of colour to express his personal 
        emotional feelings.</span></font></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="471"><font data-dcnode-id="472" face="Verdana" size="2"><span data-dcnode-id="482" instrument_node="">• </span><b data-dcnode-id="479"><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/gustav-klimt.htm"><span data-dcnode-id="481" instrument_node="">Gustav 
        Klimt</span></a></b><span data-dcnode-id="478" instrument_node=""> (1862-1918)</span><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">
        Klimt's decorative masterpiece </span><i data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">The Kiss</span></i><span data-dcnode-id="473" instrument_node=""> (1907-8, oil and gold on 
        canvas, Osterreichische Galerie, Vienna) typifies the Viennese Secession 
        master's Byzantine-art style of glittering colour and precious metal.</span></font></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="447"><font data-dcnode-id="448" face="Verdana" size="2"><span data-dcnode-id="469" instrument_node="">• </span><b data-dcnode-id="466"><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/pierre-bonnard.htm"><span data-dcnode-id="468" instrument_node="">Pierre 
        Bonnard</span></a></b><span data-dcnode-id="465" instrument_node=""> (1867–1947)</span><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">
        A founding member of </span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/nabis.htm"><b data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Les Nabis</span></b></a><span data-dcnode-id="459" instrument_node="">, 
        he was also - with Edouard Vuillard - noted for his domestic genre scenes 
        (Intimism), although his paintings had greater richness and splendour 
        of colour. In general, his colourist works radiate a sense of warmth and 
        well-being. See, in particular, his later 20th century works, such as: 
        </span><i data-dcnode-id="455"><span data-dcnode-id="458" instrument_node="">The </span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/paintings-analysis/green-blouse-bonnard.htm"><span data-dcnode-id="457" instrument_node="">Green Blouse</span></a></i><span data-dcnode-id="454" instrument_node=""> 
        (1919, Metropolitan Museum of Art), and also </span><i data-dcnode-id="450"><span data-dcnode-id="453" instrument_node="">The </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/paintings-analysis/terrace-bonnard.htm"><span data-dcnode-id="452" instrument_node="">Terrace 
        at Vernon</span></a></i><span data-dcnode-id="449" instrument_node=""> (1939, Metropolitan Museum).</span></font></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="442"><font data-dcnode-id="443" face="Verdana" size="2"><b data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">20th Century Colourists</span></b></font></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="426"><font data-dcnode-id="427" face="Verdana" size="2"><span data-dcnode-id="440" instrument_node="">• </span><b data-dcnode-id="437"><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/kandinsky-wassily.htm"><span data-dcnode-id="439" instrument_node="">Wassily 
        Kandinsky</span></a></b><span data-dcnode-id="436" instrument_node=""> (1844-1944)</span><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node="">
        Combined a Fauve-like intensity of colour with elements of Russian folk-art. 
        The founder of the Der Blaue Reiter Expressionist group, his works like 
        </span><i data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Composition No 7</span></i><span data-dcnode-id="431" instrument_node=""> (1913) use the shock of contrasting colours, while 
        </span><i data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Two Poplars</span></i><span data-dcnode-id="428" instrument_node=""> (1913, Art Institute of Chicago) employs colour to 
        depict a landscape with enormous emotional undertones.</span></font></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="410"><font data-dcnode-id="411" face="Verdana" size="2"><span data-dcnode-id="424" instrument_node="">• </span><b data-dcnode-id="421"><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/alexei-jawlensky.htm"><span data-dcnode-id="423" instrument_node="">Alexei 
        von Jawlensky</span></a></b><span data-dcnode-id="420" instrument_node=""> (1864-1941)</span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">
        This Russian Expressionist, strongly influenced by Matisse, employed bold, 
        vivid pigments to express his passionate temperament and melancholic introspection. 
        His colourism is wonderfully illustrated by </span><i data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Head</span></i><span data-dcnode-id="415" instrument_node=""> (1910, oil on 
        canvas over cardboard, Museum of Modern Art, New York) and </span><i data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Head of 
        a Woman</span></i><span data-dcnode-id="412" instrument_node=""> (1911, oil on cardboard, National Gallery of Modern Art).</span></font></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="384"><font data-dcnode-id="385" face="Verdana" size="2"><span data-dcnode-id="408" instrument_node="">• </span><b data-dcnode-id="405"><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/matisse.htm"><span data-dcnode-id="407" instrument_node="">Henri 
        Matisse</span></a></b><span data-dcnode-id="404" instrument_node=""> (1869-1954)</span><br data-dcnode-id="403"><span data-dcnode-id="402" instrument_node="">
        The leader of the Fauves and an artist devoted to a lifetime's exploration 
        of colour, his approach is well illustrated by </span><i data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Luxe, Calme et Volupte</span></i><span data-dcnode-id="399" instrument_node=""> 
        (Luxury, Serenity and Pleasure, 1904, oil on canvas, Musee d'Orsay, Paris), 
        and his </span><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/paintings-analysis/nasturtiums-matisse.htm"><i data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Nasturtiums 
        and the 'Dance'</span></i></a><span data-dcnode-id="395" instrument_node=""> (1912, Metropolitan Museum), as well as the contrasting 
        </span><i data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Blue Nude III</span></i><span data-dcnode-id="392" instrument_node=""> (1952-3, gouache on paper, Museum of Modern Art, 
        Paris). Other important Fauvist colourists include </span><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/andre-derain.htm"><span data-dcnode-id="391" instrument_node="">Andre 
        Derain</span></a><span data-dcnode-id="389" instrument_node=""> (1880-1954) and his friend </span><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/maurice-de-vlaminck.htm"><span data-dcnode-id="388" instrument_node="">Maurice 
        de Vlaminck</span></a><span data-dcnode-id="386" instrument_node=""> (1876-1958).</span></font></p><span data-dcnode-id="383" instrument_node="">
</span><blockquote data-dcnode-id="359"><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="361"><font data-dcnode-id="362" face="Verdana" size="2"><span data-dcnode-id="381" instrument_node="">Other early 20th century colourists included: 
          </span><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/robert-delaunay.htm"><span data-dcnode-id="380" instrument_node="">Robert Delaunay</span></a><span data-dcnode-id="378" instrument_node=""> (1885-1941), 
          founder of </span><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/orphism.htm"><span data-dcnode-id="377" instrument_node="">Orphism</span></a><span data-dcnode-id="375" instrument_node="">, the avant-garde 
          Russians </span><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/mikhail-larionov.htm"><span data-dcnode-id="374" instrument_node="">Mikhail Larionov</span></a><span data-dcnode-id="372" instrument_node=""> 
          (1881-1964) and </span><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/goncharova.htm"><span data-dcnode-id="371" instrument_node="">Goncharova</span></a><span data-dcnode-id="369" instrument_node=""> 
          (1881-1962) who invented </span><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/rayonism.htm"><span data-dcnode-id="368" instrument_node="">Rayonism</span></a><span data-dcnode-id="366" instrument_node="">, 
          and Morgan Russell (1886-1953) and Stanton MacDonald-Wright (1890-1973) 
          who invented </span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/synchromism.htm"><span data-dcnode-id="365" instrument_node="">Synchromism</span></a><span data-dcnode-id="363" instrument_node="">.</span></font></p><span data-dcnode-id="360" instrument_node="">
</span></blockquote><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="349"><font data-dcnode-id="350" face="Verdana" size="2"><span data-dcnode-id="357" instrument_node="">• </span><b data-dcnode-id="354"><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/georges-rouault.htm"><span data-dcnode-id="356" instrument_node="">Georges 
        Rouault</span></a></b><span data-dcnode-id="353" instrument_node=""> (1871-1958)</span><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">
        Greatest French expressionist painter and religious artist, noted for 
        the luminous, glowing colours in his oil, gouache and watercolour paintings.</span></font></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="339"><font data-dcnode-id="340" face="Verdana" size="2"><span data-dcnode-id="347" instrument_node="">• </span><b data-dcnode-id="344"><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/raoul-dufy.htm"><span data-dcnode-id="346" instrument_node="">Raoul 
        Dufy</span></a></b><span data-dcnode-id="343" instrument_node=""> (1877-1953)</span><br data-dcnode-id="342"><span data-dcnode-id="341" instrument_node="">
        Impressionist, Fauvist painter from Le Havre, noted for his calligraphic-style 
        drawings over washes of bright colours.</span></font></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="323"><font data-dcnode-id="324" face="Verdana" size="2"><span data-dcnode-id="337" instrument_node="">• </span><b data-dcnode-id="334"><a data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/mark-rothko.htm"><span data-dcnode-id="336" instrument_node="">Mark 
        Rothko</span></a></b><span data-dcnode-id="333" instrument_node=""> (1903-70)</span><br data-dcnode-id="332"><span data-dcnode-id="331" instrument_node="">
        One of the foremost exponents of </span><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/abstract-expressionist-painting.htm"><span data-dcnode-id="330" instrument_node="">abstract 
        expressionist painting</span></a><span data-dcnode-id="328" instrument_node="">, Rothko's huge abstract canvases were characterized 
        by plain, soft-edged shapes filled with colour, as in </span><i data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Untitled: Violet, 
        Black, Orange, Yellow on White and Red</span></i><span data-dcnode-id="325" instrument_node=""> (1949, oil on canvas, Guggenheim 
        Museum, New York).</span></font></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="310"><font data-dcnode-id="311" face="Verdana" size="2"><span data-dcnode-id="321" instrument_node="">• </span><b data-dcnode-id="318"><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/nicolas-de-stael.htm"><span data-dcnode-id="320" instrument_node="">Nicolas 
        de Stael</span></a></b><span data-dcnode-id="317" instrument_node=""> (1914-55)</span><br data-dcnode-id="316"><span data-dcnode-id="315" instrument_node="">
        Russian-French painter who fleetingly became one of the great abstract 
        painters of the </span><i data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Ecole de Paris</span></i><span data-dcnode-id="312" instrument_node=""> during the early 1950s. Noted for 
        his lyrical abstraction and his thickly impastoed landscapes.</span></font></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="297"><font data-dcnode-id="298" face="Verdana" size="2"><span data-dcnode-id="308" instrument_node="">• </span><b data-dcnode-id="305"><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/patrick-heron.htm"><span data-dcnode-id="307" instrument_node="">Patrick 
        Heron</span></a></b><span data-dcnode-id="304" instrument_node=""> (1920-99)</span><br data-dcnode-id="303"><span data-dcnode-id="302" instrument_node="">
        English abstract expressionist painter influenced by Matisse and Braque, 
        and associated with </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/lyrical-abstraction.htm"><span data-dcnode-id="301" instrument_node="">Lyrical 
        Abstraction</span></a><span data-dcnode-id="299" instrument_node=""> and the St Ives School.</span></font></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="281"><font data-dcnode-id="282" face="Verdana" size="2"><span data-dcnode-id="295" instrument_node="">• </span><b data-dcnode-id="292"><a data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/yves-klein.htm"><span data-dcnode-id="294" instrument_node="">Yves 
        Klein</span></a></b><span data-dcnode-id="291" instrument_node=""> (1928-62)</span><br data-dcnode-id="290"><span data-dcnode-id="289" instrument_node="">
        French postmodernist artist who produced a number of monochrome paintings 
        using his patented colour pigment </span><i data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">International Klein Blue</span></i><span data-dcnode-id="286" instrument_node=""> (IKB). 
        See also: </span><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/klein-postmodernist.htm"><span data-dcnode-id="285" instrument_node="">Yves Klein's 
        Postmodernist art</span></a><span data-dcnode-id="283" instrument_node=""> (1956-62).</span></font></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="275"><font data-dcnode-id="276" face="Verdana" size="2"><b data-dcnode-id="277"><a data-dcnode-id="279" name="colours"></a><span data-dcnode-id="278" instrument_node="">The Main Colours 
        (and Pigments)</span></b></font></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="270"><font data-dcnode-id="271" face="Verdana" size="2"><b data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">White</span></b></font></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="266"><font data-dcnode-id="267" face="Verdana" size="2"><span data-dcnode-id="268" instrument_node="">White is a balanced mixture of all the 
        colours of the visible light spectrum, or a combination of two complementary 
        colours, or three or more colours, like additive primary colours. It is 
        neutral or achromatic (devoid of colour), like black and grey. It is added 
        to pigments to create tints or lightened hues.</span></font></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="260"><font data-dcnode-id="261" face="Verdana" size="2"><b data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Shades of white</span></b><span data-dcnode-id="262" instrument_node=""> include: Cream, 
        Ivory, Magnolia, Old lace, Seashell. White Pigments for this colour include: 
        Bismuth white, Bone white, Ceruse, Chalk, Chinese white, Cremnitz white, 
        Flake white, Tin white, and Titanium white.</span></font></p><span data-dcnode-id="259" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="252" instrument_node="">
</span><span data-dcnode-id="251" instrument_node="">
