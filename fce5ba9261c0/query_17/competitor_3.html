</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0010&quot;><p id=&quot;sp0020&quot;>Colour has always been of significance in the fashion industry and has entered our everyday language to conjure up images of particular garments appropriate for specific situations: the little black dress; the crisp white shirt; the perfect blue jeans; the sober grey suit. Such associations between colour and garments crosses cultural boundaries too, with many brides around the world insisting on a white wedding even if their own culture demands a very different form of traditional dress and colour codes. The chapter will aim to introduce specific colours adopted by the fashion industry in recent decades, and why particular designers are associated with colour ‘signatures’. It will also examine the colour lifecycle in fashion, and how colours can slowly develop over a number of seasons, while others remain exactly the same year on year.</p><p id=&quot;sp0025&quot;>There will be a section outlining the major changes in the pace of fashion in the last 30 years, and the implications for colour development within such a fast-paced contemporary industry. Why has fast fashion developed so quickly? Could it be the increasing consumer demands fuelled by the cult of celebrities worldwide? Most notable, the changes in the way in which fashion is consumed, with the rise of the online retailer many young consumers are viewing and purchasing fashion online, mainly from handheld mobile devices. Conveying accurate product details, including colour and pattern to such consumers is of fundamental importance to designers and brands. The conclusions will summarise the information presented and suggest future implications for the global fashion industry.</p></div></div></div>" data-dcnode-id="3182" lang="en" name="citation_abstract"><span data-dcnode-id="3181" instrument_node="">

publisherName%3DELS%26contentID%3DB9780081012703000138%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2851" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="2848"></section><section class="ReferencedArticles" data-dcnode-id="2847"></section><div class="PageDivider" data-dcnode-id="2846"></div><div class="Abstracts u-font-serif" data-dcnode-id="2837" id="abstracts"><div class="abstract author" data-dcnode-id="2838" id="ab0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Abstract</span></h2><div data-dcnode-id="2839" id="as0010"><p data-dcnode-id="2842" id="sp0020"><span data-dcnode-id="2843" instrument_node="">Colour has always been of significance in the fashion industry and has entered our everyday language to conjure up images of particular garments appropriate for specific situations: the little black dress; the crisp white shirt; the perfect blue jeans; the sober grey suit. Such associations between colour and garments crosses cultural boundaries too, with many brides around the world insisting on a white wedding even if their own culture demands a very different form of traditional dress and colour codes. The chapter will aim to introduce specific colours adopted by the fashion industry in recent decades, and why particular designers are associated with colour ‘signatures’. It will also examine the colour lifecycle in fashion, and how colours can slowly develop over a number of seasons, while others remain exactly the same year on year.</span></p><p data-dcnode-id="2840" id="sp0025"><span data-dcnode-id="2841" instrument_node="">There will be a section outlining the major changes in the pace of fashion in the last 30 years, and the implications for colour development within such a fast-paced contemporary industry. Why has fast fashion developed so quickly? Could it be the increasing consumer demands fuelled by the cult of celebrities worldwide? Most notable, the changes in the way in which fashion is consumed, with the rise of the online retailer many young consumers are viewing and purchasing fashion online, mainly from handheld mobile devices. Conveying accurate product details, including colour and pattern to such consumers is of fundamental importance to designers and brands. The conclusions will summarise the information presented and suggest future implications for the global fashion industry.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="2814" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="2826"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081012703000126"><svg class="icon icon-navigate-left" data-dcnode-id="2835" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="2836"></path></svg><span class="button-alternative-text" data-dcnode-id="2828"><strong data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node=""> in book</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="2815"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978008101270300014X"><span class="button-alternative-text" data-dcnode-id="2819"><strong data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node=""> in book</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="2817" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="2818"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="2798"><div class="keywords-section" data-dcnode-id="2799" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="2809" id="kw0010"><span data-dcnode-id="2810" id="tx0010"><span data-dcnode-id="2811" instrument_node="">Colour</span></span></div><div class="keyword" data-dcnode-id="2806" id="kw0015"><span data-dcnode-id="2807" id="tx0015"><span data-dcnode-id="2808" instrument_node="">Fashion</span></span></div><div class="keyword" data-dcnode-id="2803" id="kw0020"><span data-dcnode-id="2804" id="tx0020"><span data-dcnode-id="2805" instrument_node="">Trends</span></span></div><div class="keyword" data-dcnode-id="2800" id="kw0025"><span data-dcnode-id="2801" id="tx0025"><span data-dcnode-id="2802" instrument_node="">Design.</span></span></div></div></div><span data-dcnode-id="2797" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="2234" id="body"><div data-dcnode-id="2235"><section data-dcnode-id="2649" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2793" id="st0020"><span data-dcnode-id="2796" instrument_node="">13.1</span><span data-dcnode-id="2795" instrument_node="">. </span><span data-dcnode-id="2794" instrument_node="">Introduction</span></h2><p data-dcnode-id="2788" id="p0010"><span data-dcnode-id="2792" instrument_node="">In today's fast-paced fashion industry, it is often taken for granted that colours and styles will automatically change each season and new additions to the consumer's wardrobe will be required in order to remain up to date and on trend. However, it was not always so; indeed, it has only been in the last 35 years that colour in fashion has experienced such a change in pace on such a regular basis, and the cycle is gaining momentum each season, with stores and online retailers adding new lines everyday. Consumers expect to see regular updates of product ranges, In particular the younger, trend led demographic (</span><a class="workspace-trigger" data-dcnode-id="2790" href="#bb0055" name="bbb0055"><span data-dcnode-id="2791" instrument_node="">Diamond, 2015</span></a><span data-dcnode-id="2789" instrument_node="">).</span></p><p data-dcnode-id="2783" id="p0015"><span data-dcnode-id="2787" instrument_node="">The real change to the way in which colour was viewed in fashion began in 1915; a group of manufacturers and retailers who had previously relied on fashion information from Paris to develop their colour, fabric and apparel lines, worked together to form the Textile Colour Card Association of the United States (TCCA). The First World war had effectively closed down the Paris fashion industry, and the Americans realised that the industry was still in need of fashion colour trend information. First the group published The Standard Color Reference of America, a book featuring wool, cotton and silk colour standards referencing 106 shades on silk ribbons. The colours were based on the colours of nature, college and university colours, and colours from the US armed forces at the time. By 1917, the initial TCCA card featured ‘40 colours presented in silk and wool swatches’ (</span><a class="workspace-trigger" data-dcnode-id="2785" href="#bb0105" name="bbb0105"><span data-dcnode-id="2786" instrument_node="">Hope and Walch, 1990</span></a><span data-dcnode-id="2784" instrument_node="">:34). The colours were aimed at the women's clothing and accessories markets and were developed to appeal to stylists and designers. In 1955, the Colour Association of the United States (CAUS) replaced the TCCA, and today CAUS continues to produce colour forecasts and has members drawn from all sectors of the fashion and textile industry, all of whom volunteer their expertise in compiling the colour palettes, which now encompasses interiors and product design, and has become increasingly sophisticated since the initial publications.</span></p><p data-dcnode-id="2767" id="p0020"><span data-dcnode-id="2782" instrument_node="">The world of colour consumption also experienced a paradigm shift in the 1920s. Cars were being sold in a variety of colours for the first time, and in 1927 the Ford company began production of the Model A, the first of its cars to be available in colour (</span><a class="workspace-trigger" data-dcnode-id="2780" href="#bb0070" name="bbb0070"><span data-dcnode-id="2781" instrument_node="">Eskilson, 2002</span></a><span data-dcnode-id="2779" instrument_node="">). Colour had begun to seep into consumers lives as never before, and demanded a new approach to colour development and marketing. The fashion industry continued to expand its range of colours and prints in garments available at more affordable prices to the consumers, and the importance of colour in fashion and other consumer products was established. Technological advances also precipitated fashion change, from the patenting of the sewing machine in 1851 by Isaac Merrit Singer to the inception of the internet and digital photography (</span><a class="workspace-trigger" data-dcnode-id="2777" href="#bb0190" name="bbb0190"><span data-dcnode-id="2778" instrument_node="">Welters and Lillethun, 2011</span></a><span data-dcnode-id="2776" instrument_node="">). Each allowed fashion to be more readily available to the ordinary consumer either through cheaper manufacturing methods, or increased democratisation of fashion trends. When referencing historical or recent fashion trends and reworking them into new ideas, there seem to be no limits. Trend analyst Edie Weiner has been identifying new trends for the past 32 years, with six major themes each quarter.</span></p><blockquote data-dcnode-id="2768"><p data-dcnode-id="2774" id="sp0030"><span data-dcnode-id="2775" instrument_node="">Is there anything new here? That's a really tough one when you've been in the business for 32 years.</span></p><span data-dcnode-id="2769"><span data-dcnode-id="2773" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2771" href="#bb0090" name="bbb0090"><span data-dcnode-id="2772" instrument_node="">Guerin, 2005</span></a><span data-dcnode-id="2770" instrument_node="">:136)</span></span></blockquote><p></p><p data-dcnode-id="2757" id="p0025"><a class="workspace-trigger" data-dcnode-id="2765" href="#bb0165" name="bbb0165"><span data-dcnode-id="2766" instrument_node="">Raymond (2010)</span></a><span data-dcnode-id="2764" instrument_node=""> discusses historic awareness as a fundamental forecasting tool and </span><a class="workspace-trigger" data-dcnode-id="2762" href="#bb0025" name="bbb0025"><span data-dcnode-id="2763" instrument_node="">Brannon (2000)</span></a><span data-dcnode-id="2761" instrument_node=""> also emphasises the importance of understanding past trends in order to make sense of new up and coming trends, as do </span><a class="workspace-trigger" data-dcnode-id="2759" href="#bb0175" name="bbb0175"><span data-dcnode-id="2760" instrument_node="">Scully and Johnston Cobb (2012)</span></a><span data-dcnode-id="2758" instrument_node="">. In short, the influence of past trends cannot be dismissed, as they are constantly being referenced by designers, consumer sub-cultures and forecasters alike, precipitating new variations on a style or colour combination.</span></p><p data-dcnode-id="2749" id="p0030"><span data-dcnode-id="2756" instrument_node="">Fashion thrives on the thrill of the new, it is the intrinsic nature of the industry to constantly evolve and introduce new ideas. The very meaning of the word trend is an ancient one and can be traced back to Middle English and High German, where its meaning was to turn, spin or revolve (</span><a class="workspace-trigger" data-dcnode-id="2754" href="#bb0165" name="bbb0165"><span data-dcnode-id="2755" instrument_node="">Raymond, 2010</span></a><span data-dcnode-id="2753" instrument_node="">), with many fashion trends, styles and colours revolving in and out of favour. As Guerin suggests, the seasonal fashion trends introduced are not always quite ‘new’, conversely they may comprise a revival of other styles and eras, such as the sudden trend for 1960s style precipitated in 2007 by the popular TV drama Mad Men set in the era (</span><a class="workspace-trigger" data-dcnode-id="2751" href="#bb0100" name="bbb0100"><span data-dcnode-id="2752" instrument_node="">Hidefi, 2012</span></a><span data-dcnode-id="2750" instrument_node="">).</span></p><p data-dcnode-id="2732" id="p0035"><span data-dcnode-id="2748" instrument_node="">Colour remains an essential component of fashion, and that colour development is one of the first chains in seasonal design development, commencing with the yarn and fabric manufacturers (</span><a class="workspace-trigger" data-dcnode-id="2746" href="#bb0110" name="bbb0110"><span data-dcnode-id="2747" instrument_node="">Jackson, 2007</span></a><span data-dcnode-id="2745" instrument_node="">), as fabric makes up 60% of the cost of a garment (</span><a class="workspace-trigger" data-dcnode-id="2743" href="#bb0175" name="bbb0175"><span data-dcnode-id="2744" instrument_node="">Scully and Johnston Cobb, 2012</span></a><span data-dcnode-id="2742" instrument_node="">). As fashion trends change, season after season, year after year, it would be expected that colour would also adopt a similar rate of change; however, the nuances of colour forecasting illustrate a more gradual development and evolution of colours within fashion. Forecasters, designers and retailers alike recognise that certain colours have a longer lifespan than others, and so are sometimes retained within a palette, updated by other, fresher colours around them, particularly if that colour has been a bestseller (</span><a class="workspace-trigger" data-dcnode-id="2740" href="#bb0125" name="bbb0125"><span data-dcnode-id="2741" instrument_node="">Linton, 1994</span></a><span data-dcnode-id="2739" instrument_node="">). Indeed, colour has been shown to develop in tonal stories from one season to the next (</span><a class="workspace-trigger" data-dcnode-id="2737" href="#bb0150" name="bbb0150"><span data-dcnode-id="2738" instrument_node="">Perna, 1987</span></a><span data-dcnode-id="2736" instrument_node="">), </span><a class="workspace-trigger" data-dcnode-id="2734" href="#bb0025" name="bbb0025"><span data-dcnode-id="2735" instrument_node="">Brannon (2000)</span></a><span data-dcnode-id="2733" instrument_node="">, as the consumer becomes familiar with the idea of buying into a particular colour range.</span></p><section data-dcnode-id="2650" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2728" id="st0025"><span data-dcnode-id="2731" instrument_node="">13.1.1</span><span data-dcnode-id="2730" instrument_node="">. </span><span data-dcnode-id="2729" instrument_node="">Colour association with specific themes or eras</span></h3><p data-dcnode-id="2712" id="p0040"><span data-dcnode-id="2727" instrument_node="">Traditionally, certain colours or tones within fashion have been associated with specific eras: during times of economic slowdown colours become more sombre to reflect the mood, or during a time when technology flourishes, futuristic finishes and metallics have become popular. However, we tend to imagine that colour has only really been developed in fashion and associated lifestyle products for a relatively limited number of decades, but as early as the 1928, around the same time that the early colour predictions were being developed, the American newspaper, Saturday Evening Post informed their readers “Motor cars are borrowing their hues from the waters of the Nile, from the sands of Arabia, the plumage of birds and the fire of gems.” (</span><a class="workspace-trigger" data-dcnode-id="2725" href="#bb0070" name="bbb0070"><span data-dcnode-id="2726" instrument_node="">Eskilson, 2002</span></a><span data-dcnode-id="2724" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="2722" href="#bb0020" name="bbb0020"><span data-dcnode-id="2723" instrument_node="">Blaszczyk (2012)</span></a><span data-dcnode-id="2721" instrument_node=""> also supports the fact that consumer goods required fashion intervention in the 1920s, and that dramatic colour changes were seen with the cultural and economic transformations of the 1960s and 1970s. In fashion, everything has an impact, from world markets to lifestyle changes, and in particular colour in fashion; this was experienced during the economic downturn in the late 1980s.</span></p><blockquote data-dcnode-id="2713"><p data-dcnode-id="2719" id="sp0035"><span data-dcnode-id="2720" instrument_node="">Economic conditions also perturb colour cycles and start new ones. When recession or a steep drop in the stock market occurs, as in 1987, people's moods change and they curtail their spending habits. Japanese designers signalled the shift with their ominous black clothing and an austere minimalist look began the decade of the 1990s.</span></p><span data-dcnode-id="2714"><span data-dcnode-id="2718" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2716" href="#bb0025" name="bbb0025"><span data-dcnode-id="2717" instrument_node="">Brannon, 2000</span></a><span data-dcnode-id="2715" instrument_node="">:131)</span></span></blockquote><p></p><p data-dcnode-id="2689" id="p0045"><span data-dcnode-id="2711" instrument_node="">Many commercial trend forecasters such as Peclers, Carlin and Promostyl, predicted whites and silvers for the millennium in their Autumn/Winter 1999/2000 publications, reflecting the expectations of the period and the fascination with the Y2K bug, forecast to bring every computer in the world to a complete standstill at the dawn of the new millennium. The prediction was hardly startling, as white is a core colour, and winter whites are often featured in colour forecasts. Other useful research indicates consumers learn about colour associations for products and develop preferences early (</span><a class="workspace-trigger" data-dcnode-id="2709" href="#bb0085" name="bbb0085"><span data-dcnode-id="2710" instrument_node="">Grossman and Wisenblit, 1999</span></a><span data-dcnode-id="2708" instrument_node="">), and certain colours, such as blue, become fixed in consumer preferences (</span><a class="workspace-trigger" data-dcnode-id="2706" href="#bb0140" name="bbb0140"><span data-dcnode-id="2707" instrument_node="">Pantone, 1992</span></a><span data-dcnode-id="2705" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="2703" href="#bb0085" name="bbb0085"><span data-dcnode-id="2704" instrument_node="">Grossman and Wisenblit (1999)</span></a><span data-dcnode-id="2702" instrument_node=""> proved consumers had different colour preferences for varying product lines, while designers and marketing experts offer products in a range of colours, consumers ‘favourite’ colours are not usually subject to change. Research by </span><a class="workspace-trigger" data-dcnode-id="2700" href="#bb0040" name="bbb0040"><span data-dcnode-id="2701" instrument_node="">Cassidy (2007)</span></a><span data-dcnode-id="2699" instrument_node=""> using a small sample of 49 consumers, comparing their individual colour preferences with forecasted colours proved inconclusive. With so many diverse millions of fashion consumers globally, it is questionable that all consumers would find an affinity with all the colour trends presented to them by the retailers. Nor is it certain that each consumer would be able to find the colours which suited them personally according to their skin tone., hair and eye colour, as suggested by the Colour Me Beautiful method employed by Cassidy within the commercially published trend forecasts each season. </span><a class="workspace-trigger" data-dcnode-id="2697" href="#bb0030" name="bbb0030"><span data-dcnode-id="2698" instrument_node="">Bruce and Daly (2006)</span></a><span data-dcnode-id="2696" instrument_node=""> suggest buyers work closely with design teams to ensure the trend forecast fit company consumer profiles; </span><a class="workspace-trigger" data-dcnode-id="2694" href="#bb0175" name="bbb0175"><span data-dcnode-id="2695" instrument_node="">Scully and Johnston Cobb (2012)</span></a><span data-dcnode-id="2693" instrument_node=""> suggest retailers are developing their own differentiated products using in house design teams, creating a unique signature and avoiding the same look as other brands and retailers who follow specific agency trends (</span><a class="workspace-trigger" data-dcnode-id="2691" href="#bb0010" name="bbb0010"><span data-dcnode-id="2692" instrument_node="">Abnett, 2015</span></a><span data-dcnode-id="2690" instrument_node="">). Essentially such policies allow a degree of modification to the colour palettes. In an interview for the research with Martin Raymond, founder of trend analysts The Future Lab, he suggested that in today's society the consumer has a far more important role to play in the development of fashion than ever before. He believes that, with the rise in consumer power, online debates and blogs have become informed opinion, lending far more power to the consumer voice, and ultimately influencing retailers.</span></p><p data-dcnode-id="2687" id="p0050"><span data-dcnode-id="2688" instrument_node="">Many would assume consumer colour preferences are of key importance to the fashion industry but many clothing designers and retailers prefer to play it safe, hence the reliance on the little black dress and core neutral colour palettes which are endlessly presented season after season. It is rare for such preferences to be taken into consideration in the fast-paced world of fashion, although some major brands and retailers do hold consumer focus groups in which their selected customers are asked about new products, garment styles and even colours. The consumers viewpoint is considered in a wider context though: changes in lifestyle trends, socio cultural trends, economics and technology are all considered when developing new colour palettes for fashion.</span></p><p data-dcnode-id="2666" id="p0055"><span data-dcnode-id="2686" instrument_node="">In 2005, Siden proposed three dynamic trends which appeared to reflect the key consumer interests at the time: society's concerns about environmental matters, its preoccupation with new technologies, and the cult of Hollywood celebrities (</span><a class="workspace-trigger" data-dcnode-id="2684" href="#bb0115" name="bbb0115"><span data-dcnode-id="2685" instrument_node="">Kim and Johnson, 2009</span></a><span data-dcnode-id="2683" instrument_node="">:257):</span></p><dl class="list" data-dcnode-id="2667"><dt class="list-label" data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="2678"><p data-dcnode-id="2679" id="p0060"><span data-dcnode-id="2680" instrument_node="">Green Desire: representing use of earthly materials and human nature</span></p></dd><dt class="list-label" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="2673"><p data-dcnode-id="2674" id="p0065"><span data-dcnode-id="2675" instrument_node="">New Space Age; representing technology, new order and neo-nomads</span></p></dd><dt class="list-label" data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="2668"><p data-dcnode-id="2669" id="p0070"><span data-dcnode-id="2670" instrument_node="">Baroque Glamour: representing dreaming, Hollywood, neo-classicism and pattern profusion.</span></p></dd></dl><p></p><p data-dcnode-id="2653" id="p0075"><span data-dcnode-id="2657"><span data-dcnode-id="2661"><span data-dcnode-id="2665" instrument_node="">In many respects, these three ideals remain key influences within fashion trends today. There is still a strong influence to be seen related to environmental issues, although the trend for organic materials seems to be dwindling, and the emphasis surrounds garment production and sustainability. New Space Age can be best represented by the interest in new materials and techniques, such as digital prints, which featured heavily in the designer catwalk collections from Mary Katrantzou, Henry Holland and Erdem for Spring/Summer 2015. Digital printing has allowed a more complex and sophisticated range of patterns to be developed, featuring multitonal colours which would be far more difficult to reproduce using traditional printing methods. </span><a class="topic-link" data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/rapid-prototyping" title="Learn more about Rapid prototyping from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2664" instrument_node="">Rapid prototyping</span></a><span data-dcnode-id="2662" instrument_node="">, or </span></span><a class="topic-link" data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/three-dimensional-printing" title="Learn more about 3D printing from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2660" instrument_node="">3D printing</span></a><span data-dcnode-id="2658" instrument_node="">, has enabled designers such as Iris Van Herpen and Bryan Orkynansky to create garments and footwear from a computer file without the need for a factory, printing the item layer by layer using a variety of different composites. The Baroque Glamour theme is constantly reinterpreted on the catwalks, with the latest incarnation being a glamorous 1970s revival spearheaded by designer labels Gucci, Chloe and Halston Heritage in Summer 2011, and a further revival in 2015. The trends for Autumn/Winter 2015/16 demonstrated the cyclical nature of fashion; the key reference points were the 1970s in colour, garment silhouette, fabrication and accessories. During the Seventies there was a period of considerable change in the development of colour trend forecasting (</span></span><a class="workspace-trigger" data-dcnode-id="2655" href="#bb0020" name="bbb0020"><span data-dcnode-id="2656" instrument_node="">Blaszczyk, 2012</span></a><span data-dcnode-id="2654" instrument_node="">), with an explosion of colour for the mass fashion market and the development of the modern trend forecasting industry as we know it today, so ironic in contemporary markets that forecasters and designers are still referring back to such a colourful period in time.</span></p><p data-dcnode-id="2651" id="p0080"><span data-dcnode-id="2652" instrument_node="">Designers are also influenced and inspired by other elements, and have traditionally collected a wide range of inspiration and artefacts prior to starting work on developing their clothing ranges, combining colours together to provide exciting, directional and commercial colour palettes for the coming seasons. In the past designers worked at least 6 months ahead of the season to ensure there was sufficient time to organise the sourcing of yarns, printing of fabrics and dyeing of materials to the exact shades required for the manufacture of the garments. This time scale is starting to shorten as new technology such as Pinterest and Instagram circulate images and ideas from thousands of people around the globe in an instant. In spite of new technology and instant idea sharing social media sites, certain periods of time are still associated with particular colours, or colour combinations in fashion.</span></p></section></section><section data-dcnode-id="2502" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2645" id="st0030"><span data-dcnode-id="2648" instrument_node="">13.2</span><span data-dcnode-id="2647" instrument_node="">. </span><span data-dcnode-id="2646" instrument_node="">Key issues of colour in fashion design</span></h2><p data-dcnode-id="2640" id="p0085"><span data-dcnode-id="2644" instrument_node="">Newness is the key to any element of fashion and yet there are frequent repetitions of colour and fashion trends which are successfully marketed globally. </span><a class="workspace-trigger" data-dcnode-id="2642" href="#bb0060" name="bbb0060"><span data-dcnode-id="2643" instrument_node="">Easey (2009:5)</span></a><span data-dcnode-id="2641" instrument_node=""> commented: In order for the change which is intrinsic to fashion to take place, the industry must continually create new products.</span></p><p data-dcnode-id="2627" id="p0090"><span data-dcnode-id="2639" instrument_node="">Examining the dominant cycles of fashion colours in recent years provides a valuable insight into how colour trends develop and change. This is further complicated, as retailers divide their traditional seasons into phases, such as ‘Party’ or ‘Christmas’, and each phase may have a number of drops within it. Colours do not remain static; they gradually morph over the season, so an early Autumn delivery of merchandise may feature quite different colours to the pre-Christmas party delivery, having changed incrementally with each range of merchandise. Some colours may have a longer lifecycle than others, developing a slightly different look each phase or season, perhaps darker, brighter, paler or fluorescent. These can be described best as ‘long term fashion colours’, and will be explained in more details in the chapter. Conversely, those colours with a very short lifecycle can be defined as ‘short term fashion colours’, moving quickly from their introduction to removal from the fashion palette. </span><a class="workspace-trigger" data-dcnode-id="2637" href="#bb0120" name="bbb0120"><span data-dcnode-id="2638" instrument_node="">Lin et al (2010)</span></a><span data-dcnode-id="2636" instrument_node=""> believe it is imperative:</span></p><blockquote data-dcnode-id="2628"><p data-dcnode-id="2634" id="sp0045"><span data-dcnode-id="2635" instrument_node="">To trace the future fashion colour trend is a crucial key issue in the textile industry.</span></p><span data-dcnode-id="2629"><span data-dcnode-id="2633" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2631" href="#bb0120" name="bbb0120"><span data-dcnode-id="2632" instrument_node="">Lin et al., 2010</span></a><span data-dcnode-id="2630" instrument_node="">:360)</span></span></blockquote><p></p><p data-dcnode-id="2616" id="p0095"><span data-dcnode-id="2626" instrument_node="">Change is essential in the fashion industry to promote sales growth and consumer interest. It has been done so well that many consumers have come to expect an ever increasing pace of change from the industry; the customer, ironically now appears to be intrinsically driving the ever increasing turnover of ideas (</span><a class="workspace-trigger" data-dcnode-id="2624" href="#bb0185" name="bbb0185"><span data-dcnode-id="2625" instrument_node="">Solomon, 1994</span></a><span data-dcnode-id="2623" instrument_node="">:53; </span><a class="workspace-trigger" data-dcnode-id="2621" href="#bb0025" name="bbb0025"><span data-dcnode-id="2622" instrument_node="">Brannon, 2000</span></a><span data-dcnode-id="2620" instrument_node="">:20; </span><a class="workspace-trigger" data-dcnode-id="2618" href="#bb0030" name="bbb0030"><span data-dcnode-id="2619" instrument_node="">Bruce and Daly, 2006</span></a><span data-dcnode-id="2617" instrument_node="">), demanding a new look each time they visit a store, new directions every month, rather than the seasonal changes previously experienced in the fashion industry. Consequently, the concept of fast fashion was developed by the Spanish retailer Zara, part of the Inditex Group, working on a 6–8 week turnaround on key product lines from concept to delivery.</span></p><p data-dcnode-id="2606" id="p0100"><span data-dcnode-id="2615" instrument_node="">David Shah, the influential publisher of trend magazine Viewpoint, and the editor of the Pantone Colour Planner forecasting publication explained his approach in The Future Laboratory's 2006 Spring Trend briefing dossier.</span></p><blockquote data-dcnode-id="2607"><p data-dcnode-id="2613" id="sp0050"><span data-dcnode-id="2614" instrument_node="">Our understanding of colour is changing. It is evolving as we recognise the power of colour lies not in the simple tonal elements we choose, but in the intelligence required to construct them in new ways. There is nothing new in the palettes we are presenting for summer 07. What is much more important is the way we recognise that these palettes can interconnect, change and mutate by the time they reach their end use.</span></p><span data-dcnode-id="2608"><span data-dcnode-id="2612" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2610" href="#bb0180" name="bbb0180"><span data-dcnode-id="2611" instrument_node="">Shah, 2006</span></a><span data-dcnode-id="2609" instrument_node="">:26)</span></span></blockquote><p></p><p data-dcnode-id="2604" id="p0105"><span data-dcnode-id="2605" instrument_node="">It is a brave move for a colour forecaster to state their colour palettes are ‘nothing new’, particularly during a period of fashion consumption which has seen the rise in the instant global dissemination of trends via the internet and the rise in fast fashion. Upon closer examination, Shah is not saying anything radically different; colour palettes have always developed from their initial publication some 18 months or more prior to the season. Such a phenomenon can be clearly seen in the colour update card which is published by Peclers 1 year after their definitive seasonal colour trend book is published. Often the ‘Colour Confirmation Card’ from Peclers, features very different colours to the original publication, colours grouped in different patterns, or simply new colours added as accents or highlights to alter the initial palette slightly.</span></p><section data-dcnode-id="2503" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2600" id="st0035"><span data-dcnode-id="2603" instrument_node="">13.2.1</span><span data-dcnode-id="2602" instrument_node="">. </span><span data-dcnode-id="2601" instrument_node="">Repetition of colour combinations</span></h3><p data-dcnode-id="2590" id="p0110"><span data-dcnode-id="2599" instrument_node="">In a period of fast fashion, where some colours are developed to respond to a product being in store within 6–10 weeks of concept, it is questionable whether or not a colour trend could still last a full decade. It is commonly acknowledged that fashion is fuelled by constant change in order to stimulate sales and interest for the consumer. Inevitably, there will be a multiplicity of trends available at any one time, and each fashion trend, or look, naturally develops its own colour identity, resulting in numerous colour stories being available during any one season. This is further complicated, as retailers divide their traditional seasons into phases, such as party or Christmas, and each phase may have a number of drops within it. Colours do not remain static, they gradually morph over the season, so an early Autumn delivery of merchandise may feature quite different colours to the pre-Christmas party delivery, having changed incrementally with each range of merchandise. Undoubtedly some colour combinations are used repeatedly, with a slightly different emphasis on some highlight or complementary colours, or different fabrications, resulting in a variety of surface treatments which may change or distort the colours slightly. When interviewed in 1993, Denise Ford, then the Design Manager for DuPont (UK) Ltd, explained that she had experienced colour cycles previously, so it helped in the development of new colour predictions.</span></p><blockquote data-dcnode-id="2591"><p data-dcnode-id="2597" id="sp0055"><span data-dcnode-id="2598" instrument_node="">Her many years of experience in the textile industry… not only give her a historical perspective – knowing how cycles have evolved in the past may give clues to how they will evolve in the future – but also ensure she can confidently rely on her ‘gut feelings’ about trends.</span></p><span data-dcnode-id="2592"><span data-dcnode-id="2596" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2594" href="#bb0080" name="bbb0080"><span data-dcnode-id="2595" instrument_node="">Foster, 1993</span></a><span data-dcnode-id="2593" instrument_node="">:4)</span></span></blockquote><p></p><p data-dcnode-id="2577" id="p0115"><span data-dcnode-id="2589" instrument_node="">In the late 1960s the hippie culture revived fashions of the Second World War, finding old army greatcoats, crepe tea dresses and flying jackets. The hippie girls actively sought out 1940s-styled coats, antique lace petticoats and velvet skirts from second-hand stores (</span><a class="workspace-trigger" data-dcnode-id="2587" href="#bb0130" name="bbb0130"><span data-dcnode-id="2588" instrument_node="">McRobbie, 2011</span></a><span data-dcnode-id="2586" instrument_node="">) and designer labels soon picked up on the trends, with British labels Biba and Zandra Rhodes adopting some of the 1940s styling references of the hippies. Occasionally designers are credited with precipitating specific looks or trends, such as Christian Dior, Coco Chanel, Mary Quant or Yves Saint Laurent.</span></p><blockquote data-dcnode-id="2578"><p data-dcnode-id="2584" id="sp0060"><span data-dcnode-id="2585" instrument_node="">Any major fashion trend you care to mention can be traced back to a Saint Laurent original twenty or 30 years ago: Sheer (the original was a black chiffon blouse with ostrich trim); hippie de luxe and gipsy (done right down to the turban in the 1970s); the safari look (1968) and biker chic (1960). He was there first with the ethnic influences that crop up every few years… fashion, despite itself, is continually replaying Saint Laurent themes.</span></p><span data-dcnode-id="2579"><span data-dcnode-id="2583" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2581" href="#bb0025" name="bbb0025"><span data-dcnode-id="2582" instrument_node="">Brannon, 2000</span></a><span data-dcnode-id="2580" instrument_node="">:89)</span></span></blockquote><p></p><p data-dcnode-id="2560" id="p0120"><span data-dcnode-id="2576" instrument_node="">It has long been recognised that colour does indeed influence the consumers purchasing behaviour: many items of clothing are purchased in accordance to a particular ‘colour code’, conservative, dark tones in men's suiting have been matched by women adopting similar neutral colours (</span><a class="workspace-trigger" data-dcnode-id="2574" href="#bb0075" name="bbb0075"><span data-dcnode-id="2575" instrument_node="">Fehrman and Fehrman, 2000</span></a><span data-dcnode-id="2573" instrument_node="">). However, even in such a conservative environment such as the office, colours do subtly change, with new colours introduced by subtle variations on existing sober suiting, such as a turquoise or fuchsia pinstripe instead of the usual white stripe in a navy suit, or though colours in shirts, ties and blouses. The life span of a classic suit in black or navy will normally be longer than the more fashion led elements such as a high fashion blouse or tie, as such classic garments last far longer than short-lived fads, or fashion items (</span><a class="workspace-trigger" data-dcnode-id="2571" href="#bb0185" name="bbb0185"><span data-dcnode-id="2572" instrument_node="">Solomon, 1994</span></a><span data-dcnode-id="2570" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2568" href="#bb0025" name="bbb0025"><span data-dcnode-id="2569" instrument_node="">Brannon, 2000</span></a><span data-dcnode-id="2567" instrument_node="">) and have peak selling periods. Fashion colours show a marked change every 2 years according to </span><a class="workspace-trigger" data-dcnode-id="2565" href="#bb0125" name="bbb0125"><span data-dcnode-id="2566" instrument_node="">Linton (1994)</span></a><span data-dcnode-id="2564" instrument_node="">, reflecting social and economic change (</span><a class="workspace-trigger" data-dcnode-id="2562" href="#bb0155" name="bbb0155"><span data-dcnode-id="2563" instrument_node="">Porter, 1994</span></a><span data-dcnode-id="2561" instrument_node="">).</span></p><p data-dcnode-id="2541" id="p0125"><span data-dcnode-id="2559" instrument_node="">A generic global colour prediction would not be applicable for the wide variety of modern apparel industry sectors; for example seasonal colours devised for girlswear may be different between pre- and post-teenage collections. Forecasters often either produce specific publications to cover the markets, or work with individual clients to develop exclusive colour palettes tailored to a specific market segment, be it apparel or automotive. Most forecasters build their reputation for accuracy through the publication of glossy trend books, illustrating usually four to six major colour themes for the coming season, either Spring/Summer or Autumn/Winter, offering a one-on-one prediction service in tandem with their universal seasonal palettes. Changing colour fashion trends have been likened to a form of dictatorship (</span><a class="workspace-trigger" data-dcnode-id="2557" href="#bb0075" name="bbb0075"><span data-dcnode-id="2558" instrument_node="">Fehrman and Fehrman, 2000</span></a><span data-dcnode-id="2556" instrument_node="">), while </span><a class="workspace-trigger" data-dcnode-id="2554" href="#bb0025" name="bbb0025"><span data-dcnode-id="2555" instrument_node="">Brannon (2000)</span></a><span data-dcnode-id="2553" instrument_node=""> cites the ‘mechanism of boredom’ from the consumer as being behind the constantly changing colours in the fashion and fashion marketing industry; both arguments have validity. If garment colours do not broadly adhere to those predicted and widely promoted within the seasonal marketplace, retailers may be left with stock on the shelves. This may be likened to </span><a class="workspace-trigger" data-dcnode-id="2551" href="#bb9010" name="bbb9010"><span data-dcnode-id="2552" instrument_node="">Blythman's (2004)</span></a><span data-dcnode-id="2550" instrument_node=""> findings regarding supermarket ready meals ‘why it all tastes the same’: most convenience meals in UK supermarkets are manufactured by the same small group of companies, using the same mass-produced ingredients. Although consumers are driving and demanding change, the fashion colour changes they receive are increasingly homogenised across the UK high street.</span></p><blockquote data-dcnode-id="2542"><p data-dcnode-id="2548" id="sp0065"><span data-dcnode-id="2549" instrument_node="">On the high street, some of the biggest and most successful brands have built their business models around the ever-increasing speed and volatility of trends coupled to consumer demand for constant newness: it's less about forecasting and more about responsiveness.</span></p><span data-dcnode-id="2543"><span data-dcnode-id="2547" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2545" href="#bb0010" name="bbb0010"><span data-dcnode-id="2546" instrument_node="">Abnett, 2015</span></a><span data-dcnode-id="2544" instrument_node="">)</span></span></blockquote><p></p><p data-dcnode-id="2515" id="p0130"><span data-dcnode-id="2540" instrument_node="">It has long been recognised that colour does indeed influence the consumers purchasing behaviour, many items of clothing are purchased in accordance to a particular ‘colour-code’, conservative, dark tones in men's suiting has been matched by women adopting similar neutral colours (</span><a class="workspace-trigger" data-dcnode-id="2538" href="#bb0075" name="bbb0075"><span data-dcnode-id="2539" instrument_node="">Fehrman and Fehrman, 2000</span></a><span data-dcnode-id="2537" instrument_node="">). However, even in such a conservative atmosphere as the office, colours do subtly change, with new colour introduced through subtle variations on existing sober suiting, such as a turquoise or fuchsia pinstripe instead of the usual white stripe in a navy suit, or through colours in ties, shirts and blouses. The lifespan of a classic suit in black or navy will normally be longer than a high fashion blouse or shirt, as such classic garments last far longer than very short-lived fads, or fashion items (</span><a class="workspace-trigger" data-dcnode-id="2535" href="#bb0185" name="bbb0185"><span data-dcnode-id="2536" instrument_node="">Solomon, 1994</span></a><span data-dcnode-id="2534" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2532" href="#bb0025" name="bbb0025"><span data-dcnode-id="2533" instrument_node="">Brannon, 2000</span></a><span data-dcnode-id="2531" instrument_node="">), and have peak selling periods (</span><a class="workspace-trigger" data-dcnode-id="2529" href="#bb9020" name="bbb9020"><span data-dcnode-id="2530" instrument_node="">Hipsey, 1995</span></a><span data-dcnode-id="2528" instrument_node="">). Fashion colours show a marked change every 2 years according to </span><a class="workspace-trigger" data-dcnode-id="2526" href="#bb0125" name="bbb0125"><span data-dcnode-id="2527" instrument_node="">Linton (1994)</span></a><span data-dcnode-id="2525" instrument_node="">, reflecting social and economic change (</span><a class="workspace-trigger" data-dcnode-id="2523" href="#bb0025" name="bbb0025"><span data-dcnode-id="2524" instrument_node="">Brannon, 2000</span></a><span data-dcnode-id="2522" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2520" href="#bb0155" name="bbb0155"><span data-dcnode-id="2521" instrument_node="">Porter, 1994</span></a><span data-dcnode-id="2519" instrument_node="">). It appears that brighter colours become popular during periods of economic expansion or stability, while more sombre shades are to be found during times of recession (</span><a class="workspace-trigger" data-dcnode-id="2517" href="#bb0025" name="bbb0025"><span data-dcnode-id="2518" instrument_node="">Brannon, 2000</span></a><span data-dcnode-id="2516" instrument_node="">).</span></p><p data-dcnode-id="2504" id="p0135"><span data-dcnode-id="2514" instrument_node="">What emerges from the current limited high-quality literature is a general consensus that no underlying theory of colour in marketing has been comprehensively tested either, which may help to substantiate the claims of accuracy from the colour forecasting industry. There are a variety of texts indicating the importance of colour in the marketing of new products (</span><a class="workspace-trigger" data-dcnode-id="2512" href="#bb0050" name="bbb0050"><span data-dcnode-id="2513" instrument_node="">Crozier, 1999</span></a><span data-dcnode-id="2511" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2509" href="#bb0070" name="bbb0070"><span data-dcnode-id="2510" instrument_node="">Eskilson, 2002</span></a><span data-dcnode-id="2508" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2506" href="#bb0145" name="bbb0145"><span data-dcnode-id="2507" instrument_node="">Paul, 2002</span></a><span data-dcnode-id="2505" instrument_node="">), suggesting that colours create brand imagery and convey moods. As previously indicated, research has shown that colours can change according to the economic status of a nation or the world at large. The adherence to particular colour combinations in clothing is unlikely to change in the near future, as the sober, dark pinstripe suits continue to reflect the City of London's financial centre, blue jeans reflect the relaxed world away from work, and the little black dress represents more formal cocktail dressing.</span></p></section></section><section data-dcnode-id="2265" id="s0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2498" id="st0040"><span data-dcnode-id="2501" instrument_node="">13.3</span><span data-dcnode-id="2500" instrument_node="">. </span><span data-dcnode-id="2499" instrument_node="">Case studies</span></h2><section data-dcnode-id="2441" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2494" id="st0045"><span data-dcnode-id="2497" instrument_node="">13.3.1</span><span data-dcnode-id="2496" instrument_node="">. </span><span data-dcnode-id="2495" instrument_node="">Shop Direct Group: Implications for colour when selling online</span></h3><p data-dcnode-id="2492" id="p0140"><span data-dcnode-id="2493" instrument_node="">There are several issues which the online retailer needs to be aware of regarding the use and timeliness of colour development. Although catalogue and home shopping has changed significantly in the last 20 years, the colour demands have remained relatively similar due to the nature of the home shopping medium.</span></p><p data-dcnode-id="2452" id="p0145"><span data-dcnode-id="2491" instrument_node="">Shop Direct Group, formerly known as Littlewoods, has been in the home shopping business since 1923, firstly as Littlewoods, and later becoming Shop Direct in 2005. In recent years the business refocused and no longer produces catalogues but is solely an online retailer. In an interview with Jane Barry, a ladieswear designer for the company, revealed the special considerations she has to bear in mind when designing for the groups diverse range of labels.</span></p><dl class="list" data-dcnode-id="2453"><dt class="list-label" data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">●</span></dt><dd class="list-description" data-dcnode-id="2486"><p data-dcnode-id="2487" id="p0150"><span data-dcnode-id="2488" instrument_node="">Love Label is targeted at a young, fashion conscious consumer</span></p></dd><dt class="list-label" data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">●</span></dt><dd class="list-description" data-dcnode-id="2481"><p data-dcnode-id="2482" id="p0155"><span data-dcnode-id="2483" instrument_node="">Very is also a fashion brand for the younger customer, 20 plus</span></p></dd><dt class="list-label" data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">●</span></dt><dd class="list-description" data-dcnode-id="2476"><p data-dcnode-id="2477" id="p0160"><span data-dcnode-id="2478" instrument_node="">Teatro is all about occasionwear, sizes 10–24</span></p></dd><dt class="list-label" data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">●</span></dt><dd class="list-description" data-dcnode-id="2469"><p data-dcnode-id="2470" id="p0165"><span data-dcnode-id="2473" instrument_node="">Savoir is for the 50</span><span data-dcnode-id="2472" instrument_node="">&nbsp;</span><span data-dcnode-id="2471" instrument_node="">+ customer with sizes from 10 to 32</span></p></dd><dt class="list-label" data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">●</span></dt><dd class="list-description" data-dcnode-id="2464"><p data-dcnode-id="2465" id="p0170"><span data-dcnode-id="2466" instrument_node="">South</span></p></dd><dt class="list-label" data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">●</span></dt><dd class="list-description" data-dcnode-id="2459"><p data-dcnode-id="2460" id="p0175"><span data-dcnode-id="2461" instrument_node="">Isme</span></p></dd><dt class="list-label" data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">●</span></dt><dd class="list-description" data-dcnode-id="2454"><p data-dcnode-id="2455" id="p0180"><span data-dcnode-id="2456" instrument_node="">Very Exclusive, a designer brand only website.</span></p></dd></dl><p></p><p data-dcnode-id="2450" id="p0185"><span data-dcnode-id="2451" instrument_node="">With so many brands, customer profiles and size ranges, there need to be clear differentiations between the brands. This in turn requires considerable variety in the design, fabric and colour used in the garments and accessories. For example, the trend for neon colours in Summer 2011 wouldn't be appropriate for the Savoir brand, and although it is a key fashion colour trend, the younger brands would be using the neons within their ranges. Nude colours, again a major fashion trend for Summer 2011, would not be used in savoir either, as the larger sized customers prefer strong, bold prints and colourful graphics to nude tones. The size of a fabric print and the embellishment upon it, be it beading, embroidery or appliqué, has to be carefully considered when designing for bigger sizes, to ensure everything looks to scale on the smallest and largest sizes. By contrast, Love Label work far more closely to the trends, and with a smaller size range doesn't have such design considerations imposed on it.</span></p><p data-dcnode-id="2448" id="p0190"><span data-dcnode-id="2449" instrument_node="">The colour development starts early at Shop Direct; when interviewed in Feb. 2011, the design team were just starting to brainstorm their Spring/Summer 2012 colours and concepts. The team attend fabric trade fairs such as Tissu Premiere in Lille, France, to develop early colour ideas, and subscribe to commercial trend forecasters. They also develop their ideas in conjunction with an analysis of what has sold well for them in previous seasons, but always use core colours such as black, white, cream and navy, plus blues and greens. Purple in particular has always been a big seller for them.</span></p><p data-dcnode-id="2446" id="p0195"><span data-dcnode-id="2447" instrument_node="">There are two main merchandise drops, the first for Spring Summer is released in January, and lasts until March; a new range of styles is created for the same season in April, covering May and June and featuring more colour than the first release. There are 10 colour stories, each with their own colour palette, broken down into the merchandise categories, January, February, March, then April, May and June. Most brands are featured in one online store, Littlewoods, so merchandise is planned well in advance in order to leave time for the sampling, fit, photography and graphics to be completed. Love Label, South and Very work in different ways, closer to the season, with extra products featuring online as the season progresses. Their suppliers are far more responsive, working faster as required by fast fashion.</span></p><p data-dcnode-id="2444" id="p0200"><span data-dcnode-id="2445" instrument_node="">The brands can also conversely be very responsive; if a product is not selling well, it can be re-photographed at the company's own photographic studios in Liverpool, and styled differently to make it more appealing. The images can then be uploaded to the company's website very rapidly to stimulate sales.</span></p><p data-dcnode-id="2442" id="p0205"><span data-dcnode-id="2443" instrument_node="">In such circumstances where colour is used very differently to a traditional retailer, colours selected and ranges planned far ahead, and with the consumers' purchasing decision being based on not seeing the actual product until they receive it in the post, accurate colour communication is essential to avoid large numbers of returns. Shop Direct has also been using a new method of reducing returns, providing more information on garment size and fit, and fabrics, which has resulted in fewer returns overall. The two key factors the designers work to are accuracy in colour trend development and in the reproduction of all imagery.</span></p></section><section data-dcnode-id="2426" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2437" id="st0050"><span data-dcnode-id="2440" instrument_node="">13.3.2</span><span data-dcnode-id="2439" instrument_node="">. </span><span data-dcnode-id="2438" instrument_node="">ASOS: Accurately representing colours on screen</span></h3><p data-dcnode-id="2435" id="p0210"><span data-dcnode-id="2436" instrument_node="">One of the early online retailing pioneers, the fashion retailer accurately representing colours on screen (ASOS) have developed from a small concept site in 2000 to a global retail powerhouse, with plans to open new procurement centres in Berlin in 2016 and the United States in 2017. They have their own branded ranges plus merchandise from a wide range of suppliers, including designer labels such as Vivienne Westwood. In an interview with Simon Platt, Head of Sourcing it was established that accurate colour and product representation is the key to the retailers' success.</span></p><p data-dcnode-id="2433" id="p0215"><span data-dcnode-id="2434" instrument_node="">ASOS strive to make the representation of product as accurate as possible. When considering purchasing or developing product, the complexity of reproducing the colour or pattern on screen is never a consideration. As the majority of ASOS's younger customers access the site using their smart phone, the representation of the product is extremely important, so ASOS have worked on the lighting in their photography studios to improve this. The company takes on average 34k images a week, hence it is important they are as high quality as possible using macro photography. A recent innovation on site was in the catwalk video section; previously items were filmed against a pure white backdrop so as not to detract from the garments; now ASOS have added horizons, so floors and backgrounds are visible, and this appears to have also helped customers understand the product better.</span></p><p data-dcnode-id="2431" id="p0220"><span data-dcnode-id="2432" instrument_node="">During the early years of operation, it would be difficult to see fabric details on black or white garments, but the new photography allows much more detail to be shown on garments, even without a close up image, so a jacquard or fine pinstripe which may not always have been previously accurately depicted is in 2016. Even difficult patterns such as houndstooth or puppytooth checks, which could end up looking like wavy lines on screen, works well with the new macro photography.</span></p><p data-dcnode-id="2429" id="p0225"><span data-dcnode-id="2430" instrument_node="">Naturally, different markets have different requirements, and in China ASOS has found it needs to take far more photographs of the garment details, for example eyelets, fastenings, and more shots of the fabric. Once again, the new macro photography allows accurate communication of colour and detail.</span></p><p data-dcnode-id="2427" id="p0230"><span data-dcnode-id="2428" instrument_node="">The evolution is continuous for ASOS, comparatively only 6 months earlier the images and the site overall are far better as a result of the improvements and accuracy of photography and product. ASOS have evolved using customer feedback and examining reasons why consumers return product, as have Shop Direct: the ASOS customer wants specific colours and patterns because they are on trend and as they are in the business of giving the consumers the trends they want, so they have to depict everything accurately. The typical ASOS customer is mainly 20-something and they use their mobile devices to purchase more than using a laptop, consequently everything has to work accurately on a phone screen size, and look good even at that scale. Most online retailers are moving their business in the same direction as consumers worldwide switch to their mobiles to purchase online and naturally, the most important thing is making a product an authentic reproduction of colour, fabric and style for the customer. Technology should be used to improve things, from the designer developing the colours and garments, the stylist working with the photographer to portray the garment, the person putting the information and copy out on the site to the end user, the customer, and make things as accurate as possible without compromising the ASOS fashion and product offer.</span></p></section><section data-dcnode-id="2266" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2422" id="st0055"><span data-dcnode-id="2425" instrument_node="">13.3.3</span><span data-dcnode-id="2424" instrument_node="">. </span><span data-dcnode-id="2423" instrument_node="">Brannon's colour cycle model</span></h3><div data-dcnode-id="2392"><p data-dcnode-id="2414" id="p0235"><span data-dcnode-id="2421" instrument_node="">Some research has been carried out into the cyclical nature of colour, with </span><a class="workspace-trigger" data-dcnode-id="2419" href="#bb0025" name="bbb0025"><span data-dcnode-id="2420" instrument_node="">Brannon (2000)</span></a><span data-dcnode-id="2418" instrument_node=""> citing a period between 1860 and 1990 when there were four distinct colour cycles each lasting between 15 and 25 years. However, examining more recent cyclical changes, Brannon's colour cycle diagram (</span><a class="workspace-trigger" data-dcnode-id="2416" href="#f0010" name="bf0010"><span data-dcnode-id="2417" instrument_node="">Fig. 13.1</span></a><span data-dcnode-id="2415" instrument_node="">) documented colour from 1972 to 1992, and used colour cycles that were far shorter, just 3–4 years in duration, in more contemporary fashion terms.</span></p><figure class="figure text-xs" data-dcnode-id="2393" id="f0010"><span data-dcnode-id="2404"><img alt="" aria-describedby="ca0010" data-dcnode-id="2413" height="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081012703000138-f13-01-9780081012703.jpg&amp;raw"><span data-dcnode-id="2412" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2405"><li data-dcnode-id="2406"><a class="anchor download-link u-font-sans" data-dcnode-id="2407" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081012703000138-f13-01-9780081012703.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2408"><span data-dcnode-id="2411" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2394"><span data-dcnode-id="2395" id="ca0010"><p data-dcnode-id="2396" id="sp0010"><span class="label" data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Fig. 13.1</span></span><span data-dcnode-id="2401" instrument_node="">. </span><span data-dcnode-id="2400" instrument_node="">Colour Cycles (</span><a class="workspace-trigger" data-dcnode-id="2398" href="#bb0025" name="bbb0025"><span data-dcnode-id="2399" instrument_node="">Brannon, 2000</span></a><span data-dcnode-id="2397" instrument_node="">).</span></p></span></span></figure></div><p data-dcnode-id="2387" id="p0240"><span data-dcnode-id="2391" instrument_node="">The repetition of colour cycles in the period Brannon's model illustrates spans 30 years, but much of the time frame used covered a period when traditionally there were only two fashion seasons each year, lasting longer then current seasons, Autumn/Winter and Spring/Summer. Contemporary </span><a class="topic-link" data-dcnode-id="2389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/materials-design-for-fashion" title="Learn more about fashion design from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2390" instrument_node="">fashion design</span></a><span data-dcnode-id="2388" instrument_node=""> seasons have changed considerably and can now feature up to six seasons each year, with a number of ‘phases’ within each season, so the consumer is subject to far more choice, and able to see something new in store every week. With online retailers there is pressure to have something new available each day in terms of merchandise or on screen content, resulting in further pressure on the forecasters and supply chains to respond rapidly. Almost 25 years since Brannon's documentation concluded, can those colour cycles still be rigidly applied?</span></p><p data-dcnode-id="2385" id="p0245"><span data-dcnode-id="2386" instrument_node="">A brief examination of the key colour themes of the decades neither fully supports nor completely eliminates the validity of the model. As with fashion trends, if one accepts Brannon's basic model, that colour trends appear to be cyclical, it is accepted that colours do come in and out of fashion and can represent a specific mood of a decade.</span></p><div data-dcnode-id="2336"><p data-dcnode-id="2357" id="p0250"><span data-dcnode-id="2384" instrument_node="">For example, in </span><a class="workspace-trigger" data-dcnode-id="2382" href="#f0015" name="bf0015"><span data-dcnode-id="2383" instrument_node="">Fig. 13.2</span></a><span data-dcnode-id="2381" instrument_node="">, developed from Brannon's original model, if the first phase Brannon commenced the model with, the early 1970s, is widely accepted as being a multi-coloured era, with glam rock and the explosion of punk and ‘dyers’ headaches with all colours possible and probable (</span><a class="workspace-trigger" data-dcnode-id="2379" href="#bb0035" name="bbb0035"><span data-dcnode-id="2380" instrument_node="">Buddy, 1992</span></a><span data-dcnode-id="2378" instrument_node="">:67), then the following black phase for the 1980s and early 1990s (</span><a class="workspace-trigger" data-dcnode-id="2376" href="#bb0160" name="bbb0160"><span data-dcnode-id="2377" instrument_node="">Raymond, 2001</span></a><span data-dcnode-id="2375" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2373" href="#bb0025" name="bbb0025"><span data-dcnode-id="2374" instrument_node="">Brannon, 2000</span></a><span data-dcnode-id="2372" instrument_node="">) influenced by the influx of Japanese designers and the Gothic subculture of the time, ensuring the timeline started at the top of Brannon's model. The early 1990s was a time when there was more of a return to hand crafted products and natural colours (</span><a class="workspace-trigger" data-dcnode-id="2370" href="#bb0035" name="bbb0035"><span data-dcnode-id="2371" instrument_node="">Buddy, 1992</span></a><span data-dcnode-id="2369" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2367" href="#bb0135" name="bbb0135"><span data-dcnode-id="2368" instrument_node="">Musso, 2008</span></a><span data-dcnode-id="2366" instrument_node="">), linked to concerns about the environment, which would support Brannon's earth tones section, endorsed by Jackson's observations.</span></p><blockquote data-dcnode-id="2358"><p data-dcnode-id="2364" id="sp0070"><span data-dcnode-id="2365" instrument_node="">The early 1990s saw many consecutive seasons of neutral tones in womenswear, with an explosion of bright and pastel colours occurring in the mid 1990s.</span></p><span data-dcnode-id="2359"><span data-dcnode-id="2363" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2361" href="#bb0110" name="bbb0110"><span data-dcnode-id="2362" instrument_node="">Jackson, 2007</span></a><span data-dcnode-id="2360" instrument_node="">:124)</span></span></blockquote><p></p><figure class="figure text-xs" data-dcnode-id="2337" id="f0015"><span data-dcnode-id="2347"><img alt="" aria-describedby="ca0015" data-dcnode-id="2356" height="294" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081012703000138-f13-02-9780081012703.jpg&amp;raw"><span data-dcnode-id="2355" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2348"><li data-dcnode-id="2349"><a class="anchor download-link u-font-sans" data-dcnode-id="2350" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081012703000138-f13-02-9780081012703.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2351"><span data-dcnode-id="2354" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2338"><span data-dcnode-id="2341" id="ca0015"><p data-dcnode-id="2342" id="sp0015"><span class="label" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Fig. 13.2</span></span><span data-dcnode-id="2344" instrument_node="">. </span><span data-dcnode-id="2343" instrument_node="">Brannon's model annotated using colours from 1970s to 2000s.</span></p></span><span data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Source: the author.</span></span></span></figure></div><p data-dcnode-id="2323" id="p0255"><span data-dcnode-id="2335" instrument_node="">The Y2K or Millennium Bug saw a profusion of futuristic white, metallics and optimistic yellows, only to be later overshadowed by the terrorist actions of 911 in New York in 2001, where almost 4000 people died as a result of two passenger aircraft being hijacked and flown into The World Trade Centre Towers; such actions precipitated some very dark colours in fashion, and soon after a purer white (</span><a class="workspace-trigger" data-dcnode-id="2333" href="#bb0170" name="bbb0170"><span data-dcnode-id="2334" instrument_node="">Rinallo and Golfetto, 2006</span></a><span data-dcnode-id="2332" instrument_node="">).</span></p><blockquote data-dcnode-id="2324"><p data-dcnode-id="2330" id="sp0075"><span data-dcnode-id="2331" instrument_node="">Because of 9–11 designers were anxious to erase the negativity and fear… now black just looks too depressing and sinister.</span></p><span data-dcnode-id="2325"><span data-dcnode-id="2329" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2327" href="#bb0090" name="bbb0090"><span data-dcnode-id="2328" instrument_node="">Guerin, 2005</span></a><span data-dcnode-id="2326" instrument_node="">:191)</span></span></blockquote><p></p><p data-dcnode-id="2318" id="p0260"><span data-dcnode-id="2322" instrument_node="">World events can obviously impact significantly on fashion and colour in fashion, skewing the natural development of colour trends, but the 9/11 example illustrates convincingly that colour trends are indeed subject to considerable influences outside the business of fashion which the designer must consider. Perhaps this was Brannon's predicted achromatic phase? Would purple be the next important colour trend? </span><a class="workspace-trigger" data-dcnode-id="2320" href="#bb0045" name="bbb0045"><span data-dcnode-id="2321" instrument_node="">Crispell (1997)</span></a><span data-dcnode-id="2319" instrument_node=""> suggested there was also a strong move toward purples at this time, consequently changing Brannon's sequence of colour phases.</span></p><p data-dcnode-id="2313" id="p0265"><span data-dcnode-id="2317" instrument_node="">In 2008, Li Edelkoort, perhaps the best known colour forecaster in the industry today, indicated there was ‘a surge of brights’ which would align with the High Chroma phase of Brannon's model (</span><a class="workspace-trigger" data-dcnode-id="2315" href="#bb0065" name="bbb0065"><span data-dcnode-id="2316" instrument_node="">Edelkoort, 2008</span></a><span data-dcnode-id="2314" instrument_node="">). At the same time the BTCG were predicting mainly subdued greens, blues, natural and wood tones, lilacs and pinks, and a monochromatic palette all running in parallel. With so many colour options presented by the forecasters, it is clear that many colour groups identified in Brannon's model run in parallel. It would appear that from the available evidence some of Brannon's information regarding cyclical colour change is correct, with the exception of the placement of a purple phase, which was not found to be of significant fashion influence.</span></p><p data-dcnode-id="2303" id="p0270"><a class="workspace-trigger" data-dcnode-id="2311" href="#bb0105" name="bbb0105"><span data-dcnode-id="2312" instrument_node="">Hope and Walch (1990)</span></a><span data-dcnode-id="2310" instrument_node=""> suggest cycles may last up to a decade each time, as do </span><a class="workspace-trigger" data-dcnode-id="2308" href="#bb0175" name="bbb0175"><span data-dcnode-id="2309" instrument_node="">Scully and Johnston Cobb (2012)</span></a><span data-dcnode-id="2307" instrument_node="">, although the latter acknowledge that colour cycles are shortening as a consequence of fast fashion, production costs and live streaming of catwalk shows. </span><a class="workspace-trigger" data-dcnode-id="2305" href="#bb0025" name="bbb0025"><span data-dcnode-id="2306" instrument_node="">Brannon (2000)</span></a><span data-dcnode-id="2304" instrument_node=""> subscribes to this view of colour cycles taking a decade to truly phase in and out again. However, the work is based on relatively broad groups of colours, such as High Chroma or Multi-coloured. These could refer to any number of colours or combination of colour families, and as such has its accuracy must be questioned. Only the purple phase specifically refers to a colour, or range of colours. Although at first glance Brannon may appear to have produced a strong case for colour cycles, closer analysis reveals very little information regarding colour groups themselves.</span></p><p data-dcnode-id="2281" id="p0275"><span data-dcnode-id="2302" instrument_node="">In </span><a class="workspace-trigger" data-dcnode-id="2297" href="#bb0125" name="bbb0125"><span data-dcnode-id="2301" instrument_node="">Linton's </span><em data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Colour Forecasting</span></em><span data-dcnode-id="2298" instrument_node=""> (1994)</span></a><span data-dcnode-id="2296" instrument_node="">, Lamb suggested that colour cycles had an approximate time span of only 5 years – half that of Hope and Walch's suggestion – yet in the same publication Leonard Oberascher in his chapter entitled ‘Cyclical Recurrence of Collective Colour Preferences’ identified specific colours which featured in regular colour cycles. From his research, Oberascher suggested that purple was popular every 7 years. Brannon also cited Oberascher and the work of </span><a class="workspace-trigger" data-dcnode-id="2294" href="#bb0015" name="bbb0015"><span data-dcnode-id="2295" instrument_node="">Barry (1999)</span></a><span data-dcnode-id="2293" instrument_node=""> whose research indicated cycles of between 3 and 4 years' duration. Primary research conducted for the study suggests some colour specialists believe that this may closer to the real picture today, and is perhaps only 6–7 years between cycles (</span><a class="workspace-trigger" data-dcnode-id="2291" href="#bb0095" name="bbb0095"><span data-dcnode-id="2292" instrument_node="">Hibbert, 2008</span></a><span data-dcnode-id="2290" instrument_node="">), and reducing each year. In 1992 Buddy suggested the cycle was even shorter.</span></p><blockquote data-dcnode-id="2282"><p data-dcnode-id="2288" id="
