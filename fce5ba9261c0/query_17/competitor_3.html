sp0080"><span data-dcnode-id="2289" instrument_node="">Back in the 1950s it used to take seven years for colour to start at the top level and peter out at mail order. Now it takes only two to three years for colours to saturate the market.</span></p><span data-dcnode-id="2283"><span data-dcnode-id="2287" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2285" href="#bb0035" name="bbb0035"><span data-dcnode-id="2286" instrument_node="">Buddy, 1992</span></a><span data-dcnode-id="2284" instrument_node="">:68)</span></span></blockquote><p></p><p data-dcnode-id="2279" id="p0280"><span data-dcnode-id="2280" instrument_node="">The major driver of fashion change has undoubtedly been social media which in itself has changed the trends landscape as new bloggers, vloggers and web sites emerge constantly with free information on trends and fads in a global context. This has had an impact on fashion trends and consequently on colour trends too.</span></p><p data-dcnode-id="2269" id="p0285"><span data-dcnode-id="2278" instrument_node="">Ruth Chapple, head of content at Stylus Fashion commented:</span></p><blockquote data-dcnode-id="2270"><p data-dcnode-id="2276" id="sp0085"><span data-dcnode-id="2277" instrument_node="">The Valentino rock stud, which everyone expected to be a one-season wonder, has been going strong for eight seasons. The death of the stud was forecast long ago, but that was very much a social media trend, where the bloggers made that trend stick.</span></p><span data-dcnode-id="2271"><span data-dcnode-id="2275" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="2273" href="#bb0010" name="bbb0010"><span data-dcnode-id="2274" instrument_node="">Abnett, 2015</span></a><span data-dcnode-id="2272" instrument_node="">)</span></span></blockquote><p></p><p data-dcnode-id="2267" id="p0290"><span data-dcnode-id="2268" instrument_node="">With so many conflicting views, who is right? Do cycles repeat every 10, 7, 5, 3 or 2 years? Is the lifecycle of a colour key in determining the cycles of colour today, or has fast fashion negated the value of such models? In a sense, all the commentators are correct in their considerations of colour lifecycles. In a period of fast fashion, where some colours are developed to respond to a product being in store within 6–10 weeks of concept, it is questionable whether or not a colour trend could still last a full decade. It is commonly acknowledged that fashion is fuelled by constant change in order to stimulate sales and interest for the consumer. Inevitably, there will be a multiplicity of trends available at any one time, and each fashion trend, or look, naturally develops its own colour identity, resulting in numerous colour stories being available during any one season.</span></p></section></section><section data-dcnode-id="2244" id="s0050"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2261" id="st0060"><span data-dcnode-id="2264" instrument_node="">13.4</span><span data-dcnode-id="2263" instrument_node="">. </span><span data-dcnode-id="2262" instrument_node="">Conclusions</span></h2><p data-dcnode-id="2256" id="p0295"><span data-dcnode-id="2260" instrument_node="">Although colour is an essential component of </span><a class="topic-link" data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/materials-design-for-fashion" title="Learn more about fashion design from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2259" instrument_node="">fashion design</span></a><span data-dcnode-id="2257" instrument_node="">, its use has changed considerably over recent decades, in particular the speed at which colours change and the number of colours presented to the consumer each year. There is considerable repetition, as colour selection is influenced by a wide range of contemporary and historical events and fashion movements. Inspiration is also drawn from a range of specific cultural preferences, weather and the prevailing daylight in any particular continent. Consumers do have particular colour preferences, with blue consistently being cited as the overall favourite. However, consumer colour preferences are not always taken into consideration by designers and manufacturers who, naturally, like to keep new hues coming in to the stores to stimulate sales. With online only stores the pressure to keep new merchandise dropping everyday is far more intense, and ASOS have been at the forefront of this since 2010.</span></p><p data-dcnode-id="2251" id="p0300"><span data-dcnode-id="2255" instrument_node="">There are still a group of core, or basic, colours which do repeat year after year, season after season. These are the basic or classic colours which consumers purchase time after time; white, black, grey, navy and camel tend to be the staples. All retailers, bricks and mortar or online, will offer these colours in their basic and high fashion merchandise and can usually be guaranteed of selling styles in volume in such basic colours. The fashion colours which are developed alongside the basic colours bring change and newness to the stores and their fashion ranges, although there are specific colour combinations or groups of colour which can be repeated in cycles, and which have been tracked by researchers such as </span><a class="workspace-trigger" data-dcnode-id="2253" href="#bb0025" name="bbb0025"><span data-dcnode-id="2254" instrument_node="">Brannon (2000)</span></a><span data-dcnode-id="2252" instrument_node="">.</span></p><p data-dcnode-id="2249" id="p0305"><span data-dcnode-id="2250" instrument_node="">Depending on the nature of the business, fashion retailers broadly work in the same way when developing their new season's ranges and that development usually begins with colour. As with the example from ASOS, it is of paramount importance when your store is online only. The colour and fabric needs to be accurately represented to reduce the amount of customer returns and the processing costs associated with these.</span></p><p data-dcnode-id="2247" id="p0310"><span data-dcnode-id="2248" instrument_node="">Currently the speed at which the industry is working is faster than ever before, fuelled by new celebrity cultures, YouTube stars, bloggers and vloggers fuel the consumers' desire to copy the latest celebrity or catwalk looks as soon as possible for the high street and its virtual equivalent. For the foreseeable future there seems to be no indication of the slowing in such a business model, indeed, in many respects the model is moving even faster nowadays due to continuing online demand and a 24/7 open all hours virtual shopping experience which consumers now enjoy worldwide.</span></p><p data-dcnode-id="2245" id="p0315"><span data-dcnode-id="2246" instrument_node="">How will the future develop? What has emerged is that colour will always help drive sales, and consumers will always express certain colour preferences associated with their cultural experiences. Whether shopping on our mobile phones, tablets or laptops, there will inevitably be a demand for the colour to be accurately communicated too, but as fashion trends speed up the flexibility of all concerned within the fashion and retail industries will need to keep pace.</span></p></section><section data-dcnode-id="2236" id="s0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2242" id="st0065"><span data-dcnode-id="2243" instrument_node="">Sources of further information and advice</span></h2><p data-dcnode-id="2237" id="p0320"></p><dl class="list" data-dcnode-id="2238"><dd class="list-description" data-dcnode-id="2239"><p data-dcnode-id="2240" id="p0325"><span data-dcnode-id="2241" instrument_node="">Fashion websites, colour blogs, trade shows and relevant journals.</span></p></dd></dl><p></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="2230">
