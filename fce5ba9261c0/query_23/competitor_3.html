</span><div class="header-image" data-dcnode-id="1678"><span data-dcnode-id="1681" instrument_node="">
</span><div class="header-image__bg" data-dcnode-id="1680" style="background-image:url(https://i0.wp.com/cream.ac.uk/wp-content/uploads/Header_HR_Wellcome4-scaled.jpg?fit=1200%2C800&amp;ssl=1)"></div><span data-dcnode-id="1679" instrument_node="">

</span><div class="entry-container ox-inner" data-dcnode-id="158"><span data-dcnode-id="1676" instrument_node="">
</span><div class="entry-main" data-dcnode-id="160"><span data-dcnode-id="1675" instrument_node="">
</span><div class="entry-main__content" data-dcnode-id="163"><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672" id="intro"><span data-dcnode-id="1673" instrument_node="">A project that seeks to explore the cultural significance of hair (both its presence and absence) by investigating its uses in contemporary visual culture.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">What you will find here is number of works discussed with larger visual cultural context in mind. I attempted to organise them under certain keywords, but they are often interrelated in more ways than anticipated. You might therefore find an installation discussed together with a photograph or a film together with a performance. You might also encounter the same artists in different sections, since what is of interest here is not focusing on specific disciplines or artists but to see what all this tells us about our visual culture and the significance of hair.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><h4 class="anchor-heading" data-dcnode-id="1666" id="hair-video"><span data-dcnode-id="1667" instrument_node="">HAIR</span></h4><span data-dcnode-id="1665" instrument_node="">
</span><figure class="wp-block-embed is-type-video is-provider-vimeo wp-block-embed-vimeo wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="1656"><div class="wp-block-embed__wrapper" data-dcnode-id="1659"><span data-dcnode-id="1664" instrument_node="">
</span><div class="embed-vimeo" data-dcnode-id="1661" style="text-align: center;"><div class="fluid-width-video-wrapper" data-dcnode-id="1662" style="padding-top: 56.3333%;"><iframe allowfullscreen="" data-dcnode-id="1663" frameborder="0" loading="lazy" mozallowfullscreen="" name="fitvid0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/472283421&amp;raw" webkitallowfullscreen=""></iframe></div></div><span data-dcnode-id="1660" instrument_node="">
</span></div><figcaption data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">HAIR, Ozlem Koksal and Armagan Uslu</span></figcaption></figure><span data-dcnode-id="1655" instrument_node="">
</span><h4 data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">COVID 19 Note</span></h4><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">My interest in all things hair related started before it even became a project. Recently, I have been trying to develop a more structured approach to the existing material, and conversations -images, newspaper articles and other- material I accumulated over the past few years.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Bulk of the work for this web project was done during the lockdown. I could not possibly envision that hair would become central during lockdown, yet most people, who knew I was working on hair, sent me something related to lockdown and hair. In certain parts of the world demanding hair dressers to open was a legitimate reason to protest.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Hair dresser conversations, state of our hair and the need to visit a hair dresser, was in the background while I was trying to organise my thoughts about how to map out centrality of hair in our lives. However, the murder of George Floyd, and the protests that followed worldwide, was another part of the background. Hair, as I will try to illustrate, is a large part of how we form our opinions and biases about people. Racial, ethnic, religious discrimination relies, among many things, on our perceptions of how hair looks and whether it is visible or not. With that in mind this project wants to look at hair in visual culture, making connections between seemingly separate works and conversations, that are in fact responding to how much hair organises our lives.</span></p><span data-dcnode-id="1643" instrument_node="">
</span><h4 class="anchor-heading" data-dcnode-id="1641" id="why-hair"><span data-dcnode-id="1642" instrument_node="">Why Hair?</span></h4><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Coming from a culture where curly hair is, not necessarily always appreciated but very common, it was in Britain I first encountered the phrase “Jewish hair”. It was also here that I found out hair dressers could not necessarily cut my hair the way I wanted. I was told my hair texture was “different”. My hair, I thought, was very common, slightly wavy thick hair, yet hairdressers were not familiar with it. Around the same time, I noticed how segregated hair dressers are in Britain, not just based on class but also race and ethnic background. There are “salons”, middle eastern hair dressers, black barbers and so on. </span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Becoming more occupied with hair, I discovered art works on hair, watched documentaries, feature films and TV shows entirely or partly about hair and noticed how much it says about different cultures, how big a role it plays in how we perform ourselves and how central it is in the way we discriminate against others.</span></p><span data-dcnode-id="1634" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1626"><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frieze.com/article/kerry-james-marshall-0" rel="noopener noreferrer" target="_blank"><img alt="" data-dcnode-id="1633" data-recalc-dims="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/static.frieze.com/files/inline-images/editorial-1-48.jpeg%3Fssl%3D1&amp;raw"></a><figcaption data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">Kerry James Marshall, </span><em data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">De Style</span></em><span data-dcnode-id="1628" instrument_node="">, 1993, acrylic and collage on canvas, 2.6 × 3.1 m. Courtesy: © Kerry James Marshall; © 2015 Museum Associates / LACMA, and Art Resource, New York</span></figcaption></figure><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Hair is manipulated, shaped, collected and traded. It says so much about us yet we speak so little of it in our discussions of art and culture. As Kobena Mercer states in a much-quoted article, hair is “never a straightforward biological ‘fact’ because it is almost always groomed, prepared, cut, concealed and generally ‘worked upon’ by human hands. Such practices socialize hair, making it the medium of significant ‘statements’ about self and society and the codes of value that bind them, or don’t” (Mercer, 1987: 34).</span></p><span data-dcnode-id="1622" instrument_node="">
</span><h4 class="anchor-heading" data-dcnode-id="1620" id="hair-and-visual-culture"><span data-dcnode-id="1621" instrument_node="">Hair and Visual Culture</span></h4><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1618" instrument_node="">Hair means </span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalgallery.org.uk/paintings/hilaire-germain-edgar-degas-combing-the-hair-la-coiffure" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1617" instrument_node="">care</span></a><span data-dcnode-id="1615" instrument_node="">, hair means </span><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sonyaclark.com/gallery/black-hair-flag/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1614" instrument_node="">race</span></a><span data-dcnode-id="1612" instrument_node="">, </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tate.org.uk/art/artworks/ojeikere-untitled-onile-gogoro-or-akaba-p80252" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1611" instrument_node="">culture</span></a><span data-dcnode-id="1609" instrument_node="">, it means resistance, and it is </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/lifeandstyle/2009/jun/05/women-victims-d-day-landings-second-world-war" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1608" instrument_node="">punishment</span></a><span data-dcnode-id="1606" instrument_node="">, it is sculpted to be displayed and it is sacred and to be shielded. It is private and intimate but also public and (still) political.</span><a data-dcnode-id="1604" href="#_ftn1" name="_ftnref1"><span data-dcnode-id="1605" instrument_node="">[1]</span></a><span data-dcnode-id="1603" instrument_node=""> It is also a huge industry, not just through products that we buy and sell but also because hair itself is bought and sold (Emma Tarlo explores this in fascinating detail in her book </span><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Entanglement: The Secret Lives of Hair</span></em><span data-dcnode-id="1600" instrument_node="">).</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1597" instrument_node="">Hair is also important in many religions and considered sacred in many cultures. Most practicing Muslim women believe their hair should not be visible in public, so do Sikh men. Orthodox Jews have different practices regarding hair for men and women and Native Americans protect their hair as they believe it gives them power, connects them to nature and is sacred. Hair also contains information about us, it carries our DNA. It is part of our identity and often considered something to do with how attractive one is. Yet once it falls off our head it is deeply uncanny. This aspect is also explored often in art by artists such as Mona Hatoum and David Hammons, albeit differently. That uncanny nature of hair when out of place, changes when re-placed. Many cultures keep hair locks as memorabilia. In Victorian Britain, for instance, hair was used in </span><a data-dcnode-id="1595" data-id="https://www.vam.ac.uk/blog/museum-life/hair" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vam.ac.uk/blog/museum-life/hair" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1596" instrument_node="">mourning jewellery</span></a><span data-dcnode-id="1594" instrument_node="">.&nbsp;Objects containing the hair of the deceased were designed to be worn.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1586"><img alt="" class="wp-image-4408" data-dcnode-id="1591" data-recalc-dims="1" height="983" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cream.ac.uk/wp-content/uploads/s3_L0058000_L0058632.jpg%3Fresize%3D1200%252C983%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/cream.ac.uk/wp-content/uploads/s3_L0058000_L0058632-scaled.jpg?resize=1200%2C983&amp;ssl=1 1200w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/s3_L0058000_L0058632-scaled.jpg?resize=800%2C656&amp;ssl=1 800w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/s3_L0058000_L0058632-scaled.jpg?resize=768%2C629&amp;ssl=1 768w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/s3_L0058000_L0058632-scaled.jpg?resize=1536%2C1259&amp;ssl=1 1536w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/s3_L0058000_L0058632-scaled.jpg?resize=2048%2C1678&amp;ssl=1 2048w" width="1200"><figcaption data-dcnode-id="1587"><span data-dcnode-id="1590" instrument_node="">Mourning Jewellery: Human hair is contained in gold brooch</span><br data-dcnode-id="1589"><span data-dcnode-id="1588" instrument_node="">Credit: Brooch containing human hair, Europe, 1701-1900. Science Museum, London. Attribution 4.0 International (CC BY 4.0)</span></figcaption></figure><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Any work that wants to explore hair could do so by looking at any one these different areas. Only to look at the economic aspect would be a huge undertaking. What this project is interested in is hair in visual culture (which, as the recent reaction I received summarises, “is [also] huge”). However, I am less interested in mentioning/examining every single major work on the topic, and more interested in looking at dialogues, connections, conversations between works that are about hair. Although works themselves might be endless in numbers, the concerns and conversations are not.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1571"><img alt="" class="wp-image-4409" data-dcnode-id="1581" data-recalc-dims="1" height="1200" loading="lazy" sizes="(max-width: 909px) 100vw, 909px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cream.ac.uk/wp-content/uploads/Image-3_Karon-Davis_Hair-Peace.jpg%3Fresize%3D909%252C1200%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image-3_Karon-Davis_Hair-Peace-scaled.jpg?resize=909%2C1200&amp;ssl=1 909w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image-3_Karon-Davis_Hair-Peace-scaled.jpg?resize=606%2C800&amp;ssl=1 606w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image-3_Karon-Davis_Hair-Peace-scaled.jpg?resize=768%2C1014&amp;ssl=1 768w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image-3_Karon-Davis_Hair-Peace-scaled.jpg?resize=1164%2C1536&amp;ssl=1 1164w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image-3_Karon-Davis_Hair-Peace-scaled.jpg?resize=1552%2C2048&amp;ssl=1 1552w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image-3_Karon-Davis_Hair-Peace-scaled.jpg?w=1940&amp;ssl=1 1940w" width="909"><figcaption data-dcnode-id="1572"><span data-dcnode-id="1580" instrument_node="">Image 3: Karon Davis </span><em data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Hair Peace</span></em><span data-dcnode-id="1577" instrument_node="">, 2019</span><br data-dcnode-id="1576"><span data-dcnode-id="1575" instrument_node="">(from the Exhibition Rock my Soul, Victoria Miro, Curated by Isaac Julien)</span><br data-dcnode-id="1574"><span data-dcnode-id="1573" instrument_node="">Photo Credit: Ozlem Koksal</span></figcaption></figure><span data-dcnode-id="1570" instrument_node="">
</span><h4 class="anchor-heading" data-dcnode-id="1568" id="define-visual-culture"><span data-dcnode-id="1569" instrument_node="">How to Define Visual Culture</span></h4><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">I take Nicholas Mirzoeff’s definition of visual culture as my guide here, which focuses on “creating and exploring new archives of visual materials, mapping them to discover connections between what is visual and the culture as a whole” (2015:14). In that sense, this web content, a curated collection of hair in visual culture, seeks to begin creating one such map that is curious about those connections and meanings. By mapping them out, I seek to see how art and culture respond, perform and subvert or reproduce existing discourses and practices regarding hair.</span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">As Mirzoeff points out “visual culture is not simply the total amount of what has been made to be seen […]. A visual culture is the relation between what is visible and the names that we give to what is seen” (11). This is why it is important to understand these connections as well as looking at efforts to subvert them.&nbsp; Where do these names come from, who named them and why? And more importantly, how much of it still determines our perception even though –or because- we forgot where they come from.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Norms that structure societies, that are created arbitrarily, also create deviants. Yet it is the norm that needs to be questioned, examined and de-normalised -not what’s left outside of it. Art does this. Talking about difference, Stuart Hall says that “if you want to learn more, or see how difference operates inside people’s heads, you have to go to art, you have to go to culture – to where people imagine, where they fantasise, where they symbolise. You have to make the detour from the language of straight description to the language of the imaginary” (Hall, 152). It is my aim here to examine those cultural productions with the intention to connect the concerns and questions they raise, with an attempt to “deconstruct colonised imaginary” (Hall, 152).</span></p><span data-dcnode-id="1558" instrument_node="">
</span><h4 class="anchor-heading" data-dcnode-id="1556" id="contextualise-hair"><span data-dcnode-id="1557" instrument_node="">How to Contextualise Hair?</span></h4><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">How do we understand our existing perceptions and ideas of what hair represents and what it means?</span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1551" instrument_node="">There are many instances that hair is not just hair. It is performative and political. How it looks (or whether it is visible or not), as well as its absence/loss is never straightforward. Audre Lorde, for instance, writes about how her dreadlocks caused her to be denied entry into British Virgin Islands. A decision went beyond unwritten rules that regulate our lives, as this was actually written into the law. For years, there has been a debate on whether veiled hair should be allowed in schools and public spaces in secular countries such as Turkey</span><a data-dcnode-id="1549" href="#_ftn2" name="_ftnref2"><span data-dcnode-id="1550" instrument_node="">[2]</span></a><span data-dcnode-id="1548" instrument_node=""> and France. When the first female MP with a headscarf entered the Turkish parliament, it was a politically significant, and highly charged, moment in the country. Similarly, when Iranian women started removing their head scarves in public spaces in 2014 it was equally political, going beyond demanding oppression to end.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1545" instrument_node="">In Budhism shaving hair is sign of devotion and humility but is also required because it is considered ‘dirty’. In the 50s, in Kenya, on the other hand, it served as a highly political statement as Mau Mau fighters did not cut their hair.</span><a data-dcnode-id="1543" href="#_ftn3" name="_ftnref3"><span data-dcnode-id="1544" instrument_node="">[3]</span></a><span data-dcnode-id="1542" instrument_node=""> Similarly, Angela Davis’ afro hair during her court appearance in 1971 was not just about ‘going natural’, it was an immensely political act. Yet, it is also important to note that how Davis’ Afro became an iconic image is as political as the initial act itself. In her autobiography Davis notes that “It is both humiliating and humbling to discover that a single generation after the events that constructed me as a public personality, I am remembered as a hairdo. It is humiliating because it reduces a politics of liberation to a politics of fashion; it is humbling because such encounters with the younger generation demonstrate the fragility and mutability of historical images, particularly those associated with African-American history” (xv). Because hair is highly charged and says so much about us, it is also used to subjugate us. After 2</span><sup data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">nd</span></sup><span data-dcnode-id="1539" instrument_node=""> world war, when some French towns decided to publicly shave the hair of those women accused of collaborating with Nazi’s, it was a political act as well as a punishment, an a highly gendered one. A form of punishment reserved for women that</span><a data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node=""> </span></a><a data-dcnode-id="1535" data-id="https://www.theguardian.com/lifeandstyle/2009/jun/05/women-victims-d-day-landings-second-world-war" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/lifeandstyle/2009/jun/05/women-victims-d-day-landings-second-world-war" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1536" instrument_node="">goes back centuries</span></a><span data-dcnode-id="1534" instrument_node="">.&nbsp;Cutting someone’s hair without their consent is a form of punishment that has a long history and is directly related to political and cultural capital.</span><br data-dcnode-id="1533"><br data-dcnode-id="1532"><span data-dcnode-id="1531" instrument_node="">As the examples illustrate, hair –among other things- is very much entangled with identity politics, as well as cultural rituals. Therefore, it is not surprising that hair continuously appears in visual culture, from films to art works. This, in cultural realm, manifests itself in art works using real hair, or made about hair, films and television shows entirely on hair, episodes and segments that are about hair, book chapters, stories and poems written on aspects of experiences determined simply by how one’s hair looks. Works of David Hammonds, Sonya Clark, Lorna Simpson, Mona Hatoum, along with many others, consciously and repeatedly use hair in their works. Yet, this is not just visible in art, it is there in popular culture too.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><blockquote class="twitter-tweet" data-conversation="none" data-dcnode-id="1518" data-dnt="true"><p data-dcnode-id="1522" dir="ltr" lang="en"><span data-dcnode-id="1528" instrument_node="">My baby sister was into it. </span><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/HairLove%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1527" instrument_node="">#HairLove</span></a><span data-dcnode-id="1525" instrument_node=""> </span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/AztL0ZoNLv"><span data-dcnode-id="1524" instrument_node="">pic.twitter.com/AztL0ZoNLv</span></a></p><span data-dcnode-id="1521" instrument_node="">— Vote Early &amp; In Person (if you can) (@JazminsThoughts) </span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/JazminsThoughts/status/1203378671802818560%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1520" instrument_node="">December 7, 2019</span></a></blockquote><span data-dcnode-id="1517" instrument_node=""> </span><span data-dcnode-id="1515" instrument_node="">
</span><figcaption data-dcnode-id="1511"><span data-dcnode-id="1514" instrument_node="">Little girl watching Hair Love.</span><br data-dcnode-id="1513"><span data-dcnode-id="1512" instrument_node="">Photo credit @JazminsThoughts (Twitter)</span></figcaption><br data-dcnode-id="1510"><br data-dcnode-id="1509"><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1507" instrument_node="">In the 2001 film </span><em data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Believer</span></em><span data-dcnode-id="1504" instrument_node=""> (Henry Bean) a group of Neo-Nazis men go to a kosher restaurant. They mock the waiter’s curly hair: “look at his hair” “who does your hair?” one of them says. The commentary on hair in </span><em data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Believer</span></em><span data-dcnode-id="1501" instrument_node=""> subtle and tangential -a way to mock the waiter’s Jewish heritage. Yet there are also many films that are exclusively about hair. In the Venezuelan film </span><em data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Pelo Malo</span></em><span data-dcnode-id="1498" instrument_node=""> (2013) director Mariana Rondon tells the story of a nine-year-old Junior who becomes obsessed with straight hair as he tries everything to make this curly hair straight. The film gives us a glimpse of Venezuelan race relations as well as class by simply following Junior’s struggle with his hair.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1495" instrument_node="">More recently, in 2020, Matthew Cherry’s short animation </span><em data-dcnode-id="1492"><a data-dcnode-id="1493" data-id="https://www.youtube.com/watch?v=kNw8V_Fkw28" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DkNw8V_Fkw28" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1494" instrument_node="">Hair Love</span></a></em><span data-dcnode-id="1491" instrument_node=""> about a little black girl and her hair, won the best short animation Oscar and received much attention. In 2018, hair styles in </span><em data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Black Panther</span></em><span data-dcnode-id="1488" instrument_node=""> was discussed by many. Articles appeared focusing solely on the hair styles in the film, discussing how the film was </span><a data-dcnode-id="1486" data-id="https://www.thecut.com/2018/02/black-panther-natural-hair.html" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecut.com/2018/02/black-panther-natural-hair.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1487" instrument_node="">a showcase for natural hair</span></a><span data-dcnode-id="1485" instrument_node=""> and </span><a data-dcnode-id="1483" data-id="https://www.nytimes.com/2018/02/14/style/black-panther-natural-hair.html" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2018/02/14/style/black-panther-natural-hair.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1484" instrument_node="">how hair was used to create the world of Wakanda</span></a><span data-dcnode-id="1482" instrument_node="">. One of the most iconic scenes in the film is when Danai Gurira’s character Okeye throws her wig at her opponent, not only violently rejecting what was imposed on her to “blend in” but also using it as a weapon, as it momentarily blinds her opponent. Perhaps one of the best examples illustrating how otherwise very different works (speaking different languages to different audiences) are in fact connected can be found in the 2020, Netflix series Self Made. The series tells the story of one of the first female American philanthropists, Madam C.J. Walker, who made a fortune by creating hair products for black hair. Madame C.J Walker was also the subject of a portrait by Sonya Clark in 2008, made out of 3840 fine toothed pocket-combs.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><div class="wp-block-jetpack-slideshow aligncenter" data-dcnode-id="1443" data-effect="slide" data-jetpack-block-initialized="true"><div class="wp-block-jetpack-slideshow_container swiper-container swiper-container-initialized swiper-container-horizontal swiper-container-pointer-events wp-swiper-initialized" data-dcnode-id="1444" style="cursor: grab;"><ul aria-live="polite" class="wp-block-jetpack-slideshow_swiper-wrapper swiper-wrapper" data-dcnode-id="1454" id="swiper-wrapper-a4eb45c64a9b2c35" style="width: 3100px; transition-duration: 0ms; transform: translate3d(-620px, 0px, 0px);"><li aria-hidden="true" aria-label="1 / 5" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-prev" data-dcnode-id="1475" data-swiper-slide-index="2" role="group" style="width: 620px;"><figure data-dcnode-id="1476"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-4414" data-dcnode-id="1479" data-id="4414" data-recalc-dims="1" height="1440" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg%3Fresize%3D960%252C1440%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg?w=960&amp;ssl=1 960w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg?resize=533%2C800&amp;ssl=1 533w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg?resize=800%2C1200&amp;ssl=1 800w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg?resize=768%2C1152&amp;ssl=1 768w" width="960"><figcaption class="wp-block-jetpack-slideshow_caption gallery-caption" data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Poster for Self Made: Inspired by the Life of Madam C.J. Walker (2020)</span></figcaption></figure></li><li aria-hidden="false" aria-label="2 / 5" class="wp-block =1 768w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image6_C.J-Walker_Sonya-Clark-scaled.jpg?resize=1031%2C1536&amp;ssl=1 1031w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image6_C.J-Walker_Sonya-Clark-scaled.jpg?resize=1375%2C2048&amp;ssl=1 1375w" width="1718"><figcaption class="wp-block-jetpack-slideshow_caption gallery-caption" data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Credit: Sonya Clark, Madam C.J. Walker, 2008, Combs, 10 ft. 2 in. x 7 ft. 3 in. Photo: Taylor Dabney</span></figcaption></figure></li><li aria-hidden="true" aria-label="4 / 5" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate-prev" data-dcnode-id="1460" data-swiper-slide-index="2" role="group" style="width: 620px;"><figure data-dcnode-id="1461"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-4414" data-dcnode-id="1464" data-id="4414" data-recalc-dims="1" height="1440" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg%3Fresize%3D960%252C1440%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg?w=960&amp;ssl=1 960w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg?resize=533%2C800&amp;ssl=1 533w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg?resize=800%2C1200&amp;ssl=1 800w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image7_CJ-Walker_Netflix-1.jpg?resize=768%2C1152&amp;ssl=1 768w" width="960"><figcaption class="wp-block-jetpack-slideshow_caption gallery-caption" data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Poster for Self Made: Inspired by the Life of Madam C.J. Walker (2020)</span></figcaption></figure></li><li aria-hidden="true" aria-label="5 / 5" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-duplicate-active" data-dcnode-id="1455" data-swiper-slide-index="0" role="group" style="width: 620px;"><figure data-dcnode-id="1456"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-4412" data-dcnode-id="1459" data-id="4412" data-recalc-dims="1" height="573" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cream.ac.uk/wp-content/uploads/Image5_Madam_CJ_Walker_1914_wikipedia.jpg%3Fresize%3D389%252C573%26ssl%3D1&amp;raw" width="389"><figcaption class="wp-block-jetpack-slideshow_caption gallery-caption" data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Madam CJ WalkerScurlock Studio (Washington, D.C.) (photographers). – Smithsonian Institution, National Museum of American History : Archives Center. P.O. Box 37012</span></figcaption></figure></li></ul><a aria-controls="swiper-wrapper-a4eb45c64a9b2c35" aria-label="Previous slide" class="wp-block-jetpack-slideshow_button-prev swiper-button-prev swiper-button-white" data-dcnode-id="1453" role="button" tabindex="0"></a><a aria-controls="swiper-wrapper-a4eb45c64a9b2c35" aria-label="Next slide" class="wp-block-jetpack-slideshow_button-next swiper-button-next swiper-button-white" data-dcnode-id="1452" role="button" tabindex="0"></a><a aria-label="Pause Slideshow" class="wp-block-jetpack-slideshow_button-pause" data-dcnode-id="1451" role="button"></a><div class="wp-block-jetpack-slideshow_pagination swiper-pagination swiper-pagination-white swiper-pagination-clickable swiper-pagination-bullets" data-dcnode-id="1447"><button aria-label="Go to slide 1" class="swiper-pagination-bullet swiper-pagination-bullet-active" data-dcnode-id="1450" role="button" tabindex="0"></button><button aria-label="Go to slide 2" class="swiper-pagination-bullet" data-dcnode-id="1449" role="button" tabindex="0"></button><button aria-label="Go to slide 3" class="swiper-pagination-bullet" data-dcnode-id="1448" role="button" tabindex="0"></button></div><span aria-atomic="true" aria-live="assertive" class="swiper-notification" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Madam CJ WalkerScurlock Studio (Washington, D.C.) (photographers). – Smithsonian Institution, National Museum of American History : Archives Center. P.O. Box 37012</span></span></div></div><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1441" instrument_node="">Recently, a comedy horror film </span><em data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Bad Hair</span></em><span data-dcnode-id="1438" instrument_node=""> directed by Justine Simien</span><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">premiered at Sundance film festival in January 2020. The film is set in the 80s and tells a story of a woman and her weave that is (literally) evil. Bad Hair is the most recent addition to films that look at race and beauty standards imposed by the West. It is also the newest addition to the long list of films that use hair as an element of horror such as </span><em data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Exte</span></em><span data-dcnode-id="1433" instrument_node=""> (Sion Sono, 2007), </span><em data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">The Ring</span></em><span data-dcnode-id="1430" instrument_node=""> (Hideo Nakata, 1991) and </span><em data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">The Wig</span></em><span data-dcnode-id="1427" instrument_node=""> (2005, Won Shin-yun).</span></p><span data-dcnode-id="1425" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1419"><img alt="" class="wp-image-4417" data-dcnode-id="1424" data-recalc-dims="1" height="1200" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cream.ac.uk/wp-content/uploads/Image8_Bad-Hair_Poster_J_Simien_.jpg%3Fresize%3D800%252C1200%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image8_Bad-Hair_Poster_J_Simien_.jpg?resize=800%2C1200&amp;ssl=1 800w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image8_Bad-Hair_Poster_J_Simien_.jpg?resize=533%2C800&amp;ssl=1 533w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image8_Bad-Hair_Poster_J_Simien_.jpg?resize=768%2C1152&amp;ssl=1 768w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image8_Bad-Hair_Poster_J_Simien_.jpg?w=960&amp;ssl=1 960w" width="800"><figcaption data-dcnode-id="1420"><em data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Bad Hair</span></em><span data-dcnode-id="1421" instrument_node=""> (Justine Simien, 2020)</span></figcaption></figure><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1415"><a data-dcnode-id="1416" data-id="https://www.youtube.com/watch?v=oDNFCV3oLY0" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DoDNFCV3oLY0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1417" instrument_node="">Bad Hair Trailer</span></a></p><span data-dcnode-id="1414" instrument_node="">
</span><h4 class="anchor-heading" data-dcnode-id="1412" id="hair-as-discriminant"><span data-dcnode-id="1413" instrument_node="">Hair as Discriminant</span></h4><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">There are many different practices, historic and contemporary, where hair is directly used to classify, and even punish, people. Some of these are unwritten rules and expectations, and some are policies and regulations. Many of these are related to race. Whether we notice or not, hair plays a substantial role in determining one’s place in a given society. Most of the works mentioned above are, I believe, responding to how whiteness orients perceptions and expectations, how it’s gaze is central and how it positions itself as the norm.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1407" instrument_node="">Hair is as relevant as skin color when it comes to racial discrimination. </span><a data-dcnode-id="1405" data-id="https://www.nytimes.com/2014/05/01/opinion/when-black-hair-is-against-the-rules.html?_r=0)" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2014/05/01/opinion/when-black-hair-is-against-the-rules.html%3F_r%3D0%29" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1406" instrument_node="">A 2014 New York Times article</span></a><span data-dcnode-id="1404" instrument_node="">, for instance, makes a case for military regulation in the United States to be reconsidered as it did not take black service women into account when describing acceptable hair styles for military personal. US military revised its regulations on cornrows and dreadlocks in 2017, which was previously banned.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1401" instrument_node="">Similarly, in Apartheid South Africa, </span><a data-dcnode-id="1399" data-id="https://en.wikipedia.org/wiki/Pencil_test_(South_Africa)" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pencil_test_%28South_Africa%29" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1400" instrument_node="">“pencil test”</span></a><span data-dcnode-id="1398" instrument_node=""> was used to determine whether one’s hair had “afro texture” to it, aiming to separate whites from the rest. It is clear that skin color was not always considered a good enough indication of whiteness. The tendency to discriminate based on hair did not end with Apartheid in South Africa. In 2016, Pretoria High School became the focus of attention, not just in South Africa but elsewhere too, as a teacher told a black student that her </span><a data-dcnode-id="1396" data-id="https://www.theguardian.com/world/2016/aug/31/south-african-students-speak-out-ban-afro-hair-pretoria-school" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2016/aug/31/south-african-students-speak-out-ban-afro-hair-pretoria-school" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1397" instrument_node="">“afro was distracting other students”</span></a><span data-dcnode-id="1395" instrument_node="">.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1392" instrument_node="">It seems black hair is often found “distracting” in various settings, not just in schools. One of the most prominent cases regarding policing black hair took place in 1999 when </span><a data-dcnode-id="1390" data-id="https://www.essentiallysports.com/i-shouldnt-have-to-change-i-like-my-hair-when-venus-williams-argued-with-the-chair-umpire-wta-tennis-news/" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.essentiallysports.com/i-shouldnt-have-to-change-i-like-my-hair-when-venus-williams-argued-with-the-chair-umpire-wta-tennis-news/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1391" instrument_node="">Venus Williams was facing Linda Davenport in Quarter Finals of the Australian Open</span></a><span data-dcnode-id="1389" instrument_node="">. As beads from her hair flew to the court during the match, umpire penalised Williams for causing distraction. It is harder to imagine a situation where hair clip breaking free from a white player’s hair causing such penalty. Davenport later commented on the issue saying that it was not a total distraction “but it is a little annoying. It’s a little dangerous for her. I mean, she could maybe step on them”, making it about Williams’s safety, i.e. policing her hair for her own good.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Examples are endless, not all involving household names. In 2018, a young black wrestler in New Jersey was told to cut his dreads by the referee just before the game or “forfeit the competitions”.</span></p><span data-dcnode-id="1384" instrument_node="">

</span><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="844"><img alt="" data-dcnode-id="850" data-recalc-dims="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/ichef.bbci.co.uk/news/800/cpsprodpb/11E1A/production/_103424237_ruby5.jpg%3Fssl%3D1&amp;raw"><figcaption data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">Ruby Williams </span><br data-dcnode-id="848"><a data-dcnode-id="846" data-id="https://www.bbc.co.uk/news/newsbeat-45521094" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/newsbeat-45521094" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="847" instrument_node="">BBC News Article</span></a></figcaption></figure><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">In 2017, a 12 year old pupil in the UK was sent home because his dreadlocks –worn tied up- was against the school uniform policy. In 2016, 14 year old Ruby Williams was also sent home repeatedly, using the same reason.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">These are only a few recent examples, but the justification behind these decisions go back to an understanding that was created and shaped hundreds of years ago. For example, slaveholders in British and mainland colonies seemed to have allowed slaves “to style their hair as they please” although shaving the head was also used a as punishment (White and White, 49). Blacks were “not supposed to be proud of their hair” and any suggestion that they were would have sharply challenged complacent white cultural assumption” (White and White, 58). Black hair was seen as dirty, unkempt, woolly, a discourse that is part of an effort to maintain the assumed superiority of the white hair and therefore white race.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Probably one of the most important attempts to give legitimacy to structural racism, and to justify structural injustices it imposes and normalises, was eugenics and the scientists engaged in formulating the ideas behind it. In 1907, one such “scientist” engaged in coming up with scientific explanations for white superiority was the German scientist Eugen Fischer. Fischer designed a device to determine racial purity based on hair. </span></p><span data-dcnode-id="834" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="829"><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ucl.ac.uk/culture/ucl-science-collections/eugen-fischers-hair-colour-gauge" rel="noopener noreferrer" target="_blank"><img alt="" data-dcnode-id="833" data-recalc-dims="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.ucl.ac.uk/culture/sites/culture/files/styles/xl_image/public/galt_040_03.jpg%3Fssl%3D1&amp;raw"></a><figcaption data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Haarfarbentafel</span></figcaption></figure><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">The device Haarfarbentafel</span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cream.ac.uk/wp-admin/post.php%3Fpost%3D4016%26action%3Dedit%23_ftn4"><span data-dcnode-id="826" instrument_node="">[4]</span></a><span data-dcnode-id="824" instrument_node=""> “was used not only to pin down racial differences but also to gauge levels of racial purity and impurity. Fischer took it with him to German South-West Africa (now Nambia), where he studied patterns of hereditary amongst people of mixed race. According to Fischer, Caucasians being the higher race, it is a degenerative act ‘for the highest races to mix with the lowest […], a pollutant that threatened the health of higher race.’ Once back in Germany he went on to establish the Society for Racial Hygiene in Freiburg and played a major role in promoting the sterilisation of mixed race children of African and German heritage in the Rhineland” (Tarlo, 167). The device was used in Nazi Germany to determine Jewish ancestry, in effect, writes Tarlo, becoming “one of a number of scientific instruments of death” (168).</span></p><span data-dcnode-id="822" instrument_node="">

</span><p data-dcnode-id="280"><span data-dcnode-id="290" instrument_node="">How hair looks and the assumed common sense about what is tidy and presentable goes directly back to colonial ideas, to the attempts of fetishising and dehumanising those that were perceived as “exotic”. This did not end with slavery. Early 20th century visual culture in Europe was dominated by “freak shows” and “human zoos” that exhibited people from different parts of the world who looked “strange” to white Europeans. Their hair, eyes, buttocks, was perceived to provide fascinations for the Europeans, who bought tickets for these shows, to see mostly kidnaped people. The disappearance of “human zoos” coincides with cinema becoming a popular form of entertainment and neither the perception nor fetishising ended with freak shows. Oversexualised, dehuminanised display of Native Alaskans, East Asians and Africans never really left our visual culture. One of the first documentaries Nanook of the North (Robert Flaherty, 1922) is often read as a continuation of the early 20th Century spectacle human zoos.</span><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/0N-igoO6m2g%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-GB%26autohide%3D2%26wmode%3Dtransparent%23_ftn5" name="_ftnref5"><span data-dcnode-id="289" instrument_node="">[5]</span></a><span data-dcnode-id="287" instrument_node=""> It is therefore not surprising that during a </span><a data-dcnode-id="285" data-id="https://www.ted.com/talks/mena_fombo_no_you_cannot_touch_my_hair?language=en" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ted.com/talks/mena_fombo_no_you_cannot_touch_my_hair%3Flanguage%3Den" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="286" instrument_node="">TED talk</span></a><span data-dcnode-id="284" instrument_node=""> Mena Fombo mentions how often strangers ask if they can touch her hair, and poses the question “how different this is from those who paid to go see </span><a data-dcnode-id="282" data-id="https://en.wikipedia.org/wiki/Sarah_Baartman" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarah_Baartman" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="283" instrument_node="">Sarah Bartman</span></a><span data-dcnode-id="281" instrument_node="">?”</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Such visual discourse that is interested in creating stereotypes, exotic, primitive images of the other, has a long tradition in photography too. Tamar Garb writes that “The camera was introduced to Africa soon after it was invented [and] a demand for typological images of ‘natives’ emerged in Europe, producing a lexicon of ‘exotic’ and ‘primitive’ prototypes and pseudoscientific ‘specimens’ […] Hierarchical notions of race joined modern technological inventions” (14). Garb writes this for a book produced in relation to an exhibition on South African photographers, and links the style of one of the most interesting contemporary photographers, Zanele Muholi, to colonial photographic practices. According to Garb, Muholi “manipulates traditional cultural signifiers to unleash them from the circuits of meaning in which they habitually reside” (60).</span></p><span data-dcnode-id="276" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="267"><img alt="" class="wp-image-4422" data-dcnode-id="275" data-recalc-dims="1" height="1200" loading="lazy" sizes="(max-width: 887px) 100vw, 887px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cream.ac.uk/wp-content/uploads/Image12_Muholi_venice_2019.jpg%3Fresize%3D887%252C1200%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image12_Muholi_venice_2019.jpg?resize=887%2C1200&amp;ssl=1 887w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image12_Muholi_venice_2019.jpg?resize=591%2C800&amp;ssl=1 591w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image12_Muholi_venice_2019.jpg?resize=768%2C1039&amp;ssl=1 768w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image12_Muholi_venice_2019.jpg?resize=1135%2C1536&amp;ssl=1 1135w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image12_Muholi_venice_2019.jpg?resize=1514%2C2048&amp;ssl=1 1514w, https://i0.wp.com/cream.ac.uk/wp-content/uploads/Image12_Muholi_venice_2019.jpg?w=1861&amp;ssl=1 1861w" width="887"><figcaption data-dcnode-id="268"><span data-dcnode-id="274" instrument_node="">Zanele Muholi, </span><em data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Faniswa</span></em><span data-dcnode-id="271" instrument_node="">, Sea Point, Cape Town, 2016 </span><br data-dcnode-id="270"><span data-dcnode-id="269" instrument_node="">Photo Credit: Ozlem Koksal, Venice Bianele, 2019</span></figcaption></figure><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">As these examples illustrate, it is hardly surprising that issues related to hair are explored, either directly by utilising hair in the works themselves or by other means, in art and culture. Because it signifies and connotes so many different things (some interrelated some not), its use in art is similarly diverse, not always signifying the same thing or pointing at the same problem. However, they all point to its socialising aspect that goes beyond style or beauty, and often end up raising issues related to questions of power.</span></p><span data-dcnode-id="263" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="262"><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="257"><a data-dcnode-id="259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/0N-igoO6m2g%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-GB%26autohide%3D2%26wmode%3Dtransparent%23_ftnref1" name="_ftn1"><span data-dcnode-id="260" instrument_node="">[1]</span></a><span data-dcnode-id="258" instrument_node=""> Lorde, Audre. “Is Your Hair Still Political” in I am Your Sister ed. Rudolph P. Byrd et al. Oxford: Oxford University Press, 2009</span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="252"><a data-dcnode-id="254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/0N-igoO6m2g%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-GB%26autohide%3D2%26wmode%3Dtransparent%23_ftnref2" name="_ftn2"><span data-dcnode-id="255" instrument_node="">[2]</span></a><span data-dcnode-id="253" instrument_node=""> Turkey has changed its regulation on this matter within the last decade or so.</span></p><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="247"><a data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/0N-igoO6m2g%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-GB%26autohide%3D2%26wmode%3Dtransparent%23_ftnref3" name="_ftn3"><span data-dcnode-id="250" instrument_node="">[3]</span></a><span data-dcnode-id="248" instrument_node=""> Mutua M, Eddah. “Hair Is Not Just Hot Air: Narratives about Politics of Hair in Kenya” in Text and Performance Quarterly, 34:4 (392-394), 2014</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="242"><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/0N-igoO6m2g%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-GB%26autohide%3D2%26wmode%3Dtransparent%23_ftnref4" name="_ftn4"><span data-dcnode-id="245" instrument_node="">[4]</span></a><span data-dcnode-id="243" instrument_node=""> This, according to Tarlo, was often used together with two other devices, Augenfarbentafel (eye gauge) and Hautfarbentafel (skin gauge) (p 166).</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="235"><a data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/0N-igoO6m2g%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-GB%26autohide%3D2%26wmode%3Dtransparent%23_ftnref5" name="_ftn5"><span data-dcnode-id="240" instrument_node="">[5]</span></a><span data-dcnode-id="238" instrument_node=""> For an article on this topic see Fatimah Tobing Rony’s “Taxidermy and Romantic Ethnography” in </span><em data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">The Thud Eye: Race, Cinema and Ethnographic Spectacle</span></em></p><span data-dcnode-id="234" instrument_node="">
