</span><em data-dcnode-id="1615"><span data-dcnode-id="1619" instrument_node="">Welcome to </span><strong data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Crowned,</span></strong><span data-dcnode-id="1616" instrument_node=""> our new series all about the history of Black hair. Hosted by senior social media editor Star Donaldson, Crowned explores the history and traditions that have shaped the Black experience and the hairstyles born out of them. In our debut episode, we deep-dive into cornrows, a traditional Black hairstyle with rich cultural significance. Join us in learning more.</span></em><span data-dcnode-id="1614" instrument_node="">
</span></p><span data-dcnode-id="1612" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1611" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1610" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1605" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1609" instrument_node="">
It's easy to feel like the beauty world is a constant revolving door. Fads and formulas come—stay for a while—and quickly disappear as the next one takes the stage. Still, few styles transcend what's trending and have rich cultural meaning. Cornrows are one of them. The style is prevalent in today's world but has roots dating back to ancient Africa. While the look is a common choice among many, there's a lot of&nbsp;</span><a data-component="link" data-dcnode-id="1607" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/history-of-braids"><span data-dcnode-id="1608" instrument_node="">rich history</span></a><span data-dcnode-id="1606" instrument_node="">&nbsp;that goes unnoticed.
</span></p><span data-dcnode-id="1604" instrument_node="">

"The first thing to know about cornrows is they were made specifically for curly, coily, and tight-textured hair," Donaldson says, emphasizing those textures are usually delicate hair types. "A braided style, like cornrows, helps protect [hair] from moisture loss and breakage." It's why cornrows, and many other braided looks, are classified as </span><a data-component="link" data-dcnode-id="1108" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/protective-styles-to-try-for-black-hair-400300"><span data-dcnode-id="1109" instrument_node="">"protective" styles.</span></a><span data-dcnode-id="1107" instrument_node="">
</span></p><span data-dcnode-id="1105" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1104" id="mntl-sc-block_1-0-7"></div><span data-dcnode-id="1103" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1095" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1102" instrument_node="">
</span><a data-component="link" data-dcnode-id="1100" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathmunch.org/tag/braids/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1101" instrument_node="">The braiding technique is technology-first at its core</span></a><span data-dcnode-id="1099" instrument_node="">, focusing on braiding various patterns (from straight to zig-zag) against your scalp. Alone, cornrows are a sleek, low-maintenance style that can last for weeks. However, they also act as a flawless base for other styles like </span><a data-component="link" data-dcnode-id="1097" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/sew-in-hairstyles-5190097"><span data-dcnode-id="1098" instrument_node="">sew-in extensions and wigs</span></a><span data-dcnode-id="1096" instrument_node="">. The possibilities for cornrow looks are endless, but that doesn't mean it's exempt from criticism, discrimination, and misrepresentation.&nbsp;
</span></p><span data-dcnode-id="1094" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1093" id="mntl-sc-block_1-0-9"></div><span data-dcnode-id="1092" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1087" id="mntl-sc-block_1-0-10"><span data-dcnode-id="1091" instrument_node="">
"Braids [cornrows] are often appropriated by non-Black people," Donaldson explains. "Braids are often seen as a trend instead of a style that was created specifically for these textures." While braids of other kinds have historically been used in different cultures, cornrows were explicitly designed for afro-textured hair. </span><a data-component="link" data-dcnode-id="1089" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blackdoctor.org/history-of-african-hair-braiding/" rel="noopener" target="_blank"><span data-dcnode-id="1090" instrument_node="">Cornrows dated far back to 3000 B.C.</span></a><span data-dcnode-id="1088" instrument_node="">, particularly in the Horn and West coasts of Africa.
</span></p><span data-dcnode-id="1086" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1078" id="mntl-sc-block_1-0-11"><div class="comp mntl-block" data-dcnode-id="1079" id="mntl-block_2-0"><span data-dcnode-id="1085" instrument_node="">

</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1073" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1076" instrument_node="">
In the early 1500s, the style was used as a communication medium amongst various African societies that were later forced to migrate to the Americas as slaves, where their customs followed. "In Africa, braids were a way to show people who you were," Donaldson says. "They signified your tribe, your marital status, your wealth, religion, and more." Blacks were further dehumanized during enslavement by having their hair cut off, which alienated them from their relatives, homes, and—ultimately—their identities.&nbsp;</span><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1075"></span><span data-dcnode-id="1074" instrument_node="">
</span></p><span data-dcnode-id="1072" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1037" id="toc-the-appropriation"></span><span data-dcnode-id="1036" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1031" id="mntl-sc-block_1-0-15"><span data-dcnode-id="1035" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node=""> The Appropriation </span></span><span data-dcnode-id="1032" instrument_node=""> </span></h2><span data-dcnode-id="1030" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1028" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1029" instrument_node="">
Renaming, profiting, and co-opting the cultural significance and history of cornrows—and other historically Black styles—actively participates in the erasure and disregard of the Black experience. Take non-Black celebrities like Bo Derek, Kim Kardashian, and Katy Perry, for example, who have appropriated the style, even calling them "boxer braids."
</span></p><span data-dcnode-id="1027" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1026" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="1025" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1021" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1024" instrument_node="">
It poses an even bigger issue when, in more recent times, Black people are still discriminated against based on their hair texture and choices, including cornrows. In 1980, Renee Rogers sued American Airlines when the company demanded she not wear cornrows to work. In 2000, a Wisconsin teacher forcibly cut off seven-year-old Lamya Cammon's plaits before her grade-school class. These instances don't include the countless cases of discrimination that go unreported or unspoken. "That's why it's so important that when you see cornrows today, it's so important to recognize that Black people are discriminated against and even face job loss for wearing cornrows," Donaldson stresses. </span><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1023"></span><span data-dcnode-id="1022" instrument_node="">"Non-Black people just don't."
</span></p><span data-dcnode-id="1020" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1019" id="mntl-sc-block_1-0-19"></div><span data-dcnode-id="1018" instrument_node="">
</span><div class="comp theme-pullquote mntl-sc-block beauty-sc-block-callout--pullquote beauty-sc-block-callout mntl-sc-block-callout mntl-block" data-dcnode-id="1008" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1017" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1010" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">Black hair </span><em data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">is </span></em><span data-dcnode-id="1012" instrument_node="">Black history.</span></p></div><span data-dcnode-id="1009" instrument_node="">
</span></div><span data-dcnode-id="1007" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="997" id="mntl-sc-block_1-0-21"><span data-dcnode-id="1006" instrument_node="">
</span><a data-component="link" data-dcnode-id="1004" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.southcoasttoday.com/article/19990127/News/301279933" rel="noopener" target="_blank"><span data-dcnode-id="1005" instrument_node="">In 1999 Venus Williams wore cornrows with beaded ends, which were declared disruptive at the Australian Open</span></a><span data-dcnode-id="1003" instrument_node="">. Only two years ago in 2019, Gabrielle Union filed a discrimination complaint against her employer,&nbsp;</span><a data-component="link" data-dcnode-id="999" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etonline.com/americas-got-talent-everything-to-know-about-the-recent-drama-surrounding-gabrielle-unions-ousting" rel="noopener" target="_blank"><em data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">America's Got Talent,&nbsp;</span></em><span data-dcnode-id="1000" instrument_node="">after receiving racially insensitive comments in regards to her hair, including that her styles were "too Black.</span></a><span data-dcnode-id="998" instrument_node="">" It paints a clear picture of the disparities between Black traits and styles and the people who are policed versus those glorified.
</span></p><span data-dcnode-id="996" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="995" id="mntl-sc-block_1-0-22"></div><span data-dcnode-id="994" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="993" id="toc-the-future"></span><span data-dcnode-id="992" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="987" id="mntl-sc-block_1-0-23"><span data-dcnode-id="991" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node=""> The Future </span></span><span data-dcnode-id="988" instrument_node=""> </span></h2><span data-dcnode-id="986" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="981" id="mntl-sc-block_1-0-24"><span data-dcnode-id="985" instrument_node="">
Nonetheless, it doesn't erase the beauty of cornrows. Entertainers like Alicia Keys, Tracee Ellis Ross, Laverne Cox, Beyoncé, and more, rock cornrows on and off the red carpet—further showcasing its versatility. Stylists and influencers continue to innovate and share their work with the world on social media, serving as inspiration for </span><em data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">millions </span></em><span data-dcnode-id="982" instrument_node="">on Instagram, Pinterest, and YouTube. Products both mass and indie are evolving to continually cater to the unique needs of Black hair textures—including braids.
</span></p><span data-dcnode-id="980" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="979" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="978" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="970" id="mntl-sc-block_1-0-26"><span data-dcnode-id="977" instrument_node="">
Legislation, </span><a data-component="link" data-dcnode-id="975" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/the-crown-act-guide-5111864"><span data-dcnode-id="976" instrument_node="">like The CROWN Ac</span></a><span data-dcnode-id="974" instrument_node="">t, is being implemented across the United States to ensure that Black people cannot be discriminated against based on their natural hair texture and style—including cornrows. As the pages in the history books continue to turn, so will the beautiful story of cornrows. "Braiding is a symbol of perseverance and tradition," Donaldson says. "Most importantly it reminds us that Black hair </span><em data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">is </span></em><span data-dcnode-id="971" instrument_node="">Black history." And it should be treated and celebrated as such.
</span></p><span data-dcnode-id="969" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="968" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="967" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="962" id="mntl-sc-block_1-0-28"><span data-dcnode-id="966" instrument_node="">
</span><em data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Ahead, find some of our favorite products for caring for cornrows at home.</span></em><span data-dcnode-id="963" instrument_node="">
</span></p><span data-dcnode-id="961" instrument_node="">
