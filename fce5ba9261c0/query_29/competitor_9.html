</span><h1 data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Color Table</span></h1><span data-dcnode-id="1078" instrument_node=""> </span><h2 data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Color your perception.</span></h2><span data-dcnode-id="1075" instrument_node=""> </span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="1069"><div class="field-items" data-dcnode-id="1070"><div class="field-item even" data-dcnode-id="1071" property="content:encoded"><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">
	A brightly colored picture takes on a whole new look when you view it through a colored filter, which transmits some colors and absorbs others. Using a colored filter, you can even decode secret messages written with colored pens or crayons.
</span></p><span data-dcnode-id="1072" instrument_node="">

</span><li data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">
		Several different colors of transparent plastic to use as colored filters, such as colored acetate report covers, colored acrylic plastic from a plastics store, or anything along those lines
	</span></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">
		Assorted colored pictures from magazines, old wall calendars, or other sources
	</span></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">
		Crayons, colored pencils, or colored pens
	</span></li><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">
		White paper
	</span></li><span data-dcnode-id="944" instrument_node="">
</span></ul><span data-dcnode-id="942" instrument_node="">
</span></div></div></div><hr data-dcnode-id="938"><div class="activity-section" data-dcnode-id="929"><div class="grid-100 grid-parent" data-dcnode-id="935"><h3 data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Assembly</span></h3></div><div class="grid-100 grid-parent" data-dcnode-id="930"><div class="grid-75 grid-parent" data-dcnode-id="931"><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">
	None needed.
</span></p><span data-dcnode-id="932" instrument_node="">
</span></div></div></div><hr data-dcnode-id="928"><div class="activity-section" data-dcnode-id="913"><div class="grid-100 grid-parent" data-dcnode-id="925"><h3 data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">To Do and Notice</span></h3></div><div class="grid-100 grid-parent" data-dcnode-id="914"><div class="grid-75 grid-parent" data-dcnode-id="915"><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">
</span><span data-dcnode-id="922" style="line-height: 1.6;"><span data-dcnode-id="923" instrument_node="">Place one colored filter at a time over a colored picture and notice how the colors are affected. With a red filter, the picture appears entirely in shades of red plus black.</span></span><span data-dcnode-id="921" instrument_node="">
</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">
	Print your name or a short message on a piece of white paper using a different color of crayon, pencil, or pen for each letter. Then look at the message through a red filter. You may notice that the red letters disappear, but you can still see blue or green letters. By figuring out which colors you still see and which you don’t, you can write a secret message and then use the filter as the decoder.
</span></p><span data-dcnode-id="916" instrument_node="">
</span></div></div></div><hr data-dcnode-id="912"><div class="activity-section" data-dcnode-id="864"><div class="grid-100 grid-parent" data-dcnode-id="909"><h3 data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">What’s Going On?</span></h3></div><div class="grid-100 grid-parent" data-dcnode-id="865"><div class="grid-75 grid-parent" data-dcnode-id="866"><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">
	An ideal red filter transmits only red light and absorbs all other colors. In this ideal case, a picture containing red, green, and blue would appear red and black when viewed through a red filter.
</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="905" instrument_node="">
</span><span data-dcnode-id="903" style="line-height: 1.6;"><span data-dcnode-id="904" instrument_node="">A red filter blocks green light and blue light: Only red light can get through to your eyes. The white banana and the yellow peel both reflect some red light, so the whole banana looks red (see below; click to enlarge):</span></span><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">
</span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploratorium.edu/sites/default/files/f0310.gif"><img alt="" data-dcnode-id="900" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploratorium.edu/sites/default/files/f0310.gif&amp;raw" style="width: 200px;"></a><br data-dcnode-id="898"><span data-dcnode-id="897" instrument_node="">
	&nbsp;
</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="894" instrument_node="">
</span><span data-dcnode-id="892" style="line-height: 1.6;"><span data-dcnode-id="893" instrument_node="">A yellow filter blocks blue light, so only red light and green light can get to your eyes. The white banana and the yellow peel both reflect some green light and some red light. The whole banana looks yellow because green light plus red light mix to make yellow light (see below; click to enlarge):</span></span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
</span><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploratorium.edu/sites/default/files/f0311.gif"><img alt="" data-dcnode-id="889" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploratorium.edu/sites/default/files/f0311.gif&amp;raw" style="width: 200px;"></a><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
	&nbsp;
</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="883" instrument_node="">
</span><span data-dcnode-id="881" style="line-height: 1.6;"><span data-dcnode-id="882" instrument_node="">Here, a magenta filter blocks green light and a cyan filter blocks red light (see below; click to enlarge). Only blue light can pass through to your eyes. The banana looks blue because the white fruit reflects some blue light. But the yellow peel looks black.&nbsp;It reflects no blue light.</span></span><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">
</span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploratorium.edu/sites/default/files/f0312.gif"><img alt="" data-dcnode-id="878" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploratorium.edu/sites/default/files/f0312.gif&amp;raw" style="width: 200px;"></a><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">
	&nbsp;
</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">
	Likewise, a pure blue filter transmits only blue light, and a pure green filter transmits only green light. Any color from a picture that is not transmitted by the filter will be absorbed by the filter and will not be seen.
</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">
	When you view multicolored writing through an ideal red filter, only red light reaches your eyes. Red light comes from both the red letters and the white paper (since white contains all colors). The red letters tend to disappear because they blend right in with the red light from the white paper. Letters that contain no red would appear black. Because most pigments are not perfectly pure, you may notice that more than just the red letters blend in with the background. That is, if a yellow letter reflects red (since yellow light can be made from a combination of red light and green light), the yellow letter would blend in with the background.
</span></p><span data-dcnode-id="867" instrument_node="">
</span></div></div></div><hr data-dcnode-id="863"><div class="activity-section" data-dcnode-id="851"><div class="grid-100 grid-parent" data-dcnode-id="860"><h3 data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Going Further</span></h3></div><div class="grid-100 grid-parent" data-dcnode-id="852"><div class="grid-75 grid-parent" data-dcnode-id="853"><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">
	Magazine illustrations are colored with pigments, but when you look at the illustration, you are sensing the light that is being reflected to your eyes.
</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">
	Most colors of light can be made by mixing three primary colors of light: red light, blue light, and green light. Most colors of pigments, however, can be made by mixing magenta, cyan, and yellow pigments. Magenta pigment reflects red and blue light. More important, it absorbs, or subtracts, green light. Cyan pigment subtracts red light. Yellow pigment subtracts blue light. Four-color printing in magazines is done with inks of these three colors—magenta, cyan, and yellow—plus black. Mixed properly, these pigments produce the entire range of colors found in colored pictures in magazines.
</span></p><span data-dcnode-id="854" instrument_node="">
</span></div></div></div><span data-dcnode-id="850" instrument_node="">
</span><span data-dcnode-id="848" instrument_node="">
