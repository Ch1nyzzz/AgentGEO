</span><section class="elementor-section elementor-top-section elementor-element elementor-element-f24f0d0 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="1143" data-element_type="section" data-id="f24f0d0"><span data-dcnode-id="1449" instrument_node="">
</span><div class="elementor-container elementor-column-gap-default" data-dcnode-id="1145"><span data-dcnode-id="1448" instrument_node="">
</span><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-f4029bb" data-dcnode-id="1147" data-element_type="column" data-id="f4029bb"><span data-dcnode-id="1447" instrument_node="">
</span><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="1149"><span data-dcnode-id="1446" instrument_node="">
</span><div class="elementor-element elementor-element-083882b elementor-widget elementor-widget-text-editor" data-dcnode-id="1162" data-element_type="widget" data-id="083882b" data-widget_type="text-editor.default"><span data-dcnode-id="1445" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1164"><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">The world is beautiful and full of color. However, the way we see these colors can vary significantly depending on the person and depending on diverse and very influential factors.</span></p><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Have you ever wondered when did you start to see colors? Or if everybody sees colors the same way as you do?</span></p><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Probably you have.</span></p><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">This article is all about colors and it’s just written to answer (almost) all the questions you may have by covering the following topics:</span></p><ul data-dcnode-id="1423"><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">when we started seeing colors</span></li><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">why blue is most people’s favorite color</span></li><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">mental associations with colors</span></li><li data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">factors influencing the way we perceive colors</span></li><li data-dcnode-id="1424"><span data-dcnode-id="1427" instrument_node="">optical illusions</span><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">little-known facts about color</span></li></ul><h2 data-dcnode-id="1421"><img alt="" class="alignnone size-full wp-image-21540" data-dcnode-id="1422" height="1752" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085525-scaled.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085525-scaled.jpg 2560w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085525-300x205.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085525-1024x701.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085525-768x526.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085525-1536x1051.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085525-2048x1402.jpg 2048w" width="2560"></h2><h2 data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node=""># Let’s start from the beginning</span></h2><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">It all starts when we are born, when we can only see black, white and gray which will later become red.</span></p><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Why red?</span></p><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Probably because it has a longer wavelength compared to other colors, which makes it an easier tone to process by the receptors and developing nerves of a baby’s eyes.</span></p><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Our vision develops until, at 5 months or so, all colors begin to be seen. This is when us, as humans, begin to connect colors with different perceptions, sensations and meanings.</span></p><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Colors are one of the first things we are taught when we are kids.</span></p><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Our parents show us the sea and tell us: this is blue. And from then on, we are 100% sure of the color blue. And it also becomes the very first favorite color for most of us.</span></p><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Why though?</span></p><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Color blue being almost the whole world’s favorite color is not a coincidence.</span></p><p data-dcnode-id="1401"><img alt="" class="alignnone size-full wp-image-21620" data-dcnode-id="1402" height="1708" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-074421-scaled.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-074421-scaled.jpg 2560w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-074421-300x200.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-074421-1024x683.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-074421-768x512.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-074421-1536x1025.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-074421-2048x1366.jpg 2048w" width="2560"></p><p data-dcnode-id="1396"><span data-dcnode-id="1400" instrument_node="">The answer is </span><i data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">not</span></i><span data-dcnode-id="1397" instrument_node=""> in our DNA. The reason why is behind our perception about that specific color. The preference of a color over another can be determined by how much we like the things around us associated with that color.</span></p><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">What does that mean?</span></p><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">The fact that you like, for instance, the color orange, depends on how you feel about things associated with that color for example carrots, traffic cones or oranges.</span></p><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">If you look at the color blue, and think of all the objects of that color, you will realize that almost all of them are positive things.</span></p><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Imagine negative blue things. Anything comes to your mind?</span></p><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Our mental association with blue is normally the sea. Or think about a beautiful day, how does it look like? Probably clear and blue.</span></p><h2 data-dcnode-id="1384"><img alt="" class="alignnone size-full wp-image-21621" data-dcnode-id="1385" height="1920" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-131443-scaled.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-131443-scaled.jpg 2560w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-131443-300x225.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-131443-1024x768.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-131443-768x576.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-131443-1536x1152.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-131443-2048x1536.jpg 2048w" width="2560"></h2><h2 data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node=""># Light, shadows and positions</span></h2><p data-dcnode-id="1378"><span data-dcnode-id="1381" instrument_node="">However, how we see colors is not that simple or objective. Our brain is responsible for deciding what color we are seeing based mainly on one factor: </span><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">the light that comes through our eyes.</span></strong></p><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">White light is composed of radiation of all colors. When an object receives light, it absorbs some wavelengths and reflects others. The ones it reflects are the ones we see as color. A green object absorbs all wavelengths except those of the green spectrum. A white object reflects almost all and a black absorbs almost all.</span></p><p data-dcnode-id="1369"><strong data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Fun fact:</span></strong><span data-dcnode-id="1373" instrument_node=""> Did you know that </span><i data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">photo = light</span></i><span data-dcnode-id="1370" instrument_node=""> in Greek? From this word, the words photography or photosynthesis appeared.</span></p><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Not only the light, but the shadow and positioning of the object we are looking at can change what we believe we are seeing.</span></p><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Apart from these two variables, there are others that can also affect the way we see colors.</span></p><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Let me show you a few examples.</span></p><h2 data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node=""># As seasons change, our color perception changes</span></h2><p data-dcnode-id="1357"><span data-dcnode-id="1360" instrument_node="">The shifting seasons not only alter the way we are feeling, but they also change the way we see the world, like </span><i data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">literally.</span></i></p><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Scientists and researchers have also shown that our perception of reality changes color throughout the year, since our brain tries to match the levels of colors that are presented.</span></p><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Our vision adapts perfectly to the way in which we distinguish colors, especially yellow. In summer, yellow looks more greenish while in winter it looks more reddish or grayish.</span></p><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">The explanation?</span></p><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">It’s believed that the shift in the way yellow is perceived, could be the increase in greenery and vegetation in summer.</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">When the trees are full, our eyes adapt. With more green around us, our brain has to recalibrate its understanding of yellow.</span></p><h2 data-dcnode-id="1345"><img alt="" class="alignnone size-full wp-image-21626" data-dcnode-id="1346" height="1600" loading="lazy" sizes="(max-width: 2406px) 100vw, 2406px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-075041.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-075041.jpg 2406w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-075041-300x200.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-075041-1024x681.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-075041-768x511.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-075041-1536x1021.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-075041-2048x1362.jpg 2048w" width="2406"></h2><h2 data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node=""># Colors and emotions are connected</span></h2><p data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node="">You have heard so many times the sentence </span><i data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">‘’I am feeling blue’’</span></i><span data-dcnode-id="1339" instrument_node="">, right?</span></p><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">That’s because there are some associations between emotions and colors.</span></p><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">It is demonstrated that sadness and emotions can influence several visual processes that are involved in perceiving color.</span></p><p data-dcnode-id="1329"><span data-dcnode-id="1333" instrument_node="">Researchers from the </span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologicalscience.org/" rel="noopener" target="_blank"><span data-dcnode-id="1332" instrument_node="">Psychological Science</span></a><span data-dcnode-id="1330" instrument_node=""> carried out an experiment and realized that if two groups of participants – one who watches an emotional film clip and another who watches an amusing clip – observe the same color, they will see it differently.</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">The participants who watched the emotional clip were less accurate in identifying colors than the participants who watched the amusing clip.</span></p><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">What? Why?</span></p><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">The perception of the colors of the blue-yellow axis is related to dopamine – and psychologists believe that the dopamine in our brains influences the way we distinguish colors.</span></p><p data-dcnode-id="1321"><img alt="" class="alignnone size-full wp-image-21635" data-dcnode-id="1322" height="1600" loading="lazy" sizes="(max-width: 2400px) 100vw, 2400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084519.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084519.jpg 2400w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084519-300x200.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084519-1024x683.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084519-768x512.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084519-1536x1024.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084519-2048x1365.jpg 2048w" width="2400"></p><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Dopamine is a key element for motivation and its deficiency is associated with depression, apathy and lack of motivation.</span></p><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">One of the psychologists involved in the experiment, Thorstenson, said: “Our results show that humor and emotion can affect how we see the world around us”.</span></p><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">So instead of seeing the world as it is, our perception is being highly influenced by our emotions.</span></p><h2 data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node=""># Colors across cultures</span></h2><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">The perception about colors not only varies among individuals but also among cultures. Although, of course, there are some colors whose perception is universal.</span></p><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">The white color is associated almost everywhere in the same way – in doctors and dentists, white gives us all the same sense of security.</span></p><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">However, let’s think about the color red. In China and other Asian countries, red is associated with fortune and money. Worldwide, as you may know, red is the color of passion or love.</span></p><p data-dcnode-id="1305"><img alt="" class="alignnone size-full wp-image-21636" data-dcnode-id="1306" height="1709" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-103612-scaled.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-103612-scaled.jpg 2560w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-103612-300x200.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-103612-1024x683.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-103612-768x513.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-103612-1536x1025.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191114-103612-2048x1367.jpg 2048w" width="2560"></p><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Yellow, in Western cultures, is associated with optimism, happiness, warmth, joy, hope. Or on the contrary, caution and cowardice. In European countries as&nbsp; Germany, yellow represents envy, but in Egypt, yellow is the color of happiness and wealth.</span></p><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">For the Western world, orange is the color of autumn and warmth as well as curiosity and creativity. However, in Hinduism a light orange is considered sacred. In the Netherlands, orange is the color of the Royal family while in Colombia it represents sexuality and fertility.</span></p><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">In Eastern cultures, orange is the color of humility, love, happiness and good health.</span></p><h2 data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node=""># Optical illusions</span></h2><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Several images displayed on the Internet as a visual experiment have quickly become viral.</span></p><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Take a look at this one:</span></p><p data-dcnode-id="1291"><img alt="" class="alignnone size-full wp-image-21637" data-dcnode-id="1292" height="1236" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/colors.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/colors.jpg 1920w, https://jumpstory.com/wp-content/uploads/2019/11/colors-300x193.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/colors-1024x659.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/colors-768x494.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/colors-1536x989.jpg 1536w" width="1920"></p><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">What do you see?</span></p><p data-dcnode-id="1281"><span data-dcnode-id="1288" instrument_node="">Exactly. Our brain can see color in a photo that is actually </span><strong data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">black and white</span></strong><span data-dcnode-id="1285" instrument_node="">. This is known as </span><i data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">‘color assimilation grid illusion’</span></i><span data-dcnode-id="1282" instrument_node="">, created by the software developer and digital artist Oyvind Kola.</span></p><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">The illusion of color is created by adding colored grids in the image. It also works using other alternatives such as points and lines.</span></p><p data-dcnode-id="1275"><span data-dcnode-id="1278" instrument_node="">An interesting fact is that this illusion not only works with static images, but also with moving images or </span><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D7jJ10OZH2SU%26feature%3Demb_title" rel="noopener" target="_blank"><span data-dcnode-id="1277" instrument_node="">videos.</span></a></p><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">If we don’t take time to examine things closely, our brain, which is responsible for compressing visual information, will give us a general impression of the image instead of one detailed and accurate.</span></p><h2 data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node=""># Color blindness</span></h2><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Most of us see the world fully colored. However, there are some people with color vision defects, who see colors differently from the rest.</span></p><p data-dcnode-id="1267"><img alt="" class="alignnone size-full wp-image-21638" data-dcnode-id="1268" height="1600" loading="lazy" sizes="(max-width: 2528px) 100vw, 2528px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084729.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084729.jpg 2528w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084729-300x190.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084729-1024x648.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084729-768x486.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084729-1536x972.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-084729-2048x1296.jpg 2048w" width="2528"></p><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Here it goes a few quick facts about color blindness:</span></p><ul data-dcnode-id="1252"><li data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">A person with color blindness has difficulty distinguishing certain colors, such as blue and yellow and red and green.</span></li><li data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">It is an inherited disorder that affects more men than women.</span></li><li data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Red-green color blindness is the most common.</span></li><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">There is a type of color blindness known as achromatic, in which the person sees only white, black and a gray scale. However, this case occurs in 1 person per 100,000.</span></li><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">It is possible to be color blind in just one eye and have a normal color vision in the other one. This is not very common and it is called unilateral dichromacy.</span></li><li data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">There is treatment, but there are contact lenses or glasses that improve color perception.</span></li></ul><h2 data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node=""># 4 mind-blowing facts about colors</span></h2><h3 data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">#1 Our ancestors had UV vision</span></h3><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">We know that some nocturnal animals – like bats, skunks, or owls – have ultraviolet vision that allows them distinguish shapes and color during the night, when they are awake.</span></p><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Once upon a time – about 90 million years ago – our early human ancestors viewed the world using UV vision too.</span></p><p data-dcnode-id="1242"><img alt="" class="alignnone size-full wp-image-21639" data-dcnode-id="1243" height="1600" loading="lazy" sizes="(max-width: 2242px) 100vw, 2242px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085058.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085058.jpg 2242w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085058-300x214.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085058-1024x731.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085058-768x548.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085058-1536x1096.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085058-2048x1462.jpg 2048w" width="2242"></p><p data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">The </span><a data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosgenetics/article%3Fid%3D10.1371/journal.pgen.1004884" rel="noopener" target="_blank"><span data-dcnode-id="1240" instrument_node="">Yokoyama team </span></a><span data-dcnode-id="1238" instrument_node="">discovered that our first mammalian ancestors were nocturnal creatures with vision sensitive to UV and red rays. This means that they basically saw the world in just two colors.</span></p><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">They couldn’t distinguish between red and green until 30 million years ago, when they developed a perfect trichromatic vision (our vision today) which allowed them to see the entire spectrum of visible light, everything except UV light.</span></p><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Even nowadays, 8% of men cannot distinguish between red and green, because they inherited new mutations from their ancestors</span></p><h3 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">#2 Chromophobia: fear of colors</span></h3><p data-dcnode-id="1227"><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//approachestopainting.files.wordpress.com/2013/01/163577202-chromophobia-david-batchelor.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1230" instrument_node="">Chromophobia</span></a><span data-dcnode-id="1228" instrument_node=""> is the continual and irrational fear of colors.</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">It can occur when a person experiences an incredibly negative event associated with a specific color, or colors in general.</span></p><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">It is a rare phobia, of course. But it’s proven that colors can cause hormonal responses and psychological reactions.</span></p><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">There are even specific names depending on the color:</span></p><p data-dcnode-id="1217"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Erythrophobia:</span></strong><span data-dcnode-id="1218" instrument_node=""> fear of red (maybe because of the association with the blood)</span></p><p data-dcnode-id="1213"><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Leukophobia:</span></strong><span data-dcnode-id="1214" instrument_node=""> fear of white</span></p><p data-dcnode-id="1211"><img alt="" class="alignnone size-full wp-image-21641" data-dcnode-id="1212" height="1600" loading="lazy" sizes="(max-width: 2133px) 100vw, 2133px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085255.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085255.jpg 2133w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085255-300x225.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085255-1024x768.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085255-768x576.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085255-1536x1152.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085255-2048x1536.jpg 2048w" width="2133"></p><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">And what are the symptoms?</span></p><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">As any other phobia, they vary from one person to another depending on their level of fear. But usually, the symptoms include anxiety, panic, problems to breath, rapid breathing, excessive sweating, nauseas or shaking.</span></p><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Chromophobia is typically treated with exposure therapy, which helps desensitize a patient to the feared object.</span></p><p data-dcnode-id="1200"><span data-dcnode-id="1204" instrument_node="">If you are interested and want to know more about this topic, check out the book published by the writer</span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.davidbatchelor.co.uk/" rel="noopener" target="_blank"><span data-dcnode-id="1203" instrument_node=""> David Batchelor</span></a><span data-dcnode-id="1201" instrument_node=""> about Chromophobia.</span></p><h3 data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">#3 Tetrachromacy: seeing 100 million colors</span></h3><p data-dcnode-id="1193"><span data-dcnode-id="1197" instrument_node="">Tetrachromacy causes people to have 4 color cones in their eyes instead of the normal 3 cones that most people have. It makes them perceive about 100 million colors – that’s about </span><i data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">100 times</span></i><span data-dcnode-id="1194" instrument_node=""> more than most people. This condition occurs more in women than men.</span></p><p data-dcnode-id="1191"><img alt="" class="alignnone size-full wp-image-21640" data-dcnode-id="1192" height="1600" loading="lazy" sizes="(max-width: 2400px) 100vw, 2400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085420.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085420.jpg 2400w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085420-300x200.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085420-1024x683.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085420-768x512.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085420-1536x1024.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085420-2048x1365.jpg 2048w" width="2400"></p><h3 data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">#4 Dreaming in black and white</span></h3><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Is everyone in the world dreaming in colors?</span></p><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Eva Murzyn probably asked herself the same question and carried out a study that suggest that the type of TV you watched when you were a child, may have an immense and profound effect on the colours you see while you are dreaming.</span></p><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Within the study, she divided a group of 60 people into two age groups (half were under 25 and the other half over 55), with different media experience.</span></p><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">These two groups were compared based on the answers to a questionnaire on the colour of their dreams as well as their childhood exposure to TV and film.</span></p><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Results were interesting.</span></p><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">They indicated that people over 55 were most likely to dream in black and white, while none of the respondents under 25 reported dreaming in black and white.</span></p><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">It’s important to note that, the older respondents who had much more access to color TV, had of course less dreams in black and white.</span></p><p data-dcnode-id="1173"><img alt="" class="alignnone size-full wp-image-21642" data-dcnode-id="1174" height="1600" loading="lazy" sizes="(max-width: 2400px) 100vw, 2400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085624.jpg&amp;raw" srcset="https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085624.jpg 2400w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085624-300x200.jpg 300w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085624-1024x683.jpg 1024w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085624-768x512.jpg 768w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085624-1536x1024.jpg 1536w, https://jumpstory.com/wp-content/uploads/2019/11/jumpstory-download20191120-085624-2048x1365.jpg 2048w" width="2400"></p><p data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">There is one clear thing</span><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">. </span></strong><span data-dcnode-id="1169" instrument_node="">Although colors seem to be one of the most basic things in the world, they are a total mystery that even scientists and psychologists just started to resolve.</span></p><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Drop us a message if you want to share any color fact you find mind-blowing or worth-sharing!</span></p><span data-dcnode-id="1165" instrument_node=""> </span></div><span data-dcnode-id="1163" instrument_node="">
