lowing for the dogs in our care to develop their socio-cognitive skills also enables them to have a life that is more meaningful. According to </span><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref107"><span data-dcnode-id="3281" instrument_node="">Purves and Delon (2018)</span></a><span data-dcnode-id="3279" instrument_node="">, animals’ lives acquire meaning when they are allowed to exercise their agency and use it to bring valuable states of affairs to the world. These valuable states of affairs range from relatively simple endeavors like rearing their young or establishing friendships, to more demanding behaviors like rescuing a human in need (which recent research shows dogs are capable of; </span><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref11"><span data-dcnode-id="3278" instrument_node="">Bourg et al., 2020</span></a><span data-dcnode-id="3276" instrument_node="">). A dog who is allowed to flourish to her full capacity is more likely to lead a meaningful life, which will in turn be a better life.</span></p><span data-dcnode-id="3274" instrument_node="">
</span><p class="mb0" data-dcnode-id="3258"><span data-dcnode-id="3273" instrument_node="">In addition to the duty to ensure the flourishing of the dogs under our care, there is also an additional duty that emerges from the special relationship that we have towards dogs, and from the specific way in which dogs perceive us. In our review of the empirical evidence regarding dogs’ perception of humans, we have highlighted the special characteristics of the dog–human bond. Dogs are not only eager to cooperate with us; they are also attuned to us like no other species. Their tendency to overimitate humans, for instance, points to a perception of us as important social partners. We know that dogs can recognize individual humans and they are also significantly less fearful of us than are their wild ancestors. All of this points to the ease with which a relationship of trust among dogs and their caregivers can emerge. Placing your trust in another allows for significant social bonds to be built, but it also means that one is made more vulnerable. The moral importance of this was captured by Cooke, who wrote that “[i]n trusting another, we give them power over us, power to set back our projects, exploit us, and make us vulnerable not just to them, but to others also” (</span><a data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref21"><span data-dcnode-id="3272" instrument_node="">Cooke, 2019</span></a><span data-dcnode-id="3270" instrument_node="">, 188)</span><sup data-dcnode-id="3266" id="footnotesuper5"><a data-dcnode-id="3269" id="fn_0005"></a><a class="footnoteanchor" data-dcnode-id="3267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn0005"><span data-dcnode-id="3268" instrument_node="">5</span></a></sup><span data-dcnode-id="3265" instrument_node="">. The trust that dogs place in us is no coincidence; instead it is a result of the process of domestication of which we are at least partly responsible as well as a result of what they learn in interactions with us during their lives. Humans thus have a duty to live up to this trust (see similarly </span><a data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref42"><span data-dcnode-id="3264" instrument_node="">Hens, 2008</span></a><span data-dcnode-id="3262" instrument_node="">), to ensure that our dogs’ needs are met, and that they are not placed in a situation where it would be warranted for them to feel betrayed. To paraphrase </span><a data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref21"><span data-dcnode-id="3261" instrument_node="">Cooke (2019</span></a><span data-dcnode-id="3259" instrument_node="">, 198), humans have a duty to act in ways that make them worthy of the trust that dogs place in them. For this duty to exist, it is not necessary for dogs to possess a cognitively complex form of trust for which we do not have any empirical evidence, yet. Our argument is that the way dogs engage with us evidences a trusting relationship that gives rise to duties on our side (not on theirs). For the kind of trust we are after we do not need the dog as a moral agent to fully understand what trust is in a normative sense, nor do we need the dog to understand duties on her side. Dogs’ capacity to enter into such relationships with us is independent of the question of whether they have (in addition) the sort of capacity for full-blown moral judgment that orthodox frameworks of moral agency require, or even a simple explicit motivation to trust their owner (which could make them a moral subject in Rowland’s sense). At least the former, intellectually demanding forms of trust might be tied to other complex abilities, such as a theory of mind. Our point is humbler here but still of profound relevance: the kind of trust we identify in the human-dog relationship becomes an ethical signpost in the light of the dog’s dependency on her caretaker.</span></p><span data-dcnode-id="3257" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="3256" id="h5" name="h5"></a><span data-dcnode-id="3255" instrument_node="">
</span><h2 data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Conclusion</span></h2><span data-dcnode-id="3252" instrument_node="">
</span><p class="mb15" data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">Dogs have indeed special skills to understand and interact with humans due to the evolutionary history and domestication of the species and due to complex competences acquired by individual and social learning. We see accumulating evidence of their understanding of human emotions, gestures, and actions and of how much they are thus part of human culture and our social game. Bonds between dogs and humans are selective, intense, and vary in quality. Affiliation plays a motivational role in dog behavior and shapes the dogs’ attitudes as well as their interaction with humans. All of this, however, has to be seen in the light of a comprehensive characterization of the human-dog relationship, which is a socially constructed practice with clear power relations. We have argued that the human-dog relationship is a dominance relationship where humans are usually in command of power. If caregivers are unaware about how much their dogs pay attention to subtle communicative cues and how much they understand about as well as attend to their caregivers’ emotions, gestures, and actions, a range of conflicts can arise. Instead we should invest into building relationships of trust with dogs that live up to ideas of companionship.</span></p><span data-dcnode-id="3249" instrument_node="">
</span><p class="mb15" data-dcnode-id="3242"><a data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref57"><span data-dcnode-id="3248" instrument_node="">Irvine (2004)</span></a><span data-dcnode-id="3246" instrument_node=""> arrived at the conclusion that “relationships between humans and animals have depended on how a given society defines animals and what it means to associate with them”. She argues that “what we currently know about animals demands wrestling with the moral implications of keeping them as pets” (</span><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref57"><span data-dcnode-id="3245" instrument_node="">Irvine, 2004</span></a><span data-dcnode-id="3243" instrument_node="">, 5). We have been following this critical view of pet keeping in general and dog keeping in specific, because it could serve as a helpful heuristic to map out problems that are often overlooked, specifically problems that point beyond welfare towards other normative concepts. Sixteen years after Irvine’s paper we face a substantial amount of new research results on dog social cognition which we have summarized in this paper and which we need to take into account when debating the human-dog relationship today.</span></p><span data-dcnode-id="3241" instrument_node="">
</span><p class="mb0" data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">From what we have discussed we gain a better understanding of a main characteristic of the human-dog relationship that lies in its dichotomy between special attachment as well as special understanding on the one hand and the instrumentalization of dogs on the other hand. Against this backdrop, a meaningful social interaction between dogs and caregivers remains a fragile construct. In order to treat dogs in the way that morality requires of us, it is paramount that we bear in mind the spectrum of positive duties that this relationship engenders, including the duty to live up to the trust that dogs place in us.</span></p><span data-dcnode-id="3238" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="3237" id="h6" name="h6"></a><span data-dcnode-id="3236" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="3229" id="h7" name="h7"></a><span data-dcnode-id="3228" instrument_node="">

</span><p class="mb0" data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">The handling editor declared a past co-authorship with one of the authors JB-S.</span></p><span data-dcnode-id="3211" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="3210" id="h9" name="h9"></a><span data-dcnode-id="3209" instrument_node="">
</span><h2 data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Footnotes</span></h2><span data-dcnode-id="3206" instrument_node=""> </span><div class="fulltextdescription" data-dcnode-id="3186" id="footnotetext"><span data-dcnode-id="3205" instrument_node="">
</span><p data-dcnode-id="3203" id="fn0001" style="margin-top:0em;margin-bottom:0em;margin-left:1em;text-indent:-1em;"><span data-dcnode-id="3204" instrument_node="">1. There is the possibility that dogs “domesticated themselves” to exploit a niche associated with the anthropogenic environment. However, given humans’ interest in domesticating (and then breeding and keeping) all sorts of species for their purposes we find it hard to believe that in dogs it was a one-sided process with all agency ranging on the dog’s side.</span></p><span data-dcnode-id="3202" instrument_node="">
</span><p data-dcnode-id="3200" id="fn0002" style="margin-top:0em;margin-bottom:0em;margin-left:1em;text-indent:-1em;"><span data-dcnode-id="3201" instrument_node="">2. We do not want to go into possible reasons for this, however, it needs to be noted that a whole range of different reasons for this could exist. After all, a household is a very different environment than a shelter. It is possible that it shapes the dog’s cognitive abilities. Likewise, their abilities (or perceived lack of abilities) might already have been a reason why their caregivers abandoned them.</span></p><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3194" id="fn0003" style="margin-top:0em;margin-bottom:0em;margin-left:1em;text-indent:-1em;"><span data-dcnode-id="3198" instrument_node="">3. Dog’s sensitivity to odors allows humans to train them as sniffer dogs for all sorts of purposes, from finding substances, like marihuana or explosives, to discovering injured persons after earthquakes, from detecting illnesses, like cancer, to helping out in species conservation (see </span><a data-dcnode-id="3196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref32"><span data-dcnode-id="3197" instrument_node="">Fischer-Tenhagen et al., 2017</span></a><span data-dcnode-id="3195" instrument_node="">).</span></p><span data-dcnode-id="3193" instrument_node="">
</span><p data-dcnode-id="3191" id="fn0004" style="margin-top:0em;margin-bottom:0em;margin-left:1em;text-indent:-1em;"><span data-dcnode-id="3192" instrument_node="">4. One could object that the fact that dogs share an environment with us gives us a reason to restrict their freedom. However, it is important to remember that dogs did not choose to share an environment with us. If we were to hold a human captive in our household, it would surely be very problematic to claim that this ‘shared environment’ gives us a reason to restrict her freedom. On the contrary, the existence of a shared environment gives us a reason to respect others’ freedom and interests, as has been long defended within social contract theory.</span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3188" id="fn0005" style="margin-top:0em;margin-bottom:0em;margin-left:1em;text-indent:-1em;"><span data-dcnode-id="3189" instrument_node="">5. Note that Cooke’s theory does not require any sort of cognitive notion of trust as a capacity dogs have. Instead, we would argue, trust emerges as a disposition in dogs, as a result of their phylogenetic and ontogenetic makeup and it is necessary to enter into a relationship of mutual understanding and social dependency.</span></p><span data-dcnode-id="3187" instrument_node="">
</span></div><span data-dcnode-id="3185" instrument_node=""> </span><a class="reset-hash-position" data-dcnode-id="3184" id="h10" name="h10"></a><span data-dcnode-id="3183" instrument_node="">
