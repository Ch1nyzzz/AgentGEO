</span><meta content="Humans interact with animals in numerous ways and on numerous levels. We are indeed living in an ‘animal's world,’ in the sense that our lives are very much intertwined with the lives of animals. This also means that animals, like those dogs we commonly refer to as our pets, are living in a ‘human's world’ in the sense that it is us, not them, who, to a large degree, define and manage the interactions we have with them. In this sense, the human-animal relationship is nothing we should romanticize: it comes with clear power relations and thus with a set of responsibilities on the side of those who exercise this power. This holds, despite the fact that we like to think about our dogs as human’s best friend. Dogs have been part of human societies for longer than any other domestic species. Like no other species they exemplify the role of companion animals. Relationships with pet dogs are both very widespread and very intense, often leading to strong attachments between owners or caregivers and animals and to a treatment of these dogs as family members or even children. But how does this relationship look from the dogs’ perspective? How do they perceive the humans they engage with? What responsibilities and duties arise from the kind of mutual understanding, attachment, and the supposedly ‘special’ bonds we form with them? Are there ethical implications, maybe even ethical implications beyond animal welfare? The past decades have seen an upsurge of research from comparative cognition on pet dogs' cognitive and social skills, especially in comparison with and reference to humans. We will therefore set our discussion about the nature and ethical dimensions of the human-dog relationship against the background of the current empirical knowledge on dog (social) cognition. This allows us to analyze the human-dog relationship by applying an interdisciplinary approach that starts from the perspective of the dog to ultimately inform the perspective of humans. It is our aim to thereby identify ethical dimensions of the human-dog relationship that have been overlooked so far." data-dcnode-id="5153" name="citation_abstract"><span data-dcnode-id="5152" instrument_node="">

</span><div class="atButton" data-dcnode-id="4361"><span data-dcnode-id="4370" instrument_node="">
</span><a addthis:description="Humans interact with animals in numerous ways and on numerous levels. We are indeed living in an “animal”s world,’ in the sense that our lives are very much intertwined with the lives of animals. This also means that animals, like those dogs we commonly refer to as our pets, are living in a “human’s world” in the sense that it is us, not them, who, to a large degree, define and manage the interactions we have with them. In this sense, the human-animal relationship is nothing we should romanticize: it comes with clear power relations and thus with a set of responsibilities on the side of those who exercise this power. This holds, despite the fact that we like to think about our dogs as human’s best friend. Dogs have been part of human societies for longer than any other domestic species. Like no other species they exemplify the role of companion animals. Relationships with pet dogs are both very widespread and very intense, often leading to strong attachments between owners or caregivers and animals and to a treatment of these dogs as family members or even children. But how does this relationship look from the dogs’ perspective? How do they perceive the humans they engage with? What responsibilities and duties arise from the kind of mutual understanding, attachment, and the supposedly “special” bonds we form with them? Are there ethical implications, maybe even ethical implications beyond animal welfare? The past decades have seen an upsurge of research from comparative co..." addthis:title="How Dogs Perceive Humans and How Humans Should Treat Their Pet Dogs: Linking Cognition With Ethics" addthis:url="https://www.frontiersin.org/article/10.3389/fpsyg.2020.584037" class="addthis_button_facebook at300b" data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="4364" style="backgro </span><h2 data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">
                            CONCEPTUAL ANALYSIS article
                        </span></h2><span data-dcnode-id="4264" instrument_node="">
</span></div><span data-dcnode-id="4262" instrument_node="">
</span><div class="header-bar-three" data-dcnode-id="4257"><span data-dcnode-id="4261" instrument_node="">
                        Front. Psychol., 16 December 2020
                             | </span><a data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3389/fpsyg.2020.584037"><span data-dcnode-id="4260" instrument_node="">https://doi.org/10.3389/fpsyg.2020.584037</span></a><span data-dcnode-id="4258" instrument_node="">

</span><div class="JournalAbstract" data-dcnode-id="4206"><span data-dcnode-id="4253" instrument_node=""> </span><a class="reset-hash-position" data-dcnode-id="4252" id="h1" name="h1"></a><span data-dcnode-id="4251" instrument_node="">
</span><h1 data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">How Dogs Perceive Humans and How Humans Should Treat Their Pet Dogs: Linking Cognition With Ethics</span></h1><span data-dcnode-id="4248" instrument_node=""> </span><div class="authors" data-dcnode-id="4228"><a class="user-id-894929" data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/894929"><img class="pr5" data-dcnode-id="4247" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/894929/24&amp;raw"><span data-dcnode-id="4246" instrument_node="">Judith Benz-Schwarzburg</span></a><sup data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">1</span></sup><sup data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">*</span></sup><span data-dcnode-id="4240" instrument_node="">, </span><a class="user-id-1159853" data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/1159853"><img class="pr5" data-dcnode-id="4239" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/1159853/24&amp;raw"><span data-dcnode-id="4238" instrument_node="">Susana Monsó</span></a><sup data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">1</span></sup><span data-dcnode-id="4234" instrument_node=""> and </span><a class="user-id-67459" data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/67459"><img class="pr5" data-dcnode-id="4233" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/67459/24&amp;raw"><span data-dcnode-id="4232" instrument_node="">Ludwig Huber</span></a><sup data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">2</span></sup></div><span data-dcnode-id="4227" instrument_node=""> </span><ul class="notes" data-dcnode-id="4213"><span data-dcnode-id="4226" instrument_node=""> </span><li data-dcnode-id="4221"><span data-dcnode-id="4223"><sup data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">1</span></sup></span><span data-dcnode-id="4222" instrument_node="">Unit of Ethics and Human-Animal Studies, Messerli Research Institute, Vetmeduni Vienna, University of Vienna, Medical University of Vienna, Vienna, Austria</span></li><span data-dcnode-id="4220" instrument_node=""> </span><li data-dcnode-id="4215"><span data-dcnode-id="4217"><sup data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">2</span></sup></span><span data-dcnode-id="4216" instrument_node="">Unit of Comparative Cognition, Messerli Research Institute, Vetmeduni Vienna, University of Vienna, Medical University of Vienna, Vienna, Austria</span></li><span data-dcnode-id="4214" instrument_node=""> </span></ul><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">Humans interact with animals in numerous ways and on numerous levels. We are indeed living in an “animal”s world,’ in the sense that our lives are very much intertwined with the lives of animals. This also means that animals, like those dogs we commonly refer to as our pets, are living in a “human’s world” in the sense that it is us, not them, who, to a large degree, define and manage the interactions we have with them. In this sense, the human-animal relationship is nothing we should romanticize: it comes with clear power relations and thus with a set of responsibilities on the side of those who exercise this power. This holds, despite the fact that we like to think about our dogs as human’s best friend. Dogs have been part of human societies for longer than any other domestic species. Like no other species they exemplify the role of companion animals. Relationships with pet dogs are both very widespread and very intense, often leading to strong attachments between owners or caregivers and animals and to a treatment of these dogs as family members or even children. But how does this relationship look from the dogs’ perspective? How do they perceive the humans they engage with? What responsibilities and duties arise from the kind of mutual understanding, attachment, and the supposedly “special” bonds we form with them? Are there ethical implications, maybe even ethical implications beyond animal welfare? The past decades have seen an upsurge of research from comparative cognition on pet dogs’ cognitive and social skills, especially in comparison with and reference to humans. We will therefore set our discussion about the nature and ethical dimensions of the human–dog relationship against the background of the current empirical knowledge on dog (social) cognition. This allows us to analyze the human–dog relationship by applying an interdisciplinary approach that starts from the perspective of the dog to ultimately inform the perspective of humans. It is our aim to thereby identify ethical dimensions of the human–dog relationship that have been overlooked so far.</span></p><span data-dcnode-id="4209" instrument_node=""> </span><div class="clear" data-dcnode-id="4208"></div><span data-dcnode-id="4207" instrument_node=""> </span></div><span data-dcnode-id="4205" instrument_node=""> </span><div class="JournalFullText" data-dcnode-id="445"><span data-dcnode-id="4204" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="4203" id="h2" name="h2"></a><span data-dcnode-id="4202" instrument_node="">
</span><h2 data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">Introduction</span></h2><span data-dcnode-id="4199" instrument_node="">
</span><p class="mb15" data-dcnode-id="4191"><span data-dcnode-id="4198" instrument_node="">The question of how dogs perceive us humans is important for several reasons, both from the perspective of biologists as well as animal ethicists. First, an enduring topic of animal behavior and animal cognition research is how animals adapt to their social environment, how they cope with the challenges of dynamic relationships among group members, and especially how they achieve a balance between competition and cooperation. Complex social life has been proposed as one of the main driving forces in the evolution of higher cognitive abilities in humans and non-human animals (</span><a data-dcnode-id="4196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref55"><span data-dcnode-id="4197" instrument_node="">Humphrey, 1976</span></a><span data-dcnode-id="4195" instrument_node="">; </span><a data-dcnode-id="4193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref29"><span data-dcnode-id="4194" instrument_node="">Dunbar, 1998</span></a><span data-dcnode-id="4192" instrument_node="">).</span></p><span data-dcnode-id="4190" instrument_node="">
</span><p class="mb15" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">Secondly, while evolution has equipped species with the appropriate cognitive tools to engage in sophisticated social interactions during foraging and conflict management, including the formation of valuable relationships (social bonds), it is less clear how species became able to deal with heterospecifics with whom they live in close interaction, i.e., not simply as prey or predator. This is the case in at least two domains, in urban species and in domesticated species. In the latter domain, dogs have been considered as the species that formed the closest bonds with humans. So how was it possible for these animals to engage in such close interactions with humans, who are members of a different species, with a different anatomy, physiology, including different sensory modalities, behavior, and cognition?</span></p><span data-dcnode-id="4187" instrument_node="">
</span><p class="mb15" data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">While the first two reasons might inspire cognitive biologists who address topics in animal behavior and evolution to investigate dogs’ perspective on the human–dog-relationship, animal ethicists might find additional reasons why the question of how dogs perceive humans is important. This is because the relationship between humans and dogs is characterized by a clear dominance hierarchy, not only during the process of domestication, but also during the individual life of the dog. This only gives us an ethical reason why to consider the human–dog-relationship but also a reason why to consider it differently than relationships that are not characterized in such a way. Humans have domesticated dogs, not vice versa, mainly to exploit them for their own benefit, as assistants during hunting, as guardians of their homes, or as companions. More recently, we have added other tasks and purposes that cover a very wide range of different contexts. We use dogs as testing devices in labs, as search (and rescue) animals (when looking for missing persons as much as when looking for rare truffles), as therapists in animal-assisted therapies, dance partners in dog dancing, hair models in dog grooming, or influencers in social media, just to name a few. The multitude of interactions and contexts in which we use them, of course, has produced a number of welfare issues and, as we are going to argue, ethical issues beyond welfare. While ethical debates have convincingly pointed to human responsibilities for example in the case of farm animals and lab animals, companion animals are often not so clearly seen as animals which we “use,” objectify, or instrumentalize, maybe because the term “companion” indicates to some degree a mutual relationship rather than an exploitative one. But how, in fact, do dogs experience this relationship? How do they perceive the humans they engage with? Have they indeed specifically adapted to interact and form “special” bonds with humans as the Domestication Hypothesis (see our section on Effects of Domestication) suggests? We assume that part of the answer to these questions can be found in the growing evidence for dogs’ special skills to perceive and understand us.</span></p><span data-dcnode-id="4184" instrument_node="">
</span><p class="mb0" data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">The structure of this paper is as follows. In a first step, we will discuss insights from the dog’s domestication history and from empirical studies on their (social) cognition to illustrate how dogs perceive us, and consequently sketch the nature of our relationship with them. In a second step, we will assess what ethical responsibilities arise from the characteristics of the human–dog relationship. Should we profoundly reevaluate some ways we use dogs, and enrich the narrative of dogs as “companions” and “man’s best friend” with some ethical considerations that are indeed more demanding? Our methodology thus utilizes the results from current debates in dog social cognition to evaluate the human–dog relationship from a critical, ethical perspective. Our aim is to show by means of such an interdisciplinary investigation in what ways our current knowledge about dog domestication and dog social cognition can and should inform our treatment of these animals. For our discussion of the empirical evidence, we have picked three areas of dog social cognition where we find a substantial amount of studies. Our selection thus mirrors the general interest of the research community. However, the community might be neglecting other possible abilities in dogs due to a lack of interest in them, a publication bias towards positive results, flawed study designs or other reasons. We will come back to this in our ethical discussion, since what we do not know about dogs might be relevant to the treatment that we owe them. While in this paper we will restrict our discussion of ethical implications to the kinds of studies available, other, more profound ethical implications might lie ahead, once cognition research broadens its focus.</span></p><span data-dcnode-id="4181" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="4180" id="h3" name="h3"></a><span data-dcnode-id="4179" instrument_node="">
</span><h2 data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">Characterizing the Human–Dog Relationship: Biological Perspectives</span></h2><span data-dcnode-id="4176" instrument_node="">
</span><p class="mb0" data-dcnode-id="4171"><span data-dcnode-id="4175" instrument_node="">In this section, we will investigate the characteristics of the human–dog relationship by following the decisive question of how dogs adapt to the human environment. We will turn our attention to the latest research results from the fields of animal cognition and behavior. The default assumption is that dogs’ skills are firmly based on some general canine abilities of intraspecies communication plus a combination of phylogenetic and ontogenetic abilities of interspecies communication. The latter ones have emerged from domestication and individual social and cognitive development (</span><a data-dcnode-id="4173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref48"><span data-dcnode-id="4174" instrument_node="">Huber, 2016</span></a><span data-dcnode-id="4172" instrument_node="">). Both kinds of developmental factors have contributed to the success of dogs living among and with humans, including their adoption of the numerous roles humans give to them.</span></p><span data-dcnode-id="4170" instrument_node="">
</span><h3 data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">Effects of Domestication: New Skills or Special Sensitivity?</span></h3><span data-dcnode-id="4167" instrument_node="">
</span><p class="mb15" data-dcnode-id="4161"><span data-dcnode-id="4166" instrument_node="">For thousands of years humans have changed the morphology, physiology, and behavior of dogs through selective breeding. Canines were the earliest domesticated animal, a process that started somewhere between 15,000 and 30,000 years ago, most likely when gray wolves began scavenging around human settlements. Dog experts differ on how active role humans played in the next step, but eventually the relationship became a mutual one, as we began employing dogs for hunting, guarding, and companionship.</span><sup data-dcnode-id="4162" id="footnotesuper1"><a data-dcnode-id="4165" id="fn_0001"></a><a class="footnoteanchor" data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn0001"><span data-dcnode-id="4164" instrument_node="">1</span></a></sup></p><span data-dcnode-id="4160" instrument_node="">
</span><p class="mb15" data-dcnode-id="4155"><span data-dcnode-id="4159" instrument_node="">It is, however, still an open question to what extent the three kinds of cognitive and communicative adaptations – of the wolf, the dog, and the human companion (pet) – contribute to this extraordinary achievement. It is furthermore disputable if the outcome of these different developments is a new skill or rather a special sensitivity. In addition, we may distinguish not only between phylogenetic and ontogenetic routes, but also between construction and inflection (</span><a data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref43"><span data-dcnode-id="4158" instrument_node="">Heyes, 2003</span></a><span data-dcnode-id="4156" instrument_node="">), to overcome the simplistic dichotomy of nature vs. nurture. One cautionary application of the multiple routes framework would be to assume that dogs have acquired a special sensitivity towards human gestures, speech, and behavior as a phylogenetic inflection through human selection over many thousands of years. This sensitivity is not a new cognitive or sensory mechanism, but the result of a selection biasing the input.</span></p><span data-dcnode-id="4154" instrument_node="">
</span><p class="mb15" data-dcnode-id="4140"><span data-dcnode-id="4153" instrument_node="">Since the time dogs became a special focus of ethology and comparative cognition research, the so-called Domestication Hypothesis has dominated the debate about the special skills of dogs (</span><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref38"><span data-dcnode-id="4152" instrument_node="">Hare et al., 2002</span></a><span data-dcnode-id="4150" instrument_node="">; </span><a data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref136"><span data-dcnode-id="4149" instrument_node="">Topál et al., 2009</span></a><span data-dcnode-id="4147" instrument_node="">; </span><a data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref82"><span data-dcnode-id="4146" instrument_node="">Miklósi and Topál, 2013</span></a><span data-dcnode-id="4144" instrument_node="">). It has been assumed that dogs have been selected to cooperate and communicate with humans during domestication and, thus, evolved some genetic predispositions allowing them to develop skills shared with humans. Accordingly, it has been suggested that, in a unique way, domestication has equipped dogs with two abilities necessary for cooperative problem solving – namely social tolerance and social attentiveness, which enable them to adjust their behavior to that of their human partners (</span><a data-dcnode-id="4142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref95"><span data-dcnode-id="4143" instrument_node="">Ostojic and Clayton, 2014</span></a><span data-dcnode-id="4141" instrument_node="">).</span></p><span data-dcnode-id="4139" instrument_node="">
</span><p class="mb15" data-dcnode-id="4134"><span data-dcnode-id="4138" instrument_node="">Empirical support for the Domestication Hypothesis has been sought by comparing dogs and wolves. Several of the early comparisons have indeed found profound differences between domesticated forms and their wild ancestors (i.e., the closest wild-living relatives) in the way they communicate and cooperate with humans, for instance in following human gestures, as well as in their capacities for social tolerance and social attentiveness. It has been proposed that dogs have been selected for tamer temperament and for reduced fear and aggression, which allows a potential partner to come close even around food, which in turn explains the higher success of dogs in cooperative and communicative interactions with humans in comparison to wolves (</span><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref39"><span data-dcnode-id="4137" instrument_node="">Hare and Tomasello, 2005</span></a><span data-dcnode-id="4135" instrument_node="">).</span></p><span data-dcnode-id="4133" instrument_node="">
</span><p class="mb15" data-dcnode-id="4071"><span data-dcnode-id="4132" instrument_node="">Apart from social tolerance, cooperation with humans and learning from humans are facilitated by a high degree of social attentiveness. Cooperation requires that the partners pay sufficient attention to each other in order to adjust or synchronize their behavior, and social learning requires paying attention to the demonstrator’s actions and the context in which they are executed (</span><a data-dcnode-id="4130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref53"><span data-dcnode-id="4131" instrument_node="">Huber et al., 2009</span></a><span data-dcnode-id="4129" instrument_node="">). Attentiveness towards potential partners varies not only according to the tasks, but at least in the human–dog case, it crucially depends on the relationship between the partners (</span><a data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref157"><span data-dcnode-id="4128" instrument_node="">Range et al., 2007</span></a><span data-dcnode-id="4126" instrument_node="">; </span><a data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref44"><span data-dcnode-id="4125" instrument_node="">Horn et al., 2013</span></a><span data-dcnode-id="4123" instrument_node="">). Dogs have proven successful in several tasks that are thought to require high attention towards humans, such as experiments on social learning (</span><a data-dcnode-id="4121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref68"><span data-dcnode-id="4122" instrument_node="">Kubinyi et al., 2003</span></a><span data-dcnode-id="4120" instrument_node="">; </span><a data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref133"><span data-dcnode-id="4119" instrument_node="">Topál et al., 2006</span></a><span data-dcnode-id="4117" instrument_node="">; </span><a data-dcnode-id="4115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref53"><span data-dcnode-id="4116" instrument_node="">Huber et al., 2009</span></a><span data-dcnode-id="4114" instrument_node="">, </span><a data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref52"><span data-dcnode-id="4113" instrument_node="">2014</span></a><span data-dcnode-id="4111" instrument_node="">; </span><a data-dcnode-id="4109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref111"><span data-dcnode-id="4110" instrument_node="">Range et al., 2011</span></a><span data-dcnode-id="4108" instrument_node="">; </span><a data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref35"><span data-dcnode-id="4107" instrument_node="">Fugazza and Miklósi, 2014</span></a><span data-dcnode-id="4105" instrument_node="">), social referencing (</span><a data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref77"><span data-dcnode-id="4104" instrument_node="">Merola et al., 2012a</span></a><span data-dcnode-id="4102" instrument_node="">,</span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref78"><span data-dcnode-id="4101" instrument_node="">b</span></a><span data-dcnode-id="4099" instrument_node="">), communication (</span><a data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref144"><span data-dcnode-id="4098" instrument_node="">Virányi et al., 2004</span></a><span data-dcnode-id="4096" instrument_node="">; </span><a data-dcnode-id="4094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref121"><span data-dcnode-id="4095" instrument_node="">Schwab and Huber, 2006</span></a><span data-dcnode-id="4093" instrument_node="">; </span><a data-dcnode-id="4091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref140"><span data-dcnode-id="4092" instrument_node="">Udell and Wynne, 2008</span></a><span data-dcnode-id="4090" instrument_node="">; </span><a data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref27"><span data-dcnode-id="4089" instrument_node="">Dorey et al., 2009</span></a><span data-dcnode-id="4087" instrument_node="">; </span><a data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref62"><span data-dcnode-id="4086" instrument_node="">Kaminski et al., 2012</span></a><span data-dcnode-id="4084" instrument_node="">), responding to unequal rewards (</span><a data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref109"><span data-dcnode-id="4083" instrument_node="">Range et al., 2009</span></a><span data-dcnode-id="4081" instrument_node="">), and cooperation (</span><a data-dcnode-id="4079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref90"><span data-dcnode-id="4080" instrument_node="">Naderi et al., 2001</span></a><span data-dcnode-id="4078" instrument_node="">; </span><a data-dcnode-id="4076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref12"><span data-dcnode-id="4077" instrument_node="">Bräuer et al., 2013</span></a><span data-dcnode-id="4075" instrument_node="">; </span><a data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref95"><span data-dcnode-id="4074" instrument_node="">Ostojic and Clayton, 2014</span></a><span data-dcnode-id="4072" instrument_node="">).</span></p><span data-dcnode-id="4070" instrument_node="">
</span><p class="mb15" data-dcnode-id="4056"><span data-dcnode-id="4069" instrument_node="">Another line of evidence for the differences between dogs and wolves comes from pointing studies. Young dogs follow human pointing better and look at humans more readily than human-raised wolves (</span><a data-dcnode-id="4067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref80"><span data-dcnode-id="4068" instrument_node="">Miklósi et al., 2003</span></a><span data-dcnode-id="4066" instrument_node="">; </span><a data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref36"><span data-dcnode-id="4065" instrument_node="">Gácsi et al., 2009</span></a><span data-dcnode-id="4063" instrument_node="">). This led researchers to propose that dogs have developed increased social attentiveness compared to wolves and, thus, can achieve more complex forms of dog–human communication and cooperation than wolves (</span><a data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref80"><span data-dcnode-id="4062" instrument_node="">Miklósi et al., 2003</span></a><span data-dcnode-id="4060" instrument_node="">; </span><a data-dcnode-id="4058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref142"><span data-dcnode-id="4059" instrument_node="">Virányi et al., 2008</span></a><span data-dcnode-id="4057" instrument_node="">).</span></p><span data-dcnode-id="4055" instrument_node="">
</span><p class="mb15" data-dcnode-id="4011"><span data-dcnode-id="4054" instrument_node="">However, as most of the studies compared the animals’ interactions only with humans (</span><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref38"><span data-dcnode-id="4053" instrument_node="">Hare et al., 2002</span></a><span data-dcnode-id="4051" instrument_node="">; </span><a data-dcnode-id="4049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref80"><span data-dcnode-id="4050" instrument_node="">Miklósi et al., 2003</span></a><span data-dcnode-id="4048" instrument_node="">; </span><a data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref135"><span data-dcnode-id="4047" instrument_node="">Topál et al., 2005</span></a><span data-dcnode-id="4045" instrument_node="">; </span><a data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref140"><span data-dcnode-id="4044" instrument_node="">Udell and Wynne, 2008</span></a><span data-dcnode-id="4042" instrument_node="">; </span><a data-dcnode-id="4040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref142"><span data-dcnode-id="4041" instrument_node="">Virányi et al., 2008</span></a><span data-dcnode-id="4039" instrument_node="">; </span><a data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref36"><span data-dcnode-id="4038" instrument_node="">Gácsi et al., 2009</span></a><span data-dcnode-id="4036" instrument_node="">; </span><a data-dcnode-id="4034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref138"><span data-dcnode-id="4035" instrument_node="">Udell et al., 2011</span></a><span data-dcnode-id="4033" instrument_node="">), it remained unclear whether the differences between dogs and wolves reflect mere differences in the readiness of dogs and wolves to interact with humans or more fundamental differences regarding intraspecific cooperation. Indeed, experiments at the Wolf Science Center in Austria have shown that (hand-raised) wolves pay as much attention to human partners as dogs do and that these wolves can even outperform dogs in learning from observation of a conspecific, indicating the high social attentiveness of the species (</span><a data-dcnode-id="4031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref112"><span data-dcnode-id="4032" instrument_node="">Range and Virányi, 2013</span></a><span data-dcnode-id="4030" instrument_node="">, </span><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref113"><span data-dcnode-id="4029" instrument_node="">2014</span></a><span data-dcnode-id="4027" instrument_node="">). Accordingly, the so-called Canine Cooperation Hypothesis postulates that dog-human cooperation evolved on the basis of wolf–wolf cooperation and that no additional selection for social attentiveness and tolerance was necessary to allow for dog-human cooperation to evolve (</span><a data-dcnode-id="4025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref113"><span data-dcnode-id="4026" instrument_node="">Range and Virányi, 2014</span></a><span data-dcnode-id="4024" instrument_node="">, </span><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref114"><span data-dcnode-id="4023" instrument_node="">2015</span></a><span data-dcnode-id="4021" instrument_node="">; </span><a data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref143"><span data-dcnode-id="4020" instrument_node="">Virányi and Range, 2014</span></a><span data-dcnode-id="4018" instrument_node="">). Rather than tolerance, domestication may have led to reduced fear of humans, which is supported by the fact that dogs need less intensive socialization than wolves to avoid fear of humans (</span><a data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref122"><span data-dcnode-id="4017" instrument_node="">Scott and Fuller, 1965</span></a><span data-dcnode-id="4015" instrument_node="">; </span><a data-dcnode-id="4013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref66"><span data-dcnode-id="4014" instrument_node="">Klinghammer and Goodmann, 1987</span></a><span data-dcnode-id="4012" instrument_node="">). If dogs are less fearful of humans and more comfortable around them than wolves, they would have gained advantages from witnessing human actions (even without being more attentive), and from sooner engaging in interactions with humans.</span></p><span data-dcnode-id="4010" instrument_node="">
</span><p class="mb0" data-dcnode-id="4002"><span data-dcnode-id="4009" instrument_node="">According to the Canine Cooperation Hypothesis, the high social attentiveness, tolerance, and presumable cooperativeness of wolves provided a good basis for dog–human cooperation to evolve during domestication. In addition, some relevant features in sociability and cooperativeness are shared by wolves and humans and thus have probably facilitated the domestication of dogs (</span><a data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref17"><span data-dcnode-id="4008" instrument_node="">Clutton-Brock, 1984</span></a><span data-dcnode-id="4006" instrument_node="">; </span><a data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref119"><span data-dcnode-id="4005" instrument_node="">Schleidt, 1998</span></a><span data-dcnode-id="4003" instrument_node="">). However, dogs are not only specifically sensitive to humans because of the domestication history of their species and the evolutionary baggage that has been passed down to them from their wild ancestors, the wolves. They are also what they are because each of them trains their outstanding sensitivity towards humans on an individual, ontogenetic level.</span></p><span data-dcnode-id="4001" instrument_node="">
</span><h3 data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">Individual Development</span></h3><span data-dcnode-id="3998" instrument_node="">
</span><p class="mb0" data-dcnode-id="3984"><span data-dcnode-id="3997" instrument_node="">Despite being equipped by evolution with skills and propensities to adapt to humans by showing high levels of social tolerance and attentiveness, dogs need to individually learn much about their heterospecific partners in order to establish and maintain firm individualized relationships. During their life in the human household as pets or companions, they have ample opportunities to do so. Family dogs live in close day-to-day contact with humans and can therefore collect an enormous amount of experience. Research from the last decades has sought to understand how dogs perceive elements of their environment, learn about it, and use this knowledge to make informed decisions about proper behavior (</span><a data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref48"><span data-dcnode-id="3996" instrument_node="">Huber, 2016</span></a><span data-dcnode-id="3994" instrument_node="">). Their skills in face processing, behavior reading, observational learning, and perspective taking play a crucial role here (for reviews, see </span><a data-dcnode-id="3992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref9"><span data-dcnode-id="3993" instrument_node="">Bensky et al., 2013</span></a><span data-dcnode-id="3991" instrument_node="">; </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref59"><span data-dcnode-id="3990" instrument_node="">Kaminski and Marshall-Pescini, 2014</span></a><span data-dcnode-id="3988" instrument_node="">; </span><a data-dcnode-id="3986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref70"><span data-dcnode-id="3987" instrument_node="">Lea and Osthaus, 2018</span></a><span data-dcnode-id="3985" instrument_node="">). In what follows, we will summarize recent findings on dogs’ understanding of human emotions, gestures, and actions.</span></p><span data-dcnode-id="3983" instrument_node="">
</span><h4 data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">Understanding Human Emotions: How Dogs Read Our Faces and Listen to Our Voices</span></h4><span data-dcnode-id="3980" instrument_node="">
</span><p class="mb15" data-dcnode-id="3963"><span data-dcnode-id="3979" instrument_node="">Interspecies emotional communication is in part facilitated by chemosignals (</span><a data-dcnode-id="3977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref24"><span data-dcnode-id="3978" instrument_node="">D’Aniello et al., 2018</span></a><span data-dcnode-id="3976" instrument_node="">), but, faces are in addition an important visual category for many species because they provide a rich source of perceptual cues, including many idiosyncratic features, and thus facilitate important discriminations. In the specific case of dogs, it has been suggested that their increased readiness to look at the human face provides a basis for complex forms of dog-human communication (</span><a data-dcnode-id="3974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref80"><span data-dcnode-id="3975" instrument_node="">Miklósi et al., 2003</span></a><span data-dcnode-id="3973" instrument_node="">). By monitoring human faces, dogs seem to obtain important social information, ranging from communicative gestures to attentive states (</span><a data-dcnode-id="3971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref121"><span data-dcnode-id="3972" instrument_node="">Schwab and Huber, 2006</span></a><span data-dcnode-id="3970" instrument_node="">; </span><a data-dcnode-id="3968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref60"><span data-dcnode-id="3969" instrument_node="">Kaminski and Nitzschner, 2013</span></a><span data-dcnode-id="3967" instrument_node="">). Dogs can quickly find out what features are relevant or informative for making important decisions. They also spontaneously focus on the eyes to infer where humans attend, what they are interested in, and even what they intend to do next (see eye movement studies like for example </span><a data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref125"><span data-dcnode-id="3966" instrument_node="">Somppi et al., 2014</span></a><span data-dcnode-id="3964" instrument_node="">).</span></p><span data-dcnode-id="3962" instrument_node="">
</span><p class="mb15" data-dcnode-id="3945"><span data-dcnode-id="3961" instrument_node="">Gaze following is present in many species, but dogs outperform even nonhuman primates in following human gaze in object choice tasks (</span><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref38"><span data-dcnode-id="3960" instrument_node="">Hare et al., 2002</span></a><span data-dcnode-id="3958" instrument_node="">; </span><a data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref22"><span data-dcnode-id="3957" instrument_node="">Cooper et al., 2003</span></a><span data-dcnode-id="3955" instrument_node="">). Like in the case of human infants, their gaze following is modulated by ostensive cueing, such as direct gaze and addressing by the person, which is evidence that it is more than simply a product of reflexive and learnt mechanisms (</span><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref131"><span data-dcnode-id="3954" instrument_node="">Téglás et al., 2012</span></a><span data-dcnode-id="3952" instrument_node="">). Dogs also follow human’s gaze into distant space (</span><a data-dcnode-id="3950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref146"><span data-dcnode-id="3951" instrument_node="">Wallis et al., 2015</span></a><span data-dcnode-id="3949" instrument_node="">), and they use the eyes of humans to judge their attentional state. In one study, dogs were tempted with sausages but told by the caregiver not to take them. The dogs obeyed more or less depending on the caregiver’s attention to them (</span><a data-dcnode-id="3947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref121"><span data-dcnode-id="3948" instrument_node="">Schwab and Huber, 2006</span></a><span data-dcnode-id="3946" instrument_node="">). When being watched by the caregiver, dogs stayed lying down most often or for the longest time, but when the caregiver read a book, watched TV, turned her back on them, or left the room, their patience ceased. Obviously, they were using eye contact and eye orientation as cues.</span></p><span data-dcnode-id="3944" instrument_node="">
</span><p class="mb15" data-dcnode-id="3927"><span data-dcnode-id="3943" instrument_node="">Human faces provide much more information than simply looking patterns. A great number of idiosyncratic features allow humans to identify and recognize others. Would dogs also profit from this rich source of information? Could they also identify and recognize their caregiver and other familiar humans? In one study we put these questions to test and asked dogs to discriminate between their caregiver and another highly familiar person by active choice (approaching and touching; </span><a data-dcnode-id="3941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref51"><span data-dcnode-id="3942" instrument_node="">Huber et al., 2013</span></a><span data-dcnode-id="3940" instrument_node="">). The task could not simply be solved on the basis of familiarity (approaching the familiar person), which is considered an easier task (</span><a data-dcnode-id="3938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref147"><span data-dcnode-id="3939" instrument_node="">Wilkinson et al., 2010</span></a><span data-dcnode-id="3937" instrument_node="">), but required a fine-grained distinction of familiar people. Dogs could do so, even when they saw only the (real) face of the humans, but had difficulties when the face was only projected as a picture to a big screen. Only a minority of dogs could finally identify the caregiver on face pictures in which the outer parts of their faces were occluded with a balaclava hood. A further study confirmed the importance of human eyes for dogs, because they rely less on the nose or the mouth than on the eyes for human face discrimination (</span><a data-dcnode-id="3935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref100"><span data-dcnode-id="3936" instrument_node="">Pitteri et al., 2014</span></a><span data-dcnode-id="3934" instrument_node="">). They also prefer looking at upright over inverted faces, exactly as we ourselves do (</span><a data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref124"><span data-dcnode-id="3933" instrument_node="">Somppi et al., 2012</span></a><span data-dcnode-id="3931" instrument_node="">, </span><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref125"><span data-dcnode-id="3930" instrument_node="">2014</span></a><span data-dcnode-id="3928" instrument_node="">).</span></p><span data-dcnode-id="3926" instrument_node="">
</span><p class="mb15" data-dcnode-id="3918"><span data-dcnode-id="3925" instrument_node="">On the basis of our findings that dogs are competent enough to extract subtle, idiosyncratic features of a face in order to identify a human person, despite changes of color, hair style, make-up, jewelry, hats, etc., we went one step further and asked whether dogs may also learn from our facial expressions. It has been already shown that dogs can rely on human facial expressions when making decisions about approaching other objects (</span><a data-dcnode-id="3923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref77"><span data-dcnode-id="3924" instrument_node="">Merola et al., 2012a</span></a><span data-dcnode-id="3922" instrument_node="">). However, a study in which the stimuli were photographs showing human faces with two different emotional expressions did not yield conclusive results (</span><a data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref91"><span data-dcnode-id="3921" instrument_node="">Nagasawa et al., 2011</span></a><span data-dcnode-id="3919" instrument_node="">). Although dogs learned to discriminate between happy (smiling) faces and neutral faces of their caregiver and subsequently transferred the contingency to novel faces of unfamiliar people, it is not clear whether the dogs simply used a salient discriminatory cue, such as the visibility of teeth in the happy faces, to solve both the discrimination and the generalization task.</span></p><span data-dcnode-id="3917" instrument_node="">
</span><p class="mb15" data-dcnode-id="3912"><span data-dcnode-id="3916" instrument_node="">In the Clever Dog Lab in Vienna, we asked dogs to discriminate “hemifaces” – either the lower or the upper half of the faces – of women showing different (happy and angry) emotions. With this trick we could investigate whether dogs solve the task solely by attending to the emotional expression rather than any inadvertent cues in the presented human face (</span><a data-dcnode-id="3914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref88"><span data-dcnode-id="3915" instrument_node="">Müller et al., 2015</span></a><span data-dcnode-id="3913" instrument_node="">). Given that the simple discriminatory cues in one half of the faces – such as teeth in the lower half – were absent in the other half, the authors could test the dogs’ ability to spontaneously categorize novel pictures on the sole basis of the emotional expression, provided globally and not just by local cues. Indeed, the dogs did not only manage to learn the training task, but they were also able to transfer the extracted rule to novel faces, even if they had been presented a hemiface not shown in training.</span></p><span data-dcnode-id="3911" instrument_node="">
</span><p class="mb15" data-dcnode-id="3906"><span data-dcnode-id="3910" instrument_node="">These findings provide strong evidence that dogs are able to discriminate between emotional expressions in a different species, which, compared to emotion recognition in conspecifics, is particularly challenging (cf. </span><a data-dcnode-id="3908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref99"><span data-dcnode-id="3909" instrument_node="">Parr et al., 2008</span></a><span data-dcnode-id="3907" instrument_node="">). For instance, humans open their mouth and show their teeth while laughing, whereas dogs express the underlying emotions of aggression by showing their teeth. Therefore, dogs cannot rely on genetic predispositions, but need to individually learn the emotional expressions of humans. The fact that dogs could spontaneously generalize from one face half to the other without the possibility to use cues learned during training strongly supports the idea that they remembered something from their daily experiences with their caregiver or other familiar people and then used this information in the artificial laboratory environment. As they had not been explicitly trained, it seems that they had acquired the competence by latent learning.</span></p><span data-dcnode-id="3905" instrument_node="">
</span><p class="mb15" data-dcnode-id="3894"><span data-dcnode-id="3904" instrument_node="">Humans express their emotions not only visually but also their voices convey information about affects. Dogs may exploit these contingencies by extracting and integrating bimodal sensory emotional information from humans. From the combination of visual and auditory cues they may form multimodal representations. Using a cross-modal preferential looking paradigm, researchers at the University of Lincoln (United Kingdom) managed to show that dogs spontaneously combine human or dog faces with different emotional valences (happy/playful versus angry/aggressive) with a single vocalization from the same individual of the same positive or negative valence (</span><a data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref4"><span data-dcnode-id="3903" instrument_node="">Albuquerque et al., 2016</span></a><span data-dcnode-id="3901" instrument_node="">). This result points to the possibility that dogs recognized or understood the emotional content of the human faces, not just discriminated them perceptually. Recent eye-tracking studies have supported this hypothesis (</span><a data-dcnode-id="3899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref8"><span data-dcnode-id="3900" instrument_node="">Barber et al., 2016</span></a><span data-dcnode-id="3898" instrument_node="">; </span><a data-dcnode-id="3896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref126"><span data-dcnode-id="3897" instrument_node="">Somppi et al., 2016</span></a><span data-dcnode-id="3895" instrument_node="">).</span></p><span data-dcnode-id="3893" instrument_node="">
</span><p class="mb15" data-dcnode-id="3888"><span data-dcnode-id="3892" instrument_node="">The ability of dogs to integrate information of humans across modalities has also been investigated by using the expectancy-violation procedure (</span><a data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref1"><span data-dcnode-id="3891" instrument_node="">Adachi et al., 2007</span></a><span data-dcnode-id="3889" instrument_node="">). A photograph of either the caregiver’s face or an unfamiliar person’s face was presented to the dog after a vocalization was played. The vocalization used was from the same person or another person, thus matched or mismatched the image. According to the expectancy-violation logic, dogs should be surprised if the visual and auditory cues mismatch and thus look longer than when the two cues match. This is what happened. After hearing the caregiver’s voice when the face of an unfamiliar person appeared (incongruent condition), dogs exhibited extended looking, while in the case when the vocalization and face matched (i.e., came from the same person; congruent condition), the duration of their gaze was comparably briefer. These findings lend support to the hypothesis that dogs recall their caregiver’s face upon hearing the caregiver’s voice.</span></p><span data-dcnode-id="3887" instrument_node="">
</span><p class="mb0" data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Taken together, there is cumulating evidence that dogs obtain social information from their experiences with humans, specifically from their facial expressions. They can recognize and remember individual humans. They understand to a significant degree what these humans attend to, what they are interested in, and what they intend to do next. They can discriminate, individually learn from, and categorize emotional expressions, and they integrate information coming from vocalizations into their understanding of humans and their emotions. Thus, they form multi-modal representations of humans and their emotions, integrating emotions, facial expressions, and vocalizations.</span></p><span data-dcnode-id="3884" instrument_node="">
</span><h4 data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Understanding Human Gestures: How Dogs Learn to Cooperate</span></h4><span data-dcnode-id="3881" instrument_node="">
</span><p class="mb15" data-dcnode-id="3858"><span data-dcnode-id="3880" instrument_node="">Due to domestication programs that had the goal of producing companions that work with or for humans, and thereby follow human commands, dogs may have acquired a special sensitivity to human gestures, speech, and behavior (</span><a data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref82"><span data-dcnode-id="3879" instrument_node="">Miklósi and Topál, 2013</span></a><span data-dcnode-id="3877" instrument_node="">). Neither the chimpanzee, humans’ closest living relative, nor the wolf, dogs’ closest living relative, can understand and use human communicative cues as flexibly as the domestic dog (</span><a data-dcnode-id="3875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref60"><span data-dcnode-id="3876" instrument_node="">Kaminski and Nitzschner, 2013</span></a><span data-dcnode-id="3874" instrument_node="">). This kind of phylogenetic enculturation that took place over thousands of years is continued and amplified in the course of their lifespan, as companion dogs collect an enormous amount of experience during their life with humans (</span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref137"><span data-dcnode-id="3873" instrument_node="">Topál et al., 1998</span></a><span data-dcnode-id="3871" instrument_node="">; </span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref140"><span data-dcnode-id="3870" instrument_node="">Udell and Wynne, 2008</span></a><span data-dcnode-id="3868" instrument_node="">, </span><a data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref141"><span data-dcnode-id="3867" instrument_node="">2010</span></a><span data-dcnode-id="3865" instrument_node="">; </span><a data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref134"><span data-dcnode-id="3864" instrument_node="">Topál and Gácsi, 2012</span></a><span data-dcnode-id="3862" instrument_node="">). A prominent example of how well dogs understand humans and how eager they are to cooperate is the behavior of assistance dogs, especially for leading blind people (</span><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref90"><span data-dcnode-id="3861" instrument_node="">Naderi et al., 2001</span></a><span data-dcnode-id="3859" instrument_node="">). In the latter case, information is not only provided but also accepted by both parties in the course of their joint actions. So what exactly do dogs learn about our behavior, especially about human actions that are unlikely in their species-specific action repertoire? An especially interesting group of actions are those that serve us humans to inform the dog or to guide them.</span></p><span data-dcnode-id="3857" instrument_node="">
</span><p class="mb15" data-dcnode-id="3846"><span data-dcnode-id="3856" instrument_node="">One of the best examples of dogs’ socio-cognitive skills is their ability to properly respond to human cues in a cooperative search context. Numerous studies have shown that dogs can reliably follow a set of basic human cues (e.g., distal/proximate pointing, head turns, and eye glances), as well as being adept at flexibly generalizing this behavior to relatively novel human movements (e.g., “cross-pointing,” leg pointing, gestures with reversed direction of movement, and different arm extensions; </span><a data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref128"><span data-dcnode-id="3855" instrument_node="">Soproni et al., 2002</span></a><span data-dcnode-id="3853" instrument_node="">; </span><a data-dcnode-id="3851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref139"><span data-dcnode-id="3852" instrument_node="">Udell et al., 2008</span></a><span data-dcnode-id="3850" instrument_node="">). In contrast, substituting the hand with a stick or preventing the dog from seeing the hand protruding from the body contour decreased performance, thereby pointing to the importance of the human’s hand. In addition to questions about the cognition involved in dogs’ responding to human cueing, experiments have flourished that systematically tested the contexts, the time-course, breed differences, training effects, and other aspects of this canine competence (review in </span><a data-dcnode-id="3848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref9"><span data-dcnode-id="3849" instrument_node="">Bensky et al., 2013</span></a><span data-dcnode-id="3847" instrument_node="">).</span></p><span data-dcnode-id="3845" instrument_node="">
</span><p class="mb15" data-dcnode-id="3828"><span data-dcnode-id="3844" instrument_node="">Among those actions, perhaps the best studied one is the human pointing gesture. First of all, pointing by humans is a social cue, which in general is more salient or effective than non- social cues like visual markers in terms of signaling the location of something important, like food (</span><a data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref153"><span data-dcnode-id="3843" instrument_node="">Agnetta et al., 2000</span></a><span data-dcnode-id="3841" instrument_node="">; </span><a data-dcnode-id="3839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref139"><span data-dcnode-id="3840" instrument_node="">Udell et al., 2008</span></a><span data-dcnode-id="3838" instrument_node="">). In sharp contrast to apes (</span><a data-dcnode-id="3836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref154"><span data-dcnode-id="3837" instrument_node="">Herrmann and Tomasello, 2006</span></a><span data-dcnode-id="3835" instrument_node="">), this ability to use human cues by dogs is more effective in cooperative contexts (</span><a data-dcnode-id="3833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref148"><span data-dcnode-id="3834" instrument_node="">Wobber and Hare, 2009</span></a><span data-dcnode-id="3832" instrument_node="">) than in competitive ones (</span><a data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref156"><span data-dcnode-id="3831" instrument_node="">Pettersson et al., 2011</span></a><span data-dcnode-id="3829" instrument_node="">).</span></p><span data-dcnode-id="3827" instrument_node="">
</span><p class="mb15" data-dcnode-id="3799"><span data-dcnode-id="3826" instrument_node="">Although so far there is no consensus among researchers about when exactly dogs become competent at understanding the pointing gesture (e.g., </span><a data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref28"><span data-dcnode-id="3825" instrument_node="">Dorey et al., 2010</span></a><span data-dcnode-id="3823" instrument_node="">), it is obvious that individual learning is very effective. Even hand-raised adult wolves are as successful in relying on distal momentary pointing as adult pet dogs (</span><a data-dcnode-id="3821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref36"><span data-dcnode-id="3822" instrument_node="">Gácsi et al., 2009</span></a><span data-dcnode-id="3820" instrument_node="">). Still, positive feedback processes (both evolutionary and epigenetic) have increased the readiness of dogs to attend to humans, providing the basis for dog-human communication. Among dogs, breeds that have been historically bred for working purposes respond to human pointing cues significantly more than breeds that have been bred for companionship (</span><a data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref149"><span data-dcnode-id="3819" instrument_node="">Wobber and Kaminski, 2011</span></a><span data-dcnode-id="3817" instrument_node="">), and breeds that were originally bred for cooperative work (e.g., herding) performed better than those that were bred for independent work (e.g., guarding; </span><a data-dcnode-id="3815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref36"><span data-dcnode-id="3816" instrument_node="">Gácsi et al., 2009</span></a><span data-dcnode-id="3814" instrument_node="">). Furthermore, those with a special training for responding to cues from a distance, like working-gun dogs, utilized a pointing cue significantly more than dogs without such training (</span><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref76"><span data-dcnode-id="3813" instrument_node="">McKinley and Sambrook, 2000</span></a><span data-dcnode-id="3811" instrument_node="">). Independent of breed differences, shelter dogs are less successful than pet dogs at following a distal momentary-pointing gesture (</span><a data-dcnode-id="3809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref139"><span data-dcnode-id="3810" instrument_node="">Udell et al., 2008</span></a><span data-dcnode-id="3808" instrument_node="">).</span><sup data-dcnode-id="3804" id="footnotesuper2"><a data-dcnode-id="3807" id="fn_0002"></a><a class="footnoteanchor" data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn0002"><span data-dcnode-id="3806" instrument_node="">2</span></a></sup><span data-dcnode-id="3803" instrument_node=""> Lastly, dogs’ future use of human cues is highly malleable depending on reinforcement history (</span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref31"><span data-dcnode-id="3802" instrument_node="">Elgier et al., 2009</span></a><span data-dcnode-id="3800" instrument_node="">). All of this does not mean that breed differences (to the extent they exist) are either phylogenetic or ontogenetic – they are most likely both. We should keep this in mind in order to avoid the nature–nurture fallacy.</span></p><span data-dcnode-id="3798" instrument_node="">
</span><p class="mb15" data-dcnode-id="3775"><span data-dcnode-id="3797" instrument_node="">After the first wave of research on dogs’ understanding of human cues, the last decade has devoted work to the question of how subtle (and perhaps unintentional) human cues impact communication interactions between dogs and human (e.g., </span><a data-dcnode-id="3795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref69"><span data-dcnode-id="3796" instrument_node="">Kupan et al., 2011</span></a><span data-dcnode-id="3794" instrument_node="">; </span><a data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref65"><span data-dcnode-id="3793" instrument_node="">Kis et al., 2012</span></a><span data-dcnode-id="3791" instrument_node="">; </span><a data-dcnode-id="3789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref75"><span data-dcnode-id="3790" instrument_node="">Marshall-Pescini et al., 2012</span></a><span data-dcnode-id="3788" instrument_node="">). Furthermore, researchers have attempted to find the key components or features of the human pointing gesture that contribute to dogs’ understanding of it as a communicative action. It may come as a surprise that it is still not clear whether dogs understand the communicative intent of the signaling human or whether they react only to some cuing that directs their attention to the reward. Earlier work showed that dogs are able to rely on relatively novel gestural forms of the human communicative pointing gesture and that they are able to comprehend to some extent the referential nature of human pointing (</span><a data-dcnode-id="3786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref128"><span data-dcnode-id="3787" instrument_node="">Soproni et al., 2002</span></a><span data-dcnode-id="3785" instrument_node="">). However, recent advances in this research indicate that dogs do not necessarily interpret pointing informatively, that is, as simply providing information, but rather as a command, ordering them to move to a particular location. In one study, dogs ignored the human’s gesture if they had better information, and followed children’s pointing just as frequently as they followed adults’ pointing (and ignored the dishonest pointing of both), suggesting, according to the authors, that the amount of own knowledge but not the level of authority affected their behavior (</span><a data-dcnode-id="3783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref118"><span data-dcnode-id="3784" instrument_node="">Scheider et al., 2013</span></a><span data-dcnode-id="3782" instrument_node="">). Both findings suggest that dogs do not see pointing as an imperative command but as an informative or referential cue. This does not mean, however, that dogs use higher levels of reasoning to understand the signal, the more parsimonious explanation is that dogs follow human pointing based on associative learning mechanisms, having learned in their individual ontogeny that the human’s pointing is often connected to rewards (e.g., </span><a data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref150"><span data-dcnode-id="3781" instrument_node="">Wynne et al., 2008</span></a><span data-dcnode-id="3779" instrument_node="">; </span><a data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref28"><span data-dcnode-id="3778" instrument_node="">Dorey et al., 2010</span></a><span data-dcnode-id="3776" instrument_node="">). Still, ongoing research is looking into the question of whether dogs react to human pointing gestures in acts of joint communication and shared information.</span></p><span data-dcnode-id="3774" instrument_node="">
</span><p class="mb15" data-dcnode-id="3763"><span data-dcnode-id="3773" instrument_node="">The latter account of dog’s understanding of human behavior is interesting with respect to the meanwhile hotly debated question of whether dogs, like humans (</span><a data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref132"><span data-dcnode-id="3772" instrument_node="">Tomasello et al., 2005</span></a><span data-dcnode-id="3770" instrument_node="">), understand other individuals’ communicative intent based on some understanding of them as mental agents. Less than a decade ago, the majority of dog researchers were rather skeptical in this respect, assuming that dogs’ interpretation of referential behaviors is based on a fairly restricted set of cues (for instance, </span><a data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref149"><span data-dcnode-id="3769" instrument_node="">Wobber and Kaminski, 2011</span></a><span data-dcnode-id="3767" instrument_node="">; </span><a data-dcnode-id="3765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref62"><span data-dcnode-id="3766" instrument_node="">Kaminski et al., 2012</span></a><span data-dcnode-id="3764" instrument_node="">). They were inclined to propose non-mentalistic accounts, which they thought would be sufficient to explain dogs’ skills with human communication and enough for guiding dogs’ movements within space. Indeed, nothing more would be needed to use dogs during certain activities like hunting and herding.</span></p><span data-dcnode-id="3762" instrument_node="">
