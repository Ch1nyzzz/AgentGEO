</span><p class="mb15" data-dcnode-id="3742"><span data-dcnode-id="3761" instrument_node="">Still, the area between a completely mechanistic and a completely mentalistic account is huge. At the middle ground we may see dogs being sensitive to humans having visual perspectives that are different from their own. For instance, </span><a data-dcnode-id="3759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref13"><span data-dcnode-id="3760" instrument_node="">Bräuer et al. (2004)</span></a><span data-dcnode-id="3758" instrument_node=""> confronted dogs with a situation in which they were forbidden to take a piece of food. Dogs stole significantly more food if they could be seen by the human, even only through a hole in the wall, showing that to some extent dogs seemed to be sensitive to the human’s visual perspective (</span><a data-dcnode-id="3756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref13"><span data-dcnode-id="3757" instrument_node="">Bräuer et al., 2004</span></a><span data-dcnode-id="3755" instrument_node="">; </span><a data-dcnode-id="3753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref63"><span data-dcnode-id="3754" instrument_node="">Kaminski et al., 2009</span></a><span data-dcnode-id="3752" instrument_node="">). But is this sensitivity simply a result of associatively learning to respond to direct cues (e.g., the human can be seen), or can dogs infer from indirect cues what humans can or cannot see? The results of two recent studies indicate the second possibility. In a food-stealing task dogs seem to understand that, when the food (and therefore the area around it) is illuminated, the human can see them and, therefore, they refrain from approaching and stealing the food (</span><a data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref61"><span data-dcnode-id="3751" instrument_node="">Kaminski et al., 2013</span></a><span data-dcnode-id="3749" instrument_node="">). In the second study, dogs showed that they can understand something about a human’s perspective, because, out of two humans informing of where food was hidden, they relied on the one who could see the food hiding process (</span><a data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref74"><span data-dcnode-id="3748" instrument_node="">Maginnity and Grace, 2014</span></a><span data-dcnode-id="3746" instrument_node="">). In this famous “Guesser–Knower task” (</span><a data-dcnode-id="3744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref103"><span data-dcnode-id="3745" instrument_node="">Povinelli et al., 1990</span></a><span data-dcnode-id="3743" instrument_node="">), dogs used cues directly related to the humans’ visual access to the food, like whether their eyes were open, whether they were directed to the hiding locations, and whether the informant remained in the room during the hiding.</span></p><span data-dcnode-id="3741" instrument_node="">
</span><p class="mb15" data-dcnode-id="3736"><span data-dcnode-id="3740" instrument_node="">Very recently we replicated the second study, but added a condition in which no directly observable cues could tell the dogs who would be the knower and thus reliable informant (</span><a data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref14"><span data-dcnode-id="3739" instrument_node="">Catala et al., 2017</span></a><span data-dcnode-id="3737" instrument_node="">). The critical control for behavior-reading, as the less demanding alternative to mind-reading, involved two informants that showed identical looking behavior during the food hiding event. However, due to their different position in the room, only one had the opportunity to see where the food was hidden by a third person. Using geometrical gaze following, dogs could infer who could possibly see the food hiding, and whom to trust. By choosing the help of the knower but ignoring the help of the guesser dogs showed perspective taking.</span></p><span data-dcnode-id="3735" instrument_node="">
</span><p class="mb15" data-dcnode-id="3727"><span data-dcnode-id="3734" instrument_node="">We still have to be careful and avoid over-interpretation. Geometrical gaze following, despite being seen to rest on a cognitively sophisticated mechanism (</span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref33"><span data-dcnode-id="3733" instrument_node="">Fitch et al., 2010</span></a><span data-dcnode-id="3731" instrument_node="">), does not require mind-reading; the recognition of mental states like beliefs, desires, and intentions. The dogs’ confidence in the informant who was in the position to see the relevant event (food hiding) might be a product of generalization from similar situations in everyday life (</span><a data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref138"><span data-dcnode-id="3730" instrument_node="">Udell et al., 2011</span></a><span data-dcnode-id="3728" instrument_node="">). Still, even this does mean something: dogs seem to observe humans closely, form behavioral rules from this and apply them to new contexts. The reluctance of dogs to follow the looking-away person could have been learned in similar, but not identical, situations during their life in the human vicinity. In numerous cases they have seen what consequences human looking behavior has, that it is easier to communicate with humans whose eyes are visible and who look at instead of away from a target, and that they ignore things they have not seen before. It becomes obvious that living with humans puts a lot of intellectual baggage on the individual dog’s learning history. This means, on the other hand, that in order to deal with humans, dogs need opportunities to be with them, observe them, and learn from situations. Still, more research about what dogs understand about the intentions and even beliefs of humans is necessary to confirm dogs’ recent inclusion in the small circle of models of non-human perspective taking in a cooperative and hetero-specific context.</span></p><span data-dcnode-id="3726" instrument_node="">
</span><p class="mb0" data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">Taken together, these findings show us that dogs are sensitive to human gestures, can learn their meaning, and seem eager to cooperate. They understand gestures as imperative commands but also to some extent as informative or referential cues, engaging with humans as communicative partners. Thereby, they do not necessarily subordinate their own perspective to the human one: they take their own (well-informed) knowledge into account when given (ill-informed) commands. Especially dog breeds that have been bred for cooperative work are very good at understanding human gestures and commands. On the other hand, individual training opportunities seem important: shelter dogs for example are less successful than pet dogs at following human pointing gestures. Furthermore, the dogs’ reinforcement history shapes their understanding of human gestures. Dogs have been found to be excellent behavior-readers if given the opportunity. They are highly competent in learning about directly observable but also quite subtle behavioral, gestural, vocal, and attentional cues, which is of high adaptive value for life in the human environment. In addition to their behavior-reading competences they also seem to be sensitive to some mental states in humans. They for example seem to know that humans have visual perspectives different from their own.</span></p><span data-dcnode-id="3723" instrument_node="">
</span><h4 data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Understanding Human Actions: How Dogs Learn Our Social Game</span></h4><span data-dcnode-id="3720" instrument_node="">
</span><p class="mb15" data-dcnode-id="3682"><span data-dcnode-id="3719" instrument_node="">Dogs have impressive capacities for social learning. This competence shines through in almost all forms of social learning, including local enhancement (e.g., </span><a data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref79"><span data-dcnode-id="3718" instrument_node="">Mersmann et al., 2011</span></a><span data-dcnode-id="3716" instrument_node="">), stimulus enhancement (e.g., </span><a data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref68"><span data-dcnode-id="3715" instrument_node="">Kubinyi et al., 2003</span></a><span data-dcnode-id="3713" instrument_node="">), emulation (e.g., </span><a data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref84"><span data-dcnode-id="3712" instrument_node="">Miller et al., 2009</span></a><span data-dcnode-id="3710" instrument_node="">), motor imitation (e.g., </span><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref53"><span data-dcnode-id="3709" instrument_node="">Huber et al., 2009</span></a><span data-dcnode-id="3707" instrument_node="">), selective imitation (</span><a data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref110"><span data-dcnode-id="3706" instrument_node="">Range and Huber, 2007</span></a><span data-dcnode-id="3704" instrument_node="">), and deferred imitation (e.g., </span><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref35"><span data-dcnode-id="3703" instrument_node="">Fugazza and Miklósi, 2014</span></a><span data-dcnode-id="3701" instrument_node="">). They not only benefit from having the opportunity to learn from humans, they actually learn something relevant. For instance, they learn to make a detour to find food (</span><a data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref102"><span data-dcnode-id="3700" instrument_node="">Pongrácz et al., 2001</span></a><span data-dcnode-id="3698" instrument_node="">), learn how to manipulate objects (</span><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref68"><span data-dcnode-id="3697" instrument_node="">Kubinyi et al., 2003</span></a><span data-dcnode-id="3695" instrument_node="">; </span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref101"><span data-dcnode-id="3694" instrument_node="">Pongrácz et al., 2012</span></a><span data-dcnode-id="3692" instrument_node="">), and learn the direction in which a sliding door has been pushed to get some treats (</span><a data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref84"><span data-dcnode-id="3691" instrument_node="">Miller et al., 2009</span></a><span data-dcnode-id="3689" instrument_node="">). In addition, they are able to anticipate the caregiver’s action, and as a result they synchronize their behavior with that of their caregivers (</span><a data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref68"><span data-dcnode-id="3688" instrument_node="">Kubinyi et al., 2003</span></a><span data-dcnode-id="3686" instrument_node="">; </span><a data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref30"><span data-dcnode-id="3685" instrument_node="">Duranton et al., 2017</span></a><span data-dcnode-id="3683" instrument_node="">). This implies that their learning is not only shaped by goal-directedness but influenced by other factors as well. This even applies to strategies that are seemingly unproductive or dysfunctional but nevertheless used by someone they observe.</span></p><span data-dcnode-id="3681" instrument_node="">
</span><p class="mb15" data-dcnode-id="3667"><span data-dcnode-id="3680" instrument_node="">Only recently it has been shown that dogs engage in what has been termed “overimitation,” the copying of unnecessary or causally irrelevant actions (</span><a data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref72"><span data-dcnode-id="3679" instrument_node="">Lyons et al., 2007</span></a><span data-dcnode-id="3677" instrument_node="">). This peculiar form of copying was until that time considered a uniquely human capacity, which likely played a key role in why human culture can accumulate over time (</span><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref16"><span data-dcnode-id="3676" instrument_node="">Clay and Tennie, 2018</span></a><span data-dcnode-id="3674" instrument_node="">). It had been assumed that humans overimitate not only for cognitive and normative reasons, but also to satisfy social motivations. They attempt to “affiliate with or be like the model” (</span><a data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref93"><span data-dcnode-id="3673" instrument_node="">Nielsen, 2006</span></a><span data-dcnode-id="3671" instrument_node="">; </span><a data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref64"><span data-dcnode-id="3670" instrument_node="">Keupp et al., 2013</span></a><span data-dcnode-id="3668" instrument_node="">, 393). If dogs show this behavior as well, it could highlight how deep they are enculturated in our human world because their readiness to overimitate could highlight their affiliation with closely bonded humans as a motivation for behavior.</span></p><span data-dcnode-id="3666" instrument_node="">
</span><p class="mb15" data-dcnode-id="3661"><span data-dcnode-id="3665" instrument_node="">A first study with canines provided suggestive evidence for overimitation (</span><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref58"><span data-dcnode-id="3664" instrument_node="">Johnston et al., 2017</span></a><span data-dcnode-id="3662" instrument_node="">). In the test, the experimenter first established a positive relationship with the subjects by feeding them and then demonstrated how to open a puzzle box, but also performed a causally irrelevant action onto the box (moving a non-functional lever). Surprisingly, half of all tested dogs and dingoes copied both actions, although in further tests some stopped replicating the irrelevant action.</span></p><span data-dcnode-id="3660" instrument_node="">
</span><p class="mb15" data-dcnode-id="3649"><span data-dcnode-id="3659" instrument_node="">In two studies in the Clever Dog Lab in Vienna, the two actions had been separated both spatially and temporarily in order to ensure that the dogs did not confuse their causal natures (</span><a data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref50"><span data-dcnode-id="3658" instrument_node="">Huber et al., 2018</span></a><span data-dcnode-id="3656" instrument_node="">, </span><a data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref54"><span data-dcnode-id="3655" instrument_node="">2020</span></a><span data-dcnode-id="3653" instrument_node="">). The causal action consisted of opening a sliding door that blocked the access to a treat; the irrelevant action involved touching colored dots that were mounted on the wall at a distance. Touching the paper sheet had no effect and was not necessary for getting the treat. Despite its irrelevance, almost half of the dogs replicated the touching action (</span><a data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref50"><span data-dcnode-id="3652" instrument_node="">Huber et al., 2018</span></a><span data-dcnode-id="3650" instrument_node="">).</span></p><span data-dcnode-id="3648" instrument_node="">
</span><p class="mb15" data-dcnode-id="3613"><span data-dcnode-id="3647" instrument_node="">Before dogs had been tested on overimitation, several studies with great apes failed to show similar effects; they did not even show a tendency to copy the demonstrator’s actions that were not necessary to achieve a goal (e.g., </span><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref16"><span data-dcnode-id="3646" instrument_node="">Clay and Tennie, 2018</span></a><span data-dcnode-id="3644" instrument_node="">). Chimpanzees, for instance, were found to act in a purely goal-directed, efficient manner (</span><a data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref46"><span data-dcnode-id="3643" instrument_node="">Horner and Whiten, 2005</span></a><span data-dcnode-id="3641" instrument_node="">). This led </span><a data-dcnode-id="3639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref50"><span data-dcnode-id="3640" instrument_node="">Huber et al. (2018)</span></a><span data-dcnode-id="3638" instrument_node=""> to assume a social rather than a cognitive explanation for overimitation in dogs. Not only their ability to cooperate with, but also to learn from, humans seems to be closely related to their affiliative (e.g., </span><a data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref137"><span data-dcnode-id="3637" instrument_node="">Topál et al., 1998</span></a><span data-dcnode-id="3635" instrument_node="">) and communicative (e.g., </span><a data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref81"><span data-dcnode-id="3634" instrument_node="">Miklósi et al., 1998</span></a><span data-dcnode-id="3632" instrument_node="">) behaviors towards humans. Dogs seem to interpret a test situation as a form of communication or social game (</span><a data-dcnode-id="3630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref127"><span data-dcnode-id="3631" instrument_node="">Soproni et al., 2001</span></a><span data-dcnode-id="3629" instrument_node="">), especially when the human experimenter uses ostensive cues (</span><a data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref68"><span data-dcnode-id="3628" instrument_node="">Kubinyi et al., 2003</span></a><span data-dcnode-id="3626" instrument_node="">; </span><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref136"><span data-dcnode-id="3625" instrument_node="">Topál et al., 2009</span></a><span data-dcnode-id="3623" instrument_node="">; </span><a data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref131"><span data-dcnode-id="3622" instrument_node="">Téglás et al., 2012</span></a><span data-dcnode-id="3620" instrument_node="">; </span><a data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref146"><span data-dcnode-id="3619" instrument_node="">Wallis et al., 2015</span></a><span data-dcnode-id="3617" instrument_node="">). And, like children, they attend more to those humans with whom they also had a close relationship (</span><a data-dcnode-id="3615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref44"><span data-dcnode-id="3616" instrument_node="">Horn et al., 2013</span></a><span data-dcnode-id="3614" instrument_node="">).</span></p><span data-dcnode-id="3612" instrument_node="">
</span><p class="mb15" data-dcnode-id="3592"><span data-dcnode-id="3611" instrument_node="">In a follow-up study, we tested the hypothesis that dogs are more inclined to copy irrelevant actions if shown by the affiliated caregiver rather than by an unfamiliar person. By faithfully replicating </span><a data-dcnode-id="3609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref50"><span data-dcnode-id="3610" instrument_node="">Huber et al. (2018)</span></a><span data-dcnode-id="3608" instrument_node="">, using the identical methods and procedures, but only substituting an unfamiliar person for the dog owner as the demonstrator, we found a measurable decrease in the number of dogs that copied the irrelevant action (</span><a data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref54"><span data-dcnode-id="3607" instrument_node="">Huber et al., 2020</span></a><span data-dcnode-id="3605" instrument_node="">). This finding thus confirmed our hypothesis that overimitation is facilitated by the affiliative relationship between the human demonstrator and the imitating dog, satisfying social motivations. Family dogs may repeat the actions of the human partner either because they want to please their caregiver or because they are inclined to obey by following tacit commands. While the first is clearly a positive characteristic of the dog–human relationship, the second one is ambiguous, although the two are linked. However, it is also possible – although difficult to prove – that the dogs overimitate because they want to be part of our social game, meaning that they want to be included in the social interaction that is happening. This interpretation is based on the assumption that they could have a social motivation to affiliate with the model and want to “be like the model” – as has been proposed in the case of humans to explain their readiness to overimitate (</span><a data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref93"><span data-dcnode-id="3604" instrument_node="">Nielsen, 2006</span></a><span data-dcnode-id="3602" instrument_node="">; </span><a data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref64"><span data-dcnode-id="3601" instrument_node="">Keupp et al., 2013</span></a><span data-dcnode-id="3599" instrument_node="">, 393). Here, to “be like the other” could mean that the dogs want to </span><i data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">behave</span></i><span data-dcnode-id="3596" instrument_node=""> like the other and </span><i data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">be with</span></i><span data-dcnode-id="3593" instrument_node=""> the other. This explanation is compatible with the existence of an urge to please the caregiver or an inclination to obey. The intention to preserve and foster the bond between human and dog, however, may be in itself a motivation behind this behavior. A dog might furthermore trust her caregiver in such a profound way that she sticks to whatever the caregiver proposes, at least for a while. Thus, it takes her some time to detach from the caregiver’s irrelevant strategy and come up with a more efficient one herself. In a team that is usually built on trust and affiliation this makes sense as a social strategy. It is surely difficult to test for such explanations based on trust or affiliation, but that should not be a reason to rule them out right from the beginning. Complex social motivations in animals are clearly getting increased attention from empirical research lately. Disentangling the affiliative bonds between dogs and their caregivers, their scope and meaning, is one of the big challenges we face.</span></p><span data-dcnode-id="3591" instrument_node="">
</span><p class="mb15" data-dcnode-id="3556"><span data-dcnode-id="3590" instrument_node="">Cumulating evidence suggests that the relationship between companion dogs and their human caregivers bears a remarkable resemblance to the parent-infant attachment bond (</span><a data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref7"><span data-dcnode-id="3589" instrument_node="">Archer, 1997</span></a><span data-dcnode-id="3587" instrument_node="">; </span><a data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref137"><span data-dcnode-id="3586" instrument_node="">Topál et al., 1998</span></a><span data-dcnode-id="3584" instrument_node="">; </span><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref37"><span data-dcnode-id="3583" instrument_node="">Gácsi et al., 2001</span></a><span data-dcnode-id="3581" instrument_node="">; </span><a data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref104"><span data-dcnode-id="3580" instrument_node="">Prato-Previde et al., 2003</span></a><span data-dcnode-id="3578" instrument_node="">; </span><a data-dcnode-id="3576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref39"><span data-dcnode-id="3577" instrument_node="">Hare and Tomasello, 2005</span></a><span data-dcnode-id="3575" instrument_node="">; </span><a data-dcnode-id="3573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref105"><span data-dcnode-id="3574" instrument_node="">Prato-Previde and Valsecchi, 2014</span></a><span data-dcnode-id="3572" instrument_node="">). This affiliative bond changes dogs’ behavior in multiple ways. It enables dogs to engage their caregiver’s caregiving system, and it affects the way the dog explores objects and performs in cognitive tasks (</span><a data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref45"><span data-dcnode-id="3571" instrument_node="">Horn et al., 2012</span></a><span data-dcnode-id="3569" instrument_node="">, </span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref44"><span data-dcnode-id="3568" instrument_node="">2013</span></a><span data-dcnode-id="3566" instrument_node="">). Like in children, the bond not only changes the dog’s general attitudes towards humans, it is also selective. For instance, dogs pay more attention to the actions of their caregivers than to the actions of other familiar humans (</span><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref44"><span data-dcnode-id="3565" instrument_node="">Horn et al., 2013</span></a><span data-dcnode-id="3563" instrument_node="">). And again, like in the case of the human parent–infant bond, the quality of the bond has strong influences on all these changes just mentioned (</span><a data-dcnode-id="3561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref89"><span data-dcnode-id="3562" instrument_node="">Myers, 1984</span></a><span data-dcnode-id="3560" instrument_node="">; </span><a data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref3"><span data-dcnode-id="3559" instrument_node="">Ainsworth, 1989</span></a><span data-dcnode-id="3557" instrument_node="">).</span></p><span data-dcnode-id="3555" instrument_node="">
</span><p class="mb0" data-dcnode-id="3550"><span data-dcnode-id="3554" instrument_node="">Taken together, these findings show that dogs pay close attention, not only to the emotions and gestures of humans, but also to their actions. They even overimitate, thus showing a specific copying style that is believed to be a crucial feature of cumulative human culture. Overimitation in dogs is another strong sign for how deeply they attend to humans, especially to those with whom they have close relationships. The bond (which is selective) and the quality of the bond are of great importance for dogs’ general attitude towards humans and their behavioral performance. This can be nicely seen in family dogs interacting with their caregivers. Why dogs attend so closely to the behavior of their caregivers can be explained by different reasons: they surely want to please them and are inclined to obey them. However, they might also understand themselves as partners in our social interactions and are part in our social game. Bonding and affiliation are to be understood as motivations for social interaction. Humans make ample use of the dogs’ readiness to understand their actions: dogs are trained in many different ways and for many different reasons, including agility training, obedience training, and other forms of special-purpose training, in which a precise following of the trainer’s behavior is the rule (</span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref15"><span data-dcnode-id="3553" instrument_node="">Clark and Boyer, 1993</span></a><span data-dcnode-id="3551" instrument_node="">).</span></p><span data-dcnode-id="3549" instrument_node="">
</span><h4 data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">Moral Emotions? From Biology to Philosophy</span></h4><span data-dcnode-id="3546" instrument_node="">
</span><p class="mb15" data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">Dogs are deeply entrenched in interactions with humans, for which they are equipped with outstanding skills to understand human emotions, gestures, and actions. They form cooperative teams with us (e.g., as assistance, rescue, or herding dogs), they engage with us as communicative partners, and they have been enculturated in our society and are clearly part of our social game. Bonds between humans and dogs can be very intense and even resemble parent–infant attachment bonds. It seems to be this specific relationship of shared understanding and close affiliation that is at the heart of the view that dogs are indeed humans’ best friend.</span></p><span data-dcnode-id="3543" instrument_node="">
</span><p class="mb15" data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">Besides the capacities we mentioned there might be other, social and cognitive abilities in dogs, some of which we do not know much about so far. Possible candidates for such capacities could be empathy, guilt, or jealousy.</span></p><span data-dcnode-id="3540" instrument_node="">
</span><p class="mb15" data-dcnode-id="3490"><span data-dcnode-id="3539" instrument_node="">Empathy can be understood, following de Waal’s Russian doll model, as an umbrella term that covers all those ways in which one can be affected by others’ emotions. The capacity for emotional contagion lies at its core, and outer layers of this “Russian doll” can incorporate more cognitively demanding capacities, such as theory of mind, perspective-taking, and sympathetic concern (e.g., </span><a data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref26"><span data-dcnode-id="3538" instrument_node="">de Waal, 2008</span></a><span data-dcnode-id="3536" instrument_node="">). While the available evidence suggests that dogs are capable of emotional contagion (</span><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref129"><span data-dcnode-id="3535" instrument_node="">Sümegi et al., 2014</span></a><span data-dcnode-id="3533" instrument_node="">; </span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref152"><span data-dcnode-id="3532" instrument_node="">Yong and Ruffman, 2014</span></a><span data-dcnode-id="3530" instrument_node="">; </span><a data-dcnode-id="3528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref97"><span data-dcnode-id="3529" instrument_node="">Palagi et al., 2015</span></a><span data-dcnode-id="3527" instrument_node="">; </span><a data-dcnode-id="3525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref108"><span data-dcnode-id="3526" instrument_node="">Quervel-Chaumette et al., 2016</span></a><span data-dcnode-id="3524" instrument_node="">; </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref49"><span data-dcnode-id="3523" instrument_node="">Huber et al., 2017</span></a><span data-dcnode-id="3521" instrument_node="">; </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref11"><span data-dcnode-id="3520" instrument_node="">Bourg et al., 2020</span></a><span data-dcnode-id="3518" instrument_node="">), researchers are still on the look-out for empathy-based complex behavior. First results indicate, for example, that there is “empathetically-motivated prosocial helping in dogs” and that dogs “are most likely to provide help to a human in need if they are able to focus on the human’s need instead of their own personal distress” (</span><a data-dcnode-id="3516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref117"><span data-dcnode-id="3517" instrument_node="">Sanford et al., 2018</span></a><span data-dcnode-id="3515" instrument_node="">, 386). However, such results stand against mixed evidence on dogs’ helping behavior and against the need to clarify the underlying emotions and motivations (see e.g., </span><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref73"><span data-dcnode-id="3514" instrument_node="">Macpherson and Roberts, 2006</span></a><span data-dcnode-id="3512" instrument_node="">, or the discussions in </span><a data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref117"><span data-dcnode-id="3511" instrument_node="">Sanford et al., 2018</span></a><span data-dcnode-id="3509" instrument_node=""> and </span><a data-dcnode-id="3507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref2"><span data-dcnode-id="3508" instrument_node="">Adriaense et al., 2020</span></a><span data-dcnode-id="3506" instrument_node="">). Because empathy could motivate moral behavior like helping, philosophers of animal minds and animal ethicists discuss it as a moral emotion that animals could possess (</span><a data-dcnode-id="3504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref116"><span data-dcnode-id="3505" instrument_node="">Rowlands, 2012</span></a><span data-dcnode-id="3503" instrument_node="">; </span><a data-dcnode-id="3501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref85"><span data-dcnode-id="3502" instrument_node="">Monsó, 2015</span></a><span data-dcnode-id="3500" instrument_node="">, </span><a data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref86"><span data-dcnode-id="3499" instrument_node="">2017</span></a><span data-dcnode-id="3497" instrument_node="">; </span><a data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref87"><span data-dcnode-id="3496" instrument_node="">Monsó et al., 2018</span></a><span data-dcnode-id="3494" instrument_node="">; </span><a data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref10"><span data-dcnode-id="3493" instrument_node="">Benz-Schwarzburg et al., 2019</span></a><span data-dcnode-id="3491" instrument_node="">).</span></p><span data-dcnode-id="3489" instrument_node="">
</span><p class="mb15" data-dcnode-id="3448"><span data-dcnode-id="3488" instrument_node="">Two other interesting candidates for moral motivations that could also shape the social interactions and relationships between dogs and humans are guilt (see e.g., </span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref130"><span data-dcnode-id="3487" instrument_node="">Tangney et al., 2007</span></a><span data-dcnode-id="3485" instrument_node="">; </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref106"><span data-dcnode-id="3484" instrument_node="">Prinz and Nichols, 2010</span></a><span data-dcnode-id="3482" instrument_node="">) and jealousy (see e.g., </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref34"><span data-dcnode-id="3481" instrument_node="">Fredericks, 2012</span></a><span data-dcnode-id="3479" instrument_node="">; </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref67"><span data-dcnode-id="3478" instrument_node="">Kristjánsson, 2015</span></a><span data-dcnode-id="3476" instrument_node="">). However, the evidence here is ambiguous or non-existent. There is to our knowledge not a single paper that provides strong empirical evidence of dogs feeling guilty. On the contrary, preliminary evidence suggests that dogs are not capable of guilt, despite many owners’ perception to the contrary (</span><a data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref47"><span data-dcnode-id="3475" instrument_node="">Horowitz, 2009</span></a><span data-dcnode-id="3473" instrument_node="">; </span><a data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref41"><span data-dcnode-id="3472" instrument_node="">Hecht et al., 2012</span></a><span data-dcnode-id="3470" instrument_node="">; </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref96"><span data-dcnode-id="3469" instrument_node="">Ostojić et al., 2015</span></a><span data-dcnode-id="3467" instrument_node="">). Owners indeed often interpret their dogs’ behavior as guilt (</span><a data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref41"><span data-dcnode-id="3466" instrument_node="">Hecht et al., 2012</span></a><span data-dcnode-id="3464" instrument_node="">), something that can be ethically problematic: “Failure to read these gestures for what they are, or even worse, misinterpreting gestures of appeasement as a sign of the dog feeling guilty, are likely to lead to inappropriate responses on the part of the human in the situation and hence lead to escalation of the behavior resulting in lunging, snapping, and/or biting” (</span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref155"><span data-dcnode-id="3463" instrument_node="">Mills et al., 2014</span></a><span data-dcnode-id="3461" instrument_node="">). The case of jealousy is similar. We are just starting to investigate this emotion in dogs and face a limited body of research results. Interesting insights were reported by </span><a data-dcnode-id="3459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref40"><span data-dcnode-id="3460" instrument_node="">Harris and Prouvost (2014)</span></a><span data-dcnode-id="3458" instrument_node=""> who believe that at least some “primordial” form of jealousy, which we know from human infants, occurs in dogs as well, or from </span><a data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref20"><span data-dcnode-id="3457" instrument_node="">Cook et al. (2018)</span></a><span data-dcnode-id="3455" instrument_node=""> who investigate jealousy in dogs </span><i data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">via</span></i><span data-dcnode-id="3452" instrument_node=""> fMRI methods. However, the results are heavily debated (see e.g., </span><a data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref145"><span data-dcnode-id="3451" instrument_node="">Vonk, 2018</span></a><span data-dcnode-id="3449" instrument_node="">).</span></p><span data-dcnode-id="3447" instrument_node="">
</span><p class="mb15" data-dcnode-id="3424"><span data-dcnode-id="3446" instrument_node="">Interest in the named abilities in animals is rising among philosophers. This is at least partly because the presence of moral emotions in animals would mean that animals qualify as moral subjects, that is, individuals who sometimes behave on the basis of moral motivations (</span><a data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref116"><span data-dcnode-id="3445" instrument_node="">Rowlands, 2012</span></a><span data-dcnode-id="3443" instrument_node="">). Moral emotions thus mark a minimal form of animal morality. This is ethically important. Indeed, it has been argued that minimal morality gives us a reason to owe these animals a special moral consideration, one that goes beyond the welfare approach that we so often use to evaluate our treatment of animals, be it pigs or dogs, cows, or any other non-human species (</span><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref87"><span data-dcnode-id="3442" instrument_node="">Monsó et al., 2018</span></a><span data-dcnode-id="3440" instrument_node="">; </span><a data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref92"><span data-dcnode-id="3439" instrument_node="">Nawroth et al., 2019</span></a><span data-dcnode-id="3437" instrument_node="">). If animals are moral subjects, profound ethical implications could follow, for example in the shape of animal rights (</span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref116"><span data-dcnode-id="3436" instrument_node="">Rowlands, 2012</span></a><span data-dcnode-id="3434" instrument_node="">), something we have already seen defended in ethical debates surrounding great apes (see e.g., </span><a data-dcnode-id="3432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref5"><span data-dcnode-id="3433" instrument_node="">Andrews et al., 2018</span></a><span data-dcnode-id="3431" instrument_node="">). However, capacities such as empathy, guilt, or jealousy are very difficult to define conceptually (from a philosophical as well as a biological perspective). This is the case even if researchers pay much attention to them, as can be seen in the case of empathy, of which it has been said that “there are probably nearly as many definitions … as people working on the topic” (</span><a data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref25"><span data-dcnode-id="3430" instrument_node="">de Vignemont and Singer, 2006</span></a><span data-dcnode-id="3428" instrument_node="">, 435). </span><a data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref2"><span data-dcnode-id="3427" instrument_node="">Adriaense et al. (2020</span></a><span data-dcnode-id="3425" instrument_node="">, 62) conclude that we still face the challenge here of “closing the gap between theoretical concepts and empirical evidence.” The emotions of guilt and jealousy face similar definitional problems that will surface more and more when research into them proceeds.</span></p><span data-dcnode-id="3423" instrument_node="">
</span><p class="mb0" data-dcnode-id="3409"><span data-dcnode-id="3422" instrument_node="">Research into moral emotions and other social phenomena in dogs will surely add to our understanding of their perception and behavior in the future. Perhaps we should err on the side of caution and assume that dogs are indeed moral subjects. However, based on the current state of the evidence we cannot make conclusive claims, yet. In addition, the discussion still needs conceptual input, and so we call here for interdisciplinary research on this topic. While embarking on this challenge, we should constantly re-evaluate how far our ethical thinking leads us with reference to less controversial research results, as well as maintain an open mind towards challenging inherited definitions of different capacities when there are good conceptual reasons to do so. After all, the philosophical debate on social capacities in animals increasingly leans towards de-intellectualized accounts of such abilities in animals, including moral abilities (</span><a data-dcnode-id="3420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref116"><span data-dcnode-id="3421" instrument_node="">Rowlands, 2012</span></a><span data-dcnode-id="3419" instrument_node="">; </span><a data-dcnode-id="3417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref85"><span data-dcnode-id="3418" instrument_node="">Monsó, 2015</span></a><span data-dcnode-id="3416" instrument_node="">) and towards an investigation into their ethical relevance (</span><a data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref87"><span data-dcnode-id="3415" instrument_node="">Monsó et al., 2018</span></a><span data-dcnode-id="3413" instrument_node="">; </span><a data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref10"><span data-dcnode-id="3412" instrument_node="">Benz-Schwarzburg et al., 2019</span></a><span data-dcnode-id="3410" instrument_node="">). In any case, our point in the following section is that we already face good reasons to arrive at a more profound ethical consideration of dogs than we often grant them. We will settle with the kind of ethical implications that we can derive safely by focusing on the kind of research results summarized in sections “Understanding Human Emotions: How Dogs Read Our Faces and Listen to Our Voices, Understanding Human Gestures: How Dogs Learn to Cooperate, and Understanding Human Actions: How Dogs Learn Our Social Game”. We believe that the mentioned capacities suffice to argue that dogs have a profound understanding of human gestures, actions and emotions. They clearly bond with us and enter into relationships of mutual understanding and meaningful interaction. Such relationships have repeatedly been described as characterized by attachment and close bonds. Let us build an ethical argument on that.</span></p><span data-dcnode-id="3408" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="3407" id="h4" name="h4"></a><span data-dcnode-id="3406" instrument_node="">
</span><h2 data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">Characterizing the Human–Dog Relationship: Ethical Perspectives</span></h2><span data-dcnode-id="3403" instrument_node="">
</span><p class="mb15" data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">Until now, we have very much emphasized a positive outlook on the human–dog relationship. It would be a one-eyed view if we would only mention the obviously positive aspects. For any ethical discussion concerning pet dogs we need to understand that, on top of the affiliative motive, the behavior of these animals vis-à-vis their caregiver is also determined by their dependency on us and thus on educational and normative influences that need to be examined carefully. In the household, humans educate the dog regarding what to do and what not to do, involving actions that are far from causally transparent, and may be purely arbitrary or – even less positively – exclusively human-centered. In dog training, for example, a precise following of the trainer’s orders, commands, or behavior is the rule – and in fact expected from the dog, independently of the bonds at play, no matter what the dog’s own preferences for some humans over others are, and irrespective of the dog’s own intentions and desires. Are not there a lot of ethical challenges involved in the fact that dogs are so much part of the human world?</span></p><span data-dcnode-id="3400" instrument_node="">
</span><p class="mb0" data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">In what follows, we will engage in a brief ethical discussion of the human-dog relationship. As a necessary first step, we will characterize the human-dog relationship as one in which there is a necessary power imbalance, where one of the partners is always more powerful than the other. Following that, we will give an overview of the ethical responsibilities that arise out of this inequality when we consider it in connection to how dogs perceive us and to the pervasive influence that we can have on their character and capabilities. The owner or caregiver has certain duties, we will argue, that go beyond ensuring an adequate welfare of their pet.</span></p><span data-dcnode-id="3397" instrument_node="">
</span><h3 data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">The Human-Dog Relationship as a Power-Relation</span></h3><span data-dcnode-id="3394" instrument_node="">
</span><p class="mb15" data-dcnode-id="3377"><span data-dcnode-id="3393" instrument_node="">Ethicists have argued that the human–dog relationship oscillates between two extremes: dogs, like other companion animals, are at the same time “pampered” and “enslaved,” something that constitutes a “moral dilemma” (</span><a data-dcnode-id="3391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref57"><span data-dcnode-id="3392" instrument_node="">Irvine, 2004</span></a><span data-dcnode-id="3390" instrument_node="">). “Enslaved” in this instance is to be understood as a philosophical term, coming from an ethical approach that departs from the fact that companion animals exist for human purposes and are defined by the law as our property (</span><a data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref57"><span data-dcnode-id="3389" instrument_node="">Irvine, 2004</span></a><span data-dcnode-id="3387" instrument_node="">, 5). We can add aspects of dominance, ranging from a restriction in personal freedom (covering all aspects of a dog’s life, like feeding regimes, mating choices, or neutering policies) to forms of labor (like the use of dogs as sheep-herding, guiding, sniffing or rescuing staff). Most importantly, it is questionable whether dogs give in any form their free and informed consent to fulfill the tasks we assign to them. Dogs are clearly capable of cooperating with humans (skills-wise) and often happily seem to do so. But freedom (even in a minimal sense) is about opportunities and choices, and how much of these do they have? As we are talking about an animal that is very much dependent on her caregiver’s choices and who is being purposefully bred as well as (often quite heavily) trained to fulfill certain human-oriented tasks, the question seems warranted (</span><a data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref18"><span data-dcnode-id="3386" instrument_node="">Cochrane, 2009</span></a><span data-dcnode-id="3384" instrument_node="">, </span><a data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref19"><span data-dcnode-id="3383" instrument_node="">2012</span></a><span data-dcnode-id="3381" instrument_node="">; </span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref120"><span data-dcnode-id="3380" instrument_node="">Schmidt, 2015</span></a><span data-dcnode-id="3378" instrument_node="">).</span></p><span data-dcnode-id="3376" instrument_node="">
</span><p class="mb15" data-dcnode-id="3371"><span data-dcnode-id="3375" instrument_node="">Thereby, it seems possible, and even morally desirable, to grant an animal more choices and thus more freedom. </span><a data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref151"><span data-dcnode-id="3374" instrument_node="">Yeates (2015</span></a><span data-dcnode-id="3372" instrument_node="">, 168) identifies a range of situations where we should from a normative perspective respect the animal’s choice. These are for example situations in which we ourselves lack “accurate knowledge of the animal’s subjective experiences,” or in which we do “not know what will lead to desirable experiences or allow for the avoidance of undesirable ones,” when we are “biased” or “less aware of the animal’s specific situation.” He argues, furthermore, that we should better turn to respect the animal’s choice when we ourselves “cannot appreciate all elements comprehensively, including considering any value to the animal being allowed to make and implement a choice, such as where a lack of control or liberty would be unpleasant or where an animal would usefully learn from the process of choice-making.” Such an approach ultimately aims to reduce the power hierarchy and “set up situations that empower animals” to make their own choices.</span></p><span data-dcnode-id="3370" instrument_node="">
</span><p class="mb15" data-dcnode-id="3359"><span data-dcnode-id="3369" instrument_node="">Up to now, the high amount of paternalism and training involved in the human–dog relationship gives rise to a clear power relation. For sure, more and more trainers adopt training methods that turn away from a behavioristic understanding and work in a scientifically informed manner. But the many different perspectives on suitable training methods and the many noncertified methods and noncertified institutions in the dog training business lead to much diversity in the field. Thus, even though the field has moved forward in the past few years, it seems difficult to assess how scientifically informed the majority of trainers (let alone owners) actually treats and trains their dogs. Also, some dog trainers with massive public outreach even add on the mentioned questionable understanding by arguing that all dog training is ultimately about teaching the dog that the human is pack leader. Cesar Milan, one of the most influential and controversial dog trainers, describes “Pack Leadership” as a core principle of his training strategy, to be applied in the following way: “Establish your position as pack leader by asking your dog to work. Take him on a walk before you feed him. And just as you do not give affection unless your dog is in a calm-submissive state, do not give food until your dog acts calm and submissive” (</span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref83"><span data-dcnode-id="3368" instrument_node="">Milan, 2019</span></a><span data-dcnode-id="3366" instrument_node="">). Still, even without such an idea of discipline and submission, other forms of dog training based on purely positive reinforcement also resort to methods that heavily impact on the dog’s will, her choices, preferences, and intentions. Some methods tie almost all feeding to training steps by reinforcing every positive behavior with food, sometimes while putting the dog otherwise on food deprivation. Lindsay describes in his </span><i data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">Handbook of Applied Dog Behavior and Training</span></i><span data-dcnode-id="3363" instrument_node=""> that training only works if the animal is “in a state of need” that can be satisfied only after the dog behaves in a “predetermined way.” Therefore, “combining food deprivation together with the presentation of special treats produces the best training results. The term deprivation means scheduling training sessions before meals rather than after them. The meal itself can be given to reinforce the overall training session as a sort of jackpot” (</span><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref71"><span data-dcnode-id="3362" instrument_node="">Lindsay, 2000</span></a><span data-dcnode-id="3360" instrument_node="">, 249).</span></p><span data-dcnode-id="3358" instrument_node="">
</span><p class="mb15" data-dcnode-id="3350"><span data-dcnode-id="3357" instrument_node="">We have come across a substantial reinterpretation of affection as something that is not given to the dog “unless the dog is in a calm-submissive state” in </span><a data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref83"><span data-dcnode-id="3356" instrument_node="">Milan’s (2019)</span></a><span data-dcnode-id="3354" instrument_node=""> training procedure and another substantial reinterpretation of feeding the dog in the sense that meals become a “sort of jackpot” in classical, modern reinforcement training. These narratives are normatively relevant because they show the tight entanglement of power, predetermination, and submission in dog training, expressed by a language in which dogs “work” for us. No matter the method, all training ultimately educates the dogs into a human world with the aim that they function properly, that is, according to valued and dis-valued behavior in this setting: they are not supposed to chew on our furniture, pee on our carpet, or chase the neighbor’s cat. Spaces where a dog can, for example, run free without a muzzle or leash and interact with other dogs are clearly restricted as well as rare, at least in urban settings, where numbers of dogs have been increasing dramatically over the past decades, standing currently at well over 60 million in the United States alone (</span><a data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref6"><span data-dcnode-id="3353" instrument_node="">American Pet Products Manufacturers Association, 2020</span></a><span data-dcnode-id="3351" instrument_node="">).</span></p><span data-dcnode-id="3349" instrument_node="">
</span><p class="mb15" data-dcnode-id="3344"><span data-dcnode-id="3348" instrument_node="">We are aware that this understanding draws a rather sobering picture of the often romanticized human-dog relationship. However, pet keeping is not a given or simply a result of a natural affinity between humans and animals. It is a historically contingent practice that has also been circumscribed by social class and gender constructs (</span><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref57"><span data-dcnode-id="3347" instrument_node="">Irvine, 2004</span></a><span data-dcnode-id="3345" instrument_node="">, 19). This is a sociological point that links with ethical and biological perspectives: like all our relationships with companion animals, the human-dog relationship depends on how we define animals, and for that our knowledge about their abilities and needs seems crucial. For sure, it is also crucial how ready we are to take their perspective into consideration. For this, questions of power and hierarchy are relevant.</span></p><span data-dcnode-id="3343" instrument_node="">
</span><p class="mb15" data-dcnode-id="3336"><span data-dcnode-id="3342" instrument_node="">So let us start from the premise that the human-dog relationship can be described as a human-dominated power relation in which dogs often have little choices and humans perceive themselves on a spectrum between guardians and leader of the pack. Given this power relation at place, and given a generalized lack of awareness of the latest research on dog social cognition, humans tend to interpret communicational misunderstandings as problems of the dog (e.g., in the sense of non-obedience). They consequently tend to interpret the behavioral reactions of the dog to such miscommunication not as a result of miscommunication (for which they themselves are also co-responsible) but again as a problem of the dog, who is, for example, claimed to be aggressive. Humans need to take responsibility here. We are left with the necessity to better understand how dogs perceive us and what they are capable of. Our summary of the socio-cognitive abilities of dogs only shows the tip of the iceberg of what these animals can do. We should not forget that they are quite different from ourselves with respect to their perceptual repertoire: humans, other than dogs,</span><sup data-dcnode-id="3338" id="footnotesuper3"><a data-dcnode-id="3341" id="fn_0003"></a><a class="footnoteanchor" data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn0003"><span data-dcnode-id="3340" instrument_node="">3</span></a></sup><span data-dcnode-id="3337" instrument_node=""> rely much more on vision, are relatively insensitive to odors, and so forth. Taking our visual perceptions, our facial expressions, and our emotions and actions into account to the extent dogs obviously do, renders their social life rather complicated. Living in a human’s world can thus be very demanding for dogs and some dogs might be overwhelmed. It is our responsibility to gain awareness of the challenges we face them with.</span></p><span data-dcnode-id="3335" instrument_node="">
</span><p class="mb0" data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">In addition, we need to deepen our understanding of the kind of relationship we offer them and the power relations characterizing it. Here too, gaining awareness means shifting the focus from the dog to the human, and consequently taking responsibility. We need to arrive at a better understanding of the range of concrete duties dog owners have. In what follows, we will argue that humans are to a large degree responsible for who their dog turns out to be and that they have a duty to ensure her adequate flourishing. Not only this, the characteristics of the human-dog relationship point to a propensity towards trust on behalf of the dog, and consequently entail a duty not to betray that trust.</span></p><span data-dcnode-id="3332" instrument_node="">
</span><h3 data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">The Duties of Dog Caregivers</span></h3><span data-dcnode-id="3329" instrument_node="">
</span><p class="mb15" data-dcnode-id="3312"><span data-dcnode-id="3328" instrument_node="">In animal ethics, there is a generalized agreement that humans have negative duties towards (at least some) animals. Negative duties refer to duties not to cause unjustified harm, a position that can be defended from a number of ethical theories, including utilitarianism (</span><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref123"><span data-dcnode-id="3327" instrument_node="">Singer, 2009</span></a><span data-dcnode-id="3325" instrument_node="">), deontology (</span><a data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref115"><span data-dcnode-id="3324" instrument_node="">Regan, 2004</span></a><span data-dcnode-id="3322" instrument_node="">), and virtue ethics (</span><a data-dcnode-id="3320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref56"><span data-dcnode-id="3321" instrument_node="">Hursthouse, 2011</span></a><span data-dcnode-id="3319" instrument_node="">). However, negative duties do not exhaust all that morality demands from us. In human-human relationships, we are also often required to assist someone in need, even if we are not responsible for their harm. For instance, if we witness someone falling onto the train tracks at an underground station, we are morally required to do our best to save them, even though their peril is not our own fault. These are known as positive duties. In those cases, in which there is a pre-existing special relationship, these positive duties are even stronger. Parents are not only required not to harm their children and to assist them when they are in need, they are also required to do all that is in their power to ensure that they have a good life. This means providing them with food and healthcare, but also ensuring that they receive a proper education, that they have opportunities for exercising their creativity and making friends, that they feel loved and cared for, and so on. In short, that they flourish as the sort of beings they are. </span><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref116"><span data-dcnode-id="3318" instrument_node="">Rowlands (2012)</span></a><span data-dcnode-id="3316" instrument_node=""> considers that this treatment is owed as a matter of respect: “to respect an individual is, fundamentally, to respect it as the kind of individual it is” (</span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref116"><span data-dcnode-id="3315" instrument_node="">Rowlands, 2012</span></a><span data-dcnode-id="3313" instrument_node="">, 249). If, indeed, the dog-human relationship entails forms of attachment that resemble our bonds with human children, the question then arises: what would respecting our dogs as the kinds of beings they are look like?</span></p><span data-dcnode-id="3311" instrument_node="">
</span><p class="mb15" data-dcnode-id="3307"><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref98"><span data-dcnode-id="3310" instrument_node="">Palmer (2010)</span></a><span data-dcnode-id="3308" instrument_node=""> has argued that when considering the duties that we owe to other animals, we cannot follow a one-size-fits-all logic, even in those cases where different species have similar cognitive capacities. She argues that the surrounding context, the history, and the pre-existing relation are fundamental in determining the kinds of duties that we owe to a particular animal. With regards to those animals who live independently from us in the wild, we only have negative duties not to harm them. In contrast, those animals with whom we have some sort of special relationship will, in addition, generate positive duties. If we consider the case of dogs, this is clearly going to be one of the most demanding human–animal relations from a moral perspective. As we have already discussed, dogs are the oldest domesticated species. This history has generated a very high degree of vulnerability and dependency in those dogs that live in our households. They depend on us for food, shelter, and medical care. Indeed, they depend on us for sheer survival. As we have seen, dogs also have a highly malleable nature and we can shape their character to a large degree. Dogs play very little part in choosing their caregiver, and still the person they end up with will have a profound influence on their life and on the sort of individual they turn out to be. So, they also depend on us to a much deeper level. This, coupled with the aforementioned power relation, generates positive duties that go beyond simply ensuring that the dogs in our household have a good welfare.</span></p><span data-dcnode-id="3306" instrument_node="">
</span><p class="mb15" data-dcnode-id="3301"><span data-dcnode-id="3305" instrument_node="">We are responsible for our dogs’ lives from beginning to end, and this means that we will have an immense causal influence on the quality that their life ultimately has. This generates a duty to ensure that our dogs lead a good life. But what does it mean for a life to be good? Different philosophical traditions have offered different answers to this question (for an overview of these different theories see </span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref23"><span data-dcnode-id="3304" instrument_node="">Crisp, 2017</span></a><span data-dcnode-id="3302" instrument_node="">). From the perspective of a common theory known as hedonism, a good life is one in which there is, overall, more positive subjective experiences than negative subjective experiences. For a dog this might mean a life in which she is in general happy and has very few painful or fearful experiences. From the perspective of desire-satisfaction theories, in contrast, a life is good if the individual’s most important desires are fulfilled. For a dog, this could mean a life in which she gets to do all the things that she really cares about. We believe that neither of these two options gives a satisfactory account of what it would mean for a dog to have a good life.</span></p><span data-dcnode-id="3300" instrument_node="">
</span><p class="mb15" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">It is easy to see why the desire-satisfaction account of a good life is not adequate, at least in the case of dogs. This is due to the mismatch between their biological roots as wolves and the fact that they have been domesticated. This history has led to a situation in which, firstly, not all the desires that dogs have are actually good for them. For instance, many dogs, if let by their caregivers, will eat much more than they actually need, and consequently develop different health problems in the long run. The tendency to eat more than needed might be good for a carnivore who lives in the wild and does not get to eat very often, but for a pet in a household with unlimited access to food, it can significantly worsen her quality of life. Secondly, it is not just important to determine what dogs desire, but also what are the reasons behind those desires. As we saw before, dogs are very often eager to cooperate with humans, but it is difficult to see what the exact motivation behind this eagerness is: Is it the expectation of a reward? Is it fear of punishment?, or Is it a desire to please the caregiver or a desire to be part of the social game? The history of domestication has also led to dogs being shaped to be eager to cooperate with us. In this sense, many of their desires are the result of a process of selective breeding that could be comparable to a process of indoctrination in humans. Therefore, from the fact that a dog has a desire, the conclusion that it is good to satisfy this desire does not automatically follow.</span></p><span data-dcnode-id="3297" instrument_node="">
</span><p class="mb15" data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">Desire-satisfaction theories thus cannot provide us with a satisfactory account of what it means for a dog to lead a good life. But what about hedonism? Surely a life in which a dog is overall happy is a good life for that dog? We believe that hedonism, just like desire-satisfaction theories, captures an important aspect of what it means to lead a good life, but cannot give us the full story. In philosophical terms, having more positive than negative subjective experiences throughout one’s lifetime is a necessary but not sufficient condition for a good life. Imagine a dog, we can call her Frida, whose caregiver decides to keep her inside the house her whole life to protect her from possible dangers and fearful stimuli she might encounter outside. Frida is provided with an adequate diet, a comfortable bed in which she can rest, and enough toys to keep her entertained. The extremely controlled environment she is kept in ensures that she very rarely experiences any accidents or illnesses, stress or pain. If we look at Frida’s life as a whole, we will see that she is extremely pampered, to say it in Irvine’s words, and overall happy. But is this a good life?</span></p><span data-dcnode-id="3294" instrument_node="">
</span><p class="mb15" data-dcnode-id="3275"><span data-dcnode-id="3293" instrument_node="">We believe that Frida’s life, while certainly far from terrible, is not a good life. This has to do with the fact that, by not being allowed to encounter challenges, to interact with con- and heterospecifics, and to explore the outside world, Frida is prevented from flourishing as the type of being that she is. As we saw in the previous sections, dogs have many amazing socio-cognitive skills but these are largely dependent on how we have shaped them during domestication and what they learn from interactions with humans during ontogeny. We believe that caregivers have a positive duty to ensure that these capabilities can develop, not only so that the animals can better cope with the challenges they might encounter in their lives, but also because it is a good thing for them to be allowed to flourish as the type of being they are, an idea that can be captured, for instance, using the capabilities approach (</span><a data-dcnode-id="3291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref94"><span data-dcnode-id="3292" instrument_node="">Nussbaum, 2007</span></a><span data-dcnode-id="3290" instrument_node="">; </span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23ref87"><span data-dcnode-id="3289" instrument_node="">Monsó et al., 2018</span></a><span data-dcnode-id="3287" instrument_node="">).</span><sup data-dcnode-id="3283" id="footnotesuper4"><a data-dcnode-id="3286" id="fn_0004"></a><a class="footnoteanchor" data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn0004"><span data-dcnode-id="3285" instrument_node="">4</span></a></sup><span data-dcnode-id="3282" instrument_node=""> Al
