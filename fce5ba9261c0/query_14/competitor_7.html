</span><div class="col span_9" data-dcnode-id="546" id="post-area"><article class="post-3260 post type-post status-publish format-standard hentry category-culture category-translation tag-cross-cultural-communication tag-emoji tag-localization tag-localized-content tag-translation" data-dcnode-id="609" id="post-3260"><span data-dcnode-id="944" instrument_node="">

</span><div class="wp-caption aligncenter" data-dcnode-id="938" id="attachment_3288" style="width: 810px"><img alt="Woman holding emoji balloon " class="size-full wp-image-3288" data-dcnode-id="941" height="800" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/photo-1524117074681-31bd4de22ad3.jpg&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/photo-1524117074681-31bd4de22ad3.jpg 800w, https://en.localconcept.com/wp-content/uploads/2019/07/photo-1524117074681-31bd4de22ad3-150x150.jpg 150w, https://en.localconcept.com/wp-content/uploads/2019/07/photo-1524117074681-31bd4de22ad3-300x300.jpg 300w, https://en.localconcept.com/wp-content/uploads/2019/07/photo-1524117074681-31bd4de22ad3-768x768.jpg 768w, https://en.localconcept.com/wp-content/uploads/2019/07/photo-1524117074681-31bd4de22ad3-50x50.jpg 50w, https://en.localconcept.com/wp-content/uploads/2019/07/photo-1524117074681-31bd4de22ad3-100x100.jpg 100w, https://en.localconcept.com/wp-content/uploads/2019/07/photo-1524117074681-31bd4de22ad3-500x500.jpg 500w" width="800"><p class="wp-caption-text" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Lidya Nada via Unsplash</span></p></div><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Emojis are undeniably fun, and sometimes they ‘speak louder than words’. They enable us to add emotional context to plain text, such as humor, brevity or irony. They&nbsp;illustrate non-verbal cues that could be expressed in face-to-face communication&nbsp;including gestures and facial expressions. However, when creating content for a multicultural audience, it’s important to consider how different cultures perceive symbols, colors, and body language.</span></p><span data-dcnode-id="934" instrument_node="">
</span><h2 data-dcnode-id="931"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">The most popular emojis around the world</span></strong></h2><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">Although being an “official” emoji translator just became a thing in 2017, a study done by </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.swiftkey.com/americans-love-skulls-brazilians-love-cats-swiftkey-emoji-meanings-report/"><span data-dcnode-id="928" instrument_node="">Swiftkey </span></a><span data-dcnode-id="926" instrument_node="">in 2015 uncovered insights to how different languages around the globe are using emoji by analyzing over one billion pieces.&nbsp; Here are some interesting findings:</span></p><span data-dcnode-id="924" instrument_node="">
</span><ul data-dcnode-id="865"><span data-dcnode-id="923" instrument_node="">
</span><li data-dcnode-id="919"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Americans</span></strong><span data-dcnode-id="920" instrument_node=""> score highest for a&nbsp;variety of&nbsp;emojis, including skulls, birthday cake, fire, tech, LGBT, meat, and female-oriented icons.</span></li><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="914"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Canada&nbsp;</span></strong><span data-dcnode-id="915" instrument_node="">uses the smiling poop emoji more than any other country. It also leads in violent, body parts, money, sports, raunchy, and ocean creatures.</span></li><span data-dcnode-id="913" instrument_node="">
</span><li data-dcnode-id="903"><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">French</span></strong><span data-dcnode-id="910" instrument_node=""> leads in the heart emoji, and uses hearts 4x more than any other languages. The red heart is also the #1 emoji for several </span><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Scandinavian</span></strong><span data-dcnode-id="907" instrument_node=""> and </span><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Eastern European&nbsp;</span></strong><span data-dcnode-id="904" instrument_node="">countries.</span></li><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="898"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Arabic-</span></strong><span data-dcnode-id="899" instrument_node="">speakers are fond of roses and flowers.</span></li><span data-dcnode-id="897" instrument_node="">
</span><li data-dcnode-id="893"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Swedish-</span></strong><span data-dcnode-id="894" instrument_node="">speakers use the bread emoji more than any other language.</span></li><span data-dcnode-id="892" instrument_node="">
</span><li data-dcnode-id="888"><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Scandinavian </span></strong><span data-dcnode-id="889" instrument_node="">(Danish, Swedish, Norwegian) use the Santa emoji more than all other languages. (But… doesn’t Santa live in Finland?).</span></li><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="872"><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Australia </span></strong><span data-dcnode-id="884" instrument_node="">uses double the amount of alcohol-themed emoji than others, 65% more drug emoji than average, and leads for both junk food and holiday.
</span><ul data-dcnode-id="874"><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="876"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Portuguese </span></strong><span data-dcnode-id="880" instrument_node="">speakers actually topped Australia in the use of drug emojis&nbsp;(pill, syringe, mushroom, cigarette) when Swiftkey published its </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.swiftkey.com/emoji-report-part-ii-which-is-most-popular-emoji-in-your-language/"><span data-dcnode-id="879" instrument_node="">second&nbsp;</span></a><span data-dcnode-id="877" instrument_node="">report.</span></li><span data-dcnode-id="875" instrument_node="">
</span></ul><span data-dcnode-id="873" instrument_node="">
</span></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="867"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Brits&nbsp;</span></strong><span data-dcnode-id="868" instrument_node="">use the winky emoji twice the average rate.</span></li><span data-dcnode-id="866" instrument_node="">
</span></ul><span data-dcnode-id="864" instrument_node="">
</span><h2 data-dcnode-id="861"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Emojis are understood differently by different cultures</span></strong></h2><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The meaning of an emoji varies greatly depending on culture, language, and generation. Using emojis in cross-cultural communications runs the risk of being misunderstood. Here are some examples of cultural variations:</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="851"><img alt="Sign of the Horns Gesture" class="alignleft wp-image-3274" data-dcnode-id="856" height="35" sizes="(max-width: 35px) 100vw, 35px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/sign-of-the-horns_1f918.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/sign-of-the-horns_1f918.png 120w, https://en.localconcept.com/wp-content/uploads/2019/07/sign-of-the-horns_1f918-50x50.png 50w, https://en.localconcept.com/wp-content/uploads/2019/07/sign-of-the-horns_1f918-100x100.png 100w" width="35"><span data-dcnode-id="855" instrument_node="">In countries like Brazil, Italy, Greece, Portugal, Colombia and Argentina, the “</span><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">metal horns</span></strong><span data-dcnode-id="852" instrument_node="">” can indicate that the person was cheated on by their partner.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">&nbsp;</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="838"><img alt="Waving Hand" class="alignleft wp-image-3277" data-dcnode-id="846" height="35" sizes="(max-width: 35px) 100vw, 35px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/waving-hand-sign_1f44b.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/waving-hand-sign_1f44b.png 120w, https://en.localconcept.com/wp-content/uploads/2019/07/waving-hand-sign_1f44b-50x50.png 50w, https://en.localconcept.com/wp-content/uploads/2019/07/waving-hand-sign_1f44b-100x100.png 100w" width="35"><span data-dcnode-id="845" instrument_node="">While the “</span><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">waving&nbsp;hand</span></strong><span data-dcnode-id="842" instrument_node="">” is used to say hello or goodbye in one language, it can signify the </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emojipedia.org/waving-hand-sign/"><span data-dcnode-id="841" instrument_node="">ending of a friendship</span></a><span data-dcnode-id="839" instrument_node=""> in another.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">&nbsp;</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="828"><img alt="Thumbs Up" class="alignleft wp-image-3276" data-dcnode-id="833" height="35" sizes="(max-width: 35px) 100vw, 35px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/thumbs-up-sign_1f44d.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/thumbs-up-sign_1f44d.png 120w, https://en.localconcept.com/wp-content/uploads/2019/07/thumbs-up-sign_1f44d-50x50.png 50w, https://en.localconcept.com/wp-content/uploads/2019/07/thumbs-up-sign_1f44d-100x100.png 100w" width="35"><span data-dcnode-id="832" instrument_node="">“</span><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Thumbs-up</span></strong><span data-dcnode-id="829" instrument_node="">” may be a sign of approval in Western cultures; but it is considered an obscene gesture in Greece and the Middle East.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">&nbsp;</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="818"><img alt="OK Hand" class="alignleft wp-image-3271" data-dcnode-id="823" height="35" sizes="(max-width: 35px) 100vw, 35px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/ok-hand-sign_1f44c.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/ok-hand-sign_1f44c.png 120w, https://en.localconcept.com/wp-content/uploads/2019/07/ok-hand-sign_1f44c-50x50.png 50w, https://en.localconcept.com/wp-content/uploads/2019/07/ok-hand-sign_1f44c-100x100.png 100w" width="35"><span data-dcnode-id="822" instrument_node="">In Brazil and Turkey, the “</span><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">OK</span></strong><span data-dcnode-id="819" instrument_node="">” hand gesture is considered as an insult, and is equivalent to giving the middle finger in America.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">&nbsp;</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="805"><img alt="Clapping Hands" class="alignleft wp-image-3270" data-dcnode-id="813" height="35" sizes="(max-width: 35px) 100vw, 35px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/clapping-hands-sign_1f44f.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/clapping-hands-sign_1f44f.png 120w, https://en.localconcept.com/wp-content/uploads/2019/07/clapping-hands-sign_1f44f-50x50.png 50w, https://en.localconcept.com/wp-content/uploads/2019/07/clapping-hands-sign_1f44f-100x100.png 100w" width="35"><span data-dcnode-id="812" instrument_node="">“</span><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Clapping hands</span></strong><span data-dcnode-id="809" instrument_node="">” shows praise and offer congratulations in Western countries, while</span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.com/future/story/20181211-why-emoji-mean-different-things-in-different-cultures"><span data-dcnode-id="808" instrument_node=""> in China</span></a><span data-dcnode-id="806" instrument_node=""> it’s a symbol of making love.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">&nbsp;</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="789"><img alt="Slightly Smiling Face" class="alignleft wp-image-3275" data-dcnode-id="800" height="35" sizes="(max-width: 35px) 100vw, 35px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/slightly-smiling-face_1f642.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/slightly-smiling-face_1f642.png 120w, https://en.localconcept.com/wp-content/uploads/2019/07/slightly-smiling-face_1f642-50x50.png 50w, https://en.localconcept.com/wp-content/uploads/2019/07/slightly-smiling-face_1f642-100x100.png 100w" width="35"><span data-dcnode-id="799" instrument_node="">The “</span><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">slightly smiling</span></strong><span data-dcnode-id="796" instrument_node="">” emoji is not used as a sign of happiness in all countries. In China, it implies </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.com/future/story/20181211-why-emoji-mean-different-things-in-different-cultures"><span data-dcnode-id="795" instrument_node="">distrust, disbelief, or someone humoring you</span></a><span data-dcnode-id="793" instrument_node="">. It can also convey an </span><a data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emojipedia.org/slightly-smiling-face/"><span data-dcnode-id="792" instrument_node="">ironic tone </span></a><span data-dcnode-id="790" instrument_node="">of voice in other contexts.</span></p><span data-dcnode-id="788" instrument_node="">
</span><h2 data-dcnode-id="787"></h2><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="780"><img alt="Baby Angel" class="alignleft wp-image-3269" data-dcnode-id="785" height="35" sizes="(max-width: 35px) 100vw, 35px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/baby-angel_1f47c.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/baby-angel_1f47c.png 120w, https://en.localconcept.com/wp-content/uploads/2019/07/baby-angel_1f47c-50x50.png 50w, https://en.localconcept.com/wp-content/uploads/2019/07/baby-angel_1f47c-100x100.png 100w" width="35"><span data-dcnode-id="784" instrument_node="">The </span><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">angel</span></strong><span data-dcnode-id="781" instrument_node="">&nbsp;emoji can imply having performed a good deed or signify innocence in the west, while it may be used as a sign of death and be perceived as threatening in China.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">&nbsp;</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="769"><img alt="Eggplant " class="alignleft wp-image-3268" data-dcnode-id="775" height="35" sizes="(max-width: 35px) 100vw, 35px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/aubergine_1f346.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/aubergine_1f346.png 120w, https://en.localconcept.com/wp-content/uploads/2019/07/aubergine_1f346-50x50.png 50w, https://en.localconcept.com/wp-content/uploads/2019/07/aubergine_1f346-100x100.png 100w" width="35"><span data-dcnode-id="774" instrument_node="">Dreaming of an </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emojipedia.org/aubergine/"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">eggplant</span></strong></a><span data-dcnode-id="770" instrument_node="">&nbsp;on the first night of the New Year means good fortune in Japan. Some people take the eggplant for what it is: a vegetable. In other countries like the U.S, Trinidad and&nbsp;Ireland it has a strong sexual connotation, especially by users ages 18 to 24.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">&nbsp;</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="757"><img alt="Peach" class="alignleft wp-image-3273" data-dcnode-id="764" height="35" sizes="(max-width: 35px) 100vw, 35px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/peach_1f351.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/peach_1f351.png 120w, https://en.localconcept.com/wp-content/uploads/2019/07/peach_1f351-50x50.png 50w, https://en.localconcept.com/wp-content/uploads/2019/07/peach_1f351-100x100.png 100w" width="35"><span data-dcnode-id="763" instrument_node="">Similarly to the eggplant, some cultures take the</span><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node=""> peach</span></strong><span data-dcnode-id="760" instrument_node="">&nbsp;for what it is: a fruit. Other countries translate this emoji to </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emojipedia.org/peach/"><span data-dcnode-id="759" instrument_node="">“butt”.</span></a></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">&nbsp;</span></p><span data-dcnode-id="753" instrument_node="">
</span><h2 data-dcnode-id="752"></h2><span data-dcnode-id="751" instrument_node="">
</span><h2 data-dcnode-id="748"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Tips for localizing cross-cultural content with Emojis</span></strong></h2><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="746" instrument_node="">Given that emojis are open to interpretation, using them for a multinational audience can be tricky. However, emojis have been proven to boost engagement levels, click-through-rates, and open rates in marketing initiatives. In 2015, </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/4114886/oxford-word-of-the-year-2015-emoji/"><span data-dcnode-id="745" instrument_node="">Oxford Dictionaries made the </span><em data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Face With Tears of Joy</span></em><span data-dcnode-id="742" instrument_node=""> emoji the word of the year.</span></a><span data-dcnode-id="740" instrument_node=""> There are many benefits of using emojis in marketing, and they are inevitably here to stay.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">So, what should we consider when localizing cross-cultural content?</span></p><span data-dcnode-id="735" instrument_node="">
</span><ol data-dcnode-id="714"><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Avoid using hand gesture emojis.</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Avoid using only emojis to convey any idea.</span></li><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Make the emoji relevant to the text in order to enhance the meaning.</span></li><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="719"><span data-dcnode-id="724" instrument_node="">Consider how it looks on different platforms.</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">
</span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.news18.com/news/tech/the-big-emoji-confusion-android-ios-emojis-speak-different-languages-could-get-you-in-translation-trouble-984884.html"><img alt="" class="wp-image-3294 size-medium alignnone" data-dcnode-id="721" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.localconcept.com/wp-content/uploads/2019/07/emoji-social-networks-280415-300x150.png&amp;raw" srcset="https://en.localconcept.com/wp-content/uploads/2019/07/emoji-social-networks-280415-300x150.png 300w, https://en.localconcept.com/wp-content/uploads/2019/07/emoji-social-networks-280415-768x384.png 768w, https://en.localconcept.com/wp-content/uploads/2019/07/emoji-social-networks-280415.png 800w" width="300"></a></li><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Sometimes it might be best to spell it out *Neutral face*.</span></li><span data-dcnode-id="715" instrument_node="">
</span></ol><span data-dcnode-id="713" instrument_node="">
</span><h2 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Conclusion</span></h2><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Just being proficient linguistically is not enough to translate emojis. Context and cultural differences need to be considered, thus full localization of the content is essential.</span></p><span data-dcnode-id="707" instrument_node="">
