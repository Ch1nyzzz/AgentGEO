k"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3995" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="3996" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="3997" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="3998" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3999" style="box-sizing: border-box;"><span data-dcnode-id="4000" style="background: none;"><span data-dcnode-id="4001" instrument_node="">Do cats remember where they used to live?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3944" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3945" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3946" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3987" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="3947" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3963" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3964" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3965" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3966" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3967" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3984" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3985" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3986" instrument_node="">Cats DO remember where they used to live. I had a Siamese cat which I adored and that love was fully mutual. Someone let the cat outside and it was stolen. My fear was that it was then sold and I’d never see him again. I cried every night, wanting nothing more than to have my cat back at my side.</span></span></p><span data-dcnode-id="3983" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3980" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3981" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3982" instrument_node="">Three weeks later, I heard my cat on my doorstep. His paws were blistered and I could tell he had been on a very long journey. The next day, I took him to the veterinarian who could tell the cat had traveled about twenty-five miles to return home. At that point, I pretty much knew what happened, where </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3968" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3969" style= d="3727" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3732" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3733" instrument_node="">The relative perception of time for a species depends on its  "</span></span><span data-dcnode-id="3730" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3731" instrument_node="">Critical flicker fusion frequency</span></span><span data-dcnode-id="3728" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3729" instrument_node="">"  (the point at which the flashes seem to merge together, so that a light source appears constant).</span></span></p><span data-dcnode-id="3726" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3723" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3724" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3725" instrument_node="">Scientists found flies could detect light flickering up to four times faster than humans can. Flies avoid being swatted in just the same way Keanu Reeves dodges flying bullets in the movie The Matrix – by </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3711" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3712" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3713" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3714" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3715" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3720" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3721" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3722" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3716" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3717"><svg data-dcnode-id="3718" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3719" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3638" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3639" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3640"><span class="q-box qu-userSelect--text" data-dcnode-id="3641" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3699" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3704" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3705" instrument_node="">YES, </span></span><span data-dcnode-id="3702" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3703" instrument_node="">in fact</span></span><span data-dcnode-id="3700" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3701" instrument_node=""> ,for a fly the world seems to move approximately 7 times slower than it seems to us while the leatherback sea turtle perceives time at a rate that is around 2.5 times faster than a human</span></span></p><span data-dcnode-id="3698" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3691" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3696" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3697" instrument_node="">The relative perception of time for a species depends on its  "</span></span><span data-dcnode-id="3694" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3695" instrument_node="">Critical flicker fusion frequency</span></span><span data-dcnode-id="3692" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3693" instrument_node="">"  (the point at which the flashes seem to merge together, so that a light source appears constant).</span></span></p><span data-dcnode-id="3690" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3687" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3688" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3689" instrument_node="">Scientists found flies could detect light flickering up to four times faster than humans can. Flies avoid being swatted in just the same way Keanu Reeves dodges flying bullets in the movie The Matrix – by watching time pass slowly.</span></span></p><span data-dcnode-id="3686" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3679" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3680" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3685" instrument_node=""></span><br data-dcnode-id="3684"><span data-dcnode-id="3683" instrument_node="">Of course, time is really passing at the same speed. </span><br data-dcnode-id="3682"><span data-dcnode-id="3681" instrument_node="">But the fly’s eyes send updates to its brain far more frequently than a human’s eyes, and its mental processes are similarly much more rapid than ours.</span></span></p><span data-dcnode-id="3678" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3671" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3672" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3677" instrument_node="">To the insect, that rolled-up newspaper moving at lightning speed might as well be inching through thick treacle.</span><br data-dcnode-id="3676"><span data-dcnode-id="3675" instrument_node="">Like Reeves standing back and side-stepping slo-mo bullets, the fly has ample time to escape. And it is not alone in its ability to perceive time differently from us. Research suggests that across a wide range of species, time perception is directly related to size.</span><br data-dcnode-id="3674"><span data-dcnode-id="3673" instrument_node="">Generally the smaller an animal is, and the faster its metabolic rate, the slower time passes.</span></span></p><span data-dcnode-id="3670" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3667" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3668" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3669" instrument_node="">According to Dr Andrew Jackson, from Trinity College Dublin in the Republic of Ireland - </span></span></p><span data-dcnode-id="3666" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3663" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3664" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3665" instrument_node=""></span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3654" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3656" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3657" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3662" instrument_node="">"Some can perceive quite a fast flicker and others much slower, so that a flickering light looks like a blur.</span><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node="">There's a large difference between big and small species. Animals smaller than us see the world in slo-mo. It seems to be almost a fact of life. Our focus was on vertebrates, but if you look at flies, they can perceive light flickering up to four times faster than we can. You can imagine a fly literally seeing everything in slow motion."</span><br data-dcnode-id="3659"><span data-dcnode-id="3658" instrument_node=""></span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3655" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3649" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3650" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3653" instrument_node=""></span><br data-dcnode-id="3652"><span data-dcnode-id="3651" instrument_node="">Roughly speaking,the relative perception of time in different species can be demonstrated through the following graphic :</span></span></p><span data-dcnode-id="3648" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3645" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3 : anywhere; direction: ltr;"><span data-dcnode-id="3155" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3156" instrument_node="">Cats have twice as many receptors in the olfactory epithelium (i.e. </span></span><span data-dcnode-id="3153" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3154" instrument_node="">smell</span></span><span data-dcnode-id="3151" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3152" instrument_node="">-</span></span><span data-dcnode-id="3149" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3150" instrument_node="">sensitive</span></span><span data-dcnode-id="3147" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3148" instrument_node=""> cells in their noses) as people do, meaning that cats have a more acute sense of smell than humans.</span></span></p><span data-dcnode-id="3145" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3142" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3143" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3144" instrument_node="">In addition, cats have a Jacobson's organ in the roof of their mouths, so they can detect pheromones and other additional scents.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3138" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3139"><div class="q-box unzoomed" data-dcnode-id="3140" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn. al mother cat will be feral all the while terrified of humans. What that basically means is they will not be socialized to humans. However they may live happily in a communal group of feral cats. So they know the difference. However some cats (like my Bella) are not socialized to cats. She cannot be socialized to be friendly with another cat. She sees all cats as enemies. However she likes people. She loves all people. So to her: people-good, cats and dogs-bad, chipmunks-food.</span></span></p><span data-dcnode-id="1834" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1831" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1832" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1833" instrument_node="">So, clearly they know the difference. But here’s the question: do they think they’re human too? I don’t know. Even though they know we aren’t cats, they may treat us like cats at times. Sometimes they may treat us like their mom or like a fellow cat in a communal group or like their kitten. I guess it’s their way of trying to fit themselves into our world.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1749" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1750" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1751" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1765" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1797" style="box-sizing: one;"><span data-dcnode-id="1217" instrument_node="">” seems to be answered by a simple yes or no.</span></span></p><span data-dcnode-id="1214" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1207" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1212" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1213" instrument_node="">Short answer: </span></span><span data-dcnode-id="1210" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1211" instrument_node="">YES</span></span><span data-dcnode-id="1208" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1209" instrument_node="">.</span></span></p><span data-dcnode-id="1206" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1203" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1204" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1205" instrument_node="">Unfortunately it is not as simple to answer than to ask. Why?</span></span></p><span data-dcnode-id="1202" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1199" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1200" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1201" instrument_node="">Perception may and does depend on lots of physics and physiology:</span></span></p><ul class="q-box" data-dcnode-id="1164" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="1196" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1197" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1198" instrument_node="">enough illumination energy to make that spot visible. But “enough” is different for different species (those in caves, nightview, deap sea or grasers do have different visions, thus all comparisons between species are already weak in this respect.</span></span></li><li class="q-relative" data-dcnode-id="1193" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1194" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1195" instrument_node="">not speed of light, but wavelength. A mammal cannot see UV and most not even distinguish colors well, most insects differentiate even polarized UV-light.</span></span></li><li class="q-relative" data-dcnode-id="1190" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1191" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1192" instrument_node="">visibility of that wavelength against the contrasting surroundings to either or both species picked.</span></span></li><li class="q-relative" data-dcnode-id="1178" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1188" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1189" instrument_node="">species. Asked is “fly”. What species? According to </span></span><span class="q-inline" data-dcnode-id="1181" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fly" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1187" instrument_node="">Fly</span></a><span class="q-inlineBlock" data-dcnode-id="1182" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1183"><svg data-dcnode-id="1184" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1185" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1179" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1180" instrument_node=""> there are estimated 1,000,000 species, but only 150,000 described. There are tremendous differences depending which one is picked - there are even blind flies, as used for animal studies. Predictably they see slower than me.</span></span></li><li class="q-relative" data-dcnode-id="1171" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1176" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1177" instrument_node="">The human species of course is </span></span><span data-dcnode-id="1174" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1175" instrument_node="">Homo sapiens</span></span><span data-dcnode-id="1172" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1173" instrument_node="">. Do we all see exactly as fast as everybody else? Even excluding the blind people - do aged people see faster than newborns or is it the contrary?</span></span></li><li class="q-relative" data-dcnode-id="1168" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1169" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1170" instrument_node="">What is “fast” seeing? to see a mismatched pixel in a film? Or to detect a complete picture not fitting into a movie? Or to detect a fast tiny object?</span></span></li><li class="q-relative" data-dcnode-id="1165" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1166" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1167" instrument_node="">How to report the detection of a fast sighting? A human can make a mouse click. A fly could fly away. Would it fly away if it detects a pixel? Since both species (see above) react in different ways, is there a comparison possible? The reaction requires as well nerval transmission and evaluation of the signals by ganglions and activation of muscular activity, so all these processes are summarized into “who sees first”. But are all these processes comparable? Probably not.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1150" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1162" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1163" instrument_node="">Homo sapiens</span></span><span data-dcnode-id="1160" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1161" instrument_node=""> can distinguish theoretically a </span></span><span class="q-inline" data-dcnode-id="1153" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frame_rate" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1159" instrument_node="">frame rate</span></a><span class="q-inlineBlock" data-dcnode-id="1154" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1155"><svg data-dcnode-id="1156" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1157" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1151" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1152" instrument_node=""> of 1,000 pictures per second, but realistically it is around 150 to 240 which can be trained (e.g. for motor cyclists or pilots). So the limit is 1ms, in general it is 7 to 4ms.</span></span></p><span data-dcnode-id="1149" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1133" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1147" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1148" instrument_node="">Self propelled flying organisms (insects, birds) exhibit impressive flight control capabilities that far outperform most human or technical possibilities. </span></span><span data-dcnode-id="1145" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1146" instrument_node="">Drosophila melanogaster</span></span><span data-dcnode-id="1143" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1144" instrument_node=""> was shown to clearly distinguish optical signals 30ms apart and even can detect 20ms (</span></span><span class="q-inline" data-dcnode-id="1136" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jeb.biologists.org/content/212/8/1120.full.pdf" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="jeb.biologists.org"><span data-dcnode-id="1142" instrument_node="">http://jeb.biologists.org/content/212/8/1120.full.pdf</span></a><span class="q-inlineBlock" data-dcnode-id="1137" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1138"><svg data-dcnode-id="1139" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1140" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1134" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1135" instrument_node="">).</span></span></p><span data-dcnode-id="1132" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1129" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1130" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1131" instrument_node="">.</span></span></p><span data-dcnode-id="1128" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1125" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1126" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1127" instrument_node="">Sorry, flies, I can catch most of you, if you REALLY bother me.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1048" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1049" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1050" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1064" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1091" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1092" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1102" style="b
