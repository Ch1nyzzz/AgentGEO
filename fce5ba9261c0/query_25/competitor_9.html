</span><article class="post-5759 post type-post status-publish format-standard has-post-thumbnail hentry category-color-symbolism ast-article-single" data-dcnode-id="392" id="post-5759" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="606" instrument_node="">
</span><div class="ast-post-format- single-layout-1" data-dcnode-id="394"><span data-dcnode-id="605" instrument_node="">
</span><header class="entry-header ast-no-thumbnail ast-no-meta" data-dcnode-id="597"><span data-dcnode-id="604" instrument_node="">
</span><div class="ast-single-post-order" data-dcnode-id="599"><span data-dcnode-id="603" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="601" itemprop="headline"><span data-dcnode-id="602" instrument_node="">Native American Color Meanings: Symbolism of the Native American Indians</span></h1><span data-dcnode-id="600" instrument_node=""> </span></div><span data-dcnode-id="598" instrument_node="">
</span></header><span data-dcnode-id="595" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="397" itemprop="text"><span data-dcnode-id="594" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="590"><img alt="Close up portrait of shamanic female with Indian feather hat and colorful makeup." class="wp-image-5760 entered lazyloaded" data-dcnode-id="593" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress.jpeg" data-lazy-srcset="https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress-300x200.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress-768x512.jpeg 768w" data-ll-status="loaded" height="600" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress.jpeg&amp;raw" srcset="https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress-300x200.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress-768x512.jpeg 768w" width="900"><noscript data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">&lt;img width="900" height="600" src="https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress.jpeg" alt="Close up portrait of shamanic female with Indian feather hat and colorful makeup." class="wp-image-5760" srcset="https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress-300x200.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-woman-wearing-a-colored-head-dress-768x512.jpeg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript></figure><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">Colors and art have always played an important role in the traditional Native American worldview. The wise Natives used art and colors for aesthetic pleasure – there was no concept or even word for </span><em data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">art</span></em><span data-dcnode-id="585" instrument_node=""> in their languages. This indicates that art and colors were never considered separate from the other aspects of daily life. To explain simply: colors represented the Natives Americans’ practical, social, and spiritual aspects of life.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Colors helped tribes celebrate the ancient traditions and rich heritage. Their symbolism was especially important in shamanism – the traditional medicine or healing rituals used by the people, and also in war where warriors painted their faces in different color paints. As there were numerous tribes dispersed across North America, there were also different symbolic color meanings. Colors retained these traditional meanings even during the time of contact between the Natives and the British Colonists.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="580" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Let us find out what different colors meant and symbolized to the different Native American Indian tribes.</span></p><span data-dcnode-id="576" instrument_node="">
</span><h2 data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Different colors and their symbolic meanings in Native American culture</span></h2><span data-dcnode-id="573" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="569"><img alt="Portrait of Native American Indian man." class="wp-image-5764 entered lazyloaded" data-dcnode-id="572" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress.jpeg" data-lazy-srcset="https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress-300x200.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress-768x512.jpeg 768w" data-ll-status="loaded" height="600" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress.jpeg&amp;raw" srcset="https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress-300x200.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress-768x512.jpeg 768w" width="900"><noscript data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">&lt;img width="900" height="600" src="https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress.jpeg" alt="Portrait of Native American Indian man." class="wp-image-5764" srcset="https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress-300x200.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-elder-with-colored-head-dress-768x512.jpeg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="568" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="567" instrument_node="">
</span><h3 data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Red</span></h3><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">Red was the color of the Earth element and the mountains. Natives used this color in body and face painting. The Powhatan tribes used red along with white and black in pipes, masks, head dresses, body paint, face paint, warrior feathers, and jewelry. Surprisingly, the white-red-black triad which was so important to the Powhatan is also seen in West African cultures, possibly because these may have been present in Chesapeake around the 17</span><sup data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">th</span></sup><span data-dcnode-id="560" instrument_node=""> Century.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="558" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="556" instrument_node="">British colonists used the color red to symbolize </span><em data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">wine</span></em><span data-dcnode-id="553" instrument_node="">. They also believed that it represented the “blood spilt” by the Natives. Soon, these elements mixed into the Native American way of life and the symbolic use of colors, in combination or alone, gathered diverse origins, disparate meanings, and cross-cultural associations.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">The Coushatta tribe of Louisiana used red along with other colors on their flag. Each color on the flag played a symbolic role: red represented life-giving blood, orange stood for discipline, yellow for the sun, black for the night, and white for day.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="548" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Native American languages also show us the meaning of red color. The Montagnais and Ojibwas used the same words to refer to “red” and “copper” while the Ofo and Biloxi used the same word for “red and blood”.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">It is interesting to note that the many&nbsp;Native American&nbsp;tribes did not necessarily share the same&nbsp;color symbolism. For some, red symbolized the sacred color of war, victory, and courage, for others; it brought death and defeat.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="541" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="540" instrument_node="">
</span><h3 data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Yellow, gold and orange</span></h3><span data-dcnode-id="537" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="533"><img alt="Close up of a painted Indian face mask" class="wp-image-5762 entered lazyloaded" data-dcnode-id="536" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work.jpeg" data-lazy-srcset="https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work-300x169.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work-768x432.jpeg 768w" data-ll-status="loaded" height="506" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work.jpeg&amp;raw" srcset="https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work-300x169.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work-768x432.jpeg 768w" width="900"><noscript data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">&lt;img width="900" height="506" src="https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work.jpeg" alt="Close up of a painted Indian face mask" class="wp-image-5762" srcset="https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work-300x169.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-mask-and-art-work-768x432.jpeg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="532" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Yellow, gold, and orange represented the South direction, fire, and even the season of autumn. Here are some symbolic meanings associated with these colors across different Native tribes:</span></p><span data-dcnode-id="528" instrument_node="">
</span><ul data-dcnode-id="520"><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Yellow – the power of pollen, divinity, and perfect ceremonial control</span></li><li data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Orange – the power of the sun to create and recreate with its radiation.</span></li><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="523" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Gold – the beautiful shiny metal for which gold prospectors looted Native lands and shed native blood became the symbol of death and dying. Gold was also symbolic of the sun, pride, and confidence. For Natives, before their lands were looted, gold color brought luck.</span></li></ul><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">The Natives also believed yellow to be the color of gold, fire, and autumn, as well as symbolic of ‘reason’.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="516" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Yellow colored face paint meant that the person wearing it was heroic, have had a great life, and was ready to fight to the death. It also represented intellect.</span></p><span data-dcnode-id="512" instrument_node="">
</span><h3 data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Green</span></h3><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Peyote Art shows green objects that represent Mother Nature. Native Americans used green herbs and for them, the color sustained life itself. Green also stood for youth, utility, labor, fertility, freedom, and growth.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="506" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Tonto Apaches used green, black, white, blue, yellow, and red in their ‘seal’ and flags. They used the following meanings for these colors:</span></p><span data-dcnode-id="502" instrument_node="">
</span><ul data-dcnode-id="488"><li data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Black for death and the west direction</span></li><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">White for life, snow, and north</span></li><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Yellow for sun and east</span></li><li data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Blue for sky and south</span></li><li data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Green for the earth</span></li><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="491" id="AdThrive_Content_10_desktop" style="min-height: 250px;"></div><li data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Red for fire and heat</span></li></ul><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">To the Sac and Fox tribes, green symbolized&nbsp;life, peace, and spring and represented the “peace chief,” one of the three members of the tribal authority.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">For many Native tribes, green color brought healing. Green face paint of warriors stood for endurance and represented that the warrior had great stamina. Shamans used green color to heal eyesight.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="481" id="AdThrive_Content_11_desktop" style="min-height: 250px;"></div><span data-dcnode-id="480" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="476"><img alt="Beaded shawls and belts with geometric patterns and fringe worn at a pow wow." class="wp-image-5765" data-dcnode-id="479" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://www.color-meanings.com/wp-content/uploads/native-american-pow-tow-rug.jpeg" data-lazy-srcset="https://www.color-meanings.com/wp-content/uploads/native-american-pow-tow-rug.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-pow-tow-rug-300x225.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-pow-tow-rug-768x576.jpeg 768w" height="675" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20900%20675'%3E%3C/svg%3E" width="900"><noscript data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">&lt;img width="900" height="675" src="https://www.color-meanings.com/wp-content/uploads/native-american-pow-tow-rug.jpeg" alt="Beaded shawls and belts with geometric patterns and fringe worn at a pow wow." class="wp-image-5765" srcset="https://www.color-meanings.com/wp-content/uploads/native-american-pow-tow-rug.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-pow-tow-rug-300x225.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-pow-tow-rug-768x576.jpeg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="475" id="AdThrive_Content_12_desktop" style="min-height: 250px;"></div><span data-dcnode-id="474" instrument_node="">
</span><h3 data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">White</span></h3><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">When war was imminent, some tribes would replace the white feathers of sacred tribal pipes with red feathers. Cherokees believed white was the color of the South, peace, and happiness. In ceremonial addresses such as green corn dance and ball play, people would partake white food, and after the dance or ball play, return along white trails to their white houses.</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">The natives also used white beads in bead conjuring and white was the color of the stone pipe used in ratifying peace treaties.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="464" instrument_node="">South was the direction associated with the color white and the </span><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">White Spirit</span></em><span data-dcnode-id="461" instrument_node=""> brought peace and happiness.</span></p><span data-dcnode-id="459" instrument_node="">
</span><h3 data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Black</span></h3><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="455" instrument_node="">The Cherokee shamans believed that black was symbolic of the west direction and also the </span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">spirit of death</span></em><span data-dcnode-id="452" instrument_node="">. The shaman therefore invoked the Red Man (the spirit of power, triumph, and success) to the assistance of his ‘clients’ and consigned his (the client’s) enemies to the fatal influences of the Black Man of the West.</span></p><span data-dcnode-id="450" instrument_node="">
</span><h3 data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Brown</span></h3><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Brown has undetermined and unspecific meanings in Native American parlance. Mostly, it represents the color of the skin.</span></p><span data-dcnode-id="444" instrument_node="">
</span><h3 data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Purple</span></h3><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="440" instrument_node="">In certain Native tribal populations, purple represents wisdom. </span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.color-meanings.com/what-color-brown-purple-make-mixed/"><span data-dcnode-id="439" instrument_node="">Purple and brown</span></a><span data-dcnode-id="437" instrument_node=""> were never used in face and body painting as they represented animals and death.</span></p><span data-dcnode-id="435" instrument_node="">
</span><h3 data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Blue</span></h3><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">For Native Americans, blue symbolized peace and heaven. However, for the Cherokee shamans, blue represented North and the Blue Man or Blue Spirit that brought defeat and trouble with it.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">In South Eastern Native American tribes, there was a belief that blue color warded off evil spirits. They often painted their house doors in blue for this reason. Natives also used turquoise blue stone as the </span><em data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Stone of Protection</span></em><span data-dcnode-id="425" instrument_node="">.</span></p><span data-dcnode-id="423" instrument_node="">
</span><h2 data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Conclusion</span></h2><span data-dcnode-id="420" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="416"><img alt="Native American Indian colorful dressed native man." class="wp-image-5766" data-dcnode-id="419" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://www.color-meanings.com/wp-content/uploads/native-american-jacket-and-colors.jpeg" data-lazy-srcset="https://www.color-meanings.com/wp-content/uploads/native-american-jacket-and-colors.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-jacket-and-colors-300x171.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-jacket-and-colors-768x439.jpeg 768w" height="514" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20900%20514'%3E%3C/svg%3E" width="900"><noscript data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">&lt;img width="900" height="514" src="https://www.color-meanings.com/wp-content/uploads/native-american-jacket-and-colors.jpeg" alt="Native American Indian colorful dressed native man." class="wp-image-5766" srcset="https://www.color-meanings.com/wp-content/uploads/native-american-jacket-and-colors.jpeg 900w, https://www.color-meanings.com/wp-content/uploads/native-american-jacket-and-colors-300x171.jpeg 300w, https://www.color-meanings.com/wp-content/uploads/native-american-jacket-and-colors-768x439.jpeg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript></figure><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="414" instrument_node="">There were many different Native Americans tribes, so it is only possible to </span><strong data-dcnode-id="411"><em data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">generalize</span></em></strong><span data-dcnode-id="410" instrument_node=""> color symbolism, especially in terms of face paint, war paint, beads, </span><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.color-meanings.com/feather-color-meanings-symbolism/"><span data-dcnode-id="409" instrument_node="">feathers</span></a><span data-dcnode-id="407" instrument_node="">, art, pottery, jewelry, and in shamanism.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">In general, red symbolized war, earth, success, blood, energy, and power. Black was an aggressive color that symbolized victory, triumph, and strength, but also death. White stood for peace, mourning, and also for heaven. Blue represented wisdom and confidence. Green represented harmony, healing, and endurance. Yellow was the color of death, but also of intellect. Purple and brown represented animals and death.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">We hope you enjoyed this brief guide on Native American color symbolism.</span></p><span data-dcnode-id="399" instrument_node="">
</span><div class="adthrive-ad adthrive-below-post adthrive-below-post-1" data-dcnode-id="398" id="AdThrive_Below_Post_1_desktop" style="min-height: 250px;"></div></div><span data-dcnode-id="395" instrument_node="">

</span><article class="ast-related-post post-20860 post type-post status-publish format-standard has-post-thumbnail hentry category-color-symbolism ast-article-single" data-dcnode-id="306"><span data-dcnode-id="335" instrument_node="">
