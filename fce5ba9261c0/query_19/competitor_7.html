</span><br data-dcnode-id="357"><span data-dcnode-id="356" instrument_node="">Lisa did her undergraduate work in chemistry at Ball State University and received her Master’s of Science degree in Physical Chemistry from the University of North Carolina- Chapel Hill.   
</span><br data-dcnode-id="355"><span data-dcnode-id="354" instrument_node="">
</span><br data-dcnode-id="353"><span data-dcnode-id="352" instrument_node="">Lisa has worked for Sun Chemical for 23 years, where she has held numerous positions, including physical chemist, group leader, Six Sigma Black Belt, Design for Six Sigma Leader, and project manager covering a wide range of Sun Chemical pigment and preparation products.
          </span></p><span data-dcnode-id="350" instrument_node="">

</span><h5 class="vip-title" data-dcnode-id="317"><span data-dcnode-id="324" instrument_node="">
</span><span data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Founder &amp; President </span></span><span data-dcnode-id="321" instrument_node="">
</span><span class="preposition" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">at</span></span><span data-dcnode-id="318" instrument_node="">
              AErnest.Consultech
            </span></h5><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="315" instrument_node="">
            Dr. Andrew E. Smith received a BSc in Applied Science from University of Wisconsin-Stout in 2006. In 2010 he earned a Ph.D in Materials Chemistry from Oregon State University. Continuing his educational pursuits, Dr. Smith earned an MBA in Innovation, Change &amp; Entrepreneurship from Xavier University in 2018.
</span><br data-dcnode-id="314"><span data-dcnode-id="313" instrument_node="">
</span><br data-dcnode-id="312"><span data-dcnode-id="311" instrument_node="">After receiving a doctorate in Materials Chemistry in 2010, Dr. Andrew E. Smith joined the Shepherd Color Company as an R&amp;D Chemist investigating disruptive pigment chemistries. In 2015 he assumed responsibility of the analytical laboratory and led a specialized business division in pigment surface functionalization.
</span><br data-dcnode-id="310"><span data-dcnode-id="309" instrument_node="">
</span><br data-dcnode-id="308"><span data-dcnode-id="307" instrument_node="">In 2017, Dr. Smith joined the Uniform Color Company as the Product Engineering Manager where he was responsible for the product development and improvement of color masterbatch for North America.
</span><br data-dcnode-id="306"><span data-dcnode-id="305" instrument_node="">
</span><br data-dcnode-id="304"><span data-dcnode-id="303" instrument_node="">In 2019, Dr. Smith joined the color revolution at Chroma Color Corporation as Technical Director where his responsibilities include Technical Service, R&amp;D, Quality, and Regulatory for multiple sites.
</span><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node="">
</span><br data-dcnode-id="300"><span data-dcnode-id="299" instrument_node="">Dr. Smith’s work has been published in 13 journal articles with 3 associated patents in pigment technologies granted. His work on the synthesis, crystal structure, and physical properties of transition metal oxides has been published on the cover of two journals and has been featured in the New York Times, Bloomberg News, C&amp;EN, and National Geographic. Dr. Smith’s favorite color is blue.
          </span></p><span data-dcnode-id="297" instrument_node="">
</span></div><span data-dcnode-id="295" instrument_node="">

</span><h5 class="vip-title" data-dcnode-id="264"><span data-dcnode-id="271" instrument_node="">
</span><span data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Managing Director</span></span><span data-dcnode-id="268" instrument_node="">
</span><span class="preposition" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">at</span></span><span data-dcnode-id="265" instrument_node="">
              Expertas Global
            </span></h5><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="262" instrument_node="">
            Trevor obtained his Bachelor of Science and PhD degrees in Chemistry from the University of East Anglia &amp; Cambridge in the U.K. He then carried out a 2 year Post Doctoral Fellowship in Synthetic Organic Chemistry at Georgia Tech. in Atlanta in the School of Chemistry.
</span><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">
</span><br data-dcnode-id="259"><span data-dcnode-id="258" instrument_node="">He joined I.C.I. as a synthetic organic chemist, developing novel dyes and pigments; then became New Business Development Manager, spearheading the development of a range of new speciality chemicals. Trevor then joined I.C.I. Paints to head up the Colour &amp; Pigment Technology Group.
</span><br data-dcnode-id="257"><span data-dcnode-id="256" instrument_node="">
</span><br data-dcnode-id="255"><span data-dcnode-id="254" instrument_node="">As a Senior Research Chemist, Trevor had a strategic role developing new pigment dispersant technology relevant to the Decorative and Automotive Business Sectors. When I.C.I. Autocolor was purchased by PPG Industries in 1999, the team’s various achievements were recognised by becoming the Centre of Excellence for Dispersion Science for the global Refinish Coatings Business.
</span><br data-dcnode-id="253"><span data-dcnode-id="252" instrument_node="">
</span><br data-dcnode-id="251"><span data-dcnode-id="250" instrument_node="">In 2008, Trevor started his own business called Expertas Ltd, which expanded to Expertas Global in 2016. He now consults on colour and pigment dispersion technology with global corporate companies.
          </span></p><span data-dcnode-id="248" instrument_node="">
</span></div><span data-dcnode-id="246" instrument_node="">

</span><span class="preposition" data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">at</span></span><span data-dcnode-id="216" instrument_node="">
              Ford Research and Innovation Center
            </span></h5><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">
            Dr. Seubert received his bachelor’s degree from the University of Illinois and his M.S./Ph.D. from the University of Michigan, all in Materials Science and Engineering.  He is a Research Engineer working in the Paint Research Group at Ford’s Research and Innovation Center.  He has worked at Ford for the last 17 years and has explored a range of topics including UV/EB cure, scratch and mar, weathering and durability, and most recently, the measurement and modeling of paint colors.  
          </span></p><span data-dcnode-id="211" instrument_node="">

</span><span data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Founder, Chief Scientist</span></span><span data-dcnode-id="182" instrument_node="">
</span><span class="preposition" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">at</span></span><span data-dcnode-id="179" instrument_node="">
              Adawe Material Science LTD
            </span></h5><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="163"><span data-dcnode-id="176" instrument_node="">
            Bill Eibon has been a leader in technology, industrial design and manufacturing of polymeric and coatings systems for over 35 years.  He held a wide range of senior leadership and change agent roles during his three-decade career at PPG Industries.  His commercial and operational experiences include Global Technical Director of waterborne coatings, color science, process engineering.  He has been a thought leader for industrial color design, digital color assets and coatings technology for the global Automotive OEM industry.  He has been actively scouting and developing disruptive technologies for the past 5 years. 
</span><br data-dcnode-id="175"><span data-dcnode-id="174" instrument_node="">
</span><br data-dcnode-id="173"><span data-dcnode-id="172" instrument_node="">Bill retired from PPG in February 2019.  He is currently Founder and Chief Scientist at Adawe Material Science LTD where he focuses on collaborative technology and business development initiatives between start up and established entities.  He serves as technical and executive advisor for several material science companies
</span><br data-dcnode-id="171"><span data-dcnode-id="170" instrument_node="">
</span><br data-dcnode-id="169"><span data-dcnode-id="168" instrument_node="">He joined HygraTek LLC. as Vice President of Commercialization in Q1 2019.  HygraTek is a specialty coatings company specializing in reactive surfaces. 
</span><br data-dcnode-id="167"><span data-dcnode-id="166" instrument_node="">
</span><br data-dcnode-id="165"><span data-dcnode-id="164" instrument_node="">He holds a BSc. Chemistry degree from Baldwin Wallace University, and has a passion for collaborative development &amp; commercialization of leading-edge technologies.
          </span></p><span data-dcnode-id="162" instrument_node="">

</span><h5 class="vip-title" data-dcnode-id="129"><span data-dcnode-id="136" instrument_node="">
</span><span data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">Director, Automotive OEM Coatings Technology Americas</span></span><span data-dcnode-id="133" instrument_node="">
</span><span class="preposition" data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">at</span></span><span data-dcnode-id="130" instrument_node="">
              BASF
            </span></h5><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">
            Based in Southfield MI, Diane leads BASF Coatings Division’s Automotive OEM Technology Americas group located in USA, Mexico, Canada, Argentina, Brazil and India. After completing her doctoral research in Polymer and Physical Chemistry at the Max Planck Institute for Polymer Research in Mainz Germany, Diane began her career at BASF as a Global Research Laboratory Leader for Polyurethanes Specialty Systems at BASF Polyurethanes GmbH in Lemförde Germany. With her desire to get closer to the customer, she led a European Development team for Automotive and CASE (Coatings Adhesives Sealants Elastomers) Polyurethanes specialty applications. Diane transferred to Wyandotte MI to NA Research &amp; Development department of Polyurethanes division acting as a liaison between European and North American sites. She coordinated regional and global projects for all industry segments after being promoted to Technical Manager.
