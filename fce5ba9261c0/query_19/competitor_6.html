</span><div class="section group" data-dcnode-id="365"><span data-dcnode-id="434" instrument_node="">
</span><div class="col span_2_of_3" data-dcnode-id="372"><span data-dcnode-id="433" instrument_node="">
</span><p2 data-dcnode-id="423"><b data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Solomon Colors ColorFlo SG Granular Pigment</span></b><span data-dcnode-id="430" instrument_node=""> is an excellent free flowing, low dusting color for Ready Mix and Manufactured Concrete Products applications. With </span><b data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">ColorFlo SG Granular</span></b><span data-dcnode-id="427" instrument_node="">, </span><b data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Solomon Colors</span></b><span data-dcnode-id="424" instrument_node=""> cements its position as the industry innovator.</span></p2><span data-dcnode-id="422" instrument_node="">
</span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node="">
</span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">
</span><h5 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Innovative Pigment</span></h5><span data-dcnode-id="415" instrument_node="">
</span><p2 data-dcnode-id="410"><span data-dcnode-id="414" instrument_node="">Granulated in Springfield, Illinois using an advanced process, </span><b data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">ColorFlo SG Granular</span></b><span data-dcnode-id="411" instrument_node=""> pigment is unlike any other on the market. This innovative method creates a pigment with easy flowability, tighter particle size tolerances, reduced dust formation, and color development that meets or exceeds that of any competing granular pigment in both wet and dry slump conditions.</span></p2><span data-dcnode-id="409" instrument_node="">
</span><br data-dcnode-id="408"><span data-dcnode-id="407" instrument_node="">
</span><br data-dcnode-id="406"><span data-dcnode-id="405" instrument_node="">
</span><h5 data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Granular Dispensing</span></h5><span data-dcnode-id="402" instrument_node="">
</span><p2 data-dcnode-id="392"><b data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">ColorSelect</span></b><span data-dcnode-id="399" instrument_node=""> and </span><b data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">QuickColor</span></b><span data-dcnode-id="396" instrument_node=""> granular systems accurately and efficiently dispense SG Granular pigment. </span><b data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Solomon Colors</span></b><span data-dcnode-id="393" instrument_node=""> has granular dispensers for any Ready Mix, Precast, and Paver and Block application. Create thousands of colors from just 4 primary colors.</span></p2><span data-dcnode-id="391" instrument_node="">
</span><br data-dcnode-id="390"><span data-dcnode-id="389" instrument_node="">
</span><br data-dcnode-id="388"><span data-dcnode-id="387" instrument_node="">
</span><h5 data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Solomon Advantage</span></h5><span data-dcnode-id="384" instrument_node="">
</span><p2 data-dcnode-id="374"><b data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Solomon Colors</span></b><span data-dcnode-id="381" instrument_node=""> granulates every ounce of ColorFlo SG Granular pigment in-house in Springfield, Illinois. Every order is backed up by </span><b data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Solomon Colors</span></b><span data-dcnode-id="378" instrument_node="">’ decades of innovation, stringent quality control, and exceptional customer service. Turn to </span><b data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Solomon Colors</span></b><span data-dcnode-id="375" instrument_node=""> for your granular pigment needs</span></p2><span data-dcnode-id="373" instrument_node="">
</span></div><span data-dcnode-id="371" instrument_node="">
