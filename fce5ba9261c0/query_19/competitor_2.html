</span><div class="profile-card__body-text" data-dcnode-id="1536"><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Manufacturer of engineered plastic additives and colors. Available products include color formulations, performance compounds, and polymeric alloys. Coloring additives include woodgrain effects, nonwoven colors, mini beads, pigment concentrates, masterbatches, and powdered colors. Can also provide additives such as softeners, antimicrobial additives, flame retardants, UV stabilizers, antioxidants, slip agents, and cycle time reducers. Available performance compounds include thermoplastic and alloyed elastomers, specialty alloys, vinyl compounds, automotive plastic compounds, PVC compounds, capstocks, and thermoplastic olefins. Compound characteristic features include precoloring, weather resistance, structural reinforcement, wear resistance, lubrication, flame retardancy, and electrical conductivity. Custom products can be designed. Serves applications in the construction, transportation, fiber, packaging, healthcare, aerospace, defense, electronics, and industrial materials industries.</span></p><span data-dcnode-id="1538" instrument_node="">

</span><div class="profile-card__body-text" data-dcnode-id="1070"><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Manufacturer of standard &amp; custom pigment colors &amp; dispersions including polyurethane dispersions. Color dispersion allow low viscosity of 3000 centipoises to 8000 centipoises. Color dispersions available include di-iso-nonyl phthalate pigment dispersions, di-iso-decyl phthalate pigment dispersions &amp; di-iso-octyl phthalate pigment dispersions. Dispersions allow heat resistance for polyvinyl chloride, resist migration, color retention &amp; low volatility. Color products have 2000 centipoise to 6000 centipoise viscosity at room temperatures &amp; are compatible with polyvinyl chloride resin formulation. Computerized color control &amp; inventory control services are also available. Products are FDA &amp; ROHS compliant.</span></p><span data-dcnode-id="1072" instrument_node="">

</span><div class="profile-card__body-text" data-dcnode-id="792"><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Manufacturer of standard and custom color pigment products, including color-in and color-on products. Color-in products embed themselves directly into resin surface, while the color-on products can be applied like spray paint onto finished products. Color-on product is a two-part spray system that combines UV resistant polymer pigments and a clear top coat. Coloring products are compatible with polyolefin products, and can be applied to products which have been molded by rotational, injection, blow, thermoforming, vacuum forming, compression, and structural foam molding. Colors are permanent, and are resistant to chemicals, solvents, and extreme weather conditions.</span></p><span data-dcnode-id="794" instrument_node="">
