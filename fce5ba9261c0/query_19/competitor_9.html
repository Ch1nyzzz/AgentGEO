</span><p class="has-text-align-center torgPaddingLR has-regular-font-size" data-dcnode-id="957"><span data-dcnode-id="964" instrument_node="">TORGINOL® ColorPigments</span><sup data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">TM</span></sup><span data-dcnode-id="961" instrument_node=""> are available in over 50 color-styles that can be intermixed to create an unlimited array of custom effects. The pearlescent, iridescent and translucent effects of ColorPigments</span><sup data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">TM</span></sup><span data-dcnode-id="958" instrument_node=""> create a shimmering play of light and color that will give your surface a contemporary edge. When choosing colors, you should consider the overall ambiance of your design environment.&nbsp;Darker colors will make a room appear more dramatic and grandiose, while lighter colors create a sense spacious neutrality.</span></p><span data-dcnode-id="956" instrument_node="">
