</span><section class="post-full-content" data-dcnode-id="379"><span data-dcnode-id="510" instrument_node="">
</span><div class="post-content" data-dcnode-id="381"><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="505"><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.mayvenn.com/categories/13-wigs" rel="noopener" target="_blank"><span data-dcnode-id="508" instrument_node="">Wigs</span></a><span data-dcnode-id="506" instrument_node=""> are having a major moment right now. They have firmly placed themselves as one of the most popular styling options for many women of color. Wigs of various kinds have been popular for years, but the units we have now are much different than the ones our great grandmothers may have worn! Over the years, new styles, textures, colors, and styling options have emerged. It's clear that wigs have gone through a major evolution over the years. Read on to learn more about wig origins and how they have evolved over the years.</span></p><h3 data-dcnode-id="502" id="origins-in-ancient-egypt"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Origins in Ancient Egypt</span></strong></h3><p data-dcnode-id="491"><span data-dcnode-id="501" instrument_node="">Ancient Egypt has some of the </span><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intarch.ac.uk/journal/issue42/6/3.cfm" rel="noopener" target="_blank"><span data-dcnode-id="500" instrument_node="">earliest recorded usage</span></a><span data-dcnode-id="498" instrument_node=""> of hair pieces and wigs, with evidence of extensions dating as far back as 3400 B.C. Wigmakers used to create wigs out of a variety of materials such as </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-origins.net/history-ancient-traditions/changing-beauty-use-elaborate-wigs-ancient-egypt-005484" rel="noopener" target="_blank"><span data-dcnode-id="497" instrument_node="">vegetable fibers, wool, animal hair and human hair</span></a><span data-dcnode-id="495" instrument_node="">. It took weeks to make a wig, which made them extremely expensive and out of reach for most Egyptians. Wigs were only adorned by elite Egyptians, often for special occasions. Aside from just looking nice, Egyptians also sometimes wore wigs for more practical purposes. Wigs helped shield those with shaved heads from the blistering Egyptian sun and </span><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/culture/article/20160204-how-ancient-egypt-shaped-our-idea-of-beauty%3Freferer%3Dhttps%253A%252F%252Fwww.google.com%252F" rel="noopener" target="_blank"><span data-dcnode-id="494" instrument_node="">offered some protection from head lice</span></a><span data-dcnode-id="492" instrument_node="">.</span></p><p data-dcnode-id="488"><img alt="Ancient Egyptian Wig" data-dcnode-id="489" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/841bd632-b3df-4216-9524-0fdfe867b78c/-/format/auto/-/quality/best/-/resize/500x/&amp;raw"></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="483"><em data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Image: J. Fletcher/Ancient Adornments Project</span></em></p><p data-dcnode-id="480"><img alt="Ancient Egyptian Wig and Headdress" data-dcnode-id="481" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/80b8a1c9-3b42-4a98-b609-57d96bb820f0/-/format/auto/-/quality/best/-/resize/500x/&amp;raw"></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="470"><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Image: Wig Cover 18th Dynasty, reign of Thutmose III, 1479-1425 BC. Photographed at the </span></em><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.metmuseum.org/" rel="noopener" target="_blank"><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Metropolitan Museum of Art</span></em></a><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node=""> in New York City</span></em></p><h3 data-dcnode-id="468" id="early-20th-century-short-straight-and-sweet"><span data-dcnode-id="469" instrument_node="">Early 20th Century &nbsp;- Short, Straight and Sweet</span></h3><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">The early wigs of Black women in America could be described as simple and sophisticated. In this era, Black women veered towards wigs that were short and straight. Popular styles ranged from pixie cut wigs to shoulder-length bobs. As television boomed and Black musicians, particularly in the 50s and 60s, became televised across the world, we began to see the beginning of performers using wigs in their shows. Female singers became popular for their retro wig looks. Legends such as Aretha Franklin, Diana Ross, and Dionne Warwick often had a variety of wigs that complimented classic looks during a lot of their performances.</span></p><p data-dcnode-id="463"><img alt="The Supremes" data-dcnode-id="464" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/3aa01d4d-095f-47d1-8b69-184fd1a25e2a/-/format/auto/-/quality/best/-/resize/600x/&amp;raw"></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="458"><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Image: WallofCelebrities.com</span></em></p><p data-dcnode-id="455"><img alt="The Ronettes" data-dcnode-id="456" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/b400aaec-3b95-42c1-8138-c5d32532f96c/-/format/auto/-/quality/best/-/resize/600x/&amp;raw"></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="450"><em data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Image: Billboard.com</span></em></p><h3 data-dcnode-id="447" id="1970s-the-emergence-of-natural-hair-wigs"><br data-dcnode-id="449"><span data-dcnode-id="448" instrument_node="">1970s – The Emergence of Natural Hair Wigs</span></h3><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">In the 1970s, big afro and curly wigs came into fashion, and men and women everywhere wore them proudly. The 70s came off the heel of the Civil Rights and Black Power era which saw Black people gain more comfort with embracing naturally textured styles. The emergence of the natural hair revolution is a politically important moment in the evolution of wigs. It signified a change in the collective consciousness of what was beautiful to Black people. Individuals had the option to change up their hairstyles and choose between straight and natural styles, unlike yesteryears where straight styles were the only options. Afro wigs also helped individuals test out natural styles without having to fully commit to them, in a time where natural hair was still a very new concept. The embracing of dramatic afro wigs, particularly by Black artists of the era, solidified it as a defining element of glamorous 70s styles, and paved the way for the plethora of modern, natural hair textured wigs of today.</span></p><p data-dcnode-id="442"><img alt="Diana Ross" data-dcnode-id="443" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/059a4892-9dbc-42ac-a9f8-5e77673e7b8d/-/format/auto/-/quality/best/-/resize/600x/&amp;raw"></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="437"><em data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Image: WorldWideEntertainmentTv</span></em></p><p data-dcnode-id="434"><img alt="Natural Hair Wig Poster from the 1970s" data-dcnode-id="435" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/8233f5eb-23e6-4cfc-a461-ed0d8f913913/-/format/auto/-/quality/best/-/resize/600x/&amp;raw"></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="429"><em data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Image: Pinterest</span></em></p><h3 data-dcnode-id="427" id="1980s-and-1990s-the-beginnings-of-big-hair-and-bright-colors"><span data-dcnode-id="428" instrument_node="">1980s and 1990s – The Beginnings of Big Hair and Bright Colors</span></h3><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">During this era, we begin to see more fun and extravagant wigs taking the stage – especially with our most beloved performers. Big hair had a moment and very dramatic and voluminous, long wigs became popular. During this time period, wigs with non-natural colors start popping up. Before, wigs came mainly in black or brown colors, but now is the era where we start seeing wigs ranging in every color from blonde to blue. They became increasingly popular and seen on the street, magazines and music videos. Musicians like Lil Kim and movies, such as B.A.P.S., showcased the newfound creativity becoming more popular with wig styles available and being worn by the everyday woman.</span></p><p data-dcnode-id="422"><img alt="BAPS" data-dcnode-id="423" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/8775e8b1-1301-4629-92da-313b9953d204/-/format/auto/-/quality/best/-/resize/600x/&amp;raw"></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="417"><em data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Image: Pinterest</span></em></p><p data-dcnode-id="414"><img alt="Lil Kim" data-dcnode-id="415" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/bda08b99-5256-42ac-971b-6bd9dfb06692/-/format/auto/-/quality/best/-/resize/600x/&amp;raw"></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="409"><em data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Image: Biography.com</span></em></p><h3 data-dcnode-id="407" id="2000s-and-beyond-rise-of-the-high-tech-wigs"><span data-dcnode-id="408" instrument_node="">2000s and beyond – Rise of the High Tech Wigs</span></h3><p data-dcnode-id="404"><span data-dcnode-id="406" instrument_node="">Today’s wigs utilize high tech styling techniques that could probably pass for magic. Wigs of centuries past never had natural-looking hairlines. While still stylish, they did not mimic a real hairline or the flow of natural tresses. Wigs looked like wigs! Modern wigs' hairlines have the benefit of closures, frontals, and delicate installation techniques that include steps such as bleaching knots and coloring wig caps. Another bonus of today’s wigs is the addition of more affordable human hair options. Most women in previous generations wore synthetic wigs, because the scarcity of human hair wigs excluded most women from rocking them. In modern times, human hair wigs are more affordable and accessible for women if they so choose. Today’s wigs also come in a multitude of textures, ranging from bone straight to kinky curly. Women today have access to the widest options for wig making and styling; this has led to a whole host of unforgettable wig looks, worn by everyday women and celebrities alike.</span><br data-dcnode-id="405"></p><p data-dcnode-id="401"><img alt="@Krouserdavis wearing Mayvenn" data-dcnode-id="402" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/c1e4dda9-a6ab-4bf0-9dfe-d5b1ecdcacd5/-/format/auto/-/quality/best/-/resize/600x/&amp;raw"></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="393"><em data-dcnode-id="394"><span data-dcnode-id="398" instrument_node="">Image: </span><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/p/B_azWWmFwJe/" rel="noopener" target="_blank"><span data-dcnode-id="397" instrument_node="">@Krouserdavis wearing Mayvenn</span></a><span data-dcnode-id="395" instrument_node=""> </span></em></p><p data-dcnode-id="390"><img alt="@Hairaconda wearing Mayvenn" data-dcnode-id="391" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucarecdn.com/854b247d-262b-419f-9698-e7ebc3bd071b/-/format/auto/-/quality/best/-/resize/600x/&amp;raw"></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="383"><em data-dcnode-id="384"><span data-dcnode-id="387" instrument_node="">Image: </span><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/p/B-dH8TRluEx/" rel="noopener" target="_blank"><span data-dcnode-id="386" instrument_node="">@Hairaconda wearing Mayvenn</span></a></em></p><span data-dcnode-id="382" instrument_node="">
</span></div><span data-dcnode-id="380" instrument_node="">
