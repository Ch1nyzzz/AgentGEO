</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Hello friends!</span></p><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">As you all know, I love color palettes, and am always on the lookout for new ones – especially when it comes to a whole house palette. &nbsp;While I love that open floor plans as a popular trend in homes, they can really make color planning tricky. &nbsp;So, the more resources I can find, the better!</span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">
This lake home is a beauty from the start. &nbsp;If I were to build a house, this is a style that I would have on my list. &nbsp;And check out the gorgeous window box outside of the garage windows!</span></p><span data-dcnode-id="2145" instrument_node="">
</span><div data-dcnode-id="2138"><span data-dcnode-id="2144" instrument_node="">
</span><div data-dcnode-id="2140" style="text-align: center;"><span data-dcnode-id="2143" instrument_node="">
</span><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/photos/5645674/Fisk-Lake-traditional-exterior-grand-rapids"><img border="0" data-dcnode-id="2142" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/st.houzz.com/simgs/be31e4ec02306691_8-3935/traditional-exterior.jpg%3Fresize%3D640%252C427%26ssl%3D1&amp;raw" width="16"></a></div><span data-dcnode-id="2139" instrument_node="">
</span></div><span data-dcnode-id="2137" instrument_node="">
</span><div data-dcnode-id="2127" style="color: #444444;"><span data-dcnode-id="2136" instrument_node="">
</span><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/photos/traditional/exterior" style="color: #444444; text-decoration: none;"><span data-dcnode-id="2135" instrument_node="">Traditional Exterior</span></a><span data-dcnode-id="2133" instrument_node=""> by </span><a data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/professionals/architect/c/Grand-Rapids--MI" style="color: #444444; text-decoration: none;"><span data-dcnode-id="2132" instrument_node="">Grand Rapids Architects &amp; Building Designers</span></a><span data-dcnode-id="2130" instrument_node=""> </span><a data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/pro/pbillings/sears-architects" style="color: #444444; text-decoration: none;"><span data-dcnode-id="2129" instrument_node="">Sears Architects</span></a></div><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">The light and airy vibe continues on the inside with a fresh mix of colors in sandy hues.</span></p><span data-dcnode-id="2123" instrument_node="">
