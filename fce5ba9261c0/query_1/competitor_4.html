</span><h3 class="entry-title" data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Internet of Things (IoT) in Fashion Retail</span></h3><span data-dcnode-id="2167" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2152"><span data-dcnode-id="2166" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2159"><span data-dcnode-id="2165" instrument_node="">Posted on </span><a data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fashionretail.blog/2018/06/11/internet-of-things-in-fashion/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2163" datetime="2018-06-11T07:15:25+02:00"><span data-dcnode-id="2164" instrument_node="">June 11, 2018</span></time><time class="updated" data-dcnode-id="2161" datetime="2019-01-21T23:06:54+01:00"><span data-dcnode-id="2162" instrument_node="">January 21, 2019</span></time></a></span><span class="byline" data-dcnode-id="2154"><span data-dcnode-id="2158" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="2155"><a class="url fn n" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fashionretail.blog/author/alfsegura/"><span data-dcnode-id="2157" instrument_node="">Alfonso Segura</span></a></span></span><span data-dcnode-id="2153" instrument_node=""> </span></div><span data-dcnode-id="2150" instrument_node="">
</span></header><span data-dcnode-id="2147" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1708"><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2122" style="text-align:justify;"><img alt="Internet Of Things - Fashion Retail" class="wp-image-5319 alignleft jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="5319" data-comments-opened="1" data-dcnode-id="2145" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Internet Of Things – Fashion Retail" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/internet-of-things-fashion-retail.jpg?fit=620%2C531&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/internet-of-things-fashion-retail.jpg?fit=300%2C257&amp;ssl=1" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/internet-of-things-fashion-retail.jpg?fit=620%2C531&amp;ssl=1" data-orig-size="620,531" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/internet-of-things-fashion-retail/" data-recalc-dims="1" height="309" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/internet-of-things-fashion-retail.jpg%3Fresize%3D361%252C309%26ssl%3D1&amp;raw" width="361"><noscript data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">&lt;img data-attachment-id="5319" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/internet-of-things-fashion-retail/" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/internet-of-things-fashion-retail.jpg?fit=620%2C531&amp;amp;ssl=1" data-orig-size="620,531" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Internet Of Things &amp;#8211; Fashion Retail" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/internet-of-things-fashion-retail.jpg?fit=300%2C257&amp;amp;ssl=1" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/internet-of-things-fashion-retail.jpg?fit=620%2C531&amp;amp;ssl=1" loading="lazy" class="  wp-image-5319 alignleft" src="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/internet-of-things-fashion-retail.jpg?resize=361%2C309&amp;#038;ssl=1" alt="Internet Of Things - Fashion Retail" width="361" height="309" data-recalc-dims="1" /&gt;</span></noscript><span data-dcnode-id="2142" instrument_node="">This is the last post in a series about </span><strong data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Fashion 4.0</span></strong><span data-dcnode-id="2139" instrument_node=""> in </span><em data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">The Fashion Retailer blog: </span></em><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">IoT and Fashion</span></strong><em data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">. </span></em><span data-dcnode-id="2132" instrument_node="">In previous posts about </span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fashionretail.blog/2018/06/25/the-fashtech-ecosystem/" rel="noopener" target="_blank"><span data-dcnode-id="2131" instrument_node="">Fashion Technology</span></a><span data-dcnode-id="2129" instrument_node="">,</span><em data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node=""> w</span></em><span data-dcnode-id="2126" instrument_node="">e have reviewed how Artificial Intelligence, Augmented Reality, Virtual Reality, 3D Printing and Blockchain are transforming the Fashion Retail industry. Those technologies are not hermetic and create synergies like the one between AI, Blockchain and IoT. </span><strong data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Everything</span></strong><span data-dcnode-id="2123" instrument_node=""> will be connected (to the cloud) by 2020.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><h5 data-dcnode-id="2118"><strong data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">What is the Internet of Things?</span></strong></h5><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2101" style="text-align:justify;"><span data-dcnode-id="2116" instrument_node="">At </span><em data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Wired.com</span></em><span data-dcnode-id="2113" instrument_node="">, the term </span><strong data-dcnode-id="2109"><em data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">IoT</span></em><span data-dcnode-id="2110" instrument_node=""> </span></strong><span data-dcnode-id="2108" instrument_node="">is described as something that encompasses everything connected to the internet, but it is increasingly being used to define objects that “talk” to each other. “Simply, the </span><strong data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Internet of Things</span></strong><span data-dcnode-id="2105" instrument_node=""> is made up of devices – from simple sensors to smartphones and wearables – connected together,” Matthew Evans, the IoT programme head at&nbsp;techUK, says.&nbsp;By combining these connected devices with automated systems, it is possible to “gather information, analyse it and create an action” to help someone with a particular task, or learn from a process. In reality, this ranges from&nbsp;smart mirrors&nbsp;to&nbsp;beacons in shops&nbsp;and beyond (Feb 2018. </span><em data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Wired Explain</span></em><span data-dcnode-id="2102" instrument_node=""> by Matt Burgess).</span></p><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2089" style="text-align:justify;"><span data-dcnode-id="2099" instrument_node="">In 2014, one of the early adopters in the retail arena was </span><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Macy´s</span></strong><span data-dcnode-id="2096" instrument_node="">,&nbsp; that implemented </span><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">beacons</span></strong><span data-dcnode-id="2093" instrument_node="">, wireless devices that transmit Bluetooth signals, to send location-based promotions thru its app. Another example, easy to remember if you practice sport, was </span><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Nike+ shoes</span></strong><span data-dcnode-id="2090" instrument_node="">, that included a sensor that could track your running performance thru an iPhone App or iPod.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2084"><img alt="Nike+ sensor running performance internet of things - The Fashion Retailer" class="wp-image-5314 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="5314" data-comments-opened="1" data-dcnode-id="2087" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Nike+ sensor running performance internet of things – The Fashion Retailer" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/nike-sensor-running-performance-internet-of-things-the-fashion-retailer.jpg?fit=748%2C412&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/nike-sensor-running-performance-internet-of-things-the-fashion-retailer.jpg?fit=300%2C165&amp;ssl=1" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/nike-sensor-running-performance-internet-of-things-the-fashion-retailer.jpg?fit=1170%2C645&amp;ssl=1" data-orig-size="1170,645" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/nike-sensor-running-performance-internet-of-things-the-fashion-retailer/" data-recalc-dims="1" height="313" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/nike-sensor-running-performance-internet-of-things-the-fashion-retailer.jpg%3Fresize%3D569%252C313%26ssl%3D1&amp;raw" width="569"><noscript data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">&lt;img data-attachment-id="5314" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/nike-sensor-running-performance-internet-of-things-the-fashion-retailer/" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/nike-sensor-running-performance-internet-of-things-the-fashion-retailer.jpg?fit=1170%2C645&amp;amp;ssl=1" data-orig-size="1170,645" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Nike+ sensor running performance internet of things &amp;#8211; The Fashion Retailer" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/nike-sensor-running-performance-internet-of-things-the-fashion-retailer.jpg?fit=300%2C165&amp;amp;ssl=1" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/nike-sensor-running-performance-internet-of-things-the-fashion-retailer.jpg?fit=748%2C412&amp;amp;ssl=1" loading="lazy" class="  wp-image-5314 aligncenter" src="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/nike-sensor-running-performance-internet-of-things-the-fashion-retailer.jpg?resize=569%2C313&amp;#038;ssl=1" alt="Nike+ sensor running performance internet of things - The Fashion Retailer" width="569" height="313" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2057" style="text-align:justify;"><span data-dcnode-id="2082" instrument_node="">The </span><strong data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Sport Industry</span></strong><span data-dcnode-id="2079" instrument_node=""> is taking profit from the body cult and the industry of leisure is continuously evolving and adapting </span><strong data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">technology</span></strong><span data-dcnode-id="2076" instrument_node=""> into garments and accessories: wearables (e.g.&nbsp;</span><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.suunto.com/en-US/" rel="noopener" target="_blank"><span data-dcnode-id="2075" instrument_node="">Suunto</span></a><span data-dcnode-id="2073" instrument_node="">,&nbsp;</span><a data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.garmin.com/en-US" rel="noopener" target="_blank"><span data-dcnode-id="2072" instrument_node="">Garmin</span></a><span data-dcnode-id="2070" instrument_node="">,&nbsp;</span><a data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polar.com/us-en" rel="noopener" target="_blank"><span data-dcnode-id="2069" instrument_node="">Polar</span></a><span data-dcnode-id="2067" instrument_node="">), tracking Apps (e.g. Movescount,&nbsp;</span><a data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strava.com/" rel="noopener" target="_blank"><span data-dcnode-id="2066" instrument_node="">Strava</span></a><span data-dcnode-id="2064" instrument_node="">), devices (Go Pro,&nbsp;</span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airdog.com/" rel="noopener" target="_blank"><span data-dcnode-id="2063" instrument_node="">Airdog</span></a><span data-dcnode-id="2061" instrument_node="">,&nbsp;</span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hexoplus.com/" rel="noopener" target="_blank"><span data-dcnode-id="2060" instrument_node="">Hexo+</span></a><span data-dcnode-id="2058" instrument_node="">&nbsp;and sports drones) are just an example of how the ecosystem of sportswear is using high-tech to provide more services to sports lovers.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2052"><img alt="Strava and Suunto Movescount app Internet of Things Sports wearables - The Fashion Retailer" class="wp-image-5316 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="5316" data-comments-opened="1" data-dcnode-id="2055" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;Segura, Alfonso&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1527251887&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Strava and Suunto Movescount app Internet of Things Sports wearables – The Fashion Retailer" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer.jpg?fit=748%2C425&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer.jpg?fit=300%2C171&amp;ssl=1" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer.jpg?fit=990%2C563&amp;ssl=1" data-orig-size="990,563" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer/" data-recalc-dims="1" height="352" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer.jpg%3Fresize%3D619%252C352%26ssl%3D1&amp;raw" width="619"><noscript data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">&lt;img data-attachment-id="5316" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer/" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer.jpg?fit=990%2C563&amp;amp;ssl=1" data-orig-size="990,563" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"Segura, Alfonso","camera":"","caption":"","created_timestamp":"1527251887","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Strava and Suunto Movescount app Internet of Things Sports wearables &amp;#8211; The Fashion Retailer" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer.jpg?fit=300%2C171&amp;amp;ssl=1" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer.jpg?fit=748%2C425&amp;amp;ssl=1" loading="lazy" class="  wp-image-5316 aligncenter" src="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/strava-and-suunto-movescount-app-internet-of-things-sports-wearables-the-fashion-retailer.jpg?resize=619%2C352&amp;#038;ssl=1" alt="Strava and Suunto Movescount app Internet of Things Sports wearables - The Fashion Retailer" width="619" height="352" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2043" style="text-align:justify;"><span data-dcnode-id="2050" instrument_node="">In </span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fashionretail.blog/2017/09/18/sports-and-fashion-a-sociological-approach-to-the-ironman-era/" rel="noopener" target="_blank"><span data-dcnode-id="2049" instrument_node="">Sports and Fashion in the Ironman era</span></a><span data-dcnode-id="2047" instrument_node="">, I described how smart devices measure performance with biometric sensors.&nbsp; But it´s not only a sporty trend and, today, it´s usual to see more and more people wearing high-thech sport watches on a daily basis. Even some business executives are wearing a&nbsp;</span><a data-dcnode-id="2045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.suunto.com/en-US/" rel="noopener" target="_blank"><span data-dcnode-id="2046" instrument_node="">Suunto</span></a><span data-dcnode-id="2044" instrument_node="">&nbsp;watch (or others like Garmin, Polar), instead of a Rolex or any automatic luxury watch. It´s cool, a symbol of status/ way of life and a sign of having a healthy life.</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2023" style="text-align:justify;"><span data-dcnode-id="2041" instrument_node="">The </span><strong data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">benefits of IoT</span></strong><span data-dcnode-id="2038" instrument_node="">&nbsp;</span><strong data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">for apparel and accessories customers</span></strong><span data-dcnode-id="2035" instrument_node=""> are huge, and most of them are linked to </span><strong data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">health</span></strong><span data-dcnode-id="2032" instrument_node="">. Smart sensors located in a shirt (see </span><strong data-dcnode-id="2029"><a data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hexoskin.com/" rel="noopener" target="_blank"><span data-dcnode-id="2031" instrument_node="">Hexoskin</span></a></strong><span data-dcnode-id="2028" instrument_node="">), for example, could track your heart-rate or temperature, while socks could measure your steps, calories consumed, amongst other data (see </span><strong data-dcnode-id="2025"><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sensoriafitness.com/" rel="noopener" target="_blank"><span data-dcnode-id="2027" instrument_node="">Sensoria</span></a></strong><span data-dcnode-id="2024" instrument_node="">). This data will provide experts or doctors with valuable information that permits to monitor your health and performance.</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2011" style="text-align:justify;"><span data-dcnode-id="2021" instrument_node="">The </span><strong data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">benefits of IoT for fashion retail companies </span></strong><span data-dcnode-id="2018" instrument_node="">are: to better understand customers needs and product usage will permit to improve customer service; optimize product assortment and customize recommendations; to improve design, pattern and shape; to have more insights to innovate; to track &amp; trace thanks to RFID (read an </span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fashionretail.blog/2017/06/26/a-few-words-with-an-operations-manager-at-brownie/" rel="noopener" target="_blank"><span data-dcnode-id="2017" instrument_node="">interview</span></a><span data-dcnode-id="2015" instrument_node=""> to an Operations Manager that implemented RFID at </span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.browniespain.com/es/" rel="noopener" target="_blank"><span data-dcnode-id="2014" instrument_node="">Brownie</span></a><span data-dcnode-id="2012" instrument_node="">, a fashion retail company from Barcelona). RFID was implemented by Zara in 2014 (Zara started testing with RFID in 2007!), and is a clear Omnichannel enabler.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><h5 data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">What are the companies using IoT in the Fashion industry (apart from the previous ones)?</span></h5><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2001" style="text-align:justify;"><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.loomia.com/" rel="noopener" target="_blank"><strong data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">LOOMIA</span></strong><span data-dcnode-id="2004" instrument_node=""> </span></a><span data-dcnode-id="2002" instrument_node="">designs and manufactures soft, flexible circuitry that can heat, light, sense and track data, while seamlessly integrating into soft goods.&nbsp;The LOOMIA Electronic Layer (LEL) is a soft flexible circuit that can be embedded into textiles for heating, lighting, sensing or data-tracking applications.&nbsp;The LEL integrates seamlessly with user´s chosen material. Their IP is in several areas: flexible apparel-friendly connectors, components, custom battery form factors, and e-patterned materials.</span></p><span data-dcnode-id="2000" instrument_node="">

4%2C563&amp;amp;ssl=1" data-orig-size="1044,563" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"Segura, Alfonso","camera":"","caption":"","created_timestamp":"1527259171","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Loomia IoT apparel &amp;#8211; Fashion Retail" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/loomia-iot-apparel-fashion-retail.jpg?fit=300%2C162&amp;amp;ssl=1" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/loomia-iot-apparel-fashion-retail.jpg?fit=748%2C403&amp;amp;ssl=1" loading="lazy" class="  wp-image-5324 aligncenter" src="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/loomia-iot-apparel-fashion-retail.jpg?resize=560%2C302&amp;#038;ssl=1" alt="Loomia IoT apparel - Fashion Retail" width="560" height="302" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1995" instrument_node="">

</span><p data-dcnode-id="1984" style="text-align:justify;"><strong data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Coded Couture by</span></strong><span data-dcnode-id="1989" instrument_node=""> </span><a data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ivyrevel.com/es/home" rel="noopener" target="_blank"><strong data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">IVYREVEL</span></strong></a><span data-dcnode-id="1985" instrument_node="">: the Swedish-based brand partnered with Google to develop Coded Couture app. This app would track your activities in order to create a dress. According where do you go (e.g. fancy restaurant, famous night-club, neighborhood), the app will recommend to add diamonds, a modern style, a specific color, etc.</span></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1979"><img alt="Coded Couture Ivyrevel Google HM Internet of Things - Fashion Retail" class="wp-image-5329 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="5329" data-comments-opened="1" data-dcnode-id="1982" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Coded Couture Ivyrevel Google HM Internet of Things – Fashion Retail" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail.jpg?fit=748%2C424&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail.jpg?fit=300%2C170&amp;ssl=1" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail.jpg?fit=1225%2C695&amp;ssl=1" data-orig-size="1225,695" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail/" data-recalc-dims="1" height="322" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail.jpg%3Fresize%3D567%252C322%26ssl%3D1&amp;raw" width="567"><noscript data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">&lt;img data-attachment-id="5329" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail/" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail.jpg?fit=1225%2C695&amp;amp;ssl=1" data-orig-size="1225,695" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Coded Couture Ivyrevel Google HM Internet of Things &amp;#8211; Fashion Retail" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail.jpg?fit=300%2C170&amp;amp;ssl=1" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail.jpg?fit=748%2C424&amp;amp;ssl=1" loading="lazy" class="  wp-image-5329 aligncenter" src="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/coded-couture-ivyrevel-google-hm-internet-of-things-fashion-retail.jpg?resize=567%2C322&amp;#038;ssl=1" alt="Coded Couture Ivyrevel Google HM Internet of Things - Fashion Retail" width="567" height="322" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1978" instrument_node="">

</span><p data-dcnode-id="1955" style="text-align:justify;"><strong data-dcnode-id="1966"><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitbit.com/" rel="noopener" target="_blank"><span data-dcnode-id="1969" instrument_node="">FITBIT</span></a><span data-dcnode-id="1967" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1965" instrument_node="">In 2007, our founders, Eric and James, realised that sensors and wireless technology had advanced to a point where they could bring amazing experiences to fitness and health. They embarked on a journey to create a wearable product that would change the way we move. In May 2018, Fitbit and Google announced that they are teaming up.&nbsp;Fitbit will use Google’s new&nbsp;</span><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blog.google/topics/google-cloud/google-cloud-healthcare-new-apis-customers-partners-and-security-updates/" rel="noopener" target="_blank"><span data-dcnode-id="1964" instrument_node="">Cloud Healthcare API</span></a><span data-dcnode-id="1962" instrument_node="">&nbsp;to integrate its data into healthcare applications, allowing users&nbsp;to have a better understanding of their own health while providing doctors with valuable insights. Fitbit also collaborates with luxury fashion houses like </span><a data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitbit.com/designer-collections/tory-burch" rel="noopener" target="_blank"><span data-dcnode-id="1961" instrument_node="">Tory Burch</span></a><span data-dcnode-id="1959" instrument_node="">&nbsp;(</span><em data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Fashion Meets Fitness</span></em><span data-dcnode-id="1956" instrument_node="">).</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1944" style="text-align:justify;"><strong data-dcnode-id="1951"><a data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Amazon-Echo-2nd-Generation-Heather-Grey-Fabric/dp/B0749YXKYZ" rel="noopener" target="_blank"><span data-dcnode-id="1953" instrument_node="">AMAZON ECHO</span></a></strong><span class="a-list-item" data-dcnode-id="1945"><span data-dcnode-id="1950" instrument_node="">&nbsp;connects to Alexa-a cloud-based voice service-to play music, make calls, set alarms and timers, ask questions, check your calendar, weather, traffic and sports scores, manage to-do and shopping lists, control compatible smart home devices, and more. </span><a data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0186JAEWK/ref%3Dfs_ods_hx" rel="noopener" target="_blank"><strong data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">ECHO LOOK</span></strong></a><span data-dcnode-id="1946" instrument_node=""> is a hands-free camera and style assistant with Alexa that incudes style check to get a second opinion on your oufit.</span></span></p><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1939"><img alt="Amazon Echo series IoT devices - Fashion Retail" class="wp-image-5340 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="5340" data-comments-opened="1" data-dcnode-id="1942" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Amazon Echo series IoT devices – Fashion Retail" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/amazon-echo-series-iot-devices-fashion-retail.jpg?fit=748%2C498&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/amazon-echo-series-iot-devices-fashion-retail.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/amazon-echo-series-iot-devices-fashion-retail.jpg?fit=1600%2C1066&amp;ssl=1" data-orig-size="1600,1066" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/amazon-echo-series-iot-devices-fashion-retail/" data-recalc-dims="1" height="314" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/amazon-echo-series-iot-devices-fashion-retail.jpg%3Fresize%3D471%252C314%26ssl%3D1&amp;raw" width="471"><noscript data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">&lt;img data-attachment-id="5340" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/amazon-echo-series-iot-devices-fashion-retail/" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/amazon-echo-series-iot-devices-fashion-retail.jpg?fit=1600%2C1066&amp;amp;ssl=1" data-orig-size="1600,1066" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Amazon Echo series IoT devices &amp;#8211; Fashion Retail" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/amazon-echo-series-iot-devices-fashion-retail.jpg?fit=300%2C200&amp;amp;ssl=1" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/amazon-echo-series-iot-devices-fashion-retail.jpg?fit=748%2C498&amp;amp;ssl=1" loading="lazy" class="  wp-image-5340 aligncenter" src="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/amazon-echo-series-iot-devices-fashion-retail.jpg?resize=471%2C314&amp;#038;ssl=1" alt="Amazon Echo series IoT devices - Fashion Retail" width="471" height="314" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1930" style="text-align:justify;"><span class="a-list-item" data-dcnode-id="1933"><span data-dcnode-id="1937" instrument_node="">Amongs its characteristics, </span><strong data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">ECHO LOOK</span></strong><span data-dcnode-id="1934" instrument_node=""> permits to see yourself from every angle in the Echo Look app, view photos and videos of your outfits, select your favorites, organize your looks into Collections, and share with friends. Also allows to discover new brands and styles and see what colors you wear most often. From Echo Look, you can get</span></span><span class="a-list-item" data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">&nbsp;a second opinion on which outfit looks best with Style Check, a new service that combines machine learning algorithms with advice from fashion specialists.</span></span></p><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1915" style="text-align:justify;"><strong data-dcnode-id="1926"><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evrythng.com/" rel="noopener" target="_blank"><span data-dcnode-id="1928" instrument_node="">EVRYTHNG</span></a></strong><span data-dcnode-id="1925" instrument_node=""> is a Smart Products Platform in the cloud that&nbsp;collects, manages and applies real-time data from smart products and smart packaging to drive IoT applications.&nbsp;EVRYTHNG has partnered with </span><strong data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Avery Dennison</span></strong><span data-dcnode-id="1922" instrument_node=""> RBIS to enable 10 billion apparel items to be ‘</span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evrythng.com/borndigital/" rel="noopener" target="_blank"><span data-dcnode-id="1921" instrument_node="">Born Digital</span></a><span data-dcnode-id="1919" instrument_node="">’, via the Janela™ Smart Products Platform – powered by EVRYTHNG.&nbsp;Each </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Born Digital</span></em><span data-dcnode-id="1916" instrument_node=""> item connects to an intelligent, software brain in the cloud. This means brands can turn all their products into an owned digital media platform for valuable new insights, direct consumer relationships and smarter business operations.</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1910"><img alt="Born Digital EVRYTHNG Avery Dennison IoT Fashion Apparel - Fashion Retail" class="wp-image-5343 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="5343" data-comments-opened="1" data-dcnode-id="1913" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;Segura, Alfonso&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1527505814&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Born Digital EVRYTHNG Avery Dennison IoT Fashion Apparel – Fashion Retail" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/born-digital-evrythng-avery-dennison-iot-fashion-apparel-fashion-retail.jpg?fit=748%2C421&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/born-digital-evrythng-avery-dennison-iot-fashion-apparel-fashion-retail.jpg?fit=300%2C169&amp;ssl=1" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/born-digital-evrythng-avery-dennison-iot-fashion-apparel-fashion-retail.jpg?fit=808%2C455&amp;ssl=1" data-orig-size="808,455" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/born-digital-evrythng-avery-dennison-iot-fashion-apparel-fashion-retail/" data-recalc-dims="1" height="326" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/born-digital-evrythng-avery-dennison-iot-fashion-apparel-fashion-retail.jpg%3Fresize%3D579%252C326%26ssl%3D1&amp;raw" width="579"><noscript data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">&lt;img data-at </span><p data-dcnode-id="1882" style="text-align:justify;"><strong data-dcnode-id="1896"><a data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.averydennison.com/en/home.html" rel="noopener" target="_blank"><span data-dcnode-id="1899" instrument_node="">AVERY DENNISON</span></a><span data-dcnode-id="1897" instrument_node="">&nbsp;&nbsp;</span></strong><span data-dcnode-id="1895" instrument_node="">manufactures and distributes display graphics, labeling and packaging materials, retail graphic embellishments and RFID tags that companies around the world use to engage customers and efficiently manage their inventories. Ini 2016, they partnered with </span><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rbis.averydennison.com/en/home/about-us/newsroom/press-releases/RochambeauSmartJacket.html" rel="noopener" target="_blank"><span data-dcnode-id="1894" instrument_node="">Rochambeau </span></a><span data-dcnode-id="1892" instrument_node="">and EVRYTHNG to create Bright BMBR – a bomber jacket embedded with a NFC chip and a personalised QR code. In 2017, </span><strong data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Avery Dennison</span></strong><span data-dcnode-id="1889" instrument_node="">’s and </span><strong data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">EVRYTHNG</span></strong><span data-dcnode-id="1886" instrument_node=""> partnered with </span><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/rachelarthur/2017/02/01/rebecca-minkoff-launches-connected-bags-for-access-to-fashion-week-show/%233becad8f5a14" rel="noopener" target="_blank"><span data-dcnode-id="1885" instrument_node="">Rebecca Minkoff</span></a><span data-dcnode-id="1883" instrument_node="">&nbsp; to launch smart bags. Customers can scan the bag and will receive&nbsp;exclusive offers, e-commerce services, private styling sessions with Rebecca, style recommendations, video content, etc.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1877"><img alt="bmbr-rochambeau-evrythng-iot-fashion-apparel-fashion-retail.png" class="wp-image-5353 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="5353" data-comments-opened="1" data-dcnode-id="1880" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="BMBR Rochambeau Evrythng IoT Fashion Apparel – Fashion Retail" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/bmbr-rochambeau-evrythng-iot-fashion-apparel-fashion-retail-e1527524661888.png?fit=733%2C666&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/bmbr-rochambeau-evrythng-iot-fashion-apparel-fashion-retail-e1527524661888.png?fit=300%2C273&amp;ssl=1" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/bmbr-rochambeau-evrythng-iot-fashion-apparel-fashion-retail-e1527524661888.png?fit=733%2C666&amp;ssl=1" data-orig-size="733,666" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/bmbr-rochambeau-evrythng-iot-fashion-apparel-fashion-retail/" data-recalc-dims="1" height="437" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/bmbr-rochambeau-evrythng-iot-fashion-apparel-fashion-retail-e1527524661888.png%3Fresize%3D481%252C437%26ssl%3D1&amp;raw" width="481"><noscript data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">&lt;img data-attachment-id="5353" data-permalink="https://fas </span><p data-dcnode-id="1866" style="text-align:justify;"><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.farfetch.com/es/" rel="noopener" target="_blank"><strong data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">FARFETCH</span></strong></a><span data-dcnode-id="1869" instrument_node="">&nbsp;is an online fashion retail platform that sells products from over 700 boutiques and brands from around the world.</span><sup class="reference" data-dcnode-id="1868" id="cite_ref-1"></sup><span data-dcnode-id="1867" instrument_node="">&nbsp;The company was founded in 2007 by the Portuguese entrepreneur&nbsp;José Neves&nbsp;with its headquarters in London. In 2017, Farfetch envisioned the Store of the Future to give an experience that gather the best from offline and online worlds. The enabler is, how not, technology and data (e.g. smart fitting room, RFID, customized service, etc).</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1861"><img alt="Farfecth Store of the Future - IoT - The Fashion Retailer" class="wp-image-5349 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="5349" data-comments-opened="1" data-dcnode-id="1864" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Farfecth Store of the Future – IoT – The Fashion Retailer" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/farfecth-store-of-the-future-iot-the-fashion-retailer.jpg?fit=748%2C499&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/farfecth-store-of-the-future-iot-the-fashion-retailer.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/farfecth-store-of-the-future-iot-the-fashion-retailer.jpg?fit=960%2C640&amp;ssl=1" data-orig-size="960,640" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/farfecth-store-of-the-future-iot-the-fashion-retailer/" data-recalc-dims="1" height="372" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/farfecth-store-of-the-future-iot-the-fashion-retailer.jpg%3Fresize%3D559%252C372%26ssl%3D1&amp;raw" width="559"><noscript data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">&lt;img data-attachment-id="5349" data-permalink="https://fashionretail.blog/2018/06/11/internet-of-things-in-fashion/farfecth-store-of-the-future-iot-the-fashion-retailer/" data-orig-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/farfecth-store-of-the-future-iot-the-fashion-retailer.jpg?fit=960%2C640&amp;amp;ssl=1" data-orig-size="960,640" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Farfecth Store of the Future &amp;#8211; IoT &amp;#8211; The Fashion Retailer" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/farfecth-store-of-the-future-iot-the-fashion-retailer.jpg?fit=300%2C200&amp;amp;ssl=1" data-large-file="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/farfecth-store-of-the-future-iot-the-fashion-retailer.jpg?fit=748%2C499&amp;amp;ssl=1" loading="lazy" class="  wp-image-5349 aligncenter" src="https://i0.wp.com/fashionretail.blog/wp-content/uploads/2018/06/farfecth-store-of-the-future-iot-the-fashion-retailer.jpg?resize=559%2C372&amp;#038;ssl=1" alt="Farfecth Store of the Future - IoT - The Fashion Retailer" width="559" height="372" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1860" instrument_node="">

</span><p data-dcnode-id="1852" style="text-align:justify;"><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wearablex.com/" rel="noopener" target="_blank"><strong data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">WEARABLE X</span></strong></a><span data-dcnode-id="1853" instrument_node=""> is a fashion tech company that brings together design and technology to create a better quality of life. The Sydney-born, NYC-based company launched in 2013 with a product centered around touch. The first development of the haptic platform was Fundawear: vibrating underwear for couples in long distance relationships. Done in partnership with Havas for a Durex campaign, the success of this campaign led to the launch of Wearable Experiments (now Wearable X).</span></p><span data-dcnode-id="1851" instrument_node="">
