</span><header data-dcnode-id="1255"><span data-dcnode-id="1266" instrument_node="">
</span><h1 class="title single-title entry-title" data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">How Does Sugar Affect Our Brain?</span></h1><span data-dcnode-id="1263" instrument_node="">
</span><div class="post-info" data-dcnode-id="1257"><span data-dcnode-id="1262" instrument_node="">
</span><span class="thetime date updated" data-dcnode-id="1259"><span data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Updated on: 22 Jan 2022 by Brendan D'mello</span></span></span><span data-dcnode-id="1258" instrument_node="">
</span></div><span data-dcnode-id="1256" instrument_node="">
</span></header><span data-dcnode-id="1254" instrument_node="">

</span><div class="thecontent" data-dcnode-id="970"><span data-dcnode-id="1252" instrument_node="">
</span><div class="tocdiv" data-dcnode-id="1228"><span class="tocspan" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Table of Contents</span></span><ul data-dcnode-id="1229"><li data-dcnode-id="1247"><a data-dcnode-id="1248" href="#the-reward-system"><span data-dcnode-id="1249" instrument_node="">The Reward System</span></a></li><li data-dcnode-id="1244"><a data-dcnode-id="1245" href="#the-mood-booster"><span data-dcnode-id="1246" instrument_node="">The Mood-Booster</span></a></li><li data-dcnode-id="1241"><a data-dcnode-id="1242" href="#brain-power"><span data-dcnode-id="1243" instrument_node="">Brain Power</span></a></li><li data-dcnode-id="1238"><a data-dcnode-id="1239" href="#mood"><span data-dcnode-id="1240" instrument_node="">Mood</span></a></li><li data-dcnode-id="1236"><a data-dcnode-id="1237" href="#"></a></li><li data-dcnode-id="1233"><a data-dcnode-id="1234" href="#what-rsquo-s-the-alternative"><span data-dcnode-id="1235" instrument_node="">What’s the Alternative?</span></a></li><li data-dcnode-id="1230"><a data-dcnode-id="1231" href="#suggested-reading"><span data-dcnode-id="1232" instrument_node="">Suggested Reading</span></a></li></ul></div><p data-dcnode-id="1223"><span data-dcnode-id="1227" instrument_node="">There are so many delicious things to eat these days – ice cream, cake, chocolate, flavored sodas etc. All these wonderful things have one ingredient in common: </span><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Sugar</span></strong><span data-dcnode-id="1224" instrument_node="">.</span></p><p data-dcnode-id="1206"><span data-dcnode-id="1222" instrument_node="">This </span><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">simple carbohydrate</span></strong><span data-dcnode-id="1219" instrument_node=""> (</span><strong data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">glucose</span></strong><span data-dcnode-id="1216" instrument_node="">, in its simplest form) is also added to our coffee and tea (in the form of </span><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">sucrose</span></strong><span data-dcnode-id="1213" instrument_node="">, or table sugar). It is also naturally present in many important foods, such as milk (</span><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">lactose</span></strong><span data-dcnode-id="1210" instrument_node="">) and fruits (</span><strong data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">fructose</span></strong><span data-dcnode-id="1207" instrument_node="">). Therefore, with this ingredient being so widely prevalent in our food, it’s time to find out how it actually affects our brain.</span></p><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node=""> </span></p><div class="wp-caption aligncenter" data-dcnode-id="1198" id="attachment_3585" style="width: 1010px"><img alt="Woman Eating Cupcake" aria-describedby="caption-attachment-3585" class="size-full wp-image-3585 lazy-loaded" data-dcnode-id="1203" data-lazy-type="image" data-src="https://www.scienceabc.com/wp-content/uploads/ext-www.scienceabc.com/wp-content/uploads/2015/08/Woman-Eating-Cupcake.jpg-.jpg" data-srcset="" height="877" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scienceabc.com/wp-content/uploads/ext-www.scienceabc.com/wp-content/uploads/2015/08/Woman-Eating-Cupcake.jpg-.jpg&amp;raw" srcset="https://www.scienceabc.com/wp-content/uploads/2015/08/Woman-Eating-Cupcake.jpg 1000w, https://www.scienceabc.com/wp-content/uploads/2015/08/Woman-Eating-Cupcake-300x263.jpg 300w, https://www.scienceabc.com/wp-content/uploads/2015/08/Woman-Eating-Cupcake-768x674.jpg 768w" width="1000"><noscript data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">&lt;img aria-describedby="caption-attachment-3585" loading="lazy" class="size-full wp-image-3585" src="https://www.scienceabc.com/wp-content/uploads/ext-www.scienceabc.com/wp-content/uploads/2015/08/Woman-Eating-Cupcake.jpg-.jpg" alt="Woman Eating Cupcake" width="1000" height="877" srcset="https://www.scienceabc.com/wp-content/uploads/2015/08/Woman-Eating-Cupcake.jpg 1000w, https://www.scienceabc.com/wp-content/uploads/2015/08/Woman-Eating-Cupcake-300x263.jpg 300w, https://www.scienceabc.com/wp-content/uploads/2015/08/Woman-Eating-Cupcake-768x674.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1199" id="caption-attachment-3585"><span data-dcnode-id="1200" instrument_node="">Credits:Africa Studio/Shutterstock</span></p></div><span data-dcnode-id="1197" instrument_node=""> </span><hr data-dcnode-id="1196" style="border-bottom:1.5px solid black !important; margin:5px 0px !important;width:100% !important;"><p data-dcnode-id="1193" style="font-size:0.75em !important;"><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Recommended Video for you:</span></strong></p><lite-youtube data-dcnode-id="1187" params="controls=1&amp;start=0&amp;modestbranding=2&amp;rel=0&amp;enablejsapi=1&amp;showinfo=0&amp;origin=https://www.scienceabc.com" style="background-image: url(&quot;https://i.ytimg.com/vi/JagPP3MX5ks/hqdefault.jpg&quot;);" videoid="JagPP3MX5ks"><button class="lty-playbtn" data-dcnode-id="1188" type="button"><span class="lyt-visually-hidden" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Play</span></span></button></lite-youtube><div data-dcnode-id="1183" style="font-size:0.9em !important"><center data-dcnode-id="1184"><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJagPP3MX5ks" id="youtubeurl" target="_blank"><span data-dcnode-id="1186" instrument_node="">Cellular Respiration: How Do Cell Get Energy?</span></a></center></div><hr data-dcnode-id="1182" style="border-bottom:1.5px solid black !important; margin:10px 0px !important;width:100% !important;"><span data-dcnode-id="1181" instrument_node=""> </span><p data-dcnode-id="1180"></p><div class="bigincontentad" data-dcnode-id="1179" data-fuse="22259117103" id="22259117103626192fab9811" style="margin: 8px auto; text-align: center; clear: both;"></div><h2 data-dcnode-id="1177" id="the-reward-system"><span data-dcnode-id="1178" instrument_node="">The Reward System</span></h2><p data-dcnode-id="1169"><span data-dcnode-id="1176" instrument_node="">From the very moment that sugar enters your mouth, it is sensed by the tongue’s taste buds and a message is sent to the brain. This sugar-induced signal stimulates the release of </span><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">dopamine</span></strong><span data-dcnode-id="1173" instrument_node="">, which is a neurotransmitter responsible for activating the </span><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">brain’s reward system</span></strong><span data-dcnode-id="1170" instrument_node="">. Dopamine essentially makes you feel good, so every time you eat sugar, your brain releases dopamine, basically reminding&nbsp;you that eating sugar will make you happy.</span></p><p data-dcnode-id="1158"><span data-dcnode-id="1168" instrument_node="">In fact, this effect of eating sugar is so powerful that it triggers similar brain activity to&nbsp;extreme cases of the reward system: </span><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">addiction</span></strong><span data-dcnode-id="1165" instrument_node="">. In cases of addiction, such as dependencies on drugs, nicotine and alcohol, dopamine receptors become hyperactive, which&nbsp;</span><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">gives you a high. </span></strong><span data-dcnode-id="1162" instrument_node="">Sugar has a similar effect, although fortunately for us, it is not nearly as extreme. This dopamine burst leads to </span><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">craving</span></strong><span data-dcnode-id="1159" instrument_node="">&nbsp;more sugar, and will even cause withdrawal symptoms when sugar isn’t available for a quick fix.</span></p><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node=""> </span></p><center data-dcnode-id="1152"><iframe class="lazy-loaded" data-dcnode-id="1155" data-lazy-type="iframe" data-src="//giphy.com/embed/hw6P7TzRID8UE" frameborder="0" height="268" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//giphy.com/embed/hw6P7TzRID8UE&amp;raw" width="480"></iframe><noscript data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">&lt;iframe loading="lazy" src="//giphy.com/embed/hw6P7TzRID8UE" width="480" height="268" frameborder="0"&gt;&lt;/iframe&gt;</span></noscript></center><h2 data-dcnode-id="1150" id="the-mood-booster"><span data-dcnode-id="1151" instrument_node="">The Mood-Booster</span></h2><p data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node="">Sugar also stimulates the release of a certain neurotransmitter called </span><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">serotonin in the brain</span></strong><span data-dcnode-id="1146" instrument_node="">. This particular chemical is most famous for keeping us in a good mood. Therefore, this effect of sugar on our brain is a good thing, right? We eat sugar, so we feel happy. What could be wrong with that?</span></p><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node=""> </span></p><center data-dcnode-id="1139"><iframe class="lazy-loaded" data-dcnode-id="1142" data-lazy-type="iframe" data-src="//giphy.com/embed/rqhS8YpFCv7m8" frameborder="0" height="268" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//giphy.com/embed/rqhS8YpFCv7m8&amp;raw" width="480"></iframe><noscript data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">&lt;iframe loading="lazy" src="//giphy.com/embed/rqhS8YpFCv7m8" width="480" height="268" frameborder="0"&gt;&lt;/iframe&gt;</span></noscript></center><p data-dcnode-id="1131"><span data-dcnode-id="1138" instrument_node="">Sadly, it’s not that simple. Eating too much sugar releases far more&nbsp;serotonin than we need. When these serotonin pathways continue to&nbsp;be activated, our limited store of serotonin is eventually going to be depleted. Finally, due to decreased levels of serotonin in our brain, </span><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">depression</span></strong><span data-dcnode-id="1135" instrument_node=""> sets in, also coming in the form of a </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scienceabc.com/humans/blood-and-its-components.html"><span data-dcnode-id="1134" instrument_node="">blood</span></a><span data-dcnode-id="1132" instrument_node=""> sugar crash and exhaustion.</span></p><h2 data-dcnode-id="1129" id="brain-power"><span data-dcnode-id="1130" instrument_node="">Brain Power</span></h2><p data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">Research has shown that sugar forms</span><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node=""> free radicals&nbsp;</span></strong><span data-dcnode-id="1125" instrument_node="">(nasty little molecules) in the brain’s membrane. These free radicals, in turn, prevent nerve cells from effectively sending signals to each other. The consequences of this decreased cognition could decrease our ability to remember instructions, process ideas, and handle our moods effectively. Who knew that too much ice cream could make us cranky!</span></p><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node=""> </span></p><center data-dcnode-id="1118"><iframe class="lazy-loaded" data-dcnode-id="1121" data-lazy-type="iframe" data-src="//giphy.com/embed/ydkFnkSB53wqs" frameborder="0" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//giphy.com/embed/ydkFnkSB53wqs&amp;raw" width="480"></iframe><noscript data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">&lt;iframe loading="lazy" src="//giphy.com/embed/ydkFnkSB53wqs" width="480" height="270" frameborder="0"&gt;&lt;/iframe&gt;</span></noscript></center><p data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">Another way that&nbsp;sugar decreases our brain power is through the hormone </span><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">insulin</span></strong><span data-dcnode-id="1114" instrument_node="">. When sugar is taken in by the body, the pancreas receives a signal to secrete insulin in order to deal with the excess sugar. Another interesting effect of insulin is the impact it has on the brain. Research has shown that insulin strengthens the connection between nerve cells, allowing them to&nbsp;communicate better and form stronger memories. When we consume excess sugar, though, insulin levels spike in the gut, lowering insulin levels in the brain. This, in turn, leads to weakened cognition. In other words, it turns out that eating too much cake before an exam might not be a great idea.</span></p><div class="incontentad" data-dcnode-id="1112" data-fuse="22259117007" id="22259117007626192fab9823" style="margin: 8px auto; text-align: center; clear: both;"></div><h2 data-dcnode-id="1110" id="mood"><span data-dcnode-id="1111" instrument_node="">Mood</span></h2><p data-dcnode-id="1099"><span data-dcnode-id="1109" instrument_node="">After eating a meal that is high in sugar, the sugar levels in our blood initially&nbsp;spike, but then suddenly go back down. Due to this “</span><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">crash</span></strong><span data-dcnode-id="1106" instrument_node="">” in blood sugar levels, we feel negative emotions like</span><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node=""> anxiety</span></strong><span data-dcnode-id="1103" instrument_node=""> and </span><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">depression</span></strong><span data-dcnode-id="1100" instrument_node="">.</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1098" instrument_node="">There are other effects that sudden rises and drops in blood sugar levels can have on your brain. These include making you</span><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node=""> irritable</span></strong><span data-dcnode-id="1095" instrument_node="">, causing&nbsp;</span><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">mood swings</span></strong><span data-dcnode-id="1092" instrument_node="">, making your brain foggy, and tiring you out. Yikes!</span></p><h2 data-dcnode-id="1087" id=""><img alt="qc7eb" class="aligncenter wp-image-1923 size-full lazy-loaded" data-dcnode-id="1090" data-lazy-type="image" data-src="https://www.scienceabc.com/wp-content/uploads/ext-www.scienceabc.com/wp-content/uploads/2015/08/qc7eb.jpg-.jpg" data-srcset="" height="416" loading="lazy" sizes="(max-width: 625px) 100vw, 625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scienceabc.com/wp-content/uploads/ext-www.scienceabc.com/wp-content/uploads/2015/08/qc7eb.jpg-.jpg&amp;raw" srcset="https://www.scienceabc.com/wp-content/uploads/2015/08/qc7eb.jpg 625w, https://www.scienceabc.com/wp-content/uploads/2015/08/qc7eb-300x200.jpg 300w" width="625"><noscript data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-1923 size-full" src="https://www.scienceabc.com/wp-content/uploads/ext-www.scienceabc.com/wp-content/uploads/2015/08/qc7eb.jpg-.jpg" alt="qc7eb" width="625" height="416" srcset="https://www.scienceabc.com/wp-content/uploads/2015/08/qc7eb.jpg 625w, https://www.scienceabc.com/wp-content/uploads/2015/08/qc7eb-300x200.jpg 300w" sizes="(max-width: 625px) 100vw, 625px"&gt;</span></noscript></h2><h2 data-dcnode-id="1085" id="what-rsquo-s-the-alternative"><span data-dcnode-id="1086" instrument_node="">What’s the Alternative?</span></h2><p data-dcnode-id="1080"><span data-dcnode-id="1084" instrument_node="">Whenever you find yourself feeling sad, don’t grab the nearest bar of chocolate or rush to the&nbsp;ice cream shop around the corner. Instead, opt for </span><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">whole grain foods.</span></strong><span data-dcnode-id="1081" instrument_node=""> These foods make you feel full, but are also&nbsp;just sweet enough to give you that hit of serotonin you’ve been craving!</span></p><p data-dcnode-id="1072"><span data-dcnode-id="1079" instrument_node="">Another effective way of fighting off the craving for sugar is to eat</span><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node=""> fruits</span></strong><span data-dcnode-id="1076" instrument_node="">. Fruits contain sugar, and are also a great source of</span><strong data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node=""> fiber</span></strong><span data-dcnode-id="1073" instrument_node="">, which has the added benefit of&nbsp;keeping your insulin levels in check.</span></p><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Therefore,&nbsp;stay happy and sugar-free by biting into that delicious apple, rather than digging your hand into the candy jar!</span></p><div class="mobile incontentad" data-dcnode-id="1069" data-fuse="22262464480" id="22262464480626192fab982a" style="margin: 8px auto; text-align: center; clear: both;"></div><h2 data-dcnode-id="1067" id="suggested-reading"><span data-dcnode-id="1068" instrument_node="">Suggested Readi
