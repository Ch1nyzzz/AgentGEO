</span><p data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">The foundation of art history can be traced back tens of thousands of years to when ancient civilizations used available techniques and media to depict culturally significant subject matter. Since these early examples, a plethora of art movements have followed, each bearing their own distinct styles and characteristics that reflect the political and social influences of the period from which they emerged. Whether you’re an aspiring collector or simply appreciate the work of history’s great artists, studying the major movements of the art history timeline is a worthwhile place to start.</span></p><span data-dcnode-id="3454" instrument_node="">
</span><p data-dcnode-id="3434"><span data-dcnode-id="3453" instrument_node="">Influential </span><a data-dcnode-id="3451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/art-genre-glossary-a-new-collectors-companion/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3452" instrument_node="">genres of art</span></a><span data-dcnode-id="3450" instrument_node=""> from the Renaissance to the rise of </span><a data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/what-is-modernism/"><span data-dcnode-id="3449" instrument_node="">Modernism</span></a><span data-dcnode-id="3447" instrument_node="">&nbsp;have undoubtedly made their mark on history. With many artists today like </span><a data-dcnode-id="3445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/banksy-mjv4q5ewr9/sold-at-auction-prices/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3446" instrument_node="">Banksy</span></a><span data-dcnode-id="3444" instrument_node="">, </span><a data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/marshall-kerry-james-y30t1ztvkd/sold-at-auction-prices/"><span data-dcnode-id="3443" instrument_node="">Kerry James Marshall</span></a><span data-dcnode-id="3441" instrument_node="">, </span><a data-dcnode-id="3439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/thomas-mickalene-ztv6ucfjjo" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3440" instrument_node="">Mickalene Thomas</span></a><span data-dcnode-id="3438" instrument_node="">, and </span><a data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/wiley-kehinde-y9raihtqr2" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3437" instrument_node="">Kehinde Wiley</span></a><span data-dcnode-id="3435" instrument_node=""> consistently infusing art historical references into contemporary works, understanding the historical context and significance of each period and movement is critical for collectors and art enthusiasts alike. Below is a comprehensive art movements timeline that explores the characteristics, leading contributors, and important influences of each prominent period in the history of Western art.</span></p><span data-dcnode-id="3433" instrument_node="">

</span><h2 data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Prehistoric Art (~40,000–4,000 B.C.)</span></h2><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">The origins of art history can be traced back to the Prehistoric era, before written records were kept. The earliest artifacts come from the Paleolithic era, or the Old Stone Age, in the form of rock carvings, engravings, pictorial imagery, sculptures, and stone arrangements.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1030" instrument_node="">Art from this period relied on the use of </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/natural-pigments/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1029" instrument_node="">natural pigments</span></a><span data-dcnode-id="1027" instrument_node=""> and stone carvings to create representations of objects, animals, and rituals that governed a civilization’s existence. One of the most famous examples is that of the Paleolithic cave paintings found in the complex caves of Lascaux in France. Though discovered in 1940, they’re estimated to be up to 20,000 years old and depict large animals and vegetation from the area.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><h2 data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Ancient Art (4,000 B.C.–A.D. 400)</span></h2><span data-dcnode-id="1022" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1015" id="attachment_10957" style="width: 680px"><img alt="" aria-describedby="caption-attachment-10957" class="wp-image-10957 size-full" data-dcnode-id="1021" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/01-ancient-hammurabai-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="1016" id="caption-attachment-10957"><span data-dcnode-id="1020" instrument_node="">Unknown, Code of Hammurabi, circa 1792 and circa 1750 B.C. Image via </span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMilkau_Oberer_Teil_der_Stele_mit_dem_Text_von_Hammurapis_Gesetzescode_369-2.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1019" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="1017" instrument_node="">.</span></p></div><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1013" instrument_node="">Ancient art was produced by advanced civilizations, which in this case refers to those with an established written language. These civilizations included Mesopotamia, </span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/egyptian-antiquities/sc-043SDTNFXS/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1012" instrument_node="">Egypt</span></a><span data-dcnode-id="1010" instrument_node="">, </span><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/greek-antiquities/sc-VXE9CNQ2L3/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1009" instrument_node="">Greece</span></a><span data-dcnode-id="1007" instrument_node="">, and those of the Americas.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">The medium of a work of art from this period varies depending on the civilization that produced it, but most art served similar purposes: to tell stories, decorate utilitarian objects like bowls and weapons, display religious and symbolic imagery, and demonstrate social status. Many works depict stories of rulers, gods, and goddesses.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="1001" instrument_node="">One of the most famous works from ancient Mesopotamia is the </span><em data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Code of Hammurabi</span></em><span data-dcnode-id="998" instrument_node="">. Created around 1792 B.C., the piece bears a Babylonian set of laws carved in stone, adorned by an image of King Hammurabi—the sixth King of Babylonia—and the Mesopotamian god, </span><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Shabash</span></em><span data-dcnode-id="995" instrument_node="">.</span></p><span data-dcnode-id="993" instrument_node="">
</span><h2 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Medieval Art (500–1400)</span></h2><span data-dcnode-id="990" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="981" id="attachment_10958" style="width: 680px"><img alt="02-medieval-martini" aria-describedby="caption-attachment-10958" class="wp-image-10958 size-full" data-dcnode-id="989" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/02-medieval-martini-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="982" id="caption-attachment-10958"><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-lot/simone-martini-8-c-cf8c1ae802" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="988" instrument_node="">Simone Martini</span></a><span data-dcnode-id="986" instrument_node="">. Sold for $4,114,500 via </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-house/sotheby-s-4wsxvotis6" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="985" instrument_node="">Sotheby’s</span></a><span data-dcnode-id="983" instrument_node=""> (January 2012).</span></p></div><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">The Middle Ages, often referred to as the “Dark Ages,” marked a period of economic and cultural deterioration following the fall of the Roman Empire in 476 A.D. Much of the artwork produced in the early years of the period reflects that darkness, characterized by grotesque imagery and brutal scenery. Art produced during this time was centered around the Church. As the first millennium passed, more sophisticated and elaborately decorated churches emerged; windows and silhouettes were adorned with biblical subjects and scenes from classical mythology.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="976" instrument_node="">This period was also responsible for the emergence of the </span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/illuminated-manuscript/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="975" instrument_node="">illuminated manuscript</span></a><span data-dcnode-id="973" instrument_node=""> and </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/gothic-architecture/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="972" instrument_node="">Gothic architecture</span></a><span data-dcnode-id="970" instrument_node=""> style. Definitive examples of influential art from this period include the catacombs in Rome, Hagia Sophia in Istanbul, the </span><em data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Lindisfarne Gospels</span></em><span data-dcnode-id="967" instrument_node="">, one of the best-known examples of the illuminated manuscript, and Notre Dame, a Parisian cathedral and prominent example of Gothic architecture.</span></p><span data-dcnode-id="965" instrument_node="">
</span><h2 data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Renaissance Art (1400–1600)</span></h2><span data-dcnode-id="962" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="955" id="attachment_10959" style="width: 680px"><img alt="03-renaissance-raphael" aria-describedby="caption-attachment-10959" class="wp-image-10959 size-full" data-dcnode-id="961" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/03-renaissance-raphael-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="956" id="caption-attachment-10959"><span data-dcnode-id="960" instrument_node="">Raffaello Sanzio da Urbin, The School of Athens, 1511. Image via </span><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A%2522The_School_of_Athens%2522_by_Raffaello_Sanzio_da_Urbino.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="959" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="957" instrument_node="">.</span></p></div><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="953" instrument_node="">This style of painting, sculpture, and </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/decorative-art/pc-HV9SJ0PETO/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="952" instrument_node="">decorative art</span></a><span data-dcnode-id="950" instrument_node=""> was characterized by a focus on nature and </span><em data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">individualism</span></em><span data-dcnode-id="947" instrument_node="">, the thought of man as independent and self-reliant. Though these ideals were present in the late </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/medieval-art/"><span data-dcnode-id="946" instrument_node="">Medieval</span></a><span data-dcnode-id="944" instrument_node=""> period, they flourished in the 15th and 16th centuries, paralleling social and economic changes like secularization.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="941" instrument_node="">The Renaissance reached its height in Florence, Italy, due in large part to the Medici, a wealthy merchant family who adamantly supported the arts and </span><em data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">humanism</span></em><span data-dcnode-id="938" instrument_node="">, a variety of beliefs and philosophies that places emphasis on the human realm. Italian designer </span><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/brunelleschi-filippo-txpq2uonjh/"><span data-dcnode-id="937" instrument_node="">Filippo Brunelleschi</span></a><span data-dcnode-id="935" instrument_node=""> and sculptor </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/donatello-vu8l4h3q5x/"><span data-dcnode-id="934" instrument_node="">Donatello</span></a><span data-dcnode-id="932" instrument_node=""> were key innovators during this period.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">The High Renaissance, which lasted from 1490 to 1527, produced influential artists such as da Vinci, Michelangelo, and Raphael, each of whom brought creative power and spearheaded ideals of emotional expression. Artwork throughout the Renaissance was characterized by realism, attention to detail, and precise study of human anatomy. Artists used linear perspective and created depth through intense lighting and shading. Art began to change stylistically shortly after the High Renaissance, when clashes between the Christian faith and humanism gave way to Mannerism.</span></p><span data-dcnode-id="927" instrument_node="">
</span><h2 data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Mannerism (1527–1580)</span></h2><span data-dcnode-id="924" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="914" id="attachment_11048" style="width: 680px"><img alt="" aria-describedby="caption-attachment-11048" class="wp-image-11048 size-full" data-dcnode-id="923" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/04-mannerism-bronzino-2.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="915" id="caption-attachment-11048"><span data-dcnode-id="922" instrument_node="">Follower of </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-lot/ecole-florentine-du-xviie-siecle-suiveur-de-giorg-142-c-8631d1bdf1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="921" instrument_node="">Giorgio Vasari, The Holy Family</span></a><span data-dcnode-id="919" instrument_node="">, 17th century. Offered for €6,000 – 8,000 via </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-house/artcurial-xi9g3ga4c3" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="918" instrument_node="">Artcurial</span></a><span data-dcnode-id="916" instrument_node=""> (May 2010).</span></p></div><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="912" instrument_node="">Mannerist artists emerged from the ideals of </span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/buonarroti-michelangelo-ix480ife20/"><span data-dcnode-id="911" instrument_node="">Michelangelo</span></a><span data-dcnode-id="909" instrument_node="">, Raphael, and other Late Renaissance artists, but their focus on style and technique outweighed the meaning of the subject matter. Often, figures had graceful, elongated limbs, small heads, stylized features and exaggerated details. This yielded more complex, stylized compositions rather than relying on the classical ideals of harmonious composition and linear perspective used by their Renaissance predecessors.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="906" instrument_node="">Some of the most celebrated Mannerist artists include </span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/vasari-giorgio-ue6ytv5402" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="905" instrument_node="">Giorgio Vasari</span></a><span data-dcnode-id="903" instrument_node="">, </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/rossi-francesco-de-aan9iclpr6/sold-at-auction-prices/"><span data-dcnode-id="902" instrument_node="">Francesco Salviati</span></a><span data-dcnode-id="900" instrument_node="">, </span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/beccafumi-domenico-dzfdbwnhuz/sold-at-auction-prices/"><span data-dcnode-id="899" instrument_node="">Domenico Beccafumi</span></a><span data-dcnode-id="897" instrument_node="">, and </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/bronzino-agnolo-gotfys9yri/sold-at-auction-prices/"><span data-dcnode-id="896" instrument_node="">Bronzino</span></a><span data-dcnode-id="894" instrument_node="">, who is widely considered to be the most important Mannerist painter in Florence during his time.</span></p><span data-dcnode-id="892" instrument_node="">
</span><h2 data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Baroque (1600–1750)</span></h2><span data-dcnode-id="889" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="882" id="attachment_10961" style="width: 680px"><img alt="05-baroque-rembrandt" aria-describedby="caption-attachment-10961" class="wp-image-10961 size-full" data-dcnode-id="888" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/05-baroque-rembrandt-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="883" id="caption-attachment-10961"><span data-dcnode-id="887" instrument_node="">Caravaggio, The Calling of Saint Matthew, circa 1599-1600. Image via </span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AThe_Calling_of_Saint_Matthew-Caravaggo_%281599-1600%29.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="886" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="884" instrument_node="">.</span></p></div><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">The </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/baroque-art-rococo-art/"><span data-dcnode-id="879" instrument_node="">Baroque period</span></a><span data-dcnode-id="877" instrument_node=""> that followed Mannerism yielded ornate, over-the-top visual arts and architecture. It was characterized by grandeur and richness, punctuated by an interest in broadening human intellect and global discovery. Baroque artists were stylistically complex.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="874" instrument_node="">Baroque paintings were characterized by drama, as seen in the iconic works of Italian painter </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/caravaggio-e8uecob40g/sold-at-auction-prices/"><span data-dcnode-id="873" instrument_node="">Caravaggio</span></a><span data-dcnode-id="871" instrument_node=""> and Dutch painter </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/rembrandt--br8rvkb53y" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="870" instrument_node="">Rembrandt</span></a><span data-dcnode-id="868" instrument_node="">. Painters used an intense contrast between light and dark and had energetic compositions matched by rich color palettes.</span></p><span data-dcnode-id="866" instrument_node="">
</span><h2 data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Rococo (1699–1780)</span></h2><span data-dcnode-id="863" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="856" id="attachment_10962" style="width: 680px"><img alt="06-rococo-watteau" aria-describedby="caption-attachment-10962" class="wp-image-10962 size-full" data-dcnode-id="862" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/06-rococo-watteau-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="857" id="caption-attachment-10962"><span data-dcnode-id="861" instrument_node="">Antoine Watteau, The Embarkation for Cythera 1717. Image via </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AL%2527Embarquement_pour_Cythere%2C_by_Antoine_Watteau%2C_from_C2RMF_retouched.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="860" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="858" instrument_node="">.</span></p></div><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="851"><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/rococo-painting/"><span data-dcnode-id="854" instrument_node="">Rococo</span></a><span data-dcnode-id="852" instrument_node=""> originated in Paris, encompassing decorative art, painting, architecture, and sculpture. The aesthetic offered a softer style of decorative art compared to Baroque’s exuberance. Rococo is characterized by lightness and elegance, focusing on the use of natural forms, asymmetrical design, and subtle colors.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="849" instrument_node="">Painters like Antoine Watteau and Francois Boucher used lighthearted treatments, rich brushwork, and fresh colors. The Rococo style also easily translated to silver, </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/porcelain-china/cc-G51MM3JCDR/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="848" instrument_node="">porcelain</span></a><span data-dcnode-id="846" instrument_node="">, and </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/french-furniture-styles/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="845" instrument_node="">French furniture</span></a><span data-dcnode-id="843" instrument_node="">. Many chairs and armoires featured curving forms, floral designs, and an expressive use of gilt.</span></p><span data-dcnode-id="841" instrument_node="">
</span><h2 data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Neoclassicism (1750–1850)</span></h2><span data-dcnode-id="838" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="831" id="attachment_10963" style="width: 680px"><img alt="07-neoclassicism-david" aria-describedby="caption-attachment-10963" class="wp-image-10963 size-full" data-dcnode-id="837" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/07-neoclassicism-david-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="832" id="caption-attachment-10963"><span data-dcnode-id="836" instrument_node="">Jacques-Louis David, Napoleon Crossing the Alps, 1801. Image via </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/f/fd/David_-_Napoleon_crossing_the_Alps_-_Malmaison2.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="835" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="833" instrument_node="">.</span></p></div><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">As its name suggests, the Neoclassical period drew upon elements from classical antiquity. Archaeological ruins of ancient civilizations in Athens and Naples that were discovered at the time reignited a passion for all things past, and artists strove to recreate the great works of ancient art. This translated to a renewed interest in classical ideals of harmony, simplicity, and proportion.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">Neoclassical artists were influenced by classical elements; in particular, a focus on idealism. Inevitably, they also included modern, historically relevant depictions in their works. For example, Italian sculptor </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/canova-antonio-nq63px7hj7/sold-at-auction-prices/"><span data-dcnode-id="825" instrument_node="">Antonio Canova</span></a><span data-dcnode-id="823" instrument_node=""> drew upon classical elements in his marble sculptures, but avoided the cold artificiality that was represented in many of these early creations.</span></p><span data-dcnode-id="821" instrument_node="">
</span><h2 data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Romanticism (1780–1850)</span></h2><span data-dcnode-id="818" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="808" id="attachment_11050" style="width: 680px"><img alt="" aria-describedby="caption-attachment-11050" class="wp-image-11050 size-full" data-dcnode-id="817" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/08-romanticism-blake-2.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="809" id="caption-attachment-11050"><span data-dcnode-id="816" instrument_node="">William Blake, </span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-lot/william-blake-the-descent-of-man-into-the-vale-184-c-07b4d8f845" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="815" instrument_node="">The Descent of Man into the Vale of Death</span></a><span data-dcnode-id="813" instrument_node="">. Sold for $225,000 via </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-house/sotheby-s-4wsxvotis6" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="812" instrument_node="">Sotheby’s</span></a><span data-dcnode-id="810" instrument_node=""> (January 2016).</span></p></div><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="800"><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/romanticism-defined/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="806" instrument_node="">Romanticism</span></a><span data-dcnode-id="804" instrument_node=""> embodies a broad range of disciplines, from painting to music to literature. The ideals present in each of these art forms reject order, harmony, and rationality, which were embraced in both classical art and Neoclassicism. Instead, Romantic artists emphasized the individual and imagination. Another defining Romantic ideal was an appreciation for nature, with many turning to </span><em data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">plein air </span></em><span data-dcnode-id="801" instrument_node="">painting, which brought artists out of dark interiors and enabled them to paint outside. Artists also focused on passion, emotion, and sensation over intellect and reason.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="798" instrument_node="">Prominent Romantic painters include </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/fuseli-henry-hpk1mo64lr/sold-at-auction-prices/"><span data-dcnode-id="797" instrument_node="">Henry Fuseli</span></a><span data-dcnode-id="795" instrument_node="">, who created strange, macabre paintings that explored the dark recesses of human psychology, and </span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/blake-william-nv6078rv09" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="794" instrument_node="">William Blake</span></a><span data-dcnode-id="792" instrument_node="">, whose mysterious poems and images conveyed mystical visions and his disappointment in societal constraints.</span></p><span data-dcnode-id="790" instrument_node="">
</span><h2 data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Realism (1848–1900)</span></h2><span data-dcnode-id="787" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="780" id="attachment_10965" style="width: 681px"><img alt="09-realism-millet" aria-describedby="caption-attachment-10965" class="wp-image-10965" data-dcnode-id="786" height="451" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/09-realism-millet-1.jpg&amp;raw" width="671"><p class="wp-caption-text" data-dcnode-id="781" id="caption-attachment-10965"><span data-dcnode-id="785" instrument_node="">Jean-François Millet, The Gleaners, 1857. Image via </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJean-Fran%25C3%25A7ois_Millet_-_Gleaners_-_Google_Art_Project_2.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="784" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="782" instrument_node="">.</span></p></div><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Arguably the first modern art movement, Realism, began in France in the 1840s. Realism was a result of multiple events: the anti-Romantic movement in Germany, the rise of journalism, and the advent of photography. Each inspired new interest in accurately capturing everyday life. This attention to accuracy is evident in art produced during the movement, which featured detailed, life-like depictions of subject matter.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">One of the most influential leaders of the Realist movement is </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/courbet-gustave-qzeitq4lgo" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="774" instrument_node="">Gustave Courbet</span></a><span data-dcnode-id="772" instrument_node="">, a French artist committed to painting only what he could physically see.</span></p><span data-dcnode-id="770" instrument_node="">
</span><h2 data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Art Nouveau (1890–1910)</span></h2><span data-dcnode-id="767" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="760" id="attachment_10966" style="width: 680px"><img alt="10-art-nouveau-mucha" aria-describedby="caption-attachment-10966" class="wp-image-10966 size-full" data-dcnode-id="766" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/10-art-nouveau-mucha-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="761" id="caption-attachment-10966"><span data-dcnode-id="765" instrument_node="">Alphonse Mucha, Princess Hyazinthe, 1911. Image via </span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/f/f0/Mucha%252C_Alfons_-_Prinzessin_Hyazinthe_-_1911.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="764" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="762" instrument_node="">.</span></p></div><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="755"><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/art-nouveau-in-8-minutes/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="758" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="756" instrument_node="">, which translates to “New Art,” attempted to create an entirely authentic movement free from any imitation of styles that preceded it. This movement heavily influenced applied arts, graphics, and illustration. It focused on the natural world, characterized by long, sinuous lines and curves.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="753" instrument_node="">Influential </span><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/art-nouveau-artists/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="752" instrument_node="">Art Nouveau artists</span></a><span data-dcnode-id="750" instrument_node=""> worked in a variety of media, including architecture, graphic and interior design, jewelry-making, and painting. Czechoslovakian graphic designer </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/mucha-alphonse-maria-30o5p2ckob" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="749" instrument_node="">Alphonse Mucha</span></a><span data-dcnode-id="747" instrument_node=""> is best-known for his theatrical posters of French actress Sarah Bernhardt. Spanish architect and sculptor </span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/gaudi-antoni-7e411yex6q/"><span data-dcnode-id="746" instrument_node="">Antoni Gaudi</span></a><span data-dcnode-id="744" instrument_node=""> went beyond focusing on lines to create curving, brightly-colored constructions like that of the Basilica de la Sagrada Familia in Barcelona.</span></p><span data-dcnode-id="742" instrument_node="">
</span><h2 data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Impressionism (1865–1885)</span></h2><span data-dcnode-id="739" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="732" id="attachment_11051" style="width: 680px"><img alt="" aria-describedby="caption-attachment-11051" class="wp-image-11051 size-full" data-dcnode-id="738" height="432" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/11-impressionism-monet-2.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="733" id="caption-attachment-11051"><span data-dcnode-id="737" instrument_node="">Claude Monet, Impression, Sunrise, 1872. Image via </span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMonet_-_Impression%2C_Sunrise.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="736" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="734" instrument_node="">.</span></p></div><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="724"><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/the-rise-of-impressionism/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="730" instrument_node="">Impressionist</span></a><span data-dcnode-id="728" instrument_node=""> painters sought to capture the immediate </span><em data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">impression</span></em><span data-dcnode-id="725" instrument_node=""> of a particular moment. This was characterized by short, quick brushstrokes and an unfinished, sketch-like feel. Impressionist artists used modern life as their subject matter, painting situations like dance halls and sailboat regattas rather than historical and mythological events.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="710"><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/monet-claude-p3lmaucaat/sold-at-auction-prices/"><span data-dcnode-id="722" instrument_node="">Claude Monet</span></a><span data-dcnode-id="720" instrument_node="">, a French artist who spearheaded the idea of expressing one’s perceptions before nature, is virtually synonymous with the Impressionist movement. His notable works include </span><em data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">The Water Lily Pond</span></em><span data-dcnode-id="717" instrument_node=""> (1899), </span><em data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Woman with a Parasol</span></em><span data-dcnode-id="714" instrument_node=""> (1875), and </span><em data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Impression, Sunrise</span></em><span data-dcnode-id="711" instrument_node=""> (1872), from which the name of the movement itself is derived.</span></p><span data-dcnode-id="709" instrument_node="">
</span><h2 data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Post-Impressionism (1885–1910)</span></h2><span data-dcnode-id="706" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="699" id="attachment_11052" style="width: 680px"><img alt="" aria-describedby="caption-attachment-11052" class="wp-image-11052 size-full" data-dcnode-id="705" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/12-post-impressionism-seurat-2.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="700" id="caption-attachment-11052"><span data-dcnode-id="704" instrument_node="">George Seurat, A Sunday on the Island of La Grande Jatte, 1884. Image via </span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/b/b7/Georges_Seurat_-_A_Sunday_on_La_Grande_Jatte_--_1884_-_Google_Art_Project.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="703" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="701" instrument_node="">.</span></p></div><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="694"><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/post-impressionism/"><span data-dcnode-id="697" instrument_node="">Post-Impressionist</span></a><span data-dcnode-id="695" instrument_node=""> painters worked independently rather than as a group, but each influential Post-Impressionist painter had similar ideals. They concentrated on subjective visions and symbolic, personal meanings rather than observations of the outside world. This was often achieved through abstract forms.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="692" instrument_node="">Post-Impressionist painters include Georges Seurat, noted for his </span><em data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">pointillism</span></em><span data-dcnode-id="689" instrument_node=""> technique that used small, distinct dots to form an image. </span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/gogh-vincent-van-ckvsc4lo6s" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="688" instrument_node="">Vincent van Gogh</span></a><span data-dcnode-id="686" instrument_node=""> is also considered a Post-Impressionist painter, searching for personal expression through his art, often through rugged brushstrokes and dark tones.</span></p><span data-dcnode-id="684" instrument_node="">
</span><h2 data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Fauvism (1900–1935)</span></h2><span data-dcnode-id="681" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="674" id="attachment_11053" style="width: 680px"><img alt="" aria-describedby="caption-attachment-11053" class="wp-image-11053 size-full" data-dcnode-id="680" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/13-fauvism-matisse-2.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="675" id="caption-attachment-11053"><span data-dcnode-id="679" instrument_node="">Henri Matisse, Woman With a Hat, 1905. Image via </span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/f/fb/Matisse-Woman-with-a-Hat.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="678" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="676" instrument_node="">.</span></p></div><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="672" instrument_node="">Led by </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/matisse-henri-va0bv3d3oo" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="671" instrument_node="">Henri Matisse</span></a><span data-dcnode-id="669" instrument_node="">, Fauvism built upon examples from Vincent van Gogh and </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/seurat-georges-nv277bmd84/sold-at-auction-prices/"><span data-dcnode-id="668" instrument_node="">George Seurat</span></a><span data-dcnode-id="666" instrument_node="">. As the first avant-garde, 20th-century movement, this style was characterized by expressive use of intense color, line, and brushwork, a bold sense of surface design, and flat composition.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">As seen in many of the works of Matisse himself, the separation of color from its descriptive, representational purpose was one of the core elements that shaped this movement. Fauvism was an important precursor of Cubism and Expressionism.</span></p><span data-dcnode-id="661" instrument_node="">
</span><h2 data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Expressionism (1905–1920)</span></h2><span data-dcnode-id="658" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="651" id="attachment_10970" style="width: 680px"><img alt="14-expressionism-munch" aria-describedby="caption-attachment-10970" class="wp-image-10970 size-full" data-dcnode-id="657" height="439" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/14-expressionism-munch-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="652" id="caption-attachment-10970"><span data-dcnode-id="656" instrument_node="">Edvard Munch, The Dance of Life, 1899. Image via </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/b/b6/Edvard_Munch_-_The_dance_of_life_%25281899-1900%2529.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="655" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="653" instrument_node="">.</span></p></div><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="649" instrument_node="">Expressionism emerged as a response to increasingly conflicted world views and the loss of spirituality. Expressionist art sought to draw from within the artist, using a distortion of form and strong colors to display anxieties and raw emotions. Expressionist painters, in a quest for authenticity, looked for inspiration beyond that of Western art and frequented ethnographic museums to revisit native folk traditions and </span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/ethnographic-indigenous-artifacts/cc-SN06I92UXA/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="648" instrument_node="">tribal art</span></a><span data-dcnode-id="646" instrument_node="">.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="643" instrument_node="">The roots of Expressionism can be traced to Vincent van Gogh, </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/munch-edvard-mfxmiasjwa" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="642" instrument_node="">Edvard Munch</span></a><span data-dcnode-id="640" instrument_node="">, and </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/ensor-james-axnslt4iu7" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="639" instrument_node="">James Ensor</span></a><span data-dcnode-id="637" instrument_node="">. Prominent groups including Die Brücke (The Bridge) and Der Blaue Reiter (The Blue Rider) formed so artists could publish works and express their ideals collectively.</span></p><span data-dcnode-id="635" instrument_node="">
</span><h2 data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Cubism (1907–1914)</span></h2><span data-dcnode-id="632" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="625" id="attachment_10971" style="width: 680px"><img alt="15-cubism-braque" aria-describedby="caption-attachment-10971" class="wp-image-10971 size-full" data-dcnode-id="631" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/15-cubism-braque-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="626" id="caption-attachment-10971"><span data-dcnode-id="630" instrument_node="">Violin and Palette, Georges Braque, 1909. Image via </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGeorges_Braque%2C_1909_%28September%29%2C_Violin_and_Palette_%28Violon_et_palette%2C_Dans_l%2527atelier%29%2C_oil_on_canvas%2C_91.7_x_42.8_cm%2C_Solomon_R._Guggenheim_Museum.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="629" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="627" instrument_node="">.</span></p></div><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="611"><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/what-is-cubism/"><span data-dcnode-id="623" instrument_node="">Cubism</span></a><span data-dcnode-id="621" instrument_node=""> was established by </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/picasso-pablo-nvddduiinb" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="620" instrument_node="">Pablo Picasso</span></a><span data-dcnode-id="618" instrument_node=""> and </span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/braque-georges-22xc3qdwei" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="617" instrument_node="">Georges Braque</span></a><span data-dcnode-id="615" instrument_node="">, who rejected the concept that art should copy nature. They moved away from traditional techniques and perspectives; instead, they created radically fragmented objects through </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/8-minute-guide-to-abstract-art/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="614" instrument_node="">abstraction</span></a><span data-dcnode-id="612" instrument_node="">. Many Cubist painters’ works are marked by flat, two-dimensional surfaces, geometric forms or “cubes” of objects, and multiple vantage points. Often, their subjects weren’t even discernible.</span></p><span data-dcnode-id="610" instrument_node="">
</span><h2 data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Surrealism (1916–1950)</span></h2><span data-dcnode-id="607" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="600" id="attachment_10972" style="width: 680px"><img alt="16-surrealism-magritte" aria-describedby="caption-attachment-10972" class="wp-image-10972 size-full" data-dcnode-id="606" height="444" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/16-surrealism-magritte.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="601" id="caption-attachment-10972"><span data-dcnode-id="605" instrument_node="">René Magritte, The Son of Man, 1964. Image via </span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMagritte_TheSonOfMan.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="604" instrument_node="">Wikipedia</span></a><span data-dcnode-id="602" instrument_node="">.</span></p></div><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="592"><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/surrealism-defined/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="598" instrument_node="">Surrealism</span></a><span data-dcnode-id="596" instrument_node=""> emerged from the </span><a data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/dada-art-in-8-minutes/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="595" instrument_node="">Dada art</span></a><span data-dcnode-id="593" instrument_node=""> movement in 1916, showcasing works of art that defied reason. Surrealists denounced the rationalist mindset. They blamed this thought process on events like World War I and believed it to repress imaginative thoughts. Surrealists were influenced by Karl Marx and theories developed by Sigmund Freud, who explored psychoanalysis and the power of imagination.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">Influential Surrealist artists like </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/dali-salvador-9chkguv69j%255D" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="589" instrument_node="">Salvador Dalí</span></a><span data-dcnode-id="587" instrument_node=""> tapped into the unconscious mind to depict revelations found on the street and in everyday life. Dalí’s paintings in particular pair vivid and bizarre dreams with historical accuracy.</span></p><span data-dcnode-id="585" instrument_node="">
</span><h2 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Abstract Expressionism (1940s–1950s)</span></h2><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="581" instrument_node="">Shaped by the legacy of Surrealism, Abstract Expressionism emerged in New York after WWII. It’s often referred to as the New York School or </span><em data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">action painting</span></em><span data-dcnode-id="578" instrument_node="">. These painters and </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/abstract-sculptures/sc-29XZGCPQ8X/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="577" instrument_node="">abstract sculptors</span></a><span data-dcnode-id="575" instrument_node=""> broke away from what was considered conventional, and instead used spontaneity and improvisation to create abstract works of art. This included colossally-scaled works whose size could no longer be accommodated by an easel. Instead, canvases would be placed directly upon the floor.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="572" instrument_node="">Celebrated Abstract Expressionist painters include </span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/pollock-jackson-s9chrxs3yg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="571" instrument_node="">Jackson Pollock</span></a><span data-dcnode-id="569" instrument_node="">, known for his unique style of drip painting, and </span><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/rothko-mark-180kcca6z5" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="568" instrument_node="">Mark Rothko</span></a><span data-dcnode-id="566" instrument_node="">, whose paintings employed large blocks of color to convey a sense of spirituality.</span></p><span data-dcnode-id="564" instrument_node="">
</span><h2 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Op Art (1950s–1960s)</span></h2><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="560" instrument_node="">Heightened by advances in science and technology as well as an interest in optical effects and illusions, the Op art (short for “optical” art) movement launched with </span><em data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Le Mouvement</span></em><span data-dcnode-id="557" instrument_node="">, a group exhibition at Galerie Denise Rene in 1955. Artists active in this style used shapes, colors, and patterns to create images that appeared to be moving or blurring, often produced in black and white for maximum contrast. These abstract patterns were meant to both confuse and excite the eye.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="554" instrument_node="">English artist </span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/riley-bridget-abw1jhju4y"><span data-dcnode-id="553" instrument_node="">Bridget Riley</span></a><span data-dcnode-id="551" instrument_node=""> is one of the most prominent Op Art practitioners. Her 1964 artwork </span><em data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Blaze</span></em><span data-dcnode-id="548" instrument_node=""> features zigzag black and white lines that create the illusion of a circular decent.</span></p><span data-dcnode-id="546" instrument_node="">
</span><h2 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Pop Art (1950s–1960s)</span></h2><span data-dcnode-id="543" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="534" id="attachment_10974" style="width: 680px"><img alt="18-pop-art-andy-warhol" aria-describedby="caption-attachment-10974" class="wp-image-10974 size-full" data-dcnode-id="542" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2018/11/18-pop-art-andy-warhol-1.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="535" id="caption-attachment-10974"><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-lot/andy-warhol-16-c-8ywvklnsbq"><span data-dcnode-id="541" instrument_node="">Lot 16:</span></a><span data-dcnode-id="539" instrument_node=""> Andy Warhol. Sold for $17,327,500 via </span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-house/sotheby-s-4wsxvotis6" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="538" instrument_node="">Sotheby’s</span></a><span data-dcnode-id="536" instrument_node=""> (May 1998).</span></p></div><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="529"><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/what-is-pop-art/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="532" instrument_node="">Pop art</span></a><span data-dcnode-id="530" instrument_node=""> is one of the most recognizable artistic developments of the 20th century. The movement transitioned away from methods used in Abstract Expressionism, and instead used everyday, mundane objects to create innovative works of art that challenged consumerism and mass media. This introduction to identifiable imagery was a shift from the direction of modernism.</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="527" instrument_node="">Pop artists like </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/warhol-andy-gkwjvl6lvh/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="526" instrument_node="">Andy Warhol</span></a><span data-dcnode-id="524" instrument_node=""> and </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/lichtenstein-roy-0c0bow85nr" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="523" instrument_node="">Roy Lichtenstein</span></a><span data-dcnode-id="521" instrument_node=""> sought to establish the idea that art can draw from any source and there is no hierarchy of culture to disrupt that. Perhaps the most famous pop culture work of art is Warhol’s </span><em data-dcnode-id="518"><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-lot/andy-warhol-cbell-s-soup-i-f-s-ii44-53-121-c-d7643afb86" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="520" instrument_node="">Campbell’s Soup Cans</span></a></em><span data-dcnode-id="517" instrument_node=""> production.</span></p><span data-dcnode-id="515" instrument_node="">
</span><h2 data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Arte Povera (1960s)</span></h2><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Translating literally to “poor art,” Arte Povera challenged modernist, contemporary systems by infusing commonplace materials into creations. Artists used soil, rocks, paper, rope, and other earthen elements to evoke a pre-industrial sentiment. As a result, many of the notable works during this movement are sculptural.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="508" instrument_node="">Italian artist </span><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/merz-mario-6ygv19xkm3/sold-at-auction-prices/"><span data-dcnode-id="507" instrument_node="">Mario Merz</span></a><span data-dcnode-id="505" instrument_node="">, in conjunction with other Italian artists such as </span><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/anselmo-giovanni-um0kiq9616/sold-at-auction-prices/"><span data-dcnode-id="504" instrument_node="">Giovanni Anselmo</span></a><span data-dcnode-id="502" instrument_node=""> and </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/boetti-alighiero-e-st563n3krq"><span data-dcnode-id="501" instrument_node="">Alighiero Boetti</span></a><span data-dcnode-id="499" instrument_node="">, created anti-elitist works by drawing upon materials from everyday life. His 1968 </span><em data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Giap’s Igloo</span></em><span data-dcnode-id="496" instrument_node="">, one of what would soon become his signature series of igloos, focused on his occupations with the necessities of life: shelter, warmth, and food.</span></p><span data-dcnode-id="494" instrument_node="">
</span><h2 data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Minimalism (1960s–1970s)</span></h2><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="490" instrument_node="">The Minimalist movement emerged in New York as a group of younger artists began to question the overly expressive works of Abstract Expressionist artists. </span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/minimalist-art-through-the-ages/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="489" instrument_node="">Minimalist art</span></a><span data-dcnode-id="487" instrument_node=""> instead focused on anonymity, calling attention to the materiality of works. Artists urged viewers to focus on precisely what was in front of them, rather than draw parallels to outside realities and emotive thoughts through the use of purified forms, order, simplicity, and harmony.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="484" instrument_node="">American artist </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/stella-frank-fpqkx16vp1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="483" instrument_node="">Frank Stella</span></a><span data-dcnode-id="481" instrument_node=""> was of the earliest adopters of Minimalism, producing nonrepresentational paintings, as seen in his </span><em data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Black Paintings</span></em><span data-dcnode-id="478" instrument_node=""> completed between 1958 and 1960. Each features a pattern of rectilinear stripes of uniform width printed in metallic black ink.</span></p><span data-dcnode-id="476" instrument_node="">
</span><h2 data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Conceptual Art (1960s–1970s)</span></h2><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="457"><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/conceptual-art/"><span data-dcnode-id="472" instrument_node="">Conceptual art</span></a><span data-dcnode-id="470" instrument_node=""> completely rejected previous art movements, and artists prized ideas over visual components, creating art in the from of performances, ephemera, and other forms. Polish performance artist Ewa Partum’s </span><em data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Active Poetry</span></em><span data-dcnode-id="467" instrument_node=""> consisted of her scattering single alphabet letters across various </span><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/famous-landscape-artists/"><span data-dcnode-id="466" instrument_node="">landscapes</span></a><span data-dcnode-id="464" instrument_node="">. American artist </span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/artist/kosuth-joseph-1nhxyurqim/sold-at-auction-prices/"><span data-dcnode-id="463" instrument_node="">Joseph Kosuth</span></a><span data-dcnode-id="461" instrument_node=""> explored the production and role of language within art, as seen in his 1965, </span><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">One and Three Chairs</span></em><span data-dcnode-id="458" instrument_node="">. In it, he represents one chair in three different ways to represent different meanings of the same object. Because this type of art focused on ideas and concepts, there was no distinct style or form.</span></p><span data-dcnode-id="456" instrument_node="">
</span><h2 data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Contemporary Art (1970–present)</span></h2><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">The 1970s marked the beginning of contemporary art, which extends through present day. This period is dominated by various schools and smaller movements that emerged.</span></p><span data-dcnode-id="450" instrument_node="">
</span><ul data-dcnode-id="402"><span data-dcnode-id="449" instrument_node="">
</span><li data-dcnode-id="445"><strong data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Postmodernism</span></strong><span data-dcnode-id="446" instrument_node="">: In reaction against modernism, artists created works that reflected skepticism, irony, and philosophical critiques.</span></li><span data-dcnode-id="444" instrument_node="">
</span><li data-dcnode-id="440"><strong data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Feminist art</span></strong><span data-dcnode-id="441" instrument_node="">: This movement arose in an attempt to transform stereotypes and break the model of a male-dominated art history.</span></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="435"><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Neo Expressionism</span></strong><span data-dcnode-id="436" instrument_node="">: Artists sought to revive original aspects of Expressionism and create highly textural, expressive, large works.</span></li><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="427"><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Street art</span></strong><span data-dcnode-id="431" instrument_node="">: Artists such as Keith Haring, Jean-Michel Basquiat, Barry McGee, Banksy, and more created </span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/the-evolution-of-street-art/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="430" instrument_node="">graffiti-like art</span></a><span data-dcnode-id="428" instrument_node=""> on surfaces in public places like sidewalks, buildings, and overpasses.</span></li><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="422"><strong data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">The Pictures Generation</span></strong><span data-dcnode-id="423" instrument_node="">: Artists Cindy Sherman, Louise Lawler, Gary Simmons, and others who were influenced by Conceptual and Pop art experimented with recognizable imagery to explore images shaped our perceptions of the world.</span></li><span data-dcnode-id="421" instrument_node="">
</span><li data-dcnode-id="417"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Appropriation art</span></strong><span data-dcnode-id="418" instrument_node="">: This movement focused on the use of images in art with little transformation from their original form.</span></li><span data-dcnode-id="416" instrument_node="">
</span><li data-dcnode-id="412"><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Young British Artists (YBA):</span></strong><span data-dcnode-id="413" instrument_node=""> This group of London artists were notorious for their willingness to shock audiences through their imagery, and a willingness to push beyond limits of decency. They’re also known for their zestful, entrepreneurial spirit.</span></li><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="404"><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Digital art</span></strong><span data-dcnode-id="408" instrument_node="">: The advent of the camera lent way to </span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/digital-art/"><span data-dcnode-id="407" instrument_node="">this artistic practice</span></a><span data-dcnode-id="405" instrument_node=""> that allowed artists to use the infusion of art and technology to create with mediums like computers, audio and visual software, sound, and pixels.</span></li><span data-dcnode-id="403" instrument_node="">
</span></ul><span data-dcnode-id="401" instrument_node="">
</span><h6 data-dcnode-id="397" style="text-align: center;"><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/art-timenlines-IG-1.jpg" rel="noopener noreferrer" target="_blank"><button data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">View Full Infographic</span></button></a></h6><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="395" instrument_node="">Art movements throughout the history of Western art have offered a swath of diverse, influential styles, techniques, and media across the globe. Each movement shed light on distinctive </span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/paintings/cc-AF14022FJQ/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="394" instrument_node="">painting</span></a><span data-dcnode-id="392" instrument_node="">, </span><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/sculptures/cc-MH70PM0ARM/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="391" instrument_node="">sculpture</span></a><span data-dcnode-id="389" instrument_node="">, architectural achievements, and other defining works. Understanding the timeline of art history and how each period has influenced later movements is paramount to building a thoughtful, cohesive collection.</span></p><span data-dcnode-id="387" instrument_node="">
