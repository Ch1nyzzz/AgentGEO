data-dcnode-id="4273" href="#bib19" name="bbib19"><span data-dcnode-id="4274" instrument_node="">Fleming, Dror, &amp; Adelson, 2003</span></a><span data-dcnode-id="4272" instrument_node="">). In contrast, artists seem to play carefully with the placement of contextual objects near the mirrors. In particular, one convention seems to represent the face of a depicted person in the mirror, even though, from an optical point of view, her face cannot be visible to both herself and the observer. This convention, sometimes called the “Venus effect” (</span><a class="workspace-trigger" data-dcnode-id="4270" href="#fig9" name="bfig9"><span data-dcnode-id="4271" instrument_node="">Fig. 9</span></a><span data-dcnode-id="4269" instrument_node="">), is effective because human observers have a naive understanding of physics (</span><a class="workspace-trigger" data-dcnode-id="4267" href="#bib3" name="bbib3"><span data-dcnode-id="4268" instrument_node="">Bertamini, Latto, &amp; Spooner, 2003</span></a><span data-dcnode-id="4266" instrument_node="">). However, there are other examples related to reflections, for instance with respect to the size and the orientation of the reflected image, that suggest that artists used our misconception of optical reflections to depict a scene as they wanted it to be rather than veridically (</span><a class="workspace-trigger" data-dcnode-id="4264" href="#bib4" name="bbib4"><span data-dcnode-id="4265" instrument_node="">Bertamini and Parks, 2005</span></a><span data-dcnode-id="4263" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4261" href="#bib10" name="bbib10"><span data-dcnode-id="4262" instrument_node="">Cavanagh, 2008</span></a><span data-dcnode-id="4260" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4229" id="fig9"><span data-dcnode-id="4243"><img alt="" data-dcnode-id="4258" height="339" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr9.jpg&amp;raw"><span data-dcnode-id="4257" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4244"><li data-dcnode-id="4251"><a class="anchor download-link u-font-sans" data-dcnode-id="4252" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr9_lrg.jpg" target="_blank" title="Download high-res image (183KB)"><span class="anchor-text" data-dcnode-id="4253"><span data-dcnode-id="4256" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node="">Download high-res image (183KB)</span></span></span></a></li><li data-dcnode-id="4245"><a class="anchor download-link u-font-sans" data-dcnode-id="4246" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr9.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4247"><span data-dcnode-id="4250" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4230"><span data-dcnode-id="4231"><p data-dcnode-id="4232"><span class="label" data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">Fig. 9</span></span><span data-dcnode-id="4240" instrument_node="">. </span><span data-dcnode-id="4239" instrument_node="">The Venus effect. Most observers trust that Venus is seeing her reflection in this painting, even though this is not physically possible. Is this a license of the artist to show us Venus’ face or is Venus looking at us? Diego Velázquez (1647–1651) “The Toilet of Venus (‘The Rokeby Venus’)”. Oil on canvas, 122.5</span><span data-dcnode-id="4238" instrument_node="">&nbsp;</span><span data-dcnode-id="4237" instrument_node="">×</span><span data-dcnode-id="4236" instrument_node="">&nbsp;</span><span data-dcnode-id="4235" instrument_node="">177</span><span data-dcnode-id="4234" instrument_node="">&nbsp;</span><span data-dcnode-id="4233" instrument_node="">cm; The National Gallery, London.</span></p></span></span></figure></div><p data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">In summary, it appears that to overcome the ambiguities on three-dimensional layout that are caused by the unknown viewpoint chosen by the observer, the convention to use regular shapes such as square tiles may be related to a generic perceptual prior to assume that objects have rectangular corners. In contrast, there are other conventions that appear unrelated to visual perception, such as the depiction of spheres as circles and the depiction of faces in mirrors.</span></p></section><section data-dcnode-id="4134" id="aep-section-id23"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4221"><span data-dcnode-id="4224" instrument_node="">6</span><span data-dcnode-id="4223" instrument_node="">. </span><span data-dcnode-id="4222" instrument_node="">Shape</span></h2><p data-dcnode-id="4211"><span data-dcnode-id="4220" instrument_node="">Not knowing where the observer is will have effects on the perceived three-dimensional layout of the depicted scene, but also on the shape of the objects in the scene. Both two-dimensional (2</span><span data-dcnode-id="4219" instrument_node="">&nbsp;</span><span data-dcnode-id="4218" instrument_node="">D) and three-dimensional (3</span><span data-dcnode-id="4217" instrument_node="">&nbsp;</span><span data-dcnode-id="4216" instrument_node="">D) objects will be affected. In 2</span><span data-dcnode-id="4215" instrument_node="">&nbsp;</span><span data-dcnode-id="4214" instrument_node="">D, there is an ambiguity on the aspect ratio of an object because an object seen from the side will undergo fore-shortening that will reduce its size along the slant direction. In 3</span><span data-dcnode-id="4213" instrument_node="">&nbsp;</span><span data-dcnode-id="4212" instrument_node="">D, there is an ambiguity on the curvature of an object, because a concave object seen from below can produce the same image as a convex object seen from above. This latter ambiguity is well illustrated in a lithograph print from M. C. Escher (1955) called “Convex and Concave”.</span></p><div data-dcnode-id="4163"><p data-dcnode-id="4193"><span data-dcnode-id="4210" instrument_node="">The ambiguity on the aspect ratio of 2</span><span data-dcnode-id="4209" instrument_node="">&nbsp;</span><span data-dcnode-id="4208" instrument_node="">D objects may be resolved if we assume that objects have by default a unitary aspect ratio. In other words, an ellipse in an image is more likely to be the projection of a slanted circle (</span><a class="workspace-trigger" data-dcnode-id="4206" href="#bib20" name="bbib20"><span data-dcnode-id="4207" instrument_node="">Geisler &amp; Kersten, 2002</span></a><span data-dcnode-id="4205" instrument_node="">). The ambiguity on the curvature of the 3</span><span data-dcnode-id="4204" instrument_node="">&nbsp;</span><span data-dcnode-id="4203" instrument_node="">D object may be resolved if we assume that the viewpoint of the observer is located above the scene (</span><a class="workspace-trigger" data-dcnode-id="4201" href="#bib45" name="bbib45"><span data-dcnode-id="4202" instrument_node="">Mamassian &amp; Landy, 1998</span></a><span data-dcnode-id="4200" instrument_node="">). When the shape is depicted as a line drawing, two intersecting lines are sufficient to represent an “egg” shape when the lines have the same curvature (both convex or both concave). In contrast, when the two line segments have opposite curvature, they generate the percept of a surface patch that is shaped as a saddle (</span><a class="workspace-trigger" data-dcnode-id="4198" href="#fig10" name="bfig10"><span data-dcnode-id="4199" instrument_node="">Fig. 10</span></a><span data-dcnode-id="4197" instrument_node="">a). The ambiguity inherent to the mapping between line curvature and surface shape can be lift by using the prior assumption that the object is seen from above (</span><a class="workspace-trigger" data-dcnode-id="4195" href="#bib45" name="bbib45"><span data-dcnode-id="4196" instrument_node="">Mamassian &amp; Landy, 1998</span></a><span data-dcnode-id="4194" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4164" id="fig10"><span data-dcnode-id="4177"><img alt="" data-dcnode-id="4192" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr10.jpg&amp;raw"><span data-dcnode-id="4191" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4178"><li data-dcnode-id="4185"><a class="anchor download-link u-font-sans" data-dcnode-id="4186" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr10_lrg.jpg" target="_blank" title="Download high-res image (311KB)"><span class="anchor-text" data-dcnode-id="4187"><span data-dcnode-id="4190" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">Download high-res image (311KB)</span></span></span></a></li><li data-dcnode-id="4179"><a class="anchor download-link u-font-sans" data-dcnode-id="4180" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr10.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4181"><span data-dcnode-id="4184" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4165"><span data-dcnode-id="4166"><p data-dcnode-id="4167"><span class="label" data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">Fig. 10</span></span><span data-dcnode-id="4174" instrument_node="">. </span><span data-dcnode-id="4173" instrument_node="">(a) Correspondence between curved lines in an image and curved surface patches in 3</span><span data-dcnode-id="4172" instrument_node="">&nbsp;</span><span data-dcnode-id="4171" instrument_node="">D space. Two curved line segments in an image are usually interpreted as a particular surface shape. Reprinted from </span><a class="workspace-trigger" data-dcnode-id="4169" href="#bib45" name="bbib45"><span data-dcnode-id="4170" instrument_node="">Mamassian and Landy (1998)</span></a><span data-dcnode-id="4168" instrument_node="">. (b) William Hogarth (1732) “A Modern Midnight Conversation”. Etching with engraving in black ink (detail). The character on the left is holding a bottle with a window reflection that helps determine the shape of the bottle.</span></p></span></span></figure></div><p data-dcnode-id="4135"><span data-dcnode-id="4162" instrument_node="">The conventions on the representation of 2</span><span data-dcnode-id="4161" instrument_node="">&nbsp;</span><span data-dcnode-id="4160" instrument_node="">D and 3</span><span data-dcnode-id="4159" instrument_node="">&nbsp;</span><span data-dcnode-id="4158" instrument_node="">D shapes seem to match quite well the prior assumptions of the visual system. In 2</span><span data-dcnode-id="4157" instrument_node="">&nbsp;</span><span data-dcnode-id="4156" instrument_node="">D, much effort was dedicated to promote the idea that the golden ratio (or golden section, i.e. 1.618:1) represented the perfect proportion of a rectangle (</span><a class="workspace-trigger" data-dcnode-id="4154" href="#bib25" name="bbib25"><span data-dcnode-id="4155" instrument_node="">Green, 1995</span></a><span data-dcnode-id="4153" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4151" href="#bib48" name="bbib48"><span data-dcnode-id="4152" instrument_node="">McManus, 1980</span></a><span data-dcnode-id="4150" instrument_node="">). However, most recent studies found little evidence for a preference close to the golden ratio (e.g. </span><a class="workspace-trigger" data-dcnode-id="4148" href="#bib55" name="bbib55"><span data-dcnode-id="4149" instrument_node="">Ohta, 1999</span></a><span data-dcnode-id="4147" instrument_node="">). In contrast, there seems to be a robust preference for a unity ratio, that is for square figures (e.g. </span><a class="workspace-trigger" data-dcnode-id="4145" href="#bib15" name="bbib15"><span data-dcnode-id="4146" instrument_node="">Davis, 2007</span></a><span data-dcnode-id="4144" instrument_node="">). In 3</span><span data-dcnode-id="4143" instrument_node="">&nbsp;</span><span data-dcnode-id="4142" instrument_node="">D, there is good evidence that artists used some conventions in line drawings that preceded our understanding of shape perception. Let us take for instance the etching “A Modern Midnight Conversation” by William Hogarth (1732) (</span><a class="workspace-trigger" data-dcnode-id="4140" href="#fig10" name="bfig10"><span data-dcnode-id="4141" instrument_node="">Fig. 10</span></a><span data-dcnode-id="4139" instrument_node="">b). One character is holding a bottle that shows the reflection of a four-pane window. It is plausible that this reflection is drawn more to help the observer determine the shape of the bottle than as a realistic representation of the scene. Indeed, the window would need to be tilted by 45 degrees to produce the oriented reflection, and the external light source at that time of the night (midnight) would need to be very powerful to produce such an intense reflection. This and other properties of line drawings are now being used in computer graphics to extract the sketch of an object (e.g. </span><a class="workspace-trigger" data-dcnode-id="4137" href="#bib22" name="bbib22"><span data-dcnode-id="4138" instrument_node="">Girshick, Interrante, Haker, &amp; Lemoine, 1999</span></a><span data-dcnode-id="4136" instrument_node="">).</span></p></section><section data-dcnode-id="4067" id="aep-section-id24"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4130"><span data-dcnode-id="4133" instrument_node="">7</span><span data-dcnode-id="4132" instrument_node="">. </span><span data-dcnode-id="4131" instrument_node="">Movement</span></h2><p data-dcnode-id="4125"><span data-dcnode-id="4129" instrument_node="">The absence of time in a static canvas is obviously a challenge for an artist who wants to depict a dynamic scene. Not only is there an ambiguity in the direction and speed of an object when it is frozen in a single frame, but there is also the more basic ambiguity of knowing whether the object is moving at all. In everyday perception, there is a prior for slowness that can explain numerous motion perception phenomena (</span><a class="workspace-trigger" data-dcnode-id="4127" href="#bib73" name="bbib73"><span data-dcnode-id="4128" instrument_node="">Weiss, Simoncelli, &amp; Adelson, 2002</span></a><span data-dcnode-id="4126" instrument_node="">). Using a similar convention in visual arts would be counterproductive to display a dynamic scene, because that scene would tend to appear even more static. Artists have therefore struggled to propose conventions that exaggerate the motion to counteract the perceptual prior.</span></p><div data-dcnode-id="4084"><p data-dcnode-id="4117"><span data-dcnode-id="4124" instrument_node="">An old convention to depict movement in a static figure is “dynamic balance”, where the impression of movement is brought by breaking the symmetry of the composition or by placing an objet in an unstable pose. One can argue that </span><em data-dcnode-id="4122"><span data-dcnode-id="4123" instrument_node="">contrapposto</span></em><span data-dcnode-id="4121" instrument_node=""> is an example of dynamic balance, where a human figure stands with one leg supporting most of the body weight and the other leg is free and slightly flexed. The asymmetrical role of the legs can often be detected by noticing the twist of the shoulders relative to the hips (</span><a class="workspace-trigger" data-dcnode-id="4119" href="#fig11" name="bfig11"><span data-dcnode-id="4120" instrument_node="">Fig. 11</span></a><span data-dcnode-id="4118" instrument_node="">a).</span></p><figure class="figure text-xs" data-dcnode-id="4085" id="fig11"><span data-dcnode-id="4101"><img alt="" data-dcnode-id="4116" height="259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr11.jpg&amp;raw"><span data-dcnode-id="4115" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4102"><li data-dcnode-id="4109"><a class="anchor download-link u-font-sans" data-dcnode-id="4110" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr11_lrg.jpg" target="_blank" title="Download high-res image (251KB)"><span class="anchor-text" data-dcnode-id="4111"><span data-dcnode-id="4114" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">Download high-res image (251KB)</span></span></span></a></li><li data-dcnode-id="4103"><a class="anchor download-link u-font-sans" data-dcnode-id="4104" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr11.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4105"><span data-dcnode-id="4108" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4086"><span data-dcnode-id="4087"><p data-dcnode-id="4088"><span class="label" data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Fig. 11</span></span><span data-dcnode-id="4098" instrument_node="">. </span><span data-dcnode-id="4097" instrument_node="">(a) An example of </span><em data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">contrapposto</span></em><span data-dcnode-id="4094" instrument_node="">. The body stands on one leg and the other leg is flexed giving the impression that the discus thrower is about to release his throw. Copy of Myron (ca. 450 BC) “Discobolus”. Marble Roman copy after a bronze original, 170</span><span data-dcnode-id="4093" instrument_node="">&nbsp;</span><span data-dcnode-id="4092" instrument_node="">cm; The British Museum, London. (b) Example of movement under stroboscopic flashes. The movement of a person walking past the camera is fixed by flashing the scene at regular intervals. Reprinted from </span><a class="workspace-trigger" data-dcnode-id="4090" href="#bib47" name="bbib47"><span data-dcnode-id="4091" instrument_node="">Marey (1884)</span></a><span data-dcnode-id="4089" instrument_node="">.</span></p></span></span></figure></div><p data-dcnode-id="4076"><span data-dcnode-id="4083" instrument_node="">Another convention used to depict movement is to present multiple, superimposed views of the object in motion. Such a representation corresponds to what one would see under a stroboscopic light (rapid sequence of bright flashes). Among the earliest scientific studies that used stroboscopic flashes are the representations of human movement by Etienne-Jules Marey (</span><a class="workspace-trigger" data-dcnode-id="4081" href="#fig11" name="bfig11"><span data-dcnode-id="4082" instrument_node="">Fig. 11</span></a><span data-dcnode-id="4080" instrument_node="">b). These studies influenced twentieth century artists such as Marcel Duchamp and his “Nu descendant l’escalier” (1912). Other ways to represent movement include photographic blur and direction vectors superimposed in the image (for a review, see </span><a class="workspace-trigger" data-dcnode-id="4078" href="#bib14" name="bbib14"><span data-dcnode-id="4079" instrument_node="">Cutting, 2002</span></a><span data-dcnode-id="4077" instrument_node="">).</span></p><p data-dcnode-id="4068"><span data-dcnode-id="4075" instrument_node="">In summary, the conventions used in visual arts to depict movement are very different from the prior assumptions of the human observer. These conventions are often violating the structure of natural images, such as when multiple views are superimposed as if to simulate a stroboscopic lighting. Other artists have also used other tricks to produce an impression of motion. For instance, some Op art paintings, such as the closely packed parallel black and white lines of “Fall” by Bridget Riley (1963), create an intriguing movement perception that may be the result of small involuntary eye-movements (</span><a class="workspace-trigger" data-dcnode-id="4073" href="#bib76" name="bbib76"><span data-dcnode-id="4074" instrument_node="">Zanker &amp; Walker, 2004</span></a><span data-dcnode-id="4072" instrument_node="">). More recently, the paintings of Patrick Hughes on canvases composed of truncated pyramids do generate a perception of non-rigidity because the linear perspective in the scene is in conflict with the slant of the canvas panes (</span><a class="workspace-trigger" data-dcnode-id="4070" href="#bib56" name="bbib56"><span data-dcnode-id="4071" instrument_node="">Papathomas, 2002</span></a><span data-dcnode-id="4069" instrument_node="">). These various attempts to produce an artistic perception of movement may one day reach the status of convention if they are effective and well accepted by the observers.</span></p></section><section data-dcnode-id="4037" id="aep-section-id25"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4063"><span data-dcnode-id="4066" instrument_node="">8</span><span data-dcnode-id="4065" instrument_node="">. </span><span data-dcnode-id="4064" instrument_node="">Discussion</span></h2><p data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Visual perception is ambiguous and visual arts play with these ambiguities. Ambiguities in visual perception are resolved thanks to prior constraints that are often derived from the knowledge of statistics of natural scenes. Ambiguities in visual arts are resolved thanks to conventions that found their inspirations from perceptual priors or, more interestingly, from other sources such as stylistic or arbitrary choices. Of course, not all ambiguities in visual perception are resolved, as witnessed by the multiple instances of bistable perception such as the one arising from looking at a Necker cube. Similarly, not all ambiguities in paintings are resolved, and artists probably strive to leave the right amount of ambiguities to let the observer contribute to his experience in a personal way.</span></p><p data-dcnode-id="4056"><span data-dcnode-id="4060" instrument_node="">The purpose of this review was to establish the relationship between visual prior constraints and artistic conventions. It is evident from this survey that most conventions have their roots in visual perception, such as the preference for above illumination that also presents a bias to the left. On the other hand, some conventions seem to differ from the priors of visual perception, such as the exaggerations of color contrasts or the depiction of figures in a mirror. Dividing the conventions that are perceptually-based from those that are not might be a fruitful exercise to make sense of what at first glance could appear as a bag of artistic tricks (</span><a class="workspace-trigger" data-dcnode-id="4058" href="#bib58" name="bbib58"><span data-dcnode-id="4059" instrument_node="">Ramachandran &amp; Hirstein, 1999</span></a><span data-dcnode-id="4057" instrument_node="">). Visual art is different from visual perception, and one important difference might come from the conventions that differ from perceptual priors.</span></p><p data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">One can be sure that as vision scientists unravel visual ambiguities and constraints, and art historians report artistic conventions, there will always be an artist to violate these principles and promote a new style. However, these styles only make sense when one refers to the conventions they attack. What would be fauvism and the bewildering colors in Matisse paintings without centuries of hard work and conformism to reproduce colors as faithfully as possible? How could we understand cubism and the deconstructed figures of Picasso without referring to the constraint of a unitary viewpoint? Among these violations of conventions, “The Annunciation” by Crivelli (1486) is a playful painting full of amusing details, in particular the artist’s decision to place completely irrelevant characters near the central vanishing point.</span></p><p data-dcnode-id="4046"><span data-dcnode-id="4053" instrument_node="">One practical application of the appreciation of ambiguities and conventions in visual arts is in product design. An attractive new product should be a compromise between its innovations and the ease with which it can be used. Understanding how to use a novel object presents some similarities with appreciating or not a painting. People working in product design often see the interaction with an object as a set of affordances (e.g, </span><a class="workspace-trigger" data-dcnode-id="4051" href="#bib75" name="bbib75"><span data-dcnode-id="4052" instrument_node="">You &amp; Chen, 2007</span></a><span data-dcnode-id="4050" instrument_node="">), but some of these affordances can probably be redefined as conventions (</span><a class="workspace-trigger" data-dcnode-id="4048" href="#bib54" name="bbib54"><span data-dcnode-id="4049" instrument_node="">Norman, 1999</span></a><span data-dcnode-id="4047" instrument_node="">). As such, product design offers an interesting and practical forum to investigate the role of ambiguities and conventions in visual arts.</span></p><p data-dcnode-id="4038"><span data-dcnode-id="4045" instrument_node="">There are a lot of similarities in the work of artists and scientists (</span><a class="workspace-trigger" data-dcnode-id="4043" href="#bib31" name="bbib31"><span data-dcnode-id="4044" instrument_node="">Kemp, 1990</span></a><span data-dcnode-id="4042" instrument_node="">). But there are also differences. Nick Wade rightly notes that “Artists enhance and elaborate the effects, whereas scientists contract and constrain them.” (</span><a class="workspace-trigger" data-dcnode-id="4040" href="#bib71" name="bbib71"><span data-dcnode-id="4041" instrument_node="">Wade, 2003</span></a><span data-dcnode-id="4039" instrument_node="">). More contact with visual arts can maybe help expand the horizon of some vision scientists.</span></p></section></div><section data-dcnode-id="4031" id="aep-acknowledgment-id26"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">This work benefited from grants by the France-Berkeley Funds (collaboration with Marty Banks) and a chaire d’excellence from the French Ministry of Research. I thank Patrick Cavanagh, Christopher Tyler and one insightful reviewer for discussions and comments on an earlier draft of the manuscript.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="4023"><button class="button button-anchor" data-dcnode-id="4027" type="button"><span class="button-text" data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="4024" type="button"><span class="button-text" data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="4022"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="364" id="aep-bibliography-id27"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="365" id="aep-bibliography-sec-id28"><dl class="references" data-dcnode-id="366" id="reference-links-aep-bibliography-sec-id28"><dt class="label" data-dcnode-id="4017"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4018" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="4019" instrument_node="">Arnheim, 1954</span></a></dt><dd class="reference" data-dcnode-id="3991"><div class="contribution" data-dcnode-id="4008"><span data-dcnode-id="4016" instrument_node="">R.</span><span data-dcnode-id="4014" instrument_node=""> </span><span data-dcnode-id="4012" instrument_node="">Arnheim</span><div data-dcnode-id="4009"><strong class="title" data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">Art and visual perception: A psychology of the creative eye</span></strong></div></div><div class="host" data-dcnode-id="3996"><span data-dcnode-id="4007" instrument_node="">University of California Press</span><span data-dcnode-id="4005" instrument_node="">, </span><span data-dcnode-id="4003" instrument_node="">Berkeley, CA</span><span data-dcnode-id="4001" instrument_node=""> (</span><span data-dcnode-id="3999" instrument_node="">1954</span><span data-dcnode-id="3997" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="3992"><span data-dcn rn)</span></h3></a><div class="article-source ellipsis" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">2018, Expert Systems with Applications</span></div><div class="CitedSection" data-dcnode-id="349"><div class="snippet" data-dcnode-id="350"><div class="cite-header" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">However, through history, new styles have appeared that attacked these conventions; for example, Impressionism broke the tradition of reproducing shapes accurately, and introduced blurred boundaries of objects producing movement effects on observers. Also Fauvism broke the tradition of reproducing the colors as faithfully as possible, and Cubism broke the convention of using a unitary point of view (Mamassian, 2008). All these ambiguities show that automatic painting categorization is a challenge to overcome.</span></p></div></div></div><div class="buttons" data-dcnode-id="342"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="343" type="button"><span class="button-link-text" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="344" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="345"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="328"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="329" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="330"><p data-dcnode-id="331" id="spara0002"><span data-dcnode-id="341" instrument_node="">The QArt-Learn approach for style painting categorization based on Qualitative Color Descriptors (QCD), color similarity (</span><em data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">SimQCD</span></em><span data-dcnode-id="338" instrument_node="">), and quantitative global features (i.e. average of brightness, hue, saturation and lightness and brightness contrast) is presented in this paper. </span><em data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">k</span></em><span data-dcnode-id="335" instrument_node="">-Nearest Neighbor (</span><em data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">k</span></em><span data-dcnode-id="332" instrument_node="">-NN) and support vector machine (SVM) techniques have been used for learning the features of paintings from the Baroque, Impressionism and Post-Impressionism styles. Specifically two classifiers are built, and two different parameterizations have been applied for the QCD. For testing QArt-Learn approach, the Painting-91 dataset has been used, from which the paintings corresponding to Velázquez, Vermeer, Monet, Renoir, van Gogh and Gauguin were extracted, resulting in a set of 252 paintings. The results obtained have shown categorization accuracies higher than 65%, which are comparable to accuracies obtained in the literature. However, QArt-Learn uses qualitative color names which can describe style color palettes linguistically, so that they can be better understood by non-experts in art since QCDs are aligned with human perception.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="316"><div class="sub-heading" data-dcnode-id="321"><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1038/s41598-022-08365-z" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="325" id="citing-articles-article1-title"><span data-dcnode-id="326" instrument_node="">Universality and superiority in preference for chromatic composition of art paintings</span></h3></a><div class="article-source ellipsis" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">2022, Scientific Reports</span></div></div><div class="buttons" data-dcnode-id="320"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="317"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="318" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="319"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="305"><div class="sub-heading" data-dcnode-id="310"><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1108/JPBM-04-2020-2834" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="314" id="citing-articles-article2-title"><span data-dcnode-id="315" instrument_node="">Brand implications of advertising products with their reflections</span></h3></a><div class="article-source ellipsis" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">2022, Journal of Product and Brand Management</span></div></div><div class="buttons" data-dcnode-id="309"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="306"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="307" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="308"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="294"><div class="sub-heading" data-dcnode-id="299"><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1162/leon_a_02054" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="303" id="citing-articles-article3-title"><span data-dcnode-id="304" instrument_node="">Slow looking at slow art the work of pierre bonnard</span></h3></a><div class
