</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id15&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id16&quot;><p>Vision perception is ambiguous and visual arts play with these ambiguities. While perceptual ambiguities are resolved with prior constraints, artistic ambiguities are resolved by conventions. Is there a relationship between priors and conventions? This review surveys recent work related to these ambiguities in composition, spatial scale, illumination and color, three-dimensional layout, shape, and movement. While most conventions seem to have their roots in perceptual constraints, those conventions that differ from priors may help us appreciate how visual arts differ from everyday perception.</p></div></div></div>" data-dcnode-id="5438" lang="en" name="citation_abstract"><span data-dcnode-id="5437" instrument_node="">

v class="abstract author" data-dcnode-id="4905" id="aep-abstract-id15" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">Abstract</span></h2><div data-dcnode-id="4906" id="aep-abstract-sec-id16"><p data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">Vision perception is ambiguous and visual arts play with these ambiguities. While perceptual ambiguities are resolved with prior constraints, artistic ambiguities are resolved by conventions. Is there a relationship between priors and conventions? This review surveys recent work related to these ambiguities in composition, spatial scale, illumination and color, three-dimensional layout, shape, and movement. While most conventions seem to have their roots in perceptual constraints, those conventions that differ from priors may help us appreciate how visual arts differ from everyday perception.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4881" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4893"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0042698908002800"><svg class="icon icon-navigate-left" data-dcnode-id="4902" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4903"></path></svg><span class="button-alternative-text" data-dcnode-id="4895"><strong data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4882"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0042698908002836"><span class="button-alternative-text" data-dcnode-id="4886"><strong data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4884" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4885"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4862"><div class="keywords-section" data-dcnode-id="4863" id="aep-keywords-id17"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="4876"><span data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">Visual perception</span></span></div><div class="keyword" data-dcnode-id="4873"><span data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">Visual arts</span></span></div><div class="keyword" data-dcnode-id="4870"><span data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">Ambiguous perception</span></span></div><div class="keyword" data-dcnode-id="4867"><span data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">Visual constraints</span></span></div><div class="keyword" data-dcnode-id="4864"><span data-dcnode-id="4865"><span data-dcnode-id="4866" instrument_node="">Conventions</span></span></div></div></div><span data-dcnode-id="4861" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4030" id="body"><div data-dcnode-id="4036"><p data-dcnode-id="4849"></p><blockquote data-dcnode-id="4850"><p data-dcnode-id="4858"><em data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">I believe it is only by considering these psychological aspects of image making and image reading that we may come closer to an understanding of the central problem of the history of art [...], that is, why representation should have a history; why it should have taken mankind so long to arrive at a plausible rendering of visual effects that create the illusion of life-likeness; and why artists such as John Constable, who strove to be true to his vision, still had to admit that no art is ever free of convention.</span></em></p><p data-dcnode-id="4853"><span data-dcnode-id="4857" instrument_node="">Sir Ernst </span><a class="workspace-trigger" data-dcnode-id="4855" href="#bib24" name="bbib24"><span data-dcnode-id="4856" instrument_node="">Gombrich (1960)</span></a><span data-dcnode-id="4854" instrument_node="">, p. 291</span></p><p data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">Art and Illusion</span></p></blockquote><p></p><section data-dcnode-id="4774" id="aep-section-id18"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4845"><span data-dcnode-id="4848" instrument_node="">1</span><span data-dcnode-id="4847" instrument_node="">. </span><span data-dcnode-id="4846" instrument_node="">Introduction</span></h2><p data-dcnode-id="4828"><span data-dcnode-id="4844" instrument_node="">Every vision scientist has an opinion about visual arts, apparently all of them different, and these opinions are frequently put forward in lectures and books. Most visual artists have a reciprocal interest in visual perception, although, in contrast, they rarely tour universities offering lessons on visual perception. Yet both vision scientists and artists have in common the passion to uncover the mysteries of visual perception, either to understand its mechanisms or to better communicate a message. While there are still relatively few scientific papers on the perception of visual arts, there is a growing number of books preaching that scientists and artists should look more often at each other’s work (</span><a class="workspace-trigger" data-dcnode-id="4842" href="#bib27" name="bbib27"><span data-dcnode-id="4843" instrument_node="">Gregory and Harris, 1995</span></a><span data-dcnode-id="4841" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4839" href="#bib29" name="bbib29"><span data-dcnode-id="4840" instrument_node="">Hecht et al., 2003</span></a><span data-dcnode-id="4838" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4836" href="#bib38" name="bbib38"><span data-dcnode-id="4837" instrument_node="">Livingstone, 2002</span></a><span data-dcnode-id="4835" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4833" href="#bib46" name="bbib46"><span data-dcnode-id="4834" instrument_node="">Maffei and Fiorentini, 1995</span></a><span data-dcnode-id="4832" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4830" href="#bib78" name="bbib78"><span data-dcnode-id="4831" instrument_node="">Zeki, 1999</span></a><span data-dcnode-id="4829" instrument_node="">). Several of these books grew out of the enthusiasm that has followed the rapid advances in knowledge about how humans perceive, especially from the point of view of visual neuroscience. Even though some of this knowledge is likely to be necessary for a better understanding of the perception of visual arts, it is clearly not sufficient. The question of interest, in personal terms, is what is different when I look at an artist’s painting compared to when I look at my kitchen appliances. Knowing that the same mechanisms are at work when I decipher the shape and color of objects in a Turner painting and in my microwave oven is not a satisfyingly complete answer.</span></p><p data-dcnode-id="4817"><span data-dcnode-id="4827" instrument_node="">One important difference between the perception of visual arts and what could be called “everyday perception” is the task of the observer. Vision scientists know very well the importance of specifying precisely the task of their participants, even when it is as simple as detecting or discriminating a small grey patch (</span><a class="workspace-trigger" data-dcnode-id="4825" href="#bib72" name="bbib72"><span data-dcnode-id="4826" instrument_node="">Watson &amp; Robson, 1981</span></a><span data-dcnode-id="4824" instrument_node="">). In everyday perception, the task of the observer is well defined, often by the action that the perception supports. As we watch the incoming traffic before crossing the road, our perception of the traffic is oriented to the extraction of useful information such as the recognition of a car and the estimation of its speed, while at the same time disregarding irrelevant information such as the make or color of the car. Once the task is established, one can define the decisions necessary to perform it, and if one so wishes, the efficiency of the observer in this task can be computed by normalizing the performance to that of the ideal observer for this task (</span><a class="workspace-trigger" data-dcnode-id="4822" href="#bib2" name="bbib2"><span data-dcnode-id="4823" instrument_node="">Barlow, 1962</span></a><span data-dcnode-id="4821" instrument_node="">). Moreover, because these everyday perceptions are linked to a decision, we can describe the cost of making the wrong decision and thus study perception under risk (</span><a class="workspace-trigger" data-dcnode-id="4819" href="#bib35" name="bbib35"><span data-dcnode-id="4820" instrument_node="">Landy, Goutcher, Trommershäuser, &amp; Mamassian, 2007</span></a><span data-dcnode-id="4818" instrument_node="">). It is more difficult to identify an appropriate task in the perception of visual arts, or indeed to agree that there is one. Without specifying a task, the question of how good one is at looking at a painting becomes irrelevant, and the notion of risk associated to an alleged wrong perception becomes meaningless.</span></p><p data-dcnode-id="4806"><span data-dcnode-id="4816" instrument_node="">One way to identify a plausible task in visual arts perception is to return to the challenges of everyday perception. One major issue is that sensory information is inherently ambiguous, a single image being consistent with an infinite number of three-dimensional scenes. To resolve the ambiguities of the retinal images, one can approach visual perception as an inference problem (</span><a class="workspace-trigger" data-dcnode-id="4814" href="#bib26" name="bbib26"><span data-dcnode-id="4815" instrument_node="">Gregory, 1980</span></a><span data-dcnode-id="4813" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4811" href="#bib60" name="bbib60"><span data-dcnode-id="4812" instrument_node="">Rock, 1983</span></a><span data-dcnode-id="4810" instrument_node="">): what is the most likely scene in front of the observer given the retinal information? In its contemporary formulation, perceptual inferences are cast within a Bayesian framework, and the inference problem is solved thanks to additional knowledge referred to prior constraints (</span><a class="workspace-trigger" data-dcnode-id="4808" href="#bib32" name="bbib32"><span data-dcnode-id="4809" instrument_node="">Kersten, Mamassian, &amp; Yuille, 2004</span></a><span data-dcnode-id="4807" instrument_node="">). For instance, the luminance gradient on an object provides ambiguous information about its shape but a prior knowledge that the light source is located above the observer will resolve the shape ambiguity.</span></p><p data-dcnode-id="4801"><span data-dcnode-id="4805" instrument_node="">Is visual arts perception subject to ambiguities similar to that faced in everyday perception? We shall argue that ambiguity reduction is indeed an important task of visual arts perception. The importance of ambiguity in the perception of art has been appreciated before, for instance by Semir Zeki: “Great art is that which corresponds to as many different concepts in as many different brains over as long a period of time as possible. Ambiguity is such a prized characteristic of all great art because it can correspond to many different concepts.” (</span><a class="workspace-trigger" data-dcnode-id="4803" href="#bib79" name="bbib79"><span data-dcnode-id="4804" instrument_node="">Zeki, 2002, p. 67</span></a><span data-dcnode-id="4802" instrument_node="">). Everyday perception and visual arts perception seem to share the basic task of resolving ambiguities, but in ways that may be very different. While everyday perception uses prior knowledge, visual arts use conventions. These conventions may take their inspiration from visual prior knowledge but they can also be completely arbitrary. Take for instance the convention for the depiction of the human figure in ancient Egyptian art: the head, arms and legs are shown in a profile view, whereas the shoulders and torso face forward. In so doing, Egyptian artists violated the constraints of possible human contortions, maybe for the purpose of removing the ambiguity of the person’s identity by displaying each body part in its most informative pose. Because artistic conventions are different across periods, across cultures, and across human development, the appreciation of art will necessarily vary from one person to the next.</span></p><p data-dcnode-id="4775"><span data-dcnode-id="4800" instrument_node="">The present review will emphasize the nature of the ambiguities common in everyday and art perception, and compare the conventions used in visual arts with the prior knowledge used in everyday perception. In the interest of presenting a reasonable size and coherent review, the scope will be restricted to topics directly linked to visual perception and the focus will be on research done in the last decade or so. To focus on perception, this review will not discuss more cognitive aspects of picture understanding (</span><a class="workspace-trigger" data-dcnode-id="4798" href="#bib63" name="bbib63"><span data-dcnode-id="4799" instrument_node="">Solso, 1994</span></a><span data-dcnode-id="4797" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4795" href="#bib74" name="bbib74"><span data-dcnode-id="4796" instrument_node="">Willats, 1997</span></a><span data-dcnode-id="4794" instrument_node="">) or the emotional responses to art (recently reviewed by </span><a class="workspace-trigger" data-dcnode-id="4792" href="#bib62" name="bbib62"><span data-dcnode-id="4793" instrument_node="">Silvia, 2005</span></a><span data-dcnode-id="4791" instrument_node="">). The review will also be restricted to behavioral studies of perception, and so will not address the emerging field of neuroesthetics that concerns the search for the neural substrates of aesthetics experience (</span><a class="workspace-trigger" data-dcnode-id="4789" href="#bib28" name="bbib28"><span data-dcnode-id="4790" instrument_node="">Kawabata and Zeki, 2004</span></a><span data-dcnode-id="4788" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4786" href="#bib64" name="bbib64"><span data-dcnode-id="4787" instrument_node="">Solso, 2001</span></a><span data-dcnode-id="4785" instrument_node="">). Finally, because they merit reviews on their own, the review will not cover two topics that could find their place here, that of face perception (see the book by </span><a class="workspace-trigger" data-dcnode-id="4783" href="#bib7" name="bbib7"><span data-dcnode-id="4784" instrument_node="">Bruce and Young (1998)</span></a><span data-dcnode-id="4782" instrument_node=""> and the recent review by </span><a class="workspace-trigger" data-dcnode-id="4780" href="#bib59" name="bbib59"><span data-dcnode-id="4781" instrument_node="">Rhodes (2006)</span></a><span data-dcnode-id="4779" instrument_node="">) and that of eye-movements (recently discussed by </span><a class="workspace-trigger" data-dcnode-id="4777" href="#bib12" name="bbib12"><span data-dcnode-id="4778" instrument_node="">Conway &amp; Livingstone, 2007</span></a><span data-dcnode-id="4776" instrument_node="">).</span></p></section><section data-dcnode-id="4689" id="aep-section-id19"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4770"><span data-dcnode-id="4773" instrument_node="">2</span><span data-dcnode-id="4772" instrument_node="">. </span><span data-dcnode-id="4771" instrument_node="">Composition</span></h2><p data-dcnode-id="4762"><span data-dcnode-id="4769" instrument_node="">Composition refers to the way objects are arranged relative to each other and relative to the frame. Composition serves multiple purposes, from improving the harmony of the painting to helping understand the scene. Harmony is influenced by the way objects in the painting relate to each other, how similar repetitive patterns group together and how some figures segregate from the background. Which objects group together and which part of the image constitute the background are ambiguous relationships that Gestalt psychologists have helped disentangle with their principles of perceptual organization. For instance, the preference to see objects of similar orientations group together may be related to some statistical regularities of our environment (</span><a class="workspace-trigger" data-dcnode-id="4767" href="#bib16" name="bbib16"><span data-dcnode-id="4768" instrument_node="">Elder and Goldberg, 2002</span></a><span data-dcnode-id="4766" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4764" href="#bib21" name="bbib21"><span data-dcnode-id="4765" instrument_node="">Geisler et al., 2001</span></a><span data-dcnode-id="4763" instrument_node="">).</span></p><p data-dcnode-id="4745"><span data-dcnode-id="4761" instrument_node="">Are these visual prior expectations also conventions in visual arts? In a very influential book, </span><a class="workspace-trigger" data-dcnode-id="4759" href="#bib1" name="bbib1"><span data-dcnode-id="4760" instrument_node="">Arnheim (1954)</span></a><span data-dcnode-id="4758" instrument_node=""> took these Gestalt principles and searched for correspondences in the visual arts. He argued that such principles were indeed present in paintings, and he emphasized several principles such as the power of balance where the depicted objects are distributed around the canvas, for instance by using symmetrical arrangements. </span><a class="workspace-trigger" data-dcnode-id="4756" href="#bib57" name="bbib57"><span data-dcnode-id="4757" instrument_node="">Pinna (2007)</span></a><span data-dcnode-id="4755" instrument_node=""> is currently pursuing this Gestalt view of visual arts perception. However, other research groups have addressed the issue of whether compositional balance is really critical to distinguish a masterwork from other more regular paintings and they have found mixed results (</span><a class="workspace-trigger" data-dcnode-id="4753" href="#bib39" name="bbib39"><span data-dcnode-id="4754" instrument_node="">Locher, 2003</span></a><span data-dcnode-id="4752" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4750" href="#bib69" name="bbib69"><span data-dcnode-id="4751" instrument_node="">Vartanian et al., 2005</span></a><span data-dcnode-id="4749" instrument_node="">). In this kind of studies, there is always the danger that the observer already knows the painting, or at least recognizes the style of the painter, so that rating judgments can be related to familiarity rather than anything else. In an attempt to objectify and quantify the importance of composition, several experimenters have thus turned towards modern art. The advantage of using modern paintings such as the tri-color compositions of Piet Mondrian is that one can easily manipulate several dimensions independently. By changing the size, location and color of individual rectangles in a Mondrian-like stimulus, some combinations are systematically perceived more balanced (</span><a class="workspace-trigger" data-dcnode-id="4747" href="#bib40" name="bbib40"><span data-dcnode-id="4748" instrument_node="">Locher, Overbeeke, &amp; Stappers, 2005</span></a><span data-dcnode-id="4746" instrument_node="">), but generic and robust principles of good composition are difficult to extract.</span></p><p data-dcnode-id="4725"><span data-dcnode-id="4744" instrument_node="">Another aspect of composition is to help the observer look for meaningful information in the canvas. The ambiguity here lies in the multiple locations in the paintings where attention can be caught. From a visual point of view, it appears that salient points in the image, defined primarily by low-level features such as high-contrast edges, will </span><em data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">a priori</span></em><span data-dcnode-id="4741" instrument_node=""> be the best candidates for visual attention (</span><a class="workspace-trigger" data-dcnode-id="4739" href="#bib30" name="bbib30"><span data-dcnode-id="4740" instrument_node="">Itti &amp; Koch, 2001</span></a><span data-dcnode-id="4738" instrument_node="">). These visual prior locations appear to be very different from the compositional conventions encountered in visual arts, where some locations in the canvas have a privileged status. One first example of a location with special status was described by </span><a class="workspace-trigger" data-dcnode-id="4736" href="#bib66" name="bbib66"><span data-dcnode-id="4737" instrument_node="">Tyler, 1998</span></a><span data-dcnode-id="4735" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4733" href="#bib67" name="bbib67"><span data-dcnode-id="4734" instrument_node="">Tyler, 2007a</span></a><span data-dcnode-id="4732" instrument_node=""> in a study of Western art portraits. Based on the analysis of numerous portraits covering over four centuries, Tyler noticed a high likelihood that one eye of the portrait fell near the vertical midline. Whether this predominance is merely the result of geometrical constraints and whether there is an aesthetic advantage for those portraits following this principle are issues still being debated (</span><a class="workspace-trigger" data-dcnode-id="4730" href="#bib50" name="bbib50"><span data-dcnode-id="4731" instrument_node="">McManus and Thomas, 2007</span></a><span data-dcnode-id="4729" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4727" href="#bib68" name="bbib68"><span data-dcnode-id="4728" instrument_node="">Tyler, 2007b</span></a><span data-dcnode-id="4726" instrument_node="">).</span></p><div data-dcnode-id="4692"><p data-dcnode-id="4717"><span data-dcnode-id="4724" instrument_node="">A second example of a location in the canvas that has a special status can be found in paintings that use one-point perspective. In these paintings, there is a single vanishing point on the canvas that corresponds to the far end of a set of parallel lines in space whose orientation is roughly orthogonal to the canvas. The location of the vanishing point appears to be the place to put an object of major importance. For instance, in “The School of Athens” by Raphael (1510–1511) that displays more than twenty famous Greek philosophers, the vanishing point lies intentionally in between the two main characters, on the book Timaeus that Plato on the left gives to his student Aristotle on the right (</span><a class="workspace-trigger" data-dcnode-id="4722" href="#fig1" name="bfig1"><span data-dcnode-id="4723" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4721" instrument_node="">a). There might be a good technical reason to attract the attention of the observer to the vanishing point. Especially for large paintings or frescoes, the observer would then move in front of the vanishing point, and thus get closer to the center of projection where the scene can be perceived without any three-dimensional deformation (see section on </span><em data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">Three-dimensional layout</span></em><span data-dcnode-id="4718" instrument_node=""> below). There are of course alternative explanations for placing objects of importance near the vanishing point. One alternative explanation is that, because of a well-known optical illusion, objects tend to appear bigger near the vanishing point, so this placement will artificially magnify the size of the objects. Another alternative explanation is that the vanishing point tends to be placed close to the center of the painting, so the power of the center might be sufficient to justify the placement of important objects at that location.</span></p><figure class="figure text-xs" data-dcnode-id="4693" id="fig1"><span data-dcnode-id="4701"><img alt="" data-dcnode-id="4716" height="332" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr1.jpg&amp;raw"><span data-dcnode-id="4715" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4702"><li data-dcnode-id="4709"><a class="anchor download-link u-font-sans" data-dcnode-id="4710" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr1_lrg.jpg" target="_blank" title="Download high-res image (554KB)"><span class="anchor-text" data-dcnode-id="4711"><span data-dcnode-id="4714" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">Download high-res image (554KB)</span></span></span></a></li><li data-dcnode-id="4703"><a class="anchor download-link u-font-sans" data-dcnode-id="4704" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4705"><span data-dcnode-id="4708" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4694"><span data-dcnode-id="4695"><p data-dcnode-id="4696"><span class="label" data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">Fig. 1</span></span><span data-dcnode-id="4698" instrument_node="">. </span><span data-dcnode-id="4697" instrument_node="">(a) Illustration of one-point perspective. The two most important characters, Plato and Aristotle are placed next to the vanishing point. Raphael (1510–1511) “The School of Athens”. Fresco, Palazzi Pontifici, Vatican. (b) Anomalous perspective for spheres. The whole scene is carefully following the laws of linear perspective, except for these two spheres that should have an oblong form in the image. Bottom right detail of the same fresco.</span></p></span></span></figure></div><p data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">In summary on composition, the harmony of multiple objects in visual arts may have similar characteristics as the Gestalt principles of organization, but the placement of individual objects of importance in a painting appears to follow conventions that are quite different from everyday visual expectations.</span></p></section><section data-dcnode-id="4608" id="aep-section-id20"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4685"><span data-dcnode-id="4688" instrument_node="">3</span><span data-dcnode-id="4687" instrument_node="">. </span><span data-dcnode-id="4686" instrument_node="">Spatial scale</span></h2><p data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">While composing a painting, the issue arises as to how best represent both large and small objects. This scaling problem is exacerbated when observers move closer or further away, thereby revealing or discarding different levels of details. The impact of the viewing distance is best characterized with the spatial frequency description of the painting. The high spatial frequency range represent the fine details of the image, whereas the low spatial frequencies are associated to the coarse information. Getting closer to a painting will therefore reveal high spatial frequencies that were before outside the range of frequencies the human visual system is sensitive to (typically represented by the contrast sensitivity function). Another action that will reveal high spatial frequencies is to make an eye movement towards a region of interest. Because spatial resolution is highest in the fovea and gradually decreases as one gets to the periphery, some fine details will only be visible when the observer is looking straight at that part of the image.</span></p><p data-dcnode-id="4678"><span data-dcnode-id="4682" instrument_node="">Because the painter does not know exactly where the observer will stand and where she will look, there is an ambiguity on the spatial frequencies of the painting that will actually be seen by the observer. In natural scenes, all spatial frequencies are available with a distribution that is independent of the observer’s position. This distribution is well described as “1/f”, that is the power spectral density is inversely proportional to the spatial frequency (</span><a class="workspace-trigger" data-dcnode-id="4680" href="#bib18" name="bbib18"><span data-dcnode-id="4681" instrument_node="">Field, 1987</span></a><span data-dcnode-id="4679" instrument_node="">). In other words, a natural image is largely dominated by low spatial frequencies (coarse blobs), and higher frequencies (finer details) are gradually less present. It is likely that the human visual system has adapted to these statistics of the natural environment and that the 1/f spatial frequency distribution is the one expected by the observer as she looks at an image.</span></p><p data-dcnode-id="4667"><span data-dcnode-id="4677" instrument_node="">Is the dominance for low spatial frequencies also a convention in visual arts? One could argue that Impressionists were possibly aware of the asymmetric role of low and high spatial frequencies, since by emphasizing large brush strokes, the interpretation of the painting was mostly carried out by the low spatial frequencies. However, it appears that some painters prefer to maintain a certain ambiguity in the interpretation. Maybe the most celebrated example of ambiguity in a painting is the enigmatic smile of the portrait of “Mona Lisa” painted by da Vinci (1503–1506). </span><a class="workspace-trigger" data-dcnode-id="4675" href="#bib37" name="bbib37"><span data-dcnode-id="4676" instrument_node="">Livingstone, 2000</span></a><span data-dcnode-id="4674" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4672" href="#bib38" name="bbib38"><span data-dcnode-id="4673" instrument_node="">Livingstone, 2002</span></a><span data-dcnode-id="4671" instrument_node=""> has argued that the ambiguity of the facial emotion resulted from the superposition of two conflicting information in two different spatial frequency bands. A smile is clearly visible when only the low spatial frequencies are considered but a more neutral emotion is seen when all spatial frequencies are considered. Livingstone thus proposed that the ambiguity of Mona Lisa’s smile will be most striking when an observer makes an eye movement looking first at the mouth and then at the eyes. When the mouth is seen in visual periphery, only the low spatial frequency information is available and the interpretation of the emotion is a smile. To quantify the fact that the change of emotion came mostly from the mouth region, other authors have added random luminance noise in the lower region of Mona Lisa’s face and used the classification image technique to localize the relevant information (</span><a class="workspace-trigger" data-dcnode-id="4669" href="#bib33" name="bbib33"><span data-dcnode-id="4670" instrument_node="">Kontsevich &amp; Tyler, 2004</span></a><span data-dcnode-id="4668" instrument_node="">).</span></p><div data-dcnode-id="4619"><p data-dcnode-id="4653"><span data-dcnode-id="4666" instrument_node="">The technique of adding luminance noise to a painting is interesting because it masks some information and preserves other information. This technique was modified in a study by </span><a class="workspace-trigger" data-dcnode-id="4664" href="#bib5" name="bbib5"><span data-dcnode-id="4665" instrument_node="">Bonnar, Gosselin, and Schyns (2002)</span></a><span data-dcnode-id="4663" instrument_node=""> who presented an ambiguous painting masked by occluders of various sizes. The chosen painting was the “Slave Market with the Disappearing Bust of Voltaire” (</span><a class="workspace-trigger" data-dcnode-id="4661" href="#fig2" name="bfig2"><span data-dcnode-id="4662" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4660" instrument_node="">a) by Salvador Dali (1940) where a large face of the French philosopher Voltaire gives way to two nuns when one pays attention to the fine details of the painting. Observers were presented with a series of images each time masked by a different set of occluders and they had to report whether they saw the Voltaire or the nuns interpretation. Then, the authors reconstructed the visible parts of the image that led to the Voltaire interpretation (</span><a class="workspace-trigger" data-dcnode-id="4658" href="#fig2" name="bfig2"><span data-dcnode-id="4659" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4657" instrument_node="">b) and the image that led to the nuns interpretation (</span><a class="workspace-trigger" data-dcnode-id="4655" href="#fig2" name="bfig2"><span data-dcnode-id="4656" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4654" instrument_node="">c). As expected, the Voltaire interpretation involved mostly the low spatial frequencies of the image whereas the nuns interpretation involved higher spatial frequencies.</span></p><figure class="figure text-xs" data-dcnode-id="4620" id="fig2"><span data-dcnode-id="4637"><img alt="" data-dcnode-id="4652" height="212" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr2.jpg&amp;raw"><span data-dcnode-id="4651" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4638"><li data-dcnode-id="4645"><a class="anchor download-link u-font-sans" data-dcnode-id="4646" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr2_lrg.jpg" target="_blank" title="Download high-res image (69KB)"><span class="anchor-text" data-dcnode-id="4647"><span data-dcnode-id="4650" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">Download high-res image (69KB)</span></span></span></a></li><li data-dcnode-id="4639"><a class="anchor download-link u-font-sans" data-dcnode-id="4640" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4641"><span data-dcnode-id="4644" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4621"><span data-dcnode-id="4622"><p data-dcnode-id="4623"><span class="label" data-dcnode-id="4635"><span data-dcnode-id="4636" instrument_node="">Fig. 2</span></span><span data-dcnode-id="4634" instrument_node="">. </span><span data-dcnode-id="4633" instrument_node="">(a) Ambiguous painting. The bust of Voltaire is perceived if one focuses on the coarse scale (or look from a far distance) and two nuns are perceived instead if one focuses on the fine scale (or look very close). Salvador Dali (1940) “Slave Market with the Disappearing Bust of Voltaire” (grey-scaled detail). Oil on canvas, 46.5</span><span data-dcnode-id="4632" instrument_node="">&nbsp;</span><span data-dcnode-id="4631" instrument_node="">×</span><span data-dcnode-id="4630" instrument_node="">&nbsp;</span><span data-dcnode-id="4629" instrument_node="">65.5</span><span data-dcnode-id="4628" instrument_node="">&nbsp;</span><span data-dcnode-id="4627" instrument_node="">cm; Salvador Dali Museum, St. Petersburg, Florida. (b) The low spatial frequency (coarse) information used by observers when they reported seeing the bust of Voltaire. (c) The higher spatial frequency (fine) information used by observers when they reported seeing two nuns. Reproduced from </span><a class="workspace-trigger" data-dcnode-id="4625" href="#bib5" name="bbib5"><span data-dcnode-id="4626" instrument_node="">Bonnar et al. (2002)</span></a><span data-dcnode-id="4624" instrument_node="">.</span></p></span></span></figure></div><p data-dcnode-id="4611"><span data-dcnode-id="4618" instrument_node="">An alternative interpretation for both Mona Lisa’s enigmatic smile and the disappearing bust of Voltaire comes from the ambiguous interpretation of the shadows in the paintings. Leonardo da Vinci took great troubles to depict highly saturated shadows around the mouth thanks to the delicate </span><em data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">sfumato</span></em><span data-dcnode-id="4615" instrument_node=""> technique which consists in overlaying multiple translucent layers of paint (</span><a class="workspace-trigger" data-dcnode-id="4613" href="#bib17" name="bbib17"><span data-dcnode-id="4614" instrument_node="">Elias &amp; Cotte, 2008</span></a><span data-dcnode-id="4612" instrument_node="">). The smile of Mona Lisa at low spatial frequencies comes from the large shadows of her cheekbones. If these shadows were properly interpreted, they could be discounted when the observer looks at the mouth, and thus the emotion of the mouth should not change when one considers different frequency bands. Similarly, the nuns in Dali’s painting are defined from the shadows of the brow ridges and cheekbones of Voltaire, providing the hats and the dresses of the nuns. One sees Voltaire when the dark regions of the painting are interpreted as shadows and the two nuns when they are interpreted as dark surface material. By default, shadows tend to form large dark areas in a painting and as such contribute to the low spatial frequency information of the image. If these shadows are placed in specific areas (near the mouth in Mona Lisa and under the brow ridge in the disappearing bust of Voltaire), they can lose their role as shadows and offer an ambiguity to the interpretation of the painting.</span></p><p data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">In summary, natural scenes have a characteristic distribution of spatial frequencies and figurative art, to appear more natural, will necessarily match this prior distribution. However some artists have played cunningly with the spatial frequency contents of the painting to maintain some ambiguous interpretations. Other painters, such as abstract artists who freed themselves from representational depictions, have produced paintings that have a frequency distribution very different from that of natural images, and this convention on spatial frequency is a characteristic of their style.</span></p></section><section data-dcnode-id="4307" id="aep-section-id21"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4604"><span data-dcnode-id="4607" instrument_node="">4</span><span data-dcnode-id="4606" instrument_node="">. </span><span data-dcnode-id="4605" instrument_node="">Illumination and color</span></h2><p data-dcnode-id="4596"><span data-dcnode-id="4603" instrument_node="">Rare are the paintings where the light source is depicted on the canvas. For all the other paintings, not knowing the location of the light source leads to ambiguities on the shape of objects, and not knowing the nature of the illuminant leads to ambiguities on the colors of objects. Naturally, these ambiguities are also present in everyday perception, and several prior constraints have been proposed to overcome these ambiguities. For instance, it is assumed that there is only one stationary light source in the scene (</span><a class="workspace-trigger" data-dcnode-id="4601" href="#bib44" name="bbib44"><span data-dcnode-id="4602" instrument_node="">Mamassian, Knill, &amp; Kersten, 1998</span></a><span data-dcnode-id="4600" instrument_node="">) and that it is sufficiently diffuse so that color variations are due to changes in the surface materials rather than the illuminant (</span><a class="workspace-trigger" data-dcnode-id="4598" href="#bib6" name="bbib6"><span data-dcnode-id="4599" instrument_node="">Brainard, 1997</span></a><span data-dcnode-id="4597" instrument_node="">).</span></p><div data-dcnode-id="4554"><p data-dcnode-id="4585"><span data-dcnode-id="4595" instrument_node="">Do conventions in visual arts follow the perceptual priors for illumination and color? The placement of the illuminant has confused artists until the Renaissance, to the point that shadows were completely absent in paintings for centuries (</span><a class="workspace-trigger" data-dcnode-id="4593" href="#bib8" name="bbib8"><span data-dcnode-id="4594" instrument_node="">Casati, 2004</span></a><span data-dcnode-id="4592" instrument_node="">). Let us take the example of the “Adoration of the Magi” by Konrad Witz (</span><a class="workspace-trigger" data-dcnode-id="4590" href="#fig3" name="bfig3"><span data-dcnode-id="4591" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4589" instrument_node="">). The artist was rightly appreciated for his mastering of shadows that presented fine geometrical details and nice penumbras (</span><a class="workspace-trigger" data-dcnode-id="4587" href="#bib65" name="bbib65"><span data-dcnode-id="4588" instrument_node="">Stoichita, 1997</span></a><span data-dcnode-id="4586" instrument_node="">). However a closer look at this painting shows several inconsistencies in the positions and forms of the shadows. For instance, the two statues at the corner of the building cast their shadow on the right and the left, something that is impossible unless there are two light sources in the scene.</span></p><figure class="figure text-xs" data-dcnode-id="4555" id="fig3"><span data-dcnode-id="4569"><img alt="" data-dcnode-id="4584" height="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr3.jpg&amp;raw"><span data-dcnode-id="4583" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4570"><li data-dcnode-id="4577"><a class="anchor download-link u-font-sans" data-dcnode-id="4578" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr3_lrg.jpg" target="_blank" title="Download high-res image (173KB)"><span class="anchor-text" data-dcnode-id="4579"><span data-dcnode-id="4582" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">Download high-res image (173KB)</span></span></span></a></li><li data-dcnode-id="4571"><a class="anchor download-link u-font-sans" data-dcnode-id="4572" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4573"><span data-dcnode-id="4576" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4556"><span data-dcnode-id="4557"><p data-dcnode-id="4558"><span class="label" data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">Fig. 3</span></span><span data-dcnode-id="4566" instrument_node="">. </span><span data-dcnode-id="4565" instrument_node="">Unnoticed impossible shadows. There are multiple inconsistencies in this painting that are only visible if one pays close attention to the details. For instance, light is coming from the right but the statue in the left corner of the building cast a shadow on the right, and there are inconsistent shadows of the beams cast on the wall. Konrad Witz (1444) “Adoration of the Magi”. Panel, 132</span><span data-dcnode-id="4564" instrument_node="">&nbsp;</span><span data-dcnode-id="4563" instrument_node="">×</span><span data-dcnode-id="4562" instrument_node="">&nbsp;</span><span data-dcnode-id="4561" instrument_node="">154</span><span data-dcnode-id="4560" instrument_node="">&nbsp;</span><span data-dcnode-id="4559" instrument_node="">cm; Musée d’Art et d’Histoire, Geneva.</span></p></span></span></figure></div><div data-dcnode-id="4509"><p data-dcnode-id="4543"><span data-dcnode-id="4553" instrument_node="">Interestingly, these impossible shadows are not noticed, unless one voluntarily scrutinizes the painting (</span><a class="workspace-trigger" data-dcnode-id="4551" href="#fig4" name="bfig4"><span data-dcnode-id="4552" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4550" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4548" href="#bib42" name="bbib42"><span data-dcnode-id="4549" instrument_node="">Mamassian, 2004</span></a><span data-dcnode-id="4547" instrument_node="">). Therefore, these inconsistencies do not take anything away from the quality of the painting, but allow the artist to emphasize the really important aspects of the painting. In other words, “the artist can take shortcuts, presenting cues more economically, and arranging surfaces and lights to suit the message of the piece rather than the requirements of the physical world.” (</span><a class="workspace-trigger" data-dcnode-id="4545" href="#bib9" name="bbib9"><span data-dcnode-id="4546" instrument_node="">Cavanagh, 2005</span></a><span data-dcnode-id="4544" instrument_node="">). In contrast to the visual assumption that there is a single light source in the scene, the profusion of improbable or impossible shadows in western arts suggests that artists prefer to depict shadows as if there were multiple light sources, rather than having a shadow cross an object of interest.</span></p><figure class="figure text-xs" data-dcnode-id="4510" id="fig4"><span data-dcnode-id="4527"><img alt="" data-dcnode-id="4542" height="325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr4.jpg&amp;raw"><span data-dcnode-id="4541" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4528"><li data-dcnode-id="4535"><a class="anchor download-link u-font-sans" data-dcnode-id="4536" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr4_lrg.jpg" target="_blank" title="Download high-res image (319KB)"><span class="anchor-text" data-dcnode-id="4537"><span data-dcnode-id="4540" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">Download high-res image (319KB)</span></span></span></a></li><li data-dcnode-id="4529"><a class="anchor download-link u-font-sans" data-dcnode-id="4530" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4531"><span data-dcnode-id="4534" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4511"><span data-dcnode-id="4512"><p data-dcnode-id="4513"><span class="label" data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">Fig. 4</span></span><span data-dcnode-id="4524" instrument_node="">. </span><span data-dcnode-id="4523" instrument_node="">Analyzing impossible shadows. (a) This surrealist painting offers shadows with fine detailed shapes. Yves Tanguy (1942) “Indefinite Divisibility”. Oil on canvas, 102</span><span data-dcnode-id="4522" instrument_node="">&nbsp;</span><span data-dcnode-id="4521" instrument_node="">×</span><span data-dcnode-id="4520" instrument_node="">&nbsp;</span><span data-dcnode-id="4519" instrument_node="">89</span><span data-dcnode-id="4518" instrument_node="">&nbsp;</span><span data-dcnode-id="4517" instrument_node="">cm; Albright-Knox Art Gallery, Buffalo, NY. (b) To determine the consistency of the light direction, one can trace constraint lines between identifiable object features and their cast shadow. Reprinted from </span><a class="workspace-trigger" data-dcnode-id="4515" href="#bib42" name="bbib42"><span data-dcnode-id="4516" instrument_node="">Mamassian (2004)</span></a><span data-dcnode-id="4514" instrument_node="">.</span></p></span></span></figure></div><p data-dcnode-id="4495"><span data-dcnode-id="4508" instrument_node="">The positions of shadows are constrained by the light source position. Human observers assume that light is coming from above their head, but also, and more surprisingly, slightly from the left (for a review, see </span><a class="workspace-trigger" data-dcnode-id="4506" href="#bib42" name="bbib42"><span data-dcnode-id="4507" instrument_node="">Mamassian, 2004</span></a><span data-dcnode-id="4505" instrument_node="">). Is this perceptual preference for a light on the left also a convention in the visual arts? There might be such a predominance for purely practical reasons. For instance, in his </span><em data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">Elements of Drawing</span></em><span data-dcnode-id="4502" instrument_node="">, John Ruskin wrote “Sit so that the light may come from the left, else the shadow of the pencil point interferes with your sight of your work.” (</span><a class="workspace-trigger" data-dcnode-id="4500" href="#bib61" name="bbib61"><span data-dcnode-id="4501" instrument_node="">Ruskin, 1857, p. 49</span></a><span data-dcnode-id="4499" instrument_node="">). However, there might also be an aesthetic preference for a predominance of left light in paintings. By looking at some paintings in a mirror, </span><a class="workspace-trigger" data-dcnode-id="4497" href="#bib52" name="bbib52"><span data-dcnode-id="4498" instrument_node="">Metzger (1936)</span></a><span data-dcnode-id="4496" instrument_node=""> has speculated that when the painting had the light coming from the left, it was more aesthetically pleasing than when light was from the right.</span></p><div data-dcnode-id="4456"><p data-dcnode-id="4481"><span data-dcnode-id="4494" instrument_node="">In an effort to quantify the predominance of paintings in the Western world where the light source is on the left, the paintings of the Louvre museum were surveyed by taking all the 659 paintings in their current catalogue (</span><a class="workspace-trigger" data-dcnode-id="4492" href="#bib51" name="bbib51"><span data-dcnode-id="4493" instrument_node="">Mettais, 2002</span></a><span data-dcnode-id="4491" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="4489" href="#bib49" name="bbib49"><span data-dcnode-id="4490" instrument_node="">McManus, Buckman, &amp; Woolley, 2004</span></a><span data-dcnode-id="4488" instrument_node="">). The paintings were sorted by periods, covering seven centuries from the 13th to the 19th century. They were also sorted in 194 portraits (</span><a class="workspace-trigger" data-dcnode-id="4486" href="#fig5" name="bfig5"><span data-dcnode-id="4487" instrument_node="">Fig. 5</span></a><span data-dcnode-id="4485" instrument_node="">a) and 465 non-portraits (</span><a class="workspace-trigger" data-dcnode-id="4483" href="#fig5" name="bfig5"><span data-dcnode-id="4484" instrument_node="">Fig. 5</span></a><span data-dcnode-id="4482" instrument_node="">b), the latter category including landscapes but also groups of people. Each painting was analyzed to see whether light was coming from the left, the right, or a general category called “non-specific” that included illumination from straight above, from the middle of the canvas (e.g. from a candle), or from inconsistent or multiple light sources. On average across all periods, the portraits were lit 84.0 percent of the time from the left and 9.8 percent from the right (6.2 percent from a non-specific direction), and the non-portraits were lit 67.3 percent of the time from the left and 23.0 percent from the right (9.7 percent non-specific). There was therefore an overwhelming predominance of paintings lit from left, and this bias was even more pronounced in portraits than in other paintings. The stronger bias for portraits is maybe not that surprising if we presume that portraits are in general more subject to conventions and studio constraints than outdoor scenes. In addition, it seems that this bias to the left for the light source position reached its peak between the 16th and the 18th century. Before that period, illumination conditions were not necessarily coherent in the scene, and after that period, artists started to free themselves from imposed conventions.</span></p><figure class="figure text-xs" data-dcnode-id="4457" id="fig5"><span data-dcnode-id="4465"><img alt="" data-dcnode-id="4480" height="242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr5.jpg&amp;raw"><span data-dcnode-id="4479" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4466"><li data-dcnode-id="4473"><a class="anchor download-link u-font-sans" data-dcnode-id="4474" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr5_lrg.jpg" target="_blank" title="Download high-res image (136KB)"><span class="anchor-text" data-dcnode-id="4475"><span data-dcnode-id="4478" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">Download high-res image (136KB)</span></span></span></a></li><li data-dcnode-id="4467"><a class="anchor download-link u-font-sans" data-dcnode-id="4468" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4469"><span data-dcnode-id="4472" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4458"><span data-dcnode-id="4459"><p data-dcnode-id="4460"><span class="label" data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">Fig. 5</span></span><span data-dcnode-id="4462" instrument_node="">. </span><span data-dcnode-id="4461" instrument_node="">Predominance of paintings lit from the left in the Louvre museum in Paris. (a) Portraits. This category corresponded to the painting of a single person posing for the artist and whose head or body occupied most of the canvas. (b) All paintings other than portraits. This category included landscapes, groups of people, and in general anything that was not categorized as a portrait. Color code: red is left lighting, yellow is right lighting, and orange corresponds to a “non-specific” category that included lights from straight above and other illumination conditions that were impossible to categorize as left or right light source positions.</span></p></span></span></figure></div><p data-dcnode-id="4445"><span data-dcnode-id="4455" instrument_node="">The choice of the light source position has an effect on the three-dimensional shape depicted. The problem of recovering shape-from-shading is under-constrained in the sense that the amount of light reflected by a surface is the result of the combination of the light intensity, the color of the surface and the orientation of the surface relative to the light source. From a perceptual point of view, shading remains a rather weak cue because of the ambiguity resulting from these multiple combinations (</span><a class="workspace-trigger" data-dcnode-id="4453" href="#bib43" name="bbib43"><span data-dcnode-id="4454" instrument_node="">Mamassian &amp; Kersten, 1996</span></a><span data-dcnode-id="4452" instrument_node="">). In visual arts, the </span><em data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">chiaroscuro</span></em><span data-dcnode-id="4449" instrument_node=""> technique from the Renaissance has helped provide a sense of shape from shading by the careful use of light contrasts, highlights and shadows. However, some ambiguities remain, in particular to differentiate the color of the surface and the intensity of the light source. For instance in engravings, artists were faced with hard choices to depict objects that varied both in color and in amount of reflected light (</span><a class="workspace-trigger" data-dcnode-id="4447" href="#bib77" name="bbib77"><span data-dcnode-id="4448" instrument_node="">Zavagno &amp; Massironi, 2006</span></a><span data-dcnode-id="4446" instrument_node="">).</span></p><div data-dcnode-id="4406"><p data-dcnode-id="4437"><span data-dcnode-id="4444" instrument_node="">Given that a painting could be seen under various illumination conditions, from natural to artificial lights, how can the colors be reliably conveyed? One convention may be to over-emphasize the contrasts of the edges between objects. </span><a class="workspace-trigger" data-dcnode-id="4442" href="#bib11" name="bbib11"><span data-dcnode-id="4443" instrument_node="">Chevreul (1839)</span></a><span data-dcnode-id="4441" instrument_node=""> is widely acknowledged for providing an early empirical description of simultaneous color contrast that has influenced both vision scientists and artists, in particular impressionists and pointillists. Opposing colors, especially red versus green and blue versus yellow, enhance each others’ contrasts when they are placed side by side. The effect is most spectacular when the colors on the canvas are mostly from one pair of opposing colors, as in “The Night Café” by Vincent van Gogh (1888) (</span><a class="workspace-trigger" data-dcnode-id="4439" href="#fig6" name="bfig6"><span data-dcnode-id="4440" instrument_node="">Fig. 6</span></a><span data-dcnode-id="4438" instrument_node="">). Emphasizing color contrasts might be a convention that helps maintain color constancy irrespective of the illumination conditions.</span></p><figure class="figure text-xs" data-dcnode-id="4407" id="fig6"><span data-dcnode-id="4421"><img alt="" data-dcnode-id="4436" height="359" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr6.jpg&amp;raw"><span data-dcnode-id="4435" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4422"><li data-dcnode-id="4429"><a class="anchor download-link u-font-sans" data-dcnode-id="4430" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr6_lrg.jpg" target="_blank" title="Download high-res image (398KB)"><span class="anchor-text" data-dcnode-id="4431"><span data-dcnode-id="4434" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">Download high-res image (398KB)</span></span></span></a></li><li data-dcnode-id="4423"><a class="anchor download-link u-font-sans" data-dcnode-id="4424" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4425"><span data-dcnode-id="4428" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4408"><span data-dcnode-id="4409"><p data-dcnode-id="4410"><span class="label" data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">Fig. 6</span></span><span data-dcnode-id="4418" instrument_node="">. </span><span data-dcnode-id="4417" instrument_node="">Simultaneous color contrast. The green surfaces are adjacent to surfaces in red and orange tones. Vincent van Gogh (1888) “The Night Café”. Oil on canvas, 72</span><span data-dcnode-id="4416" instrument_node="">&nbsp;</span><span data-dcnode-id="4415" instrument_node="">×</span><span data-dcnode-id="4414" instrument_node="">&nbsp;</span><span data-dcnode-id="4413" instrument_node="">92</span><span data-dcnode-id="4412" instrument_node="">&nbsp;</span><span data-dcnode-id="4411" instrument_node="">cm; Yale University Art Gallery.</span></p></span></span></figure></div><div data-dcnode-id="4358"><p data-dcnode-id="4395"><span data-dcnode-id="4405" instrument_node="">The effects of color contrast take a new dimension when the depicted surfaces are small. The perceived color of a small patch is then very much affected by the background. However, recent research has shown that the shift in perceived color of the patch is larger when the background is itself composed of small regions rather than being uniform (</span><a class="workspace-trigger" data-dcnode-id="4403" href="#fig7" name="bfig7"><span data-dcnode-id="4404" instrument_node="">Fig. 7</span></a><span data-dcnode-id="4402" instrument_node="">a; </span><a class="workspace-trigger" data-dcnode-id="4400" href="#bib53" name="bbib53"><span data-dcnode-id="4401" instrument_node="">Monnier &amp; Shevell, 2003</span></a><span data-dcnode-id="4399" instrument_node="">). This finding might provide a new perspective on pointillist paintings where small patches of color covering the whole canvas were preferred over large uniform color regions (</span><a class="workspace-trigger" data-dcnode-id="4397" href="#fig7" name="bfig7"><span data-dcnode-id="4398" instrument_node="">Fig. 7</span></a><span data-dcnode-id="4396" instrument_node="">b).</span></p><figure class="figure text-xs" data-dcnode-id="4359" id="fig7"><span data-dcnode-id="4379"><img alt="" data-dcnode-id="4394" height="272" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr7.jpg&amp;raw"><span data-dcnode-id="4393" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4380"><li data-dcnode-id="4387"><a class="anchor download-link u-font-sans" data-dcnode-id="4388" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr7_lrg.jpg" target="_blank" title="Download high-res image (292KB)"><span class="anchor-text" data-dcnode-id="4389"><span data-dcnode-id="4392" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">Download high-res image (292KB)</span></span></span></a></li><li data-dcnode-id="4381"><a class="anchor download-link u-font-sans" data-dcnode-id="4382" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr7.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4383"><span data-dcnode-id="4386" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4360"><span data-dcnode-id="4361"><p data-dcnode-id="4362"><span class="label" data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">Fig. 7</span></span><span data-dcnode-id="4376" instrument_node="">. </span><span data-dcnode-id="4375" instrument_node="">(a) Apparent color shifts from textured background. The central ring in all four donut shapes is identical but has different color appearances depending on the background. The color shift is stronger when the background is itself composed of small rings (top figures) rather than uniform (bottom figures). Reprinted from </span><a class="workspace-trigger" data-dcnode-id="4373" href="#bib53" name="bbib53"><span data-dcnode-id="4374" instrument_node="">Monnier and Shevell (2003)</span></a><span data-dcnode-id="4372" instrument_node="">. (b) Example of the use of small patches of color contrasts in pointillism. Red surfaces are placed next to green ones but a close examination of the painting shows that each surface is itself composed of numerous small patches. Georges Seurat (1884) “Un dimanche après-midi à l’Île de la Grande Jatte” (detail in top-left corner). Oil on canvas, 207</span><span data-dcnode-id="4371" instrument_node="">&nbsp;</span><span data-dcnode-id="4370" instrument_node="">×</span><span data-dcnode-id="4369" instrument_node="">&nbsp;</span><span data-dcnode-id="4368" instrument_node="">308</span><span data-dcnode-id="4367" instrument_node="">&nbsp;</span><span data-dcnode-id="4366" instrument_node="">cm; Helen Birch Bartlett Memorial Collection, 1926.224; The Art Institute of Chicago (</span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www/artic.edu/aic" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4365" instrument_node="">http://www.artic.edu/aic</span></a><span data-dcnode-id="4363" instrument_node="">).</span></p></span></span></figure></div><div data-dcnode-id="4313"><p data-dcnode-id="4344"><span data-dcnode-id="4357" instrument_node="">Within the contemporary view of the human visual system, the processing of color is split between luminance and chrominance pathways (e.g. </span><a class="workspace-trigger" data-dcnode-id="4355" href="#bib36" name="bbib36"><span data-dcnode-id="4356" instrument_node="">Livingstone &amp; Hubel, 1987</span></a><span data-dcnode-id="4354" instrument_node="">). While natural objects are determined both by luminance and chrominance, some objects can therefore be defined exclusively from their luminance properties (i.e. different gray levels) and others from their chromatic properties (i.e. hue and saturation). In addition, the chrominance channel contributes weakly to the perception of three-dimensional position and movement. This view led </span><a class="workspace-trigger" data-dcnode-id="4352" href="#bib38" name="bbib38"><span data-dcnode-id="4353" instrument_node="">Livingstone (2002)</span></a><span data-dcnode-id="4351" instrument_node=""> to propose that if an object is painted with a color that is equiluminant to (i.e. that has no luminance difference with) its background, that object should be difficult to maintain at a fixed position and its boundaries might be difficult to determine. Let us take the example of the “Coquelicots” by Claude Monet (1873) (</span><a class="workspace-trigger" data-dcnode-id="4349" href="#fig8" name="bfig8"><span data-dcnode-id="4350" instrument_node="">Fig. 8</span></a><span data-dcnode-id="4348" instrument_node="">a). The red poppies are near equiluminance to the green grass (</span><a class="workspace-trigger" data-dcnode-id="4346" href="#fig8" name="bfig8"><span data-dcnode-id="4347" instrument_node="">Fig. 8</span></a><span data-dcnode-id="4345" instrument_node="">b), maybe helping the impression that the poppies shiver in the wind.</span></p><figure class="figure text-xs" data-dcnode-id="4314" id="fig8"><span data-dcnode-id="4328"><img alt="" data-dcnode-id="4343" height="295" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr8.jpg&amp;raw"><span data-dcnode-id="4342" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4329"><li data-dcnode-id="4336"><a class="anchor download-link u-font-sans" data-dcnode-id="4337" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr8_lrg.jpg" target="_blank" title="Download high-res image (350KB)"><span class="anchor-text" data-dcnode-id="4338"><span data-dcnode-id="4341" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">Download high-res image (350KB)</span></span></span></a></li><li data-dcnode-id="4330"><a class="anchor download-link u-font-sans" data-dcnode-id="4331" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0042698908003039-gr8.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4332"><span data-dcnode-id="4335" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4315"><span data-dcnode-id="4316"><p data-dcnode-id="4317"><span class="label" data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">Fig. 8</span></span><span data-dcnode-id="4325" instrument_node="">. </span><span data-dcnode-id="4324" instrument_node="">Movement from equiluminance. (a) The red poppies are mostly defined from the color contrast with the green grass. Claude Monet (1873) “Coquelicots”. Oil on canvas, 50</span><span data-dcnode-id="4323" instrument_node="">&nbsp;</span><span data-dcnode-id="4322" instrument_node="">×</span><span data-dcnode-id="4321" instrument_node="">&nbsp;</span><span data-dcnode-id="4320" instrument_node="">65</span><span data-dcnode-id="4319" instrument_node="">&nbsp;</span><span data-dcnode-id="4318" instrument_node="">cm; Musée d’Orsay, Paris. (b) A detail of the same painting transformed to grey-scale suggests that the poppies are close to be equiluminant to the background.</span></p></span></span></figure></div><p data-dcnode-id="4308"><span data-dcnode-id="4312" instrument_node="">In summary, it seems that conventions on the light source positions match well humans preferences for a placement above their head and slightly to the left. In contrast, the color of objects appear to follow conventions that emphasize the outlines of objects. While these conventions may be inspired from studies of color perception (</span><a class="workspace-trigger" data-dcnode-id="4310" href="#bib11" name="bbib11"><span data-dcnode-id="4311" instrument_node="">Chevreul, 1839</span></a><span data-dcnode-id="4309" instrument_node="">), they are not directly linked to specific prior constraints used by the visual system.</span></p></section><section data-dcnode-id="4225" id="aep-section-id22"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4303"><span data-dcnode-id="4306" instrument_node="">5</span><span data-dcnode-id="4305" instrument_node="">. </span><span data-dcnode-id="4304" instrument_node="">Three-dimensional layout</span></h2><p data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">Apart from composition and scaling effects, not knowing where the observer will stand in front of a painting can have dramatic effects on the interpretation of a depicted three-dimensional scene. Even if the painter has mastered the laws of linear perspective as they were derived at the beginning of the fifteenth century, all viewpoints except one should theoretically lead to geometrical deformations of the scene. The only viewpoint from where the painting is a faithful rendition of the scene is the center of projection, that is the location where the painter was standing if the scene was painted on a transparent canvas. Therefore, there is a fundamental ambiguity in the geometry of the depicted scene that depends on where the observer is standing.</span></p><p data-dcnode-id="4284"><span data-dcnode-id="4300" instrument_node="">The ambiguity on the geometry of the three-dimensional scene is an issue for museums but also for everyday perception as images seen from the wrong viewpoint abound in magazines, billboards or even movie theaters. Luckily, human observers rarely notice the deformations of the scene, a phenomenon known as La Gournerie’s paradox. The resolution of this paradox is still a matter of debate. Some people argue that observers are just not sensitive to these deformations because of the nature of their internal representation of the three-dimensional world, namely a representation that is insensitive to the type of stretches that occur when one is not placed at the center of projection (</span><a class="workspace-trigger" data-dcnode-id="4298" href="#bib13" name="bbib13"><span data-dcnode-id="4299" instrument_node="">Cutting, 1988</span></a><span data-dcnode-id="4297" instrument_node="">). Other people argue that the deformations are not perceived because the observer has been able to calibrate herself, and then interpret the scene from the correct center of projection (</span><a class="workspace-trigger" data-dcnode-id="4295" href="#bib23" name="bbib23"><span data-dcnode-id="4296" instrument_node="">Goldstein, 1987</span></a><span data-dcnode-id="4294" instrument_node="">). To this end, the observer could use two kinds of information. First, there is some information in the frame and the canvas texture that helps determine the orientation of the canvas relative to the observer (</span><a class="workspace-trigger" data-dcnode-id="4292" href="#bib70" name="bbib70"><span data-dcnode-id="4293" instrument_node="">Vishwanath, Girshick, &amp; Banks, 2005</span></a><span data-dcnode-id="4291" instrument_node="">). Second, there is some information in the depicted scene, such as the knowledge of the way the image of a cube is deformed when seen from different viewpoints (</span><a class="workspace-trigger" data-dcnode-id="4289" href="#bib34" name="bbib34"><span data-dcnode-id="4290" instrument_node="">Kubovy, 1986</span></a><span data-dcnode-id="4288" instrument_node="">). There is some evidence that human observers use such a rectangularity constraint, that is the belief that by default edges of objects are rectangular (</span><a class="workspace-trigger" data-dcnode-id="4286" href="#bib41" name="bbib41"><span data-dcnode-id="4287" instrument_node="">Mamassian, 1998</span></a><span data-dcnode-id="4285" instrument_node="">).</span></p><p data-dcnode-id="4276"><span data-dcnode-id="4283" instrument_node="">What are the conventions in visual arts to overcome the ambiguity of the three-dimensional layout associated to not knowing where the observer stands? One convention seems the prevalence of depicting geometrical objects that have a regular shape. The classical example of these objects are floor tiles that are overwhelmingly present in Renaissance paintings. The fact that tiles are almost always square, rather than an arbitrary aspect ratio, can help determine the proper center of projection for the painting. However, some objects resist the fore-shortening deformations they should undergo (</span><a class="workspace-trigger" data-dcnode-id="4281" href="#bib34" name="bbib34"><span data-dcnode-id="4282" instrument_node="">Kubovy, 1986</span></a><span data-dcnode-id="4280" instrument_node="">). For instance, in “The School of Athens” by Raphael (1510–1511) (see again </span><a class="workspace-trigger" data-dcnode-id="4278" href="#fig1" name="bfig1"><span data-dcnode-id="4279" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4277" instrument_node="">b), the two spheres at the bottom right that represent the globe of the earth and the sphere of the fixed stars should project as oblong discs because of their eccentricity relative to the vanishing point. That the spheres are represented as circles rather than ellipses probably reflects the over-generalization of the fact that when we foveate a sphere, its retinal image is always a circular disc.</span></p><div data-dcnode-id="4228"><p data-dcnode-id="4259"><span data-dcnode-id="4275" instrument_node="">Other ambiguities of the three-dimensional layout can be found in the geometry of reflection. Mirrors and other specular surfaces are difficult to perceive because of confounding factors between the material properties, the objects surrounding the surface and the illumination conditions. Everyday perception seems to use knowledge of the statistics of illumination rather than contextual objects to make sense of glossy surfaces (</span><a class="workspace-trigger"
