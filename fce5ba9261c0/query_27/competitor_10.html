</span><p data-dcnode-id="4696"></p><h2 data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">PHOTO ART FOR SALE WITH LUMAS</span></h2><span data-dcnode-id="4693" instrument_node="">
</span><p data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">The expertly curated LUMAS portfolio of fine art is wall-to-wall with stunning pieces of original art. Our curators scour the international art market to find the most compelling artwork by famous and emerging artists.</span></p><span data-dcnode-id="4690" instrument_node="">
</span><br data-dcnode-id="4689"><span data-dcnode-id="4688" instrument_node="">
</span><h2 data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">AFFORDABLE FINE ART</span></h2><span data-dcnode-id="4685" instrument_node="">
</span><p data-dcnode-id="4671"><span data-dcnode-id="4684" instrument_node="">LUMAS is the home of exciting, affordable, and collectible </span><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/fine-art/"><span data-dcnode-id="4683" instrument_node="">fine art</span></a><span data-dcnode-id="4681" instrument_node="">. The LUMAS concept is this: making fine art affordable through the production of limited editions. From contemplative </span><a data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/art-is-bw/"><span data-dcnode-id="4680" instrument_node="">black and white art</span></a><span data-dcnode-id="4678" instrument_node=""> to mood-lifting </span><a data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/colorful-pictures/"><span data-dcnode-id="4677" instrument_node="">colorful art</span></a><span data-dcnode-id="4675" instrument_node="">, there’s a whole world of contemporary art for sale on the LUMAS website and in any one of our many </span><a data-dcnode-id="4673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/galleries/"><span data-dcnode-id="4674" instrument_node="">galleries in major cities around the world</span></a><span data-dcnode-id="4672" instrument_node="">.</span></p><span data-dcnode-id="4670" instrument_node="">
</span><br data-dcnode-id="4669"><span data-dcnode-id="4668" instrument_node="">
</span><h2 data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">LIMITED EDITION, MUSEUM-QUALITY ART</span></h2><span data-dcnode-id="4665" instrument_node="">
</span><p data-dcnode-id="4657"><span data-dcnode-id="4664" instrument_node=""> Our collections consist in a wide array of </span><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/photographic-art/"><span data-dcnode-id="4663" instrument_node="">photographic art</span></a><span data-dcnode-id="4661" instrument_node=""> and </span><a data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/art-prints/"><span data-dcnode-id="4660" instrument_node="">art prints</span></a><span data-dcnode-id="4658" instrument_node="">. Our prints are created from original paintings, drawings, digital artwork, and photographs. Our artwork, whatever the medium, are then developed as photographic prints.</span></p><br data-dcnode-id="4656"><span data-dcnode-id="4655" instrument_node="">
</span><p data-dcnode-id="4650"><span data-dcnode-id="4654" instrument_node="">
Our line of photography includes landscape, portrait, abstract, and </span><a data-dcnode-id="4652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/fine-art/photography/"><span data-dcnode-id="4653" instrument_node="">fine art photography</span></a><span data-dcnode-id="4651" instrument_node="">. Our prints are distinguished by their subject matter. A LUMAS print might be a painting or a drawing, and it might have undergone digital editing by the artist as part of her or his artistic method.</span></p><p data-dcnode-id="4649"></p><span data-dcnode-id="4648" instrument_node="">
</span></div><span data-dcnode-id="4646" instrument_node="">

es, perfectly suited to enhance your home decor.</span><br data-dcnode-id="3706"><br data-dcnode-id="3705"></p></div></div><span data-dcnode-id="3701" instrument_node=""> </span><br data-dcnode-id="3700"><span data-dcnode-id="3699" instrument_node=""> </span><div class="row" data-dcnode-id="3653"><div class="col-lg-8" data-dcnode-id="3654"><ul class="interactive-submenu" data-dcnode-id="3655"><li data-dcnode-id="3696"><a data-dcnode-id="3697" href="#genre-in-art" title="genres"><span data-dcnode-id="3698" instrument_node="">Genre in Art</span></a></li><span data-dcnode-id="3695" instrument_node=""> </span><li data-dcnode-id="3692"><a data-dcnode-id="3693" href="#renaissance" title="renaissance"><span data-dcnode-id="3694" instrument_node="">Renaissance</span></a></li><span data-dcnode-id="3691" instrument_node=""> </span><li data-dcnode-id="3688"><a data-dcnode-id="3689" href="#rococo" title="rococo"><span data-dcnode-id="3690" instrument_node="">Rococo</span></a></li><span data-dcnode-id="3687" instrument_node=""> </span><li data-dcnode-id="3684"><a data-dcnode-id="3685" href="#romanticism" title="romanticism"><span data-dcnode-id="3686" instrument_node="">Romanticism </span></a></li><span data-dcnode-id="3683" instrument_node=""> </span><li data-dcnode-id="3680"><a data-dcnode-id="3681" href="#expressionism" title="expressionism"><span data-dcnode-id="3682" instrument_node="">Expressionism</span></a></li><span data-dcnode-id="3679" instrument_node=""> </span><li data-dcnode-id="3676"><a data-dcnode-id="3677" href="#impressionism" title="impressionism"><span data-dcnode-id="3678" instrument_node="">Impressionism</span></a></li><span data-dcnode-id="3675" instrument_node=""> </span><li data-dcnode-id="3672"><a data-dcnode-id="3673" href="#surrealism" title="surrealism"><span data-dcnode-id="3674" instrument_node="">Surrealism</span></a></li><span data-dcnode-id="3671" instrument_node=""> </span><li data-dcnode-id="3668"><a data-dcnode-id="3669" href="#abstract" title="abstract art"><span data-dcnode-id="3670" instrument_node="">Abstract art</span></a></li><span data-dcnode-id="3667" instrument_node=""> </span><li data-dcnode-id="3664"><a data-dcnode-id="3665" href="#bauhaus" title="bauhaus"><span data-dcnode-id="3666" instrument_node="">Bauhaus</span></a></li><span data-dcnode-id="3663" instrument_node=""> </span><li data-dcnode-id="3660"><a data-dcnode-id="3661" href="#pop-art" title="pop art"><span data-dcnode-id="3662" instrument_node="">Pop art</span></a></li><span data-dcnode-id="3659" instrument_node=""> </span><li data-dcnode-id="3656"><a data-dcnode-id="3657" href="#realist-art" title="realist art"><span data-dcnode-id="3658" instrument_node="">Realist Art</span></a></li></ul></div></div><span data-dcnode-id="3652" instrument_node=""> </span><br data-dcnode-id="3651"><span data-dcnode-id="3650" instrument_node=""> </span><div class="row" data-dcnode-id="3606"><div class="col-lg-8" data-dcnode-id="3607"><h3 data-dcnode-id="3648" id="genre-in-art"><span data-dcnode-id="3649" instrument_node="">Genre in Art</span></h3><span data-dcnode-id="3647" instrument_node=""> </span><br data-dcnode-id="3646"><span data-dcnode-id="3645" instrument_node=""> </span><p data-dcnode-id="3631"><span data-dcnode-id="3644" instrument_node="">The concept of genre in art is historically connected to specific ways of organizing and classifying art. A </span><b data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">hierarchy of genres</span></b><span data-dcnode-id="3641" instrument_node=""> was often present in different artistic contexts. Landscapes and still lifes, history painting, and animal portraits are often featured in these classifications. </span><b data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Genre painting</span></b><span data-dcnode-id="3638" instrument_node=""> was developed in the 17th century in the Netherlands, as part of a fuller hierarchy of genres. It referred to artistic treatments of everyday life, rather than portraits, landscapes, or idealized historical scenery.</span><br data-dcnode-id="3637"><br data-dcnode-id="3636"><span data-dcnode-id="3635" instrument_node="">

From the beginning of the 20th century, new artistic movements broke the hold of the traditional genres. The avant garde left behind both the stylistic requirements and the preferred subject matter of the genres in favor of more ecclectic working methods. Cubism played with existing frameworks, creating </span><a data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/mixed-media-art/"><span data-dcnode-id="3634" instrument_node="">mixed media art</span></a><span data-dcnode-id="3632" instrument_node=""> that left painting behind for collage, and interweaving the art forms and perspectives of different styles. Photography contributed a great deal to the general disruption of painting as the addressee of artistic genres. The photograph introduced new ways of seeing the world. Artistic movements and genres like socialist realism, documentarism, futurism, and hyperrealism would have been inconceivable without the camera.</span></p><span data-dcnode-id="3630" instrument_node=""> </span><br data-dcnode-id="3629"><br data-dcnode-id="3628"><span data-dcnode-id="3627" instrument_node=""> </span><h3 data-dcnode-id="3625" id="renaissance"><span data-dcnode-id="3626" instrument_node="">The Renaissance</span></h3><span data-dcnode-id="3624" instrument_node=""> </span><br data-dcnode-id="3623"><span data-dcnode-id="3622" instrument_node=""> </span><p data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">The Renaissance is known as the period during which painting for painting as a fine art began in earnest. In the hands of artists like Michaelangelo, Rubens, and Caravaggio, art was conceived as a way to showcase human achievement, in the subject matter of sculpture, painting, and prints - but also through art as itself an activitiy which gave explicit testimony to human potential.</span></p><span data-dcnode-id="3619" instrument_node=""> </span><br data-dcnode-id="3618"><span data-dcnode-id="3617" instrument_node=""> </span><p data-dcnode-id="3610"><a data-dcnode-id="3615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/artist/mark_seelen/"><span data-dcnode-id="3616" instrument_node="">Mark Seelen's</span></a><span data-dcnode-id="3614" instrument_node=""> </span><strong data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">Dutch Masters</span></strong><span data-dcnode-id="3611" instrument_node=""> series is in this tradition. His still lifes of flowers are reminiscent of oil paintings by Willem Kalf and Pieter Claesz, who were party to the great artistic movement in which art came into its own.</span></p><span data-dcnode-id="3609" instrument_node=""> </span><br data-dcnode-id="3608"></div></div><span data-dcnode-id="3605" instrument_node=""> </span><br data-dcnode-id="3604"><span data-dcnode-id="3603" instrument_node=""> </span><div class="col-lg-12" data-dcnode-id="3503"><div class="search-results grid-search-results-4" data-dcnode-id="3504" style="position: relative; height: 529px;"><article class="product-container upright product-card" data-dcnode-id="3570" data-sku="GZA06" style="position: absolute; left: 0px; top: 0px;"><span data-dcnode-id="3601" instrument_node=""> </span><span data-dcnode-id="3600" instrument_node=""> </span><a class="catalog-product-link" data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/pictures/gazi_sanzoy/blue_portrait/"><div class="catalog-product-image-container" data-dcnode-id="3598"><img alt=" renaissance art genre: Blue Portrait by Gazi Sansoy" class="catalog-product-image" data-dcnode-id="3599" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-lumas-avensogmbh1.netdna-ssl.com/showimg_gza05_mobile.jpg&amp;raw"></div><div class="name" data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">Blue Portrait</span></div><span data-dcnode-id="3595" instrument_node=""> </span><div hich patrons began to expect from commissioned artworks.</span></p><span data-dcnode-id="3492" instrument_node=""> </span><br data-dcnode-id="3491"><span data-dcnode-id="3490" instrument_node=""> </span><p data-dcnode-id="3474"><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/animal-portraits/"><span data-dcnode-id="3489" instrument_node="">Animal portraits</span></a><span data-dcnode-id="3487" instrument_node=""> by </span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/artist/andreas_amrhein/"><span data-dcnode-id="3486" instrument_node="">Andreas Amrhein</span></a><span data-dcnode-id="3484" instrument_node=""> are redolent of garish and luxuriant Rococo artworks featuring animals. A similar effect is achieved in the works of </span><a data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/artist/catherine_ledner/"><span data-dcnode-id="3483" instrument_node="">Catherine Ledner</span></a><span data-dcnode-id="3481" instrument_node="">, who creates incomparably fun small-format artworks. On the level of color and style, in-demand prints of paintings by </span><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/artist/ysabel_lemay-3/"><span data-dcnode-id="3480" instrument_node="">Ysabel Lemay</span></a><span data-dcnode-id="3478" instrument_node=""> are every bit as opulent, and dense - as </span><em data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">busy</span></em><span data-dcnode-id="3475" instrument_node=""> - as those by the rococo masters.</span></p></div></div><span data-dcnode-id="3471" instrument_node=""> </span><br data-dcnode-id="3470"><span data-dcnode-id="3469" instrument_node=""> </span><div class="col-lg-12" data-dcnode-id="3373"><div class="search-results grid-search-results-4" dat storied attempt to escape from the Western artistic canon. Ironically, </span><em data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">modernism</span></em><span data-dcnode-id="3117" instrument_node="">, as a coherent visual lexicon of the canon's discontents, has become a canon unto itself. In retrospect, then, </span><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/expressionism/"><span data-dcnode-id="3116" instrument_node="">Expressionism</span></a><span data-dcnode-id="3114" instrument_node=""> may also be seen as a starting point of modern fine art, as an attempt to finally liberate art from standards seen as exterior to itself, and to refound aesthetic value on new principles, unconstrained by the conventions of the academy and the realism of high culture at the Fin de siècle.</span></p></div></div><span data-dcnode-id="3110" instrument_node=""> </span><br data-dcnode-id="3109"><span data-dcnode-id="3108" instrument_node=""> </span><div class="col-lg-12" data-dcnode-id="3008"><div class="search-results grid-search-results-4" data-dcnode-id="3009" style="position: relative; height: 476.625px;"><article class="product-container square product-card" data-dcnode-id="3075" data-sku="SYB08" style="position: absolute; left: 0px; top: 0px;"><span data-dcnode-id="3106" instrument_node=""> </span><span data-dcnode-id="3105" instrument_node=""> </span><a class="catalog-product-link" data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/pictures/sun_young_byun/lost_identity_of_value_iii/"><div class="catalog-product-image-container" data-dcnode-id="3103"><img alt=" expressionist art genre: lost identity of value III by Sun Young Byun" class="catalog-product-image" data-dcnode-id="3104" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-lumas-avensogmbh1.netdna-ssl.com/showimg_syb04_mobile.jpg&amp;raw"></d chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/surrealism/"><span data-dcnode-id="2997" instrument_node="">Surrealism</span></a><span data-dcnode-id="2995" instrument_node="">. While other modernist currents have imparted the feel for anti-representationalism or a cool distance as fundamental virtues of fine art, surrealism has bridged a gap between fine art and popular culture. Mostly unnoticed, by creating realistic depictions in unrealistic arrangements or situations, surrealism opened the door for fine art to take on relevancy as an instrument of consumer aesthetics. But this was bidirectional: it also secured a place for fine art as a practice which participates in popular visual culture.

r art beyond the mere representation of given reality.</span></p><span data-dcnode-id="2874" instrument_node=""> </span><br data-dcnode-id="2873"><span data-dcnode-id="2872" instrument_node=""> </span><p data-dcnode-id="2858"><span data-dcnode-id="2871" instrument_node="">The spare, geometrical aesthetics and blocks of color by artists like </span><a data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/artist/sarah_morris/"><span data-dcnode-id="2870" instrument_node="">Sarah Morris</span></a><span data-dcnode-id="2868" instrument_node=""> and </span><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/artist/bernd_uhde/"><span data-dcnode-id="2867" instrument_node="">Bernd Uhde</span></a><span data-dcnode-id="2865" instrument_node=""> are reminiscent of works by pioneers of abstract art like Wasily Kandinsky or Kazimir Malevitch. The original artwork by </span><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/artist/beatrice_hug/"><span data-dcnode-id="2864" instrument_node="">Beatrice Hug</span></a><span data-dcnode-id="2862" instrument_node=""> or the sculptor </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lumas.com/artist/zaha_hadid/"><span data-dcnode-id="2861" instrument_node="">Zaha Hadid</span></a><span data-dcnode-id="2859" instrument_node=""> emerge from the same will to abstraction seen in the famous abstract paintings of Jasper Johns or Lee Krasner.</span></p><span data-dcnode-id="2857" instrument_node=""> </span><br data-dcnode-id="2856"><span data-dcnode-id="2855" instrument_node=""> </span><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Explore our curators' selection of original abstract artwork, carried out through the media of photography, sculpture, painting, prints, and digita </span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="86" tabindex="0"><span data-dcnode-id="266" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="265"></div><span data-dcnode-id="264" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="88" role="dialog"><span data-dcnode-id="263" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="259" role="button" tabindex="0"><span data-dcnode-id="262" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="261"></i><span data-dcnode-id="260" instrument_node=""> </span></span><span data-dcnode-id="258" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="90"><span data-dcnode-id="257" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="92"><strong class="acsb-title-main" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Compliance status</span></strong><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="237" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="231" instrument_node="">
</span><ol data-dcnode-id="205"><span data-dcnode-id="230" instrument_node="">
</span><li data-dcnode-id="218"><strong class="acsb-title" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="227" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="226"><br data-dcnode-id="225"><span data-dcnode-id="224" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="223"><br data-dcnode-id="222"><span data-dcnode-id="221" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="220"><br data-dcnode-id="219"></li><span data-dcnode-id="217" instrument_node="">
</span><li data-dcnode-id="207"><strong class="acsb-title" data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="214" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="213"><br data-dcnode-id="212"><span data-dcnode-id="211" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="210"><br data-dcnode-id="209"><span data-dcnode-id="208" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="206" instrument_node="">
</span></ol><span data-dcnode-id="204" instrument_node="">
</span><strong data-dcnode-id="201" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="202" lang="EN-US"><span data-dcnode-id="203" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="200" instrument_node="">
</span><ul data-dcnode-id="168"><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="195"><strong class="acsb-title" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="196" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="194" instrument_node="">
</span><li data-dcnode-id="190"><strong class="acsb-title" data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="191" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="189" instrument_node="">
</span><li data-dcnode-id="185"><strong class="acsb-title" data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="186" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="184" instrument_node="">
</span><li data-dcnode-id="180"><strong class="acsb-title" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="181" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="179" instrument_node="">
</span><li data-dcnode-id="175"><strong class="acsb-title" data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="176" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="174" instrument_node="">
</span><li data-dcnode-id="170"><strong class="acsb-title" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="171" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="169" instrument_node="">
</span></ul><span data-dcnode-id="167" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="164"><span data-dcnode-id="165" lang="EN-US"><span data-dcnode-id="166" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="163" instrument_node="">
</span><ol data-dcnode-id="105"><span data-dcnode-id="162" instrument_node="">
</span><li data-dcnode-id="155"><strong class="acsb-title" data-dcnode-id="158"><span data-dcnode-id="160" lang="EN-US"><span data-dcnode-id="161" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="159" instrument_node="">–</span></strong><span data-dcnode-id="156" lang="EN-US"><span data-dcnode-id="157" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="154" instrument_node="">
</span><li data-dcnode-id="147"><span data-dcnode-id="150" lang="EN-US"><strong class="acsb-title" data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="151" instrument_node="">&nbsp;</span></span><span data-dcnode-id="148" lang="EN-US"><span data-dcnode-id="149" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="146" instrument_node="">
</span><li data-dcnode-id="140"><span data-dcnode-id="142" lang="EN-US"><strong class="acsb-title" data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">Animations –</span></strong><span data-dcnode-id="143" instrument_node="">&nbsp;</span></span><span data-dcnode-id="141" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="139" instrument_node="">
</span><li data-dcnode-id="132"><span data-dcnode-id="135" lang="EN-US"><strong class="acsb-title" data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="136" instrument_node="">&nbsp;</span></span><span data-dcnode-id="133" lang="EN-US"><span data-dcnode-id="134" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="131" instrument_node="">
</span><li data-dcnode-id="124"><span data-dcnode-id="127" lang="EN-US"><strong class="acsb-title" data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="128" instrument_node="">&nbsp;</span></span><span data-dcnode-id="125" lang="EN-US"><span data-dcnode-id="126" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="123" instrument_node="">
</span><li data-dcnode-id="116"><span data-dcnode-id="119" lang="EN-US"><strong class="acsb-title" data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="120" instrument_node="">&nbsp;</span></span><span data-dcnode-id="117" lang="EN-US"><span data-dcnode-id="118" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="115" instrument_node="">
</span><li data-dcnode-id="107"><strong class="acsb-title" data-dcnode-id="112"><span data-dcnode-id="113" lang="EN-US"><span data-dcnode-id="114" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="108" lang="EN-US"><strong class="acsb-title" data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">–</span></strong><span data-dcnode-id="109" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="106" instrument_node="">
</span></ol><span data-dcnode-id="104" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="101" instrument_node="">
</span><p data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="98" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="95" instrument_node="">
</span><p data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="91" instrument_node=""> </span></div><span data-dcnode-id="89" instrument_node=""> </span></div><span data-dcnode-id="87" instrument_node="">
