slate(-6728.67 -507.72)"></path><polygon data-dcnode-id="1094" fill="black" points="38 37 36 37 36 8 7 8 7 6 38 6 38 37"></polygon><polygon data-dcnode-id="1093" fill="black" points="44 31 42 31 42 2 13 2 13 0 44 0 44 31"></polygon></svg></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1081"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1082"><div data-dcnode-id="1083"><div class="paragraph" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Craft techniques are some of the oldest media in human history, but this decade has proved there is still boundless inspiration to be found in them.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1076"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1077"><div data-dcnode-id="1078"><h1 data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Street art went mainstream.</span></h1></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 hlWcud" data-dcnode-id="1043"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1044" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="1052"><div class="article-image" data-dcnode-id="1053"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1062"><img alt="Companion, an inflatable sculpture by artist Brian Donnelly, known professionally as KAWS, is towed through Victoria Harbour before the opening ceremony for its exhibition in Hong Kong on March 22, 2019. Photo by Isaac Lawrence/AFP via Getty Images." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1075" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FgWq4RWe7VWRKlaA21JO7Iw%25252FGettyImages-1131939912.jpg%26width%3D2000%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1063"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1064"><svg class="expand" data-dcnode-id="1065" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1066" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1067"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1074" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1068" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1069"><g data-dcnode-id="1070" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1073" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1072" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1071" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1054"><div class="Caption__Figcaption-sc-1c6ztax-1 eamtYu" data-dcnode-id="1055"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1056" font-family="sans"><div data-dcnode-id="1057"><p data-dcnode-id="1058"><i data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Companion</span></i><span data-dcnode-id="1059" instrument_node="">, an inflatable sculpture by artist Brian Donnelly, known professionally as KAWS, is towed through Victoria Harbour before the opening ceremony for its exhibition in Hong Kong on March 22, 2019. Photo by Isaac Lawrence/AFP via Getty Images.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1045" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1046" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1047" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1050" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1051" style="position: absolute; left: 0px; top: 0px; width: 1035px; height: 115px;"></div></div><div data-dcnode-id="1048" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1049" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1006"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1007"><div data-dcnode-id="1008"><div class="paragraph" data-dcnode-id="1018"><span data-dcnode-id="1042" instrument_node="">In the 2010s, we watched </span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/collection/street-art"><span data-dcnode-id="1041" instrument_node="">street art</span></a><span data-dcnode-id="1039" instrument_node=""> become the new </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1035" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/gene/pop-art" target="_blank"><span data-dcnode-id="1038" instrument_node="">Pop art</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1036"></div></div><span data-dcnode-id="1034" instrument_node="">. Artists working with super-slick, commercial finesse and mass appeal have emerged and created a schism in the genre, dividing those who have adopted street art as an aesthetic and those who are actually still creating work on the streets. Exhibitions on </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1030" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/keith-haring" target="_blank"><span data-dcnode-id="1033" instrument_node="">Keith Haring</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1031"></div></div><span data-dcnode-id="1029" instrument_node=""> and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1025" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/jean-michel-basquiat" target="_blank"><span data-dcnode-id="1028" instrument_node="">Jean-Michel Basquiat</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1026"></div></div><span data-dcnode-id="1024" instrument_node="">—arguably the first artists to bring street art into the gallery world—have traced the evolution of the influential art form. </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1020" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/gene/graffiti-and-street-art" target="_blank"><span data-dcnode-id="1023" instrument_node="">Street artists</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1021"></div></div><span data-dcnode-id="1019" instrument_node=""> continue to challenge perceptions of art and toe the line between high culture and popular culture.</span></div><div class="paragraph" data-dcnode-id="1009"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1014" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/banksy" target="_blank"><span data-dcnode-id="1017" instrument_node="">Banksy</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1015"></div></div><span data-dcnode-id="1013" instrument_node=""> is by far the most prominent street artist who broke into the mainstream. The politically motivated Bristolian artist became a phenomenon this decade, between his 2010 documentary </span><em data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Exit Through the Gift Shop</span></em><span data-dcnode-id="1010" instrument_node="">; his dystopian theme park Dismaland, which opened in 2015; and more recently, his auction house stunt in which a £1 million artwork shredded itself upon being sold.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="972"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="973" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="981"><div class="article-image" data-dcnode-id="982"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="992"><img alt="Banksy, Love Is in the Bin, 2018. Photo by Ben Stansall/AFP via Getty Images." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1005" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FH0XEQL8_QIypNd77nTNEcQ%25252Fdownload%252B%25252810%252529.jpeg%26width%3D1200%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="993"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="994"><svg class="expand" data-dcnode-id="995" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="996" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="997"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1004" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="998" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="999"><g data-dcnode-id="1000" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1003" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1002" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1001" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="983"><div class="Caption__Figcaption-sc-1c6ztax-1 lnWoYD" data-dcnode-id="984"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="985" font-family="sans"><div data-dcnode-id="986"><p data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">Banksy, </span><i data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Love Is in the Bin</span></i><span data-dcnode-id="988" instrument_node="">, 2018. Photo by Ben Stansall/AFP via Getty Images.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="974" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="975" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="976" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="979" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="980" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 73px;"></div></div><div data-dcnode-id="977" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="978" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="939"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="940"><div data-dcnode-id="941"><div class="paragraph" data-dcnode-id="947"><span data-dcnode-id="971" instrument_node="">Meanwhile, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="967" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/kaws" target="_blank"><span data-dcnode-id="970" instrument_node="">KAWS</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="968"></div></div><span data-dcnode-id="966" instrument_node=""> has taken his monumental versions of his “Companion” toy character to sculpture parks, harbors, and galleries around the world, and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="962" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/shepard-fairey" target="_blank"><span data-dcnode-id="965" instrument_node="">Shepard Fairey</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="963"></div></div><span data-dcnode-id="961" instrument_node=""> created posters for the women’s marches. </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="957" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/jr" target="_blank"><span data-dcnode-id="960" instrument_node="">JR</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="958"></div></div><span data-dcnode-id="956" instrument_node=""> made splashy, monumental wheatpastings across the globe—even covering the </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/louvre"><span data-dcnode-id="955" instrument_node="">Louvre</span></a><span data-dcnode-id="953" instrument_node="">’s iconic pyramid—as well as an Oscar-nominated film with the late </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="949" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/agnes-varda" target="_blank"><span data-dcnode-id="952" instrument_node="">Agnès Varda</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="950"></div></div><span data-dcnode-id="948" instrument_node="">.</span></div><div class="paragraph" data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">Despite this, street art still hasn’t evolved very far in terms of critical appraisal. </span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/moca"><span data-dcnode-id="945" instrument_node="">MOCA</span></a><span data-dcnode-id="943" instrument_node="">’s 2011 “Art in the Streets” exhibition, curated by Jeffrey Deitch, Roger Gastman, and Aaron Rose, set a precedent for understanding street art and the role it plays in culture. But few shows have continued that investigation.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 fKwfmr" data-dcnode-id="921"><div class="ImageSetPreview__ImageSetContainer-sc-1pp4y1-0 dQlGLA" data-dcnode-id="922"><div class="ImageSetPreview__FullLabel-sc-1pp4y1-1 iHOAJm" data-dcnode-id="925"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__LabelWrapper-v8vmy8-1 fvWDrH jPEYdK" data-dcnode-id="926" display="flex"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 cXtxjD" data-dcnode-id="933" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 dOyEAB Typography-sc-1pie2ao-1 ImageSetLabel__SlideshowTitle-v8vmy8-2 eZLjmP bmuzQQ" data-dcnode-id="937" font-family="[object Object]" font-size="16px,18px"><span data-dcnode-id="938" instrument_node="">5 Images</span></div><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__SlideshowCta-v8vmy8-3 LbPWX" data-dcnode-id="934" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 fCbMdz Typography-sc-1pie2ao-1 eZLjmP" data-dcnode-id="935" font-family="[object Object]" font-size="12px,14px"><span data-dcnode-id="936" instrument_node="">View Slideshow</span></div></div></div><div class="fresnel-container fresnel-greaterThanOrEqual-sm" data-dcnode-id="927"><div class="ImageSetLabel__IconContainer-v8vmy8-0 fxJFai" data-dcnode-id="928"><svg class="image-set" data-dcnode-id="929" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><path d="M6760.67,551.72h-32v-32h32v32Zm-30-2h28v-28h-28v28Z" data-dcnode-id="932" fill="black" transform="translate(-6728.67 -507.72)"></path><polygon data-dcnode-id="931" fill="black" points="38 37 36 37 36 8 7 8 7 6 38 6 38 37"></polygon><polygon data-dcnode-id="930" fill="black" points="44 31 42 31 42 2 13 2 13 0 44 0 44 31"></polygon></svg></div></div></div></div><div class="ImageSetPreview__ImgContainer-sc-1pp4y1-3 fSnQyB" data-dcnode-id="923"><img alt="Open Slideshow" class="ImageSetPreview__Img-sc-1pp4y1-2 epuKML" data-dcnode-id="924" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FZDSVegERZi8DamIBySq67w%25252FArt%252Bin%252Bthe%252BStreets%252B176.jpg%26width%3D800%26quality%3D80&amp;raw"></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="911"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="912"><div data-dcnode-id="913"><div class="paragraph" data-dcnode-id="916"><span data-dcnode-id="920" instrument_node="">Gastman did, however, go on to curate “</span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/show/gastman-1-beyond-the-streets-nyc"><span data-dcnode-id="919" instrument_node="">Beyond the Streets</span></a><span data-dcnode-id="917" instrument_node="">,” a group exhibition in Los Angeles and New York. “Many great artists that honed their skills on the streets by doing graffiti and street art have put a lot of focus on their studio work the last 10-plus years,” Gastman said. “They have been able to expand on their ideas and style with the same raw energy as on the streets.”</span></div><div class="paragraph" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Gastman considers the developments of the past decade as being positive for street art. “Collectors, museums, and the media can’t help but pay attention. But even more importantly, as these artists have grown, so has the scene around them,” he said. “We all grew up, have jobs, and we want to collect what we know and love—and that is not necessarily the art-world norm.”</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="906"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="907"><div data-dcnode-id="908"><h1 data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Zombie Formalism had a moment.</span></h1></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="858"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="859" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="867"><div class="Artwork__ArtworkContainer-sc-1v84ce1-1 dZuYiK" data-dcnode-id="868"><a class="Artwork__ArtworkImageLink-sc-1v84ce1-0 jfiSzX" data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/dan-colen-lets-have-a-war"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="892"><img alt="Let's have a war" class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="905" height="aut ">Dan Colen</span></a></span></strong><div data-dcnode-id="871"><div class="LinesEllipsis" data-dcnode-id="877"><div data-dcnode-id="878"><span data-dcnode-id="879"><span class="title" data-dcnode-id="884"><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/dan-colen-lets-have-a-war"><span data-dcnode-id="886" instrument_node="">Let's have a war</span></a></span><span data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">, </span></span><span class="date" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">2016</span></span></span></div></div><div class="LinesEllipsis" data-dcnode-id="872"><div data-dcnode-id="873"><span data-dcnode-id="874"><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/gagosian-gallery"><span data-dcnode-id="876" instrument_node="">Gagosian</span></a></span></div></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="860" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="861" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="862" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="865" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="866" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 107px;"></div></div><div data-dcnode-id="863" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="864" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="810"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="811"><div data-dcnode-id="812"><div class="paragraph" data-dcnode-id="813"><span data-dcnode-id="857" instrument_node="">In a widely read </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vulture.com/2014/06/why-new-abstract-paintings-look-the-same.html"><span data-dcnode-id="856" instrument_node="">article</span></a><span data-dcnode-id="854" instrument_node=""> published in </span><em data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">New York</span></em><span data-dcnode-id="851" instrument_node=""> magazine in 2014 titled “Zombies on the Walls: Why Does So Much Abstraction Look the Same?” the critic Jerry Saltz brought the art world’s attention to the sticky notion of </span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/collection/zombie-formalism"><span data-dcnode-id="850" instrument_node="">Zombie Formalism</span></a><span data-dcnode-id="848" instrument_node="">. The term, originally </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artspace.com/magazine/contributors/see_here/the_rise_of_zombie_formalism-52184"><span data-dcnode-id="847" instrument_node="">coined</span></a><span data-dcnode-id="845" instrument_node=""> by the artist and writer </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="841" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/walter-robinson" target="_blank"><span data-dcnode-id="844" instrument_node="">Walter Robinson</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="842"></div></div><span data-dcnode-id="840" instrument_node="">, applied to a movement that had emerged in the early 2010s. Zombie Formalism was associated with a certain abstract painterly style replicated among young artists to feed hungry collectors who purchased and flipped. In essence, Zombie Formalism was painters painting paintings—or, as Chris Wiley </span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.artnet.com/opinion/history-zombie-formalism-1318352"><span data-dcnode-id="839" instrument_node="">wrote</span></a><span data-dcnode-id="837" instrument_node=""> for </span><em data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">artnet News</span></em><span data-dcnode-id="834" instrument_node="">, “a new kind of court painting.” Slammed by critics and snapped up by collectors, works by a swathe of male artists such as </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="830" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/lucien-smith" target="_blank"><span data-dcnode-id="833" instrument_node="">Lucien Smith</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="831"></div></div><span data-dcnode-id="829" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="825" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/dan-colen" target="_blank"><span data-dcnode-id="828" instrument_node="">Dan Colen</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="826"></div></div><span data-dcnode-id="824" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="820" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/parker-ito" target="_blank"><span data-dcnode-id="823" instrument_node="">Parker Ito</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="821"></div></div><span data-dcnode-id="819" instrument_node="">, and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="815" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/hugh-scott-douglas" target="_blank"><span data-dcnode-id="818" instrument_node="">Hugh Scott-Douglas</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="816"></div></div><span data-dcnode-id="814" instrument_node=""> were some of the most sought-after.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="791"><div class="ImageSetPreview__ImageSetContainer-sc-1pp4y1-0 dQlGLA" data-dcnode-id="792"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetPreview__MiniWrapper-sc-1pp4y1-4 gzsrpX cMsOaQ" data-dcnode-id="793" display="flex"><img alt="Zombie Formalism" class="ImageSetPreview__Img-sc-1pp4y1-2 epuKML" data-dcnode-id="809" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fd32dm0rphc51dk.cloudfront.net%252FalH3YKYIMWgcdnPwZCYRJQ%252Flarger.jpg%26width%3D200%26quality%3D80&amp;raw"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__LabelWrapper-v8vmy8-1 fvWDrH jPEYdK" data-dcnode-id="794" display="flex"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 cXtxjD" data-dcnode-id="801" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 dOyEAB Typography-sc-1pie2ao-1 ImageSetLabel__SlideshowTitle-v8vmy8-2 eZLjmP bmuzQQ" data-dcnode-id="807" font-family="[object Object]" font-size="16px,18px"><span data-dcnode-id="808" instrument_node="">Zombie Formalism</span></div><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__SlideshowCta-v8vmy8-3 LbPWX" data-dcnode-id="802" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 fCbMdz Typography-sc-1pie2ao-1 eZLjmP" data-dcnode-id="805" font-family="[object Object]" font-size="12px,14px"><span data-dcnode-id="806" instrument_node="">View Slideshow</span></div><div class="Typography__BaseText-sc-1pie2ao-0 jrHuWE Typography-sc-1pie2ao-1 eZLjmP" data-dcnode-id="803" font-family="Unica77LLWebRegular, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12px,14px"><span data-dcnode-id="804" instrument_node="">4 Images</span></div></div></div><div class="fresnel-container fresnel-greaterThanOrEqual-sm" data-dcnode-id="795"><div class="ImageSetLabel__IconContainer-v8vmy8-0 fxJFai" data-dcnode-id="796"><svg class="image-set" data-dcnode-id="797" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><path d="M6760.67,551.72h-32v-32h32v32Zm-30-2h28v-28h-28v28Z" data-dcnode-id="800" fill="black" transform="translate(-6728.67 -507.72)"></path><polygon data-dcnode-id="799" fill="black" points="38 37 36 37 36 8 7 8 7 6 38 6 38 37"></polygon><polygon data-dcnode-id="798" fill="black" points="44 31 42 31 42 2 13 2 13 0 44 0 44 31"></polygon></svg></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="770"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="771"><div data-dcnode-id="772"><div class="paragraph" data-dcnode-id="781"><span data-dcnode-id="790" instrument_node="">“It was like the children of celebrities; they looked like stars so they must be like stars too maybe. A self-replicating system,” Saltz reflected. Zombie Formalism exploded on the art market, becoming one of the most pricey and profitable genres—“then after it amped the prices into six and seven figures, the market cashed-in, moved on, and those left still holding on to the paintings are the marks,” Saltz added. “Happily, a few of the talented artists associated—rightly or wrongly—with that Instagram-ready flash in the style-pan, are still making good work.” Saltz cites the “very talented” </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="786" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/oscar-murillo-b-1986" target="_blank"><span data-dcnode-id="789" instrument_node="">Oscar Murillo</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="787"></div></div><span data-dcnode-id="785" instrument_node="">, “the poster child for the non-movement” as one of those few. Murillo was recently one of the winners of the </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/news/artsy-editorial-unprecedented-decision-four-2019-turner-prize-finalists-won-award"><span data-dcnode-id="784" instrument_node="">2019 Turner Prize</span></a><span data-dcnode-id="782" instrument_node="">.</span></div><div class="paragraph" data-dcnode-id="773"><em data-dcnode-id="777"><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/collection/movements-of-the-decade"><span data-dcnode-id="780" instrument_node="">Browse works</span></a><span data-dcnode-id="778" instrument_node=""> by artists who shaped the movements of the decade</span></em><span data-dcnode-id="776" instrument_node="">.</span><span class="content-end" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node=""> </span></span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="763"><div class="Authors__AuthorsContainer-j7iv2v-0 bNExUA" data-dcnode-id="764"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 Author__AuthorContainer-sc-1wsx80e-1 evmaaH bBwkVo" color="black" data-dcnode-id="765" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 frxqSM Typography-sc-1pie2ao-1 eZLjmP" data-dcnode-id="766" font-family="[object Object]" font-size="16px"><span class="Author__AuthorInfo-sc-1wsx80e-2 hJmNsA" data-dcnode-id="767"><div data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Charlotte Jansen</span></div></span></div></div></div></div></div></div><div class="CanvasFooter__CanvasFooterContainer-sc-1tuekop-0 kifgga" data-dcnode-id="705"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 foorq" data-dcnode-id="706" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 byqOIr Typography-sc-1pie2ao-1 RelatedArticlesCanvas__Title-sc-1ho76zd-0 eZLjmP hFndhR" data-dcnode-id="757" font-family="Unica77LLWebRegular, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22px,28px"><span data-dcnode-id="760" instrument_node="">Further reading in </span><span class="RelatedArticlesCanvas__VerticalSpan-sc-1ho76zd-1 fiatSy" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Art</span></span></div><span data-dcnode-id="756" style="font-size:0"></span><div class="RelatedArticlesCanvas__ArticlesWrapper-sc-1ho76zd-2 fzbjVN" data-dcnode-id="707"><a class="RelatedArticleCanvasLink__ArticleFigure-sc-1fsqji6-1 fGDVdg" data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/article/artsy-editorial-10-artists-2010s"><div class="Rel
