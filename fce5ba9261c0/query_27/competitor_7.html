03 L16.0866701,12.7589443 C16.0866701,13.1426261 15.7752762,13.45402 15.3915944,13.45402 L0.795005656,13.45402 C0.411323894,13.45402 0.09993,13.1426261 0.09993,12.7589443 L0.09993,3.68820703 L7.66582852,9.58939935 C7.79163721,9.68740502 7.94246863,9.73606031 8.09330005,9.73606031 C8.24413147,9.73606031 8.39496288,9.68740502 8.52077158,9.58939935 L16.0866701,3.68820703 Z" data-dcnode-id="2370" fill="white"></path></g></svg></a></div></div></div></div></div></div><div class="FeatureLayout__FeatureLayoutContent-sc-1fvxxr9-0 jIlohX" data-dcnode-id="761"><div class="Sections__StyledSections-sc-14gz2oe-0 hxdmwd" data-dcnode-id="762"><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="2353"><div class="StyledText-sc-1ysl1h-0 hwONSP article__text-section" color="black" data-dcnode-id="2354"><div data-dcnode-id="2355"><div class="paragraph" data-dcnode-id="2356"><span data-dcnode-id="2360" instrument_node="">Protests, the introduction of Instagram, and social revolution have shaped the art of the past decade. During this period, as art-market trends rose and fell, there were seismic shifts in our perceptions of contemporary art and art history. The 2010s have seen some historic art moments, some of which sparked </span><a data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/collection/movements-of-the-decade"><span data-dcnode-id="2359" instrument_node="">full-blown movements</span></a><span data-dcnode-id="2357" instrument_node="">. Here, we share seven such instances, ranging from momentary fads to lasting developments that will shape the art world for years to come.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="2348"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="2349"><div data-dcnode-id="2350"><h1 data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">An art history overhaul began.</span></h1></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="2308"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="2315" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="2323"><div class="article-image" data-dcnode-id="2324"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="2334"><img alt="Street view of Guerrilla Girls, Is It Even Worse In Europe?, Whitechapel Gallery, 2016. © Guerrilla Girls. Photo by David Parry/PA Wire. Courtesy of the Guerrilla Girls. " class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="2347" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252Fzuzzf3vnbHyTsKv5E9kwkw%25252F2016_GuerrillaGirls_WhitechapelInstall_StreetView.jpg%26width%3D1200%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="2335"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="2336"><svg class="expand" data-dcnode-id="2337" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="2338" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="2339"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="2346" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="2340" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="2341"><g data-dcnode-id="2342" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="2345" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="2344" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="2343" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="2325"><div class="Caption__Figcaption-sc-1c6ztax-1 lnWoYD" data-dcnode-id="2326"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="2327" font-family="sans"><div data-dcnode-id="2328"><p data-dcnode-id="2329"><span data-dcnode-id="2333" instrument_node="">Street view of Guerrilla Girls, </span><i data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Is It Even Worse In Europe?</span></i><span data-dcnode-id="2330" instrument_node="">, Whitechapel Gallery, 2016. © Guerrilla Girls. Photo by David Parry/PA Wire. Courtesy of the Guerrilla Girls. </span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="2316" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="2317" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="2318" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="2321" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="2322" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 115px;"></div></div><div data-dcnode-id="2319" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="2320" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div><div class="Box-sc-15se88d-0 Sections__AdWrapper-sc-14gz2oe-1 iKOYuB khjXPl" data-dcnode-id="2309"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 DisplayAd__DisplayAdContainer-sc-10le8e3-0 fAMSRt eZzRsf" data-dcnode-id="2310" display="flex" height="1px"><div class="Box-sc-15se88d-0 eUOAxr" data-dcnode-id="2311"><div data-dcnode-id="2314" style="width:970px;height:250px"></div><div class="Typography__BaseText-sc-1pie2ao-0 eJiank Typography-sc-1pie2ao-1 eZLjmP" color="black30" data-dcnode-id="2312" font-family="Unica77LLWebRegular, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10px"><span data-dcnode-id="2313" instrument_node="">Advertisement</span></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="2256"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="2257"><div data-dcnode-id="2258"><div class="paragraph" data-dcnode-id="2295"><span data-dcnode-id="2307" instrument_node="">In 2016, artist-activist collective the </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2303" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/guerrilla-girls" target="_blank"><span data-dcnode-id="2306" instrument_node="">Guerrilla Girls</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2304"></div></div><span data-dcnode-id="2302" instrument_node=""> revealed new statistics on representation at European museums. The </span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/article/artsy-editorial-the-guerrilla-girls-have-proof-that-the-art-world-needs-more-women-leaders"><span data-dcnode-id="2301" instrument_node="">project</span></a><span data-dcnode-id="2299" instrument_node="">, commissioned by the </span><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/whitechapel-gallery"><span data-dcnode-id="2298" instrument_node="">Whitechapel Gallery</span></a><span data-dcnode-id="2296" instrument_node="">, found an unsurprising yet overwhelming bias towards Western male artists. And while inequality endures, that doesn’t mean that artists and curators haven’t been raising their voices about it. In the last decade, urgent questions have been put to institutions, such as who gets to be a part of art history? And why?</span></div><div class="paragraph" data-dcnode-id="2259"><span data-dcnode-id="2294" instrument_node="">“Art historians and curators have increasingly recognized artists who have been underrepresented in art texts and in exhibitions,” said Gwen Chanzit, the curator of the </span><a data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/denver-art-museum"><span data-dcnode-id="2293" instrument_node="">Denver Art Museum</span></a><span data-dcnode-id="2291" instrument_node="">’s groundbreaking “</span><a data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/show/denver-art-museum-women-of-abstract-expressionism"><span data-dcnode-id="2290" instrument_node="">Women of Abstract Expressionism</span></a><span data-dcnode-id="2288" instrument_node="">” exhibition in 2016. The show realigned the </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2284" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/gene/abstract-expressionism" target="_blank"><span data-dcnode-id="2287" instrument_node="">movement</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2285"></div></div><span data-dcnode-id="2283" instrument_node=""> with its </span><a data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/article/artsy-editorial-11-female-abstract-expressionists-who-are-not-helen-frankenthaler"><span data-dcnode-id="2282" instrument_node="">female masters</span></a><span data-dcnode-id="2280" instrument_node="">—painters like </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2276" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/jay-defeo" target="_blank"><span data-dcnode-id="2279" instrument_node="">Jay DeFeo</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2277"></div></div><span data-dcnode-id="2275" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2271" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/grace-hartigan" target="_blank"><span data-dcnode-id="2274" instrument_node="">Grace Hartigan</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2272"></div></div><span data-dcnode-id="2270" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2266" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/lee-krasner" target="_blank"><span data-dcnode-id="2269" instrument_node="">Lee Krasner</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2267"></div></div><span data-dcnode-id="2265" instrument_node="">, and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2261" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/joan-mitchell" target="_blank"><span data-dcnode-id="2264" instrument_node="">Joan Mitchell</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2262"></div></div><span data-dcnode-id="2260" instrument_node="">—who have long been in the shadow of famous male artists, despite contributing with equal voracity to mid-20th-century painting. Many of these artists also had recent retrospectives, and some, like Krasner and Mitchell, set new auction records. “Recognizing works by artists of greater diversity in gender, ethnicity, and worldview has finally become a priority,” Chanzit added.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="2208"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="2209" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="2217"><div class="Artwork__ArtworkContainer-sc-1v84ce1-1 dZuYiK" data-dcnode-id="2218"><a class="Artwork__ArtworkImageLink-sc-1v84ce1-0 jfiSzX" data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/lee-krasner-the-eye-is-the-first-circle"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="2242"><img alt="The Eye is the First Circle" class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="2255" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fd32dm0rphc51dk.cloudfront.net%252FXIG4tpeMltDkixb9hq3p-A%252Flarger.jpg%26width%3D1200%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="2243"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="2244"><svg class="expand" data-dcnode-id="2245" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="2246" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="2247"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="2254" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="2248" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="2249"><g data-dcnode-id="2250" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="2253" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="2252" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="2251" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div></a><div class="Box-sc-15se88d-0 fPqRkm" color="black60" data-dcnode-id="2219"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 ArtworkCaption__StyledArtworkCaption-t0bcvj-2 fPqRkm kGYJIc dQTpUj" color="black60" data-dcnode-id="2220" font-family="sans"><strong class="ArtworkCaption__ArtistNames-t0bcvj-0 hzXsXB" data-dcnode-id="2237"><span class="ArtworkCaption__ArtistName-t0bcvj-1 WhawL" data-dcnode-id="2238"><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/lee-krasner"><span data-dcnode-id="2240" instrument_node="">Lee Krasner</span></a></span></strong><div data-dcnode-id="2221"><div class="LinesEllipsis" data-dcnode-id="2227"><div data-dcnode-id="2228"><span data-dcnode-id="2229"><span class="title" data-dcnode-id="2234"><a data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/lee-krasner-the-eye-is-the-first-circle"><span data-dcnode-id="2236" instrument_node="">The Eye is the First Circle</span></a></span><span data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">, </span></span><span class="date" data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">1960</span></span></span></div></div><div class="LinesEllipsis" data-dcnode-id="2222"><div data-dcnode-id="2223"><span data-dcnode-id="2224"><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/royal-academy"><span data-dcnode-id="2226" instrument_node="">"Abstract Expressionism" at Royal Academy of Arts, London</span></a></span></div></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="2210" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="2211" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="2212" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="2215" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="2216" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 107px;"></div></div><div data-dcnode-id="2213" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="2214" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="2198"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="2199"><div data-dcnode-id="2200"><div class="paragraph" data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">All women lineups in particular have been a familiar gallery gambit. Traveling surveys like “Radical Women: Latin American Art, 1960–1985” and “We Wanted a Revolution: Black Radical Women, 1965–1985” sought to rectify art history’s shortcomings.</span></div><div class="paragraph" data-dcnode-id="2201"><span data-dcnode-id="2205" instrument_node="">“I have seen a new awareness, and strong female curators and writers have contributed to a gradual change,” wrote Manuela Wirth, co-founder and president of </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/hauser-and-wirth"><span data-dcnode-id="2204" instrument_node="">Hauser &amp; Wirth</span></a><span data-dcnode-id="2202" instrument_node="">. The gallery has staged several shows dedicated to women artists, including a sprawling 2016 group exhibition of abstract sculpture that inaugurated its Los Angeles gallery.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 fKwfmr" data-dcnode-id="2180"><div class="ImageSetPreview__ImageSetContainer-sc-1pp4y1-0 dQlGLA" data-dcnode-id="2181"><div class="ImageSetPreview__FullLabel-sc-1pp4y1-1 iHOAJm" data-dcnode-id="2184"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__LabelWrapper-v8vmy8-1 fvWDrH jPEYdK" data-dcnode-id="2185" display="flex"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 cXtxjD" data-dcnode-id="2192" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 dOyEAB Typography-sc-1pie2ao-1 ImageSetLabel__SlideshowTitle-v8vmy8-2 eZLjmP bmuzQQ" data-dcnode-id="2196" font-family="[object Object]" font-size="16px,18px"><span data-dcnode-id="2197" instrument_node="">6 Images</span></div><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__SlideshowCta-v8vmy8-3 LbPWX" data-dcnode-id="2193" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 fCbMdz Typography-sc-1pie2ao-1 eZLjmP" data-dcnode-id="2194" font-family="[object Object]" font-size="12px,14px"><span data-dcnode-id="2195" instrument_node="">View Slideshow</span></div></div></div><div class="fresnel-container fresnel-greaterThanOrEqual-sm" data-dcnode-id="2186"><div class="ImageSetLabel__IconContainer-v8vmy8-0 fxJFai" data-dcnode-id="2187"><svg class="image-set" data-dcnode-id="2188" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><path d="M6760.67,551.72h-32v-32h32v32Zm-30-2h28v-28h-28v28Z" data-dcnode-id="2191" fill="black" transform="translate(-6728.67 -507.72)"></path><polygon data-dcnode-id="2190" fill="black" points="38 37 36 37 36 8 7 8 7 6 38 6 38 37"></polygon><polygon data-dcnode-id="2189" fill="black" points="44 31 42 31 42 2 13 2 13 0 44 0 44 31"></polygon></svg></div></div></div></div><div class="ImageSetPreview__ImgContainer-sc-1pp4y1-3 fSnQyB" data-dcnode-id="2182"><img alt="Open Slideshow" class="ImageSetPreview__Img-sc-1pp4y1-2 epuKML" data-dcnode-id="2183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252Fg_-_rEXDH2MLEdS6tlXFEw%25252FHauser%252B%252526%252BWirth%252BLos%252BAngeles-hires.jpg%26width%3D800%26quality%3D80&amp;raw"></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="2061"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="2068"><div data-dcnode-id="2069"><div class="paragraph" data-dcnode-id="2154"><span data-dcnode-id="2179" instrument_node="">Major exhibitions have been staged on the subjects of representation, gender, race, and sexuality, bringing attention to vital emerging artists such as </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2175" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/juliana-huxtable" target="_blank"><span data-dcnode-id="2178" instrument_node="">Juliana Huxtable</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2176"></div></div><span data-dcnode-id="2174" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2170" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/wu-tsang" target="_blank"><span data-dcnode-id="2173" instrument_node="">Wu Tsang</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2171"></div></div><span data-dcnode-id="2169" instrument_node="">, and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2165" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/victoria-sin" target="_blank"><span data-dcnode-id="2168" instrument_node="">Victoria Sin</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2166"></div></div><span data-dcnode-id="2164" instrument_node="">. The 50th anniversaries of the Stonewall riots in the U.S. and LGBTQ+ rights in the U.K. saw historic shows taking place at the </span><a data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/brooklyn-museum"><span data-dcnode-id="2163" instrument_node="">Brooklyn Museum</span></a><span data-dcnode-id="2161" instrument_node="">, the </span><a data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/leslie-lohman-museum"><span data-dcnode-id="2160" instrument_node="">Leslie-Lohman Museum</span></a><span data-dcnode-id="2158" instrument_node="">, and the </span><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/camh"><span data-dcnode-id="2157" instrument_node="">Contemporary Arts Museum Houston</span></a><span data-dcnode-id="2155" instrument_node="">. </span></div><div class="paragraph" data-dcnode-id="2096"><span data-dcnode-id="2153" instrument_node="">There have been overdue solos for artists long left out of the mostly white, Western, male-dominated canon. Highlights include </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2149" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/joan-jonas" target="_blank"><span data-dcnode-id="2152" instrument_node="">Joan Jonas</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2150"></div></div><span data-dcnode-id="2148" instrument_node=""> at </span><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/tate"><span data-dcnode-id="2147" instrument_node="">Tate Modern</span></a><span data-dcnode-id="2145" instrument_node="">; </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2141" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/archibald-j-motley-jr" target="_blank"><span data-dcnode-id="2144" instrument_node="">Archibald Motley</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2142"></div></div><span data-dcnode-id="2140" instrument_node=""> at the </span><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/whitneymuseum"><span data-dcnode-id="2139" instrument_node="">Whitney</span></a><span data-dcnode-id="2137" instrument_node="">; </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2133" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/kerry-james-marshall" target="_blank"><span data-dcnode-id="2136" instrument_node="">Kerry James Marshall</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2134"></div></div><span data-dcnode-id="2132" instrument_node=""> at </span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/mcachicago"><span data-dcnode-id="2131" instrument_node="">MCA Chicago</span></a><span data-dcnode-id="2129" instrument_node="">, the </span><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/metmuseum"><span data-dcnode-id="2128" instrument_node="">Met</span></a><span data-dcnode-id="2126" instrument_node="">, and </span><a data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/moca"><span data-dcnode-id="2125" instrument_node="">MOCA</span></a><span data-dcnode-id="2123" instrument_node="">; and a touring retrospective of work by </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2119" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/alice-neel" target="_blank"><span data-dcnode-id="2122" instrument_node="">Alice Neel</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2120"></div></div><span data-dcnode-id="2118" instrument_node="">. Surveys on the work of </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2114" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/alma-thomas" target="_blank"><span data-dcnode-id="2117" instrument_node="">Alma Thomas</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2115"></div></div><span data-dcnode-id="2113" instrument_node=""> at the </span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/studio-museum"><span data-dcnode-id="2112" instrument_node="">Studio Museum in Harlem</span></a><span data-dcnode-id="2110" instrument_node=""> and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2106" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/luchita-hurtado" target="_blank"><span data-dcnode-id="2109" instrument_node="">Luchita Hurtado</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2107"></div></div><span data-dcnode-id="2105" instrument_node=""> at the </span><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/serpentineuk"><span data-dcnode-id="2104" instrument_node="">Serpentine Galleries</span></a><span data-dcnode-id="2102" instrument_node=""> made considerable impacts. In 2017, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2098" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/lubaina-himid" target="_blank"><span data-dcnode-id="2101" instrument_node="">Lubaina Himid</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2099"></div></div><span data-dcnode-id="2097" instrument_node=""> made history as the first woman of color and the oldest artist, at 63, to be awarded the Turner Prize in the U.K. </span></div><div class="paragraph" data-dcnode-id="2070"><span data-dcnode-id="2095" instrument_node="">Meanwhile, overlooked women artists already in their seventies, eighties, and nineties gained representation with blue-chip galleries: </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2091" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/rose-wylie" target="_blank"><span data-dcnode-id="2094" instrument_node="">Rose Wylie</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2092"></div></div><span data-dcnode-id="2090" instrument_node=""> joined </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/david-zwirner"><span data-dcnode-id="2089" instrument_node="">David Zwirner</span></a><span data-dcnode-id="2087" instrument_node=""> 2017; Luchita Hurtado joined Hauser &amp; Wirth in 2018; and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2083" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/howardena-pindell" target="_blank"><span data-dcnode-id="2086" instrument_node="">Howardena Pindell</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2084"></div></div><span data-dcnode-id="2082" instrument_node=""> joined </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/victoria-miro"><span data-dcnode-id="2081" instrument_node="">Victoria Miro</span></a><span data-dcnode-id="2079" instrument_node=""> in 2019. </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2075" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/carmen-herrera" target="_blank"><span data-dcnode-id="2078" instrument_node="">Carmen Herrera</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2076"></div></div><span data-dcnode-id="2074" instrument_node="">, now 104, started working with </span><a data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/lisson-gallery"><span data-dcnode-id="2073" instrument_node="">Lisson</span></a><span data-dcnode-id="2071" instrument_node=""> in 2009 and opened a retrospective at the Whitney in 2016.</span></div></div></div><div class="Box-sc-15se88d-0 Sections__AdWrapper-sc-14gz2oe-1 iKOYuB khjXPl" data-dcnode-id="2062"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 DisplayAd__DisplayAdContainer-sc-10le8e3-0 fAMSRt eZzRsf" data-dcnode-id="2063" display="flex" height="1px"><div class="Box-sc-15se88d-0 eUOAxr" data-dcnode-id="2064"><div data-dcnode-id="2067" style="width:970px;height:250px"></div><div class="Typography__BaseText-sc-1pie2ao-0 eJiank Typography-sc-1pie2ao-1 eZLjmP" color="black30" data-dcnode-id="2065" font-family="Unica77LLWebRegular, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10px"><span data-dcnode-id="2066" instrument_node="">Advertisement</span></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="2013"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="2014" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="2022"><div class="Artwork__ArtworkContainer-sc-1v84ce1-1 dZuYiK" data-dcnode-id="2023"><a class="Artwork__ArtworkImageLink-sc-1v84ce1-0 jfiSzX" data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/carmen-herrera-iberic"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="2047"><img alt=" Iberic" class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="2060" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fd32dm0rphc51dk.cloudfront.net%252FzNzh8rI0Wdhrvq-G7uOT9w%252Flarger.jpg%26width%3D1200%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="2048"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="2049"><svg class="expand" data-dcnode-id="2050" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="2051" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="2052"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="2059" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="2053" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="2054"><g data-dcnode-id="2055" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="2058" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="2057" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="2056" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div></a><div class="Box-sc-15se88d-0 fPqRkm" color="black60" data-dcnode-id="2024"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 ArtworkCaption__StyledArtworkCaption-t0bcvj-2 fPqRkm kGYJIc dQTpUj" color="black60" data-dcnode-id="2025" font-family="sans"><strong class="ArtworkCaption__ArtistNames-t0bcvj-0 hzXsXB" data-dcnode-id="2042"><span class="ArtworkCaption__ArtistName-t0bcvj-1 WhawL" data-dcnode-id="2043"><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/carmen-herrera"><span data-dcnode-id="2045" instrument_node="">Carmen Herrera</span></a></span></strong><div data-dcnode-id="2026"><div class="LinesEllipsis" data-dcnode-id="2032"><div data-dcnode-id="2033"><span data-dcnode-id="2034"><span class="title" data-dcnode-id="2039"><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/carmen-herrera-iberic"><span data-dcnode-id="2041" instrument_node=""> Iberic</span></a></span><span data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">, </span></span><span class="date" data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">1949</span></span></span></div></div><div class="LinesEllipsis" data-dcnode-id="2027"><div data-dcnode-id="2028"><span data-dcnode-id="2029"><a data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/whitneymuseum"><span data-dcnode-id="2031" instrument_node="">"Carmen Herrera: Lines of Sight" at Whitney Museum of American Art, New York</span></a></span></div></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="2015" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="2016" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="2017" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="2020" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="2021" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 107px;"></div></div><div data-dcnode-id="2018" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="2019" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1992"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1993"><div data-dcnode-id="1994"><div class="paragraph" data-dcnode-id="1995"><span data-dcnode-id="2012" instrument_node="">Contemporary artists of color received unprecedented institutional attention, though as </span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/hayward-gallery"><span data-dcnode-id="2011" instrument_node="">Hayward Gallery</span></a><span data-dcnode-id="2009" instrument_node=""> senior curator Zoe Whitley has pointed out, the efforts of curators now is only part of the picture—and we have a lot still to learn. “It’s important to say that these artists have been working tirelessly their whole lives,” said Whitley, who was formerly at Tate Modern and co-curated the standout exhibition “</span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/show/tate-soul-of-a-nation-art-in-the-age-of-black-power"><span data-dcnode-id="2008" instrument_node="">Soul of a Nation: Art in the Age of Black Power 1963–1983</span></a><span data-dcnode-id="2006" instrument_node="">.” “And while, sadly, some are only getting their due posthumously,” Whitley continued, “it was previous generations of artist-scholars and curators—</span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="2002" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/samella-lewis" target="_blank"><span data-dcnode-id="2005" instrument_node="">Samella Lewis</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="2003"></div></div><span data-dcnode-id="2001" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1997" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/david-driskell" target="_blank"><span data-dcnode-id="2000" instrument_node="">David Driskell</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1998"></div></div><span data-dcnode-id="1996" instrument_node="">, E. Barry Gaither, and more recently Kellie Jones among them—who laid the groundwork for the present moment. What feels perhaps like a new discovery is always built on the hard graft of those, too often unsung, who came before.”</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1987"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1988"><div data-dcnode-id="1989"><h1 data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">The market for African art grew internationally.</span></h1></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 hlWcud" data-dcnode-id="1953"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1954" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="1962"><div class="article-image" data-dcnode-id="1963"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1973"><img alt="Installation view of Zak Ové, Black and Blue: The Invisible Man and the Masque of Blackness, at 1-54 Contemporary African Art Fair, London, 2016. Photo © Victor Raison. Courtesy of 1-54 Contemporary African Art Fair." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1986" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FNIcf5_V88bPCMZZz55jTxA%25252FDSC00200.jpg%26width%3D2000%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1974"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1975"><svg class="expand" data-dcnode-id="1976" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1977" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1978"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1985" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1979" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1980"><g data-dcnode-id="1981" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1984" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1983" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1982" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1964"><div class="Caption__Figcaption-sc-1c6ztax-1 eamtYu" data-dcnode-id="1965"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1966" font-family="sans"><div data-dcnode-id="1967"><p data-dcnode-id="1968"><span data-dcnode-id="1972" instrument_node="">Installation view of Zak Ové, </span><i data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Black and Blue: The Invisible Man and the Masque of Blackness</span></i><span data-dcnode-id="1969" instrument_node="">, at 1-54 Contemporary African Art Fair, London, 2016. Photo © Victor Raison. Courtesy of 1-54 Contemporary African Art Fair.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1955" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1956" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1957" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1960" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1961" style="position: absolute; left: 0px; top: 0px; width: 1035px; height: 115px;"></div></div><div data-dcnode-id="1958" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1959" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1933"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1934"><div data-dcnode-id="1935"><div class="paragraph" data-dcnode-id="1941"><span data-dcnode-id="1952" instrument_node="">The international ascent of work by contemporary African artists over the past decade has been unquestionable. In addition to the emergence of promising artists like </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1948" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/njideka-akunyili-crosby" target="_blank"><span data-dcnode-id="1951" instrument_node="">Njideka Akunyili Crosby</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1949"></div></div><span data-dcnode-id="1947" instrument_node=""> and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1943" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/amoako-boafo" target="_blank"><span data-dcnode-id="1946" instrument_node="">Amoako Boafo</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1944"></div></div><span data-dcnode-id="1942" instrument_node="">, we witnessed the creation of new art fairs, galleries, and auction departments dedicated to artists of the continent’s 54 countries and their diasporas.</span></div><div class="paragraph" data-dcnode-id="1936"><span data-dcnode-id="1940" instrument_node="">“The rise of contemporary African art is a response to the needs of the global art market,” said Chicago-based gallerist </span><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/mariane-ibrahim-gallery"><span data-dcnode-id="1939" instrument_node="">Mariane Ibrahim-Lenhardt</span></a><span data-dcnode-id="1937" instrument_node="">, who represents artists of Africa and the diaspora. “Collectors and institutions are eager to find a new voice and want African artists in their collection because of their aesthetic and political statement.”</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="1846"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1847" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 jIBqXj" data-dcnode-id="1894" width="357"><div class="Artwork__ArtworkContainer-sc-1v84ce1-1 dZuYiK" data-dcnode-id="1895"><a class="Artwork__ArtworkImageLink-sc-1v84ce1-0 jfiSzX" data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/amoako-boafo-sunflower-shirt"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data node-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/amoako-boafo"><span data-dcnode-id="1917" instrument_node="">Amoako Boafo</span></a></span></strong><div data-dcnode-id="1898"><div class="LinesEllipsis" data-dcnode-id="1904"><div data-dcnode-id="1905"><span data-dcnode-id="1906"><span class="title" data-dcnode-id="1911"><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/amoako-boafo-sunflower-shirt"><span data-dcnode-id="1913" instrument_node="">Sunflower Shirt</span></a></span><span data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">, </span></span><span class="date" data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">2019</span></span></span></div></div><div class="LinesEllipsis" data-dcnode-id="1899"><div data-dcnode-id="1900"><span data-dcnode-id="1901"><a data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/mariane-ibrahim-gallery"><span data-dcnode-id="1903" instrument_node="">Mariane Ibrahim Gallery</span></a></span></div></div></div></div></div></div></div><div class="ImageCollection__ImageCollectionItem-begb1k-1 iQuDwg" data-dcnode-id="1855" width="311"><div class="Artwork__ArtworkContainer-sc-1v84ce1-1 dZuYiK" data-dcnode-id="1856"><a class="Artwork__ArtworkImageLink-sc-1v84ce1-0 jfiSzX" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/amoako-boafo-cobalt-blue-earring"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1880"><img alt="Cobalt Blue Earring" class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1893" height="384" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fd32dm0rphc51dk.cloudfront.net%252FoaH4fsF_qXdBbRqwVQaj3w%252Flarger.jpg%26width%3D1200%26quality%3D80&amp;raw" width="311"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1881"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1882"><svg class="expand" data-dcnode-id="1883" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1884" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1885"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1892" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1886" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1887"><g data-dcnode-id="1888" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1891" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1890" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1889" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div></a><div class="Box-sc-15se88d-0 fPqRkm" color="black60" data-dcnode-id="1857"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 ArtworkCaption__StyledArtworkCaption-t0bcvj-2 fPqRkm kGYJIc dQTpUj" color="black60" data-dcnode-id="1858" font-family="sans"><strong class="ArtworkCaption__ArtistNames-t0bcvj-0 hzXsXB" data-dcnode-id="1875"><span class="ArtworkCaption__ArtistName-t0bcvj-1 WhawL" data-dcnode-id="1876"><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/amoako-boafo"><span data-dcnode-id="1878" instrument_node="">Amoako Boafo</span></a></span></strong><div data-dcnode-id="1859"><div class="LinesEllipsis" data-dcnode-id="1865"><div data-dcnode-id="1866"><span data-dcnode-id="1867"><span class="title" data-dcnode-id="1872"><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/amoako-boafo-cobalt-blue-earring"><span data-dcnode-id="1874" instrument_node="">Cobalt Blue Earring</span></a></span><span data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">, </span></span><span class="date" data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">2019</span></span></span></div></div><div class="LinesEllipsis" data-dcnode-id="1860"><div data-dcnode-id="1861"><span data-dcnode-id="1862"><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/mariane-ibrahim-gallery"><span data-dcnode-id="1864" instrument_node="">Mariane Ibrahim Gallery</span></a></span></div></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1848" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1849" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1850" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1853" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1854" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 107px;"></div></div><div data-dcnode-id="1851" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1852" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1826"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1827"><div data-dcnode-id="1828"><div class="paragraph" data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Defining art according to its place of production is problematic, especially given the history of colonialism. And while the market tends to flatten the dozens of cultures of Africa into a monolith, events over the past 10 years have strengthened a dialogue with the West, leading to deeper engagement with the diverse practices of artists hailing from across the continent. </span></div><div class="paragraph" data-dcnode-id="1829"><span data-dcnode-id="1843" instrument_node="">In London in 2013, Touria El-Glaoui founded the best-known art fair dedicated to contemporary African art, 1-54 Contemporary African Art Fair; further editions in New York and Marrakech launched in 2015 and 2018, respectively. Other fairs like Lagos Photo and Art X Lagos took off, while the rebranded ArtJoburg experienced a “</span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apollo-magazine.com/south-africas-most-established-art-fair-has-undergone-a-rapid-rebirth/"><span data-dcnode-id="1842" instrument_node="">rebirth</span></a><span data-dcnode-id="1840" instrument_node="">.” Auction houses, including Sotheby’s Modern and Contemporary African Art Department, met the demands of a “bullish” market in London; while Bonham’s (whose African Modern &amp; Contemporary Art department dates back to 2007) saw record sales, including top lots by artists including </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1836" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/irma-stern" target="_blank"><span data-dcnode-id="1839" instrument_node="">Irma Stern</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1837"></div></div><span data-dcnode-id="1835" instrument_node=""> and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1831" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/ben-enwonwu-mbe" target="_blank"><span data-dcnode-id="1834" instrument_node="">Ben Enwonwu MBE</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1832"></div></div><span data-dcnode-id="1830" instrument_node="">.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 fKwfmr" data-dcnode-id="1808"><div class="ImageSetPreview__ImageSetContainer-sc-1pp4y1-0 dQlGLA" data-dcnode-id="1809"><div class="ImageSetPreview__FullLabel-sc-1pp4y1-1 iHOAJm" data-dcnode-id="1812"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__LabelWrapper-v8vmy8-1 fvWDrH jPEYdK" data-dcnode-id="1813" display="flex"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 cXtxjD" data-dcnode-id="1820" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 dOyEAB Typography-sc-1pie2ao-1 ImageSetLabel__SlideshowTitle-v8vmy8-2 eZLjmP bmuzQQ" data-dcnode-id="1824" font-family="[object Object]" font-size="16px,18px"><span data-dcnode-id="1825" instrument_node="">4 Images</span></div><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__SlideshowCta-v8vmy8-3 LbPWX" data-dcnode-id="1821" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 fCbMdz Typography-sc-1pie2ao-1 eZLjmP" data-dcnode-id="1822" font-family="[object Object]" font-size="12px,14px"><span data-dcnode-id="1823" instrument_node="">View Slideshow</span></div></div></div><div class="fresnel-container fresnel-greaterThanOrEqual-sm" data-dcnode-id="1814"><div class="ImageSetLabel__IconContainer-v8vmy8-0 fxJFai" data-dcnode-id="1815"><svg class="image-set" data-dcnode-id="1816" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><path d="M6760.67,551.72h-32v-32h32v32Zm-30-2h28v-28h-28v28Z" data-dcnode-id="1819" fill="black" transform="translate(-6728.67 -507.72)"></path><polygon data-dcnode-id="1818" fill="black" points="38 37 36 37 36 8 7 8 7 6 38 6 38 37"></polygon><polygon data-dcnode-id="1817" fill="black" points="44 31 42 31 42 2 13 2 13 0 44 0 44 31"></polygon></svg></div></div></div></div><div class="ImageSetPreview__ImgContainer-sc-1pp4y1-3 fSnQyB" data-dcnode-id="1810"><img alt="Open Slideshow" class="ImageSetPreview__Img-sc-1pp4y1-2 epuKML" data-dcnode-id="1811" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FcjH-Ezu-nW82EkYLybbzYg%25252FPA6A79%25257E1.JPG%26width%3D800%26quality%3D80&amp;raw"></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1789"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1790"><div data-dcnode-id="1791"><div class="paragraph" data-dcnode-id="1797"><span data-dcnode-id="1807" instrument_node="">Cities including Accra, Addis Ababa, and Lagos gained recognition for their art scenes and new galleries—like </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/gallery-1957"><span data-dcnode-id="1806" instrument_node="">Gallery 1957</span></a><span data-dcnode-id="1804" instrument_node="">, which opened in Accra in 2016, and </span><a data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/addis-fine-art"><span data-dcnode-id="1803" instrument_node="">Addis Fine Art</span></a><span data-dcnode-id="1801" instrument_node="">, which also opened that year, in Addis Ababa. South Africa’s groundbreaking </span><a data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/goodman-gallery"><span data-dcnode-id="1800" instrument_node="">Goodman Gallery</span></a><span data-dcnode-id="1798" instrument_node=""> opened its first overseas location in London in 2019. </span></div><div class="paragraph" data-dcnode-id="1792"><span data-dcnode-id="1796" instrument_node="">We saw the first Nigerian and Ghanaian pavilions staged at the Venice Biennale, in 2017 and 2019, respectively; and the opening of the largest museum of contemporary African art in the world, </span><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/zeitz-mocaa"><span data-dcnode-id="1795" instrument_node="">Zeitz MOCAA</span></a><span data-dcnode-id="1793" instrument_node="">, in Cape Town in 2017.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="1758"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1759" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="1767"><div class="article-image" data-dcnode-id="1768"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1775"><img alt="Installation view of “Gravity and Grace: Monumental Works by El Anatsui” at the Brooklyn Museum, 2013. Courtesy of the Brooklyn Museum." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1788" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252Foye6VdOxCqRzMPwq4nj8Yg%25252FDIG_E_2013_Anatsui_Gravity_and_Grace_022_PS4-Large%252BJPEG%252B%2525281%252529.jpg%26width%3D1200%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1776"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1777"><svg class="expand" data-dcnode-id="1778" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1779" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1780"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1787" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1781" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1782"><g data-dcnode-id="1783" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1786" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1785" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1784" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1769"><div class="Caption__Figcaption-sc-1c6ztax-1 lnWoYD" data-dcnode-id="1770"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1771" font-family="sans"><div data-dcnode-id="1772"><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Installation view of “Gravity and Grace: Monumental Works by El Anatsui” at the Brooklyn Museum, 2013. Courtesy of the Brooklyn Museum.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1760" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1761" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1762" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1765" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1766" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 115px;"></div></div><div data-dcnode-id="1763" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1764" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1707"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1708"><div data-dcnode-id="1709"><div class="paragraph" data-dcnode-id="1732"><span data-dcnode-id="1757" instrument_node="">Exhibitions by seminal contemporary African artists at Western museums also facilitated more scholarly conversations. In 2013, the </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1753" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/el-anatsui" target="_blank"><span data-dcnode-id="1756" instrument_node="">El Anatsui</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1754"></div></div><span data-dcnode-id="1752" instrument_node=""> retrospective at the </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/brooklyn-museum"><span data-dcnode-id="1751" instrument_node="">Brooklyn Museum</span></a><span data-dcnode-id="1749" instrument_node=""> positioned the Ghanaian artist as a leader in contemporary art; that same year, </span><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/tate"><span data-dcnode-id="1748" instrument_node="">Tate Modern</span></a><span data-dcnode-id="1746" instrument_node="">’s show of 100 works by </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1742" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/ibrahim-el-salahi" target="_blank"><span data-dcnode-id="1745" instrument_node="">Ibrahim El-Salahi</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1743"></div></div><span data-dcnode-id="1741" instrument_node=""> promoted the long-underrecognized artist’s contributions to modernist painting. We also witnessed the largest exhibition to date of pioneering West African photographer </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1737" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/malick-sidibe" target="_blank"><span data-dcnode-id="1740" instrument_node="">Malick Sidibé</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1738"></div></div><span data-dcnode-id="1736" instrument_node=""> at the </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/fondation-cartier"><span data-dcnode-id="1735" instrument_node="">Fondation Cartier</span></a><span data-dcnode-id="1733" instrument_node=""> in Paris in 2017. </span></div><div class="paragraph" data-dcnode-id="1710"><span data-dcnode-id="1731" instrument_node="">It has been a breakthrough decade for artists including </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1727" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/ibrahim-mahama" target="_blank"><span data-dcnode-id="1730" instrument_node="">Ibrahim Mahama</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1728"></div></div><span data-dcnode-id="1726" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1722" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/hassan-hajjaj" target="_blank"><span data-dcnode-id="1725" instrument_node="">Hassan Hajjaj</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1723"></div></div><span data-dcnode-id="1721" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1717" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/zanele-muholi" target="_blank"><span data-dcnode-id="1720" instrument_node="">Zanele Muholi</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1718"></div></div><span data-dcnode-id="1716" instrument_node="">, and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1712" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/yinka-shonibare-cbe" target="_blank"><span data-dcnode-id="1715" instrument_node="">Yinka Shonibare CBE</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1713"></div></div><span data-dcnode-id="1711" instrument_node="">. They’ve not just played a part in reframing the “African” narrative through their work, but have also opened independent spaces and curated shows to support artists from their communities and circumvent structures where racism is still endemic.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1690"><div class="ImageSetPreview__ImageSetContainer-sc-1pp4y1-0 dQlGLA" data-dcnode-id="1691"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetPreview__MiniWrapper-sc-1pp4y1-4 gzsrpX cMsOaQ" data-dcnode-id="1692" display="flex"><img alt="Open Slideshow" class="ImageSetPreview__Img-sc-1pp4y1-2 epuKML" data-dcnode-id="1706" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fd32dm0rphc51dk.cloudfront.net%252FOefGchRTTGLtShSs5h7Wvw%252Flarger.jpg%26width%3D200%26quality%3D80&amp;raw"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__LabelWrapper-v8vmy8-1 fvWDrH jPEYdK" data-dcnode-id="1693" display="flex"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 cXtxjD" data-dcnode-id="1700" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 dOyEAB Typography-sc-1pie2ao-1 ImageSetLabel__SlideshowTitle-v8vmy8-2 eZLjmP bmuzQQ" data-dcnode-id="1704" font-family="[object Object]" font-size="16px,18px"><span data-dcnode-id="1705" instrument_node="">4 Images</span></div><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__SlideshowCta-v8vmy8-3 LbPWX" data-dcnode-id="1701" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 fCbMdz Typography-sc-1pie2ao-1 eZLjmP" data-dcnode-id="1702" font-family="[object Object]" font-size="12px,14px"><span data-dcnode-id="1703" instrument_node="">View Slideshow</span></div></div></div><div class="fresnel-container fresnel-greaterThanOrEqual-sm" data-dcnode-id="1694"><div class="ImageSetLabel__IconContainer-v8vmy8-0 fxJFai" data-dcnode-id="1695"><svg class="image-set" data-dcnode-id="1696" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><path d="M6760.67,551.72h-32v-32h32v32Zm-30-2h28v-28h-28v28Z" data-dcnode-id="1699" fill="black" transform="translate(-6728.67 -507.72)"></path><polygon data-dcnode-id="1698" fill="black" points="38 37 36 37 36 8 7 8 7 6 38 6 38 37"></polygon><polygon data-dcnode-id="1697" fill="black" points="44 31 42 31 42 2 13 2 13 0 44 0 44 31"></polygon></svg></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1685"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1686"><div data-dcnode-id="1687"><div class="paragraph" data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">There were losses, too: Curators Bisi Silva and Okwui Enwezor passed away. Their respective pioneering ideas inspired a new generation of artists and changed the dialogue around contemporary art from the African continent, and how it might be presented and perceived.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1680"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1681"><div data-dcnode-id="1682"><h1 data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Figurative painting got personal and political.</span></h1></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" da
