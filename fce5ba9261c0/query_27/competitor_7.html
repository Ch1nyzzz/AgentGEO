4" data-dcnode-id="1675" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1657"><div class="Caption__Figcaption-sc-1c6ztax-1 lnWoYD" data-dcnode-id="1658"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1659" font-family="sans"><div data-dcnode-id="1660"><p data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node="">Mickalene Thomas, </span><i data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Le Déjeuner sur l'herbe: Les trois femmes noires</span></i><span data-dcnode-id="1662" instrument_node="">, 2010. © Mickalene Thomas. Courtesy of Mickalene Thomas Studio.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1648" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1649" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1650" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1653" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1654" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 115px;"></div></div><div data-dcnode-id="1651" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1652" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1596"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1597"><div data-dcnode-id="1598"><div class="paragraph" data-dcnode-id="1639"><span data-dcnode-id="1645" instrument_node="">In the context of rethinking representation, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1641" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/gene/figurative-painting" target="_blank"><span data-dcnode-id="1644" instrument_node="">figurative painting</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1642"></div></div><span data-dcnode-id="1640" instrument_node=""> saw a revival. Distinct from historical figurative painters, artists working today have been tapping into their own lives, families, communities, and histories for inspiration and authenticity. </span></div><div class="paragraph" data-dcnode-id="1626"><span data-dcnode-id="1638" instrument_node="">This decade put the spotlight on celebrated artists such as </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1634" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/mickalene-thomas" target="_blank"><span data-dcnode-id="1637" instrument_node="">Mickalene Thomas</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1635"></div></div><span data-dcnode-id="1633" instrument_node="">, whose unapologetic, “</span><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/40f8bd16-ab1c-11e8-89a1-e5de165fa619"><span data-dcnode-id="1632" instrument_node="">proud black lesbian</span></a><span data-dcnode-id="1630" instrument_node="">” gaze has not only given visibility to the women in her life, but has also drawn attention to the way history has removed the presence and importance of black figures in painting. “It’s part of my responsibility to provide some of that agency,” Thomas told </span><em data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Artsy</span></em><span data-dcnode-id="1627" instrument_node="">. “There’s a huge gap missing in museum collections.”</span></div><div class="paragraph" data-dcnode-id="1599"><span data-dcnode-id="1625" instrument_node="">Thomas has seen a marked increase in interest in her work, in terms of both the market and museum opportunities, over the last 10 years, alongside figurative painters like </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1621" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/derrick-adams" target="_blank"><span data-dcnode-id="1624" instrument_node="">Derrick Adams</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1622"></div></div><span data-dcnode-id="1620" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1616" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/lynette-yiadom-boakye" target="_blank"><span data-dcnode-id="1619" instrument_node="">Lynette Yiadom-Boakye</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1617"></div></div><span data-dcnode-id="1615" instrument_node="">, Claudette Johnson, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1611" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/henry-taylor" target="_blank"><span data-dcnode-id="1614" instrument_node="">Henry Taylor</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1612"></div></div><span data-dcnode-id="1610" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1606" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/liu-xiaodong" target="_blank"><span data-dcnode-id="1609" instrument_node="">Liu Xiaodong</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1607"></div></div><span data-dcnode-id="1605" instrument_node="">, and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1601" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/elizabeth-peyton" target="_blank"><span data-dcnode-id="1604" instrument_node="">Elizabeth Peyton</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1602"></div></div><span data-dcnode-id="1600" instrument_node="">—all of whom often paint people they know intimately.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 fKwfmr" data-dcnode-id="1577"><div class="ImageSetPreview__ImageSetContainer-sc-1pp4y1-0 dQlGLA" data-dcnode-id="1578"><div class="ImageSetPreview__FullLabel-sc-1pp4y1-1 iHOAJm" data-dcnode-id="1581"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__LabelWrapper-v8vmy8-1 fvWDrH jPEYdK" data-dcnode-id="1582" display="flex"><div class="Box-sc-15se88d-0 Flex-cw39ct-0 cXtxjD" data-dcnode-id="1589" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 dOyEAB Typography-sc-1pie2ao-1 ImageSetLabel__SlideshowTitle-v8vmy8-2 eZLjmP bmuzQQ" data-dcnode-id="1594" font-family="[object Object]" font-size="16px,18px"><span data-dcnode-id="1595" instrument_node="">4 Images</span></div><div class="Box-sc-15se88d-0 Flex-cw39ct-0 ImageSetLabel__SlideshowCta-v8vmy8-3 LbPWX" data-dcnode-id="1590" display="flex"><div class="Typography__BaseText-sc-1pie2ao-0 fCbMdz Typography-sc-1pie2ao-1 eZLjmP" data-dcnode-id="1592" font-family="[object Object]" font-size="12px,14px"><span data-dcnode-id="1593" instrument_node="">View Slideshow</span></div><span data-dcnode-id="1591" instrument_node=""></span></div></div><div class="fresnel-container fresnel-greaterThanOrEqual-sm" data-dcnode-id="1583"><div class="ImageSetLabel__IconContainer-v8vmy8-0 fxJFai" data-dcnode-id="1584"><svg class="image-set" data-dcnode-id="1585" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><path d="M6760.67,551.72h-32v-32h32v32Zm-30-2h28v-28h-28v28Z" data-dcnode-id="1588" fill="black" transform="translate(-6728.67 -507.72)"></path><polygon data-dcnode-id="1587" fill="black" points="38 37 36 37 36 8 7 8 7 6 38 6 38 37"></polygon><polygon data-dcnode-id="1586" fill="black" points="44 31 42 31 42 2 13 2 13 0 44 0 44 31"></polygon></svg></div></div></div></div><div class="ImageSetPreview__ImgContainer-sc-1pp4y1-3 fSnQyB" data-dcnode-id="1579"><img alt="Open Slideshow" class="ImageSetPreview__Img-sc-1pp4y1-2 epuKML" data-dcnode-id="1580" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fd32dm0rphc51dk.cloudfront.net%252FSO2ilOgfZ1wRsxHfpu9hsw%252Flarger.jpg%26width%3D800%26quality%3D80&amp;raw"></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1565"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1566"><div data-dcnode-id="1567"><div class="paragraph" data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Many artists painting figures in the 2010s are focused on the forgotten and the excluded, revising portraiture traditions. The influence and dominance of photography in our visual world—and particularly, interest in West African studio photography and the female gaze throughout the 2010s—has also played a significant role in the resurgence of figurative painting.</span></div><div class="paragraph" data-dcnode-id="1568"><span data-dcnode-id="1574" instrument_node="">For many younger artists, drawing on personal and found photography is a natural part of their process. British-Nigerian painter </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1570" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/joy-labinjo" target="_blank"><span data-dcnode-id="1573" instrument_node="">Joy Labinjo</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1571"></div></div><span data-dcnode-id="1569" instrument_node="">, a rising star in contemporary painting who just opened her first institutional solo show in the U.K., at the BALTIC Centre for Contemporary Art, uses family photo albums as references. Labinjo explained that for her, the figure is “the most natural thing to paint and what I think oil paint was made for.” She added that “it’s a great way to record society.”</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="1531"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1532" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="1540"><div class="article-image" data-dcnode-id="1541"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1551"><img alt="Robin F. Williams, Eye on the Time, 2018. Courtesy of Robin F. Williams and P·P·O·W, New York." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1564" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FH-0Wqt98pgoKFniFs53sXw%25252F2018_Eye%252Bon%252Bthe%252BTime_66%252Bx%252B50%252Binches.jpg%26width%3D1200%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1552"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1553"><svg class="expand" data-dcnode-id="1554" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1555" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1556"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1563" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1557" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1558"><g data-dcnode-id="1559" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1562" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1561" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1560" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1542"><div class="Caption__Figcaption-sc-1c6ztax-1 lnWoYD" data-dcnode-id="1543"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1544" font-family="sans"><div data-dcnode-id="1545"><p data-dcnode-id="1546"><span data-dcnode-id="1550" instrument_node="">Robin F. Williams, </span><i data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Eye on the Time</span></i><span data-dcnode-id="1547" instrument_node="">, 2018. Courtesy of Robin F. Williams and P·P·O·W, New York.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1533" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1534" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1535" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1538" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1539" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 73px;"></div></div><div data-dcnode-id="1536" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1537" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1521"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1522"><div data-dcnode-id="1523"><div class="paragraph" data-dcnode-id="1524"><span data-dcnode-id="1530" instrument_node="">Brooklyn-based </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1526" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/robin-f-williams" target="_blank"><span data-dcnode-id="1529" instrument_node="">Robin F. Williams</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1527"></div></div><span data-dcnode-id="1525" instrument_node="">, meanwhile, “never chose to paint figuratively,” she said. “I just couldn’t resist it. If painting is in large part about desire, and women are taught to sublimate their desires, then painting exactly what I want to paint is imperative.”</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1516"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1517"><div data-dcnode-id="1518"><h1 data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Instagram spurred an experiential art frenzy.</span></h1></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 hlWcud" data-dcnode-id="1485"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1486" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="1494"><div class="article-image" data-dcnode-id="1495"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1502"><img alt="Installation view of “teamLab Borderless” at the MORI Building Digital Art Museum, Odaiba, Tokyo, 2018. © teamLab." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1515" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FBofa6AHmWTBmHsY5VMqELg%25252F55_A%252BTable%252Bwhere%252BLittle%252BPeople%252BLive.jpg%26width%3D2000%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1503"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1504"><svg class="expand" data-dcnode-id="1505" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1506" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1507"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1514" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1508" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1509"><g data-dcnode-id="1510" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1513" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1512" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1511" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1496"><div class="Caption__Figcaption-sc-1c6ztax-1 eamtYu" data-dcnode-id="1497"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1498" font-family="sans"><div data-dcnode-id="1499"><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Installation view of “teamLab Borderless” at the MORI Building Digital Art Museum, Odaiba, Tokyo, 2018. © teamLab.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1487" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1488" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1489" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1492" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1493" style="position: absolute; left: 0px; top: 0px; width: 1035px; height: 73px;"></div></div><div data-dcnode-id="1490" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1491" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1451"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1452"><div data-dcnode-id="1453"><div class="paragraph" data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Love it or hate it, Instagram—which launched on October 6, 2010—made an indelible impact on the art world.</span></div><div class="paragraph" data-dcnode-id="1454"><span data-dcnode-id="1482" instrument_node="">From art fairs to museums, the irresistibly Instagrammable installation has become a cultural phenomenon. It has no doubt contributed to the epic success of large-scale works seen across the globe: </span><span class="preventLineBreak" data-dcnode-id="1476"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1478" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/yayoi-kusama" target="_blank"><span data-dcnode-id="1481" instrument_node="">Yayoi Kusama</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1479"></div></div><span data-dcnode-id="1477" instrument_node="">’s</span></span><span data-dcnode-id="1475" instrument_node=""> unforgettable “Infinity Mirror Rooms”; </span><span class="preventLineBreak" data-dcnode-id="1469"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1471" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/teamlab" target="_blank"><span data-dcnode-id="1474" instrument_node="">teamLab</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1472"></div></div><span data-dcnode-id="1470" instrument_node="">’s</span></span><span data-dcnode-id="1468" instrument_node=""> hallucinogenic light-based installations in Tokyo; and </span><span class="preventLineBreak" data-dcnode-id="1462"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1464" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/olafur-eliasson" target="_blank"><span data-dcnode-id="1467" instrument_node="">Olafur Eliasson</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1465"></div></div><span data-dcnode-id="1463" instrument_node="">’s</span></span><span data-dcnode-id="1461" instrument_node=""> tunnel of dense fog, </span><em data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Your blind passenger</span></em><span data-dcnode-id="1458" instrument_node=""> (2010), now showing at </span><a data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/tate"><span data-dcnode-id="1457" instrument_node="">Tate Modern</span></a><span data-dcnode-id="1455" instrument_node="">.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="1395"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1396" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 jIBszl" data-dcnode-id="1429" width="333"><div class="article-image" data-dcnode-id="1430"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1437"><img alt="Installation view of “teamLab Borderless” at the MORI Building Digital Art Museum, Odaiba, Tokyo, 2018. © teamLab." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1450" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FrmfCrkYvkFojfa1cwAVCNg%25252F01_Universe%252Bof%252BWater%252BParticles%252Bon%252Ba%252BRock%252Bwhere%252BPeople%252BGather_04.jpg%26width%3D1200%26quality%3D80&amp;raw" width="333"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1438"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1439"><svg class="expand" data-dcnode-id="1440" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1441" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1442"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1449" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1443" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1444"><g data-dcnode-id="1445" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1448" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1447" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1446" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1431"><div class="Caption__Figcaption-sc-1c6ztax-1 lnWoYD" data-dcnode-id="1432"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1433" font-family="sans"><div data-dcnode-id="1434"><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Installation view of “teamLab Borderless” at the MORI Building Digital Art Museum, Odaiba, Tokyo, 2018. © teamLab.</span></p></div></div></div></div></div></div><div class="ImageCollection__ImageCollectionItem-begb1k-1 iQuEkM" data-dcnode-id="1404" width="333"><div class="article-image" data-dcnode-id="1405"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1415"><img alt="Olafur Eliasson, Your blind passenger, 2010. Photo by Anders Sune Berg. Courtesy of the Tate." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1428" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FgtOBqwaMvbm0W8Dbaa4Ojw%25252FOlafur%252BEliasson%25252C%252BDin%252Bblinde%252Bpassager%252B2010.%252BPhoto%252Bby%252BAnders%252BSune%252BBerg.jpg%26width%3D1200%26quality%3D80&amp;raw" width="333"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1416"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1417"><svg class="expand" data-dcnode-id="1418" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1419" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1420"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1427" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1421" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1422"><g data-dcnode-id="1423" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1426" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1425" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1424" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1406"><div class="Caption__Figcaption-sc-1c6ztax-1 lnWoYD" data-dcnode-id="1407"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1408" font-family="sans"><div data-dcnode-id="1409"><p data-dcnode-id="1410"><span data-dcnode-id="1414" instrument_node="">Olafur Eliasson, </span><i data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Your blind passenger</span></i><span data-dcnode-id="1411" instrument_node="">, 2010. Photo by Anders Sune Berg. Courtesy of the Tate.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1397" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1398" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1399" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1402" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1403" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 157px;"></div></div><div data-dcnode-id="1400" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1401" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1359"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1360"><div data-dcnode-id="1361"><div class="paragraph" data-dcnode-id="1374"><span data-dcnode-id="1394" instrument_node="">As Instagram paved the way for the experience economy, it drew attention to experiential art. Virtual reality (VR), augmented reality (AR), and video installations encourage visitors to sit, smell, touch, cry, and sleep with art. Some of the decade’s most memorable artworks were experiential: ball pits and massage chairs courtesy of </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1390" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/jon-rafman" target="_blank"><span data-dcnode-id="1393" instrument_node="">Jon Rafman</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1391"></div></div><span data-dcnode-id="1389" instrument_node="">; </span><span class="preventLineBreak" data-dcnode-id="1383"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1385" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/pipilotti-rist" target="_blank"><span data-dcnode-id="1388" instrument_node="">Pipilotti Rist</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1386"></div></div><span data-dcnode-id="1384" instrument_node="">’s</span></span><span data-dcnode-id="1382" instrument_node=""> cocoon-like video installations with cushions and duvets; </span><span class="preventLineBreak" data-dcnode-id="1376"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1378" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/kahlil-joseph" target="_blank"><span data-dcnode-id="1381" instrument_node="">Kahlil Joseph</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1379"></div></div><span data-dcnode-id="1377" instrument_node="">’s</span></span><span data-dcnode-id="1375" instrument_node=""> enveloping screens and sounds.</span></div><div class="paragraph" data-dcnode-id="1362"><span data-dcnode-id="1373" instrument_node="">The culmination of four years of work, </span><span class="preventLineBreak" data-dcnode-id="1367"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1369" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/random-international" target="_blank"><span data-dcnode-id="1372" instrument_node="">Random International</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1370"></div></div><span data-dcnode-id="1368" instrument_node="">’s</span></span><span data-dcnode-id="1366" instrument_node=""> </span><em data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Rain Room </span></em><span data-dcnode-id="1363" instrument_node="">(2012) first opened in 2012 at the Barbican in London and drew hours-long queues—“which was entirely unforeseen,” said Hannes Koch and Florian Ortkrass of Random International. The falling water-filled environment became a phenomenon as it traveled to New York, Shanghai, Los Angeles, and Busan, before it was permanently installed at the Sharjah Art Foundation in 2018.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="1325"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1326" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="1334"><div class="article-image" data-dcnode-id="1335"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1345"><img alt="Installation view of Random International, Rain Room, 2012. © Felix Clay. Courtesy of  Barbican Art Gallery." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1358" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FaeRqIH63j8mPenigtrT6yg%25252F7.%252BRain%252BRoom%252BInstallation%252Bimages%252B%2525C2%2525A9%252BFelix%252BClay.%252BRain%252BRoom%252B-%252BRandom%252BInternational%252B2012.%252BCourtesy%252Bof%252BBarbican%252BArt%252BGallery.jpg%26width%3D1200%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1346"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1347"><svg class="expand" data-dcnode-id="1348" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1349" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1350"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1357" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1351" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1352"><g data-dcnode-id="1353" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1356" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1355" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1354" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1336"><div class="Caption__Figcaption-sc-1c6ztax-1 lnWoYD" data-dcnode-id="1337"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1338" font-family="sans"><div data-dcnode-id="1339"><p data-dcnode-id="1340"><span data-dcnode-id="1344" instrument_node="">Installation view of Random International, </span><i data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Rain Room</span></i><span data-dcnode-id="1341" instrument_node="">, 2012. © Felix Clay. Courtesy of  Barbican Art Gallery.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1327" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1328" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1329" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1332" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1333" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 73px;"></div></div><div data-dcnode-id="1330" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1331" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1315"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1316"><div data-dcnode-id="1317"><div class="paragraph" data-dcnode-id="1320"><span data-dcnode-id="1324" instrument_node="">When the </span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/hirshhorn"><span data-dcnode-id="1323" instrument_node="">Hirshhorn Museum and Sculpture Garden</span></a><span data-dcnode-id="1321" instrument_node=""> in Washington, D.C., held an exhibition of Kusama’s “Infinity Mirror Rooms” in 2017, the institution experienced a major boost in attendance that year, welcoming over 1 million visitors. Hirshhorn director Melissa Chiu noted that the exhibition posed an unusual scenario: “It had art-historical merit in re-evaluating the importance of Kusama’s ‘Infinity Mirror Rooms,’ while holding great appeal to a younger demographic,” she said. </span></div><div class="paragraph" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Ironically, these photogenic installations are often about total immersion and the suspension of time—so has our appetite for Instagramming killed the artists’ intentions? Or is the trend a good thing, if it gets more people interacting with contemporary art?</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1310"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1311"><div data-dcnode-id="1312"><h1 data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">The art world embraced craft.</span></h1></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 fKwfmr" data-dcnode-id="1276"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1277" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="1285"><div class="article-image" data-dcnode-id="1286"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1296"><img alt="Liza Lou, Kitchen, 1991-96. © Liza Lou. Photograph by Tom Powel. Courtesy of the Whitney Museum of American Art, New York." class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1309" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fartsy-media-uploads.s3.amazonaws.com%252FPtb1Cu71yFBW1H_4_dNiYg%25252F2008_339a-x_Lou%252B%2525281%252529.jpg%26width%3D1200%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1297"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1298"><svg class="expand" data-dcnode-id="1299" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1300" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1301"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1308" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1302" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1303"><g data-dcnode-id="1304" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1307" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1306" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1305" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div><div class="Caption__CaptionContainer-sc-1c6ztax-0 ebPdXM" data-dcnode-id="1287"><div class="Caption__Figcaption-sc-1c6ztax-1 lnWoYD" data-dcnode-id="1288"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 fPqRkm cKtuFq" color="black60" data-dcnode-id="1289" font-family="sans"><div data-dcnode-id="1290"><p data-dcnode-id="1291"><span data-dcnode-id="1295" instrument_node="">Liza Lou, </span><i data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Kitchen</span></i><span data-dcnode-id="1292" instrument_node="">, 1991-96. © Liza Lou. Photograph by Tom Powel. Courtesy of the Whitney Museum of American Art, New York.</span></p></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1278" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1279" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1280" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1283" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1284" style="position: absolute; left: 0px; top: 0px; width: 691px; height: 115px;"></div></div><div data-dcnode-id="1281" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1282" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1229"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1230"><div data-dcnode-id="1231"><div class="paragraph" data-dcnode-id="1261"><span data-dcnode-id="1275" instrument_node="">Sewing is at the center of </span><span class="preventLineBreak" data-dcnode-id="1269"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1271" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/billie-zangewa" target="_blank"><span data-dcnode-id="1274" instrument_node="">Billie Zangewa</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1272"></div></div><span data-dcnode-id="1270" instrument_node="">’s</span></span><span data-dcnode-id="1268" instrument_node=""> art practice; she is one of many contemporary artists who employs craft-based techniques in their work. “I chose it as a way to express my identity, by taking a traditionally female pastime and making it into a sophisticated and contemporary form of self-expression,” Zangewa said. In recent years, we’ve seen a widespread embrace of craft practices such as weaving, embroidery, quilting, and throwing clay. These tactile techniques have been celebrated by critics everywhere, from the </span><em data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">New York Times</span></em><span data-dcnode-id="1265" instrument_node=""> to </span><em data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">The Independent</span></em><span data-dcnode-id="1262" instrument_node="">—which speaks, in part, to our increasingly digital world. </span></div><div class="paragraph" data-dcnode-id="1232"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1257" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/joana-choumali" target="_blank"><span data-dcnode-id="1260" instrument_node="">Joana Choumali</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1258"></div></div><span data-dcnode-id="1256" instrument_node="">, the winner of the 2019 Prix Pictet, incorporates embroidery into her photo-based works. “The act of embroidery is like a meditation that brings me at the center of myself,” Choumali said. Both pretty and purposeful, the return of craft has placed greater focus on forgotten legends such as </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1252" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/anni-albers" target="_blank"><span data-dcnode-id="1255" instrument_node="">Anni Albers</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1253"></div></div><span data-dcnode-id="1251" instrument_node="">, and living talents like </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1247" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/sheila-hicks" target="_blank"><span data-dcnode-id="1250" instrument_node="">Sheila Hicks</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1248"></div></div><span data-dcnode-id="1246" instrument_node="">. Just this past fall, the </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/whitneymuseum"><span data-dcnode-id="1245" instrument_node="">Whitney</span></a><span data-dcnode-id="1243" instrument_node=""> mounted “Making Knowing: Craft in Art, 1950–2019,” on view through January 2021. Digging into the museum’s permanent collection, it cements the central, powerful role of craft over the past seven decades, with masterworks like </span><span class="preventLineBreak" data-dcnode-id="1237"><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1239" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/liza-lou" target="_blank"><span data-dcnode-id="1242" instrument_node="">Liza Lou</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1240"></div></div><span data-dcnode-id="1238" instrument_node="">’s</span></span><span data-dcnode-id="1236" instrument_node=""> show-stopping </span><em data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Kitchen </span></em><span data-dcnode-id="1233" instrument_node="">(1991–96)—a mesmerizing, full-scale replica of a suburban kitchen covered in millions of beads.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 cDySXC" data-dcnode-id="1181"><div class="ImageCollection__ImageCollectionContainer-begb1k-0 dOPwwK" data-dcnode-id="1182" style="position: relative;"><div class="ImageCollection__ImageCollectionItem-begb1k-1 olkFv" data-dcnode-id="1190"><div class="Artwork__ArtworkContainer-sc-1v84ce1-1 dZuYiK" data-dcnode-id="1191"><a class="Artwork__ArtworkImageLink-sc-1v84ce1-0 jfiSzX" data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/joana-choumali-everyday-is-enough-series-albahian"><div class="ImageWrapper__StyledImageWrapper-sc-87c4qo-1 cYcqIc" data-dcnode-id="1215"><img alt="Everyday is enough, Series Alba'hian" class="ImageWrapper__BlockImage-sc-87c4qo-2 eDwhZu BlockImage__container" data-dcnode-id="1228" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d7hftxdivxxvm.cloudfront.net/%3Fresize_to%3Dwidth%26src%3Dhttps%253A%252F%252Fd32dm0rphc51dk.cloudfront.net%252FpOIjHA6JEEMY8YYj1DMQiA%252Flarger.jpg%26width%3D1200%26quality%3D80&amp;raw" width="100%"><div class="ImageWrapper__Fullscreen-sc-87c4qo-0 icJHaJ" data-dcnode-id="1216"><div class="ViewFullscreen__ViewFullscreenLink-g6oqwx-0 kZjUQB" data-dcnode-id="1217"><svg class="expand" data-dcnode-id="1218" version="1.1" viewBox="0 0 27 27" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1219" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="1220"><circle cx="13.9575195" cy="13.0588379" data-dcnode-id="1227" fill="#000000" fill-rule="nonzero" r="13"></circle><g data-dcnode-id="1221" stroke="#FFFFFF" transform="translate(8.000000, 7.000000)"><g data-dcnode-id="1222"><g data-dcnode-id="1223" transform="translate(0.382532, 0.382532)"><polyline data-dcnode-id="1226" points="4.78165571 0 11.1571966 0 11.1571966 6.37554094"></polyline><polyline data-dcnode-id="1225" points="-1.01881144e-06 4.78165537 6.37553992 4.78165537 6.37553992 11.1571963" transform="translate(3.187769, 7.969426) rotate(-180.000000) translate(-3.187769, -7.969426) "></polyline><path d="M10.360254,0.796942618 L0.796942618,10.360254" data-dcnode-id="1224" stroke-linecap="square"></path></g></g></g></g></g></svg></div></div></div></a><div class="Box-sc-15se88d-0 fPqRkm" color="black60" data-dcnode-id="1192"><div class="Box-sc-15se88d-0 Text-sc-18gcpao-0 ArtworkCaption__StyledArtworkCaption-t0bcvj-2 fPqRkm kGYJIc dQTpUj" color="black60" data-dcnode-id="1193" font-family="sans"><strong class="ArtworkCaption__ArtistNames-t0bcvj-0 hzXsXB" data-dcnode-id="1210"><span class="ArtworkCaption__ArtistName-t0bcvj-1 WhawL" data-dcnode-id="1211"><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/joana-choumali"><span data-dcnode-id="1213" instrument_node="">Joana Choumali</span></a></span></strong><div data-dcnode-id="1194"><div class="LinesEllipsis" data-dcnode-id="1200"><div data-dcnode-id="1201"><span data-dcnode-id="1202"><span class="title" data-dcnode-id="1207"><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artwork/joana-choumali-everyday-is-enough-series-albahian"><span data-dcnode-id="1209" instrument_node="">Everyday is enough, Series Alba'hian</span></a></span><span data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">, </span></span><span class="date" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">2019</span></span></span></div></div><div class="LinesEllipsis" data-dcnode-id="1195"><div data-dcnode-id="1196"><span data-dcnode-id="1197"><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/gallery-1957"><span data-dcnode-id="1199" instrument_node="">Gallery 1957</span></a></span></div></div></div></div></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="1183" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1184" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="1185" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="1188" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1189" style="position: absolute; left: 0px; top: 0px; width: 791px; height: 107px;"></div></div><div data-dcnode-id="1186" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="1187" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1105"><div class="StyledText-sc-1ysl1h-0 cyAUKa article__text-section" color="black" data-dcnode-id="1106"><div data-dcnode-id="1107"><div class="paragraph" data-dcnode-id="1170"><span data-dcnode-id="1180" instrument_node="">Proof of the art world’s continued interest in weaving and sewing practices was evident at the opening of the </span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/10/17/arts/design/textile-show-moma.html"><span data-dcnode-id="1179" instrument_node="">new MoMA</span></a><span data-dcnode-id="1177" instrument_node="">, and at Frieze London in 2019, where </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/para-site"><span data-dcnode-id="1176" instrument_node="">Para Site</span></a><span data-dcnode-id="1174" instrument_node=""> director Cosmin Costinas curated a special section of woven works. Costinas </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frieze.com/fair-programme/woven"><span data-dcnode-id="1173" instrument_node="">noted</span></a><span data-dcnode-id="1171" instrument_node=""> that textiles can take on a political punch, making visible “the histories and continuous legacies of the colonial catastrophe, from the economies around textiles to current forms of exploitation and political complicity.”</span></div><div class="paragraph" data-dcnode-id="1108"><span data-dcnode-id="1169" instrument_node="">Enthusiasm for ceramics has been even more prominent as audiences continue to gravitate towards works by California Clay Movement artists </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1165" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/ken-price" target="_blank"><span data-dcnode-id="1168" instrument_node="">Ken Price</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1166"></div></div><span data-dcnode-id="1164" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1160" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/peter-voulkos" target="_blank"><span data-dcnode-id="1163" instrument_node="">Peter Voulkos</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1161"></div></div><span data-dcnode-id="1159" instrument_node="">, and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1155" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/ron-nagle" target="_blank"><span data-dcnode-id="1158" instrument_node="">Ron Nagle</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1156"></div></div><span data-dcnode-id="1154" instrument_node="">, as well as </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1150" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/betty-woodman" target="_blank"><span data-dcnode-id="1153" instrument_node="">Betty Woodman</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1151"></div></div><span data-dcnode-id="1149" instrument_node=""> (who passed away in 2018). Generations of younger artists, like </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1145" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/francesca-dimattio" target="_blank"><span data-dcnode-id="1148" instrument_node="">Francesca diMattio</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1146"></div></div><span data-dcnode-id="1144" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1140" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/jesse-wine" target="_blank"><span data-dcnode-id="1143" instrument_node="">Jesse Wine</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1141"></div></div><span data-dcnode-id="1139" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1135" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/aneta-regel" target="_blank"><span data-dcnode-id="1138" instrument_node="">Aneta Regel</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1136"></div></div><span data-dcnode-id="1134" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1130" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/woody-de-othello" target="_blank"><span data-dcnode-id="1133" instrument_node="">Woody De Othello</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1131"></div></div><span data-dcnode-id="1129" instrument_node="">, and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1125" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/julia-haft-candell" target="_blank"><span data-dcnode-id="1128" instrument_node="">Julia Haft-Candell</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1126"></div></div><span data-dcnode-id="1124" instrument_node=""> have forged their own paths; while others like </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1120" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/arlene-shechet" target="_blank"><span data-dcnode-id="1123" instrument_node="">Arlene Shechet</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1121"></div></div><span data-dcnode-id="1119" instrument_node="">, </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1115" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/shio-kusaka" target="_blank"><span data-dcnode-id="1118" instrument_node="">Shio Kusaka</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1116"></div></div><span data-dcnode-id="1114" instrument_node="">, and </span><div class="LinkWithTooltip__Link-sc-1omtxql-2 kjGACn" data-dcnode-id="1110" data-test="linkWithTooltip"><a class="LinkWithTooltip__PrimaryLink-sc-1omtxql-0 cIeaiL" color="black" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsy.net/artist/sterling-ruby" target="_blank"><span data-dcnode-id="1113" instrument_node="">Sterling Ruby</span></a><div class="LinkWithTooltip__FadeContainer-sc-1omtxql-1 bidaNF" data-dcnode-id="1111"></div></div><span data-dcnode-id="1109" instrument_node=""> have brought the medium into blue-chip galleries.</span></div></div></div></div><div class="SectionContainer-sc-1v7xsxq-0 bKvELx" data-dcnode-id="1086"><div class="ImageSetPreview__ImageSetContainer-sc-1pp4y1-0 dQlGLA" data-dcnode-id="1087"><div class="Box-sc-
