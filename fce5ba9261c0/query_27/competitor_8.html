</span><li data-dcnode-id="6413"><a data-dcnode-id="6417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sonia_Sanchez" title="Sonia Sanchez"><span data-dcnode-id="6418" instrument_node="">Sonia Sanchez</span></a><sup class="reference" data-dcnode-id="6414" id="cite_ref-Kaluma2019_2-5"><a data-dcnode-id="6415" href="#cite_note-Kaluma2019-2"><span data-dcnode-id="6416" instrument_node="">[2]</span></a></sup></li></ul><span data-dcnode-id="6411" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="6406" instrument_node="">
</span><p data-dcnode-id="6378"><span data-dcnode-id="6405" instrument_node="">The </span><b data-dcnode-id="6403"><span data-dcnode-id="6404" instrument_node="">Black Arts Movement</span></b><span data-dcnode-id="6402" instrument_node=""> (</span><b data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">BAM</span></b><span data-dcnode-id="6399" instrument_node="">) was an </span><a data-dcnode-id="6397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African_Americans" title="African Americans"><span data-dcnode-id="6398" instrument_node="">African American</span></a><span data-dcnode-id="6396" instrument_node="">-led </span><a data-dcnode-id="6394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_movement" title="Art movement"><span data-dcnode-id="6395" instrument_node="">art movement</span></a><span data-dcnode-id="6393" instrument_node="">, active during the 1960s and 1970s.</span><sup class="reference" data-dcnode-id="6390" id="cite_ref-3"><a data-dcnode-id="6391" href="#cite_note-3"><span data-dcnode-id="6392" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6389" instrument_node=""> Through activism and art, BAM created new </span><a data-dcnode-id="6387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_institution" title="Cultural institution"><span data-dcnode-id="6388" instrument_node="">cultural institutions</span></a><span data-dcnode-id="6386" instrument_node=""> and conveyed a message of </span><a data-dcnode-id="6384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_pride" title="Black pride"><span data-dcnode-id="6385" instrument_node="">black pride</span></a><span data-dcnode-id="6383" instrument_node="">.</span><sup class="reference" data-dcnode-id="6380" id="cite_ref-:5_4-0"><a data-dcnode-id="6381" href="#cite_note-:5-4"><span data-dcnode-id="6382" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6379" instrument_node="">
</span></p><p data-dcnode-id="6353"><span data-dcnode-id="6377" instrument_node="">Famously referred to by </span><a data-dcnode-id="6375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Larry_Neal" title="Larry Neal"><span data-dcnode-id="6376" instrument_node="">Larry Neal</span></a><span data-dcnode-id="6374" instrument_node=""> as the “aesthetic and spiritual sister of </span><a data-dcnode-id="6372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Power" title="Black Power"><span data-dcnode-id="6373" instrument_node="">Black Power</span></a><span data-dcnode-id="6371" instrument_node="">,"</span><sup class="reference" data-dcnode-id="6368" id="cite_ref-:8_5-0"><a data-dcnode-id="6369" href="#cite_note-:8-5"><span data-dcnode-id="6370" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6367" instrument_node=""> BAM applied these same political ideas to </span><a data-dcnode-id="6365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visual_arts" title="Visual arts"><span data-dcnode-id="6366" instrument_node="">art</span></a><span data-dcnode-id="6364" instrument_node=""> and literature.</span><sup class="reference" data-dcnode-id="6361" id="cite_ref-6"><a data-dcnode-id="6362" href="#cite_note-6"><span data-dcnode-id="6363" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6360" instrument_node=""> The movement resisted traditional </span><a data-dcnode-id="6358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_world" title="Western world"><span data-dcnode-id="6359" instrument_node="">Western</span></a><span data-dcnode-id="6357" instrument_node=""> influences and found new ways to present the </span><a data-dcnode-id="6355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African-American_culture" title="African-American culture"><span data-dcnode-id="6356" instrument_node="">black experience</span></a><span data-dcnode-id="6354" instrument_node="">.
</span></p><p data-dcnode-id="6333"><span data-dcnode-id="6352" instrument_node="">The poet and playwright </span><a data-dcnode-id="6350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amiri_Baraka" title="Amiri Baraka"><span data-dcnode-id="6351" instrument_node="">Amiri Baraka</span></a><span data-dcnode-id="6349" instrument_node=""> is widely recognized as the founder of BAM.</span><sup class="reference" data-dcnode-id="6346" id="cite_ref-7"><a data-dcnode-id="6347" href="#cite_note-7"><span data-dcnode-id="6348" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6345" instrument_node=""> In 1965, he established the  Black Arts Repertory Theatre School (BART/S) in </span><a data-dcnode-id="6343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harlem" title="Harlem"><span data-dcnode-id="6344" instrument_node="">Harlem</span></a><span data-dcnode-id="6342" instrument_node="">.</span><sup class="reference" data-dcnode-id="6339" id="cite_ref-8"><a data-dcnode-id="6340" href="#cite_note-8"><span data-dcnode-id="6341" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6338" instrument_node=""> Baraka's example inspired many others to create organizations across the United States.</span><sup class="reference" data-dcnode-id="6335" id="cite_ref-:5_4-1"><a data-dcnode-id="6336" href="#cite_note-:5-4"><span data-dcnode-id="6337" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6334" instrument_node=""> While these organizations were short-lived, their work has had a lasting influence.
</span></p><span data-dcnode-id="6332" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="6131"><div class="thumbinner" data-dcnode-id="6132" style="width:222px;"><a class="image" data-dcnode-id="6147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJames_Baldwin_4_Allan_Warren.jpg"><img alt="" class="thumbimage" data-dcnode-id="6148" data-file-height="3099" data-file-width="2057" decoding="async" height="331" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/James_Baldwin_4_Allan_Warren.jpg/220px-James_Baldwin_4_Allan_Warren.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/James_Baldwin_4_Allan_Warren.jpg/330px-James_Baldwin_4_Allan_Warren.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c2/James_Baldwin_4_Allan_Warren.jpg/440px-James_Baldwin_4_Allan_Warren.jpg 2x" width="220"></a><span data-dcnode-id="6146" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6133"><div class="magnify" data-dcnode-id="6144"><a class="internal" data-dcnode-id="6145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJames_Baldwin_4_Allan_Warren.jpg" title="Enlarge"></a></div><span data-dcnode-id="6143" instrument_node="">Novelist </span><a data-dcnode-id="6141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Baldwin" title="James Baldwin"><span data-dcnode-id="6142" instrument_node="">James Baldwin</span></a><span data-dcnode-id="6140" instrument_node=""> on the </span><a data-dcnode-id="6138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_Memorial" title="Albert Memorial"><span data-dcnode-id="6139" instrument_node="">Albert Memorial</span></a><span data-dcnode-id="6137" instrument_node="">, </span><a data-dcnode-id="6135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kensington_Gardens" title="Kensington Gardens"><span data-dcnode-id="6136" instrument_node="">Kensington Gardens</span></a><span data-dcnode-id="6134" instrument_node="">, London</span></div></div></div><span data-dcnode-id="6130" instrument_node="">
</span><p data-dcnode-id="6111"><span data-dcnode-id="6129" instrument_node="">African Americans had always made valuable artistic contributions to American culture. However, due to brutalities of </span><a data-dcnode-id="6127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery_in_the_United_States" title="Slavery in the United States"><span data-dcnode-id="6128" instrument_node="">slavery</span></a><span data-dcnode-id="6126" instrument_node=""> and the systemic racism of </span><a data-dcnode-id="6124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Racism_in_the_United_States" title="Racism in the United States"><span data-dcnode-id="6125" instrument_node="">Jim Crow</span></a><span data-dcnode-id="6123" instrument_node="">, these contributions often went unrecognised.</span><sup class="reference" data-dcnode-id="6120" id="cite_ref-9"><a data-dcnode-id="6121" href="#cite_note-9"><span data-dcnode-id="6122" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6119" instrument_node=""> Despite continued oppression, African-American artists continued to create literature and art that would reflect their experiences. A high-point for these artists was the </span><a data-dcnode-id="6117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harlem_Renaissance" title="Harlem Renaissance"><span data-dcnode-id="6118" instrument_node="">Harlem Renaissance</span></a><span data-dcnode-id="6116" instrument_node="">—a literary era that spotlighted black people.</span><sup class="reference" data-dcnode-id="6113" id="cite_ref-10"><a data-dcnode-id="6114" href="#cite_note-10"><span data-dcnode-id="6115" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6112" instrument_node="">
</span></p><span data-dcnode-id="6110" instrument_node="">
</span><h3 data-dcnode-id="6100"><span class="mw-headline" data-dcnode-id="6108" id="Harlem_Renaissance"><span data-dcnode-id="6109" instrument_node="">Harlem Renaissance</span></span><span class="mw-editsection" data-dcnode-id="6101"><span class="mw-editsection-bracket" data-dcnode-id="6106"><span data-dcnode-id="6107" instrument_node="">[</span></span><a data-dcnode-id="6104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D2" title="Edit section: Harlem Renaissance"><span data-dcnode-id="6105" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6102"><span data-dcnode-id="6103" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6099" instrument_node="">
</span><p data-dcnode-id="6083"><span data-dcnode-id="6098" instrument_node="">There are many parallels that can be made between the Harlem Renaissance and the Black Arts Movement. The link is so strong, in fact, that some scholars refer to the Black Arts Movement era as the Second Renaissance.</span><sup class="reference" data-dcnode-id="6095" id="cite_ref-:7_11-0"><a data-dcnode-id="6096" href="#cite_note-:7-11"><span data-dcnode-id="6097" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6094" instrument_node=""> One sees this connection clearly when reading </span><a data-dcnode-id="6092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Langston_Hughes" title="Langston Hughes"><span data-dcnode-id="6093" instrument_node="">Langston Hughes</span></a><span data-dcnode-id="6091" instrument_node="">'s </span><i data-dcnode-id="6089"><span data-dcnode-id="6090" instrument_node="">The Negro Artist and the Racial Mountain</span></i><span data-dcnode-id="6088" instrument_node=""> (1926). Hughes's seminal essay advocates that black writers resist external attempts to control their art, arguing instead that the “truly great” black artist will be the one who can fully embrace and freely express his blackness.</span><sup class="reference" data-dcnode-id="6085" id="cite_ref-:7_11-1"><a data-dcnode-id="6086" href="#cite_note-:7-11"><span data-dcnode-id="6087" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6084" instrument_node="">
</span></p><p data-dcnode-id="6070"><span data-dcnode-id="6082" instrument_node="">Yet, the Harlem Renaissance lacked many of the radical political stances that defined BAM.</span><sup class="reference" data-dcnode-id="6079" id="cite_ref-12"><a data-dcnode-id="6080" href="#cite_note-12"><span data-dcnode-id="6081" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6078" instrument_node=""> Inevitably, the Renaissance, and many of its ideas, failed to survive the </span><a data-dcnode-id="6076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression_in_the_United_States" title="Great Depression in the United States"><span data-dcnode-id="6077" instrument_node="">Great Depression</span></a><span data-dcnode-id="6075" instrument_node="">.</span><sup class="reference" data-dcnode-id="6072" id="cite_ref-13"><a data-dcnode-id="6073" href="#cite_note-13"><span data-dcnode-id="6074" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6071" instrument_node="">
</span></p><span data-dcnode-id="6069" instrument_node="">
</span><h3 data-dcnode-id="6059"><span class="mw-headline" data-dcnode-id="6067" id="Civil_Rights_Movement"><span data-dcnode-id="6068" instrument_node="">Civil Rights Movement</span></span><span class="mw-editsection" data-dcnode-id="6060"><span class="mw-editsection-bracket" data-dcnode-id="6065"><span data-dcnode-id="6066" instrument_node="">[</span></span><a data-dcnode-id="6063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D3" title="Edit section: Civil Rights Movement"><span data-dcnode-id="6064" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6061"><span data-dcnode-id="6062" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6058" instrument_node="">
</span><p data-dcnode-id="6037"><span data-dcnode-id="6057" instrument_node="">During the </span><a class="mw-redirect" data-dcnode-id="6055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_era" title="Civil rights era"><span data-dcnode-id="6056" instrument_node="">Civil Rights era</span></a><span data-dcnode-id="6054" instrument_node="">, activists paid more and more attention to the political uses of art. The contemporary work of those like </span><a data-dcnode-id="6052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Baldwin" title="James Baldwin"><span data-dcnode-id="6053" instrument_node="">James Baldwin</span></a><span data-dcnode-id="6051" instrument_node=""> and </span><a data-dcnode-id="6049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chester_Himes" title="Chester Himes"><span data-dcnode-id="6050" instrument_node="">Chester Himes</span></a><span data-dcnode-id="6048" instrument_node=""> would show the possibility of creating a new 'black aesthetic'. A number of art groups were established during this period, such as the </span><a data-dcnode-id="6046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Umbra_%28poets%29" title="Umbra (poets)"><span data-dcnode-id="6047" instrument_node="">Umbra Poets</span></a><span data-dcnode-id="6045" instrument_node=""> and the </span><a data-dcnode-id="6043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spiral_%28arts_alliance%29" title="Spiral (arts alliance)"><span data-dcnode-id="6044" instrument_node="">Spiral Arts Alliance</span></a><span data-dcnode-id="6042" instrument_node="">, which can be seen as precursors to BAM.</span><sup class="reference" data-dcnode-id="6039" id="cite_ref-14"><a data-dcnode-id="6040" href="#cite_note-14"><span data-dcnode-id="6041" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6038" instrument_node="">
</span></p><p data-dcnode-id="6001"><span data-dcnode-id="6036" instrument_node="">Civil Rights activists were also interested in creating black-owned media outlets, establishing journals (such as </span><i data-dcnode-id="6032"><a data-dcnode-id="6034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedomways" title="Freedomways"><span data-dcnode-id="6035" instrument_node="">Freedomways</span></a><span data-dcnode-id="6033" instrument_node="">, Black Dialogue</span></i><span data-dcnode-id="6031" instrument_node="">, </span><i data-dcnode-id="6029"><span data-dcnode-id="6030" instrument_node="">The Liberator</span></i><span data-dcnode-id="6028" instrument_node=""> </span><i data-dcnode-id="6023"><span data-dcnode-id="6027" instrument_node="">, </span><a data-dcnode-id="6025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Black_Scholar" title="The Black Scholar"><span data-dcnode-id="6026" instrument_node="">The Black Scholar</span></a><span data-dcnode-id="6024" instrument_node=""> and Soul Book</span></i><span data-dcnode-id="6022" instrument_node="">) and publishing houses (such as </span><a data-dcnode-id="6020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dudley_Randall" title="Dudley Randall"><span data-dcnode-id="6021" instrument_node="">Dudley Randall</span></a><span data-dcnode-id="6019" instrument_node="">'s </span><a data-dcnode-id="6017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Broadside_Lotus_Press" title="Broadside Lotus Press"><span data-dcnode-id="6018" instrument_node="">Broadside Press</span></a><span data-dcnode-id="6016" instrument_node=""> and </span><a data-dcnode-id="6014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_World_Press" title="Third World Press"><span data-dcnode-id="6015" instrument_node="">Third World Press</span></a><span data-dcnode-id="6013" instrument_node="">.)</span><sup class="reference" data-dcnode-id="6010" id="cite_ref-:5_4-2"><a data-dcnode-id="6011" href="#cite_note-:5-4"><span data-dcnode-id="6012" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6009" instrument_node=""> It was through these channels that BAM would eventually spread its art, literature, and political messages.</span><sup class="reference" data-dcnode-id="6006" id="cite_ref-Smethurst,_James_E_2005_15-0"><a data-dcnode-id="6007" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="6008" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="6003" id="cite_ref-:5_4-3"><a data-dcnode-id="6004" href="#cite_note-:5-4"><span data-dcnode-id="6005" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6002" instrument_node="">
</span></p><span data-dcnode-id="6000" instrument_node="">
</span><h2 data-dcnode-id="5990"><span class="mw-headline" data-dcnode-id="5998" id="Developments"><span data-dcnode-id="5999" instrument_node="">Developments</span></span><span class="mw-editsection" data-dcnode-id="5991"><span class="mw-editsection-bracket" data-dcnode-id="5996"><span data-dcnode-id="5997" instrument_node="">[</span></span><a data-dcnode-id="5994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D4" title="Edit section: Developments"><span data-dcnode-id="5995" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5992"><span data-dcnode-id="5993" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5989" instrument_node="">
</span><p data-dcnode-id="5972"><span data-dcnode-id="5988" instrument_node="">The beginnings of the Black Arts Movement may be traced to 1965, when Amiri Baraka, at that time still known as Leroi Jones, moved uptown to establish the Black Arts Repertory Theatre/School (BARTS) following the assassination of Malcolm X.</span><sup class="reference" data-dcnode-id="5985" id="cite_ref-:6_16-0"><a data-dcnode-id="5986" href="#cite_note-:6-16"><span data-dcnode-id="5987" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5984" instrument_node=""> Rooted in the </span><a data-dcnode-id="5982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nation_of_Islam" title="Nation of Islam"><span data-dcnode-id="5983" instrument_node="">Nation of Islam</span></a><span data-dcnode-id="5981" instrument_node="">, the Black Power movement and the Civil Rights Movement, the Black Arts Movement grew out of a changing political and cultural climate in which Black artists attempted to create politically engaged work that explored the African American cultural and historical experience.</span><sup class="reference" data-dcnode-id="5978" id="cite_ref-uoooav_17-0"><a data-dcnode-id="5979" href="#cite_note-uoooav-17"><span data-dcnode-id="5980" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5977" instrument_node=""> Black artists and intellectuals such as Baraka made it their project to reject older political, cultural, and artistic traditions.</span><sup class="reference" data-dcnode-id="5974" id="cite_ref-Smethurst,_James_E_2005_15-1"><a data-dcnode-id="5975" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="5976" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5973" instrument_node="">
</span></p><p data-dcnode-id="5958"><span data-dcnode-id="5971" instrument_node="">Although the success of sit-ins and public demonstrations of the Black student movement in the 1960s may have "inspired black intellectuals, artists, and political activists to form politicized cultural groups,"</span><sup class="reference" data-dcnode-id="5968" id="cite_ref-Smethurst,_James_E_2005_15-2"><a data-dcnode-id="5969" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="5970" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5967" instrument_node=""> many Black Arts activists rejected the non-militant integrational ideologies of the Civil Rights Movement and instead favored those of the Black Liberation Struggle, which emphasized "self-determination through self-reliance and Black control of significant businesses, organization, agencies, and institutions."</span><sup class="reference" data-dcnode-id="5964" id="cite_ref-18"><a data-dcnode-id="5965" href="#cite_note-18"><span data-dcnode-id="5966" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5963" instrument_node=""> According to the Academy of American Poets, "African American artists within the movement sought to create politically engaged work that explored the African American cultural and historical experience." The importance that the movement placed on Black autonomy is apparent through the creation of institutions such as the Black Arts Repertoire Theatre School (BARTS), created in the spring of 1964 by Baraka and other Black artists. The opening of BARTS in New York City often overshadow the growth of other radical Black Arts groups and institutions all over the United States. In fact, transgressional and international networks, those of various Left and nationalist (and Left nationalist) groups and their supports, existed far before the movement gained popularity.</span><sup class="reference" data-dcnode-id="5960" id="cite_ref-Smethurst,_James_E_2005_15-3"><a data-dcnode-id="5961" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="5962" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5959" instrument_node=""> Although the creation of BARTS did indeed catalyze the spread of other Black Arts institutions and the Black Arts movement across the nation, it was not solely responsible for the growth of the movement.
</span></p><p data-dcnode-id="5952"><span data-dcnode-id="5957" instrument_node="">Although the Black Arts Movement was a time filled with black success and artistic progress, the movement also faced social and racial ridicule. The leaders and artists involved called for Black Art to define itself and speak for itself from the security of its own institutions. For many of the contemporaries the idea that somehow black people could express themselves through institutions of their own creation and with ideas whose validity was confirmed by their own interests and measures was absurd.</span><sup class="reference" data-dcnode-id="5954" id="cite_ref-19"><a data-dcnode-id="5955" href="#cite_note-19"><span data-dcnode-id="5956" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5953" instrument_node="">
</span></p><p data-dcnode-id="5942"><span data-dcnode-id="5951" instrument_node="">While it is easy to assume that the movement began solely in the Northeast, it actually started out as "separate and distinct local initiatives across a wide geographic area," eventually coming together to form the broader national movement.</span><sup class="reference" data-dcnode-id="5948" id="cite_ref-Smethurst,_James_E_2005_15-4"><a data-dcnode-id="5949" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="5950" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5947" instrument_node=""> New York City is often referred to as the "birthplace" of the Black Arts Movement, because it was home to many revolutionary Black artists and activists. However, the geographical diversity of the movement opposes the misconception that New York (and Harlem, especially) was the primary site of the movement.</span><sup class="reference" data-dcnode-id="5944" id="cite_ref-Smethurst,_James_E_2005_15-5"><a data-dcnode-id="5945" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="5946" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5943" instrument_node="">
</span></p><p data-dcnode-id="5926"><span data-dcnode-id="5941" instrument_node="">In its beginning states, the movement came together largely through printed media. Journals such as </span><i data-dcnode-id="5939"><span data-dcnode-id="5940" instrument_node="">Liberator</span></i><span data-dcnode-id="5938" instrument_node="">, </span><i data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">The Crusader</span></i><span data-dcnode-id="5935" instrument_node="">, and </span><i data-dcnode-id="5932"><a data-dcnode-id="5933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedomways" title="Freedomways"><span data-dcnode-id="5934" instrument_node="">Freedomways</span></a></i><span data-dcnode-id="5931" instrument_node=""> created "a national community in which ideology and aesthetics were debated and a wide range of approaches to African-American artistic style and subject displayed."</span><sup class="reference" data-dcnode-id="5928" id="cite_ref-Smethurst,_James_E_2005_15-6"><a data-dcnode-id="5929" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="5930" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5927" instrument_node=""> These publications tied communities outside of large Black Arts centers to the movement and gave the general black public access to these sometimes exclusive circles.
</span></p><p data-dcnode-id="5884"><span data-dcnode-id="5925" instrument_node="">As a literary movement, Black Arts had its roots in groups such as the </span><a class="mw-redirect" data-dcnode-id="5923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Umbra_poets" title="Umbra poets"><span data-dcnode-id="5924" instrument_node="">Umbra Workshop</span></a><span data-dcnode-id="5922" instrument_node="">. Umbra (1962) was a collective of young Black writers based in Manhattan's Lower East Side; major members were writers </span><a data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steve_Cannon_%28writer%29" title="Steve Cannon (writer)"><span data-dcnode-id="5921" instrument_node="">Steve Cannon</span></a><span data-dcnode-id="5919" instrument_node="">,</span><sup class="reference" data-dcnode-id="5916" id="cite_ref-20"><a data-dcnode-id="5917" href="#cite_note-20"><span data-dcnode-id="5918" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5915" instrument_node=""> </span><a data-dcnode-id="5913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Dent_%28writer%29" title="Thomas Dent (writer)"><span data-dcnode-id="5914" instrument_node="">Tom Dent</span></a><span data-dcnode-id="5912" instrument_node="">, </span><a data-dcnode-id="5910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al_Haynes" title="Al Haynes"><span data-dcnode-id="5911" instrument_node="">Al Haynes</span></a><span data-dcnode-id="5909" instrument_node="">, </span><a data-dcnode-id="5907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Henderson_%28poet%29" title="David Henderson (poet)"><span data-dcnode-id="5908" instrument_node="">David Henderson</span></a><span data-dcnode-id="5906" instrument_node="">, </span><a data-dcnode-id="5904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calvin_C._Hernton" title="Calvin C. Hernton"><span data-dcnode-id="5905" instrument_node="">Calvin C. Hernton</span></a><span data-dcnode-id="5903" instrument_node="">, Joe Johnson, </span><a class="mw-redirect" data-dcnode-id="5901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norman_Pritchard_%28poet%29" title="Norman Pritchard (poet)"><span data-dcnode-id="5902" instrument_node="">Norman Pritchard</span></a><span data-dcnode-id="5900" instrument_node="">, </span><a data-dcnode-id="5898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lennox_Raphael" title="Lennox Raphael"><span data-dcnode-id="5899" instrument_node="">Lennox Raphael</span></a><span data-dcnode-id="5897" instrument_node="">, </span><a data-dcnode-id="5895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ishmael_Reed" title="Ishmael Reed"><span data-dcnode-id="5896" instrument_node="">Ishmael Reed</span></a><span data-dcnode-id="5894" instrument_node="">, </span><a data-dcnode-id="5892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lorenzo_Thomas_%28poet%29" title="Lorenzo Thomas (poet)"><span data-dcnode-id="5893" instrument_node="">Lorenzo Thomas</span></a><span data-dcnode-id="5891" instrument_node="">, James Thompson, </span><a data-dcnode-id="5889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Askia_M._Tour%25C3%25A9" title="Askia M. Touré"><span data-dcnode-id="5890" instrument_node="">Askia M. Touré</span></a><span data-dcnode-id="5888" instrument_node=""> (Roland Snellings; also a visual artist), Brenda Walcott, and musician-writer </span><a data-dcnode-id="5886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Archie_Shepp" title="Archie Shepp"><span data-dcnode-id="5887" instrument_node="">Archie Shepp</span></a><span data-dcnode-id="5885" instrument_node="">. Touré, a major shaper of "cultural nationalism," directly influenced Jones. Along with Umbra writer Charles Patterson and Charles's brother, William Patterson, Touré joined Jones, Steve Young, and others at BARTS.
</span></p><p data-dcnode-id="5861"><span data-dcnode-id="5883" instrument_node="">Umbra, which produced </span><i data-dcnode-id="5881"><span data-dcnode-id="5882" instrument_node="">Umbra Magazine</span></i><span data-dcnode-id="5880" instrument_node="">, was the first post-civil rights Black literary group to make an impact as radical in the sense of establishing their own voice distinct from, and sometimes at odds with, the prevailing white literary establishment. The attempt to merge a black-oriented activist thrust with a primarily artistic orientation produced a classic split in Umbra between those who wanted to be activists and those who thought of themselves as primarily writers, though to some extent all members shared both views. Black writers have always had to face the issue of whether their work was primarily political or aesthetic. Moreover, Umbra itself had evolved out of similar circumstances: in 1960 a Black nationalist literary organization, On Guard for Freedom, had been founded on the Lower East Side by </span><a data-dcnode-id="5878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calvin_Hicks" title="Calvin Hicks"><span data-dcnode-id="5879" instrument_node="">Calvin Hicks</span></a><span data-dcnode-id="5877" instrument_node="">. Its members included Nannie and Walter Bowe, </span><a data-dcnode-id="5875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harold_Cruse" title="Harold Cruse"><span data-dcnode-id="5876" instrument_node="">Harold Cruse</span></a><span data-dcnode-id="5874" instrument_node=""> (who was then working on </span><i data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">The Crisis of the Negro Intellectual</span></i><span data-dcnode-id="5871" instrument_node="">, 1967), Tom Dent, Rosa Guy, Joe Johnson, LeRoi Jones, and </span><a data-dcnode-id="5869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarah_E._Wright" title="Sarah E. Wright"><span data-dcnode-id="5870" instrument_node="">Sarah E. Wright</span></a><span data-dcnode-id="5868" instrument_node="">, and others. On Guard was active in a famous protest at the United Nations of the American-sponsored </span><a data-dcnode-id="5866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bay_of_Pigs" title="Bay of Pigs"><span data-dcnode-id="5867" instrument_node="">Bay of Pigs</span></a><span data-dcnode-id="5865" instrument_node=""> Cuban invasion and was active in support of the Congolese liberation leader </span><a data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patrice_Lumumba" title="Patrice Lumumba"><span data-dcnode-id="5864" instrument_node="">Patrice Lumumba</span></a><span data-dcnode-id="5862" instrument_node="">. From On Guard, Dent, Johnson, and Walcott along with Hernton, Henderson, and Touré established Umbra.
</span></p><span data-dcnode-id="5860" instrument_node="">
</span><h3 data-dcnode-id="5850"><span class="mw-headline" data-dcnode-id="5858" id="Authors"><span data-dcnode-id="5859" instrument_node="">Authors</span></span><span class="mw-editsection" data-dcnode-id="5851"><span class="mw-editsection-bracket" data-dcnode-id="5856"><span data-dcnode-id="5857" instrument_node="">[</span></span><a data-dcnode-id="5854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D5" title="Edit section: Authors"><span data-dcnode-id="5855" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5852"><span data-dcnode-id="5853" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5849" instrument_node="">
</span><p data-dcnode-id="5820"><span data-dcnode-id="5848" instrument_node="">Another formation of black writers at that time was the </span><a data-dcnode-id="5846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harlem_Writers_Guild" title="Harlem Writers Guild"><span data-dcnode-id="5847" instrument_node="">Harlem Writers Guild</span></a><span data-dcnode-id="5845" instrument_node="">, led by </span><a class="mw-redirect" data-dcnode-id="5843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_O._Killens" title="John O. Killens"><span data-dcnode-id="5844" instrument_node="">John O. Killens</span></a><span data-dcnode-id="5842" instrument_node="">, which included </span><a data-dcnode-id="5840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maya_Angelou" title="Maya Angelou"><span data-dcnode-id="5841" instrument_node="">Maya Angelou</span></a><span data-dcnode-id="5839" instrument_node="">, </span><a data-dcnode-id="5837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean_Carey_Bond" title="Jean Carey Bond"><span data-dcnode-id="5838" instrument_node="">Jean Carey Bond</span></a><span data-dcnode-id="5836" instrument_node="">, </span><a data-dcnode-id="5834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosa_Guy" title="Rosa Guy"><span data-dcnode-id="5835" instrument_node="">Rosa Guy</span></a><span data-dcnode-id="5833" instrument_node="">, and </span><a data-dcnode-id="5831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarah_E._Wright" title="Sarah E. Wright"><span data-dcnode-id="5832" instrument_node="">Sarah Wright</span></a><span data-dcnode-id="5830" instrument_node=""> among others. But the </span><a data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harlem_Writers_Guild" title="Harlem Writers Guild"><span data-dcnode-id="5829" instrument_node="">Harlem Writers Guild</span></a><span data-dcnode-id="5827" instrument_node=""> focused on prose, primarily fiction, which did not have the mass appeal of poetry performed in the dynamic vernacular of the time. Poems could be built around anthems, chants, and political slogans, and thereby used in organizing work, which was not generally the case with novels and short stories. Moreover, the poets could and did publish themselves, whereas greater resources were needed to publish fiction. That Umbra was primarily poetry- and performance-oriented established a significant and classic characteristic of the movement's aesthetics.
When Umbra split up, some members, led by Askia Touré and Al Haynes, moved to Harlem in late 1964 and formed the nationalist-oriented Uptown Writers Movement, which included poets Yusef Rahman, </span><a data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keorapetse_Kgositsile" title="Keorapetse Kgositsile"><span data-dcnode-id="5826" instrument_node="">Keorapetse "Willie" Kgositsile</span></a><span data-dcnode-id="5824" instrument_node=""> from South Africa, and </span><a data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Larry_Neal" title="Larry Neal"><span data-dcnode-id="5823" instrument_node="">Larry Neal</span></a><span data-dcnode-id="5821" instrument_node="">. Accompanied by young "New Music" musicians, they performed poetry all over Harlem. Members of this group joined LeRoi Jones in founding BARTS.
</span></p><p data-dcnode-id="5809"><span data-dcnode-id="5819" instrument_node="">Jones's move to Harlem was short-lived. In December 1965 he returned to his home, Newark (N.J.), and left BARTS in serious disarray. BARTS failed but the Black Arts center concept was irrepressible, mainly because the Black Arts movement was so closely aligned with the then-burgeoning Black Power movement.
The mid-to-late 1960s was a period of intense revolutionary ferment. Beginning in 1964, rebellions in Harlem and Rochester, New York, initiated four years of long hot summers. </span><a class="mw-redirect" data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Watts_Riots" title="Watts Riots"><span data-dcnode-id="5818" instrument_node="">Watts</span></a><span data-dcnode-id="5816" instrument_node="">, Detroit, Newark, Cleveland, and many other cities went up in flames, culminating in </span><a data-dcnode-id="5814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/King_assassination_riots" title="King assassination riots"><span data-dcnode-id="5815" instrument_node="">nationwide explosions</span></a><span data-dcnode-id="5813" instrument_node=""> of resentment and anger following the April 1968 </span><a data-dcnode-id="5811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination_of_Martin_Luther_King_Jr." title="Assassination of Martin Luther King Jr."><span data-dcnode-id="5812" instrument_node="">assassination of Martin Luther King Jr.</span></a><span data-dcnode-id="5810" instrument_node="">
</span></p><p data-dcnode-id="5799"><a data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nathan_Hare" title="Nathan Hare"><span data-dcnode-id="5808" instrument_node="">Nathan Hare</span></a><span data-dcnode-id="5806" instrument_node="">, author of </span><i data-dcnode-id="5804"><span data-dcnode-id="5805" instrument_node="">The Black Anglo-Saxons</span></i><span data-dcnode-id="5803" instrument_node=""> (1965), was the founder of 1960s Black Studies. Expelled from Howard University, Hare moved to San Francisco State University, where the battle to establish a Black Studies department was waged during a five-month strike during the 1968–69 school year. As with the establishment of Black Arts, which included a range of forces, there was broad activity in the Bay Area around Black Studies, including efforts led by poet and professor </span><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarah_Webster_Fabio" title="Sarah Webster Fabio"><span data-dcnode-id="5802" instrument_node="">Sarah Webster Fabio</span></a><span data-dcnode-id="5800" instrument_node=""> at Merrit College.
</span></p><p data-dcnode-id="5785"><span data-dcnode-id="5798" instrument_node="">The initial thrust of Black Arts ideological development came from the </span><a class="mw-redirect" data-dcnode-id="5796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutionary_Action_Movement_%28RAM%29" title="Revolutionary Action Movement (RAM)"><span data-dcnode-id="5797" instrument_node="">Revolutionary Action Movement (RAM)</span></a><span data-dcnode-id="5795" instrument_node="">, a national organization with a strong presence in New York City. Both Touré and Neal were members of RAM. After RAM, the major ideological force shaping the Black Arts movement was the US (as opposed to "them") organization led by </span><a data-dcnode-id="5793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maulana_Karenga" title="Maulana Karenga"><span data-dcnode-id="5794" instrument_node="">Maulana Karenga</span></a><span data-dcnode-id="5792" instrument_node="">. Also ideologically important was </span><a data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elijah_Muhammad" title="Elijah Muhammad"><span data-dcnode-id="5791" instrument_node="">Elijah Muhammad</span></a><span data-dcnode-id="5789" instrument_node="">'s Chicago-based </span><a data-dcnode-id="5787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nation_of_Islam" title="Nation of Islam"><span data-dcnode-id="5788" instrument_node="">Nation of Islam</span></a><span data-dcnode-id="5786" instrument_node="">. These three formations provided both style and conceptual direction for Black Arts artists, including those who were not members of these or any other political organization. Although the Black Arts Movement is often considered a New York-based movement, two of its three major forces were located outside New York City.
</span></p><span data-dcnode-id="5784" instrument_node="">
</span><h3 data-dcnode-id="5774"><span class="mw-headline" data-dcnode-id="5782" id="Locations"><span data-dcnode-id="5783" instrument_node="">Locations</span></span><span class="mw-editsection" data-dcnode-id="5775"><span class="mw-editsection-bracket" data-dcnode-id="5780"><span data-dcnode-id="5781" instrument_node="">[</span></span><a data-dcnode-id="5778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D6" title="Edit section: Locations"><span data-dcnode-id="5779" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5776"><span data-dcnode-id="5777" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5773" instrument_node="">
</span><p data-dcnode-id="5742"><span data-dcnode-id="5772" instrument_node="">As the movement matured, the two major locations of Black Arts' ideological leadership, particularly for literary work, were California's Bay Area because of the </span><i data-dcnode-id="5770"><span data-dcnode-id="5771" instrument_node="">Journal of Black Poetry</span></i><span data-dcnode-id="5769" instrument_node=""> and </span><i data-dcnode-id="5766"><a data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Black_Scholar" title="The Black Scholar"><span data-dcnode-id="5768" instrument_node="">The Black Scholar</span></a></i><span data-dcnode-id="5765" instrument_node="">, and the Chicago–Detroit axis because of </span><i data-dcnode-id="5762"><a class="mw-redirect" data-dcnode-id="5763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Negro_Digest" title="The Negro Digest"><span data-dcnode-id="5764" instrument_node="">Negro Digest/Black World</span></a></i><span data-dcnode-id="5761" instrument_node=""> and </span><a data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_World_Press" title="Third World Press"><span data-dcnode-id="5760" instrument_node="">Third World Press</span></a><span data-dcnode-id="5758" instrument_node=""> in Chicago, and </span><a class="mw-redirect" data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Broadside_Press" title="Broadside Press"><span data-dcnode-id="5757" instrument_node="">Broadside Press</span></a><span data-dcnode-id="5755" instrument_node=""> and </span><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naomi_Long_Madgett" title="Naomi Long Madgett"><span data-dcnode-id="5754" instrument_node="">Naomi Long Madgett</span></a><span data-dcnode-id="5752" instrument_node="">'s Lotus Press in Detroit. The only major Black Arts literary publications to come out of New York were the short-lived (six issues between 1969 and 1972) </span><i data-dcnode-id="5750"><span data-dcnode-id="5751" instrument_node="">Black Theatre</span></i><span data-dcnode-id="5749" instrument_node=""> magazine, published by the </span><a class="mw-redirect" data-dcnode-id="5747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Lafayette_Theatre" title="New Lafayette Theatre"><span data-dcnode-id="5748" instrument_node="">New Lafayette Theatre</span></a><span data-dcnode-id="5746" instrument_node="">, and </span><i data-dcnode-id="5744"><span data-dcnode-id="5745" instrument_node="">Black Dialogue</span></i><span data-dcnode-id="5743" instrument_node="">, which had actually started in San Francisco (1964–68) and relocated to New York (1969–72).
</span></p><p data-dcnode-id="5736"><span data-dcnode-id="5741" instrument_node="">Although the journals and writing of the movement greatly characterized its success, the movement placed a great deal of importance on collective oral and performance art. Public collective performances drew a lot of attention to the movement, and it was often easier to get an immediate response from a collective poetry reading, short play, or street performance than it was from individual performances.</span><sup class="reference" data-dcnode-id="5738" id="cite_ref-Smethurst,_James_E_2005_15-7"><a data-dcnode-id="5739" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="5740" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5737" instrument_node="">
</span></p><p data-dcnode-id="5734"><span data-dcnode-id="5735" instrument_node="">The people involved in the Black Arts Movement used the arts as a way to liberate themselves. The movement served as a catalyst for many different ideas and cultures to come alive. This was a chance for African Americans to express themselves in a way that most would not have expected.
</span></p><p data-dcnode-id="5704"><span data-dcnode-id="5733" instrument_node="">In 1967 LeRoi Jones visited Karenga in Los Angeles and became an advocate of Karenga's philosophy of </span><a class="mw-redirect" data-dcnode-id="5731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kawaida" title="Kawaida"><span data-dcnode-id="5732" instrument_node="">Kawaida</span></a><span data-dcnode-id="5730" instrument_node="">. Kawaida, which produced the "Nguzo Saba" (seven principles), </span><a data-dcnode-id="5728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kwanzaa" title="Kwanzaa"><span data-dcnode-id="5729" instrument_node="">Kwanzaa</span></a><span data-dcnode-id="5727" instrument_node="">, and an emphasis on African names, was a multifaceted, categorized activist philosophy. Jones also met </span><a data-dcnode-id="5725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bobby_Seale" title="Bobby Seale"><span data-dcnode-id="5726" instrument_node="">Bobby Seale</span></a><span data-dcnode-id="5724" instrument_node=""> and </span><a data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eldridge_Cleaver" title="Eldridge Cleaver"><span data-dcnode-id="5723" instrument_node="">Eldridge Cleaver</span></a><span data-dcnode-id="5721" instrument_node=""> and worked with a number of the founding members of the </span><a class="mw-redirect" data-dcnode-id="5719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Panthers" title="Black Panthers"><span data-dcnode-id="5720" instrument_node="">Black Panthers</span></a><span data-dcnode-id="5718" instrument_node="">. Additionally, Askia Touré was a visiting professor at San Francisco State and was to become a leading (and long-lasting) poet as well as, arguably, the most influential poet-professor in the Black Arts movement. Playwright </span><a data-dcnode-id="5716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ed_Bullins" title="Ed Bullins"><span data-dcnode-id="5717" instrument_node="">Ed Bullins</span></a><span data-dcnode-id="5715" instrument_node=""> and poet </span><a data-dcnode-id="5713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marvin_X" title="Marvin X"><span data-dcnode-id="5714" instrument_node="">Marvin X</span></a><span data-dcnode-id="5712" instrument_node=""> had established Black Arts West, and Dingane Joe Goncalves had founded the </span><i data-dcnode-id="5710"><span data-dcnode-id="5711" instrument_node="">Journal of Black Poetry</span></i><span data-dcnode-id="5709" instrument_node=""> (1966). This grouping of Ed Bullins, Dingane Joe Goncalves, LeRoi Jones, Sonia Sanchez, Askia M. Touré, and Marvin X became a major nucleus of Black Arts leadership.</span><sup class="reference" data-dcnode-id="5706" id="cite_ref-21"><a data-dcnode-id="5707" href="#cite_note-21"><span data-dcnode-id="5708" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5705" instrument_node="">
</span></p><p data-dcnode-id="5702"><span data-dcnode-id="5703" instrument_node="">As the movement grew, ideological conflicts arose and eventually became too great for the movement to continue to exist as a large, coherent collective.
</span></p><span data-dcnode-id="5701" instrument_node="">
</span><h3 data-dcnode-id="5691"><span class="mw-headline" data-dcnode-id="5699" id="The_Black_Aesthetic"><span data-dcnode-id="5700" instrument_node="">The Black Aesthetic</span></span><span class="mw-editsection" data-dcnode-id="5692"><span class="mw-editsection-bracket" data-dcnode-id="5697"><span data-dcnode-id="5698" instrument_node="">[</span></span><a data-dcnode-id="5695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D7" title="Edit section: The Black Aesthetic"><span data-dcnode-id="5696" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5693"><span data-dcnode-id="5694" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5690" instrument_node="">
</span><span data-dcnode-id="5550" instrument_node="">
</span><span data-dcnode-id="5339" instrument_node="">
</span><span data-dcnode-id="5274" instrument_node="">
</span><span data-dcnode-id="5176" instrument_node="">
</span><span data-dcnode-id="5107" instrument_node="">
</span><span data-dcnode-id="5058" instrument_node="">
</span><span data-dcnode-id="4932" instrument_node="">
</span><span data-dcnode-id="4864" instrument_node="">
