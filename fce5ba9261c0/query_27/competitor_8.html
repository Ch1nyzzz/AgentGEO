Although The Black Aesthetic was first coined by </span><a data-dcnode-id="4455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Larry_Neal" title="Larry Neal"><span data-dcnode-id="4456" instrument_node="">Larry Neal</span></a><span data-dcnode-id="4454" instrument_node=""> in 1968, across all the discourse, The Black Aesthetic has no overall real definition agreed by all Black Aesthetic theorists.</span><sup class="reference" data-dcnode-id="4451" id="cite_ref-:0_22-0"><a data-dcnode-id="4452" href="#cite_note-:0-22"><span data-dcnode-id="4453" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4450" instrument_node=""> It is loosely defined, without any real consensus besides that the theorists of The Black Aesthetic agree that "art should be used to galvanize the black masses to revolt against their white capitalist oppressors".</span><sup class="reference" data-dcnode-id="4447" id="cite_ref-:1_23-0"><a data-dcnode-id="4448" href="#cite_note-:1-23"><span data-dcnode-id="4449" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4446" instrument_node=""> Pollard also argues in her critique of the Black Arts Movement that The Black Aesthetic "celebrated the African origins of the Black community, championed black urban culture, critiqued Western aesthetics, and encouraged the production and reception of black arts by black people". In </span><i data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">The Black Arts Movement</span></i><span data-dcnode-id="4443" instrument_node=""> by Larry Neal, where the Black Arts Movement is discussed as “aesthetic and spiritual sister of the Black Power concept,” The Black Aesthetic is described by Neal as being the merge of the ideologies of Black Power with the artistic values of African expression.</span><sup class="reference" data-dcnode-id="4440" id="cite_ref-24"><a data-dcnode-id="4441" href="#cite_note-24"><span data-dcnode-id="4442" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4439" instrument_node=""> Larry Neal attests:</span></p><blockquote data-dcnode-id="4432"><p data-dcnode-id="4433"><span data-dcnode-id="4437" instrument_node="">"When we speak of a 'Black aesthetic' several things are meant. First, we assume that there is already in existence the basis for such an aesthetic. Essentially, it consists of an African-American cultural tradition. But this aesthetic is finally, by implication, broader than that tradition. It encompasses most of the usable elements of the Third World culture. The motive behind the Black aesthetic is the destruction of the white thing, the destruction of white ideas, and white ways of looking at the world."</span><sup class="reference" data-dcnode-id="4434" id="cite_ref-ReferenceA_25-0"><a data-dcnode-id="4435" href="#cite_note-ReferenceA-25"><span data-dcnode-id="4436" instrument_node="">[25]</span></a></sup></p></blockquote><p data-dcnode-id="4426"><span data-dcnode-id="4431" instrument_node="">The Black Aesthetic also refers to ideologies and perspectives of art that center on Black culture and life. This Black Aesthetic encouraged the idea of Black separatism, and in trying to facilitate this, hoped to further strengthen black ideals, solidarity, and creativity.</span><sup class="reference" data-dcnode-id="4428" id="cite_ref-26"><a data-dcnode-id="4429" href="#cite_note-26"><span data-dcnode-id="4430" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4427" instrument_node="">
</span></p><p data-dcnode-id="4401"><span data-dcnode-id="4425" instrument_node="">In </span><i data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">The Black Aesthetic</span></i><span data-dcnode-id="4422" instrument_node=""> (1971), Addison Gayle argues that Black artists should work exclusively on uplifting their identity while refusing to appease white folks.</span><sup class="reference" data-dcnode-id="4419" id="cite_ref-:2_27-0"><a data-dcnode-id="4420" href="#cite_note-:2-27"><span data-dcnode-id="4421" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4418" instrument_node=""> The Black Aesthetic work as a "corrective," where black people are not supposed to desire the “ranks of Norman Mailer or a William Styron”.</span><sup class="reference" data-dcnode-id="4415" id="cite_ref-:0_22-1"><a data-dcnode-id="4416" href="#cite_note-:0-22"><span data-dcnode-id="4417" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4414" instrument_node=""> Black people are encouraged by Black artists that take their own Black identity, reshaping and redefining themselves for themselves by themselves via art as a medium.</span><sup class="reference" data-dcnode-id="4411" id="cite_ref-28"><a data-dcnode-id="4412" href="#cite_note-28"><span data-dcnode-id="4413" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4410" instrument_node=""> Hoyt Fuller defines The Black Aesthetic "in terms of the cultural experiences and tendencies expressed in artist’ work"</span><sup class="reference" data-dcnode-id="4407" id="cite_ref-:0_22-2"><a data-dcnode-id="4408" href="#cite_note-:0-22"><span data-dcnode-id="4409" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4406" instrument_node=""> while another meaning of The Black Aesthetic comes from Ron Karenga, who argues for three main characteristics to The Black Aesthetic and Black art itself: functional, collective, and committing. Karenga says, "Black Art must expose the enemy, praise the people, and support the revolution". The notion "art for art’s sake" is killed in the process, binding the Black Aesthetic to the revolutionary struggle, a struggle that is the reasoning behind reclaiming Black art in order to return to African culture and tradition for Black people.</span><sup class="reference" data-dcnode-id="4403" id="cite_ref-29"><a data-dcnode-id="4404" href="#cite_note-29"><span data-dcnode-id="4405" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4402" instrument_node=""> Under Karenga’s definition of The Black Aesthetic, art that doesn’t fight for the Black Revolution isn’t considered as art at all, needed the vital context of social issues as well as an artistic value.
</span></p><p data-dcnode-id="4395"><span data-dcnode-id="4400" instrument_node="">Among these definitions, the central theme that is the underlying connection of the Black Arts, Black Aesthetic, and Black Power movements is then this: the idea of group identity, which is defined by Black artists of organizations as well as their objectives.</span><sup class="reference" data-dcnode-id="4397" id="cite_ref-:2_27-1"><a data-dcnode-id="4398" href="#cite_note-:2-27"><span data-dcnode-id="4399" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4396" instrument_node="">
</span></p><p data-dcnode-id="4370"><span data-dcnode-id="4394" instrument_node="">The narrowed view of The Black Aesthetic, often described as Marxist by critics, brought upon conflicts of the Black Aesthetic and Black Arts Movement as a whole in areas that drove the focus of African culture;</span><sup class="reference" data-dcnode-id="4391" id="cite_ref-30"><a data-dcnode-id="4392" href="#cite_note-30"><span data-dcnode-id="4393" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4390" instrument_node=""> In </span><i data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">The Black Arts Movement and Its Critics</span></i><span data-dcnode-id="4387" instrument_node="">, David Lionel Smith argues in saying “The Black Aesthetic,” one suggests a single principle, closed and prescriptive in which just really sustains the oppressiveness of defining race in one single identity.</span><sup class="reference" data-dcnode-id="4384" id="cite_ref-:0_22-3"><a data-dcnode-id="4385" href="#cite_note-:0-22"><span data-dcnode-id="4386" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4383" instrument_node=""> The search of finding the true “blackness” of Black people through art by the term creates obstacles in achieving a refocus and return to African culture. Smith compares the statement “The Black Aesthetic” to “Black Aesthetics”, the latter leaving multiple, open, descriptive possibilities. The Black Aesthetic, particularly Karenga’s definition, has also received additional critiques; Ishmael Reed, author of Neo-HooDoo Manifesto, argues for artistic freedom, ultimately against Karenga’s idea of the Black Aesthetic, which Reed finds limiting and something he can’t ever sympathize to.</span><sup class="reference" data-dcnode-id="4380" id="cite_ref-:3_31-0"><a data-dcnode-id="4381" href="#cite_note-:3-31"><span data-dcnode-id="4382" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4379" instrument_node=""> The example Reed brings up is if a Black artist wants to paint black guerrillas, that is okay, but if the Black artist “does so only deference to Ron Karenga, something’s wrong”.</span><sup class="reference" data-dcnode-id="4376" id="cite_ref-:3_31-1"><a data-dcnode-id="4377" href="#cite_note-:3-31"><span data-dcnode-id="4378" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4375" instrument_node=""> The focus of blackness in context of maleness was another critique raised with the Black Aesthetic.</span><sup class="reference" data-dcnode-id="4372" id="cite_ref-:1_23-1"><a data-dcnode-id="4373" href="#cite_note-:1-23"><span data-dcnode-id="4374" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4371" instrument_node=""> Pollard argues that the art made with the artistic and social values of the Black Aesthetic emphasizes on the male talent of blackness, and it’s uncertain whether the movement only includes women as an afterthought.
</span></p><p data-dcnode-id="4352"><span data-dcnode-id="4369" instrument_node="">As there begins a change in the Black population, </span><a data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trey_Ellis%23The_New_Black_Aesthetic" title="Trey Ellis"><span data-dcnode-id="4368" instrument_node="">Trey Ellis</span></a><span data-dcnode-id="4366" instrument_node=""> points out other flaws in his essay </span><i data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">The New Black Aesthetic.</span></i><sup class="reference" data-dcnode-id="4361" id="cite_ref-:4_32-0"><a data-dcnode-id="4362" href="#cite_note-:4-32"><span data-dcnode-id="4363" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4360" instrument_node=""> Blackness in terms of cultural background can no longer be denied in order to appease or please white </span><i data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">or</span></i><span data-dcnode-id="4357" instrument_node=""> black people. From mulattos to a "post-bourgeois movement driven by a second generation of middle class," blackness isn’t a singular identity as the phrase "The Black Aesthetic" forces it to be but rather multifaceted and vast.</span><sup class="reference" data-dcnode-id="4354" id="cite_ref-:4_32-1"><a data-dcnode-id="4355" href="#cite_note-:4-32"><span data-dcnode-id="4356" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4353" instrument_node="">
</span></p><span data-dcnode-id="4351" instrument_node="">
</span><h3 data-dcnode-id="4341"><span class="mw-headline" data-dcnode-id="4349" id="Major_works"><span data-dcnode-id="4350" instrument_node="">Major works</span></span><span class="mw-editsection" data-dcnode-id="4342"><span class="mw-editsection-bracket" data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">[</span></span><a data-dcnode-id="4345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D8" title="Edit section: Major works"><span data-dcnode-id="4346" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4340" instrument_node="">
</span><h4 data-dcnode-id="4330"><span class="mw-headline" data-dcnode-id="4338" id="Black_Art"><span data-dcnode-id="4339" instrument_node="">Black Art</span></span><span class="mw-editsection" data-dcnode-id="4331"><span class="mw-editsection-bracket" data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">[</span></span><a data-dcnode-id="4334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D9" title="Edit section: Black Art"><span data-dcnode-id="4335" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4329" instrument_node="">
</span><p data-dcnode-id="4309"><a data-dcnode-id="4327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amiri_Baraka" title="Amiri Baraka"><span data-dcnode-id="4328" instrument_node="">Amiri Baraka</span></a><span data-dcnode-id="4326" instrument_node="">'s poem "</span><a data-dcnode-id="4324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Art_%28poem%29" title="Black Art (poem)"><span data-dcnode-id="4325" instrument_node="">Black Art</span></a><span data-dcnode-id="4323" instrument_node="">" serves as one of his more controversial, poetically profound supplements to the Black Arts Movement. In this piece, Baraka merges politics with art, criticizing poems that are not useful to or adequately representative of the Black struggle. First published in 1966, a period particularly known for the </span><a data-dcnode-id="4321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_movement" title="Civil rights movement"><span data-dcnode-id="4322" instrument_node="">Civil Rights Movement</span></a><span data-dcnode-id="4320" instrument_node="">, the political aspect of this piece underscores the need for a concrete and artistic approach to the realistic nature involving racism and injustice. Serving as the recognized artistic component to and having roots in the Civil Rights Movement, the Black Arts Movement aims to grant a political voice to black artists (including poets, dramatists, writers, musicians, etc.). Playing a vital role in this movement, Baraka calls out what he considers to be unproductive and assimilatory actions shown by political leaders during the Civil Rights Movement. He describes prominent Black leaders as being "on the steps of the white house...kneeling between the sheriff's thighs negotiating coolly for his people." Baraka also presents issues of </span><a data-dcnode-id="4318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurocentrism" title="Eurocentrism"><span data-dcnode-id="4319" instrument_node="">euro-centric</span></a><span data-dcnode-id="4317" instrument_node=""> mentality, by referring to </span><a data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Taylor" title="Elizabeth Taylor"><span data-dcnode-id="4316" instrument_node="">Elizabeth Taylor</span></a><span data-dcnode-id="4314" instrument_node=""> as a prototypical model in a society that influences perceptions of beauty, emphasizing its influence on individuals of white and black ancestry. Baraka aims his message toward the Black community, with the purpose of coalescing African Americans into a unified movement, devoid of white influences. "Black Art" serves as a medium for expression meant to strengthen that solidarity and creativity, in terms of the Black Aesthetic. Baraka believes poems should "shoot…come at you, love what you are" and not succumb to mainstream desires.</span><sup class="reference" data-dcnode-id="4311" id="cite_ref-:9_33-0"><a data-dcnode-id="4312" href="#cite_note-:9-33"><span data-dcnode-id="4313" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4310" instrument_node="">
</span></p><p data-dcnode-id="4270"><span data-dcnode-id="4308" instrument_node="">He ties this approach into the emergence of hip-hop, which he paints as a movement that presents "live words…and live flesh and coursing blood."</span><sup class="reference" data-dcnode-id="4305" id="cite_ref-:9_33-1"><a data-dcnode-id="4306" href="#cite_note-:9-33"><span data-dcnode-id="4307" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4304" instrument_node=""> Baraka's cathartic structure and aggressive tone are comparable to the beginnings of hip-hop music, which created controversy in the realm of mainstream acceptance, because of its  "authentic, un-distilled, unmediated forms of contemporary black urban music."</span><sup class="reference" data-dcnode-id="4301" id="cite_ref-gilderlehrman.org_34-0"><a data-dcnode-id="4302" href="#cite_note-gilderlehrman.org-34"><span data-dcnode-id="4303" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4300" instrument_node=""> Baraka believes that integration inherently takes away from the legitimacy of having a Black identity and Aesthetic in an anti-Black world. Through pure and unapologetic blackness, and with the absence of white influences, Baraka believes a black world can be achieved. Though hip-hop has been serving as a recognized salient musical form of the Black Aesthetic, a history of unproductive integration is seen across the spectrum of music, beginning with the emergence of a newly formed narrative in mainstream appeal in the 1950s. Much of Baraka's cynical disillusionment with unproductive integration can be drawn from the 1950s, a period of </span><a data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rock_and_roll" title="Rock and roll"><span data-dcnode-id="4299" instrument_node="">rock and roll</span></a><span data-dcnode-id="4297" instrument_node="">, in which "record labels actively sought to have white artists "cover" songs that were popular on the </span><a data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhythm_and_blues" title="Rhythm and blues"><span data-dcnode-id="4296" instrument_node="">rhythm-and-blues</span></a><span data-dcnode-id="4294" instrument_node=""> charts"</span><sup class="reference" data-dcnode-id="4291" id="cite_ref-gilderlehrman.org_34-1"><a data-dcnode-id="4292" href="#cite_note-gilderlehrman.org-34"><span data-dcnode-id="4293" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4290" instrument_node=""> originally performed by African-American artists. The problematic nature of unproductive integration is also exemplified by </span><a data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Run-DMC" title="Run-DMC"><span data-dcnode-id="4289" instrument_node="">Run-DMC</span></a><span data-dcnode-id="4287" instrument_node="">, an American hip-hop group founded in 1981, who became widely accepted after a calculated collaboration with the rock group </span><a data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerosmith" title="Aerosmith"><span data-dcnode-id="4286" instrument_node="">Aerosmith</span></a><span data-dcnode-id="4284" instrument_node=""> on a remake of the latter's "</span><a data-dcnode-id="4282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walk_This_Way" title="Walk This Way"><span data-dcnode-id="4283" instrument_node="">Walk This Way</span></a><span data-dcnode-id="4281" instrument_node="">" took place in 1986, evidently appealing to young white audiences.</span><sup class="reference" data-dcnode-id="4278" id="cite_ref-gilderlehrman.org_34-2"><a data-dcnode-id="4279" href="#cite_note-gilderlehrman.org-34"><span data-dcnode-id="4280" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4277" instrument_node=""> Hip-hop emerged as an evolving genre of music that continuously challenged mainstream acceptance, most notably with the development of rap in the 1990s. A significant and modern example of this is </span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ice_Cube" title="Ice Cube"><span data-dcnode-id="4276" instrument_node="">Ice Cube</span></a><span data-dcnode-id="4274" instrument_node="">, a well-known American rapper, songwriter, and actor, who introduced subgenre of hip-hop known as "</span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gangsta_rap" title="Gangsta rap"><span data-dcnode-id="4273" instrument_node="">gangsta rap</span></a><span data-dcnode-id="4271" instrument_node="">," merged social consciousness and political expression with music. With the 1960s serving as a more blatantly racist period of time, Baraka notes the revolutionary nature of hip-hop, grounded in the unmodified expression through art. This method of expression in music parallels significantly with Baraka's ideals presented in "Black Art," focusing on poetry that is also productively and politically driven.
</span></p><span data-dcnode-id="4269" instrument_node="">
</span><h4 data-dcnode-id="4259"><span class="mw-headline" data-dcnode-id="4267" id="The_Revolutionary_Theatre"><span data-dcnode-id="4268" instrument_node="">The Revolutionary Theatre</span></span><span class="mw-editsection" data-dcnode-id="4260"><span class="mw-editsection-bracket" data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">[</span></span><a data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D10" title="Edit section: The Revolutionary Theatre"><span data-dcnode-id="4264" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4258" instrument_node="">
</span><p data-dcnode-id="4249"><span data-dcnode-id="4257" instrument_node="">"The Revolutionary Theatre" is a 1965 essay by Baraka that was an important contribution to the Black Arts Movement, discussing the need for change through literature and theater arts. He says: "We will scream and cry, murder, run through the streets in agony, if it means some soul will be moved, moved to actual life understanding of what the world is, and what it ought to be." Baraka wrote his poetry, drama, fiction and essays in a way that would shock and awaken audiences to the political concerns of black Americans, which says much about what he was doing with this essay.</span><sup class="reference" data-dcnode-id="4254" id="cite_ref-35"><a data-dcnode-id="4255" href="#cite_note-35"><span data-dcnode-id="4256" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4253" instrument_node=""> It also did not seem coincidental to him that Malcolm X and </span><a data-dcnode-id="4251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_F._Kennedy" title="John F. Kennedy"><span data-dcnode-id="4252" instrument_node="">John F. Kennedy</span></a><span data-dcnode-id="4250" instrument_node=""> had been assassinated within a few years because Baraka believed that every voice of change in America had been murdered, which led to the writing that would come out of the Black Arts Movement.
</span></p><p data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">In his essay, Baraka says: "The Revolutionary Theatre is shaped by the world, and moves to reshape the world, using as its force the natural force and perpetual vibrations of the mind in the world. We are history and desire, what we are, and what any experience can make us."
</span></p><p data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">With his thought-provoking ideals and references to a euro-centric society, he imposes the notion that black Americans should stray from a white aesthetic in order to find a black identity. In his essay, he says: "The popular white man's theatre like the popular white man's novel shows tired white lives, and the problems of eating white sugar, or else it herds bigcaboosed blondes onto huge stages in rhinestones and makes believe they are dancing or singing." This, having much to do with a white aesthetic, further proves what was popular in society and even what society had as an example of what everyone should aspire to be, like the "bigcaboosed blondes" that went "onto huge stages in rhinestones". Furthermore, these blondes made believe they were "dancing and singing" which Baraka seems to be implying that white people dancing is not what dancing is supposed to be at all. These allusions bring forth the question of where black Americans fit in the public eye. Baraka says: "We are preaching virtue and feeling, and a natural sense of the self in the world. All men live in the world, and the world ought to be a place for them to live." Baraka's essay challenges the idea that there is no space in politics or in society for black Americans to make a difference through different art forms that consist of, but are not limited to, poetry, song, dance, and art. 
</span></p><span data-dcnode-id="4244" instrument_node="">
</span><h2 data-dcnode-id="4234"><span class="mw-headline" data-dcnode-id="4242" id="Effects_on_society"><span data-dcnode-id="4243" instrument_node="">Effects on society</span></span><span class="mw-editsection" data-dcnode-id="4235"><span class="mw-editsection-bracket" data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">[</span></span><a data-dcnode-id="4238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D11" title="Edit section: Effects on society"><span data-dcnode-id="4239" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4233" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4218"><div class="thumbinner" data-dcnode-id="4219" style="width:230px;"><a class="image" data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANtozake_Shange%2C_Reid_Lecture%2C_Women_Issues_Luncheon%2C_Women%2527s_Center%2C_November_1978_Crisco_edit.jpg"><img alt="" class="thumbimage" data-dcnode-id="4232" data-file-height="2834" data-file-width="2218" decoding="async" height="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Ntozake_Shange%252C_Reid_Lecture%252C_Women_Issues_Luncheon%252C_Women%2527s_Center%252C_November_1978_Crisco_edit.jpg/228px-Ntozake_Shange%252C_Reid_Lecture%252C_Women_Issues_Luncheon%252C_Women%2527s_Center%252C_November_1978_Crisco_edit.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Ntozake_Shange%2C_Reid_Lecture%2C_Women_Issues_Luncheon%2C_Women%27s_Center%2C_November_1978_Crisco_edit.jpg/343px-Ntozake_Shange%2C_Reid_Lecture%2C_Women_Issues_Luncheon%2C_Women%27s_Center%2C_November_1978_Crisco_edit.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Ntozake_Shange%2C_Reid_Lecture%2C_Women_Issues_Luncheon%2C_Women%27s_Center%2C_November_1978_Crisco_edit.jpg/457px-Ntozake_Shange%2C_Reid_Lecture%2C_Women_Issues_Luncheon%2C_Women%27s_Center%2C_November_1978_Crisco_edit.jpg 2x" width="228"></a><span data-dcnode-id="4230" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4220"><div class="magnify" data-dcnode-id="4228"><a class="internal" data-dcnode-id="4229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANtozake_Shange%2C_Reid_Lecture%2C_Women_Issues_Luncheon%2C_Women%2527s_Center%2C_November_1978_Crisco_edit.jpg" title="Enlarge"></a></div><a data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ntozake_Shange" title="Ntozake Shange"><span data-dcnode-id="4227" instrument_node="">Ntozake Shange</span></a><span data-dcnode-id="4225" instrument_node=""> (1978), author of </span><i data-dcnode-id="4221"><a data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/For_Colored_Girls_Who_Have_Considered_Suicide_/_When_the_Rainbow_Is_Enuf" title="For Colored Girls Who Have Considered Suicide / When the Rainbow Is Enuf"><span data-dcnode-id="4224" instrument_node="">for colored girls who have considered suicide / when the rainbow is enuf</span></a><span data-dcnode-id="4222" instrument_node="">.</span></i></div></div></div><span data-dcnode-id="4217" instrument_node="">
</span><p data-dcnode-id="4204"><span data-dcnode-id="4216" instrument_node="">According to the </span><a data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academy_of_American_Poets" title="Academy of American Poets"><span data-dcnode-id="4215" instrument_node="">Academy of American Poets</span></a><span data-dcnode-id="4213" instrument_node="">, "many writers--Native Americans, Latinos/as, gays and lesbians, and younger generations of African Americans have acknowledged their debt to the Black Arts Movement."</span><sup class="reference" data-dcnode-id="4210" id="cite_ref-uoooav_17-1"><a data-dcnode-id="4211" href="#cite_note-uoooav-17"><span data-dcnode-id="4212" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4209" instrument_node=""> The movement lasted for about a decade, through the mid-1960s and into the 1970s. This was a period of controversy and change in the world of literature. One major change came through in the portrayal of new ethnic voices in the United States. English-language literature, prior to the Black Arts Movement, was dominated by white authors.</span><sup class="reference" data-dcnode-id="4206" id="cite_ref-36"><a data-dcnode-id="4207" href="#cite_note-36"><span data-dcnode-id="4208" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4205" instrument_node="">
</span></p><p data-dcnode-id="4196"><span data-dcnode-id="4203" instrument_node="">African Americans became a greater presence not only in the field of literature but in all areas of the arts. Theater groups, poetry performances, music and dance were central to the movement. Through different forms of media, African Americans were able to educate others about the expression of cultural differences and viewpoints. In particular, black poetry readings allowed African Americans to use </span><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vernacular" title="Vernacular"><span data-dcnode-id="4202" instrument_node="">vernacular</span></a><span data-dcnode-id="4200" instrument_node=""> dialogues. This was shown in the Harlem Writers Guild, which included black writers such as Maya Angelou and Rosa Guy. These performances were used to express political slogans and as a tool for organization. Theater performances also were used to convey community issues and organizations. The theaters, as well as cultural centers, were based throughout America and were used for community meetings, study groups and film screenings. Newspapers were a major tool in spreading the Black Arts Movement. In 1964, </span><i data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">Black Dialogue</span></i><span data-dcnode-id="4197" instrument_node=""> was published, making it the first major Arts movement publication.
</span></p><p data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">The Black Arts Movement, although short, is essential to the history of the United States. It spurred political activism and use of speech throughout every African-American community.  It allowed African Americans the chance to express their voices in the mass media as well as become involved in communities.
</span></p><p data-dcnode-id="4176"><span data-dcnode-id="4193" instrument_node="">It can be argued that "the Black Arts movement produced some of the most exciting poetry, drama, dance, music, visual art, and fiction of the post-World War II United States" and that many important "post-Black artists" such as </span><a data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toni_Morrison" title="Toni Morrison"><span data-dcnode-id="4192" instrument_node="">Toni Morrison</span></a><span data-dcnode-id="4190" instrument_node="">, </span><a data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ntozake_Shange" title="Ntozake Shange"><span data-dcnode-id="4189" instrument_node="">Ntozake Shange</span></a><span data-dcnode-id="4187" instrument_node="">, </span><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alice_Walker" title="Alice Walker"><span data-dcnode-id="4186" instrument_node="">Alice Walker</span></a><span data-dcnode-id="4184" instrument_node="">, and </span><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/August_Wilson" title="August Wilson"><span data-dcnode-id="4183" instrument_node="">August Wilson</span></a><span data-dcnode-id="4181" instrument_node=""> were shaped by the movement.</span><sup class="reference" data-dcnode-id="4178" id="cite_ref-Smethurst,_James_E_2005_15-8"><a data-dcnode-id="4179" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="4180" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4177" instrument_node="">
</span></p><p data-dcnode-id="4170"><span data-dcnode-id="4175" instrument_node="">The Black Arts Movement also provided incentives for public funding of the arts and increased public support of various arts initiatives.</span><sup class="reference" data-dcnode-id="4172" id="cite_ref-Smethurst,_James_E_2005_15-9"><a data-dcnode-id="4173" href="#cite_note-Smethurst,_James_E_2005-15"><span data-dcnode-id="4174" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4171" instrument_node="">
</span></p><span data-dcnode-id="4169" instrument_node="">
</span><h3 data-dcnode-id="4159"><span class="mw-headline" data-dcnode-id="4167" id="Legacy"><span data-dcnode-id="4168" instrument_node="">Legacy</span></span><span class="mw-editsection" data-dcnode-id="4160"><span class="mw-editsection-bracket" data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">[</span></span><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D12" title="Edit section: Legacy"><span data-dcnode-id="4164" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4158" instrument_node="">
</span><p data-dcnode-id="4114"><span data-dcnode-id="4157" instrument_node="">The movement has been seen as one of the most important times in </span><a data-dcnode-id="4155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African-American_literature" title="African-American literature"><span data-dcnode-id="4156" instrument_node="">African-American literature</span></a><span data-dcnode-id="4154" instrument_node="">. It inspired black people to establish their own publishing houses, magazines, journals and art institutions. It led to the creation of African-American Studies programs within universities.</span><sup class="reference" data-dcnode-id="4151" id="cite_ref-37"><a data-dcnode-id="4152" href="#cite_note-37"><span data-dcnode-id="4153" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4150" instrument_node=""> The movement was triggered by the assassination of </span><a data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malcolm_X" title="Malcolm X"><span data-dcnode-id="4149" instrument_node="">Malcolm X</span></a><span data-dcnode-id="4147" instrument_node="">.</span><sup class="reference" data-dcnode-id="4144" id="cite_ref-:6_16-1"><a data-dcnode-id="4145" href="#cite_note-:6-16"><span data-dcnode-id="4146" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4143" instrument_node=""> Among the well-known writers who were involved with the movement are </span><a data-dcnode-id="4141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikki_Giovanni" title="Nikki Giovanni"><span data-dcnode-id="4142" instrument_node="">Nikki Giovanni</span></a><span data-dcnode-id="4140" instrument_node="">, </span><a data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sonia_Sanchez" title="Sonia Sanchez"><span data-dcnode-id="4139" instrument_node="">Sonia Sanchez</span></a><span data-dcnode-id="4137" instrument_node="">, </span><a data-dcnode-id="4135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maya_Angelou" title="Maya Angelou"><span data-dcnode-id="4136" instrument_node="">Maya Angelou</span></a><span data-dcnode-id="4134" instrument_node="">, </span><a data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoyt_W._Fuller" title="Hoyt W. Fuller"><span data-dcnode-id="4133" instrument_node="">Hoyt W. Fuller</span></a><span data-dcnode-id="4131" instrument_node="">, and </span><a data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosa_Guy" title="Rosa Guy"><span data-dcnode-id="4130" instrument_node="">Rosa Guy</span></a><span data-dcnode-id="4128" instrument_node="">.</span><sup class="reference" data-dcnode-id="4125" id="cite_ref-38"><a data-dcnode-id="4126" href="#cite_note-38"><span data-dcnode-id="4127" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="4122" id="cite_ref-39"><a data-dcnode-id="4123" href="#cite_note-39"><span data-dcnode-id="4124" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4121" instrument_node=""> Although not strictly part of the Movement, other notable African-American writers such as novelists </span><a data-dcnode-id="4119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toni_Morrison" title="Toni Morrison"><span data-dcnode-id="4120" instrument_node="">Toni Morrison</span></a><span data-dcnode-id="4118" instrument_node=""> and </span><a data-dcnode-id="4116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ishmael_Reed" title="Ishmael Reed"><span data-dcnode-id="4117" instrument_node="">Ishmael Reed</span></a><span data-dcnode-id="4115" instrument_node=""> share some of its artistic and thematic concerns. Although Reed is neither a movement apologist nor advocate, he said:
</span></p><span data-dcnode-id="4113" instrument_node="">
</span><blockquote data-dcnode-id="4104"><p data-dcnode-id="4105"><span data-dcnode-id="4112" instrument_node="">I think what Black Arts did was inspire a whole lot of Black people to write. Moreover, there would be no multiculturalism movement without Black Arts. Latinos, Asian Americans, and others all say they began writing as a result of the example of the 1960s. Blacks gave the example that you don't have to </span><a data-dcnode-id="4110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_assimilation" title="Cultural assimilation"><span data-dcnode-id="4111" instrument_node="">assimilate</span></a><span data-dcnode-id="4109" instrument_node="">. You could do your own thing, get into your own background, your own history, your own tradition and your own culture. I think the challenge is for cultural sovereignty and Black Arts struck a blow for that.</span><sup class="reference" data-dcnode-id="4106" id="cite_ref-40"><a data-dcnode-id="4107" href="#cite_note-40"><span data-dcnode-id="4108" instrument_node="">[40]</span></a></sup></p></blockquote><span data-dcnode-id="4103" instrument_node="">
</span><p data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">BAM influenced the world of literature with the portrayal of different ethnic voices. Before the movement, the literary canon lacked diversity, and the ability to express ideas from the point of view of racial and ethnic minorities, which was not valued by the mainstream at the time.
</span></p><span data-dcnode-id="4100" instrument_node="">
</span><h3 data-dcnode-id="4090"><span class="mw-headline" data-dcnode-id="4098" id="Influence"><span data-dcnode-id="4099" instrument_node="">Influence</span></span><span class="mw-editsection" data-dcnode-id="4091"><span class="mw-editsection-bracket" data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">[</span></span><a data-dcnode-id="4094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack_Arts_Movement%26action%3Dedit%26section%3D13" title="Edit section: Influence"><span data-dcnode-id="4095" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">]</span></span></span></h3><p data-dcnode-id="4084"><span data-dcnode-id="4089" instrument_node="">
Theater groups, poetry performances, music and dance were centered on this movement, and therefore African Americans gained social and historical recognition in the area of literature and arts. Due to the agency and credibility given, African Americans were also able to educate others through different types of expressions and media outlets about cultural differences. The most common form of teaching was through poetry reading. African-American performances were used for their own political advertisement, organization, and community issues. The Black Arts Movement was spread by the use of newspaper advertisements.</span><sup class="reference" data-dcnode-id="4086" id="cite_ref-41"><a data-dcnode-id="4087" href="#cite_note-41"><span data-dcnode-id="4088" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4085" instrument_node=""> The first major arts movement publication was in 1964.</span></p><blockquote data-dcnode-id="4074"><p data-dcnode-id="4075"><span data-dcnode-id="4083" instrument_node="">"No one was more competent in [the] combination of the experimental and the vernacular than Amiri Baraka, whose volume </span><i data-dcnode-id="4080"><a class="external text" data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.worldcat.org/oclc/1069752783" rel="nofollow"><span data-dcnode-id="4082" instrument_node="">Black Magic Poetry 1961–1967</span></a></i><span data-dcnode-id="4079" instrument_node=""> (1969) is one of the finest products of the African-American creative energies of the 1960s."</span><sup class="reference" data-dcnode-id="4076" id="cite_ref-uoooav_17-2"><a data-dcnode-id="4077" href="#cite_note-uoooav-17"><span data-dcnode-id="4078" instrument_node="">[17]</span></a></sup></p></blockquote><span data-dcnode-id="4073" instrument_node="">
