</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">This could be because colors in Japanese culture represent different things. </span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">That shouldn’t stop you from exploring black and grey Japanese tattoos. </span></p><span data-dcnode-id="1001" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="996"><figure class="aligncenter size-large is-resized" data-dcnode-id="997"><img alt="Black and Grey Japanese Tattoo" class="wp-image-24375" data-dcnode-id="1000" data-lazy-sizes="(max-width: 540px) 100vw, 540px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3-1024x845.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3-1024x845.jpg 1024w, https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3-300x248.jpg 300w, https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3-768x634.jpg 768w, https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3.jpg 1080w" height="446" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20446'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3-1024x845.jpg" alt="Black and Grey Japanese Tattoo" class="wp-image-24375" width="540" height="446" srcset="https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3-1024x845.jpg 1024w, https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3-300x248.jpg 300w, https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3-768x634.jpg 768w, https://tattmag.com/wp-content/uploads/2020/11/Black-and-Grey-Japanese-Tattoo-3.jpg 1080w" sizes="(max-width: 540px) 100vw, 540px" /&gt;</span></noscript></figure></div><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">This color scheme can still have the same impressive features as a colorful tattoo can.</span></p><span data-dcnode-id="992" instrument_node="">
</span><ul data-dcnode-id="988"><li data-dcnode-id="989"><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Small Japanese Tattoos</span></strong></li></ul><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">A big and bold Japanese tattoo is always a thrilling sight to see. </span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">If that is not your style, that doesn’t mean you shouldn’t get a Japanese-style tattoo. </span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="980" instrument_node="">An understated, </span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tattmag.com/small-tattoos/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="979" instrument_node="">small tattoo</span></a><span data-dcnode-id="977" instrument_node=""> is still a beautiful choice too. </span></p><span data-dcnode-id="975" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="970"><figure class="aligncenter size-large is-resized" data-dcnode-id="971"><img alt="Small Japanese Tattoo" class="wp-image-24377" data-dcnode-id="974" data-lazy-sizes="(max-width: 292px) 100vw, 292px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-1.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-1.jpg 583w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-1-228x300.jpg 228w" height="384" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20292%20384'%3E%3C/svg%3E" width="292"><noscript data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-1.jpg" alt="Small Japanese Tattoo" class="wp-image-24377" width="292" height="384" srcset="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-1.jpg 583w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-1-228x300.jpg 228w" sizes="(max-width: 292px) 100vw, 292px" /&gt;</span></noscript></figure></div><span data-dcnode-id="969" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="964"><figure class="aligncenter size-large is-resized" data-dcnode-id="965"><img alt="Small Japanese Tattoo" class="wp-image-24380" data-dcnode-id="968" data-lazy-sizes="(max-width: 402px) 100vw, 402px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3-804x1024.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3-804x1024.jpg 804w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3-236x300.jpg 236w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3-768x978.jpg 768w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3.jpg 833w" height="512" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20402%20512'%3E%3C/svg%3E" width="402"><noscript data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3-804x1024.jpg" alt="Small Japanese Tattoo" class="wp-image-24380" width="402" height="512" srcset="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3-804x1024.jpg 804w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3-236x300.jpg 236w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3-768x978.jpg 768w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-3.jpg 833w" sizes="(max-width: 402px) 100vw, 402px" /&gt;</span></noscript></figure></div><span data-dcnode-id="963" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="958"><figure class="aligncenter size-large is-resized" data-dcnode-id="959"><img alt="Small Japanese Tattoo" class="wp-image-24381" data-dcnode-id="962" data-lazy-sizes="(max-width: 361px) 100vw, 361px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-4-721x1024.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-4-721x1024.jpg 721w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-4-211x300.jpg 211w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-4.jpg 757w" height="512" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20361%20512'%3E%3C/svg%3E" width="361"><noscript data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-4-721x1024.jpg" alt="Small Japanese Tattoo" class="wp-image-24381" width="361" height="512" srcset="https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-4-721x1024.jpg 721w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-4-211x300.jpg 211w, https://tattmag.com/wp-content/uploads/2020/11/Small-Japanese-Tattoo-4.jpg 757w" sizes="(max-width: 361px) 100vw, 361px" /&gt;</span></noscript></figure></div><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Maybe choose a simpler design because your tattoo will be on a smaller scale. </span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Don’t hesitate to work with your tattoo artist to get just the right size and design for your tattoo!</span></p><span data-dcnode-id="951" instrument_node="">
</span><ul data-dcnode-id="947"><li data-dcnode-id="948"><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Japanese Tattoo Sleeves</span></strong></li></ul><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Japanese tattoos are known for their unique-looking designs and the intriguing stories that go along with them. </span></p><span data-dcnode-id="943" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="938"><figure class="aligncenter size-large is-resized" data-dcnode-id="939"><img alt="Japanese Tattoo Sleeve" class="wp-image-24384" data-dcnode-id="942" data-lazy-sizes="(max-width: 233px) 100vw, 233px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4-795x1024.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4-795x1024.jpg 795w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4-233x300.jpg 233w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4-768x989.jpg 768w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4.jpg 957w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20233%20300'%3E%3C/svg%3E" width="233"><noscript data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4-795x1024.jpg" alt="Japanese Tattoo Sleeve" class="wp-image-24384" width="233" height="300" srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4-795x1024.jpg 795w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4-233x300.jpg 233w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4-768x989.jpg 768w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-4.jpg 957w" sizes="(max-width: 233px) 100vw, 233px" /&gt;</span></noscript></figure></div><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Choosing to cover your whole sleeve as placement for one of these tattoos can showcase a story that Japanese culture holds so dearly. </span></p><span data-dcnode-id="934" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="929"><figure class="aligncenter size-large is-resized" data-dcnode-id="930"><img alt="Japanese Tattoo Sleeve" class="wp-image-24383" data-dcnode-id="933" data-lazy-sizes="(max-width: 314px) 100vw, 314px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-2-628x1024.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-2-628x1024.jpg 628w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-2-184x300.jpg 184w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-2.jpg 661w" height="512" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20314%20512'%3E%3C/svg%3E" width="314"><noscript data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-2-628x1024.jpg" alt="Japanese Tattoo Sleeve" class="wp-image-24383" width="314" height="512" srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-2-628x1024.jpg 628w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-2-184x300.jpg 184w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-2.jpg 661w" sizes="(max-width: 314px) 100vw, 314px" /&gt;</span></noscript></figure></div><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Luckily, the majority of your limb is not a tender or sensitive spot until you reach closer to your wrist, so it is one of the least painful places to get your ink.</span></p><span data-dcnode-id="925" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="920"><figure class="aligncenter size-large is-resized" data-dcnode-id="921"><img alt="Japanese Tattoo Sleeve" class="wp-image-24386" data-dcnode-id="924" data-lazy-sizes="(max-width: 210px) 100vw, 210px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-6-420x1024.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-6-420x1024.jpg 420w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-6-123x300.jpg 123w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-6.jpg 549w" height="512" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20210%20512'%3E%3C/svg%3E" width="210"><noscript data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-6-420x1024.jpg" alt="Japanese Tattoo Sleeve" class="wp-image-24386" width="210" height="512" srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-6-420x1024.jpg 420w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-6-123x300.jpg 123w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Sleeve-6.jpg 549w" sizes="(max-width: 210px) 100vw, 210px" /&gt;</span></noscript></figure></div><span data-dcnode-id="919" instrument_node="">
</span><ul data-dcnode-id="915"><li data-dcnode-id="916"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Japanese Tattoo Half Sleeves</span></strong></li></ul><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">If you are not ready to give into a full sleeve tattoo, why not start with a half-sleeve. </span></p><span data-dcnode-id="911" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="906"><figure class="aligncenter size-large is-resized" data-dcnode-id="907"><img alt="Japanese Tattoo Half Sleeve" class="wp-image-24389" data-dcnode-id="910" data-lazy-sizes="(max-width: 259px) 100vw, 259px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-3-518x1024.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-3-518x1024.jpg 518w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-3-152x300.jpg 152w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-3.jpg 593w" height="512" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20259%20512'%3E%3C/svg%3E" width="259"><noscript data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-3-518x1024.jpg" alt="Japanese Tattoo Half Sleeve" class="wp-image-24389" width="259" height="512" srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-3-518x1024.jpg 518w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-3-152x300.jpg 152w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-3.jpg 593w" sizes="(max-width: 259px) 100vw, 259px" /&gt;</span></noscript></figure></div><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">This is still ample enough space to showcase your Japanese tattooed ink. </span></p><span data-dcnode-id="902" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="897"><figure class="aligncenter size-large is-resized" data-dcnode-id="898"><img alt="Japanese Tattoo Half Sleeve" class="wp-image-24390" data-dcnode-id="901" data-lazy-sizes="(max-width: 295px) 100vw, 295px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-2.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-2.jpg 589w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-2-191x300.jpg 191w" height="463" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20295%20463'%3E%3C/svg%3E" width="295"><noscript data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-2.jpg" alt="Japanese Tattoo Half Sleeve" class="wp-image-24390" width="295" height="463" srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-2.jpg 589w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Half-Sleeve-2-191x300.jpg 191w" sizes="(max-width: 295px) 100vw, 295px" /&gt;</span></noscript></figure></div><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Like a full sleeve, this is not a hyper-sensitive area compared to others, so this can be a great start if you plan on expanding eventually.</span></p><span data-dcnode-id="893" instrument_node="">
</span><ul data-dcnode-id="886"><li data-dcnode-id="887"><strong data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">Japanese </span><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Leg</span></strong><span data-dcnode-id="889" instrument_node=""> Tattoos </span></strong></li></ul><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">A sleeve full of tattoos is a typical appearance these days, but leg sleeves have quickly become just as popular. </span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">If you are looking to showcase an abundance of Japanese tattoos and not afraid to make a statement, a leg sleeve might be the best option! </span></p><span data-dcnode-id="879" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="874"><figure class="aligncenter size-large is-resized" data-dcnode-id="875"><img alt="Japanese Tattoo Leg Sleeve" class="wp-image-24393" data-dcnode-id="878" data-lazy-sizes="(max-width: 277px) 100vw, 277px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Leg-Sleeve-1-553x1024.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Leg-Sleeve-1-553x1024.jpg 553w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Leg-Sleeve-1-162x300.jpg 162w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Leg-Sleeve-1.jpg 729w" height="512" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20277%20512'%3E%3C/svg%3E" width="277"><noscript data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Leg-Sleeve-1-553x1024.jpg" alt="Japanese Tattoo Leg Sleeve" class="wp-image-24393" width="277" height="512" srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Leg-Sleeve-1-553x1024.jpg 553w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Leg-Sleeve-1-162x300.jpg 162w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-Leg-Sleeve-1.jpg 729w" sizes="(max-width: 277px) 100vw, 277px" /&gt;</span></noscript></figure></div><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Tattooing your thighs will not cause much pain, but as you travel lower to your ankles, the pain will increase, but no worries because it will be worth it!</span></p><span data-dcnode-id="870" instrument_node="">
</span><ul data-dcnode-id="866"><li data-dcnode-id="867"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Full Body Japanese Tattoos</span></strong></li></ul><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">There are various Japanese tattoos, but did you know the term tattoo is not the proper usage in Japanese culture. </span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Horimono is the well-known Japanese term for inking your body. </span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Horimono stands for the carving of images. </span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Those who live for the artistry of horimono start small by tattooing a part of themselves and eventually spreading their designs across their entire body. </span></p><span data-dcnode-id="853" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="848"><figure class="aligncenter size-large is-resized" data-dcnode-id="849"><img alt="Horimono" class="wp-image-33163" data-dcnode-id="852" data-lazy-sizes="(max-width: 289px) 100vw, 289px" data-lazy-src="https://tattmag.com/wp-content/uploads/2021/04/Horimono-2-578x1024.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2021/04/Horimono-2-578x1024.jpg 578w, https://tattmag.com/wp-content/uploads/2021/04/Horimono-2-169x300.jpg 169w, https://tattmag.com/wp-content/uploads/2021/04/Horimono-2.jpg 757w" height="512" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20289%20512'%3E%3C/svg%3E" width="289"><noscript data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2021/04/Horimono-2-578x1024.jpg" alt="Horimono" class="wp-image-33163" width="289" height="512" srcset="https://tattmag.com/wp-content/uploads/2021/04/Horimono-2-578x1024.jpg 578w, https://tattmag.com/wp-content/uploads/2021/04/Horimono-2-169x300.jpg 169w, https://tattmag.com/wp-content/uploads/2021/04/Horimono-2.jpg 757w" sizes="(max-width: 289px) 100vw, 289px" /&gt;</span></noscript></figure></div><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Taking this bold leap allows a person to depict many stories and characters from the Japanese culture.  </span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">There is some pain that comes with horimono, depending on the body part, but at the end of it all, I bet you wouldn’t change a thing!</span></p><span data-dcnode-id="841" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="836"><figure class="aligncenter size-large is-resized" data-dcnode-id="837"><img alt="Horimono" class="wp-image-33162" data-dcnode-id="840" data-lazy-sizes="(max-width: 491px) 100vw, 491px" data-lazy-src="https://tattmag.com/wp-content/uploads/2021/04/Horimono-3.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2021/04/Horimono-3.jpg 981w, https://tattmag.com/wp-content/uploads/2021/04/Horimono-3-300x289.jpg 300w, https://tattmag.com/wp-content/uploads/2021/04/Horimono-3-768x740.jpg 768w" height="473" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20491%20473'%3E%3C/svg%3E" width="491"><noscript data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2021/04/Horimono-3.jpg" alt="Horimono" class="wp-image-33162" width="491" height="473" srcset="https://tattmag.com/wp-content/uploads/2021/04/Horimono-3.jpg 981w, https://tattmag.com/wp-content/uploads/2021/04/Horimono-3-300x289.jpg 300w, https://tattmag.com/wp-content/uploads/2021/04/Horimono-3-768x740.jpg 768w" sizes="(max-width: 491px) 100vw, 491px" /&gt;</span></noscript></figure></div><span data-dcnode-id="835" instrument_node="">
</span><ul data-dcnode-id="831"><li data-dcnode-id="832"><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Simple Japanese Tattoos</span></strong></li></ul><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">There is no shortage of intensely detailed and intricate Japanese tattoos. </span></p><span data-dcnode-id="827" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="822"><figure class="aligncenter size-medium is-resized" data-dcnode-id="823"><img alt="Simple Japanese Tattoo" class="wp-image-24440" data-dcnode-id="826" data-lazy-sizes="(max-width: 214px) 100vw, 214px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-6-214x300.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-6-214x300.jpg 214w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-6.jpg 647w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20214%20300'%3E%3C/svg%3E" width="214"><noscript data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-6-214x300.jpg" alt="Simple Japanese Tattoo" class="wp-image-24440" width="214" height="300" srcset="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-6-214x300.jpg 214w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-6.jpg 647w" sizes="(max-width: 214px) 100vw, 214px" /&gt;</span></noscript></figure></div><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">They are popular and found in many tattoo shops, but that doesn’t mean you have to choose a tattoo so intense. </span></p><span data-dcnode-id="818" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="813"><figure class="aligncenter size-medium is-resized" data-dcnode-id="814"><img alt="Simple Japanese Tattoo" class="wp-image-24442" data-dcnode-id="817" data-lazy-sizes="(max-width: 209px) 100vw, 209px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-3-209x300.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-3-209x300.jpg 209w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-3.jpg 517w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20209%20300'%3E%3C/svg%3E" width="209"><noscript data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-3-209x300.jpg" alt="Simple Japanese Tattoo" class="wp-image-24442" width="209" height="300" srcset="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-3-209x300.jpg 209w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-3.jpg 517w" sizes="(max-width: 209px) 100vw, 209px" /&gt;</span></noscript></figure></div><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Why not choose a simpler style of a Japanese tattoo? </span></p><span data-dcnode-id="809" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="804"><figure class="aligncenter size-medium is-resized" data-dcnode-id="805"><img alt="Simple Japanese Tattoo" class="wp-image-24443" data-dcnode-id="808" data-lazy-sizes="(max-width: 240px) 100vw, 240px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-240x300.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-240x300.jpg 240w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-819x1024.jpg 819w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-768x960.jpg 768w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-1024x1280.jpg 1024w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2.jpg 1080w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20240%20300'%3E%3C/svg%3E" width="240"><noscript data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-240x300.jpg" alt="Simple Japanese Tattoo" class="wp-image-24443" width="240" height="300" srcset="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-240x300.jpg 240w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-819x1024.jpg 819w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-768x960.jpg 768w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2-1024x1280.jpg 1024w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-2.jpg 1080w" sizes="(max-width: 240px) 100vw, 240px" /&gt;</span></noscript></figure></div><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">The possibilities are endless and can still portray the same meaning as a detailed one.</span></p><span data-dcnode-id="800" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="795"><figure class="aligncenter size-large is-resized" data-dcnode-id="796"><img alt="Simple Japanese Tattoo" class="wp-image-24445" data-dcnode-id="799" data-lazy-sizes="(max-width: 284px) 100vw, 284px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-4.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-4.jpg 567w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-4-224x300.jpg 224w" height="381" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20284%20381'%3E%3C/svg%3E" width="284"><noscript data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-4.jpg" alt="Simple Japanese Tattoo" class="wp-image-24445" width="284" height="381" srcset="https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-4.jpg 567w, https://tattmag.com/wp-content/uploads/2020/11/Simple-Japanese-Tattoo-4-224x300.jpg 224w" sizes="(max-width: 284px) 100vw, 284px" /&gt;</span></noscript></figure></div><span data-dcnode-id="794" instrument_node="">
</span><ul data-dcnode-id="790"><li data-dcnode-id="791"><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Japanese Tattoos for Women</span></strong></li></ul><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">When you think of Japanese tattoos, many people might think of  “gool-ish” creatures, wicked deities, mischievous folklore, and mighty samurais. </span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">For a woman looking for a more feminine Japanese tattoo, there is no need to feel left out. </span></p><span data-dcnode-id="783" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="778"><figure class="aligncenter size-large is-resized" data-dcnode-id="779"><img alt="Japanese Tattoo for Women" class="wp-image-24409" data-dcnode-id="782" data-lazy-sizes="(max-width: 285px) 100vw, 285px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-570x1024.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-570x1024.jpg 570w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-167x300.jpg 167w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women.jpg 601w" height="512" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20285%20512'%3E%3C/svg%3E" width="285"><noscript data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-570x1024.jpg" alt="Japanese Tattoo for Women" class="wp-image-24409" width="285" height="512" srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-570x1024.jpg 570w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-167x300.jpg 167w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women.jpg 601w" sizes="(max-width: 285px) 100vw, 285px" /&gt;</span></noscript></figure></div><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">The beautiful cherry blossoms of Japan or a geisha protruding pure femininity are wonderful options.</span></p><span data-dcnode-id="774" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="769"><figure class="aligncenter size-large is-resized" data-dcnode-id="770"><img alt="Japanese Tattoo for Women" class="wp-image-24404" data-dcnode-id="773" data-lazy-sizes="(max-width: 275px) 100vw, 275px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-2.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-2.jpg 549w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-2-228x300.jpg 228w" height="362" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20275%20362'%3E%3C/svg%3E" width="275"><noscript data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">&lt;img src="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-2.jpg" alt="Japanese Tattoo for Women" class="wp-image-24404" width="275" height="362" srcset="https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-2.jpg 549w, https://tattmag.com/wp-content/uploads/2020/11/Japanese-Tattoo-for-Women-2-228x300.jpg 228w" sizes="(max-width: 275px) 100vw, 275px" /&gt;</span></noscript></figure></div><span data-dcnode-id="768" instrument_node="">
</span><h2 data-dcnode-id="764"><span class="ez-toc-section" data-dcnode-id="767" id="Contemporary_Issues_with_Traditional_Japanese_Tattoos"></span><span data-dcnode-id="766" instrument_node="">Contemporary Issues with Traditional Japanese Tattoos</span><span class="ez-toc-section-end" data-dcnode-id="765"></span></h2><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Though tattoos have been legal in Japan since 1948, contemporary tattoo laws in Japan have not made it easy for tattoo artists to do their thing.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">In 1948 when tattoos were officially legalized in Japan, they were not listed as a medical procedure, because why would they be?</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Cut to 2001, the Japanese government was looking for a way to regulate cosmetic face tattoos and beauty procedures.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Tattoos were then classified as “medical procedures” using the justification that a needle pierces the skin during a tattoo application. </span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Using these new laws, it was easier to regulate cosmetic procedures, which was the original goal. </span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Tattoo artists weren’t scrutinized using this law, which was fairly obscure until recently.</span></p><span data-dcnode-id="745" instrument_node="">
</span><h3 data-dcnode-id="741"><span class="ez-toc-section" data-dcnode-id="744" id="Tattoo_Artist_Fines"></span><span data-dcnode-id="743" instrument_node="">Tattoo Artist Fines</span><span class="ez-toc-section-end" data-dcnode-id="742"></span></h3><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Suddenly, within the same short period, many tattoo shops in Japan were raided, and artists were handed hefty fines.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">In 2015 Japanese tattoo artist Taiki Masuda was among several tattooers who were convicted under the Medical Practitioners Act, which many people were not even aware of.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Artists were fine 300,000 yen, which converts to roughly 2,700 US Dollars. In the eyes of the law, they got off easy. </span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">The Medical Practitioners Act allows tattoo artists in Japan to be fined up to 1 million yen, or put away for 3 years.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">This crackdown on Japan’s tattoo artists started in Osaka, where Tōru Hashimoto served as mayor from 2011-2015. </span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Hashimoto has a vocal dislike of tattoos and sent out questionnaires in 2012 to find out which government employees had tattoos. </span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Even if their body art was hidden, Hashimoto felt that tattooed people were not fit to work for the government, and gathered this information so he could suggest the offending parties be fired.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Hashimoto’s opinions were pervasive, and many people still feel distrusting of those with tattoos. </span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Those who do own tattoo shops now work in a legal gray area, and try to keep their aesthetic as minimal as possible to maintain a low profile.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">When the Olympics were set to come to Tokyo in 2020, the hope among some civilians was that these laws would be loosened for the sake of tourism. </span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Many high-profile athletes have tattoos, and if they are comfortable both showing off their art and visiting local tattoo parlors- it would be a huge boost to the economy.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">But that old stigma toward tattooing is still so pervasive. </span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">With tattoos only being legalized in 1948, and so much tattoo history in Japan before that, it’s hard to picture a time when people will get on the same page about body art.</span></p><span data-dcnode-id="701" instrument_node="">
</span><h2 data-dcnode-id="697"><span class="ez-toc-section" data-dcnode-id="700" id="Tebori_-_Traditional_Japanese_Tattoos"></span><span data-dcnode-id="699" instrument_node="">Tebori – Traditional Japanese Tattoos</span><span class="ez-toc-section-end" data-dcnode-id="698"></span></h2><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">When we say “traditional” in terms of Japanese tattooing, we may be talking about the style of art, the method of application, or both. </span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">The traditional Japanese art style dates back to wood prints that inspired the average Edo period town folk to get tattoos- something that had become associated with unruly activity prior.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Of course, people have been getting tattoos long before tattoo machines (and even electricity!) were used. </span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">The Japanese tradition is known as </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tattmag.com/tebori-tattoo/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="685" instrument_node="">Tebori</span></a><span data-dcnode-id="683" instrument_node="">. </span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Some people know traditional tattoo methods as “stick and poke,” which is something of an umbrella term for different cultural versions of these handmade tattoo applicators.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Some Japanese artists still use Tebori techniques in their tattooing, and it has become a requested method in recent years.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">While many people consider “stick and poke” tattoos to be unhygienic or time-consuming, they have made a resurgence in the tattoo world.</span></p><span data-dcnode-id="672" instrument_node="">
</span><h3 data-dcnode-id="668"><span class="ez-toc-section" data-dcnode-id="671" id="The_Popularity_of_Japanese_Traditional_Tattoo_Methods"></span><span data-dcnode-id="670" instrument_node="">The Popularity of Japanese Traditional Tattoo Methods</span><span class="ez-toc-section-end" data-dcnode-id="669"></span></h3><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">There are a couple of different reasons why modern tattoo clients are asking for Tebori tattoos:</span></p><span data-dcnode-id="664" instrument_node="">
</span><ul data-dcnode-id="661"><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">A new appreciation for handmade – many young adults today are starting to realize the downsides of our fast-paced pre-made culture. </span></li></ul><span data-dcnode-id="660" instrument_node="">
</span><ul data-dcnode-id="657"><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Many older traditions are becoming popular as people start to re-embrace slow, mindful lifestyle changes.</span></li></ul><span data-dcnode-id="656" instrument_node="">
</span><ul data-dcnode-id="653"><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">The artistry behind a Tebori tattoo makes the experience special and intimate.</span></li></ul><span data-dcnode-id="652" instrument_node="">
</span><ul data-dcnode-id="646"><li data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">It honors a tradition that doesn’t always get proper respect. In Japan, there is a stigma around tattooing. Because of Irezumi’s long history with unruly activity and the </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yakuza" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="650" instrument_node="">Yakuza</span></a><span data-dcnode-id="648" instrument_node="">, some think less of people with tattoos. There have even been some studies showing that certain people in Japan are uncomfortable swimming with or even sitting next to people with tattoos.</span></li></ul><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Embracing the old ways is almost a reclaiming of this as an art form, a spiritual experience, and creative expression. </span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">The original tattoos in Japan were thought to protect the wearer from bad spirits. </span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Getting a tattoo the same way an ancestor would have pays homage to that person.</span></p><span data-dcnode-id="636" instrument_node="">
</span><h3 data-dcnode-id="632"><span class="ez-toc-section" data-dcnode-id="635" id="What_is_the_Tebori_Method"></span><span data-dcnode-id="634" instrument_node="">What is the Tebori Method?</span><span class="ez-toc-section-end" data-dcnode-id="633"></span></h3><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="630" instrument_node="">The word Tebori is made up of two parts: </span><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Te</span></strong><span data-dcnode-id="627" instrument_node=""> meaning hand and </span><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Bori</span></strong><span data-dcnode-id="624" instrument_node=""> meaning “to carve.”</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Great tattoo artists in Japan are allowed to call themselves “Horishi,” or carvers. </span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">This isn’t a title to be taken lightly and should be passed on to you by your mentor. </span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">This is the same title given to woodblock artists, and the original woodblock carvers are believed to have also worked as tattoo artists.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="612" instrument_node="">The great tattoo artist </span><a data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horiyoshi_III" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="611" instrument_node="">Horiyoshi III</span></a><span data-dcnode-id="609" instrument_node=""> does not call himself an artist, but a craftsman. </span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">He uses a tattoo machine but blends his machine work with some Tebori to keep the tradition alive.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Tebori tools consist of two parts: a metal or bamboo rod and a bundle of needles. </span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">The needles were fixed to the rod using a silk string traditionally, though some people use different materials today.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Instead of the tattoo machine moving the needles, the person applying the Tebori will move their hand back and forth in a rhythmic fashion. </span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">This method will take longer and requires a different skill set than a tattoo machine.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Tebori is less painful than other stick and poke techniques, where the artist uses a little hammer or mallet-type object to drive the needle into the skin.</span></p><span data-dcnode-id="589" instrument_node="">
</span><h3 data-dcnode-id="585"><span class="ez-toc-section" data-dcnode-id="588" id="Are_Tebori_Tattoos_Safe"></span><span data-dcnode-id="587" instrument_node="">Are Tebori Tattoos Safe?</span><span class="ez-toc-section-end" data-dcnode-id="586"></span></h3><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">As young people begin embracing these old practices, there have been some concerns from public health organizations.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Tattooing is something that needs to be very sterile to keep clients safe, and there is some worry that these older tools are more difficult to sanitize.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Modern Tebori artists have responded to this concern by switching out their needles after every use, the same practice used with a machine.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="574"></p><span data-dcnode-id="573" instrument_node="">
</span><h3 data-dcnode-id="569"><span class="ez-toc-section" data-dcnode-id="572" id="Do_Tebori_Tattoos_Hurt_More"></span><span data-dcnode-id="571" instrument_node="">Do Tebori Tattoos Hurt More?</span><span class="ez-toc-section-end" data-dcnode-id="570"></span></h3><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">There is some debate in the tattoo community about whether tattoos hurt more from a machine or from Tebori methods.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">A tattoo machine will be quicker, about half the time it takes to get a Tebori tattoo. </span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">But the needle is moving quickly – a tattoo machine can pierce the skin between 50 and 3000 times per minute! </span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">So in some ways, a tattoo machine can be more painful because there is more happening at a much faster rate.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Tebori tattoos take longer though, so it may depend on your determination. </span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Would you rather have a lot of pain that ends quickly or a slightly less intense pain that goes on longer?</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Another thing to consider is your tattoo artist. </span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">No matter what kind of tool an artist uses- technique is key.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node=""> Some tattooers have a light touch, while others fastly drive the ink into the skin. </span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Generally, a tattoo from someone with years of experience will be gentler, because they’ve practiced longer.</span></p><span data-dcnode-id="538" instrument_node="">
</span><h3 data-dcnode-id="534"><span class="ez-toc-section" data-dcnode-id="537" id="Do_Tebori_Tattoos_Look_Better"></span><span data-dcnode-id="536" instrument_node="">Do Tebori Tattoos Look Better?</span><span class="ez-toc-section-end" data-dcnode-id="535"></span></h3><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">With all of the vibrant colors we see in many traditional Japanese designs, it’s no wonder artists would want to work with whatever is going to give them the best result.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">How a tattoo comes out on your skin will depend almost as much on the artist as it does on the tools.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Some people can achieve amazing, hyper-saturated results with a tattoo machine.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Others argue that they see a deeper, more fleshed-out result from their Tebori work.</span></p><span data-dcnode-id="521" instrument_node="">
</span><h3 data-dcnode-id="517"><span class="ez-toc-section" data-dcnode-id="520" id="Do_Tebori_Tattoos_Heal_Better"></span><span data-dcnode-id="519" instrument_node="">Do Tebori Tattoos Heal Better?</span><span class="ez-toc-section-end" data-dcnode-id="518"></span></h3><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Because the process of Tebori is slower and gentler than a fast-moving needle, many Tebori artists say it is less irritant to the skin.</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">It may heal more quickly and evenly than a tattoo applied with a machine.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Again, this will be influenced by the artist you work with and how much care they take. </span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">There is no official research to show which method heals quicker or more evenly.</span></p><span data-dcnode-id="504" instrument_node="">
</span><h3 data-dcnode-id="500"><span class="ez-toc-section" data-dcnode-id="503" id="Should_I_choose_Tebori_or_Modern_Techniques_for_my_Irezumi"></span><span data-dcnode-id="502" instrument_node="">Should I choose Tebori or Modern Techniques for my Irezumi?</span><span class="ez-toc-section-end" data-dcnode-id="501"></span></h3><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">If you’re more interested in the finished result than the process itself, it’s a good idea to research artists and find someone whose aesthetic appeals to you.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">If it’s more about the journey, you’ll experience a longer more intimate process with Tebori style tattooing, and tap into a centuries-old practice while you’re at it.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Either tattoo technique can be a safe, beautiful way to show your love of traditional Japanese tattoos; just do your research and find a great artist first!</span></p><span data-dcnode-id="490" instrument_node="">
</span><h2 data-dcnode-id="486"><span class="ez-toc-section" data-dcnode-id="489" id="Famous_Irezumi_Artists"></span><span data-dcnode-id="488" instrument_node="">Famous Irezumi Artists</span><span class="ez-toc-section-end" data-dcnode-id="487"></span></h2><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">If you’re looking to get a traditional-looking Japanese tattoo (Irezumi), it would only make sense to see a traditional Irezumi tattoo artist. </span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Be discerning, and save your pennies! </span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Artists with a great reputation may be more expensive, but they’re charging for the years of experience they’ve poured into their craft.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Some Irezumi artists use traditional tools, but many use modern machines and will hone techniques to make them resemble traditional Japanese tattoos with their own artistic flair.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">The nice thing about social media is, you can always see the artists in your area without going to their studio.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Of course, if you’re looking to find the best possible person for the job and have the budget to travel, the possibilities are truly endless. </span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">We’ve compiled a list of some of the most amazing artists working in the traditional Japanese style today. </span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">You may have to hop on a long waitlist to get in the same room with these people, but the finished product may be worth it!</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Here are a couple of our favorite Japanese tattoo artists to follow:</span></p><span data-dcnode-id="458" instrument_node="">
</span><ul data-dcnode-id="453"><li data-dcnode-id="454"><strong data-dcnode-id="455"><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/horiyoshi_3/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="457" instrument_node="">Horiyoshi 3</span></a></strong></li></ul><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Horiyoshi 3 is a living legend in the tattoo community. </span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">He has been working for roughly 40 years in the industry and does not plan on retiring. </span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Born as Yoshihito Nakano in Japan in 1946, he found his calling as a tattoo artist at a young age.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">When 10-year-old Yoshihito Nakano was visiting a public bath, he saw a man with an Irezumi, the Japanese word for tattoo. </span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">He spent the rest of that evening asking his family about tattoos and was delighted to discover that his great grandfather had a piece on his back.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Soon he was able to find books on tattooing and lost himself in the images. </span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">He got his first Irezumi on his foot at the age of 15 and was asked by a friend if he would do a design on him. </span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Nakano began making a little pocket money with his self-taught techniques and developed his style until it was time to study under a master.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Now completely absorbed in the dream of becoming a great tattoo artist, Nakano wrote to several legendary artists asking to be their apprentice. </span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">He received no reply until eventually, he went right to one of them.</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Horiyoshi 1 and his son, Horiyoshi 2, were the only 2 people with that title at the time. </span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">The prefix “Hori” means “to carve,” and is an honor to be given this title. </span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">After Horiyoshi 3 agreed to take Nakano on as an apprentice, he eventually gave him the title of Horiyoshi 3.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Horiyoshi 3 uses a combination of tattoo machines and the traditional Tebori equipment he started with.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Horiyoshi believes in de-stigmatizing tattoos, especially the belief that they are inextricably linked to rowdy activity.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">While Horiyoshi has been known to tattoo members of the Yakuza, he feels they are largely misunderstood and do good things for the community. </span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Many people in Japan have come to share this belief. </span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">They may not love that the Yakuza does certain acts, but the level of organization within the group cuts down on petty or randomized misdemeanors, which keeps innocent people safe. </span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">The Yakuza has also been known to do charity work and make large donations in times of need.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Looking to get tattooed by Horiyoshi III? </span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Unfortunately, he is getting on in years and has made the decision to finish up the tattoos he has already started, but not take on new clients.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">But don’t despair! Horiyoshi III has a brilliant apprentice, his own son. </span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="385" instrument_node="">His title is Horiyoshi “Souryou” the 3rd, and he can be found on Instagram </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/souryou/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="384" instrument_node="">souryou</span></a><span data-dcnode-id="382" instrument_node="">.</span></p><span data-dcnode-id="380" instrument_node="">
</span><ul data-dcnode-id="375"><li data-dcnode-id="376"><strong data-dcnode-id="377"><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/souryou/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="379" instrument_node="">Horiyoshi “Souryou” the 3rd</span></a></strong></li></ul><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Souryou uses a mix of Tebori and tattoo machine techniques to create his artwork. </span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Keen on continuing the Horiyoshi legacy, he plans to travel to prestigious tattoo conventions across the world.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">To Horiyoshi, having an understanding of Japanese traditions and folklore is important when getting a tattoo of these images. </span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">There are some images he will not combine in a tattoo. </span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">To him, every image must honor the history behind it.</span></p><span data-dcnode-id="359" instrument_node="">
</span><ul data-dcnode-id="354"><li data-dcnode-id="355"><strong data-dcnode-id="356"><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/bardadim/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="358" instrument_node="">George Bardadim</span></a></strong></li></ul><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Living a little far from Japan? </span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Maybe you’d be interested in meeting a Russian-born artist living in NYC who happens to be a master at traditional-looking Japanese tattoos.</span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Another legend on the scene, Bardadim has been perfecting the art of the Japanese tattoo for 30 years. </span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">His website states that he is interested in performing Japanese tattoo designs only, so he’s dedicated to the craft.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Similar to Horiyoshi 3, Bardadim caught the tattooing bug at a young age. </span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Growing up in Eastern Europe, he was endlessly fascinated by his father’s wrist tattoo. </span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">He asked him about it all the time and was so curious as to how it didn’t wash off with soap and water.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Bardadim started “from scratch” in his words in 1988, when there wasn’t really a tattoo scene to speak of in  Eastern Europe. </span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">He fell in with a group of punk rockers and one night a friend of his insisted on getting an amateur tattoo. </span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Because Baradim was the best artist in the group, the task fell on him.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">His first piece was done using a sewing needle and the ink he used to draw on paper. </span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">After practicing with this experimental and time-consuming method, he decided to build a machine. </span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">This was in a time before online tutorials, but luckily Bardadim had the next best thing- a friend who had just gotten out of the pen.</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">He taught him how to build a rudimentary machine, and Bardadim continued to study by practicing and reading anything he could find on the art of tattooing.</span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Bardadim has worked in other styles of tattooing in the past, but will no longer work in mediums other than the traditional Japanese style. </span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">He feels that, while tattoo artists may choose a style to start with, over time a style will choose them.</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">He prefers the Japanese style of tattooing because of its bold lines and bright colors. </span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">After years in the industry, he has seen what does and doesn’t age well, and isn’t shy to tell his clients if their tattoo concepts will become less attractive over time. </span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Ever the perfectionist, he will work with clients to improve upon their designs.</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Japanese tattoos, he says, tend to maintain their integrity over the years, so he has chosen to work with Irezumi for the foreseeable future.</span></p><span data-dcnode-id="293" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="292"><span data-dcnode-id="291" instrument_node="">
