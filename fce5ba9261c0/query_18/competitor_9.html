</span><div class="wp-block-image" data-dcnode-id="1878"><figure class="aligncenter size-medium" data-dcnode-id="1879"><img alt="Japanese tattoo" class="wp-image-7053" data-dcnode-id="1882" data-lazy-sizes="(max-width: 240px) 100vw, 240px" data-lazy-src="https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-240x300.jpg" data-lazy-srcset="https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-240x300.jpg 240w, https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-819x1024.jpg 819w, https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-768x960.jpg 768w, https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-1024x1280.jpg 1024w, https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103.jpg 1080w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20240%20300'%3E%3C/svg%3E" width="240"><noscript data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">&lt;img width="240" height="300" src="https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-240x300.jpg" alt="Japanese tattoo" class="wp-image-7053" srcset="https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-240x300.jpg 240w, https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-819x1024.jpg 819w, https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-768x960.jpg 768w, https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103-1024x1280.jpg 1024w, https://tattmag.com/wp-content/uploads/2020/03/japanese-tattoo-103.jpg 1080w" sizes="(max-width: 240px) 100vw, 240px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1877" instrument_node="">
</span><h2 data-dcnode-id="1873"><span class="ez-toc-section" data-dcnode-id="1876" id="History_of_Japanese_Tattoos"></span><span data-dcnode-id="1875" instrument_node="">History of Japanese Tattoos</span><span class="ez-toc-section-end" data-dcnode-id="1874"></span></h2><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">So, you’re thinking of getting a traditional Japanese tattoo. You’re not alone!</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node=""> Many people are fans of Japanese tattoos, and will even travel to great lengths to have them done by an expert. </span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Irezumi tattoos feature bold blocks of color and unforgettable designs so vibrant, their sense of movement is enhanced by the breathing canvases they live on.</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Japanese tattoo artists have been seeing more Westerners coming to their shops in recent years. </span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">It seems that, while not every person native to Japan is interested in tattoos, those living outside the culture are endlessly fascinated by the designs.</span></p><span data-dcnode-id="1857" instrument_node="">
</span><h3 data-dcnode-id="1853"><span class="ez-toc-section" data-dcnode-id="1856" id="Cultural_Appropriation"></span><span data-dcnode-id="1855" instrument_node="">Cultural Appropriation</span><span class="ez-toc-section-end" data-dcnode-id="1854"></span></h3><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1851"></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Some believe that getting a tattoo outside of your culture is disrespectful. </span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">The argument is that these symbols are rich in history, and mean something more to people who grew up with that history. </span></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">To get a tattoo merely because “it looks cool” is considered flippant and dismissive of the people who treasure that symbol.</span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">So it is easier for someone from the outside to pluck something from another culture and enjoy it without many ramifications. </span></p><span data-dcnode-id="1838" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">A challenge specific to Japanese tattoos is the fact that they are linked to unruly activity. </span></p><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">So it isn’t nearly as easy for a Japanese person to have tattoos and navigate their world freely.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">With that in mind, no matter what background you come from, it’s best to do a little research on the subject matter at hand before choosing a tattoo design for life. </span></p><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">If you are someone who admires Irezumi but did not grow up in the Japanese culture, you can show your respect by deepening your knowledge.</span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Let’s explore the history of Japanese tattooing, or Irezumi, its implications in day-to-day life, and what Irezumi culture looks like in contemporary Japan.</span></p><span data-dcnode-id="1823" instrument_node="">
</span><h4 data-dcnode-id="1819"><span class="ez-toc-section" data-dcnode-id="1822" id="Irezumi_is_often_Under_Wraps"></span><span data-dcnode-id="1821" instrument_node="">Irezumi is often Under Wraps</span><span class="ez-toc-section-end" data-dcnode-id="1820"></span></h4><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Though tattoos are a visible medium, they are often something to be kept private in Japan. </span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Though there are some places where people wear their body art openly in Japan, many people keep their work hidden underneath their clothing. </span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">There are some locations where people with visible tattoos are not welcome and will be politely asked to cover up or leave.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">The reasons for this secretive attitude toward tattoos are complicated and vary from place to place, person to person, but there are two main elements to consider.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><h3 data-dcnode-id="1802"><span class="ez-toc-section" data-dcnode-id="1805" id="Cultural_Sensibilities"></span><span data-dcnode-id="1804" instrument_node="">Cultural Sensibilities</span><span class="ez-toc-section-end" data-dcnode-id="1803"></span></h3><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Every culture expresses itself differently through its people. In Western society, part of getting a tattoo is being able to show it off. </span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">The time, money, and care spent on the design are often motivated by its aesthetic appeal.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1794" instrument_node="">In an interview with </span><em data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Vice</span></em><span data-dcnode-id="1791" instrument_node="">, </span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DlrgyYLQP7Vs" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1790" instrument_node="">tattoo legend Horiyoshi 3</span></a><span data-dcnode-id="1788" instrument_node=""> talks about keeping tattoos hidden. </span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">He says the beauty of Irezumi is that not everyone can see them, and when they are visible something is lost in that visibility. </span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">He uses the analogy of a Western church vs a Japanese temple- the church will likely be ornate and brightly lit, featuring statues, windows, and candles. </span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">A Japanese temple, conversely, is minimal and shadowy.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Though only someone who grew up in Japan like Horiyoshi could really understand, he illustrates an important distinction between more outgoing and demonstrative cultures and one that values subtlety.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">It’s not that Japanese people can’t be proud of their tattoos- it’s that this pride doesn’t have to be visible. </span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">The tattoo is for no one other than the person wearing it.</span></p><span data-dcnode-id="1768" instrument_node="">
</span><h3 data-dcnode-id="1764"><span class="ez-toc-section" data-dcnode-id="1767" id="A_History_with_Yakuza"></span><span data-dcnode-id="1766" instrument_node="">A History with Yakuza</span><span class="ez-toc-section-end" data-dcnode-id="1765"></span></h3><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Irezumi are also hidden because of links to general turbulent activity and the Yakuza- which many Westerners refer to as the Japanese mafia.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1759" instrument_node="">Having </span><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tattmag.com/yakuza-tattoo/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1758" instrument_node="">Yakuza tattoos</span></a><span data-dcnode-id="1756" instrument_node=""> can’t fool someone into thinking you’re part of the Yakuza, and it would be silly to assume that’s why they’re frowned upon. </span></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">It isn’t that Japanese people are so naive to assume that everyone who has tattoos is a Yakuza member, it’s more the connotations that come along with it.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">It’s also easier to say “no tattoos” than it is to say “no Yakuza,” because it’s difficult to identify who is part of the organization, but it is true that many of them have Japanese bodysuit tattoos.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">In some ways, having visible tattoos in certain public spaces can show a disregard for the complicated history that comes with body art in Japan.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><h4 data-dcnode-id="1741"><span class="ez-toc-section" data-dcnode-id="1744" id="How_Did_Japanese_Tattoos_Become_Associated_with_Yakuza"></span><span data-dcnode-id="1743" instrument_node="">How Did Japanese Tattoos Become Associated with Yakuza?</span><span class="ez-toc-section-end" data-dcnode-id="1742"></span></h4><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Let’s start at the beginning of tattoo culture in Japan. </span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">The farthest historians can trace body art in Japanese culture is the </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J%25C5%258Dmon_period" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1735" instrument_node="">Jōmon period</span></a><span data-dcnode-id="1733" instrument_node="">, which stretched from 10,000 to 300BC. </span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Even during this time, it is believed people were using rudimentary tools to create tattoo designs.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1727" instrument_node="">The evidence for this is in </span><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dog%25C5%25AB" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1726" instrument_node="">Dogū</span></a><span data-dcnode-id="1724" instrument_node="">, ancient clay figurines. </span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Dogū are covered in markings on their faces and bodies that are believed to be tattoos.</span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">The earliest tattoos were used as protective symbols as well as identifying markers for people’s bodies.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><h3 data-dcnode-id="1712"><span class="ez-toc-section" data-dcnode-id="1715" id="Tattoos_Rise_in_Popularity"></span><span data-dcnode-id="1714" instrument_node="">Tattoos Rise in Popularity</span><span class="ez-toc-section-end" data-dcnode-id="1713"></span></h3><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Cut to the Edo period (1600-1867) in Japan, when tattoos began to rise in popularity toward the end of the time period.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Part of the credit for this mainstream acceptance goes to artist Utagawa Kuniyoshi, who created a popular series of woodblock prints from 1827- 1830. </span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">The prints were inspired by a 14th-century novel and feature people with impressive full-body tattoos.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">The traditional Japanese tattoos depicted in those woodblocks are rich with themes we continue to see in contemporary Japanese artwork and tattoo designs, so the ripple effect from way back then is immeasurable.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><h4 data-dcnode-id="1695"><span class="ez-toc-section" data-dcnode-id="1698" id="Tattoos_As_A_Discipline_Strategy"></span><span data-dcnode-id="1697" instrument_node="">Tattoos As A Discipline Strategy</span><span class="ez-toc-section-end" data-dcnode-id="1696"></span></h4><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Curiously, in the earlier parts of the Edo Period, tattoos were used as a discipline strategy for various misdemeanors. </span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Outcasts would be tattooed in a highly visible area, usually their face. </span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">These tattoos were meant as a form of embarrassment and public shaming, but also as a way of identifying the outcasts. </span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Generally, a lawbreaker would be exiled as well as tattooed, and each region had its own markings. </span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">In some areas, they had tattoo symbols that came in 3 “parts,” which you would collect as you re-offended. </span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">After you had 3 strikes, more severe retribution was considered.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Eventually face tattoos gave way to limb tattoos, and the policy completely fizzled out to the point where it was officially abolished in 1872.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">As these tattoos became rarer, and Kuniyoshi’s prints were brought to the mainstream, everyday folks started to warm up to the idea of having tattoos themselves.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><h4 data-dcnode-id="1666"><span class="ez-toc-section" data-dcnode-id="1669" id="Tattoos_Outlawed"></span><span data-dcnode-id="1668" instrument_node="">Tattoos Outlawed</span><span class="ez-toc-section-end" data-dcnode-id="1667"></span></h4><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">In 1868, however, everything changed. A second ripple was set into motion when tattoos were outlawed. </span></p><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">This time in Japan (1868-1912) is known as the Meiji era, because it lines up with the reign of Emperor Meiji.</span></p><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">This period is marked by influences from the Western world and a strong effort to both keep up with and improve upon the new technology being developed in the West.</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Though many people had tattoos for spiritual or protective reasons, the desire to present a professional face to visiting Westerners was great. </span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Tattoos were frowned upon in professional settings and officially outlawed in 1871 as more foreigners began to arrive in Japan.</span></p><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Those who did choose to get tattoos during this period were sometimes just folks with reckless attitudes, but tattooing was also embraced by outcasts because of its forbidden qualities.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">By the time the tattoo ban was officially lifted in 1948, the stigma around Irezumi had been steeped into the Japanese culture. </span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">While tattoos are technically legal now, there are some contemporary issues attached to Japan’s fraught history with tattoos.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><h2 data-dcnode-id="1637"><span class="ez-toc-section" data-dcnode-id="1640" id="Where_do_I_Need_to_Cover_My_Tattoos_in_Japan"></span><span data-dcnode-id="1639" instrument_node="">Where do I Need to Cover My Tattoos in Japan?</span><span class="ez-toc-section-end" data-dcnode-id="1638"></span></h2><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Tattoos carry a stigma in Japan. </span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Because of this and the private nature of the culture, there are spaces where you’ll need to cover your ink. </span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">If you’re planning on </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taramoss.com/visiting-japan-tattoos/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1628" instrument_node="">visiting Japan</span></a><span data-dcnode-id="1626" instrument_node="">, or live there currently and are looking to get a tattoo, these are things you will have to consider.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">It’s not impossible to live freely as a tattooed person in Japan, there’s just some planning involved when entering certain spaces.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">You’ll likely need to cover your tattoos in the following places:</span></p><span data-dcnode-id="1618" instrument_node="">
</span><ul data-dcnode-id="1607"><li data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Pools &amp; Beaches</span></li><li data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Waterparks</span></li><li data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Fitness Centres</span></li><li data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Public Baths (Onsen)</span></li><li data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Some Workspaces</span></li></ul><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">This may seem tricky to navigate since the majority of these are spaces where your skin is going to be exposed. </span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">In the case of an onsen, you aren’t supposed to wear a bathing suit, so some situations seem impossible to navigate! But you do have some options.</span></p><span data-dcnode-id="1600" instrument_node="">
</span><h3 data-dcnode-id="1596"><span class="ez-toc-section" data-dcnode-id="1599" id="Do_Some_Research_on_Tattoo-Friendly_Spaces"></span><span data-dcnode-id="1598" instrument_node="">Do Some Research on Tattoo-Friendly Spaces</span><span class="ez-toc-section-end" data-dcnode-id="1597"></span></h3><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Because this is a part of living in Japan, there are resources available. </span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Many websites are dedicated to tattoo-friendly spaces in Japan. </span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">There are some onsen where tattoos are permitted, so plan your day around those locations and you’re golden.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">You also have the option to book a private onsen for maximum relaxation. </span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Nobody minds what nobody sees!</span></p><span data-dcnode-id="1580" instrument_node="">
</span><h3 data-dcnode-id="1576"><span class="ez-toc-section" data-dcnode-id="1579" id="Cover_Up"></span><span data-dcnode-id="1578" instrument_node="">Cover Up</span><span class="ez-toc-section-end" data-dcnode-id="1577"></span></h3><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Japan has a sub-tropical climate which means if you visit in the summer, you must be prepared for heat and humidity. </span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">With this in mind, you may feel overwhelmed at the task of keeping your skin covered in certain areas. </span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">You can invest in a Rashi, a lightweight body-covering top designed for athletes, or you can carry around a light scarf.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Some tattooed folks who work in Japan simply cover their ink with bandages when in these settings. </span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">If your tattoo is small enough, it’s easy to carry around a box of waterproof plasters for cover-up situations.</span></p><span data-dcnode-id="1560" instrument_node="">

</span><h2 data-dcnode-id="1034"><span class="ez-toc-section" data-dcnode-id="1037" id="Japanese_Tattoo_Ideas"></span><span data-dcnode-id="1036" instrument_node="">Japanese Tattoo Ideas</span><span class="ez-toc-section-end" data-dcnode-id="1035"></span></h2><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">There is no shortage of ideas when it comes to Japanese tattoos. </span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">It might feel overwhelming to narrow down the right tattoo that would fit what you are looking for. </span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">The best way to choose the right design would be to do your research on what you want to portray and look up symbols, deities, or traditions that will fit that. </span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">An experienced artist might be a great asset to help guide you as well.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><ul data-dcnode-id="1017"><li data-dcnode-id="1018"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Black &amp; Grey Japanese Tattoos</span></strong></li></ul><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">It is common to see Japanese tattoos as colorful and bright. </span></p><span data-dcnode-id="1013" instrument_node="">
