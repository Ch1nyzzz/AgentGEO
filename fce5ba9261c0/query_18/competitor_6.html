</span><div class="article-body" data-dcnode-id="3830"><span data-dcnode-id="4553" instrument_node="">
</span><p data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">You see colors in everything around you, every moment of the day—but do you ever stop to think about the impact each of those colors is having on you? Whether it’s the calming effect of blue skies and fields of green, or the saliva-inducing red and yellow of your local fast food chain, each color has a meaning and taps into emotions. There’s a whole science (and art) in the meanings of colors. As an entrepreneur or designer, it’s essential to be aware of these color meanings to help you choose your colors wisely and tap into the magical power of color symbolism.</span></p><span data-dcnode-id="4550" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4543" data-id="168005" id="mediaattachment_168005"><img alt="Man considering meanings of different colors" class="wp-image-168005 size-full" data-dcnode-id="4549" height="1090" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1860"><figcaption data-dcnode-id="4544"><span data-dcnode-id="4548" instrument_node="">Color meanings can be powerful, so choose your colors carefully. Illustration by </span><a data-dcnode-id="4546" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/1193222"><span data-dcnode-id="4547" instrument_node="">OrangeCrush</span></a><span data-dcnode-id="4545" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="4542" instrument_node="">
</span><p data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">Colors can be a powerful tool—if you know how to use them. For a business—whether it’s yours or your client’s—there are all sorts of places where color comes into play. You might immediately think of branding elements like the logo, business cards and stationery. Color choices will also be meaningful across online communication and marketing materials: your website, social media, emails, presentations as well as offline tools like flyers and product packaging.</span></p><span data-dcnode-id="4539" instrument_node="">
</span><h2 data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">Where do color meanings come from?</span></h2><span data-dcnode-id="4536" instrument_node="">
</span><h2 data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">—</span></h2><span data-dcnode-id="4533" instrument_node="">
</span><p data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">Millions of years of biological conditioning have created certain associations between colors and objects or emotions, while some associations may be more recent. Understanding these associations will give you a shortcut to people’s hearts, provoking a specific emotion and maybe even a behavior. Feelings are much more powerful than rational thoughts based on facts and figures and applying color meanings and color symbolism will make your branding efforts and designs much more effective.</span></p><span data-dcnode-id="4530" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4523" data-id="167968" id="mediaattachment_167968"><img alt="Set of coloring pencils" class="wp-image-167968 size-full" data-dcnode-id="4529" height="1181" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_66077189.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1181"><figcaption data-dcnode-id="4524"><span data-dcnode-id="4528" instrument_node="">Choose your colors carefully. Design for a pencil set by </span><a data-dcnode-id="4526" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/1765470"><span data-dcnode-id="4527" instrument_node="">ve_sta</span></a><span data-dcnode-id="4525" instrument_node=""> for Vibrant Colors.</span></figcaption></figure><span data-dcnode-id="4522" instrument_node="">
</span><p data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">Color meanings stem from psychological effects, biological conditioning and cultural developments. Some color meanings are deeply rooted in our brains because they’re visible all around us, like red as the color of fire being associated with warmth or green with nature. We’re biologically wired to pay attention to bright colors because brightly colored animals or plants are often poisonous. We’re drawn to red fruit over green fruit because the color indicates ripeness and sweetness.</span></p><span data-dcnode-id="4519" instrument_node="">
</span><p data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">Other colors have developed cultural meaning over time and their meanings have been adopted by society, such as pink as a color for girls and blue for boys in Western cultures (which hasn’t always been the case).</span></p><span data-dcnode-id="4516" instrument_node="">
</span><p data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">Here are a few things that can have an impact on the meaning of colors:</span></p><span data-dcnode-id="4513" instrument_node="">
</span><ul data-dcnode-id="4485"><span data-dcnode-id="4512" instrument_node="">
</span><li data-dcnode-id="4508"><strong data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">Cultural differences</span></strong><span data-dcnode-id="4509" instrument_node="">—Red represents good luck in China but in South Africa it’s the color of mourning. Americans associate green with money as that’s the color of dollar bills but that isn’t the case globally. Black is the color of mourning in Western countries, while in some East Asian countries it’s white. In the US green is the color of envy, while in Germany it’s yellow. You’ll need to be sensitive to these differences depending on where you are operating.</span></li><span data-dcnode-id="4507" instrument_node="">
</span><li data-dcnode-id="4500"><strong data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Time</span></strong><span data-dcnode-id="4504" instrument_node="">—Colors may also change in significance over time: red used to be seen as a strong, masculine color while</span><a data-dcnode-id="4502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smithsonianmag.com/arts-culture/when-did-girls-start-wearing-pink-1370097/"><span data-dcnode-id="4503" instrument_node=""> blue was a feminine color suited for girls</span></a><span data-dcnode-id="4501" instrument_node="">.</span></li><span data-dcnode-id="4499" instrument_node="">
</span><li data-dcnode-id="4495"><strong data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">Shades and tones</span></strong><span data-dcnode-id="4496" instrument_node="">—A color may have a general meaning, but lighter shades can vary dramatically compared to darker shades, while more natural, muted shades will differ from artificial neon colors. Make sure that you look at the specific associations of the different shades and tones. For example, if you’re using neon green, don’t assume that just because you’ve chosen a shade of green it’s going to be a good fit for an eco-friendly brand. Similarly, a bright magenta will have a totally different meaning from a muted pastel shade of rosé, even if they are both shades of pink.</span></li><span data-dcnode-id="4494" instrument_node="">
</span><li data-dcnode-id="4487"><strong data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">Color combinations</span></strong><span data-dcnode-id="4491" instrument_node="">—If you’re using more than one color you need to be aware of how color combinations affect the overall meaning. They can enhance each other, make each other pop, blend together or fight with each other. You’ll need to give some thought to their combined meanings and what effect you want to achieve with your combination. </span><a data-dcnode-id="4489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/blog/tips/the-7-step-guide-to-understanding-color-theory/"><span data-dcnode-id="4490" instrument_node="">Color theory</span></a><span data-dcnode-id="4488" instrument_node=""> will help you understand the relationships between colors.</span></li><span data-dcnode-id="4486" instrument_node="">
</span></ul><span data-dcnode-id="4484" instrument_node="">
</span><p data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">Now let’s explore what all those colors mean…</span></p><span data-dcnode-id="4481" instrument_node="">
</span><h2 data-dcnode-id="4477"><span data-dcnode-id="4480" instrument_node="">The meanings of colors</span><br data-dcnode-id="4479"><span data-dcnode-id="4478" instrument_node="">
—</span></h2><span data-dcnode-id="4476" instrument_node="">
</span><h3 data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">Red is for energy, passion and danger</span></h3><span data-dcnode-id="4473" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4469" data-id="203961" id="mediaattachment_203961"><img alt="meaning of red" class="wp-image-203961 size-medium" data-dcnode-id="4472" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-RED-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">The meaning of red</span></figcaption></figure><span data-dcnode-id="4468" instrument_node="">
</span><h4 data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">What red means:</span></h4><span data-dcnode-id="4465" instrument_node="">
</span><p data-dcnode-id="4460"><span data-dcnode-id="4464" instrument_node="">Red is associated with the heat of energy, passion and love. We “see red” when we’re angry and it’s also the color of blood, power and danger, making it a powerful color in branding. Think of the bold red of a fireman’s truck or the ‘stop’ sign in traffic. Red is also said to stimulate appetite, which is why it’s popular in fast food chains—most famously in </span><a data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mcdonalds.com/us/en-us.html"><span data-dcnode-id="4463" instrument_node="">McDonald’s</span></a><span data-dcnode-id="4461" instrument_node="">, which combines red with another primary color, yellow.</span></p><span data-dcnode-id="4459" instrument_node="">
</span><p data-dcnode-id="4449"><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netflix.com/"><span data-dcnode-id="4458" instrument_node="">Netflix</span></a><span data-dcnode-id="4456" instrument_node=""> uses red to attract users to its platform, with red calls-to-action to join or sign in. Another famously red brand is </span><a data-dcnode-id="4454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.coca-cola.com/global/"><span data-dcnode-id="4455" instrument_node="">Coca-Cola</span></a><span data-dcnode-id="4453" instrument_node=""> (and, as the story goes, it was Coke’s marketing campaign that branded Santa Claus red). It will be interesting to see what happens with </span><a data-dcnode-id="4451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedrum.com/news/2018/01/10/diet-coke-hopes-sleek-rebrand-and-some-new-flavours-can-reignite-sluggish-sales"><span data-dcnode-id="4452" instrument_node="">Coca-Cola’s recent packaging redesign</span></a><span data-dcnode-id="4450" instrument_node=""> as they move away from that iconic red to match its new Diet Coke flavors with other colors.</span></p><span data-dcnode-id="4448" instrument_node="">
</span><h4 data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4445" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4438" data-id="167972" id="mediaattachment_167972"><img alt="Star Fire energy cans" class="wp-image-167972 size-full" data-dcnode-id="4444" height="895" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_16140225.png%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1200"><figcaption data-dcnode-id="4439"><span data-dcnode-id="4443" instrument_node="">Red and black is a bold combination that’s masculine and powerful. Design by </span><a data-dcnode-id="4441" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/torvs"><span data-dcnode-id="4442" instrument_node="">torvs</span></a><span data-dcnode-id="4440" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="4437" instrument_node="">
</span><p data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">If you have a loud brand and want to stand out, then red could be the color for you. Its high energy makes it a great choice for caffeine drinks, fast cars or sports. With its appetite-stimulating qualities, it’s a good match for restaurants who want to bring in hungry customers. It can also be used as an accent color to draw attention to something on your packaging, or to get visitors to ‘buy it now’ on your website.</span></p><span data-dcnode-id="4434" instrument_node="">
</span><p data-dcnode-id="4428"><strong data-dcnode-id="4430"><span data-dcnode-id="4433" instrument_node="">Have a question?</span><a data-dcnode-id="4431" href="#comments"><span data-dcnode-id="4432" instrument_node="">Ask our team.</span></a></strong><span data-dcnode-id="4429" instrument_node=""> </span></p><span data-dcnode-id="4427" instrument_node="">
</span><h3 data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">Orange is for creativity, youth and enthusiasm</span></h3><span data-dcnode-id="4424" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4420" data-id="203973" id="mediaattachment_203973"><img alt="The meaning of orange" class="wp-image-203973 size-medium" data-dcnode-id="4423" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-ORANGE-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">The meaning of orange</span></figcaption></figure><span data-dcnode-id="4419" instrument_node="">
</span><h4 data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">What orange means:</span></h4><span data-dcnode-id="4416" instrument_node="">
</span><p data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">As a secondary color, orange combines the warmth and heat of red with the playfulness and joy of yellow. It attracts attention without being as daring as red, and is used for warning signs like traffic cones and high-visibility clothing. It’s an energetic color that can bring to mind health and vitality, given its obvious link to oranges and vitamin C. It’s a youthful color as well, bringing an element of vibrancy and fun.</span></p><span data-dcnode-id="4413" instrument_node="">
</span><p data-dcnode-id="4399"><span data-dcnode-id="4412" instrument_node="">A good example of using orange to connect with a young audience in a fun way is </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nick.de/"><span data-dcnode-id="4411" instrument_node="">Nickelodeon</span></a><span data-dcnode-id="4409" instrument_node="">. To promote energy and activity, </span><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatorade.com/"><span data-dcnode-id="4408" instrument_node="">Gatorade</span></a><span data-dcnode-id="4406" instrument_node=""> uses an orange lightning bolt, while orange is also a popular color for tropical drinks like </span><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fanta.com/"><span data-dcnode-id="4405" instrument_node="">Fanta</span></a><span data-dcnode-id="4403" instrument_node="">. There may be unusual historical reasons behind a brand’s choice of color: </span><a data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herm%25C3%25A8s"><span data-dcnode-id="4402" instrument_node="">luxury brand Hermès</span></a><span data-dcnode-id="4400" instrument_node=""> chose orange because it was the only paperboard available during World War II! It’s a confident color but not usually associated with luxury.</span></p><span data-dcnode-id="4398" instrument_node="">
</span><h4 data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4395" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4388" data-id="167974" id="mediaattachment_167974"><img alt="9 Gorillas logo" class="wp-image-167974 size-full" data-dcnode-id="4394" height="471" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_57721553-e1518452553322.png%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="631"><figcaption data-dcnode-id="4389"><span data-dcnode-id="4393" instrument_node="">The orange brings an unexpected creative touch to the finance business in this logo by </span><a data-dcnode-id="4391" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/crossthelime"><span data-dcnode-id="4392" instrument_node="">Cross the Lime</span></a><span data-dcnode-id="4390" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="4387" instrument_node="">
</span><p data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">Orange can be a great choice for a youthful and creative brand that wants to be a bit different to the mainstream. It’s a friendly color that also stimulates action so, like red, it can be used as an accent color to catch the eye and promote activity.</span></p><span data-dcnode-id="4384" instrument_node="">
</span><h3 data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">Yellow is for happiness, hope and spontaneity</span></h3><span data-dcnode-id="4381" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4377" data-id="203985" id="mediaattachment_203985"><img alt="The meaning of yellow" class="wp-image-203985 size-medium" data-dcnode-id="4380" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-YELLOW-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">The meaning of yellow</span></figcaption></figure><span data-dcnode-id="4376" instrument_node="">
</span><h4 data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">What yellow means:</span></h4><span data-dcnode-id="4373" instrument_node="">
</span><p data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">Yellow is the color of the sun, smiley faces and sunflowers. It’s a happy, youthful color, full of hope and positivity. It’s another color that grabs your attention and for that reason can also be used to signify caution, like red and orange.</span></p><span data-dcnode-id="4370" instrument_node="">
</span><p data-dcnode-id="4365"><span data-dcnode-id="4369" instrument_node="">The golden arches of McDonald’s (well, they’re yellow, really) are a globally recognized symbol that can be seen from far away and immediately gets associated with fast food. In the same way, </span><a data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestbuy.com/"><span data-dcnode-id="4368" instrument_node="">Best Buy’s</span></a><span data-dcnode-id="4366" instrument_node=""> yellow tag indicates a reduced cost for its cost-conscious customers (say that quickly three times!).</span></p><span data-dcnode-id="4364" instrument_node="">
</span><h4 data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4361" instrument_node="">
</span><div class="matrix matrixid-166830 matrix--of-one-small matrix--of-two-medium matrix--of-two-normal matrix--of-two-large matrix--full" data-dcnode-id="4344" id="matrix-2"><div class="matrix__item" data-dcnode-id="4353"><figure data-dcnode-id="4359"><img alt="" data-dcnode-id="4360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_46839986-e1566403308944.jpeg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw"></figure><figcaption data-dcnode-id="4354"><span data-dcnode-id="4358" instrument_node="">Uplifting, yellow quinoa packaging design entry by </span><a data-dcnode-id="4356" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/1186615"><span data-dcnode-id="4357" instrument_node="">Mila Katagarova</span></a><span data-dcnode-id="4355" instrument_node="">.</span></figcaption></div><div class="matrix__item" data-dcnode-id="4345"><figure data-dcnode-id="4351"><img alt="Cereal bar packaging" data-dcnode-id="4352" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_33567080-e1566403334652.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw"></figure><figcaption data-dcnode-id="4346"><span data-dcnode-id="4350" instrument_node="">This shade of yellow works well for a happy, healthy brand like Why Bar in this packaging by </span><a data-dcnode-id="4348" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/martislupus"><span data-dcnode-id="4349" instrument_node="">Martis Lupus</span></a><span data-dcnode-id="4347" instrument_node="">.</span></figcaption></div></div><span data-dcnode-id="4343" instrument_node="">
</span><p data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Yellow is a great choice if speed, fun and low cost are attributes that you want associated with your brand. Be careful with different shades, though: a bright yellow will grab people’s attention right away and it’s a useful way of highlighting or accenting a design, a pale or warm yellow can look natural and healthy, while a neon yellow can instead be very artificial.</span></p><span data-dcnode-id="4340" instrument_node="">
</span><h3 data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">Green is for nature, growth and harmony—but also wealth and stability</span></h3><span data-dcnode-id="4337" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4333" data-id="203965" id="mediaattachment_203965"><img alt="The meaning of green" class="wp-image-203965 size-medium" data-dcnode-id="4336" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-GREEN-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">The meaning of green</span></figcaption></figure><span data-dcnode-id="4332" instrument_node="">
</span><h4 data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">What green means:</span></h4><span data-dcnode-id="4329" instrument_node="">
</span><p data-dcnode-id="4326"><span data-dcnode-id="4327" style="font-weight: 400;"><span data-dcnode-id="4328" instrument_node="">Green is universally associated with nature, linked as it is to grass, plants and trees. It also represents growth and renewal, being the color of spring and rebirth. Another association is “getting the green light” to go ahead, giving it an association with taking action. In the US, green (and especially dark green) is also associated with money and so represents prosperity and stability.</span></span></p><span data-dcnode-id="4325" instrument_node="">
</span><p data-dcnode-id="4307"><span data-dcnode-id="4308" style="font-weight: 400;"><span data-dcnode-id="4324" instrument_node="">Green is also often seen as a fourth color on top of the primary red, yellow and blue (think </span><a data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.microsoft.com/"><span data-dcnode-id="4323" instrument_node="">Microsoft</span></a><span data-dcnode-id="4321" instrument_node=""> and </span><a data-dcnode-id="4319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/"><span data-dcnode-id="4320" instrument_node="">Google</span></a><span data-dcnode-id="4318" instrument_node="">), bringing a sense of visual balance and, as a result, a soothing and relaxing influence. Famous brands that use different shades of green include </span><a data-dcnode-id="4316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starbucks.com/"><span data-dcnode-id="4317" instrument_node="">Starbucks</span></a><span data-dcnode-id="4315" instrument_node="">, </span><a data-dcnode-id="4313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spotify.com/"><span data-dcnode-id="4314" instrument_node="">Spotify</span></a><span data-dcnode-id="4312" instrument_node=""> and </span><a data-dcnode-id="4310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wholefoodsmarket.com/"><span data-dcnode-id="4311" instrument_node="">Whole Foods Market</span></a><span data-dcnode-id="4309" instrument_node="">.</span></span></p><span data-dcnode-id="4306" instrument_node="">
</span><h4 data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4303" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4296" data-id="167979" id="mediaattachment_167979"><img alt="Bamboo cutting board sleeve" class="wp-image-167979 size-full" data-dcnode-id="4302" height="1068" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_58077186.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1500"><figcaption data-dcnode-id="4297"><span data-dcnode-id="4301" instrument_node="">The green works well with the natural material in this organic bamboo packaging by </span><a data-dcnode-id="4299" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/1458019"><span data-dcnode-id="4300" instrument_node="">tomdesign.org</span></a><span data-dcnode-id="4298" instrument_node=""> for Midori Way.</span></figcaption></figure><span data-dcnode-id="4295" instrument_node="">
</span><p data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">The connection to nature makes green a natural choice (see what I did there?) for a brand that’s eco friendly, organic or sustainable. As with yellow, be wary of the fact that while muted or lighter shades of green can represent nature, neon versions will have the opposite effect and will feel more artificial and less harmonious. On a website, a green call to action can suggest ‘go’—although the battle rages on with red buttons, which can instead suggest urgency.</span></p><span data-dcnode-id="4292" instrument_node="">
</span><h3 data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">Blue is for calm, trust and intelligence</span></h3><span data-dcnode-id="4289" instrument_node="">
</span><h4 data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">What blue means:</span></h4><span data-dcnode-id="4286" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4282" data-id="203993" id="mediaattachment_203993"><img alt="The meaning of blue" class="wp-image-203993 size-medium" data-dcnode-id="4285" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-BLUE-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">The meaning of blue</span></figcaption></figure><span data-dcnode-id="4281" instrument_node="">
</span><p data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">Blue is a serene and calming color that represents intelligence and responsibility. Blue is cool and relaxing. Light baby blue is peaceful, while dark blue can signify depth and power. It is the most popular color in the world, both when it comes to personal preferences (for both genders) and usage in business logos. It’s the go-to color for trusted, corporate institutions, often in combination with a mature grey:</span></p><span data-dcnode-id="4278" instrument_node="">
</span><ul data-dcnode-id="4263"><span data-dcnode-id="4277" instrument_node="">
</span><li data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">IT companies e.g. Intel, Microsoft, IBM, HP, Dell</span></li><span data-dcnode-id="4274" instrument_node="">
</span><li data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">Finance institutions e.g. American Express, Visa, Goldman Sachs, Paypal</span></li><span data-dcnode-id="4271" instrument_node="">
</span><li data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">Big corporations e.g. Procter &amp; Gamble, General Electric, General Motors, Boeing and Lowe’s</span></li><span data-dcnode-id="4268" instrument_node="">
</span><li data-dcnode-id="4265"><span data-dcnode-id="4266" style="font-weight: 400;"><span data-dcnode-id="4267" instrument_node="">Blue is also the natural choice for professional network LinkedIn.</span></span></li><span data-dcnode-id="4264" instrument_node="">
</span></ul><span data-dcnode-id="4262" instrument_node="">
</span><p data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">Interestingly, blue is the color of choice for many other social networks too. Facebook is blue—apparently because founder Mark Zuckerberg is red-green color blind and blue is the most vivid color that he can see. The association with trust and dependability does work well in the context of a social network, with all the concerns around data privacy and so on, and you’ll find that Twitter is also blue, as are Instagram, Russia’s VKontakte and even social media site Mashable.</span></p><span data-dcnode-id="4259" instrument_node="">
</span><h4 data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4256" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4249" data-id="168090" id="mediaattachment_168090"><img alt="Blue and white business card design " class="wp-image-168090 size-full" data-dcnode-id="4255" height="1325" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_21996072.jpeg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="2000"><figcaption data-dcnode-id="4250"><span data-dcnode-id="4254" instrument_node="">Business card design by </span><a data-dcnode-id="4252" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/kreativemouse"><span data-dcnode-id="4253" instrument_node="">KreativeMouse</span></a><span data-dcnode-id="4251" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="4248" instrument_node="">
</span><p data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">If you want to be immediately associated with professionalism and trust, then blue is the color for you. Since it’s universally liked, it’s also a great choice if you want to appeal to both men and women. Its association with calm and tranquility means that blue is also a good fit if your business is in things like relaxation, therapy or meditation.</span></p><span data-dcnode-id="4245" instrument_node="">
</span><p data-dcnode-id="4239"><strong data-dcnode-id="4241"><span data-dcnode-id="4244" instrument_node="">Have a question?</span><a data-dcnode-id="4242" href="#comments"><span data-dcnode-id="4243" instrument_node="">Ask our team.</span></a></strong><span data-dcnode-id="4240" instrument_node=""> </span></p><span data-dcnode-id="4238" instrument_node="">
</span><h3 data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">Purple is for luxury, mystery and spirituality</span></h3><span data-dcnode-id="4235" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4231" data-id="203969" id="mediaattachment_203969"><img alt="The meaning of purple" class="wp-image-203969 size-medium" data-dcnode-id="4234" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-PURPLE-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">The meaning of purple</span></figcaption></figure><span data-dcnode-id="4230" instrument_node="">
</span><h4 data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">What purple means:</span></h4><span data-dcnode-id="4227" instrument_node="">
</span><p data-dcnode-id="4222"><span data-dcnode-id="4226" instrument_node="">Purple is an interesting color: it’s both warm and cool and combines the passion and energy of red with the calm and serenity of blue. Because of its associations with royalty, purple is inherently prestigious and luxurious. Purple dye was historically expensive, which meant that only wealthy rulers could afford it. The ruling classes and kings and queens of old would wear purple and Queen Elizabeth I even forbade anyone outside of the royal family from wearing it. Purple is also associated with religion and spirituality, since the ancient rulers were thought of as descendants of the gods and the color holds a special meaning in religions including Catholicism, Judaism and Buddhism. On top of all that purple is on trend, </span><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/blog/trends/2018-pantone-color-of-the-year/"><span data-dcnode-id="4225" instrument_node="">Ultra Violet being Pantone’s choice for color of the year 2018</span></a><span data-dcnode-id="4223" instrument_node="">.</span></p><span data-dcnode-id="4221" instrument_node="">
</span><p data-dcnode-id="4216"><span data-dcnode-id="4220" instrument_node="">Funnily enough, brands are not always as strategic in choosing colors as they should be. Yahoo, </span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fastcompany.com/3044649/yahoo-purple"><span data-dcnode-id="4219" instrument_node="">as the story goes</span></a><span data-dcnode-id="4217" instrument_node="">, ended up purple because that was the cheapest paint color available to renovate the offices back in the early days. You can see a more typical use of purple in the Asprey brand, a British luxury company with a heritage that goes back to the 1700s and a Royal Warrant for every British monarch since Queen Victoria.</span></p><span data-dcnode-id="4215" instrument_node="">
</span><h4 data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4212" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4205" data-id="168109" id="mediaattachment_168109"><img alt="purple book cover design" class="wp-image-168109 size-full" data-dcnode-id="4211" height="959" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_92948971-e1518540194471.jpeg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="624"><figcaption data-dcnode-id="4206"><span data-dcnode-id="4210" instrument_node="">Magical, purple book cover design entry by </span><a data-dcnode-id="4208" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/meella"><span data-dcnode-id="4209" instrument_node="">Meella</span></a><span data-dcnode-id="4207" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="4204" instrument_node="">
</span><p data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">Use purple when you want to evoke those luxurious, royal connections—combine it with gold for that extra ‘wow’. Or use it when you want to add a dash of mysticism and spirituality to your brand. Add some green for a really striking contrast or with pink to emphasize the feminine.</span></p><span data-dcnode-id="4201" instrument_node="">
</span><h3 data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">Pink is for femininity, playfulness and romance</span></h3><span data-dcnode-id="4198" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4194" data-id="203989" id="mediaattachment_203989"><img alt="The meaning of pink" class="wp-image-203989 size-medium" data-dcnode-id="4197" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-PINK-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">The meaning of pink</span></figcaption></figure><span data-dcnode-id="4193" instrument_node="">
</span><h4 data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">What pink means:</span></h4><span data-dcnode-id="4190" instrument_node="">
</span><p data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">In modern times, it’s impossible to see pink and not think of little girls, cotton candy and brightly colored bubble gum. Pink represents femininity and romance, sensitivity and tenderness. It’s inherently sweet, cute and charming.</span></p><span data-dcnode-id="4187" instrument_node="">
</span><p data-dcnode-id="4164"><span data-dcnode-id="4186" instrument_node="">Together with brown, pink is </span><a data-dcnode-id="4184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/logo-design/psychology-of-color"><span data-dcnode-id="4185" instrument_node="">among the least common colors in logos</span></a><span data-dcnode-id="4183" instrument_node="">. Typical uses of bright pink include </span><a data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barbie"><span data-dcnode-id="4182" instrument_node="">Barbie</span></a><span data-dcnode-id="4180" instrument_node=""> and </span><a data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cosmopolitan.com/"><span data-dcnode-id="4179" instrument_node="">Cosmopolitan</span></a><span data-dcnode-id="4177" instrument_node="">, with their obvious target markets, and </span><a data-dcnode-id="4175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baskin-Robbins"><span data-dcnode-id="4176" instrument_node="">Baskin Robbins</span></a><span data-dcnode-id="4174" instrument_node=""> and </span><a data-dcnode-id="4172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dunkin%2527_Donuts"><span data-dcnode-id="4173" instrument_node="">Dunkin’ Donuts</span></a><span data-dcnode-id="4171" instrument_node=""> who are tapping into the ‘sweet’ side of the color. Wedding companies and other feminine brands often favor a lighter pink. Less typical uses include </span><a data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lyft.com/"><span data-dcnode-id="4170" instrument_node="">Lyft</span></a><span data-dcnode-id="4168" instrument_node=""> and </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.t-mobile.com/"><span data-dcnode-id="4167" instrument_node="">TMobile</span></a><span data-dcnode-id="4165" instrument_node="">—both challenger brands, who aim to stand out from their competitors and bring an element of playfulness and approachability.</span></p><span data-dcnode-id="4163" instrument_node="">
</span><h4 data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4160" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4153" data-id="168108" id="mediaattachment_168108"><img alt="Pink snack packaging design" class="wp-image-168108 size-full" data-dcnode-id="4159" height="568" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_33226811.jpeg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1236"><figcaption data-dcnode-id="4154"><span data-dcnode-id="4158" instrument_node="">Pink snack packaging design entry by </span><a data-dcnode-id="4156" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/martislupus"><span data-dcnode-id="4157" instrument_node="">Martis Lupus</span></a><span data-dcnode-id="4155" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="4152" instrument_node="">
</span><p data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">Using pink is a quick shortcut to communicating “this is for women” and if you know it’ll appeal to your female target market, then it’s a great choice. For some audiences, though, it can be off-putting and you may want to be more creative in communicating femininity without resorting to clichés. You can also use it in unexpected ways to stand out versus your dull and dreary competitors or add a surprising element to an otherwise sophisticated design.</span></p><span data-dcnode-id="4149" instrument_node="">
</span><h3 data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">Brown is for wholesomeness, warmth and honesty</span></h3><span data-dcnode-id="4146" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4142" data-id="203981" id="mediaattachment_203981"><img alt="The meaning of brown" class="wp-image-203981 size-medium" data-dcnode-id="4145" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-BROWN-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">The meaning of brown</span></figcaption></figure><span data-dcnode-id="4141" instrument_node="">
</span><h4 data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">What brown means:</span></h4><span data-dcnode-id="4138" instrument_node="">
</span><p data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">Brown is a natural color, associated with the earth and as a result giving a sense of stability and support. Given its link to the earth and nature, brown brings to mind farming and agriculture and other outdoorsy activities. It’s warm and friendly, practical and dependable, and can also represent the old fashioned and well established.</span></p><span data-dcnode-id="4135" instrument_node="">
</span><p data-dcnode-id="4127"><span data-dcnode-id="4134" instrument_node="">Brown is </span><a data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/logo-design/psychology-of-color"><span data-dcnode-id="4133" instrument_node="">not used that often in logos</span></a><span data-dcnode-id="4131" instrument_node="">. When it is, it tends to represent utility. Although blue is the typical corporate color, </span><a data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ups.com/us/en/global.page"><span data-dcnode-id="4130" instrument_node="">UPS</span></a><span data-dcnode-id="4128" instrument_node=""> has used brown to represent dependability (along with a later addition of yellow to bring an element of warmth and friendliness). Up until recently (well, 2010), they even used the color in their tagline: “What can brown do for you?”</span></p><span data-dcnode-id="4126" instrument_node="">
</span><h4 data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4123" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4116" data-id="167995" id="mediaattachment_167995"><img alt="Welsh bakery logo" class="wp-image-167995 size-full" data-dcnode-id="4122" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_49203874.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1024"><figcaption data-dcnode-id="4117"><span data-dcnode-id="4121" instrument_node="">The brown color choice adds to a traditional-looking stamp effect in this Welsh bakery logo design by </span><a data-dcnode-id="4119" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/ultrastjarna"><span data-dcnode-id="4120" instrument_node="">ultrastjarna</span></a><span data-dcnode-id="4118" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="4115" instrument_node="">
</span><p data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">Brown is a warm, neutral color that you can use as a background that conveys warmth and wholesomeness. Use it for an earthy brand and in a natural pairing with green to really capture that organic feel. You can also use brown to give the impression of a well-established heritage and a sense of tradition. Brown works well for chocolate brands, for obvious reasons.</span></p><span data-dcnode-id="4112" instrument_node="">
</span><p data-dcnode-id="4106"><strong data-dcnode-id="4108"><span data-dcnode-id="4111" instrument_node="">Have a question?</span><a data-dcnode-id="4109" href="#comments"><span data-dcnode-id="4110" instrument_node="">Ask our team.</span></a></strong><span data-dcnode-id="4107" instrument_node=""> </span></p><span data-dcnode-id="4105" instrument_node="">
</span><h3 data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Black is for elegance, power and sophistication</span></h3><span data-dcnode-id="4102" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4098" data-id="203997" id="mediaattachment_203997"><img alt="The meaning of black" class="wp-image-203997 size-medium" data-dcnode-id="4101" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-BLACK-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">The meaning of black</span></figcaption></figure><span data-dcnode-id="4097" instrument_node="">
</span><h4 data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">What black means:</span></h4><span data-dcnode-id="4094" instrument_node="">
</span><p data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">Black is an incredibly versatile color and probably the most used color in graphic design. When it comes to branding and marketing, black is generally associated with exclusivity, power and elegance. It’s bold, powerful and a little mysterious, which makes it a firm favorite of modern brands. Depending on the design context, it can be used to create a cool and unapproachable look as well. At the same time, it’s an inherently neutral color that works well in combination with any other color and is often used for typography and other central, grounding design elements.</span></p><span data-dcnode-id="4091" instrument_node="">
</span><p data-dcnode-id="4083"><span data-dcnode-id="4090" instrument_node="">Luxury brands like </span><a data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chanel.com/"><span data-dcnode-id="4089" instrument_node="">Chanel</span></a><span data-dcnode-id="4087" instrument_node=""> and </span><a data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dior.com/"><span data-dcnode-id="4086" instrument_node="">Dior</span></a><span data-dcnode-id="4084" instrument_node=""> keep things stylish with an iconic black-and-white logo. Brands like these want to be a little intimidating and unapproachable as that makes them more exclusive and aspirational. The James Bond 007 logo is black. Newspaper logos also tend to be in black, given the historic black-and-white printing presses. Of course, most brands will have a black-and-white version of their logo as printing in black and white tends to be cheaper than color printing.</span></p><span data-dcnode-id="4082" instrument_node="">
</span><h4 data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4079" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4072" data-id="168110" id="mediaattachment_168110"><img alt="all-black wine label design" class="wp-image-168110 size-full" data-dcnode-id="4078" height="2202" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_49692533-e1518540328539.jpeg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1500"><figcaption data-dcnode-id="4073"><span data-dcnode-id="4077" instrument_node="">A striking, all-black wine label design by </span><a data-dcnode-id="4075" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/danewman"><span data-dcnode-id="4076" instrument_node="">Dan Newman</span></a><span data-dcnode-id="4074" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="4071" instrument_node="">
</span><p data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">If you want to convey a sense of luxury, you can’t go wrong with a simple black-and-white color scheme. Combined with a gold, silver or why not a royal purple, you’ll give your brand an air of exclusivity and prestige. On the other hand, black can also be used with bright colors for contrast and when combined with other powerful colors like red or orange it can be extremely impactful and thrilling.</span></p><span data-dcnode-id="4068" instrument_node="">
</span><h3 data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">White is for minimalism and simplicity</span></h3><span data-dcnode-id="4065" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4061" data-id="222141" id="mediaattachment_222141"><img alt="The meaning of white" class="wp-image-222141 size-medium" data-dcnode-id="4064" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2019/08/COLOR-MEANINGS-WHITE-700x700-copy-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">The meaning of white</span></figcaption></figure><span data-dcnode-id="4060" instrument_node="">
</span><h4 data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">What white means:</span></h4><span data-dcnode-id="4057" instrument_node="">
</span><p data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">If you know your science, then you’ll know that white light actually contains all the colors of the rainbow—but to the naked eye at least, white is the opposite: it’s the absence of any color. In Western cultures it’s often associated with virginity (think of brides wearing white on their wedding day as a symbol of purity), while in some East Asian countries it’s the color of mourning. When used in design and branding, white creates a minimalist aesthetic. It can be very simple, clean and modern. It’s also the most neutral color of all and can be quite non-descript as a base for other, more exciting, colors.</span></p><span data-dcnode-id="4054" instrument_node="">
</span><p data-dcnode-id="4047"><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apple.com/"><span data-dcnode-id="4053" instrument_node="">Apple’s</span></a><span data-dcnode-id="4051" instrument_node=""> advertising and packaging give a powerful illustration of how white can be used for a modern and minimalist aesthetic that puts the beautiful product design center stage. </span><a data-dcnode-id="4049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marcjacobs.com/"><span data-dcnode-id="4050" instrument_node="">Marc Jacobs</span></a><span data-dcnode-id="4048" instrument_node=""> prints a simple black logo onto white luxury retail boxes and shopping bags. Health and beauty brands that want to convey an air of purity and natural ingredients will also tend to use white in their packaging. It’s an obvious fit for wedding brands as well.</span></p><span data-dcnode-id="4046" instrument_node="">
</span><h4 data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4043" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4036" data-id="168114" id="mediaattachment_168114"><img alt="white packaging design" class="wp-image-168114 size-full" data-dcnode-id="4042" height="2349" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_74009853-e1518541171240.jpeg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="2000"><figcaption data-dcnode-id="4037"><span data-dcnode-id="4041" instrument_node="">This white packaging design by </span><a data-dcnode-id="4039" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/imee008"><span data-dcnode-id="4040" instrument_node="">Imee008</span></a><span data-dcnode-id="4038" instrument_node=""> keeps things very clean and simple.</span></figcaption></figure><span data-dcnode-id="4035" instrument_node="">
</span><p data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">White space can be as important in a design as all the other creative elements. White tends to be the color used for website backgrounds as it ensures that your text is easy to read. It’s also often used as a secondary accent in a color scheme. Together with pastels, it can bring to mind spring and femininity; combined with simple black it becomes classic and minimalistic. When it comes to white, it’s a lot about the colors you put it with.</span></p><span data-dcnode-id="4032" instrument_node="">
</span><h3 data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">Gray is for professionalism, formality and conventionality</span></h3><span data-dcnode-id="4029" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="4025" data-id="204001" id="mediaattachment_204001"><img alt="The meaning of gray" class="wp-image-204001 size-medium" data-dcnode-id="4028" height="700" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/COLOR-MEANINGS-GRAY-700x700.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">The meaning of gray</span></figcaption></figure><span data-dcnode-id="4024" instrument_node="">
</span><h4 data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">What gray means:</span></h4><span data-dcnode-id="4021" instrument_node="">
</span><p data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">Gray is a more mature, responsible color, associated with the gray hair of old age. Its positive connotations include formality and dependability, while the negative side can mean being overly conservative, conventional and lacking in emotion. It’s safe and quite subdued, serious and reserved.</span></p><span data-dcnode-id="4018" instrument_node="">
</span><p data-dcnode-id="4010"><span data-dcnode-id="4017" instrument_node="">Gray is rarely the star of the show. </span><a data-dcnode-id="4015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//logos.wikia.com/wiki/Nintendo"><span data-dcnode-id="4016" instrument_node="">Nintendo</span></a><span data-dcnode-id="4014" instrument_node=""> briefly favored a gray logo from 2008 to 2016 but has since gone back to its earlier red. Jewelry brand </span><a data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swarovski"><span data-dcnode-id="4013" instrument_node="">Swarovski</span></a><span data-dcnode-id="4011" instrument_node=""> does have a gray logo, although if you look at the website the version used there is black. You’re more likely to see the color gray as a secondary color, playing a supporting role to some other, stronger, character.</span></p><span data-dcnode-id="4009" instrument_node="">
</span><h4 data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">How to use it:</span></h4><span data-dcnode-id="4006" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="4000" data-id="168112" id="mediaattachment_168112"><img alt="grey and black web design" class="wp-image-168112 size-full" data-dcnode-id="4005" height="1237" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/47297106-c187-474a-9217-e45e06be1d54-1-e1518540695847.png%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1918"><figcaption data-dcnode-id="4001"><span data-dcnode-id="4004" instrument_node="">A modern and formal – but in this case a little unconventional – grey and black web design by </span><a data-dcnode-id="4002" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com/profiles/milajones"><span data-dcnode-id="4003" instrument_node="">Mila Jones Cann</span></a></figcaption></figure><span data-dcnode-id="3999" instrument_node="">
</span><p data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">Use gray if you have a serious brand and you want to communicate the authority and stability of a corporate institution. Combine it with blue for the ultimate in conservatism and dependability. It’s actually also a very popular color in web design. You may want to consider using gray as an alternative to white for a softer website background—or as an alternative to black text for a less harsh contrast and an easier read.</span></p><span data-dcnode-id="3996" instrument_node="">
</span><h3 data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">Multicolor is for fun, diversity and optimism</span></h3><span data-dcnode-id="3993" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="3986" data-id="199667" id="mediaattachment_199667"><img alt="Rainbow gradient logo design" class="wp-image-199667 size-medium" data-dcnode-id="3992" height="525" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2019/06/rainbow-700x525.png%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="700"><figcaption data-dcnode-id="3987"><span data-dcnode-id="3991" instrument_node="">by </span><a data-dcnode-id="3989" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dribbble.com/slaterdesign"><span data-dcnode-id="3990" instrument_node="">Nick Slater</span></a><span data-dcnode-id="3988" instrument_node=""> via Dribbble</span></figcaption></figure><span data-dcnode-id="3985" instrument_node="">
</span><h4 data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">What multicolor means:</span></h4><span data-dcnode-id="3982" instrument_node="">
</span><p data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">We’ve looked at the meanings of individual colors. So what happens when you bring them all together? What feelings are evoked with multicolored designs? Well, while monochromatic branding can bring focus and style, colorful branding can show that a brand is playful, informal and creative.</span></p><span data-dcnode-id="3979" instrument_node="">
</span><p data-dcnode-id="3962"><span data-dcnode-id="3978" instrument_node="">As you can imagine, kids’ brands often use multicolored designs—think </span><a data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toysrus.com/"><span data-dcnode-id="3977" instrument_node="">Toys”R”Us</span></a><span data-dcnode-id="3975" instrument_node=""> or </span><a data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crayola.com/"><span data-dcnode-id="3974" instrument_node="">Crayola</span></a><span data-dcnode-id="3972" instrument_node="">—but grown-up brands can get creative too! </span><a data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Google_logo"><span data-dcnode-id="3971" instrument_node="">Google</span></a><span data-dcnode-id="3969" instrument_node=""> uses multiple colors in its logo to represent the playfulness of the brand. An interesting case is </span><a data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//logos.wikia.com/wiki/EBay"><span data-dcnode-id="3968" instrument_node="">ebay</span></a><span data-dcnode-id="3966" instrument_node="">, which had a similarly colorful logo up until 2017 when it simplified its logo to one color in its marketing (although the colored logo is still used on the website). Likewise, </span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fineprintart.com/history-of-the-apple-logo"><span data-dcnode-id="3965" instrument_node="">Apple</span></a><span data-dcnode-id="3963" instrument_node=""> evolved its logo from the multicolored striped apple to a sleeker silver one.</span></p><span data-dcnode-id="3961" instrument_node="">
</span><h4 data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">How to use it:</span></h4><span data-dcnode-id="3958" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="3951" data-id="168113" id="mediaattachment_168113"><img alt="multicolored web design" class="wp-image-168113 size-full" data-dcnode-id="3957" height="992" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/8e5f3587-f2c3-4f76-879b-b67d688606d7-e1518540970577.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1900"><figcaption data-dcnode-id="3952"><span data-dcnode-id="3956" instrument_node="">A bright and multicolored web design by </span><a data-dcnode-id="3954" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/denisemdesign"><span data-dcnode-id="3955" instrument_node="">Denise M</span></a><span data-dcnode-id="3953" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="3950" instrument_node="">
</span><p data-dcnode-id="3945"><span data-dcnode-id="3949" instrument_node="">Why choose one when you can choose them all?! Using many colors in your branding and designs can be a great way to stand out, show your playfulness and appeal to children or a more creative audience. Think about whether you want to use complementary colors to provide a real ‘pop’ (colors that are opposites on the color wheel, for example, purple and orange), analogous colors for greater harmony (colors that sit next to each other, for example, red, orange and yellow) or triadic colors for a more dynamic effect (colors that are evenly spaced around the color wheel). You can read more about these different color combinations </span><a data-dcnode-id="3947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/blog/tips/the-7-step-guide-to-understanding-color-theory/"><span data-dcnode-id="3948" instrument_node="">in this article on color theory</span></a><span data-dcnode-id="3946" instrument_node="">.</span></p><span data-dcnode-id="3944" instrument_node="">
</span><h3 data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">Gold, silver, bronze and other metallics are for wealth, prosperity and success</span></h3><span data-dcnode-id="3941" instrument_node="">
</span><h4 data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">What metallics mean:</span></h4><span data-dcnode-id="3938" instrument_node="">
</span><p data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Gold and silver are both precious metals, associated with riches and expensive jewelry. Often combined with black, adding a touch of glimmering metal can immediately give a brand that element of glamor. Gold is also the color of a winner, associated as it is with the medal for first place, and can represent success. It’s a warm color related to yellow and as a result shares the attributes of feeling bright and cheerful. Silver is cooler and a little less luxurious, coming in at second place but still representing grace and elegance. Third-place bronze captures the qualities of brown and so it’s more earthy, natural and mature.</span></p><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3901"><a data-dcnode-id="3933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rolex.com/"><span data-dcnode-id="3934" instrument_node="">Rolex</span></a><span data-dcnode-id="3932" instrument_node=""> uses a gold crown in its logo, while </span><a data-dcnode-id="3930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lamborghini.com/en-en/"><span data-dcnode-id="3931" instrument_node="">Lamborghini</span></a><span data-dcnode-id="3929" instrument_node=""> and </span><a data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.porsche.com/"><span data-dcnode-id="3928" instrument_node="">Porsche</span></a><span data-dcnode-id="3926" instrument_node=""> use elements of gold as well. The </span><a data-dcnode-id="3924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.louisvuitton.com/eng-us/recommendations/louis-vuitton-monogram"><span data-dcnode-id="3925" instrument_node="">Louis Vuitton</span></a><span data-dcnode-id="3923" instrument_node=""> monogram could be said to be gold and brown (although </span><a data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.schemecolor.com/louis-vuitton-basic.php"><span data-dcnode-id="3922" instrument_node="">the gold shade is actually called ‘dirt!’</span></a><span data-dcnode-id="3920" instrument_node="">). Clearly, gold is the color of luxury! On the other hand, silver is used a lot in car logos—</span><a data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vw.com/"><span data-dcnode-id="3919" instrument_node="">VW</span></a><span data-dcnode-id="3917" instrument_node="">, </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toyota.com/"><span data-dcnode-id="3916" instrument_node="">Toyota</span></a><span data-dcnode-id="3914" instrument_node="">, </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hyundaiusa.com/"><span data-dcnode-id="3913" instrument_node="">Hyundai</span></a><span data-dcnode-id="3911" instrument_node="">, </span><a data-dcnode-id="3909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nissanusa.com/"><span data-dcnode-id="3910" instrument_node="">Nissan</span></a><span data-dcnode-id="3908" instrument_node="">, </span><a data-dcnode-id="3906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.audiusa.com/"><span data-dcnode-id="3907" instrument_node="">Audi</span></a><span data-dcnode-id="3905" instrument_node="">, </span><a data-dcnode-id="3903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mbusa.com/mercedes/index"><span data-dcnode-id="3904" instrument_node="">Mercedes</span></a><span data-dcnode-id="3902" instrument_node="">—where it denotes quality and workmanship.</span></p><span data-dcnode-id="3900" instrument_node="">
</span><h4 data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">How to use them:</span></h4><span data-dcnode-id="3897" instrument_node="">
</span><figure class="figure--full" data-dcnode-id="3890" data-id="168003" id="mediaattachment_168003"><img alt="Wine bottle packaging" class="wp-image-168003 size-full" data-dcnode-id="3896" height="1145" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_70798373.jpg%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1524"><figcaption data-dcnode-id="3891"><span data-dcnode-id="3895" instrument_node="">Hot gold foil on a black background gives this wine label design and packaging by </span><a data-dcnode-id="3893" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/etolosa"><span data-dcnode-id="3894" instrument_node="">Esteban T</span></a><span data-dcnode-id="3892" instrument_node=""> an exclusive feel for Petit Verdot.</span></figcaption></figure><span data-dcnode-id="3889" instrument_node="">
</span><p data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Metallic effects can be hard to recreate online—they’re more materials really, or textures, than they are colors. Gold is essentially a shiny yellow, silver is shiny gray and bronze shiny brown. You can still suggest metallic tones on a website or in a logo using shading and highlighting but the full impact will be seen on printed materials where you can use a foil to get that metallic sheen. For a look that instantly says ‘luxury’, you can’t go wrong with black and gold.</span></p><span data-dcnode-id="3886" instrument_node="">
</span><h2 data-dcnode-id="3882"><span data-dcnode-id="3885" instrument_node="">Know your color meanings</span><br data-dcnode-id="3884"><span data-dcnode-id="3883" instrument_node="">
—</span></h2><span data-dcnode-id="3881" instrument_node="">
</span><figure class="figure--right" data-dcnode-id="3874" data-id="167967" id="mediaattachment_167967"><img alt="Colorful business card" class="wp-image-167967 size-full" data-dcnode-id="3880" height="1247" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs-blog.imgix.net/blog/wp-content/uploads/2018/02/attachment_77327090.png%3Fauto%3Dformat%26q%3D60%26fit%3Dmax%26w%3D930&amp;raw" width="1445"><figcaption data-dcnode-id="3875"><span data-dcnode-id="3879" instrument_node="">A bright and colorful business card design by </span><a data-dcnode-id="3877" data-track-click="" data-track-hover="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/profiles/dariavolyanskaya"><span data-dcnode-id="3878" instrument_node="">Daria V.</span></a><span data-dcnode-id="3876" instrument_node=""> for Mama J.</span></figcaption></figure><span data-dcnode-id="3873" instrument_node="">
</span><p data-dcnode-id="3868"><span data-dcnode-id="3872" instrument_node="">So there you go, an epic journey through </span><a data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com.au/blog/tips/how-color-impacts-emotions-and-behaviors/"><span data-dcnode-id="3871" instrument_node="">colors and emotions</span></a><span data-dcnode-id="3869" instrument_node="">.</span></p><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Of course, it’s not an exact science. People may have personal preferences that override any deeper biological tendencies, cultures vary in their interpretations and there may be other things you want to take into consideration as well.</span></p><span data-dcnode-id="3864" instrument_node="">
</span><p data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">Now that you know the rules, you can play around with them and see what works for you. Feel free to break them, too, you crazy rebel you. Just make sure that you’re doing it on purpose and not choosing crazy color combinations without any consideration of what effect they might have.</span></p><span data-dcnode-id="3861" instrument_node="">
