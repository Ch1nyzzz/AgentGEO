n data-dcnode-id="140" instrument_node="">Despite all the libertarians’ talk, however, Bitcoin’s reality has fallen somewhat short of its utopian promise. For starters, given its lack of any backing from any government or central bank, Bitcoin is having trouble becoming widely accepted and remains on the fringes of the economy; for example, for anonymous transactions through online marketplaces such as Silk Road.</span></p><p data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Secondly, flowing from the fact that it is not widespread or anchored in any way to the real economy, Bitcoin is extremely vulnerable to volatile swings in its price and to being highjacked as a vehicle for speculation, making it no better as an alternative for money than traditional currencies.</span></p><p data-dcnode-id="130"><span data-dcnode-id="136" instrument_node="">Finally, it is interesting to note that the Bitcoin community is currently undergoing its very own schism,</span><a data-dcnode-id="134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theverge.com/2016/2/9/10946072/bitcoin-core-classic-software-block-size-debate" rel="nofollow"><span data-dcnode-id="135" instrument_node=""> </span></a><a data-dcnode-id="132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theverge.com/2016/2/9/10946072/bitcoin-core-classic-software-block-size-debate" rel="nofollow"><span data-dcnode-id="133" instrument_node="">or “civil war” as one commentator put it</span></a><span data-dcnode-id="131" instrument_node="">, reflecting precisely the contradictory pressures within any monetary system that digital currencies were invented to overcome: on the one hand, the need to increase the money supply (or its velocity of circulation, as is the case with the current Bitcoin split) to keep up with the demands of an expanding market of growing transactions; and, on the other hand, the need to prevent the money supply becoming divorced from the real economy that it is meant to represent.</span></p><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Like other areas of anarchist theory, the Bitcoin experiment is doomed to failure because of the utopian and idealistic analysis of money that lies behind it. As with the question of the State or the Law, as has been shown in this article, money was not imposed on society by any force from above (in this case, the Bitcoin crusaders tell us, the central banks and government), but is - like language, for example - a social tool that arises out of the needs of production; in the case of money, from the needs of a market-based system of commodity production and exchange.</span></p><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">The problem, in short, is not the “meddling” of the central banks, but the anarchy of the market, which arises out of private ownership; and no amount of utopian experiments will help. And, as with the so-called “solutions” of returning to the gold standard or “democratising the banks”, we must look at the problem in a materialist and dialectical manner in order to tackle not the symptoms of the problems facing society, but the underlying disease: class society and private property.</span></p><h2 data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">The future of money</span></h2><p data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">As can be seen with so many areas of society, politics, and economics, the conservative nature of the ruling class, which always and everywhere wishes to maintain the status quo that works to its advantage, will all too frequently shroud phenomena in an air of timeless mysticism. As it was in the beginning, is now, and ever shall be: this is the hymn of the exploiters, who strive to reinforce the illusion that the current state of affairs represents the “natural” and “ideal” order, and is thus eternal and unchanging.</span></p><p data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Marxists, by contrast, aim to be the most thorough materialists, understanding the origins of phenomena in terms of concrete material conditions and charting their historic development of change through contradiction. Through such a method, one can not only explain the real inner laws and motion of a process, but also understand how such phenomena will be affected by developments elsewhere in society.</span></p><p data-dcnode-id="115"><span data-dcnode-id="119" instrument_node="">In his </span><i data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">Capital </span></i><span data-dcnode-id="116" instrument_node="">and other economic writings, Marx rigorously applies this method to the question of money, stripping away its seemingly mystical and magical qualities to reveal its real underlying nature. In the place of any reverence for money, Marx uncovers the material basis for money and thus exposes it for what it is: the necessary result of commodity production and exchange at a certain stage of development.</span></p><p data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">Despite what the Bible tells us, money is not the “root of all evil”. As this article has demonstrated by going back and looking at the historical origins and development of money, it is a social device that emerges from a system of commodity production and exchange; and this, in turn, is tied to the question of private ownership, in which production is no longer for direct consumption, but for exchange, and in which men and women confront each other no longer as people, but as commodities.</span></p><p data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">As commodity production and exchange becomes generalised, so to does the money (and credit) system. In turn, social relations become increasingly transformed into monetary relations, and the seemingly omnipotent power and control of money grows. Capitalism - and, indeed, imperialism - is the highest stage in this process; the point at which commodity production and exchange has become completely universal and generalised, to the extent that labour power - the ability of the worker to work - has itself become a commodity to be bought and sold freely on the market, and the credit system has turned all money into capital: self-valorising value.</span></p><p data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">Money, in short, cannot simply be abolished. To rid the world of money and its scourges, we need to get rid of the system of commodity production and exchange that gives rise to it. That is to say, we need to get rid of private ownership over the means of production and bring about a return of communal ownership over the tools, technology, and wealth in society. Such a society would not be that of the “primitive communism” experienced by our tribal ancestors, but a communism based on a vastly higher level of economic, scientific, and cultural development - a society of superabundance.</span></p><p data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">What, then, is the future of money? Would there, for example, be money in a socialist society?</span></p><p data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">To answer these questions, we must remember what has already been stated above: that money arises as part of a system of commodity production and exchange. The existence of commodities, in turn, implies the existence of private property – of the private ownership over the means of production and the products of labour. The first steps of a socialist society, therefore, would be to take the key levers of the economy – the banks, the major monopolies, the infrastructure, and the land – and to put these under a rational and democratic plan of production; in other words, to socialise production and place the wealth in society in public hands.</span></p><p data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">With such a step, the vast majority of use-values in society would now be produced and owned in a social manner. No longer would there be a need for the exchange of goods and services; instead, people would contribute to society with their labour “according to their ability” and take from the common pot “according to their need”. The products of labour - produced socially, owned socially, and no longer exchanged - would thus lose their previous status as commodities.</span></p><p data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">For sure, commodity production and exchange would still exist in part in the early stages of a socialist society, since the whole economy cannot be brought under a common democratic plan in one stroke. Small producers and owners – the petit-bourgeoisie – would continue to exist for some while. But the main “commanding heights” of the economy would be part of a socialist plan of production, and thus the majority of wealth would not be in the form of commodities. And overtime, as the efficiency and superiority of the democratically planned economy proves itself, small producers would be convinced and incentivised to join this social plan, and thus all remnants of commodity production would wither away.</span></p><p data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">Alongside this withering away of commodity production and exchange, the social need for money - like society’s need for the State - would wither away also. Fewer and fewer goods and services would be exchanged; instead, they could simply be provided free of charge through communal shops, supermarkets, and restaurants, etc.</span></p><p data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">We already see this process in embryo under capitalism with services like the National Health Service, for example, whereby anyone can walk into a hospital and receive treatment without any money being handed over. Within modern capitalism, where the working class has managed to secure for itself - through struggle - publicly-funded services, such as the NHS, and a welfare state, the “income” a worker receives is therefore effectively split into two parts: a wage paid by the employed in exchange for their labour power; and a “social wage” of publicly-provided benefits and services that are free at the point of use and provided on the basis of need.</span></p><p data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">In the transition from socialism to communism, the ratio between these two components would shift dramatically towards the latter. The unseen “social wage” would vastly increase, whilst the wage paid in exchange for labour-time would be diminished. Instead of just receiving healthcare without any monetary transaction required, transport, housing, electricity, food, clothes, etc.: all of these, and even things currently considered “luxury items”, could be provided without any exchange as part of a socialist plan of production.</span></p><p data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">The whole concept of value would gradually become meaningless, and rather than acting as a representation of exchange-value – i.e. of socially necessary labour time – tokens could instead be given to indicate the entitlement of any individual to a portion of the common products of labour. In some respects, this would be like the rationing books seen during WWII, which entitled everyone to a basic minimum of goods; only now, under socialism, the system would be on a qualitatively higher level of economic development, with society’s products not rationed and restricted on the basis of scarcity, but shared widely and freely on the basis of superabundance. Furthermore, even on the basis of current technology, such physical tokens could be replaced by mere digital information.</span></p><p data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">Meanwhile, on the basis of a tremendous investment in science, technology, and automation, the productive capacity available to society would rise enormously, and the total “income” - that is, the amount of good and services that could be allocated to every individual - would greatly increase also. In short, living standards would be massively improved across the board.</span></p><p data-dcnode-id="89"><span data-dcnode-id="90" instrument_node="">In the early stages of this transition, money and the price signals of supply and demand would still be needed to indicate where there was scarcity, and thus where investment by the planned economy was needed. In this respect, banks would also be required. But rather than this whole financial apparatus being used to direct and channel the money of capitalists for the purpose of profit, the banking system - under the social and democratic control of the workers’ state, as part of a socialist plan of production - would be used to provide investment to eliminate scarcity, improve productivity, and meet society’s needs.</span></p><p data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">As more and more of the economy came under this socialist plan of production and scarcity was eradicated, this need for money and price signals would wither away also, and society would instead democratically choose what goals to prioritise, and thus how and where to invest the material, technological and human resources available to it.</span></p><p data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">The tremendous level of planning currently seen within giant multinationals in the name of profit could be implemented on a global scale to rid us of the anarchy and chaos of the invisible hand and ensure a world of plenty for all. And with the enormous productive forces at our fingertips on a world scale, there is no reason why we could not quickly move to a society of superabundance whereby all our needs were free to take at will, with no need for money at all, safe in the knowledge that scarcity is an historical aberration of the past.</span></p><p data-dcnode-id="75"><span data-dcnode-id="84" instrument_node="">The ruling class today consistently tries to peddle the myth that “capitalism is freedom”. But as Robert Tressell’s protagonist of </span><i data-dcnode-id="82"><span data-dcnode-id="83" instrument_node="">the Ragged Trousered Philanthropists</span></i><span data-dcnode-id="81" instrument_node="">, Frank Owen, asserted, under capitalism we are all “bound and fettered with a chain of gold”; ruled over by a dictatorship of bankers. Under socialism, however, with real economic control in ours hands, society would finally be free in a genuine sense: free from the power of capital and the invisible hand of the market. In the</span><a data-dcnode-id="79" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/marx/works/1880/soc-utop/ch03.htm" rel="nofollow"><span data-dcnode-id="80" instrument_node=""> </span></a><a data-dcnode-id="77" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/marx/works/1880/soc-utop/ch03.htm" rel="nofollow"><span data-dcnode-id="78" instrument_node="">words of Engels</span></a><span data-dcnode-id="76" instrument_node="">, it would be “the ascent of man from the kingdom of necessity to the kingdom of freedom.”</span></p><p data-dcnode-id="68"><span data-dcnode-id="74" instrument_node="">We leave the final word on this matter to</span><a data-dcnode-id="72" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/trotsky/1936/revbet/ch04.htm%23ch04-1" rel="nofollow"><span data-dcnode-id="73" instrument_node=""> </span></a><a data-dcnode-id="70" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/trotsky/1936/revbet/ch04.htm%23ch04-1" rel="nofollow"><span data-dcnode-id="71" instrument_node="">Leon Trotsky</span></a><span data-dcnode-id="69" instrument_node="">:</span></p><blockquote data-dcnode-id="63"><p data-dcnode-id="66"><span data-dcnode-id="67" instrument_node="">“In a communist society, the state and money will disappear. Their gradual dying away ought consequently to begin under socialism. We shall be able to speak of the actual triumph of socialism only at that historical moment when the state turns into a semi-state, and money begins to lose its magic power. This will mean that socialism, having freed itself from capitalist fetishes, is beginning to create a more lucid, free and worthy relation among men. Such characteristically anarchist demands as the “abolition” of money, “abolition” of wages, or “liquidation” of the state and family, possess interest merely as models of mechanical thinking.</span></p><p data-dcnode-id="64"><span data-dcnode-id="65" instrument_node="">“Money cannot be arbitrarily “abolished”, nor the state and the old family “liquidated.” They have to exhaust their historic mission, evaporate, and fall away. The deathblow to money fetishism will be struck only upon that stage when the steady growth of social wealth has made us bipeds forget our miserly attitude toward every excess minute of labor, and our humiliating fear about the size of our ration. Having lost its ability to bring happiness or trample men in the dust, money will turn into mere bookkeeping receipts for the convenience of statisticians and for planning purposes. In the still more distant future, probably these receipts will not be needed. But we can leave this question entirely to posterity, who will be more intelligent than we are.”</span></p></blockquote></section></div><div class="row" data-dcnode-id="57"><div class="col-md-8 col-md-offset-2 pull-none" data-dcnode-id="59"><span data-dcnode-id="60" instrument_node=""> </span></div><span data-dcnode-id="58" instrument_node=""> </span></div><span data-dcnode-id="56" instrument_node=""> </span></article></div><span data-dcnode-id="53" instrument_node=""> </span></div><span data-dcnode-id="51" instrument_node=""> </span></div><span data-dcnode-id="49" instrument_node=""> </span></div><span data-dcnode-id="47" instrument_node=""> </span></div><div class="back-to-top hidden-xs hidden-sm affix-top" data-dcnode-id="41" data-offset-top="300" data-spy="affix" id="back-to-top"><span data-dcnode-id="45" instrument_node=""> </span><button class="btn btn-primary" data-dcnode-id="43" title="Back to Top"><i class="fa fa-caret-up" data-dcnode-id="44"></i></button><span data-dcnode-id="42" instrument_node=""> </span></div><footer class="wrap t3-footer" data-dcnode-id="6" id="t3-footer"><div class="container hidden-xs" data-dcnode-id="7"><div class="t3-spotlight t3-footer-sl row" data-dcnode-id="8"><div class="col-lg-6 col-md-6 col-sm-6 col-xs-6" data-dcnode-id="23"><div class="t3-module module" data-dcnode-id="24" id="Mod126"><div class="module-inner" data-dcnode-id="25"><div class="module-ct" data-dcnode-id="26"><ul class="nav nav-pills nav-pills" data-dcnode-id="27"><span data-dcnode-id="40" instrument_node=""> </span><li class="item-289" data-dcnode-id="37"><a data-dcnode-id="38" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxist.com/sitemap"><span data-dcnode-id="39" instrument_node="">Sitemap</span></a></li><li class="item-355" data-dcnode-id="34"><a data-dcnode-id="35" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxist.com/search.htm"><span data-dcnode-id="36" instrument_node="">Search</span></a></li><li class="item-1223" data-dcnode-id="31"><a data-dcnode-id="32" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxist.com/tag-menu-item.htm"><span data-dcnode-id="33" instrument_node="">All tags</span></a></li><li class="item-1335" data-dcnode-id="28"><a data-dcnode-id="29" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxist.com/newletters.htm"><span data-dcnode-id="30" instrument_node="">Newsletters</span></a></li></ul></div></div></div></div><div class="col-lg-6 col-md-6 col-sm-6 col-xs-6" data-dcnode-id="9"><div class="t3-module module" data-dcnode-id="10" id="Mod174"><div class="module-inner" data-dcnode-id="11"><div class="module-ct" data-dcnode-id="12"><div class="custom" data-dcnode-id="13"><p data-dcnode-id="14" style="text-align: right;"><span data-dcnode-id="22" instrument_node="">This website uses cookies, you can find out more and set your preferences </span><a data-dcnode-id="20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxist.com/cookies-policy.htm"><span data-dcnode-id="21" instrument_node="">here</span></a><span data-dcnode-id="19" instrument_node="">.</span><br data-dcnode-id="18"><span data-dcnode-id="17" instrument_node="">By continuing to use this website, you agree to our </span><a data-dcnode-id="15" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxist.com/privacy-policy.htm"><span data-dcnode-id="16" instrument_node="">Privacy Policy</span></a></p></div></div></div></div></div></div></div></footer><span data-dcnode-id="5" instrument_node=""> </span><span data-dcnode-id="3" instrument_node=""> </span>
