llion. Those in possession of money were finding themselves consistently robbed by the state; an alternative had to be found.</span></p><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">The shift in power came with the restoration of banking to its former glories. As international trade expanded once again, a new mercantile class emerged, centred on the medieval Italian city-states. A division of labour occurred within commerce, and international merchant houses grew who were concerned less with the transfer of the actual commodities (which was left to lesser mortals), and more with the transfer of wealth and property rights.</span></p><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Rather than dealing with the myriad of currencies that could be found across the continent, the great European merchant houses in time came to circumvent the sovereign altogether, playing the role of bankers. Local tradesmen would deal with the merchant houses, who in turn would deal with one another to settle accounts, thus creating an international system of IOUs (such as cheques and bills of exchange) and payments.</span></p><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">As the wealth of the rising merchant class grew, so did their power and influence. The state became increasingly reliant on this nascent bourgeoisie as a source of funds for their expenditure – in particular, to wage wars. The major shift in class relations can be seen in the way in which such public funds were obtained, as Ferguson notes in relation to the city-state of medieval Florence: “Instead of paying a property tax, wealthier citizens were effectively obliged to lend money to their own city government. In return for these forced loans, they received interest.” (Ferguson, op. cit. p72) The merchant bankers had become the state’s creditors. The era of public debts had begun.</span></p><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">In principle, the idea of state debt makes little sense. The same result – i.e. the government raising money for state expenditure – could just as well be achieved through taxing the rich, rather than borrowing from them. Of course, from the perspective of the wealthy, lending the government money (in the form of credit) rather than giving it over (in the form of taxes) is far more preferable: the rich get to keep their money, and at the same time earn a tidy sum on the side from interest.</span></p><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The concept of a sovereign debt was not new to the capitalist epoch. Monarchs had frequently borrowed from the rich and wealthy; the problem previously, however, was that such royalty would often default on their loans. Tired of losing their money, the rising bourgeois class in England pushed through with the establishment of a national bank – the Bank of England – in 1694, which would guarantee the repayment of government debts and give the financial lenders monopoly privileges over the money supply – that is, over the issuing of new banknotes.</span></p><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">“To be granted the privilege of note issue by the crown,” Felix Martin writes, “which would anoint the liabilities of a private bank with the authority of the sovereign – this, they realised, was the Philosopher’s Stone of money. It was the endorsement that could liberate private bank money from its parochial bounds. They would lend their credit to the sovereign – he would lend his authority to their bank. What they would sow by agreeing to lend, they would reap a hundredfold in being allowed to create private money with the sovereign’s endorsement. Henceforth, the seigniorage would be shared.” (Martin, op. cit., p118)</span></p><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Alongside the national debt developed the fiscal (taxation) system. With debts to repay, the state was required to establish a means through which to raise the taxes needed to fund these debts and interest payments. The result, however, as seen now in debt-laden countries across the world, is that the tail ends up wagging the dog. Government policy begins to revolve entirely around paying back the debts to its financial creditors, and – as is aptly demonstrated in modern day Greece – new loans are required just to pay off the old ones.</span></p><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">So it comes about that the bourgeoisie takes complete control over the running of the country – not through the electoral apparatus of a country, but by dictating policy to governments using strikes of investment and the threat of national insolvency. This is what we see today, where governments of every colour are carrying out the same policies of austerity under the aegis of international finance capital – and this is what is meant by the dictatorship of capital, which rides roughshod over democracy in this time of crisis.</span></p><blockquote data-dcnode-id="484"><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">“The national debt, i.e. the alienation of the state – whether that state is despotic, constitutional, or republican – marked the capitalist era with its stamp. The only part of the so-called national wealth that actually enters into the collective possession of a modern nation is – the national debt.” (Marx, op. cit. p919)</span></p></blockquote><h2 data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Credit and crisis</span></h2><p data-dcnode-id="474"><img alt="credittrap" class="jch-lazyload" data-dcnode-id="481" data-src="http://www.socialist.net/images/new-stories/Economics/credittrap.jpg" height="302" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzNzUiIGhlaWdodD0iMzAyIj48L3N2Zz4=" style="margin: 5px; float: right;" width="375"><noscript data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">&lt;img src=http://www.socialist.net/images/new-stories/Economics/credittrap.jpg alt=credittrap style="margin: 5px; float: right;" width=375 height=302 /&gt;</span></noscript><span data-dcnode-id="478" instrument_node="">Banking and finance are fundamentally based upon money’s role as a </span><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">means of payment</span></em><span data-dcnode-id="475" instrument_node=""> – a promise by the buyer to pay in the future. This “function of money as a means of payment,” Marx notes, however, is not unique to the capitalist epoch, but “develops out of simple commodity circulation, so that a relationship of creditor and debtor is formed.”</span></p><p data-dcnode-id="469"><span data-dcnode-id="473" instrument_node="">“With the development of trade and the capitalist mode of production,” Marx continues, “this spontaneous basis for the credit system is expanded, generalised and elaborated.” Whereas coinage – that is, money as a means of purchase – once dominated, “money now functions only as means of payment, i.e. commodities are not sold for money, but for a written promise to pay at a certain date.” (Karl Marx, </span><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Capital</span></em><span data-dcnode-id="470" instrument_node="">, Volume Three, Penguin Classics edition, p525)</span></p><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">In other words, with money as a means of payment, it is possible to buy without having first sold; to own without actually paying anything in return. A disconnect develops between the commodities exchanging hands and the actual ability to pay for these commodities. Fragility, uncertainty and risk are introduced into the system, which only increases as “the credit system is expanded, generalised and elaborated”.</span></p><p data-dcnode-id="462"><span data-dcnode-id="466" instrument_node="">The complexity – and with it, the fragility – of the credit system took a qualitative leap forward with invention of fractional reserve banking in the 17</span><sup data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">th</span></sup><span data-dcnode-id="463" instrument_node=""> century. Whereas the banking system up until then had been primarily concerned with exchanges between accounts, or the provision of loans fully backed up by reserves, now banks began “lending amounts in excess of its metallic reserve…exploiting the fact that money left on deposit could profitably be lent out to borrowers.” (Ferguson, op. cit., p50)</span></p><p data-dcnode-id="458"><span data-dcnode-id="461" instrument_node="">In their role as lenders of credit, the banks play a dual role for the capitalists. </span><span data-dcnode-id="459" style="background: white none repeat scroll 0% 0%;"><span data-dcnode-id="460" instrument_node="">On the one hand, relatively short-term credit is required to overcome bottlenecks in production and maintain the flow and circulation of commodities. For example, producers need to borrow money to pay for wages and raw materials whilst they wait for previous produced goods to reach the market and be sold.</span></span></p><p data-dcnode-id="455"><span data-dcnode-id="456" style="background: white none repeat scroll 0% 0%;"><span data-dcnode-id="457" instrument_node="">On the other hand, credit may be used to allow producers to expand production when they don’t have the upfront capital to pay for it. In this respect, the banking and finance system serves to pool together and accumulate all the small savings and idle money within the economy – primarily those of individuals and households – in order to put them to use productively as investment in new means of production.</span></span></p><p data-dcnode-id="447"><span data-dcnode-id="454" instrument_node="">With the invention of fractional reserve banking, however, banks were no longer mere </span><em data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">lenders</span></em><span data-dcnode-id="451" instrument_node=""> of credit – they became the </span><em data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">creators</span></em><span data-dcnode-id="448" instrument_node=""> of credit, and thus the creators of money also. Only a fraction of deposits are backed up by liquid assets, the rest are simply loans created by the bank (at interest) in order to provide greater profits for the bank, thus increasing the money supply in the process. The credit lent appears in the form of a deposit in the bank account of the borrower, who can then spend this just as he/she would spend any other money.</span></p><p data-dcnode-id="442"><span data-dcnode-id="446" instrument_node="">Today, according to the UK-based campaigning group Positive Money, whose aim is to “</span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivemoney.org/about/"><span data-dcnode-id="445" instrument_node="">democratise money and banking</span></a><span data-dcnode-id="443" instrument_node="">”, upto 97% of the money supply in the British economy is the creation of banks, with only 3% existing in the form of cash.</span></p><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">In this respect, credit plays another key role within capitalism: artificially expanding the market – that is, the purchasing power within the economy. At root, capitalism is a system of production for profit. If the capitalists cannot make a profit, then they will not produce; workers are made unemployed, investment dries up, circulation stops. The economy grinds to a halt and the credit system breaks down – that is to say: capitalism enters into crisis.</span></p><blockquote data-dcnode-id="435"><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">“As long as the reproduction process is fluid, so that returns remain assured, this credit persists and extends, and its extension is based on the extension of the reproduction process itself. As soon as any stagnation occurs, as a result of delayed returns, overstocked markets, or fallen prices, there is a surplus of industrial capital, but in a form in which it cannot accomplish its function. A great deal of commodity capital; but unsaleable. A great deal of fixed capital; but in large measure unemployed as a result of stagnation in reproduction. Credit contracts, 1) because this capital is unoccupied,&nbsp;i.e. congealed in one of its phases of reproduction, because it cannot complete its metamorphosis; 2) because confidence in the fluidity of the reproduction process is broken; 3) because the demand for this commercial credit declines...</span></p><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">“So if there is a disturbance in this expansion, or even in the normal exertion of the reproduction process, there is also a lack of credit; it is more difficult to obtain goods on credit. The demand for cash payment and distrust of credit selling is especially characteristic of the phase in the industrial cycle that follows the crash...Factories stand idle, raw materials pile up, finished products flood the market as commodities.” (Marx, Capital, Volume Three, p614)</span></p></blockquote><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">With a default on any debts, the anarchy and chaos within the balance of payments becomes apparent. Creditors demand their repayments and refuse to lend any further. Promises to pay lose any meaning; only hard cash will suffice. Credit is reined in, bringing the motion of circulation – and thus production also – to a halt. In short, the lack of credit does not cause a crisis; the crisis causes a lack of credit.</span></p><blockquote data-dcnode-id="428"><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">“This contradiction bursts forth in that aspect of an industrial and commercial crisis which is known as a monetary crisis. Such a crisis occurs only where the ongoing chain of payments has been fully developed, along with an artificial system for settling them. Whenever there is a general disturbance of the mechanism, no matter what is cause, money suddenly and immediately changes over from its merely nominal shape, money of account, into hard cash. Profane commodities can no longer replace it. The use-value of commodities becomes valueless, and their value vanishes in the face of their own form of value.” (Marx, Capital, Volume One, p236)</span></p><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">“In a system of production where the entire interconnection of the reproduction process rests on credit, a crisis must evidently break out if credit is suddenly withdrawn and only cash payment is accepted, in the form of a violent scramble for means of payment. At first glance, therefore, the entire crisis presents itself as simply a credit and monetary crisis. And in fact all it does involve is simply the convertibility of bills of exchange into money. The majority of these bills represent actual purchases and sales, the ultimate basis of the entire crisis being the expansion of these far beyond the social need. On top of this, however, a tremendous number of these bills represent purely fraudulent deals, which now come to light and explode; as well as unsuccessful speculations conducted with borrowed capital, and finally commodity capitals that are either devalued or unsaleable, or returns that are never going to come in.” (Marx, Capital, Volume Three, p621)</span></p></blockquote><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">At the heart of these crises is a fundamental contradiction within capitalism: that of overproduction. This arises from the nature of capitalism as a system of profit, and from the origins of profit itself – as explained earlier – as the unpaid labour of the working class. Since workers produce more value than they are paid back in the form of wages, the working class as a whole can never buy back the full value of the commodities it creates.</span></p><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Capitalism traditionally overcomes this contradiction of overproduction by reinvesting the surplus value created into new means of production in the search for greater profits. This, however, only serves to create even greater productive forces, and thus an even greater mass of commodities that must find a market, and thus – rather than resolving the contradiction – only further exacerbates overproduction.</span></p><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Credit, then, is used to artificially increase the consumptive capacity of the masses, and thus to temporarily overcome overproduction, allowing the productive forces to continue growing and the market to expand beyond its limits – but only by sowing the seeds for an even bigger crisis in the future.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Today, the capitalist system has extended far beyond its limits. The expansion of credit over the past thirty years – and particularly since the turn of the century – created the largest credit bubble in history. On the one hand, as a result of globalisation, automation, and a full-frontal assault against the working class, wages were driven down, and an ever-increasing proportion of wealth began to go to capital rather than labour. On the other hand, credit was massively expanded through the use of mortgages, credit cards, student loans, etc., in order to artificially maintain demand. Whilst this had the effect of delaying the onset of crisis, it at the same time paved the way for the almighty collapse of 2008 and the continued chaos that we see today, as all the contradictions that have piled up for decades now come to the fore.</span></p><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">At root, it is the restricted consumption of the masses that prepares the way for crises under capitalism. The market is not only restricted by the amount of money that people have in their pockets to spend on goods and services (and the huge debts that hang around their necks), but also by the enormous level of excess capacity that has built up throughout the economy, creating a gigantic barrier to further investment. Today, the world is awash with such excess capacity; the market is saturated and the capitalists have had to cut back on production. Their attempt to overcome the crisis by credit has reached its limits. The productive forces have far outgrown the limits of the capitalist system.</span></p><h2 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Money and Capital</span></h2><p data-dcnode-id="408"><img alt="credithouse" class="jch-lazyload" data-dcnode-id="415" data-src="http://www.socialist.net/images/new-stories/Economics/credithouse.jpg" height="273" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzNzUiIGhlaWdodD0iMjczIj48L3N2Zz4=" style="margin: 5px; float: right; opacity: 1;" width="375"><noscript data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">&lt;img src=http://www.socialist.net/images/new-stories/Economics/credithouse.jpg alt=credithouse class="" style="margin: 5px; float: right; opacity: 1;" width=375 height=273 /&gt;</span></noscript><span data-dcnode-id="412" instrument_node="">“After the advent of banking and the birth of the bond market,” Niall Ferguson comments in his </span><em data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Financial History of the World</span></em><span data-dcnode-id="409" instrument_node="">, “the next step in the story of the ascent of money was...the rise of the joint-stock, limited-liability corporation.” “It is the company,” Ferguson notes, “that enables thousands of individuals to pool their resources for risky, long-term projects that require the investment of vast sums of capital before profits can be realised.” (Ferguson, op. cit., p121)</span></p><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">With the advent of the joint-stock company, business owners were no longer purely reliant on the banks in order to obtain credit for making large-scale investments. Instead, such money could be raised from the accumulation of many small (or large) sums, by selling to shares in the company to anyone who was willing to risk their savings in return for a portion of future profits.</span></p><p data-dcnode-id="398"><span data-dcnode-id="405" instrument_node="">As Marx emphases in </span><em data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Capital</span></em><span data-dcnode-id="402" instrument_node="">, however, such shares are not a share in the actual company itself, but rather are “an ownership title, pro rata, to the surplus-value which this capital is to realise”; “nothing but accumulated claims, legal titles, to future production”; “a legal claim to a share of the surplus-value that this capital is to produce”. (Marx, </span><em data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Capital</span></em><span data-dcnode-id="399" instrument_node="">, Volume Three, p597; p599 ; p608)</span></p><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Today, giant financial firms, through the stock market, control the process of buying, selling, and trading shares as part of the wider credit system. Anyone with any savings or private pension is tied into this system, with investment banks and pension fund managers amalgamating the population’s nest eggs into larger amounts that can be invested to make a profit.</span></p><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">It is clear, however, that there is a qualitative difference between money and capital. Whilst millions of people may have money invested in shares through their savings or pension, this does not make every thrifty saver or pension holder a capitalist. Only a tiny minority have enough money that they can live purely off the returns from stocks and shares.</span></p><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Despite the propaganda of the bourgeoisie and their mouthpieces (for example, the rhetoric of Margaret Thatcher, who sought to create a middle-class “property-owning democracy” by selling off council housing and privatising nationalised industries), the stock market does not serve to diversify society’s wealth and convert laymen into capitalists. Rather, the main function of the highly developed credit system that we see under capitalism is to do the opposite: to concentrate and “capitalise” all the small, scattered sums of money in the hands of a rich and powerful elite of bankers and financiers; to convert all money into capital – that is, into value that is capable of creating more value.</span></p><p data-dcnode-id="383"><span data-dcnode-id="391" instrument_node="">“Small sums which are incapable of functioning as money capital by themselves are combined into great masses and thus form a monetary power.” (Ibid, p529) “In so doing,” Lenin remarks in his Marxist masterpiece </span><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/lenin/works/1916/imp-hsc/ch02.htm"><em data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Imperialism, the Highest Stage of Capitalism</span></em></a><span data-dcnode-id="387" instrument_node="">, “they [the banks and financial firms] transform inactive money capital into active, that is, into capital yielding a profit; they collect all kinds of money revenues and place them at the disposal of the capitalist class.” (Lenin, </span><em data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Imperialism, the Highest Stage of Capitalism</span></em><span data-dcnode-id="384" instrument_node="">, Chapter II)</span></p><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">At the same time, the credit system serves to divorce the capitalists ever more from the process of real production. With the advent of joint-stock companies, the capitalist ceases to be the business owner or manager, and capital itself become less and less about owning actual tangible assets. Instead, the capitalist becomes simply “capital personified”, and capital ownership - in the form of stock and shares - is transformed simply into a claim to a share of the total surplus value produced in society; an asset that entitles the owner to a constant revenue stream, with a return equal to the average rate of profit. It is, in the words of Marx, the “transformation of the actual functioning capitalist into a mere manager, in charge of other people’s capital, and of the capital owner into a mere owner, a mere money capitalist.” (Marx, op. cit., p567)</span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">It is the dominance of the banks, stock market, cartels, and monopolies, meanwhile, with the transformation of capital into primarily finance capital, that Lenin noted as being a defining characteristic of imperialism - the “highest stage of capitalism”:</span></p><blockquote data-dcnode-id="373"><p data-dcnode-id="374"><span data-dcnode-id="378" instrument_node="">“It is characteristic of capitalism in general that the ownership of capital is separated from the application of capital to production, that money capital is separated from industrial or productive capital, and that the rentier who lives entirely on income obtained from money capital, is separated from the entrepreneur and from all who are directly concerned in the management of capital. Imperialism, or the domination of finance capital, is that highest stage of capitalism in which this separation reaches vast proportions. The supremacy of finance capital over all other forms of capital means the predominance of the rentier and of the financial oligarchy.” (</span><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/lenin/works/1916/imp-hsc/ch03.htm"><span data-dcnode-id="377" instrument_node="">Lenin, op. cit., Chapter III</span></a><span data-dcnode-id="375" instrument_node="">)</span></p></blockquote><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">The rise of the stock market and the credit system, then, acts to accelerate the socialisation of production, with businesses appearing “as social enterprises as opposed to private ones”. “This is the abolition of capital as private property within the confines of the capitalist mode of production itself.” (Marx, op. cit., p567).</span></p><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">On the one hand, this gives as an enormous boost to the development of the productive forces, enabling investment in new means of production on a scale that could never be achieved on the basis of individual private ownership. This provides a glimpse of what could be possible under a socialist plan of production, where the productive forces and resources in the economy were utilised according to a rational and democratic plan, on the basis of society’s needs, rather than for the profits of the bankers and bosses.</span></p><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">On the other hand, this same credit system gives rise to an orgy of speculation and “reproduces a new financial aristocracy, a new kind of parasite in the guise of company promoters, speculators and merely nominal directors; an entire system of swindling and cheating with respect to the promotion of companies, issue of shares and share dealings. It is private production unchecked by private ownership.” (Ibid, p569)</span></p><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Trading and exchange of financial commodities become merely a means of attempting to make money out of money. Financial assets increasingly become mere fictitious capital. Activity on the stock market becomes ever more separated from the state of the real economy below, with prices of such stocks and shares ceasing to reflect the actual health of the companies whose value they are supposed to represent, giving rise to an endless froth of bubbles being vastly inflated only to later burst up against the pinpricks of reality. As Niall Ferguson remarks:</span></p><blockquote data-dcnode-id="362"><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">“In the four hundred years since shares were first bought and sold, there has been a succession of financial bubbles. Time and again, share prices have soared to unsustainable heights only to crash downwards again. Time and again, this process has been accompanied by skulduggery, as unscrupulous insiders have sought to profit at the expense of naive neophytes.” (Ferguson, op. cit., p122)</span></p></blockquote><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">And, of course, as we see from the financial crash of 2007-08, it is always the working class who are left to foot the bill for such recklessness, whilst the rich and wealthy continue to laugh all the way to the bank.</span></p><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Far from being a malevolent tumour on the side of an otherwise benevolent system, however, we can see that such financial alchemy and “skulduggery” of “swindling and cheating” are an intrinsic part of the capitalist system that cannot be removed. The development of capitalism, from its mercantile beginnings in southern Italy to the Industrial Revolution in England, was only possible due to the development of finance capital and the role it played in concentrating capital, expanding the productive forces, and creating the world market. Any separation between the “good” capitalism of industry and manufacturing, on the one side, and the “bad” capitalism of the “parasitic” and “irresponsible” finance sector, on the other, is purely artificial and completely idealistic.</span></p><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Instead of attempting to regulate the unruly beast of finance and banking in order to create the utopia of a “responsible capitalism”, the leaders of the labour movement should instead put forward the demand for the nationalisation of the banks under the control of the organised working class. Only in this way can the wealth in society be pooled and planned in the interest of the many.</span></p><blockquote data-dcnode-id="351"><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">“The credit system hence accelerates the material development of the productive forces and the creation of the world market, which it is the historical task of the capitalist mode of production to bring to a certain level of development, as material foundations for the new form of production. At the same time, credit accelerates the violent outbreaks of this contradiction, crises, and with these the elements of dissolution of the old mode of production.</span></p><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">“The credit system has a dual character immanent in it: on the one hand it develops the motive of capitalist production, enrichment by the exploitation of others’ labour, into the purest and most colossal system of gambling and swindling, and restricts ever more the already small number of the exploiters of social wealth; on the other hand however it constitutes the form of transition towards a new mode of production.” (Marx, op. cit., p572)</span></p></blockquote><h2 data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">The scourge of inflation</span></h2><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Whilst minted coins may bear the faces of the heads of state with whose authority they have been issued, it is important to stress that this does not mean that money was ever “invented” or imposed from above. Rather, it is an emergent social device within a society where a market economy has developed, as Graeber emphasises:</span></p><blockquote data-dcnode-id="344"><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">“The reasons why anthropologists haven’t been able to come up with a simple, compelling story for the origins of money is because there’s no reason to believe there could be one. Money was no more ever ‘invented’ than music or mathematics or jewellery. What we call ‘money’ isn’t a ‘thing’ at all; it’s a way of comparing things mathematically…” (Graeber, op. cit. p52)</span></p></blockquote><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Although it is emergent, and not imposed or invented, the relations represented by money are nevertheless based on something that is objective and real – that is, the socially necessary labour time embodied within society’s total wealth of commodities in circulation.</span></p><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">The real wealth of a society, in other words, consists not in its accumulation of coins and cash, nor in bubbles of credit and debt, but in the level of the productive forces - and resultant use-values - at its disposal. Indeed, as discussed earlier, many a regime or ruler in history has been reminded of this fact when attempting to increase their wealth simply through debasement of the currency or printing money – a technique that universally leads to creating greater economic instability and ultimately, ironically, to the impoverishment of the society in question.</span></p><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Whilst there is no apparent limit to the amount of money that can be put into circulation, then, it is nevertheless clear that this amount is not arbitrary. As explained earlier, money is above all a measure of value – the universal measure of value. The amount of money in circulation, therefore, must ultimately be linked to the total value of commodities in circulation – equivalent in money terms to the total of the prices – and to the speed (the velocity or turnover) with which this money exchanges hands. For example, all things being equal, if the quantity of commodities remains constant but the amount of notes in circulation doubles, then the price of each commodity will double also.</span></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Inflation is a reflection of market forces: if the money supply increases, there will be a general increase in the demand for commodities, and thus a general rise in prices. Inflation of specific commodities can still occur in the absence of an increasing money supply, however; for example, as a result of a scarcity or restriction in the supply of certain goods, which pushes their price above their value. Similarly, if the costs of production for a particular commodity increase, i.e. there is an increase in its socially necessary labour time, these will be reflected in a relatively higher value and thus a newly inflated price for this commodity in relation to others.</span></p><p data-dcnode-id="331"><span data-dcnode-id="335" instrument_node="">A </span><em data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">generalised </span></em><span data-dcnode-id="332" instrument_node="">inflation - that is, a general inflation in the price of all commodities - in society, then, can only take place as a result of an expansion of the money supply and a debasement (devaluation) of the currency; or as a product of a rise in the price of a commodity such as oil, which acts as an important factor in the cost of production for all other commodities.</span></p><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">As discussed earlier, money - both in terms of commodity money and credit money - is ultimately a set of social relations; an expression of the distribution of wealth within society. The role of such a generalised inflation, therefore, is to change the balance of these social relations and redistribute this wealth from one group to another: primarily in terms of a transfer of wealth from creditors to debtors, whose debts in real terms are diminished by inflation.</span></p><p data-dcnode-id="324"><span data-dcnode-id="328" instrument_node="">Since debasement and a generalised inflation ultimately acts to redistribute wealth, the question of who controls the money supply reflects itself historically as a struggle between the classes, as noted earlier in terms of the battle between feudal kings and the nascent bourgeoisie over the money supply. As Marx comments in </span><em data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Capital</span></em><span data-dcnode-id="325" instrument_node="">:</span></p><blockquote data-dcnode-id="321"><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">“The class struggle in the ancient world, for instance, took the form mainly of a contest between debtors and creditors, and ended in Rome with the ruin of the plebeian debts, who were replaced by slaves. In the Middle Ages the contest ended with the ruin of the feudal debtors, who lost their political power together with its economic basis. Here, indeed, the money-form - and the relation between creditor and debtor does have the form of a money-relation - was only the reflection of an antagonism which lay deeper, at the level of the economic conditions of existence.” (Marx, op. cit., p233)</span></p></blockquote><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">What indebted workers might gain with one hand from a generalised inflation and a decrease in the real value of their debts, however, they risk losing with the other hand in the form of an erosion of the purchasing power of their wages. For if there is a general increase in prices, but without any corresponding increase in pay, then it is clear that workers will experience a decrease in their real wages - that is, a decrease in the quantity of goods that their wages can be exchanged for.</span></p><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">In the 1970s, the trade unions in Britain were blamed by bourgeois politicians and right-wing papers for causing high inflation, with claims that militant strikes demanding (and winning) “unreasonable” wage increases were leading to rising costs of production across the board. Such a narrative has become a popularised myth that continues to be propagated by the capitalist class and their political representatives in this day and age.</span></p><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">In fact, the reality was the other way around. Workers were generally fighting to increase their wages to catch up with inflation - inflation that arose due to other (international) factors, such as: the expansionist Keynesian policies enacted by all advanced capitalist countries throughout the post-war boom; the vast expenditure on military spending by the USA, who exported inflation across the world through the Bretton Woods monetary system; and the oil crisis of 1973, which saw energy prices soar.</span></p><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">The capitalists vehemently opposed such strikes over wages, knowing that a generalised wage increase for workers could only be achieved on the basis of a generalised reduction in their profits. Ted Grant explained this back in 1971 when responding to the slanders of the Tory government and bourgeois media:</span></p><blockquote data-dcnode-id="303"><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">“What causes price increases? If the capitalists could arbitrarily raise prices they would not wait for wages to rise. They are interested in gaining the maximum, profits. What stops them is competition, especially under modern conditions, nationally and internationally. In fact in general it is wages which lag behind prices and not vice-versa.</span></p><p data-dcnode-id="304"><span data-dcnode-id="310" instrument_node="">“If the capitalists could raise prices at their whim, why do they face the prospect of bitter strikes, with consequent loss of production and profits rather than concede the wage demands of the workers? If it was simply a question of passing on wage increases that would be the obvious way to solve the problem. But in fact the profit of the capitalist class is only the unpaid labour of the working class. Consequently an increase of wages for the workers, other things being equal, means a fall in the profit of the capitalists. Hence the cries of woe from the paid hacks of capitalism in the mass media.” (</span><a data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxist.com/grant-truth-behind-inflation.htm"><span data-dcnode-id="309" instrument_node="">Ted Grant,</span></a><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxist.com/grant-truth-behind-inflation.htm"><span data-dcnode-id="307" instrument_node=""> The Truth Behind Inflation</span></a><span data-dcnode-id="305" instrument_node="">, Militant no. 71)</span></p></blockquote><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Today, the various capitalist governments around the world are resorting to unprecedentedly loose monetary policies in a desperate attempt to stimulate the economy, with all manner of previously unseen measures being implemented and proposed: from quantitative easing and negative interest rates, to talk of a “helicopter drop” of money directly into the pockets of consumers.</span></p><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">One would expect such policies to lead to rampant inflation across the board, but this has not occurred. Why? At root, the answer lies with the enormous level of overproduction that exists on a world scale, which reflects itself in a glut of commodities and “excess capacity” in all sectors, and which acts to put an enormous downward pressure on prices.</span></p><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">For example, unlike in the past - as a result of the slowdown in China, the massive expansion of the fracking industry in the USA, and the rivalry between producers such as Saudi Arabia and Iran - today oil prices have hit rock bottom. But rather than celebrating this fact, bourgeois politicians and economists are instead gravely concerned by the onset of deflation, which is a symptom of the system’s sickness.</span></p><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">In short, the market is saturated; capitalism has gone far beyond its limits; the development of the productive forces has come into conflict with the mode of production - that is, our ability to produce has come up against the barrier of private ownership and production for profit.</span></p><h2 data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Monetary (in)stability</span></h2><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">In theory, the money supply should remain anchored to the real economy by the demand for money. For example, if a business takes out a loan in order to invest and expand production, or if a family borrows in the form of a mortgage to buy a new house, then the creation of new money will be backed up by a corresponding increase of commodities in circulation.</span></p><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">The reality, however, is not so simple. On the one hand, money acts as the lubricant to the whole flow of commodity production and exchange, enabling universal trade and exchange between individuals or communities who need never meet, and breaking up the act of exchange in both time and space. It thus provides movement and motion, dynamism and change. The rise of money, then, marks a powerful leap in the potential for the market – and thus for the forces of production – to expand.</span></p><p data-dcnode-id="278"><span data-dcnode-id="288" instrument_node="">On the other hand, the pressure exerted by the market to expand also calls forth a demand for a greater supply of money. Hence the development, as discussed earlier, of credit, banking, and finance. But it is within the nature of commodity production and exchange - that is, of private ownership - for this system to go beyond its limits. As discussed earlier, with the development of money and the rise of merchants and usurers, </span><em data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">C-M-C </span></em><span data-dcnode-id="285" instrument_node="">is replaced by </span><em data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">M-C-M’</span></em><span data-dcnode-id="282" instrument_node=""> (and </span><em data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">M-M’</span></em><span data-dcnode-id="279" instrument_node="">); the end goal of production and exchange becomes further removed from fulfilling actual needs, and more and more about the accumulation of money.</span></p><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">This pressure for the money supply to expand is reflected in the tendency towards debasement, and in the evolution of money from coins whose value was equivalent to that of the precious metal contained within, to money in the form of banknotes, etc. which act as a mere representation, symbol, or token of value - a process that has reached its extreme in the modern age where a person’s wealth is represented by mere numbers on a screen.</span></p><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Credit, then, acts to break the link between the real economy and the money supply. As discussed earlier, it allows for the productive forces to temporarily overcome the restrictions of the market. At the same time, it promotes all manner of speculation, resulting in a scourge of bubbles and fictitious capital. Prior to the financial crisis of 2007-08, for example, instead of households coming to the banks and asking for a loan, the banks came to households, encouraging them to join in with their orgy of credit creation in the form of subprime mortgages and credit cards. Meanwhile, the market carried on expanding and the capitalist system continued to grow on the basis of this house of cards, with big businesses able to realise their profits thanks to the artificial demand created by this credit.</span></p><p data-dcnode-id="269"><span data-dcnode-id="273" instrument_node="">In his book on </span><em data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Debt</span></em><span data-dcnode-id="270" instrument_node="">, David Graeber notes that the history of money has alternated between periods where the use of credit money has expanded and periods where the use of precious metals have tended to dominate. As noted earlier, for example, with the collapse of the Roman Empire came the breakdown of trade and banking, and thus a move away from credit towards a system of local and regional coinages, reflecting society’s dissolution at the time into feudal kingdoms and fiefdoms.</span></p><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">The collapse of the credit system and the reversion to commodity money (e.g. the precious metals), then, is a reflection of the general political and economic instability in society, which generates a craving for money that is tangible and not merely scribbles on a banker’s account book. As Graeber explains:</span></p><blockquote data-dcnode-id="264"><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">“...while credit systems tend to dominate in periods of relative social peace, or across networks of trust (whether created by states or, in most periods, transnational institutions like merchant guilds or communities of faith), in periods characterised by widespread war and plunder, they tend to be replaced by previous metal.” (Graber, op. cit., p214)&nbsp;</span></p></blockquote><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">In this respect, the generally limited and stable amount of precious metals circulating around the world market - along with their advantageous material properties described earlier (homogeneity, durability, high value density, etc.) - helped to enforce their role as money, providing a reliable standard of prices, measure of wealth, and means by which debts could be transferred.</span></p><p data-dcnode-id="257"><span data-dcnode-id="261" instrument_node="">The use of precious metals as the money commodity does not guarantee the stability of prices, however. This was demonstrated by the example of the Spanish Empire in the 16</span><sup data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">th</span></sup><span data-dcnode-id="258" instrument_node=""> Century, where, after flooding the country with an abundance of gold and silver looted from their conquests of Central America, the rulers found themselves with an unstable situation of high inflation and low investment, which ultimately led to the collapse of the Spanish economy. “Everything is dear in Spain except silver,” one proverb from the time remarked. This fateful downfall again highlights the fact that it is not an abundance of money that makes a society rich, but rather the level of its productive forces and ability to produce real wealth.</span></p><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Leon Trotsky also emphasised this point in respect to his analysis of the degeneration of the Soviet Union, where, under Stalin, an increase in the money supply was desperately and empirically used by the bureaucracy in an attempt to overcome the limits of the planned economy within conditions of economic isolation and backwardness.</span></p><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Trotsky stressed that even with the establishment of the planned economy and the workers’ state, money would not lose its role as a measure of value until all last remnants of private ownership, commodity production and exchange, and class society had been abolished. In the meantime, Trotsky noted, any unchecked increase in the money supply would lead to a generalised inflation that would serve to limit the effectiveness of the planned economy. The question, again, is ultimately reduced to a question of the level of the productive forces available to society.</span></p><blockquote data-dcnode-id="245"><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">“These two problems, state and money, have a number of traits in common, for they both reduce themselves in the last analysis to the problem of problems: productivity of labor. State compulsion like money compulsion is an inheritance from the class society…</span></p><p data-dcnode-id="246"><span data-dcnode-id="250" instrument_node="">“The ruling circles were completely possessed by the opinion that with a planned economy inflation is not to be feared. This means approximately that if you possess a compass there is no danger in a leaking ship. In reality, currency inflation, inevitably producing a credit inflation, entails a substitution of fictitious for real magnitudes, and corrodes the planned economy from within. It is needless to say that inflation meant a dreadful tax upon the toiling masses.” (</span><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/trotsky/1936/revbet/ch04.htm"><span data-dcnode-id="249" instrument_node="">Leon Trotsky, The Revolution Betrayed, Chapter IV</span></a><span data-dcnode-id="247" instrument_node="">)</span></p></blockquote><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Today, whilst there has not been a general inflation as a result of loose monetary policies such as QE (for the reasons explained earlier), such measures have nevertheless given rise to an enormous instability within the world economy, with cheap money leaking abroad and inflating asset bubbles - for example, of housing and stocks, etc. - across the globe. The effect within those countries that have enacted QE programmes, meanwhile, has been to weaken their currencies, helping to boost exports. In essence, it has become yet another new form of “beggar-thy-neighbour” economics.</span></p><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">The vast QE programmes undertaken in the USA, UK, Europe, and Japan, then, designed to bring about economic stability in this time of deep crisis, have – as demonstrated by the stock market panic in China and elsewhere – clearly resulted in the exact opposite. A temporary stabilisation for some has merely served to create further instability for the system as a whole. Meanwhile, despite these vast monetary injections, the economies of all the major capitalist powers remain stuck in the doldrums.</span></p><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">The value of money, therefore, whilst being a quantitative relational expression, is not arbitrary or accidental, but lies on an objective material basis: as a representation of the total values that exist in circulation within the economy. As the examples above clearly demonstrate, there is no such thing as an economic “free lunch”. This important fact has equally important consequences, particularly in relation to the issue of inflation and the money supply that we see today.</span></p><h2 data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">As good as gold</span></h2><p data-dcnode-id="224"><span class="wf_caption" data-dcnode-id="226" style="float: right; display: inline-block; max-width: 250px;"><a class="wfpopup wf-mediabox-has-float wf-zoom-image" data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxist.com/images/stories/economy/gold_bars_-_Public_Domain.jpg" rel="noopener noreferrer" style="float: right;" target="_blank" type="image/jpeg"><img alt="Photo: Public Domain" class="jch-lazyload" data-dcnode-id="236" data-src="/images/stories/economy/thumbnails/thumb_gold_bars_-_Public_Domain.jpg" height="141" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNTAiIGhlaWdodD0iMTQxIj48L3N2Zz4=" style="width: 100%; margin: 0px; padding: 0px; float: none;" width="250"><span class="wf-icon-zoom-image" data-dcnode-id="232"><svg data-dcnode-id="233" height="24" version="1.1" viewBox="0 0 1024 1024" width="24" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="235" stroke="none" stroke-width="1"></g><path d="M292.714 475.428q0 105.714 75.143 180.857t180.857 75.143 180.857-75.143 75.143-180.857-75.143-180.857-180.857-75.143-180.857 75.143-75.143 180.857zM0.143 0q0-29.714 21.714-51.429t51.429-21.714q30.857 0 51.429 21.714l196 195.429q102.286-70.857 228-70.857 81.714 0 156.286 31.714t128.571 85.714 85.714 128.571 31.714 156.286-31.714 156.286-85.714 128.571-128.571 85.714-156.286 31.714-156.286-31.714-128.571-85.714-85.714-128.571-31.714-156.286q0-125.714 70.857-228l-196-196q-21.143-21.143-21.143-51.429z" data-dcnode-id="234"></path></svg></span><noscript data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">&lt;img src=/images/stories/economy/thumbnails/thumb_gold_bars_-_Public_Domain.jpg alt="Photo: Public Domain" style="float: right; width: 100%; margin: auto;" width=250 height=141 /&gt;</span></noscript></a><span data-dcnode-id="227" style="display: block;"><span data-dcnode-id="228" instrument_node="">Photo: Public Domain</span></span></span><span data-dcnode-id="225" instrument_node="">The use of a gold standard emerged historically as a reaction to loose monetary policies, in an attempt to anchor the money supply to something tangible. In Britain, the gold standard was brought in during the first half of the 19th century, in an attempt to combat the inflation seen as a result of the Napoleonic Wars, which had been funded through a massive increase in government debt. This culminated in the 1844 Bank Charter Act, which worked to restrict the money supply by giving the Bank of England a monopoly on the printing of new notes; these notes, in turn, had to be backed up by gold. Nevertheless, fractional reserve banking was maintained, allowing private banks to increase the money supply by creating new bank deposits (i.e. credit) in response to demands for loans.</span></p><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">With the rise and spread of the British Empire, an epoch of stability was created globally that allowed for the expansion of world trade and the emergence of the gold standard as an international monetary system. When capitalism was in its ascendency and the global economy was moving forward, the international gold standard acted a positive force, facilitating international trade by providing a universal comparison of prices in different countries, each with their own national currency.</span></p><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">As the contradictions within the capitalist system accumulated, however, the benefits provided by the international gold standard turned into their opposite and became yet another source of great instability within the volatile world economy. The beginning of World War One represented the global capitalist system reaching its limits, with the various imperialist powers coming into conflict with one another as they attempted to carve up and redivide the saturated world market. In turn, the onset of the Great War led to one country after another abandoning the gold standard as they attempted to fund their war efforts by printing money.</span></p><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">At the same time, the international gold standard acted to rigidly bind the various national economies together, restricting their ability to pursue currency devaluations in response to large balance of payments deficits. Instead, countries with poor trade balances were forced to carry out an “internal devaluation” - that is, an attack on workers’ wages and conditions, in order to improve the country’s economic competitiveness.</span></p><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">This was the position facing Britain after the war, whose position on the world stage had deteriorated to the extent that it could not return to the gold standard without an outright assault against the working class. Indeed, it was the implementation of such an assault by the British ruling class that led to the outbreak of the country’s first (and only) general strike in 1926, as the capitalists looked to regain their competitiveness by attacking wages - in particular, those of the miners.</span></p><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">When world trade was expanding and the economy was growing, the tensions and antagonisms between the various capitalist countries could be glossed over. But as the global economy entered into crisis and different national economies began moving in different directions, all the contradictions came to the fore.</span></p><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">After a brief return and window of stability in the 1920s, the international gold standard eventually collapsed and died with the onset of the Great Depression in 1929, which again forced country after country to abandon the gold standard as they attempted to pursue expansionist and inflationary monetary policies to stimulate the economy, fund government deficits, and provide liquidity to failing banks. A wave of protectionism and competitive devaluations swept across the world as each capitalist nation sought to export the crisis through “beggar thy neighbour” policies - a process that merely intensified the crisis on a world scale, as international trade collapsed and markets shrank.</span></p><h2 data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">The single currency</span></h2><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">The parallels with today’s euro crisis - where the straightjacket of the single currency has served to heighten the contradictions within European capitalism - are plain to see. Once again, the weaker European economies such as Greece, Spain, and Portugal have been forced along the path of “internal devaluation”, which manifests itself in the shape of permanent cuts and attacks on workers; an attempt to bring Chinese working conditions to the shores of Europe. This is the real meaning of austerity today.</span></p><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Such countries are told that they must become competitive in order to export. “We must be more like Germany and China!”; “we must invest, be more competitive, and export!” But not everyone can be like Germany and China. One only needs to ask the simple question of: export to whom? At a time when governments everywhere are carrying out austerity, where is there the demand for increased imports?</span></p><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Furthermore, every country’s capitalists and political representatives are attempting to do the same thing, and - by definition - not everyone can be a net exporter. International competitiveness is fundamentally no different from the competition between different capitalist firms: under capitalism there will always winners and losers. Imbalances and instability are inherent within the system.</span></p><p data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Not everyone can be the most competitive. Competitiveness is always relative. The main difference is that in the competition between firms, weak firms will go under and will be subsumed by the stronger ones; on the international plane, less competitive national economies cannot be so simply assimilated – although that, in essence, is what “ever-closer union” inside the eurozone and the European Union has come to mean: a single economic zone in which the weaker economies are placed under the direct control of the stronger ones – i.e. of German capitalism.</span></p><p data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">At the same time, however, it must be stressed that, in both the case of the gold standard and the euro, the root cause of the problem is not the monetary system but the capitalist system. Inside or outside of the euro, the problems facing Greece, Spain, Ireland, Italy, and Portugal, for example, will not be solved as long as the laws of capitalism remain in place. It is the contradictions of capitalism - with its barriers of private ownership and the nation state - that have created the crisis; the international monetary system in place merely provides the form in which this crisis expresses itself.</span></p><p data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Similarly, today there are those who imagine that a return to the gold standard – that is, to a system whereby currencies are pegged to a fixed quantity of gold – would be an infallible defence against the dangers of inflationary monetary policies, global trade imbalances, speculative bubbles, over-expanded credit, financial crises, and so on and so forth. But the gold standard is not a panacea. Ultimately the needs of commodity production and exchange impose themselves; the need for a greater circulation of money arises; and the rigid link between the money supply and a single commodity – be it gold or anything else – becomes a barrier to the growth of the capitalist economy and the development of the productive forces. This is what forced the development from coins of gold and silver – known as a gold specie standard – to a monetary system of paper notes backed up by gold; and this is what has led to abandonment of the gold standard altogether today.</span></p><p data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Following the abandonment of the gold standard and the crisis of the Great Depression and the Second World War, an international monetary system was restored in 1944 in the form of the Bretton Woods system. Like the international gold standard, the fundamental basis for Bretton Woods was the growth and stability of the world economy, and the dominance of one global imperialist power - in this case, the USA, which emerged from WWII as the world capitalist superpower.</span></p><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Under the new agreement, national currencies were fixed against the US Dollar, which in turn was “as good as gold” due to the fact that two-thirds of the world’s gold lay in the vaults of Fort Knox. Again, like with the gold standard in the 19th century, the Bretton Woods system helped facilitate the expansion of world trade, which in turn provided a powerful motor force to the post-war boom.</span></p><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">As the relative strength of US capitalism declined, however, the balance of payments between America and the rest of world deteriorated. Meanwhile, vast sums of money were being spent on the Vietnam War, funded through government borrowing. With the currencies of all countries tied to the dollar, the result was that American inflation was exported across the rest of the world.</span></p><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">The system of fixed exchange rates, as with the British adherence to an overvalued gold standard in the 1920s, or with the Greek economy in relation to the euro today, became politically impossible in the wake of declining competitiveness. Instead of devaluation, under a fixed exchange rate, workers were forced to pay for the competitiveness of their national economies by accepting wages cuts. The tensions and strains became unsustainable, and eventually the dollar-gold peg broke, bringing the Bretton Woods system down with it.</span></p><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Today, with the deepest crisis in the history of capitalism, in place of stability, we face a world of unprecedented turbulence and volatility at every level: economically, politically, and socially. This has exposed all the contradictions within society and shattered any hope of returning to the temporary equilibrium established in the post-war period. Gone are the aspirations of peace and prosperity; in their place, we see instead a plague of wars and terrorist atrocities. The dream of “ever-closer union” in Europe has become a laughable joke, with the euro and the European Union both facing an existential crisis.</span></p><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">The central banks have resorted to the desperate measure of “quantitative easing” – central banks acting to buy up financial assets and thereby increase the money supply. As noted earlier, however, QE has not led to higher inflation; instead, it has simply added to the instability of the global economy, with this cheap money flooding markets and inflating speculative bubbles, particularly in emerging economies. Again, this comes back to the fundamental question regarding the monetary supply: the money in circulation must have a material basis – ultimately, a basis in terms of the real value – i.e. socially necessary labour time – embodied within the commodities in circulation in the economy.</span></p><h2 data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Paradigm shifts</span></h2><p data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">The collapse of the Bretton Woods system and the world crisis of the 1970s marked the death knell of both the international gold standard and of the “Keynesian consensus”. In their place, respectively, came the system of floating exchange rates and the economic programme of monetarism, which placed an emphasis on tight monetary policy and “supply side” measures - that is, keeping inflation down by restricting the money supply and reducing the costs of production, above all labour costs (i.e. wages). These ideas were, in turn, embodied theoretically by Milton Friedman, and politically by the Reagan administration in the USA and the Thatcher government in Britain. As mentioned earlier, meanwhile, their war on inflation in reality became a fig-leaf for a war on the working class to the benefit of the capitalists and their profits.</span></p><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">What we see from the last 100 years, then, as demonstrated by the examples of the gold standard, the Bretton Woods agreement, and now the single European currency, is that every monetary system or monetary policy eventually reaches its limit. Each of these international monetary systems cited were able to take hold in a period of capitalist upswing and global geopolitical stability, in which the contradictions of capitalism and the nation state could temporarily be papered over. In turn, the presence of an international monetary system itself became a source of stability, facilitating the growth of trade, an expansion of the world market, and a thus a development of the productive forces.</span></p><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">But in each case, with the emergence of a world crisis, these strengths of the international monetary system eventually turn into their opposite and act as a suffocating straitjacket, serving to amplify these contradictions and becoming a source of great economic and geopolitical instability. The monetary system, unable any longer to contain its internal tensions and antagonisms, is torn apart, only to be replaced by a new system when the economic equilibrium is (temporarily and partially) restored.</span></p><p data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">In effect, what is seen on the plane of monetary policy is a sort of “paradigm shift” - a qualitative change in policy, theory, and ideology - that arises from the crises and accumulation of contradictions in the old system, and which in turn expose the flaws and weakness of these systems.</span></p><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">Ultimately, however, the crisis of each of these monetary systems - the gold standard, Bretton Woods, or the euro - are only a reflection of the general crisis of capitalism. It is the underlying contradictions of capitalism - and the general crises of the capitalist system - that are at the root of the problem.</span></p><p data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">In this respect, it is no wonder that we see the so-called economic “experts” scratching their heads and scrabbling around for solutions today. Neither monetarism nor Keynesianism can offer a way out, seeing as they are simply two sides of the same capitalist coin. Meanwhile, given the extremity and depth of the current crisis, the rule book is being torn up and academic textbooks are being rapidly re-written, and central banks and governments are considering (and enacting) monetary policies - such as “helicopter drops” and QE - that not so long ago would have been considered unthinkable and sacrilegious.</span></p><h2 data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Symptoms and disease</span></h2><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">With the “experts” left floundering in the dark, a number of previously more fringe theories have risen to prominence, offering a remedy to society’s monetary malaise. First up are those who propose a return to the gold standard, in the hope that this will put a stop to governments printing money and conducting inflationary monetary policies. In essence, this Hayekian train of thought lays stress on the problems associated with the build-up of public and private debt, which in turn is blamed on government intervention - for example, stimulating credit bubbles by setting ultra-low interest rates.</span></p><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">What this camp does not consider, however, is: what would happen if governments were not to intervene in the economy and credit was not expanded? Would crises be avoided by the magical invisible hand of the market? The modern day Hayekians imagine that without government interference, the market forces of supply and demand will solve all problems; that crises might still occur, but that these would be only a minor blip in comparison to the deep recession that we are now experiencing.</span></p><p data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">As we have explained earlier, however, credit does not create a crisis, but merely delays it. In the absence of the expansion of credit, the crisis of the 1970’s would simply have continued and developed onto a higher level. The expansion of credit was required to maintain the consumptive capacity of the working class in the face of attacks on the wages – i.e. the purchasing power – of these very same workers, all in the name of maintaining profits for the capitalists. Without the expansion of credit, the expansion of the productive forces would have been met with a limited market – that is, a lack of effective demand – at a much earlier date. Companies would have ceased expanding production in the face of a falling demand for consumer goods; unemployment would have risen; the vicious cycle of recession would have set in.</span></p><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Similarly today, rather than establishing a stable equilibrium, a return to the gold standard would quickly lead to a social and political explosion, as governments across the world - in the absence of any independent monetary policy - sought to attack the working class in order to export their way out of the crisis through “internal devaluation”. In this respect, as Trotsky stressed in his speeches to the Communist International in the wake of World War One, every action the ruling class takes in an attempt to restore economic equilibrium will only serve to destroy the social and political equilibrium - and vice versa.</span></p><p data-dcnode-id="155"><span data-dcnode-id="161" instrument_node="">Elsewhere,</span><a data-dcnode-id="159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivemoney.org/our-proposals/" rel="nofollow"><span data-dcnode-id="160" instrument_node=""> </span></a><a data-dcnode-id="157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivemoney.org/our-proposals/" rel="nofollow"><span data-dcnode-id="158" instrument_node="">campaigns such as Positive Money</span></a><span data-dcnode-id="156" instrument_node=""> call for the banking system to be brought under “democratic control”, with regulation to stop banks creating money and lending just to make a profit (through interest) - in effect, an end to fractional reserve banking.</span></p><p data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">In essence, such campaigners are attempting to shine a light on the same problem as that highlighted by the Hayekians - that of the creation of credit, fictitious capital, and speculative bubbles - but are demanding the opposite solution: not less government intervention, but more. In turn, Positive Money suggests a form of “People’s QE”, as raised also by Jeremy Corbyn’s economic advisors, in which new money is created, without any corresponding debt, by an “independent” monetary panel. Such money, the campaign proposes, would only be thrown into the “real economy” - via spending, not lending - in order to fund investment in industry and infrastructure, etc.</span></p><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Two fundamental flaws must be highlighted with these proposals, however. Firstly, as explained above, the development of finance (including fractional reserve banking) and the vast expansion of credit are not the result of “greedy bankers”, but are a result of the demands of the capitalist system to constantly grow and expand beyond the limits of the market. In other words, as discussed earlier, credit is not simply imposed on society by the banks, but arises out of the needs of the system to overcome its own contradictions - fundamentally, that of overproduction.</span></p><p data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Secondly, we must surely ask: why is this “People’s QE” needed in order to channel money into the real economy? Why is there so much speculation and so little private investment in socially necessary things such as schools, hospitals, transport, green energy, and new housing?</span></p><p data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">At the end of the day, the problem is not merely the undemocratic nature of the banking system, but the problem of private ownership over the means of production and the commanding heights of the economy. Public ownership and democratic control of the banks would be a major step in the right direction, but it would not solve the fundamental issue within capitalism: you cannot plan what you don’t control, and you cannot control what you don’t own.</span></p><p data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">In this sense, under capitalism, governments don’t have any real power over the banks and big business; it is the the banks and big business that rule over governments. If we want investment in the things that society really needs, then we need to take over the major monopolies and multinationals, and nationalise them under workers’ control as part of a socialist plan of production. In the absence of this, any reform to the banking system will merely lead to a strike of investment by the capitalists - an act of economic sabotage by the capitalist class, as is being seen currently in Venezuela.</span></p><p data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Finally, again similarly to the Hayekians, there are anarcho-libertarians who blame the government and central banks for having a monopoly over the ability to create money and set interest rates. Their solution: to create “digital currencies”, such as the most famous example, Bitcoin, which are decentralised in their structure, and thus beyond the control of these very same governments and central banks.</span></p><p data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">In contrast to normal currencies, which are ultimately backed up by the state, the Bitcoin network is maintained by volunteers, who receive Bitcoins in return for maintaining the network - a process referred to as “mining”. Transactions are indelibly recorded on the “block-chain” - a ledger of all transactions ever made - of which every Bitcoin user has a copy. This decentralised setup makes it impossible for one person or entity to control the currency; instead, any changes to the network have to be agreed upon by all those who work to maintain it.</span></p><p data-dcnode-id="139"><spa
