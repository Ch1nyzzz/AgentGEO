</span></td><td data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">White light is composed of coloured elements (heterogeneous).
</span></td><td data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Light is the simplest most undivided most homogenous thing (homogeneous).
</span></td></tr><tr data-dcnode-id="3236"><td data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Darkness
</span></td><td data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Darkness is the absence of light.
</span></td><td data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Darkness is polar to, and interacts with light.
</span></td></tr><tr data-dcnode-id="3225"><td data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Spectrum
</span></td><td data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Colours are fanned out of light according to their refrangibility (primary phenomenon).
</span></td><td data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Coloured edges which arise at light-dark borders overlap to form a spectrum (compound phenomenon).
</span></td></tr><tr data-dcnode-id="3214"><td data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Prism
</span></td><td data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">The prism is immaterial to the existence of colour.
</span></td><td data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">As a turbid medium, the prism plays a role in the arising of colour.
</span></td></tr><tr data-dcnode-id="3203"><td data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">Role of refraction
</span></td><td data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Light becomes decomposed through refraction, inflection, and reflection.
</span></td><td data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Refraction, inflection, and reflection can exist without the appearance of colour.
</span></td></tr><tr data-dcnode-id="3192"><td data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">Analysis
</span></td><td data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">White light decomposes into a spectrum of all colors.
</span></td><td data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">There are only two pure colours—blue and yellow; the rest are degrees of these. Citation: (Theory of Colours, Volume 3, Paragraph 201/202)
</span></td></tr><tr data-dcnode-id="3181"><td data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Synthesis
</span></td><td data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Just as white light can be decomposed, it can be put back together.
</span></td><td data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Colours recombine to shades of grey.
</span></td></tr><tr data-dcnode-id="3170"><td data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Particle or wave?
</span></td><td data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">Particle
</span></td><td data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Neither, since they are inferences and not observed with the senses.
</span></td></tr><tr data-dcnode-id="3159"><td data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">Colour wheel
</span></td><td data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Asymmetric, 7 colours
</span></td><td data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Symmetric, 6 colours
</span></td></tr></tbody></table><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3136"><span data-dcnode-id="3155" instrument_node="">Goethe's </span><a class="mw-redirect" data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concretization" title="Concretization"><span data-dcnode-id="3154" instrument_node="">reification</span></a><span data-dcnode-id="3152" instrument_node=""> of darkness is rejected by modern physics. Both Newton and </span><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christiaan_Huygens" title="Christiaan Huygens"><span data-dcnode-id="3151" instrument_node="">Huygens</span></a><span data-dcnode-id="3149" instrument_node=""> defined darkness as an absence of light. </span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Young_%28scientist%29" title="Thomas Young (scientist)"><span data-dcnode-id="3148" instrument_node="">Young</span></a><span data-dcnode-id="3146" instrument_node=""> and </span><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustin-Jean_Fresnel" title="Augustin-Jean Fresnel"><span data-dcnode-id="3145" instrument_node="">Fresnel</span></a><span data-dcnode-id="3143" instrument_node=""> showed that Huygens’ wave theory (in his </span><a data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treatise_on_Light" title="Treatise on Light"><span data-dcnode-id="3142" instrument_node="">Treatise on Light</span></a><span data-dcnode-id="3140" instrument_node="">) could explain that colour is the visible manifestation of light's wavelength. Physicists today attribute both a corpuscular and undulatory character to light—comprising the </span><a data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wave%25E2%2580%2593particle_duality" title="Wave–particle duality"><span data-dcnode-id="3139" instrument_node="">wave–particle duality</span></a><span data-dcnode-id="3137" instrument_node="">.
</span></p><span data-dcnode-id="3135" instrument_node="">
</span><h2 data-dcnode-id="3125"><span class="mw-headline" data-dcnode-id="3133" id="History_and_influence"><span data-dcnode-id="3134" instrument_node="">History and influence</span></span><span class="mw-editsection" data-dcnode-id="3126"><span class="mw-editsection-bracket" data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">[</span></span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D12" title="Edit section: History and influence"><span data-dcnode-id="3130" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3124" instrument_node="">
</span><p data-dcnode-id="3119"><span data-dcnode-id="3123" instrument_node="">The first edition of the </span><i data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Farbenlehre</span></i><span data-dcnode-id="3120" instrument_node=""> was printed at the Cotta’schen Verlagsbuchhandlung on May 16, 1810, with 250 copies on grey paper and 500 copies on white paper. It contained three sections: i)&nbsp;a&nbsp;didactic section in which Goethe presents his own observations, ii)&nbsp;a&nbsp;polemic section in which he makes his case against Newton, and iii)&nbsp;a&nbsp;historical section.
</span></p><p data-dcnode-id="3114"><span data-dcnode-id="3118" instrument_node="">From its publication, the book was controversial for its stance against Newton. So much so, that when </span><a data-dcnode-id="3116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Lock_Eastlake" title="Charles Lock Eastlake"><span data-dcnode-id="3117" instrument_node="">Charles Eastlake</span></a><span data-dcnode-id="3115" instrument_node=""> translated the text into English in 1840, he omitted the content of Goethe's polemic against Newton.
</span></p><span data-dcnode-id="3113" instrument_node="">
</span><link data-dcnode-id="3112" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3102"><p data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">Significantly (and regrettably), only the 'Didactic' colour observations appear in Eastlake's translation. In his preface, Eastlake explains that he deleted the historical and entoptic parts of the book because they 'lacked scientific interest', and censored Goethe's polemic because the 'violence of his objections' against Newton would prevent readers from fairly judging Goethe's color observations.</span></p><div class="templatequotecite" data-dcnode-id="3103"><span data-dcnode-id="3109" instrument_node="">— </span><cite data-dcnode-id="3104"><span data-dcnode-id="3108" instrument_node="">Bruce MacEvoy, Handprint.com, 2008</span><sup class="reference" data-dcnode-id="3105" id="cite_ref-31"><a data-dcnode-id="3106" href="#cite_note-31"><span data-dcnode-id="3107" instrument_node="">[31]</span></a></sup></cite></div></blockquote><span data-dcnode-id="3101" instrument_node="">
</span><h3 data-dcnode-id="3091"><span class="mw-headline" data-dcnode-id="3099" id="Influence_on_the_arts"><span data-dcnode-id="3100" instrument_node="">Influence on the arts</span></span><span class="mw-editsection" data-dcnode-id="3092"><span class="mw-editsection-bracket" data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">[</span></span><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D13" title="Edit section: Influence on the arts"><span data-dcnode-id="3096" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3090" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3075"><div class="thumbinner" data-dcnode-id="3076" style="width:222px;"><a class="image" data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Fighting_Temeraire%2C_JMW_Turner%2C_National_Gallery.jpg"><img alt="" class="thumbimage" data-dcnode-id="3089" data-file-height="4223" data-file-width="5684" decoding="async" height="163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/30/The_Fighting_Temeraire%252C_JMW_Turner%252C_National_Gallery.jpg/220px-The_Fighting_Temeraire%252C_JMW_Turner%252C_National_Gallery.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/30/The_Fighting_Temeraire%2C_JMW_Turner%2C_National_Gallery.jpg/330px-The_Fighting_Temeraire%2C_JMW_Turner%2C_National_Gallery.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/30/The_Fighting_Temeraire%2C_JMW_Turner%2C_National_Gallery.jpg/440px-The_Fighting_Temeraire%2C_JMW_Turner%2C_National_Gallery.jpg 2x" width="220"></a><span data-dcnode-id="3087" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3077"><div class="magnify" data-dcnode-id="3085"><a class="internal" data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Fighting_Temeraire%2C_JMW_Turner%2C_National_Gallery.jpg" title="Enlarge"></a></div><a data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._M._W._Turner" title="J. M. W. Turner"><span data-dcnode-id="3084" instrument_node="">J. M. W. Turner</span></a><span data-dcnode-id="3082" instrument_node="">'s </span><i data-dcnode-id="3079"><a data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Fighting_Temeraire" title="The Fighting Temeraire"><span data-dcnode-id="3081" instrument_node="">The Fighting Temeraire</span></a></i><span data-dcnode-id="3078" instrument_node="">, 1839</span></div></div></div><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3065"><span data-dcnode-id="3073" instrument_node="">Goethe was initially induced to occupy himself with the study of colour by the questions of </span><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hue" title="Hue"><span data-dcnode-id="3072" instrument_node="">hue</span></a><span data-dcnode-id="3070" instrument_node=""> in painting. "During his first journey to Italy (1786–88), he noticed that artists were able to enunciate rules for virtually all the elements of painting and drawing except color and coloring. In the years 1786–88, Goethe began investigating whether one could ascertain rules to govern the artistic use of color."</span><sup class="reference" data-dcnode-id="3067" id="cite_ref-SepperDennis_32-0"><a data-dcnode-id="3068" href="#cite_note-SepperDennis-32"><span data-dcnode-id="3069" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3066" instrument_node="">
</span></p><p data-dcnode-id="3036"><span data-dcnode-id="3064" instrument_node="">This aim came to some fulfillment when several pictorial artists, above all </span><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philipp_Otto_Runge" title="Philipp Otto Runge"><span data-dcnode-id="3063" instrument_node="">Philipp Otto Runge</span></a><span data-dcnode-id="3061" instrument_node="">, took an interest in his colour studies.</span><sup class="reference" data-dcnode-id="3058" id="cite_ref-33"><a data-dcnode-id="3059" href="#cite_note-33"><span data-dcnode-id="3060" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3057" instrument_node=""> After being translated into English by </span><a data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Lock_Eastlake" title="Charles Lock Eastlake"><span data-dcnode-id="3056" instrument_node="">Charles Eastlake</span></a><span data-dcnode-id="3054" instrument_node=""> in 1840, the theory became widely adopted by the art world—especially among the </span><a class="mw-redirect" data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-Raphaelites" title="Pre-Raphaelites"><span data-dcnode-id="3053" instrument_node="">Pre-Raphaelites</span></a><span data-dcnode-id="3051" instrument_node="">. </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._M._W._Turner" title="J. M. W. Turner"><span data-dcnode-id="3050" instrument_node="">J.&nbsp;M.&nbsp;W. Turner</span></a><span data-dcnode-id="3048" instrument_node=""> studied it comprehensively and referenced it in the titles of several paintings.</span><sup class="reference" data-dcnode-id="3045" id="cite_ref-34"><a data-dcnode-id="3046" href="#cite_note-34"><span data-dcnode-id="3047" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3044" instrument_node=""> </span><a data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wassily_Kandinsky" title="Wassily Kandinsky"><span data-dcnode-id="3043" instrument_node="">Wassily Kandinsky</span></a><span data-dcnode-id="3041" instrument_node=""> considered it "one of the most important works."</span><sup class="reference" data-dcnode-id="3038" id="cite_ref-Rowley_35-0"><a data-dcnode-id="3039" href="#cite_note-Rowley-35"><span data-dcnode-id="3040" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3037" instrument_node="">
</span></p><span data-dcnode-id="3035" instrument_node="">
</span><h3 data-dcnode-id="3025"><span class="mw-headline" data-dcnode-id="3033" id="Influence_on_Latin_American_flags"><span data-dcnode-id="3034" instrument_node="">Influence on Latin American flags</span></span><span class="mw-editsection" data-dcnode-id="3026"><span class="mw-editsection-bracket" data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">[</span></span><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D14" title="Edit section: Influence on Latin American flags"><span data-dcnode-id="3030" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3024" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3015"><div class="thumbinner" data-dcnode-id="3016" style="width:222px;"><a class="image" data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A59_-_Carthag%25C3%25A8ne_-_D%25C3%25A9cembre_2008.JPG"><img alt="" class="thumbimage" data-dcnode-id="3023" data-file-height="2836" data-file-width="4512" decoding="async" height="138" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/94/59_-_Carthag%25C3%25A8ne_-_D%25C3%25A9cembre_2008.JPG/220px-59_-_Carthag%25C3%25A8ne_-_D%25C3%25A9cembre_2008.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/94/59_-_Carthag%C3%A8ne_-_D%C3%A9cembre_2008.JPG/330px-59_-_Carthag%C3%A8ne_-_D%C3%A9cembre_2008.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/94/59_-_Carthag%C3%A8ne_-_D%C3%A9cembre_2008.JPG/440px-59_-_Carthag%C3%A8ne_-_D%C3%A9cembre_2008.JPG 2x" width="220"></a><span data-dcnode-id="3021" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3017"><div class="magnify" data-dcnode-id="3019"><a class="internal" data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A59_-_Carthag%25C3%25A8ne_-_D%25C3%25A9cembre_2008.JPG" title="Enlarge"></a></div><span data-dcnode-id="3018" instrument_node="">Flag of Colombia</span></div></div></div><span data-dcnode-id="3014" instrument_node="">
</span><p data-dcnode-id="3006"><span data-dcnode-id="3013" instrument_node="">During a party in Weimar in the winter of 1785, Goethe had a late-night conversation with the South American revolutionary </span><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francisco_de_Miranda" title="Francisco de Miranda"><span data-dcnode-id="3012" instrument_node="">Francisco de Miranda</span></a><span data-dcnode-id="3010" instrument_node="">. In a letter written to </span><a data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Semyon_Vorontsov" title="Semyon Vorontsov"><span data-dcnode-id="3009" instrument_node="">Count Semyon Romanovich Vorontsov</span></a><span data-dcnode-id="3007" instrument_node=""> (1792), Miranda recounted how Goethe, fascinated with his exploits throughout the Americas and Europe, told him, "Your destiny is to create in your land a place where primary colours are not distorted.” He proceeded to clarify what he meant:
</span></p><span data-dcnode-id="3005" instrument_node="">
</span><link data-dcnode-id="3004" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2991"><p data-dcnode-id="2992"><span data-dcnode-id="3003" instrument_node="">First he explained to me the way the iris transforms the light into the three primary colours... then he said, "Why yellow is the most warm, noble and closest to the bright light; why Blue is that mix of excitement and serenity, so far that it evokes the shadows; and why Red is the exaltation of Yellow and Blue, the synthesis, the vanishing of the bright light into the shadows".</span><sup class="reference" data-dcnode-id="3000" id="cite_ref-36"><a data-dcnode-id="3001" href="#cite_note-36"><span data-dcnode-id="3002" instrument_node="">[36]</span></a></sup><sup class="noprint Inline-Template noprint noexcerpt Template-Fact" data-dcnode-id="2993" style="white-space:nowrap;"><span data-dcnode-id="2999" instrument_node="">[</span><i data-dcnode-id="2995"><a class="mw-redirect" data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANOTRS" title="Wikipedia:NOTRS"><span data-dcnode-id="2997" title="This claim needs references to better sources. (September 2019)"><span data-dcnode-id="2998" instrument_node="">better&nbsp;source&nbsp;needed</span></span></a></i><span data-dcnode-id="2994" instrument_node="">]</span></sup></p></blockquote><span data-dcnode-id="2990" instrument_node="">
</span><h3 data-dcnode-id="2980"><span class="mw-headline" data-dcnode-id="2988" id="Influence_on_philosophers"><span data-dcnode-id="2989" instrument_node="">Influence on philosophers</span></span><span class="mw-editsection" data-dcnode-id="2981"><span class="mw-editsection-bracket" data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">[</span></span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D15" title="Edit section: Influence on philosophers"><span data-dcnode-id="2985" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2979" instrument_node="">
</span><p data-dcnode-id="2973"><span data-dcnode-id="2978" instrument_node="">In the nineteenth century Goethe's Theory was taken up by Schopenhauer in </span><i data-dcnode-id="2975"><a class="mw-redirect" data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/On_Vision_and_Colors" title="On Vision and Colors"><span data-dcnode-id="2977" instrument_node="">On Vision and Colors</span></a></i><span data-dcnode-id="2974" instrument_node="">, who developed it into a kind of arithmetical physiology of the action of the retina, much in keeping with his own representative idealism ["The world is my representation or idea"].
</span></p><p data-dcnode-id="2968"><span data-dcnode-id="2972" instrument_node="">In the twentieth century the theory was transmitted to philosophy via Wittgenstein, who devoted a series of remarks to the subject at the end of his life. These remarks are collected as </span><i data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">Remarks on Colour</span></i><span data-dcnode-id="2969" instrument_node="">, (Wittgenstein, 1977).
</span></p><span data-dcnode-id="2967" instrument_node="">
</span><link data-dcnode-id="2966" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2953"><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Someone who agrees with Goethe finds that Goethe correctly recognized the nature of colour.  And here ‘nature’ does not mean a sum of experiences with respect to colours, but it is to be found in the concept of colour. </span></p><div class="templatequotecite" data-dcnode-id="2954"><span data-dcnode-id="2963" instrument_node="">— </span><cite data-dcnode-id="2955"><span data-dcnode-id="2962" instrument_node="">Aphorism 125, Ludwig Wittgenstein, </span><i data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Remarks on Color</span></i><span data-dcnode-id="2959" instrument_node="">, 1992</span><sup class="reference" data-dcnode-id="2956" id="cite_ref-37"><a data-dcnode-id="2957" href="#cite_note-37"><span data-dcnode-id="2958" instrument_node="">[37]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2951" instrument_node="">Wittgenstein was interested in the fact that some propositions about colour are apparently neither empirical nor exactly </span><i data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">a priori</span></i><span data-dcnode-id="2948" instrument_node="">, but something in between: phenomenology, according to Goethe. However, Wittgenstein took the line that 'There is no such thing as phenomenology, though there </span><i data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">are</span></i><span data-dcnode-id="2945" instrument_node=""> phenomenological problems.' He was content to regard Goethe's observations as a kind of logic or geometry. Wittgenstein took his examples from the Runge letter included in the "Farbenlehre", e.g. "White is the lightest colour", "There cannot be a transparent white", "There cannot be a reddish green", and so on. The logical status of these propositions in Wittgenstein's investigation, including their relation to physics, has been discussed in Jonathan Westphal's </span><i data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Colour: a Philosophical Introduction</span></i><span data-dcnode-id="2942" instrument_node=""> (Westphal, 1991).
</span></p><span data-dcnode-id="2940" instrument_node="">
</span><h3 data-dcnode-id="2930"><span class="mw-headline" data-dcnode-id="2938" id="Reception_by_scientists"><span data-dcnode-id="2939" instrument_node="">Reception by scientists</span></span><span class="mw-editsection" data-dcnode-id="2931"><span class="mw-editsection-bracket" data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">[</span></span><a data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D16" title="Edit section: Reception by scientists"><span data-dcnode-id="2935" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2929" instrument_node="">
</span><p data-dcnode-id="2921"><span data-dcnode-id="2928" instrument_node="">During Goethe's lifetime (that is, between 1810 and 1832) countless scientists and mathematicians commented on Goethe's Newton criticism in color theory, namely in reviews, books, book chapters, footnotes, open letters. A large plurality of these votes (just under half) spoke against Goethe, especially </span><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Young_%28scientist%29" title="Thomas Young (scientist)"><span data-dcnode-id="2927" instrument_node="">Thomas Young</span></a><span data-dcnode-id="2925" instrument_node="">, Louis Malus, Pierre Prévost and Gustav Theodor Fechner. One third of the statements from the natural sciences were in favour of Goethe, in particular </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Johann_Seebeck" title="Thomas Johann Seebeck"><span data-dcnode-id="2924" instrument_node="">Thomas Johann Seebeck</span></a><span data-dcnode-id="2922" instrument_node="">, Johann Salomo Christoph Schweigger and Johann Friedrich Christian Werneburg, and one-fifth expressed ambivalence or a draw.
</span></p><p data-dcnode-id="2912"><span data-dcnode-id="2920" instrument_node="">As early as 1853, in </span><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hermann_von_Helmholtz" title="Hermann von Helmholtz"><span data-dcnode-id="2919" instrument_node="">Hermann von Helmholtz</span></a><span data-dcnode-id="2917" instrument_node="">'s lecture on Goethe's scientific works—he says of Goethe's work that he depicts the perceived phenomena—"circumstantially, rigorously true to nature, and vividly puts them in an order that is pleasant to survey, and proves himself here, as everywhere in the realm of the factual, to be the great master of exposition" (Helmholtz 1853). Helmholtz ultimately rejects Goethe's theory as the work of a poet, but expresses his perplexity at how they can be in such agreement about the facts of the matter, but in violent contradiction about their meaning—'And I for one do not know how anyone, regardless of what his views about colours are, can deny that the theory in itself is fully consequent, that its assumptions, once granted, explain the facts treated completely and indeed simply'. (Helmholtz 1853)</span><sup class="reference" data-dcnode-id="2914" id="cite_ref-38"><a data-dcnode-id="2915" href="#cite_note-38"><span data-dcnode-id="2916" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2913" instrument_node="">
</span></p><p data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Although the accuracy of Goethe's observations does not admit a great deal of criticism, his aesthetic approach did not lend itself to the demands of analytic and mathematical analysis used ubiquitously in modern science.
</span></p><span data-dcnode-id="2909" instrument_node="">
</span><link data-dcnode-id="2908" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2901"><p data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Goethe's colour theory has in many ways borne fruit in art, physiology and aesthetics. But victory, and hence influence on the research of the following century, has been Newton's. </span></p><div class="templatequotecite" data-dcnode-id="2902"><span data-dcnode-id="2905" instrument_node="">— </span><cite data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">Werner Heisenberg, 1952</span></cite></div></blockquote><span data-dcnode-id="2900" instrument_node="">
</span><link data-dcnode-id="2899" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2886"><p data-dcnode-id="2894"><span data-dcnode-id="2898" instrument_node="">"One hole Goethe did find in Newton's armour, through which he incessantly worried the Englishman with his lance. Newton had committed himself to the doctrine that refraction without colour was impossible. He therefore thought that the object-glasses of telescopes must for ever remain imperfect, achromatism and refraction being incompatible. This inference was proved by </span><a data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Dollond" title="John Dollond"><span data-dcnode-id="2897" instrument_node="">Dollond</span></a><span data-dcnode-id="2895" instrument_node=""> to be wrong... Here, as elsewhere, Goethe proves himself master of the experimental conditions. It is the power of interpretation that he lacks." </span></p><div class="templatequotecite" data-dcnode-id="2887"><span data-dcnode-id="2893" instrument_node="">— </span><cite data-dcnode-id="2888"><span data-dcnode-id="2892" instrument_node="">John Tyndall, 1880</span><sup class="reference" data-dcnode-id="2889" id="cite_ref-39"><a data-dcnode-id="2890" href="#cite_note-39"><span data-dcnode-id="2891" instrument_node="">[39]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2885" instrument_node="">
</span><p data-dcnode-id="2880"><span data-dcnode-id="2884" instrument_node="">Much controversy stems from two different ways of investigating light and colour. Goethe was not interested in Newton's analytic treatment of colour—but he presented an excellent </span><i data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">rational description</span></i><span data-dcnode-id="2881" instrument_node=""> of the phenomenon of human colour perception. It is as such a collection of colour observations that we must view this book.
</span></p><span data-dcnode-id="2879" instrument_node="">
</span><link data-dcnode-id="2878" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2866"><p data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Most of Goethe's explanations of color have been thoroughly demolished, but no criticism has been leveled at his reports of the facts to be observed; nor should any be. This book can lead the reader through a demonstration course not only in subjectively produced colors (after images, light and dark adaptation, irradiation, colored shadows, and pressure phosphenes), but also in physical phenomena detectable qualitatively by observation of color (absorption, scattering, refraction, diffraction, polarization, and interference). A reader who attempts to follow the logic of Goethe's explanations and who attempts to compare them with the currently accepted views might, even with the advantage of 1970 sophistication, become convinced that Goethe's theory, or at least a part of it, has been dismissed too quickly.</span></p><div class="templatequotecite" data-dcnode-id="2867"><span data-dcnode-id="2875" instrument_node="">— </span><cite data-dcnode-id="2868"><a data-dcnode-id="2873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deane_B._Judd" title="Deane B. Judd"><span data-dcnode-id="2874" instrument_node="">Deane B. Judd</span></a><span data-dcnode-id="2872" instrument_node="">, 1970</span><sup class="reference" data-dcnode-id="2869" id="cite_ref-40"><a data-dcnode-id="2870" href="#cite_note-40"><span data-dcnode-id="2871" instrument_node="">[40]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2857"><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mitchell_Feigenbaum" title="Mitchell Feigenbaum"><span data-dcnode-id="2864" instrument_node="">Mitchell Feigenbaum</span></a><span data-dcnode-id="2862" instrument_node=""> came to believe that "Goethe had been right about colour!"</span><sup class="reference" data-dcnode-id="2859" id="cite_ref-Ribe;Steinle_2-2"><a data-dcnode-id="2860" href="#cite_note-Ribe;Steinle-2"><span data-dcnode-id="2861" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2858" instrument_node="">
</span></p><span data-dcnode-id="2856" instrument_node="">
</span><link data-dcnode-id="2855" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2840"><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">As Feigenbaum understood them, Goethe's ideas had true science in them. They were hard and empirical. Over and over again, Goethe emphasized the repeatability of his experiments. It was the perception of colour, to Goethe, that was universal and objective. What scientific evidence was there for a definable real-world quality of redness independent of our perception?</span></p><div class="templatequotecite" data-dcnode-id="2841"><span data-dcnode-id="2852" instrument_node="">— </span><cite data-dcnode-id="2842"><a data-dcnode-id="2850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Gleick" title="James Gleick"><span data-dcnode-id="2851" instrument_node="">James Gleick</span></a><span data-dcnode-id="2849" instrument_node="">, </span><i data-dcnode-id="2846"><a data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaos%3A_Making_a_New_Science" title="Chaos: Making a New Science"><span data-dcnode-id="2848" instrument_node="">Chaos</span></a></i><sup class="reference" data-dcnode-id="2843" id="cite_ref-41"><a data-dcnode-id="2844" href="#cite_note-41"><span data-dcnode-id="2845" instrument_node="">[41]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2839" instrument_node="">
</span><h3 data-dcnode-id="2829"><span class="mw-headline" data-dcnode-id="2837" id="Current_status"><span data-dcnode-id="2838" instrument_node="">Current status</span></span><span class="mw-editsection" data-dcnode-id="2830"><span class="mw-editsection-bracket" data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">[</span></span><a data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D17" title="Edit section: Current status"><span data-dcnode-id="2834" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2819"><span data-dcnode-id="2827" instrument_node="">"Newton believed that with the help of his prism experiments, he could prove that sunlight was composed of variously coloured rays of light. Goethe showed that this step from observation to theory is more problematic than Newton wanted to admit. By insisting that the step to theory is not forced upon us by the phenomena, Goethe revealed our own free, creative contribution to theory construction. And Goethe's insight is surprisingly significant, because he correctly claimed that all of the results of Newton's prism experiments fit a theoretical alternative equally well.. a century before Duhem and Quine's famous arguments for </span><a data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Underdetermination" title="Underdetermination"><span data-dcnode-id="2826" instrument_node="">Underdetermination</span></a><span data-dcnode-id="2824" instrument_node="">."</span><sup class="reference" data-dcnode-id="2821" id="cite_ref-Mueller_2016_42-0"><a data-dcnode-id="2822" href="#cite_note-Mueller_2016-42"><span data-dcnode-id="2823" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2820" instrument_node="">
</span></p><p data-dcnode-id="2813"><span data-dcnode-id="2818" instrument_node="">"Goethe’s critique of Newton was not an attack on reason or science, though it has often been portrayed that way.. The critique maintained that Newton had mistaken mathematical imagining as the pure evidence of the senses.. Goethe tried to define the scientific function of imagination: to interrelate phenomena once they have been meticulously produced, described, and organized... Newton had introduced dogma.. into color science by claiming that color could be reduced to a function of rays." (Dennis L. Sepper, 2009)</span><sup class="reference" data-dcnode-id="2815" id="cite_ref-Sepper_2009_43-0"><a data-dcnode-id="2816" href="#cite_note-Sepper_2009-43"><span data-dcnode-id="2817" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2814" instrument_node="">
</span></p><span data-dcnode-id="2812" instrument_node="">
</span><link data-dcnode-id="2811" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2801"><p data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">Goethe started out by accepting Newton's physical theory. He soon abandoned it... finding modification to be more in keeping with his own insights. One beneficial consequence of this was that he developed an awareness of the importance of the physiological aspect of colour perception, and was therefore able to demonstrate that Newton's theory of light and colours is too simplistic; that there is more to colour than variable refrangibility.</span></p><div class="templatequotecite" data-dcnode-id="2802"><span data-dcnode-id="2808" instrument_node="">— </span><cite data-dcnode-id="2803"><span data-dcnode-id="2807" instrument_node="">Michael Duck, 1988</span><sup class="reference" data-dcnode-id="2804" id="cite_ref-Duck,_Michael_44-0"><a data-dcnode-id="2805" href="#cite_note-Duck,_Michael-44"><span data-dcnode-id="2806" instrument_node="">[44]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2799" instrument_node="">"Although he soon rejected Newton’s differential refrangibility, Goethe always affirmed Newtonian mechanics. It was not an apriori poetic prejudice against mathematical analysis but rather performing the experiments that led him to reject the theory... Goethe soon concluded that in order to explain color one needs to know not just about light but also about eye function and relative differences in light across the visual field." (Sepper, 2009)</span><sup class="reference" data-dcnode-id="2796" id="cite_ref-Sepper_2009_43-1"><a data-dcnode-id="2797" href="#cite_note-Sepper_2009-43"><span data-dcnode-id="2798" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2795" instrument_node="">
</span></p><p data-dcnode-id="2779"><span data-dcnode-id="2793" instrument_node="">As a catalogue of observations, Goethe's experiments probe the complexities of human colour perception. Whereas Newton sought to develop a mathematical model for the behaviour of light, Goethe focused on exploring how colour is perceived in a wide array of conditions. Developments in understanding how the brain interprets colours, such as </span><a data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_constancy" title="Color constancy"><span data-dcnode-id="2792" instrument_node="">colour constancy</span></a><span data-dcnode-id="2790" instrument_node=""> and </span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_H._Land" title="Edwin H. Land"><span data-dcnode-id="2789" instrument_node="">Edwin H. Land</span></a><span data-dcnode-id="2787" instrument_node="">'s </span><a data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_constancy%23Retinex_theory" title="Color constancy"><span data-dcnode-id="2786" instrument_node="">retinex</span></a><span data-dcnode-id="2784" instrument_node=""> theory bear striking similarities to Goethe's theory.</span><sup class="reference" data-dcnode-id="2781" id="cite_ref-Ribe;Steinle_2-3"><a data-dcnode-id="2782" href="#cite_note-Ribe;Steinle-2"><span data-dcnode-id="2783" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2780" instrument_node="">
</span></p><p data-dcnode-id="2770"><span data-dcnode-id="2778" instrument_node="">A modern treatment of the book is given by Dennis L. Sepper in the book, </span><i data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Goethe contra Newton: Polemics and the Project for a New Science of Color</span></i><span data-dcnode-id="2775" instrument_node=""> (Cambridge University Press, 2003).</span><sup class="reference" data-dcnode-id="2772" id="cite_ref-SepperDennis_32-1"><a data-dcnode-id="2773" href="#cite_note-SepperDennis-32"><span data-dcnode-id="2774" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2771" instrument_node="">
</span></p><span data-dcnode-id="2769" instrument_node="">
</span><h2 data-dcnode-id="2759"><span class="mw-headline" data-dcnode-id="2767" id="Quotations"><span data-dcnode-id="2768" instrument_node="">Quotations</span></span><span class="mw-editsection" data-dcnode-id="2760"><span class="mw-editsection-bracket" data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">[</span></span><a data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D18" title="Edit section: Quotations"><span data-dcnode-id="2764" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2758" instrument_node="">
</span><div data-dcnode-id="2615"><span data-dcnode-id="2757" instrument_node="">
</span><span data-dcnode-id="2756" instrument_node="">
</span><span data-dcnode-id="2755" instrument_node="">
</span><span data-dcnode-id="2652" instrument_node="">
</span><table class="multicol" data-dcnode-id="2616" role="presentation" style="border-collapse: collapse; padding: 0; border: 0; background:transparent; width:100%;"><tbody data-dcnode-id="2617"><tr data-dcnode-id="2618"><td data-dcnode-id="2653" style="text-align: left; vertical-align: top;"><span data-dcnode-id="2754" instrument_node="">
</span><link data-dcnode-id="2753" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2736"><p data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">As to what I have done as a poet... I take no pride in it... but that in my century I am the only person who knows the truth in the difficult science of colours—of that, I say, I am not a little proud, and here I have a consciousness of a superiority to many.</span></p><div class="templatequotecite" data-dcnode-id="2737"><span data-dcnode-id="2750" instrument_node="">— </span><cite data-dcnode-id="2738"><span data-dcnode-id="2749" instrument_node="">Goethe, as recalled by </span><a class="mw-redirect" data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johann_Eckermann" title="Johann Eckermann"><span data-dcnode-id="2748" instrument_node="">Johann Eckermann</span></a><span data-dcnode-id="2746" instrument_node="">, </span><i data-dcnode-id="2743"><a class="mw-redirect" data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conversations_of_Goethe" title="Conversations of Goethe"><span data-dcnode-id="2745" instrument_node="">Conversations of Goethe</span></a></i><span data-dcnode-id="2742" instrument_node="">, (tr. </span><a data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Oxenford" title="John Oxenford"><span data-dcnode-id="2741" instrument_node="">John Oxenford</span></a><span data-dcnode-id="2739" instrument_node="">), London, 1930, p.302</span></cite></div></blockquote><span data-dcnode-id="2735" instrument_node="">
</span><link data-dcnode-id="2734" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2723"><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">[Goethe] delivered in full measure what was promised by the title of his excellent work: data toward a theory of colour. They are important, complete, and significant data, rich material for a future theory of colour. He has not, however, undertaken to furnish the theory itself; hence, as he himself remarks and admits on page xxxix of the introduction, he has not furnished us with a real explanation of the essential nature of colour, but really postulates it as a phenomenon, and merely tells us how it originates, not what it is.</span></p><div class="templatequotecite" data-dcnode-id="2724"><span data-dcnode-id="2731" instrument_node="">— </span><cite data-dcnode-id="2725"><a class="mw-redirect" data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schopenhauer" title="Schopenhauer"><span data-dcnode-id="2730" instrument_node="">Schopenhauer</span></a><span data-dcnode-id="2728" instrument_node="">, </span><i data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">On Vision and Colors</span></i></cite></div></blockquote><span data-dcnode-id="2722" instrument_node="">
</span><link data-dcnode-id="2721" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2698"><p data-dcnode-id="2707"><span data-dcnode-id="2720" instrument_node="">Goethe's theory of the origin of the spectrum </span><i data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">isn't</span></i><span data-dcnode-id="2717" instrument_node=""> a theory of its origin that has proved unsatisfactory; it is really not a theory at all. </span><i data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Nothing</span></i><span data-dcnode-id="2714" instrument_node=""> can be predicted by means of it. It is, rather, a vague schematic outline, of the sort we find in </span><a data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_James" title="William James"><span data-dcnode-id="2713" instrument_node="">James's</span></a><span data-dcnode-id="2711" instrument_node=""> psychology. There is no </span><i data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">experimentum crucis</span></i><span data-dcnode-id="2708" instrument_node=""> for Goethe's theory of colour.</span></p><div class="templatequotecite" data-dcnode-id="2699"><span data-dcnode-id="2706" instrument_node="">— </span><cite data-dcnode-id="2700"><a class="mw-redirect" data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wittgenstein" title="Wittgenstein"><span data-dcnode-id="2705" instrument_node="">Wittgenstein</span></a><span data-dcnode-id="2703" instrument_node="">, </span><i data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Remarks on Colour</span></i></cite></div></blockquote><span data-dcnode-id="2697" instrument_node="">
</span><link data-dcnode-id="2696" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2681"><p data-dcnode-id="2691"><span data-dcnode-id="2695" instrument_node="">Can you lend me the </span><i data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Theory of Colours</span></i><span data-dcnode-id="2692" instrument_node=""> for a few weeks? It is an important work. His last things are insipid.</span></p><div class="templatequotecite" data-dcnode-id="2682"><span data-dcnode-id="2690" instrument_node="">— </span><cite data-dcnode-id="2683"><a data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludwig_van_Beethoven" title="Ludwig van Beethoven"><span data-dcnode-id="2689" instrument_node="">Ludwig van Beethoven</span></a><span data-dcnode-id="2687" instrument_node="">, </span><i data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Conversation-book</span></i><span data-dcnode-id="2684" instrument_node="">, 1820</span></cite></div></blockquote><span data-dcnode-id="2680" instrument_node="">
</span><link data-dcnode-id="2679" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2655"><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2662"><span data-dcnode-id="2677" instrument_node="">Should your glance on mornings lovely</span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">
Lift to drink the heaven's blue</span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">
Or when sun, veiled by sirocco,</span><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node="">
Royal red sinks out of view –</span><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">
Give to Nature praise and honor.</span><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">
Blithe of heart and sound of eye,</span><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">
Knowing for the world of colour</span><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">
</span></p><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">
Where its broad foundations lie.</span></p><div class="templatequotecite" data-dcnode-id="2656"><span data-dcnode-id="2659" instrument_node="">— </span><cite data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Goethe</span></cite></div></blockquote><span data-dcnode-id="2654" instrument_node="">
</span></td><td data-dcnode-id="2619" style="text-align: left; vertical-align: top;"><span data-dcnode-id="2651" instrument_node="">
</span><h3 data-dcnode-id="2641"><span class="mw-headline" data-dcnode-id="2649" id="On_the_catalytic_moment"><span data-dcnode-id="2650" instrument_node="">On the catalytic moment</span></span><span class="mw-editsection" data-dcnode-id="2642"><span class="mw-editsection-bracket" data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">[</span></span><a data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D19" title="Edit section: On the catalytic moment"><span data-dcnode-id="2646" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2640" instrument_node="">
</span><link data-dcnode-id="2639" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2624"><p data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Aber wie verwundert war ich, als die durch's Prisma angeschaute weiße Wand nach wie vor weiß blieb, daß nur da, wo ein Dunkles dran stieß, sich eine mehr oder weniger entschiedene Farbe zeigte, daß zuletzt die Fensterstäbe am allerlebhaftesten farbig erschienen, indessen am lichtgrauen Himmel draußen keine Spur von Färbung zu sehen war. Es bedurfte keiner langen Überlegung, so erkannte ich, daß eine Gränze nothwendig sey, um Farben hervorzubringen, und ich sprach wie durch einen Instinct sogleich vor mich laut aus, daß die Newtonische Lehre falsch sey.
</span></p><p data-dcnode-id="2633"><i data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">But I was astonished, as I looked at a white wall through the prism, how it stayed white! That only there where it came upon some darkened area, it showed more or less some colour, then at last, around the window bars all the colours shone, whereas in the light grey sky outside there was no colour to be seen. It didn't take long before I knew that a border was required for colour to be brought forth, and I spoke as through an instinct out loud, that the Newtonian teachings were false.</span></i><span data-dcnode-id="2634" instrument_node="">
</span></p><span data-dcnode-id="2632" instrument_node="">

</span><li data-dcnode-id="2262" id="cite_note-11"><span class="mw-cite-backlink" data-dcnode-id="2276"><b data-dcnode-id="2277"><a aria-label="Jump up" data-dcnode-id="2278" href="#cite_ref-11" title="Jump up"><span data-dcnode-id="2279" instrument_node="">^</span></a></b></span><span data-dcnode-id="2275" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2264"><span data-dcnode-id="2274" instrument_node="">Karl Robert Mandelkow: Goethes Briefe (</span><i data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Goethe's Letters</span></i><span data-dcnode-id="2271" instrument_node="">). 2.&nbsp;edition. Vol.&nbsp;2: Briefe der Jahre 1786–1805 (</span><i data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Letters of the years 1786–1805</span></i><span data-dcnode-id="2268" instrument_node="">). </span><i data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Christian Wegner</span></i><span data-dcnode-id="2265" instrument_node=""> publishers, Hamburg 1968, p.&nbsp;528. "Die Lehre dagegen, die wir mit Überzeugung aufstellen, beginnt zwar auch mit dem farblosen Lichte, sie bedient sich äußerer Bedingungen, um farbige Erscheinungen hervorzubringen; sie gesteht aber diesen Bedingungen Wert und Würde zu. Sie maßt sich nicht an, Farben aus dem Licht zu entwickeln, sie sucht vielmehr durch unzählige Fälle darzutun, dass die Farbe zugleich von dem Lichte und von dem, was sich ihm entgegenstellt, hervorgebracht werde."</span></span><span data-dcnode-id="2263" instrument_node="">
</span></li><span data-dcnode-id="2261" instrument_node="">
</span><li data-dcnode-id="2208" id="cite_note-12"><span class="mw-cite-backlink" data-dcnode-id="2257"><b data-dcnode-id="2258"><a aria-label="Jump up" data-dcnode-id="2259" href="#cite_ref-12" title="Jump up"><span data-dcnode-id="2260" instrument_node="">^</span></a></b></span><span data-dcnode-id="2256" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2210"><span data-dcnode-id="2255" instrument_node="">Karl Robert Mandelkow: Goethes Briefe (</span><i data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Goethe's Letters</span></i><span data-dcnode-id="2252" instrument_node="">). 2.&nbsp;edition. Vol.&nbsp;2: Briefe der Jahre 1786–1805 (</span><i data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Letters of the years 1786–1805</span></i><span data-dcnode-id="2249" instrument_node="">). </span><i data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Christian Wegner</span></i><span data-dcnode-id="2246" instrument_node=""> publishers, Hamburg 1968, p.&nbsp;530. "Das für Goethes gesamte Naturbetrachtung konstitutive Prinzip der Polarität gehört zu </span><i data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">seinen frühesten Überzeugungen</span></i><span data-dcnode-id="2243" instrument_node="">..., </span><i data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">an denen er niemals irre geworden sei</span></i><span data-dcnode-id="2240" instrument_node=""> (Brief an Schweigger, 25. April 1814). Im Vorwort zur </span><i data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Farbenlehre</span></i><span data-dcnode-id="2237" instrument_node=""> wird es als </span><i data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Hauptabsicht des gegenwärtigen Werkes</span></i><span data-dcnode-id="2234" instrument_node=""> bezeichnet, dieses universelle Prinzip auch </span><i data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">auf die Farbenlehre anzuwenden</span></i><span data-dcnode-id="2231" instrument_node="">." (Italics mark citations that may only slightly have been adapted to the descriptive sentence regarding the grammar.) Translation: </span><i data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">"The principle of polarity, that is constitutive for all of Goethe's study of nature, belongs to </span></i><span data-dcnode-id="2228" instrument_node="">the earliest of his convictions</span><i data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">..., </span></i><span data-dcnode-id="2225" instrument_node="">that he had never lost faith in</span><i data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node=""> (letter to Schweigger, April 25, 1814). In the preface to the </span></i><span data-dcnode-id="2222" instrument_node="">Theory of Colours</span><i data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">, it is called </span></i><span data-dcnode-id="2219" instrument_node="">the main intention of the work at hand to apply</span><i data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node=""> this universal principle also </span></i><span data-dcnode-id="2216" instrument_node="">to the theory of colours</span><i data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">."</span></i><span data-dcnode-id="2213" instrument_node=""> See </span><a data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johann_Schweigger" title="Johann Schweigger"><span data-dcnode-id="2212" instrument_node="">Johann Schweigger</span></a></span><span data-dcnode-id="2209" instrument_node="">
</span></li><span data-dcnode-id="2207" instrument_node="">
