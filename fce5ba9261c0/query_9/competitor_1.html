</span><p data-dcnode-id="4420"><i data-dcnode-id="4449"><b data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">Theory of Colours</span></b></i><span data-dcnode-id="4448" instrument_node=""> (German: </span><i data-dcnode-id="4446" lang="de"><span data-dcnode-id="4447" instrument_node="">Zur Farbenlehre</span></i><span data-dcnode-id="4445" instrument_node=""> </span><small data-dcnode-id="4444"></small><span class="IPA" data-dcnode-id="4441" title="Representation in the International Phonetic Alphabet (IPA)"><a data-dcnode-id="4442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AIPA/Standard_German" title="Help:IPA/Standard German"><span data-dcnode-id="4443" instrument_node="">[tsuːɐ̯ ˈfaʁbn̩ˌleːʁə]</span></a></span><span data-dcnode-id="4440" instrument_node="">) is a book by </span><a data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johann_Wolfgang_von_Goethe" title="Johann Wolfgang von Goethe"><span data-dcnode-id="4439" instrument_node="">Johann Wolfgang von Goethe</span></a><span data-dcnode-id="4437" instrument_node=""> about the poet's views on the nature of </span><a class="mw-redirect" data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colours" title="Colours"><span data-dcnode-id="4436" instrument_node="">colours</span></a><span data-dcnode-id="4434" instrument_node=""> and how these are perceived by humans. It was published in German in 1810 and in English in 1840.</span><sup class="reference" data-dcnode-id="4431" id="cite_ref-EastlakeTL_1-1"><a data-dcnode-id="4432" href="#cite_note-EastlakeTL-1"><span data-dcnode-id="4433" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4430" instrument_node=""> The book contains detailed descriptions of phenomena such as </span><a class="mw-redirect" data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Complementary_colours" title="Complementary colours"><span data-dcnode-id="4429" instrument_node="">coloured shadows</span></a><span data-dcnode-id="4427" instrument_node="">, </span><a data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refraction" title="Refraction"><span data-dcnode-id="4426" instrument_node="">refraction</span></a><span data-dcnode-id="4424" instrument_node="">, and </span><a data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromatic_aberration" title="Chromatic aberration"><span data-dcnode-id="4423" instrument_node="">chromatic aberration</span></a><span data-dcnode-id="4421" instrument_node="">.
</span></p><p data-dcnode-id="4403"><span data-dcnode-id="4419" instrument_node="">The work originated in Goethe's occupation with painting and mainly exerted an influence on the arts (</span><a data-dcnode-id="4417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philipp_Otto_Runge" title="Philipp Otto Runge"><span data-dcnode-id="4418" instrument_node="">Philipp Otto Runge</span></a><span data-dcnode-id="4416" instrument_node="">, </span><a data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._M._W._Turner" title="J. M. W. Turner"><span data-dcnode-id="4415" instrument_node="">J.&nbsp;M.&nbsp;W. Turner</span></a><span data-dcnode-id="4413" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-Raphaelites" title="Pre-Raphaelites"><span data-dcnode-id="4412" instrument_node="">Pre-Raphaelites</span></a><span data-dcnode-id="4410" instrument_node="">, </span><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hilma_af_Klint" title="Hilma af Klint"><span data-dcnode-id="4409" instrument_node="">Hilma af Klint</span></a><span data-dcnode-id="4407" instrument_node="">, </span><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wassily_Kandinsky" title="Wassily Kandinsky"><span data-dcnode-id="4406" instrument_node="">Wassily Kandinsky</span></a><span data-dcnode-id="4404" instrument_node="">). The book is a successor to two short essays entitled "Contributions to Optics".
</span></p><p data-dcnode-id="4373"><span data-dcnode-id="4402" instrument_node="">Although Goethe's work was rejected by some physicists, a number of philosophers and physicists have concerned themselves with it, including </span><a data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Johann_Seebeck" title="Thomas Johann Seebeck"><span data-dcnode-id="4401" instrument_node="">Thomas Johann Seebeck</span></a><span data-dcnode-id="4399" instrument_node="">, </span><a data-dcnode-id="4397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Schopenhauer" title="Arthur Schopenhauer"><span data-dcnode-id="4398" instrument_node="">Arthur Schopenhauer</span></a><span data-dcnode-id="4396" instrument_node=""> (see: </span><i data-dcnode-id="4393"><a class="mw-redirect" data-dcnode-id="4394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/On_Vision_and_Colors" title="On Vision and Colors"><span data-dcnode-id="4395" instrument_node="">On&nbsp;Vision and Colors</span></a></i><span data-dcnode-id="4392" instrument_node="">), </span><a data-dcnode-id="4390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hermann_von_Helmholtz" title="Hermann von Helmholtz"><span data-dcnode-id="4391" instrument_node="">Hermann von Helmholtz</span></a><span data-dcnode-id="4389" instrument_node="">, </span><a data-dcnode-id="4387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rudolf_Steiner" title="Rudolf Steiner"><span data-dcnode-id="4388" instrument_node="">Rudolf Steiner</span></a><span data-dcnode-id="4386" instrument_node="">, </span><a data-dcnode-id="4384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludwig_Wittgenstein" title="Ludwig Wittgenstein"><span data-dcnode-id="4385" instrument_node="">Ludwig Wittgenstein</span></a><span data-dcnode-id="4383" instrument_node="">, </span><a data-dcnode-id="4381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Werner_Heisenberg" title="Werner Heisenberg"><span data-dcnode-id="4382" instrument_node="">Werner Heisenberg</span></a><span data-dcnode-id="4380" instrument_node="">, </span><a data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurt_G%25C3%25B6del" title="Kurt Gödel"><span data-dcnode-id="4379" instrument_node="">Kurt Gödel</span></a><span data-dcnode-id="4377" instrument_node="">, and </span><a data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mitchell_Feigenbaum" title="Mitchell Feigenbaum"><span data-dcnode-id="4376" instrument_node="">Mitchell Feigenbaum</span></a><span data-dcnode-id="4374" instrument_node="">.
</span></p><p data-dcnode-id="4354"><span data-dcnode-id="4372" instrument_node="">Goethe's book provides a catalogue of how colour is perceived in a wide variety of circumstances, and considers </span><a data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaac_Newton" title="Isaac Newton"><span data-dcnode-id="4371" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="4369" instrument_node="">'s observations to be special cases.</span><sup class="reference" data-dcnode-id="4366" id="cite_ref-Ribe;Steinle_2-0"><a data-dcnode-id="4367" href="#cite_note-Ribe;Steinle-2"><span data-dcnode-id="4368" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4365" instrument_node=""> Unlike Newton, Goethe's concern was not so much with the analytic treatment of colour, as with the qualities of how phenomena are perceived. Philosophers have come to understand the distinction between the </span><a class="mw-redirect" data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_spectrum" title="Optical spectrum"><span data-dcnode-id="4364" instrument_node="">optical spectrum</span></a><span data-dcnode-id="4362" instrument_node="">, as observed by Newton, and the phenomenon of human colour perception as presented by Goethe—a subject analyzed at length by </span><a class="mw-redirect" data-dcnode-id="4360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wittgenstein" title="Wittgenstein"><span data-dcnode-id="4361" instrument_node="">Wittgenstein</span></a><span data-dcnode-id="4359" instrument_node=""> in his comments on Goethe's theory in </span><i data-dcnode-id="4356"><a data-dcnode-id="4357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Remarks_on_Colour" title="Remarks on Colour"><span data-dcnode-id="4358" instrument_node="">Remarks on Colour</span></a></i><span data-dcnode-id="4355" instrument_node="">.
</span></p><span data-dcnode-id="4353" instrument_node="">

</span><h2 data-dcnode-id="4123"><span class="mw-headline" data-dcnode-id="4131" id="Historical_background"><span data-dcnode-id="4132" instrument_node="">Historical background</span></span><span class="mw-editsection" data-dcnode-id="4124"><span class="mw-editsection-bracket" data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">[</span></span><a data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D1" title="Edit section: Historical background"><span data-dcnode-id="4128" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4122" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4113"><div class="thumbinner" data-dcnode-id="4114" style="width:252px;"><a class="image" data-dcnode-id="4120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGoethe-Prism-FigI.jpg"><img alt="" class="thumbimage" data-dcnode-id="4121" data-file-height="640" data-file-width="1024" decoding="async" height="156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/0/00/Goethe-Prism-FigI.jpg/250px-Goethe-Prism-FigI.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/0/00/Goethe-Prism-FigI.jpg/375px-Goethe-Prism-FigI.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/0/00/Goethe-Prism-FigI.jpg/500px-Goethe-Prism-FigI.jpg 2x" width="250"></a><span data-dcnode-id="4119" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4115"><div class="magnify" data-dcnode-id="4117"><a class="internal" data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGoethe-Prism-FigI.jpg" title="Enlarge"></a></div><span data-dcnode-id="4116" instrument_node="">Reddish-yellow edges overlap blue-cyan edges to form green.</span></div></div></div><span data-dcnode-id="4112" instrument_node="">
</span><p data-dcnode-id="4090"><span data-dcnode-id="4111" instrument_node="">At Goethe's time, it was generally acknowledged that, as </span><a data-dcnode-id="4109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaac_Newton" title="Isaac Newton"><span data-dcnode-id="4110" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="4108" instrument_node=""> had shown in his </span><i data-dcnode-id="4105"><a data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opticks" title="Opticks"><span data-dcnode-id="4107" instrument_node="">Opticks</span></a></i><span data-dcnode-id="4104" instrument_node=""> in 1704, colourless (white) </span><a data-dcnode-id="4102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light" title="Light"><span data-dcnode-id="4103" instrument_node="">light</span></a><span data-dcnode-id="4101" instrument_node=""> is split up into its component </span><a class="mw-redirect" data-dcnode-id="4099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colours" title="Colours"><span data-dcnode-id="4100" instrument_node="">colours</span></a><span data-dcnode-id="4098" instrument_node=""> when directed through a </span><a class="mw-redirect" data-dcnode-id="4096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prism_%28optics%29" title="Prism (optics)"><span data-dcnode-id="4097" instrument_node="">prism</span></a><span data-dcnode-id="4095" instrument_node="">.</span><sup class="reference" data-dcnode-id="4092" id="cite_ref-3"><a data-dcnode-id="4093" href="#cite_note-3"><span data-dcnode-id="4094" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4091" instrument_node="">
</span></p><span data-dcnode-id="4089" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="4084"><p data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">Along with the rest of the world I was convinced that all the colours are contained in the light; no one had ever told me anything different, and I had never found the least cause to doubt it, because I had no further interest in the subject.</span></p></blockquote><span data-dcnode-id="4083" instrument_node="">
</span><link data-dcnode-id="4082" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4072"><p data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">But how I was astonished, as I looked at a white wall through the prism, that it stayed white! That only where it came upon some darkened area, it showed some colour, then at last, around the window sill all the colours shone... It didn't take long before I knew here was something significant about colour to be brought forth, and I spoke as through an instinct out loud, that the Newtonian teachings were false.</span></p><div class="templatequotecite" data-dcnode-id="4073"><span data-dcnode-id="4079" instrument_node="">— </span><cite data-dcnode-id="4074"><span data-dcnode-id="4078" instrument_node="">Goethe</span><sup class="reference" data-dcnode-id="4075" id="cite_ref-4"><a data-dcnode-id="4076" href="#cite_note-4"><span data-dcnode-id="4077" instrument_node="">[4]</span></a></sup></cite></div></blockquote><span data-dcnode-id="4071" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4060"><div class="thumbinner" data-dcnode-id="4061" style="width:252px;"><a class="image" data-dcnode-id="4069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACastel_L%2527Optique_des_couleurs_1740.jpg"><img alt="" class="thumbimage" data-dcnode-id="4070" data-file-height="714" data-file-width="482" decoding="async" height="370" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/47/Castel_L%2527Optique_des_couleurs_1740.jpg/250px-Castel_L%2527Optique_des_couleurs_1740.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/47/Castel_L%27Optique_des_couleurs_1740.jpg/375px-Castel_L%27Optique_des_couleurs_1740.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/4/47/Castel_L%27Optique_des_couleurs_1740.jpg 2x" width="250"></a><span data-dcnode-id="4068" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4062"><div class="magnify" data-dcnode-id="4066"><a class="internal" data-dcnode-id="4067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACastel_L%2527Optique_des_couleurs_1740.jpg" title="Enlarge"></a></div><span data-dcnode-id="4065" instrument_node="">Castel's 1740 comparison of Newton's spectral colour description with his explanation in terms of the interaction of light and dark, which Goethe later developed into his </span><i data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">Theory of Colours</span></i></div></div></div><span data-dcnode-id="4059" instrument_node="">
</span><p data-dcnode-id="4042"><span data-dcnode-id="4058" instrument_node="">Goethe's starting point was the supposed discovery of how Newton erred in the prismatic experiment,</span><sup class="reference" data-dcnode-id="4055" id="cite_ref-5"><a data-dcnode-id="4056" href="#cite_note-5"><span data-dcnode-id="4057" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4054" instrument_node=""> and by 1793 Goethe had formulated his arguments against Newton in the essay "Über Newtons Hypothese der diversen Refrangibilität" (</span><i data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">"On Newton's hypothesis of diverse refrangibility"</span></i><span data-dcnode-id="4051" instrument_node="">).</span><sup class="reference" data-dcnode-id="4048" id="cite_ref-6"><a data-dcnode-id="4049" href="#cite_note-6"><span data-dcnode-id="4050" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4047" instrument_node=""> Yet, by 1794, Goethe had begun to increasingly note the importance of the physiological aspect of colours.</span><sup class="reference" data-dcnode-id="4044" id="cite_ref-7"><a data-dcnode-id="4045" href="#cite_note-7"><span data-dcnode-id="4046" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4043" instrument_node="">
</span></p><p data-dcnode-id="4029"><span data-dcnode-id="4041" instrument_node="">As Goethe notes in the historical section, </span><a data-dcnode-id="4039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Bertrand_Castel" title="Louis Bertrand Castel"><span data-dcnode-id="4040" instrument_node="">Louis Bertrand Castel</span></a><span data-dcnode-id="4038" instrument_node=""> had already published a criticism of Newton's spectral description of prismatic colour in 1740</span><sup class="reference" data-dcnode-id="4035" id="cite_ref-8"><a data-dcnode-id="4036" href="#cite_note-8"><span data-dcnode-id="4037" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4034" instrument_node=""> in which he observed that the sequence of colours split by a prism depended on the distance from the prism—and that Newton was looking at a special case.</span><sup class="reference" data-dcnode-id="4031" id="cite_ref-9"><a data-dcnode-id="4032" href="#cite_note-9"><span data-dcnode-id="4033" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4030" instrument_node="">
</span></p><p data-dcnode-id="4023"><span data-dcnode-id="4028" instrument_node="">"Whereas Newton observed the colour spectrum cast on a wall at a fixed distance away from the prism, Goethe observed the cast spectrum on a white card which was progressively moved away from the prism... As the card was moved away, the projected image elongated, gradually assuming an elliptical shape, and the coloured images became larger, finally merging at the centre to produce green. Moving the card farther led to the increase in the size of the image, until finally the spectrum described by Newton in the Opticks was produced... The image cast by the refracted beam was not fixed, but rather developed with increasing distance from the prism. Consequently, Goethe saw the particular distance chosen by Newton to prove the second proposition of the Opticks as capriciously imposed." (Alex Kentsis, Between Light and Eye)</span><sup class="reference" data-dcnode-id="4025" id="cite_ref-10"><a data-dcnode-id="4026" href="#cite_note-10"><span data-dcnode-id="4027" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4024" instrument_node="">
</span></p><span data-dcnode-id="4022" instrument_node="">
</span><link data-dcnode-id="4021" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4011"><p data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">The theory we set up against this begins with colourless light, and avails itself of outward conditions, to produce coloured phenomena; but it concedes worth and dignity to these conditions. It does not arrogate to itself developing colours from the light, but rather seeks to prove by numberless cases that colour is produced by light as well as by what stands against it.</span></p><div class="templatequotecite" data-dcnode-id="4012"><span data-dcnode-id="4018" instrument_node="">— </span><cite data-dcnode-id="4013"><span data-dcnode-id="4017" instrument_node="">Goethe</span><sup class="reference" data-dcnode-id="4014" id="cite_ref-11"><a data-dcnode-id="4015" href="#cite_note-11"><span data-dcnode-id="4016" instrument_node="">[11]</span></a></sup></cite></div></blockquote><span data-dcnode-id="4010" instrument_node="">
</span><p data-dcnode-id="3998"><span data-dcnode-id="4009" instrument_node="">In the preface to the </span><i data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">Theory of Colours</span></i><span data-dcnode-id="4006" instrument_node="">, Goethe explained that he tried to apply the principle of </span><i data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">polarity</span></i><span data-dcnode-id="4003" instrument_node="">, in the work—a proposition that belonged to his earliest convictions and was constitutive of his entire study of nature.</span><sup class="reference" data-dcnode-id="4000" id="cite_ref-12"><a data-dcnode-id="4001" href="#cite_note-12"><span data-dcnode-id="4002" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3999" instrument_node="">
</span></p><span data-dcnode-id="3997" instrument_node="">
</span><h2 data-dcnode-id="3986"><span data-dcnode-id="3996" id="Goethe.27s_theory"></span><span class="mw-headline" data-dcnode-id="3994" id="Goethe's_theory"><span data-dcnode-id="3995" instrument_node="">Goethe's theory</span></span><span class="mw-editsection" data-dcnode-id="3987"><span class="mw-editsection-bracket" data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">[</span></span><a data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D2" title="Edit section: Goethe's theory"><span data-dcnode-id="3991" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3985" instrument_node="">
</span><link data-dcnode-id="3984" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3966"><p data-dcnode-id="3975"><span data-dcnode-id="3983" instrument_node="">Goethe's theory of the constitution of colours of the spectrum has not proved to be an unsatisfactory theory, rather it really isn't a theory at all. Nothing can be predicted with it. It is, rather a vague schematic outline of the sort we find in </span><a data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_James" title="William James"><span data-dcnode-id="3982" instrument_node="">James</span></a><span data-dcnode-id="3980" instrument_node="">'s psychology. Nor is there any </span><i data-dcnode-id="3977"><a data-dcnode-id="3978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experimentum_crucis" title="Experimentum crucis"><span data-dcnode-id="3979" instrument_node="">experimentum crucis</span></a></i><span data-dcnode-id="3976" instrument_node=""> which could decide for or against the theory. </span></p><div class="templatequotecite" data-dcnode-id="3967"><span data-dcnode-id="3974" instrument_node="">— </span><cite data-dcnode-id="3968"><a data-dcnode-id="3972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludwig_Wittgenstein" title="Ludwig Wittgenstein"><span data-dcnode-id="3973" instrument_node="">Ludwig Wittgenstein</span></a><span data-dcnode-id="3971" instrument_node="">, </span><i data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">Remarks on Colour, paragraphs 70</span></i></cite></div></blockquote><span data-dcnode-id="3965" instrument_node="">
</span><p data-dcnode-id="3953"><span data-dcnode-id="3964" instrument_node="">It is hard to present Goethe's "theory", since he refrains from setting up any actual theory; he says, "its intention is to portray rather than explain" (</span><i data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">Scientific Studies</span></i><sup class="reference" data-dcnode-id="3959" id="cite_ref-Goethe_1995_13-0"><a data-dcnode-id="3960" href="#cite_note-Goethe_1995-13"><span data-dcnode-id="3961" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3958" instrument_node="">). Instead of setting up models and explanations, Goethe collected specimens—he was responsible for the meteorological collections of Jena University.</span><sup class="reference" data-dcnode-id="3955" id="cite_ref-14"><a data-dcnode-id="3956" href="#cite_note-14"><span data-dcnode-id="3957" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3954" instrument_node=""> By the time of his death, he had amassed over 17,800 minerals in his personal collection—the largest in all of Europe. He took the same approach to colour—instead of narrowing and isolating things to a single 'experimentum crucis' (or critical experiment that would prove or disprove his theory), he sought to gain as much breadth for his understanding as possible by developing a wide-ranging exposition through which is revealed the essential character of colour—without having to resort to explanations and theories about perceived phenomena such as 'wavelengths' or 'particles'.
</span></p><p data-dcnode-id="3943"><span data-dcnode-id="3952" instrument_node="">"The crux of his color theory is its experiential source: rather than impose theoretical statements, Goethe sought to allow light and color to be displayed in an ordered series of experiments that readers could experience for themselves." (Seamon, 1998</span><sup class="reference" data-dcnode-id="3949" id="cite_ref-15"><a data-dcnode-id="3950" href="#cite_note-15"><span data-dcnode-id="3951" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3948" instrument_node="">). According to Goethe, "Newton's error.. was trusting math over the sensations of his eye." (Jonah Lehrer, 2006).</span><sup class="reference" data-dcnode-id="3945" id="cite_ref-16"><a data-dcnode-id="3946" href="#cite_note-16"><span data-dcnode-id="3947" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3944" instrument_node="">
</span></p><p data-dcnode-id="3934"><span data-dcnode-id="3942" instrument_node="">To stay true to the perception without resort to explanation was the essence of Goethe's method. What he provided was really not so much a theory, as a </span><i data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">rational description</span></i><span data-dcnode-id="3939" instrument_node=""> of colour. For Goethe, "the highest is to understand that all fact is really theory. The blue of the sky reveals to us the basic law of color. Search nothing beyond the phenomena, they themselves are the theory."</span><sup class="reference" data-dcnode-id="3936" id="cite_ref-17"><a data-dcnode-id="3937" href="#cite_note-17"><span data-dcnode-id="3938" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3935" instrument_node="">
</span></p><span data-dcnode-id="3933" instrument_node="">
</span><link data-dcnode-id="3932" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3916"><p data-dcnode-id="3927"><span data-dcnode-id="3931" instrument_node="">[Goethe] delivered in full measure what was promised by the title of his excellent work: </span><i data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">Data for a Theory of Color.</span></i><span data-dcnode-id="3928" instrument_node=""> They are important, complete, and significant data, rich material for a future theory of color. He has not, however, undertaken to furnish the theory itself; hence, as he himself remarks and admits on page xxxix of the introduction, he has not furnished us with a real explanation of the essential nature of color, but really postulates it as a phenomenon, and merely tells us how it originates, not what it is. The physiological colors ... he represents as a phenomenon, complete and existing by itself, without even attempting to show their relation to the physical colors, his principal theme. ... it is really a systematic presentation of facts, but it stops short at this. </span></p><div class="templatequotecite" data-dcnode-id="3917"><span data-dcnode-id="3926" instrument_node="">— </span><cite data-dcnode-id="3918"><a data-dcnode-id="3924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Schopenhauer" title="Arthur Schopenhauer"><span data-dcnode-id="3925" instrument_node="">Schopenhauer</span></a><span data-dcnode-id="3923" instrument_node="">, </span><i data-dcnode-id="3920"><a class="mw-redirect" data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/On_Vision_and_Colors" title="On Vision and Colors"><span data-dcnode-id="3922" instrument_node="">On&nbsp;Vision and Colors</span></a></i><span data-dcnode-id="3919" instrument_node="">, Introduction</span></cite></div></blockquote><span data-dcnode-id="3915" instrument_node="">
</span><p data-dcnode-id="3900"><span data-dcnode-id="3914" instrument_node="">Goethe outlines his method in the essay, </span><i data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">The experiment as mediator between subject and object</span></i><span data-dcnode-id="3911" instrument_node=""> (1772).</span><sup class="reference" data-dcnode-id="3908" id="cite_ref-18"><a data-dcnode-id="3909" href="#cite_note-18"><span data-dcnode-id="3910" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3907" instrument_node=""> It underscores his experiential standpoint. "The human being himself, to the extent that he makes sound use of his senses, is the most exact physical apparatus that can exist." (Goethe, </span><i data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Scientific Studies</span></i><sup class="reference" data-dcnode-id="3902" id="cite_ref-Goethe_1995_13-1"><a data-dcnode-id="3903" href="#cite_note-Goethe_1995-13"><span data-dcnode-id="3904" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3901" instrument_node="">)
</span></p><span data-dcnode-id="3899" instrument_node="">
</span><link data-dcnode-id="3898" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3887"><p data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">I believe that what Goethe was really seeking was not a physiological but a psychological theory of colours. </span></p><div class="templatequotecite" data-dcnode-id="3888"><span data-dcnode-id="3895" instrument_node="">— </span><cite data-dcnode-id="3889"><a data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludwig_Wittgenstein" title="Ludwig Wittgenstein"><span data-dcnode-id="3894" instrument_node="">Ludwig Wittgenstein</span></a><span data-dcnode-id="3892" instrument_node="">, </span><i data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">Culture and Value, MS 112 255:26.11.1931</span></i></cite></div></blockquote><span data-dcnode-id="3886" instrument_node="">
</span><h3 data-dcnode-id="3876"><span class="mw-headline" data-dcnode-id="3884" id="Light_and_darkness"><span data-dcnode-id="3885" instrument_node="">Light and darkness</span></span><span class="mw-editsection" data-dcnode-id="3877"><span class="mw-editsection-bracket" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">[</span></span><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D3" title="Edit section: Light and darkness"><span data-dcnode-id="3881" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3875" instrument_node="">
</span><p data-dcnode-id="3870"><span data-dcnode-id="3874" instrument_node="">Unlike his contemporaries, Goethe didn't see darkness as an absence of light, but rather as polar to and interacting with light; colour resulted from this interaction of light and shadow. For Goethe, light is </span><i data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">"the simplest most undivided most homogeneous being that we know. Confronting it is the darkness"</span></i><span data-dcnode-id="3871" instrument_node=""> (Letter to Jacobi).
</span></p><span data-dcnode-id="3869" instrument_node="">
</span><link data-dcnode-id="3868" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3847"><p data-dcnode-id="3857"><span data-dcnode-id="3867" instrument_node="">...they maintained that </span><i data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">shade is a part of light</span></i><span data-dcnode-id="3864" instrument_node="">. It sounds absurd when I express it; but so it is: for they said that </span><i data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">colours</span></i><span data-dcnode-id="3861" instrument_node="">, which are shadow and the result of shade, </span><i data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">are light itself</span></i><span data-dcnode-id="3858" instrument_node="">.</span></p><div class="templatequotecite" data-dcnode-id="3848"><span data-dcnode-id="3856" instrument_node="">— </span><cite data-dcnode-id="3849"><a class="mw-redirect" data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johann_Eckermann" title="Johann Eckermann"><span data-dcnode-id="3855" instrument_node="">Johann Eckermann</span></a><span data-dcnode-id="3853" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conversations_of_Goethe" title="Conversations of Goethe"><span data-dcnode-id="3852" instrument_node="">Conversations of Goethe</span></a><span data-dcnode-id="3850" instrument_node="">, entry: January 4, 1824; trans. Wallace Wood</span></cite></div></blockquote><span data-dcnode-id="3846" instrument_node="">
</span><p data-dcnode-id="3841"><span data-dcnode-id="3845" instrument_node="">Based on his experiments with turbid media, Goethe characterized colour as arising from the dynamic interplay of darkness and light. </span><a data-dcnode-id="3843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rudolf_Steiner" title="Rudolf Steiner"><span data-dcnode-id="3844" instrument_node="">Rudolf Steiner</span></a><span data-dcnode-id="3842" instrument_node="">, the science editor for the Kurschner edition of Goethe's works, gave the following analogy:
</span></p><span data-dcnode-id="3840" instrument_node="">
</span><link data-dcnode-id="3839" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3829"><p data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Modern natural science sees darkness as a complete nothingness. According to this view, the light which streams into a dark space has no resistance from the darkness to overcome. Goethe pictures to himself that light and darkness relate to each other like the north and south pole of a magnet. The darkness can weaken the light in its working power. Conversely, the light can limit the energy of the darkness. In both cases color arises.</span></p><div class="templatequotecite" data-dcnode-id="3830"><span data-dcnode-id="3836" instrument_node="">— </span><cite data-dcnode-id="3831"><span data-dcnode-id="3835" instrument_node="">Rudolf Steiner, 1897</span><sup class="reference" data-dcnode-id="3832" id="cite_ref-Steiner_1897_19-0"><a data-dcnode-id="3833" href="#cite_note-Steiner_1897-19"><span data-dcnode-id="3834" instrument_node="">[19]</span></a></sup></cite></div></blockquote><span data-dcnode-id="3828" instrument_node="">
</span><p data-dcnode-id="3822"><span data-dcnode-id="3827" instrument_node="">Goethe expresses this more succinctly:</span><sup class="reference" data-dcnode-id="3824" id="cite_ref-20"><a data-dcnode-id="3825" href="#cite_note-20"><span data-dcnode-id="3826" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3823" instrument_node="">
</span></p><span data-dcnode-id="3821" instrument_node="">
</span><link data-dcnode-id="3820" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3817"><p data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">[..] white that becomes darkened or dimmed inclines to yellow; black, as it becomes lighter, inclines to blue.</span></p></blockquote><span data-dcnode-id="3816" instrument_node="">
</span><p data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">In other words: Yellow is a light which has been dampened by darkness; Blue is a darkness weakened by light.
</span></p><span data-dcnode-id="3813" instrument_node="">
</span><h3 data-dcnode-id="3803"><span class="mw-headline" data-dcnode-id="3811" id="Experiments_with_turbid_media"><span data-dcnode-id="3812" instrument_node="">Experiments with turbid media</span></span><span class="mw-editsection" data-dcnode-id="3804"><span class="mw-editsection-bracket" data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">[</span></span><a data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D4" title="Edit section: Experiments with turbid media"><span data-dcnode-id="3808" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3802" instrument_node="">
</span><link data-dcnode-id="3801" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3789"><p data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">The action of turbid media was to Goethe the ultimate fact—the Urphänomen—of the world of colours.</span></p><div class="templatequotecite" data-dcnode-id="3790"><span data-dcnode-id="3798" instrument_node="">— </span><cite data-dcnode-id="3791"><a data-dcnode-id="3796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Tyndall" title="John Tyndall"><span data-dcnode-id="3797" instrument_node="">John Tyndall</span></a><span data-dcnode-id="3795" instrument_node="">, 1880</span><sup class="reference" data-dcnode-id="3792" id="cite_ref-21"><a data-dcnode-id="3793" href="#cite_note-21"><span data-dcnode-id="3794" instrument_node="">[21]</span></a></sup></cite></div></blockquote><span data-dcnode-id="3788" instrument_node="">
</span><p data-dcnode-id="3783"><span data-dcnode-id="3787" instrument_node="">Goethe's studies of colour began with experiments which examined the effects of </span><a data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turbidity" title="Turbidity"><span data-dcnode-id="3786" instrument_node="">turbid media</span></a><span data-dcnode-id="3784" instrument_node="">, such as air, dust, and moisture on the perception of light and dark. The poet observed that light seen through a turbid medium appears yellow, and darkness seen through an illuminated medium appears blue.
</span></p><span data-dcnode-id="3782" instrument_node="">
</span><link data-dcnode-id="3781" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3771"><p data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">The highest degree of light, such as that of the sun... is for the most part colourless. This light, however, seen through a medium but very slightly thickened, appears to us yellow. If the density of such a medium be increased, or if its volume become greater, we shall see the light gradually assume a yellow-red hue, which at last deepens to a ruby colour.
If on the other hand darkness is seen through a semi-transparent medium, which is itself illumined by a light striking on it, a blue colour appears: this becomes lighter and paler as the density of the medium is increased, but on the contrary appears darker and deeper the more transparent the medium becomes: in the least degree of dimness short of absolute transparence, always supposing a perfectly colourless medium, this deep blue approaches the most beautiful violet. </span></p><div class="templatequotecite" data-dcnode-id="3772"><span data-dcnode-id="3778" instrument_node="">— </span><cite data-dcnode-id="3773"><span data-dcnode-id="3777" instrument_node="">Goethe, </span><i data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Theory of Colours</span></i><span data-dcnode-id="3774" instrument_node="">, pp. 150–151</span></cite></div></blockquote><span data-dcnode-id="3770" instrument_node="">
</span><p data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">He then proceeds with numerous experiments, systematically observing the effects of rarefied mediums such as dust, air, and moisture on the perception of colour.
</span></p><span data-dcnode-id="3767" instrument_node="">
</span><h3 data-dcnode-id="3757"><span class="mw-headline" data-dcnode-id="3765" id="Boundary_conditions"><span data-dcnode-id="3766" instrument_node="">Boundary conditions</span></span><span class="mw-editsection" data-dcnode-id="3758"><span class="mw-editsection-bracket" data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">[</span></span><a data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D5" title="Edit section: Boundary conditions"><span data-dcnode-id="3762" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3756" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3744"><div class="thumbinner" data-dcnode-id="3745" style="width:202px;"><a class="image" data-dcnode-id="3754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrism-orientation-of-light-dark-boundary.gif"><img alt="" class="thumbimage" data-dcnode-id="3755" data-file-height="200" data-file-width="400" decoding="async" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/0/04/Prism-orientation-of-light-dark-boundary.gif/200px-Prism-orientation-of-light-dark-boundary.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/0/04/Prism-orientation-of-light-dark-boundary.gif/300px-Prism-orientation-of-light-dark-boundary.gif 1.5x, //upload.wikimedia.org/wikipedia/en/0/04/Prism-orientation-of-light-dark-boundary.gif 2x" width="200"></a><span data-dcnode-id="3753" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3746"><div class="magnify" data-dcnode-id="3751"><a class="internal" data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrism-orientation-of-light-dark-boundary.gif" title="Enlarge"></a></div><span data-dcnode-id="3750" instrument_node="">When looked at </span><i data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">through</span></i><span data-dcnode-id="3747" instrument_node=""> a prism, the colours seen at a light–dark boundary depend upon the orientation of this light–dark boundary.</span></div></div></div><span data-dcnode-id="3743" instrument_node="">
</span><p data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">When viewed through a prism, the orientation of a light–dark boundary with respect to the prism's axis is significant. With white above a dark boundary, we observe the light extending a blue-violet edge into the dark area; whereas dark above a light boundary results in a red-yellow edge extending into the light area.
</span></p><p data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Goethe was intrigued by this difference. He felt that this arising of colour at light–dark boundaries was fundamental to the creation of the spectrum (which he considered to be a compound phenomenon).
</span></p><p data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Varying the experimental conditions by using different shades of grey shows that the intensity of coloured edges increases with boundary contrast.
</span></p><span data-dcnode-id="3736" instrument_node="">
</span><h3 data-dcnode-id="3726"><span class="mw-headline" data-dcnode-id="3734" id="Light_and_dark_spectra"><span data-dcnode-id="3735" instrument_node="">Light and dark spectra</span></span><span class="mw-editsection" data-dcnode-id="3727"><span class="mw-editsection-bracket" data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">[</span></span><a data-dcnode-id="3730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D6" title="Edit section: Light and dark spectra"><span data-dcnode-id="3731" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3725" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3716"><div class="thumbinner" data-dcnode-id="3717" style="width:202px;"><a class="image" data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrisma-goethe.gif"><img alt="" class="thumbimage" data-dcnode-id="3724" data-file-height="360" data-file-width="580" decoding="async" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/f/f8/Prisma-goethe.gif/200px-Prisma-goethe.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/f/f8/Prisma-goethe.gif/300px-Prisma-goethe.gif 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/f/f8/Prisma-goethe.gif/400px-Prisma-goethe.gif 2x" width="200"></a><span data-dcnode-id="3722" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3718"><div class="magnify" data-dcnode-id="3720"><a class="internal" data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrisma-goethe.gif" title="Enlarge"></a></div><span data-dcnode-id="3719" instrument_node="">Light and dark spectra—when coloured edges overlap in a light spectrum, green results; when they overlap in a dark spectrum, magenta results. (Click for animation)</span></div></div></div><span data-dcnode-id="3715" instrument_node="">
</span><p data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">Since the colour phenomenon relies on the adjacency of light and dark, there are two ways to produce a spectrum: with a light beam in a dark room, and with a dark beam (i.e.,&nbsp;a shadow) in a light room.
</span></p><p data-dcnode-id="3708"><span data-dcnode-id="3712" instrument_node="">Goethe recorded the sequence of colours projected at various distances from a prism for both cases (see Plate&nbsp;IV, </span><i data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">Theory of Colours</span></i><span data-dcnode-id="3709" instrument_node="">). In both cases, he found that the yellow and blue edges remain closest to the side which is light, and red and violet edges remain closest to the side which is dark. At a certain distance, these edges overlap—and we obtain Newton's spectrum. When these edges overlap in a light spectrum, green results; when they overlap in a dark spectrum, magenta results.
</span></p><p data-dcnode-id="3702"><span data-dcnode-id="3707" instrument_node="">With a light spectrum (i.e. a shaft of light in a surrounding darkness), we find yellow-red colours along the top edge, and blue-violet colours along the bottom edge. The spectrum with green in the middle arises only where the blue-violet edges overlap the yellow-red edges. Unfortunately an optical mixture of blue and yellow gives white, not green, and so Goethe's explanation of Newton's spectrum fails.</span><sup class="reference" data-dcnode-id="3704" id="cite_ref-22"><a data-dcnode-id="3705" href="#cite_note-22"><span data-dcnode-id="3706" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3703" instrument_node="">
</span></p><p data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">With a dark spectrum (i.e., a shadow surrounded by light), we find violet-blue along the top edge, and red-yellow along the bottom edge—and where these edges overlap, we find (extraspectral) magenta.
</span></p><p data-dcnode-id="3695"><span data-dcnode-id="3699" instrument_node="">Olaf Müller presented the matter in the following way, "According to Newton, all spectral colors are contained in white sunlight, according to Goethe, the opposite can be said — that all colors of the complementary spectrum are contained in the dark." </span><a class="external autonumber" data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//translate.google.com/translate%3Fhl%3Den%26sl%3Dde%26tl%3Den%26u%3Dhttps%253A%252F%252Fwww.zeit.de%252F2010%252F20%252FFarbenlehre%252Fkomplettansicht%26anno%3D2%26sandbox%3D1" rel="nofollow"><span data-dcnode-id="3698" instrument_node="">[1]</span></a><span data-dcnode-id="3696" instrument_node="">
</span></p><span data-dcnode-id="3694" instrument_node="">
</span><h2 data-dcnode-id="3683"><span data-dcnode-id="3693" id="Goethe.27s_colour_wheel"></span><span class="mw-headline" data-dcnode-id="3691" id="Goethe's_colour_wheel"><span data-dcnode-id="3692" instrument_node="">Goethe's colour wheel</span></span><span class="mw-editsection" data-dcnode-id="3684"><span class="mw-editsection-bracket" data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">[</span></span><a data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D7" title="Edit section: Goethe's colour wheel"><span data-dcnode-id="3688" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3682" instrument_node="">
</span><link data-dcnode-id="3681" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3677" role="note"><span data-dcnode-id="3680" instrument_node="">Further information: </span><a class="mw-redirect" data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colour_wheel" title="Colour wheel"><span data-dcnode-id="3679" instrument_node="">Colour wheel</span></a></div><span data-dcnode-id="3676" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3667"><div class="thumbinner" data-dcnode-id="3668" style="width:252px;"><a class="image" data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGoethe%2C_Farbenkreis_zur_Symbolisierung_des_menschlichen_Geistes-_und_Seelenlebens%2C_1809.jpg"><img alt="" class="thumbimage" data-dcnode-id="3675" data-file-height="913" data-file-width="600" decoding="async" height="380" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/23/Goethe%252C_Farbenkreis_zur_Symbolisierung_des_menschlichen_Geistes-_und_Seelenlebens%252C_1809.jpg/250px-Goethe%252C_Farbenkreis_zur_Symbolisierung_des_menschlichen_Geistes-_und_Seelenlebens%252C_1809.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/23/Goethe%2C_Farbenkreis_zur_Symbolisierung_des_menschlichen_Geistes-_und_Seelenlebens%2C_1809.jpg/375px-Goethe%2C_Farbenkreis_zur_Symbolisierung_des_menschlichen_Geistes-_und_Seelenlebens%2C_1809.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/23/Goethe%2C_Farbenkreis_zur_Symbolisierung_des_menschlichen_Geistes-_und_Seelenlebens%2C_1809.jpg/500px-Goethe%2C_Farbenkreis_zur_Symbolisierung_des_menschlichen_Geistes-_und_Seelenlebens%2C_1809.jpg 2x" width="250"></a><span data-dcnode-id="3673" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3669"><div class="magnify" data-dcnode-id="3671"><a class="internal" data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGoethe%2C_Farbenkreis_zur_Symbolisierung_des_menschlichen_Geistes-_und_Seelenlebens%2C_1809.jpg" title="Enlarge"></a></div><span data-dcnode-id="3670" instrument_node="">Goethe's symmetric colour wheel with associated symbolic qualities (1809)</span></div></div></div><span data-dcnode-id="3666" instrument_node="">
</span><link data-dcnode-id="3665" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3658"><p data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">When the eye sees a colour it is immediately excited and it is its nature, spontaneously and of necessity, at once to produce another, which with the original colour, comprehends the whole chromatic scale. </span></p><div class="templatequotecite" data-dcnode-id="3659"><span data-dcnode-id="3662" instrument_node="">— </span><cite data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">Goethe, Theory of Colours</span></cite></div></blockquote><span data-dcnode-id="3657" instrument_node="">
</span><p data-dcnode-id="3641"><span data-dcnode-id="3656" instrument_node="">Goethe anticipated </span><a data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ewald_Hering" title="Ewald Hering"><span data-dcnode-id="3655" instrument_node="">Ewald Hering</span></a><span data-dcnode-id="3653" instrument_node="">'s </span><a data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opponent_process" title="Opponent process"><span data-dcnode-id="3652" instrument_node="">Opponent process</span></a><span data-dcnode-id="3650" instrument_node=""> theory</span><sup class="reference" data-dcnode-id="3647" id="cite_ref-23"><a data-dcnode-id="3648" href="#cite_note-23"><span data-dcnode-id="3649" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3646" instrument_node=""> by proposing a symmetric colour wheel. He writes, "The chromatic circle... [is] arranged in a general way according to the natural order... for the colours diametrically opposed to each other in this diagram are those which reciprocally evoke each other in the eye. Thus, yellow demands violet; orange [demands] blue; purple [demands] green; and vice versa: thus... all intermediate gradations reciprocally evoke each other; the simpler colour demanding the compound, and vice versa (</span><sup class="reference" data-dcnode-id="3643" id="cite_ref-Physiologische_Farben_24-0"><a data-dcnode-id="3644" href="#cite_note-Physiologische_Farben-24"><span data-dcnode-id="3645" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3642" instrument_node=""> paragraph&nbsp;#50).
</span></p><p data-dcnode-id="3634"><span class="anchor" data-dcnode-id="3640" id="magenta"></span><span data-dcnode-id="3639" instrument_node="">In the same way that light and dark spectra yielded green from the mixture of blue and yellow—Goethe completed his colour wheel by recognising the importance of magenta—"For Newton, only spectral colors could count as fundamental. By contrast, Goethe's more empirical approach led him to recognize the essential role of magenta in a complete color circle, a role that it still has in all modern color systems."</span><sup class="reference" data-dcnode-id="3636" id="cite_ref-Ribe;Steinle_2-1"><a data-dcnode-id="3637" href="#cite_note-Ribe;Steinle-2"><span data-dcnode-id="3638" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3635" instrument_node="">
</span></p><span data-dcnode-id="3633" instrument_node="">
</span><h3 data-dcnode-id="3623"><span class="mw-headline" data-dcnode-id="3631" id="Complementary_colours_and_colours_psychology"><span data-dcnode-id="3632" instrument_node="">Complementary colours and colours psychology</span></span><span class="mw-editsection" data-dcnode-id="3624"><span class="mw-editsection-bracket" data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">[</span></span><a data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D8" title="Edit section: Complementary colours and colours psychology"><span data-dcnode-id="3628" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3622" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3601"><div class="thumbinner" data-dcnode-id="3602" style="width:252px;"><a class="image" data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGoethe_Schiller_Die_Temperamentenrose.jpg"><img alt="" class="thumbimage" data-dcnode-id="3621" data-file-height="954" data-file-width="934" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/82/Goethe_Schiller_Die_Temperamentenrose.jpg/250px-Goethe_Schiller_Die_Temperamentenrose.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/82/Goethe_Schiller_Die_Temperamentenrose.jpg/375px-Goethe_Schiller_Die_Temperamentenrose.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/82/Goethe_Schiller_Die_Temperamentenrose.jpg/500px-Goethe_Schiller_Die_Temperamentenrose.jpg 2x" width="250"></a><span data-dcnode-id="3619" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3603"><div class="magnify" data-dcnode-id="3617"><a class="internal" data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGoethe_Schiller_Die_Temperamentenrose.jpg" title="Enlarge"></a></div><span data-dcnode-id="3616" instrument_node="">The "rose of temperaments" (</span><i data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Temperamentenrose</span></i><span data-dcnode-id="3613" instrument_node="">), an earlier study (1798/9) by Goethe and </span><a class="mw-redirect" data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schiller" title="Schiller"><span data-dcnode-id="3612" instrument_node="">Schiller</span></a><span data-dcnode-id="3610" instrument_node="">, matching twelve colours to human occupations or their character traits (</span><i data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">tyrants, heroes, adventurers, hedonists, lovers, poets, public speakers, historians, teachers, philosophers, pedants, rulers</span></i><span data-dcnode-id="3607" instrument_node="">), grouped in the </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_temperaments" title="Four temperaments"><span data-dcnode-id="3606" instrument_node="">four temperaments</span></a><span data-dcnode-id="3604" instrument_node="">.</span></div></div></div><span data-dcnode-id="3600" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3599" instrument_node="">Goethe also included aesthetic qualities in his colour wheel, under the title of "allegorical, symbolic, mystic use of colour" (</span><i data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">Allegorischer, symbolischer, mystischer Gebrauch der Farbe</span></i><span data-dcnode-id="3596" instrument_node="">), establishing a kind of </span><a data-dcnode-id="3594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_psychology" title="Color psychology"><span data-dcnode-id="3595" instrument_node="">color psychology</span></a><span data-dcnode-id="3593" instrument_node="">.
He associated red with the "beautiful", orange with the "noble", yellow to the "good", green to the "useful", blue to the "common", and violet to the "unnecessary".
These six qualities were assigned to four categories of human cognition, the rational (</span><i data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Vernunft</span></i><span data-dcnode-id="3590" instrument_node="">) to the beautiful and the noble (red and orange), the intellectual (</span><i data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">Verstand</span></i><span data-dcnode-id="3587" instrument_node="">) to the good and the useful (yellow and green), the sensual (</span><i data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">Sinnlichkeit</span></i><span data-dcnode-id="3584" instrument_node="">) to the useful and the common (green and blue) and, closing the circle, imagination (</span><i data-dcnode-id="3582"><span data-dcnode-id="3583" instrument_node="">Phantasie</span></i><span data-dcnode-id="3581" instrument_node="">) to both the unnecessary and the beautiful (purple and red).</span><sup class="reference" data-dcnode-id="3578" id="cite_ref-25"><a data-dcnode-id="3579" href="#cite_note-25"><span data-dcnode-id="3580" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3577" instrument_node="">
</span></p><span data-dcnode-id="3575" instrument_node="">
</span><h4 data-dcnode-id="3565"><span class="mw-headline" data-dcnode-id="3573" id="Notes_on_translation"><span data-dcnode-id="3574" instrument_node="">Notes on translation</span></span><span class="mw-editsection" data-dcnode-id="3566"><span class="mw-editsection-bracket" data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">[</span></span><a data-dcnode-id="3569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D9" title="Edit section: Notes on translation"><span data-dcnode-id="3570" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3564" instrument_node="">
</span><p data-dcnode-id="3554"><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magenta" title="Magenta"><span data-dcnode-id="3563" instrument_node="">Magenta</span></a><span data-dcnode-id="3561" instrument_node=""> appeared as a colour term only in the mid-nineteenth&nbsp;century, after Goethe. Hence, references to Goethe's recognition of </span><i data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">magenta</span></i><span data-dcnode-id="3558" instrument_node=""> are fraught with interpretation. If one observes the colours coming out of a prism—an English person may be more inclined to describe as magenta what in German is called </span><i data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">Purpur</span></i><span data-dcnode-id="3555" instrument_node="">—so one may not lose the intention of the author.
</span></p><p data-dcnode-id="3543"><span data-dcnode-id="3553" instrument_node="">However, literal translation is more difficult. Goethe's work uses two composite words for </span><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_mixing" title="Color mixing"><span data-dcnode-id="3552" instrument_node="">mixed</span></a><span data-dcnode-id="3550" instrument_node=""> (intermediate) </span><a data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hue" title="Hue"><span data-dcnode-id="3549" instrument_node="">hues</span></a><span data-dcnode-id="3547" instrument_node=""> along with corresponding usual </span><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_term" title="Color term"><span data-dcnode-id="3546" instrument_node="">colour terms</span></a><span data-dcnode-id="3544" instrument_node=""> such as "orange" and "violet".

</span><p data-dcnode-id="3333"><span data-dcnode-id="3385" instrument_node="">It is not clear how Goethe's </span><i data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">Rot</span></i><span data-dcnode-id="3382" instrument_node="">, </span><i data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">Purpur</span></i><span data-dcnode-id="3379" instrument_node=""> (explicitly named as the </span><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Complementary_colors" title="Complementary colors"><span data-dcnode-id="3378" instrument_node="">complementary</span></a><span data-dcnode-id="3376" instrument_node=""> to green),</span><sup class="reference" data-dcnode-id="3373" id="cite_ref-Physiologische_Farben_24-1"><a data-dcnode-id="3374" href="#cite_note-Physiologische_Farben-24"><span data-dcnode-id="3375" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3372" instrument_node=""> and </span><i data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">Schön</span></i><span data-dcnode-id="3369" instrument_node=""> (one of the six colour sectors) are related between themselves and to the red tip of the </span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visible_spectrum" title="Visible spectrum"><span data-dcnode-id="3368" instrument_node="">visible spectrum</span></a><span data-dcnode-id="3366" instrument_node="">. The text about </span><a class="mw-redirect" data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interference_%28light%29" title="Interference (light)"><span data-dcnode-id="3365" instrument_node="">interference</span></a><span data-dcnode-id="3363" instrument_node=""> from the "physical" chapter</span><sup class="reference" data-dcnode-id="3360" id="cite_ref-Epoptische_Farben_26-0"><a data-dcnode-id="3361" href="#cite_note-Epoptische_Farben-26"><span data-dcnode-id="3362" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3359" instrument_node=""> does not consider </span><i data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">Rot</span></i><span data-dcnode-id="3356" instrument_node=""> and </span><i data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Purpur</span></i><span data-dcnode-id="3353" instrument_node=""> synonymous. Also, </span><i data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">Purpur</span></i><span data-dcnode-id="3350" instrument_node=""> is certainly distinct from </span><i data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">Blaurot</span></i><span data-dcnode-id="3347" instrument_node="">, because </span><i data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">Purpur</span></i><span data-dcnode-id="3344" instrument_node=""> is named as a colour which lies somewhere between </span><i data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Blaurot</span></i><span data-dcnode-id="3341" instrument_node=""> and </span><i data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Gelbrot</span></i><span data-dcnode-id="3338" instrument_node=""> (,</span><sup class="reference" data-dcnode-id="3335" id="cite_ref-Epoptische_Farben_26-1"><a data-dcnode-id="3336" href="#cite_note-Epoptische_Farben-26"><span data-dcnode-id="3337" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3334" instrument_node=""> paragraph&nbsp;476), although possibly not adjacent to the latter. This article uses the English translations from the above table.
</span></p><span data-dcnode-id="3332" instrument_node="">
</span><h2 data-dcnode-id="3322"><span class="mw-headline" data-dcnode-id="3330" id="Newton_and_Goethe"><span data-dcnode-id="3331" instrument_node="">Newton and Goethe</span></span><span class="mw-editsection" data-dcnode-id="3323"><span class="mw-editsection-bracket" data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">[</span></span><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheory_of_Colours%26action%3Dedit%26section%3D10" title="Edit section: Newton and Goethe"><span data-dcnode-id="3327" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3315"><span data-dcnode-id="3320" instrument_node="">Ernst Lehrs writes, "In point of fact, the essential difference between Goethe’s theory of colour and the theory which has prevailed in science (despite all modifications) since Newton’s day, lies in this: While the theory of Newton and his successors was based on excluding the colour-seeing faculty of the eye, Goethe founded his theory on the eye’s experience of colour."</span><sup class="reference" data-dcnode-id="3317" id="cite_ref-27"><a data-dcnode-id="3318" href="#cite_note-27"><span data-dcnode-id="3319" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3316" instrument_node="">
</span></p><p data-dcnode-id="3306"><span data-dcnode-id="3314" instrument_node="">"The renouncing of life and immediacy, which was the premise for the progress of natural science since Newton, formed the real basis for the bitter struggle which Goethe waged against the physical optics of Newton. It would be superficial to dismiss this struggle as unimportant: there is much significance in one of the most outstanding men directing all his efforts to fighting against the development of Newtonian optics." (</span><a data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Werner_Heisenberg" title="Werner Heisenberg"><span data-dcnode-id="3313" instrument_node="">Werner Heisenberg</span></a><span data-dcnode-id="3311" instrument_node="">, during a speech celebrating Goethe's birthday)</span><sup class="reference" data-dcnode-id="3308" id="cite_ref-28"><a data-dcnode-id="3309" href="#cite_note-28"><span data-dcnode-id="3310" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3307" instrument_node="">
</span></p><p data-dcnode-id="3300"><span data-dcnode-id="3305" instrument_node="">Due to their different approaches to a common subject, many misunderstandings have arisen between Newton's mathematical understanding of optics, and Goethe's experiential approach.</span><sup class="reference" data-dcnode-id="3302" id="cite_ref-Stephenson_29-0"><a data-dcnode-id="3303" href="#cite_note-Stephenson-29"><span data-dcnode-id="3304" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3301" instrument_node="">
</span></p><p data-dcnode-id="3295"><span data-dcnode-id="3299" instrument_node="">Because </span><a data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaac_Newton" title="Isaac Newton"><span data-dcnode-id="3298" instrument_node="">Newton</span></a><span data-dcnode-id="3296" instrument_node=""> understands white light to be composed of individual colours, and Goethe sees colour arising from the interaction of light and dark, they come to different conclusions on the question: is the optical spectrum a primary or a compound phenomenon?
</span></p><p data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">For Newton, the prism is immaterial to the existence of colour, as all the colours already exist in white light, and the prism merely fans them out according to their refrangibility. Goethe sought to show that, as a turbid medium, the prism was an integral factor in the arising of colour.
</span></p><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Whereas Newton narrowed the beam of light in order to isolate the phenomenon, Goethe observed that with a wider aperture, there was no spectrum. He saw only reddish-yellow edges and blue-cyan edges with white between them, and the spectrum arose only where these edges came close enough to overlap. For him, the spectrum could be explained by the simpler phenomena of colour arising from the interaction of light and dark edges.
</span></p><p data-dcnode-id="3281"><span data-dcnode-id="3290" instrument_node="">Newton explains the appearance of white with colored edges by saying that due to the differing overall amount of refraction, the rays mix together to create a full white towards the centre, whereas the edges do not benefit from this full mixture and appear with greater red or blue components. For Newton's account of his experiments, see his </span><i data-dcnode-id="3287"><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opticks" title="Opticks"><span data-dcnode-id="3289" instrument_node="">Opticks</span></a></i><span data-dcnode-id="3286" instrument_node=""> (1704).</span><sup class="reference" data-dcnode-id="3283" id="cite_ref-30"><a data-dcnode-id="3284" href="#cite_note-30"><span data-dcnode-id="3285" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3282" instrument_node="">
</span></p><span data-dcnode-id="3280" instrument_node="">
