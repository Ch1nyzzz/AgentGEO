nt_node="">2.9</span></strong></td><td align="center" colspan="1" data-dcnode-id="2270" rowspan="1"><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">1.9</span></strong></td><td align="center" colspan="1" data-dcnode-id="2268" rowspan="1"><span data-dcnode-id="2269" instrument_node="">4.4</span></td><td align="center" colspan="1" data-dcnode-id="2265" rowspan="1"><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">4.2</span></strong></td><td align="center" colspan="1" data-dcnode-id="2263" rowspan="1"><span data-dcnode-id="2264" instrument_node="">5.2</span></td><td align="center" colspan="1" data-dcnode-id="2261" rowspan="1"><span data-dcnode-id="2262" instrument_node="">3.8</span></td><td align="center" colspan="1" data-dcnode-id="2258" rowspan="1"><strong data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">3.4</span></strong></td></tr><tr data-dcnode-id="2232"><td colspan="1" data-dcnode-id="2253" rowspan="1"><em data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">SD</span></em><span data-dcnode-id="2254" instrument_node=""> (%)</span></td><td align="center" colspan="1" data-dcnode-id="2251" rowspan="1"><span data-dcnode-id="2252" instrument_node="">4.4</span></td><td align="center" colspan="1" data-dcnode-id="2248" rowspan="1"><strong data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">2.5</span></strong></td><td align="center" colspan="1" data-dcnode-id="2245" rowspan="1"><strong data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">1.6</span></strong></td><td align="center" colspan="1" data-dcnode-id="2243" rowspan="1"><span data-dcnode-id="2244" instrument_node="">3.1</span></td><td align="center" colspan="1" data-dcnode-id="2240" rowspan="1"><strong data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">4.5</span></strong></td><td align="center" colspan="1" data-dcnode-id="2238" rowspan="1"><span data-dcnode-id="2239" instrument_node="">3.6</span></td><td align="center" colspan="1" data-dcnode-id="2236" rowspan="1"><span data-dcnode-id="2237" instrument_node="">3.5</span></td><td align="center" colspan="1" data-dcnode-id="2233" rowspan="1"><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">2.0</span></strong></td></tr><tr data-dcnode-id="2209"><td colspan="1" data-dcnode-id="2230" rowspan="1"><span data-dcnode-id="2231" instrument_node="">Ratings</span></td><td align="center" colspan="1" data-dcnode-id="2228" rowspan="1"><span data-dcnode-id="2229" instrument_node="">−1.9</span></td><td align="center" colspan="1" data-dcnode-id="2225" rowspan="1"><strong data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">1.3</span></strong></td><td align="center" colspan="1" data-dcnode-id="2222" rowspan="1"><strong data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">1.7</span></strong></td><td align="center" colspan="1" data-dcnode-id="2220" rowspan="1"><span data-dcnode-id="2221" instrument_node="">−0.1</span></td><td align="center" colspan="1" data-dcnode-id="2217" rowspan="1"><strong data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">−0.5</span></strong></td><td align="center" colspan="1" data-dcnode-id="2215" rowspan="1"><span data-dcnode-id="2216" instrument_node="">1.3</span></td><td align="center" colspan="1" data-dcnode-id="2213" rowspan="1"><span data-dcnode-id="2214" instrument_node="">1.4</span></td><td align="center" colspan="1" data-dcnode-id="2210" rowspan="1"><strong data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">0.8</span></strong></td></tr><tr data-dcnode-id="2185"><td colspan="1" data-dcnode-id="2206" rowspan="1"><em data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">SD</span></em></td><td align="center" colspan="1" data-dcnode-id="2204" rowspan="1"><span data-dcnode-id="2205" instrument_node="">1.0</span></td><td align="center" colspan="1" data-dcnode-id="2201" rowspan="1"><strong data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">1.1</span></strong></td><td align="center" colspan="1" data-dcnode-id="2198" rowspan="1"><strong data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">0.6</span></strong></td><td align="center" colspan="1" data-dcnode-id="2196" rowspan="1"><span data-dcnode-id="2197" instrument_node="">1.1</span></td><td align="center" colspan="1" data-dcnode-id="2193" rowspan="1"><strong data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">1.4</span></strong></td><td align="center" colspan="1" data-dcnode-id="2191" rowspan="1"><span data-dcnode-id="2192" instrument_node="">1.2</span></td><td align="center" colspan="1" data-dcnode-id="2189" rowspan="1"><span data-dcnode-id="2190" instrument_node="">1.3</span></td><td align="center" colspan="1" data-dcnode-id="2186" rowspan="1"><strong data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">1.2</span></strong></td></tr></tbody></table></div><div class="largeobj-link align_right" data-dcnode-id="2179" id="largeobj_idm140527507653312"><a data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/table/tbl1/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="2181" instrument_node="">Open in a separate window</span></a></div><div class="tblwrap-foot" data-dcnode-id="2175"><div data-dcnode-id="2176" id="fn-2"><p class="p p-first-last" data-dcnode-id="2177" id="__p45"><span data-dcnode-id="2178" instrument_node="">Bold numbers indicate compatible responses.</span></p></div></div></div><p class="p p-last" data-dcnode-id="2134" id="__p24"><span data-dcnode-id="2173" instrument_node="">Error rates were analyzed with the same ANOVA model. There was a main effect for Observed Action (</span><em data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">F</span></em><span data-dcnode-id="2170" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;8.4, </span><em data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">p</span></em><span data-dcnode-id="2167" instrument_node="">&nbsp;=&nbsp;.007), that was further qualified by an interaction of Observed Action and Person (</span><em data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">F</span></em><span data-dcnode-id="2164" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;7.2, </span><em data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">p</span></em><span data-dcnode-id="2161" instrument_node="">&nbsp;=&nbsp;.011). The persons were more easily identified in the academic scenes than the sporty scenes, and this advantage was particularly found for the identification of George. The critical three-way interaction of Observed Action, Person, and Compatibility was again significant (</span><em data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">F</span></em><span data-dcnode-id="2158" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;18.8, </span><em data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">p</span></em><span data-dcnode-id="2155" instrument_node="">&nbsp;=&nbsp;.0001). Again, the dependency on spatial compatibility was present for both sporty (</span><em data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">F</span></em><span data-dcnode-id="2152" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;9.1, </span><em data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">p</span></em><span data-dcnode-id="2149" instrument_node="">&nbsp;=&nbsp;.005) and academic scenes (</span><em data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">F</span></em><span data-dcnode-id="2146" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;6.0, </span><em data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">p</span></em><span data-dcnode-id="2143" instrument_node="">&nbsp;=&nbsp;.021). Thus, in both scenes, the participants made fewer errors when identifying the person for which response side and head location were compatible (see </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig2" data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig2/" rid-figpopup="fig2" rid-ob="ob-fig2" target="figure"><span data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Fig. 2</span></span></a><span data-dcnode-id="2139" instrument_node="">, middle panel, and </span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/table/tbl1/" rid-figpopup="tbl1" rid-ob="ob-tbl1" target="table"><span data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Table 1</span></span></a><span data-dcnode-id="2135" instrument_node="">).</span></p></div><div class="sec" data-dcnode-id="2072" id="__sec8"><p data-dcnode-id="2132"></p><h4 class="inline" data-dcnode-id="2130" id="__sec8title"><span data-dcnode-id="2131" instrument_node="">Personal-trait judgments </span></h4><p class="p p-first" data-dcnode-id="2101" id="__p25"><span data-dcnode-id="2129" instrument_node="">As in the RTs and Error rates, the rating data were entered into a repeated measures ANOVA with the within-subjects factors Trait (sporty/academic) and Person (John/George) and the between-subjects factor Compatibility (whether John is spatially compatible when typing and George when kicking, or vice versa). The results mirrored the original study (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2127" href="#bib3" id="__tag_475526259" rid="bib3" role="button"><span data-dcnode-id="2128" instrument_node="">Bach &amp; Tipper, 2007</span></a><span data-dcnode-id="2126" instrument_node="">). Main effects of Trait (</span><em data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">F</span></em><span data-dcnode-id="2123" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;21.0, </span><em data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">p</span></em><span data-dcnode-id="2120" instrument_node="">&nbsp;&lt;&nbsp;.0001) and Person (</span><em data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">F</span></em><span data-dcnode-id="2117" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;25.6, </span><em data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">p</span></em><span data-dcnode-id="2114" instrument_node="">&nbsp;&lt;&nbsp;.0001) reflected that overall, the persons were judged more academic than sporty, and that John received higher ratings than George. There was also a Person by Trait interaction (</span><em data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">F</span></em><span data-dcnode-id="2111" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;46.8, </span><em data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">p</span></em><span data-dcnode-id="2108" instrument_node="">&nbsp;&lt;&nbsp;.0001) indicating that the two persons were rated differently on the two traits: John was judged sportier than George (</span><em data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">p</span></em><span data-dcnode-id="2105" instrument_node="">&nbsp;&lt;&nbsp;.0001), but George appeared more academic (</span><em data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">p</span></em><span data-dcnode-id="2102" instrument_node="">&nbsp;&lt;&nbsp;.0005).</span></p><p class="p p-last" data-dcnode-id="2073" id="__p26"><span data-dcnode-id="2100" instrument_node="">Most importantly, as in the RTs and Error rates, there was a three-way interaction of Person, Action, and Compatibility (</span><em data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">F</span></em><span data-dcnode-id="2097" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;6.8, </span><em data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">p</span></em><span data-dcnode-id="2094" instrument_node="">&nbsp;&lt;&nbsp;.014). Thus, the attribution of personal traits to the two persons depended on which person was identified with a spatially compatible response while typing, and which person was identified with a compatible response while kicking. Two-way ANOVAs showed again that this dependency on compatible responses was present for both academic (</span><em data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">F</span></em><span data-dcnode-id="2091" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;4.4, </span><em data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">p</span></em><span data-dcnode-id="2088" instrument_node="">&nbsp;=&nbsp;.044) and sporty judgments (</span><em data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">F</span></em><span data-dcnode-id="2085" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;6.4, </span><em data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">p</span></em><span data-dcnode-id="2082" instrument_node="">&nbsp;=&nbsp;.017). Although George was generally seen to be more academic than John, this difference was reduced when John was identified with a compatible response while typing. Conversely, although John was generally perceived sportier than George, this difference was reduced when George was identified with a compatible response while kicking. </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig2" data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig2/" rid-figpopup="fig2" rid-ob="ob-fig2" target="figure"><span data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Fig. 2</span></span></a><span data-dcnode-id="2078" instrument_node="">, lower panel, shows the rating data collapsed across John and George, and </span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="2075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/table/tbl1/" rid-figpopup="tbl1" rid-ob="ob-tbl1" target="table"><span data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Table 1</span></span></a><span data-dcnode-id="2074" instrument_node=""> shows the data in all conditions.</span></p></div><div class="sec sec-last" data-dcnode-id="2008" id="__sec9"><p data-dcnode-id="2071"></p><h4 class="inline" data-dcnode-id="2069" id="__sec9title"><span data-dcnode-id="2070" instrument_node="">Mediational analysis </span></h4><p class="p p-first" data-dcnode-id="2067" id="__p27"><span data-dcnode-id="2068" instrument_node="">As a last step of our analysis, we performed a mediation analysis to investigate whether our spatial compatibility manipulation affected trait judgment directly or by inducing changes in response fluency during person identification. To this end, we derived single measures for (a) the spatial compatibility manipulation, (b) the resulting compatibility effects in the RTs and Error rates, and (c) the compatibility effects in the personal trait judgments. The measure for the spatial compatibility manipulation was derived by setting the value to 1 for the participants for whom George was compatible when typing and John when kicking, and to −1 for the participants with the reverse assignment. The measure for the compatibility effects in RTs, Error rates and trait judgments were calculated by subtracting the mean of the sporty John and academic George responses from the mean of academic John and sporty George responses. The first group of participants should therefore show positive compatibility effects, whereas the second group should show negative effects.</span></p><p data-dcnode-id="2035" id="__p28"><span data-dcnode-id="2066" instrument_node="">Correlational analyses revealed first that, as shown in the main analysis, spatial compatibility was correlated with trait judgments effects (</span><em data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">r</span></em><span data-dcnode-id="2063" instrument_node="">&nbsp;=&nbsp;.43, </span><em data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">p</span></em><span data-dcnode-id="2060" instrument_node="">&nbsp;=&nbsp;.014) and with the fluency effects in the identification task (RTs, </span><em data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">r</span></em><span data-dcnode-id="2057" instrument_node="">&nbsp;=&nbsp;.64, </span><em data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">p</span></em><span data-dcnode-id="2054" instrument_node="">&nbsp;&lt;&nbsp;.001; Errors, </span><em data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">r</span></em><span data-dcnode-id="2051" instrument_node="">&nbsp;=&nbsp;.62, </span><em data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">p</span></em><span data-dcnode-id="2048" instrument_node="">&nbsp;&lt;&nbsp;.001). Consistent with our mediational hypothesis, the fluency effects in the identification task were in turn positively correlated with subsequent trait judgment effects, though this relationship was only significant for the Error rates (</span><em data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">r</span></em><span data-dcnode-id="2045" instrument_node="">&nbsp;=&nbsp;.45, </span><em data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">p</span></em><span data-dcnode-id="2042" instrument_node="">&nbsp;=&nbsp;.01) but not for the RTs (</span><em data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">r</span></em><span data-dcnode-id="2039" instrument_node="">&nbsp;=&nbsp;.22, </span><em data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">p</span></em><span data-dcnode-id="2036" instrument_node="">&nbsp;=&nbsp;.23).</span></p><p class="p p-last" data-dcnode-id="2009" id="__p29"><span data-dcnode-id="2034" instrument_node="">The critical test for mediation is whether controlling for the effects of the mediator variables (i.e., the fluency effects) significantly reduces the relationship between spatial compatibility and trait judgments (i.e., the Sobel test; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2032" href="#bib35" rid="bib35" role="button"><span data-dcnode-id="2033" instrument_node="">Sobel, 1982</span></a><span data-dcnode-id="2031" instrument_node="">; for a review see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2029" href="#bib26" id="__tag_475526251" rid="bib26" role="button"><span data-dcnode-id="2030" instrument_node="">Preacher &amp; Hayes, 2004</span></a><span data-dcnode-id="2028" instrument_node="">). The data were therefore entered into a multiple mediator regression analysis (for details, see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2026" href="#bib25" id="__tag_475526252" rid="bib25" role="button"><span data-dcnode-id="2027" instrument_node="">Preacher &amp; Hayes, in review</span></a><span data-dcnode-id="2025" instrument_node="">) that uses the fluency effects in both RTs and Error rates as potential mediator variables, so that the unique effect of each variable could be captured while the other variable was controlled (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2023" href="#bib25" rid="bib25" role="button"><span data-dcnode-id="2024" instrument_node="">Preacher &amp; Hayes, in review; Shrout &amp; Bolger, 2002</span></a><span data-dcnode-id="2022" instrument_node="">). This analysis indeed revealed a marginally significant mediation effect for the fluency effect in the Error rates (</span><em data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">z</span></em><span data-dcnode-id="2019" instrument_node="">&nbsp;=&nbsp;1.9; </span><em data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">p</span></em><span data-dcnode-id="2016" instrument_node="">&nbsp;&lt;&nbsp;.07), but not for the effect in RTs (</span><em data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">z</span></em><span data-dcnode-id="2013" instrument_node="">&nbsp;=&nbsp;−1.4; </span><em data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">p</span></em><span data-dcnode-id="2010" instrument_node="">&nbsp;=&nbsp;.17). Thus, the mediational analysis confirms that our spatial compatibility manipulation affected trait judgments not directly, but at least partially by inducing fluency effects in the Error rates during person identification.</span></p></div></div></div><div class="tsec sec" data-dcnode-id="1934" id="__sec10"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2003"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2004" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2005" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="2001" id="__sec10title"><span data-dcnode-id="2002" instrument_node="">Discussion</span></h2><p class="p p-first" data-dcnode-id="1993" id="__p30"><span data-dcnode-id="2000" instrument_node="">The present study replicated the vision-action personality effect demonstrated by </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1998" href="#bib3" id="__tag_475526245" rid="bib3" role="button"><span data-dcnode-id="1999" instrument_node="">Bach and Tipper (2007)</span></a><span data-dcnode-id="1997" instrument_node="">. As in the previous study, the actions of the observer influenced which personal traits she attributed to individuals she watched at the same time. As such, social perception appears to be at least partially grounded in the system that we use to perform and to represent the outcomes of our own actions (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="1995" href="#bib3" rid="bib3" role="button"><span data-dcnode-id="1996" instrument_node="">Bach &amp; Tipper, 2007; Niedenthal et al., 2005</span></a><span data-dcnode-id="1994" instrument_node="">).</span></p><p data-dcnode-id="1991" id="__p31"><span data-dcnode-id="1992" instrument_node="">Our new results also provide insights into the level of action representation at which the effects occurred. They point towards a misattribution of high-level appraisals of one’s own actions to the actions of others. We manipulated the fluency of the participants’ responses by varying the spatial compatibility of the response keys (left/right) and the position of the actor’s face in the scenes (left/right). These variations in response fluency were sufficient to influence personal trait judgments. Actors were judged sportier when they were identified more fluently while performing the sporty action. They were judged more academic when they were more fluently identified while performing the academic action.</span></p><p data-dcnode-id="1986" id="__p32"><span data-dcnode-id="1990" instrument_node="">The critical role of fluency in affecting personal trait judgments was further confirmed by a mediational analysis. It showed that our spatial compatibility manipulation did not influence subsequent personal trait judgments directly, but specifically because it evoked changes in the fluency of the responses. As in the previous study (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1988" href="#bib3" id="__tag_475526243" rid="bib3" role="button"><span data-dcnode-id="1989" instrument_node="">Bach &amp; Tipper, 2007</span></a><span data-dcnode-id="1987" instrument_node="">), this relationship between fluent responses and subsequent trait judgment effects was specifically found for the Error rates, for which fluency changes were very salient due to error feedback, but not for the more subtle changes in response speed.</span></p><p data-dcnode-id="1981" id="__p33"><span data-dcnode-id="1985" instrument_node="">These observations are not consistent with our prior assumption (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1983" href="#bib3" id="__tag_475526237" rid="bib3" role="button"><span data-dcnode-id="1984" instrument_node="">Bach &amp; Tipper, 2007</span></a><span data-dcnode-id="1982" instrument_node="">). We had assumed that the judgment effects occurred because observed and self-produced motor acts converged on the same representations in the so-called ‘mirror’ areas of the brain. One person might, for instance, have appeared sportier because the representation of his kicking action was enhanced if the observer performed a (similar) foot action, and disrupted if he performed a (dissimilar) hand action. Although such a process could take place, it cannot explain the present results. Personal trait judgment effects were evoked even though there was no differential amount of similarly between the participants’ left and right responses and the sporty and academic actions. Our new results therefore indicate that the effects occurred on a higher level of action representation, reflecting a misattribution of appraisals of the observer’s own actions to the actions of others. In particular, they indicate that fluency appraisals of the observer’s own actions might become misattributed to the actions of others and affect how they are perceived.</span></p><p data-dcnode-id="1976" id="__p34"><span data-dcnode-id="1980" instrument_node="">Similar effects of fluency on judgments have been observed before. A robust finding is that stimuli that are more fluently identified also appear more aesthetically pleasing (for a review, see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1978" href="#bib28" id="__tag_475526235" rid="bib28" role="button"><span data-dcnode-id="1979" instrument_node="">Reber, Schwarz, &amp; Winkielman, 2004</span></a><span data-dcnode-id="1977" instrument_node="">). However, our results go beyond these findings in several respects. First, whereas in previous studies fluency was a consequence of the perceptual properties of the viewed stimuli such as contrast or presentation time, it was now manipulated by affecting the overt motor behavior of the participants (i.e., the speed and accuracy of their identification responses). Second, previously observed changes in attitude to objects were typically very general, affecting global attributes such as liking or beauty. In contrast, the present manipulation induced specific changes in attitude and enhanced certain traits of the observed persons but not others (i.e., a person appears more sporty but less academic, or vice versa). And third, to our knowledge, this is the first study that used a motor fluency manipulation to successfully induce changes in the attitude towards other people, as opposed to abstract stimuli or objects.</span></p><p data-dcnode-id="1968" id="__p35"><span data-dcnode-id="1975" instrument_node="">Our new findings may serve to link current ideas from social psychology to research on clinical populations. A failure to differentiate self from other is increasingly recognized as a hallmark of various clinical syndromes. For instance, autistic individuals exhibit a number of behaviors that suggest a failure to distinguish self and other, such as echolalia and echopraxia, difficulties in theory of mind tasks, and the confusion of the pronouns “I” and “You” (cf. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="1973" href="#bib29" rid="bib29" role="button"><span data-dcnode-id="1974" instrument_node="">Rogers &amp; Pennington, 1991; Russell &amp; Jarrold, 1999</span></a><span data-dcnode-id="1972" instrument_node="">). Similarly, in schizophrenia the inner speech of the sufferers might become misattributed to other, often malevolent, individuals (cf. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1970" href="#bib12" id="__tag_475526250" rid="bib12" role="button"><span data-dcnode-id="1971" instrument_node="">Frith, Rees, &amp; Friston, 1998</span></a><span data-dcnode-id="1969" instrument_node="">). Our study shows that such misattributions are not restricted to clinical populations but also take place in the general population, though of course to a less extreme extent.</span></p><p data-dcnode-id="1960" id="__p36"><span data-dcnode-id="1967" instrument_node="">The differences between our study and previous reports of fluency affecting stimulus judgments also raise the question about which mechanism drives the effect, and about exactly what becomes misattributed. Prior research on fluency suggests that the effects occur on the level of affective responses (for a review, see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1965" href="#bib28" id="__tag_475526244" rid="bib28" role="button"><span data-dcnode-id="1966" instrument_node="">Reber et al., 2004</span></a><span data-dcnode-id="1964" instrument_node="">). For instance, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1962" href="#bib22" id="__tag_475526258" rid="bib22" role="button"><span data-dcnode-id="1963" instrument_node="">Monahan, Murphy, and Zajonc (2000)</span></a><span data-dcnode-id="1961" instrument_node=""> showed that presenting stimuli repeatedly leads to a general enhancement of positive affect that, in turn, can affect the judgment of even unrelated stimuli. Similarly, the fluent identification of one individual (e.g., John) in one of the situations (e.g., sporty) might have evoked positive affective responses, which in turn influenced how the individuals were perceived. It could therefore be that affective responses are at the core of a general mechanism that affects appraisal processes, influencing judgments of one’s own actions, the actions of others, and even of non-animate objects in the environment.</span></p><p data-dcnode-id="1949" id="__p37"><span data-dcnode-id="1959" instrument_node="">A second possibility is that the personal trait judgment effects reflect the misattribution of the fluency experiences themselves, regardless of affective consequences of the fluent responses. This idea relies on the assumption that people constantly evaluate their own actions and that these evaluations can ‘spill over’ to the actions of others, thereby affecting trait attributions based on these actions. Judgment effects that originate from evaluations of the observer’s own actions are not unknown in social psychology. Higgins has introduced the notion of ‘value from fit’ (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1957" href="#bib16" id="__tag_475526242" rid="bib16" role="button"><span data-dcnode-id="1958" instrument_node="">Higgins, 2000</span></a><span data-dcnode-id="1956" instrument_node="">). If an action is appropriate to an internal state, this creates a feeling of ‘rightness’ that can transfer to unrelated stimuli and make them appear more valuable. Interestingly, this effect has been shown to be independent of mediating affective factors (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1954" href="#bib17" id="__tag_475526256" rid="bib17" role="button"><span data-dcnode-id="1955" instrument_node="">Higgins, Idson, Freitas, Spiegel, &amp; Molden, 2003</span></a><span data-dcnode-id="1953" instrument_node="">). We propose that the fluency experiences evoked by spatially compatible responses might similarly be transferred to the observed individuals and let </span><em data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">their</span></em><span data-dcnode-id="1950" instrument_node=""> actions appear more fluent.</span></p><p class="p p-last" data-dcnode-id="1935" id="__p38"><span data-dcnode-id="1948" instrument_node="">Recent findings from neuroimaging studies are consistent with such a view. Areas in the anterior cingulate cortex (ACC) have been shown to evaluate the outcome of actions with regard to effort, pain, errors, or the presence of response conflict (for a review, see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1946" href="#bib6" id="__tag_475526248" rid="bib6" role="button"><span data-dcnode-id="1947" instrument_node="">Botvinick et al., 2004</span></a><span data-dcnode-id="1945" instrument_node="">). Intriguingly, it has recently become clear that the ACC has mirror properties, that is, it represents these properties for own and others’ actions alike (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="1943" href="#bib23" rid="bib23" role="button"><span data-dcnode-id="1944" instrument_node="">Morrison et al., 2004; Van Schie et al., 2004; Schuch &amp; Tipper, 2007</span></a><span data-dcnode-id="1942" instrument_node="">). This overlap in the neuronal representations of the </span><em data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">evaluation</span></em><span data-dcnode-id="1939" instrument_node=""> of one’s own and other’s actions, such as effort, errors or conflict, is different from the </span><em data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">specific</span></em><span data-dcnode-id="1936" instrument_node=""> motor processes simulated when observing another’s action, such as whether a hand or foot is used, assumed by the mirror neuron theorists.</span></p></div><div class="tsec sec" data-dcnode-id="1923" id="__sec11"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1931"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1932" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1933" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="1929" id="__sec11title"><span data-dcnode-id="1930" instrument_node="">Conclusions</span></h2><p class="p p-first-last" data-dcnode-id="1924" id="__p39"><span data-dcnode-id="1928" instrument_node="">Humans attribute personal traits to others on the basis of action representations that code for both the observer’s own actions and the actions of others. However, the critical overlap between self and other did not exist on the level of the specific motor acts that were performed. Rather, the present results indicate that the </span><em data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">outcomes or appraisals</span></em><span data-dcnode-id="1925" instrument_node=""> of one’s own actions were misattributed to the actions of others. These findings are consistent with embodied accounts of social perception that do not restrict mirroring to the level of motor representations, but that assume that all aspects of another person’s state can be represented as if they were one’s own, including high level evaluative and affective responses.</span></p></div><div class="tsec sec" data-dcnode-id="1914" id="ack-1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1920"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1921" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1922" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="1918" id="ack-1title"><span data-dcnode-id="1919" instrument_node="">Acknowledgments</span></h2><div class="sec" data-dcnode-id="1915"><p data-dcnode-id="1916" id="__p40"><span data-dcnode-id="1917" instrument_node="">Correspondence concerning this article should be addressed to Patric Bach, Centre for Cognitive Neuroscience, University of Wales, Bangor, Gwynedd, UK. We thank Andy Eichhorn and Conrad Taylor for their help in preparing the stimulus material, and Erin Heerey and India Morrison for feedback on the paper. Electronic mail may be sent to p.bach@bangor.ac.uk. The work was supported by a Wellcome Trust Progamme grant awarded to S.P.T.</span></p></div></div><div class="tsec sec" data-dcnode-id="1896" id="fn-group-1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1911"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1912" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1913" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="1909" id="fn-group-1title"><span data-dcnode-id="1910" instrument_node="">Footnotes</span></h2><div class="fm-sec half_rhythm small" data-dcnode-id="1897"><p class="fn sec" data-dcnode-id="1898" id="fn1"><sup data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">1</span></sup><span data-dcnode-id="1905" instrument_node="">Note that the stimuli also contained actions towards the left or right that could, in principle, produce compatibility effects with the side of the response. However, to perform the identification task, participants had to orient their attention towards the faces of the actors. Since compatibility effects strongly depend on where attention is distributed on the display (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1903" href="#bib2" id="__tag_475526246" rid="bib2" role="button"><span data-dcnode-id="1904" instrument_node="">Bach et al., 2007</span></a><span data-dcnode-id="1902" instrument_node="">), the side of the actors’ head should determine compatibility effects to a stronger extent than the direction of the irrelevant action. Moreover, the direction of the action was always opposite to the side of the individuals’ heads in the displays. Action based compatibility should therefore, if anything, produce the </span><em data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">opposite</span></em><span data-dcnode-id="1899" instrument_node=""> pattern of results (in RTs, Error rates, and ratings) as the spatial compatibility between head location and response keys.</span></p></div></div><div class="tsec sec" data-dcnode-id="1133" id="ref-list-1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1893"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1894" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1895" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="1891" id="ref-list-1title"><span data-dcnode-id="1892" instrument_node="">References</span></h2><div class="ref-list-sec sec" data-dcnode-id="1134" id="reference-list"><div class="ref-cit-blk half_rhythm" data-dcnode-id="1874" id="bib1"><span data-dcnode-id="1890" instrument_node=""> </span><span class="element-citation" data-dcnode-id="1875"><span data-dcnode-id="1889" instrument_node="">Ambady N., Rosenthal R. Thin slices of expressive behavior as predictors of interpersonal consequences: A meta-analysis. </span><span data-dcnode-id="1882"><span class="ref-journal" data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Psychological Bulletin. </span></span><span data-dcnode-id="1886" instrument_node="">1992;</span><span class="ref-vol" data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">111</span></span><span data-dcnode-id="1883" instrument_node="">:256–274.</span></span><span data-dcnode-id="1881" instrument_node=""> </span><span class="nowrap" data-dcnode-id="1876"><span data-dcnode-id="1880" instrument_node="">[</span><a aria-expanded="false" aria-haspopup="true" data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Fjournal%3DPsychological%2BBulletin%26title%3DThin%2Bslices%2Bof%2Bexpressive%2Bbehavior%2Bas%2Bpredictors%2Bof%2Binterpersonal%2Bconsequences%3A%2BA%2Bmeta-analysis%26author%3DN.%2BAmbady%26author%3DR.%2BRosenthal%26volume%3D111%26publication_year%3D1992%26pages%3D256-274%26" ref="reftype=other&amp;article-id=2954360&amp;issue-id=207478&amp;journal-id=445&amp;FROM=Article%7CCitationRef&amp;TO=Content%20Provider%7CLink%7CGoogle%20Scholar" rel="noopener noreferrer" role="button" target="_blank"><span data-dcnode-id="1879" instrument_node="">Google Scholar</span></a><span data-dcnode-id="1877" instrument_node="">]</span></span></span></div><div class="ref-cit-blk half_rhythm" data-dcnode-id="1848" id="bib2"><span data-dcnode-id="1873" instrument_node=""> </span><span class="element-citation" data-dcnode-id="1849"><span data-dcnode-id="1872" instrument_node="">Bach P., Peatfield N., Tipper S.P. Focusing on body sites: The role of spatial attention in action perception. </span><span data-dcnode-id="1865"><span class="ref-journal" data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Experimental Brain Research. </span></span><span data-dcnode-id="1869" instrument_node="">2007;</span><span class="ref-vol" data-dcnode-id=
