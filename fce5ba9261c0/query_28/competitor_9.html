</span><div class="article lit-style content pmc-wm slang-all page-box" data-dcnode-id="468" id="mc"><div class="jig-ncbiinpagenav" data-dcnode-id="1109" data-jigconfig="smoothScroll: false, allHeadingLevels: ['h2'], headingExclude: ':hidden,.nomenu'" id="ui-ncbiinpagenav-1"><div class="fm-sec half_rhythm no_top_margin" data-dcnode-id="2644"><div class="fm-flexbox" data-dcnode-id="2704"><div class="fm-citation" data-dcnode-id="2715"><div class="citation-default" data-dcnode-id="2716"><div class="part1" data-dcnode-id="2724"><span data-dcnode-id="2726" role="menubar"><a aria-expanded="false" aria-haspopup="true" data-dcnode-id="2727" href="#" role="menuitem"><span data-dcnode-id="2728" instrument_node="">J Exp Soc Psychol.</span></a></span><span data-dcnode-id="2725" instrument_node=""> 2008 Jul; 44(4-2): 1082–1090. </span></div><div class="part2" data-dcnode-id="2717"><span data-dcnode-id="2723" instrument_node=""> </span><span class="doi" data-dcnode-id="2718"><span data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">doi:&nbsp;</span></span><a data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jesp.2007.11.005" ref="reftype=other&amp;article-id=2954360&amp;issue-id=207478&amp;journal-id=445&amp;FROM=Article%7CFront%20Matter&amp;TO=Content%20Provider%7CCrosslink%7CDOI" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2720" instrument_node="">10.1016/j.jesp.2007.11.005</span></a></span></div></div></div><div class="fm-ids" data-dcnode-id="2705"><div class="fm-citation-pmcid" data-dcnode-id="2710"><span class="fm-citation-ids-label" data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">PMCID: </span></span><span data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">PMC2954360</span></span></div><div class="fm-citation-pmid" data-dcnode-id="2706"><span data-dcnode-id="2709" instrument_node="">PMID: </span><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/21633518"><span data-dcnode-id="2708" instrument_node="">21633518</span></a></div></div></div><h1 class="content-title" data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Your own actions influence how you perceive other people: A misattribution of action appraisals</span></h1><div class="half_rhythm" data-dcnode-id="2692"><div class="contrib-group fm-author" data-dcnode-id="2694"><a data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/%3Fterm%3DTipper%2520SP%255BAuthor%255D"><span data-dcnode-id="2701" instrument_node="">Steven P. Tipper</span></a><span data-dcnode-id="2699" instrument_node=""> and  </span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/%3Fterm%3DBach%2520P%255BAuthor%255D"><span data-dcnode-id="2698" instrument_node="">Patric Bach</span></a><sup data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">⁎</span></sup></div><div class="contrib-group aff-tip" data-dcnode-id="2693" style="display:none"></div></div><div class="half_rhythm" data-dcnode-id="2651"><div class="togglers fm-copyright-license" data-dcnode-id="2680"><a class="pmctoggle" data-dcnode-id="2690" href="#" rid="idm140527497603584_ai"><span data-dcnode-id="2691" instrument_node="">Author information</span></a><span data-dcnode-id="2689" instrument_node=""> </span><a class="pmctoggle" data-dcnode-id="2687" href="#" rid="idm140527497603584_an"><span data-dcnode-id="2688" instrument_node="">Article notes</span></a><span data-dcnode-id="2686" instrument_node=""> </span><a class="pmctoggle" data-dcnode-id="2684" href="#" rid="idm140527497603584_cpl"><span data-dcnode-id="2685" instrument_node="">Copyright and License information</span></a><span data-dcnode-id="2683" instrument_node=""> </span><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/about/disclaimer/" style="margin-left: 1em"><span data-dcnode-id="2682" instrument_node="">Disclaimer</span></a></div><div class="fm-authors-info hide half_rhythm" data-dcnode-id="2665" id="idm140527497603584_ai" style="display:none"><div class="fm-affl" data-dcnode-id="2678" id="aff-1"><span data-dcnode-id="2679" instrument_node="">Centre for Clinical and Cognitive Neuroscience, University of Wales, Adelaid Brigantia, Penrallt Road, Bangor, Gwynedd LL57 2AS, UK</span></div><div data-dcnode-id="2672"><span class="contrib-email" data-dcnode-id="2674" id="contrib-2"><span data-dcnode-id="2677" instrument_node="">Patric Bach: </span><a class="oemail" data-dcnode-id="2675" data-email="ku.ca.rognab@hcab.p" href="mailto:dev@null"><span data-dcnode-id="2676" instrument_node="">ku.ca.rognab@hcab.p</span></a></span><span data-dcnode-id="2673" instrument_node=""> </span></div><div data-dcnode-id="2666" id="cor1"><sup data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">⁎</span></sup><span data-dcnode-id="2669" instrument_node="">Corresponding author. </span><a class="oemail" data-dcnode-id="2667" data-email="ku.ca.rognab@hcab.p" href="mailto:dev@null"><span data-dcnode-id="2668" instrument_node="">ku.ca.rognab@hcab.p</span></a></div></div><div class="fm-article-notes hide half_rhythm" data-dcnode-id="2662" id="idm140527497603584_an" style="display:none"><div class="fm-pubdate half_rhythm" data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">Received 2007 Feb 27; Revised 2007 Nov 22</span></div></div><div class="permissions half_rhythm hide" data-dcnode-id="2652" id="idm140527497603584_cpl" style="display:none"><div class="fm-copyright half_rhythm" data-dcnode-id="2658"><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/about/copyright/"><span data-dcnode-id="2661" instrument_node="">Copyright</span></a><span data-dcnode-id="2659" instrument_node=""> © 2008 Elsevier Inc.</span></div><div class="license half_rhythm" data-dcnode-id="2653"><span data-dcnode-id="2657" instrument_node="">Open Access under </span><a data-dcnode-id="2655" data-ga-action="click_feat_suppl" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/3.0/" ref="reftype=extlink&amp;article-id=2954360&amp;issue-id=207478&amp;journal-id=445&amp;FROM=Article%7CFront%20Matter&amp;TO=External%7CLink%7CURI" target="_blank"><span data-dcnode-id="2656" instrument_node="">CC BY 3.0</span></a><span data-dcnode-id="2654" instrument_node=""> license</span></div></div></div><div aria-label="Related or updated information about this article." class="links-box whole_rhythm" data-dcnode-id="2645" id="pmclinksbox" role="complementary"><div data-dcnode-id="2646"><span data-dcnode-id="2650" instrument_node="">This article has been </span><a data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/citedby/"><span data-dcnode-id="2649" instrument_node="">cited by</span></a><span data-dcnode-id="2647" instrument_node=""> other articles in PMC.</span></div></div></div><div class="sec" data-dcnode-id="2643"></div><div class="tsec sec" data-dcnode-id="2624" id="abstract-1" lang="en"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2639"><span data-dcnode-id="2640" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2641" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="2642" instrument_node="">Go to:</span></a></span></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="2637" id="abstract-1title"><span data-dcnode-id="2638" instrument_node="">Abstract</span></h2><div data-dcnode-id="2630"><p class="p p-first-last" data-dcnode-id="2631" id="__p1"><span data-dcnode-id="2635" instrument_node="">The attribution of personal traits to other persons depends on the actions the observer performs at the same time (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2633" href="#bib3" id="__tag_475526241" rid="bib3" role="button"><span data-dcnode-id="2634" instrument_node="">Bach &amp; Tipper, 2007</span></a><span data-dcnode-id="2632" instrument_node="">). Here, we show that the effect reflects a misattribution of appraisals of the observers’ own actions to the actions of others. We exploited spatial compatibility effects to manipulate how fluently—how fast and how accurately—participants identified two individuals performing sporty or academic actions. The traits attributed to each person in a subsequent rating task depended on the fluency of participants’ responses in a specific manner. An individual more fluently identified while performing the academic action appeared more academic and less sporty. An individual more fluently identified while performing the sporty action appeared sportier. Thus, social perception is—at least partially—embodied. The ease of our own responses can be misattributed to the actions of others, affecting which personal traits are attributed to them.</span></p></div><div class="sec" data-dcnode-id="2625"><strong class="kwd-title" data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Keywords: </span></strong><span class="kwd-text" data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Social perception, Trait attribution, Fluency, Embodiment, Cingulate cortex, Action observation</span></span></div></div><div class="tsec sec" data-dcnode-id="2534" id="body-1"><h2 class="headless nomenu" data-dcnode-id="2623"></h2><p class="p p-first" data-dcnode-id="2618" id="__p2"><span data-dcnode-id="2622" instrument_node="">Humans constantly attribute personal traits to others. One person may appear intellectual, but not interested in sports, whereas another person may appear more interested in sporting pursuits than intellectual challenges. These attribution processes are quick and automatic (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2620" href="#bib1" rid="bib1" role="button"><span data-dcnode-id="2621" instrument_node="">Ambady &amp; Rosenthal, 1992; Bodenhausen &amp; Macrae, 1998; McNeill &amp; Burton, 2002</span></a><span data-dcnode-id="2619" instrument_node="">) and rely mostly on salient characteristics of the observed individuals: a person may be tall, strong, and fast; he may play for the college football team but is rarely seen in the library.</span></p><p data-dcnode-id="2607" id="__p3"><span data-dcnode-id="2617" instrument_node="">Recently, however, researchers have begun to argue that social perception was not only based on readily apparent third-person information, but also on a process of ‘simulation’. Accordingly, people covertly imitate the bodily states of others (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2615" href="#bib14" rid="bib14" role="button"><span data-dcnode-id="2616" instrument_node="">Gallese, Keysers, &amp; Rizzolatti, 2004; Prinz, 1997; Wilson &amp; Knoblich, 2005</span></a><span data-dcnode-id="2614" instrument_node="">). These embodied person representations could then be used to attribute intentions, emotions, and personal traits to the persons observed. This is possible because people have intimate knowledge about the specific internal states that would generate the bodily states in themselves (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2612" href="#bib4" rid="bib4" role="button"><span data-dcnode-id="2613" instrument_node="">Barsalou, Niedenthal, Barbey, &amp; Ruppert, 2003</span></a><span data-dcnode-id="2611" instrument_node="">; for a critical evaluation see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2609" href="#bib19" id="__tag_475526257" rid="bib19" role="button"><span data-dcnode-id="2610" instrument_node="">Jacob &amp; Jeannerod, 2005</span></a><span data-dcnode-id="2608" instrument_node="">).</span></p><p data-dcnode-id="2590" id="__p4"><span data-dcnode-id="2606" instrument_node="">There is ample evidence that covert imitation takes place in social interactions. Humans non-consciously and non-strategically mimic the people they interact with (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2604" href="#bib8" rid="bib8" role="button"><span data-dcnode-id="2605" instrument_node="">Chartrand &amp; Bargh, 1999; Van Baaren, Holland, Kawakami, &amp; van Knippenberg, 2004</span></a><span data-dcnode-id="2603" instrument_node="">; for a review, see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2601" href="#bib24" id="__tag_475526253" rid="bib24" role="button"><span data-dcnode-id="2602" instrument_node="">Niedenthal, Barsalou, Winkielman, Krauth-Gruber, &amp; Ric, 2005</span></a><span data-dcnode-id="2600" instrument_node="">). Similarly, it is known that observed actions prime similar actions in the observer, even when task irrelevant (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2598" href="#bib2" rid="bib2" role="button"><span data-dcnode-id="2599" instrument_node="">Bach, Peatfield, &amp; Tipper, 2007; Brass, Bekkering, Wohlschläger, &amp; Prinz, 2000</span></a><span data-dcnode-id="2597" instrument_node="">). Analogous results come from neuroimaging techniques. So-called ‘mirror neurons’ have been discovered in the macaque premotor cortex (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2595" href="#bib9" rid="bib9" role="button"><span data-dcnode-id="2596" instrument_node="">DiPellegrino, Fadiga, Fogassi, Gallese, &amp; Rizzolatti, 1992; Gallese, Fadiga, Fogassi, &amp; Rizzolatti, 1996</span></a><span data-dcnode-id="2594" instrument_node="">) that fire both when the monkey performs a particular action and when it observes the action being performed by a conspecific. These findings provided a neuronal foundation of the mimicry effects because they reveal how viewed actions can be matched directly to the actions an observer can produce (for similar data in humans, see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2592" href="#bib15" rid="bib15" role="button"><span data-dcnode-id="2593" instrument_node="">Grèzes, Armony, Rowe, &amp; Passingham, 2003; Iacoboni et al., 1999</span></a><span data-dcnode-id="2591" instrument_node="">).</span></p><p data-dcnode-id="2579" id="__p5"><span data-dcnode-id="2589" instrument_node="">In recent years, however, it has become clear that embodiment effects are not restricted to the representation of the particular motor acts others perform but also involve their attentional, somatosensory, and affective responses. Observers seem to mimic, for instance, other persons’ gaze shifts (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2587" href="#bib11" id="__tag_475526260" rid="bib11" role="button"><span data-dcnode-id="2588" instrument_node="">Frischen, Bayliss, &amp; Tipper, 2007</span></a><span data-dcnode-id="2586" instrument_node="">), the emotional consequences of others’ pain (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2584" href="#bib23" id="__tag_475526240" rid="bib23" role="button"><span data-dcnode-id="2585" instrument_node="">Morrison, Lloyd, Di Pellegrino, &amp; Roberts, 2004</span></a><span data-dcnode-id="2583" instrument_node="">), and even high-level action control processes evoked by the errors others make (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2581" href="#bib31" rid="bib31" role="button"><span data-dcnode-id="2582" instrument_node="">Schuch &amp; Tipper, 2007; Van Schie, Mars, Coles, &amp; Bekkering, 2004</span></a><span data-dcnode-id="2580" instrument_node="">).</span></p><p data-dcnode-id="2571" id="__p6"><span data-dcnode-id="2578" instrument_node="">Even though there is now ample evidence for automatic covert mimicry processes, it remains unknown whether these processes can form the basis of person judgments. A critical test would be to investigate whether changes in the bodily states of the observer can give rise to changes in how other people are perceived. There are studies that demonstrate the ‘projection’ (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2576" href="#bib10" rid="bib10" role="button"><span data-dcnode-id="2577" instrument_node="">Freud, 1915/1953</span></a><span data-dcnode-id="2575" instrument_node="">) of an observer’s traits onto others. For instance, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2573" href="#bib20" id="__tag_475526254" rid="bib20" role="button"><span data-dcnode-id="2574" instrument_node="">Kawada, Oettingen, Gollwitzer, and Bargh (2004)</span></a><span data-dcnode-id="2572" instrument_node=""> showed that traits such as competitiveness and belief in malleable intelligence can become transferred from self to others, even when only held implicitly. However, even though these studies demonstrate that traits of an observer can become misattributed to other persons, they say nothing about whether such misattributions can be evoked directly by an observer’s bodily experiences, as would be predicted if judgments of others were based on a covert imitation of their bodily states.</span></p><p data-dcnode-id="2566" id="__p7"><span data-dcnode-id="2570" instrument_node="">Recently, we have provided evidence for a very specific effect of action on social perception (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2568" href="#bib3" id="__tag_475526249" rid="bib3" role="button"><span data-dcnode-id="2569" instrument_node="">Bach &amp; Tipper, 2007</span></a><span data-dcnode-id="2567" instrument_node="">). We asked participants to identify two actors—‘George’ and ‘John’—by responding with either their finger or their foot. Both actors were shown engaging in the sporty action of kicking a soccer ball and the academic action of typing on a computer keyboard. Thus, depending on whether an actor had to be identified with the finger or the foot, participants’ responses were either similar to the actor’s sporty action and dissimilar to his academic action, or vice versa. We investigated whether this similarity affected how ‘sporty’ and how ‘academic’ the two actors were subsequently perceived to be.</span></p><p data-dcnode-id="2564" id="__p8"><span data-dcnode-id="2565" instrument_node="">The results of the identification task replicated previous research on imitative behavior as reviewed above, showing that responses were faster and more accurate when they were similar to the observed action. Interestingly, the fluency of participants’ responses also affected how ‘sporty’ and how ‘academic’ the two actors were perceived to be. An actor identified with a finger response was not only identified more quickly and accurately while performing the academic action of typing on a keyboard than the sporty action of kicking the soccer ball, he was subsequently judged to be more academic and less sporty. In contrast, an actor identified by a foot response was identified more fluently when kicking a soccer ball than when typing on a keyboard. He was later perceived to be sportier and less academic.</span></p><p data-dcnode-id="2562" id="__p9"><span data-dcnode-id="2563" instrument_node="">The finding that our actions affect the personal traits we attribute to other people demonstrates that social judgments rely on representations in our own action system. However, it is unresolved on which level these effects occur. There are two possibilities:</span></p><p data-dcnode-id="2548" id="__p10"><span data-dcnode-id="2561" instrument_node="">First, effects may only emerge during the representation of specific motor acts (e.g., kicking and typing actions). If self-produced and observed motor acts activate overlapping representations, any representation of an observed action should be enhanced if the observer performs a similar action, and disrupted if she/he performs a different action (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2559" href="#bib4" rid="bib4" role="button"><span data-dcnode-id="2560" instrument_node="">Barsalou et al., 2003</span></a><span data-dcnode-id="2558" instrument_node="">). Such effects have been observed before (for a review, see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2556" href="#bib24" id="__tag_475526238" rid="bib24" role="button"><span data-dcnode-id="2557" instrument_node="">Niedenthal et al., 2005</span></a><span data-dcnode-id="2555" instrument_node="">). For instance, people found a message more agreeable if they nodded their heads while receiving it than when they shook their heads (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2553" href="#bib39" rid="bib39" role="button"><span data-dcnode-id="2554" instrument_node="">Wells &amp; Petty, 1980</span></a><span data-dcnode-id="2552" instrument_node="">), and inducing smiles or frowns affected how funny participants rated cartoons they saw at the same time (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2550" href="#bib36" id="__tag_475526247" rid="bib36" role="button"><span data-dcnode-id="2551" instrument_node="">Strack, Martin, &amp; Stepper, 1988</span></a><span data-dcnode-id="2549" instrument_node="">). In a similar fashion, identifying an individual with a finger response would, on the one hand, interfere with the representation of the (dissimilar) kicking action and make him appear less sporty. On the other hand, the same finger response would enhance the representation of his (similar) typing action so that the individual appears more academic. This motor act hypothesis predicts that the effects on personal trait judgments emerged because there were different amounts of similarity between the sporty and academic actions participants saw and the responses they made at the same time.</span></p><p data-dcnode-id="2543" id="__p11"><span data-dcnode-id="2547" instrument_node="">Humans do, however, represent actions not only in terms of the specific motor acts, but also evaluate actions in terms of outcomes: whether they can be performed fluently, or whether they are associated with increased effort, pain or errors (for a review, see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2545" href="#bib6" id="__tag_475526239" rid="bib6" role="button"><span data-dcnode-id="2546" instrument_node="">Botvinick, Cohen, &amp; Carter, 2004</span></a><span data-dcnode-id="2544" instrument_node="">). Our personal-trait judgment effects might therefore also reflect that participants misattributed such appraisals of their own responses to the actions of the individuals. Recall that the similarity of the self-produced and observed action was associated with fewer errors and a faster speed of the participants’ identification responses. An actor identified with a foot response might therefore have appeared sportier because he was identified more fluently when he was seen in the sporty situation than when he was seen in the academic situation. Conversely, the other actor might have appeared more academic because he was identified with a finger response more fluently when seen in the academic situation. This view predicts that the similarity of one’s own responses and observed actions is not critical. Rather, it is important that the participants’ responses differ in degree of fluency when actors are seen performing the sporty and academic actions.</span></p><p class="p" data-dcnode-id="2535" id="__p12"><span data-dcnode-id="2542" instrument_node="">To test whether changes in response fluency suffice to induce changes in personal trait judgments we adapted our original paradigm (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2540" href="#bib3" id="__tag_475526236" rid="bib3" role="button"><span data-dcnode-id="2541" instrument_node="">Bach &amp; Tipper, 2007</span></a><span data-dcnode-id="2539" instrument_node="">). We kept the similarity of observed and self-produced actions constant, and induced changes in response fluency by exploiting spatial compatibility effects. In these spatial compatibility effects responses are faster and more accurate when they occur on the same side as the eliciting stimulus (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2537" href="#bib33" rid="bib33" role="button"><span data-dcnode-id="2538" instrument_node="">Simon, Craft, &amp; Small, 1971; Simon &amp; Rudell, 1967</span></a><span data-dcnode-id="2536" instrument_node="">). If the personal trait judgment effects are due to the ease of participants’ responses being misattributed to the observed actions then they should also occur in the present experiment. If, however, the personal trait effects require overlapping representations of observed and self-produced motor acts, effects on personality judgments should not be obtained.</span></p></div><div class="tsec sec" data-dcnode-id="2006" id="__sec1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2531"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2532" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2533" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="2529" id="__sec1title"><span data-dcnode-id="2530" instrument_node="">Experiment</span></h2><p class="p p-first" data-dcnode-id="2524" id="__p13"><span data-dcnode-id="2528" instrument_node="">In the experiment, participants made left and right finger key presses to identify two actors (George and John) that were presented either kicking a soccer ball or typing on a keyboard. To do this, the participants had to orient visual attention to the faces of the actors. Presenting this critical stimulus feature either to the left or right side of the screen allowed us to manipulate its spatial compatibility with the left or right keys used to identify the actors, thereby inducing changes in response fluency (the Simon effect; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2526" href="#bib34" rid="bib34" role="button"><span data-dcnode-id="2527" instrument_node="">Simon &amp; Rudell, 1967; Simon et al., 1971</span></a><span data-dcnode-id="2525" instrument_node="">), without affecting the similarity between observed actions and the participants’ responses.</span></p><p data-dcnode-id="2518" id="__p14"><span data-dcnode-id="2523" instrument_node="">Assume, for instance, that for a given participant both actors are always presented on the right when performing the sporty action and on the left when performing the academic action (see </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig1" data-dcnode-id="2520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig1/" rid-figpopup="fig1" rid-ob="ob-fig1" target="figure"><span data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="2519" instrument_node="">). This creates a situation in which the response to identify one of the two actors (e.g., the right key press to identify John) will be spatially compatible, and hence faster and more accurate, when he is seen in the sporty context and incompatible, and hence slower and less accurate, when seen in the academic context. Of course the opposite pattern should be observed for the left key-presses to identify George.</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_fig1" data-dcnode-id="2497" id="fig1"><a data-dcnode-id="2514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig1/" rid-figpopup="fig1" rid-ob="ob-fig1" target="figure"></a><div class="figure" data-dcnode-id="2509" data-largeobj="" data-largeobj-link-rid="largeobj_idm140527502146368"><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig1/" rid-figpopup="fig1" rid-ob="ob-fig1" target="figure"></a><a class="inline_block ts_canvas" data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html%3Ftitle%3DClick%2520on%2520image%2520to%2520zoom%26p%3DPMC3%26id%3D2954360_gr1.jpg" rel="noopener" target="tileshopwindow"><div class="ts_bar small" data-dcnode-id="2512" title="Click on image to zoom"></div><img alt="An external file that holds a picture, illustration, etc.
Object name is gr1.jpg" class="tileshop" data-dcnode-id="2511" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/bin/gr1.jpg&amp;raw" title="Click on image to zoom"></a></div><div class="largeobj-link align_right" data-dcnode-id="2506" id="largeobj_idm140527502146368" style="display: none;"><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig1/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="2508" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="2498" id="lgnd_fig1"><div data-dcnode-id="2503"><a class="figpopup" data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig1/" rid-figpopup="fig1" rid-ob="ob-fig1" target="figure"><span data-dcnode-id="2505" instrument_node="">Fig. 1</span></a></div><div class="caption" data-dcnode-id="2499"><p data-dcnode-id="2500" id="__p42"><span data-dcnode-id="2501" instrument_node="">This figure shows the individuals to be identified, typical displays and the basic design. The dotted white vertical line is shown to depict the centre of the display for the reader. It was not present in the stimulus displays.</span></p></div></div></div><p data-dcnode-id="2487" id="__p15"><span data-dcnode-id="2496" instrument_node="">The critical question is whether induced differences in response fluency will translate into differences in personal trait judgments. If the effects on personal trait judgments are due to a misattribution of action appraisals, then the actors should take on the traits associated with the situation in which they are most fluently identified. In the above example, an actor should appear more academic when he is identified with a left key because this response is spatially compatible with the location of his face in the academic scenes (‘George’ in </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig1" data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig1/" rid-figpopup="fig1" rid-ob="ob-fig1" target="figure"><span data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="2492" instrument_node="">). An actor should appear sportier when he is identified with a right key because the right key is spatially compatible with his position in the sporty scenes (‘John’ in </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig1" data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig1/" rid-figpopup="fig1" rid-ob="ob-fig1" target="figure"><span data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="2488" instrument_node="">).</span></p><p class="p" data-dcnode-id="2481" id="__p16"><span data-dcnode-id="2486" instrument_node="">Note that any changes in personal trait judgments induced in this way cannot be attributed to a similarity between observed actions and self-produced responses. Each actor (George or John) is associated with a finger key press response, as is each action (sporty and academic).</span><sup data-dcnode-id="2483"><a class="fn" data-dcnode-id="2484" href="#fn1" rid="fn1"><span data-dcnode-id="2485" instrument_node="">1</span></a></sup><span data-dcnode-id="2482" instrument_node=""> Thus, if effects on personal trait judgments require that self-produced and observed actions converge on the same representations (as assumed by the motor act hypothesis) then no such effects would be expected in the present experiment.</span></p><div class="sec" data-dcnode-id="2449" id="__sec2"><h3 data-dcnode-id="2479" id="__sec2title"><span data-dcnode-id="2480" instrument_node="">Method</span></h3><div class="sec sec-first" data-dcnode-id="2473" id="__sec3"><p data-dcnode-id="2478"></p><h4 class="inline" data-dcnode-id="2476" id="__sec3title"><span data-dcnode-id="2477" instrument_node="">Participants </span></h4><p class="p p-first-last" data-dcnode-id="2474" id="__p17"><span data-dcnode-id="2475" instrument_node="">Thirty-two students (27 females) ranging in age from 18 to 42 years participated in the study. All participants had normal or corrected-to-normal vision. The key assignment of actors (George/John) to response keys (left/right) was counterbalanced across participants, as was the side on which the persons appeared in the scenes (left in the sporty scenes and right in the academic scenes, or vice versa). Thus, for one half of the participants, John was identified with a compatible response when typing and George when kicking, and vice versa for the other half of participants. Participants satisfied all requirements in volunteer screening and gave informed consent approved by the School of Psychology at the University of Wales, Bangor and the North-West Wales Health Trust, and in accordance with the Declaration of Helsinki.</span></p></div><div class="sec" data-dcnode-id="2460" id="__sec4"><p data-dcnode-id="2472"></p><h4 class="inline" data-dcnode-id="2470" id="__sec4title"><span data-dcnode-id="2471" instrument_node="">Material and apparatus </span></h4><p class="p p-first-last" data-dcnode-id="2461" id="__p18"><span data-dcnode-id="2469" instrument_node="">Participants were seated in a dimly lit room facing a color monitor at a distance of 60&nbsp;cm. The experiment was controlled by Presentation run on a 3.0&nbsp;GHz PC running Windows XP. The stimulus set was identical to Experiment 1 of </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2467" href="#bib3" id="__tag_475526255" rid="bib3" role="button"><span data-dcnode-id="2468" instrument_node="">Bach and Tipper (2007)</span></a><span data-dcnode-id="2466" instrument_node="">. It consisted of eight movies (see </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig1" data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig1/" rid-figpopup="fig1" rid-ob="ob-fig1" target="figure"><span data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="2462" instrument_node=""> for examples) lasting 1100&nbsp;ms each and subtending eight degrees visual angle vertically and 11 degrees horizontally. Two of these movies showed John or George kicking a soccer ball, and two movies showed John or George pressing a key on a computer keyboard. In these four movies, the head of each actor appeared on the left side of the frame centre (eccentricities: kicking: 1.1 degrees; typing: 1.9 degrees). For each of these movies a mirror-inverted version was created, in which the actor’s face appeared on the right.</span></p></div><div class="sec sec-last" data-dcnode-id="2450" id="__sec5"><p data-dcnode-id="2459"></p><h4 class="inline" data-dcnode-id="2457" id="__sec5title"><span data-dcnode-id="2458" instrument_node="">Procedure and design </span></h4><p class="p p-first" data-dcnode-id="2455" id="__p19"><span data-dcnode-id="2456" instrument_node="">After the computer-driven instructions and a short training phase of 16 trials the experiment began. It lasted for about 15&nbsp;min and consisted of 320 trials. Each participant saw four of the eight movies, which were presented at equal rates in a randomized order. Movies were selected in the following way. For one participant, the two actors were presented on the right while kicking and on the left while typing. For another participant, the sides of presentation were reversed between typing and kicking actions. This ensured that for each participant, a right key-press to identify actor one was spatially compatible with only one of the two situations in which he appeared (e.g., the sporty situation of kicking a football) and spatially incompatible with the other situation (e.g., the academic situation of typing). Conversely, the left key-press to identify actor two was spatially compatible with the academic situation but not the sporty situation.</span></p><p data-dcnode-id="2453" id="__p20"><span data-dcnode-id="2454" instrument_node="">Participants initiated each trial by pressing the space bar with their left hand. After 500&nbsp;ms the movie was presented. Participants identified John or George by pressing either the / or &nbsp;⧹&nbsp; keys on the computer keyboard with their left or right index finger. Participants were instructed to identify the individual during the interval in which the movie played (1100&nbsp;ms). If their identification was correct, the next trial was allowed to start. If participants were too slow or committed an error an error-message was displayed.</span></p><p class="p p-last" data-dcnode-id="2451" id="__p21"><span data-dcnode-id="2452" instrument_node="">After the experiment was finished, a short questionnaire consisting of four questions was presented on the computer screen. Participants were presented with the name and face image of one actor and asked to indicate on a scale from −4 (‘not at all’) to 4 (‘very much”) how sporty they imagined him to be. They also rated the degree to which they thought him academic. They answered the same two questions with regard to the second actor. The order in which actors and traits were rated was counterbalanced across participants.</span></p></div></div><div class="sec sec-last" data-dcnode-id="2007" id="__sec6"><h3 data-dcnode-id="2447" id="__sec6title"><span data-dcnode-id="2448" instrument_node="">Results</span></h3><div class="sec sec-first" data-dcnode-id="2133" id="__sec7"><p data-dcnode-id="2446"></p><h4 class="inline" data-dcnode-id="2444" id="__sec7title"><span data-dcnode-id="2445" instrument_node="">Vision-action fluency </span></h4><p class="p p-first" data-dcnode-id="2424" id="__p22"><span data-dcnode-id="2443" instrument_node="">RTs were entered into a repeated measures ANOVAs with the within-subjects factors Observed Action (sporty/academic) and Person (John/George) and the between-subjects factor Compatibility (whether John is spatially compatible when typing and George when kicking, or vice versa). Trials in which participants were too slow or in which they pressed a wrong button were excluded (4%). The analysis revealed main effects of Person (</span><em data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">F</span></em><span data-dcnode-id="2440" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;9.3, </span><em data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">p</span></em><span data-dcnode-id="2437" instrument_node="">&nbsp;&lt;&nbsp;.005) and Observed Action (</span><em data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">F</span></em><span data-dcnode-id="2434" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;24.1, </span><em data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">p</span></em><span data-dcnode-id="2431" instrument_node="">&nbsp;&lt;&nbsp;.0001). John was generally identified faster than George, and the persons were generally identified faster in the academic scenes, in which the faces were larger/clearer. Most importantly, the predicted three-way interaction of Person, Observed Action and Compatibility was highly significant (</span><em data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">F</span></em><span data-dcnode-id="2428" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;21.3, </span><em data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">p</span></em><span data-dcnode-id="2425" instrument_node="">&nbsp;&lt;&nbsp;.0001). Thus, the RTs to identify the two persons in the two situations depended on which person was identified with a spatially compatible response while typing, and which person was identified with a compatible response while kicking.</span></p><p data-dcnode-id="2402" id="__p23"><span data-dcnode-id="2423" instrument_node="">We further investigated whether this dependency on compatible responses was present for both the sporty and academic situations. A two-way ANOVA with the within-subjects factors Person (John, George) and the between-subjects factor Compatibility (whether John or George is compatible while typing) computed for the RTs in the academic scenes indeed revealed the critical two-way interaction of Person and Compatibility (</span><em data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">F</span></em><span data-dcnode-id="2420" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;9.8, </span><em data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">p</span></em><span data-dcnode-id="2417" instrument_node="">&nbsp;=&nbsp;.004), with responses being generally faster for the person identified with a compatible response while typing. The reverse result was obtained for the analogous analysis of the sporty scenes (</span><em data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">F</span></em><span data-dcnode-id="2414" instrument_node="">[1,&nbsp;30]&nbsp;=&nbsp;13.0, </span><em data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">p</span></em><span data-dcnode-id="2411" instrument_node="">&nbsp;=&nbsp;.001), with faster responses for the person identified with a compatible response while kicking. See </span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/table/tbl1/" rid-figpopup="tbl1" rid-ob="ob-tbl1" target="table"><span data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Table 1</span></span></a><span data-dcnode-id="2407" instrument_node=""> for the RT data in all conditions, and </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig2" data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig2/" rid-figpopup="fig2" rid-ob="ob-fig2" target="figure"><span data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Fig. 2</span></span></a><span data-dcnode-id="2403" instrument_node="">, top panel, for the data collapsed across George and John.</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_fig2" data-dcnode-id="2381" id="fig2"><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig2/" rid-figpopup="fig2" rid-ob="ob-fig2" target="figure"></a><div class="figure" data-dcnode-id="2393" data-largeobj="" data-largeobj-link-rid="largeobj_idm140527507559504"><a data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig2/" rid-figpopup="fig2" rid-ob="ob-fig2" target="figure"></a><a class="inline_block ts_canvas" data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html%3Ftitle%3DClick%2520on%2520image%2520to%2520zoom%26p%3DPMC3%26id%3D2954360_gr2.jpg" rel="noopener" target="tileshopwindow"><div class="ts_bar small" data-dcnode-id="2396" title="Click on image to zoom"></div><img alt="An external file that holds a picture, illustration, etc.
Object name is gr2.jpg" class="tileshop" data-dcnode-id="2395" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/bin/gr2.jpg&amp;raw" title="Click on image to zoom"></a></div><div class="largeobj-link align_right" data-dcnode-id="2390" id="largeobj_idm140527507559504" style="display: none;"><a data-dcnode-id="2391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig2/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="2392" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="2382" id="lgnd_fig2"><div data-dcnode-id="2387"><a class="figpopup" data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2954360/figure/fig2/" rid-figpopup="fig2" rid-ob="ob-fig2" target="figure"><span data-dcnode-id="2389" instrument_node="">Fig. 2</span></a></div><div class="caption" data-dcnode-id="2383"><p data-dcnode-id="2384" id="__p43"><span data-dcnode-id="2385" instrument_node="">Results. The upper two panels show the spatial compatibility effects for RTs (upper panel) and Error rates (middle panel) in the identification task, collapsed across the two persons (John and George). The lower panel shows the results of the personal trait judgment task. Error bars show the standard error of the means.</span></p></div></div></div><div class="table-wrap anchored whole_rhythm" data-dcnode-id="2174" id="tbl1"><h3 data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Table 1</span></h3><div class="caption" data-dcnode-id="2373"><p data-dcnode-id="2374" id="__p44"><span data-dcnode-id="2375" instrument_node="">Results of the experiment in RTs, Error rates, and personal trait ratings for the two persons (George, John) and both scenes (academic, sporty), depending on w
