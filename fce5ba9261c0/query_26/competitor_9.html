</span><article class="no-access" data-dcnode-id="3785"><span data-dcnode-id="3845" instrument_node="">
</span><section class="panel nomask" data-dcnode-id="3828" id="abstract"><span data-dcnode-id="3844" instrument_node="">
</span><h3 data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">
										Overview</span></h3><span data-dcnode-id="3841" instrument_node="">
</span><p class="jove_content" data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">Source: Laboratory of Jonathan Flombaum—Johns Hopkins University</span></p><span data-dcnode-id="3838" instrument_node="">
</span><p class="jove_content" data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">The study of sensation—how signals are transduced from sensory organs, like the eyes—and perception—how the brain interprets these messages—has a rich history dating back to the 19th century, when great strides were made in understanding the properties of light and how they relate to the visual system. Importantly, such sensory and perceptual processes determine what we see, feel, taste, and hear in our surroundings. However, many teaching methods don’t expose students to the very sensory events they’re trying to learn about. </span></p><span data-dcnode-id="3835" instrument_node="">
</span><p class="jove_content" data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">JoVE’s collection in Sensation and Perception fills this gap by showcasing visual and auditory illusions that viewers can actually experience for themselves, and delves into the their anatomical bases. For example, by watching the video "Color Afterimages," an observer will encounter the phenomenon of perceiving a blank star as occupied by a color, and learn how specific neurons are responsible for this effect. By emphasizing such perceptual tricks, this collection explores the assumptions that the brain uses to interpret information and create our perception of a complex world. </span></p><span data-dcnode-id="3832" instrument_node="">
</span><p class="jove_content" data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">The JoVE videos in Sensation and Perception provide an engaging introduction to this field in psychology. By letting viewers sit in the seat of a participant and take part in actual experiments, this collection emphasizes to students that their own brains can be deceived into perceiving something that isn’t there, as well as even removing objects from perception. </span></p><span data-dcnode-id="3829" instrument_node=""> </span></section><span data-dcnode-id="3827" instrument_node="">
</span><div class="section-sep" data-dcnode-id="3826"></div><span data-dcnode-id="3825" instrument_node="">
</span><section class="panel" data-dcnode-id="3789" id="protocol"><span data-dcnode-id="3824" instrument_node="">
</span><h3 data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Procedure</span></h3><span data-dcnode-id="3821" instrument_node="">
</span><div class="access_required" data-dcnode-id="3812"><a class="access_required_signin" data-dcnode-id="3819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jove.com/account/signin"><span data-dcnode-id="3820" instrument_node="">Log in</span></a><span data-dcnode-id="3818" instrument_node=""> or </span><a class="access_required_trial" data-dcnode-id="3816" onclick="return openSimpleTrial();" tabindex="0"><span data-dcnode-id="3817" instrument_node="">Start trial</span></a><span data-dcnode-id="3815" instrument_node=""> to access full content. Learn more about your institution’s access to JoVE content </span><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jove.com/access"><span data-dcnode-id="3814" instrument_node="">here</span></a></div><div class="truncate" data-dcnode-id="3794" id="section_body_protocol"><div class="chapter_text" data-dcnode-id="3795" id="script_0"><span data-dcnode-id="3811" instrument_node="">
</span><p data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Sensation and perception refers to the study of how we see, how we hear, how we smell, how we feel touch. The difference between sensation and perception is that in sensation we're talking about the transduction of signals. So in the case of vision for example, sensation is really just focused on how light, that's out in the world, is transduced, becomes a signal inside the brain. So it's turned into an electrical signal. It's no longer light. Perception is how we understand or interpret what those signals mean. So it's about the implications, the meaning, that we associate with those signals. The importance of sensation and perception is in some ways obvious. I mean, we're studying how it is that we see, how it is that we hear. These are critical abilities. These are the fundamental ways that humans and other animals get information about their environment in order to exploit their environments.&nbsp;</span></p><span data-dcnode-id="3808" instrument_node="">
</span><p data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">The main challenge one experiences teaching sensation and perception is that so much of what you're talking about are things that you want people to be able to hear or see, or feel, touch. So it's the kind of area where just learning from a textbook, for example, or just reading papers often is inadequate or it sort of sidesteps the actual issue. So you can describe how something works and yet not really have a good feel for it if you don't actually see it. And so one thing that these videos do is they re-create illusions or phenomenon for anybody to experience. Sometimes you can experience them directly in the videos that we've made or sometimes the videos show you how to create those experiences for a participant or for a class. But the bottom line is that when you teach sensation and perception and say, you talk about a visual illusion, for example, you want people to be able to see and experience that illusion. Just describing it is sort of insufficient for making it clear how it's a phenomenon that requires an explanation. And so these videos supply that experience, that visual or auditory experience, or the methods for producing a tactile experience that's so important for the study of sensation and perception.&nbsp;</span></p><span data-dcnode-id="3805" instrument_node="">
</span><p data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">Illusions have for a very, very long time played a role in the study of sensation and perception. I think that there's really two reasons for that. One reason is that illusions reveal something about how the human brain or any organism's brain really solves a problem that has no answer. And so figuring out what's out there in the world on the basis of the given input requires a leap, it requires an extra step, it requires some inference above and beyond just the input itself. And so whenever such inferences are made, it's based on assumptions. It's based on heuristics. It's based on tricks, but fundamentally it's a system that doesn't actually know the answer. It doesn't actually, it's not 100% certain that it knows the truth about the world. So illusions show that. They're sort of tricks that take advantage, that exploit the assumptions and the heuristics that the brain is using to make inferences about the world. So the illusions are very strong tests of a theory or a hypothesis about how the brain is solving some problem. A great example of the role that illusions play in the study of perception is, for example, the Ames room in this video series, which is an illusion that tells us something about how the brain perceives 3-D space, despite the fact that the inputs that it receives are only two-dimensional. So in order to make inferences about how far away objects are in space and also how big objects are, the brain needs to use tricks or have assumptions or use heuristics, because the input on the retina are only two-dimensional. So objects that are far away will project small images on the retina. And likewise small objects that are nearby will project small images on the retina. So how's the brain supposed to figure out if an image on the retina is small because it's from an object that's far away or an object that's actually small. There's no mathematical way to solve that problem with 100% certainty. So the brain makes assumptions. The Ames room is an illusion that takes advantage of those assumptions. In particular, the assumption there is that angles tend to be right angles. But in any case, what the Ames room shows is that the brain's understanding of distance and size is completely confounded, and the brain is sort of making guesses or inferences about the true relationships between objects in the world.&nbsp;</span></p><span data-dcnode-id="3802" instrument_node="">
</span><p data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">The reason why research turned in the direction of sensation and perception the 19th century is because of physics, because there were many researchers who started to understand the properties of light and were interested in optics. They were interested in, they were making glasses and grinding lenses, and figuring things out about how light works and how to bend light and also how to bend it for human purposes. And in doing so they started to ask questions about how the human visual system actually works. They discovered many, many of the most basic principles that we still rely on today for understanding sensation and perception and especially human vision. One of the reasons that the research they did is so cool and important back then is because they did it without any access to the human brain really. So they weren't recording from neurons. They didn't have scanners for imaging human brains and looking at brain waves, and they didn't really have many fancy tools at all. Yet, the hypotheses that they generated and the things that they learned about sensation and perception ended up proving out to be true, not just in a theoretical or psychological sense, but also in a neural sense. We only found that sort of evidence 100 or 200 years later. So in some ways I think of sensation and perception as one of the best examples of the scientific method at work. It was only later in the 1960s, '70s and '80s that we started to discover via neurophysiology that there really are cells that literally are sensitive to the presence of some colors and the absence of their opponent colors. So in many ways that work from the 19th century made a prediction about the existence of certain subtypes of cells in the human brain, of neurons in the human brain. It was only 100, 200 years later that the existence of those cells was confirmed by modern recording techniques in the brain.&nbsp;</span></p><span data-dcnode-id="3799" instrument_node="">
</span><p data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">I think there are really two key questions that will start to address or that we're starting to address and that we'll start to get a better grip on in the next century or so in the area of sensation and perception. The first question is about how does the human brain produce conscious experience. So we can think about sensation and perception in terms as a mathematical problem. Here's some input and can you do some math on that input to figure out where it came from? In other words, what the world that produced that input must be like. But nowhere in there do you have to have an experience of the input or an experience of the world that came from. So we can write in fact because we know so much about how the human brain does these things, we now write computer programs that can solve very sophisticated problems, very sophisticated visual problems. So we can write a computer program that recognizes a face, for example. But the computer program doesn't have a feeling like it's looking at a face. There's no sense in which it has like a mind's eye and the face it's looking at is in that frame. But we all experience that. You're watching the video right now and you have an experience of me sitting there and where is that experience? I know where I am in the video. I mean, I'm here right now and there's a camera pointed at me and it's recording. Someone, you out there, you're watching it at some other time. Where's your experience of the video? It lives somewhere in your brain and we really don't understand that. Scientists are going about that. So a good example is the rubber hand illusion. The rubber hand illusion is a very strange illusion where people start to feel like a rubber hand is their own, and in fact they think that they feel sensation in that hand, in that piece of rubber, that is not a part of their body. So that strange illusion reminds us that even the feeling of touch, sort of the feeling itself, the experience of touch is an invention of the brain. It can be misattributed. And those kinds of illusions of conscious perception should start to help us to understand how the human brain produces the experience of conscious perception and why. Another set of issues that's at the forefront of research in sensation and perception these days I think has to do with language and how language interfaces with sensory and perceptual systems. At the end of the day, one thing that we do with perception is talk about it. We talk about what we see. We talk about how things taste. We talk about what we feel physically. So how do we do that? How do words map on to the outputs of sensory and perceptual processes?</span></p><span data-dcnode-id="3796" instrument_node="">
</span></div></div><p class="subscription_required" data-dcnode-id="3791"><span class="link_subscribe" data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">Subscription Required. Please recommend JoVE to your librarian.</span></span></p><span data-dcnode-id="3790" instrument_node=""> </span></section><span data-dcnode-id="3788" instrument_node="">
</span><div class="section-sep" data-dcnode-id="3787"></div><span data-dcnode-id="3786" instrument_node="">

</span><h3 class="jove-flex" data-dcnode-id="3780" id="transcript"><span data-dcnode-id="3783" instrument_node="">
								Transcript									</span><i class="far fa-chevron-up" data-dcnode-id="3782"></i><span data-dcnode-id="3781" instrument_node="">
</span></h3><span data-dcnode-id="3779" instrument_node="">
</span><div class="no-access" data-dcnode-id="3766" id="video-text" style="display:none;"><span data-dcnode-id="3778" instrument_node="">
</span><p data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">Sensation and perception refers to the study of how we see, how we hear, how we smell, how we feel touch. The difference between sensation and perception is that in sensation we're talking about the transduction of signals. So in the case of vision for example, sensation is really just focused on how light, that's out in the world, is transduced, becomes a signal inside the brain. So it's turned into an electrical signal. It's no longer light. Perception is how we understand or interpret what those signals mean. So it's about the implications, the meaning, that we associate with those signals. The importance of sensation and perception is in some ways obvious. I mean, we're studying how it is that we see, how it is that we hear. These are critical abilities. These are the fundamental ways that humans and other animals get information about their environment in order to exploit their environments.&nbsp;</span></p><p data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">The main challenge one experiences teaching sensation and perception is that so much of what you're talking about are things that you want people to be able to hear or see, or feel, touch. So it's the kind of area where just learning from a textbook, for example, or just reading papers often is inadequate or it sort of sidesteps the actual issue. So you can describe how something works and yet not really have a good feel for it if you don't actually see it. And so one thing that these videos do is they re-create illusions or phenomenon for anybody to experience. Sometimes you can experience them directly in the videos that we've made or sometimes the videos show you how to create those experiences for a participant or for a class. But the bottom line is that when you teach sensation and perception and say, you talk about a visual illusion, for example, you want people to be able to see and experience that illusion. Just describing it is sort of insufficient for making it clear how it's a phenomenon that requires an explanation. And so these videos supply that experience, that visual or auditory experience, or the methods for producing a tactile experience that's so important for the study of sensation and perception.&nbsp;</span></p><p data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">Illusions have for a very, very long time played a role in the study of sensation and perception. I think that there's really two reasons for that. One reason is that illusions reveal something about how the human brain or any organism's brain really solves a problem that has no answer. And so figuring out what's out there in the world on the basis of the given input requires a leap, it requires an extra step, it requires some inference above and beyond just the input itself. And so whenever such inferences are made, it's based on assumptions. It's based on heuristics. It's based on tricks, but fundamentally it's a system that doesn't actually know the answer. It doesn't actually, it's not 100% certain that it knows the truth about the world. So illusions show that. They're sort of tricks that take advantage, that exploit the assumptions and the heuristics that the brain is using to make inferences about the world. So the illusions are very strong tests of a theory or a hypothesis about how the brain is solving some problem. A great example of the role that illusions play in the study of perception is, for example, the Ames room in this video series, which is an illusion that tells us something about how the brain perceives 3-D space, despite the fact that the inputs that it receives are only two-dimensional. So in order to make inferences about how far away objects are in space and also how big objects are, the brain needs to use tricks or have assumptions or use heuristics, because the input on the retina are only two-dimensional. So objects that are far away will project small images on the retina. And likewise small objects that are nearby will project small images on the retina. So how's the brain supposed to figure out if an image on the retina is small because it's from an object that's far away or an object that's actually small. There's no mathematical way to solve that problem with 100% certainty. So the brain makes assumptions. The Ames room is an illusion that takes advantage of those assumptions. In particular, the assumption there is that angles tend to be right angles. But in any case, what the Ames room shows is that the brain's understanding of distance and size is completely confounded, and the brain is sort of making guesses or inferences about the true relationships between objects in the world.&nbsp;</span></p><p data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">The reason why research turned in the direction of sensation and perception the 19th century is because of physics, because there were many researchers who started to understand the properties of light and were interested in optics. They were interested in, they were making glasses and grinding lenses, and figuring things out about how light works and how to bend light and also how to bend it for human purposes. And in doing so they started to ask questions about how the human visual system actually works. They discovered many, many of the most basic principles that we still rely on today for understanding sensation and perception and especially human vision. One of the reasons that the research they did is so cool and important back then is because they did it without any access to the human brain really. So they weren't recording from neurons. They didn't have scanners for imaging human brains and looking at brain waves, and they didn't really have many fancy tools at all. Yet, the hypotheses that they generated and the things that they learned about sensation and perception ended up proving out to be true, not just in a theoretical or psychological sense, but also in a neural sense. We only found that sort of evidence 100 or 200 years later. So in some ways I think of sensation and perception as one of the best examples of the scientific method at work. It was only later in the 1960s, '70s and '80s that we started to discover via neurophysiology that there really are cells that literally are sensitive to the presence of some colors and the absence of their opponent colors. So in many ways that work from the 19th century made a prediction about the existence of certain subtypes of cells in the human brain, of neurons in the human brain. It was only 100, 200 years later that the existence of those cells was confirmed by modern recording techniques in the brain.&nbsp;</span></p><p data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">I think there are really two key questions that will start to address or that we're starting to address and that we'll start to get a better grip on in the next century or so in the area of sensation and perception. The first question is about how does the human brain produce conscious experience. So we can think about sensation and perception in terms as a mathematical problem. Here's some input and can you do some math on that input to figure out where it came from? In other words, what the world that produced that input must be like. But nowhere in there do you have to have an experience of the input or an experience of the world that came from. So we can write in fact because we know so much about how the human brain does these things, we now write computer programs that can solve very sophisticated problems, very sophisticated visual problems. So we can write a computer program that recognizes a face, for example. But the computer program doesn't have a feeling like it's looking at a face. There's no sense in which it has like a mind's eye and the face it's looking at is in that frame. But we all experience that. You're watching the video right now and you have an experience of me sitting there and where is that experience? I know where I am in the video. I mean, I'm here right now and there's a camera pointed at me and it's recording. Someone, you out there, you're watching it at some other time. Where's your experience of the video? It lives somewhere in your brain and we really don't understand that. Scientists are going about that. So a good example is the rubber hand illusion. The rubber hand illusion is a very strange illusion where people start to feel like a rubber hand is their own, and in fact they think that they feel sensation in that hand, in that piece of rubber, that is not a part of their body. So that strange illusion reminds us that even the feeling of touch, sort of the feeling itself, the experience of touch is an invention of the brain. It can be misattributed. And those kinds of illusions of conscious perception should start to help us to understand how the human brain produces the experience of conscious perception and why. Another set of issues that's at the forefront of research in sensation and perception these days I think has to do with language and how language interfaces with sensory and perceptual systems. At the end of the day, one thing that we do with perception is talk about it. We talk about what we see. We talk about how things taste. We talk about what we feel physically. So how do we do that? How do words map on to the outputs of sensory and perceptual processes?</span></p><span data-dcnode-id="3767" instrument_node=""> </span></div><span data-dcnode-id="3765" instrument_node="">
</span></div><span data-dcnode-id="3763" instrument_node="">
