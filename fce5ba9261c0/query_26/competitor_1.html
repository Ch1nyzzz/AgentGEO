</span><meta content="The acute non-image forming (NIF) effects of daytime light on momentary mood had been-although not always-established in the current literature. It still remains largely unknown whether short-time light exposure would modulate emotion perception in healthy adults. The current study (N = 48) was conducted to explore the effects of illuminance (100&amp;nbsp;lx vs. 1000&amp;nbsp;lx at eye level) and correlated color temperature (CCT, 2700&amp;nbsp;K vs. 6500&amp;nbsp;K) on explicit and implicit emotion perception that was assessed with emotional face judgment task and emotional oddball task respectively. Results showed that lower CCT significantly decreased negative response bias in the face judgment task, with labeling ambiguous faces less fearful under 2700&amp;nbsp;K vs. 6500&amp;nbsp;K condition. Moreover, participants responded slightly faster for emotional pictures under 6500&amp;nbsp;K vs. 2700&amp;nbsp;K condition, but no significant effect of illuminance or CCT on negativity bias was revealed in the emotional oddball task. These findings highlighted the differential role of illuminance and CCT in regulating instant emotion perception and suggested a task-dependent moderation of light spectrum on negativity bias." data-dcnode-id="6939" name="dc.description"><span data-dcnode-id="6938" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="5837" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="5838" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5842" id="Abs1"><span data-dcnode-id="5843" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="5839" id="Abs1-content"><p data-dcnode-id="5840"><span data-dcnode-id="5841" instrument_node="">The acute non-image forming (NIF) effects of daytime light on momentary mood had been-although not always-established in the current literature. It still remains largely unknown whether short-time light exposure would modulate emotion perception in healthy adults. The current study (N = 48) was conducted to explore the effects of illuminance (100&nbsp;lx vs. 1000&nbsp;lx at eye level) and correlated color temperature (CCT, 2700&nbsp;K vs. 6500&nbsp;K) on explicit and implicit emotion perception that was assessed with emotional face judgment task and emotional oddball task respectively. Results showed that lower CCT significantly decreased negative response bias in the face judgment task, with labeling ambiguous faces less fearful under 2700&nbsp;K vs. 6500&nbsp;K condition. Moreover, participants responded slightly faster for emotional pictures under 6500&nbsp;K vs. 2700&nbsp;K condition, but no significant effect of illuminance or CCT on negativity bias was revealed in the emotional oddball task. These findings highlighted the differential role of illuminance and CCT in regulating instant emotion perception and suggested a task-dependent moderation of light spectrum on negativity bias.</span></p></div></div></section><span data-dcnode-id="5836" instrument_node="">

</span><section data-dcnode-id="5547" data-title="Introduction"><div class="c-article-section" data-dcnode-id="5548" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5831" id="Sec1"><span data-dcnode-id="5832" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="5549" id="Sec1-content"><p data-dcnode-id="5785"><span data-dcnode-id="5830" instrument_node="">Light therapy has been established as an effective antidepressant treatment for patients with seasonal and nonseasonal affective disorders</span><sup data-dcnode-id="5821"><a data-dcnode-id="5828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d322170568e452" title="Al-Karawi, D. &amp; Jubair, L. Bright light therapy for nonseasonal depression: Meta-analysis of clinical trials. J. Affect. Disord. 198, 64–71.

                 (2017)."><span data-dcnode-id="5799" instrument_node="">9</span></a></sup><span data-dcnode-id="5796" instrument_node="">. In addition to the indirect pathway, light can directly regulate mood by activating brain regions (i.e., the medial amygdala and lateral habenula) involving emotional processing, which was not necessarily mediated by the suprachiasmatic nucleus (SCN). The main driver for these so-called non-image-forming effects (NIF) effects of light is the intrinsically photosensitive retinal ganglion cells (ipRGCs) containing the photopigment melanopsin, with peak sensitivity in the blue part of the electromagnetic spectrum</span><sup data-dcnode-id="5787"><a data-dcnode-id="5794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d322170568e477" title="Brainard, G. C. et al. Action spectrum for melatonin regulation in humans: Evidence for a novel circadian photoreceptor. J. Neurosci. 21, 6405–6412 (2001)."><span data-dcnode-id="5795" instrument_node="">10</span></a><span data-dcnode-id="5793" instrument_node="">,</span><a data-dcnode-id="5791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d322170568e477_1" title="Hattar, S., Liao, H. W., Takao, M., Berson, D. M. &amp; Yau, K. W. Melanopsin-containing retinal ganglion cells: Architecture, projections, and intrinsic photosensitivity. Science 295, 1065–1070.

                  https://doi.org/10.1016/j.physbeh.2018.06.015
                  
                 (2018)."><span data-dcnode-id="5588" instrument_node="">48</span></a></sup><span data-dcnode-id="5585" instrument_node=""> reported that a 15-min bright light (9000&nbsp;lx) facilitated fear extinction and antagonized fear acquisition after 24&nbsp;h and regulated the hemodynamic response of the prefrontal cortex involving in the top-down regulation of fear. These findings suggested that short-term light exposure had the potential to modulate the perception of emotional stimulus. Yet, the acute effects of short-term light exposure on the processing of different valences (i.e., positive, neutral, and negative) of emotional stimuli, especially the regulation of negativity bias, were scarcely investigated. As we mentioned above, a reduction in negative biases in interpretation and appraisal of intrusions was usually associated with a reduction in depressive symptoms over the same period</span><sup data-dcnode-id="5579"><a aria-label="Reference 49" data-dcnode-id="5583" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d322170568e640" title="Lang, T. J., Blackwell, S. E., Harmer, C. J., Davison, P. &amp; Holmes, E. A. Cognitive bias modification using mental imagery for depression: Developing a novel computerized intervention to change negative thinking styles. Eur. J. Pers. 26, 145–157 (2012)."><span data-dcnode-id="5584" instrument_node="">49</span></a><span data-dcnode-id="5582" instrument_node="">,</span><a aria-label="Reference 50" data-dcnode-id="5580" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d322170568e643" title="Yang, W., Ding, Z., Dai, T., Peng, F. &amp; Zhang, J. X. Attention bias modification training in individuals with depressive symptoms: A randomized controlled trial. J. Behav. Ther. Exp. Psychiatry 49, 101–111 (2015)."><span data-dcnode-id="5581" instrument_node="">50</span></a></sup><span data-dcnode-id="5578" instrument_node="">. It is of great practical significance to explore the regulation of ambient light on this specific emotional processing.</span></p><p data-dcnode-id="5552"><span data-dcnode-id="5576" instrument_node="">The potential mechanism by which light regulates emotional processing still remains unclear. There  were evidences that ipRGCs project to multiple emotional relevant brain regions, among which are cortical areas involved in the top-down regulation of emotional attention (such as the dorsolateral prefrontal cortex, intraparietal sulcus, and superior parietal lobule) and subcortical areas related to the bottom-up reorientation of attention (the right insula, the anterior cingulate cortex, and the superior temporal sulcus)</span><sup data-dcnode-id="5561"><a data-dcnode-id="5574" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d322170568e650" title="Alkozei, A. et al. Exposure to blue light increases subsequent functional activation of the prefrontal cortex during performance of a working memory task. Sleep 39, 1671–1680. 
                  https://doi.org/10.5665/sleep.6090
                  
                 (2016)."><span data-dcnode-id="5575" instrument_node="">51</span></a><span data-dcnode-id="5573" instrument_node="">,</span><a data-dcnode-id="5571" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d322170568e650_1" title="Perrin, F. et al. Nonvisual responses to light exposure in the human brain during the circadian night. Curr. Biol. 14, 1842–1846. 
                  https://doi.org/10.1016/j.cub.2004.09.082
                  
                 (2004)."><span data-dcnode-id="5572" instrument_node="">52</span></a><span data-dcnode-id="5570" instrument_node="">,</span><a data-dcnode-id="5568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d322170568e650_2" title="Vandewalle, G. et al. Brain responses to violet, blue, and green monochromatic light exposures in humans: Prominent role of blue light and the brainstem. PLoS ONE 2, e1247. 
                  https://doi.org/10.1371/journal.pone.0001247
                  
                 (2007)."><span data-dcnode-id="5569" instrument_node="">53</span></a><span data-dcnode-id="5567" instrument_node="">,</span><a data-dcnode-id="5565" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d322170568e650_3" title="Vandewalle, G. et al. Daytime light exposure dynamically enhances brain responses. Curr. Biol. 16, 1616–1621. 
                  https://doi.org/10.1016/j.cub.2006.06.031
                  
                 (2006)."><span data-dcnode-id="5566" instrument_node="">54</span></a><span data-dcnode-id="5564" instrument_node="">,</span><a aria-label="Reference 55" data-dcnode-id="5562" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d322170568e653" title="Alkozei, A., Smith, R. &amp; Killgore, W. D. Exposure to blue wavelength light modulates anterior cingulate cortex activation in response to “uncertain” versus “certain” anticipation of positive stimuli. Neurosci. Lett. 616, 5–10. 
                  https://doi.org/10.1016/j.neulet.2016.01.034
                  
                 (2016)."><span data-dcnode-id="5563" instrument_node="">55</span></a></sup><span data-dcnode-id="5560" instrument_node="">. These findings may provide an insight that light exposure would moderate both the implicit (Top-down) and explicit (Bottom-up) processing to emotional stimulus. Also, given that the subjective mood may interact with light, thus modulating objective emotional processing</span><sup data-dcnode-id="5554"><a aria-label="Reference 56" data-dcnode-id="5558" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d322170568e657" title="Vuoskoski, J. K. &amp; Eerola, T. The role of mood and personality in the perception of emotions represented by music. Cortex 47, 1099–1106 (2011)."><span data-dcnode-id="5559" instrument_node="">56</span></a><span data-dcnode-id="5557" instrument_node="">,</span><a aria-label="Reference 57" data-dcnode-id="5555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d322170568e660" title="Mayer, J. D., Gaschke, Y. N., Braverman, D. L. &amp; Evans, T. W. Mood-congruent judgment is a general effect. J. Pers. Soc. Psychol. 63, 119–132 (1992)."><span data-dcnode-id="5556" instrument_node="">57</span></a></sup><span data-dcnode-id="5553" instrument_node="">, it is necessary to explore the specific effects of light on instant emotional processing with careful monitoring subtle influence from emotional states.</span></p><p data-dcnode-id="5550"><span data-dcnode-id="5551" instrument_node="">Thus, the current study was conducted in an effort to investigate the influence of light level and spectrum of indoor light on explicit emotional perception as assessed with facial expression judgment task and implicit emotional perception as assessed with the emotional oddball task. Forty-eight healthy participants were assigned to perform both emotional judgment task and emotional detection task under two illuminance levels (100&nbsp;lx and 1000&nbsp;lx at eye level) and two CCT levels (2700&nbsp;K and 6500&nbsp;K). To dissociate the specific light's effects on emotional perception from subjective mood, we monitored the subjective momentary mood and sleepiness prior to the laboratory study and further put them as covariates. To the best of our knowledge, the current study is the first time to explore the influence of indoor light on both explicit and implicit emotional perception with careful controlling of subtle influence from emotional states. Our study may provide further insights into indoor lighting design or provide guidance on light therapy.</span></p></div></div></section><section data-dcnode-id="5330" data-title="Methods"><div class="c-article-section" data-dcnode-id="5331" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5545" id="Sec2"><span data-dcnode-id="5546" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="5332" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="5543" id="Sec3"><span data-dcnode-id="5544" instrument_node="">Experimental design</span></h3><p data-dcnode-id="5541"><span data-dcnode-id="5542" instrument_node="">A 2 (CCT level: 2700&nbsp;K vs. 6500&nbsp;K, between-subjects) × 2 (Illuminance: 100&nbsp;lx vs. 1000&nbsp;lx at eye level, within-subjects) mixed-model design was employed in the current study. Participants came to the laboratory on two separate days with an interval of at least 2 days. The laboratory study was conducted from May to August 2019. All participants were free to register either in the morning session (8:30–12:30) or in the afternoon session (14:30–17:30), and the local clock time remained the same on the two experiment days. The order of illuminance condition was counterbalanced between participants.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5539" id="Sec4"><span data-dcnode-id="5540" instrument_node="">Participants</span></h3><p data-dcnode-id="5514"><span data-dcnode-id="5538" instrument_node="">A power analysis was conducted before the formal experiment using G*power</span><sup data-dcnode-id="5535"><a aria-label="Reference 58" data-dcnode-id="5536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d322170568e687" title="Faul, F., Erdfelder, E., Lang, A. G. &amp; Buchner, A. G*Power 3: A flexible statistical power analysis program for the social, behavioral, and biomedical sciences. Behav. Res. Methods 39, 175–191. 
                  https://doi.org/10.3758/Bf03193146
                  
                 (2007)."><span data-dcnode-id="5537" instrument_node="">58</span></a></sup><span data-dcnode-id="5534" instrument_node="">; each group needs 24 participants to achieve 95% power when the effect size partial η</span><sup data-dcnode-id="5532"><span data-dcnode-id="5533" instrument_node="">2</span></sup><span data-dcnode-id="5531" instrument_node=""> was hypothesized to be 0.14</span><sup data-dcnode-id="5528"><a aria-label="Reference 59" data-dcnode-id="5529" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d322170568e693" title="Cohen, J. Statistical Power Analysis for the Behavioral Sciences  (Academic, 1988)."><span data-dcnode-id="5530" instrument_node="">59</span></a></sup><span data-dcnode-id="5527" instrument_node="">. Forty-eight healthy young volunteers (mean age = 20.12&nbsp;years, SD = 1.76&nbsp;years, 37 females) were recruited from local universities via advertisements; 24 participants (19 females) were assigned into 2700&nbsp;K condition, while the other half (18 females) received the light at 6500&nbsp;K. All the participants had a normal or corrected-to-normal vision and were right-handed. None of them were extreme chronotypes according to the Morningness-Eveningness Questionnaire</span><sup data-dcnode-id="5524"><a aria-label="Reference 60" data-dcnode-id="5525" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d322170568e697" title="Horne, J. A. &amp; Östberg, O. A self-assessment questionnaire to determine morningness-eveningness in human circadian rhythms. Int. J. Chronobiol. 4(2), 97–110 (1976)."><span data-dcnode-id="5526" instrument_node="">60</span></a></sup><span data-dcnode-id="5523" instrument_node="">. Besides, they had no indication of emotional disturbance based on the Beck Depression Inventory-II</span><sup data-dcnode-id="5520"><a aria-label="Reference 61" data-dcnode-id="5521" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d322170568e701" title="Beck, A. T., Steer, R. A. &amp; Brown, G. K. Beck Depression Inventory (BDI-II) (Pearson, 1996)."><span data-dcnode-id="5522" instrument_node="">61</span></a></sup><span data-dcnode-id="5519" instrument_node=""> and the Beck Anxiety Inventory</span><sup data-dcnode-id="5516"><a aria-label="Reference 62" data-dcnode-id="5517" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d322170568e706" title="Beck, A. T., Epstein, N., Brown, G. &amp; Steer, R. A. An inventory for measuring clinical anxiety: Psychometric properties. J. Consult. Clin. Psychol. 56, 893 (1988)."><span data-dcnode-id="5518" instrument_node="">62</span></a></sup><span data-dcnode-id="5515" instrument_node="">. The study was approved by the Human Research Ethics Committee for Experiment involving Human Species at Local University, and all research activities have adhered to the principles of the Declaration of Helsinki. All participants gave their written informed consent before starting the laboratory study and got payment for participation.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5512" id="Sec5"><span data-dcnode-id="5513" instrument_node="">Experimental setting</span></h3><p data-dcnode-id="5504"><span data-dcnode-id="5511" instrument_node="">The experiment was conducted in a room furnished as a simulated office (4.1&nbsp;m by 3.3&nbsp;m by 2.9&nbsp;m). There were four white workstations separated by white panels; each workstation included a pure white desk (1.2&nbsp;m by 0.8&nbsp;m) and a black chair, and on the desk was a white All-in-One PC (Lenovo C260, 19.5 inches) with a pair of headphones, a keyboard, and a mouse. Six recessed Philips Savio luminaires were mounted on the ceiling of the room. The illuminance level, spectral power distribution (SPD), and color-rendering index (CRI) were measured at eye level by a calibrated spectroradiometer (JETI Specbos1201) aimed at the screen in the gaze direction of participants (Table </span><a data-dcnode-id="5509" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="5510" instrument_node="">1</span></a><span data-dcnode-id="5508" instrument_node=""> and Fig.&nbsp;</span><a data-dcnode-id="5506" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5507" instrument_node="">1</span></a><span data-dcnode-id="5505" instrument_node="">). The CRI at 6500&nbsp;K was Ra = 84, and the CRI at 2700&nbsp;K was Ra = 86.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="5485" data-test="inline-table" id="table-1"><figure data-dcnode-id="5486"><figcaption class="c-article-table__figcaption" data-dcnode-id="5497"><b data-dcnode-id="5498" data-test="table-caption" id="Tab1"><span data-dcnode-id="5503" instrument_node="">Table 1 Spectrally weighted α-Optic lux level at eye levels for each lighting condition based on Lucas et al.</span><sup data-dcnode-id="5500"><a aria-label="Reference 91" data-dcnode-id="5501" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d322170568e734" title="Lucas, R. J. et al. Measuring and using light in the melanopsin age. Trends Neurosci. 37, 1–9. 
                  https://doi.org/10.1016/j.tins.2013.10.004
                  
                 (2014)."><span data-dcnode-id="5502" instrument_node="">91</span></a></sup><span data-dcnode-id="5499" instrument_node="">.</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="5487"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="5488" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-93523-y/tables/1" rel="nofollow"><span data-dcnode-id="5495"><span data-dcnode-id="5496" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5489" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5490" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5491" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5494" instrument_node="">
