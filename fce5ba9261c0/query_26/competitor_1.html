</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="5459" id="Sec6"><span data-dcnode-id="5460" instrument_node="">Measures</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="5457" id="Sec7"><span data-dcnode-id="5458" instrument_node="">Subjective mood and sleepiness</span></h4><p data-dcnode-id="5447"><span data-dcnode-id="5456" instrument_node="">The subjective mood was measured with two items ("happy" and "sad" respectively) selected from the activation-deactivation adjective checklist</span><sup data-dcnode-id="5453"><a aria-label="Reference 63" data-dcnode-id="5454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d322170568e1105" title="Thayer, R. E. The Biopsychology of Mood and Arousal (Oxford University Press, 1990)."><span data-dcnode-id="5455" instrument_node="">63</span></a></sup><span data-dcnode-id="5452" instrument_node="">; each item was rated on a five-point Likert scale, ranging from 1 = definitely not to 5 = definitely. Subjective sleepiness was assessed with the Karolinska Sleepiness Scale (KSS)</span><sup data-dcnode-id="5449"><a aria-label="Reference 64" data-dcnode-id="5450" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d322170568e1109" title="Åkerstedt, T. &amp; Gillberg, M. Subjective and objective sleepiness in the active individual. Int. J. Neurosci. 52, 29–37 (1990)."><span data-dcnode-id="5451" instrument_node="">64</span></a></sup><span data-dcnode-id="5448" instrument_node="">, ranging from 1 = extremely alert to 9 = extremely sleepy.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="5445" id="Sec8"><span data-dcnode-id="5446" instrument_node="">Light sensitivity and evaluation of experimental light</span></h4><p data-dcnode-id="5431"><span data-dcnode-id="5444" instrument_node="">Light sensitivity was measured with three items adopted from Smolders et al.</span><sup data-dcnode-id="5441"><a aria-label="Reference 28" data-dcnode-id="5442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d322170568e1121" title="Smolders, K. C., de Kort, Y. A. &amp; Cluitmans, P. J. A higher illuminance induces alertness even during office hours: Findings on subjective measures, task performance and heart rate measures. Physiol. Behav. 107, 7–16. 
                  https://doi.org/10.1016/j.physbeh.2012.04.028
                  
                 (2012)."><span data-dcnode-id="5443" instrument_node="">28</span></a></sup><span data-dcnode-id="5440" instrument_node="">. At the end of the experiment, all participants were asked to evaluate the experimental light (pleasantness, comfort, disturb, warmth, preference, brightness, excitement) using seven 5-point Likert-scale items adopted from Flynn</span><sup data-dcnode-id="5437"><a aria-label="Reference 65" data-dcnode-id="5438" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d322170568e1125" title="Flynn, J. E., Spencer, T. J., Martyniuk, O. &amp; Hendrick, C. Interim study of procedures for investigating the effect of light on impression and behavior. J. Illum. Eng. Soc. 3, 87–94 (1973)."><span data-dcnode-id="5439" instrument_node="">65</span></a></sup><span data-dcnode-id="5436" instrument_node="">. Additionally, two 5-point Likert scale items adopted from Smolders and de Kort were used to probe participants' beliefs about the current lighting effects on work performance and mood</span><sup data-dcnode-id="5433"><a aria-label="Reference 25" data-dcnode-id="5434" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d322170568e1129" title="Ru, T., de Kort, Y. A. W., Smolders, K. C. H. J., Chen, Q. &amp; Zhou, G. Non-image forming effects of illuminance and correlated color temperature of office light on alertness, mood, and performance across cognitive domains. Build. Environ. 149, 253–263. 
                  https://doi.org/10.1016/j.buildenv.2018.12.002
                  
                 (2019)."><span data-dcnode-id="5435" instrument_node="">25</span></a></sup><span data-dcnode-id="5432" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5429" id="Sec9"><span data-dcnode-id="5430" instrument_node="">Experimental tasks</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="5427" id="Sec10"><span data-dcnode-id="5428" instrument_node="">Emotional face judgment task</span></h4><p data-dcnode-id="5407"><span data-dcnode-id="5426" instrument_node="">The emotional face judgment task was used to assess the explicit perception of emotional stimuli, in which all the faces were on a morphed expression continuum between exemplars of fearful and happy expressions</span><sup data-dcnode-id="5423"><a aria-label="Reference 66" data-dcnode-id="5424" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d322170568e1147" title="Sun, S. et al. Decision ambiguity is mediated by a late positive potential originating from cingulate cortex. Neuroimage 157, 400–414. 
                  https://doi.org/10.1016/j.neuroimage.2017.06.003
                  
                 (2017)."><span data-dcnode-id="5425" instrument_node="">66</span></a></sup><span data-dcnode-id="5422" instrument_node="">. Two female faces and two men faces were selected from an international database named STOIC database</span><sup data-dcnode-id="5419"><a aria-label="Reference 67" data-dcnode-id="5420" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d322170568e1151" title="Roy, S. et al. STOIC: A Database of Dynamic and Static Faces Expressing Highly Recognizable Emotions (Université De Montréal, 2007)."><span data-dcnode-id="5421" instrument_node="">67</span></a></sup><span data-dcnode-id="5418" instrument_node="">. The unambiguous exemplars of fearful and happy expressions were selected for each individual, and pixel value and location were interpolated between fearful exemplar faces and happy exemplar faces to generate the morphed expression continua for this experiment. Five levels of fear-happy morphs, ranging from 30% fear/70% happy to 70% fear/30% happy in steps of 10%, were created by customized scripts in MATLAB R2017a (MathWorks Inc., Natick, MA, USA), and low-level image properties were equalized by the SHINE toolbox</span><sup data-dcnode-id="5415"><a aria-label="Reference 68" data-dcnode-id="5416" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d322170568e1155" title="Willenbockel, V. et al. Controlling low-level image properties: The SHINE toolbox. Behav. Res. Methods 42, 671–684 (2010)."><span data-dcnode-id="5417" instrument_node="">68</span></a></sup><span data-dcnode-id="5414" instrument_node=""> in MATLAB. At last, seven levels of fear–happy morphs were included, ranging from 0% fear/100% happy to 100% fear/0% happy in steps of 10%, so the faces include seven levels of fearful ratio: 0%, 30%, 40%, 50%, 60%, 70%, 100%. According to the degree of fear, these seven different levels were further divided into three levels: positive, neutral, negative (Fig.&nbsp;</span><a data-dcnode-id="5412" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5413" instrument_node="">2</span></a><span data-dcnode-id="5411" instrument_node="">A). During this task, participants were asked to judge the facial expressions (happy or fearful) presented on the screen as quickly and accurately as possible by pressing one of two labeled response keys on the keyboard. The response hand for happy and fearful faces was balanced between participants. There were two blocks for this task, with each block including 140 trails, and each face was presented for 1500&nbsp;ms with a random interval of 800 to 1200&nbsp;ms (Fig.&nbsp;</span><a data-dcnode-id="5409" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5410" instrument_node="">2</span></a><span data-dcnode-id="5408" instrument_node="">B). The reaction time for the three kinds of emotional faces and the selection rate for fearful faces in the seven levels of emotional faces were separately investigated.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5371" data-test="figure" data-title="Figure 2" id="figure-2"><figure data-dcnode-id="5372"><figcaption data-dcnode-id="5404"><b class="c-article-section__figure-caption" data-dcnode-id="5405" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="5406" instrument_node="">Figure 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5383"><div class="c-article-section__figure-item" data-dcnode-id="5399"><a class="c-article-section__figure-link" data-dcnode-id="5400" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-93523-y/figures/2" rel="nofollow"><picture data-dcnode-id="5401"><source data-dcnode-id="5403" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-93523-y/MediaObjects/41598_2021_93523_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="5402" height="355" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-93523-y/MediaObjects/41598_2021_93523_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5384" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="5385"><span data-dcnode-id="5398" instrument_node="">(</span><b data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">A</span></b><span data-dcnode-id="5395" instrument_node="">) Stimulus sample of face judgment task: female, facial expression ranges from 100% happy /0% fearful to 0% happy /100% fearful, all morphs were created by customized scripts in MATLAB R2017a (MathWorks Inc., Natick, MA, USA). (</span><b data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">B</span></b><span data-dcnode-id="5392" instrument_node="">) Emotional face judgment task. A face was presented after a fixation cross, and then participants were required to judge whether the emotion conveyed by the face is "fearful" or "happy" within 1.5&nbsp;s. (</span><b data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">C</span></b><span data-dcnode-id="5389" instrument_node="">) Emotional oddball task. A picture was presented after a fixation cross, and participants were required to answer whether it is a standard stimulus or an oddball stimulus within 1.5&nbsp;s immediately. (</span><b data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">D</span></b><span data-dcnode-id="5386" instrument_node="">) Overview of experimental condition and schematic representation of one full session. Note that the task order was the same on two experiment days and counterbalanced between the participants.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5373"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="5374" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-93523-y/figures/2" rel="nofollow"><span data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5375" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5376" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5377" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5380" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5379" fill-rule="evenodd"></path><span data-dcnode-id="5378" instrument_node="">
</span></a></div></figure></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="5369" id="Sec11"><span data-dcnode-id="5370" instrument_node="">Emotional oddball task</span></h4><p data-dcnode-id="5350"><span data-dcnode-id="5368" instrument_node="">The emotional oddball task was used to assess the implicit perception of emotional stimulus. A neutral picture (valence = 5.59, arousal = 4.40) was selected as the standard stimulus, whereas the other three kinds of stimuli with a different emotional valance (negative, neutral, and positive) were selected as the oddball stimuli. All the pictures were selected from the Chinese Affective Picture System (CAPS)</span><sup data-dcnode-id="5365"><a aria-label="Reference 69" data-dcnode-id="5366" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d322170568e1204" title="Lu, B., Hui, M. &amp; Yu-Xia, H. The development of native Chinese affective picture system—A pretest in 46 college students. Chin. Ment. Health J. 11, 4–7 (2005)."><span data-dcnode-id="5367" instrument_node="">69</span></a></sup><span data-dcnode-id="5364" instrument_node="">. The standard stimulus was presented with a probability of 70%, and the oddball stimuli were presented with a probability of 30% (10% for each Valence)</span><sup data-dcnode-id="5361"><a aria-label="Reference 70" data-dcnode-id="5362" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d322170568e1208" title="Yuan, J. et al. Are we sensitive to valence differences in emotionally negative stimuli? Electrophysiological evidence from an ERP study. Neuropsychologia 45, 2764–2771 (2007)."><span data-dcnode-id="5363" instrument_node="">70</span></a></sup><span data-dcnode-id="5360" instrument_node="">. The valence level (Negative, M = 2.05, SD = 0.16; Neutral, M = 5.68, SD = 0.17; Positive, M = 6.77, SD = 0.16) of three kinds of oddball stimulus were evaluated before the main task with significant difference across them (F (2,87) = 602.37, </span><i data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">p</span></i><span data-dcnode-id="5357" instrument_node=""> &lt; 0.001), while the arousal level (Negative, M = 5.69, SD = 0.57; Neutral, M = 5.69, SD = 0.75; Positive, M = 5.71, SD = 0.16) were not different significantly (F (2,87) = 0.18, </span><i data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">p</span></i><span data-dcnode-id="5354" instrument_node=""> = 0.84). Two blocks were included in this task, with each block consisting of 150 trails. Each stimulus was presented for 1500&nbsp;ms with a random interval of 800 to 1200&nbsp;ms (Fig.&nbsp;</span><a data-dcnode-id="5352" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5353" instrument_node="">2</span></a><span data-dcnode-id="5351" instrument_node="">C). Participants were required to respond to the oddball or standard stimulus by pressing one of two labeled response keys as quickly as possible. The response hand for the standard and the oddball stimulus was balanced between participants. The average accuracy and reaction time of the three kinds of emotional pictures were separately recorded for the analyses.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5348" id="Sec12"><span data-dcnode-id="5349" instrument_node="">Experimental procedure</span></h3><p data-dcnode-id="5343"><span data-dcnode-id="5347" instrument_node="">After participants arrived in the laboratory, they were instructed to complete a set of questionnaires with questions about their sleep offset, sleep duration, sleep quality of the preceding night, light sensitivity, how long they spent outdoors and whether they had consumed coffee and/or other drinks containing alcohol or caffeine before they arrived at the laboratory. Baseline sleepiness and mood were assessed before the light manipulation. The experiment always started with a 5-min light adaption after the experimental light was turned on, in which participants were free to read books containing no emotion priming contexts. Afterward, two computerized tasks were programmed with counterbalanced orders, and the order of the task remained consistent for each participant on the two experiment days. At the end of the task session, subjective mood and sleepiness were repeatedly measured, and the subjective evaluation of the experiment light was assessed. A schematic representation of one full experimental session is depicted in Fig.&nbsp;</span><a data-dcnode-id="5345" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5346" instrument_node="">2</span></a><span data-dcnode-id="5344" instrument_node="">D.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5341" id="Sec13"><span data-dcnode-id="5342" instrument_node="">Statistical analyses</span></h3><p data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">Before further statistical analyses were performed, responses on error trials (omissions, false starts, and trials following incorrect responses) and outliers (M ± 3SD; per participant and per dependent variable per session) were removed. Due to the hierarchical structure of the data, linear mixed model (LMM) analyses were conducted to test the effects of Illuminance and CCT on all dependent variables. Participants and the experimental session (nested within participant) were added as random intercepts to cluster the data per participant and per experimental session in all models. Firstly, a preparatory LMM analysis was performed with sleep duration (self-reported hours), sleep quality (GSQS score) of the night before the experiment days, or light sensitivity as the response variable; the models for each of the different dependent variables further included CCT and Illuminance level and their interactions as fixed factors. Secondly, further LMM analyses were performed with the subjective sleepiness and mood before (baseline) and after light manipulation and evaluation of lighting conditions as dependent variables; in those models, CCT and Illuminance and their interaction were added as fixed factors. Confounding variables with significant differences at baseline, baseline subjective mood, and alertness, lighting evaluation variables of post-experiment with a significant difference across conditions were used as control variables in future LMM analysis on emotional processing.</span></p><p data-dcnode-id="5333"><span data-dcnode-id="5338" instrument_node="">For the face judgment task, an LMM model was built with CCT, Illuminance, Fearful levels of faces or Valence, and their interactions as fixed factors, whereas the percentage of choosing fearful or reaction time work as response variables respectively. For the oddball task, LMM models were built with CCT, Illuminance, Valence, and their interactions as fixed factors, whereas the response accuracy or reaction time as response variables, respectively. Post hoc contrasts were performed to investigate the nature of all significant interaction effects with Bonferroni corrected. Adjusted R-Squared was given for the total mixed model at level 1, i.e., within sessions. This measure is the proportion of reduction in the variance of residuals; note that this measure can also have negative values</span><sup data-dcnode-id="5335"><a aria-label="Reference 71" data-dcnode-id="5336" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d322170568e1244" title="Raudenbush, S. W. &amp; Bryk, A. S. Hierarchical Linear Models: Applications and Data Analysis Methods Vol. 1 (Sage, 2002)."><span data-dcnode-id="5337" instrument_node="">71</span></a></sup><span data-dcnode-id="5334" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="5014" data-title="Results"><div class="c-article-section" data-dcnode-id="5015" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5328" id="Sec14"><span data-dcnode-id="5329" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="5016" id="Sec14-content"><h3 class="c-article__sub-heading" data-dcnode-id="5326" id="Sec15"><span data-dcnode-id="5327" instrument_node="">Confounding variables: sleep quality, sleep duration, and light sensitivity</span></h3><p data-dcnode-id="5306"><span data-dcnode-id="5325" instrument_node="">Surprisingly, our results revealed a significant main effect of Illuminance on light sensitivity (F (1,48) = 6.08, </span><i data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">p</span></i><span data-dcnode-id="5322" instrument_node=""> = 0.02, R</span><sup data-dcnode-id="5320"><span data-dcnode-id="5321" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5319" instrument_node=""> = −&nbsp;0.10), the participants reported higher light sensitivity before receiving the high light level manipulation. In addition, a main effect of CCT was found on sleep duration (F (1,48) = 5.81, </span><i data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">p</span></i><span data-dcnode-id="5316" instrument_node=""> = 0.02, R</span><sup data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5313" instrument_node=""> = 0.05), with shorter total sleep time in the 6500&nbsp;K condition (8.17 ± 0.16) than in the 2700&nbsp;K condition (7.65 ± 0.15). Results showed that there were no main effects of CCT or Illuminance on sleep quality, neither the interaction effects of CCT and Illuminance on these three variables (all </span><i data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">p</span></i><span data-dcnode-id="5310" instrument_node=""> &gt; 0.01) (Table </span><a data-dcnode-id="5308" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="5309" instrument_node="">2</span></a><span data-dcnode-id="5307" instrument_node="">). Thus, sleep duration and light sensitivity were both taken as covariates in further analysis.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="5291" data-test="inline-table" id="table-2"><figure data-dcnode-id="5292"><figcaption class="c-article-table__figcaption" data-dcnode-id="5303"><b data-dcnode-id="5304" data-test="table-caption" id="Tab2"><span data-dcnode-id="5305" instrument_node="">Table 2 Descriptive statistics results for confounding variables and baseline measures.</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="5293"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="5294" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-93523-y/tables/2" rel="nofollow"><span data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5295" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5296" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5297" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5300" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5299" fill-rule="evenodd"></path><span data-dcnode-id="5298" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="5289" id="Sec16"><span data-dcnode-id="5290" instrument_node="">Baseline comparison: sleepiness and mood</span></h3><p data-dcnode-id="5281"><span data-dcnode-id="5288" instrument_node="">For the baseline rating, all the LMM analyses showed no significant main effects or interaction effects of CCT and Illuminance on baseline sleepiness, positive mood, and negative mood (all </span><i data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">p</span></i><span data-dcnode-id="5285" instrument_node=""> values &gt; 0.05) (Table </span><a data-dcnode-id="5283" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="5284" instrument_node="">2</span></a><span data-dcnode-id="5282" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5279" id="Sec17"><span data-dcnode-id="5280" instrument_node="">Effects of lighting on emotion perception</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="5277" id="Sec18"><span data-dcnode-id="5278" instrument_node="">Emotional face judgment task</span></h4><p data-dcnode-id="5260"><span data-dcnode-id="5276" instrument_node="">LMM analysis for the percentage of choosing fearful in the face judgment task revealed a significant main effect of CCT (F (1,52) = 4.78, </span><i data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">p</span></i><span data-dcnode-id="5273" instrument_node=""> = 0.03); participants were less inclined to make fearful decisions under 2700&nbsp;K (EMM = 0.49, SE = 0.02) versus 6500&nbsp;K condition (EMM = 0.55, SE = 0.02, </span><i data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">p</span></i><span data-dcnode-id="5270" instrument_node=""> = 0.03). The interaction effect between CCT and fearful levels was also significant (F(6,570) = 2.09, </span><i data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">p</span></i><span data-dcnode-id="5267" instrument_node=""> = 0.05, R</span><sup data-dcnode-id="5265"><span data-dcnode-id="5266" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5264" instrument_node=""> = 0.92). The post-hoc analysis revealed that participants selectively showing significantly lower percentage of choosing fearful for the 30%, 40%, 60% and 70% fearful levels (all </span><i data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">p values</span></i><span data-dcnode-id="5261" instrument_node=""> &lt; 0.05) under 2700 K vs. 6500 K condition, but not for 0% and 100% fearful﻿ level.</span></p><p data-dcnode-id="5255"><span data-dcnode-id="5259" instrument_node="">To further investigate participants’ sensitivity of emotional judgment in two CCT conditions, a logistic function was fitted to obtain smooth psychometric curves under two CCT conditions. The Eq.&nbsp;(</span><a data-dcnode-id="5257" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="5258" instrument_node="">1</span></a><span data-dcnode-id="5256" instrument_node="">) is as follows:</span></p><div class="c-article-equation" data-dcnode-id="5249" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="5252"><span class="mathjax-tex" data-dcnode-id="5253"><span data-dcnode-id="5254" instrument_node="">$$P\left( x \right) = \frac{{P_{{inf}} }}{{1 + e^{{ - \alpha \left( {\chi - \chi_{{half}} } \right)}} }}$$</span></span></div><div class="c-article-equation__number" data-dcnode-id="5250"><span data-dcnode-id="5251" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="5226"><i data-dcnode-id="5247"><span data-dcnode-id="5248" instrument_node="">P</span></i><span data-dcnode-id="5246" instrument_node=""> is the percentage of trials judging faces as fear, χ is the morph level, </span><i data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">P</span></i><sub data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">inf</span></sub><span data-dcnode-id="5241" instrument_node=""> is the value when χ approaches infinity (the curve's maximum value), χ</span><sub data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">half</span></sub><span data-dcnode-id="5238" instrument_node=""> is the symmetric inflection point (the curve's midpoint), and α is the steepness of the curve. </span><i data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">P</span></i><sub data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">inf</span></sub><span data-dcnode-id="5233" instrument_node="">, χ</span><sub data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">half</span></sub><span data-dcnode-id="5230" instrument_node="">, and α were fitted from the observed data (</span><i data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">P</span></i><span data-dcnode-id="5227" instrument_node=""> and χ).</span></p><p data-dcnode-id="5215"><span data-dcnode-id="5225" instrument_node="">Emotion Sensitivity Index (ESI), defined as the slope of the psychometric curves fitted by the above function, was used to investigate the sensitivity of emotional judgment at different morph levels. The results revealed a monotonically increasing relationship between the likelihood of identifying a face as fearful and the fearfulness in the morphed face for all participants (Fig.&nbsp;</span><a data-dcnode-id="5223" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5224" instrument_node="">3</span></a><span data-dcnode-id="5222" instrument_node="">A). Participants under 2700&nbsp;K (M = 1.47, SD = 0.32) and 6500&nbsp;K (M = 1.42, SD = 0.29) light conditions had similar slopes (independent-samples t-Test, t (46) = 0.55, </span><i data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">p</span></i><span data-dcnode-id="5219" instrument_node=""> = 0.59). Besides, the threshold, defined as the fearful chosen rate when the morph level was 50%, was also derived from the fitted curve for each participant under two CCT conditions. The results showed that the fearful chosen rate in 2700&nbsp;K light condition (M = 48.63, SD = 17.51) was not significantly different from that in 6500&nbsp;K light condition (M = 56.64, SD = 14.84) when the morph level was 50% (t (46) = −&nbsp;1.71, </span><i data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">p</span></i><span data-dcnode-id="5216" instrument_node=""> = 0.09).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5185" data-test="figure" data-title="Figure 3" id="figure-3"><figure data-dcnode-id="5186"><figcaption data-dcnode-id="5212"><b class="c-article-section__figure-caption" data-dcnode-id="5213" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="5214" instrument_node="">Figure 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5197"><div class="c-article-section__figure-item" data-dcnode-id="5207"><a class="c-article-section__figure-link" data-dcnode-id="5208" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-93523-y/figures/3" rel="nofollow"><picture data-dcnode-id="5209"><source data-dcnode-id="5211" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-93523-y/MediaObjects/41598_2021_93523_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="5210" height="306" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-93523-y/MediaObjects/41598_2021_93523_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5198" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="5199"><span data-dcnode-id="5206" instrument_node="">(</span><b data-dcnode-id="5204"><span data-dcnode-id="5205" instrument_node="">A</span></b><span data-dcnode-id="5203" instrument_node="">) Group average of psychometric curves showing the proportion of trials judged as fearful as a function of morph levels (ranging from 0% fearful (100% happy; on the left) to 100% fearful (0% happy; on the right)). Shaded area denotes ± SEM across subjects. (</span><b data-dcnode-id="5201"><span data-dcnode-id="5202" instrument_node="">B</span></b><span data-dcnode-id="5200" instrument_node="">) Face judgment reaction time of negative vs. neutral vs. positive faces under two CCT conditions. Whiskers represent standard errors.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5187"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="5188" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-93523-y/figures/3" rel="nofollow"><span data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5189" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5190" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5191" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5194" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5193" fill-rule="evenodd"></path><span data-dcnode-id="5192" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5162"><span data-dcnode-id="5184" instrument_node="">For the response time (RT), LMM analysis revealed that the main effect of Valence was significant (F(2,570) = 92.73, </span><i data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">p</span></i><span data-dcnode-id="5181" instrument_node=""> &lt; 0.001); the post-hoc test showed that participants responded significantly slower to the neutral faces (EMM = 665.70, SE = 13.33) than to the positive faces (EMM = 617.88, SE = 13.50, </span><i data-dcnode-id="5179"><span data-dcnode-id="5180" instrument_node="">p</span></i><span data-dcnode-id="5178" instrument_node=""> &lt; 0.001) and the negative faces (EMM = 606.79, SE = 13.50, </span><i data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">p</span></i><span data-dcnode-id="5175" instrument_node=""> &lt; 0.001), while the reaction time for positive faces and negative faces was not  significantly different (</span><i data-dcnode-id="5173"><span data-dcnode-id="5174" instrument_node="">p</span></i><span data-dcnode-id="5172" instrument_node=""> &gt; 0.05). In addition, the interaction effect between CCT and Valence was also significant (F (2,570) = 8.70, </span><i data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">p</span></i><span data-dcnode-id="5169" instrument_node=""> &lt; 0.001, R</span><sup data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5166" instrument_node=""> = 0.26). The post-hoc analysis indicated that participants’ reaction time for the negative, neutral, and positive faces did not significantly differ between 6500&nbsp;K condition (negative: EMM ± SD = 583.45 ± 19.78; neutral: EMM ± SD = 641.25 ± 19.55, positive: EMM ± SD = 611.98 ± 19.78) and 2700&nbsp;K condition (negative: EMM ± SD = 630.13 ± 19.67; neutral: EMM ± SD = 690.15 ± 19.45; positive: EMM ± SD = 623.79 ± 19.67) after Bonferroni correction (Fig.&nbsp;</span><a data-dcnode-id="5164" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5165" instrument_node="">3</span></a><span data-dcnode-id="5163" instrument_node="">B). In addition, the results yielded no significant main or interaction effect of CCT and illuminance.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="5160" id="Sec19"><span data-dcnode-id="5161" instrument_node="">Emotional oddball task</span></h4><p data-dcnode-id="5140"><span data-dcnode-id="5159" instrument_node="">The LMM analysis of the accuracy rate in the oddball task revealed a similar response bias towards negative stimuli (F(2,186) = 11.96, </span><i data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">p</span></i><span data-dcnode-id="5156" instrument_node=""> &lt; 0.001, R</span><sup data-dcnode-id="5154"><span data-dcnode-id="5155" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5153" instrument_node=""> = 0.13), with participants showing relatively higher response accuracy for the negative emotional stimulus (EMM = 0.96, SE = 0.01, </span><i data-dcnode-id="5151"><span data-dcnode-id="5152" instrument_node="">p</span></i><span data-dcnode-id="5150" instrument_node=""> &lt; 0.001) and positive emotional stimulus (EMM = 0.95, SE = 0.01, </span><i data-dcnode-id="5148"><span data-dcnode-id="5149" instrument_node="">p</span></i><span data-dcnode-id="5147" instrument_node=""> = 0.02) compared to the neutral emotional stimulus (EMM = 0.94, SE = 0.01) (Fig.&nbsp;</span><a data-dcnode-id="5145" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5146" instrument_node="">4</span></a><span data-dcnode-id="5144" instrument_node="">A). However, such response bias was not modulated by the illuminance and CCT manipulation (all </span><i data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">p </span></i><span data-dcnode-id="5141" instrument_node="">values &gt; 0.05).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5098" data-test="figure" data-title="Figure 4" id="figure-4"><figure data-dcnode-id="5099"><figcaption data-dcnode-id="5137"><b class="c-article-section__figure-caption" data-dcnode-id="5138" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="5139" instrument_node="">Figure 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5110"><div class="c-article-section__figure-item" data-dcnode-id="5132"><a class="c-article-section__figure-link" data-dcnode-id="5133" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-93523-y/figures/4" rel="nofollow"><picture data-dcnode-id="5134"><source data-dcnode-id="5136" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-93523-y/MediaObjects/41598_2021_93523_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="5135" height="261" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-93523-y/MediaObjects/41598_2021_93523_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5111" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="5112"><span data-dcnode-id="5131" instrument_node="">(</span><b data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">A</span></b><span data-dcnode-id="5128" instrument_node="">) Oddball accuracy of Negative vs. Neutral vs. Positive pictures under all light conditions. Whiskers represent standard errors. </span><i data-dcnode-id="5126"><span data-dcnode-id="5127" instrument_node="">p</span></i><span data-dcnode-id="5125" instrument_node=""> &lt; 0.05, ***</span><i data-dcnode-id="5123"><span data-dcnode-id="5124" instrument_node="">p</span></i><span data-dcnode-id="5122" instrument_node=""> &lt; 0.001. (</span><b data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">B</span></b><span data-dcnode-id="5119" instrument_node="">) Oddball reaction time of negative vs. neutral vs. positive pictures under all light conditions. Whiskers represent standard errors. *</span><i data-dcnode-id="5117"><span data-dcnode-id="5118" instrument_node="">p</span></i><span data-dcnode-id="5116" instrument_node=""> &lt; 0.05, **</span><i data-dcnode-id="5114"><span data-dcnode-id="5115" instrument_node="">p</span></i><span data-dcnode-id="5113" instrument_node=""> &lt; 0.01.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5100"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="5101" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-93523-y/figures/4" rel="nofollow"><span data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5102" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5103" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5104" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5107" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5106" fill-rule="evenodd"></path><span data-dcnode-id="5105" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5069"><span data-dcnode-id="5097" instrument_node="">Neither the illuminance nor the CCT induced a main effect on the reaction time of emotional perception (illuminance: F(1,57) = 1.36, </span><i data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">p</span></i><span data-dcnode-id="5094" instrument_node=""> = 0.25; CCT: F(1,50) = 3.73, </span><i data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">p</span></i><span data-dcnode-id="5091" instrument_node=""> = 0.059), whereas the planed comparison indicated that participants’ reaction time tend to be shorter under 6500&nbsp;K (EMM = 422.90, SE = 11.67) than 2700&nbsp;K condition (EMM = 455.79, SE = 11.89, </span><i data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">p</span></i><span data-dcnode-id="5088" instrument_node=""> = 0.059). The main effect of Valence was significant (F (2,186) = 7.13, </span><i data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">p</span></i><span data-dcnode-id="5085" instrument_node=""> = 0.001, R</span><sup data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5082" instrument_node=""> = 0.08) (Fig.&nbsp;</span><a data-dcnode-id="5080" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5081" instrument_node="">4</span></a><span data-dcnode-id="5079" instrument_node="">B), participants responded faster to the negative emotional stimulus (EMM = 434.35, SE = 8.25) than positive (EMM = 442.45, SE = 8.25, </span><i data-dcnode-id="5077"><span data-dcnode-id="5078" instrument_node="">p</span></i><span data-dcnode-id="5076" instrument_node=""> = 0.002) and neutral emotional stimulus (EMM = 441.23, SE = 8.25, </span><i data-dcnode-id="5074"><span data-dcnode-id="5075" instrument_node="">p</span></i><span data-dcnode-id="5073" instrument_node=""> = 0.01). Again, such difference was not susceptible to the influence from illuminance or CCT (</span><i data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">p </span></i><span data-dcnode-id="5070" instrument_node="">value &gt; 0.05).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5067" id="Sec20"><span data-dcnode-id="5068" instrument_node="">Effects of lighting condition on subjective sleepiness and mood</span></h3><p data-dcnode-id="5032"><span data-dcnode-id="5066" instrument_node="">LMM analysis showed that the lighting conditions had no significant main and interaction effects on subjective sleepiness and subjective mood (all </span><i data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">p</span></i><span data-dcnode-id="5063" instrument_node=""> values &gt; 0.05). LMM analysis for the light evaluation revealed a significant main effect of Illuminance on the subjective pleasantness (F(1,49) = 4.00, </span><i data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">p</span></i><span data-dcnode-id="5060" instrument_node=""> = 0.05, R</span><sup data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5057" instrument_node=""> = 0.07), brightness (F(1,48) = 32.12, </span><i data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">p</span></i><span data-dcnode-id="5054" instrument_node=""> &lt; 0.001, R</span><sup data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5051" instrument_node=""> = 0.26) and excitement (F(1,95) = 17.11, </span><i data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">p</span></i><span data-dcnode-id="5048" instrument_node=""> &lt; 0.001, R</span><sup data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5045" instrument_node=""> = 0.18) of the light; participants evaluated the 100&nbsp;lx light as more pleasant than the 1000&nbsp;lx light, while they rated 1000&nbsp;lx light as brighter and more exciting than the 100&nbsp;lx light. Moreover, CCT elicited a significant effect on the perceived warmth (F (1,50) = 13.52, </span><i data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">p</span></i><span data-dcnode-id="5042" instrument_node=""> = 0.001, R</span><sup data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">2pseudo</span></sup><span data-dcnode-id="5039" instrument_node=""> =  − 0.09), brightness (F (1,49) = 7.36, </span><i data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">p</span></i><span data-dcnode-id="5036" instrument_node=""> = 0.009) of the light. Participants evaluated the 2700&nbsp;K light as warmer than 6500&nbsp;K light, but they perceived the 6500&nbsp;K light as brighter than 2700&nbsp;K light. In addition, no interaction effect between Illuminance and CCT was found (Table </span><a data-dcnode-id="5034" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="5035" instrument_node="">3</span></a><span data-dcnode-id="5033" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="5017" data-test="inline-table" id="table-3"><figure data-dcnode-id="5018"><figcaption class="c-article-table__figcaption" data-dcnode-id="5029"><b data-dcnode-id="5030" data-test="table-caption" id="Tab3"><span data-dcnode-id="5031" instrument_node="">Table 3 Results for subjective measures (sleepiness, mood, evaluation of lighting conditions).</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="5019"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="5020" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-93523-y/tables/3" rel="nofollow"><span data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5021" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5022" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5023" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5026" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5025" fill-rule="evenodd"></path><span data-dcnode-id="5024" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="4884" data-title="Discussion"><div class="c-article-section" data-dcnode-id="4885" id="Sec21-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5012" id="Sec21"><span data-dcnode-id="5013" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="4886" id="Sec21-content"><p data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">Although the antidepressant effect of light therapy and the acute effects of short-term light exposure on subjective affective state have been widely investigated, few studies have investigated the acute effects of indoor light on pure emotional perception. The current study was conducted to explore the individual and interaction regulation of illuminance and CCT of inddor light on explicit and implicit emotion perception tasks with controlling the prior affective and vigliance state. The results mainly revealed that the lower CCT decreased the negative response bias during emotional face judgment. Nevertheless, no such modulation effects of CCT were found on attentional negativity bias as assessed with the emotional oddball task. Reaction speed to emotional faces and pictures was not significantly affected with light manipulation. Moreover, the results did not reveal any significant effects of light manipulations on subjective momentary alertness and mood. These findings contributed to the current studies suggesting a type of task-dependent modulation effect of CCT in emotional perception and the differential role of CCT and the illuminance of indoor light in regulating emotion perception.</span></p><p data-dcnode-id="5001"><span data-dcnode-id="5009" instrument_node="">For the explicit emotional perception, the CCT manipulation significantly regulated individuals' negative response bias, such that participants perceived the same set of faces as less fearful in 2700&nbsp;K light than in 6500&nbsp;K light in the emotional face judgment task. Furthermore, it is notable that reaction time may also have to do with this negativity bias, as a previous study found that there was a significant correlation between reaction time and valence bias, that is, the faster participants responded to ambiguous faces, the more likely they were to judge them as negative</span><sup data-dcnode-id="5006"><a aria-label="Reference 72" data-dcnode-id="5007" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d322170568e3526" title="Neta, M. &amp; Tong, T. T. Don’t like what you see? Give it time: Longer reaction times associated with increased positive affect. Emotion 16, 730 (2016)."><span data-dcnode-id="5008" instrument_node="">72</span></a></sup><span data-dcnode-id="5005" instrument_node="">. We thus conducted an additional statistical analysis of the reaction time at seven fearful levels, and the results showed that the RT of different fearful levels under the two CCT conditions were not significant (</span><i data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">p</span></i><span data-dcnode-id="5002" instrument_node=""> = 0.24), suggesting there was no contribution of the correlation between the reaction speed and negativity bias in the current study.</span></p><p data-dcnode-id="4972"><span data-dcnode-id="5000" instrument_node="">The light-rendered emotional scene could partly explain these findings since facial expression recognition was proved to be susceptible to scene information (a picture of an emotional scene that presents before or simultaneously as the face stimulus present)</span><sup data-dcnode-id="4991"><a data-dcnode-id="4998" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d322170568e3536" title="Barrett, L. F., Mesquita, B. &amp; Gendron, M. Context in emotion perception. Curr. Dir. Psychol. Sci. 20, 286–290. 
                  https://doi.org/10.1177/0963721411422522
                  
                 (2011)."><span data-dcnode-id="4999" instrument_node="">73</span></a><span data-dcnode-id="4997" instrument_node="">,</span><a data-dcnode-id="4995" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d322170568e3536_1" title="Righart, R. &amp; de Gelder, B. Context influences early perceptual analysis of faces—An electrophysiological study. Cereb. Cortex 16, 1249–1257. 
                  https://doi.org/10.1093/cercor/bhj066
                  
                 (2006)."><span data-dcnode-id="4996" instrument_node="">74</span></a><span data-dcnode-id="4994" instrument_node="">,</span><a aria-label="Reference 75" data-dcnode-id="4992" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d322170568e3539" title="Wieser, M. J. &amp; Brosch, T. Faces in context: A review and systematization of contextual influences on affective face processing. Front. Psychol. 3, 471. 
                  https://doi.org/10.3389/fpsyg.2012.00471
                  
                 (2012)."><span data-dcnode-id="4993" instrument_node="">75</span></a></sup><span data-dcnode-id="4990" instrument_node="">. To be specific, the room with warm-white light (less than 3500&nbsp;K) was inclined to be perceived as a more positive (i.e., pleasant, attractive, and relaxed) atmosphere than a room with cool-white light (with relatively high CCT). In contrast, light with high CCT (equal to or greater than 5000&nbsp;K) was perceived as a more negative atmosphere than light with low CCT</span><sup data-dcnode-id="4978"><a data-dcnode-id="4988" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d322170568e3543" title="Cui, Z., Hao, L. &amp; Xu, J. A study on the emotional and visual influence of the CICU luminous environment on patients and nurses. J. Asian Architect. Build. Eng. 16, 625–632. 
                  https://doi.org/10.3130/jaabe.16.625
                  
                 (2018)."><span data-dcnode-id="4989" instrument_node="">76</span></a><span data-dcnode-id="4987" instrument_node="">,</span><a data-dcnode-id="4985" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d322170568e3543_1" title="Wei, M. et al. Field study of office worker responses to fluorescent lighting of different CCT and lumen output. J. Environ. Psychol. 39, 62–76. 
                  https://doi.org/10.1016/j.jenvp.2014.04.009
                  
                 (2014)."><span data-dcnode-id="4986" instrument_node="">77</span></a><span data-dcnode-id="4984" instrument_node="">,</span><a data-dcnode-id="4982" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d322170568e3543_2" title="Tantanatewin, W. &amp; Inkarojrit, V. Effects of color and lighting on retail impression and identity. J. Environ. Psychol. 46, 197–205. 
                  https://doi.org/10.1016/j.jenvp.2016.04.015
                  
                 (2016)."><span data-dcnode-id="4983" instrument_node="">78</span></a><span data-dcnode-id="4981" instrument_node="">,</span><a aria-label="Reference 79" data-dcnode-id="4979" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d322170568e3546" title="Yu, H. &amp; Akita, T. The effect of illuminance and correlated colour temperature on perceived comfort according to reading behaviour in a capsule hotel. Build. Environ. 148, 384–393. 
                  https://doi.org/10.1016/j.buildenv.2018.11.027
                  
                 (2019)."><span data-dcnode-id="4980" instrument_node="">79</span></a></sup><span data-dcnode-id="4977" instrument_node="">. The findings from the study by Lee et al.</span><sup data-dcnode-id="4974"><a aria-label="Reference 80" data-dcnode-id="4975" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d322170568e3550" title="Lee, T., Choi, J. &amp; Cho, Y. S. Context modulation of facial emotion perception differed by individual difference. PLoS ONE 7, e32987 (2012)."><span data-dcnode-id="4976" instrument_node="">80</span></a></sup><span data-dcnode-id="4973" instrument_node=""> also revealed that individuals' perceptual thresholds for a morphed face continuum(neutral (0%) to fearful (100%) in 10% increments) was influenced by scene information, with ambiguous fearful facial expressions being more efficiently categorized as fearful when they were embedded in a negative scene relative to a neutral or positive one. Thus, in the current study, the ambient light presented a different color appearance due to its different CCT, which also led to the occurrence of scene effects.</span></p><p data-dcnode-id="4952"><span data-dcnode-id="4971" instrument_node="">Another possible explanation for the low CCT induced regulation of attenuated negative emotional bias is that the low ambient CCT induced warm perception of ambient light might prime participants to perceive neutral faces as more positive. One recent study by Gu et al.</span><sup data-dcnode-id="4968"><a aria-label="Reference 81" data-dcnode-id="4969" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d322170568e3557" title="Gu, Z., Yang, Z., Dai, Y., Tan, X. &amp; Wang, X. The influence of background color on emotion recognition from facial expression: From the perspective of metaphor. J. Psychol. Sci. 3541–3546. 
                  https://doi.org/10.16719/j.cnki.1671-6981.20160305
                  
                 (2016).
"><span data-dcnode-id="4970" instrument_node="">81</span></a></sup><span data-dcnode-id="4967" instrument_node=""> reported that individuals were more likely to recognize neutral faces as happy on a warm-colored background than a cool-colored background. These findings could be explained by the embodied cognition theory, suggesting the perception of the physical environment (such as cold and warm, bright and dark) will trigger the activation of the higher-level psychological concepts (such as good and bad)</span><sup data-dcnode-id="4961"><a aria-label="Reference 82" data-dcnode-id="4965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d322170568e3561" title="Niedenthal, P. M., Barsalou, L. W., Winkielman, P., Krauth-Gruber, S. &amp; Ric, F. Embodiment in attitudes, social perception, and emotion. Pers. Soc. Psychol. Rev. 9, 184–211 (2005)."><span data-dcnode-id="4966" instrument_node="">82</span></a><span data-dcnode-id="4964" instrument_node="">,</span><a aria-label="Reference 83" data-dcnode-id="4962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d322170568e3564" title="Williams, L. E., Huang, J. Y. &amp; Bargh, J. A. The Scaffolded Mind: Higher mental processes are grounded in early experience of the physical world. Eur. J. Soc. Psychol. 39, 1257–1267 (2009)."><span data-dcnode-id="4963" instrument_node="">83</span></a></sup><span data-dcnode-id="4960" instrument_node="">. For instance, the previous studies reported that environmentally induced warm conditions (touching warm beverages/pack or placing participants in warm ambient conditions) were associated with more positive behaviors</span><sup data-dcnode-id="4954"><a aria-label="Reference 84" data-dcnode-id="4958" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d322170568e3568" title="Ijzerman, H. &amp; Semin, G. R. The thermometer of social relations: Mapping social proximity on temperature. Psychol. Sci. 20, 1214–1220 (2009)."><span data-dcnode-id="4959" instrument_node="">84</span></a><span data-dcnode-id="4957" instrument_node="">,</span><a aria-label="Reference 85" data-dcnode-id="4955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d322170568e3571" title="Kang, Y., Williams, L. E., Clark, M. S., Gray, J. R. &amp; Bargh, J. A. Physical temperature effects on trust behavior: The role of insula. Soc. Cogn. Affect. Neurosci. 6, 507–515 (2011)."><span data-dcnode-id="4956" instrument_node="">85</span></a></sup><span data-dcnode-id="4953" instrument_node="">.</span></p><p data-dcnode-id="4946"><span data-dcnode-id="4951" instrument_node="">Contrary to explicit emotional perception, the implicit emotion perception was not significantly regulated by the manipulation of light level and CCT. However, the current findings revealed a stronger attentional bias to the emotional pictures, with higher accuracy and faster reaction speed for positive and negative pictures than neutral pictures, regardless of the light manipulations. These findings were comparable to the study by Huang and Luo</span><sup data-dcnode-id="4948"><a aria-label="Reference 86" data-dcnode-id="4949" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d322170568e3579" title="Huang, Y. X. &amp; Luo, Y. J. Temporal course of emotional negativity bias: An ERP study. Neurosci. Lett. 398, 91–96. 
                  https://doi.org/10.1016/j.neulet.2005.12.074
                  
                 (2006)."><span data-dcnode-id="4950" instrument_node="">86</span></a></sup><span data-dcnode-id="4947" instrument_node="">, which revealed an emotional effect, as evidenced by mean reaction time was as shorter for emotional stimuli than neutral stimuli. Differentiating versus explicit emotional processing, this performance improvement in emotional stimulus was independent of CCT and illuminance, suggesting that CCT did not moderate the attentional bias in the implicit task.</span></p><p data-dcnode-id="4932"><span data-dcnode-id="4945" instrument_node="">Regarding the task-dependent regulation (only manifested in the explicit emotion task) of lighting on emotional perception in the current study, this may be due to the differences in the dominant processes of these two tasks. The judgment of the face inclined to be perceptual processing via "top-down" influences</span><sup data-dcnode-id="4942"><a aria-label="Reference 87" data-dcnode-id="4943" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d322170568e3586" title="Puce, A., Allison, T. &amp; McCarthy, G. Electrophysiological studies of human face perception. III: Effects of top-down processing on face-specific potentials. Cereb. Cortex 9, 445–458 (1999)."><span data-dcnode-id="4944" instrument_node="">87</span></a></sup><span data-dcnode-id="4941" instrument_node="">, while the response to the emotional pictures in the oddball task involved more "bottom-up" attention</span><sup data-dcnode-id="4938"><a aria-label="Reference 88" data-dcnode-id="4939" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d322170568e3590" title="Adolphs, R. Neural systems for recognizing emotion. Curr. Opin. Neurobiol. 12, 169–177. 
                  https://doi.org/10.1016/s0959-4388(02)00301-x
                  
                 (2002)."><span data-dcnode-id="4940" instrument_node="">88</span></a></sup><span data-dcnode-id="4937" instrument_node="">. As stated in the introduction, bright light and light of short wavelength could modulate neural activities in both top-down and bottom-up attentional pathways</span><sup data-dcnode-id="4934"><a aria-label="Reference 89" data-dcnode-id="4935" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d322170568e3594" title="Vandewalle, G. et al. Spectral quality of light modulates emotional brain responses in humans. Proc. Natl. Acad. Sci. USA 107, 19549–19554. 
                  https://doi.org/10.1073/pnas.1010180107
                  
                 (2010)."><span data-dcnode-id="4936" instrument_node="">89</span></a></sup><span data-dcnode-id="4933" instrument_node="">. Different from high-intensity polychromatic light and monochromatic blue light, the polychromatic light with a relatively low blue spectrum may only have a more significant regulatory effect on a particular neural pathway (i.e., the top-down processes). Nevertheless, as the behavioral measurement approach was employed in the current, we had no conclusive findings of this explanation.</span></p><p data-dcnode-id="4912"><span data-dcnode-id="4931" instrument_node="">In addition to explicit and implicit emotion perception, the current study also investigated the acute effects of light manipulation on momentary mood and sleepiness. The findings revealed no statistically significant individual or interacted regulation of high illuminance and CCT level on subjective sleepiness and mood. This finding is in line with several studies in which participants' subjective sleepiness remained unaffected after 50&nbsp;min exposure to 1000&nbsp;lx vs. 200&nbsp;lx light</span><sup data-dcnode-id="4925"><a aria-label="Reference 25" data-dcnode-id="4929" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d322170568e3601" title="Ru, T., de Kort, Y. A. W., Smolders, K. C. H. J., Chen, Q. &amp; Zhou, G. Non-image forming effects of illuminance and correlated color temperature of office light on alertness, mood, and performance across cognitive domains. Build. Environ. 149, 253–263. 
                  https://doi.org/10.1016/j.buildenv.2018.12.002
                  
                 (2019)."><span data-dcnode-id="4930" instrument_node="">25</span></a><span data-dcnode-id="4928" instrument_node="">,</span><a aria-label="Reference 34" data-dcnode-id="4926" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d322170568e3604" title="Huiberts, L. M., Smolders, K. C. &amp; de Kort, Y. A. Non-image forming effects of illuminance level: Exploring parallel effects on physiological arousal and task performance. Physiol. Behav. 164, 129–139. 
                  https://doi.org/10.1016/j.physbeh.2016.05.035
                  
                 (2016)."><span data-dcnode-id="4927" instrument_node="">34</span></a></sup><span data-dcnode-id="4924" instrument_node=""> as well to 6000&nbsp;K vs. 2700&nbsp;K light</span><sup data-dcnode-id="4921"><a aria-label="Reference 30" data-dcnode-id="4922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d322170568e3608" title="Smolders, K. C. H. J. &amp; de Kort, Y. A. W. Investigating daytime effects of correlated colour temperature on experiences, performance, and arousal. J. Environ. Psychol. 50, 80–93. 
                  https://doi.org/10.1016/j.jenvp.2017.02.001
                  
                 (2017)."><span data-dcnode-id="4923" instrument_node="">30</span></a></sup><span data-dcnode-id="4920" instrument_node="">. Furthermore, the null effect of CCT level on sleepiness in the current study may be explained by the fact that the short exposure duration and medium–high CCT level were insufficient to produce an alerting effect. There was evidence that the alerting effects of a higher CCT level were occasionally reported when more extended exposure periods (several weeks) or extremely high CCT levels (17,000&nbsp;K vs. 4000&nbsp;K)</span><sup data-dcnode-id="4914"><a aria-label="Reference 29" data-dcnode-id="4918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d322170568e3612" title="Mills, P. R., Tomkins, S. C. &amp; Schlangen, L. J. The effect of high correlated colour temperature office lighting on employee wellbeing and work performance. J. Circadian Rhythms 5, 2. 
                  https://doi.org/10.1186/1740-3391-5-2
                  
                 (2007)."><span data-dcnode-id="4919" instrument_node="">29</span></a><span data-dcnode-id="4917" instrument_node="">,</span><a aria-label="Reference 90" data-dcnode-id="4915" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d322170568e3615" title="Viola, A. U., James, L. M., Schlangen, L. J. &amp; Dijk, D. J. Blue-enriched white light in the workplace improves self-reported alertness, performance and sleep quality. Scand J. Work Environ. Health 34, 297–306. 
                  https://doi.org/10.5271/sjweh.1268
                  
                 (2008)."><span data-dcnode-id="4916" instrument_node="">90</span></a></sup><span data-dcnode-id="4913" instrument_node=""> was employed.</span></p><p data-dcnode-id="4893"><span data-dcnode-id="4911" instrument_node="">Similarly, the subjective mood remained insensitive to the illuminance and CCT manipulation in the current study, reflecting the results of the previous studies</span><sup data-dcnode-id="4902"><a aria-label="Reference 28" data-dcnode-id="4909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d322170568e3622" title="Smolders, K. C., de Kort, Y. A. &amp; Cluitmans, P. J. A higher illuminance induces alertness even during office hours: Findings on subjective measures, task performance and heart rate measures. Physiol. Behav. 107, 7–16. 
                  https://doi.org/10.1016/j.physbeh.2012.04.028
                  
                 (2012)."><span data-dcnode-id="4910" instrument_node="">28</span></a><span data-dcnode-id="4908" instrument_node="">,</span><a aria-label="Reference 33" data-dcnode-id="4906" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d322170568e3625" title="Huiberts, L. M., Smolders, K. C. &amp; de Kort, Y. A. Shining light on memory: Effects of bright light on working memory performance. Behav. Brain Res. 294, 234–245. 
                  https://doi.org/10.1016/j.bbr.2015.07.045
                  
                 (2015)."><span data-dcnode-id="4907" instrument_node="">33</span></a><span data-dcnode-id="4905" instrument_node="">,</span><a aria-label="Reference 34" data-dcnode-id="4903" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d322170568e3628" title="Huiberts, L. M., Smolders, K. C. &amp; de Kort, Y. A. Non-image forming effects of illuminance level: Exploring parallel effects on physiological arousal and task performance. Physiol. Behav. 164, 129–139. 
                  https://doi.org/10.1016/j.physbeh.2016.05.035
                  
                 (2016)."><span data-dcnode-id="4904" instrument_node="">34</span></a></sup><span data-dcnode-id="4901" instrument_node="">. A possible explanation might be that the two-item scale employed in the current study might not be sensitive to detecting tiny changes in mood. Other researchers reported significant effects of illuminance or CCT of daytime light on the mood that was assessed with multiple items questionaires</span><sup data-dcnode-id="4895"><a aria-label="Reference 25" data-dcnode-id="4899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d322170568e3632" title="Ru, T., de Kort, Y. A. W., Smolders, K. C. H. J., Chen, Q. &amp; Zhou, G. Non-image forming effects of illuminance and correlated color temperature of office light on alertness, mood, and performance across cognitive domains. Build. Environ. 149, 253–263. 
                  https://doi.org/10.1016/j.buildenv.2018.12.002
                  
                 (2019)."><span data-dcnode-id="4900" instrument_node="">25</span></a><span data-dcnode-id="4898" instrument_node="">,</span><a aria-label="Reference 39" data-dcnode-id="4896" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d322170568e3635" title="Zhu, Y. et al. Effects of illuminance and correlated color temperature on daytime cognitive performance, subjective mood, and alertness in healthy adults. Environ. Behav. 51, 199–230. 
                  https://doi.org/10.1177/0013916517738077
                  
                 (2019)."><span data-dcnode-id="4897" instrument_node="">39</span></a></sup><span data-dcnode-id="4894" instrument_node="">. Moreover, participants in the current study had a relatively agreeable emotional state at baseline (EMM = 3.69 for happy and EMM = 2.00 for sad on the five-point items), such that lead a limited room for improvement of mood with light manipulation. In contrast to the effects on alertness and mood, the current findings demonstrate a more consistent picture regarding light's effects on subjective evaluation of experimental light. The light of 1000&nbsp;lx and light of 6500&nbsp;K were both perceived as brighter and more exciting; the light of 1000&nbsp;lx was rated as more pleasant than the light of 100&nbsp;lx, and the light of 2700&nbsp;K was rated as warmer than the light of 6500&nbsp;K.</span></p><p data-dcnode-id="4887"><span data-dcnode-id="4892" instrument_node="">Some limitations of the current study must be considered before generalizing the experimental results. First, the light exposure duration in the current study was relatively short (only about 30&nbsp;min), and its modulatory effect on mood and negativity bias may not be fully manifested. Secondly, the effect of time of day was not considered in this study due to the limited number of samples, which was established as a moderator of the diurnal NIF effects of light on physiological and psychological activities</span><sup data-dcnode-id="4889"><a aria-label="Reference 30" data-dcnode-id="4890" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d322170568e3642" title="Smolders, K. C. H. J. &amp; de Kort, Y. A. W. Investigating daytime effects of correlated colour temperature on experiences, performance, and arousal. J. Environ. Psychol. 50, 80–93. 
                  https://doi.org/10.1016/j.jenvp.2017.02.001
                  
                 (2017)."><span data-dcnode-id="4891" instrument_node="">30</span></a></sup><span data-dcnode-id="4888" instrument_node="">. Thirdly, the non-nonclinical sample employed might limit the transfer of the current findings into the clinical field. Future studies should conduct a randomized controlled trial on the effect of light on emotional processing among individuals diagnosed with seasonal affective disorder.</span></p></div></div></section><section data-dcnode-id="4877" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="4878" id="Sec22-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4882" id="Sec22"><span data-dcnode-id="4883" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="4879" id="Sec22-content"><p data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">In conclusion, no significant main or interaction effects of illuminance and CCT on subjective sleepiness and mood were found in the current study. The findings demonstrated that low CCT decreased individuals' negative response bias, labeling ambiguous faces as less fearful during explicit emotional judgment independent of illuminance. In comparison, no significant regulating effect of light (illuminance and CCT) on the attentional negativity bias in the implicit emotional oddball task was revealed. These findings contribute to the current studies suggesting a type of task-dependent modulation effect of CCT in emotional perception and the differential role of CCT and the illuminance of indoor light in regulating emotion perception.</span></p></div></div></section><span data-dcnode-id="4876" instrument_node="">
