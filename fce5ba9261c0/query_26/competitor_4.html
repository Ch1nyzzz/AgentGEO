v class="ReferenceLinks u-font-sans" data-dcnode-id="485"><span data-dcnode-id="488" instrument_node=""></span><a aria-describedby="ref-id-sbref164" class="link" data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DExamining%2520colour-receptacle-flavour%2520interactions%2520for%2520Asian%2520noodles%26publication_year%3D2015%26author%3DX.%2520Zhou%26author%3DX.%2520Wan%26author%3DB.%2520Mu%26author%3DD.%2520Du%26author%3DC.%2520Spence" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="487" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section></div><div data-dcnode-id="325" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="326"><div class="PageDivider" data-dcnode-id="479"></div><header data-dcnode-id="476" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Cited by (18)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="327"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="328"><ul data-dcnode-id="334"><li class="ListArticleItem" data-dcnode-id="458"><div class="sub-heading" data-dcnode-id="470"><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950329321003542" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="474" id="citing-articles-article0-title"><span data-dcnode-id="475" instrument_node="">Impact of context in visual evaluation of design pastry: Comparison of real and virtual</span></h3></a><div class="article-source ellipsis" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">2022, Food Quality and Preference</span></div></div><div class="buttons" data-dcnode-id="464"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="465" type="button"><span class="button-link-text" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="466" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="467"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="459"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="460" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="461"><p data-dcnode-id="462" id="sp0010"><span data-dcnode-id="463" instrument_node="">Virtual reality is becoming an opportunity for multidisciplinary collaboration, including sensory science. The main objective of this work was to compare visual expectations generated by five real cakes evaluated in a laboratory testing booth with their virtual versions in a virtualized sensory booth. Real cakes were designed following the current pastries trends, and virtualization was made using a photogrammetric process. The virtual sensory booth was designed using Unity3D software. The participants were immersed in the 3D virtual environment through a head-mounted display (HMD). Data were analyzed using ANOVA mixed model, internal preference mapping and cluster analysis. The effects of context (real and virtual), the order in test session (crossover design), and socio-demographic factors were studied. The results showed no statistically significant differences within real and virtual studied cakes. These results create new perspectives of the potential of this methodology to be used to rate virtual foods in an immersive environment at the same level as real foods. Regarding the impact of the socio-demographic factors on the acceptance of the cakes, only the effects of gender and sweet-tooth were statistically significant. Males assessed all variables associated with the cakes significantly higher (p&nbsp;&lt;&nbsp;0.05) than females. In the same way, all variables in all cakes were better evaluated by participants with a self-declared sweet-tooth (p&nbsp;&lt;&nbsp;0.05). In the internal preference map, participants were segmented into three clusters that could be identified with the different trends in the pastries market. These results may help companies build tailor-made marketing strategies using Immersive technologies to evaluate new food products to satisfy different consumer segments.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="434"><div class="sub-heading" data-dcnode-id="452"><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950329320302056" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="456" id="citing-articles-article1-title"><span data-dcnode-id="457" instrument_node="">Time-course analysis of food cue processing: An eye-tracking investigation on context effects</span></h3></a><div class="article-source ellipsis" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">2020, Food Quality and Preference</span></div></div><div class="buttons" data-dcnode-id="446"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="447" type="button"><span class="button-link-text" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="448" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="449"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="435"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="436" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="437"><p data-dcnode-id="444" id="sp0010"><span data-dcnode-id="445" instrument_node="">Previous eye-tracking research has demonstrated that high-calorie food cues capture visual attention, particularly in individuals with overweight and weight concerns. The present experiment investigated whether this attentional bias can be influenced by context variables (i.e., the presence of pleasant low-calorie cues), and changes over time. This was studied via time-course analysis.</span></p><p data-dcnode-id="442" id="sp0015"><span data-dcnode-id="443" instrument_node="">Ninety women (mean age&nbsp;=&nbsp;25&nbsp;years) were presented with 60 picture pairs (à 6&nbsp;s) that either showed a combination of high-calorie food&nbsp;+&nbsp;low-calorie food, high-calorie food&nbsp;+&nbsp;non-food, or low-calorie food&nbsp;+&nbsp;non-food. The women were assigned to one of three groups (n&nbsp;=&nbsp;30): overweight with weight concerns (OW+), normal-weight with weight concerns (NW+), normal weight without weight concerns (NW-). The relative number of fixations on (high-calorie) food cues was examined across the course of the picture pair presentations for one-second intervals.</span></p><p data-dcnode-id="440" id="sp0020"><span data-dcnode-id="441" instrument_node="">High-calorie food was fixated more often than low-calorie food and non-food only during the first second of the picture pair presentation. Subsequently, all participants (independent of the group assignment) showed the tendency to gaze on low-calorie cues when these cues were combined with high-calorie cues.</span></p><p data-dcnode-id="438" id="sp0025"><span data-dcnode-id="439" instrument_node="">This study revealed timing-related context effects on visual food cue reactivity. While the early attentional bias to high-calorie cues could not be changed by context, this was possible during the later processing stage. Future studies need to examine whether the observed context effect can influence food choices and eating behavior.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="410"><div class="sub-heading" data-dcnode-id="428"><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0023643820301262" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="432" id="citing-articles-article2-title"><span data-dcnode-id="433" instrument_node="">The influence of almond flour, inulin and whey protein on the sensory and microbiological quality of goat milk yogurt</span></h3></a><div class="article-source ellipsis" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">2020, LWT</span></div></div><div class="buttons" data-dcnode-id="422"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="423" type="button"><span class="button-link-text" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="424" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="425"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="411"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="412" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="413"><p data-dcnode-id="414" id="abspara0010"><span data-dcnode-id="421" instrument_node="">A set of six formulations of goat yogurt added with mix of starter (</span><em data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Lactobacillus bulgaricus</span></em><span data-dcnode-id="418" instrument_node=""> and </span><em data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Streptococcus thermophilus</span></em><span data-dcnode-id="415" instrument_node="">), inulin, almond flour and whey protein have been evaluated in Italy and Czech Republic by microbiological and sensory analyses. The yogurt were prepared in the two laboratories involved in testing using the same raw materials found on the Italian market and provided to Czech researchers. The panel of each country separately defined sensory profiles by applying the same methodology. The results had shown a different discrimination of samples: the Italian panel, habitual consumer of goat dairy products, discriminated samples for goat yogurt aroma and flavor; the Czech panel, used to consume fermented milk, discriminated samples for acid descriptor. For both the panels, the addition of inulin was assessed as irrelevant, while the addition of whey was assessed as relevant. The addition of prebiotics, almond flour and inulin, did not affect microbial counts.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="386"><div class="sub-heading" data-dcnode-id="398"><a data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0963996919305642" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="408" id="citing-articles-article3-title"><span data-dcnode-id="409" instrument_node="">Drinking through rosé-coloured glasses: Influence of wine colour on the perception of aroma and flavour in wine experts and novices</span></h3></a><div class="article-source ellipsis" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">2019, Food Research International</span></div><div class="CitedSection" data-dcnode-id="399"><div class="snippet" data-dcnode-id="400"><div class="cite-header" data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">This is different from previous studies (Morrot et al., 2001; Parr et al., 2003) where only orthonasal aroma was recorded. This is important because one cannot assume that a colour's effect on orthonasal olfactory judgments of food/drink flavour will necessarily be the same when people come to actually taste the food or drink item (Spence &amp; Piqueras-Fiszman, 2016, p. 115; see also Koza, Cilmi, Dolese, &amp; Zellner, 2005). 2) Linguistic analysis with freely selected descriptors.</span></p></div></div></div><div class="buttons" data-dcnode-id="392"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="393" type="button"><span class="button-link-text" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="394" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="395"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="387"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="388" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="389"><p data-dcnode-id="390" id="sp0055"><span data-dcnode-id="391" instrument_node="">Wine colour carries a myriad of meanings regarding the provenance and expected sensory qualities of a wine. That meaning is presumably learnt through association, and part of a wine taster's skill comes from being able to decode information that can be discerned in subtle variations in the colour of the wine that they drink/evaluate. However, reliance on colour means that wine tasters, especially experts, often exhibit colour-induced olfactory biases. The present study assesses how wine colour – specifically the pink hue of rosé wines – can influence both the perceived aroma and flavour in a large sample of wine novices and experts. Participants (N = 168) tasted three wines – a white wine (W), a rosé wine (R), and the white wine dyed to match the rosé (Ŕ) – and freely selected three aroma and three flavour descriptors from a list. They also rated wine liking, flavour intensity, and description difficulty for each wine. Linguistic analysis demonstrated that those with wine tasting experience judged Ŕ to be much more similar to R than to W, even though Ŕ and W were the same. Moreover, red fruit descriptors were attributed to both R and Ŕ, especially in terms of flavour. Quantitative ratings revealed that Ŕ was liked less than W or R, and participants found it more difficult to describe Ŕ than R. These results demonstrate that while participants found the dyed rosé somehow different from the undyed wines, they nevertheless used the red fruit terms to describe its aroma and flavour. The implications of such results in terms of cognitive representations of wine and the role of sensory expectations are discussed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="359"><div class="sub-heading" data-dcnode-id="374"><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0963996918306136" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="384" id="citing-articles-article4-title"><span data-dcnode-id="385" instrument_node="">Measuring dynamics of emotions evoked by the packaging colour of hamburgers using Temporal Dominance of Emotions (TDE)</span></h3></a><div class="article-source ellipsis" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">2019, Food Research International</span></div><div class="CitedSection" data-dcnode-id="375"><div class="snippet" data-dcnode-id="376"><div class="cite-header" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Packaging colour has a physiological, cultural and associative effect in the consumer's perception (Piqueras-Fiszman &amp; Spence, 2011). Even subtle colour changes in packaging can alter sensory perception (Piqueras-Fiszman, Velasco, &amp; Spence, 2012), creating expectations of a food's taste and odor (Spence &amp; Piqueras-Fiszman, 2016). Therefore, different emotions can be triggered when the packaging colour is changed, which will most likely determine the pleasure in buying (Hirschman &amp; Holbrook, 1982) and in consuming the product.</span></p></div></div></div><div class="buttons" data-dcnode-id="368"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="369" type="button"><span class="button-link-text" data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="370" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="371"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="360"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="361" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="362"><p data-dcnode-id="363" id="sp0065"><span data-dcnode-id="367" instrument_node="">The packaging colour is one of the main extrinsic factors related to sensory perception as it can alter the emotions evoked by the product and, therefore, influence the moment of purchasing a product. There are several methods used to analyse emotions, but the Temporal Dominance of Emotions (TDE) approach stands out. This method allows the study of the temporality of dominant emotions until eating a portion of the hamburger. The aim of this work was to use TDE and overall acceptance to study the dynamic of the emotions evoked by the packaging colour of hamburgers, from first sight of the packaging until eating of a portion of hamburger. The twelve attributes of emotion, determined previously via a </span><em data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">focus group</span></em><span data-dcnode-id="364" instrument_node="">, were presented to the consumers to evaluate three different stimuli formed by three different coloured packaging (green, white and red) and the same hamburger. The results showed that acceptance alone is not sufficient to understand the choice of a product, most likely because it does not capture the emotions involved in the consumption of a hamburger. Significant differences were found in the dynamic perception of emotions influenced by the packaging colour along time, mainly during the first “packaging – consumer” contact. Finally, the study of the dynamics of emotions provided valuable and complementary information to overall acceptance.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="335"><div class="sub-heading" data-dcnode-id="347"><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950329318310012" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="357" id="citing-articles-article5-title"><span data-dcnode-id="358" instrument_node="">Cup colour influences consumers’ expectations and experience on tasting specialty coffee</span></h3></a><div class="article-source ellipsis" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">2019, Food Quality and Preference</span></div><div class="CitedSection" data-dcnode-id="348"><div class="snippet" data-dcnode-id="349"><div class="cite-header" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Specifically, anticipatory cues are those that help in setting expectations before the food or drink enters the mouth, and include orthonasal smell, vision, audition, and somatosensation. According to the literature, visual information, especially colour cues – provide an especially important source of cues concerning taste/flavour expectations (see Piqueras-Fiszman &amp; Spence, 2015; Spence &amp; Piqueras-Fiszman, 2016, for reviews). Studies conducted over the last three decades in a number of different countries have highlighted a remarkable degree of consistency when people are asked to match colours and basic tastes (see Spence et al., 2015, for a review).</span></p></div></div></div><div class="buttons" data-dcnode-id="341"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="342" type="button"><span class="button-link-text" data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="343" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="344"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="336"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="337" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="338"><p data-dcnode-id="339" id="sp0010"><span data-dcnode-id="340" instrument_node="">The present study was designed to investigate the effect of the colour of the cup on sensory and hedonic judgments of specialty coffee by consumers. Altogether, 457 participants took part in one of three experiments. Crossmodal correspondences between the colour of the cup (i.e., an extrinsic cue) and the taste profile of the coffee served (i.e., the contents) were manipulated. Congruent and incongruent colour × taste pairings were created by using four cup colours (white, pink, yellow, and green) and two coffee profiles (sweet Brazilian and acidic Kenyan) to assess whether these manipulations would affect pre-and/or post-tasting ratings. Participants first rated their expectations of sweetness and acidity, and subsequently, their experience of those attributes on tasting the coffees, as well as rating their liking. The results revealed that the colour of the cup exerted a significant influence on both pre- and post-tasting ratings for all attributes measured. Liking ratings significantly decreased in incongruent pairing conditions – which also increased the unexpected acidity of the Kenyan coffee when tasted from the pink cup. Taken together, these results demonstrate for the first time that the colour of the cup significantly impacts sensory and hedonic judgements of specialty coffee. Our results also show that the contrast between expected and actual experience can result in a negative hedonic response and the enhancement of the unexpected sensory attribute. Implications for the development of coffee cups that can enhance the drinking experience are highlighted.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84979899271%26md5%3Da08b8f6739faaa9efcbe93a564393d" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="332" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="333"></path></svg><span class="button-alternative-text" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="241"><dl class="footnote" data-dcnode-id="314"><dt class="footnote-label" data-dcnode-id="321"><sup data-dcnode-id="322"><a data-dcnode-id="323" href="#bfn1"><span data-dcnode-id="324" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="315"><p data-dcnode-id="316" id="ntp0010"><span data-dcnode-id="320" instrument_node="">While the term “product-intrinsic” is widely used in the literature when talking about the color of a food or beverage, the appropriateness of this notion can be questioned from the perspective of holistic perception. Strictly speaking, color is not a property of a material but rather a percept (or construct) in an observer that originates from an interaction with a material, under the influence of many other cues that are external to the colored surface, but certainly internal to the person who is observing it (see, eg, </span><a class="workspace-trigger" data-dcnode-id="318" href="#bib171" name="bbib171"><span data-dcnode-id="319" instrument_node="">Shepherd, 2012</span></a><span data-dcnode-id="317" instrument_node="">, p. 5).</span></p></dd></dl><dl class="footnote" data-dcnode-id="297"><dt class="footnote-label" data-dcnode-id="310"><sup data-dcnode-id="311"><a data-dcnode-id="312" href="#bfn2"><span data-dcnode-id="313" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="298"><p data-dcnode-id="299" id="ntp0015"><span data-dcnode-id="309" instrument_node="">Note that the participants in this study only ever had to report whether or not the solution had a taste. That is, they never had to identify the tastant. In fact, somewhat surprisingly, the question of whether color influences people’s ability to </span><em data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">identify/discriminate</span></em><span data-dcnode-id="306" instrument_node=""> the basic tastes has not been studied to date (see </span><a class="workspace-trigger" data-dcnode-id="304" href="#bib128" name="bbib128"><span data-dcnode-id="305" instrument_node="">Spence et al., 2010</span></a><span data-dcnode-id="303" instrument_node="">, for a review). This is despite the fact that extensive evidence has been collected concerning the colors that people in different cultures associate with each of the basic tastes (see </span><a class="workspace-trigger" data-dcnode-id="301" href="#bib130" name="bbib130"><span data-dcnode-id="302" instrument_node="">Spence et al., 2015</span></a><span data-dcnode-id="300" instrument_node="">; Wan, Woods et al., 2014b, for reviews and cross-cultural evidence).</span></p></dd></dl><dl class="footnote" data-dcnode-id="286"><dt class="footnote-label" data-dcnode-id="293"><sup data-dcnode-id="294"><a data-dcnode-id="295" href="#bfn3"><span data-dcnode-id="296" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="287"><p data-dcnode-id="288" id="ntp0020"><span data-dcnode-id="292" instrument_node="">That said, </span><a class="workspace-trigger" data-dcnode-id="290" href="#bib76" name="bbib76"><span data-dcnode-id="291" instrument_node="">Koza et al.’s (2005)</span></a><span data-dcnode-id="289" instrument_node=""> results concerning the differing effect of color on orthonasal and retronasal olfactory intensity judgments needs to be borne in mind here.</span></p></dd></dl><dl class="footnote" data-dcnode-id="272"><dt class="footnote-label" data-dcnode-id="282"><sup data-dcnode-id="283"><a data-dcnode-id="284" href="#bfn4"><span data-dcnode-id="285" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="273"><p data-dcnode-id="274" id="ntp0025"><span data-dcnode-id="281" instrument_node="">Elsewhere, researchers have also shown that serving food off red plates can be used to reduce people’s consumption (</span><a class="workspace-trigger" data-dcnode-id="279" href="#bib14" name="bbib14"><span data-dcnode-id="280" instrument_node="">Bruno et al., 2013</span></a><span data-dcnode-id="278" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="276" href="#bib51" name="bbib51"><span data-dcnode-id="277" instrument_node="">Genschow et al., 2012</span></a><span data-dcnode-id="275" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="264"><dt class="footnote-label" data-dcnode-id="268"><sup data-dcnode-id="269"><a data-dcnode-id="270" href="#bfn5"><span data-dcnode-id="271" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="265"><p data-dcnode-id="266" id="ntp0030"><span data-dcnode-id="267" instrument_node="">Although another, perhaps more plausible, explanation for why orange carrots may have been favored over the original purple variety was because the latter would color the soups, stews, etc. in which they were used.</span></p></dd></dl><dl class="footnote" data-dcnode-id="253"><dt class="footnote-label" data-dcnode-id="260"><sup data-dcnode-id="261"><a data-dcnode-id="262" href="#bfn6"><span data-dcnode-id="263" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="254"><p data-dcnode-id="255" id="ntp0035"><span data-dcnode-id="259" instrument_node="">Obviously not content with that, a red burger was recently launched (see </span><a class="workspace-trigger" data-dcnode-id="257" href="#bib8" name="bbib8"><span data-dcnode-id="258" instrument_node="">Anon., 2015</span></a><span data-dcnode-id="256" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="242"><dt class="footnote-label" data-dcnode-id="249"><sup data-dcnode-id="250"><a data-dcnode-id="251" href="#bfn7"><span data-dcnode-id="252" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="243"><p data-dcnode-id="244" id="ntp0040"><span data-dcnode-id="248" instrument_node="">Indeed, given the relatively small sample size, and the post-hoc nature of </span><a class="workspace-trigger" data-dcnode-id="246" href="#bib160" name="bbib160"><span data-dcnode-id="247" instrument_node="">Zampini et al.’s (2008)</span></a><span data-dcnode-id="245" instrument_node=""> finding, replication in a larger sample would undoubtedly be desirable to check on the generalizability of this potentially important result.</span></p></dd></dl></div><div class="Copyright" data-dcnode-id="238"><span class="copyright-line" data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Copyright © 2016 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="126"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="127"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="139"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="230" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="231" type="button"><span class="button
