_node="">Geier et al. (2012)</span></a><span data-dcnode-id="9837" instrument_node=""> conducted a study showing that people eat less potato chips from a tube if every seventh chip in the stack was colored red.</span><a class="workspace-trigger" data-dcnode-id="9834" href="#fn4" name="bfn4"><sup data-dcnode-id="9835"><span data-dcnode-id="9836" instrument_node="">4</span></sup></a></p></section><section data-dcnode-id="9801" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9828" id="st0060"><span data-dcnode-id="9831" instrument_node="">4.2</span><span data-dcnode-id="9830" instrument_node="">. </span><span data-dcnode-id="9829" instrument_node="">Off coloring in food</span></h3><p data-dcnode-id="9814" id="p0130"><span data-dcnode-id="9827" instrument_node="">Color is a key parameter to determine food quality and it serves as an indicator for consumers to predict when a food is becoming rotten or spoiled. Researchers have been interested in the response of consumers to food coloring that they associate with products that have been in some way spoiled. Anecdotal support for the suggestion that such off-colors have a profound effect on people’s food behaviors was suggested by the response of consumers to a batch of Tropicana grapefruit juice that was donated to a food bank back in 1981. According to </span><a class="workspace-trigger" data-dcnode-id="9825" href="#bib28" name="bbib28"><span data-dcnode-id="9826" instrument_node="">Crumpacker (2006, p. 6)</span></a><span data-dcnode-id="9824" instrument_node="">, nobody wanted to drink it because of its abnormal brown color. This was despite the fact that those who tried it reported that it tasted just fine (see also </span><a class="workspace-trigger" data-dcnode-id="9822" href="#bib41" name="bbib41"><span data-dcnode-id="9823" instrument_node="">Fernández-Vázquez et al., 2014</span></a><span data-dcnode-id="9821" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9819" href="#bib63" name="bbib63"><span data-dcnode-id="9820" instrument_node="">Hoegg &amp; Alba, 2007</span></a><span data-dcnode-id="9818" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9816" href="#bib138" name="bbib138"><span data-dcnode-id="9817" instrument_node="">Tepper, 1993</span></a><span data-dcnode-id="9815" instrument_node="">).</span></p><p data-dcnode-id="9802" id="p0135"><span data-dcnode-id="9813" instrument_node="">Meanwhile, the only thing that may have struck the guests at </span><a class="workspace-trigger" data-dcnode-id="9811" href="#bib154" name="bbib154"><span data-dcnode-id="9812" instrument_node="">Wheatley’s (1973)</span></a><span data-dcnode-id="9810" instrument_node=""> classic steak, chips, and peas dinner as odd was how dim the ambient lighting was. However, this hid the food’s true color. Part-way through the meal, the lighting was returned to normal, revealing that the steak was colored blue, the chips green, and the peas red. A number of Wheatley’s guests suddenly felt ill, with several of them apparently heading straight for the bathroom (cf. </span><a class="workspace-trigger" data-dcnode-id="9808" href="#bib91" name="bbib91"><span data-dcnode-id="9809" instrument_node="">Moir, 1936</span></a><span data-dcnode-id="9807" instrument_node="">). Here, it is noticeable how the majority of the research on the psychological impact of off-color in food is rather anecdotal in nature (presumably because it can be difficult to get ethical approval to present food to participants and have them believe that the color indicates that it has gone off). Nevertheless, the evidence such as it is, does at least hint at the strong avoidance responses that such food coloring can induce, especially in the case of meats and fish that happen to look off (see also </span><a class="workspace-trigger" data-dcnode-id="9805" href="#bib106" name="bbib106"><span data-dcnode-id="9806" instrument_node="">Profet, 1992</span></a><span data-dcnode-id="9804" instrument_node="">).</span><span data-dcnode-id="9803" id="p118"></span></p></section><section data-dcnode-id="9694" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9797" id="st0065"><span data-dcnode-id="9800" instrument_node="">4.3</span><span data-dcnode-id="9799" instrument_node="">. </span><span data-dcnode-id="9798" instrument_node="">Artificial/natural</span></h3><p data-dcnode-id="9732" id="p0140"><span data-dcnode-id="9796" instrument_node="">Over the years, there have been frequent concerns expressed about the negative health and well-being consequences associated with certain artificial food colorings (see </span><a class="workspace-trigger" data-dcnode-id="9794" href="#bib1" name="bbib1"><span data-dcnode-id="9795" instrument_node="">Accum, 1820</span></a><span data-dcnode-id="9793" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9791" href="#bib3" name="bbib3"><span data-dcnode-id="9792" instrument_node="">Anon, 1979a</span></a><span data-dcnode-id="9790" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9788" href="#bib4" name="bbib4"><span data-dcnode-id="9789" instrument_node="">Anon, 1979b</span></a><span data-dcnode-id="9787" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9785" href="#bib5" name="bbib5"><span data-dcnode-id="9786" instrument_node="">Anon, 1980</span></a><span data-dcnode-id="9784" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9782" href="#bib55" name="bbib55"><span data-dcnode-id="9783" instrument_node="">Goldenberg, 1977</span></a><span data-dcnode-id="9781" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9779" href="#bib60" name="bbib60"><span data-dcnode-id="9780" instrument_node="">Harris, 2011</span></a><span data-dcnode-id="9778" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9776" href="#bib77" name="bbib77"><span data-dcnode-id="9777" instrument_node="">Kramer, 1978</span></a><span data-dcnode-id="9775" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9773" href="#bib81" name="bbib81"><span data-dcnode-id="9774" instrument_node="">Lucas, Hallagan, &amp; Taylor, 2001</span></a><span data-dcnode-id="9772" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9770" href="#bib87" name="bbib87"><span data-dcnode-id="9771" instrument_node="">Meggos, 1995</span></a><span data-dcnode-id="9769" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9767" href="#bib118" name="bbib118"><span data-dcnode-id="9768" instrument_node="">Sinclair, 1906</span></a><span data-dcnode-id="9766" instrument_node="">, p. 93; </span><a class="workspace-trigger" data-dcnode-id="9764" href="#bib131" name="bbib131"><span data-dcnode-id="9765" instrument_node="">Stevens et al., 2013</span></a><span data-dcnode-id="9763" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9761" href="#bib140" name="bbib140"><span data-dcnode-id="9762" instrument_node="">Tuorila-Ollikainen, 1982</span></a><span data-dcnode-id="9760" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9758" href="#bib153" name="bbib153"><span data-dcnode-id="9759" instrument_node="">Weiss et al., 1980</span></a><span data-dcnode-id="9757" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9755" href="#bib155" name="bbib155"><span data-dcnode-id="9756" instrument_node="">Whitehill, 1980</span></a><span data-dcnode-id="9754" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9752" href="#bib156" name="bbib156"><span data-dcnode-id="9753" instrument_node="">Wilson, 2009</span></a><span data-dcnode-id="9751" instrument_node="">). This had led some to search out those foods that are free from all artificial food coloring. However, many commercial foods and drinks are disappointing, as they are perceived by many as lacking in taste/flavor if served in a colorless (ie, clear or white) format (</span><a class="workspace-trigger" data-dcnode-id="9749" href="#bib60" name="bbib60"><span data-dcnode-id="9750" instrument_node="">Harris, 2011</span></a><span data-dcnode-id="9748" instrument_node="">). Of course, that the food coloring used is natural does not in-and-of-itself necessarily make it appealing in the mind of the consumer. Here, one only needs to think of the red coloring of, for example, Smarties (the candy-covered chocolate) that used to be made from the carminic acid that was extracted from a particular variety of scaly insect. Unappealing to most consumers, one imagines; nowadays, the red coloring comes from red cabbage instead (</span><a class="workspace-trigger" data-dcnode-id="9746" href="#bib156" name="bbib156"><span data-dcnode-id="9747" instrument_node="">Wilson, 2009</span></a><span data-dcnode-id="9745" instrument_node="">). And what, exactly, constitutes natural is not obvious: so, for example, the vibrant orange-colored carrots that we are all familiar with nowadays are actually the result of selective breeding. Once upon a time, the majority of carrots were purple. The selective breeding designed to deliver the orange color of the Dutch royal family back in the 17th century (</span><a class="workspace-trigger" data-dcnode-id="9743" href="#bib6" name="bbib6"><span data-dcnode-id="9744" instrument_node="">Anon, 2005</span></a><span data-dcnode-id="9742" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9740" href="#bib29" name="bbib29"><span data-dcnode-id="9741" instrument_node="">Dalby, 2003</span></a><span data-dcnode-id="9739" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9737" href="#bib83" name="bbib83"><span data-dcnode-id="9738" instrument_node="">Macrae, 2011</span></a><span data-dcnode-id="9736" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="9733" href="#fn5" name="bfn5"><sup data-dcnode-id="9734"><span data-dcnode-id="9735" instrument_node="">5</span></sup></a></p><p data-dcnode-id="9721" id="p0145"><span data-dcnode-id="9731" instrument_node="">A number of the modernist chefs we have been fortunate enough to work with over the years have been particularly interested in surprising their diners by presenting foods that have one color (and hence set a particular taste/flavor expectation) while delivering another unexpected flavor instead. Note that while under the majority of everyday conditions, people prefer foods and beverages that taste as they expect them to taste (ie, people don’t like surprises, especially when it comes to the stimuli that enter the mouth, and hence have the potential to poison them), there are occasions, in particular, while sitting at the table in a modernist restaurant where diners seem to positively relish having their expectations played with (see </span><a class="workspace-trigger" data-dcnode-id="9729" href="#bib103" name="bbib103"><span data-dcnode-id="9730" instrument_node="">Piqueras-Fiszman &amp; Spence, 2012</span></a><span data-dcnode-id="9728" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9726" href="#bib127" name="bbib127"><span data-dcnode-id="9727" instrument_node="">Spence &amp; Piqueras-Fiszman, 2014</span></a><span data-dcnode-id="9725" instrument_node="">). However, the chefs typically do not want to achieve such results by means of artificial food colorings for fear of the negative reaction of their diners. One elegant example, then, of the use of natural coloring to create surprise and delight in the mind of the diner comes from the beetroot and orange jelly dish that was served as one of the opening courses on the menu at The Fat Duck restaurant in Bray a few years ago (</span><a data-dcnode-id="9723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thefatduck.co.uk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="9724" instrument_node="">http://www.thefatduck.co.uk/</span></a><span data-dcnode-id="9722" instrument_node="">). This dish would be presented as two blocks of jelly, one bright orange, the other a dark purple, placed side-by-side on the plate.</span></p><p data-dcnode-id="9695" id="p0150"><span data-dcnode-id="9720" instrument_node="">And where the modernist chefs lead, the market often follows. Such unusually colored fruits and vegetables have apparently been selling well in the supermarkets in recent years (</span><a class="workspace-trigger" data-dcnode-id="9718" href="#bib83" name="bbib83"><span data-dcnode-id="9719" instrument_node="">Macrae, 2011</span></a><span data-dcnode-id="9717" instrument_node="">). More generally, there would appear to be renewed interest in surprisingly colored foods for the mass market as well. For example, a few years </span><span data-dcnode-id="9716" id="p119"></span><span data-dcnode-id="9715" instrument_node="">back, one well-known burger chain launched a pitch black bamboo and squid ink burger in Japan. It was seasoned with black squid ink ketchup and served in a black bun (</span><a class="workspace-trigger" data-dcnode-id="9713" href="#bib27" name="bbib27"><span data-dcnode-id="9714" instrument_node="">Cook, 2012</span></a><span data-dcnode-id="9712" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="9709" href="#fn6" name="bfn6"><sup data-dcnode-id="9710"><span data-dcnode-id="9711" instrument_node="">6</span></sup></a><span data-dcnode-id="9708" instrument_node=""> As a group, children seem to be particularly fond of such miscolored foods (think confused Skittles) and beverages (</span><a class="workspace-trigger" data-dcnode-id="9706" href="#bib7" name="bbib7"><span data-dcnode-id="9707" instrument_node="">Anon, 2007</span></a><span data-dcnode-id="9705" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9703" href="#bib44" name="bbib44"><span data-dcnode-id="9704" instrument_node="">Garber et al., 2008</span></a><span data-dcnode-id="9702" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="9700" href="#bib103" name="bbib103"><span data-dcnode-id="9701" instrument_node="">Piqueras-Fiszman &amp; Spence, 2012</span></a><span data-dcnode-id="9699" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9697" href="#bib146" name="bbib146"><span data-dcnode-id="9698" instrument_node="">Walsh, Toma, Tuveson, &amp; Sondhi, 1990</span></a><span data-dcnode-id="9696" instrument_node="">).</span></p></section></section><section data-dcnode-id="9644" id="s0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9689" id="st0070"><span data-dcnode-id="9692" instrument_node="">5</span><span data-dcnode-id="9691" instrument_node="">. </span><span data-dcnode-id="9690" instrument_node="">Marketing color</span></h2><p data-dcnode-id="9656" id="p0155"><span data-dcnode-id="9688" instrument_node="">Adding color to food, or else changing the color of a food or beverage (or its packaging) has long been used as an effective marketing tool (eg, </span><a class="workspace-trigger" data-dcnode-id="9686" href="#bib40" name="bbib40"><span data-dcnode-id="9687" instrument_node="">Favre &amp; November, 1979</span></a><span data-dcnode-id="9685" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9683" href="#bib54" name="bbib54"><span data-dcnode-id="9684" instrument_node="">Gimba, 1998</span></a><span data-dcnode-id="9682" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9680" href="#bib61" name="bbib61"><span data-dcnode-id="9681" instrument_node="">Hicks, 1979</span></a><span data-dcnode-id="9679" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9677" href="#bib67" name="bbib67"><span data-dcnode-id="9678" instrument_node="">Jantathaia, Danner, Joechl, &amp; Dürrschmid, 2013</span></a><span data-dcnode-id="9676" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9674" href="#bib119" name="bbib119"><span data-dcnode-id="9675" instrument_node="">Singh, 2006</span></a><span data-dcnode-id="9673" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="9671" href="#bib136" name="bbib136"><span data-dcnode-id="9672" instrument_node="">Stummerer &amp; Hablesreiter, 2010</span></a><span data-dcnode-id="9670" instrument_node="">; </span><a data-dcnode-id="9668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ddwcolor.com/hue/why-color/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="9669" instrument_node="">http://www.ddwcolor.com/hue/why-color/</span></a><span data-dcnode-id="9667" instrument_node="">). In fact, according to an informal store audit reported by </span><a class="workspace-trigger" data-dcnode-id="9665" href="#bib47" name="bbib47"><span data-dcnode-id="9666" instrument_node="">Garber et al. (2001)</span></a><span data-dcnode-id="9660"><span data-dcnode-id="9664" instrument_node="">, 97% of all food brands displayed (in all categories), used color to signify flavor. Food color is used in marketing for a number of reasons: everything from increasing shelf stand-out through to blurring the distinction between competing products. Indeed, in the early days, there was quite a fight by the butter lobby in order to try to prevent the makers of </span><a class="topic-link" data-dcnode-id="9662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/margarine" title="Learn more about margarine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9663" instrument_node="">margarine</span></a><span data-dcnode-id="9661" instrument_node=""> from adding a golden yellow hue to their product to give it the appearance of its better established rival (eg, see </span></span><a class="workspace-trigger" data-dcnode-id="9658" href="#bib85" name="bbib85"><span data-dcnode-id="9659" instrument_node="">Masurovsky, 1939</span></a><span data-dcnode-id="9657" instrument_node="">).</span></p><p data-dcnode-id="9645" id="p0160"><span data-dcnode-id="9655" instrument_node="">More recently, the potential role in marketing of adding food coloring was amply demonstrated by the dramatic rise in sales of tomato ketchup when Heinz decided to add a tiny amount of food coloring and turn this staple of the dining table green (</span><a class="workspace-trigger" data-dcnode-id="9653" href="#bib39" name="bbib39"><span data-dcnode-id="9654" instrument_node="">Farrell, 2000</span></a><span data-dcnode-id="9652" instrument_node="">). However, it is important to note that not every attempt by marketers to use color to boost sales has been so successful. Clear cola drinks have, for example, generally failed in the marketplace (see </span><a class="workspace-trigger" data-dcnode-id="9650" href="#bib139" name="bbib139"><span data-dcnode-id="9651" instrument_node="">Triplett, 1994</span></a><span data-dcnode-id="9649" instrument_node="">), and it could be this very reason why nowadays sales of Cordial Campari, a clear version of the classic Italian red-colored bitter aperitif, remain disappointing (</span><a data-dcnode-id="9647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.saveur.com/article/Wine-and-Drink/Campari-Good-and-Bitter" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="9648" instrument_node="">http://www.saveur.com/article/Wine-and-Drink/Campari-Good-and-Bitter</span></a><span data-dcnode-id="9646" instrument_node="">). There are certainly a number of theories out there in the marketing literature about what may have gone wrong in the case of clear cola. Our guess is that when such drinks were tasted away from their packaging then the likely disconfirmation of expectation that results from experiencing a cola flavor when the visual appearance of the drink led the consumer to expect lemonade or soda water may have been especially problematic.</span></p></section><section data-dcnode-id="9426" id="s0065"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9640" id="st0075"><span data-dcnode-id="9643" instrument_node="">6</span><span data-dcnode-id="9642" instrument_node="">. </span><span data-dcnode-id="9641" instrument_node="">Individual differences in the psychological effects of color</span></h2><p data-dcnode-id="9636" id="p0165"><span data-dcnode-id="9639" instrument_node="">One thing that is noticeable about much of the early research on the psychological effects of food coloring is how little attention was paid to the profiles of the </span><span data-dcnode-id="9638" id="p120"></span><span data-dcnode-id="9637" instrument_node="">participants themselves. This is turning out to be an important caveat since the latest research is now starting to show that exactly the same food color can elicit qualitatively different expectations concerning the likely taste/flavor of food and drink in different groups of consumers.</span></p><section data-dcnode-id="9591" id="s0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9632" id="st0080"><span data-dcnode-id="9635" instrument_node="">6.1</span><span data-dcnode-id="9634" instrument_node="">. </span><span data-dcnode-id="9633" instrument_node="">Cross-cultural differences</span></h3><div data-dcnode-id="9592"><p data-dcnode-id="9611" id="p0170"><span data-dcnode-id="9631" instrument_node="">Researchers have started to study how exactly the same color (eg, in a beverage) can set up qualitatively different expectations in the minds of different groups of consumers. Just take the drinks shown in </span><a class="workspace-trigger" data-dcnode-id="9629" href="#f0025" name="bf0025"><span data-dcnode-id="9630" instrument_node="">Fig. 6.5</span></a><span data-dcnode-id="9628" instrument_node="">: when these were shown to young adults in Taiwan and the United Kingdom, the former expected them to taste of cranberry and mint (perhaps mouthwash), respectively, whereas the latter expected cherry/strawberry and raspberry, instead (see </span><a class="workspace-trigger" data-dcnode-id="9626" href="#bib113" name="bbib113"><span data-dcnode-id="9627" instrument_node="">Shankar, Levitan, &amp; Spence, 2010</span></a><span data-dcnode-id="9625" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="9623" href="#bib147" name="bbib147"><span data-dcnode-id="9624" instrument_node="">Wan et al., 2014</span></a><span data-dcnode-id="9622" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9620" href="#bib148" name="bbib148"><span data-dcnode-id="9621" instrument_node="">Wan et al., 2015</span></a><span data-dcnode-id="9619" instrument_node=""> conducted a number of internet-based studies designed to assess which food colors have a similar meaning in terms of expected flavor across culture and which differ markedly in terms of the expectations that they set. </span><a class="workspace-trigger" data-dcnode-id="9617" href="#bib68" name="bbib68"><span data-dcnode-id="9618" instrument_node="">Jantathaia, Sungsri-in, Mukprasirt, and Dürrschmid (2014)</span></a><span data-dcnode-id="9616" instrument_node=""> ­conducted a cross-cultural study of food color in Austria and Thailand. These researchers demonstrated significant differences in terms of how much consumers from the two countries expected to like the various brightly colored Thai desserts, as well as how intense they expected the taste to be. Furthermore, when other consumers actually got to taste the desserts, significant differences in liking between the two cultural groups were observed. Food marketers working in the global marketplace obviously need to be aware of such cultural differences in the meaning of food color (see also </span><a class="workspace-trigger" data-dcnode-id="9614" href="#bib45" name="bbib45"><span data-dcnode-id="9615" instrument_node="">Garber, Hyatt, &amp; Nafees, 2015</span></a><span data-dcnode-id="9613" instrument_node="">).</span><span data-dcnode-id="9612" id="p121"></span></p><figure class="figure text-xs" data-dcnode-id="9593" id="f0025"><span data-dcnode-id="9601"><img alt="" aria-describedby="cap0025" data-dcnode-id="9610" height="194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-05-9780081003503.jpg&amp;raw"><span data-dcnode-id="9609" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9602"><li data-dcnode-id="9603"><a class="anchor download-link u-font-sans" data-dcnode-id="9604" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-05-9780081003503.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9605"><span data-dcnode-id="9608" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9606"><span data-dcnode-id="9607" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9594"><span data-dcnode-id="9595" id="cap0025"><p data-dcnode-id="9596" id="sp0025"><span class="label" data-dcnode-id="9599"><span data-dcnode-id="9600" instrument_node="">Figure 6.5</span></span><span data-dcnode-id="9598" instrument_node="">. </span><span data-dcnode-id="9597" instrument_node="">Two of the six colored drinks shown to the participants from Taiwan and the United Kingdom in a study by Shankar et al. (2010a). The results of this cross-cultural study demonstrated that exactly the same food color (red on the left and blue on the right) can elicit qualitatively sensory different expectations as far as the likely flavor of a drink might be in consumers from different countries. The most frequently expected flavors for drinks of these colors are shown at the bottom.</span></p></span></span></figure></div></section><section data-dcnode-id="9537" id="s0075"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9587" id="st0085"><span data-dcnode-id="9590" instrument_node="">6.2</span><span data-dcnode-id="9589" instrument_node="">. </span><span data-dcnode-id="9588" instrument_node="">Developmental differences</span></h3><p data-dcnode-id="9567" id="p0175"><span data-dcnode-id="9586" instrument_node="">Developmental differences in the meaning, and influence, of food color have occasionally been observed. As noted already, young children seem to be more drawn to brightly (some would say artificially) colored foods than are adults. However, as noted by </span><a class="workspace-trigger" data-dcnode-id="9584" href="#bib123" name="bbib123"><span data-dcnode-id="9585" instrument_node="">Spence (2014)</span></a><span data-dcnode-id="9583" instrument_node="">, adults are usually quite willing to accept unusually colored drinks when it comes to the case of cocktails. In terms of changes in the psychological influence of food coloring across the lifespan, then, on the basis of the evidence published to date (eg, see </span><a class="workspace-trigger" data-dcnode-id="9581" href="#bib22" name="bbib22"><span data-dcnode-id="9582" instrument_node="">Christensen, 1985</span></a><span data-dcnode-id="9580" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9578" href="#bib94" name="bbib94"><span data-dcnode-id="9579" instrument_node="">Oram et al., 1995</span></a><span data-dcnode-id="9577" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9575" href="#bib101" name="bbib101"><span data-dcnode-id="9576" instrument_node="">Philipsen et al., 1995</span></a><span data-dcnode-id="9574" instrument_node="">), it would appear as though, if anything, visual cues may exert a somewhat greater influence on flavor identification early in development (see </span><a class="workspace-trigger" data-dcnode-id="9572" href="#f0015" name="bf0015"><span data-dcnode-id="9573" instrument_node="">Fig. 6.1</span></a><span data-dcnode-id="9571" instrument_node="">), and in old age, than in adulthood (see </span><a class="workspace-trigger" data-dcnode-id="9569" href="#bib122" name="bbib122"><span data-dcnode-id="9570" instrument_node="">Spence, 2012</span></a><span data-dcnode-id="9568" instrument_node="">, for a review).</span></p><p data-dcnode-id="9538" id="p0180"><span data-dcnode-id="9566" instrument_node="">One reason as to why children might show more visual sensory dominance (ie, simply relying on what they see) than adults is because they have not yet learned to integrate their senses in an adult-like manner (cf. </span><a class="workspace-trigger" data-dcnode-id="9564" href="#bib56" name="bbib56"><span data-dcnode-id="9565" instrument_node="">Gori, Del Viva, Sandini, &amp; Burr, 2008</span></a><span data-dcnode-id="9563" instrument_node="">). At the other end of the age spectrum, the well-documented decline of taste and smell sensitivity may mean that the residual senses (especially those where prostheses, such as glasses or hearing aids, are available) take on a far more important role in terms of determining the final taste/flavor experience (eg, </span><a class="workspace-trigger" data-dcnode-id="9561" href="#bib22" name="bbib22"><span data-dcnode-id="9562" instrument_node="">Christensen, 1985</span></a><span data-dcnode-id="9560" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9558" href="#bib23" name="bbib23"><span data-dcnode-id="9559" instrument_node="">Clydesdale, 1984</span></a><span data-dcnode-id="9557" instrument_node="">). However, it has to be said that the available evidence on this topic (some of which was reviewed earlier) is rather mixed. While some researchers have been able to demonstrate more pronounced psychological effects of food coloring in, say, older adults (eg, </span><a class="workspace-trigger" data-dcnode-id="9555" href="#bib101" name="bbib101"><span data-dcnode-id="9556" instrument_node="">Philipsen et al., 1995</span></a><span data-dcnode-id="9554" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9552" href="#bib138" name="bbib138"><span data-dcnode-id="9553" instrument_node="">Tepper, 1993</span></a><span data-dcnode-id="9551" instrument_node="">), such differences have not always been found. Here, it is perhaps also worth bearing in mind any changes in the meaning and acceptability of color over time. One only needs to be reminded that blue foods were traditionally considered unacceptable to consumers (eg, </span><a class="workspace-trigger" data-dcnode-id="9549" href="#bib21" name="bbib21"><span data-dcnode-id="9550" instrument_node="">Cheskin, 1957</span></a><span data-dcnode-id="9548" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9546" href="#bib62" name="bbib62"><span data-dcnode-id="9547" instrument_node="">Hine, 1995</span></a><span data-dcnode-id="9545" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9543" href="#bib141" name="bbib141"><span data-dcnode-id="9544" instrument_node="">Tysoe, 1985</span></a><span data-dcnode-id="9542" instrument_node="">). Nowadays, many foods are blue, although in this case note that they are primarily marketed at the younger consumer (</span><a class="workspace-trigger" data-dcnode-id="9540" href="#bib47" name="bbib47"><span data-dcnode-id="9541" instrument_node="">Garber et al., 2001</span></a><span data-dcnode-id="9539" instrument_node="">). One could even think over a much longer timescale of how the flavor of carrots has switched its color association from purple to orange (see above).</span></p></section><section data-dcnode-id="9493" id="s0080"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9533" id="st0090"><span data-dcnode-id="9536" instrument_node="">6.3</span><span data-dcnode-id="9535" instrument_node="">. </span><span data-dcnode-id="9534" instrument_node="">Expertise</span></h3><p data-dcnode-id="9517" id="p0185"><span data-dcnode-id="9532" instrument_node="">Expertise has been shown to modulate the psychological effect of food coloring on flavor perception. Some of the most impressive studies in this area have come from the world of wine (see </span><a class="workspace-trigger" data-dcnode-id="9530" href="#bib98" name="bbib98"><span data-dcnode-id="9531" instrument_node="">Pangborn, Berg, &amp; Hansen, 1963</span></a><span data-dcnode-id="9529" instrument_node="">, for early research; and </span><a class="workspace-trigger" data-dcnode-id="9527" href="#bib121" name="bbib121"><span data-dcnode-id="9528" instrument_node="">Spence, 2010</span></a><span data-dcnode-id="9526" instrument_node="">, for a review). In one oft-cited study, </span><a class="workspace-trigger" data-dcnode-id="9524" href="#bib92" name="bbib92"><span data-dcnode-id="9525" instrument_node="">Morrot, Brochet, and Dubourdieu (2001)</span></a><span data-dcnode-id="9523" instrument_node=""> fooled a group of students on a university wine course in Bordeaux, France into choosing red wine aroma descriptors when given a white wine that had been artificially colored red with odorless, tasteless food dye to evaluate. </span><a class="workspace-trigger" data-dcnode-id="9521" href="#bib99" name="bbib99"><span data-dcnode-id="9522" instrument_node="">Parr et al. (2003)</span></a><span data-dcnode-id="9520" instrument_node=""> conducted a follow-up in New Zealand in which they tested both experts (including professional wine tasters and wine makers) and “social” drinkers. The descriptions of the aroma of a Chardonnay wine given by the experts when it had been artificially colored red were more accurate when the wine was served in an opaque glass than when served in a clear glass instead. Interestingly, this color-induced biasing of flavor judgments occurred </span><span data-dcnode-id="9519" id="p122"></span><span data-dcnode-id="9518" instrument_node="">despite the fact that the experts had been explicitly instructed to ignore the color of the wines they were tasting (thus suggesting that the crossmodal effect of vision is not under cognitive control). In this case, the social drinkers were so bad at reliably identifying the aromas present in the wine that it was difficult for Parr et al. to discern any pattern in the data when an inappropriate color was added to the wine.</span></p><p data-dcnode-id="9494" id="p0190"><span data-dcnode-id="9516" instrument_node="">Taken together, the evidence that has been published to date is consistent with the view that expert wine tasters differ from social drinkers in the degree to which visual (color) cues influence their orthonasal perception of flavor (</span><a class="workspace-trigger" data-dcnode-id="9514" href="#bib99" name="bbib99"><span data-dcnode-id="9515" instrument_node="">Parr et al., 2003</span></a><span data-dcnode-id="9513" instrument_node="">) and their perception of sweetness (</span><a class="workspace-trigger" data-dcnode-id="9511" href="#bib98" name="bbib98"><span data-dcnode-id="9512" instrument_node="">Pangborn et al., 1963</span></a><span data-dcnode-id="9510" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="9508" href="#bib79" name="bbib79"><span data-dcnode-id="9509" instrument_node="">Lelièvre et al., 2009</span></a><span data-dcnode-id="9507" instrument_node="">). That said, not all food/flavor experts necessarily exhibit the same increased responsiveness to color cues when evaluating the taste and flavor of food and drink. </span><a class="workspace-trigger" data-dcnode-id="9505" href="#bib116" name="bbib116"><span data-dcnode-id="9506" instrument_node="">Shankar, Simons, Shiv, McClure et al. (2010)</span></a><span data-dcnode-id="9504" instrument_node="">, for example, reported that the flavor experts working on a descriptive panel at an international flavor house (who all had more than 3 years of experience flavor profiling food and drink products) exhibited just as much visual capture (or assimilation) of their orthonasal olfactory flavor judgments as did the nonexperts they tested. Thus, based on the range of research that has been published to date, the most appropriate conclusion regarding flavor experts would appear to be that while some (specifically those with an expertise in wine) show an enhanced susceptibility to the crossmodal influence of color on judgments within their area of expertise (</span><a class="workspace-trigger" data-dcnode-id="9502" href="#bib98" name="bbib98"><span data-dcnode-id="9503" instrument_node="">Pangborn et al., 1963</span></a><span data-dcnode-id="9501" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9499" href="#bib99" name="bbib99"><span data-dcnode-id="9500" instrument_node="">Parr et al., 2003</span></a><span data-dcnode-id="9498" instrument_node="">), there is not enough evidence to know whether the same holds true of other groups of flavor experts (</span><a class="workspace-trigger" data-dcnode-id="9496" href="#bib116" name="bbib116"><span data-dcnode-id="9497" instrument_node="">Shankar, Simons, Shiv, McClure et al., 2010</span></a><span data-dcnode-id="9495" instrument_node="">).</span></p></section><section data-dcnode-id="9427" id="s0085"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9489" id="st0095"><span data-dcnode-id="9492" instrument_node="">6.4</span><span data-dcnode-id="9491" instrument_node="">. </span><span data-dcnode-id="9490" instrument_node="">Genetic differences</span></h3><div data-dcnode-id="9430"><p data-dcnode-id="9459" id="p0195"><span data-dcnode-id="9488" instrument_node="">There is also some evidence to suggest that genetic differences modulate the psychological effect of color. Here, for example, one might think both of those individuals who are born color blind (primarily males, and constituting approximately 6% of the population; </span><a class="workspace-trigger" data-dcnode-id="9486" href="#bib13" name="bbib13"><span data-dcnode-id="9487" instrument_node="">Broackes, 2010</span></a><span data-dcnode-id="9485" instrument_node="">). Presumably such differences in color perception ought to modulate the psychological effect of food color, though, that said, it is surprisingly hard to find any published research on the topic (see </span><a data-dcnode-id="9483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colourblindawareness.org/colour-blindness/living-with-colour-vision-deficiency/food/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="9484" instrument_node="">http://www.colourblindawareness.org/colour-blindness/living-with-colour-vision-deficiency/food/</span></a><span data-dcnode-id="9482" instrument_node="">). However, just as important as any deficits in color perception may be an individual’s taster status (</span><a class="workspace-trigger" data-dcnode-id="9480" href="#bib9" name="bbib9"><span data-dcnode-id="9481" instrument_node="">Bartoshuk, 2000</span></a><span data-dcnode-id="9479" instrument_node="">). Genetic differences in taster status may play a role in determining just how much of an influence color has over multisensory flavor perception. Some people simply have far more taste buds than others (the former are known as supertasters, the latter, non-tasters) (</span><a class="workspace-trigger" data-dcnode-id="9477" href="#bib90" name="bbib90"><span data-dcnode-id="9478" instrument_node="">Miller &amp; Reedy, 1990</span></a><span data-dcnode-id="9476" instrument_node="">). There is also an intermediate group known as medium tasters, with roughly a third of consumers falling into each group. In at least one study (</span><a class="workspace-trigger" data-dcnode-id="9474" href="#bib160" name="bbib160"><span data-dcnode-id="9475" instrument_node="">Zampini et al., 2008</span></a><span data-dcnode-id="9473" instrument_node="">), supertasters were significantly less affected by the color of a drink than were medium tasters, who, in turn, were less affected than were non-tasters (see </span><a class="workspace-trigger" data-dcnode-id="9471" href="#f0030" name="bf0030"><span data-dcnode-id="9472" instrument_node="">Fig. 6.6</span></a><span data-dcnode-id="9470" instrument_node="">). It is somewhat surprising to find that this is the only study of the impact of the psychological impact of food color to have assessed the taster status of their participants.</span><a class="workspace-trigger" data-dcnode-id="9467" href="#fn7" name="bfn7"><sup data-dcnode-id="9468"><span data-dcnode-id="9469" instrument_node="">7</span></sup></a><span data-dcnode-id="9466" instrument_node=""> And, although beyond the scope of the </span><span data-dcnode-id="9465" id="p123"></span><span data-dcnode-id="9464" id="p124"></span><span data-dcnode-id="9463" instrument_node="">present article, it has also been suggested that there may be racial differences in terms of color preferences as well (</span><a class="workspace-trigger" data-dcnode-id="9461" href="#bib170" name="bbib170"><span data-dcnode-id="9462" instrument_node="">Scanlon, 1985</span></a><span data-dcnode-id="9460" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="9431" id="f0030"><span data-dcnode-id="9449"><img alt="" aria-describedby="cap0030" data-dcnode-id="9458" height="479" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-06-9780081003503.jpg&amp;raw"><span data-dcnode-id="9457" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9450"><li data-dcnode-id="9451"><a class="anchor download-link u-font-sans" data-dcnode-id="9452" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-06-9780081003503.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9453"><span data-dcnode-id="9456" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9454"><span data-dcnode-id="9455" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9432"><span data-dcnode-id="9440" id="cap0030"><p data-dcnode-id="9441" id="sp0030"><span class="label" data-dcnode-id="9447"><span data-dcnode-id="9448" instrument_node="">Figure 6.6</span></span><span data-dcnode-id="9446" instrument_node="">. </span><span data-dcnode-id="9445" instrument_node="">Mean percentage of correct flavor identification responses for the three groups of participants (non-tasters, medium tasters, and supertasters) for the </span><a class="topic-link" data-dcnode-id="9443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/blackcurrant" title="Learn more about blackcurrant from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9444" instrument_node="">blackcurrant</span></a><span data-dcnode-id="9442" instrument_node="">, orange, and flavorless solutions. The black columns represent solutions where fruit acids had been added and the white columns solutions without fruit acids. The error bars represent the between-participants standard errors of the means. The results highlight the fact that genetic differences in taster status may determine just how much of a psychological effect on flavor identification color cues can have.</span></p></span><span data-dcnode-id="9433"><em data-dcnode-id="9438"><span data-dcnode-id="9439" instrument_node="">Source</span></em><span data-dcnode-id="9437" instrument_node="">: Figure reprinted with permission from </span><a class="workspace-trigger" data-dcnode-id="9435" href="#bib160" name="bbib160"><span data-dcnode-id="9436" instrument_node="">Zampini et al. (2008)</span></a><span data-dcnode-id="9434" instrument_node="">.</span></span></span></figure></div><p data-dcnode-id="9428" id="p0200"><span data-dcnode-id="9429" instrument_node="">We would like to argue that one cannot hope to attain a comprehensive understanding of the psychological impact of food color on taste/flavor perception without taking into account the individual differences relevant to this topic that have been identified to date. These include genetic differences in terms of taster status and color perception, as well as cross-cultural and age-related differences. What is clear from the research that has been published to date is that these individual differences can influence both the meaning of color and its influence on the consumer. Having established the importance of such individual differences, the question becomes one of how best, moving forward, to assess the psychological impact of food color experimentally.</span></p></section></section><section data-dcnode-id="9371" id="s0095"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9422" id="st0105"><span data-dcnode-id="9425" instrument_node="">7</span><span data-dcnode-id="9424" instrument_node="">. </span><span data-dcnode-id="9423" instrument_node="">Conclusions</span></h2><p data-dcnode-id="9393" id="p0205"><span data-dcnode-id="9421" instrument_node="">Since the first scientific reports that changing the color of a food could change the taste/flavor were published (see </span><a class="workspace-trigger" data-dcnode-id="9419" href="#bib38" name="bbib38"><span data-dcnode-id="9420" instrument_node="">Duncker, 1939</span></a><span data-dcnode-id="9418" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9416" href="#bib91" name="bbib91"><span data-dcnode-id="9417" instrument_node="">Moir, 1936</span></a><span data-dcnode-id="9415" instrument_node="">), somewhere in the region of 150 other papers have investigated the impact of food coloring on the perception and behavior of participants/consumers. While the majority of those studies have tended to focus on color’s effect on taste/flavor identification (see </span><a class="workspace-trigger" data-dcnode-id="9413" href="#bib124" name="bbib124"><span data-dcnode-id="9414" instrument_node="">Spence, 2015a</span></a><span data-dcnode-id="9412" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9410" href="#bib125" name="bbib125"><span data-dcnode-id="9411" instrument_node="">Spence, 2015b</span></a><span data-dcnode-id="9409" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9407" href="#bib128" name="bbib128"><span data-dcnode-id="9408" instrument_node="">Spence et al., 2010</span></a><span data-dcnode-id="9406" instrument_node="">, for reviews), it is important to note that color cues can also play a number of different roles in modulating our food- and drink-related behavior (see </span><a class="workspace-trigger" data-dcnode-id="9404" href="#bib103" name="bbib103"><span data-dcnode-id="9405" instrument_node="">Piqueras-Fiszman and Spence, 2012</span></a><span data-dcnode-id="9403" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9401" href="#bib104" name="bbib104"><span data-dcnode-id="9402" instrument_node="">Piqueras-Fiszman and Spence, 2014</span></a><span data-dcnode-id="9400" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9398" href="#bib127" name="bbib127"><span data-dcnode-id="9399" instrument_node="">Spence &amp; Piqueras-Fiszman, 2014</span></a><span data-dcnode-id="9397" instrument_node="">). Food coloring undoubtedly plays an important role in driving liking and the consumer acceptability of a variety of food and beverage products. And while increasing color variety in food can lead to enhanced consumption (see </span><a class="workspace-trigger" data-dcnode-id="9395" href="#bib104" name="bbib104"><span data-dcnode-id="9396" instrument_node="">Piqueras-Fiszman &amp; Spence, 2014</span></a><span data-dcnode-id="9394" instrument_node="">), what we see can also lead to a suppression of our appetitive behaviors when associated with off-colors (or, at least, coloration that is interpreted by the consumer as such).</span></p><p data-dcnode-id="9372" id="p0210"><span data-dcnode-id="9392" instrument_node="">Finally, given the practical difficulties associated with delivering flavors while a participant lies in a brain scanner (see </span><a class="workspace-trigger" data-dcnode-id="9390" href="#bib127" name="bbib127"><span data-dcnode-id="9391" instrument_node="">Spence &amp; Piqueras-Fiszman, 2014</span></a><span data-dcnode-id="9389" instrument_node="">), it is perhaps understandable that there has not been a great deal of neuroimaging research that has looked at the influence of color on flavor perception (</span><a class="workspace-trigger" data-dcnode-id="9387" href="#bib120" name="bbib120"><span data-dcnode-id="9388" instrument_node="">Skrandies and Reuther, 2008</span></a><span data-dcnode-id="9386" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9384" href="#bib143" name="bbib143"><span data-dcnode-id="9385" instrument_node="">Verhagen and Engelen, 2006</span></a><span data-dcnode-id="9383" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="9381" href="#bib95" name="bbib95"><span data-dcnode-id="9382" instrument_node="">Österbauer et al., 2005</span></a><span data-dcnode-id="9380" instrument_node="">). Whether or not as the result of further neuroimaging, it is clear that further research is most definitely needed in order to develop a better understanding of the psychological mechanisms underlying the various effects of color on our perception of, and behaviors toward, food (see </span><a class="workspace-trigger" data-dcnode-id="9378" href="#bib74" name="bbib74"><span data-dcnode-id="9379" instrument_node="">Kappes, Schmidt, &amp; Lee, 2006</span></a><span data-dcnode-id="9377" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9375" href="#bib125" name="bbib125"><span data-dcnode-id="9376" instrument_node="">Spence, 2015b</span></a><span data-dcnode-id="9374" instrument_node="">). And, finally, while the focus in this chapter has very much been on the influence of color, it is important to remember that consumers also use other visual cues in order to evaluate the quality properties of foods. However, reviewing those influences will have to remain the subject of another review.</span><span data-dcnode-id="9373" id="p125"></span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="9365"><button class="button button-anchor" data-dcnode-id="9366" type="button"><span class="button-text" data-dcnode-id="9367"><span data-dcnode-id="9368" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="480"><section class="bibliography u-font-serif text-s" data-dcnode-id="481" id="bibliog0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9363"><span data-dcnode-id="9364" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="482" id="bb0010"><dl class="references" data-dcnode-id="483" id="reference-links-bb0010"><dt class="label" data-dcnode-id="9360"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="9361" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="9362" instrument_node="">Accum, 1820</span></a></dt><dd class="reference" data-dcnode-id="9348" id="otherref0005"><span data-dcnode-id="9352"><span data-dcnode-id="9359" instrument_node="">Accum, F. (1820). </span><em data-dcnode-id="9357"><span data-dcnode-id="9358" instrument_node="">A treatise on adulteration of food and culinary poisons</span></em><span data-dcnode-id="9356" instrument_node="">. Available from &lt;</span><a data-dcnode-id= y: Interdisciplinary and Applied</span><span data-dcnode-id="9325" instrument_node="">, </span><span data-dcnode-id="9323" instrument_node="">132</span><span data-dcnode-id="9321" instrument_node=""> (</span><span data-dcnode-id="9319" instrument_node="">1998</span><span data-dcnode-id="9317" instrument_node="">)</span><span data-dcnode-id="9315" instrument_node="">, pp. </span><span data-dcnode-id="9313" instrument_node="">561</span><span data-dcnode-id="9311" instrument_node="">-</span><span data-dcnode-id="9309" instrument_node="">568</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="9296"><div class="u-margin-m-right u-display-inline" data-dcnode-id="9303"><els-view-pdf-element class="pending" data-dcnode-id="9304" disabled="" doc-id="10.1080/00223989809599289" doc-type="doi" onclick="({
