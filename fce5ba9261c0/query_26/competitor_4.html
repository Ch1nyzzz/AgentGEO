</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abs0010&quot;><p id=&quot;sp0040&quot;>Color is perhaps the single most important product-intrinsic sensory cue when it comes to setting our expectations regarding the likely taste and flavor of food and drink. To date, a large body of research has demonstrated that changing the hue or intensity/saturation of the color of a variety of different food and beverage items exerts a sometimes dramatic impact on the expectations, and often on the subsequent taste/flavor experiences of participants in the lab, as well as consumers under the more naturalistic conditions of everyday life. It is important to note that food colors can have rather different meanings, and hence give rise to differing expectations in these different age groups, not to mention in those from different cultures. By gaining a better understanding of the sensory and hedonic expectations that are elicited by food color in different groups of individuals, researchers are now coming to better understand the various ways in which what we see can modulate the multisensory perception of flavor, and alter our food behaviors.</p></div></div></div>" data-dcnode-id="10938" lang="en" name="citation_abstract"><span data-dcnode-id="10937" instrument_node="">

ss="ExportCitation u-display-inline-block" data-dcnode-id="10573" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="10574" id="export-citation-popover"><div data-dcnode-id="10575" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="10576" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="10579" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="10580" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="10577"><span data-dcnode-id="10578" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="10566" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="10569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/B978-0-08-100350-3.00006-7" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="10570" instrument_node="">https://doi.org/10.1016/B978-0-08-100350-3.00006-7</span></a><a class="rights-and-content" data-dcnode-id="10567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DB9780081003503000067%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="10568" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="10565"></section><section class="ReferencedArticles" data-dcnode-id="10564"></section><div class="PageDivider" data-dcnode-id="10563"></div><div class="Abstracts u-font-serif" data-dcnode-id="10556" id="abstracts"><div class="abstract author" data-dcnode-id="10557" id="ab0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10561"><span data-dcnode-id="10562" instrument_node="">Abstract</span></h2><div data-dcnode-id="10558" id="abs0010"><p data-dcnode-id="10559" id="sp0040"><span data-dcnode-id="10560" instrument_node="">Color is perhaps the single most important product-intrinsic sensory cue when it comes to setting our expectations regarding the likely taste and flavor of food and drink. To date, a large body of research has demonstrated that changing the hue or intensity/saturation of the color of a variety of different food and beverage items exerts a sometimes dramatic impact on the expectations, and often on the subsequent taste/flavor experiences of participants in the lab, as well as consumers under the more naturalistic conditions of everyday life. It is important to note that food colors can have rather different meanings, and hence give rise to differing expectations in these different age groups, not to mention in those from different cultures. By gaining a better understanding of the sensory and hedonic expectations that are elicited by food color in different groups of individuals, researchers are now coming to better understand the various ways in which what we see can modulate the multisensory perception of flavor, and alter our food behaviors.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="10533" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="10545"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081003503000055"><svg class="icon icon-navigate-left" data-dcnode-id="10554" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="10555"></path></svg><span class="button-alternative-text" data-dcnode-id="10547"><strong data-dcnode-id="10552"><span data-dcnode-id="10553" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="10550"><span data-dcnode-id="10551" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="10548"><span data-dcnode-id="10549" instrument_node=""> in book</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="10534"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081003503000079"><span class="button-alternative-text" data-dcnode-id="10538"><strong data-dcnode-id="10543"><span data-dcnode-id="10544" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="10541"><span data-dcnode-id="10542" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="10539"><span data-dcnode-id="10540" instrument_node=""> in book</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="10536" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="10537"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="10508"><div class="keywords-section" data-dcnode-id="10509" id="kys0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10531"><span data-dcnode-id="10532" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="10528" id="kyw0010"><span data-dcnode-id="10529"><span data-dcnode-id="10530" instrument_node="">Flavor</span></span></div><div class="keyword" data-dcnode-id="10525" id="kyw0015"><span data-dcnode-id="10526"><span data-dcnode-id="10527" instrument_node="">taste</span></span></div><div class="keyword" data-dcnode-id="10522" id="kyw0020"><span data-dcnode-id="10523"><span data-dcnode-id="10524" instrument_node="">multisensory</span></span></div><div class="keyword" data-dcnode-id="10519" id="kyw0025"><span data-dcnode-id="10520"><span data-dcnode-id="10521" instrument_node="">expectations</span></span></div><div class="keyword" data-dcnode-id="10516" id="kyw0030"><span data-dcnode-id="10517"><span data-dcnode-id="10518" instrument_node="">liking</span></span></div><div class="keyword" data-dcnode-id="10513" id="kyw0035"><span data-dcnode-id="10514"><span data-dcnode-id="10515" instrument_node="">vision</span></span></div><div class="keyword" data-dcnode-id="10510" id="kyw0040"><span data-dcnode-id="10511"><span data-dcnode-id="10512" instrument_node="">sensory dominance</span></span></div></div></div><span data-dcnode-id="10507" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="9369" id="body"><div data-dcnode-id="9370"><section data-dcnode-id="10408" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10503" id="st0020"><span data-dcnode-id="10506" instrument_node="">1</span><span data-dcnode-id="10505" instrument_node="">. </span><span data-dcnode-id="10504" instrument_node="">Introduction</span></h2><p data-dcnode-id="10444" id="p0010"><span data-dcnode-id="10502" id="p107"></span><span data-dcnode-id="10501" instrument_node="">Under most everyday conditions, consumers have the opportunity to inspect food and drink visually before deciding on whether or not to purchase or taste it (</span><a class="workspace-trigger" data-dcnode-id="10499" href="#bib17" name="bbib17"><span data-dcnode-id="10500" instrument_node="">Cardello, 1996</span></a><span data-dcnode-id="10494"><span data-dcnode-id="10498" instrument_node="">). Color constitutes one of the most salient of visual cues concerning the likely </span><a class="topic-link" data-dcnode-id="10496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/sensory-properties" title="Learn more about sensory properties from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10497" instrument_node="">sensory properties</span></a><span data-dcnode-id="10495" instrument_node=""> (eg, taste/flavor) of food and drink (eg, </span></span><a class="workspace-trigger" data-dcnode-id="10492" href="#bib169" name="bbib169"><span data-dcnode-id="10493" instrument_node="">Chylinski, Northey, &amp; Ngo, 2015</span></a><span data-dcnode-id="10491" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10489" href="#bib23" name="bbib23"><span data-dcnode-id="10490" instrument_node="">Clydesdale, 1984</span></a><span data-dcnode-id="10488" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10486" href="#bib24" name="bbib24"><span data-dcnode-id="10487" instrument_node="">Clydesdale, 1991</span></a><span data-dcnode-id="10485" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10483" href="#bib25" name="bbib25"><span data-dcnode-id="10484" instrument_node="">Clydesdale, 1993</span></a><span data-dcnode-id="10482" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10480" href="#bib33" name="bbib33"><span data-dcnode-id="10481" instrument_node="">Delwiche, 2012</span></a><span data-dcnode-id="10479" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10477" href="#bib59" name="bbib59"><span data-dcnode-id="10478" instrument_node="">Hall, 1958</span></a><span data-dcnode-id="10476" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10474" href="#bib73" name="bbib73"><span data-dcnode-id="10475" instrument_node="">Kanig, 1955</span></a><span data-dcnode-id="10473" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10471" href="#bib75" name="bbib75"><span data-dcnode-id="10472" instrument_node="">Kostyla &amp; Clydesdale, 1978</span></a><span data-dcnode-id="10470" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10468" href="#bib172" name="bbib172"><span data-dcnode-id="10469" instrument_node="">Valentin, Parr, Peyron, Grose, &amp; Ballester, 2016</span></a><span data-dcnode-id="10467" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10465" href="#bib150" name="bbib150"><span data-dcnode-id="10466" instrument_node="">Watson, 2013</span></a><span data-dcnode-id="10464" instrument_node="">). Indeed, people have been coloring food and drink for millennia now (eg, </span><a class="workspace-trigger" data-dcnode-id="10462" href="#bib36" name="bbib36"><span data-dcnode-id="10463" instrument_node="">Downham &amp; Collins, 2000</span></a><span data-dcnode-id="10461" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10459" href="#bib137" name="bbib137"><span data-dcnode-id="10460" instrument_node="">Tannahill, 1973</span></a><span data-dcnode-id="10458" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10456" href="#bib145" name="bbib145"><span data-dcnode-id="10457" instrument_node="">Walford, 1980</span></a><span data-dcnode-id="10455" instrument_node="">). Furthermore, although little studied to date, those colors that we take to suggest that a food may have gone off can exert a particularly powerful effect on our food avoidance behaviors (eg, </span><a class="workspace-trigger" data-dcnode-id="10453" href="#bib28" name="bbib28"><span data-dcnode-id="10454" instrument_node="">Crumpacker, 2006</span></a><span data-dcnode-id="10452" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10450" href="#bib154" name="bbib154"><span data-dcnode-id="10451" instrument_node="">Wheatley, 1973</span></a><span data-dcnode-id="10449" instrument_node="">). As such, food color can legitimately be considered as perhaps the single most important product-intrinsic</span><a class="workspace-trigger" data-dcnode-id="10446" href="#fn1" name="bfn1"><sup data-dcnode-id="10447"><span data-dcnode-id="10448" instrument_node="">1</span></sup></a><span data-dcnode-id="10445" instrument_node=""> cue governing the sensory and hedonic expectations that consumers hold concerning the foods and drinks they search for, purchase, and which they may subsequently consume.</span></p><p data-dcnode-id="10414" id="p0015"><span data-dcnode-id="10443" instrument_node="">A growing body of scientific research now suggests that our experience of flavor is to a large degree determined by the expectations that we generate (often automatically) prior to tasting (see </span><a class="workspace-trigger" data-dcnode-id="10441" href="#bib32" name="bbib32"><span data-dcnode-id="10442" instrument_node="">Deliza &amp; MacFie, 1997</span></a><span data-dcnode-id="10440" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10438" href="#bib64" name="bbib64"><span data-dcnode-id="10439" instrument_node="">Hutchings, 2003</span></a><span data-dcnode-id="10437" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10435" href="#bib105" name="bbib105"><span data-dcnode-id="10436" instrument_node="">Piqueras-Fiszman &amp; Spence, 2015</span></a><span data-dcnode-id="10434" instrument_node="">). Such expectations can result from branding, labeling, packaging, and other contextual effects (ie, from a host of product-extrinsic cues; </span><a class="workspace-trigger" data-dcnode-id="10432" href="#bib102" name="bbib102"><span data-dcnode-id="10433" instrument_node="">Piqueras-Fiszman and Spence, 2011</span></a><span data-dcnode-id="10431" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10429" href="#bib126" name="bbib126"><span data-dcnode-id="10430" instrument_node="">Spence and Piqueras-Fiszman, 2012</span></a><span data-dcnode-id="10428" instrument_node="">), but also from a variety of product-intrinsic cues. It is vision then, and most often color, that our brains use to help identify sources of food and make predictions about their likely taste and flavor (</span><a class="workspace-trigger" data-dcnode-id="10426" href="#bib16" name="bbib16"><span data-dcnode-id="10427" instrument_node="">Cardello, 1994</span></a><span data-dcnode-id="10425" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10423" href="#bib64" name="bbib64"><span data-dcnode-id="10424" instrument_node="">Hutchings, 2003</span></a><span data-dcnode-id="10422" instrument_node="">). As a spokesperson for the Institute of Food Technologists put it a few years back: “</span><em data-dcnode-id="10420"><span data-dcnode-id="10421" instrument_node="">Color creates a psychological expectation for a certain flavor that is often impossible to dislodge</span></em><span data-dcnode-id="10419" instrument_node="">.” (</span><a class="workspace-trigger" data-dcnode-id="10417" href="#bib60" name="bbib60"><span data-dcnode-id="10418" instrument_node="">Harris, 2011</span></a><span data-dcnode-id="10416" instrument_node="">).</span><span data-dcnode-id="10415" id="p108"></span></p><p data-dcnode-id="10409" id="p0020"><span data-dcnode-id="10413" instrument_node="">The focus in this article will be on the psychological effect(s) that food color exerts over the mind and behavior of the consumer. We start by looking at the effect of food coloring on sensory expectations, and hence on our judgments of taste/flavor intensity and flavor identity (see </span><a class="workspace-trigger" data-dcnode-id="10411" href="#bib128" name="bbib128"><span data-dcnode-id="10412" instrument_node="">Spence, Levitan, Shankar, &amp; Zampini, 2010</span></a><span data-dcnode-id="10410" instrument_node="">, for a review). The literature on off-colors in foods and drinks will be briefly reviewed, and the debate concerning natural versus artificial food coloring touched upon. Attention will be drawn to the growing body of research that is now starting to highlight some of the important individual differences that have been identified in terms of the meaning and influence of color in food as a function of a person’s age, culture, or even their genetic make-up. Along the way, we will highlight some of the problems associated with the interpretation of much of the laboratory research that has been conducted to date, and take a speculative look at the future of color in food.</span></p></section><section data-dcnode-id="9965" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10404" id="st0025"><span data-dcnode-id="10407" instrument_node="">2</span><span data-dcnode-id="10406" instrument_node="">. </span><span data-dcnode-id="10405" instrument_node="">Psychological effects of food color: setting sensory expectations</span></h2><p data-dcnode-id="10366" id="p0025"><span data-dcnode-id="10403" instrument_node="">Over the last 80 years or so, researchers have investigated the psychological impact of food color in everything from noodles (</span><a class="workspace-trigger" data-dcnode-id="10401" href="#bib168" name="bbib168"><span data-dcnode-id="10402" instrument_node="">Zhou, Wan, Mu, &amp; Du, 2015</span></a><span data-dcnode-id="10400" instrument_node="">), vegetables (</span><a class="workspace-trigger" data-dcnode-id="10398" href="#bib142" name="bbib142"><span data-dcnode-id="10399" instrument_node="">Urbányi, 1982</span></a><span data-dcnode-id="10397" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10395" href="#bib9000" name="bbib9000"><span data-dcnode-id="10396" instrument_node="">Yang et al., 2015</span></a><span data-dcnode-id="10394" instrument_node="">), meat (</span><a class="workspace-trigger" data-dcnode-id="10392" href="#bib19" name="bbib19"><span data-dcnode-id="10393" instrument_node="">Carpenter, Conforth, &amp; Whittier, 2001</span></a><span data-dcnode-id="10391" instrument_node="">), salsas (</span><a class="workspace-trigger" data-dcnode-id="10389" href="#bib117" name="bbib117"><span data-dcnode-id="10390" instrument_node="">Shermer &amp; Levitan, 2014</span></a><span data-dcnode-id="10388" instrument_node="">), and cheese (</span><a class="workspace-trigger" data-dcnode-id="10386" href="#bib144" name="bbib144"><span data-dcnode-id="10387" instrument_node="">Wadhwani &amp; McMahon, 2012</span></a><span data-dcnode-id="10385" instrument_node="">) through to yoghurt (</span><a class="workspace-trigger" data-dcnode-id="10383" href="#bib15" name="bbib15"><span data-dcnode-id="10384" instrument_node="">Calvo et al., 2001</span></a><span data-dcnode-id="10382" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10380" href="#bib35" name="bbib35"><span data-dcnode-id="10381" instrument_node="">Dolnick, 2008</span></a><span data-dcnode-id="10379" instrument_node="">), cake (</span><a class="workspace-trigger" data-dcnode-id="10377" href="#bib37" name="bbib37"><span data-dcnode-id="10378" instrument_node="">DuBose, Cardello, &amp; Maller, 1980</span></a><span data-dcnode-id="10376" instrument_node="">), jams, jellies, and sherbets (eg, </span><a class="workspace-trigger" data-dcnode-id="10374" href="#bib59" name="bbib59"><span data-dcnode-id="10375" instrument_node="">Hall, 1958</span></a><span data-dcnode-id="10373" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10371" href="#bib91" name="bbib91"><span data-dcnode-id="10372" instrument_node="">Moir, 1936</span></a><span data-dcnode-id="10370" instrument_node="">). That said, the majority of studies in this area have been conducted with beverages, presumably because it is simply much easier to manipulate the level of color in solution (see </span><a class="workspace-trigger" data-dcnode-id="10368" href="#bib124" name="bbib124"><span data-dcnode-id="10369" instrument_node="">Spence, 2015a</span></a><span data-dcnode-id="10367" instrument_node="">). In this section, we describe a number of representative studies that have focused on the investigation of the impact of color on flavor/taste identity, on the one hand, and on its perceived intensity on the other.</span></p><section data-dcnode-id="10256" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10362" id="st0030"><span data-dcnode-id="10365" instrument_node="">2.1</span><span data-dcnode-id="10364" instrument_node="">. </span><span data-dcnode-id="10363" instrument_node="">Flavor identity</span></h3><p data-dcnode-id="10345" id="p0030"><span data-dcnode-id="10361" instrument_node="">Perhaps the most robustly demonstrated effect of adding (or changing) food coloring has been on the ability of people to identify the flavor of food or, more commonly, drink (see </span><a class="workspace-trigger" data-dcnode-id="10359" href="#bib125" name="bbib125"><span data-dcnode-id="10360" instrument_node="">Spence, 2015b</span></a><span data-dcnode-id="10358" instrument_node="">, for a review). For instance, classic research by </span><a class="workspace-trigger" data-dcnode-id="10356" href="#bib37" name="bbib37"><span data-dcnode-id="10357" instrument_node="">DuBose et al. (1980)</span></a><span data-dcnode-id="10355" instrument_node=""> demonstrated that the addition of food coloring (green, red, or orange) biased participants’ judgments concerning the identity of the cherry-flavored solution. Nearly 20% of the participants reported that the drink tasted of orange when the solution was colored orange compared to no such responses when the same drink was colored red, green, or remained colorless. Meanwhile, coloring the same drink green led to 26% lime-flavored responses as compared to no such responses when the drink was colored red or orange (see also </span><a class="workspace-trigger" data-dcnode-id="10353" href="#bib65" name="bbib65"><span data-dcnode-id="10354" instrument_node="">Hyman, 1983</span></a><span data-dcnode-id="10352" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10350" href="#bib134" name="bbib134"><span data-dcnode-id="10351" instrument_node="">Stillman, 1993</span></a><span data-dcnode-id="10349" instrument_node="">; and </span><a class="workspace-trigger" data-dcnode-id="10347" href="#bib150" name="bbib150"><span data-dcnode-id="10348" instrument_node="">Watson, 2013</span></a><span data-dcnode-id="10346" instrument_node="">, for similar results).</span></p><div data-dcnode-id="10310"><p data-dcnode-id="10336" id="p0035"><a class="workspace-trigger" data-dcnode-id="10343" href="#bib94" name="bbib94"><span data-dcnode-id="10344" instrument_node="">Oram et al. (1995)</span></a><span data-dcnode-id="10342" instrument_node=""> gave more than 300 participants of various ages four drinks to taste. Four possible flavors (chocolate, orange, pineapple, and strawberry) were </span><span data-dcnode-id="10341" id="p109"></span><span data-dcnode-id="10340" instrument_node="">presented in four different colors (brown, yellow, orange, and red) thus giving rise to a total of 16 possible drinks. The participant had to try to discriminate the flavor of the drinks. The results highlighted a clear developmental trend toward an increased ability to correctly report the flavor of the drinks, regardless of the drink’s color (see </span><a class="workspace-trigger" data-dcnode-id="10338" href="#f0015" name="bf0015"><span data-dcnode-id="10339" instrument_node="">Fig. 6.1</span></a><span data-dcnode-id="10337" instrument_node="">). That is, the crossmodal modulation of flavor perception by color apparently decreased from 2 years of age up.</span></p><figure class="figure text-xs" data-dcnode-id="10311" id="f0015"><span data-dcnode-id="10326"><img alt="" aria-describedby="cap0015" data-dcnode-id="10335" height="316" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-01-9780081003503.jpg&amp;raw"><span data-dcnode-id="10334" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10327"><li data-dcnode-id="10328"><a class="anchor download-link u-font-sans" data-dcnode-id="10329" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-01-9780081003503.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10330"><span data-dcnode-id="10333" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10331"><span data-dcnode-id="10332" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10312"><span data-dcnode-id="10320" id="cap0015"><p data-dcnode-id="10321" id="sp0015"><span class="label" data-dcnode-id="10324"><span data-dcnode-id="10325" instrument_node="">Figure 6.1</span></span><span data-dcnode-id="10323" instrument_node="">. </span><span data-dcnode-id="10322" instrument_node="">Graph highlighting the percentage of trials in which the participants’ flavor discrimination response matched the color of the drink, the actual flavor of the drink, or matched neither the color nor flavor of the drink as a function of the age of the participants in a developmental study of the psychological impact of color on people’s flavor discrimination responses.</span></p></span><span data-dcnode-id="10313"><em data-dcnode-id="10318"><span data-dcnode-id="10319" instrument_node="">Source</span></em><span data-dcnode-id="10317" instrument_node="">: Redrawn from </span><a class="workspace-trigger" data-dcnode-id="10315" href="#bib94" name="bbib94"><span data-dcnode-id="10316" instrument_node="">Oram et al. (1995)</span></a><span data-dcnode-id="10314" instrument_node="">.</span></span></span></figure></div><div data-dcnode-id="10257"><p data-dcnode-id="10286" id="p0040"><span data-dcnode-id="10309" instrument_node="">Importantly, in this and the majority of other published studies that have been reported so far, the participants were given no information about the possibility that the solutions might have been incongruently colored (a point to which we return later). Subsequent research by </span><a class="workspace-trigger" data-dcnode-id="10307" href="#bib159" name="bbib159"><span data-dcnode-id="10308" instrument_node="">Zampini et al., 2007</span></a><span data-dcnode-id="10306" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10304" href="#bib160" name="bbib160"><span data-dcnode-id="10305" instrument_node="">Zampini et al., 2008</span></a><span data-dcnode-id="10303" instrument_node=""> demonstrated that adult participants were often confused by the addition of inappropriate color to a range of fruit-flavored soft drinks (see </span><a class="workspace-trigger" data-dcnode-id="10301" href="#f0010" name="bf0010"><span data-dcnode-id="10302" instrument_node="">Fig. 6.2</span></a><span data-dcnode-id="10300" instrument_node="">). Zampini et al. demonstrated that such a crossmodal influence of beverage color on flavor identification could not be circumvented even if the participants had been explicitly informed that they should try to ignore the potentially misleading food coloring as much as possible. Such results therefore hint at the automaticity of these kinds of crossmodal effects. Although beyond the scope of the present chapter, it is perhaps also worth noting that food coloring can influence the perceived thirst-quenching (or refreshing) properties of drinks as well (eg, </span><a class="workspace-trigger" data-dcnode-id="10298" href="#bib26" name="bbib26"><span data-dcnode-id="10299" instrument_node="">Clydesdale, Gover, Philipsen, &amp; Fugardi, 1992</span></a><span data-dcnode-id="10297" id="p110"></span><span data-dcnode-id="10296" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10294" href="#bib58" name="bbib58"><span data-dcnode-id="10295" instrument_node="">Guinard, Souchard, Picot, Rogeaux, &amp; Siefferman, 1998</span></a><span data-dcnode-id="10293" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10291" href="#bib162" name="bbib162"><span data-dcnode-id="10292" instrument_node="">Zellner and Durlach, 2002</span></a><span data-dcnode-id="10290" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10288" href="#bib163" name="bbib163"><span data-dcnode-id="10289" instrument_node="">Zellner and Durlach, 2003</span></a><span data-dcnode-id="10287" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="10258" id="f0010"><span data-dcnode-id="10276"><img alt="" aria-describedby="cap0010" data-dcnode-id="10285" height="346" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-02-9780081003503.jpg&amp;raw"><span data-dcnode-id="10284" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10277"><li data-dcnode-id="10278"><a class="anchor download-link u-font-sans" data-dcnode-id="10279" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-02-9780081003503.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10280"><span data-dcnode-id="10283" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10281"><span data-dcnode-id="10282" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10259"><span data-dcnode-id="10267" id="cap0010"><p data-dcnode-id="10268" id="sp0010"><span class="label" data-dcnode-id="10274"><span data-dcnode-id="10275" instrument_node="">Figure 6.2</span></span><span data-dcnode-id="10273" instrument_node="">. </span><span data-dcnode-id="10272" instrument_node="">Mean percentage of correct flavor discrimination responses for the lime (A), orange (B), strawberry (C), and flavorless (D) solutions presented in </span><a class="workspace-trigger" data-dcnode-id="10270" href="#bib159" name="bbib159"><span data-dcnode-id="10271" instrument_node="">Zampini et al. (2007</span></a><span data-dcnode-id="10269" instrument_node="">; Experiment 2). The error bars represent the between-participants standard errors of the means. These results clearly show the deleterious effect of adding inappropriate food color on participants’ flavor identification responses, at least for the lime- and orange-flavored drinks. (Somewhat surprisingly, the addition of food coloring had little effect on the accuracy of participants’ flavor discrimination responses for the strawberry-flavored solution.) Critical to the present discussion, increasing the intensity of food coloring had no effect on flavor identification, nor on judgments of flavor intensity.</span></p></span><span data-dcnode-id="10260"><em data-dcnode-id="10265"><span data-dcnode-id="10266" instrument_node="">Source</span></em><span data-dcnode-id="10264" instrument_node="">: Figure reprinted with permission from </span><a class="workspace-trigger" data-dcnode-id="10262" href="#bib159" name="bbib159"><span data-dcnode-id="10263" instrument_node="">Zampini et al. (2007)</span></a><span data-dcnode-id="10261" instrument_node="">.</span></span></span></figure></div></section><section data-dcnode-id="10143" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10252" id="st0035"><span data-dcnode-id="10255" instrument_node="">2.2</span><span data-dcnode-id="10254" instrument_node="">. </span><span data-dcnode-id="10253" instrument_node="">Taste/flavor intensity</span></h3><p data-dcnode-id="10229" id="p0045"><span data-dcnode-id="10251" instrument_node="">The majority of consumers expect more intensely colored foods and beverages (not to mention the packaging in which such products come) to have a more intense taste/flavor. Over the last 50 years or so, a large body of laboratory research has demonstrated that adding more coloring to a food, or more often, to a beverage (see </span><a class="workspace-trigger" data-dcnode-id="10249" href="#bib125" name="bbib125"><span data-dcnode-id="10250" instrument_node="">Spence, 2015b</span></a><span data-dcnode-id="10248" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10246" href="#bib128" name="bbib128"><span data-dcnode-id="10247" instrument_node="">Spence et al., 2010</span></a><span data-dcnode-id="10245" instrument_node="">, for reviews), can lead the participants in laboratory research to rate the taste and/or flavor as more intense (eg, </span><a class="workspace-trigger" data-dcnode-id="10243" href="#bib15" name="bbib15"><span data-dcnode-id="10244" instrument_node="">Calvo et al., 2001</span></a><span data-dcnode-id="10242" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10240" href="#bib71" name="bbib71"><span data-dcnode-id="10241" instrument_node="">Johnson &amp; Clydesdale, 1982</span></a><span data-dcnode-id="10239" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10237" href="#bib69" name="bbib69"><span data-dcnode-id="10238" instrument_node="">Johnson, Dzendolet, &amp; Clydesdale, 1983</span></a><span data-dcnode-id="10236" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10234" href="#bib70" name="bbib70"><span data-dcnode-id="10235" instrument_node="">Johnson, Dzendolet, Damon, Sawyer, &amp; Clydesdale, 1982</span></a><span data-dcnode-id="10233" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10231" href="#bib93" name="bbib93"><span data-dcnode-id="10232" instrument_node="">Norton &amp; Johnson, 1987</span></a><span data-dcnode-id="10230" instrument_node="">).</span></p><p data-dcnode-id="10218" id="p0050"><span data-dcnode-id="10228" instrument_node="">The addition of food coloring has also been shown to influence sensory thresholds for certain basic tastes. For example, in one classic study, </span><a class="workspace-trigger" data-dcnode-id="10226" href="#bib84" name="bbib84"><span data-dcnode-id="10227" instrument_node="">Maga (1974)</span></a><span data-dcnode-id="10225" instrument_node=""> demonstrated that adding food coloring (red, green, or yellow) to an otherwise clear solution exerted </span><span data-dcnode-id="10224" id="p111"></span><span data-dcnode-id="10223" instrument_node="">a significant effect on thresholds for the detection of certain of the basic tastes when they were presented in solution: The addition of green food coloring decreased people’s detection threshold for sourness, while simultaneously increasing their sensitivity to sweetness. The addition of yellow coloring reduced people’s detection threshold to sourness and sweetness, while the addition of red food coloring reduced people’s sensitivity to bitterness.</span><a class="workspace-trigger" data-dcnode-id="10220" href="#fn2" name="bfn2"><sup data-dcnode-id="10221"><span data-dcnode-id="10222" instrument_node="">2</span></sup></a><span data-dcnode-id="10219" instrument_node=""> By contrast, the threshold for salt was unaffected by the addition of coloring.</span></p><p data-dcnode-id="10211" id="p0055"><a class="workspace-trigger" data-dcnode-id="10216" href="#bib84" name="bbib84"><span data-dcnode-id="10217" instrument_node="">Maga’s (1974)</span></a><span data-dcnode-id="10215" instrument_node=""> suggestion here is that salty foods come in many different colors, and so are not associated especially with any particular color. However, the latest research on the color associations that people hold to basic tastes clearly shows that saltiness is strongly associated with white (and to a lesser extent blue). As it happens, neither of these colors were included in Maga’s study. Thus, it could be argued that the appropriate color was simply not tested, and that is why no effect of color on the saltiness threshold was observed (see </span><a class="workspace-trigger" data-dcnode-id="10213" href="#bib130" name="bbib130"><span data-dcnode-id="10214" instrument_node="">Spence et al., 2015</span></a><span data-dcnode-id="10212" instrument_node="">).</span></p><p data-dcnode-id="10203" id="p0060"><span data-dcnode-id="10210" instrument_node="">Perhaps the most convincing evidence published to date concerning the influence of food coloring on ratings of taste intensity comes from </span><a class="workspace-trigger" data-dcnode-id="10208" href="#bib26" name="bbib26"><span data-dcnode-id="10209" instrument_node="">Clydesdale et al. (1992)</span></a><span data-dcnode-id="10207" instrument_node="">. These researchers conducted a number of psychophysical studies showing that the addition of the appropriate food coloring (in this case, red) increased perceived sweetness by as much as 10%. Indeed, such results have led some to wonder whether food coloring could be used as an effective means of reducing the sugar content of foods. While this is certainly a theoretical possibility it is worth bearing in mind that the majority of the studies that have been published to date have involved fairly short-term exposure to particular combinations of color–taste/flavor. And while it is one thing to demonstrate that food coloring has a short-term impact on sweetness perception, it is quite another to demonstrate that it will necessarily have psychological effects over the long term (cf. </span><a class="workspace-trigger" data-dcnode-id="10205" href="#bib80" name="bbib80"><span data-dcnode-id="10206" instrument_node="">Levitan, Zampini, Li, &amp; Spence, 2008</span></a><span data-dcnode-id="10204" instrument_node="">). As such, it can be argued that longer-term follow-ups are urgently needed.</span></p><div data-dcnode-id="10161"><p data-dcnode-id="10190" id="p0065"><span data-dcnode-id="10202" instrument_node="">At this point, it is, however, important to note that changing the color of a food (or more often, beverage) has not always influenced people’s ratings of perceived taste/flavor intensity. For instance, </span><a class="workspace-trigger" data-dcnode-id="10200" href="#bib93" name="bbib93"><span data-dcnode-id="10201" instrument_node="">Norton and Johnson (1987)</span></a><span data-dcnode-id="10199" instrument_node=""> reported one such null result. Although these researchers manipulated the intensity of four typical drink colors, they were unable to find any meaningful relationship between the intensity of the color and participants’ flavor ratings on either a sweet–sour scale, or on a distinct–indistinct flavor scale. Elsewhere, </span><a class="workspace-trigger" data-dcnode-id="10197" href="#bib159" name="bbib159"><span data-dcnode-id="10198" instrument_node="">Zampini et al. (2007)</span></a><span data-dcnode-id="10196" instrument_node=""> conducted an experiment in which a group of adults had to try to identify the flavor of a variety of drinks and rate the perceived intensity of the flavor using a Labeled Magnitude Scale. The drinks were flavorless, or else had an orange, lime, or strawberry flavor added. The solutions were artificially colored with either a standard or double concentration of </span><span data-dcnode-id="10195" id="p112"></span><span data-dcnode-id="10194" instrument_node="">red, green, or orange coloring, or else were left colorless. Once again, however, variations in the intensity of the food coloring that was added (no matter whether that color was appropriate or inappropriate to the flavor of the drink) did not influence the perceived intensity of a drink’s flavor. That said, the addition of inappropriate food coloring significantly impaired the participants’ flavor identification responses (see </span><a class="workspace-trigger" data-dcnode-id="10192" href="#f0020" name="bf0020"><span data-dcnode-id="10193" instrument_node="">Fig. 6.3</span></a><span data-dcnode-id="10191" instrument_node="">), thus suggesting that the participants were unable to ignore the color of the drinks completely, as they had been encouraged to do by the experimenter.</span></p><figure class="figure text-xs" data-dcnode-id="10162" id="f0020"><span data-dcnode-id="10180"><img alt="" aria-describedby="cap0020" data-dcnode-id="10189" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-03-9780081003503.jpg&amp;raw"><span data-dcnode-id="10188" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10181"><li data-dcnode-id="10182"><a class="anchor download-link u-font-sans" data-dcnode-id="10183" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-03-9780081003503.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10184"><span data-dcnode-id="10187" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10185"><span data-dcnode-id="10186" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10163"><span data-dcnode-id="10171" id="cap0020"><p data-dcnode-id="10172" id="sp0020"><span class="label" data-dcnode-id="10178"><span data-dcnode-id="10179" instrument_node="">Figure 6.3</span></span><span data-dcnode-id="10177" instrument_node="">. </span><span data-dcnode-id="10176" instrument_node="">Summary of the results of </span><a class="workspace-trigger" data-dcnode-id="10174" href="#bib160" name="bbib160"><span data-dcnode-id="10175" instrument_node="">Zampini et al.’s (2008)</span></a><span data-dcnode-id="10173" instrument_node=""> study highlighting the influence of color on people’s ability to correctly identify orange- and blackcurrant-flavored solutions.</span></p></span><span data-dcnode-id="10164"><em data-dcnode-id="10169"><span data-dcnode-id="10170" instrument_node="">Source</span></em><span data-dcnode-id="10168" instrument_node="">: Figure reprinted with permission from </span><a class="workspace-trigger" data-dcnode-id="10166" href="#bib128" name="bbib128"><span data-dcnode-id="10167" instrument_node="">Spence et al. (2010)</span></a><span data-dcnode-id="10165" instrument_node="">.</span></span></span></figure></div><p data-dcnode-id="10150" id="p0070"><span data-dcnode-id="10160" instrument_node="">Meanwhile, </span><a class="workspace-trigger" data-dcnode-id="10158" href="#bib78" name="bbib78"><span data-dcnode-id="10159" instrument_node="">Lavin and Lawless (1998)</span></a><span data-dcnode-id="10157" instrument_node=""> investigated the influence of varying the intensity of food coloring on people’s ratings of sweetness intensity for two pairs of strawberry-flavored drinks. One pair light- and dark-red, the other pair light- and dark-green. The drinks were equally physically sweet and varied only in terms of their color intensity. The adults who took part in this study rated the dark-red and light-green drinks as tasting sweeter than the light-red and dark-green samples, respectively. By contrast, the intensity of the color did not exert any effect on the responses of children aged between 5 and 14 years. Elsewhere, </span><a class="workspace-trigger" data-dcnode-id="10155" href="#bib2" name="bbib2"><span data-dcnode-id="10156" instrument_node="">Alley and Alley (1998)</span></a><span data-dcnode-id="10154" instrument_node=""> also failed to demonstrate any effect of the addition of food coloring (red, blue, yellow, or green) to otherwise colorless sweet solutions in a group of 11–13-year-olds. </span><a class="workspace-trigger" data-dcnode-id="10152" href="#bib101" name="bbib101"><span data-dcnode-id="10153" instrument_node="">Philipsen, Clydesdale, Griffin, and Stern (1995)</span></a><span data-dcnode-id="10151" instrument_node=""> had a group of young adults, aged 18–22 years, and a group of older participants, aged 60–75 years, rate a number of attributes (eg, sweetness, flavor intensity, flavor quality, flavor identification, etc.) of 15 samples of an artificially flavored cherry beverage that varied in terms of their sucrose content, flavor, and color. Interestingly, variations in color intensity had no effect on sweetness ratings in either age group. However, they did influence flavor intensity ratings in the older group.</span></p><p data-dcnode-id="10144" id="p0075"><a class="workspace-trigger" data-dcnode-id="10148" href="#bib20" name="bbib20"><span data-dcnode-id="10149" instrument_node="">Chan and Kane-Martinelli (1997)</span></a><span data-dcnode-id="10147" instrument_node=""> examined the effect of food coloring on perceived flavor intensity and acceptability ratings for chicken bouillon and chocolate pudding. The foods were presented with no color added, with the normal (ie, commercial) level of food coloring, or else with double the normal amount of coloring </span><span data-dcnode-id="10146" id="p113"></span><span data-dcnode-id="10145" instrument_node="">added. The participants tasted and then evaluated the three samples of either food using visual analog scales. The results of this study revealed that the younger adults (20–35 years of age) were more influenced by the presence of food coloring than were the older adults (60–90 years of age). In particular, the younger group’s judgment of the overall flavor intensity of the chicken bouillon was influenced by the amount of coloring that had been added to the sample.</span></p></section><section data-dcnode-id="9966" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10139" id="st0040"><span data-dcnode-id="10142" instrument_node="">2.3</span><span data-dcnode-id="10141" instrument_node="">. </span><span data-dcnode-id="10140" instrument_node="">Interim summary</span></h3><p data-dcnode-id="10080" id="p0080"><span data-dcnode-id="10138" instrument_node="">Taken together, the results that have been reviewed in this section suggest that the psychological effects of adding or changing the intensity of food coloring on the </span><em data-dcnode-id="10136"><span data-dcnode-id="10137" instrument_node="">intensity</span></em><span data-dcnode-id="10135" instrument_node=""> of taste/flavor perception are not altogether clear. Null results have been reported in a number of seemingly well-conducted studies (eg, </span><a class="workspace-trigger" data-dcnode-id="10133" href="#bib2" name="bbib2"><span data-dcnode-id="10134" instrument_node="">Alley &amp; Alley, 1998</span></a><span data-dcnode-id="10132" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10130" href="#bib43" name="bbib43"><span data-dcnode-id="10131" instrument_node="">Frank, Ducheny, &amp; Mize, 1989</span></a><span data-dcnode-id="10129" instrument_node="">), while even those who have obtained significant effects of color on taste/flavor intensity ratings/perception have tended to do so only under a subset of experimental conditions, or else in a subset of those individuals whom they have chosen to test (</span><a class="workspace-trigger" data-dcnode-id="10127" href="#bib10" name="bbib10"><span data-dcnode-id="10128" instrument_node="">Bayarri et al., 2001</span></a><span data-dcnode-id="10126" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10124" href="#bib20" name="bbib20"><span data-dcnode-id="10125" instrument_node="">Chan and Kane-Martinelli, 1997</span></a><span data-dcnode-id="10123" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10121" href="#bib37" name="bbib37"><span data-dcnode-id="10122" instrument_node="">DuBose et al., 1980</span></a><span data-dcnode-id="10120" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10118" href="#bib41" name="bbib41"><span data-dcnode-id="10119" instrument_node="">Fernández-Vázquez et al., 2014</span></a><span data-dcnode-id="10117" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10115" href="#bib52" name="bbib52"><span data-dcnode-id="10116" instrument_node="">Gifford and Clydesdale, 1986</span></a><span data-dcnode-id="10114" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10112" href="#bib53" name="bbib53"><span data-dcnode-id="10113" instrument_node="">Gifford et al., 1987</span></a><span data-dcnode-id="10111" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10109" href="#bib78" name="bbib78"><span data-dcnode-id="10110" instrument_node="">Lavin and Lawless, 1998</span></a><span data-dcnode-id="10108" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10106" href="#bib84" name="bbib84"><span data-dcnode-id="10107" instrument_node="">Maga, 1974</span></a><span data-dcnode-id="10105" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10103" href="#bib86" name="bbib86"><span data-dcnode-id="10104" instrument_node="">McCullough et al., 1978</span></a><span data-dcnode-id="10102" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10100" href="#bib96" name="bbib96"><span data-dcnode-id="10101" instrument_node="">Pangborn, 1960</span></a><span data-dcnode-id="10099" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10097" href="#bib97" name="bbib97"><span data-dcnode-id="10098" instrument_node="">Pangborn and Hansen, 1963</span></a><span data-dcnode-id="10096" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10094" href="#bib101" name="bbib101"><span data-dcnode-id="10095" instrument_node="">Philipsen et al., 1995</span></a><span data-dcnode-id="10093" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10091" href="#bib109" name="bbib109"><span data-dcnode-id="10092" instrument_node="">Roth et al., 1988</span></a><span data-dcnode-id="10090" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10088" href="#bib135" name="bbib135"><span data-dcnode-id="10089" instrument_node="">Strugnell, 1997</span></a><span data-dcnode-id="10087" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10085" href="#bib159" name="bbib159"><span data-dcnode-id="10086" instrument_node="">Zampini et al., 2007</span></a><span data-dcnode-id="10084" instrument_node="">). Hence, it is difficult to draw any clear conclusions from the range of results that have been published to date as to when exactly the addition of food coloring will or will not influence ratings of taste/flavor intensity. That the addition of food coloring </span><em data-dcnode-id="10082"><span data-dcnode-id="10083" instrument_node="">can</span></em><span data-dcnode-id="10081" instrument_node=""> influence thresholds and ratings of stimulus intensity is not in doubt. However, one of the questions that has been left unresolved by the research that has been published over the last 80 years or so concerns why it is that these seemingly inconsistent results have been obtained.</span></p><div data-dcnode-id="10038"><p data-dcnode-id="10061" id="p0085"><span data-dcnode-id="10079" instrument_node="">According to </span><a class="workspace-trigger" data-dcnode-id="10077" href="#bib114" name="bbib114"><span data-dcnode-id="10078" instrument_node="">Shankar et al., 2010</span></a><span data-dcnode-id="10076" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10074" href="#bib115" name="bbib115"><span data-dcnode-id="10075" instrument_node="">Shankar et al., 2010</span></a><span data-dcnode-id="10073" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="10071" href="#bib116" name="bbib116"><span data-dcnode-id="10072" instrument_node="">Shankar, Simons, Shiv, McClure, and Spence (2010)</span></a><span data-dcnode-id="10070" instrument_node="">, one way to resolve this inconsistency is by considering the “</span><em data-dcnode-id="10068"><span data-dcnode-id="10069" instrument_node="">degree of discrepancy</span></em><span data-dcnode-id="10067" instrument_node="">” between the expected flavor set by color, and the actual flavor when experienced by the participant (or consumer). Under low discrepancy conditions, the perceived disparity between the expected and actual flavor of a drink (or food) is small. Low discrepancy color–flavor combinations might, for example, consist of cranberry- or blueberry-flavored drinks colored purple (purple being associated with grape flavor), whereas high discrepancy combinations might include banana- or vanilla-flavored drinks that had been colored purple. Across several experiments, when a particular color—identified by participants as one that generated a strong flavor expectation—was added to the drinks that the participants had been given to sniff (as compared to when no such color was added), a significantly greater proportion of participants’ identification responses were consistent with this expectation. By contrast, under conditions of high discrepancy, adding the same colors to the drinks no longer affected their identification responses as much. That is, there was a significant difference in the proportion of responses that were consistent with participants’ color-based expectations in </span><span data-dcnode-id="10066" id="p114"></span><span data-dcnode-id="10065" instrument_node="">conditions of low as compared with high discrepancy (see </span><a class="workspace-trigger" data-dcnode-id="10063" href="#f0035" name="bf0035"><span data-dcnode-id="10064" instrument_node="">Fig. 6.4</span></a><span data-dcnode-id="10062" instrument_node="">). Shankar et al.’s results therefore indicate how the degree of discrepancy between an individual’s expected experience (on seeing a drink) and their actual experience (on sniffing, or tasting, it) can significantly affect the extent to which color crossmodally influences judgments of flavor identity.</span></p><figure class="figure text-xs" data-dcnode-id="10039" id="f0035"><span data-dcnode-id="10051"><img alt="" aria-describedby="cap0035" data-dcnode-id="10060" height="254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-04-9780081003503.jpg&amp;raw"><span data-dcnode-id="10059" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10052"><li data-dcnode-id="10053"><a class="anchor download-link u-font-sans" data-dcnode-id="10054" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780081003503000067-f06-04-9780081003503.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10055"><span data-dcnode-id="10058" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10056"><span data-dcnode-id="10057" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10040"><span data-dcnode-id="10045" id="cap0035"><p data-dcnode-id="10046" id="sp0035"><span class="label" data-dcnode-id="10049"><span data-dcnode-id="10050" instrument_node="">Figure 6.4</span></span><span data-dcnode-id="10048" instrument_node="">. </span><span data-dcnode-id="10047" instrument_node="">Summary results from two of the experiments (conducted with the same participants) reported by Shankar et al. (2010c) showing how the addition of food coloring to an otherwise colorless flavored solution led to assimilation when the “degree of discrepancy” between the flavor expected by the color and the actual flavor of the drink when sniffed orthonasally was small (left), but not when the degree of discrepancy was large (right).</span></p></span><span data-dcnode-id="10041"><em data-dcnode-id="10043"><span data-dcnode-id="10044" instrument_node="">Source</span></em><span data-dcnode-id="10042" instrument_node="">: Figures reprinted with permission from Shankar et al. (2010c).</span></span></span></figure></div><p data-dcnode-id="9992" id="p0090"><span data-dcnode-id="10037" instrument_node="">That said, one thing to bear in mind about the studies of </span><a class="workspace-trigger" data-dcnode-id="10035" href="#bib114" name="bbib114"><span data-dcnode-id="10036" instrument_node="">Shankar et al., 2010</span></a><span data-dcnode-id="10034" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10032" href="#bib115" name="bbib115"><span data-dcnode-id="10033" instrument_node="">Shankar et al., 2010</span></a><span data-dcnode-id="10031" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="10029" href="#bib116" name="bbib116"><span data-dcnode-id="10030" instrument_node="">Shankar, Simons, Shiv, McClure, et al. (2010)</span></a><span data-dcnode-id="10028" instrument_node=""> is that the participants never got to taste the flavored drinks that they were judging. That is, all their judgments/ratings were made on the basis of orthonasal olfaction. One might not expect this to matter all that much, given the extensive literature showing that color cues modulate orthonasal olfactory discrimination/identification responses across a wide range of experimental conditions (eg, </span><a class="workspace-trigger" data-dcnode-id="10026" href="#bib12" name="bbib12"><span data-dcnode-id="10027" instrument_node="">Blackwell, 1995</span></a><span data-dcnode-id="10025" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10023" href="#bib30" name="bbib30"><span data-dcnode-id="10024" instrument_node="">Davis, 1981</span></a><span data-dcnode-id="10022" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10020" href="#bib88" name="bbib88"><span data-dcnode-id="10021" instrument_node="">Michael, Galich, Relland, &amp; Prud’hon, 2010</span></a><span data-dcnode-id="10019" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10017" href="#bib100" name="bbib100"><span data-dcnode-id="10018" instrument_node="">Petit, Hollowood, Wulfert, &amp; Hort, 2007</span></a><span data-dcnode-id="10016" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10014" href="#bib133" name="bbib133"><span data-dcnode-id="10015" instrument_node="">Stevenson &amp; Oaten, 2008</span></a><span data-dcnode-id="10013" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10011" href="#bib166" name="bbib166"><span data-dcnode-id="10012" instrument_node="">Zellner, Bartoli, &amp; Eckard, 1991</span></a><span data-dcnode-id="10010" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10008" href="#bib164" name="bbib164"><span data-dcnode-id="10009" instrument_node="">Zellner &amp; Kautz, 1990</span></a><span data-dcnode-id="10007" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="10005" href="#bib165" name="bbib165"><span data-dcnode-id="10006" instrument_node="">Zellner &amp; Whitten, 1999</span></a><span data-dcnode-id="10004" instrument_node="">; see </span><a class="workspace-trigger" data-dcnode-id="10002" href="#bib161" name="bbib161"><span data-dcnode-id="10003" instrument_node="">Zellner, 2013</span></a><span data-dcnode-id="10001" instrument_node="">, for a review).</span><a class="workspace-trigger" data-dcnode-id="9998" href="#fn3" name="bfn3"><sup data-dcnode-id="9999"><span data-dcnode-id="10000" instrument_node="">3</span></sup></a><span data-dcnode-id="9997" instrument_node=""> However, </span><a class="workspace-trigger" data-dcnode-id="9995" href="#bib76" name="bbib76"><span data-dcnode-id="9996" instrument_node="">Koza, Cilmi, Dolese, and Zellner (2005)</span></a><span data-dcnode-id="9994" instrument_node=""> have shown differing effects of food color on orthonasal and retronasal judgments of a commercial fruit-flavored water drink. Coloring a tangerine–pineapple–guava-flavored solution red led to odor enhancement in those participants who sniffed the odor orthonasally, while leading to a reduction in perceived odor intensity when the same olfactory stimulus was presented retronasally instead!</span><span data-dcnode-id="9993" id="p115"></span></p><p data-dcnode-id="9984" id="p0095"><span data-dcnode-id="9991" instrument_node="">Koza and colleagues attempted to account for this admittedly surprising pattern of results by suggesting that it is more important for us to correctly evaluate foods once they have entered our mouths, since that is when they pose a greater risk of poisoning. By contrast, foods that are located outside the mouth are simply less likely to poison us. Whatever the most appropriate explanation turns out to be, the main point to note is that one cannot simply assume that a color’s effect on orthonasal olfactory judgments of a food or drink’s flavor (ie, when sniffing) will necessarily be the same when people come to actually taste the food or drink item (and retronasal olfaction comes into play). Another point to note here is that a lack of precise color measurement has made it difficult for those waiting to replicate many of the studies that have been published to date (cf. </span><a class="workspace-trigger" data-dcnode-id="9989" href="#bib24" name="bbib24"><span data-dcnode-id="9990" instrument_node="">Clydesdale, 1991</span></a><span data-dcnode-id="9988" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9986" href="#bib42" name="bbib42"><span data-dcnode-id="9987" instrument_node="">Francis &amp; Clydesdale, 1975</span></a><span data-dcnode-id="9985" instrument_node="">).</span></p><p data-dcnode-id="9967" id="p0100"><span data-dcnode-id="9983" instrument_node="">However, here, perhaps, one also needs to take a step back and consider what happens if the sensory expectations set by the intensity of food coloring fail to match the experience when a food or beverage item is actually tasted by the participant/consumer. In much of the laboratory research, there is a very real question as to whether the participants actually believed that the colors of the foods or drinks that they were tasting had meaning—that is, to what extent did they really think that the food coloring they saw was linked to the actual taste/flavor of the drinks that they were tasting? It can be wondered whether or not participants noticed any discrepancy between what they saw and what they tasted (</span><a class="workspace-trigger" data-dcnode-id="9981" href="#bib94" name="bbib94"><span data-dcnode-id="9982" instrument_node="">Oram et al., 1995</span></a><span data-dcnode-id="9980" instrument_node="">). While such an assumption is presumably likely out there in the real world, it is not so clearly the case for those participants in laboratory research who may well have been exposed to a whole series of inappropriately colored samples to taste and evaluate. What is more, the studies that have been published to date vary between those where the researchers have been very explicit about the fact that the color cues were designed to be misleading (</span><a class="workspace-trigger" data-dcnode-id="9978" href="#bib159" name="bbib159"><span data-dcnode-id="9979" instrument_node="">Zampini et al., 2007</span></a><span data-dcnode-id="9977" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9975" href="#bib160" name="bbib160"><span data-dcnode-id="9976" instrument_node="">Zampini et al., 2008</span></a><span data-dcnode-id="9974" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="9972" href="#bib99" name="bbib99"><span data-dcnode-id="9973" instrument_node="">Parr, White, &amp; Heatherbell, 2003</span></a><span data-dcnode-id="9971" instrument_node="">), and those where the researchers have done everything that they can to hide the true purpose of their study from their participants (</span><a class="workspace-trigger" data-dcnode-id="9969" href="#bib46" name="bbib46"><span data-dcnode-id="9970" instrument_node="">Garber, Hyatt, &amp; Starr, 2000</span></a><span data-dcnode-id="9968" instrument_node="">).</span></p></section></section><section data-dcnode-id="9907" id="s0035"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9961" id="st0045"><span data-dcnode-id="9964" instrument_node="">3</span><span data-dcnode-id="9963" instrument_node="">. </span><span data-dcnode-id="9962" instrument_node="">Names, brands, and colors</span></h2><p data-dcnode-id="9930" id="p0105"><span data-dcnode-id="9960" instrument_node="">Given the ambiguity in the meaning of color in foods and beverages, it can sometimes be important that the name/description of a food or beverage sets the right sensory or hedonic expectations, or else help to disambiguate between the different possible meanings of a given color. Perhaps the classic example here comes from the work of </span><a class="workspace-trigger" data-dcnode-id="9958" href="#bib158" name="bbib158"><span data-dcnode-id="9959" instrument_node="">Yeomans, Chambers, Blumenthal, and Blake (2008)</span></a><span data-dcnode-id="9957" instrument_node="">. These researchers demonstrated that when the meaning of the color of food is misinterpreted (ie, when it sets the wrong sensory expectations) this can have an adverse effect on people’s subsequent taste ratings. Yeoman et al.’s participants tasted a bright pink ice-cream. One group of participants was given no information about the dish, another group were informed that the food was called “Food 386,” and a third group was told that what they were about to eat was a “frozen savory mousse.” The participants in the former group who were led by their eyes into expecting that they would taste a strawberry-flavored ice-cream (which has the same pinkish-red color) did not like the dish when they tried it. Specifically, </span><span data-dcnode-id="9956" id="p116"></span><span data-dcnode-id="9955" instrument_node="">they rated the savory smoked salmon ice-cream as tasting too salty. By contrast, the participants in the other two groups were more likely to rate the seasoning of the dish as being about right, and, what is more, liked the savory ice-cream more as well (see also </span><a class="workspace-trigger" data-dcnode-id="9953" href="#bib63" name="bbib63"><span data-dcnode-id="9954" instrument_node="">Hoegg &amp; Alba, 2007</span></a><span data-dcnode-id="9952" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9950" href="#bib89" name="bbib89"><span data-dcnode-id="9951" instrument_node="">Miller &amp; Kahn, 2005</span></a><span data-dcnode-id="9949" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9947" href="#bib112" name="bbib112"><span data-dcnode-id="9948" instrument_node="">Shankar, Levitan, Prescott, &amp; Spence, 2009</span></a><span data-dcnode-id="9946" instrument_node="">). Results such as these demonstrate that the meaning of color in food and drink can be altered simply by the description that is given to a product or dish (</span><a class="workspace-trigger" data-dcnode-id="9944" href="#bib127" name="bbib127"><span data-dcnode-id="9945" instrument_node="">Spence &amp; Piqueras-Fiszman, 2014</span></a><span data-dcnode-id="9943" instrument_node="">). Generally speaking (ie, in all environments except perhaps the modernist restaurant), it is important to avoid disconfirmed expectations (</span><a class="workspace-trigger" data-dcnode-id="9941" href="#bib18" name="bbib18"><span data-dcnode-id="9942" instrument_node="">Carlsmith and Aronson, 1963</span></a><span data-dcnode-id="9940" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9938" href="#bib79" name="bbib79"><span data-dcnode-id="9939" instrument_node="">Lelièvre et al., 2009</span></a><span data-dcnode-id="9937" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9935" href="#bib82" name="bbib82"><span data-dcnode-id="9936" instrument_node="">Mace and Enzie, 1970</span></a><span data-dcnode-id="9934" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9932" href="#bib103" name="bbib103"><span data-dcnode-id="9933" instrument_node="">Piqueras-Fiszman and Spence, 2012</span></a><span data-dcnode-id="9931" instrument_node="">).</span></p><p data-dcnode-id="9916" id="p0110"><span data-dcnode-id="9929" instrument_node="">Indeed, the typical laboratory situation can be contrasted with that of everyday consumption episodes when a food or drink will most likely be encountered in the context of branding/packaging information, or may well have been described by whoever has prepared or happens to be serving it. In other words, it can be argued that the situation that is typically studied in the laboratory is quite unlike that of everyday life (see also </span><a class="workspace-trigger" data-dcnode-id="9927" href="#bib47" name="bbib47"><span data-dcnode-id="9928" instrument_node="">Garber et al., 2001</span></a><span data-dcnode-id="9926" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9924" href="#bib48" name="bbib48"><span data-dcnode-id="9925" instrument_node="">Garber et al., 2003a</span></a><span data-dcnode-id="9923" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9921" href="#bib49" name="bbib49"><span data-dcnode-id="9922" instrument_node="">Garber et al., 2003b</span></a><span data-dcnode-id="9920" instrument_node="">, on this point). Hence, one concern here is that the results of much of the laboratory research that has been conducted to date may end up giving a biased view of the importance of color in multisensory flavor perception. Under typical laboratory testing conditions, color is the only cue that participants have normally had to go on. By contrast, in the majority of real-world consumption situations, color is but one of many cues (including branding, pricing, labeling, etc.) that consumers can, and most certainly do, use (</span><a class="workspace-trigger" data-dcnode-id="9918" href="#bib34" name="bbib34"><span data-dcnode-id="9919" instrument_node="">Di Monaco, Cavella, Iaccarino, Mincione, &amp; Masi, 2003</span></a><span data-dcnode-id="9917" instrument_node="">).</span></p><p data-dcnode-id="9908" id="p0115"><span data-dcnode-id="9915" instrument_node="">One other product-extrinsic cue that modulates the meaning of color in beverages is the nature of the glass or receptacle in which a drink happens to be presented (see </span><a class="workspace-trigger" data-dcnode-id="9913" href="#bib147" name="bbib147"><span data-dcnode-id="9914" instrument_node="">Wan et al., 2014</span></a><span data-dcnode-id="9912" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9910" href="#bib148" name="bbib148"><span data-dcnode-id="9911" instrument_node="">Wan et al., 2015</span></a><span data-dcnode-id="9909" instrument_node="">). On occasion, exactly the same drink color may have a very different meaning if shown in a plastic bathroom cup than in a cocktail glass say. The interested reader will find this topic covered in the chapter “Assessing the Influence of the Drinking Receptacle on the Perception of the Contents.”</span></p></section><section data-dcnode-id="9693" id="s0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9903" id="st0050"><span data-dcnode-id="9906" instrument_node="">4</span><span data-dcnode-id="9905" instrument_node="">. </span><span data-dcnode-id="9904" instrument_node="">Psychological effects on food color on behavior</span></h2><p data-dcnode-id="9863" id="p0120"><span data-dcnode-id="9902" instrument_node="">It is important to realize that the psychological effects of food coloring are not restricted to the sensory-discriminative domain. It has often been suggested that food coloring modulates certain of our food-related behaviors as well (eg, </span><a class="workspace-trigger" data-dcnode-id="9900" href="#bib11" name="bbib11"><span data-dcnode-id="9901" instrument_node="">Birren, 1963</span></a><span data-dcnode-id="9899" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9897" href="#bib104" name="bbib104"><span data-dcnode-id="9898" instrument_node="">Piqueras-Fiszman &amp; Spence, 2014</span></a><span data-dcnode-id="9896" instrument_node="">). Certainly, getting the color right plays an important role in food acceptance, liking, and hence, ultimately, intake (eg, </span><a class="workspace-trigger" data-dcnode-id="9894" href="#bib31" name="bbib31"><span data-dcnode-id="9895" instrument_node="">de Wijk, Polet, &amp; Engelen, 2004</span></a><span data-dcnode-id="9893" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9891" href="#bib57" name="bbib57"><span data-dcnode-id="9892" instrument_node="">Gossinger et al., 2009</span></a><span data-dcnode-id="9890" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9888" href="#bib60" name="bbib60"><span data-dcnode-id="9889" instrument_node="">Harris, 2011</span></a><span data-dcnode-id="9887" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9885" href="#bib66" name="bbib66"><span data-dcnode-id="9886" instrument_node="">Imram, 1999</span></a><span data-dcnode-id="9884" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9882" href="#bib67" name="bbib67"><span data-dcnode-id="9883" instrument_node="">Jantathai, Danner, Joechl, &amp; Dürrschmid, 2013</span></a><span data-dcnode-id="9881" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9879" href="#bib111" name="bbib111"><span data-dcnode-id="9880" instrument_node="">Schutz, 1954</span></a><span data-dcnode-id="9878" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9876" href="#bib151" name="bbib151"><span data-dcnode-id="9877" instrument_node="">Wei, Ou, Luo, &amp; Hutchings, 2012</span></a><span data-dcnode-id="9875" instrument_node="">). However, as </span><a class="workspace-trigger" data-dcnode-id="9873" href="#bib47" name="bbib47"><span data-dcnode-id="9874" instrument_node="">Garber et al. (2001)</span></a><span data-dcnode-id="9872" instrument_node=""> point out, while the claim that color influences food preferences is often made by researchers, good marketing-relevant insights tend to be a little harder to come by. Color cues can play an important role in modulating a consumer’s affective expectations (eg, </span><a class="workspace-trigger" data-dcnode-id="9870" href="#bib157" name="bbib157"><span data-dcnode-id="9871" instrument_node="">Wilson &amp; Klaaren, 1992</span></a><span data-dcnode-id="9869" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9867" href="#bib167" name="bbib167"><span data-dcnode-id="9868" instrument_node="">Zellner, Strickhouser, &amp; Tornow, 2004</span></a><span data-dcnode-id="9866" instrument_node="">). And just as there can be a sensory disconfirmation of expectation (as outlined </span><span data-dcnode-id="9865" id="p117"></span><span data-dcnode-id="9864" instrument_node="">above), there can also be a negative disconfirmation of hedonic expectation—that is, when a consumer does not like a food or beverage as much as they were expecting to.</span></p><section data-dcnode-id="9832" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9859" id="st0055"><span data-dcnode-id="9862" instrument_node="">4.1</span><span data-dcnode-id="9861" instrument_node="">. </span><span data-dcnode-id="9860" instrument_node="">On the impact of color variety</span></h3><p data-dcnode-id="9833" id="p0125"><span data-dcnode-id="9858" instrument_node="">People have been shown to consume more candy if it comes in a variety of colors than if offered just a single color of candy (</span><a class="workspace-trigger" data-dcnode-id="9856" href="#bib108" name="bbib108"><span data-dcnode-id="9857" instrument_node="">Rolls, Rowe, &amp; Rolls, 1982</span></a><span data-dcnode-id="9855" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="9853" href="#bib152" name="bbib152"><span data-dcnode-id="9854" instrument_node="">Weir, 2009</span></a><span data-dcnode-id="9852" instrument_node="">), even if that color happens to be their favorite. Whether sensory-specific satiety or boredom is the most appropriate explanation for such results is still being deliberated by researchers (see </span><a class="workspace-trigger" data-dcnode-id="9850" href="#bib104" name="bbib104"><span data-dcnode-id="9851" instrument_node="">Piqueras-Fiszman &amp; Spence, 2014</span></a><span data-dcnode-id="9849" instrument_node="">, for a review). Interestingly, though, while the use of color (specifically increasing the variety of color) is usually portrayed as a means by which food companies can get consumers to consume more, there is some evidence to suggest that color cues can also be used to help control intake, by providing an effective cue to portion control (</span><a class="workspace-trigger" data-dcnode-id="9847" href="#bib50" name="bbib50"><span data-dcnode-id="9848" instrument_node="">Geier, Wansink, &amp; Rozin, 2012</span></a><span data-dcnode-id="9846" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="9844" href="#bib72" name="bbib72"><span data-dcnode-id="9845" instrument_node="">Kahn &amp; Wansink, 2004</span></a><span data-dcnode-id="9843" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9841" href="#bib107" name="bbib107"><span data-dcnode-id="9842" instrument_node="">Redden &amp; Hoch, 2009</span></a><span data-dcnode-id="9840" instrument_node="">). So, for example, </span><a class="workspace-trigger" data-dcnode-id="9838" href="#bib50" name="bbib50"><span data-dcnode-id="9839" instrument
