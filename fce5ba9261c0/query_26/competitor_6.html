54"><svg class="icon-email" data-dcnode-id="955" viewBox="0 0 20 13.32" xmlns="http://www.w3.org/2000/svg"><path d="M20 .1V0H0v.1l10 6.5L20 .1z" data-dcnode-id="957"></path><path d="M10 9.22A1.23 1.23 0 019.35 9L0 3v10.32h20V3l-9.35 6a1.23 1.23 0 01-.65.22z" data-dcnode-id="956"></path></svg></div></a><a class="print" data-dcnode-id="947"><div class="icon" data-dcnode-id="948"><svg class="icon-print" data-dcnode-id="949" viewBox="0 0 20 18.31" xmlns="http://www.w3.org/2000/svg"><rect data-dcnode-id="952" height="3.66" width="9.12" x="5.44"></rect><rect data-dcnode-id="951" height="4.96" width="11.02" x="4.51" y="13.35"></rect><path d="M20,15.14H17.62V10.93H2.38v4.21H0V5.75H20ZM17.43,7.38a.94.94,0,1,0,.94.94.94.94,0,0,0-.94-.94Z" data-dcnode-id="950"></path></svg></div></a></div></div></div></header></div></div><div class="article-body" data-dcnode-id="814"><div class="article-side-ad article-top" data-dcnode-id="940"></div><div class="article-body-wrap" data-dcnode-id="815"><div class="article-text-wrap" data-dcnode-id="930"><div class="article-text-grid" data-dcnode-id="931"><p data-dcnode-id="935"><span data-dcnode-id="939" instrument_node="">Color perception is an ancient and active philosophical problem. It’s an instance of the wider category of sensory perception, but since the color spectrum fits on a single line (unlike, say, touch and taste), it has always been of particular interest. In her new book </span><em data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Outside Color</span></em><span data-dcnode-id="936" instrument_node="">, University of Pittsburgh professor M. Chirimuuta gives a serendipitously timed history of the puzzle of color in philosophy. To read the book as a layman feels like being let in on a shocking secret: Neither scientists nor philosophers know for sure what color is.</span></p><aside class="signal pull-right hide" data-dcnode-id="934" id="signal-121843"></aside><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">“Of all the properties that objects appear to have,” Chirimuuta writes, “color hovers uneasily between the subjective world of sensation and the objective world of fact.” The early history on the color perception debate alternated between partisans of these two camps. The Scholastic or Aristotelian model is a simple realism: Objects have colors that observers perceive in them. Like a seal that leaves a stamp in hot wax, an object’s color leaves its imprint temporarily on our eye. Since Scholastic realism presents no conflict between what we see and what there is, it was a convincing and long-lasting explanation. Color is what it looks like.</span></p></div></div><div class="full-width ad-container" data-dcnode-id="925"><span data-dcnode-id="926"><div class="ad-unit" data-dcnode-id="928"><div class="htl-ad" data-dcnode-id="929" data-lazy-pixels="350" data-prebid="

</span></figure><p data-dcnode-id="913"><span data-dcnode-id="917" instrument_node="">In the seventeenth century, the scientific revolution turned this common-sense explanation on its head. Galileo, that philosopher of inversions, suspected the realists had it exactly wrong. Colors, he wrote in </span><em data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Il Saggiatore</span></em><span data-dcnode-id="914" instrument_node=""> (The Assayer), “hold their residence solely in the sensitive body; so that if the animal were removed, every such quality would be abolished and annihilated.” In other words, an unseen tree falls in black and white. If color exists in objects, then the scientific-minded must ask where. Unable to define and measure color the same way they located primary or physical qualities (shape, size, and speed), these early philosopher-scientists figured it had to be all in our heads.</span></p></div></div><div class="full-width ad-container-house" data-dcnode-id="904"><div class="ad-container__inner" data-dcnode-id="905"><span data-dcnode-id="910" instrument_node="">Introductory offer: 50% off fearless reporting. </span><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">1 year for $10.</span></strong><a class="button" data-dcnode-id="906" role="button" style="cursor: pointer;"><span data-dcnode-id="907" instrument_node="">Subscribe</span></a></div></div><div class="article-text-wrap" data-dcnode-id="896"><div class="article-text-grid" data-dcnode-id="897"><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Whether color is in our brains or in the world, realists and anti-realists agreed that there are right and wrong answers. Both models are frictionless, with perceiving subjects interacting with a real and objective reality. Chirimuuta calls them “detection models,” but they assume too much. If we imagine that every existing physical referent for something like The Dress—the Internet-famous garment that in February bewildered online America with a debate about whether a Scottish woman’s outfit was white-and-gold or blue-and-black—had been burned in a tragic warehouse fire, neither perspective could give a consistent answer as to its color without also imagining a normative viewer.</span></p><p data-dcnode-id="898"><em data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Outside Color</span></em><span data-dcnode-id="899" instrument_node=""> is most engaging when it’s interrogating fundamental questions like these. “If we step back a moment,” Chirimuuta writes, “we can appreciate how very weird it is to even expect there to be a connection between the manifest visual world, brought to us by our senses, and the rarefied scientific image of a world made up of physical particles, etc.” To believe in the atom—never mind quantum theory or more extravagant scientific models—is to accept that our unaided perceptive faculties have very limited access to physical reality. Our perception gives us useful information about the world that allows us to make decisions as actors within it, but that doesn’t necessarily mean it’s true or consistent.</span></p></div></div><div class="full-width ad-container" data-dcnode-id="891"><span data-dcnode-id="892"><div class="ad-unit" data-dcnode-id="894"><div class="htl-ad" data-dcnode-id="895" data-lazy-pixels="350" data-prebid="
    0x0:ROS-mobile|900x0:ROS-tablet|1024x0:ROS-desktop
    " data-refresh="viewable" data-refresh-secs="15" data-sizes="
    0x0:300x100,300x250,300x50,320x100,320x50,600x430|
    900x0:300x250,728x90,970x250,970x90|
    1024x0:300x250,728x90,970x250,970x90
    " data-unit="ROS"></div></div><span data-dcnode-id="893" instrument_node=""></span></span></div><div class="article-text-wrap" data-dcnode-id="860"><div class="article-text-grid" data-dcnode-id="861"><figure class="article-embed pull-right" data-dcnode-id="874"><span data-dcnode-id="890" instrument_node="">
</span><div class="image" data-dcnode-id="886"><span data-dcnode-id="889" instrument_node="">
</span><img data-dcnode-id="888" data-image-id="c10bc45d-b7d0-4521-b091-ea74ec361d3c" data-orig-src="//images.newrepublic.com/b6f75138cd1532f2b3c2eefb0dfcbb3d90bc3bb8.jpeg" data-serialized="{&quot;id&quot;:&quot;c10bc45d-b7d0-4521-b091-ea74ec361d3c&quot;,&quot;hash&quot;:&quot;b6f75138cd1532f2b3c2eefb0dfcbb3d90bc3bb8&quot;,&quot;width&quot;:625,&quot;height&quot;:624,&quot;format&quot;:&quot;JPEG&quot;,&quot;isAnimated&quot;:false,&quot;baseUrl&quot;:&quot;//images.newrepublic.com/&quot;,&quot;src&quot;:&quot;//images.newrepublic.com/b6f75138cd1532f2b3c2eefb0dfcbb3d90bc3bb8.jpeg&quot;,&quot;meta&quot;:{}}" height="623" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.newrepublic.com/b6f75138cd1532f2b3c2eefb0dfcbb3d90bc3bb8.jpeg%3Fw%3D624%26h%3D623&amp;raw" width="624"><span data-dcnode-id="887" instrument_node="">
</span></div><span data-dcnode-id="885" instrument_node="">
</span><figcaption class="caption" data-dcnode-id="876"><span data-dcnode-id="884" instrument_node="">
</span><div class="caption-text-wrapper" data-dcnode-id="881"><span class="caption-text" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Ibrahim Mohammad El-Salahi, “The Tree” © 2015 Artists Rights Society (ARS), New York / DACS, London</span></span></div><span data-dcnode-id="880" instrument_node="">
</span><span class="credit" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Ibrahim El-salahi/Courtesy Of The Tate Modern</span></span><span data-dcnode-id="877" instrument_node="">
</span></figcaption><span data-dcnode-id="875" instrument_node="">
</span></figure><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">The scientific revolution established that colors don’t inhere in objects, but it wasn’t the end of the road. Once Galileo located color in the brain, philosophers and scientists were left to repeat the same question: Where? Modern biologists have given us a couple of models. Trichromacy, based on the three types of cone cells in the eye, suggested each was responsible for a cardinal color, and together they mix to create the normal spectrum in the brain. Opponent process theory said the cone information then travels through two channels for cardinal colors (red-green and blue-yellow) and one for brightness (black-white) that together create the spectrum through contrast. It’s a compelling scientific resolution to the color problem: Lighting conditions interact with objects and the eye sorts it all out and illustrates wavelength information using colors.</span></p><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">One of the reasons I think philosophy isn’t very popular in the United States is that the secular among us assume not only that there exists a scientific explanation for everything, but that someone in a laboratory or a library somewhere already knows it. Primary science education plays up this assumption, preferring testable information to ongoing mysteries—I am reminded of an eleventh-grade physics exam on opponent processing. But here’s what they don’t tell you in school: The neurological and physical evidence that supports this model is extremely inconsistent.</span></p><p data-dcnode-id="862"><span data-dcnode-id="869" instrument_node="">In a 2013 study published in the </span><em data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Journal of Neurophysiology</span></em><span data-dcnode-id="866" instrument_node="">, scientists measured the response from primary visual cortex neurons in macaque monkeys (one of the few animals that see like we do) as they prompted them with chromatic contrasts. They were trying to prove the existing biological model of color perception by testing neuron response after isolating the function of neural channels. If the researchers could see the way the brain mixes colors, they could once and for all </span><em data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">find</span></em><span data-dcnode-id="863" instrument_node=""> red. But it didn’t work. Instead, “analysis of neuronal contrast—response functions and signal-to-noise ratios yielded no evidence for a special set of ‘cardinal color directions,’ for which visual cortex neurons are particularly sensitive.” Not only couldn’t they find the red-green and blue-yellow channels, nearly half the color neurons also fired in response to brightness changes, suggesting the tripartite channel model is inaccurately simplistic.</span></p></div></div><div class="full-width ad-container" data-dcnode-id="855"><span data-dcnode-id="856"><div class="ad-unit" data-dcnode-id="858"><div class="htl-ad" data-dcnode-id="859" data-lazy-pixels="350" data-prebid="
    0x0:ROS-mobile|900x0:ROS-tablet|1024x0:ROS-desktop
    " data-refresh="viewable" data-refresh-secs="15" data-sizes="
    0x0:300x100,300x250,300x50,320x100,320x50,600x430|
    900x0:300x250,728x90,970x250,970x90|
    1024x0:300x250,728x90,970x250,970x90
    " data-unit="ROS"></div></div><span data-dcnode-id="857" instrument_node=""></span></span></div><div class="article-text-wrap" data-dcnode-id="832"><div class="article-text-grid" data-dcnode-id="833"><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Scientific attempts to reduce colors to wavelengths have been equally unsuccessful. If it were simple, then colors as we observe them should match up with what’s called the “surface spectral reflectance,” (SSR) which can be measured with a digital receptor. But if you try to replicate color vision this way, you get far too many colors, and objects lack internal constancy because of the effects of lighting conditions. Where we see shadows, a computer sees a different color. But even when they apply highly sophisticated algorithms for illumination in a 3-D space, researchers have been unable to replicate human levels of color constancy. NYU professor of psychology and neural science Laurence T. Maloney writes that the failure of these SSR models thus far suggests “there are cues present in real scenes that we do not understand.” People are able to use color to judge scenes better than computers and cameras can, and scientists aren’t sure how.</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Take a popular optical illusion, designed in 1995 by Edward Adelson, a professor of vision science in the Department of Brain and Cognitive Sciences at MIT:</span></p><figure class="article-embed" data-dcnode-id="844"><span data-dcnode-id="850" instrument_node="">
</span><div class="image" data-dcnode-id="846"><span data-dcnode-id="849" instrument_node="">
</span><img data-dcnode-id="848" data-image-id="fb9896f2-ee0d-4895-aaec-3b1ad5d31177" data-orig-src="//images.newrepublic.com/17e5a6e0ea482270c5c180312fdab581644365b7.jpeg" data-serialized="{&quot;id&quot;:&quot;fb9896f2-ee0d-4895-aaec-3b1ad5d31177&quot;,&quot;hash&quot;:&quot;17e5a6e0ea482270c5c180312fdab581644365b7&quot;,&quot;width&quot;:625,&quot;height&quot;:485,&quot;format&quot;:&quot;JPEG&quot;,&quot;isAnimated&quot;:false,&quot;baseUrl&quot;:&quot;//images.newrepublic.com/&quot;,&quot;src&quot;:&quot;//images.newrepublic.com/17e5a6e0ea482270c5c180312fdab581644365b7.jpeg&quot;,&quot;meta&quot;:{}}" height="484" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.newrepublic.com/17e5a6e0ea482270c5c180312fdab581644365b7.jpeg%3Fw%3D624%26h%3D484&amp;raw" width="624"><span data-dcnode-id="847" instrument_node="">
</span></div><span data-dcnode-id="845" instrument_node="">
</span></figure><p data-dcnode-id="834"><span data-dcnode-id="843" instrument_node="">The human perception system sees a checkerboard with a cylinder, while a basic SSR measurement shows squares A and B read the same. “Illusion” implies that our system is fooled, but as far as useful information goes, the checkerboard interpretation is probably better. Try as they might, mathematicians can’t make the computers see the checkerboard. Rather than a demonstration of how easily fooled we are, optical illusions like this one are examples of the brain’s mysterious and irreplicable abilities. It interprets its environment with a sophistication that exceeds our ability to measure and reconstruct physical phenomena. The usual framing has it wrong: </span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node=""> </span><em data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Despite</span></em><span data-dcnode-id="838" instrument_node=""> A and B having the same SSR, humans are still </span><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">able</span></em><span data-dcnode-id="835" instrument_node=""> to see the checkerboard.</span></p></div></div><div class="full-width ad-container" data-dcnode-id="827"><span data-dcnode-id="828"><div class="ad-unit" data-dcnode-id="830"><div class="htl-ad" data-dcnode-id="831" data-lazy-pixels="350" data-prebid="
    0x0:ROS-mobile|900x0:ROS-tablet|1024x0:ROS-desktop
    " data-refresh="viewable" data-refresh-secs="15" data-sizes="
    0x0:300x100,300x250,300x50,320x100,320x50,600x430|
    900x0:300x250,728x90,970x250,970x90|
    1024x0:300x250,728x90,970x250,970x90
    " data-unit="ROS"></div></div><span data-dcnode-id="829" instrument_node=""></span></span></div><div class="article-text-wrap" data-dcnode-id="816"><div class="article-text-grid" data-dcnode-id="817"><p data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">The difference between philosophy and the history of philosophy is the positing of a new answer, a new problem, a new step on the road of investigation. Here is where Chirimuuta really excels, and </span><em data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Outside Color</span></em><span data-dcnode-id="823" instrument_node=""> becomes truly exciting. She poses a new mode of thinking about chromatic perception: color adverbialism. Instead of a brown dog, Chirimuuta wants us to see the dog brown-ly. It sounds silly, but turning color into a process better fits some exceptional cases than the standard model. Color is a mode of interpreting information, and sometimes it tells us more than pigment. It can tell us about motion: a black-and-white wheel set spinning reveals the rainbow. It can tell us about depth: Long distances appear blue because higher wavelength red light scatters less. “Color is not an object of sight but a way of seeing things,” Chirimuuta writes.</span></p><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">In this model, color is like a heads-up display, one with a complexity that outpaces any attempts to replicate it. When searching for an appropriate metaphor, it occurred to me that we consciously put color to use in a similar way all the time. When we divide up sports teams with jerseys, for instance, we see Team A red-ly and Team B blue-ly. The SSRs vary as light flickers on polyester, but humans can still differentiate between the teams. Countries on a map take colors because it’s an easy way for us to see their boundaries, and we’re not fooled by the shadows a lamp casts on a globe. Color adverbialism is a challenging philosophical answer to what appears in our limited imagination like a solely scientific question.</span></p><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">From an adverbialist position, The Dress isn’t black and blue or white and gold. Some people see it one way, some people the other. But the conflict directed viewers to use color a little more, to use it to investigate their environment. Some of them quickly discovered that tilting their screens allowed them to see both colors, as a light filter engaged and disengaged. This is the kind of interpretation the best computer models can’t make, but people are built to engage our world with curiosity. If that’s not philosophical investigation of the highest and most human order, then I don’t know what is.</span></p></div></div></div></div><div class="article-footer" data-dcnode-id="745"><div class="article-footer-wrap" data-dcnode-id="746"><div class="footer-wrap footer-text-wrap" data-dcnode-id="805"><div class="article-author-bio" data-dcnode-id="806"><div class="article-author-bio__header" data-dcnode-id="813"></div><div class="article-author-bio__body" data-dcnode-id="807"><p data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">Malcolm Harris is a writer and an editor at The New Inquiry. On Twitter, he’s&nbsp;</span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/bigmeaninternet" target="_blank"><span data-dcnode-id="811" instrument_node="">@bigmeaninternet</span></a><span data-dcnode-id="809" instrument_node="">.</span></p></div></div></div><div class="footer-wrap footer-text-wrap" data-dcnode-id="786"><div class="footer-tags" data-dcnode-id="787"><span class="footer-tags__title" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Read More: </span></span><div class="tag-list" content="Books,Culture,Color" data-dcnode-id="788" itemprop="keywords"><span class="tag-list-item" data-dcnode-id="798"><a class="tag tag-books" d
