</span></ul><form action="https://eagereyes.org/" class="search-form" data-dcnode-id="1362" itemprop="potentialAction" itemscope="" itemtype="https://schema.org/SearchAction" method="get" role="search"><label class="search-form-label screen-reader-text" data-dcnode-id="1366" for="searchform-1"><span data-dcnode-id="1367" instrument_node="">Search this website</span></label><input class="search-form-input" data-dcnode-id="1365" id="searchform-1" itemprop="query-input" name="s" placeholder="Search this website" type="search"><input class="search-form-submit" data-dcnode-id="1364" type="submit" value=""><meta content="https://eagereyes.org/?s={s}" data-dcnode-id="1363" itemprop="target"></form></div></nav></div></header><div class="site-inner" data-dcnode-id="118"><div class="content-sidebar-wrap" data-dcnode-id="119"><main class="content" data-dcnode-id="291" id="genesis-content"><article aria-label="What is Visualization? A Definition" class="post-545 post type-post status-publish format-standard category-criticism entry gs-1 gs-odd gs-even gs-featured-content-entry" data-dcnode-id="1229" itemscope="" itemtype="https://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="1345"><p class="entry-meta" data-dcnode-id="1349"><span class="entry-author" data-dcnode-id="1354" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="entry-author-link" data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eagereyes.org/author/rkosara" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="1356" itemprop="name"><span data-dcnode-id="1357" instrument_node="">Robert Kosara</span></span></a></span><span data-dcnode-id="1353" instrument_node=""> / </span><time class="entry-time" data-dcnode-id="1351" datetime="2008-07-24T22:41:05-07:00" itemprop="datePublished"><span data-dcnode-id="1352" instrument_node="">July 24, 2008</span></time><span data-dcnode-id="1350" instrument_node=""> </span></p><h1 class="entry-title" data-dcnode-id="1347" itemprop="headline"><span data-dcnode-id="1348" instrument_node="">What is Visualization? A Definition</span></h1><span data-dcnode-id="1346" instrument_node="">
</span></header><div class="entry-content" data-dcnode-id="1237" itemprop="text"><p data-dcnode-id="1343"><img alt="Teaser" border="0" data-dcnode-id="1344" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eagereyes.org/media/2008/visdefteaser.jpg&amp;raw"></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1341" instrument_node="">What is a visualization? The word is problematic, and there have been very few definitions that try to define this field we are working in. More importantly: what is not a visualization? It is easy to argue that anything visual is a visualization in some way – but does that mean anything? Here is a definition of visualization and a few examples to illustrate the different criteria.</span><br data-dcnode-id="1340"><span data-dcnode-id="1339" instrument_node="">
</span><span data-dcnode-id="1338" id="more-545"></span></p><span data-dcnode-id="1336" instrument_node="">
</span><h2 data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Definition</span></h2><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1332" instrument_node="">The following are three minimal criteria that any visualization has to fulfill to be considered a </span><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eagereyes.org/Theory/TaleOfTwoTypes.html"><span data-dcnode-id="1331" instrument_node="">pragmatic visualization</span></a><span data-dcnode-id="1329" instrument_node="">. A good visualization certainly has to do more, but these criteria are useful to draw the line between a lot of things that are often called visualization and what we consider visualization in this field.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><ul data-dcnode-id="1307"><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1322"><em data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Based on (non-visual) data</span></em><span data-dcnode-id="1323" instrument_node="">. A visualization’s purpose is the communication of data. That means that the data must come from something that is abstract or at least not immediately visible (like the inside of the human body). This rules out photography and image processing. Visualization transforms from the invisible to the visible.</span></li><span data-dcnode-id="1321" instrument_node="">
</span><li data-dcnode-id="1317"><em data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Produce an image</span></em><span data-dcnode-id="1318" instrument_node="">. It may seem obvious that a visualization has to produce an image, but that is not always so clear. Also, the visual must be the primary means of communication, other modalities can only provide additional information. If the image is only a small part of the process, it is not visualization.</span></li><span data-dcnode-id="1316" instrument_node="">
</span><li data-dcnode-id="1309"><em data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">The result must be readable and recognizable</span></em><span data-dcnode-id="1313" instrument_node="">. The most important criteria is that the visualization must provide a way to learn something about the data. Any transformation of non-trivial data into an image will leave out information, but there must be at least some relevant aspects of the data that can be read. The visualization must also be recognizable as one and not pretend to be something else (see the discussion of </span><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eagereyes.org/VisCrit/InformativeArt.html"><span data-dcnode-id="1312" instrument_node="">Informative Art</span></a><span data-dcnode-id="1310" instrument_node="">).</span></li><span data-dcnode-id="1308" instrument_node="">
</span></ul><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1305" instrument_node="">This definition was published in a paper on </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kosara.net/publications/Kosara_IV_2007.html"><span data-dcnode-id="1304" instrument_node="">Visualization Criticism</span></a><span data-dcnode-id="1302" instrument_node="">, part of which I discussed in an </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eagereyes.org/Theory/TaleOfTwoTypes.html"><span data-dcnode-id="1301" instrument_node="">earlier posting</span></a><span data-dcnode-id="1299" instrument_node="">.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><h2 data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Examples</span></h2><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">The following examples show how these criteria provide a clear separation of visualization (in the sense of scientific and information visualization) and other kinds of data transformations that result in images.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><img alt="MilkDrop" border="0" data-dcnode-id="1290" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eagereyes.org/media/2008/milkdrop.jpg&amp;raw"></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1284"><a data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nullsoft.com/free/milkdrop/"><span data-dcnode-id="1287" instrument_node="">MilkDrop</span></a><span data-dcnode-id="1285" instrument_node=""> is one of the most impressive music visualizers. Not only does it have a huge range of different styles that it can transition between, it’s also very good at detecting beats and different instruments, so the visualization really fits the music. Since it creates images from wave data, it clearly fulfills the first two criteria. But what about readability? Can you tell which song was played when the image above was created? This is not a shortcoming, it’s simply not the goal of a music visualization to be readable (and it would be very difficult). But music visualization plugins are not visualizations in the pragmatic/information visualization sense.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><img alt="VisualIDs" border="0" data-dcnode-id="1282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eagereyes.org/media/2008/visualIDs.jpg&amp;raw"></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1273"><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.idiom.com/~zilla/Work/VisualIDs/visualids.html"><span data-dcnode-id="1279" instrument_node="">VisualIDs</span></a><span data-dcnode-id="1277" instrument_node=""> are a very clever idea to help the user tell files apart: they produce images from the names of files to produce visually similar (but still distinct) icons for files with similar names. Since they are based on data and are visual, they could be a visualization. But they also fail the readability test, you cannot tell which image represents which filename. A </span><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eagereyes.org/blog/visual-mapping-of-poetry.html"><span data-dcnode-id="1276" instrument_node="">poetry visualization</span></a><span data-dcnode-id="1274" instrument_node=""> I discussed earlier has the same properties.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1271" instrument_node="">Radiohead’s recent video for their song </span><em data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">House of Cards</span></em><span data-dcnode-id="1268" instrument_node=""> </span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdance.com/thekineticinterface/2008/07/radiohead-house-of-cards/"><span data-dcnode-id="1267" instrument_node="">was “shot without cameras,”</span></a><span data-dcnode-id="1265" instrument_node="">&nbsp;using </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/LIDAR"><span data-dcnode-id="1264" instrument_node="">LIDAR</span></a><span data-dcnode-id="1262" instrument_node=""> and </span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/3D_scanner%23Structured_light"><span data-dcnode-id="1261" instrument_node="">structured light</span></a><span data-dcnode-id="1259" instrument_node=""> real-time 3D imaging devices. This has been described as “using visualization,” but I disagree. The data that is being rendered was acquired using visible light, and so doesn’t show anything that would not be visible through the naked eye. In fact, to make the video watchable for a general audience, they had to use something that produced a fairly realistic image. So the first criterion is clearly not fulfilled. I also have to say that the result does not strike me as particularly interesting –&nbsp;it’s a bad sign when the making-of is much more interesting to watch than the video itself.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><h2 data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1253" instrument_node="">The many meanings of the term </span><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">visualization</span></em><span data-dcnode-id="1250" instrument_node=""> can cause confusion and loss of focus. We need to know what we are talking about when we are working in scientific or information visualization. The definition given above provides a baseline that all visualizations must fulfill to be considered part of this field. More work is clearly needed.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><hr data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1239"><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//murmurlydian.blogspot.com/"><span data-dcnode-id="1245" instrument_node="">小草莓</span></a><span data-dcnode-id="1243" instrument_node="">&nbsp;has </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//murmurlydian.blogspot.com/2008/07/what-is-visualization.html"><span data-dcnode-id="1242" instrument_node="">translated this article into Chinese</span></a><span data-dcnode-id="1240" instrument_node="">!</span></p><span data-dcnode-id="1238" instrument_node="">
</span></div><footer class="entry-footer" data-dcnode-id="1230"><p class="entry-meta" data-dcnode-id="1231"><span class="entry-categories" data-dcnode-id="1233"><span data-dcnode-id="1236" instrument_node="">Filed Under: </span><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eagereyes.org/section/criticism" rel="category tag"><span data-dcnode-id="1235" instrument_node="">Criticism</span></a></span><span data-dcnode-id="1232" instrument_node=""> </span></p></footer></article><div class="after-entry widget-area" data-dcnode-id="1209"><section class="widget user-profile" data-dcnode-id="1211" id="user-profile-2"><div class="widget-wrap" data-dcnode-id="1212"><p data-dcnode-id="1214"><span class="alignleft" data-dcnode-id="1227"><img alt="" class="avatar avatar-85 photo" data-dcnode-id="1228" height="85" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/50b46e7a1eeb1d4e8106b33f064a2c13%3Fs%3D85%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/50b46e7a1eeb1d4e8106b33f064a2c13?s=170&amp;d=mm&amp;r=g 2x" width="85"></span><span data-dcnode-id="1226" instrument_node="">Robert Kosara is Data Visualization Developer at </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//observablehq.com/"><span data-dcnode-id="1225" instrument_node="">Observable</span></a><span data-dcnode-id="1223" instrument_node="">. Before that, he was Research Scientist at Tableau Software (2012–2022) and Associate Professor of Computer Science (2005–2012). His research focus is the communication of data using visualization. In addition to blogging, Robert also </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.strava.com/athletes/313344"><span data-dcnode-id="1222" instrument_node="">runs</span></a><span data-dcnode-id="1220" instrument_node=""> and < </span><p class="comment-meta" data-dcnode-id="1107"><time class="comment-time" data-dcnode-id="1108" datetime="2008-07-26T10:57:47-07:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="1109" href="#comment-939" itemprop="url"><span data-dcnode-id="1110" instrument_node="">July 26, 2008 at 10:57 am</span></a></time></p><span data-dcnode-id="1106" instrument_node=""> </span></header><span data-dcnode-id="1104" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1090" itemprop="text"><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">My two comments would be:</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node=""> * Based on non-visual data: this is a bit of a tricky issue – clearly a photograph isn’t a visualisation, but what about a histogram of the colour levels?  What about a rendering of a image clustering model showing cluster means (averages of images)?</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node=""> * I’d call the last condition invertability – i.e. when creating it you go from data to something visual – when reading it you need to be able to go from something visual to the data.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Hadley</span></p><span data-dcnode-id="1091" instrument_node="">

</span><p class="comment-author" data-dcnode-id="1068" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1076" instrument_node="">
</span><img alt="" class="avatar avatar-120 photo avatar-default" data-dcnode-id="1075" height="120" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/%3Fs%3D120%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/?s=240&amp;d=mm&amp;r=g 2x" width="120"><span class="comment-author-name" data-dcnode-id="1073" itemprop="name"><span data-dcnode-id="1074" instrument_node="">Robert Kosara</span></span><span data-dcnode-id="1072" instrument_node=""> </span><span class="says" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">says</span></span><span data-dcnode-id="1069" instrument_node=""> </span></p><span data-dcnode-id="1067" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="1063"><time class="comment-time" data-dcnode-id="1064" datetime="2008-07-27T21:12:22-07:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="1065" href="#comment-940" itemprop="url"><span data-dcnode-id="1066" instrument_node="">July 27, 2008 at 9:12 pm</span></a></time></p><span data-dcnode-id="1062" instrument_node=""> </span></header><span data-dcnode-id="1060" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1052" itemprop="text"><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Good points, but that’s why I said “not immediately visible.” A histogram, even if derived from something you can see, is more than trivially different from the photograph itself. A simple distortion of the image or filters that get applied to bring out certain structures would not be.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">I’m not sure “invertable” is really true. I was thinking of “bijective” for some time, but obviously, that’s not really the case in visualization. There are losses in the translation from data to the image. That’s why I think “readable” is a better criterion, because it’s not as strong as the other two, but still gets the idea across.</span></p><span data-dcnode-id="1053" instrument_node="">
</span></div><span data-dcnode-id="1051" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="1048"><a aria-label="Reply to Robert Kosara" class="comment-reply-link" data-belowelement="article-comment-940" data-commentid="940" data-dcnode-id="1049" data-postid="545" data-replyto="Reply to Robert Kosara" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eagereyes.org/criticism/definition-of-visualization%3Freplytocom%3D940%23respond" rel="nofollow"><span data-dcnode-id="1050" instrument_node="">Reply</span></a></div><span data-dcnode-id="1047" instrument_node="">

</span><img alt="" class="avatar avatar-120 photo" data-dcnode-id="1037" height="120" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/17f75415e9adda60dc016cb70f25c9af%3Fs%3D120%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/17f75415e9adda60dc016cb70f25c9af?s=240&amp;d=mm&amp;r=g 2x" width="120"><span class="comment-author-name" data-dcnode-id="1035" itemprop="name"><span data-dcnode-id="1036" instrument_node="">luoning</span></span><span data-dcnode-id="1034" instrument_node=""> </span><span class="says" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">says</span></span><span data-dcnode-id="1031" instrument_node=""> </span></p><span data-dcnode-id="1029" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="1025"><time class="comment-time" data-dcnode-id="1026" datetime="2008-09-01T08:01:44-07:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="1027" href="#comment-943" itemprop="url"><span data-dcnode-id="1028" instrument_node="">September 1, 2008 at 8:01 am</span></a></time></p><span data-dcnode-id="1024" instrument_node=""> </span></header><span data-dcnode-id="1022" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1009" itemprop="text"><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">I think the third criterion “The result must be readable and recognizable” has some room of refinement or improvement.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">The beauty is to the beholder.  To untrained eyes, the histograms or functional plots may look as nondecipherable as the symbols you listed as examples.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1014" instrument_node="">Here I suggest an alternative one:</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">
The visual elements of the result (size, shape, color cue and lightness, etc.) should reflect or reveal the analytical or logical relationship in the underlying data.</span></p><span data-dcnode-id="1010" instrument_node="">
</span></div><span data-dcnode-id="1008" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="1005"><a aria-label="Reply to luoning" class="comment-reply-link" data-belowelement="article-comment-943" data-commentid="943" data-dcnode-id="1006" data-postid="545" data-replyto="Reply to luoning" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eagereyes.org/criticism/definition-of-visualization%3Freplytocom%3D943%23respond" rel="nofollow"><span data-dcnode-id="1007" instrument_node="">Reply</span></a></div><span data-dcnode-id="1004" instrument_node="">

</span><img alt="" class="avatar avatar-120 photo" data-dcnode-id="994" height="120" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/02bf70a3e2bea3af53997b7926ffd4ef%3Fs%3D120%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/02bf70a3e2bea3af53997b7926ffd4ef?s=240&amp;d=mm&amp;r=g 2x" width="120"><span class="comment-author-name" data-dcnode-id="992" itemprop="name"><span data-dcnode-id="993" instrument_node="">Slar</span></span><span data-dcnode-id="991" instrument_node=""> </span><span class="says" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">says</span></span><span data-dcnode-id="988" instrument_node=""> </span></p><span data-dcnode-id="986" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="982"><time class="comment-time" data-dcnode-id="983" datetime="2012-04-03T12:01:08-07:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="984" href="#comment-3988" itemprop="url"><span data-dcnode-id="985" instrument_node="">April 3, 2012 at 12:01 pm</span></a></time></p><span data-dcnode-id="981" instrument_node=""> </span></header><span data-dcnode-id="979" instrument_node="">
</span><div class="comment-content" data-dcnode-id="968" itemprop="text"><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">I offer two proposals to your definition</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">2. I think the word “image” is misleading. You can visualize using a chart, table, or graph too – anything you can see.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">3. You’ve got the right idea, but I believe the term you are looking for is “information reduction”. The raw data is too much for most humans to handle easily. What you want to do is reduce the amount of information being presented, just focusing on the elements that are most important to communicating the message.</span></p><span data-dcnode-id="969" instrument_node="">
</span></div><span data-dcnode-id="967" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="964"><a aria-label="Reply to Slar" class="comment-reply-link" data-belowelement="article-comment-3988" data-commentid="3988" data-dcnode-id="965" data-postid="545" data-replyto="Reply to Slar" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eagereyes.org/criticism/definition-of-visualization%3Freplytocom%3D3988%23respond" rel="nofollow"><span data-dcnode-id="966" instrument_node="">Reply</span></a></div><span data-dcnode-id="963" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="943"><time class="comment-time" data-dcnode-id="944" datetime="2016-03-08T15:10:28-08:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="945" href="#comment-18172" itemprop="url"><span data-dcnode-id="946" instrument_node="">March 8, 2016 at 3:10 pm</span></a></time></p><span data-dcnode-id="942" instrument_node=""> </span></header><span data-dcnode-id="940" instrument_node="">
</span><div class="comment-content" data-dcnode-id="935" itemprop="text"><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Good point on the misleading of “image.” It is about reduction as our mind always works to wrap complexity in manageable portions. I’d offer the term “economy of communicating” as a function of the economy of brain power. Images wrap complexity for quicker processing with less energy. Meaning production works similarly in identifying relations by giving them a name. Value, in color theory for example, is the wrap-up for the relating between black and white. Two words replaced by one. Of course, the way images wrap up relations (data) is much more complex, however they are faster to process. Not sure if “reading” is an adequate term to the instant visual impact of images, but it is true that images can and are being read when it comes to illustrating and comprehending information. Other than that there’s memorability, which often is mixed in the information visualization discourse only to introduce more confusion. It is incredibly irresistible the power of art, isn’t it?!</span></p><span data-dcnode-id="936" instrument_node="">
</span></div><span data-dcnode-id="934" instrument_node="">

</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Criteria for music visualization: no visual effect may appear without being in 1:1 relation to some audible physical aspect of the music AND no audible physical aspect of the music should be left unaccounted for by a 1:1 corresponding visual effect.</span></p><span data-dcnode-id="895" instrument_node="">

</span><li class="comment odd alt thread-odd thread-alt depth-1" data-dcnode-id="803" id="comment-10141"><span data-dcnode-id="847" instrument_node="">
</span><article data-dcnode-id="805" id="article-comment-10141" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="846" instrument_node="">
</span><header class="comment-header" data-dcnode-id="829"><span data-dcnode-id="845" instrument_node="">
</span><p class="comment-author" data-dcnode-id="836" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="844" instrument_node="">
</span><img alt="" class="avatar avatar-120 photo" data-dcnode-id="843" height="120" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/bdcf6d6b59935f1b0c95413af02bde70%3Fs%3D120%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/bdcf6d6b59935f1b0c95413af02bde70?s=240&amp;d=mm&amp;r=g 2x" width="120"><span class="comment-author-name" data-dcnode-id="841" itemprop="name"><span data-dcnode-id="842" instrument_node="">Pierre Dragicevic</span></span><span data-dcnode-id="840" instrument_node=""> </span><span class="says" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">says</span></span><span data-dcnode-id="837" instrument_node=""> </span></p><span data-dcnode-id="835" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="831"><time class="comment-time" data-dcnode-id="832" datetime="2013-02-05T13:33:01-08:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="833" href="#comment-10141" itemprop="url"><span data-dcnode-id="834" instrument_node="">February 5, 2013 at 1:33 pm</span></a></time></p><span data-dcnode-id="830" instrument_node=""> </span></header><span data-dcnode-id="828" instrument_node="">
</span><div class="comment-content" data-dcnode-id="811" itemprop="text"><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">I really like the blog post and the paper, and I regret I did not come across them before. I particularly appreciate the clarity of the writing and of the thinking in the paper, that makes it easily accessible to a wide audience and really useful.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Maybe one thing that disturbs me in the paper is the missing link between the sublime and the enigmatic. My understanding is that the sublime is what elicits awe, and the enigmatic is the quality of something that is difficult to interpret. I understand that there is some value in both, but the paper never clearly explains how are the two connected.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Arguably, something hard to interpret can elicit a wide range of emotions and reactions, both positive (e.g., intellectual curiosity or amusement) and negative (e.g., frustration or indifference), many of which are not necessarily deep or related to awe. The converse idea that the sublime is necessarily caused by something that is hard to interpret is maybe more interesting, but not immediately obvious. Yet this is simply assumed in the paper, and quickly leads to the conclusion that a user-friendly visualization cannot be sublime. But is there any evidence for this?</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Another comment I have is about the idea of introducing criticism and critical thinking in academic publications. Maybe it’s worth recalling that those are hardly restricted to art and design and have always played a major role of science. As the paper suggests, academic peer-review is pure criticism.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Now it’s true that i) the quality of criticism in peer reviews is not consistently high and the guidelines proposed in the paper can be quite useful in rising the standards; ii) criticism only indirectly appears in academic (infovis) papers, as these papers are mostly crafted in order to dodge all possible criticism by peer reviewers. Explicit criticism in papers (of either one’s own designs or someone else’s) could certainly provide some added value when backed up by facts, but for this we would have to transcend the political correctness that so far has characterized the tone of academic publications in HCI disciplines. The many controversies and battles in disciplines such as psychology are sometimes mean but they are also very healthy, I think, for the progress of knowledge.</span></p><span data-dcnode-id="812" instrument_node="">
</span></div><span data-dcnode-id="810" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="807"><a aria-label="Reply to Pierre Dragicevic" class="comment-reply-link" data-belowelement="article-comment-10141" data-commentid="10141" data-dcnode-id="808" data-postid="545" data-replyto="Reply to Pierre Dragicevic" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eagereyes.org/criticism/definition-of-visualization%3Freplytocom%3D10141%23respond" rel="nofollow"><span data-dcnode-id="809" instrument_node="">Reply</span></a></div><span data-dcnode-id="806" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="784"><time class="comment-time" data-dcnode-id="785" datetime="2014-12-17T02:30:34-08:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="786" href="#comment-14540" itemprop="url"><span data-dcnode-id="787" instrument_node="">December 17, 2014 at 2:30 am</span></a></time></p><span data-dcnode-id="783" instrument_node=""> </span></header><span data-dcnode-id="781" instrument_node="">
</span><div class="comment-content" data-dcnode-id="776" itemprop="text"><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">I’d add a lower bound criterion to your third point: a visualisation should be at the very least more readable than the underlying data in text/tabular form. Now, ‘more readable’ is in itself a multifaceted criterion, sure, but let’s say the visualisation should enable either: reaching same conclusions faster; reaching better informed conclusions; easier communication of said conclusions; better long-term retention of information (important for education) etc.</span></p><span data-dcnode-id="777" instrument_node="">
