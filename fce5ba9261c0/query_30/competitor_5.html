data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">history</span></desc><path d="M10 0C6.71 0 3.82 1.6 2 4.05V2c0-.55-.45-1-1-1s-1 .45-1 1v4c0 .55.45 1 1 1h4c.55 0 1-.45 1-1s-.45-1-1-1H3.76C5.23 3.17 7.47 2 10 2c4.42 0 8 3.58 8 8s-3.58 8-8 8-8-3.58-8-8c0-.55-.45-1-1-1s-1 .45-1 1c0 5.52 4.48 10 10 10s10-4.48 10-10S15.52 0 10 0zm0 3c-.55 0-1 .45-1 1v6c0 .28.11.53.29.71l3 3a1.003 1.003 0 001.42-1.42L11 9.59V4c0-.55-.45-1-1-1z" data-dcnode-id="1517" fill-rule="evenodd"></path></svg></span><h4 class="bp3-heading" data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">You're viewing an older Release (#2) of this Pub.</span></h4><ul class="warning-desc" data-dcnode-id="1472"><li data-dcnode-id="1493"><span data-dcnode-id="1512" instrument_node="">This Release </span><b data-dcnode-id="1506"><span data-dcnode-id="1511" instrument_node="">(#</span><span data-dcnode-id="1509" instrument_node="">2</span><span data-dcnode-id="1507" instrument_node="">)</span></b><span data-dcnode-id="1505" instrument_node=""> was created</span><span data-dcnode-id="1503" instrument_node=""> </span><span data-dcnode-id="1501" instrument_node="">on Feb 02, 2020</span><span data-dcnode-id="1499" instrument_node=""> </span><span class="humanized-time" data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node="">(</span><time data-dcnode-id="1496" datetime="2020-02-02T13:28:23.623Z" title="2020-02-02 13:28"><span data-dcnode-id="1497" instrument_node="">2 years ago</span></time><span data-dcnode-id="1495" instrument_node="">)</span></span></li><li data-dcnode-id="1473"><span data-dcnode-id="1492" instrument_node="">The latest Release </span><b data-dcnode-id="1486"><span data-dcnode-id="1491" instrument_node="">(#</span><span data-dcnode-id="1489" instrument_node="">4</span><span data-dcnode-id="1487" instrument_node="">)</span></b><span data-dcnode-id="1485" instrument_node=""> was created</span><span data-dcnode-id="1483" instrument_node=""> </span><span data-dcnode-id="1481" instrument_node="">on Apr 10, 2022</span><span data-dcnode-id="1479" instrument_node=""> </span><span class="humanized-time" data-dcnode-id="1474"><span data-dcnode-id="1478" instrument_node=""> (</span><time data-dcnode-id="1476" datetime="2022-04-10T23:08:07.747Z" title="2022-04-10 23:08"><span data-dcnode-id="1477" instrument_node="">2 weeks ago</span></time><span data-dcnode-id="1475" instrument_node="">).</span></span></li></ul><div data-dcnode-id="1460"><a class="bp3-button bp3-outlined bp3-intent-primary callout-button" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hdsr.mitpress.mit.edu/pub/zok97i7p" role="button" tabindex="0"><span class="bp3-button-text" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Go to latest Release</span></span></a><a class="bp3-button bp3-outlined bp3-intent-primary callout-button changelog-button" data-dcnode-id="1461" role="button" tabindex="0"><span class="bp3-button-text" data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Show Changelog</span></span><span class="bp3-icon bp3-icon-expand-all" data-dcnode-id="1462" icon="expand-all"><svg data-dcnode-id="1463" data-icon="expand-all" height="16" viewBox="0 0 16 16" width="16"><desc data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">expand-all</span></desc><path d="M4 7c.28 0 .53-.11.71-.29L8 3.41l3.29 3.29c.18.19.43.3.71.3a1.003 1.003 0 00.71-1.71l-4-4C8.53 1.11 8.28 1 8 1s-.53.11-.71.29l-4 4A1.003 1.003 0 004 7zm8 2c-.28 0-.53.11-.71.29L8 12.59l-3.29-3.3a1.003 1.003 0 00-1.42 1.42l4 4c.18.18.43.29.71.29s.53-.11.71-.29l4-4A1.003 1.003 0 0012 9z" data-dcnode-id="1464" fill-rule="evenodd"></path></svg></span></a></div></div><div class="bp3-collapse changelog" data-dcnode-id="1457"><div aria-hidden="false" class="bp3-collapse-body" data-dcnode-id="1458" style="transform:translateY(-undefinedpx)"></div></div></div><main class="pub-body-component" data-dcnode-id="1266"><div class="editor read-only ProseMirror" contenteditable="false" data-dcnode-id="1267"><p data-dcnode-id="1449" id="r2327753514"><em data-dcnode-id="1450"><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Column Editor’s note: </span></strong><span data-dcnode-id="1451" instrument_node="">Data visualization, facilitated by the power of the computer, represents one of the fundamental tools of modern data science. Professor Antony Unwin from the University of Augsburg describes different ways in which data visualization is used, explores the opportunities for future research in the area, and looks at how data visualization is taught.</span></em></p><p data-dcnode-id="1447" id="r3018168585"><br data-dcnode-id="1448"></p><h1 data-dcnode-id="1444" id="the-what-and-why-of-data-visualization"><strong data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">The What and Why of Data Visualization</span></strong></h1><p data-dcnode-id="1442" id="r7922955435"><span data-dcnode-id="1443" instrument_node="">Data visualization means drawing graphic displays to show data. Sometimes every data point is drawn, as in a scatterplot, sometimes statistical summaries may be shown, as in a histogram. The displays are mainly descriptive, concentrating on 'raw' data and simple summaries. They can include displays of transformed data, sometimes based on complicated transformations. One person's statistics may be another person's raw data. As with other aspects of working with graphics, it would be useful to have an agreed base of concepts and terminology to build on. The main goal is to visualize data and statistics, interpreting the displays to gain information.</span></p><p data-dcnode-id="1440" id="r8709781586"><span data-dcnode-id="1441" instrument_node="">Data visualization is useful for data cleaning, exploring data structure, detecting outliers and unusual groups, identifying trends and clusters, spotting local patterns, evaluating modeling output, and presenting results. It is essential for exploratory data analysis and data mining to check data quality and to help analysts become familiar with the structure and features of the data before them. This is a part of data analysis that is underplayed in textbooks, yet ever-present in actual investigations. Look, for instance, at the one-sided peaks in the distributions of marathon finishing times (marastats, 2019).</span></p><p data-dcnode-id="1438" id="r440415290"><span data-dcnode-id="1439" instrument_node="">Graphics reveal data features that statistics and models may miss: unusual distributions of data, local patterns, clusterings, gaps, missing values, evidence of rounding or heaping, implicit boundaries, outliers, and so on. Graphics raise questions that stimulate research and suggest ideas. It sounds easy. In fact, interpreting graphics needs experience to identify potentially interesting features and statistical nous to guard against the dangers of overinterpretation. Just as graphics are useful for checking model results, models are useful for checking ideas derived from graphics (for more on models, see Hand, 2019).</span></p><p data-dcnode-id="1430" id="r5089080743"><span data-dcnode-id="1437" instrument_node="">This overview concentrates on static graphics. Dynamic graphics and, more especially, interactive graphics are in an exciting stage of development and have much to add. They require an article of their own. Superb examples include Human </span><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pudding.cool/2018/10/city_3d/" title=""><span data-dcnode-id="1436" instrument_node="">Terrain</span></a><span data-dcnode-id="1434" instrument_node="">, a dynamic graphic showing the world's population in 3-D, and the interactive </span><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.babynamewizard.com/voyager" title=""><span data-dcnode-id="1433" instrument_node="">NameVoyager</span></a><span data-dcnode-id="1431" instrument_node="">.</span></p><h1 data-dcnode-id="1427" id="a-picture-is-worth-a-thousand-words"><strong data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">‘A Picture Is Worth a Thousand Words’</span></strong></h1><p data-dcnode-id="1425" id="r8912276538"><span data-dcnode-id="1426" instrument_node="">Famous sayings have a way of developing a life of their own. A picture is not a substitute for a thousand words; it needs a thousand words (or more). For data visualization you need to know the context, the source of the data, how and why they were collected, whether more could be collected, the reasons for drawing the displays, and how people with the necessary background knowledge advise they might be interpreted. There is a story that M. G. Kendall reviewed a book of R.A. Fisher's with the words: "No one should read this book who has not read it already." It is like that with graphics. If you have read all the supporting text, the display is often memorable and readily understandable. If you have not, it is not. Graphics on their own are insufficient, they are part of a whole. They complement text and are complemented by text. Student's reanalysis of the Lanarkshire Milk Experiment (Student, 1931) is an excellent example (and is also interesting as an early analysis of a large data set).</span></p><p data-dcnode-id="1423" id="r6321075893"><span data-dcnode-id="1424" instrument_node="">The potential synergy of text and graphics can be appreciated by talking through your own graphics, explaining them to others. Why have you drawn those graphics? How have you drawn them? What can be seen? Are there interesting patterns? What could be changed and improved? Which other graphics might be drawn? How can conclusions be checked? There should be more talking about graphics and less relying on the graphics to speak for themselves.</span></p><p data-dcnode-id="1415" id="r5630415482"><span data-dcnode-id="1422" instrument_node="">When it comes to graphics you have not drawn yourself, the same kinds of questions are still relevant, although they may be more difficult to answer. Edward Tufte described Charles Minard's display of Napoleon's Russian campaign as the best statistical graphic ever drawn (Tufte, 2001). It is a magnificent graphic, fully deserving of the praise heaped on it, yet as Lee Wilkinson has pointed out in his book </span><em data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">The</span></em><span data-dcnode-id="1419" instrument_node=""> </span><em data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Grammar of Graphics</span></em><span data-dcnode-id="1416" instrument_node=""> (Wilkinson, 2005), there are inaccuracies and imprecisions in the display. Why did no one point them out before? We are too used to accepting graphics uncritically, not asking enough questions of them.</span></p><h1 data-dcnode-id="1412" id="presentation-and-exploratory-graphics"><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Presentation and Exploratory Graphics</span></strong></h1><p data-dcnode-id="1410" id="r7896743994"><span data-dcnode-id="1411" instrument_node="">Presentation and exploratory graphics are quite different animals. In presenting your results, you may have space for only one graphic and no idea how many people may see it. If it appears in a newspaper or on television or the Web, your audience could be millions of people. The graphic should be well-designed and well-drawn with an effective accompanying explanatory text. On the other hand, if you are exploring data, then you need many, many graphics and they are for an audience of one: yourself. The individual graphics need not be perfect, but they should provide alternative views and additional information. Presentation graphics are used to convey known information and are often designed to attract attention. Exploratory graphics are used to find new information and should direct attention to information.</span></p><p data-dcnode-id="1408" id="r5279091434"><span data-dcnode-id="1409" instrument_node="">Published graphics tend to be graphics for presentation, partly because they are for publication and partly because no one wants to see hundreds of quick graphics that may or may not have been helpful. It is rather like mathematical proofs: articles contain the elegant and concise final versions, not the scribbled notes and random ideas that came before. How many graphics may have been drawn before the striking display was chosen to show the resignations of U.K. cabinet ministers in recent years (Institute for Government, 2019)?</span></p><p data-dcnode-id="1406" id="r3570802316"><span data-dcnode-id="1407" instrument_node="">Exploratory graphics take advantage of how easy it is now to draw and redraw graphics. What used to be a slow and wearisome process, even including having to print out displays, has become fast and flexible. At the same time, new, additional skills are required. Identifying interesting features and knowing how to check them in more detail among a myriad of possible graphics is not just a matter of drawing many graphics, you need interpretative skills and an appreciation of which graphics will provide what kinds of information. There is so much that can be varied: the variables displayed, the types of graphics, the sizes of graphics and their aspect ratios, the colors and symbols used, the scales and limits, the ordering of categorical variables, the ordering of variables in multivariate displays. Selecting from the wide range of graphics wisely, and understanding how to gain insights, are not trivial tasks. The lack of a theory of data visualization to guide and build on is a key issue.</span></p><h1 data-dcnode-id="1403" id="data-visualization-has-become-more-important"><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Data Visualization Has Become More Important</span></strong></h1><p data-dcnode-id="1398" id="r4014803"><span data-dcnode-id="1402" instrument_node="">Better hardware has meant more precise reproduction, better color (including alpha-blending), and faster drawing. Better software has meant easier and more flexible drawing, consistent themes, and higher standards. Computer scientists have become much more involved, both on the technical side and in introducing new approaches. There has been progress in developing a theory of graphics, especially thanks to Wilkinson's </span><em data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Grammar of Graphics</span></em><span data-dcnode-id="1399" instrument_node=""> (2005) and Hadley Wickham's implementation of it in the R package ggplot2 (Wickham, 2016). There is continuing work and better understanding of the problems of color and perception. Graphics that were rarely used and difficult to draw, such as parallel coordinate plots (e.g., Theus, 2015) and mosaicplots (e.g., Unwin, 2015), have been refined and developed. Much larger data sets can be analyzed and visualized and graphics can play a valuable role in diagnosing the strengths and weaknesses of complex models. Data visualizations can be found everywhere, in scientific publications, in newspapers and TV, and on the Web. There are many Web pages where graphics are discussed and debated. This is a huge improvement over the situation of even 20 years ago.</span></p><h1 data-dcnode-id="1395" id="research-in-data-visualization"><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Research in Data Visualization</span></strong></h1><p data-dcnode-id="1393" id="r4139119622"><span data-dcnode-id="1394" instrument_node="">There are great opportunities for future research in data visualization. Principles are needed on how to decide which of many possible graphics to draw. It is not a matter of drawing a single, 'optimal' graphic, if such a thing even existed; it is a matter of choosing a group of graphics that will provide more information. It is like taking photographs of a complicated object, a single one would not be enough, and taking pictures from every possible angle and distance would be far too many. Sets of graphics are useful for providing context, as the scatterplots in Klimek, Yegorov, Hanel, and Thurner (2012) demonstrate.</span></p><p data-dcnode-id="1391" id="r7606771790"><span data-dcnode-id="1392" instrument_node="">More understanding of combining and linking graphics is needed, whether in static ensembles or in interactive displays, just as better software is needed for these. The value of alignment and common scaling for making effective comparisons, for instance, with small multiples and faceting (displaying many graphics of the same form conditioning on other variables) is one part of this. It is a historical curiosity that the current exciting work on interactive graphics on the Web still lags behind standalone systems that were already available more than 30 years ago in linking multiple windows. Data Desk and JMP were commercial examples at the time (see Velleman, 2019, and Sall, 2019, for current versions).</span></p><p data-dcnode-id="1389" id="r5265872690"><span data-dcnode-id="1390" instrument_node="">Published graphics are sometimes attractive and beautifully produced. The content does not always match. That may be because authors and publishers do not expect the graphics to be examined in any detail. They may be added as illustrations to balance the layout and make it look more agreeable. If you do not have a suitable photograph, cartoon, or map, you could use a colorful statistical graphic. I have many times heard people say that they do not understand numbers and were bad at mathematics in school. No one has ever said to me they do not understand graphics, perhaps because they regard them as illustrations and not as central parts of an argument. There is work to be done in educating researchers and readers in the value of graphics.</span></p><p data-dcnode-id="1387" id="r6025119863"><span data-dcnode-id="1388" instrument_node="">Research into new and innovative graphics is exciting and productive. Simultaneously, it is essential to make the best use of known and well-understood graphics. There is a risk of emphasis on novelty at the expense of familiarity. New, innovative graphics need instruction and experience to interpret them. Their designers have spent much time developing them and reasonably enough believe that what is obvious to them should be obvious to everyone. Just think of the humble scatterplot. It is only in recent years that scatterplots have appeared in the media, although they are one of the most important statistical graphics. If you have never seen one before, they can be intimidating, even more so when you are told ‘It is clear that...’ or ‘You can easily see that...’ We should build on the familiar to carry our readers along with us.</span></p><h1 data-dcnode-id="1384" id="examples-and-sources"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Examples and Sources</span></strong></h1><p data-dcnode-id="1373" id="r3427714460"><span data-dcnode-id="1383" instrument_node="">The visualizations I like may not be the visualizations you like. I urge you to search extensively and judge for yourselves. Much interesting and thought-provoking material can be found in Tufte's classic books (e.g., Tufte, 2001), and in the displays by the </span><em data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">New York Times</span></em><span data-dcnode-id="1380" instrument_node=""> over the years (e.g., </span><em data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">New York Times</span></em><span data-dcnode-id="1377" instrument_node="">, 2018). Other newspapers and media have also produced excellent work. These are, of course, presentation graphics, but they offer much to engage with. It is difficult to make a choice among the many individual Web pages providing examples and discussion, but </span><a data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualisingdata.com/" title=""><span data-dcnode-id="1376" instrument_node="">Visualising Data</span></a><span data-dcnode-id="1374" instrument_node=""> is one site that recommends highlights across the web. The current interest and activity in graphics are very welcome.</span></p><h1 data-dcnode-id="1370" id="what-happens-now"><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">What Happens Now?</span></strong></h1><p data-dcnode-id="1368" id="r9898230065"><span data-dcnode-id="1369" instrument_node="">Educating people in choosing, drawing, and interpreting graphics is more difficult than you might think. Data visualization is not taught badly, it is just not taught very much at all. Ideally, there should be better theory, and consequently better graphics. That will take time. In the meantime, we should:</span></p><blockquote data-dcnode-id="1361" id="r6293345353"><p data-dcnode-id="1366" id="r1843532947"><span data-dcnode-id="1367" instrument_node="">—discuss more graphics more;</span></p><p data-dcnode-id="1364" id="r4342500854"><span data-dcnode-id="1365" instrument_node="">—interpret more graphics more;</span></p><p data-dcnode-id="1362" id="r4752271444"><span data-dcnode-id="1363" instrument_node="">—teach more graphics more.</span></p></blockquote><p data-dcnode-id="1359" id="r1718848891"><br data-dcnode-id="1360"></p><div contenteditable="false" data-dcnode-id="1357"><hr data-dcnode-id="1358"></div><h1 data-dcnode-id="1354" id="references"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">References</span></strong></h1><p data-dcnode-id="1350" id="r4093117592"><span data-dcnode-id="1353" instrument_node="">Daniels, M. (2018). "Human Terrain." </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pudding.cool/2018/10/city_3d/"><span data-dcnode-id="1352" instrument_node="">https://pudding.cool/2018/10/city_3d/</span></a></p><p data-dcnode-id="1343" id="r1778308644"><span data-dcnode-id="1349" instrument_node="">Hand, D. (2019). What is the purpose of statistical modelling? </span><em data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Harvard Data Science Review, 1(1)</span></em><span data-dcnode-id="1346" instrument_node="">. </span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hdsr.mitpress.mit.edu/pub/9qsbf3hz"><span data-dcnode-id="1345" instrument_node="">https://hdsr.mitpress.mit.edu/pub/9qsbf3hz</span></a></p><p data-dcnode-id="1339" id="r7119841515"><span data-dcnode-id="1342" instrument_node="">Institute for Government. (2019). Ministerial resignations outside reshuffles, by prime minister. Retrieved August 14, 2019, from </span><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instituteforgovernment.org.uk/charts/ministerial-resignations-outside-reshuffles-prime-minister"><span data-dcnode-id="1341" instrument_node="">https://www.instituteforgovernment.org.uk/charts/ministerial-resignations-outside-reshuffles-prime-minister</span></a></p><p data-dcnode-id="1332" id="r9863294844"><span data-dcnode-id="1338" instrument_node="">Klimek, P., Yegorov, Y., Hanel, R., &amp; Thurner, S. (2012). Statistical detection of systematic election irregularities. </span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">PNAS,109,</span></em><span data-dcnode-id="1335" instrument_node=""> 16469–16473. </span><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pnas.org/content/109/41/16469"><span data-dcnode-id="1334" instrument_node="">https://www.pnas.org/content/109/41/16469</span></a></p><p data-dcnode-id="13
