</span><div data-dcnode-id="989"><span data-dcnode-id="990"><span data-dcnode-id="991"><span data-dcnode-id="1004" instrument_node="">Polyacrylamide </span><b data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">gel</span></b><span data-dcnode-id="1001" instrument_node=""> electrophoresis (</span><b data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">PAGE</span></b><span data-dcnode-id="998" instrument_node="">) is probably the most common analytical technique used to separate and characterize proteins. A solution of </span><b data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">acrylamide</span></b><span data-dcnode-id="995" instrument_node=""> and bisacrylamide is polymerized. </span><b data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Acrylamide</span></b><span data-dcnode-id="992" instrument_node=""> alone forms linear polymers. TEMED, a free radical stabilizer, is generally included to promote polymerization.</span></span></span></div><br data-dcnode-id="988"><p data-dcnode-id="981"><a class="lc" data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/goto/151000" rel="nofollow" target="_blank"><span data-dcnode-id="987" instrument_node="">Click to see full answer </span></a><span data-dcnode-id="985" instrument_node=""> </span><br data-dcnode-id="984"><br data-dcnode-id="983"><span data-dcnode-id="982" instrument_node=""> Considering this,  why acrylamide is used in SDS PAGE?</span></p><p data-dcnode-id="969"><span data-dcnode-id="970"><span data-dcnode-id="971"><b data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Acrylamide</span></b><span data-dcnode-id="978" instrument_node=""> is soluble in water and upon addition of water it polymerizes resulting in formation of polyacrylamide. It is useful to make polyacrylamide </span><b data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">gel</span></b><span data-dcnode-id="975" instrument_node=""> via acrylmide hydration because pore size can be regulated. Increased concentrations of </span><b data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">acrylamide</span></b><span data-dcnode-id="972" instrument_node=""> result in decreased pore size after polymerization.</span></span></span></p><p data-dcnode-id="947"><span data-dcnode-id="968" instrument_node="">One may also ask,  what is the difference between acrylamide and bisacrylamide? </span><span data-dcnode-id="948"><span data-dcnode-id="949"><b data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Acrylamide</span></b><span data-dcnode-id="965" instrument_node=""> is the monomer used for the production of polyacrylamide polymer. </span><b data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Bisacrylamide</span></b><span data-dcnode-id="962" instrument_node=""> is used to make crosslinks </span><b data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">between</span></b><span data-dcnode-id="959" instrument_node=""> these polyacrylamide polymer chains. The main </span><b data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">difference between acrylamide and Bisacrylamide</span></b><span data-dcnode-id="956" instrument_node=""> is that </span><b data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">acrylamide</span></b><span data-dcnode-id="953" instrument_node=""> has a C-N bond whereas </span><b data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Bisacrylamide</span></b><span data-dcnode-id="950" instrument_node=""> contains an N-C-N bond.</span></span></span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node=""> Regarding this,  what does the acrylamide do in the experiment?</span></p><p data-dcnode-id="931"><span data-dcnode-id="944" instrument_node=""> </span><span data-dcnode-id="932"><span data-dcnode-id="933"><span data-dcnode-id="943" instrument_node="">Hard gels (12-20% </span><b data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">acrylamide</span></b><span data-dcnode-id="940" instrument_node="">) retard the migration of large molecules more than they </span><b data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">do</span></b><span data-dcnode-id="937" instrument_node=""> small ones. In certain cases, high concentration </span><b data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">acrylamide</span></b><span data-dcnode-id="934" instrument_node=""> gels are so tight that they exclude large molecules from entering the gel but allow the migration and resolution of low molecular weight components of a complex mixture.</span></span></span></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Why is SDS PAGE used for proteins?</span></p><p data-dcnode-id="907"><span data-dcnode-id="908"><span data-dcnode-id="909"><span data-dcnode-id="928" instrument_node="">For </span><b data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">proteins</span></b><span data-dcnode-id="925" instrument_node="">, Sodium Dodecyl Sulfate (</span><b data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">SDS</span></b><span data-dcnode-id="922" instrument_node="">) is </span><b data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">used</span></b><span data-dcnode-id="919" instrument_node=""> to linearize </span><b data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">proteins</span></b><span data-dcnode-id="916" instrument_node=""> and to negatively charge the </span><b data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">proteins</span></b><span data-dcnode-id="913" instrument_node="">. The binding of </span><b data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">SDS</span></b><span data-dcnode-id="910" instrument_node=""> to the polypeptide chain imparts an even distribution of charge per unit mass.</span></span></span></p><span data-dcnode-id="906" instrument_node=""> </span></div><span data-dcnode-id="904" instrument_node="">
</span></div><span data-dcnode-id="902" instrument_node="">

</span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/open-detail/151000A4" rel="nofollow" target="_blank"><span data-dcnode-id="884" instrument_node="">Can SDS PAGE be used for DNA?</span></a><span data-dcnode-id="882" instrument_node="">
</span></h3><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="879" style="display:inline;"></p><div data-dcnode-id="863"><span data-dcnode-id="864"><span data-dcnode-id="865"><span data-dcnode-id="878" instrument_node="">The function of </span><b data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">SDS</span></b><span data-dcnode-id="875" instrument_node=""> to denature the protein and to give negative charge to it, </span><b data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">DNA</span></b><span data-dcnode-id="872" instrument_node=""> carry negative charge with phosphate group in both 6.8 and 8.8 pH. There </span><b data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">will</span></b><span data-dcnode-id="869" instrument_node=""> be no disulfide bonds to break in </span><b data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">DNA</span></b><span data-dcnode-id="866" instrument_node=""> so no need of mercapto ethanol.</span></span></span></div><p data-dcnode-id="862"></p><span data-dcnode-id="861" instrument_node="">

</span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/open-detail/151000A5" rel="nofollow" target="_blank"><span data-dcnode-id="848" instrument_node="">What is the function of Temed?</span></a><span data-dcnode-id="846" instrument_node="">
</span></h3><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="843" style="display:inline;"></p><div data-dcnode-id="834"><span data-dcnode-id="835"><span data-dcnode-id="836"><b data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">TEMED</span></b><span data-dcnode-id="840" instrument_node="">, is a free radical stabilizer. Free radicals promote acrylamide polimerization, and APS (ammonimum persulfate) which is other component of SDS gels, is a source of them. So the </span><b data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">role of TEMED</span></b><span data-dcnode-id="837" instrument_node=""> is stabilize these free radicals in order to improve the acrylamide polimerization.</span></span></span></div><p data-dcnode-id="833"></p><span data-dcnode-id="832" instrument_node="">

</span></h3><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="814" style="display:inline;"></p><div data-dcnode-id="798"><span data-dcnode-id="799"><span data-dcnode-id="800"><span data-dcnode-id="813" instrument_node="">On April 24, 2002, the Swedish National Food Administration announced that </span><b data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">acrylamide</span></b><span data-dcnode-id="810" instrument_node=""> can be found in baked and fried starchy foods, such as </span><b data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">potato</span></b><span data-dcnode-id="807" instrument_node=""> chips, breads, and cookies. Concern was raised mainly because of the probable </span><b data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">carcinogenic</span></b><span data-dcnode-id="804" instrument_node=""> effects of </span><b data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">acrylamide</span></b><span data-dcnode-id="801" instrument_node="">.</span></span></span></div><p data-dcnode-id="797"></p><span data-dcnode-id="796" instrument_node="">

</span></h3><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="778" style="display:inline;"></p><div data-dcnode-id="758"><span data-dcnode-id="777" instrument_node=""> </span><div data-dcnode-id="769"><span data-dcnode-id="770"><b data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Principle of SDS</span></b><span data-dcnode-id="774" instrument_node="">-</span><b data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">PAGE</span></b><span data-dcnode-id="771" instrument_node="">:</span></span></div><span data-dcnode-id="768" instrument_node=""> </span><span data-dcnode-id="759"><span data-dcnode-id="760"><span data-dcnode-id="767" instrument_node="">A reducing agent such as mercaptoethanol or dithiothreitol (DTT) (in the presence of a detergent i.e. </span><b data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">SDS</span></b><span data-dcnode-id="764" instrument_node="">) breaks down the disulfide bridges that are responsible for protein folding; and a detergent such as </span><b data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">SDS</span></b><span data-dcnode-id="761" instrument_node=""> imparts negative charge to the proteins thereby linearizing them into polypeptides.</span></span></span></div><p data-dcnode-id="757"></p><span data-dcnode-id="756" instrument_node="">

</span></h3><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="738" style="display:inline;"></p><div data-dcnode-id="729"><span data-dcnode-id="730"><span data-dcnode-id="731"><b data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Polyacrylamide gels</span></b><span data-dcnode-id="735" instrument_node=""> are based on the free radical polymerization principle of acrylamide and cross-linking N,N′-methylene-bis-acrylamide. This material is physically very stable and strong. It is especially used for the electrophoretic separation of small or medium sized (up to about 1×10</span><sup data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">6</span></sup><span data-dcnode-id="732" instrument_node=""> Da) proteins.</span></span></span></div><p data-dcnode-id="728"></p><span data-dcnode-id="727" instrument_node="">

</span></h3><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="709" style="display:inline;"></p><div data-dcnode-id="699"><span data-dcnode-id="700"><span data-dcnode-id="701"><span data-dcnode-id="708" instrument_node="">The main reason is to differentiate the rate of migration while the proteins are stacking into a tight band in the wells, before they enter resolving </span><b data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">gel</span></b><span data-dcnode-id="705" instrument_node=""> for separation. The respective </span><b data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">pH</span></b><span data-dcnode-id="702" instrument_node=""> influences the charge of ions in the running buffer, and thus their migration when electric current is turned on.</span></span></span></div><p data-dcnode-id="698"></p><span data-dcnode-id="697" instrument_node="">

</span></h3><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="679" style="display:inline;"></p><div data-dcnode-id="660"><span data-dcnode-id="661"><span data-dcnode-id="662"><span data-dcnode-id="678" instrument_node="">BME is suitable for reducing protein disulfide bonds prior to polyacrylamide </span><b data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">gel</span></b><span data-dcnode-id="675" instrument_node=""> electrophoresis and is usually included in a sample buffer for </span><b data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">SDS</span></b><span data-dcnode-id="672" instrument_node="">-</span><b data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">PAGE</span></b><span data-dcnode-id="669" instrument_node=""> at a concentration of 5%. Cleaving intermolecular (between subunits) disulfide bonds allows the subunits of a protein to separate independently on </span><b data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">SDS</span></b><span data-dcnode-id="666" instrument_node="">-</span><b data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">PAGE</span></b><span data-dcnode-id="663" instrument_node="">.</span></span></span></div><p data-dcnode-id="659"></p><span data-dcnode-id="658" instrument_node="">

</span></h3><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="640" style="display:inline;"></p><div data-dcnode-id="630"><span data-dcnode-id="631"><span data-dcnode-id="632"><span data-dcnode-id="639" instrument_node="">What is the advantage of adding SDS to gel electrophoresis? A) SDS colors the </span><b data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">proteins</span></b><span data-dcnode-id="636" instrument_node=""> for visualization. B) SDS reduces disulfide bonds. SDS allows </span><b data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">proteins</span></b><span data-dcnode-id="633" instrument_node=""> to be separated on the basis of approximate mass.</span></span></span></div><p data-dcnode-id="629"></p><span data-dcnode-id="628" instrument_node="">
