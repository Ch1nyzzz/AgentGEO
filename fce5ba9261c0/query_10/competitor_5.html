</span><div class="mw-content-ltr" data-dcnode-id="90" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="91"><div class="thumb tleft" data-dcnode-id="395"><div class="thumbinner" data-dcnode-id="396" style="width:202px;"><a class="image" data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyhistory.org/File%3ASkythian_archer_plate_BM_E135_by_Epiktetos.jpg"><img alt="" class="thumbimage" data-dcnode-id="403" height="193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyhistory.org/images/thumb/5/5d/Skythian_archer_plate_BM_E135_by_Epiktetos.jpg/200px-Skythian_archer_plate_BM_E135_by_Epiktetos.jpg&amp;raw" srcset="/images/thumb/5/5d/Skythian_archer_plate_BM_E135_by_Epiktetos.jpg/300px-Skythian_archer_plate_BM_E135_by_Epiktetos.jpg 1.5x, /images/thumb/5/5d/Skythian_archer_plate_BM_E135_by_Epiktetos.jpg/400px-Skythian_archer_plate_BM_E135_by_Epiktetos.jpg 2x" width="200"></a><span data-dcnode-id="401" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="397"><div class="magnify" data-dcnode-id="399"><a class="internal" data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyhistory.org/File%3ASkythian_archer_plate_BM_E135_by_Epiktetos.jpg" title="Enlarge"></a></div><span data-dcnode-id="398" instrument_node="">Scythian archer drawing an arrow from his quiver as he turns to shoot at the enemy. Shown wearing pants. Inscriptions in small and neat letters: to the left of the figure: Επικτετος; on his right: εγρασφεν (sic). Interior from an Attic red-figured plate. From Vulci. Between 520 and 500 BCE</span></div></div></div><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Who invented pants? The simple answer is that we do not who invented pants. Pants developed in multiple cultures around the world. The better question is: Why did humans start wearing pants? To answer this, it’s important to understand two things - first, what were the earliest forms of clothing and how they evolved into pants, and secondly, why did a need for pants develop? It is also helpful to define what is meant by pants - specifically a bifurcated garment for the bottom half of the body covering from waist to the lower leg. 
</span></p><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">This definition helps to differentiate from the earlier leggings that were often pieces of cloth or skins wrapped around the legs and then tied on with straps. Leggings were comprised of two separate garments. Ötzil the Ice Man, perhaps the most famous archaeological find of prehistoric human remains from the northern regions, was wearing leggings. 
</span></p><span data-dcnode-id="389" instrument_node="">
</span><h2 data-dcnode-id="386"><span class="mw-headline" data-dcnode-id="387" id="What_are_the_Earliest_Origins_of_Pants.3F"><span data-dcnode-id="388" instrument_node="">What are the Earliest Origins of Pants?</span></span></h2><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">From archaeological evidence, it is known that the earliest types of clothing were wrapped skirts or aprons for both genders. The oldest known woven example is a fragment made from woven reeds found in Armenia and approximately 2900 BCE. While this is just a fragment the construction hints at what the complete style would have looked like with a waistband woven in the opposite direction from the skirt. This is likely stylistically based on earlier versions made from hides that do not survive modern times. 
</span></p><p data-dcnode-id="377"><span data-dcnode-id="382" instrument_node="">Even earlier examples were of so-called string skirts comprised of a waistband with strings or pieces of grass hanging down - these skirts often tied like an apron and depictions can be found in art dating back nearly 20,000 years. In the present day, this style is still seen in Southeast Asia and other countries, for example, the sarong, a traditionally unisex garment. In colder climates, these could be paired with the previously mentioned leggings and a T-shaped tunic. These are all effortless garment that requires limited construction and materials. </span><sup class="reference" data-dcnode-id="379" id="cite_ref-1"><a data-dcnode-id="380" href="#cite_note-1"><span data-dcnode-id="381" instrument_node="">[1]</span></a></sup><span data-dcnode-id="378" instrument_node="">
</span></p><span data-dcnode-id="376" instrument_node="">
</span><h2 data-dcnode-id="373"><span class="mw-headline" data-dcnode-id="374" id="Did_the_Domestication_of_horses_led_to_Pants.3F"><span data-dcnode-id="375" instrument_node="">Did the Domestication of horses led to Pants?</span></span></h2><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="371" instrument_node="">The development of pants came alongside horses' domestication and served as an indicator of class and profession. People who rode horses needed to protect their legs and remaining clothed as a simple wrap garment would not remain on the body. Some early variants involved using the same single pieces of cloth and tying it through the legs to create trousers. Horses were. Initially domesticated in Central Asia sometime between 3500 and 3000 BCE. Horses were a signifier of prestige, and in many cultures horses and the equipment used in riding them or in using them to drive chariots were included in the elites' tombs. In these earliest horse riding cultures, trousers, as a form of clothing connected to horses, also served as a sign of prestige. </span><sup class="reference" data-dcnode-id="368" id="cite_ref-2"><a data-dcnode-id="369" href="#cite_note-2"><span data-dcnode-id="370" instrument_node="">[2]</span></a></sup><span data-dcnode-id="367" instrument_node="">
</span></p><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">The earliest existing pair of pants was found in China and dates to around 1000 BCE - within 1000 years when it is believed horses were initially domesticated. These pants are constructed of wool with legs made of multiple panels. Experts believe that the construction style of these garments was designed specifically for horseback riding rather than for warmth or protection from the underbrush. 
</span></p><p data-dcnode-id="358"><span data-dcnode-id="363" instrument_node="">The garments show a more complex pieced construction than those tunics and skirts, with far more small parts stitched together instead of being a simple wrap or comprised of two simple shapes sewn to one another. These were garments designed for a task rather than to protect the wearer from the elements.</span><sup class="reference" data-dcnode-id="360" id="cite_ref-3"><a data-dcnode-id="361" href="#cite_note-3"><span data-dcnode-id="362" instrument_node="">[3]</span></a></sup><span data-dcnode-id="359" instrument_node=""> In this way, pants helped define a class and social divisions, as wearing them visually identified the wearer with the tasks they completed. 
</span></p><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">While the development of horseback riding led to pants' immediate beginnings, they were not instantly accepted as a garment across the entire world at that time. Instead, they spread gradually and often faced challenges among cultures that considered themselves more “civilized” than those wearing pants. 
</span></p><span data-dcnode-id="355" instrument_node="">
</span><h2 data-dcnode-id="352"><span class="mw-headline" data-dcnode-id="353" id="How_did_Pants_Develop_in_the_Western_World.3F"><span data-dcnode-id="354" instrument_node="">How did Pants Develop in the Western World?</span></span></h2><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="350" instrument_node="">Scythian warriors, both male, and female, from Central Eurasia, are depicted wearing tight-fitting trousers in Greek art dating from the 6th centuries BCE.</span><sup class="reference" data-dcnode-id="347" id="cite_ref-4"><a data-dcnode-id="348" href="#cite_note-4"><span data-dcnode-id="349" instrument_node="">[4]</span></a></sup><span data-dcnode-id="346" instrument_node=""> Similar styles, consisting of a tunic and trousers, have been found surviving in tombs. 
</span></p><p data-dcnode-id="339"><span data-dcnode-id="344" instrument_node="">The Greeks wore a wrapped garment, the chiton, and viewed the wearing of trousers as something done by foreigners and females. Some historians believe that the Amazons of Greek myth were at least partially based on the female warriors of the Scythians. In these myths, the trousers come to stand as just one of the ways these warriors buck tradition.</span><sup class="reference" data-dcnode-id="341" id="cite_ref-5"><a data-dcnode-id="342" href="#cite_note-5"><span data-dcnode-id="343" instrument_node="">[5]</span></a></sup><span data-dcnode-id="340" instrument_node="">
</span></p><span data-dcnode-id="338" instrument_node="">
</span><div data-dcnode-id="333" style="float: right"><div data-dcnode-id="335" id="ezoic-pub-ad-placeholder-130"><img data-dcnode-id="336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyhistory.org/images/dh280x280.png&amp;raw"></div></div><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="331" instrument_node="">In the Roman world, the toga was the typical wrap garment for men on formal occasions. Casual wear consisted of a tunic. Earlier military members didn’t wear trousers, seeing them as effeminate like their Greek predecessors - however, the combination of being defeated by the trouser wearing Teutons continued northern exploration and increased usage of cavalry. The spread of the Romans also helped in spreading trousers throughout much of the area where they conquered. Many of these areas were still wearing the separate leggings with a tunic and mantle - normally made of heavy wool.</span><sup class="reference" data-dcnode-id="328" id="cite_ref-6"><a data-dcnode-id="329" href="#cite_note-6"><span data-dcnode-id="330" instrument_node="">[6]</span></a></sup><span data-dcnode-id="327" instrument_node="">
</span></p><span data-dcnode-id="325" instrument_node="">
</span><h2 data-dcnode-id="322"><span class="mw-headline" data-dcnode-id="323" id="When_did_Men_begin_Wearing_Pants_in_the_Modern_Era.3F"><span data-dcnode-id="324" instrument_node="">When did Men begin Wearing Pants in the Modern Era?</span></span></h2><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="320" instrument_node="">After the Romans accepted pants, they became a more standard mode of dress across the Western world. As centuries went on, it became those who did not wear pants who stood out, such as Scottish soldiers who wore kilts into battle up into the 20th century. Even as in previous civilizations, pants had served as a designator of completing a specific task for the upper class of later Western civilizations. They serve to show modernity and how the wearer fits the mold of masculinity. By being prepared to carry out physical activities and not constrained by tight clothing or billowing robes, new fashions showed a change in the cultural mindset as to what was appropriate for these men to accomplish. To show how this change occurred, it helps to look at the specific cases of Imperial Russia and Regency England.</span><sup class="reference" data-dcnode-id="317" id="cite_ref-7"><a data-dcnode-id="318" href="#cite_note-7"><span data-dcnode-id="319" instrument_node="">[7]</span></a></sup><span data-dcnode-id="316" instrument_node="">
</span></p><span data-dcnode-id="314" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="305"><div class="thumbinner" data-dcnode-id="306" style="width:302px;"><a class="image" data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyhistory.org/File%3AX-A_Boyar_Wedding_Feast_%28Konstantin_Makovsky%2C_1883%29_Google_Cultural_Institute.jpg"><img alt="" class="thumbimage" data-dcnode-id="313" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyhistory.org/images/thumb/f/f5/X-A_Boyar_Wedding_Feast_%2528Konstantin_Makovsky%252C_1883%2529_Google_Cultural_Institute.jpg/300px-X-A_Boyar_Wedding_Feast_%2528Konstantin_Makovsky%252C_1883%2529_Google_Cultural_Institute.jpg&amp;raw" srcset="/images/thumb/f/f5/X-A_Boyar_Wedding_Feast_%28Konstantin_Makovsky%2C_1883%29_Google_Cultural_Institute.jpg/450px-X-A_Boyar_Wedding_Feast_%28Konstantin_Makovsky%2C_1883%29_Google_Cultural_Institute.jpg 1.5x, /images/thumb/f/f5/X-A_Boyar_Wedding_Feast_%28Konstantin_Makovsky%2C_1883%29_Google_Cultural_Institute.jpg/600px-X-A_Boyar_Wedding_Feast_%28Konstantin_Makovsky%2C_1883%29_Google_Cultural_Institute.jpg 2x" width="300"></a><span data-dcnode-id="311" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="307"><div class="magnify" data-dcnode-id="309"><a class="internal" data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyhistory.org/File%3AX-A_Boyar_Wedding_Feast_%28Konstantin_Makovsky%2C_1883%29_Google_Cultural_Institute.jpg" title="Enlarge"></a></div><span data-dcnode-id="308" instrument_node="">The painting depicts two Boyar families at a wedding.</span></div></div></div><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">As part of a mission to drag Russia into what he viewed as the modern world, Peter the Great issued a decree, in 1701, on modern clothing stating that upper-class men were to follow these guidelines concerning attire - “The upper dress shall be of French or Saxon cut, and the lower dress and underwear-[including] waistcoat, trousers, boots, shoes, and hats- shall be of the German type.” This replaced the previous style of floor-length caftans. 
</span></p><p data-dcnode-id="296"><span data-dcnode-id="301" instrument_node="">The pants mentioned in this decree were the knee-breeches popularized at the time by the French court. In forcing the Russian court to adopt Western styles, Peter I used clothing to highlight the larger societal change efforts he was putting into place within the country. </span><sup class="reference" data-dcnode-id="298" id="cite_ref-8"><a data-dcnode-id="299" href="#cite_note-8"><span data-dcnode-id="300" instrument_node="">[8]</span></a></sup><span data-dcnode-id="297" instrument_node="">
</span></p><p data-dcnode-id="290"><span data-dcnode-id="295" instrument_node="">The final victory for trousers over breeches in England and those that looked to England for fashion was the rise of the popularity of the menswear suit as known today, heavily influenced by Beau Brummell in the early 1800s. Brummell popularized a style characterized by simplicity and good tailoring, in contrast to previous decades' most flamboyant styles. Previous styles had featured tight-fitting knee-breeches and stockings along with heeled shoes, styles which showcased the wearers' high rank in that they were not practical for doing vigorous physical activity. </span><sup class="reference" data-dcnode-id="292" id="cite_ref-9"><a data-dcnode-id="293" href="#cite_note-9"><span data-dcnode-id="294" instrument_node="">[9]</span></a></sup><span data-dcnode-id="291" instrument_node="">
</span></p><p data-dcnode-id="284"><span data-dcnode-id="289" instrument_node="">On the other hand, Brummell's style brought to the forefront with both its looser long trousers and flat boots and shoes allowed the wearer to participate in more activities matching a social change in the concept of masculinity. He also preferred dark colors, normally black with a white shirt, over the bright colors worn previously. This style was adopted by upper-class men and became the norm for western society through to the modern-day.</span><sup class="reference" data-dcnode-id="286" id="cite_ref-10"><a data-dcnode-id="287" href="#cite_note-10"><span data-dcnode-id="288" instrument_node="">[10]</span></a></sup><span data-dcnode-id="285" instrument_node="">
</span></p><span data-dcnode-id="283" instrument_node="">
</span><h2 data-dcnode-id="280"><span class="mw-headline" data-dcnode-id="281" id="Conclusion"><span data-dcnode-id="282" instrument_node="">Conclusion</span></span></h2><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">The development of pants allowed for a greater range of freedom and movement. While this initially was just for the warrior and lower classes, specifically the males in many societies, over history, the wearing of pants has come to symbolize not only a necessity of movement (as seen when worn by warriors or working peasants) but the choice to be active and to enjoy physical freedoms. Wearing pants showed cultural and societal changes in the ideas of what is masculine and what is feminine and what is expected of all members of society. 
</span></p><span data-dcnode-id="276" instrument_node="">
</span><div class="portal" data-dcnode-id="249" style="width:85%;"><span data-dcnode-id="275" instrument_node="">
