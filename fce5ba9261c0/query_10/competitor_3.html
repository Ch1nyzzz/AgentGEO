</span><div data-dcnode-id="171" id="bodycontent"><span data-dcnode-id="5331" instrument_node="">
</span><div class="card content-body" data-dcnode-id="5172"><p data-dcnode-id="5329"><span data-dcnode-id="5330" instrument_node="">
What color are the numbers 0 through 9 and the letters A through Z?
</span></p><span data-dcnode-id="5328" instrument_node="">
</span><p data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">
This question will strike many as odd. After all, numbers and letters are usually
black, and if they're colored, it's usually in an arbitrary fashion.
But what if I told you that the number 2 is green, 4 is blue, 5 is red, C is yellow,
and T is purple? You'd probably think I'm insane, but I'm not: I simply experience
a phenomenon known as "synesthesia."
</span></p><span data-dcnode-id="5325" instrument_node="">
</span><p data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">
Here's a picture of what I mean. Note that the colors are approximate; some of the
colors I "see" cannot be reproduced on the screen. Also note that someone else's colors
will likely be completely different from mine.
</span></p><span data-dcnode-id="5322" instrument_node="">
</span><p data-dcnode-id="5297"><span data-dcnode-id="5321" instrument_node="">
</span><span data-dcnode-id="5299" style="font-size: 400%;"><span data-dcnode-id="5320" instrument_node="">
</span><span data-dcnode-id="5318" style="color: #A6A6A6"><span data-dcnode-id="5319" instrument_node="">0</span></span><span data-dcnode-id="5316" style="color: #616161"><span data-dcnode-id="5317" instrument_node="">1</span></span><span data-dcnode-id="5314" style="color: #00B700"><span data-dcnode-id="5315" instrument_node="">2</span></span><span data-dcnode-id="5312" style="color: #FDD802"><span data-dcnode-id="5313" instrument_node="">3</span></span><span data-dcnode-id="5310" style="color: #0000D5"><span data-dcnode-id="5311" instrument_node="">4</span></span><span data-dcnode-id="5308" style="color: #FF0000"><span data-dcnode-id="5309" instrument_node="">5</span></span><span data-dcnode-id="5306" style="color: #ECE000"><span data-dcnode-id="5307" instrument_node="">6</span></span><span data-dcnode-id="5304" style="color: #CCAC71"><span data-dcnode-id="5305" instrument_node="">7</span></span><span data-dcnode-id="5302" style="color: #77452D"><span data-dcnode-id="5303" instrument_node="">8</span></span><span data-dcnode-id="5300" style="color: #FFCB2D"><span data-dcnode-id="5301" instrument_node="">9</span></span></span><span data-dcnode-id="5298" instrument_node="">
</span></p><span data-dcnode-id="5296" instrument_node="">
</span><p data-dcnode-id="5294"><span data-dcnode-id="5295" instrument_node="">
According to Wikipedia, synesthesia "is a neurologically-based condition in which stimulation of one sensory or cognitive pathway leads to automatic, involuntary experiences in a second sensory or cognitive pathway."
In other words, people who experience synesthesia associate one stimulus with
something that seems unrelated – like seeing each letter and number as having a
specific color, seeing the numbers in different spatial locations, or "seeing" music.
</span></p><span data-dcnode-id="5293" instrument_node="">
</span><h2 data-dcnode-id="5291" id="discovering_synesthesia"><span data-dcnode-id="5292" instrument_node="">Discovering synesthesia</span></h2><span data-dcnode-id="5290" instrument_node="">
</span><p data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">
I have associated colors with letters/numbers – grapheme-color synesthesia –
for as long as I can remember. At first, I thought it was normal, but when everyone
I mentioned this to just stared at me with a blank look, I realized that I had an
unusual quality. It wasn't until recently that I actually found out that this phenomenon
was called "synesthesia". After that, I realized that I had more forms of synesthesia
than just grapheme-color.
</span></p><span data-dcnode-id="5287" instrument_node="">
</span><h2 data-dcnode-id="5285" id="what_forms_of_synesthesia_do_i_have"><span data-dcnode-id="5286" instrument_node="">What forms of synesthesia do I have?</span></h2><span data-dcnode-id="5284" instrument_node="">
</span><p data-dcnode-id="5270"><span data-dcnode-id="5283" instrument_node="">
My most prevalent form is </span><strong data-dcnode-id="5281"><span data-dcnode-id="5282" instrument_node="">grapheme-color synesthesia</span></strong><span data-dcnode-id="5280" instrument_node="">, which involves
me associating a color with each letter. The interesting thing about my variant of it
is that the color is usually associated with the form of the letter and not the sound.
The English letter </span><span data-dcnode-id="5278" style="font-size: 150%;"><span data-dcnode-id="5279" instrument_node="">"B"</span></span><span data-dcnode-id="5277" instrument_node="">
and the Russian letter </span><span data-dcnode-id="5275" style="font-size: 150%;"><span data-dcnode-id="5276" instrument_node="">"В"</span></span><span data-dcnode-id="5274" instrument_node="">
(which has a "V" sound) are of the same color because they look identical, while the
Russian letter </span><span data-dcnode-id="5272" style="font-size: 150%;"><span data-dcnode-id="5273" instrument_node="">"Б"</span></span><span data-dcnode-id="5271" instrument_node="">
(which has a "B" sound) has a different color. (Technical note: be sure to set your
page's encoding to Unicode (UTF-8) to properly see the Russian characters.)
</span></p><span data-dcnode-id="5269" instrument_node="">
</span><p data-dcnode-id="5264"><span data-dcnode-id="5268" instrument_node="">
Another form is something I don't know the scientific name of but refer to as
</span><strong data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">"spatial location synesthesia."</span></strong><span data-dcnode-id="5265" instrument_node="">
This involves the number line for me, as well as
the alphabet. It is difficult to explain, but I see the number 0 at the beginning
of a real, physical sidewalk I walked down regularly as a young child;
20 is farther along this path, and 100 is even farther along, although the higher
the numbers get, the more abstract the path becomes.
</span></p><span data-dcnode-id="5263" instrument_node="">
</span><p data-dcnode-id="5258"><span data-dcnode-id="5262" instrument_node="">
The alphabet is similarly seen as being above the whiteboard in my first grade classroom.
A problem I have, though, is with months; I seem to have remembered the row of months
in my classroom as well, with January on the far left and December on the far right,
so I always think of months as being linear. This is quite inconvenient since I need
to manually count 6 months down in order to figure out what the "opposite" time is.
The interesting thing about the last 3 examples is that these seem to be
</span><strong data-dcnode-id="5260"><span data-dcnode-id="5261" instrument_node="">learned</span></strong><span data-dcnode-id="5259" instrument_node=""> stimuli – unlike the grapheme-color synesthesia where
colors have been assigned since birth more or less (or so I say),
I have actually seen the aforementioned items in real life.
</span></p><span data-dcnode-id="5257" instrument_node="">
</span><h2 data-dcnode-id="5255" id="association_of_concepts"><span data-dcnode-id="5256" instrument_node="">Association of concepts</span></h2><span data-dcnode-id="5254" instrument_node="">
</span><p data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">
Someone once asked me a very good question:
</span></p><span data-dcnode-id="5251" instrument_node="">
</span><blockquote data-dcnode-id="5248"><div data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">
If you see A as being red, what would happen
if someone put a black "A" on a red background? Would the letter "disappear"?
</span></div></blockquote><span data-dcnode-id="5247" instrument_node="">
</span><p data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">
The simple answer is "no." But to see why, we need to delve deeper into the concept
of "color" in the first place.
</span></p><span data-dcnode-id="5244" instrument_node="">
</span><p data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">
"Color" is not a wavelength; rather, it is a concept which is associated with a certain
stimulus, namely a certain wavelength of light entering the eye. Note that pure yellow
light and a combination of red + green light are both associated with the color "yellow"
in the brain. This also allows for the existence of colors that our eyes can never
see; some of the colors of letters I see aren't reproducible on a computer screen.
</span></p><span data-dcnode-id="5241" instrument_node="">
</span><p data-dcnode-id="5233"><span data-dcnode-id="5240" instrument_node="">
Text is inherently colorless; this is why we are able to read
</span><span data-dcnode-id="5238" style="color: black; background-color: white;"><span data-dcnode-id="5239" instrument_node="">black text on a white page</span></span><span data-dcnode-id="5237" instrument_node="">
and </span><span data-dcnode-id="5235" style="color: red; background-color: blue; font-size: 200%;"><span data-dcnode-id="5236" instrument_node="">large red text on a blue billboard</span></span><span data-dcnode-id="5234" instrument_node="">
and get the same meaning out of it. But the synesthetic association with colors happens AFTER the textual
processing takes place. Since the text itself carries no color information, the black
letter A and red background it's rendered on are not present when the text is stored in
the brain as such, there simply is no "red background" behind the red letter A.
</span></p><span data-dcnode-id="5232" instrument_node="">
</span><h2 data-dcnode-id="5230" id="spelling_genius"><span data-dcnode-id="5231" instrument_node="">Spelling genius</span></h2><span data-dcnode-id="5229" instrument_node="">
</span><p data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">
You're probably thinking, "so, this is cool and all... but what is it good for?"
Many things, actually. If you have synesthesia, you grow to appreciate the many
small ways in which it helps you in your daily life.
</span></p><span data-dcnode-id="5226" instrument_node="">
</span><p data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">
I won first place in my junior high school's spelling bee in 7th grade, and I won third
place in regional (just google my name). I've also been good at spelling, and particularly
good about noticing proper spellings of certain similar-sounding words. I later realized
that this was, in part, due to my synesthesia.
</span></p><span data-dcnode-id="5223" instrument_node="">
</span><p data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">
Let's take a common grammatical issue people have: "than" versus "then".
</span></p><span data-dcnode-id="5220" instrument_node="">
</span><p data-dcnode-id="5195"><span data-dcnode-id="5219" instrument_node="">
</span><span data-dcnode-id="5209" style="font-size: 400%"><span data-dcnode-id="5218" instrument_node="">
</span><span data-dcnode-id="5216" style="color: #461E99"><span data-dcnode-id="5217" instrument_node="">t</span></span><span data-dcnode-id="5214" style="color: #D1BC74"><span data-dcnode-id="5215" instrument_node="">h</span></span><span data-dcnode-id="5212" style="color: #ff0000"><span data-dcnode-id="5213" instrument_node="">a</span></span><span data-dcnode-id="5210" style="color: #02915B"><span data-dcnode-id="5211" instrument_node="">n</span></span></span><span data-dcnode-id="5208" instrument_node="">
versus
</span><span data-dcnode-id="5197" style="font-size: 400%"><span data-dcnode-id="5207" instrument_node="">
</span><span data-dcnode-id="5205" style="color: #461E99"><span data-dcnode-id="5206" instrument_node="">t</span></span><span data-dcnode-id="5203" style="color: #D1BC74"><span data-dcnode-id="5204" instrument_node="">h</span></span><span data-dcnode-id="5201" style="color: #00bb00"><span data-dcnode-id="5202" instrument_node="">e</span></span><span data-dcnode-id="5199" style="color: #02915B"><span data-dcnode-id="5200" instrument_node="">n</span></span><span data-dcnode-id="5198" instrument_node="">
</span></span><span data-dcnode-id="5196" instrument_node="">
</span></p><span data-dcnode-id="5194" instrument_node="">
</span><p data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">
The distinct color difference between "a" and "e", which is also remembered along with
the word and its meaning, ensures that I will almost never mix up similar-sounding words.
(Try to unfocus your eyes until you see each word as a blob of color, and notice how they
look quite different even because of one letter.)
</span></p><span data-dcnode-id="5191" instrument_node="">
</span><h2 data-dcnode-id="5189" id="practical_applications_of_synesthesia"><span data-dcnode-id="5190" instrument_node="">Practical applications of synesthesia</span></h2><span data-dcnode-id="5188" instrument_node="">
</span><p data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">
The concept of synesthesia can be applied to various things. Artificial synesthesia
can be used for improving the usability of a user interface, or can even be used to
prevent IDN homograph attacks (a method of phishing that replaces the letter "e" in "ebay.com"
with its Cyrillic equivalent, for example, thus fooling the unsuspecting visitor into
revealing personal information to a fake site). This would work if all similar-looking letters were
colored differently; people would thus memorize the "color" of the URL as well as
the name, and would be suspicious of improperly colored URLs. The two downsides of this
is that it is difficult to standardize the colors, and it would drive us synesthetes
crazy since our colors would end up being different.
</span></p><span data-dcnode-id="5185" instrument_node="">
</span><h2 data-dcnode-id="5183" id="how_do_people_get_it"><span data-dcnode-id="5184" instrument_node="">How do people get it?</span></h2><span data-dcnode-id="5182" instrument_node="">
</span><p data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">
Apparently, synesthesia runs in families. Both of my parents report some sort of
synesthetic experiences – from a spatial number map to "seeing" different colors
of music. In my experience, some forms of it (like each number having a color) came
"naturally", while other forms (the number line being associated with a location)
have their roots in events that happened in my childhood.
</span></p><span data-dcnode-id="5179" instrument_node="">
</span><h2 data-dcnode-id="5177" id="synesthetes_unite"><span data-dcnode-id="5178" instrument_node="">Synesthetes unite!</span></h2><span data-dcnode-id="5176" instrument_node="">
</span><p data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">
Do you experience any form of synesthesia, or do you know someone who does? Please
state your experiences here... I would really like to know how others see things!
</span></p><span data-dcnode-id="5173" instrument_node="">
</span></div><span data-dcnode-id="5171" instrument_node=""> </span><span data-dcnode-id="5169" instrument_node="">

the color on the page, but others (like me) simply associate the colors later. I
see a black letter "A" in front of me, but I think the same thing that
I think when I see something I describe as "red".</span><br data-dcnode-id="5037"><br data-dcnode-id="5036"><span data-dcnode-id="5035" instrument_node="">As far as
remembering the sequence of events, it's some sort of recall in your brain. I'm
sure it has some term, but I'm a techie, not a psychologist, so I can't really
tell you what it's called.

		Has anyone ever heard of synesthesia that disappears? My boyfriend has only
within the past year addressed his synesthesia (although he has always known
about it), and it has within the last hour completely disappeared. He claims he
experienced an overwhelming headache and after it suddenly stopped, his colours
were gone. </span><br data-dcnode-id="4999"><span data-dcnode-id="4998" instrument_node="">He has been suffering from a swollen vein in his skull, induced
by stress. He is taking medication for this problem, including
anti-inflammatories and steroids. </span><br data-dcnode-id="4997"><span data-dcnode-id="4996" instrument_node="">He is completely destroyed, and my
heart's breaking for him. I don't know the name of his type of synesthesia, but
he sees colours when he hears sounds, and associates colours to certain
thoughts. My voice, for example, is light blue with gold in the middle, and
thoughts of me are the same colours. He has exceptional audio perception.</span><br data-dcnode-id="4995"><span data-dcnode-id="4994" instrument_node="">If anyone can offer information on why his synesthesia could have disappeared
and if he may ever get it back, please contact me. Thank you.
	</span></div><span data-dcnode-id="4992" instrument_node="">

</span><a class="commentjump" data-dcnode-id="4910" href="#comment_4c1d3fb79f7ce9765f2618b096a21c46" rel="nofollow"><span data-dcnode-id="4911" instrument_node="">@Concerned Girlfriend</span></a><span data-dcnode-id="4909" instrument_node=""> </span><br data-dcnode-id="4908"><span data-dcnode-id="4907" instrument_node="">I've had synesthesia for as long
as I can remember. I've "seen" sounds/music, voices and names have
colors, a few smells have a color, and if I'm in pain, everything is tinted
teal, and if I'm tickled, then bright flashes of light appear everywhere. A
little over a year ago, I suffered from a concussion and slowly lost my ability
to see names and voices. Lately, I've been dealing with the sudden and
unexpected death of my best friend. All traces of Synesthesia have disappeared.
Although you've probably figured out what's going on with your boyfriend,
because this was several months ago, I have no idea what's going on. If you have
any information, please share :) I feel empty and alone without my synesthesia.

numbers/letters. To me it just seemed so natural that their distinct
personalities would be color-coded. It wasn't until I went to college and wrote
an Oral Interpretation class paper about a classmate's voice that I began to
realize that experiencing voices as color/texture wasn't common. My fellow
classmates during discussion were polite, but as many others have described,
blank-faced when it came to understanding what I meant. Oh well, I enjoy it.

</span><div class="usercommenttext" data-dcnode-id="4194" id="commentbody_56f050fd7aa334cbfcc602118cf5b6b4"><span data-dcnode-id="4201" instrument_node="">
		I see months and time in color. Like 3:00 p.m is a crimson red, but 4:00 p.m is
like a pale icy blue. I only recently realized that not many people think this
way, and are often surprised when I tell them. They react the most to how
naturally I can tell them the color of the month or time they're asking me
because of how quickly I respond.</span><br data-dcnode-id="4200"><br data-dcnode-id="4199"><span data-dcnode-id="4198" instrument_node="">But I also see gradations of color.
Like the alphabet starts at "A", which in my mind starts as a pale
yellow. The middle of the alphabet, say "M", is like a rusty brown,
and the end of it, with "Z" comes to grayish blue. But no letter
really has a color. It more of a black letter against a background of color.
Numbers work the same way with the background of color as well as days of the
week. </span><br data-dcnode-id="4197"><br data-dcnode-id="4196"><span data-dcnode-id="4195" instrument_node="">I wonder what it all means!!

		I see people/personalities as colour associations.   I sometimes feel mildly
uncomfortable if a person wears a colour that isn't "them". I also see
letters, numbers, months, days of the week with colour associations.  I see
music as a pictograph, which has greatly helped in my ability to play music by

		I'm a 13 year old 7th grader, and I've know I was different since I was about
eight. Me and my mom were driving to the store and I just blurted out
"Don't you think 'A' is the prettiest because it's yellow?" All I got
was a blank stare. I guess she brushed it off until last year when she got me a
book called "A Mango Shaped Space" By Wendy Mass. I was about a girl
with synesthesia. After I read it I told her "Hey this is what I see
too!" and then we knew. I associate colors with letters, sounds, music,
months, words, names, shapes, weekdays, seasons, and lots more. And the four
seasons have distinct smells for me..also I can taste places (ex. I'll put an
apple slice in my mouth and say "This tastes like seattle.")...I
really love being a synesthete and I can't imagine my life without synesthesia.
	</span></div><span data-dcnode-id="3618" instrument_node="">

		hiya, i've only recently realised that seeing colours for different
letters/months/days and sometimes words is not something that everyone has and
is indeed a form of synesthesia (funnily enough i have known about this
condition for some time but hadn't realised that i have it). what i find strange
is that some letters/words' colours are very solid and don't change but others
are very 'fluid', if you will, and change too quickly for me to recognise a
colour. it feels as if i don't have the vocabulary to describe the colour or
rather feeling for these letters. also the more complex the time word (i'm not
sure what else to call but i mean days, months and years) the harder it is to
identify the colour. even though 'june' has less letters than 'friday' it has a
larger mass because it is a bigger time period than 'friday'. i'm just
wondering, if anyone else has the same experience as i do? 
	</span></div><span data-dcnode-id="3336" instrument_node="">

but I understand what you mean by a word having a "larger mass".</span><br data-dcnode-id="3293"><br data-dcnode-id="3292"><span data-dcnode-id="3291" instrument_node="">As for a vocabulary of colors, I am also unable to reproduce certain

because "colors" are concepts within the brain -- they exist
independently of the eye, and the brain simply associates certain input that
comes in through the eye with the concept of a color. It's quite possible to
experience colors that the eye can't see, at least in theory.

		I see colour when I hear sounds. Music can be particularly pleasant most of the
time. There are, however certain sounds that grate on my nerves like some
peoples voices, certain high pitched sounds, and if I am tired any sound will
stress me out. Also my housemates playing the radio and TV and talking all at
the same time really gets me wound up emotionally and I just want it all to
stop! At that point it is ALL noise, and really makes me exhausted and
anxious.</span><br data-dcnode-id="3068"><span data-dcnode-id="3067" instrument_node="">I usually like listening to music as I drift off to sleep, but
cymbals crashing and loud music of any sort makes me anxious,not relaxed. I see
these things in my whole field of vision, that is transparent mostly, so if the
sounds are persistant and irritating, I get stressed. Most of the time I really
enjoy live music performances, and some recorded music. But mostly recorded
music has an "electric" feel that tastes like metal, and so I can only
take so much of that. I love the sounds of Natures birds, crickets, etc much
more!
	</span></div><span data-dcnode-id="3065" instrument_node="">

And N is a dark, woody brown.</span><br data-dcnode-id="2736"><br data-dcnode-id="2735"><span data-dcnode-id="2734" instrument_node="">I'm not sure why, but when letters are

		I just read this and now I think I might have this.</span><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node="">Whenever i think of
numbers, I see a kind of line thing with all the numbers on it. My viewpoint
usually starts at zero and goes up to a hundred, but if the numbers are more or
less than that it changes. Its mostly in grayscale, with significant numbers,
like zero, five, ten etc and all the even numbers, which are all used more, in
darker shades than the other numbers. So ten, zero, five and one hundred are the
darkest. </span><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">Is this a form of synesthesia?</span><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node="">I also see months pretty much
the same way, with significant days (birthdays, start and end of month, school
holidays and christmas) all been darker, or more defined than the rest. </span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">The week is seen the same too, with Saturday and Sunday darkest, Monday
slightly darker than Tuesday, Wednesday the same as Monday, since its about the
middle, and Friday darker than Thursday. If there's something important on that
week, like no school, the days will be darker, but if its a birthday, it will
almost be white.</span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">Is this synesthesia?

		I see written names as a tone or impression, not individual letters but the
whole name. Kind of like a mood ring - there's a colour and an emotion attached.

means different things to me. It sounds bad, but some names give me a bad
feeling so I'll already judge that person before I meet them based on that
feeling. Like the name Simone - it's a cross between sky blue and ocean blue and
the line kind of jumps up at the beginning and plateau's at the end which gives

		I'm 52, and only learned of synesthesia a year ago!  Before I knew this was an
actual neurologically based condition, I always thought I associated numbers
with colors because of the time of year when I was learning them.  For example,
I thought 2 (red) and 3 (green) was taught to me in KDG. around Christmas.  6 is
pink and 8 is yellow, so I figured it was taught around Easter! LOL  I had no
explanation for 4 being brown and 5... black, or 7 being blue.  My daughter had
a psychology class last year and came home and told me about this.  Imagine my
surprise! LOL

		I'm 17 years old and I've had synesthesia as long as I can remember. I've played
the violin since I was 5 and have been really successful with it my whole life.
I've always always had a really good musical ear but I can't sight read worth
beans cause I play everything by the colors I hear. I didn't know I had
synesthesia until last year in my orchestra class my teacher was talking about
how some people see colors when they listen to music.. and I was sitting in my
class and said to him, "Well, doesn't everybody?" Soon I realaized
that I associate colors with music notes, letters, number, days, months,
people.. etc. It's sooo good to see that many others experience this!I feel sad
that most people don't. I've noticed though, when I actually focus on the colors
and try to determine them, they seem to disappear, but when I just go about
things as normal they are bright and clear. Does anyone else do this?
	</span></div><span data-dcnode-id="2424" instrument_node="">

		I, like others, have thought in this way for as long as I can remember. I didn't
have any info before as to why this was the case. And even now, I can't help to
consider that maybe the answer is more simple. Learning the alphabet as a child
for example, I would remember an alphabet line that would be above the
chalkboard. Each letter had a color and each letter would also be attached to a
word for spelling. Such as, A is for Apple...and a picture of a red apple would
be there. Numbers on a similar line would also be colored. Tastes and colors
relating to sounds or people may also just be related to memory.I had two wooden
"little people"(toys of the 70s) and the mom was blue with blond hair
and looked like my mom. Now, I think of my mom being blue and most blonds from a
distance as having blue in them. All to say, that the source may be more from
memory of things whose colors we remember...?

first started noticing, in the sixth grade, it was because a friend had read a
mango shaped space by wendy mass, and told me about it. i was confused, but i
giess that was when i finally opened my eye to synesthesia. im fourteen now, and
for a while ive thought tht my case of synesthesia was just wishful thinking.
but ive taken a few online tests, and ive started to wonder. like, how could i
be making up my synesthesia if the colors i associate with numbers and letyers
never change? even when i think, oh, the letter n woul look so pretty as purple,
or o would make a nice red, it doesnt change anything tht in my head i still see
n as brown, and o as electric blue. also, when i see these letters in different
colors, ibsometimes get headaches. another little bit of broof is that i
sometimes subconciously use the colors and letters to memorize dates for
history. but here's the real bit of proof, some memories tht i only recently
remembered: when i was younger, i thought the color maroon was a silvery purple
gray, like the color of storm clouds, and that scarlet was a deep purply red,
like grape juice. this is because those are the colors the words are, and the
letters in them. i was so supriesed when i learned maroon and scarlet were both
shades of red! so anyway, im so glad my synesthesia is real, not just something
i made up or got from a book, and its just so amazing that i wish everyone could
experience it at least once in their lives.

		I'm not sure if I actually have synesthesia, but I think I might.  When I read,
the words are simply black and white (or whatever color the font is supposed to
be).  But when I THINK about letters and numbers, I associate them with specific
colors.  For example, the letter "b" is a bright medium-blue, and the
number "8" is a sort of rich plum-color.  If I don't physically see
them this way, is it still considered synesthesia?</span><br data-dcnode-id="2042"><br data-dcnode-id="2041"><span data-dcnode-id="2040" instrument_node="">My younger sister
claims that she experiences similar thoughts about colors.  Not every
number/letter is the same for us, though; we occasionally get into these
ridiculous debates about, say, whether 7 is yellow or green.  She actually has
ideas about the relationships between numbers (apparently, 1 and 2 are married),
but I've never imagined about them this way.</span><br data-dcnode-id="2039"><br data-dcnode-id="2038"><span data-dcnode-id="2037" instrument_node="">Additionally, I have a
few other questions:</span><br data-dcnode-id="2036"><span data-dcnode-id="2035" instrument_node="">1.) A rather large percentage of my numbers and
letters are associated with a sort of sunny yellow color (I can think of c, d,
f, n, y, 4, and 7 off the top of my head).  The exact shade can vary a bit, but
they're all very similar.  Is this strange?</span><br data-dcnode-id="2034"><br data-dcnode-id="2033"><span data-dcnode-id="2032" instrument_node="">2.) Some letters and
numbers can be colored differently, depending on when I'm thinking about them or
how they're being used.  Like, "x" can be either red or black.  And
certain capital letters are not the same colors as their lowercase counterparts.
 Does anyone else experience this?</span><br data-dcnode-id="2031"><br data-dcnode-id="2030"><span data-dcnode-id="2029" instrument_node="">3.) Sometimes, I mix up colors and
letters (more so than colors and numbers).  Like, I'll think to myself,
"oh, this word is distinctly 'i'-colored", and then I'll realize that
"i" is not actually a color.  To me, "i" is bubblegum pink,
but it's so clearly, overwhelmingly pink that the respective concepts of the
color and the letter are almost synonymous in my mind.  Does this seem
normal?</span><br data-dcnode-id="2028"><br data-dcnode-id="2027"><span data-dcnode-id="2026" instrument_node="">So, yeah, if anyone can give me commentary on this, I will be
enormously grateful.  Thanks in advance!
	</span></div><span data-dcnode-id="2024" instrument_node="">

		In general, I go through my day ignoring the sounds and colors that are
triggered by life. Some colors though, like yellow and pink, are so loud that
even a little will make my ears hurt. Yellow is like someone blowing a whistle,
and pink is like someone scratching on glass. Autumn is the time when I get my
worst migraines. I play trombone, and it's a distinct navy blue mist. Tubas are
purple, and flutes are yellow. I actually switched from flute to trombone as a
child when the bright yellow gave me headaches. Not just music, but noise has
colors. My vacuum is distinctly orange, sirens are red and red sounds like a
siren, and windchimes are like little silver confetti in the breeze. Recently I
saw the online video for motion-sound synesthesia, and I had to ask my husband
if the video really was silent. It's not something I consciously noticed before,
since sometimes what I hear-hear and what I see-hear mixes up, so now I'm paying
more attention to the "motion-sound" portion that is the soundtrack of
my life.
	</span></div><span data-dcnode-id="1820" instrument_node="">

get the less you have. I would recommend reading "Mango Shaped Cat".
It is a very simple read and interesting. </span><br data-dcnode-id="1456"><span data-dcnode-id="1455" instrument_node="">One question I do have is I tend

usually Green, Blue, and White. I hate White. It is in the way and usually there
when I don't want it.

		I see people as colors. Almost like as if they had an "aura" my sister
in law is yellow. I don't know my own color...but my husband blue, my brother
blue, my son orange, my daughter brown. I also see music notes as levels and
colors. They lengthen and widen with the value of each. I think it actually
makes it more difficult to read actual notes on a page. Numbers/letters gave
color. Words have colors. I've also noticed outside color/light changes after
storms or changes in season and around solstice times. It's either
brighter/bluer/whiter/yellower light depending on atmospheric changes. I always
thought I was crazy. Smell is also very sensitive. I remember whole
conversations and feelings when presented with certain smells.

		My ten year old daughter has been having headaches for several years and they
have recently become frequent.  I took her to her pediatrician and she
recommended an eye exam. The optometrist cleared her with 20/13 vision.  My next
step was an appt. with a neurologist, Sept. 2013.  Yesterday we were having
dinner and she asked me what color I thought the number two was.....I didn't
quite understand what she was talking about and she continued to say, "I
see number two as the color red, and number one as green."  I explained
that I don't think of colors when I hear numbers and she said, "nevermind,
you don't get it." I immediately started reading about synesthesia and it
said that 57% of people that have it think of the color brown with the letter
"d".  I asked her about "d" and she said brown and I about
fell out!  I continued to read that many people who have synesthesia suffer from
frequent migraines.....I'm thinking I may be onto something.  I called my oldest
daughter and she said, "mom, I do that too, only I also think of color with
days of the week and months of the year, you don't?"  So....I called their
father and he said, he has always associated numbers and letters with color and
has always suffered with migraines............Gee whiz!!! We have an appt. to
see her neurologist next month and I am hoping that he takes this into
consideration.  Has anyone else experienced frequent headaches??????  Thanks in
advance for any input!</span><br data-dcnode-id="951"><br data-dcnode-id="950"><span data-dcnode-id="949" instrument_node="">Jami

		I have spacial location synesthesia, as well as associating numbers and letters
(mostly letters) with colors. Names as well, although I also associate those
with shapes.  With a little bit of concentration, I can determine the color of
someone's voice, although it doesn't happen automatically. I can also taste some
things with different songs. Most months have a color, as do the days. Music is
harder; I need to concentrate for a minute in order to be able to see all the
different colors, but sometimes it's all going to fast and I can't pinpoint any
one color. Shapes I can do. I also "hear" music when I look at certain
paintings, mostly abstract art. For example, I look at this one painting, and I
think "classical music."</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">But I have a question: I don't
physically see, or hear, any of this, just in my mind's eye. Except for the
taste. I actually do taste that. Mostly, it's just like, I look at the color
someone wrote their name and think, that color's wrong, or when they talk, I
wince because their voice is, like, puke green. Little stuff like that. But I'm
wondering if any people on this actually see, physically, anything, or if it's
more of an impression in their mind, like me.Please help!
	</span></div><span data-dcnode-id="762" instrument_node="">

		I just found your website and was hoping to get some feedback. I guess I'm checking to see if I fall into your category.

I am a grandmother, and I just recently told the 2nd and 3rd persons in my life about my "colors".  It is only associated with people and they don't have to be with me.  The colors usually come with a picture of something that indicates to me what it means, because the color does not always mean the same thing. I get it a lot with people I meet for the first time.   I introduced my daughter and her now husband because when I met him I got an overwhelming "yellow" and "good" - to me yellow meant sunshine.  The used car salesman however gave me "yellow and black" - meaning yellow jacket bee.  I did not buy a car from him.   Another one was when my daughter was several hundred miles away on a trip when she "popped" into my head, along with gray storm clouds.  After trying to ignore this for 30 minutes I called her and she was in the first aid station.

Let me know what you think and thank you for any input.

		I think I might have synesthesia, but I’m not sure. I had recently read an article about a girl who had synesthesia, but didn’t even realize it because they were never paying attention. I tried listening to music, and I saw colors and shapes in my minds eye. And if I picture letters they’re colored, but don’t look it on paper. After reading a couple more articles, I started noticing other things I’ll do that seem similar to synesthesia. If I look at a certain color it can remind me of a memory, and the whole thing will play out in my mind like a movie. If I focus, other sounds will have colors too. One of my teachers voices is lilac, my best friend is green, and my moms is yellow. I’ll associate the color of their voice with them too. And if I picture their name, it will be colored, and each one will have a different font. (ex My friend who’s green, her name is green with yellow dots, is sort of bubbly, and floats around, similar to a flag). Do I have synesthesia and just don’t experience it in front of me?
