</span><span class="views-field views-field-nothing" data-dcnode-id="811"><span data-dcnode-id="823" instrument_node=""> </span><span class="field-content" data-dcnode-id="813"><p data-dcnode-id="814"><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Anatomy:</span></strong><span data-dcnode-id="820" instrument_node=""> parts of the body and how they fit and work together......</span><a data-dcnode-id="815" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Anatomy"><span data-dcnode-id="819" instrument_node="">more</span><span class="ext" data-dcnode-id="816"><span class="element-invisible" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">(link is external)</span></span></span></a></p></span><span data-dcnode-id="812" instrument_node=""> </span></span><span data-dcnode-id="810" instrument_node=""> </span></div><span data-dcnode-id="808" instrument_node="">

</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="712"><div class="field-items" data-dcnode-id="713"><div class="field-item even" data-dcnode-id="714"><h2 data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Study Like an Egyptian</span></h2><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Ancient Egypt gets a lot of credit for having advanced knowledge about the human body in around 2800 BC. That’s almost 5,000 years ago! Most ancient biologists studied medicine and anatomy (the structure of the human body). Those subjects helped them keep people alive. Egyptians also used anatomy to deal with death.</span></p><span data-dcnode-id="786" instrument_node="">
</span><div data-dcnode-id="715"><span data-dcnode-id="785" instrument_node="">
</span><div class="caption caption-right mceTemp draggable panopoly-images-processed" data-dcnode-id="773" style="width: 258px;"><span data-dcnode-id="784" instrument_node="">
</span><div class="caption-width-container" data-dcnode-id="775" style="width: 250px;"><span data-dcnode-id="783" instrument_node="">
</span><div class="caption-inner" data-dcnode-id="777" style="width: 250px;"><img alt="Egyptians embalming drawing" class="caption" data-dcnode-id="782" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//askabiologist.asu.edu/sites/default/files/resources/articles/history_biology/Egyptian-embalming-250.jpg&amp;raw" style="float: right;" width="250"><span data-dcnode-id="781" instrument_node="">
</span><p class="caption-text" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Egyptians learned a lot about the human body to better prepare the dead for burial.</span></p><span data-dcnode-id="778" instrument_node="">
</span></div><span data-dcnode-id="776" instrument_node="">
</span></div><span data-dcnode-id="774" instrument_node="">
</span></div><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The people who prepared bodies for being buried were called embalmers. They had to know a lot about the human body to do their jobs. They had to know where organs like hearts and lungs were so they could take them out. They even knew how to pull brain tissue out of the skull through the nose.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Thankfully, Egyptian biologists also knew how to help people when they were still alive. Their medicine helped people stay alive. They used plants, especially herbs, to treat common problems like fevers or pain.</span></p><span data-dcnode-id="766" instrument_node="">
</span><div data-dcnode-id="727"><span data-dcnode-id="765" instrument_node="">
</span><h2 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Greeks Go for Biology</span></h2><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="761" instrument_node="">Egyptians and many other ancient people knew plenty about plants and animals (including humans). But it was the Greeks who coined the term </span><em data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">biology. </span></em><span data-dcnode-id="758" instrument_node="">They smushed together two Greek roots to make the word. </span><em data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Bio-</span></em><span data-dcnode-id="755" instrument_node=""> means “life” and </span><em data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">–ology­ </span></em><span data-dcnode-id="752" instrument_node="">means “study of.” So </span><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">biology</span></em><span data-dcnode-id="749" instrument_node=""> means the study of life, or&nbsp;all the things that have to do with living things&nbsp;and how they work.</span></p><span data-dcnode-id="747" instrument_node="">
</span><div class="caption caption-left mceTemp draggable panopoly-images-processed" data-dcnode-id="735" style="width: 258px;"><span data-dcnode-id="746" instrument_node="">
</span><div class="caption-width-container" data-dcnode-id="737" style="width: 250px;"><span data-dcnode-id="745" instrument_node="">
</span><div class="caption-inner" data-dcnode-id="739"><img alt="Greco-Roman surgical tools" class="caption" data-dcnode-id="744" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//askabiologist.asu.edu/sites/default/files/resources/articles/history_biology/graeco-roman-surgical-tools-250.jpg&amp;raw" style="float: left;" width="250"><span data-dcnode-id="743" instrument_node="">
</span><p class="caption-text" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Tools like these were used by the Greeks to perform surgery. Their understanding of biology was already fairly well advanced when they created the term "biology." Image by WellcomeTrust.</span></p><span data-dcnode-id="740" instrument_node="">
</span></div><span data-dcnode-id="738" instrument_node="">
</span></div><span data-dcnode-id="736" instrument_node="">
</span></div><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">The Greeks spent a lot of time studying medicine. When the Roman Empire conquered them in 146 BCE, the Greeks had a system that explained how people got sick. Though their system was not correct, it was a large step forward in biology.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Aristotle lived around 350 BC and is well known for advancing science, including biology. Before him, no one focused much on studying animals. When Aristotle realized some animals had similar anatomy, he began separating them into groups, such as vertebrates and&nbsp;invertebrates. He eventually classified around 500 species. Aristotle also made many observations about animal physiology and behavior.</span></p><span data-dcnode-id="728" instrument_node="">
</span></div><span data-dcnode-id="726" instrument_node="">
</span><div data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Unfortunately, after the fall of Rome in 476 AD, Europe fell into the Early Middle Ages, also called the Dark Ages. This time period lasted until around the 1400s. Much of the knowledge of ancient biology was forgotten. Very little new work went on in any of the sciences, biology included. It was a few hundred years before biology got going again.&nbsp;</span></div><span data-dcnode-id="723" instrument_node="">
</span><div data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">&nbsp;</span></div><span data-dcnode-id="720" instrument_node="">
</span><div data-dcnode-id="717"><hr data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">Additional images via Wikimedia Commons. Human mummy modified from image by jalvear.</span></div><span data-dcnode-id="716" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="711" instrument_node=""> </span></div><span data-dcnode-id="709" instrument_node="">
