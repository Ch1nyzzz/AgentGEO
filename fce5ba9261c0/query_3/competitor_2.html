</span><div class="post-337 post type-post status-publish format-standard hentry category-evolution" data-dcnode-id="8456"><span data-dcnode-id="8474" instrument_node="">
</span><h2 data-dcnode-id="8472"><span data-dcnode-id="8473" instrument_node="">A New Theory of Evolution</span></h2><span data-dcnode-id="8471" instrument_node="">
</span><div class="article-meta" data-dcnode-id="8458"><span data-dcnode-id="8470" instrument_node="">
</span><p data-dcnode-id="8468" style="font-size:smaller;"><span data-dcnode-id="8469" instrument_node="">Posted: April 14, 2016</span></p><span data-dcnode-id="8467" instrument_node="">
</span><p data-dcnode-id="8460"><span data-dcnode-id="8466" instrument_node="">
</span><span data-dcnode-id="8464" instrument_node="">
</span><a data-dcnode-id="8462" href="#comments"><span data-dcnode-id="8463" instrument_node="">419 Comments</span></a><span data-dcnode-id="8461" instrument_node=""> </span></p><span data-dcnode-id="8459" instrument_node="">
</span></div><span data-dcnode-id="8457" instrument_node=""> </span></div><span data-dcnode-id="8455" instrument_node="">
</span><div class="entry" data-dcnode-id="7407"><span data-dcnode-id="8454" instrument_node="">
</span><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="8437"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="8438"><div class="sd-content" data-dcnode-id="8439"><ul data-dcnode-id="8440" data-sharing-events-added="true"><li class="share-facebook" data-dcnode-id="8450"><a class="share-facebook sd-button share-icon" data-dcnode-id="8451" data-shared="sharing-facebook-337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evo2.org/new-theory-of-evolution/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="8452"><span data-dcnode-id="8453" instrument_node="">Facebook</span></span></a></li><li class="share-twitter" data-dcnode-id="8446"><a class="share-twitter sd-button share-icon" data-dcnode-id="8447" data-shared="sharing-twitter-337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evo2.org/new-theory-of-evolution/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="8448"><span data-dcnode-id="8449" instrument_node="">Twitter</span></span></a></li><li class="share-email share-service-visible" data-dcnode-id="8442"><a class="share-email sd-button share-icon" data-dcnode-id="8443" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evo2.org/new-theory-of-evolution/%3Fshare%3Demail%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to email this to a friend"><span data-dcnode-id="8444"><span data-dcnode-id="8445" instrument_node="">Email</span></span></a></li><li class="share-end" data-dcnode-id="8441"></li></ul></div></div></div><p data-dcnode-id="8435"><span data-dcnode-id="8436" instrument_node="">I invite you to consider…</span></p><span data-dcnode-id="8434" instrument_node="">
</span><p data-dcnode-id="8426"><strong data-dcnode-id="8429"><span data-dcnode-id="8433" instrument_node="">What if evolution were true, but it wasn’t quite like Darwin said?</span><img alt="charles_darwin_vegan_soldier_c" class="alignright size-full wp-image-4749" data-dcnode-id="8432" height="319" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evo2.org/wp-content/uploads/2016/04/charles_darwin_vegan_soldier_c.jpg&amp;raw" srcset="https://evo2.org/wp-content/uploads/2016/04/charles_darwin_vegan_soldier_c.jpg 400w, https://evo2.org/wp-content/uploads/2016/04/charles_darwin_vegan_soldier_c-300x239.jpg 300w" width="400"><br data-dcnode-id="8431"><span data-dcnode-id="8430" instrument_node="">
</span></strong><br data-dcnode-id="8428"><span data-dcnode-id="8427" instrument_node="">
What if there were a new evolutionary model that could explain why fossils show almost no change for millions of years…. then suddenly the Cambrian Explosion: Thousands of new species emerge intact, virtually overnight.</span></p><span data-dcnode-id="8425" instrument_node="">
</span><p data-dcnode-id="8423"><span data-dcnode-id="8424" instrument_node="">What if this new theory pointed the way to new innovations in artificial intelligence and adaptive computer programs?</span></p><span data-dcnode-id="8422" instrument_node="">
</span><p data-dcnode-id="8420"><span data-dcnode-id="8421" instrument_node="">What if “Evolution vs. Design” wasn’t an either/or proposition – but both+and?</span></p><span data-dcnode-id="8419" instrument_node="">
</span><p data-dcnode-id="8417"><span data-dcnode-id="8418" instrument_node="">What if, instead of arguing endlessly about fossils, we could precisely track evolutionary history with the precision of 1’s and 0’s?</span></p><span data-dcnode-id="8416" instrument_node="">
</span><p data-dcnode-id="8414"><span data-dcnode-id="8415" id="more-337"></span></p><span data-dcnode-id="8413" instrument_node="">
</span><p data-dcnode-id="8411"><span data-dcnode-id="8412" instrument_node="">What if science and faith were no longer at war?</span></p><span data-dcnode-id="8410" instrument_node="">
</span><p data-dcnode-id="8407"><strong data-dcnode-id="8408"><span data-dcnode-id="8409" instrument_node="">All these things are not only possible, but a present reality.</span></strong></p><span data-dcnode-id="8406" instrument_node="">
</span><p data-dcnode-id="8404"><span data-dcnode-id="8405" instrument_node="">I know that’s a pretty bold statement. But by now you’re probably used to that from me. Once again I invite you to relax, hear what I have to say, and consider the information that is presented. See if this makes sense for you.</span></p><span data-dcnode-id="8403" instrument_node="">
</span><p data-dcnode-id="8400"><strong data-dcnode-id="8401"><span data-dcnode-id="8402" instrument_node="">I really do have a new theory of evolution.</span></strong></p><span data-dcnode-id="8399" instrument_node="">
</span><p data-dcnode-id="8397"><span data-dcnode-id="8398" instrument_node="">Not only that, in future installments I will use this new theory of evolution to make predictions about what we will discover in the next 3-20 years.</span></p><span data-dcnode-id="8396" instrument_node="">
</span><p data-dcnode-id="8394"><span data-dcnode-id="8395" instrument_node="">And: after today, you may never think about this question the same way again.</span></p><span data-dcnode-id="8393" instrument_node="">
</span><p data-dcnode-id="8391"><span data-dcnode-id="8392" instrument_node="">Darwin predicted that the fossil record would show a gradual and steady progression from simple to complex forms of life. It’s now well known that what we see instead is long periods of stability interrupted by sudden leaps forward.</span></p><span data-dcnode-id="8390" instrument_node="">
</span><p data-dcnode-id="8388"><span data-dcnode-id="8389" instrument_node="">Stephen Jay Gould called this “punctuated equilibrium.” He was at a loss to explain exactly how this worked at the time. But today we have many clues pointing to the answer.</span></p><span data-dcnode-id="8387" instrument_node="">
</span><p data-dcnode-id="8384"><strong data-dcnode-id="8385"><span data-dcnode-id="8386" instrument_node="">Darwin said that evolution is driven by random variation combined with natural selection.</span></strong></p><span data-dcnode-id="8383" instrument_node="">
</span><p data-dcnode-id="8381"><span data-dcnode-id="8382" instrument_node="">Today I invite you to consider:</span></p><span data-dcnode-id="8380" instrument_node="">
</span><p data-dcnode-id="8377"><strong data-dcnode-id="8378"><span data-dcnode-id="8379" instrument_node="">Darwin was half right.</span></strong></p><span data-dcnode-id="8376" instrument_node="">
</span><p data-dcnode-id="8373"><strong data-dcnode-id="8374"><span data-dcnode-id="8375" instrument_node="">And Darwin was half wrong.</span></strong></p><span data-dcnode-id="8372" instrument_node="">
</span><p data-dcnode-id="8370"><span data-dcnode-id="8371" instrument_node="">Darwin was definitely right about natural selection.</span></p><span data-dcnode-id="8369" instrument_node="">
</span><p data-dcnode-id="8367"><span data-dcnode-id="8368" instrument_node="">To be fair, being right about that is no Nobel Prize winning accomplishment. The weaklings die and the strong survive. I think our cave man ancestors were familiar with that one.</span></p><span data-dcnode-id="8366" instrument_node="">
</span><p data-dcnode-id="8364"><span data-dcnode-id="8365" instrument_node="">(Rog hits Grog over the head with a rock and kills him, then they both get eaten by a hungry tiger. Survival of the fittest… nothing profound about that.)</span></p><span data-dcnode-id="8363" instrument_node="">
</span><p data-dcnode-id="8361"><span data-dcnode-id="8362" instrument_node="">Seriously, natural selection does not have any kind of creative power at all. All it does is kill of the runts.</span></p><span data-dcnode-id="8360" instrument_node="">
</span><p data-dcnode-id="8357"><strong data-dcnode-id="8358"><span data-dcnode-id="8359" instrument_node="">The secret to evolution, then, has to be in the “random variation” part.</span></strong></p><span data-dcnode-id="8356" instrument_node="">
</span><p data-dcnode-id="8354"><span data-dcnode-id="8355" instrument_node="">Darwin, in his time, believed that random variation in heredity produced all manner of species. He said: most of the time it’s harmful, but occasionally it’s helpful and from these variations come all kinds of beautiful forms that appear to be designed.</span></p><span data-dcnode-id="8353" instrument_node="">
</span><p data-dcnode-id="8351"><span data-dcnode-id="8352" instrument_node="">What is meant by “random variation”?</span></p><span data-dcnode-id="8350" instrument_node="">
</span><p data-dcnode-id="8348"><span data-dcnode-id="8349" instrument_node="">Thousands of biology books say it’s accidental copying errors in DNA.</span></p><span data-dcnode-id="8347" instrument_node="">
</span><p data-dcnode-id="8345"><span data-dcnode-id="8346" instrument_node="">They say, essentially, that it’s corrupted data that occasionally turns out to be beneficial instead of harmful.</span></p><span data-dcnode-id="8344" instrument_node="">
</span><p data-dcnode-id="8342"><span data-dcnode-id="8343" instrument_node="">This is where Darwin and the biology books were wrong.</span></p><span data-dcnode-id="8341" instrument_node="">
</span><p data-dcnode-id="8339"><span data-dcnode-id="8340" instrument_node="">As a communication engineer I know – with 100.000000000% certainty – that this is impossible.</span></p><span data-dcnode-id="8338" instrument_node="">
</span><p data-dcnode-id="8336"><span data-dcnode-id="8337" instrument_node="">Nowhere in the vast field of engineering is there any such thing as “the percentage of the time that corrupted data is helpful instead of harmful.”</span></p><span data-dcnode-id="8335" instrument_node="">
</span><p data-dcnode-id="8333"><span data-dcnode-id="8334" instrument_node="">It’s ALWAYS harmful. Always. Copying errors and data transmission errors never help the signal. They only hurt it.</span></p><span data-dcnode-id="8332" instrument_node="">
</span><p data-dcnode-id="8330"><span data-dcnode-id="8331" instrument_node="">Now please do not misunderstand me:</span></p><span data-dcnode-id="8329" instrument_node="">
</span><p data-dcnode-id="8327"><span data-dcnode-id="8328" instrument_node="">I AM *NOT* SAYING EVOLUTION DID NOT OR DOES NOT HAPPEN.</span></p><span data-dcnode-id="8326" instrument_node="">
</span><p data-dcnode-id="8319"><span data-dcnode-id="8325" instrument_node="">Nope…. I’m suggesting: Evolution just happens a different way than Darwin said. Way different than you were told.</span><br data-dcnode-id="8324"><span data-dcnode-id="8323" instrument_node="">
</span><strong data-dcnode-id="8320"><br data-dcnode-id="8322"><span data-dcnode-id="8321" instrument_node="">
I’ll get to the details of that in a minute. First I need to explain why randomness only destroys information.</span></strong></p><span data-dcnode-id="8318" instrument_node="">

"><svg data-dcnode-id="7834" height="100%" version="1.1" viewbox="0 0 36 36" width="100%"><use class="ytp-svg-shadow" data-dcnode-id="7836" href="#ytp-id-21"><path d="M27,9 L9,9 C7.9,9 7,9.9 7,11 L7,14 L9,14 L9,11 L27,11 L27,25 L20,25 L20,27 L27,27 C28.1,27 29,26.1 29,25 L29,11 C29,9.9 28.1,9 27,9 L27,9 Z M7,24 L7,27 L10,27 C10,25.34 8.66,24 7,24 L7,24 Z M7,20 L7,22 C9.76,22 12,24.24 12,27 L14,27 C14,23.13 10.87,20 7,20 L7,20 Z M7,16 L7,18 C11.97,18 16,22.03 16,27 L18,27 C18,20.92 13.07,16 7,16 L7,16 Z" data-dcnode-id="7837" fill="#fff" id="ytp-id-21"></path></use><path d="M27,9 L9,9 C7.9,9 7,9.9 7,11 L7,14 L9,14 L9,11 L27,11 L27,25 L20,25 L20,27 L27,27 C28.1,27 29,26.1 29,25 L29,11 C29,9.9 28.1,9 27,9 L27,9 Z M7,24 L7,27 L10,27 C10,25.34 8.66,24 7,24 L7,24 Z M7,20 L7,22 C9.76,22 12,24.24 12,27 L14,27 C14,23.13 10.87,20 7,20 L7,20 Z M7,16 L7,18 C11.97,18 16,22.03 16,27 L18,27 C18,20.92 13.07,16 7,16 L7,16 Z" data-dcnode-id="7835" fill="#fff" id="ytp-id-21"></path></svg></button><button class="ytp-fullscreen-button ytp-button" data-dcnode-id="7815" title="Full screen (f)"><svg data-dcnode-id="7816" height="100%" version="1.1" viewbox="0 0 36 36" width="100%"><g class="ytp-fullscreen-button-corner-0" data-dcnode-id="7829"><use class="ytp-svg-shadow" data-dcnode-id="7831" href="#ytp-id-6"><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="7832" id="ytp-id-6"></path></use><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="7830" id="ytp-id-6"></path></g><g class="ytp-fullscreen-button-corner-1" data-dcnode-id="7825"><use class="ytp-svg-shadow" data-dcnode-id="7827" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="7828" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="7826" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="7821"><use class="ytp-svg-shadow" data-dcnode-id="7823" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="7824" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="7822" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="7817"><use class="ytp-svg-shadow" data-dcnode-id="7819" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="7820" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="7818" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="7804"><span data-dcnode-id="7805" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=Lz9kHHtqjMI" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="7798" instrument_node="">
</span><p data-dcnode-id="7790"><strong data-dcnode-id="7795"><span data-dcnode-id="7796" style="font-size: small;"><span data-dcnode-id="7797" instrument_node="">Evolution Through the Lens of Information Theory: Random Mutations and Noise</span></span></strong><br data-dcnode-id="7794"><span data-dcnode-id="7793" instrument_node="">
</span><a data-dcnode-id="7791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/user/CosmicFingerprints/videos%3Fsort%3Ddd%26view%3D0%26flow%3Dgrid"><span data-dcnode-id="7792" instrument_node="">More Videos Here</span></a></p><span data-dcnode-id="7789" instrument_node="">
</span><p data-dcnode-id="7787"><span data-dcnode-id="7788" instrument_node="">If we start with the sentence</span></p><span data-dcnode-id="7786" instrument_node="">
</span><p data-dcnode-id="7784" style="text-align: center;"><span data-dcnode-id="7785" instrument_node="">“The quick brown fox jumped over the lazy dog”</span></p><span data-dcnode-id="7783" instrument_node="">
</span><p data-dcnode-id="7781"><span data-dcnode-id="7782" instrument_node="">And randomly mutate the letters, we get sentences that look like this:</span></p><span data-dcnode-id="7780" instrument_node="">
</span><p data-dcnode-id="7770" style="padding-left: 30px;"><span data-dcnode-id="7779" instrument_node="">The 6uHck brown fox jukped over the lazyHdog</span><br data-dcnode-id="7778"><span data-dcnode-id="7777" instrument_node="">
Tze quick bro0n foL juXped over the lazy doF</span><br data-dcnode-id="7776"><span data-dcnode-id="7775" instrument_node="">
Tae quick browY fox jumped oGer tgePlazy dog</span><br data-dcnode-id="7774"><span data-dcnode-id="7773" instrument_node="">
The iuick brown fox jumped lver the lazy dog</span><br data-dcnode-id="7772"><span data-dcnode-id="7771" instrument_node="">
The quiikQbKowSwfox .umped oveh the lazy dog</span></p><span data-dcnode-id="7769" instrument_node="">
</span><p data-dcnode-id="7764"><span data-dcnode-id="7768" instrument_node="">You can apply all the natural selection to this in the world and you’ll never accomplish anything besides destroying a perfectly good sentence. You can go to </span><a data-dcnode-id="7766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.randommutation.com/"><span data-dcnode-id="7767" instrument_node="">www.RandomMutation.com</span></a><span data-dcnode-id="7765" instrument_node=""> and try for yourself.</span></p><span data-dcnode-id="7763" instrument_node="">
</span><p data-dcnode-id="7761"><span data-dcnode-id="7762" instrument_node="">Why doesn’t this work?</span></p><span data-dcnode-id="7760" instrument_node="">
</span><p data-dcnode-id="7758"><span data-dcnode-id="7759" instrument_node="">Because it’s impossible to evolve a sentence one letter at a time – even if you deliberately TRY.</span></p><span data-dcnode-id="7757" instrument_node="">
</span><p data-dcnode-id="7755"><span data-dcnode-id="7756" instrument_node="">Technically, this is because random mutation is noise and noise *always* destroys a signal. Claude Shannon called it information entropy. Entropy is not reversible. Noise never improves a signal. It only mucks it up.</span></p><span data-dcnode-id="7754" instrument_node="">
</span><p data-dcnode-id="7748"><strong data-dcnode-id="7751"><br data-dcnode-id="7753"><span data-dcnode-id="7752" instrument_node="">
The only way for this to work is:</span></strong><strong data-dcnode-id="7749"><span data-dcnode-id="7750" instrument_node=""> Evolution has to follow the rules of language. </span></strong></p><span data-dcnode-id="7747" instrument_node="">
</span><p data-dcnode-id="7745"><span data-dcnode-id="7746" instrument_node="">So…. successful evolution for this short sentence would look something like this:</span></p><span data-dcnode-id="7744" instrument_node="">
</span><p data-dcnode-id="7734" style="padding-left: 30px;"><span data-dcnode-id="7743" instrument_node="">The fast brown fox jumped over the slothful dog.</span><br data-dcnode-id="7742"><span data-dcnode-id="7741" instrument_node="">
The dark brown fox jumped over the light brown dog.</span><br data-dcnode-id="7740"><span data-dcnode-id="7739" instrument_node="">
The big brown fox leaped over the lazy dog.</span><br data-dcnode-id="7738"><span data-dcnode-id="7737" instrument_node="">
The quick black fox sped past the sleeping dog.</span><br data-dcnode-id="7736"><span data-dcnode-id="7735" instrument_node="">
The hot blonde fox sauntered past the sunbathing man.</span></p><span data-dcnode-id="7733" instrument_node="">
</span><p data-dcnode-id="7731"><span data-dcnode-id="7732" instrument_node="">In English, successful evolution requires precise substitution of verbs and nouns and following the rules of speech.</span></p><span data-dcnode-id="7730" instrument_node="">
</span><p data-dcnode-id="7728"><span data-dcnode-id="7729" instrument_node="">DNA is no different. DNA has its own language. In fact thousands of linguists have made huge contributions to the Human Genome project by helping to decode the layers of the genetic code. Dozens of linguistic books describe the eerie similarity between DNA and human language.</span></p><span data-dcnode-id="7727" instrument_node="">
</span><p data-dcnode-id="7723" style="text-align: center;"><span data-dcnode-id="7724" style="font-size: medium;"><strong data-dcnode-id="7725"><span data-dcnode-id="7726" instrument_node="">NEW THEORY OF EVOLUTION:</span></strong></span></p><span data-dcnode-id="7722" instrument_node="">
</span><p data-dcnode-id="7718" style="text-align: center;"><span data-dcnode-id="7719" style="font-size: medium;"><strong data-dcnode-id="7720"><span data-dcnode-id="7721" instrument_node="">There is a mutation algorithm that makes intelligent substitutions when species need to adapt to their environment.</span></strong></span></p><span data-dcnode-id="7717" instrument_node="">
</span><p data-dcnode-id="7715"><span data-dcnode-id="7716" instrument_node="">It works very much like the sentences I just showed you. DNA actually re-arranges itself like a computer program that rewrites itself on the fly.</span></p><span data-dcnode-id="7714" instrument_node="">
</span><p data-dcnode-id="7712"><span data-dcnode-id="7713" instrument_node="">Now here’s the kicker:</span></p><span data-dcnode-id="7711" instrument_node="">
</span><p data-dcnode-id="7705"><span data-dcnode-id="7706" style="font-size: medium;"><strong data-dcnode-id="7707"><em data-dcnode-id="7709"><span data-dcnode-id="7710" instrument_node="">This is not new.</span></em><span data-dcnode-id="7708" instrument_node=""> It’s actually more than 60 years old! </span></strong></span></p><span data-dcnode-id="7704" instrument_node="">
</span><p data-dcnode-id="7667"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="7668" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/ekrO_9KhL5o&amp;raw" width="420"><html data-cast-api-enabled="true" data-dcnode-id="7670" dir="ltr" lang="en"><head data-dcnode-id="7679"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="7700" name="viewport"/><link data-dcnode-id="7695" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="D5h2nWJdCPyWy6hs0rlaZA" rel="stylesheet"/><title data-dcnode-id="7682">YouTube</title><link data-dcnode-id="7681" href="https://www.youtube.com/watch?v=ekrO_9KhL5o" rel="canonical"/><link data-dcnode-id="7680" data-loaded="true" href="https://www.youtube.com/s/player/534c466c/www-player.css" id="css-335067421" nonce="zedCmg+6qw8qziIP8LylDQ" rel="stylesheet"/></meta></head><body class="date-20220425 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="7671" dir="ltr"><div data-dcnode-id="7678" id="player" style="width: 100%; height: 100%;"></div><noscript data-dcnode-id="7672"><span data-dcnode-id="7673" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=ekrO_9KhL5o" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="7666" instrument_node="">
</span><p data-dcnode-id="7662"><strong data-dcnode-id="7663"><span data-dcnode-id="7664" style="font-size: small;"><span data-dcnode-id="7665" instrument_node="">A New Theory of Evolution: Cellular Genetic Engineering</span></span></strong></p><span data-dcnode-id="7661" instrument_node="">
</span><p data-dcnode-id="7659"><span data-dcnode-id="7660" instrument_node="">Some errors: Shapiro’s work was with bacteria, not protozoa. Splicing a single protein under starvation stress increased the mutation rates at least 100,000-fold. Dr. Shapiro was not able to determine how many incorrect evolution mutation attempts were made vs. successful mutations.</span></p><span data-dcnode-id="7658" instrument_node="">
</span><p data-dcnode-id="7652"><span data-dcnode-id="7657" instrument_node="">The 100,000 breaks come in ciliated protozoa as demonstrated by David Prescott, Laura Landweber, Martin Gorovsky and many others. These edits are highly non-random and RNA-guided, but in this case, there was no change in adaptations. These genome acrobatics go on at each episode of starvation and sexual reproduction. They convert the germline nucleus into a restructured simplified somatic nucleus.</span><br data-dcnode-id="7656"><span data-dcnode-id="7655" instrument_node="">
</span><a data-dcnode-id="7653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/user/CosmicFingerprints/videos%3Fsort%3Ddd%26view%3D0%26flow%3Dgrid"><span data-dcnode-id="7654" instrument_node="">More Videos Here</span></a></p><span data-dcnode-id="7651" instrument_node="">
</span><p data-dcnode-id="7649"><span data-dcnode-id="7650" instrument_node="">It’s only new to those who are hearing it for the first time.</span></p><span data-dcnode-id="7648" instrument_node="">
</span><p data-dcnode-id="7643"><span data-dcnode-id="7647" instrument_node="">It’s not just a wild hypothesis, either. It was discovered by geneticist </span><strong data-dcnode-id="7645"><span data-dcnode-id="7646" instrument_node="">Dr. Barbara McClintock</span></strong><span data-dcnode-id="7644" instrument_node=""> in 1944.</span></p><span data-dcnode-id="7642" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="7638" id="attachment_377" style="width: 260px"><img alt="The Barbara McClintock U.S. Postage stamp includes a diagram that shows how genes are intelligently transposed by the Mutation Algorithm in DNA" aria-describedby="caption-attachment-377" class="size-full wp-image-377" data-dcnode-id="7641" height="161" loading="lazy" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evo2.org/wp-content/uploads/2009/06/mcclintock_stamp_2005.jpg&amp;raw" srcset="https://evo2.org/wp-content/uploads/2009/06/mcclintock_stamp_2005.jpg 329w, https://evo2.org/wp-content/uploads/2009/06/mcclintock_stamp_2005-300x193.jpg 300w" title="mcclintock_stamp_2005" width="250"><p class="wp-caption-text" data-dcnode-id="7639" id="caption-attachment-377"><span data-dcnode-id="7640" instrument_node="">Dr. Barbara McClintock’s U.S. Postage stamp includes a diagram that shows how genes are intelligently transposed by the Mutation Algorithm in DNA</span></p></div><span data-dcnode-id="7637" instrument_node="">
</span><p data-dcnode-id="7635"><span data-dcnode-id="7636" instrument_node="">She was decades ahead of her time and she received the Nobel Prize for this discovery in 1983. Her picture is now on a U.S. Postage Stamp and she’s one of the greatest scientists in the history of biology.</span></p><span data-dcnode-id="7634" instrument_node="">
</span><p data-dcnode-id="7632"><span data-dcnode-id="7633" instrument_node="">But even now, people ask me, “Why didn’t they ever teach this to me in biology class?”</span></p><span data-dcnode-id="7631" instrument_node="">
</span><p data-dcnode-id="7629"><span data-dcnode-id="7630" instrument_node="">Maybe Barbara McClintock could answer that question.</span></p><span data-dcnode-id="7628" instrument_node="">
</span><p data-dcnode-id="7626"><span data-dcnode-id="7627" instrument_node="">Her discoveries were so radical, so contrary to Darwin, that for most of her career she kept this to herself. She she described the reception of her research as “puzzlement, even hostility. ” Based on the reactions of other scientists to her work, McClintock felt she risked alienating the scientific mainstream, and from 1953 stopped publishing accounts of her research.</span></p><span data-dcnode-id="7625" instrument_node="">
</span><p data-dcnode-id="7623"><span data-dcnode-id="7624" instrument_node="">Why don’t they teach this in most biology classes now?</span></p><span data-dcnode-id="7622" instrument_node="">
</span><p data-dcnode-id="7620"><span data-dcnode-id="7621" instrument_node="">I’ll just say, it’s not because her findings haven’t been verified.</span></p><span data-dcnode-id="7619" instrument_node="">
</span><p data-dcnode-id="7614"><span data-dcnode-id="7618" instrument_node="">And it’s also not because the “random mutation” model </span><em data-dcnode-id="7616"><span data-dcnode-id="7617" instrument_node="">works</span></em><span data-dcnode-id="7615" instrument_node="">. You may or may not have noticed, but it actually doesn’t work at all. I’ve been publicly debating this online for 5 years and I have yet to have one person send me a link or refer to a book that says, “Here is the actual experiment that proves random mutations drive evolution.”</span></p><span data-dcnode-id="7613" instrument_node="">
</span><p data-dcnode-id="7609"><span data-dcnode-id="7612" instrument_node="">There is no such paper or book, so far as I know. </span><strong data-dcnode-id="7610"><span data-dcnode-id="7611" instrument_node="">The random mutation theory, sadly, is an urban legend.</span></strong></p><span data-dcnode-id="7608" instrument_node="">
</span><p data-dcnode-id="7606"><span data-dcnode-id="7607" instrument_node="">INTERESTING FACTOID: This same process of intelligent evolution is how your immune system learns to fight off germs it’s never seen before: It systematically tries different combinations and once it’s ‘cracked the code’ on the invading disease, it passes those changes onto daughter cells. Your own immune system is a miniature model for evolutionary biology.</span></p><span data-dcnode-id="7605" instrument_node="">
</span><p data-dcnode-id="7601"><a data-dcnode-id="7603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shapiro.bsd.uchicago.edu/"><span data-dcnode-id="7604" instrument_node="">Dr. James A. Shapiro</span></a><span data-dcnode-id="7602" instrument_node=""> of the University of Chicago is one of the leading researchers in this field. Let me share with you about what he’s discovered about protozoa.</span></p><span data-dcnode-id="7600" instrument_node="">
</span><p data-dcnode-id="7598"><span data-dcnode-id="7599" instrument_node="">What I’m about to pass along is profound, almost miraculous. I want you to read and re-read this a few times before you go on:</span></p><span data-dcnode-id="7597" instrument_node="">
</span><p data-dcnode-id="7593"><span data-dcnode-id="7594" style="font-size: medium;"><strong data-dcnode-id="7595"><span data-dcnode-id="7596" instrument_node="">A cell under stress will splice its own DNA into over 100,000 pieces. Then a program senses hundreds of variables in its environment and then re-arranges those pieces to produce a new, better, evolved cell.</span></strong></span></p><span data-dcnode-id="7592" instrument_node="">
</span><p data-dcnode-id="7590"><span data-dcnode-id="7591" instrument_node="">Again I ask you to re-read that short paragraph and really consider the significance of it. A protozoa re-programs its own DNA and evolves. Intelligently.</span></p><span data-dcnode-id="7589" instrument_node="">
</span><p data-dcnode-id="7584"><span data-dcnode-id="7588" instrument_node="">What if your computer were able to do… </span><em data-dcnode-id="7586"><span data-dcnode-id="7587" instrument_node="">that</span></em><span data-dcnode-id="7585" instrument_node="">???</span></p><span data-dcnode-id="7583" instrument_node="">
</span><p data-dcnode-id="7581"><span data-dcnode-id="7582" instrument_node="">Imagine……</span></p><span data-dcnode-id="7580" instrument_node="">
</span><p data-dcnode-id="7578"><span data-dcnode-id="7579" instrument_node="">Did you ever use a computer from the 1980’s? Remember Microsoft MS-DOS? Remember turning on your computer and seeing</span></p><span data-dcnode-id="7577" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="7573" id="attachment_359" style="width: 352px"><img alt="courtesy winhistory.de" aria-describedby="caption-attachment-359" class="size-full wp-image-359" data-dcnode-id="7576" height="400" loading="lazy" sizes="(max-width: 342px) 100vw, 342px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evo2.org/wp-content/uploads/2009/06/dos1.jpg&amp;raw" srcset="https://evo2.org/wp-content/uploads/2009/06/dos1.jpg 342w, https://evo2.org/wp-content/uploads/2009/06/dos1-256x300.jpg 256w" title="dos1" width="342"><p class="wp-caption-text" data-dcnode-id="7574" id="caption-attachment-359"><span data-dcnode-id="7575" instrument_node="">courtesy winhistory.de</span></p></div><span data-dcnode-id="7572" instrument_node="">
</span><p data-dcnode-id="7568"><strong data-dcnode-id="7570"><span data-dcnode-id="7571" instrument_node="">Now imagine for a moment that DOS 1.0 was never modified by any Microsoft programmers.</span></strong><span data-dcnode-id="7569" instrument_node=""> Imagine that after 1981 the boys in Redmond, Washington never touched DOS again.</span></p><span data-dcnode-id="7567" instrument_node="">
</span><p data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">Instead, by analyzing the programs it ran, by sensing changes in hardware, DOS “grew” new parts, all by itself. Imagine that it added icons and a mouse, automatically, and after a process of evolution, Windows emerged.</span></p><span data-dcnode-id="7564" instrument_node="">
</span><p data-dcnode-id="7562"><span data-dcnode-id="7563" instrument_node="">Imagine that after a time, Windows developed Internet Explorer – all by itself – just by adapting to the changing environment of the computer. By re-writing and re-arranging its own lines of code.</span></p><span data-dcnode-id="7561" instrument_node="">
</span><p data-dcnode-id="7559"><span data-dcnode-id="7560" instrument_node="">Imagine that it then developed networking features. Imagine that, sensing that it needed an email client, evolved Outlook Express. One day the Outlook icon was suddenly there on your desktop. You clicked on it and as you began to use it, it added and subtracted features to suit you.</span></p><span data-dcnode-id="7558" instrument_node="">
</span><p data-dcnode-id="7556"><span data-dcnode-id="7557" instrument_node="">Imagine that, sensing that it needed virus protection, that it adaptively developed defenses for those viruses.</span></p><span data-dcnode-id="7555" instrument_node="">
</span><p data-dcnode-id="7553"><span data-dcnode-id="7554" instrument_node="">Sometimes the viruses would take out some computers, but the computers that survived were even more resistant.</span></p><span data-dcnode-id="7552" instrument_node="">
</span><p data-dcnode-id="7550"><span data-dcnode-id="7551" instrument_node="">Imagine that the viruses also self-adapted and continued to try to worm their way in, in a never-ending competition of dueling codes.</span></p><span data-dcnode-id="7549" instrument_node="">
</span><p data-dcnode-id="7547"><span data-dcnode-id="7548" instrument_node="">Imagine that ALL of this adaptation happened over a period of years without a single software engineer ever touching it. Imagine this happening automatically just because it got installed on billions of computers.</span></p><span data-dcnode-id="7546" instrument_node="">
</span><p data-dcnode-id="7544"><span data-dcnode-id="7545" instrument_node="">Oh, I almost forgot: imagine that the very latest version of Windows could still fit on a single 750 megabyte CD-ROM.</span></p><span data-dcnode-id="7543" instrument_node="">
</span><p data-dcnode-id="7538"><strong data-dcnode-id="7539"><span data-dcnode-id="7542" instrument_node="">If DOS 1.0 evolved into the Windows of today without any engineer touching it, </span><em data-dcnode-id="7540"><span data-dcnode-id="7541" instrument_node="">would you say:</span></em></strong></p><span data-dcnode-id="7537" instrument_node="">
</span><p data-dcnode-id="7530"><strong data-dcnode-id="7533"><span data-dcnode-id="7536" instrument_node="">-That accidental file copying errors, culled by natural selection, were responsible for these evolutionary changes?</span><br data-dcnode-id="7535"><span data-dcnode-id="7534" instrument_node="">
</span></strong><br data-dcnode-id="7532"><span data-dcnode-id="7531" instrument_node="">
(When have you ever seen a software program or computer virus that accidentally evolved new features through a accidental copying errors?)</span></p><span data-dcnode-id="7529" instrument_node="">
</span><p data-dcnode-id="7513"><strong data-dcnode-id="7525"><span data-dcnode-id="7528" instrument_node="">OR would you say…</span><br data-dcnode-id="7527"><span data-dcnode-id="7526" instrument_node="">
</span></strong><br data-dcnode-id="7524"><span data-dcnode-id="7523" instrument_node="">
</span><strong data-dcnode-id="7516"><span data-dcnode-id="7522" instrument_node="">-That the original engineer who wrote DOS 1.0 was so incredibly skilled that he actually devised a program that could </span><em data-dcnode-id="7520"><span data-dcnode-id="7521" instrument_node="">self-adapt</span></em><span data-dcnode-id="7519" instrument_node="">? That it could upgrade itself without downloading another friggin’ Service Pack?</span><br data-dcnode-id="7518"><span data-dcnode-id="7517" instrument_node="">
</span></strong><br data-dcnode-id="7515"><span data-dcnode-id="7514" instrument_node="">
Also…</span></p><span data-dcnode-id="7512" instrument_node="">
</span><p data-dcnode-id="7510"><span data-dcnode-id="7511" instrument_node="">If you met the engineer who wrote this, wouldn’t you want to ask him how he pulled off this amazing feat? Would you want his autograph?</span></p><span data-dcnode-id="7509" instrument_node="">
</span><p data-dcnode-id="7506"><em data-dcnode-id="7507"><span data-dcnode-id="7508" instrument_node="">Wouldn’t you want to ask him a ton of questions…</span></em></p><span data-dcnode-id="7505" instrument_node="">
</span><p data-dcnode-id="7503"><span data-dcnode-id="7504" instrument_node="">How did he lay it all out at the very beginning? What were the design priorities? How does the program sense changes in its environment? How does the program perform its computations? Does the program keep a database of unsuccessful mutations so it can avoid trying them again?</span></p><span data-dcnode-id="7502" instrument_node="">
</span><p data-dcnode-id="7500"><span data-dcnode-id="7501" instrument_node="">Well my friend, so far as we can tell, that’s exactly what DNA has done over the last 3.5 billion years. Instead of degrading and crashing like computer programs and hard drives, it has efficiently adapted and evolved from a single cell to occupy every ecological niche imaginable.</span></p><span data-dcnode-id="7499" instrument_node="">
</span><p data-dcnode-id="7497"><span data-dcnode-id="7498" instrument_node="">From the frozen ice sheets of the Antarctic to the punishing heat of the Sahara. From the ants under your kitchen sink to glorious singing birds in the Amazon rain forest.</span></p><span data-dcnode-id="7496" instrument_node="">
</span><p data-dcnode-id="7494"><span data-dcnode-id="7495" instrument_node="">This did not happen through accidental random mutation.</span></p><span data-dcnode-id="7493" instrument_node="">
</span><p data-dcnode-id="7491"><span data-dcnode-id="7492" instrument_node="">If life evolved from a single cell, this happened through an ingenious algorithm that engineers its own beneficial mutations.</span></p><span data-dcnode-id="7490" instrument_node="">
</span><p data-dcnode-id="7488"><span data-dcnode-id="7489" instrument_node="">This is an engineering feat of the most amazing proportions imaginable.</span></p><span data-dcnode-id="7487" instrument_node="">
</span><p data-dcnode-id="7485"><span data-dcnode-id="7486" instrument_node="">Consider this….</span></p><span data-dcnode-id="7484" instrument_node="">
</span><p data-dcnode-id="7480" style="text-align: center;"><span data-dcnode-id="7481" style="font-size: medium;"><strong data-dcnode-id="7482"><span data-dcnode-id="7483" instrument_node="">If evolution is true, then God is an even more ingenious programmer than the old-school creationists ever imagined Him to be.</span></strong></span></p><span data-dcnode-id="7479" instrument_node="">
</span><p data-dcnode-id="7477" style="text-align: left;"><span data-dcnode-id="7478" instrument_node="">This new theory has HUGE implications for the future discoveries of biology. It re-frames the entire evolution debate as a software engineering problem! We have all kinds of tools that can help.</span></p><span data-dcnode-id="7476" instrument_node="">
</span><p data-dcnode-id="7474"><span data-dcnode-id="7475" instrument_node="">In the next installment I’ll put my balls on the line and describe a half dozen predictions that this New Theory of Evolution makes. Predictions that will be either confirmed or overturned in the next 3-20 years.</span></p><span data-dcnode-id="7473" instrument_node="">
</span><p data-dcnode-id="7471"><span data-dcnode-id="7472" instrument_node="">Stay tuned.</span></p><span data-dcnode-id="7470" instrument_node="">
</span><p data-dcnode-id="7467" style="text-align: left;"><strong data-dcnode-id="7468"><span data-dcnode-id="7469" instrument_node="">Perry Marshall</span></strong></p><span data-dcnode-id="7466" instrument_node="">
</span><p data-dcnode-id="7463" style="text-align: center;"><strong data-dcnode-id="7464"><span data-dcnode-id="7465" instrument_node="">Read more about this fascinating New Theory of Evolution:</span></strong></p><span data-dcnode-id="7462" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="7392" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/d8d1803c8934df70de2f3e61ea4294f6%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/d8d1803c8934df70de2f3e61ea4294f6?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="7391" instrument_node="">				Noel				</span><span class="says" data-dcnode-id="7389"><span data-dcnode-id="7390" instrument_node="">says:</span></span><span data-dcnode-id="7388" instrument_node="">

</span><p data-dcnode-id="7377"><span data-dcnode-id="7378" instrument_node="">Hi Perry.</span></p><span data-dcnode-id="7376" instrument_node="">
</span><p data-dcnode-id="7372"><span data-dcnode-id="7375" instrument_node="">I am disturbed by your structure of presenting your argument. It’s VERY convincing to those who do not view it objectively. I’ve read your previous posts and I have to say you seem to argue from a certain point of view(of course) but fail to consider other possible reasons. For instance, you pointed out that there are (only) 5 possible explanations to the origin of DNA coding. Then you proceed to self eliminate the first few reasons and stated that the “unknown physical law” is not plausible for we have not a single prove (yet) to demonstrate our observation. I do not think that you CAN do that for this is clearly non-objective. Like, before Einstein, time was thought to be like an infinite traveling arrow; it doesn’t stop, slow, etc… It keeps moving. Would you have said then, that time MUST be as described because we have not seen or observed it behaving differently. Then Mr Einstein came and that arrow thingy was toppled.  Before that no one would have imagined such a theory. If I was living back then, using your structure of argument, I could have said something like we cannot travel back in time, we keep ageing and therefore, since there’s no better explanation, time must be as described like Newton : like an arrow in a straight line moving linearly etc..</span><br data-dcnode-id="7374"><span data-dcnode-id="7373" instrument_node="">
See what I’m trying to say? You can’t just disprove anything in favor of your belief. Since we are subjected to infinite unknown possibilities in the future, maybe there’s one observation which shows the existence of naturally occurring codes? This is not a personal attack, but why must it be the 5th explanation, and not an Z-explanation (Z is used for a still unknown explanation) However, I’m not trying to discredit the 5th explanation; I’m just opened to more possibilities.</span></p><span data-dcnode-id="7371" instrument_node="">
</span><p data-dcnode-id="7369"><span data-dcnode-id="7370" instrument_node="">Also, in your blog, you used the iconic figure of science – Einstein. This is perhaps to suggest that all of science = Einstein and if Einstein was wrong in a certain way, then science must have been Einstein. In a way then, the not-so-alert ones will somehow get the impression of “Oh, that’s Einstein and our friend Mr. Marshall has highlighted something…………….” Well, as we know, Einstein made many mistakes in his entirely career in theoretical physics. </span></p><span data-dcnode-id="7368" instrument_node="">
</span><p data-dcnode-id="7366"><span data-dcnode-id="7367" instrument_node="">And in one of your posts (sorry, I haven’t the time to quote and present my response properly), you said that because all begun with the Big Bang, some superintelligent, benevolent “consciousness” must have initiated it. Isn’t this a little too extreme conclusion? Why must it be a Creator that detonates the  Big Bang and not some other possible Z-thing. And there are several theories that suggest events prior to the Big Bang. It could have been the “circular, rotating” universe theory, where the universe repeats itself with the Big Bang as one of its events, with time repeating itself etc. And if you hold strongly the the theological viewpoint, how then, does God exist before “everything” as you put it. If Big Bang was the initial event, then what was God before that ? Was God all around before that? Then what created God? To create something you need another conscious “Creator” .. does this then mean a SuperCreator must be present before that and so forth? </span></p><span data-dcnode-id="7365" instrument_node="">
</span><p data-dcnode-id="7363"><span data-dcnode-id="7364" instrument_node="">The random variation argument. Your new theory is great in a way. Who am I to discredit or deny your theory? But I have to say that that doesn’t necessarily make Darwin half wrong or wrong in anyway. Because we could not come out with a better variation of the Fox-sentence it doesn’t mean anything. After all, the English language in invented by a conscious mind. If we substitute that sentence with a binary code like 1011, then a corrupt instruction such as 1101 might not NECESSARILY mean HARM to the system. If 1011 means Clear all viruses in the system.. with a corrupt instruction like 1011 which means Clear all viruses and spywares in the system might deal a greater good to the computer.Like I’ve said, your use of certain examples is very very convincing. But you cannot generalize from a particular example which is a basic flaw in structuring arguments.</span></p><span data-dcnode-id="7362" instrument_node="">
</span><p data-dcnode-id="7359"><span data-dcnode-id="7361" instrument_node="">I’m ready to be hammered back but I know you have been decent in your replies. I’m just a passer-by and might not come back to visit this site. Anyway, I apologize if I was a little sarcastic or rude up there. I respect your belief and if you think I’m an atheist, I am not. I’m just objectively voicing out my opinion, free from my faith and science. But in doing so, I might have been subjective without realizing it; I don’t know. Sorry for anything and everything once again </span><img alt="😉" class="emoji" data-dcnode-id="7360" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f609.svg&amp;raw"></p><span data-dcnode-id="7358" instrument_node="">
</span><p data-dcnode-id="7354"><span data-dcnode-id="7357" instrument_node="">All the best,</span><br data-dcnode-id="7356"><span data-dcnode-id="7355" instrument_node="">
Noel</span></p><span data-dcnode-id="7353" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="7330"><span data-dcnode-id="7339" instrument_node="">
</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="7338" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="7337" instrument_node=""> </span><a class="url" data-dcnode-id="7335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//evo2.org/" rel="external nofollow ugc"><span data-dcnode-id="7336" instrument_node="">Perry Marshall</span></a><span data-dcnode-id="7334" instrument_node=""> </span><span class="says" data-dcnode-id="7332"><span data-dcnode-id="7333" instrument_node="">says:</span></span><span data-dcnode-id="7331" instrument_node="">
</span></div><span data-dcnode-id="7329" instrument_node="">
</span><div class="comment-meta" data-dcnode-id="7324"><span data-dcnode-id="7328" instrument_node="">
</span><a data-dcnode-id="7326" href="#comment-856"><span data-dcnode-id="7327" instrument_node="">

</span><div class="comment-text" data-dcnode-id="7273"><span data-dcnode-id="7322" instrument_node="">
</span><p data-dcnode-id="7320"><span data-dcnode-id="7321" instrument_node="">Noel, thank you for your thoughtful post. I enjoy getting responses that are respectful and which dig into the real questions at hand.</span></p><span data-dcnode-id="7319" instrument_node="">
</span><p data-dcnode-id="7317"><span data-dcnode-id="7318" instrument_node="">Einstein made many mistakes in his career and my article “Einstein’s Big Blunder” highlights one of them. Specifically, it points out that his early materialistic bias that preferred an “eternal” universe caused him to arrive at a wrong conclusion. And the biggest mistake of his career.</span></p><span data-dcnode-id="7316" instrument_node="">
</span><p data-dcnode-id="7314"><span data-dcnode-id="7315" instrument_node="">You are welcome to posit that there is an undiscovered law of physics that explains the origin of information. I am actually shocked that more people don’t just take that point of view and say “Since we don’t know, this is where choose to place my bet.” That is at least honest and it also honors the aims of science.</span></p><span data-dcnode-id="7313" instrument_node="">
</span><p data-dcnode-id="7311"><span data-dcnode-id="7312" instrument_node="">To attempt any conclusion about any of these questions requires you to take a faith position. The very practice of science and the offering of any hypothesis is an act of faith, especially when we’re operating at the fringes of what is known.</span></p><span data-dcnode-id="7310" instrument_node="">
</span><p data-dcnode-id="7308"><span data-dcnode-id="7309" instrument_node="">I think the reason most people don’t take the “unknown law of physics” position is that it forces them to acknowledge that they don’t know. It highlights the uncomfortable role of faith in the search for answers.</span></p><span data-dcnode-id="7307" instrument_node="">
</span><p data-dcnode-id="7302"><span data-dcnode-id="7306" instrument_node="">I address the question of “OK so where did God come from” at </span><a data-dcnode-id="7304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//evo2.org/infotheoryqa.htm" rel="nofollow ugc"><span data-dcnode-id="7305" instrument_node="">http://evo2.org/infotheoryqa.htm</span></a><span data-dcnode-id="7303" instrument_node="">.</span></p><span data-dcnode-id="7301" instrument_node="">
</span><p data-dcnode-id="7299"><span data-dcnode-id="7300" instrument_node="">As to your 1011 example: All communication systems have a context, a code and a set of rules. 1011 may have a very specific meaning in a certain system, or it may not. But the point of all communication theory is: Whatever it is, it is VERY VERY specific. There is no such thing as a communication system where you can just toss in a jumble of 1’s and 0’s and out comes useful stuff. </span></p><span data-dcnode-id="7298" instrument_node="">
</span><p data-dcnode-id="7296"><span data-dcnode-id="7297" instrument_node="">Garbage In = Garbage Out.</span></p><span data-dcnode-id="7295" instrument_node="">
</span><p data-dcnode-id="7293"><span data-dcnode-id="7294" instrument_node="">Essentially the “random mutation” theory says: “If you have natural selection working for you, you can put Garbage In and you get Excellent Performance Out.”</span></p><span data-dcnode-id="7292" instrument_node="">
</span><p data-dcnode-id="7290"><span data-dcnode-id="7291" instrument_node="">Every Quality Control engineer knows this is not true. Simply having a system that rejects bad parts does not in any way assure you of ever producing good parts.</span></p><span data-dcnode-id="7289" instrument_node="">
</span><p data-dcnode-id="7287"><span data-dcnode-id="7288" instrument_node="">Even the world’s best spell checker cannot write a letter for you. Doesn’t matter how much time you give it.</span></p><span data-dcnode-id="7286" instrument_node="">
</span><p data-dcnode-id="7284"><span data-dcnode-id="7285" instrument_node="">In the “quick brown fox” illustration, am not generalizing from a specific example. I am demonstrating a specific instance of a general principle which is Information Entropy: Noise always destroys a signal. This is not new; Shannon developed this in 1948 and there is nothing in engineering that reverses Information Entropy, except for willful acts of intelligent conscious beings. Intelligence is the only known source of information.</span></p><span data-dcnode-id="7283" instrument_node="">
</span><p data-dcnode-id="7281"><span data-dcnode-id="7282" instrument_node="">Information Entropy says that if you take ANY information system and randomly mutate the data, it’s going to be just as unsuccessful as my Quick Brown Fox illustration. Doesn’t matter whether it’s English, HTML, Cassette Tapes, Chinese, DVD players or DNA.</span></p><span data-dcnode-id="7280" instrument_node="">
</span><p data-dcnode-id="7278"><span data-dcnode-id="7279" instrument_node="">Respectfully Submitted,</span></p><span data-dcnode-id="7277" instrument_node="">
</span><p data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">Perry</span></p><span data-dcnode-id="7274" instrument_node="">
</span></div><span data-dcnode-id="7272" instrument_node="">

</span><p data-dcnode-id="7244"><span data-dcnode-id="7245" instrument_node="">Hi Perry.</span></p><span data-dcnode-id="7243" instrument_node="">
</span><p data-dcnode-id="7241"><span data-dcnode-id="7242" instrument_node="">I must say I respect you very much. You always debate with loud,hard facts. As compared to my friends (I do not live in the US by the way), you are very scientific, logical and present your argument in a very structured manner. You do not go “it’s because God made it that way” or “God has reasons for it” which I feel is very, very good. You tackle a problem beautifully. I have to admit that I am not well-versed with the various theories forwarded (Information Theory, Communication Theory, etc) and am truly amazed by your scientific viewpoint.</span></p><span data-dcnode-id="7240" instrument_node="">
</span><p data-dcnode-id="7238"><span data-dcnode-id="7239" instrument_node="">I’ve read your John Grisham analogy. So we let his novel be space and time. His characters are inhabitants and his laws are physical laws. Then John Grisham is the Creator. So that illustrates the who-invented-God problem. </span></p><span data-dcnode-id="7237" instrument_node="">
</span><p data-dcnode-id="7235"><span data-dcnode-id="7236" instrument_node="">But then, John Grisham was delivered by his parents and his parents came from their grandparents. So John’s dad for instance, too, live outside his novel. And his grandparents, too. And if we trace this using a religious point of view, then the Grishams live in a universe/multiverse started by God, whether 10, 11 or 26 dimensions. This, as you have posted, is like a Grisham novel. Then what about John himself? John wrote it and he exists because of his parents……… So that doesn’t really answer the “Ok, so where did God come from?” problem. It’s like a circular argument. </span></p><span data-dcnode-id="7234" instrument_node="">
</span><p data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">Hm. I also took an interest in your gravitational constant, pi and c examples. It’s a little interesting to further a discussion. I’m just asking, not refuting, why is it not a code? If code is a set of instructions, then pi for instance is a code which says : when constructing a circle, its circumference-to-diameter ratio must be 3.142. This could be a property of a geometric circle. Or it could be a law in geometry. But why this number? If we do not use the 10-digit convention, this “number” will also appear in any other numerical systems. It’s a universal code for circles. Or maybe I got the very definition of “code” wrong.</span></p><span data-dcnode-id="7231" instrument_node="">
</span><p data-dcnode-id="7229"><span data-dcnode-id="7230" instrument_node="">Anyway, cool site. According to you, atheists are being non-scientific and are in denial when they are stuck. This is something bad. I hope they could be more logical and opened to all sorts of ideas because that’s the core principle of science. </span></p><span data-dcnode-id="7228" instrument_node="">
</span><p data-dcnode-id="7226"><span data-dcnode-id="7227" instrument_node="">But probably the main reason why I prefer the middle path in my spiritual belief is because I find certain principles in certain religions not worth following. It’s innate, isn’t it, to choose what’s best for him after viewing many different ideas.</span></p><span data-dcnode-id="7225" instrument_node="">
</span><p data-dcnode-id="7223"><span data-dcnode-id="7224" instrument_node="">Looking forward to meet great people like you in the future. </span></p><span data-dcnode-id="7222" instrument_node="">
</span><p data-dcnode-id="7220"><span data-dcnode-id="7221" instrument_node="">Noel</span></p><span data-dcnode-id="7219" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="7196"><span data-dcnode-id="7205" instrument_node="">
</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="7204" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="7203" instrument_node=""> </span><a class="url" data-dcnode-id="7201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//evo2.org/" rel="external nofollow ugc"><span data-dcnode-id="7202" instrument_node="">Perry Marshall</span></a><span data-dcnode-id="7200" instrument_node=""> </span><span class="says" data-dcnode-id="7198"><span data-dcnode-id="7199" instrument_node="">says:</span></span><span data-dcnode-id="7197" instrument_node="">

</span><p data-dcnode-id="7186"><span data-dcnode-id="7187" instrument_node="">Noel,</span></p><span data-dcnode-id="7185" instrument_node="">
</span><p data-dcnode-id="7183"><span data-dcnode-id="7184" instrument_node="">There is always a chicken-and-egg problem with these questions because everyone intuitively knows, an infinite series of parents or causes is not reasonable. Somewhere we have to have a first chicken or a first egg. Philosophers almost universally reject any kind of “infinite regress of causes.”</span></p><span data-dcnode-id="7182" instrument_node="">
</span><p data-dcnode-id="7180"><span data-dcnode-id="7181" instrument_node="">Somewhere there HAS to be an uncaused cause.</span></p><span data-dcnode-id="7179" instrument_node="">
</span><p data-dcnode-id="7177"><span data-dcnode-id="7178" instrument_node="">I will elaborate on this in future posts but here’s the simple version:</span></p><span data-dcnode-id="7176" instrument_node="">
</span><p data-dcnode-id="7174"><span data-dcnode-id="7175" instrument_node="">-Matter, energy, space and time all come into existence at the time of the big bang.</span></p><span data-dcnode-id="7173" instrument_node="">
</span><p data-dcnode-id="7171"><span data-dcnode-id="7172" instrument_node="">-This had to have been caused by something. The cause is by definition outside of space and time.</span></p><span data-dcnode-id="7170" instrument_node="">
</span><p data-dcnode-id="7168"><span data-dcnode-id="7169" instrument_node="">-In cosmology there is the inevitable question of: How did the universe come to be so fine-tuned? How could the expansion rate of the big bang be tuned to 200 decimal places of precision? (Non-religious scientific papers talk about this, i.e. “Disturbing Implications of a Cosmological Constant.”</span></p><span data-dcnode-id="7167" instrument_node="">
</span><p data-dcnode-id="7165"><span data-dcnode-id="7166" instrument_node="">-The cause can’t be a prior infinite series of “bouncing universes” because entropy does not allow for that</span></p><span data-dcnode-id="7164" instrument_node="">
</span><p data-dcnode-id="7162"><span data-dcnode-id="7163" instrument_node="">-Why do laws of physics exist? Where did they come from?</span></p><span data-dcnode-id="7161" instrument_node="">
</span><p data-dcnode-id="7159"><span data-dcnode-id="7160" instrument_node="">-Why is there anything instead of nothing at all?</span></p><span data-dcnode-id="7158" instrument_node="">
</span><p data-dcnode-id="7156"><span data-dcnode-id="7157" instrument_node="">Again we have a requirement for an uncaused cause.</span></p><span data-dcnode-id="7155" instrument_node="">
</span><p data-dcnode-id="7153"><span data-dcnode-id="7154" instrument_node="">Then we come to DNA. With DNA we have the introduction of information to the universe. Prior to DNA, so far as we know, there was no coded information in the universe. So now we have the genetic code, which is arbitrary not fixed; and a very clear set of deliberate choices which have been made: a 4 letter alphabet, a coding system based on sets of 3 codons, etc. </span></p><span data-dcnode-id="7152" instrument_node="">
</span><p data-dcnode-id="7150"><span data-dcnode-id="7151" instrument_node="">In pure physics we have laws which are ALWAYS obeyed. In information systems we have rules which can be corrupted or not followed.</span></p><span data-dcnode-id="7149" instrument_node="">
</span><p data-dcnode-id="7147"><span data-dcnode-id="7148" instrument_node="">-Eventually we arrive at the Uncaused Cause also being intelligent and intentional, because the information in DNA cannot be explained by the purely material universe.</span></p><span data-dcnode-id="7146" instrument_node="">
</span><p data-dcnode-id="7144"><span data-dcnode-id="7145" instrument_node="">As for constants like Pi or any other physical or mathematical construct: These things are not codes in the way that DNA is a code. Pi and numbering systems and the periodic table are human constructs, they are systems we use to think about the universe. They are coding systems that we devise so we can talk and think about the things we see around us.</span></p><span data-dcnode-id="7143" instrument_node="">
</span><p data-dcnode-id="7141"><span data-dcnode-id="7142" instrument_node="">However DNA is a coding system within itself and the existence of DNA’s coding system is NOT dependent on our observation of it. Ribosomes decode mRNA whether we label their activity or not.</span></p><span data-dcnode-id="7140" instrument_node="">
</span><p data-dcnode-id="7138"><span data-dcnode-id="7139" instrument_node="">I’m glad you’ve decided to come and spend time on the site.</span></p><span data-dcnode-id="7137" instrument_node="">
</span><p data-dcnode-id="7135"><span data-dcnode-id="7136" instrument_node="">Perry Marshall</span></p><span data-dcnode-id="7134" instrument_node="">

</span><div class="comment-text" data-dcnode-id="6951"><span data-dcnode-id="6964" instrument_node="">
</span><p data-dcnode-id="6962"><span data-dcnode-id="6963" instrument_node="">Have you ever seen the film “Kung Fu Panda”? Great and funny movie, with a great message. In case you haven’t, the main character, Po, finally gets to read the famous sacred scroll and it’s blank. The only thing he can see in the scroll is a reflection of himself. After his father tells him that there is no secret ingredient in his famous noodles, he understands that there is “no secret ingredient” to the scroll or to Kung Fu, or to Life. That the secret is there is no secret. You just have to believe in yourself. </span></p><span data-dcnode-id="6961" instrument_node="">
</span><p data-dcnode-id="6959"><span data-dcnode-id="6960" instrument_node="">It’s what I called the “Burden of Purpose”. Many people believe in God or a god as way to find purpose in your life. They will say “God has a plan and I just have to life my life”. That is fine and that is one way to live your life.</span></p><span data-dcnode-id="6958" instrument_node="">
</span><p data-dcnode-id="6956"><span data-dcnode-id="6957" instrument_node="">But if the Universe is infinite and life comes and goes, then it is only up to us to find that meaning in our lives. For many, that is too much to handle. I find it liberating because it means we can really do anything, as long as we believe in ourselves. </span></p><span data-dcnode-id="6955" instrument_node="">
</span><p data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">The secret is there is no secret. The meaning is there is no meaning.</span></p><span data-dcnode-id="6952" instrument_node="">

</span><p data-dcnode-id="6266"><span data-dcnode-id="6267" instrument_node="">Perry,</span></p><span data-dcnode-id="6265" instrument_node="">
</span><p data-dcnode-id="6263"><span data-dcnode-id="6264" instrument_node="">It’s your website and you can disseminate pseudo-science and misinformation if you want – the unfettered freedom of speech is what they call it, I guess. It’d be nice, though, if you’d learn some science with an open mind instead of filtering out only what defends your religious dogma. If you’d approach learning about the natural world objectively rather than with a worldview skewed by a desperate emotional need to hang onto ancient myths from Mesopotamia and the Levant, it would greatly facilitate your ability to understand it.</span></p><span data-dcnode-id="6262" instrument_node="">
</span><p data-dcnode-id="6260"><span data-dcnode-id="6261" instrument_node="">And please, please stop using the word “dogma” to characterize an argument in science supported by evidence.  Dogmas do not require evidence. They only require faith. And your mutation analogy is child’s play against the complexity found in genes and DNA (see below).</span></p><span data-dcnode-id="6259" instrument_node="">
</span><p data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">What I don’t understand is why you think that Barbara McClintock’s work is somehow at odds with mainstream science’s understanding of biology, evolution, genetics, etc. Unfortunately for you, your position depends upon this fabricated conflict dreamt up by you and/or your ilk. If the conflict is not there – which it most certainly isn’t – then your argument falls apart. (By the way, don’t select random quotes by McClintock, which seem to support your position; look at what her research has proven about DNA and genes.)</span></p><span data-dcnode-id="6256" instrument_node="">
</span><p data-dcnode-id="6252"><span data-dcnode-id="6255" instrument_node="">You write:</span><br data-dcnode-id="6254"><span data-dcnode-id="6253" instrument_node="">
“In 5 years of debating this online I have yet to be presented with a single scientific paper that demonstrates that random mutations produce helpful new features to the phenotype. Always asserted, never proven.” </span></p><span data-dcnode-id="6251" instrument_node="">
</span><p data-dcnode-id="6249"><span data-dcnode-id="6250" instrument_node="">Is this an April fool’s joke? In the Dover trial, Judge Jones used the words “breathtaking inanity” to describe ID’s position on this, which is similar to the one you hold. Random mutations ARE mostly detrimental. Those that aren’t provide the raw materials by which evolution creates new forms in biology. It’s not a difficult concept. Read just a tiny select few of the vast multitude of sources providing evidence for random mutation:</span></p><span data-dcnode-id="6248" instrument_node="">
</span><p data-dcnode-id="6244"><span data-dcnode-id="6247" instrument_node="">Francis and Hansche, 1972:</span><br data-dcnode-id="6246"><span data-dcnode-id="6245" instrument_node="">
The ability of bacteria to digest nylon (a substance created by humans)</span></p><span data-dcnode-id="6243" instrument_node="">
</span><p data-dcnode-id="6239"><span data-dcnode-id="6242" instrument_node="">Hall, 1981; Hall and Zuzel, 1980:</span><br data-dcnode-id="6241"><span data-dcnode-id="6240" instrument_node="">
The ability of E. coli to hydrolyze galactosylarabinose</span></p><span data-dcnode-id="6238" instrument_node="">
</span><p data-dcnode-id="6234"><span data-dcnode-id="6237" instrument_node="">Boraas, 1983; Boraas et al., 1998:</span><br data-dcnode-id="6236"><span data-dcnode-id="6235" instrument_node="">
Evolution of multicellularity in a unicellular green alga</span></p><span data-dcnode-id="6233" instrument_node="">
</span><p data-dcnode-id="6229"><span data-dcnode-id="6232" instrument_node="">Lin and Wu, 1984:</span><br data-dcnode-id="6231"><span data-dcnode-id="6230" instrument_node="">
Modification of E.coli’s fucose (a hexose deoxy sugar) pathway to metabolize propanediol.</span></p><span data-dcnode-id="6228" instrument_node="">
</span><p data-dcnode-id="6224"><span data-dcnode-id="6227" instrument_node="">Hartley, 1984:</span><br data-dcnode-id="6226"><span data-dcnode-id="6225" instrument_node="">
Evolution of Klebsiella bacteria of a new metabolic pathway for metabolizing 5-carbon sugars</span></p><span data-dcnode-id="6223" instrument_node="">
</span><p data-dcnode-id="6219"><span data-dcnode-id="6222" instrument_node="">Lang et al., 2000</span><br data-dcnode-id="6221"><span data-dcnode-id="6220" instrument_node="">
The evolution of novel proteins in the histidine biosynthesis pathway</span></p><span data-dcnode-id="6218" instrument_node="">
</span><p data-dcnode-id="6203"><span data-dcnode-id="6217" instrument_node="">For more information on this, see also:</span><br data-dcnode-id="6216"><span data-dcnode-id="6215" instrument_node="">
</span><a data-dcnode-id="6213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.talkorigins.org/faqs/fitness" rel="nofollow ugc"><span data-dcnode-id="6214" instrument_node="">http://www.talkorigins.org/faqs/fitness</span></a><br data-dcnode-id="6212"><span data-dcnode-id="6211" instrument_node="">
</span><a data-dcnode-id="6209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.talkorigins.org/faqs/fitness/spetner.html" rel="nofollow ugc"><span data-dcnode-id="6210" instrument_node="">http://www.talkorigins.org/faqs/fitness/spetner.html</span></a><br data-dcnode-id="6208"><span data-dcnode-id="6207" instrument_node="">
</span><a data-dcnode-id="6205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nmsr.org/nylon.html" rel="nofollow ugc"><span data-dcnode-id="6206" instrument_node="">http://www.nmsr.org/nylon.html</span></a><span data-dcnode-id="6204" instrument_node=""> . </span></p><span data-dcnode-id="6202" instrument_node="">
</span><p data-dcnode-id="6200"><span data-dcnode-id="6201" instrument_node="">The links to talkorigins.org pretty much wipe out the pseudo-science, ID and creationist viewpoints on the subject of random mutations. This site also shows why your analogy for random mutation is flawed. The fatal flaw of your “Quick Brown Fox” analogy is that there is no NON-RANDOM selection of the random mutations. I don’t need to repeat all the rest of it here. I will let you and your inquiring readers look at it themselves.</span></p><span data-dcnode-id="6199" instrument_node="">
</span><p data-dcnode-id="6197"><span data-dcnode-id="6198" instrument_node="">Regarding your stubbornness about random mutation, you sound like Behe when he was presented with loads of evidence for evolution of the blood-clotting cascade in the Dover trial. With a stiff upper lip, he simply said it wasn’t enough to satisfy him. If that’s your tack, then there’s no debate.</span></p><span data-dcnode-id="6196" instrument_node="">
</span><p data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">By the way, put the $10,000 you offered to Bob Allen in escrow, first, and then get an acknowledged expert in the field in question to make the judgment. The only way you can win such a silly challenge in a debate is if you are the judge, and like Behe, you refuse any evidence supporting the opposite position. Where is there any evidence that DNA is designed? This requires a designer, which is much more difficult to explain/prove than the existence of DNA itself. Scriptures and your emotional need for them are not evidence!</span></p><span data-dcnode-id="6193" instrument_node="">
</span><p data-dcnode-id="6191"><span data-dcnode-id="6192" instrument_node="">Anyway, as I said, if you’re unwilling to hear arguments from the other side, then there is no debate. It is merely one side talking and the other side ignoring what’s being said. If you’re willing to really debate what’s being discussed here, then you must question everything you hold dear (to paraphrase Descartes). Weigh the evidence in question against your position before you deny that the evidence has the power to disprove it! Maybe you should consider taking evening classes in biology at your local university.</span></p><span data-dcnode-id="6190" instrument_node="">
</span><p data-dcnode-id="6188"><span data-dcnode-id="6189" instrument_node="">One last point: To have your own theory, from the standpoint of science and not popular discourse, it needs to explain ALL the evidence. Therefore, for you (and your colleagues) to say that you have a new theory is patently false.</span></p><span data-dcnode-id="6187" instrument_node="">
</span><p data-dcnode-id="6183"><span data-dcnode-id="6186" instrument_node="">Yours in the quest for truth,</span><br data-dcnode-id="6185"><span data-dcnode-id="6184" instrument_node="">
Christopher</span></p><span data-dcnode-id="6182" instrument_node="">

</span><p data-dcnode-id="5967"><span data-dcnode-id="5968" instrument_node="">Hi Christopher,</span></p><span data-dcnode-id="5966" instrument_node="">
</span><p data-dcnode-id="5964"><span data-dcnode-id="5965" instrument_node="">I’d like to jump in on Transposons:</span></p><span data-dcnode-id="5963" instrument_node="">
</span><p data-dcnode-id="5961"><span data-dcnode-id="5962" instrument_node="">What the work showed (well, allowed extrapolation that is now showing)  is that our DNA is updated constantly.  The organism can “cut and paste” sequences of it’s geneome.  </span></p><span data-dcnode-id="5960" instrument_node="">
</span><p data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">I’ll add that the idea the mutations aren’t “random” is really nothing new, jabillions of scientists and biologiest have suspected such for a long time (see “neo-lamarckians”), indeed “random mutation” is just an idea, and almost every biologist knows this is a MAJOR problem in evolutionary theory… this isn’t anything new.  Further, every biologist now knows that the movement in the cell and of course life in general is NOT random, check this out from Harvard:</span></p><span data-dcnode-id="5957" instrument_node="">
</span><p data-dcnode-id="5954"><a data-dcnode-id="5955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ted.com/index.php/talks/david_bolinsky_animates_a_cell.html" rel="nofollow ugc"><span data-dcnode-id="5956" instrument_node="">http://www.ted.com/index.php/talks/david_bolinsky_animates_a_cell.html</span></a></p><span data-dcnode-id="5953" instrument_node="">
</span><p data-dcnode-id="5951"><span data-dcnode-id="5952" instrument_node="">Of course the ramifications of all this are very interesting, and well worth discussing.  BUT, the discussions of evolution do not need to be lost in the “origin of life” argument which is where ID proponants always seem to want to jump to.</span></p><span data-dcnode-id="5950" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="5924" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/cf5d01860841768404ce3352fa20734a%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/cf5d01860841768404ce3352fa20734a?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="5923" instrument_node="">				karri				</span><span class="says" data-dcnode-id="5921"><span data-dcnode-id="5922" instrument_node="">says:</span></span><span data-dcnode-id="5920" instrument_node="">
