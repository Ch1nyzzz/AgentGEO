</span><div class="comment-text" data-dcnode-id="5876"><span data-dcnode-id="5911" instrument_node="">
</span><p data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">In synchronicity one touches the very truth of existence itself – ‘that the universe is a mere reflection of the mind within, as the mind is and its thoughts, so the universe around forms in tandem’. The ancients had wisely stated this in two potent words as “Aham Brahmasvi”.</span></p><span data-dcnode-id="5908" instrument_node="">
</span><p data-dcnode-id="5906"><span data-dcnode-id="5907" instrument_node="">In synchronicity one realizes the fluidity of reality itself and how it is directly dependent on the mind. To reach this state of synchronicity and experience this basic truth about ourselves and the universe around us, one has to be in the here and now. And to be in the here and now, one should be free of any regret or remorse, which develops guilt and thus binds us to the past and similarly be free from any desires or aspirations, which keep us focussed in the future.</span></p><span data-dcnode-id="5905" instrument_node="">
</span><p data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">Truth is vital for synchronicity because any form of dishonesty breeds in us guilt since our conscience knows the truth. And only with a crystal clear conscience one can undertake this spiritual voyage. In spirituality, we are dealing with reality as an illusion or lie and we cannot proceed having a lie about this lie to destroy this lie.</span></p><span data-dcnode-id="5902" instrument_node="">
</span><p data-dcnode-id="5900"><span data-dcnode-id="5901" instrument_node="">When the mind is unbridled by fears of the future and doubts arising from the knowledge of the past only then can it exist without anxieties in the present. And only in the here and now are we the true architects of our destinies. This is the true rapport of the statement “do your karma, do not bother about the fruits” in the Bhagavad Gita by Lord Krishna.</span></p><span data-dcnode-id="5899" instrument_node="">
</span><p data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">Because bothering about the fruit takes us to the future and automatically apprehensions of the fruit set in. In the process, it undermines our own efforts. This is the reason all philosophies scream at us to liberate ourselves from the past and the future and be in the present because that’s where life is, in the here &amp; now. That’s why the adage, ‘past is history and the future a mystery’.</span></p><span data-dcnode-id="5896" instrument_node="">
</span><p data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">Cancel reflections by identified present thought with the sensory perceptions around you. Happens automatically in synchronicity and releases a small bubble of mania which if handled wisely will lead to your universal self.</span></p><span data-dcnode-id="5893" instrument_node="">
</span><p data-dcnode-id="5891"><span data-dcnode-id="5892" instrument_node="">At the same time continuously engage in retrospection with a non-judgmental mind will leads one to the belief that all is but my own mental projection since you can see the karmic effects. Thus due to first hand experience, denial is uprooted leading to acceptance  and and thus eliminate the associated past karma totally and release a bubble of honesty or truth. You can simply LET GO since every thing happens for the best resolution. Thus empty the cup by not creating more ripples while associating with past karma but just witnessing it to clean the karma generated and also eliminate a samskara or impression.</span></p><span data-dcnode-id="5890" instrument_node="">
</span><p data-dcnode-id="5888"><span data-dcnode-id="5889" instrument_node="">It is same as witnessing the body sensations to clean sanskaras in Vipasana since just as the external world is a mere reflection of my EGO, so is the body a mirror of the mind which is a product of past sanskaras or imprints through feelings associated with some past experiences. It can be just this life’s experiences(psychotherapy), or natal imprints forming the psyche before the baby is born or for those who believe in rebirth it could be from previous lives(past life regression, Nadi).</span></p><span data-dcnode-id="5887" instrument_node="">
</span><p data-dcnode-id="5885"><span data-dcnode-id="5886" instrument_node="">It doesn’t matter when in TIME the experiences were coz’ every moment is a resolution of all the previous moments. Thus living in the now becomes the answer. In the now alone one can experience synchronicity when every thought is accounted for by sensory reflections in the world. These reflections can be believed to cancel the thought and slowly one starts experiencing how much the outside world echoes our inner mind and vice-versa. And this Truth sets one free. Belief in the above is a natural outcome. Once belief has set in with direct experience, it is only a matter of NoN-time before your true self manifests itself while in the body.</span></p><span data-dcnode-id="5884" instrument_node="">
</span><p data-dcnode-id="5878"><span data-dcnode-id="5883" instrument_node="">OFTEN WHAT IS UNIVERSAL, WE DO NOT CONSIDER AS PERSONAL AND WHAT IS PERSONAL WE DO NOT CONSIDER AS BELONGING TO EVERYONE. WHEN WE MAKE THE UNIVERSE PERSONAL, WE BECOME RICHER, STRONGER AND WISER. BUT, WHEN WE MAKE THE PERSONAL UNIVERSAL WE WILL FIND FREEDOM, COMPASSION AND LOVE.</span><br data-dcnode-id="5882"><span data-dcnode-id="5881" instrument_node="">
</span><a data-dcnode-id="5879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ramsaik10.wordpress.com/" rel="nofollow ugc"><span data-dcnode-id="5880" instrument_node="">http://ramsaik10.wordpress.com/</span></a></p><span data-dcnode-id="5877" instrument_node="">

</span><p data-dcnode-id="5633"><a data-dcnode-id="5634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evo2.org/intelligent-bacteria/%23comments" rel="nofollow ugc"><span data-dcnode-id="5635" instrument_node="">https://evo2.org/intelligent-bacteria/#comments</span></a></p><span data-dcnode-id="5632" instrument_node="">
</span><p data-dcnode-id="5630"><span data-dcnode-id="5631" instrument_node="">Have you ever considered this question?</span></p><span data-dcnode-id="5629" instrument_node="">
</span><p data-dcnode-id="5627"><span data-dcnode-id="5628" instrument_node="">Bacteria are probably the most ubiquitous organisms in the world. </span></p><span data-dcnode-id="5626" instrument_node="">
</span><p data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">There are more bacteria in one human being than all life forms on earth together!</span></p><span data-dcnode-id="5623" instrument_node="">
</span><p data-dcnode-id="5621"><span data-dcnode-id="5622" instrument_node="">Bacteria are suited to thrive in almost every conceivable environment.</span></p><span data-dcnode-id="5620" instrument_node="">
</span><p data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">Given all this: why would bacteria ever “evolve” into a higher life form? What selective advantage would they find higher up the theorized evolutionary ladder?</span></p><span data-dcnode-id="5617" instrument_node="">

</span><p data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">Noel, I find the idea that you use Einstein to pick apart this theory interesting. Everything that Einstein published about his work is theory. It really can’t be proven right or wrong. The reason it is the law is because it tends to work and explain things. It however can not be definitively proven. For these reasons it is accepted by the world as truth and I am one of the believers. Over the course of history the same was thought of Darwin. This is also why his theory is considered scientifically as fact. It cannot be proven as we still have the missing link. Every theory has holes in it and all of this is theory. Being an IT professional I qouicly understood the connection of noise and random mutation. In my world the noise that corrupts a data file is never a good thing. It never makes a better file. DNA is data just like any program in your computer. Noise makes for a species that is likely born dead. This is why I really got the part of mutation has to be intelligent. DNA knows how to rewrite itself to overcome a problem. For lack of a better description there has to be an intelligent program that sits on top of DNA. That can not happen randomly. Your beliefs have to decide who wrote it.</span></p><span data-dcnode-id="5322" instrument_node="">

</span><p data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">So if you have a few billion instances of this code, copying itself over and over again, sooner or later you are going to get a random mutation. And yes, many mutations are dangerous but there is always that one, the one by chance (yes chance) that causes the organism to survive. </span></p><span data-dcnode-id="5067" instrument_node="">
</span><p data-dcnode-id="5065"><span data-dcnode-id="5066" instrument_node="">Now multiply this process a few billion times happening over a few billion years, you can then picture the scope of what we are talking about here. It’s very likely that these prgainisms and their random mutations could evolve into new species, as long as the mutations are beneficial.</span></p><span data-dcnode-id="5064" instrument_node="">

</span><p data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">Yes PTM, if you start with a mis-spelling “jimped” you have 1 chance in 10^73 of randomly mutating “jimped” to “jumped.”</span></p><span data-dcnode-id="4970" instrument_node="">
</span><p data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">With odds like that (generously assuming 1 BILLION mutation attempts per second), the odds are that in 3.5 billion years, random mutation would still never make that fortuitous correction even once. </span></p><span data-dcnode-id="4967" instrument_node="">
</span><p data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">Statistically, all the corrections during that time would be destructive not constructive. That’s a mathematical fact.</span></p><span data-dcnode-id="4964" instrument_node="">
</span><p data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">I have a challenge for you, PTM:</span></p><span data-dcnode-id="4961" instrument_node="">

</span><p data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">to say something substantially different or better, changing one letter at a time, without encountering severe mis-spellings in the interim – which natural selection would of course destroy before the new sentence has a chance to appear.</span></p><span data-dcnode-id="4952" instrument_node="">

-Everything in the universe is subject to entropy</span><br data-dcnode-id="4855"><span data-dcnode-id="4854" instrument_node="">
-There is nothing in the realm of human reason that is not subject to Gödel’s incompleteness theorem.</span></p><span data-dcnode-id="4852" instrument_node="">
</span><p data-dcnode-id="4846"><span data-dcnode-id="4851" instrument_node="">Math says that natural selection alone cannot beat the odds.</span><br data-dcnode-id="4850"><span data-dcnode-id="4849" instrument_node="">
Entropy says that the universe has finite age</span><br data-dcnode-id="4848"><span data-dcnode-id="4847" instrument_node="">
Gödel says that the universe cannot account for itself</span></p><span data-dcnode-id="4845" instrument_node="">
</span><p data-dcnode-id="4842"><strong data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">So I have a question for you:</span></strong></p><span data-dcnode-id="4841" instrument_node="">
</span><p data-dcnode-id="4837"><strong data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">IF</span></strong><span data-dcnode-id="4838" instrument_node=""> the evidence points towards some kind of intelligence behind the origin of the universe, are you willing to follow the evidence where it leads?</span></p><span data-dcnode-id="4836" instrument_node="">
</span><p data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">Perry</span></p><span data-dcnode-id="4833" instrument_node="">

</span><p data-dcnode-id="4801"><span data-dcnode-id="4804" instrument_node="">Hi Perry,</span><br data-dcnode-id="4803"><span data-dcnode-id="4802" instrument_node="">
I shall reply here.</span></p><span data-dcnode-id="4800" instrument_node="">
</span><p data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">The chicken-and-egg.</span></p><span data-dcnode-id="4797" instrument_node="">
</span><p data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">“There is always a chicken-and-egg problem with these questions because everyone intuitively knows, an infinite series of parents or causes is not reasonable. Somewhere we have to have a first chicken or a first egg. Philosophers almost universally reject any kind of “infinite regress of causes.”</span></p><span data-dcnode-id="4794" instrument_node="">
</span><p data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">We can’t be certain that there was a FIRST chicken or egg. What most philosophers believe only makes them universally right, but not absolute. Why should we just limit ourselves to There Was A Beginning. </span></p><span data-dcnode-id="4791" instrument_node="">
</span><p data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">Sure, the Big Bang and all. That could be just as one of plentiful events in our universe. </span></p><span data-dcnode-id="4788" instrument_node="">
</span><p data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">The start? Perhaps there was no start at all. Why? We don’t know yet. Is it  true? It’s non-intuitive so we can’t make definite conclusions. Everything around us is perceived and conceived in the human interpretation. Some things are totally non-intuitive, like who could have guessed that for a roller-coaster to perform a complete revolution it has to be launched at 2.5 the radius of the loop without doing the very clever Newtonian mechanics? Or better, the whole colossal quantum theory. It doesn’t make sense to us humans right. What all of us have been doing is just trying to debate our way through using human experience. Trying to argue from what we see, hear or believe in. No, that’s not necessarily the way, especially when trying so hard to actually decode Nature or to “read the mind of God”. </span></p><span data-dcnode-id="4785" instrument_node="">
</span><p data-dcnode-id="4783"><span data-dcnode-id="4784" instrument_node="">The idea of an Uncaused Cause is great, of course. It requires an external superintelligence. But Intelligence does not ‘ = ‘ God</span></p><span data-dcnode-id="4782" instrument_node="">
</span><p data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">If the evidence is overwhelmingly pointing towards some kind of Intelligence, I would of course believe that our universe is governed by this Intelligence. And this Intelligence can come in many forms : Superphysical Laws? God? “Other THINGS”. I use things because we don’t quite know. But of course, if you think that your evidence is definitely the truth that all of us are seeking, then you have to come up with something much more than that. Remember the roller coaster and quantum theory. And many such ideas. They are not at all intuitive. Yet they are true. We know they are.</span></p><span data-dcnode-id="4779" instrument_node="">
</span></div><span data-dcnode-id="4777" instrument_node="">

</span><p data-dcnode-id="4692"><span data-dcnode-id="4707" instrument_node="">Entropy or degree of disorder increases in all natural processes is the second law of thermodynamics assertion. This is not true. There are circumstances where entropy does not increase in natural processes.</span><br data-dcnode-id="4706"><span data-dcnode-id="4705" instrument_node="">
</span><a data-dcnode-id="4703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.bbc.co.uk/2/hi/sci/tech/2135779.stm" rel="nofollow ugc"><span data-dcnode-id="4704" instrument_node="">http://news.bbc.co.uk/2/hi/sci/tech/2135779.stm</span></a><br data-dcnode-id="4702"><span data-dcnode-id="4701" instrument_node="">
Beads of doubt</span><br data-dcnode-id="4700"><span data-dcnode-id="4699" instrument_node="">
By Dr. David Whitehouse</span><br data-dcnode-id="4698"><span data-dcnode-id="4697" instrument_node="">
BBC News Online science editor</span><br data-dcnode-id="4696"><span data-dcnode-id="4695" instrument_node="">
One of the most important principles of physics, that disorder, or entropy, always increases, has been shown to be untrue.</span><br data-dcnode-id="4694"><span data-dcnode-id="4693" instrument_node="">
Scientists at the Australian National University (ANU) have carried out an experiment involving lasers and microscopic beads that disobeys the so-called Second Law of Thermodynamics, something many scientists had considered impossible.</span></p><span data-dcnode-id="4691" instrument_node="">

</span><p data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">Michael Shermer does a fairly good dissection of this in his book “Why People Believe Weird Things”</span></p><span data-dcnode-id="4646" instrument_node="">
</span><p data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">The long and the short of it is that Evolution is not 100% random. If a mutation is beneficial it may(emphasis on may) be passed to descendants. So if you  ‘lock’ each correct character in each succeeding random search you arrive at your target sentence very, very rapidly.</span></p><span data-dcnode-id="4643" instrument_node="">
</span><p data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">Also, you don’t seem to understand what mutation is. you seem to think it means an offspring with a third eye growing on a stalk in the middle of it’s head. But this is not the case. A mutation may be a simple as a few cells that are sensitive to light. And subsequent generations may improve on this. You can actually see all sorts of stages of evolution in the eye in various animal species.</span></p><span data-dcnode-id="4640" instrument_node="">

</span><p data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">I didn’t say Mutation isn’t random, although I am not sure that either you or I are really qualified to make that statement.</span></p><span data-dcnode-id="4575" instrument_node="">
</span><p data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node="">I said that Evolution isn’t random. In Darwin’s original works, he started by observing artificial selectors amongst animal and plant breeders. HE went on from there to record Sexual Selection amongst various species. I.E. The development is dependent upon some characteristic of an animal as to whether or not he gets to breed or not(Typically it is a male). Think bright plumage on birds and bright colors on fish. It is interesting to note that the artificial selection of the breeder almost mimics the sexual selection of the female of the species I have already mentioned. It is a physical trait that causes the female to select a particular male to mate with. If you look at some brightly colored Tropical birds, or even a modern Cardinal or Robin, it is easy to understand how these traits developed. I.E. nothing random about it.</span></p><span data-dcnode-id="4572" instrument_node="">
</span><p data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">Now, when you get to natural selection, the same thing applies. If you have a species of wild animals that develops a trait that helps it survive, then it is more likely to reproduce and pass that said trait along to the next generation.</span></p><span data-dcnode-id="4569" instrument_node="">
</span><p data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">So, for example, if you are a microscopic organism and you develop the ability to wiggle your metaphorical butt(Sorry if I offend) then you may find that you can move around and find food a lot better than the other paramecium that don’t boogie. So, you are more likely to get the food and thence have lovely paramecium children.</span></p><span data-dcnode-id="4566" instrument_node="">
</span><p data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">Again, it is not random. If the microscopic organism comes across a trait that helps it survive, then it is more likely to survive and multiply. </span></p><span data-dcnode-id="4563" instrument_node="">
</span><p data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node="">Perry, before I spend more time on this, I would like you to answer one question for me. Please do not think I am being facetious or conceited and I will be more than happy to provide you with my answer to your version of this  question if you prefer. So, here it is: What evidence, if any, would you accept cause you to abandon your theory of Intelligent Design? I.E. What evidence can falsify Intelligent design in your mind.</span></p><span data-dcnode-id="4560" instrument_node="">

</span><p data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">You STILL have not proven that DNA is a code in the same way that ASCII, ROT13 or Binary is. You still have not proven that DNA follows Zipfs law either. You start with and assumption. One that you really cannot prove and then you apply it to an area outside of your expertise. Then you say that if that assumption is wrong (It is by the way but you will never admit it just as all creationists deny evidence opposing their pet theories) you will change your mind. However, it is obvious from your web site that there is absolutely NO evidence that you will accept that will make you change your mind </span></p><span data-dcnode-id="4483" instrument_node="">
</span><p data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">How about the rhythmic pulsations of a neutron start? What about the radiating shell of a chambered nautilus? Both are regularly repeating patterns that occur in nature. Are they both codes? No, they are naturally occurring instances of a repetitious pattern caused by natural forces. Exactly the same as DNA. Geneticists not only understand that DNA is not a code but they understand why DNA self assembles the way it does.</span></p><span data-dcnode-id="4480" instrument_node="">

While the argument that another designer can use a random use of fingers to press the right letter key and still produce the same result, the previous has the motive of order and mechanical adaptability of the brain based on the structure the keyboard was designed in the first place. So we forgot why the “quick fox and lazy dog” sentence was designed then. But we were designed to “mutate” to use Siri or voice activated modes that we don’t use that sentence often anymore other than being an example – but it’s not just blamed in our DNA – just like an expanding universe, we are expanding, our active participation to an unending design of an active, hands-on programmer.</span></p><span data-dcnode-id="4287" instrument_node="">

</span><div class="comment-text" data-dcnode-id="4150"><span data-dcnode-id="4178" instrument_node="">
</span><p data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">I answered you question honestly and without insult and yet, you deleted it. In no way did I attack you. If anything you insulted me by saying what I was making “anti-intellectual, anti-scientific statements” when you and anyone reading this would see that was not true. I am the one for Science, remember?</span></p><span data-dcnode-id="4175" instrument_node="">
</span><p data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">So let me try and answer your question again and see if you delete this post as well. </span></p><span data-dcnode-id="4172" instrument_node="">
</span><p data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">The Evidence will NEVER point to an unknowable and unprovable intelligence behind the origins of the Universe. Science can only prove the NATURAL and not the SUPERNATURAL and God would be in the later, since he can’t be proven with Science. If God became a fixture in our reality and provable, then possibly we could prove. </span></p><span data-dcnode-id="4169" instrument_node="">
</span><p data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">The only thing it takes to make God real is FAITH, which has no place in Science, with a capital S. </span></p><span data-dcnode-id="4166" instrument_node="">
</span><p data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">So let me AGAIN ask you some questions.</span></p><span data-dcnode-id="4163" instrument_node="">
</span><p data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">How does Math apply to Biology? </span></p><span data-dcnode-id="4160" instrument_node="">
</span><p data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">How does it explain the beauty of a single cell organism or how plants and animals live off each others wastes gases or how a human is born. Where does Math fit in there? Math lives in the realm of Physics, when it comes to Science.</span></p><span data-dcnode-id="4157" instrument_node="">
</span><p data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">How do you know that Entropy applies to the entire Universe? Do you have all the information from the Entire Cosmos to be able to make that claim? No.</span></p><span data-dcnode-id="4154" instrument_node="">
</span><p data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">I believe you were unfair by deleting my last post.</span></p><span data-dcnode-id="4151" instrument_node="">

</span><a aria-label="Reply to Jon" class="comment-reply-link" data-belowelement="comment-946" data-commentid="946" data-dcnode-id="4146" data-postid="337" data-replyto="Reply to Jon" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/ekrO_9KhL5o%23comment-946" rel="nofollow"><span data-dcnode-id="4147" instrument_node="">Reply</span></a><span data-dcnode-id="4145" instrument_node=""> </span></div><span data-dcnode-id="4143" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="4128"><span data-dcnode-id="4137" instrument_node="">
</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="4136" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="4135" instrument_node=""> </span><a class="url" data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//evo2.org/" rel="external nofollow ugc"><span data-dcnode-id="4134" instrument_node="">Perry Marshall</span></a><span data-dcnode-id="4132" instrument_node=""> </span><span class="says" data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">says:</span></span><span data-dcnode-id="4129" instrument_node="">

</span><div class="comment-meta" data-dcnode-id="4122"><span data-dcnode-id="4126" instrument_node="">
</span><a data-dcnode-id="4124" href="#comment-959"><span data-dcnode-id="4125" instrument_node="">

</span><div class="comment-text" data-dcnode-id="4035"><span data-dcnode-id="4120" instrument_node="">
</span><p data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">Yes you did attack me. You went into your “Perry you’re a man of faith” / “not a man of science” accusation – even as you dodged scientific questions. When you do that your posts will get deleted.</span></p><span data-dcnode-id="4117" instrument_node="">
</span><p data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">Math and statistics apply to everything that can be counted. Babies, fruit flies, genes, chromosomes, base pairs in DNA. Math applies to biology. There is nothing in biology that is exempt from math. Nothing in biology is exempt from the laws of physics.</span></p><span data-dcnode-id="4114" instrument_node="">
</span><p data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">That said, I give you credit for putting your finger on an important point: Math cannot quantify things like beauty. It also cannot quantify the MEANING of information, only the QUANTITY of information. Which is a major point of Shannon’s work. You can count bits and kilobytes but you can’t reduce their meaning to a single number or equation. You can’t derive the genetic code from the laws of physics even though that code ALWAYS obeys the laws of physics.</span></p><span data-dcnode-id="4111" instrument_node="">
</span><p data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">When I point out that a mis-spelled sentence like “the quick brFwn fox jumps over the lazy dog” has one chance in 10^73 of being corrected by a random mutation, that is a statistical fact. It’s the simplest way I know to demonstrate that the random mutation theory of evolution is mathematically impossible. It would take the whole history of the universe for a Pentium computer to fix that sentence with random mutations just once. And it would have to generate billions of WORSE sentences in the process.</span></p><span data-dcnode-id="4108" instrument_node="">
</span><p data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">Nowhere in the biological literature have I ever found a statistical model that shows the random mutation theory of evolution IS possible. I’m still waiting for someone to come along and send me a link to such a paper.</span></p><span data-dcnode-id="4105" instrument_node="">
</span><p data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">You come to this discussion with a pre-decided bias that says “The Evidence will NEVER point to an unknowable and unprovable intelligence behind the origins of the Universe.”</span></p><span data-dcnode-id="4102" instrument_node="">
</span><p data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">You know what’s ironic?</span></p><span data-dcnode-id="4099" instrument_node="">
</span><p data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Even the statement you just made is unprovable.</span></p><span data-dcnode-id="4096" instrument_node="">
</span><p data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">Godel’s incompleteness theorem tells us that there are ALWAYS more things that are true than can be proven.</span></p><span data-dcnode-id="4093" instrument_node="">
</span><p data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">You have not studied Godel yet you are trying to argue with me. I recommend Rebecca Goldstein’s book “Incompleteness.” I respectfully ask you, READ Godel’s work before you come here and argue about it. I do not argue topics I have not studied on this forum and I expect my readers to abide by the same principle. If you don’t know, admit you don’t know.</span></p><span data-dcnode-id="4090" instrument_node="">
</span><p data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">Somewhere along the line someone told you that faith and science are at odds. That there are people of faith, and people of science. If you understand Godel, you understand: It is impossible to practice science without exercising faith in things that you can’t prove. Godel’s proof of the incompleteness theorem was DEVASTATING to the mathematicians of his day, like Bertrand Russell. He proved that there are some things that you will never be able to prove.</span></p><span data-dcnode-id="4087" instrument_node="">
</span><p data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">I don’t believe that you can truly have a coherent philosophy of science until you’ve studied Godel.</span></p><span data-dcnode-id="4084" instrument_node="">
</span><p data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">You don’t believe that entropy is universal, yet you are claiming to be “a man of science.” It doesn’t sound like you’ve studied entropy.</span></p><span data-dcnode-id="4081" instrument_node="">
</span><p data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">You ask: How do I know that entropy applies across the universe and not just here?</span></p><span data-dcnode-id="4078" instrument_node="">
</span><p data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">I don’t. No scientist KNOWS that. It can’t be proven. Scientists can only use induction to infer it. There are no known exceptions so we posit a law.</span></p><span data-dcnode-id="4075" instrument_node="">
</span><p data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Do you remember when we talked about gravity? You criticized me for saying that we cannot PROVE the law of gravity. You told me what I said was absurd and unscientific. “Of course the law of gravity has been proven, Perry! I let go of the pencil and it falls.” </span></p><span data-dcnode-id="4072" instrument_node="">
</span><p data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">But Jon, how do YOU know that gravity is the same everywhere in the universe?</span></p><span data-dcnode-id="4069" instrument_node="">
</span><p data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">Do you know that?</span></p><span data-dcnode-id="4066" instrument_node="">
</span><p data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">You can’t prove it. You can only infer.</span></p><span data-dcnode-id="4063" instrument_node="">
</span><p data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">The law of gravity is just as reliable as the law of entropy. If you throw out one, you have no choice but to throw out the other.</span></p><span data-dcnode-id="4060" instrument_node="">
</span><p data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">Along with the rest of modern science.</span></p><span data-dcnode-id="4057" instrument_node="">
</span><p data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">I believe in gravity because pencils fall when I drop them.</span></p><span data-dcnode-id="4054" instrument_node="">
</span><p data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">I believe in entropy because candles burn out after a finite number of hours.</span></p><span data-dcnode-id="4051" instrument_node="">
</span><p data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">I believe that these are reliable, consistent observations which do not change over time or space.</span></p><span data-dcnode-id="4048" instrument_node="">
</span><p data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">Such a belief is at the core of scientific thought.</span></p><span data-dcnode-id="4045" instrument_node="">
</span><p data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">And I believe that by identical processes of reasoning, science can never prove but does 100% infer design in the universe.</span></p><span data-dcnode-id="4042" instrument_node="">
</span><p data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">If you argue against entropy, do not try to call yourself an advocate of science on this website. I will call you on it every time.</span></p><span data-dcnode-id="4039" instrument_node="">
</span><p data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">Perry</span></p><span data-dcnode-id="4036" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="4021" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/00b6b228aa94b1e794f9d9278bc5bcb8%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/00b6b228aa94b1e794f9d9278bc5bcb8?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="4020" instrument_node="">				Jon				</span><span class="says" data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">says:</span></span><span data-dcnode-id="4017" instrument_node="">
</span></div><span data-dcnode-id="4015" instrument_node="">
</span><div class="comment-meta" data-dcnode-id="4010"><span data-dcnode-id="4014" instrument_node="">
</span><a data-dcnode-id="4012" href="#comment-972"><span data-dcnode-id="4013" instrument_node="">
					July 1, 2009 at 10:00 pm				</span></a><span data-dcnode-id="4011" instrument_node="">
</span></div><span data-dcnode-id="4009" instrument_node="">
</span><div class="comment-text" data-dcnode-id="3980"><span data-dcnode-id="4008" instrument_node="">
</span><p data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">I have always maintained that we (including and especially me!) can’t know everything about the Cosmos. Human beings are not smart enough to. I admit complete ignorance and can only go with what I have learned from Science, and using my own Reason and Logic as my guides. It does seem though that the more we know, the less we know.</span></p><span data-dcnode-id="4005" instrument_node="">
</span><p data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">I am 99.9% sure there isn’t a God anywhere in the Cosmos, as one is not needed if the Universe has simply always been as I believe. Meaning no beginning and no ending so if that was the case, then a creator is not needed (and a “causeless” universe) Yet, no matter how much I know or say I know, I can never be 100% sure there is no intelligent designer to the Universe. However, nowhere in what I just said did I use the word faith. </span></p><span data-dcnode-id="4002" instrument_node="">
</span><p data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">So can I ask, are you 100% sure that there IS a God? I know you are 100% sure of your faith but the very meaning of faith is believing in something in the absence of evidence. As a person of faith, can you admit that you don’t know either? I thought that would go against the very idea of being a Christian (I was raised Christian so I know) admitting that you are not sure about God. </span></p><span data-dcnode-id="3999" instrument_node="">
</span><p data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">Now I admit that I have not read Godel and only read what Wiki has on him. I think we can both trust Wiki so that was what I was going with. If I was to read Godel, I then suggest you read Carl Sagan’s book “Pale Blue Dot”. It will better explain where I have been coming from, in terms of Science and Reason. He can it alot better than I ever could!</span></p><span data-dcnode-id="3996" instrument_node="">
</span><p data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">Of course I would never argue with something like Entropy. All I have been saying is IF there is no beginning and no ending, and the Universe has existed forever and we live in some tiny corner, then Entropy would not apply, that is all. There is no way to prove that of course but if the Cosmos has existed forever, that question, along with who designed it, is meaningless.</span></p><span data-dcnode-id="3993" instrument_node="">
</span><p data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">It is your opinion that the Universe does 100% infer design. As I said before, it would be impossible to prove your theory. But then again, you are only looking at it through the lens of your theory of information. I don’t see design anywhere as of yet. If Science has shown us anything, that there is chaos and destruction and backwards planning (example: why do we have a coat of fur in the womb or why do men have nipples?) that in no way suggests design. </span></p><span data-dcnode-id="3990" instrument_node="">
</span><p data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">And I can’t stress this fact enough that of all the life that has ever existed on the Earth, 99.9% of it is extinct. Think about that. There must have been hundreds of millions of different species of organic life that has lived on our world in its 4.5 billion year history, and yet it took the deaths of all those species to get to us and the life around us. How does that suggest Intelligent Design? </span></p><span data-dcnode-id="3987" instrument_node="">
</span><p data-dcnode-id="3985"><span data-dcnode-id="3986" instrument_node="">To me that only suggests one thing. There was some luck involved and we should be grateful that we made it this far. Think about how many planets out there that didn’t make it and where no life evolved. That, to me, would also suggest that there isn’t some intelligent designer at work. Why did some worlds fail when others made it? </span></p><span data-dcnode-id="3984" instrument_node="">
</span><p data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">In Science, for a new theory to be accepted, it has to be proven with data and supported by evidence duplicated in a lab. You don’t just go and try to disprove one theory and not replace it with another. Because saying that just because mutation seems mathematically impossible suggests design, it doesn’t. That the only way it can happen is with an intelligent designer. That is a belief, not a theory.</span></p><span data-dcnode-id="3981" instrument_node="">
</span></div><span data-dcnode-id="3979" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="3974"><span data-dcnode-id="3978" instrument_node="">
</span><a aria-label="Reply to Jon" class="comment-reply-link" data-belowelement="comment-972" data-commentid="972" data-dcnode-id="3976" data-postid="337" data-replyto="Reply to Jon" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/ekrO_9KhL5o%23comment-972" rel="nofollow"><span data-dcnode-id="3977" instrument_node="">Reply</span></a><span data-dcnode-id="3975" instrument_node=""> </span></div><span data-dcnode-id="3973" instrument_node="">

</span><li class="comment byuser comment-author-perrymarshall bypostauthor even depth-5" data-dcnode-id="3330" id="li-comment-1007"><span data-dcnode-id="3969" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="3958"><span data-dcnode-id="3967" instrument_node="">
</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="3966" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="3965" instrument_node=""> </span><a class="url" data-dcnode-id="3963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//evo2.org/" rel="external nofollow ugc"><span data-dcnode-id="3964" instrument_node="">Perry Marshall</span></a><span data-dcnode-id="3962" instrument_node=""> </span><span class="says" data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">says:</span></span><span data-dcnode-id="3959" instrument_node="">
</span></div><span data-dcnode-id="3957" instrument_node="">
</span><div class="comment-meta" data-dcnode-id="3952"><span data-dcnode-id="3956" instrument_node="">
</span><a data-dcnode-id="3954" href="#comment-1007"><span data-dcnode-id="3955" instrument_node="">

</span></div><span data-dcnode-id="3951" instrument_node="">
</span><div class="comment-text" data-dcnode-id="3904"><span data-dcnode-id="3950" instrument_node="">
</span><p data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">I am not 100% sure there is a God. To say I am would be ludicrous.</span></p><span data-dcnode-id="3947" instrument_node="">
</span><p data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">I will only say I am far beyond all reasonable doubt, for many reasons in addition to the ones you find on this website.</span></p><span data-dcnode-id="3944" instrument_node="">
</span><p data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">To believe that the universe has always been is to depart from the vast majority of mainstream science, which maintains the universe and all known space-time is ~13.8 billion years old.</span></p><span data-dcnode-id="3941" instrument_node="">
</span><p data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">To believe that the universe has always been is to reject the implications of entropy in favor of what you prefer to have faith in.</span></p><span data-dcnode-id="3938" instrument_node="">
</span><p data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">You can tell me that you are practicing science but you are making all kinds of statements of faith. Here’s a list:</span></p><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">“the Universe has simply always been as I believe.”</span></p><span data-dcnode-id="3932" instrument_node="">
</span><p data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">“no beginning and no ending so if that was the case, then a creator is not needed”</span></p><span data-dcnode-id="3929" instrument_node="">
</span><p data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">“just because mutation seems mathematically impossible suggests design, it doesn’t.”</span></p><span data-dcnode-id="3926" instrument_node="">
</span><p data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">All faith statements.</span></p><span data-dcnode-id="3923" instrument_node="">
</span><p data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">When you say that 99.9% of species are extinct (a statistic that I question BTW) and therefore there is no design – or that if there was a designer men would not have nipples – you are making a theological statement about what you personally think a designer would or would not do.</span></p><span data-dcnode-id="3920" instrument_node="">
</span><p data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Oddly enough, that is also a statement of faith.</span></p><span data-dcnode-id="3917" instrument_node="">
</span><p data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">The whole point of the “Einstein’s big blunder” article is that Einstein originally believed in a universe with no beginning and no ending and he considered it the biggest mistake of his career. When he dropped the fudge factor and accepted the implications of an expanding universe, the big bang theory came into being.</span></p><span data-dcnode-id="3914" instrument_node="">
</span><p data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">You were using your own fudge factor because you didn’t want to believe in God.</span></p><span data-dcnode-id="3911" instrument_node="">
</span><p data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">Why cling to atheism if it forces you to reject entropy and Einstein’s discoveries about space-time?</span></p><span data-dcnode-id="3908" instrument_node="">
</span><p data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">Perry</span></p><span data-dcnode-id="3905" instrument_node="">
</span></div><span data-dcnode-id="3903" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="3890" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/00b6b228aa94b1e794f9d9278bc5bcb8%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/00b6b228aa94b1e794f9d9278bc5bcb8?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="3889" instrument_node="">				Jon				</span><span class="says" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">says:</span></span><span data-dcnode-id="3886" instrument_node="">

</span><div class="comment-meta" data-dcnode-id="3879"><span data-dcnode-id="3883" instrument_node="">
</span><a data-dcnode-id="3881" href="#comment-1060"><span data-dcnode-id="3882" instrument_node="">

</span></div><span data-dcnode-id="3878" instrument_node="">
</span><div class="comment-text" data-dcnode-id="3861"><span data-dcnode-id="3877" instrument_node="">
</span><p data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">As I have said before, I am not doubting any Science as I am a man of Science. I am well aware that “our” Universe is 13.7 billion years old. All I have been saying is all the data is not in yet because we still don’t know everything. There could be a much larger universe we could never see, then again, maybe there isn’t. But there isn’t anything to think that there isn’t more out there. </span></p><span data-dcnode-id="3874" instrument_node="">
</span><p data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">I know of Einstein’s theory and at the time the leading theory was the Steady State theory. That the universe did not have a beginning or an end but now we know that is not true. Our universe had a beginning and we call it the Big Bang (which is strange, it wasn’t big and it didn’t go bang) but then again, there is nothing to say that there wasn’t anything before the big bang. It’s just that our Science has yet to discover this, that’s all. </span></p><span data-dcnode-id="3871" instrument_node="">
</span><p data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">Example, there is one thing that can travel faster than light and that’s space itself. The light we measure from the most distant objects that we can detect is around 10 billion light years away. And yet the universe is older than that and surely there are stars that are older than 10 billion, so that would suggest that the Space itself has expanded farther than we can detect. As the light from those objects hasn’t had enough time to reach us. Since the Universe is expanding, we may never get to see these very distant objects. </span></p><span data-dcnode-id="3868" instrument_node="">
</span><p data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">As for the 99.9% extinction rate, that is a fact. Granted we don’t know the entire fossil record but we from what we have learned, there are MANY more species that have died than have lived. The extinction of so much life on our planet does not suggest some kind of intelligence. </span></p><span data-dcnode-id="3865" instrument_node="">
</span><p data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">And my questions we not of a theological nature (men and nipples and our coat of fur) those are question of nature. I am not wondering why God made those, I am suggesting that these very real attributes of our lives do not suggest design, they suggest nature.</span></p><span data-dcnode-id="3862" instrument_node="">
</span></div><span data-dcnode-id="3860" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="3855"><span data-dcnode-id="3859" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="3847" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/46138a2def2dc9128a469beeed03496f?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="3846" instrument_node=""> </span><a class="url" data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//evo2.org/" rel="external nofollow ugc"><span data-dcnode-id="3845" instrument_node="">Perry Marshall</span></a><span data-dcnode-id="3843" instrument_node=""> </span><span class="says" data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">says:</span></span><span data-dcnode-id="3840" instrument_node="">

</span><div class="comment-text" data-dcnode-id="3798"><span data-dcnode-id="3831" instrument_node="">
</span><p data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">Jon,</span></p><span data-dcnode-id="3828" instrument_node="">
</span><p data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">I have made a syllogism that indicates design based on codes, as you are well aware.</span></p><span data-dcnode-id="3825" instrument_node="">
</span><p data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">Permit me to state yours in the form of a syllogism:</span></p><span data-dcnode-id="3822" instrument_node="">
</span><p data-dcnode-id="3816"><span data-dcnode-id="3821" instrument_node="">1. Nipples are useless in men</span><br data-dcnode-id="3820"><span data-dcnode-id="3819" instrument_node="">
2. Designers do not put useless things in things they design</span><br data-dcnode-id="3818"><span data-dcnode-id="3817" instrument_node="">
3. Therefore nipples are not designed.</span></p><span data-dcnode-id="3815" instrument_node="">
</span><p data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">Let’s take these in turn:</span></p><span data-dcnode-id="3812" instrument_node="">
</span><p data-dcnode-id="3806"><span data-dcnode-id="3811" instrument_node="">1. I’m not going to even bother doing a big Google search on this but I’d wager there’s at least a few people out there who can point out some function that nipples have in men.</span><br data-dcnode-id="3810"><span data-dcnode-id="3809" instrument_node="">
2. Let’s say they’re totally useless for men. They’re still a design efficiency. Because women need them and they arguably don’t consume significant resources for men. Meanwhile the amazing homology between men and women saves lots of space in DNA and human beings as a whole are better off with all of us having nipples than only half of us having nipples. If you buy a Toyota LX that doesn’t have as many features as an EX there are holes drilled in the body that are used by the EX and not the LX. The un-used holes in the LX are indication of design (rather than the opposite), because they serve an OPTIONAL function.</span><br data-dcnode-id="3808"><span data-dcnode-id="3807" instrument_node="">
3. I question that your point 3 logically follows from point 2. There’s an awful lot of subjectivity in this whole thought process.</span></p><span data-dcnode-id="3805" instrument_node="">
</span><p data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">I respectfully submit to you that my Code / DNA syllogism is airtight, as stated, and while this one is questionable on every point.</span></p><span data-dcnode-id="3802" instrument_node="">
</span><p data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">Perry</span></p><span data-dcnode-id="3799" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="3784" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/00b6b228aa94b1e794f9d9278bc5bcb8%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/00b6b228aa94b1e794f9d9278bc5bcb8?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="3783" instrument_node="">				Jon				</span><span class="says" data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">says:</span></span><span data-dcnode-id="3780" instrument_node="">

 Living organisms can overcome entropy indefinitely, as long as there is a power/food supply. Take away the sun, and its over. Eventually, the sun WILL die. Without it, entropy inevitably wins.</span></p><span data-dcnode-id="3184" instrument_node="">

</span><p data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">I am sure that most if not all scientists would agree that Science has yet to show the origins of the Genetic Code. In no way does this suggest that there has to be an Intelligent Designer, it just means we don’t know yet.</span></p><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">There could be many ways that the inorganic can become organic and DNA and information can be created. There have been experiements (again check with Carl Sagan) where they duplicated the early Earth in the lab. They mixed hydrogen, water, ammonia, methane, hydrogen sulfide along with some gases that would have been present on the early Earth. Then they sparked the mixture with lightning and after about 10 minutes, they created this kind of brown tar. This soup was a rich collection of complex organic materials, including proteins and acids. </span></p><span data-dcnode-id="3130" instrument_node="">
</span><p data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">This wasn’t life of course, but it was the ingredients for life. Again, we just don’t know yet. Remember, all biologists are extremely limited. They only have one example to test from, one recipe to read from, Life on Earth.</span></p><span data-dcnode-id="3127" instrument_node="">

</span><p data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">The problem with metaphysics is that it can’t be tested with the empirical sciences. Metaphysics is more about what you and me “think” about the Universe and that falls outside of the realm of Science. Metaphysics can create theories but not Science. </span></p><span data-dcnode-id="2844" instrument_node="">
</span><p data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Cosmology is a branch of metaphysics, and that was invented by the religions before Science. This is different from Physical Cosmology which is more about Physics and models that can be tested in Science. An example of this Metaphysical Cosmology was Copernicus’s Heliocentric theory.</span></p><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">In the days before we could really test the Science, everyone thought the Earth was the center of the Universe. You can see that the “Sun rises and Sun sets” which gives the appearance of the Earth as stationary. But when the Science caught up, it was a shock to everyone. The Earth isn’t the center of anything  so that line of Metaphysics was pushed aside.</span></p><span data-dcnode-id="2838" instrument_node="">

</span><div class="comment-text" data-dcnode-id="2667"><span data-dcnode-id="2683" instrument_node="">
</span><p data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">I don’t beleive the calcluations of a 1 in 10^73 chance for improving a spelling error in the fox sentence is correct. Even generating the sentence from scratch using a 26 letter alphabet (+1 for space)  would have a much larger probability of 1 in 44^27 (44 slots, 27 options). </span></p><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">I beleive assuming 1 random mutation which is the simplest biologically should be calculated as there is a 1 in 28 chance of which letter mutates, and 1 in 26 option of picking an improvement winner, which is 1 in 700, and not that unlikely.</span></p><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">The correct probability is critical because you argue that there is not enough time, to complete evolution through random mutation, but your probability calcultation seems highly flawed, please explain how you arrived at you figure.</span></p><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Further I don’t understand why you as a rule only one letter can mutate at a time. This is the simplset biologically, however assuming this is bad, and all 1 letter mutations die off, even if somewhat less likely, a full word mutation can occur and immediately improve the sentence. Again I beleive if you use correct statistics you are only talking about 1 in 700^5, which is quite plausible.</span></p><span data-dcnode-id="2671" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">That said I think the whole argument of why and how DNA would arise, is probably the right direction for proving God, but these argument ares as yet highly flawed.</span></p><span data-dcnode-id="2668" instrument_node="">

</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">David,</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">The calculation assumes both lower and upper case numbers, not just lower case. So it’s 52^43. Which by the way precludes in advance any other characters like punctuation marks or numbers. If we were mutating the 1’s and 0’s of ASCII characters – which would be the most analogous to mutating DNA, because it’s a 4 letter alphabet – our odds would get even worse.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Oh, and yes, my bad – I forgot about spaces! So it’s really 53 not 52.</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">You can certainly mutate more than one letter at a time, but if you experiment with it, you find that doesn’t help in the slightest. Work the numbers based on 2 mutations or more, at a time, or whole words at a time and see for yourself.  I think you’ll find it just destroys your sentence even faster.</span></p><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">For example, here’s an important question: If you have this entire sentence which is subject to mutations, what are the chances of mutations being concentrated within the same word 5 times in a row? In order for any sentence to evolve the mutations would have to concentrate in certain places. But what are the chances of even that happening?</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2621" instrument_node="">I encourage you to play with </span><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.randommutation.com/" rel="nofollow ugc"><span data-dcnode-id="2620" instrument_node="">http://www.randommutation.com</span></a><span data-dcnode-id="2618" instrument_node=""> where you can do 1 / 5 / 10 mutations at a time and you can develop an intuitive feel for it.</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">I propose to you that no amount of natural selection can save your sentence from the damage that random mutation inflicts on your sentence.</span></p><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">Perry</span></p><span data-dcnode-id="2610" instrument_node="">

</span><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Thank you for your response. However I am quite certain you are misusing the statistics. 53^43 is the probability of generating the improved sentence from a clean starting point (analogous to the monkey on the type writer generating shakespeare). Starting from a base of an existing sentence with one spelling mistake-the correct probability of the one spelling mistake mutating to the correct letter, is the probability of that specific letter mutating multiplied by the chance of it mutating to the correct letter: (assuming that we take the axiom of we are to expect a one letter mutation, otherwise m,ultipled by the chance of having a one letter mutation). This turns out to be a small probability and quite possible. Decreasing to a base 4 as opposed to base 26, significantly improves our chances, it doesnt make things worse.</span></p><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">The sentence being destroyed more and more progressively with the rnadom mutation genrator, is just falling into a logical flaw. The mutation process is not progressive by natural selection, as the bad sentences just die off. Obviosuly if the chance of the the first mutation being an improvement is 1 in 700, then there is a chance of 699 in 700 that it is bad, so for each progressive mutation 99.9% it is going to be destruvive. This doesnt matter, because by natural selection they die off. All that matters is if that 0.1% is statistically likely enough over billions of iterations and billions of years, to get from starting point to the number of mutations we need.</span></p><span data-dcnode-id="2395" instrument_node="">

</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">You are correct, and I stand corrected. My apologies and thank you for pointing this out.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">The probability of correcting “the quick brXwn fox jumped over the lazy dog” randomly is 1 chance in 43×53 or 1/2279.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">The probability of correcting “the quick brXYn fox jumped over the lazy dog randomly is that number squared, or 1/5,193,841</span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Repairing three letters in one trial would be one chance in 11,836,763,639 and so on.</span></p><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">So yes you are correct the numbers for correcting a small error in a short sentence like this are not astronomical. However if the word to be corrected is large or if we have a paragraph not a sentence, then we are in the range of billions and trillions and more.</span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">As for base 4 instead of base 26: </span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">ASCII maps text to base 2, with 7 digits.</span></p><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">If we were going to code the alphabet in base 4 we would need three digits.</span></p><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Which is exactly we have with DNA – triplets are groups of 3 base-4 digits.</span></p><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">The point being that whether we mutate ASCII (which the Random Mutation Generator does – that’s what the “binary” button is for) or mutate base pairs or mutate letters, the destruction of information is the same.</span></p><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">But allow me to return to a very subtle but important point: If you need to mutate “quick brown fox…” to “quick green fox…” without having to start over, we have to change brown to green in one step. The chances of doing this are one in trillions. The odds grow exponentially worse as the sentence grows longer.</span></p><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Because of the discrete nature of language and instructions, it is not realistically possible to evolve any sizable set of instructions with random mutation. An intelligent algorithm is a more parsimonious explanation than random chance combined with natural selection.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Perry</span></p><span data-dcnode-id="2322" instrument_node="">

</span><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">It is one thing to evolve a 43 word sentence and have some semblance of a chance given a few billions of trials.</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">It is quite another to apply these numbers to a living organism which contains vastly more information than my silly little sentence.</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">The smallest such organism is Nanoarcheaum. It has 480,000 base pairs. So it has 4^480,000 possible combinations of code which is more than 10^200,000.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">The possibility of that arising by chance is 1 in 10^200,000 which is as close to zero as anyone gets in math or science. Utterly impossible. </span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">This is not a shallow argument, this is fact. The gyrations that atheists go into to avoid backing THEIR arguments with statistics are remarkable. Bottom line is that there is no statistician in the world who can show you a model for saying this is in any way plausible.</span></p><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Some people believe in Chance with a capital C. I believe in God with a capital G.</span></p><span data-dcnode-id="2140" instrument_node="">

</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">As a non-American I have always looked up to your country as a nation upholding the Christian faith in a world that is forever evolving in an opposite direction. </span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Lately, with incidents like this I’m not so sure anymore. See article below please and comment as to what your view is on this foundation and how many similarly minded people do they represent? </span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Tuesday, July 14, 2009 4:40 PM</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Atheists Sue to Kill D.C. ‘In God We Trust’ Engraving </span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">MADISON, Wis. — The nation’s largest group of atheists and agnostics filed a lawsuit Tuesday seeking to block an architect from engraving “In God We Trust” and the Pledge of Allegiance at the Capitol Visitor Center in Washington. </span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The Madison-based Freedom From Religion Foundation’s lawsuit, filed in U.S. District Court in western Wisconsin, claims the taxpayer-funded engravings would be an unconstitutional endorsement of religion. </span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">The House and Senate passed identical resolutions this month directing the Architect of the Capitol to engrave “In God We Trust” and the pledge in prominent places at the entrance for 3 million tourists who visit the Capitol each year. </span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">The resolution came in response to critics who complained Congress spent $621 million on the new three-story underground center without paying respect to the nation’s religious heritage. The center opened in December after years of construction. </span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">The foundation is seeking a court order to stop the engravings, which the Congressional Budget Office estimates will cost less than $100,000. </span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">“In God We Trust” has been the national motto since 1956 and has appeared on U.S. currency since 1957. </span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">The lawsuit says both the motto and the words “under God” in the pledge were adopted during the Cold War as anti-communism measures. Engraving them at the entrance to the U.S. Capitol would discriminate against those who do not practice religion and unfairly promote a Judeo-Christian perspective, it says. </span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">The group also is challenging the constitutionality of the National Day of Prayer in federal court. In 2007, the U.S. Supreme Court ruled 5-4 that foundation members could not sue to stop parts of President George W. Bush’s faith-based initiative. </span></p><span data-dcnode-id="1505" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="1447" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/9b49b5ebfe3e890fca4f3cf3a451e474%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/9b49b5ebfe3e890fca4f3cf3a451e474?s=96&amp;d=mm&amp;r=g 2x" width="48"><span data-dcnode-id="1446" instrument_node="">				Joe Grenon				</span><span class="says" data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">says:</span></span><span data-dcnode-id="1443" instrument_node="">

</span><div class="comment-meta" data-dcnode-id="1436"><span data-dcnode-id="1440" instrument_node="">
