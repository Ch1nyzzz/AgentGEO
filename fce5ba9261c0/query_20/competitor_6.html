Answer:</span></p><span data-dcnode-id="1521" instrument_node="">
</span><ol data-dcnode-id="1498"><span data-dcnode-id="1520" instrument_node="">
</span><li data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">As per Fundamental Rights of the Constitution, all citizens enjoy this rights without any discrimination.</span></li><span data-dcnode-id="1517" instrument_node="">
</span><li data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">All citizens have right to equality.</span></li><span data-dcnode-id="1514" instrument_node="">
</span><li data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">All citizens are equal in the court of law. So, equal protection can be obtained of all laws.</span></li><span data-dcnode-id="1511" instrument_node="">
</span><li data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Such discrimination cannot be kept in government jobs or entry in higher education.</span></li><span data-dcnode-id="1508" instrument_node="">
</span><li data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Due to many inequality in India, big groups have to suffer loss.</span></li><span data-dcnode-id="1505" instrument_node="">
</span><li data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">So, each group of government has made special arrangements as an exception.</span></li><span data-dcnode-id="1502" instrument_node="">
</span><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Therefore, Reserved seats are kept for weaker and backward section of the society.</span></li><span data-dcnode-id="1499" instrument_node="">
</span></ol><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1496" instrument_node="">Question 6.</span><br data-dcnode-id="1495"><span data-dcnode-id="1494" instrument_node="">
Constitution, National Flag and National Anthem cannot be disrespected.</span><br data-dcnode-id="1493"><span data-dcnode-id="1492" instrument_node="">
Answer:</span></p><span data-dcnode-id="1490" instrument_node="">
</span><ol data-dcnode-id="1479"><span data-dcnode-id="1489" instrument_node="">
</span><li data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Various Fundamental Duties were incorporated by Constitution Amendment in 1976.</span></li><span data-dcnode-id="1486" instrument_node="">
</span><li data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Among the Fundamental Duties of each citizen is to abide by the Constitution and respect its ideals and institutions, the National Anthem and the National Flag.</span></li><span data-dcnode-id="1483" instrument_node="">
</span><li data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Thus, the National flag and the National anthem cannot be disregarded, and violation of this is a punishable offence.</span></li><span data-dcnode-id="1480" instrument_node="">
</span></ol><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><img alt="GSEB Solutions Class 9 Social Science Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy" data-dcnode-id="1477" data-pin-nopin="true" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1474" instrument_node="">Question 7.</span><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">
One must join the military forces if country requires.</span><br data-dcnode-id="1471"><span data-dcnode-id="1470" instrument_node="">
Answer:</span></p><span data-dcnode-id="1468" instrument_node="">
</span><ol data-dcnode-id="1457"><span data-dcnode-id="1467" instrument_node="">
</span><li data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">As per Fundamental Duties corporated in the Constitution in 1976, every citizen of India should contribute towards the protection of Nation’s unity, integrity and sovereignty.</span></li><span data-dcnode-id="1464" instrument_node="">
</span><li data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">People who violets this duties are punishable by law.</span></li><span data-dcnode-id="1461" instrument_node="">
</span><li data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">To protect the national unity and integrity if the country requires a common citizen must join the military forces.</span></li><span data-dcnode-id="1458" instrument_node="">
</span></ol><span data-dcnode-id="1456" instrument_node="">
</span></div><span data-dcnode-id="1453" instrument_node="">
</span></div><span data-dcnode-id="1451" instrument_node="">
</span></article><span data-dcnode-id="1448" instrument_node="">

</span><span class="author-name" data-dcnode-id="1369" itemprop="name"><span data-dcnode-id="1370" instrument_node="">Bhagya</span></span><span data-dcnode-id="1368" instrument_node="">

</span><span data-dcnode-id="1355" data-mobile-size="720" id="dpsp-post-sticky-bar-markup"></span><span data-dcnode-id="1354" data-image-pin-it="false" id="dpsp-post-content-markup"></span><p data-dcnode-id="1349"><span data-dcnode-id="1353" instrument_node="">Gujarat Board </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gsebsolutions.com/gseb-solutions-class-9-science/"><span data-dcnode-id="1352" instrument_node="">GSEB Textbook Solutions Class 9 Science</span></a><span data-dcnode-id="1350" instrument_node=""> Chapter 14 Natural Resources Textbook Questions and Answers, Notes Pdf.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><h2 data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Gujarat Board Textbook Solutions Class 9 Science Chapter 14 Natural Resources</span></h2><span data-dcnode-id="1345" instrument_node="">
</span><h3 data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Gujarat Board Class 9 Science Natural Resources InText Questions and Answers</span></h3><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" style="color: #0000ff;"><span data-dcnode-id="1341" instrument_node="">Page 193</span></span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1337" instrument_node="">Question 1.</span><br data-dcnode-id="1336"><span data-dcnode-id="1335" instrument_node="">
How is our atmosphere different from the atmospheres on Venus and Mars?</span><br data-dcnode-id="1334"><span data-dcnode-id="1333" instrument_node="">
Answer:</span><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">
The atmosphere of the Earth contains a mixture of gases like nitrogen, oxygen, carbon dioxide and water vapour. This helps to support life as the amount of carbon dioxide on the Earth’s atmosphere is low compared to other gases. However, the atmosphere of Venus and Mars consists mainly of carbon dioxide which is not suitable to sustain life in these planets.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="1328" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" style="font-weight: inherit;" width="167"></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1325" instrument_node="">Question 2.</span><br data-dcnode-id="1324"><span data-dcnode-id="1323" instrument_node="">
How does the atmosphere act as a blanket?</span><br data-dcnode-id="1322"><span data-dcnode-id="1321" instrument_node="">
Answer:</span><br data-dcnode-id="1320"><span data-dcnode-id="1319" instrument_node="">
The atmosphere acts as a blanket because:</span></p><span data-dcnode-id="1317" instrument_node="">
</span><ul data-dcnode-id="1306"><span data-dcnode-id="1316" instrument_node="">
</span><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">It keeps the average temperature of the Earth fairly constant.</span></li><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">It prevents a sudden increase in temperature during the daylight hours.</span></li><span data-dcnode-id="1310" instrument_node="">
</span><li data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">&nbsp;It slows down the escape of heat into outer space during the night.</span></li><span data-dcnode-id="1307" instrument_node="">
</span></ul><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1304" instrument_node="">Question 3.</span><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">
What causes winds?</span><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">
Answer:</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">
Due to the unequal heating of land and water, the land get heated up faster during the day, the air on land rises up and creates a region of low pressure. As a result, the air over the sea moves towards the region of low pressure formed on the land. This causes winds to flow.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1295" instrument_node="">Question 4.</span><br data-dcnode-id="1294"><span data-dcnode-id="1293" instrument_node="">
How are clouds formed?</span><br data-dcnode-id="1292"><span data-dcnode-id="1291" instrument_node="">
Answer:</span><br data-dcnode-id="1290"><span data-dcnode-id="1289" instrument_node="">
Water gets evaporated from water bodies and through biological activities of the organisms. This water goes into the air as water vapour. When the air rises up, it expands and cools which causes the water vapour to condense around the particles suspended in the air to form tiny droplets. This results in the formation of clouds.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="1286" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1283" instrument_node="">Question 5.</span><br data-dcnode-id="1282"><span data-dcnode-id="1281" instrument_node="">
List any three human activities that you think would lead to air pollution.</span><br data-dcnode-id="1280"><span data-dcnode-id="1279" instrument_node="">
Answer:</span><br data-dcnode-id="1278"><span data-dcnode-id="1277" instrument_node="">
The human activities that would lead to air pollution are:</span></p><span data-dcnode-id="1275" instrument_node="">
</span><ul data-dcnode-id="1264"><span data-dcnode-id="1274" instrument_node="">
</span><li data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Burning of coal in thermal power plants to generate electricity.</span></li><span data-dcnode-id="1271" instrument_node="">
</span><li data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Burning of fuels like petrol and diesel in vehicles.</span></li><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Large scale deforestation.</span></li><span data-dcnode-id="1265" instrument_node="">
</span></ul><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" style="color: #0000ff;"><span data-dcnode-id="1262" instrument_node="">Page – 194</span></span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1258" instrument_node="">Question 1.</span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">
Why do organisms need water?</span><br data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">
Living organisms need water for:</span></p><span data-dcnode-id="1252" instrument_node="">
</span><ul data-dcnode-id="1244"><span data-dcnode-id="1251" instrument_node="">
</span><li data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Carrying out the various metabolic and biochemical processes taking place in the body.</span></li><span data-dcnode-id="1248" instrument_node="">
</span><li data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Transportation of the various substances from one part of the body to the other in the organisms.</span></li><span data-dcnode-id="1245" instrument_node="">
</span></ul><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1242" instrument_node="">Question 2.</span><br data-dcnode-id="1241"><span data-dcnode-id="1240" instrument_node="">
What is the major source of freshwater in the city/town/village where you live?</span><br data-dcnode-id="1239"><span data-dcnode-id="1238" instrument_node="">
Answer:</span><br data-dcnode-id="1237"><span data-dcnode-id="1236" instrument_node="">
The major source of water is the rivers and underground water resources.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1233" instrument_node="">Question 3.</span><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">
Do you know of any activity which may he pollute this water source?</span><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">
Answer:</span><br data-dcnode-id="1228"><span data-dcnode-id="1227" instrument_node="">
The activity which pollutes the water resource are:</span></p><span data-dcnode-id="1225" instrument_node="">
</span><ul data-dcnode-id="1217"><span data-dcnode-id="1224" instrument_node="">
</span><li data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Excessive use of fertilisers and pesticides which get washed into the water bodies pollute the water resources.</span></li><span data-dcnode-id="1221" instrument_node="">
</span><li data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">The sewage water which is directly drained into the rivers.</span></li><span data-dcnode-id="1218" instrument_node="">
</span></ul><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" style="color: #0000ff;"><span data-dcnode-id="1215" instrument_node="">Page – 196</span></span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1211" instrument_node="">Question 1.</span><br data-dcnode-id="1210"><span data-dcnode-id="1209" instrument_node="">
How is soil formed?</span><br data-dcnode-id="1208"><span data-dcnode-id="1207" instrument_node="">
Answer:</span><br data-dcnode-id="1206"><span data-dcnode-id="1205" instrument_node="">
Soil is formed due to various physical, chemical and biological processes which result in the breakdown of rocks into fine particles of soil over millions of years. The formation of soil occurs due to factors and processes like Sun, water, wind, living organisms and lichens.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">1. Sun: Rocks expand when they get heated by the Sun during the day. During the night, the rocks cool down and contract. This results in the formation of cracks in the rocks as the rate of expansion and contraction are different. The rocks split and break into smaller pieces.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="1199" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">2. Water: Water acts in two ways to break the large rocks into small pieces. Water enters the cracks and crevices in the rocks, gets unevenly heated by the Sun and when it expands during freezing in the winter season, the rocks get broken. Also, the fast running water over the surface of the rocks causes weathering of rocks to form soil.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">3. Wind: Winds carry small rocks and sand from one place to another and these strong winds rub against the large rocks to erode them.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">4. Living organisms (Lichens): The chemical substances secreted by the living organisms like lichens degrade the rocks and convert them into fine particles of soil.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1187" instrument_node="">Question 2.</span><br data-dcnode-id="1186"><span data-dcnode-id="1185" instrument_node="">
What is soil erosion?</span><br data-dcnode-id="1184"><span data-dcnode-id="1183" instrument_node="">
Answer:</span><br data-dcnode-id="1182"><span data-dcnode-id="1181" instrument_node="">
The process by which the fertile topsoil gets removed is called soil erosion.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1178" instrument_node="">Question 3.</span><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">
What are the methods of preventing or reducing soil erosion?</span><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">
Answer:</span><br data-dcnode-id="1173"><span data-dcnode-id="1172" instrument_node="">
The methods to prevent soil erosion are:</span></p><span data-dcnode-id="1170" instrument_node="">
</span><ul data-dcnode-id="1153"><span data-dcnode-id="1169" instrument_node="">
</span><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Overgrazing by cattle should be avoided.</span></li><span data-dcnode-id="1166" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Large scale afforestation should be done as roots of the plants prevent the soil from getting carried away.</span></li><span data-dcnode-id="1163" instrument_node="">
</span><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Increasing the vegetation cover on the ground reduces the impact of flowing water on soil and prevents it from getting washed away.</span></li><span data-dcnode-id="1160" instrument_node="">
</span><li data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Contour farming can be done by ploughing the land in furrows across the natural slope of the land to trap water flowing down.</span></li><span data-dcnode-id="1157" instrument_node="">
</span><li data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Step farming is practised in hilly regions which reduce the flow of water and give it more time to percolate into the soil.</span></li><span data-dcnode-id="1154" instrument_node="">
</span></ul><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1150" style="color: #0000ff;"><span data-dcnode-id="1151" instrument_node="">Page – 201</span></span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1147" instrument_node="">Question 1.</span><br data-dcnode-id="1146"><span data-dcnode-id="1145" instrument_node="">
What are the different states in which water is found during the water cycle?</span><br data-dcnode-id="1144"><span data-dcnode-id="1143" instrument_node="">
Answer:</span><br data-dcnode-id="1142"><span data-dcnode-id="1141" instrument_node="">
Water is found in three different states during the water cycle:</span></p><span data-dcnode-id="1139" instrument_node="">
</span><ul data-dcnode-id="1128"><span data-dcnode-id="1138" instrument_node="">
</span><li data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Solid: in the form of ice or snow</span></li><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Liquid: in the form of water (Hi)</span></li><span data-dcnode-id="1132" instrument_node="">
</span><li data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Gas: in the form of water vapour.</span></li><span data-dcnode-id="1129" instrument_node="">
</span></ul><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1126" instrument_node="">Question 2.</span><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
Name two biologically important compounds that contain both oxygen and nitrogen.</span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">
Answer:</span><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node="">
Proteins and the nucleic acids (DNA and RNA) are biologically important compounds which contain both oxygen and nitrogen.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1116"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="1117" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1114" instrument_node="">Question 3.</span><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">
List any three human activities which would lead to an increase in the carbon dioxide content of the air.</span><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
Answer:</span><br data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">
The human activities which would lead to an increase in the carbon dioxide content of the air are:</span></p><span data-dcnode-id="1106" instrument_node="">
</span><ul data-dcnode-id="1095"><span data-dcnode-id="1105" instrument_node="">
</span><li data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Burning of coal in thermal power plants to generate electricity.</span></li><span data-dcnode-id="1102" instrument_node="">
</span><li data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Burning of fuels like petrol and diesel in vehicles.</span></li><span data-dcnode-id="1099" instrument_node="">
</span><li data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Large scale deforestation which results in loss of green plants and trees which utilise carbon dioxide during photosynthesis.</span></li><span data-dcnode-id="1096" instrument_node="">
</span></ul><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1093" instrument_node="">Question 4.</span><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">
What is the greenhouse effect?</span><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">
Answer:</span><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">
The phenomenon in which the incoming sunlight is allowed to pass through the atmosphere but heat radiated back from the planet’s surface is trapped by the gases like carbon dioxide, water vapour and methane present in the atmosphere is called the greenhouse effect.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1084" instrument_node="">Question 5.</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">
What are the two forms of oxygen found in the atmosphere?</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
Answer:</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">
The oxygen is found in the atmosphere in two forms:</span></p><span data-dcnode-id="1076" instrument_node="">
</span><ul data-dcnode-id="1062"><span data-dcnode-id="1075" instrument_node="">
</span><li data-dcnode-id="1070"><span data-dcnode-id="1074" instrument_node="">As a diatomic molecule 0</span><sub data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">2</span></sub><span data-dcnode-id="1071" instrument_node="">, that contains two atoms of oxygen.</span></li><span data-dcnode-id="1069" instrument_node="">
</span><li data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node="">As triatomic molecule 0</span><sub data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">3</span></sub><span data-dcnode-id="1065" instrument_node="">, that contains three atoms of oxygen. It is called as ozone.</span></li><span data-dcnode-id="1063" instrument_node="">
</span></ul><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" style="color: #0000ff;"><span data-dcnode-id="1060" instrument_node="">In-Text Activities Solved</span></span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" style="color: #0000ff;"><span data-dcnode-id="1056" instrument_node="">(Textbook Page 190)</span></span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1052" instrument_node="">Activity 14.1</span><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">
Measure the temperature of the following: Take –</span></p><span data-dcnode-id="1048" instrument_node="">
</span><ol data-dcnode-id="1037"><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">a beaker full of water</span></li><span data-dcnode-id="1044" instrument_node="">
</span><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">a beaker full of soil/sand</span></li><span data-dcnode-id="1041" instrument_node="">
</span><li data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">a closed bottle containing a thermometer.</span></li><span data-dcnode-id="1038" instrument_node="">
</span></ol><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Keep them in bright sunlight for three hours. Now measure the temperature of all 3 vessels. Also, take the temperature reading in shade at the same time.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1032" instrument_node="">Question 1.</span><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node="">
Is the temperature reading more inactivity (i) or (ii)?</span><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">
Answer:</span><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">
The temperature reading is more inactivity (ii).</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1023" instrument_node="">Question 2.</span><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">
Based on the above finding, which would become hot faster – the land or the sea?</span><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">
Answer:</span><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">
The land will become hot faster.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1014" instrument_node="">Question 3.</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">
Is the thermometer reading of the temperature of air (in shade) the same as the temperature of sand or water? What do you think is the reason for this? And why does the temperature have to be measured in the shade?</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">
Answer:</span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">
The temperature reading of air (in shade) is less than the temperature of sand and water. The reason behind this is that the land and the water directly receive the radiations of the Sun.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="1005" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1002" instrument_node="">Question 4.</span><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">
Is the temperature of air in the closed glass vessel/bottle the same as the temperature taken in the open air?</span></p><span data-dcnode-id="998" instrument_node="">
</span><ol data-dcnode-id="990"><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">What do you think is the reason for this?</span></li><span data-dcnode-id="994" instrument_node="">
</span><li data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Do we ever come across this phenomenon in daily life?</span></li><span data-dcnode-id="991" instrument_node="">
</span></ol><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="988" instrument_node="">Answer:</span><br data-dcnode-id="987"><span data-dcnode-id="986" instrument_node="">
The temperature of the air in the closed glass vessel/ bottle is more than the temperature taken in the open air.</span><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">
1. The reason for this is that glass allows radiations of the Sun to enter but does not allow the heat radiations reflected back to escape from it.</span><br data-dcnode-id="983"><span data-dcnode-id="982" instrument_node="">
2. This phenomenon has been termed as the greenhouse effect. It can be easily observed in a car parked in the Sun with all the windows closed. The temperature inside the car becomes more than the temperature outside it.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" style="color: #0000ff;"><span data-dcnode-id="979" instrument_node="">(Textbook Page 190)</span></span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="975" instrument_node="">Activity 14.2</span><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">
Place a candle in a beaker or wide-mouthed bottle and light it. Light an incense stick and take it to the mouth of the above bottle (Figure is shown below).</span><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">
Question 1.</span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">
Which way does the smoke flow when the incense stick is kept near the edge of the mouth?</span><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">
Answer:</span><br data-dcnode-id="966"><span data-dcnode-id="965" instrument_node="">
The smoke flows inwards towards the flame as the hot air around the flame rises up to create a region of low pressure and the air from outside which is at higher pressure rushes in. So, the smoke is carried towards the flame.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="962" instrument_node="">Question 2.</span><br data-dcnode-id="961"><span data-dcnode-id="960" instrument_node="">
Which way does the smoke flow when the incense stick is kept a little above the candle?</span><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">
Answer:</span><br data-dcnode-id="957"><span data-dcnode-id="956" instrument_node="">
The hot air rises up and the smoke rises up along with it.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="953" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="950" instrument_node="">Question 3.</span><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node="">
Which way does the smoke flow when the incense stick is kept in other regions?</span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node="">
Answer:</span><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node="">
The smoke rises up, spreads and diffuses in the air when incense stick is kept in other regions.</span><br data-dcnode-id="943"><span data-dcnode-id="942" instrument_node="">
</span><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources " class="alignnone size-full wp-image-1182" data-dcnode-id="941" data-recalc-dims="1" height="226" loading="lazy" sizes="(max-width: 366px) 100vw, 366px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/gsebsolutions.com/wp-content/uploads/2020/08/GSEB-Solutions-Class-9-Science-Chapter-14-Natural-Resources-1.png%3Fresize%3D366%252C226%26ssl%3D1&amp;raw" srcset="https://i2.wp.com/gsebsolutions.com/wp-content/uploads/2020/08/GSEB-Solutions-Class-9-Science-Chapter-14-Natural-Resources-1.png?w=366&amp;ssl=1 366w, https://i2.wp.com/gsebsolutions.com/wp-content/uploads/2020/08/GSEB-Solutions-Class-9-Science-Chapter-14-Natural-Resources-1.png?resize=300%2C185&amp;ssl=1 300w" width="366"></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" style="color: #0000ff;"><span data-dcnode-id="938" instrument_node="">(Textbook Page 191)</span></span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Activity 14.3</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Take an empty bottle of the sort in which bottled water is sold. Pour about 5-10 mL of water into it and close the bottle tightly. Shake it well or leave it out in the Sun for ten minutes. This causes the air in the bottle to be saturated with water vapour.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Now, take a lighted incense stick. Open the cap of the bottle and allow some of the smoke from the incense stick to enter the bottle. Quickly close the bottle once more. Make sure that the cap is fitting tightly. Press the bottle hard between your hands and crush it as much as possible. Wait for a few seconds and release the bottle. Again press the bottle as hard as you can.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="925" instrument_node="">Question 1.</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">
When did you observe that the air inside seemed to become ‘foggy’?</span><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node="">
Answer:</span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
When we stop pressing and crushing the bottle and the pressure inside the bottle is released, the air inside seems to become “foggy”.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="916" instrument_node="">Question 2.</span><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">
When does this fog disappear?</span><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">
Answer:</span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">
The fog disappears when the bottle is pressed again.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="907" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="904" instrument_node="">Question 3.</span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">
When is the pressure inside the bottle higher?</span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">
Answer:</span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">
The pressure inside the bottle is higher when we press or crush the bottle.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="895" instrument_node="">Question 4.</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">
Is the ‘fog* observed when the pressure in the bottle is high or when it is low?</span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">
Answer:</span><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">
The fog is observed when the pressure inside the bottle is low.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="886" instrument_node="">Question 5.</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
What is the need for smoke particles inside the bottle for this experiment?</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">
Answer:</span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
The smoke particles act as a nucleus around which the water vapour gets condensed to form tiny droplets.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="877" instrument_node="">Question 6.</span><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">
What might happen if you do the experiment without the smoke from the incense stick? Now try it and check if the prediction was correct. What might be happening in the above experiment in the absence of smoke particles?</span><br data-dcnode-id="874"><span data-dcnode-id="873" instrument_node="">
Answer:</span><br data-dcnode-id="872"><span data-dcnode-id="871" instrument_node="">
The fog formation does not occur without the smoke. The tiny droplets are not formed as nothing is available to act as a nucleus for the condensation of water vapour.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" style="color: #0000ff;"><span data-dcnode-id="868" instrument_node="">(Textbook Page 192)</span></span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Activity 14.4</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="861" instrument_node="">Collect information from newspapers or weather reports on television about rainfall patterns across the country.</span><br data-dcnode-id="860"><span data-dcnode-id="859" instrument_node="">
Also, find out how to construct a rain gauge and make one. What precautions are necessary in order to get reliable data from this rain-gauge? Now answer the following questions:</span><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">
Question 1.</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">
In which month did your city/town/village get the maximum rainfall?</span><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">
Answer:</span><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">
The maximum rainfall in our city/town/village occurred in the month of July and August due to the Southwest monsoon.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="848" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="845" instrument_node="">Question 2.</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">
In which month did your state/union territory get the maximum rainfall?</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
Answer:</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
The maximum rainfall in our state/union territory also occurs in the month of July and August due to the Southwest monsoon.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="836" instrument_node="">Question 3.</span><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
Is rain always accompanied by thunder and lightning? If not, in which season do you get more of thunder and lightning with the rain?</span><br data-dcnode-id="833"><span data-dcnode-id="832" instrument_node="">
Answer:</span><br data-dcnode-id="831"><span data-dcnode-id="830" instrument_node="">
No, rain is not always accompanied by thunder and lightning. Thunder and lightning occur more during the rains which occur in the rainy season.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" style="color: #0000ff;"><span data-dcnode-id="827" instrument_node="">(Textbook Page 192)</span></span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="823" instrument_node="">Activity 14.5</span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">
Question 1.</span><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">
Find out more about monsoons and cyclones from the library. Try and find out the rainfall pattern of any other country. Is the monsoon responsible for rains the world over?</span><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
Answer:</span></p><span data-dcnode-id="815" instrument_node="">
</span><ul data-dcnode-id="804"><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">The student can find this from the internet and other resources. Do it yourself.</span></li><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">The rainfall pattern is decided by the prevailing wind patterns in the region.</span></li><span data-dcnode-id="808" instrument_node="">
</span><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Yes, monsoon is responsible for the rains in most parts of the world.</span></li><span data-dcnode-id="805" instrument_node="">
</span></ul><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" style="color: #0000ff;"><span data-dcnode-id="802" instrument_node="">(Textbook Page 193)</span></span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="798" instrument_node="">Activity 14.6</span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">
Question 1.</span><br data-dcnode-id="795"><span data-dcnode-id="794" instrument_node="">
Organisms called lichens are found to be very sensitive to the levels of contaminants like sulphur dioxide in the air. As discussed earlier in section 7.3.3, lichens can be commonly found growing on the barks of trees as a thin greenish-white crust. See if you can find lichen growing on the trees in your locality.</span><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">
Answer:</span><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">
The lichens can be found on the bark of trees in hilly areas or unpolluted areas. They are not found in polluted areas.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="787" instrument_node="">Question 2.</span><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">
Compare the lichen on trees near busy roads and trees some distance away.</span><br data-dcnode-id="784"><span data-dcnode-id="783" instrument_node="">
Answer:</span><br data-dcnode-id="782"><span data-dcnode-id="781" instrument_node="">
The lichens on trees near busy roads are blackish compared to the lichens found on trees some distance away.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="778" instrument_node="">Question 3.</span><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">
On the trees near roads, compare the incidence of lichen on the side facing the road and on the side away from the road.</span><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">
Answer:</span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">
The lichens on the side facing the road are more blackish compared to the side away from the road. Also, more lichens are there on side facing away from the road.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="769" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" style="color: #0000ff;"><span data-dcnode-id="766" instrument_node="">(Textbook Page 193)</span></span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="762" instrument_node="">Activity 14.7</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
Many municipal corporations are trying water-harvesting techniques to improve the availability of water.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="757" instrument_node="">Question 1.</span><br data-dcnode-id="756"><span data-dcnode-id="755" instrument_node="">
Find out what these techniques are and how they would increase the water that is available for use.</span><br data-dcnode-id="754"><span data-dcnode-id="753" instrument_node="">
Answer:</span><br data-dcnode-id="752"><span data-dcnode-id="751" instrument_node="">
The techniques of rainwater harvesting are:</span></p><span data-dcnode-id="749" instrument_node="">
</span><ol data-dcnode-id="741"><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">The water is taken underground by the roadside drains. The underground water can be utilised by making wells or installing tubewells.</span></li><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">The rooftop rainwater harvesting technique can be used to collect the rainwater from the rooftop in a storage tank or recharge the underground water level by allowing it to flow underground through a deep pit in the ground.</span></li><span data-dcnode-id="742" instrument_node="">
</span></ol><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" style="color: #0000ff;"><span data-dcnode-id="739" instrument_node="">(Textbook Page 193)</span></span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="735" instrument_node="">Activity 14.8</span><br data-dcnode-id="734"><span data-dcnode-id="733" instrument_node="">
Question 1.</span><br data-dcnode-id="732"><span data-dcnode-id="731" instrument_node="">
Select a small area (say, 1 m</span><sup data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">2</span></sup><span data-dcnode-id="728" instrument_node="">) near a water-body, it may be a river, stream, lake or pond. Count the number of different animals and plants in this area. Also, check the number of individuals of each type or species.</span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
Answer:</span><br data-dcnode-id="725"><span data-dcnode-id="724" instrument_node="">
Count the number of different animals and plants in the area and tabulate your results. You will find a large number of plants and animals near a waterbody.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="721" instrument_node="">Question 2.</span><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node="">
Compare this with the number of individuals (both animals and plants) found in an area of the same size in a dry, rocky region.</span><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node="">
Answer:</span><br data-dcnode-id="716"><span data-dcnode-id="715" instrument_node="">
Count the number of different animals and plants in the area and tabulate your results. You will find a limited number of plants and animals near a dry, rocky region.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="712" instrument_node="">Question 3.</span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
Is the variety of plant and animal life the same in both these areas?</span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
Answer:</span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">
No, variety of plant and animal life is different in both areas. The area near a water body has a greater diversity than the dry, rocky region.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" style="color: #0000ff;"><span data-dcnode-id="703" instrument_node="">(Textbook Pages 193-194)</span></span></p><span data-dcnode-id="700" instrument_node="">

</span><ul data-dcnode-id="683"><span data-dcnode-id="696" instrument_node="">
</span><li data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">Select and mark out a small area (about 1 m</span><sup data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">2</span></sup><span data-dcnode-id="692" instrument_node="">) in some unused land in or near your school.</span></li><span data-dcnode-id="690" instrument_node="">
</span><li data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">As in the above activity, count the number of different animals and plants in this area and the number of individuals of each species.</span></li><span data-dcnode-id="687" instrument_node="">
</span><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Remember to do this in the same place twice in a year, once during summer or the dry season and once after it has rained.</span></li><span data-dcnode-id="684" instrument_node="">

No</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="672" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="670" instrument_node="">

In the rainy season.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="660" instrument_node="">Question 3.</span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">
In which season did you find more number of individuals of each variety?</span><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node="">

In the rainy season.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" style="color: #0000ff;"><span data-dcnode-id="651" instrument_node="">(Textbook Page 195)</span></span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="647" instrument_node="">Activity 14.10</span><br data-dcnode-id="646"><span data-dcnode-id="645" instrument_node="">
Take some soil and put it into a beaker containing water. The water should be at least five times the amount of soil taken. Stir the soil and water vigorously and allow the soil to settle down. Observe after some time.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="642" instrument_node="">Question 1.</span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">
Is the soil at the bottom of the beaker homogeneous or have layers formed?</span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">
Answer:</span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
The soil is not homogeneous. The soil gets arranged in layers.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="633" instrument_node="">Question 2.</span><br data-dcnode-id="632"><span data-dcnode-id="631" instrument_node="">
If layers have formed, how is one layer different from another?</span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">
Answer:</span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">
Yes, the layers are different in respect of the particle size, colour and composition.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="624" instrument_node="">Question 3.</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">
Is there anything floating on the surface of the water?</span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node="">
Answer:</span><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">
Yes, the dead and partially decomposed parts of plants are seen floating on the water surface.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="615" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="612" instrument_node="">Question 4.</span><br data-dcnode-id="611"><span data-dcnode-id="610" instrument_node="">
Do you think some substances would have dissolved in the water? How would you check?</span><br data-dcnode-id="609"><span data-dcnode-id="608" instrument_node="">
Answer:</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">
Yes, some substances would have dissolved in the water. It can be checked by first leaving the water undisturbed for soil to settle down, decant the water in a porcelain dish and then evaporate the water from solution by heating. A powdered substance can be observed in the dish after the water gets evaporated fully. The powdered substance is the substances dissolved in water.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" style="color: #0000ff;"><span data-dcnode-id="603" instrument_node="">(Textbook Page 196)</span></span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Activity 14.11</span></p><span data-dcnode-id="597" instrument_node="">
</span><ul data-dcnode-id="563"><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Take two identical trays and fill them with soil. Plant mustard or green gram or paddy in one of the trays and water both the trays regularly for a few days, till the first tray is covered by plant growth. Now, tilt both the trays and fix them in that position. Make sure that both the trays are tilted at the same angle. Pour an equal amount of water gently on both trays such that the water flows out of the trays as shown in the figure below.</span></li><span data-dcnode-id="593" instrument_node="">
</span><li data-dcnode-id="587"><span data-dcnode-id="592" instrument_node="">&nbsp;Study the amount of soil that is carried out of the trays. Is the amount the same in both the trays?</span><br data-dcnode-id="591"><span data-dcnode-id="590" instrument_node="">
Answer:</span><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">
No, the amount of soil carried away is slightly more in the tray without plants.</span></li><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">&nbsp;Now pour equal amounts of water on both the trays from a height. Pour three or four times the amount that you poured earlier.</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="575"><span data-dcnode-id="582" instrument_node="">Study the amount of soil that is carried out of the trays now. Is the amount the same in both the trays?</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
Answer:</span><br data-dcnode-id="579"><span data-dcnode-id="578" instrument_node="">
No, the amount of soil carried away is far more in the tray that does not have plants as compared to the</span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">
one with plants.</span></li><span data-dcnode-id="574" instrument_node="">
</span><li data-dcnode-id="565"><span data-dcnode-id="573" instrument_node="">&nbsp;Is the amount of soil that is carried out more or less or equal to the amount washed out earlier?</span><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">
Answer:</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">
Earlier the amount of soil washed out was less.</span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node="">
</span><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources " class="alignnone size-full wp-image-1183" data-dcnode-id="566" data-recalc-dims="1" height="309" loading="lazy" sizes="(max-width: 643px) 100vw, 643px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/08/GSEB-Solutions-Class-9-Science-Chapter-14-Natural-Resources-2.png%3Fresize%3D643%252C309%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/08/GSEB-Solutions-Class-9-Science-Chapter-14-Natural-Resources-2.png?w=643&amp;ssl=1 643w, https://i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/08/GSEB-Solutions-Class-9-Science-Chapter-14-Natural-Resources-2.png?resize=300%2C144&amp;ssl=1 300w" width="643"></li><span data-dcnode-id="564" instrument_node="">
</span></ul><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" style="color: #0000ff;"><span data-dcnode-id="561" instrument_node="">(Textbook Page 199)</span></span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Activity 14.12</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="554" instrument_node="">Question 1.</span><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">
Find out what the consequences of global warming would be.</span><br data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">
Answer:</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">
The consequences of global warming would be:</span></p><span data-dcnode-id="546" instrument_node="">
</span><ul data-dcnode-id="532"><span data-dcnode-id="545" instrument_node="">
</span><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">The snow of the mountains will melt at a faster rate which will increase the amount of water in the rivers. This will result in floods and huge damage to human life and vegetation.</span></li><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Polar ice caps will melt at a faster rate, the sea level will rise and many coastal areas may get submerged.</span></li><span data-dcnode-id="539" instrument_node="">
</span><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Many animals that are not able to survive the variation of temperature would become extinct.</span></li><span data-dcnode-id="536" instrument_node="">
</span><li data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">The wildlife would get affected adversely.</span></li><span data-dcnode-id="533" instrument_node="">
</span></ul><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="530" instrument_node="">Question 2.</span><br data-dcnode-id="529"><span data-dcnode-id="528" instrument_node="">
Also, find out the names of some other greenhouse gases.</span><br data-dcnode-id="527"><span data-dcnode-id="526" instrument_node="">
Answer:</span><br data-dcnode-id="525"><span data-dcnode-id="524" instrument_node="">
Apart from carbon dioxide, the other greenhouse gases are methane, CFCs and water vapour.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="521" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" style="color: #0000ff;"><span data-dcnode-id="518" instrument_node="">(Textbook Page 201)</span></span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="514" instrument_node="">Activity 14.13</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">
Question 1.</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
Find out which other molecules are thought to damage the ozone layer.</span><br data-dcnode-id="509"><span data-dcnode-id="508" instrument_node="">
Answer:</span><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">
The other molecules which damage the ozone layer are:</span></p><span data-dcnode-id="504" instrument_node="">
</span><ul data-dcnode-id="493"><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Many hydrocarbons</span></li><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Bromochloromethane</span></li><span data-dcnode-id="497" instrument_node="">
</span><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Pesticides like methyl bromide</span></li><span data-dcnode-id="494" instrument_node="">
</span></ul><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="491" instrument_node="">Question 2.</span><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node="">
Newspaper reports often talk about the hole in the ozone layer.</span><br data-dcnode-id="488"><span data-dcnode-id="487" instrument_node="">
Answer:</span><br data-dcnode-id="486"><span data-dcnode-id="485" instrument_node="">
Newspaper reports talk about the hole in the ozone layer which was first discovered over Antarctica in 1985. The ozone hole refers to the thinning of the ozone layer which has been caused due to the excessive use of ozone-depleting substances like the CFCs.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">The ozone layer absorbs the harmful ultraviolet radiations of the Sun which can cause cataract, cancers, skin diseases and damage animal and plant life. Montreal Protocol was signed by nations in 1987 and in 1994, the United Nations declared that 16th September will be celebrated as ‘World Ozone Day’.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="479" instrument_node="">Question 3.</span><br data-dcnode-id="478"><span data-dcnode-id="477" instrument_node="">
Find out whether the size of this hole is changing and in what manner scientists think this would affect life on Earth (figure is given below).</span><br data-dcnode-id="476"><span data-dcnode-id="475" instrument_node="">
</span><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources " class="alignnone size-full wp-image-1184" data-dcnode-id="474" data-recalc-dims="1" height="194" loading="lazy" sizes="(max-width: 605px) 100vw, 605px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/gsebsolutions.com/wp-content/uploads/2020/08/GSEB-Solutions-Class-9-Science-Chapter-14-Natural-Resources-3.png%3Fresize%3D605%252C194%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/gsebsolutions.com/wp-content/uploads/2020/08/GSEB-Solutions-Class-9-Science-Chapter-14-Natural-Resources-3.png?w=605&amp;ssl=1 605w, https://i1.wp.com/gsebsolutions.com/wp-content/uploads/2020/08/GSEB-Solutions-Class-9-Science-Chapter-14-Natural-Resources-3.png?resize=300%2C96&amp;ssl=1 300w" width="605"><br data-dcnode-id="473"><span data-dcnode-id="472" instrument_node="">
Satellite picture showing the hole (magenta colour) in the ozone layer over Antarctica</span><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">
Answer:</span><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">
Loss of ozone layer was around 3% during 1981. By 2005, the ozone hole increased to about 24 million sq km which is approximately equal to North America in size.</span></p><span data-dcnode-id="466" instrument_node="">
</span><h3 data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Gujarat Board Class 9 Science Natural Resources Textbook Questions and Answers</span></h3><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="462" instrument_node="">Question 1.</span><br data-dcnode-id="461"><span data-dcnode-id="460" instrument_node="">
Why is the atmosphere essential for life?</span><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">
Answer:</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">The atmosphere is essential for life because</span></p><span data-dcnode-id="453" instrument_node="">
</span><ol data-dcnode-id="439"><span data-dcnode-id="452" instrument_node="">
</span><li data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">It keeps the average temperature of the Earth fairly constant.</span></li><span data-dcnode-id="449" instrument_node="">
</span><li data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">It prevents a sudden increase in temperature during the daylight hours.</span></li><span data-dcnode-id="446" instrument_node="">
</span><li data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">It slows down the escape of heat into outer space during the night.</span></li><span data-dcnode-id="443" instrument_node="">
</span><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">The gases like oxygen, carbon dioxide and nitrogen present in the air help in sustaining life on Earth.</span></li><span data-dcnode-id="440" instrument_node="">
</span></ol><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="437" instrument_node="">Question 2.</span><br data-dcnode-id="436"><span data-dcnode-id="435" instrument_node="">
Why is water essential for life?</span><br data-dcnode-id="434"><span data-dcnode-id="433" instrument_node="">
Answer:</span><br data-dcnode-id="432"><span data-dcnode-id="431" instrument_node="">
Water is essential for life because it helps in</span></p><span data-dcnode-id="429" instrument_node="">
</span><ul data-dcnode-id="421"><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Carrying out various metabolic and biochemical processes taking place in the body of living organisms.</span></li><span data-dcnode-id="425" instrument_node="">
</span><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Transportation of various substances from one part of the body to the other in living organisms.</span></li><span data-dcnode-id="422" instrument_node="">
</span></ul><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="419" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="416" instrument_node="">Question 3.</span><br data-dcnode-id="415"><span data-dcnode-id="414" instrument_node="">
How are living organisms dependent on the soil? Are organisms that live in water totally independent of soil as a resource?</span><br data-dcnode-id="413"><span data-dcnode-id="412" instrument_node="">
Answer:</span><br data-dcnode-id="411"><span data-dcnode-id="410" instrument_node="">
Living organisms are dependent on the soil as soil provides</span></p><span data-dcnode-id="408" instrument_node="">
</span><ul data-dcnode-id="394"><span data-dcnode-id="407" instrument_node="">
</span><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Habitat for the living organisms.</span></li><span data-dcnode-id="404" instrument_node="">
</span><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Provides nourishment, food and nutrients to various organisms.</span></li><span data-dcnode-id="401" instrument_node="">
</span><li data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Burrowing animals live in the burrows made in the soil, e.g., rabbit, rats.</span></li><span data-dcnode-id="398" instrument_node="">
</span><li data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">The minerals and water present in the soil support the growth of plants which provide food for animals.</span></li><span data-dcnode-id="395" instrument_node="">
</span></ul><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">No, the organisms that live in water are not totally independent of soil as a resource as the decomposers present in the soil beds inside water help in recycling various nutrients dissolved in water, which support the life of these organisms. The nutrients released from the soiled are present in a dissolved state in the water used by the aquatic organisms.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="389" instrument_node="">Question 4.</span><br data-dcnode-id="388"><span data-dcnode-id="387" instrument_node="">
You have seen weather reports on television and in newspapers. How do you think we are able to predict the weather?</span><br data-dcnode-id="386"><span data-dcnode-id="385" instrument_node="">
Answer:</span><br data-dcnode-id="384"><span data-dcnode-id="383" instrument_node="">
The weather can be predicted by analysing the wind patterns prevailing in an area as these wind patterns decide the pattern of the rainfall there. The regions of high pressure and low pressure can be ascertained by studying the direction of flow of air. The rain in India is caused due to South-west monsoon and North-east monsoon. Most rains occur during the South-west monsoon as it covers a large part of the country.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="380" instrument_node="">Question 5.</span><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node="">
We know that many human activities lead to increasing levels of pollution of the air, water¬bodies and soil. Do you think that isolating these activities to specific and limited areas would help in reducing pollution?</span><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node="">
Answer:</span><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">
Yes, if human activities that lead to increasing levels of pollution of the air, water-bodies and soil are isolated to specific and limited areas, it would help in reducing pollution.</span></p><span data-dcnode-id="372" instrument_node="">
</span><ul data-dcnode-id="355"><span data-dcnode-id="371" instrument_node="">
</span><li data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Proper waste management practices can reduce water and land pollution.</span></li><span data-dcnode-id="368" instrument_node="">
</span><li data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">The water released from the homes and industries can be treated to remove harmful impurities before discharging them into the water bodies.</span></li><span data-dcnode-id="365" instrument_node="">
</span><li data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">The heated water released from the industries harms the aquatic organisms. It can be allowed to cool down before discharging it into water bodies.</span></li><span data-dcnode-id="362" instrument_node="">
</span><li data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">The industries and factories can be shifted away from residential areas to reduce the menace of noise pollution and air pollution.</span></li><span data-dcnode-id="359" instrument_node="">
</span><li data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">The harmful gases released from the vehicles, power plants and industries can be treated to make them free of poisonous gases and particulate matter, before being released.</span></li><span data-dcnode-id="356" instrument_node="">
</span></ul><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><img alt="GSEB Solutions Class 9 Science Chapter 14 Natural Resources" data-dcnode-id="353" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="350" instrument_node="">Question 6.</span><br data-dcnode-id="349"><span data-dcnode-id="348" instrument_node="">
Write a note on how forests influence the quality of our air, soil and water resources.</span><br data-dcnode-id="347"><span data-dcnode-id="346" instrument_node="">
Answer:</span><br data-dcnode-id="345"><span data-dcnode-id="344" instrument_node="">
Forests play an important role and influence the quality of air, soil and water resources as they:</span></p><span data-dcnode-id="342" instrument_node="">
</span><ol data-dcnode-id="322"><span data-dcnode-id="341" instrument_node="">
</span><li data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Maintain the balance of oxygen and carbon dioxide in nature by fixing carbon dioxide and releasing oxygen during photosynthesis.</span></li><span data-dcnode-id="338" instrument_node="">
</span><li data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">The roots of the trees in the forests bind the soil tightly and prevent soil erosion.</span></li><span data-dcnode-id="335" instrument_node="">
</span><li data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">The forests help to maintain the water cycle in nature.</span></li><span data-dcnode-id="332" instrument_node="">
</span><li data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Forests play an important role in the biogeochemical cycles.</span></li><span data-dcnode-id="329" instrument_node="">
</span><li data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">The roots of the tress and the plants help to trap the flowing water and increase its percolation into the ground.</span></li><span data-dcnode-id="326" instrument_node="">
</span><li data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">The forests help in maintaining the temperature of the surrounding environment.</span></li><span data-dcnode-id="323" instrument_node="">
</span></ol><span data-dcnode-id="321" instrument_node="">
</span></div><span data-dcnode-id="318" instrument_node="">
</span></div><span data-dcnode-id="316" instrument_node="">
