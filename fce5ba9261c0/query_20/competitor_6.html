</span><h1 class="entry-title" data-dcnode-id="2597" itemprop="headline"><span data-dcnode-id="2598" instrument_node="">GSEB Solutions Class 9 Social Science Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy</span></h1><div class="entry-meta" data-dcnode-id="2581"><span class="posted-on" data-dcnode-id="2592"><span class="published" data-dcnode-id="2595" itemprop="datePublished"><span data-dcnode-id="2596" instrument_node=""> September 11, 2020</span></span><span class="updated" data-dcnode-id="2593" itemprop="dateModified"><span data-dcnode-id="2594" instrument_node=""> January 6, 2021</span></span></span><span data-dcnode-id="2591" instrument_node=""> / By </span><span class="posted-by vcard author" data-dcnode-id="2583" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="2590" instrument_node=""> </span><a class="url fn n" data-dcnode-id="2585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gsebsolutions.com/author/prasanna/" itemprop="url" rel="author" title="View all posts by Prasanna"><span data-dcnode-id="2589" instrument_node="">

</span><div class="entry-content clear" data-dcnode-id="1455" itemprop="text"><span data-dcnode-id="2574" instrument_node="">
</span><span data-dcnode-id="2573" data-mobile-size="720" id="dpsp-post-sticky-bar-markup"></span><span data-dcnode-id="2572" data-image-pin-it="false" id="dpsp-post-content-markup"></span><p data-dcnode-id="2567"><span data-dcnode-id="2571" instrument_node="">Gujarat Board </span><a data-dcnode-id="2569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gsebsolutions.com/gseb-class-9-social-science-notes/"><span data-dcnode-id="2570" instrument_node="">GSEB Textbook Solutions Class 9 Social Science</span></a><span data-dcnode-id="2568" instrument_node=""> Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy Textbook Questions and Answers, Additional Important Questions, Notes Pdf.</span></p><span data-dcnode-id="2566" instrument_node="">
</span><h2 data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Fundamental Rights, Fundamental Duties and Directive Principles of State Policy Class 9 GSEB Solutions Social Science Chapter 9</span></h2><span data-dcnode-id="2563" instrument_node="">
</span><h3 data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Gujarat Board Class 9 Social Science Rise of Fundamental Rights, Fundamental Duties and Directive Principles of State Policy Textbook Questions and Answers</span></h3><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2558" style="color: #0000ff;"><span data-dcnode-id="2559" instrument_node="">1. Answer the following questions given below:</span></span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2548"><span data-dcnode-id="2555" instrument_node="">Question 1.</span><br data-dcnode-id="2554"><span data-dcnode-id="2553" instrument_node="">
Write in brief about Fundamental Rights being incorporated in the Constitution.</span><br data-dcnode-id="2552"><span data-dcnode-id="2551" instrument_node="">
Answer:</span><br data-dcnode-id="2550"><span data-dcnode-id="2549" instrument_node="">
Those rights, which are necessary for every human being in order to achieve an around development are known as Fundamental Rights. There are six Fundamental Rights which have been incorporated in the Constitution:</span></p><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">1. Right to Equality:</span></p><span data-dcnode-id="2544" instrument_node="">
</span><ol data-dcnode-id="2530"><span data-dcnode-id="2543" instrument_node="">
</span><li data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">The rights that consider every citizen ‘Equal before Law’ and provide ‘Equal protection of Law’ are called Rights to Equality.</span></li><span data-dcnode-id="2540" instrument_node="">
</span><li data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">This right ensures that citizens will not be discriminated on the basis of their caste, sex, race, grounds of religion, place of birth, etc. and will be treated equally.</span></li><span data-dcnode-id="2537" instrument_node="">
</span><li data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">However, there are certain provisions for women, scheduled castes, etc. so as to bring these segments of society inequality to the rest of the society.</span></li><span data-dcnode-id="2534" instrument_node="">
</span><li data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">To safeguard equality, the Constitution of India prohibits the State from granting any titles. Also citizens of India are not allowed to accept any titles from a foreign state.</span></li><span data-dcnode-id="2531" instrument_node="">
</span></ol><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2524"><span data-dcnode-id="2528" instrument_node="">Go through these Social Science Chapter 9 </span><a data-dcnode-id="2526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gsebsolutions.com/gseb-class-9-social-science-notes-chapter-9/" title="GSEB Class 9 Social Science Notes Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy"><span data-dcnode-id="2527" instrument_node="">Fundamental Rights, Fundamental Duties and Directive Principles of State Policy GSEB Class 9 Notes </span></a><span data-dcnode-id="2525" instrument_node="">to score well in your exam.</span></p><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2522" instrument_node="">2. Right to Freedom:</span><br data-dcnode-id="2521"><span data-dcnode-id="2520" instrument_node="">
This Right to Freedom gives every individual the freedom:</span></p><span data-dcnode-id="2518" instrument_node="">
</span><ol data-dcnode-id="2498"><span data-dcnode-id="2517" instrument_node="">
</span><li data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">of Speech and expression.</span></li><span data-dcnode-id="2514" instrument_node="">
</span><li data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">to assemble peacefully without arms.</span></li><span data-dcnode-id="2511" instrument_node="">
</span><li data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">to form associations of unions.</span></li><span data-dcnode-id="2508" instrument_node="">
</span><li data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">to move freely within the territory of India.</span></li><span data-dcnode-id="2505" instrument_node="">
</span><li data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">to live and settle in any part of India.</span></li><span data-dcnode-id="2502" instrument_node="">
</span><li data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">to practice any profession, business or occupation.</span></li><span data-dcnode-id="2499" instrument_node="">
</span></ol><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">We live in a society and so we need to maintain its social structure. Hence, although these six freedoms are given to citizens they enjoy them with certain restrictions and limitations.</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">3. Rights against Exploitation:</span></p><span data-dcnode-id="2491" instrument_node="">
</span><ol data-dcnode-id="2480"><span data-dcnode-id="2490" instrument_node="">
</span><li data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">This right safeguards women and children and others against exploitation of various forms.</span></li><span data-dcnode-id="2487" instrument_node="">
</span><li data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">This right ensure protection against any exploitation like forced labour, low wages compared to standard wages, working in unhygienic and unsafe environment, child labour, etc.</span></li><span data-dcnode-id="2484" instrument_node="">
</span><li data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Under Right to Exploitation, one cannot be biased for carrying out state welfare works, military services, social services, etc. on the ground of their religion, caste, gender or creed.</span></li><span data-dcnode-id="2481" instrument_node="">
</span></ol><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">4. Right to Freedom of Religion:</span></p><span data-dcnode-id="2476" instrument_node="">
</span><ol data-dcnode-id="2460"><span data-dcnode-id="2475" instrument_node="">
</span><li data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">India does not have any national religion. Also it does not follow the ideals or principles of any particular religion.</span></li><span data-dcnode-id="2472" instrument_node="">
</span><li data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">The right to freedom against religion says that every person is equally permitted to enjoy the freedom his conscience permits and has the right to acknowledge, practice and spread his religion.</span></li><span data-dcnode-id="2469" instrument_node="">
</span><li data-dcnode-id="2465"><span data-dcnode-id="2468" instrument_node="">There are certain restrictions put on this right to maintain public law and order,</span><br data-dcnode-id="2467"><span data-dcnode-id="2466" instrument_node="">
morality and peace in the country.</span></li><span data-dcnode-id="2464" instrument_node="">
</span><li data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">People are free to conduct and run religious affairs. This included the freedom to establish and maintain charitable institutions to manage religious affairs and acquire and manage movable and immovable property for religious proposes without going against the law.</span></li><span data-dcnode-id="2461" instrument_node="">
</span></ol><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">5. Cultural and Educational Rights:</span></p><span data-dcnode-id="2456" instrument_node="">
</span><ol data-dcnode-id="2442"><span data-dcnode-id="2455" instrument_node="">
</span><li data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">These rights allow a person whether belonging to minority or majority to maintain its culture and obtain education about his culture and religion.</span></li><span data-dcnode-id="2452" instrument_node="">
</span><li data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Under Cultural and Education Rights, any citizen can get admission in educational institution or a granted institution without getting discriminated on the ground of religion, caste, creed or language.</span></li><span data-dcnode-id="2449" instrument_node="">
</span><li data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">The Indian Constitution also states that religious and language minority groups will have the right to administer and start their own educational institution.</span></li><span data-dcnode-id="2446" instrument_node="">
</span><li data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">It also states that no minority, other than the ones suggested in the Article will have the right to establish any institution.</span></li><span data-dcnode-id="2443" instrument_node="">
</span></ol><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">6. Right to Constitutional Remedies:</span></p><span data-dcnode-id="2438" instrument_node="">
</span><ol data-dcnode-id="2421"><span data-dcnode-id="2437" instrument_node="">
</span><li data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Right to Constitutional Remedies is a special feature of our Constitution.</span></li><span data-dcnode-id="2434" instrument_node="">
</span><li data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">This right provides an opportunity to the citizens to approach court in case of violation of their Fundamental Right.</span></li><span data-dcnode-id="2431" instrument_node="">
</span><li data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Dr. Ambedkar considered this right as the ‘Soul of the Constitution’.</span></li><span data-dcnode-id="2428" instrument_node="">
</span><li data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">In case any Fundamental Right of a person is violated, he can make use of right i.e., Right to Constitutional Remedies and seek justice from the court of law.</span></li><span data-dcnode-id="2425" instrument_node="">
</span><li data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">If the court finds that any Fundamental Right of a person is violated, it can issue a ‘writ’ i.e., a legal notice to the one who is depriving the person of this right.</span></li><span data-dcnode-id="2422" instrument_node="">
</span></ol><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418"><img alt="GSEB Solutions Class 9 Social Science Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy" data-dcnode-id="2419" data-pin-nopin="true" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="2417" instrument_node="">
</span><p data-dcnode-id="2411"><span data-dcnode-id="2416" instrument_node="">Question 2.</span><br data-dcnode-id="2415"><span data-dcnode-id="2414" instrument_node="">
Describe the importance of Directive Principles of State Policy.</span><br data-dcnode-id="2413"><span data-dcnode-id="2412" instrument_node="">
Answer:</span></p><span data-dcnode-id="2410" instrument_node="">
</span><ol data-dcnode-id="2390"><span data-dcnode-id="2409" instrument_node="">
</span><li data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">The Directive Principles of State Policy (DPSP) serve as guidelines for the states and union as how they can administer the state in a rightful manner.</span></li><span data-dcnode-id="2406" instrument_node="">
</span><li data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">These principles reflect the kind of nation and society we wish to establish.</span></li><span data-dcnode-id="2403" instrument_node="">
</span><li data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">They talk about how the ideals presented in the Preamble can be implemented.</span></li><span data-dcnode-id="2400" instrument_node="">
</span><li data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">They incorporate rights that are required for the overall development of mankind.</span></li><span data-dcnode-id="2397" instrument_node="">
</span><li data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">They aim at attaining political, social and economic democracy.</span></li><span data-dcnode-id="2394" instrument_node="">
</span><li data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">To fulfil this aim the Directive Principles are bifurcated into various sections.</span></li><span data-dcnode-id="2391" instrument_node="">
</span></ol><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2388" instrument_node="">Question 3.</span><br data-dcnode-id="2387"><span data-dcnode-id="2386" instrument_node="">
Explain the importance of Fundamental Rights.</span><br data-dcnode-id="2385"><span data-dcnode-id="2384" instrument_node="">
Answer:</span><br data-dcnode-id="2383"><span data-dcnode-id="2382" instrument_node="">
Importance of Fundamental Rights:</span></p><span data-dcnode-id="2380" instrument_node="">
</span><ol data-dcnode-id="2342"><span data-dcnode-id="2379" instrument_node="">
</span><li data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Fundamental Rights allow human beings to live a dignified life.</span></li><span data-dcnode-id="2376" instrument_node="">
</span><li data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">These rights are stated in our Constitution and so they enjoy a legal status.</span></li><span data-dcnode-id="2373" instrument_node="">
</span><li data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">A democratic country allows its citizens to enjoy equal rights.</span></li><span data-dcnode-id="2370" instrument_node="">
</span><li data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">These rights give citizens freedom to express themselves.</span></li><span data-dcnode-id="2367" instrument_node="">
</span><li data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Citizens enjoy these rights without any discrimination.</span></li><span data-dcnode-id="2364" instrument_node="">
</span><li data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">The Government and the Constitution protect these rights and see that people enjoy them.</span></li><span data-dcnode-id="2361" instrument_node="">
</span><li data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">These rights provide quality to citizens and protect them from several forms of exploitation.</span></li><span data-dcnode-id="2358" instrument_node="">
</span><li data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">They also provide certain types of freedom to the citizens. Freedom of speech and expression, freedom to move throughout India, settle in any part of country, follow any religion, etc. are all freedom that a person enjoys under Fundamental Rights.</span></li><span data-dcnode-id="2355" instrument_node="">
</span><li data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">These rights also allow one to continue and expand one’s culture.</span></li><span data-dcnode-id="2352" instrument_node="">
</span><li data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Every citizen gets a right to obtain education, work in a clean, hygienic and safe environment, enter public places like parks, theaters, etc.</span></li><span data-dcnode-id="2349" instrument_node="">
</span><li data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">If a citizen does not get these rights then as per Right to Constitutional Remedies he can also go to the court to seek justice.</span></li><span data-dcnode-id="2346" instrument_node="">
</span><li data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Thus, Fundamental Rights are extremely important for growth, development and prosperity of a nation and its citizens.</span></li><span data-dcnode-id="2343" instrument_node="">
</span></ol><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2335"><span data-dcnode-id="2340" instrument_node="">Question 4.</span><br data-dcnode-id="2339"><span data-dcnode-id="2338" instrument_node="">
What is reasonable control and limitation?</span><br data-dcnode-id="2337"><span data-dcnode-id="2336" instrument_node="">
Answer:</span></p><span data-dcnode-id="2334" instrument_node="">
</span><ol data-dcnode-id="2314"><span data-dcnode-id="2333" instrument_node="">
</span><li data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Our Constitution has given six different freedoms to all Indians. Indians are free to enjoy these rights.</span></li><span data-dcnode-id="2330" instrument_node="">
</span><li data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">On the other hand the fact is that we live in a society and so we need to maintain its social structure.</span></li><span data-dcnode-id="2327" instrument_node="">
</span><li data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Hence, although these six freedoms are given to citizens they enjoy them with certain restrictions or say reasonable control and limitations.</span></li><span data-dcnode-id="2324" instrument_node="">
</span><li data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">The Constitution has imposed certain restrictions on these freedoms. These restrictions are laid to achieve specific special purpose.</span></li><span data-dcnode-id="2321" instrument_node="">
</span><li data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Certain strict rules and prohibitions have been put on matters related to maintaining public order, national unity, integrity, contempt of court, defamation, public decency and morality, inciting someone for violence, etc.</span></li><span data-dcnode-id="2318" instrument_node="">
</span><li data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">A person has freedom of speech and expression but the State has the authority to prohibit use of such spoken or written words that promote disharmony, feeling of enmity, hatred or ill-will between people or in the society.</span></li><span data-dcnode-id="2315" instrument_node="">
</span></ol><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2312" instrument_node="">Question 5.</span><br data-dcnode-id="2311"><span data-dcnode-id="2310" instrument_node="">
Write about Preventive Detention.</span><br data-dcnode-id="2309"><span data-dcnode-id="2308" instrument_node="">
Answer:</span><br data-dcnode-id="2307"><span data-dcnode-id="2306" instrument_node="">
Prevention Detention:</span></p><span data-dcnode-id="2304" instrument_node="">
</span><ol data-dcnode-id="2284"><span data-dcnode-id="2303" instrument_node="">
</span><li data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">It is a preventive action taken to prevent possible commitment of crime.</span></li><span data-dcnode-id="2300" instrument_node="">
</span><li data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">If government feels something suspicious about someone who may cause some serious harm to the society, then it may arrest him under prevention detention for some time.</span></li><span data-dcnode-id="2297" instrument_node="">
</span><li data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">The arrested person is not punished but detained to stop him from committing crime.</span></li><span data-dcnode-id="2294" instrument_node="">
</span><li data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Under prevention detention, it is not necessary to present the arrested person before the magistrate.</span></li><span data-dcnode-id="2291" instrument_node="">
</span><li data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">It can be extended only for 3 months. After that the case is brought before an advisory board for review.</span></li><span data-dcnode-id="2288" instrument_node="">
</span><li data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">The detention order can be cancelled based on the opinion of the Judge of the Supreme Court or Members of Advisory Board. The state can decide the term of detention.</span></li><span data-dcnode-id="2285" instrument_node="">
</span></ol><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2281"><img alt="GSEB Solutions Class 9 Social Science Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy" data-dcnode-id="2282" data-pin-nopin="true" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2279" instrument_node="">Question 6.</span><br data-dcnode-id="2278"><span data-dcnode-id="2277" instrument_node="">
Mention Fundamental Duties as mentioned in the Constitution.</span><br data-dcnode-id="2276"><span data-dcnode-id="2275" instrument_node="">
Answer:</span><br data-dcnode-id="2274"><span data-dcnode-id="2273" instrument_node="">
Following Fundamental Duties have been listed in our Constitution:</span></p><span data-dcnode-id="2271" instrument_node="">
</span><ol data-dcnode-id="2236"><span data-dcnode-id="2270" instrument_node="">
</span><li data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">To abide by an respect the Constitution, the National Flag, and the National Anthem.</span></li><span data-dcnode-id="2267" instrument_node="">
</span><li data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">To cherish and follow the noble ideas of our national freedom struggle.</span></li><span data-dcnode-id="2264" instrument_node="">
</span><li data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">To uphold and protect sovereignty, unity and integrity of India.</span></li><span data-dcnode-id="2261" instrument_node="">
</span><li data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">To defend the country and render national services as and when required.</span></li><span data-dcnode-id="2258" instrument_node="">
</span><li data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">To promote common brotherhood of all people in India and renounce practices derogatory to the dignity of women.</span></li><span data-dcnode-id="2255" instrument_node="">
</span><li data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">To value and preserve the rich heritage of the nation’s composite culture.</span></li><span data-dcnode-id="2252" instrument_node="">
</span><li data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">To protect and improve the natural environment including forests, lakes, rivers, wildlife and to have compassion for living creatures.</span></li><span data-dcnode-id="2249" instrument_node="">
</span><li data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">To safeguard public property and to abjure violence.</span></li><span data-dcnode-id="2246" instrument_node="">
</span><li data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">To develop the scientific temples, humanism and the spirit of inquiry and reform.</span></li><span data-dcnode-id="2243" instrument_node="">
</span><li data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">To strive towards excellence is all spheres of individual and collective activity so that the nation constantly rises to higher levels of endeavor and achievement.</span></li><span data-dcnode-id="2240" instrument_node="">
</span><li data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">To provide opportunities for education to child, ward between the age of six to fourteen years.</span></li><span data-dcnode-id="2237" instrument_node="">
</span></ol><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2227"><span data-dcnode-id="2234" instrument_node="">Question 7.</span><br data-dcnode-id="2233"><span data-dcnode-id="2232" instrument_node="">
Mention the rights under Minority Provision.</span><br data-dcnode-id="2231"><span data-dcnode-id="2230" instrument_node="">
Answer:</span><br data-dcnode-id="2229"><span data-dcnode-id="2228" instrument_node="">
Cultural and Educational Rights:</span></p><span data-dcnode-id="2226" instrument_node="">
</span><ol data-dcnode-id="2203"><span data-dcnode-id="2225" instrument_node="">
</span><li data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">These Rights are measures to protect the rights of cultural, linguistic and religious minorities, by enabling them to conserve their heritage and protecting them against discrimination.</span></li><span data-dcnode-id="2222" instrument_node="">
</span><li data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Under Cultural and Educational Rights, any citizen can get admission in educational institution or granted institution without getting discriminated on the basis of religion, caste, creed or language.</span></li><span data-dcnode-id="2219" instrument_node="">
</span><li data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">The Indian Constitution states that religious and language minority groups will have the right to administer and start their own educational institutions.</span></li><span data-dcnode-id="2216" instrument_node="">
</span><li data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">It states that no minority, other than the ones suggested in the Article will have the right to establish any institution.</span></li><span data-dcnode-id="2213" instrument_node="">
</span><li data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">It also prohibits discrimination against any citizen for admission into any educational institution maintained or aided by the state, on the grounds only of religion, race, caste, language or any of them.</span></li><span data-dcnode-id="2210" instrument_node="">
</span><li data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">This right is subject to the power of the state to impose reasonable regulations regarding educational standards, conditions of service of employees, fee structure, and the utilization of any aid granted by it.</span></li><span data-dcnode-id="2207" instrument_node="">
</span><li data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Any section of citizens having a distinct language, script culture of its own, the right to conserve and develop the same, and thus safeguards the rights of minorities by preventing the state from imposing external cultural on them.</span></li><span data-dcnode-id="2204" instrument_node="">
</span></ol><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2200" style="color: #0000ff;"><span data-dcnode-id="2201" instrument_node="">2. Write short notes on:</span></span></p><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2180"><span data-dcnode-id="2197" instrument_node="">Question 1.</span><br data-dcnode-id="2196"><span data-dcnode-id="2195" instrument_node="">
1. Right to Equality</span><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node="">
2. Right to Constitutional Remedies</span><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">
3. Right to Freedom</span><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node="">
4. Right against Exploitation</span><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">
5. Directive Principle for Economic Policies</span><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">
6. Directive Principles for Political and International Relations.</span><br data-dcnode-id="2184"><span data-dcnode-id="2183" instrument_node="">
Answer:</span><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node="">
1. Right to Equality:</span></p><span data-dcnode-id="2179" instrument_node="">
</span><ol data-dcnode-id="2165"><span data-dcnode-id="2178" instrument_node="">
</span><li data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">The rights that consider every citizen ‘Equal before Law’ and provide ‘Equal protection of Law’ are called Rights to Equality.</span></li><span data-dcnode-id="2175" instrument_node="">
</span><li data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">The Rights to Equality serves as foundation of all other rights and privileges granted to Indian citizens.</span></li><span data-dcnode-id="2172" instrument_node="">
</span><li data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">This right is considered the chief guarantee of the Constitution of India to provide rights to its citizens. Thus, it is necessary that every citizen of India has easy access to the courts to exercise his/her right to Equality.</span></li><span data-dcnode-id="2169" instrument_node="">
</span><li data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Moreover, to apply these rights equally, the Constitution of India has abolished the practice of untouchability. Practice of untouchability is declared a crime and anyone doing so, is punishable by law.</span></li><span data-dcnode-id="2166" instrument_node="">
</span></ol><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">2. Right to Constitutional Remedies:</span></p><span data-dcnode-id="2161" instrument_node="">
</span><ol data-dcnode-id="2124"><span data-dcnode-id="2160" instrument_node="">
</span><li data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Right to Constitutional Remedies is a special feature of our Constitution.</span></li><span data-dcnode-id="2157" instrument_node="">
</span><li data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">This right provides an opportunity to the citizens to go to the court in case of violation of their Fundamental Right.</span></li><span data-dcnode-id="2154" instrument_node="">
</span><li data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Dr. Ambedkar considered this right as the ‘Soul of the Constitution’.</span></li><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">To protect the rights provided by the Constitution to the citizens.</span></li><span data-dcnode-id="2148" instrument_node="">
</span><li data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">In case a person is deprived or denied any of the Fundamental Rights, he can make use of this right i.e, Right to Constitutional Remedies and seek justice from the court of law.</span></li><span data-dcnode-id="2145" instrument_node="">
</span><li data-dcnode-id="2141"><span data-dcnode-id="2144" instrument_node="">If the court finds that a person is deprived or denied a Fundamental Right, it can issue</span><br data-dcnode-id="2143"><span data-dcnode-id="2142" instrument_node="">
a ‘writ’ i.e., a legal notice to the one who is depriving the person of his right.</span></li><span data-dcnode-id="2140" instrument_node="">
</span><li data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Under this right, it becomes the duty of the judiciary to attends all complaints pertaining to the Fundamental Rights and take sufficient care to see that citizens get proper justice and their.</span></li><span data-dcnode-id="2137" instrument_node="">
</span><li data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Fundamental Rights are protected.</span></li><span data-dcnode-id="2134" instrument_node="">
</span><li data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Therefore, the to Constitutional Remedies is not only a special feature of Fundamental Rights, but also very special feature offered to the citizens of the country.</span></li><span data-dcnode-id="2131" instrument_node="">
</span><li data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">One can use this right even against Centre and State.</span></li><span data-dcnode-id="2128" instrument_node="">
</span><li data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">This right is available all the time except at the time of emergencies. No law can stop citizens from using this right.</span></li><span data-dcnode-id="2125" instrument_node="">
</span></ol><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2122" instrument_node="">3. Right to Freedom:</span><br data-dcnode-id="2121"><span data-dcnode-id="2120" instrument_node="">
The Right to Freedom is a bunch of six freedoms. They are:</span></p><span data-dcnode-id="2118" instrument_node="">
</span><ol data-dcnode-id="2080"><span data-dcnode-id="2117" instrument_node="">
</span><li data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">The freedom of speech and expression.</span></li><span data-dcnode-id="2114" instrument_node="">
</span><li data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">The freedom to assemble peacefully and without arms.</span></li><span data-dcnode-id="2111" instrument_node="">
</span><li data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">The freedom to form associations or unions.</span></li><span data-dcnode-id="2108" instrument_node="">
</span><li data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">The freedom to move freely throughout the territory of India.</span></li><span data-dcnode-id="2105" instrument_node="">
</span><li data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">The freedom to live and settle in any part of India.</span></li><span data-dcnode-id="2102" instrument_node="">
</span><li data-dcnode-id="2082"><span data-dcnode-id="2101" instrument_node="">The freedom to practice any profession, business or occupation.
</span><ul data-dcnode-id="2084"><span data-dcnode-id="2100" instrument_node="">
</span><li data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">This right aims at providing overall development to a person. This right is very crucial for democracy.</span></li><span data-dcnode-id="2097" instrument_node="">
</span><li data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">As per this right, the person should enjoy his rights democratically and he should be able to live a healthy and civic life.</span></li><span data-dcnode-id="2094" instrument_node="">
</span><li data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">The Indian Constitution permits freedom of speech and expression to every Indian citizen.</span></li><span data-dcnode-id="2091" instrument_node="">
</span><li data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">It also permits media and press to express their views and thoughts, however his freedom is mentioned in a different clause.</span></li><span data-dcnode-id="2088" instrument_node="">
</span><li data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">The Constitutional Amendment Act, 2002 provides free and compulsory primary education for the children between 6 to 14 years.</span></li><span data-dcnode-id="2085" instrument_node="">
</span></ul><span data-dcnode-id="2083" instrument_node="">
</span></li><span data-dcnode-id="2081" instrument_node="">
</span></ol><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">4. Right against Exploitation:</span></p><span data-dcnode-id="2076" instrument_node="">
</span><ol data-dcnode-id="2044"><span data-dcnode-id="2075" instrument_node="">
</span><li data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">The Right against Exploitation is one of the most important fundamental rights given by the Indian Constitution.</span></li><span data-dcnode-id="2072" instrument_node="">
</span><li data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">This right protects the citizens in various forms.</span></li><span data-dcnode-id="2069" instrument_node="">
</span><li data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">It aim at protecting citizens from being forced to environmental, domestic and work hazards.</span></li><span data-dcnode-id="2066" instrument_node="">
</span><li data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">This right safeguards women and children and other against exploitation of various forms.</span></li><span data-dcnode-id="2063" instrument_node="">
</span><li data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Under this right, human trafficking forced labour, forcing into begging, slave trade and prostitution are considered punishable offense and hence should be eradicated from the society.</span></li><span data-dcnode-id="2060" instrument_node="">
</span><li data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Similarly, making children below the age of 14 years work beyond their capacity and employing them in factories, mines or other hazardous places is also considered exploitation.</span></li><span data-dcnode-id="2057" instrument_node="">
</span><li data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">To save children below 14 years of age from exploitation, the Constitution has made specific provision of not allowing them to be employed for any hazardous work.</span></li><span data-dcnode-id="2054" instrument_node="">
</span><li data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">If the employer fails to follow this provision, it becomes a criminal offence under Abolition of Child Labour.</span></li><span data-dcnode-id="2051" instrument_node="">
</span><li data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Under Right to Exploitation, one cannot discriminate selecting people for carrying out state welfare works, military services, social services, etc. on the basis of their religion, caste, gender or creed.</span></li><span data-dcnode-id="2048" instrument_node="">
</span><li data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Based on the situation, the government may pay allowances or may take these services on honorary basis form the citizens.</span></li><span data-dcnode-id="2045" instrument_node="">
</span></ol><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">5. Directive Principles for Economic Policies:</span></p><span data-dcnode-id="2040" instrument_node="">
</span><ol data-dcnode-id="2014"><span data-dcnode-id="2039" instrument_node="">
</span><li data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Equal distribution of wealth and resources among all classes for the welfare of the citizens should be done.</span></li><span data-dcnode-id="2036" instrument_node="">
</span><li data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">The State should observe that assets and production of resources do not get distributed only to certain groups or sections of the society.</span></li><span data-dcnode-id="2033" instrument_node="">
</span><li data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Equal pay for equal work for both men and women should be given.</span></li><span data-dcnode-id="2030" instrument_node="">
</span><li data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Provision should be made for good health. At times, due to financial burden, men, women and even young children take up works at highly unhygienic places. This should not be allowed.</span></li><span data-dcnode-id="2027" instrument_node="">
</span><li data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">State should promote co-operation in administration of industrial units by laborers.</span></li><span data-dcnode-id="2024" instrument_node="">
</span><li data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Directive Principles should be developed by State for providing protection to children and youth against exploitation and against moral and material abandonment for making them to live in a healthy and dignified environment.</span></li><span data-dcnode-id="2021" instrument_node="">
</span><li data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Relief and leave at the time of pregnancy should be provided to women. Worker’s insurance bonus, maternity leave, gratuity, and other legal rights should be included in the policy.</span></li><span data-dcnode-id="2018" instrument_node="">
</span><li data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Policies should be made to organize agricultural and animal husbandry on modem and scientific lines.</span></li><span data-dcnode-id="2015" instrument_node="">
</span></ol><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">6. Directive Principles for Political and International Relations:</span></p><span data-dcnode-id="2010" instrument_node="">
</span><ol data-dcnode-id="1999"><span data-dcnode-id="2009" instrument_node="">
</span><li data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">The state should establish Panchayati Raj. It should appoint suitable officers who work and provide financial aid to establish this system.</span></li><span data-dcnode-id="2006" instrument_node="">
</span><li data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">The state should separate its services from corporate mindedness. It should have a liberal mindset so that appointed judges can be impartial, fearless and courageous in rendering judgments.</span></li><span data-dcnode-id="2003" instrument_node="">
</span><li data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">The state should make attempts to maintain international peace, security, to establish fair relation between nations and to increase respect of international law.</span></li><span data-dcnode-id="2000" instrument_node="">
</span></ol><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1996"><img alt="GSEB Solutions Class 9 Social Science Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy" data-dcnode-id="1997" data-pin-nopin="true" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1993" style="color: #0000ff;"><span data-dcnode-id="1994" instrument_node="">3. Give reasons to the following statements:</span></span></p><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1990" instrument_node="">Question 1.</span><br data-dcnode-id="1989"><span data-dcnode-id="1988" instrument_node="">
One can go to the court of law to seek protection against violation of Fundamental Right.</span><br data-dcnode-id="1987"><span data-dcnode-id="1986" instrument_node="">
Answer:</span></p><span data-dcnode-id="1984" instrument_node="">
</span><ol data-dcnode-id="1970"><span data-dcnode-id="1983" instrument_node="">
</span><li data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">The Constitution has provided various Fundamental Rights to Indians.</span></li><span data-dcnode-id="1980" instrument_node="">
</span><li data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">These rights are utmost importance for overall development of the citizens.</span></li><span data-dcnode-id="1977" instrument_node="">
</span><li data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">No one can stop them from enjoying these rights.</span></li><span data-dcnode-id="1974" instrument_node="">
</span><li data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">To safeguard the citizens against exploitation and to make sure they are not deprived of these rights, the Constitution has given provisions to the citizens to go to the court in case of the violation of their Fundamental Rights.</span></li><span data-dcnode-id="1971" instrument_node="">
</span></ol><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1968" instrument_node="">Question 2.</span><br data-dcnode-id="1967"><span data-dcnode-id="1966" instrument_node="">
Right to Constitutional remedies is like the ‘Constitutional Soul’.</span><br data-dcnode-id="1965"><span data-dcnode-id="1964" instrument_node="">
Answer:</span></p><span data-dcnode-id="1962" instrument_node="">
</span><ol data-dcnode-id="1948"><span data-dcnode-id="1961" instrument_node="">
</span><li data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Right to Constitution Remedies is not just a special right, also a very special feature of the Constitution.</span></li><span data-dcnode-id="1958" instrument_node="">
</span><li data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">This right empowers a citizen to go to the court in case he is deprived of any of his Fundamental Rights.</span></li><span data-dcnode-id="1955" instrument_node="">
</span><li data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">The court ensures full protection to the citizens by listening to their complaints and taking proper action.</span></li><span data-dcnode-id="1952" instrument_node="">
</span><li data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Since a citizen can fight for any right that he is deprived of through the Right to Constitutional Remedies. Hence, this right is known as the ‘Soul of the Constitution’.</span></li><span data-dcnode-id="1949" instrument_node="">
</span></ol><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1946" instrument_node="">Question 3.</span><br data-dcnode-id="1945"><span data-dcnode-id="1944" instrument_node="">
Freedom cannot be unlimited or absolute.</span><br data-dcnode-id="1943"><span data-dcnode-id="1942" instrument_node="">
Answer:</span></p><span data-dcnode-id="1940" instrument_node="">
</span><ol data-dcnode-id="1917"><span data-dcnode-id="1939" instrument_node="">
</span><li data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Our Constitution has given six different freedoms to all Indians. Everyone is free to enjoy these freedoms.</span></li><span data-dcnode-id="1936" instrument_node="">
</span><li data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">On the other hand the fact is that we live in a society and so we need to maintain its social structure.</span></li><span data-dcnode-id="1933" instrument_node="">
</span><li data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Hence, although these six freedoms are given to citizens they enjoy them with certain restrictions or say reasonable control and limitation.</span></li><span data-dcnode-id="1930" instrument_node="">
</span><li data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">One cannot be given unlimited or absolute freedom under the various rights.</span></li><span data-dcnode-id="1927" instrument_node="">
</span><li data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Putting control will ensure safety, security and well-being of the nation as well as various classes and religious groups present in the nation.</span></li><span data-dcnode-id="1924" instrument_node="">
</span><li data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">By providing unlimited or absolute freedom these would occur threat of maintenance of public order, national unity, integrity, contempt of court, defamation, public decency and morality, violence, etc. in the nation.</span></li><span data-dcnode-id="1921" instrument_node="">
</span><li data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Hence, freedom cannot be unlimited or absolute.</span></li><span data-dcnode-id="1918" instrument_node="">
</span></ol><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1915" instrument_node="">Question 4.</span><br data-dcnode-id="1914"><span data-dcnode-id="1913" instrument_node="">
Directive Principles of Political Policies are the pre-conditions for the utilization of Fundamental Rights.</span><br data-dcnode-id="1912"><span data-dcnode-id="1911" instrument_node="">
Answer:</span></p><span data-dcnode-id="1909" instrument_node="">
</span><ol data-dcnode-id="1892"><span data-dcnode-id="1908" instrument_node="">
</span><li data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Establishment of proper political policies help a nation to administer its affairs efficiently. Efficient political policies demands developing efficient social as well as economic policies.</span></li><span data-dcnode-id="1905" instrument_node="">
</span><li data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">To develop social and economic policy for the prosperity of nation the citizens must be given certain important Fundamental Rights.</span></li><span data-dcnode-id="1902" instrument_node="">
</span><li data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">By providing these rights to the citizens the country can expect a high morale, better productivity and loyalty from them.</span></li><span data-dcnode-id="1899" instrument_node="">
</span><li data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">It will help to convert the vision of a prosperous nation seen through political policies.</span></li><span data-dcnode-id="1896" instrument_node="">
</span><li data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Hence, Directive Principles of Political Policies are the pre-conditions for the utilization of Fundamental Rights.</span></li><span data-dcnode-id="1893" instrument_node="">
</span></ol><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1890" instrument_node="">Question 5.</span><br data-dcnode-id="1889"><span data-dcnode-id="1888" instrument_node="">
A formation of society without exploitation is the important aim of the Constitution.</span><br data-dcnode-id="1887"><span data-dcnode-id="1886" instrument_node="">
Answer:</span></p><span data-dcnode-id="1884" instrument_node="">
</span><ol data-dcnode-id="1870"><span data-dcnode-id="1883" instrument_node="">
</span><li data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">India has been in the clutches of various social evils like untouchability, forced, labour, low wages, exploitation of the poor downtrodden, dowry, etc.</span></li><span data-dcnode-id="1880" instrument_node="">
</span><li data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">To observe equal states and freedom for all in the country, several rights are provided to them by the Constitution.</span></li><span data-dcnode-id="1877" instrument_node="">
</span><li data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Every human being is bom free and has right to live his life freely without getting exploited from other, society or the state.</span></li><span data-dcnode-id="1874" instrument_node="">
</span><li data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Hence, the Constitution through its various rights and freedoms tries to make attempt that a country can have a society free from exploitation.</span></li><span data-dcnode-id="1871" instrument_node="">
</span></ol><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><img alt="GSEB Solutions Class 9 Social Science Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy" data-dcnode-id="1868" data-pin-nopin="true" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1865" instrument_node="">Question 6.</span><br data-dcnode-id="1864"><span data-dcnode-id="1863" instrument_node="">
Directive Principles and Fundamental Rights are not against each other instead they complete each other.</span><br data-dcnode-id="1862"><span data-dcnode-id="1861" instrument_node="">
Answer:</span></p><span data-dcnode-id="1859" instrument_node="">
</span><ol data-dcnode-id="1836"><span data-dcnode-id="1858" instrument_node="">
</span><li data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">The Directive Principles provide guidance to the state to march towards establishing equal, just and social order without any exploitation.</span></li><span data-dcnode-id="1855" instrument_node="">
</span><li data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">The Directive Principles provides a vision of future society.</span></li><span data-dcnode-id="1852" instrument_node="">
</span><li data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">They show us our direction and also our destination.</span></li><span data-dcnode-id="1849" instrument_node="">
</span><li data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">They guide the state to uplift the society and protect it.</span></li><span data-dcnode-id="1846" instrument_node="">
</span><li data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Fundamental rights limit the state leadership while Directive Principles extend state leadership.</span></li><span data-dcnode-id="1843" instrument_node="">
</span><li data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Fundamental Rights make possible the existence of democracy, while Directive Principles guide towards establishing inter-relations of democracy.</span></li><span data-dcnode-id="1840" instrument_node="">
</span><li data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Thus, Directive Principle and Fundamental rights are not against each other instead they complete each other.</span></li><span data-dcnode-id="1837" instrument_node="">
</span></ol><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1834" instrument_node="">Question 7.</span><br data-dcnode-id="1833"><span data-dcnode-id="1832" instrument_node="">
Duties and Rights are the sides of the same coin.</span><br data-dcnode-id="1831"><span data-dcnode-id="1830" instrument_node="">
Answer:</span></p><span data-dcnode-id="1828" instrument_node="">
</span><ol data-dcnode-id="1808"><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Rights and duties are inter-connected and complementary to each other.</span></li><span data-dcnode-id="1824" instrument_node="">
</span><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Rights allow a citizen to enjoy the freedom he gets under the constitution. On the other hand, duties expect that he should fulfill his responsibility towards the nation.</span></li><span data-dcnode-id="1821" instrument_node="">
</span><li data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">For example, someone has the right to move freely in the park. At the same time, it becomes his duty not to damage the park.</span></li><span data-dcnode-id="1818" instrument_node="">
</span><li data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">There cannot be rights without duties because the right of one person becomes the duty of the other person.</span></li><span data-dcnode-id="1815" instrument_node="">
</span><li data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Therefore, when we enjoy our rights it becomes our duty to. facilitate the enjoyment of their rights by the other people.</span></li><span data-dcnode-id="1812" instrument_node="">
</span><li data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Thus, rights and duties are the two sides of the same coin.</span></li><span data-dcnode-id="1809" instrument_node="">
</span></ol><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1806" instrument_node="">Question 8.</span><br data-dcnode-id="1805"><span data-dcnode-id="1804" instrument_node="">
Child labour is a punishable offence.</span><br data-dcnode-id="1803"><span data-dcnode-id="1802" instrument_node="">
Answer:</span></p><span data-dcnode-id="1800" instrument_node="">
</span><ol data-dcnode-id="1783"><span data-dcnode-id="1799" instrument_node="">
</span><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Under the Constitution, the State has got the right to make special arrangements for children.</span></li><span data-dcnode-id="1796" instrument_node="">
</span><li data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Under this right, forcing children to work and forcing them into begging are considered punishable offence.</span></li><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Similarly, making children below the age of 14 years work beyond their capacity and employing them in factories, mines, or other hazardous places is also considered exploitation.</span></li><span data-dcnode-id="1790" instrument_node="">
</span><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">To save children below 14 years of age from exploitation, the Constitution has made specific provisions of not allowing them to be employed for any hazardous work.</span></li><span data-dcnode-id="1787" instrument_node="">
</span><li data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">If the employer fails to follow this provision, it becomes a criminal offence under Abolition of Child Labour.</span></li><span data-dcnode-id="1784" instrument_node="">
</span></ol><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1781" instrument_node="">Question 9.</span><br data-dcnode-id="1780"><span data-dcnode-id="1779" instrument_node="">
For the implementation of Directive Principles, one cannot resort to Court of Law.</span><br data-dcnode-id="1778"><span data-dcnode-id="1777" instrument_node="">
Answer:</span></p><span data-dcnode-id="1775" instrument_node="">
</span><ol data-dcnode-id="1761"><span data-dcnode-id="1774" instrument_node="">
</span><li data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">The Directive Principles provide guidelines to the state for creating a better society.</span></li><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">These are just guidelines and not rules. So the state is not bound to follow these principles.</span></li><span data-dcnode-id="1768" instrument_node="">
</span><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">With change in time and trends, the state may have to ignore the Directive Principles.</span></li><span data-dcnode-id="1765" instrument_node="">
</span><li data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Hence, citizens cannot go to the court of law if any Directive Principle is not implemented by the state.</span></li><span data-dcnode-id="1762" instrument_node="">
</span></ol><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1759" instrument_node="">Question 10.</span><br data-dcnode-id="1758"><span data-dcnode-id="1757" instrument_node="">
Directive Principle are the foundation for the rule of a regime.</span><br data-dcnode-id="1756"><span data-dcnode-id="1755" instrument_node="">
Answer:</span></p><span data-dcnode-id="1753" instrument_node="">
</span><ol data-dcnode-id="1733"><span data-dcnode-id="1752" instrument_node="">
</span><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">To rule a regime i. e., to run a government, Directive Principles help to establish political democracy in our Constitution.</span></li><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">However, political democracy cannot be achieved alone without social and economic democracy.</span></li><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Hence, Directive Principles aim to establish a social system based on social, economic and political justice.</span></li><span data-dcnode-id="1743" instrument_node="">
</span><li data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">These principles reflect the kind of nation and society we wish to establish.</span></li><span data-dcnode-id="1740" instrument_node="">
</span><li data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">These principles incorporate rights that are required for the overall development of mankind.</span></li><span data-dcnode-id="1737" instrument_node="">
</span><li data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Hence, looking at the aim of Directive Principles one can say that they serve as the foundation for the rule of regime.</span></li><span data-dcnode-id="1734" instrument_node="">
</span></ol><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1731" instrument_node="">Question 11.</span><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node="">
Preservation of Cultural and Historical heritage is the Fundamental Duty of everyone.</span><br data-dcnode-id="1728"><span data-dcnode-id="1727" instrument_node="">
Answer:</span></p><span data-dcnode-id="1725" instrument_node="">
</span><ol data-dcnode-id="1705"><span data-dcnode-id="1724" instrument_node="">
</span><li data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">The Constitution has provisions for preserving cultural and historical heritage of a country or people.</span></li><span data-dcnode-id="1721" instrument_node="">
</span><li data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">State has been provided with certain powers and guidelines to make sure that this heritage is maintained.</span></li><span data-dcnode-id="1718" instrument_node="">
</span><li data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">However, culture and history arise due to people. So, people form an integral part of it.</span></li><span data-dcnode-id="1715" instrument_node="">
</span><li data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">State alone cannot preserve do culture and history if the people not provide equal support.</span></li><span data-dcnode-id="1712" instrument_node="">
</span><li data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Our existence is not possible without cultural and historical heritage.</span></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Hence, it is the Fundamental Duty of every citizen to preserve cultural and national heritage.</span></li><span data-dcnode-id="1706" instrument_node="">
</span></ol><span data-dcnode-id="1704" instrument_node="">
</span><h3 data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Gujarat Board Class 9 Social Science Fundamental Rights, Fundamental Duties and Directive Principles of State Policy Additional Important Questions and Answers</span></h3><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" style="color: #0000ff;"><span data-dcnode-id="1700" instrument_node="">I. Answer the following questions.</span></span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1696" instrument_node="">Question 1.</span><br data-dcnode-id="1695"><span data-dcnode-id="1694" instrument_node="">
What are our Fundamental Rights?</span><br data-dcnode-id="1693"><span data-dcnode-id="1692" instrument_node="">
Answer:</span><br data-dcnode-id="1691"><span data-dcnode-id="1690" instrument_node="">
Our Fundamental Rights:</span></p><span data-dcnode-id="1688" instrument_node="">
</span><ol data-dcnode-id="1668"><span data-dcnode-id="1687" instrument_node="">
</span><li data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Right to Equality</span></li><span data-dcnode-id="1684" instrument_node="">
</span><li data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Right of Freedom</span></li><span data-dcnode-id="1681" instrument_node="">
</span><li data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Right against Exploitation</span></li><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Right to Freedom of Religion</span></li><span data-dcnode-id="1675" instrument_node="">
</span><li data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Cultural and Educational Rights</span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Right to Constitutional Remedies</span></li><span data-dcnode-id="1669" instrument_node="">
</span></ol><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><img alt="GSEB Solutions Class 9 Social Science Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy" data-dcnode-id="1666" data-pin-nopin="true" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1663" instrument_node="">Question 2.</span><br data-dcnode-id="1662"><span data-dcnode-id="1661" instrument_node="">
There cannot be religious discrimination in educational institutions run by the government.</span><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node="">
Answer:</span></p><span data-dcnode-id="1657" instrument_node="">
</span><ol data-dcnode-id="1643"><span data-dcnode-id="1656" instrument_node="">
</span><li data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Rights to freedom of religion provides religious freedom to all the citizens of India.</span></li><span data-dcnode-id="1653" instrument_node="">
</span><li data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Any citizen can get admission in any educational institution run by the government without getting discriminated on the basis of religion, caste, creed or language.</span></li><span data-dcnode-id="1650" instrument_node="">
</span><li data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">None of the religion is ignored or given preference before the state.</span></li><span data-dcnode-id="1647" instrument_node="">
</span><li data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Thus, there is no religious discrimination in educational institutions run by the government.</span></li><span data-dcnode-id="1644" instrument_node="">
</span></ol><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1641" instrument_node="">Question 3.</span><br data-dcnode-id="1640"><span data-dcnode-id="1639" instrument_node="">
When does offense against exploitation becomes punishable?</span><br data-dcnode-id="1638"><span data-dcnode-id="1637" instrument_node="">
Answer:</span></p><span data-dcnode-id="1635" instrument_node="">
</span><ol data-dcnode-id="1624"><span data-dcnode-id="1634" instrument_node="">
</span><li data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">As per the Constitution, work cannot be taken free from any person without paying or paying less than minimum wages or by means of forced or imposed labour.</span></li><span data-dcnode-id="1631" instrument_node="">
</span><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Any child under the age of 14 cannot be made to work in factory, mine or any dangerous profession.</span></li><span data-dcnode-id="1628" instrument_node="">
</span><li data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">This is called child labour. Under the prohibition of Child Labour Act all these are punishable offenses.</span></li><span data-dcnode-id="1625" instrument_node="">
</span></ol><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" style="color: #0000ff;"><span data-dcnode-id="1622" instrument_node="">II. Give Reasons.</span></span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1618" instrument_node="">Question 1.</span><br data-dcnode-id="1617"><span data-dcnode-id="1616" instrument_node="">
Prohibition is not the breaking of democracy.</span><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">
Answer:</span></p><span data-dcnode-id="1612" instrument_node="">
</span><ol data-dcnode-id="1595"><span data-dcnode-id="1611" instrument_node="">
</span><li data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">The direction Principles guide a state to take measures for maintaining proper health of the society.</span></li><span data-dcnode-id="1608" instrument_node="">
</span><li data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Liquor is an intoxicating drink which causes harm to the person who consumes it.</span></li><span data-dcnode-id="1605" instrument_node="">
</span><li data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">The drunk get ruined economically and socially too.</span></li><span data-dcnode-id="1602" instrument_node="">
</span><li data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Thus, the consumption of liquor becomes dangerous for the one who consumes as well as for the family and society.</span></li><span data-dcnode-id="1599" instrument_node="">
</span><li data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">If government puts ban on liquor consumption, it is not depriving any citizen of this basic right but in fact helping the citizens maintain good health.</span></li><span data-dcnode-id="1596" instrument_node="">
</span></ol><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1593" instrument_node="">Question 2.</span><br data-dcnode-id="1592"><span data-dcnode-id="1591" instrument_node="">
One must not pelt stones on S.T. buses.</span><br data-dcnode-id="1590"><span data-dcnode-id="1589" instrument_node="">
Answer:</span></p><span data-dcnode-id="1587" instrument_node="">
</span><ol data-dcnode-id="1576"><span data-dcnode-id="1586" instrument_node="">
</span><li data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">As per the Fundamental Duty of citizens of India, citizens should try to protect and preserve the public property.</span></li><span data-dcnode-id="1583" instrument_node="">
</span><li data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">S.T. bus is a part of public property, which provides the facility of transportation to the public.</span></li><span data-dcnode-id="1580" instrument_node="">
</span><li data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Pelting stones on S.T. buses is harm to the public property and hence, one must not do so.</span></li><span data-dcnode-id="1577" instrument_node="">
</span></ol><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><img alt="GSEB Solutions Class 9 Social Science Chapter 9 Fundamental Rights, Fundamental Duties and Directive Principles of State Policy" data-dcnode-id="1574" data-pin-nopin="true" data-recalc-dims="1" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/gsebsolutions.com/wp-content/uploads/2020/07/GSEB-Solutions.png%3Fresize%3D167%252C17%26ssl%3D1&amp;raw" width="167"></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1571" instrument_node="">Question 3.</span><br data-dcnode-id="1570"><span data-dcnode-id="1569" instrument_node="">
Milch animals like cow should not be slaughtered.</span><br data-dcnode-id="1568"><span data-dcnode-id="1567" instrument_node="">
Answer:</span></p><span data-dcnode-id="1565" instrument_node="">
</span><ol data-dcnode-id="1554"><span data-dcnode-id="1564" instrument_node="">
</span><li data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">As per Directive Principle and Fundamental Duty of a citizen, citizens should show compassion to all animals.</span></li><span data-dcnode-id="1561" instrument_node="">
</span><li data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">India is an agricultural country and cows is considered an economically important and holy animal of India.</span></li><span data-dcnode-id="1558" instrument_node="">
</span><li data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Thus, we should not slaughter milch animals like cows.</span></li><span data-dcnode-id="1555" instrument_node="">
</span></ol><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1552" instrument_node="">Question 4.</span><br data-dcnode-id="1551"><span data-dcnode-id="1550" instrument_node="">
Fundamental Human Rights are true identity of democratic system of government.</span><br data-dcnode-id="1549"><span data-dcnode-id="1548" instrument_node="">
Answer:</span></p><span data-dcnode-id="1546" instrument_node="">
</span><ol data-dcnode-id="1529"><span data-dcnode-id="1545" instrument_node="">
</span><li data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">India is a democratic country.</span></li><span data-dcnode-id="1542" instrument_node="">
</span><li data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Each citizen of the country is given some Fundamental Rights by the Constitution.</span></li><span data-dcnode-id="1539" instrument_node="">
</span><li data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Citizen enjoys these rights without any discrimination of caste, creed, sex, birthplace, income or education.</span></li><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Each education system protects this Fundamental Rights of citizens.</span></li><span data-dcnode-id="1533" instrument_node="">
</span><li data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Thus, Fundamental Rights are true identity of democratic system of the government.</span></li><span data-dcnode-id="1530" instrument_node="">
</span></ol><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1527" instrument_node="">Question 5.</span><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node="">
Reserved seats can be kept for weaker and backward sections of the society.</span><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node="">
