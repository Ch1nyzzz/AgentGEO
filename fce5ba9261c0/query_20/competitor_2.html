Through several years of professional practice of CMF design, I have
received many enquiries from fellow colleagues, design professionals,
mentees and students, about where to find a good source of information
and reference about the field.
	 Since CMF design is a rather young discipline for which currently
there are no specialized or focused sources of information, I decided to
begin consolidating and sharing its key principles. Although it was not
always easy to develop clear explanations and practical methods for
thinking and doing, little by little my initial compilation of short articles
and presentations lead to the creation of this book.
	 Its content is supported by three main inputs: First, my accumulated
professional experience of over 15 years, working internationally with
major companies and consumer brands, both as an employee and as an
independent consultant; second, it reflects information obtained through
a series of expert interviews conducted with professionals with a significant level of experience in the industry and lastly; it presents a number
of case studies with innovative companies whom I had the pleasure of
personally visit and interview.
	 I have also had the opportunity to explore these principles in the
academic field through different settings involving workshops, independent studies, academic classes and guest lectures at different universities
around the world, including Aalto University in Finland, Tama Art University in Japan and Art Center College of Design in Pasadena, California.
Throughout this process, the exploration and incorporation of CMF
design into current design curriculums has proven to be an important and
relevant extension to current practices.
	 Since CMF design is a broad discipline encompassing different
industries, processes and products, the main emphasis of this book is on
industrially designed products and industrially manufactured consumer
goods, so that the principles presented here are fully supported by actual
industry standards and global manufacturing practices.
The final output is envisioned to serve as a canvas for best practices
within the discipline of CMF design and is not intended to be a prescriptive formula. Moreover, there can be approaches to the process which
vary depending on regional and socio-cultural contexts, aspirational
values, type of industry, design field and market dynamics.
Liliana Becerra</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">3</span></p></section><hr data-dcnode-id="1127"><section aria-label="Page 6" data-dcnode-id="1120"><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Photo taken at the Lechler Colour Design
exhibition at Fuorisalone 2015 in Milan.</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">4</span></p></section><hr data-dcnode-id="1119"><section aria-label="Page 7" data-dcnode-id="1112"><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">INTRODUCTION</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">THE PUZZLE OF CMF DESIGN
When I first approached the task of unwrapping the concept of CMF
design, I began by separating and breaking down each of its three
components: colours, materials and finishes. As I made progress with
my writing and research process, I realized that this classification was
actually very difficult to maintain and it became evident that these three
elements are impossible to separate from one another.
	 Every material has its own array of optimal manufacturing processes,
which also provide a unique palette of effects. The beautiful shine of an
anodised aluminium surface happens only as the result of a thoughtful
combination between the reflectivity of the material, the right types
of dies, and its unique finishing processes. The hand and colour of a
leather piece dyed with natural pigments will be much softer and prone
to shifting through time and use, compared to a leather piece dyed with
traditional chemical processes
	 It is impossible to talk about colour without talking about surface
detail, texture, reflectivity and overall product composition, all important
components of CMF design. A painted colour will become more vivid
if applied over a lighter substrate and if coated with a glossy topcoat. A
surface with a soft touch finish will make the colour slightly more muted
and visually softer. A colour blocking design approach to a product will
convey a totally different message to the consumer than a product with a
tone-on-tone colour approach.
	 In most cases the process of CMF design requires a certain amount of
experimentation or trial and error, peppered with a healthy dose of observation, curiosity and creativity. Sometimes, the process may start with a
material exploration and its subsequent connection to form, surface and
colour will follow. In other cases, the colour or technology can become
the main innovation to the point of becoming the marketing message
itself.
	 Based on these premises, the concept of CMF design could be
approached as a â&amp;amp;#x20AC;&amp;amp;#x153;puzzle of elementsâ&amp;amp;#x20AC;? with multiple correct solutions,
depending on who is creating it and who it is created for. This does not
mean however that CMF design is a random process based on sudden
impulse or personal opinions but instead, it confirms that it is and actual
science, which should be supported by deliberate professional practice
and accumulated real-world experience.</span></p><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">5</span></p></section><hr data-dcnode-id="1111"><section aria-label="Page 8" data-dcnode-id="1102"><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">CMF DESIGN

materials, textures and key words, selected to
create and communicate an engaging narrative.</span></p><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">current. It all depends on what is good for the brand, the product and
the consumer. In some cases the key story is already part of the brand
and thus must be transferred into the different CMF elements â&amp;amp;#x20AC;&amp;amp;#x201C; think of
Coca-Cola and the happiness campaign, which immediately triggers a
specific set of colours and graphic elements in our mind. In other cases
it is possible to embed the brand with a new message based on a fresh
CMF story. Some key stories that are developing at the moment in a
cross-industry approach include, honesty of materials and sustainable
manufacturing processes, as well as aspects involving local sourcing,
respect for traditional know-how and skill preservation. All of them are
rooted in a collective return to consciousness that we are experiencing at</span></p><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">42</span></p></section><hr data-dcnode-id="1072"><section aria-label="Page 13" data-dcnode-id="1065"><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">C M F C R E AT I O N</span></p><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">the moment, which is pushing us to re-evaluate how products are made,
where they came from and what their actual environmental impact is.
	 The Power of Trend Tracking
During my professional practice, I have developed a substantial and compelling process for understanding and working with trends, from defining
what they actually are, to mapping them according to different categories
and influences in order to draw different insights. This process happens
now naturally on an on-going basis almost like a trained intuition. The
main essence when working with trends is to understand that they are not
static, but a fast moving, living entity which is always changing, merging
and diversifying.
	 There are different labels of trends, ranging from the macro level,
which involves big picture changes and events, to the micro level, which
focuses on tangible and quantifiable manifestations of the macro trends.
Consumer products and consumer goods respond to a number of shifts in
technologies, socio-cultural attitudes and general dynamics of offer and
demand within the market place. Understanding, managing and leveraging this context is where the professional field of trend tracking comes in.
The trend tracking process is based on constant observation, documentation and analysis of different shifts within the market context. Since this
is an ongoing process that runs in parallel with the design of products, it
also allows us to look back in time in order to discover patterns of evolution which can in turn, help anticipate possible future scenarios, as well
as emerging consumersâ&amp;amp;#x20AC;&amp;amp;#x2122; needs, desires and aspirations.
	 When designing colours, materials and finishes, all levels of trends are
important. Although some brands tend to connect colours and materials
with micro-trends only, it is important to also understand the impact that
big picture level trends will have on the products we are designing. One
interesting case is how emerging technologies are enabling materials to
be thinner, lighter and stronger, and thus driving the use of more translucent, layered and softer colour effects. This trend is based not only on
visual aesthetics but also on actual functional benefits provided by new
technologies.
	 When it comes specifically to colour trends, different colours or
colour combinations can be driven by many factors including changes
within the economic landscape. For instance, in recent years the price
of gold has increased in the stock market, spiking demand for the
material together with a new wave of gold-like consumer products and
a new appreciation for this noble metal. Likewise, the re-birth of natural
pigments, which derives from global concern for the protection of the
environment and the support to more localised and sustainable production methods, is driving totally new colour design strategies and marketing campaigns.</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">43</span></p></section><hr data-dcnode-id="1064"><section aria-label="Page 14" data-dcnode-id="1057"><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Several companies, who are also suppliers of paints, coatings and pigments, create colour forecasting books and brochures on a seasonal
basis, in order to promote their brand and their most recent colours and
surface innovations to their potential clients. In these publications, colour
is promoted in parallel to inspirational visual mood boards, statistic colour
data and actual physical samples presenting the new effects. The process
has been a common practice within the automotive industry for many
years, at least since 1987, as traditionally this was the very industry that
drove colour trends.
	 There are companies whose focus is solely to research, create and
produce physical and digital trend forecasting tools including books,
audio-visual presentations and a series of inspiring prompts to inspire
and guide the work on CMF trend forecasting and design. For some of
these companies the focus is more fashion and style oriented, while for
others it is more about the materials with their corresponding visual and
seasonal effects.
	 Creating Personas
Creating personas is one of the many different types of design ethnography tools, utilized to obtain and communicate cues and insights about
consumers. Personas are archetypes or representations of people, their
life, desires, aspirations and values. They are based on real data and not
on stereotypes or cultural assumptions, in fact, creating personas based
on real world data will help us avoid fixating on stereotypical ideas or
misconceptions about markets or consumers.
	 The main difference between personas and mood boards is that
personas focus mainly on the lifestyle context – social activities, environments, culture – while mood boards focus on key and concrete aesthetic
cues to support the design process. It is recommended to create personas
and mood boards in parallel when working with CMF design because,
while personas bring our consumer’s world to life, mood boards connect
consumers directly with specific visual and functional elements of design.
	 Creating Mood Boards
Mood boards are a conceptual aid created to provide instant inspiration
and an emotional connection with the targeted consumers. They represent their desires and aspirations as well as the look and feel of the products and objects within their physical world. Mood boards don’t always
need to be completely realistic or literal, they can also be a projection or
an aspirational lifestyle represented with different visual cues.
	 Normally, mood boards are utilized within companies as a way to
materialize and articulate intangible, aspirational values into visual and
functional aesthetic elements. In most cases they work as style guides
or look and feel directions for the further creation, development and</span></p><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">44</span></p></section><hr data-dcnode-id="1056"><section aria-label="Page 15" data-dcnode-id="1047"><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">C M F C R E AT I O N</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Collection of booklets created and distributed
by the trend forecasting and publishing agency
Trend Union, during their seasonal trend briefing
sessions. The books highlight the main topics
presented during the season through the use of
powerful imagery and text.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Set of trend books created and distributed by
Bridge of WeirÂŽ a company that specializes in
the production of fine upholstery lathers. The
books showcase the latest surface texture and
colour trends with corresponding samples and
inspiring visuals.</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">45</span></p></section><hr data-dcnode-id="1046"><section aria-label="Page 16" data-dcnode-id="1039"><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Mood board series “Connected Living” (top) and
“The New Normal” (bottom) were created based
on emerging macro trends, illustrating the link
between macro trends and CMF palettes. They
provided inspiration and guidance on how to
use the new CMF palettes within BlackBerry®
design teams. They were presented as posters
and brochures for easy communication. Trend
research, story boards and physical mood
boards by Janice De Jong, Blackberry® and
Studio Liliana Becerra Inc.</span></p><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">46</span></p></section><hr data-dcnode-id="1038"><section aria-label="Page 17" data-dcnode-id="1029"><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">C M F C R E AT I O N</span></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">implementation of products. They can be digital (image based), physical
(object based) or a combination of both digital and physical, as long
as the information needed to further create a CMF palette is clearly
articulated.
	 The key to a good mood board for CMF design, is to find or create
the right visuals, images or objects needed to define the visual design
language, style and other aesthetic elements such as colours, textures,
surfaces and materials, in order to support a cohesive message. It is usually very hard to find the right images for a mood board. In fact, in some
cases it is a good practice to create and photograph images specifically
for it as part of the process – off course if time and budget allow for it.
	 As a rule of thumb a mood board should loosely include the visualizations of the following elements: the consumer target/persona including
hobbies and aspirations, the environments in which the product will
live (interior or exterior) and three or more products that are already
part of the persona’s physical life. The specific content of a mood board
will depend on the type of products being designed and the amount of
information required in order to convey a clear message, usually less
and precise is more.
	 Regardless of the order of the images and elements, if we are
designing the same product for different consumer segments or users,
all the mood boards should have exactly the same components and
ideally, the same layout so that it is easier to visually compare and differentiate the look and feel for each. Basically, by having the same mood
board layout and content for different consumer segments, we will be
able to compare “apples to apples” and appreciate the differences and
similarities between them.</span></p><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">STEP 3 CREATING A CMF STRATEGY
A CMF strategy carefully considers how users relate to products
through a series of touch points: from the first interaction to the longterm usability, and ultimately the product re-purchase.
	 The CMF Indicator
The CMF indicator is a thinking tool that I created to guide CMF projects
through the creation of palettes and their corresponding design strategy.
It’s recommended to be used at the very beginning of the process when
the overall ideation starts. Although there are several existing qualistic
tools to position and map out sensorial and functional attributes of
products, the CMF indicator presents a simplified way of understanding
and leveraging both.</span></p><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">47</span></p></section><hr data-dcnode-id="1028"><section aria-label="Page 18" data-dcnode-id="1019"><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">instance, are utilized in these industries because, beyond providing comfort, they can comply with specific regulations and requirements, such as
fire retardancy, water resistance, breathability and acoustic isolation.</span></p><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">STEP 4 UNDERSTANDING PART BREAK UP
In order to optimize the product benefits through performance and
usability, designing CMF part break ups should go hand in hand with
design for manufacturing. The material selection should be done at
the beginning of the product design process and not in isolation.
Ideally, part breakups should go beyond simple aesthetic styling of
products, and into value propositions that users can recognize intuitively
through universal cues. For example, if a colour and material variation is
expected of a part – such as a handle or a grip – it should be designed
with this functionality in mind and in a material that offers the possibility
for multiple colour and texture variations.
	 A good example of products with intuitive appeal created through
visual and physical part break up are utility tools, since their value resides
mostly on their functional performance. They are often brightly coloured
so that they stand out from their surroundings – usually construction sites
– and their functional parts, such as grip areas, are often emphasized
through texture and non-slip materials like rubber or silicone.
	 Besides the intended product functionality, part break up can also be
a driver or a consequence of the manufacturing processes. In fact, this
approach is currently growing in product design, bringing an entire range
of opportunities and constrains. Especially when thinking of the entire life
cycle of a product – design for disassembly – or when maximizing manufacturing processed and design functionality.
	 Permanent Versus Flexible Elements
Part break up can also be utilized as a way of moving products up or
down different market price points and consumer segmentation tiers.
When products are created with this purpose in mind, there are certain
elements designed to be permanent and certain elements designed to be
flexible or upgradable through different CMF variants.
	 The metal chassis of a mobile device, which is also designed to be
visible as an external frame detail, is an example of a permanent element.
It will repeat itself in all the products of the same range. The covers or the
different protective case colours and other smaller parts, are designed for
colour and finish variations allowing for product personalization and for
an extended portfolio offering.</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">52</span></p></section><hr data-dcnode-id="1018"><section aria-label="Page 19" data-dcnode-id="1009"><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">C M F C R E AT I O N</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Within the flexible elements, some CMF variants will be considered
entry level. In most cases these are gender or age neutral colours such
as black, grey or silver and low cost materials like plastic, elastomer or
silicone. The broad appeal of these elements makes the products easier
to mass-produce and therefore, readily available in higher volumes to
mainstream consumers, at lower price points.
	 Other flexible variants are regarded to be more exclusive. This is the
case with special or limited CMF editions that could include expensive
manufacturing techniques or handcrafted details that are impossible to
replicate. The focused appeal of these elements makes products more
expensive to manufacture and therefore coveted by premium or luxury
consumers.
	 Some material finishing technologies are specifically created to
instantly elevate the value of common materials, such as plating for
instance. This process provides surfaces with a thin, reflective, metal-looking coating which can elevate the perception of value without
adding much extra weight to the treated surface.
	 As there are many different functional benefits and challenges to
every material finishing technology, the last section of this book, Finish
Design, is completely dedicated to them.</span></p><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">The Giro Reverb urban riding helmet was taken
apart to visualize its materials and part break
up. The light, yet tough, in-mould shell wraps
around to the inside of the helmet to resist dents
and dings, while a self-adjusting fit system eliminates the need to dial in the fit when wearing
a cycling or winter cap. The finishing touch is a
simple and removable visor that adds a touch of
style without compromising cooling ventilation
in changing weather.</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">53</span></p></section><hr data-dcnode-id="1008"><section aria-label="Page 20" data-dcnode-id="999"><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Logs are created from newspapers and
then cut, resulting in layers of a material
resembling actual wood. NewspaperWood
forms the basis of several products including
the handmade jewellery Sample Series,
developed by rENs together with Vij5. The
details of the pattern are carefully balanced
within the circular space of the pendants.</span></p><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Scale and Proportion
In terms of surface decoration, the scale and distribution of the patterns,
textures and overall composition must be proportionate to the size of
the object. An oversized pattern over a small object will make it look
unresolved and will therefore lower its perceived and real value. The
more intricate the surface detailing and part break up differentiation
is, the higher the perceived and real value of a product. In the watch
and fine jewellery industry, a handcrafted approach to manufacturing
with extreme attention to detail elevates the rarity and exclusivity of the
products. This does not necessarily mean that small surfaces should be
crowded with decoration but rather that the composition of the different
elements involving colours, materials and textures should be well thought
out in order to make the product look good as a whole, as well as in its
specific details.</span></p><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">56</span></p></section><hr data-dcnode-id="998"><section aria-label="Page 21" data-dcnode-id="989"><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">C M F C R E AT I O N</span></p><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">STEP 5 CREATING CMF PALETTES
A CMF palette is the physical collection of samples or tangible representations of colour, material and finish corresponding the each
of the product parts. Depending on the level of complexity of the
product, palettes can vary in size and overall level of detail and complexity. Designing CMF palettes is a process that goes beyond simply
picking colour and material samples though. It must be supported by
a cohesive and applicable design strategy.</span></p><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Detail of a CMF palette targeting a collection
of airplane seat covers, showcasing different
materials with their corresponding samples and
numbered specifications. Project by Studio
Liliana Becerra Inc. for Zodiac Aerospace.</span></p><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">57</span></p></section><hr data-dcnode-id="988"><section aria-label="Page 22" data-dcnode-id="981"><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">COLOUR MEASURING TOOLS
The process of colour matching is affected by many different aspects
such as the type of pigments utilized, the selected method of application and the base colour or surface texture of the substrate. A range
of measuring tools including digital colour readers, light booths and
colour correcting lighting can additionally support the process.
	 Digital Colour Reading
Colour readers are created based on the principle of a colourimeter,
which are scientific tools to measure the wavelengths of light. Portable
and digital colour readers are utilized to measure and match the colours
of various surfaces to a specific colour system, providing different colour
conversion values including CMYK and RGB.
	 New subscription-based business models have recently emerged,
revolving around digital colour readers paired with the process of colour
collecting, organizing, referencing and sharing supported by mobile apps.
Digital colour reading is expected to grow and expand in the areas of
product and environmental design, architecture, as well as in the residential and contract paint industry.
	 NCS (Natural Colour System) ColourpinÂŽ, for example, is a digital
colour reader that can be connected to a mobile device via BluethoothÂŽ
and operated through an app. The pin measures an area with a 12 mm
diameter for one second through a measuring principle involving a LED
and a 16 grid filtered photo detector array. The app allows users to create
digital boards by pinning colours they encounter in different objects,
nature or environments. The pinned colours and boards can be saved into
a library or further edited and shared with other users.
	 Colour Matching
Different technologies are used to achieve the same colour on different
materials. Therefore, when different parts of a product are required to
match one colour sample, it is wise to initiate the process with the part
that represents the biggest challenge and then use its final approved
sample as a reference for the others. Certain colours and effects are more
difficult to achieve than others, depending on the type of material and the
nature of the pigment. White for instance, tends to be more translucent
or less opaque than other colours. These are important considerations
when deciding on the base colour of the substrate material. When applying light-coloured paint over a dark-coloured surface, the combination of
those two colours results in a greyer white rather than in a pure white.

	 Light Booths
For colour development and colour matching decision making, there
are existing visual colour evaluation systems, normally known as colour

WITH THE BMWI SERIES
Using new materials and discovering more sustainable processes, can
change the entire design approach as well as the final product.
	 Outline Structure
In the BMWi series, the innovation involves many aspects including
the selection of new materials with their corresponding manufacturing
processes and the design of new construction methods. As a result, this
approach is now the basis for the creation of a completely new visual and
functional design language, which is influencing the future of automotive
design altogether and redefines the meaning of performance, efficiency
and lightness. Most of its body is made of Carbon Fibre Reinforced Plastic
(CFRP). The interior space is optimized and opened up, creating airiness,
a reduction of unnecessary elements and a feeling of spaciousness.
	 During recent years, an interesting shift in the perception of surface
finishes for premium automotive interiors has emerged. Traditionally the
finish of materials was expected to be perfectly even and totally smooth
â&amp;amp;#x20AC;&amp;amp;#x201C; both to the eye and to the touch â&amp;amp;#x20AC;&amp;amp;#x201C; in order to guarantee the signature</span></p><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Detail of the carbon fibre structure
of the BMW i3.</span></p><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">114</span></p></section><hr data-dcnode-id="896"><section aria-label="Page 32" data-dcnode-id="887"><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">CAS E S T U DY</span></p><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">quality of the brand. This approach implied that the surface quality from
product to product had to be replicable in mass production. However,
building a product completely from scratch - as in the case of the BMWi
sub brand - provided the opportunity to rethink these concepts while
introducing a new appreciation for materials both from a structural and
from an aesthetic perspective. By utilizing more natural materials and
finishing processes, the interior surfaces yield higher surface grain irregularities, creating a feeling of uniqueness, from one product to the next.
	 Wood Trim
Key aesthetic characteristics of wood include the great variety and
uniqueness of growth grains and textures and the way it naturally
changes patination and colour as it evolves and ages. In traditional
automotive interiors, wood trims are often covered with a thick, translucent layer of glossy resin, which protects the surface from scratches and
from transformations caused by external elements such as, water, light
and heat. This approach to creating traditional wood trims for automotive
interiors is very industrial and standardized.</span></p><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Detail of the wood trim on the dashboard of the
BMW i3.</span></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">115</span></p></section><hr data-dcnode-id="886"><section aria-label="Page 33" data-dcnode-id="879"><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">In the BMW i3, the natural characteristics of wood are highlighted and
emphasized in the dashboard trim made from Eucalyptus – a renewable
resource harvested 100% from responsible forestry. Here, the use of
natural substances for the finishing process help protect and at the same
time display the wood’s natural aesthetics and properties, including the
possibility to develop interesting patinas through time. A dark wood filler
is applied to accentuate the natural contrast of grain tones. This approach
to designing implies that, instead of forcing the wood into traditional
industrialized processes, a process was created to enhance the material’s
unique aesthetic and natural properties.
	Leather
Traditional leather tanning processes for automotive interiors focus on
achieving consistency of quality by ensuring that the thickness of the
material is the same throughout, the surface is regular and free from
blemishes and the colouration does not present any major variations from
piece to piece. This is often achieved through the process of chrome
tanning, which produces consistent results but tends to be very toxic.
	 Furthermore, in order to obtain hides of the finest quality without
surface regularities, they need to be sourced from places where the bulls
are rarely exposed to insects, avoiding scarring and bite marks. These
requirements often apply to high-end or premium applications of automotive or aviation interiors and make the price of producing premium-quality
hides very costly.
	 What makes the leather approach for the BMWi series interesting
from a materials design perspective – besides the fact that it has been
organically tanned with olive leaf extracts – is that it creates a shift not
just in how leather is processed but also, in how it is perceived aesthetically, when it comes to premium applications. The soft, comfortable and
inviting look and feel provided by the natural tanning process, is reminiscent of that of a leather surface of a comfortable vintage chair. The finish
welcomes slight patination through time and use, making the surfaces
even more special.
	 Kenaf Fibres
A new trend in materials design for automotive interiors is the use of bio
composites as visible design and styling elements. Utilizing natural fibers
in door panels or parts, saves 10-50% of the weight of traditional injection
moulded plastic derived from petrochemicals.
	 Traditionally, part of the aesthetic requirements for automotive interiors within the premium category are interior panels fully upholstered
in leather or a combination of other high-end materials bonded or glued
together and placed over injection-moulded structural parts. This results
in extra weight and higher manufacturing costs.</span></p><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">11 6</span></p></section><hr data-dcnode-id="878"><section aria-label="Page 34" data-dcnode-id="869"><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">CAS E S T U DY</span></p><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Seat detail of the BMW i8 showcasing
orange leather in composition with other
interior trim elements.</span></p><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Seat detail of the BMW i3 showcasing
white leather in composition with other
interior trim elements.</span></p><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">11 7</span></p></section><hr data-dcnode-id="868"><section aria-label="Page 35" data-dcnode-id="865"><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">9
1 25</span></p></section><hr data-dcnode-id="864"><section aria-label="Page 36" data-dcnode-id="855"><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">MACHINED ALUMINIUM WITH NEAL FEAY
With expert knowledge and the right amount of creativity, experimentation and development, a materialâ&amp;amp;#x20AC;&amp;amp;#x2122;s intrinsic properties can become
an integral part of the design process, fuelling the creation of truly
unique results.
Neal Feay, a company based in Santa Barbara, California, was founded by
Neal F. Rasmussen in 1945 during the post-World War II aluminium boom.
The company is a pioneer in the creation of high-end and sophisticated
aluminium products. Their innovative manufacturing processes include
selected multi-colour anodizing NFS and several refined techniques for
machining and working with aluminium.
Photo by Alex Blair</span></p><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The CNC milled pattern with ball end mill is
followed by a selective anodizing process using
water based dye. Surface by Neal Feay.</span></p><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">126</span></p></section><hr data-dcnode-id="854"><section aria-label="Page 37" data-dcnode-id="841"><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">CAS E S T U DY</span></p><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Working with Aluminium
A key principle of designing with aluminium is understanding what is
possible to achieve based on how the material behaves both technically,
through mechanical engineering, and practically, through industrial
design.
	 â&amp;amp;#x20AC;&amp;amp;#x153;We never work in a vacuum, we always think about the finishing,
before we work on the form. We never come up with a shape and
try to figure out how to finish it or how to make it, because we are
controlling the entire process, we have all of those little pieces of
the puzzle.â&amp;amp;#x20AC;?				
Alex Rasmussen, President Neal Feay</span></p><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Photo by Alex Blair</span></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Inherent characteristics of aluminium itself, such as luminosity, reflectivity, visual richness and physical lightness, yield a range of specific look
and feel properties that are unique to the material. In the same manner
certain finishing processes are directly related to the way the material is
manufactured. For example, only pure aluminium can be anodised so if
the base aluminium is not completely pure or if it has been cast with other
alloying elements, it will not anodise properly and the colour and finish
of the final surface will be altered. In the case of Neal Feay, a highly pure
grade of aluminium is utilized for machining an initial slab which can be
sheet, plate, or extrusion.</span></p><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Machined aluminium tray with intriguing
volume and surface texture. The form and
pattern were CNC milled and followed by
a polish and black anodize. Design by Alex
Rasmussen, Neal Feay (Design Miami 2014).</span></p><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">1 27</span></p></section><hr data-dcnode-id="840"><section aria-label="Page 38" data-dcnode-id="831"><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">The textures on the machined aluminium wine
chillers are engraved in varying depths and are
inspired by the wind patterns of cold fronts as
they move around the globe. Designed by Joe
Doucet, crafted by Neal Feay.
Photo by Alex Blair</span></p><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Different processes can be utilized to transform a solid piece into a
beautiful object with unique form, surface and finish. Machining aluminium – a core expertise of Neal Feay – is a very reductive process, which
usually begins by taking solid stock of the material and cutting it away
with the appropriate tools. The selection of the right tooling for each form
is directly related to the surface texture and therefore to the desired finish
of the product or part.
	 “A lot of what we are doing with the surface texture is not a separate step from the form, it is completely integral to the form, so the
way we create the surface, is the way we create the form”
Alex Rasmussen
When a part is machined, it will automatically display the marks from the
cutting tool that was utilized to create it. These marks or steps need to
be blended out later on, especially if they visually create an un-finished
surface, which is too distracting or too reflective. Heavy circular machin-</span></p><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">128</span></p></section><hr data-dcnode-id="830"><section aria-label="Page 39" data-dcnode-id="819"><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">CAS E S T U DY</span></p><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Photo by Andrew Zuckerman</span></p><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">ing marks for instance, create a sort of “optical illusion” surface effect and
make it difficult to appreciate the form. In these cases, post-machining
processes like sand blasting or bead blasting can be used to smoothen
the surface and blend out tooling marks, making it less reflective and the
form more prevalent.
	 The real genius of Neal Feay Company when it comes to materials
design, lays in the creation of the entire tooling process, in order to
produce beautifully refined surface textures that become at the same
time finishing elements and in some cases, final products. A big part of
the innovation in the tooling process has to do with what is affordable
at different levels. There is a direct correlation between machining time
versus cost of making a part. The key is to balance out the time needed to
create a part with enough surface richness, in a way that is proportionate
to the final cost. In general, the more refined and smooth the machined</span></p><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">The (RED) Desk was designed by Marc Newson
and Jony Ive for Bono’s RED charity auction
by Sotheby’s in 2013. One of the many reasons
why the desk was so unique and expensive to
make is that many of its parts, besides being
machined out of a single block of aluminium,
were polished and finished by hand. The desk
was produced by Neal Feay Studio.</span></p><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">1 29</span></p></section><hr data-dcnode-id="818"><section aria-label="Page 40" data-dcnode-id="811"><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">ELEVATING VALUE
The sensorial aspect of finish design is closely, though not exclusively,
connected with time-intense manufacturing processes, high levels of
intricacy, complexity and unique know-how. Extreme detailing makes
products also more expensive as they take longer to be crafted and
are more difficult to replicate.
	Hand-made
Handcrafted objects are unique from the moment of creation, as they
can’t be exactly replicated. The skills to create hand-made products are
rare and difficult to acquire nowadays. In fact, the increasing amount of
mass produced consumer goods is causing many traditional manufacturing skills to disappear as the few people who had them, move out to
major cities in search for better jobs. It is difficult for younger generations
to take on the task to learn and preserve traditional handcraft skills without proper support from the government or the private industrial sector.
Because of this, the value of hand-made products has skyrocketed within
recent years, especially if it involves legendary materials or traditional
making processes.
	 There has been an emergence of creative incubators, brand-specialized workshops, accelerators and company-run education centres promoting new education models that prioritize the preservation of skills and
the fast tracking of funding for real impact ideas and enterprises. There
has been a surge in the use of natural materials, such as wood, ceramics,
glass and silk, in industrially manufactured consumer products, as an
approach to bring back natural imperfection to otherwise overly smooth
and perfect glossy products.
	 Wearing in
Natural materials like wood, certain metals and leather, are expected
to wear out through time and usage. This property is of high value in
the Western culture. Many products created with these materials – like
watches, fine jewellery and classic furniture pieces – are designed to
become iconic pieces and last a long time as they are handed down from
one generation to the next. The materials are expected to develop some
kind of “patina” and become softer to the touch as they wear in.</span></p><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">14 2</span></p></section><hr data-dcnode-id="810"><section aria-label="Page 41" data-dcnode-id="803"><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">CAS E S T U DY</span></p><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Kristaliaâ&amp;amp;#x20AC;&amp;amp;#x2122;s hide chair 1085 edition is made from
timeless materials including a natural leather
hide, which is expected to work as an evolving
canvas. It will move, change colour and develop
ageing patinas, thus becoming increasingly
more beautiful and more unique through time.</span></p><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">143</span></p></section><hr data-dcnode-id="802"><section aria-label="Page 42" data-dcnode-id="795"><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">FUNCTIONAL FINISHES
Decoration technologies allow for the
creation of a great variety of surface
finishes, while providing materials and
products with new functional qualities.</span></p><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">14 4</span></p></section><hr data-dcnode-id="794"><section aria-label="Page 43" data-dcnode-id="791"><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">12
145</span></p></section><hr data-dcnode-id="790"><section aria-label="Page 44" data-dcnode-id="779"><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Challenges
1. Brushed surfaces for automotive trim applications must be smooth
to the touch.
2. In the automotive industry, tests must be performed to ensure
the treated metal surface is not going to be affected by reactions to
external chemicals, such as sunscreen lotion or oil from fingerprints.
3. High gloss polished metal is the most critical finish for automotive
interiors applications in general because, if the surface is too reflective, it can create dangerous glare to the driver.
4. High quality surface polishing is often performed by hand, which is
very time consuming and results in higher production costs.</span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">EMBOSSING</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Embossing is a process that combines heat and pressure, in order to
create a tri-dimensional pattern, which is pressed on sheet metal, by
passing the part through male and female roller dies. Aesthetic applications include home appliances, architectural panels as well as, automotive
and consumer electronics trims. The process can be applied to different
metals including aluminium alloys, brass, steel and zinc.
Benefits
1. The process of embossing allows for maintaining the same metal
thickness before and after the part is treated.
2. It can be used from medium to high production runs and also for
unlimited amounts.
3. It allows for the creation of unlimited pattern possibilities, which
can be printed with no variation from part to part.
4. Functionally, it can help reduce friction and static of the part as well
as increase its stiffness and rigidity. I can also help improve surface
grip, weather the part is handheld or used for high-traffic applications.
Challenges
1. Embossed surfaces can accumulate dirt or oil through time and use,
within the creases that the pattern forms.
2. Metal trims for automotive are usually no more than 2 mm thick, so
patterns with extreme radios can break the part.
3. Embossed patterns can be more expensive to produce because a
pattern cylinder needs to be custom-created for each design. This
cost should be factored into the cost of the final part.</span></p><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">160</span></p></section><hr data-dcnode-id="778"><section aria-label="Page 45" data-dcnode-id="765"><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">M E TA L S</span></p><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Photo by Alex Blair</span></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">The aluminium trays are hand-dipped in
water-based dye, a process that resembles that
of painting Easter eggs. Trays by Neal Feay and
Opening Ceremony.</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">ANODISING</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Anodising is a process used to make metal less affected by environmental
factors, such as air and water, by increasing the thickness of the natural
oxide layer on surfaces and parts. Aluminium alloys are anodised to
increase corrosion resistance, allow for colouring, improve lubrication
or adhesion, and to create a non-conductive layer. The most common
anodising process, with sulphuric acid on aluminium, produces a porous
surface which can accept dyes easily.</span></p><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">161</span></p></section><hr data-dcnode-id="764"><section aria-label="Page 46" data-dcnode-id="753"><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Benefits
1. Anodised aluminium can be up to 50% more durable than aluminium on its own. This is thanks to an anodising process that uses an
electric charge and a diluted acid bath (15% per cent of sulphuric acid
solution activates the anodizing process) to create a layer of oxide on
the surface of the metal.
Challenges
1. Although the number of dye colours is almost endless, they tend to
vary according to the type of base alloy utilized, making them difficult
to replicate.
2. Anodising is the most expensive of all of the processes used to
colour aluminium. Only pure aluminium can be anodised so the purity
of the material is very important. Cast aluminium for instance, contains additional elements like silicone, copper and zinc, which are not
evenly spread and do not etch properly. When anodised, these elements turn grey or black, producing surfaces that can be too porous
to obtain the desired colour. Therefore anodising is most effective
when applied to pure aluminium, preferably extruded or machined.</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">LASER CUTTING / MARKING</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Laser cutting is a process utilized to cut different materials â&amp;amp;#x20AC;&amp;amp;#x201C; including
metal â&amp;amp;#x20AC;&amp;amp;#x201C; for industrial manufacturing applications through the use of a
high-power laser operated through optics. This process burns the material, leaving an edge with very high quality surface finish. Laser marking
and laser engraving are processes more common to the jewellery and
small accessories industry. While laser marking is an annealing process,
involving heat treatment to change a metal surfaceâ&amp;amp;#x20AC;&amp;amp;#x2122;s colour or to create a
surface decoration effect, laser engraving consists of removing material
from the surface.
Benefits
1. In consumer electronics, smaller and fine details like grips, screw
wholes and other precise assembly features are performed by laser
cutting in order to obtain a level of maximum precision.
2. Laser marking is a chemical and residue-free process, which can
last longer than traditional engraving decoration.
Challenges
1. In some cases, a high amount of concentrated energy applied to a
very thin part can break it or distort its form. Also, if the laser heat is
not properly calibrated, burning marks can occur.
2. In general, laser markings or engravings on soft metals are likely to</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">162</span></p></section><hr data-dcnode-id="752"><section aria-label="Page 47" data-dcnode-id="741"><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">M E TA L S</span></p><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">scratch and wear faster than if applied on harder metals. The use of
harder metals is recommended, as they are more likely to provide the
surface decoration with a longer lifespan.</span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">PVD COATING</span></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">PVD stands for Physical Vapour Deposition. It is a method where coated
ions are bombarded onto the surface of a material in order to create a
metallic, decorative look in a wide range of colours. PVD coatings are
established surface finishing processes for the watch industry and in
general products where long time quality is expected.
	 Some of the most common metals used in this process include, zirconium, titanium-aluminium alloys, chromium and niobium as well as brass
and zinc. Depending on the industry and on further processing methods,
different formulations of the PVD coatings can be created in order to
elevate certain material and surface properties.
Benefits
1. Compared to traditional electroplated coatings, PVD coatings can
provide higher hardness, resistance to wear and friction.
2. The process allows for a great variety of colours, which do not
change or tarnish over time or under UV radiation.
3. Since the process is controlled by and stored in computer-controlled
systems, the quality of the colours and coatings can be easily replicated.
4. Currently, there are new developments of hybrid PVD coating
technologies and Nano-composite coatings based on a dielectric
matrix with embedded metallic Nano clusters, which besides offering
increased durability, will aid in the creation of new colours, like green
and red, which were previously considered challenging to achieve.
Challenges
1. This process is limited to conductive materials or surfaces that can
be oxidized.
2. Surfaces that have been PVD coated tend to reveal fingerprints and
scratches easily.
3. If a PVD coating is used to create graphics, it tends to be more
durable when applied to harder materials.
4. Because PVD coatings are very thin â&amp;amp;#x20AC;&amp;amp;#x201C; 0.3 microns â&amp;amp;#x20AC;&amp;amp;#x201C; when used for
decorative surface finishing processes, they do not offer substantial
corrosion protection to the part therefore, they need to be applied
over a corrosion resistant nickel or chromium coating. In some cases, a
ceramic coating is deposited during the process to increase hardness.</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">1 63</span></p></section><hr data-dcnode-id="740"><section aria-label="Page 48" data-dcnode-id="729"><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">PLATING</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Commonly known as electroplating, the process uses an electric current
to ad a metallic layer onto a surface in order to impart it with physical
properties such as corrosion resistance, durability, hardness and ease
of cleaning. The process puts a negative charge onto the metal part
before dipping it into a solution with positively charged metal ions.
Due to the positive and negative charges, the two metals attract each
other forming a uniform layer. There are different types of electroplating
processes including copper plating, silver plating and chromium plating.
The traditional plating process involves initial steps, such as polishing</span></p><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Plated finishes samples by HighTech finishing.</span></p><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">164</span></p></section><hr data-dcnode-id="728"><section aria-label="Page 49" data-dcnode-id="721"><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">M E TA L S</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">the raw material to a mirror smooth finish, applying a base of copper
to seal the surface and applying a layer of nickel to provide a durable
foundation. Only after these steps are conducted, the selected plated
effect can finally be applied in a polished, satin or matte finish. The
entire plating process may take up to 50 steps and certain variations can
occur due to poor base material quality, type of finish selected and other
processing variables. Some of the most commonly used materials that get
electroplated include aluminium in the aviation industry for its strength,
lightweight and formability properties, as well as steel, zinc and plastics,
which are widely used across industries including automotive, cosmetic
package, fashion accessories, toys and a broad range od consumer
electronics.
Benefits
1. This technology is very useful when it comes to providing ordinary
surfaces with an elegant metal look and feel at a low cost.
2. Besides providing a wide variety of colours and textures to choose
from, plating is also used to improve resistance to corrosion and wear,
as well as to impart electrical conductivity to the materials or parts it
is applied to.
3. It is a repeatable process, so damaged parts can be reworked to
match the original existing part. This is an especially good advantage
when designing large aviation interiors.
Challenges
1. Although plastics have become more popular as a base material for
plating, they are often problematic due to limitations in the process
and due to poor surface quality.
2. If Nickel is used in the process, additional testing for nickel release
of the plated part should be conducted, in fact, for parts meant to
be in direct contact with the skin, nickel-free plating processes are
recommended.
3. For the aviation industry, most plating finishes are created to meet
strict ISO controlled processing standards and each part needs to
pass through various levels of inspection with a near zero defect ratio.
4. Satin finishes require extra steps to produce the satin lines or
â&amp;amp;#x20AC;&amp;amp;#x153;grainâ&amp;amp;#x20AC;? on the finish. Parts must be plated to a polished finish first and
then a rough pad is used to manually go back and forth along the part
to apply pressure to the finish, producing the satin texture. A great
deal of hand skill is required to keep satin lines straight. It may take
several passes with alternating pads of various levels of roughness in
order to achieve the desired surface texture effect.</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">165</span></p></section><hr data-dcnode-id="720"><section aria-label="Page 50" data-dcnode-id="711"><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">166</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Sensitile Systems. Photo by Dice Yamaguchi</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">PLASTICS</span></p></section><hr data-dcnode-id="710"><section aria-label="Page 51" data-dcnode-id="703"><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">P L AS T I C S</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">MOST COMMON TYPES	
Plastics are both synthetic and semi-synthetic materials that can be
moulded into different shapes and products. Most plastics are petro-chemical based and some of them are partially natural.
	 The first completely synthetic plastic was Bakelite and was invented
in 1907. In 1933, polyethylene was discovered. The First World War’s
improvements in chemical technology led to an explosion in new forms of
plastic and mass production began between the 1940s and 1950s.
	 In today’s industrial landscape, plastics are considered the quintessential material of mass production, not just because of their versatility
as they offer endless creative design possibilities all throughout their
production process, but also and especially because of their ease of
manufacturing, their accessibility, abundance and affordability.
	 During the peak oil era, plastics have acquired a slightly negative
connotation for being synthetic materials derived from petrochemicals.
Although they have been increasingly associated with environmental
pollution and waste creation; different biodegradable formulations of
more sustainable plastic composites are now being developed, including
bio-composites and a range of natural plastics called bio-plastics.
	 For CMF design purposes, plastics facilitate the offering of multiple
colours and surface effects without necessarily incurring into new moulding or tooling costs. They can be coloured and textured directly in the
mould. Moreover, different material effects can be added to the pigment
mixture itself during its fabrication in order to achieve different looks.
Metalized or pearlescent particles, reinforcing fillers and minerals or
metal capable of improving plastic’s performance are just a few.
	 After plastics are formed they allow for a broad range of post-moulding finishes such as electroplating, painting, coating, laser-marking,
digital and silk printing. They are also ideal when it comes to the creation
of complex forms and challenging constructions achieved through mixed
processes including co-moulding with rubber or silicone, rotor moulding
and injection moulding.
	 In terms of challenges, recycling can be difficult for certain types of
plastics, such as PVC (Polyvinyl Chloride) and vinyl. PVC releases dioxins
during and after its production, which may pollute the air as it produces
VOC’s (volatile organic compounds) which, can cause respiratory issues
and headaches. The disposal process of vinyl is also challenging as it
does not biodegrade; it can only become smaller and smaller through
physical disintegration, so its particles can be harmful to the bodies of
birds and fish.</span></p><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">167</span></p></section><hr data-dcnode-id="702"><section aria-label="Page 52" data-dcnode-id="689"><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">CMF DESIGN</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">COLOUR DESIGN

performance is achieved, can a product provide a consistent and successful
user experience. The discipline of CMF design focuses on designing and
specifying colours, materials and finishes to support both functional and
emotional attributes of products. The work of the CMF designer combines
aesthetics and practical knowledge of materials and technologies with
intangible human perceptions of value.
This area of design expertise is increasingly in demand. Consumer product
manufacturers have an enhanced awareness of its great potential for
diversifying product portfolios at relatively low costs, while still maintaining
a similar or the same product shape, functionality or tooling. It can work as a
key avenue to create a sense of novelty and higher value propositions. From
a marketing perspective, CMF design is
a valuable tool when it comes to positioning products, collections and
categories according to market tiers and consumer segmentations.
Introducing the CMF process and detailing the areas of colour, finish and
material design, this book serves as a valuable source of information about
this emerging professional discipline and its fundamental principles.</span></p></section><hr data-dcnode-id="623"></main><nav data-dcnode-id="452"><ul data-dcnode-id="453"><li data-dcnode-id="619" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/framepublishers/docs/cmf_webbook_150dpi_issuu/1"><span data-dcnode-id="621" instrument_node="">1</span></a></li><li data-dcnode-id="616" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/framepublishers/docs/cmf_webbook_150dpi_issuu/2"><span data-dcnode-id="618" instrument_node="">2</span></a></li><li data-dcnode-id="613" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/framepublishers/docs/cmf_webbook_150dpi_issuu/3"><span data-dcnode-id="615" instrument_node="">3</span></a></li><li data-dcnode-id="610" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/framepublishers/docs/cmf_webbook_150dpi_issuu/4"><span data-dcnode-id="612" instrument_node="">4</span></a></li><li data-dcnode-id="607" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/framepublishers/docs/cmf_webbook_150dpi_issuu/5"><span data-dcnode-id="609" instrument_node="">5</span></a></li><li data-dcnode-id="604" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;pa __product-heading__wGhnq__0-0-946 ProductHeading__product-heading--step-negative-1__Os5tA__0-0-946" data-dcnode-id="447" data-testid="document-title" itemprop="name"><span data-dcnode-id="448" instrument_node="">PREVIEW CMF Design – The Fundamental Principles of Colour, Material and Finish Design</span></h3></div><div class="sc-1dtopex-0 hOnGhq" data-dcnode-id="439"><p class="ProductParagraph__product-paragraph__GMmH0__0-0-946 ProductParagraph__product-paragraph--step-negative-2__HWaFp__0-0-946" data-dcnode-id="440"><span data-dcnode-id="445" instrument_node="">Published on</span><span data-dcnode-id="443" instrument_node=""> </span><time data-dcnode-id="441" datetime="2016-03-01T00:00:00.000Z" itemprop="datePublished"><span data-dcnode-id="442" instrument_node="">Mar 1, 2016</span></time></p></div><div class="sc-1p5a60c-1 XDIdR" data-dcnode-id="430"><p class="ProductParagraph__product-paragraph__GMmH0__0-0-946 ProductParagraph__product-paragraph--step-0__AsHY7__0-0-946" data-dcnode-id="431"><span data-dcnode-id="438" instrument_node="">In this first book about the rather young discipline, the author consolidated its key principles, so that they can be consulted, referenced and utilised by both design students and professionals.
