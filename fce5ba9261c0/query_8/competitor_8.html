intensity of ritual, people focus their attention on a limited range of
symbols. The greater their emotional involvement the more the rest of the
universe is obliterated, and the more the symbols in the rites become
authoritative” (Tesser 1978: 298 cited in Kertzer 1988: 99-100). Due to the
emotional intensity of the initiation procedure, when the children return to
the village, they return as killers of pigs, and in times of tribal conflict,
killers of men. </span></span></font></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629" style="text-align:justify;line-height:150%"><font data-dcnode-id="630" size="3"><b data-dcnode-id="631"><span data-dcnode-id="632" lang="EN-US"><span data-dcnode-id="633" instrument_node="">&nbsp;</span></span></b></font></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="620" style="text-align:justify;line-height:150%"><font data-dcnode-id="621" size="3"><span data-dcnode-id="622" lang="EN-US"><span data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="625" instrument_node="">For the Triads, secrecy is
of prime importance, new initiates taking thirty-six oaths, many pertaining to
secrecy. The purpose of the ritual is both to initiate new members into the
society, and educate them in the in Triad lore. Kertzer claims, “Rituals do not
simply excite, they also instruct. But the potency of that instruction depends
heavily on the power of ritual to place an individual in a receptive frame of
mind” (Kertzer 1988: 99).The initiation rituals are therefore formulated to
induce a maximum state of emotional receptivity. After taking their vows using
incense sticks to show assent, the initiate douses them in a bowl of water
saying: “may my life go out like the fire of these incense sticks if I prove a
traitor or false to my oath” (Fontaine 1985: 46). The papers from which the
oaths were read are then placed in the censer which is smashed on the floor
while a member of the brotherhood intones, “may such be the fate of all
traitors” (Fontaine 1985: 46). A cock is then beheaded with a sword, symbolic
of the fate of a traitor, and the blood mixed with the initiates blood, water
and incense ashes, which upon being drunk, incorporates the initiate as a
blood-brother in the society. In an earlier stage in the ceremony, the initiate
had walked beneath a gate constructed of swords. “The passage under a gate of
swords was intended to enforce the maledictions of the blood covenant, which
specified that the triad member would be killed by these swords if he were to
break his sacred promises” (Ter Haar 1988: 108).</span><b data-dcnode-id="623"><span data-dcnode-id="624" instrument_node=""> </span></b></span></font></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="614" style="text-align:justify;line-height:150%"><font data-dcnode-id="615" size="3"><b data-dcnode-id="616"><span data-dcnode-id="617" lang="EN-US"><span data-dcnode-id="618" instrument_node="">&nbsp;</span></span></b></font></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="607" style="text-align:justify;line-height:150%"><font data-dcnode-id="608" size="3"><span data-dcnode-id="609" lang="EN-US"><span data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="610" instrument_node="">The universal commonality
and thus most important aspect of ritual and symbolism is therefore to produce
an emotionally charged state so as to make the actor emotionally vulnerable and
susceptible to influence and suggestion. It is only in this state that feelings
of loyalty, effective communication, the bonding of communities or rites of
passage occurs. Depending on the purpose of the ritual, differing emotional
states may be required; excitement, lust, fear, confusion, one-heartedness. For
a ritual or symbol to be considered successful, the emotional state produced
must be sufficiently compelling to allow the ritual or symbol to perform its
intended function.</span></span></font></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="602" style="text-align:justify;line-height:150%"><font data-dcnode-id="603" size="3"><span data-dcnode-id="604" lang="EN-US"><span data-dcnode-id="605" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="601" instrument_node="">
</span><p align="center" data-dcnode-id="597" style="text-align:center"><font data-dcnode-id="598" size="3"><span data-dcnode-id="599" lang="EN-US"><span data-dcnode-id="600" instrument_node="">References</span></span></font></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="592" style="text-align:justify"><font data-dcnode-id="593" size="3"><span data-dcnode-id="594" lang="EN-US"><span data-dcnode-id="595" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="585" style="text-align:justify"><font data-dcnode-id="586" size="3"><span data-dcnode-id="587" lang="EN-US"><span data-dcnode-id="590" instrument_node="">Atkinson,
J. 1987 ‘The effectiveness of shamans in an Indonesian ritual’. </span><i data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">American</span></i></span></font></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="577" style="text-align:justify"><font data-dcnode-id="578" size="3"><i data-dcnode-id="581"><span data-dcnode-id="582" lang="EN-US"><span data-dcnode-id="583" instrument_node="">Ethnologist</span></span></i><span data-dcnode-id="579" lang="EN-US"><span data-dcnode-id="580" instrument_node=""> 89: 342-355.</span></span></font></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="572" style="text-align:justify"><font data-dcnode-id="573" size="3"><span data-dcnode-id="574" lang="EN-US"><span data-dcnode-id="575" instrument_node="">&nbsp;</span></span></font></p><p data-dcnode-id="566" style="text-align:justify"><font data-dcnode-id="567" size="3"><span data-dcnode-id="568" lang="EN-US"><span data-dcnode-id="571" instrument_node="">Barth, F. 1987 </span><i data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Cosmologies in the Making: A Generative
Approach to Cultural</span></i></span></font></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="558" style="text-align:justify"><font data-dcnode-id="559" size="3"><i data-dcnode-id="562"><span data-dcnode-id="563" lang="EN-US"><span data-dcnode-id="564" instrument_node="">Variation in Inner New Guinea.</span></span></i><span data-dcnode-id="560" lang="EN-US"><span data-dcnode-id="561" instrument_node=""> Cambridge: Cambridge University Press.</span></span></font></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="553" style="text-align:justify"><font data-dcnode-id="554" size="3"><span data-dcnode-id="555" lang="EN-US"><span data-dcnode-id="556" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="545" style="text-align:justify"><font data-dcnode-id="546" size="3"><span data-dcnode-id="547" lang="EN-US"><span data-dcnode-id="551" instrument_node="">Bell, C. 1992 </span><i data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Ritual Theory, Ritual Practice</span></i><span data-dcnode-id="548" instrument_node="">. New
York: Oxford University Press.</span></span></font></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="540" style="text-align:justify"><font data-dcnode-id="541" size="3"><span data-dcnode-id="542" lang="EN-US"><span data-dcnode-id="543" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="528" style="text-align:justify"><font data-dcnode-id="529" size="3"><span data-dcnode-id="537" lang="EN-US"><span data-dcnode-id="538" instrument_node="">Bloch,
M. ‘Symbols, song, dance and features of articulation: or is religion an
extreme form of traditional authority?’ in Bloch, M. </span></span><span data-dcnode-id="535" lang="EN-US"><span data-dcnode-id="536" instrument_node="">(ed.),
</span></span><i data-dcnode-id="530"><span data-dcnode-id="531" lang="EN-US"><span data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">&nbsp;</span></span><span data-dcnode-id="532" instrument_node="">Ritual, history and power:</span></span></i></font></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="520" style="text-align:justify"><font data-dcnode-id="521" size="3"><i data-dcnode-id="524"><span data-dcnode-id="525" lang="EN-US"><span data-dcnode-id="526" instrument_node="">selected papers in anthropology</span></span></i><span data-dcnode-id="522" lang="EN-US"><span data-dcnode-id="523" instrument_node="">. The Athlone Press.</span></span></font></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="515" style="text-align:justify"><font data-dcnode-id="516" size="3"><span data-dcnode-id="517" lang="EN-US"><span data-dcnode-id="518" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="505" style="text-align:justify"><font data-dcnode-id="506" size="3"><span data-dcnode-id="507" lang="EN-US"><span data-dcnode-id="513" instrument_node="">Boyer, P. 1995 </span><i data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">The Naturalness of Religious Ideas: A
Cognitive Theory of Religion. </span></i><span data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">&nbsp;</span></span><span data-dcnode-id="508" instrument_node="">Berkeley: University of California Press. </span></span></font></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="500" style="text-align:justify"><font data-dcnode-id="501" size="3"><span data-dcnode-id="502" lang="EN-US"><span data-dcnode-id="503" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="489" style="text-align:justify"><font data-dcnode-id="490" size="3"><span data-dcnode-id="491" lang="EN-US"><span data-dcnode-id="498" instrument_node="">Broda, J &amp;
