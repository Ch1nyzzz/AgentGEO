</span><h3 align="left" data-dcnode-id="1449" id="sites-page-title-header" style="" xmlns="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1453" instrument_node="">
</span><span data-dcnode-id="1451" dir="ltr" id="sites-page-title" style="outline: none" tabindex="-1"><span data-dcnode-id="1452" instrument_node="">......................... Ritual and Symbolism .....................</span></span><span data-dcnode-id="1450" instrument_node="">
</span></h3><span data-dcnode-id="1448" instrument_node="">
</span><div class="sites-canvas-main" data-dcnode-id="129" id="sites-canvas-main"><span data-dcnode-id="1447" instrument_node="">
</span><div data-dcnode-id="131" id="sites-canvas-main-content"><span data-dcnode-id="1446" instrument_node="">
</span><table cellspacing="0" class="sites-layout-name-one-column sites-layout-hbox" data-dcnode-id="133" xmlns="http://www.w3.org/1999/xhtml"><tbody data-dcnode-id="134"><tr data-dcnode-id="135"><td class="sites-layout-tile sites-tile-name-content-1" data-dcnode-id="136"><div data-dcnode-id="137" dir="ltr"><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1439" style="text-align:center;line-height:150%"><font data-dcnode-id="1440" size="4"><b data-dcnode-id="1441"><span data-dcnode-id="1442" lang="EN-US" style="line-height:150%"><span data-dcnode-id="1444" instrument_node="">Ritual and symbolism may indeed communicate, but it is
not clear what or how they communicate, nor is it clear that communication is
the most important aspect of ritual and symbolism. </span><br data-dcnode-id="1443"></span></b></font></p><span data-dcnode-id="1438" instrument_node="">
</span><p align="center" data-dcnode-id="1433" style="text-align:center;line-height:150%"><font data-dcnode-id="1434" size="4"><b data-dcnode-id="1435"><span data-dcnode-id="1436" lang="EN-US" style="line-height:150%"><span data-dcnode-id="1437" instrument_node="">By</span></span></b></font></p><span data-dcnode-id="1432" instrument_node="">
</span><p align="center" data-dcnode-id="1425" style="text-align:center;line-height:150%"><font data-dcnode-id="1426" size="4"><b data-dcnode-id="1427"><span data-dcnode-id="1428" lang="EN-US" style="line-height:150%"><span data-dcnode-id="1431" instrument_node="">Fabian Graham</span><font data-dcnode-id="1429" size="3"><br data-dcnode-id="1430"></font></span></b></font></p><p align="center" data-dcnode-id="1423" style="text-align:center;line-height:150%"><br data-dcnode-id="1424"></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1406" style="margin:0cm 72pt 0.0001pt;text-align:justify;line-height:150%"><font data-dcnode-id="1407" size="3"><span data-dcnode-id="1408" lang="EN-US"><span data-dcnode-id="1421" instrument_node="">The year, 1519. The location Tenochtitlan, nucleus of
the Aztec world. Atop Temple Mayor, a pyramid dedicated to the god
Huitzilopochtli, ritual human sacrifice occupied central stage. The altar and
domed sacrificial platform (</span><i data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">techcatl</span></i><span data-dcnode-id="1418" instrument_node="">)
were situated atop a long series of stone steps. Victims, prisoners of war and
slaves, many whimpering or screaming, bound and shackled, were forced to ascend
the pyramid. One by one, having witnessed the fate of those that went before
them, they were held fast on the sacrificial platform by four priests, their
back painfully arched, and their chest, facing towards the sky, taut. Employing
a ritual flint knife (</span><i data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">tecpatl</span></i><span data-dcnode-id="1415" instrument_node="">), the
priest carved through the wall of their chest, and ripped out their still
beating heart, striking it against the altar, before placing it into a carved
circular “eagle vessel” (</span><i data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">cuauhxicalli</span></i><span data-dcnode-id="1412" instrument_node="">),
where it continued to beat. The live body was unceremoniously rolled, flailing,
down to the jubilant crowds gathered below. The captor or owner of the victim
collected the corpse from which the best meat was carved for a ritual feast.
The skull was decapitated; the brains removed, and after flaying, the skull was
placed on a long pole (</span><i data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">tzompantli</span></i><span data-dcnode-id="1409" instrument_node="">) in
like company. Meanwhile, at the altar, as the next man was led to the
sacrificial platform, the lips of the stone depictions of the gods were
nourished with the blood of the previous victim (Broda, Carrasco and Moctezuma
1987: 152. Kertzer 1988: 33-34).</span></span></font></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1401" style="text-align:justify;line-height:150%"><font data-dcnode-id="1402" size="3"><span data-dcnode-id="1403" lang="EN-US"><span data-dcnode-id="1404" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1387" style="text-align:justify;line-height:150%"><font data-dcnode-id="1388" size="3"><span data-dcnode-id="1389" lang="EN-US"><span data-dcnode-id="1399" instrument_node="">Durkheim claimed, “There is no religion that is not both a cosmology
and a speculation about the divine” (Durkheim 1915: 8). However, while this </span><i data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">may</span></i><span data-dcnode-id="1396" instrument_node=""> be true, the relationship between
religious ritual and systems of political power is ecumenical. By drawing on
ethnographic examples from different regions and eras, this paper will </span><i data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">not</span></i><span data-dcnode-id="1393" instrument_node=""> endorse the notion that
communication is the most important aspect of ritual and symbolism, but
instead, through focusing on the functions of ritual, aspects of communication
contained, and the various illusions that rituals create, it aims to establish
a commonality that is shared by all ritual. In essence, once a universal
commonality has been isolated, it </span><i data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">should</span></i><span data-dcnode-id="1390" instrument_node="">
represent the essential and therefore most important aspect of ritual and
symbolism. However, this universal commonality is not intended to be
definitional of either ritual or symbolism, as any universal construct will
inevitably be incomplete and additional categories will invariably be required
to account for instances that do not match the boundaries of the original term
(Bell 1992: 69). </span></span></font></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1382" style="text-align:justify;line-height:150%"><font data-dcnode-id="1383" size="3"><span data-dcnode-id="1384" lang="EN-US"><span data-dcnode-id="1385" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1373" style="text-align:justify;line-height:150%"><font data-dcnode-id="1374" size="3"><span data-dcnode-id="1375" lang="EN-US"><span data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1378" instrument_node="">The shared commonality is
the induction of an emotionally charged state whereby the individual is
vulnerable and susceptible to the power of suggestion. This vulnerability is
manifested through rituals and symbols, variously constructed to elicit the
required emotional state for the desired communication to occur. Often, the
instigator of the ritual manipulates this susceptibility to reproduce their own
world-view, the instigator being a person or group that organizes a ritual and
promotes a symbol, the actor merely participating in the ritual that utilizes
the symbol. While not every action or sign that elicits an emotional response
is a ritual or symbol, all effective rituals and symbols elicit an emotional
response. The probable success of communication through ritual or symbol can be
measured in proportion to the emotional response elicited.</span><span data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">&nbsp; </span></span></span></font></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1368" style="text-align:justify;line-height:150%"><font data-dcnode-id="1369" size="3"><span data-dcnode-id="1370" lang="EN-US"><span data-dcnode-id="1371" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1360" style="text-align:justify;line-height:150%"><font data-dcnode-id="1361" size="3"><span data-dcnode-id="1362" lang="EN-US"><span data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1364" instrument_node="">The Aztec sacrifices
fulfilled both the religious function of providing the sun with human blood to
fuel its movements across the sky, and the socio-political function of
intimidating the emissaries of other powers into cooperation, thus maintaining
temporary control over the periphery of their empire. Whilst the former relied
on faith, the latter depended on dramatic performance for communication. The
importance of performance in ritual will be analyzed through further
ethnographic examples. The sacrifices were timed around the Mesoamerican
calendar, the major festivals celebrated on the last day of each month (Broda,
Carrasco and Matos 1987: 69). “Guests who witnessed the sacrifices after Aztec
victory … were horrified and so completely intimidated that their cities and
provinces no longer rebelled or disputed the will of the Mexica” (Ingham 1984:
394). However, the image of invincibility portrayed was illusory as human
sacrifice had increased in proportion to political dislocation, and peaked as
Cortes was intensifying his invasion. </span><br data-dcnode-id="1363"></span></font></p><p data-dcnode-id="1356" style="text-align:justify;line-height:150%"><font data-dcnode-id="1357" size="3"><span data-dcnode-id="1358" lang="EN-US"><br data-dcnode-id="1359"></span></font></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1350" style="text-align:justify;line-height:150%"><font data-dcnode-id="1351" size="3"><b data-dcnode-id="1352"><span data-dcnode-id="1353" lang="EN-US"><span data-dcnode-id="1354" instrument_node="">Social and Cultural
Consensus</span></span></b></font></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1345" style="text-align:justify;line-height:150%"><font data-dcnode-id="1346" size="3"><span data-dcnode-id="1347" lang="EN-US"><span data-dcnode-id="1348" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1340" style="text-align:justify;line-height:150%"><font data-dcnode-id="1341" size="3"><span data-dcnode-id="1342" lang="EN-US"><span data-dcnode-id="1343" instrument_node="">Regularity of rituals, however, creates social cohesion, and whether
the rituals are sacred or profane, the calendar ensures the regularity of
rites, festivals and public ceremonies at precise intervals (Durkheim 1915: 8).
Kertzer argued that the cycle of holidays celebrated in the American calendar
is “more sacred than secular” (Kertzer 1988: 65) in the way that calendrical
rites, based around texts, flags and parades, contribute to communal feelings
of unity, creating sentiments of solidarity in a multiracial community where
individuals hold contrasting and conflicting beliefs. Thus, from the
perspective of social control, political organizations can employ ritual to
produce bonds of solidarity and social cohesion, without the need of conformity
of beliefs, or even, necessarily, an identical interpretation of the same
ritual or symbol. </span></span></font></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1335" style="text-align:justify;line-height:150%"><font data-dcnode-id="1336" size="3"><span data-dcnode-id="1337" lang="EN-US"><span data-dcnode-id="1338" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1325" style="text-align:justify;line-height:150%"><font data-dcnode-id="1326" size="3"><span data-dcnode-id="1327" lang="EN-US"><span data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1331" instrument_node="">Where either social or
cultural consensus can be achieved, social consensus, permitting “coordination
and co-existence of the various participants” (Fernandez 1965: 917), is
preferable as a means of producing social cohesiveness. Fernandez’s research of
the Fang reformation cult of northern Gabon illustrates that in cult ritual
where social consensus is paramount, communication </span><i data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">interferes</span></i><span data-dcnode-id="1328" instrument_node=""> with group cohesiveness and solidarity. </span></span></font></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1320" style="text-align:justify;line-height:150%"><font data-dcnode-id="1321" size="3"><span data-dcnode-id="1322" lang="EN-US"><span data-dcnode-id="1323" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1310" style="text-align:justify;line-height:150%"><font data-dcnode-id="1311" size="3"><span data-dcnode-id="1312" lang="EN-US"><span data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1316" instrument_node="">Cultural consensus requires
consistent interpretations of symbols and ritual, and this may be achieved
through discussion, education, and the production of written texts including
propaganda.</span><b data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node=""> </span></b><span data-dcnode-id="1313" instrument_node="">In both the religious
and socio-political spheres, cultural consensus utilizes ritual and symbolic
communication for the sacralization of power and to legitimize the authority of
the elite. New regimes have therefore invented new ritual, often of a
calendrical and commemorative nature to separate them from predecessors, a
procedure that involves a high degree of mystification. In essence “a new
political entity without new rites and symbols is inconceivable” (Kertzer 1988:
20).</span></span></font></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1305" style="text-align:justify;line-height:150%"><font data-dcnode-id="1306" size="3"><span data-dcnode-id="1307" lang="EN-US"><span data-dcnode-id="1308" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1299" style="text-align:justify;line-height:150%"><font data-dcnode-id="1300" size="3"><b data-dcnode-id="1301"><span data-dcnode-id="1302" lang="EN-US"><span data-dcnode-id="1303" instrument_node="">The Construction of
Reality</span></span></b></font></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1294" style="text-align:justify;line-height:150%"><font data-dcnode-id="1295" size="3"><span data-dcnode-id="1296" lang="EN-US"><span data-dcnode-id="1297" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1286" style="text-align:justify;line-height:150%"><font data-dcnode-id="1287" size="3"><span data-dcnode-id="1288" lang="EN-US"><span data-dcnode-id="1292" instrument_node="">Kertzer claims that creating a symbol, or identifying oneself with
an existing symbol, is a powerful means of gaining or maintaining power, for
the “hallmark of power is the construction of reality” (Kertzer 1988: 5).
Furthermore, ritual and symbolism distinguishes the powerful from the meek, and
authority is reinforced by the control of ritual and manipulation of symbols.
Connerton argues that in relation to social memory, the social order is
legitimated by images of the past. Shared memories that legitimate the social
order are ‘conveyed and sustained’ by ritual performances in the shape of commemorative
ceremonies</span><span data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node=""> </span></span><span data-dcnode-id="1289" instrument_node="">(Connerton 1989: 4). As
organizations represent themselves with symbols, individuals communicate their
allegiance to an organization through symbols and symbolic behaviour; wearing
certain clothing, swearing an oath, singing particular songs and subsequently,
not only identifying with the group, but also being identified with it.
Therefore, successful organizations depend on ritual performance and symbolic
behaviour to construct a common perception of reality, thus ensuring their own inclusion
and importance. As Atkinson astutely observed, “Ritual does not mirror
political realities, but constitutes them” (Atkinson 1987: 349).</span></span></font></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1278" style="text-align:justify;line-height:150%"><font data-dcnode-id="1279" size="3"><b data-dcnode-id="1280"><u data-dcnode-id="1281"><span data-dcnode-id="1282" lang="EN-US"><span data-dcnode-id="1283" style="text-decoration:none"><span data-dcnode-id="1284" instrument_node="">&nbsp;</span></span></span></u></b></font></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1249" style="text-align:justify;line-height:150%"><font data-dcnode-id="1250" size="3"><span data-dcnode-id="1251" lang="EN-US"><span data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1274" instrument_node="">A commemorative ceremony detailed by
Connerton is the November 9</span><sup data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">th</span></sup><span data-dcnode-id="1271" instrument_node=""> Nazi parade commemorating the Munich
Beer-hall Putsch of 1923. The ceremony honors the party members who died as a
result of the aborted coup. On November 9</span><sup data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">th</span></sup><span data-dcnode-id="1268" instrument_node=""> 1935, a sacred ceremony
took place where the sixteen dead were interred in the Field Marshall's Hall (</span><i data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Feldherrnhalle</span></i><span data-dcnode-id="1265" instrument_node="">). The Bloodflag, which
had been carried by the conspirators, was symbolically stained with the blood
of the sixteen ‘martyrs’, and provided the primary symbol paraded at the head
of the procession. Much of the symbology associated with the NSDAP</span><a data-dcnode-id="1259" href="#_ftn1" name="_ftnref1" title=""><span data-dcnode-id="1260"><span data-dcnode-id="1261"><span data-dcnode-id="1262"><span data-dcnode-id="1263" lang="EN-US" style="font-family:Times New Roman,serif"><span data-dcnode-id="1264" instrument_node="">[1]</span></span></span></span></span></a><span data-dcnode-id="1258" instrument_node="">
can be seen as plagiarization of Christian myth. The Bloodflag, a black
swastika within a white circle on a scarlet background, was steeped in
symbology through the sacrificial blood of the sixteen ‘martyrs’, which
provided a metaphor for the sacrificial death of Christ. Hitler was represented
as the all-powerful savior, and the people were the chosen ones who would
experience the millennium of the thousand year Reich</span><span data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node=""> </span></span><span data-dcnode-id="1255" instrument_node="">(Taylor 1981: 507-511). Through the party
propaganda machine the Bloodflag came to represent absolute loyalty, unquestioning
obedience and the readiness to sacrifice one’s life for the Fuhrer. Thus, the
NSDAP wove an intricate web of inter-related symbology “founded upon the mythos
of a Holy-History to which the ‘martyrdom’ of the sixteen was witness” (Taylor
1981: 508).</span><span data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1252" instrument_node="">Combining symbol and ritual,
the party propaganda machine, borrowing heavily from the biblical concept of
resurrection, created a socio-political religious myth. The symbology is
clearly reflected in Hitler’s speech at the interment.</span></span></font></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1244" style="text-align:justify;line-height:150%"><font data-dcnode-id="1245" size="3"><span data-dcnode-id="1246" lang="EN-US"><span data-dcnode-id="1247" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1232" style="margin:0cm 43.2pt 0.0001pt;text-align:justify;line-height:150%"><font data-dcnode-id="1233" size="3"><span data-dcnode-id="1234" lang="EN-US"><span data-dcnode-id="1242" instrument_node="">“These sixteen men, who twelve years ago gave their
lives as a sacrifice for their people and their Fuhrer, are today raised from
the grave. Who does not feel the truth of this resurrection? Who does not see
the glint of their eyes in the newly-raised-up Wehrmacht</span><a data-dcnode-id="1236" href="#_ftn2" name="_ftnref2" title=""><span data-dcnode-id="1237"><span data-dcnode-id="1238"><span data-dcnode-id="1239"><span data-dcnode-id="1240" lang="EN-US" style="font-family:Times New Roman,serif"><span data-dcnode-id="1241" instrument_node="">[2]</span></span></span></span></span></a><span data-dcnode-id="1235" instrument_node="">?
And the Reich, which is itself built around this consecrated ground, is it not
their kingdom? The kingdom of their ‘will’ and victory?” (Taylor 1981: 508)</span></span></font></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1227" style="text-align:justify;line-height:150%"><font data-dcnode-id="1228" size="3"><span data-dcnode-id="1229" lang="EN-US"><span data-dcnode-id="1230" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1220" style="text-align:justify;line-height:150%"><font data-dcnode-id="1221" size="3"><span data-dcnode-id="1222" lang="EN-US"><span data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1223" instrument_node="">NSDAP ritual therefore
conforms to Connerton’s definition of rites as formalized and stylized and
lacking in spontaneity and variation. Furthermore, performers feel obliged to
enact the rite, and by doing so, communicate assent with its meaning and
associated belief system. Therefore, Connerton argues, participation in a
political ritual effectively communicates assent in an “unequivocal and
materially substantial” way (Connerton 1989: 44). Simultaneously, the rituals
and symbols themselves reinforce a cultural consensus, in this example, the
consensus constructed by the NSDAP. </span></span></font></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1215" style="text-align:justify;line-height:150%"><font data-dcnode-id="1216" size="3"><span data-dcnode-id="1217" lang="EN-US"><span data-dcnode-id="1218" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1208" style="text-align:justify;line-height:150%"><font data-dcnode-id="1209" size="3"><span data-dcnode-id="1210" lang="EN-US"><span data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1211" instrument_node="">This process, by which
political and religious ritual and symbols are manipulated to support the
legitimacy of a hierarchy by communicating a particular world-view, may be
referred to as mystification. The means of achieving this however may not only
be subtle, but in many instances, having faith in the legitimacy of their own
institutions, the actors themselves may be unaware of the mystification
process. Maurice Bloch has summarized this phenomenon: “It is precisely through
the process of making a power situation appear a fact in the nature of the
world that traditional authority works” (Bloch 1989: 45). </span></span></font></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1203" style="text-align:justify;line-height:150%"><font data-dcnode-id="1204" size="3"><span data-dcnode-id="1205" lang="EN-US"><span data-dcnode-id="1206" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1190" style="text-align:justify;line-height:150%"><font data-dcnode-id="1191" size="3"><span data-dcnode-id="1192" lang="EN-US"><span data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1199" instrument_node="">Two common forms of
mystification are the belief that power holders deserve to be in a position of
power, and the notion of equality. The illusion of equality is common to
democratic systems where elections foster the opinion that the few who hold
power over the many do so as it is the wish of the people (Kertzer 1988:
48-49). Kertzer therefore considers democratic elections to be the most
important ritual of legitimization in the modern world. Mystification is
equally prominent in religious and political spheres, just as it is in
primitive and modern societies, and in all forms </span><i data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">may</span></i><span data-dcnode-id="1196" instrument_node=""> be considered miscommunication. In terms of the sacred, Bloch
goes further claiming, “An attempt to link the context of ritual to the world
or society directly does not work because in secular terms religious rituals
are miss-statements of reality. Circumcision ceremonies do not … make adults
out of little boys, curing ceremonies do not cure” (Bloch 1989: 43), any more
than democratic elections provide the apparatus to enable every individual an
equal say in deciding questions of public policy. However, the belief that they
</span><i data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">may</span></i><span data-dcnode-id="1193" instrument_node="">, functions to maintain stability
and social order and to bring individuals together and function as a community.</span></span></font></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1185" style="text-align:justify;line-height:150%"><font data-dcnode-id="1186" size="3"><span data-dcnode-id="1187" lang="EN-US"><span data-dcnode-id="1188" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1179" style="text-align:justify;line-height:150%"><font data-dcnode-id="1180" size="3"><b data-dcnode-id="1181"><span data-dcnode-id="1182" lang="EN-US"><span data-dcnode-id="1183" instrument_node="">The Production of
Community</span></span></b></font></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1171" style="text-align:justify;line-height:150%"><font data-dcnode-id="1172" size="3"><b data-dcnode-id="1173"><u data-dcnode-id="1174"><span data-dcnode-id="1175" lang="EN-US"><span data-dcnode-id="1176" style="text-decoration:none"><span data-dcnode-id="1177" instrument_node="">&nbsp;</span></span></span></u></b></font></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1166" style="text-align:justify;line-height:150%"><font data-dcnode-id="1167" size="3"><span data-dcnode-id="1168" lang="EN-US"><span data-dcnode-id="1169" instrument_node="">Stability of and solidarity within a social system usually promotes
peaceful survival, and ritual and symbolism are the instruments of tribes and
nations alike to encourage these feelings of social solidarity. However, while
individual beliefs are of a subjective nature, participation in ritual, as
mentioned, illustrates public acceptance of the group itself. </span></span></font></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1161" style="text-align:justify;line-height:150%"><font data-dcnode-id="1162" size="3"><span data-dcnode-id="1163" lang="EN-US"><span data-dcnode-id="1164" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1152" style="text-align:justify;line-height:150%"><font data-dcnode-id="1153" size="3"><span data-dcnode-id="1154" lang="EN-US"><span data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1157" instrument_node="">Fernandez (1965: 904-905)
notes this paradox in the way that Fang ritual and symbolism promote social
stability among those whose interpretation of the symbols and rituals they
enact lack cultural or intellectual consensus. The Fang have lost their
traditional way of life, suffer from family disintegration and exhibit economic
individualism. However, the integrative effect of ritual and symbols explains
how social co-existence can be peaceably maintained without the necessity for
cultural coherence.</span><span data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">&nbsp; </span></span></span></font></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1147" style="text-align:justify;line-height:150%"><font data-dcnode-id="1148" size="3"><span data-dcnode-id="1149" lang="EN-US"><span data-dcnode-id="1150" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1140" style="text-align:justify;line-height:150%"><font data-dcnode-id="1141" size="3"><span data-dcnode-id="1142" lang="EN-US"><span data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1143" instrument_node="">Their ceremonies aim to
achieve a state of ‘one-heartedness’, but when researching interpretations of
the ritual by twenty group members, Fernandez discovered that seven believed
that the main purpose of the ritual was to “establish proper relationships with
the Christian God … of whom the Fang had no traditional knowledge” (Fernandez 1965:
906); eight said it reestablished contact with abandoned ancestors and only
half identified the ritual as symbolizing the creation of one-heartedness.
However, whilst lacking cultural consensus, all maintained that one-heartedness
had been achieved. </span></span></font></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1135" style="text-align:justify;line-height:150%"><font data-dcnode-id="1136" size="3"><span data-dcnode-id="1137" lang="EN-US"><span data-dcnode-id="1138" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1110" style="text-align:justify;line-height:150%"><font data-dcnode-id="1111" size="3"><span data-dcnode-id="1112" lang="EN-US"><span data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1131" instrument_node="">From a linguistic
perspective, the regular use of the word ‘our’ is emphasized in ritual forms to
reinforce the sense of community, from national anthems “God save </span><i data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">our</span></i><span data-dcnode-id="1128" instrument_node=""> gracious queen…” to the Lord’s
Prayer “</span><i data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Our</span></i><span data-dcnode-id="1125" instrument_node=""> Farther, who art in
Heaven…” Where this pronoun is not included, the sense of ‘oneness’ is
verbalized by relating the individual to a communal symbol, for example, in
pledging allegiance “I pledge allegiance to the </span><i data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">flag </span></i><span data-dcnode-id="1122" instrument_node="">of the United States of America … </span><i data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">one</span></i><span data-dcnode-id="1119" instrument_node=""> nation under God, indivisible, with liberty and justice for </span><i data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">all</span></i><span data-dcnode-id="1116" instrument_node="">.” Common ritual traditions and
symbols are evidently an essential element in a community’s sense of its own
identity, and the rituals and symbols employed</span><i data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node=""> </span></i><span data-dcnode-id="1113" instrument_node="">contribute to communicating the nature of this identity. A
category of rites that has evolved, the nature of which promotes a powerful
sense of belonging in both religious and secular communities, are rites of
passage.</span></span></font></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1105" style="text-align:justify;line-height:150%"><font data-dcnode-id="1106" size="3"><span data-dcnode-id="1107" lang="EN-US"><span data-dcnode-id="1108" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1098" style="text-align:justify;line-height:150%"><font data-dcnode-id="1099" size="3"><span data-dcnode-id="1100" lang="EN-US"><span data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1101" instrument_node="">Van Gennep set out to demonstrate that to
understand rituals, they must be viewed as a part of a complete system. Many
acts in his opinion had been misinterpreted as survivals of magic, when in fact
they were marking stages in various rites, whose characteristic form was
determined by their purpose “to ensure a change in condition or a passage from
one magico-religious or secular group to another” (Van Gennep 1960: 11). </span></span></font></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1093" style="text-align:justify;line-height:150%"><font data-dcnode-id="1094" size="3"><span data-dcnode-id="1095" lang="EN-US"><span data-dcnode-id="1096" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1070" style="text-align:justify;line-height:150%"><font data-dcnode-id="1071" size="3"><span data-dcnode-id="1088" lang="EN-US"><span data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1089" instrument_node="">The rites of passage described by Van Gennep
have a tripartite structure, namely, “preliminal rites (rites of separation),
liminal rites (rites of transition) and postliminal rites (rites of integration)”
(Van Gennep 1960: 11). Rituals mark each stage, and different societies mark
transitions by different ritual acts. However, there are certain commonalities
inherent in the symbolism in each stage. Typical acts emphasizing the stage of
separation may include the shaving of the head symbolizing rebirth, ritual
washing, and circumcision. For the </span></span><span data-dcnode-id="1086" lang="EN-US"><span data-dcnode-id="1087" instrument_node="">Orokaiva of Papua
New Guinea, these rites are particularly violent, the young initiates being
bitten, chased and herded like pigs onto a platform reminiscent of one on which
pigs are ritually slaughtered, before being led to an isolated hut in the
jungle. </span></span><span data-dcnode-id="1084" lang="EN-US"><span data-dcnode-id="1085" instrument_node="">The liminal stage would often be marked by separation from other people,
being blindfolded, or being removed out of the village to a pre-prepared space.
For the Orokaiva initiates, </span></span><span data-dcnode-id="1082" lang="EN-US"><span data-dcnode-id="1083" instrument_node="">the liminal period is spent
in seclusion in the jungle where they are prohibited from talking or washing
and are told that they themselves have become spirits (Bloch 1989: 8). </span></span><span data-dcnode-id="1080" lang="EN-US"><span data-dcnode-id="1081" instrument_node="">All
of these acts apparently help to strip away previously developed individuality.
Crossing the liminal stage represents transference from one state or status to
another. Integration typically involves a celebration, eating symbolic foods,
anointing and dressing in new clothes. For the Orokaiva initiates, </span></span><span data-dcnode-id="1078" lang="EN-US"><span data-dcnode-id="1079" instrument_node="">they return to their village as hunters of pigs. Their first act is
to join a pig hunt from which they return triumphantly to the village, and
distribute the meat of killed pigs. As Bloch concludes, “The transformation
from prey into hunters is clear for all to see” (Bloch 1989: 11). </span></span><span data-dcnode-id="1076" lang="EN-US"><span data-dcnode-id="1077" instrument_node="">The
key transformation for Van Gennep is not the physical change, but the change in
the status of the individual. Whether the transformations included in ‘Rites of
Passage’ are </span></span><span data-dcnode-id="1074" lang="EN-US"><span data-dcnode-id="1075" instrument_node="">miss-statements of reality</span></span><span data-dcnode-id="1072" lang="EN-US"><span data-dcnode-id="1073" instrument_node=""> or
actually occur, the rites serve to communicate that it is time for the initiate
to start a new psychological phase in their life.</span></span></font></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1065" style="text-align:justify;line-height:150%"><font data-dcnode-id="1066" size="3"><span data-dcnode-id="1067" lang="EN-US"><span data-dcnode-id="1068" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1053" style="text-align:justify;line-height:150%"><font data-dcnode-id="1054" size="3"><span data-dcnode-id="1055" lang="EN-US"><span data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1061" instrument_node="">However, Fortes (Fortes
1962: 56) claims that Van Gennep’s work leaves the most important questions
tantalizingly unanswered. For Fortes, the key question is why ritual is
apparently indispensable in marking status change.</span><b data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node=""> </span></b><span data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1056" instrument_node="">His answer relates to
‘office’ or ‘official status’ in which distinction is made between the
individual and their ‘office’. As ‘office’ originates outside the individual,
it must be ritually bestowed by the society before a new role is embraced, thus
communicating a status change. Among the Ashanti of Ghana, for example,
kingship is bestowed on the chief-elect in a solemn ceremony culminating in the
supreme ancestral stool being sat upon. Conversely, the culminating act to
depose the king is ritually to ‘destool him’ thus reversing the original rites.
“His buttocks are bumped on the ground by the withdrawal of his stool from
under him” (Fortes 1962: 59). Thus the placement or removal of the stool
communicates to the Ashanti present that the king has either gained or lost
social recognition of his status. </span></span></font></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1048" style="text-align:justify;line-height:150%"><font data-dcnode-id="1049" size="3"><span data-dcnode-id="1050" lang="EN-US"><span data-dcnode-id="1051" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1041" style="text-align:justify;line-height:150%"><font data-dcnode-id="1042" size="3"><span data-dcnode-id="1043" lang="EN-US"><span data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1044" instrument_node="">As rites of passage relate to a category of
ritual that involve a change of status preceded by crossing a ritual boundary,
there is an inevitable similarity between initiation into adulthood and
initiation into a secret order or society. And while rites of passage, for
example, the Gisu circumcision ritual of eastern Uganda establishes sets of
contemporaries among the initiates (Van Gennep 1960: 143); initiation rites in
secret societies establish an illusory bond of brotherhood or ‘family’. One
such family is the Hung Family, better known as the Triads.</span></span></font></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1036" style="text-align:justify;line-height:150%"><font data-dcnode-id="1037" size="3"><span data-dcnode-id="1038" lang="EN-US"><span data-dcnode-id="1039" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1029" style="text-align:justify;line-height:150%"><font data-dcnode-id="1030" size="3"><span data-dcnode-id="1031" lang="EN-US"><span data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="1032" instrument_node="">The Hung family is
hierarchical, and initiation puts the initiate on the lowest rung, each
succeeding rung characterized by new secrets and initiation rituals. In Van
Gennep’s terminology, the preliminal rites involve a passage through a gate of
swords, the liminal rites consist of taking thirty-six vows, not verbally, but by
symbolically raising and then placing three incense sticks into a censer in
front of an altar to the god of war and brotherhoods, Guan Yu, and the
postliminal rites involve taking a blood oath before participating in a
communal meal. However, the main feature of initiation rituals is the taking of
an oath, on pain of death, not to communicate the ritual secrets of the
society. Such severity serves to maintain the dividing line between members and
non-members, as ritual and secret symbols are crucial for the society to define
and maintain its existence (Fontaine 1985: 38-41).</span></span></font></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1024" style="text-align:justify;line-height:150%"><font data-dcnode-id="1025" size="3"><span data-dcnode-id="1026" lang="EN-US"><span data-dcnode-id="1027" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1018" style="text-align:justify;line-height:150%"><font data-dcnode-id="1019" size="3"><b data-dcnode-id="1020"><span data-dcnode-id="1021" lang="EN-US"><span data-dcnode-id="1022" instrument_node="">The Interpretation of
Symbols</span></span></b></font></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1013" style="text-align:justify;line-height:150%"><font data-dcnode-id="1014" size="3"><span data-dcnode-id="1015" lang="EN-US"><span data-dcnode-id="1016" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1001" style="text-align:justify;line-height:150%"><font data-dcnode-id="1002" size="3"><span data-dcnode-id="1010" lang="EN-US"><span data-dcnode-id="1011" instrument_node="">In contrast to Edmund Leach’s description of ritual as “occasional
behaviour by particular members of a single culture … It is therefore in no
way, from the anthropologist’s perspective, a “genetic endowment of the
species” (Leach 1966: 158), Sperber argues that representations that are hard
to process cognitively are represented as symbols as a way of remembering the
basics of complex ideologies. Therefore, “Symbolism participates in the
construction of knowledge” (Sperber 1974: </span></span><span data-dcnode-id="1008" lang="EN-US" style="line-height:150%"><span data-dcnode-id="1009" instrument_node="">X11</span></span><span data-dcnode-id="1003" lang="EN-US"><span data-dcnode-id="1007" instrument_node="">), is rational, and as a system of signs functions as a language if
interpreted correctly. As such, Sperber argues that one function of symbolism
is social communication, but does not perceive communication as a constitutive
function of symbolism as symbolism, by nature, has an unpredictable nature</span><span data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node=""> </span></span><span data-dcnode-id="1004" instrument_node="">(Sperber 1974: 4-5). His views are validated
by Victor Turner’s detailed ethnography of ritual symbolism among the Ndembu of
Zambia. </span></span></font></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="996" style="text-align:justify;line-height:150%"><font data-dcnode-id="997" size="3"><span data-dcnode-id="998" lang="EN-US"><span data-dcnode-id="999" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="983" style="text-align:justify;line-height:150%"><font data-dcnode-id="984" size="3"><span data-dcnode-id="985" lang="EN-US"><span data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="992" instrument_node="">Turner (1967) compiled his
interpretation of the properties of ritual symbols from three sources;
observable characteristics, those offered by lay informants and ritual
specialists, and from his own observations. Turner distinguishes between three
levels of meaning in symbols, the exegetical meaning or indigenous
interpretation, the operational meaning, how something is actually used in
ritual, and the positional meaning in relation to other symbols. Positional
meaning can be exampled from the </span><i data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">mukula</span></i><span data-dcnode-id="989" instrument_node="">
tree, which relates to the color red, and hence is used in rituals symbolizing
“matriliny,” “huntsmanship,”</span><span data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">&nbsp; </span></span><span data-dcnode-id="986" instrument_node="">“menstrual
blood,” and “the meat of wild animals.” Due to the multiplicity of meanings
beyond the purpose of a specific ritual, Turner refers to this tree as a
‘senior’ or ‘dominant’ symbol.</span></span></font></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="978" style="text-align:justify;line-height:150%"><font data-dcnode-id="979" size="3"><span data-dcnode-id="980" lang="EN-US"><span data-dcnode-id="981" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="968" style="text-align:justify;line-height:150%"><font data-dcnode-id="969" size="3"><span data-dcnode-id="970" lang="EN-US"><span data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="974" instrument_node="">Another ‘dominant’ symbol
is the milk tree, </span><i data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">mudya</span></i><span data-dcnode-id="971" instrument_node="">, known as
such as it oozes white milk like sap when scratched, associating it with
breasts and breast milk, and making it central to female puberty rituals. According
to Turner, depending on context, the milk tree is representative of
matrilineage, suffering and dying, the ancestress of all Ndembu, purity,
womanhood, the process of learning feminine wisdom, childbearing, and the
mother child relationship. There is also the correlation between the milk tree
and whiteness, which stands for goodness, health, ritual purity, and freedom
from misfortune. Turner concludes that it represents “at its highest level of
abstraction … the unity and continuity of Ndembu society” (Turner 1967: 20).</span></span></font></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="963" style="text-align:justify;line-height:150%"><font data-dcnode-id="964" size="3"><span data-dcnode-id="965" lang="EN-US"><span data-dcnode-id="966" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="942" style="text-align:justify;line-height:150%"><font data-dcnode-id="943" size="3"><span data-dcnode-id="950" lang="EN-US"><span data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="959" instrument_node="">Turner’s contribution to
the understanding of ritual and symbols and to anthropological analysis is
unquestionable. However, the tremendous multivocality of</span><span data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">&nbsp; </span></span><span data-dcnode-id="956" instrument_node="">‘dominant’ symbols raises the concern that
collecting definitions from multiple sources </span><i data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">may</span></i><span data-dcnode-id="953" instrument_node=""> be problematic. For example, Fernandez has stated that the
Star-Spangled Banner “means the United States of America and its 50 states, and
has developed through many historic stages and stands for purity, valor and
unity” (Fernandez 1965: 917). However, one can speculate on the many different
interpretations that may be attributed to this symbol. For example, to the
Native American Indian, the red may represent the blood of their tribes, the
white; the men who inhabited their land, and the blue, the sky under which
their nations once flourished. In countries sympathetic to the American way of
life, the flag may represent freedom of speech and democracy, yet to America’s
enemies, tyranny and immorality. The list could continue </span><i data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">ad infinitum</span></i></span><span data-dcnode-id="948" lang="EN-US" style="line-height:150%;font-family:Lucida Grande"><span data-dcnode-id="949" instrument_node="">. </span></span><span data-dcnode-id="944" lang="EN-US"><span data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">&nbsp;</span></span><span data-dcnode-id="945" instrument_node="">If interpretations of a
symbol can be so diametrically opposed, it seems implausible that the primary
function of symbols can be communication. However, it follows that whatever
meaning symbols do communicate, without knowing the intention of the actor, the
meaning may be unintelligible (Laidlaw and Humphrey 2006: 276). </span></span></font></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="937" style="text-align:justify;line-height:150%"><font data-dcnode-id="938" size="3"><span data-dcnode-id="939" lang="EN-US"><span data-dcnode-id="940" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="931" style="text-align:justify;line-height:150%"><font data-dcnode-id="932" size="3"><b data-dcnode-id="933"><span data-dcnode-id="934" lang="EN-US"><span data-dcnode-id="935" instrument_node="">The Communication Paradigm</span></span></b></font></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="926" style="text-align:justify;line-height:150%"><font data-dcnode-id="927" size="3"><span data-dcnode-id="928" lang="EN-US"><span data-dcnode-id="929" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="921" style="text-align:justify;line-height:150%"><font data-dcnode-id="922" size="3"><span data-dcnode-id="923" lang="EN-US"><span data-dcnode-id="924" instrument_node="">Therefore, for an observer to interpret what is communicated in
ritual, the intention of the actor, or of the initiator where appropriate, must
also be known. It seems unthinkable that the high-ranking officials invited to
witness the sacrifices at Temple Mayor were unaware of the attempted political
coercion through the specter of ritual human sacrifice by the Aztec rulers.
Hence, an awareness of the intentionality of the actors precipitated an
efficient form of communication through ritual. As Sperber has reasoned, “A
huge amount of effort is put into a ritual in terms of time, passion and
expense, so we cannot accept that simply saying something has the same effect,
or why go to all the trouble of the ritual” (Sperber 1975: 8). Hence ritual is
not so much about communicating an actual message, as creating a ritual space
conducive to the reception of the communication. It is therefore equally
unthinkable that elaborate Nazi parades were not intentionally designed to
create a ritual space where communication of their ideals to both the
participants and observers was facilitated. However, defining communication
within ritual and symbolism remains problematic.</span></span></font></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="916" style="text-align:justify;line-height:150%"><font data-dcnode-id="917" size="3"><span data-dcnode-id="918" lang="EN-US"><span data-dcnode-id="919" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="896" style="text-align:justify;line-height:150%"><font data-dcnode-id="897" size="3"><span data-dcnode-id="898" lang="EN-US"><span data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="912" instrument_node="">First, whether
communication involves the transference of an actual structured message, or
only a concept or view of reality. Second, whether communication requires a
reciprocal exchange of information. In religious rituals, reciprocal exchange
may occur between initiators and actors, or between actors and CPS-agents.</span><a data-dcnode-id="906" href="#_ftn3" name="_ftnref3" title=""><span data-dcnode-id="907"><span data-dcnode-id="908"><span data-dcnode-id="909"><span data-dcnode-id="910" lang="EN-US" style="font-family:Times New Roman,serif"><span data-dcnode-id="911" instrument_node="">[3]</span></span></span></span></span></a><span data-dcnode-id="905" instrument_node="">
An example of the latter is the use of </span><i data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">bua
bue</span></i><span data-dcnode-id="902" instrument_node="">, two crescent shaped blocks, one side being flat and the other convex,
commonly employed for divination in Chinese temples. For the purpose of
divination, the actor first formulates a question to ask a specific deity, and
then drops the </span><i data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">bua bue</span></i><span data-dcnode-id="899" instrument_node=""> to the ground.
There are three possible outcomes. Both blocks may land either flat side down
or convex side down, essentially signifying “no”, or they may land with one
convex and one flat side down signifying that the deity has replied ‘yes’
(Jordan 1972: 61-62), thus suggesting to the actor that two-way communication
has occurred. </span></span></font></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="891" style="text-align:justify;line-height:150%"><font data-dcnode-id="892" size="3"><span data-dcnode-id="893" lang="EN-US"><span data-dcnode-id="894" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="884" style="text-align:justify;line-height:150%"><font data-dcnode-id="885" size="3"><span data-dcnode-id="886" lang="EN-US"><span data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="887" instrument_node="">However, when Leach
discussed who is qualified to decipher the meaning of a ritual action, he
pointed out that the actors own opinions are inadequate, as each person
performing the ritual may hold differing explanations. He illustrates this
point by referring to animal sacrifice which may signify the animal is
identified with a deity before being ritually consumed, as a gift or bribe to
the gods for earthly benefit, or as a substitute for the person performing the
sacrifice, correctly pointing out that they can not all be true at the same
time (Leach 1968: 169). However, taken individually, as in the examples of the
Aztec and NSDAP, once the intentionality of the author is known, the
appropriate message being communicated may be ascertained. </span></span></font></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="879" style="text-align:justify;line-height:150%"><font data-dcnode-id="880" size="3"><span data-dcnode-id="881" lang="EN-US"><span data-dcnode-id="882" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="867" style="text-align:justify;line-height:150%"><font data-dcnode-id="868" size="3"><span data-dcnode-id="869" lang="EN-US"><span data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="875" instrument_node="">Regarding communication, at
one end of the anthropological spectrum stands Leach who claims that it is not
possible to separate the verbal and behavioural elements of a ritual (Leach
1966: 164). Claiming that there is agreement between a majority of his
contemporaries that “culturally defined sets of behaviour function as language”</span><span data-dcnode-id="873"><span data-dcnode-id="874" instrument_node=""> </span></span><span data-dcnode-id="872" instrument_node="">(Leach 1968: 170), he sets himself apart by
claiming that ritual best denotes the communicative aspects of behaviour.
Whilst the ‘language of ritual’ is incredibly condensed compared with common
speech, and therefore open to a variety of interpretations, speech, he claims,
is itself a form of ritual (Leach 1966: 160), and non-verbal ritual is simply a
less specialized communication system. Noting that the communicative aspect of
ritual is condensed, interpretation requires “a common body of knowledge about
the context of the situation” (Leach 1966: 164).</span><span data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">&nbsp; </span></span></span></font></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="862" style="text-align:justify;line-height:150%"><font data-dcnode-id="863" size="3"><span data-dcnode-id="864" lang="EN-US"><span data-dcnode-id="865" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="855" style="text-align:justify;line-height:150%"><font data-dcnode-id="856" size="3"><span data-dcnode-id="857" lang="EN-US"><span data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="858" instrument_node="">At the opposing end of the
spectrum stand Boyer and Bloch. Boyer asserts, “If anything, rituals are
characterized by the obstacles they put in the way of communication, rather
than the expressive possibility they offer” (Boyer 1995: 195). In terms of
communicating information, he considers ritual being towards the non-expressive
end of the spectrum, and quotes F. Stall who, providing food for thought,
reportedly argued that rituals “inasmuch as they are ritualized, are
necessarily meaningless” (Stall cited in Boyer 1995: 195). Bloch argues that
formalized language within a given ritual structure restricts communication,
whilst in non-verbal ritual, for example dance, communication is almost absent.
In both cases, “The articulation of communication becomes, so to speak,
arthritic” (Bloch 1989: 79).</span></span></font></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="850" style="text-align:justify;line-height:150%"><font data-dcnode-id="851" size="3"><span data-dcnode-id="852" lang="EN-US"><span data-dcnode-id="853" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="840" style="text-align:justify;line-height:150%"><font data-dcnode-id="841" size="3"><span data-dcnode-id="842" lang="EN-US"><span data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="846" instrument_node="">Following Bloch’s line of
reasoning, linguistic and other non-verbal forms of expression are either
reduced or lost entirely when employed in ritual.</span><span data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">&nbsp; </span></span><span data-dcnode-id="843" instrument_node="">“Ritual is therefore a place where, because
the ordinary forms of linguistic communication are changed, we cannot assume
the semantic processes of more ordinary communication” (Bloch 1989: 20). The
fact that religious and political ritual exhibits formalization of language,
however, is highly suggestive that the formalization itself must perform a
useful function relative to the instigator of the ritual. </span></span></font></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="835" style="text-align:justify;line-height:150%"><font data-dcnode-id="836" size="3"><span data-dcnode-id="837" lang="EN-US"><span data-dcnode-id="838" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="822" style="text-align:justify;line-height:150%"><font data-dcnode-id="823" size="3"><span data-dcnode-id="824" lang="EN-US"><span data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="831" instrument_node="">Accepting both that
understanding communication in ritual and symbolism requires knowledge of the
ritual context, and that formalized speech and actions limit the scope of
communication, this paper proposes two further stipulations. First, that
without knowing the intentionality of the actor, or where appropriate, the
instigator, a correct interpretation or consensus on the meaning of any
communication within ritual and symbolism is unlikely. Second, that
communication takes place through ritual and symbolism only under </span><i data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">specific</span></i><span data-dcnode-id="828" instrument_node=""> conditions, and it is </span><i data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">these</span></i><span data-dcnode-id="825" instrument_node=""> conditions that represent the
universal commonality that constitutes the most important aspect of ritual and
symbolism.</span></span></font></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="817" style="text-align:justify;line-height:150%"><font data-dcnode-id="818" size="3"><span data-dcnode-id="819" lang="EN-US"><span data-dcnode-id="820" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="805" style="text-align:justify;line-height:150%"><font data-dcnode-id="806" size="3"><span data-dcnode-id="807" lang="EN-US"><span data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="813" instrument_node="">Bloch argues that “with
increasing formalization (of language) propositional force decreases and
illocutionary force increases” (Bloch 1989: 32), the propositional force
reporting reality within the framework of time</span><span data-dcnode-id="811"><span data-dcnode-id="812" instrument_node=""> </span></span><span data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">&nbsp;</span></span><span data-dcnode-id="808" instrument_node="">but lacking the power of influence, and the
illocutionary force not reporting facts but possessing the power of influence.
This paper proposes that the same applies to ritual actions and symbolism: as
they become increasingly formalized they loose their propositional force,
become increasingly ambiguous, and thus increase their power of influence.
Bloch asks why religions and political authorities choose a type of
communication with an ‘arthritic’ nature? One explanation offered eloquently in
Confucian philosophy is that “since rituals (and symbols) are non-verbal, they
have no contraries” (Kertzer 1988: 13). In contrast, Bloch claims that
traditional authority and religion choose to employ a kind of communication
that excludes the propositional force of explanation to “hide reality” (Bloch
1989: 33) therefore creating an illusion. Kertzer offers another possible
explanation: </span></span></font></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="800" style="text-align:justify;line-height:150%"><font data-dcnode-id="801" size="3"><span data-dcnode-id="802" lang="EN-US"><span data-dcnode-id="803" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="793" style="text-align:justify;line-height:150%"><font data-dcnode-id="794" size="3"><span data-dcnode-id="795" lang="EN-US"><span data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="796" instrument_node="">“It is hard to argue with a
flag, especially if you do not have another flag of your own; hard to argue
with a song, unless you have another anthem to sing; and hard to argue with the
view of the world” (Kertzer 1988: 184) unless you have another view.</span></span></font></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="788" style="text-align:justify;line-height:150%"><font data-dcnode-id="789" size="3"><span data-dcnode-id="790" lang="EN-US"><span data-dcnode-id="791" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="781" style="text-align:justify;line-height:150%"><font data-dcnode-id="782" size="3"><span data-dcnode-id="783" lang="EN-US"><span data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="784" instrument_node="">However, the Baktaman
fertility cult of inner New Guinea has no flags, no anthems to sing, and a worldview
that is developed from subjective experience, and is only transmitted once
every decade through non-verbal means from the memories of elders. Their
symbolism for fertility and growth includes fur, dew, pig fat, water and hair.
Dew, for example, is associated with growth as taro needs water, and dew grows
on leaves every morning (Whitehouse 1992: 782). However, while this simple
explanation conveys no mystical meaning and deprives the metaphor of the unique
associations that are cultivated through ritual, the ritual itself, devoid of
exegesis, ritualistic language, mass-produced or man-made symbols, political
ideology or cosmology, vividly illustrates the commonality shared by all ritual
and symbols. </span></span></font></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="776" style="text-align:justify;line-height:150%"><font data-dcnode-id="777" size="3"><span data-dcnode-id="778" lang="EN-US"><span data-dcnode-id="779" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="770" style="text-align:justify;line-height:150%"><font data-dcnode-id="771" size="3"><b data-dcnode-id="772"><span data-dcnode-id="773" lang="EN-US"><span data-dcnode-id="774" instrument_node="">The Power of Emotions</span></span></b></font></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="765" style="text-align:justify;line-height:150%"><font data-dcnode-id="766" size="3"><span data-dcnode-id="767" lang="EN-US"><span data-dcnode-id="768" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="760" style="text-align:justify;line-height:150%"><font data-dcnode-id="761" size="3"><span data-dcnode-id="762" lang="EN-US"><span data-dcnode-id="763" instrument_node="">“The most effective rituals have an emotionally compelling quality
to them: they involve not just part of the personality but the whole
personality” (Ortner 1978: 5-6 cited in Kertzer 1989: 99).</span></span></font></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="755" style="text-align:justify;line-height:150%"><font data-dcnode-id="756" size="3"><span data-dcnode-id="757" lang="EN-US"><span data-dcnode-id="758" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="745" style="text-align:justify;line-height:150%"><font data-dcnode-id="746" size="3"><span data-dcnode-id="747" lang="EN-US"><span data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="751" instrument_node="">The Baktaman rituals are
physically and emotionally extreme, involving such stimulants as sudden pain,
lengthy torture, strong aromas and loud noises being “unleashed on the
unprepared novices” (Whitehouse 1992: 782). For example, during the
fourth-degree ritual that links the symbol of hair to sex, the initiate’s hair
is tied into pigtails using the shredded leaves of a pandanus bush that are
hard, sharp and often spiky. Over a period of three days, the initiate is
repeatedly stung on the face with fierce jungle nettles, deprived of food,
water and sleep, and forced to dance in front of the Baktaman women. During the
dancing, it is presumed that the allure of the women, exaggerated by the
prohibition of physical contact, will cause sexual arousal in the initiates,
and the initiate will forever associate hair with the sexual act. “The heat and
swelling of the face, the exertion and intense craving for physical
satisfactions – all these unique experiences come together in the original
appreciation of hair as a sacred image” (Whitehouse 1992: 787).</span><span data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">&nbsp; </span></span><span data-dcnode-id="748" instrument_node="">The shock tactics employed with their sensory
overload make it unlikely that the initiates will forget the ritual. Strong
emotional stimuli create a receptive frame of mind leading to an experiential
understanding, thus producing a stronger effect on the individual than
exegesis. </span></span></font></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="740" style="text-align:justify;line-height:150%"><font data-dcnode-id="741" size="3"><span data-dcnode-id="742" lang="EN-US"><span data-dcnode-id="743" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="733" style="text-align:justify;line-height:150%"><font data-dcnode-id="734" size="3"><span data-dcnode-id="735" lang="EN-US"><span data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="736" instrument_node="">Communication on an
emotional level is therefore far more compelling than the power of logic and
reasoning. If this were not so, the elaborate nature of emotion inducing ritual
and symbols would be unnecessary. The Aztec instigators of ritual intentionally
preyed on the inner conflicts, emotional fears and uncertainties of their foe.
Their ritual extravaganza was performed with utmost theatrical tension in order
to terrorize and intimidate visiting dignitaries (Broda, Carrasco and Moctezuma
1987: 155).</span></span></font></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="728" style="text-align:justify;line-height:150%"><font data-dcnode-id="729" size="3"><span data-dcnode-id="730" lang="EN-US"><span data-dcnode-id="731" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="721" style="text-align:justify;line-height:150%"><font data-dcnode-id="722" size="3"><span data-dcnode-id="723" lang="EN-US"><span data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="724" instrument_node="">Collective rituals are
seductive in nature, and the NSDAP employed a plethora of sensory devices
including stylized marching, military music, powerful songs and rhythmic
repetitive chanting to best effect. Arguably, their architectural masterpiece,
designed by Albert Speer, was the ‘cathedral of light’ at Nuremburg. </span></span></font></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="715" style="text-align:justify;line-height:150%"><font data-dcnode-id="716" size="3"><b data-dcnode-id="717"><span data-dcnode-id="718" lang="EN-US"><span data-dcnode-id="719" instrument_node="">&nbsp;</span></span></b></font></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="700" style="margin:0cm 36pt 0.0001pt;text-align:justify;line-height:150%"><font data-dcnode-id="701" size="3"><span data-dcnode-id="712" lang="EN-US" style="line-height:150%"><span data-dcnode-id="713" instrument_node="">“It was a play of
phantasmagoria, a suggestion of a country of strange things, rather than a
piece of clear-cut and every-day reality </span></span><span data-dcnode-id="710" lang="EN-US" style="line-height:150%"><span data-dcnode-id="711" instrument_node="">. . . </span></span><span data-dcnode-id="708" lang="EN-US" style="line-height:150%"><span data-dcnode-id="709" instrument_node="">Suddenly, just as
the Fuehrer arrived, 150 powerful searchlights disposed all round the enclosure
sent up pale blue streams of radiance that converged to a point in the sky
higher than the topmost point of the highest cathedral ... One - and with one,
that army of 180,000 men and the rest of the 70,000 spectators </span></span><span data-dcnode-id="706" lang="EN-US" style="line-height:150%"><span data-dcnode-id="707" instrument_node="">- </span></span><span data-dcnode-id="704" lang="EN-US" style="line-height:150%"><span data-dcnode-id="705" instrument_node="">found oneself in a
vast cone of exquisitely delicate and tenuous effulgence, a bluishness as of
some Apocalypse, that confined one within a new order of experience, and shut
one off from the outside world … The whole effect was faery, and seemed to be
not of the things of this earth.” </span></span><span data-dcnode-id="702" lang="EN-US"><span data-dcnode-id="703" instrument_node="">(Schwarz 1993: 504)</span></span></font></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="693" style="text-align:justify;line-height:150%"><font data-dcnode-id="694" size="3"><b data-dcnode-id="695"><i data-dcnode-id="696"><span data-dcnode-id="697" lang="EN-US" style="line-height:150%;font-family:Times-Roman,sans-serif"><span data-dcnode-id="698" instrument_node="">&nbsp;</span></span></i></b></font></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="686" style="text-align:justify;line-height:150%"><font data-dcnode-id="687" size="3"><span data-dcnode-id="688" lang="EN-US"><span data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="689" instrument_node="">New states or regimes,
while attempting to construct feelings of national awareness, are aware that
emotionally charged states lead to susceptibility of suggestion. Rising to the
challenge, a successful leadership will therefore create rites and rituals
charged with emotion in order to create psychological room for new allegiances
to manifest, as without instilling a sense of awe and thus emotional
susceptibility, the new political rituals will serve no purpose. </span></span></font></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="681" style="text-align:justify;line-height:150%"><font data-dcnode-id="682" size="3"><span data-dcnode-id="683" lang="EN-US"><span data-dcnode-id="684" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="665" style="text-align:justify;line-height:150%"><font data-dcnode-id="666" size="3"><span data-dcnode-id="667" lang="EN-US"><span data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="677" instrument_node="">Another method of creating
a psychological vulnerability to suggestion is by the use of drugs. In the Fang
reformation cult, </span><i data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">eboga </span></i><span data-dcnode-id="674" instrument_node="">(</span><i data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Tabernenthes eboka</span></i><span data-dcnode-id="671" instrument_node="">), an alkaloid with
hallucinogenic properties, is ritually consumed at the start of their ceremony
to establish one-heartedness. The drug produces an ecstatic state “in order to
make the body light and enable the soul to fly” (Fernandez 1965: 906). Not
surprisingly, “All participants believed that participation in the night-long
ritual led to a state of </span><i data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">nlem-mvore</span></i><span data-dcnode-id="668" instrument_node="">
(one-heartedness), uniting all members of the cult” (Fernandez 1965: 904).</span></span></font></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="660" style="text-align:justify;line-height:150%"><font data-dcnode-id="661" size="3"><span data-dcnode-id="662" lang="EN-US"><span data-dcnode-id="663" instrument_node="">&nbsp;</span></span></font></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="650" style="text-align:justify;line-height:150%"><font data-dcnode-id="651" size="3"><span data-dcnode-id="652" lang="EN-US"><span data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">&nbsp;&nbsp; </span></span><span data-dcnode-id="656" instrument_node="">In the case of the Orokaiva
initiates, as if seclusion, hunger and silence were not intimidating enough to
make the child initiates emotionally susceptible, before being herded onto the
village platform, the children are pursued by ‘spirits’ wearing hideous masks
decorated with feathers and pig’s tusks yelling</span><span data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">&nbsp;
</span></span><span data-dcnode-id="653" instrument_node="">‘bite, bite, bite’, beaten and treated as if they were pigs. </span></span></font></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="644" style="text-align:justify;line-height:150%"><font data-dcnode-id="645" size="3"><b data-dcnode-id="646"><span data-dcnode-id="647" lang="EN-US"><span data-dcnode-id="648" instrument_node="">&nbsp;</span></span></b></font></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="635" style="text-align:justify;line-height:150%"><font data-dcnode-id="636" size="3"><b data-dcnode-id="639"><span data-dcnode-id="640" lang="EN-US"><span data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">&nbsp;&nbsp;&nbsp; </span></span></span></b><span data-dcnode-id="637" lang="EN-US"><span data-dcnode-id="638" instrument_node="">“In the
