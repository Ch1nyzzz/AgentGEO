</span><div class="text" data-dcnode-id="3151"><a class="nectar-button n-sc-button large accent-color has-icon regular-button" data-color-override="false" data-dcnode-id="3234" data-hover-color-override="false" data-hover-text-color-override="#fff" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//entheowheel.com/" style="visibility: visible;" target="_blank"><span data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">See what's included</span></span><i class="icon-button-arrow" data-dcnode-id="3235"></i></a><span data-dcnode-id="3233" instrument_node="">
</span><div class="bio hide" data-dcnode-id="3153"><span data-dcnode-id="3232" instrument_node="">
</span><p data-dcnode-id="3227"><b data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">– Entheowheel Pocket Journal </span></b><span data-dcnode-id="3228" style="font-weight: 400"><span data-dcnode-id="3229" instrument_node="">– This journal fits in your pocket and can follow you along on your journey to capture all of those inspired “ah-ha” moments or questions that arise throughout the program, record intentions or set your mind free with doodles and drawing.&nbsp;</span></span></p><span data-dcnode-id="3226" instrument_node="">
</span><p data-dcnode-id="3221"><b data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">– Entheowheel Daydream Tea</span></b><span data-dcnode-id="3222" style="font-weight: 400"><span data-dcnode-id="3223" instrument_node=""> – This unique organic blend has been created with our friends at Tea.o.graphy in Taos, New Mexico…the Land of Enchantment…and you’ll taste it when you sip this very special tea which supports lucid day-time dreaming.&nbsp;</span></span></p><span data-dcnode-id="3220" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3218" style="font-weight: 400"><span data-dcnode-id="3219" instrument_node="">Ingredients such as Hibiscus and Rosehips are packed with Vitamin C, which is known to support mycelial experiences. Cacao Nibs and a kiss of Cayenne are said to open the heart and support a healthy cardiovascular system. While Guayusa, native to the Amazon Rainforest and other South American lands, has been used for centuries in uniquely early morning dreaming practices.&nbsp;</span></span></p><span data-dcnode-id="3216" instrument_node="">
</span><p data-dcnode-id="3213"><span data-dcnode-id="3214" style="font-weight: 400"><span data-dcnode-id="3215" instrument_node="">*Please note that this blend is caffeinated and stimulating.&nbsp;</span></span></p><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3207"><b data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">– Mushroom Nootropic Tincture</span></b><span data-dcnode-id="3208" style="font-weight: 400"><span data-dcnode-id="3209" instrument_node=""> by Hearthstone Collective&nbsp;</span></span></p><span data-dcnode-id="3206" instrument_node="">
</span><p data-dcnode-id="3203"><span data-dcnode-id="3204" style="font-weight: 400"><span data-dcnode-id="3205" instrument_node="">Ingredients: organic mushrooms dual extracted with spring water and cane alcohol, organic lion’s mane, organic reishi, organic chaga, organic cordyceps, niacin&nbsp;</span></span></p><span data-dcnode-id="3202" instrument_node="">
</span><p data-dcnode-id="3197"><b data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">– Ceramic Prayer Bowl</span></b><span data-dcnode-id="3198" style="font-weight: 400"><span data-dcnode-id="3199" instrument_node=""> – These precious earthen bowls were created with water blessing rituals in mind, by Artist Logan Wannamaker and his talented team of apprentices at Wannmaker Pottery, You’ll notice reflective flecks of natural mica and the ethereal darkened coloration where smoke from the firing process has kissed each vessel in a unique way.&nbsp;</span></span></p><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3191"><b data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">– Offering Tobacco </span></b><span data-dcnode-id="3192" style="font-weight: 400"><span data-dcnode-id="3193" instrument_node="">– This traditional indigenous herb of offering and ceremony was organically and reverently grown on a community farm in the Carolinas. There are truly no limits to alternative offering herbs you can use for blessing Lands.&nbsp;</span></span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3185"><b data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">– Copal Incense</span></b><span data-dcnode-id="3186" style="font-weight: 400"><span data-dcnode-id="3187" instrument_node=""> – Throughout Mesoamerica, and especially in México, copal has a long history of use and remains highly valued for use in rituals, celebrations, and offerings throughout the year, given the belief that the white smoke enabled communication with deities and several natural forces. It is known to facilitate a relaxing, cleansing, and reconnecting experience with the Great Mystery. Soothing and cleansing body and mind, connecting worlds, thinning veils, awakening the heart, accompanying prayer, protecting pristine intentions. These are some of the essential qualities of copal. We worked directly with a family who handcrafts these sticks of Sacred Copal Resin Incense in the mountains of Mexico.&nbsp;</span></span></p><span data-dcnode-id="3184" instrument_node="">
</span><p data-dcnode-id="3179"><b data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">– Cacao Beans </span></b><span data-dcnode-id="3180" style="font-weight: 400"><span data-dcnode-id="3181" instrument_node="">– Cacao beans have a long and sacred history, beginning in Central and South America before 1500 BC. The entire cacao fruit was used medicinally by the Mayan, Olmec and Aztec civilizations and is often used in relationship with mycelial experiences. Our raw, organic beans come from Peru.&nbsp;</span></span></p><span data-dcnode-id="3178" instrument_node="">
</span><p data-dcnode-id="3173"><b data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">– Entheowheel Redwood &amp; Rose Candle</span></b><span data-dcnode-id="3174" style="font-weight: 400"><span data-dcnode-id="3175" instrument_node=""> – Created to transport your awareness to the cliffs of Big Sur, with scents of the majestic redwoods, a walk through Esalen’s Rose garden, and winds that whip through the grasses, this candle holds elements of Fire, Air, Earth, Water and Ethers and can be used for Fire Ceremony, Meditation, or to set the space for your journey.&nbsp;</span></span></p><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3167"><b data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">– Wildflower Honey</span></b><span data-dcnode-id="3168" style="font-weight: 400"><span data-dcnode-id="3169" instrument_node=""> – This precious bottle of Honey comes from the wildflower fields of Michigan with lots of love from a family farm.&nbsp;</span></span></p><span data-dcnode-id="3166" instrument_node="">
</span><p data-dcnode-id="3161"><b data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">– Meditation Shaker</span></b><span data-dcnode-id="3162" style="font-weight: 400"><span data-dcnode-id="3163" instrument_node=""> – These beautiful Meditation Shakers have been handmade from naturally-fallen Juniper trees and are each filled with seven metal bearings, then hand-polished with all natural organic beeswax for a warm, soft feel.&nbsp;</span></span></p><span data-dcnode-id="3160" instrument_node="">
</span><p data-dcnode-id="3155"><b data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">– Entheowheel Bath Salts</span></b><span data-dcnode-id="3156" style="font-weight: 400"><span data-dcnode-id="3157" instrument_node=""> – Organic wild-harvested ingredients have been hand-blended especially for purification rituals. Eucalyptus, Calendula and Rosemary come together with a blend of Pink Himalayan Salt, Epsom Salt and Big Sur Sea Salt to nourish and relieve your body and mind.</span></span></p><span data-dcnode-id="3154" instrument_node="">

</span><div class="bio hide" data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Dr. Robin Carhart-Harris moved to Imperial College London in 2008 after obtaining a PhD in Psychopharmacology from the University of Bristol and an MA in Psychoanalysis from Brunel University. At Imperial, Robin designed human brain imaging studies with LSD, psilocybin, MDMA and DMT, a clinical trial of psilocybin for treatment-resistant depression, an ongoing trial comparing psilocybin with escitalopram for major depressive disorder and a multimodal imaging study in healthy volunteers receiving psilocybin for the first time. Robin founded the Centre for Psychedelic Research at Imperial College London in April 2019, the first of its kind in the world, and has an honorary position with the University of Oxford.</span></div><span data-dcnode-id="2862" instrument_node="">

</span><h3 data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Claudia Cuentas</span></h3><span data-dcnode-id="2641" instrument_node="">
</span><div class="bio hide" data-dcnode-id="2627"><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Claudia Cuentas is a Peruvian immigrant, a bilingual and bicultural artist, a license marriage and family therapist, a researcher and an educator, specializing in the intersectionality of art, healing trauma, trauma recovery, cultural identity, indigenous knowledge and decolonization of healing.&nbsp; She has an MA in Counseling Psychology and is trained in Drama Therapy, Expressive Arts Therapy, Somatic Experiencing, and Trauma Inform Care. She also has extensive studies in Indigenous healing, from her native Aymara and Quechua lineages of South America.</span></p><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Claudia started her journey as an educator and advocate of art, as a tool for healing and liberation. In becoming a therapist, after her studies at the California Institute of Integral Studies, Claudia focused on serving immigrant communities, families and children. She has worked with undocumented families, refugees, homeless population and women survivors of violence, especially dealing with PTSD. Upon arriving to Portland, Oregon, Claudia joined the team at Conexiones, a Multicultural Center for Trauma Recovery. Claudia has completed parts A and B of the Multidisciplinary Association for Psychedelic Studies (MAPS) MDMA Therapy Training Program.&nbsp; She continues to participate in ongoing training and education on the intersectionality of generational trauma, plant medicine science, eco-informed therapy, nervous system healing and indigenous wisdom.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Claudia also leads workshops in cultural diversity and art as healing, as well as bilingual song circles for the community. She collaborates with organizations as Native American Youth Association, MILPA (Cultivating Change Makers for The Next Seven Generations) and Adelante Mujeres on developing curriculum about trauma recovery and Indigenous ways of healing. Claudia also worked as a consultant with the Ministry of Education in Peru to implement creative pilot programs aimed at preventing violence in the rural schools 2017.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Claudia currently has a private practice in Portland, Oregon. She is committed to continue providing ethical, educational and integrated work to support indigenous, black, brown and immigrant communities recovering from trauma.&nbsp; Claudia is also a recording musician, a singer songwriter and the founder of the Canta Colibrí Project.</span></p><span data-dcnode-id="2628" instrument_node="">

</span><div class="bio hide" data-dcnode-id="2583"><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">As former Clinical Lead of the Psilocybin for Depression trial at Imperial College London, Rosalind Watts, PhD, led a clinical team which facilitated over a hundred psilocybin treatment sessions. She is now part of a team exploring the potential of DMT as a treatment for depression in the UK.</span></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">Ros has published qualitative research suggesting that the central psychological mechanism of psychedelic-assisted therapy could be ‘connectedness to self, others and world’ , which led to the development of a psychometrically validated tool for measuring connectedness, the Watts Connectedness Scale (WCS). Ros has also published a therapy model for psilocybin treatment sessions in medical research settings, ‘Accept, Embody, Connect’ and is about to offer a year-long online community integration process for anyone wanting to maintain long-term connectedness to self, others, and the natural world (Accept, Embody, Connect, Restore).</span></p><span data-dcnode-id="2584" instrument_node="">

</span><h3 data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Akua Ofosuhene</span></h3><span data-dcnode-id="2484" instrument_node="">
</span><div class="bio hide" data-dcnode-id="2470"><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2480"><span data-dcnode-id="2481" style="font-weight: 400"><span data-dcnode-id="2482" instrument_node="">4 years ago Akua found out that her 14 year old son had been groomed into a Countylines drug dealing ring while at school in London. The worry, shame and guilt brought on depression, high blood pressure and a cancer scare. Although the police, and youth and social services were ‘doing their best’ Akua realised that institutional outdated practices were not working and she had to find a different way.</span></span></p><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2476"><span data-dcnode-id="2477" style="font-weight: 400"><span data-dcnode-id="2478" instrument_node="">Akua learned about psychedelic medicines, alternative healing modalities and African spirituality. By putting these together she was able to treat her depression. After years of research Akua was able to persuade her son to allow her to administer a therapeutic dose of MDMA and psilocybin magic mushrooms. After 4 years of worry during which her son had been arrested numerous times, been attacked with a baseball bat and spent many weeks hauled up in crack and heroin dens, the nightmare was over. Over one weekend, after taking the medicines the nightmare was over and he was finished ‘with the life’. It’s 2 years since then and her son now lives in Ghana where he is studying.</span></span></p><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" style="font-weight: 400"><span data-dcnode-id="2474" instrument_node="">Today Akua advises on intentions, integration and doing the work revealed by the medicine. She advises parents dealing with the effects of grooming and gang activity.&nbsp; Akua works full time as designer dressmaker and importer of natural and artisanal products from Ghana. She is currently studying to be a psychedelic medicine guide. </span></span></p><span data-dcnode-id="2471" instrument_node="">
</span></div><span data-dcnode-id="2469" instrument_node="">

</span><h3 data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">Pam Kryskow</span></h3><span data-dcnode-id="2441" instrument_node="">
</span><div class="bio hide" data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Dr. Pamela Kryskow is a medical doctor with a strong interest in chronic pain, mental health and psychedelic medicine. She is a clinical instructor at UBC and adjunct professor at VIU and a founding board member of the Canadian Psychedelic Association. Dr Kryskow is actively involved in research related to psilocybin, MDMA, ketamine, COVID, mental wellness and neurogenesis and is a co-investigator on the largest microdosing study Microdose.me. She is the medical lead on the Roots To Thrive Ketamine Assisted Therapy program that treats health care providers and first responders with PTSD, depression, anxiety, and addiction. In real life she loves hiking in the forest, ocean kayaking, growing kale and daydreaming in the hammock.</span></div><span data-dcnode-id="2438" instrument_node="">

</span><h3 data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Buki Fadipe</span></h3><span data-dcnode-id="2403" instrument_node="">
</span><div class="bio hide" data-dcnode-id="2385"><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2399"><span data-dcnode-id="2400" style="font-weight: 400"><span data-dcnode-id="2401" instrument_node="">Buki Fadipe, a writer/content creator, educator, womanist, and healing catalyst, founded Adventures in OM (@adventures.in.om) an educational resource for those seeking expansion, healing and growth with sacred earth medicines.</span></span></p><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2396" style="font-weight: 400"><span data-dcnode-id="2397" instrument_node="">Buki was born in Nigeria where she lived until she moved to the UK when she was 11. She holds a Bachelor of Arts in Fashion Promotion and Communication from the University of the Arts London, is completing a Psychedelic Practitioner training program with Synthesis Institute, and is a certified Hatha Yoga instructor. Her work is rooted in spirituality and reclaiming ancient earth/indigenous wisdom traditions to act as a basis for more earth based and holistic ways of healing. She hopes to combine these elements into a potent mix in a therapeutic psychedelic medicine practice.</span></span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2391"><span data-dcnode-id="2392" style="font-weight: 400"><span data-dcnode-id="2393" instrument_node="">Buki runs educational workshops, courses, and one-on-one sessions on preparation, navigation, harm reduction and integration for people seeking holistic alternatives to pharmaceutical drugs and conventional Western medicine. She writes about the intersections of psychedelic healing and spirituality and creates content for a number of psychedelic platforms and retreat organizations.</span></span></p><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2388" style="font-weight: 400"><span data-dcnode-id="2389" instrument_node="">Buki uses an empowerment model to champion psychedelics for healing intergenerational trauma, decolonization, and self-liberation work—the route to lasting and holistic transformation. She is investigating how psychedelics can be used as a catalyst for healing trauma, ecological justice and how they help us bridge cultural divides, heal ancestral wounds, and create a better future for the global collective. She advocates for diversity and inclusion while creating safe spaces for all people in need of healing, growth, and expansion to educate, share, and heal in union.</span></span></p><span data-dcnode-id="2386" instrument_node="">

</span><h3 data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Tony Bossis</span></h3><span data-dcnode-id="2356" instrument_node="">
</span><div class="bio hide" data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Anthony P. Bossis, Ph.D. is a clinical psychologist and clinical assistant professor of psychiatry at NYU School of Medicine conducting FDA-approved clinical research with the psychedelic compound psilocybin since 2009. Dr. Bossis was director of palliative care research and co-principal investigator on the landmark 2016 clinical trial and publication demonstrating a significant reduction in emotional distress from a single psilocybin session in persons with cancer, specifically, a rapid decrease in depression, anxiety, hopelessness, and demoralization along with improvements in spiritual well-being and quality of life (Journal of Psychopharmacology). Dr. Bossis is also study director and lead session guide on the FDA-approved clinical trial evaluating psilocybin-generated mystical experience upon religious leaders. Dr. Bossis is a training supervisor of psychotherapy at NYU-Bellevue Hospital Center and co-founder and former co-director of the Bellevue Hospital Palliative Care Service. He is on the faculty of The Center for Psychedelic Therapies and Research at the California Institute of Integral Studies and a guest editor (with Charles Grob, M.D.) on a special series on psychedelics for the Journal of Humanistic Psychology. He has a long-standing interest in comparative religion and mysticism and on the interface of psychology and spirituality. He maintains a private psychotherapy and consulting practice in NYC.</span></div><span data-dcnode-id="2353" instrument_node="">
</span></div><span data-dcnode-id="2351" instrument_node=""> </span></div></div></div></div></div><div class="parallaxImg-shadow" data-dcnode-id="2345"></div></div></div><span data-dcnode-id="2342" instrument_node="">

</span><div class="bio hide" data-dcnode-id="2315"><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" style="font-weight: 400"><span data-dcnode-id="2323" instrument_node="">Host of The Psychedelic Leadership Podcast, Laura Dawn is a microdosing mentor for executives and top performers and has been leading transformational retreats for over 10 years. Through her signature programs and retreats, Laura Dawn weaves together science with wisdom to teach business and thought-leaders, entrepreneurs, and creators how to mindfully explore psychedelics and sacred plant medicines as powerful visionary tools for inner transformation and creative manifestation. Through mindset and somatic coaching, she inspires people to truly expand the boundaries of what they believe is possible and embark on the path of heart-centered leadership to influence meaningful change.</span></span></p><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2318" style="font-weight: 400"><span data-dcnode-id="2319" instrument_node="">Laura Dawn has a degree in Finance and Entrepreneurship and over two decades of exploring altered states of consciousness. Currently, she is completing a Masters in Science specializing in Creativity &amp; Change Leadership, exploring the intersection between psychedelics and creative problem-solving, helping leaders and teams unlock innovative solutions to the complex challenges we collectively face.</span></span></p><span data-dcnode-id="2316" instrument_node="">

</span><div class="bio hide" data-dcnode-id="2244"><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2253" instrument_node="">Natasja Pelgrom is a mystic, devoted creative, and visionary whose life’s work is to lead spiritual experiences that support others in their journey of healing and transformational growth. Natasja is the founder of </span><em data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Awaken The Medicine Within</span></em><span data-dcnode-id="2250" instrument_node=""> Retreats &amp; Online Program. She is a highly intuitive guide and has held training, assisting, and facilitation roles in over 800 psychedelic ceremonies. She has also advised and curated healing programs for other psychedelic wellness companies. Natasja continues to teach empowerment workshops and has developed an online psychedelic integration and self-love program. One of her latest successes is the launch of </span><em data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">The Awaken Podcast</span></em><span data-dcnode-id="2247" instrument_node=""> where she has dedicated her voice to the series “Women in Psychedelics.”</span></p><span data-dcnode-id="2245" instrument_node="">

ata-dcnode-id="2199" instrument_node="">Elana H.</span></span></span></div></blockquote></div></div></div><div aria-selected="false" class="cell" data-dcnode-id="2180" style="position: absolute; left: 50%; height: 484px;"><div class="inner-wrap-outer" data-dcnode-id="2181"><div class="inner-wrap" data-dcnode-id="2182"><blockquote class="nectar_single_testimonial" data-color="" data-dcnode-id="2183" data-style="basic"><div class="inner" data-dcnode-id="2184"><span data-dcnode-id="2191" instrument_node=""> </span><p data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">“I've been to Esalen many times and I think this is an image of the future. It was really useful to communicate that for psychedelic therapy, the substance is not the all-important thing. That's kind of a Western medicine thinking that the pill is what matters. The container, the ritual, the connection with other people and the feeling of safety have much more of a profound effect. It was transformative.” </span></p><div class="image-icon" data-dcnode-id="2188" data-shadow="" style="background-image: url(https://entheowheel.com/wp-content/uploads/2021/10/praise-quote-reese-jones.jpg);"></div><span class="wrap" data-dcnode-id="2185"><span data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Reese J.</span></span></span></div></blockquote></div></div></div><div aria-selected="true" class="cell is-selected" data-dcnode-id="2168" style="position: absolute; left: 100%; height: 484px;"><div class="inner-wrap-outer" data-dcnode-id="2169"><div class="inner-wrap" data-dcnode-id="2170"><blockquote class="nectar_single_testimonial" data-color="" data-dcnode-id="2171" data-style="basic"><div class="inner" data-dcnode-id="2172"><span data-dcnode-id="2179" instrument_node=""> </span><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">“Being in this community was super healing. I learned a lot, not only about the medicine, but also just how to make it more a part of my life in a ceremonial way where I can really honor where the medicine comes from, the elders, the ancestors, and Mother Earth for what she provides.” </span></p><div class="image-icon" data-dcnode-id="2176" data-shadow="" style="background-image: url(https://entheowheel.com/wp-content/uploads/2021/10/praise-quote-julio-rivera.jpg);"></div><span class="wrap" data-dcnode-id="2173"><span data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Julio R.</span></span></span></div></blockquote></div></div></div><div aria-selected="true" class="cell is-selected" data-dcnode-id="2156" style="position: absolute; left: 150%; height: 484px;"><div class="inner-wrap-outer" data-dcnode-id="2157"><div class="inner-wrap" data-dcnode-id="2158"><blockquote class="nectar_single_testimonial" data-color="" data-dcnode-id="2159" data-style="basic"><div class="inner" data-dcnode-id="2160"><span data-dcnode-id="2167" instrument_node=""> </span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">“It was a beautiful closing with the grandmothers and all the women medicine-people closing together in this beautiful prayer with the water. That was a highlight, just seeing the women holding the space all weekend. It warms my heart.” </span></p><div class="image-icon" data-dcnode-id="2164" data-shadow="" style="background-image: url(https://entheowheel.com/wp-content/uploads/2021/10/praise-quote-laura-lochrane.jpg);"></div><span class="wrap" data-dcnode-id="2161"><span data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Laura L.</span></span></span></div></blockquote></div></div></div><div aria-selected="false" class="cell" data-dcnode-id="2144" style="position: absolute; left: 200%; height: 484px;"><div class="inner-wrap-outer" data-dcnode-id="2145"><div class="inner-wrap" data-dcnode-id="2146"><blockquote class="nectar_single_testimonial" data-color="" data-dcnode-id="2147" data-style="basic"><div class="inner" data-dcnode-id="2148"><span data-d </span><div class="wpb_wrapper" data-dcnode-id="1848"><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1861" style="font-weight: 400;"><span data-dcnode-id="1862" instrument_node="">Entheowheel is the collaborative creation of </span></span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dreammullick.com/" rel="noopener" target="_blank"><span data-dcnode-id="1859" style="font-weight: 400;"><span data-dcnode-id="1860" instrument_node="">Dream Mullick</span></span></a><span data-dcnode-id="1856" style="font-weight: 400;"><span data-dcnode-id="1857" instrument_node=""> and an incredible visionary team of mostly volunteers, community sponsors and grassroots funders. The vision was born as an experiment at the edge of our Western World, quite literally, on the cliffs of Big Sur at </span></span><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esalen.org/workshops/entheowheel-the-ceremony-and-science-of-psilocybin" rel="noopener" target="_blank"><span data-dcnode-id="1854" style="font-weight: 400;"><span data-dcnode-id="1855" instrument_node="">Esalen Institute</span></span></a><span data-dcnode-id="1851" style="font-weight: 400;"><span data-dcnode-id="1852" instrument_node="">, birthplace of the Human Potential Movement.</span></span></p><span data-dcnode-id="1849" instrument_node="">
</span></div><span data-dcnode-id="1847" instrument_node="">
</span></div><span data-dcnode-id="1845" instrument_node="">
</span><div class="wpb_text_column wpb_content_element wpb_animate_when_almost_visible wpb_fadeIn fadeIn font-16" data-dcnode-id="1837"><span data-dcnode-id="1844" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1839"><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Our intention is to explore our edges and bridge the chasm that exists between indigenous sacred plants “original science” and the modern science and study of Psychedelic medicines. Everything we do and create orients around these intentions:</span></p><span data-dcnode-id="1840" instrument_node="">

</span><p data-dcnode-id="1729"><span data-dcnode-id="1733" instrument_node="">Entheowheel’s work is designed to&nbsp; support you in future sacred plant and psychedelic medicine journeys by introducing you to the power of preparation, integration and ceremony. </span><em data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">This is not intended as a course on how to trip at home or have un-guided journeys.</span></em><span data-dcnode-id="1730" instrument_node=""> The greatest invitation is to explore the sacred spirit and wisdom of&nbsp; plant medicine, receive the teachings and practices for best preparation and allow the integration of the experience to be the true medicine.</span></p><span data-dcnode-id="1728" instrument_node="">

</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1399"><span data-dcnode-id="1406" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1401"><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">This is not a course on how to trip at home or have un-guided journeys. This is an invitation to come into relationship with the intelligence of psilocybin and explore how to prepare and integrate a future journey.</span></p><span data-dcnode-id="1402" instrument_node="">
</span></div><span data-dcnode-id="1400" instrument_node="">
</span></div><span data-dcnode-id="1398" instrument_node="">
</span></div></div></div><div class="toggle default" data-dcnode-id="1303" data-inner-wrap="true"><h3 data-dcnode-id="1391"><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/r_uU8p9eQIQ%3Fplaylist%3Dr_uU8p9eQIQ%26iv_load_policy%3D3%26enablejsapi%3D1%26disablekb%3D1%26autoplay%3D1%26controls%3D0%26showinfo%3D0%26rel%3D0%26loop%3D1%26origin%3Dhttps%253A%252F%252Fentheowheel.com%26widgetid%3D1"><i class="fa fa-plus-circle" data-dcnode-id="1394"></i><span data-dcnode-id="1393" instrument_node="">What is Entheowheel?</span></a></h3><div data-dcnode-id="1304"><div class="inner-toggle-wrap" data-dcnode-id="1305"><span data-dcnode-id="1390" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1307"><span data-dcnode-id="1389" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1309"><span data-dcnode-id="1388" instrument_node="">
</span><div class="wpb_text_column wpb_content_element wpb_animate_when_almost_visible wpb_fadeIn fadeIn font-16 animated wpb_start_animation" data-dcnode-id="1374"><span data-dcnode-id="1387" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1376"><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1385" instrument_node="">Entheowheel is the collaborative creation of&nbsp;</span><a data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dreammullick.com/" rel="noopener" target="_blank"><span data-dcnode-id="1384" instrument_node="">Dream Mullick</span></a><span data-dcnode-id="1382" instrument_node="">&nbsp;and an incredible visionary team of mostly volunteers, community sponsors and grassroots funders. The vision was born as an experiment at the edge of our Western World, quite literally, on the cliffs of Big Sur at&nbsp;</span><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esalen.org/workshops/entheowheel-the-ceremony-and-science-of-psilocybin" rel="noopener" target="_blank"><span data-dcnode-id="1381" instrument_node="">Esalen Institute</span></a><span data-dcnode-id="1379" instrument_node="">, birthplace of the Human Potential Movement.</span></p><span data-dcnode-id="1377" instrument_node="">
</span></div><span data-dcnode-id="1375" instrument_node="">
</span></div><span data-dcnode-id="1373" instrument_node="">
</span><div class="wpb_text_column wpb_content_element wpb_animate_when_almost_visible wpb_fadeIn fadeIn font-16 animated wpb_start_animation" data-dcnode-id="1365"><span data-dcnode-id="1372" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1367"><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Our intention is to explore our edges and bridge the chasm that exists between indigenous sacred plants “original science” and the modern science and study of Psychedelic medicines. Everything we do and create orients around these intentions:</span></p><span data-dcnode-id="1368" instrument_node="">
</span></div><span data-dcnode-id="1366" instrument_node="">
</span></div><span data-dcnode-id="1364" instrument_node="">
</span><div class="wpb_text_column wpb_content_element wpb_animate_when_almost_visible wpb_fadeIn fadeIn font-16 animated wpb_start_animation" data-dcnode-id="1311"><span data-dcnode-id="1363" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1313"><span data-dcnode-id="1362" instrument_node="">
</span><ul data-dcnode-id="1315"><span data-dcnode-id="1361" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">To&nbsp;</span><b data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">honor</span></b><span data-dcnode-id="1357" instrument_node="">&nbsp;the wisdom and intelligence of Sacred Plants &amp; Psychedelic Medicines and the lineage keepers.</span></li><span data-dcnode-id="1355" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1350"><span data-dcnode-id="1354" instrument_node="">To widely&nbsp;</span><b data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">share</span></b><span data-dcnode-id="1351" instrument_node="">&nbsp;the wisdom &amp; tools by creating equitable access.</span></li><span data-dcnode-id="1349" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">To&nbsp;</span><b data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">prepare</span></b><span data-dcnode-id="1345" instrument_node="">&nbsp;individuals and communities who are new for future experiences, and offer the space for those with experience to deepen their knowledge.</span></li><span data-dcnode-id="1343" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node="">To create and hold safe space for all individuals to&nbsp;</span><b data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">connect</span></b><span data-dcnode-id="1339" instrument_node="">, learn, share &amp; explore.</span></li><span data-dcnode-id="1337" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">To bridge the world views of ceremony (“original science”) &amp; modern science.</span></li><span data-dcnode-id="1334" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1329"><span data-dcnode-id="1333" instrument_node="">To offer unique opportunity to experience and&nbsp;</span><b data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">explore</span></b><span data-dcnode-id="1330" instrument_node="">&nbsp;extra-ordinary states of consciousness without medicines.</span></li><span data-dcnode-id="1328" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1323"><span data-dcnode-id="1327" instrument_node="">To introduce and emphasize the value of&nbsp;</span><b data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">integration</span></b><span data-dcnode-id="1324" instrument_node="">&nbsp;as an essential tool of inner and outer transformation.</span></li><span data-dcnode-id="1322" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node="">To reconnect with the ordinary as&nbsp;</span><b data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">sacred</span></b><span data-dcnode-id="1318" instrument_node="">, and the mycelial web of all life.</span></li><span data-dcnode-id="1316" instrument_node="">
</span></ul><span data-dcnode-id="1314" instrument_node="">
</span></div><span data-dcnode-id="1312" instrument_node="">
</span></div><span data-dcnode-id="1310" instrument_node="">
</span></div><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span></div></div></div><div class="toggle default" data-dcnode-id="1253" data-inner-wrap="true"><h3 data-dcnode-id="1299"><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/r_uU8p9eQIQ%3Fplaylist%3Dr_uU8p9eQIQ%26iv_load_policy%3D3%26enablejsapi%3D1%26disablekb%3D1%26autoplay%3D1%26controls%3D0%26showinfo%3D0%26rel%3D0%26loop%3D1%26origin%3Dhttps%253A%252F%252Fentheowheel.com%26widgetid%3D1"><i class="fa fa-plus-circle" data-dcnode-id="1302"></i><span data-dcnode-id="1301" instrument_node="">Do you have a referral or affiliate program?</span></a></h3><div data-dcnode-id="1254"><div class="inner-toggle-wrap" data-dcnode-id="1255"><span data-dcnode-id="1298" instrument_node="">

</span><li data-dcnode-id="1263"><span data-dcnode-id="1267" instrument_node="">Spread the word about the&nbsp;</span><a data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forms.gle/Gp8NDf16jj48gBZM6" rel="noopener" target="_blank"><span data-dcnode-id="1266" instrument_node="">Scholarship</span></a><span data-dcnode-id="1264" instrument_node="">&nbsp;opportunities.</span></li><span data-dcnode-id="1262" instrument_node="">

</span><p data-dcnode-id="1220"><span data-dcnode-id="1231" instrument_node="">To contribute to our Scholarship Fund, you can</span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//store.maps.org/np/clients/maps/campaign.jsp%3Fcampaign%3D204"><span data-dcnode-id="1230" instrument_node="">&nbsp;</span><b data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">make a tax-deductible contribution through MAPS</span></b></a><span data-dcnode-id="1226" instrument_node="">&nbsp;or</span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paypal.com/paypalme/entheowheel"><span data-dcnode-id="1225" instrument_node="">&nbsp;</span><b data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">send a contribution through paypal</span></b></a><span data-dcnode-id="1221" instrument_node="">.</span></p><span data-dcnode-id="1219" instrument_node="">

</span><p data-dcnode-id="1202"><i data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Reciprocity:</span></i><span data-dcnode-id="1206" instrument_node="">&nbsp;Indigenous communities often model their economic and social exchanges, including their relationship with the natural world, on the concept of reciprocity.&nbsp;</span><b data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">This practice recognizes the gifts that we receive from the universe and offers gifts in return as gratitude.</span></b><span data-dcnode-id="1203" instrument_node="">&nbsp;Reciprocity and our deep commitment to honoring all the influences that inform our work, is at the core of our ever-evolving model.</span></p><span data-dcnode-id="1201" instrument_node="">
</span></div><span data-dcnode-id="1199" instrument_node="">

</span><div class="wpb_wrapper" data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">As an expression of our commitment, 10% of all revenues from the Livestream event at Esalen was committed to the preservation and conservation of sacred lands and traditional medicine lineages, including The Esselen Tribe’s land restoration initiative. Additionally, 30% of participants received Visionary Scholarships as a commitment to our diversity and inclusion efforts.</span></p><span data-dcnode-id="1192" instrument_node="">

</span></div></div></div><div class="toggle default" data-dcnode-id="1055" data-inner-wrap="true"><h3 data-dcnode-id="1165"><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/r_uU8p9eQIQ%3Fplaylist%3Dr_uU8p9eQIQ%26iv_load_policy%3D3%26enablejsapi%3D1%26disablekb%3D1%26autoplay%3D1%26controls%3D0%26showinfo%3D0%26rel%3D0%26loop%3D1%26origin%3Dhttps%253A%252F%252Fentheowheel.com%26widgetid%3D1"><i class="fa fa-plus-circle" data-dcnode-id="1168"></i><span data-dcnode-id="1167" instrument_node="">What is in the Altar Blessing Box?</span></a></h3><div data-dcnode-id="1056"><div class="inner-toggle-wrap" data-dcnode-id="1057"><span data-dcnode-id="1164" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1059"><span data-dcnode-id="1163" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1061"><span data-dcnode-id="1162" instrument_node="">
</span><div class="wpb_text_column wpb_content_element wpb_animate_when_almost_visible wpb_fadeIn fadeIn font-16 animated wpb_start_animation" data-dcnode-id="1063"><span data-dcnode-id="1161" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1065"><span data-dcnode-id="1160" instrument_node="">
</span><div class="wpb_text_column wpb_content_element wpb_animate_when_almost_visible wpb_fadeIn fadeIn font-16 animated wpb_start_animation" data-dcnode-id="1067"><span data-dcnode-id="1159" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1153"><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" style="font-weight: 400;"><span data-dcnode-id="1157" instrument_node="">The Altar Blessing Box consists of lovingly curated ceremonial items created exclusively for Entheowheel for you to build your own personal altar. Most of the items are specific to the sacred mushroom medicine, psilocybin.</span></span></p><span data-dcnode-id="1154" instrument_node="">
</span></div><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><img alt="Blessing Box" class="aligncenter wp-image-1181 size-medium" data-dcnode-id="1151" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dev.entheowheel.com/wp-content/uploads/2022/03/Photo-Mar-27-3-41-44-PM-300x300.jpg&amp;raw" width="300"></p><span data-dcnode-id="1149" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1069"><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1143"><b data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">– Entheowheel Pocket Journal </span></b><span data-dcnode-id="1144" style="font-weight: 400;"><span data-dcnode-id="1145" instrument_node="">– This journal fits in your pocket and can follow you along on your journey to capture all of those inspired “ah-ha” moments or questions that arise throughout the program, record intentions or set your mind free with doodles and drawing.&nbsp;</span></span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1137"><b data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">– Entheowheel Daydream Tea</span></b><span data-dcnode-id="1138" style="font-weight: 400;"><span data-dcnode-id="1139" instrument_node=""> – This unique organic blend has been created with our friends at Tea.o.graphy in Taos, New Mexico…the Land of Enchantment…and you’ll taste it when you sip this very special tea which supports lucid day-time dreaming.&nbsp;</span></span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" style="font-weight: 400;"><span data-dcnode-id="1135" instrument_node="">Ingredients such as Hibiscus and Rosehips are packed with Vitamin C, which is known to support mycelial experiences. Cacao Nibs and a kiss of Cayenne are said to open the heart and support a healthy cardiovascular system. While Guayusa, native to the Amazon Rainforest and other South American lands, has been used for centuries in uniquely early morning dreaming practices.&nbsp;</span></span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" style="font-weight: 400;"><span data-dcnode-id="1131" instrument_node="">*Please note that this blend is caffeinated and stimulating.&nbsp;</span></span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1123"><b data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">– Mushroom Nootropic Tincture</span></b><span data-dcnode-id="1124" style="font-weight: 400;"><span data-dcnode-id="1125" instrument_node=""> by Hearthstone Collective&nbsp;</span></span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" style="font-weight: 400;"><span data-dcnode-id="1121" instrument_node="">Ingredients: organic mushrooms dual extracted with spring water and cane alcohol, organic lion’s mane, organic reishi, organic chaga, organic cordyceps, niacin&nbsp;</span></span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1113"><b data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">– Ceramic Prayer Bowl</span></b><span data-dcnode-id="1114" style="font-weight: 400;"><span data-dcnode-id="1115" instrument_node=""> – These precious earthen bowls were created with water blessing rituals in mind, by Artist Logan Wannamaker and his talented team of apprentices at Wannmaker Pottery, You’ll notice reflective flecks of natural mica and the ethereal darkened coloration where smoke from the firing process has kissed each vessel in a unique way.&nbsp;</span></span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1107"><b data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">– Offering Tobacco </span></b><span data-dcnode-id="1108" style="font-weight: 400;"><span data-dcnode-id="1109" instrument_node="">– This traditional indigenous herb of offering and ceremony was organically and reverently grown on a community farm in the Carolinas. There are truly no limits to alternative offering herbs you can use for blessing Lands.&nbsp;</span></span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1101"><b data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">– Copal Incense</span></b><span data-dcnode-id="1102" style="font-weight: 400;"><span data-dcnode-id="1103" instrument_node=""> – Throughout Mesoamerica, and especially in México, copal has a long history of use and remains highly valued for use in rituals, celebrations, and offerings throughout the year, given the belief that the white smoke enabled communication with deities and several natural forces. It is known to facilitate a relaxing, cleansing, and reconnecting experience with the Great Mystery. Soothing and cleansing body and mind, connecting worlds, thinning veils, awakening the heart, accompanying prayer, protecting pristine intentions. These are some of the essential qualities of copal. We worked directly with a family who handcrafts these sticks of Sacred Copal Resin Incense in the mountains of Mexico.&nbsp;</span></span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1095"><b data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">– Cacao Beans </span></b><span data-dcnode-id="1096" style="font-weight: 400;"><span data-dcnode-id="1097" instrument_node="">– Cacao beans have a long and sacred history, beginning in Central and South America before 1500 BC. The entire cacao fruit was used medicinally by the Mayan, Olmec and Aztec civilizations and is often used in relationship with mycelial experiences. Our raw, organic beans come from Peru.&nbsp;</span></span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1089"><b data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">– Entheowheel Redwood &amp; Rose Candle</span></b><span data-dcnode-id="1090" style="font-weight: 400;"><span data-dcnode-id="1091" instrument_node=""> – Created to transport your awareness to the cliffs of Big Sur, with scents of the majestic redwoods, a walk through Esalen’s Rose garden, and winds that whip through the grasses, this candle holds elements of Fire, Air, Earth, Water and Ethers and can be used for Fire Ceremony, Meditation, or to set the space for your journey.&nbsp;</span></span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1083"><b data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">– Wildflower Honey</span></b><span data-dcnode-id="1084" style="font-weight: 400;"><span data-dcnode-id="1085" instrument_node=""> – This precious bottle of Honey comes from the wildflower fields of Michigan with lots of love from a family farm.&nbsp;</span></span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1077"><b data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">– Meditation Shaker</span></b><span data-dcnode-id="1078" style="font-weight: 400;"><span data-dcnode-id="1079" instrument_node=""> – These beautiful Meditation Shakers have been handmade from naturally-fallen Juniper trees and are each filled with seven metal bearings, then hand-polished with all natural organic beeswax for a warm, soft feel.&nbsp;</span></span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1071"><b data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">– Entheowheel Bath Salts</span></b><span data-dcnode-id="1072" style="font-weight: 400;"><span data-dcnode-id="1073" instrument_node=""> – Organic wild-harvested ingredients have been hand-blended especially for purification rituals. Eucalyptus, Calendula and Rosemary come together with a blend of Pink Himalayan Salt, Epsom Salt and Big Sur Sea Salt to nourish and relieve your body and mind.</span></span></p><span data-dcnode-id="1070" instrument_node="">
