</span><section class="elementor-section elementor-top-section elementor-element elementor-element-0d963a8 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="2359" data-element_type="section" data-id="0d963a8" data-particle-mobile-disabled="false" data-particle_enable="false" id="articleContent"><span data-dcnode-id="2823" instrument_node="">
</span><div class="elementor-container elementor-column-gap-no" data-dcnode-id="2361"><span data-dcnode-id="2822" instrument_node="">
</span><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-1c356a5" data-dcnode-id="2363" data-element_type="column" data-id="1c356a5"><span data-dcnode-id="2821" instrument_node="">
</span><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="2365"><span data-dcnode-id="2820" instrument_node="">
</span><div class="elementor-element elementor-element-d36ec18 elementor-widget elementor-widget-theme-post-content" data-dcnode-id="2367" data-element_type="widget" data-id="d36ec18" data-widget_type="theme-post-content.default"><span data-dcnode-id="2819" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="2369"><span data-dcnode-id="2818" instrument_node="">
</span><p data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Death rituals are well documented throughout history –– and around the world.</span></p><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">From the New Orleans jazz funeral and South Korean burial beads to sky burial in Mongolia and Tibet and Balinese cremation ceremonies, these rituals and ceremonies are often associated with religion as communities follow the traditionally prescribed movements in the wake of a loss of life.</span></p><span data-dcnode-id="2812" instrument_node="">
</span><p data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Death ceremonies and traditions around the world often have a similar central purpose, though –– no matter the religion, sect, or geography of the people. That central purpose is community.</span></p><span data-dcnode-id="2809" instrument_node="">
</span><blockquote data-dcnode-id="2806"><p data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">These mourning rituals and ceremonies are meant to bring people together, to take the hands of those mourning the loss and lead them astray from isolation.</span></p></blockquote><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Whether the grief ritual was a public mourning event, in which friends, family and strangers alike attended the event to wail and mourn as one, or if the ritual were a dress code and a family-imposed curfew followed by regular visits from clergy and community to chant the passed soul to the next realm, one thing is abundantly clear about grief rituals and death ceremonies: grievers are rarely alone.</span></p><span data-dcnode-id="2802" instrument_node="">
</span><h3 data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">In the Western world, however, this is so often no longer the case.</span></h3><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Death rituals are nearly non-existent in the United States, Canada, and Europe, and death ceremonies often consist only of a wake or a funeral, and then –– well –– nothing. This wasn’t always the case.</span></p><span data-dcnode-id="2796" instrument_node="">
</span><blockquote data-dcnode-id="2793"><p data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">In the United States, there is a long history of what is often called the privatization of grief.</span></p></blockquote><span data-dcnode-id="2792" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2791" instrument_node="">“Many mourners experience grief as a kind of isolation—one that is exacerbated by the fact that one’s peers, neighbors, and co-workers may not really want to know how you are. We’ve adopted a sort of ‘ask, don’t tell’ policy,” writes </span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/magazine/2010/02/01/good-grief"><span data-dcnode-id="2790" instrument_node="">Meghan O’Rourke in a 2010 New Yorker article</span></a><span data-dcnode-id="2788" instrument_node="">. “The question ‘How are you?’ is an expression of concern, but mourners quickly figure out that it shouldn’t be mistaken for an actual inquiry.”</span></p><span data-dcnode-id="2786" instrument_node="">
</span><p data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">More recently, grief has even moved to the realm of self-help, where the loss of a loved one can be used, experts say, as a forward-propelling event in your own life.</span></p><span data-dcnode-id="2783" instrument_node="">
</span><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Again, from Meghan O’Rourke:</span></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">“‘On Grief and Grieving’ was a personal triumph of sorts for the ailing Kübler-Ross. Yet her crusade to open up a conversation about death and grief was ultimately distorted by her own evasions: the woman who wanted us to confront death unflinchingly came to insist that it was really an opportunity for personal growth among the survivors, as if it were a Learning Annex class.</span></p><span data-dcnode-id="2777" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">As she put it in an essay for an anthology, ‘Death: The Final Stage of Growth’ (1997), ‘Confrontation with death and dying can enrich one’s life and help one to become a more human and humane person.’</span></p><span data-dcnode-id="2774" instrument_node="">
</span><blockquote data-dcnode-id="2771"><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">“This approach—suffused with an American ‘we can do it better’ spirit—made grief the province of self-help rather than of the community.”</span></p></blockquote><span data-dcnode-id="2770" instrument_node="">
</span><h2 data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">How The West Lost Its Death Rituals</span></h2><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">It wasn’t always this way in the West (i.e. in Europe and later what would be known as the United States).</span></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">The Plague is where some researchers point as a starting point for a decline in grief rituals in the West. So many died that it was impossible for grief rituals and last rites to be given to all who needed them. In addition, it wasn’t understood exactly what caused the Plague, and people were wary to help or tend to the fallen bodies out of fear of getting the Plague themself.</span></p><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">This was counter to the traditions at the time, in which families bathed the bodies at home after they passed, laid them out on the bed, invited folks over, held religious ceremonies, and planned the burial of their loved one with the local priest in the church’s cemetery.</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">But there was no room at church graveyards for all the death during the Plague –– and many bodies were discarded in ditches or mass graves.</span></p><span data-dcnode-id="2755" instrument_node="">
</span><blockquote data-dcnode-id="2752"><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">“As our city sunk into this affliction and misery, the reverend authority of the law, both divine and human, sunk with it,” Boccaccio wrote, of Florence, in 1348.</span></p></blockquote><span data-dcnode-id="2751" instrument_node="">
</span><p data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">In the next decades, the Reformation and the Enlightenment took hold, which saw the decline of much of the authority of the Church. Then, the Victorians came along –– and death and grief because poignant parts of public culture and discourse.</span></p><span data-dcnode-id="2748" instrument_node="">
</span><h2 data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">The Victorian Era Made Grief &amp; Death Fashionable</span></h2><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">According to Chris Woodyard’s research, published in a 2014 book titled “The Victorian Book of the Dead (The Ghosts of the Past 4),” death was a frequent visitor during the Victorian era and people began planning for it while they were young.</span></p><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">As a result, dying was an open and ongoing conversation.</span></p><span data-dcnode-id="2739" instrument_node="">
</span><blockquote data-dcnode-id="2736"><p data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">As death approached, there was no ambiguity as to what the person wanted or what was expected of the family.</span></p></blockquote><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">The family knew in advance what type of coffin the dying wanted, where they wanted to be buried and what they wanted to wear. Women frequently made their own shrouds and would even include them in their wedding dowry.</span></p><span data-dcnode-id="2732" instrument_node="">
</span><p data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">The biggest fear at the time was being buried alive –– but there was no stigma around talking about or planning for death, that of those you love or your own.</span></p><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2724"><span data-dcnode-id="2728" instrument_node="">According to Marilyn Mendoza, Ph.D., in an article she wrote for </span><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/us/blog/understanding-grief/201812/death-and-mourning-practices-in-the-victorian-age"><span data-dcnode-id="2727" instrument_node="">Psychology Today</span></a><span data-dcnode-id="2725" instrument_node="">:</span></p><span data-dcnode-id="2723" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">“It was during this time that there was a flourishing of funeral-related businesses including coffin makers, embalmers, and gravediggers. It was also during this time that burials were moved to large parks in the country as the cities no longer had room to continue burying the dead near their homes.”</span></p><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">The mourning rituals for the Victorian era people were many –– often requiring dress codes and etiquette. However, there were two distinct periods of mourning known to the Victorian era:</span></p><span data-dcnode-id="2717" instrument_node="">
</span><ul data-dcnode-id="2709"><span data-dcnode-id="2716" instrument_node="">
</span><li data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">First mourning (or full mourning).</span></li><span data-dcnode-id="2713" instrument_node="">
</span><li data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Second mourning (or half mourning).</span></li><span data-dcnode-id="2710" instrument_node="">
</span></ul><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">The extent of each of these periods was based on the mourner’s relationship with the decreased. Wives, for instance, whose husbands had passed were often expected to be in full mourning for at least two years.</span></p><span data-dcnode-id="2705" instrument_node="">
</span><blockquote data-dcnode-id="2702"><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Then, there were no such commentary around “grieving for too long.” Etiquette would have prevented that, and grief was expected at the time to take quite a while.</span></p></blockquote><span data-dcnode-id="2701" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">In the second mourning, or half mourning, women were allowed to wear jewelry again. At this time, it was popular for women to wear jewelry made from or including the hair of the deceased. This is a trend thought to have started when Queen Victoria wore a locket of Prince Albert’s hair.</span></p><span data-dcnode-id="2698" instrument_node="">
</span><h2 data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">The Rise of Science: Families Exchange Priests for Doctors</span></h2><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Despite a heavy focus on dress and customs for those going through the grieving process, the Victorian era also saw lives saved. For the first time in history, many ailments that would have otherwise killed someone were cured –– by doctors.</span></p><span data-dcnode-id="2692" instrument_node="">
</span><blockquote data-dcnode-id="2689"><p data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">Over the decade, more and more families called in doctors and science in place of priests and religion in search of a fix. And with this shift came a focus on combating death, and even beating it.</span></p></blockquote><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Brandy Schillace writes in her 2015 book ‘Death’s Summer Coat: What the History of Death and Dying Teaches Us About Life and Living,’ that Westerners are “bent on living forever, but committed to the disposable nature of absolutely everything else.”</span></p><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">What happened to the West, how we lost loss, was we began to believe, to fight for, to think we could accomplish the impossible: the cure death.</span></p><span data-dcnode-id="2682" instrument_node="">
</span><h2 data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">A Western Obsession with Everlasting Life –– And What Happens to Us When Our Loved Ones Don’t Achieve It</span></h2><span data-dcnode-id="2679" instrument_node="">
</span><p data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">You see it everywhere now.</span></p><span data-dcnode-id="2676" instrument_node="">
</span><ul data-dcnode-id="2665"><span data-dcnode-id="2675" instrument_node="">
</span><li data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Anti-aging potions that reflect back to us our fear of aging, which is ultimately a fear of death.</span></li><span data-dcnode-id="2672" instrument_node="">
</span><li data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Medical interventions that keep us alive even when nothing else is functioning –– least of all the brain, from which consciousness and who we are resides.</span></li><span data-dcnode-id="2669" instrument_node="">
</span><li data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Our media, which relishes stories about our living longer and longer –– through fitness and medicine and whatever new innovation there is from cryogenics to frequency therapy.</span></li><span data-dcnode-id="2666" instrument_node="">
</span></ul><span data-dcnode-id="2664" instrument_node="">
</span><p data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">We are a culture obsessed with not dying, and we’ve then turned grief) the experience of someone we love dying) into a self-help experience, even mitigating it to the mental illness realm with terms like ‘complicated grief.’</span></p><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Certainly, some grief falls into a mental health crisis, but our lack of grief rituals and preparation for death is likely more to blame for our inability to mentally handle it.</span></p><span data-dcnode-id="2658" instrument_node="">
</span><p data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Many non-Western cultures have maintained their grief rituals and death ceremonies –– allowing for long-term grief, making death a part of life, and so much more.</span></p><span data-dcnode-id="2655" instrument_node="">
</span><p data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">In these cultures, those who are grieving are not stigmatized.</span></p><span data-dcnode-id="2652" instrument_node="">
</span><ul data-dcnode-id="2641"><span data-dcnode-id="2651" instrument_node="">
</span><li data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">They are not considered to be mentally ill.</span></li><span data-dcnode-id="2648" instrument_node="">
</span><li data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">They are honored and revered.</span></li><span data-dcnode-id="2645" instrument_node="">
</span><li data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">They are members of the community going through what everyone else in the community knows they will go through too: the expected experience of loss.</span></li><span data-dcnode-id="2642" instrument_node="">
</span></ul><span data-dcnode-id="2640" instrument_node="">
</span><h2 data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">The Most Fascinating Grief Rituals Around the World</span></h2><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Many cultures have special mourning clothes:</span></p><span data-dcnode-id="2634" instrument_node="">
</span><ul data-dcnode-id="2623"><span data-dcnode-id="2633" instrument_node="">
</span><li data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">In ancient Rome, mourners wore dark togas, and the practice of wearing dark (or sometimes white) clothes was common in Continental Europe in the Middle Ages and the Renaissance.</span></li><span data-dcnode-id="2630" instrument_node="">
</span><li data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Among Hindus, friends visit the house of the bereaved for twelve days and chant hymns to urge the soul on to the next world.</span></li><span data-dcnode-id="2627" instrument_node="">
</span><li data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">In the Jewish shivah, a mourner sat on a low chair and chose whether to acknowledge visitors; those mourning their parents may recite the Kaddish for eleven months, supported by a minyan of fellow-worshippers.</span></li><span data-dcnode-id="2624" instrument_node="">
</span></ul><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Here are some of the more fascinating grief rituals around the world, how their community members view them, what these rituals and death ceremonies teach the subconscious about life and death, and maybe even what those in the West (myself included) can learn about something we cannot change: everyone we love will die, including ourselves.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><h3 data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">The Native American Lakota Grief Ritual &amp; Rites Ceremony.</span></h3><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2615" instrument_node="">In many Native American tribes and cultures, the dead are not considered to have “passed away.” They instead “walk on,” implying the continuation of a journey rather than an end point. During the time of mourning grief is expressed through crying, singing, wailing, </span><a data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/us/basics/self-harm"><span data-dcnode-id="2614" instrument_node="">cutting</span></a><span data-dcnode-id="2612" instrument_node=""> of hair and cutting one’s body –– as well as Seven Sacred Ceremonies of the Pipe.</span></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2606"><span data-dcnode-id="2609" instrument_node="">According to the </span><a data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//aktalakota.stjo.org/site/News2%3Fpage%3DNewsArticle%26id%3D8667"><span data-dcnode-id="2608" instrument_node="">Akta Lakota Museum Cultural Center</span></a></p><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">“A lock of hair from a departed person was taken and held over a piece of burning sweetgrass to purify it … Then it was wrapped in a piece of sacred buckskin and the Sacred Pipe was smoked. … The buckskin bundle, called the soul bundle, was kept in a special place in the tipi of the soul’s keeper, usually a relative.”</span></p><span data-dcnode-id="2602" instrument_node="">
</span><blockquote data-dcnode-id="2599"><p data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">“The Keeper of the Soul vowed to live a harmonious life until the soul could be released, usually about one year.”</span></p></blockquote><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">“The bundle containing the soul was carried outside and as soon as it reached the air, the soul was released. … If she judged it worthy, she sent the soul to the right … to Wakan Tanka. Unworthy souls were sent to the left where they remained until they finally could become purified and join Wakan Tanka.”</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Funeral ceremonies for the Lakota people are generally two days long and quite intense. It begins the community gathering in a space, these days an auditorium at a local high school. The deceased’s family then feed everyone. Children sleep in sleeping bags, while adults stay up all night exchanging stories.</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2591" instrument_node="">From one attendee at a</span><a data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/us/blog/understanding-grief/201710/death-and-bereavement-among-the-lakota"><span data-dcnode-id="2590" instrument_node=""> 2012 ceremony</span></a><span data-dcnode-id="2588" instrument_node="">:</span></p><span data-dcnode-id="2586" instrument_node="">
</span><blockquote data-dcnode-id="2580"><p data-dcnode-id="2581"><span data-dcnode-id="2585" instrument_node="">“There was a ‘giveaway’ in which people were encouraged to take one of the deceased possessions because among traditional Lakota, </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/us/basics/altruism"><span data-dcnode-id="2584" instrument_node="">generosity</span></a><span data-dcnode-id="2582" instrument_node=""> is more important than possession.””</span></p></blockquote><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">“At sunrise the next morning, everyone travelled up to Eagle Nest Butte to scatter his remains. High places are considered sacred sites because they are closer to the spirits. Those who have walked on often have their bodies or ashes buried in high places.”</span></p><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Jack Kornfield, the Buddhist practitioner, has stated that:</span></p><span data-dcnode-id="2573" instrument_node="">
</span><p data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">“Lakota grief was something to be valued. It brought a person closer to God. For when a person has suffered great loss and was grieving, they were considered ‘the most holy.’ Their prayers were believed to be especially powerful and others would ask the grievers to pray on their behalf.”</span></p><span data-dcnode-id="2570" instrument_node="">
</span><h3 data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">El Dia de los Muertos as a Grief Ritual.</span></h3><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">If you’ve watched the Pixar film Coco, then you are likely just as enamored by the Day of the Dead tradition as anyone else.</span></p><span data-dcnode-id="2564" instrument_node="">
</span><p data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">It is a beautiful, annual grief ritual in which family members and friends who have passed are honored, stories are swapped about them, and the families do everything they can to prevent the second death: that is, when you are forgotten by the living.</span></p><span data-dcnode-id="2561" instrument_node="">
</span><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Dios de los Muertos begins with families making colorful altars in their homes in honor of their deceased loved ones. The altars are decorated with flowers, candles, their loved one’s favorite food and pan de muerto (a slightly sweet bread specifically made for this time). The festivities continue in the cemetery, where families bring picnics, play music and sometimes even spend the night as a way to celebrate the lives of those who are no longer on this earth.</span></p><span data-dcnode-id="2558" instrument_node="">
</span><blockquote data-dcnode-id="2555"><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">The tradition dates back 3,000 years, during the time of the Aztecs. It survived through the 16th century, when the Spanish arrived to central Mexico and thought the tradition to be sacrilegious.</span></p></blockquote><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Instead of it being abolished, however, the celebration evolved to incorporate elements of Christianity, such as celebrating it on November 1 and 2 instead of on its original summer observance to coincide with All Saints’ or All Souls’ Day, a time to pray for departed souls.</span></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2550" instrument_node="">“It was really a beautiful experience…It’s a very personal thing,” he said. “I remember looking at the altar and putting coffee there, because my dad loved coffee. My mom said, ‘No, he would never like it like that — and she took it away and made it piping hot with a little sugar, and the experience created a conversation between us,” said Juan Castaño, co-founder of</span><a data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//calpullidance.org/"><span data-dcnode-id="2549" instrument_node=""> Calpulli Mexican Dance Company</span></a><span data-dcnode-id="2547" instrument_node="">. “Dia de Muertos is very powerful, because you feel peace and a beautiful experience remembering someone and celebrating what they did and who they were.”</span></p><span data-dcnode-id="2545" instrument_node="">
</span><h3 data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Japanese Shinto Periods of Mourning.</span></h3><span data-dcnode-id="2542" instrument_node="">
</span><p data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Japanese death ceremonies and grief rituals follow the traditions and mentalities of two religions: Buddhism and Shinto, respectively. Nine out of ten Japanese funerals are conducted as a blend of Buddhist and Shinto traditions, a practice that both religions would see as complementary. Most homes maintain a Buddhist altar and a Shinto shrine.</span></p><span data-dcnode-id="2539" instrument_node="">
</span><p data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">When death occurs, the altar and shrine are closed and covered to keep the spirits of the dead out. A small table, decorated with simple flowers, incense and a candle is placed next to the bed of the deceased.</span></p><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2531"><span data-dcnode-id="2535" instrument_node="">And then, there are 20 steps the </span><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.econdolence.com/learn/articles/shinto-funeral-burial/"><span data-dcnode-id="2534" instrument_node="">Japanese follow</span></a><span data-dcnode-id="2532" instrument_node="">:</span></p><span data-dcnode-id="2530" instrument_node="">
</span><ol data-dcnode-id="2468"><span data-dcnode-id="2529" instrument_node="">
</span><li data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">“matsugo no mizu,” the washing of the lips. A close relative wets the lips of the deceased, giving the body its last taste of water. This is to be performed as close to the time of death as is possible.</span></li><span data-dcnode-id="2526" instrument_node="">
</span><li data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">The “yukan,” the washing of the corpse. Several family members may be involved in this practical and ceremonial washing.</span></li><span data-dcnode-id="2523" instrument_node="">
</span><li data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">“kiyu hokoku,” the announcement of the death. The family announces the death to the spirit world through prayer and memorialization at the family shrine.</span></li><span data-dcnode-id="2520" instrument_node="">
</span><li data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">“Makura naoshi no gi.” The phrase means “pillow decorations” and the ritual involves placing the deceased in such a way that the head is propped up on a pillow, facing north. Offerings of food are to be made to the gods at this time. A sword or knife is placed by the side of the deceased.</span></li><span data-dcnode-id="2517" instrument_node="">
</span><li data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">“nokan no gi,” the placement of the dead body of the deceased in a coffin.</span></li><span data-dcnode-id="2514" instrument_node="">
</span><li data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">“kyuzen nikku,” or daily food offerings to the deceased. These food offerings are to be made twice a day until the body is given its final resting place. Traditionally the favorite meals of the deceased are prepared.</span></li><span data-dcnode-id="2511" instrument_node="">
</span><li data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">“ubusuna jinja ni kiyu hokokuh,” the announcement of the return of the spirit to the local shrine.</span></li><span data-dcnode-id="2508" instrument_node="">
</span><li data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">“bosho batsujo no gi,” the earth purification ceremony. The priests from the local shrine will purify the ground to be used for the grave site with water and prayer.</span></li><span data-dcnode-id="2505" instrument_node="">
</span><li data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">“kessai,” when the priest purifies himself in preparation for the funeral. This normally occurs through ceremonial washings and prayer.</span></li><span data-dcnode-id="2502" instrument_node="">
</span><li data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">“Tsuya sai,” this is considered the wake. Mourners gather to express condolences to the family and present their offerings to the gods, the shrine and sometimes, the family.</span></li><span data-dcnode-id="2499" instrument_node="">
</span><li data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">“senrei sai,” which means the transfer of the spirit. The priest transfers the deceased’s spirit from the body into a wooden tablet. The tablet is held over the body of the deceased while the priest offers ceremonial prayers.</span></li><span data-dcnode-id="2496" instrument_node="">
</span><li data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">“settai”, which is a word for refreshments. Food that has been prepared at a different location to prevent the contamination of death is served to the mourners. This food may be anything from a light snack to a substantial meal.</span></li><span data-dcnode-id="2493" instrument_node="">
</span><li data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">“shinsosai,” the funeral service. The room where the funeral will be held is purified, prayers and offerings are made to the gods, and eulogies honoring the deceased are given by the priests.</span></li><span data-dcnode-id="2490" instrument_node="">
</span><li data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">“kokobetsu shiki,” the farewell ceremony. Mourners leave the funeral by walking, single file, past the deceased. The mourner is to say final goodbyes to the deceased, and offer prayers and word condolences to the family.</span></li><span data-dcnode-id="2487" instrument_node="">
</span><li data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">“Hakkyu sai no gi” is the departure of the coffin. The coffin is prepared for travel to the grave site. A sword is placed on the coffin and banners are placed around it so that the deceased becomes aware that it is time to move on.</span></li><span data-dcnode-id="2484" instrument_node="">
</span><li data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">“soretsu,” is the funeral procession that transports the coffin to the cemetery or crematorium.</span></li><span data-dcnode-id="2481" instrument_node="">
</span><li data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">“hakkyu-go batsujo nogi,” the home where the funeral ceremony has taken place is purified. In addition, the funeral altar is removed and a new altar is set up inside the house.</span></li><span data-dcnode-id="2478" instrument_node="">
</span><li data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">“Maisosai,” is the offering of burial rites. Family and close friends will gather at either the grave site or crematorium with the body. Offerings are made on behalf of the deceased and are placed with the coffin. Prayers are led by the priests.</span></li><span data-dcnode-id="2475" instrument_node="">
</span><li data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">“kotsuage,” means the picking up of the bones. Bones are removed from the crematorium ash and are placed in a vase.</span></li><span data-dcnode-id="2472" instrument_node="">
</span><li data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">“kika sai” and means coming home. Ashes that are not buried are brought to the home and placed in the family shrine. The bereaved offers thanks to the people who have participated in the funeral. Prayers and offerings are given on behalf of the deceased.</span></li><span data-dcnode-id="2469" instrument_node="">
</span></ol><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">The family of the deceased will then be in a period of mourning for 49 days. Once a week they will visit the grave to place fresh flowers and to burn incense.</span></p><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">On the 3rd, 7th and 49th days, they will have a short memorial service at the site, led by the Shinto priest. During these 49 days, the family cannot participate in any form of celebration or entertainment.</span></p><span data-dcnode-id="2461" instrument_node="">
</span><h3 data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Tibetan Death Ceremonies &amp; Sky Burial.</span></h3><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Many Vajrayana Buddhists in Mongolia and Tibet believe in the transmigration of spirits after death — that the soul moves on, while the body becomes an empty vessel.</span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">To return it to the earth, the body is chopped into pieces and placed on a mountaintop, which exposes it to the elements — including vultures.</span></p><span data-dcnode-id="2452" instrument_node="">
</span><blockquote data-dcnode-id="2449"><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">It’s a practice that’s been done for thousands of years and, according to a recent report, about 80% of Tibetans still choose it.</span></p></blockquote><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">“In fact, burials are not that important after human beings’ death, and we Tibetans prefer sky burial because it contains Tibetans’ compassion and belief. I would certainly choose sky burial after my death, though I am not a Buddhist believer,” said Zhaxi Toinzhub, a young Tibetan in his 20s.</span></p><span data-dcnode-id="2445" instrument_node="">
</span><h3 data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Balinese Cremation &amp; Life Celebration.</span></h3><span data-dcnode-id="2442" instrument_node="">
</span><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">“Strange as it seems, it is in their cremation ceremonies that the Balinese have their greatest fun,” Miguel Covarrubias wrote in the 1937 book, Island of Bali. “A cremation is an occasion for gaiety and not for mourning, since it represents the accomplishment of their most sacred duty” to liberate the souls of the dead, he wrote.</span></p><span data-dcnode-id="2439" instrument_node="">
</span><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">In 2008, the island saw one of its most lavish cremations ever as Agung Suyasa, head of the royal family, was burned along with 68 commoners.</span></p><span data-dcnode-id="2436" instrument_node="">
</span><blockquote data-dcnode-id="2433"><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Thousands of volunteers gathered to carry a giant bamboo platform (similar to a funeral pyre), an enormous wooden bull and wooden dragon.</span></p></blockquote><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">After a long procession, Suyasa’s body was eventually placed inside the bull and burned as the dragon stood witness. In the Balinese tradition, cremation releases the soul so it is free to inhabit a new body — and doing this is considered a sacred duty.</span></p><span data-dcnode-id="2429" instrument_node="">
</span><h3 data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Filipino Death Traditions &amp; Grief Rituals.</span></h3><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Many ethnic groups in the Philippines have unique funeral practices.</span></p><span data-dcnode-id="2423" instrument_node="">
</span><ul data-dcnode-id="2409"><span data-dcnode-id="2422" instrument_node="">
</span><li data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">The Benguet of Northwestern Philippines blindfold their dead and place them next to the main entrance of the house</span></li><span data-dcnode-id="2419" instrument_node="">
</span><li data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Their Tinguian neighbors dress bodies in their best clothes, sit them on a chair and place a lit cigarette in their lips.</span></li><span data-dcnode-id="2416" instrument_node="">
</span><li data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">The Caviteño, who live near Manila, bury their dead in a hollowed-out tree trunk. When someone becomes ill, they select the tree where they will eventually be entombed.</span></li><span data-dcnode-id="2413" instrument_node="">
</span><li data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Meanwhile, the Apayo, who live in the north, bury their dead under the kitchen.</span></li><span data-dcnode-id="2410" instrument_node="">
</span></ul><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">In general, when someone passes, there is a 3 to 9 day wake at their home. During that time, they are placed in a casket and the room is decorated to how you might expect to see it at a North American funeral. The casket remains closed, though, and there is a picture of person placed on top.</span></p><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Candles are then lit, which must stay lit for 40 days. This comes from Roman Catholic religious beliefs, and corresponds to the in the ascension and resurrection of Jesus Christ. The 40th day is said to be the last day the spirit of the deceased wanders on earth.</span></p><span data-dcnode-id="2402" instrument_node="">
</span><blockquote data-dcnode-id="2399"><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">During the wake, the deceased must never be left alone. Someone must sleep in the room with them at night and someone must be in the room at all times.</span></p></blockquote><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">There is a nightly prayer said around 7:30 p.m. to help ward off evil, which is said to come for the deceased at around 8 p.m. The prayer ends after this time.</span></p><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">All the while this is happening inside, there are chairs set up outside the home for friends and family together and mourn and share stories at any time of the day or night.</span></p><span data-dcnode-id="2392" instrument_node="">
</span><h2 data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Conclusion</span></h2><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2384"><span data-dcnode-id="2388" instrument_node="">While our death ceremonies and grief rituals have changed –– our grief itself has not. Humans have always looked for ways to keep those they love close to them and honor their lives. Through memento moris and hair as jewelry, to memorial diamonds and memorial beads (</span><a data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theweek.com/articles/478701/turning-dead-into-beads-south-koreas-odd-new-trend"><span data-dcnode-id="2387" instrument_node="">as popular in South Korea</span></a><span data-dcnode-id="2385" instrument_node="">), we all must face the reality of the death of those we love and ourselves.</span></p><span data-dcnode-id="2383" instrument_node="">
</span><blockquote data-dcnode-id="2380"><p data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">How we decide to do that is up to us –– though research is showing that the sooner you prepare, the better it is for you and everyone you love.</span></p></blockquote><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Death rituals are incredibly helpful for giving us a feeling of increased sense of control over a situation in which we have none at all. And for many, that feeling helps us give meaning to some of the most difficult, but most natural, events in our lives.</span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Whether you follow any traditional death ritual, or a personal ritual, is up to you. In the U.S., for instance, there is a rise in green burial –– which is a newer and often loved death tradition.</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Both the traditional and the personal rituals can be incredibly cathartic, and helpful.</span></p><span data-dcnode-id="2370" instrument_node="">

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="88" tabindex="0"><span data-dcnode-id="268" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="267"></div><span data-dcnode-id="266" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="90" role="dialog"><span data-dcnode-id="265" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="261" role="button" tabindex="0"><span data-dcnode-id="264" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="263"></i><span data-dcnode-id="262" instrument_node=""> </span></span><span data-dcnode-id="260" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="92"><span data-dcnode-id="259" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="94"><strong class="acsb-title-main" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Compliance status</span></strong><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="239" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="233" instrument_node="">
</span><ol data-dcnode-id="207"><span data-dcnode-id="232" instrument_node="">
</span><li data-dcnode-id="220"><strong class="acsb-title" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="229" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="228"><br data-dcnode-id="227"><span data-dcnode-id="226" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="225"><br data-dcnode-id="224"><span data-dcnode-id="223" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="222"><br data-dcnode-id="221"></li><span data-dcnode-id="219" instrument_node="">
</span><li data-dcnode-id="209"><strong class="acsb-title" data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="216" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="215"><br data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="212"><br data-dcnode-id="211"><span data-dcnode-id="210" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="208" instrument_node="">
</span></ol><span data-dcnode-id="206" instrument_node="">
</span><strong data-dcnode-id="203" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="204" lang="EN-US"><span data-dcnode-id="205" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="202" instrument_node="">
</span><ul data-dcnode-id="170"><span data-dcnode-id="201" instrument_node="">
</span><li data-dcnode-id="197"><strong class="acsb-title" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="198" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="196" instrument_node="">
</span><li data-dcnode-id="192"><strong class="acsb-title" data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="193" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="191" instrument_node="">
</span><li data-dcnode-id="187"><strong class="acsb-title" data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="188" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="186" instrument_node="">
</span><li data-dcnode-id="182"><strong class="acsb-title" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="183" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="181" instrument_node="">
</span><li data-dcnode-id="177"><strong class="acsb-title" data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="178" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="176" instrument_node="">
</span><li data-dcnode-id="172"><strong class="acsb-title" data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="173" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="171" instrument_node="">
</span></ul><span data-dcnode-id="169" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="166"><span data-dcnode-id="167" lang="EN-US"><span data-dcnode-id="168" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="165" instrument_node="">
</span><ol data-dcnode-id="107"><span data-dcnode-id="164" instrument_node="">
</span><li data-dcnode-id="157"><strong class="acsb-title" data-dcnode-id="160"><span data-dcnode-id="162" lang="EN-US"><span data-dcnode-id="163" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="161" instrument_node="">–</span></strong><span data-dcnode-id="158" lang="EN-US"><span data-dcnode-id="159" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="156" instrument_node="">
</span><li data-dcnode-id="149"><span data-dcnode-id="152" lang="EN-US"><strong class="acsb-title" data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="153" instrument_node="">&nbsp;</span></span><span data-dcnode-id="150" lang="EN-US"><span data-dcnode-id="151" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="148" instrument_node="">
</span><li data-dcnode-id="142"><span data-dcnode-id="144" lang="EN-US"><strong class="acsb-title" data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">Animations –</span></strong><span data-dcnode-id="145" instrument_node="">&nbsp;</span></span><span data-dcnode-id="143" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="141" instrument_node="">
</span><li data-dcnode-id="134"><span data-dcnode-id="137" lang="EN-US"><strong class="acsb-title" data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="138" instrument_node="">&nbsp;</span></span><span data-dcnode-id="135" lang="EN-US"><span data-dcnode-id="136" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="133" instrument_node="">
</span><li data-dcnode-id="126"><span data-dcnode-id="129" lang="EN-US"><strong class="acsb-title" data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="130" instrument_node="">&nbsp;</span></span><span data-dcnode-id="127" lang="EN-US"><span data-dcnode-id="128" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="125" instrument_node="">
</span><li data-dcnode-id="118"><span data-dcnode-id="121" lang="EN-US"><strong class="acsb-title" data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="122" instrument_node="">&nbsp;</span></span><span data-dcnode-id="119" lang="EN-US"><span data-dcnode-id="120" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="117" instrument_node="">
</span><li data-dcnode-id="109"><strong class="acsb-title" data-dcnode-id="114"><span data-dcnode-id="115" lang="EN-US"><span data-dcnode-id="116" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="110" lang="EN-US"><strong class="acsb-title" data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">–</span></strong><span data-dcnode-id="111" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="108" instrument_node="">
</span></ol><span data-dcnode-id="106" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="104"><span data-dcnode-id="105" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="103" instrument_node="">
</span><p data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="100" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="97" instrument_node="">
</span><p data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="93" instrument_node=""> </span></div><span data-dcnode-id="91" instrument_node=""> </span></div><span data-dcnode-id="89" instrument_node="">
