</span><table data-dcnode-id="4226" id="simple_table"><tbody data-dcnode-id="4227"><tr data-dcnode-id="4283"><th data-dcnode-id="4285"><span data-dcnode-id="4286" style="font-size: medium;"><span data-dcnode-id="4287" style="font-family: Baskervville;"><span data-dcnode-id="4288" instrument_node="">Table Of Contents</span></span></span></th></tr><tr data-dcnode-id="4274"><td data-dcnode-id="4276"><span data-dcnode-id="4277" style="font-size: medium;"><span data-dcnode-id="4278" style="font-family: Baskervville;"><a data-dcnode-id="4279" href="#AcadRituals1"><span data-dcnode-id="4280" instrument_node="">Beginnings in the Middle Ages</span></a></span></span></td></tr><tr data-dcnode-id="4265"><td data-dcnode-id="4267"><span data-dcnode-id="4268" style="font-size: medium;"><span data-dcnode-id="4269" style="font-family: Baskervville;"><a data-dcnode-id="4270" href="#AcadRituals2"><span data-dcnode-id="4271" instrument_node="">Rituals of Passage </span></a></span></span></td></tr><tr data-dcnode-id="4256"><td data-dcnode-id="4258"><span data-dcnode-id="4259" style="font-size: medium;"><span data-dcnode-id="4260" style="font-family: Baskervville;"><a data-dcnode-id="4261" href="#AcadRituals3"><span data-dcnode-id="4262" instrument_node="">Commencement</span></a></span></span></td></tr><tr data-dcnode-id="4247"><td data-dcnode-id="4249"><span data-dcnode-id="4250" style="font-size: medium;"><span data-dcnode-id="4251" style="font-family: Baskervville;"><a data-dcnode-id="4252" href="#AcadRituals4"><span data-dcnode-id="4253" instrument_node="">Inversion and paradox</span></a></span></span></td></tr><tr data-dcnode-id="4238"><td data-dcnode-id="4240"><span data-dcnode-id="4241" style="font-size: medium;"><span data-dcnode-id="4242" style="font-family: Baskervville;"><a data-dcnode-id="4243" href="#AcadRituals5"><span data-dcnode-id="4244" instrument_node="">Changes as Time Passes</span></a></span></span></td></tr><tr data-dcnode-id="4229"><td data-dcnode-id="4231"><span data-dcnode-id="4232" style="font-size: medium;"><span data-dcnode-id="4233" style="font-family: Baskervville;"><a data-dcnode-id="4234" href="#AcadRitual6"><span data-dcnode-id="4235" instrument_node="">References</span></a></span></span></td></tr></tbody></table><h2 data-dcnode-id="4221" style="text-align: left;"><span data-dcnode-id="4222" style="font-size: medium;"><span data-dcnode-id="4223" style="font-family: Baskervville;"><span data-dcnode-id="4224" style="color: red;"><span data-dcnode-id="4225" instrument_node="">The bulk of academic rituals deal with rites of passage as students are indoctrinated into, progress through, and finally finish the educational process, since the university's entire essence is one of transition and initiation. </span></span></span></span></h2><p data-dcnode-id="4217"><span data-dcnode-id="4218" style="font-size: medium;"><span data-dcnode-id="4219" style="font-family: Baskervville;"><br data-dcnode-id="4220"></span></span></p><p data-dcnode-id="4213"><span data-dcnode-id="4214" style="font-size: medium;"><span data-dcnode-id="4215" style="font-family: Baskervville;"><br data-dcnode-id="4216"></span></span></p><ul data-dcnode-id="4207" style="text-align: left;"><li data-dcnode-id="4208"><span data-dcnode-id="4209" style="font-size: medium;"><span data-dcnode-id="4210" style="font-family: Baskervville;"><span data-dcnode-id="4212" instrument_node="">Higher education rituals vary from recognizable and formal graduation ceremonies to a broad array of unique rituals of particular institutions and student populations within this transitory stage.&nbsp; </span><br data-dcnode-id="4211"></span></span></li></ul><ul data-dcnode-id="4201" style="text-align: left;"><li data-dcnode-id="4202"><span data-dcnode-id="4203" style="font-size: medium;"><span data-dcnode-id="4204" style="font-family: Baskervville;"><b data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">Most academic rituals serve to amplify and alleviate the anxiety of the educational process, to impress upon participants the importance of committing to the institution's ideals, and to remind the community, year after year, of the university's unique nature and relationship to the rest of the world. </span></b></span></span></li></ul><p data-dcnode-id="4197"><span data-dcnode-id="4198" style="font-size: medium;"><span data-dcnode-id="4199" style="font-family: Baskervville;"><br data-dcnode-id="4200"></span></span></p><p data-dcnode-id="4193"><span data-dcnode-id="4194" style="font-size: medium;"><span data-dcnode-id="4195" style="font-family: Baskervville;"><br data-dcnode-id="4196"></span></span></p><p data-dcnode-id="4189"><span data-dcnode-id="4190" style="font-size: medium;"><span data-dcnode-id="4191" style="font-family: Baskervville;"><br data-dcnode-id="4192"></span></span></p><p data-dcnode-id="4185"><span data-dcnode-id="4186" style="font-size: medium;"><span data-dcnode-id="4187" style="font-family: Baskervville;"><br data-dcnode-id="4188"></span></span></p><h2 data-dcnode-id="4180" id="AcadRituals1" style="text-align: left;"><span data-dcnode-id="4181" style="font-size: medium;"><span data-dcnode-id="4182" style="font-family: Baskervville;"><span data-dcnode-id="4183" style="color: red;"><span data-dcnode-id="4184" instrument_node="">Beginnings in the Middle Ages. </span></span></span></span></h2><p data-dcnode-id="4176"><span data-dcnode-id="4177" style="font-size: medium;"><span data-dcnode-id="4178" style="font-family: Baskervville;"><span data-dcnode-id="4179" instrument_node="">&nbsp;</span></span></span></p><p data-dcnode-id="4172"><span data-dcnode-id="4173" style="font-size: medium;"><span data-dcnode-id="4174" style="font-family: Baskervville;"><span data-dcnode-id="4175" instrument_node="">&nbsp;</span></span></span></p><h3 data-dcnode-id="4168" style="text-align: left;"><span data-dcnode-id="4169" style="font-size: medium;"><span data-dcnode-id="4170" style="font-family: Baskervville;"><span data-dcnode-id="4171" instrument_node="">Almost every distinctive feature of today's academic ceremonies can be traced back to the twelfth and thirteenth centuries, when colleges were initially established. </span></span></span></h3><p data-dcnode-id="4164" style="text-align: left;"><span data-dcnode-id="4165" style="font-size: medium;"><span data-dcnode-id="4166" style="font-family: Baskervville;"><br data-dcnode-id="4167"></span></span></p><ul data-dcnode-id="4158" style="text-align: left;"><li data-dcnode-id="4159"><span data-dcnode-id="4160" style="font-size: medium;"><span data-dcnode-id="4161" style="font-family: Baskervville;"><span data-dcnode-id="4163" instrument_node="">Early universities were self-governing communities of academics with the power to issue degrees and the responsibility to maintain a safe environment for its members.&nbsp; </span><br data-dcnode-id="4162"></span></span></li></ul><ul data-dcnode-id="4152" style="text-align: left;"><li data-dcnode-id="4153"><span data-dcnode-id="4154" style="font-size: medium;"><span data-dcnode-id="4155" style="font-family: Baskervville;"><span data-dcnode-id="4157" instrument_node="">University administration had to cope with a rebellious and young student body, an autonomous faculty with a wide range of interests, and a surrounding community that was often at odds with the university's ideals and objectives.&nbsp; </span><br data-dcnode-id="4156"></span></span></li></ul><ul data-dcnode-id="4147" style="text-align: left;"><li data-dcnode-id="4148"><span data-dcnode-id="4149" style="font-size: medium;"><span data-dcnode-id="4150" style="font-family: Baskervville;"><span data-dcnode-id="4151" instrument_node="">Demonstrations of authority and magnificent symbols of office were often required to ward off claims to the university's rights and powers in such an environment. </span></span></span></li></ul><p data-dcnode-id="4143" style="text-align: left;"><span data-dcnode-id="4144" style="font-size: medium;"><span data-dcnode-id="4145" style="font-family: Baskervville;"><br data-dcnode-id="4146"></span></span></p><p data-dcnode-id="4139" style="text-align: left;"><span data-dcnode-id="4140" style="font-size: medium;"><span data-dcnode-id="4141" style="font-family: Baskervville;"><br data-dcnode-id="4142"></span></span></p><p data-dcnode-id="4135" style="text-align: left;"><span data-dcnode-id="4136" style="font-size: medium;"><span data-dcnode-id="4137" style="font-family: Baskervville;"><br data-dcnode-id="4138"></span></span></p><h3 data-dcnode-id="4131" style="text-align: left;"><span data-dcnode-id="4132" style="font-size: medium;"><span data-dcnode-id="4133" style="font-family: Baskervville;"><span data-dcnode-id="4134" instrument_node="">Dramatic group rituals enforced periodic order and served to remind members and the larger community of the university's nature and mission. </span></span></span></h3><p data-dcnode-id="4127" style="text-align: left;"><span data-dcnode-id="4128" style="font-size: medium;"><span data-dcnode-id="4129" style="font-family: Baskervville;"><br data-dcnode-id="4130"></span></span></p><ul data-dcnode-id="4121" style="text-align: left;"><li data-dcnode-id="4122"><span data-dcnode-id="4123" style="font-size: medium;"><span data-dcnode-id="4124" style="font-family: Baskervville;"><span data-dcnode-id="4126" instrument_node="">The robes, hoods, and headgear worn by professors and graduates at contemporary American academic ceremonies are modeled after what was formerly customary attire for academics in northern Europe.&nbsp; </span><br data-dcnode-id="4125"></span></span></li></ul><ul data-dcnode-id="4115" style="text-align: left;"><li data-dcnode-id="4116"><span data-dcnode-id="4117" style="font-size: medium;"><span data-dcnode-id="4118" style="font-family: Baskervville;"><span data-dcnode-id="4120" instrument_node="">Most medieval academics were obliged to take at least minor vows to the church, thus their attire was dictated by their clerical order's rules, which often consisted of a black gown with a cowl or hood.&nbsp; </span><br data-dcnode-id="4119"></span></span></li></ul><ul data-dcnode-id="4109" style="text-align: left;"><li data-dcnode-id="4110"><span data-dcnode-id="4111" style="font-size: medium;"><span data-dcnode-id="4112" style="font-family: Baskervville;"><span data-dcnode-id="4114" instrument_node="">Scholars acquired the Tudor robe, which was worn over regular clothes, and the biretta cap, from which the mortarboard developed, throughout the sixteenth century.&nbsp; </span><br data-dcnode-id="4113"></span></span></li></ul><ul data-dcnode-id="4103" style="text-align: left;"><li data-dcnode-id="4104"><span data-dcnode-id="4105" style="font-size: medium;"><span data-dcnode-id="4106" style="font-family: Baskervville;"><span data-dcnode-id="4108" instrument_node="">The current gown, hood, mortarboard, and even the tassel take their design cues from those worn at Cambridge and Oxford from the fifteenth century.&nbsp; </span><br data-dcnode-id="4107"></span></span></li></ul><ul data-dcnode-id="4098" style="text-align: left;"><li data-dcnode-id="4099"><span data-dcnode-id="4100" style="font-size: medium;"><span data-dcnode-id="4101" style="font-family: Baskervville;"><span data-dcnode-id="4102" instrument_node="">Originally a clerical cowl, the multicolored hood is now used to indicate an individual's degree, area of study, and academic institution. </span></span></span></li></ul><p data-dcnode-id="4094"><span data-dcnode-id="4095" style="font-size: medium;"><span data-dcnode-id="4096" style="font-family: Baskervville;"><br data-dcnode-id="4097"></span></span></p><p data-dcnode-id="4090"><span data-dcnode-id="4091" style="font-size: medium;"><span data-dcnode-id="4092" style="font-family: Baskervville;"><br data-dcnode-id="4093"></span></span></p><p data-dcnode-id="4086"><span data-dcnode-id="4087" style="font-size: medium;"><span data-dcnode-id="4088" style="font-family: Baskervville;"><br data-dcnode-id="4089"></span></span></p><h3 data-dcnode-id="4082" style="text-align: left;"><span data-dcnode-id="4083" style="font-size: medium;"><span data-dcnode-id="4084" style="font-family: Baskervville;"><span data-dcnode-id="4085" instrument_node="">Symbols of office, such as charters, gavels, seals, medals, chains, flags, and ceremonial maces, were first bestowed to colleges by secular and religious authorities to show official support. </span></span></span></h3><p data-dcnode-id="4078" style="text-align: left;"><span data-dcnode-id="4079" style="font-size: medium;"><span data-dcnode-id="4080" style="font-family: Baskervville;"><br data-dcnode-id="4081"></span></span></p><ul data-dcnode-id="4072" style="text-align: left;"><li data-dcnode-id="4073"><span data-dcnode-id="4074" style="font-size: medium;"><span data-dcnode-id="4075" style="font-family: Baskervville;"><span data-dcnode-id="4077" instrument_node="">They, like other medieval relics like the parchment diploma, titles of office, dramatis personae, and the college system, are inextricably linked to academic ceremony.&nbsp; </span><br data-dcnode-id="4076"></span></span></li></ul><ul data-dcnode-id="4066" style="text-align: left;"><li data-dcnode-id="4067"><span data-dcnode-id="4068" style="font-size: medium;"><span data-dcnode-id="4069" style="font-family: Baskervville;"><span data-dcnode-id="4071" instrument_node="">Because many contemporary colleges imitate Gothic architecture, even the ceremonial setting is often medieval.&nbsp; </span><br data-dcnode-id="4070"></span></span></li></ul><ul data-dcnode-id="4061" style="text-align: left;"><li data-dcnode-id="4062"><span data-dcnode-id="4063" style="font-size: medium;"><span data-dcnode-id="4064" style="font-family: Baskervville;"><span data-dcnode-id="4065" instrument_node="">The desire to bring the university world into focus and declare its purpose in a spectacular manner persists, and the legacies of early institutions remain part of the pageantry of academic life even after centuries of profound change.&nbsp;</span></span></span></li></ul><p data-dcnode-id="4057"><span data-dcnode-id="4058" style="font-size: medium;"><span data-dcnode-id="4059" style="font-family: Baskervville;"><br data-dcnode-id="4060"></span></span></p><p data-dcnode-id="4053"><span data-dcnode-id="4054" style="font-size: medium;"><span data-dcnode-id="4055" style="font-family: Baskervville;"><br data-dcnode-id="4056"></span></span></p><p data-dcnode-id="4049"><span data-dcnode-id="4050" style="font-size: medium;"><span data-dcnode-id="4051" style="font-family: Baskervville;"><br data-dcnode-id="4052"></span></span></p><p data-dcnode-id="4045"><span data-dcnode-id="4046" style="font-size: medium;"><span data-dcnode-id="4047" style="font-family: Baskervville;"><br data-dcnode-id="4048"></span></span></p><h2 data-dcnode-id="4040" id="AcadRituals2" style="text-align: left;"><span data-dcnode-id="4041" style="font-size: medium;"><span data-dcnode-id="4042" style="font-family: Baskervville;"><span data-dcnode-id="4043" style="color: red;"><span data-dcnode-id="4044" instrument_node="">Rituals of Passage&nbsp;</span></span></span></span></h2><p data-dcnode-id="4036"><span data-dcnode-id="4037" style="font-size: medium;"><span data-dcnode-id="4038" style="font-family: Baskervville;"><span data-dcnode-id="4039" instrument_node="">&nbsp;</span></span></span></p><p data-dcnode-id="4032"><span data-dcnode-id="4033" style="font-size: medium;"><span data-dcnode-id="4034" style="font-family: Baskervville;"><span data-dcnode-id="4035" instrument_node="">&nbsp;</span></span></span></p><h3 data-dcnode-id="4028" style="text-align: left;"><span data-dcnode-id="4029" style="font-size: medium;"><span data-dcnode-id="4030" style="font-family: Baskervville;"><span data-dcnode-id="4031" instrument_node="">The study of academic rituals has concentrated on rites of passage, those rituals that mark a person's transition from one stage of life to another, since the university's goal is to transform raw youth into educated and responsible adults. </span></span></span></h3><p data-dcnode-id="4024" style="text-align: left;"><span data-dcnode-id="4025" style="font-size: medium;"><span data-dcnode-id="4026" style="font-family: Baskervville;"><br data-dcnode-id="4027"></span></span></p><ul data-dcnode-id="4018" style="text-align: left;"><li data-dcnode-id="4019"><span data-dcnode-id="4020" style="font-size: medium;"><span data-dcnode-id="4021" style="font-family: Baskervville;"><span data-dcnode-id="4023" instrument_node="">Participants in rites of passage go through three stages, as originally defined by Arnold van Gennp (1873–1957): separation from the group, a transitional or "liminal" phase, and reintegration back into the group.&nbsp; </span><br data-dcnode-id="4022"></span></span></li></ul><ul data-dcnode-id="4012" style="text-align: left;"><li data-dcnode-id="4013"><span data-dcnode-id="4014" style="font-size: medium;"><span data-dcnode-id="4015" style="font-family: Baskervville;"><span data-dcnode-id="4017" instrument_node="">Victor Turner (1920–1983) expanded on van Gennup's idea, arguing that the liminal phase was frequently more than simply a transitional condition between here and there.&nbsp; </span><br data-dcnode-id="4016"></span></span></li></ul><ul data-dcnode-id="4006" style="text-align: left;"><li data-dcnode-id="4007"><span data-dcnode-id="4008" style="font-size: medium;"><span data-dcnode-id="4009" style="font-family: Baskervville;"><span data-dcnode-id="4011" instrument_node="">The liminal phase is used by societies to inculcate values and lore in individuals as well as to elicit self-doubt and introspection.&nbsp; </span><br data-dcnode-id="4010"></span></span></li></ul><ul data-dcnode-id="4000" style="text-align: left;"><li data-dcnode-id="4001"><span data-dcnode-id="4002" style="font-size: medium;"><span data-dcnode-id="4003" style="font-family: Baskervville;"><span data-dcnode-id="4005" instrument_node="">As a result, liminality is frequently associated with uneasiness and uncertainty, and it may even refer to a permanent group of individuals who are on the margins of society.&nbsp; </span><br data-dcnode-id="4004"></span></span></li></ul><ul data-dcnode-id="3995" style="text-align: left;"><li data-dcnode-id="3996"><span data-dcnode-id="3997" style="font-size: medium;"><span data-dcnode-id="3998" style="font-family: Baskervville;"><span data-dcnode-id="3999" instrument_node="">At the same time, the liminal condition instills in its members a sense of communal warmth, solidarity, and togetherness, or "communitas." The universal characteristics of the liminal condition are reflected in the average academic experience. </span></span></span></li></ul><p data-dcnode-id="3991"><span data-dcnode-id="3992" style="font-size: medium;"><span data-dcnode-id="3993" style="font-family: Baskervville;"><br data-dcnode-id="3994"></span></span></p><p data-dcnode-id="3987"><span data-dcnode-id="3988" style="font-size: medium;"><span data-dcnode-id="3989" style="font-family: Baskervville;"><br data-dcnode-id="3990"></span></span></p><h3 data-dcnode-id="3983" style="text-align: left;"><span data-dcnode-id="3984" style="font-size: medium;"><span data-dcnode-id="3985" style="font-family: Baskervville;"><span data-dcnode-id="3986" instrument_node="">Incoming freshmen, on the verge of maturity, are cut off from everyday life as they begin their studies at the university. </span></span></span></h3><p data-dcnode-id="3979" style="text-align: left;"><span data-dcnode-id="3980" style="font-size: medium;"><span data-dcnode-id="3981" style="font-family: Baskervville;"><br data-dcnode-id="3982"></span></span></p><ul data-dcnode-id="3973" style="text-align: left;"><li data-dcnode-id="3974"><span data-dcnode-id="3975" style="font-size: medium;"><span data-dcnode-id="3976" style="font-family: Baskervville;"><span data-dcnode-id="3978" instrument_node="">Even the physical environment is unusual, with many old-looking buildings and parklike grounds that purposefully separate the academic world from the rest of the world.&nbsp; </span><br data-dcnode-id="3977"></span></span></li></ul><ul data-dcnode-id="3967" style="text-align: left;"><li data-dcnode-id="3968"><span data-dcnode-id="3969" style="font-size: medium;"><span data-dcnode-id="3970" style="font-family: Baskervville;"><span data-dcnode-id="3972" instrument_node="">Personal freedom is a given, and customary processes are distinct; the best-reasoned argument overcomes majority rule.&nbsp; </span><br data-dcnode-id="3971"></span></span></li></ul><ul data-dcnode-id="3962" style="text-align: left;"><li data-dcnode-id="3963"><span data-dcnode-id="3964" style="font-size: medium;"><span data-dcnode-id="3965" style="font-family: Baskervville;"><span data-dcnode-id="3966" instrument_node="">Even the hours of the day have changed: class and personal time have been jumbled, meals have been eaten at random, and no one tries to arrange the night. </span></span></span></li></ul><p data-dcnode-id="3958" style="text-align: left;"><span data-dcnode-id="3959" style="font-size: medium;"><span data-dcnode-id="3960" style="font-family: Baskervville;"><br data-dcnode-id="3961"></span></span></p><p data-dcnode-id="3954" style="text-align: left;"><span data-dcnode-id="3955" style="font-size: medium;"><span data-dcnode-id="3956" style="font-family: Baskervville;"><br data-dcnode-id="3957"></span></span></p><p data-dcnode-id="3950" style="text-align: left;"><span data-dcnode-id="3951" style="font-size: medium;"><span data-dcnode-id="3952" style="font-family: Baskervville;"><br data-dcnode-id="3953"></span></span></p><h3 data-dcnode-id="3946" style="text-align: left;"><span data-dcnode-id="3947" style="font-size: medium;"><span data-dcnode-id="3948" style="font-family: Baskervville;"><span data-dcnode-id="3949" instrument_node="">Students go from childhood to maturity, from ignorance to knowledge, and from dependency to independence in this environment. </span></span></span></h3><p data-dcnode-id="3942" style="text-align: left;"><span data-dcnode-id="3943" style="font-size: medium;"><span data-dcnode-id="3944" style="font-family: Baskervville;"><br data-dcnode-id="3945"></span></span></p><ul data-dcnode-id="3936" style="text-align: left;"><li data-dcnode-id="3937"><span data-dcnode-id="3938" style="font-size: medium;"><span data-dcnode-id="3939" style="font-family: Baskervville;"><span data-dcnode-id="3941" instrument_node="">Graduation eventually reintegrates them back into society.&nbsp; </span><br data-dcnode-id="3940"></span></span></li></ul><ul data-dcnode-id="3930" style="text-align: left;"><li data-dcnode-id="3931"><span data-dcnode-id="3932" style="font-size: medium;"><span data-dcnode-id="3933" style="font-family: Baskervville;"><span data-dcnode-id="3935" instrument_node="">The main kinds of academic rituals reflect all or part of the liminal state's various aspects.&nbsp; </span><br data-dcnode-id="3934"></span></span></li></ul><ul data-dcnode-id="3925" style="text-align: left;"><li data-dcnode-id="3926"><span data-dcnode-id="3927" style="font-size: medium;"><span data-dcnode-id="3928" style="font-family: Baskervville;"><span data-dcnode-id="3929" instrument_node="">Convocations, formal ceremonies that bring together the entire university community—faculty, students, officials, and supporters—for a special occasion, such as graduation, a presidential inauguration, a special anniversary, or to mark the start of a new term, are the most well-known and impressive rituals. </span></span></span></li></ul><p data-dcnode-id="3921"><span data-dcnode-id="3922" style="font-size: medium;"><span data-dcnode-id="3923" style="font-family: Baskervville;"><br data-dcnode-id="3924"></span></span></p><p data-dcnode-id="3917"><span data-dcnode-id="3918" style="font-size: medium;"><span data-dcnode-id="3919" style="font-family: Baskervville;"><br data-dcnode-id="3920"></span></span></p><p data-dcnode-id="3913"><span data-dcnode-id="3914" style="font-size: medium;"><span data-dcnode-id="3915" style="font-family: Baskervville;"><br data-dcnode-id="3916"></span></span></p><h3 data-dcnode-id="3909" style="text-align: left;"><span data-dcnode-id="3910" style="font-size: medium;"><span data-dcnode-id="3911" style="font-family: Baskervville;"><span data-dcnode-id="3912" instrument_node="">When the university utilizes convocation to increase dedication to the institution, stimulate self-reflection among participants, and reaffirm the university's position in the community, the entire range of academic symbols and performances are typically used. </span></span></span></h3><p data-dcnode-id="3905"><span data-dcnode-id="3906" style="font-size: medium;"><span data-dcnode-id="3907" style="font-family: Baskervville;"><br data-dcnode-id="3908"></span></span></p><ul data-dcnode-id="3899" style="text-align: left;"><li data-dcnode-id="3900"><span data-dcnode-id="3901" style="font-size: medium;"><span data-dcnode-id="3902" style="font-family: Baskervville;"><span data-dcnode-id="3904" instrument_node="">Former students undertake pilgrimages to the campus for yearly reunions or homecoming celebrations, which bring them back under the jurisdiction of the university, strengthen cohesiveness with other former students, and stress upon current students the benefits of prolonged devotion to the institution.&nbsp; </span><br data-dcnode-id="3903"></span></span></li></ul><ul data-dcnode-id="3893" style="text-align: left;"><li data-dcnode-id="3894"><span data-dcnode-id="3895" style="font-size: medium;"><span data-dcnode-id="3896" style="font-family: Baskervville;"><span data-dcnode-id="3898" instrument_node="">Initiation ceremonies, which are held periodically by intellectual, social, and service organizations to induct new student members, are another typical academic ritual.&nbsp; </span><br data-dcnode-id="3897"></span></span></li></ul><ul data-dcnode-id="3887" style="text-align: left;"><li data-dcnode-id="3888"><span data-dcnode-id="3889" style="font-size: medium;"><span data-dcnode-id="3890" style="font-family: Baskervville;"><span data-dcnode-id="3892" instrument_node="">These rituals may vary from solemn to bizarre, including hazing practices.&nbsp; </span><br data-dcnode-id="3891"></span></span></li></ul><ul data-dcnode-id="3882" style="text-align: left;"><li data-dcnode-id="3883"><span data-dcnode-id="3884" style="font-size: medium;"><span data-dcnode-id="3885" style="font-family: Baskervville;"><span data-dcnode-id="3886" instrument_node="">In addition to these well-known rituals, academic life includes a plethora of informal and small-scale rituals linked to the university's day-to-day operations, such as the ritual involved in a faculty member petitioning for tenure or a student's preparations for an exam. </span></span></span></li></ul><p data-dcnode-id="3878"><span data-dcnode-id="3879" style="font-size: medium;"><span data-dcnode-id="3880" style="font-family: Baskervville;"><br data-dcnode-id="3881"></span></span></p><p data-dcnode-id="3874"><span data-dcnode-id="3875" style="font-size: medium;"><span data-dcnode-id="3876" style="font-family: Baskervville;"><br data-dcnode-id="3877"></span></span></p><p data-dcnode-id="3870"><span data-dcnode-id="3871" style="font-size: medium;"><span data-dcnode-id="3872" style="font-family: Baskervville;"><br data-dcnode-id="3873"></span></span></p><p data-dcnode-id="3866"><span data-dcnode-id="3867" style="font-size: medium;"><span data-dcnode-id="3868" style="font-family: Baskervville;"><br data-dcnode-id="3869"></span></span></p><h2 data-dcnode-id="3861" id="AcadRituals3" style="text-align: left;"><span data-dcnode-id="3862" style="font-size: medium;"><span data-dcnode-id="3863" style="font-family: Baskervville;"><span data-dcnode-id="3864" style="color: red;"><span data-dcnode-id="3865" instrument_node="">Commencement</span></span></span></span></h2><p data-dcnode-id="3857"><span data-dcnode-id="3858" style="font-size: medium;"><span data-dcnode-id="3859" style="font-family: Baskervville;"><span data-dcnode-id="3860" instrument_node="">&nbsp;</span></span></span></p><p data-dcnode-id="3853"><span data-dcnode-id="3854" style="font-size: medium;"><span data-dcnode-id="3855" style="font-family: Baskervville;"><span data-dcnode-id="3856" instrument_node="">&nbsp;</span></span></span></p><h3 data-dcnode-id="3849" style="text-align: left;"><span data-dcnode-id="3850" style="font-size: medium;"><span data-dcnode-id="3851" style="font-family: Baskervville;"><span data-dcnode-id="3852" instrument_node="">Commencement, or the awarding of degrees on graduating students, is probably the most widely seen and known American academic ceremony. </span></span></span></h3><p data-dcnode-id="3845"><span data-dcnode-id="3846" style="font-size: medium;"><span data-dcnode-id="3847" style="font-family: Baskervville;"><br data-dcnode-id="3848"></span></span></p><ul data-dcnode-id="3839" style="text-align: left;"><li data-dcnode-id="3840"><span data-dcnode-id="3841" style="font-size: medium;"><span data-dcnode-id="3842" style="font-family: Baskervville;"><span data-dcnode-id="3844" instrument_node="">The conventional, modern-day commencement ceremony, which employs all of the formal ceremonial components found in academe, is regarded antiquated and inefficient, essential qualities that help to emphasize the difference between the academic world and the common world.&nbsp; </span><br data-dcnode-id="3843"></span></span></li></ul><ul data-dcnode-id="3833" style="text-align: left;"><li data-dcnode-id="3834"><span data-dcnode-id="3835" style="font-size: medium;"><span data-dcnode-id="3836" style="font-family: Baskervville;"><span data-dcnode-id="3838" instrument_node="">The ceremonial activity starts with the processional, which is a march into the staging area by university officials, distinguished visitors, and faculty—all ordered by rank, clothed in academic regalia, and bearing the insignia of office—followed by the graduating students, who are organized by college.&nbsp; </span><br data-dcnode-id="3837"></span></span></li></ul><ul data-dcnode-id="3828" style="text-align: left;"><li data-dcnode-id="3829"><span data-dcnode-id="3830" style="font-size: medium;"><span data-dcnode-id="3831" style="font-family: Baskervville;"><span data-dcnode-id="3832" instrument_node="">The liturgy includes brief remarks from officials, distinguished professors, honored graduates, and special visitors, all of which aim to remind the audience of the university's function and to connect its mission to global issues. </span></span></span></li></ul><p data-dcnode-id="3824"><span data-dcnode-id="3825" style="font-size: medium;"><span data-dcnode-id="3826" style="font-family: Baskervville;"><br data-dcnode-id="3827"></span></span></p><p data-dcnode-id="3820"><span data-dcnode-id="3821" style="font-size: medium;"><span data-dcnode-id="3822" style="font-family: Baskervville;"><br data-dcnode-id="3823"></span></span></p><h3 data-dcnode-id="3816" style="text-align: left;"><span data-dcnode-id="3817" style="font-size: medium;"><span data-dcnode-id="3818" style="font-family: Baskervville;"><span data-dcnode-id="3819" instrument_node="">Outstanding students deliver brief remarks, and famous people get honorary degrees. </span></span></span></h3><p data-dcnode-id="3812" style="text-align: left;"><span data-dcnode-id="3813" style="font-size: medium;"><span data-dcnode-id="3814" style="font-family: Baskervville;"><br data-dcnode-id="3815"></span></span></p><ul data-dcnode-id="3806" style="text-align: left;"><li data-dcnode-id="3807"><span data-dcnode-id="3808" style="font-size: medium;"><span data-dcnode-id="3809" style="font-family: Baskervville;"><span data-dcnode-id="3811" instrument_node="">The graduation speech is given by a distinguished individual, and the message typically emphasizes the new responsibilities and possibilities that will be confronted.&nbsp; </span><br data-dcnode-id="3810"></span></span></li></ul><ul data-dcnode-id="3800" style="text-align: left;"><li data-dcnode-id="3801"><span data-dcnode-id="3802" style="font-size: medium;"><span data-dcnode-id="3803" style="font-family: Baskervville;"><span data-dcnode-id="3805" instrument_node="">As pupils exit the liminal state, they are confronted with dread and hope, as well as memories of the past, present, and future.&nbsp; </span><br data-dcnode-id="3804"></span></span></li></ul><ul data-dcnode-id="3795" style="text-align: left;"><li data-dcnode-id="3796"><span data-dcnode-id="3797" style="font-size: medium;"><span data-dcnode-id="3798" style="font-family: Baskervville;"><span data-dcnode-id="3799" instrument_node="">All of these components are ordered in the liturgy, which finally affirms that these graduates have worked hard and now have the skills and expertise to confront the difficulties that await them in the world. </span></span></span></li></ul><p data-dcnode-id="3791"><span data-dcnode-id="3792" style="font-size: medium;"><span data-dcnode-id="3793" style="font-family: Baskervville;"><br data-dcnode-id="3794"></span></span></p><p data-dcnode-id="3787"><span data-dcnode-id="3788" style="font-size: medium;"><span data-dcnode-id="3789" style="font-family: Baskervville;"><br data-dcnode-id="3790"></span></span></p><p data-dcnode-id="3783"><span data-dcnode-id="3784" style="font-size: medium;"><span data-dcnode-id="3785" style="font-family: Baskervville;"><br data-dcnode-id="3786"></span></span></p><h3 data-dcnode-id="3779" style="text-align: left;"><span data-dcnode-id="3780" style="font-size: medium;"><span data-dcnode-id="3781" style="font-family: Baskervville;"><span data-dcnode-id="3782" instrument_node="">The awarding of degrees on the graduates is the primary ceremonial activity.&nbsp;</span></span></span></h3><h3 data-dcnode-id="3774" style="text-align: left;"><span data-dcnode-id="3775" style="font-size: medium;"><span data-dcnode-id="3776" style="font-family: Baskervville;"><span data-dcnode-id="3778" instrument_node="">&nbsp; </span><br data-dcnode-id="3777"></span></span></h3><ul data-dcnode-id="3768" style="text-align: left;"><li data-dcnode-id="3769"><span data-dcnode-id="3770" style="font-size: medium;"><span data-dcnode-id="3771" style="font-family: Baskervville;"><span data-dcnode-id="3773" instrument_node="">Students used to go across the stage, collect their degrees, shake hands, and return to their seats, but that is no longer the case.&nbsp; </span><br data-dcnode-id="3772"></span></span></li></ul><ul data-dcnode-id="3762" style="text-align: left;"><li data-dcnode-id="3763"><span data-dcnode-id="3764" style="font-size: medium;"><span data-dcnode-id="3765" style="font-family: Baskervville;"><span data-dcnode-id="3767" instrument_node="">The closing comments acclimate the graduates to their new position, reinforce the group's unity with the institution, and reaffirm the importance of their shared ideals.&nbsp; </span><br data-dcnode-id="3766"></span></span></li></ul><ul data-dcnode-id="3757" style="text-align: left;"><li data-dcnode-id="3758"><span data-dcnode-id="3759" style="font-size: medium;"><span data-dcnode-id="3760" style="font-family: Baskervville;"><span data-dcnode-id="3761" instrument_node="">The participants then march out in the recessional, which is the last ceremonial act of re-entry into society. </span></span></span></li></ul><p data-dcnode-id="3753"><span data-dcnode-id="3754" style="font-size: medium;"><span data-dcnode-id="3755" style="font-family: Baskervville;"><br data-dcnode-id="3756"></span></span></p><p data-dcnode-id="3749"><span data-dcnode-id="3750" style="font-size: medium;"><span data-dcnode-id="3751" style="font-family: Baskervville;"><br data-dcnode-id="3752"></span></span></p><p data-dcnode-id="3745"><span data-dcnode-id="3746" style="font-size: medium;"><span data-dcnode-id="3747" style="font-family: Baskervville;"><br data-dcnode-id="3748"></span></span></p><p data-dcnode-id="3740"><span data-dcnode-id="3741" style="font-size: medium;"><span data-dcnode-id="3742" style="font-family: Baskervville;"><span data-dcnode-id="3743" style="color: red;"><br data-dcnode-id="3744"></span></span></span></p><h2 data-dcnode-id="3735" id="AcadRituals4" style="text-align: left;"><span data-dcnode-id="3736" style="font-size: medium;"><span data-dcnode-id="3737" style="font-family: Baskervville;"><span data-dcnode-id="3738" style="color: red;"><span data-dcnode-id="3739" instrument_node="">Inversion and paradox</span></span></span></span></h2><p data-dcnode-id="3731"><span data-dcnode-id="3732" style="font-size: medium;"><span data-dcnode-id="3733" style="font-family: Baskervville;"><span data-dcnode-id="3734" instrument_node="">&nbsp;</span></span></span></p><p data-dcnode-id="3727"><span data-dcnode-id="3728" style="font-size: medium;"><span data-dcnode-id="3729" style="font-family: Baskervville;"><span data-dcnode-id="3730" instrument_node="">&nbsp;</span></span></span></p><h3 data-dcnode-id="3723" style="text-align: left;"><span data-dcnode-id="3724" style="font-size: medium;"><span data-dcnode-id="3725" style="font-family: Baskervville;"><span data-dcnode-id="3726" instrument_node="">Various antistructural and chaotic aspects may be found in rites of passage. </span></span></span></h3><p data-dcnode-id="3719"><span data-dcnode-id="3720" style="font-size: medium;"><span data-dcnode-id="3721" style="font-family: Baskervville;"><br data-dcnode-id="3722"></span></span></p><p data-dcnode-id="3715"><span data-dcnode-id="3716" style="font-size: medium;"><span data-dcnode-id="3717" style="font-family: Baskervville;"><br data-dcnode-id="3718"></span></span></p><ul data-dcnode-id="3709" style="text-align: left;"><li data-dcnode-id="3710"><span data-dcnode-id="3711" style="font-size: medium;"><span data-dcnode-id="3712" style="font-family: Baskervville;"><span data-dcnode-id="3714" instrument_node="">The emotions of equality, humility, and oneness that emerge during communitas are at odds with the conventional social order's framework, which emphasizes rank and difference.&nbsp; </span><br data-dcnode-id="3713"></span></span></li></ul><div data-dcnode-id="3410"><ul data-dcnode-id="3703" style="text-align: left;"><li data-dcnode-id="3704"><span data-dcnode-id="3705" style="font-size: medium;"><span data-dcnode-id="3706" style="font-family: Baskervville;"><span data-dcnode-id="3708" instrument_node="">Since all human beings belong to both nature and culture, rites of passage help to mediate our biological destiny with our cultural experiences, according to Levi-Strauss (b.1908) Rebellion rituals, antistructural play, role reversals, and paradoxes become part of the ritual process at such moments.&nbsp; </span><br data-dcnode-id="3707"></span></span></li></ul><ul data-dcnode-id="3698" style="text-align: left;"><li data-dcnode-id="3699"><span data-dcnode-id="3700" style="font-size: medium;"><span data-dcnode-id="3701" style="font-family: Baskervville;"><span data-dcnode-id="3702" instrument_node="">As a result, although the university “civilizes” and teaches a student, the student's essence as a human being with basic impulses and desires is preserved. </span></span></span></li></ul><p data-dcnode-id="3694"><span data-dcnode-id="3695" style="font-size: medium;"><span data-dcnode-id="3696" style="font-family: Baskervville;"><br data-dcnode-id="3697"></span></span></p><p data-dcnode-id="3690"><span data-dcnode-id="3691" style="font-size: medium;"><span data-dcnode-id="3692" style="font-family: Baskervville;"><br data-dcnode-id="3693"></span></span></p><p data-dcnode-id="3686"><span data-dcnode-id="3687" style="font-size: medium;"><span data-dcnode-id="3688" style="font-family: Baskervville;"><br data-dcnode-id="3689"></span></span></p><h3 data-dcnode-id="3682" style="text-align: left;"><span data-dcnode-id="3683" style="font-size: medium;"><span data-dcnode-id="3684" style="font-family: Baskervville;"><span data-dcnode-id="3685" instrument_node="">In order to promote reconciliation amid conflict, ritual exposes and even exaggerates this contradiction.</span></span></span></h3><p data-dcnode-id="3675" style="text-align: left;"><span data-dcnode-id="3676" style="font-size: medium;"><span data-dcnode-id="3677" style="font-family: Baskervville;"><br data-dcnode-id="3681"><span data-dcnode-id="3680" instrument_node="">&nbsp;</span><br data-dcnode-id="3679"><br data-dcnode-id="3678"></span></span></p><ul data-dcnode-id="3669" style="text-align: left;"><li data-dcnode-id="3670"><span data-dcnode-id="3671" style="font-size: medium;"><span data-dcnode-id="3672" style="font-family: Baskervville;"><span data-dcnode-id="3674" instrument_node="">Most college campuses, for example, conduct occasional inversion rites in which participants are allowed to do what is usually prohibited amid festivities, lighthearted fights, and shenanigans.&nbsp; </span><br data-dcnode-id="3673"></span></span></li></ul><ul data-dcnode-id="3664" style="text-align: left;"><li data-dcnode-id="3665"><span data-dcnode-id="3666" style="font-size: medium;"><span data-dcnode-id="3667" style="font-family: Baskervville;"><span data-dcnode-id="3668" instrument_node="">Students may mock academe's seriousness by staging their own ritualistic acts, such as a fictitious graduation ceremony. </span></span></span></li></ul><p data-dcnode-id="3660" style="text-align: left;"><span data-dcnode-id="3661" style="font-size: medium;"><span data-dcnode-id="3662" style="font-family: Baskervville;"><br data-dcnode-id="3663"></span></span></p><p data-dcnode-id="3656" style="text-align: left;"><span data-dcnode-id="3657" style="font-size: medium;"><span data-dcnode-id="3658" style="font-family: Baskervville;"><br data-dcnode-id="3659"></span></span></p><h3 data-dcnode-id="3652" style="text-align: left;"><span data-dcnode-id="3653" style="font-size: medium;"><span data-dcnode-id="3654" style="font-family: Baskervville;"><span data-dcnode-id="3655" instrument_node="">The Italian festa di laurea, or graduation celebration, is a typical example of antistructural, natureversus-culture components in a rite of passage. </span></span></span></h3><p data-dcnode-id="3646" style="text-align: left;"><span data-dcnode-id="3647" style="font-size: medium;"><span data-dcnode-id="3648" style="font-family: Baskervville;"><br data-dcnode-id="3651"><b data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">&nbsp;</span></b></span></span></p><p data-dcnode-id="3641" style="text-align: left;"><span data-dcnode-id="3642" style="font-size: medium;"><span data-dcnode-id="3643" style="font-family: Baskervville;"><b data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">Close friends create a papiro, a lengthy, poster-sized paper scroll featuring ribald and sarcastic stories and pictures of the graduate's life, when they learn that he or she will graduate from an Italian institution.&nbsp;</span></b></span></span></p><p data-dcnode-id="3634" style="text-align: left;"><span data-dcnode-id="3635" style="font-size: medium;"><span data-dcnode-id="3636" style="font-family: Baskervville;"><b data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">&nbsp;</span></b><br data-dcnode-id="3638"><br data-dcnode-id="3637"></span></span></p><ul data-dcnode-id="3628" style="text-align: left;"><li data-dcnode-id="3629"><span data-dcnode-id="3630" style="font-size: medium;"><span data-dcnode-id="3631" style="font-family: Baskervville;"><span data-dcnode-id="3633" instrument_node="">The papiro is subsequently displayed in a public location, sometimes in poetry style and highlighting sexual activities and alleged vices.&nbsp; </span><br data-dcnode-id="3632"></span></span></li></ul><ul data-dcnode-id="3622" style="text-align: left;"><li data-dcnode-id="3623"><span data-dcnode-id="3624" style="font-size: medium;"><span data-dcnode-id="3625" style="font-family: Baskervville;"><span data-dcnode-id="3627" instrument_node="">The laureata reads her papiro aloud to a group of friends and family on graduation day.&nbsp; </span><br data-dcnode-id="3626"></span></span></li></ul><ul data-dcnode-id="3616" style="text-align: left;"><li data-dcnode-id="3617"><span data-dcnode-id="3618" style="font-size: medium;"><span data-dcnode-id="3619" style="font-family: Baskervville;"><span data-dcnode-id="3621" instrument_node="">She has to drink a bottle of wine every time she makes a mistake in the reading.&nbsp; </span><br data-dcnode-id="3620"></span></span></li></ul><ul data-dcnode-id="3610" style="text-align: left;"><li data-dcnode-id="3611"><span data-dcnode-id="3612" style="font-size: medium;"><span data-dcnode-id="3613" style="font-family: Baskervville;"><span data-dcnode-id="3615" instrument_node="">Finally, the graduate is paraded around the city, singing together with her friends and relatives.&nbsp; </span><br data-dcnode-id="3614"></span></span></li></ul><ul data-dcnode-id="3604" style="text-align: left;"><li data-dcnode-id="3605"><span data-dcnode-id="3606" style="font-size: medium;"><span data-dcnode-id="3607" style="font-family: Baskervville;"><span data-dcnode-id="3609" instrument_node="">Thus, the festa di laurea balances out the serious ritual of a graduation ceremony, which honors the intellect, by simultaneously celebrating and mocking the graduate's noncerebral, sexual impulses.&nbsp; </span><br data-dcnode-id="3608"></span></span></li></ul><ul data-dcnode-id="3599" style="text-align: left;"><li data-dcnode-id="3600"><span data-dcnode-id="3601" style="font-size: medium;"><span data-dcnode-id="3602" style="font-family: Baskervville;"><span data-dcnode-id="3603" instrument_node="">The festa di laurea ritual's sensuality and depravity call attention to the anarchy that would ensue if order were not enforced. </span></span></span></li></ul><p data-dcnode-id="3592" style="text-align: left;"><span data-dcnode-id="3593" style="font-size: medium;"><span data-dcnode-id="3594" style="font-family: Baskervville;"><br data-dcnode-id="3598"><b data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">The juxtaposition of the two ceremonies heightens and maintains the formal ritual's dignity and seriousness while recognizing every rite of passage's inherent tension. </span></b><br data-dcnode-id="3595"></span></span></p><p data-dcnode-id="3588"><span data-dcnode-id="3589" style="font-size: medium;"><span data-dcnode-id="3590" style="font-family: Baskervville;"><br data-dcnode-id="3591"></span></span></p><p data-dcnode-id="3584"><span data-dcnode-id="3585" style="font-size: medium;"><span data-dcnode-id="3586" style="font-family: Baskervville;"><br data-dcnode-id="3587"></span></span></p><p data-dcnode-id="3580"><span data-dcnode-id="3581" style="font-size: medium;"><span data-dcnode-id="3582" style="font-family: Baskervville;"><br data-dcnode-id="3583"></span></span></p><p data-dcnode-id="3576"><span data-dcnode-id="3577" style="font-size: medium;"><span data-dcnode-id="3578" style="font-family: Baskervville;"><br data-dcnode-id="3579"></span></span></p><h2 data-dcnode-id="3571" id="AcadRituals5" style="text-align: left;"><span data-dcnode-id="3572" style="font-size: medium;"><span data-dcnode-id="3573" style="font-family: Baskervville;"><span data-dcnode-id="3574" style="color: red;"><span data-dcnode-id="3575" instrument_node="">Changes as Time Passes.</span></span></span></span></h2><p data-dcnode-id="3567"><span data-dcnode-id="3568" style="font-size: medium;"><span data-dcnode-id="3569" style="font-family: Baskervville;"><span data-dcnode-id="3570" instrument_node="">&nbsp;</span></span></span></p><h3 data-dcnode-id="3563" style="text-align: left;"><span data-dcnode-id="3564" style="font-size: medium;"><span data-dcnode-id="3565" style="font-family: Baskervville;"><span data-dcnode-id="3566" instrument_node="">&nbsp;</span></span></span></h3><h3 data-dcnode-id="3559" style="text-align: left;"><span data-dcnode-id="3560" style="font-size: medium;"><span data-dcnode-id="3561" style="font-family: Baskervville;"><span data-dcnode-id="3562" instrument_node="">Academic ceremonies have altered little throughout the ages when seen from a wide viewpoint that began in medieval times. </span></span></span></h3><p data-dcnode-id="3555" style="text-align: left;"><span data-dcnode-id="3556" style="font-size: medium;"><span data-dcnode-id="3557" style="font-family: Baskervville;"><br data-dcnode-id="3558"></span></span></p><ul data-dcnode-id="3549" style="text-align: left;"><li data-dcnode-id="3550"><span data-dcnode-id="3551" style="font-size: medium;"><span data-dcnode-id="3552" style="font-family: Baskervville;"><span data-dcnode-id="3554" instrument_node="">In response to increasing concern about the separation of religion and state, schools in the United States stopped conducting the baccalaureate, a particular religious ceremony for a graduating class, in the 1960s.&nbsp; </span><br data-dcnode-id="3553"></span></span></li></ul><ul data-dcnode-id="3544" style="text-align: left;"><li data-dcnode-id="3545"><span data-dcnode-id="3546" style="font-size: medium;"><span data-dcnode-id="3547" style="font-family: Baskervville;"><span data-dcnode-id="3548" instrument_node="">Commencement exercises are now conducted at the conclusion of each semester at many institutions as the student population has grown. </span></span></span></li></ul><p data-dcnode-id="3540"><span data-dcnode-id="3541" style="font-size: medium;"><span data-dcnode-id="3542" style="font-family: Baskervville;"><br data-dcnode-id="3543"></span></span></p><h3 data-dcnode-id="3536" style="text-align: left;"><span data-dcnode-id="3537" style="font-size: medium;"><span data-dcnode-id="3538" style="font-family: Baskervville;"><span data-dcnode-id="3539" instrument_node="">&nbsp;</span></span></span></h3><h3 data-dcnode-id="3532" style="text-align: left;"><span data-dcnode-id="3533" style="font-size: medium;"><span data-dcnode-id="3534" style="font-family: Baskervville;"><span data-dcnode-id="3535" instrument_node="">Increased informality and individualism among graduates during commencement ceremonies began in the 1960s and early 1970s, and has persisted into the twenty-first century. </span></span></span></h3><p data-dcnode-id="3528"><span data-dcnode-id="3529" style="font-size: medium;"><span data-dcnode-id="3530" style="font-family: Baskervville;"><br data-dcnode-id="3531"></span></span></p><ul data-dcnode-id="3522" style="text-align: left;"><li data-dcnode-id="3523"><span data-dcnode-id="3524" style="font-size: medium;"><span data-dcnode-id="3525" style="font-family: Baskervville;"><span data-dcnode-id="3527" instrument_node="">While professors and school administrators adhere to rigorous regalia and ritual action protocols, students often deviate from the norm by writing comments or gluing items on their mortarboards, adding a tiny adornment to their robes such as a political button, or wearing unusual shoes.&nbsp; </span><br data-dcnode-id="3526"></span></span></li></ul><ul data-dcnode-id="3516" style="text-align: left;"><li data-dcnode-id="3517"><span data-dcnode-id="3518" style="font-size: medium;"><span data-dcnode-id="3519" style="font-family: Baskervville;"><span data-dcnode-id="3521" instrument_node="">Individual organizations, such as ethnic or homosexual groups, were allowed to conduct separate graduation ceremonies at some schools.&nbsp; </span><br data-dcnode-id="3520"></span></span></li></ul><ul data-dcnode-id="3510" style="text-align: left;"><li data-dcnode-id="3511"><span data-dcnode-id="3512" style="font-size: medium;"><span data-dcnode-id="3513" style="font-family: Baskervville;"><span data-dcnode-id="3515" instrument_node="">Music, which had previously been sluggish and solemn, has likewise been loosening up.&nbsp; </span><br data-dcnode-id="3514"></span></span></li></ul><ul data-dcnode-id="3505" style="text-align: left;"><li data-dcnode-id="3506"><span data-dcnode-id="3507" style="font-size: medium;"><span data-dcnode-id="3508" style="font-family: Baskervville;"><span data-dcnode-id="3509" instrument_node="">Many graduates now march to contemporary music rather than "Pomp and Circumstance."</span></span></span></li></ul><p data-dcnode-id="3499"><span data-dcnode-id="3500" style="font-size: medium;"><span data-dcnode-id="3501" style="font-family: Baskervville;"><br data-dcnode-id="3504"><span data-dcnode-id="3503" instrument_node="">&nbsp;</span><br data-dcnode-id="3502"></span></span></p><p data-dcnode-id="3495"><span data-dcnode-id="3496" style="font-size: medium;"><span data-dcnode-id="3497" style="font-family: Baskervville;"><br data-dcnode-id="3498"></span></span></p><h2 data-dcnode-id="3490" id="AcadRitual6" style="text-align: left;"><span data-dcnode-id="3491" style="font-size: medium;"><span data-dcnode-id="3492" style="font-family: Baskervville;"><span data-dcnode-id="3493" style="color: red;"><span data-dcnode-id="3494" instrument_node="">References</span></span></span></span></h2><p data-dcnode-id="3486"><span data-dcnode-id="3487" style="font-size: medium;"><span data-dcnode-id="3488" style="font-family: Baskervville;"><br data-dcnode-id="3489"></span></span></p><ul data-dcnode-id="3480" style="text-align: left;"><li data-dcnode-id="3481"><span data-dcnode-id="3482" style="font-size: medium;"><span data-dcnode-id="3483" style="font-family: Baskervville;"><span data-dcnode-id="3485" instrument_node="">Babcock, B. (1996). Arrange me into disorder: Fragments and reflections on ritual clowning. In R. Grimes (Ed.), Readings in ritual studies (pp. 1–21). Upper Saddle River, NJ: Prentice Hall.&nbsp; </span><br data-dcnode-id="3484"></span></span></li></ul><ul data-dcnode-id="3474" style="text-align: left;"><li data-dcnode-id="3475"><span data-dcnode-id="3476" style="font-size: medium;"><span data-dcnode-id="3477" style="font-family: Baskervville;"><span data-dcnode-id="3479" instrument_node="">Bell, C. (1997). Ritual: Perspectives and dimensions. New York: Oxford University Press.&nbsp; </span><br data-dcnode-id="3478"></span></span></li></ul><ul data-dcnode-id="3468" style="text-align: left;"><li data-dcnode-id="3469"><span data-dcnode-id="3470" style="font-size: medium;"><span data-dcnode-id="3471" style="font-family: Baskervville;"><span data-dcnode-id="3473" instrument_node="">Eliade, M. (1958). Rites and symbols of initiation: The mys- teries of birth and rebirth (W. R. Trask, Trans.). Dallas, TX: Spring Publications.&nbsp; </span><br data-dcnode-id="3472"></span></span></li></ul><ul data-dcnode-id="3462" style="text-align: left;"><li data-dcnode-id="3463"><span data-dcnode-id="3464" style="font-size: medium;"><span data-dcnode-id="3465" style="font-family: Baskervville;"><span data-dcnode-id="3467" instrument_node="">Gunn, M. K (1969). A guide to academic protocol. New York: Columbia University Press. Hargreaves-Mawdsley,&nbsp; </span><br data-dcnode-id="3466"></span></span></li></ul><ul data-dcnode-id="3456" style="text-align: left;"><li data-dcnode-id="3457"><span data-dcnode-id="3458" style="font-size: medium;"><span data-dcnode-id="3459" style="font-family: Baskervville;"><span data-dcnode-id="3461" instrument_node="">W. N. (1978). A history of academ- ical dress in Europe until the end of the eighteenth centu- ry. Westport, CT: Greenwood Press.&nbsp; </span><br data-dcnode-id="3460"></span></span></li></ul><ul data-dcnode-id="3450" style="text-align: left;"><li data-dcnode-id="3451"><span data-dcnode-id="3452" style="font-size: medium;"><span data-dcnode-id="3453" style="font-family: Baskervville;"><span data-dcnode-id="3455" instrument_node="">Levi-Strauss, C. (1964). Introduction to a science of mythol- ogy, Vol. 1, The raw and the cooked (J. &amp; D. Weightman, Trans.). New York: Harper &amp; Row.&nbsp; </span><br data-dcnode-id="3454"></span></span></li></ul><ul data-dcnode-id="3444" style="text-align: left;"><li data-dcnode-id="3445"><span data-dcnode-id="3446" style="font-size: medium;"><span data-dcnode-id="3447" style="font-family: Baskervville;"><span data-dcnode-id="3449" instrument_node="">Moore, S., &amp; Myerhoff, B. (1977). Secular ritual. Amsterdam: Van Gorcum.&nbsp; </span><br data-dcnode-id="3448"></span></span></li></ul><ul data-dcnode-id="3438" style="text-align: left;"><li data-dcnode-id="3439"><span data-dcnode-id="3440" style="font-size: medium;"><span data-dcnode-id="3441" style="font-family: Baskervville;"><span data-dcnode-id="3443" instrument_node="">Sullivan, E. (1977). Academic costume code and an aca- demic ceremony guide. In American Universities and Colleges (15th ed.). New York: American Council on Education &amp; Walter de Gruyter, Inc.&nbsp; </span><br data-dcnode-id="3442"></span></span></li></ul><ul data-dcnode-id="3432" style="text-align: left;"><li data-dcnode-id="3433"><span data-dcnode-id="3434" style="font-size: medium;"><span data-dcnode-id="3435" style="font-family: Baskervville;"><span data-dcnode-id="3437" instrument_node="">Turner, V. (1969). The ritual process: Structure and anti- structure. Ithaca, NY: Cornell University Press.&nbsp; </span><br data-dcnode-id="3436"></span></span></li></ul><ul data-dcnode-id="3427" style="text-align: left;"><li data-dcnode-id="3428"><span data-dcnode-id="3429" style="font-size: medium;"><span data-dcnode-id="3430" style="font-family: Baskervville;"><span data-dcnode-id="3431" instrument_node="">Van Gennup, A. (1960). The rites of passage (M. B. Vizedom &amp; G. L. Caffee, Trans.). Chicago: University of Chicago Press.</span></span></span></li></ul><p data-dcnode-id="3423"><span data-dcnode-id="3424" style="font-size: medium;"><span data-dcnode-id="3425" style="font-family: Baskervville;"><br data-dcnode-id="3426"></span></span></p><p data-dcnode-id="3417"><span data-dcnode-id="3418" style="font-size: medium;"><span data-dcnode-id="3419" style="font-family: Baskervville;"><br data-dcnode-id="3422"><span data-dcnode-id="3421" instrument_node="">&nbsp;</span><br data-dcnode-id="3420"></span></span></p><p data-dcnode-id="3411"><span data-dcnode-id="3412" style="font-size: medium;"><span data-dcnode-id="3413" style="font-family: Baskervville;"><br data-dcnode-id="3416"><span data-dcnode-id="3415" instrument_node="">&nbsp;</span><br data-dcnode-id="3414"></span></span></p></div></div><span data-dcnode-id="3408" instrument_node="">
