</span><p data-dcnode-id="2395"><span data-dcnode-id="2399" instrument_node="">The ceremony of worshipping this sacred tree, first begun by King Devanampiya Tissa and followed by his successors with unflagging interest, has continued up to the present day. The ceremony is still as popular and meaningful as at the beginning. It is natural that this should be so, for the veneration of the tree fulfills the emotional and devotional needs of the pious heart in the same way as does the veneration of the Buddha-image and, to a lesser extent, of the </span><i data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">dagaba.</span></i><span data-dcnode-id="2396" instrument_node=""> Moreover, its association with deities dedicated to the cause of Buddhism, who can also aid pious worshippers in their mundane affairs, contributes to the popularity and vitality of Bodhi-worship.</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2393" instrument_node="">The main center of devotion in Sri Lanka today is, of course, the ancient tree at Anuradhapura, which, in addition to its religious significance, has a historical importance as well. As the oldest historical tree in the world, it has survived for over 2,200 years, even when the city of Anuradhapura was devastated by foreign enemies. Today it is one of the most sacred and popular places of pilgrimage in the island. The tree itself is very well guarded, the most recent protection being a gold-plated railing around the base </span><i data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">(ranvata).</span></i><span data-dcnode-id="2390" instrument_node=""> Ordinarily, pilgrims are not allowed to go near the foot of the tree in the upper terrace. They have to worship and make their offerings on altars provided on the lower terrace so that no damage is done to the tree by the multitude that throng there. The place is closely guarded by those entrusted with its upkeep and protection, while the daily rituals of cleaning the place, watering the tree, making offerings, etc., are performed by bhikkhus and laymen entrusted with the work. The performance of these rituals is regarded as of great merit and they are performed on a lesser scale at other important Bodhi-trees in the island as well.</span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2387" instrument_node="">Thus this tree today receives worship and respect as a symbol of the Buddha himself, a tradition which, as stated earlier, could be traced back to the Ananda Bodhi-tree at Jetavana of the Buddha's own time. The </span><i data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Vibhanga Commentary</span></i><span data-dcnode-id="2384" instrument_node=""> (p.349) says that the bhikkhu who enters the courtyard of the Bodhi-tree should venerate the tree, behaving with all humility as if he were in the presence of the Buddha. Thus one of the main items of the daily ritual at the Anuradhapura Bodhi-tree (and at many other places) is the offering of alms as if unto the Buddha himself. A special ritual held annually at the shrine of the Anuradhapura tree is the hanging of gold ornaments on the tree. Pious devotees offer valuables, money, and various other articles during the performance of this ritual.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2381" instrument_node="">Another popular ritual connected with the Bodhi-tree is the lighting of coconut-oil lamps as an offering </span><i data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">(pahan-puja),</span></i><span data-dcnode-id="2378" instrument_node=""> especially to avert the evil influence of inauspicious planetary conjunctions. When a person passes through a troublesome period in life he may get his horoscope read by an astrologer in order to discover whether he is under bad planetary influences. If so, one of the recommendations would invariably be a </span><i data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">bodhi-puja,</span></i><span data-dcnode-id="2375" instrument_node=""> one important item of which would be the lighting of a specific number of coconut-oil lamps around a Bodhi-tree in a temple. The other aspects of this ritual consist of the offering of flowers, milk-rice, fruits, betel, medicinal oils, camphor, and coins. These coins (designated </span><i data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">panduru)</span></i><span data-dcnode-id="2372" instrument_node=""> are washed in saffron water and separated for offering in this manner. The offering of coins as an act of merit-acquisition has assumed ritualistic significance with the Buddhists of the island. Every temple has a charity box </span><i data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">(pin-pettiya)</span></i><span data-dcnode-id="2369" instrument_node=""> into which the devotees drop a few coins as a contribution for the maintenance of the monks and the monastery. Offerings at </span><i data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">devalayas</span></i><span data-dcnode-id="2366" instrument_node=""> should inevitably be accompanied by such a gift. At many wayside shrines there is provision for the offering of </span><i data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">panduru</span></i><span data-dcnode-id="2363" instrument_node=""> and travelers </span><i data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">en route,</span></i><span data-dcnode-id="2360" instrument_node=""> in the hope of a safe and successful journey, rarely fail to make their contribution. While the coins are put into the charity box, all the other offerings would be arranged methodically on an altar near the tree and the appropriate stanzas that make the offering valid are recited. Another part of the ritual is the hanging of flags on the branches of the tree in the expectation of getting one's wishes fulfilled.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Bathing the tree with scented water is also a necessary part of the ritual. So is the burning of incense, camphor, etc. Once all these offerings have been completed, the performers would circumambulate the tree once or thrice reciting an appropriate stanza. The commonest of such stanzas is as follows:</span></p><span data-dcnode-id="2355" instrument_node="">
</span><blockquote data-dcnode-id="2335"><span data-dcnode-id="2354" instrument_node="">
 Yassa mule nisinno va</span><br data-dcnode-id="2353"><span data-dcnode-id="2352" instrument_node="">
 sabbari vijayam aka</span><br data-dcnode-id="2351"><span data-dcnode-id="2350" instrument_node="">
 patto sabbannutam Sattha</span><br data-dcnode-id="2349"><span data-dcnode-id="2348" instrument_node="">
 Vande tam bodhipadapam.
</span><p data-dcnode-id="2340"><span data-dcnode-id="2347" instrument_node="">Ime ete mahabodhi</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">
 lokanathena pujita</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">
 ahampi te namassami</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">
 bodhi raja namatthu te.</span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">"I worship this Bodhi-tree seated under which the Teacher attained omniscience by overcoming all enemical forces (both subjective and objective). I too worship this great Bodhi-tree which was honored by the Leader of the World. My homage to thee, O King Bodhi."</span></p><span data-dcnode-id="2336" instrument_node="">
</span></blockquote><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">The ritual is concluded by the usual transference of merit to the deities that protect the Buddha's Dispensation.</span></p><span data-dcnode-id="2331" instrument_node="">
</span></div><span data-dcnode-id="2329" instrument_node="">
</span><div class="chapter" data-dcnode-id="2008"><span data-dcnode-id="2328" instrument_node="">
</span><h1 data-dcnode-id="2322"><a data-dcnode-id="2326" id="ch3"><span data-dcnode-id="2327" instrument_node="">3. Poya Days</span></a><span data-dcnode-id="2325" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="2323" href="#top" title="Go to top of page"><span data-dcnode-id="2324" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2320" instrument_node="">In their religious observances the Sri Lankan Buddhists have adopted from Indian tradition the use of the lunar calendar. The four phases of the moon are the pre-new-moon day, when the moon is totally invisible, the half-moon of the waxing fortnight, the full moon, and the half-moon of the waning fortnight. Owing to the moon's fullness of size as well as its effulgence, the full-moon day is treated as the most auspicious of the four phases. Hence the most important religious observances are held on full-moon days and the lesser ones in conjunction with the other phases. In the Buddhist calendar, the full moon, as the acme of the waxing process, is regarded as the culmination of the month and accordingly the period between two full moons is one lunar month.</span><a class="noteTag" data-dcnode-id="2318" href="#fn-10" id="fnt-10"><span data-dcnode-id="2319" instrument_node="">[10]</span></a></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2315" instrument_node="">The religious observance days are called </span><i data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">poya</span></i><span data-dcnode-id="2312" instrument_node=""> days. The Sinhala term </span><i data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">poya</span></i><span data-dcnode-id="2309" instrument_node=""> is derived from the Pali and Sanskrit form </span><i data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">uposatha</span></i><span data-dcnode-id="2306" instrument_node=""> (from </span><i data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">upa</span></i><span data-dcnode-id="2303" instrument_node=""> + </span><i data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">vas:</span></i><span data-dcnode-id="2300" instrument_node=""> to fast) primarily signifying "fast day." Fasting on this day was a pre-Buddhist practice among the religious sects of ancient India. While the monks use the monthly moonless day (called </span><i data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">amavaka</span></i><span data-dcnode-id="2297" instrument_node=""> in Sinhala) and the full-moon day for their confessional ritual and communal recitation of the code of discipline </span><i data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">(Patimokkha),</span></i><span data-dcnode-id="2294" instrument_node=""> the lay devotees observe the day by visiting temples for worship and also by taking upon themselves the observance of the Eight Precepts.</span></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2291" instrument_node="">A practicing Buddhist observes the </span><i data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">poya</span></i><span data-dcnode-id="2288" instrument_node=""> day by visiting a temple for the rituals of worship and, often, by undertaking the Eight Precepts. The Eight Precepts include the Five Precepts (see above, pp.5-6), with the third changed to abstinence from unchastity, and the following three additional rules:</span></p><span data-dcnode-id="2286" instrument_node="">
</span><blockquote data-dcnode-id="2278"><span data-dcnode-id="2285" instrument_node="">
 (6) to abstain from solid food after mid-day;
</span><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">(7) to abstain from dancing, singing, music, and improper shows, and from ornamenting the body with garlands, scents, unguents, etc.;</span></p><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">(8) to abstain from the use of high and luxurious beds and seats.</span></p><span data-dcnode-id="2279" instrument_node="">
</span></blockquote><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2270"><span data-dcnode-id="2276" instrument_node="">If one decides to observe the Eight Precepts, one would wake up early, bathe and clad oneself in clean white garments, and go to the nearest temple. The incumbent monk administers the precepts to the entire group assembled for the purpose. Thereafter they would spend the day according to a set timetable which would include sermons, </span><i data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">pujas,</span></i><span data-dcnode-id="2273" instrument_node=""> periods of meditation, and Dhamma discussions. At meditation centers there will be more periods of meditation and fewer sermons and </span><i data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">pujas.</span></i></p><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">The observance of the Eight Precepts is a ritualistic practice of moral discipline quite popular among the Sinhala Buddhists. While the Five Precepts serve as the moral base for ordinary people, the Eight Precepts point to a higher level of training aimed at advancement along the path of liberation. The popular practice is to observe them on full-moon days, and, among a few devout lay Buddhists, on the other phases of the moon as well.</span></p><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2258"><span data-dcnode-id="2265" instrument_node="">The </span><i data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">poya</span></i><span data-dcnode-id="2262" instrument_node=""> observance, which is as old as Buddhism itself, has been followed by the Sinhala Buddhists up to the present day, even after the Christian calendar came to be used for secular matters. Owing to its significance in the religious life of the local Buddhists, all the full-moon days have been declared public holidays by the government. Another noteworthy fact about this day is that every full-moon </span><i data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">poya</span></i><span data-dcnode-id="2259" instrument_node=""> has assumed some ritualistic significance in one way or other.</span></p><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2256" instrument_node="">The first and the foremost of the </span><i data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">poya</span></i><span data-dcnode-id="2253" instrument_node=""> holy days is the full-moon day of </span><i data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Vesak</span></i><span data-dcnode-id="2250" instrument_node=""> (May), commemorating the birth, Enlightenment, and passing away of the Buddha. The significance of Vesak is further heightened for the Sinhala Buddhists, as Sri Lankan tradition holds that it was on the Vesak Poya Day, in the eighth year after his Enlightenment, that the Buddha paid his third visit to Sri Lanka, journeying to Kelaniya on the invitation of the Naga King Maniakkhika (Mhv. i,72ff.). Consequently, Kelaniya has become a very popular place of worship and pilgrimage, the center of worship there being the celebrated </span><i data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">dagaba,</span></i><span data-dcnode-id="2247" instrument_node=""> enshrining the gem-set throne offered to the Buddha by the Nagas (dragons). An annual procession is held there to commemorate the event.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2244" instrument_node="">Both in importance and in temporal sequence, the next significant </span><i data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">poya</span></i><span data-dcnode-id="2241" instrument_node=""> is the full-moon of </span><i data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Poson</span></i><span data-dcnode-id="2238" instrument_node=""> (June), which is specially noteworthy to the Sri Lankan Buddhists as the day on which Emperor Asoka's son, the arahant Mahinda, officially introduced Buddhism to the island in the 3rd century B.C. Accordingly, in addition to the normal ritualistic observances undertaken on a </span><i data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">poya</span></i><span data-dcnode-id="2235" instrument_node=""> day, on Poson day devotees flock to Anuradhapura, the ancient capital city of the country, for it was there that arahant Mahinda converted the then ruler, King Devanampiya Tissa, and his court to Buddhism, thereby setting in motion a series of events that finally made Sri Lanka the home of Theravada Buddhism. Even today, on Poson Poya, Anuradhapura becomes the center of Buddhist activity. Mihintale, the spot where the momentous encounter between the Elder and the King took place, accordingly receives the reverential attention of the devotees. The two rituals of pilgrimage and the observance of the Eight Precepts are combined here. Processions commemorative of the event, referred to as Mihundu Peraheras, are held in various parts of the country.</span></p><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2232" instrument_node="">The next </span><i data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">poya</span></i><span data-dcnode-id="2229" instrument_node=""> is </span><i data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Esala</span></i><span data-dcnode-id="2226" instrument_node=""> (July), which commemorates several significant events in the history of Buddhism. The most prominent of these is the Buddha's preaching of his First Sermon, the Dhammacakkappavattana Sutta, to the five ascetics at the Deer Park, near Benares, thereby inaugurating his public ministry. The other noteworthy events connected with this day include the conception of the Bodhisatta in the womb of Queen Maya, his Great Renunciation, the performance of the Twin Miracle </span><i data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">(yamaka-patihariya),</span></i><span data-dcnode-id="2223" instrument_node=""> and his preaching the Abhidhamma for the first time in the Tavatimsa heaven. An additional factor that enhances the value of this </span><i data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">poya</span></i><span data-dcnode-id="2220" instrument_node=""> to Sri Lanka is the first local ordination of a Sri Lankan, when Prince Arittha, the nephew of the king, entered the Order at Anuradhapura, under arahant Mahinda, following the introduction of Buddhism. On this day there also took place the laying of the foundation for the celebrated </span><i data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">dagaba,</span></i><span data-dcnode-id="2217" instrument_node=""> the Mahathupa or the Ruwanvelisaya and also its enshrinement of relics by King Dutugemunu. It is owing to the combination of all these events that the Sinhala Buddhists fittingly observe the day ceremonially by holding Esala festivals throughout the island, giving pride of place to the internationally famous Kandy Esala Perahera.</span></p><span data-dcnode-id="2215" instrument_node="">
</span><div class="dingbat" data-dcnode-id="2213"><img alt="* * *" data-dcnode-id="2214" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accesstoinsight.org/img/dalberding8.gif&amp;raw"></div><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2198"><span data-dcnode-id="2211" instrument_node="">The term </span><i data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">perahera,</span></i><span data-dcnode-id="2208" instrument_node=""> primarily meaning "procession," signifies a popular Buddhist ceremony replete with many rituals, commencing and culminating respectively with the </span><i data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">kap</span></i><span data-dcnode-id="2205" instrument_node="">-planting and the water-cutting ceremonies. These two ceremonies are respectively the introductory and the concluding rites of the annual Esala festivals, held in July and August in various parts of the island. They are essentially connected with the Buddhist deities, either to invite their blessings or to give thanks to them for favors received. During this period every year, such religious festivals are held in almost all the religious centers of Sri Lanka where there are abodes dedicated to various Buddhist deities. However, the festival </span><i data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">par excellence</span></i><span data-dcnode-id="2202" instrument_node=""> of this category is the Kandy Esala Perahera, which is connected with the Temple of the Tooth and the abodes </span><i data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">(devalayas)</span></i><span data-dcnode-id="2199" instrument_node=""> of the four Buddhist deities, Vishnu, Kataragama, Natha, and the Goddess Pattini. The main feature of all these festivals held during this period is the elaborate procession held on the lines of the Kandy Esala Perahera.</span></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2196" instrument_node="">Both the </span><i data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">kap</span></i><span data-dcnode-id="2193" instrument_node="">-planting and water-cutting ceremonies are performed by the lay officiating priests </span><i data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">(kapuralas)</span></i><span data-dcnode-id="2190" instrument_node=""> of the </span><i data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">devalaya</span></i><span data-dcnode-id="2187" instrument_node=""> concerned, who are traditionally the experts regarding the details of their performance. These details are generally regarded as secret and are not divulged to the profane public.</span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2184" instrument_node="">The preliminary rite of </span><i data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">kap</span></i><span data-dcnode-id="2181" instrument_node="">-planting consists of planting a shaft, usually fashioned from a felled young jak tree, which must have borne no fruit. When cut, this tree exudes a white sap which is regarded as a symbol of prosperity. Even felling the tree is done with several attendant rituals at an auspicious time: the trunk is divided into four, one for each of the </span><i data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">devalayas,</span></i><span data-dcnode-id="2178" instrument_node=""> where it is carried with drums and attendance. On the day of the new moon, at an auspicious hour </span><i data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">(nakata),</span></i><span data-dcnode-id="2175" instrument_node=""> the "kaps" thus prepared are set up in the ground in a special place decorated with leaves, flowers, and fruits. For five nights small processions are conducted within the </span><i data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">devalaya</span></i><span data-dcnode-id="2172" instrument_node=""> precincts around the consecrated </span><i data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">kaps.</span></i><span data-dcnode-id="2169" instrument_node=""> Sometimes benedictory stanzas are chanted by monks.</span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2166" instrument_node="">This rite of </span><i data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">kap</span></i><span data-dcnode-id="2163" instrument_node=""> is a kind of vow that the Esala festival, consisting mainly of the </span><i data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">perahera,</span></i><span data-dcnode-id="2160" instrument_node=""> will be held; it is also an invitation to the deities to be present during the festival, providing the necessary protection for its successful performance. In this sense it is this ritual that inaugurates the festival.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2157" instrument_node="">The water-cutting ceremony </span><i data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">(diya-kapum-mangalyaya),</span></i><span data-dcnode-id="2154" instrument_node=""> which is the concluding ritual of the Esala festival, is performed in the early hours of the day following the final </span><i data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">perahera.</span></i><span data-dcnode-id="2151" instrument_node=""> The officiating lay-priest </span><i data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">(kapurala)</span></i><span data-dcnode-id="2148" instrument_node=""> proceeds on a caparisoned elephant to a selected place along a river bank. He would either go to a selected spot in the river by boat or wade through the water to a particular spot and after drawing a magic circle on the water with the sword he carries, he "cuts" the water and fills the vessel he carried there with water from that spot. Before doing so he empties the water that he took in this same manner the previous year. He then returns to the </span><i data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">devalaya,</span></i><span data-dcnode-id="2145" instrument_node=""> and the vessel of water is kept there until the following year. The ritual is repeated annually in an identical manner. This is believed to be a rain-making ceremony of sympathetic magic, which type of ritual is quite common in agrarian societies the world over. The Buddhists seem to have adopted this to suit their purposes.</span></p><span data-dcnode-id="2143" instrument_node="">
</span><div class="dingbat" data-dcnode-id="2141"><img alt="* * *" data-dcnode-id="2142" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accesstoinsight.org/img/dalberding8.gif&amp;raw"></div><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2139" instrument_node="">The annual Esala Perahera in Kandy, held in honor of the Sacred Tooth Relic of the Buddha, is the most colorful traditional procession in the country. It is the prototype of the other </span><i data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">peraheras</span></i><span data-dcnode-id="2136" instrument_node=""> held elsewhere in the island in such places as Kataragama,</span><a class="noteTag" data-dcnode-id="2134" href="#fn-11" id="fnt-11"><span data-dcnode-id="2135" instrument_node="">[11]</span></a><span data-dcnode-id="2133" instrument_node=""> Aluthnuwara, Lankatilaka, Bellanwila, Devinuwara, etc. The Kandy Perahera is itself the latest expression of the annual festival in honor of the Tooth Relic that has been held with state patronage from the time the relic was brought to Sri Lanka from India in the 4th century A.C. Although periodically there have been intermittent breaks due to unsettled political conditions, the festival was never neglected intentionally. This had been so even during colonial times. Respected as the palladium of Sinhala royalty, the Relic had been accommodated in different parts of the country, depending on the change of the capital city. Ultimately it came to stay in Kandy, which was the last royal seat of the Sinhala people.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2115"><span data-dcnode-id="2130" instrument_node="">Esala Poya assumes prominence for yet another ritual of the Sri Lankan Buddhists. This is the annual rains retreat of the monks, </span><i data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Vassa,</span></i><span data-dcnode-id="2127" instrument_node=""> which commences on the day following the Esala full moon (discussed in Chap. 8). On the next </span><i data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">poya</span></i><span data-dcnode-id="2124" instrument_node=""> day, </span><i data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Nikini</span></i><span data-dcnode-id="2121" instrument_node=""> (August), those monks who failed to commence the normal </span><i data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Vassa</span></i><span data-dcnode-id="2118" instrument_node=""> on the day following Esala Poya, are allowed to enter the "late </span><i data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Vassa."</span></i></p><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2113" instrument_node="">The </span><i data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">poya</span></i><span data-dcnode-id="2110" instrument_node=""> that follows Nikini is </span><i data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Binara</span></i><span data-dcnode-id="2107" instrument_node=""> (September), which assumes solemnity as marking the inauguration of the Order of Bhikkhunis (nuns) with the ordination of Queen Mahapajapati and her retinue. Next follows the </span><i data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Vap Poya</span></i><span data-dcnode-id="2104" instrument_node=""> (October), which concludes the final month of the three-month rains retreat. During the following month </span><i data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">kathina</span></i><span data-dcnode-id="2101" instrument_node=""> robes are offered to the monks who have duly completed the </span><i data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Vassa.</span></i><span data-dcnode-id="2098" instrument_node=""> The high esteem in which this ritual is held by the Sinhala Buddhists may be gauged from the fact that the month is popularly referred to as the "month of robes" (see Chap. 8). The November full moon, called </span><i data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Il,</span></i><span data-dcnode-id="2095" instrument_node=""> signifies the terminal point for the </span><i data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">kathina</span></i><span data-dcnode-id="2092" instrument_node=""> ritual. It is also the day for commemorating such events as the despatch of the first sixty disciples by the Buddha on missionary work, the prospective Buddha Metteyya being declared a sure Buddha-to-be by Gotama Buddha, and the passing away of the arahant Sariputta, the Buddha's foremost disciple.</span></p><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2089" instrument_node="">The </span><i data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Unduwap Poya</span></i><span data-dcnode-id="2086" instrument_node=""> that follows in December is of great moment to Sri Lanka as commemorating two memorable events connected with the visit of Theri Sanghamitta, sister of arahant Mahinda, from India in the third century B.C. (Mhv.iv,18-19). The first of these events was the arrival at Anuradhapura of a sapling of the sacred Bodhi-tree at Buddhagaya, brought to Sri Lanka by Sanghamitta. The planting of this tree is the origin of the </span><i data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Bodhi-puja</span></i><span data-dcnode-id="2083" instrument_node=""> in the country (see Chap. 4).</span></p><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2080" instrument_node="">The other memorable event commemorated by this </span><i data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">poya</span></i><span data-dcnode-id="2077" instrument_node=""> is the establishment of the Order of Nuns </span><i data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">(bhikkhuni-sasana)</span></i><span data-dcnode-id="2074" instrument_node=""> in Sri Lanka by the Theri Sanghamitta when she ordained Queen Anula and her entourage of 500 women at Anuradhapura. Records indicate that the Bhikkhuni Sangha thus established flourished during the Anuradhapura period (third century B.C. to eleventh century A.C.), but disappeared after the decline of that kingdom. Historical records are silent as to the reasons for its extinction, but they do report how the Sinhala Bhikkhuni Sangha helped in the establishment of the Order of Nuns in China.</span><a class="noteTag" data-dcnode-id="2072" href="#fn-12" id="fnt-12"><span data-dcnode-id="2073" instrument_node="">[12]</span></a><span data-dcnode-id="2071" instrument_node=""> In the 5th century a group of Sinhala nuns headed by the Bhikkhuni Devasara went to China to confer higher ordination there and the Bhikkhuni Sangha thus established survives there to this day. The Sinhala Buddhists commemorate this </span><i data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">poya</span></i><span data-dcnode-id="2068" instrument_node=""> day with </span><i data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">peraheras,</span></i><span data-dcnode-id="2065" instrument_node=""> observance of the Eight Precepts, and meetings. The day is designated Sanghamitta Day. Nowadays the </span><i data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">dasasil matas</span></i><span data-dcnode-id="2062" instrument_node=""> (ten-precept nuns) take an active part in initiating these commemorative functions.</span></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2059" instrument_node="">Next follows the </span><i data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Durutu Poya</span></i><span data-dcnode-id="2056" instrument_node=""> (January) when the Sinhala Buddhists commemorate the first visit of the Buddha to the island. According to the </span><i data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Mahavamsa,</span></i><span data-dcnode-id="2053" instrument_node=""> nine months after his Enlightenment, the Buddha visited present Mahiyangana in the Badulla District, where stands the </span><i data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">dagaba</span></i><span data-dcnode-id="2050" instrument_node=""> by that name enshrining the Buddha's hair relics and the collar bone (Mhv.i,197). The Buddhists remember the event by holding an annual </span><i data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">perahera.</span></i><span data-dcnode-id="2047" instrument_node=""> This much-venerated </span><i data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">dagaba</span></i><span data-dcnode-id="2044" instrument_node=""> is also of consequence as the first edifice of this type to be constructed here, originating the ritual of </span><i data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">dagaba</span></i><span data-dcnode-id="2041" instrument_node=""> worship in Sri Lanka.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2038" instrument_node="">The </span><i data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">poya</span></i><span data-dcnode-id="2035" instrument_node=""> that follows, </span><i data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Navam Poya</span></i><span data-dcnode-id="2032" instrument_node=""> (February), celebrates the Buddha's appointment of the two arahants, Sariputta and Moggallana, as his two chief disciples. It also marks the Buddha's decision to attain Parinibbana in three months' time. The </span><i data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Medin Poya</span></i><span data-dcnode-id="2029" instrument_node=""> in March is hallowed by the Buddha's first visit to his parental home after his Enlightenment, during which he ordained the princes Rahula, Nanda, and many others as monks. The month that follows is called </span><i data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Bak</span></i><span data-dcnode-id="2026" instrument_node=""> (pronounced like "buck"), which corresponds to April. In this month it is not the full-moon day but the new-moon day that invites attention as signalizing the Buddha's second visit to Sri Lanka, when he visited Nagadipa</span><a class="noteTag" data-dcnode-id="2024" href="#fn-13" id="fnt-13"><span data-dcnode-id="2025" instrument_node="">[13]</span></a><span data-dcnode-id="2023" instrument_node=""> on the day preceding the new-moon day </span><i data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">(amavaka:</span></i><span data-dcnode-id="2020" instrument_node=""> Mhv.i,47) in the fifth year after his Enlightenment.</span></p><span data-dcnode-id="2018" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2017" instrument_node="">The above brief account of the twelve </span><i data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">poya</span></i><span data-dcnode-id="2014" instrument_node=""> days demonstrates how the </span><i data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">poya</span></i><span data-dcnode-id="2011" instrument_node=""> day has become intimately connected with the life of the Buddha and consequently with the principal events of early Buddhist history. The Sri Lankan Buddhists, quite accustomed as they are to commemorate such events with rituals and ceremonies in full measure, have maintained these traditions up to the present.</span></p><span data-dcnode-id="2009" instrument_node="">
</span></div><span data-dcnode-id="2007" instrument_node="">
</span><div class="chapter" data-dcnode-id="1580"><span data-dcnode-id="2006" instrument_node="">
</span><h1 data-dcnode-id="2000"><a data-dcnode-id="2004" id="ch4"><span data-dcnode-id="2005" instrument_node="">4. The Pirit Ceremony</span></a><span data-dcnode-id="2003" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="2001" href="#top" title="Go to top of page"><span data-dcnode-id="2002" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1974"><i data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Pirit</span></i><span data-dcnode-id="1996" instrument_node=""> (or </span><i data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">paritta)</span></i><span data-dcnode-id="1993" instrument_node=""> is a collective term designating a set of protective chants or runes sanctioned by the Buddha for the use of both laymen and bhikkhus. </span><i data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Pirit</span></i><span data-dcnode-id="1990" instrument_node="">-chanting is a very popular ceremony among the Buddhists of Sri Lanka. As the term itself implies it means a safety rune </span><i data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">(paritta</span></i><span data-dcnode-id="1987" instrument_node=""> = protection), the ceremonial recital of which is regarded as capable of warding off all forms of evil and danger </span><i data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">(vipatti),</span></i><span data-dcnode-id="1984" instrument_node=""> including disease, the evil influence of the planets, evil spirits, etc. These may be real dangers to the safety of persons and property as well as superstitiously believed-in calamities. In addition to this curative and positive aspect, </span><i data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">pirit</span></i><span data-dcnode-id="1981" instrument_node=""> is also chanted for the attainment of general success </span><i data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">(sampatti,</span></i><span data-dcnode-id="1978" instrument_node=""> </span><i data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">siddhi).</span></i><span data-dcnode-id="1975" instrument_node=""> In the domestic and social life of the Sri Lankan Buddhist no important function can be considered complete without this ceremony. However, the ceremony may vary from the simple to the highly elaborate, depending on the occasion and the status of the sponsor.</span></p><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1972" instrument_node="">The essence of the </span><i data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">pirit</span></i><span data-dcnode-id="1969" instrument_node=""> ceremony consists in the ritualistic chanting of certain Pali texts selected from the canonical scriptures. These extracts are found collected and arranged in a particular order in the Book of Parittas, or </span><i data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Pirit-Pota,</span></i><a class="noteTag" data-dcnode-id="1965" href="#fn-14" id="fnt-14"><span data-dcnode-id="1966" instrument_node="">[14]</span></a><span data-dcnode-id="1964" instrument_node=""> known in Pali as </span><i data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Catubhanavara.</span></i><span data-dcnode-id="1961" instrument_node=""> It contains 27 extracts, including such suttas as the Ratana, Mangala, Metta, Atanatiya, etc.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1958" instrument_node="">The use of protective spells — variously known as </span><i data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">paritta,</span></i><span data-dcnode-id="1955" instrument_node=""> </span><i data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">rakkha,</span></i><span data-dcnode-id="1952" instrument_node=""> </span><i data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">mantra,</span></i><span data-dcnode-id="1949" instrument_node=""> </span><i data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">dharani,</span></i><span data-dcnode-id="1946" instrument_node=""> </span><i data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">kavaca,</span></i><span data-dcnode-id="1943" instrument_node=""> etc.</span><a class="noteTag" data-dcnode-id="1941" href="#fn-15" id="fnt-15"><span data-dcnode-id="1942" instrument_node="">[15]</span></a><span data-dcnode-id="1940" instrument_node=""> — against various dangers has been a common practice among the Indians from very early times. The Buddha himself is said to have adopted the practice on several occasions. The public recitation of the Ratana Sutta at Vesali is the best known instance. The Khandha Paritta, Atanatiya Sutta, and the Metta Sutta are some </span><i data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">parittas</span></i><span data-dcnode-id="1937" instrument_node=""> that have received the sanction of the Buddha himself. As the </span><i data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">parittas</span></i><span data-dcnode-id="1934" instrument_node=""> generally embody statements of truth as taught in Buddhism their recitation is regarded as an "asseveration of truth" </span><i data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">(saccakiriya)</span></i><span data-dcnode-id="1931" instrument_node=""> whereby evil can be averted. The Ratana Sutta is a good example of this kind of </span><i data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">paritta.</span></i><span data-dcnode-id="1928" instrument_node=""> It draws its power by wishing the listeners safety after affirming the excellent qualities of the Three Gems of Buddhism — the Buddha, Dhamma, and the Sangha. The power of virtue </span><i data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">(sila)</span></i><span data-dcnode-id="1925" instrument_node=""> contained in the Mangala Sutta and the power of loving kindness </span><i data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">(metta)</span></i><span data-dcnode-id="1922" instrument_node=""> contained in the Metta Sutta are two other aspects that make </span><i data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">pirit</span></i><span data-dcnode-id="1919" instrument_node=""> effective. The power of the sound waves resulting from the sonorous and rhythmic recitation and also from particular combinations of certain letters and syllables also play a part in exercising this beneficial influence. The vibrating sound waves produced by the sonorous and mellifluous chanting adds to the effect of the truths enunciated. The ceremonial recitation with various ritualistic observances (discussed below) and with the presence of the Triple Gem in the form of the relic casket representing the Buddha, the </span><i data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Pirit-Pota</span></i><span data-dcnode-id="1916" instrument_node=""> representing the Dhamma, and the reciting bhikkhus representing the Sangha, are additional factors that are regarded as increasing the efficacy of </span><i data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">pirit</span></i><span data-dcnode-id="1913" instrument_node=""> chanting.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1910" instrument_node="">Among the laity of Burma and of Sri Lanka the book of </span><i data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">parittas</span></i><span data-dcnode-id="1907" instrument_node=""> is more widely known than any other Pali book. Any Buddhist, educated or not, knows what it is and holds it in honor and respect. Even in ancient times the blessings of the </span><i data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">pirit</span></i><span data-dcnode-id="1904" instrument_node=""> ceremony were sought in times of national calamities just as in Vesali at the time of the Buddha. King Upatissa (4th century: Mhv. xxxvii,189), Sena II and Kassapa V (ibid, li,80; 1ii,80) are three such Sinhala monarchs who had the ceremony performed under such circumstances. The incorporation of the item called </span><i data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">dorakada-asna,</span></i><span data-dcnode-id="1901" instrument_node=""> as shall be seen, shows that it is a ritual that has gradually been elaborated in course of time.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1898" instrument_node="">The simplest form of the </span><i data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">pirit</span></i><span data-dcnode-id="1895" instrument_node=""> ceremony is held when what is called the </span><i data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">mahapirita</span></i><span data-dcnode-id="1892" instrument_node=""> (great or major </span><i data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">pirit)</span></i><span data-dcnode-id="1889" instrument_node=""> — the Mangala, Ratana, and Metta Suttas and a few benedictory stanzas — is chanted by a few monks, usually three or four, three times with a break in between. The three times may consist of the morning and evening of one day and the morning of the following day, or the evening of one day and the following morning and evening. The monks are conducted to the particular household and the chanting takes place in any room of the house according to choice.</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1886" instrument_node="">The monks sit around a table on which a clean white cloth is spread and flowers and puffed rice are strewn. A pot of filtered water is also placed in the center of the table and one end of a ball of three-stranded thread is twisted around it. The thread then passes through the hands of the reciting monks and is next held by the person or the persons on whose behalf the chanting is being done. These would be seated on a mat on the ground in front of the reciting monks. The water in the pot, designated </span><i data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">pirit</span></i><span data-dcnode-id="1883" instrument_node="">-water </span><i data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">(pirit-pan),</span></i><span data-dcnode-id="1880" instrument_node=""> and the sacred thread </span><i data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">(pirit-nula),</span></i><span data-dcnode-id="1877" instrument_node=""> become sanctified through the chanting and are used thereafter as a protection against evil. The thread is used by tying a piece around the arm or the wrist, and the water by drinking it or sprinkling it, according to requirements. In the simplest form, the ceremony is called </span><i data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">varu-pirita</span></i><span data-dcnode-id="1874" instrument_node=""> or </span><i data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">vel-pirita</span></i><span data-dcnode-id="1871" instrument_node=""> </span><i data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">(varu</span></i><span data-dcnode-id="1868" instrument_node=""> or </span><i data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">vel</span></i><span data-dcnode-id="1865" instrument_node=""> in Sinhala meaning half-day session) as the ceremony is confined only to a portion of the day and only the </span><i data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">mahapirita</span></i><span data-dcnode-id="1862" instrument_node=""> is chanted.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1859" instrument_node="">But the full-fledged </span><i data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">pirit</span></i><span data-dcnode-id="1856" instrument_node=""> ceremony is a much more elaborate ritual. This also has two main forms — one lasting for one whole night and the other for one week or even longer. The former is the more usual form as a domestic ceremony while the latter is held on special occasions, especially for public purposes. Whatever the form may be, when this kind of chanting is undertaken, a special pavilion called the </span><i data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">pirit mandapaya</span></i><span data-dcnode-id="1853" instrument_node=""> is constructed for the purpose. If the ceremony is to be performed in a private home, this pavilion is put up in a central room of the house. Generally it would measure about twelve by twelve feet and is gaily decorated with tissue paper, tinsel, etc. Its roof is covered with a white canopy from which are hung small cuttings of arecanut flowers, betel twigs, tender twigs of the iron-wood </span><i data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">(na)</span></i><span data-dcnode-id="1850" instrument_node=""> tree, etc. Two water pots on which opened coconut racemes are kept are placed on either side of the entrance. Two lighted coconut-oil lamps are also placed upon the coconut racemes.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1847" instrument_node="">In the center of the pavilion is a table (usually a round one) on which a clean white cloth is spread. Upon it are strewn puffed rice </span><i data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">(vilanda),</span></i><span data-dcnode-id="1844" instrument_node=""> broken rice (sun-sal), white mustard </span><i data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">(sudu-aba),</span></i><span data-dcnode-id="1841" instrument_node=""> jasmine buds </span><i data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">(saman kakulu),</span></i><span data-dcnode-id="1838" instrument_node=""> and panic grass </span><i data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">(itana).</span></i><span data-dcnode-id="1835" instrument_node=""> These five varieties, known as </span><i data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">lada-pas-mal,</span></i><span data-dcnode-id="1832" instrument_node=""> are regarded as having a sanctifying and purifying power in combination and are hence used for ritualistic purposes at Buddhist ceremonies. In the center of the table is the filtered water pot around which the three-stranded sacred thread is twisted. This thread is drawn round the interior of the pavilion and when the chanting commences it is held by the chanting monks and given over to be held by the person or persons for whose benefit the ceremony is held. A palm-leaf copy of the </span><i data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Pirit-Pota,</span></i><span data-dcnode-id="1829" instrument_node=""> regarded as more sanctified than the printed one, occupies a significant place on the table, representing the Dhamma, the second member of the Buddhist Trinity. Consequently, while the printed copy is used for the legibility of its script, the palm-leaf copy is regarded as indispensable on the table. The other important item that is brought inside the pavilion is the casket containing the bone-relics of the Buddha </span><i data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">(dhatu-karanduwa),</span></i><span data-dcnode-id="1826" instrument_node=""> representing the Buddha. This is placed on a separate decorated table on a side within the pavilion.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1823" instrument_node="">In the seating arrangement for the monks, two chairs, centrally placed near the table, are referred to as </span><i data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">yuga-asana</span></i><span data-dcnode-id="1820" instrument_node=""> or "seats for the duel." During a greater part of the all-night recital, two monks occupying these two seats continue the chanting, taking it in relays, instead of the full assembly. A post called </span><i data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">indra-khila</span></i><span data-dcnode-id="1817" instrument_node=""> or </span><i data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">raja-gaha</span></i><span data-dcnode-id="1814" instrument_node=""> is planted securely and fastened between these twin chairs. This post, resembling a mace in more ways than one, is attractively decorated and serves as a symbol of authority and protection for the officiating monks. This is generally erected only when the ceremony lasts for a week </span><i data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">(sati pirita)</span></i><span data-dcnode-id="1811" instrument_node=""> or longer.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1808" instrument_node="">Even when the ceremony is held in a private home, the temple is inevitably connected with every stage of the ritual. The temple authorities are responsible for assigning the required number of monks. On the evening of the day on which the chanting takes place, a few members from the particular household go to the temple in order to conduct the monks. The monks would come in a procession in single file in order of seniority, attended by drumming. At the head of the procession is carried the relic casket, borne on the head of a layman, under an umbrella or a canopy. The beating of drums continues throughout. As the monks enter the home, a layman washes their feet while another wipes them. They walk to the pavilion on a carpet of white cloth </span><i data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">(pavada)</span></i><span data-dcnode-id="1805" instrument_node=""> and take their seats around the table. The relic casket, </span><i data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Pirit-Pota,</span></i><span data-dcnode-id="1802" instrument_node=""> and the bhikkhus thus come together, representing the Triple Gem, the Buddha, the Dhamma, and the Sangha, respectively.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Before the commencement of the ceremony proper, the usual time of which is around 9 p.m., the monks are welcomed and requested to perform the ceremony by being offered a tray in which betel leaves, arecanut, cardamons, nutmeg, etc., are nicely arranged, the ingredients being those taken for the chew of betel. This invitation is usually extended by the chief householder if it is in a private home. Otherwise some leading lay devotee would do it. One of the senior monks present would accept the invitation on behalf of the entire Sangha and, in order to make the invitation formally valid, he would get the lay devotee to repeat after him the following Pali stanza requesting the monks to begin the ceremony:</span></p><span data-dcnode-id="1797" instrument_node="">
</span><blockquote data-dcnode-id="1787"><span data-dcnode-id="1796" instrument_node="">
 Vipattipatibahaya — sabbasampattisiddhiya</span><br data-dcnode-id="1795"><span data-dcnode-id="1794" instrument_node="">
 sabbadukkhavinasaya — parittam brutha uttamam
</span><p data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node="">"Please recite the noble </span><i data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">pirit</span></i><span data-dcnode-id="1790" instrument_node=""> for the avoidance of all misfortune, for the attainment of all success, and for the destruction of all suffering."</span></p><span data-dcnode-id="1788" instrument_node="">
</span></blockquote><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1785" instrument_node="">Next he would explain the significance of the occasion in a short address. This is followed by ceremonial drumming </span><i data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">(magulbera vadana),</span></i><span data-dcnode-id="1782" instrument_node=""> as a ritualistic preamble to the ceremony, serving both as an invitation to the gods and an offering of sound </span><i data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">(sadda-puja).</span></i><span data-dcnode-id="1779" instrument_node=""> The monks too commence the chanting by reciting a stanza that invites all the divine beings of the universe to the ceremony:</span></p><span data-dcnode-id="1777" instrument_node="">
</span><blockquote data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">
 Samanta cakkavalesu Atragacchantu devata Saddhammam Munirajassa Sunantu saggamokkhadam
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">"May the divine beings of the entire universe come here to hear the good doctrine of the King of Sages that confers both heavenly happiness and the freedom of Nibbana."</span></p><span data-dcnode-id="1773" instrument_node="">
</span></blockquote><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1770" instrument_node="">From the commencement of the chanting until its conclusion the following morning, the pavilion is not vacated. The </span><i data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">mahapirita</span></i><span data-dcnode-id="1767" instrument_node=""> (explained earlier), with which the chanting begins, is chanted in a rhythmic manner by all the monks, numbering about ten or twelve, seated in order of seniority. The rest of the discourses are chanted by two or four monks. The ceremony is concluded the following morning with the recital, once again, of the </span><i data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">mahapirita</span></i><span data-dcnode-id="1764" instrument_node=""> at which ceremonial drumming takes place once more. This drumming is also performed at the recital of important discourses like the Dhammacakkappavattana Sutta and the Atanatiya Sutta. Once the chanting is concluded, convenient lengths of the thread, sanctified by the chanting, are snapped off and tied around the wrists or the arms of those assembled. A little of the sanctified water is given to everyone for drinking.</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1761" instrument_node="">When the ceremony continues for several days (e.g., one week: </span><i data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">sati-pirita),</span></i><span data-dcnode-id="1758" instrument_node=""> the chanting must continue night and day without a break. When the set of suttas constituting </span><i data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">pirit</span></i><span data-dcnode-id="1755" instrument_node=""> is completed, chanting is recommenced from the beginning and in this manner they are recited over and over again until the session is concluded. Both to begin and to end the session, the </span><i data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">mahapirita</span></i><span data-dcnode-id="1752" instrument_node=""> is recited in chorus by all the monks on each day at sunrise and sunset.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1749" instrument_node="">An important ceremony connected with the seven-day (and longer) </span><i data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">pirit</span></i><span data-dcnode-id="1746" instrument_node=""> ceremony is known as </span><i data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">dorakada-asna,</span></i><span data-dcnode-id="1743" instrument_node=""> which seems to have entered the </span><i data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">pirit</span></i><span data-dcnode-id="1740" instrument_node=""> ceremony during the Kandyan period (18th century).</span><a class="noteTag" data-dcnode-id="1738" href="#fn-16" id="fnt-16"><span data-dcnode-id="1739" instrument_node="">[16]</span></a><span data-dcnode-id="1737" instrument_node=""> The theme of this ritual is to invite all the deities residing in the vicinity and request them to partake of the merits derived from the </span><i data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">pirit</span></i><span data-dcnode-id="1734" instrument_node=""> ceremony and to help dispel all evil and bring about prosperity to everybody.</span></p><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1731" instrument_node="">This ritual involves several stages commencing from the morning of the last day of the </span><i data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">pirit</span></i><span data-dcnode-id="1728" instrument_node=""> ceremony, i.e., the seventh day if it is a seven-day ceremony. The first stage is the preparation of the message to be taken to the neighbouring temple where the abodes of the gods </span><i data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">(devalayas)</span></i><span data-dcnode-id="1725" instrument_node=""> are also found. For this purpose several palm leaves (talipot), on which the message is to be written, are brought to the chanting pavilion in a ceremonial procession and handed over to a monk who has been previously selected to write the message. Next, this particular monk writes down the auspicious time for the messenger of the gods </span><i data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">(deva-dutaya)</span></i><span data-dcnode-id="1722" instrument_node=""> to set out to the </span><i data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">devalaya</span></i><span data-dcnode-id="1719" instrument_node=""> and reads it aloud, to be sanctioned by the assembled monks. Once this is done another monk, also previously selected, reads aloud a text written in a highly ornate stilted style, enumerating the temples and </span><i data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">devalayas</span></i><span data-dcnode-id="1716" instrument_node=""> at which the deities are requested to be present at the </span><i data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">pirit</span></i><span data-dcnode-id="1713" instrument_node=""> chanting that evening. This text is called the </span><i data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">vihara-asna.</span></i><span data-dcnode-id="1710" instrument_node=""> Until these preliminaries are gone through, the other monks keep holding the sacred thread. After this, the monk who was appointed to write the message begins to write it while the other monks retire.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1707" instrument_node="">The message contains the invitation — which is a command from the Sangha </span><i data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">(sanghanatti)</span></i><span data-dcnode-id="1704" instrument_node=""> and hence not to be turned down — addressed to all the deities residing at the religious places enumerated in the </span><i data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">vihara-asna</span></i><span data-dcnode-id="1701" instrument_node=""> to come and partake of the merits of the week's </span><i data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">pirit</span></i><span data-dcnode-id="1698" instrument_node=""> chanting. The message is prepared in quadruplicate. These are then hung on a pole and handed over to a young boy, specially selected for the task and richly attired as befits a messenger of the gods. Mounted on a caparisoned elephant and escorted by men with swords, he carries the message in a procession to the </span><i data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">devalaya.</span></i><span data-dcnode-id="1695" instrument_node=""> This procession is called the </span><i data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">devaduta-perahera,</span></i><span data-dcnode-id="1692" instrument_node=""> "the procession of the gods' messenger," and has many features like dancers, drummers, mask-dancers, stilt-walkers, etc.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1689" instrument_node="">At the </span><i data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">devalaya,</span></i><span data-dcnode-id="1686" instrument_node=""> the bhikkhus and the </span><i data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">deva-dutaya</span></i><span data-dcnode-id="1683" instrument_node=""> first go near a Buddha-statue and pay homage, after which they proceed to the building where the statues of the gods are and chant the Metta Sutta. The gods concerned are usually Vishnu and Kataragama (Skanda). This is followed by ceremonial drumming </span><i data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">(magul bera)</span></i><span data-dcnode-id="1680" instrument_node=""> as an invitation to the gods, and next a monk reads out the message aloud. The four messages are given to the lay officiating priest of the </span><i data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">devalaya</span></i><span data-dcnode-id="1677" instrument_node=""> (known as </span><i data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">kapurala)</span></i><span data-dcnode-id="1674" instrument_node=""> to be hung in the four cardinal directions inside the </span><i data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">devalaya.</span></i><span data-dcnode-id="1671" instrument_node=""> These are meant for the Regents of the Four Quarters — Datarattha (east), Viruda (south), Virupakkha (west), and Vessavana (north) — who are requested to come to the ceremony with their assemblies. The procession now returns.</span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1668" instrument_node="">Until the monks arrive for the </span><i data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">pirit</span></i><span data-dcnode-id="1665" instrument_node=""> chanting, the </span><i data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">devadutaya</span></i><span data-dcnode-id="1662" instrument_node=""> is kept confined and guarded. Once the monks arrive and take their seats inside the pavilion, a dialogue takes place between the </span><i data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">devadutaya</span></i><span data-dcnode-id="1659" instrument_node=""> and a monk, the purpose of which is to reveal to the assembled gathering that the task of the messenger, which was to invite the gods to partake of the merits, has been done and that all the gods have arrived. The </span><i data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">devadutaya</span></i><span data-dcnode-id="1656" instrument_node=""> makes this statement standing and guarded by the swordsmen, at the entrance </span><i data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">(dorakada)</span></i><span data-dcnode-id="1653" instrument_node=""> to the chanting pavilion within which the monks have taken their seats. It is this statement of the </span><i data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">devadutaya</span></i><span data-dcnode-id="1650" instrument_node=""> which thus comes to be called the </span><i data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">dorakada-asna,</span></i><span data-dcnode-id="1647" instrument_node=""> meaning "the message read at the threshold." The gist of this statement, written in the same kind of stilted language as the </span><i data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">vihara-asna</span></i><span data-dcnode-id="1644" instrument_node=""> referred to earlier, is that all the gods invited have arrived for the </span><i data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">pirit</span></i><span data-dcnode-id="1641" instrument_node=""> ceremony so that they may dispel all misfortune and bring about prosperity to all.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1638" instrument_node="">After the </span><i data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">dorakada-asna,</span></i><span data-dcnode-id="1635" instrument_node=""> another monk, standing within the pavilion, reads out a similar text called the </span><i data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">anusasana-asna,</span></i><span data-dcnode-id="1632" instrument_node=""> wherein all the gods assembled are requested to rejoice in the merits of the entire ceremony. This monk holds in his hand a round-handled fan made of the talipot leaf, elaborately decorated, a symbol of authority and high ecclesiastical position. These three ritualistic texts mentioned in the foregoing account (i.e., </span><i data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">vihara-asna,</span></i><span data-dcnode-id="1629" instrument_node=""> </span><i data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">dorakada-asna,</span></i><span data-dcnode-id="1626" instrument_node=""> and the </span><i data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">anusasana-asna)</span></i><span data-dcnode-id="1623" instrument_node=""> were all composed during the Kandyan period (18th century) when ceremonies and rituals, especially those connected with the gods, became more popular than during the earlier periods.</span><a class="noteTag" data-dcnode-id="1621" href="#fn-17" id="fnt-17"><span data-dcnode-id="1622" instrument_node="">[17]</span></a></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1618" instrument_node="">It is also worth noting, that this ceremony of </span><i data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">dorakada-asna</span></i><span data-dcnode-id="1615" instrument_node=""> has, in addition to its religious and ritualistic significance, considerable dramatic and theatrical value as well, for the whole event, from the preliminaries of the morning to the grand finale of the </span><i data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">anusasana</span></i><span data-dcnode-id="1612" instrument_node=""> in the evening, contains much impersonation, mime, and dialogue. In this connection we may note that as early as the time of Buddhaghosa (5th century A.C.) there were Buddhist rituals with such theatrical features as is shown by the exorcist ritual of reading the Atanatiya Sutta described in the Digha Nikaya Commentary (iii, 969-70).</span><a class="noteTag" data-dcnode-id="1610" href="#fn-18" id="fnt-18"><span data-dcnode-id="1611" instrument_node="">[18]</span></a></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1607" instrument_node="">The recital of the </span><i data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Jayamangala Gatha,</span></i><span data-dcnode-id="1604" instrument_node=""> a set of eight benedictory stanzas extolling the virtues of the Buddha, may also be cited as a popular custom partly related to the chanting of </span><i data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">pirit.</span></i><span data-dcnode-id="1601" instrument_node=""> This is usually done on important occasions like a marriage ceremony, when setting out on an important journey, or when inaugurating any venture of significance. This custom is inevitably observed at what is called the </span><i data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Poruva</span></i><span data-dcnode-id="1598" instrument_node=""> ceremony when, after a couple to be married ascends a small decorated platform </span><i data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">(poruva),</span></i><span data-dcnode-id="1595" instrument_node=""> they are blessed for future prosperity. The recital is usually done by an elderly person who, for the occasion, assumes the position of an officiating priest. At public functions a bevy of young girls clad in white uniforms also do the recital. The contents of the stanzas recited clearly show that the ritual is intended to bring happiness and prosperity to the persons concerned or the successful completion of the project. Accordingly these verses have come to be called "the stanzas of success and prosperity," </span><i data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Jayamangala Gatha,</span></i><span data-dcnode-id="1592" instrument_node=""> and have become quite popular among all sections of the Buddhists. While the origin of these stanzas is shrouded in mystery, it can be stated with certainty that they were composed in Sri Lanka by a devoted Buddhist poet. The earliest available reference to them is during the Kandyan period when they are given in a list of subjects that a monk should study. This shows that they had become well established during the 16th and 17th centuries; hence they must have been composed at least a century earlier. These stanzas are regarded as efficacious because they relate eight occasions, each based on a beautiful story, when the Buddha triumphed over his powerful opponents.</span></p><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1589" instrument_node="">The chanting of what is called </span><i data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">set-pirit</span></i><span data-dcnode-id="1586" instrument_node=""> by a few bhikkhus at the inauguration of new ventures or at receptions and farewells to important public personages has also become quite common. The chanting usually consists of a sutta like the Mangala, Ratana, or Metta Sutta, and a few benedictory stanzas. </span><i data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Set-pirit</span></i><span data-dcnode-id="1583" instrument_node=""> is broadcast by the Sri Lanka Broadcasting Corporation every morning as the first item of its programme.</span></p><span data-dcnode-id="1581" instrument_node="">
</span></div><span data-dcnode-id="1579" instrument_node="">
</span><div class="chapter" data-dcnode-id="1392"><span data-dcnode-id="1578" instrument_node="">
</span><h1 data-dcnode-id="1572"><a data-dcnode-id="1576" id="ch5"><span data-dcnode-id="1577" instrument_node="">5. Almsgiving and Funerals</span></a><span data-dcnode-id="1575" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="1573" href="#top" title="Go to top of page"><span data-dcnode-id="1574" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="1571" instrument_node="">
</span><h2 data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">1. The Almsgiving</span></h2><span data-dcnode-id="1568" instrument_node="">
