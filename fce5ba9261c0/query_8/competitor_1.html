</span><div class="chapter" data-dcnode-id="3177"><span data-dcnode-id="3197" instrument_node="">
</span><h1 data-dcnode-id="3191"><a data-dcnode-id="3195" id="pre"><span data-dcnode-id="3196" instrument_node="">Preface</span></a><span data-dcnode-id="3194" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="3192" href="#top" title="Go to top of page"><span data-dcnode-id="3193" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">The theme of this study, Buddhist ceremonies and rituals, may not appeal to the self-styled Buddhist purist who wishes to restrict the designation "Buddhism" exclusively to the teachings of the Buddhist scriptures, which he usually interprets in a narrowly intellectualist manner. The fact remains, however, that the practices and observances to be described here justly claim an integral place within the stream of living Buddhism as practiced by its adherents. Because these practices form an intimate part of the religious life for the vast majority of devout Buddhist followers, they cannot be lightly dismissed as mere secondary appendages of a "pristine" canonical Buddhism.</span></p><span data-dcnode-id="3187" instrument_node="">
</span><p data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">It has been an inevitable phenomenon in the history of religion that whenever a religion was newly introduced to a culture, its adherents assimilated it and adapted it in ways that harmonized with their own social and cultural needs. In the case of Buddhism this has happened in every country to which it spread, and Sri Lanka is no exception. The core doctrines of Buddhism, such as the Four Noble Truths, the Noble Eightfold Path, dependent arising, etc., often proved too abstruse and elevated for the ordinary populace to apply to their own religious lives. To satisfy their devotional and emotional needs, they required a system of outward acts, communally shared, by which they could express their devotion to the ideals represented by the Dhamma and absorb these ideals into the texture of their daily experience. This was how the "great tradition" of canonical Buddhism came to be complemented by the "small tradition" of popular Buddhism consisting of the rituals and ceremonies discussed in this booklet.</span></p><span data-dcnode-id="3184" instrument_node="">
</span><p data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">The purpose of the present study is to highlight this often neglected face of popular Buddhism. Though the study focuses on Buddhism as practiced in Sri Lanka, the same basic round of rituals and ceremonies, with minor variations, can be found in the other countries following Theravada Buddhism, such as Burma and Thailand. I also hope that this survey will demonstrate that the expression of Buddhist piety in devotional forms is a necessity if Buddhism is to survive at the popular level as a vital and vibrant force in the daily life of its adherents. Thus the votaries of a "pristine pure Buddhism" posited on the basis of the canonical texts should not ignore or devalue this aspect of Buddhism as an alien encroachment on the Buddha's original doctrine. Rather, they should come to recognize the devotional manifestation of Buddhism as an essential feature of the tradition, needed to mediate between its exalted ideals and the everyday concerns of the vast majority of its followers.</span></p><span data-dcnode-id="3181" instrument_node="">
</span><p class="cite" data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">A.G.S. Kariyawasam</span></p><span data-dcnode-id="3178" instrument_node="">
</span></div><span data-dcnode-id="3176" instrument_node="">
</span><div class="chapter" data-dcnode-id="3065"><span data-dcnode-id="3175" instrument_node="">
</span><h1 data-dcnode-id="3169"><a data-dcnode-id="3173" id="intro"><span data-dcnode-id="3174" instrument_node="">Introduction</span></a><span data-dcnode-id="3172" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="3170" href="#top" title="Go to top of page"><span data-dcnode-id="3171" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="3168" instrument_node="">
</span><p data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">Sri Lanka is generally regarded as the home of the pure Theravada form of Buddhism, which is based on the Pali canon. This school of Buddhism emphasizes the Four Noble Truths as the framework of Buddhist doctrine and the Noble Eightfold Path as the direct route to Nibbana, the final goal of the Teaching. However, side by side with this austere, intellectually sophisticated Buddhism of the texts, we find in Sri Lanka a warm current of devotional Buddhism practiced by the general Buddhist populace, who may have only a hazy idea of the Buddhist doctrine. Thus in practical life the gap between the "great tradition" of canonical Buddhism and the average person's world of everyday experience is bridged by a complex round of ceremonies, rituals, and devotional practices that are hardly visible within the canonical texts themselves.</span></p><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3160"><span data-dcnode-id="3164" instrument_node="">While the specific forms of ritual and ceremony in Sri Lankan popular Buddhism doubtlessly evolved over the centuries, it seems likely that this devotional approach to the Dhamma has its roots in lay Buddhist practice even during the time of the Buddha himself. Devotion being the intimate inner side of religious worship, it must have had a place in early Buddhism. For Buddhism, devotion does not mean submitting oneself to the will of a God or taking refuge in an external Saviour, but an ardent feeling of love and affection </span><i data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">(pema)</span></i><span data-dcnode-id="3161" instrument_node=""> directed towards the Teacher who shows the way to freedom from suffering. Such an attitude inspires the devotee to follow the Master's teaching faithfully and earnestly through all the hurdles that lie along the way to Nibbana.</span></p><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3142"><span data-dcnode-id="3158" instrument_node="">The Buddha often stressed the importance of </span><i data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">saddha,</span></i><span data-dcnode-id="3155" instrument_node=""> faith or confidence in him as the Perfect Teacher and in his Teaching as the vehicle to liberation from the cycle of rebirth. Unshakeable confidence </span><i data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">(aveccappasada)</span></i><span data-dcnode-id="3152" instrument_node=""> in the Triple Gem — the Buddha, the Dhamma, and the Sangha — is a mark of the noble disciple, while the Buddha once stated that those who have sufficient confidence in him, sufficient affection for him </span><i data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">(saddhamatta, pemamatta)</span></i><span data-dcnode-id="3149" instrument_node=""> are bound for heaven. Many verses of the </span><i data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Theragatha</span></i><span data-dcnode-id="3146" instrument_node=""> and </span><i data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Therigatha,</span></i><span data-dcnode-id="3143" instrument_node=""> poems of the ancient monks and nuns, convey feelings of deep devotion and a high level of emotional elation.</span></p><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">Although the canonical texts do not indicate that this devotional sensibility had yet come to expression in fully formed rituals, it seems plausible that simple ritualistic observances giving vent to feelings of devotion had already begun to take shape even during the Buddha's lifetime. Certainly they would have done so shortly after the Parinibbana, as is amply demonstrated by the funeral rites themselves, according to the testimony of the Maha-parinibbana Sutta. The Buddha also encouraged a devotional attitude when he recommended pilgrimages to the four places that can inspire a faithful devotee: the places where he was born, attained Enlightenment, preached the first sermon, and attained Parinibbana (D.ii,140).</span></p><span data-dcnode-id="3138" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3137" instrument_node="">The Buddha did discourage the wrong kind of emotional attachment to himself, as evidenced by the case of Vakkali Thera, who was reprimanded for his obsession with the beauty of the Buddha's physical presence: his was a case of misplaced devotion (S.iii,119). Ritualistic observances also pose a danger that they might be misapprehended as ends in themselves instead of being employed as means for channelling the devotional emotions into the correct path. It is when they are wrongly practiced that they become impediments rather than aids to the spiritual life. It is to warn against this that the Buddha has categorized them, under the term </span><i data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">silabbata-paramasa,</span></i><span data-dcnode-id="3134" instrument_node=""> as one of the ten fetters </span><i data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">(samyojana)</span></i><span data-dcnode-id="3131" instrument_node=""> and one of the four types of clinging </span><i data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">(upadana).</span></i><span data-dcnode-id="3128" instrument_node=""> Correctly observed, as means and not as ends, ritualistic practices can serve to generate wholesome states of mind, while certain other rituals collectively performed can serve as a means of strengthening the social solidarity among those who share the same spiritual ideals.</span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">Thus ceremonies and rituals, as external acts which complement inward contemplative exercises, cannot be called alien to or incompatible with canonical Buddhism. To the contrary, they are an integral part of the living tradition of all schools of Buddhism, including the Theravada.</span></p><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">A ritual may be defined here as an outward act performed regularly and consistently in a context that confers upon it a religious significance not immediately evident in the act itself. A composite unity consisting of a number of subordinate ritualistic acts may be called a ceremony. Such observances have become inseparable from all organized religions. And owing to the fear, awe, and respect that characterize man's religious psychology, such acts assume a solemnity and a sanctity of their own.</span></p><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">Ritual acts undertaken and performed by the Buddhists of Sri Lanka may be broadly classified under three heads:</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3112"><span data-dcnode-id="3116" instrument_node="">(i) Acts performed for the acquisition of merit (e.g., offerings made in the name of the Buddha) calculated to provide a basis for achieving Nibbana, release from the cycle of becoming </span><i data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">(samsara);</span></i><span data-dcnode-id="3113" instrument_node=""> such acts of merit are, at the same time, expected to offer semi-temporal rewards of comfort and happiness here and in the heavenly worlds in future lives. These supplementary forms of religious activity have arisen out of a natural need to augment the more austere way followed by the world-renouncing disciples.</span></p><span data-dcnode-id="3111" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3110" instrument_node="">(ii) Acts directed towards securing worldly prosperity and averting calamities through disease and unseen forces of evil, e.g., </span><i data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">pirit</span></i><span data-dcnode-id="3107" instrument_node=""> chanting, </span><i data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">bodhi-puja,</span></i><span data-dcnode-id="3104" instrument_node=""> etc.</span></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3097"><span data-dcnode-id="3101" instrument_node="">(iii) Those rituals that have been adopted from folk religion. Hence these are mainly semi-religious in character like the </span><i data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">tovil</span></i><span data-dcnode-id="3098" instrument_node=""> ceremonies. They derive their power and authority primarily through the superhuman power of the Buddha and also through the hosts of spirits, who are, as it were, commanded by invoking the power of the Buddha or of the Three Refuges — the Buddha, Dhamma and Sangha — as a whole.</span></p><span data-dcnode-id="3096" instrument_node="">
</span><p data-dcnode-id="3082"><span data-dcnode-id="3095" instrument_node="">Almost all the religious activities that have a ceremonial and a ritualistic significance are regarded as acts for the acquisition of merit (Sinh.: </span><i data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">pinkama,</span></i><span data-dcnode-id="3092" instrument_node=""> from Pali: </span><i data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">punnakamma,</span></i><span data-dcnode-id="3089" instrument_node=""> Sanskrit: </span><i data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">punyakarma).</span></i><span data-dcnode-id="3086" instrument_node=""> In this sense, all the religious activities of lay Buddhism can be explained as being oriented towards that end. Accordingly, the first two types of rituals basically have a merit-generating character and thereby receive religious sanction. For instance, the idea of acquisition of merit through a religious act and its transference to the deities and soliciting their help has the scriptural sanction of the Maha-parinibbana Sutta itself (D.ii,88-89). Here the Buddha says that wise men, when residing in a particular area, first offer alms to religious recluses and then transfer the merits to the deities of the area, who help them in return. This seems to indicate the early beginning of adoring </span><i data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">vatthu-devata</span></i><span data-dcnode-id="3083" instrument_node=""> or local deities in Buddhism.</span></p><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3070"><span data-dcnode-id="3080" instrument_node="">Merit (Pali: </span><i data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">punna:</span></i><span data-dcnode-id="3077" instrument_node=""> Sinh.: </span><i data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">pin)</span></i><span data-dcnode-id="3074" instrument_node=""> earned by the performance of a wholesome act is regarded as a sure way of obtaining a better life in the future. The performance of these is also a means of expiation in the sense that the meritorious deeds have the effect of countering and hindering the operation of unwholesome </span><i data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">kamma</span></i><span data-dcnode-id="3071" instrument_node=""> previously acquired and inherited. Thus the range of merit is very wide.</span></p><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">For the ordinary householder, Nibbana is a goal to be achieved through a gradual process of evolution extending over many lives, and therefore until he achieves that sublime state at some future date he continues to perform these acts in order to lead a happy life. All merit-generating rituals are performed mainly with this end in view.</span></p><span data-dcnode-id="3066" instrument_node="">
</span></div><span data-dcnode-id="3064" instrument_node="">
</span><div class="chapter" data-dcnode-id="2465"><span data-dcnode-id="3063" instrument_node="">
</span><h1 data-dcnode-id="3057"><a data-dcnode-id="3061" id="ch1"><span data-dcnode-id="3062" instrument_node="">1. Initiation and Worship</span></a><span data-dcnode-id="3060" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="3058" href="#top" title="Go to top of page"><span data-dcnode-id="3059" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="3056" instrument_node="">
</span><h2 data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">1. Initiation</span></h2><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3042"><span data-dcnode-id="3052" instrument_node="">Buddhism lacks any ceremony or ritual of initiation or admission like the </span><i data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">upanayana</span></i><span data-dcnode-id="3049" instrument_node=""> in Hinduism or baptism in Christianity. The traditional method of becoming a Buddhist is to repeat the formula of the Three Refuges </span><i data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">(tisarana)</span></i><span data-dcnode-id="3046" instrument_node=""> and the Five Precepts </span><i data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">(pañcasila),</span></i><span data-dcnode-id="3043" instrument_node=""> when they are formally administered by a Buddhist monk. The formula of refuge is as follows:</span></p><span data-dcnode-id="3041" instrument_node="">
</span><blockquote data-dcnode-id="3023"><span data-dcnode-id="3040" instrument_node="">
</span><i data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Buddham saranam gacchami</span></i><br data-dcnode-id="3037"><span data-dcnode-id="3036" instrument_node="">
 I go to the Buddha as my refuge.
</span><p data-dcnode-id="3031"><i data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">Dhammam saranam gacchami</span></i><br data-dcnode-id="3033"><span data-dcnode-id="3032" instrument_node="">
 I go to the Dhamma as my refuge.</span></p><span data-dcnode-id="3030" instrument_node="">
</span><p data-dcnode-id="3025"><i data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">Sangham saranam gacchami</span></i><br data-dcnode-id="3027"><span data-dcnode-id="3026" instrument_node="">
 I go to the Sangha as my refuge.</span></p><span data-dcnode-id="3024" instrument_node="">
</span></blockquote><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3011"><span data-dcnode-id="3021" instrument_node="">This avowal of confidence in the Triple Gem </span><i data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">(tiratana)</span></i><span data-dcnode-id="3018" instrument_node=""> is repeated for a second time (e.g., </span><i data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">dutiyampi Buddham saranam gacchami,</span></i><span data-dcnode-id="3015" instrument_node=""> etc.), and a third time </span><i data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">(tatiyampi).</span></i><span data-dcnode-id="3012" instrument_node=""> Next, the convert repeats in the following manner the Five Precepts which are meant to regulate his moral life:</span></p><span data-dcnode-id="3010" instrument_node="">
</span><blockquote data-dcnode-id="2981"><span data-dcnode-id="3009" instrument_node="">
 (1) </span><i data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Panatipata veramani sikkhapadam samadiyami.</span></i><span data-dcnode-id="3006" instrument_node=""> I undertake the precept to abstain from destroying life
</span><p data-dcnode-id="3001"><span data-dcnode-id="3005" instrument_node="">(2) </span><i data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Adinnadana veramani sikkhapadam samadiyami.</span></i><span data-dcnode-id="3002" instrument_node=""> I undertake the precept to abstain from taking things not given.</span></p><span data-dcnode-id="3000" instrument_node="">
</span><p data-dcnode-id="2995"><span data-dcnode-id="2999" instrument_node="">(3) </span><i data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Kamesu micchacara veramani sikkhapadam samadiyami.</span></i><span data-dcnode-id="2996" instrument_node=""> I undertake the precept to abstain from sexual misconduct.</span></p><span data-dcnode-id="2994" instrument_node="">
</span><p data-dcnode-id="2989"><span data-dcnode-id="2993" instrument_node="">(4) </span><i data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">Musavada veramani sikkhapadam samadiyami.</span></i><span data-dcnode-id="2990" instrument_node=""> I undertake the precept to abstain from false speech.</span></p><span data-dcnode-id="2988" instrument_node="">
</span><p data-dcnode-id="2983"><span data-dcnode-id="2987" instrument_node="">(5) </span><i data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">Suramerayamajjapamadatthana veramani sikkhapadam samadiyami.</span></i><span data-dcnode-id="2984" instrument_node=""> I undertake the precept to abstain from taking distilled and fermented liquors that cause intoxication and heedlessness.</span></p><span data-dcnode-id="2982" instrument_node="">
</span></blockquote><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2969"><span data-dcnode-id="2979" instrument_node="">By this method a hitherto non-Buddhist lay person becomes a lay disciple </span><i data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">(upasaka)</span></i><span data-dcnode-id="2976" instrument_node=""> of the Buddha. It has to be noted here that what is meant by taking refuge in the Buddha, the Dhamma, and the Sangha is the placing of confidence in the attainments of the Buddha as a Teacher and in the efficacy of the Dhamma as a reliable means to liberation. The term "Sangha" here refers to the </span><i data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">Ariya Sangha,</span></i><span data-dcnode-id="2973" instrument_node=""> comprising the four pairs of noble ones, i.e., the four practicing for the fruits and the four established in the fruits </span><i data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">(cattari purisayugani attha purisa-puggala).</span></i><span data-dcnode-id="2970" instrument_node=""> In this ceremony of initiation there is no recognition of salvation through the grace of a god or saviour as in theistic religions. One goes for refuge as a way of expressing one's determination to follow the Buddha's path to liberation, but one must also realize that the task of walking the path is one's own responsibility.</span></p><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2954"><span data-dcnode-id="2967" instrument_node="">While this is the method of formal admission of a new entrant into Buddhism, there are also certain ritualistic practices observed when a child is born to Buddhist parents. The baby's first outing would be to a temple. When the baby is fit to be taken out of doors the parents would select an auspicious day or a full-moon day and take the child to the nearest temple.</span><a class="noteTag" data-dcnode-id="2965" href="#fn-1" id="fnt-1"><span data-dcnode-id="2966" instrument_node="">[1]</span></a><span data-dcnode-id="2964" instrument_node=""> They would first place the child on the floor of the shrine room or in front of a statue of the Buddha for the purpose of obtaining the blessings of the Triple Gem. This is a common sight at the Dalada Maligawa — the Temple of the Sacred Tooth Relic — in Kandy. At the time of the daily religious ceremony </span><i data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">(puja)</span></i><span data-dcnode-id="2961" instrument_node=""> of the temple, one can observe how mothers hand over their babies to an officiating layman </span><i data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">(kapuva)</span></i><span data-dcnode-id="2958" instrument_node=""> inside the shrine room, who in turn keeps it for a few seconds on the floor near the Relic Chamber and hands it back to the mother. The mother accepts the child and gives a small fee to the </span><i data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">kapuva</span></i><span data-dcnode-id="2955" instrument_node=""> for the service rendered. This practice too could be described as a ritual of initiation.</span></p><span data-dcnode-id="2953" instrument_node="">
</span><h2 data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">2. Personal Worship</span></h2><span data-dcnode-id="2950" instrument_node="">
</span><p data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">For the adherent of Buddhism, the ritual of worship is essentially a respectful recognition of the greatness of the Buddha as a spiritual teacher. The ritual also implies an expression of gratitude to the Buddha for having discovered and revealed to humankind the path leading out of the mass of worldly suffering. Both these factors in combination make this ritual an expression of devotion as well.</span></p><span data-dcnode-id="2947" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2946" instrument_node="">The most common daily ritual of the Buddhist is that of personal worship, which many devout Buddhists perform daily in their homes. On the communal level the ritual is observed on the </span><i data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">poya</span></i><span data-dcnode-id="2943" instrument_node=""> days at a temple or a monastery.</span><a class="noteTag" data-dcnode-id="2941" href="#fn-2" id="fnt-2"><span data-dcnode-id="2942" instrument_node="">[2]</span></a></p><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2917"><span data-dcnode-id="2938" instrument_node="">A distinction may be made between simple respectful salutation </span><i data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">(panama</span></i><span data-dcnode-id="2935" instrument_node=""> or </span><i data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">panamana)</span></i><span data-dcnode-id="2932" instrument_node=""> and the ritualistic worship </span><i data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">(vandana)</span></i><span data-dcnode-id="2929" instrument_node=""> accompanied by offerings of increasing complexity including food, drink, and clothing. The former type is only an expression of respect and reverence as when a person clasps his hands in the gesture of worship in front of a religious symbol (e.g., a Buddha-statue, a Bodhi-tree, a </span><i data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">dagaba,</span></i><span data-dcnode-id="2926" instrument_node=""> etc.) and recites a simple phrase like the well-known </span><i data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">Namo tassa</span></i><span data-dcnode-id="2923" instrument_node=""> formula (see below); nowadays the term </span><i data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">sadhu</span></i><span data-dcnode-id="2920" instrument_node=""> has become quite popular with the Sinhala Buddhists for this purpose.</span><a class="noteTag" data-dcnode-id="2918" href="#fn-3" id="fnt-3"><span data-dcnode-id="2919" instrument_node="">[3]</span></a></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2905"><span data-dcnode-id="2915" instrument_node="">In the ritualistic form of worship the articles of offering (mainly flowers) are first respectfully placed on the altar in front of a statue of the Buddha or a </span><i data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">dagaba</span></i><span data-dcnode-id="2912" instrument_node=""> or any other place of religious significance where such worship is performed. Next, the devotee clasps his hands in the gesture of worship </span><i data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">(anjali-kamma)</span></i><span data-dcnode-id="2909" instrument_node=""> and solemnly recites various stanzas and formulas, thereby making the offerings formally valid. Every act of Buddhist worship begins with the well-known formula of homage to the Buddha, </span><i data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Namo tassa bhagavato arahato sammasambuddhassa</span></i><span data-dcnode-id="2906" instrument_node=""> ("Let my obeisance be to the Blessed One, the Honorable One, the Fully Enlightened One"), which is repeated thrice. This is followed by the Refuge formula and the Five Precepts given earlier.</span></p><span data-dcnode-id="2904" instrument_node="">
</span><p data-dcnode-id="2900"><span data-dcnode-id="2903" instrument_node="">The next step is paying homage to the Three Gems in three separate formulas, which recount nine virtues of the Buddha, six virtues of the Dhamma, and nine virtues of the Sangha. These formulas are extracted from the Pali Nikayas and have become the standard formulas with which the Three Gems are worshipped.</span><a class="noteTag" data-dcnode-id="2901" href="#fn-4" id="fnt-4"><span data-dcnode-id="2902" instrument_node="">[4]</span></a></p><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2880"><span data-dcnode-id="2898" instrument_node="">The physical posture adopted by the devotees when performing these acts of worship may vary according to the solemnity of the occasion or the degree of the devotion of the worshipper. In the most respectful form of worship, e.g., when worshipping a </span><i data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">dagaba</span></i><span data-dcnode-id="2895" instrument_node=""> in which the relics — a bone, hair, bowl, etc., of the Buddha — are enshrined, one touches the ground with five parts of the body (Sinh.: </span><i data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">pasanga pihituva,</span></i><span data-dcnode-id="2892" instrument_node=""> i.e., knees, elbows, and forehead). The two postures of squatting </span><i data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">(ukkutika)</span></i><span data-dcnode-id="2889" instrument_node=""> and kneeling (with one or both knees) are also popular. The cross-legged posture </span><i data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">(pallanka)</span></i><span data-dcnode-id="2886" instrument_node=""> and the standing position are also sometimes adopted. Whatever be the posture taken, it should be accompanied with hands clasped together in adoration (Sinh.: </span><i data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">andilibanda,</span></i><span data-dcnode-id="2883" instrument_node=""> Pali: </span><i data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">anjalim panametva).</span></i></p><span data-dcnode-id="2879" instrument_node="">
</span><p data-dcnode-id="2862"><span data-dcnode-id="2878" instrument_node="">Of the many articles of offering used at present in this kind of worship in Sri Lanka, flowers have become the most important and popular. They constitute the minimum requirement at any form of Buddhist worship. One can observe how the devotees arrange the flowers in various patterns on the altar. The color </span><i data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">(vanna),</span></i><span data-dcnode-id="2875" instrument_node=""> smell </span><i data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">(gandha),</span></i><span data-dcnode-id="2872" instrument_node=""> and quality </span><i data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">(guna)</span></i><span data-dcnode-id="2869" instrument_node=""> of the flowers are taken into account when selecting them for offering. Before being offered, the flowers are "bathed" with filtered water </span><i data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">(pan).</span></i><span data-dcnode-id="2866" instrument_node=""> Sometimes they are arranged in a tray </span><i data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">(vattiya)</span></i><span data-dcnode-id="2863" instrument_node=""> and offered. A flower's blooming upon contact with light is regarded as symbolic of the attainment of Enlightenment, hence flowers become quite a fitting article for offering to the Buddha, the Enlightened One.</span></p><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">As was mentioned earlier, an essential part of the ritual of offering flowers is the recital of the following Pali stanza, whereby the offering is made valid:</span></p><span data-dcnode-id="2858" instrument_node="">
</span><blockquote data-dcnode-id="2838"><span data-dcnode-id="2857" instrument_node="">
 Vannagandhagunopetam</span><br data-dcnode-id="2856"><span data-dcnode-id="2855" instrument_node="">
 etam kusumasantatim</span><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">
 pujayami munindassa</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">
 siripadasaroruhe.
</span><p data-dcnode-id="2843"><span data-dcnode-id="2850" instrument_node="">Pujemi Buddham kusumena 'nena</span><br data-dcnode-id="2849"><span data-dcnode-id="2848" instrument_node="">
 punnena 'metena ca hotu mokkham</span><br data-dcnode-id="2847"><span data-dcnode-id="2846" instrument_node="">
 Puppham milayati yatha idam me</span><br data-dcnode-id="2845"><span data-dcnode-id="2844" instrument_node="">
 kayo tatha yati vinasabahavam.</span></p><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">"This mass of flowers endowed with color, fragrance, and quality I offer at the lotus-like feet of the King of Sages. I worship the Buddha with these flowers: by the merit of this may I attain freedom. Even as these flowers do fade, so does my body come to destruction."</span></p><span data-dcnode-id="2839" instrument_node="">
</span></blockquote><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2832"><span data-dcnode-id="2836" instrument_node="">It is of interest to note that this stanza incorporates the Buddhist idea of the impermanence </span><i data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">(anicca)</span></i><span data-dcnode-id="2833" instrument_node=""> of all phenomena. Merit-acquisition is also regarded as contributing towards the attainment of Nibbanic freedom.</span></p><span data-dcnode-id="2831" instrument_node="">
</span><p data-dcnode-id="2823"><span data-dcnode-id="2830" instrument_node="">Another popular offering of much importance is that of lighted lamps, usually of coconut oil </span><i data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">(dipa-puja</span></i><span data-dcnode-id="2827" instrument_node=""> or </span><i data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">pahan-puja).</span></i><span data-dcnode-id="2824" instrument_node=""> As the Buddha is regarded as the dispeller of the darkness of ignorance, when lighted lamps are offered in his name this metaphorical contrast between the light of knowledge and the darkness of ignorance is taken as the theoretical basis for the ritual. This kind of symbolism being too deep for the vast majority of ordinary people, their motive for this ritual is usually the desire to acquire merit or to avert the evil influence of a bad planetary conjunction. However, it is the former idea that is implied in the traditional stanza used by the Buddhists of Sri Lanka for this offering:</span></p><span data-dcnode-id="2822" instrument_node="">
</span><blockquote data-dcnode-id="2811"><span data-dcnode-id="2821" instrument_node="">
 Ghanasarappadittena</span><br data-dcnode-id="2820"><span data-dcnode-id="2819" instrument_node="">
 dipena tamadamsina</span><br data-dcnode-id="2818"><span data-dcnode-id="2817" instrument_node="">
 tilokadipam sambuddham</span><br data-dcnode-id="2816"><span data-dcnode-id="2815" instrument_node="">
 pujayami tamonudam.
</span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">"With this lamp lit with camphor that dispels all darkness, I worship the Perfectly Enlightened One who is a lamp unto the three worlds and is the dispeller of darkness."</span></p><span data-dcnode-id="2812" instrument_node="">
</span></blockquote><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2797"><span data-dcnode-id="2809" instrument_node="">The epithets </span><i data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">tilokadipa</span></i><span data-dcnode-id="2806" instrument_node=""> ("lamp unto the three worlds") and </span><i data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">tamonuda</span></i><span data-dcnode-id="2803" instrument_node=""> ("dispeller of darkness") as applied to the Buddha are significant in this context. The stanza itself seems to testify to the popularity of the offering of camphor </span><i data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">(ghanasara)</span></i><span data-dcnode-id="2800" instrument_node=""> in early times. But nowadays, even when coconut oil has replaced camphor, the stanza has survived without change.</span><a class="noteTag" data-dcnode-id="2798" href="#fn-5" id="fnt-5"><span data-dcnode-id="2799" instrument_node="">[5]</span></a></p><span data-dcnode-id="2796" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2795" instrument_node="">The offering of lighted lamps had been a popular ritual even in ancient times. The Bodhi-tree and the </span><i data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">dagaba</span></i><span data-dcnode-id="2792" instrument_node=""> (also referred to as </span><i data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">stupa, cetiya,</span></i><span data-dcnode-id="2789" instrument_node=""> or </span><i data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">caitya)</span></i><span data-dcnode-id="2786" instrument_node=""> are the two main objects or places where the ritual is usually performed. The offering of lamps is one of the main aspects of the worship of the Bodhi-tree </span><i data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">(bodhi-puja).</span></i><span data-dcnode-id="2783" instrument_node=""> As it was under a Bodhi-tree that the Buddha attained Enlightenment, it is quite natural that lamps be lit under that tree, not only in memory of the great event, but also as a ritual whereby the devotee could expect to obtain a ray of that light of wisdom attained by the Great Sage. Thus the entire ritual becomes a spiritual exercise, the merits of which are transferred to all other beings, gods, humans, and spirits </span><i data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">(bhuta).</span></i></p><span data-dcnode-id="2779" instrument_node="">
</span><p data-dcnode-id="2766"><i data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Dagabas</span></i><span data-dcnode-id="2776" instrument_node=""> constitute another place where this popular offering is made. Consequently, along with the flower-altar, the lamp-stand too has become a necessary adjunct of the </span><i data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">dagabas.</span></i><span data-dcnode-id="2773" instrument_node=""> One can also see that the Bodhi-tree in most temples is surrounded by a platform built of brick or stone in which niches are made to hold lighted oil lamps. The niches are meant to shelter the lamps from wind and rain. In any Buddhist temple there are many other places where lamps can be lit in that way. Sometimes special lamp-stands are constructed for the purpose. Of special significance is the lamp called the </span><i data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">dolosmahe-pahana</span></i><span data-dcnode-id="2770" instrument_node=""> (twelve-month lamp), sometimes found in Buddhist temples and </span><i data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">devalayas.</span></i><span data-dcnode-id="2767" instrument_node=""> It is called thus because it is expected to keep burning all-year round.</span></p><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2754"><span data-dcnode-id="2764" instrument_node="">Special light offerings are also made on auspicious occasions. On full-moon days when devotees flock to the temples, lamps are lit in large numbers, for it is the custom among the Sri Lankan Buddhists invariably to take flowers and coconut oil on their visits to the temple as two indispensable articles of worship. There are also occasions when devotees light and offer a particular large number of lamps for special purposes, such as redeeming a vow </span><i data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">(baraya)</span></i><span data-dcnode-id="2761" instrument_node=""> or on special occasions like Vesak Day. Many Buddhists perform the ritual of light offering </span><i data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">(pahan-puja)</span></i><span data-dcnode-id="2758" instrument_node=""> to counter evil planetary influences. In order to obtain maximum results from the ritual, the devotees make it a point to purify themselves completely before attending the ceremony by bathing and wearing fresh, clean clothes. Coconut oil used as an illuminant is specially prepared for the purpose and taken separately from the coconut oil used for household purposes. Wicks are prepared from a clean, white, fresh cloth. Sometimes the inhabitants of an entire village co-operate in holding a mass-scale lamp offering. For instance, they may offer 84,000 lighted lamps in memory of the 84,000 elements of the Dhamma </span><i data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">(dhammakkhandha)</span></i><span data-dcnode-id="2755" instrument_node=""> comprising the Buddha's Teaching.</span></p><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">This important Buddhist ritual was practiced even in ancient Sri Lanka. King Dutugemunu (2nd century B.C.) is recorded to have lit one thousand lamps with ghee as the illuminant and with white wicks burning perpetually in twelve sacred places in Anuradhapura (Mhv. xxxii,37). King Vasabha (1st century A.C.) is also said to have lit one thousand oil lamps at Cetiyapabbata, Thuparama, Mahathupa (Ruvanweli-dagaba), and the Bodhi-tree (Mhv. xxxvi,80).</span></p><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">Today, this ritual has become so popular and elaborate that the annual Vesak festival commemorating the birth, Enlightenment, and Parinibbana of the Buddha has become more or less a festival of lights. Vesak lanterns of various kinds and shapes are lit in Buddhist homes on this day. Pandals well illuminated with multi-colored electric bulbs, depicting various scenes from the Master's life and from the Jataka stories, also constitute a type of light offering to the Buddha.</span></p><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2740"><span data-dcnode-id="2746" instrument_node="">Yet another aspect of the ritual of light offering is the burning of camphor near the object of worship like </span><i data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">dagabas,</span></i><span data-dcnode-id="2743" instrument_node=""> Buddha statues, etc. Camphor gives out a fragrant smell as it burns, and is also regarded as having a very pure flame, although its smoke has a strong blackening effect. Camphor-burners have been found in ancient temples, showing that this was an ancient practice.</span><a class="noteTag" data-dcnode-id="2741" href="#fn-6" id="fnt-6"><span data-dcnode-id="2742" instrument_node="">[6]</span></a></p><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2738" instrument_node="">The offering of food and drink is still another aspect of the ritual of worship. When food is offered to the Buddha in a religious place it is usually done in front of a Buddha-image. If it is the morning meal that is offered, it would be something suitable for breakfast, usually milk-rice </span><i data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">(kiribat).</span></i><span data-dcnode-id="2735" instrument_node=""> If it is lunch, it would be the usual rice-and-curry meal and is invariably offered before noon. At the Dalada Maligawa in Kandy and the Sri Mahabodhi in Anuradhapura, these rituals are performed regularly and with meticulous care and also somewhat elaborately, accompanied by other subsidiary rituals like the beating of drums. It is an important part of this ritual that whatever food is offered in this manner should be separately prepared with special care and should not be tasted before the offering. The stanza that is popularly used for the offering of food runs as follows:</span></p><span data-dcnode-id="2733" instrument_node="">
</span><blockquote data-dcnode-id="2722"><span data-dcnode-id="2732" instrument_node="">
 Adhivasetu no bhante</span><br data-dcnode-id="2731"><span data-dcnode-id="2730" instrument_node="">
 bhojanam parikappitam</span><br data-dcnode-id="2729"><span data-dcnode-id="2728" instrument_node="">
 Anukampam upadaya</span><br data-dcnode-id="2727"><span data-dcnode-id="2726" instrument_node="">
 patiganhatumuttama.
</span><p data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">"O Lord, accept with favor this food which has been ritualistically prepared. Receive it, O Noble One, out of compassion."</span></p><span data-dcnode-id="2723" instrument_node="">
</span></blockquote><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2716"><span data-dcnode-id="2720" instrument_node="">As regards the offering of drinks and beverages, it is customary to offer these prepared from fruit-juices. Unlike the solid foods, these may be offered in the afternoon, in keeping with the meal habits of the Buddhist monks. Offering of incense generally consists of joss sticks, these being the most easily available. Otherwise this offering is made by putting certain kinds of sweet-smelling powders or incense into glowing charcoal so that it smokes well. A kind of resin, known locally as </span><i data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">sambrani,</span></i><span data-dcnode-id="2717" instrument_node=""> is the variety generally used.</span></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2714" instrument_node="">The chew of betel </span><i data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">(dahat-vita)</span></i><span data-dcnode-id="2711" instrument_node=""> is yet another item of offering. This is mostly for consumption after meals, and consists of betel leaves, arecanut, and certain other items like cloves, nutmeg, cardamons, etc. which give a pleasant smell and a pungent taste when chewed. For every kind of offering there are separate stanzas like the one quoted earlier for food. These stanzas are composed in Pali, which is supposed to be the language in which the Buddha preached his doctrine.</span></p><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2708" instrument_node="">When visiting the temple the object of worship that ranks first is the </span><i data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">dagaba</span></i><span data-dcnode-id="2705" instrument_node=""> enshrining the bone-relics of the Buddha. There are three categories of worshipful objects: (i) bodily relics, consisting of the bones collected after cremation </span><i data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">(saririka);</span></i><span data-dcnode-id="2702" instrument_node=""> (ii) those articles the Buddha used, e.g., the alms-bowl, Bodhi-tree, etc. </span><i data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">(paribhogika);</span></i><span data-dcnode-id="2699" instrument_node=""> and (iii) those memorials that have been erected on his account as a mark of remembrance </span><i data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">(uddesika),</span></i><span data-dcnode-id="2696" instrument_node=""> e.g., images, paintings, etc. The devotee is expected to worship these in due order, reciting the appropriate stanzas and making at least an offering of a few flowers.</span></p><span data-dcnode-id="2694" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2693" instrument_node="">An important aspect of the worship of the </span><i data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">dagaba</span></i><span data-dcnode-id="2690" instrument_node=""> and the Bodhi-tree is the custom of circumambulation </span><i data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">(padakkhina)</span></i><span data-dcnode-id="2687" instrument_node=""> as a mark of respect. Usually three rounds are done, always keeping the object of worship to the right side and with the hands clasped together in adoration. As regards </span><i data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">dagaba</span></i><span data-dcnode-id="2684" instrument_node=""> worship in Sri Lanka, the local Buddhists have a separate stanza for worshipping each of the sixteen sacred places hallowed by the Lord Buddha on his three visits to the island. There is also a popular stanza that covers in a general manner all the three categories of worshipful objects mentioned above:</span></p><span data-dcnode-id="2682" instrument_node="">
</span><blockquote data-dcnode-id="2671"><span data-dcnode-id="2681" instrument_node="">
 Vandami cetiyam sabbam</span><br data-dcnode-id="2680"><span data-dcnode-id="2679" instrument_node="">
 sabbathanesu patitthitam,</span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">
 saririkadhatu mahabodhim</span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">
 buddharupam sakalam sada.
</span><p data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">"Forever do I worship all the dagabas situated all over, all the bodily relics, the Mahabodhi (tree), and Buddha-images."</span></p><span data-dcnode-id="2672" instrument_node="">
</span></blockquote><span data-dcnode-id="2670" instrument_node="">
</span><p data-dcnode-id="2639"><span data-dcnode-id="2669" instrument_node="">The worship of the </span><i data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">dagaba</span></i><span data-dcnode-id="2666" instrument_node=""> or </span><i data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">stupa</span></i><span data-dcnode-id="2663" instrument_node=""> is an important merit-acquiring act of devotional Buddhism in Sri Lanka as also in other Buddhist lands. The first such </span><i data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">dagaba</span></i><span data-dcnode-id="2660" instrument_node=""> to be constructed after the official introduction of Buddhism into the country by the arahant Mahinda was the Thuparama at Anuradhapura, which enshrines the collar-bone of the Buddha. It was constructed by the first Buddhist ruler of Sri Lanka, King Devanampiya Tissa, in the 3rd century B.C. Since then </span><i data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">dagabas</span></i><span data-dcnode-id="2657" instrument_node=""> have become so popular among the local Buddhists that almost every village temple has a </span><i data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">dagaba</span></i><span data-dcnode-id="2654" instrument_node=""> as an indispensable feature. A special ritual connected with the </span><i data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">dagaba</span></i><span data-dcnode-id="2651" instrument_node=""> is the enshrining of relics, which is done with much ceremony at a specially selected astrologically auspicious moment called </span><i data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">nakata</span></i><span data-dcnode-id="2648" instrument_node=""> (Skt. </span><i data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">naksatra).</span></i><span data-dcnode-id="2645" instrument_node=""> A similar ritual is that of pinnacle-setting </span><i data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">(kot-palandavima),</span></i><span data-dcnode-id="2642" instrument_node=""> which is the concluding stage in the construction of a </span><i data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">dagaba.</span></i></p><span data-dcnode-id="2638" instrument_node="">
</span><p data-dcnode-id="2627"><span data-dcnode-id="2637" instrument_node="">It should be mentioned here that scriptural sanction for </span><i data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">dagaba</span></i><span data-dcnode-id="2634" instrument_node=""> worship is found in the words of the Buddha himself in the Maha-parinibbana Sutta (D.ii,142), where he has enumerated four categories of individuals worthy of </span><i data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">dagabas.</span></i><span data-dcnode-id="2631" instrument_node=""> These are the Tathagata, a Paccekabuddha, a disciple of the Tathagata, and a universal monarch </span><i data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">(raja cakkavattin).</span></i><span data-dcnode-id="2628" instrument_node=""> The worship and offerings made to the Buddha's body after his passing away may also be cited as an instance in this connection.</span></p><span data-dcnode-id="2626" instrument_node="">
</span><p data-dcnode-id="2615"><span data-dcnode-id="2625" instrument_node="">The most important item that comes within the </span><i data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">uddesika</span></i><span data-dcnode-id="2622" instrument_node=""> kind of sacred object is the Buddha-image, which is found in every temple in its image-house </span><i data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">(viharage).</span></i><span data-dcnode-id="2619" instrument_node=""> In addition to the central image or images, the inside walls of the temple — and sometimes the ceiling as well — are covered with paintings depicting events from the Buddha's life, as well as from his past lives as a Bodhisatta, recorded in the Jataka stories. An important ceremony associated with the Buddha-image is the ritual of painting its eyes </span><i data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">(netra-pinkama),</span></i><span data-dcnode-id="2616" instrument_node=""> which is performed with much care on an auspicious occasion as the last item of its construction. Until this is done the image is not considered an adequate representation of the Buddha.</span></p><span data-dcnode-id="2614" instrument_node="">
</span><h2 data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">3. Group Worship</span></h2><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2600"><span data-dcnode-id="2610" instrument_node="">Collective worship of the Buddha is generally performed in a public place of worship so that anyone who wishes may participate: in a temple before the shrine room, at a </span><i data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">dagaba,</span></i><span data-dcnode-id="2607" instrument_node=""> a Bodhi-tree, or any other such place. The devotees stand in a row in front of the place of worship and pass the items of offering from hand to hand towards the shrine room, </span><i data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">dagaba,</span></i><span data-dcnode-id="2604" instrument_node=""> or the Bodhi-tree. These offerings usually consist of bowls or vases of flowers, incense, joss sticks, beverages, fruit drinks, medicinal items, oil-lamps, etc. Here no distinction of age, position, or sex is observed. All participate in a common act of merit </span><i data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">(pinkama).</span></i><span data-dcnode-id="2601" instrument_node=""> A bhikkhu or a number of bhikkhus may sometimes head the line.</span></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2582"><span data-dcnode-id="2598" instrument_node="">The commonest of the </span><i data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Buddha-pujas</span></i><span data-dcnode-id="2595" instrument_node=""> is the one performed in the evening, around 6 p.m., known as the </span><i data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">gilampasa Buddha-puja</span></i><span data-dcnode-id="2592" instrument_node=""> or the Buddha-offering consisting of medicaments and beverages. If the </span><i data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Buddha-puja</span></i><span data-dcnode-id="2589" instrument_node=""> is done in the morning it would be one consisting of milk-rice </span><i data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">(kiri-ahara)</span></i><span data-dcnode-id="2586" instrument_node=""> or any other item of food suitable for breakfast. The mid-day food </span><i data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">(dana)</span></i><span data-dcnode-id="2583" instrument_node=""> also may be offered in this manner. The mid-day meal is offered to the Buddha when lay people bring food to the monastery to offer as alms to the bhikkhus. First, under the guidance of a bhikkhu, they perform the offering to the Buddha, who is represented symbolically by relics and an image; thereafter the food is offered to the resident bhikkhus. It is the established tradition that in whatever circumstances alms are offered to the bhikkhus, the first portions are offered to the Buddha beforehand. The variations in the kinds of food offered are in keeping with the meal habits of the Buddha and his monk-disciples, who refrain from taking solid food and milk-foods after mid-day.</span></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2580" instrument_node="">Once the offerings are placed in the appropriate place, lamps lit, and incense burnt, stanzas are recited for each kind of offering made so that the offerings become valid. This is done by a bhikkhu who first administers the Refuges and Precepts (explained earlier) and then recites the relevant stanzas (in Pali) aloud, while the other participants, with their hands clasped in adoration, repeat them in chorus after the bhikkhu. Sometimes this kind of public </span><i data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Buddha-puja</span></i><span data-dcnode-id="2577" instrument_node=""> is accompanied by drumming and horns, called </span><i data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">hevisi-puja</span></i><span data-dcnode-id="2574" instrument_node=""> or offering of music, which usually accompanies many Buddhist functions. As the final item of the programme, one of the participating bhikkhus delivers a short sermon explaining the significance of the occasion.</span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2571" instrument_node="">It may also be mentioned here that this kind of public </span><i data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">puja</span></i><span data-dcnode-id="2568" instrument_node=""> is performed as a general act of merit-acquisition on religiously important days such as the full-moon days or in remembrance of important dead personages. In the latter case the ritual is held on the death anniversary of the person concerned. It is believed that the dead person can partake of the merits transferred to him </span><i data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">(pattidana)</span></i><span data-dcnode-id="2565" instrument_node=""> from his new existence and thereby obtain relief from any unfortunate realm in which he might have been born. If the ritual is performed for such a purpose, the participating monk would specially mention this fact and transfer the merits earned.</span></p><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2555"><span data-dcnode-id="2562" instrument_node="">Whatever be the purpose for which the ceremony is held, the concluding part is marked by certain features which are of further interest. One is the usual practice of the transference of merit to all beings, including gods and spirits, by reciting the appropriate stanzas. Another is the general aspiration </span><i data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">(patthana)</span></i><span data-dcnode-id="2559" instrument_node=""> that the participants make to the effect that by the merits earned from the ritual they may not be born into the company of foolish and unworthy friends but into the company of wise and virtuous men until they attain Nibbana. They also do not fail to add the final attainment of Nibbana to this list </span><i data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">(idam me punnam asavakkhayavaham hotu:</span></i><span data-dcnode-id="2556" instrument_node=""> "May this merit bring about the extinction of defilements in me").</span></p><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Yet another popular aspiration which has a greater social significance is the following:</span></p><span data-dcnode-id="2551" instrument_node="">
</span><blockquote data-dcnode-id="2538"><span data-dcnode-id="2550" instrument_node="">
 Devo vassatu kalena — sassasampatti hotu ca</span><br data-dcnode-id="2549"><span data-dcnode-id="2548" instrument_node="">
 phito bhavatu loko ca — raja bhavatu dhammiko.
</span><p data-dcnode-id="2540"><span data-dcnode-id="2547" instrument_node="">"May the rains come in time</span><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">
 So that the harvests may be abundant:</span><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">
 May the world be prosperous,</span><br data-dcnode-id="2542"><span data-dcnode-id="2541" instrument_node="">
 May the rulers be righteous."</span></p><span data-dcnode-id="2539" instrument_node="">
</span></blockquote><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">The ritual is concluded by asking for pardon for whatever lapses may have occurred inadvertently:</span></p><span data-dcnode-id="2534" instrument_node="">
</span><blockquote data-dcnode-id="2527"><span data-dcnode-id="2533" instrument_node="">
 Kayena vaca cittena pamadena maya katam</span><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">
 accayam khama me bhante bhuripanna tathagata.
</span><p data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">"O Lord, Tathagata of extensive wisdom, may you excuse me for whatever transgressions might have been done by me through body, speech, or mind due to negligence."</span></p><span data-dcnode-id="2528" instrument_node="">
</span></blockquote><span data-dcnode-id="2526" instrument_node="">
</span><p data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Sometimes a similar request is made to the Dhamma and the Sangha as well. However, as the idea of pardoning one's sins is foreign to Buddhism, this kind of request would be meaningful only if the devotee does so with full understanding as an expiatory act, as a means of self-reformation, for the Buddha, unlike the God of theistic religions, cannot forgive sins.</span></p><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2522" instrument_node="">Another kind of </span><i data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Buddha-puja</span></i><span data-dcnode-id="2519" instrument_node=""> is the one regularly done in temples and Buddhist </span><i data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">devalayas.</span></i><span data-dcnode-id="2516" instrument_node=""> It is the daily offering of food and drink </span><i data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">(murutan puja)</span></i><span data-dcnode-id="2513" instrument_node=""> made to the Buddha by the temple authorities. At the Dalada Maligawa (Temple of the Tooth) in Kandy and the Sri Mahabodhi at Anuradhapura offerings of this kind are made on a solemn and grand scale. These two places assume this significance because they are the two most deeply venerated sacred places for the Buddhists of Sri Lanka. The breakfast, noon meal, and the evening drinks are all offered regularly at fixed hours accompanied by drumming and horn playing </span><i data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">(tevava).</span></i><span data-dcnode-id="2510" instrument_node=""> Often, the public also make their own offerings.</span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2497"><span data-dcnode-id="2507" instrument_node="">Another important Buddhist ritual is the honoring of the Buddha with what appears to be a relic of the musical performance held in order to revere and pay homage to the sacred memory of the Master. The historical beginning of this form of worship can be traced as far back as the time of the Buddha. A passage in the Maha-parinibbana Sutta (D.ii,159) records that after his passing away, while the body of the Buddha was lying in state for seven days at Kusinara in the capital of the Mallas, complete musical performances inclusive of dance, song, and orchestration </span><i data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">(nacca, gita, vadita)</span></i><span data-dcnode-id="2504" instrument_node=""> were held in his honor. This undoubtedly was an unreserved expression by the lay patrons of their deep veneration for the Master. Of this kind of offering, all that seems to have survived is drumming and some light dancing engaged in by the drummers themselves to the drum-beat and horns. In Sri Lanka the ritual is performed by the professionals belonging to the drummer </span><i data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">(berava)</span></i><span data-dcnode-id="2501" instrument_node=""> caste and as an offering it is popularly known as </span><i data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">sabda-puja</span></i><span data-dcnode-id="2498" instrument_node=""> or the "offering of sound."</span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2476"><span data-dcnode-id="2495" instrument_node="">This orchestration is collectively called </span><i data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">hevisi</span></i><span data-dcnode-id="2492" instrument_node=""> and usually consists of two drums (called </span><i data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">davul),</span></i><span data-dcnode-id="2489" instrument_node=""> a twin-drum with one face for each and turned upwards </span><i data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">(surappattuwa</span></i><span data-dcnode-id="2486" instrument_node=""> or </span><i data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">tammattama),</span></i><span data-dcnode-id="2483" instrument_node=""> and a horn-like instrument called </span><i data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">horanava</span></i><span data-dcnode-id="2480" instrument_node=""> referred to earlier. Drumming of this type, with a bigger number of drummers, is an essential part of Buddhist processions as well. This kind of drumming also takes place at other Buddhist ceremonies, such as </span><i data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">pirit</span></i><span data-dcnode-id="2477" instrument_node=""> chanting and alms-giving, to be described below.</span></p><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2467"><span data-dcnode-id="2474" instrument_node="">At important temples where offerings of food are made to the Buddha and the deities at meal times, drumming is performed to coincide with the offering and continues until the ritual of offering is over. This kind of regular service is known as </span><i data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">tevava.</span></i><span data-dcnode-id="2471" instrument_node=""> The ritual may also be held on Poya days, especially the full-moon day, in temples as a special offering to the Buddha. An important point to be noted in this </span><i data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">pujava</span></i><span data-dcnode-id="2468" instrument_node=""> is that while the other kinds of offering are made by the worshipper himself, in this case he hires professionals to make the offering on his behalf. But in big temples like the Dalada Maligawa at Kandy, payments in money are not usually made as the drummers have the hereditary right to the tenure of the temple lands in return for which these services are performed.</span></p><span data-dcnode-id="2466" instrument_node="">
</span></div><span data-dcnode-id="2464" instrument_node="">
</span><div class="chapter" data-dcnode-id="2330"><span data-dcnode-id="2463" instrument_node="">
</span><h1 data-dcnode-id="2457"><a data-dcnode-id="2461" id="ch2"><span data-dcnode-id="2462" instrument_node="">2. The Bodhi-Puja</span></a><span data-dcnode-id="2460" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="2458" href="#top" title="Go to top of page"><span data-dcnode-id="2459" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2455" instrument_node="">The veneration of the Bodhi-tree (pipal tree: </span><i data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">ficus religiosa)</span></i><span data-dcnode-id="2452" instrument_node=""> has been a popular and a widespread ritual in Sri Lanka from the time a sapling of the original Bodhi-tree at Buddhagaya (under which the Buddha attained Enlightenment) was brought from India by the Theri Sanghamitta and planted at Anuradhapura during the reign of King Devanampiya Tissa in the third century B.C. Since then a Bodhi-tree has become a necessary feature of every Buddhist temple in the island.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2449" instrument_node="">The ritualistic worship of trees as abodes of tree deities </span><i data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">(rukkha-devata)</span></i><span data-dcnode-id="2446" instrument_node=""> was widely prevalent in ancient India even before the advent of Buddhism. This is exemplified by the well-known case of Sujata's offering of milk-rice to the Bodhisatta, who was seated under a banyan tree on the eve of his Enlightenment, in the belief that he was the deity living in that tree. By making offerings to these deities inhabiting trees the devotees expect various forms of help from them. The practice was prevalent in pre-Buddhist Sri Lanka as well. According to the </span><i data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Mahavamsa,</span></i><span data-dcnode-id="2443" instrument_node=""> King Pandukabhaya (4th century B.C.) fixed a banyan tree near the western gate of Anuradhapura as the abode of Vessavana, the god of wealth and the regent of the North as well as the king of the </span><i data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">yakkhas.</span></i><span data-dcnode-id="2440" instrument_node=""> The same king set apart a palmyra palm as the abode of </span><i data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">vyadha-deva,</span></i><span data-dcnode-id="2437" instrument_node=""> the god of the hunt (Mhv. x,89, 90).</span></p><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2434" instrument_node="">After the introduction of the Bodhi-tree, this cult took a new turn. While the old practice was not totally abandoned, pride of place was accorded to the worship of the pipal tree, which had become sacred to the Buddhists as the tree under which Gotama Buddha attained Enlightenment. Thus there is a difference between the worship of the Bodhi-tree and that of other trees. To the Buddhists, the Bodhi-tree became a sacred object belonging to the </span><i data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">paribhogika</span></i><span data-dcnode-id="2431" instrument_node=""> group of the threefold division of sacred monuments,</span><a class="noteTag" data-dcnode-id="2429" href="#fn-7" id="fnt-7"><span data-dcnode-id="2430" instrument_node="">[7]</span></a><span data-dcnode-id="2428" instrument_node=""> while the ordinary veneration of trees, which also exists side-by-side with the former in Sri Lanka, is based on the belief already mentioned, i.e., that there are spirits inhabiting these trees and that they can help people in exchange for offerings. The Buddhists also have come to believe that powerful Buddhist deities inhabit even the Bodhi-trees that receive worship in the purely Buddhist sense. Hence it becomes clear that the reverence shown to a tree is not addressed to the tree itself. However, it also has to be noted that the Bodhi-tree received veneration in India even before it assumed this Buddhist significance;</span><a class="noteTag" data-dcnode-id="2426" href="#fn-8" id="fnt-8"><span data-dcnode-id="2427" instrument_node="">[8]</span></a><span data-dcnode-id="2425" instrument_node=""> this practice must have been based on the general principle of tree worship mentioned above.</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2422" instrument_node="">Once the tree assumed Buddhist significance its sanctity became particularized, while the deities inhabiting it also became associated with Buddhism in some form. At the same time, the tree became a symbol representing the Buddha as well. This symbolism was confirmed by the Buddha himself when he recommended the planting of the Ananda Bodhi-tree at Jetavana for worship and offerings during his absence (see J.iv,228f.). Further, the place where the Buddha attained Enlightenment is mentioned by the Buddha as one of the four places of pilgrimage that should cause serene joy in the minds of the faithful (D.ii,140). As Ananda Coomaraswamy points out, every Buddhist temple and monastery in India once had its Bodhi-tree and flower altar as is now the case in Sri Lanka.</span><a class="noteTag" data-dcnode-id="2420" href="#fn-9" id="fnt-9"><span data-dcnode-id="2421" instrument_node="">[9]</span></a></p><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2413"><span data-dcnode-id="2417" instrument_node="">King Devanampiya Tissa, the first Buddhist king of Sri Lanka, is said to have bestowed the whole country upon the Bodhi-tree and held a magnificent festival after planting it with great ceremony. The entire country was decorated for the occasion. The </span><i data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Mahavamsa</span></i><span data-dcnode-id="2414" instrument_node=""> refers to similar ceremonies held by his successors as well. It is said that the rulers of Sri Lanka performed ceremonies in the tree's honor in every twelfth year of their reign (Mhv. xxxviii,57).</span></p><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2411" instrument_node="">King Dutugemunu (2nd century B.C.) performed such a ceremony at a cost of 100,000 pieces of money (Mhv. xxviii,1). King Bhatika Abhaya (1st century A.C.) held a ceremony of watering the sacred tree, which seems to have been one of many such special </span><i data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">pujas.</span></i><span data-dcnode-id="2408" instrument_node=""> Other kings too, according to the </span><i data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Mahavamsa,</span></i><span data-dcnode-id="2405" instrument_node=""> expressed their devotion to the Bodhi-tree in various ways (see e.g., Mhv. xxxv,30; xxxvi, 25, 52, 126).</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">It is recorded that forty Bodhi-saplings that grew from the seeds of the original Bodhi-tree at Anuradhapura were planted at various places in the island during the time of Devanampiya Tissa himself. The local Buddhists saw to it that every monastery in the island had its own Bodhi-tree, and today the tree has become a familiar sight, all derived, most probably, from the original tree at Anuradhapura through seeds. However, it may be added here that the notion that all the Bodhi-trees in the island are derived from the original tree is only an assumption. The existence of the tree prior to its introduction by the Theri Sanghamitta cannot be proved or disproved.</span></p><span data-dcnode-id="2400" instrument_node="">
