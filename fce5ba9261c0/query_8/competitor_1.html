</span><p data-dcnode-id="693"><span data-dcnode-id="706" instrument_node="">By </span><i data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">devala</span></i><span data-dcnode-id="703" instrument_node=""> offering is meant the offering of food and drink as well as gifts of cloth, coins, gold, and silver often accompanied by eulogies addressed to the particular resident deity and recited by the </span><i data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">kapurala.</span></i><span data-dcnode-id="700" instrument_node=""> In many Buddhist temples in Sri Lanka there are </span><i data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">devalayas</span></i><span data-dcnode-id="697" instrument_node=""> dedicated to various deities. </span><i data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Devala</span></i><span data-dcnode-id="694" instrument_node="">-worship of this type is a ritual that has gained popularity among the local Buddhists since the Polonnaruwa period (12th century). In the present day it has acquired a vital place in the religious life of the Buddhist masses. This is one of the aspects by which the "great tradition" of Nikaya Buddhism has been supplemented by popular elements. This shows that if Buddhism is to prevail as a living force among all classes of its adherents, it has to make provision for the popular demands related to the day-to-day life of the common populace.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="691" instrument_node="">It is customary for many Sri Lankan Buddhists to visit a </span><i data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">devalaya</span></i><span data-dcnode-id="688" instrument_node=""> of one of the deities and make a vow that if the problem at hand (i.e., illness, enemies, etc.) is solved, they will make an offering to the deity concerned. Offerings are made even without such a special request. Whatever the case may be, this practice has become a ritual of propitiation through the </span><i data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">kapuralas.</span></i></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="683" instrument_node="">The main duties of the </span><i data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">kapuralas</span></i><span data-dcnode-id="680" instrument_node=""> are to look after the </span><i data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">devalayas</span></i><span data-dcnode-id="677" instrument_node=""> in their charge, to perform the prescribed rituals, and to offer in the inner shrine the offerings brought by devotees. The </span><i data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">kapurala</span></i><span data-dcnode-id="674" instrument_node=""> is given a fee for his services. Once the ritual is over, a part of the offerings is given back to the devotee for him to take home and partake of as having a sacramental value. The offerings normally consist of milk-rice, coconuts, betel, camphor, joss-sticks, fruits, along with flowers, garlands, flags, etc. All these are arranged in an orderly manner in a basket or tray and handed over respectfully to the </span><i data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">kapurala,</span></i><span data-dcnode-id="671" instrument_node=""> who takes it inside and offers it at the statue of the main deity inside the inner room. The devotees wait outside with clasped hands while the </span><i data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">kapurala</span></i><span data-dcnode-id="668" instrument_node=""> makes his pleadings on their behalf.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="665" instrument_node="">The statement he recites, called </span><i data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">yatikava</span></i><span data-dcnode-id="662" instrument_node=""> in Sinhala, is a panegyric of the deity concerned and it constitutes a humble and respectful request to bring succour to the devotee in his particular predicament. After this the </span><i data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">kapurala</span></i><span data-dcnode-id="659" instrument_node=""> emerges from the inner shrine room and blesses the devotees by using his thumb to place on their forehead a mark of a paste made from saffron, sandalwood, and other ingredients. This mark, the symbol of sanctification, is known as the </span><i data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">tilaka.</span></i></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">This form of ritualistic propitiation of deities is a clear adaptation of the Hindu system where the very same method is followed, though more elaborately.</span></p><span data-dcnode-id="652" instrument_node="">
</span><h2 data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">2. The Gods</span></h2><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="639"><b data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Kataragama.</span></b><span data-dcnode-id="646" instrument_node=""> </span><i data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Devalayas</span></i><span data-dcnode-id="643" instrument_node=""> dedicated to the different deities are scattered all over the island. God Kataragama (Skanda) in southern Sri Lanka is by far the most popular, as he is considered to be the most powerful deity capable of granting the requests of the worshipper. It is for this reason that he has acquired territorial rights throughout the island. </span><i data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Devalayas</span></i><span data-dcnode-id="640" instrument_node=""> dedicated to him are found in many places in the island, some of which are maintained by the Hindus.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="625"><b data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Ganesha.</span></b><span data-dcnode-id="635" instrument_node=""> The elephant-shaped god Ganesha, regarded as the god of wisdom and the remover of obstacles, is also very popular among the Buddhists under the names Ganapati or Gana-deviyo. He is worshipped as the chief of obstacles (Vighnesvara) because it is believed that he is responsible for creating and removing obstracles. He does this through troops of inferior deities or demi-gods considered as attendants of Siva, present almost everywhere, who are under his command. It is in this sense that he is called Gana-pati (chief of hosts), which is the epithet popular among the Buddhists. The </span><i data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">devalayas</span></i><span data-dcnode-id="632" instrument_node=""> dedicated to him are mostly run by the Hindus. The Buddhists worship him either through his statues, found in many Buddhists temples, or by visiting the Hindu </span><i data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">kovils</span></i><span data-dcnode-id="629" instrument_node=""> dedicated to him. As the god of wisdom and of learning, he is propitiated at the time a child first reads the alphabet. As the chief of obstacles, as their creator as well as remover, the Hindus begin their </span><i data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">devala</span></i><span data-dcnode-id="626" instrument_node="">-ritual by making the first offering to him.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="623" instrument_node="">Another popular aspect of his worship in some parts of Sri Lanka can be observed along the main roads, especially in the North-Central Province, where his statue is placed near trees and propitiated by travelers so that they may have a safe journey. The propitiation usually consists of breaking a coconut in his name, offering a coin </span><i data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">(pandura),</span></i><span data-dcnode-id="620" instrument_node=""> etc.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="606"><b data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Natha.</span></b><span data-dcnode-id="615" instrument_node=""> Natha is purely a Buddhist god, apparently the local counterpart of the all-compassionate Mahayana Bodhisattva Avalokitesvara. He is referred to in Sri Lanka by the abbreviated form Natha. His cult, as that of Natha, had become quite popular during the Kotte period (14th and 15th centuries), while references to him are found as early as the 9th and 10th centuries as shown by archaelogical evidence. The center of the cult was Totagamuwa near Hikkaduwa in the Galle District. Two of the more ancient </span><i data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">devalayas</span></i><span data-dcnode-id="612" instrument_node=""> dedicated to this deity are found at Kandy and at Vagiriya. The premises of the Kandy </span><i data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">devalaya,</span></i><span data-dcnode-id="609" instrument_node=""> opposite the Temple of the Tooth, are considered especially lucky and sacred, for the important royal rites like choosing a name for the king, putting on the royal sword, etc., were held there. It was Natha's all-pervading compassion that seems to have been appealed to by the local devotees.</span><a class="noteTag" data-dcnode-id="607" href="#fn-30" id="fnt-30"><span data-dcnode-id="608" instrument_node="">[30]</span></a></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="595"><b data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Vishnu.</span></b><span data-dcnode-id="602" instrument_node=""> The important Hindu god Vishnu has also assumed a special Buddhist significance in the island. He is identified with the god Uppalavanna of the </span><i data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Mahavamsa,</span></i><span data-dcnode-id="599" instrument_node=""> to whom Sakka, the king of the gods, is said to have entrusted the guardianship of Sri Lanka at the request of the Buddha before his passing away. This god is said to have arrived in the island to fulfill this mission. The name Uppalavanna means "the color of the blue water-lily." As Vishnu is of the same color, Uppalavanna became identified with Vishnu, and in the wake of the Mahavamsa tradition, he became, as Vishnu, the protector of the Buddha-sasana in Sri Lanka. The calculated omission of the name Vishnu in the </span><i data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Mahavamsa</span></i><span data-dcnode-id="596" instrument_node=""> in this connection may be viewed as an attempt at total localization of the divinity with a view to harmonize him with the cultural fabric of the island. His main shrine is at Devinuwara (Dondra), at the southern tip of the island, where an annual Esala (July-August) festival is held in his honor. If the identification is correct his cult can be traced to the earliest phase of the history of the island and has been popular up to the present day.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="575"><b data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Pattini.</span></b><span data-dcnode-id="591" instrument_node=""> Goddess Pattini, referred to above (see p.59), is prominent as the most popular female Buddhist divinity; she has her </span><i data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">devalayas</span></i><span data-dcnode-id="588" instrument_node=""> scattered throughout the country. Her cult goes back at least to the second century A.C. The then ruler, King Gajabahu, is said to have introduced the worship of this divinity into the island from South India.</span><a class="noteTag" data-dcnode-id="586" href="#fn-31" id="fnt-31"><span data-dcnode-id="587" instrument_node="">[31]</span></a><span data-dcnode-id="585" instrument_node=""> The legend about her life is told in the Tamil poem </span><i data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Silappadikaram.</span></i><span data-dcnode-id="582" instrument_node=""> According to the myths current in the island about her, she had seven incarnations, being born seven times from water, the tusk of an elephant, a flower, a rock, a fire (or peak), cloth, and a mango. Hence she is designated as </span><i data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">sat-pattini,</span></i><span data-dcnode-id="579" instrument_node=""> </span><i data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">sat</span></i><span data-dcnode-id="576" instrument_node=""> meaning seven.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="573" instrument_node="">There are colorful stories woven around these births. The story about her unswerving fidelity to her fickle husband Kovalan (or Palanga) in her birth as Kannagi, is quite popular among the local Buddhists as attested by the existence of many Sinhala literary works dealing with the story (e.g., </span><i data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Vayantimalaya,</span></i><span data-dcnode-id="570" instrument_node=""> </span><i data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Pattinihalla,</span></i><span data-dcnode-id="567" instrument_node=""> </span><i data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Palanga-halla,</span></i><span data-dcnode-id="564" instrument_node=""> etc.).</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="561" instrument_node="">Her favors are sought especially at times of pestilences like chicken pox, measles, etc. and also by women who desire children. It is customary for the Sri Lankan Buddhists to visit her </span><i data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">devalaya</span></i><span data-dcnode-id="558" instrument_node=""> and worship her with offerings after recovery from infectious diseases. The banishment of evil influences and the attainment of prosperity in general and good harvests are other purposes behind the ceremonies performed in her honor. She also plays an important part in the ceremonies connected with the offering of first fruits.</span><a class="noteTag" data-dcnode-id="556" href="#fn-32" id="fnt-32"><span data-dcnode-id="557" instrument_node="">[32]</span></a></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="548"><i data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Devalayas</span></i><span data-dcnode-id="551" instrument_node=""> dedicated to her are found in many parts of the island, the one at Navagamuwa, about fifteen miles from Colombo on the old Avissavella Road, being the most important. The sanctity of this place seems to go back to the time of King Gajabahu.</span><a class="noteTag" data-dcnode-id="549" href="#fn-33" id="fnt-33"><span data-dcnode-id="550" instrument_node="">[33]</span></a></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="543"><b data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Sakka.</span></b><span data-dcnode-id="544" instrument_node=""> Sakka, the king of the gods, has been an important figure in the Buddhist affairs of Sri Lanka. Tradition connects him with the Buddha himself in connection with the landing of Vijaya and his followers in the island in the 6th century B.C. On this occasion, at the Buddha's request, Sakka is said to have entrusted Vishnu with the guardianship of Buddhism in the island. It was Sakka too who sought arahant Mahinda and requested him to come over to the island when the time became opportune for its conversion (Mhv. xiii,15,16,17).</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="538"><b data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Saman.</span></b><span data-dcnode-id="539" instrument_node=""> Another important deity in the island is Mahasumana, Sumana or Saman, the guardian or the presiding deity of Sri Pada mountain or Sumanakuta (Adam's Peak), which the Buddhists treat as sacred on account of its bearing the impression of the Buddha's left foot, which he left on his third visit to the island. (Mhv.i,77ff.).</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="536" instrument_node="">God Saman is recorded as having met the Buddha on the latter's first visit to the island when he visited Mahiyangana to drive away the </span><i data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">yakkhas.</span></i><span data-dcnode-id="533" instrument_node=""> Saman became a stream-entrant </span><i data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">(sotapanna)</span></i><span data-dcnode-id="530" instrument_node=""> after listening to the Buddha, who gave him a handful of hairs with which he erected the </span><i data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">dagaba</span></i><span data-dcnode-id="527" instrument_node=""> at Mahiyangana (Mhv.i,33). He is regarded as the chief deity of the area surrounding the sacred mountain as well as of the hill-country in general. Accordingly his main shrine is at Ratnapura, where an annual festival is held in his honor.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="521"><b data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Vibhishana.</span></b><span data-dcnode-id="522" instrument_node=""> Another deity, somewhat similar to Saman, is Vibhishana, who is regarded as the brother of the pre-historic King Ravana of Sri Lanka. His main shrine is at Kelaniya, as a part of the famous Buddhist temple there.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="513"><b data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Dadimunda.</span></b><span data-dcnode-id="517" instrument_node=""> Another deity who likewise came into prominence during the Kandyan period (17th and 18th centuries) is Dadimunda (Devata Bandara) who, according to the prevalent tradition, landed at Dondra (Devinuvara) in South Sri Lanka from South India. He proceeded to Alutnuvara in the Kegalla District, taking up permanent residence there in a temple, which he himself got constructed. This is the chief shrine of this deity and here too an annual festival is held. He is regarded as a general of Vishnu and accordingly, at the main Vishnu shrines in the island, he also has his shrine on a side (e.g., Dondra, Kandy, etc.). Another interesting tradition says that he was the only deity who did not run away in fear at the time of Bodhisatta Siddhattha's struggle with Mara. While all the other deities took flight in fright, he alone remained fearless as the Bodhisatta's only guardian. He is portrayed in the attire of a Kandyan chief with his special attribute, a walking stick </span><i data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">(soluva).</span></i><span data-dcnode-id="514" instrument_node=""> His Kandyan dress symbolizes his suzerainty over the Kandyan area.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="497"><b data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Huniyan Deviyo.</span></b><span data-dcnode-id="509" instrument_node=""> The patron deity of the sorcerers in Sri Lanka is Huniyan or Suniyan, who has been promoted from the status of a demon to that of a deity. He is also regarded as the deity presiding over a village area bounded by its boundaries </span><i data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">(gam-kotuwa),</span></i><span data-dcnode-id="506" instrument_node=""> in which role he is designated as </span><i data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">gambhara-deviyo</span></i><span data-dcnode-id="503" instrument_node=""> (deity in charge of the village). In many of the composite </span><i data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">devalayas</span></i><span data-dcnode-id="500" instrument_node=""> he too has his shrine, the one at Lunava, about seven miles from Colombo close to the Galle Road, near the Lunava railway station, being his chief </span><i data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">devalaya.</span></i></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Besides these deities so far enumerated there are many other minor figures who are too numerous to be mentioned here. What is important is that in the case of all these deities, the method of propitiation and worship is the same as explained earlier and every such deity is in charge of a particular aspect of life. And all of them are faithful Buddhists, extending their respective powers not only to the Buddha-sasana but also to those who follow it faithfully.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="492" instrument_node="">As Buddhists, none of these is regarded as superior or even remotely equal to the Buddha. They all are followers of the Buddha, who has transcended the round of rebirth </span><i data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">(samsara),</span></i><span data-dcnode-id="489" instrument_node=""> while they are still within </span><i data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">samsara,</span></i><span data-dcnode-id="486" instrument_node=""> hoping to achieve release from it by following the Buddha's Teaching.</span></p><span data-dcnode-id="484" instrument_node="">
</span></div><span data-dcnode-id="482" instrument_node="">
</span><div class="chapter" data-dcnode-id="118"><span data-dcnode-id="481" instrument_node="">
</span><div class="notes" data-dcnode-id="120"><span data-dcnode-id="480" instrument_node="">
</span><h1 data-dcnode-id="474"><a data-dcnode-id="478" id="notes"><span data-dcnode-id="479" instrument_node="">Notes</span></a><span data-dcnode-id="477" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="475" href="#top" title="Go to top of page"><span data-dcnode-id="476" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="473" instrument_node="">
</span><dl data-dcnode-id="122"><span data-dcnode-id="472" instrument_node="">
</span><dt data-dcnode-id="468"><a data-dcnode-id="470" href="#fnt-1" id="fn-1"><span data-dcnode-id="471" instrument_node="">1</span></a><span data-dcnode-id="469" instrument_node="">.</span></dt><span data-dcnode-id="467" instrument_node="">
</span><dd data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">On the significance of the phases of the moon in Buddhism see Ch. 3.</span></dd><span data-dcnode-id="464" instrument_node="">
