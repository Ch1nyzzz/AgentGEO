</span><p data-dcnode-id="1554"><span data-dcnode-id="1567" instrument_node="">The ceremony of </span><i data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">pirit</span></i><span data-dcnode-id="1564" instrument_node="">-chanting is very often accompanied by another important ceremony, that of almsgiving. It is generally known as </span><i data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">sanghika-dana,</span></i><span data-dcnode-id="1561" instrument_node=""> meaning "the alms given to the community of monks." Such a ceremonial almsgiving is often preceded by an all-night </span><i data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">pirit</span></i><span data-dcnode-id="1558" instrument_node=""> ceremony. Even otherwise this ceremony too is usually performed on important occasions in the same way as the </span><i data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">pirit</span></i><span data-dcnode-id="1555" instrument_node=""> ceremony, associated with such events as house-warming, setting out on a long journey, a marriage, birth, or death anniversaries, and so forth.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1552" instrument_node="">At least four monks who have obtained higher ordination </span><i data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">(upasampada)</span></i><span data-dcnode-id="1549" instrument_node=""> must participate for the </span><i data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">dana</span></i><span data-dcnode-id="1546" instrument_node=""> to become valid as a full-fledged </span><i data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">sanghika-dana.</span></i><span data-dcnode-id="1543" instrument_node=""> Such </span><i data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">danas</span></i><span data-dcnode-id="1540" instrument_node=""> were held even during the Buddha's time, the Buddha himself participating in very many of them.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1537" instrument_node="">Of the many items of offering that </span><i data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">dana</span></i><span data-dcnode-id="1534" instrument_node=""> or the act of generosity could include, food is usually regarded as the most important and the formal meal offering accordingly is done with much ceremony and ritual. The monks are conducted from the temple in procession with drumming as in the case of </span><i data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">pirit.</span></i><span data-dcnode-id="1531" instrument_node=""> A layman leads the procession, with the relic casket </span><i data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">(dhatu-karanduva),</span></i><span data-dcnode-id="1528" instrument_node=""> representing the Buddha, borne on his head under an umbrella or canopy. As they approach the particular household they are received by the host. As the monks step into the house, one person washes their feet, while another wipes them. This part of the ceremony is the same as in the case of the </span><i data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">pirit</span></i><span data-dcnode-id="1525" instrument_node=""> ceremony. The monks are then conducted to the cushioned seats arranged on the floor against the wall. Alms are first offered to the Buddha in a separate bowl, and are placed on a separate table on which the relic casket, containing a bone-relic of the Buddha, has been set. All the items of food are served in plates and placed on mats or low tables before the seated monks. A senior monk administers the Three Refuges and the Five Precepts (see pp. 5-6) to the assembled gathering, as this has become the established custom with which any Buddhist function commences. After he has given a short address on the significance of the occasion, the food is formally presented by getting the chief householder to repeat a Pali statement: </span><i data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">imam bhikkham saparikkharam bhikkhusanghassa dema</span></i><span data-dcnode-id="1522" instrument_node=""> ("These alms, along with other requisites, we offer to the whole community of monks"). Next, the food is served and once the monks have finished eating (which should be before noon) the other requisites </span><i data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">(parikkhara),</span></i><span data-dcnode-id="1519" instrument_node=""> referred to in the statement quoted, are also offered.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1516" instrument_node="">The most important item among these offerings is what is traditionally known as "the eight monastic requisites" </span><i data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">(ata-pirikara):</span></i><span data-dcnode-id="1513" instrument_node=""> the alms-bowl, three robes, belt, razor, water-strainer, and sewing needle. This offering is regarded as especially meritorious. As it is an expensive item and therefore difficult to offer to all the monks, generally one </span><i data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">ata-pirikara</span></i><span data-dcnode-id="1510" instrument_node=""> is offered to the chief monk and other items such as books, towels, pillow-cases, umbrellas, etc., are presented to the other monks.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1507" instrument_node="">Once this is over, another monk administers what is called </span><i data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">punnanumodana</span></i><span data-dcnode-id="1504" instrument_node=""> or "thanks-giving" wherein all those who were connected with the ceremony are requested to partake of the merits </span><i data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">(punna)</span></i><span data-dcnode-id="1501" instrument_node=""> for their future good. The participants are also called upon to transfer the merits they have thus acquired for the well-being of their dead kinsmen and friends as well as for the sustenance of beings in the </span><i data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">deva</span></i><span data-dcnode-id="1498" instrument_node=""> worlds, i.e., the deities, who are expected to protect the donors out of gratitude. The relic casket and the monks are conducted back to the temple in the same manner as they were brought and the proceedings are concluded.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1495" instrument_node="">A related ritual that cannot be ignored as regards the ceremony of almsgiving is the custom of getting the neighbours and friends also to serve into the alms-bowl that is offered to the Buddha. On the morning of the day on which the almsgiving takes place a separate bowl is kept on a table for this purpose. This is called the </span><i data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Buddha-pattare,</span></i><span data-dcnode-id="1492" instrument_node=""> or the Buddha's alms-bowl. Alms served into it are regarded as offered to the Buddha himself. The neighbours would come with plates of rice prepared in their homes and serve into it. This rice is also taken when the bowl of food is prepared for offering to the Buddha, near the relic casket at the time of the </span><i data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">dana</span></i><span data-dcnode-id="1489" instrument_node=""> proper, the purpose here being to get the neighbours and outsiders also to participate in this merit-making ceremony.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><h2 data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">2. Funerals</span></h2><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Among Buddhists death is regarded as an occasion of major religious significance, both for the deceased and for the survivors. For the deceased it marks the moment when the transition begins to a new mode of existence within the round of rebirths. When death occurs all the kammic forces that the dead person accumulated during the course of his or her lifetime become activated and set about determining the next rebirth. For the living, death is a powerful reminder of the Buddha's teaching on impermanence; it also provides an opportunity to assist the deceased person as he or she fares on to the new existence.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">Both aspects of death — the message of impermanence, and the opportunity to help the departed loved one — find expression in the Buddhist funeral rites of Sri Lanka. Naturally, the monastic Sangha plays a prominent role in the funeral proceedings. One of the most important parts of the funeral rites is the ritual called "offering of cloth on behalf of the dead" </span><i data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">(mataka-vastra-puja).</span></i><span data-dcnode-id="1477" instrument_node=""> This is done prior to the cremation or the burial of the body. Monks are assembled in the home of the dead person or in the cemetery. The proceedings begin with the administration of the Five Precepts to the assembled crowd by one of the monks. This is followed by the recitation in chorus of the well-known stanza:</span></p><span data-dcnode-id="1475" instrument_node="">
</span><blockquote data-dcnode-id="1466"><span data-dcnode-id="1474" instrument_node="">
 Anicca vata sankhara, uppadavayadhammino.</span><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">
 Uppajjitva nirujjhanti tesam vupasamo sukho.
</span><p data-dcnode-id="1468"><span data-dcnode-id="1471" instrument_node="">Impermanent alas are formations, subject to rise and fall.</span><br data-dcnode-id="1470"><span data-dcnode-id="1469" instrument_node="">
 Having arisen, they cease; their subsiding is bliss.</span></p><span data-dcnode-id="1467" instrument_node="">
</span></blockquote><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1464" instrument_node="">Next follows this ritual, which consists of the offering of a length of new white cloth to the monks. The cloth, called a </span><i data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">pamsukula</span></i><span data-dcnode-id="1461" instrument_node=""> — literally, a dust-heap cloth — is intended to be cut into pieces and then stitched into a robe.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">After offering it, the close relatives of the deceased sit together on a mat, assume a reverential posture, and together they pour water from a vessel into a cup placed within a plate until the cup overflows. While the water is being poured, the monks intone in unison the following stanzas extracted from the Tirokuddha Sutta of the Khuddakapatha:</span></p><span data-dcnode-id="1456" instrument_node="">
</span><blockquote data-dcnode-id="1439"><span data-dcnode-id="1455" instrument_node="">
 Unname udakam vattam yatha ninnam pavattati</span><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node="">
 evameva ito dinnam petanam upakappati.</span><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node="">
 Yatha varivaha pura paripurenti sagaram</span><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node="">
 evameva ito dinnam petanam upakappati.
</span><p data-dcnode-id="1441"><span data-dcnode-id="1448" instrument_node="">Just as the water fallen on high ground flows to a lower level,</span><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">
 Even so what is given from here accrues to the departed.</span><br data-dcnode-id="1445"><span data-dcnode-id="1444" instrument_node="">
 Just as the full flowing rivers fill the ocean,</span><br data-dcnode-id="1443"><span data-dcnode-id="1442" instrument_node="">
 Even so what is given from here accrues to the departed.</span></p><span data-dcnode-id="1440" instrument_node="">
</span></blockquote><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1437" instrument_node="">The context shows that the pouring of water in this manner is a ritualistic act belonging to the field of sympathetic magic, symbolizing the beneficial inheritance of the merit transferred by the living to the dead, as a kind of </span><i data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">dakkhina</span></i><span data-dcnode-id="1434" instrument_node=""> or offering. The entire ritual is hence an act of grace whereby merit is transferred to the departed so that they may find relief from any unhappy realm wherein they might have been born.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1431" instrument_node="">Another funeral rite is </span><i data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">mataka-bana</span></i><span data-dcnode-id="1428" instrument_node=""> or "preaching for the benefit of the dead." The usual practice is to conduct a monk to the house of the dead person, generally on the third day (or occasionally on any day within a week) after the funeral and to request him to preach a sermon suited to the occasion. Accordingly he preaches a suitable sermon for about an hour's duration to the assembled audience, which inevitably consists of the deceased's relatives and the neighbours of the household. At the end of the sermon, the monk gets the relatives to recite the necessary stanzas to transfer to the deceased the merits acquired by organizing the event. Following this, a gift is offered to the monk, and the invitees are also served with refreshments.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1425" instrument_node="">Three months from the date of death, it is customary to hold an almsgiving </span><i data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">(sanghika dana)</span></i><span data-dcnode-id="1422" instrument_node=""> in memory of the deceased and thence to repeat it annually. As in the case of the rituals mentioned earlier, here too the purpose is to impart merit to the deceased. Hence it is called the offering in the name of the dead </span><i data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">(mataka-dana).</span></i><span data-dcnode-id="1419" instrument_node=""> The basis of the practice is the belief that if the dead relative has been reborn in an unhappy existence (i.e., as a </span><i data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">peta</span></i><span data-dcnode-id="1416" instrument_node=""> or unhappy spirit), he or she would expect his or her living relatives to transfer merit in this manner as these departed spirits or </span><i data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">petas</span></i><span data-dcnode-id="1413" instrument_node=""> are incapable of performing any meritorious deed on their own. Even their hunger and thirst, which is perpetual, subside only in this manner. Hence they are referred to as "living on what is given by others" </span><i data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">(paradatta-upajivi).</span></i><span data-dcnode-id="1410" instrument_node=""> This custom can be traced to the Buddha's own time when King Bimbisara was harassed by a group of his departed kinsmen, reborn as </span><i data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">petas,</span></i><span data-dcnode-id="1407" instrument_node=""> because the king had failed to give alms to the Buddha in their name. Once this was fulfilled as requested by the Buddha, the </span><i data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">petas</span></i><span data-dcnode-id="1404" instrument_node=""> became happy and ceased to give any more trouble (KhpA. 202f; PvA.19ff). This was the occasion on which the Buddha preached the Tirokuddha Sutta referred to earlier, which further says that once these rites are performed, these contented spirits bless the donors in return.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1401" instrument_node="">These rites, it may be mentioned here, resemble the </span><i data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">sraddha</span></i><span data-dcnode-id="1398" instrument_node=""> ceremonies of the Hindus in some ways. And it is also significant that, according to the Buddha himself, only the dead relatives who have been reborn as </span><i data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">petas</span></i><span data-dcnode-id="1395" instrument_node=""> are capable of receiving this benefit (A.v, 269ff.).</span></p><span data-dcnode-id="1393" instrument_node="">
</span></div><span data-dcnode-id="1391" instrument_node="">
</span><div class="chapter" data-dcnode-id="1275"><span data-dcnode-id="1390" instrument_node="">
</span><h1 data-dcnode-id="1384"><a data-dcnode-id="1388" id="ch6"><span data-dcnode-id="1389" instrument_node="">6. Monastic Ceremonies</span></a><span data-dcnode-id="1387" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="1385" href="#top" title="Go to top of page"><span data-dcnode-id="1386" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="1383" instrument_node="">
</span><h2 data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">1. Vassa and Kathina</span></h2><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1379" instrument_node="">The </span><i data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Vassa,</span></i><span data-dcnode-id="1376" instrument_node=""> a three-month rains retreat, was instituted by the Buddha himself and was made obligatory for all fully ordained bhikkhus; the details are laid down in the Mahavagga of the Vinaya Pitaka (3rd and 4th chapters). The retreat extends over a period corresponding to the North Indian rainy season, from the day following the full moon of July until the full-moon day of October; those who cannot enter the regular </span><i data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Vassa</span></i><span data-dcnode-id="1373" instrument_node=""> are permitted to observe the retreat for three months beginning with the day following the August full moon. From the time Buddhism was introduced to Sri Lanka by the arahant Mahinda, the observance of </span><i data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Vassa</span></i><span data-dcnode-id="1370" instrument_node=""> — </span><i data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Vas</span></i><span data-dcnode-id="1367" instrument_node=""> in Sinhala — has been one of the mainstays of monastic life in the island. During the </span><i data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Vas</span></i><span data-dcnode-id="1364" instrument_node=""> the monks are expected to dwell permanently in their temples and suspend all traveling. If unavoidable circumstances necessitate traveling, they are allowed to leave their residences on the promise that they will return within a week </span><i data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">(sattahakaraniya).</span></i><span data-dcnode-id="1361" instrument_node=""> On the first day of the retreat the monks have to formally declare that they will dwell in that manner in the selected monastery or dwelling.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1358" instrument_node="">The </span><i data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Vassa</span></i><span data-dcnode-id="1355" instrument_node=""> is also a time for the lay Buddhists to express their devotion to the cause of Buddhism by supporting the Sangha with special diligence, which task they regard as a potent source of merit. It is customary for prominent persons to invite monks to spend the </span><i data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Vas</span></i><span data-dcnode-id="1352" instrument_node=""> with them in dwellings specially prepared for the purpose. In this latter case the host would go and invite the monk or monks formally. If the monks accept the invitation, the hosts would prepare a special temporary dwelling in a suitable place with a refectory and a shrine room. On the first day of the </span><i data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Vas</span></i><span data-dcnode-id="1349" instrument_node=""> they would go with drummers and dancers to the monastery where the invitees reside and conduct them thence in procession. The hosts would assume responsibility for providing all the needs of the monk or monks during this period, and they attend to this work quite willingly as they regard it as highly meritorious. If no special construction is put up, the lay supporters would invite the monks to observe the retreat in the temple itself.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1346" instrument_node="">At the close of the </span><i data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Vas</span></i><span data-dcnode-id="1343" instrument_node=""> season, the monks have to perform the </span><i data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">pavarana</span></i><span data-dcnode-id="1340" instrument_node=""> ceremony. At this ceremony, held in place of the Patimokkha recitation, each monk invites his fellows to point out to him any faults he has committed during the </span><i data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Vas</span></i><span data-dcnode-id="1337" instrument_node=""> period. On any day following the day of </span><i data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">pavarana</span></i><span data-dcnode-id="1334" instrument_node=""> in the period terminating with the next full-moon day, the </span><i data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">kathina</span></i><span data-dcnode-id="1331" instrument_node=""> ceremony is held. Different monasteries will hold the </span><i data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">kathina</span></i><span data-dcnode-id="1328" instrument_node=""> on different days within this month, though any given monastery may hold only one </span><i data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">kathina</span></i><span data-dcnode-id="1325" instrument_node=""> ceremony. The main event in this ceremony is the offering of the special robe known as the </span><i data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">kathina-civara</span></i><span data-dcnode-id="1322" instrument_node=""> to the Sangha, who in turn present it to one monk who has observed the retreat. The laity traditionally offer unsewn cloth to the monks. Before the offering takes place, the robe is generally taken, with drumming, etc., around the village in the early hours of the morning. Once the robe is given to the Sangha, certain monks are selected to do the cutting, sewing, and dying of the robe — all in a single day. Public contributions are very often solicited to buy the robe if it is not a personal offering.</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">This ceremony, which is performed with keen interest and devotion, has today become an important occasion of great social and religious significance for the Buddhist laity. This seems to have been so even in historical times when many Sinhala kings made this offering with much interest and devotion (e.g., Mhv. xliv,48, xci, etc).</span></p><span data-dcnode-id="1317" instrument_node="">
</span><h2 data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">2. Monastic Ordination</span></h2><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1313" instrument_node="">There is deep ritualistic significance in the two stages of monastic ordination called </span><i data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">pabbajja</span></i><span data-dcnode-id="1310" instrument_node=""> and </span><i data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">upsampada.</span></i><span data-dcnode-id="1307" instrument_node=""> The former is the initial admission into the homeless life as a novice or </span><i data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">samanera,</span></i><span data-dcnode-id="1304" instrument_node=""> which can be granted to any male over the age of seven or eight, provided certain conditions are satisfied. The ritual proper consists in shaving the hair and beard, donning the dyed robes, whose color ranges from yellow to brown, and then taking from the selected preceptor </span><i data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">(upajjhaya)</span></i><span data-dcnode-id="1301" instrument_node=""> the Three Refuges in the Buddha, Dhamma, and Sangha, and the Ten Precepts </span><i data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">(dasa sikkhapada):</span></i><span data-dcnode-id="1298" instrument_node=""> abstinence from (i) destroying life, (ii) theft, (iii) unchastity, (iv) lying, (v) fermented liquor, spirits, and strong drinks which cause intoxication and heedlessness, (vi) eating solid food after midday, (vii) dancing, singing, music, and improper shows, etc., (viii) adorning and beautifying the person by the use of garlands, scents, and unguents, (ix) using high and luxurious beds and seats, and (x) receiving gold and silver, i.e., money. The ceremony is performed on an auspicious day at the monastery where the ordination is sought. Thus the postulant becomes a novice.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1295" instrument_node="">The full or higher ordination </span><i data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">(upasampada)</span></i><span data-dcnode-id="1292" instrument_node=""> is more formal and difficult. The higher ordination ceremony should be conducted in a prescribed and duly consecrated "chapter house" </span><i data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">(sima,</span></i><span data-dcnode-id="1289" instrument_node=""> or Sinh.: </span><i data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">poya-ge),</span></i><span data-dcnode-id="1286" instrument_node=""> without which the ritual is not valid. If the candidate possesses the necessary qualifications like knowledge and intelligence and he is above twenty years of age, he may formally apply for admission and appear before a chapter of bhikkhus. Before admission he is made to put away the yellow robes and wear the clothes of a householder and face an interview at which he would be thoroughly examined as to his fitness for admission. If he successfully passes the test, he is led aside, reclothed in mendicant robes, and called back. Bearing his alms-bowl, he once again appears before the Sangha and goes through certain formalities after which, if all the monks agree, he is declared admitted.</span><a class="noteTag" data-dcnode-id="1284" href="#fn-19" id="fnt-19"><span data-dcnode-id="1285" instrument_node="">[19]</span></a></p><span data-dcnode-id="1282" instrument_node="">
</span><h2 data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">3. Uposatha Observance</span></h2><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">This refers to the ritual of confession performed by the monks on the new-moon and the full-moon days, when the Disciplinary Code, the Patimokkha, is recited. This is a set of 227 rules, to be observed by the members of the Buddhist Order. When each of the seven sections of the rules is recited amidst the assembled Order, if any among those present has infringed any of those rules, he should confess and undergo any punishment prescribed. Silence implies absence of guilt.</span></p><span data-dcnode-id="1276" instrument_node="">
</span></div><span data-dcnode-id="1274" instrument_node="">
</span><div class="chapter" data-dcnode-id="782"><span data-dcnode-id="1273" instrument_node="">
</span><h1 data-dcnode-id="1267"><a data-dcnode-id="1271" id="ch7"><span data-dcnode-id="1272" instrument_node="">7. Bali and Tovil Ceremonies</span></a><span data-dcnode-id="1270" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="1268" href="#top" title="Go to top of page"><span data-dcnode-id="1269" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="1266" instrument_node="">
</span><h2 data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">1. Bali</span></h2><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1242"><i data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Bali</span></i><span data-dcnode-id="1260" instrument_node=""> is the ceremony wherein the presiding deities of the planets </span><i data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">(graha)</span></i><span data-dcnode-id="1257" instrument_node=""> are invoked and placated in order to ward off their evil influences. The belief in the good and evil influence of the planets according to the time and place of one's birth is quite widespread in Sri Lanka. The first thing done at the birth of a child is to cast the horoscope, which has to be consulted subsequently at all the important events of his or her life. When a calamity like a serious illness comes upon such a person, the horoscope would inevitably be consulted, and if the person is under a bad planetary influence, the astrologer would recommend some kind of propitiatory ritual. This could be a minor one like the lime-cutting ritual </span><i data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">(dehi-kapima)</span></i><a class="noteTag" data-dcnode-id="1253" href="#fn-20" id="fnt-20"><span data-dcnode-id="1254" instrument_node="">[20]</span></a><span data-dcnode-id="1252" instrument_node=""> or a major one like a </span><i data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">bali</span></i><span data-dcnode-id="1249" instrument_node=""> ceremony, depending on the seriousness of the case. If it is a </span><i data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">bali</span></i><span data-dcnode-id="1246" instrument_node=""> ceremony, he might also recommend the specific kind of </span><i data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">bali</span></i><span data-dcnode-id="1243" instrument_node=""> suitable for the occasion.</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1240" instrument_node="">The term </span><i data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">bali</span></i><span data-dcnode-id="1237" instrument_node=""> signifies both the ritual in general and also the clay representations of the planetary deities which are made in relief on frameworks of bamboo and painted in appropriate colors. The ritual consists of dancing and drumming in front of the </span><i data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">bali</span></i><span data-dcnode-id="1234" instrument_node=""> figures by the </span><i data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">bali</span></i><span data-dcnode-id="1231" instrument_node=""> artist </span><i data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">(bali-adura),</span></i><span data-dcnode-id="1228" instrument_node=""> who continuously recites propitiatory stanzas calling for protection and redress. The patient </span><i data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">(aturaya)</span></i><span data-dcnode-id="1225" instrument_node=""> sits by the side of the </span><i data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">bali</span></i><span data-dcnode-id="1222" instrument_node=""> figures.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">The </span><i data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">bali</span></i><span data-dcnode-id="1216" instrument_node=""> artist is helped by a number of assistants working under him. The knowledge and art of performing the ritual are handed down in traditional families. The retentive power of these artists is remarkable, for they can continue to recite the appropriate formulas and verses from memory for days.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1213" instrument_node="">The </span><i data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">bali</span></i><span data-dcnode-id="1210" instrument_node=""> ceremony is a mixture of Buddhism and folk religion. This cult of the planets and the allied deities has become an important element in the popular living Buddhism of the island. The origins of this type of </span><i data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">bali</span></i><span data-dcnode-id="1207" instrument_node=""> ritual have to be traced to the Kotte Period of the 15th and 16th centuries, when it was introduced into the island from South India by some Hindu brahmans from that region. However, mainly owing to the efforts of the celebrated Buddhist monk of the period, Ven. Vidagama Maitreya Thera, this ritual was recast with a Buddhist significance, both in form and content, in that all the verses and formulas used in the ritual are those extolling the virtues of the Triple Gem — the Buddha, Dhamma, and Sangha — and of the Buddhist deities. It is these spiritual qualities that are invoked to bring redress. The entire ritual is thus made subservient to Buddhism.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1204" instrument_node="">The ceremony begins after paying homage to the Buddha, the Dhamma, and the Sangha. Even during the course of the ceremony this homage is paid at important junctures. The majority of the stanzas recited as benedictory verses by the artist extol the virtues of the Triple Gem or refer to the Buddha's previous existences as a Bodhisatta. The verbal part of the entire ritual consists mainly of the recitation of these verses and the pronouncement of the blessing: "By the power of those virtues let the evil influence of the planets disappear." It is believed that this kind of pronouncement of blessings becomes effective only if they are made at such an elaborate ceremony like </span><i data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">bali.</span></i><span data-dcnode-id="1201" instrument_node=""> As in the case of the </span><i data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">pirit</span></i><span data-dcnode-id="1198" instrument_node=""> ceremony described earlier, the spiritual qualities of the Buddha are regarded as superior to any worldly powers like those of the planets and stars as in the present instance, and consequently the ceremonial and ritualistic pronouncement of those qualities is believed to counteract those evil forces. Those propitiatory recitations also include the panegyrics </span><i data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">(stotras)</span></i><span data-dcnode-id="1195" instrument_node=""> praising those planetary deities.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1192" instrument_node="">The preparation for the </span><i data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">bali</span></i><span data-dcnode-id="1189" instrument_node=""> ceremony takes a day or two. Plantain stems, tender coconut leaves, coconut and arecanut racemes, powdered resin, limes, betel, torches made by wrapping clean rags around dry reeds </span><i data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">(vilakku</span></i><span data-dcnode-id="1186" instrument_node=""> and </span><i data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">pandam),</span></i><a class="noteTag" data-dcnode-id="1182" href="#fn-21" id="fnt-21"><span data-dcnode-id="1183" instrument_node="">[21]</span></a><span data-dcnode-id="1181" instrument_node=""> coconut oil, flowers of different colors, and burnt offerings are among the main items needed. Plastic clay and reeds will be needed in large quantities to cast the </span><i data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">bali</span></i><span data-dcnode-id="1178" instrument_node=""> figures. Life-size images of the planetary deities are moulded from these and painted beautifully in bright colors. Each planetary deity has its own dress, colors, diagram </span><i data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">(mandala),</span></i><span data-dcnode-id="1175" instrument_node=""> support </span><i data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">(vahana),</span></i><span data-dcnode-id="1172" instrument_node=""> weapon, etc. It is the nine planets </span><i data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">(navagraha)</span></i><span data-dcnode-id="1169" instrument_node=""> that are generally propitiated: the sun </span><i data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">(ravi),</span></i><span data-dcnode-id="1166" instrument_node=""> moon </span><i data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">(candra),</span></i><span data-dcnode-id="1163" instrument_node=""> Mars </span><i data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">(kuja),</span></i><span data-dcnode-id="1160" instrument_node=""> Mercury </span><i data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">(budha),</span></i><span data-dcnode-id="1157" instrument_node=""> Jupiter </span><i data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">(guru),</span></i><span data-dcnode-id="1154" instrument_node=""> Venus </span><i data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">(sukra),</span></i><span data-dcnode-id="1151" instrument_node=""> Saturn </span><i data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">(sani),</span></i><span data-dcnode-id="1148" instrument_node=""> and Rahu and Ketu, the ascending and the descending nodes of the moon respectively.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1145" instrument_node="">When everything is ready, with the </span><i data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">bali</span></i><span data-dcnode-id="1142" instrument_node=""> figures propped up leaning against a wall and the patient seated by a side facing the figures, the chief </span><i data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">bali</span></i><span data-dcnode-id="1139" instrument_node=""> artist starts the proceedings by taking the Five Precepts and reciting a few benedictory stanzas while the drummers start drumming. This takes place in the evening. After these preliminaries it is more or less customary for the chief artist to retire to the side, while one or two of his assistants would appear on the scene to perform the more vigorous part of the ritual, consisting mainly of dancing and reciting.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1136" instrument_node="">The dancing artist wears an attractive and colorful dress consisting of white tights, a red jacket adorned with white beads, anklets, pads of jingling bells around his calves, and an elaborate headdress. In one hand he takes a </span><i data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">pandama</span></i><span data-dcnode-id="1133" instrument_node=""> or lighted torch adequately fed with coconut oil. While reciting formulas and dancing to the beat of the drum, he throws handfuls of powdered resin into the burning </span><i data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">pandama,</span></i><span data-dcnode-id="1130" instrument_node=""> setting up flares of flames which are regarded as very powerful in driving away the invisible evil spirits </span><i data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">(bhuta).</span></i><span data-dcnode-id="1127" instrument_node=""> In addition to the virtues of the Triple Gem, his recitation would also include legends and anecdotes taken from the Buddha's and Bodhisatta's lives. Sometimes references to previous Buddhas are also made. Planetary deities are eulogized and requested to stop troubling the patient.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1124" instrument_node="">Coconut-oil lamps, an incense burner, water pots with full-blown coconut racemes </span><i data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">(pun-kalas)</span></i><span data-dcnode-id="1121" instrument_node=""> are among the items inevitably found on the scene. Offerings done on altars made of plantain trunks and tender coconut leaves will also be found. A number of such altars called </span><i data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">pideni-tatu</span></i><span data-dcnode-id="1118" instrument_node=""> may be set up; these are for the departed kinsmen of the family </span><i data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">(nati-peta)</span></i><span data-dcnode-id="1115" instrument_node=""> who are expected to stop harassing the living after receiving these offerings, which generally consist of rice, seven selected curries cooked together </span><i data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">(hat-maluwa),</span></i><span data-dcnode-id="1112" instrument_node=""> burnt offerings </span><i data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">(pulutu),</span></i><span data-dcnode-id="1109" instrument_node=""> colored flowers, betel leaves, five kinds of seeds, etc. A live cock, with its legs tied together so that it cannot run about, is placed in a corner as an offering to the evil spirits. This is a kind of scapegoat, for all the evil influences of the patient are supposed to be transferred to this bird, which is released on the following morning.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1106" instrument_node="">The ceremonies actually end early in the morning when the artists carry the clay images </span><i data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">(bali</span></i><span data-dcnode-id="1103" instrument_node=""> figures) and the altars of offerings or </span><i data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">pideni-tatu</span></i><span data-dcnode-id="1100" instrument_node=""> and leave them at the cross-roads that the evil spirits who give trouble are believed to frequent.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><h2 data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">2. Tovil</span></h2><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1088"><i data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Tovil</span></i><span data-dcnode-id="1092" instrument_node=""> or "devil-dancing" is another ritualistic healing ceremony that primarily belongs to folk religion. As in the case of the </span><i data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">bali</span></i><span data-dcnode-id="1089" instrument_node=""> ceremony, here too many Buddhist elements have crept in and it has become a ceremony purporting to fulfill, at the popular level, the socio-religious needs of the simple rural Buddhists.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1057"><i data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Tovil</span></i><span data-dcnode-id="1084" instrument_node=""> is essentially a demonic ritual mainly exorcistic in character, and hence a healing ceremony. In its exorcist form it is meant to curb and drive away any one or several of the innumerable hosts of malevolent spirits, known as </span><i data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">yakkhas,</span></i><span data-dcnode-id="1081" instrument_node=""> who are capable of bringing about pathological states of body and mind. </span><i data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Petas</span></i><span data-dcnode-id="1078" instrument_node=""> or departed spirits of the malevolent type, referred to as </span><i data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">mala-yakku</span></i><span data-dcnode-id="1075" instrument_node=""> </span><i data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">(mala</span></i><span data-dcnode-id="1072" instrument_node=""> = dead) or </span><i data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">mala-peta,</span></i><span data-dcnode-id="1069" instrument_node=""> are also brought under the exorcist power of </span><i data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">tovil.</span></i><span data-dcnode-id="1066" instrument_node=""> While some of these could be subdued by the chanting of </span><i data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">pirit</span></i><span data-dcnode-id="1063" instrument_node=""> (described earlier), there are some for whom methods of a more drastic type have to be adopted. The most popular of such methods is the </span><i data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">tovil</span></i><span data-dcnode-id="1060" instrument_node=""> ceremony.</span><a class="noteTag" data-dcnode-id="1058" href="#fn-22" id="fnt-22"><span data-dcnode-id="1059" instrument_node="">[22]</span></a></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1055" instrument_node="">As was pointed out earlier in relation to rituals in general, </span><i data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">tovil</span></i><span data-dcnode-id="1052" instrument_node=""> is also an important aspect of folk religion that has been adopted by the Sinhala Buddhists. In the case of </span><i data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">tovil</span></i><span data-dcnode-id="1049" instrument_node=""> too, religious sanction is conferred on folk-religious elements that have crept into normative Buddhism, supplementing, as it were, whatever is lacking in it to satisfy the religious needs of the masses. The Buddha is the chief of living beings, who include the </span><i data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">yakkhas</span></i><span data-dcnode-id="1046" instrument_node=""> and other related non-human beings that figure in </span><i data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">tovil.</span></i><span data-dcnode-id="1043" instrument_node=""> Although they have the power to make their victims ill in various ways — such as by possession, gaze, etc. — they have to leave them once propitiatory offerings of food, drink, etc., are made to them. Even the mere mention of the Buddha's virtues is enough to frighten them. Moreover, the chief of the </span><i data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">yakkhas,</span></i><span data-dcnode-id="1040" instrument_node=""> Vessavana </span><i data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">(Vesamuni),</span></i><span data-dcnode-id="1037" instrument_node=""> is one of the four regents of the universe </span><i data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">(maharaja)</span></i><span data-dcnode-id="1034" instrument_node=""> and as such a devoted follower of the Buddha. The ordinary </span><i data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">yakkhas</span></i><span data-dcnode-id="1031" instrument_node=""> that trouble human beings have to obey his commands. Thus, in all rituals connected with </span><i data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">tovil,</span></i><span data-dcnode-id="1028" instrument_node=""> it is in the name of the Buddha and Vessavana that the </span><i data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">yakkhas</span></i><span data-dcnode-id="1025" instrument_node=""> are commanded to obey the orders of the exorcist. And in the rich folklore that deals with </span><i data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">tovil,</span></i><span data-dcnode-id="1022" instrument_node=""> there are many anecdotes that connect every ritual or character with some Buddha of the past or with some Buddhist deity.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><h2 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">3. The Atanatiya Ritual</span></h2><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1016" instrument_node="">It is of interest to find a purely Buddhist form of an exorcist ritual that has been practiced by the Buddhists of Sri Lanka from very early times. This is the recital of the Atanatiya Sutta (of the Digha Nikaya) in order to exorcise an evil spirit that has taken possession of a person. The commentary to the sutta (DA.iii, 969), dating at least as far back as the time of Buddhaghosa (c. 6th century A.C.) or even earlier, gives a detailed description of how and when to recite it. According to this description, first the Metta, Dhajagga, and Ratana Suttas should be recited. If the spirit does not leave by such recital, the Atanatiya Sutta is to be recited. The bhikkhu who performs the recital should not eat meat or preparations of flour. He should not live in a cemetery, lest the evil spirits get an opportunity to harass him. From the monastery to the patient's house, he should be conducted under an armed guard.</span><a class="noteTag" data-dcnode-id="1014" href="#fn-23" id="fnt-23"><span data-dcnode-id="1015" instrument_node="">[23]</span></a><span data-dcnode-id="1013" instrument_node=""> The recitation of the </span><i data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">paritta</span></i><span data-dcnode-id="1010" instrument_node=""> should not be done in the open. Thoughts of love for the patient should be foremost in the reciter's mind. During the recital too he should be under armed guard. If the spirit still refuses to leave, the patient should be taken to the monastery and the recital performed in the courtyard of the </span><i data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">dagaba.</span></i></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="1005" instrument_node="">Many preliminary rites are recommended before such a recital. These include getting the patient to offer a seat to the bhikkhu who is to recite the </span><i data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">paritta,</span></i><span data-dcnode-id="1002" instrument_node=""> the offering of flowers and lamps to the </span><i data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">dagaba,</span></i><span data-dcnode-id="999" instrument_node=""> and the recitation by the bhikkhu of a set of benedictory stanzas, called </span><i data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">(Maha)-mangala-gatha.</span></i><a class="noteTag" data-dcnode-id="995" href="#fn-24" id="fnt-24"><span data-dcnode-id="996" instrument_node="">[24]</span></a><span data-dcnode-id="994" instrument_node=""> A full assembly of the deities should also be summoned. The person possessed should be questioned as to his name, by which is implied the identity of the spirit who has taken possession of him. Once the name is given, the spirit, but visibly the patient, should be addressed by that name. It should be told that the merits of offering incense, flowers, alms, etc. are all transferred to him and that the </span><i data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">mangala-gatha</span></i><span data-dcnode-id="991" instrument_node=""> just referred to have been recited in order to appease him </span><i data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">(pannaharatthaya:</span></i><span data-dcnode-id="988" instrument_node=""> as a gift) and that he should therefore leave the patient in deference to the Sangha </span><i data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">(bhikkhusangha-garavena).</span></i><span data-dcnode-id="985" instrument_node=""> If the spirit still refuses to leave, the deities should be informed of his obstinacy and the Atanatiya Paritta should be recited after declaring that as the spirit does not obey them, they are carrying out the order of the Buddha.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="982" instrument_node="">It is significant that this is a purely Buddhist ritual of considerable antiquity performed on lines similar to those in </span><i data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">tovil.</span></i><span data-dcnode-id="979" instrument_node=""> But the difference between the two should also be noted. When </span><i data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">tovil</span></i><span data-dcnode-id="976" instrument_node=""> is performed to cure a person possessed by a spirit, the spirit is ordered to leave the patient after accepting the offering of food and drink </span><i data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">(dola-pideni).</span></i><span data-dcnode-id="973" instrument_node=""> But in the case of the Atanatiya ritual, it is the merits earned by making offerings to the Buddha that are transferred to the spirit. Another significant difference is that the Atanatiya recital, in keeping with its purely Buddhist spirit, is much milder and more restrained than its </span><i data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">tovil</span></i><span data-dcnode-id="970" instrument_node=""> counterpart. The latter, however, is much more colorful and theatrical owing to its complex and essentially secular character. From the purely curative aspect, too, there is another attractive feature in </span><i data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">tovil:</span></i><span data-dcnode-id="967" instrument_node=""> when the spirit leaves the patient it does so leaving a sign of its departure, like breaking a branch of a tree, making a sound like a hoot, etc. It is perhaps because of these attractive features that </span><i data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">tovil</span></i><span data-dcnode-id="964" instrument_node=""> has become more popular in the island, replacing the truly Buddhist ceremony of the Atanatiya recital.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="961" instrument_node="">Nowadays in Sri Lanka, </span><i data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">tovil</span></i><span data-dcnode-id="958" instrument_node=""> has become the most popular form of cure adopted for spirit possession as well as other pathological conditions consequent on this. When a person is ill and medical treatment does not respond, the suspicion arises that it is due to some influence of an evil spirit. The person to be consulted in such a case is the exorcist known as </span><i data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">kattadiya</span></i><span data-dcnode-id="955" instrument_node=""> or </span><i data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">yakadura</span></i><span data-dcnode-id="952" instrument_node=""> or </span><i data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">yaddessa</span></i><a class="noteTag" data-dcnode-id="948" href="#fn-25" id="fnt-25"><span data-dcnode-id="949" instrument_node="">[25]</span></a><span data-dcnode-id="947" instrument_node=""> who would discover and identify the particular evil spirit causing the disease and perform the appropriate </span><i data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">tovil.</span></i><span data-dcnode-id="944" instrument_node=""> There are also certain forms of </span><i data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">tovil</span></i><span data-dcnode-id="941" instrument_node=""> performed as pregnancy rituals (e.g., </span><i data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">rata-yakuma)</span></i><span data-dcnode-id="938" instrument_node=""> and others as means of eradicating various forms of evil influences like the evil eye, evil mouth, etc. (e.g., </span><i data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">gara-yakuma).</span></i></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="933" instrument_node="">The devil-dancers start their ceremony by first worshipping the Buddha, Dhamma, and Sangha, as in the case of the </span><i data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">bali</span></i><span data-dcnode-id="930" instrument_node=""> ceremony. The </span><i data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">yakkhas</span></i><span data-dcnode-id="927" instrument_node=""> — who constitute one of the main classes of malevolent spirits placated in devil-dancing — are believed to become satisfied with the offerings made by people through </span><i data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">tovil</span></i><span data-dcnode-id="924" instrument_node=""> and cease harassing them. The </span><i data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">yakkhas</span></i><span data-dcnode-id="921" instrument_node=""> like Riri, Sanni, Kalukumaraya, Suniyan, Mahasohon, Maru, etc. are some of the main spirits placated. There are eighteen main </span><i data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">yakkhas</span></i><span data-dcnode-id="918" instrument_node=""> in this category, each representing a particular kind of illness, and in </span><i data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">tovil</span></i><span data-dcnode-id="915" instrument_node=""> these demons are represented by the devil-dancers themselves, who wear their specific masks and other apparel in keeping with the traditional forms ascribed to these spirits. It is believed that by dancing, chanting, and acting the part of the demons after assuming their likenesses through masks and other paraphernalia, the demons possessing the patient would leave him. The sound waves created by the drum-beat and the chanting of stanzas accompanied by rhythmic dancing in keeping with these sounds are all performed to a set pattern traditionally laid down.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="912" instrument_node="">The collective effect of the ceremony is believed to cure the patient's illness. Thus this dancing in </span><i data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">tovil</span></i><span data-dcnode-id="909" instrument_node=""> is a therapeutic ritual. The impersonation of the demon by the dancer is regarded as tantamount to the actual presence of the demon who becomes placated through offerings, recitations, chanting, miming, etc. When the spirits are threatened and asked to leave the patient, they are asked to do so under the command and in the name of the Buddha.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="906" instrument_node="">The ceremony known as </span><i data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">rata-yakuma</span></i><span data-dcnode-id="903" instrument_node=""> is performed to make barren women conceive, or for the pre-natal care of pregnant women, and to ensure the safe delivery of children. One of the episodes mimetically performed by the exorcist in this ceremony shows how barren women, according to a Buddhist legend preserved among the Sinhala people, offer cloths to the past Buddha Dipankara, the fourth in the line of twenty-eight Buddhas accepted by Theravada Buddhists; they obtain children through the merits of the act.</span><a class="noteTag" data-dcnode-id="901" href="#fn-26" id="fnt-26"><span data-dcnode-id="902" instrument_node="">[26]</span></a><span data-dcnode-id="900" instrument_node=""> Among the rituals specially connected with women may be mentioned those devil-dancing ceremonies that invoke the </span><i data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">yakkha</span></i><span data-dcnode-id="897" instrument_node=""> called Kalukumaraya in Sinhala. He is very often associated with another group of </span><i data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">yakkhas</span></i><span data-dcnode-id="894" instrument_node=""> called </span><i data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">rata-yakku,</span></i><span data-dcnode-id="891" instrument_node=""> whose leader is a female named Riddi-bisava. Another pregnancy ritual that deserves mention here is the one known as </span><i data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">kalas-tabima</span></i><span data-dcnode-id="888" instrument_node=""> (lit. setting apart a pot). When the first signs of pregnancy appear in a woman, a new clay pot is filled with certain ingredients and kept apart with the solemn promise that once the child is safely delivered a </span><i data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">tovil</span></i><span data-dcnode-id="885" instrument_node=""> will be performed. The ritual known as </span><i data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">hat-adiya</span></i><span data-dcnode-id="882" instrument_node=""> (seven steps) in the </span><i data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">tovil</span></i><span data-dcnode-id="879" instrument_node=""> ceremony called </span><i data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">suniyam-kapima,</span></i><span data-dcnode-id="876" instrument_node=""> signifies the seven steps the Bodhisatta Siddhattha is said to have taken just after he was born.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">Two important facts that emerge from this brief description of </span><i data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">tovil</span></i><span data-dcnode-id="870" instrument_node=""> is the theatrical value present in these rituals and the way in which religious sanction has been obtained for their adoption by the Buddhists.</span></p><span data-dcnode-id="868" instrument_node="">
</span><h2 data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">4. Goddess Pattini</span></h2><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="864" instrument_node="">The large number of rituals and ceremonies connected with the goddess Pattini also come under Buddhist practices. This goddess, believed to be of South Indian origin, has become the most popular female deity of the Sinhala Buddhists (see below, pp. 65-66). While Hindu goddesses like Lakshmi, Sarasvati, and Kali are also worshipped by the Buddhists, only Pattini has separate abodes among the Buddhists. The most important of the rituals connected with Pattini is the </span><i data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">gam-maduwa,</span></i><span data-dcnode-id="861" instrument_node=""> which is an all-purpose ceremony. As this ceremony is usually held after the harvest by offering the first portion of paddy harvested, this is also a ceremony of first-fruit offerings.</span><a class="noteTag" data-dcnode-id="859" href="#fn-27" id="fnt-27"><span data-dcnode-id="860" instrument_node="">[27]</span></a><span data-dcnode-id="858" instrument_node=""> A </span><i data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">gam-maduwa</span></i><span data-dcnode-id="855" instrument_node=""> has many interludes dramatized mainly from rich legendary lore about the goddess Pattini.</span><a class="noteTag" data-dcnode-id="853" href="#fn-28" id="fnt-28"><span data-dcnode-id="854" instrument_node="">[28]</span></a><span data-dcnode-id="852" instrument_node=""> </span><i data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Kohomba-kankariya,</span></i><span data-dcnode-id="849" instrument_node=""> or the ritual of the god Kohomba, is a ceremony similar to the </span><i data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">gam-maduwa</span></i><span data-dcnode-id="846" instrument_node=""> but performed more as an expiatory ritual.</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="843" instrument_node="">Two other ceremonies of this type are </span><i data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">pan-madu</span></i><span data-dcnode-id="840" instrument_node=""> and </span><i data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">puna-madu.</span></i><span data-dcnode-id="837" instrument_node=""> All these are different forms of the same type of ritual with slight differences. They are generally referred to as </span><i data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">devol-madu</span></i><span data-dcnode-id="834" instrument_node=""> or occasions for the propitiation of the gods.</span><a class="noteTag" data-dcnode-id="832" href="#fn-29" id="fnt-29"><span data-dcnode-id="833" instrument_node="">[29]</span></a><span data-dcnode-id="831" instrument_node=""> The general purpose of such </span><i data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">devol-madu</span></i><span data-dcnode-id="828" instrument_node=""> is the attainment of immunity from disease and evil influences and the achievement of success, especially agricultural, for the entire village. A point that is sociologically important is that as they are big communal gatherings they also fulfill the social needs of the village folk. As they are performed in public places to bless the community as a whole and turn out to be social get-togethers, they bear a corporate character. When it is decided that such a ceremony should be held, all the village folk would forget their differences and work together to make it a success. Further, while it mainly serves as a ritual to propitiate the deities, it is a form of entertainment as well. Serving as it does the socio-religious needs of the masses, it becomes a big social event for the entire village.</span></p><span data-dcnode-id="826" instrument_node="">
</span><h2 data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">5. Gara-demons</span></h2><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="784"><i data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Gara</span></i><span data-dcnode-id="820" instrument_node="">-demons </span><i data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">(gara-yakku</span></i><span data-dcnode-id="817" instrument_node=""> (plural); </span><i data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">-yaka</span></i><span data-dcnode-id="814" instrument_node=""> (singular)) are a group of demons twelve in number whose female aspects are called the </span><i data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Giri</span></i><span data-dcnode-id="811" instrument_node=""> goddesses. Their chief is called </span><i data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Dala-raja</span></i><span data-dcnode-id="808" instrument_node=""> who is represented as having three hooded cobras over his head, ear-ornaments, two protruding tusks, and a torch in each hand. When referred to in the singular as </span><i data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">gara-yaka</span></i><span data-dcnode-id="805" instrument_node=""> it is he that is intended and when performing the ritual it is the mask pertaining to him that is generally used as representing the group. These demons are not inimical to humans but are regarded as removing various kinds of uncleanliness and evil influences. Accordingly it is customary among the Sinhala Buddhists to perform the ritual called </span><i data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">gara-yak-natuma</span></i><span data-dcnode-id="802" instrument_node=""> (dance of the </span><i data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">gara-yakku)</span></i><span data-dcnode-id="799" instrument_node=""> at the end of religious ceremonies like annual </span><i data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">peraheras,</span></i><span data-dcnode-id="796" instrument_node=""> </span><i data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">tovil</span></i><span data-dcnode-id="793" instrument_node=""> ceremonies, etc. This is to ward off what is called </span><i data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">vas-dos</span></i><span data-dcnode-id="790" instrument_node=""> in the terminology of the folk religion, the effects of evil-eye, evil mouth, evil thoughts, etc. The malicious influences of these evil forces have to be eliminated before the participants return to their normal activities. And for this it is these demons that have to be propitiated. Accordingly, they are invited to come and take away their prey, promising not to harm the participants thereafter. A dancer impersonates the </span><i data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">gara-yaka</span></i><span data-dcnode-id="787" instrument_node=""> by wearing the appropriate mask just referred to and in the dialogue that takes place between him and another dancer, he promises to comply with the request if certain things are given to him. These include drinks, food, sweets, and money. These items are given and he departs in peace. The ceremony is held annually at the Vishnu Devalaya in Kandy after the annual Esala Perahera. It goes on for one week from the last day of the Perahera and is referred to as </span><i data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">vali-yak-natuma.</span></i></p><span data-dcnode-id="783" instrument_node="">
</span></div><span data-dcnode-id="781" instrument_node="">
</span><div class="chapter" data-dcnode-id="483"><span data-dcnode-id="780" instrument_node="">
</span><h1 data-dcnode-id="774"><a data-dcnode-id="778" id="ch8"><span data-dcnode-id="779" instrument_node="">8. Worship of Devas</span></a><span data-dcnode-id="777" instrument_node="">&nbsp;</span><a class="back" data-dcnode-id="775" href="#top" title="Go to top of page"><span data-dcnode-id="776" instrument_node="">&nbsp;</span></a></h1><span data-dcnode-id="773" instrument_node="">
</span><h2 data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">1. Deva Worship</span></h2><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="769" instrument_node="">Besides the ceremonies and rituals like </span><i data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">pirit,</span></i><span data-dcnode-id="766" instrument_node=""> </span><i data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">sanghika-dana,</span></i><span data-dcnode-id="763" instrument_node=""> </span><i data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">kathina,</span></i><span data-dcnode-id="760" instrument_node=""> etc., that can be traced in their origin to the time of the Buddha himself, there is another popular practice resorted to by the average Sri Lankan Buddhist which cannot be traced to early Buddhism so easily. This is </span><i data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">deva</span></i><span data-dcnode-id="757" instrument_node="">-worship, the worship of deities, in what are popularly called </span><i data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">devalayas</span></i><span data-dcnode-id="754" instrument_node=""> or abodes dedicated to these deities. This practice cannot be described as totally un-Buddhistic, yet at the same time it does not fall into the category of folk religious practices like </span><i data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">bali</span></i><span data-dcnode-id="751" instrument_node=""> and </span><i data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">tovil</span></i><span data-dcnode-id="748" instrument_node=""> adopted by popular Buddhism.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="745" instrument_node="">The word </span><i data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">deva,</span></i><span data-dcnode-id="742" instrument_node=""> meaning "god" or "deity" in this context, signifies various classes of superhuman beings who in some respects are superior to ordinary human beings through their birth in a higher plane. As such, they are capable of helping human beings in times of difficulty. There is also another class of such superior beings who were originally extraordinary human beings. After their death, they have been raised to the level of gods and are worshipped and supplicated as capable of helping in times of need. These are the gods by convention </span><i data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">(sammuti-deva)</span></i><span data-dcnode-id="739" instrument_node=""> or glorified human heroes like the Minneriya Deviyo, who was glorified in this manner in recognition of his construction of the great Minneriya Tank at Polonnaruwa, or God Vibhishana, one of the four guardian deities of Sri Lanka. Both these categories of deities are, however, subject to the samsaric laws pertaining to birth and death. Thus it is seen that </span><i data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">deva</span></i><span data-dcnode-id="736" instrument_node="">-worship is based on the theory that a superior being can help an inferior being when the latter needs such help.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">In addition to their role as helpers in need, an additional duty ascribed to the </span><i data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">devas</span></i><span data-dcnode-id="730" instrument_node=""> is the safeguarding of the Buddha-sasana, i.e., the Buddhist religion. This also has its origin in the story of the Buddha himself when the four divine regents of the universe mounted guard over him and helped on various occasions of the Bodhisatta's life from his conception onwards. The benevolence of the deities is also extended to the protection of the faithful followers of the Buddha's teachings as exemplified by Sakka, the good Samaritan in many Buddhist stories.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">In Sri Lanka there are four deities regarded as the guardians of the Buddha-sasana in the island: Vishnu, Saman, Kataragama, and Vibhishana. Although Vishnu is originally a Hindu god, the Buddhists have taken him over as a Buddhist deity, referring to him also by the localized designation Uppalavanna. And so are Siva, specially under the name Isvara, and Ganesha under the name Ganapati or the more popular appellation Gana-deviyo.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="724" instrument_node="">In the </span><i data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">devala</span></i><span data-dcnode-id="721" instrument_node="">-worship the devotees make offerings to these deities and solicit their help for special purposes, especially in their day-to-day problems. A noteworthy feature in this practice is the presence of a mediator between the deity and the devotee, a priest called </span><i data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">kapurala,</span></i><span data-dcnode-id="718" instrument_node=""> or </span><i data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">kapu-mahattaya</span></i><span data-dcnode-id="715" instrument_node=""> or simply </span><i data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">kapuva,</span></i><span data-dcnode-id="712" instrument_node=""> the equivalent of the Hindu </span><i data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">pusari.</span></i><span data-dcnode-id="709" instrument_node=""> This figure has been copied from South Indian Hindu practices, for even in North India the devotees appeal directly to these higher powers without the help of such an intermediary.</span></p><span data-dcnode-id="707" instrument_node="">
