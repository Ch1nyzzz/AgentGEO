</span><h1 class="cits_title" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Wedding Customs &amp; Rituals in China</span></h1><span data-dcnode-id="685" instrument_node="">
</span><div data-dcnode-id="684" id="ad-extends"></div><span data-dcnode-id="683" instrument_node="">
</span><div class="des_info activityInfo_main" data-dcnode-id="316" id="ad-google"><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Over more than 5000 years’ history in china, there are certain unique customs settled in dealing with wedding issues in China .Given that China is a country range over a vast land region, the wedding customs and rituals surely varies from regions, religions and ethnics. Yet this article will tell you the common tradition of wedding customs and rituals in China in the main clues of how Chinese find their “other half”? What to prepare before a Chinese wedding? What to do during a Chinese wedding? What to do after a Chinese wedding?</span></p><span data-dcnode-id="678" instrument_node="">
</span><hr data-dcnode-id="677"><span data-dcnode-id="676" instrument_node="">
</span><h2 class="jdtitle" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">How Chinese find their "other half"?</span></h2><span data-dcnode-id="673" instrument_node="">
</span><h3 data-dcnode-id="667"><span data-dcnode-id="670" style="color:#800000;"><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Arranged Marriages in the Past</span></strong></span><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">In the feudal society in China, marriages often were arranged by one’s parents instead of their own will. Condition, wealth, educations, zodiacs and social status would be taken into consideration when a considerable match was happening. `If a boy's family was well-off or an official family, it was unlikely his parents would allow him to take a poor girl as his wife. The matchmaker was a common job playing a key role in setting a marriage between two families in ancient China. When the boy’s parents identified a possible bride-to-be, they would send a matchmaker to get the girl’s parents’ opinions about this marriage. If their opinion was positive, the matchmaker would obtain the date and hour of the girl’s birth to offer to the boy’s parents.</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="658"><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">
The groom’s family would place the note containing the girl’s birth detail on the ancestral altar for three days. If no bad things took place within that time, such as quarrels between families or loss of properties, the parents would take this marriage as been favored by their ancestors and give the boy’s birth details to the matchmaker to present it to the girl’s family for them to go through the same process. Only after both outcomes were favorable, would the two families arrange to meet. By then the future bride and groom could finally meet their "other half” face-to-face.</span><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="657" instrument_node="">
</span><h3 data-dcnode-id="651"><strong data-dcnode-id="654"><span data-dcnode-id="655" style="color:#800000;"><span data-dcnode-id="656" instrument_node="">Free Love in Today’s China</span></span></strong><br data-dcnode-id="653"><span data-dcnode-id="652" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="649" instrument_node="">Today, the majority of Chinese couples find their own match and marry for love. Their “other half’ could be their classmate, co-workers, internet pal or even a soul mate they have just met yesterday!&nbsp;</span><br data-dcnode-id="648"><span data-dcnode-id="647" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="645" instrument_node="">
</span><h3 data-dcnode-id="639"><strong data-dcnode-id="642"><span data-dcnode-id="643" style="color:#800000;"><span data-dcnode-id="644" instrument_node="">Yuelao——The god of Matchmaking</span></span></strong><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">There is a matchmaker god called Yuelao in charge of people’s marriage in Chinese legend. He unites people’s marriage by tying a red string around the ankles of the future husband and wife. In ancient time, many young girls and boys coming to the age of getting married would go to Yuelao Temple to pray for a perfect match. Today, Young men and women would still do the same sometimes but instead of praying for a considerable match it is mainly for a romantic chance of coming across their Mr.\Miss. Right.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><input alt="chinese-matchmaker-yuelao" data-dcnode-id="634" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/pic/china-guide/chinese-etiquette/chinese-matchmaking-god-yuelao.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 5px;" title="chinese-matchmaker-yuelao" type="image"></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">(Yuelao Statue in the yuelao temple)</span></p><span data-dcnode-id="629" instrument_node="">
</span><hr data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">
</span><h2 class="jdtitle" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">What should be done before a Chinese marriage?</span></h2><span data-dcnode-id="624" instrument_node="">
</span><h3 data-dcnode-id="616"><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">
</span><strong data-dcnode-id="619"><span data-dcnode-id="620" style="color:#800000;"><span data-dcnode-id="621" instrument_node="">Making a Proposal</span></span></strong><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">In China, after a boy finds his future wife, it is his parents that should elaborate a marriage proposal to the girl’s parents. After the girl’s parents had accepted their proposal, both families would set a date for a formal meeting and negotiating the betrothal. Usually in the past, this would be dealt in the hands of a matchmaker, but since nowadays young people find their lovers without any matchmaker, therefore it is often dealt by the parents of the two parties.</span></p><span data-dcnode-id="612" instrument_node="">
</span><h3 data-dcnode-id="606"><br data-dcnode-id="611"><span data-dcnode-id="610" instrument_node="">
</span><strong data-dcnode-id="607"><span data-dcnode-id="608" style="color:#800000;"><span data-dcnode-id="609" instrument_node="">Betrothal &amp; Dowry Before Engagement</span></span></strong></h3><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="600"><br data-dcnode-id="604"><span data-dcnode-id="603" instrument_node="">
In the west it is common for a couple to formally announce their wedding by becoming engaged and traditionally the man buys the woman an engagement ring. In China it is somewhat different. Traditionally, the groom's family should present the betrothal or "Grand Gift" which is various proposal gifts representing fertility and prosperity to appreciate the girl’s parents’ efforts in raising the girl. Later, the girl’s family would send the girl’s dowry consisted of jewelry to display their support and love for their daughter. The betrothal and dowry are considered to be an important part in sealing the marriage, only by then the two are considered officially engaged. &nbsp;</span><br data-dcnode-id="602"><span data-dcnode-id="601" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="599" instrument_node="">
</span><h3 data-dcnode-id="595"><strong data-dcnode-id="596"><span data-dcnode-id="597" style="color:#800000;"><span data-dcnode-id="598" instrument_node="">Betrothal &amp; Dowry’s Evolution Over the Years</span></span></strong></h3><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="591"><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node="">
How many items and how much the “Grand Gifts” and dowry cost would generally be left to open discussion by the two families. It is like who is going to pay for the wedding and who contributes the newlyweds more. It depends on the two families wealth and social status, usually the groom side is supposed to provide more. In 1970s, the “Grand Gifts” generally were bicycle, watch and sewing machine; in 1980s, it were Refrigerator, recorder and washing machine; in 1990s, it were air conditioning, motorbike and colour TV set ;in 20 century, the “Grand Gifts” are usually house, car and money.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><img alt="chinese Betrothal &amp; Dowry’s Evolution Over the Years" data-dcnode-id="589" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/pic/china-guide/chinese-etiquette/chinese-betrothals-oer-the-year.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 5px;" title="chinese Betrothal &amp; Dowry’s Evolution Over the Years"></p><span data-dcnode-id="587" instrument_node="">
</span><h3 data-dcnode-id="579"><br data-dcnode-id="586"><span data-dcnode-id="585" instrument_node="">
</span><strong data-dcnode-id="582"><span data-dcnode-id="583" style="color:#800000;"><span data-dcnode-id="584" instrument_node="">Betrothal and Dowry in China Today</span></span></strong><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Today when a couple is preparing to get married, they probably already had an apartment or a house provided by the groom parents and a car provided by the bride’s parents. As for the “Grand Gifts” are largely replaced by money, especially in “sixes”, ”eights” and 'nines' as they symbolize” well”, “wealth” and 'forever'. It could be 6999rmb ,9999rmb, 98888rmb or even 1000001 symbolizing that the bride is chosen one out of a million. Most of the money will be used&nbsp; in the wedding ceremony or the honely moon holiday. Of course the negotiation is not always a smooth sailing. But in the end, marridge is about love not about money, so mainly, how much the betrothal and dowry will depend on the wealthy state of both families. It doesn't have to be a huge number as long as there is love in between.</span></p><span data-dcnode-id="575" instrument_node="">
</span><h3 data-dcnode-id="566"><span data-dcnode-id="574" instrument_node="">&nbsp;</span><br data-dcnode-id="573"><span data-dcnode-id="572" instrument_node="">
</span><span data-dcnode-id="569" style="color:#800000;"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Getting a Legal Marriage Certification in China</span></strong></span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">The Chinese marriage certification is a red colored brochure with the newly-weds’ name and ID detail on it. The Civil Affairs Bureau is the only office for completing the legal element of a marriage. The cost will be just 9 CNY unsurprisingly meaning forever. Many couples marry officially and then proceed to the ceremony or party the next weekend, or even later.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><img alt="chinese wedding certification" data-dcnode-id="561" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/pic/china-guide/chinese-etiquette/chiense-wedding-certification.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 5px;" title="chinese wedding certification"></p><span data-dcnode-id="559" instrument_node="">
</span><hr data-dcnode-id="558"><span data-dcnode-id="557" instrument_node="">
</span><h2 class="jdtitle" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">What to prepare for a Chinese Wedding Ceremony?</span></h2><span data-dcnode-id="554" instrument_node="">
</span><h3 data-dcnode-id="548"><span data-dcnode-id="551" style="color:#800000;"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Selecting an Auspicious Wedding Date</span></strong></span><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">In China, anytime a big event going to take place in one family, such as moving house, holding funeral ceremony, visiting ancestors, opening new business, replacing a figure of god and certainly holding a wedding ceremony, people will surely go for a fortune teller (call it Fung Suey teller if you want to) to figure out an auspicious date in the wish of everything goes smoothly and no one offends any god or evil spirits.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="541"><br data-dcnode-id="543"><span data-dcnode-id="542" instrument_node="">
This is a long-passed down Chinese tradition for the Fung Suey [pinyin:feng shui]is a part of Chinese culture. According to it, everything belongs to either yin or yang and each item in the universe including everyday can be categorized into five types which are metal, wood, water, fire and earth. In this wedding case, the auspicious date will be based on one’s birth date (year, day and hour),zodiacs and the year’s figure, all those elements or even more needed to be taken into consideration in charting out a auspicious date for the newlyweds.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="535"><br data-dcnode-id="539"><span data-dcnode-id="538" instrument_node="">
There are Chinese Almanacs containing predictions for the entire year which are sold by street vendors might tell you which day in this year is auspicious but it doesn’t mean that day would suit you with your unique birth dates, this is why a fortune teller or Fung Suey expert is consulted.&nbsp;</span><br data-dcnode-id="537"><span data-dcnode-id="536" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="534" instrument_node="">
</span><h3 data-dcnode-id="528"><span data-dcnode-id="531" style="color:#800000;"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Taking Professional Wedding Photos</span></strong></span><br data-dcnode-id="530"><span data-dcnode-id="529" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="526" instrument_node="">This is a bit different from the West. Chinese couples would pay for a local photographic studio to do their professional wedding photos. They will hire fancy costumes such as the western stylish formal wedding gown and formal suit, or alternatively traditional Chinese wedding dress like</span><strong data-dcnode-id="523"><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/china-guide/chinese-wedding-dress.htm" target="_blank"><span data-dcnode-id="525" instrument_node=""> Long fenggua and Cheongsam.</span></a></strong><span data-dcnode-id="522" instrument_node=""> After the photos are taken, the photographer will use Photoshop to make them look as pretty as possible. As to how much they will spend on these photos, it depends on the wealth and social status of the couple, usually it will cost around 5000rmb, whereas some can be quite costly if one prefer to shoot at a romantic tropical island rather than the local beauty spot.&nbsp;</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="516"><img alt="chinese-wedding-photos" data-dcnode-id="519" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/pic/china-guide/chinese-etiquette/chinese-wedding-photos.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 5px;" title="chinese-wedding-photos"><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="515" instrument_node="">
</span><h3 data-dcnode-id="509"><span data-dcnode-id="512" style="color:#800000;"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Sending out Wedding Invitations</span></strong></span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Usually when the wedding photoes are done, the couple will send out their wedding invitations. It can be just a red card with their name and wedding reception details on it, or a delicate card with their weeding photos on it. Today, many couples would post a video invitation made by their wedding photos (e-invitaion) through Wechat or QQ.</span></p><span data-dcnode-id="505" instrument_node="">
</span><h3 data-dcnode-id="497"><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">
</span><strong data-dcnode-id="500"><span data-dcnode-id="501" style="color:#800000;"><span data-dcnode-id="502" instrument_node="">Wedding House Decorating</span></span></strong><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Different from the west preferring white rose, Chinese prefer red-colored flower like red rose and colorful lily or peony for their wedding decoration process. Others like hanging the double happiness symbol in the house, placing the dragon and phoenix candle in bedroom and dragon and phoenix couplet on the front door, both meaning having good relations between the newlyweds.Also unsurprisingly, prepare lots of fireworks to scare the evil spirits away.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="490"><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">
The key part is installing the newlyweds’ bed, a propitious hour and a ‘good luck woman or man’ is selected to do this. When it is done, children were invited onto the bed as an omen of fertility. For the same reason, the bed was scattered with red dates, peanuts, longan and lotus seeds.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><img alt="chinese weddding house decoration" data-dcnode-id="488" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/pic/china-guide/chinese-etiquette/chinese-wedding-decoration.jpg&amp;raw" style="margin: 5px 8px; width: 720px; height: 450px;" title="chinese weddding house decoration"></p><span data-dcnode-id="486" instrument_node="">
</span><hr data-dcnode-id="485"><span data-dcnode-id="484" instrument_node="">
</span><h2 class="jdtitle" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Chinese Wedding Dress</span></h2><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">In the past, Chinese wedding dresses were mainly Zhongshan suit or Mao suit for the groom and Qipao for the bride. The main color would be red and the dresses would be decorated with embroidered dragons and phoenix or peony flowers for wealthy wishes. Bride should wear phoenix coronet and robes of rank, new red shoes and a red covering veil. Groom should wear a big red flower made by a nice piece of silk in front of his chest. Since Chiang Kai Shek and his wife got married wearing a western style wedding dress in 1920s, the westerns wedding dress gained popular gradually in China.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="475"><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">
Today many Chinese brides choose three dresses on the wedding ceremony. The first one will usually be a western wedding gown when they standing at the wedding reception lobby welcoming their friends, then bride will wear a delicate Chinese long fenggua（龙凤褂） to compete the wedding ceremony on the stage, after which an elegant Qipao(旗袍) will be wore as the couple get mingled and start toasts with their families and friends under the stage. Below is a detailed picture showing the evolutions of Chinese wedding dresses over the years since the end of 18th century.</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><img alt="chinese wedding dress over the years" data-dcnode-id="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/pic/china-guide/chinese-etiquette/chinese-wedding-dress.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 5px;" title="chinese wedding dress over the years"></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="468"><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/china-guide/chinese-wedding-dress.htm" target="_blank"><span data-dcnode-id="470" instrument_node="">Learn more about Chinese wedding dress, what are the embroidered dragons and phoenix, peony flowers&nbsp; actually meaning, and chinese wedding dress in ancient China by click here.</span></a></p><span data-dcnode-id="467" instrument_node="">
</span><hr data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">
</span><h2 class="jdtitle" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">How Chinese Wedding Day Ceremony</span></h2><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="461" instrument_node="">On the wedding day, the groom will set out to the bride's home in the morning and will inevitably get blocked at her door by her families and friends. The bridesmaids will play door game with the groom and his attendants. &nbsp;Then the groom will escort the bride to meet his parents and proceed the Tea Ceremony at the groom’s home, after which both families will leave for the wedding reception or call it a feast to complete the wedding ceremony. Though this basic process sounds simple, there are many traditional Chinese wedding rituals you should know as noted below.</span><br data-dcnode-id="460"><span data-dcnode-id="459" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="457" instrument_node="">
</span><h3 data-dcnode-id="451"><span data-dcnode-id="454" style="color:#800000;"><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Cleaning Face For Bride</span></strong></span><br data-dcnode-id="453"><span data-dcnode-id="452" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="449" instrument_node="">In the wedding morning, after the bride has dressed up, a close un-married younger sister of her has to use a five-colored string to post a cross in front of her face. This is a symbol of making her prettier and refreshing up for a new life journey.</span><br data-dcnode-id="448"><span data-dcnode-id="447" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="445" instrument_node="">
</span><h3 data-dcnode-id="439"><strong data-dcnode-id="442"><span data-dcnode-id="443" style="color:#800000;"><span data-dcnode-id="444" instrument_node="">Sitting on Embroidered Quilts</span></span></strong><br data-dcnode-id="441"><span data-dcnode-id="440" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="437" instrument_node="">When the bride is waiting for the groom to come, she should sit on her bed with two embroidered quilts beneath her. For the wish of a harmony marriage and a wealthy life, one quilt is embroidered with dragon and phoenix, the other with cute babies.</span><br data-dcnode-id="436"><span data-dcnode-id="435" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="433" instrument_node="">
</span><h3 data-dcnode-id="427"><span data-dcnode-id="430" style="color:#800000;"><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Game of Hiding and Seeking Bridal' s Shoes</span></strong></span><br data-dcnode-id="429"><span data-dcnode-id="428" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="425" instrument_node="">After the groom and his attendants had finally get in the bridal’s bedroom, the bridal friends should hide her shoes and making it is not easy to find by them. This is mainly about taking their beloved bride away is not an easy mission and will teach the groom to treasure her in future.</span><br data-dcnode-id="424"><span data-dcnode-id="423" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="421" instrument_node="">
</span><h3 data-dcnode-id="415"><span data-dcnode-id="418" style="color:#800000;"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Bride's Feet should not Touch Ground&nbsp;</span></strong></span><br data-dcnode-id="417"><span data-dcnode-id="416" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="413" instrument_node="">After the groom found her shoes and wear it for her, he should carry her to his car avoiding her feet touching ground. This is about avoiding bad luck.&nbsp;</span><br data-dcnode-id="412"><span data-dcnode-id="411" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="409" instrument_node="">
</span><h3 data-dcnode-id="403"><span data-dcnode-id="406" style="color:#800000;"><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Fireworks and Crossing Fire Bow</span></strong></span><br data-dcnode-id="405"><span data-dcnode-id="404" instrument_node="">
&nbsp;</span></h3><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Both families should set out fireworks to welcome their groom or bride when he\she arrivals as to scary away the evil spirits. The groom’s mother should escort the bride to step across a fire bow when she entering their house as to clear bad luck.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="396"><br data-dcnode-id="398"><span data-dcnode-id="397" instrument_node="">
All those processes should be completed before the wedding reception as the reception is set to start at an auspicious time punctually.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><img alt="chinese wedding rituals" data-dcnode-id="394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/pic/china-guide/chinese-etiquette/chinese%2520wedding%2520rituals.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 5px;" title="chinese wedding rituals"></p><span data-dcnode-id="392" instrument_node="">
</span><hr data-dcnode-id="391"><span data-dcnode-id="390" instrument_node="">
</span><h2 class="jdtitle" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">What does Chinese Wedding Reception look like?</span></h2><span data-dcnode-id="387" instrument_node="">
</span><h3 data-dcnode-id="381"><br data-dcnode-id="386"><span data-dcnode-id="385" instrument_node="">
</span><span data-dcnode-id="382" style="color:#800000;"><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Scale and Contributions of&nbsp;a&nbsp;Chinese Wedding Reception</span></strong></span></h3><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="377"><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node="">
The Chinese wedding reception is more like a banquet than reception as it can be a lavish affair lasting two hours. It is usually paid by the groom’s family and hold between 12:00—14:00 on the wedding day. Invited guests should present their contribution to attendants at the entrance of the wedding hall. The guest ’name and amount of money they contribute will be written down on a contribution book for in future the newlyweds can pay same amount of money back when the guest gets married. How much should I contribute for a Chinese Wedding? The number goes from 200 to 1000 CNY according to how close you are to them.</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><img alt="chinese wedding reception" data-dcnode-id="375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/pic/china-guide/chinese-etiquette/Chinese%2520wedding%2520reception.jpg&amp;raw" style="margin: 5px 8px; width: 720px; height: 450px;" title="chinese wedding reception"></p><span data-dcnode-id="373" instrument_node="">
</span><h3 data-dcnode-id="367"><br data-dcnode-id="372"><span data-dcnode-id="371" instrument_node="">
</span><span data-dcnode-id="368" style="color:#800000;"><strong data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Ceremonies on Chinese Wedding Reception</span></strong></span></h3><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="363"><br data-dcnode-id="365"><span data-dcnode-id="364" instrument_node="">
The banquet starts with a brief elaboration of the newlyweds ‘ love story’ by the host, then it is the parents’ appreciation speech for everybody’s attendance. Then the groom and bride will be invited on stage. They will change wedding rings and vows, drink cross-cupped wine for the meaning of share joy and sorrow. In some region, the bride and groom will bow three times on the stage. The first is to bow for the heaven, the second is to their parents for raising them up and the third is to each other for the respect in marriage life. Then the groom and bride should call their mother and father in law as mother and father, by then the two families are considered united formally.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="359"><br data-dcnode-id="361"><span data-dcnode-id="360" instrument_node="">
All those ceremonies are conducted by a professional wedding ceremony host. In the end the bride will throw her bouquet to her bridesmaids, similarly to the west whoever gets it gets married next. After the wedding banquet, close friends and relatives stay and play tricks on the newlyweds as a way to extend good wishes.&nbsp;</span></p><span data-dcnode-id="358" instrument_node="">
</span><hr data-dcnode-id="357"><span data-dcnode-id="356" instrument_node="">
</span><h2 class="jdtitle" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Chinese Wedding Night Rituals</span></h2><span data-dcnode-id="353" instrument_node="">
</span><h3 data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="350" instrument_node="">
</span><h3 data-dcnode-id="346"><span data-dcnode-id="347" style="color:#800000;"><strong data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Light&nbsp;Dragon and Phoenix Candle</span></strong></span></h3><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="342"><br data-dcnode-id="344"><span data-dcnode-id="343" instrument_node="">
The night of the wedding, the bridal room will lit dragon and phoenix candle to drive away the evil spirit, the newlyweds will drink wine from two cups tied together with a red string, arms crossed from each other</span></p><span data-dcnode-id="341" instrument_node="">
</span><h3 data-dcnode-id="335"><br data-dcnode-id="340"><span data-dcnode-id="339" instrument_node="">
</span><span data-dcnode-id="336" style="color:#800000;"><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Making a Hair-Knot</span></strong></span></h3><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="331"><br data-dcnode-id="333"><span data-dcnode-id="332" instrument_node="">
At the wedding night, the groom and bridle will both cut a curl of their hair off and tie a knot with it. This ritual is a symbol for their bonding both body and soul and the determination of sharing each other’s life despite joy or sorrow.</span></p><span data-dcnode-id="330" instrument_node="">
</span><hr data-dcnode-id="329"><span data-dcnode-id="328" instrument_node="">
</span><h2 class="jdtitle" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Post-Wedding Ritual in China</span></h2><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="324" instrument_node="">The husband should escort his newly-married wife back to her Parents’ on the third day after their wedding. They are supposed to present gifts to her parents and the groom needs to get used to call her parents as mom and dad. In doing this, he expresses appreciation and respect to his mother-in-law and father-in-law and mainly shows them that their precious daughter has been treated well.</span><br data-dcnode-id="323"><span data-dcnode-id="322" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Today, many Chinese couples go for a honeymoon holiday after their wedding like the Westerns do. In this case they can visit the wife’s parents earlier or later after they come back. But, this tradition is indispensable.&nbsp;</span></p><span data-dcnode-id="317" instrument_node="">
</span></div><span data-dcnode-id="315" instrument_node="">
