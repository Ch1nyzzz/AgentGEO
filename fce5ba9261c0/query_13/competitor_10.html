/span></h3><span data-dcnode-id="310" instrument_node=""> </span><div class="card-cta" data-dcnode-id="305"><span data-dcnode-id="309" instrument_node=""> </span><span data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Learn More →</span></span><span data-dcnode-id="306" instrument_node=""> </span></div><span data-dcnode-id="304" instrument_node=""> </span></div><span data-dcnode-id="302" instrument_node=""> </span></a><span data-dcnode-id="300" instrument_node=""> </span></div><span data-dcnode-id="298" instrument_node=""> </span></div><span data-dcnode-id="296" instrument_node=""> </span><div class="article-content-center" data-dcnode-id="109"><span data-dcnode-id="295" instrument_node=""> </span><div class="freestyle-content" data-dcnode-id="236"><span data-dcnode-id="294" instrument_node=""> </span><div class="section section-0" data-dcnode-id="289"><span data-dcnode-id="293" instrument_node=""> </span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">The Renaissance is a term historians give to a period of time between 1300 and 1600 in Italy, England, France and Northern Europe that witnessed the emergence of capitalism and a shift away from ideas and lifestyles of the Middle Ages. Although nobles and the wealthy largely worked in the same occupations they had had during the Middle Ages, increased urbanization expanded roles for women and the emerging middle class.</span></p><span data-dcnode-id="290" instrument_node=""> </span></div><span data-dcnode-id="288" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="1" data-ad-unit-name="slot" data-dcnode-id="287"></div><span data-dcnode-id="286" instrument_node=""> </span><div data-ad-unit-name="adsense-inline-has-loaded" data-dcnode-id="277"><span data-dcnode-id="285" instrument_node="">

</span></div></div><h2 data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Peasants and the Poor</span></h2><span data-dcnode-id="274" instrument_node=""> </span><div class="section section-1" data-dcnode-id="269"><span data-dcnode-id="273" instrument_node=""> </span><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">The majority of peasants in Europe eked out a living during the Renaissance by working the fields of the wealthy. Typically, peasant families would work the same piece of land together, and while in a growing number of cases these families were able to amass capital and buy their own land, those who owned land remained the exception rather than the rule. Renaissance men and women did not share the modern idea that working is inherently better than leisure, and although peasant labor was notoriously grueling, the number of holy days and feast days on the church calendar allowed them to enjoy up to half a year’s worth of vacation time during a single year.</span></p><span data-dcnode-id="270" instrument_node=""> </span></div><span data-dcnode-id="268" instrument_node=""> </span><h2 data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">The Middle Class</span></h2><span data-dcnode-id="265" instrument_node=""> </span><div class="section section-2" data-dcnode-id="260"><span data-dcnode-id="264" instrument_node=""> </span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">The increase in banking and urbanization during the early Renaissance led to the emergence of a new class of people, the middle class. Because of their accumulated capital, this class of people had leisure to spend on education, which meant that they were able to get better jobs than those in the lower classes -- jobs that included banking, trading and retailing that required competence at managing and distributing goods made by others.</span></p><span data-dcnode-id="261" instrument_node=""> </span></div><span data-dcnode-id="259" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="2" data-ad-unit-name="slot" data-dcnode-id="258"></div><span data-dcnode-id="257" instrument_node=""> </span><div class="no-print" data-="" data-ad-unit-name="sticky-video-player" data-dcnode-id="256"></div><span data-dcnode-id="255" instrument_node=""> </span><h2 data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Noblemen and the Wealthy</span></h2><span data-dcnode-id="252" instrument_node=""> </span><div class="section section-3" data-dcnode-id="247"><span data-dcnode-id="251" instrument_node=""> </span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Noblemen and women did not work in the conventional sense, as labor was considered beneath them. Instead, as they had done in the Middle Ages, noblemen pursued work that was appropriate to their station like managing properties; however, even in this case, they typically hired overseers to do the actual management, and the extent of their labor was to oversee the overseers. By gravitating toward occupations like governing, advising royalty and leading militaries, this small slice of the population was able to maintain a position of dominance.</span></p><span data-dcnode-id="248" instrument_node=""> </span></div><span data-dcnode-id="246" instrument_node=""> </span><h2 data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Work for Women</span></h2><span data-dcnode-id="243" instrument_node=""> </span><div class="section section-4" data-dcnode-id="238"><span data-dcnode-id="242" instrument_node=""> </span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">While upper-class women generally did not work, many lower-class Renaissance women were household managers, a job that combined cooking, cleaning, feeding, washing clothes and beds and teaching children. Although men sometimes assisted in these tasks, women bore the brunt of the labor. In the cities, lower-class women might also have worked as paid assistants for someone else’s family, offering their services in cleaning and wet-nursing. Poor women who could not get work as servants, however, might have been driven to prostitution or manual field labor.</span></p><span data-dcnode-id="239" instrument_node=""> </span></div><span data-dcnode-id="237" instrument_node=""> </span></div><span data-dcnode-id="235" instrument_node=""> </span><div class="no-print" data-ad-unit-name="adblock-adsense-main" data-dcnode-id="234"></div><span data-dcnode-id="233" instrument_node=""> </span><div class="main-ad no-print" data-ad-unit-name="adsense-main-has-loaded" data-dcnode-id="228"><span data-dcnode-id="232" instrument_node="">
