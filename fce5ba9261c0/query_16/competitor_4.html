ation--none" data-dcnode-id="3256" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3257" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3262" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3263" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3264" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3258" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3259"><svg data-dcnode-id="3260" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3261" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3169" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3170" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3171"><span class="q-box qu-userSelect--text" data-dcnode-id="3172" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3245" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3246" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3247" instrument_node="">Then the machines would not allow such a movie series to be made ;)</span></span></p><span data-dcnode-id="3244" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3241" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3242" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3243" instrument_node="">Long Answer :</span></span></p><span data-dcnode-id="3240" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3237" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3238" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3239" instrument_node="">Matrix is my favorite movie series. I was fascinated by the creativity of content the Wachowskis came up with. I have seen all three movies multiple times, and I am never bored when I see them yet again. I continued to wonder if simulated reality was really possible. When I came across this New York Times article, Is the Universe a Simulation, my belief system became a little stronger.</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3232" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3234" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3235" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3236" instrument_node="">If such simulations are possible in theory, he reasons, then eventually humans will create them — presumably many of them. If this is so, in time there will be many more simulated worlds than non-simulated ones. Statistically speaking, therefore, we are more likely to be living in a simulated world than the real one.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3233" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3229" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3230" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3231" instrument_node="">There is nothing wrong with the thought process. When we invented wheel, we rolled with it, when we invented an automobile we built an entire infrastructure to support that invention and went ahead with that too. This is no different. When such a system will come in the realm of possibility it is sure that we are going to go ahead with it. Statistically speaking, the odds of being in one outweigh being out of one. To add a little twist it is theoretically also possible that, a simulated reality will in itself have another simulated reality, thereby having a tree structure of it.</span></span></p><span data-dcnode-id="3228" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3225" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3226" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3227" instrument_node="">No software simulation is perfect, there are bugs in all. I have not seen a better explanation of it all than in Matrix. From Deja-vu to Vampires all the folklore and religious scripts nicely wrapped in a bundle with bow on it. If you buy the logic in our universe being a simulated reality then its not really hard to fathom that such software issues or glitches are the reason why we experience problems within our world. Matrix beautifully brings heaven and hell under the same umbrella too. Its just an observation model really.</span></span></p><span data-dcnode-id="3224" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3221" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3222" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3223" instrument_node="">Hitchhiker’s guide to galaxy, a work of fiction, states that Earth as we know it, was a super computer with organic elements as processing units, and higher overlords were keeping it under observation. It’s not really hard to digest after you accept the initial theory of being in a simulated reality. All the scientific advances and research has one vitally important step in which the subject of the study is continuously observed.</span></span></p><span data-dcnode-id="3220" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3217" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3218" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3219" instrument_node="">So I ask you, who is the one observing this simulation or experiment as we might call it. This completely controlled test must be having a moderator, who would that be? Can we say that such being is capable of watching every minute activity at any corner of the universe with equal ease? Since it has built this almost flawless world, can we say it is wise and intelligent? Since it holds all the switches and controls and can destroy everything at a flick of a lever, it definitely has the supreme commanding power on this universe. In other words, can we agree that such a being, will be omnipresent, omniscient, omnipotent?</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3212" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3214" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3215" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3216" instrument_node="">When some see ‘coincidence’, I see ‘consequence’. When others see ‘chance’, I see ‘cost’. —The Merovingian</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3213" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3209" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3210" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3211" instrument_node="">Now who do we label with these words? The Almighty or the God and if there is a panel of such beings then Gods. So the religions and faith systems try and connect with it. Theism has no problems in accepting that they are incomplete, dependent on some external factors for smooth functioning. In fact the Fine Tuning of Universe is a thought which further solidifies my claim of being in a simulation or in a controlled environment.</span></span></p><span data-dcnode-id="3208" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3205" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3206" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3207" instrument_node="">When we play a computer game of massive scale, like Grand Theft Auto or Warcraft, the sheer magnitude of virtual world is mind boggling. That which fits in a single or at max a couple DVDs is in the game of the order of geographical states, with man made artifacts and wonders. This computer game has both playing and non playing characters or NPCs. Since the game is always played by the player, the whole gaming reality materializes keeping the playing character at the center. For example if the playing characters enters a coffee shop in the game, then all the game resources concentrate on rendering that coffee shop in minutest details, and rest of the world is just removed from program memory. In other words the world is built around the player, keeping him at the center of focus. Exactly this is shown by the study of Light. The Dual nature of light both as wave and particle. Here is what John Archibald Wheeler observed.</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3192" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3202" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3203" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3204" instrument_node="">Photons, of course, don’t know anything. But by choosing which property of a system to measure, we determine the state of the system. If we don’t ask which path the photon takes, it takes both. Our asking creates the path.</span></span></p><span data-dcnode-id="3201" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3198" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3199" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3200" instrument_node="">Could the same idea be scaled up, Wheeler wondered. Could our asking about the origin of existence, about the Big Bang and 13.8 billion years of cosmic history, could that create the universe? “Quantum principle as tiny tip of giant iceberg, as umbilicus of the world,” Wheeler scrawled in his journal on June 27, 1974. “Past present and future tied more intimately than one realizes.”</span></span></p><span data-dcnode-id="3197" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3194" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3195" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3196" instrument_node="">In his journal, Wheeler drew a picture of a capital-U for “universe,” with a giant eye perched atop the left-hand peak, staring across the letter’s abyss to the tip of the right-hand side: the origin of time. As you follow the swoop of the U from right to left, time marches forward and the universe grows. Stars form and then die, spewing their carbon ashes into the emptiness of space. In a corner of the sky, some carbon lands on a rocky planet, merges into some primordial goo, grows, evolves until … an eye! The universe has created an observer and now, in an act of quantum measurement, the observer looks back and creates the universe. Wheeler scribbled a caption beneath the drawing: “The universe as a self-excited system.”</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3193" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3189" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3190" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3191" instrument_node="">This thought experiment gets weirder and weirder by each step. We have established the possibility of being in an artificially created simulated reality, then we posited the concept of God and brought it to a realm of possibility keeping all its omni-attributes intact. Then we are further thinking on how such a system can exist without being a failure in itself. That boils down to selective rendering of ‘reality’ to keep it less taxing on the overall system. I remember there is a episode in Eureka which addresses this nicely. When they find bugs in the simulation they concentrate on one place thereby effectively breaking the whole system down. The simulation which we live in is much more foolproof. ‘It’ has taken care, It has used extreme universal constants which are very hard to attain. Only science fiction has passed the speed of light till date. Even the theoretical possibilities of surpassing that has entailed a slew of paradoxes and numerous effects which are contradictory.</span></span></p><span data-dcnode-id="3188" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3185" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3186" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3187" instrument_node="">Is it safe to say that the overlords, or Gods if I may, have taken care of keeping the system in a closed state. The concepts of Entropy and laws of thermodynamics are just a proof of the limits. I agree that its asking of two much perfection from them which borders on being unrealistic. How can something be as tuned to perfection as all this be possible to sustain. No long term damaging effects? These limitations trouble us because we tend to think of ‘them’ on the same lines as humans. Our cognition has a limit in first try, but keep thinking to expand your thoughts, and then you’d know, it is possible. Consider our entire universe as a ant colony dexterously built and maintained. A system that is enclosed and sealed.</span></span></p><span data-dcnode-id="3184" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3181" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3182" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3183" instrument_node="">What you think of this thought experiment? It actually answers everything and that is troublesome. Its a symbiotic relationship now, if we break it, universe as we know it breaks, so do we really want to tread that path? These thoughts, as dangerously they answer everything that is there to it, may leave us with no hope, which will eventually lead us to inaction. After all it is a statistical thought experiment, I would like to leave it at that. What do you say?</span></span></p><span data-dcnode-id="3180" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3177" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3178" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3179" instrument_node="">I’d love to hear comments / flaws / corrections in this analogy.</span></span></p><span data-dcnode-id="3176" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3173" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3174" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3175" instrument_node="">P.S. : This is repost from my blog which had further links, Quora seems to have removed them. It is really tedious to go to each word and link it with URLs.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3091" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3092" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3093" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3107" style="box-sizing: border-box; display: fl break-word qu-textAlign--start" data-dcnode-id="2994" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2995" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2996" instrument_node="">From its beginning psychology, in all its many manifestations sought to understand and devel</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2982" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2983" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2984" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2985" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2986" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2991" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2992" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2993" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2987" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2988"><svg data-dcnode-id="2989" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2990" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2958" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2959" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2960"><span class="q-box qu-userSelect--text" data-dcnode-id="2961" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2974" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2975" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2976" instrument_node="">Psychology is the ‘science’ of the psyche. That is, a science because it attempts to understand how we think and function emotionally both normatively and pathologically according to rational and reasoned logical principles. Today it also has the benefit of fMRI technology to to, so to say ‘look inside our heads’, this is the science of neuroscience. As to whether what is observed as neurological activity is the cause of thinking processes or an affect of thought processes is an unknown factor - as yet.</span></span></p><span data-dcnode-id="2973" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2970" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2971" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2972" instrument_node="">From its beginning psychology, in all its many manifestations sought to understand and develop methods to intercede with pathological subjects in order to (1) study their abberation’s firstly, (2) and then to try to resolve them by means of such ‘cures’ as Freud’s ‘talking cure, or Jung’s psycho-analysis. Today their are more sophisticated methods that have evolved of allowing patients to resolve their psychological issues by “letting them out’, by talking in an environment that is none judgemental. This works for many folk. Another is the use of drugs such as Prozac, these are forms of tranquillisers that give patients time to be free of their condition, such that some may resolve their issues themselves or if the need be, to continue to see a psychiatrist or psychologist.</span></span></p><span data-dcnode-id="2969" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2966" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2967" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2968" instrument_node="">Besides these types of psychology their are forms that study many other psychological issues: Clinical psychology, Child psychology, Behavioural neuroscience, Educational psychology, Cognitive psychology, Forensic psychology, Social psychology, Industrial psychology, Health psychology, Experimental psychology.</span></span></p><span data-dcnode-id="2965" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2962" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2963" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2964" instrument_node="">Why are they important? That depends upon your attitude toward psychology. If you have mental issues, you’ll be glad they exist because they most often can assist you to resolve and get on with your life. They can in many instances help folk with suicidal tendencies. Psychology is not a panacea, it cannot solve all cases, but it attempts to try and it has evolved to the benefit of millions of troubled people across the world. As to he other forms of psychology, these benefit individuals as well as mass social issues; crowd behaviour, buying practices, criminal behaviours, industrial behaviours and safe practices,etc.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2885" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2886" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2887" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2901" style="box-sizing: border-  instrument_node="">thimmaiah</span></span><span data-dcnode-id="2121" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2122" instrument_node="">.</span></span></p><span data-dcnode-id="2119" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2112" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2117" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2118" instrument_node="">He lives in the same building where my in-laws also lives. We live in the ground floor. I didn't know in which floor </span></span><span data-dcnode-id="2115" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2116" instrument_node="">Mr.T</span></span><span data-dcnode-id="2113" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2114" instrument_node=""> lives. I saw him many times carrying tea flask and some air tight containers.</span></span></p><span data-dcnode-id="2111" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2108" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2109" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2110" instrument_node="">Once I saw him sleeping in the car parking area near our home. Then i asked my Athaya ( my mother-in-law) about him.</span></span></p><span data-dcnode-id="2107" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2104" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2105" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2106" instrument_node="">Me: athaya, why he's sleeping there?</span></span></p><span data-dcnode-id="2103" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2100" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2101" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2102" instrument_node="">MIL : he sleeps in the car parking area in day time and on the terrus in the night time.</span></span></p><span data-dcnode-id="2099" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2096" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2097" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2098" instrument_node="">Me : why? Seems like his wife won't let him sleep in home.</span></span></p><span data-dcnode-id="2095" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2092" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2093" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2094" instrument_node="">Showing my worst sense of humor</span></span></p><span data-dcnode-id="2091" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2088" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2089" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2090" instrument_node="">MIL : his wife and children won't live here, actually he don't have house in Tirumala.</span></span></p><span data-dcnode-id="2087" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2084" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2085" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2086" instrument_node="">Me : then where he lives?</span></span></p><span data-dcnode-id="2083" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2080" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2081" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2082" instrument_node="">I was surprised</span></span></p><span data-dcnode-id="2079" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2064" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2077" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2078" instrument_node="">MIL : he sleeps on our terrus. He will take shower at free bathrooms ( </span></span><span data-dcnode-id="2075" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2076" instrument_node="">which are almost everywhere in Tirumala</span></span><span data-dcnode-id="2073" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2074" instrument_node=""> ). He will have milk and breakfast at anna prasadam counters. He will buy idli, vada, dosa and tea from Mrs.B (</span></span><span data-dcnode-id="2071" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2072" instrument_node="">she prepares breakfast , tea and coffee in huge quantity and sell them to people like mr.T and thats her business</span></span><span data-dcnode-id="2069" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2070" instrument_node=""> ). And he will sell those at double price. He buys 4 idly for 10 rupees from </span></span><span data-dcnode-id="2067" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2068" instrument_node="">B </span></span><span data-dcnode-id="2065" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2066" instrument_node="">and he sells one idly for 5 rupees. He buys half litre milk at 26 rupees and tea powder, ilachi, sugar for 50 rupees and he will make atleast 30 small cups of tea with them and sells each at 10 rupees.</span></span></p><span data-dcnode-id="2063" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2060" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2061" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2062" instrument_node="">He will keep carrying and sell them from 5am to 11 am. Then he will sleep for some time in parking area and he repeats the same business from 4pm to 10pm.</span></span></p><span data-dcnode-id="2059" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2056" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2057" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2058" instrument_node="">He don’t have any vehicle. He will go anywhere by walk. This is his routine since four years. His family lives in his village, his younger daughter is studying in SV University. His elder daughter is working in Bangalore and she's married.</span></span></p><span data-dcnode-id="2055" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2052" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2053" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2054" instrument_node="">He invited all of us for his house warming ceremony last year. He built it without any loan or credit.</span></span></p><span data-dcnode-id="2051" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2048" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2049" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2050" instrument_node="">I was impressed after listening this story.</span></span></p><span data-dcnode-id="2047" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2044" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2045" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2046" instrument_node="">After few days i Got a chance to talk to him.</span></span></p><span data-dcnode-id="2043" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2040" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2041" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2042" instrument_node="">Me : uncle, athaya told me everything about you. You are living in Tirumala with free of cost and earning well.</span></span></p><span data-dcnode-id="2039" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2032" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2037" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2038" instrument_node="">T : yes, i just need to Buy one soap, 10 shampoo packets and toothpaste. And am living hapily. I don't have any diabetes, blood pressure problems because I work that worth the food i consume. I really don't need to work hard at this age ( </span></span><span data-dcnode-id="2035" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2036" instrument_node="">i don't know his age</span></span><span data-dcnode-id="2033" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2034" instrument_node="">). But i never choose comfort over hardwork and I never get tired of working too much. If we Don't work hard when we have energy then our body will never listen to us when we don't have energy.</span></span></p><span data-dcnode-id="2031" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2028" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2029" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2030" instrument_node="">I am glad i met a person from whom i learnt something</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2025" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="2026" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="2027" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-e7cb98f7d8623293960db74b9b5683ac-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="2024" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="2020" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="2021"><div class="q-box unzoomed" data-dcnode-id="2022" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="2023" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-bf8ed8aa3cc92f126dd7e0995ca7eb7e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2017" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2018" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2019" instrument_node="">He is using every facility provided by TTD wisely but he's not lazy. He works hard every day and night. I never see him resting in fog or in heavy rain also.</span></span></p><span data-dcnode-id="2016" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2013" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2014" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2015" instrument_node="">BTW, tirumala temple looks like this in fog.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2010" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="2011" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="2012" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-4b8b772dd0c078bd048b356335d39c1a-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1938" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1939" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1940" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1954" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1976" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1977" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1987" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1988" style="box-sizing: border-box; position: relative;"><button aria-label="31 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-  1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="1160" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1161" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1162" instrument_node="">The field of positive psychology has discovered secrets of how to be happier, have better relationships, and be more successful. Psychology is not only about mental illnesses and helping people with them [a sub-field called “abnormal psychology”] but also about helping everyday people to do and be their best. Check out some books like “Learned Optimism” and “Authentic Happiness” by Martin Seligman, “Mindset” by Carol Dweck, “The Upside of Stress” and “The Willpower Instinct” by Kelly McGonigal, to learn some of these insights.</span></span></li><li class="q-relative" data-dcnode-id="1157" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1158" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1159" instrument_node="">The field of industrial-organizational psychology is discovering how to make companies and organizations work better. There are discoveries about how to select and hire the best people, how to communicate effectively, and how to work best with the other members of your team and their strengths and weaknesses.</span></span></li><li class="q-relative" data-dcnode-id="1154" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1155" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1156" instrument_node="">We know a lot more about how to persuade and influence people, and how people make decisions, because of psychology. This has had a huge effect on business, on sales and marketing, and on advertising. If you don’t incorporate these insights in your career or your business, you will probably get out-competed by your rivals who do. Look at Robert Cialdini’s works for some insights.</span></span></li><li class="q-relative" data-dcnode-id="1151" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1152" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1153" instrument_node="">The field of cognitive-behavioral therapy has helped many people to be happier and more successful in life. This can be done without any pharmaceutical drugs [or it can be done in addition to medications]. “Mind Over Mood” by Dennis Greenberger is a good introduction to this topic.</span></span></li></ol></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1073" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1074" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1075" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1089" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1116" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1117" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1127" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1128" style="box-sizing: border-box; position: relative;"><button aria-label="5 upvotes" class="q-click-wrapper ClickWrapper___Styl e=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="542" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="543" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="544" instrument_node="">Consider two people:</span></span></p><span data-dcnode-id="541" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="538" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="539" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="540" instrument_node="">1. One builds a significant part of a car, (perhaps with a small team)</span></span></p><span data-dcnode-id="537" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="534" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="535" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="536" instrument_node="">2. Another responsible to add rubber insulation around the right front driver’s door, day in and day out car after car.</span></span></p><span data-dcnode-id="533" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="530" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="531" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="532" instrument_node="">Who has more satisfaction?</span></span></p><span data-dcnode-id="529" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="526" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="527" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="528" instrument_node="">Who will bolt when the the next ”better” paying job shows up?</span></span></p><span data-dcnode-id="525" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="522" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="523" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="524" instrument_node="">Where is the most benefit:</span></span></p><span data-dcnode-id="521" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="518" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="519" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="520" instrument_node="">• the company</span></span></p><span data-dcnode-id="517" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="514" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="515" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="516" instrument_node="">• the person</span></span></p><span data-dcnode-id="513" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="510" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="511" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="512" instrument_node="">• the customer</span></span></p><span data-dcnode-id="509" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="506" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="507" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="508" instrument_node="">• management goals rewards</span></span></p><span data-dcnode-id="505" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="502" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="503" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="504" instrument_node="">• Investors ROI</span></span></p><span data-dcnode-id="501" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="491" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="499" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="500" instrument_node="">Today, Human resources has generally degenerated from the “grandiose” aims of the founders of the theory to a way for minimizing labor costs, and even use “new applicant” resumes as a way to eliminate people from the interview/hiring process. </span></span><span class="q-inline" data-dcnode-id="492" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_relations_movement" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank"
