tyle: normal; background: none;"><span data-dcnode-id="4966" instrument_node="">No two people living or dead in this world the same</span></span><span data-dcnode-id="4963" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4964" instrument_node="">! And that is the first lesson of Psychology! Even identical twins do not possess the same psychological factors.</span></span></p><span data-dcnode-id="4961" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4958" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4959" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4960" instrument_node="">By studying these factors through observation and practice you can learn a whole lot about people. For example, have you heard of professional which do not associate themselves with psychology directly but use the samw concepts? Astrology, face reading, palm readers, product designers, marketing executives, even AI that predicts which advertisements they should show you the next time you visit a website also works on the same concept, psychology, even motivational speakers, drug/alcohol rehab centers, they all rely on same concept!</span></span></p><span data-dcnode-id="4957" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4954" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4955" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4956" instrument_node="">Psychology is the most powerful tool in anybody's skillset. For me, I focused on sexology and child development as my subjects in psychology because I found them to be most interesting! There are so many others you can study, there is human c princi</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4766" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4767" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4768" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4769" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4770" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4775" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4776" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4777" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4771" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4772"><svg data-dcnode-id="4773" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4774" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4706" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4707" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4708"><span class="q-box qu-userSelect--text" data-dcnode-id="4709" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4758" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4759" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4760" instrument_node="">Let’s split this question into two components:</span></span></p><span data-dcnode-id="4757" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4754" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4755" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4756" instrument_node="">What is the importance of understanding?</span></span></p><span data-dcnode-id="4753" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4750" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4751" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4752" instrument_node="">What is the relative importance of understanding psychology, that is, what is the importance of understanding psychology relative to understandings in other faculties?</span></span></p><span data-dcnode-id="4749" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4746" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4747" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4748" instrument_node="">The reason behind splitting the main query into these two components is that the answer to the first component-query could have clues leading to the next answers.</span></span></p><span data-dcnode-id="4745" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4742" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4743" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4744" instrument_node="">“Understanding” of an issue leads to the “realization” of its “basic principles”. Understanding is consummated only through grasping of the basic principles. The “realized” basic principles metamorphose into “new emotions” under whose sway the body mutates sprouting corresponding “new genes/ dna-s”. These genetic dents become permanent dwellings for the new emotions.</span></span></p><span data-dcnode-id="4741" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4738" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4739" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4740" instrument_node="">The new emotions add to the existing lot (known as “the subconscious”) which would have been housed in the “existing/ plenary genetics”.</span></span></p><span data-dcnode-id="4737" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4734" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4735" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4736" instrument_node="">It may be visualized now that the “emotive genes division” of the “plenary genetics” is the leading division that would cause sprouting of a sequence of “instinctive genes” which would support a commensurable “new metabolism” required to pursue the “new goal” begotten of the “new emotions”.</span></span></p><span data-dcnode-id="4733" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4730" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4731" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4732" instrument_node="">We know that human genes number approximately 50, 000 and these are of two types viz. “protein-coding” and “non-coding”. The two types are of almost equal number. The above argumentation leaves for us a scope to surmise that the “non-coding genes” could be primarily the “emotive genes” when the “protein-coding” ones would primarily be the consequent “instinctive genes” accommodating the “metabolic dna-s”.</span></span></p><span data-dcnode-id="4729" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4726" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4727" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4728" instrument_node="">These details portray the far-reaching impact of “understanding” beyond “realization”.</span></span></p><span data-dcnode-id="4725" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4722" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4723" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4724" instrument_node="">The world of knowledge is a great hierarchy wherein a knowledge-seed in the form of an inference is judged by the size of the information-pyramid it tops up. The “universal truth” would be ideally the inference that would top up all information.</span></span></p><span data-dcnode-id="4721" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4718" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4719" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4720" instrument_node="">Accordingly, the realizations and the resulting emotions would too have to have a hierarchy in the subconscious world.</span></span></p><span data-dcnode-id="4717" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4714" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4715" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4716" instrument_node="">The inferences of the faculty of “psychology” top up very large pyramids of information, because it deals with “epistemic subjectivity”. Indeed, these inferences would have to be placed very close to the summit of the information-pyramid/ knowledge-pyramid. As such, the top inferences in this field could be very close to “universal truth”.</span></span></p><span data-dcnode-id="4713" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4710" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4711" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4712" instrument_node="">It shouldn’t be very difficult now to comprehend the importance of the corresponding realizations which would beget the top emotions to determine and facilitate an individual’s evolutionary track.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4638" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4639" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4640" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4654" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4681" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4682" style="box-sizing: border-box; display: inline-flex; background-colo der-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4401" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4402" instrument_node="">If you feel you may benefit from further guidance and assistance in understanding and deepening in natural stillness, you can contact the BSWA online and interact with experienced meditation teachers and practitioners.</span></span></p><span data-dcnode-id="4399" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4396" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4397" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4398" instrument_node="">May you be well and happy and live at ease.</span></span></p><span data-dcnode-id="4395" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4392" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4393" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4394" instrument_node="">Here's an ‘annotated’ teaching given by the historical Buddha (its applicable to ordained and lay Buddhist practitioners):</span></span></p><span data-dcnode-id="4391" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4386" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4389" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4390" instrument_node="">“</span></span><span data-dcnode-id="4387" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4388" instrument_node="">He attends unwisely in this way: ‘Did I exist in the past? Did I not exist in the past? What was I in the past? How was I in the past? Having been what, what was I in the past? Will I exist in the future? Will I not exist in the future? What will I be in the future? How will I be in the future? Having been what, what will I be in the future?’ Or he is internally confused about the present, [thinking] ‘Do I exist? Do I not exist? What am I? How am I? Where did this being come from? Where will it be going?’</span></span></p><span data-dcnode-id="4385" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4382" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4383" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4384" instrument_node="">These are a few examples of useless speculative thinking. Pondering these kinds of questions does nothing to improve one’s mental conditions and does not help to free one from dissatisfaction and discontent.</span></span></p><span data-dcnode-id="4381" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4376" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4379" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4380" instrument_node="">“</span></span><span data-dcnode-id="4377" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4378" instrument_node="">For one who attends unwisely in this way, one of six perspectives arises:</span></span></p><span data-dcnode-id="4375" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4370" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4373" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4374" instrument_node="">“</span></span><span data-dcnode-id="4371" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4372" instrument_node="">The perspective ‘I have a self’ arises for him as true and reliable.</span></span></p><span data-dcnode-id="4369" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4364" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4367" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4368" instrument_node="">“</span></span><span data-dcnode-id="4365" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4366" instrument_node="">The perspective ‘I do not have a self’ arises for him as true and reliable.</span></span></p><span data-dcnode-id="4363" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4358" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4361" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4362" instrument_node="">“</span></span><span data-dcnode-id="4359" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4360" instrument_node="">The perspective ‘Possessing a self, I perceive a self’ arises for him as true and reliable. “The perspective ‘Possessing a self, I perceive non-self’ arises for him as true and reliable. “The perspective ‘Not possessing a self, I perceive a self’ arises for him as true and reliable.</span></span></p><span data-dcnode-id="4357" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4352" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4355" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4356" instrument_node="">“</span></span><span data-dcnode-id="4353" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4354" instrument_node="">Or this perspective occurs to him: ‘There is this self of mine which can speak and feel, which experiences the results of good and bad actions. This self of mine is permanent, fixed, eternal, unchangeable, and it will remain like this forever.’</span></span></p><span data-dcnode-id="4351" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4348" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4349" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4350" instrument_node="">These six perspectives are six examples of egotism or self-obsession. Most people believe in their own individual existence; in some kind of “soul” or “personal essence” which exists eternally. However, one of the primary doctrines of Buddhism is that there is no such soul; there is no eternally existent essence to be found in any being. Instead, what we perceive to be an individual is simply a temporary collection of transient conditions, none of which are immutable or eternal. Thus in Buddhism, suffering is inherently rooted in our tendency to identify with this mass of temporary conditions; to regard it as who and what we are. Then when it changes in ways we dislike, we become distraught. If instead we regard the mind and body as a temporary set of temporary conditions and not as “me” or “mine,” then when those conditions change we are not disturbed.</span></span></p><span data-dcnode-id="4347" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4333" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4345" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4346" instrument_node="">“</span></span><span data-dcnode-id="4343" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4344" instrument_node="">Monks, this is called arrival at perspectives, the thicket of perspectives, the wilderness of perspectives, the agitation of perspectives, the struggle of perspectives, the fetter of perspectives. Monks, fettered by the fetter of perspectives, the unlearned ordinary person is not freed from birth, old age, dieing, sorrow, grief, pain, depression, and anguish; he is not freed from suffering </span></span><span class="q-inline" data-dcnode-id="4336" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bhantesuddhaso.com/teachings/sutta/all-the-defilements-mn2-sabbasava-sutta/%23sdfootnote3sym" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: bold; font-style: normal; background: none;" target="_blank" title="bhantesuddhaso.com"><span data-dcnode-id="4342" instrument_node="">3</span></a><span class="q-inlineBlock" data-dcnode-id="4337" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4338"><svg data-dcnode-id="4339" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4340" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4334" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4335" instrument_node="">, I say.</span></span></p><span data-dcnode-id="4332" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4329" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4330" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4331" instrument_node="">Here the Buddha sums up the basic problem of getting stuck on such self-centric perspectives: one remains stuck in the ongoing cycle of birth and death, of pain and loss, of depression and anguish.</span></span></p><span data-dcnode-id="4328" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4323" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4326" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4327" instrument_node="">“</span></span><span data-dcnode-id="4324" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4325" instrument_node="">Monks, a noble disciple – one who associates with noble ones, who has mastered the teaching of the noble ones, who is well-disciplined in the qualities of the noble ones, who associates with true people, who has mastered the teaching of true people, who is well-disciplined in the qualities of true people – understands phenomena that are to be paid attention to, and understands phenomena that are not to be paid attention to. Understanding phenomena that are to be paid attention to and understanding phenomena that are not to be paid attention to, he does not pay attention to phenomena that are not to be paid attention to, and he does pay attention to phenomena that are to be paid attention to.</span></span></p><span data-dcnode-id="4322" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4310" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4320" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4321" instrument_node="">This is the positive scenario: a person who is committed to spiritual practice; one who does make an effort to seek out and connect with advanced practitioners, and tries to understand and apply the teachings of spiritual self-development. Accordingly, such a person begins to recognize that there are certain phenomena which it is best to avoid focusing on, for one’s own sake.</span></span><span data-dcnode-id="4318" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4319" instrument_node="">” - </span></span><span class="q-inline" data-dcnode-id="4311" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bhantesuddhaso.com/teachings/annotated-discourses/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="bhantesuddhaso.com"><span data-dcnode-id="4317" instrument_node="">Annotated Discourses - Bhante Suddhāso</span></a><span class="q-inlineBlock" data-dcnode-id="4312" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4313"><svg data-dcnode-id="4314" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4315" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4243" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4244" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4245" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4259" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4281" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4282" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4292" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4293" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottom sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="4092" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4093" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="4094" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="4095" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4096" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4117" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4118" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4119" instrument_node="">As it is said,Man is a social animal. We all live together. Dont you feel like helping your friend in distress? Dont you feel like making your parents proud one day? Dont you feel like giving surprises to your partner and making him or her special?</span></span></p><span data-dcnode-id="4116" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4113" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4114" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4115" instrument_node="">What are these questions indicating? It indicates that we want to understand others and make them feel good which in turn makes us feel good. We all want to live together and so we want to share feelings of happiness and sorrow with others.</span></span></p><span data-dcnode-id="4112" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4109" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4110" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4111" instrument_node="">Psychology is all about understanding mind and behaviour of others. So until and unless you understand behaviour</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4097" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4098" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4099" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4100" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4101" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4106" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4107" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4108" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4102" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4103"><svg data-dcnode-id="4104" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4105" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4061" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4062" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4063"><span class="q-box qu-userSelect--text" data-dcnode-id="4064" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4089" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4090" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4091" instrument_node="">As it is said,Man is a social animal. We all live together. Dont you feel like helping your friend in distress? Dont you feel like making your parents proud one day? Dont you feel like giving surprises to your partner and making him or her special?</span></span></p><span data-dcnode-id="4088" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4085" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4086" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4087" instrument_node="">What are these questions indicating? It indicates that we want to understand others and make them feel good which in turn makes us feel good. We all want to live together and so we want to share feelings of happiness and sorrow with others.</span></span></p><span data-dcnode-id="4084" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4081" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4082" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4083" instrument_node="">Psychology is all about understanding mind and behaviour of others. So until and unless you understand behaviour of others such as your parent's mindset ,you will not come to know what you should do to them(such as making them feel proud).</span></span></p><span data-dcnode-id="4080" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4077" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4078" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4079" instrument_node="">This is the reason psychology is important.</span></span></p><span data-dcnode-id="4076" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4073" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4074" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4075" instrument_node="">Suppose, I know my friend who is arrogant and selfish so in some case she disagrees with my point of view because of her bias nature and if I come to know that her behaviour is partial because of her own shortcomings in thinking then I would not argue much as it is she won't understand my view. In this case psychology of others helps make realize that its good to keep patience and stop arguing instead of just keeping one's side and making situation worst.</span></span></p><span data-dcnode-id="4072" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4069" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4070" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4071" instrument_node="">Knowing how other will act helps predicting and taking actions according to our needs and interests.</span></span></p><span data-dcnode-id="4068" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4065" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4066" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4067" instrument_node="">My advice is that dont be influential by various factors. Try to judge things without bias and be neutral in perspectives. Keep smiling:)</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3993" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8 n: absolute;"></div><div class="q-flex qu-mb--tiny" data-dcnode-id="3918" style="box-sizing: border-box; display: flex;"><div class="q-text qu-dynamicFontSize--regular_title qu-bold qu-color--gray_dark_dim qu-passColorToLinks qu-lineHeight--regular qu-wordBreak--break-word" data-dcnode-id="3919" style="box-sizing: border-box;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3920"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 TitleText___StyledCssInlineComponent-sc-1hpb63h-0 jPnwvF" data-dcnode-id="3921"><a class="q-box qu-display--block qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Why-do-people-study-psychology" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3923" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="3924" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="3925" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="3926" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3927" style="box-sizing: border-box;"><span data-dcnode-id="3928" style="background: none;"><span data-dcnode-id="3929" instrument_node="">Why do people study psychology?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3854" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3855" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3856" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3915" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="3857" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3889" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3890" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3891" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3892" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3893" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3912" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3913" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3914" instrument_node="">I'm a mathematician but started out with an undergrad major in psychology. At the time, I chose psychology because the behavior of people interested me and I wanted to know more about it. In the two short years that I was a psychology major at university (before changing to mathematics, while keeping psychology as a minor) I learned a lot of really interesting things that I still use today in my career as a mathematician and teacher. </span></span></p><span data-dcnode-id="3911" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3906" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3909" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3910" instrument_node="">First of all, cognitive psychology provides a set of tools and theories for understanding how humans think and -- especially importantly for me -- how people </span></span><span data-dcnode-id="3907" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3908" instrument_node="">lear</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3894" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3895" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3896" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3897" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3898" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3903" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3904" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3905" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3899" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3900"><svg data-dcnode-id="3901" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3902" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3858" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3859" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3860"><span class="q-box qu-userSelect--text" data-dcnode-id="3861" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3886" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3887" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3888" instrument_node="">I'm a mathematician but started out with an undergrad major in psychology. At the time, I chose psychology because the behavior of people interested me and I wanted to know more about it. In the two short years that I was a psychology major at university (before changing to mathematics, while keeping psychology as a minor) I learned a lot of really interesting things that I still use today in my career as a mathematician and teacher. </span></span></p><span data-dcnode-id="3885" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3878" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3883" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3884" instrument_node="">First of all, cognitive psychology provides a set of tools and theories for understanding how humans think and -- especially importantly for me -- how people </span></span><span data-dcnode-id="3881" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3882" instrument_node="">learn</span></span><span data-dcnode-id="3879" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3880" instrument_node="">. I find myself dipping into my cognitive psychology training every day as I plan lessons and think about pedagogical techniques. Somebody interested in teaching would do very well to study cognitive psychology (and neuroscience, by extension) because it provides a rigorous scientific foundation for understanding teaching and learning. </span></span></p><span data-dcnode-id="3877" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3874" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3875" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3876" instrument_node="">Social psychology is also useful for the same kinds of people, and for the same reasons. In fact there are some intriguing interactions between social and cognitive psychology -- how people think and learn in groups. </span></span></p><span data-dcnode-id="3873" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3870" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3871" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3872" instrument_node="">I took a class in developmental psychology that I thought was fascinating. When I became a parent, the things I learned in that subject became very useful -- and very concrete. </span></span></p><span data-dcnode-id="3869" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3866" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3867" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3868" instrument_node="">More technically, when I was doing some mathematical work in machine learning a few years ago, I found myself reading research papers that I once read back in the late 80's as a psychology undergrad. I thought it was neat that my academic life had sort of come full circle with psychology and mathematics combining like that. </span></span></p><span data-dcnode-id="3865" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3862" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3863" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3864" instrument_node="">Other people can provide other items, but generally speaking I've found that I've gotten an awful lot of mileage out of the half-dozen or so courses I took in psychology as an undergrad.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3785" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3786" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3787" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3801" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3828" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3829" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3839" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3840" style="box-sizing: border-box; position: relative;"><button aria-label="102 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu _node="">Why is the study of psychology so interesting and important?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3624" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3625" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3626" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3695" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="3627" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3663" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3664" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3665" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3666" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3667" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3692" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3693" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3694" instrument_node="">I am not gonna tell you some objective, statistical reason.</span></span></p><span data-dcnode-id="3691" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3688" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3689" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3690" instrument_node="">I will tell you my journey.</span></span></p><span data-dcnode-id="3687" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3684" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3685" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3686" instrument_node="">I was broken. I was suicidal when I was 12. I don’t exactly remember what stopped me but it was my parents’ tear stroked faces, cluelessness that what went wrong and I didn’t want them to go through with it because they were the only people whose presence was holding me together against all my peers, classmates, siblings, cousins, rest of the world. Many things happened in the next couple of years, but the most important was I was ready to see the toxicity that my own people were spreading in my life.</span></span></p><span data-dcnode-id="3683" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3680" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3681" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3682" instrument_node="">Then som</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3668" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3669" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3670" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3671" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3672" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3677" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3678" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3679" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3673" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3674"><svg data-dcnode-id="3675" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3676" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3628" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3629" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3630"><span class="q-box qu-userSelect--text" data-dcnode-id="3631" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3660" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3661" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3662" instrument_node="">I am not gonna tell you some objective, statistical reason.</span></span></p><span data-dcnode-id="3659" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3656" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3657" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3658" instrument_node="">I will tell you my journey.</span></span></p><span data-dcnode-id="3655" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3652" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3653" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3654" instrument_node="">I was broken. I was suicidal when I was 12. I don’t exactly remember what stopped me but it was my parents’ tear stroked faces, cluelessness that what went wrong and I didn’t want them to go through with it because they were the only people whose presence was holding me together against all my peers, classmates, siblings, cousins, rest of the world. Many things happened in the next couple of years, but the most important was I was ready to see the toxicity that my own people were spreading in my life.</span></span></p><span data-dcnode-id="3651" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3648" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3649" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3650" instrument_node="">Then someone introduced me to psychology, there I was looking for reasons and excuses for my behaviours that didn’t go very well in eyes of those people. But slowly, the world of psychology slowly gave me the actually reasons of why it was happening. It showed me self-acceptance. It showed that what I am doing right now is my journey to self-growth. Everyday has been healing since then.</span></span></p><span data-dcnode-id="3647" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3644" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3645" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3646" instrument_node="">And now it’s been 6 years since then, what more I have been able to see is that every single person standing next to you is going through something. Psychology doesn’t predict what it, but it gives you the understanding to know that something is always there in the context that I am not aware of.</span></span></p><span data-dcnode-id="3643" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3640" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3641" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3642" instrument_node="">Psychology also showed me that people are hurting all the time, but in this world or capitalism, perfection and cut-throat competition nobody has been taught to bandage those wounds. Nobody has been taught self-love, acceptance, letting-go, not to hurt others; and what the slightest of shaming might do to an individual.</span></span></p><span data-dcnode-id="3639" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3636" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3637" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3638" instrument_node="">And now I want to tell people that help each other in giving each other that first-aid, that care. I want to tell people to teach your children, students, siblings, friends, juniors, colleagues, employees and employers to self-love and accept .</span></span></p><span data-dcnode-id="3635" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3632" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3633" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3634" instrument_node="">The hope that if we continue this path, there will be a generation that won’t suffer what we are, and even if they are, they don’t have to do it alone.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3560" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3561" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3562" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3576" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3598" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3599" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3609" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3610" style="box-sizing: border-box; position: relative;"><button aria-label="3 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="3611" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width: 0px; outline: none; color: inherit; background-color: transparent;" tabindex="0"><div class="q-relative qu-display--inline-fle ter qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3480" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="3481" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="3482" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="3483" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3484" style="box-sizing: border-box;"><span data-dcnode-id="3485" style="background: none;"><span data-dcnode-id="3486" instrument_node="">How do I understand which way of psychology to go?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mb--tiny spacing_log_originally_answered_banner qu-color--gray_light qu-passColorToLinks" data-dcnode-id="3470" style="box-sizing: border-box;"><span data-dcnode-id="3472" instrument_node="">Originally Answered: </span><span data-dcnode-id="3471" instrument_node="">How do I understand which way of psychology to go?I want to be a psychologist, but I don't know what to choose.There are so many directions "Gestalt, child psychology, clinical psychologist and so on"</span></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3445" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3446" style="box-sizing: border-box;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3447" style="box-sizing: border-box;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3448" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3449" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3467" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3468" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3469" instrument_node="">It’s really difficult to help someone knowing so little about you, other than your question posed here.</span></span></p><span data-dcnode-id="3466" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3463" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3464" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3465" instrument_node="">I recommend three things:</span></span></p><ol class="q-box" data-dcnode-id="3453" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3460" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3461" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3462" instrument_node="">Take as many undergraduate psychology courses as possible and see which area(s) interests you the most;</span></span></li><li class="q-relative" data-dcnode-id="3457" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3458" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3459" instrument_node="">Take a couple of independent studies so that you can dive a little deeper into a subspeciality with a faculty member who has expertise in a particular area.</span></span></li><li class="q-relative" data-dcnode-id="3454" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3455" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3456" instrument_node="">Have several conversations with your advisor and some faculty members at your university.</span></span></li></ol><p class="q-text qu-display--inline qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3450" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3451" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3452" instrument_node="">Know this: specialization does not happen in your undergraduate years. Specialization happens in a doctoral program.</span></span></p></span></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3371" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3372" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3373" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3387" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3419" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3420" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" d
