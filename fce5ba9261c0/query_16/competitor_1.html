</span><p align="left" class="MsoNormal" data-dcnode-id="5306" style="float:left;"><a data-dcnode-id="5307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dur.ac.uk/education/"><img alt="Click here for the web pages of the School of Education, Durham University." border="0" data-dcnode-id="5308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.dur.ac.uk/rosalyn.roberts/Evidence/logosmallUoDSoE.jpg&amp;raw" style="vertical-align:middle" title="Click here for the web pages of the School of Education, Durham University."></a></p><span data-dcnode-id="5305" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="5303"><span data-dcnode-id="5304" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5302" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">Research into Understanding Scientific Evidence</span></p><span data-dcnode-id="5299" instrument_node="">
</span><h5 data-dcnode-id="5296"><span data-dcnode-id="5297" style="font-family:&quot;Verdana&quot;,&quot;sans-serif&quot;"><span data-dcnode-id="5298" instrument_node="">Richard Gott, Sandra Duggan, Ros Roberts and Ahmed Hussain</span></span></h5><span data-dcnode-id="5295" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5292" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5289" instrument_node="">

</span><span data-dcnode-id="5287" instrument_node="">

</span><span data-dcnode-id="5279" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="0" class="MsoNormalTable" data-dcnode-id="5277" style="margin-left:-2.25pt;border-collapse:collapse"><tbody data-dcnode-id="5278"><tr data-dcnode-id="5280" style="height:35.25pt"><td data-dcnode-id="5282" style="width:500pt;background:silver;padding: 0cm 1.5pt 0cm 1.5pt;height:35.25pt" valign="top" width="381"><span data-dcnode-id="5286" instrument_node="">
</span><h1 data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">Introduction</span></h1><span data-dcnode-id="5283" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="5276" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5273" instrument_node="">
</span><p data-dcnode-id="5268"><span data-dcnode-id="5272" instrument_node="">Our research is based on the belief that there is a body of knowledge which underlies an understanding of scientific evidence. Certain ideas which underpin the collection, analysis and interpretation of data have to be understood before we can handle scientific evidence effectively. We have called these ideas </span><b data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">concepts of evidence</span></b><span data-dcnode-id="5269" instrument_node="">. Some pupils/students will pick up these ideas in the course of studying the more traditional areas of science, but many will not. These students will not understand how to evaluate scientific evidence unless the underlying concepts of evidence are specifically taught. If these ideas are to be taught, then they need to be carefully defined.</span></p><span data-dcnode-id="5267" instrument_node="">
</span><p data-dcnode-id="5265"><span data-dcnode-id="5266" instrument_node="">We are in the process of developing a comprehensive, but as yet tentative, definition of concepts of evidence ranging from the ideas associated with a single measurement to those which are associated with evaluating evidence as a whole. What follows is the latest version which has been, and continues to be, informed by research and writing in primary and secondary science education, in science-based industry and in the public understanding of science. Our definition is by no means complete and we welcome comments or suggestions from readers of this site.</span></p><span data-dcnode-id="5264" instrument_node="">
</span><p data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">The reader should note that we are not suggesting that students need to understand all of these concepts. Although we believe that some of these ideas are fundamental and appropriate at any age, others may be necessary only for a student engaged in a particular branch of science.</span></p><span data-dcnode-id="5261" instrument_node="">
</span><p data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">We are aware that some concepts, such as sensitivity, can have several meanings in different areas of science. We aim to point this out where applicable.</span></p><span data-dcnode-id="5258" instrument_node="">
</span><p data-dcnode-id="5256"><span data-dcnode-id="5257" instrument_node="">
	Further information:
	</span></p><span data-dcnode-id="5255" instrument_node="">
</span><ul class="MsoNormal" data-dcnode-id="5209"><span data-dcnode-id="5254" instrument_node="">
</span><li data-dcnode-id="5250"><span data-dcnode-id="5253" instrument_node="">The latest downloadable version of the complete list can be obtained </span><a data-dcnode-id="5251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.dur.ac.uk/rosalyn.roberts/Evidence/CofEv_Gott%2520et%2520al.pdf"><span data-dcnode-id="5252" instrument_node="">here.</span></a></li><span data-dcnode-id="5249" instrument_node="">
</span><li data-dcnode-id="5242"><span data-dcnode-id="5248" instrument_node="">A concept map for 'the thinking behind the doing' in scientific practice can be found </span><a data-dcnode-id="5246" href="#_The_thinking_behind_the_doing"><span data-dcnode-id="5247" instrument_node="">below</span></a><span data-dcnode-id="5245" instrument_node="">, and as a PDF file </span><a data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.dur.ac.uk/rosalyn.roberts/Evidence/Roberts%2520%26%2520Johnson%2520%282015%29%2520The%2520Curriculum%2520Journal%2520-%2520What%2520is%2520for%2520the%2520%27thinking%2520behind%2520the%2520doing%27%2520for%2520determining%2520the%2520validity%2520of%2520data.pdf"><span data-dcnode-id="5244" instrument_node="">here.</span></a></li><span data-dcnode-id="5241" instrument_node="">
</span><li data-dcnode-id="5237"><span data-dcnode-id="5240" instrument_node="">Investigations annotated to illustrate the application of 'the thinking behind the doing' approach can be found </span><a data-dcnode-id="5238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.dur.ac.uk/rosalyn.roberts/Evidence/Roberts%2520%282016%29%2520Pupil%2520investigations_annotated.pdf"><span data-dcnode-id="5239" instrument_node="">here.</span></a></li><span data-dcnode-id="5236" instrument_node="">
</span><li data-dcnode-id="5231"><span data-dcnode-id="5235" instrument_node="">A version produced in collaboration with teachers (funded by AQA) which describes the sub-set of the complete list appropriate to GCSE science in the UK can be found </span><a data-dcnode-id="5233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.dur.ac.uk/rosalyn.roberts/Evidence/CofEv_PDF_GCSE.pdf"><span data-dcnode-id="5234" instrument_node="">here</span></a><span data-dcnode-id="5232" instrument_node="">.</span></li><span data-dcnode-id="5230" instrument_node="">
</span><li data-dcnode-id="5225"><span data-dcnode-id="5229" instrument_node="">A report detailing a recent research project and links to the instruments used can be found </span><a data-dcnode-id="5227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.dur.ac.uk/rosalyn.roberts/Evidence/Gott%2520%26%2520Roberts%2520%282008%29%2520Research%2520Report.pdf"><span data-dcnode-id="5228" instrument_node="">here</span></a><span data-dcnode-id="5226" instrument_node="">.</span></li><span data-dcnode-id="5224" instrument_node="">
</span><li data-dcnode-id="5219"><span data-dcnode-id="5223" instrument_node="">Research publications can be found </span><a data-dcnode-id="5221" href="#_Here_are_some_of_our_most_recent_pu"><span data-dcnode-id="5222" instrument_node="">here</span></a><span data-dcnode-id="5220" instrument_node="">.</span></li><span data-dcnode-id="5218" instrument_node="">
</span><li data-dcnode-id="5211"><span data-dcnode-id="5217" instrument_node="">This work has been influential in framing curriculum developments in England and has been cited in the US's </span><em data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">Framework for K-12 Science Education</span></em><span data-dcnode-id="5214" instrument_node=""> and the </span><em data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">PISA 2015 Science Framework.</span></em></li><span data-dcnode-id="5210" instrument_node="">
</span></ul><span data-dcnode-id="5208" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5205" instrument_node="">

</span><h1 data-dcnode-id="5200"><span data-dcnode-id="5201" instrument_node="">Background</span></h1><span data-dcnode-id="5199" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="5192" instrument_node="">
</span><h2 data-dcnode-id="5190"><span data-dcnode-id="5191" instrument_node="">Fundamental ideas</span></h2><span data-dcnode-id="5189" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="5187"><span data-dcnode-id="5188" instrument_node="">Investigations must be approached with a critical eye. What sort of link is to be established, with what level of measurement and how will opinion and data be weighed as evidence? This pervades the entire scheme and sets the context in which all that follows needs to be judged.</span></p><span data-dcnode-id="5186" instrument_node="">

</span><p align="center" class="MsoNormal" data-dcnode-id="5170" style="text-align:center"><b data-dcnode-id="5171"><span data-dcnode-id="5172" style="font-family:&quot;Helvetica&quot;,&quot;sans-serif&quot;"><span data-dcnode-id="5173" instrument_node="">Understanding that:</span></span></b></p><span data-dcnode-id="5169" instrument_node="">

</span><p align="center" class="MsoNormal" data-dcnode-id="5162" style="text-align:center"><b data-dcnode-id="5163"><span data-dcnode-id="5164" style="font-family:&quot;Helvetica&quot;,&quot;sans-serif&quot;"><span data-dcnode-id="5165" instrument_node="">Notes</span></span></b></p><span data-dcnode-id="5161" instrument_node="">

</span><p class="tableftcol" data-dcnode-id="5151"><span data-dcnode-id="5153" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="5154" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="5152" instrument_node="">Opinion and data</span></p><span data-dcnode-id="5150" instrument_node="">
</span></td><td data-dcnode-id="5142" style="width:39.66%;background:SandyBrown;padding: 0cm 3.0pt 0cm 3.0pt;height:29.55pt" valign="top" width="39%"><span data-dcnode-id="5147" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="5144"><span data-dcnode-id="5145" style="font-size:7.5pt"><span data-dcnode-id="5146" instrument_node="">It is necessary to distinguish between opinion based on scientific evidence and ideas on the one hand, and opinion based on non-scientific ideas (prejudice, whim, hear say . . ) on the other.</span></span></p><span data-dcnode-id="5143" instrument_node="">
</span></td><td data-dcnode-id="5135" style="width:35.2%;background:SandyBrown;padding:0cm 3.0pt 0cm 3.0pt; height:29.55pt" valign="top" width="35%"><span data-dcnode-id="5140" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="5137"><span data-dcnode-id="5138" style="font-size:7.5pt"><span data-dcnode-id="5139" instrument_node="">In the UK, the Royal Society’s motto ‘Nullius in verba' which roughly translates as 'take nobody’s word for it' emphasises the central importance in science of evidence over assertion, as scientists make claims following investigations into the real world. All scientific research is judged on the quality of its evidence.</span></span></p><span data-dcnode-id="5136" instrument_node="">
</span></td></tr><tr data-dcnode-id="5108" style="height:40pt"><td data-dcnode-id="5124" style="width:25.14%;background:SandyBrown;padding: 0cm 3.0pt 0cm 3.0pt;height:40pt" valign="top" width="25%"><span data-dcnode-id="5130" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="5126"><span data-dcnode-id="5128" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="5129" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="5127" instrument_node="">Links</span></p><span data-dcnode-id="5125" instrument_node="">
</span></td><td data-dcnode-id="5117" style="width:39.66%;background:SandyBrown;padding: 0cm 3.0pt 0cm 3.0pt;height:40pt" valign="top" width="39%"><span data-dcnode-id="5122" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="5119"><span data-dcnode-id="5120" style="font-size:7.5pt"><span data-dcnode-id="5121" instrument_node="">A scientific investigation seeks to establish links (and the form of those links) between two or more variables.</span></span></p><span data-dcnode-id="5118" instrument_node="">
</span></td><td data-dcnode-id="5110" style="width:35.2%;background:SandyBrown;padding:0cm 3.0pt 0cm 3.0pt; height:40pt" valign="top" width="35%"><span data-dcnode-id="5115" instrument_node="">

</span><p class="MsoNormal" data-dcnode-id="4762"><span data-dcnode-id="4763" style="font-size:7.5pt"><span data-dcnode-id="4764" instrument_node="">The measured value of any variable will never repeat unless all possible variables are controlled between measurements - circumstances which are very difficult to create.</span></span></p><span data-dcnode-id="4761" instrument_node="">
</span></td><td data-dcnode-id="4753" style="width:35.2%;background:SandyBrown;padding:0cm 3.0pt 0cm 3.0pt; height:29.55pt" valign="top" width="35%"><span data-dcnode-id="4758" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4755"><span data-dcnode-id="4756" style="font-size:7.5pt"><span data-dcnode-id="4757" instrument_node="">Such uncertainties are inherent in the measurement process that lies at the heart of science; they do not represent a failure of science, or of scientists.</span></span></p><span data-dcnode-id="4754" instrument_node="">

</span><table border="0" cellpadding="0" cellspacing="0" class="MsoNormalTable" data-dcnode-id="4707" style="margin-left:-2.25pt;border-collapse:collapse"><tbody data-dcnode-id="4708"><tr data-dcnode-id="4710" style="height:35.25pt"><td data-dcnode-id="4712" style="width:500pt;background:silver;padding: 0cm 1.5pt 0cm 1.5pt;height:35.25pt" valign="top" width="381"><span data-dcnode-id="4716" instrument_node="">
</span><h1 data-dcnode-id="4714"><span data-dcnode-id="4715" instrument_node="">A framework for data and evidence</span></h1><span data-dcnode-id="4713" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="4706" instrument_node="">
</span><p data-dcnode-id="4704"><span data-dcnode-id="4705" instrument_node="">In any discussion of the place of data and evidence in science or engineering, we must avoid the trap of failing to define terms and, as a consequence, rendering the argument unintelligible. We shall therefore begin by defining what we mean by data and evidence.</span></p><span data-dcnode-id="4703" instrument_node="">
</span><p data-dcnode-id="4698"><span data-dcnode-id="4702" instrument_node="">We take </span><b data-dcnode-id="4700"><span data-dcnode-id="4701" instrument_node="">datum</span></b><span data-dcnode-id="4699" instrument_node=""> to mean the measurement of a parameter e.g. the volume of gas or the type of rubber. This does not necessarily mean a single measurement: it may be the result of averaging several repeated measurements and these could be quantitative or qualitative.</span></p><span data-dcnode-id="4697" instrument_node="">
</span><p data-dcnode-id="4693"><b data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">Data</span></b><span data-dcnode-id="4694" instrument_node=""> we take to be no more or less than the plural of datum, to state the obvious.</span></p><span data-dcnode-id="4692" instrument_node="">
</span><p data-dcnode-id="4688"><b data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">Evidence</span></b><span data-dcnode-id="4689" instrument_node="">, on the other hand, we take as data which have been subjected to some form of validation so that it is possible, for instance, to assign a 'weight' to the data when coming to an overall judgement. This process of weighting will need to look wider than the data itself. It will need to consider, for example, the quality of the experiment and the conditions under which it was undertaken, together with its reproducibility by other workers in other circumstances and perhaps the practicality of implementing the outcomes of the evidence.</span></p><span data-dcnode-id="4687" instrument_node="">
</span><p align="center" class="MsoNormal" data-dcnode-id="4685" style="text-align:center"><img border="0" data-dcnode-id="4686" height="348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.dur.ac.uk/rosalyn.roberts/Evidence/darts.jpg&amp;raw" width="460"></p><span data-dcnode-id="4684" instrument_node="">
</span><p align="center" class="MsoNormal" data-dcnode-id="4682" style="text-align:center"><span data-dcnode-id="4683" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4681" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4679" style="margin-bottom:12.0pt"><span data-dcnode-id="4680" instrument_node="">We begin our definition in the centre of the figure above with the ideas that underpin the making of a single measurement and work outwards. This seems a logical way to proceed but, please note, that we are not suggesting that this equates with the order of understanding necessary for carrying out an experiment or the order in which these ideas are best taught.</span></p><span data-dcnode-id="4678" instrument_node="">
</span><span data-dcnode-id="4677" instrument_node="">

</span></td></tr></tbody></table><span data-dcnode-id="4665" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">To make a single measurement, the choice of an instrument must be suited to the value to be measured. Making an appropriate choice is informed by an understanding of the basic principles underlying measuring instruments.</span></p><span data-dcnode-id="4662" instrument_node="">
</span><h2 data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">1&nbsp; Underlying relationships</span></h2><span data-dcnode-id="4659" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">All instruments rely on an underlying relationship which converts the variable being measured into another that is easily read. For instance, the following (volume, temperature and force) are measured by instruments which convert each variable into length:</span></p><span data-dcnode-id="4656" instrument_node="">
</span><ul data-dcnode-id="4633" style="margin-top:0cm" type="disc"><span data-dcnode-id="4655" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="4649" style="color:maroon"><b data-dcnode-id="4650"><span data-dcnode-id="4654" instrument_node="">a measuring cylinder converts </span><i data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">volume</span></i><span data-dcnode-id="4651" instrument_node=""> to a length of the column of liquid</span></b></li><span data-dcnode-id="4648" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="4642" style="color:maroon"><b data-dcnode-id="4643"><span data-dcnode-id="4647" instrument_node="">a thermometer converts </span><i data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">temperature</span></i><span data-dcnode-id="4644" instrument_node=""> to a change in volume and then to a change in length of the mercury thread</span></b></li><span data-dcnode-id="4641" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="4635" style="color:maroon"><b data-dcnode-id="4636"><span data-dcnode-id="4640" instrument_node="">a force meter converts a </span><i data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">force</span></i><span data-dcnode-id="4637" instrument_node=""> into the changing length of a spring</span></b></li><span data-dcnode-id="4634" instrument_node="">
</span></ul><span data-dcnode-id="4632" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">Other instruments convert the variable to an angle on a curved scale, such as a car speedometer. Electronic instruments convert the variable to a voltage.</span></p><span data-dcnode-id="4629" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">Some instruments are not so obviously 'instruments' and may not be recognised as such. One example is the use of lichen as an indicator of pollution and another is pH paper where chemical change is used as the basis of the 'instrument' and the measurement is a colour. Other instruments rely on more complex and less direct relationships.</span></p><span data-dcnode-id="4626" instrument_node="">

</span><p class="MsoNormal" data-dcnode-id="3975"><span data-dcnode-id="3976" style="font-size:7.5pt"><span data-dcnode-id="3977" instrument_node="">If the mean of a series of readings of the height of an individual pupil is 173 cm and her 'true' height, as measured by a clinic's instrument is 173 cm, the measuring instrument is 'true'.</span></span></p><span data-dcnode-id="3974" instrument_node="">

</span><p class="MsoNormal" data-dcnode-id="3949"><span data-dcnode-id="3950" style="font-size:7.5pt"><span data-dcnode-id="3951" instrument_node="">Weighing yourself on a set of bathroom scales in different places on the bathroom floor, or standing on a slightly different position on the scales, will result in slightly differing readings. It is never possible to repeat the reading in exactly the same way.</span></span></p><span data-dcnode-id="3948" instrument_node="">
</span></td></tr><tr data-dcnode-id="3919"><td data-dcnode-id="3935" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3942" instrument_node="">

</span></td><td data-dcnode-id="3928" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3933" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3930"><span data-dcnode-id="3931" style="font-size:7.5pt"><span data-dcnode-id="3932" instrument_node="">... precision (sometimes called "imprecision" in industry) refers to the observed variations in repeated measurements from the same instrument. In other words, precision is an indication of the spread of the repeated measurements around the mean. A precise measurement is one in which the readings cluster closely together. The less the instrument’s precision, the greater is its uncertainty. A precise measurement may not necessarily be an accurate or true measurement (and vice versa). The concept of precision is also called "reliability" in some fields. A more formal descriptor or assessment of precision might be the range of the observed readings, the standard deviation of those readings, or the standard error of the instrument itself.</span></span></p><span data-dcnode-id="3929" instrument_node="">
</span></td><td data-dcnode-id="3921" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3926" instrument_node="">

</span></td></tr><tr data-dcnode-id="3893"><td data-dcnode-id="3909" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3916" instrument_node="">

</span><p class="MsoNormal" data-dcnode-id="3904"><span data-dcnode-id="3905" style="font-size:7.5pt"><span data-dcnode-id="3906" instrument_node="">... whereas repeatability (precision) relates to the ability of the method to give the same result for repeated tests of the same sample on the same equipment (in the same laboratory), reproducibility relates to the ability of the method to give the same result for repeated tests of the same sample on equipment in different laboratories.</span></span></p><span data-dcnode-id="3903" instrument_node="">
</span></td><td data-dcnode-id="3895" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3900" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3897"><span data-dcnode-id="3898" style="font-size:7.5pt"><span data-dcnode-id="3899" instrument_node="">'Round Robins' are often used to check between different laboratories. A standardised sample is sent to each lab and they report their measurement(s) and degree of uncertainty. Labs are then compared.</span></span></p><span data-dcnode-id="3896" instrument_node="">
</span></td></tr><tr data-dcnode-id="3867"><td data-dcnode-id="3883" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3890" instrument_node="">

</span></td><td data-dcnode-id="3577" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3582" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3579"><span data-dcnode-id="3580" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3581" instrument_node="">... the median is the value below and above which there are half the measurements.</span></span></p><span data-dcnode-id="3578" instrument_node="">
</span></td><td data-dcnode-id="3570" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3575" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3572"><span data-dcnode-id="3573" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3574" instrument_node="">Continuing the example above, the median is 3.3 cm.</span></span></p><span data-dcnode-id="3571" instrument_node="">
</span></td></tr><tr data-dcnode-id="3542"><td data-dcnode-id="3558" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3565" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="3560"><span data-dcnode-id="3564" instrument_node="">30.</span><span data-dcnode-id="3562" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="3563" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="3561" instrument_node="">Mean</span></p><span data-dcnode-id="3559" instrument_node="">
</span></td><td data-dcnode-id="3551" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3556" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3553"><span data-dcnode-id="3554" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3555" instrument_node="">... the mean (average) is the sum of all the measurements divided by the number of measurements.</span></span></p><span data-dcnode-id="3552" instrument_node="">
</span></td><td data-dcnode-id="3544" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3549" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3546"><span data-dcnode-id="3547" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3548" instrument_node="">Continuing the example above, the mean is 3.2 cm.</span></span></p><span data-dcnode-id="3545" instrument_node="">
</span></td></tr><tr data-dcnode-id="3516"><td data-dcnode-id="3532" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3539" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="3534"><span data-dcnode-id="3538" instrument_node="">31.</span><span data-dcnode-id="3536" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="3537" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="3535" instrument_node="">Frequency distributions.</span></p><span data-dcnode-id="3533" instrument_node="">
</span></td><td data-dcnode-id="3525" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3530" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3527"><span data-dcnode-id="3528" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3529" instrument_node="">... a series of readings of the same datum can be represented as a frequency distribution by grouping repeated measurements which fall within a given range and plotting the frequencies of the grouped measurements.</span></span></p><span data-dcnode-id="3526" instrument_node="">
</span></td><td data-dcnode-id="3518" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3523" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3520"><span data-dcnode-id="3521" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3522" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="3519" instrument_node="">
</span></td></tr><tr data-dcnode-id="3490"><td data-dcnode-id="3506" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3513" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="3508"><span data-dcnode-id="3512" instrument_node="">32.</span><span data-dcnode-id="3510" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="3511" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="3509" instrument_node="">Standard deviation.</span></p><span data-dcnode-id="3507" instrument_node="">
</span></td><td data-dcnode-id="3499" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3504" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3501"><span data-dcnode-id="3502" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3503" instrument_node="">... the standard deviation (SD) is a way of describing the spread of normally distributed data. The standard deviation indicates how closely the measurements cluster around their mean. In other words, the standard deviation is a measure of the extent to which measurements deviate from their mean. The more closely the measurements cluster around the mean, the smaller the standard deviation. The standard deviation depends on the measuring instrument and technique - the more precise these are, the smaller the standard deviation of the sample or of repeated measurements.</span></span></p><span data-dcnode-id="3500" instrument_node="">
</span></td><td data-dcnode-id="3492" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3497" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3494"><span data-dcnode-id="3495" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3496" instrument_node="">Continuing the example above, SD = 0.30 cm.</span></span></p><span data-dcnode-id="3493" instrument_node="">
</span></td></tr><tr data-dcnode-id="3464"><td data-dcnode-id="3480" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3487" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="3482"><span data-dcnode-id="3486" instrument_node="">33.</span><span data-dcnode-id="3484" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="3485" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="3483" instrument_node="">Standard deviation of the mean (standard error).</span></p><span data-dcnode-id="3481" instrument_node="">
</span></td><td data-dcnode-id="3473" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3478" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3475"><span data-dcnode-id="3476" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3477" instrument_node="">... the standard deviation of the mean describes the frequency distribution of the means from a series of readings repeated many times. The standard deviation of the mean depends on the measuring instrument and technique AND on the number of repeats. The standard error of a measurement is an estimate of the probable range within which the 'true' mean falls; that is, an estimate of the uncertainty associated with the datum.</span></span></p><span data-dcnode-id="3474" instrument_node="">
</span></td><td data-dcnode-id="3466" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3471" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3468"><span data-dcnode-id="3469" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3470" instrument_node="">Continuing the example above, SE = 0.09 cm.</span></span></p><span data-dcnode-id="3467" instrument_node="">
</span></td></tr><tr data-dcnode-id="3438"><td data-dcnode-id="3454" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3461" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="3456"><span data-dcnode-id="3460" instrument_node="">34.</span><span data-dcnode-id="3458" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="3459" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="3457" instrument_node=""> Coefficient of variation.</span></p><span data-dcnode-id="3455" instrument_node="">
</span></td><td data-dcnode-id="3447" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3452" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3449"><span data-dcnode-id="3450" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3451" instrument_node="">... the coefficient of variation is the standard deviation expressed as a percentage of the mean (CV = SD*100/mean).</span></span></p><span data-dcnode-id="3448" instrument_node="">
</span></td><td data-dcnode-id="3440" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3445" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3442"><span data-dcnode-id="3443" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3444" instrument_node="">Continuing the example above, CV = 9.4%.</span></span></p><span data-dcnode-id="3441" instrument_node="">
</span></td></tr><tr data-dcnode-id="3412"><td data-dcnode-id="3428" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3435" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="3430"><span data-dcnode-id="3434" instrument_node="">35.</span><span data-dcnode-id="3432" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="3433" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="3431" instrument_node=""> Confidence limits.</span></p><span data-dcnode-id="3429" instrument_node="">
</span></td><td data-dcnode-id="3421" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3426" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3423"><span data-dcnode-id="3424" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3425" instrument_node="">... confidence limits indicate the degree of confidence that can be placed on the datum. For example, '95% confidence limits' means that the 'true' datum lies within 2 standard errors of the calculated mean, 95% of the time. Similarly '68% confidence limits' means that the 'true' datum lies within 2 standard errors of the calculated mean, 68% of the time. </span></span></p><span data-dcnode-id="3422" instrument_node="">
</span></td><td data-dcnode-id="3414" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3419" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3416"><span data-dcnode-id="3417" style="font-size:7.5pt;color:windowtext"><span data-dcnode-id="3418" instrument_node="">Continuing the example above, the true value of the datum lies within 0.18 cm (2 standard errors) of 3.2 cm (the mean), 19 times out of 20. The upper and lower confidence limits at the 95% level are 3.38 (3.2 + 0.18) and 3.02 (3.2 - 0.18) respectively. In other words, the 'true' value lies between 3.02 and 3.38 cm, 95% of the time.</span></span></p><span data-dcnode-id="3415" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="3408" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3405" instrument_node="">
</span><h2 data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">4 Reliability and validity of a datum</span></h2><span data-dcnode-id="3402" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">A datum must have a known (or estimated) reliability and validity before it can be used in evidence.</span></p><span data-dcnode-id="3399" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Any datum must be subject to careful scrutiny to ascertain the extent to which it:</span></p><span data-dcnode-id="3396" instrument_node="">
</span><ul data-dcnode-id="3386" style="margin-top:0cm" type="disc"><span data-dcnode-id="3395" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="3392" style="color:maroon"><b data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">is valid: that is, has the value of the appropriate variable been measured? Has the parameter been sampled so that the datum represents the population?</span></b></li><span data-dcnode-id="3391" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="3388" style="color:maroon"><b data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">is reliable: for example, does the datum have sufficient precision? The wider the confidence limits (the greater the uncertainty), the less reliable the datum.</span></b></li><span data-dcnode-id="3387" instrument_node="">
</span></ul><span data-dcnode-id="3385" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">Only then can the datum be weighed as evidence. Evaluation of a datum also includes evaluating the validity of the ideas associated with the making of a single measurement.</span></p><span data-dcnode-id="3382" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3379" instrument_node="">
</span><span data-dcnode-id="3378" instrument_node="">

</span></td><td data-dcnode-id="3362" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3368" instrument_node="">

</span><p align="center" class="MsoNormal" data-dcnode-id="3356" style="text-align:center"><b data-dcnode-id="3357"><span data-dcnode-id="3358" style="font-family:&quot;Helvetica&quot;,&quot;sans-serif&quot;"><span data-dcnode-id="3359" instrument_node="">Example</span></span></b></p><span data-dcnode-id="3355" instrument_node="">
</span></td></tr><tr data-dcnode-id="3326"><td data-dcnode-id="3342" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3349" instrument_node="">

</span></td><td data-dcnode-id="3335" style="width:40.88%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="3340" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3337"><span data-dcnode-id="3338" style="font-size:7.5pt"><span data-dcnode-id="3339" instrument_node="">... a datum can only be weighed as evidence once the uncertainty associated with the instrument and the measurement procedures have been ascertained.</span></span></p><span data-dcnode-id="3336" instrument_node="">
</span></td><td data-dcnode-id="3328" style="width:33.98%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="3333" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3330"><span data-dcnode-id="3331" style="font-size:7.5pt"><span data-dcnode-id="3332" instrument_node="">The reliability of a measurement of blood alcohol level should be assessed in terms of the uncertainty associated with the breathalyser (e.g. +/- 0.01) and in terms of how the measurement was taken (e.g. superficial breathing versus deep breathing).</span></span></p><span data-dcnode-id="3329" instrument_node="">
</span></td></tr><tr data-dcnode-id="3300"><td data-dcnode-id="3316" style="width:25.14%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="25%"><span data-dcnode-id="3323" instrument_node="">

</span><h1 data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">Data in investigations - looking for relationships</span></h1><span data-dcnode-id="3287" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="3280" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">An investigation is an attempt to determine the relationship, or lack of one, between the independent and dependent variables or between two or more sets of data. Investigations take many forms but all have the same underlying structure.</span></p><span data-dcnode-id="3277" instrument_node="">
</span><h2 data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">1. The design of practical investigations</span></h2><span data-dcnode-id="3274" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3269"><span data-dcnode-id="3273" instrument_node="">What do we need to understand to be able to appraise the </span><i data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">design</span></i><span data-dcnode-id="3270" instrument_node=""> of an investigation in terms of validity and reliability?</span></p><span data-dcnode-id="3268" instrument_node="">
</span><h3 data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">1.1 Variable structure</span></h3><span data-dcnode-id="3265" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Identifying and understanding the basic structure of an investigation in terms of variables and their types helps to evaluate the validity of data.</span></p><span data-dcnode-id="3262" instrument_node="">

</span><h3 data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">1.2 Validity, 'fair tests' and controls</span></h3><span data-dcnode-id="3014" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Uncontrolled variation can be reduced through a variety of techniques. 'Fair tests' and controls aim to isolate the effect of the independent variable on the dependent variable. Laboratory-based investigations, at one end of the spectrum, involve the investigator changing the independent variable and keeping all the control variables constant. This is often termed 'the fair test', but is no more than one of a range of valid structures. At the other end of the spectrum are 'field studies' where many naturally changing variables are measured and correlations sought. For example, an ecologist might measure many variables in a habitat over a period of time. Having collected the data, correlations might be sought between variables such as day length and emergence of a butterfly, using statistical treatments to ensure validity. The possible effect of other variables can be reduced by only considering data where the values of other variables are the same or similar. In between these extremes, are many types of valid design which involve different degrees of manipulation and control. Fundamentally, all these investigations have a similar structure; what differs are the strategies to ensure validity.</span></p><span data-dcnode-id="3011" instrument_node="">

</span><p class="MsoNormal" data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">In evaluating the design of an investigation, there are two overarching questions:</span></p><span data-dcnode-id="2456" instrument_node="">

</span><li class="MsoNormal" data-dcnode-id="2448" style="color:maroon"><b data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Will the design result in sufficiently valid data to answer the question?</span></b></li><span data-dcnode-id="2447" instrument_node="">
</span></ul><span data-dcnode-id="2445" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Evaluating the design of an investigation includes evaluating the reliability and validity of the ideas associated with the making of single measurements and with each and every datum.</span></p><span data-dcnode-id="2442" instrument_node="">

</span><h3 data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">2.2 Statistical treatment of measurements of data</span></h3><span data-dcnode-id="2071" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">There are a large number of statistical techniques for analysing data which address three main questions:</span></p><span data-dcnode-id="2068" instrument_node="">
</span><ul data-dcnode-id="2054" style="margin-top:0cm" type="disc"><span data-dcnode-id="2067" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="2064" style="color:maroon"><b data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Do the two groups of data differ from each other (by probabilistic chance alone)?</span></b></li><span data-dcnode-id="2063" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="2060" style="color:maroon"><b data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Do data change when repeated measurements are taken on a second separate occasion?</span></b></li><span data-dcnode-id="2059" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="2056" style="color:maroon"><b data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Is there an association between two sets of data?</span></b></li><span data-dcnode-id="2055" instrument_node="">
</span></ul><span data-dcnode-id="2053" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Statistics consider the variability of the data and present a result based on probability. Each statistical technique has associated criteria depending on, for example, the type of data, its distribution, the sample size etc. Some common methods of statistical analysis of data are shown below.</span></p><span data-dcnode-id="2050" instrument_node="">

</span><h2 data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">3. Reliability and validity of the data in the whole investigation</span></h2><span data-dcnode-id="1672" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">In evaluating the whole investigation, all the foregoing ideas about evidence need to be considered in relation to the two overarching questions:</span></p><span data-dcnode-id="1669" instrument_node="">

</span><p align="center" class="MsoNormal" data-dcnode-id="1518" style="text-align:center"><b data-dcnode-id="1519"><span data-dcnode-id="1520" style="font-family:&quot;Helvetica&quot;,&quot;sans-serif&quot;"><span data-dcnode-id="1521" instrument_node="">Understanding that:</span></span></b></p><span data-dcnode-id="1517" instrument_node="">
</span></td><td data-dcnode-id="1508" style="width:33.48%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="1514" instrument_node="">
</span><p align="center" class="MsoNormal" data-dcnode-id="1510" style="text-align:center"><b data-dcnode-id="1511"><span data-dcnode-id="1512" style="font-family:&quot;Helvetica&quot;,&quot;sans-serif&quot;"><span data-dcnode-id="1513" instrument_node="">Example</span></span></b></p><span data-dcnode-id="1509" instrument_node="">
</span></td></tr><tr data-dcnode-id="1480"><td data-dcnode-id="1496" style="width:26.16%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="26%"><span data-dcnode-id="1503" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node="">86.</span><span data-dcnode-id="1500" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="1501" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="1499" instrument_node=""> Credibility of evidence</span></p><span data-dcnode-id="1497" instrument_node="">
</span></td><td data-dcnode-id="1489" style="width:40.36%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="1494" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1491"><span data-dcnode-id="1492" style="font-size:7.5pt"><span data-dcnode-id="1493" instrument_node="">... credibility has a lot to do with face validity: consistency of the evidence with conventional ideas, with common sense, and with personal experience. Credibility increases with the degree of scientific consensus on the evidence or on theories that support the evidence. Credibility can also turn on the type of evidence presented, for instance, statistical versus anecdotal evidence.</span></span></p><span data-dcnode-id="1490" instrument_node="">
</span></td><td data-dcnode-id="1482" style="width:33.48%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="1487" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1484"><span data-dcnode-id="1485" style="font-size:7.5pt"><span data-dcnode-id="1486" instrument_node="">Evidence showing low emissions of dioxins from a smokestack is compromised by photos of black smoke spewing from the smokestack (even though dioxins are relatively colourless). Also, concern for potential health hazards for workers in some industries often begins with anecdotal evidence, but is initially rejected as not being scientifically credible.</span></span></p><span data-dcnode-id="1483" instrument_node="">
</span></td></tr><tr data-dcnode-id="1454"><td data-dcnode-id="1470" style="width:26.16%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="26%"><span data-dcnode-id="1477" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="1472"><span data-dcnode-id="1476" instrument_node="">87.</span><span data-dcnode-id="1474" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="1475" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="1473" instrument_node=""> Practicality of Consequences</span></p><span data-dcnode-id="1471" instrument_node="">
</span></td><td data-dcnode-id="1463" style="width:40.36%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="1468" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1465"><span data-dcnode-id="1466" style="font-size:7.5pt"><span data-dcnode-id="1467" instrument_node="">... the implications of the evidence may be practical and cost effective, or they may not be. The more impractical or costly the implications, the greater the demand for higher standards of validity and reliability of the evidence.</span></span></p><span data-dcnode-id="1464" instrument_node="">
</span></td><td data-dcnode-id="1456" style="width:33.48%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="1461" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1458"><span data-dcnode-id="1459" style="font-size:7.5pt"><span data-dcnode-id="1460" instrument_node=""> The negative side effects of a drug may outweigh its benefits, for all but terminally ill patients. Also, when judging the evidence on the source of acid rain, Americans will likely demand a greater degree of certainty of the evidence than Canadians who live down wind, because of the cost to American industries to reduce sulphur.</span></span></p><span data-dcnode-id="1457" instrument_node="">
</span></td></tr><tr data-dcnode-id="1428"><td data-dcnode-id="1444" style="width:26.16%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="26%"><span data-dcnode-id="1451" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="1446"><span data-dcnode-id="1450" instrument_node="">88.</span><span data-dcnode-id="1448" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="1449" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="1447" instrument_node=""> Experimenter bias</span></p><span data-dcnode-id="1445" instrument_node="">
</span></td><td data-dcnode-id="1437" style="width:40.36%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="1442" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1439"><span data-dcnode-id="1440" style="font-size:7.5pt"><span data-dcnode-id="1441" instrument_node="">... evidence must be scrutinized for inherent bias of the experimenters. Possible bias may be due to funding sources, intellectual rigidity, or an allegiance to an ideology such as scientism, religious fundamentalism, socialism, or capitalism, to name but a few. Bias is also directly related to interest: Who benefits? Who is burdened?</span></span></p><span data-dcnode-id="1438" instrument_node="">
</span></td><td data-dcnode-id="1430" style="width:33.48%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="1435" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1432"><span data-dcnode-id="1433" style="font-size:7.5pt"><span data-dcnode-id="1434" instrument_node=""> Studying the link between cancer and smoking funded by the tobacco industry; or studying the health effects of genetically modified foods funded by Green Peace. Also, the acid rain issue (above) illustrates different interests on each side of the Canadian/American border.</span></span></p><span data-dcnode-id="1431" instrument_node="">
</span></td></tr><tr data-dcnode-id="1402"><td data-dcnode-id="1418" style="width:26.16%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="26%"><span data-dcnode-id="1425" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="1420"><span data-dcnode-id="1424" instrument_node="">89.</span><span data-dcnode-id="1422" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="1423" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="1421" instrument_node=""> Power structures</span></p><span data-dcnode-id="1419" instrument_node="">
</span></td><td data-dcnode-id="1411" style="width:40.36%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="1416" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1413"><span data-dcnode-id="1414" style="font-size:7.5pt"><span data-dcnode-id="1415" instrument_node="">... evidence can be accorded undue weight, or dismissed too lightly, simply by virtue of its political significance or due to influential bodies. Trust can often be a factor here. Sometimes people are influenced by past occurrences of broken trust by government agencies, by industry spokespersons, or by special interest groups.</span></span></p><span data-dcnode-id="1412" instrument_node="">
</span></td><td data-dcnode-id="1404" style="width:33.48%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="1409" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1406"><span data-dcnode-id="1407" style="font-size:7.5pt"><span data-dcnode-id="1408" instrument_node=""> Studies published in the New England Journal of Medicine tend to receive greater weight than other studies. Also, the pharmaceutical industry’s negative reaction to Dr. Olivieri’s research results that were not supportive of their drug Apotex at Toronto’s Hospital for Sick Children in 2001.</span></span></p><span data-dcnode-id="1405" instrument_node="">
</span></td></tr><tr data-dcnode-id="1376"><td data-dcnode-id="1392" style="width:26.16%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="26%"><span data-dcnode-id="1399" instrument_node="">
</span><p class="tableftcol" data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">90.</span><span data-dcnode-id="1396" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="1397" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="1395" instrument_node=""> Paradigms of practice</span></p><span data-dcnode-id="1393" instrument_node="">
</span></td><td data-dcnode-id="1385" style="width:40.36%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="40%"><span data-dcnode-id="1390" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1387"><span data-dcnode-id="1388" style="font-size:7.5pt"><span data-dcnode-id="1389" instrument_node="">... different investigators may work within different paradigms of research. For instance, engineers operate from a different perspective than scientists. Thus, evidence garnered within one paradigm may take on quite a different status when viewed from another paradigm of practice.</span></span></p><span data-dcnode-id="1386" instrument_node="">
</span></td><td data-dcnode-id="1378" style="width:33.48%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="33%"><span data-dcnode-id="1383" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1380"><span data-dcnode-id="1381" style="font-size:7.5pt"><span data-dcnode-id="1382" instrument_node=""> Theoretical scientists tend to use evidence to support arguments for advancing a theory or model, whereas scientists working for an NGO, for instance, tend to use evidence to solve a problem at hand within a short time period. Theoretical scientists have the luxury of subscribing to higher standards of validity and reliability for their evidence.
</span></span></p><span data-dcnode-id="1379" instrument_node="">
</span></td></tr><tr data-dcnode-id="1350"><td data-dcnode-id="1366" style="width:26.16%;background:yellow;padding: 0cm 3.0pt 0cm 3.0pt" valign="top" width="26%"><span data-dcnode-id="1373" instrument_node="">
