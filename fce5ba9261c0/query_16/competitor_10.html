</span><blockquote data-dcnode-id="4109"><p data-dcnode-id="4110"><span data-dcnode-id="4114" instrument_node="">a perfect knowledge [...] must necessarily be deduced from first causes [...] we must try to deduce from these principles knowledge of the things which depend on them, that there be nothing in the whole chain of deductions deriving from them that is not perfectly manifest.</span><sup class="reference" data-dcnode-id="4111" id="cite_ref-68"><a data-dcnode-id="4112" href="#cite_note-68"><span data-dcnode-id="4113" instrument_node="">[68]</span></a></sup></p></blockquote><span data-dcnode-id="4108" instrument_node="">
</span><p data-dcnode-id="4103"><span data-dcnode-id="4107" instrument_node="">And again, some years earlier, speaking of Galileo's physics in a letter to his friend and critic </span><a data-dcnode-id="4105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marin_Mersenne" title="Marin Mersenne"><span data-dcnode-id="4106" instrument_node="">Mersenne</span></a><span data-dcnode-id="4104" instrument_node=""> from 1638,
</span></p><span data-dcnode-id="4102" instrument_node="">
</span><blockquote data-dcnode-id="4096"><p data-dcnode-id="4097"><span data-dcnode-id="4101" instrument_node="">without having considered the first causes of nature, [Galileo] has merely looked for the explanations of a few particular effects, and he has thereby built without foundations.</span><sup class="reference" data-dcnode-id="4098" id="cite_ref-69"><a data-dcnode-id="4099" href="#cite_note-69"><span data-dcnode-id="4100" instrument_node="">[69]</span></a></sup></p></blockquote><span data-dcnode-id="4095" instrument_node="">
</span><p data-dcnode-id="4083"><span data-dcnode-id="4094" instrument_node="">Whereas Aristotle purported to arrive at his first principles by induction, Descartes believed he could obtain them using reason only. In this sense, he was a Platonist, as he believed in the innate ideas, as opposed to Aristotle's </span><a data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabula_rasa" title="Tabula rasa"><span data-dcnode-id="4093" instrument_node="">blank slate</span></a><span data-dcnode-id="4091" instrument_node=""> (</span><i data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">tabula rasa</span></i><span data-dcnode-id="4088" instrument_node="">), and stated that the seeds of science are inside us.</span><sup class="reference" data-dcnode-id="4085" id="cite_ref-70"><a data-dcnode-id="4086" href="#cite_note-70"><span data-dcnode-id="4087" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4084" instrument_node="">
</span></p><p data-dcnode-id="4075"><span data-dcnode-id="4082" instrument_node="">Unlike Bacon, Descartes successfully applied his own ideas in practice. He made significant contributions to science, in particular in aberration-corrected optics. His work in </span><a data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Analytic_geometry" title="Analytic geometry"><span data-dcnode-id="4081" instrument_node="">analytic geometry</span></a><span data-dcnode-id="4079" instrument_node=""> was a necessary precedent to </span><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Differential_calculus" title="Differential calculus"><span data-dcnode-id="4078" instrument_node="">differential calculus</span></a><span data-dcnode-id="4076" instrument_node=""> and instrumental in bringing mathematical analysis to bear on scientific matters.
</span></p><span data-dcnode-id="4074" instrument_node="">
</span><h3 data-dcnode-id="4064"><span class="mw-headline" data-dcnode-id="4072" id="Galileo_Galilei"><span data-dcnode-id="4073" instrument_node="">Galileo Galilei</span></span><span class="mw-editsection" data-dcnode-id="4065"><span class="mw-editsection-bracket" data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">[</span></span><a data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D16" title="Edit section: Galileo Galilei"><span data-dcnode-id="4069" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4063" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4052"><div class="thumbinner" data-dcnode-id="4053" style="width:222px;"><a class="image" data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileo.arp.300pix.jpg"><img alt="" class="thumbimage" data-dcnode-id="4062" data-file-height="1448" data-file-width="1180" decoding="async" height="270" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Galileo.arp.300pix.jpg/220px-Galileo.arp.300pix.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Galileo.arp.300pix.jpg/330px-Galileo.arp.300pix.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Galileo.arp.300pix.jpg/440px-Galileo.arp.300pix.jpg 2x" width="220"></a><span data-dcnode-id="4060" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4054"><div class="magnify" data-dcnode-id="4058"><a class="internal" data-dcnode-id="4059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileo.arp.300pix.jpg" title="Enlarge"></a></div><a data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="4057" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="4055" instrument_node="">, 1564–1642, a father of scientific method</span></div></div></div><span data-dcnode-id="4051" instrument_node="">
</span><p data-dcnode-id="4036"><span data-dcnode-id="4050" instrument_node="">During the period of religious conservatism brought about by the </span><a class="mw-redirect" data-dcnode-id="4048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestant_Reformation" title="Protestant Reformation"><span data-dcnode-id="4049" instrument_node="">Reformation</span></a><span data-dcnode-id="4047" instrument_node=""> and </span><a data-dcnode-id="4045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counter-Reformation" title="Counter-Reformation"><span data-dcnode-id="4046" instrument_node="">Counter-Reformation</span></a><span data-dcnode-id="4044" instrument_node="">, </span><a data-dcnode-id="4042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="4043" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="4041" instrument_node=""> unveiled his new science of motion. Neither the contents of Galileo's science, nor the methods of study he selected were in keeping with Aristotelian teachings.  Whereas Aristotle thought that a science should be demonstrated from first principles, Galileo had used experiments as a research tool. Galileo nevertheless presented his treatise in the form of mathematical demonstrations without reference to experimental results. It is important to understand that this in itself was a bold and innovative step in terms of scientific method. The usefulness of mathematics in obtaining scientific results was far from obvious.</span><sup class="reference" data-dcnode-id="4038" id="cite_ref-71"><a data-dcnode-id="4039" href="#cite_note-71"><span data-dcnode-id="4040" instrument_node="">[71]</span></a></sup><span data-dcnode-id="4037" instrument_node=""> This is because mathematics did not lend itself to the primary pursuit of Aristotelian science: the discovery of causes.
</span></p><p data-dcnode-id="4025"><span data-dcnode-id="4035" instrument_node="">Whether it is because Galileo was realistic about the acceptability of presenting experimental results as evidence or because he himself had doubts about the </span><a data-dcnode-id="4033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epistemology" title="Epistemology"><span data-dcnode-id="4034" instrument_node="">epistemological</span></a><span data-dcnode-id="4032" instrument_node=""> status of experimental findings is not known. Nevertheless, it is not in his </span><a data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin" title="Latin"><span data-dcnode-id="4031" instrument_node="">Latin</span></a><span data-dcnode-id="4029" instrument_node=""> treatise on motion that we find reference to experiments, but in his supplementary dialogues written in the Italian vernacular. In these dialogues experimental results are given, although Galileo may have found them inadequate for persuading his audience. </span><a data-dcnode-id="4027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thought_experiment" title="Thought experiment"><span data-dcnode-id="4028" instrument_node="">Thought experiments</span></a><span data-dcnode-id="4026" instrument_node=""> showing logical contradictions in Aristotelian thinking, presented in the skilled rhetoric of Galileo's dialogue were further enticements for the reader.
</span></p><span data-dcnode-id="4024" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4015"><div class="thumbinner" data-dcnode-id="4016" style="width:202px;"><a class="image" data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileosInclinedPlane.jpg"><img alt="" class="thumbimage" data-dcnode-id="4023" data-file-height="1024" data-file-width="1036" decoding="async" height="198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/GalileosInclinedPlane.jpg/200px-GalileosInclinedPlane.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/GalileosInclinedPlane.jpg/300px-GalileosInclinedPlane.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c0/GalileosInclinedPlane.jpg/400px-GalileosInclinedPlane.jpg 2x" width="200"></a><span data-dcnode-id="4021" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4017"><div class="magnify" data-dcnode-id="4019"><a class="internal" data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileosInclinedPlane.jpg" title="Enlarge"></a></div><span data-dcnode-id="4018" instrument_node="">Modern replica of Galileo's inclined plane experiment: The distance covered by a uniformly accelerated body is proportional to the square of the time elapsed.</span></div></div></div><p data-dcnode-id="4006"><span data-dcnode-id="4014" instrument_node=""> As an example, in the dramatic dialogue titled </span><i data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">Third Day</span></i><span data-dcnode-id="4011" instrument_node=""> from his </span><i data-dcnode-id="4008"><a data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two_New_Sciences" title="Two New Sciences"><span data-dcnode-id="4010" instrument_node="">Two New Sciences</span></a></i><span data-dcnode-id="4007" instrument_node="">, Galileo has the characters of the dialogue discuss an experiment involving two free falling objects of differing weight. An outline of the Aristotelian view is offered by the character Simplicio. For this experiment he expects that "a body which is ten times as heavy as another will move ten times as rapidly as the other". The character Salviati, representing Galileo's persona in the dialogue, replies by voicing his doubt that Aristotle ever attempted the experiment. Salviati then asks the two other characters of the dialogue to consider a thought experiment whereby two stones of differing weights are tied together before being released. Following Aristotle, Salviati reasons that "the more rapid one will be partly retarded by the slower, and the slower will be somewhat hastened by the swifter". But this leads to a contradiction, since the two stones together make a heavier object than either stone apart, the heavier object should in fact fall with a speed greater than that of either stone. From this contradiction, Salviati concludes that Aristotle must, in fact, be wrong and the objects will fall at the same speed regardless of their weight, a conclusion that is borne out by experiment.
</span></p><p data-dcnode-id="4000"><span data-dcnode-id="4005" instrument_node="">In his 1991 survey of developments in the modern accumulation of knowledge such as this, Charles Van Doren</span><sup class="reference" data-dcnode-id="4002" id="cite_ref-72"><a data-dcnode-id="4003" href="#cite_note-72"><span data-dcnode-id="4004" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4001" instrument_node=""> considers that the Copernican Revolution really is the Galilean Cartesian (René Descartes) or simply the Galilean revolution on account of the courage and depth of change brought about by the work of Galileo.
</span></p><span data-dcnode-id="3999" instrument_node="">
</span><h3 data-dcnode-id="3989"><span class="mw-headline" data-dcnode-id="3997" id="Isaac_Newton"><span data-dcnode-id="3998" instrument_node="">Isaac Newton</span></span><span class="mw-editsection" data-dcnode-id="3990"><span class="mw-editsection-bracket" data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">[</span></span><a data-dcnode-id="3993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D17" title="Edit section: Isaac Newton"><span data-dcnode-id="3994" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3988" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3974"><div class="thumbinner" data-dcnode-id="3975" style="width:172px;"><a class="image" data-dcnode-id="3986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGodfreyKneller-IsaacNewton-1689.jpg"><img alt="" class="thumbimage" data-dcnode-id="3987" data-file-height="559" data-file-width="407" decoding="async" height="233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/39/GodfreyKneller-IsaacNewton-1689.jpg/170px-GodfreyKneller-IsaacNewton-1689.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/39/GodfreyKneller-IsaacNewton-1689.jpg/255px-GodfreyKneller-IsaacNewton-1689.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/39/GodfreyKneller-IsaacNewton-1689.jpg/340px-GodfreyKneller-IsaacNewton-1689.jpg 2x" width="170"></a><span data-dcnode-id="3985" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3976"><div class="magnify" data-dcnode-id="3983"><a class="internal" data-dcnode-id="3984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGodfreyKneller-IsaacNewton-1689.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sir_Isaac_Newton" title="Sir Isaac Newton"><span data-dcnode-id="3982" instrument_node="">Sir Isaac Newton</span></a><span data-dcnode-id="3980" instrument_node="">, the discoverer of </span><a class="mw-redirect" data-dcnode-id="3978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_gravitation" title="Universal gravitation"><span data-dcnode-id="3979" instrument_node="">universal gravitation</span></a><span data-dcnode-id="3977" instrument_node=""> and one of the most influential scientists in history</span></div></div></div><span data-dcnode-id="3973" instrument_node="">
</span><link data-dcnode-id="3972" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3968" role="note"><span data-dcnode-id="3971" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newton%2527s_Rules_for_Science" title="Newton's Rules for Science"><span data-dcnode-id="3970" instrument_node="">Newton's Rules for Science</span></a></div><span data-dcnode-id="3967" instrument_node="">
</span><p data-dcnode-id="3955"><span data-dcnode-id="3966" instrument_node="">Both Bacon and Descartes wanted to provide a firm foundation for scientific thought that avoided the deceptions of the mind and senses. Bacon envisaged that foundation as essentially empirical, whereas Descartes provides a metaphysical foundation for knowledge.  If there were any doubts about the direction in which scientific method would develop, they were set to rest by the success of </span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaac_Newton" title="Isaac Newton"><span data-dcnode-id="3965" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="3963" instrument_node="">. Implicitly rejecting Descartes' emphasis on </span><a data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rationalism" title="Rationalism"><span data-dcnode-id="3962" instrument_node="">rationalism</span></a><span data-dcnode-id="3960" instrument_node=""> in favor of Bacon's empirical approach, he outlines his four "rules of reasoning" in the </span><i data-dcnode-id="3957"><a class="mw-redirect" data-dcnode-id="3958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philosophiae_Naturalis_Principia_Mathematica" title="Philosophiae Naturalis Principia Mathematica"><span data-dcnode-id="3959" instrument_node="">Principia</span></a></i><span data-dcnode-id="3956" instrument_node="">,
</span></p><span data-dcnode-id="3954" instrument_node="">
</span><blockquote data-dcnode-id="3936"><span data-dcnode-id="3953" instrument_node="">
</span><ol data-dcnode-id="3938"><li data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">We are to admit no more causes of natural things than such as are both true and sufficient to explain their appearances.</span></li><span data-dcnode-id="3950" instrument_node="">
</span><li data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">Therefore to the same natural effects we must, as far as possible, assign the same causes.</span></li><span data-dcnode-id="3947" instrument_node="">
</span><li data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">The qualities of bodies, which admit neither intension nor remission of degrees, and which are found to belong to all bodies within the reach of our experiments, are to be esteemed the universal qualities of all bodies whatsoever.</span></li><span data-dcnode-id="3944" instrument_node="">
</span><li data-dcnode-id="3939"><span data-dcnode-id="3943" instrument_node="">In experimental philosophy we are to look upon propositions collected by general induction from phænomena as accurately or very nearly true, notwithstanding any contrary hypotheses that may be imagined, until such time as other phænomena occur, by which they may either be made more accurate, or liable to exceptions.</span><sup class="reference" data-dcnode-id="3940" id="cite_ref-73"><a data-dcnode-id="3941" href="#cite_note-73"><span data-dcnode-id="3942" instrument_node="">[73]</span></a></sup></li></ol><span data-dcnode-id="3937" instrument_node="">
</span></blockquote><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3930"><span data-dcnode-id="3934" instrument_node="">But Newton also left an admonition about a </span><a data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theory_of_everything" title="Theory of everything"><span data-dcnode-id="3933" instrument_node="">theory of everything</span></a><span data-dcnode-id="3931" instrument_node="">:
</span></p><span data-dcnode-id="3929" instrument_node="">
</span><blockquote data-dcnode-id="3923"><p data-dcnode-id="3924"><span data-dcnode-id="3928" instrument_node="">To explain all nature is too difficult a task for any one man or even for any one age. 'Tis much better to do a little with certainty, and leave the rest for others that come after you, than to explain all things.</span><sup class="reference" data-dcnode-id="3925" id="cite_ref-74"><a data-dcnode-id="3926" href="#cite_note-74"><span data-dcnode-id="3927" instrument_node="">[74]</span></a></sup></p></blockquote><span data-dcnode-id="3922" instrument_node="">
</span><p data-dcnode-id="3911"><span data-dcnode-id="3921" instrument_node="">Newton's work became a model that other sciences sought to emulate, and his inductive approach formed the basis for much of natural philosophy through the 18th and early 19th centuries.  Some methods of reasoning were later systematized by </span><a data-dcnode-id="3919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mill%2527s_Methods" title="Mill's Methods"><span data-dcnode-id="3920" instrument_node="">Mill's Methods</span></a><span data-dcnode-id="3918" instrument_node=""> (or Mill's canon), which are five explicit statements of what can be discarded and what can be kept while building a hypothesis. </span><a data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Boole" title="George Boole"><span data-dcnode-id="3917" instrument_node="">George Boole</span></a><span data-dcnode-id="3915" instrument_node=""> and </span><a data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Stanley_Jevons" title="William Stanley Jevons"><span data-dcnode-id="3914" instrument_node="">William Stanley Jevons</span></a><span data-dcnode-id="3912" instrument_node=""> also wrote on the principles of reasoning.
</span></p><span data-dcnode-id="3910" instrument_node="">
</span><h2 data-dcnode-id="3900"><span class="mw-headline" data-dcnode-id="3908" id="Integrating_deductive_and_inductive_method"><span data-dcnode-id="3909" instrument_node="">Integrating deductive and inductive method</span></span><span class="mw-editsection" data-dcnode-id="3901"><span class="mw-editsection-bracket" data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">[</span></span><a data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D18" title="Edit section: Integrating deductive and inductive method"><span data-dcnode-id="3905" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3899" instrument_node="">
</span><p data-dcnode-id="3877"><span data-dcnode-id="3898" instrument_node="">Attempts to systematize a scientific method were confronted in the mid-18th century by the </span><a data-dcnode-id="3896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Problem_of_induction" title="Problem of induction"><span data-dcnode-id="3897" instrument_node="">problem of induction</span></a><span data-dcnode-id="3895" instrument_node="">, a </span><a class="mw-redirect" data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logical_positivist" title="Logical positivist"><span data-dcnode-id="3894" instrument_node="">positivist</span></a><span data-dcnode-id="3892" instrument_node=""> logic formulation which, in short, asserts that nothing can be known with certainty except what is actually observed.  </span><a data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Hume" title="David Hume"><span data-dcnode-id="3891" instrument_node="">David Hume</span></a><span data-dcnode-id="3889" instrument_node=""> took empiricism to the skeptical extreme; among his positions was that there is no logical necessity that the future should resemble the past, thus we are unable to justify inductive reasoning itself by appealing to its past success. Hume's arguments, of course, came on the heels of many, many centuries of excessive speculation upon excessive speculation not grounded in empirical observation and testing.  Many of Hume's radically skeptical arguments were argued against, but not resolutely refuted, by  </span><a data-dcnode-id="3887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immanuel_Kant" title="Immanuel Kant"><span data-dcnode-id="3888" instrument_node="">Immanuel Kant</span></a><span data-dcnode-id="3886" instrument_node="">'s </span><i data-dcnode-id="3883"><a data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Critique_of_Pure_Reason" title="Critique of Pure Reason"><span data-dcnode-id="3885" instrument_node="">Critique of Pure Reason</span></a></i><span data-dcnode-id="3882" instrument_node=""> in the late 18th century.</span><sup class="reference" data-dcnode-id="3879" id="cite_ref-75"><a data-dcnode-id="3880" href="#cite_note-75"><span data-dcnode-id="3881" instrument_node="">[75]</span></a></sup><span data-dcnode-id="3878" instrument_node=""> Hume's arguments continue to hold a strong lingering influence and certainly on the consciousness of the educated classes for the better part of the 19th century when the argument at the time became the focus on whether or not the inductive method was valid.
</span></p><p data-dcnode-id="3853"><a data-dcnode-id="3875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_Christian_%25C3%2598rsted" title="Hans Christian Ørsted"><span data-dcnode-id="3876" instrument_node="">Hans Christian Ørsted</span></a><span data-dcnode-id="3874" instrument_node="">, (Ørsted is the </span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Danish_language" title="Danish language"><span data-dcnode-id="3873" instrument_node="">Danish</span></a><span data-dcnode-id="3871" instrument_node=""> spelling; </span><i data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">Oersted</span></i><span data-dcnode-id="3868" instrument_node=""> in other languages) (1777–1851) was heavily influenced by Kant, in particular, Kant's </span><i data-dcnode-id="3865"><a class="mw-redirect" data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metaphysische_Anfangsgr%25C3%25BCnde_der_Naturwissenschaft" title="Metaphysische Anfangsgründe der Naturwissenschaft"><span data-dcnode-id="3867" instrument_node="">Metaphysische Anfangsgründe der Naturwissenschaft</span></a></i><span data-dcnode-id="3864" instrument_node=""> (</span><i data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">Metaphysical Foundations of Natural Science</span></i><span data-dcnode-id="3861" instrument_node="">).</span><sup class="reference" data-dcnode-id="3858" id="cite_ref-76"><a data-dcnode-id="3859" href="#cite_note-76"><span data-dcnode-id="3860" instrument_node="">[76]</span></a></sup><span data-dcnode-id="3857" instrument_node=""> The following sections on Ørsted encapsulate our current, common view of </span><a data-dcnode-id="3855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_method" title="Scientific method"><span data-dcnode-id="3856" instrument_node="">scientific method</span></a><span data-dcnode-id="3854" instrument_node="">. His work appeared in Danish, most accessibly in public lectures, which he translated into German, French, English, and occasionally Latin. But some of his views go beyond Kant:
</span></p><span data-dcnode-id="3852" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3843"><div class="thumbinner" data-dcnode-id="3844" style="width:102px;"><a class="image" data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMagCompas3.jpg"><img alt="" class="thumbimage" data-dcnode-id="3851" data-file-height="1536" data-file-width="2048" decoding="async" height="75" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/MagCompas3.jpg/100px-MagCompas3.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/MagCompas3.jpg/150px-MagCompas3.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e5/MagCompas3.jpg/200px-MagCompas3.jpg 2x" width="100"></a><span data-dcnode-id="3849" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3845"><div class="magnify" data-dcnode-id="3847"><a class="internal" data-dcnode-id="3848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMagCompas3.jpg" title="Enlarge"></a></div><span data-dcnode-id="3846" instrument_node="">Ørsted observed the deflection of a compass from a voltaic circuit in 1820</span></div></div></div><span data-dcnode-id="3842" instrument_node="">
</span><dl data-dcnode-id="3836"><dd data-dcnode-id="3837"><span data-dcnode-id="3841" instrument_node="">"In order to achieve completeness in our knowledge of nature, we must start from two extremes, from experience and from the intellect itself. ... The former method must conclude with natural laws, which it has abstracted from experience, while the latter must begin with principles, and gradually, as it develops more and more, it becomes ever more detailed. Of course, I speak here about the method as manifested in the process of the human intellect itself, not as found in textbooks, where the laws of nature which have been abstracted from the consequent experiences are placed first because they are required to explain the experiences. When the empiricist in his regression towards general laws of nature meets the metaphysician in his progression, science will reach its perfection."</span><sup class="reference" data-dcnode-id="3838" id="cite_ref-77"><a data-dcnode-id="3839" href="#cite_note-77"><span data-dcnode-id="3840" instrument_node="">[77]</span></a></sup></dd></dl><span data-dcnode-id="3835" instrument_node="">
</span><p data-dcnode-id="3800"><span data-dcnode-id="3834" instrument_node="">Ørsted's "First Introduction to General Physics" (1811) exemplified the steps of </span><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observation" title="Observation"><span data-dcnode-id="3833" instrument_node="">observation</span></a><span data-dcnode-id="3831" instrument_node="">,</span><sup class="reference" data-dcnode-id="3828" id="cite_ref-78"><a data-dcnode-id="3829" href="#cite_note-78"><span data-dcnode-id="3830" instrument_node="">[78]</span></a></sup><span data-dcnode-id="3827" instrument_node=""> </span><a data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothesis" title="Hypothesis"><span data-dcnode-id="3826" instrument_node="">hypothesis</span></a><span data-dcnode-id="3824" instrument_node="">,</span><sup class="reference" data-dcnode-id="3821" id="cite_ref-79"><a data-dcnode-id="3822" href="#cite_note-79"><span data-dcnode-id="3823" instrument_node="">[79]</span></a></sup><span data-dcnode-id="3820" instrument_node=""> </span><a data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deductive_reasoning" title="Deductive reasoning"><span data-dcnode-id="3819" instrument_node="">deduction</span></a><sup class="reference" data-dcnode-id="3815" id="cite_ref-80"><a data-dcnode-id="3816" href="#cite_note-80"><span data-dcnode-id="3817" instrument_node="">[80]</span></a></sup><span data-dcnode-id="3814" instrument_node=""> and experiment.  In 1805, based on his researches on </span><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electromagnetism" title="Electromagnetism"><span data-dcnode-id="3813" instrument_node="">electromagnetism</span></a><span data-dcnode-id="3811" instrument_node=""> Ørsted came to believe that electricity is propagated by undulatory action (i.e., fluctuation). By 1820, he felt confident enough in his beliefs that he resolved to demonstrate them in a public lecture, and in fact observed a small magnetic effect from a galvanic circuit (i.e., voltaic circuit), </span><i data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">without rehearsal</span></i><span data-dcnode-id="3808" instrument_node="">;</span><sup class="reference" data-dcnode-id="3805" id="cite_ref-81"><a data-dcnode-id="3806" href="#cite_note-81"><span data-dcnode-id="3807" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="3802" id="cite_ref-82"><a data-dcnode-id="3803" href="#cite_note-82"><span data-dcnode-id="3804" instrument_node="">[82]</span></a></sup><span data-dcnode-id="3801" instrument_node="">
</span></p><p data-dcnode-id="3781"><span data-dcnode-id="3799" instrument_node="">In 1831 </span><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Herschel" title="John Herschel"><span data-dcnode-id="3798" instrument_node="">John Herschel</span></a><span data-dcnode-id="3796" instrument_node=""> (1792–1871) published </span><i data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">A Preliminary Discourse on the study of Natural Philosophy</span></i><span data-dcnode-id="3793" instrument_node="">, setting out the principles of science. Measuring and comparing observations was to be used to find generalisations in "empirical laws", which described regularities in phenomena, then natural philosophers were to work towards the higher aim of finding a universal "law of nature" which explained the causes and effects producing such regularities. An explanatory hypothesis was to be found by evaluating true causes (Newton's "vera causae") derived from experience, for example evidence of past climate change could be due to changes in the shape of continents, or to changes in Earth's orbit. Possible causes could be inferred by analogy to known causes of similar phenomena.</span><sup class="reference" data-dcnode-id="3790" id="cite_ref-Young_07_83-0"><a data-dcnode-id="3791" href="#cite_note-Young_07-83"><span data-dcnode-id="3792" instrument_node="">[83]</span></a></sup><sup class="reference" data-dcnode-id="3787" id="cite_ref-84"><a data-dcnode-id="3788" href="#cite_note-84"><span data-dcnode-id="3789" instrument_node="">[84]</span></a></sup><span data-dcnode-id="3786" instrument_node=""> It was essential to evaluate the importance of a hypothesis; "our next step in the verification of an induction must, therefore, consist in extending its application to cases not originally contemplated; in studiously varying the circumstances under which our causes act, with a view to ascertain whether their effect is general; and in pushing the application of our laws to extreme cases."</span><sup class="reference" data-dcnode-id="3783" id="cite_ref-85"><a data-dcnode-id="3784" href="#cite_note-85"><span data-dcnode-id="3785" instrument_node="">[85]</span></a></sup><span data-dcnode-id="3782" instrument_node="">
</span></p><p data-dcnode-id="3758"><a data-dcnode-id="3779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Whewell" title="William Whewell"><span data-dcnode-id="3780" instrument_node="">William Whewell</span></a><span data-dcnode-id="3778" instrument_node=""> (1794–1866) regarded his </span><i data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">History of the Inductive Sciences, from the Earliest to the Present Time</span></i><span data-dcnode-id="3775" instrument_node=""> (1837) to be an introduction to the </span><i data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">Philosophy of the Inductive Sciences</span></i><span data-dcnode-id="3772" instrument_node=""> (1840) which analyzes the method exemplified in the formation of ideas. Whewell attempts to follow Bacon's plan for discovery of an effectual art of discovery. He named the </span><a class="mw-redirect" data-dcnode-id="3770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothetico-deductive_method" title="Hypothetico-deductive method"><span data-dcnode-id="3771" instrument_node="">hypothetico-deductive method</span></a><span data-dcnode-id="3769" instrument_node=""> (which </span><i data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">Encyclopædia Britannica</span></i><span data-dcnode-id="3766" instrument_node=""> credits to Newton</span><sup class="reference" data-dcnode-id="3763" id="cite_ref-86"><a data-dcnode-id="3764" href="#cite_note-86"><span data-dcnode-id="3765" instrument_node="">[86]</span></a></sup><span data-dcnode-id="3762" instrument_node="">); Whewell also coined the term </span><i data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">scientist</span></i><span data-dcnode-id="3759" instrument_node="">. Whewell examines ideas and attempts to construct science by uniting ideas to facts. He analyses induction into three steps:
</span></p><span data-dcnode-id="3757" instrument_node="">
</span><ol data-dcnode-id="3733"><li data-dcnode-id="3746"><span data-dcnode-id="3756" instrument_node="">the selection of the fundamental idea, such as </span><a data-dcnode-id="3754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space" title="Space"><span data-dcnode-id="3755" instrument_node="">space</span></a><span data-dcnode-id="3753" instrument_node="">, </span><a data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Number" title="Number"><span data-dcnode-id="3752" instrument_node="">number</span></a><span data-dcnode-id="3750" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cause" title="Cause"><span data-dcnode-id="3749" instrument_node="">cause</span></a><span data-dcnode-id="3747" instrument_node="">, or likeness</span></li><span data-dcnode-id="3745" instrument_node="">
</span><li data-dcnode-id="3737"><span data-dcnode-id="3744" instrument_node="">a more special modification of those ideas, such as a </span><a data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Circle" title="Circle"><span data-dcnode-id="3743" instrument_node="">circle</span></a><span data-dcnode-id="3741" instrument_node="">, a uniform </span><a data-dcnode-id="3739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Force" title="Force"><span data-dcnode-id="3740" instrument_node="">force</span></a><span data-dcnode-id="3738" instrument_node="">, etc.</span></li><span data-dcnode-id="3736" instrument_node="">
</span><li data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">the determination of magnitudes</span></li></ol><span data-dcnode-id="3732" instrument_node="">
</span><p data-dcnode-id="3686"><span data-dcnode-id="3731" instrument_node="">Upon these follow special techniques applicable for quantity, such as the </span><a class="mw-redirect" data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Method_of_least_squares" title="Method of least squares"><span data-dcnode-id="3730" instrument_node="">method of least squares</span></a><span data-dcnode-id="3728" instrument_node="">, </span><a data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Curve" title="Curve"><span data-dcnode-id="3727" instrument_node="">curves</span></a><span data-dcnode-id="3725" instrument_node="">, </span><a data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mean" title="Mean"><span data-dcnode-id="3724" instrument_node="">means</span></a><span data-dcnode-id="3722" instrument_node="">, and special methods depending on resemblance (such as </span><a data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pattern_matching" title="Pattern matching"><span data-dcnode-id="3721" instrument_node="">pattern matching</span></a><span data-dcnode-id="3719" instrument_node="">, the method of gradation, and the method of natural classification (such as </span><a data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cladistics" title="Cladistics"><span data-dcnode-id="3718" instrument_node="">cladistics</span></a><span data-dcnode-id="3716" instrument_node="">).
But no art of discovery, such as Bacon anticipated, follows, for "</span><a data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invention" title="Invention"><span data-dcnode-id="3715" instrument_node="">invention</span></a><span data-dcnode-id="3713" instrument_node="">, </span><a class="extiw" data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/sagacity" title="wikt:sagacity"><span data-dcnode-id="3712" instrument_node="">sagacity</span></a><span data-dcnode-id="3710" instrument_node="">, </span><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genius" title="Genius"><span data-dcnode-id="3709" instrument_node="">genius</span></a><span data-dcnode-id="3707" instrument_node="">" are needed at every step.</span><sup class="reference" data-dcnode-id="3704" id="cite_ref-87"><a data-dcnode-id="3705" href="#cite_note-87"><span data-dcnode-id="3706" instrument_node="">[87]</span></a></sup><span data-dcnode-id="3703" instrument_node=""> Whewell's sophisticated concept of science had similarities to that shown by Herschel, and he considered that a good hypothesis should connect fields that had previously been thought unrelated, a process he called </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consilience" title="Consilience"><span data-dcnode-id="3702" instrument_node="">consilience</span></a><span data-dcnode-id="3700" instrument_node="">. However, where Herschel held that the </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evolution" title="Evolution"><span data-dcnode-id="3699" instrument_node="">origin of new biological species</span></a><span data-dcnode-id="3697" instrument_node=""> would be found in a natural rather than a miraculous process, Whewell opposed this and considered that no natural cause had been shown for </span><a data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptation" title="Adaptation"><span data-dcnode-id="3696" instrument_node="">adaptation</span></a><span data-dcnode-id="3694" instrument_node=""> so an unknown </span><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teleological_argument" title="Teleological argument"><span data-dcnode-id="3693" instrument_node="">divine cause</span></a><span data-dcnode-id="3691" instrument_node=""> was appropriate.</span><sup class="reference" data-dcnode-id="3688" id="cite_ref-Young_07_83-1"><a data-dcnode-id="3689" href="#cite_note-Young_07-83"><span data-dcnode-id="3690" instrument_node="">[83]</span></a></sup><span data-dcnode-id="3687" instrument_node="">
</span></p><p data-dcnode-id="3669"><a data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Stuart_Mill" title="John Stuart Mill"><span data-dcnode-id="3685" instrument_node="">John Stuart Mill</span></a><span data-dcnode-id="3683" instrument_node=""> (1806–1873) was stimulated to publish </span><i data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">A System of Logic</span></i><span data-dcnode-id="3680" instrument_node=""> (1843) upon reading Whewell's </span><i data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">History of the Inductive Sciences</span></i><span data-dcnode-id="3677" instrument_node="">. Mill may be regarded as the final exponent of the empirical school of philosophy begun by </span><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Locke" title="John Locke"><span data-dcnode-id="3676" instrument_node="">John Locke</span></a><span data-dcnode-id="3674" instrument_node="">, whose fundamental characteristic is the duty incumbent upon all thinkers to investigate for themselves rather than to accept the authority of others. Knowledge must be based on experience.</span><sup class="reference" data-dcnode-id="3671" id="cite_ref-88"><a data-dcnode-id="3672" href="#cite_note-88"><span data-dcnode-id="3673" instrument_node="">[88]</span></a></sup><span data-dcnode-id="3670" instrument_node="">
</span></p><p data-dcnode-id="3657"><span data-dcnode-id="3668" instrument_node="">In the mid-19th century </span><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claude_Bernard" title="Claude Bernard"><span data-dcnode-id="3667" instrument_node="">Claude Bernard</span></a><span data-dcnode-id="3665" instrument_node=""> was also influential, especially in bringing the scientific method to medicine. In his discourse on scientific method, </span><i data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">An Introduction to the Study of Experimental Medicine</span></i><span data-dcnode-id="3662" instrument_node=""> (1865), he described what makes a scientific theory good and what makes a scientist a true discoverer. Unlike many scientific writers of his time, Bernard wrote about his own experiments and thoughts, and used the first person.</span><sup class="reference" data-dcnode-id="3659" id="cite_ref-89"><a data-dcnode-id="3660" href="#cite_note-89"><span data-dcnode-id="3661" instrument_node="">[89]</span></a></sup><span data-dcnode-id="3658" instrument_node="">
</span></p><p data-dcnode-id="3650"><a data-dcnode-id="3655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Stanley_Jevons" title="William Stanley Jevons"><span data-dcnode-id="3656" instrument_node="">William Stanley Jevons</span></a><span data-dcnode-id="3654" instrument_node="">' </span><i data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">The Principles of Science: a treatise on logic and scientific method</span></i><span data-dcnode-id="3651" instrument_node=""> (1873, 1877) Chapter XII "The Inductive or Inverse Method", Summary of the Theory of Inductive Inference, states "Thus there are but three steps in the process of induction&nbsp;:-
</span></p><span data-dcnode-id="3649" instrument_node="">
</span><ol data-dcnode-id="3640"><li data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">Framing some hypothesis as to the character of the general law.</span></li><span data-dcnode-id="3646" instrument_node="">
</span><li data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">Deducing some consequences of that law.</span></li><span data-dcnode-id="3643" instrument_node="">
</span><li data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Observing whether the consequences agree with the particular tasks under consideration."</span></li></ol><span data-dcnode-id="3639" instrument_node="">
</span><p data-dcnode-id="3627"><span data-dcnode-id="3638" instrument_node="">Jevons then frames those steps in terms of probability, which he then applied to economic laws. </span><a data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernest_Nagel" title="Ernest Nagel"><span data-dcnode-id="3637" instrument_node="">Ernest Nagel</span></a><span data-dcnode-id="3635" instrument_node=""> notes that Jevons and Whewell were not the first writers to argue for the centrality of the </span><a class="mw-redirect" data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothetico-deductive_method" title="Hypothetico-deductive method"><span data-dcnode-id="3634" instrument_node="">hypothetico-deductive method</span></a><span data-dcnode-id="3632" instrument_node=""> in the logic of science.</span><sup class="reference" data-dcnode-id="3629" id="cite_ref-90"><a data-dcnode-id="3630" href="#cite_note-90"><span data-dcnode-id="3631" instrument_node="">[90]</span></a></sup><span data-dcnode-id="3628" instrument_node="">
</span></p><span data-dcnode-id="3626" instrument_node="">
</span><h3 data-dcnode-id="3616"><span class="mw-headline" data-dcnode-id="3624" id="Charles_Sanders_Peirce"><span data-dcnode-id="3625" instrument_node="">Charles Sanders Peirce</span></span><span class="mw-editsection" data-dcnode-id="3617"><span class="mw-editsection-bracket" data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">[</span></span><a data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D19" title="Edit section: Charles Sanders Peirce"><span data-dcnode-id="3621" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3615" instrument_node="">
</span><link data-dcnode-id="3614" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3609" role="note"><span data-dcnode-id="3613" instrument_node="">For a guide to C. S. Peirce's writings, which contained over 100,000 items as of 1997, see </span><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Sanders_Peirce_bibliography" title="Charles Sanders Peirce bibliography"><span data-dcnode-id="3612" instrument_node="">Charles Sanders Peirce bibliography</span></a><span data-dcnode-id="3610" instrument_node="">.</span></div><span data-dcnode-id="3608" instrument_node="">
</span><p data-dcnode-id="3581"><span data-dcnode-id="3607" instrument_node="">In the late 19th century, </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Sanders_Peirce" title="Charles Sanders Peirce"><span data-dcnode-id="3606" instrument_node="">Charles Sanders Peirce</span></a><span data-dcnode-id="3604" instrument_node=""> proposed a schema that would turn out to have considerable influence in the further development of scientific method generally.  Peirce's work quickly accelerated the progress on several fronts. Firstly, speaking in broader context in "How to Make Our Ideas Clear" (1878),</span><sup class="reference" data-dcnode-id="3601" id="cite_ref-91"><a data-dcnode-id="3602" href="#cite_note-91"><span data-dcnode-id="3603" instrument_node="">[91]</span></a></sup><span data-dcnode-id="3600" instrument_node=""> Peirce outlined an objectively verifiable method to test the truth of putative knowledge on a way that goes beyond mere foundational alternatives, focusing upon both </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deductive_reasoning" title="Deductive reasoning"><span data-dcnode-id="3599" instrument_node="">Deduction</span></a><span data-dcnode-id="3597" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Induction_%28philosophy%29" title="Induction (philosophy)"><span data-dcnode-id="3596" instrument_node="">Induction</span></a><span data-dcnode-id="3594" instrument_node="">.  He thus placed induction and deduction in a complementary rather than competitive context (the latter of which had been the primary trend at least since </span><a data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Hume" title="David Hume"><span data-dcnode-id="3593" instrument_node="">David Hume</span></a><span data-dcnode-id="3591" instrument_node=""> a century before).  Secondly, and of more direct importance to scientific method, Peirce put forth the basic schema for hypothesis-testing that continues to prevail today.  Extracting the theory of inquiry from its raw materials in classical logic, he refined it in parallel with the early development of symbolic logic to address the then-current problems in scientific reasoning. Peirce examined and articulated the three fundamental modes of reasoning that play a role in scientific inquiry today, the processes that are currently known as </span><a data-dcnode-id="3589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abductive_reasoning" title="Abductive reasoning"><span data-dcnode-id="3590" instrument_node="">abductive</span></a><span data-dcnode-id="3588" instrument_node="">, </span><a data-dcnode-id="3586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deductive_reasoning" title="Deductive reasoning"><span data-dcnode-id="3587" instrument_node="">deductive</span></a><span data-dcnode-id="3585" instrument_node="">, and </span><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inductive_reasoning" title="Inductive reasoning"><span data-dcnode-id="3584" instrument_node="">inductive</span></a><span data-dcnode-id="3582" instrument_node=""> inference.  Thirdly, he played a major role in the progress of symbolic logic itself – indeed this was his primary specialty.
</span></p><p data-dcnode-id="3548"><span data-dcnode-id="3580" instrument_node="">Charles S. Peirce was also a pioneer in </span><a data-dcnode-id="3578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statistics" title="Statistics"><span data-dcnode-id="3579" instrument_node="">statistics</span></a><span data-dcnode-id="3577" instrument_node="">. Peirce held that science achieves statistical probabilities, not certainties, and that chance, a veering from law, is very real. He assigned probability to an argument's conclusion rather than to a proposition, event, etc., as such. Most of his statistical writings promote the </span><a class="mw-redirect" data-dcnode-id="3575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frequency_probability" title="Frequency probability"><span data-dcnode-id="3576" instrument_node="">frequency interpretation</span></a><span data-dcnode-id="3574" instrument_node=""> of probability (objective ratios of cases), and many of his writings express skepticism about (and criticize the use of) </span><a data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statistical_model" title="Statistical model"><span data-dcnode-id="3573" instrument_node="">probability</span></a><span data-dcnode-id="3571" instrument_node=""> when such models are not based on objective </span><a data-dcnode-id="3569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Randomization" title="Randomization"><span data-dcnode-id="3570" instrument_node="">randomization</span></a><span data-dcnode-id="3568" instrument_node="">.</span><sup class="reference" data-dcnode-id="3565" id="cite_ref-92"><a data-dcnode-id="3566" href="#cite_note-92"><span data-dcnode-id="3567" instrument_node="">[92]</span></a></sup><span data-dcnode-id="3564" instrument_node=""> Though Peirce was largely a frequentist, his </span><a class="mw-redirect" data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Possible_world_semantics" title="Possible world semantics"><span data-dcnode-id="3563" instrument_node="">possible world semantics</span></a><span data-dcnode-id="3561" instrument_node=""> introduced the "</span><a class="mw-redirect" data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Propensity" title="Propensity"><span data-dcnode-id="3560" instrument_node="">propensity</span></a><span data-dcnode-id="3558" instrument_node="">" theory of probability. Peirce (sometimes with </span><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Jastrow" title="Joseph Jastrow"><span data-dcnode-id="3557" instrument_node="">Jastrow</span></a><span data-dcnode-id="3555" instrument_node="">) investigated the </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bayesian_probability" title="Bayesian probability"><span data-dcnode-id="3554" instrument_node="">probability judgments</span></a><span data-dcnode-id="3552" instrument_node=""> of experimental subjects, pioneering </span><a data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decision_analysis" title="Decision analysis"><span data-dcnode-id="3551" instrument_node="">decision analysis</span></a><span data-dcnode-id="3549" instrument_node="">.
</span></p><p data-dcnode-id="3477"><span data-dcnode-id="3547" instrument_node="">Peirce was one of the </span><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Founders_of_statistics" title="Founders of statistics"><span data-dcnode-id="3546" instrument_node="">founders of statistics</span></a><span data-dcnode-id="3544" instrument_node="">. He formulated modern statistics in "</span><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Sanders_Peirce_bibliography%23illus" title="Charles Sanders Peirce bibliography"><span data-dcnode-id="3543" instrument_node="">Illustrations of the Logic of Science</span></a><span data-dcnode-id="3541" instrument_node="">" (1877–1878) and "</span><a data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Sanders_Peirce_bibliography%23SIL" title="Charles Sanders Peirce bibliography"><span data-dcnode-id="3540" instrument_node="">A Theory of Probable Inference</span></a><span data-dcnode-id="3538" instrument_node="">" (1883). With a </span><a data-dcnode-id="3536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Repeated_measures_design" title="Repeated measures design"><span data-dcnode-id="3537" instrument_node="">repeated measures design</span></a><span data-dcnode-id="3535" instrument_node="">, he introduced </span><a class="mw-redirect" data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blinding_%28medicine%29" title="Blinding (medicine)"><span data-dcnode-id="3534" instrument_node="">blinded</span></a><span data-dcnode-id="3532" instrument_node="">, </span><a data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Randomized_controlled_trial" title="Randomized controlled trial"><span data-dcnode-id="3531" instrument_node="">controlled randomized experiments</span></a><span data-dcnode-id="3529" instrument_node=""> (before </span><a class="mw-redirect" data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_A._Fisher" title="Ronald A. Fisher"><span data-dcnode-id="3528" instrument_node="">Fisher</span></a><span data-dcnode-id="3526" instrument_node="">). He invented an </span><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optimal_design" title="Optimal design"><span data-dcnode-id="3525" instrument_node="">optimal design</span></a><span data-dcnode-id="3523" instrument_node=""> for experiments on gravity, in which he "</span><a data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Analysis_of_variance" title="Analysis of variance"><span data-dcnode-id="3522" instrument_node="">corrected the means</span></a><span data-dcnode-id="3520" instrument_node="">". He used </span><a data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logistic_regression" title="Logistic regression"><span data-dcnode-id="3519" instrument_node="">logistic regression</span></a><span data-dcnode-id="3517" instrument_node="">, </span><a data-dcnode-id="3515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Correlation" title="Correlation"><span data-dcnode-id="3516" instrument_node="">correlation</span></a><span data-dcnode-id="3514" instrument_node="">, and </span><a data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smoothing" title="Smoothing"><span data-dcnode-id="3513" instrument_node="">smoothing</span></a><span data-dcnode-id="3511" instrument_node="">, and improved the treatment of </span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peirce%2527s_criterion" title="Peirce's criterion"><span data-dcnode-id="3510" instrument_node="">outliers</span></a><span data-dcnode-id="3508" instrument_node="">. He introduced terms "</span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confidence_interval" title="Confidence interval"><span data-dcnode-id="3507" instrument_node="">confidence</span></a><span data-dcnode-id="3505" instrument_node="">" and "</span><a data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Likelihood_function" title="Likelihood function"><span data-dcnode-id="3504" instrument_node="">likelihood</span></a><span data-dcnode-id="3502" instrument_node="">" (before </span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerzy_Neyman" title="Jerzy Neyman"><span data-dcnode-id="3501" instrument_node="">Neyman</span></a><span data-dcnode-id="3499" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_A._Fisher" title="Ronald A. Fisher"><span data-dcnode-id="3498" instrument_node="">Fisher</span></a><span data-dcnode-id="3496" instrument_node="">). (See the historical books of </span><a data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Stigler" title="Stephen Stigler"><span data-dcnode-id="3495" instrument_node="">Stephen Stigler</span></a><span data-dcnode-id="3493" instrument_node="">.) Many of Peirce's ideas were later popularized and developed by </span><a class="mw-redirect" data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_A._Fisher" title="Ronald A. Fisher"><span data-dcnode-id="3492" instrument_node="">Ronald A. Fisher</span></a><span data-dcnode-id="3490" instrument_node="">, </span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerzy_Neyman" title="Jerzy Neyman"><span data-dcnode-id="3489" instrument_node="">Jerzy Neyman</span></a><span data-dcnode-id="3487" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_P._Ramsey" title="Frank P. Ramsey"><span data-dcnode-id="3486" instrument_node="">Frank P. Ramsey</span></a><span data-dcnode-id="3484" instrument_node="">, </span><a data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruno_de_Finetti" title="Bruno de Finetti"><span data-dcnode-id="3483" instrument_node="">Bruno de Finetti</span></a><span data-dcnode-id="3481" instrument_node="">, and </span><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Popper" title="Karl Popper"><span data-dcnode-id="3480" instrument_node="">Karl Popper</span></a><span data-dcnode-id="3478" instrument_node="">.
</span></p><span data-dcnode-id="3476" instrument_node="">
</span><h3 data-dcnode-id="3466"><span class="mw-headline" data-dcnode-id="3474" id="Modern_perspectives"><span data-dcnode-id="3475" instrument_node="">Modern perspectives</span></span><span class="mw-editsection" data-dcnode-id="3467"><span class="mw-editsection-bracket" data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">[</span></span><a data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D20" title="Edit section: Modern perspectives"><span data-dcnode-id="3471" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3437"><a data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Popper" title="Karl Popper"><span data-dcnode-id="3464" instrument_node="">Karl Popper</span></a><span data-dcnode-id="3462" instrument_node=""> (1902–1994) is generally credited with providing major improvements in the understanding of the scientific method in the mid-to-late 20th century. In 1934 Popper published </span><i data-dcnode-id="3459"><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Logic_of_Scientific_Discovery" title="The Logic of Scientific Discovery"><span data-dcnode-id="3461" instrument_node="">The Logic of Scientific Discovery</span></a></i><span data-dcnode-id="3458" instrument_node="">, which repudiated the by then traditional observationalist-inductivist account of the scientific method. He advocated empirical </span><a data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Falsifiability" title="Falsifiability"><span data-dcnode-id="3457" instrument_node="">falsifiability</span></a><span data-dcnode-id="3455" instrument_node=""> as the criterion for distinguishing scientific work from </span><a data-dcnode-id="3453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-science" title="Non-science"><span data-dcnode-id="3454" instrument_node="">non-science</span></a><span data-dcnode-id="3452" instrument_node="">. According to Popper, scientific theory should make predictions (preferably predictions not made by a competing theory) which can be tested and the theory rejected if these predictions are shown not to be correct. Following Peirce and others, he argued that science would best progress using deductive reasoning as its primary emphasis, known as </span><a data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Critical_rationalism" title="Critical rationalism"><span data-dcnode-id="3451" instrument_node="">critical rationalism</span></a><span data-dcnode-id="3449" instrument_node="">.  His astute formulations of logical procedure helped to rein in the excessive use of inductive speculation upon inductive speculation, and also helped to strengthen the conceptual foundations for today's </span><a data-dcnode-id="3447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peer_review" title="Peer review"><span data-dcnode-id="3448" instrument_node="">peer review</span></a><span data-dcnode-id="3446" instrument_node=""> procedures.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3439" style="white-space:nowrap;"><span data-dcnode-id="3445" instrument_node="">[</span><i data-dcnode-id="3441"><a data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3443" title="This claim needs references to reliable sources. (January 2017)"><span data-dcnode-id="3444" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3440" instrument_node="">]</span></sup><span data-dcnode-id="3438" instrument_node="">
</span></p><p data-dcnode-id="3423"><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludwik_Fleck%23Thought_collective" title="Ludwik Fleck"><span data-dcnode-id="3436" instrument_node="">Ludwik Fleck</span></a><span data-dcnode-id="3434" instrument_node="">, a Polish epidemiologist who was contemporary with Karl Popper but who influenced Kuhn and others with his </span><i data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">Genesis and Development of a Scientific Fact</span></i><span data-dcnode-id="3431" instrument_node=""> (in German 1935, English 1979). Before Fleck, scientific fact was thought to spring fully formed (in the view of </span><a data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_Jammer" title="Max Jammer"><span data-dcnode-id="3430" instrument_node="">Max Jammer</span></a><span data-dcnode-id="3428" instrument_node="">, for example), when a gestation period is now recognized to be essential before acceptance of a phenomenon as fact.</span><sup class="reference" data-dcnode-id="3425" id="cite_ref-siwecka_93-0"><a data-dcnode-id="3426" href="#cite_note-siwecka-93"><span data-dcnode-id="3427" instrument_node="">[93]</span></a></sup><span data-dcnode-id="3424" instrument_node="">
</span></p><p data-dcnode-id="3398"><span data-dcnode-id="3422" instrument_node="">Critics of Popper, chiefly </span><a data-dcnode-id="3420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Kuhn" title="Thomas Kuhn"><span data-dcnode-id="3421" instrument_node="">Thomas Kuhn</span></a><span data-dcnode-id="3419" instrument_node="">, </span><a data-dcnode-id="3417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Feyerabend" title="Paul Feyerabend"><span data-dcnode-id="3418" instrument_node="">Paul Feyerabend</span></a><span data-dcnode-id="3416" instrument_node=""> and </span><a data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imre_Lakatos" title="Imre Lakatos"><span data-dcnode-id="3415" instrument_node="">Imre Lakatos</span></a><span data-dcnode-id="3413" instrument_node="">, rejected the idea that there exists a </span><i data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">single</span></i><span data-dcnode-id="3410" instrument_node=""> method that applies to all science and could account for its progress. In 1962 Kuhn published the influential book </span><i data-dcnode-id="3407"><a data-dcnode-id="3408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Structure_of_Scientific_Revolutions" title="The Structure of Scientific Revolutions"><span data-dcnode-id="3409" instrument_node="">The Structure of Scientific Revolutions</span></a></i><span data-dcnode-id="3406" instrument_node=""> which suggested that scientists worked within a series of paradigms, and argued there was little evidence of scientists actually following a falsificationist methodology. Kuhn quoted </span><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_Planck" title="Max Planck"><span data-dcnode-id="3405" instrument_node="">Max Planck</span></a><span data-dcnode-id="3403" instrument_node=""> who had said in his autobiography, "a new scientific truth does not triumph by convincing its opponents and making them see the light, but rather because its opponents eventually die, and a new generation grows up that is familiar with it."</span><sup class="reference" data-dcnode-id="3400" id="cite_ref-94"><a data-dcnode-id="3401" href="#cite_note-94"><span data-dcnode-id="3402" instrument_node="">[94]</span></a></sup><span data-dcnode-id="3399" instrument_node="">
</span></p><p data-dcnode-id="3389"><span data-dcnode-id="3397" instrument_node="">A well quoted source on the subject of the scientific method and statistical models, </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_E._P._Box" title="George E. P. Box"><span data-dcnode-id="3396" instrument_node="">George E. P. Box</span></a><span data-dcnode-id="3394" instrument_node=""> (1919-2013) wrote "Since all models are wrong the scientist cannot obtain a correct one by excessive elaboration. On the contrary following William of Occam he should seek an economical description of natural phenomena. Just as the ability to devise simple but evocative models is the signature of the great scientist, so over-elaboration and over-parameterization is often the mark of mediocrity" and "Since all models are wrong the scientist must be alert to what is importantly wrong. It is inappropriate to be concerned about mice when there are tigers abroad."</span><sup class="reference" data-dcnode-id="3391" id="cite_ref-box_95-0"><a data-dcnode-id="3392" href="#cite_note-box-95"><span data-dcnode-id="3393" instrument_node="">[95]</span></a></sup><span data-dcnode-id="3390" instrument_node="">
</span></p><p data-dcnode-id="3373"><span data-dcnode-id="3388" instrument_node="">These debates clearly show that there is no universal agreement as to what constitutes </span><i data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">the</span></i><span data-dcnode-id="3385" instrument_node=""> "scientific method".</span><sup class="reference" data-dcnode-id="3382" id="cite_ref-96"><a data-dcnode-id="3383" href="#cite_note-96"><span data-dcnode-id="3384" instrument_node="">[96]</span></a></sup><span data-dcnode-id="3381" instrument_node="">  There remain, nonetheless, certain </span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_method%23Elements_of_the_scientific_method" title="Scientific method"><span data-dcnode-id="3380" instrument_node="">core principles</span></a><span data-dcnode-id="3378" instrument_node=""> that are the foundation of scientific inquiry today.</span><sup class="reference" data-dcnode-id="3375" id="cite_ref-97"><a data-dcnode-id="3376" href="#cite_note-97"><span data-dcnode-id="3377" instrument_node="">[97]</span></a></sup><span data-dcnode-id="3374" instrument_node="">
</span></p><span data-dcnode-id="3372" instrument_node="">
</span><h2 data-dcnode-id="3362"><span class="mw-headline" data-dcnode-id="3370" id="Mention_of_the_topic"><span data-dcnode-id="3371" instrument_node="">Mention of the topic</span></span><span class="mw-editsection" data-dcnode-id="3363"><span class="mw-editsection-bracket" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">[</span></span><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D21" title="Edit section: Mention of the topic"><span data-dcnode-id="3367" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3361" instrument_node="">
