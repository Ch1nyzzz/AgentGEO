</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="6066" id="firstHeading"><span data-dcnode-id="6067" instrument_node="">History of scientific method</span></h1><span data-dcnode-id="6065" instrument_node="">
</span><div class="vector-body" data-dcnode-id="442" id="bodyContent"><span data-dcnode-id="6064" instrument_node="">
</span><div class="noprint" data-dcnode-id="6062" id="siteSub"><span data-dcnode-id="6063" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="6061" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="505" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="514"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="6047" style="display:none"><span data-dcnode-id="6048" instrument_node="">Aspect of history</span></div><span data-dcnode-id="6046" instrument_node="">
</span><p data-dcnode-id="6014"><span data-dcnode-id="6045" instrument_node="">The </span><b data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">history of scientific method</span></b><span data-dcnode-id="6042" instrument_node=""> considers changes in the methodology of scientific inquiry, as distinct from the </span><a data-dcnode-id="6040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_science" title="History of science"><span data-dcnode-id="6041" instrument_node="">history of science</span></a><span data-dcnode-id="6039" instrument_node=""> itself. The development of rules for </span><a class="mw-redirect" data-dcnode-id="6037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_reasoning" title="Scientific reasoning"><span data-dcnode-id="6038" instrument_node="">scientific reasoning</span></a><span data-dcnode-id="6036" instrument_node=""> has not been straightforward; scientific  method has been the subject of intense and recurring debate throughout the history of science, and eminent natural philosophers and scientists have argued for the primacy of one or another approach to establishing scientific knowledge. Despite the disagreements about approaches, scientific method has advanced in definite steps. Rationalist explanations of nature, including </span><a data-dcnode-id="6034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomism" title="Atomism"><span data-dcnode-id="6035" instrument_node="">atomism</span></a><span data-dcnode-id="6033" instrument_node="">, appeared both in ancient Greece in the thought of </span><a data-dcnode-id="6031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leucippus" title="Leucippus"><span data-dcnode-id="6032" instrument_node="">Leucippus</span></a><span data-dcnode-id="6030" instrument_node=""> and </span><a data-dcnode-id="6028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democritus" title="Democritus"><span data-dcnode-id="6029" instrument_node="">Democritus</span></a><span data-dcnode-id="6027" instrument_node="">, and in ancient India, in the </span><a data-dcnode-id="6025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nyaya" title="Nyaya"><span data-dcnode-id="6026" instrument_node="">Nyaya</span></a><span data-dcnode-id="6024" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vaisesika" title="Vaisesika"><span data-dcnode-id="6023" instrument_node="">Vaisesika</span></a><span data-dcnode-id="6021" instrument_node=""> and Buddhist schools, while </span><a data-dcnode-id="6019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charvaka" title="Charvaka"><span data-dcnode-id="6020" instrument_node="">Charvaka</span></a><span data-dcnode-id="6018" instrument_node=""> materialism rejected inference as a source of knowledge in favour of an empiricism that was always subject to doubt. </span><a data-dcnode-id="6016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="6017" instrument_node="">Aristotle</span></a><span data-dcnode-id="6015" instrument_node=""> pioneered scientific method in ancient Greece alongside his empirical biology and his work on logic, rejecting a purely deductive framework in favour of generalisations made from observations of nature.
</span></p><p data-dcnode-id="5984"><span data-dcnode-id="6013" instrument_node="">Some of the most important debates in the history of scientific method center on: </span><a data-dcnode-id="6011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rationalism" title="Rationalism"><span data-dcnode-id="6012" instrument_node="">rationalism</span></a><span data-dcnode-id="6010" instrument_node="">, especially as advocated by </span><a data-dcnode-id="6008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ren%25C3%25A9_Descartes" title="René Descartes"><span data-dcnode-id="6009" instrument_node="">René Descartes</span></a><span data-dcnode-id="6007" instrument_node="">; </span><a data-dcnode-id="6005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inductivism" title="Inductivism"><span data-dcnode-id="6006" instrument_node="">inductivism</span></a><span data-dcnode-id="6004" instrument_node="">, which rose to particular prominence with </span><a data-dcnode-id="6002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaac_Newton" title="Isaac Newton"><span data-dcnode-id="6003" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="6001" instrument_node=""> and his followers; and </span><a class="mw-redirect" data-dcnode-id="5999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothetico-deductivism" title="Hypothetico-deductivism"><span data-dcnode-id="6000" instrument_node="">hypothetico-deductivism</span></a><span data-dcnode-id="5998" instrument_node="">, which came to the fore in the early 19th century.  In the late 19th and early 20th centuries, a debate over </span><a data-dcnode-id="5996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philosophical_realism" title="Philosophical realism"><span data-dcnode-id="5997" instrument_node="">realism</span></a><span data-dcnode-id="5995" instrument_node=""> vs. </span><a class="mw-redirect" data-dcnode-id="5993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antirealism" title="Antirealism"><span data-dcnode-id="5994" instrument_node="">antirealism</span></a><span data-dcnode-id="5992" instrument_node=""> was central to discussions of scientific method as powerful scientific theories extended beyond the realm of the observable, while in the mid-20th century some prominent philosophers argued against any universal rules of </span><a data-dcnode-id="5990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science" title="Science"><span data-dcnode-id="5991" instrument_node="">science</span></a><span data-dcnode-id="5989" instrument_node=""> at all.</span><sup class="reference" data-dcnode-id="5986" id="cite_ref-1"><a data-dcnode-id="5987" href="#cite_note-1"><span data-dcnode-id="5988" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5985" instrument_node="">
</span></p><span data-dcnode-id="5983" instrument_node="">

</span><h3 data-dcnode-id="5730"><span class="mw-headline" data-dcnode-id="5738" id="Ancient_Egypt_and_Babylonia"><span data-dcnode-id="5739" instrument_node="">Ancient Egypt and Babylonia</span></span><span class="mw-editsection" data-dcnode-id="5731"><span class="mw-editsection-bracket" data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">[</span></span><a data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D2" title="Edit section: Ancient Egypt and Babylonia"><span data-dcnode-id="5735" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5732"><span data-dcnode-id="5733" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5729" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5714"><div class="thumbinner" data-dcnode-id="5715" style="width:222px;"><a class="image" data-dcnode-id="5727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEdwin_Smith_Papyrus_v2.jpg"><img alt="" class="thumbimage" data-dcnode-id="5728" data-file-height="1954" data-file-width="2550" decoding="async" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Edwin_Smith_Papyrus_v2.jpg/220px-Edwin_Smith_Papyrus_v2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Edwin_Smith_Papyrus_v2.jpg/330px-Edwin_Smith_Papyrus_v2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Edwin_Smith_Papyrus_v2.jpg/440px-Edwin_Smith_Papyrus_v2.jpg 2x" width="220"></a><span data-dcnode-id="5726" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5716"><div class="magnify" data-dcnode-id="5724"><a class="internal" data-dcnode-id="5725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEdwin_Smith_Papyrus_v2.jpg" title="Enlarge"></a></div><span data-dcnode-id="5723" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_Smith_papyrus" title="Edwin Smith papyrus"><span data-dcnode-id="5722" instrument_node="">Edwin Smith papyrus</span></a><span data-dcnode-id="5720" instrument_node="">, an ancient Egyptian medical textbook of c. 1600 BCE, set out an  </span><a class="mw-redirect" data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empirical_method" title="Empirical method"><span data-dcnode-id="5719" instrument_node="">empirical method</span></a><span data-dcnode-id="5717" instrument_node="">.</span></div></div></div><span data-dcnode-id="5713" instrument_node="">
</span><p data-dcnode-id="5686"><span data-dcnode-id="5712" instrument_node="">There are few explicit discussions of scientific methodologies in surviving records from early cultures.  The most that can be inferred about the approaches to undertaking science in this period stems from descriptions of early investigations into nature, in the surviving records.  An </span><a data-dcnode-id="5710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Egyptian_medicine" title="Ancient Egyptian medicine"><span data-dcnode-id="5711" instrument_node="">Egyptian medical</span></a><span data-dcnode-id="5709" instrument_node=""> textbook, the </span><a class="mw-redirect" data-dcnode-id="5707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_Smith_papyrus" title="Edwin Smith papyrus"><span data-dcnode-id="5708" instrument_node="">Edwin Smith papyrus</span></a><span data-dcnode-id="5706" instrument_node="">, (c. 1600 BCE), applies the following components: examination, diagnosis, treatment and prognosis, to the treatment of disease,</span><sup class="reference" data-dcnode-id="5703" id="cite_ref-2"><a data-dcnode-id="5704" href="#cite_note-2"><span data-dcnode-id="5705" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5702" instrument_node="">  which display strong parallels to the basic </span><a class="mw-redirect" data-dcnode-id="5700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empirical_method" title="Empirical method"><span data-dcnode-id="5701" instrument_node="">empirical method</span></a><span data-dcnode-id="5699" instrument_node=""> of science and according to </span><a data-dcnode-id="5697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G._E._R._Lloyd" title="G. E. R. Lloyd"><span data-dcnode-id="5698" instrument_node="">G. E. R. Lloyd</span></a><sup class="reference" data-dcnode-id="5694" id="cite_ref-3"><a data-dcnode-id="5695" href="#cite_note-3"><span data-dcnode-id="5696" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5693" instrument_node=""> played a significant role in the development of this methodology. The </span><a class="mw-redirect" data-dcnode-id="5691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ebers_papyrus" title="Ebers papyrus"><span data-dcnode-id="5692" instrument_node="">Ebers papyrus</span></a><span data-dcnode-id="5690" instrument_node=""> (c. 1550 BCE) also contains evidence of traditional </span><a data-dcnode-id="5688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empiricism" title="Empiricism"><span data-dcnode-id="5689" instrument_node="">empiricism</span></a><span data-dcnode-id="5687" instrument_node="">.
</span></p><p data-dcnode-id="5656"><span data-dcnode-id="5685" instrument_node="">By the middle of the 1st millennium BCE in </span><a data-dcnode-id="5683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesopotamia" title="Mesopotamia"><span data-dcnode-id="5684" instrument_node="">Mesopotamia</span></a><span data-dcnode-id="5682" instrument_node="">, </span><a data-dcnode-id="5680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babylonian_astronomy" title="Babylonian astronomy"><span data-dcnode-id="5681" instrument_node="">Babylonian astronomy</span></a><span data-dcnode-id="5679" instrument_node=""> had evolved into the earliest example of a scientific astronomy, as it was "the first and highly successful attempt at giving a refined mathematical description of astronomical phenomena." According to the historian </span><a data-dcnode-id="5677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asger_Aaboe" title="Asger Aaboe"><span data-dcnode-id="5678" instrument_node="">Asger Aaboe</span></a><span data-dcnode-id="5676" instrument_node="">, "all subsequent varieties of scientific astronomy, in the </span><a class="mw-redirect" data-dcnode-id="5674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hellenistic_astronomy" title="Hellenistic astronomy"><span data-dcnode-id="5675" instrument_node="">Hellenistic world</span></a><span data-dcnode-id="5673" instrument_node="">, </span><a data-dcnode-id="5671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_astronomy" title="Indian astronomy"><span data-dcnode-id="5672" instrument_node="">in India</span></a><span data-dcnode-id="5670" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomy_in_medieval_Islam" title="Astronomy in medieval Islam"><span data-dcnode-id="5669" instrument_node="">in the Islamic world</span></a><span data-dcnode-id="5667" instrument_node="">, and in </span><a class="mw-redirect" data-dcnode-id="5665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science_in_Medieval_Western_Europe" title="Science in Medieval Western Europe"><span data-dcnode-id="5666" instrument_node="">the West</span></a><span data-dcnode-id="5664" instrument_node=""> – if not indeed all subsequent endeavour in the </span><a class="mw-redirect" data-dcnode-id="5662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exact_science" title="Exact science"><span data-dcnode-id="5663" instrument_node="">exact sciences</span></a><span data-dcnode-id="5661" instrument_node=""> – depend upon Babylonian astronomy in decisive and fundamental ways."</span><sup class="reference" data-dcnode-id="5658" id="cite_ref-Aaboe_4-0"><a data-dcnode-id="5659" href="#cite_note-Aaboe-4"><span data-dcnode-id="5660" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5657" instrument_node="">
</span></p><p data-dcnode-id="5627"><span data-dcnode-id="5655" instrument_node="">The early </span><a data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babylonia" title="Babylonia"><span data-dcnode-id="5654" instrument_node="">Babylonians</span></a><span data-dcnode-id="5652" instrument_node=""> and </span><a data-dcnode-id="5650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Egypt" title="Ancient Egypt"><span data-dcnode-id="5651" instrument_node="">Egyptians</span></a><span data-dcnode-id="5649" instrument_node=""> developed much technical knowledge, crafts, and mathematics</span><sup class="reference" data-dcnode-id="5646" id="cite_ref-Egypt,_CradleOfMathematics_5-0"><a data-dcnode-id="5647" href="#cite_note-Egypt,_CradleOfMathematics-5"><span data-dcnode-id="5648" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5645" instrument_node=""> used in practical tasks of divination, as well as a knowledge of medicine,</span><sup class="reference" data-dcnode-id="5642" id="cite_ref-6"><a data-dcnode-id="5643" href="#cite_note-6"><span data-dcnode-id="5644" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5641" instrument_node=""> and made lists of various kinds. While the Babylonians in particular had engaged in the earliest forms of an </span><a class="mw-redirect" data-dcnode-id="5639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empirical" title="Empirical"><span data-dcnode-id="5640" instrument_node="">empirical</span></a><span data-dcnode-id="5638" instrument_node=""> mathematical science, with their early attempts at mathematically describing natural phenomena, they generally lacked underlying rational theories of nature.</span><sup class="reference" data-dcnode-id="5635" id="cite_ref-Aaboe_4-1"><a data-dcnode-id="5636" href="#cite_note-Aaboe-4"><span data-dcnode-id="5637" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="5632" id="cite_ref-Pingree_7-0"><a data-dcnode-id="5633" href="#cite_note-Pingree-7"><span data-dcnode-id="5634" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="5629" id="cite_ref-8"><a data-dcnode-id="5630" href="#cite_note-8"><span data-dcnode-id="5631" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5628" instrument_node="">
</span></p><span data-dcnode-id="5626" instrument_node="">
</span><h3 data-dcnode-id="5616"><span class="mw-headline" data-dcnode-id="5624" id="Classical_antiquity"><span data-dcnode-id="5625" instrument_node="">Classical antiquity</span></span><span class="mw-editsection" data-dcnode-id="5617"><span class="mw-editsection-bracket" data-dcnode-id="5622"><span data-dcnode-id="5623" instrument_node="">[</span></span><a data-dcnode-id="5620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D3" title="Edit section: Classical antiquity"><span data-dcnode-id="5621" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5615" instrument_node="">
</span><p data-dcnode-id="5587"><span data-dcnode-id="5614" instrument_node="">Greek-speaking ancient philosophers engaged in the earliest known forms of what is today recognized as a rational theoretical science,</span><sup class="reference" data-dcnode-id="5611" id="cite_ref-Pingree_7-1"><a data-dcnode-id="5612" href="#cite_note-Pingree-7"><span data-dcnode-id="5613" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="5608" id="cite_ref-9"><a data-dcnode-id="5609" href="#cite_note-9"><span data-dcnode-id="5610" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5607" instrument_node=""> with the move towards a more rational understanding of nature which began at least since the Archaic Period (650 – 480 BCE) with the Presocratic school. </span><a class="mw-redirect" data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thales" title="Thales"><span data-dcnode-id="5606" instrument_node="">Thales</span></a><span data-dcnode-id="5604" instrument_node=""> was the first known philosopher to use natural explanations, proclaiming that every event had a natural cause, even though he is known for saying "all things are full of gods" and sacrificed an ox when he discovered his theorem.</span><sup class="reference" data-dcnode-id="5601" id="cite_ref-10"><a data-dcnode-id="5602" href="#cite_note-10"><span data-dcnode-id="5603" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5600" instrument_node=""> </span><a data-dcnode-id="5598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leucippus" title="Leucippus"><span data-dcnode-id="5599" instrument_node="">Leucippus</span></a><span data-dcnode-id="5597" instrument_node="">, went on to develop the theory of </span><a data-dcnode-id="5595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomism" title="Atomism"><span data-dcnode-id="5596" instrument_node="">atomism</span></a><span data-dcnode-id="5594" instrument_node=""> – the idea that everything is composed entirely of various imperishable, indivisible elements called </span><a data-dcnode-id="5592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atom" title="Atom"><span data-dcnode-id="5593" instrument_node="">atoms</span></a><span data-dcnode-id="5591" instrument_node="">. This was elaborated in great detail by </span><a data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democritus" title="Democritus"><span data-dcnode-id="5590" instrument_node="">Democritus</span></a><span data-dcnode-id="5588" instrument_node="">.
</span></p><p data-dcnode-id="5562"><span data-dcnode-id="5586" instrument_node="">Similar atomist ideas emerged independently among ancient </span><a data-dcnode-id="5584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_philosophy" title="Indian philosophy"><span data-dcnode-id="5585" instrument_node="">Indian philosophers</span></a><span data-dcnode-id="5583" instrument_node=""> of the </span><a data-dcnode-id="5581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nyaya" title="Nyaya"><span data-dcnode-id="5582" instrument_node="">Nyaya</span></a><span data-dcnode-id="5580" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vaisesika" title="Vaisesika"><span data-dcnode-id="5579" instrument_node="">Vaisesika</span></a><span data-dcnode-id="5577" instrument_node=""> and </span><a data-dcnode-id="5575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhist_atomism" title="Buddhist atomism"><span data-dcnode-id="5576" instrument_node="">Buddhist schools</span></a><span data-dcnode-id="5574" instrument_node="">.</span><sup class="reference" data-dcnode-id="5571" id="cite_ref-11"><a data-dcnode-id="5572" href="#cite_note-11"><span data-dcnode-id="5573" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5570" instrument_node=""> In particular, like the Nyaya, Vaisesika, and Buddhist schools, the </span><a class="mw-redirect" data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/C%25C4%2581rv%25C4%2581ka" title="Cārvāka"><span data-dcnode-id="5569" instrument_node="">Cārvāka</span></a><span data-dcnode-id="5567" instrument_node=""> epistemology was materialist, and skeptical enough to admit perception as the basis for unconditionally true knowledge, while cautioning that if one could only infer a truth, then one must also harbor a doubt about that truth; an inferred truth could not be unconditional.</span><sup class="reference" data-dcnode-id="5564" id="cite_ref-12"><a data-dcnode-id="5565" href="#cite_note-12"><span data-dcnode-id="5566" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5563" instrument_node="">
</span></p><p data-dcnode-id="5545"><span data-dcnode-id="5561" instrument_node="">Towards the middle of the 5th century BCE, some of the components of a scientific tradition were already heavily established, even before Plato, who was an important contributor to this emerging tradition, thanks to the development of deductive reasoning, as propounded by his student, </span><a data-dcnode-id="5559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="5560" instrument_node="">Aristotle</span></a><span data-dcnode-id="5558" instrument_node="">.  In </span><i data-dcnode-id="5556"><span data-dcnode-id="5557" instrument_node="">Protagoras</span></i><span data-dcnode-id="5555" instrument_node=""> (318d-f), </span><a data-dcnode-id="5553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plato" title="Plato"><span data-dcnode-id="5554" instrument_node="">Plato</span></a><span data-dcnode-id="5552" instrument_node=""> mentioned the teaching of arithmetic, astronomy and geometry in schools. The philosophical ideas of this time were mostly freed from the constraints of everyday phenomena and </span><a data-dcnode-id="5550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_sense" title="Common sense"><span data-dcnode-id="5551" instrument_node="">common sense</span></a><span data-dcnode-id="5549" instrument_node="">. This denial of reality as we experience it reached an extreme in </span><a data-dcnode-id="5547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parmenides" title="Parmenides"><span data-dcnode-id="5548" instrument_node="">Parmenides</span></a><span data-dcnode-id="5546" instrument_node=""> who argued that the world is one and that change and subdivision do not exist.
</span></p><p data-dcnode-id="5530"><span data-dcnode-id="5544" instrument_node="">In the 3rd and 4th centuries BCE, the </span><a data-dcnode-id="5542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greece" title="Ancient Greece"><span data-dcnode-id="5543" instrument_node="">Greek</span></a><span data-dcnode-id="5541" instrument_node=""> physicians </span><a data-dcnode-id="5539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herophilos" title="Herophilos"><span data-dcnode-id="5540" instrument_node="">Herophilos</span></a><span data-dcnode-id="5538" instrument_node=""> (335–280 BCE) and </span><a class="mw-redirect" data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Erasistratus_of_Chios" title="Erasistratus of Chios"><span data-dcnode-id="5537" instrument_node="">Erasistratus of Chios</span></a><span data-dcnode-id="5535" instrument_node=""> employed experiments to further their medical research; Erasistratus at one time repeatedly weighing a caged bird, and noting its weight loss between feeding times.</span><sup class="reference" data-dcnode-id="5532" id="cite_ref-13"><a data-dcnode-id="5533" href="#cite_note-13"><span data-dcnode-id="5534" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5531" instrument_node="">
</span></p><span data-dcnode-id="5529" instrument_node="">
</span><h3 data-dcnode-id="5519"><span class="mw-headline" data-dcnode-id="5527" id="Aristotle"><span data-dcnode-id="5528" instrument_node="">Aristotle</span></span><span class="mw-editsection" data-dcnode-id="5520"><span class="mw-editsection-bracket" data-dcnode-id="5525"><span data-dcnode-id="5526" instrument_node="">[</span></span><a data-dcnode-id="5523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D4" title="Edit section: Aristotle"><span data-dcnode-id="5524" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5518" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5507"><div class="thumbinner" data-dcnode-id="5508" style="width:222px;"><a class="image" data-dcnode-id="5516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAristoteles_Louvre.jpg"><img alt="" class="thumbimage" data-dcnode-id="5517" data-file-height="2241" data-file-width="1680" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Aristoteles_Louvre.jpg/220px-Aristoteles_Louvre.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Aristoteles_Louvre.jpg/330px-Aristoteles_Louvre.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Aristoteles_Louvre.jpg/440px-Aristoteles_Louvre.jpg 2x" width="220"></a><span data-dcnode-id="5515" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5509"><div class="magnify" data-dcnode-id="5513"><a class="internal" data-dcnode-id="5514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAristoteles_Louvre.jpg" title="Enlarge"></a></div><a data-dcnode-id="5511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="5512" instrument_node="">Aristotle</span></a><span data-dcnode-id="5510" instrument_node="">'s philosophy involved both inductive and deductive reasoning.</span></div></div></div><span data-dcnode-id="5506" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5500" role="note"><span data-dcnode-id="5503" instrument_node="">Further information: </span><a data-dcnode-id="5501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle%2527s_biology" title="Aristotle's biology"><span data-dcnode-id="5502" instrument_node="">Aristotle's biology</span></a></div><span data-dcnode-id="5499" instrument_node="">
</span><p data-dcnode-id="5493"><span data-dcnode-id="5498" instrument_node="">Aristotle's inductive-deductive method used inductions from observations to infer general principles, deductions from those principles to check against further observations, and more cycles of induction and deduction to continue the advance of knowledge.</span><sup class="reference" data-dcnode-id="5495" id="cite_ref-Gauch2003_14-0"><a data-dcnode-id="5496" href="#cite_note-Gauch2003-14"><span data-dcnode-id="5497" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5494" instrument_node="">
</span></p><p data-dcnode-id="5453"><span data-dcnode-id="5492" instrument_node="">The </span><i data-dcnode-id="5489"><a data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organon" title="Organon"><span data-dcnode-id="5491" instrument_node="">Organon</span></a></i><span data-dcnode-id="5488" instrument_node=""> (Greek: </span><span data-dcnode-id="5485" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="5486" lang="grc"><span data-dcnode-id="5487" instrument_node="">Ὄργανον</span></span></span><span data-dcnode-id="5484" instrument_node="">, meaning "instrument, tool, organ") is the standard collection of </span><a data-dcnode-id="5482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="5483" instrument_node="">Aristotle</span></a><span data-dcnode-id="5481" instrument_node="">'s six works on </span><a data-dcnode-id="5479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logic" title="Logic"><span data-dcnode-id="5480" instrument_node="">logic</span></a><span data-dcnode-id="5478" instrument_node="">. The name </span><i data-dcnode-id="5476"><span data-dcnode-id="5477" instrument_node="">Organon</span></i><span data-dcnode-id="5475" instrument_node=""> was given by Aristotle's followers, the </span><a data-dcnode-id="5473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peripatetic_school" title="Peripatetic school"><span data-dcnode-id="5474" instrument_node="">Peripatetics</span></a><span data-dcnode-id="5472" instrument_node="">.
The order of the works is not chronological (the chronology is now difficult to determine) but was deliberately chosen by </span><a data-dcnode-id="5470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theophrastus" title="Theophrastus"><span data-dcnode-id="5471" instrument_node="">Theophrastus</span></a><span data-dcnode-id="5469" instrument_node=""> to constitute a well-structured system.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5462" style="white-space:nowrap;"><span data-dcnode-id="5468" instrument_node="">[</span><i data-dcnode-id="5464"><a data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5466" title="This claim needs references to reliable sources. (November 2016)"><span data-dcnode-id="5467" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5463" instrument_node="">]</span></sup><span data-dcnode-id="5461" instrument_node=""> Indeed, parts of them seem to be a scheme of a lecture on logic.  The arrangement of the works was made by </span><a data-dcnode-id="5459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andronicus_of_Rhodes" title="Andronicus of Rhodes"><span data-dcnode-id="5460" instrument_node="">Andronicus of Rhodes</span></a><span data-dcnode-id="5458" instrument_node=""> around 40&nbsp;BCE.</span><sup class="reference" data-dcnode-id="5455" id="cite_ref-Oxford_15-0"><a data-dcnode-id="5456" href="#cite_note-Oxford-15"><span data-dcnode-id="5457" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5454" instrument_node="">
</span></p><p data-dcnode-id="5448"><span data-dcnode-id="5452" instrument_node="">The </span><i data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">Organon</span></i><span data-dcnode-id="5449" instrument_node=""> comprises the following six works:
</span></p><span data-dcnode-id="5447" instrument_node="">
</span><ol data-dcnode-id="5322"><li data-dcnode-id="5433"><span data-dcnode-id="5446" instrument_node="">The </span><i data-dcnode-id="5443"><a data-dcnode-id="5444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Categories_%28Aristotle%29" title="Categories (Aristotle)"><span data-dcnode-id="5445" instrument_node="">Categories</span></a></i><span data-dcnode-id="5442" instrument_node=""> (Greek: </span><span data-dcnode-id="5439" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="5440" lang="grc"><span data-dcnode-id="5441" instrument_node="">Κατηγορίαι</span></span></span><span data-dcnode-id="5438" instrument_node="">, Latin: </span><span data-dcnode-id="5435" title="Latin-language text"><i data-dcnode-id="5436" lang="la"><span data-dcnode-id="5437" instrument_node="">Categoriae</span></i></span><span data-dcnode-id="5434" instrument_node="">) introduces Aristotle's 10-fold classification of that which exists: substance, quantity, quality, relation, place, time, situation, condition, action, and passion.</span></li><span data-dcnode-id="5432" instrument_node="">
</span><li data-dcnode-id="5404"><i data-dcnode-id="5429"><a data-dcnode-id="5430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_Interpretatione" title="De Interpretatione"><span data-dcnode-id="5431" instrument_node="">On Interpretation</span></a></i><span data-dcnode-id="5428" instrument_node=""> (Greek: </span><span data-dcnode-id="5425" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="5426" lang="grc"><span data-dcnode-id="5427" instrument_node="">Περὶ Ἑρμηνείας</span></span></span><span data-dcnode-id="5424" instrument_node="">, Latin: </span><span data-dcnode-id="5421" title="Latin-language text"><i data-dcnode-id="5422" lang="la"><span data-dcnode-id="5423" instrument_node="">De Interpretatione</span></i></span><span data-dcnode-id="5420" instrument_node="">) introduces Aristotle's conception of </span><a data-dcnode-id="5418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proposition" title="Proposition"><span data-dcnode-id="5419" instrument_node="">proposition</span></a><span data-dcnode-id="5417" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judgment" title="Judgment"><span data-dcnode-id="5416" instrument_node="">judgment</span></a><span data-dcnode-id="5414" instrument_node="">, and the various relations between affirmative, negative, universal, and particular propositions. Aristotle discusses the </span><a data-dcnode-id="5412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Square_of_opposition" title="Square of opposition"><span data-dcnode-id="5413" instrument_node="">square of opposition</span></a><span data-dcnode-id="5411" instrument_node=""> or square of </span><a data-dcnode-id="5409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apuleius" title="Apuleius"><span data-dcnode-id="5410" instrument_node="">Apuleius</span></a><span data-dcnode-id="5408" instrument_node=""> in Chapter 7 and its appendix Chapter 8. Chapter 9 deals with the </span><a data-dcnode-id="5406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Problem_of_future_contingents" title="Problem of future contingents"><span data-dcnode-id="5407" instrument_node="">problem of future contingents</span></a><span data-dcnode-id="5405" instrument_node="">.</span></li><span data-dcnode-id="5403" instrument_node="">
</span><li data-dcnode-id="5383"><span data-dcnode-id="5402" instrument_node="">The </span><i data-dcnode-id="5399"><a data-dcnode-id="5400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prior_Analytics" title="Prior Analytics"><span data-dcnode-id="5401" instrument_node="">Prior Analytics</span></a></i><span data-dcnode-id="5398" instrument_node=""> (Greek: </span><span data-dcnode-id="5395" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="5396" lang="grc"><span data-dcnode-id="5397" instrument_node="">Ἀναλυτικὰ Πρότερα</span></span></span><span data-dcnode-id="5394" instrument_node="">, Latin: </span><span data-dcnode-id="5391" title="Latin-language text"><i data-dcnode-id="5392" lang="la"><span data-dcnode-id="5393" instrument_node="">Analytica Priora</span></i></span><span data-dcnode-id="5390" instrument_node="">) introduces Aristotle's </span><a data-dcnode-id="5388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syllogism" title="Syllogism"><span data-dcnode-id="5389" instrument_node="">syllogistic</span></a><span data-dcnode-id="5387" instrument_node=""> method (see </span><a data-dcnode-id="5385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Term_logic" title="Term logic"><span data-dcnode-id="5386" instrument_node="">term logic</span></a><span data-dcnode-id="5384" instrument_node="">), argues for its correctness, and discusses inductive inference.</span></li><span data-dcnode-id="5382" instrument_node="">
</span><li data-dcnode-id="5359"><span data-dcnode-id="5381" instrument_node="">The </span><i data-dcnode-id="5378"><a data-dcnode-id="5379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Posterior_Analytics" title="Posterior Analytics"><span data-dcnode-id="5380" instrument_node="">Posterior Analytics</span></a></i><span data-dcnode-id="5377" instrument_node=""> (Greek: </span><span data-dcnode-id="5374" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="5375" lang="grc"><span data-dcnode-id="5376" instrument_node="">Ἀναλυτικὰ Ὕστερα</span></span></span><span data-dcnode-id="5373" instrument_node="">, Latin: </span><span data-dcnode-id="5370" title="Latin-language text"><i data-dcnode-id="5371" lang="la"><span data-dcnode-id="5372" instrument_node="">Analytica Posteriora</span></i></span><span data-dcnode-id="5369" instrument_node="">) deals with </span><a data-dcnode-id="5367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demonstration_%28teaching%29" title="Demonstration (teaching)"><span data-dcnode-id="5368" instrument_node="">demonstration</span></a><span data-dcnode-id="5366" instrument_node="">, </span><a data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Definition" title="Definition"><span data-dcnode-id="5365" instrument_node="">definition</span></a><span data-dcnode-id="5363" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="5361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_knowledge" title="Scientific knowledge"><span data-dcnode-id="5362" instrument_node="">scientific knowledge</span></a><span data-dcnode-id="5360" instrument_node="">.</span></li><span data-dcnode-id="5358" instrument_node="">
</span><li data-dcnode-id="5338"><span data-dcnode-id="5357" instrument_node="">The </span><i data-dcnode-id="5354"><a data-dcnode-id="5355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Topics_%28Aristotle%29" title="Topics (Aristotle)"><span data-dcnode-id="5356" instrument_node="">Topics</span></a></i><span data-dcnode-id="5353" instrument_node=""> (Greek: </span><span data-dcnode-id="5350" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="5351" lang="grc"><span data-dcnode-id="5352" instrument_node="">Τοπικά</span></span></span><span data-dcnode-id="5349" instrument_node="">, Latin: </span><span data-dcnode-id="5346" title="Latin-language text"><i data-dcnode-id="5347" lang="la"><span data-dcnode-id="5348" instrument_node="">Topica</span></i></span><span data-dcnode-id="5345" instrument_node="">) treats of issues in constructing valid arguments, and of inference that is probable, rather than certain.  It is in this treatise that Aristotle mentions the </span><a class="mw-redirect" data-dcnode-id="5343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Predicables" title="Predicables"><span data-dcnode-id="5344" instrument_node="">predicables</span></a><span data-dcnode-id="5342" instrument_node="">, later discussed by </span><a data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Porphyry_%28philosopher%29" title="Porphyry (philosopher)"><span data-dcnode-id="5341" instrument_node="">Porphyry</span></a><span data-dcnode-id="5339" instrument_node=""> and by the scholastic logicians.</span></li><span data-dcnode-id="5337" instrument_node="">
</span><li data-dcnode-id="5323"><span data-dcnode-id="5336" instrument_node="">The </span><i data-dcnode-id="5333"><a class="mw-redirect" data-dcnode-id="5334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/On_Sophistical_Refutations" title="On Sophistical Refutations"><span data-dcnode-id="5335" instrument_node="">Sophistical Refutations</span></a></i><span data-dcnode-id="5332" instrument_node=""> (Greek: </span><span data-dcnode-id="5329" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="5330" lang="grc"><span data-dcnode-id="5331" instrument_node="">Περὶ Σοφιστικῶν Ἐλέγχων</span></span></span><span data-dcnode-id="5328" instrument_node="">, Latin: </span><span data-dcnode-id="5325" title="Latin-language text"><i data-dcnode-id="5326" lang="la"><span data-dcnode-id="5327" instrument_node="">De Sophisticis Elenchis</span></i></span><span data-dcnode-id="5324" instrument_node="">) gives a treatment of logical fallacies, and provides a key link to Aristotle's work on rhetoric.</span></li></ol><span data-dcnode-id="5321" instrument_node="">
</span><p data-dcnode-id="5312"><span data-dcnode-id="5320" instrument_node="">Aristotle's </span><i data-dcnode-id="5317"><a data-dcnode-id="5318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metaphysics_%28Aristotle%29" title="Metaphysics (Aristotle)"><span data-dcnode-id="5319" instrument_node="">Metaphysics</span></a></i><span data-dcnode-id="5316" instrument_node=""> has some points of overlap with the works making up the </span><i data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">Organon</span></i><span data-dcnode-id="5313" instrument_node=""> but is not traditionally considered part of it; additionally there are works on logic attributed, with varying degrees of plausibility, to Aristotle that were not known to the Peripatetics.
</span></p><p data-dcnode-id="5294"><a data-dcnode-id="5310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="5311" instrument_node="">Aristotle</span></a><span data-dcnode-id="5309" instrument_node=""> has been called the founder of modern science by </span><a data-dcnode-id="5307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_Lacy_O%2527Leary" title="De Lacy O'Leary"><span data-dcnode-id="5308" instrument_node="">De Lacy O'Leary</span></a><span data-dcnode-id="5306" instrument_node="">.</span><sup class="reference" data-dcnode-id="5303" id="cite_ref-16"><a data-dcnode-id="5304" href="#cite_note-16"><span data-dcnode-id="5305" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5302" instrument_node=""> His demonstration method is found in </span><i data-dcnode-id="5299"><a data-dcnode-id="5300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Posterior_Analytics" title="Posterior Analytics"><span data-dcnode-id="5301" instrument_node="">Posterior Analytics</span></a></i><span data-dcnode-id="5298" instrument_node="">. He provided another of the ingredients of scientific tradition: </span><a data-dcnode-id="5296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empiricism" title="Empiricism"><span data-dcnode-id="5297" instrument_node="">empiricism</span></a><span data-dcnode-id="5295" instrument_node="">. For Aristotle, universal truths can be known from particular things via induction. To some extent then, Aristotle reconciles abstract thought with observation, although it would be a mistake to imply that Aristotelian science is empirical in form.  Indeed, Aristotle did not accept that knowledge acquired by induction could rightly be counted as scientific knowledge. Nevertheless, induction was for him a necessary preliminary to the main business of scientific enquiry, providing the primary premises required for scientific demonstrations.
</span></p><p data-dcnode-id="5288"><span data-dcnode-id="5293" instrument_node="">Aristotle largely ignored inductive reasoning in his treatment of scientific enquiry. To make it clear why this is so, consider this statement in the </span><i data-dcnode-id="5290"><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Posterior_Analytics" title="Posterior Analytics"><span data-dcnode-id="5292" instrument_node="">Posterior Analytics</span></a></i><span data-dcnode-id="5289" instrument_node="">:
</span></p><span data-dcnode-id="5287" instrument_node="">
</span><blockquote data-dcnode-id="5284"><p data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">We suppose ourselves to possess unqualified scientific knowledge of a thing, as opposed to knowing it in the accidental way in which the sophist knows, when we think that we know the cause on which the fact depends, as the cause of that fact and of no other, and, further, that the fact could not be other than it is.</span></p></blockquote><span data-dcnode-id="5283" instrument_node="">
</span><p data-dcnode-id="5271"><span data-dcnode-id="5282" instrument_node="">It was therefore the work of the philosopher to demonstrate universal truths and to discover their causes.</span><sup class="reference" data-dcnode-id="5279" id="cite_ref-17"><a data-dcnode-id="5280" href="#cite_note-17"><span data-dcnode-id="5281" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5278" instrument_node=""> While induction was sufficient for discovering universals by generalization, it did not succeed in identifying causes. For this task Aristotle used the tool of </span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deductive_reasoning" title="Deductive reasoning"><span data-dcnode-id="5277" instrument_node="">deductive reasoning</span></a><span data-dcnode-id="5275" instrument_node=""> in the form of </span><a data-dcnode-id="5273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syllogism" title="Syllogism"><span data-dcnode-id="5274" instrument_node="">syllogisms</span></a><span data-dcnode-id="5272" instrument_node="">. Using the syllogism, scientists could infer new universal truths from those already established.
</span></p><p data-dcnode-id="5266"><span data-dcnode-id="5270" instrument_node="">Aristotle developed a complete normative approach to scientific inquiry involving the syllogism, which he discusses at length in his </span><i data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">Posterior Analytics</span></i><span data-dcnode-id="5267" instrument_node="">. A difficulty with this scheme lay in showing that derived truths have solid primary premises.  Aristotle would not allow that demonstrations could be circular (supporting the conclusion by the premises, and the premises by the conclusion). Nor would he allow an infinite number of middle terms between the primary premises and the conclusion. This leads to the question of how the primary premises are found or developed, and as mentioned above, Aristotle allowed that induction would be required for this task.
</span></p><p data-dcnode-id="5261"><span data-dcnode-id="5265" instrument_node="">Towards the end of the </span><i data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">Posterior Analytics</span></i><span data-dcnode-id="5262" instrument_node="">, Aristotle discusses knowledge imparted by induction.
</span></p><span data-dcnode-id="5260" instrument_node="">
</span><blockquote data-dcnode-id="5254"><p data-dcnode-id="5255"><span data-dcnode-id="5259" instrument_node="">Thus it is clear that we must get to know the primary premises by induction; for the method by which even sense-perception implants the universal is inductive. [...] it follows that there will be no scientific knowledge of the primary premises, and since except intuition nothing can be truer than scientific knowledge, it will be intuition that apprehends the primary premises. [...] If, therefore, it is the only other kind of true thinking except scientific knowing, </span><a class="mw-redirect" data-dcnode-id="5257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intuition_%28knowledge%29" title="Intuition (knowledge)"><span data-dcnode-id="5258" instrument_node="">intuition</span></a><span data-dcnode-id="5256" instrument_node=""> will be the originative source of scientific knowledge.</span></p></blockquote><span data-dcnode-id="5253" instrument_node="">
</span><p data-dcnode-id="5226"><span data-dcnode-id="5252" instrument_node="">The account leaves room for doubt regarding the nature and extent of Aristotle's empiricism. In particular, it seems that Aristotle considers sense-perception only as a vehicle for knowledge through intuition. He restricted his investigations in natural history to their natural settings,</span><sup class="reference" data-dcnode-id="5249" id="cite_ref-18"><a data-dcnode-id="5250" href="#cite_note-18"><span data-dcnode-id="5251" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5248" instrument_node=""> such as at the Pyrrha lagoon,</span><sup class="reference" data-dcnode-id="5245" id="cite_ref-19"><a data-dcnode-id="5246" href="#cite_note-19"><span data-dcnode-id="5247" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5244" instrument_node=""> now called </span><a data-dcnode-id="5242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalloni" title="Kalloni"><span data-dcnode-id="5243" instrument_node="">Kalloni</span></a><span data-dcnode-id="5241" instrument_node="">, at </span><a data-dcnode-id="5239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lesbos" title="Lesbos"><span data-dcnode-id="5240" instrument_node="">Lesbos</span></a><span data-dcnode-id="5238" instrument_node="">. Aristotle and Theophrastus together formulated the new science of biology,</span><sup class="reference" data-dcnode-id="5235" id="cite_ref-20"><a data-dcnode-id="5236" href="#cite_note-20"><span data-dcnode-id="5237" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5234" instrument_node=""> inductively, case by case, for two years before Aristotle was called to tutor </span><a data-dcnode-id="5232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_the_Great" title="Alexander the Great"><span data-dcnode-id="5233" instrument_node="">Alexander</span></a><span data-dcnode-id="5231" instrument_node="">. Aristotle performed no modern-style experiments in the form in which they appear in today's physics and chemistry laboratories.</span><sup class="reference" data-dcnode-id="5228" id="cite_ref-21"><a data-dcnode-id="5229" href="#cite_note-21"><span data-dcnode-id="5230" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5227" instrument_node="">
Induction is not afforded the status of scientific reasoning, and so it is left to intuition to provide a solid foundation for Aristotle's science. With that said, Aristotle brings us somewhat closer an empirical science than his predecessors.
</span></p><span data-dcnode-id="5225" instrument_node="">
</span><h3 data-dcnode-id="5215"><span class="mw-headline" data-dcnode-id="5223" id="Epicurus"><span data-dcnode-id="5224" instrument_node="">Epicurus</span></span><span class="mw-editsection" data-dcnode-id="5216"><span class="mw-editsection-bracket" data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">[</span></span><a data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D5" title="Edit section: Epicurus"><span data-dcnode-id="5220" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5214" instrument_node="">
</span><p data-dcnode-id="5189"><span data-dcnode-id="5213" instrument_node="">In his  work Kαvώv ('canon', a straight edge or ruler, thus any type of measure or standard, referred to as 'canonic'), </span><a data-dcnode-id="5211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epicurus" title="Epicurus"><span data-dcnode-id="5212" instrument_node="">Epicurus</span></a><span data-dcnode-id="5210" instrument_node=""> laid out his first rule for inquiry in physics: 'that the </span><i data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">first concepts be seen</span></i><span data-dcnode-id="5207" instrument_node="">,</span><sup class="reference" data-dcnode-id="5204" id="cite_ref-Asmis1984_22-0"><a data-dcnode-id="5205" href="#cite_note-Asmis1984-22"><span data-dcnode-id="5206" instrument_node="">[22]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5201"><span data-dcnode-id="5202" title="Page / location: p.20"><span data-dcnode-id="5203" instrument_node="">: p.20 </span></span></sup><span data-dcnode-id="5200" instrument_node=""> and that they </span><i data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">not require demonstration</span></i><span data-dcnode-id="5197" instrument_node=""> '.</span><sup class="reference" data-dcnode-id="5194" id="cite_ref-Asmis1984_22-1"><a data-dcnode-id="5195" href="#cite_note-Asmis1984-22"><span data-dcnode-id="5196" instrument_node="">[22]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5191"><span data-dcnode-id="5192" title="Page / location: pp.35–47"><span data-dcnode-id="5193" instrument_node="">: pp.35–47 </span></span></sup><span data-dcnode-id="5190" instrument_node="">
</span></p><p data-dcnode-id="5170"><span data-dcnode-id="5188" instrument_node="">His second rule for inquiry was that prior to an investigation, </span><i data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">we are to have self-evident concepts</span></i><span data-dcnode-id="5185" instrument_node="">,</span><sup class="reference" data-dcnode-id="5182" id="cite_ref-Asmis1984_22-2"><a data-dcnode-id="5183" href="#cite_note-Asmis1984-22"><span data-dcnode-id="5184" instrument_node="">[22]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5179"><span data-dcnode-id="5180" title="Page / location: pp.61–80"><span data-dcnode-id="5181" instrument_node="">: pp.61–80 </span></span></sup><span data-dcnode-id="5178" instrument_node=""> so that we might infer [ἔχωμεν οἷς σημειωσόμεθα] both what is expected [τò προσμένον], and also what is non-apparent [τò ἄδηλον].</span><sup class="reference" data-dcnode-id="5175" id="cite_ref-Asmis1984_22-3"><a data-dcnode-id="5176" href="#cite_note-Asmis1984-22"><span data-dcnode-id="5177" instrument_node="">[22]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5172"><span data-dcnode-id="5173" title="Page / location: pp.83–103"><span data-dcnode-id="5174" instrument_node="">: pp.83–103 </span></span></sup><span data-dcnode-id="5171" instrument_node="">
</span></p><p data-dcnode-id="5121"><span data-dcnode-id="5169" instrument_node="">Epicurus applies his method of inference (the use of observations as signs, Asmis' summary, p.&nbsp;333: </span><i data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">the method of using the phenomena as signs (σημεῖα) of what is unobserved</span></i><span data-dcnode-id="5166" instrument_node="">)</span><sup class="reference" data-dcnode-id="5163" id="cite_ref-Asmis1984_22-4"><a data-dcnode-id="5164" href="#cite_note-Asmis1984-22"><span data-dcnode-id="5165" instrument_node="">[22]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5160"><span data-dcnode-id="5161" title="Page / location: pp.175–196"><span data-dcnode-id="5162" instrument_node="">: pp.175–196 </span></span></sup><span data-dcnode-id="5159" instrument_node=""> immediately to the </span><a data-dcnode-id="5157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomic_theory" title="Atomic theory"><span data-dcnode-id="5158" instrument_node="">atomic theory</span></a><span data-dcnode-id="5156" instrument_node=""> of </span><a data-dcnode-id="5154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democritus" title="Democritus"><span data-dcnode-id="5155" instrument_node="">Democritus</span></a><span data-dcnode-id="5153" instrument_node="">.  In Aristotle's </span><i data-dcnode-id="5150"><a data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prior_Analytics" title="Prior Analytics"><span data-dcnode-id="5152" instrument_node="">Prior Analytics</span></a></i><span data-dcnode-id="5149" instrument_node="">, Aristotle himself employs the use of signs.</span><sup class="reference" data-dcnode-id="5146" id="cite_ref-Asmis1984_22-5"><a data-dcnode-id="5147" href="#cite_note-Asmis1984-22"><span data-dcnode-id="5148" instrument_node="">[22]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5143"><span data-dcnode-id="5144" title="Page / location: pp.212–224"><span data-dcnode-id="5145" instrument_node="">: pp.212–224 </span></span></sup><sup class="reference" data-dcnode-id="5140" id="cite_ref-23"><a data-dcnode-id="5141" href="#cite_note-23"><span data-dcnode-id="5142" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5139" instrument_node=""> But Epicurus presented his 'canonic' as rival to Aristotle's logic.</span><sup class="reference" data-dcnode-id="5136" id="cite_ref-Asmis1984_22-6"><a data-dcnode-id="5137" href="#cite_note-Asmis1984-22"><span data-dcnode-id="5138" instrument_node="">[22]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5133"><span data-dcnode-id="5134" title="Page / location: pp.19–34"><span data-dcnode-id="5135" instrument_node="">: pp.19–34 </span></span></sup><span data-dcnode-id="5132" instrument_node=""> See: </span><a data-dcnode-id="5130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucretius" title="Lucretius"><span data-dcnode-id="5131" instrument_node="">Lucretius</span></a><span data-dcnode-id="5129" instrument_node=""> (c. 99 BCE – c. 55 BCE)  </span><i data-dcnode-id="5126"><a data-dcnode-id="5127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_rerum_natura" title="De rerum natura"><span data-dcnode-id="5128" instrument_node="">De rerum natura</span></a></i><span data-dcnode-id="5125" instrument_node=""> (</span><i data-dcnode-id="5123"><span data-dcnode-id="5124" instrument_node="">On the nature of things</span></i><span data-dcnode-id="5122" instrument_node="">) a didactic poem explaining Epicurus' philosophy and physics.
</span></p><span data-dcnode-id="5120" instrument_node="">
</span><h2 data-dcnode-id="5110"><span class="mw-headline" data-dcnode-id="5118" id="Emergence_of_inductive_experimental_method"><span data-dcnode-id="5119" instrument_node="">Emergence of inductive experimental method</span></span><span class="mw-editsection" data-dcnode-id="5111"><span class="mw-editsection-bracket" data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">[</span></span><a data-dcnode-id="5114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D6" title="Edit section: Emergence of inductive experimental method"><span data-dcnode-id="5115" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5112"><span data-dcnode-id="5113" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5109" instrument_node="">
</span><p data-dcnode-id="5078"><span data-dcnode-id="5108" instrument_node="">During the </span><a data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Ages" title="Middle Ages"><span data-dcnode-id="5107" instrument_node="">Middle Ages</span></a><span data-dcnode-id="5105" instrument_node=""> issues of what is now termed science began to be addressed. There was greater emphasis on combining theory with practice in the </span><a data-dcnode-id="5103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_world" title="Muslim world"><span data-dcnode-id="5104" instrument_node="">Islamic world</span></a><span data-dcnode-id="5102" instrument_node=""> than there had been in Classical times, and it was common for those studying the sciences to be artisans as well, something that had been "considered an aberration in the ancient world." Islamic experts in the sciences were often expert instrument makers who enhanced their powers of observation and calculation with them.</span><sup class="reference" data-dcnode-id="5099" id="cite_ref-24"><a data-dcnode-id="5100" href="#cite_note-24"><span data-dcnode-id="5101" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5098" instrument_node=""> Starting in the early ninth century, </span><a class="mw-redirect" data-dcnode-id="5096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science_in_medieval_Islam" title="Science in medieval Islam"><span data-dcnode-id="5097" instrument_node="">early Muslim scientists</span></a><span data-dcnode-id="5095" instrument_node=""> such </span><a data-dcnode-id="5093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Kindi" title="Al-Kindi"><span data-dcnode-id="5094" instrument_node="">al-Kindi</span></a><span data-dcnode-id="5092" instrument_node=""> (801–873) and the authors writing under the name of </span><a class="mw-redirect" data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J%25C4%2581bir_ibn_Hayy%25C4%2581n" title="Jābir ibn Hayyān"><span data-dcnode-id="5091" instrument_node="">Jābir ibn Hayyān</span></a><span data-dcnode-id="5089" instrument_node=""> (writings dated to c. 850–950) started to put a greater emphasis on the use of experiment as a source of knowledge.</span><sup class="reference" data-dcnode-id="5086" id="cite_ref-25"><a data-dcnode-id="5087" href="#cite_note-25"><span data-dcnode-id="5088" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="5083" id="cite_ref-Plinio-17_26-0"><a data-dcnode-id="5084" href="#cite_note-Plinio-17-26"><span data-dcnode-id="5085" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5082" instrument_node=""> Several scientific methods thus emerged from the medieval </span><a data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_world" title="Muslim world"><span data-dcnode-id="5081" instrument_node="">Muslim world</span></a><span data-dcnode-id="5079" instrument_node=""> by the early 11th century, all of which emphasized experimentation as well as quantification to varying degrees.
</span></p><span data-dcnode-id="5077" instrument_node="">
</span><h3 data-dcnode-id="5067"><span class="mw-headline" data-dcnode-id="5075" id="Ibn_al-Haytham"><span data-dcnode-id="5076" instrument_node="">Ibn al-Haytham</span></span><span class="mw-editsection" data-dcnode-id="5068"><span class="mw-editsection-bracket" data-dcnode-id="5073"><span data-dcnode-id="5074" instrument_node="">[</span></span><a data-dcnode-id="5071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D7" title="Edit section: Ibn al-Haytham"><span data-dcnode-id="5072" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5066" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5047"><div class="thumbinner" data-dcnode-id="5048" style="width:222px;"><a class="image" data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThesaurus_opticus_Titelblatt.jpg"><img alt="" class="thumbimage" data-dcnode-id="5065" data-file-height="2200" data-file-width="2000" decoding="async" height="242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Thesaurus_opticus_Titelblatt.jpg/220px-Thesaurus_opticus_Titelblatt.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Thesaurus_opticus_Titelblatt.jpg/330px-Thesaurus_opticus_Titelblatt.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Thesaurus_opticus_Titelblatt.jpg/440px-Thesaurus_opticus_Titelblatt.jpg 2x" width="220"></a><span data-dcnode-id="5063" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5049"><div class="magnify" data-dcnode-id="5061"><a class="internal" data-dcnode-id="5062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThesaurus_opticus_Titelblatt.jpg" title="Enlarge"></a></div><span data-dcnode-id="5060" instrument_node="">"How does light travel through transparent bodies? Light travels through transparent bodies in straight lines only.... We have explained this exhaustively in our </span><i data-dcnode-id="5057"><a data-dcnode-id="5058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Optics" title="Book of Optics"><span data-dcnode-id="5059" instrument_node="">Book of Optics</span></a></i><span data-dcnode-id="5056" instrument_node="">."</span><sup class="reference" data-dcnode-id="5053" id="cite_ref-Sambursky_27-0"><a data-dcnode-id="5054" href="#cite_note-Sambursky-27"><span data-dcnode-id="5055" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5052" instrument_node=""> —</span><a class="mw-redirect" data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alhazen" title="Alhazen"><span data-dcnode-id="5051" instrument_node="">Alhazen</span></a></div></div></div><span data-dcnode-id="5046" instrument_node="">
</span><p data-dcnode-id="4997"><span data-dcnode-id="5045" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_physics" title="Islamic physics"><span data-dcnode-id="5044" instrument_node="">Arab physicist</span></a><span data-dcnode-id="5042" instrument_node=""> </span><a data-dcnode-id="5040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ibn_al-Haytham" title="Ibn al-Haytham"><span data-dcnode-id="5041" instrument_node="">Ibn al-Haytham</span></a><span data-dcnode-id="5039" instrument_node=""> (Alhazen) used experimentation to obtain the results in his </span><i data-dcnode-id="5036"><a data-dcnode-id="5037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Optics" title="Book of Optics"><span data-dcnode-id="5038" instrument_node="">Book of Optics</span></a></i><span data-dcnode-id="5035" instrument_node=""> (1021). He combined </span><a data-dcnode-id="5033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observation" title="Observation"><span data-dcnode-id="5034" instrument_node="">observations</span></a><span data-dcnode-id="5032" instrument_node="">, </span><a data-dcnode-id="5030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experiment" title="Experiment"><span data-dcnode-id="5031" instrument_node="">experiments</span></a><span data-dcnode-id="5029" instrument_node=""> and </span><a data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rationality" title="Rationality"><span data-dcnode-id="5028" instrument_node="">rational</span></a><span data-dcnode-id="5026" instrument_node=""> arguments to support his intromission theory of </span><a data-dcnode-id="5024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visual_perception" title="Visual perception"><span data-dcnode-id="5025" instrument_node="">vision</span></a><span data-dcnode-id="5023" instrument_node="">, in which </span><a data-dcnode-id="5021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ray_%28optics%29" title="Ray (optics)"><span data-dcnode-id="5022" instrument_node="">rays</span></a><span data-dcnode-id="5020" instrument_node=""> of </span><a data-dcnode-id="5018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light" title="Light"><span data-dcnode-id="5019" instrument_node="">light</span></a><span data-dcnode-id="5017" instrument_node=""> are emitted from objects rather than from the eyes. He used similar arguments to show that the ancient </span><a data-dcnode-id="5015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emission_theory_%28vision%29" title="Emission theory (vision)"><span data-dcnode-id="5016" instrument_node="">emission theory of vision</span></a><span data-dcnode-id="5014" instrument_node=""> supported by </span><a data-dcnode-id="5012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ptolemy" title="Ptolemy"><span data-dcnode-id="5013" instrument_node="">Ptolemy</span></a><span data-dcnode-id="5011" instrument_node=""> and </span><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euclid" title="Euclid"><span data-dcnode-id="5010" instrument_node="">Euclid</span></a><span data-dcnode-id="5008" instrument_node=""> (in which the eyes emit the rays of light used for seeing), and the ancient </span><a class="mw-redirect" data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intromission_theory" title="Intromission theory"><span data-dcnode-id="5007" instrument_node="">intromission theory</span></a><span data-dcnode-id="5005" instrument_node=""> supported by </span><a data-dcnode-id="5003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="5004" instrument_node="">Aristotle</span></a><span data-dcnode-id="5002" instrument_node=""> (where objects emit physical particles to the eyes), were both wrong.</span><sup class="reference" data-dcnode-id="4999" id="cite_ref-28"><a data-dcnode-id="5000" href="#cite_note-28"><span data-dcnode-id="5001" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4998" instrument_node="">
</span></p><p data-dcnode-id="4970"><span data-dcnode-id="4996" instrument_node="">Experimental evidence supported most of the propositions in his </span><i data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">Book of Optics</span></i><span data-dcnode-id="4993" instrument_node=""> and grounded his theories of vision, light and colour, as well as his research in catoptrics and dioptrics.  His legacy was elaborated through the 'reforming' of his </span><i data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">Optics</span></i><span data-dcnode-id="4990" instrument_node=""> by </span><a class="mw-redirect" data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kamal_al-Din_al-Farisi" title="Kamal al-Din al-Farisi"><span data-dcnode-id="4989" instrument_node="">Kamal al-Din al-Farisi</span></a><span data-dcnode-id="4987" instrument_node=""> (d. c. 1320) in the latter's </span><i data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node="">Kitab Tanqih al-Manazir</span></i><span data-dcnode-id="4984" instrument_node=""> (</span><i data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">The Revision of</span></i><span data-dcnode-id="4981" instrument_node=""> [Ibn al-Haytham's] </span><i data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">Optics</span></i><span data-dcnode-id="4978" instrument_node="">).</span><sup class="reference" data-dcnode-id="4975" id="cite_ref-29"><a data-dcnode-id="4976" href="#cite_note-29"><span data-dcnode-id="4977" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="4972" id="cite_ref-30"><a data-dcnode-id="4973" href="#cite_note-30"><span data-dcnode-id="4974" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4971" instrument_node="">
</span></p><p data-dcnode-id="4961"><span data-dcnode-id="4969" instrument_node="">Alhazen viewed his scientific studies as a search for </span><a data-dcnode-id="4967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Truth" title="Truth"><span data-dcnode-id="4968" instrument_node="">truth</span></a><span data-dcnode-id="4966" instrument_node="">: "Truth is sought for its own sake. And those who are engaged upon the quest for anything for its own sake are not interested in other things. Finding the truth is difficult, and the road to it is rough. ...</span><sup class="reference" data-dcnode-id="4963" id="cite_ref-31"><a data-dcnode-id="4964" href="#cite_note-31"><span data-dcnode-id="4965" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4962" instrument_node="">
