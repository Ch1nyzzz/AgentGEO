</span></p><p data-dcnode-id="4951"><span data-dcnode-id="4960" instrument_node="">Alhazen's work included the conjecture that "Light travels through transparent bodies in straight lines only", which he was able to corroborate only after years of effort. He stated, "[This] is clearly observed in the lights which enter into dark rooms through holes. ... the entering light will be clearly observable in the dust which fills the air."</span><sup class="reference" data-dcnode-id="4957" id="cite_ref-Sambursky_27-1"><a data-dcnode-id="4958" href="#cite_note-Sambursky-27"><span data-dcnode-id="4959" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4956" instrument_node=""> He also demonstrated the conjecture by placing a straight stick or a taut thread next to the light beam.</span><sup class="reference" data-dcnode-id="4953" id="cite_ref-32"><a data-dcnode-id="4954" href="#cite_note-32"><span data-dcnode-id="4955" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4952" instrument_node="">
</span></p><p data-dcnode-id="4930"><span data-dcnode-id="4950" instrument_node="">Ibn al-Haytham also employed </span><a data-dcnode-id="4948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_skepticism" title="Scientific skepticism"><span data-dcnode-id="4949" instrument_node="">scientific skepticism</span></a><span data-dcnode-id="4947" instrument_node=""> and emphasized the role of </span><a data-dcnode-id="4945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empiricism" title="Empiricism"><span data-dcnode-id="4946" instrument_node="">empiricism</span></a><span data-dcnode-id="4944" instrument_node="">. He also explained the role of </span><a data-dcnode-id="4942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inductive_reasoning" title="Inductive reasoning"><span data-dcnode-id="4943" instrument_node="">induction</span></a><span data-dcnode-id="4941" instrument_node=""> in </span><a data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syllogism" title="Syllogism"><span data-dcnode-id="4940" instrument_node="">syllogism</span></a><span data-dcnode-id="4938" instrument_node="">, and criticized </span><a data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="4937" instrument_node="">Aristotle</span></a><span data-dcnode-id="4935" instrument_node=""> for his lack of contribution to the method of induction, which Ibn al-Haytham regarded as superior to syllogism, and he considered induction to be the basic requirement for true scientific research.</span><sup class="reference" data-dcnode-id="4932" id="cite_ref-33"><a data-dcnode-id="4933" href="#cite_note-33"><span data-dcnode-id="4934" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4931" instrument_node="">
</span></p><p data-dcnode-id="4908"><span data-dcnode-id="4929" instrument_node="">Something like </span><a data-dcnode-id="4927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occam%2527s_razor" title="Occam's razor"><span data-dcnode-id="4928" instrument_node="">Occam's razor</span></a><span data-dcnode-id="4926" instrument_node=""> is also present in the </span><i data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">Book of Optics</span></i><span data-dcnode-id="4923" instrument_node="">. For example, after demonstrating that light is generated by luminous objects and emitted or reflected into the eyes, he states that therefore "the </span><a data-dcnode-id="4921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emission_theory_%28vision%29" title="Emission theory (vision)"><span data-dcnode-id="4922" instrument_node="">extramission</span></a><span data-dcnode-id="4920" instrument_node=""> of [visual] rays is superfluous and useless."</span><sup class="reference" data-dcnode-id="4917" id="cite_ref-34"><a data-dcnode-id="4918" href="#cite_note-34"><span data-dcnode-id="4919" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4916" instrument_node=""> He may also have been the first scientist to adopt a form of </span><a data-dcnode-id="4914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Positivism" title="Positivism"><span data-dcnode-id="4915" instrument_node="">positivism</span></a><span data-dcnode-id="4913" instrument_node=""> in his approach. He wrote that "we do not go beyond experience, and we cannot be content to use pure concepts in investigating natural phenomena", and that the understanding of these cannot be acquired without mathematics. After assuming that light is a material substance, he does not further discuss its nature but confines his investigations to the diffusion and propagation of light. The only properties of light he takes into account are those treatable by geometry and verifiable by experiment.</span><sup class="reference" data-dcnode-id="4910" id="cite_ref-Rashed_35-0"><a data-dcnode-id="4911" href="#cite_note-Rashed-35"><span data-dcnode-id="4912" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4909" instrument_node="">
</span></p><span data-dcnode-id="4907" instrument_node="">
</span><h3 data-dcnode-id="4897"><span class="mw-headline" data-dcnode-id="4905" id="Al-Biruni"><span data-dcnode-id="4906" instrument_node="">Al-Biruni</span></span><span class="mw-editsection" data-dcnode-id="4898"><span class="mw-editsection-bracket" data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">[</span></span><a data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D8" title="Edit section: Al-Biruni"><span data-dcnode-id="4902" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4896" instrument_node="">
</span><p data-dcnode-id="4853"><span data-dcnode-id="4895" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_people" title="Persian people"><span data-dcnode-id="4894" instrument_node="">Persian</span></a><span data-dcnode-id="4892" instrument_node=""> scientist </span><a class="mw-redirect" data-dcnode-id="4890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ab%25C5%25AB_Rayh%25C4%2581n_al-B%25C4%25ABr%25C5%25ABn%25C4%25AB" title="Abū Rayhān al-Bīrūnī"><span data-dcnode-id="4891" instrument_node="">Abū Rayhān al-Bīrūnī</span></a><span data-dcnode-id="4889" instrument_node=""> introduced early scientific methods for several different fields of </span><a data-dcnode-id="4887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inquiry" title="Inquiry"><span data-dcnode-id="4888" instrument_node="">inquiry</span></a><span data-dcnode-id="4886" instrument_node=""> during the 1020s and 1030s. For example, in his treatise on </span><a data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mineralogy" title="Mineralogy"><span data-dcnode-id="4885" instrument_node="">mineralogy</span></a><span data-dcnode-id="4883" instrument_node="">, </span><i data-dcnode-id="4881"><span data-dcnode-id="4882" instrument_node="">Kitab al-Jawahir</span></i><span data-dcnode-id="4880" instrument_node=""> (</span><i data-dcnode-id="4878"><span data-dcnode-id="4879" instrument_node="">Book of Precious Stones</span></i><span data-dcnode-id="4877" instrument_node="">), al-Biruni is "the most </span><a class="mw-redirect" data-dcnode-id="4875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exact_science" title="Exact science"><span data-dcnode-id="4876" instrument_node="">exact</span></a><span data-dcnode-id="4874" instrument_node=""> of </span><a data-dcnode-id="4872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experiment" title="Experiment"><span data-dcnode-id="4873" instrument_node="">experimental</span></a><span data-dcnode-id="4871" instrument_node=""> scientists", while in the introduction to his </span><a data-dcnode-id="4869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indology" title="Indology"><span data-dcnode-id="4870" instrument_node="">study of India</span></a><span data-dcnode-id="4868" instrument_node="">, he declares that "to execute our project, it has not been possible to follow the geometric method" and thus became one of the pioneers of  </span><a data-dcnode-id="4866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comparative_sociology" title="Comparative sociology"><span data-dcnode-id="4867" instrument_node="">comparative sociology</span></a><span data-dcnode-id="4865" instrument_node=""> in insisting on field experience and information.</span><sup class="reference" data-dcnode-id="4862" id="cite_ref-Sardar_36-0"><a data-dcnode-id="4863" href="#cite_note-Sardar-36"><span data-dcnode-id="4864" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4861" instrument_node=""> He also developed an early experimental method for </span><a data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mechanics" title="Mechanics"><span data-dcnode-id="4860" instrument_node="">mechanics</span></a><span data-dcnode-id="4858" instrument_node="">.</span><sup class="reference" data-dcnode-id="4855" id="cite_ref-Rozhanskaya-642_37-0"><a data-dcnode-id="4856" href="#cite_note-Rozhanskaya-642-37"><span data-dcnode-id="4857" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4854" instrument_node="">
</span></p><p data-dcnode-id="4825"><span data-dcnode-id="4852" instrument_node="">Al-Biruni's methods resembled the modern scientific method,  particularly in his emphasis on repeated experimentation. Biruni was concerned with how to conceptualize and prevent both </span><a class="mw-redirect" data-dcnode-id="4850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Systematic_error" title="Systematic error"><span data-dcnode-id="4851" instrument_node="">systematic errors</span></a><span data-dcnode-id="4849" instrument_node=""> and observational biases, such as "errors caused by the use of small instruments and errors made by human observers." He argued that if instruments produce errors because of their imperfections or idiosyncratic qualities, then multiple observations must be taken, </span><a data-dcnode-id="4847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qualitative_research" title="Qualitative research"><span data-dcnode-id="4848" instrument_node="">analyzed qualitatively</span></a><span data-dcnode-id="4846" instrument_node="">, and on this basis, arrive at a "common-sense single value for the constant sought", whether an </span><a data-dcnode-id="4844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arithmetic_mean" title="Arithmetic mean"><span data-dcnode-id="4845" instrument_node="">arithmetic mean</span></a><span data-dcnode-id="4843" instrument_node=""> or a "reliable </span><a data-dcnode-id="4841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Approximation" title="Approximation"><span data-dcnode-id="4842" instrument_node="">estimate</span></a><span data-dcnode-id="4840" instrument_node="">."</span><sup class="reference" data-dcnode-id="4837" id="cite_ref-38"><a data-dcnode-id="4838" href="#cite_note-38"><span data-dcnode-id="4839" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4836" instrument_node=""> In his scientific method, "universals came out of practical, </span><a data-dcnode-id="4834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experiment" title="Experiment"><span data-dcnode-id="4835" instrument_node="">experimental</span></a><span data-dcnode-id="4833" instrument_node=""> work" and "theories are formulated after discoveries", as with </span><a data-dcnode-id="4831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inductivism" title="Inductivism"><span data-dcnode-id="4832" instrument_node="">inductivism</span></a><span data-dcnode-id="4830" instrument_node="">.</span><sup class="reference" data-dcnode-id="4827" id="cite_ref-Sardar_36-1"><a data-dcnode-id="4828" href="#cite_note-Sardar-36"><span data-dcnode-id="4829" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4826" instrument_node="">
</span></p><span data-dcnode-id="4824" instrument_node="">
</span><h3 data-dcnode-id="4813"><span data-dcnode-id="4823" id="Ibn_Sina_.28Avicenna.29"></span><span class="mw-headline" data-dcnode-id="4821" id="Ibn_Sina_(Avicenna)"><span data-dcnode-id="4822" instrument_node="">Ibn Sina (Avicenna)</span></span><span class="mw-editsection" data-dcnode-id="4814"><span class="mw-editsection-bracket" data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">[</span></span><a data-dcnode-id="4817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D9" title="Edit section: Ibn Sina (Avicenna)"><span data-dcnode-id="4818" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4812" instrument_node="">
</span><p data-dcnode-id="4756"><span data-dcnode-id="4811" instrument_node="">In the </span><i data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">On Demonstration</span></i><span data-dcnode-id="4808" instrument_node=""> section of </span><i data-dcnode-id="4805"><a data-dcnode-id="4806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Book_of_Healing" title="The Book of Healing"><span data-dcnode-id="4807" instrument_node="">The Book of Healing</span></a></i><span data-dcnode-id="4804" instrument_node=""> (1027), the </span><a data-dcnode-id="4802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avicennism" title="Avicennism"><span data-dcnode-id="4803" instrument_node="">Persian philosopher</span></a><span data-dcnode-id="4801" instrument_node=""> and scientist </span><a data-dcnode-id="4799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avicenna" title="Avicenna"><span data-dcnode-id="4800" instrument_node="">Avicenna</span></a><span data-dcnode-id="4798" instrument_node=""> (Ibn Sina) discussed </span><a data-dcnode-id="4796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philosophy_of_science" title="Philosophy of science"><span data-dcnode-id="4797" instrument_node="">philosophy of science</span></a><span data-dcnode-id="4795" instrument_node=""> and described an early scientific method of inquiry. He discussed </span><a data-dcnode-id="4793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="4794" instrument_node="">Aristotle</span></a><span data-dcnode-id="4792" instrument_node="">'s </span><i data-dcnode-id="4789"><a data-dcnode-id="4790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Posterior_Analytics" title="Posterior Analytics"><span data-dcnode-id="4791" instrument_node="">Posterior Analytics</span></a></i><span data-dcnode-id="4788" instrument_node=""> and significantly diverged from it on several points. Avicenna discussed the issue of a proper procedure for scientific inquiry and the question of "How does one acquire the first principles of a science?" He asked how a scientist might find "the initial </span><a data-dcnode-id="4786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axiom" title="Axiom"><span data-dcnode-id="4787" instrument_node="">axioms</span></a><span data-dcnode-id="4785" instrument_node=""> or </span><a data-dcnode-id="4783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothesis" title="Hypothesis"><span data-dcnode-id="4784" instrument_node="">hypotheses</span></a><span data-dcnode-id="4782" instrument_node=""> of a </span><a data-dcnode-id="4780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deductive_reasoning" title="Deductive reasoning"><span data-dcnode-id="4781" instrument_node="">deductive</span></a><span data-dcnode-id="4779" instrument_node=""> science without inferring them from some more basic premises?" He explained that the ideal situation is when one grasps that a "relation holds between the terms, which would allow for absolute, universal certainty." Avicenna added two further methods for finding a </span><a data-dcnode-id="4777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_principle" title="First principle"><span data-dcnode-id="4778" instrument_node="">first principle</span></a><span data-dcnode-id="4776" instrument_node="">: the ancient </span><a data-dcnode-id="4774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotelianism" title="Aristotelianism"><span data-dcnode-id="4775" instrument_node="">Aristotelian</span></a><span data-dcnode-id="4773" instrument_node=""> method of induction (</span><i data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">istiqra</span></i><span data-dcnode-id="4770" instrument_node="">), and the more recent method of </span><a data-dcnode-id="4768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothesis" title="Hypothesis"><span data-dcnode-id="4769" instrument_node="">examination</span></a><span data-dcnode-id="4767" instrument_node=""> and </span><a data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experiment" title="Experiment"><span data-dcnode-id="4766" instrument_node="">experimentation</span></a><span data-dcnode-id="4764" instrument_node=""> (</span><i data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">tajriba</span></i><span data-dcnode-id="4761" instrument_node="">). Avicenna criticized Aristotelian induction, arguing that "it does not lead to the absolute, universal, and certain premises that it purports to provide." In its place, he advocated "a method of experimentation as a means for scientific inquiry."</span><sup class="reference" data-dcnode-id="4758" id="cite_ref-39"><a data-dcnode-id="4759" href="#cite_note-39"><span data-dcnode-id="4760" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4757" instrument_node="">
</span></p><p data-dcnode-id="4720"><span data-dcnode-id="4755" instrument_node="">Earlier, in </span><i data-dcnode-id="4752"><a data-dcnode-id="4753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Canon_of_Medicine" title="The Canon of Medicine"><span data-dcnode-id="4754" instrument_node="">The Canon of Medicine</span></a></i><span data-dcnode-id="4751" instrument_node=""> (1025), Avicenna was also the first to describe what is essentially </span><a data-dcnode-id="4749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mill%2527s_Methods" title="Mill's Methods"><span data-dcnode-id="4750" instrument_node="">methods of agreement, difference and concomitant variation</span></a><span data-dcnode-id="4748" instrument_node=""> which are critical to </span><a data-dcnode-id="4746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inductive_reasoning" title="Inductive reasoning"><span data-dcnode-id="4747" instrument_node="">inductive logic</span></a><span data-dcnode-id="4745" instrument_node=""> and the scientific method.</span><sup class="reference" data-dcnode-id="4742" id="cite_ref-Goodman_40-0"><a data-dcnode-id="4743" href="#cite_note-Goodman-40"><span data-dcnode-id="4744" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="4739" id="cite_ref-Goodman-1992_41-0"><a data-dcnode-id="4740" href="#cite_note-Goodman-1992-41"><span data-dcnode-id="4741" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="4736" id="cite_ref-Franklin_42-0"><a data-dcnode-id="4737" href="#cite_note-Franklin-42"><span data-dcnode-id="4738" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4735" instrument_node=""> However, unlike his contemporary al-Biruni's scientific method, in which "universals came out of practical, experimental work" and "theories are formulated after discoveries", Avicenna developed a scientific procedure in which "general and universal questions came first and led to experimental work."</span><sup class="reference" data-dcnode-id="4732" id="cite_ref-Sardar_36-2"><a data-dcnode-id="4733" href="#cite_note-Sardar-36"><span data-dcnode-id="4734" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4731" instrument_node=""> Due to the differences between their methods, al-Biruni referred to himself as a mathematical </span><a data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientist" title="Scientist"><span data-dcnode-id="4730" instrument_node="">scientist</span></a><span data-dcnode-id="4728" instrument_node=""> and to Avicenna as a </span><a data-dcnode-id="4726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philosopher" title="Philosopher"><span data-dcnode-id="4727" instrument_node="">philosopher</span></a><span data-dcnode-id="4725" instrument_node="">, during a debate between the two scholars.</span><sup class="reference" data-dcnode-id="4722" id="cite_ref-Dallal_43-0"><a data-dcnode-id="4723" href="#cite_note-Dallal-43"><span data-dcnode-id="4724" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4721" instrument_node="">
</span></p><span data-dcnode-id="4719" instrument_node="">
</span><h3 data-dcnode-id="4709"><span class="mw-headline" data-dcnode-id="4717" id="Robert_Grosseteste"><span data-dcnode-id="4718" instrument_node="">Robert Grosseteste</span></span><span class="mw-editsection" data-dcnode-id="4710"><span class="mw-editsection-bracket" data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">[</span></span><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D10" title="Edit section: Robert Grosseteste"><span data-dcnode-id="4714" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4711"><span data-dcnode-id="4712" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4708" instrument_node="">
</span><p data-dcnode-id="4668"><span data-dcnode-id="4707" instrument_node="">During the European </span><a data-dcnode-id="4705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renaissance_of_the_12th_century" title="Renaissance of the 12th century"><span data-dcnode-id="4706" instrument_node="">Renaissance of the 12th century</span></a><span data-dcnode-id="4704" instrument_node="">, ideas on scientific methodology, including Aristotle's </span><a data-dcnode-id="4702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empiricism" title="Empiricism"><span data-dcnode-id="4703" instrument_node="">empiricism</span></a><span data-dcnode-id="4701" instrument_node=""> and the </span><a data-dcnode-id="4699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experiment" title="Experiment"><span data-dcnode-id="4700" instrument_node="">experimental</span></a><span data-dcnode-id="4698" instrument_node=""> approaches of Alhazen and Avicenna, were introduced to medieval Europe via </span><a data-dcnode-id="4696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_translations_of_the_12th_century" title="Latin translations of the 12th century"><span data-dcnode-id="4697" instrument_node="">Latin translations</span></a><span data-dcnode-id="4695" instrument_node=""> of </span><a class="mw-redirect" data-dcnode-id="4693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabic_language" title="Arabic language"><span data-dcnode-id="4694" instrument_node="">Arabic</span></a><span data-dcnode-id="4692" instrument_node=""> and </span><a data-dcnode-id="4690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greek_language" title="Greek language"><span data-dcnode-id="4691" instrument_node="">Greek</span></a><span data-dcnode-id="4689" instrument_node=""> texts and commentaries.</span><sup class="reference" data-dcnode-id="4686" id="cite_ref-burnett2001_44-0"><a data-dcnode-id="4687" href="#cite_note-burnett2001-44"><span data-dcnode-id="4688" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4685" instrument_node=""> </span><a data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Grosseteste" title="Robert Grosseteste"><span data-dcnode-id="4684" instrument_node="">Robert Grosseteste</span></a><span data-dcnode-id="4682" instrument_node="">'s commentary on the </span><i data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">Posterior Analytics</span></i><span data-dcnode-id="4679" instrument_node=""> places Grosseteste among the first </span><a data-dcnode-id="4677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scholasticism" title="Scholasticism"><span data-dcnode-id="4678" instrument_node="">scholastic</span></a><span data-dcnode-id="4676" instrument_node=""> thinkers in Europe to understand </span><a data-dcnode-id="4674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="4675" instrument_node="">Aristotle's</span></a><span data-dcnode-id="4673" instrument_node=""> vision of the dual nature of scientific reasoning. Concluding from particular observations into a universal law, and then back again, from universal laws to prediction of particulars. Grosseteste called this "resolution and composition". Further, Grosseteste said that both paths should be verified through experimentation to verify the principles.</span><sup class="reference" data-dcnode-id="4670" id="cite_ref-45"><a data-dcnode-id="4671" href="#cite_note-45"><span data-dcnode-id="4672" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4669" instrument_node="">
</span></p><span data-dcnode-id="4667" instrument_node="">
</span><h3 data-dcnode-id="4657"><span class="mw-headline" data-dcnode-id="4665" id="Roger_Bacon"><span data-dcnode-id="4666" instrument_node="">Roger Bacon</span></span><span class="mw-editsection" data-dcnode-id="4658"><span class="mw-editsection-bracket" data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">[</span></span><a data-dcnode-id="4661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D11" title="Edit section: Roger Bacon"><span data-dcnode-id="4662" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4656" instrument_node="">
</span><p data-dcnode-id="4626"><a data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roger_Bacon" title="Roger Bacon"><span data-dcnode-id="4655" instrument_node="">Roger Bacon</span></a><span data-dcnode-id="4653" instrument_node=""> was inspired by the writings of Grosseteste. In his account of a method, Bacon described a repeating cycle of </span><i data-dcnode-id="4650"><a data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observation" title="Observation"><span data-dcnode-id="4652" instrument_node="">observation</span></a></i><span data-dcnode-id="4649" instrument_node="">, </span><i data-dcnode-id="4646"><a data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothesis" title="Hypothesis"><span data-dcnode-id="4648" instrument_node="">hypothesis</span></a></i><span data-dcnode-id="4645" instrument_node="">, </span><i data-dcnode-id="4642"><a data-dcnode-id="4643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experiment" title="Experiment"><span data-dcnode-id="4644" instrument_node="">experimentation</span></a></i><span data-dcnode-id="4641" instrument_node="">, and the need for independent </span><i data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">verification</span></i><span data-dcnode-id="4638" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4631" style="white-space:nowrap;"><span data-dcnode-id="4637" instrument_node="">[</span><i data-dcnode-id="4633"><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4635" title="This claim needs references to reliable sources. (June 2018)"><span data-dcnode-id="4636" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4632" instrument_node="">]</span></sup><span data-dcnode-id="4630" instrument_node=""> He recorded the way he had conducted his experiments in precise detail, perhaps with the idea that others could </span><a data-dcnode-id="4628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reproducibility" title="Reproducibility"><span data-dcnode-id="4629" instrument_node="">reproduce</span></a><span data-dcnode-id="4627" instrument_node=""> and independently test his results.
</span></p><p data-dcnode-id="4592"><span data-dcnode-id="4625" instrument_node="">About 1256 he joined the </span><a class="mw-redirect" data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franciscan_Order" title="Franciscan Order"><span data-dcnode-id="4624" instrument_node="">Franciscan Order</span></a><span data-dcnode-id="4622" instrument_node=""> and became subject to the Franciscan statute forbidding </span><a data-dcnode-id="4620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Friar" title="Friar"><span data-dcnode-id="4621" instrument_node="">Friars</span></a><span data-dcnode-id="4619" instrument_node=""> from publishing books or pamphlets without specific approval.  After the accession of Pope </span><a class="mw-redirect" data-dcnode-id="4617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clement_IV" title="Clement IV"><span data-dcnode-id="4618" instrument_node="">Clement IV</span></a><span data-dcnode-id="4616" instrument_node=""> in 1265, the Pope granted Bacon a special commission to write to him on scientific matters.  In eighteen months he completed three large treatises, the </span><i data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">Opus Majus</span></i><span data-dcnode-id="4613" instrument_node="">, </span><i data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">Opus Minus</span></i><span data-dcnode-id="4610" instrument_node="">, and </span><i data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">Opus Tertium</span></i><span data-dcnode-id="4607" instrument_node=""> which he sent to the Pope.</span><sup class="reference" data-dcnode-id="4604" id="cite_ref-46"><a data-dcnode-id="4605" href="#cite_note-46"><span data-dcnode-id="4606" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4603" instrument_node=""> </span><a data-dcnode-id="4601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Whewell" title="William Whewell"><span data-dcnode-id="4602" instrument_node="">William Whewell</span></a><span data-dcnode-id="4600" instrument_node=""> has called </span><i data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">Opus Majus</span></i><span data-dcnode-id="4597" instrument_node=""> at once the Encyclopaedia and Organon of the 13th century.</span><sup class="reference" data-dcnode-id="4594" id="cite_ref-47"><a data-dcnode-id="4595" href="#cite_note-47"><span data-dcnode-id="4596" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4593" instrument_node="">
</span></p><span data-dcnode-id="4591" instrument_node="">
</span><ul data-dcnode-id="4558"><li data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">Part I (pp.&nbsp;1–22) treats of the four causes of error: authority, custom, the opinion of the unskilled many, and the concealment of real ignorance by a pretense of knowledge.</span></li><span data-dcnode-id="4588" instrument_node="">
</span><li data-dcnode-id="4583"><span data-dcnode-id="4587" instrument_node="">Part VI (pp.&nbsp;445–477) treats of experimental science, </span><i data-dcnode-id="4585"><span data-dcnode-id="4586" instrument_node="">domina omnium scientiarum</span></i><span data-dcnode-id="4584" instrument_node="">. There are two methods of knowledge: the one by argument, the other by experience. Mere argument is never sufficient; it may decide a question, but gives no satisfaction or certainty to the mind, which can only be convinced by immediate inspection or intuition, which is what experience gives.</span></li><span data-dcnode-id="4582" instrument_node="">
</span><li data-dcnode-id="4568"><span data-dcnode-id="4581" instrument_node="">Experimental science, which in the </span><i data-dcnode-id="4579"><span data-dcnode-id="4580" instrument_node="">Opus Tertium</span></i><span data-dcnode-id="4578" instrument_node=""> (p.&nbsp;46) is distinguished from the speculative sciences and the operative arts, is said to have three great prerogatives over all sciences:
</span><ol data-dcnode-id="4569"><li data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">It verifies their conclusions by direct experiment;</span></li><span data-dcnode-id="4575" instrument_node="">
</span><li data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node="">It discovers truths which they could never reach;</span></li><span data-dcnode-id="4572" instrument_node="">
</span><li data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">It investigates the secrets of nature, and opens to us a knowledge of past and future.</span></li></ol></li><span data-dcnode-id="4567" instrument_node="">
</span><li data-dcnode-id="4559"><span data-dcnode-id="4566" instrument_node="">Roger Bacon illustrated his method by an investigation into the nature and cause of the </span><a data-dcnode-id="4564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rainbow" title="Rainbow"><span data-dcnode-id="4565" instrument_node="">rainbow</span></a><span data-dcnode-id="4563" instrument_node="">, as a specimen of inductive research.</span><sup class="reference" data-dcnode-id="4560" id="cite_ref-EBbacon_48-0"><a data-dcnode-id="4561" href="#cite_note-EBbacon-48"><span data-dcnode-id="4562" instrument_node="">[48]</span></a></sup></li></ul><span data-dcnode-id="4557" instrument_node="">
</span><h3 data-dcnode-id="4547"><span class="mw-headline" data-dcnode-id="4555" id="Renaissance_humanism_and_medicine"><span data-dcnode-id="4556" instrument_node="">Renaissance humanism and medicine</span></span><span class="mw-editsection" data-dcnode-id="4548"><span class="mw-editsection-bracket" data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">[</span></span><a data-dcnode-id="4551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D12" title="Edit section: Renaissance humanism and medicine"><span data-dcnode-id="4552" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4546" instrument_node="">
</span><p data-dcnode-id="4529"><span data-dcnode-id="4545" instrument_node="">Aristotle's ideas became a framework for critical debate beginning with absorption of the Aristotelian texts into the university curriculum in the first half of the 13th century.</span><sup class="reference" data-dcnode-id="4542" id="cite_ref-49"><a data-dcnode-id="4543" href="#cite_note-49"><span data-dcnode-id="4544" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4541" instrument_node="">  Contributing to this was the success of medieval theologians in reconciling Aristotelian philosophy with Christian theology. Within the sciences, medieval philosophers were not afraid of disagreeing with Aristotle on many specific issues, although their disagreements were stated within the language of Aristotelian philosophy. All medieval natural philosophers were Aristotelians, but "Aristotelianism" had become a somewhat broad and flexible concept.  With the end of Middle Ages, the </span><a data-dcnode-id="4539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renaissance" title="Renaissance"><span data-dcnode-id="4540" instrument_node="">Renaissance</span></a><span data-dcnode-id="4538" instrument_node=""> rejection of medieval traditions coupled with an extreme reverence for classical sources led to a recovery of other ancient philosophical traditions, especially the teachings of Plato.</span><sup class="reference" data-dcnode-id="4535" id="cite_ref-50"><a data-dcnode-id="4536" href="#cite_note-50"><span data-dcnode-id="4537" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4534" instrument_node="">  By the 17th century, those who clung dogmatically to Aristotle's teachings were faced with several competing approaches to nature.</span><sup class="reference" data-dcnode-id="4531" id="cite_ref-51"><a data-dcnode-id="4532" href="#cite_note-51"><span data-dcnode-id="4533" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4530" instrument_node="">
</span></p><span data-dcnode-id="4528" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4511"><div class="thumbinner" data-dcnode-id="4512" style="width:222px;"><a class="image" data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALeonhart_Fuchs_Historia_Stirpium.jpg"><img alt="" class="thumbimage" data-dcnode-id="4527" data-file-height="1527" data-file-width="2000" decoding="async" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Leonhart_Fuchs_Historia_Stirpium.jpg/220px-Leonhart_Fuchs_Historia_Stirpium.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Leonhart_Fuchs_Historia_Stirpium.jpg/330px-Leonhart_Fuchs_Historia_Stirpium.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Leonhart_Fuchs_Historia_Stirpium.jpg/440px-Leonhart_Fuchs_Historia_Stirpium.jpg 2x" width="220"></a><span data-dcnode-id="4525" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4513"><div class="magnify" data-dcnode-id="4523"><a class="internal" data-dcnode-id="4524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALeonhart_Fuchs_Historia_Stirpium.jpg" title="Enlarge"></a></div><a data-dcnode-id="4521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonhart_Fuchs" title="Leonhart Fuchs"><span data-dcnode-id="4522" instrument_node="">Leonhart Fuchs</span></a><span data-dcnode-id="4520" instrument_node="">' drawing of </span><a data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absinthe" title="Absinthe"><span data-dcnode-id="4519" instrument_node="">absinthe</span></a><span data-dcnode-id="4517" instrument_node=""> plant, </span><i data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">De Historia Stirpium</span></i><span data-dcnode-id="4514" instrument_node="">. Basle 1542</span></div></div></div><span data-dcnode-id="4510" instrument_node="">
</span><p data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">The discovery of the Americas at the close of the 15th century showed the scholars of Europe that new discoveries could be found outside of the authoritative works of Aristotle, Pliny, Galen, and other ancient writers.
</span></p><p data-dcnode-id="4472"><a class="mw-redirect" data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galen_of_Pergamon" title="Galen of Pergamon"><span data-dcnode-id="4507" instrument_node="">Galen of Pergamon</span></a><span data-dcnode-id="4505" instrument_node=""> (129 – c. 200 AD) had studied with four schools in antiquity — </span><a class="mw-redirect" data-dcnode-id="4503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Platonist" title="Platonist"><span data-dcnode-id="4504" instrument_node="">Platonists</span></a><span data-dcnode-id="4502" instrument_node="">, </span><a data-dcnode-id="4500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotelianism" title="Aristotelianism"><span data-dcnode-id="4501" instrument_node="">Aristotelians</span></a><span data-dcnode-id="4499" instrument_node="">, </span><a data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stoicism" title="Stoicism"><span data-dcnode-id="4498" instrument_node="">Stoics</span></a><span data-dcnode-id="4496" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epicurean" title="Epicurean"><span data-dcnode-id="4495" instrument_node="">Epicureans</span></a><span data-dcnode-id="4493" instrument_node="">, and at Alexandria, the center of medicine at the time. In his </span><i data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">Methodus Medendi</span></i><span data-dcnode-id="4490" instrument_node="">, Galen had synthesized the empirical and dogmatic schools of medicine into his own method, which was preserved by Arab scholars. After the translations from Arabic were critically scrutinized, a backlash occurred and demand arose in Europe for translations of Galen's medical text from the original Greek. Galen's method became very popular in Europe. </span><a data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Linacre" title="Thomas Linacre"><span data-dcnode-id="4489" instrument_node="">Thomas Linacre</span></a><span data-dcnode-id="4487" instrument_node="">, the teacher of Erasmus, thereupon translated </span><i data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">Methodus Medendi</span></i><span data-dcnode-id="4484" instrument_node=""> from Greek into Latin for a larger audience in 1519.</span><sup class="reference" data-dcnode-id="4481" id="cite_ref-52"><a data-dcnode-id="4482" href="#cite_note-52"><span data-dcnode-id="4483" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4480" instrument_node=""> Limbrick 1988 notes that 630 editions, translations, and commentaries on Galen were produced in Europe in the 16th century, eventually eclipsing Arabic medicine there, and peaking in 1560, at the time of the </span><a class="mw-redirect" data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_revolution" title="Scientific revolution"><span data-dcnode-id="4479" instrument_node="">scientific revolution</span></a><span data-dcnode-id="4477" instrument_node="">.</span><sup class="reference" data-dcnode-id="4474" id="cite_ref-53"><a data-dcnode-id="4475" href="#cite_note-53"><span data-dcnode-id="4476" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4473" instrument_node="">
</span></p><p data-dcnode-id="4440"><span data-dcnode-id="4471" instrument_node="">By the late 15th century, the physician-scholar </span><a data-dcnode-id="4469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Niccol%25C3%25B2_Leoniceno" title="Niccolò Leoniceno"><span data-dcnode-id="4470" instrument_node="">Niccolò Leoniceno</span></a><span data-dcnode-id="4468" instrument_node=""> was finding errors in </span><a data-dcnode-id="4466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pliny_the_Elder" title="Pliny the Elder"><span data-dcnode-id="4467" instrument_node="">Pliny</span></a><span data-dcnode-id="4465" instrument_node="">'s </span><i data-dcnode-id="4462"><a data-dcnode-id="4463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_History_%28Pliny%29" title="Natural History (Pliny)"><span data-dcnode-id="4464" instrument_node="">Natural History</span></a></i><span data-dcnode-id="4461" instrument_node="">. As a physician, Leoniceno was concerned about these botanical errors propagating to the </span><a data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Materia_medica" title="Materia medica"><span data-dcnode-id="4460" instrument_node="">materia medica</span></a><span data-dcnode-id="4458" instrument_node=""> on which medicines were based.</span><sup class="reference" data-dcnode-id="4455" id="cite_ref-54"><a data-dcnode-id="4456" href="#cite_note-54"><span data-dcnode-id="4457" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4454" instrument_node=""> To counter this, a botanical garden was established at </span><a data-dcnode-id="4452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orto_botanico_di_Padova" title="Orto botanico di Padova"><span data-dcnode-id="4453" instrument_node="">Orto botanico di Padova</span></a><span data-dcnode-id="4451" instrument_node="">, University of Padua (in use for teaching by 1546), in order that medical students might have empirical access to the plants of a pharmacopia. Other Renaissance teaching gardens were established, notably by the physician </span><a data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonhart_Fuchs" title="Leonhart Fuchs"><span data-dcnode-id="4450" instrument_node="">Leonhart Fuchs</span></a><span data-dcnode-id="4448" instrument_node="">, one of the founders of </span><a data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Botany" title="Botany"><span data-dcnode-id="4447" instrument_node="">botany</span></a><span data-dcnode-id="4445" instrument_node="">.</span><sup class="reference" data-dcnode-id="4442" id="cite_ref-55"><a data-dcnode-id="4443" href="#cite_note-55"><span data-dcnode-id="4444" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4441" instrument_node="">
</span></p><p data-dcnode-id="4427"><span data-dcnode-id="4439" instrument_node="">The first published work devoted to the concept of method is Jodocus Willichius, </span><i data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node="">De methodo omnium artium et disciplinarum informanda opusculum</span></i><span data-dcnode-id="4436" instrument_node=""> (1550).</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4429" style="white-space:nowrap;"><span data-dcnode-id="4435" instrument_node="">[</span><i data-dcnode-id="4431"><a data-dcnode-id="4432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4433" title="First? Aristotle, Grosseteste... (February 2014)"><span data-dcnode-id="4434" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4430" instrument_node="">]</span></sup><span data-dcnode-id="4428" instrument_node="">
</span></p><span data-dcnode-id="4426" instrument_node="">
</span><h3 data-dcnode-id="4416"><span class="mw-headline" data-dcnode-id="4424" id="Skepticism_as_a_basis_for_understanding"><span data-dcnode-id="4425" instrument_node="">Skepticism as a basis for understanding</span></span><span class="mw-editsection" data-dcnode-id="4417"><span class="mw-editsection-bracket" data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">[</span></span><a data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D13" title="Edit section: Skepticism as a basis for understanding"><span data-dcnode-id="4421" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4415" instrument_node="">
</span><p data-dcnode-id="4392"><span data-dcnode-id="4414" instrument_node="">In 1562 </span><i data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Outlines of Pyrrhonism</span></i><span data-dcnode-id="4411" instrument_node=""> by the ancient </span><a data-dcnode-id="4409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyrrhonism" title="Pyrrhonism"><span data-dcnode-id="4410" instrument_node="">Pyrrhonist</span></a><span data-dcnode-id="4408" instrument_node=""> philosopher </span><a data-dcnode-id="4406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sextus_Empiricus" title="Sextus Empiricus"><span data-dcnode-id="4407" instrument_node="">Sextus Empiricus</span></a><span data-dcnode-id="4405" instrument_node=""> (c. 160-210 AD) was published in a Latin translation (from Greek), quickly placing the </span><a data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philosophical_skepticism%23Skeptical_arguments" title="Philosophical skepticism"><span data-dcnode-id="4404" instrument_node="">arguments of classical skepticism</span></a><span data-dcnode-id="4402" instrument_node=""> in the European mainstream. These arguments establish seemingly insurmountable challenges for the possibility of </span><a data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Certainty" title="Certainty"><span data-dcnode-id="4401" instrument_node="">certain knowledge</span></a><span data-dcnode-id="4399" instrument_node="">. </span><a data-dcnode-id="4397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ren%25C3%25A9_Descartes" title="René Descartes"><span data-dcnode-id="4398" instrument_node="">Descartes</span></a><span data-dcnode-id="4396" instrument_node="">' famous "</span><a class="mw-redirect" data-dcnode-id="4394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cogito_ergo_sum" title="Cogito ergo sum"><span data-dcnode-id="4395" instrument_node="">Cogito</span></a><span data-dcnode-id="4393" instrument_node="">" argument is an attempt to overcome skepticism and reestablish a foundation for certainty but other thinkers responded by revising what the search for knowledge, particularly physical knowledge, might be.
</span></p><p data-dcnode-id="4354"><span data-dcnode-id="4391" instrument_node="">The first of these, philosopher and physician </span><a data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francisco_Sanches" title="Francisco Sanches"><span data-dcnode-id="4390" instrument_node="">Francisco Sanches</span></a><span data-dcnode-id="4388" instrument_node="">, was led by his medical training at Rome, 1571–73, to search for a true method of knowing (</span><i data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">modus sciendi</span></i><span data-dcnode-id="4385" instrument_node="">), as nothing clear can be known by the methods of Aristotle and his followers</span><sup class="reference" data-dcnode-id="4382" id="cite_ref-56"><a data-dcnode-id="4383" href="#cite_note-56"><span data-dcnode-id="4384" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4381" instrument_node=""> — for example, 1) syllogism fails upon circular reasoning; 2) Aristotle's </span><a data-dcnode-id="4379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modal_logic" title="Modal logic"><span data-dcnode-id="4380" instrument_node="">modal logic</span></a><span data-dcnode-id="4378" instrument_node=""> was not stated clearly enough for use in medieval times, and remains a research problem to this day.</span><sup class="reference" data-dcnode-id="4375" id="cite_ref-57"><a data-dcnode-id="4376" href="#cite_note-57"><span data-dcnode-id="4377" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4374" instrument_node=""> Following the physician Galen's </span><i data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">method of medicine</span></i><span data-dcnode-id="4371" instrument_node="">, Sanches lists the methods of judgement and experience, which are faulty in the wrong hands,</span><sup class="reference" data-dcnode-id="4368" id="cite_ref-58"><a data-dcnode-id="4369" href="#cite_note-58"><span data-dcnode-id="4370" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4367" instrument_node=""> and we are left with the bleak statement </span><i data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">That Nothing is Known</span></i><span data-dcnode-id="4364" instrument_node=""> (1581, in Latin </span><i data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">Quod Nihil Scitur</span></i><span data-dcnode-id="4361" instrument_node="">). This challenge was taken up by René Descartes in the next generation (1637), but at the least, Sanches warns us that we ought to refrain from the methods, summaries, and commentaries on Aristotle, if we seek scientific knowledge. In this, he is echoed by Francis Bacon who was influenced by another prominent exponent of skepticism, </span><a data-dcnode-id="4359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michel_de_Montaigne" title="Michel de Montaigne"><span data-dcnode-id="4360" instrument_node="">Montaigne</span></a><span data-dcnode-id="4358" instrument_node="">; Sanches cites the humanist </span><a data-dcnode-id="4356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Juan_Luis_Vives" title="Juan Luis Vives"><span data-dcnode-id="4357" instrument_node="">Juan Luis Vives</span></a><span data-dcnode-id="4355" instrument_node=""> who sought a better educational system, as well as a statement of human rights as a pathway for improvement of the lot of the poor.
</span></p><p data-dcnode-id="4346"><span data-dcnode-id="4353" instrument_node="">"Sanches develops his scepticism by means of an intellectual critique of Aristotelianism, rather than by an appeal to the history of human stupidity and the variety and contrariety of previous theories." —</span><a data-dcnode-id="4351" href="#CITEREFPopkin1979"><span data-dcnode-id="4352" instrument_node="">Popkin 1979</span></a><span data-dcnode-id="4350" instrument_node="">, p.&nbsp;37, as cited by </span><a data-dcnode-id="4348" href="#CITEREFSanchesLimbrickThomson1988"><span data-dcnode-id="4349" instrument_node="">Sanches, Limbrick &amp; Thomson 1988</span></a><span data-dcnode-id="4347" instrument_node="">, pp.&nbsp;24–5
</span></p><span data-dcnode-id="4345" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="4310"><p data-dcnode-id="4324"><span data-dcnode-id="4342" instrument_node="">"To work, then; and if you know something, then teach me; I shall be extremely grateful to you. In the meantime, as I prepare to examine </span><i data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">Things</span></i><span data-dcnode-id="4339" instrument_node="">, I shall raise the question anything is </span><i data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">known</span></i><span data-dcnode-id="4336" instrument_node="">, and if so, how, in the introductory passages of another book,</span><sup class="reference" data-dcnode-id="4333" id="cite_ref-59"><a data-dcnode-id="4334" href="#cite_note-59"><span data-dcnode-id="4335" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4332" instrument_node=""> a book in which I will expound, as far as human frailty allows,</span><sup class="reference" data-dcnode-id="4329" id="cite_ref-modoSciendi_60-0"><a data-dcnode-id="4330" href="#cite_note-modoSciendi-60"><span data-dcnode-id="4331" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4328" instrument_node=""> the </span><i data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">method of knowing</span></i><span data-dcnode-id="4325" instrument_node="">. Farewell.
</span></p><p data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">WHAT IS TAUGHT HAS NO MORE STRENGTH THAN IT DERIVES FROM HIM WHO IS TAUGHT.
</span></p><p data-dcnode-id="4311"><span data-dcnode-id="4321" instrument_node="">
WHAT?" —</span><a data-dcnode-id="4319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francisco_Sanches" title="Francisco Sanches"><span data-dcnode-id="4320" instrument_node="">Francisco Sanches</span></a><span data-dcnode-id="4318" instrument_node=""> (1581) </span><i data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">Quod Nihil Scitur</span></i><span data-dcnode-id="4315" instrument_node=""> p. 100</span><sup class="reference" data-dcnode-id="4312" id="cite_ref-61"><a data-dcnode-id="4313" href="#cite_note-61"><span data-dcnode-id="4314" instrument_node="">[61]</span></a></sup></p></blockquote><span data-dcnode-id="4309" instrument_node="">
</span><h3 data-dcnode-id="4298"><span data-dcnode-id="4308" id="Francis_Bacon.27s_eliminative_induction"></span><span class="mw-headline" data-dcnode-id="4306" id="Francis_Bacon's_eliminative_induction"><span data-dcnode-id="4307" instrument_node="">Francis Bacon's eliminative induction</span></span><span class="mw-editsection" data-dcnode-id="4299"><span class="mw-editsection-bracket" data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">[</span></span><a data-dcnode-id="4302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D14" title="Edit section: Francis Bacon's eliminative induction"><span data-dcnode-id="4303" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4297" instrument_node="">
</span><link data-dcnode-id="4296" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4292" role="note"><span data-dcnode-id="4295" instrument_node="">Main article: </span><a data-dcnode-id="4293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baconian_method" title="Baconian method"><span data-dcnode-id="4294" instrument_node="">Baconian method</span></a></div><span data-dcnode-id="4291" instrument_node="">
</span><link data-dcnode-id="4290" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4280"><p data-dcnode-id="4281"><span data-dcnode-id="4289" instrument_node="">"If a man will begin with certainties, he shall end in doubts; but if he will be content to begin with doubts, he shall end in certainties."&nbsp;—</span><a data-dcnode-id="4287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francis_Bacon" title="Francis Bacon"><span data-dcnode-id="4288" instrument_node="">Francis Bacon</span></a><span data-dcnode-id="4286" instrument_node=""> (1605) </span><i data-dcnode-id="4283"><a data-dcnode-id="4284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Advancement_of_Learning" title="The Advancement of Learning"><span data-dcnode-id="4285" instrument_node="">The Advancement of Learning</span></a></i><span data-dcnode-id="4282" instrument_node="">, Book 1, v, 8</span></p></blockquote><span data-dcnode-id="4279" instrument_node="">
</span><p data-dcnode-id="4268"><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francis_Bacon" title="Francis Bacon"><span data-dcnode-id="4278" instrument_node="">Francis Bacon</span></a><span data-dcnode-id="4276" instrument_node=""> (1561–1626) entered </span><a data-dcnode-id="4274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trinity_College%2C_Cambridge" title="Trinity College, Cambridge"><span data-dcnode-id="4275" instrument_node="">Trinity College, Cambridge</span></a><span data-dcnode-id="4273" instrument_node=""> in April 1573, where he applied himself diligently to the several sciences as then taught, and came to the conclusion that the methods employed and the results attained were alike erroneous; he learned to despise the current Aristotelian philosophy. He believed philosophy must be taught its true purpose, and for this purpose a new method must be devised. With this conception in his mind, Bacon left the university.</span><sup class="reference" data-dcnode-id="4270" id="cite_ref-EBbacon_48-1"><a data-dcnode-id="4271" href="#cite_note-EBbacon-48"><span data-dcnode-id="4272" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4269" instrument_node="">
</span></p><p data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">Bacon attempted to describe a rational procedure for establishing causation between phenomena based on induction. Bacon's induction was, however, radically different than that employed by the Aristotelians. As Bacon put it,
</span></p><span data-dcnode-id="4265" instrument_node="">
</span><blockquote data-dcnode-id="4258"><p data-dcnode-id="4259"><span data-dcnode-id="4264" instrument_node="">[A]nother form of induction must be devised than has hitherto been employed, and it must be used for proving and discovering not first principles (as they are called) only, but also the lesser axioms, and the middle, and indeed all. For the induction which proceeds by simple enumeration is childish.  —</span><i data-dcnode-id="4261"><a data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novum_Organum" title="Novum Organum"><span data-dcnode-id="4263" instrument_node="">Novum Organum</span></a></i><span data-dcnode-id="4260" instrument_node=""> section CV</span></p></blockquote><span data-dcnode-id="4257" instrument_node="">
</span><p data-dcnode-id="4236"><a data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baconian_method" title="Baconian method"><span data-dcnode-id="4256" instrument_node="">Bacon's method</span></a><span data-dcnode-id="4254" instrument_node=""> relied on experimental </span><i data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">histories</span></i><span data-dcnode-id="4251" instrument_node=""> to eliminate alternative theories.</span><sup class="reference" data-dcnode-id="4248" id="cite_ref-62"><a data-dcnode-id="4249" href="#cite_note-62"><span data-dcnode-id="4250" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4247" instrument_node=""> Bacon explains how his method is applied in his </span><i data-dcnode-id="4244"><a data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novum_Organum" title="Novum Organum"><span data-dcnode-id="4246" instrument_node="">Novum Organum</span></a></i><span data-dcnode-id="4243" instrument_node=""> (published 1620). In an example he gives on the examination of the nature of heat, Bacon creates two tables, the first of which he names "Table of Essence and Presence", enumerating the many various circumstances under which we find heat. In the other table, labelled "Table of Deviation, or of Absence in Proximity", he lists circumstances which bear resemblance to those of the first table except for the absence of heat. From an analysis of what he calls the </span><i data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">natures</span></i><span data-dcnode-id="4240" instrument_node=""> (light emitting, heavy, colored, etc.) of the items in these lists we are brought to conclusions about the </span><i data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">form nature</span></i><span data-dcnode-id="4237" instrument_node="">, or cause, of heat. Those natures which are always present in the first table, but never in the second are deemed to be the cause of heat.
</span></p><p data-dcnode-id="4228"><span data-dcnode-id="4235" instrument_node="">The role experimentation played in this process was twofold. The most laborious job of the scientist would be to gather the facts, or 'histories', required to create the tables of presence and absence. Such histories would document a mixture of common knowledge and experimental results. Secondly, </span><i data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">experiments of light</span></i><span data-dcnode-id="4232" instrument_node="">, or, as we might say, </span><a class="mw-redirect" data-dcnode-id="4230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crucial_experiment" title="Crucial experiment"><span data-dcnode-id="4231" instrument_node="">crucial experiments</span></a><span data-dcnode-id="4229" instrument_node=""> would be needed to resolve any remaining ambiguities over causes.
</span></p><p data-dcnode-id="4202"><span data-dcnode-id="4227" instrument_node="">Bacon showed an uncompromising commitment to </span><a data-dcnode-id="4225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experiment" title="Experiment"><span data-dcnode-id="4226" instrument_node="">experimentation</span></a><span data-dcnode-id="4224" instrument_node="">. Despite this, he did not make any great scientific discoveries during his lifetime. This may be because he was not the most able experimenter.</span><sup class="reference" data-dcnode-id="4221" id="cite_ref-63"><a data-dcnode-id="4222" href="#cite_note-63"><span data-dcnode-id="4223" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4220" instrument_node=""> It may also be because </span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothesis" title="Hypothesis"><span data-dcnode-id="4219" instrument_node="">hypothesising</span></a><span data-dcnode-id="4217" instrument_node=""> plays only a small role in Bacon's method compared to modern science.</span><sup class="reference" data-dcnode-id="4214" id="cite_ref-64"><a data-dcnode-id="4215" href="#cite_note-64"><span data-dcnode-id="4216" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4213" instrument_node=""> Hypotheses, in Bacon's method, are supposed to emerge during the process of investigation, with the help of mathematics and logic.  Bacon gave a substantial but secondary role to mathematics  </span><i data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">"which ought only to give definiteness to natural philosophy, not to generate or give it birth"</span></i><span data-dcnode-id="4210" instrument_node=""> (</span><i data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">Novum Organum XCVI</span></i><span data-dcnode-id="4207" instrument_node="">). An over-emphasis on axiomatic reasoning had rendered previous non-empirical philosophy impotent, in Bacon's view, which was expressed in his </span><i data-dcnode-id="4204"><a data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novum_Organum" title="Novum Organum"><span data-dcnode-id="4206" instrument_node="">Novum Organum</span></a></i><span data-dcnode-id="4203" instrument_node="">:
</span></p><span data-dcnode-id="4201" instrument_node="">
</span><blockquote data-dcnode-id="4196"><span data-dcnode-id="4200" instrument_node="">
</span><p data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">XIX. There are and can be only two ways of searching into and discovering truth. The one flies from the senses and particulars to the most general axioms, and from these principles, the truth of which it takes for settled and immoveable, proceeds to judgment and to the discovery of middle axioms. And this way is now in fashion. The other derives axioms from the senses and particulars, rising by a gradual and unbroken ascent, so that it arrives at the most general axioms last of all. This is the true way, but as yet untried.
</span></p><span data-dcnode-id="4197" instrument_node="">
</span></blockquote><span data-dcnode-id="4195" instrument_node="">
</span><p data-dcnode-id="4185"><span data-dcnode-id="4194" instrument_node="">In Bacon's </span><a data-dcnode-id="4192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utopia" title="Utopia"><span data-dcnode-id="4193" instrument_node="">utopian novel</span></a><span data-dcnode-id="4191" instrument_node="">, </span><i data-dcnode-id="4187"><span data-dcnode-id="4190" instrument_node="">The </span><a data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Atlantis" title="New Atlantis"><span data-dcnode-id="4189" instrument_node="">New Atlantis</span></a></i><span data-dcnode-id="4186" instrument_node="">, the ultimate role is given for inductive reasoning:
</span></p><span data-dcnode-id="4184" instrument_node="">
</span><blockquote data-dcnode-id="4179"><span data-dcnode-id="4183" instrument_node="">
</span><p data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">Lastly, we have three that raise the former discoveries by experiments into greater observations, axioms, and aphorisms. These we call interpreters of nature.
</span></p><span data-dcnode-id="4180" instrument_node="">
</span></blockquote><span data-dcnode-id="4178" instrument_node="">
</span><h3 data-dcnode-id="4168"><span class="mw-headline" data-dcnode-id="4176" id="Descartes"><span data-dcnode-id="4177" instrument_node="">Descartes</span></span><span class="mw-editsection" data-dcnode-id="4169"><span class="mw-editsection-bracket" data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">[</span></span><a data-dcnode-id="4172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_scientific_method%26action%3Dedit%26section%3D15" title="Edit section: Descartes"><span data-dcnode-id="4173" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4167" instrument_node="">
</span><link data-dcnode-id="4166" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4162" role="note"><span data-dcnode-id="4165" instrument_node="">Main article: </span><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cartesianism" title="Cartesianism"><span data-dcnode-id="4164" instrument_node="">Cartesianism</span></a></div><span data-dcnode-id="4161" instrument_node="">
</span><p data-dcnode-id="4148"><span data-dcnode-id="4160" instrument_node="">In 1619, </span><a data-dcnode-id="4158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ren%25C3%25A9_Descartes" title="René Descartes"><span data-dcnode-id="4159" instrument_node="">René Descartes</span></a><span data-dcnode-id="4157" instrument_node=""> began writing his first major treatise on proper scientific and philosophical thinking, the unfinished </span><i data-dcnode-id="4154"><a data-dcnode-id="4155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rules_for_the_Direction_of_the_Mind" title="Rules for the Direction of the Mind"><span data-dcnode-id="4156" instrument_node="">Rules for the Direction of the Mind</span></a></i><span data-dcnode-id="4153" instrument_node="">.  His aim was to create a complete science that he hoped would overthrow the Aristotelian system and establish himself as the sole architect</span><sup class="reference" data-dcnode-id="4150" id="cite_ref-65"><a data-dcnode-id="4151" href="#cite_note-65"><span data-dcnode-id="4152" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4149" instrument_node=""> of a new system of guiding principles for scientific research.
</span></p><p data-dcnode-id="4134"><span data-dcnode-id="4147" instrument_node="">This work was continued and clarified in his 1637 treatise, </span><i data-dcnode-id="4144"><a class="mw-redirect" data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Discourse_on_Method" title="Discourse on Method"><span data-dcnode-id="4146" instrument_node="">Discourse on Method</span></a></i><span data-dcnode-id="4143" instrument_node="">, and in his 1641 </span><i data-dcnode-id="4140"><a data-dcnode-id="4141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meditations_on_First_Philosophy" title="Meditations on First Philosophy"><span data-dcnode-id="4142" instrument_node="">Meditations</span></a></i><span data-dcnode-id="4139" instrument_node="">. Descartes describes the intriguing and disciplined thought experiments he used to arrive at the idea we instantly associate with him: </span><i data-dcnode-id="4136"><a class="mw-redirect" data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cogito_ergo_sum" title="Cogito ergo sum"><span data-dcnode-id="4138" instrument_node="">I think therefore I am</span></a></i><span data-dcnode-id="4135" instrument_node="">.
</span></p><p data-dcnode-id="4128"><span data-dcnode-id="4133" instrument_node="">From this foundational thought, Descartes finds proof of the existence of a God who, possessing all possible perfections, will not deceive him provided he resolves "[...] never to accept anything for true which I did not clearly know to be such; that is to say, carefully to avoid precipitancy and prejudice, and to comprise nothing more in my judgment than what was presented to my mind so clearly and distinctly as to exclude all ground of methodic doubt."</span><sup class="reference" data-dcnode-id="4130" id="cite_ref-66"><a data-dcnode-id="4131" href="#cite_note-66"><span data-dcnode-id="4132" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4129" instrument_node="">
</span></p><p data-dcnode-id="4116"><span data-dcnode-id="4127" instrument_node="">This rule allowed Descartes to progress beyond his own thoughts and judge that there exist extended bodies outside of his own thoughts. Descartes published seven sets of objections to the </span><i data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">Meditations</span></i><span data-dcnode-id="4124" instrument_node=""> from various sources</span><sup class="reference" data-dcnode-id="4121" id="cite_ref-67"><a data-dcnode-id="4122" href="#cite_note-67"><span data-dcnode-id="4123" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4120" instrument_node=""> along with his replies to them. Despite his apparent departure from the Aristotelian system, a number of his critics felt that Descartes had done little more than replace the primary premises of Aristotle with those of his own. Descartes says as much himself in a letter written in 1647 to the translator of </span><a data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Principles_of_Philosophy" title="Principles of Philosophy"><span data-dcnode-id="4119" instrument_node="">Principles of Philosophy</span></a><span data-dcnode-id="4117" instrument_node="">,
</span></p><span data-dcnode-id="4115" instrument_node="">
