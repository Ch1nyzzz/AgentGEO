</span><meta content="In 1844 Karl Karlovitch Klaus, then an unknown professor at the University of Kazan, reported his discovery of a new platinum metal which he named ruthenium, afer Ruthenia, the latinised name for Russia. Besides studying the characteristics of ruthenium, Klaus conducted a wide ranging investigation of rhodium, iridium, osmium, and to a lesser extent, palladium and platinum. Thus, he may be regarded as the creator of the chemistry of the platinum metals, and the one who introduced the concept of the structure of the “double salts and bases” of platinum, which was developed some forty years later by Alfred Werner in his co-ordination theory Klaus also discovered the similarities and differences between elements in the triads: ruthenium-rhodium-palladium and osmium-iridium-platinum, so providing the justification for Dmitri Ivanovich Mendeleev to include all six platinum metals in Group VIII of the Periodic System. Klaus’s work thus marked an epoch in the investigation of the platinum metals, especially of ruthenium – the last one to be discovered." data-dcnode-id="1631" name="description"><span data-dcnode-id="1630" instrument_node="">

</span><input class="checkbox" data-dcnode-id="1212" name="tc_question" type="checkbox" value="Yes"><span class="checktext" data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">I accept the</span><br data-dcnode-id="1210"><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/terms-and-conditions/"><span data-dcnode-id="1209" instrument_node="">terms &amp; conditions</span></a></span><input data-dcnode-id="1206" id="submitemail" title="Search" type="submit" value="SIGN UP"></form></div><a class="sidebar-hotlink read-offline" data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/offline"><span data-dcnode-id="1203" instrument_node="">Read the Journal Offline</span></a></div></div></div><main data-dcnode-id="206"><ul class="print-offline-etc" data-dcnode-id="1195"><li class="first" data-dcnode-id="1196"><a class="read-offline" data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/offline"><span data-dcnode-id="1198" instrument_node="">Read the Journal Offline</span></a></li></ul><p class="nopadbot" data-dcnode-id="1188"><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Platinum Metals Rev.</span></em><span data-dcnode-id="1192" instrument_node="">,&nbsp;1996,&nbsp;</span><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">40</span></strong><span data-dcnode-id="1189" instrument_node="">,&nbsp;(4),&nbsp;181</span></p><h2 class="article-title extratop2" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">The Discovery of Ruthenium</span></h2><h3 class="sub-title" data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">“I Named The New Body, in Honour of my Motherland”</span></h3><div class="contributors" data-dcnode-id="1173"><ul class="contrib" data-dcnode-id="1174"><span data-dcnode-id="1183" instrument_node=""> </span><li class="person" data-dcnode-id="1180"><a data-dcnode-id="1182" name="idm139798497477344"></a><span data-dcnode-id="1181" instrument_node="">By V. N. Pitchkov</span></li><span data-dcnode-id="1179" instrument_node=""> </span><li class="aff nolabel" data-dcnode-id="1176"><a data-dcnode-id="1178" name="au1"></a><span data-dcnode-id="1177" instrument_node="">Moscow Academy of Fine Chemical Technology, Russia</span></li><span data-dcnode-id="1175" instrument_node=""> </span></ul></div><div class="sociable" data-dcnode-id="1157"><span class="sociable-tagline" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">SHARE THIS PAGE:</span></span><ul data-dcnode-id="1158"><li data-dcnode-id="1169"><a class="addthis_button_facebook" data-dcnode-id="1170"></a></li><li data-dcnode-id="1167"><a class="addthis_button_linkedin" data-dcnode-id="1168"></a></li><li data-dcnode-id="1165"><a class="addthis_button_digg" data-dcnode-id="1166"></a></li><li data-dcnode-id="1163"><a class="addthis_button_reddit" data-dcnode-id="1164"></a></li><li data-dcnode-id="1161"><a class="addthis_button_stumbleupon" data-dcnode-id="1162"></a></li><li data-dcnode-id="1159"><a class="addthis_button_twitter" data-dcnode-id="1160"></a></li></ul></div><h3 data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Article Synopsis</span></h3><div class="synopsis" data-dcnode-id="1144"><div class="at-above-post addthis_tool" data-dcnode-id="1154" data-url="https://www.technology.matthey.com/article/40/4/181-188/"></div><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">In 1844 Karl Karlovitch Klaus, then an unknown professor at the University of Kazan, reported his discovery of a new platinum metal which he named ruthenium, afer Ruthenia, the latinised name for Russia. Besides studying the characteristics of ruthenium, Klaus conducted a wide ranging investigation of rhodium, iridium, osmium, and to a lesser extent, palladium and platinum. Thus, he may be regarded as the creator of the chemistry of the platinum metals, and the one who introduced the concept of the structure of the “double salts and bases” of platinum, which was developed some forty years later by Alfred Werner in his co-ordination theory Klaus also discovered the similarities and differences between elements in the triads: ruthenium-rhodium-palladium and osmium-iridium-platinum, so providing the justification for Dmitri Ivanovich Mendeleev to include all six platinum metals in Group VIII of the Periodic System. Klaus’s work thus marked an epoch in the investigation of the platinum metals, especially of ruthenium – the last one to be discovered.</span></p><div class="at-below-post addthis_tool" data-dcnode-id="1146" data-url="https://www.technology.matthey.com/article/40/4/181-188/"></div></div><div data-dcnode-id="722" id="article_content"><span data-dcnode-id="1143" instrument_node=""> </span><p data-dcnode-id="1135"><span data-dcnode-id="1142" instrument_node="">Karl Karlovitch Klaus was born on January 1 Ith, 1796 at Dorpat in what was then Russia (now knownas Tartu, in Estonia). When he was four years old his father died, and the following year his mother,after a second marriage to another artist, also died, and “I found myself in the house of my hated stepfather” (</span><a data-dcnode-id="1140" href="#b1"><span data-dcnode-id="1141" instrument_node="">1</span></a><span data-dcnode-id="1139" instrument_node="">, </span><a data-dcnode-id="1137" href="#b2"><span data-dcnode-id="1138" instrument_node="">2</span></a><span data-dcnode-id="1136" instrument_node="">). He grew up a curious and industrious boy with an aptitude for painting. After primary school he entered the gymnasium, but the lack of financial support soon obliged him to leave. After working as an assistant to a baker, Klaus left for St. Petersburg in 1811 where he became the pupil of a pharmacist. From that day onwards he was independent, with his future in his own hands.</span></p><span data-dcnode-id="1134" instrument_node=""> </span><p data-dcnode-id="1129"><span data-dcnode-id="1133" instrument_node="">Careful observation and diligence enabled him to become proficient in the work required from a laboratory assistant: analysis, chemistry and pharmacy. In 1815 Klaus passed the examination for pharmacist's assistant, first class, at the famous Medical Surgical Academy. He then tried to study at the University of Dorpat, but left because he did not want to be dependant upon his relatives. In 1817, having returned to the capital, he passed further examinations at the Academy and became "“the youngest qualified pharmacist in Russia"” (</span><a data-dcnode-id="1131" href="#b3"><span data-dcnode-id="1132" instrument_node="">3</span></a><span data-dcnode-id="1130" instrument_node="">). In the same year Klaus became a pharmaceutical chemist in the remote city of Saratov on the lower reaches of the river Volga. Here he worked hard in order to be able to start his own business.</span></p><span data-dcnode-id="1128" instrument_node=""> </span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">In 1821 he married Ernestina Bate in Dorpat and they moved to Kazan, where he established his own pharmacy. His knowledge, integrity and the wide choice of drugs and herbs he supplied ensured that his pharmacy gained a high repu-tation. Thus Klaus entered the scientific and cultural circles of the city, and life became easier.</span></p><span data-dcnode-id="1125" instrument_node=""> </span><p data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">In 1827 Klaus took part in an expedition, led by E. A. Eversman, to study the flora of the steppesaround the Volga. The following year Klaus, together with A. Y. Kupfer, organised a research expedition to the Ural, an area known for three centuries as “Russia’s iron spine”, including cities such as Zlatoust, Miass, Ekaterinburg, Nevyansk, Nizhnii Tagil and Perm. Klaus visited factories, mines, and gold and platinum placer deposits. The report of this expedition, including some excellent illustrations by Klaus, were later published in Paris (</span><a data-dcnode-id="1122" href="#b4"><span data-dcnode-id="1123" instrument_node="">4</span></a><span data-dcnode-id="1121" instrument_node="">). From then on Klaus took a serious interest in the study of the platinum metals.</span></p><span data-dcnode-id="1119" instrument_node=""> </span><div class="fig panel" data-dcnode-id="1105"><p data-dcnode-id="1117"><a data-dcnode-id="1118" name="idm139798497354608"></a></p><span data-dcnode-id="1116" instrument_node=""> </span><div class="caption" data-dcnode-id="1111"><span data-dcnode-id="1115" instrument_node=""> </span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">K. K. Klaus 1796–1864 Besides his discovery of ruthenium, the sixth platinum group element, Klaus also carried out significant research on rhodium, iridium and osmium. The photograph was taken at the end of the 1850s</span></p><span data-dcnode-id="1112" instrument_node=""> </span></div><span data-dcnode-id="1110" instrument_node=""> </span><p data-dcnode-id="1107"><a class="thickbox" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/pmr0040-0181-f1.gif"><img alt="K. K. Klaus 1796–1864 Besides his discovery of ruthenium, the sixth platinum group element, Klaus also carried out significant research on rhodium, iridium and osmium. The photograph was taken at the end of the 1850s" data-dcnode-id="1109" height="266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/th-pmr0040-0181-f1.gif&amp;raw" width="200"></a></p><span data-dcnode-id="1106" instrument_node=""> </span></div><span data-dcnode-id="1104" instrument_node=""> </span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">After the expedition Klaus was at first undecided about his future, but, ignoring all advice, he concluded that:</span></p><span data-dcnode-id="1101" instrument_node=""> </span><div class="blockquote" data-dcnode-id="1092"><a data-dcnode-id="1100" name="idm139798497351648"></a><span data-dcnode-id="1099" instrument_node=""> </span><p data-dcnode-id="1094"><span data-dcnode-id="1098" instrument_node="">“I could become very rich, but my striving for scientific education induced me to give up my excellent financial position and take a place as a laboratory assistant at the University in Dorpat” (</span><a data-dcnode-id="1096" href="#b5"><span data-dcnode-id="1097" instrument_node="">5</span></a><span data-dcnode-id="1095" instrument_node="">).</span></p><span data-dcnode-id="1093" instrument_node=""> </span></div><span data-dcnode-id="1091" instrument_node=""> </span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Thus in 1831, Klaus, then aged thirty-five, sold his drug-store for half the price he thought it was worth and moved his family to Dorpat, determined to study the university course independently, without attending the gymnasium. As twenty years earlier, his persistence and unprecedented devotion to his studies enabled him to achieve his objectives.</span></p><span data-dcnode-id="1088" instrument_node=""> </span><p data-dcnode-id="1083"><span data-dcnode-id="1087" instrument_node="">In 1835 he was a Candidate of the philosophical sciences, and in 1836 he passed another examination which included questions about “the analysis of platinum ore, with a critical interpretationof theavailable methods” and “the philosophical faculty did not hesitate to confer uponhim the degree of Master” (“I could become very rich, but my striving for scientific education induced me to giveup my excellent financial position and take a place as a laboratory assistant at the University in Dorpat” (</span><a data-dcnode-id="1085" href="#b6"><span data-dcnode-id="1086" instrument_node="">6</span></a><span data-dcnode-id="1084" instrument_node="">).</span></p><span data-dcnode-id="1082" instrument_node=""> </span><h2 class="main-title" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Professor of Chemistry</span></h2><div class="section" data-dcnode-id="1067"><a data-dcnode-id="1079" name="idm139798497346864"></a><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node=""> </span><p data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node="">The following year Klaus defended his thesis “The Bases of Analytic Phytochemistry” and on the 1st August he took up an appointment in the pharmacy department at the University of Kazan. Once there, however, he was entrusted with the management of the chemical laboratory, lecturing seven or eight times a week and conducting experiments in inorganic chemistry and the chemistry of plants and animals. In December 1839 Klaus was appointed Extraordinary Professor but it was only in 1843 that he became an Ordinary Professor. It is interesting to note that in 1838 the Academy of Sciences awarded K. H. Gebel and Klaus the most prestigious Russian prize for the natural sciences - the Demidov Prize - for their investigations of the flora of the steppes during their 1834 expedition. The award to Klaus was not confirmed (“I could become very rich, but my striving for scientific education induced me to give up my excellent financial position and take a place as a laboratory assistant at the University in Dorpat” (</span><a data-dcnode-id="1074" href="#b7"><span data-dcnode-id="1075" instrument_node="">7</span></a><span data-dcnode-id="1073" instrument_node="">).) and only in 1846 did he receive a Demidov prize, for his ruthenium work.</span></p><span data-dcnode-id="1071" instrument_node=""> </span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">In the summer of 1840 Klaus travelled to St. Petersburg to obtain equipment. While there he met former colleagues, visited a number of laboratories and the Mint, where two tons of platinum were processed into coins every year.</span></p><span data-dcnode-id="1068" instrument_node=""> </span></div><span data-dcnode-id="1066" instrument_node=""> </span><h2 class="main-title" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Ural Placer Deposits</span></h2><div class="section" data-dcnode-id="913"><a data-dcnode-id="1063" name="idm139798497342576"></a><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node=""> </span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Platinum was recovered from the Ural placer deposits just one year after Emperor Alexander I had issued his edict of 1823, which instructed all mine managers to search for platinum and deliver it to St. Petersburg. A satisfactory process for the large scale refining and agglomeration of platinum, and the technique of manufacturing coins, had been developed in 1826 by the engineer Peter Grigorievitch Sobolevsky (1782–1841). After the platinum had been extracted, however, the insoluble residues, containing the other platinoids, were accumulated without being used.</span></p><span data-dcnode-id="1058" instrument_node=""> </span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Emperor Nicholas I took an interest in applications for platinum, visiting Sobolevsky’s laboratory on12th February 1828. While there he selected patterns for the proposed platinum coins whichwere introduced into the currency shortly afterwards. At that time platinum was of much interest in Russia and personal contacts between Klaus and Sobolevsky would have facilitated discussions of the many scientific and technical problems associated with platinum, rhodium, iridium and osmium. Such talksprobably influenced the decision of Klaus to involve himself in further work with these metals.</span></p><span data-dcnode-id="1055" instrument_node=""> </span><div class="fig panel" data-dcnode-id="1041"><p data-dcnode-id="1053"><a data-dcnode-id="1054" name="idm139798497339680"></a></p><span data-dcnode-id="1052" instrument_node=""> </span><div class="caption" data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node=""> </span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The city of Kazan, a drawing by K. K. Klaus, in 1828. The white university building is on the hillock on the right</span></p><span data-dcnode-id="1048" instrument_node=""> </span></div><span data-dcnode-id="1046" instrument_node=""> </span><p data-dcnode-id="1043"><a class="thickbox" data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/pmr0040-0181-f2.gif"><img alt="The city of Kazan, a drawing by K. K. Klaus, in 1828. The white university building is on the hillock on the right" data-dcnode-id="1045" height="123" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/th-pmr0040-0181-f2.gif&amp;raw" width="200"></a></p><span data-dcnode-id="1042" instrument_node=""> </span></div><span data-dcnode-id="1040" instrument_node=""> </span><p data-dcnode-id="1032"><span data-dcnode-id="1039" instrument_node="">Evidently Klaus, perhaps with the help of Sobolevsky, met Count Egor Frantsevitch Kankrin (1775-1845) the Minister of Finance and obtained support for his research work. It is doubtful (</span><a data-dcnode-id="1037" href="#b9"><span data-dcnode-id="1038" instrument_node="">9</span></a><span data-dcnode-id="1036" instrument_node="">–</span><a data-dcnode-id="1034" href="#b11"><span data-dcnode-id="1035" instrument_node="">11</span></a><span data-dcnode-id="1033" instrument_node="">), that Klaus decided fromthe start “to settle differences” between G. W. Osann and Berzelius concerning the presence or absence of new metals in platinum ore. Osann believed he had discovered three new metals in the ore, but Berzelius did not confirm these results and eventually Osann withdrew his claim. Klaus also identified some very reasonable problems:</span></p><span data-dcnode-id="1031" instrument_node=""> </span><div class="blockquote" data-dcnode-id="1022"><a data-dcnode-id="1030" name="idm139798497334224"></a><span data-dcnode-id="1029" instrument_node=""> </span><p data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">“Desiring to study the platinum group metals closely and to prepare their main compounds for the chemical cabinet of the Kazan University, I got two pounds of residue from Sobolevsky and started the work in 1841” (</span><a data-dcnode-id="1026" href="#b12"><span data-dcnode-id="1027" instrument_node="">12</span></a><span data-dcnode-id="1025" instrument_node="">).</span></p><span data-dcnode-id="1023" instrument_node=""> </span></div><span data-dcnode-id="1021" instrument_node=""> </span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Later, he was to record that:</span></p><span data-dcnode-id="1018" instrument_node=""> </span><div class="blockquote" data-dcnode-id="1009"><a data-dcnode-id="1017" name="idm139798497331952"></a><span data-dcnode-id="1016" instrument_node=""> </span><p data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">“my aim was not to discover … new bodies, but to prepare the compounds. By the way, I accidentally found out the presence of a new body, but I could not separate it at first” (</span><a data-dcnode-id="1013" href="#b13"><span data-dcnode-id="1014" instrument_node="">13</span></a><span data-dcnode-id="1012" instrument_node="">).</span></p><span data-dcnode-id="1010" instrument_node=""> </span></div><span data-dcnode-id="1008" instrument_node=""> </span><p data-dcnode-id="1000"><span data-dcnode-id="1007" instrument_node="">At this time Klaus was forty-six, an age when the creative work curve of many scientists may have reached a plateau, but he was only at the threshold of his creativity. Indeed, on account of his activity, a former student regarded him as quite a young man (</span><a data-dcnode-id="1005" href="#b14"><span data-dcnode-id="1006" instrument_node="">14</span></a><span data-dcnode-id="1004" instrument_node="">).Hedevoted himself totally to his labours but suffered greatly from the “endless work in the dense andharmful atmosphere” caused by osmium tetroxide fumes. Despite this he continued his important platiniferous work; and for “two full years I toiled at it from morning till late night, lived only in my laboratory, where I had my dinner and drank tea”. The residue he had obtained from Sobolevsky contained “in addition to 10% of platinum, quite a lot of iridium, osmium, some palladium and … a new body” (</span><a data-dcnode-id="1002" href="#b15"><span data-dcnode-id="1003" instrument_node="">15</span></a><span data-dcnode-id="1001" instrument_node="">).</span></p><span data-dcnode-id="999" instrument_node=""> </span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">At that stage, however, he did not know the characteristics of the latter. Understanding the greatimportance of his experimental investigations, Klaus journeyed to the capital in July, 1842, where hereported the results of his experiments to Kankrin, and offered to extract the platinum from the residue by the method he had devised. The Minister supported Klaus who was given 8 kg of residue, 100 g of native platinum and the sum of 300 roubles on condition that he would report the results of his work, and return the extracted metals, a year later, see the Scheme. As will be described later, however, it was to be thirteen years before Klaus was able to fulfil these conditions.</span></p><span data-dcnode-id="996" instrument_node=""> </span><p data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">Greatly encouraged, Klaus returned home in August, but a major fire in the city affected his laboratory so badly that he was unable to restart his work until the following Spring. Another great disappointment occurred when he found much less platinum in the new residue than in the material separatedpreviously. Klaus was to write: “the investigation only remained interesting from a scientificpoint of view” (</span><a data-dcnode-id="993" href="#b15"><span data-dcnode-id="994" instrument_node="">15</span></a><span data-dcnode-id="992" instrument_node="">). As before, he worked alone on the new material treating the samples with reagents and systematically studied the resultant sediments, filtrates and residues; he then repeated his investigations and compared the various batches.</span></p><span data-dcnode-id="990" instrument_node=""> </span><div class="fig panel" data-dcnode-id="976"><p data-dcnode-id="988"><a data-dcnode-id="989" name="idm139798497323328"></a></p><span data-dcnode-id="987" instrument_node=""> </span><div class="caption" data-dcnode-id="982"><span data-dcnode-id="986" instrument_node=""> </span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">The scheme of extracting ruthenium from the “poor residuum”,according to which Klausextracted6 g of metallic ruthenium;*is the chemical form of ruthenium, as known today</span></p><span data-dcnode-id="983" instrument_node=""> </span></div><span data-dcnode-id="981" instrument_node=""> </span><p data-dcnode-id="978"><a class="thickbox" data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/pmr0040-0181-f3.gif"><img alt="The scheme of extracting ruthenium from the “poor residuum”,according to which Klausextracted6 g of metallic ruthenium;*is the chemical form of ruthenium, as known today" data-dcnode-id="980" height="131" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/th-pmr0040-0181-f3.gif&amp;raw" width="200"></a></p><span data-dcnode-id="977" instrument_node=""> </span></div><span data-dcnode-id="975" instrument_node=""> </span><p data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">Klaus made extensive use of a microscope, probably being the first person to study the platinum metals in this way. He tasted and smelt his preparations, so discovering that the ammines of ruthenium have a more caustic taste than alkalis, while the taste of osmium tetroxide is “acute pepper-like” (</span><a data-dcnode-id="972" href="#b8"><span data-dcnode-id="973" instrument_node="">8</span></a><span data-dcnode-id="971" instrument_node="">).</span></p><span data-dcnode-id="969" instrument_node=""> </span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Although first identified in 1858, ruthenium tetroxide had been detected earlier by Klaus because of its smell. Klaus set out the results of his experiments very carefully and consequently they can be easily repeated. After establishing the characteristics and distribution of the “new body” and the accompanying platinoids, Klaus found ways of extracting the ruthenium.</span></p><span data-dcnode-id="966" instrument_node=""> </span><p data-dcnode-id="961"><span data-dcnode-id="965" instrument_node="">His method was based upon the precipitation of double salts of ruthenium and the precipitation of ruthenium from its chloride solution by zinc. Klaus found that on treating chloride salts of ruthenium with hydrogen sulphide a “dense sapphire-blue colour formed. Neither iridium, nor rhodium nor any other metal...” could react in such a way (</span><a data-dcnode-id="963" href="#b16"><span data-dcnode-id="964" instrument_node="">16</span></a><span data-dcnode-id="962" instrument_node="">).</span></p><span data-dcnode-id="960" instrument_node=""> </span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Klaus eventually extracted 6 grams of clear light grey ruthenium powder.</span></p><span data-dcnode-id="957" instrument_node=""> </span><div class="blockquote" data-dcnode-id="948"><a data-dcnode-id="956" name="idm139798497315536"></a><span data-dcnode-id="955" instrument_node=""> </span><p data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">“I named the new body, in honour of my Motherland, ruthenium. I had every right to call it by this name because Mr. Osann relinquished his ruthenium and the word does not yet exist in chemistry” (</span><a data-dcnode-id="952" href="#b13"><span data-dcnode-id="953" instrument_node="">13</span></a><span data-dcnode-id="951" instrument_node="">).</span></p><span data-dcnode-id="949" instrument_node=""> </span></div><span data-dcnode-id="947" instrument_node=""> </span><p data-dcnode-id="939"><span data-dcnode-id="946" instrument_node="">The first brief announcement, and then fuller reports, about the discovery of ruthenium were sent to the Academy of Sciences at St. Petersburg and to Academician G. I. Gess, who reported them on September 13th and October 25th, 1844. They were later published (</span><a data-dcnode-id="944" href="#b17"><span data-dcnode-id="945" instrument_node="">17</span></a><span data-dcnode-id="943" instrument_node="">–</span><a data-dcnode-id="941" href="#b19"><span data-dcnode-id="942" instrument_node="">19</span></a><span data-dcnode-id="940" instrument_node="">).</span></p><span data-dcnode-id="938" instrument_node=""> </span><p data-dcnode-id="915"><span data-dcnode-id="937" instrument_node="">At the same time Klaus sent samples of ruthenium and a copy of his report to Jöns Jacob Berzelius (1779–1848) in Stockholm. Before receiving a reply, however, Klaus published his general conclusions about the chemical research he had carried out on the residue of the Ural platinum ore and ruthenium (</span><a data-dcnode-id="935" href="#b20"><span data-dcnode-id="936" instrument_node="">20</span></a><span data-dcnode-id="934" instrument_node="">, </span><a data-dcnode-id="932" href="#b21"><span data-dcnode-id="933" instrument_node="">21</span></a><span data-dcnode-id="931" instrument_node="">).He produced data on the analysis of the residue, described in detail all the characteristics of ruthenium and gave its atomic weight as 104.2. In addition he described: his methods of dissolution, its sulphides, hydroxides, chlorides; some oxides and double salts (</span><a data-dcnode-id="929" href="#b20"><span data-dcnode-id="930" instrument_node="">20</span></a><span data-dcnode-id="928" instrument_node="">, </span><a data-dcnode-id="926" href="#b21"><span data-dcnode-id="927" instrument_node="">21</span></a><span data-dcnode-id="925" instrument_node="">). Their structures and chemical compositions were specified later (</span><a data-dcnode-id="923" href="#b22"><span data-dcnode-id="924" instrument_node="">22</span></a><span data-dcnode-id="922" instrument_node="">). In platinum from Colombia he found 1.5 per cent ruthenium, but stressed that ruthenium passes from the platinum ore to </span><em data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">aqua regia</span></em><span data-dcnode-id="919" instrument_node=""> “in sucha small amount that it is difficult to find it” (</span><a data-dcnode-id="917" href="#b23"><span data-dcnode-id="918" instrument_node="">23</span></a><span data-dcnode-id="916" instrument_node="">). He also described some characteristics of the other platinum metals.</span></p><span data-dcnode-id="914" instrument_node=""> </span></div><span data-dcnode-id="912" instrument_node=""> </span><h2 class="main-title" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Berzelius’s Final Recognition</span></h2><div class="section" data-dcnode-id="777"><a data-dcnode-id="909" name="idm139798497302272"></a><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node=""> </span><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">Berzelius quickly examined the material that he had been sent and reported back to Klaus, who was then still an unknown professor, that it was just a dirty salt of iridium; a conclusion that Berzelius published immediately (</span><a data-dcnode-id="904" href="#b24"><span data-dcnode-id="905" instrument_node="">24</span></a><span data-dcnode-id="903" instrument_node="">). Very upset, but still convinced of his own judgement, Klaus sent additional salts and his latest publication to Berzelius who responded in a letter dated January 24th, 1845, which read:</span></p><span data-dcnode-id="901" instrument_node=""> </span><div class="blockquote" data-dcnode-id="892"><a data-dcnode-id="900" name="idm139798497299664"></a><span data-dcnode-id="899" instrument_node=""> </span><p data-dcnode-id="894"><span data-dcnode-id="898" instrument_node="">“Only at the beginning of this month I had the pleasure of receiving your amiable letter datedNovember 15th, with the enclosure of your article and preparations. My sincere congratulations to youupon the excellent discoveries and their fine processing;.... your name will be indelibly inscribed in the history of chemistry...” (</span><a data-dcnode-id="896" href="#b25"><span data-dcnode-id="897" instrument_node="">25</span></a><span data-dcnode-id="895" instrument_node="">).</span></p><span data-dcnode-id="893" instrument_node=""> </span></div><span data-dcnode-id="891" instrument_node=""> </span><p data-dcnode-id="883"><span data-dcnode-id="890" instrument_node="">It is stated elsewhere (</span><a data-dcnode-id="888" href="#b26"><span data-dcnode-id="889" instrument_node="">26</span></a><span data-dcnode-id="887" instrument_node="">) that this was the third letter from Berzelius to Klaus, not the second, but in any case Berzelius only published Klaus’s discovery in 1846, although in that year he informed F. Weiler that “its copy [article] was in my hands from November 1844” (</span><a data-dcnode-id="885" href="#b27"><span data-dcnode-id="886" instrument_node="">27</span></a><span data-dcnode-id="884" instrument_node="">).</span></p><span data-dcnode-id="882" instrument_node=""> </span><p data-dcnode-id="874"><span data-dcnode-id="881" instrument_node="">The scientific progress that resulted from his careful experiments and the soundness of his conclusions made a good impression on his contemporaries and established Klaus as a great authority on the subject. In 1846 the Academy of Sciences awarded him the Demidov Prize for the discovery of ruthenium. He became a corresponding member of the Medical Surgical Academy in 1850 and of the Academy of Sciences of Petersburg in 1861. But Klaus’s priority in discovering ruthenium was doubted not only during his lifetime, but also some 100 years after his death. This matter was considered recently by N. V. Fedorenko (</span><a data-dcnode-id="879" href="#b28"><span data-dcnode-id="880" instrument_node="">28</span></a><span data-dcnode-id="878" instrument_node="">), co-author of a major text on the platinum metals (</span><a data-dcnode-id="876" href="#b29"><span data-dcnode-id="877" instrument_node="">29</span></a><span data-dcnode-id="875" instrument_node="">), who proved convincingly that Klaus was indeed the first to discover ruthenium.</span></p><span data-dcnode-id="873" instrument_node=""> </span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">In 1852, family reasons obliged Klaus to leave Kazan and return to Dorpat to the Chair of Pharmacyand a laboratory in the University. Here he was in charge of analytical chemistry.</span></p><span data-dcnode-id="870" instrument_node=""> </span><p data-dcnode-id="865"><span data-dcnode-id="869" instrument_node="">To commemorate the 50th anniversary of the University of Kazan, Klaus published a monograph “Contribution to the Chemistry of Platinum Metals” (</span><a data-dcnode-id="867" href="#b30"><span data-dcnode-id="868" instrument_node="">30</span></a><span data-dcnode-id="866" instrument_node="">) in which he redefined the chemistry of these metals practically all over again. For a century this was a standardtextbook on the subject for scientists, and supported the revival and development of the Russian and Soviet School of Platinum Metals by L. A. Chugaev and 1.1. Chernyaev.</span></p><span data-dcnode-id="864" instrument_node=""> </span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">In the foreword Klaus wrote:</span></p><span data-dcnode-id="861" instrument_node=""> </span><div class="blockquote" data-dcnode-id="852"><a data-dcnode-id="860" name="idm139798497288400"></a><span data-dcnode-id="859" instrument_node=""> </span><p data-dcnode-id="854"><span data-dcnode-id="858" instrument_node="">“I come out with the facts that contradict observations made by the great chemist [Berzelius] and whose memory will remain dear and be revered by me forever…. The more my experiments contradicted this authority, the greater the care and thoroughness with which I was to check my work … the control gave me courage to express everything that turned them into my convictions” (</span><a data-dcnode-id="856" href="#b31"><span data-dcnode-id="857" instrument_node="">31</span></a><span data-dcnode-id="855" instrument_node=""> ).</span></p><span data-dcnode-id="853" instrument_node=""> </span></div><span data-dcnode-id="851" instrument_node=""> </span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">In his monograph Klaus described reliable methods of extracting all six metals in the pure form; together with methods of determining platinoids in the very noble metals (in ruthenium-osmium, iridium; in iridium-ruthenium, platinum, palladium, rhodium; in rhodium-ruthenium, iridium, platinum and others); characteristic reactions for every platinum metal with 15 reagents are given; the mutual influence of platinoids on their specific reactions, for example 15 pairs (ruthenium + iridium, ruthenium +osmium, rhodium + iridium, ruthenium + platinum and others); schemes of quantitative analysis of platinum materials; and comparative characteristics of the most complicated pair, namely iridium and rhodium. For the first time Klaus stressed that reactions with salts of platinum metals proceed slowly and need a lot of time or heating.</span></p><span data-dcnode-id="848" instrument_node=""> </span><div class="fig panel" data-dcnode-id="834"><p data-dcnode-id="846"><a data-dcnode-id="847" name="idm139798497285008"></a></p><span data-dcnode-id="845" instrument_node=""> </span><div class="caption" data-dcnode-id="840"><span data-dcnode-id="844" instrument_node=""> </span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">The chapter “About ruthenium Ru = 651” from Klaus’s monograph “The Chemical Research of the Residuum...”. The characteristics of metallic ruthenium and its compounds are first described</span></p><span data-dcnode-id="841" instrument_node=""> </span></div><span data-dcnode-id="839" instrument_node=""> </span><p data-dcnode-id="836"><a class="thickbox" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/pmr0040-0181-f4.gif"><img alt="The chapter “About ruthenium Ru = 651” from Klaus’s monograph “The Chemical Research of the Residuum...”. The characteristics of metallic ruthenium and its compounds are first described" data-dcnode-id="838" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/th-pmr0040-0181-f4.gif&amp;raw" width="200"></a></p><span data-dcnode-id="835" instrument_node=""> </span></div><span data-dcnode-id="833" instrument_node=""> </span><p data-dcnode-id="827"><span data-dcnode-id="832" instrument_node="">Finally, in the chapter “About Platinum Bases” Klaus showed the change in molecular characteristics after their co-ordination by a metal; for the first time he considered ammonium compounds “as compounds of the passive [co-ordi-nated] ammonium with metal oxides, where the ability for saturation depends on the metallic oxide” (</span><a data-dcnode-id="830" href="#b32"><span data-dcnode-id="831" instrument_node="">32</span></a><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node=""> ).</span></p><span data-dcnode-id="826" instrument_node=""> </span><p data-dcnode-id="821"><span data-dcnode-id="825" instrument_node="">Thus, Klaus was not only an outstanding experimenter working in breadth, but also a perspicacious scientist, simultaneously investigating topics in depth. These concepts were difficult for his contemporaries to understand and were only developed later in Alfred Werner’s coordination theory. “Werner’s views represent a new modification … of the theory of combinations by Klaus”(N. S. Kurnakov, 1893); Klaus’s concepts “appeared again nearly 40 years later in Werner's co-ordination theory” (G. Kauffman, 1976) (</span><a data-dcnode-id="823" href="#b33"><span data-dcnode-id="824" instrument_node="">33</span></a><span data-dcnode-id="822" instrument_node="">).</span></p><span data-dcnode-id="820" instrument_node=""> </span><p data-dcnode-id="812"><span data-dcnode-id="819" instrument_node="">But this is not all; in a nine page chapter on cyanic compounds, Klaus comes to a fundamental “unexpected” conclusion. “Platinum metals according to their likeness can be groupedin pairs :.. platinum and palladium, iridium and rhodium, osmium ruthenium. Every main metal from theplatinum group: platinum, iridium and osmium, having nearly the same atomic weight, … have next to them anothermetal of approximately half of their atomic weight, which is very closely connected by similar properties and morphologies … This resemblance is … so definite, that it cannot be doubted at all” (</span><a data-dcnode-id="817" href="#b34"><span data-dcnode-id="818" instrument_node="">34</span></a><span data-dcnode-id="816" instrument_node="">). Klaus’s observations about the changing characteristics of the triads, Ru-Rh-Pd, Os-Ir-Pt, both across and down, led Mendeleev to conclude that theplatinum metals belonged in one group (VIH) of his Periodic Table. Mendeleev formulated his Periodic Law in 1871 in the “Bases of Chemistry” and in a chapter on “Platinum and its associates” a sectionwas devoted to “Ruthenium and osmium anhydride” (</span><a data-dcnode-id="814" href="#b35"><span data-dcnode-id="815" instrument_node="">35</span></a><span data-dcnode-id="813" instrument_node="">).</span></p><span data-dcnode-id="811" instrument_node=""> </span><p data-dcnode-id="806"><span data-dcnode-id="810" instrument_node="">It is interesting to note that at much the same time as Klaus was working on problems concerning the platinum metals, he was also involved in extensive work with the Academy of Sciences on Russian flora. His monograph of scientific descriptions of thousands of plants, including eight species that he discovered, was first published in German and later in Russian (</span><a data-dcnode-id="808" href="#b36"><span data-dcnode-id="809" instrument_node="">36</span></a><span data-dcnode-id="807" instrument_node="">).</span></p><span data-dcnode-id="805" instrument_node=""> </span><p data-dcnode-id="797"><span data-dcnode-id="804" instrument_node="">From the mid-1850s Klaus began to work on a “complete monograph on platinum metals” with sections on their history, chemistry, analysis and metallurgy. The Deville and Debray method of fusing platinum was started between 1857 and 1859 and appeared to offer an opportunity of manufacturing platinum articles more readily than the established “wet” methods of consolidation. Klaus was well informed about this and also knew about the smelting work carried outby 1.1. Varvinsky(1797–1838) who, as early as 1836, had melted platinum using an oxy-hydrogen flame (</span><a data-dcnode-id="802" href="#b37"><span data-dcnode-id="803" instrument_node="">37</span></a><span data-dcnode-id="801" instrument_node="">), although his method did not attract any attention at the time. The possibilities of fusing platinum were studied by B. Yakobi who visited Deville and Debray in 1859 on the instruction of the Russian government. In Paris, Yakobi conducted the fusion of 30 kg of platinumand obtained an iridium ingot weighing 1.8 kg (</span><a data-dcnode-id="799" href="#b38"><span data-dcnode-id="800" instrument_node="">38</span></a><span data-dcnode-id="798" instrument_node="">). Klaus, an old friend of Yakobi, was aware of the results of his experiments. However, Klaus was more interestedin the chemical characteristics of fusion, that is, the behaviour of the platinum metals and their admixtures during melting.</span></p><span data-dcnode-id="796" instrument_node=""> </span><p data-dcnode-id="788"><span data-dcnode-id="795" instrument_node="">In order to become better acquainted with the work being carried out on the platinum metals in the rest of Europe, to study the scientific literature and to investigate the chemical aspects of fusion, Klaus arranged a trip to western Europe, leaving Russia for Berlin in the middle of May, 1863. He was treated as a celebrity -receiving well-deserved respect and honours. In Berlin he was elected a corresponding member of the Prussian Academy of Sciences, and met with Gustav and Heinrich Rose, Gustav Magnus and Poggendorf. In Hanau he made the acquaintance of W. C. Heraeus, who, like him, had been a pharmacist before starting his own business, and who was now the head of a small platinum workshop. Klaus took part in experimental fusions with Heraeus, and discussed with him the benefits and problems associated with fusion in the lime furnace, Klaus expressing his doubts about the universality of the method (</span><a data-dcnode-id="793" href="#b39"><span data-dcnode-id="794" instrument_node="">39</span></a><span data-dcnode-id="792" instrument_node="">, </span><a data-dcnode-id="790" href="#b40"><span data-dcnode-id="791" instrument_node="">40</span></a><span data-dcnode-id="789" instrument_node="">).</span></p><span data-dcnode-id="787" instrument_node=""> </span><p data-dcnode-id="779"><span data-dcnode-id="786" instrument_node="">Klaus then went to Switzerland and later to Paris, visiting the works of Henri Saint-Claire Deville, Chapuis and H. K. Desmoutis and F. A. Quennessen. He associated with C. A. Würz, M. Berthelo, E. Fremi and other scientists, and studied the scientific literature. While there Klaus again took part in fusion processes, discussing the results and receiving presents of platinum artifacts and preparations (</span><a data-dcnode-id="784" href="#b39"><span data-dcnode-id="785" instrument_node="">39</span></a><span data-dcnode-id="783" instrument_node="">, </span><a data-dcnode-id="781" href="#b40"><span data-dcnode-id="782" instrument_node="">40</span></a><span data-dcnode-id="780" instrument_node="">).</span></p><span data-dcnode-id="778" instrument_node=""> </span></div><span data-dcnode-id="776" instrument_node=""> </span><h2 class="main-title" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Klaus Visits Hatton Garden</span></h2><div class="section" data-dcnode-id="758"><a data-dcnode-id="773" name="idm139798497262480"></a><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node=""> </span><p data-dcnode-id="760"><span data-dcnode-id="770" instrument_node="">Late in the Autumn of 1863 Klaus left for London to visit Johnson Matthey. He was particularly interested in this firm because he knew that it had recendy purchased a large quantity of Russian platinum and platinum residues. Although “no record of such a visit has so far been found” byJohnson Matthey (</span><a data-dcnode-id="768" href="#b11"><span data-dcnode-id="769" instrument_node="">11</span></a><span data-dcnode-id="767" instrument_node="">), Klaus reported that George Matthey received him “with the same obligingness as the French manufacturers showed me and allowed me into his laboratory”. Thus Klaus became more knowledgeable about fusion furnaces, laboratories and the methods used to analyse the platinum metals. During discussions with George Matthey, Klaus expressed his doubts about the suitability of the fusion method for processing virgin platinum or platinum residues because they include much rhodium and iridium. Klaus was later to write “Mr. Matthey,a devotee of the method of fusion, also had to recognise that this method could not be used in the case of platinum ore”, while on parting “Mr. Matthey very amiably made me a present of several samples of platinum preparations” (</span><a data-dcnode-id="765" href="#b39"><span data-dcnode-id="766" instrument_node="">39</span></a><span data-dcnode-id="764" instrument_node="">, </span><a data-dcnode-id="762" href="#b40"><span data-dcnode-id="763" instrument_node="">40</span></a><span data-dcnode-id="761" instrument_node="">).</span></p><span data-dcnode-id="759" instrument_node=""> </span></div><span data-dcnode-id="757" instrument_node=""> </span><h2 class="main-title" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Klaus’s Death</span></h2><div class="section" data-dcnode-id="724"><a data-dcnode-id="754" name="idm139798497256720"></a><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node=""> </span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">At the beginning of January 1864, Klaus travelled back to Dorpat and returned to work. At the end of February he gave a lecture to a meeting of Russian pharmacists in St. Petersburg, but on the return journey, which was made by sledge, he caught a chill and was ill when he reached home on March 10th. To everybody’s surprise Klaus died of pneumonia on March 12th. He was buried in Dorpat but although hehad done so much to glorify both the town and the University, the people of Dorpat did not honour thememory of their famous citizen; and his tomb was not preserved.</span></p><span data-dcnode-id="749" instrument_node=""> </span><div class="fig panel" data-dcnode-id="735"><p data-dcnode-id="747"><a data-dcnode-id="748" name="idm139798497254880"></a></p><span data-dcnode-id="746" instrument_node=""> </span><div class="caption" data-dcnode-id="741"><span data-dcnode-id="745" instrument_node=""> </span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">A group of Russian scientists who devoted the greatest part of their research to studies of the chemistry of ruthenium. From right to left: N. M. Sinitsyn, O. E. Zvyagintsev and V. N. Pitchkov. The photograph was taken in 1964</span></p><span data-dcnode-id="742" instrument_node=""> </span></div><span data-dcnode-id="740" instrument_node=""> </span><p data-dcnode-id="737"><a class="thickbox" data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/pmr0040-0181-f5.gif"><img alt="A group of Russian scientists who devoted the greatest part of their research to studies of the chemistry of ruthenium. From right to left: N. M. Sinitsyn, O. E. Zvyagintsev and V. N. Pitchkov. The photograph was taken in 1964" data-dcnode-id="739" height="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technology.matthey.com/wp-content/uploads/articles/40/4/th-pmr0040-0181-f5.gif&amp;raw" width="200"></a></p><span data-dcnode-id="736" instrument_node=""> </span></div><span data-dcnode-id="734" instrument_node=""> </span><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">Regrettably, the monograph that Klaus had been preparing was never completed, but following his death the parts of it that could be found were published (</span><a data-dcnode-id="731" href="#b40"><span data-dcnode-id="732" instrument_node="">40</span></a><span data-dcnode-id="730" instrument_node="">) by one of his pupils, A. M. Butlerov, who had later succeeded him at Kazan.</span></p><span data-dcnode-id="728" instrument_node=""> </span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Without Klaus the study of ruthenium in Russia practically ceased and was not resumed until the 1930s, when it was revived by Professor Orest Evgenyevitch Zvyagintsev (1894–1967) and further advanced by his pupils, Nikolay Mikhailovitch Sinitsyn (1931–1992) and the present author. Indeed, between the early 1930s and 1990s, there were around 400 papers published by them in Russia on ruthenium and other platinum metals, including 11 monographs.</span></p><span data-dcnode-id="725" instrument_node=""> </span></div><span data-dcnode-id="723" instrument_node=""> </span></div><p class="return-top2" data-dcnode-id="719"><a data-dcnode-id="720" href="#"><span data-dcnode-id="721" instrument_node="">BACK TO TOP</span></a></p><h2 class="title" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">References</span></h2><span data-dcnode-id="716" instrument_node=""> </span><ol data-dcnode-id="229" id="references" name="references"><span data-dcnode-id="715" instrument_node=""> </span><li data-dcnode-id="705" id="b1"><span class="ref-label" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">1</span></span><span data-dcnode-id="712" instrument_node=""> </span><div class="ref" data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">N. N. Uschakova, “ </span><em data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Karl Karlovitch Klaus</span></em><span data-dcnode-id="708" instrument_node=""> ”, Nauka, Moscow, 1972, p. 8</span></div><span data-dcnode-id="706" instrument_node=""> </span></li><span data-dcnode-id="704" instrument_node=""> </span><li data-dcnode-id="694" id="b2"><span class="ref-label" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">2</span></span><span data-dcnode-id="701" instrument_node=""> </span><div class um%25252C%252520iridium%25252C%252520osmium%25252C%252520and%252520to%252520a%252520lesser%252520extent%25252C%252520palladium%252520and%252520platinum.%252520Thus%25252C%252520he%252520may%252520be%252520regarded%252520as%252520the%252520creator%252520of%252520the%252520chemistry%252520of%252520the%252520platinum%252520metals%25252C%252520and%252520the%252520one%252520who%252520introduced%252520the%252520concept%252520of%252520the%252520structure%252520of%252520the%252520%2525E2%252580%25259Cdouble%252520salts%252520and%252520bases%2525E2%252580%25259D%252520of%252520platinum%25252C%252520which%252520was%252520developed%252520some%252520forty%252520years%252520later%252520by%252520Alfred%252520Werner%252520in%252520his%252520co-ordination%252520theory%252520Klaus%252520also%252520discovered%252520the%252520similarities%252520and%252520differences%252520between%252520elements%252520in%252520the%252520triads%25253A%252520ruthenium-rhodium-palladium%252520and%252520osmium-iridium-platinum%25252C%252520so%252520providing%252520the%252520justification%252520for%252520Dmitri%252520Ivanovich%252520Mendeleev%252520to%252520include%252520all%252520six%252520platinum%252520metals%252520in%252520Group%252520VIII%252520of%252520the%252520Periodic%252520System.%252520Klaus%2525E2%252580%252599s%252520work%252520thus%252520marked%252520an%252520epoch%252520in%252520the%252520investigation%252520of%252520the%252520platinum%252520metals%25252C%252520especially%252520of%252520ruthenium%252520%2525E2%252580%252593%252520the%252520last%252520one%252520to%252520be%252520discovered.%2526url%253Dhttps%25253A%25252F%25252Fwww.technology.matthey.com%25252Farticle%25252F40%25252F4%25252F181-188%25252F%2526site_name%253DJohnson%252520Matthey%252520Technology%252520Review%2526image%253Dhttps%25253A%25252F%25252Fwww.technology.matthey.com%25252Fimages%25252Farticles%25252F40%25252F4%25252Fth-pmr0040-0181-f1.gif%26csi%3Dundefined%26rev%3Dv8.28.8-wp%26ct%3D0%26xld%3D1%26xd%3D1&amp;raw" style="h
