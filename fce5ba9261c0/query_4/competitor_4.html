</span><span data-dcnode-id="2024" id="freeTextContainer11673726137850568012"><span data-dcnode-id="2028" instrument_node="">After enduring moves across the country with me more than a few times, boxed and unboxed, over the past 35+ years, my slightly yellowed, still tightly-bound, thin 95-cent paperback of Huxley's DOORS OF PERCEPTION was due a fresh read. And it was a joy to be wrapped once again in Huxley's thoughts and prose. He was one of my early literary idols, yet he's been absent from my readings of late, sadly neglected.</span><br data-dcnode-id="2027"><br data-dcnode-id="2026"><span data-dcnode-id="2025" instrument_node="">Most people are familiar with the premise of this book – Huxley ingests mescalin, under s</span></span><span data-dcnode-id="2023" instrument_node="">
</span><span data-dcnode-id="1973" id="freeText11673726137850568012" style="display:none"><span data-dcnode-id="2022" instrument_node="">After enduring moves across the country with me more than a few times, boxed and unboxed, over the past 35+ years, my slightly yellowed, still tightly-bound, thin 95-cent paperback of Huxley's DOORS OF PERCEPTION was due a fresh read. And it was a joy to be wrapped once again in Huxley's thoughts and prose. He was one of my early literary idols, yet he's been absent from my readings of late, sadly neglected.</span><br data-dcnode-id="2021"><br data-dcnode-id="2020"><span data-dcnode-id="2019" instrument_node="">Most people are familiar with the premise of this book – Huxley ingests mescalin, under supervision, and records his experiences, interspersed with frequent digressions and speculations on brain science, hallucinogens in other cultures and religions, and the possible links between psychedelic states and illnesses such as schizophrenia. Written in that comfortable yet erudite prose of Huxley's, it is a joy to read.</span><br data-dcnode-id="2018"><br data-dcnode-id="2017"><span data-dcnode-id="2016" instrument_node="">To Huxley's surprise, the expected alteration to his inner experience caused by the mescalin did not happen. </span><br data-dcnode-id="2015"><br data-dcnode-id="2014"><i data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">“The other world to which mescalin admitted me was not the world of visions; it existed out there, in what I could see with my eyes open. The great change was in the realm of objective fact. What had happened to my subjective universe was relatively unimportant.” [16]</span></i><br data-dcnode-id="2011"><br data-dcnode-id="2010"><span data-dcnode-id="2009" instrument_node="">But that world of 'objective fact' did not disappoint. Huxley describes colors brought “to a higher power,” objects shining with an “Inner Light,” table legs “supernatural” in their polished smoothness – flowers, furniture, textiles, works of art – Botticelli, Van Gogh, Cezanne – all bathed in “grace” and “transfiguration,” viewed now by his “Mind-at-Large” unencumbered by the brain's “reducing valve” which filters out the storm of sensory data which would otherwise overwhelm. At least that's his theory.</span><br data-dcnode-id="2008"><br data-dcnode-id="2007"><i data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">“What comes out at the other end is a measly trickle of the kind of consciousness which will help us to stay alive on the surface of this particular planet. To formulate and express the contents of this reduced awareness, man has invented and endlessly elaborated those symbol-systems and implicit philosophies which we call languages.” [23]</span></i><br data-dcnode-id="2004"><br data-dcnode-id="2003"><span data-dcnode-id="2002" instrument_node="">He directs particular attention to his perception of fabrics, the folds in his trousers, the draperies, all the textiles within his view:</span><br data-dcnode-id="2001"><br data-dcnode-id="2000"><i data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">“Those folds in the trousers – what a labyrinth of endlessly significant complexity! And the texture of the gray flannel – how rich, how deeply, mysteriously sumptuous!” [30]</span></i><br data-dcnode-id="1997"><br data-dcnode-id="1996"><span data-dcnode-id="1995" instrument_node="">Ultimately Huxley declares, “This is how one ought to see, how things really are.” But is that the way things are? Does the psychedelic reveal reality or distort it? It would be easy to assume that Huxley's book, written over 60 years ago by a non-scientist, is woefully outdated and unreliable in general neurological understanding. Perhaps he takes his epigraph too literally:</span><br data-dcnode-id="1994"><br data-dcnode-id="1993"><i data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">“If the doors of perception were cleansed every thing would appear to man as it is, infinite.” </span></i><span data-dcnode-id="1990" instrument_node="">– William Blake</span><br data-dcnode-id="1989"><br data-dcnode-id="1988"><span data-dcnode-id="1987" instrument_node="">As it turns out, Huxley may be right after all. Doing some casual reading in this area, I stumbled upon an article from Scientific American, May of 2012, by Adam Halberstadt, Mark Geyer: Do Psychedelics Expand the Mind by Reducing Brain Activity? Here's the money quote:</span><br data-dcnode-id="1986"><br data-dcnode-id="1985"><i data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">“Based on their findings, the authors of the study concluded that hallucinogens reduce activity in specific “hub” regions of the brain, potentially diminishing their ability to coordinate activity in downstream brain regions. In effect, psilocybin appears to inhibit brain regions that are responsible for constraining consciousness within the narrow boundaries of the normal waking state, an interpretation that is remarkably similar to what Huxley proposed over half a century ago.”</span></i><br data-dcnode-id="1982"><br data-dcnode-id="1981"><span data-dcnode-id="1980" instrument_node="">This is an extremely slim volume, only 79 pages in my copy, yet there is a lot there to digest, much to encourage further research and reading. It's as fascinating and timely now, as when Huxley wrote it in 1954. Perhaps more so. </span><br data-dcnode-id="1979"><br data-dcnode-id="1978"><span data-dcnode-id="1977" instrument_node="">As I may have hinted at earlier, THE DOORS OF PERCEPTION has a very personal significance for me. It was the mid-seventies and I was going through an extended fascination with altered states of consciousness, absorbed in books like THE CENTER OF THE CYLONE and THE DEEP SELF by John C. Lilly, any general literature on sensory-deprivation tanks, the books by Carlos Casteneda, beginning with THE TEACHINGS OF DON JUAN: A YAQUI WAY OF KNOWLEDGE. Of all these, it was Huxley's book that was most influential. I was to carry out my own experiment, imitating Huxley. I procured some “Window-Pane” (Lysergic acid diethylamide) from a very reliable source, in other words I was confident of its purity, and, with my girlfriend as supervision, ingested a very moderate amount prior to attending a viewing of Kubrick's 2001: A Space Odyssey at the local theater.</span><br data-dcnode-id="1976"><br data-dcnode-id="1975"><span data-dcnode-id="1974" instrument_node="">As with Huxley's experience, I became mesmerized by fabrics, the textures – deep, sinuous folds, velvety lush or coarse and fibrous. The curtains that flanked the movie screen pulsed a deep red, alive with color, and though we were seated near the center of the theater my vision extended into the very folds of the fabric, as if I were there, in them – objective distance and space was obliterated. I could not look away. The film, what I recall of it, was an enormous canvas of shifting colors and shapes. The drive home was a discovery of the beauty in traffic lights. For the final few hours before the drug relinquished its hold on the 5-HT2A receptors in my brain, I found enjoyment in my kitchen table and chairs, my plants, and the folds in my own pants. My assessment? I enjoyed it, but did I believe when I examined the “supernatural smoothness” of my kitchen table leg that I was seeing the Ding an Sich, the “thing-in-itself.”? I'd like to think so, but no.</span></span><span data-dcnode-id="1972" instrument_node="">

</span><span data-dcnode-id="1884" id="freeTextContainer1254791328813452690"><span data-dcnode-id="1889" instrument_node="">- a thought-provoking book worth reading</span><br data-dcnode-id="1888"><span data-dcnode-id="1887" instrument_node="">‘“O nobly born, let not thy mind be distracted.” That was the problem—to remain undistracted. Undistracted by the memory of past sins, by imagined pleasure, by the bitter aftertaste of old wrongs and humiliations, by all the fears and hates and cravings that ordinarily eclipse the Light’</span><br data-dcnode-id="1886"><span data-dcnode-id="1885" instrument_node="">‘The urge to transcend self-conscious selfhood is, as I have said, a principal appetite of the soul. When, for whatever reason, men and women fail to transcend themselves b</span></span><span data-dcnode-id="1883" instrument_node="">
</span><span data-dcnode-id="1877" id="freeText1254791328813452690" style="display:none"><span data-dcnode-id="1882" instrument_node="">- a thought-provoking book worth reading</span><br data-dcnode-id="1881"><span data-dcnode-id="1880" instrument_node="">‘“O nobly born, let not thy mind be distracted.” That was the problem—to remain undistracted. Undistracted by the memory of past sins, by imagined pleasure, by the bitter aftertaste of old wrongs and humiliations, by all the fears and hates and cravings that ordinarily eclipse the Light’</span><br data-dcnode-id="1879"><span data-dcnode-id="1878" instrument_node="">‘The urge to transcend self-conscious selfhood is, as I have said, a principal appetite of the soul. When, for whatever reason, men and women fail to transcend themselves by means of worship, good works and spiritual exercises, they are apt to resort to religion’s chemical surrogates—alcohol and “goof pills” in the modern West, alcohol and opium in the East, hashish in the Mohammedan world, alcohol and marijuana in Central America, alcohol and coca in the Andes, alcohol and the barbiturates in the more up-to-date regions of South America. In Poisons Sacrés, Ivresses Divines Philippe de Félice has written at length and with a wealth of documentation on the immemorial connection between religion and the taking of drugs. Here, in summary or in direct quotation, are his conclusions. The employment for religious purposes of toxic substances is “extraordinarily widespread. . . .The practices studied in this volume can be observed in every region of the earth, among primitives no less than among those who have reached a high pitch of civilization. We are therefore dealing not with exceptional facts, which might justifiably be overlooked, but with a general and, in the widest sense of the word, a human phenomenon, the kind of phenomenon which cannot be disregarded by anyone who is trying to discover what religion is, and what are the deep needs which it must satisfy.”</span></span><span data-dcnode-id="1876" instrument_node="">

</span><span data-dcnode-id="1753" id="freeText8566334630972887647" style="display:none"><span data-dcnode-id="1763" instrument_node="">The best book I have ever read.</span><br data-dcnode-id="1762"><br data-dcnode-id="1761"><span data-dcnode-id="1760" instrument_node="">Everything that I have ever tried to understand about symbology, transcendence, consciousness, linguistics, and the self has all been tied together in this book. Huxley's vivid description of the hallucinatory effects that he experiences under mescaline are not only entertaining to read, but also provide the reader with an alternate account of subjective reality that has now been made illegal. Many of the experiences that he describes relating to self awareness and the realisation of the ego are similar to the effects I have experienced through meditation, making it an interesting read. </span><br data-dcnode-id="1759"><br data-dcnode-id="1758"><span data-dcnode-id="1757" instrument_node="">For the readers convinced that psychedelics are bad for you and have no interest in them, this book also provides many links between the effects of psychedelics and practices in modern nature. The links between theology and drug use, the philosophy of western and eastern cultures. The purposeful neglect of non verbal learning and practice of increased perception are all discussed. </span><br data-dcnode-id="1756"><br data-dcnode-id="1755"><span data-dcnode-id="1754" instrument_node="">This is a quick read, (50 pages) and every second is worth your time. </span></span><span data-dcnode-id="1752" instrument_node="">

</span><span data-dcnode-id="1317" id="freeTextContainer2955718531192876914"><span data-dcnode-id="1318" instrument_node="">My friend Amanda who dated &amp; married this guy based on their shared obsession with Nick Cave said I had to read this book in Oz. They even got it out for me at the library. I read it. It was alright. My genuine reaction was that this is a lazy short-cut...everything he described, you could achieve drug-free from mind-training and meditation....so if my tibetan meditation teacher had to spend 30 yrs in some cave up in the Himalayas doing this and lazy people want to pay $30 and take a short-cut..</span></span><span data-dcnode-id="1316" instrument_node="">
</span><span data-dcnode-id="1296" id="freeText2955718531192876914" style="display:none"><span data-dcnode-id="1315" instrument_node="">My friend Amanda who dated &amp; married this guy based on their shared obsession with Nick Cave said I had to read this book in Oz. They even got it out for me at the library. I read it. It was alright. My genuine reaction was that this is a lazy short-cut...everything he described, you could achieve drug-free from mind-training and meditation....so if my tibetan meditation teacher had to spend 30 yrs in some cave up in the Himalayas doing this and lazy people want to pay $30 and take a short-cut.....</span><br data-dcnode-id="1314"><br data-dcnode-id="1313"><span data-dcnode-id="1312" instrument_node="">Well....lets face it.....maybe you are taking it all down the "exit" and not the "entrance"....</span><br data-dcnode-id="1311"><br data-dcnode-id="1310"><span data-dcnode-id="1309" instrument_node="">So they said,"What about the Shaman's and all the other spiritual use of hallucinogen?"</span><br data-dcnode-id="1308"><span data-dcnode-id="1307" instrument_node="">So I emailed my other friend Amanda who was studying at a Peublo and she asked her teacher and he goes," Our tradition is a sacred experience, done according to a person's inner journey....not a joke to support spoilt white kid's life-destructive habits."</span><br data-dcnode-id="1306"><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">So maybe just stop being so lazy and REALLY learn something...then you wouldn't have to worry about using "short-cuts" to chase your Creative visions? </span><br data-dcnode-id="1303"><br data-dcnode-id="1302"><span data-dcnode-id="1301" instrument_node="">Anyway Amandas x 2 both did their Ph.Ds and got "over" the silly fascination with that "undergraduate phase".</span><br data-dcnode-id="1300"><br data-dcnode-id="1299"><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3 </span><span data-dcnode-id="1123" id="freeTextContainer12261332640820139511"><span data-dcnode-id="1124" instrument_node="">This is a joyously quick read, and an interesting reflection on Aldous Huxley's experience with mescaline, the psychedelic active agent in peyote. It's fun to listen to someone so erudite and articulate convey the pulsating colors, emotional extremes and altered perceptions of a drug trip. From all I had heard of the book, I think I expected a thorough run-down of many drugs, but Huxley's experience is tied to a few afternoons on mescaline in 1953. He does address LSD and other substances, but t</span></span><span data-dcnode-id="1122" instrument_node="">
</span><span data-dcnode-id="1111" id="freeText12261332640820139511" style="display:none"><span data-dcnode-id="1121" instrument_node="">This is a joyously quick read, and an interesting reflection on Aldous Huxley's experience with mescaline, the psychedelic active agent in peyote. It's fun to listen to someone so erudite and articulate convey the pulsating colors, emotional extremes and altered perceptions of a drug trip. From all I had heard of the book, I think I expected a thorough run-down of many drugs, but Huxley's experience is tied to a few afternoons on mescaline in 1953. He does address LSD and other substances, but the real PSA is for mescaline. He lets us know that it can be synthesized, so there's no danger of driving rare cacti to extinction. It's not habit-forming, and not what one might characterize as "recreational". It doesn't lead to anything like the danger of alcohol, and he rightly points to our upside-down societal response to the dangers of various substances... which unfortunately has not improved much in the subsequent 67 years. He draws from references literary, dramatic and musical, comparing the disjointed chorus of mental images to the musical discontinuities of "</span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DFWQKSnPrjG4" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1120" instrument_node="">the madrigals</span></a><span data-dcnode-id="1118" instrument_node="">" (which were fun to listen to after learning about), and the beatific visions and emotions to the writings and art of William Blake and others (the title </span><i data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">The Doors of Perception</span></i><span data-dcnode-id="1115" instrument_node=""> comes from Blake's </span><i data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">The Marriage of Heaven and Hell</span></i><span data-dcnode-id="1112" instrument_node="">: "If the doors of perception were cleansed every thing would appear to man as it is, Infinite. For man has closed himself up, till he sees all things thro' narrow chinks of his cavern."). I'm glad to have added this to my "read" list.</span></span><span data-dcnode-id="1110" instrument_node="">

</span><span data-dcnode-id="372" id="freeText12815834216262882007" style="display:none"><span data-dcnode-id="373" instrument_node="">Aldous Leonard Huxley was an English writer and one of the most prominent members of the famous Huxley family. He spent the latter part of his life in the United States, living in Los Angeles from 1937 until his death in 1963. Best known for his novels and wide-ranging output of essays, he also published short stories, poetry, travel writing, and film stories and scripts. Through his novels and essays Huxley functioned as an examiner and sometimes critic of social mores, norms and ideals. Huxley was a humanist but was also interested towards the end of his life in spiritual subjects such as parapsychology and philosophical mysticism. By the end of his life, he was widely acknowledged as one of the pre-eminent intellectuals of his time.</span></span><span data-dcnode-id="371" instrument_node="">
