</span><a class="reviewDate createdAt right" data-dcnode-id="4622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/436536476%3Fbook_show_action%3Dtrue"><span data-dcnode-id="4623" instrument_node="">Oct 17, 2012</span></a><span data-dcnode-id="4621" instrument_node="">

</span><a class="user" data-dcnode-id="4618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/user/show/7355135-b0nnie" itemprop="url" name="B0nnie" title="B0nnie"><span data-dcnode-id="4619" instrument_node="">B0nnie</span></a><span data-dcnode-id="4617" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="4608" title="it was amazing"><span class="staticStar p10" data-dcnode-id="4613" size="15x15"><span data-dcnode-id="4614" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="4612" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4611" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4610" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4609" size="15x15"></span></span><span data-dcnode-id="4607" instrument_node="">

</span><div class="reviewText stacked" data-dcnode-id="4502"><span data-dcnode-id="4604" instrument_node="">
</span><span class="readable" data-dcnode-id="4504" id="reviewTextContainer436536476"><span data-dcnode-id="4603" instrument_node="">
</span><span data-dcnode-id="4587" id="freeTextContainer12291091034980877528"><span data-dcnode-id="4602" instrument_node=""> </span><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4601" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380394677i/759935._SY540_.jpg&amp;raw" width="350"><br data-dcnode-id="4600"><br data-dcnode-id="4599"><br data-dcnode-id="4598"><span data-dcnode-id="4597" instrument_node="">November 22, 1963. That fateful day. Yes, the day Huxley died. His last words were “LSD, 100 micrograms I.M.” He took psychedelic drugs less than a dozen times in his life, but he always did so with a deep spiritual purpose, never casually. </span><a data-dcnode-id="4595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/3188964.The_Doors_of_Perception" rel="nofollow noopener" title="The Doors of Perception by Aldous Huxley"><span data-dcnode-id="4596" instrument_node="">The Doors of Perception</span></a><span data-dcnode-id="4594" instrument_node=""> is a detailed account of the first time. The title comes from </span><a data-dcnode-id="4592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gailgastfield.com/mhh/mhh.html" rel="nofollow noopener"><span data-dcnode-id="4593" instrument_node="">William Blake's The Marriage of Heaven and Hell</span></a><span data-dcnode-id="4591" instrument_node=""> </span><br data-dcnode-id="4590"><br data-dcnode-id="4589"><span data-dcnode-id="4588" instrument_node="">"If the doors of perception were cleansed every thing would appear to man as it is, infinite. For man has closed himself up,</span></span><span data-dcnode-id="4586" instrument_node="">
</span><span data-dcnode-id="4509" id="freeText12291091034980877528" style="display:none"><span data-dcnode-id="4585" instrument_node=""> </span><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4584" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380394677i/759935._SY540_.jpg&amp;raw" width="350"><br data-dcnode-id="4583"><br data-dcnode-id="4582"><br data-dcnode-id="4581"><span data-dcnode-id="4580" instrument_node="">November 22, 1963. That fateful day. Yes, the day Huxley died. His last words were “LSD, 100 micrograms I.M.” He took psychedelic drugs less than a dozen times in his life, but he always did so with a deep spiritual purpose, never casually. </span><a data-dcnode-id="4578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/3188964.The_Doors_of_Perception" rel="nofollow noopener" title="The Doors of Perception by Aldous Huxley"><span data-dcnode-id="4579" instrument_node="">The Doors of Perception</span></a><span data-dcnode-id="4577" instrument_node=""> is a detailed account of the first time. The title comes from </span><a data-dcnode-id="4575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gailgastfield.com/mhh/mhh.html" rel="nofollow noopener"><span data-dcnode-id="4576" instrument_node="">William Blake's The Marriage of Heaven and Hell</span></a><span data-dcnode-id="4574" instrument_node=""> </span><br data-dcnode-id="4573"><br data-dcnode-id="4572"><span data-dcnode-id="4571" instrument_node="">"If the doors of perception were cleansed every thing would appear to man as it is, infinite. For man has closed himself up, till he sees all things thro' narrow chinks of his cavern." </span><br data-dcnode-id="4570"><br data-dcnode-id="4569"><span data-dcnode-id="4568" instrument_node="">Huxley attempted to open up that door and find the perfect state of grace that he believed was possible for all. The session was recorded and he was able to reconstruct "the trip" and his thoughts very thoroughly. It is quite evident the man truly had a beautiful mind. He is erudite, witty and full of good will toward men. </span><br data-dcnode-id="4567"><br data-dcnode-id="4566"><span data-dcnode-id="4565" instrument_node="">Ironically, part of the trip occurs at "the world's biggest drugstore", where, browsing through some art books, he waxes eloquent on art and culture. His thoughts on drapery make you believe that folds in a piece of cloth are the most important thing in the world. And I would have to agree.</span><br data-dcnode-id="4564"><blockquote data-dcnode-id="4559"><span data-dcnode-id="4563" instrument_node="">In the average Madonna or Apostle the strictly human, fully representational element accounts for about ten per cent of the whole. All the rest consists of many colored variations on the inexhaustible theme of crumpled wool or linen. And these non-representational nine-tenths of a Madonna or an Apostle may be just as important qualitatively as they are in quantity.</span><br data-dcnode-id="4562"><br data-dcnode-id="4561"><span data-dcnode-id="4560" instrument_node="">They had seen the Istigkeit, the Allness and Infinity of folded cloth and had done their best to render it in paint or stone. Necessarily, of course, without success. For the glory and the wonder of pure existence belong to another order, beyond the Power of even the highest art to express. But in Judith's skirt I could clearly see what, if I had been a painter of genius, I might have made of my old gray flannels.</span></blockquote><br data-dcnode-id="4558"><span data-dcnode-id="4557" instrument_node="">Timothy Leary read Huxley’s book, and they had met at Harvard. However Huxley was dismayed that </span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/3188964.The_Doors_of_Perception" rel="nofollow noopener" title="The Doors of Perception by Aldous Huxley"><span data-dcnode-id="4556" instrument_node="">Doors </span></a><span data-dcnode-id="4554" instrument_node=""> had been used in the launch of the counterculture of the 1960s. That he ends up on the cover of Sgt. Pepper's was not exactly what he intended. But if he inspired </span><a data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youtu.be/ljnv3KGtcyI" rel="nofollow noopener"><span data-dcnode-id="4553" instrument_node="">Within You Without You</span></a><span data-dcnode-id="4551" instrument_node=""> (rather than "come on baby, light my fire") I think he would not have minded.</span><br data-dcnode-id="4550"><span data-dcnode-id="4549" instrument_node=""> </span><br data-dcnode-id="4548"><span data-dcnode-id="4547" instrument_node="">"We were talking - about the space between us all</span><br data-dcnode-id="4546"><span data-dcnode-id="4545" instrument_node="">And the people - who hide themselves behind a wall of illusion</span><br data-dcnode-id="4544"><span data-dcnode-id="4543" instrument_node="">Never glimpse of truth - then it's far too late - when they pass away." -George Harrison</span><br data-dcnode-id="4542"><br data-dcnode-id="4541"><br data-dcnode-id="4540"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4539" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380394677i/759936._SX540_.jpg&amp;raw" width="375"><br data-dcnode-id="4538"><span data-dcnode-id="4537" instrument_node="">Huxley, second last row, third from the left</span><br data-dcnode-id="4536"><br data-dcnode-id="4535"><span data-dcnode-id="4534" instrument_node="">Some of Huxley's stoner thoughts:</span><br data-dcnode-id="4533"><br data-dcnode-id="4532"><span data-dcnode-id="4531" instrument_node="">On Cézanne's self portrait - "What pretensions!" I kept repeating. "Who on earth does he think he is?" The question was not addressed to Cezanne in particular, but to the human species at large. Who did they all think they were? …It's like Arnold Bennett in the Dolomites." </span><br data-dcnode-id="4530"><br data-dcnode-id="4529"><span data-dcnode-id="4528" instrument_node="">An hilarious art anecdote - "One day towards the end of his life, Blake met Constable at Hampstead and was shown one of the younger artist's sketches. In spite of his contempt for naturalistic art, the old visionary knew a good thing when he saw it- except of course, when it was by Rubens. "This is not drawing," he cried, "this is inspiration!" "I had meant it to be drawing," was Constable's characteristic answer."</span><br data-dcnode-id="4527"><br data-dcnode-id="4526"><span data-dcnode-id="4525" instrument_node="">Vermeer - "For that mysterious artist was truly gifted-with the vision that perceives the Dharma-Body as the hedge at the bottom of the garden, with the talent to render as much of that vision as the limitations of human capacity permit, and with the prudence to confine himself in his paintings to</span><br data-dcnode-id="4524"><span data-dcnode-id="4523" instrument_node="">the more manageable."</span><br data-dcnode-id="4522"><br data-dcnode-id="4521"><span data-dcnode-id="4520" instrument_node="">The Le Nain brothers - "They set out, I suppose, to be genre painters; but what they actually produced was a series of human still lives, in which their cleansed perception of the infinite significance of all things is rendered not, as with Vermeer, by subtle enrichment of color and texture, but by a heightened clarity, an obsessive distinctness of form, within an austere, almost monochromatic tonality. "</span><br data-dcnode-id="4519"><br data-dcnode-id="4518"><span data-dcnode-id="4517" instrument_node="">The schizophrenic - "...a soul not merely unregenerate, but desperately sick into the bargain. His sickness consists in the inability to take refuge from inner and outer reality (as the sane person habitually does) in the homemade universe of common sense - the strictly human world of useful notions, shared symbols and socially acceptable conventions. The schizophrenic is like a man permanently under the influence of mescalin, and therefore unable to shut off the experience of a reality which he is not holy enough to live with, which he cannot explain away because it is the most stubborn of primary facts, and which, because it never permits him to look at the world with merely human eyes, scares him into interpreting its unremitting strangeness, its burning intensity of significance, as the manifestations of human or even cosmic malevolence, calling for the most desperate countermeasures, from murderous violence at one end of the scale to catatonia, or psychological suicide, at the other.</span><br data-dcnode-id="4516"><br data-dcnode-id="4515"><br data-dcnode-id="4514"><b data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">5/5 µg's </span></b><br data-dcnode-id="4511"><br data-dcnode-id="4510"></span><span data-dcnode-id="4508" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/5395843-lisa-reads-reviews%3Fshelf%3Downed-paper"><span data-dcnode-id="4416" instrument_node="">owned-paper</span></a><span data-dcnode-id="4414" instrument_node="">

</span><span data-dcnode-id="4405" id="freeTextContainer14062486665052873421"><br data-dcnode-id="4407"><span data-dcnode-id="4406" instrument_node="">Increasingly, I'm learning that perception is far more complicated than I ever imagined. Sight, as an example, isn't simply eyes acting like cameras, sending image data to the brain for interpretation. An article in the online journal, Nature, described the mechanism by which the brain "sees" what our eyes are going to see before our eyes see it. This is why we don't view the world through what would otherwise look like a hand-held camera. Research at the University of Pennsylvania School of Med</span></span><span data-dcnode-id="4404" instrument_node="">
</span><span data-dcnode-id="4362" id="freeText14062486665052873421" style="display:none"><br data-dcnode-id="4403"><span data-dcnode-id="4402" instrument_node="">Increasingly, I'm learning that perception is far more complicated than I ever imagined. Sight, as an example, isn't simply eyes acting like cameras, sending image data to the brain for interpretation. An article in the online journal, Nature, described the mechanism by which the brain "sees" what our eyes are going to see before our eyes see it. This is why we don't view the world through what would otherwise look like a hand-held camera. Research at the University of Pennsylvania School of Medicine has shown that "the human retina can transmit data at roughly 10 million bits per second." </span><br data-dcnode-id="4401"><br data-dcnode-id="4400"><span data-dcnode-id="4399" instrument_node="">What the brain does with this data is amazing. For one thing, it compensates for anything that prevents us from seeing things as normal. In 1896, George Stratton experimented with eyeglasses that inverted his vision. After a few days, his brain adapted and Stratton saw everything the right way up. </span><br data-dcnode-id="4398"><br data-dcnode-id="4397"><span data-dcnode-id="4396" instrument_node="">The brain, needing to process data rapidly, is predisposed to see a </span><i data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">perceptual set</span></i><span data-dcnode-id="4393" instrument_node="">, which means we see what we expect to see, based largely on prior experience. No wonder children look at the world with such wide eyes--they are truly </span><i data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">looking</span></i><span data-dcnode-id="4390" instrument_node="">, whereas adults are watching re-runs. All this is necessary from an evolutionary point-of-view, since survival depends on quick data interpretation and reaction--useful for escaping lions, for example. </span><br data-dcnode-id="4389"><br data-dcnode-id="4388"><span data-dcnode-id="4387" instrument_node="">In </span><i data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">The Doors of Perception</span></i><span data-dcnode-id="4384" instrument_node="">, (published in 1956), Huxley recounts his personal experience with mescalin and its effect on his senses and thought processes. An interesting springboard into the discussion was Huxley's admission of being quite ordinary in artistic skills, yet wanting to see the world as an artist sees it. Likewise, he wanted to see and feel about the world as would a mystic. Most of the essay described exactly that. </span><br data-dcnode-id="4383"><br data-dcnode-id="4382"><br data-dcnode-id="4381"><span data-dcnode-id="4380" instrument_node="">An interesting section, which I expect has been more thoroughly researched by now, discusses adrenochrome, a product of the decomposition of adrenalin. Huxley wrote that adrenochrome "can produce many of the symptoms observed in mescalin intoxication. But adrenochrome probably occurs spontaneously in the human body. In other words, each one of us may be capable of manufacturing a chemical, minute doses of which are known to cause profound changes in consciousness. Certain of these changes are similar to those which occur in that most characteristic plague of the twentieth century, schizophrenia." </span><br data-dcnode-id="4379"><br data-dcnode-id="4378"><span data-dcnode-id="4377" instrument_node="">Mescalin, it seems, along with chemicals found naturally in the body, can shake up the way the brain normally filters and manipulates data input. Huxley thought it prevented the brain from filtering input from our senses, thereby making everything intense and amazing. The end result was to make other things less important, such as the idea of the individual and our self-importance. If we have a finite capability for 'input', then it stands to reason that turning the valve on the senses will change other aspects of our world view. Huxley coined a term, Mind at Large, which I rather liked-- </span><br data-dcnode-id="4376"><br data-dcnode-id="4375"><i data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">“Each person is at each moment capable of remembering all that has ever happened to him and of perceiving everything that is happening everywhere in the universe. The function of the brain and nervous system is to protect us from being overwhelmed and confused by this mass of largely useless and irrelevant knowledge, by shutting out most of what we should otherwise perceive or remember at any moment, and leaving only that very small and special selection which is likely to be practically useful. According to such a theory, each one of us is potentially Mind at Large." </span></i><br data-dcnode-id="4372"><br data-dcnode-id="4371"><span data-dcnode-id="4370" instrument_node="">In any case, I enjoyed this slim volume as it connects scientific inquiry with what seems to me to be a higher pursuit of our consciousness. The other edge of the sword is that one cannot operate or navigate in this world, outside a lock down mental facility, with other than a brain that functions within certain margins of filtration. While under the influence of mescalin, Huxley lost interest in relationships and all sorts of trivial pursuits necessary to sustain life in society. Seems we are as we need to be, and if one wants to pursue other avenues of consciousness, they'll have to do so within certain limitations. </span><br data-dcnode-id="4369"><br data-dcnode-id="4368"><span data-dcnode-id="4367" instrument_node="">Sidenote from internet search: "On his deathbed, unable to speak, Huxley made a written request to his wife for "LSD, 100 µg, intramuscular". According to her account of his death, in This Timeless Moment, she obliged with an injection at 11:45 am and another a couple of hours later. He died at 5:21 pm on 22 November 1963, aged 69."</span><br data-dcnode-id="4366"><br data-dcnode-id="4365"><span data-dcnode-id="4364" instrument_node="">One can't help but wonder what that trip was like. </span><br data-dcnode-id="4363"></span><span data-dcnode-id="4361" instrument_node="">

</span><span data-dcnode-id="4259" id="freeTextContainer2475899771422523626"><span data-dcnode-id="4272" instrument_node="">An erudite artist and scholar tripping on mescaline.</span><br data-dcnode-id="4271"><br data-dcnode-id="4270"><span data-dcnode-id="4269" instrument_node="">Decades before other drug culture manifestos and hippy folios cool cat Aldous Huxley first published his Doors of Perception in 1954 ( the same year as Poul Anderson’s </span><a data-dcnode-id="4267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/715287.The_Broken_Sword" rel="nofollow noopener" title="The Broken Sword by Poul Anderson"><span data-dcnode-id="4268" instrument_node="">The Broken Sword</span></a><span data-dcnode-id="4266" instrument_node=""> and Richard Matheson’s </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/14064.I_Am_Legend" rel="nofollow noopener" title="I Am Legend by Richard Matheson"><span data-dcnode-id="4265" instrument_node="">I Am Legend</span></a><span data-dcnode-id="4263" instrument_node="">). The initial part is a first person narrative about his experiences taking peyote and his descriptions of the insight. </span><br data-dcnode-id="4262"><br data-dcnode-id="4261"><span data-dcnode-id="4260" instrument_node="">Of course what makes this stand out from the legion of trip and tells is his intellectual observations. Huxl</span></span><span data-dcnode-id="4258" instrument_node="">
</span><span data-dcnode-id="4232" id="freeText2475899771422523626" style="display:none"><span data-dcnode-id="4257" instrument_node="">An erudite artist and scholar tripping on mescaline.</span><br data-dcnode-id="4256"><br data-dcnode-id="4255"><span data-dcnode-id="4254" instrument_node="">Decades before other drug culture manifestos and hippy folios cool cat Aldous Huxley first published his Doors of Perception in 1954 ( the same year as Poul Anderson’s </span><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/715287.The_Broken_Sword" rel="nofollow noopener" title="The Broken Sword by Poul Anderson"><span data-dcnode-id="4253" instrument_node="">The Broken Sword</span></a><span data-dcnode-id="4251" instrument_node=""> and Richard Matheson’s </span><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/14064.I_Am_Legend" rel="nofollow noopener" title="I Am Legend by Richard Matheson"><span data-dcnode-id="4250" instrument_node="">I Am Legend</span></a><span data-dcnode-id="4248" instrument_node="">). The initial part is a first person narrative about his experiences taking peyote and his descriptions of the insight. </span><br data-dcnode-id="4247"><br data-dcnode-id="4246"><span data-dcnode-id="4245" instrument_node="">Of course what makes this stand out from the legion of trip and tells is his intellectual observations. Huxley’s heightened appreciation for art, music, psychology and philosophy is the antithesis to the Homer Simpson “doh!” or Cheech and Chong weed humor. His drug-induced musings reminded me of the </span><a data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/10887550.The_Exegesis_of_Philip_K__Dick" rel="nofollow noopener" title="The Exegesis of Philip K. Dick by Philip K. Dick"><span data-dcnode-id="4244" instrument_node="">The Exegesis of Philip K. Dick</span></a><span data-dcnode-id="4242" instrument_node="">.</span><br data-dcnode-id="4241"><br data-dcnode-id="4240"><span data-dcnode-id="4239" instrument_node="">The second part, though, is what really hooked me. Huxely’s essay for the promotion of mescaline is all the more timely as we enter the beginning stages of our growing social acceptance of marijuana and the approaching end to that ridiculous prohibition. Huxley, speaking from the early 50s does the green libertarians one better by advocating for mescaline. Like the persuasive argument today about how tobacco and alcohol are far more harmful than illegal pot, Huxley goes on to articulate how mescaline is the more spiritual and beneficial for society and even for religion.</span><br data-dcnode-id="4238"><br data-dcnode-id="4237"><span data-dcnode-id="4236" instrument_node="">A surprisingly entertaining and illuminating essay.</span><br data-dcnode-id="4235"><br data-dcnode-id="4234"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4233" height="261" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1514080074i/24749178.jpg&amp;raw" width="299"></span><span data-dcnode-id="4231" instrument_node="">

</span><span data-dcnode-id="4093" id="freeTextContainer5481531885129305074"><b data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">“...we were back at home, and I had returned to that reassuring but profoundly unsatisfactory state known as 'being in one's right mind.”</span></b><br data-dcnode-id="4119"><br data-dcnode-id="4118"><br data-dcnode-id="4117"><b data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">Main themes:</span></b><br data-dcnode-id="4114"><br data-dcnode-id="4113"><span data-dcnode-id="4112" instrument_node="">Perception, conceptualization, expression</span><br data-dcnode-id="4111"><span data-dcnode-id="4110" instrument_node="">Art</span><br data-dcnode-id="4109"><span data-dcnode-id="4108" instrument_node="">Escapism</span><br data-dcnode-id="4107"><span data-dcnode-id="4106" instrument_node="">Syncretism</span><br data-dcnode-id="4105"><span data-dcnode-id="4104" instrument_node="">Transcendance and immanence</span><br data-dcnode-id="4103"><span data-dcnode-id="4102" instrument_node="">Selfhood and selflessness</span><br data-dcnode-id="4101"><br data-dcnode-id="4100"><br data-dcnode-id="4099"><b data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">More excerpts :</span></b><br data-dcnode-id="4096"><br data-dcnode-id="4095"><span data-dcnode-id="4094" instrument_node="">“Most men and women lead lives at the worst so painful, at the best so monotonous, poor and limited that the urge to escape, the longing to transcend themselves if only for a few moments, is and has always been one of the </span></span><span data-dcnode-id="4092" instrument_node="">
</span><span data-dcnode-id="3915" id="freeText5481531885129305074" style="display:none"><b data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">“...we were back at home, and I had returned to that reassuring but profoundly unsatisfactory state known as 'being in one's right mind.”</span></b><br data-dcnode-id="4089"><br data-dcnode-id="4088"><br data-dcnode-id="4087"><b data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">Main themes:</span></b><br data-dcnode-id="4084"><br data-dcnode-id="4083"><span data-dcnode-id="4082" instrument_node="">Perception, conceptualization, expression</span><br data-dcnode-id="4081"><span data-dcnode-id="4080" instrument_node="">Art</span><br data-dcnode-id="4079"><span data-dcnode-id="4078" instrument_node="">Escapism</span><br data-dcnode-id="4077"><span data-dcnode-id="4076" instrument_node="">Syncretism</span><br data-dcnode-id="4075"><span data-dcnode-id="4074" instrument_node="">Transcendance and immanence</span><br data-dcnode-id="4073"><span data-dcnode-id="4072" instrument_node="">Selfhood and selflessness</span><br data-dcnode-id="4071"><br data-dcnode-id="4070"><br data-dcnode-id="4069"><b data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">More excerpts :</span></b><br data-dcnode-id="4066"><br data-dcnode-id="4065"><span data-dcnode-id="4064" instrument_node="">“Most men and women lead lives at the worst so painful, at the best so monotonous, poor and limited that the urge to escape, the longing to transcend themselves if only for a few moments, is and has always been one of the principal appetites of the soul.” </span><br data-dcnode-id="4063"><br data-dcnode-id="4062"><span data-dcnode-id="4061" instrument_node="">“To see ourselves as others see us is a most salutary gift. Hardly less important is the capacity to see others as they see themselves. But what if these others belong to a different species and inhabit a radically alien universe? For example, how can the sane get to know what it actually feels like to be mad?” </span><br data-dcnode-id="4060"><br data-dcnode-id="4059"><span data-dcnode-id="4058" instrument_node="">"Every individual is at once the beneficiary and the victim of the linguistic tradition into which he has been born—the beneficiary inasmuch as language gives access to the accumulated records of other people’s experience, the victim in so far as it confirms him in the belief that reduced awareness is the only awareness and as it bedevils his sense of reality, so that he is all too apt to take his concepts for data, his words for actual things. That which, in the language of religion, is called "this world" is the universe of reduced awareness, expressed, and, as it were, petrified by language."</span><br data-dcnode-id="4057"><br data-dcnode-id="4056"><span data-dcnode-id="4055" instrument_node="">“I am not so foolish as to equate what happens under the influence of mescalin or of any other drug, prepared or in the future preparable, with the realization of the end and ultimate purpose of human life: Enlightenment, the Beatific Vision. All I am suggesting is that the mescalin experience is what Catholic theologians call "a gratuitous grace," not necessary to salvation but potentially helpful and to be accepted thankfully, if made available. To be shaken out of the ruts of ordinary perception, to be shown for a few timeless hours the outer and the inner world, not as they appear to an animal obsessed with survival or to a human being obsessed with words and notions, but as they are apprehended, directly and unconditionally, by Mind at Large—this is an experience of inestimable value to everyone and especially to the intellectual.” </span><br data-dcnode-id="4054"><br data-dcnode-id="4053"><span data-dcnode-id="4052" instrument_node="">“For Persons are selves and, in one respect at least, I was now a Not-self, simultaneously perceiving and being the Not-self of the things around me. To this new-born Not-self, the behavior, the appearance, the very thought of the self it had momentarily ceased to be, and of</span><br data-dcnode-id="4051"><span data-dcnode-id="4050" instrument_node="">other selves, its one-time fellows, seemed not indeed distasteful (for distastefulness was not one of the categories in terms of which I was thinking), but enormously irrelevant.” </span><br data-dcnode-id="4049"><br data-dcnode-id="4048"><span data-dcnode-id="4047" instrument_node="">“From the French window I walked out under a kind of pergola covered in part by a climbing rose tree, in part by laths, one inch wide with half an inch of space between them. The sun was shining and the shadows of the laths made a zebra-like pattern on the ground and across the seat and back of a garden chair, which was standing at this end of the pergola. That chair--shall I ever forget it? Where the shadows fell on the canvas upholstery, stripes of a deep but glowing indigo alternated with stripes of incandescence so intensely bright that it was hard to believe that they could be made of anything but blue fire. For what seemed an immensely long time I gazed without knowing, even without wishing to know, what it was that confronted me. At any other time I would have seen a chair barred with alternate light and shade. Today the precept swallowed up the concept. I was so completely absorbed in looking, so thunderstruck by what I actually saw, that I could not be aware of anything else. Garden furniture, laths, sunlight, shadow--these were no more than names and notions, mere verbalization, for utilitarian or scientific purposes, after the event. The even was this succession of azure furnace doors separated by gulfs of unfathomable gentian. It was wonderful, wonderful to the point, almost, of being terrifying.” </span><br data-dcnode-id="4046"><br data-dcnode-id="4045"><span data-dcnode-id="4044" instrument_node="">“The man who comes back through the Door in the Wall will never be quite the same as the man who went out. He will be wiser but less sure, happier but less self-satisfied, humbler in acknowledging his ignorance yet better equipped to understand the relationship of words to things, of systematic reasoning to the unfathomable mystery which it tries, forever vainly, to comprehend” </span><br data-dcnode-id="4043"><br data-dcnode-id="4042"><br data-dcnode-id="4041"><br data-dcnode-id="4040"><b data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">Kindred mirages:</span></b><br data-dcnode-id="4037"><br data-dcnode-id="4036"><a data-dcnode-id="4034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/1520801.Les_Paradis_artificiels" rel="nofollow noopener" title="Les Paradis artificiels by Charles Baudelaire"><span data-dcnode-id="4035" instrument_node="">Les Paradis artificiels</span></a><br data-dcnode-id="4033"><a data-dcnode-id="4031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/226475.Radio_Free_Albemuth" rel="nofollow noopener" title="Radio Free Albemuth by Philip K. Dick"><span data-dcnode-id="4032" instrument_node="">Radio Free Albemuth</span></a><br data-dcnode-id="4030"><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/22590.Ubik" rel="nofollow noopener" title="Ubik by Philip K. Dick"><span data-dcnode-id="4029" instrument_node="">Ubik</span></a><br data-dcnode-id="4027"><a data-dcnode-id="4025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/14817.A_Scanner_Darkly" rel="nofollow noopener" title="A Scanner Darkly by Philip K. Dick"><span data-dcnode-id="4026" instrument_node="">A Scanner Darkly</span></a><br data-dcnode-id="4024"><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/135836.Trainspotting" rel="nofollow noopener" ti </span><span data-dcnode-id="3738" id="freeTextContainer3326027304667884630"><b data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">“The man who comes back through the Door in the Wall will never be quite the same as the man who went out.”</span></b><br data-dcnode-id="3747"><br data-dcnode-id="3746"><img alt="When Aldous Huxley Opened the Doors of Perception | The MIT Press Reader" class="gr-hostedUserImg" data-dcnode-id="3745" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1644516246i/32557442._SX540_.jpg&amp;raw"><br data-dcnode-id="3744"><br data-dcnode-id="3743"><span data-dcnode-id="3742" instrument_node="">In </span><i data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">The Doors of Perception</span></i><span data-dcnode-id="3739" instrument_node="">, Aldous Huxley's approach to using mescaline (to open the doors of perception) is markedly different from mystics like Carlos Castaneda. Like Castaneda, Huxley explores both ritual and states of non-ordinary reality (to use a term from Castaneda); however, Huxley opens the doors wider as he makes comparisons to experiences of painters and writers, global spiritual</span></span><span data-dcnode-id="3737" instrument_node="">
</span><span data-dcnode-id="3714" id="freeText3326027304667884630" style="display:none"><b data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">“The man who comes back through the Door in the Wall will never be quite the same as the man who went out.”</span></b><br data-dcnode-id="3734"><br data-dcnode-id="3733"><img alt="When Aldous Huxley Opened the Doors of Perception | The MIT Press Reader" class="gr-hostedUserImg" data-dcnode-id="3732" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1644516246i/32557442._SX540_.jpg&amp;raw"><br data-dcnode-id="3731"><br data-dcnode-id="3730"><span data-dcnode-id="3729" instrument_node="">In </span><i data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">The Doors of Perception</span></i><span data-dcnode-id="3726" instrument_node="">, Aldous Huxley's approach to using mescaline (to open the doors of perception) is markedly different from mystics like Carlos Castaneda. Like Castaneda, Huxley explores both ritual and states of non-ordinary reality (to use a term from Castaneda); however, Huxley opens the doors wider as he makes comparisons to experiences of painters and writers, global spiritual traditions, schizophrenia, madness as well as the effects of other drugs. </span><br data-dcnode-id="3725"><br data-dcnode-id="3724"><span data-dcnode-id="3723" instrument_node="">I liked, for instance, how Huxley compares mescaline use to Cezanne's approach to an idealized 'not-self' that does not covet anything around itself (apparently something Cezanne was aiming for in his paintings). This more philosophical approach is apparent even when Huxley crosses Sunset Boulevard while describing his trip before (coming down) returning to "being in one's right mind." He is also more philosophical as he analyzes the urge to escape/transcend. Written in 1954, Huxley compares society's acceptance of alcohol/alcoholism and addiction to cigarettes along with the negative consequences while arguing for mescaline as less harmful to the individual user and society. For such a short work, </span><i data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Doors of Perception</span></i><span data-dcnode-id="3720" instrument_node=""> started out painfully slow, but got much more interesting especially after the first half. </span><br data-dcnode-id="3719"><br data-dcnode-id="3718"><b data-dcnode-id="3715"><span data-dcnode-id="3717" instrument_node="">"To be shaken out of the ruts of ordinary perception, to be shown for a few timeless hours the outer and the inner world, not as they appear to an animal obsessed with survival or to a human being obsessed with words and notions, but as they are apprehended, directly and unconditionally, by Mind at Large—this is an experience of inestimable value to everyone and especially to the intellectual.”</span><br data-dcnode-id="3716"></b></span><span data-dcnode-id="3713" instrument_node="">

</span><span data-dcnode-id="3626" id="freeTextContainer12213431759078101398"><span data-dcnode-id="3633" instrument_node="">This must've blown minds when it came out. Now though, it's lost its edge. </span><br data-dcnode-id="3632"><br data-dcnode-id="3631"><span data-dcnode-id="3630" instrument_node="">Full disclosure, I'm here because of The Doors...of the Jim Morrison sort. Being a HUGE fan of him and the band, I absorbed all I could of them back during my teens. I even read his poetry. Hell, I even read William Blake's poetry, simply because it apparently influenced Morrison. However, I never did get around to reading Aldous Huxley's </span><i data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">The Doors of Perception </span></i><span data-dcnode-id="3627" instrument_node="">, the book title from which the band was named. WHAT THE HEL</span></span><span data-dcnode-id="3625" instrument_node="">
</span><span data-dcnode-id="3599" id="freeText12213431759078101398" style="display:none"><span data-dcnode-id="3624" instrument_node="">This must've blown minds when it came out. Now though, it's lost its edge. </span><br data-dcnode-id="3623"><br data-dcnode-id="3622"><span data-dcnode-id="3621" instrument_node="">Full disclosure, I'm here because of The Doors...of the Jim Morrison sort. Being a HUGE fan of him and the band, I absorbed all I could of them back during my teens. I even read his poetry. Hell, I even read William Blake's poetry, simply because it apparently influenced Morrison. However, I never did get around to reading Aldous Huxley's </span><i data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">The Doors of Perception </span></i><span data-dcnode-id="3618" instrument_node="">, the book title from which the band was named. WHAT THE HELL KIND OF A FAN AM I?!?!?!</span><br data-dcnode-id="3617"><br data-dcnode-id="3616"><span data-dcnode-id="3615" instrument_node="">Well, the reasons for me not getting to it until now are even more boring and inconsequential than this sentence. The point is, I've finally read the damn book. I needn't have bothered. It's pretty much what I figured it would be and there's nothing within it I needed to know. </span><br data-dcnode-id="3614"><br data-dcnode-id="3613"><span data-dcnode-id="3612" instrument_node="">Backstory: Bookish brainiac Huxley decided to try out the cactus drug peyote. In </span><i data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">The Doors...</span></i><span data-dcnode-id="3609" instrument_node=""> he describes his trip. It's not half as interesting or entering as I'd hoped. (Here's a more entertaining, though less enlightening example: </span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DzrIPLAo0_iQ" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3608" instrument_node="">https://www.youtube.com/watch?v=zrIPL...</span></a><span data-dcnode-id="3606" instrument_node="">)</span><br data-dcnode-id="3605"><br data-dcnode-id="3604"><span data-dcnode-id="3603" instrument_node="">Nowadays this stuff is so commonplace as to make this book almost quaint. And the parts that aren't outdated, are just not interesting enough to make this a winner in my book. In fact, Huxley spends so much time, too many pages imo, on art and artists that I began to doubt the need for a book on the topic. I mean, if you've got to use filler in a 60 page novette, the book probably could've just been a lengthy article or pamphlet. I get the connection he's trying to make between the artist mind and that of one on mind-altering drugs, it's just that I don't find it all that enthralling. </span><br data-dcnode-id="3602"><br data-dcnode-id="3601"><span data-dcnode-id="3600" instrument_node="">Still and all, this has its value. Some of the points Huxley makes herein are still valid. He was clearly an intelligent, well-read man. I guess I just didn't have the same mind-expanding experience as Morrison had when reading this. </span></span><span data-dcnode-id="3598" instrument_node="">

</span><span data-dcnode-id="3505" id="freeTextContainer8986871168479964713"><span data-dcnode-id="3509" instrument_node="">I need to read more Huxley...maybe I'll finally dig in to the copy of "The Perennial Philosophy" that I've started on several times (although probably not until after "A Brief History Of Everything"...those two at the same time would be just masochistic.)</span><br data-dcnode-id="3508"><br data-dcnode-id="3507"><span data-dcnode-id="3506" instrument_node="">Although I did get a lot out of this book, the single thing that really made an impact was the discussion of our brain as a sensory-limiting mechanism which is concerned most of the time with filtering out all but what we need for survival at an</span></span><span data-dcnode-id="3504" instrument_node="">
</span><span data-dcnode-id="3490" id="freeText8986871168479964713" style="display:none"><span data-dcnode-id="3503" instrument_node="">I need to read more Huxley...maybe I'll finally dig in to the copy of "The Perennial Philosophy" that I've started on several times (although probably not until after "A Brief History Of Everything"...those two at the same time would be just masochistic.)</span><br data-dcnode-id="3502"><br data-dcnode-id="3501"><span data-dcnode-id="3500" instrument_node="">Although I did get a lot out of this book, the single thing that really made an impact was the discussion of our brain as a sensory-limiting mechanism which is concerned most of the time with filtering out all but what we need for survival at any given moment. That is how our brain has evolved and how we have risen to the top of the food chain (but look at what we eat!) We have a little more leeway these days, but what do we do with it? Watch "Rock Of Love"? We are at a point in history where we have the capability to evolve and create things beyond our wildest dreams, but we've generally made life so meaningless that most of us just consume increasingly more/"better" (more expensive) products in an attempt to fill the void staring us in the face...that is, the void that was always there, and the one we've created to forget that one. He doesn't get into all that...that's more or less my depressing rant, but perception and consciousness are important words for me...they are the keys to any kind of meaningful life and our collective future. </span><br data-dcnode-id="3499"><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node="">Part of the reason this made such an impression is that right before reading this part of the book, I was waiting on a bus, thinking that I must be getting old because I was actually early for something...it seems like not that long ago it was a small miracle if I was on time. I thought about how old people always want to be ridiculously early for everything. Then I theorized that most people go through their lives gradually concerning themselves more and more with only the mechanics of life..."Birth, School, Work, Death" in the words of The Godfathers. I'd add bills, doctors appointments, etc... </span><br data-dcnode-id="3496"><br data-dcnode-id="3495"><span data-dcnode-id="3494" instrument_node="">Then I opened the book and...vee-ola! </span><br data-dcnode-id="3493"><br data-dcnode-id="3492"><span data-dcnode-id="3491" instrument_node="">So even just in the course of an individual life, the brain gradually imposes tighter limits on itself until all you have is bills and doctors appointments. Of course, it doesn't have to be this way... </span></span><span data-dcnode-id="3489" instrument_node="">

</span><span class="readable" data-dcnode-id="3292" id="reviewTextContainer2702500623"><span data-dcnode-id="3401" instrument_node="">
</span><span data-dcnode-id="3392" id="freeTextContainer225578206451087973"><i data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">"If the doors of perception were cleansed everything would appear to man as it is, Infinite. For man has closed himself up, till he sees all things thro' narrow chinks of his cavern.”</span></i><span data-dcnode-id="3398" instrument_node=""> - William Blake</span><br data-dcnode-id="3397"><br data-dcnode-id="3396"><span data-dcnode-id="3395" instrument_node="">Aldous Huxley, a renowned writer, mainly famous for his great dystopian work, Brave New World (1931), blasts to the world his transcendental essay: The Doors of Perception, published in 1954.</span><br data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">In this philosophical essay, Huxley describes his spiritual experience with mescaline, taken one day in May 19</span></span><span data-dcnode-id="3391" instrument_node="">
</span><span data-dcnode-id="3297" id="freeText225578206451087973" style="display:none"><i data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">"If the doors of perception were cleansed everything would appear to man as it is, Infinite. For man has closed himself up, till he sees all things thro' narrow chinks of his cavern.”</span></i><span data-dcnode-id="3388" instrument_node=""> - William Blake</span><br data-dcnode-id="3387"><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node="">Aldous Huxley, a renowned writer, mainly famous for his great dystopian work, Brave New World (1931), blasts to the world his transcendental essay: The Doors of Perception, published in 1954.</span><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node="">In this philosophical essay, Huxley describes his spiritual experience with mescaline, taken one day in May 1953. The author makes a detailed description of his experience with 4/10 of a gram of this psychedelic plant. The essay elucidates his visual and spiritual awareness in spatial/time analysis, Art, Nature, Music, Religion, Sociology, Education, Philosophy and Psychology.</span><br data-dcnode-id="3382"><br data-dcnode-id="3381"><span data-dcnode-id="3380" instrument_node="">Huxley got acquainted about the use of peyote after coming to the United States in 1937. He first became conscious about the cactuses' use after reading an essay written by Humphry Osmond.</span><br data-dcnode-id="3379"><span data-dcnode-id="3378" instrument_node="">After having read Osmond's essay, he got curious about this psychedelic substance and decided to make his experiment with mescaline. Osmond arrives at Huxley's house to accompany him during his spiritual experience. After that, the author's experience was so intense that he decided to tell the tale:</span><br data-dcnode-id="3377"><br data-dcnode-id="3376"><b data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Spatial/time analysis</span></b><span data-dcnode-id="3373" instrument_node="">: "Place and distance cease to be of much interest. The mind does its perceiving in terms of intensity of existence, the profundity of significance, relationships within a pattern. I saw the books but was not at all concerned with their positions in space. What I noticed, what impressed itself upon my mind was the fact that all of them glowed with living light and that in some the glory was more manifest than in others. In this context position and the three dimensions were beside the point. Not, of course, that the category of space had been abolished."</span><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">Initially, Huxley was expecting to picture brightly colours, but as he stated, he was a "bad visualiser", however, he experiences a more detailed perception of the outer world. The "being" is not separated from "becoming" and the living moment becomes timeless like a neverending present. Colours from the outer world become more vivid and therefore visual impressions are intensified. </span><br data-dcnode-id="3370"><span data-dcnode-id="3369" instrument_node="">"I was looking at my furniture, not as the utilitarian who has to sit on chairs, to write at desks and tables, and not as the cameraman or scientific recorder, but as the pure aesthete whose concern is only with forms and their relationships within the field of vision or the picture space. But as I looked, this purely aesthetic, Cubist's-eye view gave place to what I can only describe as the sacramental vision of reality." The symbolism of the chair is destroyed, and it's perceived beyond a simple object.</span><br data-dcnode-id="3368"><br data-dcnode-id="3367"><b data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">Philosophy</span></b><span data-dcnode-id="3364" instrument_node="">: "We live together, we act on, and react to, one another; but always and in all circumstances, we are by ourselves. The martyrs go hand in hand into the arena; they are crucified alone. Embraced, the lovers desperately try to fuse their insulated ecstasies into a single self-transcendence; in vain. By its very nature, every embodied spirit is doomed to suffer and enjoy in solitude. Sensations, feelings, insights, fancies—all these are private and, except through symbols and at second hand, incommunicable. We can pool information about experiences, but never the experiences themselves. From family to nation, every human group is a society of island universes."</span><br data-dcnode-id="3363"><span data-dcnode-id="3362" instrument_node="">During Huxley's experience, the ego disappears (egolessness), thus the perception about others begins to be more lucid. Every pattern becomes one and therefore the words and symbols are removed: </span><br data-dcnode-id="3361"><span data-dcnode-id="3360" instrument_node="">"...there is an 'obscure knowledge' that All is in all—that All is each. This is as near, I take it, as a finite mind can ever come to 'perceiving everything that is happening everywhere in the universe. "</span><br data-dcnode-id="3359"><span data-dcnode-id="3358" instrument_node="">The author quotes the eminent Cambridge philosopher, Dr C. D. Broad by saying: "to enable us to live, the brain and nervous system eliminate unessential information from the totality of the 'Mind at Large". This idea explores that the human mind filters reality, and as a result of that, psychedelic drugs are an important element to remove this filter.</span><br data-dcnode-id="3357"><span data-dcnode-id="3356" instrument_node="">"We walked out into the street. A large pale blue automobile was standing at the curb. At the sight of it, I was suddenly overcome by enormous merriment. What complacency, what an absurd self-satisfaction beamed from those bulging surfaces of glossiest enamel! Men had created the thing in his own image - or rather in the image of his favourite character in fiction. I laughed till the tears ran down my cheeks." </span><br data-dcnode-id="3355"><br data-dcnode-id="3354"><b data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">Art</span></b><span data-dcnode-id="3351" instrument_node="">: Huxley reflected the following statement about the Milkmaid by Johannes Vermeer: "That mysterious artist was truly gifted with the vision that perceives the Dharma-Body as the hedge at the bottom of the garden". He states that Vermeer's paintings are magnificent examples of life within. In another hand, Cézanne's Self-portrait with a straw hat seems incredibly pretentious. These experiences prove that even by being a bad visualiser, Huxley managed to feel vivid emotions from those paintings.</span><br data-dcnode-id="3350"><br data-dcnode-id="3349"><b data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Music</span></b><span data-dcnode-id="3346" instrument_node="">: "Instrumental music, oddly enough, left me rather cold. Mozart's C-Minor Piano Concerto was interrupted after the first movement, and a recording of some madrigals by Gesualdo took its place...But, as it turned out, I was wrong. Actually, the music sounded rather funny"</span><br data-dcnode-id="3345"><span data-dcnode-id="3344" instrument_node="">Once again, Huxley's auditory perception is changed, becoming more vivid and thus his initial perception about those music works has changed.</span><br data-dcnode-id="3343"><br data-dcnode-id="3342"><b data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">Psychology</span></b><span data-dcnode-id="3339" instrument_node="">: "The schizophrenic is a soul not merely unregenerate, but desperately sick into the bargain. His sickness consists in the inability to take refuge from inner and outer reality (as the sane person habitually does) in the homemade universe of common sense - the strictly human world of useful notions shared symbols and socially acceptable conventions." </span><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">The author elucidates that Schizophrenia can be heaven and hell because those who suffer this pathology doesn't distinguish the inner world from the outer world. It's also stated that those who suffer from anxiety and periodical depression might have different experiences under the influence of mescaline. </span><br data-dcnode-id="3336"><span data-dcnode-id="3335" instrument_node="">"Most takers of mescalin experience only the heavenly part of schizophrenia."</span><br data-dcnode-id="3334"><br data-dcnode-id="3333"><b data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">Nature</span></b><span data-dcnode-id="3330" instrument_node="">: "We drove on, and so long as we remained in the hills, with view succeeding distant view, significance was at its everyday level, well below transfiguration point." </span><br data-dcnode-id="3329"><span data-dcnode-id="3328" instrument_node="">The view from the hills became abruptly lucid, just like the perspective described from those landscape painters.</span><br data-dcnode-id="3327"><br data-dcnode-id="3326"><b data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">Sociology</span></b><span data-dcnode-id="3323" instrument_node="">: "Equally unsurprising is the current attitude towards drink and smoke. In spite of the growing army of hopeless alcoholics, in spite of the hundreds of thousands of persons annually maimed or killed by drunken drivers, popular comedians still crack jokes about alcohol and its addicts... The only reasonable policy is to open other, better doors in the hope of inducing men and women to exchange their old bad habits for new and less harmful ones."</span><br data-dcnode-id="3322"><br data-dcnode-id="3321"><b data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">Religion </span></b><span data-dcnode-id="3318" instrument_node="">: "Christianity and mescalin seem to be much more compatible. This has been demonstrated by many tribes of Indians, from Texas to as far north as Wisconsin. Among these tribes are to be found groups affiliated with the Native American Church, a sect whose principal rite is a kind of Early Christian agape, or love feast, where slices of peyote take the place of the sacramental bread and wine." </span><br data-dcnode-id="3317"><span data-dcnode-id="3316" instrument_node="">Self-transcendence can be found in religion and therefore, Christianity and mescaline are well-suited for each other, however, it is unlikely to happen as Huxley stated in his essay. </span><br data-dcnode-id="3315"><span data-dcnode-id="3314" instrument_node="">"All I am suggesting is that the mescalin experience is what Catholic theologians call "a gratuitous grace," not necessary to salvation but potentially helpful and to be accepted thankfully, if made available...a human being obsessed with words and notions, but as they are apprehended, directly and unconditionally."</span><br data-dcnode-id="3313"><br data-dcnode-id="3312"><b data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Education</span></b><span data-dcnode-id="3309" instrument_node="">: "In a world where education is predominantly verbal, highly educated people find it all but impossible to pay serious attention to anything but words and notions. The non-verbal humanities, the arts of being directly aware of the given facts of our existence, are almost completely ignored." </span><br data-dcnode-id="3308"><br data-dcnode-id="3307"><span data-dcnode-id="3306" instrument_node="">Aldous Huxley managed to describe his experience in an enlightened way. He elucidated his experience in such an illuminating way that it was impossible not to quote his standpoints. The author's universalism is highly depicted in his philosophical and religious points of view. It's asserted in the essay that spiritual experiences will transform anyone for the better, and I couldn't agree more! I just personally don't agree that psychedelic drugs are well-suited for Christianity or to any religion whatsoever. Words, prayers, slogans are notions and symbols intrinsically correlated to Religion in general. Psychedelic drugs are still seen with disregard and therefore it will not be intrinsically connected to Religion. I personally believe that spirituality can be separated from Religion, but that would be a more detailed topic to discuss...</span><br data-dcnode-id="3305"><span data-dcnode-id="3304" instrument_node="">I do practice meditation, and I was tremendously curious to read this book. I found very elucidative, mind-blowing and inspiring how the details were depicted throughout the text. When I was younger, I was very sceptic about these spiritual experiences, but when I became older, I realized that these transcendental experiences are quite relevant for self-fulfilment (either with psychedelic drugs or through meditation). I recommend anyone to read this book (even to sceptics). It's undoubtedly, a mind-bending book that questions our reality and gives new paths to our general perception of the world.</span><br data-dcnode-id="3303"><br data-dcnode-id="3302"><span data-dcnode-id="3301" instrument_node="">No wonder Jim Morrison baptised his band's name "The Doors"...</span><br data-dcnode-id="3300"><br data-dcnode-id="3299"><span data-dcnode-id="3298" instrument_node="">Rating: 4.5/5 Stars</span></span><span data-dcnode-id="3296" instrument_node="">

</span><span data-dcnode-id="3195" id="freeTextContainer2072560130872839553"><span data-dcnode-id="3201" instrument_node="">I listen to CBC radio a lot, one of the side effects of not owning a television. One of the by-products of all this radio time is the addition of many books of different subject areas added to my TBR. This is one of those books. The radio show that I listened to was called High Culture, about the therapeutic use of the psychedelic drugs. If you are interested, Part One (of three) can be found here: </span><a data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/radio/ideas/high-culture-part-1-1.3280226" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3200" instrument_node="">https://www.cbc.ca/radio/ideas/high-c...</span></a><br data-dcnode-id="3198"><br data-dcnode-id="3197"><span data-dcnode-id="3196" instrument_node="">This book is apparently where The Doors got the name of th</span></span><span data-dcnode-id="3194" instrument_node="">
</span><span data-dcnode-id="3171" id="freeText2072560130872839553" style="display:none"><span data-dcnode-id="3193" instrument_node="">I listen to CBC radio a lot, one of the side effects of not owning a television. One of the by-products of all this radio time is the addition of many books of different subject areas added to my TBR. This is one of those books. The radio show that I listened to was called High Culture, about the therapeutic use of the psychedelic drugs. If you are interested, Part One (of three) can be found here: </span><a data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/radio/ideas/high-culture-part-1-1.3280226" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3192" instrument_node="">https://www.cbc.ca/radio/ideas/high-c...</span></a><br data-dcnode-id="3190"><br data-dcnode-id="3189"><span data-dcnode-id="3188" instrument_node="">This book is apparently where The Doors got the name of their band, not surprising in the swinging sixties when psychedelics were prevalent. What I found intriguing was the use of mescaline by an author that I was familiar with and with a Canadian connection. His dose of the drug was supplied by a doctor at a Canadian hospital and that same doctor supervised his first experience. (Dr. Humphrey Osmond, a British doctor working at the Weyburn Mental Hospital in Weyburn, Saskatchewan).</span><br data-dcnode-id="3187"><br data-dcnode-id="3186"><span data-dcnode-id="3185" instrument_node="">I found it interesting that in his </span><a data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/5129.Brave_New_World" rel="nofollow noopener" title="Brave New World by Aldous Huxley"><span data-dcnode-id="3184" instrument_node="">Brave New World</span></a><span data-dcnode-id="3182" instrument_node=""> (1932) Huxley wrote about a drug called Soma which the people in his world used to escape unpleasantness. It was written well before this mescaline experiment (1953) but it informs his willingness to try the drug. Until reading this, I was unaware of Huxley's interest in Eastern religions. That background too would make his desire to experiment understandable. </span><br data-dcnode-id="3181"><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">Subjective experiences like these are difficult to measure or quantify, so this attempt to observe his own mystic experience scientifically is interesting. Perhaps it was motivated by the influence of his grandfather Thomas Henry Huxley and two siblings who were all involved in the biological sciences. </span><br data-dcnode-id="3178"><br data-dcnode-id="3177"><span data-dcnode-id="3176" instrument_node="">I've never had any inclination towards any kind of drug use, but after reading this book and listening to the 3 radio programs, I wouldn't hesitate to try psilocybin if I was offered a serene environment and an experienced supervisor. (But, as both Huxley and one of the interviewed psychologists say, without those two conditions the trip can go drastically wrong.) The aboriginal people who use peyote do so in supportive groups and they have been using it successfully for hundreds of years. </span><br data-dcnode-id="3175"><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">A fascinating glimpse into our collective unconscious. </span><br data-dcnode-id="3172"></span><span data-dcnode-id="3170" instrument_node="">

</span><span data-dcnode-id="2953" id="freeTextContainer13876054046205534386"><span data-dcnode-id="2957" instrument_node="">Huxley. Not on my list of great writers, but an interesting person with ideas. </span><br data-dcnode-id="2956"><br data-dcnode-id="2955"><span data-dcnode-id="2954" instrument_node="">There are more illuminating books on psychoactive substances, but this would perform well as a primer for those completely brainwashed into thinking that drug-takers are dazed hippies. I see them/us as *seekers*, people seeking to believe in something they can see and experience in an age where we don't take words like mind, soul, reason for granted anymore. This is exactly the point of view Huxley uses here. Also, im</span></span><span data-dcnode-id="2952" instrument_node="">
</span><span data-dcnode-id="2942" id="freeText13876054046205534386" style="display:none"><span data-dcnode-id="2951" instrument_node="">Huxley. Not on my list of great writers, but an interesting person with ideas. </span><br data-dcnode-id="2950"><br data-dcnode-id="2949"><span data-dcnode-id="2948" instrument_node="">There are more illuminating books on psychoactive substances, but this would perform well as a primer for those completely brainwashed into thinking that drug-takers are dazed hippies. I see them/us as *seekers*, people seeking to believe in something they can see and experience in an age where we don't take words like mind, soul, reason for granted anymore. This is exactly the point of view Huxley uses here. Also, imagining the guy hunching next to the bamboo legs of a chair whilst gazing at them with childlike delight is a nice little visual. </span><br data-dcnode-id="2947"><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">Read it, it'll only take you one evening. Keep an art book/laptop at hand- there are quite a few references to works of art that you might want to see.</span><br data-dcnode-id="2944"><br data-dcnode-id="2943"></span><span data-dcnode-id="2941" instrument_node="">

</span><span data-dcnode-id="2520" id="freeText12588335310186896723" style="display:none"><blockquote data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Thus it came about that, one bright May morning, four-tenths of a gram of mescaline dissolved in half a glass of water and sat down to wait for the results.</span></blockquote><br data-dcnode-id="2526"><br data-dcnode-id="2525"><span data-dcnode-id="2524" instrument_node="">What ensues is a description of the experience written retroactively, with the help of taped conversations taken at the time, and interspersed with commentary on art, philosophy, and the usefulness (and abuse) of drugs in reaching altered states. Some themes:&nbsp;mind as a valve that regulates how much the chaos and infinity of the universe we can access (without the valve we'd be swamped); perception of time and space; mind and body separation; exploration of visual changes brought upon by mescaline (less so the other senses); art and what it means to be a visionary; specific references to painters (Van Gogh chiefly), the attraction of draperies, patterns and colours.</span><br data-dcnode-id="2523"><br data-dcnode-id="2522"><span data-dcnode-id="2521" instrument_node="">Ultimately, it felt rather broken up, mystical, and chaotic—a little like the high he describes and perhaps deliberately so. To the detriment of the reader, however.</span></span><span data-dcnode-id="2519" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/57003346-matthew-ted%3Fshelf%3Dlit-british"><span data-dcnode-id="2174" instrument_node="">lit-british</span></a><span data-dcnode-id="2172" instrument_node="">,

</span><span data-dcnode-id="2149" id="freeTextContainer17904857101174708612"><span data-dcnode-id="2162" instrument_node="">This is the review copied from my review of </span><i data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">The Doors of Perception and Heaven and Hell</span></i><span data-dcnode-id="2159" instrument_node=""> which I read earlier this year, both combined in one book - that review can be found </span><a data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2825467830%3Fbook_show_action%3Dfalse%26from_review_page%3D1" rel="nofollow noopener"><span data-dcnode-id="2158" instrument_node="">here.</span></a><span data-dcnode-id="2156" instrument_node=""> Otherwise, below is solely for </span><i data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">The Doors of Perception</span></i><span data-dcnode-id="2153" instrument_node="">.</span><br data-dcnode-id="2152"><br data-dcnode-id="2151"><span data-dcnode-id="2150" instrument_node="">Huxley takes 4/10 of a gram of mescaline and writes about the experience. Mescalin is comparable with LSD. I wasn't expecting much from the writings of his 'experience' but I found it fascinating. Of course, the world is more desensitised to drugs now; on the whole,</span></span><span data-dcnode-id="2148" instrument_node="">
</span><span data-dcnode-id="2109" id="freeText17904857101174708612" style="display:none"><span data-dcnode-id="2147" instrument_node="">This is the review copied from my review of </span><i data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">The Doors of Perception and Heaven and Hell</span></i><span data-dcnode-id="2144" instrument_node=""> which I read earlier this year, both combined in one book - that review can be found </span><a data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2825467830%3Fbook_show_action%3Dfalse%26from_review_page%3D1" rel="nofollow noopener"><span data-dcnode-id="2143" instrument_node="">here.</span></a><span data-dcnode-id="2141" instrument_node=""> Otherwise, below is solely for </span><i data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">The Doors of Perception</span></i><span data-dcnode-id="2138" instrument_node="">.</span><br data-dcnode-id="2137"><br data-dcnode-id="2136"><span data-dcnode-id="2135" instrument_node="">Huxley takes 4/10 of a gram of mescaline and writes about the experience. Mescalin is comparable with LSD. I wasn't expecting much from the writings of his 'experience' but I found it fascinating. Of course, the world is more desensitised to drugs now; on the whole, we are more familiar with them, their effects, but I still found Huxley's work insightful, even humorous at times, as he stares fascinated at the folds in his clothes, or at flowers. These are the best bits, I think. </span><br data-dcnode-id="2134"><br data-dcnode-id="2133"><i data-dcnode-id="2125"><span data-dcnode-id="2132" instrument_node="">Visual impressions are greatly intensified and the eye recovers some of the perceptual innocence of childhood, when the sensum was not immediately and automatically subordinated to the concept. Interest in space is diminished and interest in time falls almost to zero.</span><br data-dcnode-id="2131"><br data-dcnode-id="2130"><span data-dcnode-id="2129" instrument_node="">Though the intellect remains unimpaired and though perception is enormously improved, the will suffers a profound change for the worse. The mescalin taker sees no reason for doing anything in particular and finds most of the causes for which, at ordinary times, he was prepared to act and suffer, profoundly uninteresting. He can't be bothered with them, for the good reason that he has better things to think about.</span><br data-dcnode-id="2128"><br data-dcnode-id="2127"><span data-dcnode-id="2126" instrument_node="">Man's highly developed colour sense is a biological luxury- inestimably precious to him as an intellectual and spiritual being, but unnecessary to his survival as an animal.</span></i><br data-dcnode-id="2124"><br data-dcnode-id="2123"><span data-dcnode-id="2122" instrument_node="">Huxley has the recordings of his conversations with the investigator. He kept saying, over and over,</span><i data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node=""> 'This is how one ought to see.'</span></i><br data-dcnode-id="2119"><br data-dcnode-id="2118"><span data-dcnode-id="2117" instrument_node="">These are my favourite two observations from Huxley -</span><br data-dcnode-id="2116"><br data-dcnode-id="2115"><i data-dcnode-id="2110"><span data-dcnode-id="2114" instrument_node="">The legs, for example of that chair- how miraculous their tubularity, how supernatural their polished smoothness! I spent several minutes- or was it several centuries?- not merely gazing at those bamboo legs, but actually being them- or rather being myself in them</span><br data-dcnode-id="2113"><br data-dcnode-id="2112"><span data-dcnode-id="2111" instrument_node="">At this stage in the proceedings I was handed a large coloured reproduction of the well-known self portrait by Cezanne- the head and shoulders of a man in a large straw hat, red-cheeked, red-lipped, with rich black whiskers and a dark unfriendly eye. It is a magnificent painting; but it was not as a painting that I now saw it. For the head promptly took on a third dimension and came to life as a small goblin-like man looking out through a window in the page before me. I started to laugh. And when they asked me why, 'What pretensions!' I kept repeating. 'Who on earth does he think he is?' The question was not addressed to Cezanne in particular, but to the human species at large. Who did they all think they were?</span></i></span><span data-dcnode-id="2108" instrument_node="">
