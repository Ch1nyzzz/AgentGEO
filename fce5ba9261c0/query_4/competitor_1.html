</span><p data-dcnode-id="1355"><span data-dcnode-id="1374" instrument_node="">To understand what BIPOC means, it’s necessary to look at the events of the past year. There is, without a doubt, a powerful anti-racism movement underway in the United States and </span><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/protest-photos-show-global-solidarity-against-racial-injustice/"><span data-dcnode-id="1373" instrument_node="">around the world</span></a><span data-dcnode-id="1371" instrument_node="">. Since the murder of George Floyd in May 2020, people have taken to the streets en masse, demanding everything from police reform to legislative action. Black, Indigenous, Latinx, and AAPI activists and their allies are tackling societal prejudices and </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/institutional-racism/"><span data-dcnode-id="1370" instrument_node="">institutional racism</span></a><span data-dcnode-id="1368" instrument_node=""> head-on and banding together to affirm that Black Lives Matter, to demand that Native Americans get a proverbial seat at the table, to stop </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/anti-asian-racism-violence-pandemic/"><span data-dcnode-id="1367" instrument_node="">hate crimes against Asian Americans</span></a><span data-dcnode-id="1365" instrument_node="">, and to show that the discrimination the </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/latino-hispanic-and-latinx/"><span data-dcnode-id="1364" instrument_node="">Latinx</span></a><span data-dcnode-id="1362" instrument_node=""> community faces is much broader than problematic immigration policies. If you want to </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/what-it-means-to-be-an-ally/"><span data-dcnode-id="1361" instrument_node="">be an ally</span></a><span data-dcnode-id="1359" instrument_node=""> in the movement toward equality, as well as be able to identify and address subtle </span><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/what-are-microaggressions/"><span data-dcnode-id="1358" instrument_node="">microaggressions</span></a><span data-dcnode-id="1356" instrument_node="">, there’s a lot you need to know—including the proper terminology to use when discussing the affected communities.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1353" instrument_node="">Naturally, as people’s understanding evolves regarding the role that racism plays in society and institutions, so does the language they use to describe these communities. It’s not surprising, then, that the centuries-old term </span><em data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">people of color</span></em><span data-dcnode-id="1350" instrument_node="">—which, according to </span><em data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">The Am</span></em><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">erican Heritage</span></em><span data-dcnode-id="1345" instrument_node=""> style guide, was first cited in the 1796 edition of </span><em data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">The Oxford English Dictio</span></em><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">nary</span></em><span data-dcnode-id="1340" instrument_node=""> with the British spelling of&nbsp;</span><em data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">colour</span></em><span data-dcnode-id="1337" instrument_node="">—is often short-handed these days with the acronym POC or completely supplanted by BIPOC. But what is BIPOC’s actual meaning, and when should you use this term? It’s not as straightforward as you might think, and, in fact, its usage can be surprisingly loaded. Once you’re up to speed, you’ll also want to learn more about&nbsp;</span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/blm-meaning/"><span data-dcnode-id="1336" instrument_node="">BLM’s meaning</span></a><span data-dcnode-id="1334" instrument_node=""> and history.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><h2 data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">What is BIPOC?</span></h2><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1328" instrument_node="">According to advocacy organization The BIPOC Project, BIPOC is an </span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/acronym-examples/"><span data-dcnode-id="1327" instrument_node="">acronym</span></a><span data-dcnode-id="1325" instrument_node=""> for Black, Indigenous, and People of Color, and the term is meant to “highlight the unique relationship to Whiteness that Indigenous and Black (African Americans) people have.” But BIPOC’s definition is a little more complicated than that, explains Rob Buscher, an adjunct professor in the Asian American Studies Program at the University of Pennsylvania. “I’ve heard it mean two different things, so it’s important to make a distinction: Are we talking about Black and Indigenous persons of color, or are we talking about Black, Indigenous, and persons of color? Because some people mean that exclusively to talk about Black and Indigenous communities,” he says. “I don’t know that there’s a consensus about what it means.”</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1322" instrument_node="">Some people also believe that the term is redundant, which further confuses BIPOC’s meaning. “For me, Black and Indigenous people </span><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">are</span></em><span data-dcnode-id="1319" instrument_node=""> people of color,” says linguist Tracey Weldon, PhD, a professor and the interim dean of the graduate school and vice provost for graduate education at the University of South Carolina. “So, both definitions carry an element of redundancy.”</span></p><div data-dcnode-id="1317" data-nativo-placement-id="1095008" id="article_nativo1"></div><span data-dcnode-id="1316" instrument_node="">
</span><h2 class="" data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">The benefits of using BIPOC</span></h2><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Regardless of whether BIPOC is redundant or lacks consensus about its definition, activist Allie Young considers it a plus that the term is even being spoken. Young is the founder of Protect the Sacred, a grassroots organization that advocates on behalf of and serves the Navajo Nation, and she thinks the fact that a widely used acronym centers Indigenous people in its construct is an important step forward. “For me, as an Indigenous person, I actually like the term because it names Indigenous people,” she explains. “We’re often left out of the conversation [and face] invisibility every day. And so, to be named and specified in BIPOC, for me, is significant.”</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Buscher adds that because BIPOC has become part of the lexicon of activism, Indigenous people are now more often part of conversations about institutional racism in the United States. That is progress in and of itself. “Unless you live in a place that has a reservation nearby,” he says, “most people don’t think about Native Americans at all—full stop.”</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1306" instrument_node="">It’s also about solidarity and the commitment of mutual support by activists from different ethnic backgrounds. As they say, there is strength in numbers, and that’s important for all members of these communities, but perhaps even more so for Native Americans, who, through BIPOC’s meaning, are included in the broader fight for social justice in a way that the terms </span><em data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">peo</span></em><em data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">ple </span></em><em data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">o</span></em><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">f color</span></em><span data-dcnode-id="1297" instrument_node=""> and </span><em data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">P</span></em><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">O</span></em><em data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">C</span></em><span data-dcnode-id="1290" instrument_node=""> do not directly indicate. “It’s important, especially as we’re up against things like voter suppression right now,” Young says. “I’m a strong believer in allyship and solidarity. When we join forces that way, we’re even stronger.”</span></p><div class="ad" data-ad-responsive-sizes="{&quot;mobile&quot;:[[300,250],[3,3]]}" data-ad-slot-name="/article/content_1" data-ad-targeting="{&quot;tf&quot;:&quot;btf&quot;,&quot;pos&quot;:&quot;content_1&quot;,&quot;location&quot;:&quot;top&quot;}" data-dcnode-id="1288" id="ad6266be2c3c1b3"></div><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1281"><strong data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">RELATED:</span></strong><span data-dcnode-id="1284" instrument_node=""> </span><a data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/why-you-should-stop-saying-i-dont-see-color/"><span data-dcnode-id="1283" instrument_node="">Why You Should Stop Saying “I Don’t See Color”</span></a></p><span data-dcnode-id="1280" instrument_node="">
</span><h2 class="" data-dcnode-id="1276"><span data-dcnode-id="1279" instrument_node="">Some people take offense to the term </span><em data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">people of color</span></em></h2><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">While Weldon prefers descriptors like People of Color, or Scholars of Color, because she views BIPOC as a generational term used more by young progressives, she still thinks BIPOC is necessary in certain contexts and recognizes that some people may prefer it. She cautions, though, that BIPOC should not replace the individual words that comprise it.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1271" instrument_node="">“I’m mindful that some people take offense to [the term] </span><em data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">people of color</span></em><span data-dcnode-id="1268" instrument_node=""> and perhaps think it’s not broad enough. But I think there’s probably room for both,” she says. “I don’t necessarily know that they need to compete against one another. That’s the fun thing to linguists. I’m always fascinated when terms gain currency to sort of see what the life span is and what its experience is during that life span. It’s still very much in progress and still unfolding, so we have to kind of wait and see where it goes.”</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1265" instrument_node="">For now, it’s too early to know whether BIPOC will have longevity. Experts debate exactly when the term became part of the vernacular, but it has certainly gained widespread traction within the last two years and especially over the last year, after the COVID-19 pandemic and the death of George Floyd. Its popularity likely resulted from the media, elected officials, and increased conversations about and action around race and race relations. That said, the</span><em data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node=""> New York Times</span></em><span data-dcnode-id="1262" instrument_node=""> traced perhaps its first usage back to a 2013 tweet by a Toronto-based queer, safe-sex activist group. Regardless of when or where people began using the term, its very existence signals its cultural importance in ongoing debates about race, </span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/equality-vs-equity/"><span data-dcnode-id="1261" instrument_node="">equity</span></a><span data-dcnode-id="1259" instrument_node="">, justice, and inclusion.</span></p><div data-dcnode-id="1257" data-nativo-placement-id="1118520" id="article_nativo2"></div><span data-dcnode-id="1256" instrument_node="">
</span><p class="" data-dcnode-id="1250"><strong data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">RELATED:</span></strong><span data-dcnode-id="1253" instrument_node=""> </span><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/black-or-african-american-which-term-you-should-be-using/"><span data-dcnode-id="1252" instrument_node="">Black or African American: Which Term You Should Be Using</span></a></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1242"><img alt="paper cutouts of diverse hands coming together. bipoc." class="size-large wp-image-1543057 alignnone lazyloaded" data-dcnode-id="1248" data-ll-status="loaded" data-recalc-dims="1" height="467" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg%3Ffit%3D680%2C454&amp;raw" srcset="https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=1024,683 1024w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=300,200 300w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=768,512 768w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=568,379 568w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=1536,1024 1536w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=2048,1366 2048w" width="700"><noscript data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">&lt;img loading="lazy" class="size-large wp-image-1543057 alignnone" src="https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?fit=680,454" alt="paper cutouts of diverse hands coming together. bipoc." width="700" height="467" srcset="https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=1024,683 1024w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=300,200 300w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=768,512 768w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=568,379 568w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=1536,1024 1536w, https://www.rd.com/wp-content/uploads/2020/06/GettyImages-1139106674.jpg?resize=2048,1366 2048w" sizes="(max-width: 700px) 100vw, 700px" data-recalc-dims="1" /&gt;</span></noscript><span class="credits-overlay" data-dcnode-id="1243"><span class="image-credit noskim" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">MissTuni/Getty Images</span></span></span></p><span data-dcnode-id="1241" instrument_node="">
</span><h2 class="" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Language has immense power</span></h2><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">“Language is a funny thing. It reflects things that are happening in society,”&nbsp;says Weldon, adding that it can sometimes even shape public perception and effect larger change.&nbsp;“It’s hard to say where we are with regard to [that], but I would hope that having that kind of language at least reflects some efforts to acknowledge the shared struggle.”</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">At the same time, Weldon acknowledges some people who belong to the groups included under the BIPOC umbrella may reject it because they believe the acronym can mask the differences of the communities named if not used correctly. “If you’re in a context where you’re really referring to Black people, but you’re saying BIPOC, then it becomes almost a euphemism, a way of avoiding terms that may be seen as more controversial,” she explains. “And that has the effect of perpetuating stereotypes against the very group that we’re trying to uplift.” That’s an additional problem, she adds, because euphemisms can amplify the stigma of the terms they are used to avoid.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1231" instrument_node="">“Is it that people don’t even want to say the word </span><em data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Black American</span></em><span data-dcnode-id="1228" instrument_node=""> or </span><em data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Indigenous</span></em><span data-dcnode-id="1225" instrument_node=""> or </span><em data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">person of color</span></em><span data-dcnode-id="1222" instrument_node="">?” asks Buscher. “That was the feeling that I started to get from people saying POC, not even person of color, and I noticed that that was happening a lot in mainstream discourse, in the news media, and in academia. In America, we’ve had so many historic wrongs, and we always used euphemistic language to cover it up.”</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">Buscher points to the United States’ forced relocation and mass incarceration of Japanese Americans during World War II as an example of how language can be used to </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/what-whitewashing-means-and-why-its-a-problem/"><span data-dcnode-id="1218" instrument_node="">whitewash</span></a><span data-dcnode-id="1216" instrument_node=""> history. While history talks of “internment camps,” the Geneva Convention defines that specific term as camps for enemy nationals. In fact, he says, the camps that held Japanese Americans were technically concentration camps, though people shy away from that term for obvious reasons. “I know it’s painful sometimes to use the specific language. Language has real power. Words have power, especially something that carries such harmful, difficult, dark meaning of the history of oppression,” Buscher explains. “But, at the same time, unless we’re willing to face that head-on, I don’t think that we can really overcome racism on an institutional level.”</span></p><div class="ad" data-ad-responsive-sizes="{&quot;mobile&quot;:[[300,250],[3,3]]}" data-ad-slot-name="/article/content_2" data-ad-targeting="{&quot;tf&quot;:&quot;btf&quot;,&quot;pos&quot;:&quot;content_2&quot;,&quot;location&quot;:&quot;middle&quot;}" data-dcnode-id="1214" id="ad6266be2c3c809"></div><span data-dcnode-id="1213" instrument_node="">
</span><p class="" data-dcnode-id="1207"><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">RELATED:</span></strong><span data-dcnode-id="1210" instrument_node=""> </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/white-people-helping-people-of-color-is-part-of-the-problem/"><span data-dcnode-id="1209" instrument_node="">Why White People “Helping” People of Color Is Actually Part of the Problem</span></a></p><span data-dcnode-id="1206" instrument_node="">
</span><h2 class="" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">When to stay general and when to get specific</span></h2><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">While BIPOC can be useful when making generalizations, those generalizations can sometimes be counter-productive because even within one group, people’s experiences can be so diverse. For example, notes Buscher, even if an Asian American were forced out of his country because of violence and came here as a refugee, that experience is very different than that of an Indigenous person whose lands were seized by settlers. So, while the broadness of BIPOC’s meaning is useful when you want to describe the collective discrimination certain groups face, it’s essential to remember that the included communities have different histories and different experiences with racism and that they suffer different consequences as a result.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Similarly, Young maintains that it’s important to consider a community’s history when choosing what language to use to describe that community and its struggles. “Each of our communities has experienced different forms of violence throughout history, and our history is so diverse,” she explains. “As native people, we’re asking non-native folks to learn the names of our tribes, and that’s what we prefer. In that sense, overusing BIPOC would lump us in there and set us back in our goal of teaching the rest of the world about the diversity of native people.”</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Buscher looks at it this way: “Using the term BIPOC to say Black and Indigenous persons of color is probably more valuable than using it as an umbrella term for all people of color if it’s specifically [being used to refer to] the issues we have to reckon with, the foundational sins of our country.” He notes that the history of slavery and the displacement of Native Americans is truly at the center of this, despite the racism and hardships experienced by other minority communities. The bottom line: While it’s all problematic, it’s not all the same. “It’s important to be able to use the words that make sense in context, in the movement and in broader conversations in public.”</span></p><div data-dcnode-id="1194" data-nativo-placement-id="1118521" id="article_nativo3"></div><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1192" instrument_node="">But, overall, deciding which term to use depends on the context and nuance. For example, Buscher says, “if you’re talking about the danger that Black Americans face from the police or talking about the overall institutional prejudice against Black people and darker-skinned people, saying BIPOC is not getting you any closer to eradicating that issue.” Instead, Young suggests reserving BIPOC to describe gatherings of people or representatives of those communities coming together. But for specific groups, specific terms should be used. “We need to talk about all of our communities and name our communities,” she says, “instead of lumping us in one category.” Next, find out more </span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/small-ways-you-can-fight-racism-every-day/"><span data-dcnode-id="1191" instrument_node="">ways you can fight racism every day</span></a><span data-dcnode-id="1189" instrument_node="">.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1184"><strong data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Sources:</span></strong></p><span data-dcnode-id="1183" instrument_node="">
</span><ul data-dcnode-id="1156"><span data-dcnode-id="1182" instrument_node="">
