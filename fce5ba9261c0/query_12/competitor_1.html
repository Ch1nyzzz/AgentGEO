</span><div class="nav_ribbon" data-dcnode-id="366" id="personal_colour"><span data-dcnode-id="385" instrument_node="">
</span><h3 data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Personal Colour</span></h3><span data-dcnode-id="382" instrument_node="">
</span><ul data-dcnode-id="368"><span data-dcnode-id="381" instrument_node="">
</span><li data-dcnode-id="378"><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/your-personal-palette-in-fashion"><span data-dcnode-id="380" instrument_node="">Your Personal Palette In Fashion</span></a></li><span data-dcnode-id="377" instrument_node="">
</span><li data-dcnode-id="374"><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/colour-in-your-home"><span data-dcnode-id="376" instrument_node="">Colour In Your Home</span></a></li><span data-dcnode-id="373" instrument_node="">
</span><li class="end_row" data-dcnode-id="370"><a data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/find-an-accredited-colourist"><span data-dcnode-id="372" instrument_node="">Find An Accredited Colourist</span></a></li><span data-dcnode-id="369" instrument_node="">

</span></div><span data-dcnode-id="363" instrument_node="">
</span><div class="entry" data-dcnode-id="25" id="main_content_container"><span data-dcnode-id="362" instrument_node="">
</span><div class="text" data-dcnode-id="64"><span data-dcnode-id="361" instrument_node="">
</span><div data-dcnode-id="66"><span data-dcnode-id="360" instrument_node="">
</span><h1 data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">History Of Colour</span></h1><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">"A world without colour is not just a drab and dreary 
            world, it is also a dangerous, unpredictable world in which it is 
            easy to be poisoned. Colour� is in some way telling us about the chemical 
            composition of objects � if you like, a form of psychological spectroscopy. 
            That colour alone is the principal cue to composition is easily seen 
            by changing the colour of objects and observing our response to them."</span></p><span data-dcnode-id="354" instrument_node="">
</span><pv align="right" data-dcnode-id="67"><span data-dcnode-id="353" instrument_node="">Chris McManus, MA, MD, PhD</span><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">
    Professor of Psychology</span><br data-dcnode-id="350"><span data-dcnode-id="349" instrument_node="">
    University College, London</span><br data-dcnode-id="348"><span data-dcnode-id="347" instrument_node="">
    From the foreword to </span><em data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">The Beginner's Guide to Colour Psychology</span></em><p data-dcnode-id="344"></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Over more than two thousand years, there has been, 
    and continues to be, a wealth of wonderful work contributing to our 
    understanding of colour. This is an outline of the best-known chapters 
    in the story of colour, and places the development of the Colour Affects 
    System in context.</span></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">There has never been a time when colour did not fascinate humanity 
    and it has always been regarded as one of life's greatest mysteries. 
    Every civilisation had (and still has today) its myths and associations 
    with colour, but oddly, none of them has named many colours. In the 
    1960s anthropologists Berlin and Kay conducted a worldwide study of 
    colour naming. Many languages only contained two colour terms, equivalent 
    to white (light) and black (dark). Of 98 languages studied, the highest 
    number of basic colour terms was to be found in English - where we 
    have eleven: black, white, red, orange, yellow, green, blue, purple, 
    pink, grey and brown. The other millions of colours have 'borrowed' 
    names, based on examples of them, such as avocado, grape, peach, tan, 
    gold, etc.</span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="329"><strong data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">350BC - 1500 A.D.</span></strong><br data-dcnode-id="334"><span data-dcnode-id="333" instrument_node="">
    The great philosopher, </span><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Aristotle</span></strong><span data-dcnode-id="330" instrument_node="">, in the fourth century BC, considered 
    blue and yellow to be the true primary colours, relating as they do 
    to life's polarities: sun and moon, male and female, stimulus and 
    sedation, expansion and contraction, out and in, yang and yin. Furthermore, 
    he associated colours with the four elements: fire, water, earth and 
    air. He observed the way light changes throughout the day, and from 
    this study, developed a linear colour system that ranged from the 
    white light of midday through to the black of midnight.</span></p><span data-dcnode-id="328" instrument_node="">
</span><div align="center" data-dcnode-id="326"><img data-dcnode-id="327" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/aristotle.gif&amp;raw"></div><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node=""> (Whilst green would appear to be out of place in this sequence, many 
    photographs are available that show a green glow at sunset.).</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Artists universally adopted his principles and applied them for two 
    thousand years, until Newton's discoveries in the seventeenth and 
    eighteenth centuries replaced them in general colour theory.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="315"><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Hippocrates</span></strong><span data-dcnode-id="316" instrument_node="">, the father of medical practice, was a contemporary of 
    Aristotle (who apparently did not have a very high opinion of him). 
    He used colour extensively in medicine and recognised, for example, 
    that the therapeutic effects of a white violet would be quite different 
    from those of a purple (violet) one.</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="313" instrument_node="">Another medical man, </span><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Avicenna</span></strong><span data-dcnode-id="310" instrument_node=""> in the eleventh century, in what is 
    now Iran, believed that a person's physical colouring would indicate 
    that person's predisposition to various diseases and always took account 
    of the patient's colouring in diagnosis (which strongly resonates 
    with Colour Affects� 21st century ideas).</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="300"><strong data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">1500 � 1650 A.D</span></strong><br data-dcnode-id="305"><span data-dcnode-id="304" instrument_node="">
    Aristotle�s theories held sway and were the basis of all artistic 
    endeavour, for almost two thousand years until the Renaissance. In 
    the fifteenth century the famous Swiss doctor, von Hohenheim, known 
    as </span><strong data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Paracelsus</span></strong><span data-dcnode-id="301" instrument_node="">, (1493 � 1541) travelled extensively and his methods 
    were considered highly controversial - he received more attention 
    at the time than Copernicus. He placed particular importance on the 
    role of colour in healing. Interestingly, he was a contemporary of 
    not just Copernicus, but Martin Luther, Leonardo da Vinci and many 
    other famous figures of the Renaissance - so his life and learning 
    were conducted in an atmosphere of great transition in thought.</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">The greatest contributions to our understanding of colour historically 
    came from men whose work combined science and mathematics with art, 
    metaphysics and theology - indeed the sum of human study. However, 
    in the fifteenth century, with the arrival of humanist thinking, and 
    Martin Luther, there was tremendous intellectual upheaval. The Church 
    lost its grip on education and many disciplines 'went their own way' 
    - leading to the virtual separation of art from science. Further study 
    of colour appears to have been placed in the 'Science' camp. Artists 
    were deemed to be born with an instinct for it.</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="295" instrument_node="">Physicist </span><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Franciscus Aguilonius</span></strong><span data-dcnode-id="292" instrument_node=""> believed he had used scientific research 
    to dispute Aristotle�s theory. He devised a more ordered three-colour 
    system based on red, yellow and blue which became the forerunner of 
    other systems that function in a similar way. At the same time (c1611), 
    a Finnish born astrologer, priest and neo-Platonist, </span><strong data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Aron Sigfrid 
    Forsius</span></strong><span data-dcnode-id="289" instrument_node="">, concluded from his studies into colour theory that colours 
    could be brought into a special order. He developed a system that 
    began with five main median colours, red, yellow, green, blue and 
    grey, and graded these as being closer to white or closer to black.</span></p><span data-dcnode-id="287" instrument_node="">
</span><div align="center" data-dcnode-id="283"><img data-dcnode-id="286" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/forsius.gif&amp;raw"><br data-dcnode-id="285"><span data-dcnode-id="284" instrument_node="">
    Forsius� Colour Sphere</span></div><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node=""> In illustrating his system of grading colours, it is believed that 
    Forsius constructed the first drawn colour system.</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="271"><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">1560 � 1900AD</span></strong><br data-dcnode-id="276"><span data-dcnode-id="275" instrument_node="">
    In 1672, the great scientist, </span><strong data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Sir Isaac Newton</span></strong><span data-dcnode-id="272" instrument_node="">, published his first, 
    controversial paper on colour, and forty years later, his work 'Opticks'. 
    When Newton shone white light through a triangular prism, he found 
    that wavelengths of light refracted at different angles, enabling 
    him to see the separate components � the colours of the spectrum, 
    the rainbow. (He was able to shine them back through a prism and achieve 
    white light again, but unable to see any further breakdown if he shone 
    a single colour through a prism.)</span></p><span data-dcnode-id="270" instrument_node="">
</span><div align="center" data-dcnode-id="268"><img data-dcnode-id="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/prism.gif&amp;raw"></div><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node=""> By taking the violet end of the spectrum and linking it to the start 
    point (red), Newton created the first colour wheel.</span></p><span data-dcnode-id="264" instrument_node="">
</span><div align="center" data-dcnode-id="259"><img data-dcnode-id="263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/newton_wheel.gif&amp;raw"><span data-dcnode-id="262" instrument_node=""> </span><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">
    Newton�s colour wheel and a modern equivalent</span></div><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="257" instrument_node="">One of the history's greatest minds was that of </span><strong data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Johannes Wolfgang 
    von Goethe</span></strong><span data-dcnode-id="254" instrument_node=""> - who completely disagreed with Newton's interpretations 
    of his own findings. Goethe's 'Theory of Colours', (written in 1810, 
    translated into English in 1840 and still in print) disputes that 
    Newton's prism experiments proved that light splits into its component 
    colours. He felt that if Newton was right, then white light should 
    split under all kinds of circumstances but when he himself shone white 
    light on to a screen in a room, he found that the centre of the image 
    remained white and colours appeared only at the edges. This led him 
    back to Aristotle's ideas; blue is the first colour to appear out 
    of darkness (and most visible at night) and yellow is the first colour 
    to appear out of light (and the most visible colour in light conditions). 
    Hence, for example, our perception of the sun, where we are effectively 
    looking at white light, as yellow and the sky, where we are looking 
    into the vast blackness of space, as blue.</span></p><span data-dcnode-id="252" instrument_node="">
</span><div align="center" data-dcnode-id="247"><img data-dcnode-id="251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/goethe.gif&amp;raw"><span data-dcnode-id="250" instrument_node=""> </span><br data-dcnode-id="249"><span data-dcnode-id="248" instrument_node="">
    Goethe�s Triangle</span></div><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="245" instrument_node="">Whereas Newton�s studies into colour were scientifically based, Goethe 
    was more interested in the psychological effects of colour. He believed 
    that it was important to understand the human reaction to colour and 
    his research marks the beginning of modern colour psychology. Nevertheless, 
    for almost three hundred years after Newton, all further work with 
    colour was essentially concerned with appearance and vision - and 
    most of it strictly scientific.</span><br data-dcnode-id="244"><span data-dcnode-id="243" instrument_node="">
    However, there was one shining example of scientific study leading 
    to great strides in art - the work of Chevreul, the nineteenth century 
    French chemist who, in studying the chemistry of dyeing, developed 
    a colour system that became the heart of pointillism and neo-impressionism. 
    Artists such as Seurat and Signac only ever used Chevreul� s fundamental 
    palette of colours.</span><br data-dcnode-id="242"><span data-dcnode-id="241" instrument_node="">
    At around the same time (early 1800s), another investigator into the 
    theory of colour, </span><strong data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Phillip Otto Runge</span></strong><span data-dcnode-id="238" instrument_node="">, developed a three dimensional 
    colour model in the form of a sphere, in order to demonstrate the 
    harmony of colours. His attempt to arrange colours based on their 
    hue and value was a revolutionary approach at that time.</span></p><span data-dcnode-id="236" instrument_node="">
</span><div align="center" data-dcnode-id="231"><img data-dcnode-id="235" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/runge.gif&amp;raw"><span data-dcnode-id="234" instrument_node=""> </span><br data-dcnode-id="233"><span data-dcnode-id="232" instrument_node="">
    Phillip Otto Runge</span></div><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">It is worth noting at this point that the phrase"primary colours" 
    means different colours in different contexts. When mixing pigments, 
    the primaries used are red blue and yellow, mixing blue and yellow 
    will produce green. However the primary colours when using light � 
    in PC monitors or television for example - are red blue and green; 
    yellow is a secondary light colour. Printing primaries are cyan, magenta, 
    yellow and black � and psychological primaries are red, blue, yellow 
    and green.</span></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">In the latter part of the nineteenth century, the pace of understanding 
    colour accelerated dramatically:</span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="213"><span data-dcnode-id="223" instrument_node="">In 1872 a Scottish physicist, </span><strong data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Sir James Clerk Maxwell</span></strong><span data-dcnode-id="220" instrument_node="">, developed 
    a chart in the form of a triangle (very similar to </span><strong data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Goethe�s</span></strong><span data-dcnode-id="217" instrument_node="">) from 
    his studies of the electromagnetic theory of light. He chose red, 
    blue and green as primaries, which he believed could produce all the 
    known colours within his triangle. His chart forms the basis for the </span><strong data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Commission Internationale de l'Eclairage (CIE)</span></strong><span data-dcnode-id="214" instrument_node=""> chromaticity chart 
    used today to measure and quantify light, such as that produced by 
    computer phosphor guns.</span></p><span data-dcnode-id="212" instrument_node="">
</span><div align="center" data-dcnode-id="207"><img data-dcnode-id="211" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/cie.jpg&amp;raw"><span data-dcnode-id="210" instrument_node=""> </span><br data-dcnode-id="209"><span data-dcnode-id="208" instrument_node="">
    CIE Chromaticity</span></div><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="200"><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Hermann von Helmholtz</span></strong><span data-dcnode-id="203" instrument_node=""> was the absolute master of the natural sciences 
    of his day. In 1860 he published the now famous </span><em data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Manual of Psychologocal 
    Optics.</span></em></p><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="198" instrument_node="">Both Helmholtz and Maxwell concentrated on selecting the most suitable 
    diagram to explain the observed facts with regard to colour mixtures. 
    Because the trichromatic theory was both available and accepted, their 
    attention was turned towards the geometry of the triangle, without 
    any consideration of the phenomenological aspects. However, after 
    noticing that the spectral colours must have varying distances to 
    white (which must, in turn, lie at the centre of the triangle), </span><strong data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Helmholtz</span></strong><span data-dcnode-id="195" instrument_node=""> put forward a modified version of </span><strong data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Maxwell�s</span></strong><span data-dcnode-id="192" instrument_node=""> construction.</span></p><span data-dcnode-id="190" instrument_node="">
</span><div align="center" data-dcnode-id="185"><img data-dcnode-id="189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/helmholtz.gif&amp;raw"><span data-dcnode-id="188" instrument_node=""> </span><br data-dcnode-id="187"><span data-dcnode-id="186" instrument_node="">
    Hermann von Helmholtz</span></div><span data-dcnode-id="184" instrument_node="">
</span><p data-dcnode-id="176"><span data-dcnode-id="183" instrument_node="">In 1878, the physiologist </span><strong data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Ewald Hering</span></strong><span data-dcnode-id="180" instrument_node=""> published his </span><em data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">On the Theory 
    of Sensibility to Light</span></em><span data-dcnode-id="177" instrument_node=""> in Vienna, which opposed the purely phenomenal 
    or physical understanding of colours. Although he also spent considerable 
    time investigating the eye's perception of three-dimensional space, 
    Hering was more concerned with the introspective aspects of colours. 
    For example, his work on colour refers to the problem of yellow in 
    the three-colour system. According to Helmholtz, yellow was of necessity 
    produced from a mixture of red and green, but this � as Hering realised 
    � was not in line with human experience. The sensation of yellow is 
    elementary, and not traceable to a mixture. Hering further stated 
    that mixtures of red and green never occur, but eliminate each other. 
    A red-green is simply inconceivable.</span></p><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="165"><strong data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Hering</span></strong><span data-dcnode-id="172" instrument_node=""> therefore concluded that there are not three but four elementary 
    colour sensations or </span><strong data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">psychological primaries</span></strong><span data-dcnode-id="169" instrument_node=""> which code our perception, 
    by means of so-called opponent-processes. In 1878, </span><strong data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Hering</span></strong><span data-dcnode-id="166" instrument_node=""> wrote: "Yellow 
    can have a red or green tinge, but not a blue one; blue can have only 
    either a red or a green tinge, and red only either a yellow or a blue 
    one." The four colours can with complete correctness therefore be described 
    as simple or basic colours, as Leonardo da Vinci had already done. 
    Language, too, has simple descriptions of them, and not expressions 
    borrowed from coloured natural bodies.</span></p><span data-dcnode-id="164" instrument_node="">
</span><div align="center" data-dcnode-id="159"><img data-dcnode-id="163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/hering.gif&amp;raw"><span data-dcnode-id="162" instrument_node=""> </span><br data-dcnode-id="161"><span data-dcnode-id="160" instrument_node="">
    Ewald Hering</span></div><span data-dcnode-id="158" instrument_node="">
</span><p data-dcnode-id="153"><span data-dcnode-id="157" instrument_node="">(When, in the late twentieth century, </span><strong data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Anders Hard, Gunnar Tonnquist, 
    and Lars Sivik</span></strong><span data-dcnode-id="154" instrument_node=""> created the Natural Colour System, (�NCS") it was based 
    largely on Hering�s theories about how humans experience colour. Today, 
    the NCS is the colour system behind most paint companies� colour ranges 
    across the world).</span></p><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">By the latter part of the nineteenth century, the medical community 
    had virtually put paid to the age-old practice of colour therapy, 
    dismissing it as 'mumbo-jumbo'.</span></p><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="144"><strong data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">1901 to date</span></strong><br data-dcnode-id="146"><span data-dcnode-id="145" instrument_node="">
    In the twentieth century, interest in colour exploded. The art of 
    colour therapy was re-born and today even the most mainstream doctors 
    use colour as an everyday part of their work.</span></p><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="135"><span data-dcnode-id="142" instrument_node="">In 1915, </span><strong data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Albert H. Munsell</span></strong><span data-dcnode-id="139" instrument_node="">, an art teacher, used the work of </span><strong data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Runge</span></strong><span data-dcnode-id="136" instrument_node=""> to develop his own 3D colour sphere based on pigment rather than light. 
    He observed that pure hues vary in their degree of lightness and that 
    some colours are more vivid than others. He therefore decided that 
    all pure hues should not be on the same horizontal plane and that 
    the more vivid colours should be further away from the axis.</span></p><span data-dcnode-id="134" instrument_node="">
</span><div align="center" data-dcnode-id="129"><img data-dcnode-id="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colour-affects.co.uk/images/munsell.gif&amp;raw"><span data-dcnode-id="132" instrument_node=""> </span><br data-dcnode-id="131"><span data-dcnode-id="130" instrument_node="">
    Munsell colour tree and Munsell colour solid</span></div><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node=""> The Munsell Colour Sphere continues to be widely used by artists, 
    designers and paint manufacturers.</span></p><span data-dcnode-id="125" instrument_node="">
</span><p data-dcnode-id="117"><span data-dcnode-id="124" instrument_node="">In the 1920s at the famous Bauhaus school, in Germany, where the teaching 
    staff included such luminaries as </span><strong data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">Itten, Albers, Kandinsky, Mondrian 
    and Klee</span></strong><span data-dcnode-id="121" instrument_node="">, technology and art were completely reunited. Johannes Itten 
    was particularly interested in the connections between colours and 
    emotions, and colours and shapes. He also observed that each of his 
    students seemed to favour a particular palette for their work - and 
    furthermore, the favoured palette appeared to be in some way related 
    to that student's own physical colouring. Itten's seminal book </span><em data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">'The 
    Art of Colour'</span></em><span data-dcnode-id="118" instrument_node=""> is a 'must read' for anyone interested in colour.</span></p><span data-dcnode-id="116" instrument_node="">
</span><p data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">"Colour is the keyboard, the eyes are the hammers, 
    the soul is the piano with many strings. The artist, i.e. the hand 
    that plays, touching one key after another purposively, to cause vibrations 
    in the soul."
</span></p><div align="center" data-dcnode-id="109"><strong data-dcnode-id="110"><span data-dcnode-id="113" instrument_node="">Wassily Kandinsky</span><br data-dcnode-id="112"><span data-dcnode-id="111" instrument_node="">
    1866 � 1944</span></strong></div><span data-dcnode-id="108" instrument_node="">
</span><p data-dcnode-id="107"></p><span data-dcnode-id="106" instrument_node="">
</span><p data-dcnode-id="104"><span data-dcnode-id="105" instrument_node="">"Black is like the silence of the body after death, the close of 
    life".
</span></p><div align="center" data-dcnode-id="101"><strong data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">Wassily Kandinsky, 1911</span></strong></div><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="99"></p><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="96"><span data-dcnode-id="97" instrument_node=""> "Colour is life; for a world without colour appears to us as 
    dead. Colours are primordial ideas, the children of light."
</span></p><div align="center" data-dcnode-id="91"><strong data-dcnode-id="92"><span data-dcnode-id="95" instrument_node="">Johannes Itten</span><br data-dcnode-id="94"><span data-dcnode-id="93" instrument_node="">
    1888-1967</span></strong></div><span data-dcnode-id="90" instrument_node="">
</span><p data-dcnode-id="89"></p><span data-dcnode-id="88" instrument_node="">
</span><p data-dcnode-id="83"><span data-dcnode-id="87" instrument_node="">Nevertheless, when </span><strong data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">Angela Wright</span></strong><span data-dcnode-id="84" instrument_node=""> began to pursue deeper understanding 
    of the psychology of colour, in the mid 1970s, she found that not 
    much progress had been made since the 1920s. There was no shortage 
    of scientific material describing experiments to establish the psychological 
    effects of different colours. However, the findings were often contradictory 
    and no firm theories had emerged, so it was considered totally subjective, 
    and therefore totally unpredictable.</span></p><span data-dcnode-id="82" instrument_node="">
</span><p data-dcnode-id="80"><span data-dcnode-id="81" instrument_node="">Her first response to this was that none of these experiments appeared 
    to take account of the finer points of colour - nuances of shade, 
    tone and tint. It is not part of a psychologist's remit to study colour, 
    so they would, for example, describe experiments where they had 'used 
    blue and orange, with full spectrum lighting.' She felt that this 
    was relatively meaningless, as there are at least a million blues 
    and just as many oranges. She felt that colour harmony was a major 
    determining factor in the psychological effect. In simple terms, disharmony 
    negates.</span></p><span data-dcnode-id="79" instrument_node="">
</span><p data-dcnode-id="77"><span data-dcnode-id="78" instrument_node="">She studied the dynamics of colour in California, working with Mrs 
    Lorea Shearing, a member of the Kalmus family, who invented and developed 
    Technicolor. She formed a clear hypothesis, involving the links between 
    patterns of colour and personality types, that approached colour harmony 
    from a different perspective. Going back to Aristotle's idea that 
    blue and yellow were the true primary colours, she classified all 
    colours, first into cool (containing blue) and warm (containing yellow), 
    then subdivided in terms of levels of intensity and the addition of 
    black, white or grey. This produced four tonal families, which Angela 
    Wright then associated with four personality types, defined with considerable 
    reference to Jung's psychology theories, particularly the concept 
    of extraversion (yellow) and introversion (blue). She developed a 
    clear, rational colour system - the Colour Affects System - enabling 
    individual response to specific colour combinations to be predicted 
    with startling accuracy, and colour psychology to be practised with 
    much more precision and understanding.</span></p><span data-dcnode-id="76" instrument_node="">
</span><p data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">In the 1990s the Colour &amp; Imaging Institute, at the University 
    of Derby in England, confirmed that the colours classified within 
    the Colour Affects System do indeed have mathematical relationships 
    within each colour group that do not exist between colours from different 
    groups - not previously identified.</span></p><span data-dcnode-id="73" instrument_node="">
</span><p data-dcnode-id="71"><span data-dcnode-id="72" instrument_node="">The work continues.</span></p><span data-dcnode-id="70" instrument_node="">
</span><span data-dcnode-id="68" instrument_node="">
