</span><div class="article__main" data-dcnode-id="697"><span data-dcnode-id="945" instrument_node="">
</span><div class="article__image" data-dcnode-id="936"><span data-dcnode-id="944" instrument_node="">
</span><img alt="" class="img-fluid lazy error" data-dcnode-id="943" data-src="https://www.historyhit.com/app/uploads/2020/07/Westminster_Abbey_3309392769-1-1.jpg?x37902" data-was-processed="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2020/07/Westminster_Abbey_3309392769-1-1.jpg%3Fx37902&amp;raw"><span data-dcnode-id="942" instrument_node="">
</span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.historyhit.com/product/book-club/%3Futm_source%3Darticles%26utm_medium%3Dbookclub/" target="_blank"><span data-dcnode-id="941" instrument_node="">
</span><img alt="" class="img-fluid lazy error" data-dcnode-id="940" data-src="https://www.historyhit.com/app/uploads/2022/03/Book-Club-Join-Now.jpg?x37902" data-was-processed="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2022/03/Book-Club-Join-Now.jpg%3Fx37902&amp;raw"><span data-dcnode-id="939" instrument_node="">
</span></a><span data-dcnode-id="937" instrument_node="">
</span></div><span data-dcnode-id="935" instrument_node="">
</span><div data-dcnode-id="708"><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Westminster Abbey is the final resting place of over 3,000 people, including 17 monarchs and 8 Prime Ministers.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Here are 10 of the most famous figures to be buried there:</span></p><span data-dcnode-id="928" instrument_node="">
</span><h2 data-dcnode-id="925"><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">1. George Frederic Handel </span></strong></h2><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">George Frederic Handel was one of Britain’s greatest Baroque composers.&nbsp;Born in Germany, he moved to London in 1710 where he was soon granted a generous Royal pension of £200 </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">per annum</span></em><span data-dcnode-id="920" instrument_node="">.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="917" instrument_node="">Whilst dominating the London musical scene with oratorios and operas, Handel’s anthem for the coronation of George II is perhaps his most famous work:&nbsp;</span><em data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Zadok the Priest</span></em><span data-dcnode-id="914" instrument_node=""> has formed a part of every British coronation since it was written.</span></p><span data-dcnode-id="912" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="908" id="attachment_36000" style="max-width: 660px;"><img alt="" class="wp-image-36000 size-full lazy error" data-dcnode-id="911" data-src="https://www.historyhit.com/app/uploads/2020/07/1280px-George_Frideric_Handel_by_Balthasar_Denner-e1570631945352-1.jpg?x37902" data-was-processed="true" height="786" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2020/07/1280px-George_Frideric_Handel_by_Balthasar_Denner-e1570631945352-1.jpg%3Fx37902&amp;raw" width="650"><p class="wp-caption-description" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">George Frideric Handel, painted by Balthasar Denner.</span></p></div><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">In the days leading up to his death, Handel put aside £600 for his burial and memorial in Westminster Abbey, with a monument to be completed by Roubiliac.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">His funeral was attended by about 3,000 people, with singing from the choirs of Westminster Abbey, St Paul’s Cathedral and the Chapel Royal.</span></p><span data-dcnode-id="901" instrument_node="">
</span><h2 data-dcnode-id="898"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">2. Sir Isaac Newton</span></strong></h2><span data-dcnode-id="897" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="893" id="attachment_36001" style="max-width: 660px;"><img alt="" class="wp-image-36001 size-full lazy error" data-dcnode-id="896" data-src="https://www.historyhit.com/app/uploads/2020/07/Isaac_Newton_grave_in_Westminster_Abbey-e1570632037810-1.jpg?x37902" data-was-processed="true" height="893" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2020/07/Isaac_Newton_grave_in_Westminster_Abbey-e1570632037810-1.jpg%3Fx37902&amp;raw" width="650"><p class="wp-caption-description" data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Newton’s monument in Westminster, designed by William Kent.</span></p></div><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Newton was a leading figure in the scientific revolution. His work in science, astronomy and mathematics formulated, amongst other things, laws of motion and theories of colour.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Newton died in his sleep at Kensington in 1727. His funerary monument of white and grey marble depicts objects from his mathematical and optical work.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">After his death, an examination of his body found mercury in his hair – perhaps explaining eccentricities in later life.</span></p><span data-dcnode-id="883" instrument_node="">
</span><h2 data-dcnode-id="880"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">3. Geoffrey Chaucer</span></strong></h2><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">As the author of </span><em data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The Canterbury Tales</span></em><span data-dcnode-id="875" instrument_node="">, Chaucer has been named ‘The Father of English Poetry’. Although born a lowly son of a London vintner, Chaucer’s literary work for John of Gaunt, his patron and friend, elevated him to such a position that his granddaughter became the Duchess of Suffolk.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">In 1556, his grey Purbeck marble monument was erected. Edmund Spenser, the Elizabethan poet, was buried nearby in 1599, thus beginning the idea of a ‘Poets’ Corner’.</span></p><span data-dcnode-id="870" instrument_node="">
</span><figure class="wp-caption" data-dcnode-id="863"><a class="inner-promo__link" data-dcnode-id="868" data-hover-text="Click to Watch" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//access.historyhit.com/videos/the-history-of-westminster-abbey%3Futm_source%3DInArticle%26utm_medium%3DCOM" target="_blank"><img alt="" class="lazy error" data-dcnode-id="869" data-src="https://www.historyhit.com/app/uploads/2019/10/westminster-abbey-thumbnail-1024x576.jpg?x37902" data-was-processed="true" height="576" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2019/10/westminster-abbey-thumbnail-1024x576.jpg%3Fx37902&amp;raw" width="1024"></a><div class="wp-caption-description-and-button" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">With an unrivalled arrange of monuments - ranging from grand royal tombs to the grave of The Unknown Warrior - and spectacular architecture spanning nearly 1,000 years, join Dan Snow and Sir David Cannadine as they explore Britain's greatest church.</span></div><a class="btn-caption" data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//access.historyhit.com/videos/the-history-of-westminster-abbey%3Futm_source%3DInArticle%26utm_medium%3DCOM" onclick="fbq('trackCustom', 'Article Banner Click');" target="_blank"><span data-dcnode-id="865" instrument_node="">Watch Now</span></a></figure><span data-dcnode-id="862" instrument_node="">
</span><h2 data-dcnode-id="859"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">4. Stephen Hawking</span></strong></h2><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">An eminent physicist, mathematician and author, Professor Stephen Hawking was buried in Westminster Abbey in 2018, near the graves of Sir Isaac Newton and Charles Darwin.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">At just 32, Hawking was elected to the Royal Society, and became Lucasian Professor of Mathematics at Cambridge University, a post also held by Newton.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Reflecting his pioneering work on the universe and black holes, Hawking’s gravestone, made of Caithness slate stone, depicts a series of rings swirling around a darker central ellipse. Etched in white, his ten-character equation reflects his ideas about Hawking radiation.</span></p><span data-dcnode-id="849" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="845" id="attachment_36004" style="max-width: 660px;"><img alt="" class="wp-image-36004 size-full lazy error" data-dcnode-id="848" data-src="https://www.historyhit.com/app/uploads/2020/07/Stephen_Hawking_in_Stockholm_2015-e1570632501392-1.jpg?x37902" data-was-processed="true" height="650" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2020/07/Stephen_Hawking_in_Stockholm_2015-e1570632501392-1.jpg%3Fx37902&amp;raw" width="650"><p class="wp-caption-description" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Hawking holding a public lecture at the Stockholm Waterfront congress centre in 2015. Image Credit: Alexandar Vujadinovic / CC BY-SA 4.0.</span></p></div><span data-dcnode-id="844" instrument_node="">
</span><h2 data-dcnode-id="841"><strong data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">5. Elizabeth I</span></strong></h2><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="839" instrument_node="">The daughter of the short lived and dramatic marriage between Henry VIII and </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/the-6-wives-of-henry-viii-in-order/"><span data-dcnode-id="838" instrument_node="">Anne Boleyn</span></a><span data-dcnode-id="836" instrument_node="">, Elizabeth’s life began tumultuously. Yet her long reign is remembered as one of the most brilliant in English history. Marked by the defeat of </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/why-did-the-spanish-armada-fail/"><span data-dcnode-id="835" instrument_node="">the Spanish Armada</span></a><span data-dcnode-id="833" instrument_node="">, voyages of exploration and discovery and the writings of Shakespeare.</span></p><span data-dcnode-id="831" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="827" id="attachment_36006" style="max-width: 660px;"><img alt="" class="wp-image-36006 size-full lazy error" data-dcnode-id="830" data-src="https://www.historyhit.com/app/uploads/2020/07/Elizabeth_I_of_England_grave_left_2013_crop2-e1570632718424-1.jpg?x37902" data-was-processed="true" height="480" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2020/07/Elizabeth_I_of_England_grave_left_2013_crop2-e1570632718424-1.jpg%3Fx37902&amp;raw" width="650"><p class="wp-caption-description" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Elizabeth’s tomb is shared with her half-sister, Mary I.</span></p></div><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Unsurprisingly, her death at Richmond Palace in 1603 prompted widespread mourning. Her body was brought by barge to Whitehall Palace to lie in state, where there was</span></p><span data-dcnode-id="823" instrument_node="">
</span><blockquote data-dcnode-id="820"><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">‘such a general sighing, groaning and weeping as the like hath not been seen or known in the memory of man’.</span></p></blockquote><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Although he did not attend the funeral, Elizabeth’s successor, James I, spent £1485 on a full-length tomb effigy, which remains in place to this day.</span></p><span data-dcnode-id="816" instrument_node="">
</span><h2 data-dcnode-id="813"><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">6. Robert Adam</span></strong></h2><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Adam was a Scottish&nbsp;neoclassical architect, interior and&nbsp;furniture designer. An early visit to Italy inspired his classical plans for country houses, town houses and monuments, and earnt him the nickname ‘Bob the Roman’. He became one of the most sought-after architects of his day, enjoying patronage of aristocracy and royalty.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Buried in the south transept of Westminster Abbey, he is placed beside James Macpherson, the Scottish poet, and Sir William Chambers, the architect.</span></p><span data-dcnode-id="806" instrument_node="">
</span><figure class="wp-caption" data-dcnode-id="799"><a class="inner-promo__link" data-dcnode-id="804" data-hover-text="Click to Watch" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyhit1.vhx.tv/videos/an-indigenous-history-of-australia%3Futm_source%3DInArticle%26utm_medium%3DCOM" target="_blank"><img alt="" class="lazy error" data-dcnode-id="805" data-src="https://www.historyhit.com/app/uploads/2021/06/An-Indigenous-History-of-Australia-1024x576.jpg?x37902" data-was-processed="true" height="576" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2021/06/An-Indigenous-History-of-Australia-1024x576.jpg%3Fx37902&amp;raw" width="1024"></a><div class="wp-caption-description-and-button" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">An enlightening and chilling documentary on the history of the indigenous populations in Australia.</span></div><a class="btn-caption" data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyhit1.vhx.tv/videos/an-indigenous-history-of-australia%3Futm_source%3DInArticle%26utm_medium%3DCOM" onclick="fbq('trackCustom', 'Article Banner Click');" target="_blank"><span data-dcnode-id="801" instrument_node="">Watch Now</span></a></figure><span data-dcnode-id="798" instrument_node="">
</span><h2 data-dcnode-id="795"><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">7. Laurence Olivier</span></strong></h2><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="793" instrument_node="">One of the greatest actors and directors of his generation, Olivier’s work dominated the British stage of the 20</span><sup data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">th</span></sup><span data-dcnode-id="790" instrument_node=""> century. Perhaps his celebrated performance was in Henry V, an uplifting morale booster for the war weary Britain of 1944.</span></p><span data-dcnode-id="788" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="784" id="attachment_36008" style="max-width: 660px;"><img alt="" class="wp-image-36008 size-full lazy error" data-dcnode-id="787" data-src="https://www.historyhit.com/app/uploads/2020/07/Laurence_Olivier_Allan_Warren-e1570632985697-1.jpg?x37902" data-was-processed="true" height="641" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2020/07/Laurence_Olivier_Allan_Warren-e1570632985697-1.jpg%3Fx37902&amp;raw" width="650"><p class="wp-caption-description" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Olivier in 1972, during the production of Sleuth. Image source: Allan warren / CC BY-SA 3.0.</span></p></div><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="782" instrument_node="">His ashes, marked by a small gravestone, lie near the graves of actors David Garrick and Sir Henry Irving, and in front of the </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/popularised-from-shakespeare/"><span data-dcnode-id="781" instrument_node="">Shakespeare</span></a><span data-dcnode-id="779" instrument_node=""> memorial.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">An extract from Act IV of Shakespeare’s Henry V was played during his funeral, the first time a voice recording of the deceased was played in the Abbey at a memorial service.</span></p><span data-dcnode-id="774" instrument_node="">
</span><h2 data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">8. The Unknown Warrior</span></strong></h2><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">At the west end of the Nave is the grave of an unknown soldier, representing those </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/remembrance-warning/"><span data-dcnode-id="768" instrument_node="">who lost their lives in the First World War</span></a><span data-dcnode-id="766" instrument_node="">. The idea appears to have come from a chaplain at the Front, who had seen a rough grave marked by a cross, and the pencilled inscription ‘An Unknown British Soldier’.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">After writing to the Dean of Westminster, the body was chosen at random from servicemen exhumed from the Aisne, the Somme, Arras and Ypres. It laid on 11&nbsp;November 1920, covered by a slab of black Belgian marble.</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">It is the only gravestone in the Abbey which cannot be walked on.</span></p><span data-dcnode-id="758" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="754" id="attachment_36010" style="max-width: 660px;"><img alt="" class="wp-image-36010 size-full lazy error" data-dcnode-id="757" data-src="https://www.historyhit.com/app/uploads/2020/07/Burial_of_the_British_Unknown_Warrior_1920-e1570633170370-1.jpg?x37902" data-was-processed="true" height="438" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2020/07/Burial_of_the_British_Unknown_Warrior_1920-e1570633170370-1.jpg%3Fx37902&amp;raw" width="650"><p class="wp-caption-description" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">The burial of The Unknown Warrior in 1920, with George V in attendance, painted by Frank O Salisbury.</span></p></div><span data-dcnode-id="753" instrument_node="">
</span><h2 data-dcnode-id="750"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">9. William Wilberforce</span></strong></h2><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">After becoming a Member of Parliament in 1780, Wilberforce spent twenty years relentlessly fighting for the abolition of slavery. Along with Granville Sharp and Thomas Clarkson the abolition bill received Royal assent on 25 March 1807.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">Although Wilberforce requested to be buried with his sister and daughter at Stoke Newington, both leaders of the Houses of Parliament urged his burial in the Abbey, to which his family agreed. He was buried in 1833 next to a good friend </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/1799-income-tax-first-introduced-help-fight-french/"><span data-dcnode-id="744" instrument_node="">William Pitt the Younger</span></a><span data-dcnode-id="742" instrument_node="">.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">As funerary tributes to Wilberforce were made, both Houses of Parliament suspended their business as a mark of respect.</span></p><span data-dcnode-id="737" instrument_node="">
</span><figure class="wp-caption" data-dcnode-id="730"><a class="inner-promo__link" data-dcnode-id="735" data-hover-text="Click to Listen" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//access.historyhit.com/videos/the-origin-of-zero%3Futm_source%3DInArticle%26utm_medium%3DCOM" target="_blank"><img alt="" class="lazy error" data-dcnode-id="736" data-src="https://www.historyhit.com/app/uploads/2022/04/origin-of-zero.jpg?x37902" data-was-processed="true" height="422" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2022/04/origin-of-zero.jpg%3Fx37902&amp;raw" width="750"></a><div class="wp-caption-description-and-button" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Today we are joined by statistician and author Timandra Harkness, who is going to take us back in time to the invention of zero as a mathematical concept. Tune in to find out how it was discovered, the impact it had, and if we could possibly imagine a world without it today.</span></div><a class="btn-caption" data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//access.historyhit.com/videos/the-origin-of-zero%3Futm_source%3DInArticle%26utm_medium%3DCOM" onclick="fbq('trackCustom', 'Article Banner Click');" target="_blank"><span data-dcnode-id="732" instrument_node="">Listen Now</span></a></figure><span data-dcnode-id="729" instrument_node="">
</span><h2 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">10. David Livingstone</span></h2><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="725" instrument_node="">Most famous for his intrepid exploration of Africa and discovery of the source of the River Nile, </span><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/1855-david-livingstone-finds-victoria-falls/"><span data-dcnode-id="724" instrument_node="">Livingstone</span></a><span data-dcnode-id="722" instrument_node=""> was a writer, explorer, missionary and physician. His meeting with Henry Morton Stanley immortalised the phrase ‘Doctor Livingstone, I presume?’.</span></p><span data-dcnode-id="720" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="716" id="attachment_24520" style="max-width: 660px;"><img alt="" class="wp-image-24520 size-full lazy error" data-dcnode-id="719" data-src="https://www.historyhit.com/app/uploads/2020/07/DavidLivingstone-e1570633329667-1.jpg?x37902" data-was-processed="true" height="790" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyhit.com/app/uploads/2020/07/DavidLivingstone-e1570633329667-1.jpg%3Fx37902&amp;raw" width="650"><p class="wp-caption-description" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">David Livingston in 1864.</span></p></div><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Livingstone died at Ilala in the centre of Africa in May 1873. His heart was buried under a mpundu tree, whilst his embalmed body was wrapped in a cylinder of bark and wrapped in a sailcloth. His body was carried to the African coast, and set sail to London, arriving the following year.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">His final resting place is the centre of the Nave of Westminster Abbey.</span></p><span data-dcnode-id="709" instrument_node="">
</span></div><span data-dcnode-id="707" instrument_node="">
</span><div class="article__cats --tags" data-dcnode-id="699"><span data-dcnode-id="706" instrument_node="">
