</span><meta content="Alexandrites are remarkable and rare gemstones. They display an extraordinary colour change according to the ambient lighting, from emerald green in daylight to ruby red in incandescent light from tungsten lamps or candles. While this colour change has been correctly attributed to chromium impurities and their absorption band in the yellow region of the visible light spectrum, no adequate explanation of the mechanism has been given. Here, the alexandrite effect is fully explained by considering the von Kries model of the human colour constancy mechanism. This implies that our colour constancy mechanism is real (objective) and primarily attuned to correct for the colour temperature of black-body illuminants." data-dcnode-id="3336" name="dc.description"><span data-dcnode-id="3335" instrument_node="">

</span><div class="c-article-body" data-dcnode-id="1031"><span data-dcnode-id="2334" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2327" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2328" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2332" id="Abs1"><span data-dcnode-id="2333" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2329" id="Abs1-content"><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Alexandrites are remarkable and rare gemstones. They display an extraordinary colour change according to the ambient lighting, from emerald green in daylight to ruby red in incandescent light from tungsten lamps or candles. While this colour change has been correctly attributed to chromium impurities and their absorption band in the yellow region of the visible light spectrum, no adequate explanation of the mechanism has been given. Here, the alexandrite effect is fully explained by considering the von Kries model of the human colour constancy mechanism. This implies that our colour constancy mechanism is real (objective) and primarily attuned to correct for the colour temperature of black-body illuminants.</span></p></div></div></section><span data-dcnode-id="2326" instrument_node="">
</span><noscript data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">
</span></noscript><span data-dcnode-id="2323" instrument_node="">
</span><section data-dcnode-id="2273" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2274" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2321" id="Sec1"><span data-dcnode-id="2322" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2275" id="Sec1-content"><p data-dcnode-id="2276"><span data-dcnode-id="2320" instrument_node="">Alexandrites are rare and highly-prized gemstones, which were first discovered around 1830 in Russia, and named after the future Czar, Alexander II, and later found in other countries such as Brazil and Sri Lanka</span><sup data-dcnode-id="2317"><a aria-label="Reference 1" data-dcnode-id="2318" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d258957853e475" title="Schmetzer, K. Russian Alexandrites (Schweizerbart Science Publishers, Stuttgart, 2010)."><span data-dcnode-id="2319" instrument_node="">1</span></a></sup><span data-dcnode-id="2316" instrument_node="">. They are prized for their dramatic colour change under different illumination: that is ruby-red under candlelight or incandescent lamplight, and emerald-green under natural daylight</span><sup data-dcnode-id="2313"><a aria-label="Reference 1" data-dcnode-id="2314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d258957853e479" title="Schmetzer, K. Russian Alexandrites (Schweizerbart Science Publishers, Stuttgart, 2010)."><span data-dcnode-id="2315" instrument_node="">1</span></a></sup><span data-dcnode-id="2312" instrument_node="">. This is attributed to the Cr</span><sup data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">3+</span></sup><span data-dcnode-id="2309" instrument_node=""> impurities in the BeAl</span><sub data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">2</span></sub><span data-dcnode-id="2306" instrument_node="">O</span><sub data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">4</span></sub><span data-dcnode-id="2303" instrument_node=""> atomic structure which have strong optical absorption centred at the wavelength of yellow light. While the stones scatter blue, red and green light in proportions which vary with the illuminant</span><sup data-dcnode-id="2294"><a data-dcnode-id="2301" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d258957853e490" title="Liu, Y., Shigley, J., Fritsch, E. &amp; Hemphill, S. The “alexandrite effect” in gemstones. Color Res. Appl. 19, 186–191 (1994)."><span data-dcnode-id="2302" instrument_node="">2</span></a><span data-dcnode-id="2300" instrument_node="">,</span><a data-dcnode-id="2298" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d258957853e490_1" title="Liu, Y., Shigley, J. E., Fritsch, E. &amp; Hemphill, S. Relationship between the crystallographic orientation and the ‘alexandrite effect’ in synthetic alexandrite. Mineral. Mag. 59, 111–114 (1995)."><span data-dcnode-id="2299" instrument_node="">3</span></a><span data-dcnode-id="2297" instrument_node="">,</span><a aria-label="Reference 4" data-dcnode-id="2295" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d258957853e493" title="Pinheiro, M. V. B. et al. The cause of colour of the blue alexandrites from Malacheta, Minas Gerais. Brazil. J. Gemm. 27, 161–170 (2000)."><span data-dcnode-id="2296" instrument_node="">4</span></a></sup><span data-dcnode-id="2293" instrument_node="">, this is not sufficient to explain the colour change in alexandrites as it is as true of any coloured object as it is of alexandrites. Here we give a complete explanation of the alexandrite effect. Taking into account the responses of the cone photoreceptors in the human eye, we show that the ratio of green to red stimuli under the different illuminants changes much more for an alexandrite than it does for normal coloured objects, which have broad absorption bands (inks, pigments, paints, fruit and flowers, etc). This overrides the mechanism by which the human visual system corrects for illuminance and helps understand the working of this mechanism for colour constancy. We expect these findings to have implications for theories of the colour perception of the human visual system in the somewhat disparate fields of traditional colour science</span><sup data-dcnode-id="2290"><a aria-label="Reference 5" data-dcnode-id="2291" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d258957853e497" title="Fairchild, M. D. Color Appearence Models. (Wiley, 2005)."><span data-dcnode-id="2292" instrument_node="">5</span></a></sup><span data-dcnode-id="2289" instrument_node="">, the science of optical illusions</span><sup data-dcnode-id="2286"><a aria-label="Reference 6" data-dcnode-id="2287" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d258957853e501" title="Adelson, E. H. &amp; Pentland, A.P. The perception of shading and reflectance in Perception as Bayesian Inference (ed. Knill, D.C. &amp; Richards, W.) ch.11 (Cambridge University Press, 1996)."><span data-dcnode-id="2288" instrument_node="">6</span></a></sup><span data-dcnode-id="2285" instrument_node="">, and the study of individual perceptions, as in Impressionist paintings</span><sup data-dcnode-id="2282"><a aria-label="Reference 7" data-dcnode-id="2283" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d258957853e505" title="Dunstan, B. Painting methods of the Impressionists. (Watson-Guptill, 1992)."><span data-dcnode-id="2284" instrument_node="">7</span></a></sup><span data-dcnode-id="2281" instrument_node=""> or the dress that went viral</span><sup data-dcnode-id="2278"><a aria-label="Reference 8" data-dcnode-id="2279" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d258957853e509" title="Melgosa, M., Gõmez-Robledo, L., Isabel Suero, M. &amp; Fairchild, M. D. What can we learn from a dress with ambiguous colors? Color Res. Appl. 40, 525–529 (2015)."><span data-dcnode-id="2280" instrument_node="">8</span></a></sup><span data-dcnode-id="2277" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1880" data-title="Results and Analysis"><div class="c-article-section" data-dcnode-id="1881" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2271" id="Sec2"><span data-dcnode-id="2272" instrument_node="">Results and Analysis</span></h2><div class="c-article-section__content" data-dcnode-id="1882" id="Sec2-content"><p data-dcnode-id="2247"><span data-dcnode-id="2270" instrument_node="">We studied some alexandrites from the collections of the Natural History Museum, London, and picked out two with a particularly pure and vivid alexandrite effect. One of these stones is shown in Fig.&nbsp;</span><a data-dcnode-id="2268" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2269" instrument_node="">1</span></a><span data-dcnode-id="2267" instrument_node="">, under different illuminants, daylight and tungsten (incandescent) light. It was placed on a print of a CIE colour chart</span><sup data-dcnode-id="2264"><a aria-label="Reference 9" data-dcnode-id="2265" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d258957853e524" title="Available at: 
https://www.reef2reef.com/threads/understanding-spectrographs-and-chromaticity-graphs.120273/

 (accessed 20/10/2019)."><span data-dcnode-id="2266" instrument_node="">9</span></a></sup><span data-dcnode-id="2263" instrument_node=""> and moved to be on the matching colour as judged by eye (see Methods). With the camera’s colour-balancing software switched off, the effect on normal colours of the daylight is seen by the slightly bluish white paper (Fig.&nbsp;</span><a data-dcnode-id="2261" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2262" instrument_node="">1a</span></a><span data-dcnode-id="2260" instrument_node="">) and of the incandescent light by the yellow-brown white paper (Fig.&nbsp;</span><a data-dcnode-id="2258" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2259" instrument_node="">1b</span></a><span data-dcnode-id="2257" instrument_node="">). It is worth emphasising that to the observers under both illuminants the white paper appeared white, and the colours of the background colour chart appeared largely independent of the lighting. The brownish cast of the paper reflects only the brightness of the image, in that RGB yellow is close to (1, 0.9, 0) and just a 10% reduction in brightness to (0.9, 0.8, 0) gives brown. Colour balancing was optimised to create the corrected images (Fig.&nbsp;</span><a data-dcnode-id="2255" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2256" instrument_node="">1c,d</span></a><span data-dcnode-id="2254" instrument_node="">, see the Methods section). The blue cast around the stone in Fig.&nbsp;</span><a data-dcnode-id="2252" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2253" instrument_node="">1d</span></a><span data-dcnode-id="2251" instrument_node=""> is discussed in the Supplementary §</span><a data-dcnode-id="2249" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2250" instrument_node="">1</span></a><span data-dcnode-id="2248" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2205" data-test="figure" data-title="Figure 1" id="figure-1"><figure data-dcnode-id="2206"><figcaption data-dcnode-id="2244"><b class="c-article-section__figure-caption" data-dcnode-id="2245" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2246" instrument_node="">Figure 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2217"><div class="c-article-section__figure-item" data-dcnode-id="2239"><a class="c-article-section__figure-link" data-dcnode-id="2240" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-62707-3/figures/1" rel="nofollow"><picture data-dcnode-id="2241"><source data-dcnode-id="2243" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-020-62707-3/MediaObjects/41598_2020_62707_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2242" height="252" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-020-62707-3/MediaObjects/41598_2020_62707_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2218" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2219"><span data-dcnode-id="2238" instrument_node="">An alexandrite changing colour. The Russian alexandrite BM41178 from the collection of the Natural History Museum, London was photographed in (</span><b data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">a</span></b><span data-dcnode-id="2235" instrument_node="">) daylight and (</span><b data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">b</span></b><span data-dcnode-id="2232" instrument_node="">) incandescent light with the camera colour-correction feature switched off. The stone was placed on the matching colour on a printout of the CIE 1976 colour chart. A piece of white paper was included in the pictures, under the stone in (</span><b data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">a</span></b><span data-dcnode-id="2229" instrument_node="">) and nearby (top left) in (</span><b data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">b</span></b><span data-dcnode-id="2226" instrument_node="">). The corresponding images after colour balancing to make the paper white are shown in (</span><b data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">c</span></b><span data-dcnode-id="2223" instrument_node="">,</span><b data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">d</span></b><span data-dcnode-id="2220" instrument_node="">).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2207"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="2208" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-62707-3/figures/1" rel="nofollow"><span data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2209" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2210" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2211" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2214" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2213" fill-rule="evenodd"></path><span data-dcnode-id="2212" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2169"><span data-dcnode-id="2204" instrument_node="">A wide variety of physical phenomena from interference and diffraction to spectrally selective absorption can give rise to dramatic colour effects such as iridescence</span><sup data-dcnode-id="2201"><a aria-label="Reference 10" data-dcnode-id="2202" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d258957853e574" title="Goodling, A. E. et al. Colouration by total internal reflection and interference at microscale concave interfaces. Nature 566, 523–527 (2019)."><span data-dcnode-id="2203" instrument_node="">10</span></a></sup><span data-dcnode-id="2200" instrument_node="">. Explanations of the colour change in alexandrites have been given which correctly invoke the spectrally-selective Cr</span><sup data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">3+</span></sup><span data-dcnode-id="2197" instrument_node=""> absorption band in the yellow region of the spectrum</span><sup data-dcnode-id="2188"><a data-dcnode-id="2195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d258957853e580" title="Schmetzer, K. Russian Alexandrites (Schweizerbart Science Publishers, Stuttgart, 2010)."><span data-dcnode-id="2196" instrument_node="">1</span></a><span data-dcnode-id="2194" instrument_node="">,</span><a data-dcnode-id="2192" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d258957853e580_1" title="Liu, Y., Shigley, J., Fritsch, E. &amp; Hemphill, S. The “alexandrite effect” in gemstones. Color Res. Appl. 19, 186–191 (1994)."><span data-dcnode-id="2193" instrument_node="">2</span></a><span data-dcnode-id="2191" instrument_node="">,</span><a aria-label="Reference 3" data-dcnode-id="2189" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d258957853e583" title="Liu, Y., Shigley, J. E., Fritsch, E. &amp; Hemphill, S. Relationship between the crystallographic orientation and the ‘alexandrite effect’ in synthetic alexandrite. Mineral. Mag. 59, 111–114 (1995)."><span data-dcnode-id="2190" instrument_node="">3</span></a></sup><span data-dcnode-id="2187" instrument_node="">. Liu </span><i data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">et al</span></i><span data-dcnode-id="2184" instrument_node="">.</span><sup data-dcnode-id="2181"><a aria-label="Reference 2" data-dcnode-id="2182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d258957853e590" title="Liu, Y., Shigley, J., Fritsch, E. &amp; Hemphill, S. The “alexandrite effect” in gemstones. Color Res. Appl. 19, 186–191 (1994)."><span data-dcnode-id="2183" instrument_node="">2</span></a></sup><span data-dcnode-id="2180" instrument_node=""> took their explanation further, invoking also colour constancy. Experimentally, they said, the human visual system corrects for hue angle changes only up to 20° under different illuminations (hue angle is explained in the Supplementary §</span><a data-dcnode-id="2178" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2179" instrument_node="">2</span></a><span data-dcnode-id="2177" instrument_node="">). Calculating the change in hue angle for alexandrites and finding it to be greater than 20°, they attributed the absence of colour constancy in the alexandrite effect to that. However, the blue-to-brown hue angle change of the white paper in Fig.&nbsp;</span><a data-dcnode-id="2175" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2176" instrument_node="">1a,b</span></a><span data-dcnode-id="2174" instrument_node=""> is about 180°, yet colour constancy occurs. Recently a similar analysis of a weak alexandrite effect in purple flowers and low-quality alexandrite stones has been reported</span><sup data-dcnode-id="2171"><a aria-label="Reference 11" data-dcnode-id="2172" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d258957853e601" title="Kasajima, I. Alexandrite-like effect in purple flowers analyzed with newly devised round RGB diagram. Sci Rep 6, 29630 (2016)."><span data-dcnode-id="2173" instrument_node="">11</span></a></sup><span data-dcnode-id="2170" instrument_node="">.</span></p><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">It is necessary to consider more carefully what colour constancy does. Crucially, it works to the extent that to the human eye, the colours of the CIE chart under each lighting are almost unchanged. To get colour matches under the two illuminants, the stone has to be moved, and the colour matches are then recognisable to the eye and to the camera before and after correction. Objectively, to the camera as much as to the eye, the stone changes colour under different lighting. In contrast, pieces of blue, green, yellow or red paper do not have to be moved around the chart to keep the colour matches under different illuminations. Objectively, to the camera as much as to the eye, the pieces of paper do not change colour under different lighting.</span></p><p data-dcnode-id="2134"><span data-dcnode-id="2166" instrument_node="">Absorption spectra of two alexandrites R1 (BM41177) and R2 (BM41178) were recorded in a UV-VIS photospectrometer (Supplementary §</span><a data-dcnode-id="2164" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2165" instrument_node="">3</span></a><span data-dcnode-id="2163" instrument_node="">, Fig.&nbsp;</span><a data-dcnode-id="2161" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2162" instrument_node="">S2</span></a><span data-dcnode-id="2160" instrument_node="">). While these spectra were of low quality, because the stones are not optical flats, they confirmed the key features. Converted to transmission spectra, they show the Cr</span><sup data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">3+</span></sup><span data-dcnode-id="2157" instrument_node=""> absorption line centred on 572 nm with widths of approximately zero transmission of 90 and 120 nm, respectively, and also a strong absorption in the blue, cutting off all wavelengths less than about 480 nm, in agreement with the literature</span><sup data-dcnode-id="2136"><a data-dcnode-id="2155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d258957853e619" title="Schmetzer, K. Russian Alexandrites (Schweizerbart Science Publishers, Stuttgart, 2010)."><span data-dcnode-id="2156" instrument_node="">1</span></a><span data-dcnode-id="2154" instrument_node="">,</span><a data-dcnode-id="2152" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d258957853e619_1" title="Liu, Y., Shigley, J., Fritsch, E. &amp; Hemphill, S. The “alexandrite effect” in gemstones. Color Res. Appl. 19, 186–191 (1994)."><span data-dcnode-id="2153" instrument_node="">2</span></a><span data-dcnode-id="2151" instrument_node="">,</span><a data-dcnode-id="2149" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d258957853e619_2" title="Liu, Y., Shigley, J. E., Fritsch, E. &amp; Hemphill, S. Relationship between the crystallographic orientation and the ‘alexandrite effect’ in synthetic alexandrite. Mineral. Mag. 59, 111–114 (1995)."><span data-dcnode-id="2150" instrument_node="">3</span></a><span data-dcnode-id="2148" instrument_node="">,</span><a aria-label="Reference 4" data-dcnode-id="2146" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d258957853e622" title="Pinheiro, M. V. B. et al. The cause of colour of the blue alexandrites from Malacheta, Minas Gerais. Brazil. J. Gemm. 27, 161–170 (2000)."><span data-dcnode-id="2147" instrument_node="">4</span></a><span data-dcnode-id="2145" instrument_node="">,</span><a data-dcnode-id="2143" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d258957853e625" title="Kasajima, I. Alexandrite-like effect in purple flowers analyzed with newly devised round RGB diagram. Sci Rep 6, 29630 (2016)."><span data-dcnode-id="2144" instrument_node="">11</span></a><span data-dcnode-id="2142" instrument_node="">,</span><a data-dcnode-id="2140" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d258957853e625_1" title="White, W. B., Roy, R. &amp; McKay Crichton, J. The “Alexandrite Effect”: And Optical Study. Am. Mineral. 52, 867–871 (1967)."><span data-dcnode-id="2141" instrument_node="">12</span></a><span data-dcnode-id="2139" instrument_node="">,</span><a aria-label="Reference 13" data-dcnode-id="2137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d258957853e628" title="Powell, R. C., Xi, L., Gang, X. &amp; Quarles, G. J. Spectroscopic properties of alexandrite crystals. Phys. Rev. B 32, 2788–2797 (1985)."><span data-dcnode-id="2138" instrument_node="">13</span></a></sup><span data-dcnode-id="2135" instrument_node="">. These data permit the prediction of what will be seen by the eye.</span></p><p data-dcnode-id="2058"><span data-dcnode-id="2133" instrument_node="">The human retina has three kinds of colour photoreceptors, or cones. The S cones detect short-wavelength light (blue), the M, medium wavelengths (green) and the L, long wavelengths (red). See Supplementary §</span><a data-dcnode-id="2131" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2132" instrument_node="">4</span></a><span data-dcnode-id="2130" instrument_node="">. In Fig.&nbsp;</span><a data-dcnode-id="2128" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2129" instrument_node="">2</span></a><span data-dcnode-id="2127" instrument_node="">, the spectra of the responses of the cones, the illuminants and the transmittance of the stones (SI) are combined, in order to find out what is perceived. Figure&nbsp;</span><a data-dcnode-id="2125" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2126" instrument_node="">2</span></a><span data-dcnode-id="2124" instrument_node=""> shows the spectral responses of the L, M and S cones</span><sup data-dcnode-id="2121"><a aria-label="Reference 14" data-dcnode-id="2122" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d258957853e645" title="The database of the Colour and Vision Research Laboratory, University College London, at

 (accessed 20/10/19)."><span data-dcnode-id="2109" instrument_node="">14</span></a></sup><span data-dcnode-id="2106" instrument_node="">). In Fig.&nbsp;</span><a data-dcnode-id="2104" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2105" instrument_node="">2c,d</span></a><span data-dcnode-id="2103" instrument_node="">, the products of the illuminant spectra and the L, M and S spectra are plotted. The integrals of these curves correspond to the signals sent by the cones, and their values (normalised so the largest is 1) are marked. These LMS values are converted using an LMS-RGB conversion matrix (see Supplementary §</span><a data-dcnode-id="2101" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2102" instrument_node="">5</span></a><span data-dcnode-id="2100" instrument_node="">, Eq.&nbsp;</span><a data-dcnode-id="2098" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2099" instrument_node="">S1</span></a><span data-dcnode-id="2097" instrument_node="">) to the RGB colours used in the fill. These are approximately the colours that a white object would be perceived to have if we did not have colour constancy; they are also approximately the colours that an uncorrected camera records, as in Fig.&nbsp;</span><a data-dcnode-id="2095" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2096" instrument_node="">1a,b</span></a><span data-dcnode-id="2094" instrument_node="">. In Fig.&nbsp;</span><a data-dcnode-id="2092" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2093" instrument_node="">2e,f</span></a><span data-dcnode-id="2091" instrument_node="">, the wavelengths absorbed by the stones are removed from the illuminant spectra; what remains are the spectra of the light scattered by the stones. By daylight, the green (and some blue) dominates and the red is weaker; conversion to RGB gives the green used as fill in Fig.&nbsp;</span><a data-dcnode-id="2089" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2090" instrument_node="">2e</span></a><span data-dcnode-id="2088" instrument_node="">. By candlelight the red dominates (Fig.&nbsp;</span><a data-dcnode-id="2086" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2087" instrument_node="">2f</span></a><span data-dcnode-id="2085" instrument_node="">). Now we apply colour constancy, using a standard model of the mechanism, the von Kries correction</span><sup data-dcnode-id="2082"><a aria-label="Reference 15" data-dcnode-id="2083" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d258957853e686" title="Wandell, B. A. Foundations of Vision. (Sinauer Associates Inc., Sunderland MA, U.S., 1995)."><span data-dcnode-id="2084" instrument_node="">15</span></a></sup><span data-dcnode-id="2081" instrument_node="">. See Supplementary §</span><a data-dcnode-id="2079" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2080" instrument_node="">6</span></a><span data-dcnode-id="2078" instrument_node=""> for details of our calculations and Supplementary §</span><a data-dcnode-id="2076" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2077" instrument_node="">7</span></a><span data-dcnode-id="2075" instrument_node=""> for a discussion of more advanced models</span><sup data-dcnode-id="2069"><a aria-label="Reference 16" data-dcnode-id="2073" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d258957853e697" title="Foster, D. H. Colour constancy. Vision Research 51, 674–700 (2011)."><span data-dcnode-id="2074" instrument_node="">16</span></a><span data-dcnode-id="2072" instrument_node="">,</span><a aria-label="Reference 17" data-dcnode-id="2070" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d258957853e700" title=" Ramanath, R. &amp; Drew M. S. Von Kries Hypothesis in Computer Vision, ed. Ikeuchi, K. (Springer, Boston, MA, 2014)."><span data-dcnode-id="2071" instrument_node="">17</span></a></sup><span data-dcnode-id="2068" instrument_node="">. The correction makes the colours of Fig.&nbsp;</span><a data-dcnode-id="2066" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2067" instrument_node="">2c,d</span></a><span data-dcnode-id="2065" instrument_node=""> white. Applied to the data of Fig.&nbsp;</span><a data-dcnode-id="2063" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2064" instrument_node="">2e,f</span></a><span data-dcnode-id="2062" instrument_node="">, we get the data of Fig.&nbsp;</span><a data-dcnode-id="2060" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2061" instrument_node="">2g,h</span></a><span data-dcnode-id="2059" instrument_node="">, where conversion to RGB again gives the fill colours.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1978" data-test="figure" data-title="Figure 2" id="figure-2"><figure data-dcnode-id="1979"><figcaption data-dcnode-id="2055"><b class="c-article-section__figure-caption" data-dcnode-id="2056" data-test="figure-caption-text" id="Fig2"><span data-dcn http://www.cvrl.org/

 (accessed 20/10/19)."><span data-dcnode-id="2041" instrument_node="">14</span></a></sup><span data-dcnode-id="2038" instrument_node=""> and (</span><b data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">b</span></b><span data-dcnode-id="2035" instrument_node="">) the candlelight black-body spectrum (1850K). In the panels below, for (</span><b data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">c</span></b><span data-dcnode-id="2032" instrument_node="">,</span><b data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">d)</span></b><span data-dcnode-id="2029" instrument_node=""> a white object, for (</span><b data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">e</span></b><span data-dcnode-id="2026" instrument_node="">–</span><b data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">h</span></b><span data-dcnode-id="2023" instrument_node="">) the alexandrite R2, and, for </span><b data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">(i–l</span></b><span data-dcnode-id="2020" instrument_node="">) a yellow object, the filling colours are the colours calculated in LMS and converted to RGB, before colour constancy correction is applied in (</span><b data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">c,e,g</span></b><span data-dcnode-id="2017" instrument_node="">,</span><b data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">i</span></b><span data-dcnode-id="2014" instrument_node="">,</span><b data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">k</span></b><span data-dcnode-id="2011" instrument_node="">), and after (</span><b data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">d,f</span></b><span data-dcnode-id="2008" instrument_node="">,</span><b data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">h</span></b><span data-dcnode-id="2005" instrument_node="">,</span><b data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">j</span></b><span data-dcnode-id="2002" instrument_node="">,</span><b data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">l</span></b><span data-dcnode-id="1999" instrument_node="">). The LMS signals are marked above each component in (</span><b data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">c</span></b><span data-dcnode-id="1996" instrument_node="">–</span><b data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">l</span></b><span data-dcnode-id="1993" instrument_node="">). At the top, the visible spectrum calculated using monochromatic light and the same LMS-RGB correction is shown.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1980"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="1981" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-62707-3/figures/2" rel="nofollow"><span data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1982" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1983" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1984" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1987" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1986" fill-rule="evenodd"></path><span data-dcnode-id="1985" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1958"><span data-dcnode-id="1977" instrument_node="">The key point here is that the colour&nbsp;constancy correction hardly affects the daylight raw data (Fig.&nbsp;</span><a data-dcnode-id="1975" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1976" instrument_node="">2e</span></a><span data-dcnode-id="1974" instrument_node="">), as D65 is close to flat across the visible spectrum, leaving the alexandrite green in Fig.&nbsp;</span><a data-dcnode-id="1972" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1973" instrument_node="">2g</span></a><span data-dcnode-id="1971" instrument_node="">), and also does not affect the incandescent light raw data (Fig.&nbsp;</span><a data-dcnode-id="1969" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1970" instrument_node="">2f</span></a><span data-dcnode-id="1968" instrument_node="">) sufficiently to change the colour of the alexandrite from red (Fig.&nbsp;</span><a data-dcnode-id="1966" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1967" instrument_node="">2h</span></a><span data-dcnode-id="1965" instrument_node="">). In contrast, in Fig.&nbsp;</span><a data-dcnode-id="1963" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1964" instrument_node="">2i,j</span></a><span data-dcnode-id="1962" instrument_node="">, the corresponding results are shown for a yellow object (absorbing short wavelengths to 480 nm and scattering all longer wavelengths through green, yellow and red). Here the uncorrected red in incandescent light is actually somewhat overcorrected beyond yellow to a greenish-yellow (due to uncertainties in the choice of RGB colour space, see Supplementary §</span><a data-dcnode-id="1960" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="1961" instrument_node="">5</span></a><span data-dcnode-id="1959" instrument_node="">).</span></p><p data-dcnode-id="1949"><span data-dcnode-id="1957" instrument_node="">It is now clear what the physics of the alexandrite effect is. The daylight D65 spectrum is approximately flat, while 1850K blackbody falls off exponentially from the red to the blue (Fig.&nbsp;</span><a data-dcnode-id="1955" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1956" instrument_node="">2a</span></a><span data-dcnode-id="1954" instrument_node="">). The M spectral response is so close to the L, only about 25 nm towards the blue, that this exponential weakens the M signal little (about one-third) relative to the L signal. In contrast, the S spectral response is so much further away, 120 nm, that it drops by nine-tenths relative to the L. These are the changes the colour&nbsp;constancy mechanism corrects when it has detected the illuminant. Under D65, the green light around 500 nm in the alexandrite spectrum dominates and the stone is green. Under the 1850K black-body illumination, after the alexandrite absorption has removed the light around 580 nm, the remaining green light around 500 nm and the remaining red light around 650 nm are so far apart that the green drops relative to the red enormously – much more than colour constancy will correct. Alexandrites do have many other interesting optical properties that may contribute to or detract from the effect, such as polarisation-dependent pleochroism</span><sup data-dcnode-id="1951"><a aria-label="Reference 18" data-dcnode-id="1952" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d258957853e808" title="Schmetzer, K. Pleochroism and color change in faceted alexandrite: Influence of cut and sample orientation. Gems Gemol. 55, 61–71 (2019)."><span data-dcnode-id="1953" instrument_node="">18</span></a></sup><span data-dcnode-id="1950" instrument_node="">, but the wider separation of the remaining green and red in the spectrum after the stones have absorbed the yellow is clearly the fundamental explanation of the alexandrite effect.</span></p><p data-dcnode-id="1924"><span data-dcnode-id="1948" instrument_node="">To directly see the alexandrite effect with different absorption peak positions and widths, a mapping based on Fig.&nbsp;</span><a data-dcnode-id="1946" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1947" instrument_node="">2</span></a><span data-dcnode-id="1945" instrument_node=""> of calculated RGB colours is shown in Fig.&nbsp;</span><a data-dcnode-id="1943" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1944" instrument_node="">3a</span></a><span data-dcnode-id="1942" instrument_node="">. Both stones R1 and R2 are positioned where clear red/green colour contrast occurs (for more details see Supplementary §</span><a data-dcnode-id="1940" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="1941" instrument_node="">8</span></a><span data-dcnode-id="1939" instrument_node=""> Fig.&nbsp;</span><a data-dcnode-id="1937" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="1938" instrument_node="">S4</span></a><span data-dcnode-id="1936" instrument_node="">). The importance of the blue absorption is shown by the map in Fig.&nbsp;</span><a data-dcnode-id="1934" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1935" instrument_node="">3b</span></a><span data-dcnode-id="1933" instrument_node="">, where the blue cut-off has been removed from the absorption spectrum. Now, the alexandrite effect is largely eliminated. Only the weak blue/purple and blue/green colour transitions characteristic of the chrysoberyls</span><sup data-dcnode-id="1930"><a aria-label="Reference 2" data-dcnode-id="1931" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d258957853e831" title="Liu, Y., Shigley, J., Fritsch, E. &amp; Hemphill, S. The “alexandrite effect” in gemstones. Color Res. Appl. 19, 186–191 (1994)."><span data-dcnode-id="1932" instrument_node="">2</span></a></sup><span data-dcnode-id="1929" instrument_node=""> – and some purple flowers</span><sup data-dcnode-id="1926"><a aria-label="Reference 11" data-dcnode-id="1927" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d258957853e835" title="Kasajima, I. Alexandrite-like effect in purple flowers analyzed with newly devised round RGB diagram. Sci Rep 6, 29630 (2016)."><span data-dcnode-id="1928" instrument_node="">11</span></a></sup><span data-dcnode-id="1925" instrument_node=""> – remain.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1888" data-test="figure" data-title="Figure 3" id="figure-3"><figure data-dcnode-id="1889"><figcaption data-dcnode-id="1921"><b class="c-article-section__figure-caption" data-dcnode-id="1922" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="1923" instrument_node="">Figure 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1900"><div class="c-article-section__figure-item" data-dcnode-id="1916"><a class="c-article-section__figure-link" data-dcnode-id="1917" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-62707-3/figures/3" rel="nofollow"><picture data-dcnode-id="1918"><source data-dcnode-id="1920" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-020-62707-3/MediaObjects/41598_2020_62707_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="1919" height="355" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-020-62707-3/MediaObjects/41598_2020_62707_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1901" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1902"><span data-dcnode-id="1915" instrument_node="">Mapping of the alexandrite effect. In (</span><b data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">a</span></b><span data-dcnode-id="1912" instrument_node="">), the colours calculated as for Fig.&nbsp;</span><a data-dcnode-id="1910" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1911" instrument_node="">2</span></a><span data-dcnode-id="1909" instrument_node=""> for daylight (D65) and incandescent light (BB1850K) are plotted as a function of absorption peak position and peak width as background and overlaying spots, respectively. The small region where the full alexandrite effect occurs is outlined. The alexandrite stones R1 and R2 are marked on the map and fall within the outlined region. In (</span><b data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">b</span></b><span data-dcnode-id="1906" instrument_node="">) the map is calculated as for (</span><b data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">a</span></b><span data-dcnode-id="1903" instrument_node="">) but with the blue absorption band removed.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1890"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1891" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-62707-3/figures/3" rel="nofollow"><span data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1892" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1893" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1894" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1897" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1896" fill-rule="evenodd"></path><span data-dcnode-id="1895" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1883"><span data-dcnode-id="1887" instrument_node="">The importance of the yellow absorption for the alexandrite effect is confirmed by our analysis. The very narrow limits on both its position and its strength (i.e. width) if a true red – green alexandrite effect is to be observed are striking. Taking these requirements together with the previously unreported requirement for a blue absorption, it is not surprising that natural alexandrites are so rare, and so prized. Indeed, given this analysis, for large stones or stones with too high a chromium doping in which the true red-green alexandrite effect is weakened by too little red and green transmission compared with the blue, we can conclude that by reducing the yellow absorption-band width, one would be able to increase the alexandrite effect. This could be achieved by cutting the stones thinner (Supplementary §</span><a data-dcnode-id="1885" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="1886" instrument_node="">10</span></a><span data-dcnode-id="1884" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="1799" data-title="Discussion"><div class="c-article-section" data-dcnode-id="1800" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1878" id="Sec3"><span data-dcnode-id="1879" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="1801" id="Sec3-content"><p data-dcnode-id="1832"><span data-dcnode-id="1877" instrument_node="">These results have impact for traditional colour science, in which colour constancy and the related ability to discount the illumination, are sometimes considered to be approximate at best, or even fundamentally non-existent</span><sup data-dcnode-id="1874"><a aria-label="Reference 19" data-dcnode-id="1875" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d258957853e873" title="Fairchild, M. D. Color Appearence Models (2nd ed.) (Wiley, Chichester, 2005)."><span data-dcnode-id="1876" instrument_node="">19</span></a></sup><span data-dcnode-id="1873" instrument_node="">. Yet the alexandrite effect may be described as an objective colour change just as the appearance of yellow under different illuminants may be described as objective constancy. Both can be verified by colour matching by eye and by RBG values (as in the raw and corrected photographs in Fig.&nbsp;</span><a data-dcnode-id="1871" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1872" instrument_node="">1</span></a><span data-dcnode-id="1870" instrument_node="">), consistent with the colorimetry matching that underpins colour science. This questions why a yellow object does not show a colour change but alexandrites do. For people with normal colour vision, yellow is a different </span><i data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">quale</span></i><span data-dcnode-id="1867" instrument_node=""> from red and green</span><sup data-dcnode-id="1864"><a aria-label="Reference 20" data-dcnode-id="1865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d258957853e883" title="Tye, M. Qualia, content, and the inverted spectrum. Noûs 28, 159–183 (1994)."><span data-dcnode-id="1866" instrument_node="">20</span></a></sup><span data-dcnode-id="1863" instrument_node="">, i.e. “yellow” is a basic colour term describing a unique rather than a binary hue such as greenish-blue or bluish-green</span><sup data-dcnode-id="1860"><a aria-label="Reference 21" data-dcnode-id="1861" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d258957853e887" title="Unwin, N. Why do colours look the way they do? Philosophy 86, 405–424 (2011)."><span data-dcnode-id="1862" instrument_node="">21</span></a></sup><span data-dcnode-id="1859" instrument_node="">. There is no reddish-green or greenish-red. Physiologically, yellow is perceived only when the amount of the L and M stimuli to the eye are very close to equal (and greater than the S stimulus)</span><sup data-dcnode-id="1856"><a aria-label="Reference 22" data-dcnode-id="1857" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d258957853e892" title="Hurvich, L. M. &amp; Jameson, D. An opponent-process theory of color vision. Psychological Review 64, 384–404 (1957)."><span data-dcnode-id="1858" instrument_node="">22</span></a></sup><span data-dcnode-id="1855" instrument_node="">. Yet the eye-brain system is so sophisticated that it normally sees a yellow object as yellow even when incandescent light or candlelight swing the red and green stimuli far away from their ratio under daylight. The precision of this correction can be judged from Fig.&nbsp;</span><a data-dcnode-id="1853" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1854" instrument_node="">2</span></a><span data-dcnode-id="1852" instrument_node="">. The ML ratio of 0.66 in Fig.&nbsp;</span><a data-dcnode-id="1850" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1851" instrument_node="">2d</span></a><span data-dcnode-id="1849" instrument_node=""> is corrected to white, and would be corrected to yellow if the S signal were weaker, while the (not dissimilar) ML ratio of 0.59 in Fig.&nbsp;</span><a data-dcnode-id="1847" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1848" instrument_node="">2f</span></a><span data-dcnode-id="1846" instrument_node=""> is corrected to ruby-red. From Fig.&nbsp;</span><a data-dcnode-id="1844" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1845" instrument_node="">2c,l</span></a><span data-dcnode-id="1843" instrument_node=""> we see that the correction is made to an accuracy of 1% or better. It is plausible that the input data is the ratio of S to L + M, for a rough estimate of that will gives a very good estimate of the ML ratio for black-body illumination</span><sup data-dcnode-id="1840"><a aria-label="Reference 23" data-dcnode-id="1841" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d258957853e908" title="Weiss, D., Witzel, C. &amp; Gegenfurtner, K. Determinants of colour constancy and the blue bias. I-Perception 8, 2041669517739635 (2017)."><span data-dcnode-id="1842" instrument_node="">23</span></a></sup><span data-dcnode-id="1839" instrument_node="">. So we conclude that the human visual system does have – must have – a very efficient colour constancy mechanism, </span><i data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">provided</span></i><span data-dcnode-id="1836" instrument_node=""> that it is black-body colour temperatures that are to be corrected, and that the mechanism acts </span><i data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">before</span></i><span data-dcnode-id="1833" instrument_node=""> the L and M signals are compared.</span></p><p data-dcnode-id="1821"><span data-dcnode-id="1831" instrument_node="">This also links to the question: whether colour constancy (to the extent it exists) is innate or learned. One might expect that millions of years of evolution of dichromatic mammals with only two kinds of cones, S and ML) under essentially black-body illumination would lead to innate colour correction based on the ratio of the S to ML. Following this reasoning to consider trichromacy, we test how the required changes in the sensitivities of the M and L cones, for black-body white-light illuminants, might be related to the S signal. Calculations (as for Fig.&nbsp;</span><a data-dcnode-id="1829" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1830" instrument_node="">2</span></a><span data-dcnode-id="1828" instrument_node="">, and detailed in Supplementary §</span><a data-dcnode-id="1826" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="1827" instrument_node="">7</span></a><span data-dcnode-id="1825" instrument_node="">) give the curves of the three signals S, M and L as a function of colour temperature from 1850K to 12000 K. Rather surprisingly, the corrections for M and L turn out to be linearly related to the logarithm of the change in S (Supplementary Fig.&nbsp;</span><a data-dcnode-id="1823" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="1824" instrument_node="">S3</span></a><span data-dcnode-id="1822" instrument_node="">). Noting that most human sensations scale logarithmically with the stimulus (cf. the decibel scale for sound), we speculate that this adaptation of the M and L sensitivities, linear with the S sensation and arising only relatively recently with trichomacy, would be implemented at a higher level of the processing of the signals than the raw S v. ML correction.</span></p><p data-dcnode-id="1804"><span data-dcnode-id="1820" instrument_node="">Another important correction that our visual system does, that silicon-based colour correction does not normally do, is to correct the colour in a shadow to the colour of the unshadowed parts of the same object. The Impressionists were the first artists to observe that shadows are in fact different colours (by overriding their own colour&nbsp;constancy mechanism) and to paint shadows accordingly</span><sup data-dcnode-id="1817"><a aria-label="Reference 7" data-dcnode-id="1818" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d258957853e934" title="Dunstan, B. Painting methods of the Impressionists. (Watson-Guptill, 1992)."><span data-dcnode-id="1819" instrument_node="">7</span></a></sup><span data-dcnode-id="1816" instrument_node="">. Initially, in the 1870s, this shocked the critics and the public; now we view the shadows in these paintings without any sense of shock, implying that there is a learned component to colour constancy. One aspect that could be learned rather than innate is the ability when viewing a painting, a photo or a screen to let colour constancy operate within the picture independently of ambient lighting and the surrounding colours. The extent to which different people learn to do this could account for the different responses to the picture of the dress that went viral</span><sup data-dcnode-id="1813"><a aria-label="Reference 8" data-dcnode-id="1814" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d258957853e938" title="Melgosa, M., Gõmez-Robledo, L., Isabel Suero, M. &amp; Fairchild, M. D. What can we learn from a dress with ambiguous colors? Color Res. Appl. 40, 525–529 (2015)."><span data-dcnode-id="1815" instrument_node="">8</span></a></sup><span data-dcnode-id="1812" instrument_node="">. Specifically, the white parts of the dress are a blue very similar to the blue of the white paper in Fig.&nbsp;</span><a data-dcnode-id="1810" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1811" instrument_node="">1a</span></a><span data-dcnode-id="1809" instrument_node="">. Some peoples’ colour constancy (or ambient lighting) may correct this to white if they are used to such images, and the same correction then takes the other parts to gold. Others, with different visual histories (or ambient lighting), clearly seeing the blue, will then rescale the other parts of the dress to black. However, following Foster</span><sup data-dcnode-id="1806"><a aria-label="Reference 16" data-dcnode-id="1807" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d258957853e945" title="Foster, D. H. Colour constancy. Vision Research 51, 674–700 (2011)."><span data-dcnode-id="1808" instrument_node="">16</span></a></sup><span data-dcnode-id="1805" instrument_node="">, we suppose that all these corrections come after the initial von Kries correction for the illuminant colour temperature.</span></p><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">In summary, the colour balancing and correction of the photographs of alexandrites and the calculations of the colour change based on colorimetry and colour space theories indicate that the precision of the colour&nbsp;constancy mechanism in the human eye-brain system and its overriding by the alexandrites play the key role for the alexandrite effect. These results provide a broader insight into colour constancy and colour perception in the human eye-brain system.</span></p></div></div></section><section data-dcnode-id="1749" data-title="Methods"><div class="c-article-section" data-dcnode-id="1750" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1797" id="Sec4"><span data-dcnode-id="1798" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="1751" id="Sec4-content"><p data-dcnode-id="1788"><span data-dcnode-id="1796" instrument_node="">The alexandrite stones (BM41177 and BM41178, both from Russia) were from the collection of the Natural History Museum, London, UK. They were observed and photographed under natural daylight (north light, in the shadow of a large building on a summer day with sun and scattered clouds) and in a darkroom with only incandescent light for illumination. Candlelight and a tungsten lamp were both used with very similar results; the images in Fig.&nbsp;</span><a data-dcnode-id="1794" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1795" instrument_node="">1b,d</span></a><span data-dcnode-id="1793" instrument_node=""> were made with the tungsten lamp. The stones were placed on a printout of a CIE 1976 UCS colour chart</span><sup data-dcnode-id="1790"><a aria-label="Reference 9" data-dcnode-id="1791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d258957853e963" title="Available at: 
https://www.reef2reef.com/threads/understanding-spectrographs-and-chromaticity-graphs.120273/

 (accessed 20/10/2019)."><span data-dcnode-id="1792" instrument_node="">9</span></a></sup><span data-dcnode-id="1789" instrument_node=""> as a background, and a piece of white paper was placed in the picture. The position was selected by five judges (CR, AH, EDT, AJD and DJD for one session and AH, RH, EDT, AJD and DJD for another session). Each judge moved the stone as they thought best to improve the colour match to the chart; this process converged each time on a position at which no-one proposed a further move, i.e. a position to which all judges consented. A digital camera (Nikon D5100, 16 MP CMOS detector) was used with all colour-balance and selective-colour software switched off, and flash and autofocus also off. Images were exported from the camera as NEF files (raw 14-bit data from the image sensor) and converted to JPGs by opening them in Microsoft Photos and saving a JPG copy.</span></p><p data-dcnode-id="1772"><span data-dcnode-id="1787" instrument_node="">These files were then imported into </span><i data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Mathematica</span></i><sup data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">©</span></sup><span data-dcnode-id="1782" instrument_node=""> notebooks using </span><span class="u-monospace" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">image = Import[filename]</span></span><span data-dcnode-id="1779" instrument_node="">, and converted to two-dimensional tables of triplet {R, G, B} values using </span><span class="u-monospace" data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">data = ImageData[image]</span></span><span data-dcnode-id="1776" instrument_node="">. Parts of the images could be selected using </span><span class="u-monospace" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Part[data,{indices}]</span></span><span data-dcnode-id="1773" instrument_node="">.</span></p><p data-dcnode-id="1752"><span data-dcnode-id="1771" instrument_node="">Colour balancing was applied to create the corrected images (Fig.&nbsp;</span><a data-dcnode-id="1769" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1770" instrument_node="">1c,d</span></a><span data-dcnode-id="1768" instrument_node="">). For Fig.&nbsp;</span><a data-dcnode-id="1766" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1767" instrument_node="">1</span></a><span data-dcnode-id="1765" instrument_node="">, we used a simple approximate technique for RGB image files. These photos were corrected by dividing all pixel (R, G, B) values by the (R, G, B) values of the white paper. Then the image was re-created using </span><span class="u-monospace" data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">image = Image[data]</span></span><span data-dcnode-id="1762" instrument_node="">. This makes the paper RGB-white, (1, 1, 1), in the colour space of the camera and of any RGB or CMYK display unit or printer (see Supplementary §</span><a data-dcnode-id="1760" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="1761" instrument_node="">1</span></a><span data-dcnode-id="1759" instrument_node="">). The procedure is not very accurate for other colours because the response curves of the R, G and B photodetectors in the camera are not known nor used, and nor are the spectra of the R, G and B light sources in a computer monitor or the corresponding spectra of the inks in a colour printer. In particular, the blue cast of the red CIE chart in Fig.&nbsp;</span><a data-dcnode-id="1757" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1758" instrument_node="">1d</span></a><span data-dcnode-id="1756" instrument_node=""> around the stone, where the light was brightest, appears to arise from a sub-linearity of the photodetectors at high light levels (see Supplementary §</span><a data-dcnode-id="1754" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="1755" instrument_node="">1</span></a><span data-dcnode-id="1753" instrument_node="">).</span></p></div></div></section><span data-dcnode-id="1748" instrument_node="">
