</span><meta content="The accurate representation of data is essential in science communication. However, colour maps that visually distort data through uneven colour gradients or are unreadable to those with colour-vision deficiency remain prevalent in science. These include, but are not limited to, rainbow-like and red–green colour maps. Here, we present a simple guide for the scientific use of colour. We show how scientifically derived colour maps report true data variations, reduce complexity, and are accessible for people with colour-vision deficiencies. We highlight ways for the scientific community to identify and prevent the misuse of colour in science, and call for a proactive step away from colour misuse among the community, publishers, and the press. The accurate representation of data is essential in science communication, however, colour maps that visually distort data through uneven colour gradients or are unreadable to those with colour vision deficiency remain prevalent. Here, the authors present a simple guide for the scientific use of colour and highlight ways for the scientific community to identify and prevent the misuse of colour in science." data-dcnode-id="4830" name="dc.description"><span data-dcnode-id="4829" instrument_node="">

</span><div class="c-article-body" data-dcnode-id="1625"><span data-dcnode-id="3858" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="3851" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3852" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3856" id="Abs1"><span data-dcnode-id="3857" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3853" id="Abs1-content"><p data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">The accurate representation of data is essential in science communication. However, colour maps that visually distort data through uneven colour gradients or are unreadable to those with colour-vision deficiency remain prevalent in science. These include, but are not limited to, rainbow-like and red–green colour maps. Here, we present a simple guide for the scientific use of colour. We show how scientifically derived colour maps report true data variations, reduce complexity, and are accessible for people with colour-vision deficiencies. We highlight ways for the scientific community to identify and prevent the misuse of colour in science, and call for a proactive step away from colour misuse among the community, publishers, and the press.</span></p></div></div></section><span data-dcnode-id="3850" instrument_node="">
</span><noscript data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">

</span><section data-dcnode-id="3004" data-title="Introduction"><div class="c-article-section" data-dcnode-id="3005" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3845" id="Sec1"><span data-dcnode-id="3846" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="3006" id="Sec1-content"><p data-dcnode-id="3814"><span data-dcnode-id="3844" instrument_node="">Vision is one of the most fundamental means of communication. It is (or should be) in every scientist’s best intention to make figures and their content as accurate and easily understandable as possible. One of the most powerful aspects of images is colour, which in turn transforms information into meaning. The visual evaluation of a colour gradient is important to a variety of different fields such as the first direct impression of a black hole</span><sup data-dcnode-id="3841"><a aria-label="Reference 1" data-dcnode-id="3842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d301024028e374" title="Akiyama, K. et al. First M87 event horizon telescope results. IV. Imaging the central supermassive black hole. Astrophys. J. Lett. 875, L4 (2019)."><span data-dcnode-id="3843" instrument_node="">1</span></a></sup><span data-dcnode-id="3840" instrument_node="">, the mapping of votes cast in political elections</span><sup data-dcnode-id="3834"><a aria-label="Reference 2" data-dcnode-id="3838" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d301024028e378" title="Long, E. Election Data Visualisation (University of Plymouth, 2013)."><span data-dcnode-id="3839" instrument_node="">2</span></a><span data-dcnode-id="3837" instrument_node="">,</span><a aria-label="Reference 3" data-dcnode-id="3835" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d301024028e381" title="Cox, A., Bostock, M., Watkins, D. &amp; Shan, C. The Most Detailed Maps You’ll See from the Midterm Elections., 
https://www.nytimes.com/interactive/2014/11/04/upshot/senate-maps.html

 (2014)."><span data-dcnode-id="3836" instrument_node="">3</span></a></sup><span data-dcnode-id="3833" instrument_node="">, the planning of an expensive rover route on Martian topography</span><sup data-dcnode-id="3830"><a aria-label="Reference 4" data-dcnode-id="3831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d301024028e385" title="Lemoine, F. G. et al. An improved solution of the gravity field of Mars (GMM-2B) from Mars Global Surveyor. J. Geophys. Res.: Planets 106, 23359–23376 (2001)."><span data-dcnode-id="3832" instrument_node="">4</span></a></sup><span data-dcnode-id="3829" instrument_node="">, the essential communication of climate change</span><sup data-dcnode-id="3823"><a aria-label="Reference 5" data-dcnode-id="3827" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d301024028e389" title="Hawkins, E. Scrap rainbow colour scales. Nature 519, 291 EP (2015)."><span data-dcnode-id="3828" instrument_node="">5</span></a><span data-dcnode-id="3826" instrument_node="">,</span><a aria-label="Reference 6" data-dcnode-id="3824" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d301024028e392" title="IPCC. Global Warming of 1.5° C: An IPCC Special Report on the Impacts of Global Warming of 1.5° C Above Pre-industrial Levels and Related Global Greenhouse Gas Emission Pathways, in the Context of Strengthening the Global Response to the Threat of Climate Change, Sustainable Development, and Efforts to Eradicate Poverty. (Intergovernmental Panel on Climate Change, 2018)."><span data-dcnode-id="3825" instrument_node="">6</span></a></sup><span data-dcnode-id="3822" instrument_node="">, or the critical diagnosis of heart disease</span><sup data-dcnode-id="3819"><a aria-label="Reference 7" data-dcnode-id="3820" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d301024028e396" title="Borkin, M. et al. Evaluation of artery visualizations for heart disease diagnosis. IEEE Trans. Vis. Computer Graph. 17, 2479–2488 (2011)."><span data-dcnode-id="3821" instrument_node="">7</span></a></sup><span data-dcnode-id="3818" instrument_node="">. However, when colours are used incorrectly, this can lead to the effective manipulation of data (e.g., by highlighting some data over others), the oversight of the needs of those with colour vision deficiencies, and the removal of meaning when printed in black and white (Supplementary Note&nbsp;</span><a data-dcnode-id="3816" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3817" instrument_node="">1</span></a><span data-dcnode-id="3815" instrument_node="">).</span></p><p data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">As science has become more prevalent in mainstream culture, it is not only the scientific community that suffers due to the use of poor colour choices, but also the wider public. Colour maps, therefore, are a crucial intersection between science and society. For instance, weather forecasts and hazard maps are two examples of immediately societal-relevant data sets that are also repeat offenders for use of the rainbow-like colour maps. Given the (daily) importance of these scientific topics, the underlying data should be conveyed in a universal manner. However, the colour-vision deficient fraction of the population is excluded and therefore unable to process this critical information. Furthermore, zones of danger, such as the boundaries of a hurricane track or current virus spread, are often based on uneven colour gradients to accentuate their importance. Using an&nbsp;uneven colour gradient is not an action without consequences, including those with significant financial or life-threatening consequences. Decisions based on data being ‘unfairly’ represented could produce, for instance, a Martian rover being sent over terrain that is too steep as the topography was inaccurately visualised, or a medical worker making an incomplete or inaccurate diagnosis based on uneven colour gradients.</span></p><p data-dcnode-id="3769"><span data-dcnode-id="3811" instrument_node="">Although some scientific communities have largely moved away from using distorting colour maps, such as rainbow, there are numerous signs of bad habits returning en masse</span><sup data-dcnode-id="3808"><a aria-label="Reference 8" data-dcnode-id="3809" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d301024028e410" title="McNeall, D. How many Rainbows at EGU 2018, <
https://betterfigures.org/2018/04/16/how-many-rainbows-at-egu-2018

> (2020)."><span data-dcnode-id="3810" instrument_node="">8</span></a></sup><span data-dcnode-id="3807" instrument_node="">. Unfortunately, the previous efforts within specific disciplines to discredit rainbow-like maps appear to have&nbsp;not trickled through to all scientific leaders, publishers, and software designers. For most scientists, the choice of colour maps has become almost passive, with the unscientific rainbow-like colour palette being commonplace.&nbsp;Similarly, colour maps that pair red–green are also problematic, but remain widely used. At one point, most of the common software programmes applied rainbow as their default palette (e.g., MatLab, Paraview, VisAd, IrisExplorer) despite issues surrounding colour maps like rainbow, and variations thereof, being known for some time</span><sup data-dcnode-id="3771"><a data-dcnode-id="3805" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d301024028e414" title="Bertin, J. Graphics and Graphic Information Processing. (Walter de Gruyter, 2011)."><span data-dcnode-id="3806" instrument_node="">9</span></a><span data-dcnode-id="3804" instrument_node="">,</span><a data-dcnode-id="3802" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d301024028e414_1" title="Bertin, J. Semiology of graphics; diagrams networks maps. (University of Wisconsin, Press, Madison, 1983)."><span data-dcnode-id="3803" instrument_node="">10</span></a><span data-dcnode-id="3801" instrument_node="">,</span><a data-dcnode-id="3799" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d301024028e414_2" title="Tufte, E. R. Envisioning Information. Vol. 126 (Graphics Press, 1990)."><span data-dcnode-id="3800" instrument_node="">11</span></a><span data-dcnode-id="3798" instrument_node="">,</span><a data-dcnode-id="3796" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d301024028e414_3" title="Travis, D. Effective Color Displays: Theory and Practice. Vol. 1991 (Academic press London, 1991)."><span data-dcnode-id="3797" instrument_node="">12</span></a><span data-dcnode-id="3795" instrument_node="">,</span><a data-dcnode-id="3793" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d301024028e414_4" title="Brewer, C. A. Color use guidelines for mapping. Vis. Mod. Cartogr. 1994, 123–148 (1994)."><span data-dcnode-id="3794" instrument_node="">13</span></a><span data-dcnode-id="3792" instrument_node="">,</span><a data-dcnode-id="3790" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d301024028e414_5" title="MacEachren, A. M. How Maps Work: Representation, Visualization, and Design. (Guilford Press, 2004)."><span data-dcnode-id="3791" instrument_node="">14</span></a><span data-dcnode-id="3789" instrument_node="">,</span><a data-dcnode-id="3787" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d301024028e414_6" title="Dent, B. D., Torguson, J. S. &amp; Hodler, T. W. Cartography: Thematic Map Design. Vol. 5 (WCB/McGraw-Hill New York, 1999)."><span data-dcnode-id="3788" instrument_node="">15</span></a><span data-dcnode-id="3786" instrument_node="">,</span><a data-dcnode-id="3784" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d301024028e414_7" title="Robinson, A. Elements of Cartography. (John Wiley and Sons, New York, 1960)."><span data-dcnode-id="3785" instrument_node="">16</span></a><span data-dcnode-id="3783" instrument_node="">,</span><a data-dcnode-id="3781" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d301024028e414_8" title="Monmonier, M. How to Lie with Maps (University of Chicago Press, 2018)."><span data-dcnode-id="3782" instrument_node="">17</span></a><span data-dcnode-id="3780" instrument_node="">,</span><a data-dcnode-id="3778" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d301024028e414_9" title="Light, A. &amp; Bartlein, P. J. The end of the rainbow? Color schemes for improved data graphics. Eos Trans. AGU 85, 385–391 (2004)."><span data-dcnode-id="3779" instrument_node="">18</span></a><span data-dcnode-id="3777" instrument_node="">,</span><a data-dcnode-id="3775" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d301024028e414_10" title="Stauffer, R., Mayr, G. J., Dabernig, M. &amp; Zeileis, A. Somewhere over the rainbow: how to make effective use of colors in meteorological visualizations. Bull. Am. Meteorological Soc. 96, 203–216 (2015)."><span data-dcnode-id="3776" instrument_node="">19</span></a><span data-dcnode-id="3774" instrument_node="">,</span><a aria-label="Reference 20" data-dcnode-id="3772" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d301024028e417" title="Thyng, K. M., Greene, C. A., Hetland, R. D., Zimmerle, H. M. &amp; DiMarco, S. F. True colors of oceanography: guidelines for effective and accurate colormap selection. Oceanography 29, 9–13 (2016). Introducing the scientifically derived cmocean colour maps for better data visualisation in oceanography that also underline the importance of intuitive colour palettes given a certain data parameter."><span data-dcnode-id="3773" instrument_node="">20</span></a></sup><span data-dcnode-id="3770" instrument_node="">.</span></p><p data-dcnode-id="3744"><span data-dcnode-id="3768" instrument_node="">So, what’s the problem with these colour maps? Even though rainbow colour maps might reflect aesthetic attractiveness, the extreme values in the standard Red-Green-Blue (RGB) are very dominant and can, therefore, distract from the underlying visual message</span><sup data-dcnode-id="3765"><a aria-label="Reference 21" data-dcnode-id="3766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d301024028e424" title="Cairo, A. The Functional Art: An Introduction to Information Graphics and Visualization. (New Riders, 2012)."><span data-dcnode-id="3767" instrument_node="">21</span></a></sup><span data-dcnode-id="3764" instrument_node="">. In rainbow colour maps, the yellow is the brightest colour and attracts the eye the most</span><sup data-dcnode-id="3758"><a aria-label="Reference 22" data-dcnode-id="3762" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d301024028e428" title="Wolfe, J. M. &amp; Horowitz, T. S. Five factors that guide attention in visual search. Nat. Hum. Behav. 1, 0058 (2017)."><span data-dcnode-id="3763" instrument_node="">22</span></a><span data-dcnode-id="3761" instrument_node="">,</span><a aria-label="Reference 23" data-dcnode-id="3759" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d301024028e431" title="Alexander, K. R. &amp; Shansky, M. S. Influence of hue, value, and chroma on the perceived heaviness of colors. Percept. Psychophys. 19, 72–74 (1976)."><span data-dcnode-id="3760" instrument_node="">23</span></a></sup><span data-dcnode-id="3757" instrument_node=""> (see Box&nbsp;</span><a data-dcnode-id="3755" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3756" instrument_node="">1</span></a><span data-dcnode-id="3754" instrument_node="">), but it is neither at the end nor the centre of the colour map, while its greenish shades form a wide band with low perceived colour contrast (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3752" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3753" instrument_node="">1</span></a><span data-dcnode-id="3751" instrument_node="">). Hence, such an arrangement of colours can unfairly highlight a particular section of the parameter space while obscuring other parts (Fig.&nbsp;</span><a data-dcnode-id="3749" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3750" instrument_node="">1</span></a><span data-dcnode-id="3748" instrument_node="">). Building a colour map on a purely physical rather than a perceptual basis significantly alters how we perceive data; it adds artificial boundaries to some parts of the data range, hiding small-scale variations elsewhere, it prevents any visual intuitive order occurring in the data set, and renders the data unreadable for readers with common colour-vision deficiencies (Fig.&nbsp;</span><a data-dcnode-id="3746" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3747" instrument_node="">2</span></a><span data-dcnode-id="3745" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3703" data-test="figure" data-title="The superiority of scientifically derived colour maps." id="figure-1"><figure data-dcnode-id="3704"><figcaption data-dcnode-id="3741"><b class="c-article-section__figure-caption" data-dcnode-id="3742" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3743" instrument_node="">Fig. 1: The superiority of scientifically derived colour maps.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3715"><div class="c-article-section__figure-item" data-dcnode-id="3736"><a class="c-article-section__figure-link" data-dcnode-id="3737" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/1" rel="nofollow"><picture data-dcnode-id="3738"><source data-dcnode-id="3740" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-020-19160-7/MediaObjects/41467_2020_19160_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="3739" height="313" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-020-19160-7/MediaObjects/41467_2020_19160_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3716" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="3717"><span data-dcnode-id="3735" instrument_node="">By knowing what something looks like in advance, the distortion by unscientific colour maps, like jet or rainbow, becomes instantly obvious. The look of scientific data is, however, usually unknown a priori, which makes the distortion of an unscientific colour map, and the true data representation of a scientifically derived colour map, like batlow</span><sup data-dcnode-id="3732"><a aria-label="Reference 41" data-dcnode-id="3733" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d301024028e460" title="Crameri, F. Scientific Colour Maps, 
http://www.fabiocrameri.ch/colourmaps

 (2020)."><span data-dcnode-id="3734" instrument_node="">41</span></a></sup><span data-dcnode-id="3731" instrument_node="">, less apparent. Marie Skłodowska-Curie, as originally photographed by Henri Manuel around 1920, the Earth from space, and an apple are shown </span><b data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">a</span></b><span data-dcnode-id="3728" instrument_node=""> in their original images and </span><b data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">b</span></b><span data-dcnode-id="3725" instrument_node=""> in distorted and </span><b data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">c</span></b><span data-dcnode-id="3722" instrument_node=""> in undistorted colour versions. Inferring the true picture from an unscientifically (e.g., jet) coloured data set is incomparably harder than from a data set represented in a perceptually uniform and ordered colour map, like batlow</span><sup data-dcnode-id="3719"><a aria-label="Reference 41" data-dcnode-id="3720" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d301024028e473" title="Crameri, F. Scientific Colour Maps, 
http://www.fabiocrameri.ch/colourmaps

 (2020)."><span data-dcnode-id="3721" instrument_node="">41</span></a></sup><span data-dcnode-id="3718" instrument_node="">.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3705"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="3706" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/1" rel="nofollow"><span data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3707" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3708" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3709" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3712" instrument_node="">

d-white prints). Rainbow, the most-widely used colour map, fails to reproduce a meaningful smooth gradient, yet the other colour maps&nbsp;(see Box 2) are all universally readable.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3681"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="3682" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/2" rel="nofollow"><span data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3683" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3684" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3685" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3688" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3687" fill-rule="evenodd"></path><span data-dcnode-id="3686" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3653"><span data-dcnode-id="3678" instrument_node="">Colour maps that include both red and green colours with similar lightness cannot be read by a large fraction of the readership (Fig.&nbsp;</span><a data-dcnode-id="3676" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3677" instrument_node="">2</span></a><span data-dcnode-id="3675" instrument_node="">). The general estimate is that worldwide 0.5% of women and 8% of men are subject to a colour-vision deficiency (CVD; e.g., refs. </span><sup data-dcnode-id="3669"><a aria-label="Reference 24" data-dcnode-id="3673" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d301024028e511" title="Sharpe, L. T., Stockman, A., Jägle, H. &amp; Nathans, J. Opsin Genes, Cone Photopigments, Color Vision, and Color Blindness. Vol. 351 (Cambridge University Press, 1999)."><span data-dcnode-id="3674" instrument_node="">24</span></a><span data-dcnode-id="3672" instrument_node="">,</span><a aria-label="Reference 25" data-dcnode-id="3670" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d301024028e514" title="Neitz, J. &amp; Neitz, M. The genetics of normal and defective color vision. Vis. Res. 51, 633–651 (2011)."><span data-dcnode-id="3671" instrument_node="">25</span></a></sup><span data-dcnode-id="3668" instrument_node="">, and references therein). While these numbers are lower and almost disappear in populations from sub-Saharan Africa, they are likely significantly higher in populations with a larger fraction of white (Caucasian) people as, for example, in Scandinavia</span><sup data-dcnode-id="3665"><a aria-label="Reference 26" data-dcnode-id="3666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d301024028e518" title="Drummond-Borg, M., Deeb, S. S. &amp; Motulsky, A. G. Molecular patterns of X chromosome-linked color vision genes among 134 men of European ancestry. Proc. Natl Acad. Sci. 86, 983–987 (1989)."><span data-dcnode-id="3667" instrument_node="">26</span></a></sup><span data-dcnode-id="3664" instrument_node="">. It is needless to state that scientific results should be accessible to as many people as possible. CVD-friendliness is, therefore, an aspect that should be important to all researchers, as well as publishers</span><sup data-dcnode-id="3655"><a aria-label="Reference 18" data-dcnode-id="3662" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d301024028e522" title="Light, A. &amp; Bartlein, P. J. The end of the rainbow? Color schemes for improved data graphics. Eos Trans. AGU 85, 385–391 (2004)."><span data-dcnode-id="3663" instrument_node="">18</span></a><span data-dcnode-id="3661" instrument_node="">,</span><a aria-label="Reference 27" data-dcnode-id="3659" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d301024028e525" title="Albrecht, M. Color blindness. Nat. Methods 7, 775 EP (2010)."><span data-dcnode-id="3660" instrument_node="">27</span></a><span data-dcnode-id="3658" instrument_node="">,</span><a aria-label="Reference 28" data-dcnode-id="3656" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d301024028e528" title="Wong, B. Reply to \“More on color blindness\“. Nat. Methods 8, 891 EP (2011)."><span data-dcnode-id="3657" instrument_node="">28</span></a></sup><span data-dcnode-id="3654" instrument_node="">.</span></p><p data-dcnode-id="3644"><span data-dcnode-id="3652" instrument_node="">For the casual reader, it might appear curious that the community of scientists, a group of people who are usually more critically inclined, fail to condemn the proliferation among themselves of rainbow and other, similarly unfit, colour maps. Based on this prevalence of unscientific colour maps, a basic understanding of their nature (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3650" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3651" instrument_node="">2</span></a><span data-dcnode-id="3649" instrument_node="">) and their dynamics seems to be missing in the academic community. Colour map choice is often made passively and is not subject to the same scrutiny as other data methodologies. Rainbow’s eye-grabbing nature, ease of use, and the inertia of both software products and scientific group leaders, allows the scientific community to remain attached to this unscientific colour map</span><sup data-dcnode-id="3646"><a aria-label="Reference 29" data-dcnode-id="3647" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d301024028e538" title="Moreland, K. Why we use bad color maps and what you can do about it. Electron. Imaging 2016, 1–6 (2016). The widespread use of the rainbow is the main reason scientists propagate it further, which must therefore be considered if a scientific alternative is to be effective."><span data-dcnode-id="3648" instrument_node="">29</span></a></sup><span data-dcnode-id="3645" instrument_node="">. As a result, pointing out colour map flaws to the science community through scientific peer-review remains a challenging task, as requests or suggestions to change the colour palette are often met with rebuttal, misunderstanding, or are simply ignored.</span></p><p data-dcnode-id="3639"><span data-dcnode-id="3643" instrument_node="">Here, we highlight the importance of the scientific use of colour in data visualisation. We summarise methods to generate colour maps that deliver equal colour gradients all along the colour axis, to prevent data distortion. Various types of scientifically derived colour maps are readily and freely available (Box&nbsp;</span><a data-dcnode-id="3641" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec3"><span data-dcnode-id="3642" instrument_node="">2</span></a><span data-dcnode-id="3640" instrument_node="">), and are the only way to intuitively and inclusively represent data without any blind interpretation. We outline key guidelines for choosing scientific colour maps that most accurately represent your data, and highlight how to spot common unscientific colour maps so they can be avoided. Finally, we call for a universal switch by the science community to adopt scientifically derived colour maps. Individuals, publishers and press should take a proactive approach to spot unscientific use of colour and so prevent the dissemination of visually distorted data.</span></p><div class="c-article-box" data-dcnode-id="3575" data-expandable-box-container="true"><div aria-hidden="true" class="c-article-box__container" data-dcnode-id="3581" data-expandable-box="true" id="box-Sec2" style="height: 95px;"><h3 class="c-article-box__container-title u-h3 js-expandable-title" data-dcnode-id="3637" id="Sec2"><span data-dcnode-id="3638" instrument_node="">BOX 1: Human colour perception</span></h3><div class="c-article-box__content" data-dcnode-id="3582"><p data-dcnode-id="3632"><span data-dcnode-id="3636" instrument_node="">Colour is not inherent in objects. A perceived colour is the portion of light that is reflected from a surface and translated into a specific colour by our eyes and brain (Box Fig.&nbsp;</span><a data-dcnode-id="3634" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1" tabindex="-1"><span data-dcnode-id="3635" instrument_node="">1</span></a><span data-dcnode-id="3633" instrument_node="">). A certain colour is perceived via its hue, the true tint (i.e., yellow, orange, red, violet, blue or green), and its luminosity (the measure of how bright or dark a hue is). Within the eye, one type of light receptors, the rod cells, process achromatic information (i.e., lightness or grey-scale vision), which is derived mostly from the light’s energy. The other type, the cone cells, handle chromatic information (the hue) mostly from the light’s wavelength. The latter transmit information to the brain and create the sensation of colour that is so familiar to most of us.</span></p><p data-dcnode-id="3613"><span data-dcnode-id="3631" instrument_node="">Two thirds of all cone cells process longer wavelengths of light (i.e., colours like red, orange, yellow), which allows the human eye to perceive more colour detail across warmer colours than for cooler colours</span><sup data-dcnode-id="3628"><a aria-label="Reference 54" data-dcnode-id="3629" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d301024028e561" tabindex="-1" title="Curcio, C. A. et al. Distribution and morphology of human cone photoreceptors stained with anti‐blue opsin. J. Comp. Neurol. 312, 610–624 (1991)."><span data-dcnode-id="3630" instrument_node="">54</span></a></sup><span data-dcnode-id="3627" instrument_node="">. Greenish colour gradients tend to under-represent a given data variation compared to yellow-red gradients. Three types of cone cells (for short, medium and, long wavelengths) build the trichromatic visual system that can, as a whole, represent all colours in our visual spectrum</span><sup data-dcnode-id="3615"><a data-dcnode-id="3625" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d301024028e565" tabindex="-1" title="Meyer, G. W. &amp; Greenberg, D. P. Color-defective vision and computer graphics displays. IEEE Computer Graph. Appl. 8, 28–40 (1988)."><span data-dcnode-id="3626" instrument_node="">55</span></a><span data-dcnode-id="3624" instrument_node="">,</span><a data-dcnode-id="3622" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d301024028e565_1" tabindex="-1" title="Lennie, P., Pokorny, J. &amp; Smith, V. C. Luminance. J. Optical Soc. Am. A: Opt. Image Sci., Vis. 10, 1283–1293 (1993)."><span data-dcnode-id="3623" instrument_node="">56</span></a><span data-dcnode-id="3621" instrument_node="">,</span><a data-dcnode-id="3619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d301024028e565_2" tabindex="-1" title="Kaiser, P. &amp; Boynton, R. Human Color Vision. 2nd edn, (Optical Society of America, 1996)."><span data-dcnode-id="3620" instrument_node="">57</span></a><span data-dcnode-id="3618" instrument_node="">,</span><a aria-label="Reference 58" data-dcnode-id="3616" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d301024028e568" tabindex="-1" title="Roorda, A., Metha, A. B., Lennie, P. &amp; Williams, D. R. Packing arrangement of the three cone classes in primate retina. Vis. Res. 41, 1291–1306 (2001)."><span data-dcnode-id="3617" instrument_node="">58</span></a></sup><span data-dcnode-id="3614" instrument_node="">.</span></p><p data-dcnode-id="3596"><span data-dcnode-id="3612" instrument_node="">The physiological prerequisites for perceiving colour suggest that there is no uniform colour perception among individuals</span><sup data-dcnode-id="3609"><a aria-label="Reference 59" data-dcnode-id="3610" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d301024028e575" tabindex="-1" title="Lafer-Sousa, R., Hermann, K. L. &amp; Conway, B. R. Striking individual differences in color perception uncovered by ‘the dress’ photograph. Curr. Biol. 25, R545–R546 (2015)."><span data-dcnode-id="3611" instrument_node="">59</span></a></sup><span data-dcnode-id="3608" instrument_node="">; several physiological deviations can lead to a shift in colour perception, which, in general, is hardly measurable</span><sup data-dcnode-id="3605"><a aria-label="Reference 60" data-dcnode-id="3606" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d301024028e579" tabindex="-1" title="Emery, K. J. &amp; Webster, M. A. Individual differences and their implications for color perception. Curr. Opin. Behav. Sci. 30, 28–33 (2019)."><span data-dcnode-id="3607" instrument_node="">60</span></a></sup><span data-dcnode-id="3604" instrument_node="">. However, it is not unlikely that at least one of the cone cell types is altered, defect, or even absent, which induces a significant shift in colour vision. Such a shift is commonly referred to as colour-vision deficiency (CVD), or colour blindness, and can be modelled by a given combination of the three fundamental spectral sensitivity functions representing short, medium and long wavelengths of the light</span><sup data-dcnode-id="3601"><a aria-label="Reference 55" data-dcnode-id="3602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d301024028e583" tabindex="-1" title="Meyer, G. W. &amp; Greenberg, D. P. Color-defective vision and computer graphics displays. IEEE Computer Graph. Appl. 8, 28–40 (1988)."><span data-dcnode-id="3603" instrument_node="">55</span></a></sup><span data-dcnode-id="3600" instrument_node=""> (as represented in Fig.&nbsp;</span><a data-dcnode-id="3598" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2" tabindex="-1"><span data-dcnode-id="3599" instrument_node="">2</span></a><span data-dcnode-id="3597" instrument_node="">). The most common form of colour-vision deficiency is the red–green dichromatism, called deuteranomaly, concerning the M-cone and causing red and green to appear indistinguishable. Protanomaly, concerning the L-cone, and tritanomaly, concerning the S-cone cause reduced sensitivity to red and blue light, respectively. Total colour blindness is, fortunately, very rare, but does exist.</span></p><p data-dcnode-id="3588"><span data-dcnode-id="3595" instrument_node="">Box Fig.&nbsp;</span><a data-dcnode-id="3593" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1" tabindex="-1"><span data-dcnode-id="3594" instrument_node="">1</span></a><span data-dcnode-id="3592" instrument_node="">: </span><b data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Simplified schematic of human colour perception</span></b><span data-dcnode-id="3589" instrument_node="">. The perception of a certain colour, or colour gradient, by the optical cortex depends not only on the optical properties of the object, but also on the optical properties of both light source and object background, and the eye’s light receptors (rod and cone cells for short, medium and long wavelengths).</span></p><div class="c-article-section__illustration-center c-article-section__illustration u-clearfix" data-dcnode-id="3583" data-test="illustration" id="i1" style="width:703px;"><div class="c-article-section__figure c-article-section__figure--1-border" data-dcnode-id="3584"><picture data-dcnode-id="3585"><source data-dcnode-id="3587" srcset="//media.springernature.com/relative-r300-703_m1050/springer-static/image/art%3A10.1038%2Fs41467-020-19160-7/MediaObjects/41467_2020_19160_Figa_HTML.png?as=webp" type="image/webp"><img alt="" class="c-article-section__figure--1-border-image" data-dcnode-id="3586" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/relative-r300-703_m1050/springer-static/image/art%253A10.1038/s41467-020-19160-7/MediaObjects/41467_2020_19160_Figa_HTML.png&amp;raw" width="703"></picture></div></div></div></div><div class="c-article-box__controls" data-dcnode-id="3576"><div class="c-article-box__fade" data-dcnode-id="3580"></div><button aria-describedby="Sec2" aria-expanded="false" data-dcnode-id="3577"><span class="c-article-box__button-text" data-dcnode-id="3578" data-expandable-label=""><span data-dcnode-id="3579" instrument_node="">Show more</span></span></button></div></div><div class="c-article-box" data-dcnode-id="3465" data-expandable-box-container="true"><div aria-hidden="true" class="c-article-box__container" data-dcnode-id="3471" data-expandable-box="true" id="box-Sec3" style="height: 95px;"><h3 class="c-article-box__container-title u-h3 js-expandable-title" data-dcnode-id="3573" id="Sec3"><span data-dcnode-id="3574" instrument_node="">BOX 2 Freely available scientifically derived colour maps and toolkits</span></h3><div class="c-article-box__content" data-dcnode-id="3472"><p data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Scientifically derived colour maps should be easily recognisable, and also be freely and readily available. While there are many online sources to download pre-made colour maps, and toolboxes to create colour maps, only few offer all the aspects required for use in science communication. Below, we mention the most accessible and/or robustly documented sources of scientifically derived colour maps, and outline their individual properties.</span></p><ul class="u-list-style-bullet" data-dcnode-id="3473"><span data-dcnode-id="3570" instrument_node="">
</span><li data-dcnode-id="3559"><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3561"><b data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Colorbrewer</span></b><span data-dcnode-id="3566" instrument_node="">: The Colorbrewer colour maps (available at ref. </span><sup data-dcnode-id="3563"><a aria-label="Reference 61" data-dcnode-id="3564" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d301024028e622" tabindex="-1" title="Brewer, C. A. Colorbrewer Colour Maps, 
https://colorbrewer2.org/

 (2020)."><span data-dcnode-id="3565" instrument_node="">61</span></a></sup><span data-dcnode-id="3562" instrument_node="">) developed by Cynthia Brewer are provided through an online tool to manually produce and export a variety of discrete colour maps, which can, optionally, be colour-vision deficiency friendly and exported to a given a variety of formats. With the main aim being cartography, the online tool offers sequential, diverging and categorical (or in other words, qualitative) colour maps, but does not currently offer them in a continuous type.</span></p><span data-dcnode-id="3560" instrument_node="">
</span></li><span data-dcnode-id="3558" instrument_node="">
</span><li data-dcnode-id="3547"><span data-dcnode-id="3557" instrument_node="">
</span><p data-dcnode-id="3549"><b data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">MPL</span></b><span data-dcnode-id="3554" instrument_node=""> (Matplotlib): The MPL colour maps (available at ref. </span><sup data-dcnode-id="3551"><a aria-label="Reference 62" data-dcnode-id="3552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d301024028e634" tabindex="-1" title="van der Walt, S. &amp; Smith, N. MPL Colour Maps, 
https://bids.github.io/colormap

 (2020)."><span data-dcnode-id="3553" instrument_node="">62</span></a></sup><span data-dcnode-id="3550" instrument_node="">) developed by Stéfan van der Walt and Nathaniel Smith. MPL maps aim for the most accurate perceptual uniformity with its widely applied colour maps being: viridis, magma, plasma and inferno. These maps have spearheaded the way towards more scientific colour mapping. The MPL colour maps are all sequential and continuous only. The MPL colour maps are openly available (currently for use with Python) and often built into software.</span></p><span data-dcnode-id="3548" instrument_node="">
</span></li><span data-dcnode-id="3546" instrument_node="">
</span><li data-dcnode-id="3531"><span data-dcnode-id="3545" instrument_node="">
</span><p data-dcnode-id="3533"><b data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Cividis</span></b><span data-dcnode-id="3542" instrument_node="">: The cividis colour map</span><sup data-dcnode-id="3539"><a aria-label="Reference 38" data-dcnode-id="3540" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d301024028e646" tabindex="-1" title="Nuñez, J. R., Anderton, C. R. &amp; Renslow, R. S. Optimizing colormaps with consideration for color vision deficiency to enable accurate interpretation of scientific data. PLoS ONE 13, e0199239 (2018). Developed the mathematically optimal colour map for readers with different colour-vision deficiencies named Cividis, which allows most accurate perception of data by as many viewers as possible."><span data-dcnode-id="3541" instrument_node="">38</span></a></sup><span data-dcnode-id="3538" instrument_node=""> (available at ref. </span><sup data-dcnode-id="3535"><a aria-label="Reference 63" data-dcnode-id="3536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d301024028e650" tabindex="-1" title="Nuñez, J. R., Anderton, C. R. &amp; Renslow, R. S. Cividis colour map, PLoS ONE, https://www.doi.org/10.1371/journal.pone.0199239.s002 (2020)."><span data-dcnode-id="3537" instrument_node="">63</span></a></sup><span data-dcnode-id="3534" instrument_node="">), developed by Jamie R. Nuñez and colleagues, aims to represent an almost identical appearance for red–green colour-vision deficiencies, the closest of all currently available colour maps, while also being perceptually uniform. The colour-vision deficiency friendly, sequential and continuous colour map is currently available as a standard colour array.</span></p><span data-dcnode-id="3532" instrument_node="">
</span></li><span data-dcnode-id="3530" instrument_node="">
</span><li data-dcnode-id="3515"><span data-dcnode-id="3529" instrument_node="">
</span><p data-dcnode-id="3517"><b data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">CMOcean</span></b><span data-dcnode-id="3526" instrument_node=""> (colormaps inspired by oceanography): The CMOcean colour maps</span><sup data-dcnode-id="3523"><a aria-label="Reference 20" data-dcnode-id="3524" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d301024028e662" tabindex="-1" title="Thyng, K. M., Greene, C. A., Hetland, R. D., Zimmerle, H. M. &amp; DiMarco, S. F. True colors of oceanography: guidelines for effective and accurate colormap selection. Oceanography 29, 9–13 (2016). Introducing the scientifically derived cmocean colour maps for better data visualisation in oceanography that also underline the importance of intuitive colour palettes given a certain data parameter."><span data-dcnode-id="3525" instrument_node="">20</span></a></sup><span data-dcnode-id="3522" instrument_node=""> (available at ref. </span><sup data-dcnode-id="3519"><a aria-label="Reference 64" data-dcnode-id="3520" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d301024028e666" tabindex="-1" title="Thyng, K. M., Greene, C. A., Hetland, R. D., Zimmerle, H. M. &amp; DiMarco, S. F. CMOcean Colour Maps, 
http://matplotlib.org/cmocean

 (2020)."><span data-dcnode-id="3521" instrument_node="">64</span></a></sup><span data-dcnode-id="3518" instrument_node="">), developed by Kristen M. Thyng and colleagues, aim to provide the most intuitive colours for a given suite of physical parameters, while now also being perceptually uniform. A variety of continuous sequential, diverging and cyclic colour maps are provided to allow for an intuitive, true representation of a given physical parameter field. The CMOcean colour maps are available in a large variety of file formats.</span></p><span data-dcnode-id="3516" instrument_node="">
</span></li><span data-dcnode-id="3514" instrument_node="">
</span><li data-dcnode-id="3499"><span data-dcnode-id="3513" instrument_node="">
</span><p data-dcnode-id="3501"><b data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">CET</span></b><span data-dcnode-id="3510" instrument_node=""> (Centre for Exploration Targeting): The CET colour maps</span><sup data-dcnode-id="3507"><a aria-label="Reference 32" data-dcnode-id="3508" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d301024028e678" tabindex="-1" title="Kovesi, P. Good colour maps: how to design them. CoRR abs/1509.03700 (2015). Provides a set of colour map diagnostics and shows that the most important factor designing a colour map is perceptually uniform lightness, allowing to construct more consistent and reliable ternary base colours to replace the problematic RGB primaries red, green, and blue."><span data-dcnode-id="3509" instrument_node="">32</span></a></sup><span data-dcnode-id="3506" instrument_node=""> (available at ref. </span><sup data-dcnode-id="3503"><a aria-label="Reference 65" data-dcnode-id="3504" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d301024028e682" tabindex="-1" title="Kovesi, P. CET Colour Maps, 
http://peterkovesi.com/projects/colourmaps

 (2020)."><span data-dcnode-id="3505" instrument_node="">65</span></a></sup><span data-dcnode-id="3502" instrument_node="">), developed by Peter Kovesi, aim to offer a large choice of the most common colour combinations in a wide variety of data formats. Many of the offered colour maps feature perceptual uniformity, although not all of them to the highest standards. The CET colour maps are continuous and cover sequential, diverging, and cyclic classes.</span></p><span data-dcnode-id="3500" instrument_node="">
</span></li><span data-dcnode-id="3498" instrument_node="">
</span><li data-dcnode-id="3475"><span data-dcnode-id="3497" instrument_node="">
</span><p data-dcnode-id="3477"><b data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">Scientific colour maps</span></b><span data-dcnode-id="3494" instrument_node="">: The Scientific colour maps</span><sup data-dcnode-id="3491"><a aria-label="Reference 30" data-dcnode-id="3492" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d301024028e695" tabindex="-1" title="Crameri, F. Geodynamic diagnostics, scientific visualisation and StagLab 3.0. Geoscientific Model Dev. 11, 2541–2562 (2018)."><span data-dcnode-id="3493" instrument_node="">30</span></a></sup><span data-dcnode-id="3490" instrument_node=""> (available at ref. </span><sup data-dcnode-id="3487"><a aria-label="Reference 41" data-dcnode-id="3488" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d301024028e699" tabindex="-1" title="Crameri, F. Scientific Colour Maps, 
http://www.fabiocrameri.ch/colourmaps

 (2020)."><span data-dcnode-id="3489" instrument_node="">41</span></a></sup><span data-dcnode-id="3486" instrument_node="">, and permanently archived at ref. </span><sup data-dcnode-id="3483"><a aria-label="Reference 52" data-dcnode-id="3484" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d301024028e703" tabindex="-1" title="Crameri, F. Scientific colour maps: perceptually uniform and colour-vision deficiency friendly. Zenodo, 
https://doi.org/10.5281/zenodo.1243862

 (2018)."><span data-dcnode-id="3485" instrument_node="">52</span></a></sup><span data-dcnode-id="3482" instrument_node="">) are perceptually uniform (based on the underlying methodology of the CET colour maps</span><sup data-dcnode-id="3479"><a aria-label="Reference 65" data-dcnode-id="3480" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d301024028e707" tabindex="-1" title="Kovesi, P. CET Colour Maps, 
http://peterkovesi.com/projects/colourmaps

 (2020)."><span data-dcnode-id="3481" instrument_node="">65</span></a></sup><span data-dcnode-id="3478" instrument_node="">), perceptually ordered, colour-vision deficiency and colour-blind friendly, readable in black and white prints, and, if applied properly, also data set specific and parameter intuitive. The Scientific colour maps include sequential, diverging, and cyclic palettes, which are also provided as discrete and categorical palettes, and are available in a multitude of different file formats. They are also available through external routines and as built-in versions in a variety of software programmes. In contrast to others, the Scientific colour map package includes individual colour map diagnostics, and is versioned on a long-term online repository so individual versions can be accurately cited, which allows active developments from the community (e.g., improve their perceptual uniformity to the latest standards), and aids overall scientific reproducibility.</span></p><span data-dcnode-id="3476" instrument_node="">
</span></li><span data-dcnode-id="3474" instrument_node="">
</span></ul></div></div><div class="c-article-box__controls" data-dcnode-id="3466"><div class="c-article-box__fade" data-dcnode-id="3470"></div><button aria-describedby="Sec3" aria-expanded="false" data-dcnode-id="3467"><span class="c-article-box__button-text" data-dcnode-id="3468" data-expandable-label=""><span data-dcnode-id="3469" instrument_node="">Show more</span></span></button></div></div><h3 class="c-article__sub-heading" data-dcnode-id="3463" id="Sec4"><span data-dcnode-id="3464" instrument_node="">The importance of colour to prevent data distortion</span></h3><p data-dcnode-id="3442"><span data-dcnode-id="3462" instrument_node="">Scientific data should be displayed without the addition of visually artificial features or subtraction of real details, while also being universally readable and intuitive. A perceptually uniform colour map weights the same data variation equally all across the dataspace, while other colour maps (such as rainbow) interpret some small data variation to be more important than others (Fig.&nbsp;</span><a data-dcnode-id="3460" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3461" instrument_node="">3</span></a><span data-dcnode-id="3459" instrument_node="">). For such unscientific, perceptually non-uniform colour maps (like rainbow), the interpretation is performed blindly (i.e., by the colour map instead of by the author) as the author or reader is not aware of the exact visual distortion that is introduced by the colour map (Fig.&nbsp;</span><a data-dcnode-id="3457" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3458" instrument_node="">3</span></a><span data-dcnode-id="3456" instrument_node="">). Any scientific study drawing conclusions from a given set of data is, therefore, strongly dependent on the perceptual uniformity of the colour palette applied and, with it, author and reader become captive to a blind interpretation (for various examples, see Supplementary Note&nbsp;</span><a data-dcnode-id="3454" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3455" instrument_node="">1</span></a><span data-dcnode-id="3453" instrument_node="">). Such a colour-introduced blind interpretation can diverge from an objective representation by more than seven percent of the displayed data variation</span><sup data-dcnode-id="3450"><a aria-label="Reference 30" data-dcnode-id="3451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d301024028e730" title="Crameri, F. Geodynamic diagnostics, scientific visualisation and StagLab 3.0. Geoscientific Model Dev. 11, 2541–2562 (2018)."><span data-dcnode-id="3452" instrument_node="">30</span></a></sup><span data-dcnode-id="3449" instrument_node=""> (Fig.&nbsp;</span><a data-dcnode-id="3447" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3448" instrument_node="">3e–f</span></a><span data-dcnode-id="3446" instrument_node="">). A flat slope on Mars can become visually distorted by the most prominent local gradients in colour rather than data, and then appears like rough terrain, while rough terrain conversely might be interpreted as a flat slope (compare Supplementary Fig.&nbsp;</span><a data-dcnode-id="3444" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3445" instrument_node="">7a, b</span></a><span data-dcnode-id="3443" instrument_node="">), which is suboptimal with regards to a Martian exploration.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3361" data-test="figure" data-title="Colour map measure, distortion, and error." id="figure-3"><figure data-dcnode-id="3362"><figcaption data-dcnode-id="3439"><b class="c-article-section__figure-caption" data-dcnode-id="3440" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="3441" instrument_node="">Fig. 3: Colour map measure, distortion, and error.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3373"><div class="c-article-section__figure-item" data-dcnode-id="3434"><a class="c-article-section__figure-link" data-dcnode-id="3435" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/3" rel="nofollow"><picture data-dcnode-id="3436"><source data-dcnode-id="3438" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-020-19160-7/MediaObjects/41467_2020_19160_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3437" height="699" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-020-19160-7/MediaObjects/41467_2020_19160_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3374" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="3375"><b data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">a</span></b><span data-dcnode-id="3431" instrument_node="">, </span><b data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">b</span></b><span data-dcnode-id="3428" instrument_node=""> The incremental lightness difference, Δ</span><i data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">E</span></i><span data-dcnode-id="3425" instrument_node="">, here using the </span><i data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">CIEDE</span></i><span data-dcnode-id="3422" instrument_node="">2000 formulation (see ‘Methods’), is a measure for the perceptual colour difference along the colour map. For a perceptually uniform colour map, Δ</span><i data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">E</span></i><sub data-dcnode-id="3416"><i data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">CIEDE</span></i><span data-dcnode-id="3417" instrument_node="">2000</span></sub><span data-dcnode-id="3415" instrument_node=""> should be equal all along the colour map (i.e., a flat graph; </span><b data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">a</span></b><span data-dcnode-id="3412" instrument_node="">). Using </span><b data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">c</span></b><span data-dcnode-id="3409" instrument_node="">, </span><b data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">d</span></b><span data-dcnode-id="3406" instrument_node=""> the cumulative colour lightness difference, Δ</span><i data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">E</span></i><sub data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Cumulative</span></sub><span data-dcnode-id="3401" instrument_node="">, it is possible to extract </span><b data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">e</span></b><span data-dcnode-id="3398" instrument_node="">, </span><b data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">f</span></b><span data-dcnode-id="3395" instrument_node=""> the resulting visual error in percentage of total data variation. For scientifically derived colour maps like batlow</span><sup data-dcnode-id="3392"><a aria-label="Reference 41" data-dcnode-id="3393" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d301024028e792" title="Crameri, F. Scientific Colour Maps, 
http://www.fabiocrameri.ch/colourmaps

 (2020)."><span data-dcnode-id="3394" instrument_node="">41</span></a></sup><span data-dcnode-id="3391" instrument_node="">, the resulting error introduced to the data by the colouring is negligibly small as </span><b data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">g</span></b><span data-dcnode-id="3388" instrument_node=""> the incremental data variation is represented equally all along the axis, and a linear data gradient, therefore, appears linear. Put differently, </span><b data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">i</span></b><span data-dcnode-id="3385" instrument_node=""> a flat line looks flat. For non-scientific colour maps, like jet, </span><b data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">h</span></b><span data-dcnode-id="3382" instrument_node=""> data gradients are unevenly represented and </span><b data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">f</span></b><span data-dcnode-id="3379" instrument_node=""> visual error can be &gt;7% of the displayed data variation such that </span><b data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">j</span></b><span data-dcnode-id="3376" instrument_node=""> a linear graph (e.g., a flat line), for example, becomes unrecognisable.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3363"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="3364" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/3" rel="nofollow"><span data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3365" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3366" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3367" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3370" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3369" fill-rule="evenodd"></path><span data-dcnode-id="3368" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3341"><span data-dcnode-id="3360" instrument_node="">Scientifically derived colour maps are perceptually uniform. This means the same data variation is weighted equally across the dataspace, and so the true data variation is accurately represented without unnecessary visual error (Fig.&nbsp;</span><a data-dcnode-id="3358" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3359" instrument_node="">3a, c, e, g, i</span></a><span data-dcnode-id="3357" instrument_node="">). Just like a spatial </span><i data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">x</span></i><span data-dcnode-id="3354" instrument_node="">-, </span><i data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">y</span></i><span data-dcnode-id="3351" instrument_node="">-, or </span><i data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">z</span></i><span data-dcnode-id="3348" instrument_node="">-axis needs to have equal spacing between all axis tick marks (Fig.&nbsp;</span><a data-dcnode-id="3346" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3347" instrument_node="">3g, h</span></a><span data-dcnode-id="3345" instrument_node="">), a colour axis (commonly termed colour bar; Supplementary Fig.&nbsp;</span><a data-dcnode-id="3343" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3344" instrument_node="">1</span></a><span data-dcnode-id="3342" instrument_node="">) needs to have equidistant colour gradients. In other words, a certain data variation (e.g., a 5 °C temperature drop) should appear the same no matter whether it occurs at low temperatures (–10 °C) or high temperatures (30 °C).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3339" id="Sec5"><span data-dcnode-id="3340" instrument_node="">Design and implementation of scientifically derived colour maps</span></h3><p data-dcnode-id="3303"><span data-dcnode-id="3338" instrument_node="">While understanding the importance of perceptually uniform colour maps is simple, creating them can be complicated. Quantifying perceptual colour gradients is challenging because the complex nature of the human eye and brain has to be considered (Box&nbsp;</span><a data-dcnode-id="3336" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3337" instrument_node="">1</span></a><span data-dcnode-id="3335" instrument_node="">). However, extensive research has been conducted to understand and provide guidelines for an optimal colour map design (see description in ‘Methods’ and refs. </span><sup data-dcnode-id="3308"><a data-dcnode-id="3333" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d301024028e854" title="Light, A. &amp; Bartlein, P. J. The end of the rainbow? Color schemes for improved data graphics. Eos Trans. AGU 85, 385–391 (2004)."><span data-dcnode-id="3334" instrument_node="">18</span></a><span data-dcnode-id="3332" instrument_node="">,</span><a data-dcnode-id="3330" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d301024028e854_1" title="Stauffer, R., Mayr, G. J., Dabernig, M. &amp; Zeileis, A. Somewhere over the rainbow: how to make effective use of colors in meteorological visualizations. Bull. Am. Meteorological Soc. 96, 203–216 (2015)."><span data-dcnode-id="3331" instrument_node="">19</span></a><span data-dcnode-id="3329" instrument_node="">,</span><a aria-label="Reference 20" data-dcnode-id="3327" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d301024028e857" title="Thyng, K. M., Greene, C. A., Hetland, R. D., Zimmerle, H. M. &amp; DiMarco, S. F. True colors of oceanography: guidelines for effective and accurate colormap selection. Oceanography 29, 9–13 (2016). Introducing the scientifically derived cmocean colour maps for better data visualisation in oceanography that also underline the importance of intuitive colour palettes given a certain data parameter."><span data-dcnode-id="3328" instrument_node="">20</span></a><span data-dcnode-id="3326" instrument_node="">,</span><a aria-label="Reference 29" data-dcnode-id="3324" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d301024028e860" title="Moreland, K. Why we use bad color maps and what you can do about it. Electron. Imaging 2016, 1–6 (2016). The widespread use of the rainbow is the main reason scientists propagate it further, which must therefore be considered if a scientific alternative is to be effective."><span data-dcnode-id="3325" instrument_node="">29</span></a><span data-dcnode-id="3323" instrument_node="">,</span><a data-dcnode-id="3321" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d301024028e863" title="Silva, S., Sousa Santos, B. &amp; Madeira, J. Using color in visualization: a survey. Computer Graph. 35, 320–333 (2011)."><span data-dcnode-id="3322" instrument_node="">31</span></a><span data-dcnode-id="3320" instrument_node="">,</span><a data-dcnode-id="3318" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d301024028e863_1" title="Kovesi, P. Good colour maps: how to design them. CoRR abs/1509.03700 (2015). Provides a set of colour map diagnostics and shows that the most important factor designing a colour map is perceptually uniform lightness, allowing to construct more consistent and reliable ternary base colours to replace the problematic RGB primaries red, green, and blue."><span data-dcnode-id="3319" instrument_node="">32</span></a><span data-dcnode-id="3317" instrument_node="">,</span><a data-dcnode-id="3315" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d301024028e863_2" title="Szafir, D. A. Modeling color difference for visualization design. IEEE Trans. Vis. Computer Graph. 24, 392–401 (2018)."><span data-dcnode-id="3316" instrument_node="">33</span></a><span data-dcnode-id="3314" instrument_node="">,</span><a data-dcnode-id="3312" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d301024028e863_3" title="Bujack, R. et al. The Good, the bad, and the ugly: a theoretical framework for the assessment of continuous colormaps. IEEE Trans. Vis. Computer Graph. 24, 923–933 (2018)."><span data-dcnode-id="3313" instrument_node="">34</span></a><span data-dcnode-id="3311" instrument_node="">,</span><a aria-label="Reference 35" data-dcnode-id="3309" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d301024028e866" title="Ware, C. et al. Measuring and modeling the feature detection threshold functions of colormaps. IEEE Trans. Vis. Computer Graph. 25, 2777–2790 (2019)."><span data-dcnode-id="3310" instrument_node="">35</span></a></sup><span data-dcnode-id="3307" instrument_node="">), and today, various freely available tools exist to create perceptually uniform colour palettes. In Box&nbsp;</span><a data-dcnode-id="3305" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec3"><span data-dcnode-id="3306" instrument_node="">2</span></a><span data-dcnode-id="3304" instrument_node="">, we have compiled freely available scientific colour map toolkits, and described the benefits and limitations of each toolkit, to aid users in designing and/or selecting the most appropriate and accurate colour map for their data.</span></p><p data-dcnode-id="3290"><span data-dcnode-id="3302" instrument_node="">Perceptual uniformity is a crucial property for colour maps used in science, but by no means the only property to care about. Perceptual colour order is another important aspect in scientific colour map design, as it ensures the colour gradient is easily and intuitively understandable and allows qualitative understanding of a data set (Fig.&nbsp;</span><a data-dcnode-id="3300" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3301" instrument_node="">4</span></a><span data-dcnode-id="3299" instrument_node="">). To achieve perceptual order, both lightness and brightness should increase linearly to avoid the perception of artificial gradients and to easily discern and compare significant values. The heated black-body radiation palette, for which the colours can be easily ordered from black-red-orange-yellow (or vice versa), is one example. Perceptual order is, therefore, a great asset to a colour map by emphasising gradients and pattern(s) in data. Moreover yet, colour maps specifically created for certain data sets (e.g., ref. </span><sup data-dcnode-id="3296"><a aria-label="Reference 36" data-dcnode-id="3297" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d301024028e879" title="Zeller, S. &amp; Rogers, D. Visualizing science: How color determines what we see. Eos Trans. AGU Vol. 101 (American Geophysical Union, 2020).&nbsp;
https://doi.org/10.1029/2020EO144330

"><span data-dcnode-id="3298" instrument_node="">36</span></a></sup><span data-dcnode-id="3295" instrument_node="">) by no means guarantee their perceptual uniformity. Perceptual uniformity and intuitive colour order are both needed to prevent bias percolating into colour maps. This is also the case for so-called ‘improved’ rainbow-like maps such as Google’s Turbo</span><sup data-dcnode-id="3292"><a aria-label="Reference 37" data-dcnode-id="3293" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d301024028e883" title="Mikhailov, A. in Google AI Blog Vol. 2020 (Google, 
https://ai.googleblog.com/2019/08/turbo-improved-rainbow-colormap-for.html

, 2019)."><span data-dcnode-id="3294" instrument_node="">37</span></a></sup><span data-dcnode-id="3291" instrument_node="">. Although Turbo appears to meet perceptual order, the perceptual uniformity requirement of a science-ready colour map is not met due to its non-uniform lightness spectra.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3246" data-test="figure" data-title="Perceptual uniformity and order." id="figure-4"><figure data-dcnode-id="3247"><figcaption data-dcnode-id="3287"><b class="c-article-section__figure-caption" data-dcnode-id="3288" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="3289" instrument_node="">Fig. 4: Perceptual uniformity and order.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3258"><div class="c-article-section__figure-item" data-dcnode-id="3282"><a class="c-article-section__figure-link" data-dcnode-id="3283" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/4" rel="nofollow"><picture data-dcnode-id="3284"><source data-dcnode-id="3286" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-020-19160-7/MediaObjects/41467_2020_19160_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="3285" height="447" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-020-19160-7/MediaObjects/41467_2020_19160_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3259" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="3260"><span data-dcnode-id="3281" instrument_node=""
