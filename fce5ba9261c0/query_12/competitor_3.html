>A constant incremental colour and lightness contrast along a colour map is a proxy for its perceptual uniformity. </span><b data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">a</span></b><span data-dcnode-id="3278" instrument_node=""> While a certain incremental data variation is either under- or strongly overrepresented with jet (a.k.a. rainbow) depending on the colour map segment, it is instead </span><b data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">b</span></b><span data-dcnode-id="3275" instrument_node=""> evenly represented all along a colour bar when using a scientific colour map like batlow</span><sup data-dcnode-id="3272"><a aria-label="Reference 41" data-dcnode-id="3273" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d301024028e905" title="Crameri, F. Scientific Colour Maps, 
http://www.fabiocrameri.ch/colourmaps

 (2020)."><span data-dcnode-id="3274" instrument_node="">41</span></a></sup><span data-dcnode-id="3271" instrument_node="">, due to its uniform colour and lightness contrast. Perceptual order is given when individual colours of a colour map can be sequentially ordered effortlessly without consulting the colour bar. While </span><b data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">c</span></b><span data-dcnode-id="3268" instrument_node=""> a sequential ordering is not intuitively possible for jet (a.k.a. rainbow), it is </span><b data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">d</span></b><span data-dcnode-id="3265" instrument_node=""> possible to sequentially order individual colours of a scientifically derived colour map like batlow</span><sup data-dcnode-id="3262"><a aria-label="Reference 41" data-dcnode-id="3263" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d301024028e916" title="Crameri, F. Scientific Colour Maps, 
http://www.fabiocrameri.ch/colourmaps

 (2020)."><span data-dcnode-id="3264" instrument_node="">41</span></a></sup><span data-dcnode-id="3261" instrument_node="">, thanks to its constant lightness gradient.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3248"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="3249" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/4" rel="nofollow"><span data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3250" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3251" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3252" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3255" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3254" fill-rule="evenodd"></path><span data-dcnode-id="3253" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3231"><span data-dcnode-id="3245" instrument_node="">In addition, colour maps should be universally readable, and they can be mathematically optimised to account for colour-vision deficiency using modern colour appearance models</span><sup data-dcnode-id="3242"><a aria-label="Reference 38" data-dcnode-id="3243" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d301024028e931" title="Nuñez, J. R., Anderton, C. R. &amp; Renslow, R. S. Optimizing colormaps with consideration for color vision deficiency to enable accurate interpretation of scientific data. PLoS ONE 13, e0199239 (2018). Developed the mathematically optimal colour map for readers with different colour-vision deficiencies named Cividis, which allows most accurate perception of data by as many viewers as possible."><span data-dcnode-id="3244" instrument_node="">38</span></a></sup><span data-dcnode-id="3241" instrument_node=""> (Fig.&nbsp;</span><a data-dcnode-id="3239" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3240" instrument_node="">2</span></a><span data-dcnode-id="3238" instrument_node=""> and Box&nbsp;</span><a data-dcnode-id="3236" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3237" instrument_node="">1</span></a><span data-dcnode-id="3235" instrument_node="">). As well as making colour palettes readable for readers with variable vision capabilities, it is also advantageous to make them readable for completely colour-blind readers. In contrast to other colour palettes, a colour map for scientific use should feature a uniform gradient across the whole colour axis. With an even, monotonic lightness gradient (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3233" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3234" instrument_node="">1a</span></a><span data-dcnode-id="3232" instrument_node="">), a colour palette remains readable (as well as perceptually uniform and ordered) even after a conversion to grey scale, assuming no complicated grey-scale filter is used.</span></p><p data-dcnode-id="3211"><span data-dcnode-id="3230" instrument_node="">To achieve the best possible data representation, colour palettes need to effectively convey the underlying data and its nature. This can be achieved by choosing the most appropriate colour map class and type (Fig.&nbsp;</span><a data-dcnode-id="3228" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3229" instrument_node="">5</span></a><span data-dcnode-id="3227" instrument_node=""> and outlined in detail in&nbsp;</span><a data-dcnode-id="3225" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3226" instrument_node="">Supplementary Notes</span></a><span data-dcnode-id="3224" instrument_node="">&nbsp;</span><a data-dcnode-id="3222" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3223" instrument_node="">2</span></a><span data-dcnode-id="3221" instrument_node=""> and </span><a data-dcnode-id="3219" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3220" instrument_node="">3</span></a><span data-dcnode-id="3218" instrument_node="">). If the data is divergent about a central value (e.g., centred about zero), a divergent or a multi-sequential colour map should be chosen that clearly and intuitively distinguishes either side of the axis (Fig.&nbsp;</span><a data-dcnode-id="3216" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3217" instrument_node="">5</span></a><span data-dcnode-id="3215" instrument_node="">, and Fig.&nbsp;</span><a data-dcnode-id="3213" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3214" instrument_node="">6</span></a><span data-dcnode-id="3212" instrument_node=""> for a detailed user guide).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3166" data-test="figure" data-title="Colour map classes and types." id="figure-5"><figure data-dcnode-id="3167"><figcaption data-dcnode-id="3208"><b class="c-article-section__figure-caption" data-dcnode-id="3209" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="3210" instrument_node="">Fig. 5: Colour map classes and types.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3178"><div class="c-article-section__figure-item" data-dcnode-id="3203"><a class="c-article-section__figure-link" data-dcnode-id="3204" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/5" rel="nofollow"><picture data-dcnode-id="3205"><source data-dcnode-id="3207" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-020-19160-7/MediaObjects/41467_2020_19160_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="3206" height="501" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-020-19160-7/MediaObjects/41467_2020_19160_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3179" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="3180"><span data-dcnode-id="3202" instrument_node="">The various classes of colour maps (</span><i data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">sequential</span></i><span data-dcnode-id="3199" instrument_node="">; </span><i data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">diverging</span></i><span data-dcnode-id="3196" instrument_node="">; </span><i data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">multi-sequential</span></i><span data-dcnode-id="3193" instrument_node="">; </span><i data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">cyclic</span></i><span data-dcnode-id="3190" instrument_node="">) and types (</span><i data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">continuous</span></i><span data-dcnode-id="3187" instrument_node="">; </span><i data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">discrete</span></i><span data-dcnode-id="3184" instrument_node="">; </span><i data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">categorical</span></i><span data-dcnode-id="3181" instrument_node="">). Only sequential colour maps can be faithfully applied to categorical types of data.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3168"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="3169" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/5" rel="nofollow"><span data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3170" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3171" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3172" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3175" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3174" fill-rule="evenodd"></path><span data-dcnode-id="3173" instrument_node="">
</span></a></div></figure></div><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3142" data-test="figure" data-title="Guideline for choosing the right scientific colour map." id="figure-6"><figure data-dcnode-id="3143"><figcaption data-dcnode-id="3163"><b class="c-article-section__figure-caption" data-dcnode-id="3164" data-test="figure-caption-text" id="Fig6"><span data-dcnode-id="3165" instrument_node="">Fig. 6: Guideline for choosing the right scientific colour map.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3154"><div class="c-article-section__figure-item" data-dcnode-id="3158"><a class="c-article-section__figure-link" data-dcnode-id="3159" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/6" rel="nofollow"><picture data-dcnode-id="3160"><source data-dcnode-id="3162" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-020-19160-7/MediaObjects/41467_2020_19160_Fig6_HTML.png?as=webp" type="image/webp"><img alt="figure 6" aria-describedby="Fig6" data-dcnode-id="3161" height="938" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-020-19160-7/MediaObjects/41467_2020_19160_Fig6_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3155" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">For effective data representation, the nature of a given data set has to be matched by a suitable colour map class, type, and colour combination.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3144"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="3145" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-020-19160-7/figures/6" rel="nofollow"><span data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3146" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3147" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3148" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3151" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3150" fill-rule="evenodd"></path><span data-dcnode-id="3149" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3118"><span data-dcnode-id="3141" instrument_node="">An intuitive colour gradient becomes imperative if data are displayed without the provision of the colour bar (the axis relating colours to data values). Unfortunately, missing colour bars are more common than most would expect, as scales are sometimes cropped out or omitted during reproduction or subsequent dissemination (e.g., refs. </span><sup data-dcnode-id="3132"><a aria-label="Reference 1" data-dcnode-id="3139" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d301024028e1031" title="Akiyama, K. et al. First M87 event horizon telescope results. IV. Imaging the central supermassive black hole. Astrophys. J. Lett. 875, L4 (2019)."><span data-dcnode-id="3140" instrument_node="">1</span></a><span data-dcnode-id="3138" instrument_node="">,</span><a aria-label="Reference 4" data-dcnode-id="3136" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d301024028e1034" title="Lemoine, F. G. et al. An improved solution of the gravity field of Mars (GMM-2B) from Mars Global Surveyor. J. Geophys. Res.: Planets 106, 23359–23376 (2001)."><span data-dcnode-id="3137" instrument_node="">4</span></a><span data-dcnode-id="3135" instrument_node="">,</span><a aria-label="Reference 39" data-dcnode-id="3133" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d301024028e1037" title="Hawkins, E. (
http://www.climate-lab-book.ac.uk/2018/2018-visualisation-update/

, 2019)."><span data-dcnode-id="3134" instrument_node="">39</span></a></sup><span data-dcnode-id="3131" instrument_node="">). It is imperative to ensure the colour bar is included on all figures where a colour scale is used, as even the most intuitive colour map could be rendered useless with no colour bar for the reader to refer to. Excluding a colour bar would be equivalent to not including the axis labels and tick marks on the </span><i data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">x</span></i><span data-dcnode-id="3128" instrument_node="">- or </span><i data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">y</span></i><span data-dcnode-id="3125" instrument_node="">-axis of a plot. Additionally, attention has to be paid to the lightness (i.e., light or dark) of the background on which the colours are displayed. Background creates contrast, in lightness and colour, to the displayed data (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3123" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3124" instrument_node="">3</span></a><span data-dcnode-id="3122" instrument_node=""> and Supplementary Movie&nbsp;</span><a data-dcnode-id="3120" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM4"><span data-dcnode-id="3121" instrument_node="">1</span></a><span data-dcnode-id="3119" instrument_node="">).</span></p><p data-dcnode-id="3099"><span data-dcnode-id="3117" instrument_node="">To optimise the use of the currently available perceptually uniform colour maps listed in Box&nbsp;</span><a data-dcnode-id="3115" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec3"><span data-dcnode-id="3116" instrument_node="">2</span></a><span data-dcnode-id="3114" instrument_node="">, there are certain requirements to prevent them from becoming distorted (e.g., ref. </span><sup data-dcnode-id="3111"><a aria-label="Reference 30" data-dcnode-id="3112" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d301024028e1059" title="Crameri, F. Geodynamic diagnostics, scientific visualisation and StagLab 3.0. Geoscientific Model Dev. 11, 2541–2562 (2018)."><span data-dcnode-id="3113" instrument_node="">30</span></a></sup><span data-dcnode-id="3110" instrument_node="">). As the colour bar has to be handled similarly to the position axis, parts of a scientifically derived colour map cannot be subsequently deformed by being partly squeezed or elongated. If the spacing between a position axis’ ticks were squeezed or elongated, it would visually distort the data in the figure. Simply put, a linear graph would no&nbsp;longer&nbsp;appear linear (Fig.&nbsp;</span><a data-dcnode-id="3108" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3109" instrument_node="">3h, j</span></a><span data-dcnode-id="3107" instrument_node="">). Therefore, altering any available scientifically derived colour map is not recommended. Additionally, avoiding certain types of graphs and plots is important to not alter the local perception of individual colours. Common heatmaps with directly connected colour tiles, as opposed to tiles with gaps in between, can alter individual colours significantly</span><sup data-dcnode-id="3104"><a aria-label="Reference 40" data-dcnode-id="3105" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d301024028e1066" title="Wong, B. Color coding. Nat. Methods 7, 573 EP (2010)."><span data-dcnode-id="3106" instrument_node="">40</span></a></sup><span data-dcnode-id="3103" instrument_node=""> (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3101" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3102" instrument_node="">3</span></a><span data-dcnode-id="3100" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3097" id="Sec6"><span data-dcnode-id="3098" instrument_node="">How to recognise an unscientific colour map</span></h3><p data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">It is the responsibility of individuals, publishers, and the press to prevent the dissemination of visually distorted data and to take a proactive approach in spotting the unscientific use of colour. There are straightforward checks to recognise the unscientific use of colour that are handy for users, readers, reviewers and editors:</span></p><ol class="u-list-style-none" data-dcnode-id="3044"><span data-dcnode-id="3094" instrument_node="">
</span><li data-dcnode-id="3083"><span data-dcnode-id="3093" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">1.</span></span><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3085"><span data-dcnode-id="3089" instrument_node="">The colour bar should be perceptually uniform to prevent data distortion and visual error. This means the perceptual colour differences between all neighbouring colours should appear the same. If two neighbouring colours have a different variation compared to other neighbouring colours (e.g., two greenish versus two yellowish-reddish colours in rainbow colour maps), the colour bar is perceptually non-uniform and not scientific (as shown in Fig.&nbsp;</span><a data-dcnode-id="3087" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3088" instrument_node="">4</span></a><span data-dcnode-id="3086" instrument_node="">).</span></p><span data-dcnode-id="3084" instrument_node="">
</span></li><span data-dcnode-id="3082" instrument_node="">
</span><li data-dcnode-id="3071"><span data-dcnode-id="3081" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">2.</span></span><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3073"><span data-dcnode-id="3077" instrument_node="">The colour map should not contain red and green at a similar luminosity (Box&nbsp;</span><a data-dcnode-id="3075" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3076" instrument_node="">1</span></a><span data-dcnode-id="3074" instrument_node=""> for definitions). If this is the case, it can be assumed that these two colours cannot be distinguished by a large fraction of the readership and, therefore, fails as a scientific way of displaying data.</span></p><span data-dcnode-id="3072" instrument_node="">
</span></li><span data-dcnode-id="3070" instrument_node="">
</span><li data-dcnode-id="3058"><span data-dcnode-id="3069" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">3.</span></span><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3060"><span data-dcnode-id="3065" instrument_node="">The common rainbow colour map should not be used in data visualisation. There is not a single rainbow colour map with similarly bright colours across the colour bar that comes close to being scientific (e.g., ref. </span><sup data-dcnode-id="3062"><a aria-label="Reference 32" data-dcnode-id="3063" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d301024028e1119" title="Kovesi, P. Good colour maps: how to design them. CoRR abs/1509.03700 (2015). Provides a set of colour map diagnostics and shows that the most important factor designing a colour map is perceptually uniform lightness, allowing to construct more consistent and reliable ternary base colours to replace the problematic RGB primaries red, green, and blue."><span data-dcnode-id="3064" instrument_node="">32</span></a></sup><span data-dcnode-id="3061" instrument_node="">).</span></p><span data-dcnode-id="3059" instrument_node="">
</span></li><span data-dcnode-id="3057" instrument_node="">
</span><li data-dcnode-id="3046"><span data-dcnode-id="3056" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">4.</span></span><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3048"><span data-dcnode-id="3052" instrument_node="">The most secure test is to discard any colour map that is not described as scientifically derived (for example, is not listed in Box&nbsp;</span><a data-dcnode-id="3050" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec3"><span data-dcnode-id="3051" instrument_node="">2</span></a><span data-dcnode-id="3049" instrument_node="">), as it should be both perceptually uniform and CVD friendly.</span></p><span data-dcnode-id="3047" instrument_node="">
</span></li><span data-dcnode-id="3045" instrument_node="">
</span></ol><h3 class="c-article__sub-heading" data-dcnode-id="3042" id="Sec7"><span data-dcnode-id="3043" instrument_node="">A proactive step forward for the science community</span></h3><p data-dcnode-id="3024"><span data-dcnode-id="3041" instrument_node="">It is important to maintain the progress that has already been made across the scientific community (in particular in the fields of Earth, Space, and Climate science). Recently, a number of significant scientific achievements have been based upon non-distorting and universally readable scientifically derived colour maps, such as the first ever observation-based visualisation of a black hole</span><sup data-dcnode-id="3038"><a aria-label="Reference 1" data-dcnode-id="3039" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d301024028e1148" title="Akiyama, K. et al. First M87 event horizon telescope results. IV. Imaging the central supermassive black hole. Astrophys. J. Lett. 875, L4 (2019)."><span data-dcnode-id="3040" instrument_node="">1</span></a></sup><span data-dcnode-id="3037" instrument_node="">, for which a lajolla-like colour map</span><sup data-dcnode-id="3034"><a aria-label="Reference 41" data-dcnode-id="3035" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d301024028e1152" title="Crameri, F. Scientific Colour Maps, 
http://www.fabiocrameri.ch/colourmaps

 (2020)."><span data-dcnode-id="3036" instrument_node="">41</span></a></sup><span data-dcnode-id="3033" instrument_node=""> was used, and the effective visualisation of climate change on a local, regional, and global level</span><sup data-dcnode-id="3030"><a aria-label="Reference 39" data-dcnode-id="3031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d301024028e1156" title="Hawkins, E. (
http://www.climate-lab-book.ac.uk/2018/2018-visualisation-update/

, 2019)."><span data-dcnode-id="3032" instrument_node="">39</span></a></sup><span data-dcnode-id="3029" instrument_node="">, which applied a vik-like colour map</span><sup data-dcnode-id="3026"><a aria-label="Reference 41" data-dcnode-id="3027" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d301024028e1160" title="Crameri, F. Scientific Colour Maps, 
http://www.fabiocrameri.ch/colourmaps

 (2020)."><span data-dcnode-id="3028" instrument_node="">41</span></a></sup><span data-dcnode-id="3025" instrument_node="">. However, there are danger signs that this progress could be lost. Unscientific colour maps are still often set as the default in software packages, which in turn also renders them a prevalent choice among many academic group leaders. Furthermore, unscientific colour maps are still accepted and published by academic journals. This combination leads users, students, and readers into believing that these choices are based on informed decisions, and that there are no fundamental issues with unscientific colour maps. Given this current landscape, it is an instructive reminder that new generations of scientists have to be made aware of the importance of scientifically derived colour maps and the pitfalls of those that are not.</span></p><p data-dcnode-id="3016"><span data-dcnode-id="3023" instrument_node="">Transferring the knowledge and awareness about the importance of scientifically derived colour maps to new generations of scientists is, therefore, a key goal. Teaching is a frontline tool in building solid visualisation skills. Indeed, learning and applying scientific data visualisation should be a requirement to receive BSc, MSc, and PhD degrees. Here, we provide an instructive user guide for choosing and applying a suitable scientific colour map (Fig.&nbsp;</span><a data-dcnode-id="3021" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3022" instrument_node="">6</span></a><span data-dcnode-id="3020" instrument_node="">), which should be part of every research office, and possibly even desk space. We provide a poster (Supplementary Data&nbsp;</span><a data-dcnode-id="3018" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM3"><span data-dcnode-id="3019" instrument_node="">1</span></a><span data-dcnode-id="3017" instrument_node="">) that can be placed in communal areas, like near a printing station, coffee machine or restroom, that highlights the key advantages of scientifically derived colour maps and serves as a conversation starter.</span></p><p data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">Recommendations to colleagues via peer-review is another critical tool to ensure the quality of our ongoing scientific visual communication. While editors could certainly provide guiding recommendations, it is also critical that scientifically derived colour maps are being applied already during the early diagnosis of the data, and not just applied for publication only. Set instructions by scientific journals or conference organisers could remind researchers to fulfil the graphical standards that science needs to be built upon. It might even be useful to limit researchers to using only a handful of hand-picked, suitable colour maps for specific types of data and data parameters to streamline and enhance data visualisation. This type of approach is being developed for the next assessment reports of the Intergovernmental Panel on Climate Change (IPCC), in collaboration with Melissa Gomis (Graphics and Science Communication officer, IPCC WGI Technical Support Unit, Université Paris-Saclay, France).</span></p><p data-dcnode-id="3009"><span data-dcnode-id="3013" instrument_node="">Presently, scientifically derived colour maps are easily accessible and applicable across various tools and platforms and suitable palettes exist for any given data (Box&nbsp;</span><a data-dcnode-id="3011" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec3"><span data-dcnode-id="3012" instrument_node="">2</span></a><span data-dcnode-id="3010" instrument_node="">). The open availability of such colour maps ultimately leaves little legitimate room to continue using colour maps that cause visual distortion, are unreadable in some circumstances, or exclude readers from understanding them.</span></p><p data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">The wider scientific community needs to accept that colour maps are a pivotal tool in scientific discovery, data visualisation and science communication. Non-scientific colour maps require scrutiny and rejection from the community to preserve academic integrity. The evidence is clear, there are no more reasons to continue using unscientific colour maps.</span></p></div></div></section><section data-dcnode-id="2893" data-title="Methods"><div class="c-article-section" data-dcnode-id="2894" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3002" id="Sec8"><span data-dcnode-id="3003" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="2895" id="Sec8-content"><h3 class="c-article__sub-heading" data-dcnode-id="3000" id="Sec9"><span data-dcnode-id="3001" instrument_node="">Defining colour spaces</span></h3><p data-dcnode-id="2958"><span data-dcnode-id="2999" instrument_node="">Various methods and tools based on different metrics and colour spaces (Supplementary Note&nbsp;</span><a data-dcnode-id="2997" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2998" instrument_node="">4</span></a><span data-dcnode-id="2996" instrument_node="">) exist to diagnose the uniformity of a colour palette (e.g., refs. </span><sup data-dcnode-id="2987"><a aria-label="Reference 32" data-dcnode-id="2994" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d301024028e1202" title="Kovesi, P. Good colour maps: how to design them. CoRR abs/1509.03700 (2015). Provides a set of colour map diagnostics and shows that the most important factor designing a colour map is perceptually uniform lightness, allowing to construct more consistent and reliable ternary base colours to replace the problematic RGB primaries red, green, and blue."><span data-dcnode-id="2995" instrument_node="">32</span></a><span data-dcnode-id="2993" instrument_node="">,</span><a aria-label="Reference 34" data-dcnode-id="2991" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d301024028e1205" title="Bujack, R. et al. The Good, the bad, and the ugly: a theoretical framework for the assessment of continuous colormaps. IEEE Trans. Vis. Computer Graph. 24, 923–933 (2018)."><span data-dcnode-id="2992" instrument_node="">34</span></a><span data-dcnode-id="2990" instrument_node="">,</span><a aria-label="Reference 38" data-dcnode-id="2988" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d301024028e1208" title="Nuñez, J. R., Anderton, C. R. &amp; Renslow, R. S. Optimizing colormaps with consideration for color vision deficiency to enable accurate interpretation of scientific data. PLoS ONE 13, e0199239 (2018). Developed the mathematically optimal colour map for readers with different colour-vision deficiencies named Cividis, which allows most accurate perception of data by as many viewers as possible."><span data-dcnode-id="2989" instrument_node="">38</span></a></sup><span data-dcnode-id="2986" instrument_node="">). A widely used example is the International Commission on Illumination’s uniform colour space named CIELAB UCS</span><sup data-dcnode-id="2977"><a data-dcnode-id="2984" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d301024028e1212" title="Smith, T. &amp; Guild, J. The CIE colorimetric standards and their use. Trans. Optical Soc. 33, 73 (1931)."><span data-dcnode-id="2985" instrument_node="">42</span></a><span data-dcnode-id="2983" instrument_node="">,</span><a data-dcnode-id="2981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d301024028e1212_1" title="C. I. E. Technical Report Colorimetry. (Commission Internationale de l’Eclairage Central Bureau Vienna, Austria, 2004)."><span data-dcnode-id="2982" instrument_node="">43</span></a><span data-dcnode-id="2980" instrument_node="">,</span><a aria-label="Reference 44" data-dcnode-id="2978" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d301024028e1215" title="CIE. Part 4: CIE 1976 L* a* b* Colour space, 
http://www.cie.co.at/publications/colorimetry-part-4-cie-1976-lab-colour-space

 (2011)."><span data-dcnode-id="2979" instrument_node="">44</span></a></sup><span data-dcnode-id="2976" instrument_node="">. CIELAB UCS (also abbreviated from Uniform/Unified Colour Scale, Chromaticity Scale, Chromaticity Space) describes the complete range of colours in a perceptually uniform rectangular coordinate system</span><sup data-dcnode-id="2973"><a aria-label="Reference 45" data-dcnode-id="2974" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d301024028e1219" title="Hunter Associates Laboratory Inc. Brief Explanation of Delta E or Delta E*,
http://support.hunterlab.com/hc/en-us/articles/%20203023559-Brief-Explanation-of-delta-E-or-delta-E

-> (2019)."><span data-dcnode-id="2975" instrument_node="">45</span></a></sup><span data-dcnode-id="2972" instrument_node=""> and allows the creation of perceptually uniform colour palettes</span><sup data-dcnode-id="2960"><a aria-label="Reference 32" data-dcnode-id="2970" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d301024028e1223" title="Kovesi, P. Good colour maps: how to design them. CoRR abs/1509.03700 (2015). Provides a set of colour map diagnostics and shows that the most important factor designing a colour map is perceptually uniform lightness, allowing to construct more consistent and reliable ternary base colours to replace the problematic RGB primaries red, green, and blue."><span data-dcnode-id="2971" instrument_node="">32</span></a><span data-dcnode-id="2969" instrument_node="">,</span><a aria-label="Reference 35" data-dcnode-id="2967" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d301024028e1226" title="Ware, C. et al. Measuring and modeling the feature detection threshold functions of colormaps. IEEE Trans. Vis. Computer Graph. 25, 2777–2790 (2019)."><span data-dcnode-id="2968" instrument_node="">35</span></a><span data-dcnode-id="2966" instrument_node="">,</span><a aria-label="Reference 46" data-dcnode-id="2964" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d301024028e1229" title="Meier, B. J., Spalter, A. M. &amp; Karelitz, D. B. Interactive color palette tools. IEEE Computer Graph. Appl. 24, 64–72 (2004)."><span data-dcnode-id="2965" instrument_node="">46</span></a><span data-dcnode-id="2963" instrument_node="">,</span><a aria-label="Reference 47" data-dcnode-id="2961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d301024028e1232" title="Moreland, K. in Advances in Visual Computing (eds George Bebis et al.) 92–103 (Springer Berlin Heidelberg, Berlin, Heidelberg, 2009)."><span data-dcnode-id="2962" instrument_node="">47</span></a></sup><span data-dcnode-id="2959" instrument_node="">.</span></p><p data-dcnode-id="2939"><span data-dcnode-id="2957" instrument_node="">The colour appearance model CIECAM02</span><sup data-dcnode-id="2951"><a aria-label="Reference 48" data-dcnode-id="2955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d301024028e1239" title="Moroney, N. et al. in Color and Imaging Conference Vol. 2002 23–27 (2002)."><span data-dcnode-id="2956" instrument_node="">48</span></a><span data-dcnode-id="2954" instrument_node="">,</span><a aria-label="Reference 49" data-dcnode-id="2952" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d301024028e1242" title="International Commission on Illumination. Technical Committee TC 8-01. in Colour Appearance Modeling for Colour Management Systems (2004)."><span data-dcnode-id="2953" instrument_node="">49</span></a></sup><span data-dcnode-id="2950" instrument_node="">, and the perceptually uniform colour space CIECAM02-UCS</span><sup data-dcnode-id="2947"><a aria-label="Reference 50" data-dcnode-id="2948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d301024028e1246" title="Luo, M. R., Cui, G. &amp; Li, C. Uniform colour spaces based on CIECAM02 colour appearance model. Color Res. Appl. 31, 320–330 (2006)."><span data-dcnode-id="2949" instrument_node="">50</span></a></sup><span data-dcnode-id="2946" instrument_node=""> based on it, is the current gold standard to describe how we perceive colour and colour differences. CIECAM02-UCS describes a certain colour by its lightness (L) and its red–green (a) and yellow-blue (b) correlates (Supplementary Figs.&nbsp;</span><a data-dcnode-id="2944" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2945" instrument_node="">4</span></a><span data-dcnode-id="2943" instrument_node=""> and </span><a data-dcnode-id="2941" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2942" instrument_node="">5</span></a><span data-dcnode-id="2940" instrument_node="">), and it represents a certain perceptual colour variation on equal Euclidean distances across the whole space. Colour spaces like CIECAM02-UCS make it possible to design perceptually uniform colour maps and, also, to take colour-deficient vision into account.</span></p><p data-dcnode-id="2927"><span data-dcnode-id="2938" instrument_node="">Here, the CIELAB UCS colour difference metric Δ</span><i data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">ECIEDE</span></i><span data-dcnode-id="2935" instrument_node=""> 2000</span><sup data-dcnode-id="2932"><a aria-label="Reference 51" data-dcnode-id="2933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d301024028e1262" title="Lindbloom, B. Delta E (CIE 1976). 
http://www.brucelindbloom.com/index.html?Eqn_DeltaE_CIE76.html

 (2019)."><span data-dcnode-id="2934" instrument_node="">51</span></a></sup><span data-dcnode-id="2931" instrument_node=""> is used (Fig.&nbsp;</span><a data-dcnode-id="2929" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2930" instrument_node="">3a, b</span></a><span data-dcnode-id="2928" instrument_node="">) and allows the calculation of a local lightness gradient between two colours by</span></p><div class="c-article-equation" data-dcnode-id="2921" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="2924"><span class="mathjax-tex" data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">$$\Delta {\mathrm{E}_{\it{CIEDE}2000}} = [(L_1 - L_2)^2 + (a_1 - a_2)^2 + (b_1 - b_2)^2]^{1/2},$$</span></span></div><div class="c-article-equation__number" data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="2896"><span data-dcnode-id="2920" instrument_node="">where </span><i data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">L</span></i><span data-dcnode-id="2917" instrument_node=""> is the lightness of one specific colour, and a its red–green and </span><i data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">b</span></i><span data-dcnode-id="2914" instrument_node=""> its yellow-blue correlative (Supplementary Figs.&nbsp;</span><a data-dcnode-id="2912" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2913" instrument_node="">4</span></a><span data-dcnode-id="2911" instrument_node=""> and </span><a data-dcnode-id="2909" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2910" instrument_node="">5</span></a><span data-dcnode-id="2908" instrument_node="">). This lightness difference metric can be used to diagnose any colour map (e.g., ref. </span><sup data-dcnode-id="2905"><a aria-label="Reference 20" data-dcnode-id="2906" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d301024028e1504" title="Thyng, K. M., Greene, C. A., Hetland, R. D., Zimmerle, H. M. &amp; DiMarco, S. F. True colors of oceanography: guidelines for effective and accurate colormap selection. Oceanography 29, 9–13 (2016). Introducing the scientifically derived cmocean colour maps for better data visualisation in oceanography that also underline the importance of intuitive colour palettes given a certain data parameter."><span data-dcnode-id="2907" instrument_node="">20</span></a></sup><span data-dcnode-id="2904" instrument_node="">) and calculate the effective, perceptual error that is added to the underlying data by uneven colour gradients along a colour map</span><sup data-dcnode-id="2901"><a aria-label="Reference 30" data-dcnode-id="2902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d301024028e1508" title="Crameri, F. Geodynamic diagnostics, scientific visualisation and StagLab 3.0. Geoscientific Model Dev. 11, 2541–2562 (2018)."><span data-dcnode-id="2903" instrument_node="">30</span></a></sup><span data-dcnode-id="2900" instrument_node="">. These errors and the resulting visual data distortion can be significant and make, for example, linear data gradients look like a wobbly graph (Fig.&nbsp;</span><a data-dcnode-id="2898" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2899" instrument_node="">3</span></a><span data-dcnode-id="2897" instrument_node="">).</span></p></div></div></section><span data-dcnode-id="2892" instrument_node="">
</span><section data-dcnode-id="2869" data-title="Data availability"><div class="c-article-section" data-dcnode-id="2870" id="data-availability-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2890" id="data-availability"><span data-dcnode-id="2891" instrument_node="">Data availability</span></h2><div class="c-article-section__content" data-dcnode-id="2871" id="data-availability-content"><span data-dcnode-id="2889" instrument_node="">
