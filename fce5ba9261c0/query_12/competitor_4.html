</span><pre data-dcnode-id="3328" lang="text"><span data-dcnode-id="3329" instrument_node="">Return the *CIE UCS* colourspace *uv* chromaticity coordinates from given
correlated colour temperature :math:`T_{cp}`, :math:`\Delta_{uv}` and
colour matching functions using *Ohno (2013)* method.

Parameters
----------
CCT_D_uv
    Correlated colour temperature :math:`T_{cp}`, :math:`\Delta_{uv}`.
cmfs
    Standard observer colour matching functions, default to the
    *CIE 1931 2 Degree Standard Observer*.

Returns
-------
:class:`numpy.ndarray`
    *CIE UCS* colourspace *uv* chromaticity coordinates.

References
----------
:cite:`Ohno2014a`

Examples
--------
&gt;&gt;&gt; from pprint import pprint
&gt;&gt;&gt; from colour import MSDS_CMFS, SPECTRAL_SHAPE_DEFAULT
&gt;&gt;&gt; cmfs = (
...     MSDS_CMFS['CIE 1931 2 Degree Standard Observer'].
...     copy().align(SPECTRAL_SHAPE_DEFAULT)
... )
&gt;&gt;&gt; CCT_D_uv = np.array([6507.4342201047066, 0.003223690901513])
&gt;&gt;&gt; CCT_to_uv_Ohno2013(CCT_D_uv, cmfs)  # doctest: +ELLIPSIS
array([ 0.1977999...,  0.3122004...])
</span></pre><span data-dcnode-id="3327" instrument_node="">
