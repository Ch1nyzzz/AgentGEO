</span><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node=""> Keeping this in view,  where does rhubarb grow best?</span><p data-dcnode-id="998"><span data-dcnode-id="999"><span data-dcnode-id="1000"><b data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Grow rhubarb</span></b><span data-dcnode-id="1010" instrument_node=""> in full sun, in rich, lightly moist soil. In hot regions (USDA hardiness zone 6 and higher), </span><b data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">plant rhubarb</span></b><span data-dcnode-id="1007" instrument_node=""> where it will get some protection from hot afternoon sun. </span><b data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Rhubarb</span></b><span data-dcnode-id="1004" instrument_node=""> will not thrive in a soggy location, where it will be susceptible to root rot, one of the few problems </span><b data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">rhubarb</span></b><span data-dcnode-id="1001" instrument_node=""> can encounter.</span></span></span></p><p data-dcnode-id="982"><span data-dcnode-id="997" instrument_node="">Also,  does rhubarb grow in the South? </span><span data-dcnode-id="983"><span data-dcnode-id="984"><b data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Rhubarb can</span></b><span data-dcnode-id="994" instrument_node=""> be planted Spring or Fall. In naturally cold climates, </span><b data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">plant rhubarb</span></b><span data-dcnode-id="991" instrument_node=""> in full sun. If you're trying to get it to </span><b data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">do</span></b><span data-dcnode-id="988" instrument_node=""> well in the </span><b data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">South</span></b><span data-dcnode-id="985" instrument_node=""> or Hot West, make sure it gets afternoon shade and lots of water.</span></span></span></p><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node=""> Keeping this in view,  does rhubarb grow all year round?</span></p><p data-dcnode-id="967"><span data-dcnode-id="979" instrument_node=""> </span><span data-dcnode-id="968"><span data-dcnode-id="969"><b data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Rhubarb</span></b><span data-dcnode-id="976" instrument_node="">. </span><b data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Rhubarb</span></b><span data-dcnode-id="973" instrument_node=""> is an attractive hardy perennial with large leaves and pink, red or greenish leaf stalks that are used as a dessert, often in pies and crumbles. Stems are usually picked in spring, but </span><b data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">plants can</span></b><span data-dcnode-id="970" instrument_node=""> be covered with pots to produce an early crop of blanched stalks in late winter.</span></span></span></p><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">What states does rhubarb grow in?</span></p><p data-dcnode-id="946"><span data-dcnode-id="947"><span data-dcnode-id="948"><span data-dcnode-id="964" instrument_node="">In the United </span><b data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">states</span></b><span data-dcnode-id="961" instrument_node=""> it </span><b data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">grows</span></b><span data-dcnode-id="958" instrument_node=""> best in the northern </span><b data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">states</span></b><span data-dcnode-id="955" instrument_node=""> from Maine south to Illinois and west to Washington </span><b data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">state</span></b><span data-dcnode-id="952" instrument_node="">. Once planted, </span><b data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">rhubarb</span></b><span data-dcnode-id="949" instrument_node=""> plantings remain productive for 8 to 15 years.</span></span></span></p><span data-dcnode-id="945" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="944" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="943" instrument_node="">
