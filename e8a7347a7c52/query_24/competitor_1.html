</span><div data-dcnode-id="1046"><span data-dcnode-id="1047"><span data-dcnode-id="1048"><span data-dcnode-id="1061" instrument_node="">Clean 1 pound of </span><b data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">rhubarb</span></b><span data-dcnode-id="1058" instrument_node=""> and cut into 3/4 to 1 inch pieces. This should produce approximately 3 cups of </span><b data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">rhubarb</span></b><span data-dcnode-id="1055" instrument_node="">. Combine 1/4 cup of </span><b data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">sugar</span></b><span data-dcnode-id="1052" instrument_node=""> and 1/4 cup of water in a saucepan. Bring to a boil over medium heat and stir until </span><b data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">sugar</span></b><span data-dcnode-id="1049" instrument_node=""> has dissolved.</span></span></span></div><br data-dcnode-id="1045"><p data-dcnode-id="1038"><a class="lc" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/goto/634557" rel="nofollow" target="_blank"><span data-dcnode-id="1044" instrument_node="">Click to see full answer </span></a><span data-dcnode-id="1042" instrument_node=""> </span><br data-dcnode-id="1041"><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node=""> Regarding this,  how do you sweeten rhubarb?</span></p><p data-dcnode-id="1024"><span data-dcnode-id="1037" instrument_node=""> </span><span data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Just Juice</span></span><span data-dcnode-id="1034" instrument_node=""> </span><span data-dcnode-id="1025"><span data-dcnode-id="1026"><span data-dcnode-id="1033" instrument_node="">Orange, apple or cranberry juice are a few options that will also add a small amount of vitamin C to the </span><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">rhubarb</span></b><span data-dcnode-id="1030" instrument_node="">. Choose 100 percent fruit juice, however, because fruit-flavored juice often contains a large amount of added sugar, which decreases the nutritional value of the </span><b data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">rhubarb</span></b><span data-dcnode-id="1027" instrument_node="">.</span></span></span></p><p data-dcnode-id="1010"><span data-dcnode-id="1023" instrument_node="">Furthermore,  can a diabetic eat rhubarb?  </span><span data-dcnode-id="1017"><b data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Rhubarb</span></b><span data-dcnode-id="1020" instrument_node=""> is great for </span><b data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">diabetics</span></b></span><span data-dcnode-id="1016" instrument_node=""> </span><span data-dcnode-id="1011"><span data-dcnode-id="1012"><b data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Rhubarb</span></b><span data-dcnode-id="1013" instrument_node=""> contains various compounds called anthraquinones. Two of these compounds have been found to improve the transport of glucose into our cells, so it's not hanging out in the bloodstream but is instead being used as fuel.</span></span></span></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node=""> Considering this,  can you cook rhubarb with sweetener?</span></p><p data-dcnode-id="985"><span data-dcnode-id="1007" instrument_node=""> </span><span data-dcnode-id="986"><span data-dcnode-id="987"><span data-dcnode-id="1006" instrument_node="">Sugar free stewed </span><b data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">rhubarb</span></b><span data-dcnode-id="1003" instrument_node=""> Recipe. Cut </span><b data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">rhubarb</span></b><span data-dcnode-id="1000" instrument_node=""> into small cubes or thin slices. Add </span><b data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">rhubarb</span></b><span data-dcnode-id="997" instrument_node="">, </span><b data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">sweetener</span></b><span data-dcnode-id="994" instrument_node=""> and water to pot. Stir until </span><b data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">sweetener</span></b><span data-dcnode-id="991" instrument_node=""> dissolves, then simmer until </span><b data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">rhubarb</span></b><span data-dcnode-id="988" instrument_node=""> is tender and sauce like.</span></span></span></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">How do you clean and cook rhubarb?</span></p><p data-dcnode-id="978"><span data-dcnode-id="982" instrument_node=""> </span><b data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Preparing Rhubarb</span></b><span data-dcnode-id="979" instrument_node=""> </span></p><ol data-dcnode-id="967"><span data-dcnode-id="977" instrument_node=""> </span><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Trim off and discard all leaves and the ends of the stalks.</span></li><span data-dcnode-id="974" instrument_node=""> </span><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Remove any brown spots or coarse strings with a vegetable peeler. Wash under cold running water.</span></li><span data-dcnode-id="971" instrument_node=""> </span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Cut the stalks crosswise into 1- to 2-inch pieces. Because it breaks down easily during cooking, rhubarb is usually not cut into small pieces.</span></li><span data-dcnode-id="968" instrument_node=""> </span></ol><span data-dcnode-id="966" instrument_node=""> </span><p data-dcnode-id="965"></p><span data-dcnode-id="964" instrument_node=""> </span></div><span data-dcnode-id="962" instrument_node="">
