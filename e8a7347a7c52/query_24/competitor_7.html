</span><div data-dcnode-id="1070"><span data-dcnode-id="1071"><span data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node="">How long does rhubarb last in the freezer? Properly stored, rhubarb will maintain best quality in the freezer for </span><b data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">about 12 months</span></b><span data-dcnode-id="1073" instrument_node="">, but will remain safe beyond that time. The freezer time shown is for best quality only - rhubarb that has been kept constantly frozen at 0°F will keep safe indefinitely.</span></span></span></div><br data-dcnode-id="1069"><p data-dcnode-id="1062"><a class="lc" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/goto/442297" rel="nofollow" target="_blank"><span data-dcnode-id="1068" instrument_node="">Click to see full answer </span></a><span data-dcnode-id="1066" instrument_node=""> </span><br data-dcnode-id="1065"><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node=""> Then,  can I freeze raw rhubarb?</span></p><p data-dcnode-id="1040"><span data-dcnode-id="1041"><span data-dcnode-id="1042"><span data-dcnode-id="1061" instrument_node="">The easiest way to store </span><b data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">rhubarb</span></b><span data-dcnode-id="1058" instrument_node=""> so you </span><b data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">can</span></b><span data-dcnode-id="1055" instrument_node=""> enjoy it when it's out of season is to </span><b data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">freeze</span></b><span data-dcnode-id="1052" instrument_node=""> it: cut stalks into 1-inch pieces; lay them flat on a parchment-lined baking pan. </span><b data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Freeze</span></b><span data-dcnode-id="1049" instrument_node=""> until firm, a few hours. Transfer to </span><b data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">freezer</span></b><span data-dcnode-id="1046" instrument_node=""> bags and store in the </span><b data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">freezer</span></b><span data-dcnode-id="1043" instrument_node=""> for up to a year.</span></span></span></p><p data-dcnode-id="1018"><span data-dcnode-id="1039" instrument_node="">Also,  is rhubarb poisonous after freezing? </span><span data-dcnode-id="1019"><span data-dcnode-id="1020"><b data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">If</span></b><span data-dcnode-id="1036" instrument_node=""> your patch of </span><b data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">rhubarb freezes</span></b><span data-dcnode-id="1033" instrument_node="">, the fleshy part of the plant will </span><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">freeze</span></b><span data-dcnode-id="1030" instrument_node="">. </span><b data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">After</span></b><span data-dcnode-id="1027" instrument_node=""> a day or two, the </span><b data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">frozen</span></b><span data-dcnode-id="1024" instrument_node=""> leaves and stems will become soft and blackened. Remember, only the stalks or petioles should be eaten because the leaves contain moderately </span><b data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">poisonous</span></b><span data-dcnode-id="1021" instrument_node=""> oxalic acid.</span></span></span></p><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node=""> Consequently,  do you have to blanch rhubarb to freeze it?</span></p><p data-dcnode-id="990"><span data-dcnode-id="1015" instrument_node=""> </span><span data-dcnode-id="991"><span data-dcnode-id="992"><span data-dcnode-id="1014" instrument_node="">Before </span><b data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">freezing rhubarb</span></b><span data-dcnode-id="1011" instrument_node="">, </span><b data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">you can blanch</span></b><span data-dcnode-id="1008" instrument_node=""> it to help preserve colour and flavour – this is recommended if </span><b data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">you</span></b><span data-dcnode-id="1005" instrument_node="">'</span><b data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">re</span></b><span data-dcnode-id="1002" instrument_node=""> planing on keeping the </span><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">rhubarb</span></b><span data-dcnode-id="999" instrument_node=""> frozen for more than three months. But it </span><b data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">can</span></b><span data-dcnode-id="996" instrument_node=""> also be frozen without </span><b data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">blanching</span></b><span data-dcnode-id="993" instrument_node="">.</span></span></span></p><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">When should you not eat rhubarb?</span></p><p data-dcnode-id="963"><span data-dcnode-id="987" instrument_node=""> </span><span data-dcnode-id="983"><b data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Rhubarb</span></b><span data-dcnode-id="984" instrument_node=""> Stalks Become Toxic in Summer</span></span><span data-dcnode-id="982" instrument_node=""> </span><span data-dcnode-id="964"><span data-dcnode-id="965"><span data-dcnode-id="981" instrument_node="">There are two good reasons </span><b data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">not to eat</span></b><span data-dcnode-id="978" instrument_node=""> them in summer. They tend </span><b data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">to</span></b><span data-dcnode-id="975" instrument_node=""> get woody in late summer and </span><b data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">don't</span></b><span data-dcnode-id="972" instrument_node=""> taste as good. If </span><b data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">you</span></b><span data-dcnode-id="969" instrument_node=""> harvest too many stalks in spring, the plant needs some leaves </span><b data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">to</span></b><span data-dcnode-id="966" instrument_node=""> grow food for next years crop.</span></span></span></p><span data-dcnode-id="962" instrument_node=""> </span></div><span data-dcnode-id="960" instrument_node="">

</span></h3><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="935" style="display:inline;"></p><div data-dcnode-id="919"><span data-dcnode-id="920"><span data-dcnode-id="921"><span data-dcnode-id="934" instrument_node="">Newly planted </span><b data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">rhubarb</span></b><span data-dcnode-id="931" instrument_node=""> will initially produce small, </span><b data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">spindly</span></b><span data-dcnode-id="928" instrument_node=""> stalks during its 2 year establishment period. The stalks of large, old plants may be small and </span><b data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">spindly</span></b><span data-dcnode-id="925" instrument_node=""> because of overcrowding. Poor plant vigor due to poor cultural practices is another possibility. Early spring is the best time to divide </span><b data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">rhubarb</span></b><span data-dcnode-id="922" instrument_node=""> plants.</span></span></span></div><p data-dcnode-id="918"></p><span data-dcnode-id="917" instrument_node="">

</span></h3><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="899" style="display:inline;"></p><div data-dcnode-id="884"><span data-dcnode-id="885"><span data-dcnode-id="886"><b data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Rhubarb</span></b><span data-dcnode-id="896" instrument_node=""> is harvested by hand, and ONLY the stalks are edible. In Canada and the United States, the </span><b data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">rhubarb</span></b><span data-dcnode-id="893" instrument_node=""> season runs from about April to </span><b data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">September</span></b><span data-dcnode-id="890" instrument_node="">, although it can also be grown forced. </span><b data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Rhubarb</span></b><span data-dcnode-id="887" instrument_node=""> stalks are approximately 10 - 15 inches long when ready to harvest.</span></span></span></div><p data-dcnode-id="883"></p><span data-dcnode-id="882" instrument_node="">

</span></h3><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="822" style="display:inline;"></p><div data-dcnode-id="807"><span data-dcnode-id="808"><span data-dcnode-id="809"><b data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Rhubarb</span></b><span data-dcnode-id="819" instrument_node="">. </span><b data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Rhubarb leaves</span></b><span data-dcnode-id="816" instrument_node=""> are very high in oxalic acid, which quickly causes kidney failure in humans. About 25 grams of pure oxalic acid is the average amount needed to kill a human. That said, </span><b data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">rhubarb leaves</span></b><span data-dcnode-id="813" instrument_node=""> aren't pure oxalic acid, and it would take around 11 pounds of the </span><b data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">leaves</span></b><span data-dcnode-id="810" instrument_node=""> to secure that much.</span></span></span></div><p data-dcnode-id="806"></p><span data-dcnode-id="805" instrument_node="">

</span></h3><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="787" style="display:inline;"></p><div data-dcnode-id="772"><span data-dcnode-id="773"><span data-dcnode-id="774"><b data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Rhubarb</span></b><span data-dcnode-id="784" instrument_node=""> stems contain </span><b data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">much</span></b><span data-dcnode-id="781" instrument_node=""> less oxalic acid than the leaves, and little or no anthraquinone. So, they are safe to </span><b data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">eat</span></b><span data-dcnode-id="778" instrument_node=""> in reasonable quantities, and provide vitamins A and C. But </span><b data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">eating too much rhubarb too</span></b><span data-dcnode-id="775" instrument_node=""> often might not be a good idea because of possible stress to kidneys and inflammation of joints.</span></span></span></div><p data-dcnode-id="771"></p><span data-dcnode-id="770" instrument_node="">

</span></h3><span data-dcnode-id="753" instrument_node="">

</span><p data-dcnode-id="719" style="display:inline;"></p><div data-dcnode-id="689"><span data-dcnode-id="690"><span data-dcnode-id="691"><b data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Do</span></b><span data-dcnode-id="716" instrument_node=""> not </span><b data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">harvest</span></b><span data-dcnode-id="713" instrument_node=""> any stalks during the </span><b data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">first growing</span></b><span data-dcnode-id="710" instrument_node=""> season so that your plants </span><b data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">can</span></b><span data-dcnode-id="707" instrument_node=""> become established. </span><b data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Harvest</span></b><span data-dcnode-id="704" instrument_node=""> the stalks when they are 12 to 18 inches long. </span><b data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">You</span></b><span data-dcnode-id="701" instrument_node=""> may have a bountiful </span><b data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">harvest</span></b><span data-dcnode-id="698" instrument_node=""> for up to 20 years without having to replace your </span><b data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">rhubarb</span></b><span data-dcnode-id="695" instrument_node=""> plants. After </span><b data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">harvest</span></b><span data-dcnode-id="692" instrument_node=""> time, the stems may die back.</span></span></span></div><p data-dcnode-id="688"></p><span data-dcnode-id="687" instrument_node="">
