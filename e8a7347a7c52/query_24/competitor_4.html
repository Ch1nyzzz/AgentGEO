</span><p class="has-text-align-center" data-dcnode-id="1319"><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Canning rhubarb it’s really easy! Just a few ingredients and you can enjoy preserved rhubarb sauce throughout the year.</span></em></p><span data-dcnode-id="1318" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1316" id="h-canned-rhubarb"><span data-dcnode-id="1317" instrument_node="">Canned rhubarb</span></h2><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1314" instrument_node="">Canning rhubarb sauce is one of my favorite ways of preserving rhubarb “for the winter”. My grandma used to say that everything that’s canned is for the winter, but we actually enjoy different kinds of</span><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whereismyspoon.co/category/preserves-canning-recipes/"><span data-dcnode-id="1313" instrument_node=""> preserves </span></a><span data-dcnode-id="1311" instrument_node="">at any time of the year.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1308" instrument_node="">You can always freeze the rhubarb and use it to make cakes, pies, or desserts when it’s not in season anymore, but this canned rhubarb makes a ready dessert. You open a jar, and you can eat it with a spoon directly from the jar. It is that good!!! Really!!! And learn</span><a data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whereismyspoon.co/how-to-cook-rhubarb/"><span data-dcnode-id="1307" instrument_node=""> What to Do with Rhubarb? (Bake, Cook, Preserve)</span></a><span data-dcnode-id="1305" instrument_node=""> – a full article all about dealing with rhubarb.</span></p><span data-dcnode-id="1303" instrument_node="">

</span><p data-dcnode-id="1279"><span data-dcnode-id="1286" instrument_node="">Sweet and tart, soft and saucy, incredibly delicious. Or you can use it to make other desserts, like the </span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whereismyspoon.co/rhubarb-crisp-with-apples-and-crunchy-oatmeal-topping/"><span data-dcnode-id="1285" instrument_node="">rhubarb crisp with apples and oatmeal</span></a><span data-dcnode-id="1283" instrument_node=""> or the </span><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whereismyspoon.co/rhubarb-apple-crumble/"><span data-dcnode-id="1282" instrument_node="">rhubarb apple crumble</span></a><span data-dcnode-id="1280" instrument_node="">. </span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">You can top other desserts or puddings with it; you can make trifles; you can mix it with Greek yogurt or quark. Amazing! Or you can enjoy it with a dollop of whipped cream.</span></p><span data-dcnode-id="1275" instrument_node="">

</span><h2 class="has-text-align-center" data-dcnode-id="1257" id="h-how-to-preserve-rhubarb"><span data-dcnode-id="1258" instrument_node="">How to preserve rhubarb?</span></h2><span data-dcnode-id="1256" instrument_node="">
</span><h3 data-dcnode-id="1254" id="h-quantities"><span data-dcnode-id="1255" instrument_node="">Quantities:</span></h3><span data-dcnode-id="1253" instrument_node="">
</span><h4 data-dcnode-id="1251" id="h-rhubarb"><span data-dcnode-id="1252" instrument_node="">Rhubarb:</span></h4><span data-dcnode-id="1250" instrument_node="">
</span><ul data-dcnode-id="1243"><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">How much you want to can is really up to you. You can make just a few jars or, if you have a huge bush in your garden, you can make lots and lots of jars.</span></li><li data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">450 g/ 1 lb rhubarb = about 3 cups raw chopped = about 2 cups cooked</span></li><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">1800 g / 4 lbs = about 12 cups raw chopped = about 8 cups cooked</span></li></ul><span data-dcnode-id="1242" instrument_node="">
</span><h4 data-dcnode-id="1240" id="h-rhubarb-sugar-ratio"><span data-dcnode-id="1241" instrument_node="">Rhubarb-sugar ratio:</span></h4><span data-dcnode-id="1239" instrument_node="">
</span><ul data-dcnode-id="1224"><li data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">For each 450/ 1 lb, you will need 150 g/ 5.3 oz/ ¾ cup granulated sugar.</span></li><li data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">For 1800 g/ 4 lbs raw rhubarb I used 600 g/ 1.3 lbs/ 3 cups granulated sugar.</span></li><li data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">The sugar amount is not a must; sugar is not what preserves the rhubarb in this recipe.</span></li><li data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">You can use less sugar, use to taste.</span></li><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">You can even leave it unsweetened, but out of the experience, I know that unsweetened canned rhubarb is not exactly a joy. You will sweeten it anyway if you want to be able to eat it.</span></li><li data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">But the unsweetened sort can be used in savory recipes.</span></li><li data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">The amount of sugar I used is exactly what we like, sweet yet slightly tart sauce, definitely a joy to eat.</span></li></ul><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1222"></p><span data-dcnode-id="1221" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1216"><figure class="aligncenter size-large" data-dcnode-id="1217"><noscript data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">&lt;img loading="lazy" width="1024" height="628" data-pin-nopin="true" src="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1024x628.jpg" alt="preserved rhubarb in sealed jars" class="wp-image-17887" srcset="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1024x628.jpg 1024w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-300x184.jpg 300w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-768x471.jpg 768w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-735x450.jpg 735w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-335x205.jpg 335w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-347x213.jpg 347w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-520x319.jpg 520w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-640x392.jpg 640w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-960x588.jpg 960w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1080x662.jpg 1080w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1170x717.jpg 1170w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-585x359.jpg 585w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17.jpg 1400w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="preserved rhubarb in sealed jars" class="wp-image-17887 lazyload" data-dcnode-id="1218" data-pin-nopin="true" data-src="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1024x628.jpg.webp" data-srcset="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1024x628.jpg.webp 1024w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-300x184.jpg.webp 300w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-768x471.jpg.webp 768w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-735x450.jpg.webp 735w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-335x205.jpg.webp 335w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-347x213.jpg.webp 347w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-520x319.jpg.webp 520w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-640x392.jpg.webp 640w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-960x588.jpg.webp 960w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1080x662.jpg.webp 1080w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1170x717.jpg.webp 1170w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-585x359.jpg.webp 585w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17.jpg.webp 1400w" data-trellis-processed="1" data-webp="true" height="628" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1024x628.jpg.webp&amp;raw" srcset="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1024x628.jpg.webp 1024w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-300x184.jpg.webp 300w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-768x471.jpg.webp 768w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-735x450.jpg.webp 735w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-335x205.jpg.webp 335w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-347x213.jpg.webp 347w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-520x319.jpg.webp 520w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-640x392.jpg.webp 640w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-960x588.jpg.webp 960w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1080x662.jpg.webp 1080w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-1170x717.jpg.webp 1170w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17-585x359.jpg.webp 585w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-17.jpg.webp 1400w" width="1024"></figure></div><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1214"></p><span data-dcnode-id="1213" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1211" id="h-how-to-can-rhubarb"><span data-dcnode-id="1212" instrument_node="">How to can rhubarb?</span></h2><span data-dcnode-id="1210" instrument_node="">
</span><ul data-dcnode-id="1183"><li data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Remove and discard the leaves; they are poisonous!</span></li><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Next, wash the stalks and remove the knobbly ends.</span></li><li data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Chop into pieces, about 1.5–2 cm/ 0.6-08-inches thick.</span></li><li data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Place in a large pot and add the sugar. (1)</span></li><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Let stand until some liquid is released, about 20-30 minutes.</span></li><li data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Bring to a boil, stirring often.</span></li><li data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">As soon as it boils, turn off the heat. If you cook it for longer, the pieces will break. (2)</span></li><li data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Pack immediately into sterilized and still hot jars, leaving about 3 cm/ ½-inch headspace. (3)</span></li><li data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Make sure that each jar contains roughly equal amounts of rhubarb and liquid. (4)</span></li><li data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Wipe the rims of the jars with kitchen paper. Be thorough; otherwise, the jars will get moldy.</span></li><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Put the lids on.</span></li><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Process in a water bath for about 15 minutes, adjusting for altitude.</span></li><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">If you have a canner, use that according to its instructions.</span></li></ul><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1181"></p><span data-dcnode-id="1180" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1175"><figure class="aligncenter size-large" data-dcnode-id="1176"><noscript data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">&lt;img loading="lazy" width="1024" height="819" data-pin-nopin="true" src="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1024x819.jpg" alt="preparing rhubarb with sugar for canning" class="wp-image-17885" srcset="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1024x819.jpg 1024w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-300x240.jpg 300w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-768x614.jpg 768w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1536x1229.jpg 1536w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1920x1536.jpg 1920w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1170x936.jpg 1170w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-585x468.jpg 585w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step.jpg 2000w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="preparing rhubarb with sugar for canning" class="wp-image-17885 lazyload" data-dcnode-id="1177" data-pin-nopin="true" data-src="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1024x819.jpg.webp" data-srcset="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1024x819.jpg.webp 1024w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-300x240.jpg.webp 300w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-768x614.jpg.webp 768w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1536x1229.jpg.webp 1536w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1920x1536.jpg.webp 1920w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1170x936.jpg.webp 1170w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-585x468.jpg.webp 585w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step.jpg.webp 2000w" data-trellis-processed="1" data-webp="true" height="819" id="mv-trellis-img-5" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1024x819.jpg.webp&amp;raw" srcset="https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1024x819.jpg.webp 1024w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-300x240.jpg.webp 300w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-768x614.jpg.webp 768w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1536x1229.jpg.webp 1536w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1920x1536.jpg.webp 1920w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-1170x936.jpg.webp 1170w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step-585x468.jpg.webp 585w, https://whereismyspoon.co/wp-content/uploads/2020/06/canning-rhubarb-step-by-step.jpg.webp 2000w" width="1024"></figure></div><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1173"></p><span data-dcnode-id="1172" instrument_node="">
</span><h3 data-dcnode-id="1170" id="h-canning-rhubarb-without-special-equipment"><span data-dcnode-id="1171" instrument_node="">Canning rhubarb without special equipment</span></h3><span data-dcnode-id="1169" instrument_node="">
</span><ul data-dcnode-id="1148"><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">I don’t have any special canning equipment. Still, I can a lot.</span></li><li data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">I use a huge pot.</span></li><li data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Place a folded, clean kitchen towel on the bottom of the pot.</span></li><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Place the jars in the pot making sure that they don’t touch each other.</span></li><li data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Fill with boiling water, covering the jars by at least 5 cm/ 2 inches.</span></li><li data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Bring to a rolling boil and start measuring the time from this moment.</span></li><li data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Turn off the heat.</span></li><li data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Ladle enough water out of the pot so that you can grab the jars. Use oven mitts to protect your hands.</span></li><li data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Place the jars on kitchen towels.</span></li><li data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Leave to cool completely and check if they are sealed. If any of the jars is not sealed (it can happen), place them in the fridge and consume them within a week or so.</span></li></ul><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1146"></p><span data-dcnode-id="1145" instrument_node="">

abel" data-dcnode-id="913" for="wprm-checkbox-1"><span class="sr-only screen-reader-text wprm-screen-reader-text" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">▢ </span></span></label></span><span class="wprm-recipe-ingredient-amount" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">600</span></span><span data-dcnode-id="909" instrument_node=""> </span><span class="wprm-recipe-ingredient-name" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">g/ 1.3 lbs/ 3 cups granulated sugar.</span></span></li></ul></div></div><div class="mv_slot_target" data-dcnode-id="902" data-render-default="true" data-slot="recipe"></div><span data-dcnode-id="901" instrument_node="">
</span><div class="wprm-recipe-instructions-container wprm-recipe-17893-instructions-container wprm-block-text-normal" data-dcnode-id="871" data-recipe="17893"><h3 class="wprm-recipe-header wprm-recipe-instructions-header wprm-block-text-bold wprm-align-left wprm-header-decoration-none" data-dcnode-id="899" style=""><span data-dcnode-id="900" instrument_node="">Instructions</span></h3><div class="wprm-recipe-instruction-group" data-dcnode-id="886"><h4 class="wprm-recipe-group-name wprm-recipe-instruction-group-name wprm-block-text-bold" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Prepare rhubarb:</span></h4><ul class="wprm-recipe-instructions" data-dcnode-id="887"><li class="wprm-recipe-instruction" data-dcnode-id="894" id="wprm-recipe-17893-step-0-0" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="895" style="margin-bottom: 5px"><span data-dcnode-id="896" instrument_node="">Remove and discard the leaves. Wash the stalks and remove the knobbly ends. Chop into pieces, about 1.5–2 cm/ 0.6-08-inches thick. Place in a large pot and add the sugar. Let stand until some liquid is released, about 20-30 minutes.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="891" id="wprm-recipe-17893-step-0-1" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="892" style="margin-bottom: 5px"><span data-dcnode-id="893" instrument_node="">Bring to a boil, stirring often. As soon as it boils turn off the heat. If you cook it for longer the pieces will break. Pack immediately into sterilized and still hot jars, leaving about 3 cm/ ½-inch headspace. Make sure that each jar contains roughly equal amounts of rhubarb and liquid. Wipe the rims of the jars with kitchen paper. Be thorough, otherwise, the jars will get moldy. Put the lids on.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="888" id="wprm-recipe-17893-step-0-2" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="889" style="margin-bottom: 5px"><span data-dcnode-id="890" instrument_node="">Process in a water bath for about 15 minutes, adjusting for altitude. If you have a canner, use that according to its instructions.</span></div></li></ul></div><div class="wprm-recipe-instruction-group" data-dcnode-id="872"><h4 class="wprm-recipe-group-name wprm-recipe-instruction-group-name wprm-block-text-bold" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Canning without special equipment:</span></h4><ul class="wprm-recipe-instructions" data-dcnode-id="873"><li class="wprm-recipe-instruction" data-dcnode-id="881" id="wprm-recipe-17893-step-1-0" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="882" style="margin-bottom: 5px"><span data-dcnode-id="883" instrument_node="">Place a folded clean kitchen towel on the bottom of a very large pot. Place the jars in there making sure that they don’t touch each other. Fill with boiling water, covering by at least 5 cm/ 2 inches.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="878" id="wprm-recipe-17893-step-1-1" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="879" style="margin-bottom: 5px"><span data-dcnode-id="880" instrument_node="">Bring to a rolling boil and start measuring the time from this moment. Remove from the heat. Ladle enough water out of the pot, so that you are able to take out the jars using oven mitts.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="874" id="wprm-recipe-17893-step-1-2" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="875" style="margin-bottom: 5px"><span data-dcnode-id="877" instrument_node="">Place the jars on kitchen towels and leave to cool completely. Check if they are sealed. If any of the jars is not sealed, place it in the fridge and consume within a week or so. </span><br data-dcnode-id="876"></div></li></ul></div></div><span data-dcnode-id="870" instrument_node="">
