</span><h1 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">How to Grow Rhubarb</span></h1><span data-dcnode-id="762" instrument_node="">
</span><span data-dcnode-id="761" instrument_node="">
</span><span data-dcnode-id="760" instrument_node="">
</span><span data-dcnode-id="759" instrument_node="">
</span><span data-dcnode-id="756" instrument_node="">
</span><span data-dcnode-id="754" instrument_node="">
</span><span data-dcnode-id="753" instrument_node="">
</span><span data-dcnode-id="746" instrument_node="">
</span><span data-dcnode-id="744" instrument_node="">
</span><span data-dcnode-id="742" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="741" style="margin-bottom: 10px; display: table;" width="100%"><tbody data-dcnode-id="743"><tr data-dcnode-id="755"><td data-dcnode-id="757" style="padding: 0px;"><img alt="how to grow rhubarb" data-dcnode-id="758" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/rhubarb-lead-image.jpg&amp;raw" style="width: 100%;" title="how to grow rhubarb"></td></tr><tr data-dcnode-id="745"><td data-dcnode-id="747" style="background-color: #cccccc; font-weight: bold; font-style: italic; padding: 0px;"><span data-dcnode-id="752" instrument_node="">The ultimate guide to growing rhubarb in the UK</span><br data-dcnode-id="751"><span data-dcnode-id="750" instrument_node="">Image: </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/rhubarb-stalks-grow-garden-315923591%3Fsrc%3DtF6HuRmk4Jhk5wE8CUd5Iw-1-2"><span data-dcnode-id="749" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="734"><strong data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">What could be better than rounding off your Sunday lunch with a piping hot bowl of </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/vegetables/autumn-planting-vegetables"><span data-dcnode-id="738" instrument_node="">rhubarb</span></a><span data-dcnode-id="736" instrument_node=""> crumble? Or how about a delicious rhubarb pie, summer fool or homemade jam?</span></strong></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="730"><strong data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Rhubarb is an undemanding perennial that’s easy to grow and fantastically hardy. In fact, it actually needs a cold snap in order to produce the best crops.</span></strong></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="728" instrument_node="">A healthy </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/fruit/fruit-plants/rhubarb-crowns" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="727" instrument_node="">rhubarb plant</span></a><span data-dcnode-id="725" instrument_node=""> will remain productive for at least 10 years so it makes an excellent investment. During the first year, you’ll need to resist the temptation to harvest the stems. But from the second year, you can harvest your rhubarb from April to June. Here are some tips on when to plant rhubarb and how to grow your own..</span></p><span data-dcnode-id="723" instrument_node="">
</span><h2 data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Which variety to choose</span></h2><span data-dcnode-id="720" instrument_node="">
</span><span data-dcnode-id="719" instrument_node="">
</span><span data-dcnode-id="718" instrument_node="">
</span><span data-dcnode-id="717" instrument_node="">
</span><span data-dcnode-id="714" instrument_node="">
</span><span data-dcnode-id="712" instrument_node="">
</span><span data-dcnode-id="711" instrument_node="">
</span><span data-dcnode-id="704" instrument_node="">
</span><span data-dcnode-id="702" instrument_node="">
</span><span data-dcnode-id="700" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="699" style="margin-bottom: 10px; display: table;" width="100%"><tbody data-dcnode-id="701"><tr data-dcnode-id="713"><td data-dcnode-id="715" style="padding: 0px;"><img alt="rhubarb varieties" data-dcnode-id="716" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/rhubarb-varieties.jpg&amp;raw" style="width: 100%;" title="rhubarb varieties"></td></tr><tr data-dcnode-id="703"><td data-dcnode-id="705" style="background-color: #cccccc; font-weight: bold; font-style: italic; padding: 0px;"><span data-dcnode-id="710" instrument_node="">Different varieties have different flavours, strengths, and qualities.</span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">Image: </span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/freshly-hand-picked-organic-rhubarb-open-186898808%3Fsrc%3D6QaAq8vzbsVs9wQ68VZn6A-1-2"><span data-dcnode-id="707" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">There are lots of different varieties of rhubarb to choose from. Here are some of our favourites – all of which are suitable for planting in autumn or spring.</span></p><span data-dcnode-id="695" instrument_node="">
</span><ul data-dcnode-id="645" style="“list-style-type:disc;”"><span data-dcnode-id="694" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="693" instrument_node="">• </span><strong data-dcnode-id="689"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/p/rhubarb-champagne-springautumn-planting/aww3130TM"><span data-dcnode-id="692" instrument_node="">'Champagne'</span></a><span data-dcnode-id="690" instrument_node="">: </span></strong><span data-dcnode-id="688" instrument_node="">Reliable and easy to grow, this early variety is ideal for forcing to produce long, slender, pink-tinged stalks. Leave it unforced for a deeper, red-coloured stem.</span></li><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="679"><span data-dcnode-id="685" instrument_node="">• </span><strong data-dcnode-id="681"><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/p/rhubarb-victoria-springautumn-planting/aww3131TM"><span data-dcnode-id="684" instrument_node="">'Victoria'</span></a><span data-dcnode-id="682" instrument_node="">: </span></strong><span data-dcnode-id="680" instrument_node="">These greenish-pink stems have an excellent balance of sweetness and acidity. Once established, it will produce a heavy crop, year after year.</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="671"><span data-dcnode-id="677" instrument_node="">• </span><strong data-dcnode-id="673"><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/fruit/fruit-plants/rhubarb-crowns/rhubarb-raspberry-red/t15075TM"><span data-dcnode-id="676" instrument_node="">'Raspberry Red'</span></a><span data-dcnode-id="674" instrument_node="">: </span></strong><span data-dcnode-id="672" instrument_node="">These have thick, deep red stalks with a superb sweet flavour that can be harvested early in the season, without the need for forcing.</span></li><span data-dcnode-id="670" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="669" instrument_node="">• </span><strong data-dcnode-id="665"><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/p/rhubarb-thompsons-terrifically-tasty-springautumn-planting/T46918TM"><span data-dcnode-id="668" instrument_node="">‘Thomson’s Terrifically Tasty’</span></a><span data-dcnode-id="666" instrument_node="">:</span></strong><span data-dcnode-id="664" instrument_node=""> These thick pink, flavoursome stalks (that taper to green) are produced from March through to mid-summer, a whole month earlier than other rhubarb plants!</span></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="661" instrument_node="">• </span><strong data-dcnode-id="657"><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/p/rhubarb-fultons-strawberry-surprise-springautumn-planting/cww3564TM"><span data-dcnode-id="660" instrument_node="">‘Fulton’s Strawberry Surprise’</span></a><span data-dcnode-id="658" instrument_node="">:</span></strong><span data-dcnode-id="656" instrument_node=""> These strong, vigorous plants produce eye-catching, vivid red stems with a well balanced acidity. It was voted best-flavoured rhubarb in the RHS Wisley trials.</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="647"><span data-dcnode-id="653" instrument_node="">• </span><strong data-dcnode-id="649"><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/p/rhubarb-glaskins-perpetual/831TM"><span data-dcnode-id="652" instrument_node="">‘Glaskin’s Perpetual’</span></a><span data-dcnode-id="650" instrument_node="">:</span></strong><span data-dcnode-id="648" instrument_node=""> This easy to grow garden variety produces large, juicy stems that can be lightly harvested the following year, if started in heat during the winter.</span></li><span data-dcnode-id="646" instrument_node="">
</span></ul><span data-dcnode-id="644" instrument_node="">
</span><h2 data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Should you grow rhubarb from seed?</span></h2><span data-dcnode-id="641" instrument_node="">
</span><span data-dcnode-id="640" instrument_node="">
</span><span data-dcnode-id="639" instrument_node="">
</span><span data-dcnode-id="638" instrument_node="">
</span><span data-dcnode-id="635" instrument_node="">
</span><span data-dcnode-id="633" instrument_node="">
</span><span data-dcnode-id="632" instrument_node="">
</span><span data-dcnode-id="625" instrument_node="">
</span><span data-dcnode-id="623" instrument_node="">
</span><span data-dcnode-id="621" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="620" style="margin-bottom: 10px; display: table;" width="100%"><tbody data-dcnode-id="622"><tr data-dcnode-id="634"><td data-dcnode-id="636" style="padding: 0px;"><img alt="growing rhubarb from seed" data-dcnode-id="637" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/seed-rhubarb.jpg&amp;raw" style="width: 100%;" title="growing rhubarb from seed"></td></tr><tr data-dcnode-id="624"><td data-dcnode-id="626" style="background-color: #cccccc; font-weight: bold; font-style: italic; padding: 0px;"><span data-dcnode-id="631" instrument_node="">A rhubarb crown is a good option for beginners and green thumbs alike.</span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">Image: </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/rhubarb-rheum-rhabarbarum-crowns-emerging-ground-1031226283%3Fsrc%3D260dp-_15YRuTG0gYcRkoA-1-3"><span data-dcnode-id="628" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="618" instrument_node="">Like most crops, you can grow rhubarb from </span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/fruit/fruit-seeds/all-fruit-seeds/rhubarb-glaskins-perpetual/831TM"><span data-dcnode-id="617" instrument_node="">seed</span></a><span data-dcnode-id="615" instrument_node="">, but it’s much easier to plant crowns or budded pieces. They establish well, making them ideal for beginners, but even experienced gardeners will appreciate the grow boost.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Rhubarb crowns are established plants that are at least one year old. They will produce a crop in the first harvest season after planting, which is much sooner than rhubarb plants that are grown from seed. Budded pieces, meanwhile, are a portion of an established crown. These can be cropped two years after planting.</span></p><span data-dcnode-id="610" instrument_node="">
</span><h2 data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">When to plant rhubarb</span></h2><span data-dcnode-id="607" instrument_node="">
</span><span data-dcnode-id="606" instrument_node="">
</span><span data-dcnode-id="605" instrument_node="">
</span><span data-dcnode-id="604" instrument_node="">
</span><span data-dcnode-id="601" instrument_node="">
</span><span data-dcnode-id="599" instrument_node="">
</span><span data-dcnode-id="598" instrument_node="">
</span><span data-dcnode-id="591" instrument_node="">
</span><span data-dcnode-id="589" instrument_node="">
</span><span data-dcnode-id="587" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="586" style="margin-bottom: 10px; display: table;" width="100%"><tbody data-dcnode-id="588"><tr data-dcnode-id="600"><td data-dcnode-id="602" style="padding: 0px;"><img alt="rhubarb planted in Autumn" data-dcnode-id="603" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/when-plant-rhubarb.jpg&amp;raw" style="width: 100%;" title="rhubarb planted in Autumn"></td></tr><tr data-dcnode-id="590"><td data-dcnode-id="592" style="background-color: #cccccc; font-weight: bold; font-style: italic; padding: 0px;"><span data-dcnode-id="597" instrument_node="">Rhubarb crowns are best planted in autumn or spring.</span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">Image: </span><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/rhubarb-rheum-rhabarbarum-crowns-emerging-ground-1031226286%3Fsrc%3DtF6HuRmk4Jhk5wE8CUd5Iw-1-90"><span data-dcnode-id="594" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Rhubarb crowns and budded pieces are best planted in autumn or spring, while the soil is warm and moist.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">If you’ve grown your rhubarb in a pot, this can be planted out at any time of the year as long as the soil is not frozen, waterlogged or suffering from drought.</span></p><span data-dcnode-id="579" instrument_node="">
</span><h2 data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Where should you grow rhubarb?</span></h2><span data-dcnode-id="576" instrument_node="">
</span><span data-dcnode-id="575" instrument_node="">
</span><span data-dcnode-id="574" instrument_node="">
</span><span data-dcnode-id="573" instrument_node="">
</span><span data-dcnode-id="570" instrument_node="">
</span><span data-dcnode-id="568" instrument_node="">
</span><span data-dcnode-id="567" instrument_node="">
</span><span data-dcnode-id="560" instrument_node="">
</span><span data-dcnode-id="558" instrument_node="">
</span><span data-dcnode-id="556" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="555" style="margin-bottom: 10px; display: table;" width="100%"><tbody data-dcnode-id="557"><tr data-dcnode-id="569"><td data-dcnode-id="571" style="padding: 0px;"><img alt="rhubabrb planted in the garden" data-dcnode-id="572" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/when-grow-rhubarb.jpg&amp;raw" style="width: 100%;" title="rhubabrb planted in the garden"></td></tr><tr data-dcnode-id="559"><td data-dcnode-id="561" style="background-color: #cccccc; font-weight: bold; font-style: italic; padding: 0px;"><span data-dcnode-id="566" instrument_node="">Find a place you’re happy for rhubarb to grow for up to 10 years.</span><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">Image: </span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/early-rhubarb-plants-1047558280%3Fsrc%3DtF6HuRmk4Jhk5wE8CUd5Iw-1-59"><span data-dcnode-id="563" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">While undemanding, there are a few key things to keep in mind when selecting a place to plant rhubarb.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Firstly, rhubarb grows well in a sunny position with moist, well-drained soil, but it will tolerate semi-shade.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">It doesn’t respond well to disturbance so the place you choose will need to be a permanent home – somewhere your plants can grow without interruption, from year to year. Take the time to properly prepare the right spot in your garden before you begin planting.</span></p><span data-dcnode-id="545" instrument_node="">
</span><h2 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">How do you plant rhubarb?</span></h2><span data-dcnode-id="542" instrument_node="">
</span><span data-dcnode-id="541" instrument_node="">
</span><span data-dcnode-id="540" instrument_node="">
</span><span data-dcnode-id="539" instrument_node="">
</span><span data-dcnode-id="536" instrument_node="">
</span><span data-dcnode-id="534" instrument_node="">
</span><span data-dcnode-id="533" instrument_node="">
</span><span data-dcnode-id="526" instrument_node="">
</span><span data-dcnode-id="524" instrument_node="">
</span><span data-dcnode-id="522" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="521" style="margin-bottom: 10px; display: table;" width="100%"><tbody data-dcnode-id="523"><tr data-dcnode-id="535"><td data-dcnode-id="537" style="padding: 0px;"><img alt="planting rhubarb" data-dcnode-id="538" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/planting-rhubarb.jpg&amp;raw" style="width: 100%;" title="planting rhubarb"></td></tr><tr data-dcnode-id="525"><td data-dcnode-id="527" style="background-color: #cccccc; font-weight: bold; font-style: italic; padding: 0px;"><span data-dcnode-id="532" instrument_node="">Take some time to properly prepare the area before you plant.</span><br data-dcnode-id="531"><span data-dcnode-id="530" instrument_node="">Image: </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/mature-gardener-digging-soil-shovel-spring-642384229%3Fsrc%3DdOrR68efYI8OBPLOWBt9zg-1-15"><span data-dcnode-id="529" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Prepare the ground by thoroughly weeding the area and digging in two bucketfuls per square metre/yard of well-rotted manure.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Once you’ve done that, spread out the roots and plant so the tip of the crown is just visible above the soil.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">When planting rhubarb crowns or budded pieces, set them so that the top of the crown sits 3cm (1") below soil level. If you’re gardening on a heavy, wet soil then plant them slightly higher, so that the top of the crown sits at ground level. This will help to prevent crown rot. Rhubarb plants can get quite large so allow a spacing of 75cm (30") between them.</span></p><span data-dcnode-id="511" instrument_node="">
</span><h2 data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Can you grow rhubarb in a container?</span></h2><span data-dcnode-id="508" instrument_node="">
</span><span data-dcnode-id="507" instrument_node="">
</span><span data-dcnode-id="506" instrument_node="">
</span><span data-dcnode-id="505" instrument_node="">
</span><span data-dcnode-id="502" instrument_node="">
</span><span data-dcnode-id="500" instrument_node="">
</span><span data-dcnode-id="499" instrument_node="">
</span><span data-dcnode-id="492" instrument_node="">
</span><span data-dcnode-id="490" instrument_node="">
</span><span data-dcnode-id="488" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="487" style="margin-bottom: 10px; display: table;" width="100%"><tbody data-dcnode-id="489"><tr data-dcnode-id="501"><td data-dcnode-id="503" style="padding: 0px;"><img alt="rhubarb in containers" data-dcnode-id="504" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/container-rhubarb.jpg&amp;raw" style="width: 100%;" title="rhubarb in containers"></td></tr><tr data-dcnode-id="491"><td data-dcnode-id="493" style="background-color: #cccccc; font-weight: bold; font-style: italic; padding: 0px;"><span data-dcnode-id="498" instrument_node="">A big, deep container is a good option for growing rhubarb.</span><br data-dcnode-id="497"><span data-dcnode-id="496" instrument_node="">Image: </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/p/rhubarb-fultons-strawberry-surprise-springautumn-planting/cww3564TM"><span data-dcnode-id="495" instrument_node="">Rhubarb 'Fulton's Strawberry Surprise'</span></a></td></tr></tbody></table><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Rhubarb plants have big root systems so they do require a decent amount of space to grow. But if you use a container that holds a minimum of 40 litres of compost, you should be fine. In fact, you’ll most likely produce a decent crop.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">A soil-based compost, such as John Innes No 3. mixed with plenty of well-rotted manure, is best for growing rhubarb in a container.</span></p><span data-dcnode-id="480" instrument_node="">
</span><h2 data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">How do you force rhubarb?</span></h2><span data-dcnode-id="477" instrument_node="">
</span><span data-dcnode-id="476" instrument_node="">
</span><span data-dcnode-id="475" instrument_node="">
</span><span data-dcnode-id="474" instrument_node="">
</span><span data-dcnode-id="471" instrument_node="">
</span><span data-dcnode-id="469" instrument_node="">
</span><span data-dcnode-id="468" instrument_node="">
</span><span data-dcnode-id="461" instrument_node="">
</span><span data-dcnode-id="459" instrument_node="">
</span><span data-dcnode-id="457" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="456" style="margin-bottom: 10px; display: table;" width="100%"><tbody data-dcnode-id="458"><tr data-dcnode-id="470"><td data-dcnode-id="472" style="padding: 0px;"><img alt="how to force rhubarb" data-dcnode-id="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/forcing-rhubarb.jpg&amp;raw" style="width: 100%;" title="how to force rhubarb with forcing pots"></td></tr><tr data-dcnode-id="460"><td data-dcnode-id="462" style="background-color: #cccccc; font-weight: bold; font-style: italic; padding: 0px;"><span data-dcnode-id="467" instrument_node="">Traditional forcing pots work, but so do dustbins and buckets.</span><br data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">Image: </span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/rhubarb-victoria-rheum-x-hybridum-vintage-453224755%3Fsrc%3DtF6HuRmk4Jhk5wE8CUd5Iw-1-8"><span data-dcnode-id="464" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Forcing rhubarb will yield an earlier crop – a useful option if you can’t wait until April for your first harvest. While clay or terracotta pots are traditional (and are specifically designed for this purpose), an upturned dustbin or a large bucket will work equally well.</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">In January, cover the crown with a layer of straw and then place your choice of large container over the crown to exclude the light. Forced rhubarb stems can be harvested around eight weeks after covering, which may be up to a month earlier than unforced crops.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">However, try to avoid forcing the same rhubarb crown for two years in a row; this can weaken the plant. Our top tip? Grow several rhubarb plants at a time and force just one a year in rotation.</span></p><span data-dcnode-id="446" instrument_node="">
</span><h2 data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Any seasonal advice for growing rhubarb?</span></h2><span data-dcnode-id="443" instrument_node="">
</span><span data-dcnode-id="442" instrument_node="">
</span><span data-dcnode-id="441" instrument_node="">
</span><span data-dcnode-id="440" instrument_node="">
</span><span data-dcnode-id="437" instrument_node="">
</span><span data-dcnode-id="435" instrument_node="">
</span><span data-dcnode-id="434" instrument_node="">
</span><span data-dcnode-id="427" instrument_node="">
</span><span data-dcnode-id="425" instrument_node="">
</span><span data-dcnode-id="423" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="422" style="margin-bottom: 10px; display: table;" width="100%"><tbody data-dcnode-id="424"><tr data-dcnode-id="436"><td data-dcnode-id="438" style="padding: 0px;"><img alt="seasonal growing rhubarb" data-dcnode-id="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/winter-rhubarb.jpg&amp;raw" style="width: 100%;" title="growing rhubarb in winter season"></td></tr><tr data-dcnode-id="426"><td data-dcnode-id="428" style="background-color: #cccccc; font-weight: bold; font-style: italic; padding: 0px;"><span data-dcnode-id="433" instrument_node="">Rhubarb needs different things at different times of year.</span><br data-dcnode-id="432"><span data-dcnode-id="431" instrument_node="">Image: </span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/frost-covered-rhubarb-forcing-pots-winter-790835869%3Fsrc%3DNZBzypv-h5qhNoSgXaanBw-2-8"><span data-dcnode-id="430" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Rhubarb plants are very low maintenance, but they will produce better crops if given a little extra care and attention according to the season.</span></p><span data-dcnode-id="418" instrument_node="">
</span><ul data-dcnode-id="392" style="“list-style-type:disc;”"><span data-dcnode-id="417" instrument_node="">
</span><li data-dcnode-id="412"><span data-dcnode-id="416" instrument_node="">• </span><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Spring:</span></strong><span data-dcnode-id="413" instrument_node=""> Remove rhubarb flowers as they appear in order to direct the plants’ energy into growing tasty stems. A feed of general purpose fertiliser will also give them boost during this time.</span></li><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="406"><span data-dcnode-id="410" instrument_node="">• </span><strong data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Summer:</span></strong><span data-dcnode-id="407" instrument_node=""> Keep an eye on your rhubarb plants and water them during dry periods. You don’t want the soil to completely dry out. Rhubarb that’s grown in containers will need to be watered much more often in order to keep the compost moist.</span></li><span data-dcnode-id="405" instrument_node="">
</span><li data-dcnode-id="400"><span data-dcnode-id="404" instrument_node="">• </span><strong data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Autumn:</span></strong><span data-dcnode-id="401" instrument_node=""> When the leaves die back naturally, simply cut back the old rhubarb stalks to leave the buds exposed. Apply a mulch of well-rotted manure around the crown of the plant; this will help to conserve moisture in the soil and keep the weeds down, as well as feeding the plants for the following growing season. But take care not to cover the crown as this may cause it to rot.</span></li><span data-dcnode-id="399" instrument_node="">
</span><li data-dcnode-id="394"><span data-dcnode-id="398" instrument_node="">• </span><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Winter:</span></strong><span data-dcnode-id="395" instrument_node=""> Every five or six years you’ll need to lift and divide the rhubarb crowns in order to maintain their vigour and ensure that the plants remain productive. Use a spade to lift each crown before splitting it into 3 or 4 pieces and replanting them separately. Each piece needs a healthy looking bud – this will become the growth point for next year's new shoots.</span></li><span data-dcnode-id="393" instrument_node="">
</span></ul><span data-dcnode-id="391" instrument_node="">
</span><h2 data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">How do you harvest rhubarb?</span></h2><span data-dcnode-id="388" instrument_node="">
</span><span data-dcnode-id="387" instrument_node="">
</span><span data-dcnode-id="386" instrument_node="">
</span><span data-dcnode-id="383" instrument_node="">
</span><span data-dcnode-id="381" instrument_node="">
</span><span data-dcnode-id="380" instrument_node="">
</span><span data-dcnode-id="373" instrument_node="">
</span><span data-dcnode-id="371" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="369" style="margin-bottom: 10px;display:table;" width="100%"><tbody data-dcnode-id="370"><tr data-dcnode-id="382"><td data-dcnode-id="384" style="padding:0px;"><img alt="harvesting rhubarb" data-dcnode-id="385" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/harvest-rhubard.jpg&amp;raw" style="width:100%;" title="harvesting rhubarb"></td></tr><tr data-dcnode-id="372"><td data-dcnode-id="374" style="background-color:#cccccc;font-weight:bold;font-style:italic;padding:0px;"><span data-dcnode-id="379" instrument_node="">A little patience in the first year helps you harvest more later on.</span><br data-dcnode-id="378"><span data-dcnode-id="377" instrument_node="">Image: </span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/man-harvesting-rhubarb-plants-13846687%3Fsrc%3DNZBzypv-h5qhNoSgXaanBw-1-13"><span data-dcnode-id="376" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">During the first year, you need to resist the temptation to harvest the stems, in order to allow your rhubarb plants to become properly established. But your patience will pay off because, from the second year onwards, your rhubarb can be harvested from April to June, when the leaves have fully unfurled and the stems are 30cm long.</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">To harvest, pull each rhubarb stalk from the base of the stem and twist it away from the crown. It's important to only harvest a few stems at a time (never more than half of the available stems), as over-cropping will reduce the plant’s vigour.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">The rhubarb plant will need time to build up energy reserves for next year’s crop, so make sure to finish harvesting by the end of July. Don't worry if you find that you have more rhubarb than you can use; rhubarb freezes really well. Pickling and preserving is also a great way to extend the shelflife of your rhubarb.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">A word of warning: only the stems of rhubarb are edible. The leaves contain oxalic acid, which is toxic if eaten. Simply trim the leaves away from the stems and add them to your compost heap.</span></p><span data-dcnode-id="356" instrument_node="">
</span><h2 data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Any problems to watch out for?</span></h2><span data-dcnode-id="353" instrument_node="">
</span><span data-dcnode-id="352" instrument_node="">
</span><span data-dcnode-id="351" instrument_node="">
</span><span data-dcnode-id="348" instrument_node="">
</span><span data-dcnode-id="346" instrument_node="">
</span><span data-dcnode-id="345" instrument_node="">
</span><span data-dcnode-id="338" instrument_node="">
</span><span data-dcnode-id="336" instrument_node="">
</span><table cellpadding="0" cellspacing="0" data-dcnode-id="334" style="margin-bottom: 10px;display:table;" width="100%"><tbody data-dcnode-id="335"><tr data-dcnode-id="347"><td data-dcnode-id="349" style="padding:0px;"><img alt="damaged rhubarb" data-dcnode-id="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thompson-morgan.com/static-images/tandm/static-articles/how-to-grow-rhubarb/damaged-rhubard.jpg&amp;raw" style="width:100%;" title="damaged rhubarb"></td></tr><tr data-dcnode-id="337"><td data-dcnode-id="339" style="background-color:#cccccc;font-weight:bold;font-style:italic;padding:0px;"><span data-dcnode-id="344" instrument_node="">Slugs and other critters may find your rhubarb appealing.</span><br data-dcnode-id="343"><span data-dcnode-id="342" instrument_node="">Image: </span><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/organic-rhubarb-growing-vegetable-patch-holed-611604830%3Fsrc%3De8o7OepS_quXcxBhaBxb9Q-1-6"><span data-dcnode-id="341" instrument_node="">Shutterstock</span></a></td></tr></tbody></table><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Crown rot can be a problem when growing rhubarb. It’s caused by fungi or bacteria (either in the soil or water) and, once it spreads, the disease call kill the plant. The best thing to do is act quickly and cut away any affected areas of the plant. Don’t be afraid to cut into healthy plant tissue – it could save the whole plant.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">You may find that slugs, snails and other garden critters feed on your tasty rhubarb. The bane of gardeners all over the world, you’ll probably have your own way of dealing with slugs, from eggshell barriers to biocontrols. Keep an eye on your plants and deal with any pests quickly.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="321"><strong data-dcnode-id="322"><span data-dcnode-id="326" instrument_node="">Which slug-deterrents have worked best for you? Get in touch over on our</span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/thompsonmorgan/" target="_blank"><span data-dcnode-id="325" instrument_node=""> Facebook page</span></a><span data-dcnode-id="323" instrument_node=""> and let us know! In the meantime, happy growing!</span></strong></p><span data-dcnode-id="320" instrument_node="">
