de-id="675" instrument_node="">February</span></th><th class="is-active table__cell" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">March</span></th><th class="is-active table__cell" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">April</span></th><th class="is-active table__cell" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">May</span></th><th class="is-active table__cell" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">June</span></th></tr><tr data-dcnode-id="644"><td class="is-active table__cell" data-dcnode-id="662"><span data-dcnode-id="664" instrument_node="">Plant</span><br data-dcnode-id="663"></td><td class="is-active table__cell" data-dcnode-id="659"><span data-dcnode-id="661" instrument_node="">Plant</span><br data-dcnode-id="660"></td><td class="is-active table__cell" data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">Plant</span><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node="">Harvest</span><br data-dcnode-id="655"></td><td class="is-active table__cell" data-dcnode-id="651"><span data-dcnode-id="653" instrument_node="">Harvest</span><br data-dcnode-id="652"></td><td class="is-active table__cell" data-dcnode-id="648"><span data-dcnode-id="650" instrument_node="">Harvest</span><br data-dcnode-id="649"></td><td class="is-active table__cell" data-dcnode-id="645"><span data-dcnode-id="647" instrument_node="">Harvest</span><br data-dcnode-id="646"></td></tr><tr data-dcnode-id="631"><th class="is-active table__cell" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">July</span></th><th class="table__cell" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">August</span></th><th class="table__cell" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">September</span></th><th class="is-active table__cell" data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">October</span></th><th class="is-active table__cell" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">November</span></th><th class="is-active table__cell" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">December</span></th></tr><tr data-dcnode-id="616"><td class="is-active table__cell" data-dcnode-id="628"><span data-dcnode-id="630" instrument_node="">Harvest</span><br data-dcnode-id="629"></td><td class="table__cell" data-dcnode-id="627"></td><td class="table__cell" data-dcnode-id="626"></td><td class="is-active table__cell" data-dcnode-id="623"><span data-dcnode-id="625" instrument_node="">Plant</span><br data-dcnode-id="624"></td><td class="is-active table__cell" data-dcnode-id="620"><span data-dcnode-id="622" instrument_node="">Plant</span><br data-dcnode-id="621"></td><td class="is-active table__cell" data-dcnode-id="617"><span data-dcnode-id="619" instrument_node="">Plant</span><br data-dcnode-id="618"></td></tr></tbody></table></div></div></div></div><div class="l-module" data-dcnode-id="214"><div class="l-row" data-dcnode-id="215"><div class="l-col-md-7" data-dcnode-id="266"><div class="l-module" data-dcnode-id="578"><h3 data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Jump to</span></h3><ul class="jump-to" data-dcnode-id="579"><li class="jump-to__item" data-dcnode-id="605"><a class="u-cursor-pointer" data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Sow</span></a></li><li class="jump-to__item" data-dcnode-id="601"><a class="u-cursor-pointer" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Grow</span></a></li><li class="jump-to__item" data-dcnode-id="597"><a class="u-cursor-pointer" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Plant</span></a></li><li class="jump-to__item" data-dcnode-id="593"><a class="u-cursor-pointer" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Harvest</span></a></li><li class="jump-to__item" data-dcnode-id="589"><a class="u-cursor-pointer" data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Varieties</span></a></li><li class="jump-to__item" data-dcnode-id="585"><a class="u-cursor-pointer" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Problems</span></a></li><li class="jump-to__item" data-dcnode-id="581"><a class="u-cursor-pointer" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Recipes</span></a></li></ul></div><div class="l-module" data-dcnode-id="283"><div class="content" data-dcnode-id="284"><h2 class="clear-both" data-dcnode-id="575"><a data-dcnode-id="577" id="sow"></a><span data-dcnode-id="576" instrument_node="">Sow</span></h2><lib-inline-widgets data-dcnode-id="563"><ngx-dynamic-hooks data-dcnode-id="564"><span data-dcnode-id="573" instrument_node="">Rhubarb is rarely grown from seed&nbsp;the plants are slower growing than those grown from crowns, and the resulting plants will be more variable than crowns, which are clones of the parent plant.</span><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">
</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">
You can sow seed in March or April either indoors or in the ground. Prepare your sowing site by weeding then raking to a fine texture. Sow seeds 2.5cm (1in) deep, then thin out the seedlings to 15cm (6in) apart, choosing the most vigorous plants. Protect seedlings and young plants from slugs and snails.</span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node="">
If sowing indoors, use small pots or modules filled with seed compost. Water well, and continue watering and potting on as they grow.&nbsp;Transplant the young rhubarb plants into their final position in autumn or the following spring (see planting details above).</span><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node="">
&nbsp;</span></ngx-dynamic-hooks></lib-inline-widgets><h2 class="clear-both" data-dcnode-id="558"><a data-dcnode-id="560" id="grow"></a><span data-dcnode-id="559" instrument_node="">Grow</span></h2><div class="l-full-width-xs-only" data-dcnode-id="554"><figure data-dcnode-id="555"><div class="responsive-image responsive-image--16x9" data-dcnode-id="556"><img alt="Grow" data-dcnode-id="557" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/getmedia/ec6fc8c9-a838-4caa-bf73-766e8ee61672/rhubarb-003.jpg%3Fwidth%3D1440%26height%3D960%26ext%3D.jpg&amp;raw"></div></figure></div><lib-inline-widgets data-dcnode-id="497"><ngx-dynamic-hooks data-dcnode-id="498"><u data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Watering and feeding</span></u><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node="">
</span><br data-dcnode-id="548"><span data-dcnode-id="547" instrument_node="">
Water during prolonged dry periods in summer. Growth will slow down and even stop if conditions are too hot and dry.&nbsp;Plants in containers need regular watering throughout the growing season, as they dry out much more readily.&nbsp;To boost growth, apply a general fertiliser in spring or summer.</span><br data-dcnode-id="546"><span data-dcnode-id="545" instrument_node="">
</span><br data-dcnode-id="544"><span data-dcnode-id="543" instrument_node="">
</span><u data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Mulching</span></u><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">
</span><br data-dcnode-id="538"><span data-dcnode-id="537" instrument_node="">
Every spring, apply a mulch of well-rotted garden compost in a layer about 7cm (2½in) deep around rhubarb plants, but take care not to bury the crown. Mulching helps to retain moisture in the soil.&nbsp;</span><br data-dcnode-id="536"><span data-dcnode-id="535" instrument_node="">
</span><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">
</span><u data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Overwintering</span></u><br data-dcnode-id="530"><span data-dcnode-id="529" instrument_node="">
</span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">
Allow the foliage to die back naturally in autumn, then cut away the old leaves to expose the growing points to winter cold. There is no harm in adding these leaves to the compost heap, as the poisonous oxalic acid contained in them breaks down during decomposition.</span><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
Rhubarb requires seven to nine weeks of cold weather below 3°C (37°F), depending on the cultivar.</span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">
</span><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">
</span><u data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Dividing large plants</span></u><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">
</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">
It’s best to divide established clumps of rhubarb every five years or so, especially if they have become overcrowded or growth is weak. This will also give you vigorous new plants for your own garden or to share with friends. The resulting plants are exact clones of the parent.&nbsp;</span><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node="">
</span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node="">
Lift the dormant crown between autumn and early spring – ideally in November. Use a spade to divide the crown into several smaller sections, each with a portion of the rhizome (thickened root) and at least one growing point or bud. Sections from the outer part are better than the centre of old plants. Discard any old or decayed parts of the crown. Replant straight away or wrap in damp sacking until ready to plant.</span><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">
</span><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">
</span><u data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Remove flower stalks</span></u><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">
</span><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">
Remove the whole flower stalk as soon as it appears, to prevent it weakening the plant. Some cultivars are more prone to flowering than others, and it is more common after a wet summer or if a high nitrogen feed has been overused.</span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">
&nbsp;</span></ngx-dynamic-hooks></lib-inline-widgets><h2 class="clear-both" data-dcnode-id="492"><a data-dcnode-id="494" id="plant"></a><span data-dcnode-id="493" instrument_node="">Plant</span></h2><lib-inline-widgets data-dcnode-id="475"><ngx-dynamic-hooks data-dcnode-id="476"><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Rhubarb needs an open, sunny site with moist, but free-draining soil, as it dislikes being waterlogged in winter. Avoid planting in sites that are particularly prone to late frosts,&nbsp;as the young stems may be damaged.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="487" instrument_node="">Rhubarb can be grown from seed, but it’s more common to plant dormant crowns between autumn and spring. You can also buy plants in pots in active growth – these&nbsp;can be planted at any time of year, but it's best to avoid planting in hot dry weather.&nbsp;</span><br data-dcnode-id="486"><span data-dcnode-id="485" instrument_node="">
</span><br data-dcnode-id="484"><span data-dcnode-id="483" instrument_node="">
Prepare the planting site by digging in two bucketfuls of well-rotted manure per square metre/yard.&nbsp;Then dig a planting hole and position the plant so the tip of the crown is just visible above the soil.&nbsp;If planting more than one, space them 75–90cm (30–36in) apart.</span><br data-dcnode-id="482"><span data-dcnode-id="481" instrument_node="">
</span><br data-dcnode-id="480"><span data-dcnode-id="479" instrument_node="">
Rhubarb can also be planted in very large pots, at least 50cm (20in) deep and wide.</span></p><span data-dcnode-id="477" instrument_node="">
</span></ngx-dynamic-hooks></lib-inline-widgets><div data-dcnode-id="472" id="THX_CONTENT_WIDTH"></div><h2 class="clear-both" data-dcnode-id="469"><a data-dcnode-id="471" id="harvest"></a><span data-dcnode-id="470" instrument_node="">Harvesting</span></h2><div class="l-full-width-xs-only" data-dcnode-id="465"><figure data-dcnode-id="466"><div class="responsive-image responsive-image--16x9" data-dcnode-id="467"><img alt="Harvesting" data-dcnode-id="468" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/getmedia/02f2a5c4-8a67-4b37-88e9-191b1e62d6e2/rhubarb-004.jpg%3Fwidth%3D1440%26height%3D956%26ext%3D.jpg&amp;raw"></div></figure></div><lib-inline-widgets data-dcnode-id="440"><ngx-dynamic-hooks data-dcnode-id="441"><p data-dcnode-id="450"><span data-dcnode-id="463" instrument_node="">With newly planted rhubarb, resist the temptation to&nbsp;harvest any stems in the first year,&nbsp;as this will reduce the plant’s vigour.&nbsp;The following year, pick just&nbsp;a few stems. After that, the plant should be well established and can be harvested normally.&nbsp;</span><br data-dcnode-id="462"><span data-dcnode-id="461" instrument_node="">
</span><br data-dcnode-id="460"><span data-dcnode-id="459" instrument_node="">
On established plants, stalks can be picked from March or April onwards for early cultivars, and late April or May onwards for maincrop varieties.&nbsp;Although the stems remain edible and tasty through summer, it’s best to stop harvesting by June, or at least only take a few stalks after then,&nbsp;so you don’t over-harvest and weaken the plant.</span><br data-dcnode-id="458"><span data-dcnode-id="457" instrument_node="">
</span><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node="">
To harvest, hold the stalk at the base and ease it out of the ground – try to avoid snapping it off.</span><br data-dcnode-id="454"><span data-dcnode-id="453" instrument_node="">
</span><br data-dcnode-id="452"><span data-dcnode-id="451" instrument_node="">
Only ever take about a third of the plant's stems, so there are plenty left to keep it in active growth.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="446"><u data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Forced rhubarb</span></u></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Earlier harvests of sweeter, tender, pale stems can be produced by covering rhubarb plants with a forcing jar or bin in late winter, so the stalks form in the dark. They can be ready to harvest as early as March, several weeks before plants left to grow normally.</span></p><span data-dcnode-id="442" instrument_node="">
</span></ngx-dynamic-hooks></lib-inline-widgets><h2 data-dcnode-id="435"><a data-dcnode-id="437" id="varieties"></a><span data-dcnode-id="436" instrument_node="">Recommended Varieties</span></h2><div class="l-layout" data-dcnode-id="345"><div class="l-module" data-dcnode-id="349"><div class="l-row l-row--space l-row--flex" data-dcnode-id="350"><div class="l-col-xs-6 l-col-sm-6 l-col-md-12 l-col-lg-12 l-flex" data-dcnode-id="421"><div class="l-module l-flex" data-dcnode-id="422"><div class="card-default card-default--landscape-md card-default--landscape-thirds u-faux-block-link" data-dcnode-id="423"><div class="card-default__img" data-dcnode-id="430"><div class="cover-image cover-image--3x2 cover-image--grow" data-dcnode-id="431"><div class="cover-image__img" data-dcnode-id="432" style="background-image: url(&quot;&quot;);"></div></div></div><div class="card-default__body" data-dcnode-id="424"><h4 class="card-default__heading" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">'Giant Grooveless Crimson'&nbsp;</span></h4><div class="card-default__content" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Compact, early cropping, tall, uniform, fully flavoured bright red stems. Perennial plant and less acidic than some other varieties.</span></div></div></div></div></div><div class="l-col-xs-6 l-col-sm-6 l-col-md-12 l-col-lg-12 l-flex" data-dcnode-id="402"><div class="l-module l-flex" data-dcnode-id="403"><div class="card-default card-default--landscape-md card-default--landscape-thirds u-faux-block-link" data-dcnode-id="404"><div class="card-default__img" data-dcnode-id="418"><div class="cover-image cover-image--3x2 cover-image--grow" data-dcnode-id="419"><div class="cover-image__img" data-dcnode-id="420" style="background-image: url(&quot;&quot;);"></div></div></div><div class="card-default__body" data-dcnode-id="405"><h4 class="card-default__heading" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">'Raspberry Red' AGM</span></h4><div class="card-default__content" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Produces sweet bright red stems without the need for forcing. Heavy cropper from April until late June. Needs a deep, fertile, heavily manured, moisture retentative but well drained soil to do well.</span></div><div class="card-default__cta" data-dcnode-id="407"><a class="button button--secondary button--w-100" data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhsplants.co.uk//plants/_/rhubarb-raspberry-red/classid.2000008917/" target="_blank"><span class="button__text" data-dcnode-id="410"><span data-dcnode-id="413" instrument_node="">Buy </span><span data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">£4.99</span></span></span><span class="button__icon button__icon--external" data-dcnode-id="409"></span></a></div></div></div></div></div><div class="l-col-xs-6 l-col-sm-6 l-col-md-12 l-col-lg-12 l-flex" data-dcnode-id="390"><div class="l-module l-flex" data-dcnode-id="391"><div class="card-default card-default--landscape-md card-default--landscape-thirds u-faux-block-link" data-dcnode-id="392"><div class="card-default__img" data-dcnode-id="399"><div class="cover-image cover-image--3x2 cover-image--grow" data-dcnode-id="400"><div class="cover-image__img" data-dcnode-id="401" style="background-image: url(&quot;&quot;);"></div></div></div><div class="card-default__body" data-dcnode-id="393"><h4 class="card-default__heading" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">'Stockbridge'</span></h4><div class="card-default__content" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Modern, late season variety. Most popular commercial and forcing variety. Very vigorous when well grown. Gets its name from the arrow shaped young leaves. Yorkshire bred, producing 3 kg of crop per crown.</span></div></div></div></div></div><div class="l-col-xs-6 l-col-sm-6 l-col-md-12 l-col-lg-12 l-flex" data-dcnode-id="371"><div class="l-module l-flex" data-dcnode-id="372"><div class="card-default card-default--landscape-md card-default--landscape-thirds u-faux-block-link" data-dcnode-id="373"><div class="card-default__img" data-dcnode-id="387"><div class="cover-image cover-image--3x2 cover-image--grow" data-dcnode-id="388"><div class="cover-image__img" data-dcnode-id="389" style="background-image: url(&quot;&quot;);"></div></div></div><div class="card-default__body" data-dcnode-id="374"><h4 class="card-default__heading" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">'Timperley Early' AGM</span></h4><div class="card-default__content" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Thick stems, early, high yield. Bred for forcing; performs very well outside, but even better colour when forced.</span></div><div class="card-default__cta" data-dcnode-id="376"><a class="button button--secondary button--w-100" data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhsplants.co.uk//plants/_/rhubarb-timperley-early/classid.2000027805/" target="_blank"><span class="button__text" data-dcnode-id="379"><span data-dcnode-id="382" instrument_node="">Buy </span><span data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">£3.99</span></span></span><span class="button__icon button__icon--external" data-dcnode-id="378"></span></a></div></div></div></div></div><div class="l-col-xs-6 l-col-sm-6 l-col-md-12 l-col-lg-12 l-flex" data-dcnode-id="352"><div class="l-module l-flex" data-dcnode-id="353"><div class="card-default card-default--landscape-md card-default--landscape-thirds u-faux-block-link" data-dcnode-id="354"><div class="card-default__img" data-dcnode-id="368"><div class="cover-image cover-image--3x2 cover-image--grow" data-dcnode-id="369"><div class="cover-image__img" data-dcnode-id="370" style="background-image: url(&quot;&quot;);"></div></div></div><div class="card-default__body" data-dcnode-id="355"><h4 class="card-default__heading" data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">'Victoria'</span></h4><div class="card-default__content" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Reliable old variety named after Queen Victoria. Needs moist free draining soil in full sun. Heavy, wet soils can rot the crown in Winter.</span></div><div class="card-default__cta" data-dcnode-id="357"><a class="button button--secondary button--w-100" data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhsplants.co.uk//plants/_/rhubarb-victoria/classid.2000002094/" target="_blank"><span class="button__text" data-dcnode-id="360"><span data-dcnode-id="363" instrument_node="">Buy </span><span data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">£4.99</span></span></span><span class="button__icon button__icon--external" data-dcnode-id="359"></span></a></div></div></div></div></div></div></div><div class="l-module" data-dcnode-id="346"></div></div><h2 class="clear-both" data-dcnode-id="339"><a data-dcnode-id="341" id="problems"></a><span data-dcnode-id="340" instrument_node="">Common problems</span></h2><p data-dcnode-id="328"><lib-inline-widgets data-dcnode-id="329"><ngx-dynamic-hooks data-dcnode-id="330"></ngx-dynamic-hooks></lib-inline-widgets></p><p data-dcnode-id="335"><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Crown rot:</span></strong><span data-dcnode-id="336" instrument_node=""> This is a common problem&nbsp;caused by various soil- or water-borne fungi or bacteria. Plants look sickly, fail to grow and rot at the crown. This can spread to the stems and leaves, causing the plant die.</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Remedy: Prompt action may save the plant. Remove affected areas by cutting well back into healthy tissue.</span></p><span data-dcnode-id="331" instrument_node="">
</span><p></p><h5 data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Slugs and snails</span></h5><div class="l-full-width-xs-only" data-dcnode-id="321"><figure data-dcnode-id="322"><img alt="Slugs and snails" class="img-fluid" data-dcnode-id="323" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/getmedia/b7237ab6-2f6e-40d7-b948-256eb6d85d8a/Slug-Damage-%281%29.jpg%3Fwidth%3D320%26height%3D176%26ext%3D.jpg&amp;raw"></figure></div><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">These feed on the young seedlings and you'll see the tell tale slime trail on the soil around your crop, as well as on the leaves.</span></p><h6 data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Remedy</span></h6><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">There are many ways to control slugs and snails, including beer traps, sawdust or eggshell barriers, copper tape and biocontrols.</span></p><p data-dcnode-id="308"></p><h2 class="clear-both" data-dcnode-id="301"><a data-dcnode-id="303" id="recipes"></a><span data-dcnode-id="302" instrument_node="">Recipes</span></h2><lib-inline-widgets data-dcnode-id="291"><ngx-dynamic-hooks data-dcnode-id="292"><p data-dcnode-id="294"><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Nigel Slater's</span></strong><span data-dcnode-id="298" instrument_node=""> </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/advice/grow-your-own/recipes/roast-rhubarb-with-frozen-yoghurt" target="_blank" title="Roast rhubarb with frozen yoghurt recipe"><span data-dcnode-id="297" instrument_node="">roast rhubarb</span></a><span data-dcnode-id="295" instrument_node="">, which is allowed to brown slightly, creates a delicious mixture of sweet and tart. Best served with vanilla ice cream or frozen yoghurt.</span></p><span data-dcnode-id="293" instrument_node="">
