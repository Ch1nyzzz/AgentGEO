</span><div class="main-description" data-dcnode-id="886"><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Thinking of growing rhubarb? You’ll be surprised to know that you just need to plant it once, treat it well and it will continue to produce gorgeous edible stalks for you to use (more apple and rhubarb crumble for your tum!). You’ll need a little bit of patience though, as harvesting takes place from the second year. Rhubarb is typically grown from crowns in winter or early spring, but it can also be grown from seed.</span></p><span data-dcnode-id="887" instrument_node="">

</span><h2 class="tab-name text-green tab-name-style" data-dcnode-id="806" id="article-session-0"><span data-dcnode-id="807" instrument_node="">How to grow rhubarb in a garden</span></h2><span data-dcnode-id="805" instrument_node="">
</span><div class="contents-area mb-40" data-dcnode-id="777"><span data-dcnode-id="804" instrument_node="">
</span><div class="prd-guide rich-content mb-40" data-dcnode-id="779"><span data-dcnode-id="803" instrument_node="">
</span><ol data-dcnode-id="781"><span data-dcnode-id="802" instrument_node="">
</span><li data-dcnode-id="798"><span data-dcnode-id="801" instrument_node="">Choose a sunny&nbsp;or part-shade&nbsp;spot in your garden,&nbsp;protected from the hot afternoon sun. Loosen soil and enrich with&nbsp;</span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yates.com.au/yates-dynamic-lifter-soil-improver-plant-fertiliser/" title="yates-dynamic-lifter-soil-improver-plant-fertiliser"><span data-dcnode-id="800" instrument_node="">Yates&nbsp;Dynamic Lifter&nbsp;Soil Improver &amp; Plant Fertiliser.&nbsp;</span></a></li><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">Sow seeds direct or&nbsp;plant&nbsp;in trays of&nbsp;</span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yates.com.au/yates-6l-seed-raising-mix/" title="yates-6L-seed-raising-mix"><span data-dcnode-id="795" instrument_node="">Yates&nbsp;Seed Raising&nbsp;Mix</span></a><span data-dcnode-id="793" instrument_node="">&nbsp;and allow seeds to grow 7cm tall before transplanting. If growing from crowns, plant so that the roots are under the soil, but the ‘eye’ (from where the shoots will emerge) is at ground level.&nbsp;</span></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">Feed weekly with&nbsp;</span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yates.com.au/yates-thrive-vegie-herb-liquid-plant-food/" title="yates-thrive-vegie-herb-liquid-plant-food"><span data-dcnode-id="789" instrument_node="">Yates Thrive&nbsp;Vegie&nbsp;&amp; Herb Liquid Plant Food&nbsp;</span></a><span data-dcnode-id="787" instrument_node="">during the growing season&nbsp;and mulch around the base of the plant with organic mulch like sugar cane&nbsp;or pea straw to retain moisture.</span></li><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Wait until the second year before harvesting.&nbsp;Harvest by pulling stalks away from the main stem –&nbsp;don’t cut them as exposed stems&nbsp;can cause rot.&nbsp;Continually harvest to promote new growth and remove any flower stalks.&nbsp;</span></li><span data-dcnode-id="782" instrument_node="">
</span></ol><span data-dcnode-id="780" instrument_node="">
</span></div><span data-dcnode-id="778" instrument_node="">

</span><h2 class="tab-name text-green tab-name-style" data-dcnode-id="752" id="article-session-1"><span data-dcnode-id="753" instrument_node="">How to grow rhubarb in a pot</span></h2><span data-dcnode-id="751" instrument_node="">
</span><div class="contents-area mb-40" data-dcnode-id="720"><span data-dcnode-id="750" instrument_node="">
</span><div class="prd-guide rich-content mb-40" data-dcnode-id="722"><span data-dcnode-id="749" instrument_node="">
</span><ol data-dcnode-id="724"><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="747" instrument_node="">Choose a pot&nbsp;at least 500mm wide and deep. Position&nbsp;in&nbsp;a sunny or part-shade spot in your garden, protected from the hot afternoon sun. Fill with quality potting mix, such as&nbsp;</span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yates.com.au/yates-premium-dynamic-lifter-potting-mix/" title="yates-premium-dynamic-lifter-potting-mix"><span data-dcnode-id="746" instrument_node="">Yates&nbsp;Potting Mix with Dynamic Lifter.</span></a></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">Fill starter trays with&nbsp;</span><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yates.com.au/yates-6l-seed-raising-mix/" title="yates-6L-seed-raising-mix"><span data-dcnode-id="741" instrument_node="">Yates Seed Raising Mix.</span></a><span data-dcnode-id="739" instrument_node="">&nbsp;Sow seeds, lightly cover and water. Keep the soil moist throughout germination. If growing from crowns, plant&nbsp;so&nbsp;the roots are under the potting mix, but the ‘eye’ (from where the shoots emerge) is at ground level.&nbsp;</span></li><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Once seedlings reach 7cm tall, transplant into chosen pot and water in well.&nbsp;</span></li><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">Feed&nbsp;plants&nbsp;weekly with&nbsp;</span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yates.com.au/yates-thrive-vegie-herb-liquid-plant-food/" title="yates-thrive-vegie-herb-liquid-plant-food"><span data-dcnode-id="732" instrument_node="">Yates Thrive&nbsp;Vegie&nbsp;&amp; Herb Liquid Plant Food</span></a><span data-dcnode-id="730" instrument_node="">&nbsp;during the growing season.</span></li><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Wait until the second year before harvesting. Harvest by pulling stalks away from the main stem – don’t cut them as exposed stems can cause rot. Continually harvest to promote new growth and remove any flower stalks.</span></li><span data-dcnode-id="725" instrument_node="">
</span></ol><span data-dcnode-id="723" instrument_node="">
</span></div><span data-dcnode-id="721" instrument_node="">
</span></div><span data-dcnode-id="719" instrument_node="">

</span><p class="text-bold mb-16" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Yates varieties</span></p><span data-dcnode-id="715" instrument_node="">
</span><div class="prd-guide rich-content mb-40" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">
</span></div><span data-dcnode-id="712" instrument_node="">
</span></div><span data-dcnode-id="710" instrument_node="">
</span><div class="contents-area card-list product-grid mt-0 mb-40" data-dcnode-id="706"><span data-dcnode-id="709" instrument_node="">

</span><h2 class="tab-name text-green tab-name-style" data-dcnode-id="700" id="article-session-2"><span data-dcnode-id="701" instrument_node="">Growing tips</span></h2><span data-dcnode-id="699" instrument_node="">
</span><div class="contents-area mb-40" data-dcnode-id="652"><span data-dcnode-id="698" instrument_node="">
</span><div class="prd-guide rich-content mb-40" data-dcnode-id="654"><span data-dcnode-id="697" instrument_node="">
</span><ul data-dcnode-id="656"><span data-dcnode-id="696" instrument_node="">
</span><li data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Don’t begin harvesting until the plant is well established,&nbsp;which may mean waiting until the second year. Harvest by pulling stalks away from the base with a sharp tug. Never cut them.&nbsp;</span></p><span data-dcnode-id="692" instrument_node="">
</span></li><span data-dcnode-id="690" instrument_node="">
</span><li data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Leave the youngest stalks in the centre of each plant to promote new growth.&nbsp;</span></p><span data-dcnode-id="686" instrument_node="">
</span></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Rhubarb leaves&nbsp;and roots&nbsp;are poisonous and should be discarded&nbsp;or composted.</span></p><span data-dcnode-id="680" instrument_node="">
</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">After about four or five years, break up the established clump and spread to new, well-prepared parts of the garden.&nbsp;The best time to divide is in winter.&nbsp;&nbsp;</span></p><span data-dcnode-id="674" instrument_node="">
</span></li><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Stalks&nbsp;don’t always&nbsp;develop red stems, but green stems are safe to eat and the flavour is just as good. Stems tend to develop stronger&nbsp;red&nbsp;colouring in cooler climates.&nbsp;</span></p><span data-dcnode-id="668" instrument_node="">
</span></li><span data-dcnode-id="666" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">In winter, loosen soil around the plants and fork in&nbsp;</span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yates.com.au/yates-dynamic-lifter-soil-improver-plant-fertiliser/" title="yates-dynamic-lifter-soil-improver-plant-fertiliser"><span data-dcnode-id="663" instrument_node="">Yates Dynamic Lifter&nbsp;Soil Improver &amp; Plant Fertiliser.</span></a><span data-dcnode-id="661" instrument_node="">&nbsp;This will give them a good start for spring growth.&nbsp;</span></p><span data-dcnode-id="659" instrument_node="">
</span></li><span data-dcnode-id="657" instrument_node="">
</span></ul><span data-dcnode-id="655" instrument_node="">
