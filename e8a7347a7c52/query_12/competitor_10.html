</span><h1 class="title single-title entry-title" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Using Rhubarb for Constipation</span></h1><span data-dcnode-id="953" instrument_node="">
</span><div class="post-info" data-dcnode-id="934"><span data-dcnode-id="952" instrument_node="">
</span><span class="theauthor" data-dcnode-id="948"><i class="fa fa-user" data-dcnode-id="951"></i><span data-dcnode-id="950" instrument_node=""> </span><span data-dcnode-id="949"></span></span><span data-dcnode-id="947" instrument_node="">

</span><div class="single-prev-next" data-dcnode-id="919"><span data-dcnode-id="928" instrument_node="">
</span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyeatvegetables.com/acne-program-step-8-vegetables-to-eat-and-drink/" rel="prev"><i class="fa fa-long-arrow-left" data-dcnode-id="927"></i><span data-dcnode-id="926" instrument_node=""> Prev Article</span></a><span data-dcnode-id="924" instrument_node=""> </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyeatvegetables.com/acne-program-step-8-vegetables-to-eat-and-drink-2/" rel="next"><span data-dcnode-id="923" instrument_node="">Next Article </span><i class="fa fa-long-arrow-right" data-dcnode-id="922"></i></a><span data-dcnode-id="920" instrument_node=""> </span></div><span data-dcnode-id="918" instrument_node="">
</span><div class="thecontent clearfix" data-dcnode-id="871"><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">﻿Using Rhubarb for Constipation</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Vegetables like fruits and their juices have healing properties because of the fiber, antioxidants, vitamins, and minerals they have. For constipation, vegetables are an excellent source of minerals and fiber. In addition there are specific vegetables and their juices that stimulate the colon become more active.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">The benefits of Vegetables</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Juices are absorbed quickly into your bloodstream. As a result, your cells are provided quickly with nutrients that feed them and that wash away waste. Juices give you the opportunity to get quick relief from various body conditions such as constipation. Juices move into your colon quickly to cleanse it and to activate peristaltic action.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Eating and drinking vegetables and their juices provide you with minerals and nutrients that build your blood, tissue, bones, and cells. It is minerals that build every part of your body. It is minerals that keep your body’s pH at the required level. It is minerals that keep your body alkaline by neutralizing body acids.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">It is minerals that build your colon wall tissues and cells so your colon can perform those activities that prevent constipation.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Keep in mind that some natural recipes for clearing constipation require drinking vegetable juices that are bitter or have a strong taste. As you will find, some of the vegetable juices taste good and some don’t. Remember you are dealing with a condition that needs clearing and that what you drink for this is not for pleasure.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">As you drink some of these vegetable juices, you may find that you like certain ones and these can become your regular daily or weekly drink.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">James A. Duke, PhD, in his book, The Green Pharmacy, gives the following constipation remedy using rhubarb,</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">“Rhubarb has strong laxative action so it is best to use it with other juices. Here’s how you can use this herb. Blend together three stalks of rhubarb, without leaves, 1 cup of fresh apple juice, and one quart of peeled lemons and one tablespoon of honey or maple syrup. This tart drink will help you with your constipation. Drink one glass three times a day.”</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">A smaller quantity of this rhubarb drink would be,</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Blend three stalks of rhubarb, ¼ – ½ peeled lemon, a teaspoon of maple syrup, and ¾ cup of fresh organic apple juice. You may add more syrup if the taste if to harsh for you. Don’t use rhubarb leaves since they contain toxic chemicals.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Use rhubarb only raw since it is high in oxalic acid. Use it sparingly and do not cook it. Cooking converts the organic oxalic acid into inorganic oxalic acid. The body does not easily absorb inorganic oxalic and it forms crystal deposits in the kidney and throughout the body.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">If you have arthritis or gout, do not use rhubarb.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">In other articles, I will be discussing the use of other vegetables that provide good constipation relief.</span></p><span data-dcnode-id="872" instrument_node="">
