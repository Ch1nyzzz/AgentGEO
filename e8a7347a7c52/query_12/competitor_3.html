</span><h1 class="ttl1" data-dcnode-id="5157" id="view-recipe-title"><span data-dcnode-id="5158" instrument_node="">
				Stewed rhubarb
			</span></h1><span data-dcnode-id="5156" instrument_node="">
</span><div data-dcnode-id="5151" id="Overview"><span data-dcnode-id="5155" instrument_node="">
</span><p data-dcnode-id="5153"><span data-dcnode-id="5154" instrument_node="">Stewed rhubarb is delicious with cereal and yoghurt for breakfast, or as a dessert made into a crumble.</span></p><span data-dcnode-id="5152" instrument_node="">
</span></div><span data-dcnode-id="5150" instrument_node="">
</span><img alt="Stewed rhubarb" class="recipe-img img-responsive" data-dcnode-id="5149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegetables.co.nz/assets/recipes/_resampled/FillWyI0MDAiLCIzMDAiXQ/stewed-rhubarb.jpg&amp;raw"><span data-dcnode-id="5148" instrument_node="">
</span><div data-dcnode-id="5133" id="ingredients"><span data-dcnode-id="5147" instrument_node="">
</span><h3 data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">Ingredients</span></h3><span data-dcnode-id="5144" instrument_node="">
</span><p data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">Serves 4</span></p><span data-dcnode-id="5141" instrument_node="">
</span><p data-dcnode-id="5135"><span data-dcnode-id="5140" instrument_node="">8-10 stalks rhubarb</span><br data-dcnode-id="5139"><span data-dcnode-id="5138" instrument_node=""> 1¼ cups water</span><br data-dcnode-id="5137"><span data-dcnode-id="5136" instrument_node=""> ¼ cup sugar</span></p><span data-dcnode-id="5134" instrument_node="">
</span></div><span data-dcnode-id="5132" instrument_node="">

</span><p data-dcnode-id="5118"><span data-dcnode-id="5127" instrument_node="">Slice rhubarb stalks into 3 cm lengths.</span><br data-dcnode-id="5126"><span data-dcnode-id="5125" instrument_node=""> Place rhubarb, water and sugar in a saucepan.</span><br data-dcnode-id="5124"><span data-dcnode-id="5123" instrument_node=""> Cover and simmer for 8-10 minutes or until softened.</span><br data-dcnode-id="5122"><span data-dcnode-id="5121" instrument_node="">Serve.</span><br data-dcnode-id="5120"><br data-dcnode-id="5119"></p><span data-dcnode-id="5117" instrument_node="">
