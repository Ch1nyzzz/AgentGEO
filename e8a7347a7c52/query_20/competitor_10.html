</span><p data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">Below is a summary list for the top twenty vegetable soup items ranked by the amount or level of carbs in 100g. </span></p><p data-dcnode-id="3140"><span data-dcnode-id="3179" instrument_node="">1. Soup, tomato vegetable, dry, mix : 59.9g (46%RDA)</span><br data-dcnode-id="3178"><span data-dcnode-id="3177" instrument_node=""> 2. Soup, cream of vegetable, dry, powder : 52.1g (40%RDA)</span><br data-dcnode-id="3176"><span data-dcnode-id="3175" instrument_node=""> 3. Soup, vegetable, canned, low sodium, condensed : 12.11g (9%RDA)</span><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node=""> 4. Soup, vegetable with beef broth, canned, condensed : 10.7g (8%RDA)</span><br data-dcnode-id="3172"><span data-dcnode-id="3171" instrument_node=""> 5. Soup, HEALTHY CHOICE Garden Vegetable Soup, canned : 10.04g (8%RDA)</span><br data-dcnode-id="3170"><span data-dcnode-id="3169" instrument_node=""> 6. Soup, vegetarian vegetable, canned, condensed : 9.78g (8%RDA)</span><br data-dcnode-id="3168"><span data-dcnode-id="3167" instrument_node=""> 7. Soup, vegetable chicken, canned, prepared with water, low sodium : 8.76g (7%RDA)</span><br data-dcnode-id="3166"><span data-dcnode-id="3165" instrument_node=""> 8. Soup, beef with vegetables and barley, canned, condensed, single brand : 8.2g (6%RDA)</span><br data-dcnode-id="3164"><span data-dcnode-id="3163" instrument_node=""> 9. Soup, vegetable beef, canned, condensed : 8.11g (6%RDA)</span><br data-dcnode-id="3162"><span data-dcnode-id="3161" instrument_node=""> 10. Soup, chunky vegetable, canned, ready-to-serve : 7.92g (6%RDA)</span><br data-dcnode-id="3160"><span data-dcnode-id="3159" instrument_node=""> 11. Soup, chicken vegetable, chunky, canned, ready-to-serve : 7.87g (6%RDA)</span><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node=""> 12. Soup, vegetable beef, canned, condensed, single brand : 7.7g (6%RDA)</span><br data-dcnode-id="3156"><span data-dcnode-id="3155" instrument_node=""> 13. Soup, turkey vegetable, canned, condensed : 7.05g (5%RDA)</span><br data-dcnode-id="3154"><span data-dcnode-id="3153" instrument_node=""> 14. Soup, chicken vegetable, canned, condensed : 7.01g (5%RDA)</span><br data-dcnode-id="3152"><span data-dcnode-id="3151" instrument_node=""> 15. Soup, sirloin burger with vegetables, ready-to-serve, single brand : 6.8g (5%RDA)</span><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node=""> 16. Soup, chicken vegetable, chunky, reduced fat, reduced sodium, ready-to-serve, single brand : 6.3g (5%RDA)</span><br data-dcnode-id="3148"><span data-dcnode-id="3147" instrument_node=""> 17. Soup, vegetable soup, condensed, low sodium, prepared with equal volume water : 6.06g (5%RDA)</span><br data-dcnode-id="3146"><span data-dcnode-id="3145" instrument_node=""> 18. Soup, beef and vegetables, canned, ready-to-serve : 6.05g (5%RDA)</span><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node=""> 19. Soup, vegetable with beef broth, canned, prepared with equal volume water : 5.35g (4%RDA)</span><br data-dcnode-id="3142"><span data-dcnode-id="3141" instrument_node=""> 20. Soup, chicken vegetable with potato and cheese, chunky, ready-to-serve : 5.2g (4%RDA)</span></p><p data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">Following on from the twenty top vegetable soup items or products containing carbs we have a more comprehensive break down of Soup, tomato vegetable, dry, mix, and the highest item containing carbs which is Soup, tomato vegetable, dry, mix. We also give a comparison of average values, median values and lowest values along with a comparison with other food groups and assess the effects of storage and preparation on the 28 types of vegetable soup.</span></p><p data-dcnode-id="3133"><span data-dcnode-id="3137" instrument_node="">At the bottom of the page is the full list for the 28 different types of vegetable soup based on the content in different servings in grams and oz (and other serving sizes), providing a comprehensive analysis of the </span><i data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">carbs content in vegetable soup</span></i><span data-dcnode-id="3134" instrument_node="">.</span></p><p data-dcnode-id="3132"></p><p data-dcnode-id="3131"></p><p data-dcnode-id="3130"></p><h2 data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">Soup, tomato vegetable, dry, mix - Nutritional Content and Chart</span></h2><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">The full nutrition content, RDA percentages and levels for Soup, tomato vegetable, dry, mix should be considered along with the carbs content. This food profile is part of our list of food and drinks under the general group Soups, Sauces, and Gravies.Other important and carbs related nutrients are Sugar, Calories, Protein and Fat.  For this 100g serving in your diet, the amount of Sugar is 3.77 g (4% RDA), the amount of Calories is 325 kcal (16% RDA), the amount of Protein is 11.73 g (21% RDA) and the amount of Fat is 5.09 g (8% RDA).  The nutritional content and facts for 100g, which includes Sugar, Calories, Protein and Fat 	is shown in the RDA chart below as percentages of the recommended daily allowance along with the carbs levels in vegetable soup.</span></p><p data-dcnode-id="3119"><img align="center" alt="carbs and nutrition facts in vegetable soup per 100g" border="0" data-dcnode-id="3120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/nutrition-images/vegetable%2520soup-carbs-nutrition-100g.png&amp;raw"></p><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Our proprietary nutritional density score gives a nutritional value out of 100 based on 9 different vitamins, minerals and macro nutrients. Soup, tomato vegetable, dry, mix has a nutritional value score of 16 out of 100.Comparing the carbs content and the nutritional density in 100g for Soup, tomato vegetable, dry, mix; We class this as a high carbs content item.In terms of overall nutritional value we class this as an item with a medium nutritional density value.</span></p><p data-dcnode-id="3111"><span data-dcnode-id="3114" instrument_node="">
</span></p><h2 data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">Comparing carbs in vegetable soup vs pasta</span></h2><span data-dcnode-id="3108" instrument_node="">The amount of carbs in pasta is 25 g per 100g.As carbs percentage of the RDA this is 19 %.  Comparing with </span><b data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">Soup, tomato vegetable, dry, mix</span></b><span data-dcnode-id="3105" instrument_node="">, in 100g contains 59.9 g of carbs.  As a percentage of the RDA this is 46 %.  Therefore, Soup, tomato vegetable, dry, mix has 34.9 g more carbs than pasta. In terms of carbs percentage this is 140 % more carbs. Pasta has an overall nutritional value score of 14 out of 100, whereas  Soup, tomato vegetable, dry, mix has a nutritional value score of 16 out of 100.Soup, tomato vegetable, dry, mix also has the highest amount of carbs for the  28 different vegetable soup items.</span><h2 data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">Amount of carbs per 100 Calories</span></h2><span data-dcnode-id="3102" instrument_node="">100 calories of soup, tomato vegetable, dry, mix is a serving size of 0.31 g,  and the amount of Carbohydrate is 18.43 g (14.15% RDA). Other important and related nutrients and macronutrients such as Protein, in 100 Calories are as follows; Sugar 1.16 g  (1.23% RDA), Protein 3.61 g  (6.46% RDA), Fat 1.57 g  (2.46% RDA).  This is shown in the carbs RDA percentage chart below, based on 100 Calories, along with the other important nutrients and macro nutrients. </span><img align="center" alt="carbs and nutrition facts in vegetable soup per 100 calories" border="0" data-dcnode-id="3101" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/nutrition-images/vegetable-soup-carbs-per-100-calories.png&amp;raw"><h2 data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Content per Typical Serving Size 1 tbsp (or 1.2 g)</span></h2><span data-dcnode-id="3098" instrument_node="">For the food Soup, tomato vegetable, dry, mix the typical serving size is 1 tbsp (or 1.2 g) which contains 0.72 g of Carbohydrate. The carbs percentage of the recommended daily value for this serving is 1 %.</span><p data-dcnode-id="3092"><span data-dcnode-id="3097" instrument_node="">To give 100% of the RDA, 100.0 servings of the typical serving size 1 tbsp (or 1.2 g) give the complete RDA. In terms of the gram weight and total content for this serving the Sugar content is 0.05 g, the Calories content is 3.9 kcal, the Protein content is 0.14 g and the Fat content is 0.06 g. The percentages are shown below in the </span><i data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">carbs chart</span></i><span data-dcnode-id="3094" instrument_node="">, for the typical serving of carbs and the related and important nutritional values.</span><img align="center" alt="carbs and nutritional content in vegetable soup" border="0" data-dcnode-id="3093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/nutrition-images/vegetable%2520soup-carbs-nutrition.png&amp;raw"></p><h2 data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Macronutrients in Soup, tomato vegetable, dry, mix</span></h2><br data-dcnode-id="3089"><span data-dcnode-id="3088" instrument_node="">The amount of protein, fat and carbs from this food described above is measured in grams per 100g and grams in a typical serving size (in this case 1 tbsp or 1.2 g), although it is also useful to give the number of calories from protein, fat and carbohydrate which are the most important macronutrients. For this serving in your diet here are the macronutrient calories. The total calories from carbohydrate is 2.9 (kcal).From protein the number of calories is 0.5 (kcal).The number of calories from Fat is 0.5 (kcal).</span><img align="center" alt="carbs, calories and nutritional content in vegetable soup" border="0" data-dcnode-id="3087" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/nutrition-images/vegetable%2520soup-carbs-and-calories.png&amp;raw"><h2 data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Grams of carbs in vegetable soup (per 100g)</span></h2><p data-dcnode-id="3071"><span data-dcnode-id="3084" instrument_node="">This list of 28 types of vegetable soup, is brought to you by </span><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/"><span data-dcnode-id="3083" instrument_node="">www.dietandfitnesstoday.com</span></a><span data-dcnode-id="3081" instrument_node=""> and ranges from </span><b data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Soup, tomato vegetable, dry, mix</span></b><span data-dcnode-id="3078" instrument_node=""> through to </span><b data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">Soup, vegetable beef, dry, mix, prepared with water</span></b><span data-dcnode-id="3075" instrument_node=""> where all food items are ranked by the content or amount per 100g. The nutritional carbs content can be scaled by the amount in grams, oz or typical serving sizes. Simply click on a food item or beverage from the list at the bottom of the page to give a full dietary nutritional breakdown to answer the question </span><i data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">how many carbs in vegetable soup</span></i><span data-dcnode-id="3072" instrument_node="">.</span></p><p data-dcnode-id="3070"></p><p data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">The list below gives the total carbs content in the 28 items from the general description 'vegetable soup' each of which show the carbs amount as well as Sugar, Calories, Protein and Fat. Below, is the top 28 food items shown in the carbs chart.  This gives a quick and easy dietary comparison for the different items, where each item is listed at the bottom of the page with a nutritional summary.</span></p><p data-dcnode-id="3066"><img align="center" alt="vegetable soup carbs per 100g" border="0" data-dcnode-id="3067" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/nutrition-images/vegetable%2520soup-carbs.png&amp;raw"></p><p data-dcnode-id="3063"><span data-dcnode-id="3065" instrument_node="">The corresponding nutritional value for vegetable soup based on our density score out of 100 (ranked by the amount of carbs per 100g) is shown in the below nutritional density chart. </span><img align="center" alt="vegetable soup carbs per 100g" border="0" data-dcnode-id="3064" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/nutrition-images/vegetable-soup-carbs-nutritional-value.png&amp;raw"></p><p data-dcnode-id="3062"></p><p data-dcnode-id="3059"><span data-dcnode-id="3061" instrument_node="">The corresponding Calories for vegetable soup ranked by the amount of carbs per 100g is shown below in the vegetable soup calories chart. </span><img align="center" alt="vegetable soup carbs per 100g" border="0" data-dcnode-id="3060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/nutrition-images/vegetable-soup-carbs-calories-100g.png&amp;raw"></p><p data-dcnode-id="3058"></p><h2 data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Effect of Preparation and Storage on carbs</span></h2><span data-dcnode-id="3055" instrument_node="">The level of carbs can be affected by the method of storage for 	example canned or frozen and also by the method of preparation for example either raw, cooked or fried. The number of food items classified as canned is 19 items. The highest amount of carbs from the 19 canned items is in </span><b data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Soup, vegetable, canned, low sodium, condensed</span></b><span data-dcnode-id="3052" instrument_node=""> where the level is 12.11 g per 100g.</span><p data-dcnode-id="3051"></p><p data-dcnode-id="3050"></p><h2 data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Average Content for vegetable soup</span></h2><span data-dcnode-id="3047" instrument_node="">

ta-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">The difference between the highest and lowest values gives a carbs range of 56.73 g per 100g. The range for the other nutrients are as follows;  3.41 g for Sugar,  304 kcal for Calories,  10.57 g for Protein,  0 g for Fat. </span></p><h2 data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">Highest Amount of carbs per Serving</span></h2><p data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">Please remember that the above gives an accurate value in 100g for high carbs foods in your diet. For example 100g of Soup, tomato vegetable, dry, mix contains 59.9 g of carbs. However, there are other factors to consider when you are assessing your nutritional requirements. You should also take into account portion sizes when you are considering the carbs nutritional content. </span></p><p data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">The food with the highest carbs content per typical serving is Soup, sirloin burger with vegetables, ready-to-serve, single brand which contains 36.65 g in 1 package yields (or 539 g). The percentage of the recommended daily value for this serving is 28 %. For this serving the Sugar content is 5.24 g, the Calories content is 415.03 kcal, the Protein content is 22.64 g and the Fat content is 19.94 g. </span></p><h2 data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Nutritional Information Summary</span></h2><span data-dcnode-id="3017" instrument_node="">From the list below you can find a full nutrition facts breakdown for all foods containing carbs which can be scaled for different servings and quantities. We have also sorted our complete nutritional information and vitamin database of over 7000 foods, to give a list of  </span><a data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/foods-high-in-vitamin.php%3Fnutid%3D205" title="foods high
