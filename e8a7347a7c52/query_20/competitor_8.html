</span><span data-dcnode-id="10099" instrument_node="">
</span></p><p data-dcnode-id="10090"><span data-dcnode-id="10097" instrument_node="">Welcome to the list of the top 100 fruits lowest in </span><a data-dcnode-id="10095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/vitamin-c.php" title="vitamin c foods"><span data-dcnode-id="10096" instrument_node="">vitamin c</span></a><span data-dcnode-id="10094" instrument_node=""> content. Where the amount of vitamin c ranges from  0 mg to 47.8 mg per 100g. The fruits with the lowest vitamin c and highest nutritional value (using our nutritional density score) is </span><b data-dcnode-id="10092"><span data-dcnode-id="10093" instrument_node="">Dates, medjool</span></b><span data-dcnode-id="10091" instrument_node=""> which in 100g contains 0 mg of vitamin c.</span></p><div data-dcnode-id="10082" style="display:block;text-align: center;margin: 5px 10px 5px 5px;"><span data-dcnode-id="10089" instrument_node="">
</span><span data-dcnode-id="10086" instrument_node="">
</span><span data-dcnode-id="10083" instrument_node="">
</span></div><span data-dcnode-id="10081" instrument_node="">
</span><p data-dcnode-id="10079"><span data-dcnode-id="10080" instrument_node=""> Our proprietary nutritional density score gives a nutritional value out of 100 based on 9 different vitamins, minerals and macro nutrients. Dates, medjool has a nutritional value score of 14 out of 100.</span></p><p data-dcnode-id="10068"><br data-dcnode-id="10078"><br data-dcnode-id="10077"><span data-dcnode-id="10074" instrument_node="">
</span><br data-dcnode-id="10071"><br data-dcnode-id="10070"><span data-dcnode-id="10069" instrument_node="">Other important and vitamin c related nutrients are Calories, Protein, Fat and Carbohydrate.  For this 100g serving for Dates, medjool, which is the top of the fruits low in vitamin c list for vitamin c content in your diet, the amount of Calories is 277 kcal (14% RDA), the amount of Protein is 1.81 g (3% RDA), the amount of Fat is 0.15 g and the amount of Carbohydrate is 74.97 g (58% RDA).  The nutritional content and facts for 100g, which includes Calories, Protein, Fat and Carbohydrate 	is shown in the bar chart below as percentages of the recommended daily allowance along with the vitamin c content in Dates, medjool from the list of fruits low in vitamin c.</span></p><p data-dcnode-id="10066"><iframe data-dcnode-id="10067" frameborder="0" height="250" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/graphframesmall.php%3Fdatay%3D0.0%2C14%2C3%2C0%2C58%26dataLabels%3Dvitamin-c%2CCalories%2CProtein%2CFat%2CCarbohydrate%26title%3DDates%2C%2520medjool...%2520lowest%2520vitamin%2520c%2520per%2520100g%26xaxis%3D%26yaxis%3DPercentage%2520of%2520RDA%2520%28%2525%29%26file%3Dnutrition-images/fruits-lowest-in-vitamin%2520c-content.png&amp;raw" width="500"></iframe></p><h2 data-dcnode-id="10064"><span data-dcnode-id="10065" instrument_node="">Top Ten - Lowest vitamin c Content per 100g</span></h2><span data-dcnode-id="10063" instrument_node="">Below is a simplified list for vitamin c in fruits low in vitamin c for the top 10 fruits low in vitamin c. A more comprehensive list for the top 100 can be found at the bottom of the page along with different servings.</span><p data-dcnode-id="10043"><span data-dcnode-id="10062" instrument_node="">1. Dates, medjool 0mg (0%RDA)</span><br data-dcnode-id="10061"><span data-dcnode-id="10060" instrument_node=""> 2. Candied fruit 0mg (0%RDA)</span><br data-dcnode-id="10059"><span data-dcnode-id="10058" instrument_node=""> 3. Pomegranate juice, bottled 0.1mg (0%RDA)</span><br data-dcnode-id="10057"><span data-dcnode-id="10056" instrument_node=""> 4. Apples, raw, without skin, cooked, boiled 0.2mg (0%RDA)</span><br data-dcnode-id="10055"><span data-dcnode-id="10054" instrument_node=""> 5. Apples, raw, without skin, cooked, microwave 0.3mg (1%RDA)</span><br data-dcnode-id="10053"><span data-dcnode-id="10052" instrument_node=""> 6. Dates, deglet noor 0.4mg (1%RDA)</span><br data-dcnode-id="10051"><span data-dcnode-id="10050" instrument_node=""> 7. Loquats, raw 1mg (2%RDA)</span><br data-dcnode-id="10049"><span data-dcnode-id="10048" instrument_node=""> 8. Figs, raw 2mg (3%RDA)</span><br data-dcnode-id="10047"><span data-dcnode-id="10046" instrument_node=""> 9. Raisins, seedless 2.3mg (4%RDA)</span><br data-dcnode-id="10045"><span data-dcnode-id="10044" instrument_node=""> 10. Grapes, red or green (European type, such as Thompson seedless), raw 3.2mg (5%RDA)
</span></p><h2 data-dcnode-id="10041"><span data-dcnode-id="10042" instrument_node="">Comparing vitamin c in fruits low in vitamin c vs an orange</span></h2><span data-dcnode-id="10040" instrument_node="">The amount of vitamin c in an orange is 53.2  per 100g.As vitamin c percentage of the RDA this is 89 %.  Comparing with </span><b data-dcnode-id="10038"><span data-dcnode-id="10039" instrument_node="">Dates, medjool</span></b><span data-dcnode-id="10037" instrument_node="">, in 100g contains 0 mg of vitamin c.  Therefore, an orange has 53.2 mg more vitamin c than Dates, medjool.  An orange has an overall nutritional value score of 27 out of 100, whereas  Dates, medjool has a nutritional value score of 14 out of 100.</span><h2 data-dcnode-id="10035"><span data-dcnode-id="10036" instrument_node="">Highest Amount of vitamin c per Serving</span></h2><p data-dcnode-id="10033"><span data-dcnode-id="10034" instrument_node="">Please remember that the above gives an accurate value in 100g for high vitamin c foods in your diet. You should also take into account portion sizes when you are considering the vitamin c nutritional content. </span></p><p data-dcnode-id="10028"><span data-dcnode-id="10032" instrument_node="">The food with the highest vitamin c content per typical serving is </span><b data-dcnode-id="10030"><span data-dcnode-id="10031" instrument_node="">Mammy-apple, (mamey), raw</span></b><span data-dcnode-id="10029" instrument_node=""> which contains 118.44 mg in 1 fruit without refuse (or 846 g). The percentage of the recommended daily value for this serving is 197 %. For this serving the Calories content is 431.46 kcal (22% RDA), the Protein content is 4.23 g (8% RDA), the Fat content is 4.23 g (7% RDA) and the Carbohydrate content is 105.75 g (81% RDA). </span></p><h2 data-dcnode-id="10026"><span data-dcnode-id="10027" instrument_node="">Milligrams of vitamin c in fruits low in vitamin c (per 100g)</span></h2><p data-dcnode-id="10024"><span data-dcnode-id="10025
