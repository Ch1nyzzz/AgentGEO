</span></p><p data-dcnode-id="9550"><span data-dcnode-id="9557" instrument_node="">Welcome to the list of the top 100 vegetables lowest in </span><a data-dcnode-id="9555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/vitamin-c.php" title="vitamin c foods"><span data-dcnode-id="9556" instrument_node="">vitamin c</span></a><span data-dcnode-id="9554" instrument_node=""> content. Where the amount of vitamin c ranges from  0 mg to 4.2 mg per 100g. The vegetables with the lowest vitamin c and highest nutritional value (using our nutritional density score) is </span><b data-dcnode-id="9552"><span data-dcnode-id="9553" instrument_node="">Seaweed, agar, raw</span></b><span data-dcnode-id="9551" instrument_node=""> which in 100g contains 0 mg of vitamin c.</span></p><div data-dcnode-id="9542" style="display:block;text-align: center;margin: 5px 10px 5px 5px;"><span data-dcnode-id="9549" instrument_node="">
</span><span data-dcnode-id="9546" instrument_node="">

</span></div><span data-dcnode-id="9541" instrument_node="">
</span><p data-dcnode-id="9539"><span data-dcnode-id="9540" instrument_node=""> Our proprietary nutritional density score gives a nutritional value out of 100 based on 9 different vitamins, minerals and macro nutrients. Seaweed, agar, raw has a nutritional value score of 20 out of 100.</span></p><p data-dcnode-id="9528"><br data-dcnode-id="9538"><br data-dcnode-id="9537"><span data-dcnode-id="9534" instrument_node="">
</span><br data-dcnode-id="9531"><br data-dcnode-id="9530"><span data-dcnode-id="9529" instrument_node="">Other important and vitamin c related nutrients are Calories, Protein, Fat and Carbohydrate.  For this 100g serving for Seaweed, agar, raw, which is the top of the vegetables low in vitamin c list for vitamin c content in your diet, the amount of Calories is 26 kcal (1% RDA), the amount of Protein is 0.54 g (1% RDA), the amount of Fat is 0.03 g and the amount of Carbohydrate is 6.75 g (5% RDA).  The nutritional content and facts for 100g, which includes Calories, Protein, Fat and Carbohydrate 	is shown in the bar chart below as percentages of the recommended daily allowance along with the vitamin c content in Seaweed, agar, raw from the list of vegetables low in vitamin c.</span></p><p data-dcnode-id="9526"><iframe data-dcnode-id="9527" frameborder="0" height="250" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dietandfitnesstoday.com/graphframesmall.php%3Fdatay%3D0.0%2C1%2C1%2C0%2C5%26dataLabels%3Dvitamin-c%2CCalories%2CProtein%2CFat%2CCarbohydrate%26title%3DSeaweed%2C%2520agar%2C%2520raw...%2520lowest%2520vitamin%2520c%2520per%2520100g%26xaxis%3D%26yaxis%3DPercentage%2520of%2520RDA%2520%28%2525%29%26file%3Dnutrition-images/vegetables-lowest-in-vitamin%2520c-content.png&amp;raw" width="500"></iframe></p><h2 data-dcnode-id="9524"><span data-dcnode-id="9525" instrument_node="">Top Ten - Lowest vitamin c Content per 100g</span></h2><span data-dcnode-id="9523" instrument_node="">Below is a simplified list for vitamin c in vegetables low in vitamin c for the top 10 vegetables low in vitamin c. A more comprehensive list for the top 100 can be found at the bottom of the page along with different servings.</span><p data-dcnode-id="9503"><span data-dcnode-id="9522" instrument_node="">1. Seaweed, agar, raw 0mg (0%RDA)</span><br data-dcnode-id="9521"><span data-dcnode-id="9520" instrument_node=""> 2. Cabbage, mustard, salted 0 </span></p><h2 data-dcnode-id="9501"><span data-dcnode-id="9502" instrument_node="">Comparing vitamin c in vegetables low in vitamin c vs an orange</span></h2><span data-dcnode-id="9500" instrument_node="">The amount of vitamin c in an orange is 53.2  per 100g.As vitamin c percentage of the RDA this is 89 %.  Comparing with </span><b data-dcnode-id="9498"><span data-dcnode-id="9499" instrument_node="">Seaweed, agar, raw</span></b><span data-dcnode-id="9497" instrument_node="">, in 100g contains 0 mg of vitamin c.  Therefore, an orange has 53.2 mg more vitamin c than Seaweed, agar, raw.  An orange has an overall nutritional value score of 27 out of 100, whereas  Seaweed, agar, raw has a nutritional value score of 20 out of 100.</span><h2 data-dcnode-id="9495"><span data-dcnode-id="9496" instrument_node="">Highest Amount of vitamin c per Serving</span></h2><p data-dcnode-id="9493"><span data-dcnode-id="9494" instrument_node="">Please remember that the above gives an accurate value in 100g for high vitamin c foods in your diet. You should also take into account portion sizes when you are considering the vitamin c nutritional content. </span></p><p data-dcnode-id="9488"><span data-dcnode-id="9492" instrument_node="">The food with the highest vitamin c content per typical serving is </span><b data-dcnode-id="9490"><span data-dcnode-id="9491" instrument_node="">Catsup</span></b><span data-dcnode-id="9489" instrument_node=""> which contains 9.84 mg in 1 cup (or 240 g). The percentage of the recommended daily value for this serving is 16 %. For this serving the Calories content is 268.8 kcal (13% RDA), the Protein content is 3 g (5% RDA), the Fat content is 0.43 g (1% RDA) and the Carbohydrate content is 62.95 g (48% RDA). </span></p><h2 data-dcnode-id="9486"><span data-dcnode-id="9487" instrument_node="">Milligrams of vitamin c in vegetables low in vitamin c (per 100g)</span></h2><p data-dcnode-id="9484"><span data-dcnode-id="9485" instrument_node="">The list below gives t
