</span></th></tr><tr data-dcnode-id="4284"><td colspan="2" data-dcnode-id="4285" style="text-align: center"><b data-dcnode-id="4294"><span class="binomial" data-dcnode-id="4295"><span data-dcnode-id="4303" style="font-weight:normal;"></span><i data-dcnode-id="4296"><span data-dcnode-id="4302" instrument_node="">Rheum </span><span data-dcnode-id="4300" style="font-style:normal;"><span data-dcnode-id="4301" instrument_node="">×</span></span><span data-dcnode-id="4299" instrument_node=""> hybridum&nbsp;</span><span data-dcnode-id="4297" style="font-style:normal;"><span data-dcnode-id="4298" instrument_node="">(?)</span></span></i></span></b><br data-dcnode-id="4293"><div data-dcnode-id="4287" style="font-size: 85%;"><a data-dcnode-id="4291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johan_Andreas_Murray" title="Johan Andreas Murray"><span data-dcnode-id="4292" instrument_node="">Murray</span></a><sup class="reference" data-dcnode-id="4288" id="cite_ref-POWO_696744-1_1-0"><a data-dcnode-id="4289" href="#cite_note-POWO_696744-1-1"><span data-dcnode-id="4290" instrument_node="">[1]</span></a></sup></div><span data-dcnode-id="4286" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="4280" instrument_node="">
</span><p data-dcnode-id="4238"><b data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">Rhubarb</span></b><span data-dcnode-id="4277" instrument_node=""> is the fleshy, edible stalks (</span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petiole_%28botany%29" title="Petiole (botany)"><span data-dcnode-id="4276" instrument_node="">petioles</span></a><span data-dcnode-id="4274" instrument_node="">) of species and hybrids (culinary rhubarb) of </span><i data-dcnode-id="4271"><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rheum_%28plant%29" title="Rheum (plant)"><span data-dcnode-id="4273" instrument_node="">Rheum</span></a></i><span data-dcnode-id="4270" instrument_node=""> in the family </span><a data-dcnode-id="4268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polygonaceae" title="Polygonaceae"><span data-dcnode-id="4269" instrument_node="">Polygonaceae</span></a><span data-dcnode-id="4267" instrument_node="">, which are cooked and used for food.</span><sup class="reference" data-dcnode-id="4264" id="cite_ref-foust_2-0"><a data-dcnode-id="4265" href="#cite_note-foust-2"><span data-dcnode-id="4266" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4263" instrument_node=""> The whole plant – a herbaceous </span><a data-dcnode-id="4261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perennial_plant" title="Perennial plant"><span data-dcnode-id="4262" instrument_node="">perennial</span></a><span data-dcnode-id="4260" instrument_node=""> growing from short, thick </span><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhizome" title="Rhizome"><span data-dcnode-id="4259" instrument_node="">rhizomes</span></a><span data-dcnode-id="4257" instrument_node=""> – is also called rhubarb. Historically, different plants have been called "rhubarb" in English. The large, triangular </span><a data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leaf" title="Leaf"><span data-dcnode-id="4256" instrument_node="">leaves</span></a><span data-dcnode-id="4254" instrument_node=""> contain high levels of </span><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxalic_acid" title="Oxalic acid"><span data-dcnode-id="4253" instrument_node="">oxalic acid</span></a><span data-dcnode-id="4251" instrument_node=""> and </span><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthrone" title="Anthrone"><span data-dcnode-id="4250" instrument_node="">anthrone</span></a><span data-dcnode-id="4248" instrument_node=""> </span><a data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glycoside" title="Glycoside"><span data-dcnode-id="4247" instrument_node="">glycosides</span></a><span data-dcnode-id="4245" instrument_node="">, making them inedible. The small </span><a data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flower" title="Flower"><span data-dcnode-id="4244" instrument_node="">flowers</span></a><span data-dcnode-id="4242" instrument_node=""> are grouped in large compound leafy greenish-white to rose-red </span><a data-dcnode-id="4240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inflorescence" title="Inflorescence"><span data-dcnode-id="4241" instrument_node="">inflorescences</span></a><span data-dcnode-id="4239" instrument_node="">.
</span></p><p data-dcnode-id="4190"><span data-dcnode-id="4237" instrument_node="">The precise origin of culinary rhubarb is unknown. The species </span><i data-dcnode-id="4234"><a data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rheum_rhabarbarum" title="Rheum rhabarbarum"><span data-dcnode-id="4236" instrument_node="">Rheum rhabarbarum</span></a></i><span data-dcnode-id="4233" instrument_node=""> (syn. </span><i data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">R.&nbsp;undulatum</span></i><span data-dcnode-id="4230" instrument_node="">) and </span><i data-dcnode-id="4227"><a data-dcnode-id="4228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rheum_rhaponticum" title="Rheum rhaponticum"><span data-dcnode-id="4229" instrument_node="">R.&nbsp;rhaponticum</span></a></i><span data-dcnode-id="4226" instrument_node=""> were grown in Europe before the 18th century and used for medicinal purposes. By the early 18th century, these two species and a possible </span><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hybrid_%28biology%29" title="Hybrid (biology)"><span data-dcnode-id="4225" instrument_node="">hybrid</span></a><span data-dcnode-id="4223" instrument_node=""> of unknown origin, </span><i data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">R.</span></i><span data-dcnode-id="4220" instrument_node="">&nbsp;×&nbsp;</span><i data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">hybridum</span></i><span data-dcnode-id="4217" instrument_node="">, were grown as vegetable crops in England and Scandinavia. They readily hybridize, and </span><b data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">culinary rhubarb</span></b><span data-dcnode-id="4214" instrument_node=""> was developed by selecting open-pollinated seed, so that its precise origin is almost impossible to determine.</span><sup class="reference" data-dcnode-id="4211" id="cite_ref-TanhSuojHart19_3-0"><a data-dcnode-id="4212" href="#cite_note-TanhSuojHart19-3"><span data-dcnode-id="4213" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4210" instrument_node=""> In appearance, samples of culinary rhubarb vary on a continuum between </span><i data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">R.&nbsp;rhaponticum</span></i><span data-dcnode-id="4207" instrument_node=""> and </span><i data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">R.&nbsp;rhabarbarum</span></i><span data-dcnode-id="4204" instrument_node="">. However, modern rhubarb cultivars are </span><a class="mw-redirect" data-dcnode-id="4202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tetraploid" title="Tetraploid"><span data-dcnode-id="4203" instrument_node="">tetraploids</span></a><span data-dcnode-id="4201" instrument_node=""> with 2</span><i data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">n</span></i><span data-dcnode-id="4198" instrument_node=""> = 44, in contrast to 2</span><i data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">n</span></i><span data-dcnode-id="4195" instrument_node=""> = 22 for the wild species.</span><sup class="reference" data-dcnode-id="4192" id="cite_ref-LibeEngl89_4-0"><a data-dcnode-id="4193" href="#cite_note-LibeEngl89-4"><span data-dcnode-id="4194" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4191" instrument_node="">
</span></p><p data-dcnode-id="4159"><span data-dcnode-id="4189" instrument_node="">Although rhubarb is a vegetable, it is often put to the same culinary uses as fruits.</span><sup class="reference" data-dcnode-id="4186" id="cite_ref-5"><a data-dcnode-id="4187" href="#cite_note-5"><span data-dcnode-id="4188" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4185" instrument_node=""> The leaf stalks can be used raw, when they have a crisp texture (similar to </span><a data-dcnode-id="4183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Celery" title="Celery"><span data-dcnode-id="4184" instrument_node="">celery</span></a><span data-dcnode-id="4182" instrument_node="">, although it is in a different family), but are most commonly cooked with sugar and used in pies, </span><a data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crumble" title="Crumble"><span data-dcnode-id="4181" instrument_node="">crumbles</span></a><span data-dcnode-id="4179" instrument_node=""> and other desserts. They have a strong, </span><a data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taste%23Sourness" title="Taste"><span data-dcnode-id="4178" instrument_node="">tart taste</span></a><span data-dcnode-id="4176" instrument_node="">. Many </span><a data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultivar" title="Cultivar"><span data-dcnode-id="4175" instrument_node="">cultivars</span></a><span data-dcnode-id="4173" instrument_node=""> have been developed for human consumption, most of which are recognised as </span><i data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">Rheum</span></i><span data-dcnode-id="4170" instrument_node=""> × </span><i data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">hybridum</span></i><span data-dcnode-id="4167" instrument_node=""> by the </span><a data-dcnode-id="4165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Horticultural_Society" title="Royal Horticultural Society"><span data-dcnode-id="4166" instrument_node="">Royal Horticultural Society</span></a><span data-dcnode-id="4164" instrument_node="">.</span><sup class="reference" data-dcnode-id="4161" id="cite_ref-6"><a data-dcnode-id="4162" href="#cite_note-6"><span data-dcnode-id="4163" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4160" instrument_node="">
</span></p><span data-dcnode-id="4158" instrument_node="">

</span><h2 data-dcnode-id="3996"><span class="mw-headline" data-dcnode-id="4004" id="Etymology"><span data-dcnode-id="4005" instrument_node="">Etymology</span></span><span class="mw-editsection" data-dcnode-id="3997"><span class="mw-editsection-bracket" data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">[</span></span><a data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D1" title="Edit section: Etymology"><span data-dcnode-id="4001" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3995" instrument_node="">
</span><p data-dcnode-id="3914"><span data-dcnode-id="3994" instrument_node="">The word </span><i data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">rhubarb</span></i><span data-dcnode-id="3991" instrument_node=""> is likely to have derived in the 14th century from the </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_French" title="Old French"><span data-dcnode-id="3990" instrument_node="">Old French</span></a><span data-dcnode-id="3988" instrument_node=""> </span><span data-dcnode-id="3985" title="French-language text"><i data-dcnode-id="3986" lang="fr"><span data-dcnode-id="3987" instrument_node="">rubarbe</span></i></span><span data-dcnode-id="3984" instrument_node="">, which came from the Latin </span><span data-dcnode-id="3981" title="Latin-language text"><i data-dcnode-id="3982" lang="la"><span data-dcnode-id="3983" instrument_node="">rheubarbarum</span></i></span><span data-dcnode-id="3980" instrument_node=""> and </span><a data-dcnode-id="3978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greek" title="Ancient Greek"><span data-dcnode-id="3979" instrument_node="">Greek</span></a><span data-dcnode-id="3977" instrument_node=""> </span><span data-dcnode-id="3974" title="Ancient Greek (to 1453)-language romanization"><i data-dcnode-id="3975" lang="grc-Latn"><span data-dcnode-id="3976" instrument_node="">rha barbaron</span></i></span><span data-dcnode-id="3973" instrument_node="">, meaning 'foreign rhubarb'.</span><sup class="reference" data-dcnode-id="3970" id="cite_ref-7"><a data-dcnode-id="3971" href="#cite_note-7"><span data-dcnode-id="3972" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3969" instrument_node=""> The Greek physician </span><a data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedanius_Dioscorides" title="Pedanius Dioscorides"><span data-dcnode-id="3968" instrument_node="">Dioscorides</span></a><span data-dcnode-id="3966" instrument_node=""> used the Greek word </span><span data-dcnode-id="3963" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="3964" lang="grc"><span data-dcnode-id="3965" instrument_node="">ῥᾶ</span></span></span><span data-dcnode-id="3962" instrument_node=""> (</span><span data-dcnode-id="3959" title="Ancient Greek (to 1453)-language romanization"><i data-dcnode-id="3960" lang="grc-Latn"><span data-dcnode-id="3961" instrument_node="">rha</span></i></span><span data-dcnode-id="3958" instrument_node="">), whereas </span><a data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galen" title="Galen"><span data-dcnode-id="3957" instrument_node="">Galen</span></a><span data-dcnode-id="3955" instrument_node=""> later used </span><span data-dcnode-id="3952" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="3953" lang="grc"><span data-dcnode-id="3954" instrument_node="">ῥῆον</span></span></span><span data-dcnode-id="3951" instrument_node=""> (</span><span data-dcnode-id="3948" title="Ancient Greek (to 1453)-language romanization"><i data-dcnode-id="3949" lang="grc-Latn"><span data-dcnode-id="3950" instrument_node="">rhēon</span></i></span><span data-dcnode-id="3947" instrument_node="">), Latin </span><span data-dcnode-id="3944" title="Latin-language text"><i data-dcnode-id="3945" lang="la"><span data-dcnode-id="3946" instrument_node="">rheum</span></i></span><span data-dcnode-id="3943" instrument_node="">. These in turn derive from a </span><a data-dcnode-id="3941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_language" title="Persian language"><span data-dcnode-id="3942" instrument_node="">Persian</span></a><span data-dcnode-id="3940" instrument_node=""> name for species of </span><a data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rheum_%28plant%29" title="Rheum (plant)"><i data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">Rheum</span></i></a><span data-dcnode-id="3936" instrument_node="">.</span><sup class="reference" data-dcnode-id="3933" id="cite_ref-Gilb55_8-0"><a data-dcnode-id="3934" href="#cite_note-Gilb55-8"><span data-dcnode-id="3935" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3932" instrument_node=""> The specific epithet </span><i data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">rhaponticum</span></i><span data-dcnode-id="3929" instrument_node="">, applying to one of the presumed parents of the cultivated plant, means 'rha from the </span><a data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pontus_%28region%29" title="Pontus (region)"><span data-dcnode-id="3928" instrument_node="">region of the Black Sea</span></a><span data-dcnode-id="3926" instrument_node="">'</span><sup class="reference" data-dcnode-id="3923" id="cite_ref-Gilb55_8-1"><a data-dcnode-id="3924" href="#cite_note-Gilb55-8"><span data-dcnode-id="3925" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3922" instrument_node=""> or the river </span><a data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volga" title="Volga"><span data-dcnode-id="3921" instrument_node="">Volga</span></a><span data-dcnode-id="3919" instrument_node="">, Rha being its ancient name.</span><sup class="reference" data-dcnode-id="3916" id="cite_ref-9"><a data-dcnode-id="3917" href="#cite_note-9"><span data-dcnode-id="3918" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3915" instrument_node="">
</span></p><span data-dcnode-id="3913" instrument_node="">
</span><h2 data-dcnode-id="3903"><span class="mw-headline" data-dcnode-id="3911" id="Cultivation"><span data-dcnode-id="3912" instrument_node="">Cultivation</span></span><span class="mw-editsection" data-dcnode-id="3904"><span class="mw-editsection-bracket" data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">[</span></span><a data-dcnode-id="3907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D2" title="Edit section: Cultivation"><span data-dcnode-id="3908" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3902" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3893"><div class="thumbinner" data-dcnode-id="3894" style="width:172px;"><a class="image" data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARheum_rhabarbarum_%28Rabarber%29_Frambozenrood_bloeiwijze.jpg"><img alt="" class="thumbimage" data-dcnode-id="3901" data-file-height="3264" data-file-width="2448" decoding="async" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/12/Rheum_rhabarbarum_%2528Rabarber%2529_Frambozenrood_bloeiwijze.jpg/170px-Rheum_rhabarbarum_%2528Rabarber%2529_Frambozenrood_bloeiwijze.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/12/Rheum_rhabarbarum_%28Rabarber%29_Frambozenrood_bloeiwijze.jpg/255px-Rheum_rhabarbarum_%28Rabarber%29_Frambozenrood_bloeiwijze.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/12/Rheum_rhabarbarum_%28Rabarber%29_Frambozenrood_bloeiwijze.jpg/340px-Rheum_rhabarbarum_%28Rabarber%29_Frambozenrood_bloeiwijze.jpg 2x" width="170"></a><span data-dcnode-id="3899" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3895"><div class="magnify" data-dcnode-id="3897"><a class="internal" data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARheum_rhabarbarum_%28Rabarber%29_Frambozenrood_bloeiwijze.jpg" title="Enlarge"></a></div><span data-dcnode-id="3896" instrument_node="">Young rhubarb flowers</span></div></div></div><span data-dcnode-id="3892" instrument_node="">
</span><p data-dcnode-id="3863"><span data-dcnode-id="3891" instrument_node="">Rhubarb is grown widely, and with </span><a data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse" title="Greenhouse"><span data-dcnode-id="3890" instrument_node="">greenhouse</span></a><span data-dcnode-id="3888" instrument_node=""> production it is available throughout much of the year. It needs rainfall and an annual cold period of up to 7-9 weeks at 3°C (37°F), known as ‘cold units’, to grow well. The plant develops a substantial underground storage organ (rhubarb crowns) and this can be used for early production by transferring field-grown crowns to warm conditions.</span><sup class="reference" data-dcnode-id="3885" id="cite_ref-RHS_-_rhubarb-growing_10-0"><a data-dcnode-id="3886" href="#cite_note-RHS_-_rhubarb-growing-10"><span data-dcnode-id="3887" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3884" instrument_node=""> Rhubarb grown in hothouses (heated greenhouses) is called "hothouse rhubarb", and is typically made available at consumer markets in early spring, before outdoor cultivated rhubarb is available. Hothouse rhubarb is usually brighter red, tenderer and sweeter-tasting than outdoor rhubarb.</span><sup class="reference" data-dcnode-id="3881" id="cite_ref-Rombauer,_Irma_S._Page_142_11-0"><a data-dcnode-id="3882" href="#cite_note-Rombauer,_Irma_S._Page_142-11"><span data-dcnode-id="3883" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3880" instrument_node=""> After forcing for commercial production, the crowns are usually discarded.</span><sup class="reference" data-dcnode-id="3877" id="cite_ref-RHS_-_rhubarb-growing_10-1"><a data-dcnode-id="3878" href="#cite_note-RHS_-_rhubarb-growing-10"><span data-dcnode-id="3879" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3876" instrument_node=""> In </span><a class="mw-redirect" data-dcnode-id="3874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temperateness" title="Temperateness"><span data-dcnode-id="3875" instrument_node="">temperate climates</span></a><span data-dcnode-id="3873" instrument_node="">, rhubarb is one of the first food plants </span><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harvest" title="Harvest"><span data-dcnode-id="3872" instrument_node="">harvested</span></a><span data-dcnode-id="3870" instrument_node="">, usually in mid- to late spring (April or May in the </span><a data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Hemisphere" title="Northern Hemisphere"><span data-dcnode-id="3869" instrument_node="">Northern Hemisphere</span></a><span data-dcnode-id="3867" instrument_node="">, October or November in the </span><a data-dcnode-id="3865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_Hemisphere" title="Southern Hemisphere"><span data-dcnode-id="3866" instrument_node="">Southern Hemisphere</span></a><span data-dcnode-id="3864" instrument_node="">), and the season for field-grown plants lasts until the end of summer.
</span></p><p data-dcnode-id="3838"><span data-dcnode-id="3862" instrument_node="">In the United Kingdom, the first rhubarb of the year is harvested by candlelight in </span><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhubarb_forcer" title="Rhubarb forcer"><span data-dcnode-id="3861" instrument_node="">forcing sheds</span></a><span data-dcnode-id="3859" instrument_node=""> where all other light is excluded, a practice that produces a sweeter, more tender stalk.</span><sup class="reference" data-dcnode-id="3856" id="cite_ref-b1_12-0"><a data-dcnode-id="3857" href="#cite_note-b1-12"><span data-dcnode-id="3858" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3855" instrument_node=""> These sheds are dotted around the "</span><a data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhubarb_Triangle" title="Rhubarb Triangle"><span data-dcnode-id="3854" instrument_node="">Rhubarb Triangle</span></a><span data-dcnode-id="3852" instrument_node="">" between </span><a data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wakefield" title="Wakefield"><span data-dcnode-id="3851" instrument_node="">Wakefield</span></a><span data-dcnode-id="3849" instrument_node="">, </span><a data-dcnode-id="3847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leeds" title="Leeds"><span data-dcnode-id="3848" instrument_node="">Leeds</span></a><span data-dcnode-id="3846" instrument_node="">, and </span><a data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morley%2C_West_Yorkshire" title="Morley, West Yorkshire"><span data-dcnode-id="3845" instrument_node="">Morley</span></a><span data-dcnode-id="3843" instrument_node="">.</span><sup class="reference" data-dcnode-id="3840" id="cite_ref-wgur_13-0"><a data-dcnode-id="3841" href="#cite_note-wgur-13"><span data-dcnode-id="3842" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3839" instrument_node="">
</span></p><p data-dcnode-id="3825"><span data-dcnode-id="3837" instrument_node="">In the northwestern US states of Oregon and Washington, there are typically two harvests, from late April to May and from late June into July;</span><sup class="reference" data-dcnode-id="3834" id="cite_ref-14"><a data-dcnode-id="3835" href="#cite_note-14"><span data-dcnode-id="3836" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3833" instrument_node=""> half of all US commercial production is in </span><a data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierce_County%2C_Washington" title="Pierce County, Washington"><span data-dcnode-id="3832" instrument_node="">Pierce County, Washington</span></a><span data-dcnode-id="3830" instrument_node="">.</span><sup class="reference" data-dcnode-id="3827" id="cite_ref-15"><a data-dcnode-id="3828" href="#cite_note-15"><span data-dcnode-id="3829" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3826" instrument_node=""> Rhubarb is ready to consume as soon as harvested, and freshly cut stalks are firm and glossy.
</span></p><p data-dcnode-id="3816"><span data-dcnode-id="3824" instrument_node="">Rhubarb damaged by severe cold should not be eaten, as it may be high in </span><a data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxalic_acid" title="Oxalic acid"><span data-dcnode-id="3823" instrument_node="">oxalic acid</span></a><span data-dcnode-id="3821" instrument_node="">, which migrates from the leaves and can cause illness.</span><sup class="reference" data-dcnode-id="3818" id="cite_ref-16"><a data-dcnode-id="3819" href="#cite_note-16"><span data-dcnode-id="3820" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3817" instrument_node="">
</span></p><p data-dcnode-id="3804"><span data-dcnode-id="3815" instrument_node="">The colour of rhubarb stalks can vary from the commonly associated crimson red, through speckled light </span><a class="mw-redirect" data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Variations_of_pink" title="Variations of pink"><span data-dcnode-id="3814" instrument_node="">pink</span></a><span data-dcnode-id="3812" instrument_node="">, to simply light green. Rhubarb stalks are poetically described as "crimson stalks". The colour results from the presence of </span><a data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthocyanin" title="Anthocyanin"><span data-dcnode-id="3811" instrument_node="">anthocyanins</span></a><span data-dcnode-id="3809" instrument_node="">, and varies according to both rhubarb variety and production technique. The colour is not related to its suitability for cooking.</span><sup class="reference" data-dcnode-id="3806" id="cite_ref-17"><a data-dcnode-id="3807" href="#cite_note-17"><span data-dcnode-id="3808" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3805" instrument_node="">
</span></p><span data-dcnode-id="3803" instrument_node="">
</span><h3 data-dcnode-id="3793"><span class="mw-headline" data-dcnode-id="3801" id="Historical_cultivation"><span data-dcnode-id="3802" instrument_node="">Historical cultivation</span></span><span class="mw-editsection" data-dcnode-id="3794"><span class="mw-editsection-bracket" data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">[</span></span><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D3" title="Edit section: Historical cultivation"><span data-dcnode-id="3798" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3792" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3783"><div class="thumbinner" data-dcnode-id="3784" style="width:222px;"><a class="image" data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACSA-Rhubarb.jpg"><img alt="" class="thumbimage" data-dcnode-id="3791" data-file-height="2580" data-file-width="4470" decoding="async" height="127" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9e/CSA-Rhubarb.jpg/220px-CSA-Rhubarb.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9e/CSA-Rhubarb.jpg/330px-CSA-Rhubarb.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9e/CSA-Rhubarb.jpg/440px-CSA-Rhubarb.jpg 2x" width="220"></a><span data-dcnode-id="3789" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3785"><div class="magnify" data-dcnode-id="3787"><a class="internal" data-dcnode-id="3788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACSA-Rhubarb.jpg" title="Enlarge"></a></div><span data-dcnode-id="3786" instrument_node="">A bundle of rhubarb</span></div></div></div><span data-dcnode-id="3782" instrument_node="">
</span><p data-dcnode-id="3729"><span data-dcnode-id="3781" instrument_node="">The Chinese call rhubarb "the great yellow" (</span><i data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">dà huáng</span></i><span data-dcnode-id="3778" instrument_node=""> </span><span data-dcnode-id="3775" title="Chinese-language text"><span data-dcnode-id="3776" lang="zh"><span data-dcnode-id="3777" instrument_node="">大黃</span></span></span><span data-dcnode-id="3774" instrument_node="">), and have used rhubarb root for medicinal purposes for thousands of years.</span><sup class="reference" data-dcnode-id="3771" id="cite_ref-mehta_18-0"><a data-dcnode-id="3772" href="#cite_note-mehta-18"><span data-dcnode-id="3773" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3770" instrument_node=""> It appears in </span><i data-dcnode-id="3767"><a data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shennong_Ben_Cao_Jing" title="Shennong Ben Cao Jing"><span data-dcnode-id="3769" instrument_node="">The Divine Farmer's Herb-Root Classic</span></a></i><span data-dcnode-id="3766" instrument_node="">, which is thought to have been compiled about 1,800 years ago.</span><sup class="reference" data-dcnode-id="3763" id="cite_ref-Lloyd_19-0"><a data-dcnode-id="3764" href="#cite_note-Lloyd-19"><span data-dcnode-id="3765" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3762" instrument_node=""> Though </span><a class="mw-redirect" data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dioscurides" title="Dioscurides"><span data-dcnode-id="3761" instrument_node="">Dioscurides</span></a><span data-dcnode-id="3759" instrument_node="">' description of </span><i data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">ρηον</span></i><span data-dcnode-id="3756" instrument_node=""> or </span><i data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">ρά</span></i><span data-dcnode-id="3753" instrument_node=""> indicates that a medicinal root brought to Greece from beyond the </span><a class="mw-redirect" data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosphorus" title="Bosphorus"><span data-dcnode-id="3752" instrument_node="">Bosphorus</span></a><span data-dcnode-id="3750" instrument_node=""> may have been rhubarb, commerce in the plant did not become securely established until </span><a data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_Golden_Age" title="Islamic Golden Age"><span data-dcnode-id="3749" instrument_node="">Islamic times</span></a><span data-dcnode-id="3747" instrument_node="">. During Islamic times, it was imported along the </span><a data-dcnode-id="3745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silk_Road" title="Silk Road"><span data-dcnode-id="3746" instrument_node="">Silk Road</span></a><span data-dcnode-id="3744" instrument_node="">, reaching Europe in the 14th century through the ports of </span><a data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aleppo" title="Aleppo"><span data-dcnode-id="3743" instrument_node="">Aleppo</span></a><span data-dcnode-id="3741" instrument_node=""> and </span><a data-dcnode-id="3739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smyrna" title="Smyrna"><span data-dcnode-id="3740" instrument_node="">Smyrna</span></a><span data-dcnode-id="3738" instrument_node="">, where it became known as "Turkish rhubarb".</span><sup class="reference" data-dcnode-id="3735" id="cite_ref-Warmington1928_20-0"><a data-dcnode-id="3736" href="#cite_note-Warmington1928-20"><span data-dcnode-id="3737" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3734" instrument_node=""> Later, it also started arriving via the new maritime routes, or overland through Russia. The "Russian rhubarb" was the most valued, probably because of the rhubarb-specific quality control system maintained by the Russian Empire.</span><sup class="reference" data-dcnode-id="3731" id="cite_ref-Monahan2013_21-0"><a data-dcnode-id="3732" href="#cite_note-Monahan2013-21"><span data-dcnode-id="3733" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3730" instrument_node="">
</span></p><p data-dcnode-id="3686"><span data-dcnode-id="3728" instrument_node="">The cost of transportation across Asia made rhubarb expensive in medieval Europe.  It was several times the price of other valuable herbs and spices such as </span><a data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cinnamon" title="Cinnamon"><span data-dcnode-id="3727" instrument_node="">cinnamon</span></a><span data-dcnode-id="3725" instrument_node="">, </span><a data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opium" title="Opium"><span data-dcnode-id="3724" instrument_node="">opium</span></a><span data-dcnode-id="3722" instrument_node="">, and </span><a data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saffron" title="Saffron"><span data-dcnode-id="3721" instrument_node="">saffron</span></a><span data-dcnode-id="3719" instrument_node="">. The merchant explorer </span><a data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marco_Polo" title="Marco Polo"><span data-dcnode-id="3718" instrument_node="">Marco Polo</span></a><span data-dcnode-id="3716" instrument_node=""> therefore searched for the place where the plant was grown and harvested, discovering that it was cultivated in the mountains of </span><a data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tangut_people" title="Tangut people"><span data-dcnode-id="3715" instrument_node="">Tangut</span></a><span data-dcnode-id="3713" instrument_node=""> province.</span><sup class="reference" data-dcnode-id="3710" id="cite_ref-Lloyd_19-1"><a data-dcnode-id="3711" href="#cite_note-Lloyd-19"><span data-dcnode-id="3712" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3709" instrument_node=""> The value of rhubarb can be seen in </span><a class="mw-redirect" data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruy_Gonz%25C3%25A1les_de_Clavijo" title="Ruy Gonzáles de Clavijo"><span data-dcnode-id="3708" instrument_node="">Ruy Gonzáles de Clavijo</span></a><span data-dcnode-id="3706" instrument_node="">'s report of his embassy in 1403–05 to </span><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timur" title="Timur"><span data-dcnode-id="3705" instrument_node="">Timur</span></a><span data-dcnode-id="3703" instrument_node=""> in </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samarkand" title="Samarkand"><span data-dcnode-id="3702" instrument_node="">Samarkand</span></a><span data-dcnode-id="3700" instrument_node="">: "The best of all merchandise coming to Samarkand was from China: especially silks, satins, musk, </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruby" title="Ruby"><span data-dcnode-id="3699" instrument_node="">rubies</span></a><span data-dcnode-id="3697" instrument_node="">, </span><a data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diamond" title="Diamond"><span data-dcnode-id="3696" instrument_node="">diamonds</span></a><span data-dcnode-id="3694" instrument_node="">, </span><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pearl" title="Pearl"><span data-dcnode-id="3693" instrument_node="">pearls</span></a><span data-dcnode-id="3691" instrument_node="">, and rhubarb...."</span><sup class="reference" data-dcnode-id="3688" id="cite_ref-22"><a data-dcnode-id="3689" href="#cite_note-22"><span data-dcnode-id="3690" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3687" instrument_node="">
</span></p><p data-dcnode-id="3652"><span data-dcnode-id="3685" instrument_node="">The high price, as well as the increasing demand from apothecaries, stimulated efforts to cultivate the different species of rhubarb on European soil.</span><sup class="reference" data-dcnode-id="3682" id="cite_ref-Monahan2013_21-1"><a data-dcnode-id="3683" href="#cite_note-Monahan2013-21"><span data-dcnode-id="3684" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3681" instrument_node=""> Certain species came to be grown in England to produce the roots.</span><sup class="reference" data-dcnode-id="3678" id="cite_ref-Grieve_23-0"><a data-dcnode-id="3679" href="#cite_note-Grieve-23"><span data-dcnode-id="3680" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3677" instrument_node=""> The local availability of the plants grown for medicinal purposes, together with the increasing abundance and decreasing price of sugar in the 18th century, galvanised its culinary adoption.</span><sup class="reference" data-dcnode-id="3674" id="cite_ref-Monahan2013_21-2"><a data-dcnode-id="3675" href="#cite_note-Monahan2013-21"><span data-dcnode-id="3676" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3673" instrument_node=""> Grieve claims a date of 1820 in England.</span><sup class="reference" data-dcnode-id="3670" id="cite_ref-Grieve_23-1"><a data-dcnode-id="3671" href="#cite_note-Grieve-23"><span data-dcnode-id="3672" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3669" instrument_node=""> Rhubarb was harvested in </span><a data-dcnode-id="3667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scotland" title="Scotland"><span data-dcnode-id="3668" instrument_node="">Scotland</span></a><span data-dcnode-id="3666" instrument_node=""> from at least 1786, having been introduced to the Botanical Garden in </span><a data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edinburgh" title="Edinburgh"><span data-dcnode-id="3665" instrument_node="">Edinburgh</span></a><span data-dcnode-id="3663" instrument_node=""> by the traveller </span><a class="mw-redirect" data-dcnode-id="3661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruce_of_Kinnaird" title="Bruce of Kinnaird"><span data-dcnode-id="3662" instrument_node="">Bruce of Kinnaird</span></a><span data-dcnode-id="3660" instrument_node=""> in 1774. He brought the seeds from </span><a class="mw-redirect" data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abyssinia" title="Abyssinia"><span data-dcnode-id="3659" instrument_node="">Abyssinia</span></a><span data-dcnode-id="3657" instrument_node=""> and they produced 3000 plants. </span><sup class="reference" data-dcnode-id="3654" id="cite_ref-24"><a data-dcnode-id="3655" href="#cite_note-24"><span data-dcnode-id="3656" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3653" instrument_node="">
</span></p><p data-dcnode-id="3619"><span data-dcnode-id="3651" instrument_node="">Though it is often asserted that rhubarb first came to the United States in the 1820s,</span><sup class="reference" data-dcnode-id="3648" id="cite_ref-25"><a data-dcnode-id="3649" href="#cite_note-25"><span data-dcnode-id="3650" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3647" instrument_node=""> </span><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Bartram" title="John Bartram"><span data-dcnode-id="3646" instrument_node="">John Bartram</span></a><span data-dcnode-id="3644" instrument_node=""> was growing medicinal and culinary rhubarbs in </span><a data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philadelphia" title="Philadelphia"><span data-dcnode-id="3643" instrument_node="">Philadelphia</span></a><span data-dcnode-id="3641" instrument_node=""> from the 1730s, planting seeds sent to him by </span><a data-dcnode-id="3639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Collinson_%28botanist%29" title="Peter Collinson (botanist)"><span data-dcnode-id="3640" instrument_node="">Peter Collinson</span></a><span data-dcnode-id="3638" instrument_node="">.</span><sup class="reference" data-dcnode-id="3635" id="cite_ref-26"><a data-dcnode-id="3636" href="#cite_note-26"><span data-dcnode-id="3637" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3634" instrument_node=""> From the first, the familiar garden rhubarb was not the only </span><i data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">Rheum</span></i><span data-dcnode-id="3631" instrument_node=""> in American gardens: </span><a data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Jefferson" title="Thomas Jefferson"><span data-dcnode-id="3630" instrument_node="">Thomas Jefferson</span></a><span data-dcnode-id="3628" instrument_node=""> planted </span><i data-dcnode-id="3625"><a class="mw-redirect" data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rheum_undulatum" title="Rheum undulatum"><span data-dcnode-id="3627" instrument_node="">R. undulatum</span></a></i><span data-dcnode-id="3624" instrument_node=""> at Monticello in 1809 and 1811, observing that it was "Esculent rhubarb, the leaves excellent as Spinach."</span><sup class="reference" data-dcnode-id="3621" id="cite_ref-27"><a data-dcnode-id="3622" href="#cite_note-27"><span data-dcnode-id="3623" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3620" instrument_node="">
</span></p><span data-dcnode-id="3618" instrument_node="">
</span><h2 data-dcnode-id="3608"><span class="mw-headline" data-dcnode-id="3616" id="Cultivars"><span data-dcnode-id="3617" instrument_node="">Cultivars</span></span><span class="mw-editsection" data-dcnode-id="3609"><span class="mw-editsection-bracket" data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">[</span></span><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D4" title="Edit section: Cultivars"><span data-dcnode-id="3613" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3607" instrument_node="">
</span><p data-dcnode-id="3598"><span data-dcnode-id="3606" instrument_node="">The advocate of organic gardening </span><a data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lawrence_D._Hills" title="Lawrence D. Hills"><span data-dcnode-id="3605" instrument_node="">Lawrence D. Hills</span></a><span data-dcnode-id="3603" instrument_node=""> listed his favourite rhubarb varieties for flavour as ‘Hawke's Champagne’, ‘Victoria’, ‘Timperley Early’, and ‘Early Albert’, also recommending ‘Gaskin's Perpetual’ for having the lowest level of oxalic acid, allowing it to be harvested over a much longer period of the growing season without developing excessive sourness.</span><sup class="reference" data-dcnode-id="3600" id="cite_ref-28"><a data-dcnode-id="3601" href="#cite_note-28"><span data-dcnode-id="3602" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3599" instrument_node="">
</span></p><span data-dcnode-id="3597" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3586"><div class="thumbinner" data-dcnode-id="3587" style="width:222px;"><a class="image" data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARhubarb_Pie.jpg"><img alt="" class="thumbimage" data-dcnode-id="3596" data-file-height="750" data-file-width="1089" decoding="async" height="152" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Rhubarb_Pie.jpg/220px-Rhubarb_Pie.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Rhubarb_Pie.jpg/330px-Rhubarb_Pie.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Rhubarb_Pie.jpg/440px-Rhubarb_Pie.jpg 2x" width="220"></a><span data-dcnode-id="3594" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3588"><div class="magnify" data-dcnode-id="3592"><a class="internal" data-dcnode-id="3593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARhubarb_Pie.jpg" title="Enlarge"></a></div><span data-dcnode-id="3591" instrument_node="">A homemade </span><a data-dcnode-id="3589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhubarb_pie" title="Rhubarb pie"><span data-dcnode-id="3590" instrument_node="">rhubarb pie</span></a></div></div></div><span data-dcnode-id="3585" instrument_node="">
</span><p data-dcnode-id="3566"><span data-dcnode-id="3584" instrument_node="">The Royal Horticultural Society has the UK's national collection of rhubarb that comprises 103 varieties. In 2021-22 this was moved from southern England to the more northern garden </span><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/RHS_Garden_Bridgewater" title="RHS Garden Bridgewater"><span data-dcnode-id="3583" instrument_node="">RHS Bridgewater</span></a><span data-dcnode-id="3581" instrument_node=""> where winter cold and rainfall are better suited for rhubarb.</span><sup class="reference" data-dcnode-id="3578" id="cite_ref-RHS-2022_29-0"><a data-dcnode-id="3579" href="#cite_note-RHS-2022-29"><span data-dcnode-id="3580" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3577" instrument_node=""> The following cultivars have gained the </span><a data-dcnode-id="3575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Horticultural_Society" title="Royal Horticultural Society"><span data-dcnode-id="3576" instrument_node="">Royal Horticultural Society</span></a><span data-dcnode-id="3574" instrument_node="">’s </span><a data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Award_of_Garden_Merit" title="Award of Garden Merit"><span data-dcnode-id="3573" instrument_node="">Award of Garden Merit</span></a><span data-dcnode-id="3571" instrument_node="">:</span><sup class="reference" data-dcnode-id="3568" id="cite_ref-30"><a data-dcnode-id="3569" href="#cite_note-30"><span data-dcnode-id="3570" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3567" instrument_node="">
</span></p><span data-dcnode-id="3565" instrument_node="">
</span><ul data-dcnode-id="3541"><li data-dcnode-id="3560"><span data-dcnode-id="3564" instrument_node="">’Grandad's Favourite’</span><sup class="reference" data-dcnode-id="3561" id="cite_ref-31"><a data-dcnode-id="3562" href="#cite_note-31"><span data-dcnode-id="3563" instrument_node="">[31]</span></a></sup></li><span data-dcnode-id="3559" instrument_node="">
</span><li data-dcnode-id="3554"><span data-dcnode-id="3558" instrument_node="">’Reed's Early Superb’</span><sup class="reference" data-dcnode-id="3555" id="cite_ref-32"><a data-dcnode-id="3556" href="#cite_note-32"><span data-dcnode-id="3557" instrument_node="">[32]</span></a></sup></li><span data-dcnode-id="3553" instrument_node="">
