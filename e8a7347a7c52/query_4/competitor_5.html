</span></div></td></tr><tr data-dcnode-id="3198"><td class="infobox-below wrap" colspan="2" data-dcnode-id="3199" style="background:#e0e0e0;padding:0.3em;line-height:1.5em;font-weight:normal;"><sup data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">†</span></sup><span data-dcnode-id="3208" instrument_node="">Percentages are roughly approximated using </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dietary_Reference_Intake" title="Dietary Reference Intake"><span data-dcnode-id="3207" instrument_node="">US&nbsp;recommendations</span></a><span data-dcnode-id="3205" instrument_node=""> for adults. </span><br data-dcnode-id="3204"><span class="nowrap" data-dcnode-id="3200"><span data-dcnode-id="3203" instrument_node="">Source: </span><a class="external text" data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/index.html" rel="nofollow"><span data-dcnode-id="3202" instrument_node="">USDA FoodData Central</span></a></span></td></tr></tbody></table><span data-dcnode-id="3195" instrument_node="">
</span><p data-dcnode-id="3180"><span data-dcnode-id="3194" instrument_node="">Rhubarb is grown primarily for its fleshy leafstalks, technically known as </span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petiole_%28botany%29" title="Petiole (botany)"><span data-dcnode-id="3193" instrument_node="">petioles</span></a><span data-dcnode-id="3191" instrument_node="">. The use of rhubarb stalks as food is a relatively recent innovation. This usage was first recorded in 18th to 19th-century England after affordable </span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sugar" title="Sugar"><span data-dcnode-id="3190" instrument_node="">sugar</span></a><span data-dcnode-id="3188" instrument_node=""> became more widely available.</span><sup class="reference" data-dcnode-id="3185" id="cite_ref-Monahan2013_21-3"><a data-dcnode-id="3186" href="#cite_note-Monahan2013-21"><span data-dcnode-id="3187" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="3182" id="cite_ref-Grieve_23-2"><a data-dcnode-id="3183" href="#cite_note-Grieve-23"><span data-dcnode-id="3184" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3181" instrument_node="">
</span></p><p data-dcnode-id="3175"><span data-dcnode-id="3179" instrument_node="">Commonly, it is stewed with sugar or used in pies and desserts, but it can also be put into savoury dishes or pickled. Rhubarb can be dehydrated and infused with fruit juice. In the United States, it is usually infused with strawberry juice to mimic the popular </span><a class="mw-redirect" data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strawberry_rhubarb_pie" title="Strawberry rhubarb pie"><span data-dcnode-id="3178" instrument_node="">strawberry rhubarb pie</span></a><span data-dcnode-id="3176" instrument_node="">.
</span></p><span data-dcnode-id="3174" instrument_node="">
</span><h3 data-dcnode-id="3164"><span class="mw-headline" data-dcnode-id="3172" id="Food"><span data-dcnode-id="3173" instrument_node="">Food</span></span><span class="mw-editsection" data-dcnode-id="3165"><span class="mw-editsection-bracket" data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">[</span></span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D6" title="Edit section: Food"><span data-dcnode-id="3169" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3163" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3162" instrument_node="">The species </span><i data-dcnode-id="3159"><a data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rheum_ribes" title="Rheum ribes"><span data-dcnode-id="3161" instrument_node="">Rheum ribes</span></a></i><span data-dcnode-id="3158" instrument_node=""> has been eaten in the </span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_Golden_Age" title="Islamic Golden Age"><span data-dcnode-id="3157" instrument_node="">Islamic world</span></a><span data-dcnode-id="3155" instrument_node=""> since the 10th century.</span><sup class="reference" data-dcnode-id="3152" id="cite_ref-35"><a data-dcnode-id="3153" href="#cite_note-35"><span data-dcnode-id="3154" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3151" instrument_node="">
</span></p><p data-dcnode-id="3115"><span data-dcnode-id="3149" instrument_node="">In Northern Europe and North America, the stalks are commonly cut into pieces and stewed with added sugar until soft.</span><sup class="reference" data-dcnode-id="3146" id="cite_ref-36"><a data-dcnode-id="3147" href="#cite_note-36"><span data-dcnode-id="3148" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3145" instrument_node=""> The resulting </span><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compote" title="Compote"><span data-dcnode-id="3144" instrument_node="">compote</span></a><span data-dcnode-id="3142" instrument_node="">, sometimes thickened with corn starch, can then be used in pies, tarts and crumbles. Alternatively, greater quantities of sugar can be added with </span><a data-dcnode-id="3140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pectin" title="Pectin"><span data-dcnode-id="3141" instrument_node="">pectin</span></a><span data-dcnode-id="3139" instrument_node=""> to make </span><a data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fruit_preserves" title="Fruit preserves"><span data-dcnode-id="3138" instrument_node="">jams</span></a><span data-dcnode-id="3136" instrument_node="">. A paired spice used is </span><a data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ginger" title="Ginger"><span data-dcnode-id="3135" instrument_node="">ginger</span></a><span data-dcnode-id="3133" instrument_node="">, although </span><a data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cinnamon" title="Cinnamon"><span data-dcnode-id="3132" instrument_node="">cinnamon</span></a><span data-dcnode-id="3130" instrument_node=""> and </span><a data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nutmeg" title="Nutmeg"><span data-dcnode-id="3129" instrument_node="">nutmeg</span></a><span data-dcnode-id="3127" instrument_node=""> are also common additions. In the United Kingdom, as well as being used in the typical pies, tarts and crumbles, rhubarb compote is also combined with whipped cream or custard to make rhubarb </span><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fruit_fool" title="Fruit fool"><span data-dcnode-id="3126" instrument_node="">fool</span></a><span data-dcnode-id="3124" instrument_node="">. In the United States, the common usage of rhubarb in pies has led to it being nicknamed "pie plant", by which it is referred to in 19th-century cookbooks.</span><sup class="reference" data-dcnode-id="3121" id="cite_ref-Bill_Neal_p._308_37-0"><a data-dcnode-id="3122" href="#cite_note-Bill_Neal_p._308-37"><span data-dcnode-id="3123" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3120" instrument_node=""> Rhubarb in the US is also often paired with strawberries to make strawberry-rhubarb pie, though some rhubarb purists jokingly consider this "a rather unhappy marriage".</span><sup class="reference" data-dcnode-id="3117" id="cite_ref-Bill_Neal_p._308_37-1"><a data-dcnode-id="3118" href="#cite_note-Bill_Neal_p._308-37"><span data-dcnode-id="3119" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3116" instrument_node="">
</span></p><p data-dcnode-id="3100"><span data-dcnode-id="3114" instrument_node="">Rhubarb can also be used to make alcoholic drinks, such as </span><a data-dcnode-id="3112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fruit_wine" title="Fruit wine"><span data-dcnode-id="3113" instrument_node="">fruit wines</span></a><span data-dcnode-id="3111" instrument_node=""> or Finnish Rhubarb </span><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sima_%28mead%29" title="Sima (mead)"><span data-dcnode-id="3110" instrument_node="">sima (mead)</span></a><span data-dcnode-id="3108" instrument_node="">. It is also used to make </span><a data-dcnode-id="3106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kompot" title="Kompot"><span data-dcnode-id="3107" instrument_node="">Kompot</span></a><span data-dcnode-id="3105" instrument_node="">.</span><sup class="reference" data-dcnode-id="3102" id="cite_ref-38"><a data-dcnode-id="3103" href="#cite_note-38"><span data-dcnode-id="3104" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3101" instrument_node="">
</span></p><span data-dcnode-id="3099" instrument_node="">
</span><h3 data-dcnode-id="3089"><span class="mw-headline" data-dcnode-id="3097" id="Nutrition"><span data-dcnode-id="3098" instrument_node="">Nutrition</span></span><span class="mw-editsection" data-dcnode-id="3090"><span class="mw-editsection-bracket" data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">[</span></span><a data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D7" title="Edit section: Nutrition"><span data-dcnode-id="3094" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3088" instrument_node="">
</span><p data-dcnode-id="3052"><span data-dcnode-id="3087" instrument_node="">Raw rhubarb is 94% water, 5% </span><a data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbohydrate" title="Carbohydrate"><span data-dcnode-id="3086" instrument_node="">carbohydrates</span></a><span data-dcnode-id="3084" instrument_node="">, 1% </span><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protein_%28nutrient%29" title="Protein (nutrient)"><span data-dcnode-id="3083" instrument_node="">protein</span></a><span data-dcnode-id="3081" instrument_node="">, and contains negligible fat (table). In a </span><span data-dcnode-id="3078" instrument_node="">100-gram (</span><span class="frac" data-dcnode-id="3069" role="math"><span data-dcnode-id="3077" instrument_node="">3</span><span class="sr-only" data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">+</span></span><span class="num" data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">1</span></span><span data-dcnode-id="3072" instrument_node="">⁄</span><span class="den" data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">2</span></span></span><span data-dcnode-id="3068" instrument_node="">-ounce) reference amount, raw rhubarb supplies 88 kilojoules (21 kilocalories) of </span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_energy" title="Food energy"><span data-dcnode-id="3067" instrument_node="">food energy</span></a><span data-dcnode-id="3065" instrument_node="">, and is a rich source of </span><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_K" title="Vitamin K"><span data-dcnode-id="3064" instrument_node="">vitamin K</span></a><span data-dcnode-id="3062" instrument_node=""> (28% of the </span><a class="mw-redirect" data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daily_Value" title="Daily Value"><span data-dcnode-id="3061" instrument_node="">Daily Value</span></a><span data-dcnode-id="3059" instrument_node="">, DV), a moderate source of </span><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_C" title="Vitamin C"><span data-dcnode-id="3058" instrument_node="">vitamin C</span></a><span data-dcnode-id="3056" instrument_node=""> (10% DV), and contains no other </span><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Micronutrient" title="Micronutrient"><span data-dcnode-id="3055" instrument_node="">micronutrients</span></a><span data-dcnode-id="3053" instrument_node=""> in significant amounts (table).
</span></p><span data-dcnode-id="3051" instrument_node="">
</span><h3 data-dcnode-id="3041"><span class="mw-headline" data-dcnode-id="3049" id="Traditional_Chinese_medicine"><span data-dcnode-id="3050" instrument_node="">Traditional Chinese medicine</span></span><span class="mw-editsection" data-dcnode-id="3042"><span class="mw-editsection-bracket" data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">[</span></span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D8" title="Edit section: Traditional Chinese medicine"><span data-dcnode-id="3046" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3040" instrument_node="">
</span><p data-dcnode-id="3021"><span data-dcnode-id="3039" instrument_node="">In </span><a data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Traditional_Chinese_medicine" title="Traditional Chinese medicine"><span data-dcnode-id="3038" instrument_node="">traditional Chinese medicine</span></a><span data-dcnode-id="3036" instrument_node="">, rhubarb roots of several species were used as a </span><a data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laxative" title="Laxative"><span data-dcnode-id="3035" instrument_node="">laxative</span></a><span data-dcnode-id="3033" instrument_node=""> for several millennia,</span><sup class="reference" data-dcnode-id="3030" id="cite_ref-Barceloux2012_39-0"><a data-dcnode-id="3031" href="#cite_note-Barceloux2012-39"><span data-dcnode-id="3032" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3029" instrument_node=""> although there is no </span><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evidence-based_medicine" title="Evidence-based medicine"><span data-dcnode-id="3028" instrument_node="">clinical evidence</span></a><span data-dcnode-id="3026" instrument_node=""> to indicate such use is effective.</span><sup class="reference" data-dcnode-id="3023" id="cite_ref-drugs_40-0"><a data-dcnode-id="3024" href="#cite_note-drugs-40"><span data-dcnode-id="3025" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3022" instrument_node="">
</span></p><span data-dcnode-id="3020" instrument_node="">
</span><h2 data-dcnode-id="3010"><span class="mw-headline" data-dcnode-id="3018" id="Phytochemistry_and_potential_toxicity"><span data-dcnode-id="3019" instrument_node="">Phytochemistry and potential toxicity</span></span><span class="mw-editsection" data-dcnode-id="3011"><span class="mw-editsection-bracket" data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">[</span></span><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D9" title="Edit section: Phytochemistry and potential toxicity"><span data-dcnode-id="3015" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="2980"><span data-dcnode-id="3008" instrument_node="">The roots and stems contain </span><a class="mw-redirect" data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_anthraquinone" title="Natural anthraquinone"><span data-dcnode-id="3007" instrument_node="">anthraquinones</span></a><span data-dcnode-id="3005" instrument_node="">, such as </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emodin" title="Emodin"><span data-dcnode-id="3004" instrument_node="">emodin</span></a><span data-dcnode-id="3002" instrument_node=""> and </span><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhein_%28molecule%29" title="Rhein (molecule)"><span data-dcnode-id="3001" instrument_node="">rhein</span></a><span data-dcnode-id="2999" instrument_node="">.</span><sup class="reference" data-dcnode-id="2996" id="cite_ref-mehta_18-1"><a data-dcnode-id="2997" href="#cite_note-mehta-18"><span data-dcnode-id="2998" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2995" instrument_node=""> The anthraquinones have been separated from powdered rhubarb root for purposes in </span><a data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Traditional_medicine" title="Traditional medicine"><span data-dcnode-id="2994" instrument_node="">traditional medicine</span></a><span data-dcnode-id="2992" instrument_node="">,</span><sup class="reference" data-dcnode-id="2989" id="cite_ref-Barceloux2012_39-1"><a data-dcnode-id="2990" href="#cite_note-Barceloux2012-39"><span data-dcnode-id="2991" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2988" instrument_node=""> although long-term consumption of the plant has been associated with </span><a class="mw-redirect" data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acute_kidney_failure" title="Acute kidney failure"><span data-dcnode-id="2987" instrument_node="">acute kidney failure</span></a><span data-dcnode-id="2985" instrument_node="">.</span><sup class="reference" data-dcnode-id="2982" id="cite_ref-drugs_40-1"><a data-dcnode-id="2983" href="#cite_note-drugs-40"><span data-dcnode-id="2984" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2981" instrument_node="">
</span></p><p data-dcnode-id="2956"><span data-dcnode-id="2979" instrument_node="">The rhizomes contain </span><a data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stilbenoid" title="Stilbenoid"><span data-dcnode-id="2978" instrument_node="">stilbenoid</span></a><span data-dcnode-id="2976" instrument_node=""> compounds (including </span><a data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhaponticin" title="Rhaponticin"><span data-dcnode-id="2975" instrument_node="">rhaponticin</span></a><span data-dcnode-id="2973" instrument_node="">), and the </span><a class="mw-redirect" data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flavanol" title="Flavanol"><span data-dcnode-id="2972" instrument_node="">flavanol</span></a><span data-dcnode-id="2970" instrument_node=""> </span><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glucoside" title="Glucoside"><span data-dcnode-id="2969" instrument_node="">glucosides</span></a><span data-dcnode-id="2967" instrument_node=""> (+)-</span><a data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechin-5-O-glucoside" title="Catechin-5-O-glucoside"><span data-dcnode-id="2966" instrument_node="">catechin-5-O-glucoside</span></a><span data-dcnode-id="2964" instrument_node=""> and (−)-</span><a data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechin-7-O-glucoside" title="Catechin-7-O-glucoside"><span data-dcnode-id="2963" instrument_node="">catechin-7-O-glucoside</span></a><span data-dcnode-id="2961" instrument_node="">.</span><sup class="reference" data-dcnode-id="2958" id="cite_ref-Nonaka_41-0"><a data-dcnode-id="2959" href="#cite_note-Nonaka-41"><span data-dcnode-id="2960" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2957" instrument_node="">
</span></p><span data-dcnode-id="2955" instrument_node="">
</span><h3 data-dcnode-id="2945"><span class="mw-headline" data-dcnode-id="2953" id="Oxalic_acid"><span data-dcnode-id="2954" instrument_node="">Oxalic acid</span></span><span class="mw-editsection" data-dcnode-id="2946"><span class="mw-editsection-bracket" data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">[</span></span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D10" title="Edit section: Oxalic acid"><span data-dcnode-id="2950" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2944" instrument_node="">
</span><p data-dcnode-id="2913"><span data-dcnode-id="2943" instrument_node="">Rhubarb leaves contain </span><a data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poison" title="Poison"><span data-dcnode-id="2942" instrument_node="">poisonous</span></a><span data-dcnode-id="2940" instrument_node=""> substances, including </span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxalic_acid" title="Oxalic acid"><span data-dcnode-id="2939" instrument_node="">oxalic acid</span></a><span data-dcnode-id="2937" instrument_node="">, a </span><a class="mw-redirect" data-dcnode-id="2935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nephrotoxin" title="Nephrotoxin"><span data-dcnode-id="2936" instrument_node="">nephrotoxin</span></a><span data-dcnode-id="2934" instrument_node="">.</span><sup class="reference" data-dcnode-id="2931" id="cite_ref-drugs_40-2"><a data-dcnode-id="2932" href="#cite_note-drugs-40"><span data-dcnode-id="2933" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2930" instrument_node=""> The long term consumption of oxalic acid leads to kidney stone formation in humans. Humans have been poisoned after ingesting the leaves, a particular problem during </span><a data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="2929" instrument_node="">World War I</span></a><span data-dcnode-id="2927" instrument_node=""> when the leaves were mistakenly recommended as a food source in Britain.</span><sup class="reference" data-dcnode-id="2924" id="cite_ref-42"><a data-dcnode-id="2925" href="#cite_note-42"><span data-dcnode-id="2926" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="2921" id="cite_ref-43"><a data-dcnode-id="2922" href="#cite_note-43"><span data-dcnode-id="2923" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="2918" id="cite_ref-44"><a data-dcnode-id="2919" href="#cite_note-44"><span data-dcnode-id="2920" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2917" instrument_node=""> The toxic rhubarb leaves have been used in flavouring extracts, after the oxalic acid is removed by treatment with precipitated chalk (i.e., </span><a data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calcium_carbonate" title="Calcium carbonate"><span data-dcnode-id="2916" instrument_node="">calcium carbonate</span></a><span data-dcnode-id="2914" instrument_node="">).
</span></p><p data-dcnode-id="2862"><span data-dcnode-id="2912" instrument_node="">The </span><a data-dcnode-id="2908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Median_lethal_dose" title="Median lethal dose"><span data-dcnode-id="2911" instrument_node="">LD</span><sub data-dcnode-id="2909" style="font-size:-1"><span data-dcnode-id="2910" instrument_node="">50</span></sub></a><span data-dcnode-id="2907" instrument_node=""> (median lethal dose) for pure oxalic acid in rats is about 375 mg/kg </span><a class="mw-redirect" data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Body_weight" title="Body weight"><span data-dcnode-id="2906" instrument_node="">body weight</span></a><span data-dcnode-id="2904" instrument_node="">,</span><sup class="reference" data-dcnode-id="2901" id="cite_ref-45"><a data-dcnode-id="2902" href="#cite_note-45"><span data-dcnode-id="2903" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2900" instrument_node=""> or about 25 grams for a 65-kilogram (143&nbsp;lb) human. Other sources give a much higher oral </span><a class="mw-redirect" data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lowest_published_lethal_dose" title="Lowest published lethal dose"><span data-dcnode-id="2899" instrument_node="">LD</span><sub data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Lo</span></sub></a><span data-dcnode-id="2895" instrument_node=""> (lowest published lethal dose) of 600&nbsp;mg/kg.</span><sup class="reference" data-dcnode-id="2892" id="cite_ref-46"><a data-dcnode-id="2893" href="#cite_note-46"><span data-dcnode-id="2894" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2891" instrument_node=""> While the oxalic acid content of rhubarb leaves can vary, a typical value is about 0.5%,</span><sup class="reference" data-dcnode-id="2888" id="cite_ref-47"><a data-dcnode-id="2889" href="#cite_note-47"><span data-dcnode-id="2890" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2887" instrument_node=""> meaning a 65&nbsp;kg adult would need to eat 4 to 8&nbsp;kg (9 to 18&nbsp;lbs) to obtain a lethal dose, depending on which lethal dose is assumed.  Cooking the leaves with </span><a data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sodium_bicarbonate" title="Sodium bicarbonate"><span data-dcnode-id="2886" instrument_node="">baking soda</span></a><span data-dcnode-id="2884" instrument_node=""> can make them more poisonous by producing soluble </span><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxalate" title="Oxalate"><span data-dcnode-id="2883" instrument_node="">oxalates</span></a><span data-dcnode-id="2881" instrument_node="">.</span><sup class="reference" data-dcnode-id="2878" id="cite_ref-48"><a data-dcnode-id="2879" href="#cite_note-48"><span data-dcnode-id="2880" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2877" instrument_node=""> The leaves are believed to also contain an additional, unidentified toxin,</span><sup class="reference" data-dcnode-id="2874" id="cite_ref-49"><a data-dcnode-id="2875" href="#cite_note-49"><span data-dcnode-id="2876" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2873" instrument_node=""> which might be an anthraquinone </span><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glycoside" title="Glycoside"><span data-dcnode-id="2872" instrument_node="">glycoside</span></a><span data-dcnode-id="2870" instrument_node=""> (also known as </span><a data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senna_glycoside" title="Senna glycoside"><span data-dcnode-id="2869" instrument_node="">senna glycosides</span></a><span data-dcnode-id="2867" instrument_node="">).</span><sup class="reference" data-dcnode-id="2864" id="cite_ref-50"><a data-dcnode-id="2865" href="#cite_note-50"><span data-dcnode-id="2866" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2863" instrument_node="">
</span></p><p data-dcnode-id="2833"><span data-dcnode-id="2861" instrument_node="">In the </span><a data-dcnode-id="2859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petiole_%28botany%29" title="Petiole (botany)"><span data-dcnode-id="2860" instrument_node="">petioles</span></a><span data-dcnode-id="2858" instrument_node=""> (leaf stalks), the proportion of oxalic acid is about 10% of the total 2–2.5% acidity, which derives mainly from </span><a data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malic_acid" title="Malic acid"><span data-dcnode-id="2857" instrument_node="">malic acid</span></a><span data-dcnode-id="2855" instrument_node="">.</span><sup class="reference" data-dcnode-id="2852" id="cite_ref-b1_12-1"><a data-dcnode-id="2853" href="#cite_note-b1-12"><span data-dcnode-id="2854" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2851" instrument_node=""> Serious cases of rhubarb poisoning are not well documented.</span><sup class="reference" data-dcnode-id="2848" id="cite_ref-Barceloux2009_51-0"><a data-dcnode-id="2849" href="#cite_note-Barceloux2009-51"><span data-dcnode-id="2850" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2847" instrument_node=""> Both fatal and non-fatal cases of rhubarb poisoning may be caused not by oxalates, but rather by toxic </span><a data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthraquinone" title="Anthraquinone"><span data-dcnode-id="2846" instrument_node="">anthraquinone</span></a><span data-dcnode-id="2844" instrument_node=""> glycosides.</span><sup class="reference" data-dcnode-id="2841" id="cite_ref-drugs_40-3"><a data-dcnode-id="2842" href="#cite_note-drugs-40"><span data-dcnode-id="2843" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="2838" id="cite_ref-Barceloux2009_51-1"><a data-dcnode-id="2839" href="#cite_note-Barceloux2009-51"><span data-dcnode-id="2840" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="2835" id="cite_ref-savage1999_52-0"><a data-dcnode-id="2836" href="#cite_note-savage1999-52"><span data-dcnode-id="2837" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2834" instrument_node="">
</span></p><span data-dcnode-id="2832" instrument_node="">
</span><h2 data-dcnode-id="2822"><span class="mw-headline" data-dcnode-id="2830" id="Pests"><span data-dcnode-id="2831" instrument_node="">Pests</span></span><span class="mw-editsection" data-dcnode-id="2823"><span class="mw-editsection-bracket" data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">[</span></span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D11" title="Edit section: Pests"><span data-dcnode-id="2827" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2821" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2820" instrument_node="">The rhubarb curculio, </span><i data-dcnode-id="2817"><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lixus_concavus" title="Lixus concavus"><span data-dcnode-id="2819" instrument_node="">Lixus concavus</span></a></i><span data-dcnode-id="2816" instrument_node="">, is a </span><a data-dcnode-id="2814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weevil" title="Weevil"><span data-dcnode-id="2815" instrument_node="">weevil</span></a><span data-dcnode-id="2813" instrument_node="">. Rhubarb is a host, damage being visible mainly on the leaves and stalks, with </span><a data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gummosis" title="Gummosis"><span data-dcnode-id="2812" instrument_node="">gummosis</span></a><span data-dcnode-id="2810" instrument_node="">, and oval or circular feeding and/or egg-laying sites.</span><sup class="reference" data-dcnode-id="2807" id="cite_ref-53"><a data-dcnode-id="2808" href="#cite_note-53"><span data-dcnode-id="2809" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2806" instrument_node="">
</span></p><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Hungry wildlife may dig up and eat rhubarb roots in the spring, as stored starches are turned to sugars for new foliage growth.
</span></p><span data-dcnode-id="2802" instrument_node="">
</span><h2 data-dcnode-id="2792"><span class="mw-headline" data-dcnode-id="2800" id="In_Zoroastrian_mythology"><span data-dcnode-id="2801" instrument_node="">In Zoroastrian mythology</span></span><span class="mw-editsection" data-dcnode-id="2793"><span class="mw-editsection-bracket" data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">[</span></span><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRhubarb%26action%3Dedit%26section%3D12" title="Edit section: In Zoroastrian mythology"><span data-dcnode-id="2797" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2743"><span data-dcnode-id="2790" instrument_node="">According to certain </span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Persian" title="Middle Persian"><span data-dcnode-id="2789" instrument_node="">Middle Persian</span></a><span data-dcnode-id="2787" instrument_node=""> </span><a data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zoroastrianism" title="Zoroastrianism"><span data-dcnode-id="2786" instrument_node="">Zoroastrian</span></a><span data-dcnode-id="2784" instrument_node=""> texts dealing with the creation of humankind, </span><a data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mashya_and_Mashyana" title="Mashya and Mashyana"><span data-dcnode-id="2783" instrument_node="">Mashya and Mashyana</span></a><span data-dcnode-id="2781" instrument_node="">, the first human couple, first manifested on the earth as conjoined </span><a data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homunculus" title="Homunculus"><span data-dcnode-id="2780" instrument_node="">homunculi</span></a><span data-dcnode-id="2778" instrument_node=""> growing attached to a (ghostly) rhubarb plant. When </span><a data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keyumars" title="Keyumars"><span data-dcnode-id="2777" instrument_node="">Gayomart</span></a><span data-dcnode-id="2775" instrument_node="">, the prototype of humanity, finally died as a result of the machinations of </span><a data-dcnode-id="2773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahriman" title="Ahriman"><span data-dcnode-id="2774" instrument_node="">Ahriman</span></a><span data-dcnode-id="2772" instrument_node=""> the principle of evil and </span><a class="mw-redirect" data-dcnode-id="2770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeh" title="Jeh"><span data-dcnode-id="2771" instrument_node="">Jeh</span></a><span data-dcnode-id="2769" instrument_node=""> the demonic whore, he fell onto his left side and </span><a data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ejaculation" title="Ejaculation"><span data-dcnode-id="2768" instrument_node="">ejaculated</span></a><span data-dcnode-id="2766" instrument_node=""> onto the ground. The sun's rays gradually purified his </span><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Semen" title="Semen"><span data-dcnode-id="2765" instrument_node="">semen</span></a><span data-dcnode-id="2763" instrument_node="">, two parts being cared for by the messenger deity Neryosang and one part by </span><a data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spenta_Armaiti" title="Spenta Armaiti"><span data-dcnode-id="2762" instrument_node="">Spendarmad</span></a><span data-dcnode-id="2760" instrument_node="">, </span><a data-dcnode-id="2758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amesha_Spenta" title="Amesha Spenta"><span data-dcnode-id="2759" instrument_node="">Amesha Spenta</span></a><span data-dcnode-id="2757" instrument_node=""> of the Earth. After the passage of forty years, Spendarmad's portion gave rise to the rhubarb plant bearing the human couple, who were then animated by the supreme deity </span><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahura_Mazda" title="Ahura Mazda"><span data-dcnode-id="2756" instrument_node="">Ohrmazd</span></a><span data-dcnode-id="2754" instrument_node=""> by means of the </span><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khvarenah" title="Khvarenah"><span data-dcnode-id="2753" instrument_node="">Farr</span></a><span data-dcnode-id="2751" instrument_node=""> ('kingly glory').</span><sup class="reference" data-dcnode-id="2748" id="cite_ref-54"><a data-dcnode-id="2749" href="#cite_note-54"><span data-dcnode-id="2750" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="2745" id="cite_ref-55"><a data-dcnode-id="2746" href="#cite_note-55"><span data-dcnode-id="2747" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2744" instrument_node="">
</span></p><span data-dcnode-id="2742" instrument_node="">
</span><blockquote data-dcnode-id="2712"><p data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node=""> 5. After Gayomard had emitted his seed as he lay dying, they filtered the seed by means of the light of the Sun; Neryosang guarded two parts of it, and Spandarmad accepted one part; and [it remained within the earth] for forty years.
</span></p><p data-dcnode-id="2732"><span data-dcnode-id="2739" instrument_node="">6. [On the completion of forty years,] Mashye and Mashyane grew up from the earth in the </span><a data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astral_body" title="Astral body"><span data-dcnode-id="2738" instrument_node="">astral body</span></a><span data-dcnode-id="2736" instrument_node=""> of a </span><i data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">rivas</span></i><span data-dcnode-id="2733" instrument_node=""> (= rhubarb) plant having one stem of fifteen leaves, in such wise that their hands rested behind over their shoulders, and they were joined to each other, of the same height, and of the same product.
</span></p><p data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">7. Betwixt them both light came up; and they were of such uniform height that it [was] not evident which was the male and which the female, and [with] which [of them] was the light [given by] Ohrmazd, [that is, the light onto which the seed of the mortal being was affixed.]...
</span></p><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">9. Then both of them changed from the astral body of a plant in to the astral body of a man, and that light, which is the soul, entered spiritually into them, that is, verily, they had grown up in the semblance of a tree, whose fruit was the ten races of mankind.
</span></p><span data-dcnode-id="2727" instrument_node="">
</span><p data-dcnode-id="2713"><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node="">Iranian or Greater </span><i data-dcnode-id="2722"><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bundahishn" title="Bundahishn"><span data-dcnode-id="2724" instrument_node="">Bundahishn</span></a></i><span data-dcnode-id="2721" instrument_node=""> ( 8th–9th century CE )</span><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node=""> selected verses from Chapter 14: 'Concerning Humankind'</span><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">( extract from the English translation by Behramgore Tehmuras Anklesaria ).</span><sup class="reference" data-dcnode-id="2714" id="cite_ref-56"><a data-dcnode-id="2715" href="#cite_note-56"><span data-dcnode-id="2716" instrument_node="">[56]</span></a></sup></p></blockquote><span data-dcnode-id="2711" instrument_node="">
