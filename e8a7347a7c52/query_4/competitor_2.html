</span><p align="center" data-dcnode-id="191"><font color="#F7D117" data-dcnode-id="192" style="font-size: 20pt"><strong data-dcnode-id="193"><span data-dcnode-id="204" instrument_node="">
</span><span data-dcnode-id="198" style="font-family: Arial; letter-spacing: 1px"><span data-dcnode-id="203" instrument_node="">Yorkshire Grown</span><br data-dcnode-id="202"><span data-dcnode-id="201" instrument_node="">

</span><img border="0" data-dcnode-id="195" height="22" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yorkshirerhubarb.co.uk/images/clear.gif&amp;raw" width="50"></span></strong></font></p></td></tr><tr data-dcnode-id="7"><td align="left" data-dcnode-id="9" valign="top" width="384"><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="167" style="line-height: 150%"><font color="#F7D117" data-dcnode-id="178"><strong data-dcnode-id="179"><span data-dcnode-id="184" instrument_node="">
</span><span data-dcnode-id="180" style="font-family: Tahoma"><span data-dcnode-id="183" instrument_node="">ANCIENT HISTORY</span><br data-dcnode-id="182"><span data-dcnode-id="181" instrument_node="">
</span></span></strong></font><font color="#FFFFFF" data-dcnode-id="168"><span data-dcnode-id="177" instrument_node="">
</span><span data-dcnode-id="169" style="font-family: Tahoma"><span data-dcnode-id="176" instrument_node="">The earliest recorded use of rhubarb is 2700BC, although its use is 
		thought to date back much further. At this time rhubarbs use was as a 
		very important drug of the time, being used for a variety of ailments 
		particularly gut, lung and liver problems. </span><br data-dcnode-id="175"><span data-dcnode-id="174" instrument_node="">
		Marco Polo is attributed in bringing the drug to Europe in the 
		thirteenth century when it was referred to as the Rhacoma root.</span><br data-dcnode-id="173"><span data-dcnode-id="172" instrument_node="">
		The drug was so highly regarded and much sought after that in 1657 in 
		England it could command three times the price of Opium.</span><br data-dcnode-id="171"><span data-dcnode-id="170" instrument_node="">
		The first time the plant was seen growing in Britain was in the 
		sixteenth century when the seeds were introduced in an attempt to grow 
		and process the drug here, but the wrong strain was imported and 
		eventually its use in this country went into decline as the British 
		version simply did not work. The rise of modern medicine eventually took 
		over from the wondrous drug.</span></span></font></p><span data-dcnode-id="166" instrument_node="">
</span><p data-dcnode-id="129" style="line-height: 150%"><font color="#F7D117" data-dcnode-id="161"><strong data-dcnode-id="162"><span data-dcnode-id="165" instrument_node="">
</span><span data-dcnode-id="163" style="font-family: Tahoma"><span data-dcnode-id="164" instrument_node="">RHUBARB IN THE DIET</span></span></strong></font><font color="#FFFFFF" data-dcnode-id="151"><span data-dcnode-id="152" style="font-family: Tahoma"><br data-dcnode-id="160"><span data-dcnode-id="159" instrument_node="">
		Rhubarb was first used in English cooking in the late eighteenth century 
		probably in an attempt to get the benefits of the drug into the body 
		(although it had been used extensively in Syria and Persia since the 
		thirteenth century) only gaining in favour with the British when the 
		forcing process was discovered in Chelsea Physic Gardens in 1817, when 
		some roots were accidentally covered with soil in the depth of winter. 
		On removing the soil some weeks later tender shoots were noticed. These 
		were found to have a superior flavour and quality than anything ever 
		seen before. From this initial discovery of blanching rhubarb, 
		commercial growers in the London area</span><br data-dcnode-id="158"><span data-dcnode-id="157" instrument_node="">
		began growing or blanching rhubarb, covering with soil or manure, some 
		taking it a stage further, actually lifting the roots and placing in 
		buildings to grow on. Rhubarb at last found favour with the British.</span><br data-dcnode-id="156"><span data-dcnode-id="155" instrument_node="">
</span><br data-dcnode-id="154"><span data-dcnode-id="153" instrument_node="">
</span></span></font><font color="#F7D117" data-dcnode-id="144"><strong data-dcnode-id="145"><span data-dcnode-id="150" instrument_node="">
</span><span data-dcnode-id="146" style="font-family: Tahoma"><span data-dcnode-id="149" instrument_node="">RHUBARB IN YORKSHIRE</span><br data-dcnode-id="148"><span data-dcnode-id="147" instrument_node="">
</span></span></strong></font><font color="#FFFFFF" data-dcnode-id="130"><span data-dcnode-id="143" instrument_node="">
</span><span data-dcnode-id="131" style="font-family: Tahoma"><span data-dcnode-id="142" instrument_node="">In 1877 the forcing of rhubarb began in Yorkshire. The Whitwell family 
		of Leeds are generally regarded as being the first large-scale grower to 
		cause significant damage to the London growers. </span><br data-dcnode-id="141"><span data-dcnode-id="140" instrument_node="">
		It was the first place in the world that special sheds were erected just 
		for the purpose of growing rhubarb out of season; the early basic 
		technique was further developed and made their own by the Yorkshire 
		growers. </span><br data-dcnode-id="139"><span data-dcnode-id="138" instrument_node="">
		The soil in the area proved perfect for growth of the substantial root 
		systems necessary to produced sufficient yields of high quality sticks 
		worthy of a premium price capable of covering the high production costs 
		associated with this crop. </span><br data-dcnode-id="137"><span data-dcnode-id="136" instrument_node="">
		As rhubarb’s popularity increased so did the producers in this area, 
		numbering at rhubarb’s height in popularity well over 200. </span><br data-dcnode-id="135"><span data-dcnode-id="134" instrument_node="">
		The quality of the Yorkshire crop became renowned, and demand for it 
		became so huge that eventually producers in other areas of Britain 
		simply could not compete, and eventually stopped altogether.</span><br data-dcnode-id="133"><span data-dcnode-id="132" instrument_node="">
		The producers were centralised between Leeds, Wakefield and Bradford, 
		which became known world wide as The Rhubarb Triangle, the centre for 
		the world’s production of forced rhubarb.</span></span></font></p><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="123" style="line-height: 150%"><font color="#FFFFFF" data-dcnode-id="124"><span data-dcnode-id="127" instrument_node="">
</span><span data-dcnode-id="125" style="font-family: Tahoma"><span data-dcnode-id="126" instrument_node="">Rhubarb, a native of Siberia was 
		originally found growing on the banks of the river Volga.</span></span></font></p><span data-dcnode-id="122" instrument_node="">
</span><p data-dcnode-id="111" style="line-height: 150%"><font color="#FFFFFF" data-dcnode-id="112"><span data-dcnode-id="121" instrument_node="">
</span><span data-dcnode-id="113" style="font-family: Tahoma"><span data-dcnode-id="120" instrument_node="">This tells us two important things 
		about the plant’s requirements.</span><br data-dcnode-id="119"><span data-dcnode-id="118" instrument_node="">
		1. Cold</span><br data-dcnode-id="117"><span data-dcnode-id="116" instrument_node="">
		2. Water</span><br data-dcnode-id="115"><span data-dcnode-id="114" instrument_node="">
		The third import requirement is Nitrogen.</span></span></font></p><span data-dcnode-id="110" instrument_node="">
</span><p data-dcnode-id="91" style="line-height: 150%"><font color="#FFFFFF" data-dcnode-id="100"><span data-dcnode-id="109" instrument_node="">
</span><span data-dcnode-id="101" style="font-family: Tahoma"><span data-dcnode-id="108" instrument_node="">The Rhubarb Triangle, situated in the 
		shadows of the Pennines, is in fact in a frost pocket. </span><br data-dcnode-id="107"><span data-dcnode-id="106" instrument_node="">
		The Pennines have proved invaluable to the growers, as they also give us 
		the high rainfall necessary to the plant. The Pennines also gave rise to 
		the woollen industry in the area. As sheep grazed on its bleak hills 
		they provided the wool for this other important Yorkshire industry. The 
		Yorkshire water provided the power to work the massive looms.</span><br data-dcnode-id="105"><span data-dcnode-id="104" instrument_node="">
</span><br data-dcnode-id="103"><span data-dcnode-id="102" instrument_node="">
</span></span></font><font color="#F7D117" data-dcnode-id="97"><i data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">(Yorkshire water some say helps to give 
		the rhubarb its preferred flavour, as in the forcing sheds they are 
		watered using only mains water.)</span></i></font><font color="#FFFFFF" data-dcnode-id="92"><br data-dcnode-id="96"><span data-dcnode-id="95" instrument_node="">
</span><br data-dcnode-id="94"><span data-dcnode-id="93" instrument_node="">
		Almost as if following some great master plan the woollen industry gave 
		the rhubarb industry the third important plant requirement, SHODDY, a 
		waste by-product to them, but to the rhubarb industry, high nitrogen 
		feed, cheap and readily available. The beauty of the nitrogen it 
		supplies is that it is released slowly over a three year period as the 
		fibres break down.</span></font></p><span data-dcnode-id="90" instrument_node="">
</span><p data-dcnode-id="85" style="line-height: 150%"><font color="#FFFFFF" data-dcnode-id="86"><span data-dcnode-id="89" instrument_node="">
</span><span data-dcnode-id="87" style="font-family: Tahoma"><span data-dcnode-id="88" instrument_node="">The massive Yorkshire coalfields 
		provided a cheap local source of fuel to heat the sheds.</span></span></font></p><span data-dcnode-id="84" instrument_node="">
</span><p data-dcnode-id="77" style="line-height: 150%"><font color="#FFFFFF" data-dcnode-id="78"><span data-dcnode-id="83" instrument_node="">
</span><span data-dcnode-id="79" style="font-family: Tahoma"><span data-dcnode-id="82" instrument_node="">Geographically centrally positioned in 
		Great Britain, coincidentally where railroads crossed, gave the 
		producers a transport system to any corner of the country, so that the 
		days harvest could be in the market the next morning. Special trains 
		left the area nightly, mostly bound for the old Covent Garden market, 
		and from there large amounts were sold on into Europe.</span><br data-dcnode-id="81"><span data-dcnode-id="80" instrument_node="">
		The trains became known as the Rhubarb Express trains as they rushed to 
		get their valuable cargo to market, carriage after carriage containing 
		only rhubarb.</span></span></font></p><span data-dcnode-id="76" instrument_node="">
</span><p data-dcnode-id="67" style="line-height: 150%"><font color="#FFFFFF" data-dcnode-id="68"><span data-dcnode-id="75" instrument_node="">
</span><span data-dcnode-id="69" style="font-family: Tahoma"><span data-dcnode-id="74" instrument_node="">During the Second World War the 
		government controlled the price of Yorkshire forced rhubarb at one 
		shilling per pound to keep it financially within the means of the 
		ordinary people.</span><br data-dcnode-id="73"><span data-dcnode-id="72" instrument_node="">
		Rhubarb became part of the staple diet of war time Britain, and 
		Yorkshire forced rhubarb became almost a national institution.</span><br data-dcnode-id="71"><span data-dcnode-id="70" instrument_node="">
		The industry became one of the largest providers of employment for the 
		area, as production year on year increased.</span></span></font></p><span data-dcnode-id="66" instrument_node="">
</span><p data-dcnode-id="57" style="line-height: 150%"><font color="#FFFFFF" data-dcnode-id="58"><span data-dcnode-id="65" instrument_node="">
</span><span data-dcnode-id="59" style="font-family: Tahoma"><span data-dcnode-id="64" instrument_node="">Family secrets of production and each 
		families individual much prized strains were handed down from generation 
		to generation. Family names such </span><br data-dcnode-id="63"><span data-dcnode-id="62" instrument_node="">
		as Cartlidge, Wade, Asquith, Smith, Dobson, and Oldroyd became 
		synonymous with Yorkshire </span><br data-dcnode-id="61"><span data-dcnode-id="60" instrument_node="">
		rhubarb, and growers “fought” to gain the much prized awards for their 
		own particular strains at the annual rhubarb show.</span></span></font></p><span data-dcnode-id="56" instrument_node="">
</span><p data-dcnode-id="36" style="line-height: 150%"><font color="#F7D117" data-dcnode-id="51"><span data-dcnode-id="55" instrument_node="">
</span><span data-dcnode-id="52" style="font-family: Tahoma; font-weight: 700"><span data-dcnode-id="54" instrument_node="">The ‘Crumbling’ of 
		an empire</span><br data-dcnode-id="53"></span></font><font color="#FFFFFF" data-dcnode-id="37"><span data-dcnode-id="50" instrument_node="">
</span><span data-dcnode-id="38" style="font-family: Tahoma"><span data-dcnode-id="49" instrument_node="">Unfortunately when you are at the top 
		the only way </span><br data-dcnode-id="48"><span data-dcnode-id="47" instrument_node="">
		is down, as with any over exposed celebrity. War time Britain’s palate 
		was rather on the sweet side, and they simply could not get the sugar 
		that they required to bring this sharp flavoured vegetable to their 
		taste. Eating large amounts of an item that many found </span><br data-dcnode-id="46"><span data-dcnode-id="45" instrument_node="">
		too sharp did rhubarb no favours. However well meaning were the parents 
		who made children, ‘eat up your rhubarb its good for you’ helped to turn 
		a generation away from rhubarb as they were nearly force fed the stuff.</span><br data-dcnode-id="44"><span data-dcnode-id="43" instrument_node="">
		Although they probably did not know why, rhubarb was good for them, it 
		actually helped along with the rest of their diet, to keep them very 
		healthy.</span><br data-dcnode-id="42"><span data-dcnode-id="41" instrument_node="">
		Sticks of rhubarb and a bag of sugar given to children to substitute 
		their sweet ration, now bring back fond childhood memories to many.</span><br data-dcnode-id="40"><span data-dcnode-id="39" instrument_node="">
		Lumpy custard and stodgy green rhubarb crumble for school dinner won 
		rhubarb no friends.</span></span></font></p><span data-dcnode-id="35" instrument_node="">
</span><p data-dcnode-id="26" style="line-height: 150%"><font color="#FFFFFF" data-dcnode-id="27"><span data-dcnode-id="34" instrument_node="">
</span><span data-dcnode-id="28" style="font-family: Tahoma"><span data-dcnode-id="33" instrument_node="">After the war, suddenly as overseas 
		trade began and quick easy refrigerated logistics made a wide range of 
		new tropical fruits readily available. Poor old rhubarb was left on the 
		shelf (or in this case the garden).</span><br data-dcnode-id="32"><span data-dcnode-id="31" instrument_node="">
		This spelt disaster for the rhubarb triangle, as the producers were 
		massively over producing resulting in a loss on their production costs, 
		some went bankrupt, others sold up before they did,</span><br data-dcnode-id="30"><span data-dcnode-id="29" instrument_node="">
		others turned to other crops Year on year growers left the industry
		</span></span></font></p><span data-dcnode-id="25" instrument_node="">
</span><p data-dcnode-id="18" style="line-height: 150%"><font color="#FFFFFF" data-dcnode-id="19"><span data-dcnode-id="24" instrument_node="">
</span><span data-dcnode-id="20" style="font-family: Tahoma"><span data-dcnode-id="23" instrument_node="">Being part of the heritage of the 
		Wakefield / Leeds area, and having current public interest in its 
		production techniques visitor’s flock to the Wakefield annual rhubarb 
		festival as the humble rhubarb sheds have now become a tourist
