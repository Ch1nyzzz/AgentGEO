</span></li><span data-dcnode-id="1323" instrument_node="">
</span></ul></div><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">While rhubarb is often propagated from root divisions, growing rhubarb from seed is a much more economical method.&nbsp; Many commercial rhubarb plants available from nursery catalogs are just seedlings grown out for a year or two.&nbsp;</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">If you’re patient, it’s easy enough to grow hundreds of rhubarb seedlings for the price of one nursery rhubarb plant.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1311"><img alt="Handful of rhubarb seed" class="aligncenter size-full wp-image-8420 jetpack-lazy-image jetpack-lazy-image--handled lazyloaded" data-dcnode-id="1314" data-lazy-loaded="1" data-ll-status="loaded" data-recalc-dims="1" height="400" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-Seed.jpg%3Fresize%3D600%252C400%26ssl%3D1&amp;raw" width="600"><noscript data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-8420" src="https://i0.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-Seed.jpg?resize=600%2C400&amp;#038;ssl=1" alt="Handful of rhubarb seed" width="600" height="400"  data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" id="more-7394"></span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node="">Like many perennials, rhubarb doesn’t come true to seed.&nbsp; Apples are the same way, and while you can </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalselfreliance.com/planting-apple-seeds/" sl-processed="1"><span data-dcnode-id="1305" instrument_node="">grow apples from seed</span></a><span data-dcnode-id="1303" instrument_node="">, you never quite know what you’ll get.&nbsp;</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">The seeds of any given plant will produce offspring that won’t be the same as the parent, but that’s not always a bad thing.&nbsp; Every variety we know and love today was once a seedling, and it’s just been propagated ever since.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Unlike apples, which can be really different from their parents, rhubarb seedlings are only subtly different.&nbsp; For the most part, they’re quite similar, and only a true rhubarb connoisseur can really tell the difference most of the time.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Victoria Rhubarb, a type of heirloom rhubarb, is known for coming true to seed.&nbsp; It’s one of the most popular types of garden rhubarb in the Northeast.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Still, I was skeptical.&nbsp; I love my rhubarb, and I was pretty sure I’d know…until I learned one of our local commercial farms grows all their rhubarb from seed for their CSA and market sales.&nbsp; A friend of mine runs the farm, and she mentioned that they were going to add rhubarb to their spring CSA, and had just put in 1,000 plants.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">I said, “Woah, that’s quite the investment!”&nbsp; Thinking they’d just dropped like $10k on rhubarb.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">She answered a bit confused, “Not really, about $10 in seed.”&nbsp;</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1277"><em data-dcnode-id="1278"><span data-dcnode-id="1282" instrument_node="">(</span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gopjn.com/t/TUJGRkpOTkJGTEpKSkxCRkpNSkpO%3Furl%3Dhttps%253A%252F%252Fwww.edenbrothers.com%252Fstore%252Frhubarb-seeds-victoria.html" rel="nofollow noopener noreferrer" sl-processed="1" target="_blank"><span data-dcnode-id="1281" instrument_node="">Seeds are available here</span></a><span data-dcnode-id="1279" instrument_node="">, by the packet, or in bulk.)</span></em></p><span data-dcnode-id="1276" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1270" id="attachment_8422" style="width: 610px"><img alt="Young one year old seedling rhubarb (front) next to an established 10+ year old crown." aria-describedby="caption-attachment-8422" class="size-full wp-image-8422 jetpack-lazy-image jetpack-lazy-image--handled lazyloaded" data-dcnode-id="1275" data-lazy-loaded="1" data-ll-status="loaded" data-recalc-dims="1" height="900" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/young-rhubarb.jpg%3Fresize%3D600%252C900%26ssl%3D1&amp;raw" width="600"><noscript data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">&lt;img aria-describedby="caption-attachment-8422" loading="lazy" class="size-full wp-image-8422" src="https://i2.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/young-rhubarb.jpg?resize=600%2C900&amp;#038;ssl=1" alt="Young one year old seedling rhubarb (front) next to an established 10+ year old crown." width="600" height="900"  data-recalc-dims="1"&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1271" id="caption-attachment-8422"><span data-dcnode-id="1272" instrument_node="">Young one-year-old seedling rhubarb (front) next to an established 10+-year-old crown.</span></p></div><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">I was impressed at the cost savings, but still skeptical.&nbsp; I forgot all about it, until about 3 years later when I stopped by her farmer’s market booth.&nbsp;</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Sure enough, there was a full stand of rhubarb.&nbsp; I had to know, so I bought some…and it was absolutely delicious.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">That summer I saved my first rhubarb seed, and the following spring our rhubarb seedling empire began.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><h2 data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Saving Rhubarb Seed</span></h2><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1256" instrument_node="">The first step in growing rhubarb from seed is saving the seed from your existing plants (or, just buying a packet).&nbsp; A single rhubarb plant produces literally hundreds of seeds, and when you </span><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gopjn.com/t/TUJGRkpOTkJGTEpKSkxCRkpNSkpO%3Furl%3Dhttps%253A%252F%252Fwww.edenbrothers.com%252Fstore%252Frhubarb-seeds-victoria.html" rel="nofollow noopener noreferrer" sl-processed="1" target="_blank"><span data-dcnode-id="1255" instrument_node="">buy them by the packet they’re about 10 cents per seed</span></a><span data-dcnode-id="1253" instrument_node="">.&nbsp; Still a good deal, but a much better deal if you can just save seed.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Rhubarb plants send up a flower stalk in the early spring, and most gardeners break it off so that the plant puts more energy into producing stalks.&nbsp; Leave a few, on your best tasting rhubarb plants.&nbsp;&nbsp;</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">They look like this as they’re starting to unfurl…</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1241"><img alt="A young rhubarb flower stalk starting to grow from a dense rhubarb bed" class="aligncenter size-full wp-image-8416 jetpack-lazy-image jetpack-lazy-image--handled lazyloaded" data-dcnode-id="1244" data-lazy-loaded="1" data-ll-status="loaded" data-recalc-dims="1" height="400" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Young-rhubarb-flower-stalk.jpg%3Fresize%3D600%252C400%26ssl%3D1&amp;raw" width="600"><noscript data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-8416" src="https://i1.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Young-rhubarb-flower-stalk.jpg?resize=600%2C400&amp;#038;ssl=1" alt="A young rhubarb flower stalk starting to grow from a dense rhubarb bed" width="600" height="400"  data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Give them a bit more time, and that same flower stalk will open up into a profusion of beautiful tiny white blossoms.&nbsp;</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">It’s really quite lovely, and the bees can’t get enough of them.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1230"><img alt="Rhubarb flower stalk in bloom" class="aligncenter size-full wp-image-8417 jetpack-lazy-image jetpack-lazy-image--handled lazyloaded" data-dcnode-id="1233" data-lazy-loaded="1" data-ll-status="loaded" data-recalc-dims="1" height="400" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-flower-stalk.jpg%3Fresize%3D600%252C400%26ssl%3D1&amp;raw" width="600"><noscript data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-8417" src="https://i1.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-flower-stalk.jpg?resize=600%2C400&amp;#038;ssl=1" alt="Rhubarb flower stalk in bloom" width="600" height="400"  data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">The blooms open in stages.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">You’ll see some small green seed heads forming as the last blossoms are just opening.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1219"><img alt="Rhubarb seeds beginning to form" class="aligncenter size-full wp-image-8418 jetpack-lazy-image jetpack-lazy-image--handled lazyloaded" data-dcnode-id="1222" data-lazy-loaded="1" data-ll-status="loaded" data-recalc-dims="1" height="400" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Young-Rhubarb-Seeds.jpg%3Fresize%3D600%252C400%26ssl%3D1&amp;raw" width="600"><noscript data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-8418" src="https://i0.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Young-Rhubarb-Seeds.jpg?resize=600%2C400&amp;#038;ssl=1" alt="Rhubarb seeds beginning to form" width="600" height="400"  data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">It takes all summer, but by the fall, the rhubarb stalk will dry down.&nbsp; The dry, papery seed husks will start to catch the wind and blow away.&nbsp;</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">That’s when it’s time to break off the whole stalk and collect the rhubarb seed.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1208"><img alt="Rhubarb seed head with ripe seed" class="aligncenter size-full wp-image-8419 jetpack-lazy-image lazyloaded" data-dcnode-id="1211" data-ll-status="loaded" data-recalc-dims="1" height="936" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-Seed-Head.jpg%3Fresize%3D600%252C936%26is-pending-load%3D1%23038%3Bssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="600"><noscript data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-8419" src="https://i0.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-Seed-Head.jpg?resize=600%2C936&amp;#038;ssl=1" alt="Rhubarb seed head with ripe seed" width="600" height="936"  data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">The seeds come off the stalk relatively easily, and there’s plenty of them.&nbsp; I got about a quart of seed from a single stalk.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">The important thing here is to make sure you allow the seed to dry completely before storing it.&nbsp; The papery husks hold the morning dew, and they can easily mold if stored immediately.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Set the rhubarb seed out on a tray and allow it to dry for a few days before packing it away until spring.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><h2 data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Growing Rhubarb from Seed</span></h2><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">When I started doing research on growing rhubarb from seed, I assumed that the seeds would require a cold stratification period to germinate.&nbsp; Nope.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">While the crowns require a cold winter period for dormancy to recharge, the seeds can be kept at room temperature all winter before planting.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">Start rhubarb seeds indoors in pots or seedling trays about 8-10 weeks before the last frost.&nbsp; This is a few weeks before tomatoes, but a few weeks after </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalselfreliance.com/growing-asparagus-from-seed/" sl-processed="1"><span data-dcnode-id="1187" instrument_node="">asparagus grown from seed</span></a><span data-dcnode-id="1185" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Keep the seedlings moist, but not saturated.&nbsp; Rhubarb can die or be stunted from root rot in overly wet potting mix.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Rhubarb plants can handle a bit of frost, and they grow best transplanted a bit BEFORE the last spring frost.&nbsp; Harden plants off by taking them outdoors during the day and on warmer nights.&nbsp; &nbsp;</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">About 2 weeks before the last spring frost, transplant the rhubarb seedlings to a permanent bed in the garden.&nbsp; Be sure that it’s well amended with a lot of compost and organic matter, and mulch them to suppress weeds and help keep the soil cool.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">In warmer areas, choose a location where the rhubarb plants will be in shade during the heat of the day.&nbsp; Rhubarb plants grow best in cooler locations, and they’re generally considered hardy from zone 2 to 6.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1167"><img alt="A Tray of young rhubarb seedlings, started from seed a few weeks earlier." class="aligncenter size-full wp-image-8415 jetpack-lazy-image" data-dcnode-id="1170" data-lazy-src="https://i2.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-Seedlings-3.jpg?resize=600%2C400&amp;is-pending-load=1#038;ssl=1" data-recalc-dims="1" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-Seedlings-3.jpg%3Fresize%3D600%252C400%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="600"><noscript data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-8415" src="https://i2.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-Seedlings-3.jpg?resize=600%2C400&amp;#038;ssl=1" alt="A Tray of young rhubarb seedlings, started from seed a few weeks earlier." width="600" height="400"  data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="1166" instrument_node="">
</span><h2 data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Growing Rhubarb as an Annual in Hot Climates</span></h2><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Up here in the north in zone 4 Vermont, planting rhubarb is a long-term commitment.&nbsp; They’re perfect for our harsh winters, and they pop out of the soil in the spring as soon as the snow melts.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1159" instrument_node="">The rest of my family lives in California, and my dad’s favorite thing in the world is </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalselfreliance.com/maple-sweetened-strawberry-rhubarb-pie/" sl-processed="1"><span data-dcnode-id="1158" instrument_node="">strawberry rhubarb pie</span></a><span data-dcnode-id="1156" instrument_node="">.&nbsp; While I can mail them </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalselfreliance.com/rhubarb-jam/" sl-processed="1"><span data-dcnode-id="1155" instrument_node="">rhubarb jam</span></a><span data-dcnode-id="1153" instrument_node=""> or </span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalselfreliance.com/strawberry-rhubarb-jam/" sl-processed="1"><span data-dcnode-id="1152" instrument_node="">strawberry rhubarb jam</span></a><span data-dcnode-id="1150" instrument_node="">, it’s just not the same.&nbsp;</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">My sister wants me to express mail her some fresh rhubarb stalks so she can try out my </span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adamantkitchen.com/rhubarb-custard-pie/" sl-processed="1"><span data-dcnode-id="1146" instrument_node="">recipe for rhubarb custard pie</span></a><span data-dcnode-id="1144" instrument_node=""> as a surprise for him.&nbsp; While I’m happy to oblige, there’s going to be something else in that package…rhubarb seed.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">I recently learned that rhubarb does well, even in zone 9-10 if planted in the late fall and grown as a winter annual.&nbsp; My sister lives in the Mojave desert, but I’m hoping conditions will be cool enough in the winter months to support rhubarb.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">According to </span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.southernexposure.com/blog/2015/02/growing-rhubarb-from-seed/" sl-processed="1"><span data-dcnode-id="1137" instrument_node="">Southern Exposure Seed Exchange</span></a><span data-dcnode-id="1135" instrument_node="">,&nbsp;</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1130"><em data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">“To grow rhubarb as an annual in the fall and winter (zones 9 and higher), start the seeds in a cool location (a bright indoor spot or a shady outdoor place) from late August to early October. Transplant into the garden when the seedlings reach about 4 inches tall. The plants will be ready for harvest in March through early May. Intense summer heat will kill the plants, so harvest all the leaves in late spring. This technique only works where winters are very mild, or if you can protect the plants from damaging frost with a cold frame or row cover.”&nbsp;&nbsp;</span></em></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Does it work?&nbsp; I hope so, but in any case, a single plant produces enough rhubarb seed to plant a whole field, so it won’t take much for me to mail off a bit of seed.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1122"><img alt="How to Grow Rhubarb from Seed ~ While rhubarb is often propagated from root divisions, growing rhubarb from seed is a much more economical method.&nbsp; Many commercial rhubarb plants available from nursery catalogs are just seedlings grown out for a year or two.&nbsp; If you're patient, it's easy enough to grow hundreds of rhubarb seedlings for the price of one nursery rhubarb plant. #rhubarb #growingrhubarb #gardening #organicgardening #foodgardening #howtogrow #vegetablegardening #gardeningtips #homesteading #homestead #selfreliant" class="aligncenter wp-image-8423 size-full jetpack-lazy-image" data-dcnode-id="1125" data-lazy-src="https://i0.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-from-seed-5.jpg?resize=735%2C1102&amp;is-pending-load=1#038;ssl=1" data-recalc-dims="1" height="1102" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-from-seed-5.jpg%3Fresize%3D735%252C1102%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="735"><noscript data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-8423 size-full" src="https://i0.wp.com/practicalselfreliance.com/wp-content/uploads/2019/06/Rhubarb-from-seed-5.jpg?resize=735%2C1102&amp;#038;ssl=1" alt="How to Grow Rhubarb from Seed ~ While rhubarb is often propagated from root divisions, growing rhubarb from seed is a much more economical method.&amp;nbsp; Many commercial rhubarb plants available from nursery catalogs are just seedlings grown out for a year or two.&amp;nbsp; If you're patient, it's easy enough to grow hundreds of rhubarb seedlings for the price of one nursery rhubarb plant. #rhubarb #growingrhubarb #gardening #organicgardening #foodgardening #howtogrow #vegetablegardening #gardeningtips #homesteading #homestead #selfreliant" width="735" height="1102"  data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="1121" instrument_node="">
</span><div class="jp-relatedposts" data-dcnode-id="1115" id="jp-relatedposts"><span data-dcnode-id="1120" instrument_node="">

</span><p data-dcnode-id="870"><span data-dcnode-id="873" instrument_node="">Wood ash is often used as a fertilizer in the garden, and it’s good for most plants with just a few exceptions.  It should be great for rhubarb, assuming it’s just run of the mill wood (hard or soft).  Ashes from black walnut trees still contain juglone which kills plants, and likewise, don’t use ashes from pressure-treated wood and such.  More information on using wood ashes here: </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalselfreliance.com/wood-ash-uses/" rel="nofollow ugc" sl-processed="1"><span data-dcnode-id="872" instrument_node="">https://practicalselfreliance.com/wood-ash-uses/</span></a></p><span data-dcnode-id="869" instrument_node="">
