</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Have you ever seen a plant and wondered if they were supposed to be purple? Or maybe your neighbor’s apple tree looks like a pine tree. Well, there’s no doubt these plants are looking like something they’re not. The same way some plants look like Rhubarb. They call them: rhubarbs! Though it sounds similar to the vegetable Rhubarb, this name is entirely different. Rhubarb is a vegetable. Rhubarbs means “rhubarb-like.” As in, it looks like rhubarb. Not that they are rhubarbs, but they are not something else entirely. We’ll discuss 7 plants that look like Rhubarb.</span></p><div class="ez-toc-v2_0_19 counter-flat counter-numeric ez-toc-light-blue" data-dcnode-id="794" id="ez-toc-container"><span data-dcnode-id="851" instrument_node="">

Rhubarb" title="7 Plants That Look Like Rhubarb"><span data-dcnode-id="820" instrument_node="">7 Plants That Look Like Rhubarb</span></a></li><li class="ez-toc-page-1" data-dcnode-id="815"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="816" href="#1_Beet_Beta_Vulgaris" title="1. Beet (Beta Vulgaris):"><span data-dcnode-id="817" instrument_node="">1. Beet (Beta Vulgaris):</span></a></li><li class="ez-toc-page-1" data-dcnode-id="812"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="813" href="#2_Skunk_Cabbage_Symplocarpus_Foetidus" title="2. Skunk Cabbage (Symplocarpus Foetidus):"><span data-dcnode-id="814" instrument_node="">2. Skunk Cabbage (Symplocarpus Foetidus):</span></a></li><li class="ez-toc-page-1" data-dcnode-id="809"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="810" href="#3_Greater_burdock_Arctium_lappa" title="3. Greater burdock (Arctium lappa):"><span data-dcnode-id="811" instrument_node="">3. Greater burdock (Arctium lappa):</span></a></li><li class="ez-toc-page-1" data-dcnode-id="806"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="807" href="#4_Indian_Rhubarb_Darmera_peltata" title="4. Indian Rhubarb (Darmera peltata):"><span data-dcnode-id="808" instrument_node="">4. Indian Rhubarb (Darmera peltata):</span></a></li><li class="ez-toc-page-1" data-dcnode-id="803"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="804" href="#5_Poison_Hemlock_Conium_maculatum" title="5. Poison Hemlock ( Conium maculatum):"><span data-dcnode-id="805" instrument_node="">5. Poison Hemlock ( Conium maculatum):</span></a></li><li class="ez-toc-page-1" data-dcnode-id="800"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="801" href="#6_Japanese_Knotweed_Reynoutria_Japonica" title="6. Japanese Knotweed (Reynoutria Japonica):"><span data-dcnode-id="802" instrument_node="">6. Japanese Knotweed (Reynoutria Japonica):</span></a></li><li class="ez-toc-page-1" data-dcnode-id="797"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="798" href="#7_Canaigre_Dock_Rumex_alpinus" title="7. Canaigre Dock (Rumex alpinus):"><span data-dcnode-id="799" instrument_node="">7. Canaigre Dock (Rumex alpinus):</span></a></li></ul></nav></div><span data-dcnode-id="793" instrument_node="">
</span><h2 data-dcnode-id="788" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="792" id="What_is_Rhubarb_Exactly"></span><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">What is Rhubarb Exactly?</span></strong><span class="ez-toc-section-end" data-dcnode-id="789"></span></h2><p data-dcnode-id="784"><img alt="What is Rhubarb" class="aligncenter wp-image-1139 size-full entered error" data-dcnode-id="787" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb.jpeg" data-lazy-srcset="https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb.jpeg 800w, https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb-300x206.jpeg 300w, https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb-768x528.jpeg 768w" data-ll-status="error" height="550" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb.jpeg&amp;raw" srcset="https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb.jpeg 800w, https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb-300x206.jpeg 300w, https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb-768x528.jpeg 768w" width="800"><noscript data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">&lt;img class="aligncenter wp-image-1139 size-full" src="https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb.jpeg" alt="What is Rhubarb" width="800" height="550" srcset="https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb.jpeg 800w, https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb-300x206.jpeg 300w, https://easygearlife.com/wp-content/uploads/2021/09/What-is-Rhubarb-768x528.jpeg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Rhubarb is a plant with red, leafy stalks that grow in clusters and can eat raw or cooked. The stalks were around long before we domesticated them and used them for food. In fact, the ancient Greeks ate the leaves of the rhubarbs to cure coughs and other ailments. Europe’s first settlers brought this plant to North America and used it in their cooking.</span></p><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Today, in different ways rhubarb is still eaten. Whether fresh in a fruit salad, cooked in desserts like pies and crumbles, or even turned into wine.</span></p><p data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">The rhubarb plant is actually the root of the sorrel plant (Rumex acetosa), which grows wild in colder climates. Both outdoors or indoors environments are suitable for it. When </span><a data-dcnode-id="777" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/plants-that-looks-like-dill/"><span data-dcnode-id="778" instrument_node="">plants are grown outdoors</span></a><span data-dcnode-id="776" instrument_node="">, they produce larger leaves and stalks. (and typically need to get protected from frost). Plants grown indoors will grow smaller but produce higher yields. The stalks and leaves of the plant are baneful. So it is important to wash all your produce before consuming it thoroughly.</span></p><h3 data-dcnode-id="770"><span class="ez-toc-section" data-dcnode-id="774" id="History_and_Uses"></span><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">History and Uses</span></strong><span class="ez-toc-section-end" data-dcnode-id="771"></span></h3><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Rhubarb currently use to treat digestive issues. Indigestion and heartburn can be treated with it. It is also very useful for asthma and hay fever. In place of medicine, people have been known to drink homemade sweet or sour brews of rhubarb. The blossoms are also edible but must be harvest from the plant before they reach full bloom. Rhubarb is also used to make various types of jams and candies. In Italy, the rhubarb plant is commonly distilled into a type of liquor called Ribaia. A popular fruit from Italy, Ribaia, is helpful as a dessert wine and a digestif.</span></p><h2 data-dcnode-id="763" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="767" id="Interesting_Facts_About_Rhubarb"></span><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Interesting Facts About Rhubarb:</span></strong><span class="ez-toc-section-end" data-dcnode-id="764"></span></h2><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">It has been helpful exciting for centuries by the Greeks, who called it “the great medicine.” Ancient Romans ate it as a vegetable. Native Americans used it to treat kidney and bladder stones. The red part of the stem is poisonous; the leaves, roots, and green stems are not. It is a vegetable, not a fruit or a berry. Dwarf rhubarb, often called “pieplant,” are famous for small-space gardening.</span></p><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">Rhubarb is native to Siberia, so it does not tolerate frost well. Most varieties of rhubarb are annuals or biennials. By seed, they spread fast and easily. However, their transplant is also easy. Rhubarb plants have large oblong leaves which can grow up to 3 feet tall. </span><a data-dcnode-id="758" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/plants-that-looks-like-dill/"><span data-dcnode-id="759" instrument_node="">Large plants have large</span></a><span data-dcnode-id="757" instrument_node="">, thick stalks that are great to use in pies. Small plants have smaller, thinner stalks that are good to use in desserts like crumbles.</span></p><h3 data-dcnode-id="751"><span class="ez-toc-section" data-dcnode-id="755" id="Tips_for_Preparing_Rhubarb"></span><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Tips for Preparing Rhubarb:</span></strong><span class="ez-toc-section-end" data-dcnode-id="752"></span></h3><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Wash the rhubarb before using it. The greens are toxic, so you should never eat them. The stems can be peeled or left unpeeled. When cooking, you can cut the rhubarb into chunks or pieces depending on what size is okay for your recipe.</span></p><h3 data-dcnode-id="744"><span class="ez-toc-section" data-dcnode-id="748" id="Rhubarb_Nutrition"></span><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Rhubarb: Nutrition</span></strong><span class="ez-toc-section-end" data-dcnode-id="745"></span></h3><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">They are packed with minerals, such as manganese and calcium, and vitamins (especially Vitamin C). Rhubarb is a healthy addition to some delicious desserts.</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">The calcium in rhubarb helps regulate heart rate and blood pressure. In contrast, magnesium regulates blood sugar levels. This helps reduce the risk of diabetes. In comparison to minerals and vitamins, it is also a great source of dietary fiber. The helpful bacteria of our gut need fiber to stay healthy. Just one cup of cooked rhubarb contains 8% of your recommended daily dietary fiber intake.</span></p><h3 data-dcnode-id="735"><span class="ez-toc-section" data-dcnode-id="739" id="Rhubarb_Benefits"></span><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Rhubarb: Benefits</span></strong><span class="ez-toc-section-end" data-dcnode-id="736"></span></h3><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">There are many health benefits that come from eating rhubarb.</span></p><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">The leaves and stalks of the rhubarb plant contain various forms of oxalic acid, which can be injurious to our skin and our stomach. Therefore, it is important to thoroughly wash all your produce before eating it! The leaf and stalk usually contain no more than 1 gram of oxalic acid per 100 grams (Approximately 25.5 grams).</span></p><h3 data-dcnode-id="726"><span class="ez-toc-section" data-dcnode-id="730" id="Rhubarb_Warnings"></span><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Rhubarb: Warnings</span></strong><span class="ez-toc-section-end" data-dcnode-id="727"></span></h3><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Like other oxalate-containing foods, we should not eat rhubarb in large quantities. Some people experience diarrhea, stomach cramps, and headaches from overeating rhubarb. Those who have kidney problems should also avoid excessive consumption of this plant. Pregnant women and people with a history of kidney stones should look up medical advice before eating rhubarb.</span></p><h2 data-dcnode-id="719" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="723" id="7_Plants_That_Look_Like_Rhubarb"></span><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">7 Plants That Look Like Rhubarb</span></strong><span class="ez-toc-section-end" data-dcnode-id="720"></span></h2><h3 data-dcnode-id="713"><span class="ez-toc-section" data-dcnode-id="718" id="1_Beet_Beta_Vulgaris"></span><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">1. Beet (Beta Vulgaris)</span></strong><span data-dcnode-id="715" instrument_node="">:</span><span class="ez-toc-section-end" data-dcnode-id="714"></span></h3><p data-dcnode-id="709"><img alt="Beta Vulgaris" class="aligncenter size-full wp-image-1147 entered error" data-dcnode-id="712" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris.jpg" data-lazy-srcset="https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris-768x528.jpg 768w" data-ll-status="error" height="550" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris.jpg&amp;raw" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris-768x528.jpg 768w" width="800"><noscript data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">&lt;img class="aligncenter size-full wp-image-1147" src="https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris.jpg" alt="Beta Vulgaris" width="800" height="550" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Beta-Vulgaris-768x528.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Some people think that beets look like rhubarb. Beets are a type of plant that belongs to the amaranth family and is classed as a root vegetable. The name beetroot comes from the words “bêt” and “Rapa,” which means “red or white turnip.” Unlike turnips, beets contain a large number of sugars, especially sucrose and fructose.</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Sucrose is a simple sugar that can be easily digested and absorbed into the bloodstream. The energy content of beet is not as high as that of a potato. But this has little effect on their consumption frequency as they are often combined with other foods in order to provide both dietary fiber and nutrients.</span></p><p data-dcnode-id="701" style="text-align: center;"><a data-dcnode-id="702" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3HUAOVp" rel="noopener sponsored" target="_blank"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Buy Beta Vulgaris Seeds</span></strong></a></p><h3 data-dcnode-id="696"><span class="ez-toc-section" data-dcnode-id="700" id="2_Skunk_Cabbage_Symplocarpus_Foetidus"></span><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">2. Skunk Cabbage (Symplocarpus Foetidus):</span></strong><span class="ez-toc-section-end" data-dcnode-id="697"></span></h3><p data-dcnode-id="692"><img alt="Skunk Cabbage" class="aligncenter size-full wp-image-1140 entered error" data-dcnode-id="695" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage.jpg" data-lazy-srcset="https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage-768x528.jpg 768w" data-ll-status="error" height="550" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage.jpg&amp;raw" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage-768x528.jpg 768w" width="800"><noscript data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">&lt;img class="aligncenter size-full wp-image-1140" src="https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage.jpg" alt="Skunk Cabbage" width="800" height="550" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Skunk-Cabbage-768x528.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><p data-dcnode-id="687"><span data-dcnode-id="691" instrument_node="">Skunk cabbage plants are dubbed “the most handsome of plants,” and that is not without reason. The yellow and green leaves with their sharp edges really stand out among other vegetables in the garden or on restaurant menus. </span><a data-dcnode-id="689" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/5-plants-that-looks-like-bamboo/"><span data-dcnode-id="690" instrument_node="">These plants don’t need much light</span></a><span data-dcnode-id="688" instrument_node=""> and are easy to grow in the garden. You can also sow skunk cabbage seeds in the summer so that by autumn, you’ll have ripe fruit. The leaves can be eaten in salads, soups, and other dishes that call for fresh vegetables.</span></p><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Skunk cabbage is not considered an authentic vegetable. It is actually considered a member of the potato family (Solanaceae). It doesn’t belong to the cabbage family (Brassicaceae). However, it belongs to Alliaceae. Skunk cabbage is closely related to three popular edible vegetables: Chives, garlic, and onion.</span></p><p data-dcnode-id="681" style="text-align: center;"><a data-dcnode-id="682" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3LrVUwF" rel="noopener sponsored" target="_blank"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Buy Skunk Cabbage Seeds</span></strong></a></p><h3 data-dcnode-id="676"><span class="ez-toc-section" data-dcnode-id="680" id="3_Greater_burdock_Arctium_lappa"></span><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">3. Greater burdock (Arctium lappa):</span></strong><span class="ez-toc-section-end" data-dcnode-id="677"></span></h3><p data-dcnode-id="672"><img alt="Greater burdock" class="aligncenter size-full wp-image-1141 entered error" data-dcnode-id="675" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock.jpg" data-lazy-srcset="https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock-768x528.jpg 768w" data-ll-status="error" height="550" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/wp-content/uploads/2021/09/Greater-burdock.jpg&amp;raw" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock-768x528.jpg 768w" width="800"><noscript data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">&lt;img class="aligncenter size-full wp-image-1141" src="https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock.jpg" alt="Greater burdock" width="800" height="550" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Greater-burdock-768x528.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><p data-dcnode-id="667"><span data-dcnode-id="671" instrument_node="">Greater burdock (Arctium lappa) is a plant that produces large, edible roots. You can eat them raw or you can boil them and then cut them to make a fresh relish. The leaves are also edible and can cook boiled like spinach. Great burdocks look like rhubarb with large purple flowers and green leaves. That grows on </span><a data-dcnode-id="669" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/5-plants-that-looks-like-bamboo/"><span data-dcnode-id="670" instrument_node="">the plant</span></a><span data-dcnode-id="668" instrument_node=""> as the stems grow upward. They originate from Europe. But they have an invasive nature so that they can be visible in most of North America as well. They tend to grow in places that are not disturbed or cultivated. The roots are somewhat bitter, but they are good for people with diabetes.</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">The leaves of this plant can use to make a pink dye. It is very vital not to use the leaves of the common burdock (Arctium minus) because people who have sensitive skin can suffer rashes and blisters.</span></p><p data-dcnode-id="661" style="text-align: center;"><a data-dcnode-id="662" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3gGQkbD" rel="noopener sponsored" target="_blank"><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Buy Greater burdock Seeds</span></strong></a></p><h3 data-dcnode-id="656"><span class="ez-toc-section" data-dcnode-id="660" id="4_Indian_Rhubarb_Darmera_peltata"></span><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">4. Indian Rhubarb (Darmera peltata):</span></strong><span class="ez-toc-section-end" data-dcnode-id="657"></span></h3><p data-dcnode-id="652"><img alt="Indian Rhubarb" class="aligncenter size-full wp-image-1142 entered error" data-dcnode-id="655" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb.jpeg" data-lazy-srcset="https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb.jpeg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb-300x206.jpeg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb-768x528.jpeg 768w" data-ll-status="error" height="550" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb.jpeg&amp;raw" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb.jpeg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb-300x206.jpeg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb-768x528.jpeg 768w" width="800"><noscript data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">&lt;img class="aligncenter size-full wp-image-1142" src="https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb.jpeg" alt="Indian Rhubarb" width="800" height="550" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb.jpeg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb-300x206.jpeg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Indian-Rhubarb-768x528.jpeg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">The plant is known by different names in Europe and America. They grow locally in cool temperate climates. It has reddish stems that are long and slender with a stiff leaf stem. The leaves are ovals almost circular with sharp edges. They tend to be about 2-4 cm wide, similar to rhubarb leaves but smaller. The flowers are white or red-purple.</span></p><p data-dcnode-id="645"><span data-dcnode-id="649" instrument_node="">Indian Rhubarb is the scientific name for the type of rhubarb natively found in India. It was only known in the wild to found in North-Eastern India. From cultivation and botanical studies, they discovered that this rhubarb is not only found in the northeastern part of India. But also in several parts of South India. However, it does not grow naturally in all of these areas. It is believed that they were </span><a data-dcnode-id="647" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/how-to-care-for-exotic-angel-plant/"><span data-dcnode-id="648" instrument_node="">exotic plants</span></a><span data-dcnode-id="646" instrument_node=""> that had been brought there by traders from other places.</span></p><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Indian Rhubarb is a perennial herb that grows to a height of 12 cm. It has a deep taproot, and its rough stems have reddish-purple colored flowers at the top. Its leaves are ovate in shape, dark green, and have a smooth shiny surface. The leaves tend to be round or slightly oval-shaped and can grow up to a length of 60 centimeters. The leaves are quite thick, fleshy, and moist in texture. The stem of the plant is quite long, flexible, and stout. It has bristly hairs, which can be either red, pink, or purple in color.</span></p><p data-dcnode-id="639" style="text-align: center;"><a data-dcnode-id="640" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3GI9FDK" rel="noopener sponsored" target="_blank"><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Buy Indian Rhubarb Seeds</span></strong></a></p><h3 data-dcnode-id="634"><span class="ez-toc-section" data-dcnode-id="638" id="5_Poison_Hemlock_Conium_maculatum"></span><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">5. Poison Hemlock ( Conium maculatum):</span></strong><span class="ez-toc-section-end" data-dcnode-id="635"></span></h3><p data-dcnode-id="630"><img alt="Poison Hemlock" class="aligncenter size-full wp-image-1144 entered error" data-dcnode-id="633" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock.jpg" data-lazy-srcset="https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock-768x528.jpg 768w" data-ll-status="error" height="550" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock.jpg&amp;raw" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock-768x528.jpg 768w" width="800"><noscript data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">&lt;img class="aligncenter size-full wp-image-1144" src="https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock.jpg" alt="Poison Hemlock" width="800" height="550" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Poison-Hemlock-768x528.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><p data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">Poison hemlock looks like rhubarb; it is an invasive plant that can be found in the United States. It has a strong scent with purple foliage and green flowers that turn red when mature. </span><a data-dcnode-id="627" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/plants-that-look-like-clover/"><span data-dcnode-id="628" instrument_node="">The plant grows</span></a><span data-dcnode-id="626" instrument_node=""> about 6 inches to 2 feet tall. It also spreads out with its stems growing horizontally up to nine feet long. It is in the parsley family. It can be found throughout the United States from spring through summer.</span></p><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The Greeks used Poison hemlock as a form of execution. In 100 BC, Socrates had a cup of poison that had been laced with poison hemlock to kill him. In notion, Socrates might have killed himself so that his students could study without being under his shadow. For centuries to cause death this plant has been used. It still remains a popular form of execution in countries around the world.</span></p><p data-dcnode-id="619" style="text-align: center;"><a data-dcnode-id="620" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3sLX9OO" rel="noopener sponsored" target="_blank"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Buy Poison Hemlock Seeds</span></strong></a></p><h3 data-dcnode-id="614"><span class="ez-toc-section" data-dcnode-id="618" id="6_Japanese_Knotweed_Reynoutria_Japonica"></span><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">6. Japanese Knotweed (Reynoutria Japonica):</span></strong><span class="ez-toc-section-end" data-dcnode-id="615"></span></h3><p data-dcnode-id="610"><img alt="Japanese Knotweed" class="aligncenter size-full wp-image-1145 entered error" data-dcnode-id="613" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed.jpg" data-lazy-srcset="https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed-768x528.jpg 768w" data-ll-status="error" height="550" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed.jpg&amp;raw" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed-768x528.jpg 768w" width="800"><noscript data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">&lt;img class="aligncenter size-full wp-image-1145" src="https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed.jpg" alt="Japanese Knotweed" width="800" height="550" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Japanese-Knotweed-768x528.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Japanese knotweed, Fallopia japonica, is a perennial herbaceous plant native to East Asia. It is sometimes considered an invasive weed in other parts of the world, including Europe and North America.</span></p><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Japanese knotweed is closely related to edible rhubarb, which it can resemble when young. Its stems are covered with fibrous hairs rather than the smooth leaves of the true rhubarb plant. At the same time, its leaves have deeply divided lobes.</span></p><p data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">Japanese knotweed was formerly </span><a data-dcnode-id="603" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/plants-that-look-like-lavender/"><span data-dcnode-id="604" instrument_node="">considered an edible plant</span></a><span data-dcnode-id="602" instrument_node="">, even by folk healers. It is deemed to be soft and sweet, with a mild flavor. The cooked shoots are eaten raw or boiled for later use or used as a substitute for other vegetables in soups or stews. The mature leaves could use both raw and cooked as greens.</span></p><p data-dcnode-id="597" style="text-align: center;"><a data-dcnode-id="598" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/36eL50L" rel="noopener sponsored" target="_blank"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Buy Japanese Knotweed Powder</span></strong></a></p><h3 data-dcnode-id="591"><span class="ez-toc-section" data-dcnode-id="596" id="7_Canaigre_Dock_Rumex_alpinus"></span><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">7. Canaigre Dock (Rumex alpinus)</span></strong><span data-dcnode-id="593" instrument_node="">:</span><span class="ez-toc-section-end" data-dcnode-id="592"></span></h3><p data-dcnode-id="587"><img alt="Canaigre Dock" class="aligncenter size-full wp-image-1146 entered error" data-dcnode-id="590" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock.jpg" data-lazy-srcset="https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock-768x528.jpg 768w" data-ll-status="error" height="550" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock.jpg&amp;raw" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock-768x528.jpg 768w" width="800"><noscript data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">&lt;img class="aligncenter size-full wp-image-1146" src="https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock.jpg" alt="Canaigre Dock" width="800" height="550" srcset="https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock.jpg 800w, https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock-300x206.jpg 300w, https://easygearlife.com/wp-content/uploads/2021/09/Canaigre-Dock-768x528.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">These plants are more than just common weeds. They may look like rhubarb, but canaigre docks belong to the Umbelliferae family. Their flowers and fruit, as well as the leaves and roots, have properties in similar to those of other members of the family — namely anise and dill.</span></p><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Canaigre docks are also known as Geosporum canagro and Geosporum novae-angliae. They are plants with the characteristics of a rhubarb plant. Their plants grow up to one and a half meters tall and bear large umbels, which display yellow flowers. When these flowers wither, the umbel produces red berries as young as pinheads. The fruit is edible and slightly poisonous. The roots of this plant are yellow and taste like mustard, which makes them quite tasty for both humans and birds.</span></p><p data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">The canaigre dock is a specialist since it grows only on beaches and cliffs. It would be sad to lose such a plant that has adapted to wind and salt water. As such, we should </span><a data-dcnode-id="580" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easygearlife.com/plants-that-look-like-lavender/"><span data-dcnode-id="581" instrument_node="">protect these plants</span></a><span data-dcnode-id="579" instrument_node=""> from destruction to ensure their survival.</span></p><p data-dcnode-id="574" style="text-align: center;"><a data-dcnode-id="575" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3oOodLR" rel="noopener sponsored" target="_blank"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Buy Canaigre Dock Powder</span></strong></a></p><p data-dcnode-id="571"><strong data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Conclusion:</span></strong></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Individuals who enjoy gardening may be surprised to see that plants can resemble something else. Indeed, there are hundreds of different species that act like this. From what we know, the plant kingdom is full of them. Although they are uncommon, rhubarbs can be found nearly anywhere in the world. However, you definitely will not want to eat them! No matter how similar they look to rhubarb, do not even consider it! They might look delicious, but these plants are not edible. Here, we discussed 7 plants that look like Rhubarb. We hope this information helped you a lot. Thank you. Have a great day.</span></p><span data-dcnode-id="568" instrument_node=""> </span></div><span data-dcnode-id="566" instrument_node="">
