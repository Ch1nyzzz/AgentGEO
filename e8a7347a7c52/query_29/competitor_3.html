</span><p data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Beautiful pink rhubarb at the markets signals spring's arrival. A bit sour on their own, the stalks work beautifully with sweet strawberries and blueberries, and citrus. This buttery loaf is made with a bit of orange zest, which perfectly complements rhubarb’s pleasant tang. Dress the cooled loaf with a simple glaze of confectioners’ sugar and orange juice, if you like, or serve fat slices with vanilla ice cream. Leftovers are nice toasted in a skillet with plenty of salty butter.</span></p><span data-dcnode-id="2993" instrument_node="">

</span><h3 class="recipe-instructions-heading" data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Preparation</span></h3><span data-dcnode-id="2668" instrument_node="">
</span><ol class="recipe-steps" data-dcnode-id="2657"><span data-dcnode-id="2667" instrument_node="">
</span><li data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Heat the oven to 350 degrees. Butter and flour an 8 1/2-inch-by-4 1/2-inch loaf pan.</span></li><span data-dcnode-id="2664" instrument_node="">
</span><li data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">In a large bowl, whisk together the butter, 1 cup of the sugar, orange zest and yogurt until well combined. Whisk in eggs. In a separate medium bowl, whisk together the flour, baking powder, baking soda and salt. Add the flour mixture and 1 1/2 cups rhubarb to butter mixture and fold until combined. Transfer the batter to the prepared pan and smooth out the top. Sprinkle the top with the remaining 1/4 cup rhubarb and 2 tablespoons sugar. Bake until the loaf is golden brown and set and a skewer inserted in the center comes out with moist crumbs attached, 55 to 60 minutes.</span></li><span data-dcnode-id="2661" instrument_node="">
</span><li data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Transfer the pan to a rack to cool for 10 minutes, then cut around the edges and carefully flip the loaf out of the pan. Turn it right side up and let it cool completely before slicing.</span></li><span data-dcnode-id="2658" instrument_node="">
</span></ol><span data-dcnode-id="2656" instrument_node="">

</span><div data-dcnode-id="2162" id="userNotesMount"><div class="nytc---notessection---sectionContainer" data-dcnode-id="2163"><h2 class="nytc---notessection---sectionTitle" data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Cooking Notes</span></h2><div class="nytc---notessection---NotesThreadContainer" data-dcnode-id="2164"><ul class="nytc---notessection---notesTabs" data-dcnode-id="2597" role="tablist"><li class="nytc---notessection---noteTab" data-dcnode-id="2608" role="presentation"><a aria-selected="false" class="nytc---notessection---innerTab" data-dcnode-id="2609" href="#notes-thread-tab-content" id="all-tab" role="tab"><span data-dcnode-id="2612" instrument_node="">All</span><span aria-hidden="true" class="nytc---notessection---threadCount" data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">156</span></span></a></li><li class="nytc---notessection---noteTab" data-dcnode-id="2603" role="presentation"><a aria-selected="true" class="nytc---notessection---innerTab nytc---notessection---active" data-dcnode-id="2604" href="#notes-thread-tab-content" id="helpful-tab" role="tab"><span data-dcnode-id="2607" instrument_node="">Most Helpful</span><span aria-hidden="true" class="nytc---notessection---threadCount" data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">25</span></span></a></li><li class="nytc---notessection---noteTab" data-dcnode-id="2598" role="presentation"><a aria-selected="false" class="nytc---notessection---innerTab" data-dcnode-id="2599" href="#notes-thread-tab-content" id="private-tab" role="tab"><span data-dcnode-id="2602" instrument_node="">Private</span><span aria-hidden="true" class="nytc---notessection---threadCount" data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">0</span></span></a></li></ul><div data-dcnode-id="2165"><section data-dcnode-id="2166" id="notes-thread-tab-content" role="tabpanel"><div class="nytc---notessection---threadContainer nytc---notessection---publicNotesThread" data-dcnode-id="2167"><div class="nytc---notessection---threadNote" data-dcnode-id="2580"><div class="nytc---notessection---noteContent" data-dcnode-id="2581"><span class="nytc---notessection---noteImg" data-dcnode-id="2595"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2596" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-eggplant.png&amp;raw" width="100"></span><div data-dcnode-id="2587"><div class="nytc---notessection---noteHeader" data-dcnode-id="2590"><span class="nytc---notessection---noteOwner" data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">P Swaback</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">What happened to the strawbewrries and blueberries mentioned in the description but missing from the ingredient list?</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2582"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2583"><span class="nytc---notessection---icon" data-dcnode-id="2586"></span><span data-dcnode-id="2585" instrument_node="">91 </span><span data-dcnode-id="2584" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2563"><div class="nytc---notessection---noteContent" data-dcnode-id="2564"><span class="nytc---notessection---noteImg" data-dcnode-id="2578"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2579" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-eggplant.png&amp;raw" width="100"></span><div data-dcnode-id="2570"><div class="nytc---notessection---noteHeader" data-dcnode-id="2573"><span class="nytc---notessection---noteOwner" data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">julie b</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">I've now made this delightful cake five times, and I've passed the recipe on to many people. My only suggestions are: increase the amount of chopped rhubarb to as much as two cups; and don't bother strewing the 1/4 cup rhubarb after the batter is in the loaf pan. But don't forget the crackly raw sugar sprinkled on top!</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2565"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2566"><span class="nytc---notessection---icon" data-dcnode-id="2569"></span><span data-dcnode-id="2568" instrument_node="">45 </span><span data-dcnode-id="2567" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2546"><div class="nytc---notessection---noteContent" data-dcnode-id="2547"><span class="nytc---notessection---noteImg" data-dcnode-id="2561"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2562" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-eggplant.png&amp;raw" width="100"></span><div data-dcnode-id="2553"><div class="nytc---notessection---noteHeader" data-dcnode-id="2556"><span class="nytc---notessection---noteOwner" data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">gluten free option?</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Would this taste good with an alternative flour (for the celiacs among us), and if so, which is the best to try?</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2548"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2549"><span class="nytc---notessection---icon" data-dcnode-id="2552"></span><span data-dcnode-id="2551" instrument_node="">39 </span><span data-dcnode-id="2550" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2529"><div class="nytc---notessection---noteContent" data-dcnode-id="2530"><span class="nytc---notessection---noteImg" data-dcnode-id="2544"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2545" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-fish.png&amp;raw" width="100"></span><div data-dcnode-id="2536"><div class="nytc---notessection---noteHeader" data-dcnode-id="2539"><span class="nytc---notessection---noteOwner" data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Deb</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">I followed the recipe mostly however I used less sugar; 1/4 cup in the batter and 2 teaspoons sprinkled on top.  The bread has a nice flavor accentuated with the orange zest and was not overly sweet.</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2531"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2532"><span class="nytc---notessection---icon" data-dcnode-id="2535"></span><span data-dcnode-id="2534" instrument_node="">36 </span><span data-dcnode-id="2533" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2512"><div class="nytc---notessection---noteContent" data-dcnode-id="2513"><span class="nytc---notessection---noteImg" data-dcnode-id="2527"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2528" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-fish.png&amp;raw" width="100"></span><div data-dcnode-id="2519"><div class="nytc---notessection---noteHeader" data-dcnode-id="2522"><span class="nytc---notessection---noteOwner" data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">Amy</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">I appreciate the "quick bread" nomenclature, but let's be honest: this is cake. Delicious, light, fluffy cake, studded with beautiful tangy rhubarb and brightened with (my substitution of) clementine zest. I added just one tablespoon of turbinado sugar to the top for a sparkling loaf. We've been toasting slices for breakfast. Definitely a rich and lovely way to use some of our huge rhubarb harvest!</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2514"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2515"><span class="nytc---notessection---icon" data-dcnode-id="2518"></span><span data-dcnode-id="2517" instrument_node="">20 </span><span data-dcnode-id="2516" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2495"><div class="nytc---notessection---noteContent" data-dcnode-id="2496"><span class="nytc---notessection---noteImg" data-dcnode-id="2510"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2511" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-tomato.png&amp;raw" width="100"></span><div data-dcnode-id="2502"><div class="nytc---notessection---noteHeader" data-dcnode-id="2505"><span class="nytc---notessection---noteOwner" data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Holly Smith</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Can you sub gluten-free flour on this kind of recipe?  And if so, do you hve to adjust other ingredients?  (I don’t have a lot of experience in baking with GF flour.)</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2497"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2498"><span class="nytc---notessection---icon" data-dcnode-id="2501"></span><span data-dcnode-id="2500" instrument_node="">17 </span><span data-dcnode-id="2499" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2478"><div class="nytc---notessection---noteContent" data-dcnode-id="2479"><span class="nytc---notessection---noteImg" data-dcnode-id="2493"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2494" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-tomato.png&amp;raw" width="100"></span><div data-dcnode-id="2485"><div class="nytc---notessection---noteHeader" data-dcnode-id="2488"><span class="nytc---notessection---noteOwner" data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Julia</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">I did it. I added those pesky strawberries, and oh my was that a good choice. Longer to bake, of course (I think an additional 15 or 20 Minutes, and I did put foil round the edges so they wouldn't burn), but so delicious. I didn't reduce any sugar either so it's pretty luscious.</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2480"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2481"><span class="nytc---notessection---icon" data-dcnode-id="2484"></span><span data-dcnode-id="2483" instrument_node="">16 </span><span data-dcnode-id="2482" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2461"><div class="nytc---notessection---noteContent" data-dcnode-id="2462"><span class="nytc---notessection---noteImg" data-dcnode-id="2476"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2477" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2468"><div class="nytc---notessection---noteHeader" data-dcnode-id="2471"><span class="nytc---notessection---noteOwner" data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">SNJ</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">2 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">I've just finished making this for the second time in a week.  The first time I gave half the loaf to friends.  Both loved it, as did I.  The perfect blend of tart and sweet.  I followed the advice of others and put all the rhubarb in the cake, and I found doing so gave the perfect ratio of cake to rhubarb.  I sprinkled the top with only 1 tbsp sugar, which was plenty without the rhubarb on the top.  A wonderful recipe--thanks so much.</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2463"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2464"><span class="nytc---notessection---icon" data-dcnode-id="2467"></span><span data-dcnode-id="2466" instrument_node="">15 </span><span data-dcnode-id="2465" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2444"><div class="nytc---notessection---noteContent" data-dcnode-id="2445"><span class="nytc---notessection---noteImg" data-dcnode-id="2459"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2460" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2451"><div class="nytc---notessection---noteHeader" data-dcnode-id="2454"><span class="nytc---notessection---noteOwner" data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">gardyngnome</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Hurrah for an easy, unpretentious and absolutely delicious quick bread recipe. We are blessed with vigorous home rhubarb plants so I make crumble and pie on a regular basis - adding this to the rotation. Tossed rhubarb in the floor mix before adding to egg mix so no sinking. Took a while to cook all the way through - I used too much rhubarb and left the chunks too big - next time will make in a bigger pan so it's not as thick, and will chop the rhubarb exactly as instructed :)  A winner!</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2446"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2447"><span class="nytc---notessection---icon" data-dcnode-id="2450"></span><span data-dcnode-id="2449" instrument_node="">13 </span><span data-dcnode-id="2448" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2427"><div class="nytc---notessection---noteContent" data-dcnode-id="2428"><span class="nytc---notessection---noteImg" data-dcnode-id="2442"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2443" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-tomato.png&amp;raw" width="100"></span><div data-dcnode-id="2434"><div class="nytc---notessection---noteHeader" data-dcnode-id="2437"><span class="nytc---notessection---noteOwner" data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Kim</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">I added a handful of strawberries, too--very nice addition.  The batter was super-thick, so I added the juice from half an orange to loosen it up a little.  I baked it for 1 hour and it was delicious!  Light and cake-y with a delicate, almost crispy crust.  A keeper.</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2429"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2430"><span class="nytc---notessection---icon" data-dcnode-id="2433"></span><span data-dcnode-id="2432" instrument_node="">9 </span><span data-dcnode-id="2431" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2410"><div class="nytc---notessection---noteContent" data-dcnode-id="2411"><span class="nytc---notessection---noteImg" data-dcnode-id="2425"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2426" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-eggplant.png&amp;raw" width="100"></span><div data-dcnode-id="2417"><div class="nytc---notessection---noteHeader" data-dcnode-id="2420"><span class="nytc---notessection---noteOwner" data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Anne</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">1 year ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">The suggestion for adding some diced crystalized ginger is a good one! Also, for me - the orange zest feels too winter holiday-ish for the spring rhubarb - so swapped it for lemon zest. I've made this twice - once w yogurt and once with buttermilk - both work well.</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2412"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2413"><span class="nytc---notessection---icon" data-dcnode-id="2416"></span><span data-dcnode-id="2415" instrument_node="">9 </span><span data-dcnode-id="2414" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2393"><div class="nytc---notessection---noteContent" data-dcnode-id="2394"><span class="nytc---notessection---noteImg" data-dcnode-id="2408"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2409" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-tomato.png&amp;raw" width="100"></span><div data-dcnode-id="2400"><div class="nytc---notessection---noteHeader" data-dcnode-id="2403"><span class="nytc---notessection---noteOwner" data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">hz</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Loved it!  I added about 1/2 c blueberries to the 11/2 c rhubarb- next time will add more rhubarb to both batter and topping. Some sugar fell off, so will try tossing the rhubarb with sugar topping to slightly macerate the fruit and moisten sugar. </span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2395"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2396"><span class="nytc---notessection---icon" data-dcnode-id="2399"></span><span data-dcnode-id="2398" instrument_node="">8 </span><span data-dcnode-id="2397" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2376"><div class="nytc---notessection---noteContent" data-dcnode-id="2377"><span class="nytc---notessection---noteImg" data-dcnode-id="2391"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2392" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2383"><div class="nytc---notessection---noteHeader" data-dcnode-id="2386"><span class="nytc---notessection---noteOwner" data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">gardyngnome</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">2 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">We LOVE this cake. I usually double it and bake in 2 8x8 pans (loaf pans don’t cook as well in the middle -tricky with moist early spring harvests).  I sub in Greek or Icelandic yoghurt, too - it’s what I always have on hand. Thanks for a fantastic fail safe spring favorite :)</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2378"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2379"><span class="nytc---notessection---icon" data-dcnode-id="2382"></span><span data-dcnode-id="2381" instrument_node="">8 </span><span data-dcnode-id="2380" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2359"><div class="nytc---notessection---noteContent" data-dcnode-id="2360"><span class="nytc---notessection---noteImg" data-dcnode-id="2374"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2375" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2366"><div class="nytc---notessection---noteHeader" data-dcnode-id="2369"><span class="nytc---notessection---noteOwner" data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">April</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">1 year ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">I took the advice of another reviewer and made this in a 9 inch round cake pan. Used 2 cups of rhubarb for the cake and put another 1/2 c on top. It sure turned out pretty! I think ginger is nice with rhubarb so put in about 2 or so teaspoons of fresh grated instead of the zest. Done in 45 minutes at 350. Easy, delicious, and one more reason to love rhubarb season.</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2361"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2362"><span class="nytc---notessection---icon" data-dcnode-id="2365"></span><span data-dcnode-id="2364" instrument_node="">8 </span><span data-dcnode-id="2363" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2342"><div class="nytc---notessection---noteContent" data-dcnode-id="2343"><span class="nytc---notessection---noteImg" data-dcnode-id="2357"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2358" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2349"><div class="nytc---notessection---noteHeader" data-dcnode-id="2352"><span class="nytc---notessection---noteOwner" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Carrie</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">This is delicious!  Thank you! A great alternative to playing with pie crust for my rhubarb cravings!    I actually substituted the solid portion ofwhipping cream for the butter (because it needed to be used) and wondered how it would work - amazing).   Now I need to go make it again with butter!   And because I just ate half the loaf...</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2344"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2345"><span class="nytc---notessection---icon" data-dcnode-id="2348"></span><span data-dcnode-id="2347" instrument_node="">6 </span><span data-dcnode-id="2346" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2325"><div class="nytc---notessection---noteContent" data-dcnode-id="2326"><span class="nytc---notessection---noteImg" data-dcnode-id="2340"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2341" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2332"><div class="nytc---notessection---noteHeader" data-dcnode-id="2335"><span class="nytc---notessection---noteOwner" data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Kate</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">2 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">I doubled the recipe and made 2 loaves - one with frozen rhubarb and one with fresh.  Don't care for orange so I used lemon zest. Looking in my pantry,  I saw some coconut and thought it might go well with rhubarb.  Then I saw pistachios and thought that would be tasty as well.  So one loaf got dried coconut and the other got chopped pistas.  Accidentally dumped the baking powder and soda in with the wet ingredients, but the batter didn't seem to suffer.  They both taste great!</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2327"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2328"><span class="nytc---notessection---icon" data-dcnode-id="2331"></span><span data-dcnode-id="2330" instrument_node="">5 </span><span data-dcnode-id="2329" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2308"><div class="nytc---notessection---noteContent" data-dcnode-id="2309"><span class="nytc---notessection---noteImg" data-dcnode-id="2323"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2324" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2315"><div class="nytc---notessection---noteHeader" data-dcnode-id="2318"><span class="nytc---notessection---noteOwner" data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Lee Norris</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">2 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">increase rhubarb to 2 cups</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2310"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2311"><span class="nytc---notessection---icon" data-dcnode-id="2314"></span><span data-dcnode-id="2313" instrument_node="">5 </span><span data-dcnode-id="2312" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2291"><div class="nytc---notessection---noteContent" data-dcnode-id="2292"><span class="nytc---notessection---noteImg" data-dcnode-id="2306"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2307" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2298"><div class="nytc---notessection---noteHeader" data-dcnode-id="2301"><span class="nytc---notessection---noteOwner" data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Patricia</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">1 year ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Thanks to notes I changed things a bit and used less sugar and topped with turbinado. I think we liked it the second day better, more flavor but would increase rhubarb to 2 cups in and not on top.  Also used 9" round, I think it is prettier than the loaf.</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2293"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2294"><span class="nytc---notessection---icon" data-dcnode-id="2297"></span><span data-dcnode-id="2296" instrument_node="">5 </span><span data-dcnode-id="2295" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2274"><div class="nytc---notessection---noteContent" data-dcnode-id="2275"><span class="nytc---notessection---noteImg" data-dcnode-id="2289"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2290" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-fish.png&amp;raw" width="100"></span><div data-dcnode-id="2281"><div class="nytc---notessection---noteHeader" data-dcnode-id="2284"><span class="nytc---notessection---noteOwner" data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Aura</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">1 year ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Made this several times with lemon zest since I had lemons but not oranges... fabulous!   Finally tried it with orange zest this time and it's just "OK"... the orange overwhelms the rhubarb.  Going back to lemon zest next time and forever!</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2276"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2277"><span class="nytc---notessection---icon" data-dcnode-id="2280"></span><span data-dcnode-id="2279" instrument_node="">5 </span><span data-dcnode-id="2278" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2257"><div class="nytc---notessection---noteContent" data-dcnode-id="2258"><span class="nytc---notessection---noteImg" data-dcnode-id="2272"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2273" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2264"><div class="nytc---notessection---noteHeader" data-dcnode-id="2267"><span class="nytc---notessection---noteOwner" data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">nicole</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">1 year ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">'ve now made this delightful cake five times, and I've passed the recipe on to many people. My only suggestions are: increase the amount of chopped rhubarb to as much as two cups; and don't bother strewing the 1/4 cup rhubarb after the batter is in the loaf pan. But don't forget the crackly raw sugar sprinkled on top!</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2259"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2260"><span class="nytc---notessection---icon" data-dcnode-id="2263"></span><span data-dcnode-id="2262" instrument_node="">5 </span><span data-dcnode-id="2261" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2240"><div class="nytc---notessection---noteContent" data-dcnode-id="2241"><span class="nytc---notessection---noteImg" data-dcnode-id="2255"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2256" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-eggplant.png&amp;raw" width="100"></span><div data-dcnode-id="2247"><div class="nytc---notessection---noteHeader" data-dcnode-id="2250"><span class="nytc---notessection---noteOwner" data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Gretl Satorius</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">2 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Also: adding ~1 tsp grated fresh ginger gives it a nice zest!</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2242"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2243"><span class="nytc---notessection---icon" data-dcnode-id="2246"></span><span data-dcnode-id="2245" instrument_node="">4 </span><span data-dcnode-id="2244" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2223"><div class="nytc---notessection---noteContent" data-dcnode-id="2224"><span class="nytc---notessection---noteImg" data-dcnode-id="2238"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2239" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2230"><div class="nytc---notessection---noteHeader" data-dcnode-id="2233"><span class="nytc---notessection---noteOwner" data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">Marie</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">2 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Why the heck did you specify a 8 1/2 x 4 1/2 pan?? I'm sure this fits a 9 x 5 fine, but it completely overflows the smaller loaf pan. Now I have a mess to clean up and my bread is ugly.</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2225"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2226"><span class="nytc---notessection---icon" data-dcnode-id="2229"></span><span data-dcnode-id="2228" instrument_node="">4 </span><span data-dcnode-id="2227" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2206"><div class="nytc---notessection---noteContent" data-dcnode-id="2207"><span class="nytc---notessection---noteImg" data-dcnode-id="2221"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2222" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-eggplant.png&amp;raw" width="100"></span><div data-dcnode-id="2213"><div class="nytc---notessection---noteHeader" data-dcnode-id="2216"><span class="nytc---notessection---noteOwner" data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Christa</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">2 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">This really turned out well--very warming to bake on a cool, rainy day. The orange-rhubarb combination is lovely, just like orange and cranberry. I think the yogurt makes for a more moist and flavorful bread--it worked well in another Times recipe as well</span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2208"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2209"><span class="nytc---notessection---icon" data-dcnode-id="2212"></span><span data-dcnode-id="2211" instrument_node="">4 </span><span data-dcnode-id="2210" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2189"><div class="nytc---notessection---noteContent" data-dcnode-id="2190"><span class="nytc---notessection---noteImg" data-dcnode-id="2204"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2205" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2196"><div class="nytc---notessection---noteHeader" data-dcnode-id="2199"><span class="nytc---notessection---noteOwner" data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">TeriS</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">3 years ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Added walnuts — definitely more cake like than bread.  Very good. </span></div></div><div class="nytc---notessection---noteActions" data-dcnode-id="2191"><div class="nytc---notessection---helpfulAction" data-dcnode-id="2192"><span class="nytc---notessection---icon" data-dcnode-id="2195"></span><span data-dcnode-id="2194" instrument_node="">3 </span><span data-dcnode-id="2193" instrument_node="">This is helpful</span></div></div></div></div><div class="nytc---notessection---threadNote" data-dcnode-id="2172"><div class="nytc---notessection---noteContent" data-dcnode-id="2173"><span class="nytc---notessection---noteImg" data-dcnode-id="2187"><img alt="" class="nytc---notessection---userImg" data-dcnode-id="2188" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static01.nyt.com/applications/cooking/46e5cdf/assets/user-img-lime.png&amp;raw" width="100"></span><div data-dcnode-id="2179"><div class="nytc---notessection---noteHeader" data-dcnode-id="2182"><span class="nytc---notessection---noteOwner" data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">r</span></span><time class="nytc---notessection---noteTime" data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">9 months ago</span></time></div><div class="nytc---notessection---noteBody" data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">I've now made this numerous times and it's one of my favorite "cakes". Tweaks: bake in an 8x8 pyrex and reduce time to 35-40 mins and temp to 325 (bakes more evenly). Butter and *sugar* (not flour) the pan. 0.5 tsp cardamom with the dry ingredients (do not skip!). Mix in rhubarb with the dry ingredients before adding to wet to prevent clumping. Rub zest into sugar before using. If I don't have oranges, clementines or orange flavoring out of the bottle work just as well.</span></div></div><div class="nytc---notessection---noteActions"
