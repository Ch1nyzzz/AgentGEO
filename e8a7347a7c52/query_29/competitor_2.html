</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2165" id="mntl-sc-block_1-0"><span data-dcnode-id="2166" instrument_node="">
A prolific and precocious springtime "fruit," rhubarb looks like stalks of pinkish green or even magenta celery. Its flavor is much more tart, making it ideal company for sugar in sweet dishes like crisps, compotes, and pies (from which it gets its second name, "pie plant"). Rhubarb also lends a puckery-tart fruitiness to savory dishes and pairs very nicely with pork and poultry. In the United States, rhubarb grows best in northern states from Maine south to Illinois and west to Washington state. Around the world, rhubarb is grown in China and across Europe.
</span></p><span data-dcnode-id="2164" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2153" id="mntl-sc-block_1-0-1"><div class="comp ad-group-1 mntl-block" data-dcnode-id="2154" id="ad-group-1_1-0"><span data-dcnode-id="2163" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2139" id="mntl-sc-block_1-0-3"><span data-dcnode-id="2143" instrument_node="">
Rhubarb is a member of the </span><em data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Rheum </span></em><span data-dcnode-id="2140" instrument_node="">genus of plants. Though it's a hardy perennial vegetable, it's used more like a fruit. In fact, a New York customs court judge ruled in 1947 that it is legally a fruit, and the U.S. Department of Agriculture (USDA) officially classifies it as such. The plant is a popular addition to backyard gardens and easy to grow (even difficult to get rid of when you want to). It requires a cold winter to thrive and produces its familiar brilliantly colored stalks—ranging from red to pink to pale green—in the spring.
</span></p><span data-dcnode-id="2138" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2127" id="mntl-sc-block_1-0-4"><div class="comp ad-group-2 mntl-block" data-dcnode-id="2128" id="ad-group-2_2-0"><span data-dcnode-id="2137" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2124" id="mntl-sc-block_1-0-5"><span data-dcnode-id="2125" instrument_node="">
Only the stalks of the rhubarb plant are eaten because the large, triangular leaves are poisonous. They contain&nbsp;a higher concentration of oxalic acid than foods like spinach, broccoli, and cauliflower (which have perfectly safe levels). It's also thought that rhubarb leaves may contain a more potent unidentified toxin. While you'd likely have to eat a large amount of the leaves for it to be lethal, even small amounts can cause nausea and vomiting. To be safe, do not eat or serve the leaves and keep them out of reach of children and pets. Once the leaves are removed, the rhubarb just needs to be cut and trimmed to your needs. Rhubarb is usually sold by the pound, ranging from $1.50 to $4 per pound. The price usually depends on availability from the season's harvest.
</span></p><span data-dcnode-id="2123" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2112" id="mntl-sc-block_1-0-6"><div class="comp ad-group-3 mntl-block" data-dcnode-id="2113" id="ad-group-3_1-0"><span data-dcnode-id="2122" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="2110" id="toc-how-to-cook-with-rhubarb"></span><span data-dcnode-id="2109" instrument_node=""> </span><h2 class="comp mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2104" id="mntl-sc-block_1-0-7"><span data-dcnode-id="2108" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node=""> How to Cook With Rhubarb </span></span><span data-dcnode-id="2105" instrument_node=""> </span></h2><span data-dcnode-id="2103" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2101" id="mntl-sc-block_1-0-8"><span data-dcnode-id="2102" instrument_node="">
Rhubarb is easy to prepare. Due to their toxicity, trimming and discarding the leaves is essential. Wash the stalks well and trim off the dry ends too. While it's tempting to peel the fibrous skin as you chop the stalks, try to resist this. The skin holds lots of color and flavor.
</span></p><span data-dcnode-id="2100" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2089" id="mntl-sc-block_1-0-9"><div class="comp ad-group-4 mntl-block" data-dcnode-id="2090" id="ad-group-4_1-0"><span data-dcnode-id="2099" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2083" id="mntl-sc-block_1-0-10"><span data-dcnode-id="2087" instrument_node="">
Two things happen to rhubarb when it's cooked: Its juices thicken, and it falls apart into fraying shreds of translucent fibers. Heavily cooked rhubarb has the perfect jellied consistency for </span><a data-component="link" data-dcnode-id="2085" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruceeats.com/easy-rhubarb-freezer-jam-recipe-1327678"><span data-dcnode-id="2086" instrument_node="">rhubarb jam</span></a><span data-dcnode-id="2084" instrument_node="">, as well as chutneys and compotes. It isn't so attractive when stir-fried or arranged on a tart. Quick heat yields tender but cohesive rhubarb pieces with rich flavor and a natural, glossy sheen.

</span><span class="heading-toc" data-dcnode-id="1969" id="toc-what-does-it-taste-like"></span><span data-dcnode-id="1968" instrument_node=""> </span><h2 class="comp mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1963" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1967" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node=""> What Does It Taste Like? </span></span><span data-dcnode-id="1964" instrument_node=""> </span></h2><span data-dcnode-id="1962" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1960" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1961" instrument_node="">
Raw rhubarb has a very tart taste that most people find unpleasant. For this reason, it's almost always cooked with sugar to counteract the sour flavor.
</span></p><span data-dcnode-id="1959" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1948" id="mntl-sc-block_1-0-19"><div class="comp ad-group-6 mntl-block" data-dcnode-id="1949" id="ad-group-6_1-0"><span data-dcnode-id="1958" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1946" id="toc-rhubarb-recipes"></span><span data-dcnode-id="1945" instrument_node=""> </span><h2 class="comp mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1940" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1944" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node=""> Rhubarb Recipes </span></span><span data-dcnode-id="1941" instrument_node=""> </span></h2><span data-dcnode-id="1939" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1934" id="mntl-sc-block_1-0-21"><span data-dcnode-id="1938" instrument_node="">
Rhubarb's tart fruitiness makes it perfect to use in desserts, and it's most often paired with strawberries. Its intense tartness makes it a nice foil for savory dishes, too. If you don't feel like cooking, try a simple snack and dip pieces of rhubarb in honey or sugar or boil it to </span><a data-component="link" data-dcnode-id="1936" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruceeats.com/polish-rhubarb-honey-drink-recipe-1135665"><span data-dcnode-id="1937" instrument_node="">make rhubarb juice</span></a><span data-dcnode-id="1935" instrument_node="">.
</span></p><span data-dcnode-id="1933" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1893" id="toc-where-to-buy-rhubarb"></span><span data-dcnode-id="1892" instrument_node=""> </span><h2 class="comp mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1887" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1891" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node=""> Where to Buy Rhubarb </span></span><span data-dcnode-id="1888" instrument_node=""> </span></h2><span data-dcnode-id="1886" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1884" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1885" instrument_node="">
Hothouse rhubarb is available most of the year, while field-grown stalks are available in early spring, typically from April through June. The Pacific Northwest is lucky enough to have a second harvest of rhubarb between June and July. The short growing season means you should enjoy it when you see it. It's often available at farmers markets and can be found in grocery stores. It is usually sold loose by the stalks. The stalks are the size of large individual celery stalks and are sold by the pound. Rhubarb may be sold in bulk by individual farmers if they have a bumper crop or had a particularly good growing season. Whatever the color, the stalks should be heavy and crisp with taut, shiny skin. Watch out for rubbery, fibrous, and dry stalks.
</span></p><span data-dcnode-id="1883" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1882" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="1881" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1879" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1880" instrument_node="">
Rhubarb can be grown and harvested from a home garden. Leave the plant the first year and do not harvest it. In the second year, you can take a small harvest, and by the third year, you can harvest the full crop. Harvest stalks that are at least 1-inch thick and leave the rest. To harvest, cut the stalks at the soil line or pull out individual stalks as needed. You can harvest the whole crop at the same time or harvest in succession over a four to six week period. Plants can remain productive for eight to 15 years unless affected by pests or diseases.
</span></p><span data-dcnode-id="1878" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1877" id="mntl-sc-block_1-0-29"></div><span data-dcnode-id="1876" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1875" id="toc-storage"></span><span data-dcnode-id="1874" instrument_node=""> </span><h2 class="comp mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1869" id="mntl-sc-block_1-0-30"><span data-dcnode-id="1873" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node=""> Storage </span></span><span data-dcnode-id="1870" instrument_node=""> </span></h2><span data-dcnode-id="1868" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1866" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1867" instrument_node="">
Store trimmed stalks in loose plastic in the crisper drawer of the fridge, where it will keep for about a week. Many cooks prefer to wash it only before using it, but if you do it prior to storing, ensure the rhubarb has dried completely. To freeze, cut the rhubarb stalks into 1-inch chunks and seal in an airtight bag. Frozen rhubarb will keep for up to a year at 0 F.
</span></p><span data-dcnode-id="1865" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1864" id="mntl-sc-block_1-0-32"></div><span data-dcnode-id="1863" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1859" id="mntl-sc-block_1-0-33"><span data-dcnode-id="1862" instrument_node="">
</span><br data-dcnode-id="1861"><span data-dcnode-id="1860" instrument_node="">
</span></p><span data-dcnode-id="1858" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1857" id="mntl-sc-block_1-0-34"></div><span data-dcnode-id="1856" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1855" id="toc-rhubarb-vs-chard"></span><span data-dcnode-id="1854" instrument_node=""> </span><h2 class="comp mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1849" id="mntl-sc-block_1-0-35"><span data-dcnode-id="1853" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node=""> Rhubarb vs. Chard </span></span><span data-dcnode-id="1850" instrument_node=""> </span></h2><span data-dcnode-id="1848" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1843" id="mntl-sc-block_1-0-36"><span data-dcnode-id="1847" instrument_node="">
At first glance, it can be easy to mistake rhubarb for some varieties of </span><a data-component="link" data-dcnode-id="1845" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruceeats.com/rainbow-red-and-swiss-chard-995607"><span data-dcnode-id="1846" instrument_node="">chard</span></a><span data-dcnode-id="1844" instrument_node="">, specifically ruby red chard, which also has red stems and is often included in bundles of rainbow chard. The two are very different, however. First of all, chard is a member of the beet family, though it's not used as a root vegetable.
</span></p><span data-dcnode-id="1842" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1841" id="mntl-sc-block_1-0-37"></div><span data-dcnode-id="1840" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1838" id="mntl-sc-block_1-0-38"><span data-dcnode-id="1839" instrument_node="">
The stalks of both plants are edible, though only chard's leaves can be eaten. If you can compare the two side by side, you will notice that chard's leaves have more prominent veins and that the color extends all the way through. Rhubarb's veins tend to blend in with the leaf, though this depends on the variety. Taste is the biggest difference: Where rhubarb is profoundly tart, chard tastes more like spinach.
</span></p><span data-dcnode-id="1837" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1836" id="mntl-sc-block_1-0-39"></div><span data-dcnode-id="1835" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1834" id="toc-varieties"></span><span data-dcnode-id="1833" instrument_node=""> </span><h2 class="comp mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1828" id="mntl-sc-block_1-0-40"><span data-dcnode-id="1832" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node=""> Varieties </span></span><span data-dcnode-id="1829" instrument_node=""> </span></h2><span data-dcnode-id="1827" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1825" id="mntl-sc-block_1-0-41"><span data-dcnode-id="1826" instrument_node="">
Many varieties of rhubarb exist, including some with green stalks that are surprisingly sweet. There are two basic types of rhubarb found in markets and larger grocery stores: the older, traditional variety with thicker, greener stalks, and the more intensely colored, slender-stalked variety, sometimes called hothouse rhubarb. The deep red stalks certainly make for brighter, more attractive dishes, but the concentrated color indicates stronger tartness. The greener stalks have a nicely balanced, mellow flavor.
</span></p><span data-dcnode-id="1824" instrument_node="">
