</span><h1 class="entry-title" data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Rhubarb Recipes</span></h1><span data-dcnode-id="1368" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1346"><span data-dcnode-id="1367" instrument_node="">

</span><p data-dcnode-id="1332"><strong data-dcnode-id="1334"><span data-dcnode-id="1337" instrument_node="">Cooking with Rhubarb</span><br data-dcnode-id="1336"><span data-dcnode-id="1335" instrument_node="">
</span></strong><span data-dcnode-id="1333" instrument_node="">– Lynley Ruck</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1288"><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/wp-content/uploads/2008/10/rhubarbcake_6w.jpg"><img alt="" class="alignright size-medium wp-image-1672" data-dcnode-id="1330" height="121" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/wp-content/uploads/2008/10/rhubarbcake_6w.jpg&amp;raw" title="rhubarbcake_6w" width="180"></a><span data-dcnode-id="1328" instrument_node="">I’m a </span><span data-dcnode-id="1325"><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/recipes/display.php%3Fid%3D1271"><span data-dcnode-id="1327" instrument_node="">fool</span></a></span><span data-dcnode-id="1324" instrument_node=""> for good old rhubarb.</span><span data-dcnode-id="1322" style="mso-spacerun: yes;"><span data-dcnode-id="1323" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1321" instrument_node="">It is not until November that fresh summer fruit begins to appear, local apples are past their best, it is way too early for decent plums and apricots and berry fruits are yet to make an appearance….and then there is rhubarb, reliable rhubarb.</span><span data-dcnode-id="1319" style="mso-spacerun: yes;"><span data-dcnode-id="1320" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1318" instrument_node="">It makes a fantastic choice for sweet tangy </span><span data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">desserts</span></span><span data-dcnode-id="1315" instrument_node=""> and </span><span data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">delicious pies</span></span><span data-dcnode-id="1312" instrument_node="">, </span><span data-dcnode-id="1309"><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/recipes/display.php%3Fid%3D377"><span data-dcnode-id="1311" instrument_node="">crumbles</span></a></span><span data-dcnode-id="1308" instrument_node="">, </span><span data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">shortcakes</span></span><span data-dcnode-id="1305" instrument_node="">, </span><span data-dcnode-id="1302"><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/recipes/display.php%3Fid%3D381"><span data-dcnode-id="1304" instrument_node="">muffins</span></a></span><span data-dcnode-id="1301" instrument_node=""> and </span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/recipes/display.php%3Fid%3D1278"><span data-dcnode-id="1297" style="color: #000000;"><span data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">jams</span></span><span data-dcnode-id="1298" instrument_node="">.</span></span></a><span data-dcnode-id="1295" instrument_node="">&nbsp; </span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/recipes/display.php%3Fid%3D379"><span data-dcnode-id="1294" instrument_node="">Rhubarb Sour Cream Cake</span></a><span data-dcnode-id="1292" instrument_node=""> (pictured) is a favourite for dessert with custard or afternoon tea with cream and </span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/recipes/display.php%3Fid%3D1272"><span data-dcnode-id="1291" instrument_node="">Rhubarb Swirl Pavlova</span></a><span data-dcnode-id="1289" instrument_node=""> will wow your dinner guests.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1286" instrument_node="">I don’t know why, but whenever I think of rhubarb the lyrics of an old English pub song springs to my mind “We’ll drink a drink a drink, to Lily the pink the pink the pink, the saviour of the human race. She invented medicinal compound, most efficacious in every case”. I adore the rosy, pink colour of cooked rhubarb and I’m not sure but I think rhubarb stalks might even be good for you – I have read about the fibre, calcium and vitamin c content, but then the amount of sugar required to render it edible may just offset any major health benefits.</span><span data-dcnode-id="1284" style="mso-spacerun: yes;"><span data-dcnode-id="1285" instrument_node="">&nbsp; </span></span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1281" instrument_node="">Rhubarb is actually a vegetable that is closely related to sorrel and dock, not a fruit.</span><span data-dcnode-id="1279" style="mso-spacerun: yes;"><span data-dcnode-id="1280" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1278" instrument_node="">The leaves are very toxic and can be used as an insecticide in organic gardens.</span><span data-dcnode-id="1276" style="mso-spacerun: yes;"><span data-dcnode-id="1277" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1275" instrument_node="">If you have space, rhubarb is a wonderful addition to the </span><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.garden-nz.co.nz/article/archive/1348/"><span data-dcnode-id="1274" instrument_node="">kitchen garden</span></a><span data-dcnode-id="1272" instrument_node="">, and what a great trade-off – a pile of steaming cow manure and a rhubarb plant, for an endless supply of the tangy gorgeousness that is rhubarb.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1269" instrument_node="">The classic combination, rhubarb and custard go together like, well, rhubarb and custard!</span><span data-dcnode-id="1267" style="mso-spacerun: yes;"><span data-dcnode-id="1268" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1266" instrument_node="">Although rhubarb needs its sugar fix, it also partners up well with oranges or apples, ginger, straw or any berries, rosewater, butter and cream, pastry, pineapple, almonds and vanilla.</span><span data-dcnode-id="1264" style="mso-spacerun: yes;"><span data-dcnode-id="1265" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1263" instrument_node="">The sharp tangy aspect of rhubarb means it also makes a great </span><span data-dcnode-id="1260"><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/recipes/display.php%3Fid%3D1275"><span data-dcnode-id="1262" instrument_node="">relish</span></a></span><span data-dcnode-id="1259" instrument_node="">, </span><span data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">sauce </span></span><span data-dcnode-id="1256" instrument_node="">or </span><span data-dcnode-id="1253"><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/recipes/display.php%3Fid%3D1277"><span data-dcnode-id="1255" instrument_node="">chutney</span></a></span><span data-dcnode-id="1252" instrument_node="">.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1249" instrument_node="">The starting point for many a recipe is stewed rhubarb, and while this term does make it sound like there may be prunes in the near vicinity, rest assured, stewed rhubarb is the same as poached rhubarb which is in turn also very nearly rhubarb compote.</span><span data-dcnode-id="1247" style="mso-spacerun: yes;"><span data-dcnode-id="1248" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1246" instrument_node="">The ingredients for each of these methods are the same but the roasting method works best if you want to retain the shape of the stalks.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1243" instrument_node="">To stew, poach or puree rhubarb: Top and tail your rhubarb and cut into 10 cm lengths and place in a saucepan. Add a generous amount of sugar (to your taste) and a few tablespoons of liquid (water or orange juice work well).</span><span data-dcnode-id="1241" style="mso-spacerun: yes;"><span data-dcnode-id="1242" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1240" instrument_node="">Cover with a lid, to poach, cook slowly until tender, to stew cook rapidly until completely softened and mushy.</span><span data-dcnode-id="1238" style="mso-spacerun: yes;"><span data-dcnode-id="1239" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1237" instrument_node="">For a smooth puree – you can blend the stewed rhubarb.</span><span data-dcnode-id="1235" style="mso-spacerun: yes;"><span data-dcnode-id="1236" instrument_node="">&nbsp; </span></span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">To roast rhubarb, slice stalks into 10 cm lengths and place in an ovenproof dish with the same amount of sugar and liquid and bake at 350 for ½ an hour or until tender.&nbsp; Roasting helps to retain shape and colour.&nbsp;&nbsp;Orange zest, rosewater or split vanilla beans can also be added before cooking.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1229" instrument_node="">Rhubarb crumble is a popular way to use cooked rhubarb, you can use your standard fruit crumble recipe or you might like to try a </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodlovers.co.nz/recipes/display.php%3Fid%3D1279"><span data-dcnode-id="1225" style="color: #000000;"><span data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">healthier version</span></span><span data-dcnode-id="1226" instrument_node="">.</span></span></a><span data-dcnode-id="1217" style="color: #000000;"><span data-dcnode-id="1222" style="mso-spacerun: yes;"><span data-dcnode-id="1223" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1221" instrument_node="">Rhubarb also responds well to a general ‘chutnification’, I have included an unusual Mint Sauce Chutney recipe that goes well with crispy roasted lamb and another basic relish recipe that would make a great gift.</span><span data-dcnode-id="1219" style="mso-spacerun: yes;"><span data-dcnode-id="1220" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1218" instrument_node="">I do believe that cumin and coriander deserve further investigation. </span></span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1214" instrument_node="">If you are making a trifle by all means use roasted rosewater rhubarb under the custard and on top of the sponge, put it under your cobbler or brulee or on top of your breakfast cereal, between sheets of pastry with crème anglaise, use it as a suspension medium for rose petals in jelly, but having said all that, I did find it difficult to locate savoury recipes that require rhubarb.</span><span data-dcnode-id="1212" style="mso-spacerun: yes;"><span data-dcnode-id="1213" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1211" instrument_node="">There are a few chicken recipes – but I have to say that combination did not appeal and I wouldn’t go there, unless there were a multitude of poultry sins to hide!</span><span data-dcnode-id="1209" style="mso-spacerun: yes;"><span data-dcnode-id="1210" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1208" instrument_node="">On the other hand the sweetened, aromatic, tangy desserts, cakes and pastries appeal a little too much…………enjoy the rhubarb season!</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1205" instrument_node="">For great tips with growing rhubarb take a look at </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.garden-nz.co.nz/article/archive/1348/"><span data-dcnode-id="1204" instrument_node="">Garden-NZ</span></a></p><span data-dcnode-id="1201" instrument_node="">
</span></div><span data-dcnode-id="1198" instrument_node="">

</span><div class="comment-content" data-dcnode-id="930"><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">You mentioned savoury recipes with rhubarb. There is an excellent recipe for rhubarb khoresh (a meat stew/sauce with fruit) in Claudia Roden’s classic, A New Book of Middle Eastern Food (Penguin, 1986). Heat 1 tbsp butter in a large saucepan to fry 1 finely chopped onion till golden. Add 500g lean lamb, cubed, season to taste with salt and pepper, and add 1/4 tsp ground cinnamon. Bring to boil and simmer about 2 hours until meat is very tender. Saute 500g rhubabr stalks cut into 5 cm lengths in 2 tbsps butter for a few minutes, sprinkle with juice of 1/2 lemon, cook a few minutes longr, add to the meat stew and simmer for 10 mins. Serve with rice.</span></p><span data-dcnode-id="931" instrument_node="">
