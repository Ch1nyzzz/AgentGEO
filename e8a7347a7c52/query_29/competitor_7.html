luscious fruit for eating fresh or preparing as a wonderful dessert. The fruit are large, sweet and
juicy with an excellent flavour and are borne over an exceptionally long period. It is easy to
manage as the old canes are simply cut down to ground level after fruiting to allow room for the
new canes next season. The canes grow to 1.8 m tall and can be tied to a trellis or tripod and are

Hardy 'Black and Bloom' is a lovely perennial with beautiful, large, deep violet-blue flowers with black
calyces on sturdy black spikes flowering from spring to autumn. The dark green, shiny leaves have a sweet
anise scent and provide an attractive contrast to the flowers. It grows to 90 - 120 cm high and 90 cm wide.
It is a low maintenance flowering plant that is attractive to bees and butterflies. It is an excellent cut
flower, bedding plant or to grow in containers. The flower spikes can be dried and used as everlasting flowers
for bouquets or craft projects. It prefers a rich, moist, well-drained in full sun to light shade but tolerates
poorer soils. Suitable for all climate zones. Time to bloom: 100 days</span><br data-dcnode-id="1486"><br data-dcnode-id="1485"><span data-dcnode-id="1484" instrument_node="">

Mexican Bush Sage is a hardy, herbaceous perennial native to the subtropics with a long flowering period.
It grows to 1.3 m high with grey-green leaves on long arching stems. The flowers are a beautiful deep velvety
purple forming an attractive contrast to the silvery foliage. It is in flower from late summer through to late
autumn. Mexican Sage is a low maintenance, drought tolerant flowering plant that is attractive to bees and
butterflies. The flower spikes can used as a cut flower. It prefers a moist, well-drained in full sun but
tolerates poorer soils. Suitable for all climate zones.

sturdy spikes that is very free-flowering. It grows to 40 cm high and 30 cm wide. It is a
perennial in warmer areas but grows as an annual in colder areas. A particularly hardy,
low maintenance flowering plant that is attractive to bees and beneficials. It is an
excellent cut flower, bedding plant or to grow in containers. The flower spikes can be
dried and used as everlasting flowers for bouquets or craft projects. It prefers a rich,

Hardy 'Purple and Bloom' is a lovely perennial with large, deep purple flowers with dark purplish bracts on sturdy stems flowering
from spring to autumn. The flower spikes are held above the glossy green leaves which provide an attractive contrast to the flowers.
It grows in a neat mound to 100 - 120 cm high and 90 - 120 cm wide. It is a low maintenance flowering plant that is attractive to
bees and butterflies. It is an excellent cut flower, bedding plant or to grow in containers. The flower spikes can be dried and used
as everlasting flowers for bouquets or craft projects. It prefers a rich, moist, well-drained in full sun to light shade but
tolerates poorer soils. Suitable for all climate zones. Time to bloom: 100 days.

'Salvatore Blue' is a compact, hardy perennial that sends up spires of dense, tiny blooms in dark indigo
purple from late spring to autumn. It grows to 25 - 30 cm high and 15 - 20 cm wide with a tidy habit. Easy
to grow and maintain, it entices a steady stream of bees and butterflies. 'Salvatore Blue' works well as a
ribbon of colour at the edge of beds or in containers. It loves heat, tolerates drought and will grow in
full sun to light shade. Suitable for all climate zones including tropical areas. Time to bloom: 56 - 84 days.

Aromatic Salvia 'Roman Red' is a lovely, compact, hardy perennial with vivid red-scarlet blooms above

sweeter, with a subtler flavour than other members of the onion family. They are preferred in Asian cooking,

are suitable for NSW, VIC and southern areas of QLD. Each bulb weighs approx. 17 g; with an average of 60
bulbs per kg. </span><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greenharvest.com.au/Plants/Information/Shallots.html"><span data-dcnode-id="1080" instrument_node="">More info on growing shallots...</span></a><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">

</span><b data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Strawberries</span></b><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">

For the home gardener, being able to harvest bowlfuls of fresh, juicy, organic strawberries early in the
morning for breakfast is a great motivator but keep in mind if there are kids involved, very few may
actually make it back to the kitchen. Growing your own strawberries is easy to achieve with the right approach.</span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">
Strawberries are available as 3 main types and all of them have a place in a food garden:
</span><div class="Indent2em" data-dcnode-id="872"><span data-dcnode-id="894" instrument_node="">
</span><div class="Indent2em" data-dcnode-id="888"><span data-dcnode-id="892" style="margin: 0.0ex 0.0em 0.0ex -2.0em;"><span data-dcnode-id="893" instrument_node="">1. </span></span><b data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Alpine or Woodland Strawberries</span></b><span data-dcnode-id="889" instrument_node="">
are hardy perennials producing small fruit with an intense strawberry flavour. A useful plant for path edging in
shady areas. They do not run but the clumps get bigger over time and can be divided.</span></div><span data-dcnode-id="887" instrument_node="">
</span><div class="Indent2em" data-dcnode-id="881"><span data-dcnode-id="885" style="margin: 0.0ex 0.0em 0.0ex -2.0em;"><span data-dcnode-id="886" instrument_node="">2. </span></span><b data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Ever-bearer or Sweetheart</span></b><span data-dcnode-id="882" instrument_node="">
strawberry types such as 'Fresca' and 'Ruby Red' are almost runnerless making them easy to maintain and great
for containers and hanging baskets. These have the advantage of fruiting after the main crop types have finished,
giving you a longer strawberry season.</span></div><span data-dcnode-id="880" instrument_node="">
</span><div class="Indent2em" data-dcnode-id="874"><span data-dcnode-id="878" style="margin: 0.0ex 0.0em 0.0ex -2.0em;"><span data-dcnode-id="879" instrument_node="">3. </span></span><b data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Main Crop Strawberries</span></b><span data-dcnode-id="875" instrument_node=""> such
as 'Joy' and 'Lowanna' produce a large crop the first year (think bowlfuls of yummy, fresh strawberries) and a
smaller crop the second year. After that the strawberry bed should be replanted with young runner plants.</span></div><span data-dcnode-id="873" instrument_node="">
</span></div><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">

</span><i data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Fragaria vesca</span></i><span data-dcnode-id="848" instrument_node=""> var. </span><i data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">vesca</span></i><br data-dcnode-id="845"><span data-dcnode-id="844" instrument_node="">
Syn. Fraises des Bois, woodland strawberry, wild strawberry</span><br data-dcnode-id="843"><span data-dcnode-id="842" instrument_node="">
Alpine strawberries are cultivated versions of the woodland strawberries that have been grown in home gardens
since the 12th century. Alpine strawberries can grow in full sun, although in very hot areas, they do better
in dappled shade. Like other strawberries, they do best in a rich, fertile, well-drained soil. The plants are
hardy and unlike other strawberries, they do not send out runners. Instead they grow as a leafy mound to 30 cm
in height. Plants bear fruit the first season after planting. Feed and water regularly and they will continue
to fruit for 2 to 4 years, after that they can be rejuvenated by division. Alpine strawberries are best grown
in temperate or cooler subtropical areas.</span><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">
