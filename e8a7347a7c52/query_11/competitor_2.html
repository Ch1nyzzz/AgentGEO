</span><div class="block__content" data-dcnode-id="1928"><span data-dcnode-id="1951" instrument_node="">
</span><div class="text-content field field--name-field-body field--type-text-long field--label-hidden field__item" data-dcnode-id="1930"><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">What grows for 10 years or more, suffers from almost from no pests, and is refreshingly easy to grow? It’s rhubarb! This perennial vegetable has tart-flavored ruby or green stems used to make pies, crumbles, jams, and sauces. Plant in late autumn or early spring when the soil is workable. Learn everything you need to know to grow and care for your own&nbsp;rhubarb.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><span data-dcnode-id="1946" instrument_node="">
</span><h3 data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">About&nbsp;Rhubarb</span></h3><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Rhubarb originally came from Asia. It was brought to Europe in the 1600s and to America not long thereafter. It thrives in areas with a cooler climate, making it&nbsp;popular in northern gardens.&nbsp;Rhubarb is easy to grow, but needs a dormancy period&nbsp;to really thrive and produce an abundance of&nbsp;huge&nbsp;stalks.</span></p><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">The stalks are the only edible part of the rhubarb plant. These&nbsp;have a rich, tart flavor when cooked. The leaves of the rhubarb&nbsp;plant are toxic. They contain an irritant called oxalic acid, so be sure that they are not&nbsp;ingested.</span></p><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">What’s wonderful about rhubarb is that it’s a perennial: It will produce for many years, five or more. For that reason, rhubarb should be planted in its own space in any corner of the garden where it can grow undisturbed. Rhubarb grows well in&nbsp;soil amended with plenty of well-rotted manure or compost; this has inspired&nbsp;some gardeners to just go ahead and plant it near their compost&nbsp;piles!</span></p><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">With its ruby or green stems and umbrella-like leaves, rhubarb also&nbsp;adds height and structure to your garden along with a splash of gorgeous color that will return year in and year&nbsp;out.&nbsp;</span></p><span data-dcnode-id="1931" instrument_node="">
</span></div><span data-dcnode-id="1929" instrument_node="">
</span></div><span data-dcnode-id="1927" instrument_node="">
</span></div><span data-dcnode-id="1925" instrument_node="">
</span><div class="body-ad-wrapper block block-layout-builder block-field-blocknodeplantfield-planting" data-dcnode-id="1319"><span data-dcnode-id="1924" instrument_node="">
</span><div class="block__content" data-dcnode-id="1321"><span data-dcnode-id="1923" instrument_node="">
</span><div class="text-content field field--name-field-planting field--type-text-long field--label-above" data-dcnode-id="1323"><span data-dcnode-id="1922" instrument_node="">
</span><div class="field__label" data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Planting</span></div><span data-dcnode-id="1919" instrument_node="">
</span><div class="field__item" data-dcnode-id="1325"><p data-dcnode-id="1914"><span data-dcnode-id="1918" instrument_node="">You’ll want to plant one-year-old rhubarb crowns which&nbsp;you find at a garden center, nursery, or order online. Plants will be sold as bare-rooted specimen, mixed with peat moss, shredded paper, or other similar material. Some garden centers will have rhubarb&nbsp;already growing in pots, ready for transplanting. &nbsp;Rhubarb can be grown from seed, but this is not&nbsp;recommended. It takes several years for rhubarb plants to be mature enough to produce a good harvest. Rhubarb can be planted in late fall </span><span class="caps" data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">OR</span></span><span data-dcnode-id="1915" instrument_node=""> early&nbsp;spring.</span></p><span data-dcnode-id="1913" instrument_node="">
</span><h3 data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">When to Plant&nbsp;Rhubarb</span></h3><span data-dcnode-id="1910" instrument_node="">
</span><ul data-dcnode-id="1902"><span data-dcnode-id="1909" instrument_node="">
</span><li data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">In fall, plant rhubarb crowns after dormancy has set in, and you’ll have rhubarb cropping in the&nbsp;spring!</span></li><span data-dcnode-id="1906" instrument_node="">
</span><li data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">In spring, plant crowns&nbsp;as soon as the soil is workable, when the roots are still dormant, and before growth begins (or as plants are just beginning to leaf out). If you have a temperature gauge, soil temperature should be 50 degrees F&nbsp;minimum.</span></li><span data-dcnode-id="1903" instrument_node="">
</span></ul><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1892"><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenplanner.almanac.com/"><img alt="Spacing for Rhubarb" data-dcnode-id="1894" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/Almanac%2520Staff/growveg_rhubarb.jpeg&amp;raw" style="width: 720px; height: 238px;"></a></p><span data-dcnode-id="1891" instrument_node="">
</span><h3 data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">How to Plant&nbsp;Rhubarb</span></h3><span data-dcnode-id="1888" instrument_node="">
</span><ul data-dcnode-id="1850"><span data-dcnode-id="1887" instrument_node="">
</span><li data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Rhubarb grows best in full sun, but will tolerate partial&nbsp;shade.</span></li><span data-dcnode-id="1884" instrument_node="">
</span><li data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Choose a site with soil that is well-draining and fertile. Good drainage is essential, as rhubarb will rot if kept too&nbsp;wet.</span></li><span data-dcnode-id="1881" instrument_node="">
</span><li data-dcnode-id="1873"><span data-dcnode-id="1880" instrument_node="">Mix compost, rotted manure, or anything high in organic matter into&nbsp;the soil. Rhubarb plants are heavy feeders and need this organic matter.&nbsp;Learn more about </span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/blog/gardening/garden-journal/organic-soil-amendments-explained"><span data-dcnode-id="1879" instrument_node="">soil amendments</span></a><span data-dcnode-id="1877" instrument_node=""> and </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/content/preparing-soil-planting"><span data-dcnode-id="1876" instrument_node="">preparing soil for planting</span></a><span data-dcnode-id="1874" instrument_node="">.</span></li><span data-dcnode-id="1872" instrument_node="">
</span><li data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Rhubarb gets big! It can grow to 2 to 3 feet tall and wide. Make sure you choose a site where it won’t be&nbsp;crowded.</span></li><span data-dcnode-id="1869" instrument_node="">
</span><li data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Rhubarb does best where the average temperature falls below 40ºF (4°C) in the winter and below 75ºF (24°C) in the&nbsp;summer.</span></li><span data-dcnode-id="1866" instrument_node="">
</span><li data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Before planting, eliminate all perennial weeds in the planting&nbsp;site.</span></li><span data-dcnode-id="1863" instrument_node="">
</span><li data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Dig large, bushel-basket–size&nbsp;holes.</span></li><span data-dcnode-id="1860" instrument_node="">
</span><li data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Space rhubarb plants about 2 to 4 feet apart and 3 to 4 feet between&nbsp;rows.</span></li><span data-dcnode-id="1857" instrument_node="">
</span><li data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Plant crowns so the eyes are about 2 inches below the soil surface with buds facing&nbsp;up.</span></li><span data-dcnode-id="1854" instrument_node="">
</span><li data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Water well at the time of&nbsp;planting.</span></li><span data-dcnode-id="1851" instrument_node="">
</span></ul><span data-dcnode-id="1849" instrument_node="">

</span><div class="field__label" data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Growing</span></div><span data-dcnode-id="1312" instrument_node="">
</span><div class="field__item" data-dcnode-id="1284"><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Overcrowding is common problem with rhubarb and can lead to subpar growth. Dig and split rhubarb roots every 3 to 4 years. Divide when plants are dormant in early spring (or late fall). Divisions should have at least one large bud on&nbsp;them.&nbsp;</span></p><span data-dcnode-id="1309" instrument_node="">
</span><ul data-dcnode-id="1289"><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Mulch generously with a heavy layer of straw to retain moisture and discourage&nbsp;weeds.</span></li><span data-dcnode-id="1305" instrument_node="">
</span><li data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Water your plant well and consistently. Rhubarb needs sufficient moisture, especially&nbsp;during the hot, dry days of&nbsp;summer.&nbsp;</span></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Remove seed stalks as soon as they appear, as they will only drain energy from the plant that could otherwise be used for producing stalks or&nbsp;roots.</span></li><span data-dcnode-id="1299" instrument_node="">
</span><li data-dcnode-id="1294"><span data-dcnode-id="1298" instrument_node="">Each spring, apply a light sprinkling of a&nbsp;fertilizer (10-10-10) when the ground is thawing or has just thawed. </span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/gardening/frostdates"><span data-dcnode-id="1297" instrument_node="">See your local frost dates</span></a><span data-dcnode-id="1295" instrument_node="">.</span></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">In the fall, remove all plant debris. Once your ground freezes, it’s best to cover rhubarb with 2 to 4 inches of an organic mulch, preferably well-rotted compost. By adding nitrogen to the soil, you’re preparing the rhubarb plants for a good spring&nbsp;season.</span></li><span data-dcnode-id="1290" instrument_node="">
</span></ul><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><img alt="Rhubarb leaf" data-dcnode-id="1287" height="481" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/users/The%2520Editors/rhubarb-5033307_1920_full_width.jpg&amp;raw" width="720"></p><span data-dcnode-id="1285" instrument_node="">

</span><div class="field__label" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Pests/Diseases</span></div><span data-dcnode-id="1271" instrument_node="">
</span><div class="field__item" data-dcnode-id="1255"><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Pests and diseases are rarely an issue with rhubarb, but they may be affected&nbsp;by:</span></p><span data-dcnode-id="1268" instrument_node="">
</span><ul data-dcnode-id="1257"><span data-dcnode-id="1267" instrument_node="">
</span><li data-dcnode-id="1264"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Crown&nbsp;rot</span></strong></li><span data-dcnode-id="1263" instrument_node="">
</span><li data-dcnode-id="1259"><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Rhubarb curculio</span></strong><span data-dcnode-id="1260" instrument_node=""> (a&nbsp;beetle)</span></li><span data-dcnode-id="1258" instrument_node="">
</span></ul><span data-dcnode-id="1256" instrument_node="">
</span></div><span data-dcnode-id="1254" instrument_node="">
</span></div><span data-dcnode-id="1252" instrument_node="">
</span></div><span data-dcnode-id="1250" instrument_node="">
</span></div><span data-dcnode-id="1248" instrument_node="">
</span><div class="body-ad-wrapper block block-layout-builder block-field-blocknodeplantfield__recommended" data-dcnode-id="1204"><span data-dcnode-id="1247" instrument_node="">
</span><div class="block__content" data-dcnode-id="1206"><span data-dcnode-id="1246" instrument_node="">
</span><div class="text-content field field--name-field__recommended field--type-text-long field--label-above" data-dcnode-id="1208"><span data-dcnode-id="1245" instrument_node="">
</span><div class="field__label" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node=""> Recommended Varieties</span></div><span data-dcnode-id="1242" instrument_node="">
</span><div class="field__item" data-dcnode-id="1210"><ul data-dcnode-id="1212"><span data-dcnode-id="1241" instrument_node="">
</span><li data-dcnode-id="1238"><strong data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">‘Canada&nbsp;Red’</span></strong></li><span data-dcnode-id="1237" instrument_node="">
</span><li data-dcnode-id="1234"><b data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">‘Cherry&nbsp;Red’</span></b></li><span data-dcnode-id="1233" instrument_node="">
</span><li data-dcnode-id="1230"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">‘Crimson&nbsp;Red’</span></strong></li><span data-dcnode-id="1229" instrument_node="">
</span><li data-dcnode-id="1226"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">‘MacDonald’</span></strong></li><span data-dcnode-id="1225" instrument_node="">
</span><li data-dcnode-id="1222"><strong data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">‘Valentine’</span></strong></li><span data-dcnode-id="1221" instrument_node="">
</span><li data-dcnode-id="1218"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">‘Victoria’</span></strong></li><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1214"><b data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">‘Riverside&nbsp;Giant’</span></b></li><span data-dcnode-id="1213" instrument_node="">
</span></ul><span data-dcnode-id="1211" instrument_node="">
</span></div><span data-dcnode-id="1209" instrument_node="">
</span></div><span data-dcnode-id="1207" instrument_node="">
</span></div><span data-dcnode-id="1205" instrument_node="">
</span></div><span data-dcnode-id="1203" instrument_node="">
</span><div class="body-ad-wrapper block block-layout-builder block-field-blocknodeplantfield-harvest" data-dcnode-id="1154"><span data-dcnode-id="1202" instrument_node="">
</span><div class="block__content" data-dcnode-id="1156"><span data-dcnode-id="1201" instrument_node="">
</span><div class="text-content field field--name-field-harvest field--type-text-long field--label-above" data-dcnode-id="1158"><span data-dcnode-id="1200" instrument_node="">
</span><div class="field__label" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Harvesting</span></div><span data-dcnode-id="1197" instrument_node="">
</span><div class="field__item" data-dcnode-id="1160"><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Do not harvest any stalks during the first growing season. Harvest sparingly in the second year. This allows your plants to&nbsp;become properly&nbsp;established.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><ul data-dcnode-id="1177"><span data-dcnode-id="1193" instrument_node="">
</span><li data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">After a plant’s third&nbsp;year, the harvest period runs 8 to 10 weeks long, lasting through&nbsp;mid-summer.</span></li><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Harvest&nbsp;stalks when they are 12 to 18 inches long and at least 3/4-inch in diameter.&nbsp;If the stalks become thin, stop harvesting; this means the plant’s food reserves are&nbsp;low.</span></li><span data-dcnode-id="1187" instrument_node="">
</span><li data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Grab the base of the stalk and pull it away from the plant with a gentle twist. If this doesn’t work, you can cut the stalk at the base with a sharp knife. To prevent the spread of disease, be sure to sanitize the knife before cutting. Discard the&nbsp;leaves.</span></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Always leave at least 2 stalks per plant to ensure continued production. You may have a bountiful harvest for up to 20 years without having to replace your rhubarb&nbsp;plants.</span></li><span data-dcnode-id="1181" instrument_node="">
</span><li data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">It was once believed&nbsp;that the entire rhubarb plant becomes toxic as summer temperatures rose. This isn’t true, although summer-harvested stalks usually have a&nbsp;tougher texture than those picked in the spring. Nevertheless, after mid-summer, it’s best to leave stalks on the plant to allow them to gather energy for next year’s&nbsp;growth.</span></li><span data-dcnode-id="1178" instrument_node="">
</span></ul><span data-dcnode-id="1176" instrument_node="">
</span><h3 data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">How to Store&nbsp;Rhubarb</span></h3><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Cut the rhubarb stalks and refrigerate in a covered container. Or, tightly wrap stalks in plastic or aluminum foil and refrigerate.&nbsp;Rhubarb can be kept fresh in the refrigerator for a couple of&nbsp;weeks.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Cut rhubarb stalks in pieces and place in a covered container or zip-type plastic bag, and put in freezer. Frozen rhubarb will last about a&nbsp;year.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1161" instrument_node="">

</span><p class="comment__author" data-dcnode-id="697"><span data-dcnode-id="698" datatype="" lang="" property="schema:name" typeof="schema:Person"><span data-dcnode-id="699" instrument_node="">BravoCharleyWindsor (not verified)</span></span></p><span data-dcnode-id="696" instrument_node="">
</span><p class="comment__time" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">5 months 1 week ago</span></p><span data-dcnode-id="693" instrument_node="">

</span><div class="comment__content" data-dcnode-id="671"><span data-dcnode-id="690" instrument_node="">
</span><div class="text-content field field--name-comment-body field--type-text-long field--label-hidden field__item comment__text-content" data-dcnode-id="680"><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">I have a 4 ft. by 12 ft. raised bed of rhubarb. I inherited the roots about 15 years ago it when my aging father wanted to close down his gardening. The roots originally came from my grandparents place (mother's side), split off from their stock that they had been keeping going since the mid 1920's!! I have no idea what variety it is but I guess it would be considered 'heirloom"! I always know spring is here when I notice the rhubarb budding up from the ground. </span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">It does well in the raised bed but does need some manure top dressing this year. I decided to establish my rhubarb in a raised bed to keep weeds at bay. I remembered the difficulty of weeding the ground level bed my dad had them in. They were at the edge of the garden and lawn, grass was always invading the rhubarb, and it made for quite a chore to clean it out. My raised bed has been successful at minimizing weeds. Every year it provides all the rhubarb I need and can share. I have even sent a huge bundle overnight express (yes, $$, that was a bit pricey!) to a colleague in El Paso Texas after he visited this area (upstate NY) for work and I shared some rhubarb pie (NEVER with strawberries!!!) with him that he loved! Once I have harvested all I want I leave the plants to grow and feed the root. I only have to cut off the flower stalks and pluck leaves as they age and are replaced by new ones.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Also, I have heard that rhubarb leaves can be used to make a "tea" (extracting the acids and toxins) to make a natural pesticide. Does anyone else have any insight into making or using that?</span></p><span data-dcnode-id="681" instrument_node="">
</span></div><span data-dcnode-id="679" instrument_node="">
