-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="1521"></path></svg></span></a></div><noscript data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">&lt;img src="https://northernnester.com/wp-content/uploads/2021/06/when-to-plant-rhubarb.jpg" class="wp-image-2015045 sp-no-webp" alt="when to plant rhubarb" height="600" width="800" srcset="https://northernnester.com/wp-content/uploads/2021/06/when-to-plant-rhubarb.jpg 800w, https://northernnester.com/wp-content/uploads/2021/06/when-to-plant-rhubarb-300x225.jpg 300w, https://northernnester.com/wp-content/uploads/2021/06/when-to-plant-rhubarb-768x576.jpg 768w" sizes="(max-width: 800px) 100vw, 800px"&gt;</span></noscript></figure></div><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Rhubarb, nicknamed pieplant, is a wonderfully old-fashioned veggie-garden regular that produces a reliable summer crop year after year. Once established, rhubarb plants will produce an edible harvest for at least 8 years, even up to 20.</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1506" instrument_node="">But when should you plant rhubarb? </span><strong data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Generally, you can plant rhubarb in spring or late in the fall. If you are growing rhubarb from seed, plant eight weeks after the last frost date. Plant rhubarb crowns when the ground is workable. In the fall plant once the rhubarb is dormant.&nbsp;</span></strong></p><span data-dcnode-id="1502" instrument_node="">
</span><h2 data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Planting Rhubarb in Different Climates</span></h2><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Rhubarb is a hardy plant that can withstand temperatures as low as 35°F (1.6°C). It thrives in most parts of North America.&nbsp;</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Rhubarb crowns and the woody rhizomes don’t suffer any ill effects when left in very cold, dry soil for months, even if they are frozen.&nbsp;</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">In fact, rhubarb grows best in planting zones where the ground freezes in winter. But frost will cause the leaves and shoots to die back.&nbsp;</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">It needs at least 500 hours (about 3 weeks) of winter temperatures between 28 and 40°F (-2 and 4.4°C) to form new leaf buds.&nbsp;</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">It also needs temperatures of above 40°F (4.4°C) in spring to break dormancy and start growing. Because it’s a cool-season vegetable, it does best when the average winter temperature is below 40°F (4.4°C).&nbsp;</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">It needs summer temperatures that average less than 75°F (24°C) during the growing season.&nbsp;</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">According to the Oregon State University (OSU) Extension Service, spring low temperatures and cultivar genetics help the development of pink-to-red pigment in rhubarb stalks. Parts of Oregon are high-desert and very dry, so they recommend growing the plant where it gets late afternoon shade in summer.&nbsp;&nbsp;</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">This illustrates how different climates can affect specific practices that relate to growing rhubarb in your home garden.&nbsp;</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">According to the University of Minnesota Extension, rhubarb grows best in zone 4 where the annual extreme minimum temperature is -20 to -30°F (-28.9 to -34.3°C).</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1471" instrument_node="">Nevertheless, rhubarb is grown successfully in </span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//planthardiness.ars.usda.gov/PHZMWeb/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1470" instrument_node="">USDA plant hardiness zones</span></a><span data-dcnode-id="1468" instrument_node=""> 3-8. The minimum temperature in these zones varies from -40°F (-40°C) to 10°F (-12.2°C).&nbsp;</span></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1462"><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Koppen-climate-classification" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1465" instrument_node="">Köppen climate classifications</span></a><span data-dcnode-id="1463" instrument_node=""> can be useful too. Although broad, these are as relevant as the plant hardiness zones.&nbsp;</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Just remember that hardiness to cold weather isn’t the only factor that makes an impact on planting and growing vegetables. You need to find out about elements like humidity, rainfall (which the Kӧppen system does), and the average length of a typical growing season.&nbsp;</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Also, if you grow rhubarb in warm climates, they probably won’t continue to reproduce year in and year out.&nbsp;</span></p><span data-dcnode-id="1455" instrument_node="">
</span><h3 data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Köppen Climate Classifications</span></h3><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">There are five main climate types originally defined by the German botanist-climatologist Wladimier Köppen. All except one (a dry climate) is defined by temperature, like the plant hardiness zones.&nbsp;</span></p><span data-dcnode-id="1449" instrument_node="">
</span><h4 data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Tropical Climate</span></h4><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">This is the warmest climate type and the temperature of the coolest month is at least 64.4°F (18°C). This equates with zone 13, which is much too hot for growing rhubarb.&nbsp;&nbsp;</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">There are also three subtypes defined by rainfall, although this won’t be a factor for rhubarb:</span></p><span data-dcnode-id="1440" instrument_node="">
</span><ol data-dcnode-id="1433"><li data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">No dry season</span></li><li data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Short dry season</span></li><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Winter dry season&nbsp;</span></li></ol><span data-dcnode-id="1432" instrument_node="">
</span><h4 data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Dry Climate</span></h4><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">A dry climate may be arid or semiarid, as well as warm or cold.&nbsp;</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Rhubarb is relatively drought tolerant. If your climate is semiarid and warm, you can probably grow rhubarb successfully, especially if you irrigate regularly.&nbsp;</span></p><span data-dcnode-id="1423" instrument_node="">
</span><h4 data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Temperate Climate</span></h4><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Like tropical climates, temperate climate types factor in dryness:</span></p><span data-dcnode-id="1417" instrument_node="">
</span><ol data-dcnode-id="1410"><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">No dry season</span></li><li data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Winter dry</span></li><li data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Summer dry</span></li></ol><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">The temperature in the coldest month is between 64.4 and 26.6°F (18 and -3°C). In the hottest month it is at least 50°F (10°C).</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">This is not the ideal climate for growing rhubarb, but it does get cold enough in zone 9 areas.&nbsp;&nbsp;</span></p><span data-dcnode-id="1403" instrument_node="">
</span><h4 data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Continental Climate</span></h4><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Continental climates have the same dry differences as temperate climates, but with a fourth subtype. This indicates the warmth of summer or the coldness of winter.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Temperatures in continental climates vary a lot, and some colder areas are ideal for growing rhubarb.&nbsp;</span></p><span data-dcnode-id="1394" instrument_node="">
</span><h4 data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Polar Climate</span></h4><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">This is the coldest type of climate and it is divided into tundra and snow/ice climates. The temperature is always below 50°F (10°C).</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">You can grow rhubarb in insulated growing tunnels, but not out in the open.&nbsp;</span></p><span data-dcnode-id="1385" instrument_node="">
</span><h2 data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Choosing Rhubarb Seeds</span></h2><span data-dcnode-id="1382" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1368"><figure class="aligncenter size-large" data-dcnode-id="1369"><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chatnoir-webcontent.chatnoir.eu/%3Findex%3Dcw22%26url%3Dhttps%253A//northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.jpg"><picture class="wp-image-2015047 sp-no-webp" data-dcnode-id="1371"><source data-dcnode-id="1381" data-lazy-srcset="https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.webp 800w,https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-300x225.webp 300w,https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-768x576.webp 768w" sizes="(max-width: 800px) 100vw, 800px" type="image/webp"><source data-dcnode-id="1380" data-lazy-srcset="https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.jpg 800w, https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-300x225.jpg 300w, https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-768x576.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" type="image/jpeg"></picture></a><div class="dpsp-pin-it-wrapper wp-image-2015047 sp-no-webp" data-dcnode-id="1374"><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chatnoir-webcontent.chatnoir.eu/%3Findex%3Dcw22%26url%3Dhttps%253A//northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.jpg"><img alt="choosing rhubarb seeds" class="error" data-dcnode-id="1379" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.jpg" data-lazy-srcset="https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.jpg 800w, https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-300x225.jpg 300w, https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-768x576.jpg 768w" data-ll-status="error" data-pin-description="When to Plant Rhubarb - Planting Guide 2022" data-pin-title="When to Plant Rhubarb - Planting Guide 2022" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.jpg&amp;raw" srcset="https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.jpg 800w, https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-300x225.jpg 300w, https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-768x576.jpg 768w" style="" width="800"></a><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fnorthernnester.com%252Fwp-content%252Fuploads%252F2021%252F06%252Fchoosing-rhubarb-seeds.jpg%26url%3Dhttps%253A%252F%252Fnorthernnester.com%252Fwhen-to-plant-rhubarb%252F%26is_video%3Dfalse%26description%3DWhen%2520to%2520Plant%2520Rhubarb%2520-%2520Planting%2520Guide%25202022" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="1376"><svg data-dcnode-id="1377" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="1378"></path></svg></span></a></div><noscript data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">&lt;img src="https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.jpg" class="wp-image-2015047 sp-no-webp" alt="choosing rhubarb seeds" height="600" width="800" srcset="https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds.jpg 800w, https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-300x225.jpg 300w, https://northernnester.com/wp-content/uploads/2021/06/choosing-rhubarb-seeds-768x576.jpg 768w" sizes="(max-width: 800px) 100vw, 800px"&gt;</span></noscript></figure></div><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Rhubarb can be propagated by dividing plants, from bare roots, or from seed. You can also buy established plants in pots from garden centers.&nbsp;</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">If you are planning to grow rhubarb from seeds, you’re going to need a lot of space.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Rhubarb is large and plants will grow to 2-3 feet (62-92 cm) tall. You will need to ensure plants are about 4 feet (122 cm) apart to avoid overcrowding.&nbsp;</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">There are some superb heirloom seeds available, but check quantities before you buy. Some packets have a manageable handful of seeds (5-8) while others have as many as 500!&nbsp;</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">You will also need patience. Even though your seeds may sprout in 5-10 days, you will need to wait until the third season before harvesting.&nbsp;&nbsp;</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">The recommended way to grow rhubarb is by subdivision of rhubarb crowns. You can buy crowns or divide the crowns of established plants that are between 5 or 6 years old.&nbsp;</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">When planting bare-root or rhubarb crowns you should wait until the second season before harvesting.&nbsp;</span></p><span data-dcnode-id="1346" instrument_node="">
</span><h3 data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Different Rhubarb Varieties</span></h3><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Whether you are planting seeds, bare roots, or crowns, there are lots of choices.&nbsp;</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1339" instrument_node="">According to the University of Maine Cooperative Extension, there are about </span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.umaine.edu/publications/2514e/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1338" instrument_node="">67 rhubarb species</span></a><span data-dcnode-id="1336" instrument_node=""> and many cultivated varieties. These include:</span></p><span data-dcnode-id="1334" instrument_node="">
</span><ul data-dcnode-id="1313"><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Crimson Cherry</span></li><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Crimson Wine</span></li><li data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Crimson Red&nbsp;</span></li><li data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Canada Red</span></li><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Cherry Red</span></li><li data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Chipman</span></li><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">MacDonald</span></li><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Strawberry</span></li><li data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Valentine</span></li><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Victoria</span></li></ul><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">They warn that while many people choose rhubarb based on the color of leaf stalks, the color is not consistent year after year. There are also varieties with green stalks&nbsp;</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Whichever variety you choose to grow, be aware that only the rhubarb stalks are edible. Rhubarb leaves are toxic because they contain high amounts of oxalic acid that can make you sick.&nbsp;</span></p><span data-dcnode-id="1306" instrument_node="">
</span><h2 data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">How to Plant Rhubarb Seeds</span></h2><span data-dcnode-id="1303" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1289"><figure class="aligncenter size-large" data-dcnode-id="1290"><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chatnoir-webcontent.chatnoir.eu/%3Findex%3Dcw22%26url%3Dhttps%253A//northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb.jpg"><picture class="wp-image-2015048 sp-no-webp" data-dcnode-id="1292"><source data-dcnode-id="1302" data-lazy-srcset="https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb.webp 800w,https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb-300x225.webp 300w,https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb-768x576.webp 768w" sizes="(max-width: 800px) 100vw, 800px" type="image/webp"><source data-dcnode-id="1301" data-lazy-srcset="https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb.jpg 800w, https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb-300x225.jpg 300w, https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb-768x576.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" type="image/jpeg"></picture></a><div class="dpsp-pin-it-wrapper wp-image-2015048 sp-no-webp" data-dcnode-id="1295"><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chatnoir-webcontent.chatnoir.eu/%3Findex%3Dcw22%26url%3Dhttps%253A//northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb.jpg"><img alt="how to plant rhubarb" class="" data-dcnode-id="1300" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb.jpg" data-lazy-srcset="https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb.jpg 800w, https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb-300x225.jpg 300w, https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb-768x576.jpg 768w" data-pin-description="When to Plant Rhubarb - Planting Guide 2022" data-pin-title="When to Plant Rhubarb - Planting Guide 2022" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20600'%3E%3C/svg%3E" style="" width="800"></a><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular" data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fnorthernnester.com%252Fwp-content%252Fuploads%252F2021%252F06%252Fhow-to-plant-rhubarb.jpg%26url%3Dhttps%253A%252F%252Fnorthernnester.com%252Fwhen-to-plant-rhubarb%252F%26is_video%3Dfalse%26description%3DWhen%2520to%2520Plant%2520Rhubarb%2520-%2520Planting%2520Guide%25202022" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="1297"><svg data-dcnode-id="1298" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="1299"></path></svg></span></a></div><noscript data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">&lt;img src="https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb.jpg" class="wp-image-2015048 sp-no-webp" alt="how to plant rhubarb" height="600" width="800" srcset="https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb.jpg 800w, https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb-300x225.jpg 300w, https://northernnester.com/wp-content/uploads/2021/06/how-to-plant-rhubarb-768x576.jpg 768w" sizes="(max-width: 800px) 100vw, 800px"&gt;</span></noscript></figure></div><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Your first step will be to choose a suitable site for your rhubarb to grow in.&nbsp;</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">It usually grows best in full sun in soil that drains well and is high in organic matter. But, if you live in a warm climate, make sure your plants get afternoon shade.&nbsp;</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Light soils tend to produce a crop earlier but may not hold moisture. This means watering will be critical during the growing season.&nbsp;</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">The pH of the soil isn’t critical, but it prefers slightly acidic soil. If you have a pH test kit, aim for 6.0-7.0.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">If your soil is clay, a raised bed is the answer.&nbsp;</span></p><span data-dcnode-id="1273" instrument_node="">
</span><h3 data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Planting Rhubarb Seeds &amp; Crowns</span></h3><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">You can start the seeds indoors about 6 weeks before the last frost date. Otherwise, transplant or direct sow about 8 weeks after the last frost date.&nbsp;</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">The best soil temperature is 60-75°F (16-25°C).</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">If planting indoors, cover the seeds lightly with soil and give them heat from underneath to improve germination.&nbsp;</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">When planting directly into a garden bed, till or fork the soil to a depth of at least 61 cm/24 inches below the soil surface. This will let your plant grow and give the roots plenty of space to develop.&nbsp;</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">When planting bare-root plants or rhubarb crowns, make sure that the crown is level with the soil surface.&nbsp;</span></p><span data-dcnode-id="1255" instrument_node="">
</span><h2 data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">How to Water Rhubarb</span></h2><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Always water well after planting. Rhubarb thrives in moist soil, and so regular watering is also essential during the rhubarb growing season.&nbsp;</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">It is good practice to water every 7-10 days, especially in mid-summer when temperatures are high. Make sure the soil gets a good soak to at least one or so inches below the soil surface.&nbsp;</span></p><span data-dcnode-id="1246" instrument_node="">
</span><h2 data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">How to Grow Rhubarb</span></h2><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Rhubarb is a hardy perennial that will grow back each year in the same location. And if you’ve chosen the right spot for it, it’ll get bigger and bigger.&nbsp;</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Even though it’s a low-maintenance plant, you’re going to need to subdivide it every 4-6 years after planting, in early spring. If you’ve got enough rhubarb plants to feed your family and friends, gift them with subdivided crowns.&nbsp;</span></p><span data-dcnode-id="1237" instrument_node="">
</span><h3 data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">How to Subdivide Rhubarb</span></h3><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Divide your large plants early in the spring before they get their first growth spurt.&nbsp;</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Dig the whole clump of roots out of the ground and cut down between the buds on the rhubarb crown. Each new section should have at least 2-3 buds.&nbsp;</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Replant the divided rhubarb crowns as soon as possible. Space them 3 feet (about 92 cm) apart.&nbsp;</span></p><span data-dcnode-id="1225" instrument_node="">
</span><h3 data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Harvesting Rhubarb</span></h3><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">The rhubarb harvest season lasts for about 8 weeks and the best time to harvest is from May to mid-July. The plant will become dormant in August and September.&nbsp;</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">But, there are a few golden rules to remember:&nbsp;</span></p><span data-dcnode-id="1216" instrument_node="">
</span><ol data-dcnode-id="1209"><li data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Never harvest during the first year of growth&nbsp;</span></li><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Only harvest when the stalks are 12-18 inches long and at least ¾ inch (20 mm) in diameter</span></li><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Remove the flower stalks to prevent them from draining the strength of the plant</span></li></ol><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">When you harvest rhubarb, pull the stalks and twist them. Discard all the toxic leaves.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">After this, pull a few of the thicker sticks when long enough. Stop harvesting in early summer and allow plants to grow freely for the rest of the season.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><h3 data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Pests &amp; Diseases</span></h3><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Rhubarb isn’t usually affected by pests or diseases, although it’s a good idea to watch out for aphids, slugs, and snails.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Rhubarb curculio, a very large snout-nosed beetle, can be a problem. It doesn’t feed on rhubarb like other pests, but bores into the stalks, roots, and crown to lay its eggs.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">If you see black spots on your leaf or flower stalks, it could be this beetle, which is a species of weevil. Pick it off by hand.&nbsp;</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Crown rot and leaf spot diseases can also be a problem.&nbsp;</span></p><span data-dcnode-id="1187" instrument_node="">
</span><h2 data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">How Long Does Rhubarb Take to Grow?</span></h2><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">It generally takes 5-10 days for rhubarb seeds to germinate and 2-3 weeks for the seedlings to emerge out of the ground.&nbsp;</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Even though they will grow to maturity quite quickly, you will have to wait until two years after planting before your first harvest. If you’ve grown your plants from seed, you will need to wait three years before harvesting rhubarb stalks.&nbsp;</span></p><span data-dcnode-id="1178" instrument_node="">
</span><h2 data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Rhubarb is an easy plant to grow and it keeps on giving an edible bounty for years. It has minimal pest and disease problems and requires very little ongoing care.&nbsp;</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">It’s an old-fashioned tart-tasting plant though, and not to everyone’s taste.&nbsp;</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Nevertheless, why not give it a try? It might even become a new family favorite!</span></p><span data-dcnode-id="1166" instrument_node="">
