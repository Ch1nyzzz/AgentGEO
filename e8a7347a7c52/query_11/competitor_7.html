-id="4151" height="32" version="1.1" viewBox="0 0 731 1024" width="22.84375" xmlns="http://www.w3.org/2000/svg"><path d="M0 341.143q0-61.714 21.429-116.286t59.143-95.143 86.857-70.286 105.714-44.571 115.429-14.857q90.286 0 168 38t126.286 110.571 48.571 164q0 54.857-10.857 107.429t-34.286 101.143-57.143 85.429-82.857 58.857-108 22q-38.857 0-77.143-18.286t-54.857-50.286q-5.714 22.286-16 64.286t-13.429 54.286-11.714 40.571-14.857 40.571-18.286 35.714-26.286 44.286-35.429 49.429l-8 2.857-5.143-5.714q-8.571-89.714-8.571-107.429 0-52.571 12.286-118t38-164.286 29.714-116q-18.286-37.143-18.286-96.571 0-47.429 29.714-89.143t75.429-41.714q34.857 0 54.286 23.143t19.429 58.571q0 37.714-25.143 109.143t-25.143 106.857q0 36 25.714 59.714t62.286 23.714q31.429 0 58.286-14.286t44.857-38.857 32-54.286 21.714-63.143 11.429-63.429 3.714-56.857q0-98.857-62.571-154t-163.143-55.143q-114.286 0-190.857 74t-76.571 187.714q0 25.143 7.143 48.571t15.429 37.143 15.429 26 7.143 17.429q0 16-8.571 41.714t-21.143 25.714q-1.143 0-9.714-1.714-29.143-8.571-51.714-32t-34.857-54-18.571-61.714-6.286-60.857z" data-dcnode-id="4152"></path></svg></span><span class="shared-counts-label" data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">Pin</span></span></span><span class="shared-counts-count" data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">0</span></span></a></div><span data-dcnode-id="4142" instrument_node="">
</span><p data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">Vegetable seeds and seedlings require minimum soil temperatures to germinate and grow. Seeds and seedlings require optimal soil temperatures to thrive.</span></p><span data-dcnode-id="4139" instrument_node="">
</span><p data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">Soil temperature triggers not only seed germination but is an important factor in soil chemistry. Soil chemistry includes the release (dissolution) of mineral nutrients in soil moisture. Mineral nutrients are essential for vegetable plant growth and maturation to harvest.</span></p><span data-dcnode-id="4136" instrument_node="">
</span><p data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">The ideal or optimal soil temperature for planting and growing most vegetables is 65° to 75°F (18°-24°C).</span></p><span data-dcnode-id="4133" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4129"><img alt="soil temperature" class="wp-image-74733" data-dcnode-id="4132" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-1024x683.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-1024x683.jpg 1024w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-768x512.jpg 768w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-1536x1024.jpg 1536w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-561x374.jpg 561w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-1122x748.jpg 1122w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-265x177.jpg 265w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-531x354.jpg 531w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-364x243.jpg 364w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-728x485.jpg 728w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-608x405.jpg 608w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-758x505.jpg 758w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-1152x768.jpg 1152w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-72x48.jpg 72w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323-144x96.jpg 144w, https://cdn.harvesttotable.com/htt/2022/04/29065738/Soil-thermometer-bigstock-Measurement-Using-A-Soil-Tempe-297392323.jpg 1600w" width="1024"><figcaption data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">Measurement using a soil temperature thermometer in the spring to determine the readiness of the soil to plant crops</span></figcaption></figure><span data-dcnode-id="4128" instrument_node="">
</span><h2 data-dcnode-id="4125" id="h-taking-soil-temperature"><strong data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">Taking Soil Temperature</span></strong></h2><span data-dcnode-id="4124" instrument_node="">
</span><p data-dcnode-id="4122"><span data-dcnode-id="4123" instrument_node="">Soil temperature can be measured with a soil thermometer or gauge. Most home vegetable gardeners use a soil thermometer—a thermometer attached to a metal probe several inches long which is inserted into the soil.</span></p><span data-dcnode-id="4121" instrument_node="">
</span><p data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">The soil temperature for seed sowing should be taken between 1 and 3 inches deep. The soil temperature for transplants should be taken at 4 to 6 inches deep.</span></p><span data-dcnode-id="4118" instrument_node="">
</span><p data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">Commonly the temperature reading is taken after the thermometer has been in the soil for a couple of minutes.</span></p><span data-dcnode-id="4115" instrument_node="">
</span><p data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">Soil temperature is best taken in the early morning when the soil is coolest and not yet warmed under the day’s sun.</span></p><span data-dcnode-id="4112" instrument_node="">
</span><p data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">Take the soil temperature for at least three consecutive days and then average the results. Don’t depend on just one reading.</span></p><span data-dcnode-id="4109" instrument_node="">
</span><h2 data-dcnode-id="4106" id="h-planting-and-soil-temperature"><strong data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Planting and Soil Temperature</span></strong></h2><span data-dcnode-id="4105" instrument_node="">
</span><p data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Vegetable seeds can be sown in the garden early in spring before the soil has warmed to optimal germination temperatures. If you sow early before temperatures are ideal, you cannot expect optimal germination.</span></p><span data-dcnode-id="4102" instrument_node="">
</span><p data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Optimal germination and growing temperatures may not come until late spring or early summer. In regions where the growing season is short, waiting for optimal soil temperatures may not be practical or realistic. A 70 percent germination rate is often considered both practical and realistic.</span></p><span data-dcnode-id="4099" instrument_node="">
</span><p data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">You can use the minimum soil temperature for germination and the optimal soil temperature for germination to decide about what soil temperature you want to get started sowing seeds and setting out transplants.</span></p><span data-dcnode-id="4096" instrument_node="">
</span><h3 data-dcnode-id="4093"><strong data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">Minimum Soil Temperatures for Seed Sowing and Germination:</span></strong></h3><span data-dcnode-id="4092" instrument_node="">
</span><ul data-dcnode-id="4060"><li data-dcnode-id="4085"><strong data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">35</span></strong><span data-dcnode-id="4089" instrument_node="">°</span><strong data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">F: </span></strong><span data-dcnode-id="4086" instrument_node="">lettuce, onion, parsnip, spinach.</span></li><li data-dcnode-id="4077"><strong data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">40</span></strong><strong data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">°</span></strong><strong data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">F: </span></strong><span data-dcnode-id="4078" instrument_node="">beet, broccoli, Brussels sprouts, cabbage, carrot, cauliflower, collards, Asian greens, Chinese cabbage, fava beans, kale, kohlrabi, mustard, arugula, radish, Swiss chard, turnip, pea, radish, rutabaga.</span></li><li data-dcnode-id="4069"><strong data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">50</span></strong><strong data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">°</span></strong><strong data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">F:</span></strong><span data-dcnode-id="4070" instrument_node=""> asparagus, celery, celeriac, corn, tomato.</span></li><li data-dcnode-id="4061"><strong data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">60</span></strong><strong data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">°</span></strong><strong data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">F: </span></strong><span data-dcnode-id="4062" instrument_node="">bean, cucumber, eggplant, muskmelon, pepper, pumpkin, squash, watermelon.</span></li></ul><span data-dcnode-id="4059" instrument_node="">
</span><h3 data-dcnode-id="4054"><strong data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">Soil Temperature Needed for 70% Germination:</span></strong></h3><span data-dcnode-id="4053" instrument_node="">
</span><ul data-dcnode-id="4010"><li data-dcnode-id="4046"><strong data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">45</span></strong><span data-dcnode-id="4050" instrument_node="">°</span><strong data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">F: </span></strong><span data-dcnode-id="4047" instrument_node="">beets, lettuce, parsley, spinach.</span></li><li data-dcnode-id="4039"><strong data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">50</span></strong><span data-dcnode-id="4043" instrument_node="">°</span><strong data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">F: </span></strong><span data-dcnode-id="4040" instrument_node="">broccoli, Brussels sprouts, cabbage, carrot, cauliflower, collards, Asian greens, Chinese cabbage, fava beans, kale, kohlrabi, mustard, arugula, radish, Swiss chard, turnip, pea, radish, rutabaga.</span></li><li data-dcnode-id="4032"><strong data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">55</span></strong><span data-dcnode-id="4036" instrument_node="">°</span><strong data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">F: </span></strong><span data-dcnode-id="4033" instrument_node="">cabbage, corn, Swiss chard, tomatoes.</span></li><li data-dcnode-id="4025"><strong data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">65</span></strong><span data-dcnode-id="4029" instrument_node="">°</span><strong data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">F: </span></strong><span data-dcnode-id="4026" instrument_node="">cucumbers, peppers.</span></li><li data-dcnode-id="4018"><strong data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">70</span></strong><span data-dcnode-id="4022" instrument_node="">°</span><strong data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">F: </span></strong><span data-dcnode-id="4019" instrument_node="">beans, cantaloupe, melons, squash.</span></li><li data-dcnode-id="4011"><strong data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">75</span></strong><span data-dcnode-id="4015" instrument_node="">°</span><strong data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">F: </span></strong><span data-dcnode-id="4012" instrument_node="">eggplant, okra, pumpkins.</span></li></ul><span data-dcnode-id="4009" instrument_node="">
</span><h3 data-dcnode-id="4006"><strong data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">Optimal Soil Temperature for Germination (near 100% germination):</span></strong></h3><span data-dcnode-id="4005" instrument_node="">
</span><ul data-dcnode-id="3955"><li data-dcnode-id="3998"><strong data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">65</span></strong><span data-dcnode-id="4002" instrument_node="">°</span><strong data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">F: </span></strong><span data-dcnode-id="3999" instrument_node="">parsnip.</span></li><li data-dcnode-id="3991"><strong data-dcnode-id="3996"><span data-dcnode-id="3997" instrument_node="">70</span></strong><span data-dcnode-id="3995" instrument_node="">°</span><strong data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">F: </span></strong><span data-dcnode-id="3992" instrument_node="">spinach.</span></li><li data-dcnode-id="3984"><strong data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">75</span></strong><span data-dcnode-id="3988" instrument_node="">°</span><strong data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">F: </span></strong><span data-dcnode-id="3985" instrument_node="">asparagus, lettuce, onion, parsley.</span></li><li data-dcnode-id="3977"><strong data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">80</span></strong><span data-dcnode-id="3981" instrument_node="">°</span><strong data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">F: </span></strong><span data-dcnode-id="3978" instrument_node="">bean, carrot.</span></li><li data-dcnode-id="3970"><strong data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">85</span></strong><span data-dcnode-id="3974" instrument_node="">°</span><strong data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">F: </span></strong><span data-dcnode-id="3971" instrument_node="">beet, cabbage, eggplant, pepper, radish, Swiss chard, tomato, turnip.</span></li><li data-dcnode-id="3963"><strong data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">90</span></strong><span data-dcnode-id="3967" instrument_node="">°</span><strong data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">F: </span></strong><span data-dcnode-id="3964" instrument_node="">muskmelon.</span></li><li data-dcnode-id="3956"><strong data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">95</span></strong><span data-dcnode-id="3960" instrument_node="">°</span><strong data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">F: </span></strong><span data-dcnode-id="3957" instrument_node="">corn, cucumber, pumpkin, squash, watermelon.</span></li></ul><span data-dcnode-id="3954" instrument_node="">
</span><p data-dcnode-id="3942"><span data-dcnode-id="3953" instrument_node="">For specific soil temperature requirements for crops, you are planting see the </span><a data-dcnode-id="3949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvesttotable.com/tag/how-to-grow-2/"><span data-dcnode-id="3950" style="color: #ff0000;"><strong data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">How to Grow</span></strong></span></a><span data-dcnode-id="3948" instrument_node=""> articles for each vegetable and herb. There are more than 60 crops covered in the </span><a data-dcnode-id="3944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvesttotable.com/tag/how-to-grow-2/"><span data-dcnode-id="3945" style="color: #ff0000;"><strong data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">How to Grow</span></strong></span></a><span data-dcnode-id="3943" instrument_node=""> category.</span></p><span data-dcnode-id="3941" instrument_node="">
</span><h2 data-dcnode-id="3938" id="h-workable-soil-test-for-direct-seed-sowing-and-transplants"><strong data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Workable Soil Test for Direct Seed Sowing and Transplants:</span></strong></h2><span data-dcnode-id="3937" instrument_node="">
</span><p data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Before soil thermometers were used in gardens and farms, the common method of determining when to plant was soil workability. (This is the tried-and-true old-fashioned way to know when to plant.)</span></p><span data-dcnode-id="3934" instrument_node="">
</span><p data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">The soil is workable and ready for seed sowing or planting if it passes the Workable Soil Test. Here’s the test: squeeze a handful of soil in the palm of your hand; when you open your hand if the soil remains a wet or very moist clump, it is not workable. Let the soil dry. If the soil crumbles from your hand with a touch, it is workable.</span></p><span data-dcnode-id="3931" instrument_node="">
</span><h3 data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">When the soil is workable in spring, you can:</span></h3><span data-dcnode-id="3928" instrument_node="">
</span><ul data-dcnode-id="3919"><li data-dcnode-id="3924"><strong data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Direct sow:</span></strong><span data-dcnode-id="3925" instrument_node=""> collards, kale, lettuce, parsnip, peas, radish, rutabaga, spinach, turnips.</span></li><li data-dcnode-id="3920"><strong data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">Transplant out:</span></strong><span data-dcnode-id="3921" instrument_node=""> broccoli, Brussels sprouts, cabbage, onion.</span></li></ul><span data-dcnode-id="3918" instrument_node="">
</span><p data-dcnode-id="3911"><span data-dcnode-id="3917" instrument_node="">Of course, once the soil is workable in spring, it will continue to warm. Often, old-time farmers would look to lilacs and other spring-flowering plants to decide when to plant. For more on this see the articles on Phenology: </span><a data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvesttotable.com/nature-planting-signals-for-vegetables-phenology/"><span data-dcnode-id="3914" style="color: #ff0000;"><strong data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Nature Planting Signals for Vegetables</span></strong></span></a><span data-dcnode-id="3912" instrument_node="">.</span></p><span data-dcnode-id="3910" instrument_node="">
</span><p data-dcnode-id="3904"><span data-dcnode-id="3909" instrument_node="">More tips at: </span><a data-dcnode-id="3905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvesttotable.com/pre-warm-cold-soil-before-planting-vegetables/"><span data-dcnode-id="3906" style="color: #ff0000;"><strong data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">Pre-Warm Your Soil Before Planting Vegetables</span></strong></span></a></p><span data-dcnode-id="3903" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3393"><span data-dcnode-id="3397" instrument_node="">
</span><p data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">There are many variables that come into play when growing vegetables: soil composition and texture; soil pH and nutrient composition; weather air, and soil temperature; garden orientation, sun exposure, day length, and length of growing season; rainfall and irrigation–these are a few. These factors and others affect nutrient uptake and plant growth. One chart that would speak to ALL of these growth influences from seed to harvest and to EVERY microclimate and garden would be all but impossible to compose. Adding aged compost to your garden regularly will bring your soil pH to near neutral, that will allow for the uptake of most nutrients. Aged compost (or commercial organic planting mix) will also add a wide spectrum of nutrients to the soil; keeping the soil evenly moist will allow for the uptake of the nutrients. To aged compost, you can add an all purpose organic fertilizer. Organic fertilizers break down slowly and feed plants over weeks and months.</span></p><span data-dcnode-id="3394" instrument_node="">
