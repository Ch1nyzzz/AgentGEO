ubarb/" rel="noopener noreferrer" target="_blank"><span class="icon-envelope" data-dcnode-id="1061"></span></a></div><h1 class="entry-title" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Growing Rhubarb: Varieties, Planting Guide, Care, Problems, and Harvest</span></h1><div class="entry-meta" data-dcnode-id="1041"><span data-dcnode-id="1056" instrument_node="">By </span><span class="entry-author" data-dcnode-id="1053" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span class="entry-author-name as-link" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Jennifer Poindexter</span></span></span><aside class="author-box-wrapper" data-dcnode-id="1042"><a class="author-box-link" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/author/jennifer/" itemprop="url"><div class="author-box" data-dcnode-id="1044" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><noscript data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">&lt;img alt='' src='https://morningchores.com/wp-content/uploads/2019/07/avatar_user_2_1563520370-125x125.jpg' srcset='https://morningchores.com/wp-content/uploads/2019/07/avatar_user_2_1563520370-250x250.jpg 2x' class='avatar avatar-125 photo' height='125' width='125' /&gt;</span></noscript><img alt="" class="lazyload avatar avatar-125 photo" data-dcnode-id="1050" data-src="https://morningchores.com/wp-content/uploads/2019/07/avatar_user_2_1563520370-125x125.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2019/07/avatar_user_2_1563520370-250x250.jpg 2x" height="125" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20125%20125%22%3E%3C/svg%3E" width="125"><span class="author-box-title as-heading text-normal" data-dcnode-id="1048" itemprop="name"><span data-dcnode-id="1049" instrument_node="">Jennifer Poindexter</span></span><div class="author-box-content text-small" data-dcnode-id="1045" itemprop="description"><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Jennifer is a full-time homesteader who started her journey in the foothills of North Carolina in 2010. Currently, she spends her days gardening, caring for her orchard and vineyard, raising chickens, ducks, goats, and bees. Jennifer is an avid canner who provides almost all food for her family needs. She enjoys working on DIY remodeling projects to bring beauty to her homestead in her spare times.</span></p></div></div></a></aside></div><div class="print-this" data-dcnode-id="1036"><a class="print-button" data-dcnode-id="1037" onclick="window.print();return false;"><span data-dcnode-id="1040" instrument_node="">Print </span><svg data-dcnode-id="1038" height="15px" viewBox="0 0 475.1 475.1" width="15px" xmlns="http://www.w3.org/2000/svg"><path d="M459 217.1c-10.8-10.8-23.7-16.1-38.7-16.1h-18.3v-73.1c0-7.6-1.9-16-5.7-25.1 -3.8-9.1-8.4-16.4-13.7-21.7L339.2 37.7c-5.3-5.3-12.6-9.9-21.7-13.7 -9.1-3.8-17.5-5.7-25.1-5.7H100.5c-7.6 0-14.1 2.7-19.4 8 -5.3 5.3-8 11.8-8 19.4V201H54.8c-15 0-27.9 5.4-38.7 16.1C5.4 227.9 0 240.8 0 255.8v118.8c0 2.5 0.9 4.6 2.7 6.4 1.8 1.8 4 2.7 6.4 2.7h64v45.7c0 7.6 2.7 14.1 8 19.4 5.3 5.3 11.8 8 19.4 8h274.1c7.6 0 14.1-2.7 19.4-8 5.3-5.3 8-11.8 8-19.4v-45.7h64c2.5 0 4.6-0.9 6.4-2.7 1.8-1.8 2.7-3.9 2.7-6.4V255.8C475.1 240.8 469.7 227.9 459 217.1zM365.4 420.3H109.6v-73.1h255.8V420.3zM365.4 237.5H109.6V54.8h182.7v45.7c0 7.6 2.7 14.1 8 19.4 5.3 5.3 11.8 8 19.4 8h45.7V237.5zM433.1 268.7c-3.6 3.6-7.9 5.4-12.8 5.4 -4.9 0-9.2-1.8-12.8-5.4 -3.6-3.6-5.4-7.9-5.4-12.8s1.8-9.2 5.4-12.8c3.6-3.6 7.9-5.4 12.8-5.4 4.9 0 9.2 1.8 12.8 5.4 3.6 3.6 5.4 7.9 5.4 12.8S436.7 265 433.1 268.7z" data-dcnode-id="1039"></path></svg></a></div></header><div class="entry-post" data-dcnode-id="403" id="entry-post"><div class="entry-image" data-dcnode-id="1031"><noscript data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">&lt;img width="800" height="418" src="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-FB.jpg" class="post-image post-lead" alt="" srcset="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-FB.jpg 800w, https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-FB-600x314.jpg 600w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><img alt="" class="post-image post-lead lazyloaded" data-dcnode-id="1032" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-FB.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-FB.jpg 800w, https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-FB-600x314.jpg 600w" height="418" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-FB.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-FB.jpg 800w, https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-FB-600x314.jpg 600w" width="800"></div><div class="entry-content" data-dcnode-id="404"><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Rhubarb. Pronounced roo-barb, is a funny-sounding name for a vegetable isn’t it?</span></p><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">As funny as it may sound, it’s a fun plant to grow. I wanted to begin growing it a few years ago because I heard of rhubarb pie.</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Once I knew there was a pie in my future, I got busy planting. Rhubarb is one of the few vegetables that is mostly served sweet.</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Unsure if you have what it takes to grow the vegetable that can pass as a sweet treat? Follow along with me as I fill you in on all you need to know about growing rhubarb.</span></p><div class="wp-block-image" data-dcnode-id="1018"><figure class="aligncenter" data-dcnode-id="1019"><noscript data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">&lt;img width="470" height="800" src="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg" alt="growing rhubarb" class="wp-image-25316" srcset="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg 470w, https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN.jpg 600w" sizes="(max-width: 470px) 100vw, 470px" /&gt;</span></noscript><img alt="growing rhubarb" class="wp-image-25316 lazyloaded" data-dcnode-id="1020" data-sizes="(max-width: 470px) 100vw, 470px" data-src="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg 470w, https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN.jpg 600w" height="800" sizes="(max-width: 470px) 100vw, 470px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg 470w, https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN.jpg 600w" width="470"></figure></div><h2 data-dcnode-id="1016" id="1-rhubarb-plant-info"><span data-dcnode-id="1017" instrument_node="">Rhubarb Plant Info</span></h2><ul data-dcnode-id="949"><li data-dcnode-id="1012"><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/planting-zones/"><span data-dcnode-id="1015" instrument_node="">Hardiness Zones</span></a><span data-dcnode-id="1013" instrument_node="">: 3, 4, 5, 6 (perennial), 7, 8, 9, 10 (annual)</span></li><li data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Soil: Clay, loam, sandy, PH between 5.5 to 6.8, well-drained, rich in organic matter</span></li><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Sun Exposure: Full sun, 4 to 8 hours of sunlight per day</span></li><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Planting: In early spring when soil temperature reaches 40 degrees Fahrenheit</span></li><li data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Spacing: 3 to 4 feet&nbsp;between plants and 5 to 6 feet between rows</span></li><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Depth: 1 to 2 inches</span></li><li data-dcnode-id="968"><span data-dcnode-id="1001" instrument_node="">Best Companions: Columbine, </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-garlic/"><span data-dcnode-id="1000" instrument_node="">garlic</span></a><span data-dcnode-id="998" instrument_node="">, </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-onions/"><span data-dcnode-id="997" instrument_node="">onion</span></a><span data-dcnode-id="995" instrument_node="">, </span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-beans/"><span data-dcnode-id="994" instrument_node="">beans</span></a><span data-dcnode-id="992" instrument_node="">, </span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-peppers/"><span data-dcnode-id="991" instrument_node="">sweet pepper</span></a><span data-dcnode-id="989" instrument_node="">, </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-broccoli/"><span data-dcnode-id="988" instrument_node="">broccoli</span></a><span data-dcnode-id="986" instrument_node="">, </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-cauliflower/"><span data-dcnode-id="985" instrument_node="">cauliflower</span></a><span data-dcnode-id="983" instrument_node="">, </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-cabbage/"><span data-dcnode-id="982" instrument_node="">cabbage</span></a><span data-dcnode-id="980" instrument_node="">, </span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-kale/"><span data-dcnode-id="979" instrument_node="">kale</span></a><span data-dcnode-id="977" instrument_node="">, </span><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-asparagus/"><span data-dcnode-id="976" instrument_node="">asparagus</span></a><span data-dcnode-id="974" instrument_node="">, </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-strawberries/"><span data-dcnode-id="973" instrument_node="">strawberry</span></a><span data-dcnode-id="971" instrument_node="">, </span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-horseradish/"><span data-dcnode-id="970" instrument_node="">horseradish</span></a></li><li data-dcnode-id="958"><span data-dcnode-id="967" instrument_node="">Worst Companions: </span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-turnips/"><span data-dcnode-id="966" instrument_node="">Turnip</span></a><span data-dcnode-id="964" instrument_node="">, </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-carrots/"><span data-dcnode-id="963" instrument_node="">carrot</span></a><span data-dcnode-id="961" instrument_node="">, </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-carrots/"><span data-dcnode-id="960" instrument_node="">potato</span></a></li><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Watering: Rhubarb needs constant moisture, but they don’t like to have wet feet</span></li><li data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Fertilizing: Apply high-nitrogen fertilizer after the first spring frost</span></li><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Common Problems: Gray mold, crown rot, phytophthora leaf rot, slugs, tarnished plant bug, potato stem borer, rhubarb curculio beetle, anthracnose, botrytis, ascochyta leaf spot, ramularia leaf spot</span></li><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Harvest: In the first year of planting, you shouldn’t harvest your rhubarb at all. It is okay to harvest during year two, but do so sparingly. By the time you reach year three, you should have an eight to ten-week period where you can harvest from the plant.</span></li></ul><h2 data-dcnode-id="946" id="2-best-rhubarb-varieties"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Best Rhubarb Varieties</span></strong></h2><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">There are many different varieties of rhubarb to choose from. Here are some of the best options:</span></p><h3 data-dcnode-id="942" id="3-holstein-blood-red"><span data-dcnode-id="943" instrument_node="">Holstein Blood Red</span></h3><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">This variety of rhubarb is one of the red options. It contains a lot of juice, which makes it particularly tasty when served with sugar.</span></p><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">If you want red rhubarb to enjoy as a side dish or a dessert, then you might enjoy this classic variety.</span></p><h3 data-dcnode-id="936" id="4-mcdonalds-canadian-red"><span data-dcnode-id="937" instrument_node="">McDonald’s Canadian Red</span></h3><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">As the name suggests, this is another red variety of rhubarb. It’s particularly good for freezing and baking with.</span></p><h3 data-dcnode-id="932" id="5-canada-red"><span data-dcnode-id="933" instrument_node="">Canada Red</span></h3><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Canada Red is another red option for rhubarb. It boasts a sweet flavor and packs a lot of juice as well.</span></p><h3 data-dcnode-id="928" id="6-colorado-red"><span data-dcnode-id="929" instrument_node="">Colorado Red</span></h3><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">The Colorado Red variety looks like red celery when it grows. That gives you an idea of the size stalks it can produce.</span></p><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">If you’re looking for a pretty red rhubarb variety to use to make scrumptious jams, then this variety is great for that as well.</span></p><h3 data-dcnode-id="922" id="7-victoria"><span data-dcnode-id="923" instrument_node="">Victoria</span></h3><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Victoria is one of the oldest varieties of rhubarb. The stalks aren’t small, but they aren’t large either. It is a nice mid-size producer.</span></p><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">But the stalks are more of a deep red versus traditional bright red coloring. The red stands out closer to the base of the plant. When you look towards the leaves, you begin to see the stalk turn green.</span></p><h3 data-dcnode-id="916" id="8-riverside-giant"><span data-dcnode-id="917" instrument_node="">Riverside Giant</span></h3><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Not everyone who grows rhubarb wants a red variety. Some people prefer the green variety of rhubarb. If this is you, then you’ll like the riverside giant variety.</span></p><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Not only are the stalks green, but this variety is also great in cold weather. It’s durable and cold-hardy.</span></p><h3 data-dcnode-id="910" id="9-turkish"><span data-dcnode-id="911" instrument_node="">Turkish</span></h3><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Would you like to grow a green variety of rhubarb that doesn’t have a robust flavor to it? If so, then this could be your variety.</span></p><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">This variety’s flavor is tamer than some. It’s recognizable because it produces a solid green stalk, though there is a hint of red at the base of the plant.</span></p><h3 data-dcnode-id="904" id="10-german-wine"><span data-dcnode-id="905" instrument_node="">German Wine</span></h3><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">This variety of rhubarb is fun. It doesn’t just produce a plain colored stalk – the stalks are polka-dotted. It’s also known for being the sweetest variety of rhubarb out there.</span></p><h3 data-dcnode-id="900" id="11-the-sutton"><span data-dcnode-id="901" instrument_node="">The Sutton</span></h3><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">This is another fun variety of rhubarb to grow. It doesn’t produce a basic colored stalk, either. Instead, it produces green and red striped stalks.</span></p><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">This variety produces a pleasant scent and is known for being tender. Its flavor isn’t overpowering.</span></p><h3 data-dcnode-id="894" id="12-sunrise"><span data-dcnode-id="895" instrument_node="">Sunrise</span></h3><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">The Sunrise variety of rhubarb is another variety that is outside of the box from what you might think of when you think rhubarb. It produces pink stalks.</span></p><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">However, don’t let the lighter color fool you. It is still a great variety to use for canning, freezing, and making jelly too.</span></p><h3 data-dcnode-id="888" id="13-timperley-early"><span data-dcnode-id="889" instrument_node="">Timperley Early</span></h3><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">This variety is one that produces early, as the name suggests. If the weather is cooperative, it can produce in early spring which is months earlier than most other varieties. You can often even get a small harvest from this variety in the first year.</span></p><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">This variety is known for being more disease resistant.</span></p><h3 data-dcnode-id="882" id="14-glaskins-perpetual"><span data-dcnode-id="883" instrument_node="">Glaskins Perpetual</span></h3><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Our final variety is the Glaskins perpetual. This is another bright, red variety that produces flavorful stalks. This variety is meant to be harvested late in the season.</span></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Rhubarb has oxalic acid in it. This is what gives raw rhubarb such a bold flavor. In most varieties, the later the season the higher the amount of oxalic acid. In this variety, the oxalic acid is low which makes the rhubarb palatable longer.</span></p><h2 data-dcnode-id="875" id="15-planting-rhubarb"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Planting Rhubarb</span></strong></h2><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Have you ever heard the saying “There is more than one way to skin a cat?” I’m not sure who came up with such a saying, but it applies to rhubarb.</span></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">There are different options for growing it, and it varies greatly depending on what zone you live in. See which option is best suited for your situation.</span></p><h3 data-dcnode-id="869" id="16-planting-zones-for-rhubarb"><span data-dcnode-id="870" instrument_node="">Planting Zones for Rhubarb</span></h3><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">It’s important to know that rhubarb grows differently depending on where you live.</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">If you live in USDA zones 1-6, rhubarb is a perennial plant. That means it will come back year after year.</span></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Zones 7-8 are a bit trickier because they are on the borderline of too hot. Too much heat can interfere with the production, but rhubarb is considered a perennial in these zones still. The only thing to know is that it might not live as long or produce as much.</span></p><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">In zones 9-10, rhubarb grows as an annual. It won’t come back year after year, but you can plant it and enjoy it each year.</span></p><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">The ideal location is where the soil temperatures drop below 40°F during the winter and have lows around 75°F during the summer.</span></p><h3 data-dcnode-id="857" id="17-sun-and-soil-requirements"><span data-dcnode-id="858" instrument_node="">Sun and Soil Requirements</span></h3><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Rhubarb does tolerate shade, but it will grow best in full sunlight. You need to make sure it’s a location that will have consistent moisture that won’t drain way too fast.</span></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Rhubarb is a heavy feeder, so you need to make sure you have fertile soil that is high in organic matter. Add plenty of compost to your garden beds before planting, along with rotted manure.</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">You also want to make sure the soil is also well-draining. Compost can increase drainage as well, but you could add peat moss as well.</span></p><p data-dcnode-id="846"><span data-dcnode-id="850" instrument_node="">If you want to make sure that your soil is the right pH, </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessmama.com/testing-your-soil-ph-without-a-kit/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="849" instrument_node="">you can test your soil</span></a><span data-dcnode-id="847" instrument_node="">. Rhubarb likes soil that has a pH level of 5.5-6.5.</span></p><h3 data-dcnode-id="844" id="18-when-to-plant-rhubarb"><span data-dcnode-id="845" instrument_node="">When to Plant Rhubarb</span></h3><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">You can plant rhubarb in the fall or early spring.</span></p><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">If you choose to plant in early spring, be sure to do so as soon as the ground becomes workable, prior to the roots of the rhubarb awakening from dormancy.</span></p><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">If you’re going to plant rhubarb from seed, start the seeds inside 8-10 weeks before the final frost date.</span></p><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">If you choose to plant in the fall, wait until the roots of the rhubarb have fallen dormant, which usually happens in September.</span></p><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Southern gardeners need to plant their rhubarb in the fall for harvest in later winter or early spring. Start your seeds indoors in mid-to-late August. Southern gardeners should plan to put them in the garden in late September or early October.</span></p><h3 data-dcnode-id="832" id="19-planting-seeds-or-crowns"><span data-dcnode-id="833" instrument_node="">Planting Seeds or Crowns</span></h3><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">You can plant “crowns” of rhubarb or plant rhubarb from seed.</span></p><figure class="wp-block-image size-large" data-dcnode-id="822"><noscript data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">&lt;img width="800" height="532" src="https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-800x532.jpg" alt="" class="wp-image-599729" srcset="https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-800x532.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-600x399.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb.jpg 902w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="823" style="max-width: 728px;"><img alt="" class="wp-image-599729 lazyloaded" data-dcnode-id="827" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-800x532.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-800x532.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-600x399.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb.jpg 902w" height="532" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-800x532.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-800x532.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-600x399.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb.jpg 902w" width="800"><div class="wpr-pinterest-button" data-dcnode-id="824"><a aria-label="pin this image" class="pin-this" data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fgrowing-rhubarb%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2020/04/emerging-rhubarb-800x532.jpg%26description%3DGrowing%2520Rhubarb%253A%2520Varieties%252C%2520Planting%2520Guide%252C%2520Care%252C%2520Problems%252C%2520and%2520Harvest" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="826"></span></a></div></div></figure><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">In most cases when you decide to grow rhubarb, you’ll start with a crown, either from a friend who divided their rhubarb or from a set that you purchase at the store.</span></p><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">If you live in a region that is hot and where rhubarb is grown as an annual rather than a perennial, you’ll need to start rhubarb from seed. Starting from seeds doesn’t need to be too complicated.</span></p><ol data-dcnode-id="803"><li data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Before you start the seeds inside, soak them in water for 10-12 hours. Soaking seeds is a valuable step because it softens the exterior cover and allows the seeds to germinate faster. Don’t skip this tip!</span></li><li data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Fill 4-inch pots with potting soil or seed starting mix.</span></li><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Put two seeds in each pot and water well.</span></li><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Keep your seeds indoors at room temperature.</span></li><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Once sprouted, you can move the seedlings to a bright window to grow.</span></li><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Once your seedlings are 2 inches tall, move the seeds to a shady location to harden off, gradually introducing more sun each day. Continue to keep the soil moist but not soggy.</span></li><li data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">After several weeks, you can move the seedlings to a brighter location with morning sun.</span></li></ol><h3 data-dcnode-id="801" id="20-transplant"><span data-dcnode-id="802" instrument_node="">Transplant</span></h3><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Once your seedlings are ready to go outside, they can be safely transplanted when they are 4 inches tall with 3-5 leaves on each plant.</span></p><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Transplant your rhubarb seedlings two weeks before the final frost of the season. This allows the roots to get established while it’s still cool.</span></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">By the time you transplant, your rhubarb should be four inches tall. You want to be sure to mulch around the seedlings to keep the roots cool and to keep moisture even.</span></p><p data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">Do </span><em data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">not</span></em><span data-dcnode-id="791" instrument_node=""> fertilize when planting or for the entire first year. Rhubarb exposed to nitrates early on in life can kill it.</span></p><h3 data-dcnode-id="788" id="21-spacing"><span data-dcnode-id="789" instrument_node="">Spacing</span></h3><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">When you plant rhubarb, make sure that you dig a large hole for each plant that is around a foot deep. Rhubarb has large root systems making spacing important.</span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Space each plant around 3-4 feet apart and plant each crown two inches deep in the soil.</span></p><h3 data-dcnode-id="782" id="22-be-patient"><span data-dcnode-id="783" instrument_node="">Be Patient</span></h3><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Unless you plant a special variety that is known for producing an early harvest, you probably won’t get a harvest from your rhubarb in the first year.</span></p><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">This means that you need to have patience. The following year, you’ll likely have a big, healthy harvest.</span></p><h2 data-dcnode-id="775" id="23-ways-of-growing-rhubarb"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Ways of Growing Rhubarb</span></strong></h2><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">There are four different ways that you can grow rhubarb. Here are your options:</span></p><h3 data-dcnode-id="771" id="24-grow-rhubarb-in-a-container"><span data-dcnode-id="772" instrument_node="">Grow Rhubarb in a Container</span></h3><p data-dcnode-id="766"><span data-dcnode-id="770" instrument_node="">If you live in an apartment or where you only have a small yard, then you might be interested in </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/container-gardening/"><span data-dcnode-id="769" instrument_node="">container gardening</span></a><span data-dcnode-id="767" instrument_node="">.</span></p><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">If so, then you’ll be happy to know that you can grow rhubarb in a container. You’ll just need to make sure that the pot can hold around ten gallons of compost or planting mix because of the large root system of rhubarb.</span></p><h3 data-dcnode-id="762" id="25-plant-rhubarb-in-raised-beds"><span data-dcnode-id="763" instrument_node="">Plant Rhubarb in Raised Beds</span></h3><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Raised beds are a great option if you don’t have a lot of space or if you want a garden that’s easy to access. Be sure your garden is at least 8-inches deep to accommodate the roots.</span></p><h3 data-dcnode-id="758" id="26-plant-rhubarb-in-a-traditional-garden-setting"><span data-dcnode-id="759" instrument_node="">Plant Rhubarb in a Traditional Garden Setting</span></h3><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">As discussed above, rhubarb does well in a traditional garden bed.</span></p><h3 data-dcnode-id="754" id="27-grow-rhubarb-in-a-greenhouse"><span data-dcnode-id="755" instrument_node="">Grow Rhubarb in a Greenhouse</span></h3><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">You can also grow rhubarb in a greenhouse setting. You can choose to have raised beds in a greenhouse, or just move your potted plant into the greenhouse when the temperatures begin to change.</span></p><h2 data-dcnode-id="749" id="28-caring-for-rhubarb"><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Caring for Rhubarb</span></strong></h2><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Rhubarb is a low-maintenance plant, but there are a few things you can do to make it prosper.</span></p><figure class="wp-block-image size-large" data-dcnode-id="739"><noscript data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">&lt;img width="800" height="533" src="https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-800x533.jpg" alt="" class="wp-image-599723" srcset="https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb.jpg 900w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="740" style="max-width: 728px;"><img alt="" class="lazyload wp-image-599723" data-dcnode-id="744" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-800x533.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2020/04/growing-rhubarb.jpg 900w" height="533" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20533%22%3E%3C/svg%3E" width="800"><div class="wpr-pinterest-button" data-dcnode-id="741"><a aria-label="pin this image" class="pin-this" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fgrowing-rhubarb%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2020/04/growing-rhubarb-800x533.jpg%26description%3DGrowing%2520Rhubarb%253A%2520Varieties%252C%2520Planting%2520Guide%252C%2520Care%252C%2520Problems%252C%2520and%2520Harvest" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="743"></span></a></div></div></figure><h3 data-dcnode-id="737" id="29-mulch"><span data-dcnode-id="738" instrument_node="">Mulch</span></h3><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Adding a thick layer of mulch in the spring (or fall depending on when you plant) is an essential step. A thick layer of mulch holds in moisture, keeps the roots cool, and reduces the weeds.</span></p><h3 data-dcnode-id="733" id="30-water"><span data-dcnode-id="734" instrument_node="">Water</span></h3><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Rhubarb needs constant moisture, but they don’t like to have wet feet. They don’t want soggy soil.</span></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">If you live in a region that receives a lot of rain, such as the Pacific Northwest, you might not need to provide any extra water. If you live in a dry or hot region, you’ll need an irrigation system to provide consistent moisture.</span></p><h3 data-dcnode-id="727" id="31-dont-let-it-go-to-seed"><span data-dcnode-id="728" instrument_node="">Don’t Let It Go to Seed</span></h3><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Anytime you see a plant begin to bolt (or go to seed) this means that it’s getting ready to stop producing juicy stalks, and will start to produce seed for the next growing season, instead.</span></p><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">At the first sign of going to seed, cut those stalks off to prolong your harvest</span></p><h3 data-dcnode-id="721" id="32-fertilizebut-only-after-year-one"><span data-dcnode-id="722" instrument_node="">Fertilize…But Only After Year One</span></h3><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">It’s a good idea to fertilize your rhubarb plants. You don’t need to apply any fertilizer during the first year but in the second year and all years following, apply 1/2 cup of 10-10-10 fertilizer in the spring and fall.</span></p><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Make a circle around the base of your plant and put the fertilizer in the circle. Avoid applying fertilizer to the crown.</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Remember not to fertilize your plants when planting. The compost that you added to the soil is enough to feed your plants for the first year. Adding fertilizer in the first year will expose your rhubarb to too many nitrates. That could kill your plants.</span></p><h3 data-dcnode-id="713" id="33-control-the-weeds"><span data-dcnode-id="714" instrument_node="">Control the Weeds</span></h3><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Keep the weeds out of your rhubarb patch. Rhubarb is pretty good about being left alone by both bugs and disease. However, weeds attract them and put your plant at risk.</span></p><h3 data-dcnode-id="709" id="34-divide-your-rhubarb"><span data-dcnode-id="710" instrument_node="">Divide Your Rhubarb</span></h3><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Rhubarb continues to grow and spread each year, so it’s important to dig and split your rhubarb roots. This will need to be done every 3-4 years.</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Dividing your plants should be done when your plant is dormant, typically in the early spring or the fall.</span></p><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Dig up the entire plant, including the roots. Dig down about 6 inches deep, getting under the root system and pulling the plant out.</span></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Then, divide out the root ball, which is made of the root of the plant and the buds. You need the buds to form new plants. When you divide it, cut down the crown, between the buds.</span></p><h3 data-dcnode-id="699" id="35-replant-or-store-properly"><span data-dcnode-id="700" instrument_node="">Replant or Store Properly</span></h3><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">After dividing, put the pieces of root back into the ground immediately, if possible. You don’t want them to dry out. Replant them just like you planted the original rhubarb.</span></p><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">If you can’t plant the root pieces as soon as you finish dividing them, then be sure to put them in a plastic bag and keep them cool in the fridge.</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Once you are ready to plant them, place the root pieces in a bowl of lukewarm water to soak overnight before planting.</span></p><h2 data-dcnode-id="690" id="36-common-problems-with-growing-rhubarb"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Common Problems with Growing Rhubarb</span></strong></h2><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Like any plant, rhubarb has a few problems that you need to watch for. Here are what those problems are and what to do about them:</span></p><h3 data-dcnode-id="686" id="37-crown-rot"><span data-dcnode-id="687" instrument_node="">Crown Rot</span></h3><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Crown rot is a disease that forms in the soil where there is poor drainage. This disease damages the buds in the root system.</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">When this happens, it causes the plant to produce weak and thin stems. This means less harvest for you.</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">When you realize you have crown rot, dig up the entire plant. Be sure to get all of the roots as well. Then, burn the plants impacted by this disease. Don’t replant rhubarb in this location for at least 5 years.</span></p><h3 data-dcnode-id="678" id="38-leaf-spots"><span data-dcnode-id="679" instrument_node="">Leaf Spots</span></h3><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">This is a disease that forms discolored spots on the leaves of your rhubarb. The spots can be brown, yellow, or even red. The red spots seem to be the worse as they are the ones that most often attack the stem of the rhubarb as well.</span></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">If you have leaf spot, there’s no major treatment. Just take a sharp pair of pruning shears or scissors and trim any discolored portions off of the plant.</span></p><h3 data-dcnode-id="672" id="39-rhubarb-weevil"><span data-dcnode-id="673" instrument_node="">Rhubarb Weevil</span></h3><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Rhubarb weevil, also known as rhubarb curculio, is a good-sized beetle that has a long nose. These beetles feed on your rhubarb and make holes in the stem of the plant to lay their eggs.</span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">The solution for these beetles is simple. Remove them by hand. Since they are a good size, that shouldn’t be hard.</span></p><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Prevention is the key. Make sure that there is no debris left around your rhubarb plant because Rhubarb weevils will overwinter in that debris.</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Also, be sure that you don’t plant rhubarb around sunflowers or allow thistles to grow among your plants because these are breeding grounds for rhubarb weevils.</span></p><h3 data-dcnode-id="662" id="40-downy-mildew"><span data-dcnode-id="663" instrument_node="">Downy Mildew</span></h3><figure class="wp-block-image size-large" data-dcnode-id="654"><noscript data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">&lt;img width="800" height="533" src="https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-800x533.jpg" alt="" class="wp-image-599719" srcset="https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2.jpg 900w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="655" style="max-width: 728px;"><img alt="" class="lazyload wp-image-599719" data-dcnode-id="659" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-800x533.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2020/04/downy-mildew-2.jpg 900w" height="533" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20533%22%3E%3C/svg%3E" width="800"><div class="wpr-pinterest-button" data-dcnode-id="656"><a aria-label="pin this image" class="pin-this" data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fgrowing-rhubarb%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2020/04/downy-mildew-2-800x533.jpg%26description%3DGrowing%2520Rhubarb%253A%2520Varieties%252C%2520Planting%2520Guide%252C%2520Care%252C%2520Problems%252C%2520and%2520Harvest" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="658"></span></a></div></div></figure><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Downy mildew is a covering that forms on your rhubarb in extremely moist climates. If you have periods of rain, don’t be surprised if this forms on your rhubarb.</span></p><p data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">Make sure that you plant your rhubarb far enough apart that there is ample airflow. </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/downy-mildew/"><span data-dcnode-id="650" instrument_node="">Our guide</span></a><span data-dcnode-id="648" instrument_node=""> can help you tackle this problem.</span></p><h3 data-dcnode-id="645" id="41-snails-and-slugs"><span data-dcnode-id="646" instrument_node="">Snails and Slugs</span></h3><figure class="wp-block-image size-large" data-dcnode-id="637"><noscript data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">&lt;img width="800" height="533" src="https://morningchores.com/wp-content/uploads/2020/04/slug-1-800x533.jpg" alt="" class="wp-image-599715" srcset="https://morningchores.com/wp-content/uploads/2020/04/slug-1-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/slug-1-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/slug-1-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2020/04/slug-1-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2020/04/slug-1-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2020/04/slug-1.jpg 900w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="638" style="max-width: 728px;"><img alt="" class="lazyload wp-image-599715" data-dcnode-id="642" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2020/04/slug-1-800x533.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2020/04/slug-1-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/slug-1-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/slug-1-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2020/04/slug-1-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2020/04/slug-1-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2020/04/slug-1.jpg 900w" height="533" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20533%22%3E%3C/svg%3E" width="800"><div class="wpr-pinterest-button" data-dcnode-id="639"><a aria-label="pin this image" class="pin-this" data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fgrowing-rhubarb%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2020/04/slug-1-800x533.jpg%26description%3DGrowing%2520Rhubarb%253A%2520Varieties%252C%2520Planting%2520Guide%252C%2520Care%252C%2520Problems%252C%2520and%2520Harvest" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="641"></span></a></div></div></figure><p data-dcnode-id="632"><span data-dcnode-id="636" instrument_node="">Snails and slugs are in every garden. They can cause damage to rhubarb because they will munch on the stems of the plant. Use your favorite </span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/how-to-get-rid-of-snails/"><span data-dcnode-id="635" instrument_node="">slug control method</span></a><span data-dcnode-id="633" instrument_node="">.</span></p><h2 data-dcnode-id="629" id="42-best-companion-plants-for-rhubarb"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Best Companion Plants for Rhubarb</span></strong></h2><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">There are a few plants that rhubarb does especially well growing with. These plants, in general, help deter unwanted bugs from rhubarb:</span></p><ul data-dcnode-id="614"><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Onion</span></li><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Garlic</span></li><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Cabbage</span></li><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Kale</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Broccoli</span></li><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Turnips</span></li></ul><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Don’t plant with:</span></p><ul data-dcnode-id="599"><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Sunflowers</span></li><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Thistles</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Turnip</span></li><li data-dcnode-id="603"><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-carrots/"><span data-dcnode-id="605" instrument_node="">Carrot</span></a></li><li data-dcnode-id="600"><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-carrots/"><span data-dcnode-id="602" instrument_node="">Potato</span></a></li></ul><h2 data-dcnode-id="596" id="43-how-to-harvest-and-store-rhubarb"><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">How to Harvest and Store Rhubarb</span></strong></h2><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Rhubarb is simple to harvest. However, there are some major do’s and don’t when harvesting that can determine how much of a harvest you get and also determine the health of your plants, too. Here is what you need to know:</span></p><h3 data-dcnode-id="592" id="44-harvest-the-stalks-only"><span data-dcnode-id="593" instrument_node="">Harvest the Stalks Only</span></h3><figure class="wp-block-image size-large" data-dcnode-id="584"><noscript data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">&lt;img width="533" height="800" src="https://morningchores.com/wp-content/uploads/2020/04/harvesting-rhubarb-533x800.jpg" alt="" class="wp-image-599725" srcset="https://morningchores.com/wp-content/uploads/2020/04/harvesting-rhubarb-533x800.jpg 533w, https://morningchores.com/wp-content/uploads/2020/04/harvesting-rhubarb.jpg 600w" sizes="(max-width: 533px) 100vw, 533px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="585" style="max-width: 533px;"><img alt="" class="lazyload wp-image-599725" data-dcnode-id="589" data-sizes="(max-width: 533px) 100vw, 533px" data-src="https://morningchores.com/wp-content/uploads/2020/04/harvesting-rhubarb-533x800.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2020/04/harvesting-rhubarb-533x800.jpg 533w, https://morningchores.com/wp-content/uploads/2020/04/harvesting-rhubarb.jpg 600w" height="800" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20533%20800%22%3E%3C/svg%3E" width="533"><div class="wpr-pinterest-button" data-dcnode-id="586"><a aria-label="pin this image" class="pin-this" data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fgrowing-rhubarb%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2020/04/harvesting-rhubarb-533x800.jpg%26description%3DGrowing%2520Rhubarb%253A%2520Varieties%252C%2520Planting%2520Guide%252C%2520Care%252C%2520Problems%252C%2520and%2520Harvest" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="588"></span></a></div></div></figure><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">The biggest part of growing rhubarb is to know what parts of the plant to eat and which not. You should only eat the stalks of rhubarb.</span></p><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">The leaves contain a toxic level of oxalic acid, which is poisonous.</span></p><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">When you go to harvest the stalks, pull the stalk away from the plant and give it a gentle twist. If this doesn’t work, then use a sharp knife to cut the stalk from the plant.</span></p><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">The stalks are best to harvest when they reach about 12-18 inches in length.</span></p><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Keep in mind though, if you begin to see stalks turning thin, then you need to stop harvesting. This is a sign that the plant is struggling for the necessary nutrients.</span></p><h3 data-dcnode-id="572" id="45-dont-harvest-during-year-one"><span data-dcnode-id="573" instrument_node="">Don’t Harvest During Year One</span></h3><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">When you plant rhubarb, know that your harvest will improve as the years go by. In the first year of planting, you shouldn’t harvest your rhubarb at all.</span></p><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">But by the time you reach year three, you should have an eight to ten-week period where you can harvest from the plant. It is okay to harvest during year two, but do so sparingly.</span></p><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">If you follow these rules, then you should get anywhere from one to two decades of life from each plant.</span></p><h3 data-dcnode-id="564" id="46-harvest-rhubarb-twice-a-year"><span data-dcnode-id="565" instrument_node="">Harvest Rhubarb Twice a Year</span></h3><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Rhubarb should be able to be harvested two times per year in most zones that grow it as a perennial. You should be able to harvest the plant in the spring and fall.</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">However, don’t harvest rhubarb during the summer. Leave some leaves on the plant as well when you finish harvesting in the spring to protect the plant from the heat of the summer.</span></p><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">If you harvest rhubarb during the sweltering summer heat, it could cause unnecessary stress on the plant which could cause it to die.</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">When it’s time to harvest your rhubarb, in most zones, you should prepare to have a full harvest when your plant has around ten stalks on it. Be sure to leave at least two stalks each harvest to encourage continual growth.</span></p><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">If you are growing rhubarb as an annual, you should harvest the entire plant when the summer heat begins.</span></p><h3 data-dcnode-id="552" id="47-clean-up-after-your-plant"><span data-dcnode-id="553" instrument_node="">Clean Up After Your Plant</span></h3><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">When the harvest season has ended each fall, it is important to take care of your rhubarb. You’ll know that harvest is over because the stalks will begin to die back.</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Once this occurs, you’ll want to cover the plant with a large helping of mulch. This will protect the plant and the mulch will compost and put nitrogen into the ground. This will give your rhubarb a nice boost come spring.</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">However, be sure that you clean up any debris on or around your plant to make sure that the plant will stay healthy, and you aren’t providing homes for pests and diseases that could harm your rhubarb.</span></p><h3 data-dcnode-id="544" id="48-rhubarb-is-best-if-used-immediately"><span data-dcnode-id="545" instrument_node="">Rhubarb is Best if Used Immediately</span></h3><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">When it comes to storing rhubarb, it’s simple. For the best flavor, you’ll want to use your rhubarb immediately. This will ensure that it keeps its crispiness.</span></p><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Rhubarb is great for baking and freezing for later use as well.</span></p><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">If you aren’t able to get to cooking with it or storing it right away, you should store it in your refrigerator where it is cool. It can keep up to a week.</span></p><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Be that the longer rhubarb sits, it will lose its crispy texture. Some say you can soak stored rhubarb in water to put some life back into it, but it will diminish the flavor a little.</span></p><h3 data-dcnode-id="534" id="49-harvesting-rhubarb-seeds"><span data-dcnode-id="535" instrument_node="">Harvesting Rhubarb Seeds</span></h3><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Let’s say you’d like to start more rhubarb from seed, and you don’t want to purchase the seeds. Some stalks of rhubarb, in theory, should try to go to seed at some point during the season.</span></p><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Usually, when this happens, we encourage you to cut those stalks off to try to prolong production.</span></p><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">However, if you want seed, you can let those stalks grow and collect the seeds that should form at the ends of them.</span></p><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Then, cut the seed stalks off and prepare your rhubarb to be overwintered by mulching it. You’ll want to dry the seeds in a dehydrator before you store them over the winter. You can also store the seeds in a freezer inside a sealed bag.</span></p><h3 data-dcnode-id="524" id="50-using-rhubarb"><span data-dcnode-id="525" instrument_node="">Using Rhubarb</span></h3><figure class="wp-block-image size-large" data-dcnode-id="516"><noscript data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">&lt;img width="800" height="530" src="https://morningchores.com/wp-content/uploads/2020/04/harvested-rhubarb-800x530.jpg" alt="" class="wp-image-599727" srcset="https://morningchores.com/wp-content/uploads/2020/04/harvested-rhubarb-800x530.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/harvested-rhubarb-600x397.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/harvested-rhubarb.jpg 906w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="517" style="max-width: 728px;"><img alt="" class="lazyload wp-image-599727" data-dcnode-id="521" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2020/04/harvested-rhubarb-800x530.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2020/04/harvested-rhubarb-800x530.jpg 800w, https://morningchores.com/wp-content/uploads/2020/04/harvested-rhubarb-600x397.jpg 600w, https://morningchores.com/wp-content/uploads/2020/04/harvested-rhubarb.jpg 906w" height="530" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20530%22%3E%3C/svg%3E" width="800"><div class="wpr-pinterest-button" data-dcnode-id="518"><a aria-label="pin this image" class="pin-this" data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fgrowing-rhubarb%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2020/04/harvested-rhubarb-800x530.jpg%26description%3DGrowing%2520Rhubarb%253A%2520Varieties%252C%2520Planting%2520Guide%252C%2520Care%252C%2520Problems%252C%2520and%2520Harvest" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="520"></span></a></div></div></figure><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Rhubarb isn’t a typical veggie, so a lot of people have no idea how to use it. Here are some suggestions for ways to use it.</span></p><ul data-dcnode-id="507"><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Make some strawberry rhubarb jam – it’s a kid favorite!</span></li><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Try baking a strawberry rhubarb pie, which is a classic dessert with a mixture of sweet and sour.</span></li><li data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Whip up some rhubarb sherbet.</span></li></ul><h2 data-dcnode-id="505" id="51-plant-rhubarb-for-an-extended-harvest"><span data-dcnode-id="506" instrument_node="">Plant Rhubarb For an Extended Harvest</span></h2><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Growing rhubarb in your garden is a great way to extend your harvest since it pops out early in the year. Since they are perennials, rhubarb will come back year after year. That means you can grow more food with less work each year.</span></p><div class="wp-block-image" data-dcnode-id="494"><figure class="aligncenter" data-dcnode-id="495"><noscript data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">&lt;img width="470" height="800" src="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg" alt="growing rhubarb" class="wp-image-25316" srcset="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg 470w, https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN.jpg 600w" sizes="(max-width: 470px) 100vw, 470px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="496" style="max-width: 470px;"><img alt="growing rhubarb" class="lazyload wp-image-25316" data-dcnode-id="500" data-sizes="(max-width: 470px) 100vw, 470px" data-src="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg 470w, https://morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN.jpg 600w" height="800" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20470%20800%22%3E%3C/svg%3E" width="470"><div class="wpr-pinterest-button" data-dcnode-id="497"><a aria-label="pin this image" class="pin-this" data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fgrowing-rhubarb%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2018/03/Growing-Rhubarb-How-to-Plant-Grow-and-Harvest-Rhubarb-Plants-PIN-470x800.jpg%26description%3DGrowing%2520Rhubarb%253A%2520Varieties%252C%2520Planting%2520Guide%252C%2520Care%252C%2520Problems%252C%2520and%2520Harvest" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="499"></span></a></div></div></figure></div><span data-dcnode-id="493" instrument_node=""> </span><span data-dcnode-id="490" instrument_node
