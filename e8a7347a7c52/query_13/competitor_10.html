<mrow data-dcnode-id="6837" is="true"><mn data-dcnode-id="6841" is="true"><span data-dcnode-id="6842" instrument_node="">420</span></mn><mspace data-dcnode-id="6840" is="true" width="0.12em"></mspace><mi data-dcnode-id="6838" is="true"><span data-dcnode-id="6839" instrument_node="">nm</span></mi></mrow></msub></mrow><mi data-dcnode-id="6833" is="true" mathvariant="italic"><span data-dcnode-id="6834" instrument_node="">bc</span></mi></mfrac></math></span></span></span></span></span><span data-dcnode-id="6823" instrument_node="">where </span><em data-dcnode-id="6821"><span data-dcnode-id="6822" instrument_node="">b</span></em><span data-dcnode-id="6820" instrument_node="">&nbsp;</span><span data-dcnode-id="6819" instrument_node="">=</span><span data-dcnode-id="6818" instrument_node="">&nbsp;</span><span data-dcnode-id="6817" instrument_node="">path length in centimeters and </span><em data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node="">c</span></em><span data-dcnode-id="6814" instrument_node="">&nbsp;</span><span data-dcnode-id="6813" instrument_node="">=</span><span data-dcnode-id="6812" instrument_node="">&nbsp;</span><span data-dcnode-id="6811" instrument_node="">concentration in grams per milliliter.</span></p><p data-dcnode-id="6808" id="p0370"><span data-dcnode-id="6809" instrument_node="">Other methods for measuring and determining color are available courtesy of the Corn Refiners Association (CRA), Washington, DC, the American Society of Brewing Chemists (ASBC), St. Paul, MN, and the International Society of Beverage Technologists (ISBT), Dallas, TX.</span></p><div data-dcnode-id="6775"><p data-dcnode-id="6797" id="p0375"><span data-dcnode-id="6803"><span data-dcnode-id="6807" instrument_node="">A corn syrup's color can degrade via two different pathways. The first and primary pathway to color body formation is the </span><a class="topic-link" data-dcnode-id="6805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maillard-reaction" title="Learn more about Maillard reaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6806" instrument_node="">Maillard reaction</span></a><span data-dcnode-id="6804" instrument_node="">, also referred to as nonenzymatic browning. Corn syrups contain reducing sugars, for example, dextrose, fructose, and maltose, which react with trace amounts of amino acids and proteins to form color bodies over time. As these color bodies form, they change the appearance from a colorless, water white product into different shades of yellow. The Maillard reaction also depends upon pH and temperature. As the pH moves from acidic to neutral, the rate of discoloration increases. As temperature increases, color development also increases. The second pathway for color development by the application of heat or acids is called caramelization. An excessive amount of trace minerals like copper and iron can also contribute to color formation. One method used to minimize or control color is to add up to 40</span></span><span data-dcnode-id="6802" instrument_node="">&nbsp;</span><span data-dcnode-id="6801" instrument_node="">ppm sulfur dioxide to the syrup. Another processing method to help stabilize color development is demineralization or IE. </span><a class="workspace-trigger" data-dcnode-id="6799" href="#f0080" name="bf0080"><span data-dcnode-id="6800" instrument_node="">Fig. 20.15</span></a><span data-dcnode-id="6798" instrument_node=""> shows the typical rate of color development in a 42% HFCS over the course of 9 weeks at various temperatures.</span></p><figure class="figure text-xs" data-dcnode-id="6776" id="f0080"><span data-dcnode-id="6787"><img alt="Fig. 20.15" aria-describedby="ca0080" data-dcnode-id="6796" height="284" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-15-9780128119716.jpg&amp;raw"><span data-dcnode-id="6795" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6788"><li data-dcnode-id="6789"><a class="anchor download-link u-font-sans" data-dcnode-id="6790" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-15-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6791"><span data-dcnode-id="6794" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6792"><span data-dcnode-id="6793" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6777"><span data-dcnode-id="6778" id="ca0080"><p data-dcnode-id="6779" id="sp0080"><span class="label" data-dcnode-id="6785"><span data-dcnode-id="6786" instrument_node="">Fig. 20.15</span></span><span data-dcnode-id="6784" instrument_node="">. </span><span data-dcnode-id="6783" instrument_node="">Color stability of 42% </span><a class="topic-link" data-dcnode-id="6781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6782" instrument_node="">HFCS</span></a><span data-dcnode-id="6780" instrument_node="">.</span></p></span></span></figure></div></section><section data-dcnode-id="6682" id="s0215"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6772" id="st0230"><span data-dcnode-id="6773" instrument_node="">Fermentability</span></h3><div data-dcnode-id="6692"><p data-dcnode-id="6759" id="p0380"><span data-dcnode-id="6763"><span data-dcnode-id="6771" instrument_node="">The carbohydrate composition of a corn sweetener is rich in dextrose, maltose, and </span><a class="topic-link" data-dcnode-id="6769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltotriose" title="Learn more about maltotriose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6770" instrument_node="">maltotriose</span></a><span data-dcnode-id="6764"><span data-dcnode-id="6768" instrument_node="">, while HFCS is rich in fructose and dextrose making these products useful carbohydrate sources for many fermentations. The fermentability of a syrup is determined by a measurement called the fermentable extract, which is the sum of the mono-, di-, and </span><a class="topic-link" data-dcnode-id="6766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/trisaccharides" title="Learn more about trisaccharide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6767" instrument_node="">trisaccharide</span></a><span data-dcnode-id="6765" instrument_node=""> fractions. The value can be calculated on a dry basis or as is. The as is basis accounts for the actual solid content of the product. </span></span></span><a class="workspace-trigger" data-dcnode-id="6761" href="#t0085" name="bt0085"><span data-dcnode-id="6762" instrument_node="">Table 20.16</span></a><span data-dcnode-id="6760" instrument_node=""> shows the fermentable extract level for a variety of corn sweeteners. The fermentability of the syrups assumes that the dextrose, fructose, maltose, and maltotriose are 100% fermentable. However, real fermentable extract may vary due to the ability of the yeast, or other organism, to metabolize these sugars, especially maltotriose.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="6693" id="t0085"><span class="captions" data-dcnode-id="6750"><span data-dcnode-id="6751" id="ca0165"><p data-dcnode-id="6752" id="sp0165"><span class="label" data-dcnode-id="6757"><span data-dcnode-id="6758" instrument_node="">Table 20.16</span></span><span data-dcnode-id="6756" instrument_node="">. </span><span data-dcnode-id="6755" instrument_node="">Fermentable Extract Values of </span><a class="topic-link" data-dcnode-id="6753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about Corn Syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6754" instrument_node="">Corn Syrups</span></a></p></span></span><div class="groups" data-dcnode-id="6696"><table data-dcnode-id="6697"><thead data-dcnode-id="6744"><tr class="rowsep-1 valign-top" data-dcnode-id="6745"><th data-dcnode-id="6748" scope="col"><span data-dcnode-id="6749" instrument_node="">Corn Syrup or Dextrose</span></th><th data-dcnode-id="6746" scope="col"><span data-dcnode-id="6747" instrument_node="">Fermentable Extract (% Dry-Weight Basis)</span></th></tr></thead><tbody data-dcnode-id="6698"><tr data-dcnode-id="6739"><th data-dcnode-id="6742" scope="row"><span data-dcnode-id="6743" instrument_node="">36 Dextrose equivalents</span></th><td data-dcnode-id="6740"><span data-dcnode-id="6741" instrument_node="">34.8</span></td></tr><tr data-dcnode-id="6734"><th data-dcnode-id="6737" scope="row"><span data-dcnode-id="6738" instrument_node="">42 Dextrose equivalents</span></th><td data-dcnode-id="6735"><span data-dcnode-id="6736" instrument_node="">41.5</span></td></tr><tr data-dcnode-id="6729"><th data-dcnode-id="6732" scope="row"><span data-dcnode-id="6733" instrument_node="">43 High-maltose corn syrup</span></th><td data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">75.0</span></td></tr><tr data-dcnode-id="6724"><th data-dcnode-id="6727" scope="row"><span data-dcnode-id="6728" instrument_node="">54 Dextrose equivalents</span></th><td data-dcnode-id="6725"><span data-dcnode-id="6726" instrument_node="">53.4</span></td></tr><tr data-dcnode-id="6719"><th data-dcnode-id="6722" scope="row"><span data-dcnode-id="6723" instrument_node="">62 Dextrose equivalents</span></th><td data-dcnode-id="6720"><span data-dcnode-id="6721" instrument_node="">70.0</span></td></tr><tr data-dcnode-id="6714"><th data-dcnode-id="6717" scope="row"><span data-dcnode-id="6718" instrument_node="">64 Dextrose equivalents</span></th><td data-dcnode-id="6715"><span data-dcnode-id="6716" instrument_node="">76.1</span></td></tr><tr data-dcnode-id="6709"><th data-dcnode-id="6712" scope="row"><span data-dcnode-id="6713" instrument_node="">68 Dextrose equivalents</span></th><td data-dcnode-id="6710"><span data-dcnode-id="6711" instrument_node="">79.0</span></td></tr><tr data-dcnode-id="6704"><th data-dcnode-id="6707" scope="row"><span data-dcnode-id="6708" instrument_node="">High-fructose corn syrup</span></th><td data-dcnode-id="6705"><span data-dcnode-id="6706" instrument_node="">95.0</span></td></tr><tr data-dcnode-id="6699"><th data-dcnode-id="6702" scope="row"><span data-dcnode-id="6703" instrument_node="">Dextrose</span></th><td data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">100</span></td></tr></tbody></table></div><p class="source" data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">From Pancoast, H.M., Junk, W.R., 1980. Fructose. In: Pancoast, H.M., Junk, W.R. (Eds.), Handbook of Sugars, second ed. AVI Publishing Co., Westport, CT, pp. 387–388, used with permission.</span></p></div></div><p data-dcnode-id="6683" id="p0385"><span data-dcnode-id="6691" instrument_node="">Lower DE syrups and </span><a class="topic-link" data-dcnode-id="6689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6690" instrument_node="">maltodextrins</span></a><span data-dcnode-id="6684"><span data-dcnode-id="6688" instrument_node=""> can be used for fermentations requiring carbohydrate sources that have low levels of dextrose and maltose, but are rich in </span><a class="topic-link" data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/oligosaccharide" title="Learn more about oligosaccharides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6687" instrument_node="">oligosaccharides</span></a><span data-dcnode-id="6685" instrument_node=""> that are then metabolized by fermentation organism.</span></span></p></section><section data-dcnode-id="6493" id="s0220"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6680" id="st0235"><span data-dcnode-id="6681" instrument_node="">Freezing-Point Depression</span></h3><p data-dcnode-id="6667" id="p0390"><span data-dcnode-id="6671"><span data-dcnode-id="6675"><span data-dcnode-id="6679" instrument_node="">Corn syrups are composed of mixtures of various sugars with different molecular weights. As a result, the average molecular weight of the solution usually changes in direct proportion to the degree of conversion or DE of the solution. This variation affects both the </span><a class="topic-link" data-dcnode-id="6677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/osmotic-pressure" title="Learn more about osmotic pressure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6678" instrument_node="">osmotic pressure</span></a><span data-dcnode-id="6676" instrument_node=""> of the sweetener and the freezing-point depression. Lower-conversion syrups will not depress the freezing point as much as will high-conversion syrups, which is important to applications such as </span></span><a class="topic-link" data-dcnode-id="6673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/frozen-desserts" title="Learn more about frozen desserts from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6674" instrument_node="">frozen desserts</span></a><span data-dcnode-id="6672" instrument_node=""> and dairy products where freeze-thaw characteristics influence shelf life stability (</span></span><a class="workspace-trigger" data-dcnode-id="6669" href="#bb0095" name="bbb0095"><span data-dcnode-id="6670" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="6668" instrument_node="">).</span></p><div data-dcnode-id="6494"><p data-dcnode-id="6659" id="p0395"><span data-dcnode-id="6666" instrument_node="">The effect of various sweeteners on the freezing point of a solution is based on a sucrose equivalence value, which can be seen in </span><a class="workspace-trigger" data-dcnode-id="6664" href="#t0090" name="bt0090"><span data-dcnode-id="6665" instrument_node="">Table 20.17</span></a><span data-dcnode-id="6663" instrument_node="">. This value is based on the molecular weight of the sugar. The freezing point equivalence factor for freezing-point depression of a sweetener is based on the molecular weight relative to that of sucrose. The percentage of sweetener is multiplied by the appropriate freezing point equivalence factor to give the freezing-point depression (</span><a class="workspace-trigger" data-dcnode-id="6661" href="#bb0095" name="bbb0095"><span data-dcnode-id="6662" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="6660" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="6495" id="t0090"><span class="captions" data-dcnode-id="6652"><span data-dcnode-id="6653" id="ca0170"><p data-dcnode-id="6654" id="sp0170"><span class="label" data-dcnode-id="6657"><span data-dcnode-id="6658" instrument_node="">Table 20.17</span></span><span data-dcnode-id="6656" instrument_node="">. </span><span data-dcnode-id="6655" instrument_node="">Estimating the Freezing-Point Depression of Various Sweeteners</span></p></span></span><div class="groups" data-dcnode-id="6498"><table data-dcnode-id="6499"><thead data-dcnode-id="6642"><tr class="rowsep-1 valign-bottom" data-dcnode-id="6643"><th data-dcnode-id="6650" scope="col"><span data-dcnode-id="6651" instrument_node="">Sweetener</span></th><th data-dcnode-id="6648" scope="col"><span data-dcnode-id="6649" instrument_node="">Molecular Weight (Approx.)</span></th><th data-dcnode-id="6646" scope="col"><span data-dcnode-id="6647" instrument_node="">Sucrose Equivalence Value (SE)</span></th><th data-dcnode-id="6644" scope="col"><span data-dcnode-id="6645" instrument_node="">Freezing Point Equivalence Factor</span></th></tr></thead><tbody data-dcnode-id="6500"><tr data-dcnode-id="6633"><th data-dcnode-id="6640" scope="row"><span data-dcnode-id="6641" instrument_node="">Sucrose</span></th><td data-dcnode-id="6638"><span data-dcnode-id="6639" instrument_node="">342</span></td><td data-dcnode-id="6636"><span data-dcnode-id="6637" instrument_node="">1.00</span></td><td data-dcnode-id="6634"><span data-dcnode-id="6635" instrument_node="">1</span></td></tr><tr data-dcnode-id="6624"><th data-dcnode-id="6631" scope="row"><span data-dcnode-id="6632" instrument_node="">Lactose</span></th><td data-dcnode-id="6629"><span data-dcnode-id="6630" instrument_node="">342</span></td><td data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">1.00</span></td><td data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">1</span></td></tr><tr data-dcnode-id="6615"><th data-dcnode-id="6622" scope="row"><span data-dcnode-id="6623" instrument_node="">Maltose</span></th><td data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">342</span></td><td data-dcnode-id="6618"><span data-dcnode-id="6619" instrument_node="">1.00</span></td><td data-dcnode-id="6616"><span data-dcnode-id="6617" instrument_node="">1</span></td></tr><tr data-dcnode-id="6606"><th data-dcnode-id="6613" scope="row"><span data-dcnode-id="6614" instrument_node="">Dextrose</span></th><td data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">180</span></td><td data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">1.90</span></td><td data-dcnode-id="6607"><span data-dcnode-id="6608" instrument_node="">0.55</span></td></tr><tr data-dcnode-id="6597"><th data-dcnode-id="6604" scope="row"><span data-dcnode-id="6605" instrument_node="">Fructose</span></th><td data-dcnode-id="6602"><span data-dcnode-id="6603" instrument_node="">180</span></td><td data-dcnode-id="6600"><span data-dcnode-id="6601" instrument_node="">1.90</span></td><td data-dcnode-id="6598"><span data-dcnode-id="6599" instrument_node="">0.55</span></td></tr><tr data-dcnode-id="6587"><th data-dcnode-id="6594" scope="row"><span data-dcnode-id="6596" instrument_node="">&nbsp;</span><span data-dcnode-id="6595" instrument_node="">90%</span></th><td data-dcnode-id="6592"><span data-dcnode-id="6593" instrument_node="">182</span></td><td data-dcnode-id="6590"><span data-dcnode-id="6591" instrument_node="">1.90</span></td><td data-dcnode-id="6588"><span data-dcnode-id="6589" instrument_node="">0.55</span></td></tr><tr data-dcnode-id="6577"><th data-dcnode-id="6584" scope="row"><span data-dcnode-id="6586" instrument_node="">&nbsp;</span><span data-dcnode-id="6585" instrument_node="">55%</span></th><td data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">185</span></td><td data-dcnode-id="6580"><span data-dcnode-id="6581" instrument_node="">1.80</span></td><td data-dcnode-id="6578"><span data-dcnode-id="6579" instrument_node="">0.54</span></td></tr><tr data-dcnode-id="6567"><th data-dcnode-id="6574" scope="row"><span data-dcnode-id="6576" instrument_node="">&nbsp;</span><span data-dcnode-id="6575" instrument_node="">42%</span></th><td data-dcnode-id="6572"><span data-dcnode-id="6573" instrument_node="">190</span></td><td back into solution if the syrup's temperature is increased to a point that supports </span><a class="topic-link" data-dcnode-id="6155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/solubilization" title="Learn more about solubilization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6156" instrument_node="">solubilization</span></a><span data-dcnode-id="6154" instrument_node="">. </span></span><a class="workspace-trigger" data-dcnode-id="6151" href="#f0085" name="bf0085"><span data-dcnode-id="6152" instrument_node="">Fig. 20.16</span></a><span data-dcnode-id="6150" instrument_node=""> can be used to estimate solubility conditions for dextrose when crystallization is a concern. Because dextrose crystallization is an exothermic reaction, solubilizing will require extra energy input to melt the crystal. Melting dextrose crystals can be a time-consuming and frustrating operation.</span></p><figure class="figure text-xs" data-dcnode-id="6131" id="f0085"><span data-dcnode-id="6139"><img alt="Fig. 20.16" aria-describedby="ca0085" data-dcnode-id="6148" height="407" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-16-9780128119716.jpg&amp;raw"><span data-dcnode-id="6147" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6140"><li data-dcnode-id="6141"><a class="anchor download-link u-font-sans" data-dcnode-id="6142" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-16-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6143"><span data-dcnode-id="6146" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6144"><span data-dcnode-id="6145" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6132"><span data-dcnode-id="6133" id="ca0085"><p data-dcnode-id="6134" id="sp0085"><span class="label" data-dcnode-id="6137"><span data-dcnode-id="6138" instrument_node="">Fig. 20.16</span></span><span data-dcnode-id="6136" instrument_node="">. </span><span data-dcnode-id="6135" instrument_node="">Phase diagram for dextrose water solutions.</span></p></span></span></figure></div></section><section data-dcnode-id="5933" id="s0240"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6127" id="st0255"><span data-dcnode-id="6128" instrument_node="">Water Activity</span></h3><div data-dcnode-id="5934"><p data-dcnode-id="6115" id="p0420"><span data-dcnode-id="6122"><span data-dcnode-id="6126" instrument_node="">Corn syrups typically exhibit low water-activity levels because of the high osmotic pressure they exert. This has a direct impact on the degree of resistance to </span><a class="topic-link" data-dcnode-id="6124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/microbial-growth" title="Learn more about microbial growth from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6125" instrument_node="">microbial growth</span></a><span data-dcnode-id="6123" instrument_node=""> exhibited by sweeteners both in storage and in application. </span></span><a class="workspace-trigger" data-dcnode-id="6120" href="#t0105" name="bt0105"><span data-dcnode-id="6121" instrument_node="">Table 20.20</span></a><span data-dcnode-id="6119" instrument_node=""> shows the water activity of various common sweeteners. These data are part of a study confirming the inability of many high-solids sweeteners to support microbial growth (</span><a class="workspace-trigger" data-dcnode-id="6117" href="#bb0155" name="bbb0155"><span data-dcnode-id="6118" instrument_node="">Niromand et al., 1998</span></a><span data-dcnode-id="6116" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="5935" id="t0105"><span class="captions" data-dcnode-id="6108"><span data-dcnode-id="6109" id="ca0185"><p data-dcnode-id="6110" id="sp0185"><span class="label" data-dcnode-id="6113"><span data-dcnode-id="6114" instrument_node="">Table 20.20</span></span><span data-dcnode-id="6112" instrument_node="">. </span><span data-dcnode-id="6111" instrument_node="">Properties of Liquid Sweeteners</span></p></span></span><div class="groups" data-dcnode-id="5973"><table data-dcnode-id="5974"><thead data-dcnode-id="6084"><tr class="rowsep-1 valign-top" data-dcnode-id="6085"><th data-dcnode-id="6102" scope="col"><span data-dcnode-id="6107" instrument_node="">Type of Syrup</span><a class="workspace-trigger" data-dcnode-id="6103" href="#tf0115" name="btf0115"><sup data-dcnode-id="6104"><em data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">a</span></em></sup></a></th><th data-dcnode-id="6100" scope="col"><span data-dcnode-id="6101" instrument_node="">Solids (%)</span></th><th data-dcnode-id="6095" scope="col"><span data-dcnode-id="6099" instrument_node="">Water Activity (</span><em data-dcnode-id="6097"><span data-dcnode-id="6098" instrument_node="">Aw</span></em><span data-dcnode-id="6096" instrument_node="">)</span></th><th data-dcnode-id="6093" scope="col"><span data-dcnode-id="6094" instrument_node="">Titratable Acidity (mEq)</span></th><th data-dcnode-id="6088" scope="col"><span data-dcnode-id="6092" instrument_node="">SO</span><sub data-dcnode-id="6090"><span data-dcnode-id="6091" instrument_node="">2</span></sub><span data-dcnode-id="6089" instrument_node=""> (ppm)</span></th><th data-dcnode-id="6086" scope="col"><span data-dcnode-id="6087" instrument_node="">pH</span></th></tr></thead><tbody data-dcnode-id="5975"><tr data-dcnode-id="6071"><th data-dcnode-id="6082" scope="row"><span data-dcnode-id="6083" instrument_no  more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5960" instrument_node="">HFCS</span></a></em></span><span data-dcnode-id="5956" instrument_node="">, high-fructose corn syrup; </span><span data-dcnode-id="5952"><em data-dcnode-id="5953"><a class="topic-link" data-dcnode-id="5954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-maltose-corn-syrup" title="Learn more about HMCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5955" instrument_node="">HMCS</span></a></em></span><span data-dcnode-id="5951" instrument_node="">, high-maltose corn syrup; </span><em data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">MIS</span></em><span data-dcnode-id="5948" instrument_node="">, medium invert sugar.</span></p></dd><dt data-dcnode-id="5944" id="tf0120"><span data-dcnode-id="5945" instrument_node="">b</span></dt><dd data-dcnode-id="5939"><p data-dcnode-id="5940" id="np0120"><em data-dcnode-id="5942"><span data-dcnode-id="5943" instrument_node="">Negl.</span></em><span data-dcnode-id="5941" instrument_node="">, negligible amount.</span></p></dd></dl><p class="source" data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">From Niromand, F., Sperber, W.H., Lewandowski, V.J., Hobbs, L.J., 1998. Fate of bacteria pathogens and Indicator organisms in liquid sweeteners. J. Food Prot. 61 (3), 295–299, used with permission.</span></p></div></div></section></section><section data-dcnode-id="3048" id="s0245"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5930" id="st0260"><span data-dcnode-id="5931" instrument_node="">Applications of Corn Sweeteners</span></h2><div data-dcnode-id="3204"><p data-dcnode-id="5918" id="p0425"><span data-dcnode-id="5929" instrument_node="">Corn sweeteners are used in many food and industrial applications (</span><a class="workspace-trigger" data-dcnode-id="5927" href="#t0110" name="bt0110"><span data-dcnode-id="5928" instrument_node="">Table 20.21</span></a><span data-dcnode-id="5926" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5924" href="#t0115" name="bt0115"><span data-dcnode-id="5925" instrument_node="">Table 20.22</span></a><span data-dcnode-id="5919"><span data-dcnode-id="5923" instrument_node="">). In the food industry, some of these include: jams and </span><a class="topic-link" data-dcnode-id="5921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/jellies" title="Learn more about jellies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5922" instrument_node="">jellies</span></a><span data-dcnode-id="5920" instrument_node="">, table syrups, ketchup, dressings and sauces, processed meats, nondairy creamers, and fruit canning. Industrial applications include intermediates for adhesives, binders, detergents, biodegradable plastics, and cement additives. Corn sweetener-derived carbohydrates are used as fermentation feedstock for many important products including amino acids, gums, pharmaceuticals, enzymes, food grade acids, and ethanol. A few key applications for sweeteners in food products are addressed next.</span></span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4307" id="t0110"><span class="captions" data-dcnode-id="5911"><span data-dcnode-id="5912" id="ca0190"><p data-dcnode-id="5913" id="sp0190"><span class="label" data-dcnode-id="5916"><span data-dcnode-id="5917" instrument_node="">Table 20.21</span></span><span data-dcnode-id="5915" instrument_node="">. </span><span data-dcnode-id="5914" instrument_node="">Applications of Nutritive Sweeteners Made From Corn</span></p></span></span><div class="groups" data-dcnode-id="4314"><table data-dcnode-id="4315"><thead data-dcnode-id="5898"><tr class="rowsep-1 valign-top" data-dcnode-id="5899"><th da span></td><td data-dcnode-id="3267"></td><td data-dcnode-id="3266"></td><td data-dcnode-id="3265"></td><td data-dcnode-id="3264"></td><td data-dcnode-id="3263"></td><td data-dcnode-id="3262"></td></tr><tr data-dcnode-id="3234"><th data-dcnode-id="3259" scope="row"><span data-dcnode-id="3260" instrument_node="">Toppings</span></th><td data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">●</span></td><td data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">●</span></td><td data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">●</span></td><td data-dcnode-id="3252"></td><td data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">●</span></td><td data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">●</span></td><td data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">●</span></td><td data-dcnode-id="3245"></td><td data-dcnode-id="3244"></td><td data-dcnode-id="3243"></td><td data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">●</span></td><td data-dcnode-id="3240"></td><td data-dcnode-id="3239"></td><td data-dcnode-id="3238"></td><td data-dcnode-id="3237"></td><td data-dcnode-id="3236"></td><td data-dcnode-id="3235"></td></tr><tr data-dcnode-id="3211"><th data-dcnode-id="3232" scope="row"><span data-dcnode-id="3233" instrument_node="">Wine</span></th><td data-dcnode-id="3231"></td><td data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">●</span></td><td data-dcnode-id="3228"></td><td data-dcnode-id="3227"></td><td data-dcnode-id="3226"></td><td data-dcnode-id="3225"></td><td data-dcnode-id="3224"></td><td data-dcnode-id="3223"></td><td data-dcnode-id="3222"></td><td data-dcnode-id="3221"></td><td data-dcnode-id="3220"></td><td data-dcnode-id="3219"></td><td data-dcnode-id="3218"></td><td data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">●</span></td><td data-dcnode-id="3215"></td><td data-dcnode-id="3214"></td><td data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">●</span></td></tr></tbody></table></div><p class="source" data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">From Corn Refiners Association, used by permission.</span></p></div></div><section data-dcnode-id="3188" id="s0250"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3202" id="st0265"><span data-dcnode-id="3203" instrument_node="">Baking</span></h3><p data-dcnode-id="3189" id="p0430"><span data-dcnode-id="3201" instrument_node="">The use of corn sweeteners by the baking industry is focused primarily on products made by fermentation, for example, bread. The application of corn sweeteners in cookies, biscuits, crackers, and cakes is limited due to the impact on color development by the </span><a class="topic-link" data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/reducing-sugars" title="Learn more about reducing sugars from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3200" instrument_node="">reducing sugars</span></a><span data-dcnode-id="3190"><span data-dcnode-id="3198" instrument_node=""> and carbohydrate composition on starch gelatinization affecting cookie spread/height and cake baking. Corn sweeteners provide a functional and cost-effective source of fermentable carbohydrates for baking yeast raised breads and doughs. Although many sweeteners could be used in the production of white pan bread, the two most preferred are either 42% </span><a class="topic-link" data-dcnode-id="3196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3197" instrument_node="">HFCS</span></a><span data-dcnode-id="3191"><span data-dcnode-id="3195" instrument_node=""> or 95% dextrose. The high level of fermentable </span><a class="topic-link" data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/monosaccharides" title="Learn more about monosaccharides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3194" instrument_node="">monosaccharides</span></a><span data-dcnode-id="3192" instrument_node="">, dextrose, and/or fructose in both these sweeteners is superior to many others. In addition to providing a source of fermentable sugars, the presence of these monosaccharides gives the bread desirable red and brown crust colors postbaking. HFCS syrups may be used in soft cookie manufacture at low levels. Fructose is a highly hygroscopic sugar and absorbs enough moisture to keep the cookie soft and extend the shelf life. Unfortunately, the baking industry has been trending away from HFCS in recent years due to marketing pressure to remove HFCS and switch to sugar</span></span></span></p></section><section data-dcnode-id="3105" id="s0255"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3186" id="st0270"><span data-dcnode-id="3187" instrument_node="">Beverages</span></h3><p data-dcnode-id="3174" id="p0435"><span data-dcnode-id="3181"><span data-dcnode-id="3185" instrument_node="">The primary sweeteners used in the production of nutritive beverages are 55% HFCS, 42% HFCS, sucrose, and to a lesser extent, 90% HFCS and pure fructose. 42% HFCS was first introduced into the market in the 1970s, driven by a combination of issues including the supply and cost of sugar. Production breakthroughs were made in the late 1960s and commercialized by Clinton Corn and AE Staley in the early 1970s. During this time, a poor </span><a class="topic-link" data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/sugar-crops" title="Learn more about sugar crop from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3184" instrument_node="">sugar crop</span></a><span data-dcnode-id="3182" instrument_node=""> contributed to tight sugar supplies and high prices. The less than stable supply of sugar and high prices encouraged the bottlers to look for an alternative sweetener. Demand for HFCS products quickly grew as both producers of HFCS and the bottlers learned how to create and use HFCS products that tasted the same as invert sugar (</span></span><a class="workspace-trigger" data-dcnode-id="3179" href="#bb0050" name="bbb0050"><span data-dcnode-id="3180" instrument_node="">Casey, 1977</span></a><span data-dcnode-id="3178" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3176" href="#bb0040" name="bbb0040"><span data-dcnode-id="3177" instrument_node="">Buck, 2012</span></a><span data-dcnode-id="3175" instrument_node="">).</span></p><p data-dcnode-id="3161" id="p0440"><span data-dcnode-id="3165"><span data-dcnode-id="3173" instrument_node="">But before the bottlers would convert to a new sweetener, the new sweetener would need to address taste. Sucrose in an acidic environment, typical of carbonated soft drinks, </span><a class="topic-link" data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/fruit-drinks" title="Learn more about fruit drinks from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3172" instrument_node="">fruit drinks</span></a><span data-dcnode-id="3166"><span data-dcnode-id="3170" instrument_node="">, and other similar beverages, is not stable. In this environment, the sucrose molecule, a </span><a class="topic-link" data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/disaccharides" title="Learn more about disaccharide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3169" instrument_node="">disaccharide</span></a><span data-dcnode-id="3167" instrument_node=""> containing a molecule of dextrose and fructose linked together, will hydrolyze/invert, creating two monosaccharides: dextrose and fructose. The inversion process is a function of time, pH, and temperature. During sucrose inversion, the beverage's sweetness changes, peaking at about 50% inversion (</span></span></span><a class="workspace-trigger" data-dcnode-id="3163" href="#bb0035" name="bbb0035"><span data-dcnode-id="3164" instrument_node="">Brooks et al., 1974</span></a><span data-dcnode-id="3162" instrument_node="">). This is referred to as medium invert sugar and contains a mixture of 50% sucrose, 25% fructose, and 25% dextrose. Eventually, the disaccharide sucrose is split, or inverted, into the monosaccharides of dextrose and fructose in a ratio of 50:50. This product is called invert sugar. Because a water molecule is added to the cleaved molecule of sucrose, the inversion process results in a 5% gain in solids.</span></p><p data-dcnode-id="3156" id="p0445"><span data-dcnode-id="3160" instrument_node="">The average relative sweetness increases to a value of 1.05 compared to sucrose at 1.0 due to the change in sweetness contributed by fructose and dextrose. Although sucrose could be replaced in many beverage applications by using a higher substitution level of 42% HFCS, there would be some cases where the sweetness difference between 42% fructose and inverted sucrose would be just too great, making it necessary to use a syrup with a higher level of sweetness. The optimum fructose level for these applications became 55%, which gave a theoretical sweetness level of about 1.05% that of sucrose (</span><a class="workspace-trigger" data-dcnode-id="3158" href="#bb0095" name="bbb0095"><span data-dcnode-id="3159" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="3157" instrument_node="">).</span></p><p data-dcnode-id="3147" id="p0450"><span data-dcnode-id="3151"><span data-dcnode-id="3155" instrument_node="">The high monosaccharide levels in fructose sweeteners also make the viscosity and </span><a class="topic-link" data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/mouthfeel" title="Learn more about mouthfeel from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3154" instrument_node="">mouthfeel</span></a><span data-dcnode-id="3152" instrument_node=""> of these syrups very similar to those of sucrose, which is particularly important since the key to beverage applications is a clean, nonmasking sweetness on the part of the sweetener. The temporal character of the sweetness imparted by high-fructose syrups is slightly different than that for sucrose, which may lead to slight variations in the flavor characteristics of a product. For example, the sweetness intensity of fructose drops off more rapidly than does that of a comparable sucrose solution. When substituting HFCS for sucrose, this difference creates a loss in the masking characteristic of the other flavors that may be present in the system. By comparison, these flavors may appear to be more intense in a HFCS-flavored product than in the initial sucrose counterpart. In an acid system, this difference lessens as the sucrose inverts (</span></span><a class="workspace-trigger" data-dcnode-id="3149" href="#bb0095" name="bbb0095"><span data-dcnode-id="3150" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="3148" instrument_node="">).</span></p><div data-dcnode-id="3106"><p data-dcnode-id="3127" id="p0455"><span data-dcnode-id="3146" instrument_node="">Demand for HFCS peaked about in 1999 (</span><a class="workspace-trigger" data-dcnode-id="3144" href="#t0120" name="bt0120"><span data-dcnode-id="3145" instrument_node="">Table 20.23</span></a><span data-dcnode-id="3143" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="3141" href="#bb0075" name="bbb0075"><span data-dcnode-id="3142" instrument_node="">ERS/USDA, 2017</span></a><span data-dcnode-id="3128"><span data-dcnode-id="3140" instrument_node="">). Since then, demand has slowly declined, as consumer consumption patterns changed because of concerns with HFCS and health issues. Also, the beverage market has been shifting to waters and other beverages using sweeteners derived from </span><a class="topic-link" data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/fruit-juices" title="Learn more about fruit juices from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3139" instrument_node="">fruit juices</span></a><span data-dcnode-id="3129"><span data-dcnode-id="3133"><span data-dcnode-id="3137" instrument_node="">, cane, or beet sugar, high potency sweeteners, for example, </span><a class="topic-link" data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/sucralose" title="Learn more about sucralose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3136" instrument_node="">sucralose</span></a><span data-dcnode-id="3134" instrument_node="">, Ace-K, or </span></span><a class="topic-link" data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/stevia" title="Learn more about stevia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3132" instrument_node="">stevia</span></a><span data-dcnode-id="3130" instrument_node="">, or simply less sweeteners.</span></span></span></p><div class="tables frame-none rowsep-0 colsep-0" data-dcnode-id="3107" id="t0120"><span class="captions" data-dcnode-id="3117"><span data-dcnode-id="3118" id="ca0200"><p data-dcnode-id="3119" id="sp0200"><span class="label" data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">Table 20.23</span></span><span data-dcnode-id="3124" instrument_node="">. </span><span data-dcnode-id="3123" instrument_node="">Total Production of 42% and 55% </span><a class="topic-link" data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3122" instrument_node="">HFCS</span></a><span data-dcnode-id="3120" instrument_node=""> (1000 Short Tons) 1966–2015</span></p></span></span><div class="groups" data-dcnode-id="3114"><img alt="" data-dcnode-id="3116" height="288" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-t20-02-9780128119716.jpg&amp;raw"><span data-dcnode-id="3115" instrument_node=""></span></div><p class="source" data-dcnode-id="3108"><span data-dcnode-id="3109"><span data-dcnode-id="3113" instrument_node="">Source: Calculated by ERS/USDA based on data from various sources (see </span><a data-dcnode-id="3111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ers.usda.gov/data-products/food-availability-per-capita-data-system/food-availability-documentation/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3112" instrument_node="">https://www.ers.usda.gov/data-products/food-availability-per-capita-data-system/food-availability-documentation/</span></a><span data-dcnode-id="3110" instrument_node="">). Data last updated Feb. 1, 2017. Graph data sourced from USDA/ERS Food Availability (Per Capita) Data system, Sugar and Sweetener, updated Feb. 21, 2017.</span></span></p></div></div></section><section data-dcnode-id="3074" id="s0260"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3103" id="st0275"><span data-dcnode-id="3104" instrument_node="">Brewing</span></h3><p data-dcnode-id="3090" id="p0460"><span data-dcnode-id="3098"><span data-dcnode-id="3102" instrument_node="">Brewers have been using both dry and liquid adjuncts, or syrups, since the late 1800s. </span><a class="topic-link" data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about Corn syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3101" instrument_node="">Corn syrups</span></a><span data-dcnode-id="3099" instrument_node=""> provide the brewer with a clean source of ready-to-use carbohydrates that help create a crisp tasting and refreshing beer (</span></span><a class="workspace-trigger" data-dcnode-id="3096" href="#bb0195" name="bbb0195"><span data-dcnode-id="3097" instrument_node="">Thausing and Brannt, 1882</span></a><span data-dcnode-id="3091"><span data-dcnode-id="3095" instrument_node="">). Syrups can be used at levels up to 55% of the extract, but it is more typical to target 30%–40%. If more than 50% of the malt is replaced with a syrup, or any adjunct, the brewer risks fermentation problems due to insufficient </span><a class="topic-link" data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/free-amino-nitrogen" title="Learn more about free amino nitrogen from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3094" instrument_node="">free amino nitrogen</span></a><span data-dcnode-id="3092" instrument_node=""> levels for proper yeast nutrition. The exception to this limit is in the production of flavored malt beverages (FMBs) where the objective is to create a clean, colorless, neutral flavored alcohol base. In these products, up to 95% of the fermentable carbohydrates may be sourced from a liquid adjunct. The most common liquid adjuncts used for FMB production contain either 95% or 99% dextrose. HFS syrups can be used to replace dextrose syrups to minimize crystallization issues in storage and handling.</span></span></p><p data-dcnode-id="3081" id="p0465"><span data-dcnode-id="3085"><span data-dcnode-id="3089" instrument_node="">The primary carbohydrates of interest to the brewer are dextrose, </span><a class="topic-link" data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltose" title="Learn more about maltose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3088" instrument_node="">maltose</span></a><span data-dcnode-id="3086" instrument_node="">, fructose, sucrose, and </span></span><a class="topic-link" data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltotriose" title="Learn more about maltotriose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3084" instrument_node="">maltotriose</span></a><span data-dcnode-id="3082" instrument_node="">. All these sugars are assumed to be 100% fermentable and are important for production of alcohol. However, the fermentation of maltotriose will be yeast strain-specific, and ale yeast have a more difficulty than lager strains. Carbohydrates not fermented contribute to the body, mouthfeel, and texture of the beer.</span></p><p data-dcnode-id="3077" id="p0470"><span data-dcnode-id="3080" instrument_node="">For production of North American Lager style full-bodied beers, syrups having a total fermentable level near 75% are preferred. Traditionally, the brewing syrup of choice has been a high-maltose syrup characterized by a carbohydrate profile similar to malt after mashing. However, beginning in the early 1970s, syrups containing relatively high amounts of dextrose, when compared to the high-maltose syrups, became the brewing syrups of choice in the United States. When brewing reduced calorie products, syrups having a fermentable solids content &gt;</span><span data-dcnode-id="3079" instrument_node="">&nbsp;</span><span data-dcnode-id="3078" instrument_node="">98% are preferred. This includes the very high, 95% and 99%, dextrose syrups. HFCS can also be used for these types of products, but has not seen too much interest by the brewing community. The recent creation of FMBs has seen demand increase for a very high and pure dextrose stream as the brewer focuses on the creation of a clean, colorless, high alcohol base for making finished products.</span></p><p data-dcnode-id="3075" id="p0475"><span data-dcnode-id="3076" instrument_node="">Working with syrup refiners, today's brewers can target carbohydrate profiles to produce clean tasting, refreshing, shelf-stable products. Other advantages to use liquid adjuncts include increasing brewing capacity, improving raw material efficiency, reducing energy consumption, and improving sustainability of water and energy resources.</span></p></section><section data-dcnode-id="3062" id="s0265"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3072" id="st0280"><span data-dcnode-id="3073" instrument_node="">Confections</span></h3><p data-dcnode-id="3070" id="p0480"><span data-dcnode-id="3071" instrument_node="">Corn sweeteners have many useful functions in confections. They act as a doctoring agent to help control sucrose crystallization. They also provide body, modify sweetness, and help control the hygroscopicity of the final product. For hard candies, cooked to less than 2% final moisture, syrups having a DE range of 41–45 are preferred, but syrups with DE values in the 36–41 range are also used. Syrups in these DE ranges improve product shelf life by controlling “weeping” or stickiness in the finished product caused by high levels of fructose and dextrose created by the inversion of sucrose during cooking. Hard candies may be pulled, aerated, grained, or plain. Where clarity of the final product is desired, the use of demineralized syrups and high-maltose syrups may be a consideration. For deposited confections, the sugar syrup's viscosity is important to reduce/minimize tailing during processing. For these types of products, high-maltose syrups, regular or demineralized, may be used.</span></p><p data-dcnode-id="3068" id="p0485"><span data-dcnode-id="3069" instrument_node="">The ability of corn sweeteners to control graining and add a creamy texture when mixed with sucrose is important to the manufacture of caramels and fudges, as well as fondants. The reducing sugar content in the corn sweetener is critical for the development of color and flavor in caramel. In gums and jelly candies, the ability to control the rate and degree of gel formation and texture is important and is impacted by the DE of the syrup. In addition, anhydrous dextrose may be used to develop the hard coating on some gums. Anhydrous dextrose can also be used in chocolate confections to replace some sucrose. In small quantities, it stabilizes chocolate chips to reduce smearing on belts or trays while baking.</span></p><p data-dcnode-id="3063" id="p0490"><span data-dcnode-id="3067" instrument_node="">Some aerated confections, such as marshmallows, require stabilization of the foam structure to achieve the desired final qualities. In this case, the ash content, DE, and the composition of the carbohydrate profile are important. Hygroscopicity must also be balanced. The finished product should retain enough moisture to remain tender and prevent drying out and not demonstrate any tendency to weep or become sticky due to foam structure collapse (</span><a class="workspace-trigger" data-dcnode-id="3065" href="#bb0095" name="bbb0095"><span data-dcnode-id="3066" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="3064" instrument_node="">).</span></p></section><section data-dcnode-id="3049" id="s0270"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3060" id="st0285"><span data-dcnode-id="3061" instrument_node="">Ice Cream</span></h3><p data-dcnode-id="3055" id="p0495"><span data-dcnode-id="3059" instrument_node="">Sweeteners are an important part of ice cream. The type and amount of sweetener used help control perceived sweetness and texture as well as the shelf life stability of frozen confections. Typical levels of sweeteners range from 8% to 14% in ice cream and frozen confections. The type and amount of sweetener used varies depending on the product. In general, some combination of sucrose, low-DE corn syrups, and high-fructose syrup constitutes the sweetener portion of the mix (</span><a class="workspace-trigger" data-dcnode-id="3057" href="#bb0095" name="bbb0095"><span data-dcnode-id="3058" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="3056" instrument_node="">).</span></p><p data-dcnode-id="3050" id="p0500"><span data-dcnode-id="3054" instrument_node="">Sweeteners depress the freezing point of a frozen confection as well as control the size of the ice crystals formed as the mix freezes, which gives the characteristic creaminess associated with these products. Compared to sugar, low-DE corn syrups depress the freezing point less because of their high molecular weight. This effect is desirable because it improves shelf life stability and reduces the formation of large ice crystals during freeze/thaw cycles. Unfortunately, a mix having too much low DE sweeteners may experience a loss of sweetness in addition to a gummy texture. To counterbalance this effect, low-DE syrups may be balanced with some level of high-fructose syrup to improve sweetness and flavor characteristics. The key to using these different syrups is to properly consider the freezing point factors all the carbohydrates contribute to the finished product, creating a balanced mix (</span><a class="workspace-trigger" data-dcnode-id="3052" href="#bb0095" name="bbb0095"><span data-dcnode-id="3053" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="3051" instrument_node="">).</span></p></section></section><section data-dcnode-id="2821" id="s0275"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3046" id="st0290"><span data-dcnode-id="3047" instrument_node="">Carbohydrates and Health</span></h2><p data-dcnode-id="3033" id="p0505"><span data-dcnode-id="3037"><span data-dcnode-id="3045" instrument_node="">It is beyond the scope of this chapter to address in detail the current issues surrounding the public's reaction to concerns about sugar, </span><a class="topic-link" data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3044" instrument_node="">HFCS</span></a><span data-dcnode-id="3038"><span data-dcnode-id="3042" instrument_node="">, and carbohydrates. However, it cannot be ignored either. The debate about sweeteners and health was pushed significantly forward in 2004 when George A. Bray and colleagues published a commentary article in the American Journal of </span><a class="topic-link" data-dcnode-id="3040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/clinical-nutrition" title="Learn more about Clinical Nutrition from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3041" instrument_node="">Clinical Nutrition</span></a><span data-dcnode-id="3039" instrument_node=""> speculating that the current obesity epidemic in the United States may have been caused by HFCS in beverages (</span></span></span><a class="workspace-trigger" data-dcnode-id="3035" href="#bb0030" name="bbb0030"><span data-dcnode-id="3036" instrument_node="">Bray et al., 2004</span></a><span data-dcnode-id="3034" instrument_node="">). The article struck a nerve in the public, medical, food, and scientific community. Their remarks and conclusions spurred a passionate discussion about food and ingredients and their potential impact on health. Advertising and product labels containing messages of “Contains No HFCS” soon appeared. Unfortunately, when HFCS or sugar is removed, the sweetener solids need to be replaced by another sweetener or bulking agent to maintain functionality and the consumer's desire for a good tasting product. The challenge to the food industry is to replace “sugar” with an alternative ingredient(s) that is label-friendly and has the same functionality, taste, and cost as “sugar” but is not “sugar.”</span></p><div data-dcnode-id="2839"><p data-dcnode-id="3025" id="p0510"><span data-dcnode-id="3032" instrument_node="">What's in a name? The naming of HFCS occurred in the late 1960s or early 1970s when the product was being introduced to the food industry. The term “high fructose” was adopted, or chosen, to help distinguish these new products from traditional corn sweeteners, which contained no fructose. The intent was to differentiate (</span><a class="workspace-trigger" data-dcnode-id="3030" href="#bb0040" name="bbb0040"><span data-dcnode-id="3031" instrument_node="">Buck, 2012</span></a><span data-dcnode-id="3029" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="3027" href="#t0125" name="bt0125"><span data-dcnode-id="3028" instrument_node="">Table 20.24</span></a><span data-dcnode-id="3026" instrument_node=""> compares the carbohydrate composition of HFCS to other sources of sugars, clearly showing that the fructose content of HFCS is not “high” when compared to other familiar sweetener sources.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="2840" id="t0125"><span class="captions" data-dcnode-id="3018"><span data-dcnode-id="3019" id="ca0205"><p data-dcnode-id="3020" id="sp0205"><span class="label" data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Table 20.24</span></span><span data-dcnode-id="3022" instrument_node="">. </span><span data-dcnode-id="3021" instrument_node="">Typical Carbohydrate Composition of Sugar Sources</span></p></span></span><div class="groups" data-dcnode-id="2867"><table data-dcnode-id="2868"><thead data-dcnode-id="3002"><tr class="valign-top" data-dcnode-id="3014"><th class="rowsep-1" data-dcnode-id="3017" scope="col"></th><th class="rowsep-1" colspan="4" data-dcnode-id="3015" scope="col"><span data-dcnode-id="3016" instrument_node="">% Sugar/Carbohydrate Dry Basis</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="3003"><th data-dcnode-id="3012" scope="col"><span data-dcnode-id="3013" instrument_node="">Sweetener Source</span></th><th data-dcnode-id="3010" scope="col"><span data-dcnode-id="3011" instrument_node="">Dextrose</span></th><th data-dcnode-id="3008" scope="col"><span data-dcnode-id="3009" instrument_node="">Fructose</span></th><th data-dcnode-id="3006" scope="col"><span data-dcnode-id="3007" instrument_node="">Sucrose</span></th><th data-dcnode-id="3004" scope="col"><span data-dcnode-id="3005" instrument_node="">Sorbitol</span></th></tr></thead><tbody data-dcnode-id="2869"><tr data-dcnode-id="2994"><th data-dcnode-id="3000" scope="row"><span data-dcnode-id="3001" instrument_node="">Sucrose</span></th><td data-dcnode-id="2999"></td><td data-dcnode-id="2998"></td><td data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">100</span></td><td data-dcnode-id="2995"></td></tr><tr data-dcnode-id="2979"><th data-dcnode-id="2987" scope="row"><span data-dcnode-id="2993" instrument_node="">Honey</span><a class="workspace-trigger" data-dcnode-id="2989" href="#tf0125" name="btf0125"><sup "><span data-dcnode-id="2946" instrument_node="">42</span></td><td data-dcnode-id="2944"></td><td data-dcnode-id="2943"></td></tr><tr data-dcnode-id="2933"><th data-dcnode-id="2940" scope="row"><span data-dcnode-id="2941" instrument_node="">Agave nectar</span></th><td data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">24</span></td><td data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">74</span></td><td data-dcnode-id="2935"></td><td data-dcnode-id="2934"></td></tr><tr data-dcnode-id="2919"><th data-dcnode-id="2927" scope="row"><span data-dcnode-id="2932" instrument_node="">Orange juice</span><a class="workspace-trigger" data-dcnode-id="2928" href="#tf0130" name="btf0130"><sup data-dcnode-id="2929"><em data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">b</span></em></sup></a></th><td data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">26</span></td><td data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">30</span></td><td data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">44</span></td><td data-dcnode-id="2920"></td></tr><tr data-dcnode-id="2906"><th data-dcnode-id="2913" scope="row"><span data-dcnode-id="2918" instrument_node="">55% HFCS</span><a class="workspace-trigger" data-dcnode-id="2914" href="#tf0135" name="btf0135"><sup data-dcnode-id="2915"><em data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">c</span></em></sup></a></th><td data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">42</span></td><td data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">55</span></td><td data-dcnode-id="2908"></td><td data-dcnode-id="2907"></td></tr><tr data-dcnode-id="2893"><th data-dcnode-id="2900" scope="row"><span data-dcnode-id="2905" instrument_node="">Grape juice</span><a class="workspace-trigger" data-dcnode-id="2901" href="#tf0130" name="btf0130"><sup data-dcnode-id="2902"><em data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">b</span></em></sup></a></th><td data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">46</span></td><td data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">54</span></td><td data-dcnode-id="2895"></td><td data-dcnode-id="2894"></td></tr><tr data-dcnode-id="2878"><th data-dcnode-id="2887" scope="row"><span data-dcnode-id="2892" instrument_node="">Pear juice</span><a class="workspace-trigger" data-dcnode-id="2888" href="#tf0125" name="btf0125"><sup data-dcnode-id="2889"><em data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">a</span></em></sup></a></th><td data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">23</span></td><td data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">51</span></td><td data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">3</span></td><td data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">22</span></td></tr><tr data-dcnode-id="2870"><th data-dcnode-id="2876" scope="row"><span data-dcnode-id="2877" instrument_node="">Fructose</span></th><td data-dcnode-id="2875"></td><td data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">99.5</span></td><td data-dcnode-id="2872"></td><td data-dcnode-id="2871"></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="2841"><dt data-dcnode-id="2865" id="tf0125"><span data-dcnode-id="2866" instrument_node="">a</span></dt><dd data-dcnode-id="2859"><p data-dcnode-id="2860" id="np0125"><span data-dcnode-id="2864" instrument_node="">From </span><a class="workspace-trigger" data-dcnode-id="2862" href="#bb0235" name="bbb0235"><span data-dcnode-id="2863" instrument_node="">White et al. (1962)</span></a><span data-dcnode-id="2861" instrument_node="">.</span></p></dd><dt data-dcnode-id="2857" id="tf0130"><span data-dcnode-id="2858" instrument_node="">b</span></dt><dd data-dcnode-id="2851"><p data-dcnode-id="2852" id="np0130"><span data-dcnode-id="2856" instrument_node="">From </span><a class="workspace-trigger" data-dcnode-id="2854" href="#bb0145" name="bbb0145"><span data-dcnode-id="2855" instrument_node="">Nagy and Wade (1995)</span></a><span data-dcnode-id="2853" instrument_node="">.</span></p></dd><dt data-dcnode-id="2849" id="tf0135"><span data-dcnode-id="2850" instrument_node="">c</span></dt><dd data-dcnode-id="2842"><p data-dcnode-id="2843" id="np0135"><span data-dcnode-id="2845"><em data-dcnode-id="2846"><a class="topic-link" data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2848" instrument_node="">HFCS</span></a></em></span><span data-dcnode-id="2844" instrument_node="">, high-fructose corn syrup.</span></p></dd></dl></div></div><p data-dcnode-id="2822" id="p0515"><span data-dcnode-id="2838" instrument_node="">Since then, many different scientific groups have investigated and researched the topic concluding that consuming HFCS results in no different health outcomes than consuming sugars from other sources (</span><a class="workspace-trigger" data-dcnode-id="2836" href="#bb0115" name="bbb0115"><span data-dcnode-id="2837" instrument_node="">Jacobson, 2004</span></a><span data-dcnode-id="2835" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="2833" href="#bb0080" name="bbb0080"><span data-dcnode-id="2834" instrument_node="">Forshee et al., 2007</span></a><span data-dcnode-id="2832" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="2830" href="#bb0165" name="bbb0165"><span data-dcnode-id="2831" instrument_node="">Rippe, 2010</span></a><span data-dcnode-id="2829" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="2827" href="#bb0170" name="bbb0170"><span data-dcnode-id="2828" instrument_node="">Rippe and Anagelopoulos, 2013</span></a><span data-dcnode-id="2826" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="2824" href="#bb0055" name="bbb0055"><span data-dcnode-id="2825" instrument_node="">Clemens et al., 2016</span></a><span data-dcnode-id="2823" instrument_node="">). Despite this conclusion, the food industry continues to reduce the amount of simple sugars, whether from HFCS or other sources, in their products. Good nutritional guidance recommends consuming sugars in moderation regardless of the source.</span></p></section><section data-dcnode-id="2805" id="s0280"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2819" id="st0295"><span data-dcnode-id="2820" instrument_node="">Conclusions</span></h2><p data-dcnode-id="2806" id="p0520"><span data-dcnode-id="2814"><span data-dcnode-id="2818" instrument_node="">The process of producing corn sweeteners and </span><a class="topic-link" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2817" instrument_node="">maltodextrins</span></a><span data-dcnode-id="2815" instrument_node=""> via acid, acid-enzyme, or enzyme-enzyme techniques has not changed significantly. Incremental advancements in enzymes, demineralization unit operations, and other refining technologies have enabled sweetener and maltodextrin producers to create great tasting and functional products for applications across a wide variety of food and industrial needs. Food developers, consumers, </span></span><a class="topic-link" data-dcnode-id="2812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/nutritionists" title="Learn more about nutritionists from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2813" instrument_node="">nutritionists</span></a><span data-dcnode-id="2807"><span data-dcnode-id="2811" instrument_node="">, and the medical community will continue to benefit from the extensive research, development, investigation, and understanding of carbohydrates. Confusion about sweeteners, especially </span><a class="topic-link" data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2810" instrument_node="">HFCS</span></a><span data-dcnode-id="2808" instrument_node="">, is still pervasive. From the position of science, HFCS, sucrose, from cane or beet, and sugars from other sources are viewed as nutritionally equivalent and should be consumed in moderation. From a marketing perspective, one type of sweetener is bad, and another is good. The result: confused consumers are slowly changing eating and drinking habits. Despite this carbohydrate confusion, the corn sweetener and maltodextrin product family remain a very functional source of carbohydrates for creators of great tasting, safe, and enjoyable consumer products.</span></span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="2799"><button class="button button-anchor" data-dcnode-id="2800" type="button"><span class="button-text" data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="271"><section class="bibliography u-font-serif text-s" data-dcnode-id="540" id="bi0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="541" id="bs0010"><dl class="references" data-dcnode
