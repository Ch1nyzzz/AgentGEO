="10496" instrument_node="">&nbsp;</span><span data-dcnode-id="10495" instrument_node="">mg/kg maximum</span></td><td data-dcnode-id="10490"><span data-dcnode-id="10493" instrument_node="">3</span><span data-dcnode-id="10492" instrument_node="">&nbsp;</span><span data-dcnode-id="10491" instrument_node="">mg/kg maximum</span></td></tr><tr data-dcnode-id="10478"><th data-dcnode-id="10487" scope="row"><span data-dcnode-id="10488" instrument_node="">Acetaldehyde</span></th><td data-dcnode-id="10483"><span data-dcnode-id="10486" instrument_node="">80</span><span data-dcnode-id="10485" instrument_node="">&nbsp;</span><span data-dcnode-id="10484" instrument_node="">μg/kg maximum (11%)</span></td><td data-dcnode-id="10479"><span data-dcnode-id="10482" instrument_node="">80</span><span data-dcnode-id="10481" instrument_node="">&nbsp;</span><span data-dcnode-id="10480" instrument_node="">μg/kg maximum (11%)</span></td></tr><tr data-dcnode-id="10467"><th data-dcnode-id="10476" scope="row"><span data-dcnode-id="10477" instrument_node="">Isovaleraldehyde</span></th><td data-dcnode-id="10472"><span data-dcnode-id="10475" instrument_node="">5</span><span data-dcnode-id="10474" instrument_node="">&nbsp;</span><span data-dcnode-id="10473" instrument_node="">μg/kg maximum at 11% solids</span></td><td data-dcnode-id="10468"><span data-dcnode-id="10471" instrument_node="">5</span><span data-dcnode-id="10470" instrument_node="">&nbsp;</span><span data-dcnode-id="10469" instrument_node="">μg/kg maximum at 11% solids</span></td></tr><tr data-dcnode-id="10452"><th data-dcnode-id="10461" scope="row"><span data-dcnode-id="10466" instrument_node="">2-Aminoacetophenone (2AP)</span><a class="workspace-trigger" data-dcnode-id="10462" href="#tf0035" name="btf0035"><sup data-dcnode-id="10463"><em data-dcnode-id="10464"><span data-dcnode-id="10465" instrument_node="">a</span></em></sup></a></th><td data-dcnode-id="10457"><span data-dcnode-id="10460" instrument_node="">5</span><span data-dcnode-id="10459" instrument_node="">&nbsp;</span><span data-dcnode-id="10458" instrument_node="">μg/kg maximum at 11% solids</span></td><td data-dcnode-id="10453"><span data-dcnode-id="10456" instrument_node="">5</span><span data-dcnode-id="10455" instrument_node="">&nbsp;</span><span data-dcnode-id="10454" instrument_node="">μg/kg maximum at 11% solids</span></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="10443"><dt data-dcnode-id="10447" id="tf0035"><span data-dcnode-id="10448" instrument_node="">a</span></dt><dd data-dcnode-id="10444"><p data-dcnode-id="10445" id="np0035"><span data-dcnode-id="10446" instrument_node="">More study because of detection limit, repeatability.</span></p></dd></dl><p class="source" data-dcnode-id="10437"><span data-dcnode-id="10438"><span data-dcnode-id="10442" instrument_node="">Data from International Society of Beverage Technologists, Dallas Texas (</span><a class="workspace-trigger" data-dcnode-id="10440" href="#bb0110" name="bbb0110"><span data-dcnode-id="10441" instrument_node="">ISBT, 2014b</span></a><span data-dcnode-id="10439" instrument_node="">).</span></span></p></div></div></section><section data-dcnode-id="10416" id="s0125"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10432" id="st0140"><span data-dcnode-id="10433" instrument_node="">Liquid and Crystalline Fructose</span></h2><p data-dcnode-id="10417" id="p0240"><span data-dcnode-id="10427"><span data-dcnode-id="10431" instrument_node="">The enriched fructose stream may be isolated for further refining to produce a 90% fructose syrup or crystalline fructose. In this case, there is no blending with 42% </span><a class="topic-link" data-dcnode-id="10429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10430" instrument_node="">HFCS</span></a><span data-dcnode-id="10428" instrument_node="">. The fructose is polished through carbon and demineralizers, then sent directly to a crystallizer. The fructose liquor is seeded with crystals of dry fructose and cooled until the batch crystallizes. These crystals are washed, separated from the mother liquor, and then dried to a concentration of 99.5% fructose. The refining could include crystallization by adding ethanol or methanol since fructose is only moderately soluble in alcohol. Crystals of fructose exist as either anhydrous β-</span></span><span class="small-caps" data-dcnode-id="10425"><span data-dcnode-id="10426" instrument_node="">d</span></span><span data-dcnode-id="10424" instrument_node="">-fructopyranose or as the dihydrate or hemihydrate of β-</span><span class="small-caps" data-dcnode-id="10422"><span data-dcnode-id="10423" instrument_node="">d</span></span><span data-dcnode-id="10421" instrument_node="">-fructopyranose. Dihydrate fructose crystals can dissolve in their own water of hydration. Because of its extreme hygroscopicity, crystalline fructose should be stored at less than 50% RH (relative humidity) (</span><a class="workspace-trigger" data-dcnode-id="10419" href="#bb0095" name="bbb0095"><span data-dcnode-id="10420" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="10418" instrument_node="">).</span></p></section><section data-dcnode-id="10323" id="s0130"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10414" id="st0145"><span data-dcnode-id="10415" instrument_node="">Storage and Handling of Corn Sweeteners</span></h2><div data-dcnode-id="10344"><p data-dcnode-id="10391" id="p0245"><span data-dcnode-id="10413" instrument_node="">For practical purposes, storage systems for all sweeteners are similar with accommodations made for the type of syrup being handled. The storage tank should be sized to hold enough product to accommodate 1.5 truck or railcar deliveries or about 22,710</span><span data-dcnode-id="10412" instrument_node="">&nbsp;</span><span data-dcnode-id="10411" instrument_node="">L (6000 gallons) and 90,849</span><span data-dcnode-id="10410" instrument_node="">&nbsp;</span><span data-dcnode-id="10409" instrument_node="">L (24,000 gallons), respectively. The tanks can be horizontal or vertical and should be constructed of food grade materials compatible with the syrup. This can include 304, 304 L, 316, or 316</span><span data-dcnode-id="10408" instrument_node="">&nbsp;</span><span data-dcnode-id="10395"><span data-dcnode-id="10399"><span data-dcnode-id="10403"><span data-dcnode-id="10407" instrument_node="">L stainless steel or carbon steel tanks lined with an appropriate food grade coating. Aluminum, </span><a class="topic-link" data-dcnode-id="10405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/fiberglass" title="Learn more about fiberglass from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10406" instrument_node="">fiberglass</span></a><span data-dcnode-id="10404" instrument_node="">, and plastic tanks are not recommended. The tanks will need a method of heating to keep the syrup warm. Some examples of heating systems include: internal coils, heating jackets, external </span></span><a class="topic-link" data-dcnode-id="10401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/heat-exchangers" title="Learn more about heat exchangers from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10402" instrument_node="">heat exchangers</span></a><span data-dcnode-id="10400" instrument_node="">, electric heating jackets, or tanks placed in hot rooms. If not located in a hot room, the tank will need to be insulated. To minimize </span></span><a class="topic-link" data-dcnode-id="10397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/microbial-contamination" title="Learn more about microbial contamination from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10398" instrument_node="">microbial contamination</span></a><span data-dcnode-id="10396" instrument_node=""> in the head space, the tank should be equipped with a vent and a forced air blower with a HEPA filter. UV lights on the air system are an option. To accommodate the need for periodic inspections and cleaning, manways should be in place near the bottom and the top. A level gauge or scale to monitor inventory needs to be in place. Syrup can be pumped either into the bottom or top of the tank, but the top is preferred. Proper storage temperatures for various sweeteners are listed in </span></span><a class="workspace-trigger" data-dcnode-id="10393" href="#t0040" name="bt0040"><span data-dcnode-id="10394" instrument_node="">Table 20.7</span></a><span data-dcnode-id="10392" instrument_node="">.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="10345" id="t0040"><span class="captions" data-dcnode-id="10384"><span data-dcnode-id="10385" id="ca0120"><p data-dcnode-id="10386" id="sp0120"><span class="label" data-dcnode-id="10389"><span data-dcnode-id="10390" instrument_node="">Table 20.7</span></span><span data-dcnode-id="10388" instrument_node="">. </span><span data-dcnode-id="10387" instrument_node="">Suggested Corn Sweetener Storage Temperatures</span></p></span></span><div class="groups" data-dcnode-id="10346"><table data-dcnode-id="10347"><thead data-dcnode-id="10377"><tr class="rowsep-1 valign-top" data-dcnode-id="10378"><th data-dcnode-id="10383" scope="col"></th><th data-dcnode-id="10381" scope="col"><span data-dcnode-id="10382" instrument_node="">Temperature (°C)</span></th><th data-dcnode-id="10379" scope="col"><span data-dcnode-id="10380" instrument_node="">Temperature (°F)</span></th></tr></thead><tbody data-dcnode-id="10348"><tr data-dcnode-id="10370"><th data-dcnode-id="10375" scope="row"><span data-dcnode-id="10376" instrument_node="">Regular corn syrups</span></th><td data-dcnode-id="10373"><span data-dcnode-id="10374" instrument_node="">43.3–54.4</span></td><td data-dcnode-id="10371"><span data-dcnode-id="10372" instrument_node="">110–130</span></td></tr><tr data-dcnode-id="10363"><th data-dcnode-id="10368" scope="row"><span data-dcnode-id="10369" instrument_node="">42% HFCS</span></th><td data-dcnode-id="10366"><span data-dcnode-id="10367" instrument_node="">32.2–37.8</span></td><td data-dcnode-id="10364"><span data-dcnode-id="10365" instrument_node="">90–100</span></td></tr><tr data-dcnode-id="10356"><th data-dcnode-id="10361" scope="row"><span data-dcnode-id="10362" instrument_node="">55% HFCS</span></th><td data-dcnode-id="10359"><span data-dcnode-id="10360" instrument_node="">Room temp. to 32.2</span></td><td data-dcnode-id="10357"><span data-dcnode-id="10358" instrument_node="">Room temp. to 90</span></td></tr><tr data-dcnode-id="10349"><th data-dcnode-id="10354" scope="row"><span data-dcnode-id="10355" instrument_node="">Dextrose syrups</span></th><td data-dcnode-id="10352"><span data-dcnode-id="10353" instrument_node="">54.4–60</span></td><td data-dcnode-id="10350"><span data-dcnode-id="10351" instrument_node="">130–140</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="10328" id="p0250"><span data-dcnode-id="10331"><span data-dcnode-id="10339"><span data-dcnode-id="10343" instrument_node="">Moving the syrup from the tank to the process is accomplished by pumping. Positive displacement (PD) pumps are used to move </span><a class="topic-link" data-dcnode-id="10341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about corn syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10342" instrument_node="">corn syrups</span></a><span data-dcnode-id="10340" instrument_node="">. </span></span><a class="topic-link" data-dcnode-id="10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/centrifugal-pumps" title="Learn more about Centrifugal pumps from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10338" instrument_node="">Centrifugal pumps</span></a><span data-dcnode-id="10332"><span data-dcnode-id="10336" instrument_node=""> can be used for </span><a class="topic-link" data-dcnode-id="10334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10335" instrument_node="">HFCS</span></a><span data-dcnode-id="10333" instrument_node=""> and dextrose syrups, although PD pumps will work too. The lines from the storage tank to the process should be made from stainless steel and of sufficient diameter, typically 7.6–10.2</span></span></span><span data-dcnode-id="10330" instrument_node="">&nbsp;</span><span data-dcnode-id="10329" instrument_node="">cm (3–4-in.), to accommodate the type of syrup being moved. The lines need to be heat traced and insulated. For lines handling dextrose and 42% HFCS, low temp warning systems need to be in place to prevent the dextrose from crystallizing and plugging the lines. For dextrose syrups, the line temperature needs to be greater than 51.7°C (125°F) or the risk for crystallization begins. For 42% HFCS at 71% DS, the temperature needs to be greater than 29.4°C (85°F) to prevent crystallization.</span></p><p data-dcnode-id="10326" id="p0255"><span data-dcnode-id="10327" instrument_node="">Storage tanks should be inspected per the plant's food safety plans. Tank cleaning schedules and procedures are determined by the food safety plans and can also be a function of the inspection program. It is suggested that tanks be inspected at least once per year, preferably during a shutdown.</span></p><p data-dcnode-id="10324" id="p0260"><span data-dcnode-id="10325" instrument_node="">For more detailed storage guidance, the reader should contact their corn sweetener supplier or a business that specializes in sweetener storage and handling systems.</span></p></section><section data-dcnode-id="10223" id="s0135"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10321" id="st0150"><span data-dcnode-id="10322" instrument_node="">Regulatory Definitions</span></h2><p data-dcnode-id="10312" id="p0265"><span data-dcnode-id="10316"><span data-dcnode-id="10320" instrument_node="">Detailed regulatory definitions for glucose syrups, </span><a class="topic-link" data-dcnode-id="10318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10319" instrument_node="">maltodextrins</span></a><span data-dcnode-id="10317" instrument_node="">, dextrose monohydrate, dextrose anhydrous, dried glucose syrup, </span></span><a class="topic-link" data-dcnode-id="10314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10315" instrument_node="">HFCS</span></a><span data-dcnode-id="10313" instrument_node="">, and crystalline fructose are in the Code of Federal Regulations, CFR, in Title 21, Subpart 168—Sweeteners and Table Syrups.</span></p><section data-dcnode-id="10296" id="s0140"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10310" id="st0155"><span data-dcnode-id="10311" instrument_node="">Glucose Syrup</span></h3><p data-dcnode-id="10297" id="p0270"><span data-dcnode-id="10301"><span data-dcnode-id="10305"><span data-dcnode-id="10309" instrument_node="">Glucose syrup is the purified, concentrated </span><a class="topic-link" data-dcnode-id="10307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/aqueous-solutions" title="Learn more about aqueous solution from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10308" instrument_node="">aqueous solution</span></a><span data-dcnode-id="10306" instrument_node=""> of nutritive saccharides obtained from edible starch. The total solids content is not less than 70% mass/mass (m/m) and the </span></span><a class="topic-link" data-dcnode-id="10303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/reducing-sugars" title="Learn more about reducing sugar from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10304" instrument_node="">reducing sugar</span></a><span data-dcnode-id="10302" instrument_node=""> content (DE), expressed as </span></span><span class="small-caps" data-dcnode-id="10299"><span data-dcnode-id="10300" instrument_node="">d</span></span><span data-dcnode-id="10298" instrument_node="">-glucose, is not less than 20% m/m calculated on a dry basis (21CFR168.120).</span></p></section><section data-dcnode-id="10275" id="s0145"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10294" id="st0160"><span data-dcnode-id="10295" instrument_node="">Maltodextrin</span></h3><p data-dcnode-id="10276" id="p0275"><span data-dcnode-id="10293" instrument_node="">Maltodextrin ((C</span><sub data-dcnode-id="10291"><span data-dcnode-id="10292" instrument_node="">6</span></sub><span data-dcnode-id="10290" instrument_node="">H</span><sub data-dcnode-id="10288"><span data-dcnode-id="10289" instrument_node="">10</span></sub><span data-dcnode-id="10287" instrument_node="">O</span><sub data-dcnode-id="10285"><span data-dcnode-id="10286" instrument_node="">5</span></sub><span data-dcnode-id="10284" instrument_node="">)</span><sub data-dcnode-id="10281"><em data-dcnode-id="10282"><span data-dcnode-id="10283" instrument_node="">n</span></em></sub><span data-dcnode-id="10280" instrument_node="">, CAS Reg No. 9050-36-6) is a nonsweet nutritive saccharide polymer that consists of </span><span class="small-caps" data-dcnode-id="10278"><span data-dcnode-id="10279" instrument_node="">d</span></span><span data-dcnode-id="10277" instrument_node="">-glucose units primarily linked by α-1-4 bonds and that has a DE of less than 20 (21CFR184.1444).</span></p></section><section data-dcnode-id="10267" id="s0150"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10273" id="st0165"><span data-dcnode-id="10274" instrument_node="">High-Fructose Corn Syrup</span></h3><p data-dcnode-id="10268" id="p0280"><span data-dcnode-id="10272" instrument_node="">HFCS is a sweet nutritive saccharide mixture containing either approximately 42% or 55% fructose and is prepared as a clear aqueous solution from high dextrose-equivalent </span><a class="topic-link" data-dcnode-id="10270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-starch" title="Learn more about corn starch from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10271" instrument_node="">corn starch</span></a><span data-dcnode-id="10269" instrument_node=""> hydrolyzate by partial enzymatic conversion of glucose (dextrose) to fructose using an insoluble glucose-isomerase enzyme preparation described in §184.1372. The product containing more than 50% fructose (dry weight) is prepared through concentration of the fructose portion of the mixture containing less than 50% fructose (21CFR184.1866).</span></p></section><section data-dcnode-id="10259" id="s0155"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10265" id="st0170"><span data-dcnode-id="10266" instrument_node="">Crystalline Fructose</span></h3><p data-dcnode-id="10260" id="p0285"><span data-dcnode-id="10264" instrument_node="">Fructose occurs as white, hygroscopic, purified crystals or as a purified crystalline powder. It is a crystalline product containing not less than 98.0% fructose and not more than 0.5% glucose (</span><a class="workspace-trigger" data-dcnode-id="10262" href="#bb9000" name="bbb9000"><span data-dcnode-id="10263" instrument_node="">The United States Pharmacopeial Convention, 2016</span></a><span data-dcnode-id="10261" instrument_node="">).</span></p></section><section data-dcnode-id="10245" id="s0160"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10257" id="st0175"><span data-dcnode-id="10258" instrument_node="">Dextrose Monohydrate</span></h3><p data-dcnode-id="10246" id="p0290"><span data-dcnode-id="10256" instrument_node="">Dextrose monohydrate is purified and crystallized </span><span class="small-caps" data-dcnode-id="10254"><span data-dcnode-id="10255" instrument_node="">d</span></span><span data-dcnode-id="10253" instrument_node="">-glucose containing one molecule of water of crystallization with each molecule of </span><span class="small-caps" data-dcnode-id="10251"><span data-dcnode-id="10252" instrument_node="">d</span></span><span data-dcnode-id="10250" instrument_node="">-glucose. The total solids content is not less than 90% m/m and the reducing sugar content (DE), expressed as </span><span class="small-caps" data-dcnode-id="10248"><span data-dcnode-id="10249" instrument_node="">d</span></span><span data-dcnode-id="10247" instrument_node="">-glucose, is not less than 99.5% m/m calculated on a dry basis (21CFR168.111).</span></p></section><section data-dcnode-id="10237" id="s0165"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10243" id="st0180"><span data-dcnode-id="10244" instrument_node="">Dextrose Anhydrous</span></h3><p data-dcnode-id="10238" id="p0295"><span data-dcnode-id="10242" instrument_node="">Dextrose anhydrous is purified and crystallized </span><span class="small-caps" data-dcnode-id="10240"><span data-dcnode-id="10241" instrument_node="">d</span></span><span data-dcnode-id="10239" instrument_node="">-glucose without water of crystallization and conforms to the specifications of §168.111, except the total solids content is not less than 98% m/m (21CFR168.110).</span></p></section><section data-dcnode-id="10232" id="s0170"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10235" id="st0185"><span data-dcnode-id="10236" instrument_node="">Dried Glucose Syrup</span></h3><p data-dcnode-id="10233" id="p0300"><span data-dcnode-id="10234" instrument_node="">Dried glucose syrup is glucose syrup from which the water has been partially removed and conforms to the specifications of §168.120 (21CFR168.121).</span></p></section><section data-dcnode-id="10224" id="s0175"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10230" id="st0190"><span data-dcnode-id="10231" instrument_node="">Total Sugars</span></h3><p data-dcnode-id="10225" id="p0305"><span data-dcnode-id="10229" instrument_node="">Total sugars shall be defined as the sum of all free mono- and </span><a class="topic-link" data-dcnode-id="10227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/disaccharides" title="Learn more about disaccharides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10228" instrument_node="">disaccharides</span></a><span data-dcnode-id="10226" instrument_node=""> (such as glucose, fructose, lactose, and sucrose) (21 CFR101.9).</span></p></section></section><section data-dcnode-id="5932" id="s0180"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10221" id="st0195"><span data-dcnode-id="10222" instrument_node="">Important Properties and Measurements of Corn Sweeteners</span></h2><section data-dcnode-id="9885" id="s0185"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10219" id="st0200"><span data-dcnode-id="10220" instrument_node="">Carbohydrate Profile</span></h3><div data-dcnode-id="9886"><p data-dcnode-id="10193" id="p0310"><span data-dcnode-id="10214"><span data-dcnode-id="10218" instrument_node="">Many physical properties and performance characteristics of corn sweeteners are related either to carbohydrate profile or DE. Publications and technical papers about applications and uses of </span><a class="topic-link" data-dcnode-id="10216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about corn syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10217" instrument_node="">corn syrups</span></a><span data-dcnode-id="10215" instrument_node=""> use DE as the reference for performance. Work by </span></span><a class="workspace-trigger" data-dcnode-id="10212" href="#bb0100" name="bbb0100"><span data-dcnode-id="10213" instrument_node="">Hoover (1964)</span></a><span data-dcnode-id="10211" instrument_node=""> provides a framework with which to evaluate these characteristics, as how various sweeteners would affect them (</span><a class="workspace-trigger" data-dcnode-id="10209" href="#t0045" name="bt0045"><span data-dcnode-id="10210" instrument_node="">Table 20.8</span></a><span data-dcnode-id="10200"><span data-dcnode-id="10204"><span data-dcnode-id="10208" instrument_node="">). At the time this chart was developed, syrups were divided into classifications based on the degree of conversion as measured by the DE level. Although advances in enzyme technology and sweetener blending have reduced the importance of DE as a method of measurement, the degree of conversion (as measured by the profile and average molecular weight of the carbohydrates present) remains an important factor in selecting the optimum sweetener for a given application. </span><a class="topic-link" data-dcnode-id="10206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-performance-liquid-chromatography" title="Learn more about HPLC from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10207" instrument_node="">HPLC</span></a><span data-dcnode-id="10205" instrument_node=""> has supplanted DE as a measurement tool in the newer syrups, especially </span></span><a class="topic-link" data-dcnode-id="10202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10203" instrument_node="">HFCS</span></a><span data-dcnode-id="10201" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="10198" href="#bb0105" name="bbb0105"><span data-dcnode-id="10199" instrument_node="">ISBT, 2014a</span></a><span data-dcnode-id="10197" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="10195" href="#t0050" name="bt0050"><span data-dcnode-id="10196" instrument_node="">Table 20.9</span></a><span data-dcnode-id="10194" instrument_node=""> lists the typical carbohydrate profile for a broad range of sweeteners.</span></p><div class="tables frame-none rowsep-0 colsep-0" data-dcnode-id="10178" id="t0045"><span class="captions" data-dcnode-id="10184"><span data-dcnode-id="10185" id="ca0125"><p data-dcnode-id="10186" id="sp0125"><span class="label" data-dcnode-id="10191"><span data-dcnode-id="10192" instrument_node="">Table 20.8</span></span><span data-dcnode-id="10190" instrument_node="">. </span><span data-dcnode-id="10189" instrument_node="">Properties and Functional Uses of </span><a class="topic-link" data-dcnode-id="10187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about Corn Syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10188" instrument_node="">Corn Syrups</span></a></p></span></span><div class="groups" data-dcnode-id="10181"><img alt="" data-dcnode-id="10183" height="340" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-t20-01-9780128119716.jpg&amp;raw"><span data-dcnode-id="10182" instrument_node=""></span></div><p class="source" data-dcnode-id="10179"><span data-dcnode-id="10180" instrument_node="">From Corn Refiners Association, used by permission.</span></p></div><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="9887" id="t0050"><span class="captions" data-dcnode-id="10169"><span data-dcnode-id="10170" id="ca0130"><p data-dcnode-id="10171" id="sp0130"><span class="label" data-dcnode-id="10176"><span data-dcnode-id="10177" instrument_node="">Table 20.9</span></span><span data-dcnode-id="10175" instrument_node="">. </span><span data-dcnode-id="10174" instrument_node="">Typical Analysis and Properties of </span><a class="topic-link" data-dcnode-id="10172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about Corn Syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10173" instrument_node="">Corn Syrups</span></a></p></span></span><div class="groups" data-dcnode-id="9920"><table data-dcnode-id="9921"><thead data-dcnode-id="10140"><tr class="valign-bottom" data-dcnode-id="10154"><th class="rowsep-1" data-dcnode-id="10167" r al-and-biological-sciences/reducing-sugars" title="Learn more about reducing sugars from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9881" instrument_node="">reducing sugars</span></a><span data-dcnode-id="9879" instrument_node=""> present as determined by a Fehling's test or </span></span><a class="topic-link" data-dcnode-id="9876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/titration" title="Learn more about titration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9877" instrument_node="">titration</span></a><span data-dcnode-id="9875" instrument_node="">. The result is expressed as DE on a dry-weight basis (</span></span><a class="workspace-trigger" data-dcnode-id="9872" href="#bb0010" name="bbb0010"><span data-dcnode-id="9873" instrument_node="">AACC International, 1999</span></a><span data-dcnode-id="9871" instrument_node="">).</span></p><p data-dcnode-id="9861" id="p0320"><span data-dcnode-id="9865"><span data-dcnode-id="9869" instrument_node="">Although commonly used in the industry to identify classes of corn syrup, DE is not a direct measurement of the dextrose level in the syrup. With today's enzyme and syrup blending technology, it is possible to have two syrups with the same DE and yet very different carbohydrate profiles and performance characteristics. This is most commonly seen when </span><a class="topic-link" data-dcnode-id="9867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltose" title="Learn more about maltose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9868" instrument_node="">maltose</span></a><span data-dcnode-id="9866" instrument_node=""> syrups are compared with standard acid-converted corn syrups (</span></span><a class="workspace-trigger" data-dcnode-id="9863" href="#bb0095" name="bbb0095"><span data-dcnode-id="9864" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="9862" instrument_node="">).</span></p></section><section data-dcnode-id="7745" id="s0195"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9858" id="st0210"><span data-dcnode-id="9859" instrument_node="">Solids</span></h3><p data-dcnode-id="9629" id="p0325"><span data-dcnode-id="9857" instrument_node="">The traditional unit of solids measurement for corn syrups is a density measurement called Baumé (Bé). For corn syrups this is,</span><span class="display" data-dcnode-id="9634"><span class="formula" data-dcnode-id="9635" id="fo0010"><span class="math" data-dcnode-id="9636"><span class="MathJax_Preview" data-dcnode-id="9856" style=""></span><span class="MathJax_SVG" data-dcnode-id="9639" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mtext is=&quot;true&quot;>Degrees</mtext><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>B</mi><mo is=&quot;true&quot;>&amp;#xE9;</mo><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mfenced open=&quot;(&quot; close=&quot;)&quot; is=&quot;true&quot;><mrow is=&quot;true&quot;><msup is=&quot;true&quot;><mn is=&quot;true&quot;>60</mn><mo is=&quot;true&quot;>&amp;#xB0;</mo></msup><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>F</mi><mo is=&quot;true&quot;>/</mo><msup is=&quot;true&quot;><mn is=&quot;true&quot;>60</mn><mo is=&quot;true&quot;>&amp;#xB0;</mo></msup><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>F</mi></mrow></mfenced><mo is=&quot;true&quot;>=</mo><mn is=&quot;true&quot;>145</mn><mo is=&quot;true&quot;>&amp;#x2212;</mo><mfrac is=&quot;true&quot;><mn is=&quot;true&quot;>145</mn><mrow is=&quot;true&quot;><mtext is=&quot;true&quot;>true specific gravity</mtext><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mfenced open=&quot;(&quot; close=&quot;)&quot; is=&quot;true&quot;><mrow is=&quot;true&quot; 6" instrument_node="">B</span></mi><mo data-dcnode-id="9693" is="true"><span data-dcnode-id="9694" instrument_node="">é</span></mo><mspace data-dcnode-id="9692" is="true" width="0.25em"></mspace><mfenced close=")" data-dcnode-id="9674" is="true" open="("><mrow data-dcnode-id="9675" is="true"><msup data-dcnode-id="9687" is="true"><mn data-dcnode-id="9690" is="true"><span data-dcnode-id="9691" instrument_node="">60</span></mn><mo data-dcnode-id="9688" is="true"><span data-dcnode-id="9689" instrument_node="">°</span></mo></msup><mi data-dcnode-id="9685" is="true" mathvariant="normal"><span data-dcnode-id="9686" instrument_node="">F</span></mi><mo data-dcnode-id="9683" is="true"><span data-dcnode-id="9684" instrument_node="">/</span></mo><msup data-dcnode-id="9678" is="true"><mn data-dcnode-id="9681" is="true"><span data-dcnode-id="9682" instrument_node="">60</span></mn><mo data-dcnode-id="9679" is="true"><span data-dcnode-id="9680" instrument_node="">°</span></mo></msup><mi data-dcnode-id="9676" is="true" mathvariant="normal"><span data-dcnode-id="9677" instrument_node="">F</span></mi></mrow></mfenced><mo data-dcnode-id="9672" is="true"><span data-dcnode-id="9673" instrument_node="">=</span></mo><mn data-dcnode-id="9670" is="true"><span data-dcnode-id="9671" instrument_node="">145</span></mn><mo data-dcnode-id="9668" is="true"><span data-dcnode-id="9669" instrument_node="">−</span></mo><mfrac data-dcnode-id="9642" is="true"><mn data-dcnode-id="9666" is="true"><span data-dcnode-id="9667" instrument_node="">145</span></mn><mrow data-dcnode-id="9643" is="true"><mtext data-dcnode-id="9664" is="true"><span data-dcnode-id="9665" instrument_node="">true specific gravity</span></mtext><mspace data-dcnode-id="9663" is="true" width="0.25em"></mspace><mfenced close=")" data-dcnode-id="9645" is="true" open="("><mrow data-dcnode-id="9646" is="true"><msup data-dcnode-id="9658" is="true"><mn data-dcnode-id="9661" is="true"><span data-dcnode-id="9662" instrument_node="">60</span></mn><mo data-dcnode-id="9659" is="true"><span data-dcnode-id="9660" instrument_node="">°</span></mo></msup><mi data-dcnode-id="9656" is="true" mathvariant="normal"><span data-dcnode-id="9657" instrument_node="">F</span></mi><mo data-dcnode-id="9654" is="true"><span data-dcnode-id="9655" instrument_node="">/</span></mo><msup data-dcnode-id="9649" is="true"><mn data-dcnode-id="9652" is="true"><span data-dcnode-id="9653" instrument_node="">60</span></mn><mo data-dcnode-id="9650" is="true"><span data-dcnode-id="9651" instrument_node="">°</span></mo></msup><mi data-dcnode-id="9647" is="true" mathvariant="normal"><span data-dcnode-id="9648" instrument_node="">F</span></mi></mrow></mfenced><mspace data-dcnode-id="9644" is="true" width="0.25em"></mspace></mrow></mfrac></math></span></span></span></span></span><span data-dcnode-id="9633" instrument_node="">where the specific gravity is measured at 15.6°C (60°F) in relation to water at 15.6°C (60°F). In practice, because corn syrups are extremely viscous and difficult to work with at 15.6°C (60°F), Baume is usually measured at 60°C (140°F) (</span><a class="workspace-trigger" data-dcnode-id="9631" href="#bb0095" name="bbb0095"><span data-dcnode-id="9632" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="9630" instrument_node="">).</span></p><div data-dcnode-id="7753"><p data-dcnode-id="9606" id="p0330"><span data-dcnode-id="9628" instrument_node="">Technology has replaced the use of Bé spindles with refractometers, which provide rapid, accurate measurement of solids over a broad range of products. When a beam of light passes through a thin layer of a carbohydrate, it is refracted. The degree of refraction depends on the solids and the carbohydrate profile of the solution. Tables are available that convert commercial Bé to a % dry solids reading. The Corn Refiners Association has sponsored extensive work with the Augustana Research Foundation (</span><a class="workspace-trigger" data-dcnode-id="9626" href="#bb0215" name="bbb0215"><span data-dcnode-id="9627" instrument_node="">Wartman et al., 1976</span></a><span data-dcnode-id="9625" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9623" href="#bb0220" name="bbb0220"><span data-dcnode-id="9624" instrument_node="">Wartman et al., 1980</span></a><span data-dcnode-id="9622" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9620" href="#bb0225" name="bbb0225"><span data-dcnode-id="9621" instrument_node="">Wartman et al., 1984</span></a><span data-dcnode-id="9619" instrument_node="">) to produce accurate tables converting Bé, refractive index, and solids for a wide range of syrups (</span><a class="workspace-trigger" data-dcnode-id="9617" href="#t0055" name="bt0055"><span data-dcnode-id="9618" instrument_node="">Table 20.10</span></a><span data-dcnode-id="9616" instrument_node="">). A similar table, available from the International Society of Beverage Technologists for high-fructose syrups, is widely used in the industry (</span><a class="workspace-trigger" data-dcnode-id="9614" href="#bb0095" name="bbb0095"><span data-dcnode-id="9615" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="9613" instrument_node="">). The refractive index of high-fructose syrups is usually measured at 20°C, and the typical ranges of solids for 42% and 55% HFCS are shown in </span><a class="workspace-trigger" data-dcnode-id="9611" href="#t0060" name="bt0060"><span data-dcnode-id="9612" instrument_node="">Table 20.11</span></a><span data-dcnode-id="9610" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9608" href="#t0065" name="bt0065"><span data-dcnode-id="9609" instrument_node="">Table 20.12</span></a><span data-dcnode-id="9607" instrument_node="">, respectively.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="8360" id="t0055"><span class="captions" data-dcnode-id="9592"><span data-dcnode-id="9593" id="ca0135"><p data-dcnode-id="9594" id="sp0135"><span class="label" data-dcnode-id="9604"><span data-dcnode-id="9605" instrument_node="">Table 20.10</span></span><span data-dcnode-id="9603" instrument_node="">. </span><span data-dcnode-id="9599"><span data-dcnode-id="9602" instrument_node="">Refractive Index (RI) and Dry Substance (DS) Relationships for </span><a class="topic-link" data-dcnode-id="9600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about Corn Syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9601" instrument_node="">Corn Syrups</span></a></span><a class="workspace-trigger" data-dcnode-id="9595" href="#tf0065" name="btf0065"><sup data-dcnode-id="9596"><em data-dcnode-id="9597"><span data-dcnode-id="9598" instrument_node="">a</span></em></sup></a></p></span></span><div class="groups" data-dcnode-id="8378"><table data-dcnode-id="8379"><thead data-dcnode-id="9566"><tr class="valign-bottom" data-dcnode-id="9572"><th class="rowsep-1" data-dcnode-id="9590" rowspan="2" scope="col"><span data-dcnode-id="9591" instrument_node="">% Dry Solids</span></th><th class="rowsep-1" colspan="2" data-dcnode-id="9588" scope="col"><span data-dcnode-id="9589" instrument_node="">Refractive Index (RI)</span></th><th class="rowsep-1" data-dcnode-id="9584" rowspan="2" scope="col"><span data-dcnode-id="9587" instrument_node="">Bé, Comm 140/160°F +</span><span data-dcnode-id="9586" instrument_node="">&nbsp;</span><span data-dcnode-id="9585" instrument_node="">1 (60/71.1°C)</span></th><th class="rowsep-1" data-dcnode-id="9582" rowspan="2" scope="col"><span data-dcnode-id="9583" instrument_node="">Specific Gravity Air/Air 100/160°F (37.8/71.1°C)</span></th><th class="rowsep-1" data-dcnode-id="9580" rowspan="2" scope="col"><span data-dcnode-id="9581" instrument_node="">Total lb/gal 100°F (37.8°C)</span></th><th class="rowsep-1" data-dcnode-id="9573" rowspan="2" scope="col"><spa t_node="">70.39</span></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="7760"><dt data-dcnode-id="7768" id="tf0080"><span data-dcnode-id="7769" instrument_node="">a</span></dt><dd data-dcnode-id="7761"><p data-dcnode-id="7762" id="np0080"><span data-dcnode-id="7767" instrument_node="">Pounds per gallon (lb/gal) is the typical unit of measurement in use by the industry. The conversion factor of lb/gal to kg/L</span><span data-dcnode-id="7766" instrument_node="">&nbsp;</span><span data-dcnode-id="7765" instrument_node="">=</span><span data-dcnode-id="7764" instrument_node="">&nbsp;</span><span data-dcnode-id="7763" instrument_node="">0.1198.</span></p></dd></dl><p class="source" data-dcnode-id="7755"><span data-dcnode-id="7756"><strong data-dcnode-id="7758"><span data-dcnode-id="7759" instrument_node="">Source:</span></strong><span data-dcnode-id="7757" instrument_node=""> International Society of Beverage Technologists, used by permission.</span></span></p></div></div><p data-dcnode-id="7748" id="p0335"><span data-dcnode-id="7752" instrument_node="">Brix is another type of refractive measurement scale for sweetener solids. However, the Brix scale is calibrated to measure the solids of sucrose solutions and is calibrated in degrees Brix. Because the term “Brix” applies only to sucrose solutions, additional corrections must be made when using a Brix refractometer to measure the percent solids of a fructose solution or corn syrups. In addition, since Brix charts were modified in 1936, 1966, and 1974, it is important to know which table is being used (</span><a class="workspace-trigger" data-dcnode-id="7750" href="#bb0095" name="bbb0095"><span data-dcnode-id="7751" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="7749" instrument_node="">).</span></p><p data-dcnode-id="7746" id="p0340"><span data-dcnode-id="7747" instrument_node="">Solids may also be measured by vacuum oven method, but this method is not easy to perform, and results can be inconsistent. It is not a method of choice for most quality assurance labs.</span></p></section><section data-dcnode-id="7331" id="s0200"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7743" id="st0215"><span data-dcnode-id="7744" instrument_node="">Viscosity</span></h3><p data-dcnode-id="7628" id="p0345"><span data-dcnode-id="7742" instrument_node="">Corn syrups have the characteristics of Newtonian fluids. The coefficient of viscosity is constant and measured in poise (dyne-s/cm</span><sup data-dcnode-id="7740"><span data-dcnode-id="7741" instrument_node="">2</span></sup><span data-dcnode-id="7735"><span data-dcnode-id="7739" instrument_node="">), which is the force per unit area necessary to maintain a unit difference in velocity between two parallel layers of fluids that are a unit distance apart. The viscosity of a corn sweetener depends on the sweetener's % dry solids, the carbohydrate profile, and the temperature at which it is measured. At the same solids level, syrups containing a higher percentage of branched oligomers will have higher viscosities than will syrups composed primarily of mono- and </span><a class="topic-link" data-dcnode-id="7737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/disaccharides" title="Learn more about disaccharides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7738" instrument_node="">disaccharides</span></a><span data-dcnode-id="7736" instrument_node="">. This effect is compounded by the action of weak hydrogen bonding (</span></span><a class="workspace-trigger" data-dcnode-id="7733" href="#bb0095" name="bbb0095"><span data-dcnode-id="7734" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="7732" instrument_node="">). Corn syrup viscosity is usually expressed in centipoise (cP) or Saybolt seconds universal (SSU), which are related to centipoise by the equation:</span><span class="display" data-dcnode-id="7629"><span class="formula" data-dcnode-id="7630" id="fo0015"><span class="math" data-dcnode-id="7631"><span class="MathJax_Preview" data-dcnode-id="7731" style=""></span><span class="MathJax_SVG" data-dcnode-id="7634" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mi is=&quot;true&quot;>SSU</mi><mo is=&quot;true&quot;>=</mo><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><mtext is=&quot;true&quot;>centipoise</mtext><mo is=&quot;true&quot;>&amp;#xD7;</mo><mn is=&quot;true&quot;>4.45</mn></mrow><mtext is=&quot;true&quot;>specific gravity</mtext></mfrac></math>" id="MathJax-Element-3-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="7651" focusable="false" height="4.058ex" role="img" style="vertical-align: -1.477ex;" viewBox="0 -1111.4 8398.8 1747.3" width="19.507ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="7652" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="7724" is="true"><use data-dcnode-id="7729" href="#MJMAIN-53"><path d="M55 507Q55 590 112 647T243 704H257Q342 704 405 641L426 672Q431 679 436 687T446 700L449 704Q450 704 453 704T459 705H463Q466 705 472 699V462L466 456H448Q437 456 435 459T430 479Q413 605 329 646Q292 662 254 662Q201 662 168 626T135 542Q135 508 152 480T200 435Q210 431 286 412T370 389Q427 367 463 314T500 191Q500 110 448 45T301 -21Q245 -21 201 -4T140 27L122 41Q118 36 107 21T87 -7T78 -21Q76 -22 68 -22H64Q61 -22 55 -16V101Q55 220 56 222Q58 227 76 227H89Q95 221 95 214Q95 182 105 151T139 90T205 42T305 24Q352 24 386 62T420 155Q420 198 398 233T340 281Q284 295 266 300Q261 301 239 306T206 314T174 325T141 343T112 367T85 402Q55 451 55 507Z" data-dcnode-id="7730" id="MJMAIN-53" stroke-width="1"></path></use><use data-dcnode-id="7727" href="#MJMAIN-53" x="556" y="0"><path d="M55 507Q55 590 112 647T243 704H257Q342 704 405 641L4 d="7372"><span data-dcnode-id="7373" instrument_node="">140/60.0</span></td><td data-dcnode-id="7370"><span data-dcnode-id="7371" instrument_node="">620</span></td><td data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">389</span></td><td data-dcnode-id="7366"><span data-dcnode-id="7367" instrument_node="">191</span></td><td data-dcnode-id="7364"><span data-dcnode-id="7365" instrument_node="">83.2</span></td></tr><tr data-dcnode-id="7351"><th data-dcnode-id="7362" scope="row"></th><td data-dcnode-id="7360"><span data-dcnode-id="7361" instrument_node="">160/71.1</span></td><td data-dcnode-id="7358"><span data-dcnode-id="7359" instrument_node="">325</span></td><td data-dcnode-id="7356"><span data-dcnode-id="7357" instrument_node="">197</span></td><td data-dcnode-id="7354"><span data-dcnode-id="7355" instrument_node="">103</span></td><td data-dcnode-id="7352"><span data-dcnode-id="7353" instrument_node="">47.9</span></td></tr><tr data-dcnode-id="7339"><th data-dcnode-id="7350" scope="row"></th><td data-dcnode-id="7348"><span data-dcnode-id="7349" instrument_node="">180/82.2</span></td><td data-dcnode-id="7346"><span data-dcnode-id="7347" instrument_node="">180</span></td><td data-dcnode-id="7344"><span data-dcnode-id="7345" instrument_node="">110</span></td><td data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">62</span></td><td data-dcnode-id="7340"><span data-dcnode-id="7341" instrument_node="">28.8</span></td></tr></tbody></table></div><p class="source" data-dcnode-id="7334"><span data-dcnode-id="7335" instrument_node="">From Corn Refiners Association, used by permission.</span></p></div></div></section><section data-dcnode-id="7179" id="s0205"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7329" id="st0220"><span data-dcnode-id="7330" instrument_node="">Sweetness</span></h3><div data-dcnode-id="7180"><p data-dcnode-id="7308" id="p0355"><span data-dcnode-id="7328" instrument_node="">Sweetness is an important and easily recognized characteristic of corn syrups. The standard reference, often called the “gold standard,” for sweetness is sucrose. While corn sweeteners do taste sweet, the intensity of sweetness is less when compared to sucrose. The exception is HFCS syrups. For reference purposes, a syrup's DE approximates a syrup's relative sweetness. It can also be estimated, by calculation, using the carbohydrate profile. Data drawn from </span><a class="workspace-trigger" data-dcnode-id="7326" href="#bb0160" name="bbb0160"><span data-dcnode-id="7327" instrument_node="">Pancoast and Junk (1980)</span></a><span data-dcnode-id="7325" instrument_node=""> have been updated to compare the values of several sweeteners with those of sucrose (</span><a class="workspace-trigger" data-dcnode-id="7323" href="#t0075" name="bt0075"><span data-dcnode-id="7324" instrument_node="">Table 20.14</span></a><span data-dcnode-id="7322" instrument_node="">). It is important to understand that sweetness comparisons are relative. Effects of concentration, solids, pH, temperature, and flavor systems may all affect the perception of sweetness during an evaluation. Sweeteners also display variations in onset, intensity, and duration of sweetness. A good example of this can be seen in the sweetness characteristics of fructose in solution. Fructose can exist as four different isomers. At 5°C, the β-</span><span class="small-caps" data-dcnode-id="7320"><span data-dcnode-id="7321" instrument_node="">d</span></span><span data-dcnode-id="7319" instrument_node="">-fructopyranose form predominates, with a sweetness of about 140% that of sucrose. As the temperature rises to 60°C, the α- and β-</span><span class="small-caps" data-dcnode-id="7317"><span data-dcnode-id="7318" instrument_node="">d</span></span><span data-dcnode-id="7316" instrument_node="">-fructofuranose forms predominate, and the sweetness level drops to about 79% that of sucrose (</span><a class="workspace-trigger" data-dcnode-id="7314" href="#bb0085" name="bbb0085"><span data-dcnode-id="7315" instrument_node="">Hanover, 1983</span></a><span data-dcnode-id="7309"><span data-dcnode-id="7313" instrument_node="">). When performing </span><a class="topic-link" data-dcnode-id="7311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/sensory-evaluation" title="Learn more about sensory evaluations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7312" instrument_node="">sensory evaluations</span></a><span data-dcnode-id="7310" instrument_node=""> for sweetness, it is critical that conditions used for the test are standardized and understood when reported.</span></span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="7181" id="t0075"><span class="captions" data-dcnode-id="7298"><span data-dcnode-id="7299" id="ca0155"><p data-dcnode-id="7300" id="sp0155"><span class="label" data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">Table 20.14</span></span><span data-dcnode-id="7305" instrument_node="">. </span><span data-dcnode-id="7304" instrument_node="">Relative Sweetness of </span><a class="topic-link" data-dcnode-id="7302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about Corn Syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7303" instrument_node="">Corn Syrups</span></a><span data-dcnode-id="7301" instrument_node=""> in Relation to Sucrose</span></p></span></span><div class="groups" data-dcnode-id="7207"><table data-dcnode-id="7208"><thead data-dcnode-id="7288"><tr class="rowsep-1 valign-top" data-dcnode-id="7289"><th data-dcnode-id="7296" scope="col"><span data-dcnode-id="7297" instrument_node="">Type of Sweetener</span></th><th data-dcnode-id="7290" scope="col"><span data-dcnode-id="7295" instrument_node="">Relative Sweetness to Sucrose</span><a class="workspace-trigger" data-dcnode-id="7291" href="#tf0085" name="btf0085"><sup data-dcnode-id="7292"><em data-dcnode-id="7293"><span data-dcnode-id="7294" instrument_node="">a</span></em></sup></a></th></tr></thead><tbody data-dcnode-id="7209"><tr data-dcnode-id="7274"><th data-dcnode-id="7277" scope="row"><span data-dcnode-id="7287" instrument_node="">30 DE</span><a class="workspace-trigger" data-dcnode-id="7283" href="#tf0090" name="btf0090"><sup data-dcnode-id="7284"><em data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">b</span></em></sup></a><span data-dcnode-id="7282" instrument_node=""> acid-converted CSU</span><a class="workspace-trigger" data-dcnode-id="7278" href="#tf0095" name="btf0095"><sup data-dcnode-id="7279"><em data-dcnode-id="7280"><span data-dcnode-id="7281" instrument_node="">c</span></em></sup></a></th><td data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">30–35</span></td></tr><tr data-dcnode-id="7269"><th data-dcnode-id="7272" scope="row"><span data-dcnode-id="7273" instrument_node="">36 DE acid-converted CSU</span></th><td data-dcnode-id="7270"><span data-dcnode-id="7271" instrument_node="">35–40</span></td></tr><tr data-dcnode-id="7264"><th data-dcnode-id="7267" scope="row"><span data-dcnode-id="7268" instrument_node="">42 DE acid-converted CSU</span></th><td data-dcnode-id="7265"><span data-dcnode-id="7266" instrument_node="">45–50</span></td></tr><tr data-dcnode-id="7259"><th data-dcnode-id="7262" scope="row"><span data-dcnode-id="7263" instrument_node="">54 DE acid-converted CSU</span></th><td data-dcnode-id="7260"><span data-dcnode-id="7261" instrument_node="">50–55</span></td></tr><tr data-dcnode-id="7254"><th data-dcnode-id="7257" scope="row"><span data-dcnode-id="7258" instrument_node="">62 DE acid-converted CSU</span></th><td data-dcnode-id="7255"><span data-dcnode-id="7256" instrument_node="">60–70</span></td></tr><tr data-dcnode-id="7249"><th data-dcnode-id="7252" scope="row"><span data-dcnode-id="7253" instrument_node="">65% Maltose CSU</span></th><td data-dcnode-id="7250"><span data-dcnode-id="7251" instrument_node="">45–60</span></td></tr><tr data-dcnode-id="7240"><th data-dcnode-id="7243" scope="row"><span data-dcnode-id="7248" instrument_node="">42 HFCS</span><a class="workspace-trigger" data-dcnode-id="7244" href="#tf0100" name="btf0100"><sup data-dcnode-id="7245"><em data-dcnode-id="7246"><span data-dcnode-id="7247" instrument_node="">d</span></em></sup></a></th><td data-dcnode-id="7241"><span data-dcnode-id="7242" instrument_node="">100</span></td></tr><tr data-dcnode-id="7235"><th data-dcnode-id="7238" scope="row"><span data-dcnode-id="7239" instrument_node="">55 HFCS</span></th><td data-dcnode-id="7236"><span data-dcnode-id="7237" instrument_node="">100–110</span></td></tr><tr data-dcnode-id="7230"><th data-dcnode-id="7233" scope="row"><span data-dcnode-id="7234" instrument_node="">90 HFCS</span></th><td data-dcnode-id="7231"><span data-dcnode-id="7232" instrument_node="">120–160</span></td></tr><tr data-dcnode-id="7225"><th data-dcnode-id="7228" scope="row"><span data-dcnode-id="7229" instrument_node="">Lactose</span></th><td data-dcnode-id="7226"><span data-dcnode-id="7227" instrument_node="">40</span></td></tr><tr data-dcnode-id="7220"><th data-dcnode-id="7223" scope="row"><span data-dcnode-id="7224" instrument_node="">Dextrose</span></th><td data-dcnode-id="7221"><span data-dcnode-id="7222" instrument_node="">70–80</span></td></tr><tr data-dcnode-id="7215"><th data-dcnode-id="7218" scope="row"><span data-dcnode-id="7219" instrument_node="">Fructose</span></th><td data-dcnode-id="7216"><span data-dcnode-id="7217" instrument_node="">150–170</span></td></tr><tr data-dcnode-id="7210"><th data-dcnode-id="7213" scope="row"><span data-dcnode-id="7214" instrument_node="">Sucrose</span></th><td data-dcnode-id="7211"><span data-dcnode-id="7212" instrument_node="">100</span></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="7184"><dt data-dcnode-id="7205" id="tf0085"><span data-dcnode-id="7206" instrument_node="">a</span></dt><dd data-dcnode-id="7202"><p data-dcnode-id="7203" id="np0085"><span data-dcnode-id="7204" instrument_node="">Compared to sucrose in a 15% solution.</span></p></dd><dt data-dcnode-id="7200" id="tf0090"><span data-dcnode-id="7201" instrument_node="">b</span></dt><dd data-dcnode-id="7197"><p data-dcnode-id="7198" id="np0090"><span data-dcnode-id="7199" instrument_node="">Dextrose equivalent.</span></p></dd><dt data-dcnode-id="7195" id="tf0095"><span data-dcnode-id="7196" instrument_node="">c</span></dt><dd data-dcnode-id="7190"><p data-dcnode-id="7191" id="np0095"><em data-dcnode-id="7193"><span data-dcnode-id="7194" instrument_node="">CSU</span></em><span data-dcnode-id="7192" instrument_node="">, corn syrup unmixed.</span></p></dd><dt data-dcnode-id="7188" id="tf0100"><span data-dcnode-id="7189" instrument_node="">d</span></dt><dd data-dcnode-id="7185"><p data-dcnode-id="7186" id="np0100"><span data-dcnode-id="7187" instrument_node="">High-fructose corn syrup.</span></p></dd></dl><p class="source" data-dcnode-id="7182"><span data-dcnode-id="7183" instrument_node="">Data from Pancoast, H.M., Junk, W.R., 1980. Fructose. In: Pancoast, H.M., Junk, W.R. (Eds.), Handbook of Sugars, second ed. AVI Publishing Co., Westport, CT, pp. 387–388.</span></p></div></div></section><section data-dcnode-id="6774" id="s0210"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7177" id="st0225"><span data-dcnode-id="7178" instrument_node="">Color</span></h3><div data-dcnode-id="6959"><p data-dcnode-id="7021" id="p0360"><span data-dcnode-id="7172"><span data-dcnode-id="7176" instrument_node="">Time and storage conditions, especially temperature, will affect a syrup's appearance. This is referred to as aging. As a syrup ages, its visual appearance will move from “water white” to “straw-yellow,” to darker shades of yellow. Eventually, the syrup moves into brown colors and finally to black or burnt. The color/appearance of a syrup should not be confused with taste. Different shades of yellow are not unusual and have no impact on taste. However, if the product is dark brown to black, there is risk that the product was mishandled with excessive heat resulting in the creation of off-flavors. The appearance or color of a corn syrup was originally evaluated subjectively by the eye of the receiver or by visual color comparing techniques. If a syrup's color or appearance is important, an objective measurement of color using a </span><a class="topic-link" data-dcnode-id="7174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/spectrophotometers" title="Learn more about spectrophotometer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7175" instrument_node="">spectrophotometer</span></a><span data-dcnode-id="7173" instrument_node=""> should be used. </span></span><a class="workspace-trigger" data-dcnode-id="7170" href="#t0080" name="bt0080"><span data-dcnode-id="7171" instrument_node="">Table 20.15</span></a><span data-dcnode-id="7169" instrument_node=""> provides a comparison of visual eye perception to one such measurement, optical density (OD), where</span><span class="display" data-dcnode-id="7022"><span class="formula" data-dcnode-id="7023" id="fo0020"><span class="math" data-dcnode-id="7024"><span class="MathJax_Preview" data-dcnode-id="7168" style=""></span><span class="MathJax_SVG" data-dcnode-id="7027" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mi is=&quot;true&quot;>OD</mi><mo is=&quot;true&quot;>=</mo><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><mo is=&quot;true&quot;>log</mo><msub is=&quot;true&quot;><mi is=&quot;true&quot;>T</mi><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>600</mn><mspace width=&quot;0.12em&quot; is=&quot;true&quot; /><mi is=&quot;tru
