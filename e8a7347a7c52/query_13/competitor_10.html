ode-id="11445" instrument_node="">HM</span></a></em></span><span data-dcnode-id="11441" instrument_node="">, high maltose.</span></p></dd></dl><p class="source" data-dcnode-id="11436"><span data-dcnode-id="11437" instrument_node="">From CRA, 2006. Nutritive Sweeteners From Corn. Corn Refiners Association, Washington, DC.</span></p></div></div></section><section data-dcnode-id="11359" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11431" id="st0050"><span data-dcnode-id="11432" instrument_node="">Enzyme-Enzyme Conversion</span></h3><div data-dcnode-id="11400"><p data-dcnode-id="11419" id="p0100"><span data-dcnode-id="11426"><span data-dcnode-id="11430" instrument_node="">Another method to hydrolyze starch consists of a total enzyme process, often referred to as Enzyme/Enzyme (E/E). The first step of the E/E process combines gelatinization and </span><a class="topic-link" data-dcnode-id="11428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/liquefaction" title="Learn more about liquefaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11429" instrument_node="">liquefaction</span></a><span data-dcnode-id="11427" instrument_node=""> using a jet cooker, or hydro-heater, to both gelatinize and liquefy the starch (</span></span><a class="workspace-trigger" data-dcnode-id="11424" href="#f0035" name="bf0035"><span data-dcnode-id="11425" instrument_node="">Fig. 20.6</span></a><span data-dcnode-id="11423" instrument_node="">). In this continuous process, steam is injected into the starch slurry to instantly raise its temperature beyond the gelatinization point of the starch. The slurry is subject to a rapid pressure drop causing the starch molecule to gelatinize, making it susceptible to enzymatic degradation. This type of processing hydrolyzate under controlled conditions creates a starting substrate with a very low DE (</span><a class="workspace-trigger" data-dcnode-id="11421" href="#bb0190" name="bbb0190"><span data-dcnode-id="11422" instrument_node="">Taylor, 1965</span></a><span data-dcnode-id="11420" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="11401" id="f0035"><span data-dcnode-id="11409"><img alt="Fig 20.6" aria-describedby="ca0035" data-dcnode-id="11418" height="284" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-06-9780128119716.jpg&amp;raw"><span data-dcnode-id="11417" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11410"><li data-dcnode-id="11411"><a class="anchor download-link u-font-sans" data-dcnode-id="11412" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-06-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11413"><span data-dcnode-id="11416" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11414"><span data-dcnode-id="11415" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11402"><span data-dcnode-id="11403" id="ca0035"><p data-dcnode-id="11404" id="sp0035"><span class="label" data-dcnode-id="11407"><span data-dcnode-id="11408" instrument_node="">Fig 20.6</span></span><span data-dcnode-id="11406" instrument_node="">. </span><span data-dcnode-id="11405" instrument_node="">Starch jet cooker. Steam injection system to breakdown starch. Used with permission ProSonix, West Allis, WI.</span></p></span></span></figure></div><div data-dcnode-id="11360"><p data-dcnode-id="11382" id="p0105"><span data-dcnode-id="11399" instrument_node="">The residence time in the jet cooker is usually short, less than 5</span><span data-dcnode-id="11398" instrument_node="">&nbsp;</span><span data-dcnode-id="11393"><span data-dcnode-id="11397" instrument_node="">min, and the degree of subsequent conversion is controlled by a series of tubes or further processing in a vessel called a “secondary reactor.” The enzyme used in this first step is an α-amylase stabilized with calcium to allow it to withstand temperatures of about 100°C during the reaction. Using this processing technique, liquefaction can produce hydrolyzates with very low DEs. Compared to earlier starch conversion techniques, the hydrolyzate from liquefaction is generally less susceptible to subsequent </span><a class="topic-link" data-dcnode-id="11395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/retrogradation-starch" title="Learn more about starch retrogradation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11396" instrument_node="">starch retrogradation</span></a><span data-dcnode-id="11394" instrument_node=""> than the hydrolyzate from acid conversion (</span></span><a class="workspace-trigger" data-dcnode-id="11391" href="#bb0095" name="bbb0095"><span data-dcnode-id="11392" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11386"><span data-dcnode-id="11390" instrument_node="">). Enzyme-enzyme processes can be used to produce any type of corn syrup, but is most commonly used in the production of syrups, such as dextrose, HFCSs, high-maltose corn syrup (HMCS), and </span><a class="topic-link" data-dcnode-id="11388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11389" instrument_node="">maltodextrins</span></a><span data-dcnode-id="11387" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="11384" href="#f0040" name="bf0040"><span data-dcnode-id="11385" instrument_node="">Fig. 20.7</span></a><span data-dcnode-id="11383" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="11361" id="f0040"><span data-dcnode-id="11372"><img alt="Fig. 20.7" aria-describedby="ca0040" data-dcnode-id="11381" height="401" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-07-9780128119716.jpg&amp;raw"><span data-dcnode-id="11380" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11373"><li data-dcnode-id="11374"><a class="anchor download-link u-font-sans" data-dcnode-id="11375" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-07-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11376"><span data-dcnode-id="11379" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11377"><span data-dcnode-id="11378" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11362"><span data-dcnode-id="11363" id="ca0040"><p data-dcnode-id="11364" id="sp0040"><span class="label" data-dcnode-id="11370"><span data-dcnode-id="11371" instrument_node="">Fig. 20.7</span></span><span data-dcnode-id="11369" instrument_node="">. </span><span data-dcnode-id="11368" instrument_node="">General process overview of enzyme/enzyme for production of </span><a class="topic-link" data-dcnode-id="11366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about corn syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11367" instrument_node="">corn syrups</span></a><span data-dcnode-id="11365" instrument_node="">.</span></p></span></span></figure></div></section><section data-dcnode-id="11235" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11357" id="st0055"><span data-dcnode-id="11358" instrument_node="">Enzymes Used in the Corn Sweetener Process</span></h3><p data-dcnode-id="11352" id="p0110"><span data-dcnode-id="11356" instrument_node="">As noted above and in later sections, enzymes play a key role in the production of all corn syrups. Enzymes are proteins that catalyze specific reactions under specific conditions, to produce specific compounds. The action of enzymes on starch to cleave the α-(1,4) and α-(1,6) linkages enables the corn syrup refiner to create syrups having carbohydrate compositions more specific than could be achieved by acid hydrolysis. Several types of enzymes are commonly used in the corn-refining process including glucoamylase, fungal α-amylase, pullulanase, bacterial α-amylase, β-amylase, and glucose </span><a class="topic-link" data-dcnode-id="11354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/isomerases" title="Learn more about isomerase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11355" instrument_node="">isomerase</span></a><span data-dcnode-id="11353" instrument_node="">. These enzymes may be used individually or together to cleave large molecular weight starch into a mixture of saccharides having smaller molecular weights. Research and development of starch hydrolyzing enzymes continues to grow to support both the food and ethanol industries. Following is a summary of key enzymes used to produce sweeteners from corn or other starch sources.</span></p><section data-dcnode-id="11337" id="s0045"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11350" id="st0060"><span data-dcnode-id="11351" instrument_node="">Glucoamylase (Amyloglucosidase)</span></h4><p data-dcnode-id="11338" id="p0115"><span data-dcnode-id="11349" instrument_node="">Fungal glucoamylase enzymes hydrolyze the α-(1,4) linkage in starch. The enzyme can also split the α-(1,6) bonds, but at a much slower rate. The reaction proceeds in a stepwise fashion, releasing single glucose molecules from the nonreducing end of the substrate, resulting in high levels of glucose in the hydrolyzate. Typically, these enzymes, derived from </span><span data-dcnode-id="11345"><em data-dcnode-id="11346"><a class="topic-link" data-dcnode-id="11347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/aspergillus" title="Learn more about Aspergillus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11348" instrument_node="">Aspergillus</span></a></em></span><span data-dcnode-id="11344" instrument_node=""> sp., are used at a pH between 4 and 5 and a temperature of around 60°C. The maximum level of conversion possible with these enzymes is about 96% in a period of 60–90</span><span data-dcnode-id="11343" instrument_node="">&nbsp;</span><span data-dcnode-id="11342" instrument_node="">h (</span><a class="workspace-trigger" data-dcnode-id="11340" href="#bb0095" name="bbb0095"><span data-dcnode-id="11341" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11339" instrument_node="">).</span></p></section><section data-dcnode-id="11316" id="s0050"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11335" id="st0065"><span data-dcnode-id="11336" instrument_node="">Fungal α-Amylase</span></h4><p data-dcnode-id="11317" id="p0120"><span data-dcnode-id="11334" instrument_node="">Fungal α-amylases produced by </span><span data-dcnode-id="11330"><em data-dcnode-id="11331"><a class="topic-link" data-dcnode-id="11332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/aspergillus-oryzae" title="Learn more about Aspergillus oryzae from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11333" instrument_node="">Aspergillus oryzae</span></a></em></span><span data-dcnode-id="11321"><span data-dcnode-id="11329" instrument_node=""> are used to create high-maltose syrups. The enzymes hydrolyze the α-(1,4) glucosidic bond, producing high levels of </span><a class="topic-link" data-dcnode-id="11327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltose" title="Learn more about maltose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11328" instrument_node="">maltose</span></a><span data-dcnode-id="11322"><span data-dcnode-id="11326" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="11324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltotriose" title="Learn more about maltotriose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11325" instrument_node="">maltotriose</span></a><span data-dcnode-id="11323" instrument_node="">. These enzymes are used to produce syrups with maltose levels of up to about 50%. Unfortunately, they also produce dextrose at levels of 8%–10%. Since low dextrose levels are desirable in some high-maltose syrups, it may be necessary to use debranching enzymes called pullulanases to achieve the necessary carbohydrate profile (</span></span></span><a class="workspace-trigger" data-dcnode-id="11319" href="#bb0095" name="bbb0095"><span data-dcnode-id="11320" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11318" instrument_node="">).</span></p></section><section data-dcnode-id="11291" id="s0055"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11314" id="st0070"><span data-dcnode-id="11315" instrument_node="">Pullulanase</span></h4><p data-dcnode-id="11292" id="p0125"><span data-dcnode-id="11313" instrument_node="">Pullulanases, or debranching enzymes, come from </span><span data-dcnode-id="11309"><em data-dcnode-id="11310"><a class="topic-link" data-dcnode-id="11311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/klebsiella" title="Learn more about Klebsiella from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11312" instrument_node="">Klebsiella</span></a></em></span><span data-dcnode-id="11308" instrument_node=""> or </span><span data-dcnode-id="11304"><em data-dcnode-id="11305"><a class="topic-link" data-dcnode-id="11306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/bacilli" title="Learn more about Bacillus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11307" instrument_node="">Bacillus</span></a></em></span><span data-dcnode-id="11303" instrument_node=""> sp. such as </span><em data-dcnode-id="11301"><span data-dcnode-id="11302" instrument_node="">Bacillus acidopullylyticus.</span></em><span data-dcnode-id="11296"><span data-dcnode-id="11300" instrument_node=""> They are heat-stable enzymes that catalyze the hydrolysis of the α-(1,6) linkages of </span><a class="topic-link" data-dcnode-id="11298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/amylopectin" title="Learn more about amylopectin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11299" instrument_node="">amylopectin</span></a><span data-dcnode-id="11297" instrument_node=""> already partially hydrolyzed by α-amylase. These enzymes can produce between 70% and 80% maltose when used in combination with other maltogenic enzymes and when the substrate DE is kept sufficiently low (</span></span><a class="workspace-trigger" data-dcnode-id="11294" href="#bb0095" name="bbb0095"><span data-dcnode-id="11295" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11293" instrument_node="">).</span></p></section><section data-dcnode-id="11276" id="s0060"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11289" id="st0075"><span data-dcnode-id="11290" instrument_node="">Bacterial α-Amylase</span></h4><p data-dcnode-id="11277" id="p0130"><span data-dcnode-id="11288" instrument_node="">Bacterial α-amylase enzymes are produced by </span><em data-dcnode-id="11286"><span data-dcnode-id="11287" instrument_node="">Bacillus</span></em><span data-dcnode-id="11281"><span data-dcnode-id="11285" instrument_node=""> sp. These enzymes are endoamylases capable of hydrolyzing the internal α-(1,4) glucosyl linkages, which reduces the viscosity of gelatinized starch to produce soluble </span><a class="topic-link" data-dcnode-id="11283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/dextrin" title="Learn more about dextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11284" instrument_node="">dextrins</span></a><span data-dcnode-id="11282" instrument_node=""> and maltodextrins. They are also used to break up long-chain starch fragments to reduce hazing in low-DE corn syrups (</span></span><a class="workspace-trigger" data-dcnode-id="11279" href="#bb0095" name="bbb0095"><span data-dcnode-id="11280" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11278" instrument_node="">).</span></p></section><section data-dcnode-id="11264" id="s0065"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11274" id="st0080"><span data-dcnode-id="11275" instrument_node="">β-Amylase</span></h4><p data-dcnode-id="11265" id="p0135"><span data-dcnode-id="11269"><span data-dcnode-id="11273" instrument_node="">β-Amylase comes from germinated barley sprouts. The enzyme attacks the nonreducing end of linear starch chains breaking them off two units at a time, creating maltose. The enzyme is not capable of cleaving the α-(1-6) link. They are used to produce high-maltose syrups, but these syrups may have a relatively high </span><a class="topic-link" data-dcnode-id="11271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/trisaccharides" title="Learn more about trisaccharide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11272" instrument_node="">trisaccharide</span></a><span data-dcnode-id="11270" instrument_node=""> levels and other limit dextrins because the enzyme is very slow to break down the starch compared to α-amylase. The enzyme is temperature- and pH-sensitive (</span></span><a class="workspace-trigger" data-dcnode-id="11267" href="#bb0095" name="bbb0095"><span data-dcnode-id="11268" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11266" instrument_node="">).</span></p></section><section data-dcnode-id="11236" id="s0070"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11262" id="st0085"><span data-dcnode-id="11263" instrument_node="">Glucose Isomerase</span></h4><p data-dcnode-id="11237" id="p0140"><span data-dcnode-id="11261" instrument_node="">Glucose-isomerase enzymes are produced by </span><span data-dcnode-id="11257"><em data-dcnode-id="11258"><a class="topic-link" data-dcnode-id="11259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/actinoplanes" title="Learn more about Actinoplanes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11260" instrument_node="">Actinoplanes</span></a></em></span><span data-dcnode-id="11256" instrument_node=""> and </span><span data-dcnode-id="11252"><em data-dcnode-id="11253"><a class="topic-link" data-dcnode-id="11254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/streptomyces" title="Learn more about Streptomyces from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11255" instrument_node="">Streptomyces</span></a></em></span><span data-dcnode-id="11251" instrument_node=""> sp. They catalyze the isomerization of </span><span class="small-caps" data-dcnode-id="11249"><span data-dcnode-id="11250" instrument_node="">d</span></span><span data-dcnode-id="11248" instrument_node="">-glucose to </span><span class="small-caps" data-dcnode-id="11246"><span data-dcnode-id="11247" instrument_node="">d</span></span><span data-dcnode-id="11241"><span data-dcnode-id="11245" instrument_node="">-fructose. These enzymes are commonly immobilized on beads that are cross-linked with glutaraldehyde and used in large columns to produce </span><a class="topic-link" data-dcnode-id="11243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11244" instrument_node="">HFCS</span></a><span data-dcnode-id="11242" instrument_node=""> from glucose (</span></span><a class="workspace-trigger" data-dcnode-id="11239" href="#bb0095" name="bbb0095"><span data-dcnode-id="11240" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11238" instrument_node="">).</span></p></section></section><section data-dcnode-id="11194" id="s0075"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11233" id="st0090"><span data-dcnode-id="11234" instrument_node="">Protein Removal</span></h3><p data-dcnode-id="11228" id="p0145"><span data-dcnode-id="11232" instrument_node="">Wet-milled starch slurry coming from gluten separation still contains residual levels of soluble and insoluble protein. Because this residual protein may interfere with enzyme reactions, foul the carbon and demineralizer purification systems, and accelerate color development, it must be removed as soon as possible. The first process for protein removal in a corn syrup refinery follows the hydrolysis step and consists of passing the hydrolyzate through a specialized centrifuge called a “mud” centrifuge. First, the pH of the slurry is adjusted to about 4.7. At this pH, the protein is relatively insoluble and can be easily separated as a thick sludge. This insoluble protein is recovered and added to the gluten feed produced in the wet corn mill, enhancing the protein level of this product (</span><a class="workspace-trigger" data-dcnode-id="11230" href="#bb0095" name="bbb0095"><span data-dcnode-id="11231" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11229" instrument_node="">).</span></p><div data-dcnode-id="11195"><p data-dcnode-id="11216" id="p0150"><span data-dcnode-id="11227" instrument_node="">A rotary vacuum filter known as a “drum filter,” which follows the mud centrifuge, provides additional filtration (</span><a class="workspace-trigger" data-dcnode-id="11225" href="#f0045" name="bf0045"><span data-dcnode-id="11226" instrument_node="">Fig. 20.8</span></a><span data-dcnode-id="11220"><span data-dcnode-id="11224" instrument_node="">). The rotary filter is covered with a cloth and coated with a 10- to 15-cm layer of </span><a class="topic-link" data-dcnode-id="11222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/diatomaceous-earth" title="Learn more about diatomaceous earth from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11223" instrument_node="">diatomaceous earth</span></a><span data-dcnode-id="11221" instrument_node="">, precoat, or other suitable filtration media. The vacuum draws the hydrolyzate through the layer of precoat, while the drum is turning. The outer layer of precoat traps residual insoluble material released from the starch, gradually becoming clogged. To maintain flow through the precoat, a knife continuously removes this thin layer of material as the drum turns (</span></span><a class="workspace-trigger" data-dcnode-id="11218" href="#bb0095" name="bbb0095"><span data-dcnode-id="11219" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11217" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="11196" id="f0045"><span data-dcnode-id="11206"><img alt="Fig. 20.8" aria-describedby="ca0045" data-dcnode-id="11215" height="334" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-08-9780128119716.jpg&amp;raw"><span data-dcnode-id="11214" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11207"><li data-dcnode-id="11208"><a class="anchor download-link u-font-sans" data-dcnode-id="11209" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-08-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11210"><span data-dcnode-id="11213" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11211"><span data-dcnode-id="11212" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11197"><span data-dcnode-id="11200" id="ca0045"><p data-dcnode-id="11201" id="sp0045"><span class="label" data-dcnode-id="11204"><span data-dcnode-id="11205" instrument_node="">Fig. 20.8</span></span><span data-dcnode-id="11203" instrument_node="">. </span><span data-dcnode-id="11202" instrument_node="">Rotary drum filter.</span></p></span><span data-dcnode-id="11198"><span data-dcnode-id="11199" instrument_node="">Used with permission Kromline -Sanderson, Peapack, NJ.</span></span></span></figure></div></section><section data-dcnode-id="11143" id="s0080"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11192" id="st0095"><span data-dcnode-id="11193" instrument_node="">Decolorizing/Carbon Treatment</span></h3><p data-dcnode-id="11187" id="p0155"><span data-dcnode-id="11191" instrument_node="">Following filtration, the starch hydrolyzate has a faint yellow color and still contains trace levels of many organic impurities that either resided in the corn or were formed by the conditions used in the upstream processing steps. Unless removed, compounds such as amino acids, peptides, and hydroxymethylfurfural can react with reducing sugars, contributing to the formation of undesirable flavors and color in later processing steps (</span><a class="workspace-trigger" data-dcnode-id="11189" href="#bb0095" name="bbb0095"><span data-dcnode-id="11190" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11188" instrument_node="">).</span></p><div data-dcnode-id="11148"><p data-dcnode-id="11167" id="p0160"><span data-dcnode-id="11182"><span data-dcnode-id="11186" instrument_node="">Carbon </span><a class="topic-link" data-dcnode-id="11184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/decolorization" title="Learn more about decolorization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11185" instrument_node="">decolorization</span></a><span data-dcnode-id="11183" instrument_node="">, with granular or powdered carbon, is an effective and common method used to remove these compounds. Because of a corn refiner's scale of operation, granular carbon is most commonly used. The typical granular-carbon decolorization unit is a pulsed-bed column through which the syrup is pumped at a temperature of 70–80°C (</span></span><a class="workspace-trigger" data-dcnode-id="11180" href="#f0050" name="bf0050"><span data-dcnode-id="11181" instrument_node="">Fig. 20.9</span></a><span data-dcnode-id="11171"><span data-dcnode-id="11179" instrument_node="">). The porous carbon </span><a class="topic-link" data-dcnode-id="11177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/granules" title="Learn more about granule from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11178" instrument_node="">granule</span></a><span data-dcnode-id="11172"><span data-dcnode-id="11176" instrument_node=""> has a large surface area, effective at trapping and removing color bodies. As the carbon absorbs impurities, it loses effectiveness and is removed from the column in a process called “slugging.” During slugging, the column is taken off-line, and a charge, or “slug,” of the contaminated carbon is removed from the bottom of the column. At the same time, a charge of freshly regenerated carbon is added to the top of the column and packed down. When the bed is packed sufficiently to prevent channeling or formation of pockets, the column is put back on line. The slug of spent carbon removed from the column is pumped to a wash tank and then to a </span><a class="topic-link" data-dcnode-id="11174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/furnaces" title="Learn more about furnace from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11175" instrument_node="">furnace</span></a><span data-dcnode-id="11173" instrument_node=""> where the carbon is heated through a series of hearths to a temperature of about 950°C, oxidizing the impurities. Following the furnace, the carbon is quenched and pumped to a charge tank, for use as part of a new column. Virgin carbon may be added at this point to make up for losses during regeneration (</span></span></span><a class="workspace-trigger" data-dcnode-id="11169" href="#bb0095" name="bbb0095"><span data-dcnode-id="11170" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11168" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="11149" id="f0050"><span data-dcnode-id="11157"><img alt="Fig. 20.9" aria-describedby="ca0050" data-dcnode-id="11166" height="403" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-09-9780128119716.jpg&amp;raw"><span data-dcnode-id="11165" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11158"><li data-dcnode-id="11159"><a class="anchor download-link u-font-sans" data-dcnode-id="11160" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-09-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11161"><span data-dcnode-id="11164" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11162"><span data-dcnode-id="11163" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11150"><span data-dcnode-id="11151" id="ca0050"><p data-dcnode-id="11152" id="sp0050"><span class="label" data-dcnode-id="11155"><span data-dcnode-id="11156" instrument_node="">Fig. 20.9</span></span><span data-dcnode-id="11154" instrument_node="">. </span><span data-dcnode-id="11153" instrument_node="">Activated carbon system.</span></p></span></span></figure></div><p data-dcnode-id="11146" id="p0165"><span data-dcnode-id="11147" instrument_node="">It is also possible to decolorize syrups in a batch process that uses powdered carbon. In this method, powdered carbon is added to the starch hydrolyzate in a batch tank and allowed to react. After sufficient contact time, the purified hydrolyzate is pumped through a filter to remove the carbon and then is transferred for further refining.</span></p><p data-dcnode-id="11144" id="p0170"><span data-dcnode-id="11145" instrument_node="">Removal of impurities is important not only to improve color and flavor stability in the finished syrup, but also to ensure that the levels of protein and trace components are as low as possible before such operations as isomerization, demineralization, and adsorption-separation.</span></p></section><section data-dcnode-id="11042" id="s0085"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11141" id="st0100"><span data-dcnode-id="11142" instrument_node="">Decolorizing Resins/Demineralization/Ion-Exchange</span></h3><div data-dcnode-id="11117"><p data-dcnode-id="11136" id="p0175"><span data-dcnode-id="11140" instrument_node="">Increasingly, ion-exchange (IX), also known as demineralization (demin), systems are used to remove color bodies and impurities from sweeteners. This may be in addition to, or in place of, a carbon system. Demineralization typically follows carbon treatment and consists of alternating beds of anion and cation removal units (</span><a class="workspace-trigger" data-dcnode-id="11138" href="#f0055" name="bf0055"><span data-dcnode-id="11139" instrument_node="">Fig. 20.10</span></a><span data-dcnode-id="11137" instrument_node="">). In addition to removing salts, these resins are very effective at removing proteins and other color bodies and precursors. As a result, ion-exchanged syrups tend to have better color and color stability than do the equivalent nonion-exchanged products.</span></p><figure class="figure text-xs" data-dcnode-id="11118" id="f0055"><span data-dcnode-id="11126"><img alt="Fig. 20.10" aria-describedby="ca0055" data-dcnode-id="11135" height="271" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-10-9780128119716.jpg&amp;raw"><span data-dcnode-id="11134" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11127"><li data-dcnode-id="11128"><a class="anchor download-link u-font-sans" data-dcnode-id="11129" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-10-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11130"><span data-dcnode-id="11133" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11131"><span data-dcnode-id="11132" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11119"><span data-dcnode-id="11120" id="ca0055"><p data-dcnode-id="11121" id="sp0055"><span class="label" data-dcnode-id="11124"><span data-dcnode-id="11125" instrument_node="">Fig. 20.10</span></span><span data-dcnode-id="11123" instrument_node="">. </span><span data-dcnode-id="11122" instrument_node="">Demineralized syrup six-bed operation.</span></p></span></span></figure></div><p data-dcnode-id="11112" id="p0180"><span data-dcnode-id="11116" instrument_node="">Typical resins used by the industry are strong-acid cation resins and weak-base anion resins either in combination or in separate vessels. The reactor vessel may be designed for upward- or downward-flow operations. The resins become exhausted as they remove impurities, so they are generally used in “trains” consisting of several units, which permits an exhausted unit to be taken off-line and regenerated without interrupting the flow of product. The effective cycle for a given unit may vary widely and is determined by internal parameters based on what ions are leaking through the broken units (</span><a class="workspace-trigger" data-dcnode-id="11114" href="#bb0095" name="bbb0095"><span data-dcnode-id="11115" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11113" instrument_node="">).</span></p><p data-dcnode-id="11043" id="p0185"><span data-dcnode-id="11111" instrument_node="">A partial list of ions removed by demineralization include Na</span><sup data-dcnode-id="11109"><span data-dcnode-id="11110" instrument_node="">+</span></sup><span data-dcnode-id="11108" instrument_node="">, K</span><sup data-dcnode-id="11106"><span data-dcnode-id="11107" instrument_node="">+</span></sup><span data-dcnode-id="11105" instrument_node="">, Ca</span><sup data-dcnode-id="11101"><span data-dcnode-id="11104" instrument_node="">2</span><span data-dcnode-id="11103" instrument_node="">&nbsp;</span><span data-dcnode-id="11102" instrument_node="">+</span></sup><span data-dcnode-id="11100" instrument_node="">, Mg</span><sup data-dcnode-id="11096"><span data-dcnode-id="11099" instrument_node="">2</span><span data-dcnode-id="11098" instrument_node="">&nbsp;</span><span data-dcnode-id="11097" instrument_node="">+</span></sup><span data-dcnode-id="11095" instrument_node="">, Fe</span><sup data-dcnode-id="11091"><span data-dcnode-id="11094" instrument_node="">2</span><span data-dcnode-id="11093" instrument_node="">&nbsp;</span><span data-dcnode-id="11092" instrument_node="">+</span></sup><span data-dcnode-id="11090" instrument_node="">, Cl</span><sup data-dcnode-id="11088"><span data-dcnode-id="11089" instrument_node="">−</span></sup><span data-dcnode-id="11087" instrument_node="">, SO</span><sub data-dcnode-id="11085"><span data-dcnode-id="11086" instrument_node="">4</span></sub><sup data-dcnode-id="11083"><span data-dcnode-id="11084" instrument_node="">2−</span></sup><span data-dcnode-id="11082" instrument_node="">, </span><span class="math" data-dcnode-id="11045"><span class="MathJax_Preview" data-dcnode-id="11081" style=""></span><span class="MathJax_SVG" data-dcnode-id="11048" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msup is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>SO</mi><mn is=&quot;true&quot;>3</mn></msub><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>2</mn><mo is=&quot;true&quot;>&amp;#x2212;</mo></mrow></msup></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="11062" focusable="false" height="2.954ex" role="img" style="vertical-align: -0.618ex;" viewBox="0 -1005.7 2793.3 1271.9" width="6.488ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="11063" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="11064" is="true"><g data-dcnode-id="11072" is="true"><g data-dcnode-id="11076" is="true"><use data-dcnode-id="11079" href="#MJMAIN-53"><path d="M55 507Q55 590 112 647T243 704H257Q342 704 405 641L426 672Q431 679 436 687T446 700L449 704Q450 704 453 704T459 705H463Q466 705 472 699V462L466 456H448Q437 456 435 459T430 479Q413 605 329 646Q292 662 254 662Q201 662 168 626T135 542Q135 508 152 480T200 435Q210 431 286 412T370 389Q427 367 463 314T500 191Q500 110 448 45T301 -21Q245 -21 201 -4T140 27L122 41Q118 36 107 21T87 -7T78 -21Q76 -22 68 -22H64Q61 -22 55 -16V101Q55 220 56 222Q58 227 76 227H89Q95 221 95 214Q95 182 105 151T139 90T205 42T305 24Q352 24 386 62T420 155Q420 198 398 233T340 281Q284 295 266 300Q261 301 239 306T206 314T174 325T141 343T112 367T85 402Q55 451 55 507Z" data-dcnode-id="11080" id="MJMAIN-53" stroke-width="1"></path></use><use data-dcnode-id="11077" href="#MJMAIN-4F" x="556" y="0"><path d="M56 340Q56 423 86 494T164 610T270 680T388 705Q521 705 621 601T722 341Q722 260 693 191T617 75T510 4T388 -22T267 3T160 74T85 189T56 340ZM467 647Q426 665 388 665Q360 665 331 654T269 620T213 549T179 439Q174 411 174 354Q174 144 277 61Q327 20 385 20H389H391Q474 20 537 99Q603 188 603 354Q603 411 598 439Q577 592 467 647Z" data-dcnode-id="11078" id="MJMAIN-4F" stroke-width="1"></path></use></g><g data-dcnode-id="11073" is="true" transform="translate(1335,-150)"><use data-dcnode-id="11074" href="#MJMAIN-33" transform="scale(0.707)"><path d="M127 463Q100 463 85 480T69 524Q69 579 117 622T233 665Q268 665 277 664Q351 652 390 611T430 522Q430 470 396 421T302 350L299 348Q299 347 308 345T337 336T375 315Q457 262 457 175Q457 96 395 37T238 -22Q158 -22 100 21T42 130Q42 158 60 175T105 193Q133 193 151 175T169 130Q169 119 166 110T159 94T148 82T136 74T126 70T118 67L114 66Q165 21 238 21Q293 21 321 74Q338 107 338 175V195Q338 290 274 322Q259 328 213 329L171 330L168 332Q166 335 166 348Q166 366 174 366Q202 366 232 371Q266 376 294 413T322 525V533Q322 590 287 612Q265 626 240 626Q208 626 181 615T143 592T132 580H135Q138 579 143 578T153 573T165 566T175 555T183 540T186 520Q186 498 172 481T127 463Z" data-dcnode-id="11075" id="MJMAIN-33" stroke-width="1"></path></use></g></g><g data-dcnode-id="11065" is="true" transform="translate(1788,432)"><g data-dcnode-id="11069" is="true"><use data-dcnode-id="11070" href="#MJMAIN-32" transform="scale(0.707)"><path d="M109 429Q82 429 66 447T50 491Q50 562 103 614T235 666Q326 666 387 610T449 465Q449 422 429 383T381 315T301 241Q265 210 201 149L142 93L218 92Q375 92 385 97Q392 99 409 186V189H449V186Q448 183 436 95T421 3V0H50V19V31Q50 38 56 46T86 81Q115 113 136 137Q145 147 170 174T204 211T233 244T261 278T284 308T305 340T320 369T333 401T340 431T343 464Q343 527 309 573T212 619Q179 619 154 602T119 569T109 550Q109 549 114 549Q132 549 151 535T170 489Q170 464 154 447T109 429Z" data-dcnode-id="11071" id="MJMAIN-32" stroke-width="1"></path></use></g><g data-dcnode-id="11066" is="true" transform="translate(353,0)"><use data-dcnode-id="11067" href="#MJMAIN-2212" transform="scale(0.707)"><path d="M84 237T84 250T98 270H679Q694 262 694 250T679 230H98Q84 237 84 250Z" data-dcnode-id="11068" id="MJMAIN-2212" stroke-width="1"></path></use></g></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="11049" role="presentation"><math data-dcnode-id="11050" xmlns="http://www.w3.org/1998/Math/MathML"><msup data-dcnode-id="11051" is="true"><msub data-dcnode-id="11057" is="true"><mi data-dcnode-id="11060" is="true"><span data-dcnode-id="11061" instrument_node="">SO</span></mi><mn data-dcnode-id="11058" is="true"><span data-dcnode-id="11059" instrument_node="">3</span></mn></msub><mrow data-dcnode-id="11052" is="true"><mn data-dcnode-id="11055" is="true"><span data-dcnode-id="11056" instrument_node="">2</span></mn><mo data-dcnode-id="11053" is="true"><span data-dcnode-id="11054" instrument_node="">−</span></mo></mrow></msup></math></span></span></span><span data-dcnode-id="11044" instrument_node="">, and weak organic acids.</span></p></section><section data-dcnode-id="11005" id="s0090"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11040" id="st0105"><span data-dcnode-id="11041" instrument_node="">Evaporation</span></h3><div data-dcnode-id="11006"><p data-dcnode-id="11028" id="p0190"><span data-dcnode-id="11035"><span data-dcnode-id="11039" instrument_node="">Evaporating of finish syrups takes place in multiple-effect falling-film, vapor recompression, or mechanical recompression </span><a class="topic-link" data-dcnode-id="11037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/evaporators" title="Learn more about evaporators from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11038" instrument_node="">evaporators</span></a><span data-dcnode-id="11036" instrument_node="">. The syrup is evenly distributed to a series of tubes. During the process of flowing down the walls of the tubes under vacuum, a portion of the water vaporizes, and the remaining liquid discharges at the bottom of the tube. By using multiple effects, where each stage boils at lower pressure and temperature, it is possible to reduce unwanted color development in the syrup to levels below that which can be achieved by using a single-effect process (</span></span><a class="workspace-trigger" data-dcnode-id="11033" href="#bb0095" name="bbb0095"><span data-dcnode-id="11034" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11032" instrument_node="">). A typical four-stage evaporator is shown in </span><a class="workspace-trigger" data-dcnode-id="11030" href="#f0060" name="bf0060"><span data-dcnode-id="11031" instrument_node="">Fig. 20.11</span></a><span data-dcnode-id="11029" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="11007" id="f0060"><span data-dcnode-id="11018"><img alt="Fig. 20.11" aria-describedby="ca0060" data-dcnode-id="11027" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-11-9780128119716.jpg&amp;raw"><span data-dcnode-id="11026" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11019"><li data-dcnode-id="11020"><a class="anchor download-link u-font-sans" data-dcnode-id="11021" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-11-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11022"><span data-dcnode-id="11025" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11023"><span data-dcnode-id="11024" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11008"><span data-dcnode-id="11009" id="ca0060"><p data-dcnode-id="11010" id="sp0060"><span class="label" data-dcnode-id="11016"><span data-dcnode-id="11017" instrument_node="">Fig. 20.11</span></span><span data-dcnode-id="11015" instrument_node="">. </span><span data-dcnode-id="11014" instrument_node="">Typical four-stage </span><a class="topic-link" data-dcnode-id="11012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/evaporators" title="Learn more about evaporator from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11013" instrument_node="">evaporator</span></a><span data-dcnode-id="11011" instrument_node="">.</span></p></span></span></figure></div></section></section><section data-dcnode-id="10756" id="s0095"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11002" id="st0110"><span data-dcnode-id="11003" instrument_node="">Maltodextrins</span></h2><p data-dcnode-id="10983" id="p0195"><span data-dcnode-id="10998"><a class="topic-link" data-dcnode-id="11000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about Maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11001" instrument_node="">Maltodextrins</span></a><span data-dcnode-id="10999" instrument_node=""> are nonsweet, nutritive saccharide polymers derived from starch. They have a DE of less than 20 and consist of </span></span><span class="small-caps" data-dcnode-id="10996"><span data-dcnode-id="10997" instrument_node="">d</span></span><span data-dcnode-id="10987"><span data-dcnode-id="10995" instrument_node="">-glucose units linked primarily through α-(1,4) bonds. Maltodextrins are affirmed as generally recognized as safe (GRAS) in the US Code of Federal Regulations (CFR) (21 CFR 184.1) and are defined there (21 CFR 184.1444). Maltodextrins represent a continuum of partially hydrolyzed starches, which may be referred to as maltodextrins, </span><a class="topic-link" data-dcnode-id="10993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/dextrin" title="Learn more about dextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10994" instrument_node="">dextrins</span></a><span data-dcnode-id="10988"><span data-dcnode-id="10992" instrument_node="">, or hydrolyzed cereal solids. Early manufacturing processes used acid hydrolysis, but more recently, acid-enzyme or enzyme-enzyme processes predominate. Like </span><a class="topic-link" data-dcnode-id="10990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about corn syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10991" instrument_node="">corn syrups</span></a><span data-dcnode-id="10989" instrument_node="">, maltodextrins may be further refined using activated carbon and demineralization (</span></span></span><a class="workspace-trigger" data-dcnode-id="10985" href="#bb0095" name="bbb0095"><span data-dcnode-id="10986" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="10984" instrument_node="">).</span></p><section data-dcnode-id="10970" id="s0100"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10981" id="st0115"><span data-dcnode-id="10982" instrument_node="">Acid Hydrolysis</span></h3><p data-dcnode-id="10971" id="p0200"><span data-dcnode-id="10976"><span data-dcnode-id="10980" instrument_node="">As in the case of corn syrup manufacturing, hydrochloric acid is added to the starch </span><a class="topic-link" data-dcnode-id="10978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/slurries" title="Learn more about slurry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10979" instrument_node="">slurry</span></a><span data-dcnode-id="10977" instrument_node=""> from the mill, lowering the pH from 4–5 to about 1.8. After acidification, the slurry is pumped into a pressure vessel called a converter, where the temperature is raised to about 140°C for about 10</span></span><span data-dcnode-id="10975" instrument_node="">&nbsp;</span><span data-dcnode-id="10974" instrument_node="">min at a pressure of 5</span><span data-dcnode-id="10973" instrument_node="">&nbsp;</span><span data-dcnode-id="10972" instrument_node="">bar. One limitation of acid hydrolysis, which is a single-stage process is that it is difficult to overcome the tendency for the maltodextrin to develop a cloudy appearance because of retrogradation of the linear starch chains present in the solution. To overcome this reaction, it is common to use an enzyme-conversion process to supplement acid hydrolysis.</span></p></section><section data-dcnode-id="10765" id="s0105"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10968" id="st0120"><span data-dcnode-id="10969" instrument_node="">Acid-Enzyme Hydrolysis</span></h3><div data-dcnode-id="10773"><p data-dcnode-id="10945" id="p0205"><span data-dcnode-id="10963"><span data-dcnode-id="10967" instrument_node="">Acid or acid-enzyme hydrolysis in a dual-stage process starts with high-temperature </span><a class="topic-link" data-dcnode-id="10965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/liquefaction" title="Learn more about liquefaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10966" instrument_node="">liquefaction</span></a><span data-dcnode-id="10964" instrument_node=""> to a very low DE—usually around 3. Addition of α-amylase following liquefaction produces a much wider range of syrups with very specific carbohydrate profiles (</span></span><a class="workspace-trigger" data-dcnode-id="10961" href="#bb0020" name="bbb0020"><span data-dcnode-id="10962" instrument_node="">Armbruster, 1974</span></a><span data-dcnode-id="10960" instrument_node="">). α-Amylase addition produces a broad range of nonhazing maltodextrins and corn syrups in the range of 10–30 DE. As in the case of acid hydrolysis, the carbohydrate profiles of these syrups are quite reproducible (</span><a class="workspace-trigger" data-dcnode-id="10958" href="#t0030" name="bt0030"><span data-dcnode-id="10959" instrument_node="">Table 20.5</span></a><span data-dcnode-id="10957" instrument_node="">). The most common types of α-amylases are derived from </span><span data-dcnode-id="10953"><em data-dcnode-id="10954"><a class="topic-link" data-dcnode-id="10955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/bacilli" title="Learn more about Bacillus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10956" instrument_node="">Bacillus</span></a></em></span><span data-dcnode-id="10952" instrument_node=""> sp. and require calcium to stabilize the enzyme at the temperature of conversion. The pH of optimum operation depends on the </span><em data-dcnode-id="10950"><span data-dcnode-id="10951" instrument_node="">Bacillus</span></em><span data-dcnode-id="10949" instrument_node=""> source of the enzyme (</span><a class="workspace-trigger" data-dcnode-id="10947" href="#bb0095" name="bbb0095"><span data-dcnode-id="10948" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="10946" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="10774" id="t0030"><span class="captions" data-dcnode-id="10935"><span data-dcnode-id="10936" id="ca0110"><p data-dcnode-id="10937" id="sp0110"><span class="label" data-dcnode-id="10943"><span data-dcnode-id="10944" instrument_node="">Table 20.5</span></span><span data-dcnode-id="10942" instrument_node="">. </span><span data-dcnode-id="10941" instrument_node="">Typical Carbohydrate Profiles of </span><a class="topic-link" data-dcnode-id="10939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about Maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10940" instrument_node="">Maltodextrins</span></a><span data-dcnode-id="10938" instrument_node=""> Differing in Dextrose Equivalents (% dwb)</span></p></span></span><div class="groups" data-dcnode-id="10777"><table data-dcnode-id="10778"><thead data-dcnode-id="10915"><tr class="valign-bottom" data-dcnode-id="10927"><th class="rowsep-1" data-dcnode-id="10930" rowspan="2" scope="col"><span data-dcnode-id="10934" instrument_node="">Degree of Polymerization (DP)</span><sup data-dcnode-id="10931"><em data-dcnode-id="10932"><span data-dcnode-id="10933" instrument_node="">b</span></em></sup></th><th class="rowsep-1 align-center" colspan="5" data-dcnode-id="10928" scope="col"><span data-dcnode-id="10929" instrument_node="">Dextrose Equivalents</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="10916"><th data-dcnode-id="10925" scope="col"><span data-dcnode-id="10926" instrument_node="">5</span></th><th data-dcnode-id="10923" scope="col"><span data-dcnode-id="10924" instrument_node="">10</span></th><th data-dcnode-id="10921" scope="col"><span data-dcnode-id="10922" instrument_node="">15</span></th><th data-dcnode-id="10919" scope="col"><span data-dcnode-id="10920" instrument_node="">20</span></th><th data-dcnode-id="10917" scope="col"><span data-dcnode-id="10918" instrument_node="">25</span></th></tr></thead><tbody data-dcnode-id="10779"><tr data-dcnode-id="10899"><th data-dcnode-id="10910" scope="row"><span data-dcnode-id="10914" instrument_node="">DP1</span><sup data-dcnode-id="10911"><em data-dcnode-id="10912"><span data-dcnode-id="10913" instrument_node="">b</span></em></sup></th><td data-dcnode-id="10908"><span data-dcnode-id="10909" instrument_node="">0.3</span></td><td data-dcnode-id="10906"><span data-dcnode-id="10907" instrument_node="">0.8</span></td><td data-dcnode-id="10904"><span data-dcnode-id="10905" instrument_node="">1.3</span></td><td data-dcnode-id="10902"><span data-dcnode-id="10903" instrument_node="">2.3</span></td><td data-dcnode-id="10900"> 7" instrument_node="">1.3</span></td><td data-dcnode-id="10854"><span data-dcnode-id="10855" instrument_node="">3.4</span></td><td data-dcnode-id="10852"><span data-dcnode-id="10853" instrument_node="">4.7</span></td><td data-dcnode-id="10850"><span data-dcnode-id="10851" instrument_node="">6.3</span></td><td data-dcnode-id="10848"><span data-dcnode-id="10849" instrument_node="">6.3</span></td></tr><tr data-dcnode-id="10834"><th data-dcnode-id="10845" scope="row"><span data-dcnode-id="10846" instrument_node="">DP7</span></th><td data-dcnode-id="10843"><span data-dcnode-id="10844" instrument_node="">2.4</span></td><td data-dcnode-id="10841"><span data-dcnode-id="10842" instrument_node="">6.8</span></td><td data-dcnode-id="10839"><span data-dcnode-id="10840" instrument_node="">9.1</span></td><td data-dcnode-id="10837"><span data-dcnode-id="10838" instrument_node="">10</span></td><td data-dcnode-id="10835"><span data-dcnode-id="10836" instrument_node="">5.1</span></td></tr><tr data-dcnode-id="10821"><th data-dcnode-id="10832" scope="row"><span data-dcnode-id="10833" instrument_node="">DP8</span></th><td data-dcnode-id="10830"><span data-dcnode-id="10831" instrument_node="">2</span></td><td data-dcnode-id="10828"><span data-dcnode-id="10829" instrument_node="">4.5</span></td><td data-dcnode-id="10826"><span data-dcnode-id="10827" instrument_node="">4.8</span></td><td data-dcnode-id="10824"><span data-dcnode-id="10825" instrument_node="">3.7</span></td><td data-dcnode-id="10822"><span data-dcnode-id="10823" instrument_node="">4.6</span></td></tr><tr data-dcnode-id="10808"><th data-dcnode-id="10819" scope="row"><span data-dcnode-id="10820" instrument_node="">DP9</span></th><td data-dcnode-id="10817"><span data-dcnode-id="10818" instrument_node="">1.8</span></td><td data-dcnode-id="10815"><span data-dcnode-id="10816" instrument_node="">3.1</span></td><td data-dcnode-id="10813"><span data-dcnode-id="10814" instrument_node="">2.9</span></td><td data-dcnode-id="10811"><span data-dcnode-id="10812" instrument_node="">2.1</span></td><td data-dcnode-id="10809"><span data-dcnode-id="10810" instrument_node="">4.1</span></td></tr><tr data-dcnode-id="10795"><th data-dcnode-id="10806" scope="row"><span data-dcnode-id="10807" instrument_node="">DP10</span></th><td data-dcnode-id="10804"><span data-dcnode-id="10805" instrument_node="">1.7</span></td><td data-dcnode-id="10802"><span data-dcnode-id="10803" instrument_node="">2.5</span></td><td data-dcnode-id="10800"><span data-dcnode-id="10801" instrument_node="">2.1</span></td><td data-dcnode-id="10798"><span data-dcnode-id="10799" instrument_node="">1.7</span></td><td data-dcnode-id="10796"><span data-dcnode-id="10797" instrument_node="">3.4</span></td></tr><tr data-dcnode-id="10780"><th data-dcnode-id="10791" scope="row"><span data-dcnode-id="10794" instrument_node="">DP10</span><span data-dcnode-id="10793" instrument_node="">&nbsp;</span><span data-dcnode-id="10792" instrument_node="">+</span></th><td data-dcnode-id="10789"><span data-dcnode-id="10790" instrument_node="">85</span></td><td data-dcnode-id="10787"><span data-dcnode-id="10788" instrument_node="">62.1</span></td><td data-dcnode-id="10785"><span data-dcnode-id="10786" instrument_node="">49.7</span></td><td data-dcnode-id="10783"><span data-dcnode-id="10784" instrument_node="">38.7</span></td><td data-dcnode-id="10781"><span data-dcnode-id="10782" instrument_node="">42.6</span></td></tr></tbody></table></div><p class="source" data-dcnode-id="10775"><span data-dcnode-id="10776" instrument_node="">Data from Grain Processing Corporation, Muscatine, IA.</span></p></div></div><p data-dcnode-id="10766" id="p0210"><span data-dcnode-id="10772" instrument_node="">After inactivation, the slurry is filtered, carbon-treated, and then evaporated. Although higher-DE maltodextrins may be evaporated to 40–42</span><span data-dcnode-id="10771" instrument_node="">&nbsp;</span><span data-dcnode-id="10770" instrument_node="">Bé, these products are inherently unstable. Their high viscosity and high water activity make them difficult and unstable to handle in liquid form. Maltodextrins are most commonly spray-dried and stored as solids (</span><a class="workspace-trigger" data-dcnode-id="10768" href="#bb0095" name="bbb0095"><span data-dcnode-id="10769" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="10767" instrument_node="">).</span></p></section><section data-dcnode-id="10757" id="s0110"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10763" id="st0125"><span data-dcnode-id="10764" instrument_node="">Enzyme-Enzyme</span></h3><p data-dcnode-id="10758" id="p0215"><span data-dcnode-id="10762" instrument_node="">Maltodextrins can also be produced using the same enzyme/enzyme technology used to produce corn syrups and HFCSs. The higher saccharide carbohydrate profiles will be slightly different compared to acid or acid/enzyme conversion due to action of enzymes targeting α-(1,4) and/or α-(1,6) links (</span><a class="workspace-trigger" data-dcnode-id="10760" href="#bb0095" name="bbb0095"><span data-dcnode-id="10761" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="10759" instrument_node="">).</span></p></section></section><section data-dcnode-id="10716" id="s0115"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10754" id="st0130"><span data-dcnode-id="10755" instrument_node="">Dextrose</span></h2><p data-dcnode-id="10752" id="p0220"><span data-dcnode-id="10753" instrument_node="">Dextrose is approved as GRAS in 21 CFR 184.1857. As a solid, it may exist in either the anhydrous or monohydrate form. Further requirements for dextrose are listed under 21 CFR 168.110 (anhydrous) and 21 CFR 168.111 (monohydrate). Dextrose monohydrate may also be referred to as corn sugar.</span></p><div data-dcnode-id="10717"><p data-dcnode-id="10736" id="p0225"><span data-dcnode-id="10751" instrument_node="">In the dextrose production process, the goal is to convert starch into as high a level of dextrose possible (</span><a class="workspace-trigger" data-dcnode-id="10749" href="#f0065" name="bf0065"><span data-dcnode-id="10750" instrument_node="">Fig 20.12</span></a><span data-dcnode-id="10740"><span data-dcnode-id="10744"><span data-dcnode-id="10748" instrument_node="">). The </span><a class="topic-link" data-dcnode-id="10746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/slurries" title="Learn more about slurry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10747" instrument_node="">slurry</span></a><span data-dcnode-id="10745" instrument_node=""> is liquefied in the presence of α-amylase and pumped to a </span></span><a class="topic-link" data-dcnode-id="10742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/saccharification" title="Learn more about saccharification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10743" instrument_node="">saccharification</span></a><span data-dcnode-id="10741" instrument_node=""> tank. During saccharification, an amyloglucosidase enzyme breaks down the starch hydrolyzate to dextrose consisting of levels greater than 95%. Following conversion of the hydrolyzate, the slurry is filtered and carbon-refined before demineralization. At this point, the product can be evaporated to a 71% solids solution containing 95% dextrose. Production of syrups having greater than 98.5% dextrose purity can be achieved using an absorption-separation column to produce a 99% dextrose liquid or by dissolving pure dextrose monohydrate crystals in a solution of hot water. Pure dextrose monohydrate is made by crystallization process. In this process, a dextrose-rich solution is evaporated to about 75%–78% solids and cooled to about 46°C. Seed crystals from the prior batch are mixed with the mass at this point to speed crystallization. A coproduct from dextrose crystallization is called dextrose “greens.” Another minor dextrose product that can also be produced from dextrose monohydrate is anhydrous dextrose (</span></span><a class="workspace-trigger" data-dcnode-id="10738" href="#bb0095" name="bbb0095"><span data-dcnode-id="10739" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="10737" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="10718" id="f0065"><span data-dcnode-id="10726"><img alt="Fig. 20.12" aria-describedby="ca0065" data-dcnode-id="10735" height="490" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-12-9780128119716.jpg&amp;raw"><span data-dcnode-id="10734" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10727"><li data-dcnode-id="10728"><a class="anchor download-link u-font-sans" data-dcnode-id="10729" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-12-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10730"><span data-dcnode-id="10733" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10731"><span data-dcnode-id="10732" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10719"><span data-dcnode-id="10720" id="ca0065"><p data-dcnode-id="10721" id="sp0065"><span class="label" data-dcnode-id="10724"><span data-dcnode-id="10725" instrument_node="">Fig. 20.12</span></span><span data-dcnode-id="10723" instrument_node="">. </span><span data-dcnode-id="10722" instrument_node="">Generic process for manufacturing dextrose.</span></p></span></span></figure></div></section><section data-dcnode-id="10434" id="s0120"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10714" id="st0135"><span data-dcnode-id="10715" instrument_node="">High-Fructose Corn Syrups</span></h2><div data-dcnode-id="10672"><p data-dcnode-id="10694" id="p0230"><span data-dcnode-id="10705"><span data-dcnode-id="10713" instrument_node="">Although advances in enzyme technology enabled the production of relatively high-DE </span><a class="topic-link" data-dcnode-id="10711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about corn syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10712" instrument_node="">corn syrups</span></a><span data-dcnode-id="10706"><span data-dcnode-id="10710" instrument_node="">, these products were still unsuitable for some applications, such as beverages, because of their lack of sweetness and high viscosity. The advent of glucose-isomerase enzymes, capable of isomerizing dextrose to fructose, changed that. High-fructose syrup production begins with the 95% dextrose hydrolyzate coming from </span><a class="topic-link" data-dcnode-id="10708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/saccharification" title="Learn more about saccharification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10709" instrument_node="">saccharification</span></a><span data-dcnode-id="10707" instrument_node=""> (</span></span></span><a class="workspace-trigger" data-dcnode-id="10703" href="#f0070" name="bf0070"><span data-dcnode-id="10704" instrument_node="">Fig. 20.13</span></a><span data-dcnode-id="10698"><span data-dcnode-id="10702" instrument_node="">). Following filtration and carbon treatment, this liquor is demineralized to remove all salts, especially calcium. The liquor is enriched with magnesium, and then pumped through a series of immobilized </span><a class="topic-link" data-dcnode-id="10700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/isomerases" title="Learn more about isomerase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10701" instrument_node="">isomerase</span></a><span data-dcnode-id="10699" instrument_node=""> enzyme columns, or “beds,” known as “iso columns.” The flow rate is controlled to allow sufficient residence time for the dextrose to react with the enzyme and isomerize to a level of 42% fructose. The amount of fructose produced in a column is dependent on the rate of dextrose flow through the column and the activity of the enzyme at that point in time. Because the activity of the enzyme has a constant rate of decay, the rate of dextrose flow must be constantly decreased to maintain a constant fructose level in the discharge. For this reason, banks of these columns are employed so that units can be taken off-line after the decay rate has exceeded two to three half-lives without disrupting the overall rate of production. By removing exhausted enzymes from the columns and replenishing with fresh enzymes, it is possible to maintain a constant flow rate and fructose level to downstream equipment. The discharge from the columns may be further refined before being evaporated to 71% solids as 42% HFCS (</span></span><a class="workspace-trigger" data-dcnode-id="10696" href="#bb0095" name="bbb0095"><span data-dcnode-id="10697" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="10695" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="10673" id="f0070"><span data-dcnode-id="10684"><img alt="Fig. 20.13" aria-describedby="ca0070" data-dcnode-id="10693" height="447" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-13-9780128119716.jpg&amp;raw"><span data-dcnode-id="10692" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10685"><li data-dcnode-id="10686"><a class="anchor download-link u-font-sans" data-dcnode-id="10687" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-13-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10688"><span data-dcnode-id="10691" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10689"><span data-dcnode-id="10690" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10674"><span data-dcnode-id="10675" id="ca0070"><p data-dcnode-id="10676" id="sp0070"><span class="label" data-dcnode-id="10682"><span data-dcnode-id="10683" instrument_node="">Fig. 20.13</span></span><span data-dcnode-id="10681" instrument_node="">. </span><span data-dcnode-id="10680" instrument_node="">Generic process for </span><a class="topic-link" data-dcnode-id="10678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/high-fructose-corn-syrup" title="Learn more about HFCS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10679" instrument_node="">HFCS</span></a><span data-dcnode-id="10677" instrument_node=""> production.</span></p></span></span></figure></div><div data-dcnode-id="10435"><p data-dcnode-id="10658" id="p0235"><span data-dcnode-id="10671" instrument_node="">Some applications require sweetness levels similar to sucrose and/or invert sugar, both syrups with a higher level of sweetness than 42% HFCS. Traditional enzyme isomerization technology cannot produce higher levels of fructose, since the equilibrium level for the glucose-isomerase enzyme is about 48%. This limits the fructose production reaction to a maximum level of about 45%. To produce a sweetener matching the sweetness of invert syrup (about 105% the sweetness of sucrose), a separation process to increase the syrup's fructose content is needed. The separation technology necessary to do that began to appear in the 1970s (</span><a class="workspace-trigger" data-dcnode-id="10669" href="#bb0140" name="bbb0140"><span data-dcnode-id="10670" instrument_node="">Melaja, 1972</span></a><span data-dcnode-id="10668" instrument_node="">). The enrichment process begins by adjusting the 42% fructose-containing liquor to a 35%–40% solids content prior to pumping into an adsorption separator. The relative difference in the resin's affinity for dextrose and for fructose allows separation of the carbohydrates into two enriched peaks (</span><a class="workspace-trigger" data-dcnode-id="10666" href="#f0075" name="bf0075"><span data-dcnode-id="10667" instrument_node="">Fig. 20.14</span></a><span data-dcnode-id="10665" instrument_node="">), one containing fructose, the other dextrose. Through a series of automatic valves, it is possible to draw off an enriched stream containing about 90% fructose. Similarly, the enriched stream of about 90% dextrose or “the raffinate” can be removed and returned to be blended with the saccharification product for further processing. By blending the enriched 90% fructose with the 42% fructose product, a blended product containing 55% fructose and 40% dextrose is created. This product is demineralized and carbon-treated before being evaporated to 77% solids. Both 42% and 55% HFCS are widely used in many food applications to replace sugar; however, because the beverage industry is the largest consumer of both 55% and 42% HFCS, these products are manufactured to meet the guidelines established by the International Society of Soft Drink Technologists (ISBT) (</span><a class="workspace-trigger" data-dcnode-id="10663" href="#t0035" name="bt0035"><span data-dcnode-id="10664" instrument_node="">Table 20.6</span></a><span data-dcnode-id="10662" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="10660" href="#bb0095" name="bbb0095"><span data-dcnode-id="10661" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="10659" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="10637" id="f0075"><span data-dcnode-id="10648"><img alt="Fig. 20.14" aria-describedby="ca0075" data-dcnode-id="10657" height="230" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-14-9780128119716.jpg&amp;raw"><span data-dcnode-id="10656" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10649"><li data-dcnode-id="10650"><a class="anchor download-link u-font-sans" data-dcnode-id="10651" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-14-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10652"><span data-dcnode-id="10655" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10653"><span data-dcnode-id="10654" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10638"><span data-dcnode-id="10639" id="ca0075"><p data-dcnode-id="10640" id="sp0075"><span class="label" data-dcnode-id="10646"><span data-dcnode-id="10647" instrument_node="">Fig. 20.14</span></span><span data-dcnode-id="10645" instrument_node="">. </span><span data-dcnode-id="10644" instrument_node="">Separation of fructose using </span><a class="topic-link" data-dcnode-id="10642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/chromatography" title="Learn more about chromatography from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10643" instrument_node="">chromatography</span></a><span data-dcnode-id="10641" instrument_node="">.</span></p></span></span></figure><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="10436" id="t0035"><span class="captions" data-dcnode-id="10630"><span data-dcnode-id="10631" id="ca0115"><p data-dcnode-id="10632" id="sp0115"><span class="label" data-dcnode-id="10635"><span data-dcnode-id="10636" instrument_node="">Table 20.6</span></span><span data-dcnode-id="10634" instrument_node="">. </span><span data-dcnode-id="10633" instrument_node="">Quality Guidelines for High-Fructose Corn Syrups (HFCS)</span></p></span></span><div class="groups" data-dcnode-id="10449"><table data-dcnode-id="10450"><thead data-dcnode-id="10620"><tr class="valign-top" data-dcnode-id="10626"><th class="rowsep-1" data-dcnode-id="10629" rowspan="2" scope="col"></th><th class="rowsep-1" colspan="2" data-dcnode-id="10627" scope="col"><span data-dcnode-id="10628" instrument_node="">High-Fructose Corn Syrup (HFCS)</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="10621"><th data-dcnode-id="10624" scope="col"><span data-dcnode-id="10625" instrument_node="">42% HFCS</span></th><th data-dcnode-id="10622" scope="col"><span data-dcnode-id="10623" instrument_node="">55% HFCS</span></th></tr></thead><tbody data-dcnode-id="10451"><tr data-dcnode-id="10605"><th data-dcnode-id="10618" scope="row"><span data-dcnode-id="10619" instrument_node="">Solids</span></th><td data-dcnode-id="10612"><span data-dcnode-id="10617" instrument_node="">71.0</span><span data-dcnode-id="10616" instrument_node="">&nbsp;</span><span data-dcnode-id="10615" instrument_node="">±</span><span data-dcnode-id="10614" instrument_node="">&nbsp;</span><span data-dcnode-id="10613" instrument_node="">0.5%</span></td><td data-dcnode-id="10606"><span data-dcnode-id="10611" instrument_node="">77.0</span><span data-dcnode-id="10610" instrument_node="">&nbsp;</span><span data-dcnode-id="10609" instrument_node="">±</span><span data-dcnode-id="10608" instrument_node="">&nbsp;</span><span data-dcnode-id="10607" instrument_node="">0.5%</span></td></tr><tr data-dcnode-id="10594"><th data-dcnode-id="10603" scope="row"><span data-dcnode-id="10604" instrument_node="">Conductivity (represents ash)</span></th><td data-dcnode-id="10599"><span data-dcnode-id="10602" instrument_node="">70</span><span data-dcnode-id="10601" instrument_node="">&nbsp;</span><span data-dcnode-id="10600" instrument_node="">μmhos/cm maximum</span></td><td data-dcnode-id="10595"><span data-dcnode-id="10598" instrument_node="">70</span><span data-dcnode-id="10597" instrument_node="">&nbsp;</span><span data-dcnode-id="10596" instrument_node="">μmhos/cm maximum</span></td></tr><tr data-dcnode-id="10587"><th data-dcnode-id="10592" scope="row"><span data-dcnode-id="10593" instrument_node="">Fructose</span></th><td data-dcnode-id="10590"><span data-dcnode-id="10591" instrument_node="">42% minimum</span></td><td data-dcnode-id="10588"><span data-dcnode-id="10589" instrument_node="">55% minimum</span></td></tr><tr data-dcnode-id="10580"><th data-dcnode-id="10585" scope="row"><span data-dcnode-id="10586" instrument_node="">Dextrose and fructose</span></th><td data-dcnode-id="10583"><span data-dcnode-id="10584" instrument_node="">92% minimum</span></td><td data-dcnode-id="10581"><span data-dcnode-id="10582" instrument_node="">95% minimum</span></td></tr><tr data-dcnode-id="10569"><th data-dcnode-id="10578" scope="row"><span data-dcnode-id="10579" instrument_node="">Color</span></th><td data-dcnode-id="10574"><span data-dcnode-id="10577" instrument_node="">1.15 CRA (×</span><span data-dcnode-id="10576" instrument_node="">&nbsp;</span><span data-dcnode-id="10575" instrument_node="">100) maximum</span></td><td data-dcnode-id="10570"><span data-dcnode-id="10573" instrument_node="">1.15 CRA (×</span><span data-dcnode-id="10572" instrument_node="">&nbsp;</span><span data-dcnode-id="10571" instrument_node="">100)
