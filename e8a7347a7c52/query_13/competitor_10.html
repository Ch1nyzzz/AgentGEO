</span><meta content="In the early 1800s, the process to make sweeteners from starch was discovered and developed in Europe. It quickly found its way to the United States w…" data-dcnode-id="12924" property="og:description"><span data-dcnode-id="12923" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0010&quot;><p id=&quot;sp0210&quot;>In the early 1800s, the process to make sweeteners from starch was discovered and developed in Europe. It quickly found its way to the United States where starch extracted from corn became the raw material of choice to produce sweeteners. Corn sweetener use slowly grew as applications and functionality were developed in food and industrial products. Eventually, changes in technology helped refiners create new and better tasting products. The food industry found these products to be functional, helping create good tasting, shelf-stable products. Corn milling and sweetener-refining capacity accelerated beginning in the mid-1970s with the development of high-fructose corn syrup (HFCS) and later ethanol for fuel. Production of sweeteners and maltodextrins by acid, acid/enzyme, and enzyme/enzyme techniques has improved incrementally. Production of sweeteners, including HFCS, peaked in 1999 and has been slowly declining in response to the changing consumer. This section presents an updated overview about how sweeteners, derived from corn, are produced and are then used to create a wide variety of food, beverages, and industrial products.</p></div></div></div>" data-dcnode-id="12922" lang="en" name="citation_abstract"><span data-dcnode-id="12921" instrument_node="">

"Persistent link using digital object identifier"><span data-dcnode-id="12465" instrument_node="">https://doi.org/10.1016/B978-0-12-811971-6.00020-6</span></a><a class="rights-and-content" data-dcnode-id="12462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DB9780128119716000206%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="12463" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="12460"></section><section class="ReferencedArticles" data-dcnode-id="12459"></section><div class="PageDivider" data-dcnode-id="12458"></div><div class="Abstracts u-font-serif" data-dcnode-id="12448" id="abstracts"><div class="abstract author" data-dcnode-id="12449" id="ab0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12456"><span data-dcnode-id="12457" instrument_node="">Abstract</span></h2><div data-dcnode-id="12450" id="as0010"><p data-dcnode-id="12451" id="sp0210"><span data-dcnode-id="12455" instrument_node="">In the early 1800s, the process to make sweeteners from starch was discovered and developed in Europe. It quickly found its way to the United States where starch extracted from corn became the raw material of choice to produce sweeteners. Corn sweetener use slowly grew as applications and functionality were developed in food and industrial products. Eventually, changes in technology helped refiners create new and better tasting products. The food industry found these products to be functional, helping create good tasting, shelf-stable products. Corn milling and sweetener-refining capacity accelerated beginning in the mid-1970s with the development of high-fructose corn syrup (HFCS) and later ethanol for fuel. Production of sweeteners and </span><a class="topic-link" data-dcnode-id="12453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12454" instrument_node="">maltodextrins</span></a><span data-dcnode-id="12452" instrument_node=""> by acid, acid/enzyme, and enzyme/enzyme techniques has improved incrementally. Production of sweeteners, including HFCS, peaked in 1999 and has been slowly declining in response to the changing consumer. This section presents an updated overview about how sweeteners, derived from corn, are produced and are then used to create a wide variety of food, beverages, and industrial products.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="12425" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="12437"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="12438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978012811971600019X"><svg class="icon icon-navigate-left" data-dcnode-id="12446" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="12447"></path></svg><span class="button-alternative-text" data-dcnode-id="12439"><strong data-dcnode-id="12444"><span data-dcnode-id="12445" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="12442"><span data-dcnode-id="12443" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="12440"><span data-dcnode-id="12441" instrument_node=""> in book</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="12426"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="12427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128119716000218"><span class="button-alternative-text" data-dcnode-id="12430"><strong data-dcnode-id="12435"><span data-dcnode-id="12436" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="12433"><span data-dcnode-id="12434" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="12431"><span data-dcnode-id="12432" instrument_node=""> in book</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="12428" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="12429"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="12403"><div class="keywords-section" data-dcnode-id="12404" id="ks0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12423"><span data-dcnode-id="12424" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="12420" id="kw0010"><span data-dcnode-id="12421" id="tx0010"><span data-dcnode-id="12422" instrument_node="">Corn sweetener</span></span></div><div class="keyword" data-dcnode-id="12417" id="kw0015"><span data-dcnode-id="12418" id="tx0015"><span data-dcnode-id="12419" instrument_node="">Corn syrup</span></span></div><div class="keyword" data-dcnode-id="12414" id="kw0020"><span data-dcnode-id="12415" id="tx0020"><span data-dcnode-id="12416" instrument_node="">Glucose syrup</span></span></div><div class="keyword" data-dcnode-id="12411" id="kw0025"><span data-dcnode-id="12412" id="tx0025"><span data-dcnode-id="12413" instrument_node="">High-fructose corn syrup</span></span></div><div class="keyword" data-dcnode-id="12408" id="kw0030"><span data-dcnode-id="12409" id="tx0030"><span data-dcnode-id="12410" instrument_node="">Maltodextrins</span></span></div><div class="keyword" data-dcnode-id="12405" id="kw0035"><span data-dcnode-id="12406" id="tx0035"><span data-dcnode-id="12407" instrument_node="">Corn syrup solids</span></span></div></div></div><span data-dcnode-id="12402" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="2803" id="body"><section data-dcnode-id="12397" id="ac0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12400" id="st0020"><span data-dcnode-id="12401" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="12398" id="p0010"><span data-dcnode-id="12399" instrument_node="">I want to thank Cargill Starches and Sweeteners North America for giving me the time to research and update this chapter. I also want to thank Larry Hobbs, a colleague and friend, for his authoring the Second Edition. It made updating the Third Edition enjoyable. Any errors that remain are my responsibility.</span></p></section><div data-dcnode-id="2804"><section data-dcnode-id="12093" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12395" id="st0025"><span data-dcnode-id="12396" instrument_node="">Introduction</span></h2><p data-dcnode-id="12383" id="p0015"><span data-dcnode-id="12390"><span data-dcnode-id="12394" instrument_node="">The development of sweeteners from starch has its roots in the early 1800s and the Napoleonic wars. The English blockade of French ports effectively prevented sugar from being imported into France from their </span><a class="topic-link" data-dcnode-id="12392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/plantations" title="Learn more about plantations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12393" instrument_node="">plantations</span></a><span data-dcnode-id="12391" instrument_node=""> in the Caribbean. Emperor Napoleon Bonaparte challenged the scientific community to find another source of “sugar.” From this challenge, two key “sugar” innovations developed: sugar from beets and sweeteners from starch. Production of sugar from beets began in 1802 and was accelerated in 1806. Sweeteners from starch, taking advantage of work by Kirchoff, were developed in 1811 (</span></span><a class="workspace-trigger" data-dcnode-id="12388" href="#bb0130" name="bbb0130"><span data-dcnode-id="12389" instrument_node="">Laszlo and Rizzuto, 1990</span></a><span data-dcnode-id="12387" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="12385" href="#bb0025" name="bbb0025"><span data-dcnode-id="12386" instrument_node="">BeMiller and Whistler, 2009</span></a><span data-dcnode-id="12384" instrument_node="">).</span></p><p data-dcnode-id="12372" id="p0020"><span data-dcnode-id="12378"><span data-dcnode-id="12382" instrument_node="">Starch production technology transferred from Europe to United States in the early 1800s where crudely refined </span><a class="topic-link" data-dcnode-id="12380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/starch-products" title="Learn more about starch products from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12381" instrument_node="">starch products</span></a><span data-dcnode-id="12379" instrument_node=""> were made using maize or wheat. In 1831, the first syrup plant, having a daily production rate of 113.5</span></span><span data-dcnode-id="12377" instrument_node="">&nbsp;</span><span data-dcnode-id="12376" instrument_node="">L (30 gallons), was started and soon closed, in Sacket Harbor, NY. Around 1842, Thomas Kingsford is identified as having developed an alkaline extraction process at the Wm. Colgate &amp; Company starch factory in New Jersey. Soon afterward, during 1849, Kingsford opened his own starch plant in Oswego, NY. Others followed and by 1880, there were 140 starch factories in the United States using different raw materials to produce starch products. These were small facilities and their combined demand totaled only about 1% of the corn crop. High sucrose prices began prompting the use of starch as an intermediate to produce corn sweeteners. By 1883, 30 facilities were producing glucose syrups, although only 8 companies were in operation at the turn of the century (</span><a class="workspace-trigger" data-dcnode-id="12374" href="#bb0230" name="bbb0230"><span data-dcnode-id="12375" instrument_node="">Whistler, 1984</span></a><span data-dcnode-id="12373" instrument_node="">).</span></p><p data-dcnode-id="12364" id="p0025"><span data-dcnode-id="12371" instrument_node="">These early corn-refining facilities had an average grind of about 229 metric tons (equivalent to 9000</span><span data-dcnode-id="12370" instrument_node="">&nbsp;</span><span data-dcnode-id="12365"><span data-dcnode-id="12369" instrument_node="">bu) per day and were very labor-intensive. Starch separation consisted of pouring the </span><a class="topic-link" data-dcnode-id="12367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/slurries" title="Learn more about slurry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12368" instrument_node="">slurry</span></a><span data-dcnode-id="12366" instrument_node=""> across a washboard-like apparatus or down a trough and then rinsing the starch-gluten mixture with water until the two were separated. Another shortage of sucrose during World War I forced many food manufacturers to substitute corn sweeteners in their formulas, which resulted in increasing corn-refining capacity by more than 60%. Applications for corn sweeteners were still limited by the inherent lack of sweetness in the low-conversion products that the industry made.</span></span></p><p data-dcnode-id="12353" id="p0030"><span data-dcnode-id="12363" instrument_node="">By the 1920s, commercial processes to make high-purity crystalline dextrose had been developed (</span><a class="workspace-trigger" data-dcnode-id="12361" href="#bb0150" name="bbb0150"><span data-dcnode-id="12362" instrument_node="">Newkirk, 1923</span></a><span data-dcnode-id="12360" instrument_node="">). In 1940, a patent was issued for an acid-enzyme hydrolysis process that enabled production of higher dextrose equivalent (DE) and sweeter syrups (</span><a class="workspace-trigger" data-dcnode-id="12358" href="#bb0065" name="bbb0065"><span data-dcnode-id="12359" instrument_node="">Dale and Langlois, 1940</span></a><span data-dcnode-id="12357" instrument_node="">). Labor shortages and increased demand brought more automation during World War II and almost doubled the industry grind to 2.77 million metric tons (110 million bushels). By 1942, enzyme technology allowed the production of syrups with dextrose levels as high as 90% (</span><a class="workspace-trigger" data-dcnode-id="12355" href="#bb0125" name="bbb0125"><span data-dcnode-id="12356" instrument_node="">Langlois, 1942</span></a><span data-dcnode-id="12354" instrument_node="">). At the same time, advances in carbon- and ion-exchange technology dramatically improved the color, stability, and sensory characteristics of these new syrups.</span></p><div data-dcnode-id="12288"><p data-dcnode-id="12328" id="p0035"><span data-dcnode-id="12352" instrument_node="">The next advance in enzyme technology was the development of a commercial glucose-isomerase enzyme. Although syrups containing 20% fructose were available in 1920 (</span><a class="workspace-trigger" data-dcnode-id="12350" href="#bb0045" name="bbb0045"><span data-dcnode-id="12351" instrument_node="">Cantor and Hobbs, 1944</span></a><span data-dcnode-id="12349" instrument_node="">), the technology to achieve the level of sweetness necessary for sucrose substitution was not available until 1966 (</span><a class="workspace-trigger" data-dcnode-id="12347" href="#bb0185" name="bbb0185"><span data-dcnode-id="12348" instrument_node="">Takasaki and Tanabe, 1971</span></a><span data-dcnode-id="12342"><span data-dcnode-id="12346" instrument_node="">). Unfortunately, the conversion to a 42% fructose product was not suitable for all applications. Further advances in separation technology resulted in 55% and 90% high-fructose </span><a class="topic-link" data-dcnode-id="12344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about corn syrup from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12345" instrument_node="">corn syrup</span></a><span data-dcnode-id="12343" instrument_node=""> (HFCS), which had a profound impact on the corn-refining industry (</span></span><a class="workspace-trigger" data-dcnode-id="12340" href="#bb0135" name="bbb0135"><span data-dcnode-id="12341" instrument_node="">Long, 1978</span></a><span data-dcnode-id="12339" instrument_node="">). Today's corn-wet-milling facilities are quite large (</span><a class="workspace-trigger" data-dcnode-id="12337" href="#f0010" name="bf0010"><span data-dcnode-id="12338" instrument_node="">Fig. 20.1</span></a><span data-dcnode-id="12332"><span data-dcnode-id="12336" instrument_node="">). In addition to sweeteners and starches, a broad range of products including vitamins, amino acids, ethanol, </span><a class="topic-link" data-dcnode-id="12334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/polyol" title="Learn more about polyols from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12335" instrument_node="">polyols</span></a><span data-dcnode-id="12333" instrument_node="">, and gums (</span></span><a class="workspace-trigger" data-dcnode-id="12330" href="#f0015" name="bf0015"><span data-dcnode-id="12331" instrument_node="">Fig. 20.2</span></a><span data-dcnode-id="12329" instrument_node="">) may be produced on the same site.</span></p><figure class="figure text-xs" data-dcnode-id="12307" id="f0010"><span data-dcnode-id="12318"><img alt="Fig. 20.1" aria-describedby="ca0010" data-dcnode-id="12327" height="290" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-01-9780128119716.jpg&amp;raw"><span data-dcnode-id="12326" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="12319"><li data-dcnode-id="12320"><a class="anchor download-link u-font-sans" data-dcnode-id="12321" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-01-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="12322"><span data-dcnode-id="12325" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12323"><span data-dcnode-id="12324" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="12308"><span data-dcnode-id="12309" id="ca0010"><p data-dcnode-id="12310" id="sp0010"><span class="label" data-dcnode-id="12316"><span data-dcnode-id="12317" instrument_node="">Fig. 20.1</span></span><span data-dcnode-id="12315" instrument_node="">. </span><span data-dcnode-id="12314" instrument_node="">Typical </span><a class="topic-link" data-dcnode-id="12312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about corn syrup from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12313" instrument_node="">corn syrup</span></a><span data-dcnode-id="12311" instrument_node=""> industrial plant.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="12289" id="f0015"><span data-dcnode-id="12297"><img alt="Fig. 20.2" aria-describedby="ca0015" data-dcnode-id="12306" height="448" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-02-9780128119716.jpg&amp;raw"><span data-dcnode-id="12305" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="12298"><li data-dcnode-id="12299"><a class="anchor download-link u-font-sans" data-dcnode-id="12300" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-02-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="12301"><span data-dcnode-id="12304" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12302"><span data-dcnode-id="12303" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="12290"><span data-dcnode-id="12291" id="ca0015"><p data-dcnode-id="12292" id="sp0015"><span class="label" data-dcnode-id="12295"><span data-dcnode-id="12296" instrument_node="">Fig. 20.2</span></span><span data-dcnode-id="12294" instrument_node="">. </span><span data-dcnode-id="12293" instrument_node="">Starch conversion products.</span></p></span></span></figure></div><div data-dcnode-id="12099"><p data-dcnode-id="12259" id="p0040"><span data-dcnode-id="12283"><span data-dcnode-id="12287" instrument_node="">The type of corn commonly used by US refiners is no. 2 yellow dent, which refers to the standards established by the </span><a class="topic-link" data-dcnode-id="12285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/federal-grain-inspection-service" title="Learn more about Federal Grain Inspection Service from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12286" instrument_node="">Federal Grain Inspection Service</span></a><span data-dcnode-id="12284" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="12281" href="#bb0210" name="bbb0210"><span data-dcnode-id="12282" instrument_node="">USDA-FGIS, 1996</span></a><span data-dcnode-id="12280" instrument_node="">). In 2016, US farmers harvested an estimated 383 million tons or 15.1 billion bushels of corn, with an average of 11.74</span><span data-dcnode-id="12279" instrument_node="">&nbsp;</span><span data-dcnode-id="12278" instrument_node="">tons/ha or 174.6</span><span data-dcnode-id="12277" instrument_node="">&nbsp;</span><span data-dcnode-id="12276" instrument_node="">bu/acre (USDA-FGIS, 1996s). It is estimated that 27.7 million metric tons or 1.09 billion bushels, nearly 7.3% of the crop, went to the corn-refining industry to produce corn-derived products (</span><a class="workspace-trigger" data-dcnode-id="12274" href="#bb0060" name="bbb0060"><span data-dcnode-id="12275" instrument_node="">CRA, 2017</span></a><span data-dcnode-id="12273" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="12271" href="#bb0205" name="bbb0205"><span data-dcnode-id="12272" instrument_node="">USDA/ERS, 2018</span></a><span data-dcnode-id="12266"><span data-dcnode-id="12270" instrument_node="">). From this crop, about 12.12 million tons (26.7 billion lbs.) of refined corn sweeteners, dry basis, including glucose syrups, high-fructose syrups, high-maltose syrups, dextrose, corn syrup solids, and </span><a class="topic-link" data-dcnode-id="12268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12269" instrument_node="">maltodextrins</span></a><span data-dcnode-id="12267" instrument_node="">, was produced (</span></span><a class="workspace-trigger" data-dcnode-id="12264" href="#bb0060" name="bbb0060"><span data-dcnode-id="12265" instrument_node="">CRA, 2017</span></a><span data-dcnode-id="12263" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="12261" href="#t0010" name="bt0010"><span data-dcnode-id="12262" instrument_node="">Table 20.1</span></a><span data-dcnode-id="12260" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="12100" id="t0010"><span class="captions" data-dcnode-id="12248"><span data-dcnode-id="12249" id="ca0090"><p data-dcnode-id="12250" id="sp0090"><span class="label" data-dcnode-id="12257"><span data-dcnode-id="12258" instrument_node="">Table 20.1</span></span><span data-dcnode-id="12256" instrument_node="">. </span><span data-dcnode-id="12255" instrument_node="">Shipments of Products of the Corn-Refining Industry in 2016</span><a class="workspace-trigger" data-dcnode-id="12251" href="#tf0010" name="btf0010"><sup data-dcnode-id="12252"><em data-dcnode-id="12253"><span data-dcnode-id="12254" instrument_node="">a</span></em></sup></a></p></span></span><div class="groups" data-dcnode-id="12142"><table data-dcnode-id="12143"><thead data-dcnode-id="12232"><tr class="rowsep-1 valign-top" data-dcnode-id="12233"><th data-dcnode-id="12246" scope="col"><span data-dcnode-id="12247" instrument_node="">Product</span></th><th data-dcnode-id="12240" scope="col"><span data-dcnode-id="12245" instrument_node="">Pounds (Billion) Commercial Weight</span><a class="workspace-trigger" data-dcnode-id="12241" href="#tf0015" name="btf0015"><sup data-dcnode-id="12242"><em data-dcnode-id="12243"><span data-dcnode-id="12244" instrument_node="">b</span></em></sup></a></th><th data-dcnode-id="12234" scope="col"><span data-dcnode-id="12239" instrument_node="">In Million Metric Tons</span><a class="workspace-trigger" data-dcnode-id="12235" href="#tf0015" name="btf0015"><sup data-dcnode-id="12236"><em data-dcnode-id="12237"><span data-dcnode-id="12238" instrument_node="">b</span></em></sup></a></th></tr></th "12157" scope="row"><span data-dcnode-id="12158" instrument_node="">Corn gluten meal</span></th><td class="align-char" data-dcnode-id="12155"><span data-dcnode-id="12156" instrument_node="">1.92</span></td><td class="align-char" data-dcnode-id="12153"><span data-dcnode-id="12154" instrument_node="">0.87</span></td></tr><tr data-dcnode-id="12145"><th data-dcnode-id="12150" scope="row"><span data-dcnode-id="12151" instrument_node="">Steepwater</span></th><td class="align-char" data-dcnode-id="12148"><span data-dcnode-id="12149" instrument_node="">2.97</span></td><td class="align-char" data-dcnode-id="12146"><span data-dcnode-id="12147" instrument_node="">1.35</span></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="12103"><dt data-dcnode-id="12140" id="tf0010"><span data-dcnode-id="12141" instrument_node="">a</span></dt><dd data-dcnode-id="12137"><p data-dcnode-id="12138" id="np0010"><span data-dcnode-id="12139" instrument_node="">Data compiled for the Corn Refiners Association by Vault Consulting LLC. Statistics represent shipments by members of the Association.</span></p></dd><dt data-dcnode-id="12135" id="tf0015"><span data-dcnode-id="12136" instrument_node="">b</span></dt><dd data-dcnode-id="12132"><p data-dcnode-id="12133" id="np0015"><span data-dcnode-id="12134" instrument_node="">Shipments are in pounds/metric tons commercial weight, representing “as is” or syrup basis, and do not include coproducts derived from alcohol production.</span></p></dd><dt data-dcnode-id="12130" id="tf0020"><span data-dcnode-id="12131" instrument_node="">c</span></dt><dd data-dcnode-id="12116"><p data-dcnode-id="12117" id="np0020"><span data-dcnode-id="12121"><span data-dcnode-id="12129" instrument_node="">Includes </span><a class="topic-link" data-dcnode-id="12127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-starch" title="Learn more about corn starch from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12128" instrument_node="">corn starch</span></a><span data-dcnode-id="12122"><span data-dcnode-id="12126" instrument_node="">, </span><a class="topic-link" data-dcnode-id="12124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/modified-starch" title="Learn more about modified starch from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12125" instrument_node="">modified starch</span></a><span data-dcnode-id="12123" instrument_node="">, and </span></span></span><a class="topic-link" data-dcnode-id="12119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/dextrin" title="Learn more about dextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12120" instrument_node="">dextrins</span></a><span data-dcnode-id="12118" instrument_node="">.</span></p></dd><dt data-dcnode-id="12114" id="tf0025"><span data-dcnode-id="12115" instrument_node="">d</span></dt><dd data-dcnode-id="12104"><p data-dcnode-id="12105" id="np0025"><span data-dcnode-id="12113" instrument_node="">Includes glucose syrup, high-fructose </span><a class="topic-link" data-dcnode-id="12111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about corn syrup from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12112" instrument_node="">corn syrup</span></a><span data-dcnode-id="12106"><span data-dcnode-id="12110" instrument_node=""> dextrose and corn syrup solids, and </span><a class="topic-link" data-dcnode-id="12108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12109" instrument_node="">maltodextrins</span></a><span data-dcnode-id="12107" instrument_node="">.</span></span></p></dd></dl><p class="source" data-dcnode-id="12101"><span data-dcnode-id="12102" instrument_node="">From CRA, 2017. Industry Overview 2017. Corn Refiners Association, Washington, DC, pp. 8–11.</span></p></div></div><p data-dcnode-id="12094" id="p0045"><span data-dcnode-id="12098" instrument_node="">Consumer interest in products produced from ingredients identified as Not </span><a class="topic-link" data-dcnode-id="12096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/genetically-modified-organisms" title="Learn more about Genetically Modified Organisms from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12097" instrument_node="">Genetically Modified Organisms</span></a><span data-dcnode-id="12095" instrument_node=""> (non-GMO) has been increasing. Today, a limited variety of non-GMO corn syrups are available from some corn sweetener producers.</span></p></section><section data-dcnode-id="12041" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12091" id="st0030"><span data-dcnode-id="12092" instrument_node="">Process Overview</span></h2><p data-dcnode-id="12070" id="p0050"><span data-dcnode-id="12074"><span data-dcnode-id="12090" instrument_node="">A </span><a class="topic-link" data-dcnode-id="12088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/slurries" title="Learn more about slurry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12089" instrument_node="">slurry</span></a><span data-dcnode-id="12075"><span data-dcnode-id="12083"><span data-dcnode-id="12087" instrument_node=""> of purified starch, sourced from the wet-mill, is the starting raw material for corn sweetener production. USDA #2 yellow </span><a class="topic-link" data-dcnode-id="12085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/dent-corn" title="Learn more about dent corn from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12086" instrument_node="">dent corn</span></a><span data-dcnode-id="12084" instrument_node=""> is the most common corn variety used for starch sourcing. It has a starch composition of 75% </span></span><a class="topic-link" data-dcnode-id="12081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/amylopectin" title="Learn more about amylopectin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12082" instrument_node="">amylopectin</span></a><span data-dcnode-id="12076"><span data-dcnode-id="12080" instrument_node="">, a branched starch having both α-(1,4) and α-(1,6) linkages, and 25% </span><a class="topic-link" data-dcnode-id="12078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/amylose" title="Learn more about amylose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12079" instrument_node="">amylose</span></a><span data-dcnode-id="12077" instrument_node="">, a straight chained starch consisting of α-(1,4) linkages. However, starch from waxy or high amylose corn can also be used. The starch slurry should be as pure as possible with little residual protein to reduce purification burden later in the process (</span></span></span></span><a class="workspace-trigger" data-dcnode-id="12072" href="#bb0095" name="bbb0095"><span data-dcnode-id="12073" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="12071" instrument_node="">).</span></p><div data-dcnode-id="12042"><p data-dcnode-id="12061" id="p0055"><span data-dcnode-id="12065"><span data-dcnode-id="12069" instrument_node="">Producing sweeteners from starch involves several unit operations that are essentially the same whether the product is a corn syrup, high-fructose syrup, crystalline dextrose, or </span><a class="topic-link" data-dcnode-id="12067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maltodextrin" title="Learn more about maltodextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12068" instrument_node="">maltodextrins</span></a><span data-dcnode-id="12066" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="12063" href="#f0020" name="bf0020"><span data-dcnode-id="12064" instrument_node="">Fig. 20.3</span></a><span data-dcnode-id="12062" instrument_node="">). These common features are: starch gelatinization/liquefaction/saccharification, purification, and concentration to a final solids or % dry solids level. Final product quality must meet a set of specifications that include measurable characteristics such as Dextrose Equivalence (DE), carbohydrate profile, solids, and pH.</span></p><figure class="figure text-xs" data-dcnode-id="12043" id="f0020"><span data-dcnode-id="12051"><img alt="Fig. 20.3" aria-describedby="ca0020" data-dcnode-id="12060" height="486" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-03-9780128119716.jpg&amp;raw"><span data-dcnode-id="12059" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="12052"><li data-dcnode-id="12053"><a class="anchor download-link u-font-sans" data-dcnode-id="12054" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-03-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="12055"><span data-dcnode-id="12058" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12056"><span data-dcnode-id="12057" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="12044"><span data-dcnode-id="12045" id="ca0020"><p data-dcnode-id="12046" id="sp0020"><span class="label" data-dcnode-id="12049"><span data-dcnode-id="12050" instrument_node="">Fig. 20.3</span></span><span data-dcnode-id="12048" instrument_node="">. </span><span data-dcnode-id="12047" instrument_node="">General sweetener process flow.</span></p></span></span></figure></div></section><section data-dcnode-id="11004" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12039" id="st0035"><span data-dcnode-id="12040" instrument_node="">Corn Syrups</span></h2><p data-dcnode-id="12030" id="p0060"><span data-dcnode-id="12034"><span data-dcnode-id="12038" instrument_node="">Production of sweeteners from corn requires that the starch molecule be made susceptible to degradation by the action of acids and/or enzymes. This first step uses heat and pressure to simultaneously gelatinize and liquefy the starch into a crude hydrolyzate. The resulting </span><a class="topic-link" data-dcnode-id="12036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/slurries" title="Learn more about slurry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12037" instrument_node="">slurry</span></a><span data-dcnode-id="12035" instrument_node=""> may be further saccharified by the action of enzymes into a crude sweet hydrolyzate containing a mixture of short, medium, and long-chained saccharides. The mixture is then purified and evaporated to a final solids level (</span></span><a class="workspace-trigger" data-dcnode-id="12032" href="#bb0095" name="bbb0095"><span data-dcnode-id="12033" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="12031" instrument_node="">).</span></p><p data-dcnode-id="12028" id="p0065"><span data-dcnode-id="12029" instrument_node="">Three types of starch-conversion processes are commonly used to produce sweeteners. These are: acid conversion (A), acid-enzyme conversion (AE), and enzyme-enzyme conversion (E/E).</span></p><section data-dcnode-id="11840" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12026" id="st0040"><span data-dcnode-id="12027" instrument_node="">Acid Conversion</span></h3><div data-dcnode-id="11975"><p data-dcnode-id="11997" id="p0070"><span data-dcnode-id="12025" instrument_node="">The oldest and simplest process for producing corn sweeteners is by acid conversion (</span><a class="workspace-trigger" data-dcnode-id="12023" href="#f0025" name="bf0025"><span data-dcnode-id="12024" instrument_node="">Fig. 20.4</span></a><span data-dcnode-id="12010"><span data-dcnode-id="12022" instrument_node="">). Use and acceptance of these early syrups was hampered by off-flavors caused by formation of reversion sugars like </span><a class="topic-link" data-dcnode-id="12020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/gentiobiose" title="Learn more about Gentiobiose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12021" instrument_node="">Gentiobiose</span></a><span data-dcnode-id="12011"><span data-dcnode-id="12015"><span data-dcnode-id="12019" instrument_node="">. These off-flavors were generated in greater quantities in products having DE values greater than 45. Starting in the 1930s, better tasting syrups were achieved with the discovery of enzymes capable of hydrolyzing starch to levels greater than 45 DE. Early syrups were also affected by off-color appearance caused by formation of </span><a class="topic-link" data-dcnode-id="12017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/furfural" title="Learn more about furfural from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12018" instrument_node="">furfural</span></a><span data-dcnode-id="12016" instrument_node="">, hydroxymethylfurfural, and other color bodies via the </span></span><a class="topic-link" data-dcnode-id="12013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/maillard-reaction" title="Learn more about Maillard reaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12014" instrument_node="">Maillard reaction</span></a><span data-dcnode-id="12012" instrument_node="">. The color or appearance, especially high DE syrups, was improved by better process control and filtration, for example, the use of activated carbon. Commercial processing using acid today continues to target products in the 25–45 DE range. Below 25 DE, acid-converted syrups may haze because the linear starch chains retrograde. Conversion levels above 45 DE still risk developing a bitter taste due to acid-catalyzed condensation reactions generating reversion sugars, levulonic, and formic acid (</span></span></span><a class="workspace-trigger" data-dcnode-id="12008" href="#bb0180" name="bbb0180"><span data-dcnode-id="12009" instrument_node="">Singh et al., 1948</span></a><span data-dcnode-id="12007" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="12005" href="#bb0200" name="bbb0200"><span data-dcnode-id="12006" instrument_node="">Thompson et al., 1954</span></a><span data-dcnode-id="12004" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="12002" href="#bb0090" name="bbb0090"><span data-dcnode-id="12003" instrument_node="">Hebeda, 1987</span></a><span data-dcnode-id="12001" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="11999" href="#bb0175" name="bbb0175"><span data-dcnode-id="12000" instrument_node="">Saha et al., 2009</span></a><span data-dcnode-id="11998" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="11976" id="f0025"><span data-dcnode-id="11987"><img alt="Fig. 20.4" aria-describedby="ca0025" data-dcnode-id="11996" height="505" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-04-9780128119716.jpg&amp;raw"><span data-dcnode-id="11995" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11988"><li data-dcnode-id="11989"><a class="anchor download-link u-font-sans" data-dcnode-id="11990" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-04-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11991"><span data-dcnode-id="11994" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11992"><span data-dcnode-id="11993" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11977"><span data-dcnode-id="11978" id="ca0025"><p data-dcnode-id="11979" id="sp0025"><span class="label" data-dcnode-id="11985"><span data-dcnode-id="11986" instrument_node="">Fig. 20.4</span></span><span data-dcnode-id="11984" instrument_node="">. </span><span data-dcnode-id="11983" instrument_node="">Overview of acid conversion for production of </span><a class="topic-link" data-dcnode-id="11981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/dextrin" title="Learn more about dextrins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11982" instrument_node="">dextrins</span></a><span data-dcnode-id="11980" instrument_node="">.</span></p></span></span></figure></div><div data-dcnode-id="11843"><p data-dcnode-id="11959" id="p0075"><span data-dcnode-id="11974" instrument_node="">The starch slurry is pumped into a mix tank where the pH is acidified using a strong acid, for example, hydrochloric. The acidified slurry is then pumped into a heated pressure vessel called a “converter.” In the converter time, temperature (130–160°C) and pressure (about 5</span><span data-dcnode-id="11973" instrument_node="">&nbsp;</span><span data-dcnode-id="11972" instrument_node="">bars or 70</span><span data-dcnode-id="11971" instrument_node="">&nbsp;</span><span data-dcnode-id="11970" instrument_node="">psi) are controlled causing the starch slurry to be acidically hydrolyzed to the degree of conversion desired. Acid hydrolysis randomly breaks both the α-(1,4) and α-(1,6) starch linkages. The degree of hydrolyzate conversion products varies according to the temperature, pH, and residence time in the converter. Although the reaction is random, the carbohydrate profile of the final products is extremely consistent and predictable (</span><a class="workspace-trigger" data-dcnode-id="11968" href="#t0015" name="bt0015"><span data-dcnode-id="11969" instrument_node="">Table 20.2</span></a><span data-dcnode-id="11963"><span data-dcnode-id="11967" instrument_node="">). These sweeteners are typically measured and identified by their DE's, which is a relative measure of the amount of </span><a class="topic-link" data-dcnode-id="11965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/reducing-sugars" title="Learn more about reducing sugars from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11966" instrument_node="">reducing sugars</span></a><span data-dcnode-id="11964" instrument_node=""> present and is explained in greater detail later (</span></span><a class="workspace-trigger" data-dcnode-id="11961" href="#bb0095" name="bbb0095"><span data-dcnode-id="11962" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11960" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="11844" id="t0015"><span class="captions" data-dcnode-id="11950"><span data-dcnode-id="11951" id="ca0095"><p data-dcnode-id="11952" id="sp0095"><span class="label" data-dcnode-id="11957"><span data-dcnode-id="11958" instrument_node="">Table 20.2</span></span><span data-dcnode-id="11956" instrument_node="">. </span><span data-dcnode-id="11955" instrument_node="">Composition of Acid-Converted </span><a class="topic-link" data-dcnode-id="11953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about Corn Syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11954" instrument_node="">Corn Syrups</span></a></p></span></span><div class="groups" data-dcnode-id="11847"><table data-dcnode-id="11848"><thead data-dcnode-id="11926"><tr class="valign-top" data-dcnode-id="11946"><th class="rowsep-1" data-dcnode-id="11949" scope="col"></th><th class="rowsep-1" colspan="8" data-dcnode-id="11947" scope="col"><span data-dcnode-id="11948" instrument_node="">Dextrose Equivalents (DE)</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="11927"><th data-dcnode-id="11944" scope="col"><span data-dcnode-id="11945" instrument_node="">Product</span></th><th data-dcnode-id="11942" scope="col"><span data-dcnode-id="11943" instrument_node="">25</span></th><th data-dcnode-id="11940" scope="col"><span data-dcnode-id="11941" instrument_node="">30</span></th><th data-dcnode-id="11938" scope="col"><span data-dcnode-id="11939" instrument_node="">35</span></th><th data-dcnode-id="11936" scope="col"><span data-dcnode-id="11937" instrument_node="">40</span></th><th data-dcnode-id="11934" scope="col"><span data-dcnode-id="11935" instrument_node="">45</span></th><th data-dcnode-id="11932" scope="col"><span data-dcnode-id="11933" instrument_node="">50</span></th><th data-dcnode-id="11930" scope="col"><span data-dcnode-id="11931" instrument_node="">55</span></th><th data-dcnode-id="11928" scope="col"><span data-dcnode-id="11929" instrument_node="">60</span></th></tr></thead><tbody data-dcnode-id="11849"><tr data-dcnode-id="11907"><th data-dcnode-id="11924" scope="row"><span data-dcnode-id="11925" instrument_node="">Dextrose</span></th><td data-dcnode-id="11922"><span data-dcnode-id="11923" instrument_node="">8.4</span></td><td data-dcnode-id="11920"><span data-dcnode-id="11921" instrument_node="">11.9</span></td><td data-dcnode-id="11918"><span data-dcnode-id="11919" instrument_node="">15.7</span></td><td data-dcnode-id="11916"><span data-dcnode-id="11917" instrument_node="">20</span></td><td data-dcnode-id="11914"><span data-dcnode-id="11915" instrument_node="">24.5</span></td><td data-dcnode-id="11912"><span data-dcnode-id="11913" instrument_node="">29.4</span></td><td data-dcnode-id="11910"><span data-dcnode-id="11911" instrument_node="">34.8</span></td><td data-dcnode-id="11908"><span data-dcnode-id="11909" instrument_node="">40.3</span></td></tr><tr data-dcnode-id="11888"><th data-dcnode-id="11905" scope="row"><span data-dcnode-id="11906" instrument_node="">Maltose</span></th><td data-dcnode-id="11903"><span data-dcnode-id="11904" instrument_node="">9.4</span></td><td data-dcnode-id="11901"><span data-dcnode-id="11902" instrument_node="">13</span></td><td data-dcnode-id="11899"><span data-dcnode-id="11900" instrument_node="">16.5</span></td><td data-dcnode-id="11897"><span data-dcnode-id="11898" instrument_node="">19.7</span></td><td data-dcnode-id="11895"><span data-dcnode-id="11896" instrument_node="">22.6</span></td><td data-dcnode-id="11893"><span data-dcnode-id="11894" instrument_node="">25.1</span></td><td data-dcnode-id="11891"><span data-dcnode-id="11892" instrument_node="">27</span></td><td data-dcnode-id="11889"><span data-dcnode-id="11890" instrument_node="">28.3</span></td></tr><tr data-dcnode-id="11869"><th data-dcnode-id="11886" scope="row"><span data-dcnode-id="11887" instrument_node="">Dextrins</span></th><td data-dcnode-id="11884"><span data-dcnode-id="11885" instrument_node="">53.1</span></td><td data-dcnode-id="11882"><span data-dcnode-id="11883" instrument_node="">48.2</span></td><td data-dcnode-id="11880"><span data-dcnode-id="11881" instrument_node="">43.5</span></td><td data-dcnode-id="11878"><span data-dcnode-id="11879" instrument_node="">38.9</span></td><td data-dcnode-id="11876"><span data-dcnode-id="11877" instrument_node="">34.5</span></td><td data-dcnode-id="11874"><span data-dcnode-id="11875" instrument_node="">30.4</span></td><td data-dcnode-id="11872"><span data-dcnode-id="11873" instrument_node="">26.5</span></td><td data-dcnode-id="11870"><span data-dcnode-id="11871" instrument_node="">23.2</span></td></tr><tr data-dcnode-id="11850"><th data-dcnode-id="11867" scope="row"><span data-dcnode-id="11868" instrument_node="">Higher sugars</span></th><td data-dcnode-id="11865"><span data-dcnode-id="11866" instrument_node="">29.1</span></td><td data-dcnode-id="11863"><span data-dcnode-id="11864" instrument_node="">26.9</span></td><td data-dcnode-id="11861"><span data-dcnode-id="11862" instrument_node="">24.3</span></td><td data-dcnode-id="11859"><span data-dcnode-id="11860" instrument_node="">21.4</span></td><td data-dcnode-id="11857"><span data-dcnode-id="11858" instrument_node="">18.4</span></td><td data-dcnode-id="11855"><span data-dcnode-id="11856" instrument_node="">15.1</span></td><td data-dcnode-id="11853"><span data-dcnode-id="11854" instrument_node="">11.7</span></td><td data-dcnode-id="11851"><span data-dcnode-id="11852" instrument_node="">8.2</span></td></tr></tbody></table></div><p class="source" data-dcnode-id="11845"><span data-dcnode-id="11846" instrument_node="">From Corn Refiners Association, used by permission.</span></p></div></div><p data-dcnode-id="11841" id="p0080"><span data-dcnode-id="11842" instrument_node="">Following the converter, the slurry may be pumped into a holding pipe, to control the residence time of the slurry under pressure. The hydrolysis reaction is stopped when the hydrolyzate is pumped into a flash cooler followed by a pH adjustment. The crude syrup from the converter is ready for purification and evaporation to be addressed later.</span></p></section><section data-dcnode-id="11433" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11838" id="st0045"><span data-dcnode-id="11839" instrument_node="">Acid/Enzyme Conversion</span></h3><div data-dcnode-id="11808"><p data-dcnode-id="11830" id="p0085"><span data-dcnode-id="11837" instrument_node="">To minimize issues with haze and bitter taste formation, an enzyme-conversion step following hydrolysis was developed (</span><a class="workspace-trigger" data-dcnode-id="11835" href="#bb0120" name="bbb0120"><span data-dcnode-id="11836" instrument_node="">Kooi et al., 1962</span></a><span data-dcnode-id="11834" instrument_node="">). The choice of enzymes used in this step depends on the carbohydrate profile of the syrup desired. Syrups with DE's ranging from 20 to 80 can be made using an acid-enzyme conversion process (</span><a class="workspace-trigger" data-dcnode-id="11832" href="#f0030" name="bf0030"><span data-dcnode-id="11833" instrument_node="">Fig. 20.5</span></a><span data-dcnode-id="11831" instrument_node="">). Some high-maltose syrups can also be made via this process.</span></p><figure class="figure text-xs" data-dcnode-id="11809" id="f0030"><span data-dcnode-id="11820"><img alt="Fig. 20.5" aria-describedby="ca0030" data-dcnode-id="11829" height="505" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-05-9780128119716.jpg&amp;raw"><span data-dcnode-id="11828" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11821"><li data-dcnode-id="11822"><a class="anchor download-link u-font-sans" data-dcnode-id="11823" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9780128119716000206-f20-05-9780128119716.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11824"><span data-dcnode-id="11827" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11825"><span data-dcnode-id="11826" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11810"><span data-dcnode-id="11811" id="ca0030"><p data-dcnode-id="11812" id="sp0030"><span class="label" data-dcnode-id="11818"><span data-dcnode-id="11819" instrument_node="">Fig. 20.5</span></span><span data-dcnode-id="11817" instrument_node="">. </span><span data-dcnode-id="11816" instrument_node="">Overview of acid/enzyme process for production of </span><a class="topic-link" data-dcnode-id="11814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/corn-syrup" title="Learn more about corn syrups from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11815" instrument_node="">corn syrups</span></a><span data-dcnode-id="11813" instrument_node="">.</span></p></span></span></figure></div><p data-dcnode-id="11799" id="p0090"><span data-dcnode-id="11803"><span data-dcnode-id="11807" instrument_node="">Following hydrolysis and filtration, the hydrolyzate from the converter is pumped into one of a series of large holding tanks (enzyme tanks) where the correct amount and type of enzyme is added. These enzymes may be α- or β-amylase, </span><a class="topic-link" data-dcnode-id="11805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/pullulanase" title="Learn more about pullulanase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11806" instrument_node="">pullulanase</span></a><span data-dcnode-id="11804" instrument_node="">, or glucoamylase. Reaction conditions of time, temperature, and pH are carefully controlled until the desired DE or carbohydrate profile is reached. The crude syrup is ready for further processing including decolorizing, by carbon polishing or decolorizing resins, demineralization, followed by evaporation to a final solid level (</span></span><a class="workspace-trigger" data-dcnode-id="11801" href="#bb0095" name="bbb0095"><span data-dcnode-id="11802" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11800" instrument_node="">).</span></p><div data-dcnode-id="11434"><p data-dcnode-id="11788" id="p0095"><span data-dcnode-id="11798" instrument_node="">In today's modern syrup refineries, the production of multiple products occurs continuously. Once these products reach the proper degree of conversion, using batch processing, they are pumped through a common pipe for further refining including decolorizing and evaporation. This continuous operation, having a single, common pipeline, results in a “front” or “break” between two different DE products moving in the line. This front requires constant monitoring to ensure that it moves properly through the system. After evaporation, the products are isolated in a separate storage tanks and must meet specifications to ship to the customer. Monitoring the final product is especially important because advances in enzyme and blending technology have made it possible for several syrups to have similar reducing sugar contents, but extremely different carbohydrate profiles (</span><a class="workspace-trigger" data-dcnode-id="11796" href="#t0020" name="bt0020"><span data-dcnode-id="11797" instrument_node="">Table 20.3</span></a><span data-dcnode-id="11795" instrument_node="">). Thus, use of DE as a measurement tool has been largely replaced by the carbohydrate profile as determined by high-performance liquid chromatography (HPLC) (</span><a class="workspace-trigger" data-dcnode-id="11793" href="#t0025" name="bt0025"><span data-dcnode-id="11794" instrument_node="">Table 20.4</span></a><span data-dcnode-id="11792" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="11790" href="#bb0095" name="bbb0095"><span data-dcnode-id="11791" instrument_node="">Hobbs, 2003</span></a><span data-dcnode-id="11789" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="11694" id="t0020"><span class="captions" data-dcnode-id="11781"><span data-dcnode-id="11782" id="ca0100"><p data-dcnode-id="11783" id="sp0100"><span class="label" data-dcnode-id="11786"><span data-dcnode-id="11787" instrument_node="">Table 20.3</span></span><span data-dcnode-id="11785" instrument_node="">. </span><span data-dcnode-id="11784" instrument_node="">Dextrose Equivalents (DE) Versus Carbohydrate Profile of Enzyme-Converted Syrups</span></p></span></span><div class="groups" data-dcnode-id="11697"><table data-dcnode-id="11698"><thead data-dcnode-id="11765"><tr class="rowsep-1 valign-bottom" data-dcnode-id="11766"><th data-dcnode-id="11779" scope="col"><span data-dcnode-id="11780" instrument_node="">Designation</span></th><th data-dcnode-id="11777" scope="col"><span data-dcnode-id="11778" instrument_node="">Dextrose</span></th><th data-dcnode-id="11775" scope="col"><span data-dcnode-id="11776" instrument_node="">Maltose</span></th><th data-dcnode-id="11773" scope="col"><span data-dcnode-id="11774" instrument_node="">Maltotriose</span></th><th data-dcnode-id="11769" scope="col"><span data-dcnode-id="11772" instrument_node="">Degree of Polymerization (DP4</span><span data-dcnode-id="11771" instrument_node="">&nbsp;</span><span data-dcnode-id="11770" instrument_node="">+)</span></th><th data-dcnode-id="11767" scope="col"><span data-dcnode-id="11768" instrument_node="">Dextrose Equivalents (DE)</span></th></tr></thead><tbody data-dcnode-id="11699"><tr data-dcnode-id="11752"><th data-dcnode-id="11763" scope="row"><span data-dcnode-id="11764" instrument_node="">43 DE syrup</span></th><td data-dcnode-id="11761"><span data-dcnode-id="11762" instrument_node="">19</span></td><td data-dcnode-id="11759"><span data-dcnode-id="11760" instrument_node="">14</span></td><td data-dcnode-id="11757"><span data-dcnode-id="11758" instrument_node="">12</span></td><td data-dcnode-id="11755"><span data-dcnode-id="11756" instrument_node="">55</span></td><td data-dcnode-id="11753"><span data-dcnode-id="11754" instrument_node="">43</span></td></tr><tr data-dcnode-id="11739"><th data-dcnode-id="11750" scope="row"><span data-dcnode-id="11751" instrument_node="">43 DE high maltose</span></th><td data-dcnode-id="11748"><span data-dcnode-id="11749" instrument_node="">9</span></td><td data-dcnode-id="11746"><span data-dcnode-id="11747" instrument_node="">43</span></td><td data-dcnode-id="11744"><span data-dcnode-id="11745" instrument_node="">18</span></td><td data-dcnode-id="11742"><span data-dcnode-id="11743" instrument_node="">30</span></td><td data-dcnode-id="11740"><span data-dcnode-id="11741" instrument_node="">45</span></td></tr><tr data-dcnode-id="11726"><th data-dcnode-id="11737" scope="row"><span data-dcnode-id="11738" instrument_node="">52 DE syrup</span></th><td data-dcnode-id="11735"><span data-dcnode-id="11736" instrument_node="">28</span></td><td data-dcnode-id="11733"><span data-dcnode-id="11734" instrument_node="">18</span></td><td data-dcnode-id="11731"><span data-dcnode-id="11732" instrument_node="">13</span></td><td data-dcnode-id="11729"><span data-dcnode-id="11730" instrument_node="">41</span></td><td data-dcnode-id="11727"><span data-dcnode-id="11728" instrument_node="">52</span></td></tr><tr
