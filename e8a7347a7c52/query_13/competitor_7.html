</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3744" id="Sec15"><span data-dcnode-id="3745" instrument_node="">Growth</span></h3><p data-dcnode-id="3691"><span data-dcnode-id="3743" instrument_node="">During soy fermentation, </span><i data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">Lactobacillus fermentum</span></i><span data-dcnode-id="3740" instrument_node=""> NRRC 207 and </span><i data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">L. delbrueckii</span></i><span data-dcnode-id="3737" instrument_node=""> subsp. </span><i data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">bulgaricus</span></i><span data-dcnode-id="3734" instrument_node=""> NCDO 1489 exhibited more than 100-fold higher cell numbers when mixed with </span><i data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">S. thermophilus</span></i><span data-dcnode-id="3731" instrument_node=""> than when grown in mono-culture, and both strains improved the growth of </span><i data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">S. thermophilus</span></i><span data-dcnode-id="3728" instrument_node=""> as well (Chumchuere and Robinson </span><a aria-label="Reference 1999" data-dcnode-id="3726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d242717608e1368" title="Chumchuere S, Robinson RK (1999) Selection of starter cultures for the fermentation of soya milk. Food Microbiol 16(2):129–137"><span data-dcnode-id="3727" instrument_node="">1999</span></a><span data-dcnode-id="3725" instrument_node="">). Such a synergetic effect was also observed in&nbsp;other studies (Champagne et al. </span><a aria-label="Reference 2009" data-dcnode-id="3723" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d242717608e1371" title="Champagne CP, Green-Johnson J, Raymond Y, Barrette J, Buckley N (2009) Selection of probiotic bacteria for the fermentation of a soy beverage in combination with Streptococcus thermophilus. Food Res Int 42(5-6):612–621"><span data-dcnode-id="3724" instrument_node="">2009</span></a><span data-dcnode-id="3722" instrument_node="">; Mital et al. </span><a aria-label="Reference 1974" data-dcnode-id="3720" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d242717608e1374" title="Mital BK, Steinkraus KH, Naylor HB (1974) Growth of lactic acid bacteria in soy milks. J Food Sci 39(5):1018–1022"><span data-dcnode-id="3721" instrument_node="">1974</span></a><span data-dcnode-id="3719" instrument_node="">). The combination of amylolytic and probiotic bacterial strains also reduced the fermentation time of rice because of the resulting elevated acidification rate (Espirito-Santo et al. </span><a aria-label="Reference 2014" data-dcnode-id="3717" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d242717608e1377" title="Espirito-Santo AP, Mouquet-Rivier C, Humblot C, Cazevieille C, Icard-Vernière C, Soccol CR, Guyot JP (2014) Influence of cofermentation by amylolytic Lactobacillus strains and probiotic bacteria on the fermentation process, viscosity and microstructure of gruels made of rice, soy milk and passion fruit fiber. Food Res Int 57:104–113"><span data-dcnode-id="3718" instrument_node="">2014</span></a><span data-dcnode-id="3716" instrument_node="">). In addition, certain yeasts benefit the growth of LAB by excreting specific nutrients (Liu and Tsao </span><a aria-label="Reference 2009" data-dcnode-id="3714" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d242717608e1380" title="Liu SQ, Tsao M (2009) Enhancement of survival of probiotic and non-probiotic lactic acid bacteria by yeasts in fermented milk under non-refrigerated conditions. Int J Food Microbiol 135(1):34–38"><span data-dcnode-id="3715" instrument_node="">2009</span></a><span data-dcnode-id="3713" instrument_node="">; Rekha and Vijayalakshmi </span><a aria-label="Reference 2010" data-dcnode-id="3711" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d242717608e1383" title="Rekha CR, Vijayalakshmi G (2010) Bioconversion of isoflavone glycosides to aglycones, mineral bioavailability and vitamin B complex in fermented soymilk by probiotic bacteria and yeast. J Appl Microbiol 109(4):1198–1208"><span data-dcnode-id="3712" instrument_node="">2010</span></a><span data-dcnode-id="3710" instrument_node="">). However, not all combinations are desirable for the survival of starter cultures (Angelov et al. </span><a aria-label="Reference 2005" data-dcnode-id="3708" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d242717608e1387" title="Angelov A, Gotcheva V, Hristozova T, Gargova S (2005) Application of pure and mixed probiotic lactic acid bacteria and yeast cultures for oat fermentation. J Sci Food Agric 85(12):2134–2141"><span data-dcnode-id="3709" instrument_node="">2005</span></a><span data-dcnode-id="3707" instrument_node="">). As an example, the viable count of </span><i data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Bifidobacterium longum</span></i><span data-dcnode-id="3704" instrument_node=""> R015 and </span><i data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">L. fermentum</span></i><span data-dcnode-id="3701" instrument_node=""> even decreased in specific mixed-culture fermentation (Fig. </span><a data-dcnode-id="3699" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3700" instrument_node="">5a</span></a><span data-dcnode-id="3698" instrument_node="">) (Champagne et al. </span><a aria-label="Reference 2009" data-dcnode-id="3696" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d242717608e1399" title="Champagne CP, Green-Johnson J, Raymond Y, Barrette J, Buckley N (2009) Selection of probiotic bacteria for the fermentation of a soy beverage in combination with Streptococcus thermophilus. Food Res Int 42(5-6):612–621"><span data-dcnode-id="3697" instrument_node="">2009</span></a><span data-dcnode-id="3695" instrument_node="">; Chumchuere and Robinson </span><a aria-label="Reference 1999" data-dcnode-id="3693" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d242717608e1402" title="Chumchuere S, Robinson RK (1999) Selection of starter cultures for the fermentation of soya milk. Food Microbiol 16(2):129–137"><span data-dcnode-id="3694" instrument_node="">1999</span></a><span data-dcnode-id="3692" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3689" id="Sec16"><span data-dcnode-id="3690" instrument_node="">Nutrient value</span></h3><p data-dcnode-id="3657"><span data-dcnode-id="3688" instrument_node="">The protein content and essential amino acid composition can differ substantially following mono- vs. mixed-culture fermentation of plant-based milk alternatives (Fig. </span><a data-dcnode-id="3686" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3687" instrument_node="">5b</span></a><span data-dcnode-id="3685" instrument_node="">). Co-fermentation of peanut using </span><i data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Lactobacillus acidophilus</span></i><span data-dcnode-id="3682" instrument_node=""> and </span><i data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">L. plantarum</span></i><span data-dcnode-id="3679" instrument_node=""> significantly increased the total protein and </span><span class="u-small-caps" data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">l</span></span><span data-dcnode-id="3676" instrument_node="">-lysine, </span><span class="u-small-caps" data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">l</span></span><span data-dcnode-id="3673" instrument_node="">-methionine and </span><span class="u-small-caps" data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">l</span></span><span data-dcnode-id="3670" instrument_node="">-tryptophan contents compared to those of the corresponding mono-culture fermentations (Sanni et al. </span><a aria-label="Reference 1999" data-dcnode-id="3668" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d242717608e1432" title="Sanni AI, Onilude AA, Adeleke EO (1999) Preparation and characteristics of lactic acid fermented cowpea milk. Z Lebensm Unters Forsch A 208(3):225–229"><span data-dcnode-id="3669" instrument_node="">1999</span></a><span data-dcnode-id="3667" instrument_node="">). Spontaneous co-fermentation of strains originating from cowpea and chickpea improved </span><span class="u-small-caps" data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">l</span></span><span data-dcnode-id="3664" instrument_node="">-methionine levels by approximately sixfold (Zamora and Fields </span><a aria-label="Reference 1979" data-dcnode-id="3662" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d242717608e1438" title="Zamora AF, Fields ML (1979) Nutritive quality of fermented cowpeas (Vigna sinensis) and chickpeas (Cicer arietinum). J Food Sci 44(1):234–236"><span data-dcnode-id="3663" instrument_node="">1979</span></a><span data-dcnode-id="3661" instrument_node="">). However, in other cases, mixed-culture fermentation appeared inferior to mono-culture processes (Santos et al. </span><a aria-label="Reference 2014" data-dcnode-id="3659" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d242717608e1441" title="Santos CC, Libeck BS, Schwan RF (2014) Co-culture fermentation of peanut-soy milk for the development of a novel functional beverage. Int J Food Microbiol 186:32–41"><span data-dcnode-id="3660" instrument_node="">2014</span></a><span data-dcnode-id="3658" instrument_node="">).</span></p><p data-dcnode-id="3610"><span data-dcnode-id="3656" instrument_node="">Moreover, mixed cultures can impact vitamin formation. Co-fermentation of </span><i data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">L. plantarum</span></i><span data-dcnode-id="3653" instrument_node=""> SM39 and </span><i data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Propionibacterium freudenreichii</span></i><span data-dcnode-id="3650" instrument_node=""> DF13 showed higher levels of folate and vitamin B</span><sub data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">12</span></sub><span data-dcnode-id="3647" instrument_node=""> and yielded up to 8400 ng/L of folate, which is, otherwise, only achievable with genetically modified strains (Hugenschmidt et al. </span><a aria-label="Reference 2011" data-dcnode-id="3645" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d242717608e1455" title="Hugenschmidt S, Schwenninger SM, Lacroix C (2011) Concurrent high production of natural folate and vitamin B12 using a co-culture process with Lactobacillus plantarum SM39 and Propionibacterium freudenreichii DF13. Process Biochem 46(5):1063–1070"><span data-dcnode-id="3646" instrument_node="">2011</span></a><span data-dcnode-id="3644" instrument_node="">; Smid and Lacroix </span><a aria-label="Reference 2013" data-dcnode-id="3642" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d242717608e1458" title="Smid EJ, Lacroix C (2013) Microbe–microbe interactions in mixed culture food fermentations. Curr Opin Biotechnol 24(2):148–154"><span data-dcnode-id="3643" instrument_node="">2013</span></a><span data-dcnode-id="3641" instrument_node="">). To date, only a few pioneering studies have investigated bacterial vitamin production during plant material fermentation (Fig. </span><a data-dcnode-id="3639" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3640" instrument_node="">5c</span></a><span data-dcnode-id="3638" instrument_node="">). A mixture of </span><i data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">Lactobacillus</span></i><span data-dcnode-id="3635" instrument_node=""> strains, including </span><i data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">L. plantarum</span></i><span data-dcnode-id="3632" instrument_node="">, improved the riboflavin, thiamine and niacin contents in cowpea milk compared to the use of mono-cultures (Sanni et al. </span><a aria-label="Reference 1999" data-dcnode-id="3630" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d242717608e1471" title="Sanni AI, Onilude AA, Adeleke EO (1999) Preparation and characteristics of lactic acid fermented cowpea milk. Z Lebensm Unters Forsch A 208(3):225–229"><span data-dcnode-id="3631" instrument_node="">1999</span></a><span data-dcnode-id="3629" instrument_node="">). Similar effects were observed for soy using a co-fermentation of </span><i data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Saccharomyces boulardii</span></i><span data-dcnode-id="3626" instrument_node=""> and </span><i data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">Lactobacillus casei</span></i><span data-dcnode-id="3623" instrument_node=""> (Rekha and Vijayalakshmi </span><a aria-label="Reference 2010" data-dcnode-id="3621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d242717608e1481" title="Rekha CR, Vijayalakshmi G (2010) Bioconversion of isoflavone glycosides to aglycones, mineral bioavailability and vitamin B complex in fermented soymilk by probiotic bacteria and yeast. J Appl Microbiol 109(4):1198–1208"><span data-dcnode-id="3622" instrument_node="">2010</span></a><span data-dcnode-id="3620" instrument_node="">). However, many of the tested strain combinations only showed few or even adverse effects in this study (Champagne et al. </span><a aria-label="Reference 2010" data-dcnode-id="3618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d242717608e1484" title="Champagne CP, Tompkins TA, Buckley ND, Green-Johnson JM (2010) Effect of fermentation by pure and mixed cultures of Streptococcus thermophilus and Lactobacillus helveticus on isoflavone and B-vitamin content of a fermented soy beverage. Food Microbiol 27(7):968–972"><span data-dcnode-id="3619" instrument_node="">2010</span></a><span data-dcnode-id="3617" instrument_node="">; Zamora and Fields </span><a aria-label="Reference 1979" data-dcnode-id="3615" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d242717608e1487" title="Zamora AF, Fields ML (1979) Nutritive quality of fermented cowpeas (Vigna sinensis) and chickpeas (Cicer arietinum). J Food Sci 44(1):234–236"><span data-dcnode-id="3616" instrument_node="">1979</span></a><span data-dcnode-id="3614" instrument_node="">). It has been speculated that a decrease in a specific vitamin may relate to the fact that the organism itself requires it for growth (Rekha and Vijayalakshmi </span><a aria-label="Reference 2010" data-dcnode-id="3612" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d242717608e1490" title="Rekha CR, Vijayalakshmi G (2010) Bioconversion of isoflavone glycosides to aglycones, mineral bioavailability and vitamin B complex in fermented soymilk by probiotic bacteria and yeast. J Appl Microbiol 109(4):1198–1208"><span data-dcnode-id="3613" instrument_node="">2010</span></a><span data-dcnode-id="3611" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3608" id="Sec17"><span data-dcnode-id="3609" instrument_node="">Anti-nutrients and mineral availability</span></h3><p data-dcnode-id="3573"><span data-dcnode-id="3607" instrument_node="">Interestingly, mixed cultures help to reduce anti-nutrients (Fig. </span><a data-dcnode-id="3605" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3606" instrument_node="">6a</span></a><span data-dcnode-id="3604" instrument_node="">), which, in turn, enhances mineral availability (Fig. </span><a data-dcnode-id="3602" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3603" instrument_node="">6b</span></a><span data-dcnode-id="3601" instrument_node="">). A mixed culture of </span><i data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">L. acidophilus</span></i><span data-dcnode-id="3598" instrument_node=""> and </span><i data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">L. plantarum</span></i><span data-dcnode-id="3595" instrument_node=""> was more effective than fermentation of the individual strains in eliminating phytic acid and trypsin inhibitors in cowpea (Sanni et al. </span><a aria-label="Reference 1999" data-dcnode-id="3593" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d242717608e1514" title="Sanni AI, Onilude AA, Adeleke EO (1999) Preparation and characteristics of lactic acid fermented cowpea milk. Z Lebensm Unters Forsch A 208(3):225–229"><span data-dcnode-id="3594" instrument_node="">1999</span></a><span data-dcnode-id="3592" instrument_node="">). Similarly, a mixed culture of </span><i data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">S. thermophilus</span></i><span data-dcnode-id="3589" instrument_node=""> CCRC 14085 and </span><i data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Bifidobacterium infantis</span></i><span data-dcnode-id="3586" instrument_node=""> CCRC 14603 dramatically decreased phytic acid (80%) and saponin (30%) levels in soy (Lai et al. </span><a aria-label="Reference 2013" data-dcnode-id="3584" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d242717608e1524" title="Lai LR, Hsieh SC, Huang HY, Chou CC (2013) Effect of lactic fermentation on the total phenolic, saponin and phytic acid contents as well as anti-colon cancer cell proliferation activity of soymilk. J Biosci Bioeng 115(5):552–556"><span data-dcnode-id="3585" instrument_node="">2013</span></a><span data-dcnode-id="3583" instrument_node="">). It was further found that a mixed </span><i data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">S. boulardii</span></i><span data-dcnode-id="3580" instrument_node=""> and </span><i data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">L. plantarum</span></i><span data-dcnode-id="3577" instrument_node=""> B4495 fermentation increased calcium bioavailability approximately sixfold compared to the mono-culture fermentation (Rekha and Vijayalakshmi </span><a aria-label="Reference 2010" data-dcnode-id="3575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d242717608e1533" title="Rekha CR, Vijayalakshmi G (2010) Bioconversion of isoflavone glycosides to aglycones, mineral bioavailability and vitamin B complex in fermented soymilk by probiotic bacteria and yeast. J Appl Microbiol 109(4):1198–1208"><span data-dcnode-id="3576" instrument_node="">2010</span></a><span data-dcnode-id="3574" instrument_node="">).</span></p><p data-dcnode-id="3544"><span data-dcnode-id="3572" instrument_node="">Stachyose and raffinose are undesirable components of plant-based milk alternatives, especially legume-based products, that are linked to flatulence (Desai et al. </span><a aria-label="Reference 2002" data-dcnode-id="3570" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d242717608e1539" title="Desai A, Small D, McGill AEJ, Shah NP (2002) Metabolism of raffinose and stachyose in reconstituted skim milk and of n-hexanal and pentanal in soymilk by bifidobacteria. Biosci Microflora 21(4):245–250"><span data-dcnode-id="3571" instrument_node="">2002</span></a><span data-dcnode-id="3569" instrument_node="">). Generally, a combination of different strains was more efficient in degrading these carbohydrates than were pure cultures (Santos et al. </span><a aria-label="Reference 2014" data-dcnode-id="3567" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d242717608e1542" title="Santos CC, Libeck BS, Schwan RF (2014) Co-culture fermentation of peanut-soy milk for the development of a novel functional beverage. Int J Food Microbiol 186:32–41"><span data-dcnode-id="3568" instrument_node="">2014</span></a><span data-dcnode-id="3566" instrument_node="">). Soy fermented by a mixed culture of different LAB yielded a lower level of stachyose and raffinose and a desirable higher content of acetic acid, fructose, glucose and galactose (Wang et al. </span><a aria-label="Reference 2003" data-dcnode-id="3564" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d242717608e1545" title="Wang YC, Yu RC, Yang HY, Chou CC (2003) Sugar and acid contents in soymilk fermented with lactic acid bacteria alone or simultaneously with bifidobacteria. Food Microbiol 20(3):333–338"><span data-dcnode-id="3565" instrument_node="">2003</span></a><span data-dcnode-id="3563" instrument_node="">). Similar effects were also observed in other studies (Santos et al. </span><a aria-label="Reference 2014" data-dcnode-id="3561" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d242717608e1548" title="Santos CC, Libeck BS, Schwan RF (2014) Co-culture fermentation of peanut-soy milk for the development of a novel functional beverage. Int J Food Microbiol 186:32–41"><span data-dcnode-id="3562" instrument_node="">2014</span></a><span data-dcnode-id="3560" instrument_node="">). However, these outcomes are strongly dependent on the exact strain combination. As an example, </span><i data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">Streptococcus</span></i><span data-dcnode-id="3557" instrument_node=""> induced adverse effects in </span><i data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">L. fermentum</span></i><span data-dcnode-id="3554" instrument_node=""> and </span><i data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Bifidobacterium longum</span></i><span data-dcnode-id="3551" instrument_node=""> to metabolise stachyose (Champagne et al. </span><a aria-label="Reference 2009" data-dcnode-id="3549" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d242717608e1561" title="Champagne CP, Green-Johnson J, Raymond Y, Barrette J, Buckley N (2009) Selection of probiotic bacteria for the fermentation of a soy beverage in combination with Streptococcus thermophilus. Food Res Int 42(5-6):612–621"><span data-dcnode-id="3550" instrument_node="">2009</span></a><span data-dcnode-id="3548" instrument_node="">; Chumchuere and Robinson </span><a aria-label="Reference 1999" data-dcnode-id="3546" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d242717608e1564" title="Chumchuere S, Robinson RK (1999) Selection of starter cultures for the fermentation of soya milk. Food Microbiol 16(2):129–137"><span data-dcnode-id="3547" instrument_node="">1999</span></a><span data-dcnode-id="3545" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3542" id="Sec18"><span data-dcnode-id="3543" instrument_node="">Bioactive components</span></h3><p data-dcnode-id="3510"><span data-dcnode-id="3541" instrument_node="">Fermentation of soy by bacteria that possess β-glucosidase activity enables biotransformation of isoflavones into the more bioactive aglycone form (Pyo et al. </span><a aria-label="Reference 2005" data-dcnode-id="3539" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d242717608e1575" title="Pyo YH, Lee TC, Lee YC (2005) Enrichment of bioactive isoflavones in soymilk fermented with β-glucosidase-producing lactic acid bacteria. Food Res Int 38(5):551–559"><span data-dcnode-id="3540" instrument_node="">2005</span></a><span data-dcnode-id="3538" instrument_node="">). Mixed cultures of </span><i data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">S. boulardii</span></i><span data-dcnode-id="3535" instrument_node=""> together with five </span><i data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">Lactobacillus</span></i><span data-dcnode-id="3532" instrument_node=""> species converted over 95% of the glucoside into the aglycone isoflavone (Rekha and Vijayalakshmi </span><a aria-label="Reference 2010" data-dcnode-id="3530" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d242717608e1584" title="Rekha CR, Vijayalakshmi G (2010) Bioconversion of isoflavone glycosides to aglycones, mineral bioavailability and vitamin B complex in fermented soymilk by probiotic bacteria and yeast. J Appl Microbiol 109(4):1198–1208"><span data-dcnode-id="3531" instrument_node="">2010</span></a><span data-dcnode-id="3529" instrument_node="">). However, other strain mixtures revealed lower bioconversion efficiency compared to that of pure cultures. For example, a weaker bioconversion was detected when </span><i data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">S. thermophilus</span></i><span data-dcnode-id="3526" instrument_node=""> was mixed with </span><i data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">B. infantis</span></i><span data-dcnode-id="3523" instrument_node="">, </span><i data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">B. longum</span></i><span data-dcnode-id="3520" instrument_node=""> and </span><i data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">Lactobacillus helveticus</span></i><span data-dcnode-id="3517" instrument_node=""> (Champagne et al. </span><a aria-label="Reference 2010" data-dcnode-id="3515" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d242717608e1600" title="Champagne CP, Tompkins TA, Buckley ND, Green-Johnson JM (2010) Effect of fermentation by pure and mixed cultures of Streptococcus thermophilus and Lactobacillus helveticus on isoflavone and B-vitamin content of a fermented soy beverage. Food Microbiol 27(7):968–972"><span data-dcnode-id="3516" instrument_node="">2010</span></a><span data-dcnode-id="3514" instrument_node="">; Chien et al. </span><a aria-label="Reference 2006" data-dcnode-id="3512" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d242717608e1603" title="Chien HL, Huang HY, Chou CC (2006) Transformation of isoflavone phytoestrogens during the fermentation of soymilk with lactic acid bacteria and bifidobacteria. Food Microbiol 23(8):772–778"><span data-dcnode-id="3513" instrument_node="">2006</span></a><span data-dcnode-id="3511" instrument_node="">). This observation emphasises again the importance of strain selection in mediating the synergetic effects between the different cultures.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3508" id="Sec19"><span data-dcnode-id="3509" instrument_node="">Sensory values</span></h3><p data-dcnode-id="3464"><span data-dcnode-id="3507" instrument_node="">Although mono-culture fermentation seems to be as efficient as mixed-culture fermentation in lowering the content of the off-flavour molecules </span><i data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">n</span></i><span data-dcnode-id="3504" instrument_node="">-hexanal and </span><i data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">n</span></i><span data-dcnode-id="3501" instrument_node="">-hexanol (Lee </span><a aria-label="Reference 2001" data-dcnode-id="3499" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d242717608e1620" title="Lee C (2001) Changes in n-hexanal content of peanut milk fermented with lactic acid bacteria. Food Sci Biotechnol 10(4):387–390"><span data-dcnode-id="3500" instrument_node="">2001</span></a><span data-dcnode-id="3498" instrument_node="">), mixed-culture fermentation appears to be more useful in generating preferred flavour enhancers. For example, acetaldehyde, a key compound of the desired yogurt flavour, is formed more extensively by a mixture of two or more cultures (Horáčková et al. </span><a aria-label="Reference 2015" data-dcnode-id="3496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d242717608e1623" title="Horáčková Š, Mühlhansová A, Sluková M, Schulzová V, Plocková M (2015) Fermentation of soymilk by yoghurt and bifidobacteria strains. Czech J Food Sci 33(4)"><span data-dcnode-id="3497" instrument_node="">2015</span></a><span data-dcnode-id="3495" instrument_node="">; Lee </span><a aria-label="Reference 2001" data-dcnode-id="3493" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d242717608e1626" title="Lee C (2001) Changes in n-hexanal content of peanut milk fermented with lactic acid bacteria. Food Sci Biotechnol 10(4):387–390"><span data-dcnode-id="3494" instrument_node="">2001</span></a><span data-dcnode-id="3492" instrument_node="">; Liu et al. </span><a aria-label="Reference 2002" data-dcnode-id="3490" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d242717608e1630" title="Liu JR, Chen MJ, Lin CW (2002) Characterization of polysaccharide and volatile compounds produced by kefir grains grown in soymilk. J Food Sci 67(1):104–108"><span data-dcnode-id="3491" instrument_node="">2002</span></a><span data-dcnode-id="3489" instrument_node="">). A mixed culture of </span><i data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">L. delbrueckii</span></i><span data-dcnode-id="3486" instrument_node=""> subsp. </span><i data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">bulgaricus</span></i><span data-dcnode-id="3483" instrument_node=""> and </span><i data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">Streptococcus salivarius</span></i><span data-dcnode-id="3480" instrument_node=""> subsp. </span><i data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">thermophilus</span></i><span data-dcnode-id="3477" instrument_node=""> not only decreased the beany flavour of peanut milk but also significantly increased whiteness, viscosity, gumminess and smoothness (Lee </span><a aria-label="Reference 2001" data-dcnode-id="3475" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d242717608e1645" title="Lee C (2001) Changes in n-hexanal content of peanut milk fermented with lactic acid bacteria. Food Sci Biotechnol 10(4):387–390"><span data-dcnode-id="3476" instrument_node="">2001</span></a><span data-dcnode-id="3474" instrument_node="">). An increase in luminosity and whiteness index values was also observed following almond fermentation by a mixed culture of </span><i data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Lactobacillus reuteri</span></i><span data-dcnode-id="3471" instrument_node=""> and </span><i data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">S. thermophilus</span></i><span data-dcnode-id="3468" instrument_node=""> (Bernat et al. </span><a aria-label="Reference 2015" data-dcnode-id="3466" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d242717608e1655" title="Bernat N, Cháfer M, Chiralt A, González-Martínez C (2015) Development of a non-dairy probiotic fermented product based on almond milk and inulin. Food Sci Technol Int 21(6):440–453"><span data-dcnode-id="3467" instrument_node="">2015</span></a><span data-dcnode-id="3465" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="3431" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="3432" id="Sec20-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3459" id="Sec20"><span data-dcnode-id="3460" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="3433" id="Sec20-content"><p data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">The market for plant-based milk alternatives is quickly increasing. However, the unbalanced nutrition and unwanted organoleptic characteristics of these products still limit their consumption. The use of mixed-culture fermentation, in particular, holds great potential for improving the nutritional quality and the sensory profile of plant materials. Previous studies clearly show that the performance of mixed cultures is strongly species- and strain-dependent. At present, strain combination is still conducted with trial and error approaches. It seems difficult, if not even infeasible, to predict&nbsp;the effects of a mixed culture due to our still poor understanding of the underlying microbial interactions involved. Possibilities for a more rational selection and combination of strains with predictable synergistic interactions would be highly valuable towards developing smarter fermentation processes and better products.</span></p><p data-dcnode-id="3434"><span data-dcnode-id="3456" instrument_node="">Recently, systems biology approaches have greatly advanced and opened up novel possibilities to study even complex systems with a great level of detail. Due to the enormous progress in the field, quantitative systems biology studies of mixed-culture fermentations of plant-based milk alternatives could become a next level of research to better understand the underlying physiological, cellular and molecular processes. The system to be studied is admittedly complex, but seminal studies on similarly complex fermentation processes involving cocoa fermentation (Adler et al. </span><a aria-label="Reference 2013" data-dcnode-id="3454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d242717608e1670" title="Adler P, Bolten CJ, Dohnt K, Hansen CE, Wittmann C (2013) Core fluxome and meta fluxome of lactic acid bacteria under cocoa pulp fermentation simulating conditions. Appl Environ Microbiol 79(18):5670–5681"><span data-dcnode-id="3455" instrument_node="">2013</span></a><span data-dcnode-id="3453" instrument_node="">), oil-based riboflavin production (Schwechheimer et al. </span><a aria-label="Reference 2018" data-dcnode-id="3451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d242717608e1673" title="Schwechheimer SK, Becker J, Peyriga L, Portais JC, Wittmann C (2018) Metabolic flux analysis in Ashbya gossypii using 13C-labeled yeast extract: industrial riboflavin production under complex nutrient conditions. Microb Cell Factories 17(1):162"><span data-dcnode-id="3452" instrument_node="">2018</span></a><span data-dcnode-id="3450" instrument_node="">), growth on substrate mixtures (Schilling et al. </span><a aria-label="Reference 2007" data-dcnode-id="3448" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d242717608e1676" title="Schilling O, Frick O, Herzberg C, Ehrenreich A, Heinzle E, Wittmann C, Stülke J (2007) Transcriptional and metabolic responses of Bacillus subtilis to the availability of organic acids: transcription regulation is important but not sufficient to account for metabolic adaptation. Appl Environ Microbiol 73(2):499–507"><span data-dcnode-id="3449" instrument_node="">2007</span></a><span data-dcnode-id="3447" instrument_node="">) and under environmental changes (Hou et al. </span><a aria-label="Reference 2000" data-dcnode-id="3445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d242717608e1679" title="Hou JW, Yu RC, Chou CC (2000) Changes in some components of soymilk during fermentation with bifidobacteria. Food Res Int 33(5):393–397"><span data-dcnode-id="3446" instrument_node="">2000</span></a><span data-dcnode-id="3444" instrument_node="">; Kohajdová et al. </span><a aria-label="Reference 2006" data-dcnode-id="3442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d242717608e1682" title="Kohajdová Z, Karovičová J, Greifová M (2006) Lactic acid fermentation of some vegetable juices. J Food Nutr Res 45(3):115–119"><span data-dcnode-id="3443" instrument_node="">2006</span></a><span data-dcnode-id="3441" instrument_node="">; Kohlstedt et al. </span><a aria-label="Reference 2014" data-dcnode-id="3439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d242717608e1686" title="Kohlstedt M, Sappa PK, Meyer H, Maaß S, Zaprasis A, Hoffmann T, Becker J, Steil L, Hecker M, van Dijl JM (2014) Adaptation of Bacillus subtilis carbon core metabolism to simultaneous nutrient limitation and osmotic challenge: a multi-omics perspective. Environ Microbiol 16(6):1898–1917"><span data-dcnode-id="3440" instrument_node="">2014</span></a><span data-dcnode-id="3438" instrument_node="">; Wittmann et al. </span><a aria-label="Reference 2007" data-dcnode-id="3436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d242717608e1689" title="Wittmann C, Weber J, Betiku E, Krömer J, Böhm D, Rinas U (2007) Response of fluxome and metabolome to temperature-induced recombinant protein synthesis in Escherichia coli. J Biotechnol 132(4):375–384"><span data-dcnode-id="3437" instrument_node="">2007</span></a><span data-dcnode-id="3435" instrument_node="">) are encouraging success stories, which demonstrate the power of systems biology to shed more light on this subject and provide valuable guidance for improvement. It can be expected that similar systems level studies, which unravel genomics, transcriptomics, proteomics, metabolomics, and fluxomics in multi-omics approaches, will significantly contribute to a better understanding of plant material fermentation and advance rational designs and improvements in this field. In addition, as the market becomes increasingly diverse, the fermentation of novel types of plant materials will become another important trend.</span></p></div></div></section><span data-dcnode-id="3430" instrument_node="">
