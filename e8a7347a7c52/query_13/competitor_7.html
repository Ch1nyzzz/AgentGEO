</span><meta content="Non-dairy milk alternatives (or milk analogues) are water extracts of plants and have become increasingly popular for human nutrition. Over the years, the global market for these products has become a multi-billion dollar business and will reach a value of approximately 26 billion USD within the next 5 years. Moreover, many consumers demand plant-based milk alternatives for sustainability, health-related, lifestyle and dietary reasons, resulting in an abundance of products based on nuts, seeds or beans. Unfortunately, plant-based milk alternatives are often nutritionally unbalanced, and their flavour profiles limit their acceptance. With the goal of producing more valuable and tasty products, fermentation can help to the improve sensory profiles, nutritional properties, texture and microbial safety of plant-based milk alternatives so that the amendment with additional ingredients, often perceived as artificial, can be avoided. To date, plant-based milk fermentation mainly uses mono-cultures of microbes, such as lactic acid bacteria, bacilli and yeasts, for this purpose. More recently, new concepts have proposed mixed-culture fermentations with two or more microbial species. These approaches promise synergistic effects to enhance the fermentation process and improve the quality of the final products. Here, we review the plant-based milk market, including nutritional, sensory and manufacturing aspects. In addition, we provide an overview of the state-of-the-art fermentation of plant materials using mono- and mixed-cultures. Due to the rapid progress in this field, we can expect well-balanced and naturally fermented plant-based milk alternatives in the coming years." data-dcnode-id="5408" name="dc.description"><span data-dcnode-id="5407" instrument_node="">

</span><meta content="Fermentation of plant-based milk alternatives for improved flavour and nutritional value - Applied Microbiology and Biotechnology" data-dcnode-id="5062" property="og:title"><span data-dcnode-id="5061" instrument_node="">
</span><meta content="Non-dairy milk alternatives (or milk analogues) are water extracts of plants and have become increasingly popular for human nutrition. Over the years, the global market for these products has become a multi-billion dollar business and will reach a value of approximately 26 billion USD within the next 5 years. Moreover, many consumers demand plant-based milk alternatives for sustainability, health-related, lifestyle and dietary reasons, resulting in an abundance of products based on nuts, seeds or beans. Unfortunately, plant-based milk alternatives are often nutritionally unbalanced, and their flavour profiles limit their acceptance. With the goal of producing more valuable and tasty products, fermentation can help to the improve sensory profiles, nutritional properties, texture and microbial safety of plant-based milk alternatives so that the amendment with additional ingredients, often perceived as artificial, can be avoided. To date, plant-based milk fermentation mainly uses mono-cultures of microbes, such as lactic acid bacteria, bacilli and yeasts, for this purpose. More recently, new concepts have proposed mixed-culture fermentations with two or more microbial species. These approaches promise synergistic effects to enhance the fermentation process and improve the quality of the final products. Here, we review the plant-based milk market, including nutritional, sensory and manufacturing aspects. In addition, we provide an overview of the state-of-the-art fermentation of plant materials using mono- and mixed-cultures. Due to the rapid progress in this field, we can expect well-balanced and naturally fermented plant-based milk alternatives in the coming years." data-dcnode-id="5060" property="og:description"><span data-dcnode-id="5059" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="4583" data-gtm-vis-first-on-screen-50443292_562="753" data-gtm-vis-first-on-screen-50443292_563="753" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="753" data-gtm-vis-recent-on-screen-50443292_563="753" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4584" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4588" id="Abs1"><span data-dcnode-id="4589" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4585" id="Abs1-content"><p data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">Non-dairy milk alternatives (or milk analogues) are water extracts of plants and have become increasingly popular for human nutrition. Over the years, the global market for these products has become a multi-billion dollar business and will reach a value of approximately 26 billion USD within the next 5 years. Moreover, many consumers demand plant-based milk alternatives for sustainability, health-related, lifestyle and dietary reasons, resulting in an abundance of products based on nuts, seeds or beans. Unfortunately, plant-based milk alternatives are often nutritionally unbalanced, and their flavour profiles limit their acceptance. With the goal of producing more valuable and tasty products, fermentation can help to the improve sensory profiles, nutritional properties, texture and microbial safety of plant-based milk alternatives so that the amendment with additional ingredients, often perceived as artificial, can be avoided. To date, plant-based milk fermentation mainly uses mono-cultures of microbes, such as lactic acid bacteria, bacilli and yeasts, for this purpose. More recently, new concepts have proposed mixed-culture fermentations with two or more microbial species. These approaches promise synergistic effects to enhance the fermentation process and improve the quality of the final products. Here, we review the plant-based milk market, including nutritional, sensory and manufacturing aspects. In addition, we provide an overview of the state-of-the-art fermentation of plant materials using mono- and mixed-cultures. Due to the rapid progress in this field, we can expect well-balanced and naturally fermented plant-based milk alternatives in the coming years.</span></p></div></div></section><span data-dcnode-id="4582" instrument_node="">
</span><section data-dcnode-id="4458" data-gtm-vis-first-on-screen-50443292_562="753" data-gtm-vis-first-on-screen-50443292_563="753" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="753" data-gtm-vis-recent-on-screen-50443292_563="753" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4459" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4580" id="Sec1"><span data-dcnode-id="4581" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4460" id="Sec1-content"><p data-dcnode-id="4542"><span data-dcnode-id="4579" instrument_node="">Plant-based milk alternatives have been consumed for hundreds and thousands of years. These products are meant to resemble animal milk, an emulsion containing nutrients such as lipids, proteins, amino acids, vitamins and minerals and produced by lactating mammals to provide nutrients for the growth and development of their sucklings (Haug et al. </span><a aria-label="Reference 2007" data-dcnode-id="4577" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d242717608e398" title="Haug A, Høstmark AT, Harstad OM (2007) Bovine milk in human nutrition—a review. Lipids Health Dis 6(1):25"><span data-dcnode-id="4578" instrument_node="">2007</span></a><span data-dcnode-id="4576" instrument_node="">; Mäkinen et al. </span><a aria-label="Reference 2016" data-dcnode-id="4574" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d242717608e401" title="Mäkinen OE, Wanhalinna V, Zannini E, Arendt EK (2016) Foods for special dietary needs: non-dairy plant-based milk substitutes and fermented dairy-type products. Crit Rev Food Sci Nutr 56(3):339–349"><span data-dcnode-id="4575" instrument_node="">2016</span></a><span data-dcnode-id="4573" instrument_node="">; Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4571" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e404" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="4572" instrument_node="">2016</span></a><span data-dcnode-id="4570" instrument_node="">). Today, milk alternatives are commercially obtained from a variety of plants, such as legumes, seeds, nuts, cereals and pseudo-cereals (Mäkinen et al. </span><a aria-label="Reference 2016" data-dcnode-id="4568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d242717608e407" title="Mäkinen OE, Wanhalinna V, Zannini E, Arendt EK (2016) Foods for special dietary needs: non-dairy plant-based milk substitutes and fermented dairy-type products. Crit Rev Food Sci Nutr 56(3):339–349"><span data-dcnode-id="4569" instrument_node="">2016</span></a><span data-dcnode-id="4567" instrument_node="">). Over the past years, the market for these plant-based milk alternatives has continually increased and, in the USA alone, reached an annual volume of approximately US$1.8 billion (Fig. </span><a data-dcnode-id="4565" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4566" instrument_node="">1</span></a><span data-dcnode-id="4564" instrument_node="">). From a global perspective, the projected compound annual growth rate (CAGR) is higher than 10%, and thus the world market is estimated to surpass US$26 billion by 2023 (Bloomberg Surveillance </span><a aria-label="Reference 2015" data-dcnode-id="4562" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d242717608e414" title="Bloomberg Surveillance (2015) Got coke?: Coca-Cola’s big bet on premium milk. Bloomberg Surveillance. 
https://www.bloomberg.com/news/videos/2015-02-10/got-coke-coca-cola-s-big-bet-on-premium-milk

. Accessed 10 Feb 2015"><span data-dcnode-id="4563" instrument_node="">2015</span></a><span data-dcnode-id="4561" instrument_node="">). The increasing preference for plant-based milk alternatives is driven by different factors and consumer demands: health-related challenges such as lactose intolerance and milk allergies (Crittenden and Bennett </span><a aria-label="Reference 2005" data-dcnode-id="4559" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d242717608e417" title="Crittenden RG, Bennett LE (2005) Cow’s milk allergy: a complex disorder. J Am Coll Nutr 24:582S–591S"><span data-dcnode-id="4560" instrument_node="">2005</span></a><span data-dcnode-id="4558" instrument_node="">), consumer concerns about cow milk hormones and cholesterol (Epstein </span><a aria-label="Reference 1990" data-dcnode-id="4556" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d242717608e420" title="Epstein SS (1990) Potential public health hazards of biosynthetic milk hormones. Int J Health Serv 20(1):73–84"><span data-dcnode-id="4557" instrument_node="">1990</span></a><span data-dcnode-id="4555" instrument_node="">), ethical disputes regarding the use of animals (Hughes </span><a aria-label="Reference 1995" data-dcnode-id="4553" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d242717608e423" title="Hughes D (1995) Animal welfare: the consumer and the food industry. Br Food J 97(10):3–7"><span data-dcnode-id="4554" instrument_node="">1995</span></a><span data-dcnode-id="4552" instrument_node="">), environmental issues (Rotz et al. </span><a aria-label="Reference 2010" data-dcnode-id="4550" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d242717608e426" title="Rotz CA, Montes F, Chianese DS (2010) The carbon footprint of dairy production systems through partial life cycle assessment. J Dairy Sci 93(3):1266–1282"><span data-dcnode-id="4551" instrument_node="">2010</span></a><span data-dcnode-id="4549" instrument_node="">), changes in lifestyle towards vegetarian and vegan food, presumably healthier diet (Craig </span><a aria-label="Reference 2010" data-dcnode-id="4547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d242717608e429" title="Craig WJ (2010) Nutrition concerns and health effects of vegetarian diets. Nutr Clin Pract 25(6):613–620"><span data-dcnode-id="4548" instrument_node="">2010</span></a><span data-dcnode-id="4546" instrument_node="">) and the marketed health-promoting properties of these products (Paucar-Menacho et al. </span><a aria-label="Reference 2010" data-dcnode-id="4544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d242717608e433" title="Paucar-Menacho LM, Berhow MA, Mandarino JMG, Chang YK, Mejia EG (2010) Effect of time and temperature on bioactive compounds in germinated Brazilian soybean cultivar BRS 258. Food Res Int 43(7):1856–1865"><span data-dcnode-id="4545" instrument_node="">2010</span></a><span data-dcnode-id="4543" instrument_node="">). Accordingly, leading dairy companies are adding plant-based milk alternative products to their portfolio.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4515" data-gtm-vis-first-on-screen-50443292_561="753" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="753" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="4516"><figcaption data-dcnode-id="4539"><b class="c-article-section__figure-caption" data-dcnode-id="4540" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="4541" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4527"><div class="c-article-section__figure-item" data-dcnode-id="4534"><a class="c-article-section__figure-link" data-dcnode-id="4535" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00253-019-10175-9/figures/1" rel="nofollow"><picture data-dcnode-id="4536"><source data-dcnode-id="4538" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00253-019-10175-9/MediaObjects/253_2019_10175_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="4537" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00253-019-10175-9/MediaObjects/253_2019_10175_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4528" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="4529"><span data-dcnode-id="4533" instrument_node="">U.S. market development for plant-based milk alternative products (soy, almond and other non-dairy milk products). The data are taken from Bloomberg Surveillance (</span><a aria-label="Reference 2015" data-dcnode-id="4531" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d242717608e442" title="Bloomberg Surveillance (2015) Got coke?: Coca-Cola’s big bet on premium milk. Bloomberg Surveillance.

</span></a></div></figure></div><p data-dcnode-id="4489"><span data-dcnode-id="4514" instrument_node="">Plant-based milk alternatives are intended to resemble animal milk in terms of colour and texture (Mäkinen et al. </span><a aria-label="Reference 2016" data-dcnode-id="4512" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d242717608e450" title="Mäkinen OE, Wanhalinna V, Zannini E, Arendt EK (2016) Foods for special dietary needs: non-dairy plant-based milk substitutes and fermented dairy-type products. Crit Rev Food Sci Nutr 56(3):339–349"><span data-dcnode-id="4513" instrument_node="">2016</span></a><span data-dcnode-id="4511" instrument_node="">; Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4509" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e453" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="4510" instrument_node="">2016</span></a><span data-dcnode-id="4508" instrument_node="">). However, they often do not provide the full nutritional value of cow milk (Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4506" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e456" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="4507" instrument_node="">2016</span></a><span data-dcnode-id="4505" instrument_node="">) and suffer from undesirable off-flavours (Desai et al. </span><a aria-label="Reference 2002" data-dcnode-id="4503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d242717608e459" title="Desai A, Small D, McGill AEJ, Shah NP (2002) Metabolism of raffinose and stachyose in reconstituted skim milk and of n-hexanal and pentanal in soymilk by bifidobacteria. Biosci Microflora 21(4):245–250"><span data-dcnode-id="4504" instrument_node="">2002</span></a><span data-dcnode-id="4502" instrument_node="">; Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4500" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e462" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="4501" instrument_node="">2016</span></a><span data-dcnode-id="4499" instrument_node="">; Vanga and Raghavan </span><a aria-label="Reference 2018" data-dcnode-id="4497" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d242717608e466" title="Vanga SK, Raghavan V (2018) How well do plant based alternatives fare nutritionally compared to cow’s milk? J Food Sci Technol 55(1):10–20"><span data-dcnode-id="4498" instrument_node="">2018</span></a><span data-dcnode-id="4496" instrument_node="">). Therefore, commercial products positioned as plant-based milk alternatives are typically amended with additives such as vitamins, amino acids, and minerals (Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4494" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e469" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="4495" instrument_node="">2016</span></a><span data-dcnode-id="4493" instrument_node="">). However, leading food and beverage companies have committed to removing ingredients perceived as artificial from their&nbsp;products—clean label foods and beverages are not only a trend but are seemingly becoming an expectation. Accordingly, natural plant-based milk alternatives, which meet the nutritional quality and taste of animal-derived milk without blending, are of particular interest (Asioli et al. </span><a aria-label="Reference 2017" data-dcnode-id="4491" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d242717608e472" title="Asioli D, Aschemann-Witzel J, Caputo V, Vecchio R, Annunziata A, Næs T, Varela P (2017) Making sense of the “clean label” trends: a review of consumer food choice behavior and discussion of industry implications. Food Res Int 99:58–71"><span data-dcnode-id="4492" instrument_node="">2017</span></a><span data-dcnode-id="4490" instrument_node="">).</span></p><p data-dcnode-id="4463"><span data-dcnode-id="4488" instrument_node="">An appealing option to reach this goal is fermentation. Since the early days of mankind, fermentation has been a natural approach to produce food, and today, fermented foods are more popular than ever before (Adler et al. </span><a aria-label="Reference 2013" data-dcnode-id="4486" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d242717608e478" title="Adler P, Bolten CJ, Dohnt K, Hansen CE, Wittmann C (2013) Core fluxome and meta fluxome of lactic acid bacteria under cocoa pulp fermentation simulating conditions. Appl Environ Microbiol 79(18):5670–5681"><span data-dcnode-id="4487" instrument_node="">2013</span></a><span data-dcnode-id="4485" instrument_node="">). During the production of coffee, bread, chocolate, wine, cheese, mixed pickles, kombucha, kimchi, and sauerkraut, food-grade microbes improve the nutritional value, aroma and taste, texture and stability of foods and beverages and contribute to their microbial safety. In particular, the application of mono-culture fermentation to food products is well understood (Leroy and De Vuyst </span><a aria-label="Reference 2004" data-dcnode-id="4483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d242717608e481" title="Leroy F, De Vuyst L (2004) Lactic acid bacteria as functional starter cultures for the food fermentation industry. Trends Food Sci Technol 15(2):67–78"><span data-dcnode-id="4484" instrument_node="">2004</span></a><span data-dcnode-id="4482" instrument_node="">; National Research Council </span><a aria-label="Reference 1992" data-dcnode-id="4480" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d242717608e484" title="National Research Council (1992) Applications of biotechnology in traditional fermented foods. National Academies Press, Washington, D.C."><span data-dcnode-id="4481" instrument_node="">1992</span></a><span data-dcnode-id="4479" instrument_node="">). More recently, the design of mixed-culture fermentation with two or more microorganisms, naturally occurring in many food production processes (Adler et al. </span><a aria-label="Reference 2013" data-dcnode-id="4477" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d242717608e487" title="Adler P, Bolten CJ, Dohnt K, Hansen CE, Wittmann C (2013) Core fluxome and meta fluxome of lactic acid bacteria under cocoa pulp fermentation simulating conditions. Appl Environ Microbiol 79(18):5670–5681"><span data-dcnode-id="4478" instrument_node="">2013</span></a><span data-dcnode-id="4476" instrument_node="">), is becoming increasingly important (Ciani et al. </span><a aria-label="Reference 2010" data-dcnode-id="4474" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d242717608e490" title="Ciani M, Comitini F, Mannazzu I, Domizio P (2010) Controlled mixed culture fermentation: a new perspective on the use of non-Saccharomyces yeasts in winemaking. FEMS Yeast Res 10(2):123–133"><span data-dcnode-id="4475" instrument_node="">2010</span></a><span data-dcnode-id="4473" instrument_node="">; Smid and Lacroix </span><a aria-label="Reference 2013" data-dcnode-id="4471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d242717608e494" title="Smid EJ, Lacroix C (2013) Microbe–microbe interactions in mixed culture food fermentations. Curr Opin Biotechnol 24(2):148–154"><span data-dcnode-id="4472" instrument_node="">2013</span></a><span data-dcnode-id="4470" instrument_node="">). The latter appears particularly promising for plant-based milk alternative fermentation due to the potential synergistic effects within the microbial consortia, which helps to improve quite diverse quality criteria with only&nbsp;one process (National Research Council </span><a aria-label="Reference 1992" data-dcnode-id="4468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d242717608e497" title="National Research Council (1992) Applications of biotechnology in traditional fermented foods. National Academies Press, Washington, D.C."><span data-dcnode-id="4469" instrument_node="">1992</span></a><span data-dcnode-id="4467" instrument_node="">; Sieuwerts et al. </span><a aria-label="Reference 2008" data-dcnode-id="4465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d242717608e500" title="Sieuwerts S, de Bok FAM, Hugenholtz J, van Hylckama Vlieg JET (2008) Unraveling microbial interactions in food fermentations: from classical to genomics approaches. Appl Environ Microbiol 74(16):4997–5007"><span data-dcnode-id="4466" instrument_node="">2008</span></a><span data-dcnode-id="4464" instrument_node="">).</span></p><p data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">In this regard, this review introduces the key criteria for major plant-based milk alternatives, including nutritional and sensory qualities as well as manufacturing perspectives. In relevant examples, mono- and mixed-culture fermentations of plant-based milk alternatives are presented to highlight state-of-the-art and future avenues for research and development.</span></p></div></div></section><section data-dcnode-id="3985" data-gtm-vis-first-on-screen-50443292_562="753" data-gtm-vis-first-on-screen-50443292_563="753" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="753" data-gtm-vis-recent-on-screen-50443292_563="753" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Leading plant-based milk alternatives"><div class="c-article-section" data-dcnode-id="3986" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4456" id="Sec2"><span data-dcnode-id="4457" instrument_node="">Leading plant-based milk alternatives</span></h2><div class="c-article-section__content" data-dcnode-id="3987" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="4454" id="Sec3"><span data-dcnode-id="4455" instrument_node="">Plant types</span></h3><p data-dcnode-id="4410"><span data-dcnode-id="4453" instrument_node="">Due to a constantly increasing demand for non-dairy alternatives and growing interest in exploring different functional properties, various plants have been used to produce non-dairy milk alternatives (Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e518" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="4452" instrument_node="">2016</span></a><span data-dcnode-id="4450" instrument_node="">). The relevant plant sources can be classified into five types: (i) legumes (beans), (ii) nuts, (iii) seeds, (iv) pseudo-cereals, and (v) cereals (Fig. </span><a data-dcnode-id="4448" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4449" instrument_node="">3</span></a><span data-dcnode-id="4447" instrument_node="">) (Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e524" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="4446" instrument_node="">2016</span></a><span data-dcnode-id="4444" instrument_node="">). Soy-based drinks are the dominant plant-based milk alternatives in the Western world (Mäkinen et al. </span><a aria-label="Reference 2016" data-dcnode-id="4442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d242717608e527" title="Mäkinen OE, Wanhalinna V, Zannini E, Arendt EK (2016) Foods for special dietary needs: non-dairy plant-based milk substitutes and fermented dairy-type products. Crit Rev Food Sci Nutr 56(3):339–349"><span data-dcnode-id="4443" instrument_node="">2016</span></a><span data-dcnode-id="4441" instrument_node="">). In addition, drinks based on almond (Ginsberg and Ostrowski </span><a aria-label="Reference 2007" data-dcnode-id="4439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d242717608e530" title="Ginsberg C, Ostrowski A (2007) The market for vegetarian foods. The Vegetarian Resource Group. 
http://www.vrg.org/nutshell/market.htm

. Accessed 15 Aug 2007"><span data-dcnode-id="4440" instrument_node="">2007</span></a><span data-dcnode-id="4438" instrument_node="">), coconut (Seow and Gwee </span><a aria-label="Reference 1997" data-dcnode-id="4436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d242717608e534" title="Seow CC, Gwee CN (1997) Coconut milk: chemistry and technology. Int J Food Sci Technol 32(3):189–201"><span data-dcnode-id="4437" instrument_node="">1997</span></a><span data-dcnode-id="4435" instrument_node="">), sunflower seed (Fujisawa et al. </span><a aria-label="Reference 1986" data-dcnode-id="4433" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d242717608e537" title="Fujisawa K, Yokoyama A, Suzukamo G (1986) Lactic acid fermentation products of sunflower seed milk. US Patent 4563356, 01 Jul 1986"><span data-dcnode-id="4434" instrument_node="">1986</span></a><span data-dcnode-id="4432" instrument_node="">), chickpea (Rao et al. </span><a aria-label="Reference 1988" data-dcnode-id="4430" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d242717608e540" title="Rao DR, Pulusani SR, Chawan CB (1988) Preparation of a yogurt-like product from cowpeas and mung beans. Int J Food Sci Technol 23(2):195–198"><span data-dcnode-id="4431" instrument_node="">1988</span></a><span data-dcnode-id="4429" instrument_node="">), lupine (Ivanović et al. </span><a aria-label="Reference 1983" data-dcnode-id="4427" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d242717608e543" title="Ivanović D, Ballester D, Yanez E (1983) Formulation and nutritive value of 2 milk substitutes based on sweet lupine (Lupinus albus, var. multolupa). Arch Latinoam Nutr 33(3):620–632"><span data-dcnode-id="4428" instrument_node="">1983</span></a><span data-dcnode-id="4426" instrument_node="">), hemp (Vahanvaty </span><a aria-label="Reference 2009" data-dcnode-id="4424" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d242717608e546" title="Vahanvaty US (2009) Hemp seed and hemp milk: the new super foods. Infant Child Adolesc Nutr 1(4):232–234"><span data-dcnode-id="4425" instrument_node="">2009</span></a><span data-dcnode-id="4423" instrument_node="">), sesame (Afaneh et al. </span><a aria-label="Reference 2011" data-dcnode-id="4421" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d242717608e549" title="Afaneh I, Abu-Alruz K, Quasem JM, Sundookah A, Abbadi J, Alloussi S, Ayyad Z (2011) Fundamental elements to produce sesame yoghurt from sesame milk. Am J Appl Sci 8(11):1086–1092"><span data-dcnode-id="4422" instrument_node="">2011</span></a><span data-dcnode-id="4420" instrument_node="">), quinoa (Pineli et al. </span><a aria-label="Reference 2015" data-dcnode-id="4418" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d242717608e553" title="Pineli LDLDO, Botelho RBA, Zandonadi RP, Solorzano JL, de Oliveira GT, Reis CEG, Teixeira DDS (2015) Low glycemic index and increased protein content in a novel quinoa milk. LWT Food Sci Technol 63(2):1261–1267"><span data-dcnode-id="4419" instrument_node="">2015</span></a><span data-dcnode-id="4417" instrument_node="">), pea (Li et al. </span><a aria-label="Reference 2004" data-dcnode-id="4415" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d242717608e556" title="Li F, Cui R, Zheng L, Li C (2004) Study on the processing technology of pea milk with soya. Food Sci 8:211–214"><span data-dcnode-id="4416" instrument_node="">2004</span></a><span data-dcnode-id="4414" instrument_node="">), and rice (Mitchell et al. </span><a aria-label="Reference 1990" data-dcnode-id="4412" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d242717608e559" title="Mitchell CR, Mitchell PR, Nissenbaum R (1990) Nutritional rice milk product. US Patent 4894242, 16 Jan 1990"><span data-dcnode-id="4413" instrument_node="">1990</span></a><span data-dcnode-id="4411" instrument_node="">) are available and contribute to the diversity of the plant-based milk alternative market. Depending on the individual raw materials, the corresponding drinks differ significantly in composition and flavour.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4408" id="Sec4"><span data-dcnode-id="4409" instrument_node="">Key quality criteria</span></h3><p data-dcnode-id="4400"><span data-dcnode-id="4407" instrument_node="">Plant-based milk alternatives should preferably resemble the technical, nutritional and organoleptic properties of cow milk. To achieve this goal, researchers and developers in academia and industry must overcome certain challenges (Figs. </span><a data-dcnode-id="4405" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4406" instrument_node="">2</span></a><span data-dcnode-id="4404" instrument_node=""> and </span><a data-dcnode-id="4402" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4403" instrument_node="">3</span></a><span data-dcnode-id="4401" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4376" data-gtm-vis-first-on-screen-50443292_561="753" data-gtm-vis-has-fi l composition of sunflower seed meal on its true metabolizable energy and amino acid digestibility. Poult Sci 77(12):1884–1892"><span data-dcnode-id="4285" instrument_node="">1998</span></a><span data-dcnode-id="4283" instrument_node="">; Wood and Grusak </span><a aria-label="Reference 2007" data-dcnode-id="4281" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d242717608e677" title="Wood JA, Grusak MA (2007) Nutritional value of chickpea. In: Yadav S, Redden R, Chen W, Sharma B (eds) Chickpea breeding and management. CAB International, Wallingford, pp 101–142"><span data-dcnode-id="4282" instrument_node="">2007</span></a><span data-dcnode-id="4280" instrument_node="">). The micronutrient composition data are acquired from the National Nutrient Database for Standard Reference Release (NDB) (</span><a data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ndb.nal.usda.gov/ndb/"><span data-dcnode-id="4279" instrument_node="">https://ndb.nal.usda.gov/ndb/</span></a><span data-dcnode-id="4277" instrument_node="">). The NDB identification of the selected materials is as follows: milk (01212), soy (16111), chickpea (45041830), pea (45272128), lupine (</span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ndb.nal.usda.gov/ndb/foods/show/16076%3Ffgcd%3D%26manu%3D%26format%3D%26count%3D%26max%3D25%26offset%3D%26sort%3Ddefault%26order%3Dasc%26qlookup%3Dlupine%26ds%3D%26qt%3D%26qp%3D%26qa%3D%26qn%3D%26q%3D%26ing%3D"><span data-dcnode-id="4276" instrument_node="">16076</span></a><span data-dcnode-id="4274" instrument_node="">), coconut milk (45117929), almond (12061), sunflower seed kernels (12036), hemp seed (12012), sesame seed (12023), quinoa (20035), rice (20090) and oat (20132). carb, carbohydrates except fibre; funct. peptides, functional peptides; unsaturated FA, unsaturated fatty acids.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4261"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="4262" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00253-019-10175-9/figures/3" rel="nofollow"><span data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4263" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4264" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4265" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4268" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="4257" id="Sec5"><span data-dcnode-id="4258" instrument_node="">Physico-chemical properties</span></h3><p data-dcnode-id="4237"><span data-dcnode-id="4256" instrument_node="">Plant-based milk alternative manufacturing generally employs consecutive unit operations (Fig. </span><a data-dcnode-id="4254" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4255" instrument_node="">4</span></a><span data-dcnode-id="4253" instrument_node="">). Generally, plant-based drinks are prepared by crushing the plant material, followed by extraction of its soluble parts into water. The properties of the final product depend on the raw material and, furthermore, on the specifications of the individual disintegration, homogenisation, formulation, emulsification, and storage processes. Different strategies are applied to make the homogenisation and stability of plant-based milks more similar to that of animal milk, which is a natural emulsion. For example, plant-based drinks from starchy materials (such as cereals or pseudo-cereals) easily gelate during sterilisation (autoclaving or pasteurisation), which causes technical problems in downstream processing (Mäkinen et al. </span><a aria-label="Reference 2016" data-dcnode-id="4251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d242717608e702" title="Mäkinen OE, Wanhalinna V, Zannini E, Arendt EK (2016) Foods for special dietary needs: non-dairy plant-based milk substitutes and fermented dairy-type products. Crit Rev Food Sci Nutr 56(3):339–349"><span data-dcnode-id="4252" instrument_node="">2016</span></a><span data-dcnode-id="4250" instrument_node="">). Furthermore, the excessive lipid content of seeds and nuts may lead to an undesired phase separation and reduced product stability (Figs. </span><a data-dcnode-id="4248" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4249" instrument_node="">2</span></a><span data-dcnode-id="4247" instrument_node=""> and </span><a data-dcnode-id="4245" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4246" instrument_node="">3</span></a><span data-dcnode-id="4244" instrument_node="">) so that these compounds are removed during processing (Briviba et al. </span><a aria-label="Reference 2016" data-dcnode-id="4242" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d242717608e711" title="Briviba K, Gräf V, Walz E, Guamis B, Butz P (2016) Ultra high pressure homogenization of almond milk: physico-chemical and physiological effects. Food Chem 192:82–89"><span data-dcnode-id="4243" instrument_node="">2016</span></a><span data-dcnode-id="4241" instrument_node="">). More details on plant-based milk alternative manufacturing can be found in an excellent recent review (Mäkinen et al. </span><a aria-label="Reference 2016" data-dcnode-id="4239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d242717608e715" title="Mäkinen OE, Wanhalinna V, Zannini E, Arendt EK (2016) Foods for special dietary needs: non-dairy plant-based milk substitutes and fermented dairy-type products. Crit Rev Food Sci Nutr 56(3):339–349"><span data-dcnode-id="4240" instrument_node="">2016</span></a><span data-dcnode-id="4238" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4213" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="4214"><figcaption data-dcnode-id="4234"><b class="c-article-section__figure-caption" data-dcnode-id="4235" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="4236" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4225"><div class="c-article-section__figure-item" data-dcnode-id="4229"><a class="c-article-section__figure-link" data-dcnode-id="4230" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00253-019-10175-9/figures/4" rel="nofollow"><picture data-dcnode-id="4231"><source data-dcnode-id="4233" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00253-019-10175-9/MediaObjects/253_2019_10175_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="4232" height="1172" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00253-019-10175-9/MediaObjects/253_2019_10175_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4226" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">Flow chart for the manufacturing of plant-based milk alternatives. The unit operations given in brackets are optional and depend on the chosen raw material and the desired quality of the final product</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4215"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="4216" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00253-019-10175-9/figures/4" rel="nofollow"><span data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4217" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4218" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4219" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4222" instrument_node="">
