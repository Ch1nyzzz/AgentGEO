</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="4211" id="Sec6"><span data-dcnode-id="4212" instrument_node="">Nutritional value and bioactive components</span></h3><p data-dcnode-id="4182"><span data-dcnode-id="4210" instrument_node="">Without doubt, the plants used offer certain attractive properties (Fig. </span><a data-dcnode-id="4208" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4209" instrument_node="">3</span></a><span data-dcnode-id="4207" instrument_node="">). Some of the raw materials, such as legumes and seeds, have a protein content comparable to that of cow milk (although the amino acid quality is not comparable to the same extent). Moreover, the raw materials are rich in certain micronutrients (vitamin, minerals) (Gernand et al. </span><a aria-label="Reference 2016" data-dcnode-id="4205" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d242717608e736" title="Gernand AD, Schulze KJ, Stewart CP, West KP Jr, Christian P (2016) Micronutrient deficiencies in pregnancy worldwide: health effects and prevention. Nat Rev Endocrinol 12(5):274–289"><span data-dcnode-id="4206" instrument_node="">2016</span></a><span data-dcnode-id="4204" instrument_node="">) and contain bioactive compounds such as antioxidants (Zhao and Shah </span><a aria-label="Reference 2014" data-dcnode-id="4202" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d242717608e739" title="Zhao D, Shah NP (2014) Changes in antioxidant capacity, isoflavone profile, phenolic and vitamin contents in soymilk during extended fermentation. LWT Food Sci Technol 58(2):454–462"><span data-dcnode-id="4203" instrument_node="">2014</span></a><span data-dcnode-id="4201" instrument_node="">), dietary fibres (Kohajdová et al. </span><a aria-label="Reference 2006" data-dcnode-id="4199" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d242717608e742" title="Kohajdová Z, Karovičová J, Greifová M (2006) Lactic acid fermentation of some vegetable juices. J Food Nutr Res 45(3):115–119"><span data-dcnode-id="4200" instrument_node="">2006</span></a><span data-dcnode-id="4198" instrument_node="">) and phytoestrogens (Verdeal and Ryan </span><a aria-label="Reference 1979" data-dcnode-id="4196" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d242717608e745" title="Verdeal K, Ryan DS (1979) Naturally-occurring estrogens in plant foodstuffs—a review. J Food Prot 42(7):577–583"><span data-dcnode-id="4197" instrument_node="">1979</span></a><span data-dcnode-id="4195" instrument_node="">) (Figs. </span><a data-dcnode-id="4193" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4194" instrument_node="">2</span></a><span data-dcnode-id="4192" instrument_node=""> and </span><a data-dcnode-id="4190" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4191" instrument_node="">3</span></a><span data-dcnode-id="4189" instrument_node="">). The latter contributes to health benefits, including a lowered risk of osteoporosis, heart disease, breast cancer, and menopausal symptoms (Patisaul and Jefferson </span><a aria-label="Reference 2010" data-dcnode-id="4187" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d242717608e755" title="Patisaul HB, Jefferson W (2010) The pros and cons of phytoestrogens. Front Neuroendocrinol 31(4):400–419"><span data-dcnode-id="4188" instrument_node="">2010</span></a><span data-dcnode-id="4186" instrument_node="">). However, phytohormones potentially also cause adverse health effects, which may depend on human age, health status and even the presence or absence of specific gut microflora, so that this area requires more research in the future (Patisaul and Jefferson </span><a aria-label="Reference 2010" data-dcnode-id="4184" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d242717608e758" title="Patisaul HB, Jefferson W (2010) The pros and cons of phytoestrogens. Front Neuroendocrinol 31(4):400–419"><span data-dcnode-id="4185" instrument_node="">2010</span></a><span data-dcnode-id="4183" instrument_node="">).</span></p><p data-dcnode-id="4150"><span data-dcnode-id="4181" instrument_node="">In recent years, several interesting studies have investigated the presence and impact of micro-nutrients and bioactive compounds in plant materials. As an example, almond, peanut, and coconut exhibit significant amounts of vitamins E and C, which confer antioxidant properties (Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e764" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="4180" instrument_node="">2016</span></a><span data-dcnode-id="4178" instrument_node="">). Legumes are a good source for essential mono- and polyunsaturated fatty acids, minerals (Fe</span><sup data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">2+</span></sup><span data-dcnode-id="4175" instrument_node="">, Zn</span><sup data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">2+</span></sup><span data-dcnode-id="4172" instrument_node="">, Mg</span><sup data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">2+</span></sup><span data-dcnode-id="4169" instrument_node="">) (Sandberg </span><a aria-label="Reference 2002" data-dcnode-id="4167" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d242717608e773" title="Sandberg AS (2002) Bioavailability of minerals in legumes. Br J Nutr 88(S3):281–285"><span data-dcnode-id="4168" instrument_node="">2002</span></a><span data-dcnode-id="4166" instrument_node="">), and phytoestrogens (isoflavones) (Pyo et al. </span><a aria-label="Reference 2005" data-dcnode-id="4164" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d242717608e777" title="Pyo YH, Lee TC, Lee YC (2005) Enrichment of bioactive isoflavones in soymilk fermented with β-glucosidase-producing lactic acid bacteria. Food Res Int 38(5):551–559"><span data-dcnode-id="4165" instrument_node="">2005</span></a><span data-dcnode-id="4163" instrument_node="">) (Figs. </span><a data-dcnode-id="4161" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4162" instrument_node="">2</span></a><span data-dcnode-id="4160" instrument_node=""> and </span><a data-dcnode-id="4158" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4159" instrument_node="">3</span></a><span data-dcnode-id="4157" instrument_node="">). In other types of plant materials, β-glucans contribute to health benefits (in lowering cholesterol levels) and increase the sensory attributes of the final products (Lazaridou and Biliaderis </span><a aria-label="Reference 2007" data-dcnode-id="4155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d242717608e786" title="Lazaridou A, Biliaderis CG (2007) Molecular aspects of cereal β-glucan functionality: physical properties, technological applications and physiological effects. J Cereal Sci 46(2):101–118"><span data-dcnode-id="4156" instrument_node="">2007</span></a><span data-dcnode-id="4154" instrument_node="">; Othman et al. </span><a aria-label="Reference 2011" data-dcnode-id="4152" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d242717608e789" title="Othman RA, Moghadasian MH, Jones PJH (2011) Cholesterol-lowering effects of oat β-glucan. Nutr Rev 69(6):299–309"><span data-dcnode-id="4153" instrument_node="">2011</span></a><span data-dcnode-id="4151" instrument_node="">).</span></p><p data-dcnode-id="4085"><span data-dcnode-id="4149" instrument_node="">Despite these undoubted beneficial properties of plant raw materials, a careful inspection, however, reveals that commercial plant-based milk alternatives are not nutritionally balanced and comparable to animal milk. In particular, the protein content of plant-based drinks can be low. Approximately 50% of commercial plant-based milk alternatives contain little or even no protein (&lt; 0.5%), while only selected soy-based milk analogues reach the higher protein level of cow milk (3.7%) (Jeske et al. </span><a aria-label="Reference 2017" data-dcnode-id="4147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d242717608e795" title="Jeske S, Zannini E, Arendt EK (2017) Evaluation of physicochemical and glycaemic properties of commercial plant-based milk substitutes. Plant Foods Hum Nutr 72(1):26–33"><span data-dcnode-id="4148" instrument_node="">2017</span></a><span data-dcnode-id="4146" instrument_node="">). Additionally, plant proteins often exhibit low quality, poor digestibility and an undesired limitation in essential amino acids (Millward </span><a aria-label="Reference 1999" data-dcnode-id="4144" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d242717608e798" title="Millward DJ (1999) The nutritional value of plant-based diets in relation to human amino acid and protein requirements. Proc Nutr Soc 58(2):249–260"><span data-dcnode-id="4145" instrument_node="">1999</span></a><span data-dcnode-id="4143" instrument_node="">). </span><span class="u-small-caps" data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">l</span></span><span data-dcnode-id="4140" instrument_node="">-Lysine, </span><span class="u-small-caps" data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">l</span></span><span data-dcnode-id="4137" instrument_node="">-methionine, </span><span class="u-small-caps" data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">l</span></span><span data-dcnode-id="4134" instrument_node="">-cysteine and </span><span class="u-small-caps" data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">l</span></span><span data-dcnode-id="4131" instrument_node="">-tryptophan are amino acids that are typically underrepresented (Millward </span><a aria-label="Reference 1999" data-dcnode-id="4129" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d242717608e814" title="Millward DJ (1999) The nutritional value of plant-based diets in relation to human amino acid and protein requirements. Proc Nutr Soc 58(2):249–260"><span data-dcnode-id="4130" instrument_node="">1999</span></a><span data-dcnode-id="4128" instrument_node="">). In addition, certain vitamins, such as vitamin D and vitamin B</span><sub data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">12</span></sub><span data-dcnode-id="4125" instrument_node="">, are present at low levels or are even absent (Table </span><a data-dcnode-id="4123" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4124" instrument_node="">1</span></a><span data-dcnode-id="4122" instrument_node="">), which may be part of the reason for the vitamin deficiency of people following a strict vegetarian diet (Pawlak et al. </span><a aria-label="Reference 2014" data-dcnode-id="4120" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d242717608e822" title="Pawlak R, Lester SE, Babatunde T (2014) The prevalence of cobalamin deficiency among vegetarians assessed by serum vitamin B12: a review of literature. Eur J Clin Nutr 68(5):541–548"><span data-dcnode-id="4121" instrument_node="">2014</span></a><span data-dcnode-id="4119" instrument_node="">). Moreover, vitamins are sensitive molecules and some of them are&nbsp;easily degraded during washing and heating, which further reduces their content (Fig. </span><a data-dcnode-id="4117" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4118" instrument_node="">4</span></a><span data-dcnode-id="4116" instrument_node="">). Other important compounds suffer from low bioavailability. For instance, soy isoflavones mainly exist in the form of genistin and daidzin, which are glucosides of genistein and daidzein and far less bioavailable than the corresponding aglycone forms (Vacek et al. </span><a aria-label="Reference 2008" data-dcnode-id="4114" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d242717608e829" title="Vacek J, Klejdus B, Lojková L, Kubán V (2008) Current trends in isolation, separation, determination and identification of isoflavones: a review. J Sep Sci 31(11):2054–2067"><span data-dcnode-id="4115" instrument_node="">2008</span></a><span data-dcnode-id="4113" instrument_node="">; Xu et al. </span><a aria-label="Reference 1994" data-dcnode-id="4111" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d242717608e832" title="Xu X, Wang HJ, Murphy PA, Cook L, Hendrich S (1994) Daidzein is a more bioavailable soymilk isoflavone than is genistein in adult women. J Nutr 124(6):825–832"><span data-dcnode-id="4112" instrument_node="">1994</span></a><span data-dcnode-id="4110" instrument_node="">). Moreover, plant-derived products can contain anti-nutritional factors. For example, phytates and saponins form insoluble complexes with valuable minerals (such as Ca</span><sup data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">2+</span></sup><span data-dcnode-id="4107" instrument_node="">, Mg</span><sup data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">2+</span></sup><span data-dcnode-id="4104" instrument_node="">, Fe</span><sup data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">2+</span></sup><span data-dcnode-id="4101" instrument_node=""> and Zn</span><sup data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">2+</span></sup><span data-dcnode-id="4098" instrument_node="">), which decrease their bioavailability (Rekha and Vijayalakshmi </span><a aria-label="Reference 2010" data-dcnode-id="4096" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d242717608e844" title="Rekha CR, Vijayalakshmi G (2010) Bioconversion of isoflavone glycosides to aglycones, mineral bioavailability and vitamin B complex in fermented soymilk by probiotic bacteria and yeast. J Appl Microbiol 109(4):1198–1208"><span data-dcnode-id="4097" instrument_node="">2010</span></a><span data-dcnode-id="4095" instrument_node="">; West et al. </span><a aria-label="Reference 1978" data-dcnode-id="4093" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d242717608e847" title="West LG, Greger JL, White A, Nonnamaker BJ (1978) In vitro studies on saponin-mineral complexation. J Food Sci 43(4):1342–1343"><span data-dcnode-id="4094" instrument_node="">1978</span></a><span data-dcnode-id="4092" instrument_node="">). Plant-based oligosaccharides, such as raffinose, stachyose, and verbascose, can only be digested by intestinal bacteria through fermentation, which results in flatulence, diarrhoea, and other discomforts (Onyesom et al. </span><a aria-label="Reference 2005" data-dcnode-id="4090" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d242717608e850" title="Onyesom I, Enaholo AT, Mordi J (2005) Effect of processing techniques on the contents of flatulence factors and emulsion properties of cowpea (Vigna unguiculata). J Appl Sci Environ Manag 9:2"><span data-dcnode-id="4091" instrument_node="">2005</span></a><span data-dcnode-id="4089" instrument_node="">). Furthermore, the intestinal tract can be disturbed by trypsin and other protease inhibitors in plant-based milk alternatives, which interfere with protein and starch digestion by inactivating the digesting enzymes (Anderson and Wolf </span><a aria-label="Reference 1995" data-dcnode-id="4087" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d242717608e853" title="Anderson RL, Wolf WJ (1995) Compositional changes in trypsin inhibitors, phytic acid, saponins and isoflavones related to soybean processing. J Nutr 125(3):581S–588S"><span data-dcnode-id="4088" instrument_node="">1995</span></a><span data-dcnode-id="4086" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4070" data-test="inline-table" id="table-1"><figure data-dcnode-id="4071"><figcaption class="c-article-table__figcaption" data-dcnode-id="4082"><b data-dcnode-id="4083" data-test="table-caption" id="Tab1"><span data-dcnode-id="4084" instrument_node="">Table 1 Nutritional comparison of cow milk and selected plant materials used for the production of plant-based milk alternatives</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4072"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="4073" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00253-019-10175-9/tables/1" rel="nofollow"><span data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4074" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4075" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4076" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4079" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4078" fill-rule="evenodd"></path><span data-dcnode-id="4077" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="4068" id="Sec7"><span data-dcnode-id="4069" instrument_node="">Sensory profile</span></h3><p data-dcnode-id="4039"><span data-dcnode-id="4067" instrument_node="">It has been shown by consumer and marketing studies that taste has a key impact on food selection (Glanz et al. </span><a aria-label="Reference 1998" data-dcnode-id="4065" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d242717608e1031" title="Glanz K, Basil M, Maibach E, Goldberg J, Snyder D (1998) Why Americans eat what they do: taste, nutrition, cost, convenience, and weight control concerns as influences on food consumption. J Am Diet Assoc 98(10):1118–1126"><span data-dcnode-id="4066" instrument_node="">1998</span></a><span data-dcnode-id="4064" instrument_node="">). In this regard, the natural taste of plant-based milk alternatives, unfortunately, exhibits only limited acceptance (Mäkinen et al. </span><a aria-label="Reference 2016" data-dcnode-id="4062" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d242717608e1034" title="Mäkinen OE, Wanhalinna V, Zannini E, Arendt EK (2016) Foods for special dietary needs: non-dairy plant-based milk substitutes and fermented dairy-type products. Crit Rev Food Sci Nutr 56(3):339–349"><span data-dcnode-id="4063" instrument_node="">2016</span></a><span data-dcnode-id="4061" instrument_node="">). Although certain components of plant materials (such as soluble fibres) positively influence texture and mouthfeel (Vasquez-Orejarena et al. </span><a aria-label="Reference 2018" data-dcnode-id="4059" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d242717608e1037" title="Vasquez-Orejarena E, Simons CT, Litchfield JH, Alvarez VB (2018) Functional properties of a high protein beverage stabilized with oat-β-glucan. J Food Sci 83(5):1360–1365"><span data-dcnode-id="4060" instrument_node="">2018</span></a><span data-dcnode-id="4058" instrument_node="">), plant-based milk alternatives are still generally perceived as products with a displeasing taste, probably also because of previous experiences with less appealing products in the market (Wansink et al. </span><a aria-label="Reference 2005" data-dcnode-id="4056" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d242717608e1040" title="Wansink B, Sonka S, Goldsmith P, Chiriboga J, Eren N (2005) Increasing the acceptance of soy-based foods. J Int Food Agribus Mark 17(1):35–55"><span data-dcnode-id="4057" instrument_node="">2005</span></a><span data-dcnode-id="4055" instrument_node="">). Legume-based products tend to smell beany and earthy, which is considered undesirable in countries without traditional consumption of these types of products. Volatile compounds such as </span><i data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">n</span></i><span data-dcnode-id="4052" instrument_node="">-hexanal and </span><i data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">n</span></i><span data-dcnode-id="4049" instrument_node="">-hexanol, which originate from the oxidation of plant lipids, are mainly responsible for this type of off-flavour. Plant phenols (including anti-nutrients such as tannins and saponins), terpenes, glucosinolates, and flavonoids impart bitter, acrid or astringent tastes, depending on their molecular weights (Drewnowski and Gomez-Carneros </span><a aria-label="Reference 2000" data-dcnode-id="4047" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d242717608e1050" title="Drewnowski A, Gomez-Carneros C (2000) Bitter taste, phytonutrients, and the consumer: a review. Am J Clin Nutr 72(6):1424–1435"><span data-dcnode-id="4048" instrument_node="">2000</span></a><span data-dcnode-id="4046" instrument_node="">). Regrettably, certain bioactive (and therefore otherwise beneficial) compounds such as isoflavonoids are also linked to an objectionable aftertaste (Matsuura et al. </span><a aria-label="Reference 1989" data-dcnode-id="4044" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d242717608e1053" title="Matsuura M, Obata A, Fukushima D (1989) Objectionable flavor of soy milk developed during the soaking of soybeans and its control. J Food Sci 54(3):602–605"><span data-dcnode-id="4045" instrument_node="">1989</span></a><span data-dcnode-id="4043" instrument_node="">). Additionally, a greenish, greyish or brownish colour, which corresponds to the colour of the raw plant material; a chalky or sandy texture; and a thin mouthfeel due to the presence of insoluble particles negatively influence consumer purchase willingness (Peyer et al. </span><a aria-label="Reference 2016" data-dcnode-id="4041" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d242717608e1056" title="Peyer LC, Zannini E, Arendt EK (2016) Lactic acid bacteria as sensory biomodulators for fermented cereal-based beverages. Trends Food Sci Technol 54:17–25"><span data-dcnode-id="4042" instrument_node="">2016</span></a><span data-dcnode-id="4040" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4037" id="Sec8"><span data-dcnode-id="4038" instrument_node="">Technical processing and fortification</span></h3><p data-dcnode-id="4029"><span data-dcnode-id="4036" instrument_node="">To solve some of the abovementioned challenges, different manufacturing strategies have been developed. In early processing steps, excess lipids (from nuts and seeds) and excess starch (from cereals and pseudo-cereals) are separated and/or enzymatically hydrolysed to prevent phase separation and gelation and increase product stability (Rustom et al. </span><a aria-label="Reference 1993" data-dcnode-id="4034" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d242717608e1067" title="Rustom IYS, López-Leiva MH, Nair BM (1993) Extraction of peanut solids with water-effect of the process and enzymatic hydrolysis. LWT Food Sci Technol 26(1):72–75"><span data-dcnode-id="4035" instrument_node="">1993</span></a><span data-dcnode-id="4033" instrument_node="">). Homogenisation is used to disrupt larger particles and lipid droplets and achieve uniform particle size, which also improves product stability (Briviba et al. </span><a aria-label="Reference 2016" data-dcnode-id="4031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d242717608e1070" title="Briviba K, Gräf V, Walz E, Guamis B, Butz P (2016) Ultra high pressure homogenization of almond milk: physico-chemical and physiological effects. Food Chem 192:82–89"><span data-dcnode-id="4032" instrument_node="">2016</span></a><span data-dcnode-id="4030" instrument_node="">).</span></p><p data-dcnode-id="3988"><span data-dcnode-id="4028" instrument_node="">To overcome the known nutritional and sensory limitations, commercial plant-based milk alternatives are typically supplemented with sweeteners, artificial flavours, protein, amino acids, minerals (Ca</span><sup data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">2+</span></sup><span data-dcnode-id="4025" instrument_node="">, Mg</span><sup data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">2+</span></sup><span data-dcnode-id="4022" instrument_node="">, Fe</span><sup data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">2+</span></sup><span data-dcnode-id="4019" instrument_node=""> and Zn</span><sup data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">2+</span></sup><span data-dcnode-id="4016" instrument_node="">), and vitamins (B</span><sub data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">12</span></sub><span data-dcnode-id="4013" instrument_node="">, B</span><sub data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">2</span></sub><span data-dcnode-id="4010" instrument_node="">, D and E) (Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e1089" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="4009" instrument_node="">2016</span></a><span data-dcnode-id="4007" instrument_node="">; Zhang et al. </span><a aria-label="Reference 2007" data-dcnode-id="4005" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d242717608e1092" title="Zhang H, Önning G, Triantafyllou AÖ, Öste R (2007) Nutritional properties of oat-based beverages as affected by processing and storage. J Sci Food Agric 87(12):2294–2301"><span data-dcnode-id="4006" instrument_node="">2007</span></a><span data-dcnode-id="4004" instrument_node="">). Moreover, extended mechanical and thermal pre-processing (e.g. roasting, dehulling, blanching, soaking, cooking and sprouting) is applied to reduce anti-nutrients such as protease inhibitors (Jiang et al. </span><a aria-label="Reference 2013" data-dcnode-id="4002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d242717608e1095" title="Jiang S, Cai W, Xu B (2013) Food quality improvement of soy milk made from short-time germinated soybeans. Foods 2(2):198–212"><span data-dcnode-id="4003" instrument_node="">2013</span></a><span data-dcnode-id="4001" instrument_node="">; Yuan et al. </span><a aria-label="Reference 2008" data-dcnode-id="3999" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d242717608e1098" title="Yuan S, Chang SKC, Liu Z, Xu B (2008) Elimination of trypsin inhibitor activity and beany flavor in soy milk by consecutive blanching and ultrahigh-temperature (UHT) processing. J Agric Food Chem 56(17):7957–7963"><span data-dcnode-id="4000" instrument_node="">2008</span></a><span data-dcnode-id="3998" instrument_node="">), decrease and mask off-flavour and improve mouthfeel and colour (Dakwa et al. </span><a aria-label="Reference 2005" data-dcnode-id="3996" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d242717608e1101" title="Dakwa S, Sakyi-Dawson E, Diako C, Annan NT, Amoa-Awua WK (2005) Effect of boiling and roasting on the fermentation of soybeans into dawadawa (soy-dawadawa). Int J Food Microbiol 104(1):69–82"><span data-dcnode-id="3997" instrument_node="">2005</span></a><span data-dcnode-id="3995" instrument_node="">; Kim et al. </span><a aria-label="Reference 1986" data-dcnode-id="3993" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d242717608e1105" title="Kim WJ, Yoon SK, Lee CY (1986) Changes in oligosaccharides and sensory quality of soymilk during germination. Kor J Food Sci Technol 18(5):382–387"><span data-dcnode-id="3994" instrument_node="">1986</span></a><span data-dcnode-id="3992" instrument_node="">). However, some anti-nutrients are very resistant. For example, phytates cannot be destroyed entirely even by heating to 100 °C (Anderson and Wolf </span><a aria-label="Reference 1995" data-dcnode-id="3990" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d242717608e1108" title="Anderson RL, Wolf WJ (1995) Compositional changes in trypsin inhibitors, phytic acid, saponins and isoflavones related to soybean processing. J Nutr 125(3):581S–588S"><span data-dcnode-id="3991" instrument_node="">1995</span></a><span data-dcnode-id="3989" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="3845" data-title="Fermentation of plant materials"><div class="c-article-section" data-dcnode-id="3846" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3983" id="Sec9"><span data-dcnode-id="3984" instrument_node="">Fermentation of plant materials</span></h2><div class="c-article-section__content" data-dcnode-id="3847" id="Sec9-content"><p data-dcnode-id="3960"><span data-dcnode-id="3982" instrument_node="">Fermentation has been applied to cereals such as maize, wheat, rice and sorghum for a long time (National Research Council </span><a aria-label="Reference 1992" data-dcnode-id="3980" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d242717608e1120" title="National Research Council (1992) Applications of biotechnology in traditional fermented foods. National Academies Press, Washington, D.C."><span data-dcnode-id="3981" instrument_node="">1992</span></a><span data-dcnode-id="3979" instrument_node="">). Plant materials support the growth of microorganisms (Espirito-Santo et al. </span><a aria-label="Reference 2014" data-dcnode-id="3977" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d242717608e1123" title="Espirito-Santo AP, Mouquet-Rivier C, Humblot C, Cazevieille C, Icard-Vernière C, Soccol CR, Guyot JP (2014) Influence of cofermentation by amylolytic Lactobacillus strains and probiotic bacteria on the fermentation process, viscosity and microstructure of gruels made of rice, soy milk and passion fruit fiber. Food Res Int 57:104–113"><span data-dcnode-id="3978" instrument_node="">2014</span></a><span data-dcnode-id="3976" instrument_node="">; Peyer et al. </span><a aria-label="Reference 2016" data-dcnode-id="3974" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d242717608e1126" title="Peyer LC, Zannini E, Arendt EK (2016) Lactic acid bacteria as sensory biomodulators for fermented cereal-based beverages. Trends Food Sci Technol 54:17–25"><span data-dcnode-id="3975" instrument_node="">2016</span></a><span data-dcnode-id="3973" instrument_node="">; Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="3971" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e1129" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="3972" instrument_node="">2016</span></a><span data-dcnode-id="3970" instrument_node="">). Lactic acid bacteria (LAB), bacilli and yeasts (e.g. </span><i data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">Saccharomyces</span></i><span data-dcnode-id="3967" instrument_node="">) are the most widely used microbes for plant-based fermentation (Jeske et al. </span><a aria-label="Reference 2018" data-dcnode-id="3965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d242717608e1136" title="Jeske S, Zannini E, Arendt EK (2018) Past, present and future: the strength of plant-based dairy substitutes based on gluten-free raw materials. Food Res Int 110:42–51"><span data-dcnode-id="3966" instrument_node="">2018</span></a><span data-dcnode-id="3964" instrument_node="">; Steinkraus </span><a aria-label="Reference 1997" data-dcnode-id="3962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d242717608e1139" title="Steinkraus KH (1997) Classification of fermented foods: worldwide review of household fermentation techniques. Food Control 8(5-6):311–317"><span data-dcnode-id="3963" instrument_node="">1997</span></a><span data-dcnode-id="3961" instrument_node="">). Being studied mainly as mono-cultures, these microbes have been proven to possess properties that enhance important nutritional and/or sensory attributes.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3958" id="Sec10"><span data-dcnode-id="3959" instrument_node="">Nutritional value</span></h3><p data-dcnode-id="3923"><span data-dcnode-id="3957" instrument_node="">Most importantly, fermentation can increase protein content by the growth of the fermenting food-grade microbes and by improving plant protein solubility and amino acid composition and availability. As an example, </span><i data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Bifidobacterium</span></i><span data-dcnode-id="3954" instrument_node=""> significantly increased the crude protein content of soy-based drinks (Hou et al. </span><a aria-label="Reference 2000" data-dcnode-id="3952" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d242717608e1152" title="Hou JW, Yu RC, Chou CC (2000) Changes in some components of soymilk during fermentation with bifidobacteria. Food Res Int 33(5):393–397"><span data-dcnode-id="3953" instrument_node="">2000</span></a><span data-dcnode-id="3951" instrument_node="">). Moreover, fermentation of soybean meal with </span><i data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">Lactobacillus plantarum</span></i><span data-dcnode-id="3948" instrument_node=""> resulted in a beneficial increase in essential amino acids such as </span><span class="u-small-caps" data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">l</span></span><span data-dcnode-id="3945" instrument_node="">-lysine (Song et al. </span><a aria-label="Reference 2008" data-dcnode-id="3943" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d242717608e1161" title="Song YS, Frias J, Martinez-Villaluenga C, Vidal-Valdeverde C, Gonzalez de Mejia E (2008) Immunoreactivity reduction of soybean meal by fermentation, effect on amino acid composition and antigenicity of commercial soy products. Food Chem 108(2):571–581"><span data-dcnode-id="3944" instrument_node="">2008</span></a><span data-dcnode-id="3942" instrument_node="">). Notably, specific microbial strains synthesise vitamins during fermentation (LeBlanc et al. </span><a aria-label="Reference 2013" data-dcnode-id="3940" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d242717608e1165" title="LeBlanc JG, Milani C, de Giori GS, Sesma F, van Sinderen D, Ventura M (2013) Bacteria as vitamin suppliers to their host: a gut microbiota perspective. Curr Opin Biotechnol 24(2):160–168"><span data-dcnode-id="3941" instrument_node="">2013</span></a><span data-dcnode-id="3939" instrument_node="">), including vitamin K (Bentley and Meganathan </span><a aria-label="Reference 1982" data-dcnode-id="3937" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d242717608e1168" title="Bentley R, Meganathan R (1982) Biosynthesis of vitamin K (menaquinone) in bacteria. Microbiol Rev 46(3):241–280"><span data-dcnode-id="3938" instrument_node="">1982</span></a><span data-dcnode-id="3936" instrument_node="">) and vitamins of the B group (LeBlanc et al. </span><a aria-label="Reference 2011" data-dcnode-id="3934" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d242717608e1171" title="LeBlanc JG, Laiño JE, Juarez del Valle M, Vannini V, van Sinderen D, Taranto MP, Font de Valdez G, Savoy de Giori G, Sesma F (2011) B-Group vitamin production by lactic acid bacteria–current knowledge and potential applications. J Appl Microbiol 111(6):1297–1309"><span data-dcnode-id="3935" instrument_node="">2011</span></a><span data-dcnode-id="3933" instrument_node="">). Yeast is well known for its ability to produce vitamin B</span><sub data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">2</span></sub><span data-dcnode-id="3930" instrument_node=""> (Lindegren </span><a aria-label="Reference 1945" data-dcnode-id="3928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d242717608e1176" title="Lindegren CC (1945) Yeast genetics: life cycles, cytology, hybridization, vitamin synthesis, and adaptive enzymes. Bacteriol Rev 9(3-4):111–170"><span data-dcnode-id="3929" instrument_node="">1945</span></a><span data-dcnode-id="3927" instrument_node="">). Compared to synthetic fortification, fortification by natural vitamin-producing microorganisms is widely recognised as safer, more natural and more environmentally friendly (LeBlanc et al. </span><a aria-label="Reference 2011" data-dcnode-id="3925" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d242717608e1179" title="LeBlanc JG, Laiño JE, Juarez del Valle M, Vannini V, van Sinderen D, Taranto MP, Font de Valdez G, Savoy de Giori G, Sesma F (2011) B-Group vitamin production by lactic acid bacteria–current knowledge and potential applications. J Appl Microbiol 111(6):1297–1309"><span data-dcnode-id="3926" instrument_node="">2011</span></a><span data-dcnode-id="3924" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3921" id="Sec11"><span data-dcnode-id="3922" instrument_node="">Anti-nutrients and mineral availability</span></h3><p data-dcnode-id="3898"><span data-dcnode-id="3920" instrument_node="">Fermentation by itself or combined with other treatments such as cooking, sprouting and soaking can dramatically reduce the level of anti-nutrients such as tannins, phytates and cyanides in plant-based food (Anderson and Wolf </span><a aria-label="Reference 1995" data-dcnode-id="3918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d242717608e1190" title="Anderson RL, Wolf WJ (1995) Compositional changes in trypsin inhibitors, phytic acid, saponins and isoflavones related to soybean processing. J Nutr 125(3):581S–588S"><span data-dcnode-id="3919" instrument_node="">1995</span></a><span data-dcnode-id="3917" instrument_node="">; Onyesom et al. </span><a aria-label="Reference 2005" data-dcnode-id="3915" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d242717608e1193" title="Onyesom I, Enaholo AT, Mordi J (2005) Effect of processing techniques on the contents of flatulence factors and emulsion properties of cowpea (Vigna unguiculata). J Appl Sci Environ Manag 9:2"><span data-dcnode-id="3916" instrument_node="">2005</span></a><span data-dcnode-id="3914" instrument_node="">; Soetan and Oyewole </span><a aria-label="Reference 2009" data-dcnode-id="3912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d242717608e1196" title="Soetan KO, Oyewole OE (2009) The need for adequate processing to reduce the anti-nutritional factors in plants used as human foods and animal feeds: a review. Afr J Food Sci 3(9):223–232"><span data-dcnode-id="3913" instrument_node="">2009</span></a><span data-dcnode-id="3911" instrument_node="">; Wang et al. </span><a aria-label="Reference 2003" data-dcnode-id="3909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d242717608e1199" title="Wang YC, Yu RC, Yang HY, Chou CC (2003) Sugar and acid contents in soymilk fermented with lactic acid bacteria alone or simultaneously with bifidobacteria. Food Microbiol 20(3):333–338"><span data-dcnode-id="3910" instrument_node="">2003</span></a><span data-dcnode-id="3908" instrument_node="">). As an example, LAB are capable of producing phytases and provide the optimum pH conditions for these enzymes, which then catalyse the hydrolysis of phytates into </span><i data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">myo</span></i><span data-dcnode-id="3905" instrument_node="">-inositol and phosphate, improve digestibility and increase mineral bioavailability (Rekha and Vijayalakshmi </span><a aria-label="Reference 2010" data-dcnode-id="3903" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d242717608e1206" title="Rekha CR, Vijayalakshmi G (2010) Bioconversion of isoflavone glycosides to aglycones, mineral bioavailability and vitamin B complex in fermented soymilk by probiotic bacteria and yeast. J Appl Microbiol 109(4):1198–1208"><span data-dcnode-id="3904" instrument_node="">2010</span></a><span data-dcnode-id="3902" instrument_node="">). As an example, fermentation of finger millet significantly reduced various undesired anti-nutrients (phytates, tannins, and&nbsp;trypsin inhibitor) while simultaneously enhancing mineral extractability and digestibility (Antony and Chandra </span><a aria-label="Reference 1998" data-dcnode-id="3900" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d242717608e1209" title="Antony U, Chandra TS (1998) Antinutrient reduction and enhancement in protein, starch, and mineral availability in fermented flour of finger millet (Eleusine coracana). J Agric Food Chem 46(7):2578–2582"><span data-dcnode-id="3901" instrument_node="">1998</span></a><span data-dcnode-id="3899" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3896" id="Sec12"><span data-dcnode-id="3897" instrument_node="">Bioactive components</span></h3><p data-dcnode-id="3879"><span data-dcnode-id="3895" instrument_node="">Fermentation is capable of increasing the concentration or bioaccessibility of functional (bioactive) compounds. The fermentation of soy using bacteria with β-glucosidase ability enables the conversion of glucoside isoflavones into aglycone isoflavones of higher bioactivity and bioaccessibility (Pyo et al. </span><a aria-label="Reference 2005" data-dcnode-id="3893" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d242717608e1220" title="Pyo YH, Lee TC, Lee YC (2005) Enrichment of bioactive isoflavones in soymilk fermented with β-glucosidase-producing lactic acid bacteria. Food Res Int 38(5):551–559"><span data-dcnode-id="3894" instrument_node="">2005</span></a><span data-dcnode-id="3892" instrument_node="">), which has also been observed for seeds of kerandang, a flowering plant belonging to the legume family (Titiek et al. </span><a aria-label="Reference 2013" data-dcnode-id="3890" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d242717608e1223" title="Titiek FD, Umar S, Cahyanto MN, Takuya S, Endang SR, Kosuke N (2013) Effect of indigenous lactic acid bacteria fermentation on enrichment of isoflavone and antioxidant properties of kerandang (Canavalia virosa) extract. Int Food Res J 20(5):2945"><span data-dcnode-id="3891" instrument_node="">2013</span></a><span data-dcnode-id="3889" instrument_node="">). Correspondingly, </span><i data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">L. plantarum</span></i><span data-dcnode-id="3886" instrument_node=""> is able to transform sesaminol triglucoside of sesame milk into bioactive sesaminol aglycone with enhanced radical scavenging activity (Ulyatu et al. </span><a aria-label="Reference 2015" data-dcnode-id="3884" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d242717608e1229" title="Ulyatu F, Pudji H, Tyas U, Umar S (2015) The changes of sesaminol triglucoside and antioxidant properties during fermentation of sesame milk by Lactobacillus plantarum Dad 13. Int Food Res J 22(5):1945"><span data-dcnode-id="3885" instrument_node="">2015</span></a><span data-dcnode-id="3883" instrument_node="">). It was also reported that LAB fermentation of soy releases bioactive peptides, which inhibit angiotensin-converting enzymes that are related to the desired antihypertensive effect (Hou et al. </span><a aria-label="Reference 2000" data-dcnode-id="3881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d242717608e1232" title="Hou JW, Yu RC, Chou CC (2000) Changes in some components of soymilk during fermentation with bifidobacteria. Food Res Int 33(5):393–397"><span data-dcnode-id="3882" instrument_node="">2000</span></a><span data-dcnode-id="3880" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3877" id="Sec13"><span data-dcnode-id="3878" instrument_node="">Sensory profile</span></h3><p data-dcnode-id="3848"><span data-dcnode-id="3876" instrument_node="">Fermentation can improve the sensory profile of plant-based milk alternatives (Mital and Steinkraus </span><a aria-label="Reference 1979" data-dcnode-id="3874" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d242717608e1244" title="Mital BK, Steinkraus KH (1979) Fermentation of soy milk by lactic acid bacteria. A review. J Food Prot 42(11):895–899"><span data-dcnode-id="3875" instrument_node="">1979</span></a><span data-dcnode-id="3873" instrument_node="">). As an example, microbial fermentation decreased the beany flavour of plant materials, probably due to deprivation of </span><i data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">n</span></i><span data-dcnode-id="3870" instrument_node="">-hexanal and </span><i data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">n</span></i><span data-dcnode-id="3867" instrument_node="">-hexanol (Wang et al. </span><a aria-label="Reference 2003" data-dcnode-id="3865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d242717608e1253" title="Wang YC, Yu RC, Yang HY, Chou CC (2003) Sugar and acid contents in soymilk fermented with lactic acid bacteria alone or simultaneously with bifidobacteria. Food Microbiol 20(3):333–338"><span data-dcnode-id="3866" instrument_node="">2003</span></a><span data-dcnode-id="3864" instrument_node="">). In addition, fermentation can result in desirable volatile flavours. For example, diacetyl (2,3-butanedione), which provides a nice, butterscotch-like aroma, is emitted during cereal-based fermentation (Peyer et al. </span><a aria-label="Reference 2016" data-dcnode-id="3862" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d242717608e1256" title="Peyer LC, Zannini E, Arendt EK (2016) Lactic acid bacteria as sensory biomodulators for fermented cereal-based beverages. Trends Food Sci Technol 54:17–25"><span data-dcnode-id="3863" instrument_node="">2016</span></a><span data-dcnode-id="3861" instrument_node="">). Acetaldehyde, delivering a pungent, fruity (green apple) flavour with sweet notes, increases in concentration in peanut, cereal and soy during fermentation (Horáčková et al. </span><a aria-label="Reference 2015" data-dcnode-id="3859" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d242717608e1260" title="Horáčková Š, Mühlhansová A, Sluková M, Schulzová V, Plocková M (2015) Fermentation of soymilk by yoghurt and bifidobacteria strains. Czech J Food Sci 33(4)"><span data-dcnode-id="3860" instrument_node="">2015</span></a><span data-dcnode-id="3858" instrument_node="">; Lee and Beuchat </span><a aria-label="Reference 1991" data-dcnode-id="3856" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d242717608e1263" title="Lee C, Beuchat LR (1991) Changes in chemical composition and sensory qualities of peanut milk fermented with lactic acid bacteria. Int J Food Microbiol 13(4):273–283"><span data-dcnode-id="3857" instrument_node="">1991</span></a><span data-dcnode-id="3855" instrument_node="">; Sethi et al. </span><a aria-label="Reference 2016" data-dcnode-id="3853" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d242717608e1266" title="Sethi S, Tyagi SK, Anurag RK (2016) Plant-based milk alternatives an emerging segment of functional beverages: a review. J Food Sci Technol 53(9):3408–3423"><span data-dcnode-id="3854" instrument_node="">2016</span></a><span data-dcnode-id="3852" instrument_node="">). The flavour and taste of plant-based milk alternatives is also affected by changes in the levels of amino acids (Yamanaka et al. </span><a aria-label="Reference 1970" data-dcnode-id="3850" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d242717608e1269" title="Yamanaka Y, Okumura S, Mitsugi K, Hasegawa Y (1970) Method of preparing a sour milk beverage. US Patent 3535117, 20 Oct 1970"><span data-dcnode-id="3851" instrument_node="">1970</span></a><span data-dcnode-id="3849" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="3461" data-title="Mixed-culture fermentation can provide synergistic effects to enhance quality"><div class="c-article-section" data-dcnode-id="3462" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3843" id="Sec14"><span data-dcnode-id="3844" instrument_node="">Mixed-culture fermentation can provide synergistic effects to enhance quality</span></h2><div class="c-article-section__content" data-dcnode-id="3463" id="Sec14-content"><p data-dcnode-id="3835"><span data-dcnode-id="3842" instrument_node="">An interesting and obviously important concept is the use of mixed cultures to ferment plant materials. Generally, interactions between microbes in mixed cultures are numerous and complex, for example competition (−/− interaction), mutualism (+/+ interaction), commensalism (+/0 interaction), amensalism (−/0 interaction), and parasitism (+/− interaction) (Sieuwerts et al. </span><a aria-label="Reference 2008" data-dcnode-id="3840" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d242717608e1281" title="Sieuwerts S, de Bok FAM, Hugenholtz J, van Hylckama Vlieg JET (2008) Unraveling microbial interactions in food fermentations: from classical to genomics approaches. Appl Environ Microbiol 74(16):4997–5007"><span data-dcnode-id="3841" instrument_node="">2008</span></a><span data-dcnode-id="3839" instrument_node="">). Desired interactions during mixed-culture fermentation are mainly of a mutualistic and commensalistic nature, by which beneficial activities of at least one microbe are promoted (National Research Council </span><a aria-label="Reference 1992" data-dcnode-id="3837" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d242717608e1284" title="National Research Council (1992) Applications of biotechnology in traditional fermented foods. National Academies Press, Washington, D.C."><span data-dcnode-id="3838" instrument_node="">1992</span></a><span data-dcnode-id="3836" instrument_node="">).</span></p><p data-dcnode-id="3794"><span data-dcnode-id="3834" instrument_node="">The cooperation between </span><i data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Streptococcus thermophilus</span></i><span data-dcnode-id="3831" instrument_node=""> and </span><i data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">Lactobacillus delbrueckii</span></i><span data-dcnode-id="3828" instrument_node=""> subsp. </span><i data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">bulgaricus</span></i><span data-dcnode-id="3825" instrument_node=""> during yogurt fermentation is a well-understood example of mutualism. The proteolytic </span><i data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">Lactobacillus</span></i><span data-dcnode-id="3822" instrument_node=""> strain benefits the non-proteolytic </span><i data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">S. thermophilus</span></i><span data-dcnode-id="3819" instrument_node=""> through the release of peptides and free amino acids as a nitrogen source. Conversely, </span><i data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">S. thermophilus</span></i><span data-dcnode-id="3816" instrument_node=""> provides </span><i data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">L. delbrueckii</span></i><span data-dcnode-id="3813" instrument_node=""> with growth-stimulating factors such as formic acid, pyruvic acid, folic acid and carbon dioxide (Sieuwerts et al. </span><a aria-label="Reference 2008" data-dcnode-id="3811" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d242717608e1312" title="Sieuwerts S, de Bok FAM, Hugenholtz J, van Hylckama Vlieg JET (2008) Unraveling microbial interactions in food fermentations: from classical to genomics approaches. Appl Environ Microbiol 74(16):4997–5007"><span data-dcnode-id="3812" instrument_node="">2008</span></a><span data-dcnode-id="3810" instrument_node="">). In a mixed culture, the two strains stimulate one another’s growth, acid production and volatile compound formation (Sieuwerts et al. </span><a aria-label="Reference 2008" data-dcnode-id="3808" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d242717608e1315" title="Sieuwerts S, de Bok FAM, Hugenholtz J, van Hylckama Vlieg JET (2008) Unraveling microbial interactions in food fermentations: from classical to genomics approaches. Appl Environ Microbiol 74(16):4997–5007"><span data-dcnode-id="3809" instrument_node="">2008</span></a><span data-dcnode-id="3807" instrument_node="">). A synergistic effect on growth has also been observed for soy fermentation (Chumchuere and Robinson </span><a aria-label="Reference 1999" data-dcnode-id="3805" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d242717608e1318" title="Chumchuere S, Robinson RK (1999) Selection of starter cultures for the fermentation of soya milk. Food Microbiol 16(2):129–137"><span data-dcnode-id="3806" instrument_node="">1999</span></a><span data-dcnode-id="3804" instrument_node="">), probably related to the different glycolytic activities of the strains involved. More specifically, microbial consortia can cooperate to enable multistep biotransformations. A prominent example demonstrated a close cooperation of microbes in simulated cocoa pulp fermentation: LAB form lactate, while yeasts form ethanol during the early stage of the fermentation. Both nutrients, in turn, are crucial co-substrates for acetic acid bacteria, which then accumulate acetate, the key molecule that initiates the formation of aroma and flavour compounds (Adler et al. </span><a aria-label="Reference 2013" data-dcnode-id="3802" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d242717608e1321" title="Adler P, Bolten CJ, Dohnt K, Hansen CE, Wittmann C (2013) Core fluxome and meta fluxome of lactic acid bacteria under cocoa pulp fermentation simulating conditions. Appl Environ Microbiol 79(18):5670–5681"><span data-dcnode-id="3803" instrument_node="">2013</span></a><span data-dcnode-id="3801" instrument_node="">). Demonstrated effects of mixed cultures in the generation of plant-based milk alternatives are summarised in Figs. </span><a data-dcnode-id="3799" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3800" instrument_node="">5</span></a><span data-dcnode-id="3798" instrument_node=""> and </span><a data-dcnode-id="3796" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3797" instrument_node="">6</span></a><span data-dcnode-id="3795" instrument_node=""> and are described in more detail in the following subsections.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3770" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="3771"><figcaption data-dcnode-id="3791"><b class="c-article-section__figure-caption" data-dcnode-id="3792" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="3793" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3782"><div class="c-article-section__figure-item" data-dcnode-id="3786"><a class="c-article-section__figure-link" data-dcnode-id="3787" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00253-019-10175-9/figures/5" rel="nofollow"><picture data-dcnode-id="3788"><source data-dcnode-id="3790" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00253-019-10175-9/MediaObjects/253_2019_10175_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="3789" height="206" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00253-019-10175-9/MediaObjects/253_2019_10175_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3783" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">Impact of mixed-culture fermentation on the quality of plant-based milk alternatives. Comparison between mixed-culture and mono-culture fermentation: microbial growth (A), essential amino acid level (B), vitamin level (C). The white area covers desired synergistic effects (desired), while the grey area covers undesired effects that result from mixed-culture fermentation (undesired)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3772"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="3773" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00253-019-10175-9/figures/5" rel="nofollow"><span data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3774" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3775" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3776" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3779" instrument_node="">
