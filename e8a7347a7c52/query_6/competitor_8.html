</span><br data-dcnode-id="1219"><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Rhubarb has been used for medicinal purposes for hundreds of years. It is one of the most commonly used herbs in Chinese Medicine. Of all the many herbs cultivated for medicinal uses in early civilizations, Chinese Rhubarb remains one of the few which is still used today.</span></p><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">In traditional China, rhubarb root was used for curing stomach ailments, relieving severe constipation, and as a poultice for fevers and swelling.</span></p><p data-dcnode-id="1209"><span data-dcnode-id="1213" instrument_node="">It is the </span><b data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">roots and rhizome</span></b><span data-dcnode-id="1210" instrument_node=""> which are used for medicinal uses. </span></p><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">In the autumn, roots are harvested from rhubarb plants that are between 6 - 10 years old. The roots are cut and divided into cube shaped pieces to increase the surface area, thereby accelerating the drying of the roots. </span></p><p data-dcnode-id="1202"><span data-dcnode-id="1206" instrument_node="">Perhaps medicinal rhubarb is most commonly known for its astringent </span><b data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">tonic to the digestive system</span></b><span data-dcnode-id="1203" instrument_node="">. </span></p><p data-dcnode-id="1194"><span data-dcnode-id="1201" instrument_node="">When taken </span><em data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">internally</span></em><span data-dcnode-id="1198" instrument_node="">, larger doses of rhubarb is believed to work as a very </span><b data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">mild laxative</span></b><span data-dcnode-id="1195" instrument_node="">. </span></p><span data-dcnode-id="1193" instrument_node="">
</span><br data-dcnode-id="1192"><span data-dcnode-id="1191" instrument_node="">
