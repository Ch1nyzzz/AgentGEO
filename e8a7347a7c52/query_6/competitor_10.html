</span><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">You know that summer is just about here when the strawberry and rhubarb plants start producing here in Connecticut. I got my first rhubarb stalk, but there aren't enough ripe strawberries in our garden to make a strawberry rhubarb crisp, so I opted to make these cinnamon rhubarb muffins instead.</span></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">This was the first time I've actually eaten rhubarb by itself. Before making this recipe, I've always combined rhubarb with sweet berries.</span></p><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">The cinnamon flavor of these rhubarb muffins is similar to some of my favorite cereals so I've been enjoying them for breakfast. I didn't realize rhubarb had such a wonderful flavor on its own.</span></p><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">It's slight tartness does compliment the sweetness of fruit, but adding cinnamon and sweetener to plain rhubarb is really tasty. I'm glad I finally decided to try this low carb vegetable on its own in a sweet gluten free muffin without any added fruit.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2301"><figure class="aligncenter size-full" data-dcnode-id="2302"><img alt="Rhubarb stalk" class="wp-image-8112 perfmatters-lazy loaded" data-dcnode-id="2305" data-pin-media="https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk.jpg" data-pin-nopin="true" data-sizes="(max-width: 720px) 100vw, 720px" data-src="https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk.jpg" data-srcset="https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk.jpg 720w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-450x300.jpg 450w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-360x240.jpg 360w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-180x120.jpg 180w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-600x400.jpg 600w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-1024x683.jpg 1024w" data-was-processed="true" height="480" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk.jpg&amp;raw" srcset="https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk.jpg 720w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-450x300.jpg 450w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-360x240.jpg 360w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-180x120.jpg 180w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-600x400.jpg 600w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-1024x683.jpg 1024w" width="720"><noscript data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">&lt;img width="720" height="480" data-pin-nopin="true" src="https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk.jpg" alt="Rhubarb stalk" class="wp-image-8112" srcset="https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk.jpg 720w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-450x300.jpg 450w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-360x240.jpg 360w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-180x120.jpg 180w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-600x400.jpg 600w, https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk-1024x683.jpg 1024w" sizes="(max-width: 720px) 100vw, 720px" data-pin-media="https://lowcarbyum.com/wp-content/uploads/2015/06/rhubarb-stalk.jpg"&gt;</span></noscript></figure></div><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">I used a whole stalk of rhubarb in the recipe. It yielded a little over a cup of diced rhubard.</span></p><span data-dcnode-id="2297" instrument_node="">
