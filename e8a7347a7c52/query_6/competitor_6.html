</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Rhubarb crumble is one of my husband's favorite desserts. Ever. He isn't following a low carb diet but is certainly happy to give my creations a try. This keto crumble definitely got his approval!</span></p><span data-dcnode-id="1416" instrument_node="">
</span><h2 data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">How to Make Low Carb Rhubarb Crumble</span></h2><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1412" instrument_node="">To make the base, roughly chop the rhubarb and place it in a saucepan. Add a little water and your sweetener of choice. As this is going to be cooked I go for something granulated like </span><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stepawayfromthecarbs.com/lakanto" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1411" instrument_node="">Lakanto</span></a><span data-dcnode-id="1409" instrument_node="">&nbsp; or Swerve. How much you add will depend on your personal taste and how sharp your rhubarb stalks are. I'd recommend adding maybe a teaspoon of sweetener, cooking the rhubarb until it really starts to break down, then tasting again.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1406" instrument_node="">Meanwhile, make the crumble topping, by adding </span><a data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Bobs-Red-Mill-Super-Almond/dp/B010NBN1TM/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1487782785%26sr%3D1-2%26keywords%3Dalmond%2Bflour%26linkCode%3Dll1%26tag%3Dlowcarb02-20%26linkId%3D383f10c47009264be98f23f2a8acb8fe" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1405" instrument_node="">almond flour</span></a><span data-dcnode-id="1403" instrument_node="">, </span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Bobs-Red-Mill-Flaxseed-Package/dp/B00I8G40DQ/ref%3Das_li_ss_tl%3Fsrs%3D7301146011%26ie%3DUTF8%26qid%3D1487782825%26sr%3D8-1%26keywords%3Dflaxseed%2Bmeal%26linkCode%3Dll1%26tag%3Dlowcarb02-20%26linkId%3Daa74d2e48e7782f1f830b56504670af3" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1402" instrument_node="">flaxseed meal,</span></a><span data-dcnode-id="1400" instrument_node=""> more low carb sweetener, and butter to a bowl. Using your hands, rub the ingredients together until&nbsp;the mixture&nbsp;forms large breadcrumbs. It will take a few minutes but it is quite&nbsp;satisfying work! </span><noscript data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-18354 size-full" title="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" src="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1.jpg" alt="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" width="600" height="693" srcset="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1.jpg 600w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1-260x300.jpg 260w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1-519x600.jpg 519w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-webp="true"&gt;</span></noscript></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-18354 size-full" data-dcnode-id="1392"><img alt="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" class="lazyload" data-dcnode-id="1397" data-pin-description="This low carb rhubarb crumble is a lovely dessert that will finish your meal off perfectly. Sugar free and gluten free recipe." data-pin-media="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1.jpg" data-pin-title="Low Carb Rhubarb Crumble" data-src="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1.jpg.webp" data-srcset="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1.jpg.webp 600w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1-260x300.jpg.webp 260w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1-519x600.jpg.webp 519w" data-webp="true" height="693" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1.jpg.webp&amp;raw" srcset="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1.jpg.webp 600w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1-260x300.jpg.webp 260w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m1-1-519x600.jpg.webp 519w" style="" title="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" width="600"><a aria-label="Save" class="d </span><p data-dcnode-id="1386"><span data-dcnode-id="1389" instrument_node="">Once the rhubarb is cooked and with the right sweetness, transfer it to a </span><a data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Creuset-Heritage-Stoneware-Gratin-Marseille/dp/B007K7ZDSK/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1530390908%26sr%3D8-1-spell%26keywords%3Dle%2Bcreuset%2Bmarseile%2Bgratin%26linkCode%3Dll1%26tag%3Dlowcarb02-20%26linkId%3D639034b0911d325ec8a37dd31e30cf11" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1388" instrument_node="">small baking dish.</span></a></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1376"><noscript data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-18355 size-full" title="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" src="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m2-1.jpg" alt="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" width="600" height="579" srcset="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m2-1.jpg 600w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m2-1-300x290.jpg 300w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-webp="true"&gt;</span></noscript></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-18355 size-full" data-dcnode-id="1377"><img alt="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" class="lazyload" data-dcnode-id="1382" data-pin-description="This low carb rhubarb crumble is a lovely dessert that will finish your meal off perfectly. Sugar free and gluten free recipe." data-pin-media="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m2-1.jpg" data-pin-title="Low Carb Rhubarb Crumble" data-src="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m2-1.jpg.webp" data-srcset="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m2-1.jpg.webp 600w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m2-1-300x290.jpg.webp 300w" data-webp="true" height="579" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m2-1.jpg.webp&amp;raw" srcset="https://stepawayfromthecarbs.com/wp-con </span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Spread the topping evenly over the rhubarb. Don't worry of it doesn't cover the rhubarb completely as it is very pleasing to have little pockets of rhubarb bubbling up through the topping!</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Place in a preheated oven and cook for 15-20 minutes. What an amazing smell! Divide into four serving dishes. This dessert is great on its own but&nbsp;some low carb vanilla ice cream would complement it very nicely too!</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1360"><noscript data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-18356 size-full" title="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" src="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m3.jpg" alt="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" width="600" height="740" srcset="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m3.jpg 600w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m3-243x300.jpg 243w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m3-486x600.jpg 486w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-webp="true"&gt;</span></noscript></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-18356 size-full" data-dcnode-id="1361"><img alt="Low Carb Rhubarb Crumble - a delicious gluten free and sugar free dessert recipe" class="lazyload" data-dcnode-id="1366" data-pin-description="This low carb rhubarb crumble is a lovely dessert that will finish your meal off perfectly. Sugar free and gluten free recipe." data-pin-media="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m3.jpg" data-pin-title="Low Carb Rhubarb Crumble" data-src="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m3.jpg.webp" data-srcset="https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m3.jpg.webp 600w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m3-243x300.jpg.webp 243w, https://stepawayfromthecarbs.com/wp-content/uploads/2015/06/low-carb-rhubarb-crumble-m3-486x600.jpg.webp 486w" data-webp="true" height="740" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatno </span><h3 class="mv-create-ingredients-title mv-create-title-secondary" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Ingredients</span></h3><span data-dcnode-id="1203" instrument_node="">
</span><h4 data-dcnode-id="1202"></h4><span data-dcnode-id="1201" instrument_node="">
</span><ul data-dcnode-id="1169"><span data-dcnode-id="1200" instrument_node="">
</span><li data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">
						6 stalks fresh rhubarb, roughly chopped					</span></li><span data-dcnode-id="1197" instrument_node="">
</span><li data-dcnode-id="1192"><span data-dcnode-id="1196" instrument_node="">
</span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stepawayfromthecarbs.com/lakanto" rel="nofollow"><span data-dcnode-id="1195" instrument_node="">1 tsp Lakanto, or similar sweetener</span></a><span data-dcnode-id="1193" instrument_node=""> </span></li><span data-dcnode-id="1191" instrument_node="">
</span><li data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">
						2 tbs water					</span></li><span data-dcnode-id="1188" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">
						½ cup almond flour					</span></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">
</span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Spectrum-Essentials-Organic-Ground-Flaxseed/dp/B00DOKFLYI/ref%3Das_li_ss_tl%3Fs%3Dgrocery%26ie%3DUTF8%26qid%3D1520636117%26sr%3D1-3%26keywords%3Dflaxseed%2Bmeal%26th%3D1%26linkCode%3Dll1%26tag%3Dlowcarb02-20%26linkId%3D1bdc54d20d91e20dbf404112fd9255df" rel="nofollow" target="_blank"><span data-dcnode-id="1183" instrument_node="">¼ cup flaxseed meal</span></a><span data-dcnode-id="1181" instrument_node=""> </span></li><span data-dcnode-id="1179" instrument_node="">
</span><li data-dcnode-id="1174"><span data-dcnode-id="1178" instrument_node="">
</span><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakanto.com/%3Frfsn%3D2644653.be3bdc911" rel="nofollow" target="_blank"><span data-dcnode-id="1177" instrument_node="">3 tbs Lakanto</span></a><span data-dcnode-id="1175" instrument_node=""> </span></li><span data-dcnode-id="1173" instrument_node="">
</span><li data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">

</span><ol data-dcnode-id="1149"><li data-dcnode-id="1158" id="mv_create_95_1"><span data-dcnode-id="1159" instrument_node="">Preheat the oven to 375F. </span></li><li data-dcnode-id="1156" id="mv_create_95_2"><span data-dcnode-id="1157" instrument_node="">Add the rhubarb, sweetener and water to a saucepan and simmer until rhubarb is cooked.  </span></li><li data-dcnode-id="1154" id="mv_create_95_3"><span data-dcnode-id="1155" instrument_node="">Meanwhile, make the crumble topping by rubbing together the remaining ingredients until they are the size of large breadcrumbs. </span></li><li data-dcnode-id="1152" id="mv_create_95_4"><span data-dcnode-id="1153" instrument_node="">Test the rhubarb for sweetness and adjust if necessary, then spread it over the base of a small baking dish. </span></li><li data-dcnode-id="1150" id="mv_create_95_5"><span data-dcnode-id="1151" instrument_node="">Sprinkle the topping over the rhubarb and bake for 15-20 minutes or until golden brown on top and the rhubarb is bubbling through the topping. </span></li></ol><span data-dcnode-id="1148" instrument_node=""> </span></div><span data-dcnode-id="1146" instrument_node="">
