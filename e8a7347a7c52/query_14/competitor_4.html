</span><h3 class="recipe-instructions-heading" data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Preparation</span></h3><span data-dcnode-id="2192" instrument_node="">
</span><ol class="recipe-steps" data-dcnode-id="2175"><span data-dcnode-id="2191" instrument_node="">
</span><li data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Prepare the pastry: combine the flour, salt and sugar in a large mixing bowl. Using a fork or pastry cutter, work half of the butter into the flour until it resembles coarse meal. Quickly work the remaining butter into the dough until the biggest pieces are the size of lima beans. Drizzle in the water in several additions, tossing and mixing between each. (It should look rather ropy and rough.) Stop adding water when a few bits of dry flour remain in the bottom of the bowl; do not overwork the dough or it will become tough. Gather two-thirds of the dough and wrap tightly with plastic wrap. Do the same with the remaining third. Flatten into disks. Refrigerate for at least 30 minutes. When the dough is chilled, roll out the larger piece and line a nine-inch pie pan.</span></li><span data-dcnode-id="2188" instrument_node="">
</span><li data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">If rhubarb is thick, peel it. Combine rhubarb and strawberries in a bowl. Mix sugar and tapioca together and fold gently into the strawberries and rhubarb. Allow to macerate for 15 minutes.</span></li><span data-dcnode-id="2185" instrument_node="">
</span><li data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Preheat oven to 425.</span></li><span data-dcnode-id="2182" instrument_node="">
</span><li data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Spoon fruit into pastry shell and dot with butter. Roll out remaining pastry, cut into strips three-quarters of an inch wide and weave a lattice to cover the pie. You can simply lay the strips on top in criss-cross fashion if weaving is not one of your skills. Seal, trim and crimp the edges. Brush the lattice with milk and sprinkle with a bit of sugar.</span></li><span data-dcnode-id="2179" instrument_node="">
</span><li data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">Bake in preheated oven for 15 minutes. Lower heat to 350 degrees and bake 40 minutes longer, until pastry has browned and filling begins to bubble. Let pie cool completely before serving, at least 3 hours and up to overnight to set the filling.</span></li><span data-dcnode-id="2176" instrument_node="">
</span></ol><span data-dcnode-id="2174" instrument_node="">
