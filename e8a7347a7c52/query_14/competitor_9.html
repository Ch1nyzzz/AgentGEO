</span><p data-dcnode-id="1650" style="text-align: center;"><span data-dcnode-id="1651" instrument_node="">If you've ever made a homemade strawberry jam recipe, adding rhubarb enhances both the flavor and texture! You can easily store it in your refrigerator or freezer, or can it in a water bath to last all year long!</span></p><span data-dcnode-id="1649" instrument_node="">

awberry Rhubarb Jam from fresh rhubarb, strawberries, sugar and lemon without pectin! If you've ever made a homemade strawberry jam recipe, adding rhubarb enhances both the flavor and texture! You can easily store it in your refrigerator or freezer, or can it in a water bath to last all year long!" src="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam.jpg" alt="homemade Jam made from strawberries and rhubarb on toast" width="680" height="1022" data-pin-description="Canning in jars is easy when you know How to Make Strawberry Rhubarb Jam from fresh rhubarb, strawberries, sugar and lemon without pectin. #strawberry #rhubarb #jam #jelly #strawberryrhubarb #strawberryrhubarbjam #canning #recipe #best #nopectin #freezer" srcset="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam.jpg 680w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-200x300.jpg 200w" sizes="(max-width: 680px) 100vw, 680px" /&gt;</span></noscript><p></p><span data-dcnode-id="1639" instrument_node="">
</span><h2 data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Why this recipe works:</span></h2><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">You will see that this recipe is not only incredibly simple with only four ingredients, but it is extremely easy to make.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Strawberry and rhubarb are so amazing together. The combination is perfectly sweet and tart all at the same time.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">The jam tastes great on toast, oatmeal, or ice cream.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Also, if you want to make a big batch, you can easily turn it into freezer jam or preserve it in a mason jar using a simple water bath canning set up for longer storage.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><h2 data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Here's how to make it:</span></h2><span data-dcnode-id="1621" instrument_node="">
</span><ol data-dcnode-id="1595"><span data-dcnode-id="1620" instrument_node="">
</span><li data-dcnode-id="1612"><span data-dcnode-id="1619" instrument_node="">Slice your </span><strong data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">rhubarb</span></strong><span data-dcnode-id="1616" instrument_node=""> into small chunks (photo 1) and be sure to discard the tops. Likewise, prepare your </span><strong data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">strawberries</span></strong><span data-dcnode-id="1613" instrument_node=""> by washing them and removing the stems (photo 2).</span></li><span data-dcnode-id="1611" instrument_node="">
</span><li data-dcnode-id="1603"><span data-dcnode-id="1610" instrument_node="">Combine the fruit with the </span><strong data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">sugar</span></strong><span data-dcnode-id="1607" instrument_node=""> and </span><strong data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">lemon juice</span></strong><span data-dcnode-id="1604" instrument_node=""> in a saucepan (photo 3). Turn the heat to medium and when the mixture starts to bubble (photo 4), reduce the heat to low.</span></li><span data-dcnode-id="1602" instrument_node="">
</span><li data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Continue to cook, stirring occasionally, until the jam thickens (photo 5). It can take around an hour to fully breakdown and thicken. You'll want the mixture to reach at least 205 degrees F.</span></li><span data-dcnode-id="1599" instrument_node="">
</span><li data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">I like to store my jam in mason jars (photo 6). Refrigerate if you'll eat within a week, otherwise store or water bath can it.</span></li><span data-dcnode-id="1596" instrument_node="">
</span></ol><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1585"></p><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-50881" data-dcnode-id="1588"><img alt="step by step photos of how to make strawberry rhubarb jam" class="entered lazyloaded" data-dcnode-id="1593" data-lazy-sizes="(max-width: 1704px) 100vw, 1704px" data-lazy-src="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-process-scaled.jpg" data-lazy-srcset="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-process-scaled.jpg 1200w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-process-scaled-200x300.jpg 200w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-process-scaled-768x1154.jpg 768w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-process-scaled-1022x1536.jpg 1022w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-process-scaled-720x1082.jpg 720w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-process-scaled-360x541.jpg 360w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-process-scaled-180x270.jpg 180w" data-ll-status="loaded" data-pin-description="A homemade Strawberry Rhubarb Jam Recipe made from fresh rhubarb, strawberries, sugar, and lemon without pectin! This is the best jam with amazing flavors and texture. You can easily store it in your refrigerator or freezer, or can it! Save this pin! #jam #strawberry #rhubarb #recipe #best #nopectin" data-pin-title="Strawberry Rhubarb Jam Recipe " height="2560" sizes="(max-width: 1704px) 100vw, 1704px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-process-scaled.jpg&amp;raw" srcset="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb </span><h2 data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Cooking tips:</span></h2><span data-dcnode-id="1581" instrument_node="">
</span><ul data-dcnode-id="1570"><span data-dcnode-id="1580" instrument_node="">
</span><li data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">The quality of the jam will depend on the quality of the fruit. I used the best possible strawberries in the world - Oregon Hood strawberries. Try to find fresh rhubarb that is deep red on the outside with thick firm stalks.</span></li><span data-dcnode-id="1577" instrument_node="">
</span><li data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">If your strawberries aren't sweet, you may need to increase the amount of sugar in your recipe to compensate.</span></li><span data-dcnode-id="1574" instrument_node="">
</span><li data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">I recommend using fresh squeeze lemon juice although you could substitute with bottled.</span></li><span data-dcnode-id="1571" instrument_node="">
</span></ul><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1560"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-8643 size-full" data-dcnode-id="1563"><img alt="Fresh rhubarb and strawberries to make homemade jam" class="entered lazyloaded" data-dcnode-id="1568" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot.jpg" data-lazy-srcset="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot.jpg 680w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot-150x150.jpg 150w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot-300x300.jpg 300w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot-450x450.jpg 450w" data-ll-status="loaded" data-pin-description="Canning in jars is easy when you know How to Make Strawberry Rhubarb Jam from fresh rhubarb, strawberries, sugar and lemon without pectin. #strawberry #rhubarb #jam #jelly #strawberryrhubarb #strawberryrhubarbjam #canning #recipe #best #nopectin #freezer" data-pin-title="How to Make Strawberry Rhubarb Jam" height="680" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot.jpg&amp;raw" srcset="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot.jpg 680w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot-150x150.jpg 150w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot-300x300.jpg 300w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-pot-450x450.jpg 450w" style="" title="Make homemade Strawberry Rhubarb Jam from fresh rhubarb, strawberries, sugar and lemon without pectin! If you've ever made a homemade strawberry jam recipe, adding rhubarb enhances both the flavor and texture! You can easily store it in your refrigerator or freezer, or can it in a water bath to last all year long!" width="680"><a aria-label="PIN IT!" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rounded dpsp-pin-it-button-has-label" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fselfproclaimedfoodie.com%252Fwp-content%252Fuploads%252Fhow-to-make-strawberry-rhubarb-jam-pot.jpg%26url%3Dhttps%253A%252F%252Fselfproclaimedfoodie.com%252Fhow-to-make-strawberry-rhubarb-jam%252F%26is_video%3Dfalse%26description%3DCanning%2520in%2520jars%2520is%2520easy%2520when%2520you%2520know%2520How%2520to%2520Make%2520Strawberry%2520Rhubarb%2520Jam%2520from%2520fresh%2520rhubarb%252C%2520strawberries%252C%2520sugar%2520and%2520lemon%2520without%2520pectin.%2520%2523strawberry%2520%2523rhubarb%2520%2523jam%2520%2523jelly%2520%2523strawberryrhubarb%2520%2523strawberryrhubarbjam%2520%2523canning%2520%2523recipe%2520%2523best%2520%2523nopectin%2520%2523freezer" rel="noopener" target="_blank" title="PIN IT!"><span class="dpsp-network-icon" data-dcnode-id="1565"><svg data-dcnode-id="1566" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.95 </span><h2 data-dcnode-id="1556"><span data-dcnode-id="1557" style="line-height: 1.5;"><span data-dcnode-id="1558" instrument_node="">Reasons to add rhubarb to your strawberry jam recipe:</span></span></h2><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" style="line-height: 1.5;"><span data-dcnode-id="1554" instrument_node="">I actually use more than twice the amount of rhubarb in this recipe than I do strawberries. </span></span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" style="line-height: 1.5;"><span data-dcnode-id="1550" instrument_node="">I do this for a few reasons. </span></span></p><span data-dcnode-id="1547" instrument_node="">
</span><ul data-dcnode-id="1537"><span data-dcnode-id="1546" instrument_node="">
</span><li data-dcnode-id="1543"><span data-dcnode-id="1544" style="line-height: 1.5;"><span data-dcnode-id="1545" instrument_node="">First, rhubarb is much cheaper than strawberries (at least mine was). </span></span></li><span data-dcnode-id="1542" instrument_node="">
</span><li data-dcnode-id="1539"><span data-dcnode-id="1540" style="line-height: 1.5;"><span data-dcnode-id="1541" instrument_node="">Second, if you're not going to use pectin, you need a lot of sugar in order to get your jam to gel up. Strawberries are already incredibly sweet, so the addition of a ton of sugar is just nauseating. Rhubarb, however, is incredibly tart, so the addition of sugar makes everything right in the world. </span></span></li><span data-dcnode-id="1538" instrument_node="">
</span></ul><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" style="line-height: 1.5;"><span data-dcnode-id="1535" instrument_node="">I saw a lot of recipes online that called for a heck of a lot more sugar than I used and let me tell you - if you're using good quality sweet strawberries, I wouldn't put any more sugar than what my recipe calls for. The balance was perfect as was the final consistency.</span></span></p><span data-dcnode-id="1532" instrument_node="">
</span><h2 data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">How much does this recipe make?</span></h2><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">As written, this recipe makes about 4 cups of homemade jam.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">As much pleasure as I would have taken in devouring all four cups with a spoon and some crusty white bread, I decided to can four jars of this liquid gold for the winter months when I'm craving the summer bounty that had long since come and gone. I did, however, get enough extra to fill this little dish which made for some incredibly tasty treats.</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">If you don't want to can the jam, it will keep in the refrigerator for a couple of weeks, but let's face it - canning is fun! &nbsp;So preserve it!</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1511"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-8641 size-full" data-dcnode-id="1514"><img alt="Strawberry jam and rhubarb jam come together in one great recipe" class="entered lazyloaded" data-dcnode-id="1519" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-jars.jpg" data-lazy-srcset="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-jars.jpg 680w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-jars-300x200.jpg 300w" data-ll-status="loaded" data-pin-description="Canning in jars is easy when you know How to Make Strawberry Rhubarb Jam from fresh rhubarb, strawberries, sugar and lemon without pectin. #strawberry #rhubarb #jam #jelly #strawberryrhubarb #strawberryrhubarbjam #canning #recipe #best #nopectin #freezer" data-pin-title="How to Make Strawberry Rhubarb Jam" height="453" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-jars.jpg&amp;raw" srcset="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-jars.jpg 680w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-jars-300x200.jpg 300w" style="" title="Make homemade Strawberry Rhubarb Jam from fresh rhubarb, strawberries, sugar and lemon without pectin! If you've ever made a homemade strawberry jam recipe, adding rhubarb enhances both the flavor and texture! You can easily store it in your refrigerator or freezer, or can it in a water bath to last all year long!" width="680"><a aria-label="PIN IT!" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rounded dpsp-pin-it-button-has-label" data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?in e-8641 size-full" title="Make homemade Strawberry Rhubarb Jam from fresh rhubarb, strawberries, sugar and lemon without pectin! If you've ever made a homemade strawberry jam recipe, adding rhubarb enhances both the flavor and texture! You can easily store it in your refrigerator or freezer, or can it in a water bath to last all year long!" src="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-jars.jpg" alt="Strawberry jam and rhubarb jam come together in one great recipe" width="680" height="453" data-pin-description="Canning in jars is easy when you know How to Make Strawberry Rhubarb Jam from fresh rhubarb, strawberries, sugar and lemon without pectin. #strawberry #rhubarb #jam #jelly #strawberryrhubarb #strawberryrhubarbjam #canning #recipe #best #nopectin #freezer" srcset="https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-jars.jpg 680w, https://selfproclaimedfoodie.com/wp-content/uploads/how-to-make-strawberry-rhubarb-jam-jars-300x200.jpg 300w" sizes="(max-width: 680px) 100vw, 680px" /&gt;</span></noscript><p></p><span data-dcnode-id="1510" instrument_node="">
</span><h2 data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Can you use frozen strawberries?</span></h2><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Absolutely. My preference is always to make things seasonally when produce is fresh, but since both the strawberries and rhubarb are both cooked down, it makes no difference at all - zero, zilch, nada - whether you use fresh or frozen fruit.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Finding frozen rhubarb at the store, well, that's a challenge in and of itself.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">My advice to each and every one of you is to buy as much rhubarb from the farmers' market when it's in season as your freezer can hold and freeze it yourself.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><h2 data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">The reason for adding lemon juice when making jam:</span></h2><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Besides that glorious citrus flavor lemon adds, you need it in your recipe when making homemade jam, including this strawberry rhubarb version.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">There's a little food science involved in understanding the importance of adding lemon.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">In a nutshell, when you cook down fruit like strawberries and rhubarb with sugar, the natural pectin in the fruit breaks down, but that pectin won't bind together because the individual cells actually repel one another.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">We all know lemon juice is acidic, which means it has a lower pH. When lowering the pH of your mixture, it neutralizes the negative charges on the pectin (the thing that made the cells repel), and then the jam can come together and gel.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">What do you know? That chemical engineering degree of mine wasn't a total waste after all!</span></p><span data-dcnode-id="1480" instrument_node="">

recipe-ingredient-unit" data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">cups</span></span><span data-dcnode-id="1205" instrument_node=""> </span><span class="wprm-recipe-ingredient-name" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">sugar</span></span></li><li class="wprm-recipe-ingredient" data-dcnode-id="1185" style="list-style-type: none;"><span class="wprm-checkbox-container" data-dcnode-id="1197"><input aria-label="1 tablespoon fresh lemon juice (from about half of a large lemon)" class="wprm-checkbox" data-dcnode-id="1201" id="wprm-checkbox-3" type="checkbox"><label class="wprm-checkbox-label" data-dcnode-id="1198" for="wprm-checkbox-3"><span class="sr-only screen-reader-text wprm-screen-reader-text" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">▢ </span></span></label></span><span class="wprm-recipe-ingredient-amount" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">1</span></span><span data-dcnode-id="1194" instrument_node=""> </span><span class="wprm-recipe-ingredient-unit" data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">tablespoon</span></span><span data-dcnode-id="1191" instrument_node=""> </span><span class="wprm-recipe-ingredient-name" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">fresh lemon juice</span></span><span data-dcnode-id="1188" instrument_node=""> </span><span class="wprm-recipe-ingredient-notes wprm-recipe-ingredient-notes-smaller-faded" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">(from about half of a large lemon)</span></span></li></ul></div></div><span data-dcnode-id="1181" instrument_node="">
</span><div class="wprm-recipe-instructions-container wprm-recipe-33193-instructions-container wprm-block-text-normal" data-dcnode-id="1154" data-recipe="33193"><h3 class="wprm-recipe-header wprm-recipe-instructions-header wprm-block-text-bold wprm-align-left wprm-header-decoration-line" data-dcnode-id="1178" style=""><span data-dcnode-id="1180" instrument_node="">Instructions</span><div class="wprm-decoration-line" data-dcnode-id="1179" style="border-color: #9B9B9B"></div></h3><div class="wprm-recipe-instruction-group" data-dcnode-id="1155"><ul class="wprm-recipe-instructions" data-dcnode-id="1156"><li class="wprm-recipe-instruction" data-dcnode-id="1175" id="wprm-recipe-33193-step-0-0" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1176" style="margin-bottom: 5px"><span data-dcnode-id="1177" instrument_node="">Combine all ingredients in a medium to large saucepan over medium heat. Once mixture starts to bubble, reduce heat to medium low. You'll want the heat set to the point where it continues to bubble but not violently when stirred (you'll understand once you start cooking if jam bubbles start to pop out of the center of the pot). Continue to cook, stirring occasionally, until the jam has thickened. Plan on cooking jam for about an hour and temperature of the mixture is over 205 degrees F.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1172" id="wprm-recipe-33193-step-0-1" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1173" style="margin-bottom: 5px"><span data-dcnode-id="1174" instrument_node="">While the jam is cooking, sterilize four 1-cup jelly glass jars plus their rings and lids. I do this by boiling them in water for 10 minutes or I boil the lids and run the rings and glass jars through the dishwasher.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1169" id="wprm-recipe-33193-step-0-2" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1170" style="margin-bottom: 5px"><span data-dcnode-id="1171" instrument_node="">Transfer sterilized jars, lids, and bands to a clean dish towel.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1166" id="wprm-recipe-33193-step-0-3" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1167" style="margin-bottom: 5px"><span data-dcnode-id="1168" instrument_node="">Have a very large covered pot of boiling water ready. There needs to be enough water in the pot so that when the filled jars are submerged, they're covered by at least 1" of water.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1163" id="wprm-recipe-33193-step-0-4" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1164" style="margin-bottom: 5px"><span data-dcnode-id="1165" instrument_node="">Fill each jar with hot jam, leaving at least 1⁄4" of space at the top. Place lids on jars, and secure ring bands. Secure just tight enough so that they are hand tightened but you can easily unscrew.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1160" id="wprm-recipe-33193-step-0-5" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1161" style="margin-bottom: 5px"><span data-dcnode-id="1162" instrument_node="">Transfer filled jars to pot of gently boiling water and let boil for 10 minutes. Transfer jars, set at least 1" apart, to a dish towel and let cool, undisturbed, for 24 hours. You should hear the seals on the lids pop pretty soon after removing from the water.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1157" id="wprm-recipe-33193-step-0-6" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1158" style="margin-bottom: 5px"><span data-dcnode-id="1159" instrument_node="">If any jar is not fully sealed, or you chose to skip the canning process, jam should be refrigerated and used within 2 weeks. Sealed jars will keep, in a cool, dark place, for up to a year.</span></div></li></ul></div></div><span data-dcnode-id="1153" instrument_node="">
</span><div class="wprm-recipe-notes-container wprm-block-text-normal" data-dcnode-id="1146"><h3 class="wprm-recipe-header wprm-recipe-notes-header wprm-block-text-bold wprm-align-left wprm-header-decoration-line" data-dcnode-id="1150" style=""><span data-dcnode-id="1152" instrument_node="">Notes</span><div class="wprm-decoration-line" data-dcnode-id="1151" style="border-color: #9B9B9B"></div></h3><div class="wprm-recipe-notes" data-dcnode-id="1147"><span data-dcnode-id="1148" style="display: block;"><span data-dcnode-id="1149" instrument_node="">Makes about 4 cups.&nbsp; Serving size based on 2 tablespoons.</span></span></div></div><span data-dcnode-id="1145" instrument_node="">
