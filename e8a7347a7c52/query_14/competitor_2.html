</span><p data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">If you have more rhubarb than you know what to do with, you have options! For a hands-off approach, bake chopped rhubarb with sugar. You can also cook it on the stove top so it breaks down into a thick, jammy texture. If you prefer, make a thinner sauce that you can spoon over desserts. Try a simple whipped cream and rhubarb dessert that uses stewed rhubarb as its base. If you want to preserve the rhubarb, make rhubarb jam and process the jars so you can store it for up to one year.

</span></h3><span data-dcnode-id="2961" instrument_node="">
</span><ul data-dcnode-id="2949"><span data-dcnode-id="2960" instrument_node="">
</span><li data-dcnode-id="2956"><span data-dcnode-id="2959" instrument_node="">
</span><div class="checkmark" data-dcnode-id="2958"></div><span data-dcnode-id="2957" instrument_node="">1.2 pounds (550 g) rhubarb</span></li><span data-dcnode-id="2955" instrument_node="">

</span><div class="checkmark" data-dcnode-id="2953"></div><span data-dcnode-id="2952" instrument_node="">2/3 cup (85 g) sugar</span></li><span data-dcnode-id="2950" instrument_node="">
</span></ul><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2944"><i data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Makes 4 servings</span></i><span data-dcnode-id="2945" instrument_node="">

</span><div class="checkmark" data-dcnode-id="2932"></div><span data-dcnode-id="2931" instrument_node="">1 3/4 pounds (800 g) rhubarb, chopped into 1/2 inch (12 mm) pieces</span></li><span data-dcnode-id="2929" instrument_node="">
</span><li data-dcnode-id="2925"><span data-dcnode-id="2928" instrument_node="">
</span><div class="checkmark" data-dcnode-id="2927"></div><span data-dcnode-id="2926" instrument_node="">⅓ cup (113 g) honey</span></li><span data-dcnode-id="2924" instrument_node="">
</span><li data-dcnode-id="2920"><span data-dcnode-id="2923" instrument_node="">
</span><div class="checkmark" data-dcnode-id="2922"></div><span data-dcnode-id="2921" instrument_node="">2 tablespoons (12 g) orange zest</span></li><span data-dcnode-id="2919" instrument_node="">

</span><div class="checkmark" data-dcnode-id="2917"></div><span data-dcnode-id="2916" instrument_node="">¼ cup (60 ml) orange juice</span></li><span data-dcnode-id="2914" instrument_node="">
</span></ul><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2908"><i data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Makes 5 to 6 servings</span></i><span data-dcnode-id="2909" instrument_node="">

</span><div class="checkmark" data-dcnode-id="2896"></div><span data-dcnode-id="2895" instrument_node="">1/3 cup (67 g) sugar</span></li><span data-dcnode-id="2893" instrument_node="">

</span><div class="checkmark" data-dcnode-id="2891"></div><span data-dcnode-id="2890" instrument_node="">1/4 cup (60 ml) water</span></li><span data-dcnode-id="2888" instrument_node="">
</span><li data-dcnode-id="2884"><span data-dcnode-id="2887" instrument_node="">
</span><div class="checkmark" data-dcnode-id="2886"></div><span data-dcnode-id="2885" instrument_node="">2 1/4 cups (225 g) rhubarb, chopped</span></li><span data-dcnode-id="2883" instrument_node="">

</span><div class="checkmark" data-dcnode-id="2881"></div><span data-dcnode-id="2880" instrument_node="">1 teaspoon (2 g) grated lemon peel</span></li><span data-dcnode-id="2878" instrument_node="">

</span></ul><span data-dcnode-id="2871" instrument_node="">

</span><li data-dcnode-id="2853"><span data-dcnode-id="2856" instrument_node="">
</span><div class="checkmark" data-dcnode-id="2855"></div><span data-dcnode-id="2854" instrument_node="">1 batch of stewed rhubarb</span></li><span data-dcnode-id="2852" instrument_node="">

</span><div class="checkmark" data-dcnode-id="2850"></div><span data-dcnode-id="2849" instrument_node="">1 cup (240 ml) heavy cream</span></li><span data-dcnode-id="2847" instrument_node="">
</span><li data-dcnode-id="2843"><span data-dcnode-id="2846" instrument_node="">
</span><div class="checkmark" data-dcnode-id="2845"></div><span data-dcnode-id="2844" instrument_node="">Powdered sugar to taste</span></li><span data-dcnode-id="2842" instrument_node="">
</span></ul><span data-dcnode-id="2840" instrument_node="">
</span><p data-dcnode-id="2836"><i data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Makes 4 servings</span></i><span data-dcnode-id="2837" instrument_node="">

</span><div class="checkmark" data-dcnode-id="2824"></div><span data-dcnode-id="2823" instrument_node="">2 1/2 pounds (1.1 kg) rhubarb, chopped</span></li><span data-dcnode-id="2821" instrument_node="">
</span><li data-dcnode-id="2817"><span data-dcnode-id="2820" instrument_node="">
</span><div class="checkmark" data-dcnode-id="2819"></div><span data-dcnode-id="2818" instrument_node="">1 cup (240 ml) water</span></li><span data-dcnode-id="2816" instrument_node="">

</span><div class="checkmark" data-dcnode-id="2814"></div><span data-dcnode-id="2813" instrument_node="">1 7.5-ounce (49 g) package powdered pectin</span></li><span data-dcnode-id="2811" instrument_node="">
</span><li data-dcnode-id="2807"><span data-dcnode-id="2810" instrument_node="">

Roast rhubarb</span><b class="whb" data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node=""> in the oven.</span></b><span data-dcnode-id="2383" instrument_node=""> Preheat the oven to 395&nbsp;°F (202&nbsp;°C) and chop 1.2 pounds (550 g) of rhubarb into 3-inch (7.5-cm) pieces. Put the rhubarb in a baking dish and sprinkle 2/3 cup (85 g) of sugar over it. Cover the dish with aluminum foil and cook the rhubarb for 15 minutes. Remove it from the oven and stir the softened rhubarb so it's coated in its juice.</span><sup aria-label="Link to Reference 5" class="reference" data-dcnode-id="2367" id="_ref-5"><a data-dcnode-id="2381" href="#_note-5"><span data-dcnode-id="2382" instrument_node="">[5]</span></a><span class="ts_popup" data-dcnode-id="2369" hidden="" id="ts_popup_5" style="display: none;"><span data-dcnode-id="2380" instrument_node="">

</span><b class="whb" data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Stew rhubarb on the stove top.</span></b><span data-dcnode-id="2325" instrument_node=""> Put the chopped rhubarb, honey, orange zest, and orange juice in a pot on the stove. Turn the heat to medium-low and stir the ingredients until they're combined. Put the lid on the pot and let the rhubarb bubble gently for 15 to 20 minutes. It should become completely soft and remain a little chunky. If you want smoother rhubarb, cook it for an extra 5 minutes.</span><sup aria-label="Link to Reference 6" class="reference" data-dcnode-id="2309" id="_ref-6"><a data-dcnode-id="2323" href="#_note-6"><span data-dcnode-id="2324" instrument_node="">[6]</span></a><span class="ts_popup" data-dcnode-id="2311" hidden="" id="ts_popup_6" style="display: none;"><span data-dcnode-id="2322" instrument_node="">

</span><b class="whb" data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Make rhubarb jam.</span></b><span data-dcnode-id="2053" instrument_node=""> Place the chopped rhubarb in a large pot with the water and turn the heat to high. Once the water boils, reduce the heat to medium and cook the rhubarb for 2 minutes. Use a slotted spoon to transfer the cooked rhubarb to a larger pot and stir in the pectin and butter. Stir in the sugar and cook the jam over high heat for 1 minute. Keep stirring to prevent the jam from sticking.</span><sup aria-label="Link to Reference 9" class="reference" data-dcnode-id="2037" id="_ref-9"><a data-dcnode-id="2051" href="#_note-9"><span data-dcnode-id="2052" instrument_node="">[9]</span></a><span class="ts_popup" data-dcnode-id="2039" hidden="" id="ts_popup_9" style="display: none;"><span data-dcnode-id="2050" instrument_node="">
