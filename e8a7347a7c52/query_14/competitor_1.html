</span><h1 data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">How to Prepare, Cook and Use Rhubarb</span></h1><span data-dcnode-id="827" instrument_node="">
</span><div class="contributor" data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">
    By
    
       </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tablespoon.com/about-us"><span data-dcnode-id="825" instrument_node=""> Tablespoon Kitchens </span></a><span data-dcnode-id="823" instrument_node="">

</span><div class="heroImageContainer" data-dcnode-id="805"><span data-dcnode-id="817" instrument_node="">
</span><div class="heroImage" data-dcnode-id="810"><span data-dcnode-id="816" instrument_node="">

</span><img alt="" data-dcnode-id="814" id="HeroImageControl" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tablespoon.com/-/media/Images/Articles/Images-for-Posts-PrePandoNext/2013/05/week5/2013-05-28-how-to-rhubarb-586x322.jpg&amp;raw"><span data-dcnode-id="813" instrument_node="">

</span></div><span data-dcnode-id="804" instrument_node="">
</span><div class="articleIntroduction" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Rhubarb is a mysterious plant, and if it’s weirdly celery-looking state has left you scratching your head, you’re not alone. Ready to get more acquainted with this seasonal treat? Here’s the 401 on how to use rhubarb.</span></div><span data-dcnode-id="801" instrument_node="">

</span><section class="standardBlock standard" data-dcnode-id="677"><span data-dcnode-id="763" instrument_node="">
</span><div class="copy standard" data-dcnode-id="744"><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="761"></p><h2 data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">How to Buy Rhubarb
</span></h2><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">If you have no idea what rhubarb looks like, the best way to describe it is as pinkish green with celery-like stalks. Look for stalks that are fresh and crisp with shiny skins. Avoid limp stalks with split ends, which indicates a lack of freshness.
</span></p><span data-dcnode-id="755" instrument_node="">
</span><h3 data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">When is Rhubarb in Season?
</span></h3><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Rhubarb is only around for a short while, so enjoy it when you can! Rhubarb is in season from mid spring through early summer, from about April to June. In the United States, rhubarb is mostly grown in the northeast, so if you live outside of that region, you might have to hunt for yours!
</span></p><span data-dcnode-id="749" instrument_node="">
</span><h2 data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">How to Prep Rhubarb for Cooking</span></h2><p data-dcnode-id="746"></p><span data-dcnode-id="745" instrument_node="">
</span></div><span data-dcnode-id="743" instrument_node="">
</span><div class="contentImage standard" data-dcnode-id="739"><span data-dcnode-id="742" instrument_node="">
</span><img alt="" data-dcnode-id="741" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tablespoon.com/-/media/Images/Articles/Images-for-Posts-PrePandoNext/2013/05/week5/2013-05-28-how-to-rhubarb-p-blemishes-580w.jpg&amp;raw"><span data-dcnode-id="740" instrument_node="">
</span></div><span data-dcnode-id="738" instrument_node="">
</span><div class="copy standard" data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">To prepare rhubarb, trim the leaves first. Never eat the leaves of rhubarb, as they have toxic levels of oxalic acid and should not be eaten!  Wash the stalks and cut off the leaves near the base.</span></p><span data-dcnode-id="734" instrument_node="">
</span></div><span data-dcnode-id="732" instrument_node="">
</span><div class="contentImage standard" data-dcnode-id="728"><span data-dcnode-id="731" instrument_node="">
</span><img alt="" data-dcnode-id="730" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tablespoon.com/-/media/Images/Articles/Images-for-Posts-PrePandoNext/2013/05/week5/2013-05-28-how-to-rhubarb-p-peeler-580w.jpg&amp;raw"><span data-dcnode-id="729" instrument_node="">
</span></div><span data-dcnode-id="727" instrument_node="">
</span><div class="copy standard" data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Check the rhubarb for any blemishes and use a vegetable peeler to remove them.</span></p><span data-dcnode-id="723" instrument_node="">
</span></div><span data-dcnode-id="721" instrument_node="">
</span><div class="contentImage standard" data-dcnode-id="717"><span data-dcnode-id="720" instrument_node="">
</span><img alt="" data-dcnode-id="719" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tablespoon.com/-/media/Images/Articles/Images-for-Posts-PrePandoNext/2013/05/week5/2013-05-28-how-to-rhubarb-p-diced-580w.jpg&amp;raw"><span data-dcnode-id="718" instrument_node="">
</span></div><span data-dcnode-id="716" instrument_node="">
</span><div class="copy standard" data-dcnode-id="694"><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="714"></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Cut rhubarb into 1/4 inch pieces in preparation for a sauce or pie. You want to store the rhubarb in stalk form so that it will stay fresh longer. Cut it right before using.
</span></p><span data-dcnode-id="711" instrument_node="">
</span><h2 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">How to Cook with Rhubarb
</span></h2><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">Rhubarb is technically a vegetable but is usually prepared as a fruit would be. It's often used in sauces, pies, muffins, and cakes. Its tart flavor lends itself to sweet pairings. The most basic way to prepare rhubarb is as a sauce or </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tablespoon.com/recipes/strawberry-rhubarb-freezer-jam/0fc63c52-68fc-49ce-9205-b9cc1ea480f1"><span data-dcnode-id="706" instrument_node="">loose jam</span></a><span data-dcnode-id="704" instrument_node="">. Rhubarb sauce can be served as a side to meat or served over ice cream or pound cake.
</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">The most important thing to know about how to cook rhubarb is that is must be cooked down. The fibrous texture of this vegetable is too tough to enjoyably chew. But when cooked down and sweetened up, rhubarb is a real delight.
</span></p><span data-dcnode-id="699" instrument_node="">
</span><h2 data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">More Rhubarb Recipes</span></h2><p data-dcnode-id="696"></p><span data-dcnode-id="695" instrument_node="">
</span></div><span data-dcnode-id="693" instrument_node="">
</span><div class="contentImage standard" data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">
</span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tablespoon.com/recipes/rhubarb-meringue-pie/86319fd9-7f25-4f4a-a5fe-7e8e68129fa4"><img alt="rhubarb meringue pie" data-dcnode-id="691" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tablespoon.com/-/media/Images/recipe-hero/dessert/rhubarb-meringue-pie_hero.jpg&amp;raw"></a><span data-dcnode-id="689" instrument_node="">
