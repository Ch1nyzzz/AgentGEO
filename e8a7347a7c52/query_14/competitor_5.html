</span><p class="body-text" data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">We can hardly believe that this beautifully pink fruit is naturally this colourful and exuberant! </span></p><p class="body-text" data-dcnode-id="1915"><a class="body-link" data-dcnode-id="1917" data-vars-ga-outbound-link="https://www.goodhousekeeping.com/uk/food/recipes/g553373/best-rhubarb-recipes/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodhousekeeping.com/uk/food/recipes/g553373/best-rhubarb-recipes/" target="_blank"><span data-dcnode-id="1918" instrument_node="">Rhubarb</span></a><span data-dcnode-id="1916" instrument_node=""> season occurs in the UK from April through to July, however forced rhubarb season can begin in January up until April. Forced rhubarb elongates the season since when the first frosts begin, the plants are moved indoors to a much warmer and darker environment (and are even picked by candlelight) which protects them from the colder weather and results in a sweeter and softer plant. These shoots grow so quickly that you can even hear them 'squeak' as they shoot up. </span></p><p class="body-text" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Whether you have a glut of seasonal rhubarb or forced rhubarb, it makes sense to freeze a load for future use (especially if you manage to grow or buy a particularly pink and sweet batches that's not always easy to come by).</span></p><p class="body-text" data-dcnode-id="1902"><span data-dcnode-id="1912" instrument_node="">Happily, these gorgeous pink sticks freeze very well with minimal effort – so you're never too far from a </span><a class="body-link" data-dcnode-id="1910" data-vars-ga-outbound-link="https://www.goodhousekeeping.com/uk/food/recipes/a537268/rhubarb-crumble/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodhousekeeping.com/uk/food/recipes/a537268/rhubarb-crumble/" target="_blank"><span data-dcnode-id="1911" instrument_node="">crumble</span></a><span data-dcnode-id="1909" instrument_node="">, </span><a class="body-link" data-dcnode-id="1907" data-vars-ga-outbound-link="https://www.goodhousekeeping.com/uk/food/recipes/a27124979/rhubarb-meringue-pie/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodhousekeeping.com/uk/food/recipes/a27124979/rhubarb-meringue-pie/" target="_blank"><span data-dcnode-id="1908" instrument_node="">pie</span></a><span data-dcnode-id="1906" instrument_node=""> or </span><a class="body-link" data-dcnode-id="1904" data-vars-ga-outbound-link="https://www.goodhousekeeping.com/uk/food/recipes/a553953/rhubarb-pavlova/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodhousekeeping.com/uk/food/recipes/a553953/rhubarb-pavlova/" target="_blank"><span data-dcnode-id="1905" instrument_node="">pavlova</span></a><span data-dcnode-id="1903" instrument_node=""> that will brighten up any day!</span></p><h2 class="body-h2" data-dcnode-id="1899"><strong data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">To freeze</span></strong></h2><p class="body-text" data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Make sure your rhubarb is fresh looking, crisp and blemish free. If the stalks are fibrous, peel off the tough outer fibres and remove any leaves as these are poisonous to consume. Clean under cold running water, dry on kitchen towel and, cut the lengths into rough 2.5cm (1in) pieces.  </span></p><h2 class="body-h2" data-dcnode-id="1894"><strong data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">To blanch or not to blanch? </span></strong></h2><div class="embed embed-image embed-image-center embed-image-medium" data-align="center" data-dcnode-id="1870" data-size="medium"><span data-dcnode-id="1893" instrument_node="">

</span></div><p class="body-text" data-dcnode-id="1848"><span data-dcnode-id="1852" instrument_node="">Before </span><a class="body-link" data-dcnode-id="1850" data-vars-ga-outbound-link="https://www.goodhousekeeping.com/uk/house-and-home/household-advice/a664698/the-ghi-guide-to-freezing-food/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodhousekeeping.com/uk/house-and-home/household-advice/a664698/the-ghi-guide-to-freezing-food/" target="_blank"><span data-dcnode-id="1851" instrument_node="">freezing</span></a><span data-dcnode-id="1849" instrument_node=""> rhubarb, you can blanch it to help preserve colour and flavour – this is recommended if you're planing on keeping the rhubarb frozen for more than three months.</span></p><p class="body-text" data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">But it can also be frozen without blanching. </span></p><h2 class="body-h2" data-dcnode-id="1843"><strong data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">To blanch</span></strong></h2><p class="body-text" data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Cook your cleaned and chopped rhubarb in a pan of boiling water for 1min.</span></p><p class="body-text" data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Drain and immediately plunge into iced water to stop the cooking and set the colour by locking in the anthocyanins. Drain again and spread on kitchen paper to dry completely.  </span></p><p class="body-text" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Next comes another decision – will you want to use smaller portions of your frozen rhubarb over a period of time, or use the whole amount in one go? </span></p><p class="body-text" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">If the latter, then you can just pack your chopped (and blanched, if done) rhubarb into a freezer bag or freezer-proof container. This will freeze as a solid mass, but defrost well for use in recipes.</span></p><p class="body-text" data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">If you want to be able to grab out handfuls of frozen rhubarb (and not use the whole amount), then its best to open-freeze the chopped (and blanched, if done) rhubarb pieces in a single layer on a baking sheet lined with baking parchment.</span></p><p class="body-text" data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Once frozen (about 2hr) pack into a freezer bag or freezer-proof container. </span></p><p class="body-text" data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Freeze for up to 9 months. Defrost at room temperature or in the fridge and use as desired, or if you are using rhubarb in a recipe where it requires stewing the rhubarb (rather than retaining its shape at all) then simply use straight from frozen. You can also add frozen rhubarb straight to smoothies (although you will want to pair it with sweeter fruits as it's very tart on its own). </span></p><span data-dcnode-id="1828" instrument_node="">
