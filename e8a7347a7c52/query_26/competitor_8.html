24" instrument_node=""> </span><button aria-label="Make image larger Chickpea and spinach curry" class="icon icon-image-zoom elementButton__defaultFocus" data-alt="Chickpea and spinach curry held in a bowl by a woman" data-caption="" data-credit="Credit: Joan Ransley / Getty Images" data-dcnode-id="1920" data-image="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F43%2F2021%2F01%2F08%2FGettyImages-657152778-2000.jpg" data-title="Chickpea and spinach curry" data-tracking-do-not-track="1"><svg data-dcnode-id="1922" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="1923"></path></svg><span data-dcnode-id="1921" instrument_node=""> </span></button><span data-dcnode-id="1919" instrument_node=""> </span></div><div class="lazy-image__loadingPlaceholder" data-dcnode-id="1916"><img alt="" class="loadingPlaceholder" data-dcnode-id="1917" height="1333" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%2067'%3E%3C/svg%3E" width="2000"></div><div class="image-wrap-container clearfix" data-dcnode-id="1913"><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Credit: Joan Ransley / Getty Images</span></div></div></div></div></div></div><span data-dcnode-id="1908" instrument_node=""> </span><div class="articleContainer__content" data-dcnode-id="1547"><span data-dcnode-id="1907" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1904"><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Maybe a plant-based diet means reducing the amount of meat you're currently eating. Or maybe it means completely cutting out all meat and meat-related products -- like cheeses, eggs, yogurt, and cream. Either way, you'll want to follow these tips for switching over pain-free.</span></p></div><span data-dcnode-id="1903" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1902" data-tier="1" id="div-gpt-mob-square-flex-1" role="complementary" tabindex="-1"></div><span data-dcnode-id="1901" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 tablet-ad instream-ad sister-ad karma-ad" data-dcnode-id="1900" data-tier="1" id="div-gpt-square-fixed-1" role="complementary" tabindex="-1"></div><span data-dcnode-id="1899" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 tablet-ad instream-ad sister-ad karma-ad" data-dcnode-id="1898" data-tier="2" id="div-gpt-square-fixed-2" role="complementary" tabindex="-1"></div><span data-dcnode-id="1897" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1891"><p data-dcnode-id="1892"><span data-dcnode-id="1896" instrument_node="">A plant-based diet comes as advertised. It's focused on fruits, vegetables, beans, nuts, legumes, seeds, whole grains, and vegetable oils like olive oil. You can certainly reorient your diet primarily toward plants and still eat some meat and dairy, including eggs. A lot of people do. For example, people who enjoy the </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipes/16704/healthy-recipes/mediterranean-diet/"><span data-dcnode-id="1895" instrument_node="">Mediterranean diet</span></a><span data-dcnode-id="1893" instrument_node=""> are still said to be following a plant-based diet, which includes some fish and lean meats.</span></p></div><span data-dcnode-id="1890" instrument_node=""> </span><div class="div-sm-highImpact" data-dcnode-id="1889"></div><span data-dcnode-id="1888" instrument_node=""> </span><div class="component inline image margin -based diet?</span></strong></p></div><span data-dcnode-id="1849" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1848" data-tier="2" id="div-gpt-mob-square-fixed-1" role="complementary" tabindex="-1"></div><span data-dcnode-id="1847" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 tablet-ad instream-ad sister-ad karma-ad" data-dcnode-id="1846" data-tier="3" id="div-gpt-square-fixed-3" role="complementary" tabindex="-1"></div><span data-dcnode-id="1845" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 tablet-ad instream-ad sister-ad karma-ad" data-dcnode-id="1844" data-tier="4" id="div-gpt-square-fixed-4" role="complementary" tabindex="-1"></div><span data-dcnode-id="1843" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1837"><p data-dcnode-id="1838"><span data-dcnode-id="1842" instrument_node="">A plant-based diet has many well-known health benefits. It may help keep you slim, while holding off chronic diseases, including heart disease, hypertension, and stroke. Indeed, </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28728684" target="_blank" title="(opens new window)"><span data-dcnode-id="1841" instrument_node="">a Harvard study</span></a><span data-dcnode-id="1839" instrument_node=""> on plant-based diets and the risk of heart disease, published in 2017, found that eating slightly less animal foods while increasing the intake of healthy plants was associated with a lower risk of heart disease.</span></p></div><span data-dcnode-id="1836" instrument_node=""> </span><div class="div-sm-inContent" data-dcnode-id="1835"></div><span data-dcnode-id="1834" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1822"><p data-dcnode-id="1823"><span data-dcnode-id="1833" instrument_node="">A plant-based diet lines up nicely with recommendations from the </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.gov/dietaryguidelines/" target="_blank" title="(opens new window)"><span data-dcnode-id="1832" instrument_node="">Dietary Guidelines for Americans</span></a><span data-dcnode-id="1830" instrument_node="">, released by the USDA and Health and Human Services, which recommends eating a variety of nutrient-rich fruits and veggies, whole grains, and heart-healthy vegetable oils, and limiting saturated fats. What's more, eating a&nbsp;plant-based diet may be a good overall weight-loss strategy. As reported in </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2018/02/20/well/eat/counting-calories-weight-loss-diet-dieting-low-carb-low-fat.html" target="_blank" title="(opens new window)"><span data-dcnode-id="1829" instrument_node="">The New York Times</span></a><span data-dcnode-id="1827" instrument_node="">, a recent study in </span><em data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">JAMA </span></em><span data-dcnode-id="1824" instrument_node="">found that people who ate lots of vegetables and other whole foods and cut back on added sugars and processed foods (including refined grains) lost significant weight.</span></p></div><span data-dcnode-id="1821" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1820" data-tier="3" id="div-gpt-mob-square-fixed-2" role="complementary" tabindex="-1"></div><span data-dcnode-id="1819" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1816"><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">And there's an additional way that plant-based diets are good for the gut.&nbsp;They help nourish a broad range of healthy gut bacteria, which can ease gastrointestinal problems. The diet is also environmentally sustainable, so it's healthy for the planet, too.</span></p></div><span data-dcnode-id="1815" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1812"><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">So good, you're ready to go. Here are a few suggestions to keep in mind as you're switching to a healthy plant-based diet:</span></p></div><span data-dcnode-id="1811" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1810" data-tier="4" id="div-gpt-mob-square-fixed-3" role="complementary" tabindex="-1"></div><span data-dcnode-id="1809" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1805"><p data-dcnode-id="1806"><strong data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">1. Ease into it.</span></strong></p></div><span data-dcnode-id="1804" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1801"><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">The first thing you'll want to do is...not do it all at once. If you've been a strictly meat-and-potatoes kinda guy, don't go cold tofurkey. Start off with a single meatless dinner during the week, and when you feel comfortable expand to two dinners, and so on. You'll want to build up a repertoire of vegetarian recipes that you can rely on.</span></p></div><span data-dcnode-id="1800" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1799" data-scroll-load="true" data-tier="1" id="div-gpt-mob-square-fixed-4" role="complementary" tabindex="-1"></div><span data-dcnode-id="1798" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1792"><p data-dcnode-id="1793"><span data-dcnode-id="1797" instrument_node="">Here's a great transition recipe. These </span><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/232908/chef-johns-meatless-meatballs/"><span data-dcnode-id="1796" instrument_node="">Meatless Meatballs</span></a><span data-dcnode-id="1794" instrument_node=""> mimic the texture of meat wonderfully. The key to making these super-savory meatless meatballs is to thoroughly brown the mushrooms. "The garlic, cheese, and parsley do the rest," says Chef John.</span></p></div><span data-dcnode-id="1791" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="1758"><span data-dcnode-id="1790" instrument_node=""> </span><div class="component lazy-image lazy-image-udf image-wrapper aspect_3x2 align-default rendered image-loaded" data-alt="Chef John's Meatless Meatballs" data-crop-percentage="67" data-dcnode-id="1759" data-high-density="false" data-orientation="default" data-original-height="465" data-original-width="650" data-shop-image="false" data-special-crop="" data-src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F43%2F2017%2F06%2F2266615_-Chef-Johns-Meatless-Meatballs-Photo-by-catherine.drew_.jpg" data-title="Chef John's Meatless Meatballs" data-tracking-zone="image"><span data-dcnode-id="1789" instrument_node=""> </span><noscript data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">&lt;img src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F43%2F2017%2F06%2F2266615_-Chef-Johns-Meatless-Meatballs-Photo-by-catherine.drew_.jpg" alt="Chef John&amp;#x27;s Meatless Meatballs"&gt;</span></noscript><span data-dcnode-id="1786" instrument_node=""> lass="paragraph" data-dcnode-id="1740"><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Another trick is to replace some of the ground meat with beans. Over time, you can increase the beans-to-meat ratio until you're ready to pitch the meat completely. If you like, you can also switch to plant-based meatless crumbles, which mimic the texture of meat.</span></p></div><span data-dcnode-id="1739" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1738" data-scroll-load="true" data-tier="3" id="div-gpt-mob-square-fixed-6" role="complementary" tabindex="-1"></div><span data-dcnode-id="1737" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1728"><p data-dcnode-id="1729"><span data-dcnode-id="1736" instrument_node="">This recipe has the right idea. </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/Recipe/Taco-Mix-with-Black-Beans/"><span data-dcnode-id="1735" instrument_node="">Taco Mix with Black Beans</span></a><span data-dcnode-id="1733" instrument_node=""> calls for a half-and-half mix of ground beef and black beans. It's healthier </span><em data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">and </span></em><span data-dcnode-id="1730" instrument_node="">more economical, too!</span></p></div><span data-dcnode-id="1727" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="1694"><span data-dcnode-id="1726" instrument_node=""> </span><div class="component lazy-image lazy-image-udf image-wrapper aspect_3x2 align-default rendered image-loaded" data-alt="Taco Mix with Black Beans" data-crop-percentage="67" data-dcnode-id="1695" data-high-density="false" data-orientation="default" data-original-height="465" data-original-width="650" data-shop-image="false" data-special-crop="" data-src="h "1685" instrument_node="">A veggie-centric diet can require additional prep time, as you peel and chop and prep. Finding shortcuts can be helpful, particularly as you're getting started on the diet. If you like, buy pre-prepped vegetables and packaged salad greens to cut down on prep time and make it easier to eat more fresh vegetables. Of course, this suggestion presents a packaging waste issue, which may trump the time-saving benefits of bagged and pre-prepped veggies and lettuces. You can also find mixed greens in bulk in some grocery stores.</span></p></div><span data-dcnode-id="1682" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1681" data-scroll-load="true" data-tier="1" id="div-gpt-mob-square-fixed-8" role="complementary" tabindex="-1"></div><span data-dcnode-id="1680" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="1647"><span data-dcnode-id="1679" instrument_node=""> </span><div class="component lazy-image lazy-image-udf image-wrapper aspect_3x2 align-default rendered image-loaded" data-alt="Salad Greens" data-crop-percentage="67" data-dcnode-id="1648" data-high-density="false" data-orientation="default" data-original-height="465" data-original-width="650" data-shop-image="false" data-special-crop="" data-src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F43%2F2017%2F11%2F101441668-Salad-Greens-Photo-by-Meredith.jpg" data-title="Salad Greens" data-tracking-zone="image"><span data-dcnode-id="1678" instrument_node=""> </span><noscript data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">&lt;img src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F43%2F2017%2F11%2F101441668-Salad-Greens-Photo-by-Meredith.jpg" alt="Salad Greens"&gt;</span></noscript><
