</span><div class="customRTE smartbody-core section" data-dcnode-id="1201"><span class="clicktracking" data-dcnode-id="1209" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="1208" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="1203"><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Contrary to popular belief, it is possible to get all the nutrients you need when on a vegan diet. Curious to know more or try it out? Here are the basics of veganism and a day's worth of simple recipes to get you started.</span></p><span data-dcnode-id="1204" instrument_node="">
</span></section><span data-dcnode-id="1202" instrument_node="">
</span></div><span data-dcnode-id="1200" instrument_node="">
</span><div class="customRTE smartbody-core section" data-dcnode-id="1191"><span class="clicktracking" data-dcnode-id="1199" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="1198" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="1193"><span data-dcnode-id="1197" instrument_node="">
</span><h2 data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">What Is the Vegan Diet?</span></h2><span data-dcnode-id="1194" instrument_node="">
</span></section><span data-dcnode-id="1192" instrument_node="">
</span></div><span data-dcnode-id="1190" instrument_node="">
</span><div class="customRTE smartbody-core section" data-dcnode-id="1181"><span class="clicktracking" data-dcnode-id="1189" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="1188" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="1183"><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Unlike some vegetarians, who might be more flexible, vegans don’t eat any type of animal products — that means no meat, fish, dairy or eggs. Some vegans also exclude honey and foods that are processed with animal products, including refined sugar, high fructose corn syrup, gelatin and some wine and beer.</span></p><span data-dcnode-id="1184" instrument_node="">
</span></section><span data-dcnode-id="1182" instrument_node="">
</span></div><span data-dcnode-id="1180" instrument_node="">
</span><div class="customRTE smartbody-core section" data-dcnode-id="1162"><span class="clicktracking" data-dcnode-id="1179" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="1178" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="1164"><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1176" instrument_node="">Vegan diets have been linked to healthy benefits including </span><a class="editorial-link-no-style" data-dcnode-id="1174" data-uri="3a8d6fc7ad2d2335362e3bb990e9e0aa" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/30405108/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1175" instrument_node="">weight loss and improved insulin response</span></a><span data-dcnode-id="1173" instrument_node="">, as well as </span><a class="editorial-link-no-style" data-dcnode-id="1171" data-uri="13feab621afecd44b127d94549496935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/30571591/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1172" instrument_node="">reduction of inflammation</span></a><span data-dcnode-id="1170" instrument_node=""> and risk of heart disease. Some </span><a class="editorial-link-no-style" data-dcnode-id="1168" target="_blank"><span data-dcnode-id="1169" instrument_node="">newer research </span></a><span data-dcnode-id="1167" instrument_node="">also looks at the benefits of vegan style diets for gut health, but more investigation is needed.</span></p><span data-dcnode-id="1165" instrument_node="">
</span></section><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1161" instrument_node="">
</span><div class="customRTE smartbody-core section" data-dcnode-id="1152"><span class="clicktracking" data-dcnode-id="1160" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="1159" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="1154"><span data-dcnode-id="1158" instrument_node="">
</span><h2 data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Best Healthy Foods on Vegan Diet</span></h2><span data-dcnode-id="1155" instrument_node="">
</span></section><span data-dcnode-id="1153" instrument_node="">
</span></div><span data-dcnode-id="1151" instrument_node="">
</span><div class="customRTE smartbody-core section" data-dcnode-id="1142"><span class="clicktracking" data-dcnode-id="1150" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="1149" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="1144"><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">A successful vegan diet is contingent upon getting enough of and properly replacing the nutrients found in animal-sourced foods. Some of the most important ones include protein, vitamin B12, calcium and zinc, all which are necessary for proper metabolism, growth and strength. Vitamin D and omega-3 fatty acids are also nutrients that can be hard to get enough of on a vegan diet.</span></p><span data-dcnode-id="1145" instrument_node="">
</span></section><span data-dcnode-id="1143" instrument_node="">
</span></div><span data-dcnode-id="1141" instrument_node="">
</span><div class="customRTE smartbody-core section" data-dcnode-id="1114"><span class="clicktracking" data-dcnode-id="1140" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="1139" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="1116"><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1137" instrument_node="">Plant sources of protein include </span><a class="editorial-link-no-style" data-dcnode-id="1135" data-uri="ddd7e15dca8978058f165e988e17be7c" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/healthyeats/healthy-tips/2009/03/how-healthy-is-soy"><span data-dcnode-id="1136" instrument_node="">soy</span></a><span data-dcnode-id="1134" instrument_node="">, beans, nuts, seeds and </span><a class="editorial-link-no-style" data-dcnode-id="1132" data-uri="40fc7747607c59f0a88cf586acedb129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/healthyeats/2012/01/the-veggie-table-how-to-get-more-whole-grains-in-your-diet"><span data-dcnode-id="1133" instrument_node="">whole grains</span></a><span data-dcnode-id="1131" instrument_node="">. More and more options are available for vegans these days. Meat alternatives like </span><a class="editorial-link-no-style" data-dcnode-id="1129" data-uri="db90d75222836035812f4b1a58aa8363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/fn-dish/shopping/best-meat-alternatives"><span data-dcnode-id="1130" instrument_node="">Beyond Meat</span></a><span data-dcnode-id="1128" instrument_node="">, </span><a class="editorial-link-no-style" data-dcnode-id="1126" data-uri="b9647f6a8dce611c4591d52bc1978e43" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/healthy/packages/healthy-every-week/healthy-tips/nutritionists-best-veggie-burger-reviews"><span data-dcnode-id="1127" instrument_node="">BOCA burgers</span></a><span data-dcnode-id="1125" instrument_node="">, tempeh and </span><a class="editorial-link-no-style" data-dcnode-id="1123" data-uri="daef2fed0fd58e565380129278856b3e" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/fn-dish/recipes/2014/01/chopped-dinner-challenge-vegetarian-parm-heroes"><span data-dcnode-id="1124" instrument_node="">seitan</span></a><span data-dcnode-id="1122" instrument_node=""> (a thick textured meat replacement made from wheat gluten) provide a variety of options for those who want to re-invent some favorite meat-containing recipes. </span><a class="editorial-link-no-style" data-dcnode-id="1120" data-uri="e77890745275ee2cb3e804b0ec64cfad" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/healthyeats/healthy-tips/2013/03/chia-seeds-101"><span data-dcnode-id="1121" instrument_node="">Chia seeds</span></a><span data-dcnode-id="1119" instrument_node=""> are a good food to include as they contain a surprising amount of protein, plus inflammation-fighting omega-3 fats.</span></p><span data-dcnode-id="1117" instrument_node="">
</span></section><span data-dcnode-id="1115" instrument_node="">
</span></div><span data-dcnode-id="1113" instrument_node="">
</span><div class="customRTE smartbody-core section" data-dcnode-id="1101"><span class="clicktracking" data-dcnode-id="1112" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="1111" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="1103"><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1109" instrument_node="">Dairy alternatives such as milk, </span><a class="editorial-link-no-style" data-dcnode-id="1107" data-uri="86355eaec64b6a7fa14d9bfb6226c0a2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/healthyeats/2016/05/taste-test-vegan-cheese"><span data-dcnode-id="1108" instrument_node="">cheese</span></a><span data-dcnode-id="1106" instrument_node=""> and yogurt made from nuts, seeds, soy and coconut are also great options (and they’re often fortified with calcium and vitamin D).</span></p><span data-dcnode-id="1104" instrument_node="">

</span><section class="o-CustomRTE" data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">It’s also a good idea to eat a wide variety of grains and legumes at meals (such as rice and beans or pasta and peas) to help ensure you eat a full panel of amino acids (protein building blocks) which is similar to the type of protein components found in animal based foods.</span></p><span data-dcnode-id="1010" instrument_node="">
</span></section><span data-dcnode-id="1008" instrument_node="">
</span></div><span data-dcnode-id="1006" instrument_node="">
</span><div class="customRTE smartbody-core section" data-dcnode-id="997"><span class="clicktracking" data-dcnode-id="1005" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="1004" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">B12 is predominantly found in animal products so it's a biggie for vegans. The good news is B12 is one of the only water-soluble vitamins stored well in the body. If you're switching to veganism now, but have eaten animal-sourced foods for most of your life, it will take years to deplete your stored B12. Several fortified foods including breakfast cereals and nutritional yeast can also provide some B12.</span></p><span data-dcnode-id="1000" instrument_node="">
</span></section><span data-dcnode-id="998" instrument_node="">
</span></div><span data-dcnode-id="996" instrument_node="">
</span><div class="customRTE smartbody-core section" data-dcnode-id="987"><span class="clicktracking" data-dcnode-id="995" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="994" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="989"><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Calcium and iron are plentiful in plant products. Both can be found in beans, almonds, tofu and leafy greens. Fortified products such as orange juice with calcium and breakfast cereals with iron are also easy ways to get some extra nutrients. Zinc (commonly obtained from meat and fish) can be found in beans and nuts. Supplements are also be an option, but only if needs can’t be met from food (talk to your doctor or a registered dietitian!) A lot of people worry about iron deficiencies; it's important that you don't take an iron supplement unless your doctor detects a deficiency. Too much iron can be toxic.</span></p><span data-dcnode-id="990" instrument_node="">
</span></section><span data-dcnode-id="988" instrument_node="">

</span><h2 data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">What a Vegan Meal Plan Might Look Like</span></h2><span data-dcnode-id="873" instrument_node="">

</span><section class="o-CustomRTE" data-dcnode-id="857"><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="859"><b data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Breakfast:</span></b><span data-dcnode-id="863" instrument_node=""> A basic bowl of oatmeal (without any added butter or added milk) or a </span><a class="editorial-link-no-style" data-dcnode-id="861" data-uri="c50f2d3bae6089f5f60a0ffc51adc8fd" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/recipes/giada-de-laurentiis/banana-and-walnut-smoothie-2354968"><span data-dcnode-id="862" instrument_node="">smoothie</span></a><span data-dcnode-id="860" instrument_node=""> made with fruit, nuts, almond milk and dates (for a protein boost add some silken tofu).</span></p><span data-dcnode-id="858" instrument_node="">
</span></section><span data-dcnode-id="856" instrument_node="">

</span><p data-dcnode-id="847"><b data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Snack:</span></b><span data-dcnode-id="848" instrument_node=""> Fresh fruit, veggies, nuts, nut butter, hummus with whole grain pretzels and rice cakes are simple mid-meal snacks.</span></p><span data-dcnode-id="846" instrument_node="">

</span><p data-dcnode-id="829"><b data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Lunch:</span></b><span data-dcnode-id="836" instrument_node=""> Veggies are a vegan's best friend so try a large salad. Add some beans for extra nutrients and hunger-fighting protein. Other easy options include </span><a class="editorial-link-no-style" data-dcnode-id="834" data-uri="05cdf39527431f30197f71bd17744d9f" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/recipes/food-network-kitchen/roasted-veggie-grain-bowl-5293785"><span data-dcnode-id="835" instrument_node="">grain bowls </span></a><span data-dcnode-id="833" instrument_node="">(swap the yogurt for </span><a class="editorial-link-no-style" data-dcnode-id="831" data-uri="2840b7e142fb4f3c657ee3d3bff76b95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodnetwork.com/recipes/food-network-kitchen/5-ingredient-cashew-cream-blender-sauce-9429010"><span data-dcnode-id="832" instrument_node="">cashew cream</span></a><span data-dcnode-id="830" instrument_node="">) or a grilled “cheese” sandwich made with soy cheese, tomato, arugula and spicy red onion.</span></p><span data-dcnode-id="828" instrument_node="">
</span></section><span data-dcnode-id="826" instrument_node="">
