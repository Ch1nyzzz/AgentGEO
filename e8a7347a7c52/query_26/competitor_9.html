mg alt="" class="loadingPlaceholder" data-dcnode-id="1883" height="720" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%2067'%3E%3C/svg%3E" width="1080"></div><div class="image-wrap-container clearfix" data-dcnode-id="1879"><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Credit: Allrecipes</span></div></div></div></div></div></div><span data-dcnode-id="1874" instrument_node=""> </span><div class="articleContainer__content" data-dcnode-id="1681"><span data-dcnode-id="1873" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1870"><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Picture this: you've started a new healthy eating plan, be it low-carb or paleo, keto or intermittent fasting, and suddenly, you realize you've broken one of the "rules." You've "failed." And so, instead of chalking it up to human error, you throw caution to the wind, eat a whole pack of Ho-Hos, and tell yourself you'll do better tomorrow.</span></p></div><span data-dcnode-id="1869" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1868" data-tier="1" id="div-gpt-mob-square-flex-1" role="complementary" tabindex="-1"></div><span data-dcnode-id="1867" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 tablet-ad instream-ad sister-ad karma-ad" data-dcnode-id="1866" data-tier="1" id="div-gpt-square-fixed-1" role="complementary" tabindex="-1"></div><span data-dcnode-id="1865" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 tablet-ad instream-ad sister-ad karma-ad" data-dcnode-id="1864" data-tier="2" id="div-gpt-square-fixed-2" role="complementary" tabindex="-1"></div><span data-dcnode-id="1863" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1860"><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">If you've been there, know this mindset isn't uncommon with lifestyle changes, especially when it comes to food. But it's far from conducive to your mental or physical health. Luckily, that's what makes a flexitarian diet so different.</span></p></div><span data-dcnode-id="1859" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1856"><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Unsurprisingly, given its name, the flexitarian diet has quite a bit of flexibility built into it. Perhaps best defined by author Michael Pollan's philosophy to eat "mostly plants," a flexitarian lifestyle is all about doing your best given the options at your disposal. </span></p></div><span data-dcnode-id="1855" instrument_node=""> </span><div class="div-sm-highImpact" data-dcnode-id="1854"></div><span data-dcnode-id="1853" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1850"><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Different people define the mindset in different ways, but for our purposes, a flexitarian will choose a plant-based or vegan diet whenever possible, a vegetarian diet when vegan isn't on the menu, and will also occasionally include some sustainable, humanely-raised meat and fish. </span></p></div><span data-dcnode-id="1849" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1846"><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">In other words, a flexitarian attempts to eat a plant-based or plant-forward diet without becoming rigid about it. And the flexibility built into the lifestyle means adherents can go ahead and order that wild-caught salmon fillet instead of the plate of French fries one might turn to in a dearth of plant-based options.</span></p></div><span data-dcnode-id="1845" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1844" data-tier="2" id="div-gpt-mob-square-fixed-1" role="complementary" tabindex="-1"></div><span data-dcnode-id="1843" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 tablet-ad instream-ad sister-ad karma-ad" data-dcnode-id="1842" data-tier="3" id="div-gpt-square-fixed-3" role="complementary" tabindex="-1"></div><span data-dcnode-id="1841" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 tablet-ad instream-ad sister-ad karma-ad" data-dcnode-id="1840" data-tier="4" id="div-gpt-square-fixed-4" role="complementary" tabindex="-1"></div><span data-dcnode-id="1839" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1836"><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">But despite its inbuilt flexibility, a flexitarian diet can seem overwhelming at first, especially if it's the first time you're phasing out meat, eggs, and dairy. With that in mind, here are five easy steps to ease into a flexitarian lifestyle.</span></p></div><span data-dcnode-id="1835" instrument_node=""> </span><h2 data-dcnode-id="1833" id="a1aff20e05c0230d4a463441fff56bd2"><span data-dcnode-id="1834" instrument_node="">1. Rethink What a Meal Can Be </span></h2><span data-dcnode-id="1832" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1829"><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">If you grew up with plates divided into three equal portions – grains, veggies, and a portion of meat – a flexitarian plate can seem, well, lacking. So instead of filling the "meat" section up with meat substitutes, think outside the box! Instead of dividing your plate into pieces, consider recipes like stews, soups, and chilis that can be complete meals in and of themselves.</span></p></div><span data-dcnode-id="1828" instrument_node=""> </span><div class="div-sm-inContent" data-dcnode-id="1827"></div><span data-dcnode-id="1826" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1823"><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">To see what we mean, take inspiration from abroad. From the vegetable curries of Thailand to the dals of India, from the falafel of Israel to the mezze of Greece, recipes from abroad can help jump-start your flexitarian way of life – and invite you to travel around the world from the comfort of your own kitchen.</span></p></div><span data-dcnode-id="1822" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1819"><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Here are just a few delicious options to get you started:</span></p></div><span data-dcnode-id="1818" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1817" data-tier="3" id="div-gpt-mob-square-fixed-2" role="complementary" tabindex="-1"></div><span data-dcnode-id="1816" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1794"><ul data-dcnode-id="1795"><li data-dcnode-id="1812"><span data-dcnode-id="1815" instrument_node="">Indian </span><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/247204/red-split-lentils-masoor-dal/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1814" instrument_node="">masoor dal</span></a></li><li data-dcnode-id="1808"><span data-dcnode-id="1811" instrument_node="">Indian </span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/236563/delicious-chana-masala/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1810" instrument_node="">chana masala</span></a></li><li data-dcnode-id="1804"><span data-dcnode-id="1807" instrument_node="">Greek </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/259870/briam-greek-baked-zucchini-and-potatoes/%3FinternalSource%3Dstaff%2520pick%26referringId%3D16704%26referringContentType%3DRecipe%2520Hub" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1806" instrument_node="">briam</span></a></li><li data-dcnode-id="1800"><span data-dcnode-id="1803" instrument_node="">Greek </span><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/137650/greek-lentil-soup-fakes/%3FinternalSource%3Dhub%2520recipe%26referringId%3D16704%26referringContentType%3DRecipe%2520Hub%26clickId%3Dcardslot%252014" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1802" instrument_node="">lentil soup</span></a></li><li data-dcnode-id="1796"><span data-dcnode-id="1799" instrument_node="">Mexican-inspired </span><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/255695/vegan-mexican-quinoa-bowl-with-green-chile-cilantro-sauce/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1798" instrument_node="">quinoa bowl</span></a></li></ul></div><span data-dcnode-id="1793" instrument_node=""> </span><h2 data-dcnode-id="1791" id="acb5d425323f772154c9b9008858cd76"><span data-dcnode-id="1792" instrument_node="">2. Stock Your Pantry </span></h2><span data-dcnode-id="1790" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1787"><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">One important part of embarking on any new eating routine is without a doubt being prepared. A flexitarian diet – particularly one based on whole foods – will require a certain amount of last-minute shopping for fresh produce. But there are also quite a few pantry staples that keep healthy meals within your reach at a moment's notice.</span></p></div><span data-dcnode-id="1786" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1785" data-tier="4" id="div-gpt-mob-square-fixed-3" role="complementary" tabindex="-1"></div><span data-dcnode-id="1784" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1781"><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Start with the cupboard, which you'll want to fill with cans: a variety of beans (black, cannellini, chickpeas, etc.) and tomato products (whole, chopped, fire-roasted, paste) mean that chilis and stews are always quick and easy options. A can of coconut milk will add silkiness and flavor to curries and soups. And be sure to fill your shopping cart with whole grains like rice and farro, which will bulk out buddha bowls and soak up luxurious vegetarian sauces and gravies.</span></p></div><span data-dcnode-id="1780" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1779" data-scroll-load="true" data-tier="1" id="div-gpt-mob-square-fixed-4" role="complementary" tabindex="-1"></div><span data-dcnode-id="1778" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1775"><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Next up, the freezer: frozen veggies add flavor and nutrients to stir-fries, soups, and pasta sauces. Plus, you'll have them on hand for any time you want to round out a meal with more plants. </span></p></div><span data-dcnode-id="1774" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1771"><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Finish with a well-stocked spice cupboard, complete with turmeric, cumin, coriander, paprika, and herbes de Provence, and a wide range of dishes is at your fingertips without stepping foot in a store.</span></p></div><span data-dcnode-id="1770" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1769" data-scroll-load="true" data-tier="2" id="div-gpt-mob-square-fixed-5" role="complementary" tabindex="-1"></div><span data-dcnode-id="1768" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1762"><p data-dcnode-id="1763"><strong data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Related: </span></strong><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/gallery/flexitarian-bean-lentil-recipes/"><span data-dcnode-id="1765" instrument_node="">15+ Flexitarian Recipes Featuring Legumes</span></a></p></div><span data-dcnode-id="1761" instrument_node=""> </span><h2 data-dcnode-id="1759" id="0ec05860e3eda6b2cff3ae5691e0ee38"><span data-dcnode-id="1760" instrument_node="">3. Plan Ahead </span></h2><span data-dcnode-id="1758" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1755"><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Meal prepping is another great way to begin embracing a new eating regimen. By planning out your menu, shopping in advance, and even doing a bit of cooking when you have time to (during the weekend, for example), you're making life for future you a whole lot easier!</span></p></div><span data-dcnode-id="1754" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1742"><p data-dcnode-id="1743"><span data-dcnode-id="1753" instrument_node="">Sit down with a beautiful cookbook (or your phone) and make a list of the recipes that most entice and excite you. Set a goal of trying a new recipe each week, and stick to it! And to make life simpler on busy nights, consider batch cooking meals like chili, stew, and soup: </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/246179/black-chana-with-potato/" rel="noopener" target="_blank"><span data-dcnode-id="1752" instrument_node="">chana with potatoes</span></a><span data-dcnode-id="1750" instrument_node="">, </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/232210/couscous-with-olives-and-sun-dried-tomato/" rel="noopener" target="_blank"><span data-dcnode-id="1749" instrument_node="">couscous with olives and tomato</span></a><span data-dcnode-id="1747" instrument_node="">, or </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/263458/vegan-tomato-soup/" rel="noopener" target="_blank"><span data-dcnode-id="1746" instrument_node="">vegan tomato soup</span></a><span data-dcnode-id="1744" instrument_node=""> are great make-ahead options the whole family will love.</span></p></div><span data-dcnode-id="1741" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1740" data-scroll-load="true" data-tier="3" id="div-gpt-mob-square-fixed-6" role="complementary" tabindex="-1"></div><span data-dcnode-id="1739" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1733"><p data-dcnode-id="1734"><strong data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Related: </span></strong><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/gallery/meatless-meals-menu/"><span data-dcnode-id="1736" instrument_node="">These 21 Recipes Show How Easy an Entire Week of Meatless Meals Can Be</span></a></p></div><span data-dcnode-id="1732" instrument_node=""> </span><h2 data-dcnode-id="1730" id="438318c4e79a6297b9354e3412234e50"><span data-dcnode-id="1731" instrument_node="">4. Don't Be Shy </span></h2><span data-dcnode-id="1729" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1726"><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">It's all well and good to stick to a new routine when you're at home, but when you're invited to a restaurant or a dinner party, it's tempting to shy away from mentioning your new lifestyle. Luckily, since flexitarianism doesn't technically preclude you from eating any food item, bringing it up with your host or hostess isn't necessarily an imposition. Instead, it can be a great opportunity to keep your friends in the loop about your food choices – and maybe even pique their interest in the flexitarian diet.</span></p></div><span data-dcnode-id="1725" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1724" data-scroll-load="true" data-tier="4" id="div-gpt-mob-square-fixed-7" role="complementary" tabindex="-1"></div><span data-dcnode-id="1723" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1717"><p data-dcnode-id="1718"><span data-dcnode-id="1722" instrument_node="">As for explaining this, you can quite simply let your friends and family know you're "trying to eat more plants." Then, ask if you can bring a side dish or hearty salad (like this </span><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/recipe/257695/thai-rice-noodle-salad/" rel="noopener" target="_blank"><span data-dcnode-id="1721" instrument_node="">Thai rice noodle salad</span></a><span data-dcnode-id="1719" instrument_node="">) to share with the group. This way, you can enjoy the festivities without giving extra work to the host. </span></p></div><span data-dcnode-id="1716" instrument_node=""> </span><h2 data-dcnode-id="1714" id="635d79c1c7b200eae4b5e35078224e06"><span data-dcnode-id="1715" instrument_node="">5. Keep Learning </span></h2><span data-dcnode-id="1713" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1710"><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">The inbuilt flexibility of flexitarianism is all about making better choices – and not letting perfect be the enemy of good. Whenever you're faced with a new choice, consider the reasons behind your flexitarianism: Are you choosing a mostly plant-based way of life for the environment? For the health benefits? For humane reasons? Each of these motivations is valid – and each informs a different second-best option.</span></p></div><span data-dcnode-id="1709" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1708" data-scroll-load="true" data-tier="1" id="div-gpt-mob-square-fixed-8" role="complementary" tabindex="-1"></div><span data-dcnode-id="1707" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1701"><p data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">Consider, for instance, the health benefits of a plant-based way of life, which include reduced inflammation and improved immune health, according to the </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdanderson.org/publications/focused-on-health/5-benefits-of-a-plant-based-diet.h20-1592991.html" target="_blank" title="(opens new window)"><span data-dcnode-id="1705" instrument_node="">MD Anderson Cancer Center</span></a><span data-dcnode-id="1703" instrument_node="">. If these benefits are the most important to you, and your choice at a restaurant is between a vegetarian fried falafel sandwich on white pita bread or a grilled fillet of wild-caught salmon, the latter is a better choice. On the other hand, if environmental or humane factors motivate your choice, the falafel is far less demanding than the salmon.</span></p></div><span data-dcnode-id="1700" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1699" data-scroll-load="true" data-tier="2" id="div-gpt-mob-square-fixed-9" role="complementary" tabindex="-1"></div><span data-dcnode-id="1698" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1695"><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">If you're choosing a flexitarian diet for humane reasons, an Impossible Burger might be a better choice than a three-egg omelet. If, however, you're motivated to eat more whole foods, that omelet is probably the better choice.</span></p></div><span data-dcnode-id="1694" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1691"><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">The best part? A flexitarian diet allows you to keep learning and adapting as you go. With this way of life, there are no wrong answers.</span></p></div><span data-dcnode-id="1690" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1683"><p data-dcnode-id="1684"><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Related:</span></strong><span data-dcnode-id="1687" instrument_node=""> </span><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allrecipes.com/article/beginner-tips-going-vegetarian/"><span data-dcnode-id="1686" instrument_node="">10 Ways to Make Going Meatless Almost Too Easy</span></a></p></div><span data-dcnode-id="1682" instrument_node=""> </span></div><div class="articleContainer__content" data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node=""> </span></div><span data-dcnode-id="1678" instrument_node=""> </span><div class="articleContainer__content" data-dcnode-id="1546"><span data-dcnode-id="1677" instrument_node=""> </span><div class="editorialProgramMiniRecirc" data-cms_id="" data-dcnode-id="
