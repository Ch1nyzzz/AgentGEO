</span></div><span data-dcnode-id="2292" instrument_node="">

</span><div class="customRTE smartbody-core section" data-dcnode-id="2196"><span class="clicktracking" data-dcnode-id="2289" data-resource-type="foodcom/components/article/customRTE" style="display: none"></span><span data-dcnode-id="2288" instrument_node="">
</span><section class="o-CustomRTE" data-dcnode-id="2198"><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2286" instrument_node="">A heart-healthy diet is one of the best weapons to help fight heart disease. The diet promotes selecting foods from a variety of food groups, including fruits, vegetables, whole grains, low-fat dairy, lean protein, nuts, legumes and vegetable-based oils. Foods to limit include those that are high in calories but low in nutrients, like cakes, doughnuts and sugary beverages. Foods with saturated fat, trans fat and a large amount of sodium should also be eaten sparingly.</span><br data-dcnode-id="2285"><span data-dcnode-id="2284" instrument_node="">
</span><br data-dcnode-id="2283"><span data-dcnode-id="2282" instrument_node="">
</span><b data-dcnode-id="2278"><span data-dcnode-id="2281" instrument_node="">Nutrients to Limit</span><br data-dcnode-id="2280"><span data-dcnode-id="2279" instrument_node="">
</span></b><br data-dcnode-id="2277"><span data-dcnode-id="2276" instrument_node="">
</span><i data-dcnode-id="2272"><span data-dcnode-id="2275" instrument_node="">Saturated and trans fat</span><br data-dcnode-id="2274"><span data-dcnode-id="2273" instrument_node="">
</span></i><br data-dcnode-id="2271"><span data-dcnode-id="2270" instrument_node="">
According to the American Heart Association, saturated fats should be limited and replaced with better fats, including monounsaturated and polyunsaturated fats. Monounsaturated fats are found in foods like olive oil and avocados, while polyunsaturated are found in sunflower seeds and most vegetable oils. If you need to lower your blood cholesterol, then saturated fat should account for no more than 5 to 6 percent of total calories. If you are eating 2,000 calories per day, that’s 13 grams of saturated fat. Saturated fat is most abundantly found in fatty cuts of meat and in the skin on poultry. Using leaner varieties of these foods and eating less by limiting your servings to approximately 6 ounces daily will help limit the amount of saturated fat you consume.</span><br data-dcnode-id="2269"><span data-dcnode-id="2268" instrument_node="">
</span><br data-dcnode-id="2267"><span data-dcnode-id="2266" instrument_node="">
Trans fats are found in foods made with hydrogenated oils. They show up in commercially baked goods, processed snack foods, stick margarine, shortening and many fried foods. The Food and Drug Administration (FDA) have called for food companies to cut trans fat out of food products in the next few years. Meanwhile, read food labels carefully and avoid foods that contain hydrogenated fat or partially hydrogenated oil.</span><br data-dcnode-id="2265"><span data-dcnode-id="2264" instrument_node="">
</span><br data-dcnode-id="2263"><span data-dcnode-id="2262" instrument_node="">
</span><i data-dcnode-id="2258"><span data-dcnode-id="2261" instrument_node="">Sodium</span><br data-dcnode-id="2260"><span data-dcnode-id="2259" instrument_node="">
</span></i><br data-dcnode-id="2257"><span data-dcnode-id="2256" instrument_node="">
Sodium is another nutrient that should be limited. According to the American Heart Association, to lower blood pressure, you should be taking in no more than 2,400 milligrams of sodium per day. If you want to lower blood pressure even more, cut back to 1,500 milligrams. Most added salt is consumed when dining out or from processed food. This means eating out less often and choosing processed foods with less sodium (like low-sodium soy sauce).</span><br data-dcnode-id="2255"><span data-dcnode-id="2254" instrument_node="">
</span><br data-dcnode-id="2253"><span data-dcnode-id="2252" instrument_node="">
</span><i data-dcnode-id="2248"><span data-dcnode-id="2251" instrument_node="">Added sugar and alcohol</span><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">
</span></i><br data-dcnode-id="2247"><span data-dcnode-id="2246" instrument_node="">
The American Heart Association also recommends cutting back on added sugar and alcohol. They recommend women eat no more than 100 calories per day, or 6 teaspoons, of added sugar. Men should limit added sugar to no more than 150 calories per day, or 9 teaspoons. Too much alcohol can also contribute to heart disease. It’s recommended than men consume no more than two drinks per day and that women consume no more than one drink per day. One drink is defined as 5 fluid ounces of wine, 12 fluid ounces of beer, or 1.5 fluid ounces of 80-proof liquor like rum or vodka.</span><br data-dcnode-id="2245"><span data-dcnode-id="2244" instrument_node="">
</span><br data-dcnode-id="2243"><span data-dcnode-id="2242" instrument_node="">
</span><b data-dcnode-id="2238"><span data-dcnode-id="2241" instrument_node="">What About Cholesterol?</span><br data-dcnode-id="2240"><span data-dcnode-id="2239" instrument_node="">
</span></b><br data-dcnode-id="2237"><span data-dcnode-id="2236" instrument_node="">
In the 2015 Dietary Guidelines for Americans, the recommendations for daily amounts of cholesterol were removed, because the science behind them was very poor. This doesn’t mean you can consume loads of foods that are high in cholesterol, though. Foods that are high in cholesterol tend to also be high in saturated fat, which should be limited.</span><br data-dcnode-id="2235"><span data-dcnode-id="2234" instrument_node="">
</span><br data-dcnode-id="2233"><span data-dcnode-id="2232" instrument_node="">
</span><b data-dcnode-id="2228"><span data-dcnode-id="2231" instrument_node="">Foods to Include</span><br data-dcnode-id="2230"><span data-dcnode-id="2229" instrument_node="">
</span></b><br data-dcnode-id="2227"><span data-dcnode-id="2226" instrument_node="">
</span><i data-dcnode-id="2222"><span data-dcnode-id="2225" instrument_node="">Whole grains</span><br data-dcnode-id="2224"><span data-dcnode-id="2223" instrument_node="">
</span></i><br data-dcnode-id="2221"><span data-dcnode-id="2220" instrument_node="">
Whole grains like 100 percent whole-wheat bread, oatmeal and brown rice contain protein, fiber and other nutrients that are lost during the refining process. Whole grains have also been shown to help prevent chronic diseases like heart disease. Soluble fiber, found in oats, has been shown to help lower LDL (or “bad”) cholesterol. When following a heart-healthy diet, choose whole grains whenever possible, making at least half your daily grains whole.</span><br data-dcnode-id="2219"><span data-dcnode-id="2218" instrument_node="">
</span><br data-dcnode-id="2217"><span data-dcnode-id="2216" instrument_node="">
</span><i data-dcnode-id="2212"><span data-dcnode-id="2215" instrument_node="">Fatty fish</span><br data-dcnode-id="2214"><span data-dcnode-id="2213" instrument_node="">
</span></i><br data-dcnode-id="2211"><span data-dcnode-id="2210" instrument_node="">
The American Heart Association recommends eating fatty fish containing Omega-3 fats at least twice a week. These fish include salmon, tuna, trout and herring.</span><br data-dcnode-id="2209"><span data-dcnode-id="2208" instrument_node="">
</span><br data-dcnode-id="2207"><span data-dcnode-id="2206" instrument_node="">
There really isn't a downside to consuming a heart-healthy diet. The foods can all be part of an overall healthy eating plan. If you have any questions about following a heart-healthy diet, consult your medical doctor or a registered dietitian nutritionist (RDN). You can find a RDN in your area on the Academy for Nutrition and Dietetics website </span><a data-dcnode-id="2204" data-uri="6b95112df9c4ca1a665e886eec55eaeb" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eatright.org/" target="_blank"><span data-dcnode-id="2205" instrument_node="">www.eatright.org</span></a><span data-dcnode-id="2203" instrument_node="">, and many RDNs now take insurance.</span><br data-dcnode-id="2202"><span data-dcnode-id="2201" instrument_node="">
</span></p><span data-dcnode-id="2199" instrument_node="">
