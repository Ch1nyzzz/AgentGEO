</span><h1 data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Rhubarb</span></h1><span data-dcnode-id="1192" instrument_node="">
</span><p class="drug-subtitle" data-dcnode-id="1184"><b data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Scientific Name(s):</span></b><span data-dcnode-id="1189" instrument_node=""> Rheum officinale Baillon, Rheum palmatum L., Rheum rhabarbarum L.</span><br data-dcnode-id="1188"><b data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Common Name(s):</span></b><span data-dcnode-id="1185" instrument_node=""> Bo ye da huang, Chinese rhubarb, Da-huang, Danning Pian, Number Ten, Radix et rhizoma rhei, Rhaptonic, Rheum, Rhubarb, Ta-huang, Turkey rhubarb</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p class="ddc-reviewed-by" data-dcnode-id="1178"><span data-dcnode-id="1179"><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/support/editorial_policy.html%23editorial-staff"><span data-dcnode-id="1182" instrument_node="">Medically reviewed</span></a><span data-dcnode-id="1180" instrument_node=""> by Drugs.com. Last updated on May 13, 2021.</span></span></p><span data-dcnode-id="1177" instrument_node="">
</span><h2 data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Clinical Overview</span></h2><h3 data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Use</span></h3><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Rhubarb is extensively used in traditional Chinese medicine. Rhubarb has been studied for the management of GI and renal function disorders, and for the treatment of hyperlipidemia, cancer, and acute ischemic stroke. However, sound clinical evidence for its use is lacking.</span></p><h3 data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Dosing</span></h3><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Dried rhubarb extract 20 to 50 mg/kg daily has been used in clinical trials.</span></p><h3 data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Contraindications</span></h3><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Contraindications have not been identified.</span></p><h3 data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Pregnancy/Lactation</span></h3><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Avoid dosages higher than those found in food because safety and efficacy are unproven.</span></p><h3 data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Interactions</span></h3><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Interaction with cardiac glycosides (digoxin) and a reduction in the absorption of orally administered drugs have been noted when rhubarb is taken in large quantities.</span></p><h3 data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Adverse Reactions</span></h3><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">A few reactions, primarily GI effects, have been reported in clinical trials.</span></p><h3 data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Toxicology</span></h3><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">The leaf blades (but not the stalks) of rhubarb contain enough oxalic acid to cause poisoning. Acute renal failure has been associated with long-term anthraquinone use.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><h2 data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Scientific Family</span></h2><span data-dcnode-id="1136" instrument_node="">
</span><ul data-dcnode-id="1133"><li data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Polygonaceae (Buckwheat family)</span></li></ul><h2 data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Botany</span></h2><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1129" instrument_node="">Rhubarb is derived from several Rheum species. The perennial herb has a conical rootstock, that is fleshy and yellow inside and produces large, cordate, 7-lobed leaves 30 to 46 cm long. The blade or green leaves of the plant are often considered the most poisonous due to high oxalic acid concentration; however, other chemical constituents of the plant are also toxic. The edible stalks are up to 45 cm long and 2.5 to 5 cm in diameter, and are used in pies, jams, jellies, sauces, and juices.</span><a data-dcnode-id="1127" href="#fandc-np5367.b1"><span data-dcnode-id="1128" instrument_node="">1</span></a><span data-dcnode-id="1126" instrument_node="">, </span><a data-dcnode-id="1124" href="#fandc-np5367.b2"><span data-dcnode-id="1125" instrument_node="">2</span></a></p><p data-dcnode-id="1119"><span data-dcnode-id="1122" instrument_node="">Medicinal rhubarb consists of the dried rhizome and root of R. officinale Baillon or R. palmatum, of related species/hybrids grown in China (Chinese rhubarb), or of Rheum emodi or Rheum webbianum native to India, Pakistan, or Nepal (Indian rhubarb).</span><a data-dcnode-id="1120" href="#fandc-np5367.b3"><span data-dcnode-id="1121" instrument_node="">3</span></a></p><h2 data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">History</span></h2><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1115" instrument_node="">Rhubarb was first recorded and rated as one of the inferior remedies in the oldest Chinese herbal books, from 22 to 250 AD.</span><a data-dcnode-id="1113" href="#fandc-np5367.b4"><span data-dcnode-id="1114" instrument_node="">4</span></a><span data-dcnode-id="1112" instrument_node=""> In the 1780s, the active constituents responsible for the root's cathartic action and astringency were still unknown. Initially, researchers learned that the medicinal root came from several varieties or species of rhubarb. By the end of the 19th century, it became clear that the particular medicinal characteristics of rhubarb were affected by conditions under which the roots grew, such as soil composition and climate.</span><a data-dcnode-id="1110" href="#fandc-np5367.b5"><span data-dcnode-id="1111" instrument_node="">5</span></a></p><p data-dcnode-id="1105"><span data-dcnode-id="1108" instrument_node="">Rhubarb has been used medicinally in Europe since the 13th century. The herb was brought from the eastern Mediterranean by way of the Silk Road, which stretches from China across central Asia. The first reported sighting of the plant in situ was in the mountains of Bulgaria. In 1731, a rhubarb commission was set up at the Mongolian border to import the best possible root at a fixed price. At the same time, the British East India Company secured their positions in Chinese ports. Both companies supplied Europe with rhubarb.</span><a data-dcnode-id="1106" href="#fandc-np5367.b5"><span data-dcnode-id="1107" instrument_node="">5</span></a></p><p data-dcnode-id="1098"><span data-dcnode-id="1104" instrument_node="">In the 1830s and 1840s, the cooked stems of rhubarb emerged as a culinary delight, especially in Britain and the United States.</span><a data-dcnode-id="1102" href="#fandc-np5367.b5"><span data-dcnode-id="1103" instrument_node="">5</span></a><span data-dcnode-id="1101" instrument_node="">, </span><a data-dcnode-id="1099" href="#fandc-np5367.b6"><span data-dcnode-id="1100" instrument_node="">6</span></a></p><h2 data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Chemistry</span></h2><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1094" instrument_node="">The Rheum species contains a number of anthraquinone derivatives. The free anthraquinones—rhein, emodin, physcion, and chrysophamol—are present in nearly all species.</span><a data-dcnode-id="1092" href="#fandc-np5367.b7"><span data-dcnode-id="1093" instrument_node="">7</span></a><span data-dcnode-id="1091" instrument_node=""> Stilbene glycosides, including rhaponticin and the metabolite rhapontigenin, have been identified in the root.</span><a data-dcnode-id="1089" href="#fandc-np5367.b4"><span data-dcnode-id="1090" instrument_node="">4</span></a><span data-dcnode-id="1088" instrument_node="">, </span><a data-dcnode-id="1086" href="#fandc-np5367.b7"><span data-dcnode-id="1087" instrument_node="">7</span></a><span data-dcnode-id="1085" instrument_node="">, </span><a data-dcnode-id="1083" href="#fandc-np5367.b8"><span data-dcnode-id="1084" instrument_node="">8</span></a><span data-dcnode-id="1082" instrument_node="">, </span><a data-dcnode-id="1080" href="#fandc-np5367.b9"><span data-dcnode-id="1081" instrument_node="">9</span></a><span data-dcnode-id="1079" instrument_node=""> Tannins, sennosides, catechins, gallic acid, and cinnaminic acid have been identified.</span><a data-dcnode-id="1077" href="#fandc-np5367.b7"><span data-dcnode-id="1078" instrument_node="">7</span></a><span data-dcnode-id="1076" instrument_node=""> Lindleyin, a phytochemical with estrogenic activity, has also been described.</span><a data-dcnode-id="1074" href="#fandc-np5367.b10"><span data-dcnode-id="1075" instrument_node="">10</span></a><span data-dcnode-id="1073" instrument_node=""> Rhubarb is also a dietary source of resveratrol.</span><a data-dcnode-id="1071" href="#fandc-np5367.b57"><span data-dcnode-id="1072" instrument_node="">57</span></a></p><p data-dcnode-id="1063"><span data-dcnode-id="1069" instrument_node="">Oxalic acid is present in the leaf blades, as well as 2-methylbutanol and 4-methylhexanol.</span><a data-dcnode-id="1067" href="#fandc-np5367.b2"><span data-dcnode-id="1068" instrument_node="">2</span></a><span data-dcnode-id="1066" instrument_node="">, </span><a data-dcnode-id="1064" href="#fandc-np5367.b11"><span data-dcnode-id="1065" instrument_node="">11</span></a></p><h2 data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Uses and Pharmacology</span></h2><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Rhubarb is widely used in traditional Chinese medicine. Most reported clinical trials have been small and poorly designed, and in some studies, a number of different herbs were coadministered with rhubarb, making it difficult to evaluate which herb contributed to the outcomes.</span></p><div data-dcnode-id="1057" id="uses-nested-0"></div><h3 data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Cancer</span></h3><p data-dcnode-id="1017"><span data-dcnode-id="1054" instrument_node="">The actions of emodin and hydroxyanthraquinones in managing cancer have been reviewed.</span><a data-dcnode-id="1052" href="#fandc-np5367.b12"><span data-dcnode-id="1053" instrument_node="">12</span></a><span data-dcnode-id="1051" instrument_node="">, </span><a data-dcnode-id="1049" href="#fandc-np5367.b13"><span data-dcnode-id="1050" instrument_node="">13</span></a><span data-dcnode-id="1048" instrument_node=""> Cell cycle inhibition of many human cancer lines has been observed in vitro; however, a mechanism of action is unclear.</span><a data-dcnode-id="1046" href="#fandc-np5367.b12"><span data-dcnode-id="1047" instrument_node="">12</span></a><span data-dcnode-id="1045" instrument_node="">, </span><a data-dcnode-id="1043" href="#fandc-np5367.b13"><span data-dcnode-id="1044" instrument_node="">13</span></a><span data-dcnode-id="1042" instrument_node="">, </span><a data-dcnode-id="1040" href="#fandc-np5367.b14"><span data-dcnode-id="1041" instrument_node="">14</span></a><span data-dcnode-id="1039" instrument_node="">, </span><a data-dcnode-id="1037" href="#fandc-np5367.b15"><span data-dcnode-id="1038" instrument_node="">15</span></a><span data-dcnode-id="1036" instrument_node="">, </span><a data-dcnode-id="1034" href="#fandc-np5367.b16"><span data-dcnode-id="1035" instrument_node="">16</span></a><span data-dcnode-id="1033" instrument_node=""> Apoptosis, as well as antitumor action, has been demonstrated, and rhubarb extract has been suggested as an adjunct to chemotherapy.</span><a data-dcnode-id="1031" href="#fandc-np5367.b12"><span data-dcnode-id="1032" instrument_node="">12</span></a><span data-dcnode-id="1030" instrument_node="">, </span><a data-dcnode-id="1028" href="#fandc-np5367.b13"><span data-dcnode-id="1029" instrument_node="">13</span></a><span data-dcnode-id="1027" instrument_node="">, </span><a data-dcnode-id="1025" href="#fandc-np5367.b17"><span data-dcnode-id="1026" instrument_node="">17</span></a><span data-dcnode-id="1024" instrument_node=""> Antiangiogenic action has also been shown</span><a data-dcnode-id="1022" href="#fandc-np5367.b12"><span data-dcnode-id="1023" instrument_node="">12</span></a><span data-dcnode-id="1021" instrument_node="">, </span><a data-dcnode-id="1019" href="#fandc-np5367.b13"><span data-dcnode-id="1020" instrument_node="">13</span></a><span data-dcnode-id="1018" instrument_node="">; clinical trials are lacking.</span></p><p data-dcnode-id="1013"><span data-dcnode-id="1016" instrument_node="">Rhubarb extract 20 mg/kg daily administered for 6 weeks to patients undergoing radiation therapy for cancer resulted in a reduction in radiation-induced lung toxicity in a randomized clinical trial. Evaluation of anti-inflammatory markers suggests that an anti-inflammatory action of rhubarb is responsible for the effect.</span><a data-dcnode-id="1014" href="#fandc-np5367.b18"><span data-dcnode-id="1015" instrument_node="">18</span></a></p><div data-dcnode-id="1012" id="uses-nested-1"></div><h3 data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">GI effects</span></h3><p data-dcnode-id="1000"><span data-dcnode-id="1009" instrument_node="">In addition to the sennosides present in rhubarb extracts, which have been traditionally used as a laxative, emodin and other anthraquinones exert action on the GI tract. Emodin is metabolized in the large intestine by intestinal bacteria and converted to aglycone, which exerts various effects on absorption, secretion, and motility in the tract, and is also suggested to increase peristalsis without affecting the stomach or duodenum.</span><a data-dcnode-id="1007" href="#fandc-np5367.b12"><span data-dcnode-id="1008" instrument_node="">12</span></a><span data-dcnode-id="1006" instrument_node=""> It has been used in cases of GI bleeds to eliminate extravasated blood.</span><a data-dcnode-id="1004" href="#fandc-np5367.b12"><span data-dcnode-id="1005" instrument_node="">12</span></a><span data-dcnode-id="1003" instrument_node="">, </span><a data-dcnode-id="1001" href="#fandc-np5367.b19"><span data-dcnode-id="1002" instrument_node="">19</span></a></p><p data-dcnode-id="996"><span data-dcnode-id="999" instrument_node="">In a study among patients with septicemia, crude rhubarb extract powder 9 g daily was used to preserve GI function. The investigators suggest that increased perfusion of gastric mucosal blood flow, increased excretion of bacteria and toxins, and decreased permeability of intestinal mucous membranes contributed to the positive effects.</span><a data-dcnode-id="997" href="#fandc-np5367.b20"><span data-dcnode-id="998" instrument_node="">20</span></a></p><div data-dcnode-id="995" id="uses-nested-2"></div><h3 data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Lipid-lowering effects</span></h3><p data-dcnode-id="986"><span data-dcnode-id="992" instrument_node="">Rhubarb appears to be a potential source of dietary fiber with a lipid-lowering effect. It has been proposed that rhubarb exerts its effects on cholesterol by inhibition of squalene epoxidase.</span><a data-dcnode-id="990" href="#fandc-np5367.b21"><span data-dcnode-id="991" instrument_node="">21</span></a><span data-dcnode-id="989" instrument_node=""> This enzyme is thought to catalyze the rate-limiting step in cholesterol biogenesis. An anti-inflammatory action has also been suggested.</span><a data-dcnode-id="987" href="#fandc-np5367.b22"><span data-dcnode-id="988" instrument_node="">22</span></a></p><div data-dcnode-id="985" id="uses-nested-2-0"></div><h4 data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Animal data</span></h4><p data-dcnode-id="970"><span data-dcnode-id="982" instrument_node="">Experiments in mice and rats receiving a cholesterol-enriched diet or with induced diabetic nephropathy/hyperlipidemia showed an improved lipid profile with rhubarb extract compared with control animals.</span><a data-dcnode-id="980" href="#fandc-np5367.b23"><span data-dcnode-id="981" instrument_node="">23</span></a><span data-dcnode-id="979" instrument_node="">, </span><a data-dcnode-id="977" href="#fandc-np5367.b24"><span data-dcnode-id="978" instrument_node="">24</span></a><span data-dcnode-id="976" instrument_node="">, </span><a data-dcnode-id="974" href="#fandc-np5367.b25"><span data-dcnode-id="975" instrument_node="">25</span></a><span data-dcnode-id="973" instrument_node=""> Rabbits with induced atherosclerotic plaques and fed a high-cholesterol diet demonstrated a decrease in plaque rupture with either administration of rhubarb extract or simvastatin compared with control. Lipid profiles were improved in the two experimental arms.</span><a data-dcnode-id="971" href="#fandc-np5367.b22"><span data-dcnode-id="972" instrument_node="">22</span></a></p><div data-dcnode-id="969" id="uses-nested-2-1"></div><h4 data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Clinical data</span></h4><p data-dcnode-id="957"><span data-dcnode-id="966" instrument_node="">Treating hypercholesterolemia in men with rhubarb stalk fiber for 4 weeks lowered serum total cholesterol and low-density lipoproteins (LDL), while high-density lipoproteins remained unchanged.</span><a data-dcnode-id="964" href="#fandc-np5367.b26"><span data-dcnode-id="965" instrument_node="">26</span></a><span data-dcnode-id="963" instrument_node=""> In 103 patients with atherosclerosis randomized to receive the extract for 6 months, rhubarb extract improved the lipid profile in patients with chronic renal failure (CRF) compared with control.</span><a data-dcnode-id="961" href="#fandc-np5367.b25"><span data-dcnode-id="962" instrument_node="">25</span></a><span data-dcnode-id="960" instrument_node=""> Individuals taking rhubarb reported decreased LDL compared with those taking placebo and compared with the pretreatment levels.</span><a data-dcnode-id="958" href="#fandc-np5367.b27"><span data-dcnode-id="959" instrument_node="">27</span></a></p><div data-dcnode-id="956" id="uses-nested-3"></div><h3 data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Renal effects</span></h3><p data-dcnode-id="950"><span data-dcnode-id="953" instrument_node="">Large, randomized clinical trials are lacking. Acute renal failure has been associated with long-term anthraquinone use.</span><a data-dcnode-id="951" href="#fandc-np5367.b28"><span data-dcnode-id="952" instrument_node="">28</span></a></p><div data-dcnode-id="949" id="uses-nested-3-0"></div><h4 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Animal data</span></h4><p data-dcnode-id="931"><span data-dcnode-id="946" instrument_node="">A number of studies have observed the effects of rhubarb in rats with CRF. Low molecular weight tannins, purified from rhubarb, produced an increase in glomerular filtration rate, decreased levels of uremic toxins, and increased blood flow to the kidneys.</span><a data-dcnode-id="944" href="#fandc-np5367.b25"><span data-dcnode-id="945" instrument_node="">25</span></a><span data-dcnode-id="943" instrument_node="">, </span><a data-dcnode-id="941" href="#fandc-np5367.b29"><span data-dcnode-id="942" instrument_node="">29</span></a><span data-dcnode-id="940" instrument_node="">, </span><a data-dcnode-id="938" href="#fandc-np5367.b30"><span data-dcnode-id="939" instrument_node="">30</span></a><span data-dcnode-id="937" instrument_node="">, </span><a data-dcnode-id="935" href="#fandc-np5367.b31"><span data-dcnode-id="936" instrument_node="">31</span></a><span data-dcnode-id="934" instrument_node="">, </span><a data-dcnode-id="932" href="#fandc-np5367.b32"><span data-dcnode-id="933" instrument_node="">32</span></a></p><div data-dcnode-id="930" id="uses-nested-3-1"></div><div class="display-ad display-ad-injection display-ad-lazy display-ad-ehs display-ad-300 display-ad-300x250" data-dcnode-id="929" id="display-ad-injection-1" style="display: block; width: 300px; height: 250px;"></div><h4 data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Clinical data</span></h4><p data-dcnode-id="914"><span data-dcnode-id="926" instrument_node="">Use of rhubarb extract in patients with elevated serum creatinine has been reported to prevent progression of CRF. Trials have been conducted comparing captopril and rhubarb. Allocation to rhubarb or captopril produced a slower progression to CRF when compared with controls, and synergism of rhubarb with captopril was demonstrated.</span><a data-dcnode-id="924" href="#fandc-np5367.b32"><span data-dcnode-id="925" instrument_node="">32</span></a><span data-dcnode-id="923" instrument_node="">, </span><a data-dcnode-id="921" href="#fandc-np5367.b33"><span data-dcnode-id="922" instrument_node="">33</span></a><span data-dcnode-id="920" instrument_node=""> Other clinical studies have evaluated rhubarb extracts, either alone or with other herbs, in patients with CRF and report reduced uremic symptoms and reduced blood urea nitrogen.</span><a data-dcnode-id="918" href="#fandc-np5367.b34"><span data-dcnode-id="919" instrument_node="">34</span></a><span data-dcnode-id="917" instrument_node="">, </span><a data-dcnode-id="915" href="#fandc-np5367.b35"><span data-dcnode-id="916" instrument_node="">35</span></a></p><p data-dcnode-id="904"><span data-dcnode-id="913" instrument_node="">Mechanisms of action have been proposed and include inhibition of protein decomposition, accelerated reutilization of certain amino acids, reduction of the formation of free radicals, inhibition of overexpression of plasminogen activator inhibitor-1, and suppression of cytokines.</span><a data-dcnode-id="911" href="#fandc-np5367.b32"><span data-dcnode-id="912" instrument_node="">32</span></a><span data-dcnode-id="910" instrument_node="">, </span><a data-dcnode-id="908" href="#fandc-np5367.b34"><span data-dcnode-id="909" instrument_node="">34</span></a><span data-dcnode-id="907" instrument_node="">, </span><a data-dcnode-id="905" href="#fandc-np5367.b36"><span data-dcnode-id="906" instrument_node="">36</span></a></p><div data-dcnode-id="903" id="uses-nested-4"></div><h3 data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Other effects</span></h3><div data-dcnode-id="900" id="uses-nested-4-0"></div><h4 data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Acute ischemic stroke</span></h4><p data-dcnode-id="891"><span data-dcnode-id="897" instrument_node="">A systematic review and meta-analysis of randomized clinical trials studied the safety and efficacy of rhubarb root and rhizome-based treatment for acute ischemic stroke as add-on therapy to conventional Western medicine. A total of 12 studies enrolling 968 participants were identified; ages of participants ranged from 57 to 69 years, all were Chinese, disease duration ranged from 6 hours to 14 days, and study duration ranged from 1 week to 30 days. Rhubarb-based interventions included Taohe chengqi, Xinglou chengqi, Dachengqi, modified chengqi, and Sanhua. Significant overall clinical efficacy was demonstrated in the rhubarb intervention group compared with Western medicine controls (n = 788; relative risk [RR] = 1.27; </span><i data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">P</span></i><span data-dcnode-id="894" instrument_node=""> &lt; 0.01); all trials had a relatively high risk of bias and the funnel plot indicated publication bias. No adverse events were reported in the 6 trials that documented occurrences.</span><a data-dcnode-id="892" href="#fandc-np5367.b55"><span data-dcnode-id="893" instrument_node="">55</span></a></p><div data-dcnode-id="890" id="uses-nested-4-1"></div><h4 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Alzheimer disease</span></h4><p data-dcnode-id="880"><span data-dcnode-id="887" instrument_node="">Traditional Chinese medicine suggests rhubarb improves the memory in senile patients.</span><a data-dcnode-id="885" href="#fandc-np5367.b37"><span data-dcnode-id="886" instrument_node="">37</span></a><span data-dcnode-id="884" instrument_node=""> In in vitro experiments, rhapontigenin exerted a dose-dependent protective effect on mitochondrial functioning against amyloid beta (1-42) neurotoxicity.</span><a data-dcnode-id="882" href="#fandc-np5367.b8"><span data-dcnode-id="883" instrument_node="">8</span></a><span data-dcnode-id="881" instrument_node=""> Clinical trials are lacking.</span></p><div data-dcnode-id="879" id="uses-nested-4-2"></div><h4 data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Antimicrobial</span></h4><p data-dcnode-id="858"><span data-dcnode-id="876" instrument_node="">The anthraquinone derivatives of rhubarb have been used as antifungal</span><a data-dcnode-id="874" href="#fandc-np5367.b38"><span data-dcnode-id="875" instrument_node="">38</span></a><span data-dcnode-id="873" instrument_node="">, </span><a data-dcnode-id="871" href="#fandc-np5367.b39"><span data-dcnode-id="872" instrument_node="">39</span></a><span data-dcnode-id="870" instrument_node=""> and molluscicidal</span><a data-dcnode-id="868" href="#fandc-np5367.b40"><span data-dcnode-id="869" instrument_node="">40</span></a><span data-dcnode-id="867" instrument_node=""> agents. Rhein has in vitro antimicrobial activity against a wide spectrum of gram-negative and gram-positive bacteria.</span><a data-dcnode-id="865" href="#fandc-np5367.b13"><span data-dcnode-id="866" instrument_node="">13</span></a><span data-dcnode-id="864" instrument_node="">, </span><a data-dcnode-id="862" href="#fandc-np5367.b39"><span data-dcnode-id="863" instrument_node="">39</span></a><span data-dcnode-id="861" instrument_node="">, </span><a data-dcnode-id="859" href="#fandc-np5367.b41"><span data-dcnode-id="860" instrument_node="">41</span></a></p><div data-dcnode-id="857" id="uses-nested-4-3"></div><h4 data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Dental</span></h4><p data-dcnode-id="851"><span data-dcnode-id="854" instrument_node="">An extract of rhubarb stalk has been used as a dental desensitizer. Calcium oxalate crystals form and occlude the dentinal tubules responsible for sensitization.</span><a data-dcnode-id="852" href="#fandc-np5367.b42"><span data-dcnode-id="853" instrument_node="">42</span></a></p><div data-dcnode-id="850" id="uses-nested-4-4"></div><h4 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Dysmenorrhea</span></h4><p data-dcnode-id="844"><span data-dcnode-id="847" instrument_node="">A Cochrane systematic review and meta-analysis of dietary supplements for dysmenorrhea identified only low or very low quality studies with very small sample sizes. No evidence of any difference in effectiveness was found in 1 randomized clinical trial (N = 45) for the treatment of primary dysmenorrhea with rhubarb (1,260 mg twice daily beginning 2 days before menstruation and continued for the first 3 days of menstruation × 3 cycles [2,520 mg/day]) compared to mefanamic acid (250 mg 3 times daily [750 mg/day]). Mild side effects of bloating and diarrhea were noted in the rhubarb group.</span><a data-dcnode-id="845" href="#fandc-np5367.b56"><span data-dcnode-id="846" instrument_node="">56</span></a></p><div data-dcnode-id="843" id="uses-nested-4-5"></div><h4 data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Estrogen</span></h4><p data-dcnode-id="837"><span data-dcnode-id="840" instrument_node="">In vitro studies and in vivo experiments in fish show that rhubarb extract possesses estrogenic activity, which has been suggested to be caused by the chemical lindleyin.</span><a data-dcnode-id="838" href="#fandc-np5367.b10"><span data-dcnode-id="839" instrument_node="">10</span></a></p><div data-dcnode-id="836" id="uses-nested-4-6"></div><h4 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Heptoprotective effects</span></h4><p data-dcnode-id="824"><span data-dcnode-id="833" instrument_node="">R. officinale has been used in China to treat neonatal jaundice.</span><a data-dcnode-id="831" href="#fandc-np5367.b43"><span data-dcnode-id="832" instrument_node="">43</span></a><span data-dcnode-id="830" instrument_node=""> In rats with induced cholestatic hepatitis, total bilirubin was decreased and the liver enzyme profile was improved with administration of emodin.</span><a data-dcnode-id="828" href="#fandc-np5367.b44"><span data-dcnode-id="829" instrument_node="">44</span></a><span data-dcnode-id="827" instrument_node=""> A growth-promoting effect, resulting in liver regeneration, has been demonstrated by emodin.</span><a data-dcnode-id="825" href="#fandc-np5367.b12"><span data-dcnode-id="826" instrument_node="">12</span></a></p><p data-dcnode-id="811"><span data-dcnode-id="823" instrument_node="">Other properties attributed to rhubarb include antiplatelet properties</span><a data-dcnode-id="821" href="#fandc-np5367.b45"><span data-dcnode-id="822" instrument_node="">45</span></a><span data-dcnode-id="820" instrument_node=""> antihypertensive effects</span><a data-dcnode-id="818" href="#fandc-np5367.b46"><span data-dcnode-id="819" instrument_node="">46</span></a><span data-dcnode-id="817" instrument_node=""> anti-inflammatory action</span><a data-dcnode-id="815" href="#fandc-np5367.b47"><span data-dcnode-id="816" instrument_node="">47</span></a><span data-dcnode-id="814" instrument_node=""> and glucose homeostasis.</span><a data-dcnode-id="812" href="#fandc-np5367.b48"><span data-dcnode-id="813" instrument_node="">48</span></a></p><h2 data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Dosing</span></h2><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="807" instrument_node="">Crude rhubarb extract 9 g powder was given daily to patients with sepsis.</span><a data-dcnode-id="805" href="#fandc-np5367.b20"><span data-dcnode-id="806" instrument_node="">20</span></a><span data-dcnode-id="804" instrument_node=""> Rhubarb extract 20 mg/kg daily was administered for 6 weeks to patients undergoing radiation therapy.</span><a data-dcnode-id="802" href="#fandc-np5367.b18"><span data-dcnode-id="803" instrument_node="">18</span></a><span data-dcnode-id="801" instrument_node=""> Patients with atherosclerosis were given rhubarb extract 50 mg/kg for 6 months.</span><a data-dcnode-id="799" href="#fandc-np5367.b27"><span data-dcnode-id="800" instrument_node="">27</span></a></p><p data-dcnode-id="791"><span data-dcnode-id="797" instrument_node="">In Kampo medicine (the practice and adaptation of traditional Chinese medicine in Japan), long-term (12 months) use of rhubarb extract has been administered to improve Oketsu (blood stagnation), and short-term (2 weeks) use has been administered for lazy bowel syndrome.</span><a data-dcnode-id="795" href="#fandc-np5367.b28"><span data-dcnode-id="796" instrument_node="">28</span></a><span data-dcnode-id="794" instrument_node="">, </span><a data-dcnode-id="792" href="#fandc-np5367.b49"><span data-dcnode-id="793" instrument_node="">49</span></a></p><h2 data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Pregnancy / Lactation</span></h2><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="787" instrument_node="">Avoid dosages higher than those found in food because safety and efficacy are not proven. Rhubarb extract has been evaluated in pregnancy-related hypertension at 0.75 g daily</span><a data-dcnode-id="785" href="#fandc-np5367.b50"><span data-dcnode-id="786" instrument_node="">50</span></a><span data-dcnode-id="784" instrument_node="">; however, anthraquinones may have uterine-stimulant and genotoxic effects.</span><a data-dcnode-id="782" href="#fandc-np5367.b51"><span data-dcnode-id="783" instrument_node="">51</span></a><span data-dcnode-id="781" instrument_node="">, </span><a data-dcnode-id="779" href="#fandc-np5367.b52"><span data-dcnode-id="780" instrument_node="">52</span></a></p><h2 data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Interactions</span></h2><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Information is lacking.</span></p><p data-dcnode-id="769"><span data-dcnode-id="772" instrument_node="">With long-term overuse, rhubarb may increase the toxic effects of cardiac glycosides. An effect on antiarrhythmics is possible because of the loss of potassium. Potassium deficiency can be increased by concurrent use of thiazide diuretics, corticosteroids, or licorice root. Additionally, deceased intestinal transit time may reduce the absorption of orally administered drugs.</span><a data-dcnode-id="770" href="#fandc-np5367.b53"><span data-dcnode-id="771" instrument_node="">53</span></a></p><h2 data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Adverse Reactions</span></h2><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="765" instrument_node="">Clinical trials using rhubarb extract report few adverse reactions; most relate to mild GI symptoms that resolve without treatment.</span><a data-dcnode-id="763" href="#fandc-np5367.b18"><span data-dcnode-id="764" instrument_node="">18</span></a><span data-dcnode-id="762" instrument_node="">, </span><a data-dcnode-id="760" href="#fandc-np5367.b27"><span data-dcnode-id="761" instrument_node="">27</span></a></p><p data-dcnode-id="752"><span data-dcnode-id="758" instrument_node="">Localized oxalosis was noted in a case report. A small amount of rhubarb may have adhered to the wall of the tracheobronchial tree, producing a localized area of oxalosis with accompanying necrosis.</span><a data-dcnode-id="756" href="#fandc-np5367.b54"><span data-dcnode-id="757" instrument_node="">54</span></a><span data-dcnode-id="755" instrument_node=""> Consumption of rhubarb in patients with renal stones is not advised because of the oxalate content.</span><a data-dcnode-id="753" href="#fandc-np5367.b13"><span data-dcnode-id="754" instrument_node="">13</span></a></p><h2 data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Toxicology</span></h2><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="748" instrument_node="">The leaf blades, but not the stalks, of rhubarb contain enough oxalic acid to cause poisoning.</span><a data-dcnode-id="746" href="#fandc-np5367.b2"><span data-dcnode-id="747" instrument_node="">2</span></a><span data-dcnode-id="745" instrument_node=""> Acute renal failure has been associated with long-term anthraquinone use.</span><a data-dcnode-id="743" href="#fandc-np5367.b28"><span data-dcnode-id="744" instrument_node="">28</span></a></p><p data-dcnode-id="738"><span data-dcnode-id="741" instrument_node="">Emodin was mutagenic in several Salmonella typhimurium strains, and has been demonstrated to be phototoxic in vitro.</span><a data-dcnode-id="739" href="#fandc-np5367.b12"><span data-dcnode-id="740" instrument_node="">12</span></a></p><h2 data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Index Terms</span></h2><span data-dcnode-id="735" instrument_node="">
