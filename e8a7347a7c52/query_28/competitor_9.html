</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">I have grown rhubarb for many years. Each time it is ready to harvest, (usually three times a season!), I use as much as I like for recipes, using it fresh, and then I freeze the rest.</span></p><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Since rhubarb is always plentiful at our home, I have always been a keen collector of rhubarb recipes!</span></p><p data-dcnode-id="1270"><span data-dcnode-id="1274" instrument_node="">I have a&nbsp;massive collection of&nbsp;RECIPES that&nbsp;I would love to share with you on this website. I am also including as many&nbsp;</span><b data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">pictures&nbsp;</span></b><span data-dcnode-id="1271" instrument_node="">of my finished creations as possible.</span></p><p data-dcnode-id="1265"><span data-dcnode-id="1269" instrument_node="">I&nbsp;</span><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">know</span></em><span data-dcnode-id="1266" instrument_node="">&nbsp;it is much more attractive to follow a recipe which includes a picture of the finished dish!</span></p><span data-dcnode-id="1264" instrument_node="">

</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Nothing says "spring" quite like the sweet-tart taste of the year's first rhubarb - also known as the "Pie Plant".</span></p><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Baked into breads, pies, cakes, muffins, squares or bars, or stewed to make the best sauce recipes to top ice cream, yogurt or puddings, or made into a delectable jam, this plant belongs in everyone's backyard!</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1230" instrument_node="">I believe rhubarb makes the best ever dessert crumbles, cobblers, and crisps. Rhubarb ice cream, sorbet and puddings make unique desserts that will please your family and friends! Don't forget to try the rhubarb smoothies, punch, and cocktails!</span><br data-dcnode-id="1229"></p><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Because rhubarb is technically a&nbsp;vegetable, but most often treated as a&nbsp;fruit, it is versatile enough to be used at any meal, including fish, pork, chicken and beef dinner recipes.</span></p><p data-dcnode-id="1221"><strong data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Simply use the navigation bars at the left&nbsp;(or scroll down&nbsp;for mobile users)&nbsp;</span></strong><span data-dcnode-id="1223" instrument_node="">to go to&nbsp;pages&nbsp;with hundreds of the most amazing, easy-to-make,&nbsp;rhubarb delights!</span><br data-dcnode-id="1222"></p><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Do you grow rhubarb? If you do not, you really should consider doing so.&nbsp;It&nbsp;is&nbsp;EXTREMELY EASY TO GROW!</span></p><p data-dcnode-id="1214"><span data-dcnode-id="1218" instrument_node="">There is really no work to growing "the pie plant" and it comes up year after year! I believe it is the&nbsp;</span><em data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">very easiest&nbsp;</span></em><span data-dcnode-id="1215" instrument_node="">vegetable to grow!&nbsp;In fact, you do not need to own an actual "vegetable garden" to grow your own rhubarb. You can just set a few plants along a&nbsp;fence line, or along your patio deck, or wherever. It needs very&nbsp;little care&nbsp;or attention. Whether you have a large or a very small property...&nbsp;any size lot&nbsp;will accommodate this vegetable.</span></p><p data-dcnode-id="1210"><b data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Check out the navigation bars&nbsp;at the left-hand column (or&nbsp;scroll down&nbsp;for mobile users)</span></b><span data-dcnode-id="1211" instrument_node="">&nbsp;for direction to all your various rhubarb-growing needs!</span></p><span data-dcnode-id="1209" instrument_node="">

</span><p data-dcnode-id="1147"><span data-dcnode-id="1152" instrument_node="">Rhubarb has been used for </span><span data-dcnode-id="1150" style="font-weight: normal;"><span data-dcnode-id="1151" instrument_node="">medicinal purposes</span></span><span data-dcnode-id="1149" instrument_node=""> for hundreds of years. It is one of the most commonly used herbs in Chinese Medicine. Of all the herbs cultivated for medicinal uses in early civilizations, Chinese Rhubarb remains one of the few which is still used today.</span><br data-dcnode-id="1148"></p><span data-dcnode-id="1146" instrument_node="">
