an data-dcnode-id="910" instrument_node=""> &nbsp;</span></div></div><span data-dcnode-id="907" instrument_node=""> </span></div><div data-dcnode-id="894"><div data-dcnode-id="904" style="Font-weight:bold;margin-bottom: 10px;"><span data-dcnode-id="905" instrument_node=""> Sponsored Links </span></div><div data-dcnode-id="895" style="margin-top:4px;"><span data-dcnode-id="901" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-0803530076129388" data-ad-format="link" data-ad-slot="3011105800" data-dcnode-id="900" style="display:block"></ins><span data-dcnode-id="899" instrument_node=""> </span><span data-dcnode-id="896" instrument_node=""> </span></div></div><div data-dcnode-id="890" style="font-size:14px; text-align:center; font-weight:bold;text-align:center;"><h2 data-dcnode-id="891" id="h2tag"><u data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Materia Medica : How to use Rhubarb  - Uses and Benefits</span></u></h2></div><div class="syptoms-con" data-dcnode-id="853"><h3 class="boldlabel" data-dcnode-id="888" style="margin-bottom:4px;"><span data-dcnode-id="889" instrument_node=""> Rhubarb General </span></h3><span data-dcnode-id="887" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="854"><span data-dcnode-id="886" instrument_node=""> Rhubarb is beneficial in digestive complaints involving Constipation, Diarrhea, Acid Reflux and Stomach Pain.</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">It is used to counteract Hemorrhoids.</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">Rhubarb reduces the High Cholesterol level. </span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">It resolves the various Kidney Disease.</span><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">It helps to lower the High Blood Pressure during Pregnancy.</span><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">It is useful in reducing the body weight and cures Obesity.</span><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node="">It treats Liver Diseases and Gallbladder Diseases.</span><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">It relieves pain from Swelling and Inflammation.</span><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">It is an aid for Menstrual Disorders.  It also provides relief from pain associated with Mensuration</span><br data-dcnode-id="869"><span data-dcnode-id="868" instrument_node="">It soothes the Wounds, Boils, and Burns.</span><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node="">It is used as a mouthwash for Canker Sores.</span><br data-dcnode-id="865"><span data-dcnode-id="864" instrument_node="">It is an effective herb for Urinary Problems and helps in easy passing of urine.</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">It burns the unwanted fats and treats Obesity.</span><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">It is a good remedy for Poor Appetite.</span><br data-dcnode-id="859"><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">Caution: Consult a doctor before consuming it.</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">Keywords: Constipation, Diarrhea, Acid Reflux,Stomach Pain, Hemorrhoids, High Cholesterol, High Blood Pressure, Obesity, Liver Diseases, Gallbladder Diseases, Swelling, Inflammation, Menstrual Disorders, Wounds, Boils, Burns, Canker Sores, Urinary Problems, Obesity, Poor Appetite, </span></div></div><div data-dcnode-id="818"><span data-dcnode-id="852" instrument_node=""> </span><span class="fnt15" data-dcnode-id="849" style="color: #000000;font-size: 17px;"><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Single Herb</span></strong></span><br data-dcnode-id="848"><br data-dcnode-id="847"><div class="syptoms-con" data-dcnode-id="840" style="margin-bottom:0px;"><span data-dcnode-id="846" instrument_node=""> </span><h2 data-dcnode-id="841"><span data-dcnode-id="845" instrument_node=""> Rhubarb ( Amla Vetasa ) for </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Herbal-Treatment-for-Indigestion-Cid96" title="Indigestion"><span data-dcnode-id="844" instrument_node="">Indigestion</span></a><span data-dcnode-id="842" instrument_node=""> </span></h2></div><div class="syptoms-row" data-dcnode-id="836"><span data-dcnode-id="839" instrument_node="">Soak the rootstock of Rhubarb ( Amla Vetasa ) in some cold water for 9-10 hours.</span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">Take One tablespoon just before meals. </span></div><div class="syptoms-con" data-dcnode-id="832" style="margin-bottom:0px;"><span data-dcnode-id="835" instrument_node=""> </span><h2 data-dcnode-id="833"><span data-dcnode-id="834" instrument_node=""> Rhubarb ( Amla Vetasa ) as a Laxative  </span></h2></div><div class="syptoms-row" data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Soak the rootstock in cold water for a day.  Take One tablespoon twice a day. </span></div><div class="syptoms-con" data-dcnode-id="823" style="margin-bottom:0px;"><span data-dcnode-id="829" instrument_node=""> </span><h2 data-dcnode-id="824"><span data-dcnode-id="828" instrument_node=""> Rhubarb for </span><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Herbal-Treatment-for-high-creatinine-Cid4936" title="high creatinine"><span data-dcnode-id="827" instrument_node="">high creatinine</span></a><span data-dcnode-id="825" instrument_node=""> </span></h2></div><div class="syptoms-row" data-dcnode-id="819"><span data-dcnode-id="822" instrument_node="">Rhubarb is detoxicant in nature.  It eliminates the metabolic waste out of the Body.</span><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">Take 2 small stalks of Rhubarb and boil them in water.  Strain and drink this tea twice in a day. </span></div></div><div class="cl" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node=""> &nbsp;</span></div><div data-dcnode-id="814" style="Font-weight:bold; text-align:left;"><span data-dcnode-id="815" instrument_node=""> Sponsored Links </span></div><div data-dcnode-id="806" style="margin-top:4px;"><span data-dcnode-id="811" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-0803530076129388" data-ad-format="auto" data-ad-slot="9057639408" data-dcnode-id="810" style="display:block"></ins><span data-dcnode-id="809" instrument_node=""> </span></div><div class="cl" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node=""> &nbsp;</span></div><div data-dcnode-id="678"><span class="fnt15" data-dcnode-id="801" style="color: #000000;font-size: 17px;"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Multiple Herbs</span></strong></span><span class="showdata" data-dcnode-id="794" style="float:right;font-size:12px;cursor:pointer; width:280px;text-align:right;position:relative;color:#024370; "><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">  How to Use Herbal Treatment? </span></strong><span data-dcnode-id="798" instrument_node=""> </span><span class="showhr" data-dcnode-id="796" style="font-size:12px;color:red;text-decoration: underline;font-weight:bolder;"><span data-dcnode-id="797" instrument_node=""> Click Here + </span></span><span data-dcnode-id="795" instrument_node=""> </span></span><span data-dcnode-id="793" instrument_node=""> </span><span class="showhide" data-dcnode-id="791" id="Div_Alert" style="width: 100%; position: relative;  text-align: left; display: none;float:left; background: #e2f1b4; padding:5px; margin:2px 0 2px 0;border-radius:5px; "><span data-dcnode-id="792" instrument_node=""> </span></span><br data-dcnode-id="790"><br data-dcnode-id="789"><div class="syptoms-con" data-dcnode-id="786" style="margin-bottom:0px;"><h2 data-dcnode-id="787"><span data-dcnode-id="788" instrument_node=""> Herbal Treatment For Detox Tea for Cancer </span></h2></div><span data-dcnode-id="785" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="738"><span data-dcnode-id="784" instrument_node=""> </span><u data-dcnode-id="781"><b data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Basic</span></b></u><br data-dcnode-id="780"><span data-dcnode-id="779" instrument_node="">Mix the following dry, powdered herbs and store in a jar:- </span><br data-dcnode-id="778"><span data-dcnode-id="777" instrument_node="">Burdock Root : 6 parts</span><br data-dcnode-id="776"><span data-dcnode-id="775" instrument_node="">Sheep Sorrel : 4 parts</span><br data-dcnode-id="774"><span data-dcnode-id="773" instrument_node="">Slippery Elm Bark : 1 part</span><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">Rhubarb Root : 1 teaspoon.</span><br data-dcnode-id="770"><span data-dcnode-id="769" instrument_node="">Prepare a decoction.  Take one teaspoon at a time.  Boil in two cups water till water remains half.  Leave on hot plate overnight.  Strain through a coarse strainer.  Consume cold either early morning or late at night.</span><br data-dcnode-id="768"><span data-dcnode-id="767" instrument_node="">The tea will help in :- </span><br data-dcnode-id="766"><span data-dcnode-id="765" instrument_node="">Cancer</span><br data-dcnode-id="764"><span data-dcnode-id="763" instrument_node="">Diabetes</span><br data-dcnode-id="762"><span data-dcnode-id="761" instrument_node="">Better health</span><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">Better elimination</span><br data-dcnode-id="758"><span data-dcnode-id="757" instrument_node="">Increased appetite</span><br data-dcnode-id="756"><span data-dcnode-id="755" instrument_node="">Improved immunity</span><br data-dcnode-id="754"><u data-dcnode-id="751"><b data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Advanced</span></b></u><br data-dcnode-id="750"><span data-dcnode-id="749" instrument_node="">Add the following herbs to the above Mixture</span><br data-dcnode-id="748"><span data-dcnode-id="747" instrument_node="">Kelp : 2 parts</span><br data-dcnode-id="746"><span data-dcnode-id="745" instrument_node="">Red Clover : 1 part</span><br data-dcnode-id="744"><span data-dcnode-id="743" instrument_node="">Blessed Thistle : 1 part</span><br data-dcnode-id="742"><span data-dcnode-id="741" instrument_node="">Watercress : 0.4 parts </span><br data-dcnode-id="740"><span data-dcnode-id="739" instrument_node="">The method remains the same. </span></div><div class="syptoms-con" data-dcnode-id="735" style="margin-bottom:0px;"><h2 data-dcnode-id="736"><span data-dcnode-id="737" instrument_node=""> Herbal Treatment For Constipation 7 </span></h2></div><span data-dcnode-id="734" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node=""> Prepare a decoction of Sodium Sulphate and Rhubarb. Use it twice a day. </span></div><div class="syptoms-con" data-dcnode-id="729" style="margin-bottom:0px;"><h2 data-dcnode-id="730"><span data-dcnode-id="731" instrument_node=""> Herbal Treatment For Water Retention 2 </span></h2></div><span data-dcnode-id="728" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="721"><span data-dcnode-id="727" instrument_node=""> Make powder of roasted Euphorbia, Rhubarb root and Sodium Sulphate. Take twice a day.</span><br data-dcnode-id="726"><b data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Caution :</span></b><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">Excess use may cause toxicity. </span></div><div class="syptoms-con" data-dcnode-id="718" style="margin-bottom:0px;"><h2 data-dcnode-id="719"><span data-dcnode-id="720" instrument_node=""> Herbal Treatment For Cough 10 </span></h2></div><span data-dcnode-id="717" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node=""> Ground Areca Nut seed, Ipomoea Nil seed and Rhubarb root in to a powder. Make an infusion. Take it twice a day. </span></div><div class="syptoms-con" data-dcnode-id="712" style="margin-bottom:0px;"><h2 data-dcnode-id="713"><span data-dcnode-id="714" instrument_node=""> Herbal Treatment For Dysuria 1 </span></h2></div><span data-dcnode-id="711" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node=""> Prepare a decoction of Stephania Tetrandra root, Rhubarb root and Descurainia Seed. Take it twice a day. </span></div><div class="syptoms-con" data-dcnode-id="706" style="margin-bottom:0px;"><h2 data-dcnode-id="707"><span data-dcnode-id="708" instrument_node=""> Herbal Treatment For Jaundice 4 </span></h2></div><span data-dcnode-id="705" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node=""> Make a decoction of Rhubarb root, Water Plantain leaves, Gardenia fruit and Knotgrass leaves. Take it twice a day. </span></div><div class="syptoms-con" data-dcnode-id="700" style="margin-bottom:0px;"><h2 data-dcnode-id="701"><span data-dcnode-id="702" instrument_node=""> Herbal Treatment For Constipation 12 </span></h2></div><span data-dcnode-id="699" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node=""> Take equal quantity of Bitter Orange,  Magnolia and  Rhubarb.  Powder them together.  Have half teaspoon with lukewarm water once a day. </span></div><div class="syptoms-con" data-dcnode-id="694" style="margin-bottom:0px;"><h2 data-dcnode-id="695"><span data-dcnode-id="696" instrument_node=""> Herbal Treatment For Constipation 21 </span></h2></div><span data-dcnode-id="693" instrument_no
