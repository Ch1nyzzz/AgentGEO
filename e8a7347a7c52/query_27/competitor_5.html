</span><p data-dcnode-id="1608"></p><div class="dpsp-pin-it-wrapper alignnone size-full wp-image-59601" data-dcnode-id="1609"><img alt="rhubarb crisp recipe best homemade crumble traditional oats brown sugar nuts almond flour crunchy vanilla" class="" data-dcnode-id="1615" data-pin-description="Perfect Rhubarb Crisp" data-pin-title="Perfect Rhubarb Crisp" data-pin-url="https://www.daringgourmet.com/rhubarb-crisp/" height="1200" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square.jpg&amp;raw" srcset="https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square.jpg 1200w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square-600x600.jpg 600w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square-300x300.jpg 300w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square-728x728.jpg 728w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square-150x150.jpg 150w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square-768x768.jpg 768w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square-350x350.jpg 350w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square-610x610.jpg 610w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-13-square-500x500.jpg 500w" style="" width="1200"><span class="dpsp-pin-it-overlay" data-dcnode-id="1614"></span><a aria-label="" class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.daringgourmet.com%252Fwp-content%252Fuploads%252F2020%252F04%252FRhubarb-Crisp-13- </span><h2 data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Homemade Rhubarb Crisp</span></h2><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1604" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">I’ve always been a big fan of “crisps”.&nbsp; Whether apple, berry, peach or pear, if there’s a crisp served with ice cream I’m in!&nbsp; But I especially love rhubarb crisp, the Queen of all Crisps.&nbsp; Growing up my mom made it regularly for us when rhubarb was in season in Germany.&nbsp; The aroma from the kitchen was unmistakable and we eagerly sat down, spoon in hand and ready to dive in.&nbsp; This homemade rhubarb crisp recipe is reminiscent of how my mom always made it and I’ve added a few touches of my own that bump it up a few additional notches for the absolutely perfect rhubarb crisp!</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">The topping has always been my favorite aspect of any crisp and so I always insist that there’s plenty of it.&nbsp; None of this business of skimping on the crumble topping!&nbsp; This crunchy brown sugar-and-oat-based topping is perfectly crunchy and also includes the addition of some ground almonds for added texture and flavor.</span></p><div class="adthrive" data-dcnode-id="1596" id="cls-video-container-10Hg67dZ" style="min-height: 362.25px;"><div data-dcnode-id="1597"></div></div><span data-dcnode-id="1595" instrument_node="">

</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Rhubarb is an interesting specimen.&nbsp; Though it’s used as a fruit in sweet applications, it’s technically a vegetable.&nbsp; It’s funny to think of it as a vegetable considering it’s rarely used in savory dishes, but it actually pairs really well in many meat dishes, especially pork and chicken.&nbsp; For centuries rhubarb wasn’t even cooked with at all but was strictly used as medicine.&nbsp; Somewhere along the line people discovered that though the leaves are poisonous the stalks are marvelous and started cooking and baking with it.&nbsp; And high praises to whoever discovered the first rhubarb crisp, one of my favorite Springtime desserts!</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1583" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">My family clamors for this every time I make it and if you appreciate rhubarb as much as we do I’m confident it will likewise become a hit in your home!</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><img alt="" class="alignnone size-full wp-image-59589" data-dcnode-id="1578" data-pin-description="Perfect Rhubarb Crisp" data-pin-title="Perfect Rhubarb Crisp" data-pin-url="https://www.daringgourmet.com/rhubarb-crisp/" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-4-edited.jpg&amp;raw" srcset="https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-4-edited.jpg 1200w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-4-edited-300x200.jpg 300w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-4-edited-728x485.jpg 728w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-4-edited-768x512.jpg 768w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-4-edited-610x407.jpg 610w" width="1200"></p><span data-dcnode-id="1576" instrument_node="">
</span><h2 data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Crisp vs. Crumble vs. Cobbler&nbsp; – What’s the Difference?</span></h2><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">A common point of confusion is calling something a “crisp” when it should be a “crumble” or a “cobbler” and vice versa.&nbsp; So what is the difference?</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1569" instrument_node="">A </span><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">crisp</span></strong><span data-dcnode-id="1566" instrument_node=""> is a baked fruit dessert with crumbly streusel-like topping that features oats, flour, butter and sugar and sometimes includes nuts.&nbsp; A </span><strong data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">crumble</span></strong><span data-dcnode-id="1563" instrument_node=""> is similar except that the crumbly topping does not include oats and rarely includes nuts, and is generally made strictly with flour, butter and sugar. A </span><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">cobbler</span></strong><span data-dcnode-id="1560" instrument_node=""> is also a baked fruit dessert but is a deep-dish version (as opposed to the shallower crisp and crumble) and rather than a crumbly, streusel-like topping it is a drop-biscuit or pie dough topping.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><h2 data-dcnode-id="1555"><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Rhubarb Crisp Recipe</span></strong></h2><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Let’s get started!</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Preheat to 350 F.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1548" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1547" instrument_node="">

</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">In a large bowl add the flour, oats, brown sugar, butter, cinnamon and salt and work it until combined and crumbly (use your hands, a fork or a pastry cutter).</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><img alt="" class="alignnone size-full wp-image-59570" data-dcnode-id="1536" data-pin-nopin="true" height="1024" loading="lazy" sizes="(max-width: 2048px) 100vw, 2048px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-2-scaled.jpg&amp;raw" srcset="https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-2-scaled.jpg 2048w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-2-300x150.jpg 300w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-2-728x364.jpg 728w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-2-768x384.jpg 768w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-2-1536x768.jpg 1536w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-2-610x305.jpg 610w" width="2048"></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1534" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Spread the rhubarb mixture out in a buttered 13×9 inch baking dish.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Sprinkle the topping evenly over the rhubarb.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><img alt="" class="alignnone size-full wp-image-59571" data-dcnode-id="1526" data-pin-nopin="true" height="1024" loading="lazy" sizes="(max-width: 2048px) 100vw, 2048px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-3-scaled.jpg&amp;raw" srcset="https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-3-scaled.jpg 2048w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-3-300x150.jpg 300w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-3-728x364.jpg 728w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-3-768x384.jpg 768w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-3-1536x768.jpg 1536w, https://www.daringgourmet.com/wp-content/uploads/2020/04/Rhubarb-Crisp-Collage-3-610x305.jpg 610w" width="2048"></p><span data-dcnode-id="1524" instrument_node="">

</span><div class="wprm-recipe-instructions-container wprm-recipe-59604-instructions-container wprm-block-text-normal" data-dcnode-id="1091" data-recipe="59604"><h3 class="wprm-recipe-header wprm-recipe-instructions-header wprm-block-text-uppercase wprm-align-left wprm-header-decoration-line wprm-header-has-actions" data-dcnode-id="1111" style=""><span data-dcnode-id="1114" instrument_node="">Instructions</span><div class="wprm-decoration-line" data-dcnode-id="1113" style="border-color: #e0e0e0"></div><span data-dcnode-id="1112" instrument_node="">&nbsp;</span></h3><div class="wprm-recipe-instruction-group" data-dcnode-id="1092"><ul class="wprm-recipe-instructions" data-dcnode-id="1093"><li class="wprm-recipe-instruction" data-dcnode-id="1104" id="wprm-recipe-59604-step-0-0" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1105" style="margin-bottom: 5px"><span data-dcnode-id="1109" style="display: block;"><span data-dcnode-id="1110" instrument_node="">Preheat to 350 F.&nbsp; &nbsp;</span></span><div class="wprm-spacer" data-dcnode-id="1108"></div><span data-dcnode-id="1106" style="display: block;"><span data-dcnode-id="1107" instrument_node="">Stir the rhubarb, sugar, flour and vanilla extract together in a bowl to evenly coat and then spread the mixture out in a buttered 13x9 inch baking dish.&nbsp; </span></span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1094" id="wprm-recipe-59604-step-0-1" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1095" style="margin-bottom: 5px"><span data-dcnode-id="1102" style="display: block;"><span data-dcnode-id="1103" instrument_node="">In a large bowl add the flour, oats, brown sugar, butter, cinnamon and salt and work it until combined and crumbly (use your hands, a fork or a pastry cutter).&nbsp; Sprinkle evenly over the rhubarb.</span></span><div class="wprm-spacer" data-dcnode-id="1101"></div><span data-dcnode-id="1099" style="display: block;"><span data-dcnode-id="1100" instrument_node="">Bake on middle rack for about 40 minutes or until the topping is browned and the rhubarb is bubbling.&nbsp; Let cool about 10 minutes before serving to allow the rhubarb filling to soak up excess juices.&nbsp; </span></span><div class="wprm-spacer" data-dcnode-id="1098"></div><span data-dcnode-id="1096" style="display: block;"><span data-dcnode-id="1097" instrument_node="">Serve warm with a scoop of vanilla ice cream.</span></span></div></li></ul></div></div><span data-dcnode-id="1090" instrument_node="">
