index=cw22&amp;url=https%3A//foodiosity.com/about-authors/"><span class="text-wrap" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">About US</span></span></a></li><li class="search-toggle-li" data-dcnode-id="474"><a aria-label="Search website" class="site-search-toggle search-dropdown-toggle" data-dcnode-id="475" href="javascript:void(0)"><i aria-hidden="true" class="icon-magnifier" data-dcnode-id="476" role="img"></i></a></li></ul><div class="header-searchform-wrap clr" data-dcnode-id="463" id="searchform-dropdown"><form action="https://foodiosity.com/" class="searchform" data-dcnode-id="464" method="get" role="search"><span data-dcnode-id="472" instrument_node=""> </span><label data-dcnode-id="465" for="ocean-search-form-1"><span data-dcnode-id="471" instrument_node=""> </span><span class="screen-reader-text" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Search this website</span></span><span data-dcnode-id="468" instrument_node=""> </span><input autocomplete="off" class="field" data-dcnode-id="467" id="ocean-search-form-1" name="s" placeholder="Search" type="search"><span data-dcnode-id="466" instrument_node=""> </span></label></form></div></nav></div></div><div class="oceanwp-mobile-menu-icon clr mobile-right" data-dcnode-id="448"><span data-dcnode-id="459" instrument_node=""> </span><a aria-label="Mobile Menu" class="mobile-menu" data-dcnode-id="449" data-sidr="sidr" href="#"><span data-dcnode-id="458" instrument_node=""> </span><i aria-hidden="true" class="fa fa-bars" data-dcnode-id="457"></i><span data-dcnode-id="456" instrument_node=""> </span><span class="oceanwp-text" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Menu</span></span><span data-dcnode-id="453" instrument_node=""> </span><span class="oceanwp-close-text" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Close</span></span><span data-dcnode-id="450" instrument_node=""> </span></a></div></div></div></header><main class="site-main clr" data-dcnode-id="142" id="main" role="main"><div class="container clr" data-dcnode-id="143" id="content-wrap"><div class="content-area clr" data-dcnode-id="172" id="primary"><div class="site-content clr" data-dcnode-id="173" id="content"><article data-dcnode-id="174" id="post-1582"><header class="entry-header clr" data-dcnode-id="442"><h2 class="single-post-title entry-title" data-dcnode-id="443" itemprop="headline"><span data-dcnode-id="444" instrument_node="">Swiss Chard VS Rhubarb – Differences &amp; How To Tell Them Apart</span></h2></header><div class="entry-content clr" data-dcnode-id="289" itemprop="text"><p data-dcnode-id="439"><span data-dcnode-id="440" data-preserver-spaces="true"><span data-dcnode-id="441" instrument_node="">You are in the vicinity of the produce market stalls and you come across the leafy red stalks of vegetables of Swiss chard and rhubarb. You seldom or never used these in your kitchen adventures. Swiss chard vs rhubarb? It’s not a boxing match, but how do you use any of these ?</span></span></p><p data-dcnode-id="436"><span data-dcnode-id="437" data-preserver-spaces="true"><span data-dcnode-id="438" instrument_node="">They are both leafy vegetables, with Swiss chard being used more as a vegetable. It is related to the beet family and it can be used raw in salads, stir fries, omelets and soups. The raw leaves are palatable as tortilla wraps.</span></span></p><p data-dcnode-id="434"><img alt="swiss chard rhubarb" class="aligncenter size-full wp-image-1620" data-dcnode-id="435" height="400" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodiosity.com/wp-content/uploads/2020/11/swiss-chard-rhubarb.jpg&amp;raw" srcset="https://foodiosity.com/wp-content/uploads/2020/11/swiss-chard-rhubarb.jpg 800w, https://foodiosity.com/wp-content/uploads/2020/11/swiss-chard-rhubarb-300x150.jpg 300w, https://foodiosity.com/wp-content/uploads/2020/11/swiss-chard-rhubarb-768x384.jpg 768w" width="800"></p><h2 data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Swiss chard vs rhubarb</span></h2><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">The main differences between Swiss chard and rhubarb is the way both are used, and how they are classed. Rhubarb is a fruit, and is used in sweets and desserts. Its leaves are poisonous, so only the stalks are edible.</span></p><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Swiss chard is a vegetable, closely related to beets. Both the stalks and the leaves are edible, and they’re usually found in savory dishes.</span></p><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">That being said, rhubarb and Swiss chard look very similar. So much, you might think they’re the same. A great tip to differentiate them is to look at the leaves.</span></p><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Swiss chard leaves are shinier, a bit more ruffled-looking, and not as wide as rhubarb. They have more of an oval shape and the color of the stalk goes all the way into the veins of the leaves (red or white).</span></p><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Rhubarb leaves are wider towards the base, kind of like a triangle. Their veins are almost always white, despite the stalk being red.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Now here’s how to pick which to use, according to what kind of dish you’re making and how much of the plant you can use.</span></p><h3 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Swiss chard for the leaves and stalks</span></h3><p data-dcnode-id="415"><span data-dcnode-id="416" data-preserver-spaces="true"><span data-dcnode-id="417" instrument_node="">Swiss chard is usually compared to spinach because of its green and earthy flavor. Both leaves and stalks of the Swiss chard are edible and are typically boiled or sautéed. Its bitterness is diminished when it is cooked.</span></span></p><h3 data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Rhubarb for the stalks alone</span></h3><p data-dcnode-id="410"><span data-dcnode-id="411" data-preserver-spaces="true"><span data-dcnode-id="412" instrument_node="">Rhubarb, on the other hand, is a fruit and you may only use the stalks. Its leaves are never used, because they contain significant amounts of oxalic acid, which could prove fatal.</span></span></p><p data-dcnode-id="407"><span data-dcnode-id="408" data-preserver-spaces="true"><span data-dcnode-id="409" instrument_node="">We say that rhubarb is used as a fruity component because of its tartness and acidity. It’s perfect when combined with a sweet fruit such as strawberry, in a pie.</span></span></p><p data-dcnode-id="404"><span data-dcnode-id="405" data-preserver-spaces="true"><span data-dcnode-id="406" instrument_node="">Thus, we learn that Swiss chard is valued for its leaves and stalks while rhubarbs are sought for their stalks. Swiss chard is used as an important component for the main courses of a meal, while rhubarb is a valued ingredient for desserts.</span></span></p><p data-dcnode-id="398"><em data-dcnode-id="399"><strong data-dcnode-id="400"><span data-dcnode-id="403" instrument_node="">Read also:&nbsp;</span><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodiosity.com/how-to-sweeten-rhubarb-without-sugar/"><span data-dcnode-id="402" instrument_node="">How To Sweeten Rhubarb Without Sugar&nbsp;</span></a></strong></em></p><h3 data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Chards are biennials, rhubarbs are perennials</span></h3><p data-dcnode-id="393"><span data-dcnode-id="394" data-preserver-spaces="true"><span data-dcnode-id="395" instrument_node="">Swiss chard is a biennial plant while rhubarb is a perennial plant. This means that Swiss chard has a 2 year cycle while rhubarb has a 3 year cycle before they die.</span></span></p><p data-dcnode-id="390"><span data-dcnode-id="391" data-preserver-spaces="true"><span data-dcnode-id="392" instrument_node="">In its 2 year cycle, Swiss chard is sown between June and October in the Northern Hemisphere. Chard is harvested when the leaves are young and tender or after maturity, when they have become larger and have tougher stems. Most chards produce 2 to 3 crops a year.</span></span></p><p data-dcnode-id="387"><span data-dcnode-id="388" data-preserver-spaces="true"><span data-dcnode-id="389" instrument_node="">Rhubarb, in its 3 year cycle, is grown widely, and with greenhouse production, is available throughout the year. One type of rhubarb is grown in hothouses or heated greenhouses and is called hothouse rhubarb. It is available in consumer markets during early spring, before the outdoor grown rhubarb is available. </span></span></p><p data-dcnode-id="384"><span data-dcnode-id="385" data-preserver-spaces="true"><span data-dcnode-id="386" instrument_node="">Hothouse rhubarb is brighter red, more tender and sweeter tasting than outdoor rhubarb. They are harvested in temperate climates in April or May (which is mid to late spring in the Northern Hemisphere) and October to November in the Southern Hemisphere.</span></span></p><h2 data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Mistaken identity</span></h2><p data-dcnode-id="379"><span data-dcnode-id="380" data-preserver-spaces="true"><span data-dcnode-id="381" instrument_node="">Why do we compare Swiss chard with rhubarb? Because there are different varieties of Swiss chard that are mistaken as rhubarb. Their red stalks and leaves are similar.</span></span></p><p data-dcnode-id="376"><span data-dcnode-id="377" data-preserver-spaces="true"><span data-dcnode-id="378" instrument_node="">The two Swiss chard varieties mistaken as rhubarb are the rainbow and the ruby red. Rainbow Swiss chard is at times red and ruby red Swiss chard is consistently red. Their redness makes people think they are rhubarbs. As a matter of fact, ruby red Swiss chard is also called as rhubarb Swiss chard.</span></span></p><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">This proves can be a problem from two perspectives. First, you buy ruby chard, expecting it to be rhubarb. You put it in a sweet pie and it comes out… not sweet, nor tart. Just confusing.</span></p><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Second, and this is worse, you buy rhubarb because you thought it’s ruby or rainbow chard. You know chard leaves are edible, and you unknowingly poison the entire dish with rhubarb leaves.</span></p><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">So be very, very careful what you pick up from the grocery store. Heck, if you’re not sure it’s best to only use the stalks, it’s safer that way.</span></p><p data-dcnode-id="367"><span data-dcnode-id="368" data-preserver-spaces="true"><span data-dcnode-id="369" instrument_node="">Let’s discuss how to eat Swiss Chards and Rhubarbs. Swiss chard have been eaten for centuries while rhubarb is a fairly recent discovery as an edible food source.</span></span></p><h2 data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Swiss chard recipes</span></h2><p data-dcnode-id="359"><span data-dcnode-id="360" data-preserver-spaces="true"><span data-dcnode-id="364" instrument_node="">Swiss chard have highly edible leaves. It has been used in cuisines for centuries because it shares similarities with beets, spinach and cardoons. Throughout the centuries, Swiss chard has been called many names such as </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodiosity.com/spinach-vs-silverbeet/"><span data-dcnode-id="363" instrument_node="">silverbeet</span></a><span data-dcnode-id="361" instrument_node="">, beet spinach or leaf beet.</span></span></p><p data-dcnode-id="356"><span data-dcnode-id="357" data-preserver-spaces="true"><span data-dcnode-id="358" instrument_node="">Swiss chard doesn’t get as much attention as the kale, spinach, and beet, but several Swiss chard recipes prove that it is just as versatile.</span></span></p><ul data-dcnode-id="343"><li data-dcnode-id="353"><span data-dcnode-id="354" data-preserver-spaces="true"><span data-dcnode-id="355" instrument_node="">Green Curry with Brown Rice Noodles and Swiss Chard. Don’t skimp on the Swiss chard because it will serve as a good contrast to the curry.</span></span></li><li data-dcnode-id="350"><span data-dcnode-id="351" data-preserver-spaces="true"><span data-dcnode-id="352" instrument_node="">Almond Crusted Trout with White Grits and Swiss Chard. Dredge the crispy trout skin in ground almonds, with the Swiss Chard making a delightful side dish.</span></span></li><li data-dcnode-id="347"><span data-dcnode-id="348" data-preserver-spaces="true"><span data-dcnode-id="349" instrument_node="">Wilted Chard with Shallots and Vinegar. Didn’t we say that you shouldn’t throw away those valuable Chard stalks? They shouldn’t be trashed because they add texture and a layer of flavor to this sautee.</span></span></li><li data-dcnode-id="344"><span data-dcnode-id="345" data-preserver-spaces="true"><span data-dcnode-id="346" instrument_node="">Lentils and Chickpeas with Swiss Chard Greens. This is a powerful lunch for both grown ups and kids alike</span></span></li></ul><p data-dcnode-id="337"><strong data-dcnode-id="338"><em data-dcnode-id="339"><span data-dcnode-id="342" instrument_node="">Read Also:</span><a aria-label="“How To Buy Rhubarb – Tips On Buying &amp; Storing Rhubarb” (Edit)" class="row-title" data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodiosity.com/how-to-buy-rhubarb/"><span data-dcnode-id="341" instrument_node="">How To Buy Rhubarb</span></a></em></strong></p><h2 data-dcnode-id="334"><span data-dcnode-id="335" data-preserver-spaces="true"><span data-dcnode-id="336" instrument_node="">Rhubarb sweets</span></span></h2><p data-dcnode-id="331"><span data-dcnode-id="332" data-preserver-spaces="true"><span data-dcnode-id="333" instrument_node="">The rhubarb is grown primarily because of its fleshy leafstalks, known scientifically as petioles. The rhubarb’s use as food is a fairly recent innovation. Its first usage is recorded in 18th or 19th century England when affordable sugar became widely available.&nbsp;</span></span></p><p data-dcnode-id="328"><span data-dcnode-id="329" data-preserver-spaces="true"><span data-dcnode-id="330" instrument_node="">Rhubarb is commonly stewed with sugar or in pies and desserts. You can also find it pickled, or in very savory dishes, or dehydrated and infused with fruit juice. In America, it is mixed with strawberry juice to imitate the famous strawberry rhubarb pie.</span></span></p><p data-dcnode-id="325"><span data-dcnode-id="326" data-preserver-spaces="true"><span data-dcnode-id="327" instrument_node="">Celebrate any occasion or meal with the stalks of this bright rhubarb vegetable that will sweeten up your cakes, crumbles and after meal blues.</span></span></p><ul data-dcnode-id="307"><li data-dcnode-id="322"><span data-dcnode-id="323" data-preserver-spaces="true"><span data-dcnode-id="324" instrument_node="">Rhubarb and Gingernut Cheesecake. This vivid pink no bake cheesecake makes your table cheerful. Rhubarb and ginger are perfect bedmates and they complete a luscious dessert.</span></span></li><li data-dcnode-id="319"><span data-dcnode-id="320" data-preserver-spaces="true"><span data-dcnode-id="321" instrument_node="">Rhubarb and Ricotta Bread and Butter Pudding. This indulgent bread and butter pudding is full of the hard to find at times rhubarb and the rich ricotta. The sweet tooth of your preferred crowd will be entertained and satisfied.</span></span></li><li data-dcnode-id="314"><span data-dcnode-id="315" data-preserver-spaces="true"><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodiosity.com/what-goes-with-rhubarb/"><span data-dcnode-id="318" instrument_node="">Rhubarb and Custard French Toast</span></a><span data-dcnode-id="316" instrument_node="">. A deliciously indulgent breakfast or brunch when you top your French toast with the zesty and tangy flavors of rhubarb.</span></span></li><li data-dcnode-id="308"><span data-dcnode-id="309" data-preserver-spaces="true"><span data-dcnode-id="313" instrument_node="">Rhubarb, </span><a data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodiosity.com/marzipan-vs-fondant/"><span data-dcnode-id="312" instrument_node="">Marzipan</span></a><span data-dcnode-id="310" instrument_node=""> and Citrus Cake. The rhubarb sponge with orange and lemon zestiness can be served warm with a dollop of creme fraiche. Perfect as an afternoon tea complement.</span></span></li></ul><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Swiss chard vs rhubarb – we can’t really say who won. As a matter of fact, they complement each other. Don’t let anyone of them step on the stems of their God-given talents. The Swiss chard best best for main courses, while the rhubarb is great for sweets and desserts.</span></p><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">If you’ve got any other food curiosities be sure to check the related articles below, we’re always adding more food facts to make your life that much easier.</span></p><div class="saboxplugin-wrap" data-dcnode-id="290" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><div class="saboxplugin-tab" data-dcnode-id="291"><div class="saboxplugin-gravatar" data-dcnode-id="301"><img alt="Ciuraru Alexandra Ioana" data-dcnode-id="302" height="100" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodiosity.com/wp-con
