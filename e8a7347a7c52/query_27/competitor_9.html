</span><div class="body-first-letter bgrandom-8" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">R</span></div><span data-dcnode-id="1622" instrument_node="">
</span><div class="field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="1542"><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Reared in pitch black and harvested by candlelight, the growing of forced rhubarb is an astonishing sight. This zingy, candy-pink crop seemingly defies nature by thriving in the dark. Listen closely and you might faintly hear the rhubarb creak as its leafy canopy stretches up towards the roof in the dank, warm cocoon of the forcing shed.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Yorkshire forced rhubarb was given Protected Designation of Origin (PDO) status by the European Commission in 2010. To go by this name, it must be grown in a nine-square-mile area known as the ‘Rhubarb Triangle’, which lies between Bradford, Leeds and Wakefield in West Yorkshire, England. Like white asparagus, it is a winter crop that was traditionally engineered to fill a seasonal gap. It was brought to Yorkshire in 1877 and is now grown by just 12 producers.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1615" instrument_node="">Today, forced rhubarb is considered the king of rhubarb by those in the know. Top chefs covet this curious crop for its superior taste, which is not as sharp as summer rhubarb, and its tenderness. Forced rhubarb is also highly desirable because of its bright pink or red skin (the colour depends on the variety), which absorbs into the blanched white flesh during cooking and looks strikingly pretty on the restaurant plate –&nbsp;completely </span><em data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">au naturale</span></em><span data-dcnode-id="1612" instrument_node="">.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><div alt="Forced Rhubarb" class="embedded-entity" data-dcnode-id="1607" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="4b32aa1d-e9e4-4a17-98ec-b5a3914264ad" data-langcode="en" title="Forced Rhubarb"><span data-dcnode-id="1609" instrument_node=""> </span><img alt="Forced Rhubarb" class="img-responsive" data-dcnode-id="1608" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finedininglovers.com/sites/g/files/xknfdk626/files/2021-03/forced_rhubarb_0.jpg&amp;raw" title="Forced Rhubarb" typeof="foaf:Image"></div><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">&nbsp;It sells for around double what you’d pay for regular summer rhubarb, with a growing season running from late January to the end of March. Full of health benefits, it’s packed with potassium, calcium and polyphenols. And even though forced rhubarb grows without any natural light, research has shown that its nutritional content is the same as that of outdoor rhubarb.&nbsp;</span></p><span data-dcnode-id="1603" instrument_node="">
</span><h3 data-dcnode-id="1599"><strong data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">What’s so Special About Yorkshire?</span></strong><span data-dcnode-id="1600" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Yorkshire rhubarb growers claim the Rhubarb Triangle produces the best roots in the world because of the area’s soils and micro-climate. The triangle sits at the foot of the Pennines in a frost pocket that draws plenty of moisture from the waters that cascade down the hills and historically powered the area’s mills.&nbsp;</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Farmers here still enrich their rhubarb soils with shoddy – a wool waste that comes from the sheep who graze in the Pennines, once used in those 19th-century textile mills.&nbsp;</span></p><span data-dcnode-id="1592" instrument_node="">
</span><div alt="Rhubarb Triangle" class="embedded-entity" data-dcnode-id="1589" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="cefd4921-6626-4053-ab6b-a8b377b2dd80" data-langcode="en" title="Rhubarb Triangle"><span data-dcnode-id="1591" instrument_node=""> </span><img alt="Rhubarb Triangle" class="img-responsive" data-dcnode-id="1590" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finedininglovers.com/sites/g/files/xknfdk626/files/2021-03/Yorkshire_Forced_Rhubarb_triangle.jpg&amp;raw" title="Rhubarb Triangle" typeof="foaf:Image"></div><span data-dcnode-id="1588" instrument_node="">
</span><h3 data-dcnode-id="1585"><strong data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">A Eureka Moment in Farming&nbsp;</span></strong></h3><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Considering the exacting conditions that are employed to propagate and grow forced rhubarb, it may come as a surprise that its origins were accidental. And despite the fact that it’s synonymous with Yorkshire, the region’s foremost rhubarb farmer claims forced rhubarb was actually discovered in London.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node="">“There’s all different stories about this but the actual true story is it was in Chelsea Physic Garden, where all the ancient herbs and plants are kept,” says </span><strong data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Janet Oldroyd-Hulme</span></strong><span data-dcnode-id="1577" instrument_node="">, whose family has been farming rhubarb in Yorkshire’s Rhubarb Triangle for five generations.&nbsp;</span></p><span data-dcnode-id="1575" instrument_node="">
</span><div alt="Forced Rhubarb" class="embedded-entity" data-dcnode-id="1572" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="65c7559a-8f58-4fd1-9687-f6c789b6d807" data-langcode="en" title="Forced Rhubarb"><span data-dcnode-id="1574" instrument_node=""> </span><img alt="Forced Rhubarb" class="img-responsive" data-dcnode-id="1573" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finedininglovers.com/sites/g/files/xknfdk626/files/2021-03/Forced%2520rhubarb_Janet%2520Oldroyd-Hulme.jpg&amp;raw" title="Forced Rhubarb" typeof="foaf:Image"></div><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">According to Janet, the discovery was made in 1817 when gardeners were replanting rhubarb roots that had been buried under land drains installed that winter. To their surprise, they noticed delicate pink sticks sprouting from the plants and recognised the potential significance. “Thank goodness it was Chelsea where the horticulturists were, so they didn’t just put their foot on those sticks but were intrigued,” she says.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1567" instrument_node="">The discovery of such a nutritional crop that could grow in the cold was a gift in the early 19th century, at a time when there was no refrigeration and seasonal fruit and vegetables were stored through winter. The longer these crops were stored, the more nutrients they lost. Here, they had a product that was growing in winter and was packed full of nutrients – </span><em data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">eureka!</span></em><span data-dcnode-id="1564" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1562" instrument_node="">
</span><h3 data-dcnode-id="1559"><strong data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">The Science Behind Forced Rhubarb</span></strong></h3><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">How can it be possible for a plant to grow without light? In the case of Yorkshire forced rhubarb, the root must sit outside on the Rhubarb Triangle’s moist soil for at least two years after propagation. Left to its own devices rather than harvested, the root hoards energy as it photosynthesises, preparing the rhubarb for a rapid yet brief working life inside the sheds. Just one season in the forcing shed and this fragile plant is as good as dead.</span></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Cloaked in the intense gloom of the forcing sheds, in the depths of winter, frosts kick-start a chemical reaction that awakens the plant and forces it to produce a crop. &nbsp;</span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1551" instrument_node="">At Janet’s farm, </span><em data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">E Oldroyd &amp; Sons</span></em><span data-dcnode-id="1548" instrument_node="">, the crops are tended to by candlelight with painstaking regularity. Her farm-hands measure the frost units every morning, then, when they’re just right, they warm the sheds using what is essentially central heating, and gently moisten the plants by misting them.&nbsp;</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">The entire growing operation is a lengthy, delicate balancing act: not enough frost and the rhubarb butt won’t produce sticks; too much moisture and the root will rot. Allow any light to enter the sheds and photosynthesis will occur, which causes the rhubarb fibres to thicken and makes the product tougher. Photosynthesis also increases the levels of oxalic acid in rhubarb; the more photosynthesis, the sharper rhubarb tastes. Force the rhubarb too quickly and it loses flavour –&nbsp;farmers in the Rhubarb Triangle take a first harvest only after six to nine weeks.&nbsp;</span></p><span data-dcnode-id="1543" instrument_node="">
</span></div><span data-dcnode-id="1541" instrument_node="">

</span><div class="title" data-dcnode-id="1490"><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finedininglovers.com/article/three-michelin-star-women-london"><span data-dcnode-id="1492" instrument_node="">
            The Stars Align for London’s Leading Ladies</span></a></div><span data-dcnode-id="1489" instrument_node="">
</span><div class="body-copy" data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">
          
            The Michelin Guide for Great Britain and Ireland has announced two new three-stars for female-run restaurants - Hélène Darroze at The Connaught and Core by Clare Smyth, both in London.

      

      </span></div><span data-dcnode-id="1486" instrument_node="">

</span><div class="clearfix text-formatted field field--name-field-scgt-body field--type-text-long field--label-hidden field__item" data-dcnode-id="1435"><h3 data-dcnode-id="1464"><strong data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Supplying the Stars of Britain’s Restaurant Scene</span></strong></h3><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1462" instrument_node="">Janet’s farms supply the three-Michelin-starred restaurants </span><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">The Fat Duck</span></em><span data-dcnode-id="1459" instrument_node=""> in Bray and </span><em data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Hélène Darroze at The Connaught</span></em><span data-dcnode-id="1456" instrument_node=""> in London. Other Michelin-starred restaurants that put forced rhubarb on the menu in winter include </span><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Tommy Banks</span></strong><span data-dcnode-id="1453" instrument_node="">’ </span><em data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">The Black Swan at Oldstead</span></em><span data-dcnode-id="1450" instrument_node=""> in North Yorkshire, while visitors to the farm have included the likes of chefs </span><strong data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Raymond Blanc</span></strong><span data-dcnode-id="1447" instrument_node=""> and </span><strong data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Rick Stein</span></strong><span data-dcnode-id="1444" instrument_node="">.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">“Chefs are always interested in the forced,” says Janet, who is in the process of erecting more sheds to keep up with increasing demand. But now chefs are experimenting with savoury recipes as well as sweet, eschewing the traditional custard and sugar, and using forced rhubarb to sear through fatty meats and fish like duck and mackerel.&nbsp;</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">“And it’s about time,” says Janet, “because this plant is so versatile in cooking – thank goodness the chefs are showing how to get more rhubarb into your body and what lovely recipes you can come up with.”</span></p><span data-dcnode-id="1436" instrument_node="">
</span></div><span data-dcnode-id="1434" instrument_node="">
