</span><div class="fb-like" data-action="like" data-dcnode-id="1508" data-href="https://www.thetowndish.com/2014/04/23/top-5-facts-didnt-know-rhubarb/" data-layout="standard" data-share="false" data-show-faces="true" data-size="large" data-width="225"></div></div><span data-dcnode-id="1506" instrument_node="">

</span><div class="fl-module-content fl-node-content" data-dcnode-id="1387"><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498" style="text-align: justify;"><span data-dcnode-id="1499" instrument_node="">Some like it thick, some like it thin, either way you eat it — rhubarb is in (season)!</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495" style="text-align: justify;"><span data-dcnode-id="1496" instrument_node="">Most likely to be used in pies, puddings and other tart desserts, rhubarb is also an excellent addition to preserves, sauces and jams. It’s low in cholesterol and sodium, keeps the body cleansed and offers a &nbsp;good source of &nbsp;dietary fiber, vitamins C and K, calcium, potassium and more. Who knew such a beautiful crimson vegetable had so many health benefits?</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><img alt="rhubarb" class="aligncenter size-full wp-image-127736" data-dcnode-id="1493" height="640" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paeats.org/wp-content/uploads/2014/04/bigstock-Rhubarb-Stalks-With-Large-243173857.jpg&amp;raw" width="960"></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1490" instrument_node="">Rhubarb is also a native crop to Pennsylvania and grows both wild and cultivated across the state. There’s an&nbsp;</span><a data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/events/398055497286670/" rel="noopener" target="_blank"><span data-dcnode-id="1489" instrument_node="">Annual Lancaster County Rhubarb Festival</span></a><span data-dcnode-id="1487" instrument_node="">&nbsp;held each year in Intercourse, Pa. (soon to be in its 36th year!), and local farms like </span><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kauffmansfruitfarm.com/" rel="noopener" target="_blank"><span data-dcnode-id="1486" instrument_node="">Kauffman’s Fruit Farm &amp; Market</span></a><span data-dcnode-id="1484" instrument_node=""> in Bird-in-Hand and </span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Dietz-Produce-121072341272571/" rel="noopener" target="_blank"><span data-dcnode-id="1483" instrument_node="">Dietz Produce</span></a><span data-dcnode-id="1481" instrument_node=""> in&nbsp;York’s </span><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.centralmarketyork.com/" rel="noopener" target="_blank"><span data-dcnode-id="1480" instrument_node="">Central Market House</span></a><span data-dcnode-id="1478" instrument_node="">&nbsp;grow the rosy stalks and sell them during late spring and early summer.</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474" style="text-align: justify;"><span data-dcnode-id="1475" instrument_node="">PA Eats scoured the internet and pulled together five must-know facts about rhubarb for you to devour this season.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><h2 data-dcnode-id="1471" style="text-align: center;"><span data-dcnode-id="1472" instrument_node="">Top 5 Rhubarb Facts:</span></h2><span data-dcnode-id="1470" instrument_node="">
</span><ol data-dcnode-id="1436"><span data-dcnode-id="1469" instrument_node="">
</span><li data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node="">According to the&nbsp;</span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.foodnetwork.com/healthyeats/2011/06/06/5-rhubarb-facts-and-recipes/"><span data-dcnode-id="1467" instrument_node="">Food Network,</span></a><span data-dcnode-id="1465" instrument_node="">&nbsp;1 pound of fresh rhubarb yields about 3 cups chopped or 2 cups cooked. This is a great tip to remember in the store when you’re purchasing rhubarb for a recipe.</span></li><span data-dcnode-id="1463" instrument_node="">
</span><li data-dcnode-id="1457"><span data-dcnode-id="1462" instrument_node="">Rhubarb was used as a medicine/healing ointment in earlier centuries. A native plant of China, rhubarb was grown and traded for medicinal purposes as early as the 16th century. According to&nbsp;</span><a data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.localhistories.org/fruits.html" rel="noopener" style="text-align: justify;" target="_blank"><span data-dcnode-id="1461" instrument_node="">History of Fruit</span></a><span data-dcnode-id="1458" style="text-align: justify;"><span data-dcnode-id="1459" instrument_node="">, rhubarb gained popularity as a food and vegetable source by the 19th century.</span></span></li><span data-dcnode-id="1456" instrument_node="">
</span><li data-dcnode-id="1450"><span data-dcnode-id="1455" instrument_node="">The redder the stalk, the sweeter the flavor. </span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.savor-the-rhubarb.com/rhubarb-trivia.html" rel="noopener" style="text-align: justify;" target="_blank"><span data-dcnode-id="1454" instrument_node="">Savor the Rhubarb</span></a><span data-dcnode-id="1451" style="text-align: justify;"><span data-dcnode-id="1452" instrument_node=""> points out that green rhubarb can also be eaten, and is just a different variety. All rhubarb is quite bitter in taste and therefore a great substitute for cranberries, and a good match with a sweeter fruit like strawberries.</span></span></li><span data-dcnode-id="1449" instrument_node="">
</span><li data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">The leaves attached to the Rhubarb stalk are poisonous.&nbsp;</span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dailyrandomfacts.com/funny-facts/rhubarb-a-good-laxative/attachment/rhubarb-facts/" rel="noopener" target="_blank"><span data-dcnode-id="1447" instrument_node="">Daily Random Facts</span></a><span data-dcnode-id="1445" instrument_node=""> tells us that no matter how enticing, green, and crisp those leaves look, you should always discard that part of the plant.</span></li><span data-dcnode-id="1443" instrument_node="">
</span><li data-dcnode-id="1438"><span data-dcnode-id="1442" instrument_node="">Though not often used in modern parlance, the word “rhubarb” can also mean “a heated argument or dispute,” according to </span><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.merriam-webster.com/dictionary/rhubarb" rel="noopener" target="_blank"><span data-dcnode-id="1441" instrument_node="">Merriam Webster</span></a><span data-dcnode-id="1439" instrument_node="">.</span></li><span data-dcnode-id="1437" instrument_node="">
</span></ol><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><img alt="facts about rhubarb" class="aligncenter size-full wp-image-127737" data-dcnode-id="1434" height="640" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paeats.org/wp-content/uploads/2014/04/bigstock-Rhubarb-Stalks-With-Large-243174169.jpg&amp;raw" width="960"></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1427" style="text-align: justify;"><span data-dcnode-id="1431" instrument_node="">But don’t get into a </span><i data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">rhubarb</span></i><span data-dcnode-id="1428" instrument_node=""> about what to make for dinner! Enjoy these top recipes that incorporate rhubarb in your diet in the most tasty ways imaginable, sure to create harmony in any kitchen.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><h2 data-dcnode-id="1424" style="text-align: center;"><span data-dcnode-id="1425" instrument_node="">Rhubarb Recipes:</span></h2><span data-dcnode-id="1423" instrument_node="">
