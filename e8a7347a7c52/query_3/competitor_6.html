-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Rhubarb was wildly popular in Victorian England after a new variety was introduced at Queen Victoria’s coronation. The variety, later known as Victoria rhubarb, was easier to grow than previous forms. It was cooked into all sorts of sweets, from pies and fools to jams, jellies and custards. Though technically considered a vegetable, rhubarb is most often treated like a fruit in cooking. Rhubarb is usually combined with sweet flavors to counteract its natural tartness, but it can also be paired with savory dishes alongside cheeses and meat.</span></p><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Rhubarb is coming into season now in California and I’m starting to see those familiar pinkish-green stalks at the market. I enjoy playing with rhubarb in various dessert and drink preparations.&nbsp;This rhubarb simple syrup is great when mixed into cocktails, but it can also lend a unique flavor to sparkling water or juice. When reduced to a thicker syrup (directions are given below) it can be served over pancakes, waffles or even on top of oatmeal as a seasonal spring alternative to maple syrup.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2163" id="AdThrive_Content_1_tablet" style="min-height: 250px;"></div><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">When shopping for rhubarb, look for stalks that are crisp, bright pink, thin, and clean looking (no damage from insects or disease). The thinner and darker pink the rhubarb is, the sweeter it will be. Avoid stalks that seem too old or slimy. Lighter colored stalks tend to be more tart, which is fine in this recipe since it calls for a good amount of sugar.</span></p><div class="adthrive" data-dcnode-id="2158" id="cls-video-container-snGG3ch6" style="min-height: 589.5px;"><div data-dcnode-id="2159"></div></div><span data-dcnode-id="2157" instrument_node="">

he top.</span><br data-dcnode-id="1871"></span></div><div class="wprm-recipe-instruction-media wprm-recipe-instruction-image" data-dcnode-id="1865" style="text-align: center;"><img alt="Skimming foam off simmering rhubarb." class="attachment-720x400 size-720x400 lazyloaded" data-dcnode-id="1868" data-ll-status="loaded" data-pin-media="https://toriavey.com/images/2014/04/Syrup4.jpg" data-pin-nopin="true" height="400" sizes="(max-width: 533px) 100vw, 533px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toriavey.com/images/2014/04/Syrup4.jpg&amp;raw" srcset="https://toriavey.com/images/2014/04/Syrup4.jpg 740w, https://toriavey.com/images/2014/04/Syrup4-280x210.jpg 280w, https://toriavey.com/images/2014/04/Syrup4-640x480.jpg 640w, https://toriavey.com/images/2014/04/Syrup4-200x150.jpg 200w, https://toriavey.com/images/2014/04/Syrup4-292x219.jpg 292w, https://toriavey.com/images/2014/04/Syrup4-624x468.jpg 624w, https://toriavey.com/images/2014/04/Syrup4-900x675.jpg 900w" width="533"><noscript data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">&lt;img width="533" height="400" src="https://toriavey.com/images/2014/04/Syrup4.jpg" class="attachment-720x400 size-720x400" alt="Skimming foam off simmering rhubarb." srcset="https://toriavey.com/images/2014/04/Syrup4.jpg 740w, https://toriavey.com/images/2014/04/Syrup4-280x210.jpg 280w, https://toriavey.com/images/2014/04/Syrup4-640x480.jpg 640w, https://toriavey.com/images/2014/04/Syrup4-200x150.jpg 200w, https://toriavey.com/images/2014/04/Syrup4-292x219.jpg 292w, https://toriavey.com/images/2014/04/Syrup4-624x468.jpg 624w, https://toriavey.com/images/2014/04/Syrup4-900x675.jpg 900w" sizes="(max-width: 533px) 100vw, 533px" data-pin-media="https://toriavey.com/images/2014/04/Syrup4.jpg"&gt;</span></noscript></div><span data-dcnode-id="1864" instrument_node=""> </span></li><li class="wprm-recipe-instruction" data-dcnode-id="1853" id="wprm-recipe-44952-step-0-3" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1859" style="margin-bottom: 5px"><span data-dcnode-id="1860" style="display: block;"><span data-dcnode-id="1862" instrument_node="">After about 20 minutes, the rhubarb will become mushy and will have lost most of its color. The water will be a bright pink/red. Remove from heat. Strain the rhubarb liquid through a fine mesh strainer into another clean pot, separating the rhubarb from the liquid. Because the rhubarb breaks down more than raspberries or strawberries, the resulting liquid will be slightly more opaque.</span><br data-dcnode-id="1861"></span></div><div class="wprm-recipe-instruction-media wprm-recipe-instruction-image" data-dcnode-id="1855" style="text-align: center;"><img alt="Straining rhubarb from the cooking water." class="attachment-720x400 size-720x400 lazyloaded" data-dcnode-id="1858" data-ll-status="loaded" data-pin-media="https://toriavey.com/images/2014/04/Syrup5.jpg" data-pin-nopin="true" height="400" sizes="(max-width: 533px) 100vw, 533px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toriavey.com/images/2014/04/Syrup5.jpg&amp;raw" srcset="https://toriavey.com/images/2014/04/Syrup5.jpg 740w, https://toriavey.com/images/2014/04/Syrup5-280x210.jpg 280w, https://toriavey.com/images/2014/04/Syrup5-640x480.jpg 640w, https://toriavey.com/images/2014/04/Syrup5-200x150.jpg 200w, https://toriavey.com/images/2014/04/Syrup5-292x219.jpg 292w, https://toriavey.com/images/2014/04/Syrup5-624x468.jpg 624w, https://toriavey.com/images/2014/04/Syrup5-900x675.jpg 900w" width="533"><noscript data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">&lt;img width="533" height="400" src="https://toriavey.com/images/2014/04/Syrup5.jpg" class="attachment-720x400 size-720x400" alt="Straining rhubarb from the cooking water." srcset="https://toriavey.com/images/2014/04/Syrup5.jpg 740w, https://toriavey.com/images/2014/04/Syrup5-280x210.jpg 280w, https://toriavey.com/images/2014/04/Syrup5-640x480.jpg 640w, https://toriavey.com/images/2014/04/Syrup5-200x150.jpg 200w, https://toriavey.com/images/2014/04/Syrup5-292x219.jpg 292w, https://toriavey.com/images/2014/04/Syrup5-624x468.jpg 624w, https://toriavey.com/images/2014/04/Syrup5-900x675.jpg 900w" sizes="(max-width: 533px) 100vw, 533px" data-pin-media="https://toriavey.com/images/2014/04/Syrup5.jpg"&gt;</span></noscript></div><span data-dcnode-id="1854" instrument_node=""> </span></li><li class="wprm-recipe-instruction" data-dcnode-id="1843" id="wprm-recipe-44952-step-0-4" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1849" style="margin-bottom: 5px"><span data-dcnode-id="1850" style="display: block;"><span data-dcnode-id="1852" instrument_node="">Once the rhubarb liquid has been strained, discard the rhubarb. Add 1 ¾ cups of sugar to the rhubarb liquid. Bring back to a boil, stirring frequently to dissolve the sugar into the syrup. Let the syrup simmer for 5 minutes till the sugar is completely dissolved, skimming any additional foam that rises to the top.</span><br data-dcnode-id="1851"></span></div><div class="wprm-recipe-instruction-media wprm-recipe-instruction-image" data-dcnode-id="1845" style="text-align: center;"><img alt="Simmering rhubarb syrup in a saucepan." class="attachment-720x400 size-720x400 lazyloaded" data-dcnode-id="1848" data-ll-status="loaded" data-pin-media="https://toriavey.com/images/2014/04/Syrup6.jpg" data-pin-nopin="true" height="400" sizes="(max-width: 533px) 100vw, 533px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toriavey.com/images/2014/04/Syrup6.jpg&amp;raw" srcset="https://toriavey.com/images/2014/04/Syrup6.jpg 740w, https://toriavey.com/images/2014/04/Syrup6-280x210.jpg 280w, https://toriavey.com/images/2014/04/Syrup6-640x480.jpg 640w, https://toriavey.com/images/2014/04/Syrup6-200x150.jpg 200w, https://toriavey.com/images/2014/04/Syrup6-292x219.jpg 292w, https://toriavey.com/images/2014/04/Syrup6-624x468.jpg 624w, https://toriavey.com/images/2014/04/Syrup6-900x675.jpg 900w" width="533"><noscript data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">&lt;img width="533" height="400" src="https://toriavey.com/images/2014/04/Syrup6.jpg" class="attachment-720x400 size-720x400" alt="Simmering rhubarb syrup in a saucepan." srcset="https://toriavey.com/images/2014/04/Syrup6.jpg 740w, https://toriavey.com/images/2014/04/Syrup6-280x210.jpg 280w, https://toriavey.com/images/2014/04/Syrup6-640x480.jpg 640w, https://toriavey.com/images/2014/04/Syrup6-200x150.jpg 200w, https://toriavey.com/images/2014/04/Syrup6-292x219.jpg 292w, https://toriavey.com/images/2014/04/Syrup6-624x468.jpg 624w, https://toriavey.com/images/2014/04/Syrup6-900x675.jpg 900w" sizes="(max-width: 533px) 100vw, 533px" data-pin-media="https://toriavey.com/images/2014/04/Syrup6.jpg"&gt;</span></noscript></div><span data-dcnode-id="1844" instrument_node=""> </span></li><li class="wprm-recipe-instruction" data-dcnode-id="1831" id="wprm-recipe-44952-step-0-5" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1837" style="margin-bottom: 5px"><span data-dcnode-id="1841" style="display: block;"><span data-dcnode-id="1842" instrument_node="">Remove from the heat and allow to cool completely. Pour into a glass container, seal and refrigerate. The syrup should last for several weeks.</span></span><div class="wprm-spacer" data-dcnode-id="1840"></div><span data-dcnode-id="1838" style="display: block;"><span data-dcnode-id="1839" instrument_node="">Note: If you prefer a thicker syrup for use on pancakes or waffles, you can simmer it for several minutes longer till the liquid reduces and thickens more. The consistency as written is perfect for mixing into beverages.</span></span></div><div class="wprm-recipe-instruction-media wprm-recipe-instruction-image" data-dcnode-id="1833" style="text-align: center;"><img alt="Homemade Rh </span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Hi S.J., Tori’s assistant Ashley here. Yes, this can be frozen. Keep in mind that due to the sugar:water ratio, it will freeze solid and be sure not to freeze it in a glass container. It should keep for up to a year. Hope this helps!</span></p><span data-dcnode-id="601" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="572"><time class="comment-time" data-dcnode-id="573"><a class="comment-time-link" data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toriavey.com/toris-kitchen/homemade-rhubarb-syrup/comment-page-3/%23comment-334428"><span data-dcnode-id="575" instrument_node="">July 18, 2019 at 6:59 am</span></a></time></p><span data-dcnode-id="571" instrument_node=""> </span></header><span data-dcnode-id="569" instrument_node="">
</span><div class="comment-content" data-dcnode-id="561"><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">I strongly recommend halving the amount of sugar used in making the syrup. The rhubarb loses its punch when overly sweetened. You can always add more if needed. It is tough to take away. </span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">The remaining pulp can be used to thicken a smoothie. It is a great source of fiber and does not add an overwhelming flavor. Wondering if you could use it as you do applesauce when baking and trying to reduce the use of butter/margarine.</span></p><span data-dcnode-id="562" instrument_node="">

</span><div class="comment-content" data-dcnode-id="527"><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">I forgot to mention that I canned the syrup. After simmering for 5 minutes after adding sugar as the recipe says, I took the pot off the stove, skimmed off foam and poured into sterile jars.  I processed the jars in a boiling water bath for 10 minutes then took them out. All the jars sealed and now I’ll have syrup all year (if it lasts that long). The original recipe made about 6 half pint jars (jam jars) and the recipes with added fruit and water made 9 or 10 jars depending on the added fruit.</span></p><span data-dcnode-id="528" instrument_node="">
