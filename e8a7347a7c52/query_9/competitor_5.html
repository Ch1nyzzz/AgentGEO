dbridg-ad-class="mlb1" data-dcnode-id="1238" id="mlb1__slot"></div></div></div></aside><div data-dcnode-id="356"><div class="css-stl7tm" data-dcnode-id="357"><div class="css-14cfce3" data-article-body="0" data-dcnode-id="358"><div class="css-z468a2" data-dcnode-id="454"><a class="css-5r4717" data-dcnode-id="1232" data-event="Navigation|breadcrumb click|Nutrition|clicked" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition"><h4 class="css-1wrueoe" data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Nutrition</span></h4></a><button class="css-16pmzel" data-dcnode-id="1227"><span class="css-14ktbsh" data-dcnode-id="1228"><span class="css-tfky81 icon-hl-check" data-dcnode-id="1231"></span><span class="css-1huyk6v" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Evidence Based</span></span></span></button><h1 class="css-6jxmuv" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">17 Day Diet Review: Does It Work for Weight Loss?</span></h1><section class="css-jy1umg" data-dcnode-id="1213" data-testid="byline"><div class="css-1q67gt9 css-0" data-dcnode-id="1222"><div class="css-quwpxp" data-dcnode-id="1223"><img alt="" data-dcnode-id="1224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.healthline.com/wp-content/uploads/2018/09/ryan.png%3Fw%3D105%26h%3D105&amp;raw"></div></div><div data-dcnode-id="1214"><span data-dcnode-id="1218"><span data-dcnode-id="1221" instrument_node="">Written by </span><span data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Ryan Raman, MS, RD</span></span></span><span data-dcnode-id="1217" instrument_node=""> — </span><span data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node=""> Updated on December 11, 2018</span></span></div></section><div data-dcnode-id="477"><nav class="css-7u7i0a" data-dcnode-id="1190" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="1191"><li class="css-t753mo" data-dcnode-id="1210"><a class="css-1ggiqr2" data-dcnode-id="1211" href="#the-diet"><span data-dcnode-id="1212" instrument_node="">The diet</span></a></li><li class="css-t753mo" data-dcnode-id="1207"><a class="css-1ggiqr2" data-dcnode-id="1208" href="#weight-loss"><span data-dcnode-id="1209" instrument_node="">Weight loss</span></a></li><li class="css-t753mo" data-dcnode-id="1204"><a class="css-1ggiqr2" data-dcnode-id="1205" href="#other-benefits"><span data-dcnode-id="1206" instrument_node="">Other benefits</span></a></li><li class="css-t753mo" data-dcnode-id="1201"><a class="css-1ggiqr2" data-dcnode-id="1202" href="#drawbacks"><span data-dcnode-id="1203" instrument_node="">Drawbacks</span></a></li><li class="css-t753mo" data-dcnode-id="1198"><a class="css-1ggiqr2" data-dcnode-id="1199" href="#foods-to-eat"><span data-dcnode-id="1200" instrument_node="">Foods to eat</span></a></li><li class="css-t753mo" data-dcnode-id="1195"><a class="css-1ggiqr2" data-dcnode-id="1196" href="#sample-menu"><span data-dcnode-id="1197" instrument_node="">Sample Menu</span></a></li><li class="css-t753mo" data-dcnode-id="1192"><a class="css-1ggiqr2" data-dcnode-id="1193" href="#bottom-line"><span data-dcnode-id="1194" instrument_node="">Bottom line</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="482"><div class="css-0" data-dcnode-id="1130"><span data-dcnode-id="1189" style="font-size:0;line-height:0"></span><h2 class="css-13i30ag" data-dcnode-id="1184"><div data-dcnode-id="1185"><a class="chartbeat-section" data-dcnode-id="1186" name="TOC_TITLE_HDR_1"></a><a class="css-5r4717" data-dcnode-id="1188" name="intro" rel="noopener noreferrer" target="_blank"></a><span data-dcnode-id="1187" instrument_node="">Healthline Diet Score: 2.63 out of 5</span></div></h2><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">The 17 Day Diet is a popular weight loss program created by Dr. Mike Moreno.</span></p><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">It claims to help you lose up to 10–12 pounds (4.5–5.4 kg) in only 17 days. The key to this diet is changing your food combinations and calorie intake each 17-day cycle.</span></p><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Dr. Moreno believes that changing your diet in this way prevents boredom and keeps your metabolism in a state of “confusion” to speed up weight loss and avoid plateaus.</span></p><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">However, many claims associated with this diet are not supported by quality studies.</span></p><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">This article reviews whether the 17 Day Diet can help you lose weight.</span></p><blockquote class="css-pc7ote" data-dcnode-id="1138"><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">DIET REVIEW SCORECARD</span></strong><ul data-dcnode-id="1143"><li data-dcnode-id="1168"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Overall score:</span></strong><span data-dcnode-id="1169" instrument_node=""> 2.63</span></li><li data-dcnode-id="1164"><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Weight loss:</span></strong><span data-dcnode-id="1165" instrument_node=""> 3.25</span></li><li data-dcnode-id="1160"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Healthy eating:</span></strong><span data-dcnode-id="1161" instrument_node=""> 4</span></li><li data-dcnode-id="1156"><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Sustainability:</span></strong><span data-dcnode-id="1157" instrument_node=""> 1.75</span></li><li data-dcnode-id="1152"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Whole body health:</span></strong><span data-dcnode-id="1153" instrument_node=""> 1.75</span></li><li data-dcnode-id="1148"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Nutrition quality:</span></strong><span data-dcnode-id="1149" instrument_node=""> 3</span></li><li data-dcnode-id="1144"><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Evidence based:</span></strong><span data-dcnode-id="1145" instrument_node=""> 2</span></li></ul><p data-dcnode-id="1139"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">BOTTOM LINE: </span></strong><span data-dcnode-id="1140" instrument_node="">The 17 Day Diet aids weight loss by restricting calories and food groups. However, this diet makes many questionable claims and rules that are unsupported by good scientific studies.</span></p></blockquote><div data-dcnode-id="1137" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="1131"><aside class="css-0 css-0" data-dcnode-id="1132"><div data-dcnode-id="1133"><div class="css-10gx9pb" data-dcnode-id="1134" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1136"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1135" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="963"><span data-dcnode-id="1129" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1125"><div data-dcnode-id="1126"><a class="chartbeat-section" data-dcnode-id="1127" name="the-diet"><span data-dcnode-id="1128" instrument_node="">What is the 17 Day Diet?</span></a></div></h2><div data-dcnode-id="1112"><figure class="css-yhe8zq" data-dcnode-id="1113"><span class="css-rwmw5v" data-dcnode-id="1114"><span class="css-mjp0j9" data-dcnode-id="1119"><picture class="css-16pk1is" data-dcnode-id="1120"><source data-dcnode-id="1124" media="(min-width: 1190px)" srcset="//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/AN_images/17-day-diet-1296x728-feature.jpg?w=1575 750w"><source data-dcnode-id="1123" media="(min-width: 990px)" srcset="//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/AN_images/17-day-diet-1296x728-feature.jpg?w=1575 750w"><source data-dcnode-id="1122" media="(min-width: 768px)" srcset="//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/AN_images/17-day-diet-1296x728-feature.jpg?w=1845 879w"><img alt="" class="css-1jytyml" data-dcnode-id="1121" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/AN_images/17-day-diet-1296x728-feature.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1115"><a class="icon-hl-pinterest css-1w9qmip" data-dcnode-id="1116" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=5ZodQJP_UsJS-1&amp;url=https%3A%2F%2Fwww.healthline.com%2Fnutrition%2F17-day-diet&amp;media=https%3A%2F%2Fimages-prod.healthline.com%2Fhlcmsresource%2Fimages%2FAN_images%2F17-day-diet-1296x728-feature.jpg&amp;description=17%20Day%20Diet%20Review%3A%20Does%20It%20Work%20for%20Weight%20Loss%3F" data-pin-log="button_pinit" data-share-url="https://images-prod.healthline.com/hlcmsresource/images/AN_images/17-day-diet-1296x728-feature.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">The 17 Day Diet was created by Dr. Mike Moreno and his book first published in 2010.</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1109" instrument_node="">It’s suggested to help you </span><a class="content-link css-5r4717" data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/how-to-lose-weight-as-fast-as-possible"><span data-dcnode-id="1108" instrument_node="">lose weight rapidly</span></a><span data-dcnode-id="1106" instrument_node=""> and build healthy eating habits. The key to this diet is constantly changing foods and calorie intake, which is claimed to boost your metabolism (</span><a class="content-link css-5r4717" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drmikediet.com/about-the-17-day-diet/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1105" instrument_node="">1</span></a><span data-dcnode-id="1103" instrument_node="">).</span></p><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">The 17 Day Diet is divided into four cycles: Accelerate, Activate, Achieve and Arrive. The first three cycles last 17 days each, while the Arrive cycle is meant to be followed for life.</span></p><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">As you move through the cycles, the diet introduces new strategies and food options.</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1097" instrument_node="">It’s worth noting that the diet does not tell you </span><a class="content-link css-5r4717" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/how-many-calories-per-day"><span data-dcnode-id="1096" instrument_node="">how many calories</span></a><span data-dcnode-id="1094" instrument_node=""> to eat during each cycle. However, it progressively increases your calorie intake by introducing more calorie-rich options with each cycle.</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">In 2014, Dr. Moreno released a “breakthrough edition” of the diet with a few additions:</span></p><ul data-dcnode-id="1080"><li data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">More recipes and food options.</span></li><li data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Contour foods to help you target fat loss in specific areas.</span></li><li data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Optional fast day between cycles.</span></li><li data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Supplements for the 17 Day Diet.</span></li><li data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">17-minute workout to target fat loss in specific areas.</span></li></ul><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Here are the four cycles of the 17 Day Diet.</span></p><h3 data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Cycle 1: Accelerate</span></h3><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The first cycle of the 17 Day Diet is the Accelerate cycle.</span></p><p data-dcnode-id="1069"><span data-dcnode-id="1073" instrument_node="">It claims to help you lose 10–12 pounds (4.5–5.4 kg) over the first 17 days by (</span><a class="content-link css-5r4717" data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drmikediet.com/about-the-17-day-diet/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1072" instrument_node="">1</span></a><span data-dcnode-id="1070" instrument_node="">):</span></p><ul data-dcnode-id="1057"><li data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node="">Increasing your </span><a class="content-link css-5r4717" data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/high-protein-diet-plan"><span data-dcnode-id="1067" instrument_node="">protein</span></a><span data-dcnode-id="1065" instrument_node=""> intake.</span></li><li data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Improving digestive health.</span></li><li data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Reducing sugar, sweets and refined carbs.</span></li><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Clearing your body of possible toxins that affect your metabolism.</span></li></ul><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">During this phase, you’re allowed to eat unlimited protein and vegetable options from the specified Accelerate foods list. Most carb-rich foods are banned during this cycle.</span></p><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">However, fruits are an exception — though you’re not allowed to eat any fruit after 2 p.m. The book claims that it is harder to burn carbs later in the day, as you’re less active.</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Other guidelines to follow include:</span></p><ul data-dcnode-id="1035"><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Purchase skinless poultry or remove the skin.</span></li><li data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">Avoid alcohol and sugar to </span><a class="content-link css-5r4717" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/ways-to-improve-digestion"><span data-dcnode-id="1047" instrument_node="">improve digestion</span></a><span data-dcnode-id="1045" instrument_node="">.</span></li><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Consume two probiotic foods daily to promote digestive health.</span></li><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Eat slowly and chew thoroughly until you feel full.</span></li><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Drink eight 8-ounce (240-ml) glasses of water each day.</span></li><li data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Exercise at least 17 minutes per day.</span></li></ul><h3 data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Cycle 2: Activate</span></h3><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">The second cycle of the 17 Day Diet is the Activate cycle.</span></p><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">During this cycle, you alternate between lower- and higher-calorie days.</span></p><p data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">On lower-calorie days, you simply eat as you would during the Accelerate cycle. On higher-calorie days, you can add two servings of naturally higher-starch carbs, such as </span><a class="content-link css-5r4717" data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/healthiest-beans-legumes"><span data-dcnode-id="1027" instrument_node="">legumes</span></a><span data-dcnode-id="1025" instrument_node="">, grains, tubers and root vegetables.</span></p><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">To follow this cycle, spend one day on the Accelerate plan, the next day on the Activate plan. Continue to alternate between these two versions over the next 17 days.</span></p><p data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">This second cycle is based on the idea of </span><a class="content-link css-5r4717" data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/alternate-day-fasting-guide"><span data-dcnode-id="1020" instrument_node="">alternate-day fasting</span></a><span data-dcnode-id="1018" instrument_node="">. However, it takes a modified approach, as its lower-calorie days are higher in calories than on a traditional alternate-day fasting diet.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">In addition, the Activate cycle adds plenty of new food options.</span></p><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">This cycle is claimed to help reset your metabolism, but evidence to support this is lacking.</span></p><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Many rules form the Accelerate cycle still apply, such as not to eat carbs after 2 p.m. This means that you must eat your carb options with breakfast and lunch during this second cycle.</span></p><h3 data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Cycle 3: Achieve</span></h3><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">The third cycle of the 17 Day Diet is the Achieve cycle.</span></p><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">This cycle aims to establish healthy eating habits with steady, manageable weight loss. Alternate-day fasting is no longer required and the diet is similar to the Activate days of the second cycle.</span></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">You are now allowed to eat a wider variety of carb sources, such as breads, pastas, high-fiber cereals and virtually any fresh fruit or vegetable.</span></p><p data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">In addition, you may drink one optional glass of </span><a class="content-link css-5r4717" data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/alcohol-good-or-bad"><span data-dcnode-id="1001" instrument_node="">alcohol</span></a><span data-dcnode-id="999" instrument_node=""> per day if you would like. However, the diet advises passing on the alcohol if you want more weight loss.</span></p><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Since you’re eating more food than in previous cycles, it’s recommended to increase aerobic exercise from the minimum 17 minutes to 45–60 minutes per day.</span></p><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">It’s worth noting that it’s still not permissible to eat carbs after 2 p.m. during this cycle.</span></p><h3 data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Cycle 4: Arrive</span></h3><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">The last cycle of the 17 Day Diet is the Arrive cycle.</span></p><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Unlike other cycles — that all last 17 days — this cycle is meant to be followed for life.</span></p><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">For this phase, you may choose any meal plan from either of the three previous stages — Accelerate, Activate, Achieve — and follow them from Monday breakfast to Friday lunch.</span></p><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">From Friday dinner through Sunday dinner you can enjoy your favorite foods in moderation. However, you’re advised not to eat more than one to three of your favorite meals over the weekend.</span></p><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">In addition, you can drink one to two alcoholic beverages daily over the weekend.</span></p><p data-dcnode-id="977"><span data-dcnode-id="981" instrument_node="">It’s recommended to get in at least an hour of intense </span><a class="content-link css-5r4717" data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/10-benefits-of-exercise"><span data-dcnode-id="980" instrument_node="">exercise</span></a><span data-dcnode-id="978" instrument_node=""> on Saturday and Sunday since you consume more calories on the weekends.</span></p><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">During this cycle, it’s still suggested to not eat carbs after 2 p.m.</span></p><blockquote class="css-pc7ote" data-dcnode-id="970"><strong data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Summary</span></strong><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">The 17 Day Diet has three fat-loss cycles — Accelerate, Activate and Achieve — which last 17 days each. The final cycle is called Arrive and is a lifetime weight maintenance plan.</span></p></blockquote><div class="css-1cg0byz" data-dcnode-id="964"><aside class="css-0 css-0" data-dcnode-id="965"><div data-dcnode-id="966"><div class="css-az6x7v" data-dcnode-id="967" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="969"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="968" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="882"><span data-dcnode-id="962" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="958"><div data-dcnode-id="959"><a class="chartbeat-section" data-dcnode-id="960" name="weight-loss"><span data-dcnode-id="961" instrument_node="">Is it effective for weight loss?</span></a></div></h2><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">One of the biggest draws of the 17 Day Diet is that it can help you lose weight quickly, as it restricts calories — which means you’re creating a calorie deficit.</span></p><p data-dcnode-id="930"><span data-dcnode-id="955" instrument_node="">Consuming fewer calories than your body burns is a surefire way to lose weight (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="948" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18025815" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="954" instrument_node="">2</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="951"><span class="sro" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="949"></span></hl-trusted-source><span data-dcnode-id="947" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="940" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/20429742" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="946" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="943"><span class="sro" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="941"></span></hl-trusted-source><span data-dcnode-id="939" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="932" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22215165" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="938" instrument_node="">4</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="935"><span class="sro" data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="933"></span></hl-trusted-source><span data-dcnode-id="931" instrument_node="">).</span></p><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">For instance, during the Accelerate cycle, the 17 Day Diet limits your choices to lean proteins, </span><a class="content-link css-5r4717" data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/starchy-vs-non-starchy-vegetables"><span data-dcnode-id="928" instrument_node="">non-starchy vegetables</span></a><span data-dcnode-id="926" instrument_node=""> and probiotic foods — which are low in calories.</span></p><p data-dcnode-id="907"><span data-dcnode-id="924" instrument_node="">During the Activate phase, it implements a modified take on alternate-day fasting, which has been found to be effective for fat loss, as people find it easy to follow (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="917" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/27708846" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="923" instrument_node="">5</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="920"><span class="sro" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="918"></span></hl-trusted-source><span data-dcnode-id="916" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="909" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24215592" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="915" instrument_node="">6</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="912"><span class="sro" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="910"></span></hl-trusted-source><span data-dcnode-id="908" instrument_node="">).</span></p><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">Still, though the diet can aid weight loss, it makes various weight loss claims that are unsupported by evidence, such as that the change in food groups and calorie intake can “confuse” and </span><a class="content-link css-5r4717" data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/10-ways-to-boost-metabolism"><span data-dcnode-id="905" instrument_node="">boost your metabolism</span></a><span data-dcnode-id="903" instrument_node="">.</span></p><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">It also recommends avoiding carbs after 2 p.m., claiming that carbs eaten later in the day are harder for your body to burn, as you burn less energy in the evening. However, there are no high-quality studies that support this claim.</span></p><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">All told, the 17 Day Diet can help you lose weight, but evidence to suggest that it is more effective than conventional, calorie-restricted, whole-foods diets is insufficient.</span></p><blockquote class="css-pc7ote" data-dcnode-id="893"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Summary</span></strong><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">The 17 Day Diet can help you lose weight, as it encourages calorie restriction and alternate-day fasting, which are techniques supported by science. Yet, it also makes bold claims and recommendations that are not evidence-based.</span></p></blockquote><div data-dcnode-id="889" id="mf2c0bbe8-ba32-4830-9b6c-0edd2680c059"><div data-dcnode-id="890"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-mealkit-quiz" data-dcnode-id="891" data-sub-id="hl_mealkit_quiz_mid_36903" data-widget-id="4fed824d-7cf0-498f-b10a-a267920799ef"><iframe class="myFinance-iframe" data-dcnode-id="892" data-loaded="0" data-src="https://inline.healthline.com/r/ssr/4fed824d-7cf0-498f-b10a-a267920799ef?utm_campaign=hl-mealkit-quiz&amp;utm_medium=embed&amp;selector=%23mf2c0bbe8-ba32-4830-9b6c-0edd2680c059+%3E+div+%3E+div&amp;csid=6ebb981b-f8fd-457b-aeab-301fa45c381e&amp;caid=1f3a8356-54bd-4376-b5be-ad768a9aba83&amp;ciid=a94c2e64-34c6-48e1-830d-46c84d4850c7&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vbnV0cml0aW9uLzE3LWRheS1kaWV0&amp;_mfuuid_=1beb8515-ecc3-4ae4-9ab2-4e2e5470315d&amp;width=584&amp;subId=hl_mealkit_quiz_mid_36903" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/r/ssr/4fed824d-7cf0-498f-b10a-a267920799ef%3Futm_campaign%3Dhl-mealkit-quiz%26utm_medium%3Dembed%26selector%3D%2523mf2c0bbe8-ba32-4830-9b6c-0edd2680c059%2B%253E%2Bdiv%2B%253E%2Bdiv%26csid%3D6ebb981b-f8fd-457b-aeab-301fa45c381e%26caid%3D1f3a8356-54bd-4376-b5be-ad768a9aba83%26ciid%3Da94c2e64-34c6-48e1-830d-46c84d4850c7%26tenant%3Dwk_1Tqf7EYzOKyxm4Gvq042rU0Uky0%26srckey%3Dsrc_1Tqf7BF96WTbG5QbUndHWIgKoFo%26imre%3DaHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vbnV0cml0aW9uLzE3LWRheS1kaWV0%26_mfuuid_%3D1beb8515-ecc3-4ae4-9ab2-4e2e5470315d%26width%3D584%26subId%3Dhl_mealkit_quiz_mid_36903&amp;raw" title="Advertisement"></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="883"><aside class="css-0 css-0" data-dcnode-id="884"><div data-dcnode-id="885"><div class="css-10gx9pb" data-dcnode-id="886" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="888"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="887" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="816"><span data-dcnode-id="881" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="877"><div data-dcnode-id="878"><a class="chartbeat-section" data-dcnode-id="879" name="other-benefits"><span data-dcnode-id="880" instrument_node="">Other potential benefits</span></a></div></h2><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">In addition to weight loss, the 17 Day Diet offers other potential benefits:</span></p><ul class="hl-long-line" data-dcnode-id="824"><li data-dcnode-id="868"><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Vegetarian- and vegan-friendly:</span></strong><span data-dcnode-id="872" instrument_node=""> This diet has plenty of options that allow it to be followed by </span><a class="content-link css-5r4717" data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/vegan-vs-vegetarian"><span data-dcnode-id="871" instrument_node="">vegetarians and vegans</span></a><span data-dcnode-id="869" instrument_node="">.</span></li><li data-dcnode-id="864"><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Gluten-free-friendly:</span></strong><span data-dcnode-id="865" instrument_node=""> It can be made gluten-free.</span></li><li data-dcnode-id="860"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Caters to many cuisines:</span></strong><span data-dcnode-id="861" instrument_node=""> It has options for Mediterranean, Hispanic, Indian, Asian and many other cuisines, making it region-friendly.</span></li><li data-dcnode-id="829"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">High in fiber:</span></strong><span data-dcnode-id="857" instrument_node=""> It advocates eating plenty of high-fiber foods. Fiber may not only </span><a class="content-link css-5r4717" data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/fiber-can-help-you-lose-weight"><span data-dcnode-id="856" instrument_node="">aid weight loss</span></a><span data-dcnode-id="854" instrument_node=""> but also offers many other health benefits (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="847" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19335713" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="853" instrument_node="">7</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="850"><span class="sro" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="848"></span></hl-trusted-source><span data-dcnode-id="846" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="839" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26269366" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="845" instrument_node="">8</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="842"><span class="sro" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="840"></span></hl-trusted-source><span data-dcnode-id="838" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="831" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28165863" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="837" instrument_node="">9</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="834"><span class="sro" data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="832"></span></hl-trusted-source><span data-dcnode-id="830" instrument_node="">).</span></li><li data-dcnode-id="825"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Has tips on surviving difficult situations:</span></strong><span data-dcnode-id="826" instrument_node=""> The program provides helpful tips on eating out, surviving holidays and family situations — all of which can be tricky.</span></li></ul><blockquote class="css-pc7ote" data-dcnode-id="819"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Summary</span></strong><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">In addition to weight loss, the 17 Day Diet offers other potential benefits, such as catering to a variety of cuisines and lifestyles. It’s also high in fiber and provides tips on how to survive difficult situations that typically affect people on a diet.</span></p></blockquote><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="818" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="817" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="783"><span data-dcnode-id="815" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="811"><div data-dcnode-id="812"><a class="chartbeat-section" data-dcnode-id="813" name="drawbacks"><span data-dcnode-id="814" instrument_node="">Possible drawbacks</span></a></div></h2><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Though the 17 Day Diet offers many potential benefits, it has several drawbacks as well:</span></p><ul class="hl-long-line" data-dcnode-id="789"><li data-dcnode-id="805"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Supported by weak evidence:</span></strong><span data-dcnode-id="806" instrument_node=""> Evidence to support many claims associated with this diet is insufficient. This includes the notion that the diet can “confuse” your metabolism or the rule to avoid carbs after 2 p.m.</span></li><li data-dcnode-id="801"><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">May affect workout performance:</span></strong><span data-dcnode-id="802" instrument_node=""> The first two cycles of the 17 Day Diet are lower in calories and carbs, which may have a negative impact on exercise.</span></li><li data-dcnode-id="797"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Cost of supplements:</span></strong><span data-dcnode-id="798" instrument_node=""> In the breakthrough edition of the 17 Day Diet, Dr. Mike Moreno introduces supplements, which can be expensive. For instance, “Dr. Mike’s 17 Day Diet Pack” costs $69.88 for roughly a one-month supply.</span></li><li data-dcnode-id="790"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Easy to fall off track during the last cycle:</span></strong><span data-dcnode-id="794" instrument_node=""> During the last cycle, you’re allowed the freedom to eat your favorite meals three times per week. However, it can be easy to </span><a class="content-link css-5r4717" data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/how-to-stop-overeating"><span data-dcnode-id="793" instrument_node="">overeat</span></a><span data-dcnode-id="791" instrument_node=""> or binge on weekends — negating achieved weight loss.</span></li></ul><blockquote class="css-pc7ote" data-dcnode-id="784"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Summary</span></strong><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Though the 17 Day Diet has various potential benefits, many claims and rules are supported by weak evidence. Plus, it may compromise workout performance, the cost of supplements can be expensive, and the last cycle makes it is easy to fall off track.</span></p></blockquote></div><div class="css-0" data-dcnode-id="599"><span data-dcnode-id="782" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="778"><div data-dcnode-id="779"><a class="chartbeat-section" data-dcnode-id="780" name="foods-to-eat"><span data-dcnode-id="781" instrument_node="">Foods to eat</span></a></div></h2><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">The 17 Day Diet has four cycles, each with a unique list of food options.</span></p><h3 data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Foods to eat during the Accelerate cycle</span></h3><ul class="hl-long-line" data-dcnode-id="739"><li data-dcnode-id="770"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Fish:</span></strong><span data-dcnode-id="771" instrument_node=""> Salmon (canned or fresh), catfish, tilapia, flounder, sole, canned light tuna in water.</span></li><li data-dcnode-id="763"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Poultry:</span></strong><span data-dcnode-id="767" instrument_node=""> </span><a class="content-link css-5r4717" data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/turkey-vs-chicken"><span data-dcnode-id="766" instrument_node="">Chicken and turkey</span></a><span data-dcnode-id="764" instrument_node=""> breast, lean ground turkey, eggs, egg whites.</span></li><li data-dcnode-id="759"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Non-starchy vegetables:</span></strong><span data-dcnode-id="760" instrument_node=""> Cauliflower, cabbage, broccoli, Brussels sprouts, green leafy vegetables, tomatoes, okra, onions, carrots, bell peppers, cucumber, celery, eggplant, garlic, green beans, leeks, mushrooms, etc.</span></li><li data-dcnode-id="755"><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Low-sugar fruits:</span></strong><span data-dcnode-id="756" instrument_node=""> Apples, oranges, berries (all), peaches, grapefruit, pears, plums, prunes, prickly pear cactus, red grapes.</span></li><li data-dcnode-id="748"><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Probiotic foods:</span></strong><span data-dcnode-id="752" instrument_node=""> Sugar-free, fruit-flavored, plain and low-fat yogurt (such as Greek-style), Yakult, </span><a class="content-link css-5r4717" data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/9-health-benefits-of-kefir"><span data-dcnode-id="751" instrument_node="">kefir</span></a><span data-dcnode-id="749" instrument_node="">, low-fat acidophilus milk, tempeh, reduced-salt miso, kimchi.</span></li><li data-dcnode-id="744"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Oils:</span></strong><span data-dcnode-id="745" instrument_node=""> Olive and flaxseed oil.</span></li><li data-dcnode-id="740"><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Condiments:</span></strong><span data-dcnode-id="741" instrument_node=""> Salsa, light soy sauce, fat-free sour cream, Truvia, sugar-free jams, vegetable cooking spray, vinegar, fat-free salad dressings, salt, pepper, mustard, all herbs and spices, low-carb ketchup and marinara sauce.</span></li></ul><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">It’s worth mentioning that you can only choose eggs as a protein option twice per week.</span></p><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Serving sizes may vary and some foods are restricted to a certain number of servings per day. For example, you may eat only two servings of low-sugar fruits and probiotic foods per day.</span></p><h3 data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Foods to eat during the Activate cycle</span></h3><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">In addition to the Accelerate options, you can add the following options during the Activate cycle:</span></p><ul class="hl-long-line" data-dcnode-id="692"><li data-dcnode-id="724"><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Shellfish:</span></strong><span data-dcnode-id="728" instrument_node=""> Crabs, clams, oysters, mussels, </span><a class="content-link css-5r4717" data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/scallops"><span data-dcnode-id="727" instrument_node="">scallops</span></a><span data-dcnode-id="725" instrument_node="">, shrimp.</span></li><li data-dcnode-id="720"><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Beef (lean cuts):</span></strong><span data-dcnode-id="721" instrument_node=""> Flank, top sirloin, top round, eye of the round, round tip, top loin, lean ground beef.</span></li><li data-dcnode-id="716"><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Pork (lean cuts):</span></strong><span data-dcnode-id="717" instrument_node=""> Sirloin chops, boneless loin roast and top or center loin chops.</span></li><li data-dcnode-id="712"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Lamb (lean cuts):</span></strong><span data-dcnode-id="713" instrument_node=""> Shanks and sirloin roast.</span></li><li data-dcnode-id="708"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Veal (lean cuts):</span></strong><span data-dcnode-id="709" instrument_node=""> Cutlet.</span></li><li data-dcnode-id="701"><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Grains:</span></strong><span data-dcnode-id="705" instrument_node=""> Amaranth, barley (pearled), </span><a class="content-link css-5r4717" data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/11-proven-benefits-of-quinoa"><span data-dcnode-id="704" instrument_node="">quinoa</span></a><span data-dcnode-id="702" instrument_node="">, bulgur, couscous, brown rice, cream of wheat, grits, basmati rice, millet oat bran, old-fashioned oatmeal.</span></li><li data-dcnode-id="697"><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Legumes:</span></strong><span data-dcnode-id="698" instrument_node=""> Black beans, black-eyed peas, butter beans, garbanzo beans (chickpeas), great northern beans, kidney beans, lentils, lima beans (baby), navy beans, peas, pinto beans, soybeans, split peas.</span></li><li data-dcnode-id="693"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Starchy vegetables:</span></strong><span data-dcnode-id="694" instrument_node=""> Breadfruit, potato, sweet potato, corn, taro, winter squash, yam.</span></li></ul><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Grains, legumes and starchy vegetables can only be consumed on activate days, and one serving of grains and legumes is a 1/2 cup cooked.</span></p><h3 data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Foods to eat During the Achieve cycle</span></h3><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">During the Achieve cycle, you may choose any foods from the previous two cycles, plus the options below:</span></p><ul class="hl-long-line" data-dcnode-id="627"><li data-dcnode-id="682"><strong data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Meats:</span></strong><span data-dcnode-id="683" instrument_node=""> Cornish hen, quail pheasant, Canadian bacon and reduced-fat turkey bacon, sausage or lunch meat.</span></li><li data-dcnode-id="678"><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Breads:</span></strong><span data-dcnode-id="679" instrument_node=""> Cracked-wheat, fiber-enriched, gluten-free, multi-grain, oat-bran, sugar-free, pumpernickel or rye bread, pita pocket, whole-wheat tortilla, whole-grain bagel.</span></li><li data-dcnode-id="674"><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">High-fiber cereals:</span></strong><span data-dcnode-id="675" instrument_node=""> All-Bran, All-Bran Extra, All-Bran Buds, Fiber One, gluten-free cold cereals, low-sugar granola.</span></li><li data-dcnode-id="667"><strong data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Pasta and noodles:</span></strong><span data-dcnode-id="671" instrument_node=""> Whole-wheat pasta, gluten-free pasta, </span><a class="content-link css-5r4717" data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/low-carb-pasta"><span data-dcnode-id="670" instrument_node="">vegetable-based pasta</span></a><span data-dcnode-id="668" instrument_node="">, high-fiber pasta, udon noodles.</span></li><li data-dcnode-id="663"><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Vegetables:</span></strong><span data-dcnode-id="664" instrument_node=""> Virtually any vegetable, including alfalfa, broccoli sprouts, chilis, cilantro, fennel, jicama, pea pods, radishes, rhubarb, rutabaga, summer squash, swiss chard, zucchini, kelp and other edible seaweeds, etc.</span></li><li data-dcnode-id="656"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Fruits:</span></strong><span data-dcnode-id="660" instrument_node=""> Virtually any fresh fruit, including bananas, cherries, apricots, currants, figs, kiwi, mango, </span><a class="content-link css-5r4717" data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/8-benefits-of-guavas"><span data-dcnode-id="659" instrument_node="">guava</span></a><span data-dcnode-id="657" instrument_node="">, papaya, pineapple, tangerine, tangelo, etc.</span></li><li data-dcnode-id="652"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Low-calorie cheeses:</span></strong><span data-dcnode-id="653" instrument_node=""> Brie, Camembert, Fontina, low-fat cheddar, Edam, feta, goat, Limburger, part-skim mozzarella, low-fat cottage cheese, low-fat ricotta cheese.</span></li><li data-dcnode-id="648"><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Milks:</span></strong><span data-dcnode-id="649" instrument_node=""> Low-fat milk, sugar-free rice milk, almond milk, soy milk.</span></li><li data-dcnode-id="644"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Oils:</span></strong><span data-dcnode-id="645" instrument_node=""> Canola and walnut oil.</span></li><li data-dcnode-id="640"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Condiments:</span></strong><span data-dcnode-id="641" instrument_node=""> Light mayonnaise, mayonnaise, reduced-fat salad dressings.</span></li><li data-dcnode-id="636"><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Other fat options:</span></strong><span data-dcnode-id="637" instrument_node=""> Raw nuts or seeds, avocado, reduced-calorie margarines, trans-fat-free margarine.</span></li><li data-dcnode-id="632"><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Optional snacks:</span></strong><span data-dcnode-id="633" instrument_node=""> Frozen fruit bar, Fudgesicle (100-calorie bar), granola bar (reduced-sugar and -fat), light microwave popcorn, Skinny Cow ice cream sandwich, sugar-free pudding cup.</span></li><li data-dcnode-id="628"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Alcohol (1 drink per day):</span></strong><span data-dcnode-id="629" instrument_node=""> 5 ounces (150 ml) of wine, 12 ounces (355 ml) of beer, 1.5 ounces (45 ml) of hard liquor.</span></li></ul><h3 data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Foods to eat During the Arrive cycle</span></h3><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The Arrive cycle allows all of the food options mentioned above with the option of eating three of your favorite meals from Friday dinner to Sunday dinner.</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">You’re also allowed the following:</span></p><ul class="hl-long-line" data-dcnode-id="611"><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">One to two alcoholic drinks on weekends.</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">The option to swap main meals for broth-based soups.</span></li><li data-dcnode-id="612"><span data-dcnode-id="616" instrument_node="">The option to substitute one fruit serving for a 3/4 cup (180 ml) of unsweetened </span><a class="content-link css-5r4717" data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/fruit-juice-is-just-as-bad-as-soda"><span data-dcnode-id="615" instrument_node="">fruit juice</span></a><span data-dcnode-id="613" instrument_node=""> or 1 cup (240 ml) of vegetable juice.</span></li></ul><blockquote class="css-pc7ote" data-dcnode-id="606"><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Summary</span></strong><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">The 17 Day Diet becomes progressively less restrictive through its four cycles and reintroduces many staple foods, such as legumes, grains, pastas, breads and others.</span></p></blockquote><div class="css-20w1gi" data-dcnode-id="600"><aside class="css-0 css-0" data-dcnode-id="601"><div data-dcnode-id="602"><div class="css-1sq15os" data-dcnode-id="603" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="605"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="604" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="500"><span data-dcnode-id="598" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="594"><div data-dcnode-id="595"><a class="chartbeat-section" data-dcnode-id="596" name="sample-menu"><span data-dcnode-id="597" instrument_node="">Sample menu</span></a></div></h2><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Here is a one-day sample menu for each cycle of the 17 Day Diet.</span></p><h3 data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Accelerate cycle</span></h3><ul class="hl-long-line" data-dcnode-id="570"><li data-dcnode-id="583"><strong data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Breakfast:</span></strong><span data-dcnode-id="587" instrument_node=""> 6 ounces (170 grams) of plain, low-fat yogurt, 1 cup (150 grams) of </span><a class="content-link css-5r4717" data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/11-reasons-to-eat-berries"><span data-dcnode-id="586" instrument_node="">berries</span></a><span data-dcnode-id="584" instrument_node=""> and 1 cup (240 ml) of green tea.</span></li><li data-dcnode-id="579"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Lunch:</span></strong><span data-dcnode-id="580" instrument_node=""> Grilled chicken breast with tossed salad drizzled with 2 tablespoons (30 ml) of balsamic vinegar.</span></li><li data-dcnode-id="575"><strong data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Dinner:</span></strong><span data-dcnode-id="576" instrument_node=""> Grilled or baked chicken with steamed vegetables and 1 cup (240 ml) of green tea.</span></li><li data-dcnode-id="571"><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Snacks:</span></strong><span data-dcnode-id="572" instrument_node=""> 1 fruit of your choice and 1 serving of a probiotic food of your choice.</span></li></ul><h3 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Activate cycle</span></h3><ul class="hl-long-line" data-dcnode-id="551"><li data-dcnode-id="564"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Breakfast:</span></strong><span data-dcnode-id="565" instrument_node=""> 1/2 cup (230 grams) of cooked oatmeal, 4 scrambled egg whites, 1 peach and 1 cup (240 ml) of green tea.</span></li><li data-dcnode-id="560"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Lunch:</span></strong><span data-dcnode-id="561" instrument_node=""> Shrimp salad drizzled with 2 tablespoons (30 ml) of balsamic vinegar, 1 medium baked sweet potato and 1 cup (240 ml) of green tea.</span></li><li data-dcnode-id="556"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Dinner:</span></strong><span data-dcnode-id="557" instrument_node=""> Pork sirloin chops (broiled or grilled), steamed veggies and 1 cup (240 ml) of green tea.</span></li><li data-dcnode-id="552"><strong data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Snacks:</span></strong><span data-dcnode-id="553" instrument_node=""> 1 cup (150 grams) of blueberries and 1 cup (240 ml) of kefir.</span></li></ul><h3 data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Achieve cycle</span></h3><ul class="hl-long-line" data-dcnode-id="529"><li data-dcnode-id="545"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Breakfast:</span></strong><span data-dcnode-id="546" instrument_node=""> 1 slice of whole-wheat toast, 1 boiled egg, 1 cup (150 grams) of berries and 1 cup (240 ml) of green tea.</span></li><li data-dcnode-id="538"><strong data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Lunch:</span></strong><span data-dcnode-id="542" instrument_node=""> Tuna sandwich, 1 pear and 1 cup (240 ml) of </span><a class="content-link css-5r4717" data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/top-10-evidence-based-health-benefits-of-green-tea"><span data-dcnode-id="541" instrument_node="">green tea</span></a><span data-dcnode-id="539" instrument_node="">.</span></li><li data-dcnode-id="534"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Dinner:</span></strong><span data-dcnode-id="535" instrument_node=""> Sesame fish, steamed vegetables of your choice and 1 cup (240 ml) of green tea.</span></li><li data-dcnode-id="530"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Snacks:</span></strong><span data-dcnode-id="531" instrument_node=""> 1 frozen fruit bar and 6 ounces (170 grams) of yogurt.</span></li></ul><h3 data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Arrive cycle (Friday)</span></h3><ul class="hl-long-line" data-dcnode-id="507"><li data-dcnode-id="523"><strong data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Breakfast:</span></strong><span data-dcnode-id="524" instrument_node=""> 2 poached eggs, 1 pear and 1 cup (240 ml) of green tea.</span></li><li data-dcnode-id="519"><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Lunch:</span></strong><span data-dcnode-id="520" instrument_node=""> Baked turkey breast, a fresh garden salad drizzled with 1 tablespoon (15 ml) of flaxseed oil, 6 ounces (170 grams) of yogurt and 1 cup (240 ml) of green tea.</span></li><li data-dcnode-id="515"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Dinner:</span></strong><span data-dcnode-id="516" instrument_node=""> Dinner out with friends; for example, vegetable lasagna, tossed salad with blue cheese dressing, two 5-ounce (150-ml) glasses of red wine and 1 serving of tiramisu.</span></li><li data-dcnode-id="508"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Snacks:</span></strong><span data-dcnode-id="512" instrument_node=""> 1 </span><a class="content-link css-5r4717" data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/10-health-benefits-of-apples"><span data-dcnode-id="511" instrument_node="">apple</span></a><span data-dcnode-id="509" instrument_node=""> and 1 cup (240 ml) of acidophilus milk or 6 ounces (170 grams) of yogurt.</span></li></ul><blockquote class="css-pc7ote" data-dcnode-id="502"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Summary</span></strong><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">The above menus provide you with an idea of what a typical day at each cycle of the 17 Day Diet is like.</span></p></blockquote><div data-dcnode-id="501" id="threequarter-of-article"></div></div><div class="css-0" data-dcnode-id="483"><span data-dcnode-id="499" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="495"><div data-dcnode-id="496"><a class="chartbeat-section" data-dcnode-id="497" name="bottom-line"><span data-dcnode-id="498" instrument_node="">The bottom line</span></a></div></h2><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The 17 Day Diet is a weight loss program that promises quick results by switching up your food combinations and calorie intake through different cycles.</span></p><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">It aids weight loss by encouraging whole, unprocessed foods and exercise. Yet, many of its claims and rules are not supported by high-quality scientific evidence.</span></p><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">What’s more, its effectiveness at maintaining weight loss is questionable, as it involves life-long dieting.</span></p><p data-dcnode-id="484"><span data-dcnode-id="488" instrument_node="">Instead, adopting </span><a class="content-link css-5r4717" data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/healthy-eating-for-beginners"><span data-dcnode-id="487" instrument_node="">healthy habits</span></a><span data-dcnode-id="485" instrument_node=""> — such as simply eating whole foods, limiting refined sugar and exercising regularly — may be more effective for maintaining weight loss in the long run.</span></p></div></article><div data-dcnode-id="478" id="m6cb373f8-c001-4523-94cf-2ea32ba15504"><div data-dcnode-id="479"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-noom-social-driver-copy-test" data-dcnode-id="480" data-sub-id="diets_hl_bot_us_noom_socialproof_healthgoalscopy_37302" data-widget-id="a32578e5-9081-4c0d-be90-f107208b4b2c"><iframe class="myFinance-iframe" data-dcnode-id="481" data-loaded="0" data-src="https://inline.healthline.com/r/ssr/a32578e5-9081-4c0d-be90-f107208b4b2c?utm_campaign=hl-noom-social-driver-copy-test&amp;utm_medium=embed&amp;selector=%23m6cb373f8-c001-4523-94cf-2ea32ba15504+%3E+div+%3E+div&amp;csid=6ebb981b-f8fd-457b-aeab-301fa45c381e&amp;caid=1f3a8356-54bd-4376-b5be-ad768a9aba83&amp;ciid=a94c2e64-34c6-48e1-830d-46c84d4850c7&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vbnV0cml0aW9uLzE3LWRheS1kaWV0&amp;_mfuuid_=1beb8515-ecc3-4ae4-9ab2-4e2e5470315d&amp;width=584&amp;subId=diets_hl_bot_us_noom_socialproof_healthgoalscopy_37302" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/r/ssr/a32578e5-9081-4c0d-be90-f107208b4b2c%3Futm_campaign%3Dhl-noom-social-driver-copy-test%26utm_medium%3Dembed%26selector%3D%2523m6cb373f8-c001-4523-94cf-2ea32ba15504%2B%253E%2Bdiv%2B%253E%2Bdiv%26csid%3D6ebb981b-f8fd-457b-aeab-301fa45c381e%26caid%3D1f3a8356-54bd-4376-b5be-ad768a9aba83%26ciid%3Da94c2e64-34c6-48e1-830d-46c84d4850c7%26tenant%3Dwk_1Tqf7EYzOKyxm4Gvq042rU0Uky0%26srckey%3Dsrc_1Tqf7BF96WTbG5QbUndHWIgKoFo%26imre%3DaHR0cHM6Ly93d3cuaGV
