instrument_node=""></span><span data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Nutrition</span></span></span></div></section><div data-dcnode-id="492"><nav class="css-7u7i0a" data-dcnode-id="1512" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="1513"><li class="css-t753mo" data-dcnode-id="1535"><a class="css-1ggiqr2" data-dcnode-id="1536" href="#the-diet"><span data-dcnode-id="1537" instrument_node="">The diet</span></a></li><li class="css-t753mo" data-dcnode-id="1532"><a class="css-1ggiqr2" data-dcnode-id="1533" href="#method"><span data-dcnode-id="1534" instrument_node="">Method</span></a></li><li class="css-t753mo" data-dcnode-id="1529"><a class="css-1ggiqr2" data-dcnode-id="1530" href="#foods-to-eat-avoid"><span data-dcnode-id="1531" instrument_node="">Foods to eat &amp; avoid</span></a></li><li class="css-t753mo" data-dcnode-id="1526"><a class="css-1ggiqr2" data-dcnode-id="1527" href="#weight-loss"><span data-dcnode-id="1528" instrument_node="">Weight loss</span></a></li><li class="css-t753mo" data-dcnode-id="1523"><a class="css-1ggiqr2" data-dcnode-id="1524" href="#other-benefits"><span data-dcnode-id="1525" instrument_node="">Other benefits</span></a></li><li class="css-t753mo" data-dcnode-id="1520"><a class="css-1ggiqr2" data-dcnode-id="1521" href="#downsides"><span data-dcnode-id="1522" instrument_node="">Downsides</span></a></li><li class="css-t753mo" data-dcnode-id="1517"><a class="css-1ggiqr2" data-dcnode-id="1518" href="#sample-menu"><span data-dcnode-id="1519" instrument_node="">Sample menu</span></a></li><li class="css-t753mo" data-dcnode-id="1514"><a class="css-1ggiqr2" data-dcnode-id="1515" href="#bottom-line"><span data-dcnode-id="1516" instrument_node="">Bottom line</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="523"><div class="css-0" data-dcnode-id="1321"><span data-dcnode-id="1511" style="font-size:0;line-height:0"></span><h2 class="css-13i30ag" data-dcnode-id="1507"><div data-dcnode-id="1508"><a class="chartbeat-section" data-dcnode-id="1509" name="Healthline-diet-score:-3.25-out-of-5"><span data-dcnode-id="1510" instrument_node="">Healthline diet score: 3.25 out of 5</span></a></div></h2><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">The Banting diet dates back to 1862 and was touted as an almost miraculous way to treat obesity. Although slightly modified, it regained popularity in 2013 as a low carb, high fat (LCHF) way of eating.</span></p><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">The diet limits the intake of carbs almost entirely. It also promises to revert type 2 diabetes and high blood pressure, as well as improve your energy levels and sleep quality — all while causing drastic weight loss.</span></p><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">For some, the Banting diet becomes a way of life, but for others, limiting their carb intake is far too restrictive and unsustainable in the long term.</span></p><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">This article reviews the pros and cons of the Banting diet and tells you whether it works for weight loss.</span></p><div data-dcnode-id="1486"><figure class="css-yhe8zq" data-dcnode-id="1487"><span class="css-rwmw5v" data-dcnode-id="1488"><span class="css-mjp0j9" data-dcnode-id="1493"><picture class="css-16pk1is" data-dcnode-id="1494"><source data-dcnode-id="1498" media="(min-width: 1190px)" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2020/07/eggs-bacon-keto-avocado-1296x728-header.jpg?w=1575 750w"><source data-dcnode-id="1497" media="(min-width: 990px)" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2020/07/eggs-bacon-keto-avocado-1296x728-header.jpg?w=1575 750w"><source data-dcnode-id="1496" media="(min-width: 768px)" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2020/07/eggs-bacon-keto-avocado-1296x728-header.jpg?w=1845 879w"><img alt="Eggs with bacon low carb meal" class="css-1jytyml" data-dcnode-id="1495" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.healthline.com/wp-content/uploads/2020/07/eggs-bacon-keto-avocado-1296x728-header.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1489"><a class="icon-hl-pinterest css-1w9qmip" data-dcnode-id="1490" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=V0pUb7ZB5oA9-1&amp;url=https%3A%2F%2Fwww.healthline.com%2Fnutrition%2Fbanting-diet-review&amp;media=https%3A%2F%2Fpost.healthline.com%2Fwp-content%2Fuploads%2F2020%2F07%2Feggs-bacon-keto-avocado-1296x728-header.jpg&amp;description=Banting%20Diet%20Review%3A%20Does%20It%20Work%20for%20Weight%20Loss%3F" data-pin-log="button_pinit" data-share-url="https://post.healthline.com/wp-content/uploads/2020/07/eggs-bacon-keto-avocado-1296x728-header.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><blockquote class="css-pc7ote" data-dcnode-id="1452"><strong data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Diet review scorecard</span></strong><ul data-dcnode-id="1455"><li data-dcnode-id="1480"><strong data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Overall score:</span></strong><span data-dcnode-id="1481" instrument_node=""> 3.25</span></li><li data-dcnode-id="1476"><strong data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Weight loss:</span></strong><span data-dcnode-id="1477" instrument_node=""> 4</span></li><li data-dcnode-id="1472"><strong data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Healthy eating:</span></strong><span data-dcnode-id="1473" instrument_node=""> 2.75</span></li><li data-dcnode-id="1468"><strong data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Sustainability:</span></strong><span data-dcnode-id="1469" instrument_node=""> 2.5</span></li><li data-dcnode-id="1464"><strong data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Whole body health:</span></strong><span data-dcnode-id="1465" instrument_node=""> 2.5</span></li><li data-dcnode-id="1460"><strong data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Nutrition quality:</span></strong><span data-dcnode-id="1461" instrument_node=""> 4.75</span></li><li data-dcnode-id="1456"><strong data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Evidence-based:</span></strong><span data-dcnode-id="1457" instrument_node=""> 3</span></li></ul><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">BOTTOM LINE: The Banting diet eliminates one food group almost entirely. However, it encourages eating wholesome foods over processed ones, and its multiple communities may provide the needed support to sustain the diet in the long run.</span></p></blockquote><div data-dcnode-id="1322" id="mf4c896ad-56cb-4ff7-995f-4b56462648b8"><div data-dcnode-id="1323"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-diet-finder-quiz" data-dcnode-id="1324" data-sub-id="dietfinder_quiz_embedded_v1_34548" data-widget-id="a029d29d-f3d3-4af0-91af-5d7294a5e396"><iframe class="myFinance-iframe" data-dcnode-id="1325" data-loaded="1" data-src="https://inline.healthline.com/r/ssr/a029d29d-f3d3-4af0-91af-5d7294a5e396?utm_campaign=hl-diet-finder-quiz&amp;utm_medium=embed&amp;selector=%23mf4c896ad-56cb-4ff7-995f-4b56462648b8+%3E+div+%3E+div&amp;csid=2561c60d-99a4-408a-8503-d09aadc55539&amp;caid=47de6fa1-6557-4694-a284-7afc7cb308b6&amp;ciid=9500ea9e-df7d-46c2-991a-9f4daa6c6af0&amp;t based on your answers to 3 quick questions.</span></p></div></div><span data-dcnode-id="1369" instrument_node=""> </span><div class="col col-12" data-dcnode-id="1365" data-v-7f20d968=""><button class="v-btn v-btn--block v-btn--has-bg theme--light v-size--x-large primary mf-cta" data-dcnode-id="1366" data-v-7f20d968="" type="button"><span class="v-btn__content" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">FIND YOUR DIET</span></span></button></div></div></div><span data-dcnode-id="1362" instrument_node=""> </span></div></div><span data-dcnode-id="1358" instrument_node=""> </span><div class="footer-disclaimer-box px-5" data-dcnode-id="1356" data-v-2552d994=""><div data-dcnode-id="1357" data-v-2552d994=""></div></div></div><span data-dcnode-id="1354" instrument_node=""> </span><span data-dcnode-id="1350" instrument_node=""> </span></div></div><span data-dcnode-id="1346" instrument_node=""> </span><form action="https://www.platejoy.com/onboarding/healthline" data-dcnode-id="1345" data-v-2552d994="" method="post" target="_blank"></form></div><span data-dcnode-id="1343" instrument_node=""> </span><hr aria-orientation="horizontal" class="mx-5 divider--footer v-divider theme--light" data-dcnode-id="1342" data-v-2552d994="" role="separator"/></div></div></main></div></div><span data-dcnode-id="1336" instrument_node="">

</span><div data-dcnode-id="1329" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></div></div></div></div><div class="css-0" data-dcnode-id="1275"><span data-dcnode-id="1320" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1316"><div data-dcnode-id="1317"><a class="chartbeat-section" data-dcnode-id="1318" name="the-diet"><span data-dcnode-id="1319" instrument_node="">What is the Banting diet?</span></a></div></h2><p data-dcnode-id="1306"><span data-dcnode-id="1315" instrument_node="">The Banting diet was first prescribed to William Banting in 1862 by Dr. William Harvey as a weight loss diet (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1308" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1317063/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1314" instrument_node="">1</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1311"><span class="sro" data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1309"></span></hl-trusted-source><span data-dcnode-id="1307" instrument_node="">).</span></p><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">William Banting’s success with the diet led him to write a booklet that popularized the low carb strategy for weight loss, to the extent that the word “banting” became the name of the method, as well as a verb.</span></p><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Recently, Tim Noakes, a South African scientist and professor, brought the method back into the spotlight after trying the Banting diet himself and writing the book “Real Meal Revolution.” His take on the diet is referred to as Banting 2.0.</span></p><p data-dcnode-id="1297"><span data-dcnode-id="1301" instrument_node="">The original Banting diet included four daily meals, which mainly comprised protein and restricted carbs — 1 ounce (30 grams) of dry bread in every meal and 2–3 ounces (60–90 grams) of fruit as a snack. It restricted bread, beans, butter, milk, sugar, beer, and potatoes (</span><a class="content-link css-5r4717" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.org/details/9213277.nlm.nih.gov/page/n15/mode/2up" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1300" instrument_node="">2</span></a><span data-dcnode-id="1298" instrument_node="">).</span></p><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">However, Tim Noakes’ approach is slightly different. </span></p><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Banting 2.0 divides the process into four phases — observation, restoration, transformation, and preservation — and offers multiple food lists and structured meal plans to simplify the low carb approach.</span></p><p data-dcnode-id="1288"><span data-dcnode-id="1292" instrument_node="">It still restricts carbs to some extent, and its </span><a class="content-link css-5r4717" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/best-macronutrient-ratio"><span data-dcnode-id="1291" instrument_node="">macronutrient composition</span></a><span data-dcnode-id="1289" instrument_node=""> resembles the keto diet with less than 5–10% of your daily calories coming from carbs, 65–90% from fat, and 10–35% from protein. </span></p><p data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">Still, both versions of the diet promise extreme weight loss, higher energy levels, </span><a class="content-link css-5r4717" data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/natural-sleeping-remedies"><span data-dcnode-id="1286" instrument_node="">improved sleep quality</span></a><span data-dcnode-id="1284" instrument_node="">, reduced feelings of hunger, and increased feelings of overall well-being.</span></p><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">This article focuses on Noakes’ newer version of the Banting diet.</span></p><blockquote class="css-pc7ote" data-dcnode-id="1276"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Summary</span></strong><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">The Banting diet is a low carb, high fat diet that’s very similar to the keto diet. It claims to improve energy levels, sleep, and overall well-being while causing weight loss. </span></p></blockquote></div><div class="css-0" data-dcnode-id="1165"><span data-dcnode-id="1274" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1270"><div data-dcnode-id="1271"><a class="chartbeat-section" data-dcnode-id="1272" name="method"><span data-dcnode-id="1273" instrument_node="">How to follow the Banting diet</span></a></div></h2><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">The Banting diet is divided into four phases that are meant to ease the transition into a LCHF way of life.</span></p><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">While you may follow the diet on your own, there’s an online course available for those who want to dive into it with a structured and personalized Banting meal plan.</span></p><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The course offers a step-by-step guide, recipes, optional daily support from a coach, and weekly mindset workshops to help manage temptations and make the transition smoother.</span></p><h3 data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Phase 1: Observation</span></h3><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">During this 1-week phase, you’re supposed to follow your current diet without making any modifications.</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node="">It encourages you to track and </span><a class="content-link css-5r4717" data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health-news/most-effective-way-to-lose-weight-takes-less-than-15-minutes-a-day"><span data-dcnode-id="1258" instrument_node="">journal everything you eat</span></a><span data-dcnode-id="1256" instrument_node=""> to figure out how you respond to food.</span></p><h3 data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Phase 2: Restoration</span></h3><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">The restoration phase is meant to restore your gut health and get you used to the Banting way of eating.</span></p><p data-dcnode-id="1246"><span data-dcnode-id="1250" instrument_node="">This phase may last 2–12 weeks, depending on your </span><a class="content-link css-5r4717" data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/how-to-lose-weight-as-fast-as-possible"><span data-dcnode-id="1249" instrument_node="">weight loss</span></a><span data-dcnode-id="1247" instrument_node=""> goal. Overall, you should follow it for 1 week for every 11 pounds (5 kg) of weight you want to lose.</span></p><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">During this time, you’ll be introduced to a series of food lists. You’re meant to eliminate all foods from the Red and Light Red lists and instead rely on those on the Green and Orange lists.</span></p><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">One plus is that there’s no calorie counting or portion control in this phase.</span></p><h3 data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Phase 3: Transformation</span></h3><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">The transformation phase introduces you to the original Banting diet.</span></p><p data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node="">It takes your newly developed eating habits and cuts your carb intake to achieve </span><a class="content-link css-5r4717" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/10-signs-and-symptoms-of-ketosis"><span data-dcnode-id="1236" instrument_node="">ketosis</span></a><span data-dcnode-id="1234" instrument_node="">, which is meant to get you into a rapid fat-burning mode.</span></p><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">To make this possible, the method encourages you to stick to foods on the Green list, while adding those on the Orange list to the no-go foods — along with the Red lists mentioned before.</span></p><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">This third phase lasts as long as it takes you to reach your desired weight, and you should track your meals for a couple of days every two weeks.</span></p><p data-dcnode-id="1224"><span data-dcnode-id="1228" instrument_node="">Additionally, the phase includes “lifestyle hacks,” such as </span><a class="content-link css-5r4717" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/intermittent-fasting-and-keto"><span data-dcnode-id="1227" instrument_node="">intermittent fasting</span></a><span data-dcnode-id="1225" instrument_node="">, exercise tips, and sleep and meditation to avoid reaching a weight loss plateau.</span></p><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">The transformation phase is supposed to improve mental clarity, sleep, acne, and skin irritations, as well as even eradicate joint pain.</span></p><h3 data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Phase 4: Preservation</span></h3><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">This final phase, which is supposed to last indefinitely, starts once you’ve reached your desired weight. It’s meant to help you maintain your new weight in the long run.</span></p><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">This is a more flexible phase, as you’ll be able to reintroduce foods that are not allowed in the previous phase. The goal is to determine which ones you can safely eat without gaining weight.</span></p><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Again, there’s no food tracking during this phase, and you may follow the food lists as follows:</span></p><ul data-dcnode-id="1193"><li data-dcnode-id="1210"><strong data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Green:</span></strong><span data-dcnode-id="1211" instrument_node=""> no limitations</span></li><li data-dcnode-id="1206"><strong data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Orange:</span></strong><span data-dcnode-id="1207" instrument_node=""> eat in moderation</span></li><li data-dcnode-id="1202"><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Light Red:</span></strong><span data-dcnode-id="1203" instrument_node=""> hardly ever or on special occasions</span></li><li data-dcnode-id="1198"><strong data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Red:</span></strong><span data-dcnode-id="1199" instrument_node=""> never</span></li><li data-dcnode-id="1194"><strong data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Gray:</span></strong><span data-dcnode-id="1195" instrument_node=""> it’s up to you</span></li></ul><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">You can always return to the previous phase if you feel like you have lost control of your weight.</span></p><blockquote class="css-pc7ote" data-dcnode-id="1186"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Summary</span></strong><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">The Banting diet is divided into four phases, but ultimately it’s meant to guide you into a new way of life. You start making changes in the second and third phases, and the fourth one allows a little flexibility.</span></p></blockquote><div data-dcnode-id="1166" id="me2a7ac37-bbdd-49cb-8db8-841067118bbb"><div data-dcnode-id="1167"><div data-dcnode-id="1168"><section class="css-11k39sg" data-dcnode-id="1169"><div class="css-1x6oboy" data-dcnode-id="1185"></div><div class="css-rp3d6" data-dcnode-id="1171"><div class="css-nafh3i" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">HEALTHLINE RESOURCES</span></div><div class="css-kp58b2" data-dcnode-id="1178"><div class="css-104k5nf" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Get free, 5-minute custom snack recipes</span></div><p class="css-1cr3nkl" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Let Healthline's team of nutritionists recommend snacks based on your dietary restrictions and food preferences</span></p></div><div class="css-8nu43k" data-dcnode-id="1172"><div class="css-l48fio" data-dcnode-id="1173"><a class="css-1a9vzfk" data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/1640/redirect%3Flp%3D328%26g%3D4%26link%3D1%26tc%3D120226%26subid%3Dsnackshuffle_middle_diettypes_952%26subid2%3D/nutrition/banting-diet-review%26correlationId%3Dbce008c4-369b-4239-8bba-38ccc331cd42" rel="noopener noreferrer sponsored" target="_blank"><span class="css-14ktbsh" data-dcnode-id="1175"><span class="css-1huyk6v" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">TRY IT</span></span></span></a></div></div></div><div class="css-1tuviqo" data-dcnode-id="1170"></div></section></div></div></div></div><div class="css-0" data-dcnode-id="985"><span data-dcnode-id="1164" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1160"><div data-dcnode-id="1161"><a class="chartbeat-section" data-dcnode-id="1162" name="foods-to-eat-avoid"><span data-dcnode-id="1163" instrument_node="">Foods to eat and avoid</span></a></div></h2><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">The Banting diet provides multiple food lists to eat and avoid.</span></p><h3 data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Green list</span></h3><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">This list includes foods that you may eat without restriction.</span></p><ul data-dcnode-id="1121"><li data-dcnode-id="1147"><strong data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Fruits and vegetables:</span></strong><span data-dcnode-id="1151" instrument_node=""> leafy green vegetables, artichoke hearts, aubergine, asparagus, bean and Brussels sprouts, broccoli, green beans, cabbage, cauliflower, celery, chard, courgettes, cucumber, endive, fennel, garlic, germ squash, </span><a class="content-link css-5r4717" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/10-proven-benefits-of-kale"><span data-dcnode-id="1150" instrument_node="">kale</span></a><span data-dcnode-id="1148" instrument_node="">, leeks, lemon and lime, lettuce, mange tout, mushrooms, olives, onions, okra, palm hearts, peppers, radicchio, radishes, rhubarb, rocket, shallots, spinach, spring onions, snap peas, tomatoes, and turnips</span></li><li data-dcnode-id="1140"><strong data-dcnode-id="1142"><span data-dcnode-id="1146" instrument_node="">M</span><strong data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">eat, fish, and poultry</span></strong><span data-dcnode-id="1143" instrument_node="">:</span></strong><span data-dcnode-id="1141" instrument_node=""> all meat, poultry, fish, seafood, offal, and naturally cured meats (i.e., pancetta, salami, parma ham, bacon, jerky, coppa (capocollo), and biltong), eggs, homemade bone broth, and cheeses, such as Brie, Camembert, Gorgonzola, Roquefort, mozzarella, feta, ricotta, Cheddar, Gouda, Emmental, Parmesan, and pecorino</span></li><li data-dcnode-id="1136"><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Drinks:</span></strong><span data-dcnode-id="1137" instrument_node=""> caffeine-free herbal teas, flavored waters, and plain water</span></li><li data-dcnode-id="1130"><strong data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Condiments:</span></strong><span data-dcnode-id="1133" instrument_node=""> all kinds of vinegar and fermented soy sauce or </span><a class="content-link css-5r4717" data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/what-is-tamari"><span data-dcnode-id="1132" instrument_node="">tamari</span></a></li><li data-dcnode-id="1126"><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Fermented foods:</span></strong><span data-dcnode-id="1127" instrument_node=""> coconut yogurt and kefir, kefir butter and cheese, kimchi, milk kefir, naturally fermented pickles, and sauerkraut</span></li><li data-dcnode-id="1122"><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Fats:</span></strong><span data-dcnode-id="1123" instrument_node=""> any rendered animal fat, avocado, butter, ghee, cream, coconut oil, fruit and nut oils, mayonnaise, and seeds</span></li></ul><h3 data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Orange list</span></h3><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">According to the method, foods on the Orange list offer multiple health benefits but may hinder your weight loss journey if consumed without restriction. Thus, foods on this list are meant to be enjoyed in moderation.</span></p><ul data-dcnode-id="1082"><li data-dcnode-id="1113"><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Nuts:</span></strong><span data-dcnode-id="1114" instrument_node=""> all raw nuts and sugar-free nut butters</span></li><li data-dcnode-id="1109"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Dairy:</span></strong><span data-dcnode-id="1110" instrument_node=""> milk and milk substitutes, cottage and cream cheese, full fat yogurt, and sour cream</span></li><li data-dcnode-id="1102"><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Fruits:</span></strong><span data-dcnode-id="1106" instrument_node=""> apples, apricots, bananas, blueberries, blackberries, cherries, clementines, fresh figs, gooseberries, granadilla, grapes, guava, jackfruit, kiwi, </span><a class="content-link css-5r4717" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/kumquat"><span data-dcnode-id="1105" instrument_node="">kumquats</span></a><span data-dcnode-id="1103" instrument_node="">, litchis, loquats, mangoes, nectarines, orange, papaya, pears, peaches, persimmon, pineapple, plantain, plums, pomegranates, quinces, raspberries, starfruit, strawberries, tangerines, tamarind pulp, and watermelon</span></li><li data-dcnode-id="1098"><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Drinks:</span></strong><span data-dcnode-id="1099" instrument_node=""> caffeinated tea and coffee</span></li><li data-dcnode-id="1094"><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Legumes and pulses:</span></strong><span data-dcnode-id="1095" instrument_node=""> all legumes, alfalfa, beans, chickpeas, and lentils</span></li><li data-dcnode-id="1090"><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Fermented foods:</span></strong><span data-dcnode-id="1091" instrument_node=""> water kefir and kombucha</span></li><li data-dcnode-id="1083"><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Fruits and vegetables:</span></strong><span data-dcnode-id="1087" instrument_node=""> beetroot, butternut squash, baby corn, carrots, calabash, </span><a class="content-link css-5r4717" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/cassava"><span data-dcnode-id="1086" instrument_node="">cassava</span></a><span data-dcnode-id="1084" instrument_node="">, celeriac, corn, edamame, golden beets, Hubbard squash, jicama, parsnips, peas, potatoes, pumpkins, rutabagas, spaghetti squash, and sweet potatoes</span></li></ul><h3 data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Light Red list</span></h3><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">You should hardly ever consume foods on this list.</span></p><ul data-dcnode-id="1058"><li data-dcnode-id="1074"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Smoothies and vegetable juices:</span></strong><span data-dcnode-id="1075" instrument_node=""> fruit and yogurt smoothies without frozen yogurt or ice cream, as well as vegetable juices without added fruit juice</span></li><li data-dcnode-id="1067"><strong data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Treats and chocolate:</span></strong><span data-dcnode-id="1071" instrument_node=""> </span><a class="content-link css-5r4717" data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/7-health-benefits-dark-chocolate"><span data-dcnode-id="1070" instrument_node="">dark chocolate</span></a><span data-dcnode-id="1068" instrument_node=""> (80% and above), dried fruit, honey, and pure maple syrup</span></li><li data-dcnode-id="1063"><strong data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Gluten-free grains:</span></strong><span data-dcnode-id="1064" instrument_node=""> amaranth, arrowroot, buckwheat, bran, gluten-free pasta, millet, oats, popcorn, quinoa, rice, sorghum, quinoa, tapioca, and teff</span></li><li data-dcnode-id="1059"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Flours:</span></strong><span data-dcnode-id="1060" instrument_node=""> almond, coconut, corn, chickpea, pea, and rice flours, polenta, and maize meal</span></li></ul><h3 data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Red list</span></h3><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">This is probably the most important list, as it includes the foods you should never eat.</span></p><ul data-dcnode-id="1015"><li data-dcnode-id="1047"><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">General foods:</span></strong><span data-dcnode-id="1051" instrument_node=""> fast food, foods with </span><a class="content-link css-5r4717" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/too-much-sugar"><span data-dcnode-id="1050" instrument_node="">added sugar</span></a><span data-dcnode-id="1048" instrument_node="">, chips, and sugary condiments, such as ketchup, dressings, and marinades</span></li><li data-dcnode-id="1043"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Sweets:</span></strong><span data-dcnode-id="1044" instrument_node=""> all confectionery and non-dark chocolates, artificial sweeteners, agave, canned fruit, coconut sugar, cordials, fructose, glucose, jam, malt, rice malt syrup, sugar, and golden syrup</span></li><li data-dcnode-id="1039"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Gluten:</span></strong><span data-dcnode-id="1040" instrument_node=""> barley, bulgur, couscous, durum, einkorn, farina, graham flour, Khorasan wheat (kamut), matzo, orzo, rye, semolina, spelt, triticale, wheat, and wheat germ</span></li><li data-dcnode-id="1035"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Grain-based products:</span></strong><span data-dcnode-id="1036" instrument_node=""> all commercial breaded or battered foods, breakfast cereals, and all crackers</span></li><li data-dcnode-id="1031"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Drinks:</span></strong><span data-dcnode-id="1032" instrument_node=""> energy drinks, soft drinks, commercial juices, commercial iced teas, flavored milks, and milkshakes</span></li><li data-dcnode-id="1027"><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Dairy-related foods:</span></strong><span data-dcnode-id="1028" instrument_node=""> coffee creamers, commercial cheese spreads, condensed milk, ice cream, and commercial frozen yogurt</span></li><li data-dcnode-id="1020"><strong data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Fats:</span></strong><span data-dcnode-id="1024" instrument_node=""> butter spreads, </span><a class="content-link css-5r4717" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/is-canola-oil-healthy"><span data-dcnode-id="1023" instrument_node="">canola oil</span></a><span data-dcnode-id="1021" instrument_node="">, corn oil, cottonseed oil, margarine and shortening, rice bran oil, and sunflower and safflower oil</span></li><li data-dcnode-id="1016"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Processed meats:</span></strong><span data-dcnode-id="1017" instrument_node=""> highly processed sausages and meats cured with sugar</span></li></ul><h3 data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Gray list</span></h3><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">The Gray list contains foods that fit the Banting diet but would slow your progress, so they’re left to your discretion.</span></p><ul data-dcnode-id="991"><li data-dcnode-id="1007"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Treats:</span></strong><span data-dcnode-id="1008" instrument_node=""> Banting baked goods and sugar-free ice cream</span></li><li data-dcnode-id="1003"><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Sweeteners:</span></strong><span data-dcnode-id="1004" instrument_node=""> xylitol, erythritol, isomalt, stevia powder, and sucralose</span></li><li data-dcnode-id="996"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Drinks:</span></strong><span data-dcnode-id="1000" instrument_node=""> all </span><a class="content-link css-5r4717" data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/alcohol-good-or-bad"><span data-dcnode-id="999" instrument_node="">alcoholic beverages</span></a><span data-dcnode-id="997" instrument_node="">, protein shakes, and supplements</span></li><li data-dcnode-id="992"><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Vegetarian proteins:</span></strong><span data-dcnode-id="993" instrument_node=""> naturally fermented tofu, pea protein, and processed soy</span></li></ul><blockquote class="css-pc7ote" data-dcnode-id="986"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Summary</span></strong><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">The Banting diet encourages you to avoid highly processed foods and opt for wholesome ones instead. It also limits gluten, high sugar foods, starches, dairy, and caffeine.</span></p></blockquote></div><div class="css-0" data-dcnode-id="862"><span data-dcnode-id="984" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="980"><div data-dcnode-id="981"><a class="chartbeat-section" data-dcnode-id="982" name="weight-loss"><span data-dcnode-id="983" instrument_node="">Is it effective for weight loss?</span></a></div></h2><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">While there’s no research on the Banting diet itself, there’s plenty of scientific evidence supporting the LCHF approach for weight loss. </span></p><p data-dcnode-id="968"><span data-dcnode-id="977" instrument_node="">When restricting carbs, the body is stimulated to maximize fat oxidation to meet energy demands. This means that LCHF diets rely primarily on fats to produce energy (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="970" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/16436102/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="976" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="973"><span class="sro" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="971"></span></hl-trusted-source><span data-dcnode-id="969" instrument_node="">).</span></p><p data-dcnode-id="947"><span data-dcnode-id="967" instrument_node="">Research suggests that there may be two different mechanisms behind the LCHF diet’s success — </span><a class="content-link css-5r4717" data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/18-ways-reduce-hunger-appetite"><span data-dcnode-id="966" instrument_node="">increased feelings of fullness</span></a><span data-dcnode-id="964" instrument_node=""> and a specific metabolic advantage (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="957" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/28053201/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="963" instrument_node="">4</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="960"><span class="sro" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="958"></span></hl-trusted-source><span data-dcnode-id="956" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="949" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6233655/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="955" instrument_node="">5</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="952"><span class="sro" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="950"></span></hl-trusted-source><span data-dcnode-id="948" instrument_node="">).</span></p><p data-dcnode-id="937"><span data-dcnode-id="946" instrument_node="">Studies show people on LCHF diets given unrestricted access to foods don’t necessarily consume more calories than people on low fat, high carb (LFHC) diets because they tend to perceive less hunger, and thus, reduce their overall food intake (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="939" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/28053201/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="945" instrument_node="">4</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="942"><span class="sro" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="940"></span></hl-trusted-source><span data-dcnode-id="938" instrument_node="">).</span></p><p data-dcnode-id="919"><span data-dcnode-id="936" instrument_node="">Additionally, LCHF diets usually lead to a higher protein intake, which also promotes feelings of fullness, and fewer cases of rebound hypoglycemia or low blood sugar levels, a common cause of hunger in those following high carb diets (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="929" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/28053201/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="935" instrument_node="">4</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="932"><span class="sro" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="930"></span></hl-trusted-source><span data-dcnode-id="928" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="921" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/20847729/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="927" instrument_node="">6</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="924"><span class="sro" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="922"></span></hl-trusted-source><span data-dcnode-id="920" instrument_node="">).</span></p><p data-dcnode-id="901"><span data-dcnode-id="918" instrument_node="">Regarding the alleged metabolic advantage, scientists attribute it to either an increased thermogenic effect from the protein intake, a higher protein turnover for gluconeogenesis, or loss of energy through the excretion of ketones in sweat or urine (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="911" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK499830/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="917" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="914"><span class="sro" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="912"></span></hl-trusted-source><span data-dcnode-id="910" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="903" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/15867892/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="909" instrument_node="">4</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="906"><span class="sro" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="904"></span></hl-trusted-source><span data-dcnode-id="902" instrument_node="">).</span></p><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">The thermogenic effect of foods is the energy needed to digest, absorb, and dispose of its nutrients, while gluconeogenesis is the production of glucose from fats or proteins.</span></p><p data-dcnode-id="881"><span data-dcnode-id="898" instrument_node="">Also, by eliminating foods on both Red lists, you’re more likely to lose weight faster, since processed and sugary foods are associated with excess weight (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="891" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/29729673/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="897" instrument_node="">7</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="894"><span class="sro" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="892"></span></hl-trusted-source><span data-dcnode-id="890" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="883" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5787353/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="889" instrument_node="">8</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="886"><span class="sro" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="884"></span></hl-trusted-source><span data-dcnode-id="882" instrument_node="">).</span></p><p data-dcnode-id="868"><span data-dcnode-id="880" instrument_node="">Finally, the lifestyle hacks mentioned above, such as intermittent fasting, can also contribute to weight loss, as it has been shown to </span><a class="content-link css-5r4717" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/10-ways-to-boost-metabolism"><span data-dcnode-id="879" instrument_node="">increase metabolism</span></a><span data-dcnode-id="877" instrument_node=""> and help burn more fat (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="870" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5674160/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="876" instrument_node="">9</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="873"><span class="sro" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="871"></span></hl-trusted-source><span data-dcnode-id="869" instrument_node="">).</span></p><blockquote class="css-pc7ote" data-dcnode-id="863"><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Summary</span></strong><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">The Banting diet may help you lose weight because it mixes a series of strategies that promote fat loss, such as increasing your feeling of fullness, eliminating processed and sugary foods, and practicing intermittent fasting.</span></p></blockquote></div><div class="css-0" data-dcnode-id="715"><span data-dcnode-id="861" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="857"><div data-dcnode-id="858"><a class="chartbeat-section" data-dcnode-id="859" name="other-benefits"><span data-dcnode-id="860" instrument_node="">Additional benefits</span></a></div></h2><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Following a LCHF diet like the Banting diet may lead to other potential health benefits.</span></p><h3 data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Improved metabolic markers</span></h3><p data-dcnode-id="849"><a class="content-link css-5r4717" data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/lchf-diet-plan-and-menu"><span data-dcnode-id="852" instrument_node="">LCHF diets</span></a><span data-dcnode-id="850" instrument_node=""> may help reduce risk factors for both type 2 diabetes and heart disease.</span></p><p data-dcnode-id="823"><span data-dcnode-id="848" instrument_node="">Scientific evidence shows that they may reduce fasting insulin and blood sugar levels and improve insulin sensitivity, which is why LCHF diets are gaining popularity as potential first-line treatments for type 2 diabetes (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="841" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/28053201/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="847" instrument_node="">4</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="844"><span class="sro" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="842"></span></hl-trusted-source><span data-dcnode-id="840" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="833" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5959976/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="839" instrument_node="">10</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="836"><span class="sro" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="834"></span></hl-trusted-source><span data-dcnode-id="832" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="825" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/30289048/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="831" instrument_node="">11</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="828"><span class="sro" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="826"></span></hl-trusted-source><span data-dcnode-id="824" instrument_node="">).</span></p><p data-dcnode-id="794"><span data-dcnode-id="822" instrument_node="">They also seem to decrease triglyceride and high blood pressure levels, increase HDL (good) cholesterol, and reverse </span><a class="content-link css-5r4717" data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/nonalcoholic-fatty-liver-disease"><span data-dcnode-id="821" instrument_node="">nonalcoholic fatty liver disease</span></a><span data-dcnode-id="819" instrument_node=""> (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="812" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK499830/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="818" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="815"><span class="sro" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="813"></span></hl-trusted-source><span data-dcnode-id="811" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="804" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/28053201/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="810" instrument_node="">4</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="807"><span class="sro" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="805"></span></hl-trusted-source><span data-dcnode-id="803" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="796" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/23651522/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="802" instrument_node="">12</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="799"><span class="sro" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="797"></span></hl-trusted-source><span data-dcnode-id="795" instrument_node="">).</span></p><p data-dcnode-id="784"><span data-dcnode-id="793" instrument_node="">For example, in one 12-week study in 26 people with excess weight, those following a LCHF diet improved their glucose, insulin resistance, triglyceride, HDL (good) cholesterol, and HbA1c levels, compared with those in the HCLF group (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="786" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/28700832/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="792" instrument_node="">13</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="789"><span class="sro" data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="787"></span></hl-trusted-source><span data-dcnode-id="785" instrument_node="">).</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">The HbA1c test — or glycated hemoglobin test — measures your average blood sugar levels over the past 3 months, and it’s used as an evaluation tool for blood sugar control in people with diabetes.</span></p><h3 data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Focuses on wholesome foods</span></h3><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">By restricting processed and sugary foods, the diet almost automatically leads to a higher intake of wholesome, more nutritious foods.</span></p><p data-dcnode-id="741"><span data-dcnode-id="777" instrument_node="">High intakes of processed foods are associated with increased </span><a class="content-link css-5r4717" data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/oxidative-stress"><span data-dcnode-id="776" instrument_node="">oxidative stress</span></a><span data-dcnode-id="774" instrument_node=""> and inflammation, leading to the development of non-communicable chronic diseases (NCD) like cancer and heart disease and thus increasing the risk of mortality (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="767" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5872610/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="773" instrument_node="">14</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="770"><span class="sro" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="768"></span></hl-trusted-source><span data-dcnode-id="766" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="759" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/30742202/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="765" instrument_node="">15</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="762"><span class="sro" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="760"></span></hl-trusted-source><span data-dcnode-id="758" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="751" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/31142457/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="757" instrument_node="">16</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="754"><span class="sro" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="752"></span></hl-trusted-source><span data-dcnode-id="750" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="743" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5811844/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="749" instrument_node="">17</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="746"><span class="sro" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="744"></span></hl-trusted-source><span data-dcnode-id="742" instrument_node="">).</span></p><p data-dcnode-id="723"><span data-dcnode-id="740" instrument_node="">On the contrary, healthy eating patterns that focus on increasing fruit and vegetable intake seem to decrease the risk, as their nutrients help reduce oxidative stress and inflammation (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="733" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5872610/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="739" instrument_node="">14</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="736"><span class="sro" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="734"></span></hl-trusted-source><span data-dcnode-id="732" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="725" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/24631385/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="731" instrument_node="">18</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="728"><span class="sro" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="726"></span></hl-trusted-source><span data-dcnode-id="724" instrument_node="">).</span></p><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Thus, the Banting diet will most likely benefit your health.</span></p><blockquote class="css-pc7ote" data-dcnode-id="716"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Summary</span></strong><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The Banting diet limits carbs and promotes the intake of wholesome foods, which leads to numerous health improvements. </span></p></blockquote></div><div class="css-0" data-dcnode-id="620"><span data-dcnode-id="714" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="710"><div data-dcnode-id="711"><a class="chartbeat-section" data-dcnode-id="712" name="downsides"><span data-dcnode-id="713" instrument_node="">Potential downsides</span></a></div></h2><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">While the Banting diet offers numerous health benefits, its potential downsides cannot be ignored.</span></p><h3 data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Highly restrictive</span></h3><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">Aside from eliminating processed and sugary foods, the Banting diet’s food lists also restrict grains and limit fruits, </span><a class="content-link css-5r4717" data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/healthiest-beans-legumes"><span data-dcnode-id="704" instrument_node="">legumes</span></a><span data-dcnode-id="702" instrument_node="">, dairy, and nuts.</span></p><p data-dcnode-id="675"><span data-dcnode-id="700" instrument_node="">Evidence shows that consumption of those food groups may be beneficial for the prevention of type 2 diabetes, heart disease, and certain types of cancer (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="693" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5310957/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="699" instrument_node="">19</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="696"><span class="sro" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="694"></span></hl-trusted-source><span data-dcnode-id="692" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="685" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4608274/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="691" instrument_node="">20</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="688"><span class="sro" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="686"></span></hl-trusted-source><span data-dcnode-id="684" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="677" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5905602/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="683" instrument_node="">21</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="680"><span class="sro" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="678"></span></hl-trusted-source><span data-dcnode-id="676" instrument_node="">).</span></p><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Additionally, by restricting legumes, dairy, and nuts, and classifying tofu as a “gray area food,” the diet makes it difficult for vegans and vegetarians to follow the plan.</span></p><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Finally, the restrictive nature of the diet can make long-term maintenance difficult, which could end up hindering its effectiveness.</span></p><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">However, some may find that the support from online communities or the course’s coaches and webinars is all they need to keep them going.</span></p><h3 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Long-term evidence is lacking</span></h3><p data-dcnode-id="649"><span data-dcnode-id="666" instrument_node="">While the benefits of a LCHF eating patterin like the Banting diet seem promising, there’s not enough human evidence to support its safety in the long run (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="659" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK499830/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="665" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="662"><span class="sro" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="660"></span></hl-trusted-source><span data-dcnode-id="658" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="651" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5959976/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="657" instrument_node="">10</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="654"><span class="sro" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="652"></span></hl-trusted-source><span data-dcnode-id="650" instrument_node="">).</span></p><p data-dcnode-id="631"><span data-dcnode-id="648" instrument_node="">Some human and animal studies suggest potential adverse long-term effects of LCHF diets on LDL (bad) cholesterol levels and blood vessel elasticity, which may be detrimental to heart health (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="641" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5959976/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="647" instrument_node="">10</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="644"><span class="sro" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="642"></span></hl-trusted-source><span data-dcnode-id="640" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="633" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5959976/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="639" instrument_node="">22</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="636"><span class="sro" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="634"></span></hl-trusted-source><span data-dcnode-id="632" instrument_node="">). </span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">However, more research is needed to understand how low carb diets affect heart health over longer time periods.</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Therefore, some believe that the potential downsides of following this type of diet in the long term outweigh its potential benefits.</span></p><blockquote class="css-pc7ote" data-dcnode-id="622"><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Summary</span></strong><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The Banting diet restricts many food groups associated with multiple health benefits, and there’s little evidence on its long-term health effects.</span></p></blockquote><div data-dcnode-id="621" id="threequarter-of-article"></div></div><div class="css-0" data-dcnode-id="541"><span data-dcnode-id="619" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="615"><div data-dcnode-id="616"><a class="chartbeat-section" data-dcnode-id="617" name="sample-menu"><span data-dcnode-id="618" instrument_node="">Sample menu</span></a></div></h2><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Here’s what 3 days on the Banting diet would look like while following Phase 2 (Restoration phase):</span></p><h3 data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Day 1</span></h3><ul data-dcnode-id="591"><li data-dcnode-id="607"><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Breakfast:</span></strong><span data-dcnode-id="608" instrument_node=""> 2–3 eggs — scrambled or fried — with avocado, cheese, tomato, and bacon; bulletproof coffee is also allowed</span></li><li data-dcnode-id="603"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Lunch:</span></strong><span data-dcnode-id="604" instrument_node=""> grilled fish fillet with sweet potato wedges and vegetable stir-fry</span></li><li data-dcnode-id="596"><strong data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Snack:</span></strong><span data-dcnode-id="600" instrument_node=""> </span><a class="content-link css-5r4717" data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/best-greek-yogurt"><span data-dcnode-id="599" instrument_node="">Greek yogurt</span></a><span data-dcnode-id="597" instrument_node=""> and macadamia nuts</span></li><li data-dcnode-id="592"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Dinner:</span></strong><span data-dcnode-id="593" instrument_node=""> a serving of protein of your choice — beef, pork, chicken, or fish — served with sautéed vegetables, a side salad, and cauliflower mash</span></li></ul><h3 data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Day 2</span></h3><ul data-dcnode-id="570"><li data-dcnode-id="585"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Breakfast:</span></strong><span data-dcnode-id="586" instrument_node=""> 1/4 cup of Banting granola — toasted nuts and seeds with some spices — with yogurt and 1–2 hard-boiled eggs</span></li><li data-dcnode-id="581"><strong data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Lunch:</span></strong><span data-dcnode-id="582" instrument_node=""> a large grilled chicken salad with cottage cheese</span></li><li data-dcnode-id="575"><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Snack:</span></strong><span data-dcnode-id="578" instrument_node=""> </span><a class="content-link css-5r4717" data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/apple-and-peanut-butter"><span data-dcnode-id="577" instrument_node="">apple slices with nut butter</span></a></li><li data-dcnode-id="571"><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Dinner:</span></strong><span data-dcnode-id="572" instrument_node=""> salmon fillet with avocado and grilled asparagus</span></li></ul><h3 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Day 3</span></h3><ul data-dcnode-id="549"><li data-dcnode-id="564"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Breakfast:</span></strong><span data-dcnode-id="565" instrument_node=""> coconut milk smoothie with mango, papaya, and a handful of nuts</span></li><li data-dcnode-id="560"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Lunch:</span></strong><span data-dcnode-id="561" instrument_node=""> beef fajitas with grilled onions, mushrooms, and peppers, and a side salad</span></li><li data-dcnode-id="556"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Snack:</span></strong><span data-dcnode-id="557" instrument_node=""> 1–2 cups (240–480 mL) of bone broth</span></li><li data-dcnode-id="550"><strong data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Dinner:</span></strong><span data-dcnode-id="553" instrument_node=""> pulled pork lettuce wraps with a side of roasted </span><a class="content-link css-5r4717" data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/chickpeas-nutrition-benefits"><span data-dcnode-id="552" instrument_node="">chickpeas</span></a></li></ul><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Although snacks are included, the program’s advice is to avoid snacking and instead increase your previous meal’s fat intake to curb hunger.</span></p><blockquote class="css-pc7ote" data-dcnode-id="542"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Summary</span></strong><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">The Banting diet encourages you to eat three LCHF meals and only snack if necessary.</span></p></blockquote></div><div class="css-0" data-dcnode-id="524"><span data-dcnode-id="540" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="536"><div data-dcnode-id="537"><a class="chartbeat-section" data-dcnode-id="538" name="bottom-line"><span data-dcnode-id="539" instrument_node="">The bottom line</span></a></div></h2><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">The Banting diet is a type of low carb, high fat (LCHF) diet that mostly restricts starchy, processed, and sugary foods, instead promoting the intake of wholesome ones to lose weight rapidly.</span></p><p data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">Though there’s no scientific evidence on the diet itself, studies on LCHF diets suggest that they may enhance metabolic markers for heart disease and </span><a class="content-link css-5r4717" data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/diabetes"><span data-dcnode-id="532" instrument_node="">diabetes</span></a><span data-dcnode-id="530" instrument_node="">.</span></p><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Still, the diet is highly restrictive, and there’s not enough evidence on the long-term effects of LCHF diets in humans. </span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Therefore, maintaining an intake of wholesome foods and reducing your intake of processed ones while shifting to a moderate-carb diet may be a more sustainable yet efficient weight loss approach.</span></p></div></article><div data-dcnode-id="493" id="m73d9b3dd-7b5b-4b1d-a556-2fe109b14c11"><div data-dcnode-id="494"><div data-dcnode-id="495"><section class="css-11k39sg" data-dcnode-id="496"><div class="css-1x6oboy" data-dcnode-id="522"></div><div class="css-1rx43lg" data-dcnode-id="498"><div class="css-7nn8wn" data-dcnode-id="518"><div class="css-k008qs" data-dcnode-id="519"><a class="css-yvmi2y" data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/6419/redirect%3Flp%3D328%26tc%3D120226%26subid2%3D/nutrition/banting-diet-review%26subid%3Dplatejoy_hl_bot_diettypes_price_34968%26correlationId%3Df00a9ad3-de41-4831-8788-b82e2689a05b" rel="noopener
