determinations.</span></p></dd><dt data-dcnode-id="3291" id="tblfn9"><span data-dcnode-id="3292" instrument_node="">C</span></dt><dd data-dcnode-id="3279"><p data-dcnode-id="3280"><span data-dcnode-id="3290" instrument_node="">Values within a column for each extract having different letters are significantly different from each other, using Duncan’s LSD test (</span><em data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">P</span></em><span data-dcnode-id="3287" instrument_node="">&nbsp;</span><span data-dcnode-id="3285" instrument_node="">&lt;</span><span data-dcnode-id="3283" instrument_node="">&nbsp;</span><span data-dcnode-id="3281" instrument_node="">0.05).</span></p></dd></dl></div></div></section><section data-dcnode-id="3227" id="aep-section-id28"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3260"><span data-dcnode-id="3274" instrument_node="">3.6</span><span data-dcnode-id="3272" instrument_node="">. </span><span data-dcnode-id="3270" instrument_node="">CIE L</span><sup data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">∗</span></sup><span data-dcnode-id="3267" instrument_node="">a</span><sup data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">∗</span></sup><span data-dcnode-id="3264" instrument_node="">b</span><sup data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">∗</span></sup><span data-dcnode-id="3261" instrument_node=""> coordinates</span></h3><p data-dcnode-id="3230"><span data-dcnode-id="3259" instrument_node="">Refining process highly affects oilseeds chemical composition, so this analysis was performed in order to evaluate the processing grade: the more refined the oils are, the more light coloured they are. Obtained results demonstrate that at least a bleaching step seems have been applied for all the oilseeds, except for pumpkin oil (data not shown). But, even if this oil is the darkest coloured, this does not assure a higher level of antioxidant activity than the other oilseeds. Significant correlations were found in oilseeds only for β-carotene amount and CIE </span><em data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">b</span></em><sup data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">∗</span></sup><span data-dcnode-id="3254" instrument_node=""> coordinate (</span><em data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">r</span></em><span data-dcnode-id="3251" instrument_node="">&nbsp;</span><span data-dcnode-id="3249" instrument_node="">=</span><span data-dcnode-id="3247" instrument_node="">&nbsp;</span><span data-dcnode-id="3245" instrument_node="">+0.63) and for chlorophylls amount and CIE </span><em data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">a</span></em><sup data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">∗</span></sup><span data-dcnode-id="3240" instrument_node=""> (</span><em data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">r</span></em><span data-dcnode-id="3237" instrument_node="">&nbsp;</span><span data-dcnode-id="3235" instrument_node="">=</span><span data-dcnode-id="3233" instrument_node="">&nbsp;</span><span data-dcnode-id="3231" instrument_node="">+0.53).</span></p><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">In conclusion, the autoxidation of oils during processing and storage is the major responsible for food quality deterioration, both from in organoleptic and nutritive viewpoints. The analyzed edible commercial oilseeds show interesting radical scavenging activity that can help to neutralize reactive oxygen species. Thus, it could be concluded that cold-pressed oil is a “quite natural” product because oilseeds, when refined, they have their original amount of antioxidant compounds affected to a large extent. Improvement of the nutritional value of oilseeds should be encouraged, as well as investigations into the relevance of the chemical composition of oilseeds and the body’s biological function.</span></p></section></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3220"><button class="button button-anchor" data-dcnode-id="3221" type="button"><span class="button-text" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3219"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="392" id="aep-bibliography-id29"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="393" id="aep-bibliography-sec-id30"><dl class="references" data-dcnode-id="394" id="reference-links-aep-bibliography-sec-id30"><dt class="label" data-dcnode-id="3214"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3215" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="3216" instrument_node="">Amarowicz et al., 2003</span></a></dt><dd class="reference" data-dcnode-id="3156"><div class="contribution" data-dcnode-id="3189"><span data-dcnode-id="3213" instrument_node="">R.</span><span data-dcnode-id="3211" instrument_node=""> </span><span data-dcnode-id="3209" instrument_node="">Amarowicz</span><span data-dcnode-id="3207" instrument_node="">, </span><span data-dcnode-id="3205" instrument_node="">B.</span><span data-dcnode-id="3203" instrument_node=""> </span><span data-dcnode-id="3201" instrument_node="">Raab</span><span data-dcnode-id="3199" instrument_node="">, </span><span data-dcnode-id="3197" instrument_node="">F.</span><span data-dcnode-id="3195" instrument_node=""> </span><span data-dcnode-id="3193" instrument_node="">Shahidi</span><div data-dcnode-id="3190"><strong class="title" data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Antioxidant activity of phenolic nstrument_node="">Changes in physicochemical properties of cold press extracted oil from Balangu (Lallemantia peltata) seeds during storage</span></h3></a><div class="article-source ellipsis" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">2022, Journal of Food Composition and Analysis</span></div></div><div class="buttons" data-dcnode-id="376"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="377" type="button"><span class="button-link-text" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="378" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="379"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="362"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="363" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="364"><p data-dcnode-id="365" id="spar0050"><span data-dcnode-id="375" instrument_node="">The present research studied the oil content of </span><em data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Lallemantia peltata</span></em><span data-dcnode-id="372" instrument_node=""> (Balangu) extracted by cold pressing method. Before extraction, the moisture contents of the seeds were adjusted to 0, 2.5, 5, 7.5 and 10 % to evaluate its effect on the oil yield and its quality. Moreover, the physicochemical characteristics were measured during storage for up to 90 days. The optimum moisture content which gave the highest oil yield (33.5 %) was 7.5 %. Increasing of seed moisture content increased acid value, peroxide value and total tocopherols, whereas decreased total chlorophyll and carotenoid as well as oxidative stability. During storage, a significant increase (</span><em data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">p</span></em><span data-dcnode-id="369" instrument_node=""> &lt; 0.05) was observed in the acid and peroxide values and γ-tocopherol content, while the α-tocopherol, </span><em data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">δ</span></em><span data-dcnode-id="366" instrument_node="">-tocopherol, chlorophyll and carotenoid contents decreased. However, fatty acids and phytosterol composition did not significantly change by increasing moisture content and storage. Taken together, this study shows that the moisture content has a crucial influence on the oil yield and the quality of Balangu oil. Also, Balangu oil is rich in n-3 and n-6 acids and its nutritional profile is excellent and would be a good source of edible vegetable oil.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="340"><div class="sub-heading" data-dcnode-id="355"><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2666154321001198" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="359" id="citing-articles-article1-title"><span data-dcnode-id="360" instrument_node="">Proximate composition of polyphenolic, phytochemical, antioxidant activity content and lipid profiles of date palm seeds oils (Phoenix dactylifera L.)</span></h3></a><div class="article-source ellipsis" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">2021, Journal of Agriculture and Food Research</span></div></div><div class="buttons" data-dcnode-id="349"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="350" type="button"><span class="button-link-text" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="351" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="352"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="341"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="342" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="343"><p data-dcnode-id="344" id="abspara0010"><span data-dcnode-id="348" instrument_node="">Palm date seeds oil of eight varieties were investigated for physical, chemical, and phytochemical analysis, and compared to used commercial oils. Significant differences were observed among varieties. The oil content of the eight varieties ranged from 6.05 to 10.25%. Fatty acid analysis using GC-MS revealed that oleic acids were the dominant component (38.67–44.38%) followed by lauric (21.72–26.66%), myristic (11.26–13.04%); palmitic (9.65–11.38%); linoleic (6.25–8.24%); stearic (3.06–3.32%) while linolenic acid was found in traces. The carotenoids content ranged from 17.57&nbsp;±&nbsp;0.02 to 12.35&nbsp;±&nbsp;0.03&nbsp;mg/kg oil, total phenolic content ranged from 58.04&nbsp;±&nbsp;0.30 to 181.03&nbsp;±&nbsp;0.75&nbsp;mg GAE/100&nbsp;g and flavonoids content values ranged from 22.81&nbsp;±&nbsp;0.08 to 53.41&nbsp;±&nbsp;0.72&nbsp;mg RE/100&nbsp;g oil. The antioxidant activities (DPPH and ABTS) varied from 17.28&nbsp;±&nbsp;1.06 to 47.37&nbsp;±&nbsp;1.05 and 3.10&nbsp;±&nbsp;0.28 to 8.83&nbsp;±&nbsp;0.08&nbsp;mg AAE/100&nbsp;g, respectively. The phenolic compounds identified in seed oils were hydroxytyrosol (30.36&nbsp;±&nbsp;0.21 to 38.63&nbsp;±&nbsp;0.14&nbsp;μg/g oil), procatechuic acid (14.47&nbsp;±&nbsp;0.09 to 35.21&nbsp;±&nbsp;0.07&nbsp;μg/g oil), tyrosol (14.36&nbsp;±&nbsp;0.03 to 21.23&nbsp;±&nbsp;0.12&nbsp;μg/g oil), gallic acid (7.37&nbsp;±&nbsp;0.04 to 17.68&nbsp;±&nbsp;0.09&nbsp;μg/g oil), caffeic acid (3.21&nbsp;±&nbsp;0.11 to 7.09&nbsp;±&nbsp;0.12&nbsp;μg/g oil) and oleuropein (1.37&nbsp;±&nbsp;0.02 to 7.27&nbsp;±&nbsp;0.05&nbsp;μg/g oil). The total amount of the identified phenolic compounds recorded in </span><em data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Bouslikhan</span></em><span data-dcnode-id="345" instrument_node=""> variety (107.32&nbsp;μg/g oil). The results suggest that palm date seeds oil are strong radical scavengers and can be considered a good source of natural antioxidants for medicinal, functional food, and commercial uses.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="309"><div class="sub-heading" data-dcnode-id="334"><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0924224421003800" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="338" id="citing-articles-article2-title"><span data-dcnode-id="339" instrument_node="">Outgoing and potential trends of the omega-3 rich linseed oil quality characteristics and rancidity management: A comprehensive review for maximizing its food and nutraceutical applications</span></h3></a><div class="article-source ellipsis" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">2021, Trends in Food Science and Technology</span></div></div><div class="buttons" data-dcnode-id="328"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="329" type="button"><span class="button-link-text" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="330" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="331"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="310"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="311" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="312"><p data-dcnode-id="320" id="abspara0010"><span data-dcnode-id="327" instrument_node="">Linseed or flaxseed (</span><em data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Linum usitatissimum</span></em><span data-dcnode-id="324" instrument_node=""> L) is an ancient perennial plant species regarded as a multipurpose plant mostly due to its seed unique richness in omega-3 fatty acids. The extensive biochemical analysis of linseed further resulted in the identification of its other components </span><em data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">i.e</span></em><span data-dcnode-id="321" instrument_node="">., lignans with potential applications in the improvement of human health. Linseed oil that amount for 40% of its seed weight is an edible oil in demand as a dietary supplement owing to its several health benefits.</span></p><p data-dcnode-id="315" id="abspara0015"><span data-dcnode-id="319" instrument_node="">This comprehensive review based on research papers and patents capitalizes on linseed oil, the major product of linseed with emphasis on the interrelationship between extraction methods, holistic chemical composition, sensory characters, and nutritional value. Overview of the different analytical approaches for linseed oil analysis and its quality control assessment is presented </span><em data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">i.e</span></em><span data-dcnode-id="316" instrument_node="">., adulteration detection highlighting for each application advantages and limitations.</span></p><p data-dcnode-id="313" id="abspara0020"><span data-dcnode-id="314" instrument_node="">Different oil extraction as well as processing methods are reviewed and in context to their influence on the final oil quality and/or biological effects. The review recapitulates on the rancidity prevention approaches to ensure best oil quality and shelf life. The extraction method as well as the pretreatments appeared to dramatically affect the yield and the quality of the oil.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="287"><div class="sub-heading" data-dcnode-id="303"><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S092422442100306X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="307" id="citing-articles-article3-title"><span data-dcnode-id="308" instrument_node="">Phenolic compounds in plant oils: A review of composition, analytical methods, and effect on oxidative stability</span></h3></a><div class="article-source ellipsis" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">2021, Trends in Food Science and Technology</span></div></div><div class="buttons" data-dcnode-id="297"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="298" type="button"><span class="button-link-text" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="299" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="300"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="288"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="289" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="290"><p data-dcnode-id="295" id="abspara0010"><span data-dcnode-id="296" instrument_node="">Phenolic compounds from different plant sources, like fruits, vegetables, cereals, and herbs, have been excessively studied and widely used in different industrial areas, including food, medicine, and pharmaceuticals. Recently, special attention has been paid to the phenolic compounds of plant oils that have recently been found to vastly affect the oxidative stability of these products.</span></p><p data-dcnode-id="293" id="abspara0015"><span data-dcnode-id="294" instrument_node="">This paper reviews the contents and types of phenolic compounds in their initial forms in plant oils and methods of their determination. Also, their impact on the oxidative stability of oils is discussed.</span></p><p data-dcnode-id="291" id="abspara0020"><span data-dcnode-id="292" instrument_node="">The total free content of phenolic compounds and the phenol profile in plant oils are very diverse and depend on the oil source and production method. Generally, the main oily source of these compounds is rice bran and olive fruits. Their high amounts can also be found in rapeseed, flaxseed, grapeseed, and pumpkin oils. The main groups of phenolic compounds in oils are phenolic acids and flavonoids. Additionally, lignans, secoiridoids, and phenolic derivatives are identified in some oils. The two main methods for the determination of phenolic compounds in oils include the spectrophotometric and chromatographic ones. The general principles of these assays are often modified by various authors to adapt them to research conditions. Available literature data confirmed the strong antioxidative activity of some phenolic compounds found in oils. However, further studies are needed to better understand the mechanism of their protective action on oils, especially under natural storage.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="266"><div class="sub-heading" data-dcnode-id="281"><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0023643821006526" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="285" id="citing-articles-article4-title"><span data-dcnode-id="286" instrument_node="">Characterization of physical properties and retention of bioactive compounds in cookies made with high oleic red palm olein</span></h3></a><div class="article-source ellipsis" data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">2021, LWT</span></div></div><div class="buttons" data-dcnode-id="275"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="276" type="button"><span class="button-link-text" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="277" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="278"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="267"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="268" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="269"><p data-dcnode-id="270" id="abspara0010"><span data-dcnode-id="274" instrument_node="">High oleic red palm olein (HORO) is a novel oil extracted from fruits of the hybrid palm </span><em data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Elaeis oleifera x Elaeis guineensis</span></em><span data-dcnode-id="271" instrument_node="">. The crude oil, from which HORO is fractionated, contains higher oleic acid levels, carotenes (pro-vitamin-A), and ⍺-tocopherol (vitamin-E) compared to standard red palm oil. One major application of vegetable fats is baking. In this study, HORO and traditional red palm super olein (TRO) were used in a cookie recipe. The degradation of carotenes and ⍺-tocopherol, and physical properties of cookies were assessed under 4 temperature-time baking regimes (150&nbsp;°C/180&nbsp;°C for 10/15&nbsp;min). Oxidative status of the oils was measured before use. Lipids were extracted from the dough and baked cookies (Folch method) for total carotenes (UV–Vis Spectroscopy) and ⍺-tocopherol (RP-HPLC) quantification. Time was the only factor affecting retention for these compounds, with ranges of 92–100% for carotenes and 93–100% for ⍺-tocopherol in HORO cookies; similar behavior was observed for TRO cookies. Slightly higher moisture, hardness, and lower browning were observed in HORO vs TRO cookies. HORO was found to be an excellent source of pro-vitamin A carotenes and vitamin E ⍺-tocopherol, this encourages its use as a fortifying ingredient with a similar performance to TRO in baking.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="255"><div class="sub-heading" data-dcnode-id="260"><a data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/ph15030265" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="264" id="citing-articles-article5-title"><span data-dcnode-id="265" instrument_node="">From Sharks to Yeasts: Squalene in the Development of Vaccine Adjuvants</span></h3></a><div class="article-source ellipsis" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">2022, Pharmaceuticals</span></div></div><div class="buttons" data-dcnode-id="259"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="256"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="257" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="258"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-33947498419%26md5%3D88af90a098a55996a154939dacb7c12f" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="252" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="253"></path></svg><span class="button-alternative-text" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0308814606006716"><span class="anchor-text" data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="239"><span class="copyright-line" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Copyright © 2006 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="126"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="127"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="139"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="231" id="recommended-article
