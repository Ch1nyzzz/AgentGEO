</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id5&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id6&quot;><p>Different commercial edible oilseed samples were analyzed in order to evaluate the compounds involved in antioxidant activity. Fatty acids, triacylglycerols, tocopherols, chlorophylls, β-carotene, squalene, phenolic compounds and CIE <em>L</em><sup>∗</sup><em>a</em><sup>∗</sup><em>b</em><sup>∗</sup> coordinates were assayed. Strong chemical variability depending on the oilseed variety was observed. Antioxidant activity was evaluated for the oils, both for their methanol-soluble phase and the fraction insoluble in methanol. DPPH radical scavenging activity expressed in TEAC ranged between 0.45 and 2.30&nbsp;mmol/l in peanut and maize oils, respectively. Free radical scavenging activity was mainly influenced by tocopherols content (<em>r</em>&nbsp;=&nbsp;+0.70) in oils and polyunsaturated fatty acids (<em>r</em>&nbsp;=&nbsp;+0.61) in the fraction nonsoluble in methanol. Variability of the correlation between the antioxidant activity and the composition of the oilseeds could be attributed to the differences in the squalene, chlorophylls, carotenoids, and phenols contents of the oils and their mutual interactions.</p></div></div></div>" data-dcnode-id="9294" lang="en" name="citation_abstract"><span data-dcnode-id="9293" instrument_node="">

pan data-dcnode-id="8823" instrument_node="">a</span></em><sup data-dcnode-id="8820"><span data-dcnode-id="8821" instrument_node="">∗</span></sup><em data-dcnode-id="8818"><span data-dcnode-id="8819" instrument_node="">b</span></em><sup data-dcnode-id="8816"><span data-dcnode-id="8817" instrument_node="">∗</span></sup><span data-dcnode-id="8815" instrument_node=""> coordinates were assayed. Strong chemical variability depending on the oilseed variety was observed. Antioxidant activity was evaluated for the oils, both for their methanol-soluble phase and the fraction insoluble in methanol. DPPH radical scavenging activity expressed in TEAC ranged between 0.45 and 2.30</span><span data-dcnode-id="8813" instrument_node="">&nbsp;</span><span data-dcnode-id="8811" instrument_node="">mmol/l in peanut and maize oils, respectively. Free radical scavenging activity was mainly influenced by tocopherols content (</span><em data-dcnode-id="8809"><span data-dcnode-id="8810" instrument_node="">r</span></em><span data-dcnode-id="8808" instrument_node="">&nbsp;</span><span data-dcnode-id="8806" instrument_node="">=</span><span data-dcnode-id="8804" instrument_node="">&nbsp;</span><span data-dcnode-id="8802" instrument_node="">+0.70) in oils and polyunsaturated fatty acids (</span><em data-dcnode-id="8800"><span data-dcnode-id="8801" instrument_node="">r</span></em><span data-dcnode-id="8799" instrument_node="">&nbsp;</span><span data-dcnode-id="8797" instrument_node="">=</span><span data-dcnode-id="8795" instrument_node="">&nbsp;</span><span data-dcnode-id="8793" instrument_node="">+0.61) in the fraction nonsoluble in methanol. Variability of the correlation between the antioxidant activity and the composition of the oilseeds could be attributed to the differences in the squalene, chlorophylls, carotenoids, and phenols contents of the oils and their mutual interactions.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="8766" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="8778"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0308814606007308"><svg class="icon icon-navigate-left" data-dcnode-id="8787" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="8788"></path></svg><span class="button-alternative-text" data-dcnode-id="8780"><strong data-dcnode-id="8785"><span data-dcnode-id="8786" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="8783"><span data-dcnode-id="8784" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8781"><span data-dcnode-id="8782" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="8767"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0308814606006728"><span class="button-alternative-text" data-dcnode-id="8771"><strong data-dcnode-id="8776"><span data-dcnode-id="8777" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="8774"><span data-dcnode-id="8775" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8772"><span data-dcnode-id="8773" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="8769" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="8770"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="8747"><div class="keywords-section" data-dcnode-id="8748" id="aep-keywords-id7"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8764"><span data-dcnode-id="8765" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="8761"><span data-dcnode-id="8762"><span data-dcnode-id="8763" instrument_node="">Oilseeds</span></span></div><div class="keyword" data-dcnode-id="8758"><span data-dcnode-id="8759"><span data-dcnode-id="8760" instrument_node="">Composition</span></span></div><div class="keyword" data-dcnode-id="8755"><span data-dcnode-id="8756"><span data-dcnode-id="8757" instrument_node="">Antioxidants</span></span></div><div class="keyword" data-dcnode-id="8752"><span data-dcnode-id="8753"><span data-dcnode-id="8754" instrument_node="">Tocopherols</span></span></div><div class="keyword" data-dcnode-id="8749"><span data-dcnode-id="8750"><span data-dcnode-id="8751" instrument_node="">DPPH radical scavenging activity</span></span></div></div></div><span data-dcnode-id="8746" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3224" id="body"><div data-dcnode-id="3225"><section data-dcnode-id="8657" id="aep-section-id8"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8740"><span data-dcnode-id="8745" instrument_node="">1</span><span data-dcnode-id="8743" instrument_node="">. </span><span data-dcnode-id="8741" instrument_node="">Introduction</span></h2><p data-dcnode-id="8738"><span data-dcnode-id="8739" instrument_node="">Oilseeds have been part of the diet for a long time and their production has shown a remarkable increase in the last few decades. This development is due to the increasing use of edible fats as vegetable oils and their products of transformation, such as margarine, shortenings, and functional foods. Today’s dietary trend is to gradually replace fat from animal origin with those from vegetable, including countries where people traditionally consume fat predominantly from animals. The change is connected with the notion of healthier lifestyle and the need to eat food with a positive influence on health, increasing the use of foods rich in proven beneficial components.</span></p><p data-dcnode-id="8658"><span data-dcnode-id="8737" instrument_node="">For this reason, improvements in oilseed processing that helps to obtain products with a richer composition, like cold-press extraction, are getting more and more common. Oilseed composition has been studied extensively (</span><a class="workspace-trigger" data-dcnode-id="8735" href="#bib3" name="bbib3"><span data-dcnode-id="8736" instrument_node="">Bonaga and Frega, 1997</span></a><span data-dcnode-id="8734" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8732" href="#bib4" name="bbib4"><span data-dcnode-id="8733" instrument_node="">Caballero et al., 2003</span></a><span data-dcnode-id="8731" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8729" href="#bib9" name="bbib9"><span data-dcnode-id="8730" instrument_node="">Conte et al., 2004</span></a><span data-dcnode-id="8728" instrument_node="">), but recently it has been thoroughly investigated taking into account especially the phytochemicals representing the minor components (like tocopherols, squalene, chlorophylls, and phenolic compounds) (</span><a class="workspace-trigger" data-dcnode-id="8726" href="#bib7" name="bbib7"><span data-dcnode-id="8727" instrument_node="">Cert et al., 2000</span></a><span data-dcnode-id="8725" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8723" href="#bib24" name="bbib24"><span data-dcnode-id="8724" instrument_node="">Moreda et al., 2001</span></a><span data-dcnode-id="8722" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8720" href="#bib35" name="bbib35"><span data-dcnode-id="8721" instrument_node="">Shahidi, 2002</span></a><span data-dcnode-id="8719" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8717" href="#bib36" name="bbib36"><span data-dcnode-id="8718" instrument_node="">Shahidi, 2004a</span></a><span data-dcnode-id="8716" instrument_node="">). This interest is connected with the activity of such compounds against cardiovascular diseases (</span><a class="workspace-trigger" data-dcnode-id="8714" href="#bib11" name="bbib11"><span data-dcnode-id="8715" instrument_node="">Delplanque et al., 2002</span></a><span data-dcnode-id="8713" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8711" href="#bib28" name="bbib28"><span data-dcnode-id="8712" instrument_node="">Nielsen et al., 2002</span></a><span data-dcnode-id="8710" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8708" href="#bib42" name="bbib42"><span data-dcnode-id="8709" instrument_node="">Sulli et al., 1998</span></a><span data-dcnode-id="8707" instrument_node="">), lipid oxidation, protein cross-linking and DNA mutations (</span><a class="workspace-trigger" data-dcnode-id="8705" href="#bib22" name="bbib22"><span data-dcnode-id="8706" instrument_node="">Leckbanda et al., 2002</span></a><span data-dcnode-id="8704" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8702" href="#bib25" name="bbib25"><span data-dcnode-id="8703" instrument_node="">Moreno and Mitjavila, 2003</span></a><span data-dcnode-id="8701" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8699" href="#bib31" name="bbib31"><span data-dcnode-id="8700" instrument_node="">Pedersen et al., 2000</span></a><span data-dcnode-id="8698" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8696" href="#bib33" name="bbib33"><span data-dcnode-id="8697" instrument_node="">Rao et al., 1998</span></a><span data-dcnode-id="8695" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8693" href="#bib37" name="bbib37"><span data-dcnode-id="8694" instrument_node="">Shahidi, 2004b</span></a><span data-dcnode-id="8692" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8690" href="#bib40" name="bbib40"><span data-dcnode-id="8691" instrument_node="">Sotiroudis et al., 2003</span></a><span data-dcnode-id="8689" instrument_node="">), and hemostasis function (</span><a class="workspace-trigger" data-dcnode-id="8687" href="#bib19" name="bbib19"><span data-dcnode-id="8688" instrument_node="">Junker et al., 2001</span></a><span data-dcnode-id="8686" instrument_node="">). Most of these beneficial effects are due to antioxidant activity: especially when the presence of phenolic compounds and tocopherols is involved in the stability of oils (</span><a class="workspace-trigger" data-dcnode-id="8684" href="#bib20" name="bbib20"><span data-dcnode-id="8685" instrument_node="">Koski et al., 2002</span></a><span data-dcnode-id="8683" instrument_node="">). Unsaturated fatty acids (</span><a class="workspace-trigger" data-dcnode-id="8681" href="#bib11" name="bbib11"><span data-dcnode-id="8682" instrument_node="">Delplanque et al., 2002</span></a><span data-dcnode-id="8680" instrument_node="">), squalene (</span><a class="workspace-trigger" data-dcnode-id="8678" href="#bib23" name="bbib23"><span data-dcnode-id="8679" instrument_node="">Maguire et al., 2004</span></a><span data-dcnode-id="8677" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8675" href="#bib27" name="bbib27"><span data-dcnode-id="8676" instrument_node="">Newmark, 1997</span></a><span data-dcnode-id="8674" instrument_node="">), and carotenoids (</span><a class="workspace-trigger" data-dcnode-id="8672" href="#bib41" name="bbib41"><span data-dcnode-id="8673" instrument_node="">Subagio &amp; Morita, 2001</span></a><span data-dcnode-id="8671" instrument_node="">) also affect the pro- and/or antioxidative processes in the oils. Nevertheless, the potential help of oilseeds in the everyday diet is difficult to be evaluated due to the insufficiency of the available data (</span><a class="workspace-trigger" data-dcnode-id="8669" href="#bib5" name="bbib5"><span data-dcnode-id="8670" instrument_node="">Cabrini et al., 2001</span></a><span data-dcnode-id="8668" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8666" href="#bib15" name="bbib15"><span data-dcnode-id="8667" instrument_node="">Espín et al., 2000</span></a><span data-dcnode-id="8665" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8663" href="#bib30" name="bbib30"><span data-dcnode-id="8664" instrument_node="">Papadopoulos et al., 2003</span></a><span data-dcnode-id="8662" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8660" href="#bib43" name="bbib43"><span data-dcnode-id="8661" instrument_node="">Valavanidis et al., 2004</span></a><span data-dcnode-id="8659" instrument_node="">) about the antioxidant properties of oilseeds that can be found in normal retailing channels. Moreover, to the best of our knowledge, no data about the antioxidant aspects of flaxseed, grapeseed, and peanut oils have been published. So the aims of the present paper were (a) to characterize the chemical composition of the antioxidant compounds in commercial edible oilseeds, (b) to evaluate their antioxidant activity by DPPH test, and (c) to investigate the correlation between such antioxidant activity and the chemical composition.</span></p></section><section data-dcnode-id="7986" id="aep-section-id9"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8651"><span data-dcnode-id="8656" instrument_node="">2</span><span data-dcnode-id="8654" instrument_node="">. </span><span data-dcnode-id="8652" instrument_node="">Materials and methods</span></h2><section data-dcnode-id="8606" id="aep-section-id10"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8645"><span data-dcnode-id="8650" instrument_node="">2.1</span><span data-dcnode-id="8648" instrument_node="">. </span><span data-dcnode-id="8646" instrument_node="">Oil samples</span></h3><p data-dcnode-id="8613"><span data-dcnode-id="8644" instrument_node="">Cold-pressed oilseeds from rape (</span><em data-dcnode-id="8642"><span data-dcnode-id="8643" instrument_node="">Brassica napus</span></em><span data-dcnode-id="8641" instrument_node=""> L. var. oleifera), flax (</span><em data-dcnode-id="8639"><span data-dcnode-id="8640" instrument_node="">Linum usitatissimum</span></em><span data-dcnode-id="8638" instrument_node=""> L.), sunflower (</span><em data-dcnode-id="8636"><span data-dcnode-id="8637" instrument_node="">Helianthus annus</span></em><span data-dcnode-id="8635" instrument_node=""> L.), soya (</span><em data-dcnode-id="8633"><span data-dcnode-id="8634" instrument_node="">Glycine hispida</span></em><span data-dcnode-id="8632" instrument_node=""> Moench, </span><em data-dcnode-id="8630"><span data-dcnode-id="8631" instrument_node="">Glycine max (Linne) Mer.</span></em><span data-dcnode-id="8629" instrument_node="">), maize (</span><em data-dcnode-id="8627"><span data-dcnode-id="8628" instrument_node="">Zea mays</span></em><span data-dcnode-id="8626" instrument_node=""> L., corn), pumpkin (</span><em data-dcnode-id="8624"><span data-dcnode-id="8625" instrument_node="">Cucurbita pepo</span></em><span data-dcnode-id="8623" instrument_node=""> L.), grape (</span><em data-dcnode-id="8621"><span data-dcnode-id="8622" instrument_node="">Vitis vinifera</span></em><span data-dcnode-id="8620" instrument_node=""> L.), and peanut (</span><em data-dcnode-id="8618"><span data-dcnode-id="8619" instrument_node="">Arachis hypogaea</span></em><span data-dcnode-id="8617" instrument_node=""> L.) were purchased at local grocery stores in Wrocław (Poland) in the years 2004–2005. All oils were produced in Poland, except grapeseed oils which were produced in Tuscany (Italy). Commercial samples of extra-virgin olive oil (</span><em data-dcnode-id="8615"><span data-dcnode-id="8616" instrument_node="">Olea europaea</span></em><span data-dcnode-id="8614" instrument_node=""> L.) produced in Tuscany in 2005 were also analyzed.</span></p><p data-dcnode-id="8607"><span data-dcnode-id="8612" instrument_node="">All samples had been filtered through GD/X 0.45</span><span data-dcnode-id="8610" instrument_node="">&nbsp;</span><span data-dcnode-id="8608" instrument_node="">μm cellulose acetate filters (Whatman, Milan, Italy) before analysis.</span></p></section><section data-dcnode-id="8506" id="aep-section-id11"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8600"><span data-dcnode-id="8605" instrument_node="">2.2</span><span data-dcnode-id="8603" instrument_node="">. </span><span data-dcnode-id="8601" instrument_node="">Reagents and standards</span></h3><p data-dcnode-id="8507"><span data-dcnode-id="8599" instrument_node="">Chloroform, methanol, phosphoric acid, </span><em data-dcnode-id="8597"><span data-dcnode-id="8598" instrument_node="">n</span></em><span data-dcnode-id="8596" instrument_node="">-hexane, acetone, and acetonitrile were the analytical grade solvents (Merck, Milan, Italy). Cyclohexane was an analytical UV reagent (Merck). H</span><sub data-dcnode-id="8594"><span data-dcnode-id="8595" instrument_node="">3</span></sub><span data-dcnode-id="8593" instrument_node="">PO</span><sub data-dcnode-id="8591"><span data-dcnode-id="8592" instrument_node="">4</span></sub><span data-dcnode-id="8590" instrument_node="">, KOH, β-carotene, α, δ, and γ-tocopherols (TOCs), 1,1-diphenyl-2-picrylhydrazyl radical (DPPH), (±)-6-hydroxy-2,5,7,8-tetramethylcromano-2-carboxylic acid (Trolox), tyrosol, syringic acid, vanillin, vanillic acid, </span><em data-dcnode-id="8588"><span data-dcnode-id="8589" instrument_node="">p</span></em><span data-dcnode-id="8587" instrument_node="">-coumaric acid, ferulic acid, </span><em data-dcnode-id="8585"><span data-dcnode-id="8586" instrument_node="">trans</span></em><span data-dcnode-id="8584" instrument_node="">-cinnamic acid, triacylglycerols (TAGs) (LLL, LLO, LLP, LOO, POL, OOO, POO, POP, SOO), fatty acids methyl esters (FAMEs) (C14:0, C16:0, C16:1</span><em data-dcnode-id="8582"><span data-dcnode-id="8583" instrument_node="">n</span></em><span data-dcnode-id="8581" instrument_node="">&nbsp;</span><span data-dcnode-id="8579" instrument_node="">−</span><span data-dcnode-id="8577" instrument_node="">&nbsp;</span><span data-dcnode-id="8575" instrument_node="">7, C17:0, C18:0, C18:1</span><em data-dcnode-id="8573"><span data-dcnode-id="8574" instrument_node="">n</span></em><span data-dcnode-id="8572" instrument_node="">&nbsp;</span><span data-dcnode-id="8570" instrument_node="">−</span><span data-dcnode-id="8568" instrument_node="">&nbsp;</span><span data-dcnode-id="8566" instrument_node="">9, C18:1</span><em data-dcnode-id="8564"><span data-dcnode-id="8565" instrument_node="">n</span></em><span data-dcnode-id="8563" instrument_node="">&nbsp;</span><span data-dcnode-id="8561" instrument_node="">−</span><span data-dcnode-id="8559" instrument_node="">&nbsp;</span><span data-dcnode-id="8557" instrument_node="">7; C18:2</span><em data-dcnode-id="8555"><span data-dcnode-id="8556" instrument_node="">n</span></em><span data-dcnode-id="8554" instrument_node="">&nbsp;</span><span data-dcnode-id="8552" instrument_node="">−</span><span data-dcnode-id="8550" instrument_node="">&nbsp;</span><span data-dcnode-id="8548" instrument_node="">6, C18:3</span><em data-dcnode-id="8546"><span data-dcnode-id="8547" instrument_node="">n</span></em><span data-dcnode-id="8545" instrument_node="">&nbsp;</span><span data-dcnode-id="8543" instrument_node="">−</span><span data-dcnode-id="8541" instrument_node="">&nbsp;</span><span data-dcnode-id="8539" instrument_node="">3, C20:0, C20:1</span><em data-dcnode-id="8537"><span data-dcnode-id="8538" instrument_node="">n</span></em><span data-dcnode-id="8536" instrument_node="">&nbsp;</span><span data-dcnode-id="8534" instrument_node="">−</span><span data-dcnode-id="8532" instrument_node="">&nbsp;</span><span data-dcnode-id="8530" instrument_node="">11, C22:0, C22:1</span><em data-dcnode-id="8528"><span data-dcnode-id="8529" instrument_node="">n</span></em><span data-dcnode-id="8527" instrument_node="">&nbsp;</span><span data-dcnode-id="8525" instrument_node="">−</span><span data-dcnode-id="8523" instrument_node="">&nbsp;</span><span data-dcnode-id="8521" instrument_node="">9, C22:2</span><em data-dcnode-id="8519"><span data-dcnode-id="8520" instrument_node="">n</span></em><span data-dcnode-id="8518" instrument_node="">&nbsp;</span><span data-dcnode-id="8516" instrument_node="">−</span><span data-dcnode-id="8514" instrument_node="">&nbsp;</span><span data-dcnode-id="8512" instrument_node="">6, C24:0), squalene and squalane were from Fluka and Sigma–Aldrich (Milan, Italy). Oleuropein, luteolin, apigenin, and chlorophyll paste oil were from Extrasynthese (Genay, France). All compounds were analytical grade standards. Oleuropein aglycon was prepared for hydrolysis of the oleuropein with β-glucosidase (Fluka, Milano). HPLC grade water (18</span><span data-dcnode-id="8510" instrument_node="">&nbsp;</span><span data-dcnode-id="8508" instrument_node="">mΩ) was prepared using a Millipore (Bedford, MA, USA) Milli-Q purification system.</span></p></section><section data-dcnode-id="8005" id="aep-section-id12"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8500"><span data-dcnode-id="8505" instrument_node="">2.3</span><span data-dcnode-id="8503" instrument_node="">. </span><span data-dcnode-id="8501" instrument_node="">Instrumental analysis</span></h3><section data-dcnode-id="8389" id="aep-section-id13"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8494"><span data-dcnode-id="8499" instrument_node="">2.3.1</span><span data-dcnode-id="8497" instrument_node="">. </span><span data-dcnode-id="8495" instrument_node="">Fatty acids</span></h4><p data-dcnode-id="8390"><span data-dcnode-id="8493" instrument_node="">A transmethylation technique followed by GC-FID determination was used. Fatty acid methyl esters (FAME) were prepared pouring 0.5</span><span data-dcnode-id="8491" instrument_node="">&nbsp;</span><span data-dcnode-id="8489" instrument_node="">g of oil and 250</span><span data-dcnode-id="8487" instrument_node="">&nbsp;</span><span data-dcnode-id="8485" instrument_node="">μl of methanolic 2</span><span data-dcnode-id="8483" instrument_node="">&nbsp;</span><span data-dcnode-id="8481" instrument_node="">M KOH into a 15</span><span data-dcnode-id="8479" instrument_node="">&nbsp;</span><span data-dcnode-id="8477" instrument_node="">ml vial and mixed with a vibration mixer (Falc Instruments, Treviglio, BG, Italy) for 60</span><span data-dcnode-id="8475" instrument_node="">&nbsp;</span><span data-dcnode-id="8473" instrument_node="">s. After 15</span><span data-dcnode-id="8471" instrument_node="">&nbsp;</span><span data-dcnode-id="8469" instrument_node="">min rest, 6</span><span data-dcnode-id="8467" instrument_node="">&nbsp;</span><span data-dcnode-id="8465" instrument_node="">ml of </span><em data-dcnode-id="8463"><span data-dcnode-id="8464" instrument_node="">n</span></em><span data-dcnode-id="8462" instrument_node="">-hexane were poured into the vial and the mixture was shaken in a rotary shaker for 10</span><span data-dcnode-id="8460" instrument_node="">&nbsp;</span><span data-dcnode-id="8458" instrument_node="">min. The layers were allowed to separate and the hexane fraction was injected to GC for analysis. A gas chromatograph HRGC Mega series 2 (Carlo Erba, Milan, Italy) equipped with a FID detector, an AS 800 auto sampler (Carlo-Erba, Milan), a split–splitless injector, and an integrator HP 3396-A (Hewlett Packard, Avondale, PA, USA) was used. The capillary column was a fused silica DB-23 (30</span><span data-dcnode-id="8456" instrument_node="">&nbsp;</span><span data-dcnode-id="8454" instrument_node="">m, 0.25</span><span data-dcnode-id="8452" instrument_node="">&nbsp;</span><span data-dcnode-id="8450" instrument_node="">mm i.d.; 0.25</span><span data-dcnode-id="8448" instrument_node="">&nbsp;</span><span data-dcnode-id="8446" instrument_node="">μm film thickness; J&amp;W Scientific, Fisons, Folsom, CA). The injector and the detector were operated at 240 and 260</span><span data-dcnode-id="8444" instrument_node="">&nbsp;</span><span data-dcnode-id="8442" instrument_node="">°C, respectively. One microlitre of sample was injected in split mode (1:100). The oven was programmed as follows: 100</span><span data-dcnode-id="8440" instrument_node="">&nbsp;</span><span data-dcnode-id="8438" instrument_node="">°C for 1</span><span data-dcnode-id="8436" instrument_node="">&nbsp;</span><span data-dcnode-id="8434" instrument_node="">min, raised to 220</span><span data-dcnode-id="8432" instrument_node="">&nbsp;</span><span data-dcnode-id="8430" instrument_node="">°C (3</span><span data-dcnode-id="8428" instrument_node="">&nbsp;</span><span data-dcnode-id="8426" instrument_node="">°C/min), and from 220 to 250</span><span data-dcnode-id="8424" instrument_node="">&nbsp;</span><span data-dcnode-id="8422" instrument_node="">°C (5</span><span data-dcnode-id="8420" instrument_node="">&nbsp;</span><span data-dcnode-id="8418" instrument_node="">°C/min) and isothermally held for 1</span><span data-dcnode-id="8416" instrument_node="">&nbsp;</span><span data-dcnode-id="8414" instrument_node="">min. Helium was used as carrier gas, and nitrogen as make up at 125</span><span data-dcnode-id="8412" instrument_node="">&nbsp;</span><span data-dcnode-id="8410" instrument_node="">kpa and 80</span><span data-dcnode-id="8408" instrument_node="">&nbsp;</span><span data-dcnode-id="8406" instrument_node="">kpa, respectively. A flame ionization detector (FID) was used with H</span><sub data-dcnode-id="8404"><span data-dcnode-id="8405" instrument_node="">2</span></sub><span data-dcnode-id="8403" instrument_node=""> at 150</span><span data-dcnode-id="8401" instrument_node="">&nbsp;</span><span data-dcnode-id="8399" instrument_node="">kPa, air at 75</span><span data-dcnode-id="8397" instrument_node="">&nbsp;</span><span data-dcnode-id="8395" instrument_node="">kPa, and nitrogen at 90</span><span data-dcnode-id="8393" instrument_node="">&nbsp;</span><span data-dcnode-id="8391" instrument_node="">kPa, respectively. Standard stock solutions were prepared in hexane. The percentage composition of the oils was calculated from GC peak areas without using correction factors.</span></p></section><section data-dcnode-id="8380" id="aep-section-id14"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8383"><span data-dcnode-id="8388" instrument_node="">2.3.2</span><span data-dcnode-id="8386" instrument_node="">. </span><span data-dcnode-id="8384" instrument_node="">Squalene</span></h4><p data-dcnode-id="8381"><span data-dcnode-id="8382" instrument_node="">This hydrocarbon was dosed by GC-FID analysis with the FAME. The quantitative analysis was performed using the internal standard method (with squalane) and results were expressed as mg squalene/kg of sample.</span></p></section><section data-dcnode-id="8307" id="aep-section-id15"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8374"><span data-dcnode-id="8379" instrument_node="">2.3.3</span><span data-dcnode-id="8377" instrument_node="">. </span><span data-dcnode-id="8375" instrument_node="">Triacylglycerols</span></h4><p data-dcnode-id="8308"><span data-dcnode-id="8373" instrument_node="">For the separation of triacylglycerols (TAG) with UV detection, an HPLC Agilent 1100 (Agilent Technologies, Cernusco sul Naviglio, MI, Italy) fitted with a pump system G1311A, on-line degasser G1322A, auto-sampler G1313A with a 50</span><span data-dcnode-id="8371" instrument_node="">&nbsp;</span><span data-dcnode-id="8369" instrument_node="">μl loop, thermostatted column compartment G1316A (35</span><span data-dcnode-id="8367" instrument_node="">&nbsp;</span><span data-dcnode-id="8365" instrument_node="">°C), and multi diode array detector G1315A with wavelength 207</span><span data-dcnode-id="8363" instrument_node="">&nbsp;</span><span data-dcnode-id="8361" instrument_node="">nm was used. Data acquisition were performed with ChemStation A.08.01 software. Separation was performed with a Kromasil KR100-5 C</span><sub data-dcnode-id="8359"><span data-dcnode-id="8360" instrument_node="">18</span></sub><span data-dcnode-id="8358" instrument_node=""> column (250</span><span data-dcnode-id="8356" instrument_node="">&nbsp;</span><span data-dcnode-id="8354" instrument_node="">×</span><span data-dcnode-id="8352" instrument_node="">&nbsp;</span><span data-dcnode-id="8350" instrument_node="">4.6</span><span data-dcnode-id="8348" instrument_node="">&nbsp;</span><span data-dcnode-id="8346" instrument_node="">mm, 5</span><span data-dcnode-id="8344" instrument_node="">&nbsp;</span><span data-dcnode-id="8342" instrument_node="">μm, Varian, Leini, TO, Italy) and mobile phase was acetone/acetonitrile (65:35, v/v) with a flow rate of 0.7</span><span data-dcnode-id="8340" instrument_node="">&nbsp;</span><span data-dcnode-id="8338" instrument_node="">ml/min. Twenty milligrams of oil were diluted to 10</span><span data-dcnode-id="8336" instrument_node="">&nbsp;</span><span data-dcnode-id="8334" instrument_node="">ml with acetone and injected in the HPLC. Standard solution of LLL, LLO, LLP, OOL, POL, OOO, OOP, PPO, and OOS were prepared in acetone. Calibration graphs were constructed with the external standard method by measuring peak area </span><em data-dcnode-id="8332"><span data-dcnode-id="8333" instrument_node="">vs.</span></em><span data-dcnode-id="8331" instrument_node=""> concentration. Good linearity for all compounds was achieved and correlation coefficients ranged between 0.9982 and 0.9998. The concentrations of the compounds were calculated in mg/kg and data were expressed in weight percentages. Moreover, the use of equivalent carbon number (ECN) allowed the attribution of compounds of which no analytical standards were found. ECN was calculated according to the equation ECN</span><span data-dcnode-id="8329" instrument_node="">&nbsp;</span><span data-dcnode-id="8327" instrument_node="">=</span><span data-dcnode-id="8325" instrument_node="">&nbsp;</span><span data-dcnode-id="8323" instrument_node="">CN</span><span data-dcnode-id="8321" instrument_node="">&nbsp;</span><span data-dcnode-id="8319" instrument_node="">−</span><span data-dcnode-id="8317" instrument_node="">&nbsp;</span><span data-dcnode-id="8315" instrument_node="">2</span><em data-dcnode-id="8313"><span data-dcnode-id="8314" instrument_node="">n</span></em><span data-dcnode-id="8312" instrument_node=""> where CN is the number of carbon atoms and </span><em data-dcnode-id="8310"><span data-dcnode-id="8311" instrument_node="">n</span></em><span data-dcnode-id="8309" instrument_node=""> is the number of double bonds. In this way LnLL, LnLno, LnLnLn, LLnLn, OLLn, PLLn, OOLn, POLn, LPP, PSL, and SSLn were identified and the quantification was performed using the calibration curves of the TAG standard with the closest chemical structure and ECN number.</span></p></section><section data-dcnode-id="8256" id="aep-section-id16"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8301"><span data-dcnode-id="8306" instrument_node="">2.3.4</span><span data-dcnode-id="8304" instrument_node="">. </span><span data-dcnode-id="8302" instrument_node="">α-, γ-, δ-Tocopherols (Vitamin E)</span></h4><p data-dcnode-id="8257"><span data-dcnode-id="8300" instrument_node="">α-, γ-, and δ-Tocopherols stock standard solutions were prepared in acetone, while working solutions were prepared to appropriate dilution with the eluent mobile phase. Ten milligrams of oil were weighed in a 1.8</span><span data-dcnode-id="8298" instrument_node="">&nbsp;</span><span data-dcnode-id="8296" instrument_node="">ml vial, and added with 200</span><span data-dcnode-id="8294" instrument_node="">&nbsp;</span><span data-dcnode-id="8292" instrument_node="">μl of chloroform, and 790</span><span data-dcnode-id="8290" instrument_node="">&nbsp;</span><span data-dcnode-id="8288" instrument_node="">μl of a mixture acetonitrile/methanol (50:50, v/v) and homogenized with a vibration mixer. An HPLC Merck Hitachi 7000 series (Merk, Milan, Italy) connected to a fluorescence detector L-7485 series was used. The operating conditions of fluorescence detector were </span><em data-dcnode-id="8286"><span data-dcnode-id="8287" instrument_node="">λ</span></em><span data-dcnode-id="8285" instrument_node="">ex 290</span><span data-dcnode-id="8283" instrument_node="">&nbsp;</span><span data-dcnode-id="8281" instrument_node="">nm and </span><em data-dcnode-id="8279"><span data-dcnode-id="8280" instrument_node="">λ</span></em><span data-dcnode-id="8278" instrument_node="">em 330</span><span data-dcnode-id="8276" instrument_node="">&nbsp;</span><span data-dcnode-id="8274" instrument_node="">nm. Methanol:acetonitrile (50/50, v/v) as eluente mixture was used at a flow rate of 1</span><span data-dcnode-id="8272" instrument_node="">&nbsp;</span><span data-dcnode-id="8270" instrument_node="">ml/min. The column was a Waters ODS2 (250</span><span data-dcnode-id="8268" instrument_node="">&nbsp;</span><span data-dcnode-id="8266" instrument_node="">×</span><span data-dcnode-id="8264" instrument_node="">&nbsp;</span><span data-dcnode-id="8262" instrument_node="">4.6</span><span data-dcnode-id="8260" instrument_node="">&nbsp;</span><span data-dcnode-id="8258" instrument_node="">mm, 0.5μm; Waters, Milan, Italy).</span></p></section><section data-dcnode-id="8239" id="aep-section-id17"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8250"><span data-dcnode-id="8255" instrument_node="">2.3.5</span><span data-dcnode-id="8253" instrument_node="">. </span><span data-dcnode-id="8251" instrument_node="">Total chlorophyll and β-carotene</span></h4><p data-dcnode-id="8240"><span data-dcnode-id="8249" instrument_node="">Solutions of 5% of oil in cyclohexane were prepared and absorbance at two different wavelengths were measured (464</span><span data-dcnode-id="8247" instrument_node="">&nbsp;</span><span data-dcnode-id="8245" instrument_node="">nm for β-carotene and 669</span><span data-dcnode-id="8243" instrument_node="">&nbsp;</span><span data-dcnode-id="8241" instrument_node="">nm for total chlorophylls). Chlorophylls and β-carotene stock standard solutions were prepared in cyclohexane, as well as working solutions, that were prepared with proper dilutions. The UV–vis Varian series Cary 50 spectrophotometer was used (see previous).</span></p></section><section data-dcnode-id="8104" id="aep-section-id18"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8233"><span data-dcnode-id="8238" instrument_node="">2.3.6</span><span data-dcnode-id="8236" instrument_node="">. </span><span data-dcnode-id="8234" instrument_node="">Phenolic compounds</span></h4><p data-dcnode-id="8105"><span data-dcnode-id="8232" instrument_node="">Samples were prepared by weighing 3</span><span data-dcnode-id="8230" instrument_node="">&nbsp;</span><span data-dcnode-id="8228" instrument_node="">g of oil and adding 5</span><span data-dcnode-id="8226" instrument_node="">&nbsp;</span><span data-dcnode-id="8224" instrument_node="">ml of a methanol–water (80:20 v/v) mixture in a 20</span><span data-dcnode-id="8222" instrument_node="">&nbsp;</span><span data-dcnode-id="8220" instrument_node="">ml screw cap test-tube. The mixture was blended in a vibration mixer apparatus for 1</span><span data-dcnode-id="8218" instrument_node="">&nbsp;</span><span data-dcnode-id="8216" instrument_node="">min, and the emulsion was allowed to separate. The hydrophilic layer, filtered through a GD/X 0.45</span><span data-dcnode-id="8214" instrument_node="">&nbsp;</span><span data-dcnode-id="8212" instrument_node="">μm cellulose acetate septa, was placed in a round flask. Oil extraction was repeated another two times, and the hydrophilic extracts combined and then evaporated under vacuum in a rotary evaporator at 30</span><span data-dcnode-id="8210" instrument_node="">&nbsp;</span><span data-dcnode-id="8208" instrument_node="">°C. The residue was dissolved in 1.5</span><span data-dcnode-id="8206" instrument_node="">&nbsp;</span><span data-dcnode-id="8204" instrument_node="">ml of methanol and injected in the HPLC. An Agilent HPLC system 1100 series (Agilent Technologies, Cernusco sul Naviglio, Milan, Italy) was employed, fitted with a pump module G1311a, an on-line degaser G1322a, an autosampler G1313a with a 20</span><span data-dcnode-id="8202" instrument_node="">&nbsp;</span><span data-dcnode-id="8200" instrument_node="">ml loop and a ThermoSeparation diode array detector SpectroSystem UV 6000lp (ThermoSeparation, San Jose, CA, USA). The solvents used were 0.2</span><span data-dcnode-id="8198" instrument_node="">&nbsp;</span><span data-dcnode-id="8196" instrument_node="">M H</span><sub data-dcnode-id="8194"><span data-dcnode-id="8195" instrument_node="">3</span></sub><span data-dcnode-id="8193" instrument_node="">PO</span><sub data-dcnode-id="8191"><span data-dcnode-id="8192" instrument_node="">4</span></sub><span data-dcnode-id="8190" instrument_node=""> (A) and 80% CH</span><sub data-dcnode-id="8188"><span data-dcnode-id="8189" instrument_node="">3</span></sub><span data-dcnode-id="8187" instrument_node="">CN</span><span data-dcnode-id="8185" instrument_node="">&nbsp;</span><span data-dcnode-id="8183" instrument_node="">+</span><span data-dcnode-id="8181" instrument_node="">&nbsp;</span><span data-dcnode-id="8179" instrument_node="">20% 0.2</span><span data-dcnode-id="8177" instrument_node="">&nbsp;</span><span data-dcnode-id="8175" instrument_node="">M H</span><sub data-dcnode-id="8173"><span data-dcnode-id="8174" instrument_node="">3</span></sub><span data-dcnode-id="8172" instrument_node="">PO</span><sub data-dcnode-id="8170"><span data-dcnode-id="8171" instrument_node="">4</span></sub><span data-dcnode-id="8169" instrument_node=""> (B) using linear gradients as follows: </span><em data-dcnode-id="8167"><span data-dcnode-id="8168" instrument_node="">t</span></em><span data-dcnode-id="8166" instrument_node="">&nbsp;</span><span data-dcnode-id="8164" instrument_node="">=</span><span data-dcnode-id="8162" instrument_node="">&nbsp;</span><span data-dcnode-id="8160" instrument_node="">0 A:B (85:15, v/v), reaching 40:60 (v/v) in 30</span><span data-dcnode-id="8158" instrument_node="">&nbsp;</span><span data-dcnode-id="8156" instrument_node="">min, then 100% B in 10</span><span data-dcnode-id="8154" instrument_node="">&nbsp;</span><span data-dcnode-id="8152" instrument_node="">min, and finally hold at 100% until 50</span><span data-dcnode-id="8150" instrument_node="">&nbsp;</span><span data-dcnode-id="8148" instrument_node="">min. Before each injection the LC system was stabilized for 10</span><span data-dcnode-id="8146" instrument_node="">&nbsp;</span><span data-dcnode-id="8144" instrument_node="">min with the initial A/B ratio (85:15, v/v). The flow rate was 0.8</span><span data-dcnode-id="8142" instrument_node="">&nbsp;</span><span data-dcnode-id="8140" instrument_node="">ml/min. Separation was obtained with a Waters Symmetry C18 column (250</span><span data-dcnode-id="8138" instrument_node="">&nbsp;</span><span data-dcnode-id="8136" instrument_node="">×</span><span data-dcnode-id="8134" instrument_node="">&nbsp;</span><span data-dcnode-id="8132" instrument_node="">4.6</span><span data-dcnode-id="8130" instrument_node="">&nbsp;</span><span data-dcnode-id="8128" instrument_node="">mm, 5</span><span data-dcnode-id="8126" instrument_node="">&nbsp;</span><span data-dcnode-id="8124" instrument_node="">μm; Waters, Milan, Italy). According to the optimal detection wavelength, the phenols analysis was performed at: 280</span><span data-dcnode-id="8122" instrument_node="">&nbsp;</span><span data-dcnode-id="8120" instrument_node="">nm (hydroxytyrosol, tyrosol, syringic acid, vanillic acid, vanillin, oleuropein, and ligstroside), 313</span><span data-dcnode-id="8118" instrument_node="">&nbsp;</span><span data-dcnode-id="8116" instrument_node="">nm (</span><em data-dcnode-id="8114"><span data-dcnode-id="8115" instrument_node="">p</span></em><span data-dcnode-id="8113" instrument_node="">-coumaric acid, ferulic acid, and </span><em data-dcnode-id="8111"><span data-dcnode-id="8112" instrument_node="">trans</span></em><span data-dcnode-id="8110" instrument_node="">-cinnamic acid), and 360</span><span data-dcnode-id="8108" instrument_node="">&nbsp;</span><span data-dcnode-id="8106" instrument_node="">nm (luteolin and apigenin). Chromatograms and spectra were elaborated with a ChromQuest V. 2.51 data system (ThermoQuest, Rodano, Milan, Italy). Stock standard solutions and working solutions were prepared in methanol. Calibration curves were constructed with the external standard method, correlating the area of the peaks with the concentration. The correlation values were comprised between 0.9993 and 0.9999.</span></p></section><section data-dcnode-id="8078" id="aep-section-id19"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8089"><span data-dcnode-id="8103" instrument_node="">2.3.7</span><span data-dcnode-id="8101" instrument_node="">. </span><span data-dcnode-id="8099" instrument_node="">CIE L</span><sup data-dcnode-id="8097"><span data-dcnode-id="8098" instrument_node="">∗</span></sup><span data-dcnode-id="8096" instrument_node="">a</span><sup data-dcnode-id="8094"><span data-dcnode-id="8095" instrument_node="">∗</span></sup><span data-dcnode-id="8093" instrument_node="">b</span><sup data-dcnode-id="8091"><span data-dcnode-id="8092" instrument_node="">∗</span></sup><span data-dcnode-id="8090" instrument_node=""> coordinates</span></h4><p data-dcnode-id="8079"><span data-dcnode-id="8088" instrument_node="">A UV–vis Varian series Cary 50 Scan spectrophotometer (Varian, Leini, TO, Italy), connected with a PC, was used. Transmittances in a wavelength interval between 380 and 780</span><span data-dcnode-id="8086" instrument_node="">&nbsp;</span><span data-dcnode-id="8084" instrument_node="">nm were measured using D65 illuminant with a 10° observation angle. Data were elaborated with Cary Win UV Color Application V. 2.00 software. The samples were used without any dilution, poured into a 10</span><span data-dcnode-id="8082" instrument_node="">&nbsp;</span><span data-dcnode-id="8080" instrument_node="">mm quartz cuvette.</span></p></section><section data-dcnode-id="8006" id="aep-section-id20"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8072"><span data-dcnode-id="8077" instrument_node="">2.3.8</span><span data-dcnode-id="8075" instrument_node="">. </span><span data-dcnode-id="8073" instrument_node="">Radical scavenging activity</span></h4><p data-dcnode-id="8007"><span data-dcnode-id="8071" instrument_node="">A spectrophotometric analysis that used DPPH was performed. This assay is based on the ability of the antioxidant to scavenge the radical cation DPPH. Data were expressed as Trolox equivalent antioxidant capacity (TEAC) using a Trolox calibration curve. The </span><em data-dcnode-id="8069"><span data-dcnode-id="8070" instrument_node="">in vitro</span></em><span data-dcnode-id="8068" instrument_node=""> antioxidant activities of oils and both lipophilic (LF) and hydrophilic (HF) fractions were determined. Separation of LF and HF was performed in the following way: 500</span><span data-dcnode-id="8066" instrument_node="">&nbsp;</span><span data-dcnode-id="8064" instrument_node="">μl of seed oil were mixed with 500</span><span data-dcnode-id="8062" instrument_node="">&nbsp;</span><span data-dcnode-id="8060" instrument_node="">μl of methanol in an Eppendorf</span><sup data-dcnode-id="8058"><span data-dcnode-id="8059" instrument_node="">®</span></sup><span data-dcnode-id="8057" instrument_node=""> microtest tube, shaken in a vibration mixer for 10</span><span data-dcnode-id="8055" instrument_node="">&nbsp;</span><span data-dcnode-id="8053" instrument_node="">s, putted in a rotary shaker for 30</span><span data-dcnode-id="8051" instrument_node="">&nbsp;</span><span data-dcnode-id="8049" instrument_node="">min and then shacked in the vibration mixer for 10</span><span data-dcnode-id="8047" instrument_node="">&nbsp;</span><span data-dcnode-id="8045" instrument_node="">s. After 10</span><span data-dcnode-id="8043" instrument_node="">&nbsp;</span><span data-dcnode-id="8041" instrument_node="">min of centrifugation at 700</span><em data-dcnode-id="8039"><span data-dcnode-id="8040" instrument_node="">g</span></em><span data-dcnode-id="8038" instrument_node="">, the solution was allowed to separate and the methanolic phase with the polar compounds (HF) was separated from the oil (LF). HF was tested using 20</span><span data-dcnode-id="8036" instrument_node="">&nbsp;</span><span data-dcnode-id="8034" instrument_node="">μl of extract added to 3</span><span data-dcnode-id="8032" instrument_node="">&nbsp;</span><span data-dcnode-id="8030" instrument_node="">ml of methanolic DPPH (0.04</span><span data-dcnode-id="8028" instrument_node="">&nbsp;</span><span data-dcnode-id="8026" instrument_node="">mM). LF and a whole oil assay was performed in the same way but using DPPH dissolved in ethyl acetate (</span><a class="workspace-trigger" data-dcnode-id="8024" href="#bib15" name="bbib15"><span data-dcnode-id="8025" instrument_node="">Espín et al., 2000</span></a><span data-dcnode-id="8023" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8021" href="#bib43" name="bbib43"><span data-dcnode-id="8022" instrument_node="">Valavanidis et al., 2004</span></a><span data-dcnode-id="8020" instrument_node="">). The spectrophotometric readings were carried out after a 1-hour period of incubation, in the dark and at room temperature, with a Varian Cary 50 spectrophotometer at 517</span><span data-dcnode-id="8018" instrument_node="">&nbsp;</span><span data-dcnode-id="8016" instrument_node="">nm using a 10</span><span data-dcnode-id="8014" instrument_node="">&nbsp;</span><span data-dcnode-id="8012" instrument_node="">mm quartz cuvette. A Trolox calibration curve in the range 0.02–4.00</span><span data-dcnode-id="8010" instrument_node="">&nbsp;</span><span data-dcnode-id="8008" instrument_node="">mM was prepared, and data were expressed in Trolox equivalent antioxidant capacity (TEAC, mmol/l).</span></p></section></section><section data-dcnode-id="7987" id="aep-section-id21"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7999"><span data-dcnode-id="8004" instrument_node="">2.4</span><span data-dcnode-id="8002" instrument_node="">. </span><span data-dcnode-id="8000" instrument_node="">Statistical analysis</span></h3><p data-dcnode-id="7988"><span data-dcnode-id="7998" instrument_node="">All experiments were replicated three times. Data were evaluated by general linear models with differences between groups being determined using least square means. Analysis of variance (ANOVA) was carried out and the average values were compared with Duncan test. Differences were considered statistically significant at </span><em data-dcnode-id="7996"><span data-dcnode-id="7997" instrument_node="">P</span></em><span data-dcnode-id="7995" instrument_node="">&nbsp;</span><span data-dcnode-id="7993" instrument_node="">&lt;</span><span data-dcnode-id="7991" instrument_node="">&nbsp;</span><span data-dcnode-id="7989" instrument_node="">0.05. All statistical analyses were performed using GenStat v 7.1 software (VSN International Ltd., Herts, UK).</span></p></section></section><section data-dcnode-id="3226" id="aep-section-id22"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7980"><span data-dcnode-id="7985" instrument_node="">3</span><span data-dcnode-id="7983" instrument_node="">. </span><span data-dcnode-id="7981" instrument_node="">Results and discussion</span></h2><section data-dcnode-id="4880" id="aep-section-id23"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7974"><span data-dcnode-id="7979" instrument_node="">3.1</span><span data-dcnode-id="7977" instrument_node="">. </span><span data-dcnode-id="7975" instrument_node="">Fatty acids and triacylglycerols composition</span></h3><div data-dcnode-id="4881"><p data-dcnode-id="7925"><a class="workspace-trigger" data-dcnode-id="7972" href="#tbl1" name="btbl1"><span data-dcnode-id="7973" instrument_node="">Table 1</span></a><span data-dcnode-id="7971" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7969" href="#tbl2" name="btbl2"><span data-dcnode-id="7970" instrument_node="">Table 2</span></a><span data-dcnode-id="7968" instrument_node=""> show the fatty acids and the triacylglycerols percentage composition. Peanut, rapeseed and olive oil are characterized by the high amount of oleic acid (58.3, 60.7, and 67.2%, respectively). Pumpkin, soybean, maize, sunflower, and grapeseed oils show the typical fatty acid composition with high linoleic acid amount (</span><a class="workspace-trigger" data-dcnode-id="7966" href="#bib3" name="bbib3"><span data-dcnode-id="7967" instrument_node="">Bonaga and Frega, 1997</span></a><span data-dcnode-id="7965" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7963" href="#bib4" name="bbib4"><span data-dcnode-id="7964" instrument_node="">Caballero et al., 2003</span></a><span data-dcnode-id="7962" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7960" href="#bib9" name="bbib9"><span data-dcnode-id="7961" instrument_node="">Conte et al., 2004</span></a><span data-dcnode-id="7959" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7957" href="#bib14" name="bbib14"><span data-dcnode-id="7958" instrument_node="">El-Adawy and Taha, 2001</span></a><span data-dcnode-id="7956" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7954" href="#bib35" name="bbib35"><span data-dcnode-id="7955" instrument_node="">Shahidi, 2002</span></a><span data-dcnode-id="7953" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7951" href="#bib36" name="bbib36"><span data-dcnode-id="7952" instrument_node="">Shahidi, 2004a</span></a><span data-dcnode-id="7950" instrument_node="">). It is interesting to observe that even if two seed oils have a similar fatty acids composition, they can show a quite different TAG profile. For instance, both maize and sunflower oils are rich in linoleic (53.6 and 55.4%), oleic (both 30.2%), and palmitic (12.3 and 6.0%) acids, but maize oil is characterized by LLP, LLO, and LOO (35.8, 22.4, and 14.4%, respectively) and sunflower oil by LLO, LLP, and LLL (25.8, 22.7, and 17.8%). Flaxseed oil shows an unique fatty acid profile, being rich in α-linolenic acid, the essential </span><em data-dcnode-id="7948"><span data-dcnode-id="7949" instrument_node="">ω</span></em><span data-dcnode-id="7947" instrument_node="">-3 fatty acid. This is confirmed by the high amount of triacylglycerols with an elevated quantity of polyunsaturated fatty acids (PUFA) like LnLnLn, LnLnL, and LnLL (13.1, 12.2, and 15.1%, respectively) in this oil (</span><a class="workspace-trigger" data-dcnode-id="7945" href="#bib18" name="bbib18"><span data-dcnode-id="7946" instrument_node="">Jakab, Héberger, &amp; Forgács, 2002</span></a><span data-dcnode-id="7944" instrument_node="">) compared to all other oilseeds analyzed. Usually this high amount can be seen as a problem, as it reduces an oil’s resistance to oxidation, especially when the oil is used at high temperatures (</span><a class="workspace-trigger" data-dcnode-id="7942" href="#bib8" name="bbib8"><span data-dcnode-id="7943" instrument_node="">Chu &amp; Kung, 1998</span></a><span data-dcnode-id="7941" instrument_node="">). However, polyunsaturated fatty acids like linoleic and linolenic acid are fundamental in the human diet as they cannot be produced by animal metabolism (</span><a class="workspace-trigger" data-dcnode-id="7939" href="#bib38" name="bbib38"><span data-dcnode-id="7940" instrument_node="">Shahidi &amp; Wanasundara, 1998</span></a><span data-dcnode-id="7938" instrument_node="">). Linoleic acid is a component of ceramides and it is precursor of arachidonic acid that can produce prostaglandins, thromboxanes, prostacyclin, and leukotrienes (</span><a class="workspace-trigger" data-dcnode-id="7936" href="#bib4" name="bbib4"><span data-dcnode-id="7937" instrument_node="">Caballero et al., 2003</span></a><span data-dcnode-id="7935" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="7933" href="#bib10" name="bbib10"><span data-dcnode-id="7934" instrument_node="">Delplanque (2000)</span></a><span data-dcnode-id="7932" instrument_node=""> suggests that the total daily energy intake should contain 11–16% oleic acid, 4–6% linoleic acid, and 1% α-linoleic acid for best beneficial effects on lipemia and atherothrombotic parameters. Moreover, it should be better to prefer seed oils with low amount of saturated fats like, lauric, myristic and behenic acids because the presence of such compounds can negatively affect human lipid concentrations (</span><a class="workspace-trigger" data-dcnode-id="7930" href="#bib2" name="bbib2"><span data-dcnode-id="7931" instrument_node="">Beardsell et al., 2002</span></a><span data-dcnode-id="7929" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7927" href="#bib6" name="bbib6"><span data-dcnode-id="7928" instrument_node="">Cater and Denke, 2001</span></a><span data-dcnode-id="7926" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="6534" id="tbl1"><span class="captions" data-dcnode-id="7906"><span data-dcnode-id="7907"><p data-dcnode-id="7908"><span class="label" data-dcnode-id="7923"><span data-dcnode-id="7924" instrument_node="">Table 1</span></span><span data-dcnode-id="7922" instrument_node="">. </span><span data-dcnode-id="7920" instrument_node="">Fatty acid com  data-dcnode-id="4896" instrument_node="">0.05%.</span></p><p></p><dl class="footnotes" data-dcnode-id="4883"><dt data-dcnode-id="4892" id="tblfn2"><span data-dcnode-id="4893" instrument_node="">a</span></dt><dd data-dcnode-id="4889"><p data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">Values are means of triplicate determinations.</span></p></dd><dt data-dcnode-id="4887" id="tblfn3"><span data-dcnode-id="4888" instrument_node="">b</span></dt><dd data-dcnode-id="4884"><p data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">Compounds identified by comparison with pure standard.</span></p></dd></dl></div></div></section><section data-dcnode-id="4164" id="aep-section-id24"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4874"><span data-dcnode-id="4879" instrument_node="">3.2</span><span data-dcnode-id="4877" instrument_node="">. </span><span data-dcnode-id="4875" instrument_node="">α-, γ-, δ-Tocopherols</span></h3><div data-dcnode-id="4165"><p data-dcnode-id="4840"><span data-dcnode-id="4873" instrument_node="">Tocopherols act as antioxidants by trapping the hydroperoxide intermediates and stopping the autoxidation chain reaction. Differences in relative amounts of tocopherols are important: α-TOC affects human nutrition and health aspects, while γ-TOC shows a strong activity in the seed protecting compounds like fatty acids. The amount of tocopherols is very high in maize and soybean seed oils (1618.4 and 1797.6</span><span data-dcnode-id="4871" instrument_node="">&nbsp;</span><span data-dcnode-id="4869" instrument_node="">mg/kg, respectively) (</span><a class="workspace-trigger" data-dcnode-id="4867" href="#tbl3" name="btbl3"><span data-dcnode-id="4868" instrument_node="">Table 3</span></a><span data-dcnode-id="4866" instrument_node="">). All seed oils show a preponderance of γ-tocopherol (more than 78% of total tocopherols), except grape and sunflower oils where α-tocopherol is the most important (139.2 and 494.2</span><span data-dcnode-id="4864" instrument_node="">&nbsp;</span><span data-dcnode-id="4862" instrument_node="">mg/kg, respectively). Extra-virgin olive oils always show a high level of α-tocopherol, usually 50 times more than γ-tocopherol. Similar values were found in the literature, although variability within each seed oil variety can be observed and explained by genetic factors (</span><a class="workspace-trigger" data-dcnode-id="4860" href="#bib8" name="bbib8"><span data-dcnode-id="4861" instrument_node="">Chu and Kung, 1998</span></a><span data-dcnode-id="4859" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4857" href="#bib16" name="bbib16"><span data-dcnode-id="4858" instrument_node="">Grela and Günter, 1995</span></a><span data-dcnode-id="4856" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4854" href="#bib21" name="bbib21"><span data-dcnode-id="4855" instrument_node="">Kurilich and Juvik, 1999</span></a><span data-dcnode-id="4853" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4851" href="#bib44" name="bbib44"><span data-dcnode-id="4852" instrument_node="">Velasco et al., 2002</span></a><span data-dcnode-id="4850" instrument_node="">). Usually high amounts of TOCs are associated with PUFA content (</span><a class="workspace-trigger" data-dcnode-id="4848" href="#bib4" name="bbib4"><span data-dcnode-id="4849" instrument_node="">Caballero et al., 2003</span></a><span data-dcnode-id="4847" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4845" href="#bib36" name="bbib36"><span data-dcnode-id="4846" instrument_node="">Shahidi, 2004a</span></a><span data-dcnode-id="4844" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4842" href="#bib37" name="bbib37"><span data-dcnode-id="4843" instrument_node="">Shahidi, 2004b</span></a><span data-dcnode-id="4841" instrument_node="">), but we do not find any significant correlation between the amount of total tocopherols, α-, and γ-tocopherols and the amount of mono- or polyunsaturated fatty acids.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4166" id="tbl3"><span class="captions" data-dcnode-id="4822"><span data-dcnode-id="4823"><p data-dcnode-id="4824"><span class="label" data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">Table 3</span></span><span data-dcnode-id="4837" instrument_node="">. </span><span data-dcnode-id="4835" instrument_node="">Lipophile antioxidant compounds of vegetable oils (mg/kg, mean</span><a class="workspace-trigger" data-dcnode-id="4832" href="#tblfn4" name="btblfn4"><sup data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">a</span></sup></a><span data-dcnode-id="4831" instrument_node="">&nbsp;</span><span data-dcnode-id="4829" instrument_node="">±</span><span data-dcnode-id="4827" instrument_node="">&nbsp;</span><span data-dcnode-id="4825" instrument_node="">SD)</span></p></span></span><div class="groups" data-dcnode-id="4176"><table data-dcnode-id="4177"><thead data-dcnode-id="4804"><tr class="rowsep-1 valign-top" data-dcnode-id="4805"><th class="align-left" data-dcnode-id="4820" scope="col"><span data-dcnode-id="4821" instrument_node="">Oil type</span></th><th class="align-char" data-dcnode-id="4818" scope="col"><span data-dcnode-id="4819" instrument_node="">α-Tocopherol</span></th><th class="align-char" data-dcnode-id="4816" scope="col"><span data-dcnode-id="4817" instrument_node="">γ-Tocopherol</span></th><th class="align-char" data-dcnode-id="4814" scope="col"><span data-dcnode-id="4815" instrument_node="">δ-Tocopherol</span></th><th class="align-char" data-dcnode-id="4812" scope="col"><span data-dcnode-id="4813" instrument_node="">Total tocopherol</span></th><th class="align-char" data-dcnode-id="4810" scope="col"><span data-dcnode-id="4811" instrument_node="">Chlorophylls</span></th><th class="align-char" data-dcnode-id="4808" scope="col"><span data-dcnode-id="48 data-dcnode-id="4185" instrument_node="">±</span><span data-dcnode-id="4183" instrument_node="">&nbsp;</span><span data-dcnode-id="4181" instrument_node="">95.1</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4173"></p><p data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">nd not detected.</span></p><p></p><dl class="footnotes" data-dcnode-id="4167"><dt data-dcnode-id="4171" id="tblfn4"><span data-dcnode-id="4172" instrument_node="">a</span></dt><dd data-dcnode-id="4168"><p data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">Values are means of triplicate determinations.</span></p></dd></dl></div></div></section><section data-dcnode-id="4099" id="aep-section-id25"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4158"><span data-dcnode-id="4163" instrument_node="">3.3</span><span data-dcnode-id="4161" instrument_node="">. </span><span data-dcnode-id="4159" instrument_node="">Total chlorophyll, β-carotene, and squalene</span></h3><p data-dcnode-id="4131"><span data-dcnode-id="4157" instrument_node="">The chlorophylls amount in oilseeds ranges from a minimum of 1.5</span><span data-dcnode-id="4155" instrument_node="">&nbsp;</span><span data-dcnode-id="4153" instrument_node="">mg/kg in peanut oil to a maximum of 30.8</span><span data-dcnode-id="4151" instrument_node="">&nbsp;</span><span data-dcnode-id="4149" instrument_node="">mg/kg in pumpkin oil (</span><a class="workspace-trigger" data-dcnode-id="4147" href="#tbl3" name="btbl3"><span data-dcnode-id="4148" instrument_node="">Table 3</span></a><span data-dcnode-id="4146" instrument_node="">). High amounts can be found also in soybean, rapeseed and grapeseed, but the highest amount is found in olive oil (33.9</span><span data-dcnode-id="4144" instrument_node="">&nbsp;</span><span data-dcnode-id="4142" instrument_node="">mg/kg). β-Carotene shows a similar behaviour, as the amount in pumpkin oil is the highest (5.5</span><span data-dcnode-id="4140" instrument_node="">&nbsp;</span><span data-dcnode-id="4138" instrument_node="">mg/kg), while peanut and sunflower oils are the poorest of all. Presence of chlorophylls is usually associated with high quality oils, especially olive oil, but sometimes it is preferable to avoid high amounts as they can negatively affect the oil stability (</span><a class="workspace-trigger" data-dcnode-id="4136" href="#bib4" name="bbib4"><span data-dcnode-id="4137" instrument_node="">Caballero et al., 2003</span></a><span data-dcnode-id="4135" instrument_node="">). β-Carotene is the most common and most effective provitamin A and as with other carotenoids it acts as scavenger of singlet oxygen. Both carotenoids and chlorophylls, although playing a role as an antioxidant, they also act as pro-oxidants because of their instability against light and heat (</span><a class="workspace-trigger" data-dcnode-id="4133" href="#bib41" name="bbib41"><span data-dcnode-id="4134" instrument_node="">Subagio &amp; Morita, 2001</span></a><span data-dcnode-id="4132" instrument_node="">).</span></p><p data-dcnode-id="4100"><span data-dcnode-id="4130" instrument_node="">Squalene is a hydrocarbon present in unsaponifiable matter and is present in high amounts in olive oil. This triterpene is a key intermediate in the steroids biosynthetic pathway. It is also regarded as one of the compounds responsible for the beneficial effects against certain type of cancers (</span><a class="workspace-trigger" data-dcnode-id="4128" href="#bib27" name="bbib27"><span data-dcnode-id="4129" instrument_node="">Newmark, 1997</span></a><span data-dcnode-id="4127" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4125" href="#bib33" name="bbib33"><span data-dcnode-id="4126" instrument_node="">Rao et al., 1998</span></a><span data-dcnode-id="4124" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4122" href="#bib39" name="bbib39"><span data-dcnode-id="4123" instrument_node="">Smith, 2000</span></a><span data-dcnode-id="4121" instrument_node="">) although caution must be exercised when evaluating such data (</span><a class="workspace-trigger" data-dcnode-id="4119" href="#bib34" name="bbib34"><span data-dcnode-id="4120" instrument_node="">Scolastici, Ong, &amp; Moreno, 2004</span></a><span data-dcnode-id="4118" instrument_node="">). Antioxidant activity of squalene is demonstrated against PUFA (</span><a class="workspace-trigger" data-dcnode-id="4116" href="#bib13" name="bbib13"><span data-dcnode-id="4117" instrument_node="">Dessi et al., 2002</span></a><span data-dcnode-id="4115" instrument_node="">), and it is secondary to that of phenols and tocopherols (</span><a class="workspace-trigger" data-dcnode-id="4113" href="#bib32" name="bbib32"><span data-dcnode-id="4114" instrument_node="">Psomiadou &amp; Tsimidou, 1999</span></a><span data-dcnode-id="4112" instrument_node="">). Squalene was not detected in flaxseed, grapeseed, and soybean oils (</span><a class="workspace-trigger" data-dcnode-id="4110" href="#tbl3" name="btbl3"><span data-dcnode-id="4111" instrument_node="">Table 3</span></a><span data-dcnode-id="4109" instrument_node="">). In the other oilseeds, the amount of this hydrocarbon varied from 170.5 to 3529.9</span><span data-dcnode-id="4107" instrument_node="">&nbsp;</span><span data-dcnode-id="4105" instrument_node="">mg/kg in sunflower and pumpkin seed oils, respectively; a higher amount was found in olive oil (5990.0</span><span data-dcnode-id="4103" instrument_node="">&nbsp;</span><span data-dcnode-id="4101" instrument_node="">mg/kg)</span></p></section><section data-dcnode-id="3591" id="aep-section-id26"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4093"><span data-dcnode-id="4098" instrument_node="">3.4</span><span data-dcnode-id="4096" instrument_node="">. </span><span data-dcnode-id="4094" instrument_node="">Phenolic compounds</span></h3><div data-dcnode-id="3592"><p data-dcnode-id="4056"><span data-dcnode-id="4092" instrument_node="">Olives and extra virgin olive oil, rich in minor compounds like phenols, are supposed to be effective in cancer prevention (</span><a class="workspace-trigger" data-dcnode-id="4090" href="#bib17" name="bbib17"><span data-dcnode-id="4091" instrument_node="">Hashim et al., 2005</span></a><span data-dcnode-id="4089" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4087" href="#bib29" name="bbib29"><span data-dcnode-id="4088" instrument_node="">Owen et al., 2004</span></a><span data-dcnode-id="4086" instrument_node="">), and they can reduce the inflammation process in tissues (</span><a class="workspace-trigger" data-dcnode-id="4084" href="#bib12" name="bbib12"><span data-dcnode-id="4085" instrument_node="">de la Puerta, Martinez-Dominguez, &amp; Ruiz-Gutierrez, 2000</span></a><span data-dcnode-id="4083" instrument_node="">). The molecular structure of phenols is important for their antioxidant activity, as this activity is enhanced by a second hydroxyl or a methoxy group in the </span><em data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">ortho</span></em><span data-dcnode-id="4080" instrument_node="">- or </span><em data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">para</span></em><span data-dcnode-id="4077" instrument_node="">-position. Chromatograms of the phenolic fraction are very different for the eight oilseeds samples. </span><a class="workspace-trigger" data-dcnode-id="4075" href="#tbl4" name="btbl4"><span data-dcnode-id="4076" instrument_node="">Table 4</span></a><span data-dcnode-id="4074" instrument_node=""> reports the only phenolic compounds positively detected. From the UV spectra it can be suggested that some of compounds are derivatives of gallic acid, so a more detailed investigation is necessary. It is interesting to note that most of the phenolic compounds found in olive oil are not present in oilseeds. No evidence of flavonoid presence (like luteolin or apigenin) was found in the analyzed oilseeds. Maize seed oil contained vanillin, </span><em data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">trans</span></em><span data-dcnode-id="4071" instrument_node="">-cinnamic acid and ferulic acid (2.8, 0.9, and 0.5</span><span data-dcnode-id="4069" instrument_node="">&nbsp;</span><span data-dcnode-id="4067" instrument_node="">mg/kg, respectively). Rapeseed oil had a high amount of syringic acid (6.8</span><span data-dcnode-id="4065" instrument_node="">&nbsp;</span><span data-dcnode-id="4063" instrument_node="">mg/kg) and seeds from rape are described as rich in phenolic compounds, mainly sinapic acid (</span><a class="workspace-trigger" data-dcnode-id="4061" href="#bib1" name="bbib1"><span data-dcnode-id="4062" instrument_node="">Amarowicz et al., 2003</span></a><span data-dcnode-id="4060" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4058" href="#bib26" name="bbib26"><span data-dcnode-id="4059" instrument_node="">Naczk et al., 1998</span></a><span data-dcnode-id="4057" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3593" id="tbl4"><span class="captions" data-dcnode-id="4037"><span data-dcnode-id="4038"><p data-dcnode-id="4039"><span class="label" data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">Table 4</span></span><span data-dcnode-id="4053" instrument_node="">. </span><span data-dcnode-id="4051" instrument_node="">Phenolic compounds of vegetable oils (mg/kg, mean</span><span data-dcnode-id="4049" instrument_node="">&nbsp;</span><span data-dcnode-id="4047" instrument_node="">±</span><span data-dcnode-id="4045" instrument_node="">&nbsp;</span><span data-dcnode-id="4043" instrument_node="">SD)</span><a class="workspace-trigger" data-dcnode-id="4040" href="#tblfn5" name="btblfn5"><sup data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">a</span></sup></a></p></span></span><div class="groups" data- blfn5"><span data-dcnode-id="3604" instrument_node="">a</span></dt><dd data-dcnode-id="3600"><p data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Values are means of triplicate determinations.</span></p></dd><dt data-dcnode-id="3598" id="tblfn6"><span data-dcnode-id="3599" instrument_node="">b</span></dt><dd data-dcnode-id="3595"><p data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">Tentatively identified according to the uv-vis spectrum and by comparison of retention times with the literature.</span></p></dd></dl></div></div></section><section data-dcnode-id="3275" id="aep-section-id27"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3585"><span data-dcnode-id="3590" instrument_node="">3.5</span><span data-dcnode-id="3588" instrument_node="">. </span><span data-dcnode-id="3586" instrument_node="">DPPH radical scavenging activity of seed oils</span></h3><div data-dcnode-id="3276"><p data-dcnode-id="3519"><a class="workspace-trigger" data-dcnode-id="3583" href="#tbl5" name="btbl5"><span data-dcnode-id="3584" instrument_node="">Table 5</span></a><span data-dcnode-id="3582" instrument_node=""> shows the antioxidant activity of oilseeds expressed in TEAC for oils, and both for their methanol-soluble phase (HF) and the fraction insoluble in methanol (LF). To assess the antioxidant activity, the DPPH assay was chosen because it is one of the widespread methods used and this makes the comparison easier with the data published in the literature. DPPH radical scavenging activity of the oilseeds shows TEAC values ranging between 0.45 and 2.30</span><span data-dcnode-id="3580" instrument_node="">&nbsp;</span><span data-dcnode-id="3578" instrument_node="">mmol/l, with maize and soybean having higher values (2.30 and 1.75</span><span data-dcnode-id="3576" instrument_node="">&nbsp;</span><span data-dcnode-id="3574" instrument_node="">mmol/l, respectively). It can be noted that the LF have always a higher activity than the hydrophilic fraction. Similar results were reported by others, although the data were expressed in a different way (</span><a class="workspace-trigger" data-dcnode-id="3572" href="#bib15" name="bbib15"><span data-dcnode-id="3573" instrument_node="">Espín et al., 2000</span></a><span data-dcnode-id="3571" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3569" href="#bib43" name="bbib43"><span data-dcnode-id="3570" instrument_node="">Valavanidis et al., 2004</span></a><span data-dcnode-id="3568" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="3566" href="#bib30" name="bbib30"><span data-dcnode-id="3567" instrument_node="">Papadopoulos et al. (2003)</span></a><span data-dcnode-id="3565" instrument_node=""> found that HFs from maize and sunflower oils have an antioxidant activity much lower than HFs of olive oils, while the data in </span><a class="workspace-trigger" data-dcnode-id="3563" href="#tbl5" name="btbl5"><span data-dcnode-id="3564" instrument_node="">Table 5</span></a><span data-dcnode-id="3562" instrument_node=""> show that the differences are not so marked, especially for maize oil. The analysis of the data does not allow finding an univocal correlation between the antioxidant power of oils and their composition. In fact, maize and soya oils show the highest TEAC value, and they also have the highest tocopherol contents, but not of squalene or chlorophyll. Olive oil, in spite of the elevated content of phenolic substances and squalene, does not show a particularly high TEAC value. Maize oil shows the highest antioxidant activity for oil, HF and LF. The ratio LF/HF shows that the LF always predominates the HF with olive oil showing a lower value (1.83), while peanut and sunflower seed oils reach 5.38 and 7.38, respectively. This means that the contribution of the LF is very strong, and this is connected with the amount of PUFA as a significant correlation was found (</span><em data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">r</span></em><span data-dcnode-id="3559" instrument_node="">&nbsp;</span><span data-dcnode-id="3557" instrument_node="">=</span><span data-dcnode-id="3555" instrument_node="">&nbsp;</span><span data-dcnode-id="3553" instrument_node="">+0.61) between polyunsaturated fatty acids and LF. Moreover, a negative correlation (</span><em data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">r</span></em><span data-dcnode-id="3550" instrument_node="">&nbsp;</span><span data-dcnode-id="3548" instrument_node="">=</span><span data-dcnode-id="3546" instrument_node="">&nbsp;</span><span data-dcnode-id="3544" instrument_node="">−0.63) existed between monounsaturated fatty acids and LF. More interesting is the correlation between tocopherols and TEAC values of oils and LF: total tocopherols </span><em data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">vs.</span></em><span data-dcnode-id="3541" instrument_node=""> TEAC oil value shows a </span><em data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">r</span></em><span data-dcnode-id="3538" instrument_node="">&nbsp;</span><span data-dcnode-id="3536" instrument_node="">=</span><span data-dcnode-id="3534" instrument_node="">&nbsp;</span><span data-dcnode-id="3532" instrument_node="">+0.70, while total tocopherols </span><em data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">vs.</span></em><span data-dcnode-id="3529" instrument_node=""> TEAC LF value shows a </span><em data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">r</span></em><span data-dcnode-id="3526" instrument_node="">&nbsp;</span><span data-dcnode-id="3524" instrument_node="">=</span><span data-dcnode-id="3522" instrument_node="">&nbsp;</span><span data-dcnode-id="3520" instrument_node="">+0.75. Of course, variability and anomalies of the correlation between the antioxidant activity and the composition of the oilseeds could be attributed to the differences in the squalene, chlorophylls, carotenoids, and phenols contents of the oils and their mutual interactions.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3277" id="tbl5"><span class="captions" data-dcnode-id="3507"><span data-dcnode-id="3508"><p data-dcnode-id="3509"><span class="label" data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">Table 5</span></span><span data-dcnode-id="3516" instrument_node="">. </span><span data-dcnode-id="3514" instrument_node="">Radical scavenging activity of vegetable oils (TEAC</span><a class="workspace-trigger" data-dcnode-id="3511" href="#tblfn7" name="btblfn7"><sup data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">A</span></sup></a><span data-dcnode-id="3510" instrument_node="">, mmol/l)</span></p></span></span><div class="groups" data-dcnode-id="3303"><table data-dcnode-id="3304"><thead data-dcnode-id="3459"><tr class="valign-top" data-dcnode-id="3493"><th class="align-left rowsep-1" data-dcnode-id="3505" rowspan="2" scope="col"><span data-dcnode-id="3506" instrument_node="">Oil type</span></th><th class="align-char rowsep-1" colspan="7" data-dcnode-id="3494" scope="col"><span data-dcnode-id="3504" instrument_node="">TEAC</span><a class="workspace-trigger" data-dcnode-id="3501" href="#tblfn8" name="btblfn8"><sup data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">B</span></sup></a><sup data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="3496" href="#tblfn9" name="btblfn9"><sup data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">C</span></sup></a><span data-dcnode-id="3495" instrument_node=""> (mmol/l)</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="3460"><th class="align-left" colspan="2" data-dcnode-id="3483" scope="col"><span data-dcnode-id="3492" instrument_node="">OIL (mean</span><span data-dcnode-id="3490" instrument_node="">&nbsp;</span>
