s="css-1xe63ky" data-dcnode-id="1341" href="#kale"><span data-dcnode-id="1342" instrument_node="">Kale</span></a></li><li class="css-t753mo" data-dcnode-id="1337"><a class="css-1xe63ky" data-dcnode-id="1338" href="#orange-vegetables"><span data-dcnode-id="1339" instrument_node="">Orange vegetables</span></a></li><li class="css-t753mo" data-dcnode-id="1334"><a class="css-1xe63ky" data-dcnode-id="1335" href="#summary"><span data-dcnode-id="1336" instrument_node="">Summary</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="694"><div class="css-1u22pos" data-dcnode-id="1302"><span data-dcnode-id="1331" style="font-size:0;line-height:0"></span><div data-dcnode-id="1328"><p class="css-dmtxcr" data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Antioxidants are compounds that may help delay or even prevent cell damage in the body. When a person consumes them in large amounts, antioxidants may help defend the body against oxidative stress from potentially harmful free radicals, which are unstable atoms.</span></p></div><p data-dcnode-id="1317"><span data-dcnode-id="1327" instrument_node="">When free radicals build up in a person’s blood, they can create oxidative </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/145855.php" title="Why stress happens and how to manage it"><span data-dcnode-id="1326" instrument_node="">stress</span></a><span data-dcnode-id="1324" instrument_node="">. Oxidative stress may increase the risk of developing </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/info/cancer-oncology/" title="What is Cancer?"><span data-dcnode-id="1323" instrument_node="">cancer</span></a><span data-dcnode-id="1321" instrument_node="">, </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/237191.php" title="Everything you need to know about heart disease"><span data-dcnode-id="1320" instrument_node="">heart disease</span></a><span data-dcnode-id="1318" instrument_node="">, and many other chronic illnesses and health problems.</span></p><p data-dcnode-id="1312"><span data-dcnode-id="1316" instrument_node="">Many healthful foods contain </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/301506.php" title="How can antioxidants benefit our health?"><span data-dcnode-id="1315" instrument_node="">antioxidants</span></a><span data-dcnode-id="1313" instrument_node="">. If a person consumes some or all of these foods regularly, they may increase their antioxidant levels, potentially helping them prevent the damage that doctors associate with oxidative stress.</span></p><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">In this article, we list some of the most healthful foods that a person can eat to boost the antioxidants in their diet.</span></p><div data-dcnode-id="1309" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="1303"><aside class="css-0 css-0" data-dcnode-id="1304"><div data-dcnode-id="1305"><div class="css-10gx9pb" data-dcnode-id="1306" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1308"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1307" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1232"><span data-dcnode-id="1301" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1297"><div data-dcnode-id="1298"><a class="chartbeat-section" data-dcnode-id="1299" name="blueberries"><span data-dcnode-id="1300" instrument_node="">1. Blueberries</span></a></div></h2><div data-dcnode-id="1282"><figure class="css-oei5ji" data-dcnode-id="1283"><span class="css-rwmw5v" data-dcnode-id="1286"><span class="css-1767n2d" data-dcnode-id="1291"><picture class="css-16pk1is" data-dcnode-id="1292"><source data-dcnode-id="1296" media="(min-width: 1190px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-plate-of-blueberries-which-are-amongst-the-group-of-good-antioxidant-foods.jpg?w=1575 750w"><source data-dcnode-id="1295" media="(min-width: 990px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-plate-of-blueberries-which-are-amongst-the-group-of-good-antioxidant-foods.jpg?w=1575 750w"><source data-dcnode-id="1294" media="(min-width: 768px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-plate-of-blueberries-which-are-amongst-the-group-of-good-antioxidant-foods.jpg?w=1845 879w"><img alt="a plate of blueberries, which are amongst the group of good antioxidant foods" class="css-rk88xp" data-dcnode-id="1293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-plate-of-blueberries-which-are-amongst-the-group-of-good-antioxidant-foods.jpg%3Fw%3D1155&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1287"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="1288" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-1&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fa-plate-of-blueberries-which-are-amongst-the-group-of-good-antioxidant-foods.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-plate-of-blueberries-which-are-amongst-the-group-of-good-antioxidant-foods.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="1284"><br data-dcnode-id="1285"></figcaption></figure></div><p data-dcnode-id="1267"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/287710.php" title="Everything you need to know about blueberries"><span data-dcnode-id="1281" instrument_node="">Blueberries</span></a><span data-dcnode-id="1279" instrument_node=""> are rich in nutrients while also being low in </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/245588.php" title="How many calories should I eat a day?"><span data-dcnode-id="1278" instrument_node="">calories</span></a><span data-dcnode-id="1276" instrument_node="">. A </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1269" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5717128/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1275" instrument_node="">2017 study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1272"><span class="sro" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1270"></span></hl-trusted-source><span data-dcnode-id="1268" instrument_node=""> showed that wild blueberries contain a large number of antioxidants.</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1266" instrument_node="">Studies on blueberries have shown that these fruits have beneficial effects as a result of their antioxidant content. For example, the authors of a </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1259" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21756533" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1265" instrument_node="">review of animal studies</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1262"><span class="sro" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1260"></span></hl-trusted-source><span data-dcnode-id="1258" instrument_node=""> concluded that antioxidants in blueberries might have medicinal uses for neurological conditions, including those that relate to aging.</span></p><p data-dcnode-id="1247"><span data-dcnode-id="1256" instrument_node="">A </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1249" rationale="Peer reviewed journal" source="BMC/BioMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//translational-medicine.biomedcentral.com/articles/10.1186/s12967-016-1076-5" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1255" instrument_node="">2016 review</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1252"><span class="sro" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1250"></span></hl-trusted-source><span data-dcnode-id="1248" instrument_node=""> examined the anthocyanins that occur naturally in blueberries and other plant materials. Anthocyanins belong to a group of chemicals that have antioxidant and anti-inflammatory actions. They are responsible for many of the bright colors of fruits and vegetables.</span></p><p data-dcnode-id="1239"><span data-dcnode-id="1246" instrument_node="">The review found that anthocyanins may help prevent high levels of low density lipoprotein (LDL), or bad, </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/9152.php" title="What causes high cholesterol?"><span data-dcnode-id="1245" instrument_node="">cholesterol</span></a><span data-dcnode-id="1243" instrument_node="">, as well as lowering the risk of heart disease and decreasing a person’s </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/270644.php" title="What is a normal blood pressure?"><span data-dcnode-id="1242" instrument_node="">blood pressure</span></a><span data-dcnode-id="1240" instrument_node="">.</span></p><div class="css-1cg0byz" data-dcnode-id="1233"><aside class="css-0 css-0" data-dcnode-id="1234"><div data-dcnode-id="1235"><div class="css-az6x7v" data-dcnode-id="1236" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1238"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="1237" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1184"><span data-dcnode-id="1231" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1227"><div data-dcnode-id="1228"><a class="chartbeat-section" data-dcnode-id="1229" name="dark-chocolate"><span data-dcnode-id="1230" instrument_node="">2. Dark chocolate</span></a></div></h2><div data-dcnode-id="1214"><figure class="css-oei5ji" data-dcnode-id="1215"><span class="css-rwmw5v" data-dcnode-id="1216"><span class="css-1767n2d" data-dcnode-id="1221"><picture class="css-16pk1is" data-dcnode-id="1222"><source data-dcnode-id="1226" media="(min-width: 1190px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/bars-of-dark-chocolate-on-a-table.jpg?w=1575 750w"><source data-dcnode-id="1225" media="(min-width: 990px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/bars-of-dark-chocolate-on-a-table.jpg?w=1575 750w"><source data-dcnode-id="1224" media="(min-width: 768px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/bars-of-dark-chocolate-on-a-table.jpg?w=1845 879w"><img alt="bars of dark chocolate on a table. " class="css-rk88xp" data-dcnode-id="1223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/bars-of-dark-chocolate-on-a-table.jpg%3Fw%3D1155&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1217"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="1218" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-2&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fbars-of-dark-chocolate-on-a-table.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/bars-of-dark-chocolate-on-a-table.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Good quality dark chocolate has high levels of nutrients and antioxidants. Researchers have linked dark chocolate to a range of potential health benefits, including:</span></p><ul data-dcnode-id="1199"><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">lower risk of heart disease</span></li><li data-dcnode-id="1206"><span data-dcnode-id="1209" instrument_node="">reduced </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/248423.php" title="Everything you need to know about inflammation"><span data-dcnode-id="1208" instrument_node="">inflammation</span></a></li><li data-dcnode-id="1202"><span data-dcnode-id="1205" instrument_node="">less chance of </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/159283.php" title="What to know about high blood pressure"><span data-dcnode-id="1204" instrument_node="">high blood pressure</span></a></li><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">promotion of good cholesterol</span></li></ul><p data-dcnode-id="1194"><span data-dcnode-id="1198" instrument_node="">One </span><a class="content-link css-1pg8eb5" data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ajh/article/23/1/97/150091" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1197" instrument_node="">review of 10 studies</span></a><span data-dcnode-id="1195" instrument_node=""> involving close to 300 participants showed that dark chocolate helps reduce both upper and lower blood pressure measurements.</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">The authors noted, however, that future research needs to determine how much dark chocolate a person should eat for these benefits and investigate its effect on other metabolic conditions.</span></p><div data-dcnode-id="1191" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="1185"><aside class="css-0 css-0" data-dcnode-id="1186"><div data-dcnode-id="1187"><div class="css-10gx9pb" data-dcnode-id="1188" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1190"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="1189" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1129"><span data-dcnode-id="1183" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1179"><div data-dcnode-id="1180"><a class="chartbeat-section" data-dcnode-id="1181" name="artichokes"><span data-dcnode-id="1182" instrument_node="">3. Artichokes</span></a></div></h2><div data-dcnode-id="1166"><figure class="css-4kegza" data-dcnode-id="1167"><span class="css-rwmw5v" data-dcnode-id="1168"><span class="css-8a7ufk" data-dcnode-id="1173"><picture class="css-16pk1is" data-dcnode-id="1174"><source data-dcnode-id="1178" media="(min-width: 1190px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/artichokes-on-wooden-surface.jpg?w=1575 750w"><source data-dcnode-id="1177" media="(min-width: 990px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/artichokes-on-wooden-surface.jpg?w=1575 750w"><source data-dcnode-id="1176" media="(min-width: 768px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/artichokes-on-wooden-surface.jpg?w=1845 879w"><img alt="Artichokes on wooden surface" class="css-1jytyml" data-dcnode-id="1175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/artichokes-on-wooden-surface.jpg%3Fw%3D1155%26h%3D1541&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1169"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="1170" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-3&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fartichokes-on-wooden-surface.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/artichokes-on-wooden-surface.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Artichokes provide lots of nutrients and antioxidants. Research suggests that they may help lower people’s cholesterol levels and improve their gut health.</span></p><p data-dcnode-id="1154"><span data-dcnode-id="1163" instrument_node="">One </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1156" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26310198" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1162" instrument_node="">study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1159"><span class="sro" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1157"></span></hl-trusted-source><span data-dcnode-id="1155" instrument_node=""> looking at the medicinal use of artichokes over time noted that artichoke consumption can be good for gut, liver, and heart health.</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1153" instrument_node="">Another </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1146" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25758164" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1152" instrument_node="">study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1149"><span class="sro" data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1147"></span></hl-trusted-source><span data-dcnode-id="1145" instrument_node=""> showed that chemicals in artichokes had an antioxidant effect on LDL cholesterol in laboratory tests. Therefore, regularly consuming artichokes may contribute to lowering a person’s risk of cardiovascular diseases and other related conditions.</span></p><p data-dcnode-id="1134"><span data-dcnode-id="1143" instrument_node="">How people prepare artichokes makes a difference to their antioxidant levels. One </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1136" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18759447" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1142" instrument_node="">study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1139"><span class="sro" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1137"></span></hl-trusted-source><span data-dcnode-id="1135" instrument_node=""> compared boiling, frying, and steaming to see how each affected the antioxidant levels.</span></p><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">The results showed that steaming increased the effectiveness of the antioxidants by 15 times while boiling increased it eightfold. Researchers believe the reason for this is that boiling and steaming break down the cell walls, making the antioxidants more accessible.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="1131" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="1130" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="1100"><span data-dcnode-id="1128" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1124"><div data-dcnode-id="1125"><a class="chartbeat-section" data-dcnode-id="1126" name="pecans"><span data-dcnode-id="1127" instrument_node="">4. Pecans</span></a></div></h2><div data-dcnode-id="1115"><figure class="css-oei5ji" data-dcnode-id="1116"><span class="css-rwmw5v" data-dcnode-id="1117"><span class="css-1767n2d" data-dcnode-id="1122"><lazy-image alt="Pecan Halves Tumbling out of a Measuring Cup" classname="css-rk88xp" data-dcnode-id="1123" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/pecan-halves-tumbling-out-of-a-measuring-cup.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/pecan-halves-tumbling-out-of-a-measuring-cup.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/pecan-halves-tumbling-out-of-a-measuring-cup.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/pecan-halves-tumbling-out-of-a-measuring-cup.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1118"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="1119" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-4&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fpecan-halves-tumbling-out-of-a-measuring-cup.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/pecan-halves-tumbling-out-of-a-measuring-cup.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Pecans offer high levels of good fat, calories, minerals, and antioxidants.</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1112" instrument_node="">One </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1105" rationale="Highly respected journal,Expert written journal,Peer reviewed journal" source="Journal of Nutrition"><a class="content-link css-1pg8eb5" data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/jn/article/141/1/56/4630660" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1111" instrument_node="">study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1108"><span class="sro" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1106"></span></hl-trusted-source><span data-dcnode-id="1104" instrument_node=""> showed that the body can absorb antioxidants from pecans, increasing their levels in the blood.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">It also found that eating raw pecans helps lower the blood levels of oxidized LDL cholesterol, which may mean that these nuts help prevent heart disease.</span></p></div><div class="css-0" data-dcnode-id="1060"><span data-dcnode-id="1099" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1095"><div data-dcnode-id="1096"><a class="chartbeat-section" data-dcnode-id="1097" name="strawberries"><span data-dcnode-id="1098" instrument_node="">5. Strawberries</span></a></div></h2><div data-dcnode-id="1086"><figure class="css-oei5ji" data-dcnode-id="1087"><span class="css-rwmw5v" data-dcnode-id="1088"><span class="css-1767n2d" data-dcnode-id="1093"><lazy-image alt="Tumble of Strawberries" classname="css-rk88xp" data-dcnode-id="1094" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/tumble-of-strawberries.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/tumble-of-strawberries.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/tumble-of-strawberries.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/tumble-of-strawberries.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1089"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="1090" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-5&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Ftumble-of-strawberries.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/tumble-of-strawberries.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="1081"><span data-dcnode-id="1085" instrument_node="">Strawberries are rich in antioxidants, </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/195878.php" title="Vitamins: What are they and what do they do?"><span data-dcnode-id="1084" instrument_node="">vitamins</span></a><span data-dcnode-id="1082" instrument_node="">, and minerals. Strawberries owe their red color to anthocyanins, which have antioxidant powers.</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1080" instrument_node="">A </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1073" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4728646/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1079" instrument_node="">2016 review</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1076"><span class="sro" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1074"></span></hl-trusted-source><span data-dcnode-id="1072" instrument_node=""> showed that taking anthocyanin supplements reduced the levels of LDL cholesterol in participants with high cholesterol. By lowering LDL cholesterol levels, anthocyanins may help prevent heart disease.</span></p><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">People can consume raw strawberries as a snack or as part of a salad or other dish.</span></p><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Although strawberries are an ingredient in some baked goods, these products are rarely healthful and are not a good choice for people trying to lose weight.</span></p><div class="css-20w1gi" data-dcnode-id="1061"><aside class="css-0 css-0" data-dcnode-id="1062"><div data-dcnode-id="1063"><div class="css-1sq15os" data-dcnode-id="1064" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1066"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="1065" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="981"><span data-dcnode-id="1059" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1055"><div data-dcnode-id="1056"><a class="chartbeat-section" data-dcnode-id="1057" name="red-cabbage"><span data-dcnode-id="1058" instrument_node="">6. Red cabbage</span></a></div></h2><div data-dcnode-id="1046"><figure class="css-oei5ji" data-dcnode-id="1047"><span class="css-rwmw5v" data-dcnode-id="1048"><span class="css-1767n2d" data-dcnode-id="1053"><lazy-image alt="chopped red cabbage on a chopping board. " classname="css-rk88xp" data-dcnode-id="1054" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/chopped-red-cabbage-on-a-chopping-board.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/chopped-red-cabbage-on-a-chopping-board.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/chopped-red-cabbage-on-a-chopping-board.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/chopped-red-cabbage-on-a-chopping-board.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1049"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="1050" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-6&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fchopped-red-cabbage-on-a-chopping-board.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/chopped-red-cabbage-on-a-chopping-board.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Red cabbage contains many nutrients, including vitamins A, C, and K plus several antioxidants.</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">Red cabbage, like strawberries and red </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/270435.php" title="What are the health benefits of kale?"><span data-dcnode-id="1042" instrument_node="">kale</span></a><span data-dcnode-id="1040" instrument_node="">, contains anthocyanins. In addition to giving the vegetable its red color, this group of antioxidants helps promote heart health, prevent cancer, and reduce inflammation.</span></p><p data-dcnode-id="1029"><span data-dcnode-id="1038" instrument_node="">According to </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1031" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22129334" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1037" instrument_node="">one study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1034"><span class="sro" data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1032"></span></hl-trusted-source><span data-dcnode-id="1030" instrument_node="">, anthocyanins have the following health benefits:</span></p><ul data-dcnode-id="1016"><li data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">anti-inflammatory</span></li><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">anticancer</span></li><li data-dcnode-id="1021"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/info/diabetes/" title="What is Diabetes?"><span data-dcnode-id="1024" instrument_node="">diabetes</span></a><span data-dcnode-id="1022" instrument_node=""> maintenance and management</span></li><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">promote weight control</span></li><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">prevent heart disease</span></li></ul><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">However, more research is still necessary to determine the health effects of eating red cabbage. A person can eat red cabbage as part of a salad or as a cooked vegetable.</span></p><div data-dcnode-id="982" id="m99e6bb5c-e3c9-45a4-8980-0791b1cb22ca"><div data-dcnode-id="983"><form data-dcnode-id="984" novalidate=""><div data-dcnode-id="985"><section class="css-11k39sg" data-dcnode-id="986"><div class="css-qytt4r" data-dcnode-id="1013"></div><div class="css-rp3d6" data-dcnode-id="988"><div class="css-14rn8ss" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Medical News Today Newsletter</span></div><div class="css-kp58b2" data-dcnode-id="1006"><div class="css-d0dhcg" data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Knowledge is power. Get our free daily newsletter. </span></div><p class="css-1cr3nkl" data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Dig deeper into the health topics you care about most. Subscribe to our facts-first newsletter today.</span></p></div><div class="css-8nu43k" data-dcnode-id="989"><div data-dcnode-id="990"><div class="css-12wslxx" data-dcnode-id="996"><div class="css-11eiosp" data-dcnode-id="1001"><div class="css-1rr4qq7" data-dcnode-id="1002"><div class="css-qddt1o" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="1003" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1ibu3gk" data-dcnode-id="997" type="submit"><span class="css-14ktbsh" data-dcnode-id="998"><span class="css-1huyk6v" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">SIGN UP NOW</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">Your </span><a class="css-mn8og5" data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="994" instrument_node="">privacy</span></a><span data-dcnode-id="992" instrument_node=""> is important to us</span></p></div></div></div><div class="css-g6xd" data-dcnode-id="987"></div></section></div></form></div></div></div><div class="css-0" data-dcnode-id="928"><span data-dcnode-id="980" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="976"><div data-dcnode-id="977"><a class="chartbeat-section" data-dcnode-id="978" name="raspberries"><span data-dcnode-id="979" instrument_node="">7. Raspberries</span></a></div></h2><div data-dcnode-id="967"><figure class="css-oei5ji" data-dcnode-id="968"><span class="css-rwmw5v" data-dcnode-id="969"><span class="css-1767n2d" data-dcnode-id="974"><lazy-image alt="Raspberries in a mug" classname="css-rk88xp" data-dcnode-id="975" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/raspberries-in-a-mug.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/raspberries-in-a-mug.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/raspberries-in-a-mug.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/raspberries-in-a-mug.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="970"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="971" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-7&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fraspberries-in-a-mug.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/raspberries-in-a-mug.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Raspberries are an excellent source of many antioxidants. They also contain manganese, vitamin C, and dietary fiber. Evidence suggests that the antioxidants present in raspberries may help destroy certain cancer cells.</span></p><p data-dcnode-id="952"><span data-dcnode-id="964" instrument_node="">For example, in </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="957" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21130297" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="963" instrument_node="">one laboratory study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="960"><span class="sro" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="958"></span></hl-trusted-source><span data-dcnode-id="956" instrument_node="">, researchers found that the antioxidants and some other compounds in raspberries helped kill breast, colon, and </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/257341.php" title="What to know about stomach cancer"><span data-dcnode-id="955" instrument_node="">stomach cancer</span></a><span data-dcnode-id="953" instrument_node=""> cells in a test tube.</span></p><p data-dcnode-id="947"><span data-dcnode-id="951" instrument_node="">In the case of </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/37136.php" title="What to know about breast cancer"><span data-dcnode-id="950" instrument_node="">breast cancer</span></a><span data-dcnode-id="948" instrument_node="">, the researchers attributed some 50% of the cancer cell destruction to the antioxidant effects of the raspberry extract.</span></p><p data-dcnode-id="937"><span data-dcnode-id="946" instrument_node="">A more recent </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="939" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5008867/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="945" instrument_node="">review of studies</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="942"><span class="sro" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="940"></span></hl-trusted-source><span data-dcnode-id="938" instrument_node=""> showed that the compounds in black raspberries might slow the progression of cancerous tumors.</span></p><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">However, most of the research on raspberries has involved experiments in test tubes. Consequently, researchers need to carry out studies involving people to judge the effectiveness of eating raspberries in preventing disease.</span></p><div class="css-umsscj" data-dcnode-id="929"><aside class="css-0 css-0" data-dcnode-id="930"><div data-dcnode-id="931"><div class="css-10gx9pb" data-dcnode-id="932" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="934"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline20" data-dcnode-id="933" id="inline20__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="880"><span data-dcnode-id="927" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="923"><div data-dcnode-id="924"><a class="chartbeat-section" data-dcnode-id="925" name="beans"><span data-dcnode-id="926" instrument_node="">8. Beans</span></a></div></h2><div data-dcnode-id="912"><figure class="css-oei5ji" data-dcnode-id="913"><span class="css-rwmw5v" data-dcnode-id="916"><span class="css-1767n2d" data-dcnode-id="921"><lazy-image alt="a bowl of Pinto beans" classname="css-rk88xp" data-dcnode-id="922" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bowl-of-pinto-beans.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bowl-of-pinto-beans.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bowl-of-pinto-beans.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bowl-of-pinto-beans.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="917"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="918" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-8&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fa-bowl-of-pinto-beans.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bowl-of-pinto-beans.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Research has shown that pinto beans could help in suppressing certain types of cancer.</span></figcaption></figure></div><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Beans are an excellent source of protein and dietary fiber. Some beans, such as pinto beans, are also high in antioxidants.</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Pinto beans contain a plant flavonoid called kaempferol, which may help suppress cancer cell growth and reduce inflammation. Several studies link kaempferol to the suppression of specific cancers, including:</span></p><ul data-dcnode-id="885"><li data-dcnode-id="900"><hl-trusted-source class="css-ngo64e" data-dcnode-id="901" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26878784" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="907" instrument_node="">breast</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="904"><span class="sro" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="902"></span></hl-trusted-source></li><li data-dcnode-id="897"><a class="content-link css-1pg8eb5" data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medsci.org/v14p0984.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="899" instrument_node="">kidney</span></a></li><li data-dcnode-id="894"><a class="content-link css-1pg8eb5" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spandidos-publications.com/or/34/5/2351" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="896" instrument_node="">lung</span></a></li><li data-dcnode-id="886"><hl-trusted-source class="css-ngo64e" data-dcnode-id="887" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24700700" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="893" instrument_node="">bladder</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="890"><span class="sro" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="888"></span></hl-trusted-source></li></ul><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Despite these promising studies, researchers do not know much about the antioxidant effect of kaempferol in humans. To date, they have primarily carried out studies in animals and test tubes.</span></p><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">However, as beans have several potential health benefits, it is a good idea for people to include them as part of their regular diet.</span></p></div><div class="css-0" data-dcnode-id="842"><span data-dcnode-id="879" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="875"><div data-dcnode-id="876"><a class="chartbeat-section" data-dcnode-id="877" name="purple-or-red-grapes"><span data-dcnode-id="878" instrument_node="">9. Purple or red grapes</span></a></div></h2><div data-dcnode-id="866"><figure class="css-oei5ji" data-dcnode-id="867"><span class="css-rwmw5v" data-dcnode-id="868"><span class="css-1767n2d" data-dcnode-id="873"><lazy-image alt="a bunch of grapes on a dark table. " classname="css-rk88xp" data-dcnode-id="874" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bunch-of-grapes-on-a-dark-table.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bunch-of-grapes-on-a-dark-table.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bunch-of-grapes-on-a-dark-table.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bunch-of-grapes-on-a-dark-table.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="869"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="870" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-9&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fa-bunch-of-grapes-on-a-dark-table.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/a-bunch-of-grapes-on-a-dark-table.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">Purple and red grape varieties contain vitamin C, </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/287842.php" title="Selenium: What it does and how much you need"><span data-dcnode-id="864" instrument_node="">selenium</span></a><span data-dcnode-id="862" instrument_node="">, and antioxidants.</span></p><p data-dcnode-id="851"><span data-dcnode-id="860" instrument_node="">Two of the antioxidants that occur in grapes, namely </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="853" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22129334" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="859" instrument_node="">anthocyanin</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="856"><span class="sro" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="854"></span></hl-trusted-source><span data-dcnode-id="852" instrument_node=""> and proanthocyanin, may help protect a person from heart disease or cancer.</span></p><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">However, there is a need for additional research to show the exact effects that eating grapes has on heart health and cancer risk.</span></p><div class="css-umsscj" data-dcnode-id="843"><aside class="css-0 css-0" data-dcnode-id="844"><div data-dcnode-id="845"><div class="css-10gx9pb" data-dcnode-id="846" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="848"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline25" data-dcnode-id="847" id="inline25__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="810"><span data-dcnode-id="841" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="837"><div data-dcnode-id="838"><a class="chartbeat-section" data-dcnode-id="839" name="spinach"><span data-dcnode-id="840" instrument_node="">10. Spinach</span></a></div></h2><div data-dcnode-id="828"><figure class="css-oei5ji" data-dcnode-id="829"><span class="css-rwmw5v" data-dcnode-id="830"><span class="css-1767n2d" data-dcnode-id="835"><lazy-image alt="leafs of spinach in a white bowl. " classname="css-rk88xp" data-dcnode-id="836" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/leafs-of-spinach-in-a-white-bowl.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/leafs-of-spinach-in-a-white-bowl.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/leafs-of-spinach-in-a-white-bowl.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/leafs-of-spinach-in-a-white-bowl.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="831"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="832" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-10&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fleafs-of-spinach-in-a-white-bowl.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/leafs-of-spinach-in-a-white-bowl.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Spinach is a green, leafy vegetable full of vitamins, minerals, and antioxidants. It is low in calories, making it an excellent choice as an addition to salads and entrees.</span></p><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Zeaxanthin and lutein are two of the antioxidants in spinach that may promote eye health. They help prevent damage from ultraviolet (UV) rays and other harmful light waves.</span></p><p data-dcnode-id="811"><span data-dcnode-id="823" instrument_node="">A </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="816" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28208784" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="822" instrument_node="">review of studies</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="819"><span class="sro" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="817"></span></hl-trusted-source><span data-dcnode-id="815" instrument_node=""> on lutein and zeaxanthin noted that lots of studies have investigated their role in age-related </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/152105.php" title="What is age-related macular degeneration (AMD)?"><span data-dcnode-id="814" instrument_node="">macular degeneration</span></a><span data-dcnode-id="812" instrument_node="">. The authors also suggested how people could get more of these antioxidants in their diets, naming dark leafy greens, eggs, and pistachios as sources.</span></p></div><div class="css-0" data-dcnode-id="764"><span data-dcnode-id="809" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="805"><div data-dcnode-id="806"><a class="chartbeat-section" data-dcnode-id="807" name="beets"><span data-dcnode-id="808" instrument_node="">11. Beets</span></a></div></h2><div data-dcnode-id="794"><figure class="css-oei5ji" data-dcnode-id="795"><span class="css-rwmw5v" data-dcnode-id="798"><span class="css-1767n2d" data-dcnode-id="803"><lazy-image alt="beetroot" classname="css-rk88xp" data-dcnode-id="804" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/beetroot.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/beetroot.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/beetroot.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/beetroot.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="799"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="800" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-11&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fbeetroot.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/beetroot.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="796"><br data-dcnode-id="797"></figcaption></figure></div><p data-dcnode-id="789"><span data-dcnode-id="793" instrument_node="">Beets are vegetables that contain antioxidants belonging to a class of pigments called betalains. Betalains may help prevent </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/150496.php" title="Everything you need to know about colon cancer"><span data-dcnode-id="792" instrument_node="">colon cancer</span></a><span data-dcnode-id="790" instrument_node=""> and digestive issues.</span></p><p data-dcnode-id="781"><span data-dcnode-id="788" instrument_node="">Beets are also a source of dietary fiber, iron, </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/287677.php" title="Why is folate good for you?"><span data-dcnode-id="787" instrument_node="">folate</span></a><span data-dcnode-id="785" instrument_node="">, and </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/287212.php" title="Everything you need to know about potassium"><span data-dcnode-id="784" instrument_node="">potassium</span></a><span data-dcnode-id="782" instrument_node="">. These substances may help with suppressing inflammation.</span></p><p data-dcnode-id="771"><span data-dcnode-id="780" instrument_node="">One </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="773" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25118005" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="779" instrument_node="">review</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="776"><span class="sro" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="774"></span></hl-trusted-source><span data-dcnode-id="772" instrument_node=""> noted that betalains show promise for reducing free radicals and helping prevent cancer. However, research has not yet determined the effectiveness of eating beets for these benefits.</span></p><div class="css-umsscj" data-dcnode-id="765"><aside class="css-0 css-0" data-dcnode-id="766"><div data-dcnode-id="767"><div class="css-10gx9pb" data-dcnode-id="768" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="770"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="hl_incontent_extras" data-dcnode-id="769" id="inline30__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="743"><span data-dcnode-id="763" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="759"><div data-dcnode-id="760"><a class="chartbeat-section" data-dcnode-id="761" name="kale"><span data-dcnode-id="762" instrument_node="">12. Kale</span></a></div></h2><div data-dcnode-id="750"><figure class="css-oei5ji" data-dcnode-id="751"><span class="css-rwmw5v" data-dcnode-id="752"><span class="css-1767n2d" data-dcnode-id="757"><lazy-image alt="Red kale on a chopping board. " classname="css-rk88xp" data-dcnode-id="758" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/red-kale-on-a-chopping-board.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/red-kale-on-a-chopping-board.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/red-kale-on-a-chopping-board.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/red-kale-on-a-chopping-board.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="753"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="754" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-12&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fred-kale-on-a-chopping-board.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/red-kale-on-a-chopping-board.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Kale is rich in vitamins A, C, and K, and it contains several antioxidants. It is a popular health food and hardy winter vegetable, common in many northern regions.</span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Red kale may offer more than green kale because it contains anthocyanins.</span></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Anthocyanins are antioxidants that are readily available in a variety of fruits and vegetables. They are responsible for the color of these foods, from vibrant red to blue.</span></p></div><div class="css-0" data-dcnode-id="707"><span data-dcnode-id="742" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="738"><div data-dcnode-id="739"><a class="chartbeat-section" data-dcnode-id="740" name="orange-vegetables"><span data-dcnode-id="741" instrument_node="">13. Orange vegetables</span></a></div></h2><div data-dcnode-id="727"><figure class="css-oei5ji" data-dcnode-id="728"><span class="css-rwmw5v" data-dcnode-id="731"><span class="css-1767n2d" data-dcnode-id="736"><lazy-image alt="sweet potatoes on a table." classname="css-rk88xp" data-dcnode-id="737" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/sweet-potatoes-on-a-table.jpg?w=1155" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/sweet-potatoes-on-a-table.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/sweet-potatoes-on-a-table.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/sweet-potatoes-on-a-table.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="732"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="733" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1k0tg0dLgNdk-13&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F325873&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F325%2F325873%2Fsweet-potatoes-on-a-table.jpg&amp;description=The%20best%20antioxidant%20foods%3A%20List%20and%20benefits" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/325/325873/sweet-potatoes-on-a-table.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="729"><br data-dcnode-id="730"></figcaption></figure></div><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Several orange vegetables contain vitamin A and other nutrients. These vegetables contain large amounts of phytochemicals that can help with heart disease and cancer prevention. Some examples of orange vegetables with high antioxidant levels include:</span></p><ul data-dcnode-id="716"><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">sweet potatoes</span></li><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">carrots</span></li><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">acorn squash</span></li><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">butternut squash</span></li></ul><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">There is limited evidence to suggest how best to serve orange vegetables. Often, people cook them, but a person can eat some varieties, such as carrots, raw as a snack or part of a salad.</span></p><div class="css-umsscj" data-dcnode-id="708"><aside class="css-0 css-0" data-dcnode-id="709"><div data-dcnode-id="710"><div class="css-10gx9pb" data-dcnode-id="711" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="713"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="hl_incontent_extras" data-dcnode-id="712" id="inline35__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="695"><span data-dcnode-id="706" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="702"><div data-dcnode-id="703"><a class="chartbeat-section" data-dcnode-id="704" name="summary"><span data-dcnode-id="705" instrument_node="">Summary</span></a></div></h2><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">There are many common foods that people can eat to increase the number of antioxidants that they consume.</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">The antioxidants in these foods may help promote heart and eye health, prevent cancer, and protect against other common diseases that scientists associate with harmful free radicals.</span></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">However, researchers still need to understand the extent to which each of these foods helps people acquire higher levels of antioxidants. They also need to determine how effective each is in disease prevention.</span></p></div></article><div data-dcnode-id="690" id="mf589914c-4110-4cb0-9c46-2bc55e6eed83"><div data-dcnode-id="691"><div class="myFinance-widget myFinance-ad-unit" data-campaign="mnt-noom-global-driver" data-dcnode-id="692" data-sub-id="othernutrition_mnt_bot_noom_socialproof_colorcodedcopy_37731" data-widget-id="c604da5f-7152-4d41-b38d-23349ab9b57e"><iframe class="myFinance-iframe" data-dcnode-id="693" data-loaded="0" data-src="https://inline.medicalnewstoday.com/r/ssr/c604da5f-7152-4d41-b38d-23349ab9b57e?utm_campaign=mnt-noom-global-driver&amp;utm_medium=embed&amp;selector=%23mf589914c-4110-4cb0-9c46-2bc55e6eed83+%3E+div+%3E+div&amp;csid=f7a4022a-14ad-4459-a172-9fbd8d3ef33a&amp;caid=236bcc6d-26f3-4c5e-a23e-ef9af718b1dd&amp;ciid=9196acd9-ff32-4850-8e0d-5cc64bd44c30&amp;tenant=wk_1TqfDFRGHn0jTtfOmLxhMNY4pTU&amp;srckey=src_1TqfDEuTgPdTNAD39WZ0B6LTadQ&amp;imre=aHR0cHM6Ly93d3cubWVkaWNhbG5ld3N0b2RheS5jb20vYXJ0aWNsZXMvMzI1ODcz&amp;_mfuuid_=f8f5ee91-f0d2-4cdf-a63c-69ac74bb0c76&amp;width=584&amp;subId=othernutrition_mnt_bot_noom_socialproof_colorcodedcopy_37731" loading="lazy" title="Advertisement"></iframe></div></div></div></div><p class="css-1kir5of" data-dcnode-id="686"><span data-dcnode-id="687"><span data-dcnode-id="688" instrument_node=""> Last medically reviewed on  July 26, 2019</span></span></p><div class="css-5b
