</span><h2 class="mb-0" data-dcnode-id="2524"><span data-dcnode-id="2532" instrument_node="">
</span><a aria-controls="collapseTranscript" aria-expanded="false" data-dcnode-id="2526" data-parent="#videoAccordion" data-toggle="collapse" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/uqQLpXQqMGo%3Fenablejsapi%3D1%26autohide%3D1%26controls%3D2%26modestbranding%3D1%26theme%3Dlight%26version%3D3%26rel%3D0%26showinfo%3D0%26showsearch%3D0%26wmode%3Dtransparent%26cc_lang_pref%3Den%26cc_load_policy%3D0%23collapseTranscript" onclick="ga('send', 'event', { eventCategory: 'Video Navigation', eventAction: 'click', eventLabel: 'Transcript'});sendConversion('Clicked Transcript Tab');"><span data-dcnode-id="2531" instrument_node="">
</span><span class="icon icon-transcript" data-dcnode-id="2530"></span><span class="toolbar-title" data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">Transcript</span></span><span data-dcnode-id="2527" instrument_node="">
</span></a><span data-dcnode-id="2525" instrument_node="">
</span></h2><span data-dcnode-id="2523" instrument_node="">
</span></div><span data-dcnode-id="2521" instrument_node="">
</span><div aria-labelledby="headingTranscript" class="collapse" data-dcnode-id="2473" id="collapseTranscript" role="tabpanel"><span data-dcnode-id="2520" instrument_node="">
</span><div class="card-block" data-dcnode-id="2475"><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">In the beginning, blueberries were the best. Then walnuts took the title, then wild blueberries took it back. Then small red beans were considered the #1 most antioxidant packed foods—until herbs and spices were tested.</span></p><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Frankly, I thought it was over in 2007. Remember, the USDA had released a database of 277 foods. When only 40 foods were tested, blueberries were #1, but when hundreds of foods were tested, blueberries no longer even made the top ten. I ranked them for you by serving size, and by cost, antioxidant bang for your buck. Mission accomplished—until last year.</span></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">“The total antioxidant content of more than 3,000 foods, beverages, spices, herbs and supplements used worldwide.” The most comprehensive such study ever, by far. Are there even 3,000 foods out there? Just looking at the first page of the 138-page chart they include with the study, you know you’re in for a wild ride when they don’t just include something like gooseberries, or Indian gooseberries, or Indian gooseberries in a can, but even the antioxidant power of the syrup in the can of Indian gooseberries.</span></p><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">They tested 30 different beers, for those who stay up all night wondering if there’s more antioxidants in Coors or Bud Light. The answer? Miller, by a hair. But nothing compared, evidently, to Santa Claus beer from Austria, which put Guinness to shame, and all the rest. Don’t laugh; the standard American diet is so pitiful that beer represents the fifth&nbsp;largest source of antioxidants in the United States.</span></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">They measured Cap’n Crunch, the antioxidant content of Tootsie Rolls, everything from Krispy Kreme to the crushed dried leaves of the African Boabab&nbsp;tree. The skin of an organic lemon. Norwegian jungle dessert. It took them eight years to compile all this data.</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">With 3,139 foods tested, you can get as nitty gritty as you want. Like those new gold kiwis—do they have more antioxidants than the regular green ones? About three times as much! This body of work can help us decide hundreds of real life grocery store decisions we make all the time.</span></p><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">But it’s easy to get lost in the details. Let’s take a step back, which is what the researchers did. What does this body of work say about what we should eat, in general?</span></p><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">The first thing they did, Table 1, was to split everything&nbsp;into plant foods versus animal foods. Here’s plant foods. Here’s animal foods. On average, plant foods have 64 times more antioxidants than meat, fish, eggs, and dairy. This alone represents a powerful argument to eat a plant-based diet. Every time you eat something in this column, you miss out on an opportunity to eat something in this column. Animal foods max out at 100; plant foods go up to 289,000.</span></p><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Quoting from the conclusion: “Antioxidant-rich foods originate from the plant kingdom while meat, fish and other foods from the animal kingdom are low in antioxidants….Diets comprised mainly of animal-based foods are thus low in antioxidant content while diets based mainly on a variety of plant-based foods are antioxidant rich, due to the thousands of bioactive antioxidant phytochemicals found in plants…”</span></p><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2486"><em data-dcnode-id="2487"><span data-dcnode-id="2491" instrument_node="">To see any graphs, charts, graphics, images, and quotes to which Dr. Greger may be referring, watch the above video. This is just an approximation of the audio contributed by </span><strong data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Dianne Moore</span></strong><span data-dcnode-id="2488" instrument_node="">. </span></em></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2483" style="font-weight: 400;"><span data-dcnode-id="2484" instrument_node="">Please consider </span></span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nutritionfacts.org/volunteer"><b data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">volunteering</span></b></a><span data-dcnode-id="2478" style="font-weight: 400;"><span data-dcnode-id="2479" instrument_node=""> to help out on the site. </span></span></p><span data-dcnode-id="2476" instrument_node="">

</span><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">In the beginning, blueberries were the best. Then walnuts took the title, then wild blueberries took it back. Then small red beans were considered the #1 most antioxidant packed foods—until herbs and spices were tested.</span></p><span data-dcnode-id="2232" instrument_node="">
</span><p data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Frankly, I thought it was over in 2007. Remember, the USDA had released a database of 277 foods. When only 40 foods were tested, blueberries were #1, but when hundreds of foods were tested, blueberries no longer even made the top ten. I ranked them for you by serving size, and by cost, antioxidant bang for your buck. Mission accomplished—until last year.</span></p><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">“The total antioxidant content of more than 3,000 foods, beverages, spices, herbs and supplements used worldwide.” The most comprehensive such study ever, by far. Are there even 3,000 foods out there? Just looking at the first page of the 138-page chart they include with the study, you know you’re in for a wild ride when they don’t just include something like gooseberries, or Indian gooseberries, or Indian gooseberries in a can, but even the antioxidant power of the syrup in the can of Indian gooseberries.</span></p><span data-dcnode-id="2226" instrument_node="">
</span><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">They tested 30 different beers, for those who stay up all night wondering if there’s more antioxidants in Coors or Bud Light. The answer? Miller, by a hair. But nothing compared, evidently, to Santa Claus beer from Austria, which put Guinness to shame, and all the rest. Don’t laugh; the standard American diet is so pitiful that beer represents the fifth&nbsp;largest source of antioxidants in the United States.</span></p><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">They measured Cap’n Crunch, the antioxidant content of Tootsie Rolls, everything from Krispy Kreme to the crushed dried leaves of the African Boabab&nbsp;tree. The skin of an organic lemon. Norwegian jungle dessert. It took them eight years to compile all this data.</span></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">With 3,139 foods tested, you can get as nitty gritty as you want. Like those new gold kiwis—do they have more antioxidants than the regular green ones? About three times as much! This body of work can help us decide hundreds of real life grocery store decisions we make all the time.</span></p><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">But it’s easy to get lost in the details. Let’s take a step back, which is what the researchers did. What does this body of work say about what we should eat, in general?</span></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">The first thing they did, Table 1, was to split everything&nbsp;into plant foods versus animal foods. Here’s plant foods. Here’s animal foods. On average, plant foods have 64 times more antioxidants than meat, fish, eggs, and dairy. This alone represents a powerful argument to eat a plant-based diet. Every time you eat something in this column, you miss out on an opportunity to eat something in this column. Animal foods max out at 100; plant foods go up to 289,000.</span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Quoting from the conclusion: “Antioxidant-rich foods originate from the plant kingdom while meat, fish and other foods from the animal kingdom are low in antioxidants….Diets comprised mainly of animal-based foods are thus low in antioxidant content while diets based mainly on a variety of plant-based foods are antioxidant rich, due to the thousands of bioactive antioxidant phytochemicals found in plants…”</span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2202"><em data-dcnode-id="2203"><span data-dcnode-id="2207" instrument_node="">To see any graphs, charts, graphics, images, and quotes to which Dr. Greger may be referring, watch the above video. This is just an approximation of the audio contributed by </span><strong data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Dianne Moore</span></strong><span data-dcnode-id="2204" instrument_node="">. </span></em></p><span data-dcnode-id="2201" instrument_node="">

</span><div data-dcnode-id="1178" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="1815"><div class="comment__name clearfix" data-dcnode-id="1825"><img class="comment__avatar" data-dcnode-id="1830" height="32" src="https://c.disquscdn.com/uploads/forums/136/5650/avatar92.jpg?1605177714" width="32"/><strong data-dcnode-id="1827"><a data-dcnode-id="1828" href=""><span data-dcnode-id="1829" instrument_node="">PaulB</span></a></strong><span data-dcnode-id="1826" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="1816"><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">A couple of comments,</span></p><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">First congratulations on the launch!  I intend to be a daily reader.  Your contribution to the health of people everywhere as well as the health of the planet, and benefit to animal welfare is immeasurable.  Thank you.</span></p><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Second, I want to tie back this video with the video you did on Beliveau's work on foods fighting cancer.  Beliveau while acknowledging the importance of antioxidants cautions overemphasizing this as a health metric (proxy) (See pages 60 to 64 in Beliveau's Foods to Fight Cancer).  The specific example he gives in those pages is of isothiocyanates which have very limited antioxidant potential but which are also believed, based on current research, to have among the highest effects on stopping cancer.  I realize that this video was primarly to compare the metrics of animal vs. plant food.   And so, in such a comparison, antioxident given the wealth of data makes sense.  A disclaimer, say 30 seconds or a cross reference to the work you did on capturing Beliveau's research (I think Furhman gave onion a 50 ANDI score, I will have to check)would help.</span></p><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Paul</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1793"><div class="comment__name clearfix" data-dcnode-id="1809"><img class="comment__avatar" data-dcnode-id="1814" height="32" src="https://c.disquscdn.com/uploads/users/2519/2334/avatar92.jpg?1445861305" width="32"/><strong data-dcnode-id="1811"><a data-dcnode-id="1812" href=""><span data-dcnode-id="1813" instrument_node="">Michael Greger M.D.</span></a></strong><span data-dcnode-id="1810" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="1794"><p data-dcnode-id="1795"><span data-dcnode-id="1808" instrument_node="">Thank you for your kind words, and you're absolutely right that the antioxidant power of plant foods represents only one of their many benefits. That's indeed why I presented those two videos (</span><a data-dcnode-id="1806" href="http://disq.us/url?url=http%3A%2F%2Fnutritionfacts.org%2Fvideos%2Fveggies-vs-cancer%2F%3AmZqLQOockQjJCmFlL-Ya0ILb_Vk&amp;cuid=1365650" rel="nofollow noopener" title="http://nutritionfacts.org/videos/veggies-vs-cancer/"><span data-dcnode-id="1807" instrument_node="">part 1</span></a><span data-dcnode-id="1805" instrument_node=""> and </span><a data-dcnode-id="1803" href="http://disq.us/url?url=http%3A%2F%2Fnutritionfacts.org%2Fvideos%2F1-anticancer-vegetable%2F%3AAOq33OI_yTp9JRwse4kkBRcbKpU&amp;cuid=1365650" rel="nofollow noopener" title="http://nutritionfacts.org/videos/1-anticancer-vegetable/"><span data-dcnode-id="1804" instrument_node="">part 2</span></a><span data-dcnode-id="1802" instrument_node="">) ranking vegetables by their ability to slow down cancer cell growth. Just because something is good for you doesn't mean it necessarily has lots of antioxidants (like </span><a data-dcnode-id="1800" href="http://disq.us/url?url=http%3A%2F%2Fwww.ncbi.nlm.nih.gov%2Fpubmed%2F17177499%3A-Uh11eMABgw-WvXrkePiKTYg6x8&amp;cuid=1365650" rel="nofollow noopener" title="http://www.ncbi.nlm.nih.gov/pubmed/17177499"><span data-dcnode-id="1801" instrument_node="">oyster mushrooms</span></a><span data-dcnode-id="1799" instrument_node="">) and just because something has lots of antioxidant power doesn't mean it's necessarily good for you (uric acid and </span><a data-dcnode-id="1797" href="http://disq.us/url?url=http%3A%2F%2Fnutritionfacts.org%2Ftopics%2Fpreservatives%2F%3Ac5DSn6_nVo6Tu6O-Ct0EMHMDxc0&amp;cuid=1365650" rel="nofollow noopener" title="http://nutritionfacts.org/topics/preservatives/"><span data-dcnode-id="1798" instrument_node="">preservatives</span></a><span data-dcnode-id="1796" instrument_node=""> like BHT come to mind).</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1783"><div class="comment__name clearfix" data-dcnode-id="1787"><img class="comment__avatar" data-dcnode-id="1792" height="32" src="https://c.disquscdn.com/uploads/forums/136/5650/avatar92.jpg?1605177714" width="32"/><strong data-dcnode-id="1789"><a data-dcnode-id="1790" href=""><span data-dcnode-id="1791" instrument_node="">Youcef</span></a></strong><span data-dcnode-id="1788" instrument_node=""> • 7 years ago
        </span></div><div class="comment__content" data-dcnode-id="1784"><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">I agree with Paul. Exactly what you just said Michael would be of great help for the existing portion of readers with little knowledge in health science. As of now, a lot of the videos on antioxidants come off as if antioxidants alone were the only or the most important factor for health, when we know indeed there is more than just that antioxidants to health.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1773"><div class="comment__name clearfix" data-dcnode-id="1777"><img class="comment__avatar" data-dcnode-id="1782" height="32" src="https://c.disquscdn.com/uploads/users/11788/1378/avatar92.jpg?1437843040" width="32"/><strong data-dcnode-id="1779"><a data-dcnode-id="1780" href=""><span data-dcnode-id="1781" instrument_node="">Youcef</span></a></strong><span data-dcnode-id="1778" instrument_node=""> • 7 years ago
        </span></div><div class="comment__content" data-dcnode-id="1774"><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">I agree with Paul. Exactly what you just said Michael would be of great help for the existing portion of readers with little knowledge in health science. As of now, a lot of the videos on antioxidants come off as if antioxidants alone were the only or the most important factor for health, when we know indeed there is more than just that antioxidants to health.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1759"><div class="comment__name clearfix" data-dcnode-id="1767"><img class="comment__avatar" data-dcnode-id="1772" height="32" src="https://c.disquscdn.com/uploads/forums/136/5650/avatar92.jpg?1605177714" width="32"/><strong data-dcnode-id="1769"><a data-dcnode-id="1770" href=""><span data-dcnode-id="1771" instrument_node="">corygold</span></a></strong><span data-dcnode-id="1768" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="1760"><p data-dcnode-id="1761"><span data-dcnode-id="1766" instrument_node="">Dear Dr. Greger,</span><br data-dcnode-id="1765"/><span data-dcnode-id="1764" instrument_node="">I have seen most of the videos that you have released on your DVD sets and I was curious if you have come across any studies relating to bee pollen.  I am a vegan and take my B12 supplement several times a week in addition to my daily spoonful of bee pollen.  I know that some people argue that bee pollen isn't necessarily vegan although I guess that is in the grey area.  Have you come across any studies discussing the pros/cons of taking this so called "superfood"?  Thank you so much for your time and for putting this site up.</span><br data-dcnode-id="1763"/><span data-dcnode-id="1762" instrument_node="">-CoryG</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1747"><div class="comment__name clearfix" data-dcnode-id="1753"><img class="comment__avatar" data-dcnode-id="1758" height="32" src="https://c.disquscdn.com/uploads/forums/136/5650/avatar92.jpg?1605177714" width="32"/><strong data-dcnode-id="1755"><a data-dcnode-id="1756" href=""><span data-dcnode-id="1757" instrument_node="">Youcef</span></a></strong><span data-dcnode-id="1754" instrument_node=""> • 7 years ago
        </span></div><div class="comment__content" data-dcnode-id="1748"><p data-dcnode-id="1749"><span data-dcnode-id="1752" instrument_node="">Dr. Gernez, most famous in France for world-changing work on preventing degenerative diseases, recommended to blow of a minute amount of pollen on newborns (anytime during their immunotolerance period) along with minute amounts of vaccuum cleaner dust collected in late summer ("yuk" you may say, I know!)  as a means to get their immune system to recognize pollen. It may be less necessary in places where moms and their newborn are discharged within days of the delivery, because that way the baby is naturally exposed to allegens in the short window of opportunity that is his first few weeks of life. Any medical textbook refers to that period of immunotolerance and the doctor did it on all his family, none are allergic.</span><br data-dcnode-id="1751"/><span data-dcnode-id="1750" instrument_node="">That's the only really valuable thing I've heard so far on pollen, and I'm like you always curious to learn more about its benefits, perhaps more as a food this time :)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1735"><div class="comment__name clearfix" data-dcnode-id="1741"><img class="comment__avatar" data-dcnode-id="1746" height="32" src="https://c.disquscdn.com/uploads/users/11788/1378/avatar92.jpg?1437843040" width="32"/><strong data-dcnode-id="1743"><a data-dcnode-id="1744" href=""><span data-dcnode-id="1745" instrument_node="">Youcef</span></a></strong><span data-dcnode-id="1742" instrument_node=""> • 7 years ago

        </span></div><div class="comment__content" data-dcnode-id="1605"><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">I don't think you're slow...your question is actually a good one.  I don't know of any one food in particular as holding the #1 position for post digestion antioxidant potential, as far too many variables would preclude such a finding most likely.  However, the following foods have ORAC (oxygen radical absorptive capacity) scores that are considered impressive:  Cocoa, red beans, berries, and spices like dried clove, oregano, ginger, cinnamon and tumeric.  However, scientists are continually discovering powerful disease fighting substances in all kinds of plant foods, which is a very powerful plus for those of us following a vegetarian and/or vegan lifestyle.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1592"><div class="comment__name clearfix" data-dcnode-id="1598"><img class="comment__avatar" data-dcnode-id="1603" height="32" src="https://c.disquscdn.com/uploads/forums/136/5650/avatar92.jpg?1605177714" width="32"/><strong data-dcnode-id="1600"><a data-dcnode-id="1601" href=""><span data-dcnode-id="1602" instrument_node="">Tan Truong</span></a></strong><span data-dcnode-id="1599" instrument_node=""> • 10 years ago
