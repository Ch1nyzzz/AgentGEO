</span><p class="m-0" data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">When you think of pasta dishes, what comes to mind? A heaping plate of spaghetti and meatballs? A gooey steaming lasagna in a casserole dish? Stir-fried lo mein from a Chinese restaurant? Pasta can be delicious and fun, but can it also be part of a healthy diet? In this article, you’ll discover a wide variety of pastas from around the world, and get introduced to seven plant-based pasta and noodle recipes that are sure to delight your taste buds while supporting your health.</span></p><span data-dcnode-id="1791" instrument_node=""> </span></div><span data-dcnode-id="1789" instrument_node="">

</span><div class="entry-content" data-dcnode-id="1310"><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">
</span></p><div class="d-print-none text-right mb-3" data-dcnode-id="1716"><span data-dcnode-id="1720" instrument_node="">
</span><a class="btn-recipe-scroll btn text-small px-4" data-dcnode-id="1718" href="#recipes"><span data-dcnode-id="1719" instrument_node="">Jump to Recipes</span></a><span data-dcnode-id="1717" instrument_node="">
</span></div><span data-dcnode-id="1715" instrument_node="">
</span><br data-dcnode-id="1714"><span data-dcnode-id="1713" instrument_node="">
Who doesn’t love pasta and noodles? Across the world, dough that’s shaped, boiled, and drenched in sauce or other liquid serves as the basis for some of our most iconic dishes. The word pasta comes to us via Italy, literally meaning “paste.” And as much as some of us may word-associate noodles with classic Italian cuisine, we can find noodle dishes, including plant-based pasta, from cultures worldwide.</span><p data-dcnode-id="1712"></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1710" instrument_node="">While researching for this article, I was mildly crushed to discover that the story of Italian explorer Marco Polo bringing pasta back to Italy from China is almost certainly a legend, not historical fact. What is fact is that Asian cultures have been noodling around with noodles for thousands of years. And there’s evidence for pasta-making in China since around 3000 BCE. One </span><a data-dcnode-id="1708" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalgeographic.com/news/2005/10/4-000-year-old-noodles-found-in-china/" rel="external noopener noreferrer"><span data-dcnode-id="1709" instrument_node="">archeological dig</span></a><span data-dcnode-id="1707" instrument_node=""> unearthed an actual bowl of millet noodles that was carbon-dated to 4,000 years ago. The bowl, which was buried under 10 feet of sediment, contained long, thin noodles that indicated great noodling skill. I can only imagine what circumstances caused that bowl to go uneaten for four millennia. I’m sure glad the archeologists weren’t hungry when they found it!</span></p><span data-dcnode-id="1705" instrument_node="">
</span><h2 data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Italians and Pasta</span></h2><span data-dcnode-id="1702" instrument_node="">
</span><figure aria-describedby="caption-attachment-21931" class="wp-caption aligncenter" data-dcnode-id="1696" id="attachment_21931" style="width: 1145px"><noscript data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">&lt;img class="wp-image-21931 size-full" src="https://foodrevolution.org/wp-content/uploads/iStock-908272410.jpg" alt="Types of Italian pasta" width="1145" height="916" srcset="https://foodrevolution.org/wp-content/uploads/iStock-908272410.jpg 1145w, https://foodrevolution.org/wp-content/uploads/iStock-908272410-300x240.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-908272410-1024x819.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-908272410-768x614.jpg 768w" sizes="(max-width: 1145px) 100vw, 1145px" /&gt;</span></noscript><img alt="Types of Italian pasta" class="lazyload wp-image-21931 size-full" data-dcnode-id="1699" data-sizes="(max-width: 1145px) 100vw, 1145px" data-src="https://foodrevolution.org/wp-content/uploads/iStock-908272410.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/iStock-908272410.jpg 1145w, https://foodrevolution.org/wp-content/uploads/iStock-908272410-300x240.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-908272410-1024x819.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-908272410-768x614.jpg 768w" height="916" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201145%20916%22%3E%3C/svg%3E" width="1145"><figcaption class="wp-caption-text" data-dcnode-id="1697" id="caption-attachment-21931"><span data-dcnode-id="1698" instrument_node="">iStock.com/ksana-gribakina</span></figcaption></figure><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1694" instrument_node="">While the Italians may not have been the pasta founders of the world, they have been at it for a very long time as well. A painting on a 2,400-year-old Etruscan tomb from what is now central Italy appears to show people making pasta. Although, I’ve seen the </span><a data-dcnode-id="1692" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pastaevangelists.com/blogs/blog/the-history-of-pasta-a-tale-of-many-strands" rel="external noopener noreferrer"><span data-dcnode-id="1693" instrument_node="">image,</span></a><span data-dcnode-id="1691" instrument_node=""> and it is also possible that it’s depicting curls of steam rising out of the serving dish. In any case, the Italians are the undisputed masters of pasta taxonomy, coming up with cool names for every shape: spaghetti, macaroni, rigatoni, farfalle (literally “butterfly”), vermicelli (“little worms” — yum!), linguini (“little tongues”), orecchiette (“little ears”), and the alarmingly named strozzapreti, which literally translates to “priest-chokers.”</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1688" instrument_node="">Italian pasta is almost always made from wheat. And the kinds of pasta held in highest culinary regard are those that have been formed from refined white flour that’s been stripped of its bran and germ. These white pastas are far from the healthiest kinds you can get, especially if the wheat is grown in the US, where if it isn’t organic, it’s likely to </span><a data-dcnode-id="1686" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ewg.org/news-and-analysis/2019/02/glyphosate-contamination-food-goes-far-beyond-oat-products" rel="external noopener noreferrer"><span data-dcnode-id="1687" instrument_node="">contain glyphosate</span></a><span data-dcnode-id="1685" instrument_node=""> and other pesticides.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><h2 data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">History of Plant-Based Noodles</span></h2><span data-dcnode-id="1680" instrument_node="">
</span><figure aria-describedby="caption-attachment-21938" class="wp-caption aligncenter" data-dcnode-id="1674" id="attachment_21938" style="width: 1254px"><noscript data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">&lt;img class="wp-image-21938 size-full" src="https://foodrevolution.org/wp-content/uploads/iStock-1248176080.jpg" alt="Soba Noodles in bowl and dry" width="1254" height="836" srcset="https://foodrevolution.org/wp-content/uploads/iStock-1248176080.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1248176080-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1248176080-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1248176080-768x512.jpg 768w" sizes="(max-width: 1254px) 100vw, 1254px" /&gt;</span></noscript><img alt="Soba Noodles in bowl and dry" class="lazyload wp-image-21938 size-full" data-dcnode-id="1677" data-sizes="(max-width: 1254px) 100vw, 1254px" data-src="https://foodrevolution.org/wp-content/uploads/iStock-1248176080.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/iStock-1248176080.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1248176080-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1248176080-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1248176080-768x512.jpg 768w" height="836" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201254%20836%22%3E%3C/svg%3E" width="1254"><figcaption class="wp-caption-text" data-dcnode-id="1675" id="caption-attachment-21938"><span data-dcnode-id="1676" instrument_node="">iStock.com/SherSor</span></figcaption></figure><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Asian cultures have the longest known history of noodle-craft using plant-based noodles: examples of modern fare include ramen, pad thai, pad see ew (a Chinese-influenced Thai dish similar to fried noodle dishes served in Singapore and Malaysia — how’s that for cultural mixing?), lo mein, cold sesame noodles, and many more. Asian noodles are made from a far wider variety of plant sources than just wheat, including rice, seaweeds, sweet potato, sorghum, millet, buckwheat, tapioca, and tofu.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Noodles check a lot of positive culinary boxes: they last a long time in the cupboard; they’re light and easy to store and transport; they’re easy to cook; they can be eaten hot or cold, and they’re incredibly versatile, taking on the flavor of whatever sauce or additions you serve them with.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><h2 data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Healthy vs Unhealthy Pasta</span></h2><span data-dcnode-id="1664" instrument_node="">
</span><figure aria-describedby="caption-attachment-21936" class="wp-caption aligncenter" data-dcnode-id="1658" id="attachment_21936" style="width: 1254px"><noscript data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">&lt;img class="wp-image-21936 size-full" src="https://foodrevolution.org/wp-content/uploads/iStock-1183935939.jpg" alt="Making homemade tomato pasta sauce" width="1254" height="837" srcset="https://foodrevolution.org/wp-content/uploads/iStock-1183935939.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1183935939-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1183935939-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1183935939-768x513.jpg 768w" sizes="(max-width: 1254px) 100vw, 1254px" /&gt;</span></noscript><img alt="Making homemade tomato pasta sauce" class="lazyload wp-image-21936 size-full" data-dcnode-id="1661" data-sizes="(max-width: 1254px) 100vw, 1254px" data-src="https://foodrevolution.org/wp-content/uploads/iStock-1183935939.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/iStock-1183935939.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1183935939-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1183935939-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1183935939-768x513.jpg 768w" height="837" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201254%20837%22%3E%3C/svg%3E" width="1254"><figcaption class="wp-caption-text" data-dcnode-id="1659" id="caption-attachment-21936"><span data-dcnode-id="1660" instrument_node="">iStock.com/nesharm</span></figcaption></figure><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1656" instrument_node="">You can dress up your pasta however you like, which means that the toppings you serve can make much of the difference between a healthy noodle dish, and an unhealthy one. In the unhealthy category, look no further than the menu of any chain Italian restaurant: lots of cream and </span><a data-dcnode-id="1654" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/blog/problems-with-dairy/"><span data-dcnode-id="1655" instrument_node="">cheese</span></a><span data-dcnode-id="1653" instrument_node="">, butter, and red and processed meats adorn many pasta dishes. They are also typically quite high in </span><a data-dcnode-id="1651" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/blog/salt-vs-sodium-facts/"><span data-dcnode-id="1652" instrument_node="">sodium</span></a><span data-dcnode-id="1650" instrument_node="">.</span></p><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">You can create stunningly healthy pasta dishes by using plant-based sauces, spices, and vegetables. Your sauces can be as simple as a jar or can of tomato puree, or as fancy as a slow-simmered arrabbiata or puttanesca sauce with tons of stewed veggies and a rich helping of herbs and spices. If you’re going meat-free but wanting a “meaty” taste, you can also add small amounts of </span><a data-dcnode-id="1645" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/blog/plant-based-meat-alternatives/"><span data-dcnode-id="1646" instrument_node="">meat analogues</span></a><span data-dcnode-id="1644" instrument_node="">, such as plant-based sausages and organic soy-based chicken or beef substitutes.</span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1641" instrument_node="">There are lots of commercially available pasta sauces. But the most widely sold brands are heavily salted and contain added sugar. They may also contain dairy in the form of parmesan cheese, whey, or butter. You’re much better off using a simple and naturally sugar-free sauce, or making your own so you can determine exactly what ingredients get included. Many-a-parent has discovered that a homemade pasta sauce is the perfect vehicle for </span><a data-dcnode-id="1639" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/blog/how-to-eat-more-vegetables/"><span data-dcnode-id="1640" instrument_node="">sneaking “stealth” veggies</span></a><span data-dcnode-id="1638" instrument_node=""> into the diets of their picky eaters.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1635" instrument_node="">While the toppings and sides are the biggest determinants of the healthfulness of a pasta dish, the type of pasta also matters. The traditional wheat pastas tend to be the least healthy choices, while other plant-based pastas, including organic whole grain wheat, can provide a better nutritional profile and contain fewer pesticides. And with the explosion in the </span><a data-dcnode-id="1633" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/blog/what-does-gluten-free-mean/"><span data-dcnode-id="1634" instrument_node="">gluten-free</span></a><span data-dcnode-id="1632" instrument_node=""> market, more and more acceptable alternatives to classic spaghetti and macaroni are now available for consumers.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><h2 data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Best Types of Plant-Based Pasta and Noodles</span></h2><span data-dcnode-id="1627" instrument_node="">
</span><figure aria-describedby="caption-attachment-21937" class="wp-caption aligncenter" data-dcnode-id="1621" id="attachment_21937" style="width: 1364px"><noscript data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">&lt;img class="wp-image-21937 size-full" src="https://foodrevolution.org/wp-content/uploads/iStock-1194656911.jpg" alt="Red lentils and red lentil plant-based pasta" width="1364" height="769" srcset="https://foodrevolution.org/wp-content/uploads/iStock-1194656911.jpg 1364w, https://foodrevolution.org/wp-content/uploads/iStock-1194656911-300x169.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1194656911-1024x577.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1194656911-768x433.jpg 768w" sizes="(max-width: 1364px) 100vw, 1364px" /&gt;</span></noscript><img alt="Red lentils and red lentil plant-based pasta" class="lazyload wp-image-21937 size-full" data-dcnode-id="1624" data-sizes="(max-width: 1364px) 100vw, 1364px" data-src="https://foodrevolution.org/wp-content/uploads/iStock-1194656911.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/iStock-1194656911.jpg 1364w, https://foodrevolution.org/wp-content/uploads/iStock-1194656911-300x169.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1194656911-1024x577.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1194656911-768x433.jpg 768w" height="769" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201364%20769%22%3E%3C/svg%3E" width="1364"><figcaption class="wp-caption-text" data-dcnode-id="1622" id="caption-attachment-21937"><span data-dcnode-id="1623" instrument_node="">iStock.com/Elena Medoks</span></figcaption></figure><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1619" instrument_node="">From a health perspective, the best types of plant-based pasta and noodles are made from whole grains or legumes. Because these are whole foods, rather than refined, they are rich in fiber and generally cause a slower, steadier rise in blood sugar than refined grains. They’re also often rich in nutrients like vitamins, minerals, and antioxidants. </span><a data-dcnode-id="1617" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/blog/are-grains-good-for-you/"><span data-dcnode-id="1618" instrument_node="">Whole grains</span></a><span data-dcnode-id="1616" instrument_node="">, despite being vilified in the popular press as “bad carbs,” are nevertheless linked to lower risk of </span><a data-dcnode-id="1614" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6265897/" rel="external noopener noreferrer"><span data-dcnode-id="1615" instrument_node="">age-related illnesses</span></a><span data-dcnode-id="1613" instrument_node="">, including </span><a data-dcnode-id="1611" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4908315" rel="external noopener noreferrer"><span data-dcnode-id="1612" instrument_node="">cardiovascular disease</span></a><span data-dcnode-id="1610" instrument_node=""> and </span><a data-dcnode-id="1608" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5118764" rel="external noopener noreferrer"><span data-dcnode-id="1609" instrument_node="">gum disease</span></a><span data-dcnode-id="1607" instrument_node="">. If you aren’t allergic or sensitive to wheat, whole wheat pasta, especially organic, can also be an excellent choice. It has the added benefit of being “familiar” to picky eaters who may balk at pasta with a very different look, taste, and texture.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1604" instrument_node="">Pasta made from legumes such as chickpeas, mung beans, and green and red lentils also confer lots of health benefits. These foods are high in fiber and protein, as well as many vitamins and phytochemicals. Lentils are </span><a data-dcnode-id="1602" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/lentils" rel="external noopener noreferrer"><span data-dcnode-id="1603" instrument_node="">rich sources</span></a><span data-dcnode-id="1601" instrument_node=""> of folate and iron, as well as other important minerals such as magnesium, potassium, manganese, and zinc. They are also rich in polyphenols, which partially explains why diets rich in lentils are </span><a data-dcnode-id="1599" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5713359/" rel="external noopener noreferrer"><span data-dcnode-id="1600" instrument_node="">protective</span></a><span data-dcnode-id="1598" instrument_node=""> against diabetes, cancers, obesity, and cardiovascular disease.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1595" instrument_node="">Quinoa and corn are also commonly substituted for wheat in gluten-free pastas. And brown rice pastas are widely available in natural foods stores, Asian markets, large supermarket chains, and of course also </span><a data-dcnode-id="1593" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2YqQxXJ" rel="external noopener noreferrer"><span data-dcnode-id="1594" instrument_node="">online</span></a><span data-dcnode-id="1592" instrument_node="">.</span></p><span data-dcnode-id="1590" instrument_node="">
</span><h3 data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Asian Plant-Based Noodle Options</span></h3><span data-dcnode-id="1587" instrument_node="">
</span><figure aria-describedby="caption-attachment-21932" class="wp-caption aligncenter" data-dcnode-id="1581" id="attachment_21932" style="width: 1254px"><noscript data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">&lt;img class="wp-image-21932 size-full" src="https://foodrevolution.org/wp-content/uploads/iStock-1033988026.jpg" alt="Shirataki noodles in bowl" width="1254" height="836" srcset="https://foodrevolution.org/wp-content/uploads/iStock-1033988026.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1033988026-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1033988026-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1033988026-768x512.jpg 768w" sizes="(max-width: 1254px) 100vw, 1254px" /&gt;</span></noscript><img alt="Shirataki noodles in bowl" class="lazyload wp-image-21932 size-full" data-dcnode-id="1584" data-sizes="(max-width: 1254px) 100vw, 1254px" data-src="https://foodrevolution.org/wp-content/uploads/iStock-1033988026.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/iStock-1033988026.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1033988026-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1033988026-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1033988026-768x512.jpg 768w" height="836" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201254%20836%22%3E%3C/svg%3E" width="1254"><figcaption class="wp-caption-text" data-dcnode-id="1582" id="caption-attachment-21932"><span data-dcnode-id="1583" instrument_node="">iStock.com/brebca</span></figcaption></figure><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">In addition to spaghetti and the vast array of colorfully-named Italian pastas, there are several types of Asian noodles with different properties and uses. Soba is made from buckwheat, which despite its name is not related to wheat at all. (It’s actually not a grass at all, but is botanically related to rhubarb and sorrel.) If you’re gluten-intolerant, check the label, as most soba noodles contain wheat flour as the first ingredient. Make sure you’re getting noodles made from 100% buckwheat flour.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1570"><a data-dcnode-id="1575" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/shirataki-noodles-101%23what-they-are" rel="external noopener noreferrer"><span data-dcnode-id="1576" instrument_node="">Shirataki noodles</span></a><span data-dcnode-id="1574" instrument_node=""> are made from the flour of the root of the konjac plant and contain a lot of a very healthy fiber called glucomannan. Glucomannan can absorb huge amounts of water and acts as a powerful prebiotic in your gut, where it </span><a data-dcnode-id="1572" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6392846/" rel="external noopener noreferrer"><span data-dcnode-id="1573" instrument_node="">nourishes your good bacteria</span></a><span data-dcnode-id="1571" instrument_node="">. Shirataki noodles are also almost entirely free of calories, and in fact are 97% water by weight, which makes them a favorite of those trying to lose weight. A fun thing about shirataki is their name, which means “white waterfall” in Japanese.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><div class="article-pro" data-dcnode-id="1562"><b data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Editor’s note:</span></b><span data-dcnode-id="1566" instrument_node=""> Miracle Noodle makes a delicious line of vegan, organic, non-GMO, high-fiber konjac flour noodles. You can check out their full line of products </span><a data-dcnode-id="1564" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shareasale.com/u.cfm%3Fd%3D653093%26m%3D33004%26u%3D779113" rel="external noopener noreferrer"><span data-dcnode-id="1565" instrument_node="">here</span></a><span data-dcnode-id="1563" instrument_node="">.</span></div><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Rice noodles are ubiquitous in Thai dishes such as pad thai. They are gluten-free, and if made from brown rice, contain a modest helping of fiber. They come in many different lengths and widths and go well with Asian broths and soups, as well as healthy stir-fries.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Glass noodles, also known as cellophane noodles, get their name from their appearance when cooked: at which point, they’re translucent. They’re typically made from the starch of mung beans, potatoes, or sweet potatoes. You may have encountered glass noodles in spring rolls, hot pots, soups, and salads. They’re highly processed, and not rich in nutrients. But they can be a pleasant carrier for more nutritious sauces.</span></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1551"><b data-dcnode-id="1552"><i data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">To avoid pesticides, try to find organic versions of these pastas and noodles whenever possible.</span></i></b></p><span data-dcnode-id="1550" instrument_node="">
</span><h2 data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Noodle Alternatives</span></h2><span data-dcnode-id="1547" instrument_node="">
</span><figure aria-describedby="caption-attachment-21935" class="wp-caption aligncenter" data-dcnode-id="1541" id="attachment_21935" style="width: 1254px"><noscript data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">&lt;img class="wp-image-21935 size-full" src="https://foodrevolution.org/wp-content/uploads/iStock-1165396013.jpg" alt="Zucchini noodles (zoodles) in bowl" width="1254" height="836" srcset="https://foodrevolution.org/wp-content/uploads/iStock-1165396013.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1165396013-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1165396013-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1165396013-768x512.jpg 768w" sizes="(max-width: 1254px) 100vw, 1254px" /&gt;</span></noscript><img alt="Zucchini noodles (zoodles) in bowl" class="lazyload wp-image-21935 size-full" data-dcnode-id="1544" data-sizes="(max-width: 1254px) 100vw, 1254px" data-src="https://foodrevolution.org/wp-content/uploads/iStock-1165396013.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/iStock-1165396013.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1165396013-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1165396013-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1165396013-768x512.jpg 768w" height="836" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201254%20836%22%3E%3C/svg%3E" width="1254"><figcaption class="wp-caption-text" data-dcnode-id="1542" id="caption-attachment-21935"><span data-dcnode-id="1543" instrument_node="">iStock.com/bhofack2</span></figcaption></figure><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1539" instrument_node="">Even the healthiest noodles are still processed foods. The whole grains are broken and ground into a fine powder before being mixed with water. And so they tend to be calorically dense (except for shirataki) and may spike blood sugar in those with diabetes or prediabetes. If you’re committed to eating as many whole foods as you can, or if you prefer a largely raw diet, you don’t have to forswear noodles forever. You can also make plant-based pasta and noodles out of vegetables with a </span><a data-dcnode-id="1537" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2DzWfPt" rel="external noopener noreferrer"><span data-dcnode-id="1538" instrument_node="">spiralizer</span></a><span data-dcnode-id="1536" instrument_node="">. Common vegetables used for this purpose include </span><a data-dcnode-id="1534" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/blog/zucchini-benefits/"><span data-dcnode-id="1535" instrument_node="">zucchini</span></a><span data-dcnode-id="1533" instrument_node="">, which lends its first letter to the dish, “zoodles,” as well as other summer or winter squash, </span><a data-dcnode-id="1531" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/blog/sweet-potato-health-benefits/"><span data-dcnode-id="1532" instrument_node="">sweet potatoes</span></a><span data-dcnode-id="1530" instrument_node="">, and carrots. Zucchini and other summer squash spiralize easily, while you might need a more heavy-duty spiralizer to handle raw sweet potato or butternut squash. And, don’t forget spaghetti squash, which is exactly as it sounds. Once it’s baked, there’s no spiralizer necessary, just a fork to remove the squash’s abundant “spaghetti” strands.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><h2 data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Pasta Types to Avoid</span></h2><span data-dcnode-id="1525" instrument_node="">
</span><figure aria-describedby="caption-attachment-21934" class="wp-caption aligncenter" data-dcnode-id="1519" id="attachment_21934" style="width: 1254px"><noscript data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">&lt;img class="wp-image-21934 size-full" src="https://foodrevolution.org/wp-content/uploads/iStock-1161531577.jpg" alt="Refined wheat pastas in bags" width="1254" height="836" srcset="https://foodrevolution.org/wp-content/uploads/iStock-1161531577.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1161531577-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1161531577-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1161531577-768x512.jpg 768w" sizes="(max-width: 1254px) 100vw, 1254px" /&gt;</span></noscript><img alt="Refined wheat pastas in bags" class="lazyload wp-image-21934 size-full" data-dcnode-id="1522" data-sizes="(max-width: 1254px) 100vw, 1254px" data-src="https://foodrevolution.org/wp-content/uploads/iStock-1161531577.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/iStock-1161531577.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1161531577-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1161531577-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1161531577-768x512.jpg 768w" height="836" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201254%20836%22%3E%3C/svg%3E" width="1254"><figcaption class="wp-caption-text" data-dcnode-id="1520" id="caption-attachment-21934"><span data-dcnode-id="1521" instrument_node="">iStock.com/Tatiana Atamaniuk</span></figcaption></figure><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1517" instrument_node="">The least healthy pasta is, alas, the most commonly available in stores and restaurants: wheat pasta made with refined white flour. The refined starches and carbohydrates in white pasta actually act a lot like sugar once you digest them. And the good stuff found in wheat — the vitamins, minerals, healthy oils, and fiber — are found almost exclusively in the bran and the germ, both of which are </span><a data-dcnode-id="1515" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.choosemyplate.gov/eathealthy/grains" rel="external noopener noreferrer"><span data-dcnode-id="1516" instrument_node="">removed in the refining process</span></a><span data-dcnode-id="1514" instrument_node="">. The lack of nutrients and the high speed of absorption of refined carbohydrates makes white pasta a fairly empty calorie food. As such, they can contribute to disease rather than helping prevent it the way whole grains can. Of course, some brands try to compensate for the lack of nutrition in the products by “fortifying” them. Some pastas have B vitamins and iron added in. But fortified nutrients </span><a data-dcnode-id="1512" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK208880/" rel="external noopener noreferrer"><span data-dcnode-id="1513" instrument_node="">act more like supplements</span></a><span data-dcnode-id="1511" instrument_node=""> than the same nutrients found in foods in their natural and whole state.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">To avoid pasta made from refined white flour, here’s the list of synonyms to avoid:</span></p><span data-dcnode-id="1506" instrument_node="">
</span><ul data-dcnode-id="1492"><span data-dcnode-id="1505" instrument_node="">
</span><li data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Semolina</span></li><span data-dcnode-id="1502" instrument_node="">
</span><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Durum wheat flour</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">All-purpose flour</span></li><span data-dcnode-id="1496" instrument_node="">
</span><li data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Wheat flour</span></li><span data-dcnode-id="1493" instrument_node="">
</span></ul><span data-dcnode-id="1491" instrument_node="">
</span><h2 data-dcnode-id="1489" id="recipes"><span data-dcnode-id="1490" instrument_node="">Plant-Based Pasta and Noodle Recipes</span></h2><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">If you’re a lover of health, and of all things noodles, then you’re in the right place. From Legume Pasta with Spinach and Cashew Bechamel to Spaghetti Squash with Garlic, Tomato, and Mushroom Sauce to Miso Shiitake and Bok Choy Soup with Shirataki Noodles, we have you covered. It’s a healthy noodle extravaganza, and you’re invited! Let us know which plant-based pasta recipes below become your new, go-to favorites.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><h3 data-dcnode-id="1481"><span data-dcnode-id="1484" instrument_node="">1. </span><a data-dcnode-id="1482" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/recipes/legume-penne-with-spinach-and-cashew-bechamel/"><span data-dcnode-id="1483" instrument_node="">Legume Penne with Spinach and Cashew Bechamel</span></a></h3><span data-dcnode-id="1480" instrument_node="">
</span><figure aria-describedby="caption-attachment-21940" class="wp-caption aligncenter" data-dcnode-id="1474" id="attachment_21940" style="width: 2000px"><noscript data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">&lt;img class="size-full wp-image-21940" src="https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8.jpg" alt="legume pasta with spinach and cashew bechamel" width="2000" height="1335" srcset="https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8.jpg 2000w, https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8-1536x1025.jpg 1536w" sizes="(max-width: 2000px) 100vw, 2000px" /&gt;</span></noscript><img alt="legume pasta with spinach and cashew bechamel" class="lazyload size-full wp-image-21940" data-dcnode-id="1477" data-sizes="(max-width: 2000px) 100vw, 2000px" data-src="https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8.jpg 2000w, https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/legume-pasta-with-spinach-and-bechamel-8-1536x1025.jpg 1536w" height="1335" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%202000%201335%22%3E%3C/svg%3E" width="2000"><figcaption class="wp-caption-text" data-dcnode-id="1475" id="caption-attachment-21940"><span data-dcnode-id="1476" instrument_node="">iStock.com/Tatiana Atamaniuk</span></figcaption></figure><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Serve this to your friends and family, and you don’t have to tell them it’s a healthy vegan pasta dish! Chances are, they’ll think you made it like a traditional-style white sauce with cream and butter. The trick to perfecting the cashew bechamel is soaking the cashews and blending them until super smooth. The creamy bechamel with the legume pasta, crunchy peas, and earthy spinach will have everyone coming back for more!</span></p><span data-dcnode-id="1470" instrument_node="">
</span><h3 data-dcnode-id="1466"><span data-dcnode-id="1469" instrument_node="">2. </span><a data-dcnode-id="1467" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/recipes/buffalo-pasta-salad/"><span data-dcnode-id="1468" instrument_node="">Buffalo Pasta Salad</span></a></h3><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1461"><noscript data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">&lt;img class="aligncenter size-full wp-image-21929" src="https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad.jpg" alt="buffalo pasta salad in dish" width="2000" height="1369" srcset="https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad.jpg 2000w, https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad-300x205.jpg 300w, https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad-1024x701.jpg 1024w, https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad-768x526.jpg 768w, https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad-1536x1051.jpg 1536w" sizes="(max-width: 2000px) 100vw, 2000px" /&gt;</span></noscript><img alt="buffalo pasta salad in dish" class="lazyload aligncenter size-full wp-image-21929" data-dcnode-id="1462" data-sizes="(max-width: 2000px) 100vw, 2000px" data-src="https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad.jpg 2000w, https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad-300x205.jpg 300w, https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad-1024x701.jpg 1024w, https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad-768x526.jpg 768w, https://foodrevolution.org/wp-content/uploads/buffalo-pasta-salad-1536x1051.jpg 1536w" height="1369" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%202000%201369%22%3E%3C/svg%3E" width="2000"></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Want the sauce without the wings? This plant-based pasta dish has all the flavor in addition to a ton of fiber, plenty of nutrition, and just as much protein, as the meat-based version. Enjoy it by itself, serve as an appetizer, or savor it alongside a veggie burger.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><h3 data-dcnode-id="1453"><span data-dcnode-id="1456" instrument_node="">3. </span><a data-dcnode-id="1454" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/recipes/lentil-minestrone/"><span data-dcnode-id="1455" instrument_node="">Lentil Minestrone</span></a></h3><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1448"><noscript data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">&lt;img class="aligncenter size-full wp-image-21941" src="https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5.jpg" alt="lentil minestrone in bowl" width="2000" height="1335" srcset="https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5.jpg 2000w, https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5-1536x1025.jpg 1536w" sizes="(max-width: 2000px) 100vw, 2000px" /&gt;</span></noscript><img alt="lentil minestrone in bowl" class="lazyload aligncenter size-full wp-image-21941" data-dcnode-id="1449" data-sizes="(max-width: 2000px) 100vw, 2000px" data-src="https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5.jpg 2000w, https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/lentil-minestrone-5-1536x1025.jpg 1536w" height="1335" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%202000%201335%22%3E%3C/svg%3E" width="2000"></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">This Lentil Minestrone has all of the elements of a healthy soup — phytonutrient-filled vegetables, fiber-filled whole-grain pasta, healing herbs and spices, and protein-powered beans. Pro tip: Make extra and freeze in freezer-safe containers so that you can enjoy it for months to come!</span></p><span data-dcnode-id="1444" instrument_node="">
</span><h3 data-dcnode-id="1440"><span data-dcnode-id="1443" instrument_node="">4. </span><a data-dcnode-id="1441" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/recipes/quinoa-spaghetti-with-red-tomato-sauce-and-lentil-quinoa-meatballs/"><span data-dcnode-id="1442" instrument_node="">Quinoa Spaghetti with Basic Red Tomato Sauce and Lentil Quinoa Meatballs</span></a></h3><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1435"><noscript data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">&lt;img class="aligncenter size-full wp-image-21943" src="https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3.jpg" alt="quinoa spaghetti with basic red sauce" width="2000" height="1335" srcset="https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3.jpg 2000w, https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3-1536x1025.jpg 1536w" sizes="(max-width: 2000px) 100vw, 2000px" /&gt;</span></noscript><img alt="quinoa spaghetti with basic red sauce" class="lazyload aligncenter size-full wp-image-21943" data-dcnode-id="1436" data-sizes="(max-width: 2000px) 100vw, 2000px" data-src="https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3.jpg 2000w, https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/quinoa-spaghetti-with-basic-red-sauce-3-1536x1025.jpg 1536w" height="1335" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%202000%201335%22%3E%3C/svg%3E" width="2000"></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1433" instrument_node="">The tiny quinoa seed is not only a nutritional powerhouse with its protein, fiber, iron, and B vitamins, but it can also be used in so many ways. In this recipe, it’s the pasta </span><i data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">and</span></i><span data-dcnode-id="1430" instrument_node=""> the meatballs! And, while making your own tomato sauce might sound daunting, our Basic Red Tomato Sauce is actually quite simple. Pro tip: Double the sauce so you have extra for dipping your meatballs!</span></p><span data-dcnode-id="1428" instrument_node="">
</span><h3 data-dcnode-id="1424"><span data-dcnode-id="1427" instrument_node="">5. </span><a data-dcnode-id="1425" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/recipes/spaghetti-squash-with-garlic-tomato-and-mushroom-sauce/"><span data-dcnode-id="1426" instrument_node="">Spaghetti Squash with Garlic, Tomato and Mushroom Sauce</span></a></h3><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1419"><noscript data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">&lt;img class="aligncenter size-full wp-image-21944" src="https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3.jpg" alt="spaghetti squash with garlic tomato and mushroom" width="2000" height="1335" srcset="https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3.jpg 2000w, https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3-1536x1025.jpg 1536w" sizes="(max-width: 2000px) 100vw, 2000px" /&gt;</span></noscript><img alt="spaghetti squash with garlic tomato and mushroom" class="lazyload aligncenter size-full wp-image-21944" data-dcnode-id="1420" data-sizes="(max-width: 2000px) 100vw, 2000px" data-src="https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3.jpg 2000w, https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/spaghetti-squash-with-garlic-tomato-and-mushroom-3-1536x1025.jpg 1536w" height="1335" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%202000%201335%22%3E%3C/svg%3E" width="2000"></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Looking for a pasta-style dish without the heaviness of a pound of pasta? An equal amount of spaghetti squash will leave you feeling light yet still very satisfied! Fresh and bright sauces pair nicely with spaghetti squash, like this vegetable-broth-based garlic, tomato, and mushroom sauce. We love this as a light dish for a warm summer evening or a warming dish for crisp fall nights.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><h3 data-dcnode-id="1411"><span data-dcnode-id="1414" instrument_node="">6. </span><a data-dcnode-id="1412" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/recipes/drunken-noodles/"><span data-dcnode-id="1413" instrument_node="">Drunken Noodles</span></a></h3><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1406"><noscript data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">&lt;img class="aligncenter size-full wp-image-21930" src="https://foodrevolution.org/wp-content/uploads/drunken-noodles.jpg" alt="drunken noodles in a bowl" width="2000" height="1445" srcset="https://foodrevolution.org/wp-content/uploads/drunken-noodles.jpg 2000w, https://foodrevolution.org/wp-content/uploads/drunken-noodles-300x217.jpg 300w, https://foodrevolution.org/wp-content/uploads/drunken-noodles-1024x740.jpg 1024w, https://foodrevolution.org/wp-content/uploads/drunken-noodles-768x555.jpg 768w, https://foodrevolution.org/wp-content/uploads/drunken-noodles-1536x1110.jpg 1536w" sizes="(max-width: 2000px) 100vw, 2000px" /&gt;</span></noscript><img alt="drunken noodles in a bowl" class="lazyload aligncenter size-full wp-image-21930" data-dcnode-id="1407" data-sizes="(max-width: 2000px) 100vw, 2000px" data-src="https://foodrevolution.org/wp-content/uploads/drunken-noodles.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/drunken-noodles.jpg 2000w, https://foodrevolution.org/wp-content/uploads/drunken-noodles-300x217.jpg 300w, https://foodrevolution.org/wp-content/uploads/drunken-noodles-1024x740.jpg 1024w, https://foodrevolution.org/wp-content/uploads/drunken-noodles-768x555.jpg 768w, https://foodrevolution.org/wp-content/uploads/drunken-noodles-1536x1110.jpg 1536w" height="1445" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%202000%201445%22%3E%3C/svg%3E" width="2000"></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">While its name sounds woozy, there’s no alcohol to be found in these Drunken Noodles. Don’t be surprised, however, if you get a healthy “buzz” from the nutrient-dense rock stars like broccoli, red pepper, and organic tofu. Unlike alcohol, the warm color in your cheeks will be from the natural antioxidant activity of whole plant-based foods!</span></p><span data-dcnode-id="1402" instrument_node="">
</span><h3 data-dcnode-id="1398"><span data-dcnode-id="1401" instrument_node="">7. </span><a data-dcnode-id="1399" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foodrevolution.org/recipes/miso-shiitake-and-bok-choy-soup-with-shirataki-noodles/"><span data-dcnode-id="1400" instrument_node="">Miso Shiitake and Bok Choy Soup with Shirataki Noodles</span></a></h3><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1393"><noscript data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">&lt;img class="aligncenter size-full wp-image-21942" src="https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7.jpg" alt="miso shiitake and bok choy soup with noodles in bowls" width="2000" height="1335" srcset="https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7.jpg 2000w, https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7-1536x1025.jpg 1536w" sizes="(max-width: 2000px) 100vw, 2000px" /&gt;</span></noscript><img alt="miso shiitake and bok choy soup with noodles in bowls" class="lazyload aligncenter size-full wp-image-21942" data-dcnode-id="1394" data-sizes="(max-width: 2000px) 100vw, 2000px" data-src="https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7.jpg 2000w, https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7-1024x684.jpg 1024w, https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7-768x513.jpg 768w, https://foodrevolution.org/wp-content/uploads/miso-shiitake-and-bok-choy-soup-with-noodles-7-1536x1025.jpg 1536w" height="1335" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%202000%201335%22%3E%3C/svg%3E" width="2000"></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Love noodle bowls? We do, too! Shirataki noodles provide fiber, bok choy provides calcium and other phytonutrients, and mushrooms provide the adaptogenic and immune-supporting nutrients your body needs year-round. This restaurant-worthy bowl is easy to make in the comfort of your own home. Cooler still is that you can add even more vegetables, plant-based protein, and herbs of your choice!</span></p><span data-dcnode-id="1389" instrument_node="">
</span><h2 data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Explore the Wide World of Pasta</span></h2><span data-dcnode-id="1386" instrument_node="">
</span><figure aria-describedby="caption-attachment-21933" class="wp-caption aligncenter" data-dcnode-id="1380" id="attachment_21933" style="width: 1254px"><noscript data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">&lt;img class="wp-image-21933 size-full" src="https://foodrevolution.org/wp-content/uploads/iStock-1158242060.jpg" alt="Couple cooking pasta together" width="1254" height="836" srcset="https://foodrevolution.org/wp-content/uploads/iStock-1158242060.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1158242060-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1158242060-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1158242060-768x512.jpg 768w" sizes="(max-width: 1254px) 100vw, 1254px" /&gt;</span></noscript><img alt="Couple cooking pasta together" class="lazyload wp-image-21933 size-full" data-dcnode-id="1383" data-sizes="(max-width: 1254px) 100vw, 1254px" data-src="https://foodrevolution.org/wp-content/uploads/iStock-1158242060.jpg" data-srcset="https://foodrevolution.org/wp-content/uploads/iStock-1158242060.jpg 1254w, https://foodrevolution.org/wp-content/uploads/iStock-1158242060-300x200.jpg 300w, https://foodrevolution.org/wp-content/uploads/iStock-1158242060-1024x683.jpg 1024w, https://foodrevolution.org/wp-content/uploads/iStock-1158242060-768x512.jpg 768w" height="836" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201254%20836%22%3E%3C/svg%3E" width="1254"><figcaption class="wp-caption-text" data-dcnode-id="1381" id="caption-attachment-21933"><span data-dcnode-id="1382" instrument_node="">iStock.com/Ridofranz</span></figcaption></figure><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Plant-based pasta and noodles can be part of a healthy diet when they’re made from whole grains, legumes, or in some cases, vegetables. Toppings also matter. Steer clear of animal products, unhealthy oils, and excessive sodium and go for whole plant foods and homemade sauces when possible. And spend some time exploring the wide world of pasta; humanity’s love of noodles is one of the things that unites almost all of us!</span></p><span data-dcnode-id="1376" instrument_node="">
