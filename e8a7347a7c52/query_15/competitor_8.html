ctions clicked" id="recipe-instructions-label-0-0" type="checkbox" value=""><span data-dcnode-id="1597" instrument_node=""> </span><span class="checkbox-list-checkmark" data-dcnode-id="1592"><span data-dcnode-id="1596" instrument_node=""> </span><span class="checkbox-list-text elementFont__subtitle--bold" data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Step 1</span></span><span data-dcnode-id="1593" instrument_node=""> </span></span><span data-dcnode-id="1591" instrument_node=""> </span></label><span data-dcnode-id="1589" instrument_node=""> </span><div class="section-body elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1583"><div class="paragraph" data-dcnode-id="1585"><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">To prepare crust: Whisk whole-wheat flour, all-purpose flour, 2 tablespoons sugar and salt in a large bowl. Cut butter into small pieces and, with your fingers, quickly rub them into the dry ingredients until smaller but still visible. Add sour cream and oil; toss with a fork to combine with the dry ingredients. Sprinkle water over the mixture. Toss with a fork until evenly moist. Knead the dough with your hands in the bowl a few times--the mixture will still be a little crumbly. Turn out onto a clean surface and knead a few more times, until the dough just holds together. Divide the dough in half and shape into 5-inch-wide disks. Wrap each in plastic and refrigerate for at least 1 hour.</span></p><span data-dcnode-id="1586" instrument_node=""> </span></div><span data-dcnode-id="1584" instrument_node=""> </span></div><span data-dcnode-id="1582" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper mobile-ad karma-ad" data-dcnode-id="1581" data-tier="2" id="div-gpt-mob-square-fixed-1" role="complementary" tabindex="-1"></div><span data-dcnode-id="1580" instrument_node=""> </span><div class="ad-title mobile-ad" data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Advertisement</span></div><span data-dcnode-id="1577" instrument_node=""> </span></li><span data-dcnode-id="1575" instrument_node=""> </span><li class="subcontainer instructions-section-item" data-dcnode-id="1555" data-tracking-zone="recipe-interaction"><span data-dcnode-id="1574" instrument_node=""> </span><label class="checkbox-list" data-dcnode-id="1564" for="recipe-instructions-label-0-1"><span data-dcnode-id="1573" instrument_node=""> </span><input class="checkbox-list-input" data-dcnode-id="1572" data-tracking-label="directions clicked" id="recipe-instructions-label-0-1" type="checkbox" value=""><span data-dcnode-id="1571" instrument_node=""> </span><span class="checkbox-list-checkmark" data-dcnode-id="1566"><span data-dcnode-id="1570" instrument_node=""> </span><span class="checkbox-list-text elementFont__subtitle--bold" data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Step 2</span></span><span data-dcnode-id="1567" instrument_node=""> </span></span><span data-dcnode-id="1565" instrument_node=""> </span></label><span data-dcnode-id="1563" instrument_node=""> </span><div class="section-body elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1557"><div class="paragraph" data-dcnode-id="1559"><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">To prepare filling: Just before you're ready to roll out the dough, process tapioca in a spice grinder, mini food processor or blender until finely ground. Combine with strawberries, rhubarb, sugar, lemon juice, nutmeg and salt in a large bowl; toss well to combine.</span></p><span data-dcnode-id="1560" instrument_node=""> </span></div><span data-dcnode-id="1558" instrument_node=""> </span></div><span data-dcnode-id="1556" instrument_node=""> </span></li><span data-dcnode-id="1554" instrument_node=""> </span><li class="subcontainer instructions-section-item" data-dcnode-id="1534" data-tracking-zone="recipe-interaction"><span data-dcnode-id="1553" instrument_node=""> </span><label class="checkbox-list" data-dcnode-id="1543" for="recipe-instructions-label-0-2"><span data-dcnode-id="1552" instrument_node=""> </span><input class="checkbox-list-input" data-dcnode-id="1551" data-tracking-label="directions clicked" id="recipe-instructions-label-0-2" type="checkbox" value=""><span data-dcnode-id="1550" instrument_node=""> </span><span class="checkbox-list-checkmark" data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node=""> </span><span class="checkbox-list-text elementFont__subtitle--bold" data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Step 3</span></span><span data-dcnode-id="1546" instrument_node=""> </span></span><span data-dcnode-id="1544" instrument_node=""> </span></label><span data-dcnode-id="1542" instrument_node=""> </span><div class="section-body elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1536"><div class="paragraph" data-dcnode-id="1538"><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Position a rack in the center of the oven and place a foil-lined baking sheet on the rack below; preheat to 425 degrees F.</span></p><span data-dcnode-id="1539" instrument_node=""> </span></div><span data-dcnode-id="1537" instrument_node=""> </span></div><span data-dcnode-id="1535" instrument_node=""> </span></li><span data-dcnode-id="1533" instrument_node=""> </span><li class="subcontainer instructions-section-item" data-dcnode-id="1513" data-tracking-zone="recipe-interaction"><span data-dcnode-id="1532" instrument_node=""> </span><label class="checkbox-list" data-dcnode-id="1522" for="recipe-instructions-label-0-3"><span data-dcnode-id="1531" instrument_node=""> </span><input class="checkbox-list-input" data-dcnode-id="1530" data-tracking-label="directions clicked" id="recipe-instructions-label-0-3" type="checkbox" value=""><span data-dcnode-id="1529" instrument_node=""> </span><span class="checkbox-list-checkmark" data-dcnode-id="1524"><span data-dcnode-id="1528" instrument_node=""> </span><span class="checkbox-list-text elementFont__subtitle--bold" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Step 4</span></span><span data-dcnode-id="1525" instrument_node=""> </span></span><span data-dcnode-id="1523" instrument_node=""> </span></label><span data-dcnode-id="1521" instrument_node=""> </span><div class="section-body elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1515"><div class="paragraph" data-dcnode-id="1517"><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Remove the dough from the refrigerator; let stand for 5 minutes to warm slightly. Roll one portion between sheets of parchment or wax paper into a 12-inch circle. Peel off the top sheet and invert the dough into a 9-inch pie pan. Peel off the remaining paper. Moisten the outer edge of the dough with water. Scrape the filling and any accumulated juices into the crust.</span></p><span data-dcnode-id="1518" instrument_node=""> </span></div><span data-dcnode-id="1516" instrument_node=""> </span></div><span data-dcnode-id="1514" instrument_node=""> </span></li><span data-dcnode-id="1512" instrument_node=""> </span><li class="subcontainer instructions-section-item" data-dcnode-id="1492" data-tracking-zone="recipe-interaction"><span data-dcnode-id="1511" instrument_node=""> </span><label class="checkbox-list" data-dcnode-id="1501" for="recipe-instructions-label-0-4"><span data-dcnode-id="1510" instrument_node=""> </span><input class="checkbox-list-input" data-dcnode-id="1509" data-tracking-label="directions clicked" id="recipe-instructions-label-0-4" type="checkbox" value=""><span data-dcnode-id="1508" instrument_node=""> </span><span class="checkbox-list-checkmark" data-dcnode-id="1503"><span data-dcnode-id="1507" instrument_node=""> </span><span class="checkbox-list-text elementFont__subtitle--bold" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Step 5</span></span><span data-dcnode-id="1504" instrument_node=""> </span></span><span data-dcnode-id="1502" instrument_node=""> </span></label><span data-dcnode-id="1500" instrument_node=""> </span><div class="section-body elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1494"><div class="paragraph" data-dcnode-id="1496"><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">To prepare lattice top: Roll the remaining dough between sheets of parchment or wax paper into a 12-inch circle. Peel off the top sheet. Cut the dough into 1-inch strips using a pastry wheel or a knife. Lift off every other strip and lay them on top of the pie, leaving about a 1-inch gap between strips. Use the shorter strips for the edges and the longer ones for the middle of the pie. (You may not need to use the outermost strips.) Fold back the first, third and fifth strips of dough to the edge of the pie. Place a shorter strip of dough across the second and fourth strips, about 1 inch from the edge. Unfold the folded strips over the crosswise strip. Fold back the second and fourth strips over the first crosswise strip. Place another strip crosswise, about 1 inch from the first. Unfold the strips over the second crosswise strip. Continue folding back alternating strips and placing crosswise strips until the top is covered with woven strips. Trim any overhanging crust. Crimp the outer edge with a fork. Brush the dough with egg white; sprinkle 1 teaspoon sugar (if using) over just the lattice top, not the outer edge.</span></p><span data-dcnode-id="1497" instrument_node=""> </span></div><span data-dcnode-id="1495" instrument_node=""> </span></div><span data-dcnode-id="1493" instrument_node=""> </span></li><span data-dcnode-id="1491" instrument_node=""> </span><li class="subcontainer instructions-section-item" data-dcnode-id="1471" data-tracking-zone="recipe-interaction"><span data-dcnode-id="1490" instrument_node=""> </span><label class="checkbox-list" data-dcnode-id="1480" for="recipe-instructions-label-0-5"><span data-dcnode-id="1489" instrument_node=""> </span><input class="checkbox-list-input" data-dcnode-id="1488" data-tracking-label="directions clicked" id="recipe-instructions-label-0-5" type="checkbox" value=""><span data-dcnode-id="1487" instrument_node=""> </span><span class="checkbox-list-checkmark" data-dcnode-id="1482"><span data-dcnode-id="1486" instrument_node=""> </span><span class="checkbox-list-text elementFont__subtitle--bold" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Step 6</span></span><span data-dcnode-id="1483" instrument_node=""> </span></span><span data-dcnode-id="1481" instrument_node=""> </span></label><span data-dcnode-id="1479" instrument_node=""> </span><div class="section-body elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1473"><div class="paragraph" data-dcnode-id="1475"><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Bake the pie for 20 minutes. Then rotate the pie 180 degrees and lower the oven temperature to 325 degrees . Continue baking until the crust is golden and the filling is beginning to bubble, 30 to 35 minutes more. Let cool on a wire rack for at least 2 hours before serving.</span></p><span data-dcnode-id="1476" instrument_node=""> </span></div><span data-dcnode-id="1474" instrument_node=""> </span></div><span data-dcnode-id="1472" instrument_node=""> </span></li><span data-dcnode-id="1470" instrument_node=""> </span></ul><span data-dcnode-id="1468" instrument_node=""> </span></fieldset><span data-dcnode-id="1466" instrument_node=""> </span></section><span data-dcnode-id="1464" instrument_node=""> </span><div class="component recipe-notes elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1439"><span data-dcnode-id="1463" instrument_node=""> </span><div class="recipe-note container" data-dcnode-id="1441"><span
