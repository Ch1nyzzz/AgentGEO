an data-dcnode-id="2179" instrument_node=""> </span></span><span data-dcnode-id="2177" instrument_node=""> </span></label><span data-dcnode-id="2175" instrument_node=""> </span><div class="section-body elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="2169"><div class="paragraph" data-dcnode-id="2171"><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Preheat oven to 375°F. Lightly coat a 7-by-11-inch baking dish with cooking spray.</span></p><span data-dcnode-id="2172" instrument_node=""> </span></div><span data-dcnode-id="2170" instrument_node=""> </span></div><span data-dcnode-id="2168" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper mobile-ad karma-ad" data-dcnode-id="2167" data-tier="2" id="div-gpt-mob-square-fixed-1" role="complementary" tabindex="-1"></div><span data-dcnode-id="2166" instrument_node=""> </span><div class="ad-title mobile-ad" data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Advertisement</span></div><span data-dcnode-id="2163" instrument_node=""> </span></li><span data-dcnode-id="2161" instrument_node=""> </span><li class="subcontainer instructions-section-item" data-dcnode-id="2141" data-tracking-zone="recipe-interaction"><span data-dcnode-id="2160" instrument_node=""> </span><label class="checkbox-list" data-dcnode-id="2150" for="recipe-instructions-label-0-1"><span data-dcnode-id="2159" instrument_node=""> </span><input class="checkbox-list-input" data-dcnode-id="2158" data-tracking-label="directions clicked" id="recipe-instructions-label-0-1" type="checkbox" value=""><span data-dcnode-id="2157" instrument_node=""> </span><span class="checkbox-list-checkmark" data-dcnode-id="2152"><span data-dcnode-id="2156" instrument_node=""> </span><span class="checkbox-list-text elementFont__subtitle--bold" data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Step 2</span></span><span data-dcnode-id="2153" instrument_node=""> </s
