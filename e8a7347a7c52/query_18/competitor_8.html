</span><h3 data-dcnode-id="824"><span data-dcnode-id="825" style="color: #003870;"><a data-dcnode-id="827" name="WHAT"></a><span data-dcnode-id="826" instrument_node="">What is Vitamin P ?</span></span></h3><span data-dcnode-id="823" instrument_node="">
</span><hr data-dcnode-id="822" style="width: 100%; height: 1px;"><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="820" instrument_node="">Vitamin P, more commonly known as </span><b data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">bioflavonoids</span></b><span data-dcnode-id="817" instrument_node="">, or flavonoids, are not strictly true vitamins, though they possess vitamin-like properties.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">They are a vast array of compounds found in plants, and are classified as plant pigments. These pigments, over 4000 of which have been identified, are responsible for the dazzling colors of fruits and flowers.</span></p><span data-dcnode-id="812" instrument_node="">
</span><span data-dcnode-id="810" instrument_node="">
</span><div class="quads-location quads-ad1" data-dcnode-id="797" id="quads-ad1" style="float:none;margin:0px;"><span data-dcnode-id="809" instrument_node="">
</span><span data-dcnode-id="807" instrument_node="">
</span><span data-dcnode-id="805" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0050039586395647" data-ad-format="auto" data-ad-slot="9164274122" data-dcnode-id="804" style="display:block"></ins><span data-dcnode-id="803" instrument_node="">
</span><span data-dcnode-id="800" instrument_node="">
</span><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">
</span></div><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Flavonoids belong to the larger group of beneficial plant compounds known as polyphenols.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Heat, acidity, boiling and processing can cause significant loss of flavonoid content in food, as much as 50% or more. Overcooking of vegetables is especially detrimental.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="786"><a data-dcnode-id="789" name="BENEFITS"></a><span data-dcnode-id="787" style="font-weight: bold; color: #003870;"><span data-dcnode-id="788" instrument_node="">How Vitamin P Benefits Health</span></span></p><span data-dcnode-id="785" instrument_node="">
</span><hr data-dcnode-id="784" style="width: 100%; height: 1px;"><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">For a start flavonoids are powerful antioxidants that scavenge the harmful free radicals that damage our cells, and that alter genetic DNA, accelerate the aging process, and contribute to development of many diseases.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Free radicals occur naturally in the body as a result of conversion of food to energy, but more is added by toxins such as cigarette smoke, UV rays, radiation, and air and water pollution. Antioxidants are important as they neutralize these free radicals, and reduce the damage they cause.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Bioflavonoids have been extensively studied, and results show that they provide a number of health benefits. These can be better understood by looking at different groups of bioflavonoids that include:</span></p><span data-dcnode-id="774" instrument_node="">
</span><ul data-dcnode-id="716"><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="769" type="square"><b data-dcnode-id="771" style="color: #8c8c00;"><span data-dcnode-id="772" instrument_node="">Citrus Bioflavonoids</span></b><span data-dcnode-id="770" instrument_node="">: these are the flavonoids found in citrus fruit such as oranges, lemons, tangerines, and grapefruit. They are used and clinically proven in the treatment of hemorrhoids, easy bruising, and varicose veins. The commonly used citrus bioflavonoids include rutin, quercitrin, naringin, and hesperidin.</span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="764" type="square"><b data-dcnode-id="766" style="color: #8c8c00;"><span data-dcnode-id="767" instrument_node="">Quercetin</span></b><span data-dcnode-id="765" instrument_node=""> : this is the most abundant and active of the flavonoids, and is a strong antioxidant. It is a major contributor to the medicinal activity of plants. Research indicates that quercetin has anti-viral, anti-inflammatory, anti-allergic,and powerful anti-cancer properties.It is found in commonly eaten food like apples, tea, berries, brassica vegetables, and many nuts, seeds and leaves such as Ginkgo Biloba, St. John’s Wort, and Elder. It is found in especially high amounts in broccoli, red onions, and garlic. A study has shown that people with a diet rich in red onions and garlic have 20 times less cancer risk.</span></li><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="745" type="square"><b data-dcnode-id="761" style="color: #8c8c00;"><span data-dcnode-id="762" instrument_node="">ProanthoCyanidins</span></b><span data-dcnode-id="760" instrument_node="">: more commonly called </span><b data-dcnode-id="758" style="color: #8c8c00;"><span data-dcnode-id="759" instrument_node="">pycnogenols</span></b><span data-dcnode-id="757" instrument_node=""> or </span><b data-dcnode-id="755" style="color: #8c8c00;"><span data-dcnode-id="756" instrument_node="">OPCs</span></b><span data-dcnode-id="754" instrument_node=""> (oligomeric procyanidins) or </span><b data-dcnode-id="752" style="color: #8c8c00;"><span data-dcnode-id="753" instrument_node="">PCOs</span></b><span data-dcnode-id="751" instrument_node=""> (procyanidolic oligomers).These are found in many plants, especially pine bark, grape skin, and grape seed. They are also found in apples, cinnamon, cocoa, barley, bilberry, cranberry, blackcurrant, rhubarb, green tea, and black tea.Proanthocyanidins have extremely powerful antioxidant properties. Research shows that they provide 20 times more antioxidant impact than vitamin C, and 50 times more than vitamin E. They also prolong the lifespan of vitamin C, and boost vitamin E levels in blood vessels.Clinical trials of proanthocyanidins reveal many health benefits. In particular, they offer significant cardiovascular protection. Grape seed extract, for example, reduces risk of heart disease by reducing inflammation and slowing aggregation of platelets.
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Other uses include antioxidant protection against atherosclerosis, cataracts, diabetes, gastric ulcer and cancer of the large intestines.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Proanthocyanidin extracts, such as from pine bark and grape seed, have been sold as nutritional supplements for the last 25 years in Europe. There is no official RDA, but research points to maximum benefits with daily dosages of 60 mg.</span></p></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="723" type="square"><b data-dcnode-id="742" style="color: #8c8c00;"><span data-dcnode-id="743" instrument_node="">Green Tea Polyphenols </span></b><span data-dcnode-id="741" instrument_node="">: there are 3 main varieties of teas – black, green, and oolong. Of the three, green tea, made from unfermented Camellia Sinesis leaves, has the highest concentration of polyphenols that are powerful antioxidants. Its antioxidant impact can be 20-80 times that of vitamins C and E.Green tea polyphenols offer a number of health benefits. According to research published in the December 1 2004 issue of the American Association for Cancer Research, green tea polyphenols were found to prevent the spread of prostate cancer and to mitigate the risk of other cancers, such as breast, lung and colon cancer.Green tea reduces the risk factors associated with heart disease and stroke, by lowering LDL cholesterol and serum triglyceride levels.It inhibits oxidation of LDL cholesterol that leads to atherosclerosis. It is also as effective as aspirin in inhibiting platelet aggregation and formation of the abnormal blood clots that cause heart attacks and strokes. In addition, it increases levels of HDL, or good cholesterol, that helps remove atherosclerotic plaque from artery walls.
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Published studies report that green tea lowers blood pressure and blood sugar levels significantly. High blood sugar is associated with accelerated aging, cardiovascular disease, diabetes, and body fat.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Green tea appears to protect the liver against damage from toxins, including alcohol. Some studies suggest that catechins, one of the polyphenols in green tea, may help treat viral hepatitis.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Green tea can kill bacteria. It is known for its deodorising effect and helps kill oral bacteria that cause bad breath and cavities. It inhibits dangerous intestinal bacteria, but promotes the growth of friendly bacteria. It may also help treat inflammatory bowel diseases.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Green tea has traditionally been consumed in China, Japan and India, where its health effects have been known for centuries. It is known for its detoxifying effect, and ability to burn fat. It is also used to treat flatulence, promote digestion, and improve heart health.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="728" instrument_node="">It is also a known fact in countries that traditionally consume green tea, that it should </span><b data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">not</span></b><span data-dcnode-id="725" instrument_node=""> be taken in excessor on an empty stomach. A University of Toronto study published in February 2006 indicates that highly concentrated doses of green tea polyphenols may cause liver damage.</span></p></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="718" type="square"><b data-dcnode-id="720" style="color: #8c8c00;"><span data-dcnode-id="721" instrument_node="">Soy Isoflavones</span></b><span data-dcnode-id="719" instrument_node=""> :&nbsp;soy contains flavonoids called isoflavones, which are phytoestrogens. Phytoestrogens (“phyto” = plant) are natural non-steroidal plant compounds that help to balance the effect of estrogen on the body by blocking action of the hormone when levels of it are high, and acting like estrogen when estrogen levels are low, such as in postmenopausal women.Evidence from tests and clinical trials indicate that phytoestrogens may help prevent cardiovascular disease, osteoporosis, menopausal symptoms, and prostate and breast cancer. These disorders are less common in cultures with diets rich in soy products and plants.</span></li><span data-dcnode-id="717" instrument_node="">
</span></ul><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Flavonoids therefore play an important role in prevention and/or treatment of many health conditions. Benefits of flavonoids are summarized here.</span></p><span data-dcnode-id="712" instrument_node="">

" style="text-align: left; vertical-align: top;"><span data-dcnode-id="636" style="font-family: Verdana; font-size: 9pt;"><span data-dcnode-id="637" instrument_node="">works with vitamin C to alleviate oral herpes</span></span></td></tr><tr data-dcnode-id="622"><td data-dcnode-id="628" style="text-align: right; vertical-align: top; width: 22px;"><span data-dcnode-id="629" style="font-family: Verdana; font-size: 9pt;"><span data-dcnode-id="630" instrument_node="">7.</span></span></td><td data-dcnode-id="624" style="text-align: left; vertical-align: top;"><span data-dcnode-id="625" style="font-family: Verdana; font-size: 9pt;"><span data-dcnode-id="626" instrument_node="">flavonoids with vitamin C may help prevent cold sores; to treat cold sores, try taking 1000mg of vitamin C with 1000 mg of bioflavonoids, then reduce to 500 mg of each 3 times a day</span></span></td></tr><tr data-dcnode-id="611"><td data-dcnode-id="617" style="text-align: right; vertical-align: top; width: 22px;"><span data-dcnode-id="618" style="font-family: Verdana; font-size: 9pt;"><span data-dcnode-id="619" instrument_node="">8.</span></span></td><td data-dcnode-id="613" style="text-align: left; vertical-align: top;"><span data-dcnode-id="614" style="font-family: Verdana; font-size: 9pt;"><span data-dcnode-id="615" instrument_node="">may help prevent and treat cataracts</span></span></td></tr><tr data-dcnode-id="600"><td data-dcnode-id="606" style="text-align: right; vertical-align: top; width: 22px;"><span data-dcnode-id="607" style="font-family: Verdana; font-size: 9pt;"><span data-dcnode-id="608" instrument_node="">9.</span></span></td><td data-dcnode-id="602" style="text-align: left; vertical-align: top;"><span data-dcnode-id="603" style="font-family: Verdana; font-size: 9pt;"><span data-dcnode-id="604" instrument_node="">stimulates bile production</span></span></td></tr><tr data-dcnode-id="589"><td data-dcnode-id="595" style="text-align: right; vertical-align: top; width: 22px;"><span data- </span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Deficiency is not common, but on the other hand many people do not take enough bioflavonoids for optimal health.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">The most likely contributing factor is a diet that is low in vegetables and fruits, or that is skewed towards highly processed vegetables and fruits. Processing can cause significant loss of bioflavonoid content in food. For instance, juice that does not contain the pulpy fibrous part of the fruit, or natural colors of vegetables that are lost in canning and reheating.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Stress, diuretics, drugs such as oral contraceptives, anti-inflammatories, oestrogens, and aspirin, also increase intake requirements for flavonoids.</span></p><span data-dcnode-id="483" instrument_node="">

</span><hr data-dcnode-id="399" style="width: 100%; height: 1px;"><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Almost all vegetables, fruits, spices and herbs contain bioflavonoids, as do some grains and dried beans. There is a vast range of types of flavonoids, with different ones from different foods.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Green tea for example, contains flavonoids called catechins that can reach up to 100 milligrams per cup. Berries, especially black raspberries, have the highest concentrations of the flavonoids anthocyanins.</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">The foods listed below can each contain several types of flavonoids.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Rich bioflavonoids foods</span></p><span data-dcnode-id="386" instrument_node="">

</span><p data-dcnode-id="322"><span data-dcnode-id="323" style="font-weight: bold; color: #003870;"><span data-dcnode-id="324" instrument_node="">Vitamin P Supplements</span></span></p><span data-dcnode-id="321" instrument_node="">
</span><hr data-dcnode-id="320" style="width: 100%; height: 1px;"><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Taking vitamins and minerals in their correct balance is vital to the proper functioning of all vitamins. They work synergistically, which means that the effectiveness of any one nutrient requires or is enhanced, sometimes dramatically, by the presence of certain other nutrients.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">For this reason, if you are looking to take supplements for maintenance of optimal health, the recommended approach is to take a multi-vitamin that has the proper balance of all the necessary nutrients your body needs.</span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="312" instrument_node="">For a list of reputable top ranked vitamin and mineral supplements chosen in an independent supplement review, see </span><a data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthsupplementsnutritionalguide.com/best-multi-vitamin/"><span data-dcnode-id="311" instrument_node="">Best Multivitamin Supplements</span></a><span data-dcnode-id="309" instrument_node="">. Many of these are manufactured to pharmaceutical or nutraceutical GMP compliance, which is the highest multivitamin standard possible.</span></p><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Keep in mind, however, that while vitamin supplements are useful to plug nutritional gaps that are almost inevitable in modern diets, and to ensure we get optimal doses ofnutrients, they are no substitute for a good diet. Instead, use them to complement a healthy diet and lifestyle.</span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="299"><a data-dcnode-id="303" name="RDA"></a><span data-dcnode-id="300" style="font-size: 8pt;"><a data-dcnode-id="301" href="#TOP"><span data-dcnode-id="302" instrument_node="">TOP</span></a></span></p><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" style="font-weight: bold; color: #003870;"><span data-dcnode-id="297" instrument_node="">Vitamin P RDA (Recommended Dietary Allowance)</span></span></p><span data-dcnode-id="294" instrument_node="">
</span><hr data-dcnode-id="293" style="width: 100%; height: 1px;"><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">There are no official dosages for bioflavonoids. Doses in most supplements sold range from 30 to 200 milligrams a day which is acceptable for general maintenance.</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Clinical trials tend to be based on much higher doses of between 500 to 2000 mg (milligrams). For therapeutic purposes the range can be between 50 to 500 mg per day.</span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="281"><a data-dcnode-id="285" name="TOXICITY"></a><span data-dcnode-id="282" style="font-size: 8pt;"><a data-dcnode-id="283" href="#TOP"><span data-dcnode-id="284" instrument_node="">TOP</span></a></span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" style="font-weight: bold; color: #003870;"><span data-dcnode-id="279" instrument_node="">Vitamin P Overdose Symptoms, Toxicity Level &amp; Side Effects</span></span></p><span data-dcnode-id="276" instrument_node="">
</span><hr data-dcnode-id="275" style="width: 100%; height: 1px;"><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">With the exception of green tea, research on flavonoids in general shows no known toxic effects. High doses do not appear to cause serious side effects, even for amounts as high as 100 grams a day. Excess intake is simply excreted in urine.</span></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">The main symptom of flavonoid overdose is diarrhea.</span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">As for green tea, highly concentrated doses of it might contain too much caffeine for cancer and hepatitis patients, and for those people sensitive to caffeine.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" style="font-size: 9pt;"><a data-dcnode-id="263" href="#TOP"><span data-dcnode-id="264" instrument_node="">Go to top of this page :: Vitamin P | Benefits | Deficiency Symptoms</span></a></span></p><span data-dcnode-id="260" instrument_node="">
