</span><h1 class="single-title entry-title" data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Rhubarb: Benefits, Nutrition, and Uses</span></h1><span data-dcnode-id="2240" instrument_node="">
</span><p class="single-author" data-dcnode-id="2221"><span data-dcnode-id="2239" instrument_node="">by </span><span class="author single-author-name" data-dcnode-id="2235"><b data-dcnode-id="2236"><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/author/john" rel="nofollow" title="John Staughton (BASc, BFA)"><span data-dcnode-id="2238" instrument_node="">John Staughton (BASc, BFA)</span></a></b></span><span data-dcnode-id="2234" instrument_node="">
last updated - </span><time class="updated" data-dcnode-id="2232" datetime="2021-07-27T04:37:06-07:00" style=""><span data-dcnode-id="2233" instrument_node="">July 27, 2021</span></time><span data-dcnode-id="2231" instrument_node="">
Medically reviewed by </span><b data-dcnode-id="2228"><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/about-us%23emily-borth"><span data-dcnode-id="2230" instrument_node="">Emily Borth(MS, RDN)</span></a></b><span data-dcnode-id="2227" instrument_node=""> </span><button class="btn btn-outline-evidence-based" data-dcnode-id="2223" data-target="#evidence-based-modal" data-toggle="modal" id="evidence-based-btn" type="button"><span data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">✓</span></span><span data-dcnode-id="2224" instrument_node=""> Evidence Based</span></button><span data-dcnode-id="2222" instrument_node=""> </span></p><span data-dcnode-id="2220" instrument_node="">
</span><div class="single-text entry-content" data-dcnode-id="1384"><span data-dcnode-id="2219" instrument_node=""> </span><p data-dcnode-id="2208"><span data-dcnode-id="2218" instrument_node="">The health benefits of rhubarb may include its potential ability to promote </span><a class="of-internal-link" data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/home-remedies/weight-loss.html"><span data-dcnode-id="2217" instrument_node="">weight loss</span></a><span data-dcnode-id="2215" instrument_node="">, improve digestion, stimulate bone growth, avoid neuronal damage, boost </span><a class="of-internal-link" data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/essential-oils/healthy-skin.html"><span data-dcnode-id="2214" instrument_node="">skin</span></a><span data-dcnode-id="2212" instrument_node=""> health, enhance </span><a class="of-internal-link" data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/home-remedies/11-ways-boost-metabolism.html"><span data-dcnode-id="2211" instrument_node="">metabolism</span></a><span data-dcnode-id="2209" instrument_node="">, improve circulation, and protect against cardiovascular conditions.</span></p><span data-dcnode-id="2207" instrument_node=""> </span><h2 data-dcnode-id="2205" style="text-align: justify"><span data-dcnode-id="2206" instrument_node="">What is Rhubarb?</span></h2><span data-dcnode-id="2204" instrument_node=""> </span><p data-dcnode-id="2197"><span data-dcnode-id="2203" instrument_node="">Rhubarb, a part of the&nbsp;Polygonaceae family of plants, is a unique looking plant with a very interesting history. Scientifically, it is an herbaceous perennial with leaves growing off the top of a thick rhizome.</span><span class="ref-cite-link" data-dcnode-id="2198"><span data-dcnode-id="2202" instrument_node=""> </span><a data-dcnode-id="2199" data-index="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4538976/"><sup data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">[1]</span></sup></a></span></p><span data-dcnode-id="2196" instrument_node=""> </span><div class="code-block code-block-11" data-dcnode-id="2189" style="margin: 16px 12px 8px 0; float: left; width: 336px; height: 280px;"><span data-dcnode-id="2195" instrument_node=""> </span><div data-dcnode-id="2194" data-fuse="22453978188"></div><span data-dcnode-id="2193" instrument_node=""> </span><span data-dcnode-id="2190" instrument_node=""> </span></div><span data-dcnode-id="2188" instrument_node=""> </span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Although widely considered as a vegetable, in America, it is treated as a fruit, in culinary practices. The leaf stalks are actually the only parts of the plant consumed, sometimes as a dessert or an ingredient in sweet dishes.</span></p><span data-dcnode-id="2185" instrument_node=""> </span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">It is cultivated throughout the year in different parts of the world and is widely available in any season. It possibly grows in greenhouses, resulting in “hothouse” rhubarb, which is sweeter and deeper red in color, while the traditional variety is grown outside. One of the main reasons why people cultivate and eat rhubarb is its astounding nutritional value. It is packed with minerals, vitamins. organic compounds, and other nutrients that make it ideal for keeping our bodies healthy.</span></p><span data-dcnode-id="2182" instrument_node=""> </span><div class="wp-caption alignnone" data-dcnode-id="2176" id="attachment_138304" style="width: 710px"><img alt="Fresh rhubarb on a wooden table" aria-describedby="caption-attachment-138304" class="wp-image-138304 size-full lazy keep-away" data-dcnode-id="2181" data-src="https://www.organicfacts.net/wp-content/uploads/rhubarb1.jpg" data-srcset="https://www.organicfacts.net/wp-content/uploads/rhubarb1.jpg 700w, https://www.organicfacts.net/wp-content/uploads/rhubarb1-150x113.jpg 150w, https://www.organicfacts.net/wp-content/uploads/rhubarb1-600x450.jpg 600w, https://www.organicfacts.net/wp-content/uploads/rhubarb1-320x240.jpg 320w, https://www.organicfacts.net/wp-content/uploads/rhubarb1-160x120.jpg 160w" height="525" sizes="(max-width: 700px) 100vw, 700px" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20525'%3E%3C/svg%3E" srcset="https://www.organicfacts.net/wp-content/uploads/rhubarb1.jpg 700w, https://www.organicfacts.net/wp-content/uploads/rhubarb1-150x113.jpg 150w, https://www.organicfacts.net/wp-content/uploads/rhubarb1-600x450.jpg 600w, https://www.organicfacts.net/wp-content/uploads/rhubarb1-320x240.jpg 320w, https://www.organicfacts.net/wp-content/uploads/rhubarb1-160x120.jpg 160w" title="Fresh rhubarb on a wooden table" width="700"><p class="wp-caption-text" data-dcnode-id="2177" id="caption-attachment-138304"><span data-dcnode-id="2180" instrument_node="">Rhubarb is a perennial plant that has stalks similar to </span><span data-dcnode-id="2179" instrument_node="">celery</span><span data-dcnode-id="2178" instrument_node="">. Photo Credit: Shutterstock</span></p></div><span data-dcnode-id="2175" instrument_node=""> </span><h3 data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">What does Rhubarb Taste like?</span></h3><span data-dcnode-id="2172" instrument_node=""> </span><p data-dcnode-id="2164"><span data-dcnode-id="2171" instrument_node="">The taste of rhubarb is somewhat similar to that of green </span><a class="of-internal-link" data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/health-benefits-of-apple.html"><span data-dcnode-id="2170" instrument_node="">apples</span></a><span data-dcnode-id="2168" instrument_node="">, which is to say that it is tart. Usually, people add </span><a class="of-internal-link" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/other/jaggery-and-sugar.html"><span data-dcnode-id="2167" instrument_node="">sugar</span></a><span data-dcnode-id="2165" instrument_node=""> to make it sweeter and then bake or cook it. Also, raw rhubarbs have a sour and acidic taste.</span></p><span data-dcnode-id="2163" instrument_node=""> </span><p data-dcnode-id="2158"><span data-dcnode-id="2162" instrument_node="">It is also often paired with </span><a class="of-internal-link" data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/strawberries.html"><span data-dcnode-id="2161" instrument_node="">strawberries</span></a><span data-dcnode-id="2159" instrument_node=""> because of the lovely pair of tart and sweet that they make. Some people also often compare the taste of&nbsp;it with celery.</span></p><span data-dcnode-id="2157" instrument_node=""> </span><h3 data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Is Rhubarb Poisonous?</span></h3><span data-dcnode-id="2154" instrument_node=""> </span><p data-dcnode-id="2147"><span data-dcnode-id="2153" instrument_node="">Interestingly enough, the stalks are the only things eaten from this plant. The triangular leaves are extremely high in oxalic acid, which can cause severe illnesses in people if consumed, resulting in the common belief that rhubarb is poisonous. If the plant is subject to extreme cold, the dangerous acid can migrate into the stalk, so be sure to store&nbsp;it in a warm or temperate space, just like the climate where it normally grows.</span><span class="ref-cite-link" data-dcnode-id="2148"><span data-dcnode-id="2152" instrument_node=""> </span><a data-dcnode-id="2149" data-index="2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snaped.fns.usda.gov/seasonal-produce-guide/rhubarb"><sup data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">[2]</span></sup></a></span></p><span data-dcnode-id="2146" instrument_node=""> </span><div class="nutrition-info-wrapper keep-away" data-dcnode-id="1802"><table class="nutrition-info table table-striped" data-dcnode-id="1803"><caption data-dcnode-id="2140" style="caption-side:top"><div data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Nutrition Facts</span></div><hr data-dcnode-id="2143" style="border-width:1px;border-top-color: rgba(255,255,255,0.6);margin:0 auto;width:90px;"><div data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Rhubarb, raw</span></div></caption><thead data-dcnode-id="2124"><tr data-dcnode-id="2130"><th class="n-serving" colspan="2" data-dcnode-id="2131"><span data-dcnode-id="2139" instrument_node="">Serving Size : </span><select aria-label="Please select a serving size" data-dcnode-id="2132"><option data-dcnode-id="2137" value="100">100 g</option><option data-dcnode-id="2135" value="122">1 cup, diced (122 g)</option><option data-dcnode-id="2133" value="51">1 stalk (51 g)</option></select></th></tr><tr data-dcnode-id="2125"><th class="n-stat" data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Nutrient</span></th><th class="n-val" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Value</span></th></tr></thead><tbody class="height-transform" data-dcnode-id="1816"><tr data-dcnode-id="2117"><td class="n-stat" data-dcnode-id="2120"><span data-dcnode-id="2123" instrument_node="">Water </span><span class="n-unit" data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">[g]</span></span></td><td class="n-val" data-dcnode-id="2118" data-val-100="93.61"><span data-dcnode-id="2119" instrument_node="">93.61</span></td></tr><tr data-dcnode-id="2111"><td class="n- _node="">, </span><a class="of-internal-link" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/health-benefits-of-vitamin-c-or-ascorbic-acid.html"><span data-dcnode-id="1787" instrument_node="">vitamin C</span></a><span data-dcnode-id="1785" instrument_node="">, </span><a class="of-internal-link" data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/vitamin-k.html"><span data-dcnode-id="1784" instrument_node="">vitamin K</span></a><span data-dcnode-id="1782" instrument_node="">, </span><a class="of-internal-link" data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/vitamin-b-complex.html"><span data-dcnode-id="1781" instrument_node="">B complex</span></a><span data-dcnode-id="1779" instrument_node=""> vitamins, </span><a class="of-internal-link" data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/minerals/calcium.html"><span data-dcnode-id="1778" instrument_node="">calcium</span></a><span data-dcnode-id="1776" instrument_node="">, </span><a class="of-internal-link" data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/minerals/health-benefits-of-potassium.html"><span data-dcnode-id="1775" instrument_node="">potassium</span></a><span data-dcnode-id="1773" instrument_node="">, and </span><a class="of-internal-link" data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/minerals/health-benefits-of-magnesium.html"><span data-dcnode-id="1772" instrument_node="">magnesium</span></a><span data-dcnode-id="1770" instrument_node="">. In terms of organic compounds,&nbsp;the plant also contains beta-carotene&nbsp;(which can be enzymatically converted to </span><a class="of-internal-link" data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/health-benefits-of-vitamin-a-or-retinol.html"><span data-dcnode-id="1769" instrument_node="">vitamin A</span></a><span data-dcnode-id="1767" instrument_node="">), polyphenols (which can act as antioxidants), </span><a class="of-internal-link" data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/lutein.html"><span data-dcnode-id="1766" instrument_node="">lutein</span></a><span data-dcnode-id="1764" instrument_node="">, and zeaxanthin.</span><span class="ref-cite-link" data-dcnode-id="1759"><span data-dcnode-id="1763" instrument_node=""> </span><a data-dcnode-id="1760" data-index="4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/167758/nutrients"><sup data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">[4]</span></sup></a></span><span class="ref-cite-link" data-dcnode-id="1754"><span data-dcnode-id="1758" instrument_node=""> </span><a data-dcnode-id="1755" data-index="5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/167758/nutrients"><sup data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">[5]</span></sup></a></span></p><span data-dcnode-id="1752" instrument_node=""> </span><h2 data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Health Benefits of Rhubarb</span></h2><span data-dcnode-id="1749" instrument_node=""> </span><p data-dcnode-id="1742"><span data-dcnode-id="1748" instrument_node="">Let’s see how&nbsp;the nutrients add up to the long list of health benefits that rhubarb imparts!</span><span class="ref-cite-link" data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node=""> </span><a data-dcnode-id="1744" data-index="6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.google.co.uk/books%3Fhl%3Den%26lr%3D%26id%3D10rtcRtcCYYC%26oi%3Dfnd%26pg%3DPA407"><sup data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">[6]</span></sup></a></span></p><span data-dcnode-id="1741" instrument_node=""> </span><h3 data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">May Aid in Weight Loss</span></h3><span data-dcnode-id="1738" instrument_node=""> </span><p data-dcnode-id="1717"><span data-dcnode-id="1737" instrument_node="">Rhubarb is one of the&nbsp;vegetables with low calories and it is often recommended for people who are struggling to </span><a class="of-internal-link" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/how-to-lose-weight.html"><span data-dcnode-id="1736" instrument_node="">lose weight</span></a><span data-dcnode-id="1734" instrument_node=""> but still want to remain healthy. 100 grams of&nbsp;the plant contains 21 calories, so feel free to load up on it without packing on any pounds. Additionally, the fiber helps you feel full faster which may further reduce total caloric intake and promote weight loss.&nbsp;A </span><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.cnki.com.cn/Article_en/CJFDTOTAL-BHON200104035.htm" rel="external nofollow" target="_blank"><span data-dcnode-id="1733" instrument_node="">study</span></a><span data-dcnode-id="1731" instrument_node=""> published in the </span><em data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Journal of Zhejiang University&nbsp;of Traditional Chinese Medicine</span></em><span data-dcnode-id="1728" instrument_node=""> showed that compounds in rhubarb may help gastric emptying which may promote weight loss.</span><span class="ref-cite-link" data-dcnode-id="1723"><span data-dcnode-id="1727" instrument_node=""> </span><a data-dcnode-id="1724" data-index="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookstore.ksre.ksu.edu/pubs/EP99.pdf"><sup data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">[7]</span></sup></a></span><span class="ref-cite-link" data-dcnode-id="1718"><span data-dcnode-id="1722" instrument_node=""> </span><a data-dcnode-id="1719" data-index="8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.cnki.com.cn/Article_en/CJFDTOTAL-BHON200104035.htm"><sup data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">[8]</span></sup></a></span></p><span data-dcnode-id="1716" instrument_node=""> </span><div class="code-block code-block-12" data-dcnode-id="1709" style="margin: 16px 12px 8px 0; float: left; width: 336px; height: 280px;"><span data-dcnode-id="1715" instrument_node=""> </span><div data-dcnode-id="1714" data-fuse="22453978194"></div><span data-dcnode-id="1713" instrument_node=""> </span><span data-dcnode-id="1710" instrument_node=""> </span></div><span data-dcnode-id="1708" instrument_node=""> </span><h3 data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">May Help Keep Your Heart Healthy</span></h3><span data-dcnode-id="1705" instrument_node=""> </span><p data-dcnode-id="1692"><span data-dcnode-id="1704" instrument_node="">The fiber present in rhubarb stalks can be helpful in lowering </span><a class="of-internal-link" data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/other/cooking-methods-cholesterol.html"><span data-dcnode-id="1703" instrument_node="">cholesterol levels</span></a><span data-dcnode-id="1701" instrument_node="">. In an animal study published in the </span><em data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Nutrition Research</span></em><span data-dcnode-id="1698" instrument_node=""> journal, it was found that rhubarb can help in regulating cholesterol levels even if you eat a moderately cholesterol-enriched diet.</span><span class="ref-cite-link" data-dcnode-id="1693"><span data-dcnode-id="1697" instrument_node=""> </span><a data-dcnode-id="1694" data-index="9" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0271531705805214"><sup data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">[9]</span></sup></a></span></p><span data-dcnode-id="1691" instrument_node=""> </span><h3 data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">May Aid in Digestion</span></h3><span data-dcnode-id="1688" instrument_node=""> </span><p data-dcnode-id="1678"><span data-dcnode-id="1687" instrument_node="">The possibly high amount of dietary fiber found in rhubarb may guarantee a healthy digestive system by bulking up the stool, making sure that bowel movements are smooth and regular. Also, it has traditionally been used as a cure for </span><a class="of-internal-link" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/constipation.html"><span data-dcnode-id="1686" instrument_node="">constipation</span></a><span data-dcnode-id="1684" instrument_node=""> but was only recently discovered why. By easing constipation and other digestive issues, rhubarb may help prevent a wide range of more serious gastrointestinal disorders, which include bloating and cramping.</span><span class="ref-cite-link" data-dcnode-id="1679"><span data-dcnode-id="1683" instrument_node=""> </span><a data-dcnode-id="1680" data-index="10" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/29722333"><sup data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">[10]</span></sup></a></span></p><span data-dcnode-id="1677" instrument_node=""> </span><h3 data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">May Have Anti-Alzheimer’s Effects</span></h3><span data-dcnode-id="1674" instrument_node=""> </span><p data-dcnode-id="1656"><span data-dcnode-id="1673" instrument_node="">According to a study published in the </span><em data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Brain Research Bulletin</span></em><span data-dcnode-id="1670" instrument_node=""> journal, rhubarb glucoside compound rhaponticin protects the body against Alzheimer’s. Furthermore, in vitro results show the positive effect of rhaponticin in preventing the harmful effects of amyloid-beta that are crucial in the formation of senile plaques. Based on this </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.co.uk/books%3Fhl%3Den%26lr%3D%26id%3D10rtcRtcCYYC%26oi%3Dfnd%26pg%3DPA407%23v%3Donepage%26q%3Drhubarb%26f%3Dfalse" rel="external nofollow" target="_blank"><span data-dcnode-id="1669" instrument_node="">study</span></a><span data-dcnode-id="1667" instrument_node="">, it is suggested that rhaponticin could possibly be developed as an agent for the management of Alzheimer’s disease.</span><span class="ref-cite-link" data-dcnode-id="1662"><span data-dcnode-id="1666" instrument_node=""> </span><a data-dcnode-id="1663" data-index="11" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17113925"><sup data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">[11]</span></sup></a></span><span class="ref-cite-link" data-dcnode-id="1657"><span data-dcnode-id="1661" instrument_node=""> </span><a data-dcnode-id="1658" data-index="12" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.co.uk/books%3Fhl%3Den%26lr%3D%26id%3D10rtcRtcCYYC%26oi%3Dfnd%26pg%3DPA407%23v%3Donepage%26q%3Drhubarb%26f%3Dfalse"><sup data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">[12]</span></sup></a></span></p><span data-dcnode-id="1655" instrument_node=""> </span><h3 data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">May Improve Bone Health</span></h3><span data-dcnode-id="1652" instrument_node=""> </span><p data-dcnode-id="1645"><span data-dcnode-id="1651" instrument_node="">Rhubarb is a good source of vitamin K that is associated with promoting osteotropic activity, meaning that it stimulates bone growth and repair. Combined with the potentially rich amount of calcium and other minerals found in rhubarb, the vegetable as a whole is a major player in bone protection.</span><span class="ref-cite-link" data-dcnode-id="1646"><span data-dcnode-id="1650" instrument_node=""> </span><a data-dcnode-id="1647" data-index="13" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aicr.org/resources/blog/health-benefits-of-rhubarb/"><sup data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">[13]</span></sup></a></span></p><span data-dcnode-id="1644" instrument_node=""> </span><div class="code-block code-block-13" data-dcnode-id="1637" style="margin: 16px 12px 8px 0; float: left; width: 336px; height: 280px;"><span data-dcnode-id="1643" instrument_node=""> </span><div data-dcnode-id="1642" data-fuse="22453978191"></div><span data-dcnode-id="1641" instrument_node=""> </span><span data-dcnode-id="1638" instrument_node=""> </span></div><span data-dcnode-id="1636" instrument_node=""> </span><h3 data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">May Improve Blood Circulation</span></h3><span data-dcnode-id="1633" instrument_node=""> </span><p data-dcnode-id="1609"><span data-dcnode-id="1632" instrument_node="">The trace amounts of </span><a class="of-internal-link" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/minerals/health-benefits-of-copper.html"><span data-dcnode-id="1631" instrument_node="">copper</span></a><span data-dcnode-id="1629" instrument_node="">&nbsp;and </span><a class="of-internal-link" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/minerals/health-benefits-of-iron.html"><span data-dcnode-id="1628" instrument_node="">iron</span></a><span data-dcnode-id="1626" instrument_node=""> found in rhubarb are essential for the production of new red blood cells, necessary to maintain the total RBC count in the body.&nbsp;Maintaining adequate healthy red blood cells is essential for oxygenation of the body, thereby ensuring optimum function. Furthermore, according to an animal </span><a data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5745730/" rel="external nofollow" target="_blank"><span data-dcnode-id="1625" instrument_node="">study</span></a><span data-dcnode-id="1623" instrument_node=""> in the </span><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Chinese Medicine </span></em><span data-dcnode-id="1620" instrument_node="">Journal, rhubarb not only promotes blood circulation but also processes the effect of hemostasis.</span><span class="ref-cite-link" data-dcnode-id="1615"><span data-dcnode-id="1619" instrument_node=""> </span><a data-dcnode-id="1616" data-index="14" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.docsdrive.com/pdfs/ansinet/jbs/2004/95-99.pdf"><sup data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">[14]</span></sup></a></span><span class="ref-cite-link" data-dcnode-id="1610"><span data-dcnode-id="1614" instrument_node=""> </span><a data-dcnode-id="1611" data-index="15" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5745730/"><sup data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">[15]</span></sup></a></span></p><span data-dcnode-id="1608" instrument_node=""> </span><div class="wp-caption alignnone" data-dcnode-id="1604" id="attachment_185023" style="width: 710px"><img alt="Health benefits of rhubarb infographic" aria-describedby="caption-attachment-185023" class="size-full wp-image-185023 lazy keep-away" data-dcnode-id="1607" data-src="https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic.jpg" data-srcset="https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic.jpg 700w, https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic-500x375.jpg 500w, https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic-320x240.jpg 320w, https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic-160x120.jpg 160w, https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic-150x113.jpg 150w" height="525" sizes="(max-width: 700px) 100vw, 700px" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20525'%3E%3C/svg%3E" srcset="https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic.jpg 700w, https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic-500x375.jpg 500w, https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic-320x240.jpg 320w, https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic-160x120.jpg 160w, https://www.organicfacts.net/wp-content/uploads/rhubarbinfographic-150x113.jpg 150w" title="Health benefits of rhubarb infographic" width="700"><p class="wp-caption-text" data-dcnode-id="1605" id="caption-attachment-185023"><span data-dcnode-id="1606" instrument_node="">One of the main reasons why people cultivate and eat rhubarb is for its astounding nutritional value.</span></p></div><span data-dcnode-id="1603" instrument_node=""> </span><h3 data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">May Help Manage Diabetes</span></h3><span data-dcnode-id="1600" instrument_node=""> </span><p data-dcnode-id="1565"><span data-dcnode-id="1599" instrument_node="">Rhubarb is low in carbohydrates and can be used in preparations that are </span><a class="of-internal-link" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/diabetes.html"><span data-dcnode-id="1598" instrument_node="">diabetes</span></a><span data-dcnode-id="1596" instrument_node="">-friendly. A 2018 </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6254143/" rel="external nofollow" target="_blank"><span data-dcnode-id="1595" instrument_node="">study </span></a><span data-dcnode-id="1593" instrument_node="">suggests the use of the </span><a class="of-internal-link" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/essential-oils/essential-oil-benefits-uses.html"><span data-dcnode-id="1592" instrument_node="">essential oil</span></a><span data-dcnode-id="1590" instrument_node=""> extract of the rhubarb stem as an additional treatment, owing to its positive effect on </span><a class="of-internal-link" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/other/health-benefits-of-fasting.html"><span data-dcnode-id="1589" instrument_node="">fasting</span></a><span data-dcnode-id="1587" instrument_node=""> blood glucose levels. Another </span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/articles/10.3389/fmicb.2019.01423/full" rel="external nofollow" target="_blank"><span data-dcnode-id="1586" instrument_node="">paper</span></a><span data-dcnode-id="1584" instrument_node=""> published in the </span><em data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Systems Microbiology</span></em><span data-dcnode-id="1581" instrument_node=""> journal suggests that rhubarb extracts can exert a hypoglycemic effect as well as improve gut microbiota.</span><span class="ref-cite-link" data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node=""> </span><a data-dcnode-id="1577" data-index="16" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canr.msu.edu/news/great_spring_time_vegetable_choices_for_people_with_diabetes"><sup data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">[16]</span></sup></a></span><span class="ref-cite-link" data-dcnode-id="1571"><span data-dcnode-id="1575" instrument_node=""> </span><a data-dcnode-id="1572" data-index="17" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6254143/"><sup data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">[17]</span></sup></a></span><span class="ref-cite-link" data-dcnode-id="1566"><span data-dcnode-id="1570" instrument_node=""> </span><a data-dcnode-id="1567" data-index="18" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/articles/10.3389/fmicb.2019.01423/full"><sup data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">[18]</span></sup></a></span></p><span data-dcnode-id="1564" instrument_node=""> </span><h3 data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Other Benefits</span></h3><span data-dcnode-id="1561" instrument_node=""> </span><p data-dcnode-id="1558"><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Might Improve Vision</span></strong></p><span data-dcnode-id="1557" instrument_node=""> </span><p data-dcnode-id="1550"><span data-dcnode-id="1556" instrument_node="">Rhubarb may contain beta-carotene, vitamin C and lutein, which are compounds that are beneficial for vision and protective to the retina.</span><span class="ref-cite-link" data-dcnode-id="1551"><span data-dcnode-id="1555" instrument_node=""> </span><a data-dcnode-id="1552" data-index="19" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canr.msu.edu/news/rhubarb_a_healthy_great_spring_treat"><sup data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">[19]</span></sup></a></span></p><span data-dcnode-id="1549" instrument_node=""> </span><p data-dcnode-id="1546"><strong data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">May Relieve Perimenopause Symptoms</span></strong></p><span data-dcnode-id="1545" instrument_node=""> </span><p data-dcnode-id="1530"><span data-dcnode-id="1544" instrument_node="">This amazing plant can also help with perimenopause symptoms by reducing the occurrences of hot flashes, due to the </span><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//citeseerx.ist.psu.edu/viewdoc/download%3Fdoi%3D10.1.1.951.631%26rep%3Drep1%26type%3Dpdf" rel="external nofollow" target="_blank"><span data-dcnode-id="1543" instrument_node="">presence </span></a><span data-dcnode-id="1541" instrument_node="">of phytoestrogens.</span><span class="ref-cite-link" data-dcnode-id="1536"><span data-dcnode-id="1540" instrument_node=""> </span><a data-dcnode-id="1537" data-index="20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.co.in/books%3Fid%3DbQOLDQAAQBAJ%26pg%3DPT239%26dq%3Drhubarb%2Bheart%2Bnih%26hl%3Den%26sa%3DX%26ved%3D0ahUKEwiX1bSl1uLpAhUm63MBHaczAAQQ6AEIOTAC%23v%3Donepage%26q%3Drhubarb%26f%3Dfalse"><sup data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">[20]</span></sup></a></span><span class="ref-cite-link" data-dcnode-id="1531"><span data-dcnode-id="1535" instrument_node=""> </span><a data-dcnode-id="1532" data-index="21" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//citeseerx.ist.psu.edu/viewdoc/download%3Fdoi%3D10.1.1.951.631%26rep%3Drep1%26type%3Dpdf"><sup data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">[21]</span></sup></a></span></p><span data-dcnode-id="1529" instrument_node=""> </span><p data-dcnode-id="1526"><strong data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">May Improve Skin Care</span></strong></p><span data-dcnode-id="1525" instrument_node=""> </span><p data-dcnode-id="1518"><span data-dcnode-id="1524" instrument_node="">Rhubarb being rich in vitamin A, a potential antioxidant, may help fight off free radicals and delay the signs of aging including wrinkles and fine lines. It also acts as an anti-inflammatory and antibacterial agent that may help prevent skin infections and acne.</span><span class="ref-cite-link" data-dcnode-id="1519"><span data-dcnode-id="1523" instrument_node=""> </span><a data-dcnode-id="1520" data-index="22" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6778887/"><sup data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">[22]</span></sup></a></span></p><span data-dcnode-id="1517" instrument_node=""> </span><h2 data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">How to Store Rhubarb?</span></h2><span data-dcnode-id="1514" instrument_node=""> </span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Before you store your rhubarb, you need to make sure its stalks are crisp and have a reddish tinge to them. Make sure the leaves are attached (not drooping) to ensure that it is still fresh. Once you’ve bought rhubarb, store it as follows.</span></p><span data-dcnode-id="1511" instrument_node=""> </span><div class="code-block code-block-14" data-dcnode-id="1504" style="margin: 16px 12px 8px 0; float: left; width: 336px; height: 280px;"><span data-dcnode-id="1510" instrument_node=""> </span><div data-dcnode-id="1509" data-fuse="22453946245"></div><span data-dcnode-id="1508" instrument_node=""> </span><span data-dcnode-id="1505" instrument_node=""> </span></div><span data-dcnode-id="1503" instrument_node=""> </span><h3 data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Fresh</span></h3><span data-dcnode-id="1500" instrument_node=""> </span><ul data-dcnode-id="1478"><span data-dcnode-id="1499" instrument_node=""> </span><li data-dcnode-id="1495"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Step 1:</span></strong><span data-dcnode-id="1496" instrument_node=""> Cut off the leaves.</span></li><span data-dcnode-id="1494" instrument_node=""> </span><li data-dcnode-id="1490"><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Step 2:</span></strong><span data-dcnode-id="1491" instrument_node=""> Cut off the imperfections.</span></li><span data-dcnode-id="1489" instrument_node=""> </span><li data-dcnode-id="1485"><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Step 3:</span></strong><span data-dcnode-id="1486" instrument_node=""> Wash and dry the plant.</span></li><span data-dcnode-id="1484" instrument_node=""> </span><li data-dcnode-id="1480"><strong data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Step 4:</span></strong><span data-dcnode-id="1481" instrument_node=""> Wrap it in a paper towel or foil and refrigerate it!</span></li><span data-dcnode-id="1479" instrument_node=""> </span></ul><span data-dcnode-id="1477" instrument_node=""> </span><h3 data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">How to Freeze Rhubarb?</span></h3><span data-dcnode-id="1474" instrument_node=""> </span><ul data-dcnode-id="1442"><span data-dcnode-id="1473" instrument_node=""> </span><li data-dcnode-id="1469"><strong data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Step 1:</span></strong><span data-dcnode-id="1470" instrument_node=""> Chop off the leaves.</span></li><span data-dcnode-id="1468" instrument_node=""> </span><li data-dcnode-id="1464"><strong data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Step 2:</span></strong><span data-dcnode-id="1465" instrument_node=""> Get rid of all the imperfections in the plant.</span></li><span data-dcnode-id="1463" instrument_node=""> </span><li data-dcnode-id="1459"><strong data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Step 3:</span></strong><span data-dcnode-id="1460" instrument_node=""> Wash it properly and then dry the plant.</span></li><span data-dcnode-id="1458" instrument_node=""> </span><li data-dcnode-id="1454"><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Step 4:</span></strong><span data-dcnode-id="1455" instrument_node=""> Chop rhubarb into small and even pieces.</span></li><span data-dcnode-id="1453" instrument_node=""> </span><li data-dcnode-id="1449"><strong data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Step 5:</span></strong><span data-dcnode-id="1450" instrument_node=""> Put it in a freezer bag and empty it of all the air.</span></li><span data-dcnode-id="1448" instrument_node=""> </span><li data-dcnode-id="1444"><strong data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Step 6:</span></strong><span data-dcnode-id="1445" instrument_node=""> Put it in the freezer and use it throughout the year.</span></li><span data-dcnode-id="1443" instrument_node=""> </span></ul><span data-dcnode-id="1441" instrument_node=""> </span><p data-dcnode-id="1437"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Note:</span></strong><span data-dcnode-id="1438" instrument_node=""> Make sure to thaw and drain the frozen rhubarb before using it.</span></p><span data-dcnode-id="1436" instrument_node=""> </span><h2 data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Rhubarb Uses</span></h2><span data-dcnode-id="1433" instrument_node=""> </span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Rhubarb first appeared in the United Kingdom approximately 400 years ago and has since become highly prized for its unique flavor and sweet taste around the world. It is used in various dishes and recipes including the following:</span></p><span data-dcnode-id="1430" instrument_node=""> </span><ul data-dcnode-id="1405"><span data-dcnode-id="1429" instrument_node=""> </span><li data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Strawberry rhubarb pie</span></li><span data-dcnode-id="1426" instrument_node=""> </span><li data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Cakes</span></li><span data-dcnode-id="1423" instrument_node=""> </span><li data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Juices</span></li><span data-dcnode-id="1420" instrument_node=""> </span><li data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Rhubarb sauce</span></li><span data-dcnode-id="1417" instrument_node=""> </span><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Jams</span></li><span data-dcnode-id="1414" instrument_node=""> </span><li data-dcnode-id="1410"><a class="of-internal-link" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/fruit-wine.html"><span data-dcnode-id="1413" instrument_node="">Fruit wine</span></a><span data-dcnode-id="1411" instrument_node=""> or Sima</span></li><span data-dcnode-id="1409" instrument_node=""> </span><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Compote</span></li><span data-dcnode-id="1406" instrument_node=""> </span></ul><span data-dcnode-id="1404" instrument_node=""> </span><p data-dcnode-id="1397"><span data-dcnode-id="1403" instrument_node="">Rhubarb is also used for medicinal purposes in traditional Chinese and medieval Arabian and European medicine. Rhubarb has been suggested to exert eliminating heat, purging fire, treat constipation, cooling blood, treat gastrointestinal bleeding, and other diseases. The roots of this plant have been used as a laxative for thousands of years.</span><span class="ref-cite-link" data-dcnode-id="1398"><span data-dcnode-id="1402" instrument_node=""> </span><a data-dcnode-id="1399" data-index="23" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5745730/%23%3A~%3Atext%3DRhubarb%2520has%2520been%2520suggested%2520to%2Cand%2520other%2520diseases%2520%255B3%255D."><sup data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">[23]</span></sup></a></span></p><span data-dcnode-id="1396" instrument_node=""> </span><p data-dcnode-id="1387"><strong data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Word of Caution:&nbsp;</span></strong><span data-dcnode-id="1393" instrument_node="">Avoid use if suffering from a pre-existing kidney condition or certain gastrointestinal conditions (as it is high in potassium), as rhubarb can make them worse. Also, be careful that children or pets do not eat rhubarb leaves. There have been some cases of death due to the toxic levels of oxalic acid contained in the leaves. Rhubarb stalks, however, are healthy and delicious, so enjoy!</span><span class="ref-cite-link" data-dcnode-id="1388"><span data-dcnode-id="1392" instrument_node=""> </span><a data-dcnode-id="1389" data-index="24" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.co.in/books%3Fid%3D4Sw02xggCdcC%26pg%3DPA11%26lpg%3DPA11%26dq%3Dword%2Bof%2Bcaution%2Bfor%2Brhubarb%26source%3Dbl%26ots%3DEISCCGN56S%26sig%3DACfU3U1utjtvHYf8KsDIYOGhePVODI1K4Q%26hl%3Den%26sa%3DX%26ved%3D2ahUKEwjqgIWoh-PpAhXfILcAHW3jDp4Q6AEwDXoECAoQAQ%23v%3Donepage%26q%3Dword%2520of%2520caution%2520for%2520rhubarb%26f%3Dfalse"><sup data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">[24]</span></sup></a></span></p><span data-dcnode-id="1385" instrument_node="">
</span></div><span data-dcnode-id="1383" instrument_node="">
