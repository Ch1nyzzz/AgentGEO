012%252C23%252C29%252C54%252C126%252C96%252C296%252C107%252C327%252C79%252C203%252C201%252C246%252C251%252C214%252C3007%252C3017%252C141%252C175%252C229%252C337%252C228%252C178%252C208%252C237%252C55%252C172%252C307%252C147%26vsSync%3D1%26refUrl%3D%26gdpr%3D0%26gdprconsent%3D0%26gdprstring%3D%26usp_status%3D0%26usp_consent%3D1%26coppa%3D0%23091e9c5e81fee984-1-2"><span data-dcnode-id="1052" instrument_node=""> Health Benefits </span></a></li><li data-dcnode-id="1047"><a data-dcnode-id="1048" data-link="2-5" data-metrics-link="cwnav-art_5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbx.media.net/checksync.php%3Fcid%3D8CU66J63J%26cs%3D1%26cv%3D37%26hb%3D1%26prvid%3D3016%252C2043%252C3%252C226%252C351%252C339%252C97%252C344%252C338%252C3003%252C326%252C77%252C3012%252C23%252C29%252C54%252C126%252C96%252C296%252C107%252C327%252C79%252C203%252C201%252C246%252C251%252C214%252C3007%252C3017%252C141%252C175%252C229%252C337%252C228%252C178%252C208%252C237%252C55%252C172%252C307%252C147%26vsSync%3D1%26refUrl%3D%26gdpr%3D0%26gdprconsent%3D0%26gdprstring%3D%26usp_status%3D0%26usp_consent%3D1%26coppa%3D0%23091e9c5e81fee984-2-5"><span data-dcnode-id="1049" instrument_node=""> Nutrition </span></a></li><li data-dcnode-id="1044"><a data-dcnode-id="1045" data-link="2-7" data-metrics-link="cwnav-art_7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbx.media.net/checksync.php%3Fcid%3D8CU66J63J%26cs%3D1%26cv%3D37%26hb%3D1%26prvid%3D3016%252C2043%252C3%252C226%252C351%252C339%252C97%252C344%252C338%252C3003%252C326%252C77%252C3012%252C23%252C29%252C54%252C126%252C96%252C296%252C107%252C327%252C79%252C203%252C201%252C246%252C251%252C214%252C3007%252C3017%252C141%252C175%252C229%252C337%252C228%252C178%252C208%252C237%252C55%252C172%252C307%252C147%26vsSync%3D1%26refUrl%3D%26gdpr%3D0%26gdprconsent%3D0%26gdprstring%3D%26usp_status%3D0%26usp_consent%3D1%26coppa%3D0%23091e9c5e81fee984-2-7"><span data-dcnode-id="1046" instrument_node=""> How to Eat Rhubarb </span></a></li></ul></aside></div><div class="article__body" data-dcnode-id="786" data-metrics-module="embd-lnk"><div class="article-page active-page" data-dcnode-id="928" data-page="1"><section data-dcnode-id="1029"><p data-dcnode-id="1034"><span data-dcnode-id="1040" instrument_node="">Rhubarb (scientific name </span><em data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Rheum </span></em><em data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">rhabarbarum</span></em><span data-dcnode-id="1035" instrument_node="">) is a vegetable that many people use like a fruit in cooking and recipes. Though native to Asia, it grows in other parts of the world, including the United States. The plant prefers cooler environments as it doesn’t fare well in the heat.&nbsp;</span></p><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">The long red leafstalks grow in the spring, peaking in mid-April. Only the stalks of the plant are edible. The leaves contain toxins and high concentrations of oxalic acid. The stalks themselves are fleshy, sour, and acidic. While you can eat them raw, many people prefer them cooked.&nbsp;</span></p><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Rhubarb has a long history, with roots in ancient Chinese medicine. It was also used in ancient Arab, Greek, and Roman civilizations. Today, it is popular in jams, pies, compotes, and even drinks.&nbsp;</span></p></section><section data-dcnode-id="1015"><h2 data-dcnode-id="1027" id="091e9c5e81fee984-1-2"><span data-dcnode-id="1028" instrument_node="">Health Benefits</span></h2><p data-dcnode-id="1016"><span data-dcnode-id="1026" instrument_node="">Rhubarb is an excellent source of </span><a data-dcnode-id="1024" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/vitamins-and-supplements/supplement-guide-vitamin-k%231"><span data-dcnode-id="1025" instrument_node="">vitamin K</span></a><span data-dcnode-id="1023" instrument_node="">, which is an essential vitamin for bone health and blood clotting. The vitamin A in rhubarb may also help to fight free radicals that cause skin damage and </span><a data-dcnode-id="1021" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/beauty/features/skin-aging-faster-than-you-are%231"><span data-dcnode-id="1022" instrument_node="">premature aging</span></a><span data-dcnode-id="1020" instrument_node="">, keeping your skin looking healthy and youthful. It’s also high in </span><a data-dcnode-id="1018" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/food-recipes/ss/slideshow-all-about-antioxidants"><span data-dcnode-id="1019" instrument_node="">antioxidants</span></a><span data-dcnode-id="1017" instrument_node="">, and many other important vitamins and minerals that provide a variety of health benefits.</span></p></section><section data-dcnode-id="929"><span data-dcnode-id="1014" instrument_node=""> </span><p data-dcnode-id="994"><a data-dcnode-id="1011" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/osteoporosis/features/tests%231"><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Improve </span></strong></a><span data-dcnode-id="1010" instrument_node=""> </span><a data-dcnode-id="1007" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/osteoporosis/features/tests%231"><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">B</span></strong></a><span data-dcnode-id="1006" instrument_node=""> </span><a data-dcnode-id="1003" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/osteoporosis/features/tests%231"><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">one </span></strong></a><span data-dcnode-id="1002" instrument_node=""> </span><a data-dcnode-id="999" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/osteoporosis/features/tests%231"><strong data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">H</span></strong></a><span data-dcnode-id="998" instrument_node=""> </span><a data-dcnode-id="995" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/osteoporosis/features/tests%231"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">ealth</span></strong></a></p><div class="module ad emb-center-well-ad ad-923" data-dcnode-id="993" id="ad-centerwell-pos-923-1"></div><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:90}" data-dcnode-id="988"><span data-dcnode-id="992" instrument_node="">The vitamin K content of rhubarb helps you maintain strong, healthy bones. Vitamin K is important for bone formation and it can help prevent </span><a data-dcnode-id="990" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/osteoporosis/guide/what-is-osteoporosis-osteopenia%231"><span data-dcnode-id="991" instrument_node="">osteoporosis</span></a><span data-dcnode-id="989" instrument_node="">.</span></p><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:30}" data-dcnode-id="968"><a data-dcnode-id="985" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/guide/heart-disease-risk-factors%231"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Protect </span></strong></a><span data-dcnode-id="984" instrument_node=""> </span><a data-dcnode-id="981" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/guide/heart-disease-risk-factors%231"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">H</span></strong></a><span data-dcnode-id="980" instrument_node=""> </span><a data-dcnode-id="977" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/guide/heart-disease-risk-factors%231"><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">eart </span></strong></a><span data-dcnode-id="976" instrument_node=""> </span><a data-dcnode-id="973" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/guide/heart-disease-risk-factors%231"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">H</span></strong></a><span data-dcnode-id="972" instrument_node=""> </span><a data-dcnode-id="969" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/guide/heart-disease-risk-factors%231"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">ealth</span></strong></a></p><p data-dcnode-id="951"><span data-dcnode-id="967" instrument_node="">Rhubarb is an excellent source of fiber, which helps to lower cholesterol. Studies show that rhubarb helps lower your </span><a data-dcnode-id="965" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/ldl-cholesterol-the-bad-cholesterol%231"><span data-dcnode-id="966" instrument_node="">bad cholesterol</span></a><span data-dcnode-id="964" instrument_node=""> levels as well as your total </span><a data-dcnode-id="962" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/cholesterol-management/default.htm"><span data-dcnode-id="963" instrument_node="">cholesterol</span></a><span data-dcnode-id="961" instrument_node="">. Lower cholesterol levels reduce your risk for </span><a data-dcnode-id="959" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/guide/diseases-cardiovascular%231"><span data-dcnode-id="960" instrument_node="">heart disease</span></a><span data-dcnode-id="958" instrument_node=""> and </span><a data-dcnode-id="956" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/guide/heart-disease-heart-attacks%231"><span data-dcnode-id="957" instrument_node="">heart attack</span></a><span data-dcnode-id="955" instrument_node="">. The vitamin K in rhubarb may also aid in preventing the </span><a data-dcnode-id="953" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/video/atherosclerosis"><span data-dcnode-id="954" instrument_node="">calcification of blood vessels</span></a><span data-dcnode-id="952" instrument_node="">. The antioxidants in the vegetable also provide anti-inflammatory effects, which can further help to protect your heart health.&nbsp;</span></p><div class="module ad ad-5000" data-block-codes="_diet_k_cust052_0_cust017_food_" data-dcnode-id="950" data-is-mobile="false" data-pos="5000" data-sizes="[]" data-targets="{&quot;art&quot;:&quot;091e9c5e81fee984&quot;,&quot;cc&quot;:&quot;16&quot;,&quot;env&quot;:&quot;0&quot;,&quot;hcent&quot;:&quot;1115&quot;,&quot;leaf&quot;:&quot;&quot;,&quot;mcent&quot;:&quot;&quot;,&quot;mic&quot;:&quot;&quot;,&quot;pt&quot;:&quot;1637&quot;,&quot;sec&quot;:&quot;&quot;,&quot;pug&quot;:&quot;&quot;,&quot;scent&quot;:&quot;&quot;,&quot;tmg&quot;:&quot;&quot;,&quot;tug&quot;:&quot;&quot;,&quot;uri&quot;:&quot;/diet/health-benefits-rhubarb&quot;,&quot;rd&quot;:&quot;1&quot;,&quot;tex&quot;:&quot;vuejs&quot;}" id="ad-pos-5000-1"></div><p data-dcnode-id="938"><a data-dcnode-id="947" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/digestive-disorders/digestive-system"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Aid </span></strong></a><span data-dcnode-id="946" instrument_node=""> </span><a data-dcnode-id="943" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/digestive-disorders/digestive-system"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">D</span></strong></a><span data-dcnode-id="942" instrument_node=""> </span><a data-dcnode-id="939" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/digestive-disorders/digestive-system"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">igestion</span></strong></a></p><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:150}" data-dcnode-id="930"><span data-dcnode-id="937" instrument_node="">The fiber in rhubarb helps keep things moving through your digestive tract, preventing problems such as </span><a data-dcnode-id="935" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/digestive-disorders/understanding-constipation-basics"><span data-dcnode-id="936" instrument_node="">constipation</span></a><span data-dcnode-id="934" instrument_node="">. It also contains compounds called sennosides, which act as natural laxatives. The tannins in rhubarb also provide </span><a data-dcnode-id="932" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/digestive-disorders/video/drossman-diarrhea-overview"><span data-dcnode-id="933" instrument_node="">anti-diarrheal</span></a><span data-dcnode-id="931" instrument_node=""> effects.</span></p></section></div><div class="article-page active-page" data-dcnode-id="787" data-page="2"><div class="module ad emb-top-ad ad-923" data-dcnode-id="927" id="ad-top-pos-923-2"></div><section data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:385}" data-dcnode-id="899"><span data-dcnode-id="926" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:31}" data-dcnode-id="922"><a data-dcnode-id="923" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/colorectal-cancer/qa/what-are-free-radicals-that-cause-cancer"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Prevent Cancer</span></strong></a></p><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:120}" data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">The antioxidants in rhubarb help fight free radicals in the body, which may help to protect against oxidative stress and cell damage. The free radical-fighting properties of antioxidants may reduce your risk of developing certain types of </span><a data-dcnode-id="919" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/cancer/guide/understanding-cancer-basics"><span data-dcnode-id="920" instrument_node="">cancer</span></a><span data-dcnode-id="918" instrument_node="">.</span></p><p data-dcnode-id="905"><a data-dcnode-id="914" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/arthritis/about-inflammation"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Reduce </span></strong></a><span data-dcnode-id="913" instrument_node=""> </span><a data-dcnode-id="910" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/arthritis/about-inflammation"><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">I</span></strong></a><span data-dcnode-id="909" instrument_node=""> </span><a data-dcnode-id="906" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/arthritis/about-inflammation"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">nflammation</span></strong></a></p><p data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">The antioxidant compounds in rhubarb help to fight inflammation. These properties may be helpful to people with systemic inflammatory reaction syndrome. Another study found that the anti-inflammatory properties of rhubarb extract can help improve </span><a data-dcnode-id="902" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/first-aid/ss/slideshow-wound-care-dos-and-donts"><span data-dcnode-id="903" instrument_node="">wound</span></a><span data-dcnode-id="901" instrument_node=""> healing.</span></p></section><section data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:1048}" data-dcnode-id="835"><h2 data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:28}" data-dcnode-id="897" id="091e9c5e81fee984-2-5"><span data-dcnode-id="898" instrument_node="">Nutrition</span></h2><p data-dcnode-id="886"><span data-dcnode-id="896" instrument_node="">Rhubarb is rich in </span><a data-dcnode-id="894" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/food-recipes/antioxidants-your-immune-system-super-foods-optimal-health"><span data-dcnode-id="895" instrument_node="">antioxidants</span></a><span data-dcnode-id="893" instrument_node="">, particularly </span><a data-dcnode-id="891" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/food-recipes/news/20060511/healthy-antioxidants-how-much-day"><span data-dcnode-id="892" instrument_node="">anthocyanins</span></a><span data-dcnode-id="890" instrument_node=""> (which give it its red color) and proanthocyanidins. These antioxidants have anti-bacterial, anti-inflammatory, and anti-cancer properties, which help protect you from many health-related issues such as heart disease, cancer, and </span><a data-dcnode-id="888" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diabetes/guide/diabetes-basics"><span data-dcnode-id="889" instrument_node="">diabetes</span></a><span data-dcnode-id="887" instrument_node="">.</span></p><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Other nutrients in rhubarb include:</span></p><ul data-dcnode-id="861"><li data-dcnode-id="881"><a data-dcnode-id="882" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/a-to-z-guides/prevention-15/vitamins/video-truth-about-calcium"><span data-dcnode-id="883" instrument_node="">Calcium</span></a></li><li data-dcnode-id="878"><a data-dcnode-id="879" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/vitamins-and-supplements/vitamin-a-directory"><span data-dcnode-id="880" instrument_node="">Vitamin A</span></a></li><li data-dcnode-id="875"><a data-dcnode-id="876" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diet/supplement-guide-vitamin-c%231"><span data-dcnode-id="877" instrument_node="">Vitamin C</span></a></li><li data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Vitamin K</span></li><li data-dcnode-id="870"><a data-dcnode-id="871" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diet/supplement-guide-potassium%231"><span data-dcnode-id="872" instrument_node="">Potassium</span></a></li><li data-dcnode-id="867"><a data-dcnode-id="868" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diet/supplement-guide-folic-acid%231"><span data-dcnode-id="869" instrument_node="">Folate</span></a></li><li data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Manganese&nbsp;</span></li><li data-dcnode-id="862"><a data-dcnode-id="863" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diet/supplement-guide-magnesium%231"><span data-dcnode-id="864" instrument_node="">Magnesium</span></a></li></ul><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:30}" data-dcnode-id="858"><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Nutrients Per Serving</span></strong></p><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:30}" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">A half-cup serving of rhubarb contains:</span></p><div class="module ad emb-center-well-ad ad-923" data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:32}" data-dcnode-id="855" id="ad-centerwell-pos-923-2"></div><ul data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:261}" data-dcnode-id="836"><li data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Calories: 13</span></li><li data-dcnode-id="849"><a data-dcnode-id="851" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/men/features/benefits-protein%231"><span data-dcnode-id="852" instrument_node="">Protein</span></a><span data-dcnode-id="850" instrument_node="">: 1 gram</span></li><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Fat: 0 grams</span></li><li data-dcnode-id="843"><a data-dcnode-id="845" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diet/ss/slideshow-carbohydrates-overview"><span data-dcnode-id="846" instrument_node="">Carbohydrates</span></a><span data-dcnode-id="844" instrument_node="">: 3 grams</span></li><li data-dcnode-id="839"><a data-dcnode-id="841" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diet/compare-dietary-fibers"><span data-dcnode-id="842" instrument_node="">Fiber</span></a><span data-dcnode-id="840" instrument_node="">: 1 gram&nbsp;</span></li><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Sugar: 1 gram</span></li></ul></section><section data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:367}" data-dcnode-id="814"><span data-dcnode-id="834" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:31}" data-dcnode-id="831"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Things to Watch Out For</span></strong></p><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:180}" data-dcnode-id="820"><span data-dcnode-id="830" instrument_node="">Rhubarb is high in </span><a data-dcnode-id="828" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/kidney-stones/kidney-stones-food-causes%231"><span data-dcnode-id="829" instrument_node="">calcium oxalate</span></a><span data-dcnode-id="827" instrument_node="">. While the substance is mainly in the leaves, it’s also found in the stalks. Too much calcium oxalate in your diet may lead to hyperoxaluria, which is the buildup of oxalate crystals in different organs. These crystals may also promote the formation of </span><a data-dcnode-id="825" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/kidney-stones/understanding-kidney-stones-basics%231"><span data-dcnode-id="826" instrument_node="">kidney stones</span></a><span data-dcnode-id="824" instrument_node=""> and increase your risk of </span><a data-dcnode-id="822" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/a-to-z-guides/what-is-acute-kidney-failure%231"><span data-dcnode-id="823" instrument_node="">kidney failure</span></a><span data-dcnode-id="821" instrument_node="">.</span></p><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:120}" data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">Rhubarb’s vitamin K content may also interfere with the </span><a data-dcnode-id="817" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/dvt/dvt-treatment-tips-for-taking-heparin-and-warfarin-safely"><span data-dcnode-id="818" instrument_node="">blood-thinning medication</span></a><span data-dcnode-id="816" instrument_node=""> warfarin. It can reduce the effectiveness of the medication, so be sure to talk with your doctor if you want to incorporate rhubarb into your diet.</span></p></section><section data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:271}" data-dcnode-id="807"><h2 data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:28}" data-dcnode-id="812" id="091e9c5e81fee984-2-7"><span data-dcnode-id="813" instrument_node="">How to Eat Rhubarb</span></h2><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">You may find fresh rhubarb in your grocery store’s produce section when the vegetable is in season, which is typically from April to June.</span></p><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:120}" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">When choosing rhubarb, look for stalks that are firm and crisp. Avoid ones that are limp or have blemishes. Look for ones with small leaves, which indicate a younger plant, but be sure to remove the leaves before cooking or eating.&nbsp;</span></p></section><section data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:556}" data-dcnode-id="788"><span data-dcnode-id="806" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:150}" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Don’t cut the stalks until you’re ready to use the rhubarb, or else the vegetable may dry out. To store them, place whole stalks into a sealed plastic bag in the refrigerator. Use them within one week. If you want to preserve your rhubarb for later use, cut it and store the pieces in the freezer until you’re ready to use them.&nbsp;</span></p><p data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:90}" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">You can eat rhubarb in a number of different ways, including raw, blended into a smoothie, or cooked into a rhubarb jam. Other ways to enjoy the vegetable include:</span></p><ul data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:279}" data-dcnode-id="789"><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Baking it into a pie or crumble</span></li><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Making rhubarb ice cream</span></li><li data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Adding rhubarb to fresh juices or homemade kombucha</span></li><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Blending it into a sauce for meat or poultry</span></li><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Pureeing and dehydrating it to make rhubarb leather</span></li><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Roasting rhubarb with a drizzle of honey and tossing it in a salad</span></li></ul></section></div></div><footer data-dcnode-id="697" style=""><div class="pub-info-and-share-bar" data-_get-element-size="{&quot;w&quot;:628,&quot;h&quot;:44}" data-dcnode-id="704"><div class="article__publication-sources" data-_get-element-size="{&quot;w&quot;:172.71875,&quot;h&quot;:31}" data-dcnode-id="727"><span class="sources sf-sources" data-_get-element-size="{&quot;w&quot;:0,&quot;h&quot;:0}" data-chronicle="091e9c5e813efa76" data-dcnode-id="728" data-e2e="dart-sources"><h4 class="sources__header" data-_get-element-size="{&quot;w&quot;:154.71875,&quot;h&quot;:18}" data-dcnode-id="784"><span data-dcnode-i
