</span><div class="entry-content-asset videofit" data-dcnode-id="2369"><div class="rll-youtube-player" data-dcnode-id="2372" data-id="q9bPuMjy8r8" data-query="feature=oembed" data-src="https://www.youtube.com/embed/q9bPuMjy8r8"><div data-dcnode-id="2373" data-id="q9bPuMjy8r8" data-query="feature=oembed" data-src="https://www.youtube.com/embed/q9bPuMjy8r8"><img alt="" class="entered lazyloaded" data-dcnode-id="2377" data-lazy-src="https://i.ytimg.com/vi/q9bPuMjy8r8/hqdefault.jpg" data-ll-status="loaded" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/q9bPuMjy8r8/hqdefault.jpg&amp;raw" width="480"><noscript data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><button aria-label="play Youtube video" class="play" data-dcnode-id="2374"></button></div></div><noscript data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">&lt;iframe title="When to Harvest Rhubarb &amp;amp; How Much of my Rhubarb should I Pick?" width="720" height="540" src="https://www.youtube.com/embed/q9bPuMjy8r8?feature=oembed" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2368" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2367" instrument_node="">
</span><h2 data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">When to Pick Rhubarb</span></h2><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">PLEASE don’t wait for your rhubarb to turn “all red”. &nbsp;Colour is not an indication of ripeness when it comes to rhubarb – it is just an indication of variety. All three types of rhubarb below are&nbsp;ripe – based on size not color.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2356"><img alt="rhubarb varieties" class="aligncenter size-full wp-image-9867 entered lazyloaded" data-dcnode-id="2360" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C362" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C362" data-lazy-srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w.jpg?strip=all&amp;lossy=1&amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w-300x217.jpg?strip=all&amp;lossy=1&amp;ssl=1 300w" data-ll-status="loaded" height="362" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w.jpg%3Fstrip%3Dall%26lossy%3D1%26resize%3D500%252C362&amp;raw" srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w.jpg?strip=all&amp;lossy=1&amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w-300x217.jpg?strip=all&amp;lossy=1&amp;ssl=1 300w" width="500"><noscript data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">&lt;img class="aligncenter size-full wp-image-9867" src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C362" alt="rhubarb varieties" width="500" height="362" srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w-300x217.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 300w" sizes="(max-width: 500px) 100vw, 500px" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-varieties-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C362" &gt;</span></noscript><span data-dcnode-id="2357" instrument_node=""> Just like you wouldn’t wait for a Granny Smith apple to turn red – don’t wait for your rhubarb to turn red! &nbsp;Instead, rely on the size of the rhubarb stalks.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Stalks should be about 7 inches (20 cm) long or longer when they are ready to harvest.</span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2348"><img alt="basket of rhubarb with leaves" class="aligncenter size-full wp-image-9866 entered lazyloaded" data-dcnode-id="2351" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" data-lazy-srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w-300x200.jpg?strip=all&amp;lossy=1&amp;ssl=1 300w" data-ll-status="loaded" height="334" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w.jpg%3Fstrip%3Dall%26lossy%3D1%26resize%3D500%252C334&amp;raw" srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w-300x200.jpg?strip=all&amp;lossy=1&amp;ssl=1 300w" width="500"><noscript data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">&lt;img class="aligncenter size-full wp-image-9866" src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" alt="basket of rhubarb with leaves" width="500" height="334" srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w-300x200.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 300w" sizes="(max-width: 500px) 100vw, 500px" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/basket-of-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" &gt;</span></noscript></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2347" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Here in the Canadian prairies we can usually start picking rhubarb late May, early June.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><h2 data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">How to Pick Rhubarb</span></h2><span data-dcnode-id="2340" instrument_node="">
</span><figure aria-describedby="caption-attachment-16843" class="wp-caption aligncenter" data-dcnode-id="2334" id="attachment_16843" style="width: 600px"><img alt="pulling rhubarb" class="wp-image-16843 size-full entered lazyloaded" data-dcnode-id="2339" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb.jpg?strip=all&amp;lossy=1&amp;resize=600%2C600&amp;ssl=1" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb.jpg?strip=all&amp;lossy=1&amp;resize=600%2C600&amp;ssl=1" data-lazy-srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb.jpg?strip=all&amp;lossy=1&amp;ssl=1 600w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-300x300.jpg?strip=all&amp;lossy=1&amp;ssl=1 300w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-150x150.jpg?strip=all&amp;lossy=1&amp;ssl=1 150w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-320x320.jpg?strip=all&amp;lossy=1&amp;ssl=1 320w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-500x500.jpg?strip=all&amp;lossy=1&amp;ssl=1 500w" data-ll-status="loaded" height="600" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb.jpg%3Fstrip%3Dall%26lossy%3D1%26resize%3D600%252C600%26ssl%3D1&amp;raw" srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb.jpg?strip=all&amp;lossy=1&amp;ssl=1 600w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-300x300.jpg?strip=all&amp;lossy=1&amp;ssl=1 300w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-150x150.jpg?strip=all&amp;lossy=1&amp;ssl=1 150w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-320x320.jpg?strip=all&amp;lossy=1&amp;ssl=1 320w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-500x500.jpg?strip=all&amp;lossy=1&amp;ssl=1 500w" width="600"><noscript data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">&lt;img class="wp-image-16843 size-full" src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb.jpg?strip=all&amp;lossy=1&amp;resize=600%2C600&amp;ssl=1" alt="pulling rhubarb" width="600" height="600" srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 600w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-300x300.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 300w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-150x150.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 150w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-320x320.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 320w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb-500x500.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 500w" sizes="(max-width: 600px) 100vw, 600px" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/pulling-rhubarb.jpg?strip=all&amp;lossy=1&amp;resize=600%2C600&amp;ssl=1" &gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2335" id="caption-attachment-16843"><span data-dcnode-id="2336" instrument_node="">Slide hand down stalk and gently but firmly twist and pull. Pulling is better than cutting, but if you must, cutting is okay too, it will just take a little longer to recover and may leave the plant vulnerable at the cut – but let’s face it, rhubarb is tough!</span></figcaption></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2333" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Once it’s ready to harvest, here’s what to do:</span></p><span data-dcnode-id="2329" instrument_node="">
</span><ul data-dcnode-id="2291"><span data-dcnode-id="2328" instrument_node="">
</span><li data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Start with the bigger stalks on the outside of the plant and work your way towards the centre. &nbsp;Leave the smaller stalks for another day.</span></li><span data-dcnode-id="2325" instrument_node="">
</span><li data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Slide your hand to the bottom of the stalk and pull. &nbsp;The stalk should come out nice and easy.</span></li><span data-dcnode-id="2322" instrument_node="">
</span><li data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">If you find you’re pulling out roots or you can’t reach all the way, you can also cut the stalks as close to the ground as possible. Technically, pulling is preferred because it allows the plant to recover a little more quickly, but cutting won’t kill the plant, it’ll just take longer to bounce back.</span></li><span data-dcnode-id="2319" instrument_node="">
</span><li data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Leave at least 1/3 of the stalks on the plant in spring time to ensure it&nbsp;continues to grow and thrive throughout the summer.</span></li><span data-dcnode-id="2316" instrument_node="">
</span><li data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Trim the leaves and put them in the compost. The leaves are toxic, so don’t cook or eat them. They are safe to add to your compost bin.</span></li><span data-dcnode-id="2313" instrument_node="">
</span><li data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Harvest whenever more stalks are ripe, always leaving at least 1/3 of the plant.</span></li><span data-dcnode-id="2310" instrument_node="">
</span><li data-dcnode-id="2305"><span data-dcnode-id="2309" instrument_node="">Once the plant starts to flower, the stalks will get a little tougher. &nbsp;To extend the season, </span><a data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/7zvlbePvKhk" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2308" instrument_node="">cut off the flower stalks</span></a><span data-dcnode-id="2306" instrument_node=""> as soon as you see them.</span></li><span data-dcnode-id="2304" instrument_node="">
</span><li data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">In early July, give the plant a chance to gain some strength over the summer. &nbsp;Add a little compost around the roots and let it be. It’s okay to let it flower at this point too.</span></li><span data-dcnode-id="2301" instrument_node="">
</span><li data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Rhubarb doesn’t like the heat and won’t grow much during the summer. In a particularly hot, dry summer, you won’t want to harvest much rhubarb at all.</span></li><span data-dcnode-id="2298" instrument_node="">
</span><li data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">In the fall, as things cool you may get some more stalks to harvest. &nbsp;At this time of year, be sure to leave 2/3 of the stalks on the plant so it can store enough energy to survive the winter. Do not harvest if your plant is young, small or has not filled out after the hot summer months.</span></li><span data-dcnode-id="2295" instrument_node="">
</span><li data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">If you just planted your rhubarb, it is best to wait 2 to 3 years before harvesting any rhubarb. This will ensure the plant gets really well established with a solid root network. The more stalks you cut at this time, the slower the plant will grow and the less hardy it will be in the long run.</span></li><span data-dcnode-id="2292" instrument_node="">
</span></ul><span data-dcnode-id="2290" instrument_node="">
</span><h2 data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Watch How to Harvest Rhubarb</span></h2><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Here’s a quick video showing you how:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2284" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2283" instrument_node="">
</span><div class="entry-content-asset videofit" data-dcnode-id="2274"><div class="rll-youtube-player" data-dcnode-id="2277" data-id="AB03hAea8m8" data-query="feature=oembed" data-src="https://www.youtube.com/embed/AB03hAea8m8"><div data-dcnode-id="2278" data-id="AB03hAea8m8" data-query="feature=oembed" data-src="https://www.youtube.com/embed/AB03hAea8m8"><img alt="" data-dcnode-id="2282" data-lazy-src="https://i.ytimg.com/vi/AB03hAea8m8/hqdefault.jpg" height="360" width="480"><noscript data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><button aria-label="play Youtube video" class="play" data-dcnode-id="2279"></button></div></div><noscript data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">&lt;iframe title="How to Harvest Rhubarb" width="720" height="540" src="https://www.youtube.com/embed/AB03hAea8m8?feature=oembed" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2273" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Concerned that your neighbour’s rhubarb plant is bigger than yours? &nbsp; To get a big luscious rhubarb plant think about moisture, drainage, compost and sun. These are the elements that will make a rhubarb plant thrive.</span></p><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2268" instrument_node="">For more rhubarb information and for my favorite rhubarb recipes check out my</span><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettystewart.com/rhubarb-cookbook/"><span data-dcnode-id="2267" instrument_node=""> Rhubarb eCookbook</span></a><span data-dcnode-id="2265" instrument_node="">.</span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Here’s some pictures of rhubarb plants to help you see the different stages.</span></p><span data-dcnode-id="2260" instrument_node="">

</span><p data-dcnode-id="2247"><span data-dcnode-id="2253" instrument_node="">Growing</span><br data-dcnode-id="2252"><span data-dcnode-id="2251" instrument_node="">
</span><img alt="young rhubarb" class="aligncenter size-full wp-image-9854" data-dcnode-id="2250" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/young-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/young-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" data-lazy-srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/young-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/young-rhubarb-w-300x200.jpg?strip=all&amp;lossy=1&amp;ssl=1 300w" height="334" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20500%20334'%3E%3C/svg%3E" width="500"><noscript data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">&lt;img class="aligncenter size-full wp-image-9854" src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/young-rhubarb-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" alt="young rhubarb" width="500" height="334" srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/young-rhubarb-w.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/young-rhubarb-w-300x200.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 300w" sizes="(max-width: 500px) 100vw, 500px" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpi </span><p data-dcnode-id="2241"><span data-dcnode-id="2245" instrument_node="">Growing. Sure you could grab a few stalks now, but if you wait just a few more days, you’ll get enough for a pie or two!</span><img alt="rhubarb plant growing" class="aligncenter size-full wp-image-9852" data-dcnode-id="2244" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-plant-growing.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-plant-growing.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" data-lazy-srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-plant-growing.jpg?strip=all&amp;lossy=1&amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-plant-growing-300x200.jpg?strip=all&amp;lossy=1&amp;ssl=1 300w" height="334" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20500%20334'%3E%3C/svg%3E" width="500"><noscript data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">&lt;img class="aligncenter size-full wp-image-9852" src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-plant-growing.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" alt="rhubarb plant growing" width="500" height="334" srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-plant-growing.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-plant-growing-300x200.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 300w" sizes="(max-width: 500px) 100vw, 500px" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/rhubarb-plant-growing.jpg?strip=all&amp;lossy=1&amp;resize=500%2C334" &gt;</span></noscript></p><span data-dcnode-id="2240" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2239" instrument_node="">Ready to harvest! It will start to flower soon, best time to harvest is right now.</span><img alt="big rhubarb plant" class="aligncenter size-full wp-image-9851" data-dcnode-id="2238" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/full-size-rhubarb-plant-l.jpg?strip=all&amp;lossy=1&amp;resize=500%2C667" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/full-size-rhubarb-plant-l.jpg?strip=all&amp;lossy=1&amp;resize=500%2C667" data-lazy-srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/full-size-rhubarb-plant-l.jpg?strip=all&amp;lossy=1&amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/full-size-rhubarb-plant-l-225x300.jpg?strip=all&amp;lossy=1&amp;ssl=1 225w" height="667" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20500%20667'%3E%3C/svg%3E" width="500"><noscript data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">&lt;img class="aligncenter size-full wp-image-9851" src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/full-size-rhubarb-plant-l.jpg?strip=all&amp;lossy=1&amp;resize=500%2C667" alt="big rhubarb plant" width="500" height="667" srcset="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/full-size-rhubarb-plant-l.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 500w, https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/full-size-rhubarb-plant-l-225x300.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 225w" sizes="(max-width: 500px) 100vw, 500px" data-jpibfi-post-excerpt="Not sure whether your rhubarb is ready to be picked?  Here are some helpful tips for how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/full-size-rhubarb-plant-l.jpg?strip=all&amp;lossy=1&amp;resize=500%2C667" &gt;</span></noscript></p><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">When harvesting, leave 1/3 of the stalks behind during spring time (2/3 of stalks in fall) so the plant can continue to grow and thrive. You’ll have a few more stalks now and then.</span></p><span data-dcnode-id="2231" instrument_node="">

r how to tell if rhubarb is ripe and how to harvest it." data-jpibfi-post-url="https://www.gettystewart.com/how-and-when-to-harvest-rhubarb/" data-jpibfi-post-title="How and When to Harvest Rhubarb" data-jpibfi-src="https://eqhct8esjgc.exactdn.com/wp-content/uploads/2014/06/leave-one-third-when-picking-w.jpg?strip=all&amp;lossy=1&amp;resize=500%2C375" &gt;</span></noscript></p><span data-dcnode-id="2226" instrument_node="">
</span><div data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Of course, if you have too much rhubarb, don’t like rhubarb or know of anyone who isn’t picking their rhubarb – call a friend, neighbour or a fruit rescuing organization like Fruit Share.&nbsp; They&nbsp;have &nbsp;volunteers eager to pick your rhubarb and&nbsp;share it with local food charities or community organizations.</span></div><span data-dcnode-id="2223" instrument_node="">

</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Why does my rhubarb go to seed as soon as it starts to grow in the spring, I have seen other’s rhubarb only go to seed at the end of the season, where mine start in the beginning of the season &amp; goes all the way thru the season. What can I do?</span></p><span data-dcnode-id="1437" instrument_node="">

</span><img alt="" class="avatar avatar-60 photo" data-dcnode-id="1425" data-lazy-src="https://eqhct8esjgc.exactdn.com/wp-content/gravatars/516815ee491a2f4eeb4ff072eca08438" data-lazy-srcset="https://eqhct8esjgc.exactdn.com/wp-content/gravatars/516815ee491a2f4eeb4ff072eca08438 2x" height="60" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2060%2060'%3E%3C/svg%3E" width="60"><noscript data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">&lt;img alt='' src='https://eqhct8esjgc.exactdn.com/wp-content/gravatars/516815ee491a2f4eeb4ff072eca08438' srcset='https://eqhct8esjgc.exactdn.com/wp-content/gravatars/516815ee491a2f4eeb4ff072eca08438 2x' class='avatar avatar-60 photo' height='60' width='60' /&gt;</span></noscript><span data-dcnode-id="1422" instrument_node=""> </span><b class="fn" data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Getty Stewart</span></b><span data-dcnode-id="1419" instrument_node=""> </span><span class="says" data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">says:</span></span><span data-dcnode-id="1416" instrument_node=""> </span></div><span data-dcnode-id="1413" instrument_node="">
</span><div class="comment-metadata" data-dcnode-id="1407"><span data-dcnode-id="1412" instrument_node="">
</span><a data-dcnode-id="1409" href="#comment-32418"><time data-dcnode-id="1410" datetime="2017-05-12T12:04:29-05:00"><span data-dcnode-id="1411" instrument_node="">May 12, 2017 at 12:04 pm</span></time></a><span data-dcnode-id="1408" instrument_node=""> </span></div><span data-dcnode-id="1405" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1370"><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1400" instrument_node="">Hi Diane,</span><br data-dcnode-id="1399"><span data-dcnode-id="1398" instrument_node="">
Sounds like your rhubarb is very keen on doing its job of reproducing. Even though you’re rhubarb is producing seed stalks, the other stems are still safe to eat. I would cut the seed stalks close to the bottom as soon as you see them. As to why this is happening. There are a few reasons why yours might be going to seed (bolting) so early on.</span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">
1. Mature rhubarb goes to seed more quickly than young rhubarb.</span><br data-dcnode-id="1395"><span data-dcnode-id="1394" instrument_node="">
2. Some varieties bolt more quickly than others eg. Victoria and Red Crimson.</span><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">
3. Too much heat, rhubarb grows best in cool temp.</span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">
4. Stress on the plant that triggers it to put all its energy into seed production (sort of like a survival instinct). Stress on rhubarb plants may be caused by too much or not enough nutrients or water, pests or over-harvesting. </span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1387" instrument_node="">What to do depends on the reason why your rhubarb is bolting.</span><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">
1. Split mature rhubarb to “reset” it.</span><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">
2. Consider a newer, slow bolting variety.</span><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">
3. If it’s too hot for rhubarb, a thick layer of mulch around the base may help to keep roots cool.</span><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">
4. Manage stress by watering and fertilizing, treating any pests and being careful not to harvest too much rhubarb at any one time, especially in the fall when at least 2/3 of the plant should remain in tact. A good layer of compost or mulch in the fall is always a good bet. Ask at a garden center about the best fertilizer for rhubarb – I’ve always relied on garden compost, so not sure what to recommend.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Hope this provides some insight into your predicament. </span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Getty</span></p><span data-dcnode-id="1371" instrument_node="">
