</span><p data-dcnode-id="3645"><img alt="Rhubarb ready for harvest" class="aligncenter size-large wp-image-68524" data-dcnode-id="3647" height="680" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2016/09/23180133/canstockphoto12108009-1024x680.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2016/09/23180133/canstockphoto12108009-1024x680.jpg 1024w, https://cdn.harvesttotable.com/htt/2016/09/23180133/canstockphoto12108009-300x199.jpg 300w, https://cdn.harvesttotable.com/htt/2016/09/23180133/canstockphoto12108009-768x510.jpg 768w, https://cdn.harvesttotable.com/htt/2016/09/23180133/canstockphoto12108009-1536x1020.jpg 1536w, https://cdn.harvesttotable.com/htt/2016/09/23180133/canstockphoto12108009-340x225.jpg 340w, https://cdn.harvesttotable.com/htt/2016/09/23180133/canstockphoto12108009.jpg 1600w" width="1024"><span data-dcnode-id="3646" instrument_node="">Rhubarb is one of the first crops of the year; the plant springs to life when temperatures rise into the 40sF; begin the rhubarb harvest as soon as stalks are ready.</span></p><span data-dcnode-id="3644" instrument_node="">
</span><p data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">Stems harvested in early spring will be the most tender and flavorful. (Rhubarb is naturally tart and is commonly coupled with strawberries.) Do not wait for stalks to get too big around (or too mature)—they can be pithy and tough especially when hit by hot weather or drought. (Pithy stems can be used for stewing, sauces, and jams.)</span></p><div class="adace-slot-wrapper adace-after-paragraph adace-slot-wrapper-main" data-dcnode-id="3627"><span data-dcnode-id="3641" instrument_node="">
</span><div class="adace-disclaimer" data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">
</span></div><span data-dcnode-id="3638" instrument_node="">

</span><span data-dcnode-id="3636" instrument_node=""> </span><div class="adace_ad_6264b571a55f2" data-dcnode-id="3631"><span data-dcnode-id="3635" instrument_node="">
</span><div data-dcnode-id="3634" id="amzn-assoc-ad-9664803d-0536-4d3b-981e-f9e4a5bbfc87"></div><span data-dcnode-id="3632" instrument_node="">
</span></div><span data-dcnode-id="3630" instrument_node="">
</span></div><span data-dcnode-id="3628" instrument_node="">
</span></div><span data-dcnode-id="3626" instrument_node="">
</span><figure aria-describedby="caption-attachment-68522" class="wp-caption aligncenter" data-dcnode-id="3622" id="attachment_68522"><img alt="Rhubarb harvest" class="size-large wp-image-68522" data-dcnode-id="3625" height="1024" loading="lazy" sizes="(max-width: 683px) 100vw, 683px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2016/09/23180136/Rhubarb-Harvest-bigstock-129688532-683x1024.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2016/09/23180136/Rhubarb-Harvest-bigstock-129688532-683x1024.jpg 683w, https://cdn.harvesttotable.com/htt/2016/09/23180136/Rhubarb-Harvest-bigstock-129688532-200x300.jpg 200w, https://cdn.harvesttotable.com/htt/2016/09/23180136/Rhubarb-Harvest-bigstock-129688532-768x1152.jpg 768w, https://cdn.harvesttotable.com/htt/2016/09/23180136/Rhubarb-Harvest-bigstock-129688532-1024x1536.jpg 1024w, https://cdn.harvesttotable.com/htt/2016/09/23180136/Rhubarb-Harvest-bigstock-129688532-1365x2048.jpg 1365w, https://cdn.harvesttotable.com/htt/2016/09/23180136/Rhubarb-Harvest-bigstock-129688532-scaled.jpg 1707w" width="683"><figcaption class="wp-caption-text" data-dcnode-id="3623" id="caption-attachment-68522"><span data-dcnode-id="3624" instrument_node="">Harvest rhubarb by grasping the stalk firmly near the base then pull and twist gently.</span></figcaption></figure><span data-dcnode-id="3621" instrument_node="">
</span><h2 data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">When to Harvest Rhubarb</span></h2><span data-dcnode-id="3618" instrument_node="">
</span><ul data-dcnode-id="3604"><span data-dcnode-id="3617" instrument_node="">
</span><li data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Harvest rhubarb stalks when they are about as thick as your finger and at least 8 inches (20 cm) long.</span></li><span data-dcnode-id="3614" instrument_node="">
</span><li data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">Stalks 12 to 18 inches (30-45 cm) long and longer will be most tasty. Mature stalk length varies by variety.</span></li><span data-dcnode-id="3611" instrument_node="">
</span><li data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">Color also varieties by variety: cultivars such as ‘Victoria’ and ‘Linneaus’ have green stalks that blush a little red near the base; cultivars such as ‘Ruby’, ‘Valentine’, and ‘Canada Red’ have solid red stalks.</span></li><span data-dcnode-id="3608" instrument_node="">
</span><li data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">Rhubarb is a perennial plant. A rhubarb clump will be productive for 20 years or more. Do not harvest rhubarb the first year after planting from seed. The second-year harvest a few stalks over a four week period. The third-year after planting and the following years, harvest as many finger-thick-sized stalks at you like over eight to 10 weeks.</span></li><span data-dcnode-id="3605" instrument_node="">
</span></ul><span data-dcnode-id="3603" instrument_node="">
</span><h2 data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">How to Harvest Rhubarb</span></h2><span data-dcnode-id="3600" instrument_node="">
</span><ul data-dcnode-id="3586"><span data-dcnode-id="3599" instrument_node="">
</span><li data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">Harvest rhubarb by grasping the stalk firmly near the base then pull and twist gently. You can also cut stalks away with a sharp knife; cut as close to the crown as you can. Leave behind new, short, and thin stalks. Be careful not to injure the central bud which will produce more stalks, and do not cut more than one-third of the stalks away from the plant each year.</span></li><span data-dcnode-id="3596" instrument_node="">
</span><li data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">Immediately upon harvesting, trim the leaves from the stalks using a knife and discard the leaves; leaving leaves attached to the stalk will cause the stalks to dry and wilt.</span></li><span data-dcnode-id="3593" instrument_node="">
</span><li data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Rhubarb harvest usually lasts about eight weeks and each plant will yield two to three pounds of stalks. After harvest allow plants to grow new stalks and store energy reserves for the next year. A few stalks can be pulled later in summer but not frequently; it’s best to let the plant gain strength for the following season.</span></li><span data-dcnode-id="3590" instrument_node="">
</span><li data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">If plants send up flower stalks remove them right away. Flowering uses energy that could be used for rejuvenating the plant. Plants that flower will be less productive.</span></li><span data-dcnode-id="3587" instrument_node="">
</span></ul><span data-dcnode-id="3585" instrument_node="">
</span><figure aria-describedby="caption-attachment-68523" class="wp-caption aligncenter" data-dcnode-id="3581" id="attachment_68523"><img alt="" class="size-large wp-image-68523" data-dcnode-id="3584" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2016/09/23180134/Rhubarb-Harvest-bigstock-Red-Rhubarb-Stalks-With-Large-243173857-1024x683.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2016/09/23180134/Rhubarb-Harvest-bigstock-Red-Rhubarb-Stalks-With-Large-243173857-1024x683.jpg 1024w, https://cdn.harvesttotable.com/htt/2016/09/23180134/Rhubarb-Harvest-bigstock-Red-Rhubarb-Stalks-With-Large-243173857-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2016/09/23180134/Rhubarb-Harvest-bigstock-Red-Rhubarb-Stalks-With-Large-243173857-768x512.jpg 768w, https://cdn.harvesttotable.com/htt/2016/09/23180134/Rhubarb-Harvest-bigstock-Red-Rhubarb-Stalks-With-Large-243173857-1536x1024.jpg 1536w, https://cdn.harvesttotable.com/htt/2016/09/23180134/Rhubarb-Harvest-bigstock-Red-Rhubarb-Stalks-With-Large-243173857-2048x1365.jpg 2048w" width="1024"><figcaption class="wp-caption-text" data-dcnode-id="3582" id="caption-attachment-68523"><span data-dcnode-id="3583" instrument_node="">Cutaway the leafy top of rhubarb leaving only the colored stalks.</span></figcaption></figure><span data-dcnode-id="3580" instrument_node="">
</span><h2 data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">How to Store Rhubarb</span></h2><span data-dcnode-id="3577" instrument_node="">
</span><ul data-dcnode-id="3560"><span data-dcnode-id="3576" instrument_node="">
</span><li data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">Once in the kitchen cut away the leafy top leaving only the colored stalks. Do not eat raw or cook rhubarb leaves or roots they contain oxalic acid which can cause convulsions, coma, and death. Leaves are safe to compost.</span></li><span data-dcnode-id="3573" instrument_node="">
</span><li data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Fresh harvested stalks are best for cooking and freezing.</span></li><span data-dcnode-id="3570" instrument_node="">
</span><li data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">Store rhubarb in a cold and moist place, 32°-40°F (0°-4°C) and 95 percent relative humidity. Cold and moist storage can be a challenge. Refrigerators provide the cold, but they also dry the air. Wrap rhubarb stalks in a damp cloth or paper towel and put them in a perforated plastic bag in the vegetable crisper drawer of the refrigerator; this will maintain humidity.</span></li><span data-dcnode-id="3567" instrument_node="">
</span><li data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Cut stems will keep in the refrigerator for two to four weeks. Refresh stalks kept in the refrigerator by letting them stand in a glass of water before using it.</span></li><span data-dcnode-id="3564" instrument_node="">
</span><li data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">Chopped stems can be frozen in a plastic freezer bag for later use—often with strawberries that come to harvest after rhubarb.</span></li><span data-dcnode-id="3561" instrument_node="">
</span></ul><span data-dcnode-id="3559" instrument_node="">
</span><p data-dcnode-id="3552"><span data-dcnode-id="3558" instrument_node="">More tips: </span><a data-dcnode-id="3554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvesttotable.com/how_to_grow_rhubarb/"><span data-dcnode-id="3555" style="color: #ff0000;"><strong data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">How to Grow Rhubarb</span></strong></span></a><span data-dcnode-id="3553" instrument_node="">.</span></p><span data-dcnode-id="3551" instrument_node="">
