</span><header aria-label="Content" class="entry-header" data-dcnode-id="2195"><span data-dcnode-id="2225" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2223" itemprop="headline"><span data-dcnode-id="2224" instrument_node="">How to Harvest Rhubarb (NEVER Cut It!)</span></h1><span data-dcnode-id="2222" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2197"><span data-dcnode-id="2221" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2218"><time class="entry-date published" data-dcnode-id="2219" datetime="2021-03-26T05:30:00-07:00" itemprop="datePublished"><span data-dcnode-id="2220" instrument_node="">March 26</span></time></span><span data-dcnode-id="2217" instrument_node=""> </span><span class="tags-links" data-dcnode-id="2199"><span class="gp-icon icon-tags" data-dcnode-id="2213"><svg aria-hidden="true" data-dcnode-id="2214" height="1em" viewBox="0 0 512 512" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M20 39.5c-8.836 0-16 7.163-16 16v176c0 4.243 1.686 8.313 4.687 11.314l224 224c6.248 6.248 16.378 6.248 22.626 0l176-176c6.244-6.244 6.25-16.364.013-22.615l-223.5-224A15.999 15.999 0 00196.5 39.5H20zm56 96c0-13.255 10.745-24 24-24s24 10.745 24 24-10.745 24-24 24-24-10.745-24-24z" data-dcnode-id="2216"></path><path d="M259.515 43.015c4.686-4.687 12.284-4.687 16.97 0l228 228c4.686 4.686 4.686 12.284 0 16.97l-180 180c-4.686 4.687-12.284 4.687-16.97 0-4.686-4.686-4.686-12.284 0-16.97L479.029 279.5 259.515 59.985c-4.686-4.686-4.686-12.284 0-16.97z" data-dcnode-id="2215"></path></svg></span><span class="screen-reader-text" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Tags </span></span><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/tag/edible-gardening/" rel="tag"><span data-dcnode-id="2210" instrument_node="">edible gardening</span></a><span data-dcnode-id="2208" instrument_node="">, </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/tag/harvest-2/" rel="tag"><span data-dcnode-id="2207" instrument_node="">harvest</span></a><span data-dcnode-id="2205" instrument_node="">, </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/tag/rhubarb/" rel="tag"><span data-dcnode-id="2204" instrument_node="">rhubarb</span></a><span data-dcnode-id="2202" instrument_node="">, </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/tag/vegetable-gardening/" rel="tag"><span data-dcnode-id="2201" instrument_node="">vegetable gardening</span></a></span><span data-dcnode-id="2198" instrument_node=""> </span></div><span data-dcnode-id="2196" instrument_node="">
</span></header><span data-dcnode-id="2194" instrument_node="">
</span><div class="entry-content jpibfi_container" data-dcnode-id="1981" itemprop="text"><span data-dcnode-id="2193" instrument_node="">
</span><input class="jpibfi" data-dcnode-id="2192" type="hidden"><p data-dcnode-id="2189"><em data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">There’s nothing like the anticipation of waiting to harvest rhubarb! This tart vegetable is simple to grow, and when harvested properly, will return year after year. Incorrectly harvesting rhubarb can damage your plant and leave you with less-than-desirable pieces. Here’s what you need to know about how to harvest rhubarb.&nbsp;</span></em></p><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2184"><img alt="How to Harvest Rhubarb" class="aligncenter wp-image-39135 size-full entered lazyloaded" data-dcnode-id="2187" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1.jpg" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1.jpg" data-lazy-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-180x360.jpg 180w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-512x1024.jpg 512w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-400x800.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-600x1200.jpg 600w" data-ll-status="loaded" height="1400" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1.jpg&amp;raw" srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-180x360.jpg 180w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-512x1024.jpg 512w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-400x800.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-600x1200.jpg 600w" width="700"><noscript data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">&lt;img class="aligncenter wp-image-39135 size-full" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="How to Harvest Rhubarb" width="700" height="1400" sizes="(max-width: 700px) 100vw, 700px" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1.jpg" data-loading="lazy" data-src="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1.jpg" data-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-180x360.jpg 180w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-512x1024.jpg 512w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-400x800.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-1-600x1200.jpg 600w" &gt;</span></noscript></p><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2182" instrument_node="">When the </span><a data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/growing-strawberries-in-containers/" rel="noopener"><span data-dcnode-id="2181" instrument_node="">strawberries</span></a><span data-dcnode-id="2179" instrument_node=""> and rhubarb are in the markets at the same time, it signals the change from spring to summer and it’s time for a final rhubarb harvest. Ensure your plant will continue to be fruitful and learn how to harvest rhubarb the right way.</span></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Unlike most vegetables, there is a special technique for harvesting rhubarb. Or a special twist, if you will! Harvesting rhubarb the right way ensures your plant stays healthy and continues producing for next year’s harvest.</span></p><div class="adthrive" data-dcnode-id="2173" id="cls-video-container-bzIPUpvO" style="min-height: 385.312px;"><div data-dcnode-id="2174"></div></div><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2171" instrument_node="">If this is your first time growing rhubarb, be sure to check out my </span><a data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/rhubarb-plant/"><span data-dcnode-id="2170" instrument_node="">full guide on how to grow your own rhubarb plant</span></a><span data-dcnode-id="2168" instrument_node="">. It is full of care instructions and need-to-know info for rhubarb gardeners.</span></p><span data-dcnode-id="2166" instrument_node="">
</span><h2 data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">When to Harvest Rhubarb</span></h2><span data-dcnode-id="2163" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2162" instrument_node="">Let a new plant grow for two years before harvesting any stalks and only&nbsp;take&nbsp;1/3 of the plant on year three. After that, you can harvest rhubarb&nbsp;heavily, leaving the smaller stalks behind after a&nbsp;solid&nbsp;6-8 weeks of pulling off&nbsp;stems for yummy&nbsp;pies, compote, and </span><a data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/rhubarb-sorbet-recipe/"><span data-dcnode-id="2161" instrument_node="">sorbet</span></a><span data-dcnode-id="2159" instrument_node="">!</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2157" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Your rhubarb is ready for harvest when the stalks are anywhere from 7 to 15 inches long and once the leaves have fully opened. Don’t look at the stem colour for an indication of ripeness as they can be varying levels of red or even green depending on the variety.</span></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Harvest from May to June, but then it is a good idea to let your rhubarb rest. After a good harvest, your rhubarb needs some time to recharge! However, if you see a flower stalk, feel free to cut that away.</span></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2146"><img alt="harvested rhubarb and leeks" class="aligncenter wp-image-39120 size-full entered lazyloaded" data-dcnode-id="2149" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market.jpg" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market.jpg" data-lazy-srcset="https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-360x360.jpg 360w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-150x150.jpg 150w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-400x400.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-500x500.jpg 500w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-300x300.jpg 300w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-600x600.jpg 600w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-100x100.jpg 100w" data-ll-status="loaded" height="700" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market.jpg&amp;raw" srcset="https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-360x360.jpg 360w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-150x150.jpg 150w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-400x400.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-500x500.jpg 500w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-300x300.jpg 300w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-600x600.jpg 600w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-100x100.jpg 100w" width="700"><noscript data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">&lt;img class="aligncenter wp-image-39120 size-full" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="harvested rhubarb and leeks" width="700" height="700" sizes="(max-width: 700px) 100vw, 700px" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market.jpg" data-loading="lazy" data-src="https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market.jpg" data-srcset="https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-360x360.jpg 360w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-150x150.jpg 150w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-400x400.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-500x500.jpg 500w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-300x300.jpg 300w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-600x600.jpg 600w, https://gardentherapy.ca/wp-content/uploads/2021/03/Spotted-Rhubarb-and-Leeks-at-the-Farmers-Market-100x100.jpg 100w" &gt;</span></noscript></p><span data-dcnode-id="2145" instrument_node="">
</span><h3 data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Does Picking Rhubarb Encourage Growth?</span></h3><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">When properly harvested, rhubarb is likely to live and give you plenty of good stalks for 10 or more years. After your rhubarb plant has established itself, you will want to harvest rhubarb every year to prevent overcrowding.</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">However, once the stalks become thin, stop harvesting. This means your rhubarb is tired and needs time to recoup!</span></p><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Always leave a minimum of 2 stalks after harvest and be sure to remove the complete stalk. This will encourage the plant to produce more stalks for the next season.</span></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2129"><img alt="rhubarb plant with big green leaves" class="aligncenter wp-image-39125 size-full entered lazyloaded" data-dcnode-id="2132" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant.jpg" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant.jpg" data-lazy-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant-255x360.jpg 255w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant-600x847.jpg 600w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant-400x565.jpg 400w" data-ll-status="loaded" height="988" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant.jpg&amp;raw" srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant-255x360.jpg 255w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant-600x847.jpg 600w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant-400x565.jpg 400w" title="Rhubarb Plant in the garden (garden therapy)" width="700"><noscript data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">&lt;img class="aligncenter wp-image-39125 size-full" title="Rhubarb Plant in the garden (garden therapy)" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="rhubarb plant with big green leaves" width="700" height="988" sizes="(max-width: 700px) 100vw, 700px" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant.jpg" data-loading="lazy" data-src="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant.jpg" data-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant-255x360.jpg 255w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant-600x847.jpg 600w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-plant-400x565.jpg 400w" &gt;</span></noscript></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2128" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2127" instrument_node="">
</span><h2 data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">How to Harvest Rhubarb</span></h2><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Rhubarb is a showy plant that holds its own in the front flower beds even if the&nbsp;critters&nbsp;have a snack here or there. Don’t worry if the leaves get a bit chewed as they get composted regardless.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">To harvest, find a stalk that is ready to go. Solidly grasp the stem near the base of the plant, twist to the side, and pull to remove. The stalk should pop right off and come away from the root cleanly.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2114" style="text-align: center;"><img alt="red rhubarb stalks for harvest" class="aligncenter wp-image-39126 size-full entered lazyloaded" data-dcnode-id="2117" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest.jpg" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest.jpg" data-lazy-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest-540x360.jpg 540w, https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest-400x267.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest-600x400.jpg 600w" data-ll-status="loaded" height="467" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest.jpg&amp;raw" srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest-540x360.jpg 540w, https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest-400x267.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/red-rhubarb-stalks-for-harvest-600x400.jpg 600w" title="How to Harvest Rhubarb (garden therapy)" width="700"><noscript data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">&lt;img class="aligncenter wp-image-39126 size-full" title="How to Harvest Rhubarb (garden therapy)" src="data:im </span><p data-dcnode-id="2109"><img alt="rhubarb garden closeup" class="aligncenter size-full wp-image-39127 entered lazyloaded" data-dcnode-id="2112" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup.jpg" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup.jpg" data-lazy-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup-540x360.jpg 540w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup-400x267.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup-600x400.jpg 600w" data-ll-status="loaded" height="467" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup.jpg&amp;raw" srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup-540x360.jpg 540w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup-400x267.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup-600x400.jpg 600w" width="700"><noscript data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">&lt;img class="aligncenter size-full wp-image-39127" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="rhubarb garden closeup" width="700" height="467" sizes="(max-width: 700px) 100vw, 700px" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup.jpg" data-loading="lazy" data-src="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup.jpg" data-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup-540x360.jpg 540w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup-400x267.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/rhubarb-garden-closeup-600x400.jpg 600w" &gt;</span></noscript></p><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2106" style="text-align: left;"><span data-dcnode-id="2107" instrument_node="">If it doesn’t come off easily, try twisting the stalk to the other side or grasp lower. If the entire plant begins to come up, pack down the surrounding soil and gently try twisting the stalk off again.</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2103" style="text-align: left;"><span data-dcnode-id="2104" instrument_node="">Trim the leaves in a fan pattern for storing in the fridge or trim the tops completely if you plan to use the rhubarb right away.</span></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2098" style="text-align: left;"><strong data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Be sure not to eat any part of the rhubarb leaves as they are toxic and will make you sick.</span></strong><span data-dcnode-id="2099" instrument_node=""> The thick red stems is what we are going for.</span></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2095" style="text-align: left;"><span data-dcnode-id="2096" instrument_node="">Come fall, be sure to remove all the plant debris and cover the rhubarb area in a thick layer of compost. This will revitalize the soil and give the plant a ton of nutrients for the next season.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2090" style="text-align: center;"><img alt="growing rhubarb and harvested rhubarb stalks" class="aligncenter wp-image-39124 size-full" data-dcnode-id="2093" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time.jpg" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time.jpg" data-lazy-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time-540x360.jpg 540w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time-400x267.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time-600x400.jpg 600w" height="467" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20467'%3E%3C/svg%3E" title="How to Harvest Rhubarb one-third of the plant at a time (garden therapy)" width="700"><noscript data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">&lt;img class="aligncenter wp-image-39124 size-full" title="How to Harvest Rhubarb one-third of the plant at a time (garden therapy)" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="growing rhubarb and harvested rhubarb stalks" width="700" height="467" sizes="(max-width: 700px) 100vw, 700px" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time.jpg" data-loading="lazy" data-src="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time.jpg" data-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time-540x360.jpg 540w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time-400x267.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/How-to-Harvest-Rhubarb-one-third-of-the-plant-at-a-time-600x400.jpg 600w" &gt;</span></noscript></p><span data-dcnode-id="2089" instrument_node="">
</span><h3 data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Should You Cut or Pull Rhubarb?</span></h3><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">You may have been wondering, why not just cut the rhubarb instead? I’m here to tell you, no! Put away those clippers and do. not. cut. the. rhubarb.</span></p><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Cutting a rhubarb leaves part of the stalk behind. This leftover stalk can then rot and infect the root of the rhubarb plant.</span></p><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">When you pull and twist rhubarb off, it comes off straight from the root. Now the plant will know a whole stalk is gone and set to work replacing it. You will have a higher-yielding harvest as a result!</span></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2073" style="text-align: center;"><img alt="freshly harvested rhubarb in a wire basket" class="aligncenter wp-image-39122 size-full" data-dcnode-id="2076" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed.jpg" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed.jpg" data-lazy-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed-540x360.jpg 540w, https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed-400x267.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed-600x400.jpg 600w" height="467" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20467'%3E%3C/svg%3E" title="Rhubarb freshly harvested from the garden and trimmed (garden therapy)" width="700"><noscript data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">&lt;img class="aligncenter wp-image-39122 size-full" title="Rhubarb freshly harvested from the garden and trimmed (garden therapy)" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="freshly harvested rhubarb in a wire basket" width="700" height="467" sizes="(max-width: 700px) 100vw, 700px" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed.jpg" data-loading="lazy" data-src="https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed.jpg" data-srcset="https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed.jpg 700w, https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed-540x360.jpg 540w, https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed-400x267.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2017/05/Rhubarb-freshly-harvested-from-the-garden-and-trimmed-600x400.jpg 600w" &gt;</span></noscript></p><span data-dcnode-id="2072" instrument_node="">
</span><h3 data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Does Rhubarb Regrow After Cutting?</span></h3><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">A perennial vegetable, rhubarb will come back every year. To ensure your rhubarb comes back next spring with a bountiful harvest, finish harvesting by the end of June. This will give your rhubarb plant enough time to store energy for the next season.</span></p><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">During the summer, the remaining leaves are taking in energy from the sun and bringing it down to the roots to get ready for next spring.</span></p><span data-dcnode-id="2063" instrument_node="">
</span><h3 data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Enjoy Your Rhubarb!</span></h3><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Rhubarb freezes well, so if you have some stalks that can still be harvested but no use for them, chop them up and save them for the future in the freezer.</span></p><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2056" instrument_node="">Whether stalks are red or green doesn’t affect the flavor, but the red stalks are generally&nbsp;preferred&nbsp;to make the beautiful pink color often associated with rhubarb desserts like rhubarb lemonade or this </span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardentherapy.ca/rhubarb-sorbet-recipe/"><span data-dcnode-id="2055" instrument_node="">rhubarb sorbet recipe</span></a><span data-dcnode-id="2053" instrument_node="">.</span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2047"><img alt="Rhubarb sorbet" class="aligncenter wp-image-17278" data-dcnode-id="2050" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream.jpg" data-lazy-sizes="(max-width: 553px) 100vw, 553px" data-lazy-src="https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream.jpg" data-lazy-srcset="https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream.jpg 765w, https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream-300x300.jpg 300w, https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream-100x100.jpg 100w, https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream-600x602.jpg 600w, https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream-400x402.jpg 400w, https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream-150x150.jpg 150w, https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream-359x360.jpg 359w" height="555" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20553%20555'%3E%3C/svg%3E" width="553"><noscript data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">&lt;img class="aligncenter wp-image-17278" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="Rhubarb sorbet" width="553" height="555" sizes="(max-width: 553px) 100vw, 553px" data-jpibfi-post-excerpt="Harvest your rhubarb the right way to ensure your plant will continue to be fruitful.  " data-jpibfi-post-url="https://gardentherapy.ca/harvest-rhubarb/" data-jpibfi-post-title="How to Harvest Rhubarb (NEVER Cut It!)" data-jpibfi-src="https://gardentherapy.ca/wp-content/uploads/2012/05/Rhubarb-ice-cream.jpg" data-loading=
