</span><h2 class="c-intro__subtitle" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">5 Steps to Rhubarb Success</span></h2><span data-dcnode-id="800" instrument_node="">
</span><ul data-dcnode-id="783"><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Choose a spot in full sun.</span></li><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Prepare your soil with organic matter like compost and sheep pellets.</span></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Add a layer of vegetable mix to plant into. Autumn through to the end of spring is generally a good time to plant rhubarb in New Zealand.</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Feed with a general fertiliser during the key growth periods of spring and autumn.</span></li><span data-dcnode-id="787" instrument_node="">
</span><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Keep plants well watered, particularly through dry periods.</span></li><span data-dcnode-id="784" instrument_node="">
</span></ul><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Follow our full guide below to a bumper crop of rhubarb.</span></p><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="777" instrument_node="">
</span></div><span data-dcnode-id="775" instrument_node="">
</span></div><span data-dcnode-id="773" instrument_node=""> </span></div><span data-dcnode-id="771" instrument_node="">

</span><div class="row clearfix" data-dcnode-id="218"><span data-dcnode-id="764" instrument_node="">
</span><div class="col-md-8 column" data-dcnode-id="594"><span data-dcnode-id="763" instrument_node="">
</span><div data-dcnode-id="596"><span data-dcnode-id="762" instrument_node="">
</span><div class="c-inspiration-page__shopping-list-lg" data-dcnode-id="598"><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="758"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Rhubarb is one of the hardier crops, tolerant of cold, frost and wind. It's a staple crop you can plant, fertilise, water and walk away from once it’s established. Aesthetically, it adds colour and texture to the garden.&nbsp;</span></strong></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Rhubarb is sometimes considered a fruit, because it is generally eaten with sweet dishes. Technically, however, it’s a vegetable, and hence it appears in vegetable patches and plots around the country.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">When planting rhubarb remember that rhubarb leaves are poisonous and that only the stem can be cooked and used.</span></p><span data-dcnode-id="751" instrument_node="">
</span><h3 data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Choose a variety - top picks</span></h3><span data-dcnode-id="748" instrument_node="">
</span><ul data-dcnode-id="726"><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="743"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Glaskin’s Perpetual:</span></strong><span data-dcnode-id="744" instrument_node=""> an early variety with slim, bright red stems that is quick to establish from seed.</span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="738"><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Victoria:</span></strong><span data-dcnode-id="739" instrument_node=""> the most popular variety of rhubarb, it has a chunky, more compact habit with upright red and green stems.</span></li><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="733"><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Ruby Tart:</span></strong><span data-dcnode-id="734" instrument_node=""> strong growing with ruby red stems and a superior taste.</span></li><span data-dcnode-id="732" instrument_node="">
</span><li data-dcnode-id="728"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Winter Harvest:</span></strong><span data-dcnode-id="729" instrument_node=""> produces juicy, sweet, bright red stalks.</span></li><span data-dcnode-id="727" instrument_node="">
</span></ul><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">There are red and green varieties of rhubarb available, green stems are normal for green varieties.</span></p><span data-dcnode-id="722" instrument_node="">
</span><h3 data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Plant</span></h3><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Rhubarb enjoys fertile, well-drained soil in full sun and dislikes having wet feet. It doesn’t like sandy soils unless plenty of organic matter has been dug in.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="715" instrument_node="">Prepare the soil by digging in </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-super-sheep-pellets"><span data-dcnode-id="714" instrument_node="">Tui Super Sheep Pellets</span></a><span data-dcnode-id="712" instrument_node=""> and </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-compost"><span data-dcnode-id="711" instrument_node="">Tui Compost</span></a><span data-dcnode-id="709" instrument_node=""> before planting rhubarb. Then you can add a layer of </span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-vegetable-mix"><span data-dcnode-id="708" instrument_node="">Tui Vegetable Mix</span></a><span data-dcnode-id="706" instrument_node="">.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">Rhubarb is also happy growing in large pots and containers, making it an ideal portable crop. Fill pots and containers with </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-vegetable-mix"><span data-dcnode-id="702" instrument_node="">Tui Vegetable Mix</span></a><span data-dcnode-id="700" instrument_node="">.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="695"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Directions for planting in garden beds</span></strong></p><span data-dcnode-id="694" instrument_node="">
</span><ul data-dcnode-id="662"><span data-dcnode-id="693" instrument_node="">
</span><li data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">Soak seedlings in a bucket of </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-organic-seaweed-plant-tonic"><span data-dcnode-id="691" instrument_node="">Tui Organic Seaweed Plant Tonic</span></a><span data-dcnode-id="689" instrument_node=""> and allow to drain. This will help prevent transplant shock.</span></li><span data-dcnode-id="687" instrument_node="">
</span><li data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">Add a layer of </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-vegetable-mix"><span data-dcnode-id="685" instrument_node="">Tui Vegetable Mix</span></a><span data-dcnode-id="683" instrument_node=""> to the planting area.</span></li><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Dig a hole, approximately twice the depth and width of the root ball of your plant.</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Gently loosen the root ball of your plant and position the plant in the centre of the hole.</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">Fill in with </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-vegetable-mix"><span data-dcnode-id="673" instrument_node="">Tui Vegetable Mix</span></a><span data-dcnode-id="671" instrument_node="">.</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Press soil gently around the base of the plant.</span></li><span data-dcnode-id="666" instrument_node="">
</span><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Water your plant well and continue to water regularly.</span></li><span data-dcnode-id="663" instrument_node="">
</span></ul><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Rhubarb can also be grown from seed, by dividing existing clumps or purchasing a plant from the garden centre.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="657" instrument_node="">Plants sown from seed take a few years to establish themselves. Sow seed in trays of </span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-seed-raising-mix"><span data-dcnode-id="656" instrument_node="">Tui Seed Raising Mix</span></a><span data-dcnode-id="654" instrument_node=""> in spring, and transfer into pots to grow once a few sets of leaves appear. Plant out 1m apart in the garden once seedlings are at least 10cm tall and look robust.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">When dividing existing clumps the quickest way is to split pieces off an existing plant in spring, autumn or winter. To do this, slice through the crown of the plant with a sharp spade or long knife. Plant the whole section in the ground or in a pot (that is bigger than the off-cut). Once the plant begins to put down roots, new leaves will appear.</span></p><span data-dcnode-id="649" instrument_node="">
</span><h3 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Nourish</span></h3><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Feed your plants and they will feed you. To promote the growth of more stems, keep plants well watered through dry periods. However, don’t panic if plants get dry, as they will bounce back once watered.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="642" instrument_node="">Feed with a general fertiliser such as </span><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-general-fertiliser"><span data-dcnode-id="641" instrument_node="">Tui General Fertiliser</span></a><span data-dcnode-id="639" instrument_node=""> or </span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-blood-bone"><span data-dcnode-id="638" instrument_node="">Tui Blood &amp; Bone</span></a><span data-dcnode-id="636" instrument_node=""> during the key growth periods of spring and autumn. Keeping it well nourished and watered will help keep insect pests at bay.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="631"><span class="TuiTip" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">As rhubarb like nitrogen rich soil, another way to feed your rhubarb is to place sheep pellets and water in a muslin cloth or old stocking and pour over your plants.</span></span></p><span data-dcnode-id="630" instrument_node="">
</span><h3 data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Harvest and storage</span></h3><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Pick rhubarb when the stalks are thick enough. Avoid leaving them too long as the larger stalks can sometimes taste bitter and come woody. When harvesting, firmly grasp a stalk close to the ground. Twist and pull the stalk – it should break free of the plant. Do this carefully as you don’t want to break off new shoots while you are picking your crop. If you can’t twist the stems off easily, cut them as close to the base of the plant as possible.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Rhubarb stems will store in the fridge for a week or so. They can also be frozen for up to three months once cut into 5-10cm lengths.</span></p><span data-dcnode-id="621" instrument_node="">
</span><h3 data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Tui Tips</span></h3><span data-dcnode-id="618" instrument_node="">
</span><ul data-dcnode-id="604"><span data-dcnode-id="617" instrument_node="">
</span><li data-dcnode-id="612"><span data-dcnode-id="616" instrument_node="">Soak rhubarb seedlings in </span><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-organic-seaweed-plant-tonic"><span data-dcnode-id="615" instrument_node="">Tui Organic Seaweed Plant Tonic</span></a><span data-dcnode-id="613" instrument_node=""> before planting to help avoid transplant shock and apply every four weeks to promote strong root growth.</span></li><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="606"><span data-dcnode-id="610" instrument_node="">Keep the area around the plants weed free. Watch out for slugs and snails, which can quickly shred the lush leaves of your rhubarb. Lay </span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tuigarden.co.nz/product/tui-quash-slug-snail-control"><span data-dcnode-id="609" instrument_node="">Tui Quash slug &amp; snail control</span></a><span data-dcnode-id="607" instrument_node=""> to protect your plants.</span></li><span data-dcnode-id="605" instrument_node="">
</span></ul><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="600"><em data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Information extracted from the Tui NZ Vegetable Garden Book, 3rd Edition, By Rachel Vogan.</span></em></p><span data-dcnode-id="599" instrument_node="">
