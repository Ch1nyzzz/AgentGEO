</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Mostly sold with their roots attached, the leafy greens of radishes are a healthy addition to your daily diet due to the presence of several vitamins and minerals.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="1013" id="attachment_4607" style="width: 310px"><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens.jpg" rel="attachment wp-att-4607"><img alt="Radish Greens" aria-describedby="caption-attachment-4607" class="size-medium wp-image-4607" data-dcnode-id="1017" height="170" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-300x170.jpg&amp;raw" srcset="https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-300x170.jpg 300w, https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens.jpg 644w" width="300"></a><p class="wp-caption-text" data-dcnode-id="1014" id="caption-attachment-4607"><span data-dcnode-id="1015" instrument_node="">Radish Greens</span></p></div><span data-dcnode-id="1012" instrument_node="">

n data-dcnode-id="839" instrument_node="">Vitamin A equiv.</span></td><td data-dcnode-id="835" width="92"><span data-dcnode-id="836" instrument_node="">660 μg</span></td></tr><tr data-dcnode-id="824"><td data-dcnode-id="828" width="122"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Minerals</span></strong></td><td data-dcnode-id="826" width="92"></td></tr><tr data-dcnode-id="815"><td data-dcnode-id="820" width="122"><span data-dcnode-id="821" instrument_node="">Sodium</span></td><td data-dcnode-id="817" width="92"><span data-dcnode-id="818" instrument_node="">96 mg</span></td></tr><tr data-dcnode-id="806"><td data-dcnode-id="811" width="122"><span data-dcnode-id="812" instrument_node="">Magnesium</span></td><td data-dcnode-id="808" width="92"><span data-dcnode-id="809" instrument_node="">44 mg</span></td></tr><tr data-dcnode-id="797"><td data-dcnode-id="802" width="122"><span data-dcnode-id="803" instrument_node="">Potassium</span></td><td data-dcnode-id="799" width="92"><span data-dcnode-id="800" instrument_node="">800 mg</span></td></tr><tr data-dcnode-id="788"><td data-dcnode-id="793" width="122"><span data-dcnode-id="794" instrument_node="">Calcium</span></td><td data-dcnode-id="790" width="92"><span data-dcnode-id="791" instrument_node="">520 mg</span></td></tr><tr data-dcnode-id="779"><td data-dcnode-id="784" width="122"><span data-dcnode-id="785" instrument_node="">Manganese</span></td><td data-dcnode-id="781" width="92"><span data-dcnode-id="782" instrument_node="">0.54 mg</span></td></tr><tr data-dcnode-id="770"><td data-dcnode-id="775" width="122"><span data-dcnode-id="776" instrument_node="">Iron</span></td><td data-dcnode-id="772" width="92"><span data-dcnode-id="773" instrument_node="">6.2 mg</span></td></tr><tr data-dcnode-id="761"><td data-dcnode-id="766" width="122"><span data-dcnode-id="767" instrument_node="">Zinc</span></td><td data-dcnode-id="763" width="92"><span data-dcnode-id="764" instrument_node="">0.6 mg</span>< </span><span data-dcnode-id="735" id="Health_benefits:_Are_radish_greens_good_for_you"><h2 data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Health benefits: Are radish greens good for you</span></h2></span><span data-dcnode-id="734" instrument_node="">
</span><span data-dcnode-id="731" id="Blood_pressure_regulation"><h3 data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Blood pressure regulation</span></h3></span><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Too much of sodium and too little of potassium might result in an imbalance of the minerals, increasing the risk of high blood pressure as well as several heart ailments. While some studies have shown the anti-hypertensive effects of radish tops, its high potassium content has positive effects on the sodium-potassium balance, helping in controlling blood pressure. As a result, its consumption may also be beneficial for cardiac ailments such as arrhythmia.</span></p><span data-dcnode-id="727" instrument_node="">
</span><span data-dcnode-id="724" id="For_anemia"><h3 data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">For anemia</span></h3></span><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Being a good source of iron, vitamin A, vitamin C, phosphorus and thiamine, the greens help in minimizing fatigue and balancing the&nbsp;hemoglobin levels,&nbsp;managing iron-deficiency anemia&nbsp;as well. In fact, incorporating them into your regular diet, along with other iron-rich and vitamin C-containing foods, can also help in preventing iron-deficiency anemia in pregnant women. However, make sure you speak to your&nbsp;physician regarding a safe diet during pregnancy.</span></p><span data-dcnode-id="720" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="715" id="attachment_4604" style="width: 310px"><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Green.jpg" rel="attachment wp-att-4604"><img alt="Radish Green" aria-describedby="caption-attachment-4604" class="size-medium wp-image-4604" data-dcnode-id="719" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Green-300x225.jpg&amp;raw" srcset="https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Green-300x225.jpg 300w, https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Green.jpg 695w" width="300"></a><p class="wp-caption-text" data-dcnode-id="716" id="caption-attachment-4604"><span data-dcnode-id="717" instrument_node="">Radish Green</span></p></div><span data-dcnode-id="714" instrument_node="">
</span><span data-dcnode-id="711" id="Immunity"><h3 data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Immunity</span></h3></span><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Incorporating daikon greens in your regular diet might be useful in building a strong immune system due to the presence of Vitamin C that plays a role in boosting the production of white blood cells for fighting against infections and promoting faster healing of damaged tissues.</span></p><span data-dcnode-id="707" instrument_node="">
</span><span data-dcnode-id="704" id="Anti-inflammatory_properties"><h3 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Anti-inflammatory properties</span></h3></span><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Certain compounds present in the leaves of daikon are believed to have anti-inflammatory and pain-relieving effects, which may help in cutting the risk of inflammatory conditions of the joint such as gout and arthritis.</span></p><span data-dcnode-id="700" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="695" id="attachment_4601" style="width: 310px"><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Green-Radish.jpg" rel="attachment wp-att-4601"><img alt="Green Radish" aria-describedby="caption-attachment-4601" class="size-medium wp-image-4601" data-dcnode-id="699" height="206" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Green-Radish-300x206.jpg&amp;raw" srcset="https://www.onlyfoods.net/wp-content/uploads/2016/01/Green-Radish-300x206.jpg 300w, https://www.onlyfoods.net/wp-content/uploads/2016/01/Green-Radish.jpg 745w" width="300"></a><p class="wp-caption-text" data-dcnode-id="696" id="caption-attachment-4601"><span data-dcnode-id="697" instrument_node="">Green Radish</span></p></div><span data-dcnode-id="694" instrument_node="">
</span><span data-dcnode-id="691" id="Effects_on_the_digestive_system"><h3 data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Effects on the digestive system</span></h3></span><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">As dietary fibers function as a laxative by bulking up the stools and easing bowel movements, radish greens are considered one of the preferred leaf vegetables for providing relief from constipation and bloating.</span></p><span data-dcnode-id="687" instrument_node="">
</span><span data-dcnode-id="684" id="For_scurvy"><h3 data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">For scurvy</span></h3></span><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">The vitamin C content of the leafy greens might be useful in reducing the symptoms of scurvy as researches have shown the vitamin to have&nbsp;antiscorbutic properties.</span></p><span data-dcnode-id="680" instrument_node="">
</span><span data-dcnode-id="678" instrument_node="">
</span><div class="quads-location quads-ad2" data-dcnode-id="670" id="quads-ad2" style="float:none;margin:0px;"><span data-dcnode-id="677" instrument_node="">
</span><span data-dcnode-id="674" instrument_node="">
</span><span data-dcnode-id="671" instrument_node="">
</span></div><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Besides containing antimicrobial and antibacterial properties, several nutrients in the greens are beneficial for eliminating toxic wastes from the body. In addition to having anti-cancer properties, radish greens might be beneficial for regulating blood sugar levels, helping in preventing diabetes.</span></p><span data-dcnode-id="666" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="661" id="attachment_4605" style="width: 310px"><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-Pictures.jpg" rel="attachment wp-att-4605"><img alt="Radish Greens Pictures" aria-describedby="caption-attachment-4605" class="size-medium wp-image-4605" data-dcnode-id="665" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-Pictures-300x200.jpg&amp;raw" srcset="https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-Pictures-300x200.jpg 300w, https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-Pictures.jpg 745w" width="300"></a><p class="wp-caption-text" data-dcnode-id="662" id="caption-attachment-4605"><span data-dcnode-id="663" instrument_node="">Radish Greens Pictures</span></p></div><span data-dcnode-id="660" instrument_node="">
</span><span data-dcnode-id="657" id="Uses"><h2 data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Uses</span></h2></span><span data-dcnode-id="656" instrument_node="">
</span><span data-dcnode-id="653" id="Edible_uses"><h3 data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Edible uses</span></h3></span><span data-dcnode-id="652" instrument_node="">
</span><ul data-dcnode-id="623"><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="650" instrument_node="">The greens are often used alone or stirred with the leafy tops of </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/turnip.html" title="turnip"><span data-dcnode-id="649" instrument_node="">turnip</span></a><span data-dcnode-id="647" instrument_node=""> and </span><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/spinach.html" title="spinach"><span data-dcnode-id="646" instrument_node="">spinach</span></a><span data-dcnode-id="644" instrument_node=""> to make curries, soups, and also added to other cooked vegetable preparations.</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">The traditional North Indian cuisines, dal, and kadhi are often cooked with daikon leaves.</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">Dried daikon leaves are boiled</span><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="635" instrument_node="">and flavored to make potherbs while the young leaves are used along with the fleshy roots for preparing a Korean dish chonggak kimchi.</span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">The fresh and tender radish greens can be eaten raw when used in salads and sandwiches.</span></li><span data-dcnode-id="630" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">The leafy tops along with the radish are often blended with </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/kale.html" title="kale"><span data-dcnode-id="628" instrument_node="">kale</span></a><span data-dcnode-id="626" instrument_node="">, dandelion, and spinach to prepare green smoothies.</span></li><span data-dcnode-id="624" instrument_node="">
</span></ul><span data-dcnode-id="622" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="617" id="attachment_4606" style="width: 310px"><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-Salad.jpg" rel="attachment wp-att-4606"><img alt="Radish Greens Salad" aria-describedby="caption-attachment-4606" class="size-medium wp-image-4606" data-dcnode-id="621" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-Salad-300x225.jpg&amp;raw" srcset="https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-Salad-300x225.jpg 300w, https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Greens-Salad.jpg 584w" width="300"></a><p class="wp-caption-text" data-dcnode-id="618" id="caption-attachment-4606"><span data-dcnode-id="619" instrument_node="">Radish Greens Salad</span></p></div><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">&nbsp;</span></p><span data-dcnode-id="613" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="608" id="attachment_4608" style="width: 310px"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Leaves.jpg" rel="attachment wp-att-4608"><img alt="Radish Leaves" aria-describedby="caption-attachment-4608" class="size-medium wp-image-4608" data-dcnode-id="612" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Leaves-300x225.jpg&amp;raw" srcset="https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Leaves-300x225.jpg 300w, https://www.onlyfoods.net/wp-content/uploads/2016/01/Radish-Leaves.jpg 640w" width="300"></a><p class="wp-caption-text" data-dcnode-id="609" id="caption-attachment-4608"><span data-dcnode-id="610" instrument_node="">Radish Leaves</span></p></div><span data-dcnode-id="607" instrument_node="">
</span><span data-dcnode-id="604" id="Medicinal_uses"><h3 data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Medicinal uses</span></h3></span><span data-dcnode-id="603" instrument_node="">
</span><ul data-dcnode-id="595"><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Paste prepared by mixing equal amounts of radish green powder and sugar with water&nbsp;can either be applied near the anal region or directly consumed for treating piles.</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">The juice of radish leaves has diuretic properties, being consumed for managing bladder stones and jaundice.</span></li><span data-dcnode-id="596" instrument_node="">
</span></ul><span data-dcnode-id="594" instrument_node="">
</span><span data-dcnode-id="591" id="How_to_prepare_and_cook"><h2 data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">How to prepare and cook</span></h2></span><span data-dcnode-id="590" instrument_node="">
</span><span data-dcnode-id="587" id="How_to_clean"><h3 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">How to clean</span></h3></span><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Wash the leaves thoroughly under cold running water to remove any debris. Rinsing the greens several times may be necessary to clean them well. After removing any dry or damaged leaf from the bunch, hold the bottom firmly in one hand and chop the leaves into small pieces. Radish greens attached to their roots must be cut off at the base before cleaning.</span></p><span data-dcnode-id="583" instrument_node="">
</span><span data-dcnode-id="580" id="How_to_saut"><h3 data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">How to sauté</span></h3></span><span data-dcnode-id="579" instrument_node="">
</span><ul data-dcnode-id="568"><span data-dcnode-id="578" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Heat some olive oil or butter in a frying pan set over a medium flame</span></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Add the chopped leaves to the pan</span></li><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Cook until the greens begin to wilt. Fry them covered or uncovered for another 10 minutes till they become soft.</span></li><span data-dcnode-id="569" instrument_node="">
</span></ul><span data-dcnode-id="567" instrument_node="">

</span><p data-dcnode-id="506"><span data-dcnode-id="510" instrument_node="">In case you do not have radish greens at hand, use mustard greens instead to get</span><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="507" instrument_node="">a similar peppery flavor in your preparations.</span></p><span data-dcnode-id="505" instrument_node="">
</span><span data-dcnode-id="502" id="Can_radish_greens_be_bad_for_you"><h2 data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Can radish greens be bad for you</span></h2></span><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Although eating radish tops do not cause any adverse effects, overconsumption should be avoided.</span></p><span data-dcnode-id="498" instrument_node="">
</span><span data-dcnode-id="495" id="Where_to_buy"><h2 data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Where to buy</span></h2></span><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Fresh radish greens can be purchased from any local marketplace or vegetable and fruit grocery store. When buying the leafy tops along with radishes, select fleshy roots with fresh and crispy leaves, discarding the yellowing and wilted ones.</span></p><span data-dcnode-id="491" instrument_node="">
</span><span data-dcnode-id="488" id="How_to_store"><h2 data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">How to store</span></h2></span><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">For storing, the greens must be separated from their roots, wrapped in a paper towel and put into a perforated bag before placing them in the refrigerator. Fresh leaves have a shelf life of a couple of days.</span></p><span data-dcnode-id="484" instrument_node="">
