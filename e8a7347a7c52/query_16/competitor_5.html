age-1296x728-header-1296x728.jpg?w=1845 879w"><img alt="freekeh being cooked in a pan" class="css-1jytyml" data-dcnode-id="755" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.greatist.com/wp-content/uploads/sites/2/2020/01/GRT-freekeh-grain-collage-1296x728-header-1296x728.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="749"><a class="icon-hl-pinterest css-15usvu3" data-dcnode-id="750" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=_PGvtVDL8i8S-1&amp;url=https%3A%2F%2Fgreatist.com%2Feat%2Fwhat-is-freekeh&amp;media=https%3A%2F%2Fpost.greatist.com%2Fwp-content%2Fuploads%2Fsites%2F2%2F2020%2F01%2FGRT-freekeh-grain-collage-1296x728-header-1296x728.jpg&amp;description=Freekeh%3A%20What%20It%20Is%2C%20Nutrition%2C%20How%20to%20Use%20It%2C%20and%20Recipes" data-pin-log="button_pinit" data-share-url="https://post.greatist.com/wp-content/uploads/sites/2/2020/01/GRT-freekeh-grain-collage-1296x728-header-1296x728.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">When it comes to fashion, we’re no trendsetters. But when it comes to all things food and nutrition, we know what’s up. And right now, what’s up is freekeh! </span></p><p data-dcnode-id="736"><span data-dcnode-id="743" instrument_node="">In terms of grains, everything old is </span><a class="content-link css-1egta35" data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/17-healthy-grains-youve-never-heard"><span data-dcnode-id="742" instrument_node="">new again</span></a><span data-dcnode-id="740" instrument_node="">, and this grain is positively ancient. With a ton of nutritional benefits, freekeh is poised to become the next supergrain, knocking </span><a class="content-link css-1egta35" data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/eat/creative-ways-to-eat-quinoa"><span data-dcnode-id="739" instrument_node="">quinoa</span></a><span data-dcnode-id="737" instrument_node=""> out of the rice cooker. </span></p><div data-dcnode-id="735" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="729"><aside class="css-0 css-0" data-dcnode-id="730"><div data-dcnode-id="731"><div class="css-10gx9pb" data-dcnode-id="732" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="734"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="733" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="705"><span data-dcnode-id="727" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="723"><div data-dcnode-id="724"><a class="chartbeat-section" data-dcnode-id="725" name="what-it-is"><span data-dcnode-id="726" instrument_node="">What is freekeh?</span></a></div></h2><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">First things first, it’s pronounced free-kah. And, in short, it’s wheat.</span></p><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">Think of freekeh as a “new” ancient grain. It’s been a staple in Middle Eastern diets for centuries, but only recently started surging in popularity stateside.</span><br data-dcnode-id="719"><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node="">Freekeh (sometimes called farik) is wheat that’s harvested while young and green. After getting roasted over an open fire, its straw and chaff are burned and rubbed off. In fact, “freekeh” is derived from the Arabic word for “to rub.”</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">The grain on the inside is too young and moist to burn, so what you’re left with is a firm, slightly chewy grain with a distinct flavor that’s earthy, nutty, and a little smoky. </span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Aside from tasting delicious, it’s loaded with nutritional benefits.</span></p><div class="css-1cg0byz" data-dcnode-id="706"><aside class="css-0 css-0" data-dcnode-id="707"><div data-dcnode-id="708"><div class="css-az6x7v" data-dcnode-id="709" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="711"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="710" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="618"><span data-dcnode-id="704" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="700"><div data-dcnode-id="701"><a class="chartbeat-section" data-dcnode-id="702" name="nutrition"><span data-dcnode-id="703" instrument_node="">The freekeh vs. quinoa nutritional smackdown</span></a></div></h2><p data-dcnode-id="683"><span data-dcnode-id="699" instrument_node="">When it comes to nutrition, there’s no question that supergrain freekeh has the upper hand over many other grains, like </span><a aria-label="farro (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/eat/farro-recipes/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="698" instrument_node="">farro</span></a><span data-dcnode-id="696" instrument_node="">, millet, and bulgar. It even dominates </span><a aria-label="quinoa (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/eat/breakfast-quinoa-recipes/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="695" instrument_node="">quinoa</span></a><span data-dcnode-id="693" instrument_node="">! (Wait, seriously?)</span><br data-dcnode-id="692"><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">It’s true. Freekeh is low in fat and high in protein and fiber. Serving for serving, it has more protein and fiber than quinoa. A 1 cup </span><a class="content-link css-1egta35" data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/378936/nutrients" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="689" instrument_node="">serving of freekeh</span></a><span data-dcnode-id="687" instrument_node=""> has 16 grams of fiber and 24 grams of protein, versus 3 grams of fiber and 4 grams of protein in the same amount of </span><a aria-label="quinoa (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/378716/nutrients" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="686" instrument_node="">quinoa</span></a><span data-dcnode-id="684" instrument_node="">.</span></p><p data-dcnode-id="650"><span data-dcnode-id="682" instrument_node="">Both fiber</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="673"><cite data-dcnode-id="678"><span data-dcnode-id="681" instrument_node="">Dahl W, et al. (2015). Position of the academy of nutrition and dietetics: Health implications of dietary fiber.</span><a class="content-link css-1egta35" data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dx.doi.org/10.1016/j.jand.2015.09.003" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="680" instrument_node="">DOI: 10.1016/j.jand.2015.09.003</span></a></cite><span class="css-d6klj2 icon-hl-ribbon-after" data-dcnode-id="675"><span class="sro" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Trusted Source</span></span></span><span data-dcnode-id="674"></span></hl-trusted-source><span data-dcnode-id="672" instrument_node=""> and protein have been known to keep you feeling full long after you’ve eaten it, so freekeh is a smart option for anyone focused on weight loss</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="665"><cite class="citation-reference" data-cite-reference="" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">.</span></cite><span class="css-d6klj2 icon-hl-ribbon-after" data-dcnode-id="667"><span class="sro" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Trusted Source</span></span></span><span data-dcnode-id="666"></span></hl-trusted-source><hl-trusted-source class="css-12hs4c5" data-dcnode-id="655"><cite data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">Drummen M, et al. (2018). Dietary protein and energy balance in relation to obesity and co-morbidities. </span><a class="content-link css-1egta35" data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dx.doi.org/10.3389/fendo.2018.00443" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="663" instrument_node="">DOI: 10.3389/fendo.2018.00443</span></a><span data-dcnode-id="661" instrument_node="">. </span></cite><span class="css-d6klj2 icon-hl-ribbon-after" data-dcnode-id="657"><span class="sro" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Trusted Source</span></span></span><span data-dcnode-id="656"></span></hl-trusted-source><span data-dcnode-id="654" instrument_node="">To top it off, this power-packed grain is high in </span><a class="content-link css-1egta35" data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/378936/nutrients" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="653" instrument_node="">iron and calcium</span></a><span data-dcnode-id="651" instrument_node="">. </span></p><p data-dcnode-id="645"><span data-dcnode-id="649" instrument_node="">If you’re a vegan or vegetarian, freekeh is a great way to easily up your protein intake. One caveat: If you’re </span><a aria-label="gluten-free (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/eat/instant-pot-recipes-that-are-gluten-free/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="648" instrument_node="">gluten-free</span></a><span data-dcnode-id="646" instrument_node="">, freekeh isn’t a match for you, as it’s a wheat product.</span></p><div data-dcnode-id="625" id="m75ca3546-5327-4fcb-bf70-8b8dc0b758ce"><div data-dcnode-id="626"><div data-dcnode-id="627"><section class="css-11k39sg" data-dcnode-id="628"><div class="css-kr6tiv" data-dcnode-id="644"></div><div class="css-rp3d6" data-dcnode-id="630"><div class="css-17zfozz" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">ADVERTISEMENT</span></div><div class="css-kp58b2" data-dcnode-id="637"><div class="css-qzgaig" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Check your vitamin levels with a micronutrient test</span></div><p class="css-1cr3nkl" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">This micronutrient test checks for vitamin B12, D, E, Magnesium, Copper, Selenium &amp; Zinc. Get your results in 2-5 days from an accredited laboratory with free shipping, Order today for 30% off.</span></p></div><div class="css-8nu43k" data-dcnode-id="631"><div class="css-l48fio" data-dcnode-id="632"><a class="css-oq2p6" data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/5745/redirect%3Flp%3D465%26tc%3D120399%26subid2%3D/eat/what-is-freekeh%26subid%3D%2Bletsgetchecked_grt_mid_micronutrient_32984%26correlationId%3Db5fb4989-5a0f-4acd-802e-8ded74548eae" rel="noopener noreferrer sponsored" target="_blank"><span class="css-14ktbsh" data-dcnode-id="634"><span class="css-1huyk6v" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">LEARN MORE</span></span></span></a></div></div></div><div class="css-r4181u" data-dcnode-id="629"></div></section></div></div></div><div class="css-umsscj" data-dcnode-id="619"><aside class="css-0 css-0" data-dcnode-id="620"><div data-dcnode-id="621"><div class="css-10gx9pb" data-dcnode-id="622" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="624"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="623" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="590"><span data-dcnode-id="617" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="613"><div data-dcnode-id="614"><a class="chartbeat-section" data-dcnode-id="615" name="how-to-use-it"><span data-dcnode-id="616" instrument_node="">How to cook freekeh</span></a></div></h2><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Freekeh is easy and versatile to incorporate into your diet, and it works well in both savory and sweet dishes. Use it anywhere you’d use whole grains, like quinoa, brown rice, farro, bulgur, or wheat berries. </span></p><p data-dcnode-id="597"><span data-dcnode-id="610" instrument_node="">If </span><a class="content-link css-1egta35" data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/pumpkin-spice-steel-cut-oatmeal-healthy-recipe" rel="nofollow"><span data-dcnode-id="609" instrument_node="">steel cut oats</span></a><span data-dcnode-id="607" instrument_node=""> or whole oats are your thing, try a hot freekeh breakfast cereal instead. Add cooked freekeh to your </span><a class="content-link css-1egta35" data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/super-berry-quinoa-salad" rel="nofollow"><span data-dcnode-id="606" instrument_node="">salads</span></a><span data-dcnode-id="604" instrument_node="">, use it in </span><a class="content-link css-1egta35" data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/kale-broccoli-roll-healthy-recipe" rel="nofollow"><span data-dcnode-id="603" instrument_node="">collard wraps</span></a><span data-dcnode-id="601" instrument_node="">, and add it to homemade </span><a class="content-link css-1egta35" data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/recipe-mushroom-farro-soup" rel="nofollow"><span data-dcnode-id="600" instrument_node="">soups</span></a><span data-dcnode-id="598" instrument_node="">. </span></p><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">It’s basically like cooking with rice. To cook, mix 1 part freekeh with 2.5 parts liquid (like water or broth) in a pot. </span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Bring to a boil, then simmer over medium-low heat for 20 minutes or until the liquid is absorbed. Serve hot or cold, depending on your preference. (See, we told you it was easy!)</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="592" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="591" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="543"><span data-dcnode-id="589" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="585"><div data-dcnode-id="586"><a class="chartbeat-section" data-dcnode-id="587" name="recipes"><span data-dcnode-id="588" instrument_node="">Our favorite freekeh recipes</span></a></div></h2><h3 data-dcnode-id="581"><span data-dcnode-id="584" instrument_node="">1. </span><a aria-label="Freekeh, Chickpea and Herb Salad (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cooking.nytimes.com/recipes/1017122-freekeh-chickpea-and-herb-salad" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="583" instrument_node="">Freekeh, chickpea and herb salad</span></a></h3><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">It’s easy to imagine you’re on vacation in the Mediterranean with this recipe. You’ll love the combined smokiness of freekeh with the fresh pop of herbs on your plate. Don’t forget to add fresh mint or parsley! </span></p><h3 data-dcnode-id="575"><span data-dcnode-id="578" instrument_node="">2. </span><a aria-label="Roasted Cauliflower, Freekeh and Garlicky Tahini Sauce (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cookieandkate.com/roasted-cauliflower-freekeh-tahini-sauce/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="577" instrument_node="">Roasted cauliflower, freekeh and garlicky tahini sauce</span></a></h3><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">Oh, </span><a aria-label="humble cauliflower (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/eat/super-surprising-super-delicious-cauliflower-recipes/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="573" instrument_node="">humble cauliflower</span></a><span data-dcnode-id="571" instrument_node="">. How we love thee. From pizza crust to “rice,” is there anything you can’t do? Carb-lovers will adore this dish. Plus, the garlicky tahini sauce is good enough to lick right off the plate.</span></p><h3 data-dcnode-id="566"><span data-dcnode-id="569" instrument_node="">3. </span><a aria-label="Freekeh Roasted Carrot Salad with Dill (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//keviniscooking.com/freekeh-roasted-carrot-salad-dill/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="568" instrument_node="">Freekeh roasted carrot salad with dill</span></a></h3><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">This recipe has all the spring feels, with sweet, caramelized carrots and a zesty lemon drizzle over a bowl of fluffed freekeh. The dill and freshly ground black pepper add the perfect finishing touches.</span></p><h3 data-dcnode-id="560"><span data-dcnode-id="563" instrument_node="">4. </span><a aria-label="Za’atar Beef &amp; Freekeh (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueapron.com/recipes/za-atar-beef-freekeh-with-tzatziki-feta-cheese" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="562" instrument_node="">Za’atar beef and freekeh</span></a></h3><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Whip up a big batch of this hearty recipe and you’ll actually look forward to leftovers for the next 3 nights. </span></p><p data-dcnode-id="550"><span data-dcnode-id="557" instrument_node="">The za’atar spice blend is what makes this recipe shine, a blend of </span><a class="content-link css-1egta35" data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/eat/sumac-recipe-health-benefits"><span data-dcnode-id="556" instrument_node="">sumac</span></a><span data-dcnode-id="554" instrument_node="">, marjoram, oregano, thyme, sesame seeds, and salt over tender beef. Top with feta cheese and cucumber-yogurt sauce. It’s </span><em data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">freekehn</span></em><span data-dcnode-id="551" instrument_node=""> delicious.</span></p><h3 data-dcnode-id="546"><span data-dcnode-id="549" instrument_node="">5. </span><a aria-label="Fall Harvest Freekeh Salad (opens in a new tab)" class="content-link css-1egta35" data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thekitchn.com/recipe-fall-harvest-freekeh-salad-recipes-from-the-kitchn-208250" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="548" instrument_node="">Fall harvest freekeh salad</span></a></h3><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Cool fall weather is a great excuse to cozy up in the kitchen, especially with this recipe. It’s as gorgeous as it is delicious, with squash, apples, pecans, and dried cherries. The Dijon balsamic vinaigrette makes the perfect topper.</span></p></div><div class="css-0" data-dcnode-id="533"><span data-dcnode-id="542" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="538"><div data-dcnode-id="539"><a class="chartbeat-section" data-dcnode-id="540" name="tl-dr"><span data-dcnode-id="541" instrument_node="">Bottom line</span></a></div></h2><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">If you’re ready to mix up your grain options with something new (or, actually, old) reach for freekeh. While it may not be as prevalent as pasta or rice at mainstream supermarkets, you can find it in the bulk or natural foods section at many stores. </span></p><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">With its charming nutty taste, protein count, and next-to-no-effort kind of prep, one thing’s for sure: Freekeh is freakin’ good to have lying around.</span></p></div></article><div data-dcnode-id="512" id="m6cc32b45-be16-465f-9fba-248605e99126"><div data-dcnode-id="513"><div data-dcnode-id="514"><section class="css-11k39sg" data-dcnode-id="515"><div class="css-kr6tiv" data-dcn
