</span><p class="entry-meta" data-dcnode-id="1855"><time class="entry-time" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">10/14/2016</span></time><span data-dcnode-id="1865" instrument_node=""> By </span><span class="entry-author" data-dcnode-id="1861"><a class="entry-author-link" data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wheyflavor.com/author/darren-wong/" rel="author"><span class="entry-author-name" data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Darren Wong</span></span></a></span><span data-dcnode-id="1860" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="1857"><a data-dcnode-id="1858" href="#comments"><span data-dcnode-id="1859" instrument_node="">19 Comments</span></a></span><span data-dcnode-id="1856" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="1281"><p data-dcnode-id="1852" style="text-align: left;"><span data-dcnode-id="1853" instrument_node="">You’re a big fan.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1840" style="text-align: left;"><span data-dcnode-id="1850" instrument_node="">But Optimum Nutrition has so many flavors (20+) you just don’t know which to get. And the first question that pops in your head is </span><em data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">“What’s the best Optimum Nutrition flavor?”</span></em><span data-dcnode-id="1847" instrument_node="">&nbsp; If so,&nbsp;</span><strong data-dcnode-id="1842"><span data-dcnode-id="1846" instrument_node="">you’re about to discover the 5 </span><em data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">must-haves</span></em><span data-dcnode-id="1843" instrument_node=""> from their Gold Standard collection</span></strong><span data-dcnode-id="1841" instrument_node="">…</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837" style="text-align: left;"><span data-dcnode-id="1838" instrument_node="">But not only that, I also threw in one flavor you want to avoid. Just in case you don’t trust me and decide to buy a flavor off this list (which I suggest you don’t), you’ll know what NOT to get too.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1835" instrument_node="">However, if you’re reading this, </span><span data-dcnode-id="1833" style="text-decoration: underline;"><span data-dcnode-id="1834" instrument_node="">you can trust me</span></span><span data-dcnode-id="1832" instrument_node="">. Why?</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1829" instrument_node="">Because I’ve tried almost all Optimum Nutrition flavors. You can find everything I’ve reviewed </span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wheyflavor.com/optimum-nutrition-review-checklist/" rel="noopener" target="_blank"><span data-dcnode-id="1828" instrument_node="">here</span></a><span data-dcnode-id="1826" instrument_node="">. And of them all, these five I’m about to show you are what stood out the most.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">But before I show you what the best Optimum Nutrition flavors are, how and why did I pick these?</span></p><span data-dcnode-id="1821" instrument_node="">
</span><h1 data-dcnode-id="1819" style="text-align: center;"><span data-dcnode-id="1820" instrument_node="">Why These Are The Best Optimum Nutrition Flavors</span></h1><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1814"><img alt="optimum nutrition gold standard 100 whey protein powder best flavor" class="irc_mi aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="1817" data-lazy-loaded="1" data-recalc-dims="1" height="434" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.healthline.com/hlcmsresource/images/AN_images/AN142-Protein-Powder-Scoops-732x549-thumb.jpg%3Fresize%3D579%252C434%26ssl%3D1&amp;raw" width="579"><noscript data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">&lt;img loading="lazy" class="irc_mi aligncenter" src="https://i0.wp.com/www.healthline.com/hlcmsresource/images/AN_images/AN142-Protein-Powder-Scoops-732x549-thumb.jpg?resize=579%2C434&amp;#038;ssl=1" alt="optimum nutrition gold standard 100 whey protein powder best flavor" width="579" height="434" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1811" style="text-align: left;"><span data-dcnode-id="1812" instrument_node="">I was very picky in my selection. So picky I made up requirements that a flavor needs to have in order to make it on this list.</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Here they are:</span></p><span data-dcnode-id="1807" instrument_node="">
</span><ul data-dcnode-id="1781"><span data-dcnode-id="1806" instrument_node="">
</span><li data-dcnode-id="1797" style="text-align: left;"><strong data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">These flavors must taste like what it says. </span></strong><span data-dcnode-id="1803" instrument_node="">If it’s chocolate, it has to taste </span><em data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">exactly</span></em><span data-dcnode-id="1800" instrument_node=""> like chocolate. Same goes for other flavors. This is rare in protein powders because they almost never taste like how it’s labeled. (</span><em data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">But the five below do)</span></em></li><span data-dcnode-id="1796" instrument_node="">
</span><li data-dcnode-id="1790" style="text-align: left;"><strong data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">These flavors must be versatile. </span></strong><span data-dcnode-id="1793" instrument_node="">By that, I mean you can mix them with almost anything and it’ll always taste good. It could be water, milk, bananas, smoothies, oatmeal, pancakes etc. </span><em data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">(The five flavors below taste good with everything)</span></em></li><span data-dcnode-id="1789" instrument_node="">
</span><li data-dcnode-id="1783" style="text-align: left;"><strong data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">And these flavors must be consistent. </span></strong><span data-dcnode-id="1786" instrument_node="">Most protein powders taste bad after a few weeks. If you buy a 5 pound container, you won’t get through it. </span><em data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">(But the flavors below never get old or boring)</span></em></li><span data-dcnode-id="1782" instrument_node="">
</span></ul><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">So if you’ve never had a good experience with protein powders before, now’s your chance. Don’t blindly pick a flavor from their large 20+ selection. I’ve already done that for you.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1772" style="text-align: left;"><span data-dcnode-id="1776" instrument_node="">By the time you finish reading this, you’ll know exactly which flavor tastes so good and addicting that you’ll want to hand-write me a </span><em data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Thank You</span></em><span data-dcnode-id="1773" instrument_node=""> note.</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">But one more thing before we get into it…</span></p><span data-dcnode-id="1768" instrument_node="">
</span><h1 data-dcnode-id="1766" style="text-align: center;"><span data-dcnode-id="1767" instrument_node="">Why Even Optimum Nutrition?</span></h1><span data-dcnode-id="1765" instrument_node="">

</span></a><span data-dcnode-id="1419" instrument_node="">I’ve heard many people say it’s nauseating to drink. Although I don’t think that, it’s worth noting because I never heard anyone say this about other flavors.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1416" instrument_node="">When I tried it, </span><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">I found Vanilla Ice Cream has a weird unnatural taste. It’s disgustingly sweet and has a strange consistency.</span></strong></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">There are many good reviews of it though. However, keep this in mind…</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Vanilla Ice Cream is usually everyone’s first flavor. The people writing reviews haven’t tried many other flavors to really tell what’s good and what’s not. There are plenty of other flavors out there that put this one to shame.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">So if I were you, I would steer clear from Vanilla Ice Cream.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1402" instrument_node="">If you’re looking for a vanilla flavor, go with Optimum Nutrition’s French Vanilla Creme (</span><a data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wheyflavor.com/optimum-nutrition-french-vanilla-creme-review/" rel="noopener" target="_blank"><span data-dcnode-id="1401" instrument_node="">Review</span></a><span data-dcnode-id="1399" instrument_node="">) which is much better.</span></p><span data-dcnode-id="1397" instrument_node="">

</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Hi,</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1109" instrument_node="">Indeed, I enjoyed the Mocha Cappuccino because it tastes great no matter if you mix it with water or milk.</span><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">
The Extreme milk chocolate is even better ! Just 200ML of water and it really make it taste like a very delicious cocoa drink you can find on the stores.</span><br data-dcnode-id="1106"><span data-dcnode-id="1105" instrument_node="">
If you like strong chocolate taste, I would recommend to mix it with milk.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">However, I do like chocolate in general but at the end I do  prefer the double rich chocolate as it has a lighter chocolate taste and when mixed with milk it gives a more gentle taste as I do not like strong chocolate taste so much. It is my personal preference though and I do understand why people may prefer the other ones.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1099" instrument_node="">Also, I wanted to share my opinion with the vanilla taste:</span><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node="">
I was surprised by its sweetness and the vanilla flavor is in my opinion close to the custard you can find inside the custard tarts with a light taste of milk. Difficult to describe it but I do like it very much.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1094" instrument_node="">Again, thanks a lot for sharing this !</span><br data-dcnode-id="1093"><span data-dcnode-id="1092" instrument_node="">
Cheers</span><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node="">
Red</span></p><span data-dcnode-id="1088" instrument_node="">

</span><p class="comment-author" data-dcnode-id="861"><span data-dcnode-id="871" instrument_node="">
</span><img alt="" class="avatar avatar-48 photo jetpack-lazy-image" data-dcnode-id="870" data-lazy-src="https://secure.gravatar.com/avatar/e0d156e18c35c25ab69f2d5ba9ae7fb6?s=48&amp;is-pending-load=1#038;d=mm&amp;r=g" data-lazy-srcset="https://secure.gravatar.com/avatar/e0d156e18c35c25ab69f2d5ba9ae7fb6?s=96&amp;d=mm&amp;r=g 2x" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/e0d156e18c35c25ab69f2d5ba9ae7fb6%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="48"><noscript data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">&lt;img alt='' src='https://secure.gravatar.com/avatar/e0d156e18c35c25ab69f2d5ba9ae7fb6?s=48&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/e0d156e18c35c25ab69f2d5ba9ae7fb6?s=96&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-48 photo' height='48' width='48' loading='lazy'/&gt;</span></noscript><span class="comment-author-name" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Jonathon</span></span><span data-dcnode-id="865" instrument_node=""> </span><span class="says" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">says</span></span><span data-dcnode-id="862" instrument_node=""> </span></p><span data-dcnode-id="860" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="856"><time class="comment-time" data-dcnode-id="857"><a class="comment-time-link" data-dcnode-id="858" href="#comment-6996"><span data-dcnode-id="859" instrument_node="">08/24/2018 at 12:46 pm</span></a></time></p><span data-dcnode-id="855" instrument_node=""> </span></header><span data-dcnode-id="853" instrument_node="">
</span><div class="comment-content" data-dcnode-id="818"><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Thanks for the info, Darren! Your opinions are appreciated. It is unfortunate that there is no affordable sampler options for people to try the various flavors. Nor could I find a site where ongoing surveys are available with their results. Sharing experiences and feedback is very helpful, so I thought I would weigh in on my experiences.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Get it? Weigh in?</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Anyway… To date, I have tried the Milk Chocolate, Cookies and Cream, Cake Batter, and White Chocolate. My favorite might surprise you.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Milk chocolate was my first and I enjoyed the flavor enough to continue buying ON products. It is exactly how you described it and I’d buy it again. Of the flavors I have tried, this is the one that tastes best by itself in plain water.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">My most recent purchase was Cookies and Cream. It’s a fine flavor but it didn’t wow me. It wasn’t special enough for me to stick with it. I’m going to try other flavors.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Cake batter was my least favorite. The batter flavor is subtle but present (albeit artificial) with a nice sweetness. But it didn’t mix well and/or settles quickly to the bottom of your cup. The closer your got to the bottom of your drink, the more you would notice something with a “stinging” artificial aftertaste. It needed to be mixed with ingredients (other than water—something with a strong flavor) to help cover that part up. It seems to be a relatively popular flavor, so perhaps I received a bad supply. I managed to make it through my 5 lb container but I wouldn’t buy it again.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">White chocolate is my favorite. Its strength and weakness is the same: it basically tastes like artificial sweetener.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">The thought of artificial sweeteners may sound gross to some, but what keeps bringing me back to it is its neutral, “unbiased” flavor. It is very versatile. You’ll never get bored with it. I don’t need to try all sorts of flavors, which I may or may not like, when I can blend ingredients to a shake made with white chocolate. Why go out of your way to make a protein shake when you can add the powder to what you normally eat?</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Want strawberries and cream? Add fresh strawberries. Want a coffee whey flavor? Add white chocolate to your morning coffee. Add chocolate syrup and graham cracker crumbles for a s’more shake. I’m sure you can do a lot of these recipes with other flavors and enjoy it, but the neutral aspect of white chocolate doesn’t overpower the other flavors or turn everything into a dessert. I’ve added it to my oatmeal, pancakes, yogurt, ice cream, hot water/milk, and a variety of shakes and juices and was never disappointed. Mixing with cold Silk coconut milk is my favorite.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Everyone has different taste buds, of course, but the only group of people who may not have an interest, IMHO, in white chocolate would be people who consume whey during their workouts or are otherwise limited to mixing only in water. I enjoy it in water but can understand why someone may want something with a more distinct flavor, such as the chocolate.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">At the time of this writing the 5 lb. Double Chocolate is on sale on Amazon, so that will be my next trial. But I suspect that I’ll go back to White Chocolate after that.</span></p><span data-dcnode-id="819" instrument_node="">
</span></div><span data-dcnode-id="817" instrument_node="">
