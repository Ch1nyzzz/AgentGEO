</span><div class="page-header" data-dcnode-id="335" style="background-image: url('');"><span data-dcnode-id="353" instrument_node="">

</span><h1 data-dcnode-id="346"><span data-dcnode-id="349" instrument_node="">Three Numbers.</span><br data-dcnode-id="348"><span data-dcnode-id="347" instrument_node="">
One Delicious Bite</span></h1><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Ever started your day with a bounce in your step and drive to take on a whole to-do list?</span></p><span data-dcnode-id="342" instrument_node="">
</span></div><span data-dcnode-id="340" instrument_node="">
</span></div><span data-dcnode-id="338" instrument_node="">
</span></div><span data-dcnode-id="336" instrument_node="">
</span></div><span data-dcnode-id="334" instrument_node="">
</span><div class="container" data-dcnode-id="191"><span data-dcnode-id="333" instrument_node="">
</span><div class="row" data-dcnode-id="193"><span data-dcnode-id="332" instrument_node="">
</span><div class="col-12" data-dcnode-id="195"><span data-dcnode-id="331" instrument_node="">
</span><span data-dcnode-id="329" instrument_node="">
</span><div class="post-208 page type-page status-publish hentry" data-dcnode-id="199" id="post-<208"><span data-dcnode-id="328" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="324"><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Imagine having that same energy whenever your day demands it. </span></strong><span data-dcnode-id="325" instrument_node="">That’s what our nutritionists had in mind when they created Balance Bar nutrition energy bars.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="320"><span data-dcnode-id="322" instrument_node="">They discovered a nutrition formula that helps you find your balance throughout the day. It’s based on 40-30-30 nutrition to help maintain your blood sugar levels already within a normal range, help satisfy your hunger and give you lasting energy (sayonara, post-lunch slump!)</span><br data-dcnode-id="321"></p><span data-dcnode-id="319" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="315"><span data-dcnode-id="318" instrument_node="">40-30-30 Nutrition.</span><br data-dcnode-id="317"><span data-dcnode-id="316" instrument_node="">100% Delicious.</span></h2><span data-dcnode-id="314" instrument_node="">
</span><div class="row" data-dcnode-id="295"><span data-dcnode-id="313" instrument_node="">
</span><div class="col-12 col-md-4" data-dcnode-id="308"><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">This precise 40-30-30 nutrition plan promotes slow glycemic response, which helps keep your blood sugar levels in a normal range. It may even keep you from having those “hangry” outbursts.</span></p><span data-dcnode-id="309" instrument_node="">
</span></div><span data-dcnode-id="307" instrument_node="">
</span><div class="col-12 col-md-4 text-center" data-dcnode-id="303"><span data-dcnode-id="306" instrument_node="">
</span><img alt="40-30-30" class="img-fluid" data-dcnode-id="305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balance.com/wp-content/uploads/2021/02/403030rev.jpg&amp;raw"><span data-dcnode-id="304" instrument_node="">
</span></div><span data-dcnode-id="302" instrument_node="">
</span><div class="col-12 col-md-4" data-dcnode-id="297"><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Because it’s designed for slow, controlled digestion, it helps satisfy your hunger with steady, sustained energy that lasts long after your last bite. And to complete the trifecta of this nutritional superstar, the quality protein supports muscle recovery and your active, on-the-go lifestyle, so you get the most out of every day.</span></p><span data-dcnode-id="298" instrument_node="">
</span></div><span data-dcnode-id="296" instrument_node="">
</span></div><span data-dcnode-id="294" instrument_node="">
</span><br data-dcnode-id="293"><span data-dcnode-id="292" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">So try starting your day with a cup of joe and a Balance Bar. Or keep one stashed in your bag to help banish hunger while you’re on the go. Or make it your mid-afternoon go-to.</span></p><span data-dcnode-id="289" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="286"><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.balance.com/"><span data-dcnode-id="288" instrument_node="">There are so many great flavors to choose from.</span></a></p><span data-dcnode-id="285" instrument_node="">
</span><div class="wp-container-627ec1bc108b3 wp-block-buttons" data-dcnode-id="279"><span data-dcnode-id="284" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="281"><a class="wp-block-button__link" data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.balance.com/"><span data-dcnode-id="283" instrument_node="">Find Your Flavor</span></a></div><span data-dcnode-id="280" instrument_node="">
</span></div><span data-dcnode-id="278" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="277"><span data-dcnode-id="276" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="272"><span data-dcnode-id="275" instrument_node="">The Math Behind </span><br data-dcnode-id="274"><span data-dcnode-id="273" instrument_node="">the Nutritional Magic</span></h2><span data-dcnode-id="271" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">As we develop each delicious Original, Gold or Dark Balance Bar recipe, we figure out how many of the calories come from carbohydrates, protein and dietary fat. We only deem it ready for you when it’s both delicious and balanced, meaning 40% of calories come from carbohydrates, 30% from protein and 30% from dietary fat.</span></p><span data-dcnode-id="268" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">In order to do that, our nutritionists do algebra (yes, your high school math teacher was actually right: math is used in real life!) Ready to dig in?</span></p><span data-dcnode-id="265" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Step 1: Gather the Numbers We’ll Need!</span></h3><span data-dcnode-id="262" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Since 40-30-30 is a ratio of Carbohydrates to Protein to Dietary Fat, we’ll not only need total calories, but we’ll also need grams of Carbohydrates, Protein and Dietary Fat.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="255"><img alt="Step 1" class="img-fluid lazyloaded" data-dcnode-id="258" data-src="/wp-content/uploads/2021/02/403030_step1.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balance.com/wp-content/uploads/2021/02/403030_step1.png&amp;raw"><noscript data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">&lt;img src="/wp-content/uploads/2021/02/403030_step1.png" alt="Step 1" class="img-fluid"&gt;</span></noscript></p><span data-dcnode-id="254" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="253"><span data-dcnode-id="252" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Step 2: Convert to Calories</span></h3><span data-dcnode-id="249" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Grams of Protein and grams of Dietary Fat are a bit like apples and oranges. Nutritious and delicious in their own way, but through the discerning eye of nutritional glasses, not completely equal. Thankfully, calories will do the job, so next we convert grams to calories.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="242"><img alt="Step 2" class="img-fluid lazyloaded" data-dcnode-id="245" data-src="/wp-content/uploads/2021/02/403030_step2.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balance.com/wp-content/uploads/2021/02/403030_step2.png&amp;raw"><noscript data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">&lt;img src="/wp-content/uploads/2021/02/403030_step2.png" alt="Step 2" class="img-fluid"&gt;</span></noscript></p><span data-dcnode-id="241" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="240"><span data-dcnode-id="239" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Step 3: Slice Up the Percentage Pie</span></h3><span data-dcnode-id="236" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Once you know the calorie counts, you can figure out the percentage of total calories that come from Carbohydrates, Protein and Dietary Fat.</span></p><span data-dcnode-id="233" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">For each of them, you just take the number of calories and divide it by the total calories. Then multiply by 100, and since we’re not working with the same long chains of decimal points that our nutritionists do, go ahead and round to the nearest 10.</span></p><span data-dcnode-id="230" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">There you have it! 40-30-30 is as easy as 1-2-3.</span></p><span data-dcnode-id="227" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Want to try it out? Let’s dig in with one of our favorites, the Original Peanut Butter Balance Bar.</span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="220"><img alt="step 3" class="img-fluid lazyloaded" data-dcnode-id="223" data-src="/wp-content/uploads/2021/02/403030_step31.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balance.com/wp-content/uploads/2021/02/403030_step31.png&amp;raw"><noscript data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">&lt;img src="/wp-content/uploads/2021/02/403030_step31.png" alt="step 3" class="img-fluid"&gt;</span></noscript></p><span data-dcnode-id="219" instrument_node="">
</span><p data-dcnode-id="215"><img alt="Nutrition Principle" class="img-fluid lazyloaded" data-dcnode-id="218" data-src="/wp-content/uploads/2021/02/01NutritionPrinciple_UpdatedCircle_v2.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balance.com/wp-content/uploads/2021/02/01NutritionPrinciple_UpdatedCircle_v2.png&amp;raw"><noscript data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">&lt;img src="/wp-content/uploads/2021/02/01NutritionPrinciple_UpdatedCircle_v2.png" alt="Nutrition Principle" class="img-fluid"&gt;</span></noscript></p><span data-dcnode-id="214" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="211"><br data-dcnode-id="213"><span data-dcnode-id="212" instrument_node="">Well, there you have it. We were always told math was good for us, but who knew it could be so delicious? But you don’t have to take our word for it—one bite and you’ll be convinced!</span></p><span data-dcnode-id="210" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Note: While they have a great nutritional profile, new Balance bare bars are not crafted based on the 40-30-30 nutrition principle.</span></p><span data-dcnode-id="207" instrument_node="">
