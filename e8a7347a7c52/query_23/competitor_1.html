</span><li data-dcnode-id="1042"><a data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/is_banana_good_for_kidney_stones/index.htm" id="tabIdx" onclick="wmdTrack('arttab-index');"><span data-dcnode-id="1044" instrument_node="">Is Banana Good for Kidney Stones? Center</span></a></li><span data-dcnode-id="1041" instrument_node="">

</span><div data-dcnode-id="1024" itemscope="" itemtype="https://schema.org/CreativeWork"><img alt="banana health benefits" data-dcnode-id="1025" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/article/main_image/is-banana-good-for-pancreas.jpg&amp;raw" title="banana health benefits"></div><span data-dcnode-id="1023" instrument_node="">
</span><span class="lrgArtImgCap" data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Bananas may be a particularly helpful remedy against kidney stones</span></span></div><span data-dcnode-id="1019" instrument_node="">
</span><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">Bananas may be a particularly helpful remedy against </span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/kidney_stones/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1015" instrument_node="">kidney stones</span></a><span data-dcnode-id="1013" instrument_node="">, as they are rich in potassium, vitamin B6 and magnesium and low in oxalates. Studies have shown that consuming a banana per day can help reduce the likelihood of developing kidney problems.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><h4 data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Potassium</span></h4><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">Potassium plays a crucial role in managing the amount of calcium excreted out of the body. If you excrete large amounts of calcium, excess oxalate may be left in the body and increases your chances of developing calcium oxalate kidney stones. The </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/hyperkalemia/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1006" instrument_node="">high potassium</span></a><span data-dcnode-id="1004" instrument_node=""> content in bananas can therefore help prevent kidney stones by balancing the calcium and oxalate content in your body. Potassium can also help balance the acidity of your urine.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><h4 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Vitamin B6</span></h4><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">Bananas are a great source of vitamin B6, which helps in increasing red blood cell production as well as removing unwanted chemical compounds from your </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/liver_anatomy_and_function/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="997" instrument_node="">liver</span></a><span data-dcnode-id="995" instrument_node=""> and kidneys.</span></p><span data-dcnode-id="993" instrument_node="">
</span><h4 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Magnesium</span></h4><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">The magnesium in the banana stem is also good for your kidneys. Magnesium combines readily with the oxalates in foods we consume and prevents the growth of calcium oxalate crystals.</span></p><span data-dcnode-id="987" instrument_node="">
</span></div><span data-dcnode-id="985" instrument_node="">
</span><div class="apPage" data-dcnode-id="774"><span data-dcnode-id="984" instrument_node="">
</span><div class="wrapper" data-dcnode-id="927"><p data-dcnode-id="981"><b data-dcnode-id="982"><a class="bookmark" data-dcnode-id="983" name="what_other_fruits_are_good_for_preventing_kidney_stones"></a></b></p><div data-dcnode-id="977" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="978"><span data-dcnode-id="979" itemprop="alternativeHeadline"><span data-dcnode-id="980" instrument_node="">What other fruits are good for preventing kidney stones?</span></span></h3></div><p data-dcnode-id="976"></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Besides bananas, other foods that are low in oxalates and can be good for kidney stones include:</span></p><span data-dcnode-id="972" instrument_node="">
</span><ul data-dcnode-id="928"><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Lemons</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Oranges</span></li><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Melons</span></li><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Pineapples</span></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Apples</span></li><span data-dcnode-id="956" instrument_node="">
</span><li data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Pears</span></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Avocados</span></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Mangoes</span></li><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Apricots</span></li><span data-dcnode-id="944" instrument_node="">
</span><li data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Persimmons</span></li><span data-dcnode-id="941" instrument_node="">
</span><li data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Plums</span></li><span data-dcnode-id="938" instrument_node="">
</span><li data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Kiwis</span></li><span data-dcnode-id="935" instrument_node="">
</span><li data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Melons</span></li><span data-dcnode-id="932" instrument_node="">
</span><li data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Watermelons</span></li><span data-dcnode-id="929" instrument_node="">
</span></ul></div><div class="wrapper" data-dcnode-id="803"><p data-dcnode-id="924"><b data-dcnode-id="925"><a class="bookmark" data-dcnode-id="926" name="what_diet_should_you_follow_if_you_have_kidney_stones"></a></b></p><div data-dcnode-id="920" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="921"><span data-dcnode-id="922" itemprop="alternativeHeadline"><span data-dcnode-id="923" instrument_node="">What diet should you follow if you have kidney stones?</span></span></h3></div><p data-dcnode-id="919"></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="917" instrument_node="">Following a healthy </span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/diet_plans_and_programs/article.htm" onclick="wmdTrack('embd-lnk');" rel="sub"><span data-dcnode-id="916" instrument_node="">diet</span></a><span data-dcnode-id="914" instrument_node=""> plan that can be helpful in preventing or managing calcium oxalate and uric acid kidney stones.</span></p><span data-dcnode-id="912" instrument_node="">
</span><ul data-dcnode-id="804"><span data-dcnode-id="911" instrument_node="">
</span><li data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Drink lots of fluids, especially water.</span></li><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Eat foods that are low in oxalates.</span></li><span data-dcnode-id="905" instrument_node="">
</span><li data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">Maintain a low-fat </span><a class="quizlink" data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/diet_and_nutrition_quiz/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz" target="_blank" title="Learning Quiz"><span data-dcnode-id="903" instrument_node="">diet</span></a><span data-dcnode-id="901" instrument_node="">. Avoid fatty foods, such as ice cream, fried foods and rich salad dressings.</span></li><span data-dcnode-id="899" instrument_node="">
</span><li data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Reduce salt intake. Chinese and Mexican food, tomato juice, regular canned foods and processed foods are often high in sodium.</span></li><span data-dcnode-id="896" instrument_node="">

</span><li data-dcnode-id="682"><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/are_bananas_good_for_the_pancreas/article.htm" onclick="wmdTrack('lr-top10_02');"><img data-dcnode-id="688" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-is-banana-good-for-pancreas.jpg&amp;raw" width="80"><h4 data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Are Bananas Good for the Pancreas?</span></h4><div class="relContent" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Bananas are one of the most popular healthy snacking options to eat while on the go. Bananas are good for the pancreas because they are anti-inflammatory, easy to digest, rich in fiber and promote gut health and digestion.</span></div></a></li><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="674"><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/are_bananas_good_for_weight_loss/article.htm" onclick="wmdTrack('lr-top10_03');"><img data-dcnode-id="680" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-are-bananas-bad-if-you-are-trying-to-lose-weight.jpg&amp;raw" width="80"><h4 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Are Bananas Good for Weight Loss?</span></h4><div class="relContent" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Bananas are a widely available, affordable, and versatile fruit that cause weight loss if taken in moderation to lose weight. However, it should be consumed as a snack rather than a full meal. Bananas are loaded with fiber. A crucial component of any weight loss diet is to understand that no single food has the power to make an individual gain or lose weight.</span></div></a></li><span data-dcnode-id="673" instrument_node="">
