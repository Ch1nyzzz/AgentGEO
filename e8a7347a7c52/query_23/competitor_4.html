</span><h2 data-dcnode-id="5014"><span class="ez-toc-section" data-dcnode-id="5022" id="What_can_you_do_for_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">What can you do for </span></strong><strong data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">Stage 3 Kidney Disease</span></strong><strong data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">?</span></strong><span class="ez-toc-section-end" data-dcnode-id="5015"></span></h2><span data-dcnode-id="5013" instrument_node="">
</span><p data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">While CKD is not curable there is still a lot you can do to preserve your kidney function. Kidney care should be taken as soon as CKD has been discovered.</span></p><span data-dcnode-id="5010" instrument_node="">
</span><p data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">Kidney patients should put into place a health care team. Help from professionals will enact medical and nutritional interventions that will help to preserve kidney health and prevent disease progression.</span></p><span data-dcnode-id="5007" instrument_node="">
</span><h3 data-dcnode-id="5002"><span class="ez-toc-section" data-dcnode-id="5006" id="When_Should_You_See_a_Nephrologist"></span><strong data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">When Should You See a Nephrologist?</span></strong><span class="ez-toc-section-end" data-dcnode-id="5003"></span></h3><span data-dcnode-id="5001" instrument_node="">
</span><p data-dcnode-id="4996"><span data-dcnode-id="5000" instrument_node="">When you are having renal problems you should see a kidney doctor known as a </span><a data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/kidney-specialist-tips/"><span data-dcnode-id="4999" instrument_node="">nephrologist</span></a><span data-dcnode-id="4997" instrument_node="">. They are trained to manage conditions affecting the kidneys.</span></p><span data-dcnode-id="4995" instrument_node="">
</span><p data-dcnode-id="4990"><span data-dcnode-id="4994" instrument_node="">People without kidney disease should also seek the help of a nephrologist when they are having </span><a data-dcnode-id="4992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/what-is-a-nephrologist%23seeing-a-nephrologist" onclick="javascript:window.open('https://www.healthline.com/health/what-is-a-nephrologist#seeing-a-nephrologist'); return false;"><span data-dcnode-id="4993" instrument_node="">symptoms</span></a><span data-dcnode-id="4991" instrument_node=""> of kidney dysfunction including:</span></p><span data-dcnode-id="4989" instrument_node="">
</span><ul data-dcnode-id="4966"><li data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">Fatigue</span></li><li data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node="">Sleep problems</span></li><li data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">Changes in urination</span></li><li data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">Family history of kidney problems and kidney disease</span></li><li data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">High blood pressure</span></li><li data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">Diabetes</span></li><li data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">Heart disease</span></li><li data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">An inherited condition that leads to kidney disease</span></li><li data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">A lot of blood in the urine</span></li><li data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">A lot of protein in the urine</span></li><li data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">Recurring kidney stones</span></li></ul><span data-dcnode-id="4965" instrument_node="">
</span><p data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">If you are not already seeing someone about your kidney disease, your primary care doctor can refer you to a local nephrologist. Or you can find one through your insurance company.</span></p><span data-dcnode-id="4962" instrument_node="">
</span><h3 data-dcnode-id="4957"><span class="ez-toc-section" data-dcnode-id="4961" id="When_Should_You_See_a_Renal_Dietitian"></span><strong data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">When Should You See a Renal Dietitian?</span></strong><span class="ez-toc-section-end" data-dcnode-id="4958"></span></h3><span data-dcnode-id="4956" instrument_node="">
</span><p data-dcnode-id="4951"><span data-dcnode-id="4955" instrument_node="">Nutrition plays a large role in kidney function. So be sure to enlist the help of a dietitian as part of your kidney management team. These health professionals are </span><a data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/content/day-life-nephrology-dietitian" onclick="javascript:window.open('https://www.kidney.org/content/day-life-nephrology-dietitian'); return false;"><span data-dcnode-id="4954" instrument_node="">responsible</span></a><span data-dcnode-id="4952" instrument_node=""> for diagnosing the root cause of the nutritional problems as well as assessing your overall health status.&nbsp;</span></p><span data-dcnode-id="4950" instrument_node="">
</span><p data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">Renal dietitians (RDs) are nutrition professionals specialized in kidney health. They are experts when it comes to renal nutrition. They cater specifically to individuals with kidney dysfunction and CKD.&nbsp;</span></p><span data-dcnode-id="4947" instrument_node="">
</span><p data-dcnode-id="4942"><span data-dcnode-id="4946" instrument_node="">Renal RDs </span><a data-dcnode-id="4944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/content/day-life-nephrology-dietitian" onclick="javascript:window.open('https://www.kidney.org/content/day-life-nephrology-dietitian'); return false;"><span data-dcnode-id="4945" instrument_node="">provide</span></a><span data-dcnode-id="4943" instrument_node=""> medical nutrition therapy (MNT) to clients suffering from CKD and other kidney issues. They examine&nbsp;</span></p><span data-dcnode-id="4941" instrument_node="">
</span><ul data-dcnode-id="4930"><li data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">Lab results</span></li><li data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">Medication lists</span></li><li data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node="">Protein and calorie intake</span></li><li data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">Albumin levels</span></li><li data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">Potassium levels</span></li></ul><span data-dcnode-id="4929" instrument_node="">
</span><p data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node="">They also make sure clients are getting adequate nutrients and adhering to any potential nutrient restrictions.</span></p><span data-dcnode-id="4926" instrument_node="">
</span><p data-dcnode-id="4918"><span data-dcnode-id="4925" instrument_node="">Nutrition is one of the few things that a person with kidney disease </span><a data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/content/day-life-nephrology-dietitian" onclick="javascript:window.open('https://www.kidney.org/content/day-life-nephrology-dietitian'); return false;"><span data-dcnode-id="4924" instrument_node="">can control</span></a><span data-dcnode-id="4922" instrument_node="">. MNT can treat any potential nutrition deficiencies as well as help to </span><a data-dcnode-id="4920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/professionals/clinical-tools-patient-management/kidney-disease/identify-manage-patients/manage-ckd/collaborate-registered-dietitian" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/professionals/clinical-tools-patient-management/kidney-disease/identify-manage-patients/manage-ckd/collaborate-registered-dietitian'); return false;"><span data-dcnode-id="4921" instrument_node="">stop your CKD from progressing</span></a><span data-dcnode-id="4919" instrument_node=""> into stage 4.&nbsp;</span></p><span data-dcnode-id="4917" instrument_node="">
</span><p data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">It is so important for patients to incorporate help from a professional who can create an individualized nutrition action plan to help them preserve kidney function, feel better, and live longer.&nbsp;</span></p><span data-dcnode-id="4914" instrument_node="">
</span><p data-dcnode-id="4909"><span data-dcnode-id="4913" instrument_node="">Those with CKD need diet therapy. Be sure to make an appointment with a renal RD as soon as a kidney problem is diagnosed. You can use this </span><a data-dcnode-id="4911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/does-insurance-cover-nutritionists/"><span data-dcnode-id="4912" instrument_node="">article</span></a><span data-dcnode-id="4910" instrument_node=""> to learn about using your health insurance to find a dietitian.</span></p><span data-dcnode-id="4908" instrument_node="">
</span><h4 data-dcnode-id="4905"><strong data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">Renal Dietitians Also Help with Other Kidney Dysfunction</span></strong></h4><span data-dcnode-id="4904" instrument_node="">
</span><p data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">People should also see a renal dietitian is when they are experiencing other signs of kidney dysfunction such as:</span></p><span data-dcnode-id="4901" instrument_node="">
</span><ul data-dcnode-id="4876"><li data-dcnode-id="4898"><a data-dcnode-id="4899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/" onclick="javascript:window.open('https://kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/'); return false;"><span data-dcnode-id="4900" instrument_node="">Decline in kidney function</span></a></li><li data-dcnode-id="4895"><a data-dcnode-id="4896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/nutrition/Kidney-Stones" onclick="javascript:window.open('https://www.kidney.org/nutrition/Kidney-Stones'); return false;"><span data-dcnode-id="4897" instrument_node="">Presence of kidney stones</span></a></li><li data-dcnode-id="4892"><a data-dcnode-id="4893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/" onclick="javascript:window.open('https://kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/'); return false;"><span data-dcnode-id="4894" instrument_node="">Protein in the urine</span></a></li><li data-dcnode-id="4889"><a data-dcnode-id="4890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/" onclick="javascript:window.open('https://kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/'); return false;"><span data-dcnode-id="4891" instrument_node="">High potassium levels</span></a></li><li data-dcnode-id="4886"><a data-dcnode-id="4887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/" onclick="javascript:window.open('https://kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/'); return false;"><span data-dcnode-id="4888" instrument_node="">High phosphorus levels</span></a></li><li data-dcnode-id="4883"><a data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/content/outcomes-diabetic-kidney-disease-clinical-update" onclick="javascript:window.open('https://www.kidney.org/content/outcomes-diabetic-kidney-disease-clinical-update'); return false;"><span data-dcnode-id="4885" instrument_node="">You have diabetes as a result of kidney disease</span></a></li><li data-dcnode-id="4880"><a data-dcnode-id="4881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/" onclick="javascript:window.open('https://kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/'); return false;"><span data-dcnode-id="4882" instrument_node="">The presence of high blood pressure</span></a></li><li data-dcnode-id="4877"><a data-dcnode-id="4878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/" onclick="javascript:window.open('https://kidneyrd.com/when-should-someone-with-ckd-see-a-dietitian/'); return false;"><span data-dcnode-id="4879" instrument_node="">When you have questions about kidney nutrition</span></a></li></ul><span data-dcnode-id="4875" instrument_node="">
</span><p data-dcnode-id="4870"><span data-dcnode-id="4874" instrument_node="">Your nephrologist or medical doctor should be able to help you find a renal dietitian that will take your insurance. Otherwise, you can search for a local dietitian in the </span><a data-dcnode-id="4872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/view/ckdrd/home" onclick="javascript:window.open('https://sites.google.com/view/ckdrd/home'); return false;"><span data-dcnode-id="4873" instrument_node="">National Kidney Foundation directory</span></a><span data-dcnode-id="4871" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="4869" instrument_node="">
</span><h4 data-dcnode-id="4866"><strong data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">Before Seeing A Dietitian</span></strong></h4><span data-dcnode-id="4865" instrument_node="">
</span><p data-dcnode-id="4860"><span data-dcnode-id="4864" instrument_node="">Before seeing a dietitian be sure to have the </span><a data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/professionals/clinical-tools-patient-management/kidney-disease/identify-manage-patients/manage-ckd/collaborate-registered-dietitian" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/professionals/clinical-tools-patient-management/kidney-disease/identify-manage-patients/manage-ckd/collaborate-registered-dietitian'); return false;"><span data-dcnode-id="4863" instrument_node="">following</span></a><span data-dcnode-id="4861" instrument_node="">:</span></p><span data-dcnode-id="4859" instrument_node="">
</span><ul data-dcnode-id="4852"><li data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">Preliminary evaluation (ultrasound, screening serologies)</span></li><li data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node="">Patient history with renal function measurements and urine albumin</span></li><li data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">The reason you are seeing the RD</span></li></ul><span data-dcnode-id="4851" instrument_node="">
</span><h2 data-dcnode-id="4844"><span class="ez-toc-section" data-dcnode-id="4850" id="Treatments_Available_for_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">Treatments Available for </span></strong><strong data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">Stage 3 Kidney Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="4845"></span></h2><span data-dcnode-id="4843" instrument_node="">
</span><p data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">There are nutritional, lifestyle, and medical treatments available for stage 3 kidney disease. Medical treatments will come from your doctor. Your renal dietitian will give you nutrition treatments. Both your doctor and dietitian may give you lifestyle recommendations.&nbsp;</span></p><span data-dcnode-id="4840" instrument_node="">
</span><h3 data-dcnode-id="4835"><span class="ez-toc-section" data-dcnode-id="4839" id="Medical_Treatments_for_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">Medical Treatments for Stage 3 Kidney Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="4836"></span></h3><span data-dcnode-id="4834" instrument_node="">
</span><p data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">Often your doctor may prescribe medicines to lower blood pressure, cholesterol, and control diabetes, and other coexisting conditions.&nbsp;</span></p><span data-dcnode-id="4831" instrument_node="">
</span><p data-dcnode-id="4826"><span data-dcnode-id="4830" instrument_node="">For patients in stage 3 CKD with an eGFR below 60 mL/min, certain drugs may </span><a data-dcnode-id="4828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2956196/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2956196/'); return false;"><span data-dcnode-id="4829" instrument_node="">no longer</span></a><span data-dcnode-id="4827" instrument_node=""> be given because they have the potential to damage the kidneys. These substances may not be able to be eliminated and will build up to toxic levels in the body. They include:</span></p><span data-dcnode-id="4825" instrument_node="">
</span><ul data-dcnode-id="4810"><li data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">Pethidine</span></li><li data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">Methotrexate</span></li><li data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">Enoxaparin</span></li><li data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">Metformin</span></li><li data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">Glibenclamide</span></li><li data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">Gimepiride</span></li><li data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">Lithium</span></li></ul><span data-dcnode-id="4809" instrument_node="">
</span><p data-dcnode-id="4804"><span data-dcnode-id="4808" instrument_node="">The dose of medicine should also be </span><a data-dcnode-id="4806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2956196/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2956196/'); return false;"><span data-dcnode-id="4807" instrument_node="">adjusted</span></a><span data-dcnode-id="4805" instrument_node=""> for kidney function when someone’s eGFR is below 60 mL/min. This will prevent further damage to kidneys from high potassium. These include:&nbsp;</span></p><span data-dcnode-id="4803" instrument_node="">
</span><ul data-dcnode-id="4794"><li data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">ACE inhibitors</span></li><li data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">AT1 blockers</span></li><li data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">Renin inhibitor aliskiren</span></li><li data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">Spironolactone</span></li></ul><span data-dcnode-id="4793" instrument_node="">
</span><p data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">If you’re wondering how your medications can affect your kidney function it is best to talk with your doctor to know what is right for you.</span></p><span data-dcnode-id="4790" instrument_node="">
</span><h3 data-dcnode-id="4785"><span class="ez-toc-section" data-dcnode-id="4789" id="Lifestyle_Treatments_for_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">Lifestyle Treatments for Stage 3 Kidney Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="4786"></span></h3><span data-dcnode-id="4784" instrument_node="">
</span><p data-dcnode-id="4780"><a data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/africanamericanhealth/lifestyle_tips" onclick="javascript:window.open('https://www.kidney.org/africanamericanhealth/lifestyle_tips'); return false;"><span data-dcnode-id="4783" instrument_node="">LIfestyle treatments</span></a><span data-dcnode-id="4781" instrument_node=""> can be prescribed by both your medical doctor and renal dietitian. They include:&nbsp;</span></p><span data-dcnode-id="4779" instrument_node="">
</span><ul data-dcnode-id="4757"><li data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">Quit smoking</span></li><li data-dcnode-id="4773"><span data-dcnode-id="4776" instrument_node="">Get daily </span><a data-dcnode-id="4774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/kidney-exercise/"><span data-dcnode-id="4775" instrument_node="">exercise</span></a></li><li data-dcnode-id="4770"><a data-dcnode-id="4771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/prevention" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/prevention'); return false;"><span data-dcnode-id="4772" instrument_node="">Get enough sleep</span></a></li><li data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">Maintain a healthy weight</span></li><li data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">Control blood pressure</span></li><li data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">Control blood sugar</span></li><li data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">Avoid excessive pain medicine that harms the kidneys</span></li><li data-dcnode-id="4758"><span data-dcnode-id="4761" instrument_node="">Avoid too much </span><a data-dcnode-id="4759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/kidneys-and-alcohol/"><span data-dcnode-id="4760" instrument_node="">alcohol</span></a></li></ul><span data-dcnode-id="4756" instrument_node="">
</span><p data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">Some of these tips fall into nutritional treatment as well.</span></p><span data-dcnode-id="4753" instrument_node="">
</span><h3 data-dcnode-id="4748"><span class="ez-toc-section" data-dcnode-id="4752" id="Nutritional_Treatments_for_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">Nutritional Treatments for Stage 3 Kidney Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="4749"></span></h3><span data-dcnode-id="4747" instrument_node="">
</span><p data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">Nutritional treatments include looking at the diet and seeing where things may need to be adjusted. This will tell you what foods are helpful and harmful to the kidneys.&nbsp; These treatments can help to</span></p><span data-dcnode-id="4744" instrument_node="">
</span><ul data-dcnode-id="4735"><li data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Reduce blood pressure</span></li><li data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">Lower cholesterol</span></li><li data-dcnode-id="4738"><span data-dcnode-id="4739" instrument_node="">Lower blood sugar</span></li><li data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">Maintain a healthy weight</span></li></ul><span data-dcnode-id="4734" instrument_node="">
</span><h2 data-dcnode-id="4725"><span class="ez-toc-section" data-dcnode-id="4733" id="Nutritional_Treatments_to_Manage_Stage_3_Kidney_Disease_Prevent_Further_Damage"></span><strong data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">Nutritional Treatments to Manage </span></strong><strong data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">Stage 3 Kidney Disease</span></strong><strong data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node=""> &amp; Prevent Further Damage</span></strong><span class="ez-toc-section-end" data-dcnode-id="4726"></span></h2><span data-dcnode-id="4724" instrument_node="">
</span><p data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">In this section, we will go into greater detail about how to optimize nutrition status to manage stage 3 and prevent further kidney damage. We will discuss</span></p><span data-dcnode-id="4721" instrument_node="">
</span><ul data-dcnode-id="4710"><li data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">Managing existing conditions and complications</span></li><li data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">Labs to monitor</span></li><li data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">Nutrients to monitor</span></li><li data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">Foods to avoid</span></li><li data-dcnode-id="4711"><span data-dcnode-id="4712" instrument_node="">What foods to eat</span></li></ul><span data-dcnode-id="4709" instrument_node="">

</span><h3 data-dcnode-id="4658"><span class="ez-toc-section" data-dcnode-id="4662" id="Manage_Pre-Existing_Conditions_and_Complications"></span><strong data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">Manage Pre-Existing Conditions and Complications</span></strong><span class="ez-toc-section-end" data-dcnode-id="4659"></span></h3><span data-dcnode-id="4657" instrument_node="">
</span><p data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">Good nutrition can be helpful to improve complications and conditions in kidney disease. We will discuss how changes in the diet may help improve cardiovascular disease, high blood pressure, cholesterol, diabetes, anemia, nerve damage, uremia, electrolyte imbalances, metabolic acidosis, and weight management.&nbsp;</span></p><span data-dcnode-id="4654" instrument_node="">
</span><h4 data-dcnode-id="4651"><strong data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">Nutrition for Cardiovascular Disease&nbsp;</span></strong></h4><span data-dcnode-id="4650" instrument_node="">
</span><p data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">The risk of cardiovascular disease can be reduced by controlling the following:</span></p><span data-dcnode-id="4647" instrument_node="">
</span><ul data-dcnode-id="4615"><li data-dcnode-id="4644"><a data-dcnode-id="4645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="4646" instrument_node="">Blood pressure</span></a></li><li data-dcnode-id="4641"><a data-dcnode-id="4642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/diabetes/overview/preventing-problems/heart-disease-stroke" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/diabetes/overview/preventing-problems/heart-disease-stroke'); return false;"><span data-dcnode-id="4643" instrument_node="">Diabetes</span></a></li><li data-dcnode-id="4638"><a data-dcnode-id="4639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="4640" instrument_node="">Cholesterol</span></a></li><li data-dcnode-id="4635"><a data-dcnode-id="4636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/content/six-steps-control-high-potassium" onclick="javascript:window.open('https://www.kidney.org/content/six-steps-control-high-potassium'); return false;"><span data-dcnode-id="4637" instrument_node="">Potassium levels</span></a></li><li data-dcnode-id="4631"><a data-dcnode-id="4633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5620030/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5620030/'); return false;"><span data-dcnode-id="4634" instrument_node="">Calcium levels</span></a><span data-dcnode-id="4632" instrument_node="">&nbsp;</span></li><li data-dcnode-id="4628"><a data-dcnode-id="4629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="4630" instrument_node="">Phosphorus levels</span></a></li><li data-dcnode-id="4625"><a data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="4627" instrument_node="">Anemia</span></a></li><li data-dcnode-id="4622"><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="4624" instrument_node="">Bone disorders</span></a></li><li data-dcnode-id="4619"><a data-dcnode-id="4620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/diabetes/overview/preventing-problems/nerve-damage-diabetic-neuropathies/autonomic-neuropathy" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/diabetes/overview/preventing-problems/nerve-damage-diabetic-neuropathies/autonomic-neuropathy'); return false;"><span data-dcnode-id="4621" instrument_node="">Nerve damage</span></a></li><li data-dcnode-id="4616"><a data-dcnode-id="4617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/portal/utils/pageresolver.fcgi%3Frecordid%3D608b17efcc114d57767f5cde" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/portal/utils/pageresolver.fcgi?recordid=608b17efcc114d57767f5cde'); return false;"><span data-dcnode-id="4618" instrument_node="">Uremia</span></a></li></ul><span data-dcnode-id="4614" instrument_node="">
</span><h4 data-dcnode-id="4611"><strong data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">Nutrition for Hypertension (High Blood Pressure)</span></strong></h4><span data-dcnode-id="4610" instrument_node="">
</span><p data-dcnode-id="4605"><span data-dcnode-id="4609" instrument_node="">Having blood pressure under 130/85 mm Hg is </span><a data-dcnode-id="4607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="4608" instrument_node="">recommended</span></a><span data-dcnode-id="4606" instrument_node=""> for all stages of kidney disease. Those whose protein excretions are greater than 1 gram per 24 hours should aim for a blood pressure that is under 125/75 mmHg.</span></p><span data-dcnode-id="4604" instrument_node="">
</span><p data-dcnode-id="4599"><span data-dcnode-id="4603" instrument_node="">Maintaining a </span><a data-dcnode-id="4601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/blog/pressure-point/high-blood-pressure-and-kidneys-whats-connection-0" onclick="javascript:window.open('https://www.kidney.org/blog/pressure-point/high-blood-pressure-and-kidneys-whats-connection-0'); return false;"><span data-dcnode-id="4602" instrument_node="">healthy</span></a><span data-dcnode-id="4600" instrument_node=""> lifestyle can lower blood pressure. This is done through</span></p><span data-dcnode-id="4598" instrument_node="">
</span><ul data-dcnode-id="4582"><li data-dcnode-id="4595"><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/blog/pressure-point/high-blood-pressure-and-kidneys-whats-connection-0" onclick="javascript:window.open('https://www.kidney.org/blog/pressure-point/high-blood-pressure-and-kidneys-whats-connection-0'); return false;"><span data-dcnode-id="4597" instrument_node="">Having a nutritious diet</span></a></li><li data-dcnode-id="4592"><a data-dcnode-id="4593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/'); return false;"><span data-dcnode-id="4594" instrument_node="">Having a healthy weight</span></a></li><li data-dcnode-id="4589"><a data-dcnode-id="4590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/'); return false;"><span data-dcnode-id="4591" instrument_node="">Lowering salt intake</span></a></li><li data-dcnode-id="4586"><a data-dcnode-id="4587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/blog/pressure-point/high-blood-pressure-and-kidneys-whats-connection-0" onclick="javascript:window.open('https://www.kidney.org/blog/pressure-point/high-blood-pressure-and-kidneys-whats-connection-0'); return false;"><span data-dcnode-id="4588" instrument_node="">Getting daily exercise</span></a></li><li data-dcnode-id="4583"><a data-dcnode-id="4584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/blog/pressure-point/high-blood-pressure-and-kidneys-whats-connection-0" onclick="javascript:window.open('https://www.kidney.org/blog/pressure-point/high-blood-pressure-and-kidneys-whats-connection-0'); return false;"><span data-dcnode-id="4585" instrument_node="">Taking blood pressure medication if needed</span></a></li></ul><span data-dcnode-id="4581" instrument_node="">
</span><p data-dcnode-id="4576"><span data-dcnode-id="4580" instrument_node="">One easy thing you can do to lower blood pressure is cut back on your salt intake. Kidneys are responsible for controlling the sodium levels in your body. When you have poor kidney function cutting back on sodium can </span><a data-dcnode-id="4578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/nutrikidfail_stage1-4" onclick="javascript:window.open('https://www.kidney.org/atoz/content/nutrikidfail_stage1-4'); return false;"><span data-dcnode-id="4579" instrument_node="">prevent</span></a><span data-dcnode-id="4577" instrument_node=""> fluid buildup, swelling, and high blood pressure.</span></p><span data-dcnode-id="4575" instrument_node="">
</span><p data-dcnode-id="4570"><span data-dcnode-id="4574" instrument_node="">The </span><a data-dcnode-id="4572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/Dash_Diet" onclick="javascript:window.open('https://www.kidney.org/atoz/content/Dash_Diet'); return false;"><span data-dcnode-id="4573" instrument_node="">Dietary Approaches to Stop Hypertension (DASH)</span></a><span data-dcnode-id="4571" instrument_node=""> diet can decrease blood pressure and lower the risk of heart disease.&nbsp;</span></p><span data-dcnode-id="4569" instrument_node="">
</span><p data-dcnode-id="4564"><span data-dcnode-id="4568" instrument_node="">The </span><a data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/Dash_Diet" onclick="javascript:window.open('https://www.kidney.org/atoz/content/Dash_Diet'); return false;"><span data-dcnode-id="4567" instrument_node="">DASH diet</span></a><span data-dcnode-id="4565" instrument_node=""> is rich in fruits, vegetables, low-fat dairy, whole grains, fish, poultry, dry beans, seeds, and nuts. It is low in salt sodium, added sugars, and sweet.</span></p><span data-dcnode-id="4563" instrument_node="">
</span><p data-dcnode-id="4555"><span data-dcnode-id="4562" instrument_node="">The American Heart Association says people with hypertension should get about </span><a data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heart.org/en/health-topics/high-blood-pressure/changes-you-can-make-to-manage-high-blood-pressure/shaking-the-salt-habit-to-lower-high-blood-pressure" onclick="javascript:window.open('https://www.heart.org/en/health-topics/high-blood-pressure/changes-you-can-make-to-manage-high-blood-pressure/shaking-the-salt-habit-to-lower-high-blood-pressure'); return false;"><span data-dcnode-id="4561" instrument_node="">1,500 mg</span></a><span data-dcnode-id="4559" instrument_node=""> of sodium a day. However, your renal dietitian may have different </span><a data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/nutrikidfail_stage1-4" onclick="javascript:window.open('https://www.kidney.org/atoz/content/nutrikidfail_stage1-4'); return false;"><span data-dcnode-id="4558" instrument_node="">recommendations</span></a><span data-dcnode-id="4556" instrument_node=""> depending on your health status.</span></p><span data-dcnode-id="4554" instrument_node="">
</span><h4 data-dcnode-id="4551"><strong data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">Nutrition for Cholesterol</span></strong></h4><span data-dcnode-id="4550" instrument_node="">
</span><p data-dcnode-id="4542"><span data-dcnode-id="4549" instrument_node="">Nutrition can play a large role in lowering cholesterol. One thing you can do is start reading food labels. Foods with saturated fat turn into </span><a data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/july11/topten" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/july11/topten'); return false;"><span data-dcnode-id="4548" instrument_node="">cholesterol</span></a><span data-dcnode-id="4546" instrument_node=""> when digested in the body. Look for foods that are low in saturated fat. </span><a data-dcnode-id="4544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/july11/topten" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/july11/topten'); return false;"><span data-dcnode-id="4545" instrument_node="">Limit foods</span></a><span data-dcnode-id="4543" instrument_node=""> made with&nbsp;</span></p><span data-dcnode-id="4541" instrument_node="">
</span><ul data-dcnode-id="4522"><li data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">Coconut oil</span></li><li data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">Palm kernel oil</span></li><li data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">Palm oil</span></li><li data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">Lard</span></li><li data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">Shortening</span></li><li data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">Bacon fat</span></li><li data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">Cocoa butter</span></li><li data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">Butter</span></li><li data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">Margarine</span></li></ul><span data-dcnode-id="4521" instrument_node="">
</span><p data-dcnode-id="4516"><span data-dcnode-id="4520" instrument_node="">Alcohol can increase cholesterol levels so stick to just </span><a data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/july11/topten" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/july11/topten'); return false;"><span data-dcnode-id="4519" instrument_node="">one drink</span></a><span data-dcnode-id="4517" instrument_node=""> a day. Unless your physician says otherwise.&nbsp;&nbsp;</span></p><span data-dcnode-id="4515" instrument_node="">
</span><p data-dcnode-id="4511"><a data-dcnode-id="4513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/july11/topten" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/july11/topten'); return false;"><span data-dcnode-id="4514" instrument_node="">Increase</span></a><span data-dcnode-id="4512" instrument_node=""> your intake of fiber. Try to get at least 25 to 35 grams of fiber a day. Fiber can be found in fruits, vegetables, nuts, seeds, beans, and whole grains.</span></p><span data-dcnode-id="4510" instrument_node="">
</span><p data-dcnode-id="4503"><a data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/july11/topten" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/july11/topten'); return false;"><span data-dcnode-id="4509" instrument_node="">Swap</span></a><span data-dcnode-id="4507" instrument_node=""> fatty animal proteins for lean meats, poultry, and fish.&nbsp; </span><a data-dcnode-id="4505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/july11/topten" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/july11/topten'); return false;"><span data-dcnode-id="4506" instrument_node="">Don’t</span></a><span data-dcnode-id="4504" instrument_node=""> fry your food. Instead steam, broil, roast, and bake them to lower the fat content.</span></p><span data-dcnode-id="4502" instrument_node="">
</span><h4 data-dcnode-id="4499"><strong data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">Nutrition for Diabetes</span></strong></h4><span data-dcnode-id="4498" instrument_node="">
</span><p data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">When you have both diabetes and kidney disease you need to manage not only your blood sugar levels but also the level of nutrients like sodium, potassium, and phosphorus.&nbsp;</span></p><span data-dcnode-id="4495" instrument_node="">
</span><p data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">Optimizing blood sugar is necessary to manage your diabetics. This starts with your diet.&nbsp;</span></p><span data-dcnode-id="4492" instrument_node="">
</span><p data-dcnode-id="4487"><span data-dcnode-id="4491" instrument_node="">First, you want to make sure you are not getting too much sugar. Aim to have </span><a data-dcnode-id="4489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/prevent" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/prevent'); return false;"><span data-dcnode-id="4490" instrument_node="">less than</span></a><span data-dcnode-id="4488" instrument_node=""> 10% of your calories come from added sugar. This means if you are consuming 1,800 calories a day you want to get less than 180 calories from added sugar.&nbsp;</span></p><span data-dcnode-id="4486" instrument_node="">
</span><p data-dcnode-id="4481"><span data-dcnode-id="4485" instrument_node="">Secondly, carbohydrate intake should be monitored. This will </span><a data-dcnode-id="4483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.htmlhttps%3A//www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.html" onclick="javascript:window.open('https://www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.htmlhttps://www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.html'); return false;"><span data-dcnode-id="4484" instrument_node="">ensure</span></a><span data-dcnode-id="4482" instrument_node=""> you are not getting too many or too little carbs. It will also improve blood sugar regulation.&nbsp;</span></p><span data-dcnode-id="4480" instrument_node="">
</span><p data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">Normally people with diabetes should get about half of their calories from carbs. So if you have a 1,800 calorie diet you should eat about 800 to 900 calories from carbohydrates. Carbohydrates have 4 calories per gram. So that gives you a total of 200 to 225 grams of carbs per day.&nbsp;</span></p><span data-dcnode-id="4477" instrument_node="">
</span><p data-dcnode-id="4472"><span data-dcnode-id="4476" instrument_node="">Another way to keep blood sugar levels </span><a data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.htmlhttps%3A//www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.html" onclick="javascript:window.open('https://www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.htmlhttps://www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.html'); return false;"><span data-dcnode-id="4475" instrument_node="">stable</span></a><span data-dcnode-id="4473" instrument_node=""> throughout the day is by eating the same amount of carbs at each meal. If you are someone who takes insulin this may not be necessary since your insulin will match the carbs you eat.</span></p><span data-dcnode-id="4471" instrument_node="">
</span><p data-dcnode-id="4466"><span data-dcnode-id="4470" instrument_node="">The type of carb you consume also counts. You want to </span><a data-dcnode-id="4468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.html" onclick="javascript:window.open('https://www.cdc.gov/diabetes/managing/eat-well/diabetes-and-carbohydrates.html'); return false;"><span data-dcnode-id="4469" instrument_node="">limit</span></a><span data-dcnode-id="4467" instrument_node=""> your intake of refined carbs. This means fewer cookies, candies, cakes, pastries, white pasta, bread, and other refined foods. Instead, increase your intake of whole vegetables and fruits. These foods contain fiber which is known to regulate blood sugar.</span></p><span data-dcnode-id="4465" instrument_node="">
</span><p data-dcnode-id="4461"><span data-dcnode-id="4464" instrument_node="">When you have both CKD and diabetes you will also need to monitor your sodium, potassium, and phosphorus levels. </span><a data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/renal-diabetic-diet/"><span data-dcnode-id="4463" instrument_node="">Learn more about the renal diabetic diet here.</span></a></p><span data-dcnode-id="4460" instrument_node="">
</span><h5 data-dcnode-id="4457"><strong data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">Nutrition for Diabetes: Sodium, Potassium, and Phosphorus Recommendations</span></strong></h5><span data-dcnode-id="4456" instrument_node="">
</span><p data-dcnode-id="4451"><span data-dcnode-id="4455" instrument_node="">Sodium </span><a data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/newsroom/nr/LessDietarySodium" onclick="javascript:window.open('https://www.kidney.org/news/newsroom/nr/LessDietarySodium'); return false;"><span data-dcnode-id="4454" instrument_node="">recommendations</span></a><span data-dcnode-id="4452" instrument_node=""> are about 2,300 mg per day with ⅓ of it at each meal. If you have hypertension your intake should be around 1,500 mg per day.</span></p><span data-dcnode-id="4450" instrument_node="">
</span><p data-dcnode-id="4445"><span data-dcnode-id="4449" instrument_node="">Depending on your potassium levels you may need to monitor this mineral. Too much or too little can </span><a data-dcnode-id="4447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/nutrikidfail_stage1-4" onclick="javascript:window.open('https://www.kidney.org/atoz/content/nutrikidfail_stage1-4'); return false;"><span data-dcnode-id="4448" instrument_node="">be dangerous</span></a><span data-dcnode-id="4446" instrument_node=""> for your health. Your healthcare team can tell you if you need to cut back on this nutrient.&nbsp;</span></p><span data-dcnode-id="4444" instrument_node="">
</span><p data-dcnode-id="4439"><span data-dcnode-id="4443" instrument_node="">People with poor renal function need to </span><a data-dcnode-id="4441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/nutrikidfail_stage1-4" onclick="javascript:window.open('https://www.kidney.org/atoz/content/nutrikidfail_stage1-4'); return false;"><span data-dcnode-id="4442" instrument_node="">monitor</span></a><span data-dcnode-id="4440" instrument_node=""> phosphorus levels. If your kidneys are not clearing phosphorus from the body you may need to limit this in the diet. See what your renal dietitian says about your phosphorus intake.</span></p><span data-dcnode-id="4438" instrument_node="">
</span><p data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">(See what you should avoid when you have sodium, potassium, and phosphorus restrictions at the food list below).</span></p><span data-dcnode-id="4435" instrument_node="">
</span><p data-dcnode-id="4430"><span data-dcnode-id="4434" instrument_node="">Overall, making healthy food choices, understanding portion sizes, and learning the best time to eat will help </span><a data-dcnode-id="4432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/Quality-Of-Life-With-Diabetes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/Quality-Of-Life-With-Diabetes'); return false;"><span data-dcnode-id="4433" instrument_node="">manage</span></a><span data-dcnode-id="4431" instrument_node=""> your blood sugar and prevent your diabetes from worsening.&nbsp;</span></p><span data-dcnode-id="4429" instrument_node="">
</span><p data-dcnode-id="4424"><span data-dcnode-id="4428" instrument_node="">This means </span><a data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/01-10-8193_kbj_kls_pated_diabetes-pad_infographic.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/01-10-8193_kbj_kls_pated_diabetes-pad_infographic.pdf'); return false;"><span data-dcnode-id="4427" instrument_node="">cutting back</span></a><span data-dcnode-id="4425" instrument_node=""> on processed and sugary foods and drinks. Drinking more water and eating more fresh vegetables, fruit, and unprocessed whole grains.&nbsp;</span></p><span data-dcnode-id="4423" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="4413"><picture class="wp-image-3389" data-dcnode-id="4417"><span data-dcnode-id="4422" instrument_node="">
</span><source data-dcnode-id="4421" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-srcset="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/3.png.webp 800w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/3-120x300.png.webp 120w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/3-410x1024.png.webp 410w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/3-768x1920.png.webp 768w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/3-614x1536.png.webp 614w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%202000'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="4420" instrument_node="">

</span></noscript></figure><span data-dcnode-id="4412" instrument_node="">
</span><h4 data-dcnode-id="4409"><strong data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">Nutrition for Anemia</span></strong></h4><span data-dcnode-id="4408" instrument_node="">
</span><p data-dcnode-id="4397"><span data-dcnode-id="4407" instrument_node="">Many pre-dialysis patients </span><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="4406" instrument_node="">do not get</span></a><span data-dcnode-id="4404" instrument_node=""> adequate treatment for </span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/what-you-should-know-about-anemia-and-chronic-kidney-disease/"><span data-dcnode-id="4403" instrument_node="">anemia</span></a><span data-dcnode-id="4401" instrument_node="">. If you have symptoms of this condition it is imperative to correct this deficiency. </span><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/anemia.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/anemia.pdf'); return false;"><span data-dcnode-id="4400" instrument_node="">Nutrition interventions</span></a><span data-dcnode-id="4398" instrument_node=""> for anemia include getting more iron, folate, and vitamin B12 rich foods in the diet. These include:</span></p><span data-dcnode-id="4396" instrument_node="">
</span><ul data-dcnode-id="4387"><li data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">Leafy green vegetables</span></li><li data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">Eggs</span></li><li data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">Fish</span></li><li data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Liver</span></li></ul><span data-dcnode-id="4386" instrument_node="">
</span><p data-dcnode-id="4381"><span data-dcnode-id="4385" instrument_node="">Sometimes iron from food intake can not be enough. Some people may need to take an </span><a data-dcnode-id="4383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/what_anemia_ckd" onclick="javascript:window.open('https://www.kidney.org/atoz/content/what_anemia_ckd'); return false;"><span data-dcnode-id="4384" instrument_node="">iron supplement</span></a><span data-dcnode-id="4382" instrument_node=""> to overcome anemia. Be sure to discuss this with your healthcare team before starting any iron supplements.</span></p><span data-dcnode-id="4380" instrument_node="">
</span><h4 data-dcnode-id="4377"><strong data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">Nutrition for Bone Disorders</span></strong></h4><span data-dcnode-id="4376" instrument_node="">
</span><p data-dcnode-id="4368"><span data-dcnode-id="4375" instrument_node="">Stage 3 of CKD can result in </span><a data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="4374" instrument_node="">high bone turnover</span></a><span data-dcnode-id="4372" instrument_node=""> conditions. </span><a data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK560742/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK560742/'); return false;"><span data-dcnode-id="4371" instrument_node="">Treatment</span></a><span data-dcnode-id="4369" instrument_node=""> involves controlling phosphate, calcium, vitamin D, and parathyroid hormone levels. Potential nutritional interventions involve:&nbsp;</span></p><span data-dcnode-id="4367" instrument_node="">
</span><ul data-dcnode-id="4358"><li data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">Restricting intake of phosphorus-rich foods</span></li><li data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">Phosphate binders&nbsp;</span></li><li data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">Increase calcium intake with foods and supplements</span></li><li data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">Vitamin D rich foods and supplements</span></li></ul><span data-dcnode-id="4357" instrument_node="">
</span><h5 data-dcnode-id="4354"><strong data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">Restricting Intake of Phosphorus-Rich Foods</span></strong></h5><span data-dcnode-id="4353" instrument_node="">
</span><p data-dcnode-id="4348"><span data-dcnode-id="4352" instrument_node="">One way to lower phosphorus and increase calcium levels is to </span><a data-dcnode-id="4350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/mineral-bone-disorder%23important" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/mineral-bone-disorder#important'); return false;"><span data-dcnode-id="4351" instrument_node="">reduce</span></a><span data-dcnode-id="4349" instrument_node=""> dietary intake of phosphorus. Processed and packaged foods often have phosphorus added as a preservative.&nbsp;</span></p><span data-dcnode-id="4347" instrument_node="">
</span><p data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">If you see any foods with the words “PHOS” steer clear of them. Some foods and drinks are also naturally high in phosphorus, but research shows that.&nbsp;</span></p><span data-dcnode-id="4344" instrument_node="">
</span><p data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">(See below for a list of high phosphorus foods to avoid.)</span></p><span data-dcnode-id="4341" instrument_node="">
</span><h5 data-dcnode-id="4338"><strong data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">Phosphate Binders</span></strong></h5><span data-dcnode-id="4337" instrument_node="">
</span><p data-dcnode-id="4333"><a data-dcnode-id="4335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="4336" instrument_node="">Phosphate binders</span></a><span data-dcnode-id="4334" instrument_node=""> may also be prescribed if someone’s eGFR is below 50 mL/min. Increasing calcium and vitamin D levels can balance mineral levels. This will improve bone health. Depending on your levels you may be told to supplement vitamin D and calcium.&nbsp;</span></p><span data-dcnode-id="4332" instrument_node="">
</span><p data-dcnode-id="4329"><a data-dcnode-id="4330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.plantpoweredkidneys.com/phosphorus-binders"><span data-dcnode-id="4331" instrument_node="">Read more about phosphorus binders here.</span></a></p><span data-dcnode-id="4328" instrument_node="">
</span><h5 data-dcnode-id="4325"><strong data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">Increase Calcium Intake with Food and Supplements&nbsp;</span></strong></h5><span data-dcnode-id="4324" instrument_node="">
</span><p data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">Calcium levels should not be too high or too low. When calcium levels drop, PTH will take calcium from the bones. Excess calcium will prevent the conversion of vitamin D into its active form. Both processes can leave the bones weak and increase the risk of poor bone health.&nbsp;</span></p><span data-dcnode-id="4321" instrument_node="">
</span><p data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">One way to prevent this is to increase the calcium in the diet. The health of your kidneys will determine your calcium needs. Foods high in calcium include:</span></p><span data-dcnode-id="4318" instrument_node="">
</span><ul data-dcnode-id="4307"><li data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">Milk</span></li><li data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">Cheese</span></li><li data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Yogurt</span></li><li data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">Ice cream</span></li><li data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Leafy greens</span></li></ul><span data-dcnode-id="4306" instrument_node="">
</span><p data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">Many calcium foods are often high in phosphorus. This means if you have a phosphorus restriction you have to limit your intake of these foods.&nbsp;</span></p><span data-dcnode-id="4303" instrument_node="">
</span><h5 data-dcnode-id="4300"><strong data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">Vitamin D Rich Foods and Supplements</span></strong></h5><span data-dcnode-id="4299" instrument_node="">
</span><p data-dcnode-id="4294"><span data-dcnode-id="4298" instrument_node="">Adequate vitamin D is also needed to prevent bone disorders. The </span><a data-dcnode-id="4296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/factsheets/VitaminD-HealthProfessional/%23h3" onclick="javascript:window.open('https://ods.od.nih.gov/factsheets/VitaminD-HealthProfessional/#h3'); return false;"><span data-dcnode-id="4297" instrument_node="">best food sources</span></a><span data-dcnode-id="4295" instrument_node=""> include&nbsp;</span></p><span data-dcnode-id="4293" instrument_node="">
</span><ul data-dcnode-id="4282"><li data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">Trout</span></li><li data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">Salmon</span></li><li data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">Tuna</span></li><li data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">Mackerel</span></li><li data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">Fish liver oil</span></li></ul><span data-dcnode-id="4281" instrument_node="">
</span><p data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">Mushrooms, beef, liver, cheese, and egg yolks also have some vitamin D. Depending on your dietary restrictions the intake of some of these foods should be limited.&nbsp;</span></p><span data-dcnode-id="4278" instrument_node="">
</span><p data-dcnode-id="4273"><span data-dcnode-id="4277" instrument_node="">If you cannot get enough calcium or vitamin D through diet you may need to take a </span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf'); return false;"><span data-dcnode-id="4276" instrument_node="">supplement</span></a><span data-dcnode-id="4274" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="4272" instrument_node="">
</span><p data-dcnode-id="4261"><span data-dcnode-id="4271" instrument_node="">Be to ask your dietitian and doctor about </span><a data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.plantpoweredkidneys.com/phosphorus-binders"><span data-dcnode-id="4270" instrument_node="">phosphate binders</span></a><span data-dcnode-id="4268" instrument_node="">, </span><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/dairy-and-our-kidneys" onclick="javascript:window.open('https://www.kidney.org/atoz/content/dairy-and-our-kidneys'); return false;"><span data-dcnode-id="4267" instrument_node="">calcium</span></a><span data-dcnode-id="4265" instrument_node="">, or </span><a data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf'); return false;"><span data-dcnode-id="4264" instrument_node="">vitamin D</span></a><span data-dcnode-id="4262" instrument_node=""> supplements before taking them.</span></p><span data-dcnode-id="4260" instrument_node="">
</span><h4 data-dcnode-id="4257"><strong data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">Nutrition for Nerve Damage and Neurological Problems</span></strong></h4><span data-dcnode-id="4256" instrument_node="">
</span><p data-dcnode-id="4249"><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6452189/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6452189/'); return false;"><span data-dcnode-id="4255" instrument_node="">Inflammation</span></a><span data-dcnode-id="4253" instrument_node=""> from PTH, high blood sugar, and AGE’s can cause nerve damage. Eating a diet rich in fresh vegetables and fruits can </span><a data-dcnode-id="4251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2676354/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2676354/'); return false;"><span data-dcnode-id="4252" instrument_node="">prevent</span></a><span data-dcnode-id="4250" instrument_node=""> this.</span></p><span data-dcnode-id="4248" instrument_node="">
</span><p data-dcnode-id="4243"><span data-dcnode-id="4247" instrument_node="">Those with diabetic CKD </span><a data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="4246" instrument_node="">regulating</span></a><span data-dcnode-id="4244" instrument_node=""> blood sugar levels can also prevent the progression of autonomic and peripheral neuropathy.&nbsp;</span></p><span data-dcnode-id="4242" instrument_node="">
</span><p data-dcnode-id="4237"><span data-dcnode-id="4241" instrument_node="">Diet changes that can </span><a data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/diseases-conditions/autonomic-neuropathy/diagnosis-treatment/drc-20369836" onclick="javascript:window.open('https://www.mayoclinic.org/diseases-conditions/autonomic-neuropathy/diagnosis-treatment/drc-20369836'); return false;"><span data-dcnode-id="4240" instrument_node="">improve</span></a><span data-dcnode-id="4238" instrument_node=""> autonomic neuropathy include an increase in fiber and fluids. Be sure to ask your renal dietitian if you have any fluid restrictions.&nbsp;</span></p><span data-dcnode-id="4236" instrument_node="">
</span><p data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">Regulating potassium levels also helped prevent peripheral nerve damage.</span></p><span data-dcnode-id="4233" instrument_node="">
</span><p data-dcnode-id="4228"><span data-dcnode-id="4232" instrument_node="">High potassium levels may also be the </span><a data-dcnode-id="4230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="4231" instrument_node="">cause</span></a><span data-dcnode-id="4229" instrument_node=""> of uremic neuropathy. It impairs nerve function.&nbsp;</span></p><span data-dcnode-id="4227" instrument_node="">
</span><p data-dcnode-id="4219"><span data-dcnode-id="4226" instrument_node="">Vitamin B12 deficiency is </span><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="4225" instrument_node="">associated</span></a><span data-dcnode-id="4223" instrument_node=""> with some cognitive impairment in CKD. Increasing the level of this nutrient may help improve brain function. Foods </span><a data-dcnode-id="4221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/factsheets/VitaminB12-HealthProfessional/%23h3" onclick="javascript:window.open('https://ods.od.nih.gov/factsheets/VitaminB12-HealthProfessional/#h3'); return false;"><span data-dcnode-id="4222" instrument_node="">rich in B12</span></a><span data-dcnode-id="4220" instrument_node=""> include</span></p><span data-dcnode-id="4218" instrument_node="">
</span><ul data-dcnode-id="4205"><li data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">Fish</span></li><li data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">Meat</span></li><li data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Poultry</span></li><li data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">Eggs</span></li><li data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">Dairy products</span></li><li data-dcnode-id="4206"><span data-dcnode-id="4207" instrument_node="">Fortified nutritional yeast</span></li></ul><span data-dcnode-id="4204" instrument_node="">
</span><p data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">Depending on your dietary needs your renal dietitian may recommend a B12 supplement to increase levels.</span></p><span data-dcnode-id="4201" instrument_node="">
</span><h4 data-dcnode-id="4198"><strong data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">Nutrition for Uremia</span></strong></h4><span data-dcnode-id="4197" instrument_node="">
</span><p data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Nutrition for reducing uremia includes improving iron and calcium levels while decreasing phosphorus, potassium, and sodium intake.&nbsp;</span></p><span data-dcnode-id="4194" instrument_node="">
</span><p data-dcnode-id="4189"><span data-dcnode-id="4193" instrument_node="">The addition of iron-rich </span><a data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/anemia.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/anemia.pdf'); return false;"><span data-dcnode-id="4192" instrument_node="">foods</span></a><span data-dcnode-id="4190" instrument_node=""> like leafy greens and liver will correct iron deficiency. A supplement may be needed. Be sure to ask your renal RD before starting iron pills.</span></p><span data-dcnode-id="4188" instrument_node="">
</span><p data-dcnode-id="4183"><span data-dcnode-id="4187" instrument_node="">Calcium and phosphorus levels can be </span><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//intake/" onclick="javascript:window.open('http://intake/'); return false;"><span data-dcnode-id="4186" instrument_node="">regulated</span></a><span data-dcnode-id="4184" instrument_node=""> by limiting foods high in phosphorus and increasing calcium-rich foods that are low in phosphorus.&nbsp;</span></p><span data-dcnode-id="4182" instrument_node="">
</span><p data-dcnode-id="4177"><span data-dcnode-id="4181" instrument_node="">A phosphate binder, vitamin D, or calcium supplement </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//intake/" onclick="javascript:window.open('http://intake/'); return false;"><span data-dcnode-id="4180" instrument_node="">may be needed</span></a><span data-dcnode-id="4178" instrument_node=""> depending on your nutrient status. As always do not supplement without getting advice from your healthcare team.</span></p><span data-dcnode-id="4176" instrument_node="">
</span><p data-dcnode-id="4168"><span data-dcnode-id="4175" instrument_node="">Potassium and sodium </span><a data-dcnode-id="4173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK441859/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK441859/'); return false;"><span data-dcnode-id="4174" instrument_node="">intake</span></a><span data-dcnode-id="4172" instrument_node=""> should be 2,000 mg. Phosphorus </span><a data-dcnode-id="4170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK441859/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK441859/'); return false;"><span data-dcnode-id="4171" instrument_node="">intake</span></a><span data-dcnode-id="4169" instrument_node=""> should be lowered to 3,000 mg. You should also check with your renal RD if these levels are right for you.</span></p><span data-dcnode-id="4167" instrument_node="">
</span><p data-dcnode-id="4162"><span data-dcnode-id="4166" instrument_node="">Protein intake should also be </span><a data-dcnode-id="4164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK441859/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK441859/'); return false;"><span data-dcnode-id="4165" instrument_node="">limited</span></a><span data-dcnode-id="4163" instrument_node=""> in people with uremia. Recommendations are between 0.8 and 1 grams of protein per kilogram of weight. This means if you weigh 100 lbs you should be getting between 36 and 45 grams of protein a day.&nbsp;</span></p><span data-dcnode-id="4161" instrument_node="">
</span><p data-dcnode-id="4156"><span data-dcnode-id="4160" instrument_node="">If you have </span><a data-dcnode-id="4158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK441859/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK441859/'); return false;"><span data-dcnode-id="4159" instrument_node="">nephrotic syndrome</span></a><span data-dcnode-id="4157" instrument_node=""> your kidneys are losing a lot of protein in the urine. To combat these losses you should add one additional gram of protein for each gram that is lost in the urine.</span></p><span data-dcnode-id="4155" instrument_node="">
</span><p data-dcnode-id="4150"><span data-dcnode-id="4154" instrument_node="">If someone has </span><a data-dcnode-id="4152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK441859/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK441859/'); return false;"><span data-dcnode-id="4153" instrument_node="">advanced uremia or malnutrition</span></a><span data-dcnode-id="4151" instrument_node=""> a low protein diet can cause more damage and increase the risk of needing dialysis.</span></p><span data-dcnode-id="4149" instrument_node="">
</span><h4 data-dcnode-id="4146"><strong data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">Nutrition for Electrolyte Disorders (Salt and Water Retention)</span></strong></h4><span data-dcnode-id="4145" instrument_node="">
</span><p data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">The key to improving electrolyte disorders is to regulate sodium, potassium, and phosphorus levels.</span></p><span data-dcnode-id="4142" instrument_node="">
</span><p data-dcnode-id="4134"><span data-dcnode-id="4141" instrument_node="">Reducing sodium </span><a data-dcnode-id="4139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/'); return false;"><span data-dcnode-id="4140" instrument_node="">intake</span></a><span data-dcnode-id="4138" instrument_node=""> can reduce water retention and edema. This means using less salt in the diet. Ways to </span><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/newsroom/nr/LessDietarySodium" onclick="javascript:window.open('https://www.kidney.org/news/newsroom/nr/LessDietarySodium'); return false;"><span data-dcnode-id="4137" instrument_node="">lower</span></a><span data-dcnode-id="4135" instrument_node=""> salt in the diet include:</span></p><span data-dcnode-id="4133" instrument_node="">
</span><ul data-dcnode-id="4118"><li data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">Eating more fresh fruits and vegetables</span></li><li data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">Use fresh cuts of beef, chicken or pork contain natural sodium</span></li><li data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Canned and frozen fruits are also low in sodium</span></li><li data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">Get “fresh frozen” vegetables with no added seasoning or sauces</span></li><li data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">Look for products with a low sodium content (less than 130 mg per serving)</span></li><li data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">Select spices and seasonings with no sodium</span></li><li data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">Look for low sodium options when dining out</span></li></ul><span data-dcnode-id="4117" instrument_node="">
</span><p data-dcnode-id="4112"><span data-dcnode-id="4116" instrument_node="">You can lower potassium by limiting or </span><a data-dcnode-id="4114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf'); return false;"><span data-dcnode-id="4115" instrument_node="">avoiding</span></a><span data-dcnode-id="4113" instrument_node=""> high potassium fruits and vegetables if necessary. Examples of high potassium fruits and vegetables include:</span></p><span data-dcnode-id="4111" instrument_node="">
