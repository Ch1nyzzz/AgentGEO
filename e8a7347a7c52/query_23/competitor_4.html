</span><p data-dcnode-id="3059"><span data-dcnode-id="3066" instrument_node="">Phosphorus restrictions are not common in this stage of kidney disease, but if your labs show phosphorus </span><a data-dcnode-id="3064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/phosphorus" onclick="javascript:window.open('https://www.kidney.org/atoz/content/phosphorus'); return false;"><span data-dcnode-id="3065" instrument_node="">buildup</span></a><span data-dcnode-id="3063" instrument_node=""> you may need to cut back on foods and drinks </span><a data-dcnode-id="3061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-phosphorus-diet/"><span data-dcnode-id="3062" instrument_node="">high in phosphorus</span></a><span data-dcnode-id="3060" instrument_node="">.&nbsp; They include:</span></p><span data-dcnode-id="3058" instrument_node="">
</span><ul data-dcnode-id="2981"><li data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Canned foods</span></li><li data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Processed meats&nbsp;</span></li><li data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">Beer/ale</span></li><li data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">Chocolate drinks</span></li><li data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Cocoa</span></li><li data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Dark colas</span></li><li data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Drinks made with milk</span></li><li data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Canned iced teas</span></li><li data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">Pepper type soda (Dr., Pepper)</span></li><li data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Bottled beverages with phosphate additives (words with “PHOS” in them)</span></li><li data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Cheese</span></li><li data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">Custard</span></li><li data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Ice cream</span></li><li data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">Milk</span></li><li data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">Pudding</span></li><li data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Cream</span></li><li data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">Soups</span></li><li data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">Oysters</span></li><li data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">Sardines</span></li><li data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Beef</span></li><li data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">Liver</span></li><li data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">Chicken liver</span></li><li data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Fish roe</span></li><li data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">Organ meats</span></li><li data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Chocolate candy</span></li><li data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">Caramels</span></li><li data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Oat bran</span></li><li data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Muffin</span></li><li data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Most processed and prepared foods</span></li><li data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">Deli meats</span></li><li data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Hot dogs</span></li><li data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Bacon</span></li><li data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">Sausage</span></li><li data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">Pizza</span></li><li data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Brewer’s yeast</span></li><li data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Chocolate</span></li><li data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">Caramel candies</span></li><li data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Dried beans</span></li></ul><span data-dcnode-id="2980" instrument_node="">
</span><ul data-dcnode-id="2971"><li data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">Milk</span></li><li data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Nuts</span></li><li data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">Peanut butter</span></li><li data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">Peas</span></li></ul><span data-dcnode-id="2970" instrument_node="">
</span><h4 data-dcnode-id="2967"><strong data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">Avoid Foods High in Animal Protein</span></strong></h4><span data-dcnode-id="2966" instrument_node="">
</span><p data-dcnode-id="2958"><span data-dcnode-id="2965" instrument_node="">Those with CKD may need to limit or avoid foods that will put a strain on the kidneys and also contribute to metabolic acidosis. This means going on a </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-protein-diet/"><span data-dcnode-id="2964" instrument_node="">low-protein diet </span></a><span data-dcnode-id="2962" instrument_node="">and avoiding animal protein. Eating less protein will help </span><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/newsletter/breaking-down-dietary-protein" onclick="javascript:window.open('https://www.kidney.org/newsletter/breaking-down-dietary-protein'); return false;"><span data-dcnode-id="2961" instrument_node="">maintain</span></a><span data-dcnode-id="2959" instrument_node=""> kidney health. Foods high in protein include:&nbsp;</span></p><span data-dcnode-id="2957" instrument_node="">
</span><ul data-dcnode-id="2938"><li data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Beef</span></li><li data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Veal</span></li><li data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">Lamb</span></li><li data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Pork</span></li><li data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Chicken</span></li><li data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Turkey</span></li><li data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Fish</span></li><li data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">Seafood</span></li><li data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Eggs</span></li></ul><span data-dcnode-id="2937" instrument_node="">
</span><p data-dcnode-id="2932"><span data-dcnode-id="2936" instrument_node="">You can also get specific protein </span><a data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/newsletter/breaking-down-dietary-protein" onclick="javascript:window.open('https://www.kidney.org/newsletter/breaking-down-dietary-protein'); return false;"><span data-dcnode-id="2935" instrument_node="">recommendations</span></a><span data-dcnode-id="2933" instrument_node=""> from your renal dietitian.</span></p><span data-dcnode-id="2931" instrument_node="">
</span><h4 data-dcnode-id="2928"><strong data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Avoid Foods High Refined Carbohydrates</span></strong></h4><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2919"><span data-dcnode-id="2926" instrument_node="">Refined carbohydrates will </span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6139832/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6139832/'); return false;"><span data-dcnode-id="2925" instrument_node="">elevate</span></a><span data-dcnode-id="2923" instrument_node=""> glucose and </span><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/Diabetes-and-Kidney-Disease-Stages1-4%23%3A~%3Atext%3DA%2520high%2520level%2520of%2520sugar%2Ckidney%2520disease%2520and%2520kidney%2520failure." onclick="javascript:window.open('https://www.kidney.org/atoz/content/Diabetes-and-Kidney-Disease-Stages1-4#:~:text=A%20high%20level%20of%20sugar,kidney%20disease%20and%20kidney%20failure.'); return false;"><span data-dcnode-id="2922" instrument_node="">weaken</span></a><span data-dcnode-id="2920" instrument_node=""> the kidneys. Avoid these foods to help lower blood sugar:</span></p><span data-dcnode-id="2918" instrument_node="">
</span><ul data-dcnode-id="2895"><li data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">Sugar</span></li><li data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">White bread</span></li><li data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Pizza dough</span></li><li data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Pasta</span></li><li data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">Pastries</span></li><li data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">White flour</span></li><li data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">White rice</span></li><li data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Sweets&nbsp;</span></li><li data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Desserts</span></li><li data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">Breakfast cereals</span></li><li data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Sugary beverages</span></li></ul><span data-dcnode-id="2894" instrument_node="">
</span><h4 data-dcnode-id="2891"><strong data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Avoid Foods High in Unhealthy Fats</span></strong></h4><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2885"><span data-dcnode-id="2889" instrument_node="">Avoid fats that will increase your cholesterol, bad LDL, and risk of heart disease. These include saturated and trans fats. They are found in the </span><a data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/june14/dietary_fats-whats_the_Skinny" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/june14/dietary_fats-whats_the_Skinny'); return false;"><span data-dcnode-id="2888" instrument_node="">following</span></a><span data-dcnode-id="2886" instrument_node="">:&nbsp;</span></p><span data-dcnode-id="2884" instrument_node="">
</span><ul data-dcnode-id="2871"><li data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">Fatty meats</span></li><li data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Full fat dairy</span></li><li data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Baked goods (cakes, cookies, pies)</span></li><li data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Fried foods</span></li><li data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Shortening</span></li><li data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">Margarine</span></li></ul><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Any food that has the word “hydrogenated” in its ingredient list has trans fat and should not be consumed.</span></p><span data-dcnode-id="2867" instrument_node="">
</span><h4 data-dcnode-id="2864"><strong data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Avoid Alcoholic Beverages</span></strong></h4><span data-dcnode-id="2863" instrument_node="">
</span><p data-dcnode-id="2855"><span data-dcnode-id="2862" instrument_node="">Excess alcohol </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/alcohol" onclick="javascript:window.open('https://www.kidney.org/atoz/content/alcohol'); return false;"><span data-dcnode-id="2861" instrument_node="">intake</span></a><span data-dcnode-id="2859" instrument_node=""> can put a strain on the kidneys, increase blood pressure, and cause weight gain. One </span><a data-dcnode-id="2857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/prevention" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/prevention'); return false;"><span data-dcnode-id="2858" instrument_node="">drink</span></a><span data-dcnode-id="2856" instrument_node=""> is any of the following:</span></p><span data-dcnode-id="2854" instrument_node="">
</span><ul data-dcnode-id="2847"><li data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">12 ounces of beer</span></li><li data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">5 ounces of wine</span></li><li data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">1.5 ounces of liquor</span></li></ul><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Some recommendations say that one drink a day is ok but it depends on your kidney function. Ask your renal dietitian what is right for you.</span></p><span data-dcnode-id="2843" instrument_node="">
</span><h3 data-dcnode-id="2836"><span class="ez-toc-section" data-dcnode-id="2842" id="Foods_to_Eat_with_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">Foods to Eat with </span></strong><strong data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Stage 3 Kidney Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="2837"></span></h3><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">You may be left feeling there are a lot of restrictions during stage 3 of CKD. Don’t fret, there is still a lot you can eat during this stage. In this section we break out the foods you should eat when you have stage 3 kidney disease.</span></p><span data-dcnode-id="2832" instrument_node="">
</span><p data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">These nutrients will help your kidneys thrive. So let’s dive into what foods to incorporate into your diet.</span></p><span data-dcnode-id="2829" instrument_node="">
</span><h4 data-dcnode-id="2826"><strong data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Low Sodium Foods</span></strong></h4><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2824" instrument_node="">We know salt can be </span><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/sodiumckd" onclick="javascript:window.open('https://www.kidney.org/atoz/content/sodiumckd'); return false;"><span data-dcnode-id="2823" instrument_node="">problematic</span></a><span data-dcnode-id="2821" instrument_node=""> for weak kidneys. So look for foods that have little to no sodium. These include the following:</span></p><span data-dcnode-id="2819" instrument_node="">
</span><ul data-dcnode-id="2763"><li data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">Fruits&nbsp;</span></li><li data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Vegetables</span></li><li data-dcnode-id="2812"><span data-dcnode-id="2813" style="font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Oxygen-Sans, Ubuntu, Cantarell, &quot;Helvetica Neue&quot;, sans-serif; font-size: 1rem;"><span data-dcnode-id="2814" instrument_node="">Frozen fruit with no added dressings or seasoning</span></span></li><li data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Fresh garlic</span></li><li data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Fresh onion</span></li><li data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Garlic powder</span></li><li data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Onion powder</span></li><li data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Black pepper</span></li><li data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">Lemon juice</span></li><li data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Low-sodium/salt-free seasoning blends</span></li><li data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Vinegar</span></li><li data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Homemade or low-sodium sauces and salad dressings</span></li><li data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Vinegar</span></li><li data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Dry mustard</span></li><li data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">Popcorn (unsalted or low sodium)</span></li><li data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Pretzels (unsalted or low sodium)</span></li><li data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">Tortilla or corn chips (unsalted or low sodium)</span></li><li data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">Low-salt deli meats (unless you have phosphorus restrictions)</span></li><li data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Natural cheese (1-2 oz per week)</span></li><li data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Homemade or low-sodium soups</span></li><li data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Canned food with no added salt</span></li><li data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Homemade casseroles with no added salt</span></li><li data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Fresh meat (beef, veal, pork, poultry)</span></li><li data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Fish&nbsp;(fresh)</span></li><li data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Eggs</span></li><li data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Rice</span></li><li data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">No added sodium pasta</span></li></ul><span data-dcnode-id="2762" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2761" instrument_node="">Packaged foods will often have the </span><a data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/sodiumckd" onclick="javascript:window.open('https://www.kidney.org/atoz/content/sodiumckd'); return false;"><span data-dcnode-id="2760" instrument_node="">terms</span></a><span data-dcnode-id="2758" instrument_node=""> sodium-free, low sodium, very low sodium, reduced sodium, and light in sodium written on them.&nbsp;</span></p><span data-dcnode-id="2756" instrument_node="">
</span><figure class="wp-block-table is-style-regular" data-dcnode-id="2724"><table class="has-fixed-layout" data-dcnode-id="2727"><tbody data-dcnode-id="2728"><tr data-dcnode-id="2740"><td data-dcnode-id="2753"><strong data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">Sodium Free</span></strong></td><td data-dcnode-id="2750"><strong data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Very Low Sodium</span></strong></td><td data-dcnode-id="2747"><strong data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">Low Sodium</span></strong></td><td data-dcnode-id="2744"><strong data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Reduced Sodium</span></strong></td><td data-dcnode-id="2741"><strong data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Light/Lite Sodium</span></strong></td></tr><tr data-dcnode-id="2729"><td data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Trivial amount of sodium per serving.</span></td><td data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">35 milligrams or less per serving</span></td><td data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">140 milligrams or less per serving</span></td><td data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">25% less sodium than the original product</span></td><td data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">50% less sodium than the original product</span></td></tr></tbody></table><figcaption data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">These are different labels you may see when it comes to sodium claims.</span></figcaption></figure><span data-dcnode-id="2723" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">If you see salt listed in the first 5 ingredients it is probably too high in sodium. This is because ingredients are listed by weight.</span></p><span data-dcnode-id="2720" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="2710"><picture class="wp-image-3390" data-dcnode-id="2714"><span data-dcnode-id="2719" instrument_node="">
</span><source data-dcnode-id="2718" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-srcset="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1.png.webp 800w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-120x300.png.webp 120w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-410x1024.png.webp 410w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-768x1920.png.webp 768w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-614x1536.png.webp 614w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%202000'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="2717" instrument_node="">
</span><img alt="Top tips for starting a kidney-friendly diet:

1) Limit Salt. Whether or not your kidney issues were caused by high blood pressure, salt is everywhere. Start by limiting how often you go out to eat (and make smart choices when you do). Next, read labels to look for sodium content.

2) Learn about Potassium. Many times, people believe that potassium restriction is necessary with CKD. This restriction is still based on individuals and is not helpful if it's not necessary. Speak with your healthcare team to learn if you need to limit potassium.

3) Less Protein is more helpful. Protein is a hard macronutrient for the kidneys to manage. Depending on your kidney health, limiting protein may be kidney-protective. It's important to work with a dietitian to prevent malnutrition and other nutritional deficiencies.

4) Avoid Phosphorus Additives. The very first step in phosphorus is label reading. Any food label that includes an ingredient with &quot;PHOS&quot; should be limited or avoided. This will protect your kidneys and cardiovascular system!

5) Variety is key! By including a variety of fruits, vegetables, whole grains, and healthy fats, you'll be giving your body more nutrients. Avoid getting into too much of a &quot;rut-tine&quot; by switching up your go-to meals." data-dcnode-id="2716" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1.png" data-lazy-srcset="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1.png 800w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-120x300.png 120w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-410x1024.png 410w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-768x1920.png 768w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-614x1536.png 614w" height="2000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%202000'%3E%3C/svg%3E" width="800"><span data-dcnode-id="2715" instrument_node="">
</span></picture><span data-dcnode-id="2713" instrument_node="">
</span><noscript data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">&lt;picture class="wp-image-3390"&gt;
&lt;source type="image/webp" srcset="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1.png.webp 800w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-120x300.png.webp 120w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-410x1024.png.webp 410w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-768x1920.png.webp 768w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/4-1-614x1536.png.webp 614w" sizes="(max-width: 800px) 100vw, 800px"/&gt;

</span><h4 data-dcnode-id="2706"><strong data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Low Potassium Foods</span></strong></h4><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2697"><span data-dcnode-id="2704" instrument_node="">Typically stage 3 does not require a </span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-potassium-diet/"><span data-dcnode-id="2703" instrument_node="">potassium</span></a><span data-dcnode-id="2701" instrument_node=""> restriction. However, if your potassium levels are going through the roof you will need to incorporate these </span><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-potassium-diet/"><span data-dcnode-id="2700" instrument_node="">low potassium foods</span></a><span data-dcnode-id="2698" instrument_node="">:</span></p><span data-dcnode-id="2696" instrument_node="">
</span><ul data-dcnode-id="2577"><li data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">Alfalfa sprouts</span></li><li data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Rice</span></li><li data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">Apple Juice</span></li><li data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Asparagus (6 spears raw)</span></li><li data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Noodles</span></li><li data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Applesauce</span></li><li data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Green or wax beans</span></li><li data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Broccoli (raw or cooked from frozen)</span></li><li data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Pasta</span></li><li data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Canned apricots (in juice)</span></li><li data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Green and red cabbage</span></li><li data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Cookies carrots</span></li><li data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Blackberries</span></li><li data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Cauliflower</span></li><li data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Angel food cake</span></li><li data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">YellowcakePoundcake</span></li><li data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Blueberries</span></li><li data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">Celery (1 stalk)</span></li><li data-dcnode-id="2656"><span data-dcnode-id="2659" instrument_node="">8 oz of </span><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/is-coffee-bad-for-kidneys/"><span data-dcnode-id="2658" instrument_node="">coffee</span></a></li><li data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Cherries</span></li><li data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">Fresh corn (½ ear)&nbsp;</span></li><li data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Frozen corn (½ cup)</span></li><li data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Pies without chocolate or high potassium fruit</span></li><li data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Cranberries</span></li><li data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Cucumber</span></li><li data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Cookies without nuts or chocolate</span></li><li data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Fruit Cocktail</span></li><li data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Eggplant</span></li><li data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">16 oz of tea</span></li><li data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Grapes</span></li><li data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Kale</span></li><li data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">Grape Juice</span></li><li data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Lettuce&nbsp;</span></li><li data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Grapefruit (½ whole)</span></li><li data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Mixed Vegetables</span></li><li data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Mandarin Oranges</span></li><li data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Raw white Mushrooms&nbsp; (½ cup)</span></li><li data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Fresh peaches (1 small)&nbsp;</span></li><li data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Canned peaches (½ cup)</span></li><li data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Onions</span></li><li data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">Fresh pears (1 small)&nbsp;</span></li><li data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Canned pears&nbsp; (½ cup)</span></li><li data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Parsley</span></li><li data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Pineapple</span></li><li data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Green peas</span></li><li data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Pineapple juice</span></li><li data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Peppers</span></li><li data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Plums (1 whole)</span></li><li data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Radish</span></li><li data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Raspberries</span></li><li data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">Rhubarb</span></li><li data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Strawberries</span></li><li data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">Canned water chestnuts</span></li><li data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Tangerine (1 whole)</span></li><li data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">Watercress</span></li><li data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">Watermelon (limit to 1 cup)</span></li><li data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Yellow Squash</span></li><li data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Zucchini Squash</span></li></ul><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2568"><span data-dcnode-id="2575" instrument_node="">You can also </span><a data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jrnjournal.org/article/S1051-2276%2808%2900391-9/fulltext" onclick="javascript:window.open('https://www.jrnjournal.org/article/S1051-2276(08)00391-9/fulltext'); return false;"><span data-dcnode-id="2574" instrument_node="">reduce potassium</span></a><span data-dcnode-id="2572" instrument_node=""> content by double-boiling foods. For more information about low potassium foods, check out this </span><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-potassium-diet/"><span data-dcnode-id="2571" instrument_node="">article</span></a><span data-dcnode-id="2569" instrument_node="">.</span></p><span data-dcnode-id="2567" instrument_node="">
</span><h4 data-dcnode-id="2564"><strong data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Low Phosphorus Foods</span></strong></h4><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2559"><span data-dcnode-id="2562" instrument_node="">Typically stage 3 kidney disease does not require a phosphorus restriction. If your phosphorus levels are increasing you will need to limit your phosphorus intake. This means looking for alternative foods that are low in this mineral. They </span><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-phosphorus-diet/"><span data-dcnode-id="2561" instrument_node="">include</span></a></p><span data-dcnode-id="2558" instrument_node="">
</span><ul data-dcnode-id="2505"><li data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Rice milk</span></li><li data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Almond milk</span></li><li data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Cottage cheese</span></li><li data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Vegan cheese</span></li><li data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Sherbet</span></li><li data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Popsicles</span></li><li data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Greek yogurt</span></li><li data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Apples</span></li><li data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Berries</span></li><li data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Grapes</span></li><li data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Carrot sticks</span></li><li data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">Cucumber</span></li><li data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Rice cakes</span></li><li data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Pretzels (unsalted or low sodium)</span></li><li data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">Popcorn (unsalted or low sodium)</span></li><li data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Crackers (unsalted or low sodium)</span></li><li data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Poundcake</span></li><li data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Sugar cookies&nbsp;</span></li><li data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Chicken</span></li><li data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Turkey</span></li><li data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Fish</span></li><li data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Beef</span></li><li data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Veal</span></li><li data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Eggs</span></li><li data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Lamb</span></li><li data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Pork&nbsp;</span></li></ul><span data-dcnode-id="2504" instrument_node="">
</span><h4 data-dcnode-id="2501"><strong data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Calcium-Rich Foods (Low in Potassium and Phosphorus)</span></strong></h4><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2499" instrument_node="">Some people with stage 3 kidney disease need calcium. Unfortunately, some calcium-rich foods are also </span><a data-dcnode-id="2497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/nutrikidfail_stage1-4" onclick="javascript:window.open('https://www.kidney.org/atoz/content/nutrikidfail_stage1-4'); return false;"><span data-dcnode-id="2498" instrument_node="">high</span></a><span data-dcnode-id="2496" instrument_node=""> in phosphorus and potassium. If you require calcium but have a potassium and phosphorus restriction you can increase your intake of these foods:</span></p><span data-dcnode-id="2494" instrument_node="">
</span><ul data-dcnode-id="2485"><li data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Kale</span></li><li data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Sardines</span></li><li data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Arugula</span></li><li data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Tofu</span></li></ul><span data-dcnode-id="2484" instrument_node="">
</span><h4 data-dcnode-id="2481"><strong data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Low Protein and Plant Protein Foods</span></strong></h4><span data-dcnode-id="2480" instrument_node="">
</span><p data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">When the kidneys are not working well a high protein may lead to uremia. Large intakes of animal proteins can also increase your chance of metabolic acidosis.&nbsp;</span></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2476" instrument_node="">A way to </span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-protein-diet/"><span data-dcnode-id="2475" instrument_node="">lower your protein intake</span></a><span data-dcnode-id="2473" instrument_node=""> is by stretching it out. This will extend your protein in recipes so that a small amount will satisfy your needs. Here are some </span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/lowprotrecipes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/lowprotrecipes'); return false;"><span data-dcnode-id="2472" instrument_node="">ways</span></a><span data-dcnode-id="2470" instrument_node=""> to do this:</span></p><span data-dcnode-id="2468" instrument_node="">
</span><ul data-dcnode-id="2449"><li data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Pump up thinly sliced meats in sandwiches with a lot renal friendly veggies</span></li><li data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Make cream soups, rice, and pasta sauces more filling with milk substitutes</span></li><li data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Use meat as a side dish or small complement to your meal</span></li><li data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Mix small pieces of meat like kabobs with a lot of veggies</span></li><li data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Use a lot of veggies mixed with grains like rice and pasta and very little meat</span></li><li data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Make a salad with some small pieces of meat and egg&nbsp;&nbsp;</span></li><li data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Decrease the meat in a casserole</span></li><li data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Increase your starch and low-protein pasta in soups</span></li><li data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Stronger cheeses can&nbsp; be used in smaller quantities for the same flavor</span></li></ul><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Another way to limit protein is by going vegetarian or vegan.&nbsp;</span></p><span data-dcnode-id="2445" instrument_node="">
</span><h4 data-dcnode-id="2442"><strong data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Complex Carbs and Foods High In Fiber</span></strong></h4><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2440" instrument_node="">Getting more complex carbs will help to slow blood sugar levels. These can be found in vegetables and whole grains. It is recommended to get at least 6 servings of whole grains per day. These </span><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/vegetarian-diet-and-ckd" onclick="javascript:window.open('https://www.kidney.org/atoz/content/vegetarian-diet-and-ckd'); return false;"><span data-dcnode-id="2439" instrument_node="">include</span></a><span data-dcnode-id="2437" instrument_node="">:</span></p><span data-dcnode-id="2435" instrument_node="">
</span><ul data-dcnode-id="2420"><li data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Grain pasta</span></li><li data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Brown rice</span></li><li data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Barley</span></li><li data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Quinoa</span></li><li data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Millet</span></li><li data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Couscous</span></li><li data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Amaranth&nbsp;</span></li></ul><span data-dcnode-id="2419" instrument_node="">
</span><h4 data-dcnode-id="2416"><strong data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Healthy Fat Foods</span></strong></h4><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2414" instrument_node="">Our bodies need fat to </span><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nigms.nih.gov/education/Inside-Life-Science/Pages/what-do-fats-do-in-the-body.aspx" onclick="javascript:window.open('https://www.nigms.nih.gov/education/Inside-Life-Science/Pages/what-do-fats-do-in-the-body.aspx'); return false;"><span data-dcnode-id="2413" instrument_node="">function</span></a><span data-dcnode-id="2411" instrument_node=""> properly, but too much of the wrong fat can cause problems for the kidneys. Healthy fats to incorporate into the diet include:&nbsp;</span></p><span data-dcnode-id="2409" instrument_node="">
</span><ul data-dcnode-id="2404"><li data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Monounsaturated fats (MUFAs)</span></li><li data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Polyunsaturated fats (PUFAs)</span></li></ul><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Monounsaturated fats (MUFAs) are good for you but they should also be eaten in moderation. They help lower the bad LDL cholesterol. This can reduce the risk of cardiovascular disease. Good sources for MUFAs are&nbsp;</span></p><span data-dcnode-id="2400" instrument_node="">
</span><ul data-dcnode-id="2381"><li data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Olive oil</span></li><li data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Canola oil</span></li><li data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Peanut oil</span></li><li data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Sunflower oil</span></li><li data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Sesame oil</span></li><li data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Avocados</span></li><li data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Nuts</span></li><li data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Seeds</span></li><li data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Peanut butter</span></li></ul><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2375"><span data-dcnode-id="2379" instrument_node="">Polyunsaturated fats (PUFAs) are also good for cholesterol and lowering heart disease risk. There are two types of PUFAs: omega-6 and omega-3. These are not made by the body and must be obtained from the diet. Sources of PUFAs </span><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/june14/dietary_fats-whats_the_Skinny" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/june14/dietary_fats-whats_the_Skinny'); return false;"><span data-dcnode-id="2378" instrument_node="">include</span></a><span data-dcnode-id="2376" instrument_node="">:</span></p><span data-dcnode-id="2374" instrument_node="">
</span><ul data-dcnode-id="2357"><li data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">Soybean oil</span></li><li data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">Corn oil</span></li><li data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Safflower oil</span></li><li data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Some nuts and seeds</span></li><li data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">Salmon</span></li><li data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Mackerel</span></li><li data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Herring and</span></li><li data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Trout.&nbsp;</span></li></ul><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">However, depending on your dietary restrictions you may not be able to consume some of these foods. It is best to talk with your renal RD about where to get your fat in the diet.</span></p><span data-dcnode-id="2353" instrument_node="">
</span><h2 data-dcnode-id="2346"><span class="ez-toc-section" data-dcnode-id="2352" id="Stage_3_Renal_Diet_Menu_Plan"></span><strong data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Stage 3 </span></strong><strong data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Renal Diet Menu Plan</span></strong><span class="ez-toc-section-end" data-dcnode-id="2347"></span></h2><span data-dcnode-id="2345" instrument_node="">

</span><p data-dcnode-id="2176"><span data-dcnode-id="2180" instrument_node="">Please know that this is only a sample and there is </span><a data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/nutrikidfail_stage1-4" onclick="javascript:window.open('https://www.kidney.org/atoz/content/nutrikidfail_stage1-4'); return false;"><span data-dcnode-id="2179" instrument_node="">no one right</span></a><span data-dcnode-id="2177" instrument_node=""> eating plan for everyone. Kidney health, pre-existing conditions, and the levels of protein, sodium, potassium, phosphorus, and calcium in the blood will determine what type of diet you need.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">You should meet regularly with a renal dietitian so you can get a personalized meal plan that is tailored specifically to improve your health.</span></p><span data-dcnode-id="2172" instrument_node="">
</span><h2 data-dcnode-id="2163"><span class="ez-toc-section" data-dcnode-id="2171" id="Does_Stage_3_Kidney_Disease_Require_Dialysis"></span><strong data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Does </span></strong><strong data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Stage 3 Kidney Disease</span></strong><strong data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node=""> Require Dialysis?</span></strong><span class="ez-toc-section-end" data-dcnode-id="2164"></span></h2><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Stage 3 kidney disease does not require dialysis. However, if you’re wondering, does stage 3 kidney disease always progress to needing dialysis? The answer varies depending on how well you’re taking care of yourself.</span></p><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2158" instrument_node="">According to </span><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2887275/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2887275/'); return false;"><span data-dcnode-id="2157" instrument_node="">research</span></a><span data-dcnode-id="2155" instrument_node="">, stage 3 kidney disease can progress to stage 4. Having renal failure and needing dialysis is rare but is still possible for people with stage 3 kidney disease. Most cases of ESRD were specifically among those with stage 3-B.&nbsp;</span></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">If you are worried about disease progression and dialysis the best thing you can do is to adhere to the medical and nutritional recommendations above. These will help to preserve kidney function and stop you from needing dialysis or a kidney transplant.</span></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2145"><span data-dcnode-id="2149" instrument_node="">If you’re curious how to know when you need dialysis you want to look for signs that indicate </span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/kidney-failure/what-is-kidney-failure%23symptoms" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/kidney-failure/what-is-kidney-failure#symptoms'); return false;"><span data-dcnode-id="2148" instrument_node="">kidney failure</span></a><span data-dcnode-id="2146" instrument_node="">. They include</span></p><span data-dcnode-id="2144" instrument_node="">
</span><ul data-dcnode-id="2105"><li data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Swelling in the extremities (hands, feet, ankles)</span></li><li data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Headaches</span></li><li data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Itchy skin</span></li><li data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Fatigue</span></li><li data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Insomnia</span></li><li data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Nausea/vomiting</span></li><li data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">No sense of taste</span></li><li data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Loss of appetite</span></li><li data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Unintentional weight loss</span></li><li data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Little or no urine</span></li><li data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Numbness</span></li><li data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Muscle cramps</span></li><li data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Weakness</span></li><li data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Pain</span></li><li data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Stiffness</span></li><li data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Fluid in your joints</span></li><li data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Brain fog</span></li><li data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Confusion</span></li><li data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Poor memory</span></li></ul><span data-dcnode-id="2104" instrument_node="">
</span><h2 data-dcnode-id="2097"><span class="ez-toc-section" data-dcnode-id="2103" id="Life_Expectancy_for_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Life Expectancy for&nbsp; </span></strong><strong data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Stage 3 Kidney Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="2098"></span></h2><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">When diagnosed and managed, stage 3 kidney disease varies but is longer than later stages of the disease.&nbsp;</span></p><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2088"><span data-dcnode-id="2092" instrument_node="">It is very likely you can expand your life by stopping this disease from progressing any further. According to a </span><a data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22545920" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pubmed/22545920'); return false;"><span data-dcnode-id="2091" instrument_node="">10-year-study</span></a><span data-dcnode-id="2089" instrument_node="">, about half of the participants with stage 3 CKD prevented further damage and did not experience advanced stages of the disease.&nbsp;</span></p><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Instead of worrying about how long you have to live, you should focus on how to stop this disease from progressing to the point where you’re putting yourself at risk for death. Furthermore, managing co-existing conditions and complications listed above can improve your life expectancy.</span></p><span data-dcnode-id="2084" instrument_node="">
</span><h2 data-dcnode-id="2079"><span class="ez-toc-section" data-dcnode-id="2083" id="Summary"></span><strong data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Summary</span></strong><span class="ez-toc-section-end" data-dcnode-id="2080"></span></h2><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Though you may be suffering from stage 3 kidney disease there is still a lot you can do to preserve your kidney health. Working to protect your kidneys will minimize complications and prevent disease progression. It will also prevent you from needing dialysis or a kidney transplant down the line.&nbsp;</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">It all starts with taking charge of your nutrition, health, and lifestyle habits. This means using nutrition interventions to lower inflammation and improve existing conditions such as anemia, hypertension, heart disease, and diabetes.</span></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2071" instrument_node="">You also need to be an advocate for your health. This can be done by monitoring labs, nutrient levels, and your food intake. It all starts with having an </span><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/nutrikidfail_stage1-4" onclick="javascript:window.open('https://www.kidney.org/atoz/content/nutrikidfail_stage1-4'); return false;"><span data-dcnode-id="2070" instrument_node="">eating plan</span></a><span data-dcnode-id="2068" instrument_node=""> that gives you the right amount of protein, calories, vitamins, and minerals.&nbsp;</span></p><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Avoid foods that can make your condition worse and focus on foods that will give you the right balance of nutrients to help your body thrive. If you’re wondering what is right for you, the best thing to do is work with a renal dietitian to get an individualized nutrition plan that will improve your health.</span></p><span data-dcnode-id="2063" instrument_node="">

</span><p data-dcnode-id="1257"><span data-dcnode-id="1261" instrument_node="">Whoops! Thanks for catching that, Sally. Broccoli is considered a high potassium food as it has </span><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/747447/nutrients" onclick="javascript:window.open('https://fdc.nal.usda.gov/fdc-app.html#/food-details/747447/nutrients'); return false;" rel="noopener nofollow ugc"><span data-dcnode-id="1260" instrument_node="">230 milligrams of potassium</span></a><span data-dcnode-id="1258" instrument_node=""> per cup of raw. But if you stuck to a 1/2 cup serving, it would be only half of that. Therefore, it would qualify as low potassium in a smaller serving. But you’re right- including it on both lists can be very confusing and that was a mistake. </span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The big thing about a renal diet is that pretty much anything can fit if you want it to. It comes down to following your own CKD journey and working with a healthcare team that can guide you.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">We can’t say everyone should eat this or no one can eat that, because that isn’t true. I know this doesn’t make things much more clear, but know that there are so many opportunities and flexibilities in finding the right CKD diet that works for you and your kidneys. 🙂</span></p><span data-dcnode-id="1250" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="1162"><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1184" instrument_node="">Hello Jen,</span><br data-dcnode-id="1183"><span data-dcnode-id="1182" instrument_node="">
I have an appointment with one of you this next week on Monday.</span><br data-dcnode-id="1181"><span data-dcnode-id="1180" instrument_node="">
I discovered two months ago that I am in Stage 2 in my country, El Salvador. Sadly, I found that my PCP in the US for 24 years never mentioned that my GFR jumped up and down for several years. Why don’t doctors alert us to these things? He always was saying that my menopause was related to my urination. I am 54 with a GFR of 64 in blood, but the 24 urine test shows 75 GFR. So far, all no protein in my urine and phosphorus, sodium, and potassium are still inside the normal ranges. My big surprise was that I was not drinking enough water according to my height, weight, my active life, and I was eating a healthy diet, but it was not friendly for my kidneys!</span><br data-dcnode-id="1179"><span data-dcnode-id="1178" instrument_node="">
I have two questions for you.</span><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">
What is GFR more exact? The one in the blood that is a formula or the 24 hours urine test that I produce?</span><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">
Do you think that with a friendly kidney diet, I will have my ranges (min and max) of protein, phosphorus, potassium, and sodium that keep my fingers crossed that I will stay in stage 2 for a longer time?</span><br data-dcnode-id="1173"><span data-dcnode-id="1172" instrument_node="">
Sorry for the long post. I want to do what it takes to keep my kidneys healthy and see my family for a long time.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><div class="ast-comment-edit-reply-wrap" data-dcnode-id="1164"><span data-dcnode-id="1169" instrument_node="">

</span><p data-dcnode-id="1112"><span data-dcnode-id="1122" instrument_node="">Hi Rox,</span><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node="">
Thanks for your thoughtful response!</span><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">
GFR is essentially how much your kidneys are filtering at any point in time. Think of it like if you were to measure how much water is going through a garden hose when it’s turned on. This will change with every test- don’t expect it to be the same number each time. There are a lot of factors to consider when GFR changes.</span><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">
We have worked with many clients that have retained or improved their kidney function. The likelihood of this happening increases the sooner you do something, so taking care of it at stage 2 is great! Check our </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/success/"><span data-dcnode-id="1115" instrument_node="">success stories</span></a><span data-dcnode-id="1113" instrument_node=""> – I think you’ll see some motivational reads there. 🙂</span></p><span data-dcnode-id="1111" instrument_node="">
