</span><ul data-dcnode-id="4090"><li data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">Bananas</span></li><li data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Melons</span></li><li data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Oranges</span></li><li data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Potatoes</span></li><li data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">Tomatoes</span></li><li data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Dried fruits</span></li><li data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Nuts</span></li><li data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Avocados</span></li><li data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">Deep-colored and leafy green vegetables</span></li><li data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">Some fruit and vegetable juices&nbsp;</span></li></ul><span data-dcnode-id="4089" instrument_node="">
</span><p data-dcnode-id="4082"><span data-dcnode-id="4088" instrument_node="">Other foods high in </span><a data-dcnode-id="4086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf'); return false;"><span data-dcnode-id="4087" instrument_node="">potassium</span></a><span data-dcnode-id="4085" instrument_node=""> are milk and yogurt, dried beans and peas, most salt substitutes, and protein-rich foods such as meat, poultry, pork, and fish.&nbsp;</span><a data-dcnode-id="4083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-potassium-diet/"><span data-dcnode-id="4084" instrument_node="">Learn more about the low potassium diet here.</span></a></p><span data-dcnode-id="4081" instrument_node="">
</span><p data-dcnode-id="4076"><span data-dcnode-id="4080" instrument_node="">Limit or avoid foods </span><a data-dcnode-id="4078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-phosphorus-diet/"><span data-dcnode-id="4079" instrument_node="">high</span></a><span data-dcnode-id="4077" instrument_node=""> in phosphorus:&nbsp;</span></p><span data-dcnode-id="4075" instrument_node="">
</span><ul data-dcnode-id="4057"><li data-dcnode-id="4070"><span data-dcnode-id="4074" instrument_node="">Foods that include </span><strong data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">phosphorus additives</span></strong><span data-dcnode-id="4071" instrument_node=""> in the ingredient list</span></li><li data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Dairy products (milk, cheese, yogurt, ice cream, and pudding)</span></li><li data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">Nuts</span></li><li data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">Peanut butter</span></li><li data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">Dried beans and peas (kidney beans, split peas, and lentils)&nbsp;</span></li><li data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">Cocoa, beer, and dark cola drinks</span></li><li data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">Bran breads and bran cereals</span></li></ul><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4052"><span data-dcnode-id="4055" instrument_node="">However, it’s important to know that where phosphorus is found in your diet is more important than just reducing foods with phosphorus. </span><a data-dcnode-id="4053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-phosphorus-diet/"><span data-dcnode-id="4054" instrument_node="">Learn more about a low phosphorus diet here.</span></a></p><span data-dcnode-id="4051" instrument_node="">
</span><h4 data-dcnode-id="4048"><strong data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">Nutrition for Metabolic Acidosis</span></strong></h4><span data-dcnode-id="4047" instrument_node="">
</span><p data-dcnode-id="4042"><span data-dcnode-id="4046" instrument_node="">One way to tell if you are at risk for metabolic acidosis is by looking at the </span><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/carbon-dioxide-co2-in-blood/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/carbon-dioxide-co2-in-blood/'); return false;"><span data-dcnode-id="4045" instrument_node="">carbon dioxide</span></a><span data-dcnode-id="4043" instrument_node=""> in your blood. If your serum bicarbonate levels are below 22 mEq/L you have metabolic acidosis.</span></p><span data-dcnode-id="4041" instrument_node="">
</span><p data-dcnode-id="4036"><span data-dcnode-id="4040" instrument_node="">Eating foods that produce a high amount of acid can lead to </span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/pral/"><span data-dcnode-id="4039" instrument_node="">metabolic acidosis</span></a><span data-dcnode-id="4037" instrument_node="">. These include</span></p><span data-dcnode-id="4035" instrument_node="">
</span><ul data-dcnode-id="4025"><li data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">Animal proteins</span></li><li data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">Sweets</span></li><li data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">Some nuts</span></li><li data-dcnode-id="4026"><a data-dcnode-id="4027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/8198060/" onclick="javascript:window.open('https://pubmed.ncbi.nlm.nih.gov/8198060/'); return false;"><span data-dcnode-id="4028" instrument_node="">Alcohol and beer</span></a></li></ul><span data-dcnode-id="4024" instrument_node="">
</span><p data-dcnode-id="4018"><span data-dcnode-id="4023" instrument_node="">Instead, you want to </span><strong data-dcnode-id="4020"><em data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">increase</span></em></strong><span data-dcnode-id="4019" instrument_node=""> your intake of&nbsp;</span></p><span data-dcnode-id="4017" instrument_node="">
</span><ul data-dcnode-id="4008"><li data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">Vegetables</span></li><li data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">Fruits</span></li><li data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">Beans and legumes</span></li><li data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">Some nuts</span></li></ul><span data-dcnode-id="4007" instrument_node="">
</span><h4 data-dcnode-id="4004"><strong data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">Nutrition for Weight Maintenance</span></strong></h4><span data-dcnode-id="4003" instrument_node="">
</span><p data-dcnode-id="3998"><span data-dcnode-id="4002" instrument_node="">If you are looking to prevent disease progression you want to maintain a healthy weight. Losing weight can help preserve kidney function. This is </span><a data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/spring11/WaistSize" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/spring11/WaistSize'); return false;"><span data-dcnode-id="4001" instrument_node="">because</span></a><span data-dcnode-id="3999" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3997" instrument_node="">
</span><ul data-dcnode-id="3990"><li data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">Excess fat crowds the kidneys and compresses them</span></li><li data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">A bigger body makes the kidneys work harder</span></li><li data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">Inflammation is more likely to be prevalent in those who are obese</span></li></ul><span data-dcnode-id="3989" instrument_node="">
</span><p data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">Even the loss of just 10 lbs can improve kidney health. It also reduces the risk of complications like hypertension, diabetes, and heart disease.</span></p><span data-dcnode-id="3986" instrument_node="">
</span><p data-dcnode-id="3978"><span data-dcnode-id="3985" instrument_node="">One way to lose weight is to implement </span><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf'); return false;"><span data-dcnode-id="3984" instrument_node="">good nutrition</span></a><span data-dcnode-id="3982" instrument_node="">. People who have had success with weight loss have incorporated these </span><a data-dcnode-id="3980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/spring11/WaistSize" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/spring11/WaistSize'); return false;"><span data-dcnode-id="3981" instrument_node="">principles</span></a><span data-dcnode-id="3979" instrument_node="">:&nbsp;</span></p><span data-dcnode-id="3977" instrument_node="">
</span><ul data-dcnode-id="3950"><li data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">Learn how to make healthier food choices</span></li><li data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">Reduce your portions</span></li><li data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">Reduce your intake of unhealthy fats</span></li><li data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">Ditch the white carbs and eat more whole grains</span></li><li data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Eat more whole unprocessed fresh fruits and vegetables</span></li><li data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">Have lean meats, fish, whole grains, and low-fat dairy</span></li><li data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">Learn how to read nutrition labels</span></li><li data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Get more high fiber, low fat, and low sugar foods</span></li><li data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Drink more water</span></li><li data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">Limit your alcohol intake to 1 or less drink a day</span></li><li data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Keep a food diary</span></li><li data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Make a food shopping list and stick to it</span></li><li data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">Don’t go to the food store hungry</span></li></ul><span data-dcnode-id="3949" instrument_node="">
</span><h3 data-dcnode-id="3944"><span class="ez-toc-section" data-dcnode-id="3948" id="Labs_to_Monitor"></span><strong data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Labs to Monitor</span></strong><span class="ez-toc-section-end" data-dcnode-id="3945"></span></h3><span data-dcnode-id="3943" instrument_node="">
</span><p data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">In addition to nutrition, certain labs should be monitored when you have stage 3 kidney disease. Your labs will dictate your dietary needs and help you get the best nutrition possible. The following labs should be monitored by your renal dietitian.</span></p><span data-dcnode-id="3940" instrument_node="">
</span><ul data-dcnode-id="3925"><li data-dcnode-id="3936"><a data-dcnode-id="3938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/renal-function-panel/"><span data-dcnode-id="3939" instrument_node="">Renal Function Panel</span></a><span data-dcnode-id="3937" instrument_node="">&nbsp;</span></li><li data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">Comprehensive Metabolic Panel (CMP)</span></li><li data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Complete Blood Count (CBC)</span></li><li data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">Urinalysis</span></li><li data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Iron, Ferritin, and Transferrin Saturation (TSAT)</span></li><li data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Thyroid Panel</span></li></ul><span data-dcnode-id="3924" instrument_node="">
</span><h4 data-dcnode-id="3921"><strong data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">Renal Function Panel&nbsp;</span></strong></h4><span data-dcnode-id="3920" instrument_node="">
</span><p data-dcnode-id="3915"><span data-dcnode-id="3919" instrument_node="">The renal function panel is a test used to </span><a data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/renal-panel" onclick="javascript:window.open('https://labtestsonline.org/tests/renal-panel'); return false;"><span data-dcnode-id="3918" instrument_node="">evaluate</span></a><span data-dcnode-id="3916" instrument_node=""> kidney function. It is used to help manage CKD and measures compounds in the body including</span></p><span data-dcnode-id="3914" instrument_node="">
</span><ul data-dcnode-id="3901"><li data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">Electrolytes</span></li><li data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">Minerals</span></li><li data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Proteins</span></li><li data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">Glucose (blood sugar)</span></li><li data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">Waste products</span></li><li data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">Additional calculated values</span></li></ul><span data-dcnode-id="3900" instrument_node="">
</span><h5 data-dcnode-id="3897"><strong data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Electrolytes</span></strong></h5><span data-dcnode-id="3896" instrument_node="">
</span><p data-dcnode-id="3889"><a data-dcnode-id="3894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/vitamins-for-kidneys-minerals/"><span data-dcnode-id="3895" instrument_node="">Electrolytes</span></a><span data-dcnode-id="3893" instrument_node=""> are molecules with an electrical charge. These substances </span><a data-dcnode-id="3891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/renal-panel" onclick="javascript:window.open('https://labtestsonline.org/tests/renal-panel'); return false;"><span data-dcnode-id="3892" instrument_node="">control</span></a><span data-dcnode-id="3890" instrument_node=""> nerve and muscle function and are vital to life. They also are needed to regulate fluid balance which prevents metabolic acidosis. They include</span></p><span data-dcnode-id="3888" instrument_node="">
</span><ul data-dcnode-id="3879"><li data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">Sodium</span></li><li data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Potassium</span></li><li data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Chloride</span></li><li data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">Bicarbonate (carbon dioxide)</span></li></ul><span data-dcnode-id="3878" instrument_node="">
</span><h5 data-dcnode-id="3875"><strong data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">Minerals&nbsp;</span></strong></h5><span data-dcnode-id="3874" instrument_node="">
</span><p data-dcnode-id="3869"><span data-dcnode-id="3873" instrument_node="">Minerals are </span><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/renal-panel" onclick="javascript:window.open('https://labtestsonline.org/tests/renal-panel'); return false;"><span data-dcnode-id="3872" instrument_node="">needed</span></a><span data-dcnode-id="3870" instrument_node=""> for energy production, bone growth, and muscle and nerve function. They include phosphorus and calcium. Phosphorus works as a buffer to maintain acid-base balance. Calcium is one of the most important minerals in the body. It also helps to regulate blood clotting and heartbeat.</span></p><span data-dcnode-id="3868" instrument_node="">
</span><h5 data-dcnode-id="3865"><strong data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Protein&nbsp;</span></strong></h5><span data-dcnode-id="3864" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3863" instrument_node="">Protein levels are measured by albumin. It makes up about 60% of the protein in the blood. Albumin is </span><a data-dcnode-id="3861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/renal-panel" onclick="javascript:window.open('https://labtestsonline.org/tests/renal-panel'); return false;"><span data-dcnode-id="3862" instrument_node="">responsible</span></a><span data-dcnode-id="3860" instrument_node=""> to keep fluid in the blood vessels and regulate blood pressure. It also helps move hormones, vitamins, drugs, and electrolytes, and minerals through the body.&nbsp;</span></p><span data-dcnode-id="3858" instrument_node="">
</span><h5 data-dcnode-id="3855"><strong data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">Waste Products&nbsp;</span></strong></h5><span data-dcnode-id="3854" instrument_node="">
</span><p data-dcnode-id="3850"><a data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/renal-panel" onclick="javascript:window.open('https://labtestsonline.org/tests/renal-panel'); return false;"><span data-dcnode-id="3853" instrument_node="">Waste products</span></a><span data-dcnode-id="3851" instrument_node=""> will tell how well the kidney is functioning. These include urea or blood urea nitrogen (BUN) and creatinine.&nbsp;</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3844"><span data-dcnode-id="3848" instrument_node="">BUN is a nitrogen-containing waste product that is produced when protein is digested. The liver releases it into the blood and then it is moved to the kidneys. The kidneys will filter it out to be excreted in the urine. High BUN levels can </span><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/bun-blood-urea-nitrogen/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/bun-blood-urea-nitrogen/'); return false;"><span data-dcnode-id="3847" instrument_node="">indicate</span></a><span data-dcnode-id="3845" instrument_node=""> poor kidney function.</span></p><span data-dcnode-id="3843" instrument_node="">
</span><p data-dcnode-id="3838"><span data-dcnode-id="3842" instrument_node="">Creatinine is a waste product produced by the muscles. It is sent to the kidneys where almost all of it is eliminated. High levels of this substance </span><a data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/creatinine-test/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/creatinine-test/'); return false;"><span data-dcnode-id="3841" instrument_node="">show</span></a><span data-dcnode-id="3839" instrument_node=""> there is kidney dysfunction.&nbsp;</span></p><span data-dcnode-id="3837" instrument_node="">
</span><h5 data-dcnode-id="3834"><strong data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Glucose (Blood Sugar)</span></strong></h5><span data-dcnode-id="3833" instrument_node="">
</span><p data-dcnode-id="3826"><a data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/renal-panel" onclick="javascript:window.open('https://labtestsonline.org/tests/renal-panel'); return false;"><span data-dcnode-id="3832" instrument_node="">Glucose</span></a><span data-dcnode-id="3830" instrument_node=""> is what gives the body energy. The blood should contain a consistent amount of glucose that is ready for the body to use. The urine may also be tested for glucose. This test </span><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/glucose-tests" onclick="javascript:window.open('https://labtestsonline.org/tests/glucose-tests'); return false;"><span data-dcnode-id="3829" instrument_node="">indicates</span></a><span data-dcnode-id="3827" instrument_node=""> if someone has diabetes.</span></p><span data-dcnode-id="3825" instrument_node="">
</span><p data-dcnode-id="3820"><span data-dcnode-id="3824" instrument_node="">If you’re concerned about your blood sugar ask your doctor what your level should be. Blood sugar </span><a data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/Managing-Blood-Sugar-For-Kidney-Health" onclick="javascript:window.open('https://www.kidney.org/atoz/content/Managing-Blood-Sugar-For-Kidney-Health'); return false;"><span data-dcnode-id="3823" instrument_node="">targets</span></a><span data-dcnode-id="3821" instrument_node=""> vary from person to person. In general, it should be&nbsp;</span></p><span data-dcnode-id="3819" instrument_node="">
</span><ul data-dcnode-id="3814"><li data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">Before meals:&nbsp; 90-130 mg/dL</span></li><li data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">Two hours after the start of a meal: below 180 mg/dL&nbsp;</span></li></ul><span data-dcnode-id="3813" instrument_node="">
</span><p data-dcnode-id="3808"><span data-dcnode-id="3812" instrument_node="">To get an average of blood sugar often the healthcare team will look at your </span><a data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/Managing-Blood-Sugar-For-Kidney-Health" onclick="javascript:window.open('https://www.kidney.org/atoz/content/Managing-Blood-Sugar-For-Kidney-Health'); return false;"><span data-dcnode-id="3811" instrument_node="">A1C</span></a><span data-dcnode-id="3809" instrument_node="">. This test is an average of 3 months of blood sugar levels. Having an A1C of 7% is recommended for those with kidney issues.&nbsp;</span></p><span data-dcnode-id="3807" instrument_node="">
</span><h5 data-dcnode-id="3804"><strong data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Additional Calculated Values</span></strong></h5><span data-dcnode-id="3803" instrument_node="">
</span><p data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">There may also be three additional calculated values that show up on a renal panel. They include BUN/creatinine ratio, estimated glomerular filtration rate (eGFR), and the anion gap.</span></p><span data-dcnode-id="3800" instrument_node="">
</span><p data-dcnode-id="3795"><span data-dcnode-id="3799" instrument_node="">The BUN/creatinine ratio is the comparison of urea to creatinine in the blood. High levels </span><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/blood-urea-nitrogen-bun" onclick="javascript:window.open('https://labtestsonline.org/tests/blood-urea-nitrogen-bun'); return false;"><span data-dcnode-id="3798" instrument_node="">mean</span></a><span data-dcnode-id="3796" instrument_node=""> that the kidneys are not functioning well.</span></p><span data-dcnode-id="3794" instrument_node="">
</span><p data-dcnode-id="3789"><span data-dcnode-id="3793" instrument_node="">The estimated glomerular filtration rate (eGFR) is an </span><a data-dcnode-id="3791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/blood-urea-nitrogen-bun" onclick="javascript:window.open('https://labtestsonline.org/tests/blood-urea-nitrogen-bun'); return false;"><span data-dcnode-id="3792" instrument_node="">assessment</span></a><span data-dcnode-id="3790" instrument_node=""> of how well the kidneys are filtering the blood per minute. It is based on creatinine levels. This also takes into account someone’s age, gender, race, and sometimes height, and weight.</span></p><span data-dcnode-id="3788" instrument_node="">
</span><p data-dcnode-id="3783"><span data-dcnode-id="3787" instrument_node="">The anion gap is a value that looks at the </span><a data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/electrolytes-and-anion-gap" onclick="javascript:window.open('https://labtestsonline.org/tests/electrolytes-and-anion-gap'); return false;"><span data-dcnode-id="3786" instrument_node="">difference</span></a><span data-dcnode-id="3784" instrument_node=""> between measured and unmeasured electrolytes of fluid in the blood.&nbsp;</span></p><span data-dcnode-id="3782" instrument_node="">
</span><p data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">When the kidneys are not working there will be a dilution of sodium and chloride. When someone is dehydrated potassium, sodium, and chloride levels will be elevated.</span></p><span data-dcnode-id="3779" instrument_node="">
</span><h4 data-dcnode-id="3776"><strong data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Comprehensive Metabolic Panel (CMP)&nbsp;</span></strong></h4><span data-dcnode-id="3775" instrument_node="">
</span><p data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">The comprehensive metabolic panel (CMP) looks at 14 different substances in your blood. It gives insight into how well the body is performing. A CMP has the tests found in the renal panel with the addition of the following:</span></p><span data-dcnode-id="3772" instrument_node="">
</span><ul data-dcnode-id="3765"><li data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">Total Protein</span></li><li data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Liver Enzymes and Bilirubin</span></li><li data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">Cholesterol levels</span></li></ul><span data-dcnode-id="3764" instrument_node="">
</span><h5 data-dcnode-id="3761"><strong data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">Total Protein</span></strong></h5><span data-dcnode-id="3760" instrument_node="">
</span><p data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">Total protein is how much protein is in the blood.&nbsp;</span></p><span data-dcnode-id="3757" instrument_node="">
</span><h5 data-dcnode-id="3754"><strong data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">Liver Enzymes and Bilirubin</span></strong></h5><span data-dcnode-id="3753" instrument_node="">
</span><p data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">Liver enzyme function tests tell how well the liver is working. They include&nbsp;</span></p><span data-dcnode-id="3750" instrument_node="">
</span><ul data-dcnode-id="3743"><li data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">Alkaline phosphatase (ALP)</span></li><li data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">Alanine transaminase (ALT)</span></li><li data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">Aspartate aminotransferase (AST)</span></li></ul><span data-dcnode-id="3742" instrument_node="">
</span><p data-dcnode-id="3731"><span data-dcnode-id="3741" instrument_node="">High levels of ALP </span><a data-dcnode-id="3739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/alkaline-phosphatase/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/alkaline-phosphatase/'); return false;"><span data-dcnode-id="3740" instrument_node="">could mean</span></a><span data-dcnode-id="3738" instrument_node=""> liver damage. When AST is high it can </span><a data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/ast-test/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/ast-test/'); return false;"><span data-dcnode-id="3737" instrument_node="">indicate</span></a><span data-dcnode-id="3735" instrument_node=""> heart problems, pancreatitis, and inflammation of the liver or disease. </span><a data-dcnode-id="3733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/alt-blood-test/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/alt-blood-test/'); return false;"><span data-dcnode-id="3734" instrument_node="">Elevation</span></a><span data-dcnode-id="3732" instrument_node=""> of ALT enzymes can occur before symptoms start. These enzymes also indicate damage and disease.</span></p><span data-dcnode-id="3730" instrument_node="">
</span><p data-dcnode-id="3725"><span data-dcnode-id="3729" instrument_node="">Bilirubin is made by the liver when food is digested. High levels in the blood </span><a data-dcnode-id="3727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/bilirubin-blood-test/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/bilirubin-blood-test/'); return false;"><span data-dcnode-id="3728" instrument_node="">indicate</span></a><span data-dcnode-id="3726" instrument_node=""> possible liver damage.</span></p><span data-dcnode-id="3724" instrument_node="">
</span><p data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">Medications, certain foods, supplements, and strenuous exercise may also affect liver function. So elevated bilirubin and liver enzyme levels do not always mean there is a problem. Be sure to ask your doctor if you have any concerns.</span></p><span data-dcnode-id="3721" instrument_node="">
</span><h5 data-dcnode-id="3718"><strong data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Cholesterol</span></strong></h5><span data-dcnode-id="3717" instrument_node="">
</span><p data-dcnode-id="3709"><span data-dcnode-id="3716" instrument_node="">Cholesterol is a type of fat in the blood. It is made by the body and also obtained from food. Testing cholesterol will help </span><a data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/Summer10/HighCholesterol" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/Summer10/HighCholesterol'); return false;"><span data-dcnode-id="3715" instrument_node="">determine</span></a><span data-dcnode-id="3713" instrument_node=""> if you have blood vessel disease which is common among people with CKD. There are </span><a data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/Summer10/HighCholesterol" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/Summer10/HighCholesterol'); return false;"><span data-dcnode-id="3712" instrument_node="">three</span></a><span data-dcnode-id="3710" instrument_node=""> parts of cholesterol. They include:</span></p><span data-dcnode-id="3708" instrument_node="">
</span><ul data-dcnode-id="3701"><li data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">LDL the “bad” cholesterol</span></li><li data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">HDL the “good” cholesterol</span></li><li data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">Triglycerides</span></li></ul><span data-dcnode-id="3700" instrument_node="">
</span><p data-dcnode-id="3695"><span data-dcnode-id="3699" instrument_node="">The total cholesterol is also </span><a data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/cholesterol" onclick="javascript:window.open('https://labtestsonline.org/tests/cholesterol'); return false;"><span data-dcnode-id="3698" instrument_node="">measured</span></a><span data-dcnode-id="3696" instrument_node="">. This is the sum of the good and bad cholesterol. Healthy cholesterol levels are as follows:&nbsp;</span></p><span data-dcnode-id="3694" instrument_node="">
</span><ul data-dcnode-id="3685"><li data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">Total cholesterol should be less than 200</span></li><li data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">HDL should be 40 or higher</span></li><li data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">LDL should be less than 100</span></li><li data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Triglycerides should be less than 150</span></li></ul><span data-dcnode-id="3684" instrument_node="">
</span><p data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Talk to your doctor about any questions you have about your cholesterol levels.</span></p><span data-dcnode-id="3681" instrument_node="">
</span><h4 data-dcnode-id="3678"><strong data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">Complete Blood Count (CBC) Panel</span></strong></h4><span data-dcnode-id="3677" instrument_node="">
</span><p data-dcnode-id="3672"><span data-dcnode-id="3676" instrument_node="">Complete Blood Count or (CBC) is a </span><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/complete-blood-count-cbc/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/complete-blood-count-cbc/'); return false;"><span data-dcnode-id="3675" instrument_node="">blood test</span></a><span data-dcnode-id="3673" instrument_node=""> that looks at the health of your blood. It includes the following tests:&nbsp;</span></p><span data-dcnode-id="3671" instrument_node="">
</span><ul data-dcnode-id="3660"><li data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Red blood cells</span></li><li data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">White blood cells</span></li><li data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Platelets</span></li><li data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">Hemoglobin</span></li><li data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Hematocrit</span></li></ul><span data-dcnode-id="3659" instrument_node="">
</span><p data-dcnode-id="3654"><span data-dcnode-id="3658" instrument_node="">Red blood cells carry oxygen from your lungs to the rest of your body. If this level is </span><a data-dcnode-id="3656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/complete-blood-count-cbc/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/complete-blood-count-cbc/'); return false;"><span data-dcnode-id="3657" instrument_node="">low</span></a><span data-dcnode-id="3655" instrument_node=""> it could indicate anemia, iron deficiency, or heart disease.</span></p><span data-dcnode-id="3653" instrument_node="">
</span><p data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">White blood cells (WBC) help fight infection. There are five types of white blood cells. The CBC measures the total number of WBC in your blood. If you get a CBD differential test that means that number of each type of these WBC is also measured.</span></p><span data-dcnode-id="3650" instrument_node="">
</span><p data-dcnode-id="3645"><span data-dcnode-id="3649" instrument_node="">Both low and high WBC counts could mean a potential health condition. However, </span><a data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/complete-blood-count-cbc/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/complete-blood-count-cbc/'); return false;"><span data-dcnode-id="3648" instrument_node="">abnormal</span></a><span data-dcnode-id="3646" instrument_node=""> levels could also be due to medications, diet, and for women, menstrual cycles.</span></p><span data-dcnode-id="3644" instrument_node="">
</span><p data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">Platelets are what help stop bleeding. They are responsible for blood clotting.&nbsp;</span></p><span data-dcnode-id="3641" instrument_node="">
</span><p data-dcnode-id="3633"><span data-dcnode-id="3640" instrument_node="">Hemoglobin is a protein in the RBC that moves oxygen from the lungs to cells in the body. Not enough </span><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/hemoglobin-test/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/hemoglobin-test/'); return false;"><span data-dcnode-id="3639" instrument_node="">hemoglobin</span></a><span data-dcnode-id="3637" instrument_node=""> will lead to anemia. </span><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/iron" onclick="javascript:window.open('https://www.kidney.org/atoz/content/iron'); return false;"><span data-dcnode-id="3636" instrument_node="">Levels</span></a><span data-dcnode-id="3634" instrument_node=""> in healthy people are between 12-15 g/dL for women and 13-17 g/dl for men. If you have CKD these may be lower. Ask your doctor about what is a good level for you.</span></p><span data-dcnode-id="3632" instrument_node="">
</span><p data-dcnode-id="3627"><span data-dcnode-id="3631" instrument_node="">Hematocrit is how much of your blood is made up of red blood cells. Low levels of </span><a data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/hematocrit-test/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/hematocrit-test/'); return false;"><span data-dcnode-id="3630" instrument_node="">hematocrit</span></a><span data-dcnode-id="3628" instrument_node=""> show there are problems with the kidneys.&nbsp;</span></p><span data-dcnode-id="3626" instrument_node="">
</span><h4 data-dcnode-id="3623"><strong data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">Urinalysis</span></strong></h4><span data-dcnode-id="3622" instrument_node="">
</span><p data-dcnode-id="3617"><span data-dcnode-id="3621" instrument_node="">When you have CKD you should routinely </span><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/urinalysis.html" onclick="javascript:window.open('https://medlineplus.gov/urinalysis.html'); return false;"><span data-dcnode-id="3620" instrument_node="">test</span></a><span data-dcnode-id="3618" instrument_node=""> the urine. This will monitor your kidney function as well as any potential complications like diabetes. It looks at the</span></p><span data-dcnode-id="3616" instrument_node="">
</span><ul data-dcnode-id="3605"><li data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Color</span></li><li data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">Appearance (clear or cloudy)</span></li><li data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">Odor</span></li><li data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Its acidity (pH level)</span></li><li data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">Presence of bacteria and other germs</span></li></ul><span data-dcnode-id="3604" instrument_node="">
</span><p data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">It will also look to see if it has anything that should not be there. It is tested for substances like blood, protein, glucose, ketones, bilirubin cells, crystals, and casts (tube-shaped proteins).</span></p><span data-dcnode-id="3601" instrument_node="">
</span><h4 data-dcnode-id="3598"><strong data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Iron, Ferritin and Transferrin Saturation (TSAT)</span></strong></h4><span data-dcnode-id="3597" instrument_node="">
</span><p data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">In addition to looking at hemoglobin in the CBC, another way to know if there is enough iron in the body is by looking at the transferrin saturation (TSAT) and ferritin levels.</span></p><span data-dcnode-id="3594" instrument_node="">
</span><p data-dcnode-id="3586"><span data-dcnode-id="3593" instrument_node="">Ferritin is a protein that </span><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/ferritin-blood-test/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/ferritin-blood-test/'); return false;"><span data-dcnode-id="3592" instrument_node="">stores</span></a><span data-dcnode-id="3590" instrument_node=""> iron inside your cells. This level will tell you how much iron storage is available. Levels should be </span><a data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/anemia.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/anemia.pdf'); return false;"><span data-dcnode-id="3589" instrument_node="">at least </span></a><span data-dcnode-id="3587" instrument_node="">100 ng/mL.</span></p><span data-dcnode-id="3585" instrument_node="">
</span><p data-dcnode-id="3577"><span data-dcnode-id="3584" instrument_node="">Transferrin saturation (TSAT) </span><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/transferrin-and-iron-binding-capacity-tibc-uibc" onclick="javascript:window.open('https://labtestsonline.org/tests/transferrin-and-iron-binding-capacity-tibc-uibc'); return false;"><span data-dcnode-id="3583" instrument_node="">measures</span></a><span data-dcnode-id="3581" instrument_node=""> the amount of transferrin in your blood. Transferrin is a protein made by the liver. When iron stores get low the liver will pump out transferrin to compensate for the low iron. If your TSAT levels fall </span><a data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/anemia.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/anemia.pdf'); return false;"><span data-dcnode-id="3580" instrument_node="">below</span></a><span data-dcnode-id="3578" instrument_node=""> 20% you could have low iron.</span></p><span data-dcnode-id="3576" instrument_node="">
</span><h4 data-dcnode-id="3573"><strong data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">Thyroid Panel</span></strong></h4><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">The thyroid should be monitored annually. A full thyroid panel includes the following tests:</span></p><span data-dcnode-id="3569" instrument_node="">
</span><ul data-dcnode-id="3550"><li data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Thyroid Stimulating Hormone (TSH)</span></li><li data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Free Thyroxine (Free T4)</span></li><li data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">Free Triiodothyronine (Free T3)</span></li><li data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">Thyroid antibodies&nbsp;</span></li><li data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">Reverse Triiodothyronine (rT3)</span></li><li data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Thyroid Ultrasound</span></li><li data-dcnode-id="3551"><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thyroid.org/hypothyroidism/" onclick="javascript:window.open('https://www.thyroid.org/hypothyroidism/'); return false;"><span data-dcnode-id="3556" instrument_node="">Signs</span></a><span data-dcnode-id="3554" instrument_node=""> and </span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thyroid.org/hashimotos-thyroiditis/" onclick="javascript:window.open('https://www.thyroid.org/hashimotos-thyroiditis/'); return false;"><span data-dcnode-id="3553" instrument_node="">Symptoms</span></a></li></ul><span data-dcnode-id="3549" instrument_node="">
</span><p data-dcnode-id="3541"><span data-dcnode-id="3548" instrument_node="">Thyroid-stimulating hormone (TSH) </span><a data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thyroid.org/thyroid-function-tests/" onclick="javascript:window.open('https://www.thyroid.org/thyroid-function-tests/'); return false;"><span data-dcnode-id="3547" instrument_node="">indicates</span></a><span data-dcnode-id="3545" instrument_node=""> how much hormone the thyroid gland is making. A </span><strong data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">HIGH</span></strong><span data-dcnode-id="3542" instrument_node=""> TSH means the thyroid is not making enough thyroid hormone. This is known as hypothyroidism. </span></p><span data-dcnode-id="3540" instrument_node="">
</span><p data-dcnode-id="3535"><span data-dcnode-id="3539" instrument_node="">A </span><strong data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">LOW</span></strong><span data-dcnode-id="3536" instrument_node=""> TSH means the thyroid is making too much hormone. This condition is called hyperthyroidism.&nbsp;</span></p><span data-dcnode-id="3534" instrument_node="">
</span><p data-dcnode-id="3529"><span data-dcnode-id="3533" instrument_node="">Thyroxine (T4) is the main thyroid hormone in the blood. The free T4 (FT4) test </span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thyroid.org/thyroid-function-tests/" onclick="javascript:window.open('https://www.thyroid.org/thyroid-function-tests/'); return false;"><span data-dcnode-id="3532" instrument_node="">tells</span></a><span data-dcnode-id="3530" instrument_node=""> how much free T4 is available for cells to use. This level is looked at in conjunction with TSH to see if there is thyroid dysfunction.&nbsp;</span></p><span data-dcnode-id="3528" instrument_node="">
</span><p data-dcnode-id="3520"><span data-dcnode-id="3527" instrument_node="">Having an elevated TSH and low FT4 means the person has hypothyroidism. </span><strong data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">A high FT4 and low TSH means there could be hyperthyroidism</span></strong><span data-dcnode-id="3524" instrument_node="">. When both TSH and free T4 are low it means there could be something wrong with the </span><strong data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">pituitary gland</span></strong><span data-dcnode-id="3521" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="3519" instrument_node="">
</span><p data-dcnode-id="3514"><span data-dcnode-id="3518" instrument_node="">Free triiodothyronine (free T3) tests are used to </span><a data-dcnode-id="3516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/t3-free-and-total" onclick="javascript:window.open('https://labtestsonline.org/tests/t3-free-and-total'); return false;"><span data-dcnode-id="3517" instrument_node="">monitor</span></a><span data-dcnode-id="3515" instrument_node=""> thyroid function in conjunction with TSH. Generally, a high level indicates hyperthyroidism and a low level will indicate hypothyroidism.</span></p><span data-dcnode-id="3513" instrument_node="">
</span><p data-dcnode-id="3508"><span data-dcnode-id="3512" instrument_node="">Thyroid antibody tests </span><a data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/thyroid-antibodies" onclick="javascript:window.open('https://labtestsonline.org/tests/thyroid-antibodies'); return false;"><span data-dcnode-id="3511" instrument_node="">determine</span></a><span data-dcnode-id="3509" instrument_node=""> if there is an autoimmune thyroid condition such as Hashimoto’s or Grave’s disease. They consist of the following.</span></p><span data-dcnode-id="3507" instrument_node="">
</span><ul data-dcnode-id="3498"><li data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">Thyroid peroxidase (TPO) antibodies&nbsp;&nbsp;</span></li><li data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">Thyroglobulin antibody (TG) antibodies</span></li><li data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">Thyroid-stimulating immunoglobulin (TSI) Antibodies</span></li><li data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Thyroid binding inhibitory immunoglobulin (TBII) Antibodies</span></li></ul><span data-dcnode-id="3497" instrument_node="">
</span><p data-dcnode-id="3492"><span data-dcnode-id="3496" instrument_node="">Reverse Triiodothyronine (rT3) is secreted in small amounts by the thyroid. Its presence reflects how well T4 is being used. rT3 can be </span><a data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/reverse-triiodothyronine" onclick="javascript:window.open('https://www.sciencedirect.com/topics/neuroscience/reverse-triiodothyronine'); return false;"><span data-dcnode-id="3495" instrument_node="">useful</span></a><span data-dcnode-id="3493" instrument_node=""> for knowing if there is thyroid disease if someone is experiencing symptoms but their free T3 is normal. Certain medications may elevate rT3 so ask your healthcare provider about your results.</span></p><span data-dcnode-id="3491" instrument_node="">
</span><p data-dcnode-id="3486"><span data-dcnode-id="3490" instrument_node="">Thyroid ultrasound can </span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thyroidpharmacist.com/articles/top-10-thyroid-tests/" onclick="javascript:window.open('https://thyroidpharmacist.com/articles/top-10-thyroid-tests/'); return false;"><span data-dcnode-id="3489" instrument_node="">indicate</span></a><span data-dcnode-id="3487" instrument_node=""> thyroid problems even when blood work looks normal.&nbsp;</span></p><span data-dcnode-id="3485" instrument_node="">
</span><h5 data-dcnode-id="3482"><strong data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">Signs and Symptoms to Include in a Thyroid Panel</span></strong></h5><span data-dcnode-id="3481" instrument_node="">
</span><p data-dcnode-id="3476"><span data-dcnode-id="3480" instrument_node="">There are many signs and symptoms of thyroid dysfunction. Signs of </span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womenshealth.gov/a-z-topics/thyroid-disease" onclick="javascript:window.open('https://www.womenshealth.gov/a-z-topics/thyroid-disease'); return false;"><span data-dcnode-id="3479" instrument_node="">hypothyroidism</span></a><span data-dcnode-id="3477" instrument_node=""> include</span></p><span data-dcnode-id="3475" instrument_node="">
</span><ul data-dcnode-id="3440"><li data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Fatigue</span></li><li data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">Feeling cold all the time</span></li><li data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Constipation</span></li><li data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">Muscle weakness</span></li><li data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">Weight gain</span></li><li data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">Joint or muscle pain</span></li><li data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">Anxiety</span></li><li data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">Depression</span></li><li data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">Brain fog</span></li><li data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">Dry skin</span></li><li data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">Hair loss</span></li><li data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">Slowed heart rate</span></li><li data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">Less sweating than usual</span></li><li data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">A puffy face</span></li><li data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">A hoarse voice</span></li><li data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Women will experience heavy periods</span></li><li data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">High LDL cholesterol</span></li></ul><span data-dcnode-id="3439" instrument_node="">
</span><p data-dcnode-id="3434"><span data-dcnode-id="3438" instrument_node="">People with </span><a data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womenshealth.gov/a-z-topics/thyroid-disease" onclick="javascript:window.open('https://www.womenshealth.gov/a-z-topics/thyroid-disease'); return false;"><span data-dcnode-id="3437" instrument_node="">hyperthyroid</span></a><span data-dcnode-id="3435" instrument_node=""> conditions may experience the following:</span></p><span data-dcnode-id="3433" instrument_node="">
</span><ul data-dcnode-id="3404"><li data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">Weight loss</span></li><li data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">Increased appetite</span></li><li data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Rapid or irregular heartbeat</span></li><li data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Nervousness, anxiety</span></li><li data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Irritability</span></li><li data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Trouble sleeping</span></li><li data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Trembling in your hands and fingers</span></li><li data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">Increased sweating</span></li><li data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">Feeling hot&nbsp;</span></li><li data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Muscle weakness</span></li><li data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">Diarrhea</span></li><li data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">Lighter periods (women only)</span></li><li data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">Red, irritated or bulging eyes</span></li><li data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">Weakened bones</span></li></ul><span data-dcnode-id="3403" instrument_node="">
</span><p data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">Some people experience no symptoms at all so a blood test and possible ultrasound will give a clear picture of thyroid health.</span></p><span data-dcnode-id="3400" instrument_node="">
</span><h3 data-dcnode-id="3395"><span class="ez-toc-section" data-dcnode-id="3399" id="Nutrients_to_Monitor"></span><strong data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Nutrients to Monitor</span></strong><span class="ez-toc-section-end" data-dcnode-id="3396"></span></h3><span data-dcnode-id="3394" instrument_node="">
</span><p data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">During stage 3 kidney disease you want to be sure to monitor certain nutrients in the body. This will tell you how well your kidneys are functioning. This will also determine if you need any restrictions in your diet. Typical nutrients to monitor include the following:</span></p><span data-dcnode-id="3391" instrument_node="">
</span><ul data-dcnode-id="3375"><li data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">Sodium</span></li><li data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">Calcium</span></li><li data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">Phosphorus</span></li><li data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">Potassium</span></li><li data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">Magnesium</span></li><li data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">Iron</span></li><li data-dcnode-id="3376"><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/fluid-restriction-in-ckd/"><span data-dcnode-id="3378" instrument_node="">Fluid</span></a></li></ul><span data-dcnode-id="3374" instrument_node="">
</span><h4 data-dcnode-id="3371"><strong data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Sodium</span></strong></h4><span data-dcnode-id="3370" instrument_node="">
</span><p data-dcnode-id="3362"><span data-dcnode-id="3369" instrument_node="">During CKD, sodium levels should be monitored. Normal sodium levels are between 135 to 145 milliequivalents/liter (mEq/L). Too much or too little of this nutrient can cause </span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/hyponatremia" onclick="javascript:window.open('https://www.kidney.org/atoz/content/hyponatremia'); return false;"><span data-dcnode-id="3368" instrument_node="">hyponatremia</span></a><span data-dcnode-id="3366" instrument_node=""> and </span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ndt/article/27/3/891/1897873%2337127438" onclick="javascript:window.open('https://academic.oup.com/ndt/article/27/3/891/1897873#37127438'); return false;"><span data-dcnode-id="3365" instrument_node="">hypernatremia</span></a><span data-dcnode-id="3363" instrument_node="">:</span></p><span data-dcnode-id="3361" instrument_node="">
</span><ul data-dcnode-id="3356"><li data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Hyponatremia: sodium levels below 135 mEq/L&nbsp;</span></li><li data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">Hypernatremia: sodium higher than 145 mEq/L&nbsp;</span></li></ul><span data-dcnode-id="3355" instrument_node="">
</span><h4 data-dcnode-id="3352"><strong data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">Calcium</span></strong></h4><span data-dcnode-id="3351" instrument_node="">
</span><p data-dcnode-id="3343"><span data-dcnode-id="3350" instrument_node="">A calcium blood test </span><a data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/lab-tests/calcium-blood-test/" onclick="javascript:window.open('https://medlineplus.gov/lab-tests/calcium-blood-test/'); return false;"><span data-dcnode-id="3349" instrument_node="">measures</span></a><span data-dcnode-id="3347" instrument_node=""> the calcium in your blood. Most of the calcium is stored in your bones with about 1% remaining in your blood. A </span><a data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK250/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK250/'); return false;"><span data-dcnode-id="3346" instrument_node="">normal</span></a><span data-dcnode-id="3344" instrument_node=""> range of calcium is between 8.5 to 10.5 mg/dl (4.3 to 5.3 mEq/L or 2.2 to 2.7 mmol/L). This may vary by lab up to 0.5 mg/dl. Be sure to ask your healthcare provider what are acceptable calcium levels.</span></p><span data-dcnode-id="3342" instrument_node="">
</span><h4 data-dcnode-id="3339"><strong data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">Phosphorus</span></strong></h4><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3337" instrument_node="">As kidney function </span><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/nutrikidfail_stage1-4" onclick="javascript:window.open('https://www.kidney.org/atoz/content/nutrikidfail_stage1-4'); return false;"><span data-dcnode-id="3336" instrument_node="">declines</span></a><span data-dcnode-id="3334" instrument_node="">, phosphorus will begin to build up in the blood So it is important to monitor your phosphorus levels. A </span><a data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/phosphorus" onclick="javascript:window.open('https://www.kidney.org/atoz/content/phosphorus'); return false;"><span data-dcnode-id="3333" instrument_node="">normal</span></a><span data-dcnode-id="3331" instrument_node=""> phosphorus level is between 2.5 to 4.5 mg/dL.</span></p><span data-dcnode-id="3329" instrument_node="">
</span><h4 data-dcnode-id="3326"><strong data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">Potassium</span></strong></h4><span data-dcnode-id="3325" instrument_node="">
</span><p data-dcnode-id="3317"><span data-dcnode-id="3324" instrument_node="">Too much or too little potassium can be harmful to the body. You may need to </span><a data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/nutrikidfail_stage1-4" onclick="javascript:window.open('https://www.kidney.org/atoz/content/nutrikidfail_stage1-4'); return false;"><span data-dcnode-id="3323" instrument_node="">limit</span></a><span data-dcnode-id="3321" instrument_node=""> the amount of potassium depending on your blood levels. Potassium levels </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/potassium" onclick="javascript:window.open('https://www.kidney.org/atoz/content/potassium'); return false;"><span data-dcnode-id="3320" instrument_node="">range</span></a><span data-dcnode-id="3318" instrument_node=""> from safe to dangerous. They are as follows:&nbsp;</span></p><span data-dcnode-id="3316" instrument_node="">
</span><ul data-dcnode-id="3309"><li data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">Safe zone: 3.5 – 5.0</span></li><li data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">Caution zone: 5.1- 6.0</span></li><li data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Danger zone: higher than 6.0</span></li></ul><span data-dcnode-id="3308" instrument_node="">
</span><h4 data-dcnode-id="3305"><strong data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">Magnesium</span></strong></h4><span data-dcnode-id="3304" instrument_node="">
</span><p data-dcnode-id="3299"><span data-dcnode-id="3303" instrument_node="">Magnesium levels are </span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/factsheets/%2520magnesium-HealthProfessional/" onclick="javascript:window.open('https://ods.od.nih.gov/factsheets/%20magnesium-HealthProfessional/'); return false;"><span data-dcnode-id="3302" instrument_node="">controlled</span></a><span data-dcnode-id="3300" instrument_node=""> by the kidneys. During CKD magnesium can build up in the blood. A normal level is between 0.75 and 0.95 millimoles (mmol)/L.&nbsp;</span></p><span data-dcnode-id="3298" instrument_node="">
</span><h4 data-dcnode-id="3295"><strong data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">Iron&nbsp;</span></strong></h4><span data-dcnode-id="3294" instrument_node="">
</span><p data-dcnode-id="3289"><span data-dcnode-id="3293" instrument_node="">As noted above iron is a mineral that should be </span><a data-dcnode-id="3291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/iron" onclick="javascript:window.open('https://www.kidney.org/atoz/content/iron'); return false;"><span data-dcnode-id="3292" instrument_node="">monitored</span></a><span data-dcnode-id="3290" instrument_node=""> for health status in CKD. As noted above, hemoglobin, ferritin, and transferrin saturation are what indicate iron status.&nbsp;</span></p><span data-dcnode-id="3288" instrument_node="">
</span><h4 data-dcnode-id="3285"><strong data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Fluid</span></strong></h4><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3277"><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labtestsonline.org/tests/body-fluid-testing" onclick="javascript:window.open('https://labtestsonline.org/tests/body-fluid-testing'); return false;"><span data-dcnode-id="3283" instrument_node="">Monitoring</span></a><span data-dcnode-id="3281" instrument_node=""> fluid levels can tell how well your kidneys are functioning. High levels of water in the body </span><a data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/ency/article/001187.htm" onclick="javascript:window.open('https://medlineplus.gov/ency/article/001187.htm'); return false;"><span data-dcnode-id="3280" instrument_node="">indicate</span></a><span data-dcnode-id="3278" instrument_node=""> poor kidney function.&nbsp;</span></p><span data-dcnode-id="3276" instrument_node="">
</span><h3 data-dcnode-id="3269"><span class="ez-toc-section" data-dcnode-id="3275" id="Foods_to_Avoid_with_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">Foods to Avoid with </span></strong><strong data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Stage 3 Kidney Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="3270"></span></h3><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">Having restrictions and avoiding certain foods during stage 3 kidney disease will salvage kidney function, minimize complications, and prevent progression of the condition.</span></p><span data-dcnode-id="3265" instrument_node="">
</span><h4 data-dcnode-id="3262"><strong data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Foods High in Added Sugar</span></strong></h4><span data-dcnode-id="3261" instrument_node="">
</span><p data-dcnode-id="3256"><span data-dcnode-id="3260" instrument_node="">You want to avoid </span><a data-dcnode-id="3258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/01-10-8193_kbj_kls_pated_diabetes-pad_infographic.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/01-10-8193_kbj_kls_pated_diabetes-pad_infographic.pdf'); return false;"><span data-dcnode-id="3259" instrument_node="">added sugar</span></a><span data-dcnode-id="3257" instrument_node=""> in your diet. This means processed sugary junk foods and drinks. Juices can also contain a lot of sugar and should not be consumed.</span></p><span data-dcnode-id="3255" instrument_node="">
</span><h4 data-dcnode-id="3252"><strong data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Avoid Foods High in Sodium</span></strong></h4><span data-dcnode-id="3251" instrument_node="">
</span><p data-dcnode-id="3247"><span data-dcnode-id="3250" instrument_node="">Foods high in salt are no help to kidneys in bad shape. To prevent fluid retention and high blood pressure you should reduce the sodium in your diet. This can be done by </span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/docs/nutrikidfail_stage1-4.pdf'); return false;"><span data-dcnode-id="3249" instrument_node="">avoiding</span></a></p><span data-dcnode-id="3246" instrument_node="">
</span><ul data-dcnode-id="3221"><li data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Table salt</span></li><li data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">Soy sauce</span></li><li data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Sea salt</span></li><li data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">Teriyaki sauce</span></li><li data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">Garlic or onion salt</span></li><li data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Canned foods and soups</span></li><li data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Frozen dinners unless they say “low sodium”</span></li><li data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">Ham, bacon, hot dogs, sausage deli, and other processed meats</span></li><li data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Salted snack foods (chips and crackers)</span></li><li data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Dehydrated soups&nbsp;</span></li><li data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">Most restaurant foods</span></li><li data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Takeout foods and fast food that is high in salt</span></li></ul><span data-dcnode-id="3220" instrument_node="">
</span><h4 data-dcnode-id="3217"><strong data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Avoid Calcium-Fortified Foods</span></strong></h4><span data-dcnode-id="3216" instrument_node="">
</span><p data-dcnode-id="3211"><span data-dcnode-id="3215" instrument_node="">Depending on your calcium levels you may need to </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/sites/default/files/11-50-0114_docsnutrikidfail_stage1-4.pdf" onclick="javascript:window.open('https://www.kidney.org/sites/default/files/11-50-0114_docsnutrikidfail_stage1-4.pdf'); return false;"><span data-dcnode-id="3214" instrument_node="">avoid</span></a><span data-dcnode-id="3212" instrument_node=""> calcium-fortified foods. These products could increase your serum calcium and hurt your kidney health.</span></p><span data-dcnode-id="3210" instrument_node="">
</span><h4 data-dcnode-id="3207"><strong data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Avoid Foods High in Potassium</span></strong></h4><span data-dcnode-id="3206" instrument_node="">
</span><p data-dcnode-id="3201"><span data-dcnode-id="3205" instrument_node="">If you have elevated blood levels of potassium you will need to avoid foods high in potassium. This means nixing </span><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatright.org/health/diseases-and-conditions/kidney-disease/kidney-disease-high-and-moderate-potassium-foods" onclick="javascript:window.open('https://www.eatright.org/health/diseases-and-conditions/kidney-disease/kidney-disease-high-and-moderate-potassium-foods'); return false;"><span data-dcnode-id="3204" instrument_node="">certain</span></a><span data-dcnode-id="3202" instrument_node=""> fruits and vegetables:</span></p><span data-dcnode-id="3200" instrument_node="">
</span><ul data-dcnode-id="3113"><li data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Artichokes&nbsp;</span></li><li data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">Avocados</span></li><li data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">Bananas</span></li><li data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Beets and beet greens</span></li><li data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Brussels sprouts</span></li><li data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Cantaloupe</span></li><li data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">Dates</span></li><li data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Nectarines</span></li><li data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Oranges and orange juice</span></li><li data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">Parsnips</span></li><li data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">Potatoes</span></li><li data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Prunes and prune juice</span></li><li data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">Pumpkin</span></li><li data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Spinach (cooked)</span></li><li data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">Sweet potatoes</span></li><li data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Swiss chard&nbsp;</span></li><li data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">Tomatoes and tomato juice</span></li><li data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">Vegetable juice</span></li><li data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">Apricot fresh or dried</span></li><li data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Acorn squash</span></li><li data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Butternut Squash</span></li><li data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">Broccoli</span></li><li data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">Dried figs</span></li><li data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">Grapefruit Juice</span></li><li data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">Honeydew</span></li><li data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">Kiwi</span></li><li data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">Mango</span></li><li data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Chinese Cabbage</span></li><li data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Prunes and Prune Juice</span></li><li data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">Papaya&nbsp;</span></li><li data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">Hubbard Squash&nbsp;</span></li><li data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Pomegranate</span></li><li data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">Kohlrabi&nbsp;</span></li><li data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">Pomegranate Juice</span></li><li data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">White Mushrooms,&nbsp;</span></li><li data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">Raisins</span></li><li data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">Okra</span></li><li data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">Parsnips</span></li><li data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">Pumpkin</span></li><li data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">Rutabagas</span></li><li data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">Spinach</span></li><li data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">Tomatoes/Tomato products</span></li><li data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Vegetable Juices</span></li></ul><span data-dcnode-id="3112" instrument_node="">
</span><p data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">Other foods high in potassium include&nbsp;</span></p><span data-dcnode-id="3109" instrument_node="">
</span><ul data-dcnode-id="3072"><li data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">Bran products</span></li><li data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Chocolate</span></li><li data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">Bamboo Shoots</span></li><li data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Granola</span></li><li data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Baked Beans</span></li><li data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Milk</span></li><li data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">Molasses</span></li><li data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">Refried Beans</span></li><li data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">Black Beans&nbsp;</span></li><li data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">Nuts</span></li><li data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Seeds&nbsp;</span></li><li data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Peanut Butter</span></li><li data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">Salt-FreePoundcake Broth&nbsp;</span></li><li data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Dried Beans and Peas</span></li><li data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Yogurt&nbsp;</span></li><li data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">Lentils&nbsp;</span></li><li data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Legumes&nbsp;</span></li><li data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Salt Substitutes/Lite Salt</span></li></ul><span data-dcnode-id="3071" instrument_node="">
</span><h4 data-dcnode-id="3068"><strong data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Avoid Foods High in Phosphorus</span></strong></h4><span data-dcnode-id="3067" instrument_node="">
