</span></div></figure><span data-dcnode-id="6192" instrument_node="">
</span><h2 data-dcnode-id="6187"><span class="ez-toc-section" data-dcnode-id="6191" id="What_is_Chronic_Kidney_Disease"></span><strong data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">What is Chronic Kidney Disease?</span></strong><span class="ez-toc-section-end" data-dcnode-id="6188"></span></h2><span data-dcnode-id="6186" instrument_node="">
</span><p data-dcnode-id="6181"><span data-dcnode-id="6185" instrument_node="">Chronic kidney disease or CKD for short is a condition that affects 37 million American adults according to the </span><a data-dcnode-id="6183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23ckd" onclick="javascript:window.open('http://www.kidney.org/atoz/content/about-chronic-kidney-disease#ckd'); return false;"><span data-dcnode-id="6184" instrument_node="">National Kidney Foundation</span></a><span data-dcnode-id="6182" instrument_node="">. It is a disease that affects the health of the kidneys. Over time the kidneys get worn out and are longer be able to function properly.&nbsp;</span></p><span data-dcnode-id="6180" instrument_node="">
</span><h2 data-dcnode-id="6175"><span class="ez-toc-section" data-dcnode-id="6179" id="What_is_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">What is Stage 3 Kidney Disease?</span></strong><span class="ez-toc-section-end" data-dcnode-id="6176"></span></h2><span data-dcnode-id="6174" instrument_node="">
</span><p data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">There are five stages of kidney disease. It starts with mild kidney damage in stage one. If this condition goes unmanaged it will progress up to stage 5. Also known as end stage renal disease (ESRD). This is when kidney failure sets in. The kidneys no longer work and dialysis is required to filter the blood.</span></p><span data-dcnode-id="6171" instrument_node="">
</span><p data-dcnode-id="6169"><span data-dcnode-id="6170" instrument_node="">This article will mainly focus on third stage kidney disease. This is where disease progression hits the middle of the spectrum.</span></p><span data-dcnode-id="6168" instrument_node="">
</span><p data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">If you’re wondering, is stage 3 kidney disease serious? Yes, it is. Stage 3 is worse than stage 1 but not as bad as stage 4 and 5. Damage has been done to the kidneys that cannot be repaired but they still can function.&nbsp;</span></p><span data-dcnode-id="6165" instrument_node="">
</span><p data-dcnode-id="6163"><span data-dcnode-id="6164" instrument_node="">In stage 3 there is still time to preserve kidney health. It may also prevent someone from losing all kidney function and needing dialysis.&nbsp;</span></p><span data-dcnode-id="6162" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="6158"><img alt="" class="wp-image-3370 entered error" data-dcnode-id="6161" data-lazy-sizes="(max-width: 683px) 100vw, 683px" data-lazy-src="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-683x1024.png" data-lazy-srcset="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-683x1024.png 683w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-200x300.png 200w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-768x1152.png 768w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1.png 1000w" data-ll-status="error" height="1024" sizes="(max-width: 683px) 100vw, 683px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-683x1024.png&amp;raw" srcset="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-683x1024.png 683w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-200x300.png 200w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-768x1152.png 768w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1.png 1000w" width="683"><noscript data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">&lt;img width="683" height="1024" src="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-683x1024.png" alt="" class="wp-image-3370" srcset="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-683x1024.png 683w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-200x300.png 200w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1-768x1152.png 768w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/2-1.png 1000w" sizes="(max-width: 683px) 100vw, 683px" /&gt;</span></noscript></figure><span data-dcnode-id="6157" instrument_node="">
</span><h2 data-dcnode-id="6148"><span class="ez-toc-section" data-dcnode-id="6156" id="What_Causes_Stage_3_Kidney_Disease_To_Occur"></span><strong data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">What Causes </span></strong><strong data-dcnode-id="6152"><span data-dcnode-id="6153" instrument_node="">Stage 3 Kidney Disease</span></strong><strong data-dcnode-id="6150"><span data-dcnode-id="6151" instrument_node=""> To Occur?</span></strong><span class="ez-toc-section-end" data-dcnode-id="6149"></span></h2><span data-dcnode-id="6147" instrument_node="">
</span><p data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">Stage 3 kidney disease is not something that just comes on suddenly. Instead, it progresses over time due to chronic kidney disease.&nbsp;</span></p><span data-dcnode-id="6144" instrument_node="">
</span><h2 data-dcnode-id="6137"><span class="ez-toc-section" data-dcnode-id="6143" id="Health_Conditions_that_Impact_Stage_3_Kidney_Disease"></span><strong data-dcnode-id="6141"><span data-dcnode-id="6142" instrument_node="">Health Conditions that Impact </span></strong><strong data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">Stage 3 Kidney Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="6138"></span></h2><span data-dcnode-id="6136" instrument_node="">
</span><p data-dcnode-id="6131"><span data-dcnode-id="6135" instrument_node="">This disease occurs when there is </span><a data-dcnode-id="6133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23causes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/about-chronic-kidney-disease#causes'); return false;"><span data-dcnode-id="6134" instrument_node="">damage to the kidneys</span></a><span data-dcnode-id="6132" instrument_node="">. Conditions that may lead to CKD are&nbsp;</span></p><span data-dcnode-id="6130" instrument_node="">
</span><ul data-dcnode-id="6119"><li data-dcnode-id="6128"><span data-dcnode-id="6129" instrument_node="">Diabetes</span></li><li data-dcnode-id="6126"><span data-dcnode-id="6127" instrument_node="">High blood pressure</span></li><li data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">Glomerulonephritis</span></li><li data-dcnode-id="6122"><span data-dcnode-id="6123" instrument_node="">Inherited diseases</span></li><li data-dcnode-id="6120"><span data-dcnode-id="6121" instrument_node="">Autoimmune disorders</span></li></ul><span data-dcnode-id="6118" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="6108"><picture class="wp-image-3391" data-dcnode-id="6112"><span data-dcnode-id="6117" instrument_node="">

</span><h3 data-dcnode-id="6102"><span class="ez-toc-section" data-dcnode-id="6106" id="Diabetes"></span><strong data-dcnode-id="6104"><span data-dcnode-id="6105" instrument_node="">Diabetes</span></strong><span class="ez-toc-section-end" data-dcnode-id="6103"></span></h3><span data-dcnode-id="6101" instrument_node="">
</span><p data-dcnode-id="6096"><span data-dcnode-id="6100" instrument_node="">When blood sugar becomes too high diabetes sets in. High blood sugar can </span><a data-dcnode-id="6098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/diabetes/overview/preventing-problems/diabetic-kidney-disease" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/diabetes/overview/preventing-problems/diabetic-kidney-disease'); return false;"><span data-dcnode-id="6099" instrument_node="">damage</span></a><span data-dcnode-id="6097" instrument_node=""> blood vessels in the kidneys leading to poor kidney function.</span></p><span data-dcnode-id="6095" instrument_node="">
</span><h3 data-dcnode-id="6090"><span class="ez-toc-section" data-dcnode-id="6094" id="High_Blood_Pressure"></span><strong data-dcnode-id="6092"><span data-dcnode-id="6093" instrument_node="">High Blood Pressure</span></strong><span class="ez-toc-section-end" data-dcnode-id="6091"></span></h3><span data-dcnode-id="6089" instrument_node="">
</span><p data-dcnode-id="6084"><span data-dcnode-id="6088" instrument_node="">The kidneys are needed for blood pressure regulation. Uncontrolled high blood pressure </span><a data-dcnode-id="6086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/high-blood-pressure%23HBPKidneys" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/high-blood-pressure#HBPKidneys'); return false;"><span data-dcnode-id="6087" instrument_node="">weakens and damages</span></a><span data-dcnode-id="6085" instrument_node=""> the kidney. Because of this, they will not be able to excrete wastes. This causes fluid imbalances which lead to hypertension. High blood pressure causes damage to kidney blood vessels resulting in further water retention.</span></p><span data-dcnode-id="6083" instrument_node="">
</span><h3 data-dcnode-id="6078"><span class="ez-toc-section" data-dcnode-id="6082" id="Glomerulonephritis"></span><strong data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">Glomerulonephritis</span></strong><span class="ez-toc-section-end" data-dcnode-id="6079"></span></h3><span data-dcnode-id="6077" instrument_node="">
</span><p data-dcnode-id="6069"><span data-dcnode-id="6076" instrument_node="">Glomerulonephritis is a group of disorders that </span><a data-dcnode-id="6074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/glomerul" onclick="javascript:window.open('https://www.kidney.org/atoz/content/glomerul'); return false;"><span data-dcnode-id="6075" instrument_node="">inflame and damage</span></a><span data-dcnode-id="6073" instrument_node=""> the kidney’s filtering units. This is the third leading </span><a data-dcnode-id="6071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23causes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/about-chronic-kidney-disease#causes'); return false;"><span data-dcnode-id="6072" instrument_node="">cause</span></a><span data-dcnode-id="6070" instrument_node=""> of kidney disease.</span></p><span data-dcnode-id="6068" instrument_node="">
</span><h3 data-dcnode-id="6063"><span class="ez-toc-section" data-dcnode-id="6067" id="Inherited_Diseases"></span><strong data-dcnode-id="6065"><span data-dcnode-id="6066" instrument_node="">Inherited Diseases</span></strong><span class="ez-toc-section-end" data-dcnode-id="6064"></span></h3><span data-dcnode-id="6062" instrument_node="">
</span><p data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">Some people are born with a condition that causes damage to the kidneys. These include</span></p><span data-dcnode-id="6059" instrument_node="">
</span><ul data-dcnode-id="6025"><li data-dcnode-id="6056"><a data-dcnode-id="6057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23causes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/about-chronic-kidney-disease#causes'); return false;"><span data-dcnode-id="6058" instrument_node="">Polycystic kidney disease</span></a></li><li data-dcnode-id="6053"><a data-dcnode-id="6054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/'); return false;"><span data-dcnode-id="6055" instrument_node="">Alport syndrome</span></a></li><li data-dcnode-id="6050"><a data-dcnode-id="6051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/'); return false;"><span data-dcnode-id="6052" instrument_node="">Tuberous sclerosis</span></a></li><li data-dcnode-id="6047"><a data-dcnode-id="6048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/'); return false;"><span data-dcnode-id="6049" instrument_node="">Von Hippel Lindau disease</span></a></li><li data-dcnode-id="6044"><a data-dcnode-id="6045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uofmhealth.org/conditions-treatments/kidney/inherited-kidney-conditions" onclick="javascript:window.open('https://www.uofmhealth.org/conditions-treatments/kidney/inherited-kidney-conditions'); return false;"><span data-dcnode-id="6046" instrument_node="">Thin Basement Membrane Disease</span></a></li><li data-dcnode-id="6041"><a data-dcnode-id="6042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uofmhealth.org/conditions-treatments/kidney/inherited-kidney-conditions" onclick="javascript:window.open('https://www.uofmhealth.org/conditions-treatments/kidney/inherited-kidney-conditions'); return false;"><span data-dcnode-id="6043" instrument_node="">Gitelman and Bartter Syndromes&nbsp;</span></a></li><li data-dcnode-id="6038"><a data-dcnode-id="6039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uofmhealth.org/conditions-treatments/kidney/inherited-kidney-conditions" onclick="javascript:window.open('https://www.uofmhealth.org/conditions-treatments/kidney/inherited-kidney-conditions'); return false;"><span data-dcnode-id="6040" instrument_node="">Lowe Syndrome</span></a></li><li data-dcnode-id="6035"><a data-dcnode-id="6036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uofmhealth.org/conditions-treatments/kidney/inherited-kidney-conditions" onclick="javascript:window.open('https://www.uofmhealth.org/conditions-treatments/kidney/inherited-kidney-conditions'); return false;"><span data-dcnode-id="6037" instrument_node="">Hereditary Interstitial Kidney Disease</span></a></li><li data-dcnode-id="6032"><a data-dcnode-id="6033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/'); return false;"><span data-dcnode-id="6034" instrument_node="">Fabry Disease</span></a></li><li data-dcnode-id="6029"><a data-dcnode-id="6030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/'); return false;"><span data-dcnode-id="6031" instrument_node="">Nephronophthisis</span></a></li><li data-dcnode-id="6026"><a data-dcnode-id="6027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4975268/'); return false;"><span data-dcnode-id="6028" instrument_node="">Nephrogenic diabetes insipidus</span></a></li></ul><span data-dcnode-id="6024" instrument_node="">
</span><h3 data-dcnode-id="6019"><span class="ez-toc-section" data-dcnode-id="6023" id="Autoimmune_Conditions"></span><strong data-dcnode-id="6021"><span data-dcnode-id="6022" instrument_node="">Autoimmune Conditions</span></strong><span class="ez-toc-section-end" data-dcnode-id="6020"></span></h3><span data-dcnode-id="6018" instrument_node="">
</span><p data-dcnode-id="6013"><span data-dcnode-id="6017" instrument_node="">Autoimmune conditions occur due to a hypersensitive immune system. In these conditions, the body sees its cells as foreign invaders and </span><a data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK27155/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK27155/'); return false;"><span data-dcnode-id="6016" instrument_node="">will attack</span></a><span data-dcnode-id="6014" instrument_node="">. Cell damage and inflammation will then occur. Autoimmune conditions that cause problems for the kidneys include&nbsp;</span></p><span data-dcnode-id="6012" instrument_node="">
</span><ul data-dcnode-id="6004"><li data-dcnode-id="6008"><a data-dcnode-id="6010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23causes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/about-chronic-kidney-disease#causes'); return false;"><span data-dcnode-id="6011" instrument_node="">Lupus</span></a><span data-dcnode-id="6009" instrument_node="">&nbsp;</span></li><li data-dcnode-id="6005"><a data-dcnode-id="6006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/goodpasture" onclick="javascript:window.open('https://www.kidney.org/atoz/content/goodpasture'); return false;"><span data-dcnode-id="6007" instrument_node="">Good Pasture Syndrome</span></a></li></ul><span data-dcnode-id="6003" instrument_node="">
</span><h2 data-dcnode-id="5994"><span class="ez-toc-section" data-dcnode-id="6002" id="How_is_Stage_3_Kidney_Disease_Diagnosed"></span><strong data-dcnode-id="6000"><span data-dcnode-id="6001" instrument_node="">How is </span></strong><strong data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">Stage 3 Kidney Disease</span></strong><strong data-dcnode-id="5996"><span data-dcnode-id="5997" instrument_node=""> Diagnosed?</span></strong><span class="ez-toc-section-end" data-dcnode-id="5995"></span></h2><span data-dcnode-id="5993" instrument_node="">
</span><p data-dcnode-id="5991"><span data-dcnode-id="5992" instrument_node="">You may be wondering what happens in stage 3 kidney disease? Get the details here.</span></p><span data-dcnode-id="5990" instrument_node="">
</span><p data-dcnode-id="5982"><span data-dcnode-id="5989" instrument_node="">This is the first stage that the disease can be detected by a clinical diagnosis. A </span><a data-dcnode-id="5987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2887275/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2887275/'); return false;"><span data-dcnode-id="5988" instrument_node="">blood</span></a><span data-dcnode-id="5986" instrument_node=""> and </span><a data-dcnode-id="5984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/what-creatinine" onclick="javascript:window.open('https://www.kidney.org/atoz/content/what-creatinine'); return false;"><span data-dcnode-id="5985" instrument_node="">urine</span></a><span data-dcnode-id="5983" instrument_node=""> test will tell how well the kidneys are functioning.</span></p><span data-dcnode-id="5981" instrument_node="">
</span><h2 data-dcnode-id="5976"><span class="ez-toc-section" data-dcnode-id="5980" id="What_Measures_Kidney_Function"></span><strong data-dcnode-id="5978"><span data-dcnode-id="5979" instrument_node="">What Measures Kidney Function?</span></strong><span class="ez-toc-section-end" data-dcnode-id="5977"></span></h2><span data-dcnode-id="5975" instrument_node="">
</span><p data-dcnode-id="5970"><span data-dcnode-id="5974" instrument_node="">Creatinine levels measure kidney function. </span><a data-dcnode-id="5972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/what-creatinine" onclick="javascript:window.open('https://www.kidney.org/atoz/content/what-creatinine'); return false;"><span data-dcnode-id="5973" instrument_node="">Creatinine</span></a><span data-dcnode-id="5971" instrument_node=""> is a waste product that is produced from the normal wear and tear on muscles in the body. Therefore, the level of creatinine tells how well the kidneys are functioning.&nbsp;</span></p><span data-dcnode-id="5969" instrument_node="">
</span><p data-dcnode-id="5964"><span data-dcnode-id="5968" instrument_node="">The kidneys are responsible for getting rid of creatinine. This </span><a data-dcnode-id="5966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/what-creatinine" onclick="javascript:window.open('https://www.kidney.org/atoz/content/what-creatinine'); return false;"><span data-dcnode-id="5967" instrument_node="">creatinine clearance</span></a><span data-dcnode-id="5965" instrument_node=""> shows how much creatinine has passed through your kidneys into your urine.&nbsp;</span></p><span data-dcnode-id="5963" instrument_node="">
</span><h3 data-dcnode-id="5952"><span class="ez-toc-section" data-dcnode-id="5962" id="Estimated_Glomerular_Filtration_Rate_EGFR_Tells_Your_Kidney_Disease_Stage"></span><strong data-dcnode-id="5960"><span data-dcnode-id="5961" instrument_node="">Estimated Glomerular Filtration</span></strong><strong data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node=""> Rate (</span></strong><strong data-dcnode-id="5956"><span data-dcnode-id="5957" instrument_node="">EGFR</span></strong><strong data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">) Tells Your Kidney Disease Stage</span></strong><span class="ez-toc-section-end" data-dcnode-id="5953"></span></h3><span data-dcnode-id="5951" instrument_node="">
</span><p data-dcnode-id="5946"><span data-dcnode-id="5950" instrument_node="">Another name for creatinine clearance is the estimated glomerular filtration (eSGF) or estimated glomerular filtration rate (eGFR). This number is the most </span><a data-dcnode-id="5948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/gfr" onclick="javascript:window.open('https://www.kidney.org/atoz/content/gfr'); return false;"><span data-dcnode-id="5949" instrument_node="">accurate way</span></a><span data-dcnode-id="5947" instrument_node=""> to measure kidney function. It is based on the results of the creatinine clearance, your age, body size, and gender.</span></p><span data-dcnode-id="5945" instrument_node="">
</span><p data-dcnode-id="5940"><span data-dcnode-id="5944" instrument_node="">Your doctor can calculate the eGFR to determine the stage of kidney disease. The lower the number the worse the kidneys are functioning. See below for the breakout of eGFR based on </span><a data-dcnode-id="5942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/gfr" onclick="javascript:window.open('https://www.kidney.org/atoz/content/gfr'); return false;"><span data-dcnode-id="5943" instrument_node="">each stage</span></a><span data-dcnode-id="5941" instrument_node=""> of kidney disease.</span></p><span data-dcnode-id="5939" instrument_node="">
</span><h4 data-dcnode-id="5936"><strong data-dcnode-id="5937"><span data-dcnode-id="5938" instrument_node="">CKD Stage 1 eGFR</span></strong></h4><span data-dcnode-id="5935" instrument_node="">
</span><p data-dcnode-id="5924"><span data-dcnode-id="5934" instrument_node="">CKD stage 1 is when there is still </span><strong data-dcnode-id="5932"><span data-dcnode-id="5933" instrument_node="">90 to 100 percent</span></strong><span data-dcnode-id="5931" instrument_node=""> of kidney function left. This stage has kidney damage with </span><strong data-dcnode-id="5929"><span data-dcnode-id="5930" instrument_node="">normal</span></strong><span data-dcnode-id="5928" instrument_node=""> kidney function. The eGFR is at </span><a data-dcnode-id="5926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/health-statistics/kidney-disease" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/health-statistics/kidney-disease'); return false;"><span data-dcnode-id="5927" instrument_node="">90 mL/min or higher</span></a><span data-dcnode-id="5925" instrument_node="">.</span></p><span data-dcnode-id="5923" instrument_node="">
</span><h4 data-dcnode-id="5920"><strong data-dcnode-id="5921"><span data-dcnode-id="5922" instrument_node="">CKD Stage 2 eGFR</span></strong></h4><span data-dcnode-id="5919" instrument_node="">
</span><p data-dcnode-id="5908"><span data-dcnode-id="5918" instrument_node="">CKD stage 2 is when the kidneys have </span><strong data-dcnode-id="5916"><span data-dcnode-id="5917" instrument_node="">60 to 89 percent</span></strong><span data-dcnode-id="5915" instrument_node=""> of function. This stage has kidney damage with </span><strong data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">mild</span></strong><span data-dcnode-id="5912" instrument_node=""> loss of kidney function. The eGFR falls between </span><a data-dcnode-id="5910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/health-statistics/kidney-disease" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/health-statistics/kidney-disease'); return false;"><span data-dcnode-id="5911" instrument_node="">60 and 89 mL/min</span></a><span data-dcnode-id="5909" instrument_node="">.</span></p><span data-dcnode-id="5907" instrument_node="">
</span><h4 data-dcnode-id="5904"><strong data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">CKD Stage 3 eGFR</span></strong></h4><span data-dcnode-id="5903" instrument_node="">
</span><p data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">Stage 3 kidney has two stages: 3A and 3B.&nbsp;</span></p><span data-dcnode-id="5900" instrument_node="">
</span><h5 data-dcnode-id="5897"><strong data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">CKD Stage 3A</span></strong></h5><span data-dcnode-id="5896" instrument_node="">
</span><p data-dcnode-id="5885"><span data-dcnode-id="5895" instrument_node="">The 3A stage of kidney disease is when there is </span><strong data-dcnode-id="5893"><span data-dcnode-id="5894" instrument_node="">mild to moderate</span></strong><span data-dcnode-id="5892" instrument_node=""> loss of kidney function. At this point, the kidneys are functioning between </span><strong data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">45 to 59 percent</span></strong><span data-dcnode-id="5889" instrument_node="">. The eGFR for stage 3A is </span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/health-statistics/kidney-disease" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/health-statistics/kidney-disease'); return false;"><span data-dcnode-id="5888" instrument_node="">between 45 and 59 mL/min</span></a><span data-dcnode-id="5886" instrument_node="">.</span></p><span data-dcnode-id="5884" instrument_node="">
</span><h5 data-dcnode-id="5881"><strong data-dcnode-id="5882"><span data-dcnode-id="5883" instrument_node="">CKD Stage 3B</span></strong></h5><span data-dcnode-id="5880" instrument_node="">
</span><p data-dcnode-id="5869"><span data-dcnode-id="5879" instrument_node="">The 3B stage of kidney disease is when there is </span><strong data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">moderate to a severe</span></strong><span data-dcnode-id="5876" instrument_node=""> loss of kidney function. The kidneys are operating at only </span><strong data-dcnode-id="5874"><span data-dcnode-id="5875" instrument_node="">30 to 40% capacity</span></strong><span data-dcnode-id="5873" instrument_node="">. The eGFR in stage 3B is </span><a data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/health-statistics/kidney-disease" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/health-statistics/kidney-disease'); return false;"><span data-dcnode-id="5872" instrument_node="">between 30 and 40 mL/min</span></a><span data-dcnode-id="5870" instrument_node="">.</span></p><span data-dcnode-id="5868" instrument_node="">
</span><h4 data-dcnode-id="5861"><strong data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">CKD Stage</span></strong><strong data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node=""> 4 </span></strong><strong data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">eGFR</span></strong></h4><span data-dcnode-id="5860" instrument_node="">
</span><p data-dcnode-id="5849"><span data-dcnode-id="5859" instrument_node="">In CKD stage 4, there is </span><strong data-dcnode-id="5857"><span data-dcnode-id="5858" instrument_node="">severe </span></strong><span data-dcnode-id="5856" instrument_node="">loss of kidney function. The kidneys perform between only </span><strong data-dcnode-id="5854"><span data-dcnode-id="5855" instrument_node="">15 and 29% capacity</span></strong><span data-dcnode-id="5853" instrument_node="">. The eGFR runs </span><a data-dcnode-id="5851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/health-statistics/kidney-disease" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/health-statistics/kidney-disease'); return false;"><span data-dcnode-id="5852" instrument_node="">between 15 and 29 mL/min</span></a><span data-dcnode-id="5850" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5848" instrument_node="">
</span><h4 data-dcnode-id="5841"><strong data-dcnode-id="5846"><span data-dcnode-id="5847" instrument_node="">CKD Stage</span></strong><strong data-dcnode-id="5844"><span data-dcnode-id="5845" instrument_node=""> 5 </span></strong><strong data-dcnode-id="5842"><span data-dcnode-id="5843" instrument_node="">eGFR</span></strong></h4><span data-dcnode-id="5840" instrument_node="">
</span><p data-dcnode-id="5829"><span data-dcnode-id="5839" instrument_node="">CKD stage 5 is when </span><strong data-dcnode-id="5837"><span data-dcnode-id="5838" instrument_node="">kidney failure</span></strong><span data-dcnode-id="5836" instrument_node=""> or end-stage renal disease (ESRD). This means that there is </span><strong data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">less than 15%</span></strong><span data-dcnode-id="5833" instrument_node=""> of kidney functioning happening. The eGFR is </span><a data-dcnode-id="5831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/health-statistics/kidney-disease" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/health-statistics/kidney-disease'); return false;"><span data-dcnode-id="5832" instrument_node="">less than 15 mL/min</span></a><span data-dcnode-id="5830" instrument_node="">. This stage can require dialysis or a kidney transplant.</span></p><span data-dcnode-id="5828" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="5818"><picture class="wp-image-3387" data-dcnode-id="5822"><span data-dcnode-id="5827" instrument_node="">
</span><source data-dcnode-id="5826" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-srcset="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1.png.webp 800w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1-120x300.png.webp 120w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1-410x1024.png.webp 410w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1-768x1920.png.webp 768w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1-614x1536.png.webp 614w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%202000'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="5825" instrument_node="">
</span><img alt="The stages of kidney disease:

Stage 1 (90-100% kidney function. Stage 1 CKD is when there is 90-100% of kidney function, but there is some damage present. The eGFR will be 90 mL/min or greater.

Stage 2 (60-89%) With stage 2 CKD, there is some decreased function. The GFR will be between 60-89%.

Stage 3a (45-59%) In Stage 3a CKD, the function is around 50%. This is where symptoms may or may not be present, but there's a lot to be done that can help preserve function. 

Stage 3b (30-44%) The later half of stage 3 is below 45% down to 30% function. More symptoms like low energy may be seen here.

Stage 4 (15-29%) Stage 4 CKD is with less than 1/3 kidney function remaining. Symptoms such as low energy and even potassium or fluid retention may be experienced.

Stage 5 (<15%) At stage 5 CKD, dialysis is offered. Transplant is another option that may be available. Nutrition is helpful to prevent symptoms in stage 5.

No matter what stage of CKD you have, there are plenty of opportunities to care for your kidneys and your health.

Work with a renal dietitian to learn about what your numbers mean and what you should focus on. 

Speak with your doctor about being referred to a renal dietitian, contact your health insurance company to see who takes your insurance, or reach out to a dietitian you want to work with." data-dcnode-id="5824" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1.png" data-lazy-srcset="https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1.png 800w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1-120x300.png 120w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1-410x1024.png 410w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1-768x1920.png 768w, https://www.plantpoweredkidneys.com/wp-content/uploads/2021/05/CKD3-blog-infographics-1-614x1536.png 614w" height="2000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%202000'%3E%3C/svg%3E" width="800"><span data-dcnode-id="5823" instrument_node="">

</span><h2 data-dcnode-id="5812"><span class="ez-toc-section" data-dcnode-id="5816" id="Risk_factors"></span><strong data-dcnode-id="5814"><span data-dcnode-id="5815" instrument_node="">Risk factors</span></strong><span class="ez-toc-section-end" data-dcnode-id="5813"></span></h2><span data-dcnode-id="5811" instrument_node="">
</span><p data-dcnode-id="5809"><span data-dcnode-id="5810" instrument_node="">Like chronic kidney disease having another underlying health condition may increase your chances of moving into stage 3. Risk factors for CKD3 include the following:</span></p><span data-dcnode-id="5808" instrument_node="">
</span><ul data-dcnode-id="5744"><li data-dcnode-id="5805"><a data-dcnode-id="5806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/content/kidney-failure-risk-factor-age" onclick="javascript:window.open('https://www.kidney.org/content/kidney-failure-risk-factor-age'); return false;"><span data-dcnode-id="5807" instrument_node="">Age</span></a></li><li data-dcnode-id="5802"><a data-dcnode-id="5803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/atriskckd" onclick="javascript:window.open('https://www.kidney.org/atoz/content/atriskckd'); return false;"><span data-dcnode-id="5804" instrument_node="">History of diabetes</span></a></li><li data-dcnode-id="5799"><a data-dcnode-id="5800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/atriskckd" onclick="javascript:window.open('https://www.kidney.org/atoz/content/atriskckd'); return false;"><span data-dcnode-id="5801" instrument_node="">History of hypertension</span></a></li><li data-dcnode-id="5796"><a data-dcnode-id="5797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3004836/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3004836/'); return false;"><span data-dcnode-id="5798" instrument_node="">Smoking</span></a></li><li data-dcnode-id="5793"><a data-dcnode-id="5794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23causes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/about-chronic-kidney-disease#causes'); return false;"><span data-dcnode-id="5795" instrument_node="">Autoimmune disorders</span></a></li><li data-dcnode-id="5790"><a data-dcnode-id="5791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23causes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/about-chronic-kidney-disease#causes'); return false;"><span data-dcnode-id="5792" instrument_node="">Family history of kidney failure</span></a></li><li data-dcnode-id="5787"><a data-dcnode-id="5788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/Summer10/HighCholesterol" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/Summer10/HighCholesterol'); return false;"><span data-dcnode-id="5789" instrument_node="">High cholesterol</span></a></li><li data-dcnode-id="5784"><a data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/doi/10.1161/ATVBAHA.119.312705" onclick="javascript:window.open('https://www.ahajournals.org/doi/10.1161/ATVBAHA.119.312705'); return false;"><span data-dcnode-id="5786" instrument_node="">Atherosclerosis</span></a></li><li data-dcnode-id="5781"><a data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/kidneystones" onclick="javascript:window.open('https://www.kidney.org/atoz/content/kidneystones'); return false;"><span data-dcnode-id="5783" instrument_node="">Kidney stones</span></a></li><li data-dcnode-id="5778"><a data-dcnode-id="5779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/newsroom/fsindex%23what-causes-kidney-disease" onclick="javascript:window.open('https://www.kidney.org/news/newsroom/fsindex#what-causes-kidney-disease'); return false;"><span data-dcnode-id="5780" instrument_node="">Urinary Tract Infections (UTIs)</span></a></li><li data-dcnode-id="5775"><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/newsroom/fsindex%23what-causes-kidney-disease" onclick="javascript:window.open('https://www.kidney.org/news/newsroom/fsindex#what-causes-kidney-disease'); return false;"><span data-dcnode-id="5777" instrument_node="">Enlarged prostate</span></a></li><li data-dcnode-id="5772"><a data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5433675/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5433675/'); return false;"><span data-dcnode-id="5774" instrument_node="">Obesity</span></a></li><li data-dcnode-id="5769"><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes'); return false;"><span data-dcnode-id="5771" instrument_node="">A genetic disorder that produces cysts in and/or damages the kidneys</span></a></li><li data-dcnode-id="5766"><a data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes'); return false;"><span data-dcnode-id="5768" instrument_node="">A kidney infection</span></a></li><li data-dcnode-id="5763"><a data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karger.com/Article/Fulltext/507886" onclick="javascript:window.open('https://www.karger.com/Article/Fulltext/507886'); return false;"><span data-dcnode-id="5765" instrument_node="">Scleroderma</span></a></li><li data-dcnode-id="5760"><a data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4172733/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4172733/'); return false;"><span data-dcnode-id="5762" instrument_node="">Liver disease</span></a></li><li data-dcnode-id="5757"><a data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes'); return false;"><span data-dcnode-id="5759" instrument_node="">A drug that is toxic to the kidneys</span></a></li><li data-dcnode-id="5754"><a data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes'); return false;"><span data-dcnode-id="5756" instrument_node="">Conditions that inflame the kidney</span></a></li><li data-dcnode-id="5751"><a data-dcnode-id="5752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes'); return false;"><span data-dcnode-id="5753" instrument_node="">Heavy metal poisoning (lead poisoning)</span></a></li><li data-dcnode-id="5748"><a data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes'); return false;"><span data-dcnode-id="5750" instrument_node="">Conditions that damage blood vessels in the kidneys (hemolytic uremic syndrome)</span></a></li><li data-dcnode-id="5745"><a data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/chronic-kidney-disease-ckd/causes'); return false;"><span data-dcnode-id="5747" instrument_node="">Conditions that damage arteries in the kidneys (renal artery stenosis)</span></a></li></ul><span data-dcnode-id="5743" instrument_node="">
</span><p data-dcnode-id="5738"><span data-dcnode-id="5742" instrument_node="">CKD is also more prevalent among certain </span><a data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/race-ethnicity" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/race-ethnicity'); return false;"><span data-dcnode-id="5741" instrument_node="">races and ethnicities</span></a><span data-dcnode-id="5739" instrument_node="">. These include&nbsp;</span></p><span data-dcnode-id="5737" instrument_node="">
</span><ul data-dcnode-id="5721"><li data-dcnode-id="5734"><a data-dcnode-id="5735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/race-ethnicity" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/race-ethnicity'); return false;"><span data-dcnode-id="5736" instrument_node="">African Americans</span></a></li><li data-dcnode-id="5731"><a data-dcnode-id="5732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/race-ethnicity" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/race-ethnicity'); return false;"><span data-dcnode-id="5733" instrument_node="">Hispanics</span></a></li><li data-dcnode-id="5728"><a data-dcnode-id="5729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niddk.nih.gov/health-information/kidney-disease/race-ethnicity" onclick="javascript:window.open('https://www.niddk.nih.gov/health-information/kidney-disease/race-ethnicity'); return false;"><span data-dcnode-id="5730" instrument_node="">Native Americans</span></a></li><li data-dcnode-id="5725"><a data-dcnode-id="5726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/AsianAmericans-KD" onclick="javascript:window.open('https://www.kidney.org/atoz/content/AsianAmericans-KD'); return false;"><span data-dcnode-id="5727" instrument_node="">Asian Americans</span></a></li><li data-dcnode-id="5722"><a data-dcnode-id="5723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/atriskckd" onclick="javascript:window.open('https://www.kidney.org/atoz/content/atriskckd'); return false;"><span data-dcnode-id="5724" instrument_node="">Pacific Islanders</span></a></li></ul><span data-dcnode-id="5720" instrument_node="">
</span><p data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">The risk of diabetes and heart disease is high among these groups of people. When these conditions go unmanaged they can manifest into stage 3 of chronic kidney disease.</span></p><span data-dcnode-id="5717" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="5707"><picture class="wp-image-3392" data-dcnode-id="5711"><span data-dcnode-id="5716" instrument_node="">
