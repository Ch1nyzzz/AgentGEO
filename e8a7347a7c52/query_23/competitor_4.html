</span></noscript></figure><span data-dcnode-id="5706" instrument_node="">
</span><h2 data-dcnode-id="5701"><span class="ez-toc-section" data-dcnode-id="5705" id="Symptoms"></span><strong data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">Symptoms</span></strong><span class="ez-toc-section-end" data-dcnode-id="5702"></span></h2><span data-dcnode-id="5700" instrument_node="">
</span><p data-dcnode-id="5695"><span data-dcnode-id="5699" instrument_node="">The early stages of CKD often </span><a data-dcnode-id="5697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/fall10/EarlyCKDSymptoms" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/fall10/EarlyCKDSymptoms'); return false;"><span data-dcnode-id="5698" instrument_node="">do not show</span></a><span data-dcnode-id="5696" instrument_node=""> any symptoms. So the health of the kidneys will be slowly declining but you will have no idea that it is happening.&nbsp;</span></p><span data-dcnode-id="5694" instrument_node="">
</span><p data-dcnode-id="5689"><span data-dcnode-id="5693" instrument_node="">Luckily, some symptoms occur during the middle stage of CKD. Stage 3 kidney disease </span><a data-dcnode-id="5691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5692" instrument_node="">symptoms</span></a><span data-dcnode-id="5690" instrument_node=""> include:&nbsp;</span></p><span data-dcnode-id="5688" instrument_node="">
</span><ul data-dcnode-id="5648"><li data-dcnode-id="5685"><a data-dcnode-id="5686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcnephrol.biomedcentral.com/articles/10.1186/s12882-018-0942-1%23Sec11" onclick="javascript:window.open('https://bmcnephrol.biomedcentral.com/articles/10.1186/s12882-018-0942-1#Sec11'); return false;"><span data-dcnode-id="5687" instrument_node="">Protein in the urine</span></a></li><li data-dcnode-id="5682"><a data-dcnode-id="5683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5684" instrument_node="">Insomnia</span></a></li><li data-dcnode-id="5679"><a data-dcnode-id="5680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5681" instrument_node="">Fatigue</span></a></li><li data-dcnode-id="5676"><a data-dcnode-id="5677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5678" instrument_node="">Brain Fog</span></a></li><li data-dcnode-id="5673"><a data-dcnode-id="5674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5675" instrument_node="">Dry skin</span></a></li><li data-dcnode-id="5670"><a data-dcnode-id="5671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5672" instrument_node="">Itchy skin</span></a></li><li data-dcnode-id="5667"><a data-dcnode-id="5668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5669" instrument_node="">Frequent urination</span></a></li><li data-dcnode-id="5664"><a data-dcnode-id="5665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5666" instrument_node="">Blood in the urine</span></a></li><li data-dcnode-id="5661"><a data-dcnode-id="5662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5663" instrument_node="">Foam in the urine</span></a></li><li data-dcnode-id="5658"><a data-dcnode-id="5659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5660" instrument_node="">Puffiness around the eyes</span></a></li><li data-dcnode-id="5655"><a data-dcnode-id="5656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5657" instrument_node="">Swelling in ankles and feet</span></a></li><li data-dcnode-id="5652"><a data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merckmanuals.com/home/kidney-and-urinary-tract-disorders/kidney-failure/chronic-kidney-disease%23%3A~%3Atext%3DSevere%2520loss%2520of%2520kidney%2520function%2Ccertain%2520areas%2520of%2520the%2520body." onclick="javascript:window.open('https://www.merckmanuals.com/home/kidney-and-urinary-tract-disorders/kidney-failure/chronic-kidney-disease#:~:text=Severe%20loss%20of%20kidney%20function,certain%20areas%20of%20the%20body.'); return false;"><span data-dcnode-id="5654" instrument_node="">Muscle weakness, cramps, or pain</span></a></li><li data-dcnode-id="5649"><a data-dcnode-id="5650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease" onclick="javascript:window.open('https://www.kidney.org/news/ekidney/august14/10_Signs_You_May_Have_Kidney_Disease'); return false;"><span data-dcnode-id="5651" instrument_node="">Loss of appetite</span></a></li></ul><span data-dcnode-id="5647" instrument_node="">
</span><h2 data-dcnode-id="5642"><span class="ez-toc-section" data-dcnode-id="5646" id="Complications"></span><strong data-dcnode-id="5644"><span data-dcnode-id="5645" instrument_node="">Complications</span></strong><span class="ez-toc-section-end" data-dcnode-id="5643"></span></h2><span data-dcnode-id="5641" instrument_node="">
</span><p data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">Complications can arise from unmanaged kidney disease. However, they are not specific to any particular stage. Alternatively, they can occur throughout the disease during any or all of the stages of CKD.</span></p><span data-dcnode-id="5638" instrument_node="">
</span><p data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">As kidney function declines, wastes cannot be not properly excreted. As a result, they will build up in the body. When these levels become too high people often feel sick and the following complications may develop&nbsp;</span></p><span data-dcnode-id="5635" instrument_node="">
</span><ul data-dcnode-id="5604"><li data-dcnode-id="5632"><a data-dcnode-id="5633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23causes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/about-chronic-kidney-disease#causes'); return false;"><span data-dcnode-id="5634" instrument_node="">Anemia</span></a></li><li data-dcnode-id="5629"><a data-dcnode-id="5630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23causes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/about-chronic-kidney-disease#causes'); return false;"><span data-dcnode-id="5631" instrument_node="">High blood pressure</span></a></li><li data-dcnode-id="5626"><a data-dcnode-id="5627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5628" instrument_node="">Cardiovascular disease</span></a></li><li data-dcnode-id="5623"><a data-dcnode-id="5624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/27525435/" onclick="javascript:window.open('https://pubmed.ncbi.nlm.nih.gov/27525435/'); return false;"><span data-dcnode-id="5625" instrument_node="">Diabetes</span></a></li><li data-dcnode-id="5620"><a data-dcnode-id="5621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5622" instrument_node="">Mineral and bone disorders</span></a></li><li data-dcnode-id="5617"><a data-dcnode-id="5618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5619" instrument_node="">Changes in Nutritional Needs</span></a></li><li data-dcnode-id="5614"><a data-dcnode-id="5615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/about-chronic-kidney-disease%23causes" onclick="javascript:window.open('https://www.kidney.org/atoz/content/about-chronic-kidney-disease#causes'); return false;"><span data-dcnode-id="5616" instrument_node="">Nerve damage and neurological conditions</span></a></li><li data-dcnode-id="5611"><a data-dcnode-id="5612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5613" instrument_node="">High cholesterol and atherosclerosis</span></a></li><li data-dcnode-id="5608"><a data-dcnode-id="5609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/'); return false;"><span data-dcnode-id="5610" instrument_node="">Electrolyte Disorders (Salt and water retention)</span></a></li><li data-dcnode-id="5605"><a data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/'); return false;"><span data-dcnode-id="5607" instrument_node="">Metabolic acidosis</span></a></li></ul><span data-dcnode-id="5603" instrument_node="">
</span><h3 data-dcnode-id="5598"><span class="ez-toc-section" data-dcnode-id="5602" id="Anemia"></span><strong data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">Anemia</span></strong><span class="ez-toc-section-end" data-dcnode-id="5599"></span></h3><span data-dcnode-id="5597" instrument_node="">
</span><p data-dcnode-id="5592"><span data-dcnode-id="5596" instrument_node="">There are many causes of anemia but when it comes to kidney disease the most likely reason is due to a lack of the </span><a data-dcnode-id="5594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5595" instrument_node="">hormone erythropoietin</span></a><span data-dcnode-id="5593" instrument_node="">. This compound is secreted by the kidneys and produces red blood cells. So when the kidneys are not working properly erythropoietin is in low supply. This means fewer blood cells are being made and anemia may develop.</span></p><span data-dcnode-id="5591" instrument_node="">
</span><p data-dcnode-id="5583"><span data-dcnode-id="5590" instrument_node="">Anemia that goes untreated can </span><a data-dcnode-id="5588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5589" instrument_node="">result in</span></a><span data-dcnode-id="5587" instrument_node=""> cardiovascular disease. </span><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5586" instrument_node="">Anemia</span></a><span data-dcnode-id="5584" instrument_node=""> can also cause cognitive decline and increase the risk of stroke for those with CKD. During this condition, less oxygen is delivered to the brain. This can cause serious damage.</span></p><span data-dcnode-id="5582" instrument_node="">
</span><h3 data-dcnode-id="5577"><span class="ez-toc-section" data-dcnode-id="5581" id="High_Blood_Pressure-2"></span><strong data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">High Blood Pressure</span></strong><span class="ez-toc-section-end" data-dcnode-id="5578"></span></h3><span data-dcnode-id="5576" instrument_node="">
</span><p data-dcnode-id="5568"><span data-dcnode-id="5575" instrument_node="">High blood pressure is a </span><a data-dcnode-id="5573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5574" instrument_node="">complication</span></a><span data-dcnode-id="5572" instrument_node=""> of stage 3 kidney disease. Hypertension can </span><a data-dcnode-id="5570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/blog/kidney-cars/high-blood-pressure-and-your-kidneys" onclick="javascript:window.open('https://www.kidney.org/blog/kidney-cars/high-blood-pressure-and-your-kidneys'); return false;"><span data-dcnode-id="5571" instrument_node="">damage</span></a><span data-dcnode-id="5569" instrument_node=""> blood vessels in the kidneys. Impaired blood vessels will impact kidney function. As a result, the kidneys will not be able to remove extra fluid and waste from the body.&nbsp;</span></p><span data-dcnode-id="5567" instrument_node="">
</span><p data-dcnode-id="5562"><span data-dcnode-id="5566" instrument_node="">More fluid means a shift in blood pressure balance. This will </span><a data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/blog/kidney-cars/high-blood-pressure-and-your-kidneys" onclick="javascript:window.open('https://www.kidney.org/blog/kidney-cars/high-blood-pressure-and-your-kidneys'); return false;"><span data-dcnode-id="5565" instrument_node="">increase</span></a><span data-dcnode-id="5563" instrument_node=""> blood pressure and put more pressure on the kidneys. Therefore, uncontrolled blood pressure can lead to kidney failure.</span></p><span data-dcnode-id="5561" instrument_node="">
</span><p data-dcnode-id="5556"><span data-dcnode-id="5560" instrument_node="">Patients with hypertension will have a </span><a data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5559" instrument_node="">greater risk</span></a><span data-dcnode-id="5557" instrument_node=""> of getting cardiovascular disease. A high mortality rate is also associated with having too high or too low blood pressure.&nbsp;&nbsp;</span></p><span data-dcnode-id="5555" instrument_node="">
</span><h3 data-dcnode-id="5550"><span class="ez-toc-section" data-dcnode-id="5554" id="Cardiovascular_Disease"></span><strong data-dcnode-id="5552"><span data-dcnode-id="5553" instrument_node="">Cardiovascular Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="5551"></span></h3><span data-dcnode-id="5549" instrument_node="">
</span><p data-dcnode-id="5541"><span data-dcnode-id="5548" instrument_node="">Cardiovascular </span><a data-dcnode-id="5546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5547" instrument_node="">risk</span></a><span data-dcnode-id="5545" instrument_node=""> occurs with even </span><strong data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">mild to moderate</span></strong><span data-dcnode-id="5542" instrument_node=""> kidney dysfunction. This means that at stage 3 you could potentially develop heart disease.&nbsp;</span></p><span data-dcnode-id="5540" instrument_node="">
</span><p data-dcnode-id="5535"><span data-dcnode-id="5539" instrument_node="">One </span><a data-dcnode-id="5537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5538" instrument_node="">heart complication</span></a><span data-dcnode-id="5536" instrument_node=""> in stage 3 CKD is left ventricular hypertrophy (LVH). The risk for this disease increases when kidney function and eGFR decline. Other conditions that play a role in this condition are anemia and hypertension.</span></p><span data-dcnode-id="5534" instrument_node="">
</span><h3 data-dcnode-id="5529"><span class="ez-toc-section" data-dcnode-id="5533" id="Diabetes-2"></span><strong data-dcnode-id="5531"><span data-dcnode-id="5532" instrument_node="">Diabetes</span></strong><span class="ez-toc-section-end" data-dcnode-id="5530"></span></h3><span data-dcnode-id="5528" instrument_node="">
</span><p data-dcnode-id="5523"><span data-dcnode-id="5527" instrument_node="">Some people with kidney disease </span><a data-dcnode-id="5525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5004963/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5004963/'); return false;"><span data-dcnode-id="5526" instrument_node="">may</span></a><span data-dcnode-id="5524" instrument_node=""> develop diabetes. Damaged kidneys will have trouble removing the waste product urea from the blood. In animal cells, a build-up of this compound caused inflammation and also inhibited the activity of phosphofructokinase 1 (PFK-1).&nbsp;&nbsp;</span></p><span data-dcnode-id="5522" instrument_node="">
</span><p data-dcnode-id="5520"><span data-dcnode-id="5521" instrument_node="">PFK-1 is an enzyme that helps produce insulin. Less insulin means there will be more sugar in the blood. Unmanaged high blood sugar levels can result in diabetes.</span></p><span data-dcnode-id="5519" instrument_node="">
</span><h3 data-dcnode-id="5514"><span class="ez-toc-section" data-dcnode-id="5518" id="Mineral_and_Bone_Disorders"></span><strong data-dcnode-id="5516"><span data-dcnode-id="5517" instrument_node="">Mineral and Bone Disorders</span></strong><span class="ez-toc-section-end" data-dcnode-id="5515"></span></h3><span data-dcnode-id="5513" instrument_node="">
</span><p data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">CKD can lead to abnormalities in how the kidneys metabolize nutrients. The kidney is unable to make enough vitamin D. Low levels of vitamin D can lead to poor bone health. These disorders increase cardiovascular disease risk and death.</span></p><span data-dcnode-id="5510" instrument_node="">
</span><p data-dcnode-id="5505"><span data-dcnode-id="5509" instrument_node="">Phosphorus levels become </span><a data-dcnode-id="5507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5508" instrument_node="">elevated</span></a><span data-dcnode-id="5506" instrument_node=""> during stage 3 of kidney disease. Weakened kidneys also have trouble removing phosphorus from the body. Calcium levels will then fall. This tells the brain to secrete the parathyroid hormone to stop the body from excreting calcium.&nbsp;</span></p><span data-dcnode-id="5504" instrument_node="">
</span><p data-dcnode-id="5500"><a data-dcnode-id="5502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5503" instrument_node="">Secondary hyperparathyroidism</span></a><span data-dcnode-id="5501" instrument_node=""> (PTH) then occurs. It is when the body takes calcium from the bones. It can start happening even before phosphorus levels become abnormal.</span></p><span data-dcnode-id="5499" instrument_node="">
</span><p data-dcnode-id="5491"><span data-dcnode-id="5498" instrument_node="">These changes in calcium, phosphorus, PTH, </span><a data-dcnode-id="5496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/vitamins-for-kidneys-vitamin-d/"><span data-dcnode-id="5497" instrument_node="">vitamin D</span></a><span data-dcnode-id="5495" instrument_node=""> affect bone formation. When the eGFR drops below 60 mL/min (stage 3) changes in bone structure will occur this is known as </span><a data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK560742/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK560742/'); return false;"><span data-dcnode-id="5494" instrument_node="">renal osteodystrophy</span></a><span data-dcnode-id="5492" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5490" instrument_node="">
</span><p data-dcnode-id="5485"><span data-dcnode-id="5489" instrument_node="">It occurs due to bone turnover and consists of </span><a data-dcnode-id="5487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5488" instrument_node="">four types</span></a><span data-dcnode-id="5486" instrument_node="">:</span></p><span data-dcnode-id="5484" instrument_node="">
</span><ul data-dcnode-id="5475"><li data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">Osteitis fibrosa cystica (high bone turnover with secondary hyperparathyroidism)</span></li><li data-dcnode-id="5480"><span data-dcnode-id="5481" instrument_node="">Osteomalacia (low bone turnover and low vitamin D)</span></li><li data-dcnode-id="5478"><span data-dcnode-id="5479" instrument_node="">Adynamic bone disorder (low bone turnover due to suppression of the parathyroid)</span></li><li data-dcnode-id="5476"><span data-dcnode-id="5477" instrument_node="">Mixed osteodystrophy (both high and low bone turnover)</span></li></ul><span data-dcnode-id="5474" instrument_node="">
</span><p data-dcnode-id="5470"><a data-dcnode-id="5472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK261650/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK261650/'); return false;"><span data-dcnode-id="5473" instrument_node="">Bone turnover</span></a><span data-dcnode-id="5471" instrument_node=""> is when the body takes calcium from the bone and moves it to the blood or kidneys. It can be high or low depending on how many osteoclasts or bone-breaking cells are present. High bone turnover is when many osteoclasts are present. Low bone turnover is when there are a normal or reduced number of osteoclasts.</span></p><span data-dcnode-id="5469" instrument_node="">
</span><h3 data-dcnode-id="5464"><span class="ez-toc-section" data-dcnode-id="5468" id="Nutritional_Issues"></span><strong data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">Nutritional Issues</span></strong><span class="ez-toc-section-end" data-dcnode-id="5465"></span></h3><span data-dcnode-id="5463" instrument_node="">
</span><p data-dcnode-id="5458"><span data-dcnode-id="5462" instrument_node="">Kidney disease can affect </span><a data-dcnode-id="5460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5461" instrument_node="">digestion</span></a><span data-dcnode-id="5459" instrument_node=""> of nutrients including:</span></p><span data-dcnode-id="5457" instrument_node="">
</span><ul data-dcnode-id="5448"><li data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">Protein</span></li><li data-dcnode-id="5453"><span data-dcnode-id="5454" instrument_node="">Water</span></li><li data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">Salt</span></li><li data-dcnode-id="5449"><span data-dcnode-id="5450" instrument_node="">Phosphorus</span></li></ul><span data-dcnode-id="5447" instrument_node="">
</span><p data-dcnode-id="5442"><span data-dcnode-id="5446" instrument_node="">These changes will </span><a data-dcnode-id="5444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5445" instrument_node="">alter</span></a><span data-dcnode-id="5443" instrument_node=""> nutritional requirements. If not handled properly someone may experience malnutrition. Changes in nutrient needs will also cause dietary restrictions. These metabolic changes can lead to poor intestinal absorption.</span></p><span data-dcnode-id="5441" instrument_node="">
</span><p data-dcnode-id="5436"><span data-dcnode-id="5440" instrument_node="">Many people with CKD often have a </span><a data-dcnode-id="5438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6019478/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6019478/'); return false;"><span data-dcnode-id="5439" instrument_node="">decrease</span></a><span data-dcnode-id="5437" instrument_node=""> in the intake of the vitamins folate, iron, and pantothenic acid.&nbsp;</span></p><span data-dcnode-id="5435" instrument_node="">
</span><p data-dcnode-id="5430"><span data-dcnode-id="5434" instrument_node="">Also, some people will experience an extreme case of altered metabolism with a build-up of uremia in the blood. Known as </span><a data-dcnode-id="5432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5433" instrument_node="">uremic malnutrition</span></a><span data-dcnode-id="5431" instrument_node="">, this condition is when the body does produce enough energy, despite adequate intake of protein and carbs.</span></p><span data-dcnode-id="5429" instrument_node="">
</span><p data-dcnode-id="5418"><span data-dcnode-id="5428" instrument_node="">An </span><a data-dcnode-id="5426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5427" instrument_node="">early warning sign</span></a><span data-dcnode-id="5425" instrument_node=""> of uremic malnutrition is when the daily protein intake is less than 0.75 grams per kilogram of body weight (in those without </span><a data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/low-protein-diet/"><span data-dcnode-id="5424" instrument_node="">protein restrictions</span></a><span data-dcnode-id="5422" instrument_node="">). Maintaining </span><a data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2474786/'); return false;"><span data-dcnode-id="5421" instrument_node="">nitrogen balance</span></a><span data-dcnode-id="5419" instrument_node=""> is important for those with kidney dysfunction to prevent these nutritional issues.</span></p><span data-dcnode-id="5417" instrument_node="">
</span><p data-dcnode-id="5412"><span data-dcnode-id="5416" instrument_node="">Nutrient deficiencies from these changes in metabolism can cause </span><a data-dcnode-id="5414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6019478/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6019478/'); return false;"><span data-dcnode-id="5415" instrument_node="">problems</span></a><span data-dcnode-id="5413" instrument_node=""> like anemia, cardiovascular disease, and metabolic imbalances.&nbsp;</span></p><span data-dcnode-id="5411" instrument_node="">
</span><span data-dcnode-id="5409" instrument_node="">
</span><form action="https://app.convertkit.com/forms/1409208/subscriptions" class="seva-form formkit-form" data-dcnode-id="5371" data-format="inline" data-options="{&quot;settings&quot;:{&quot;after_subscribe&quot;:{&quot;action&quot;:&quot;message&quot;,&quot;success_message&quot;:&quot;Success! Now check your email to confirm your subscription.&quot;,&quot;redirect_url&quot;:&quot;&quot;},&quot;analytics&quot;:{&quot;google&quot;:null,&quot;facebook&quot;:null,&quot;segment&quot;:null,&quot;pinterest&quot;:null,&quot;sparkloop&quot;:null,&quot;googletagmanager&quot;:null},&quot;modal&quot;:{&quot;trigger&quot;:&quot;timer&quot;,&quot;scroll_percentage&quot;:null,&quot;timer&quot;:5,&quot;devices&quot;:&quot;all&quot;,&quot;show_once_every&quot;:15},&quot;powered_by&quot;:{&quot;show&quot;:false,&quot;url&quot;:&quot;https://convertkit.com?utm_campaign=poweredby&amp;utm_content=form&amp;utm_medium=referral&amp;utm_source=dynamic&quot;},&quot;recaptcha&quot;:{&quot;enabled&quot;:false},&quot;return_visitor&quot;:{&quot;action&quot;:&quot;show&quot;,&quot;custom_content&quot;:&quot;&quot;},&quot;slide_in&quot;:{&quot;display_in&quot;:&quot;bottom_right&quot;,&quot;trigger&quot;:&quot;timer&quot;,&quot;scroll_percentage&quot;:null,&quot;timer&quot;:5,&quot;devices&quot;:&quot;all&quot;,&quot;show_once_every&quot;:15},&quot;sticky_bar&quot;:{&quot;display_in&quot;:&quot;top&quot;,&quot;trigger&quot;:&quot;timer&quot;,&quot;scroll_percentage&quot;:null,&quot;timer&quot;:5,&quot;devices&quot;:&quot;all&quot;,&quot;show_once_every&quot;:15}},&quot;version&quot;:&quot;5&quot;}" data-sv-form="1409208" data-uid="8530bf4b81" data-version="5" method="post" min-width="400 500 600" style="background-color: rgb(249, 250, 251); border-radius: 13px;"><div class="formkit-background rocket-lazyload" data-bg="https://embed.filekitcdn.com/e/c476RdoiyAWfkAk6V3C9eE/4ecMtE8Xyh3QTBetwsB8BT" data-dcnode-id="5408" style=" opacity: 0.39;"></div><div data-dcnode-id="5374" data-style="minimal" </span><h3 data-dcnode-id="5361"><span class="ez-toc-section" data-dcnode-id="5369" id="Nerve_Damage_and_Neurological_Conditions"></span><strong data-dcnode-id="5367"><span data-dcnode-id="5368" instrument_node="">Nerve </span></strong><strong data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">Damage</span></strong><strong data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node=""> and Neurological Conditions</span></strong><span class="ez-toc-section-end" data-dcnode-id="5362"></span></h3><span data-dcnode-id="5360" instrument_node="">
</span><p data-dcnode-id="5355"><span data-dcnode-id="5359" instrument_node="">Nerves </span><a data-dcnode-id="5357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/Diabetes-and-Your-Eyes-Heart-Nerves-Feet-and-Kidneys" onclick="javascript:window.open('https://www.kidney.org/atoz/content/Diabetes-and-Your-Eyes-Heart-Nerves-Feet-and-Kidneys'); return false;"><span data-dcnode-id="5358" instrument_node="">carry messages</span></a><span data-dcnode-id="5356" instrument_node=""> between your brain and other parts of the body. When CKD and coexisting conditions like diabetes go unmanaged nerve damage and other neurological conditions.</span></p><span data-dcnode-id="5354" instrument_node="">
</span><p data-dcnode-id="5349"><span data-dcnode-id="5353" instrument_node="">Up to 70% of pre-dialysis patients are at risk for </span><a data-dcnode-id="5351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5352" instrument_node="">nerve dysfunction</span></a><span data-dcnode-id="5350" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5348" instrument_node="">
</span><p data-dcnode-id="5340"><span data-dcnode-id="5347" instrument_node="">Damaged nerves will </span><a data-dcnode-id="5345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/atoz/content/Diabetes-and-Your-Eyes-Heart-Nerves-Feet-and-Kidneys" onclick="javascript:window.open('https://www.kidney.org/atoz/content/Diabetes-and-Your-Eyes-Heart-Nerves-Feet-and-Kidneys'); return false;"><span data-dcnode-id="5346" instrument_node="">stop sending</span></a><span data-dcnode-id="5344" instrument_node=""> signals and you may end up with a tingling or numbness in the hands and feet. This condition is called </span><a data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5343" instrument_node="">peripheral neuropathy</span></a><span data-dcnode-id="5341" instrument_node="">.</span></p><span data-dcnode-id="5339" instrument_node="">
</span><p data-dcnode-id="5334"><span data-dcnode-id="5338" instrument_node="">Typical </span><a data-dcnode-id="5336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6452189/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6452189/'); return false;"><span data-dcnode-id="5337" instrument_node="">causes</span></a><span data-dcnode-id="5335" instrument_node=""> of peripheral neuropathy include high blood sugar, high PTH, and the accumulation of glycotoxins or advanced glycation end products AGE’s.</span></p><span data-dcnode-id="5333" instrument_node="">
</span><p data-dcnode-id="5326"><a data-dcnode-id="5331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3704564/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3704564/'); return false;"><span data-dcnode-id="5332" instrument_node="">AGE’s</span></a><span data-dcnode-id="5330" instrument_node=""> are in processed foods. They also can arise naturally from digestion. These compounds are inflammatory. An accumulation of AGEs’ will cause oxidative stress and nerve damage. People can have AGE’s </span><a data-dcnode-id="5328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6452189/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6452189/'); return false;"><span data-dcnode-id="5329" instrument_node="">whether or not they have diabetes</span></a><span data-dcnode-id="5327" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5325" instrument_node="">
</span><p data-dcnode-id="5320"><span data-dcnode-id="5324" instrument_node="">Elevated PTH levels, high uremic toxins, and electrolyte imbalances also </span><a data-dcnode-id="5322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6452189/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6452189/'); return false;"><span data-dcnode-id="5323" instrument_node="">play a role</span></a><span data-dcnode-id="5321" instrument_node=""> in the development of nerve damage.</span></p><span data-dcnode-id="5319" instrument_node="">
</span><p data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">Aside from the loss of feeling, there are neurological conditions that affect digestion and cognition.</span></p><span data-dcnode-id="5316" instrument_node="">
</span><p data-dcnode-id="5312"><a data-dcnode-id="5314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5315" instrument_node="">Autonomic neuropathy</span></a><span data-dcnode-id="5313" instrument_node=""> is a disorder that affects the autonomic nervous system. This is the body system that works in the background without a conscious effect. Damage to this system slows how food travels through the digestive tract causing indigestion and other digestive problems.</span></p><span data-dcnode-id="5311" instrument_node="">
</span><p data-dcnode-id="5307"><a data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5310" instrument_node="">Neurological problems</span></a><span data-dcnode-id="5308" instrument_node=""> are common in CKD. They affect all parts of the central nervous system and cause poor cognition or confusion.</span></p><span data-dcnode-id="5306" instrument_node="">
</span><p data-dcnode-id="5302"><a data-dcnode-id="5304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5305" instrument_node="">Causes</span></a><span data-dcnode-id="5303" instrument_node=""> of neurological conditions are often related to</span></p><span data-dcnode-id="5301" instrument_node="">
</span><ul data-dcnode-id="5284"><li data-dcnode-id="5299"><span data-dcnode-id="5300" instrument_node="">Stroke</span></li><li data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">Damage to the brain/nerves&nbsp;</span></li><li data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">Hypertension</span></li><li data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">Electrolyte disturbances</span></li><li data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">Being over medicated&nbsp;</span></li><li data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">Uremia toxins</span></li><li data-dcnode-id="5287"><span data-dcnode-id="5288" instrument_node="">Anemia</span></li><li data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">Elevated PTH levels</span></li></ul><span data-dcnode-id="5283" instrument_node="">
</span><h3 data-dcnode-id="5278"><span class="ez-toc-section" data-dcnode-id="5282" id="High_Cholesterol"></span><strong data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">High Cholesterol</span></strong><span class="ez-toc-section-end" data-dcnode-id="5279"></span></h3><span data-dcnode-id="5277" instrument_node="">
</span><p data-dcnode-id="5272"><span data-dcnode-id="5276" instrument_node="">High cholesterol is a </span><a data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/Summer10/HighCholesterol" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/Summer10/HighCholesterol'); return false;"><span data-dcnode-id="5275" instrument_node="">complication</span></a><span data-dcnode-id="5273" instrument_node=""> of unmanaged kidney disease. If left untreated it can further weaken kidneys. People with high total cholesterol or reduced HDL “good” cholesterol were more likely to have a lower eGFR indicating weaker kidney function.</span></p><span data-dcnode-id="5271" instrument_node="">
</span><p data-dcnode-id="5266"><span data-dcnode-id="5270" instrument_node="">This shows the </span><a data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/Summer10/HighCholesterol" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/Summer10/HighCholesterol'); return false;"><span data-dcnode-id="5269" instrument_node="">potential link</span></a><span data-dcnode-id="5267" instrument_node=""> between cholesterol and kidney function. Improving your cholesterol levels may prevent the progression of CKD.&nbsp;</span></p><span data-dcnode-id="5265" instrument_node="">
</span><p data-dcnode-id="5254"><span data-dcnode-id="5264" instrument_node="">Lifestyle, medical, and nutrition interventions </span><a data-dcnode-id="5262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/Summer10/HighCholesterol" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/Summer10/HighCholesterol'); return false;"><span data-dcnode-id="5263" instrument_node="">control</span></a><span data-dcnode-id="5261" instrument_node=""> cholesterol levels.&nbsp; Getting adequate exercise, quitting smoking, and managing </span><a data-dcnode-id="5259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5419930/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5419930/'); return false;"><span data-dcnode-id="5260" instrument_node="">stress</span></a><span data-dcnode-id="5258" instrument_node=""> are other things that can help </span><a data-dcnode-id="5256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidney.org/news/kidneyCare/Summer10/HighCholesterol" onclick="javascript:window.open('https://www.kidney.org/news/kidneyCare/Summer10/HighCholesterol'); return false;"><span data-dcnode-id="5257" instrument_node="">lower</span></a><span data-dcnode-id="5255" instrument_node=""> cholesterol.&nbsp;</span></p><span data-dcnode-id="5253" instrument_node="">
</span><p data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">Medications are also prescribed for lowering cholesterol. However, it is best to start with diet and lifestyle changes. Learn more about what dietary changes can help improve cholesterol levels below.</span></p><span data-dcnode-id="5250" instrument_node="">
</span><h3 data-dcnode-id="5245"><span class="ez-toc-section" data-dcnode-id="5249" id="Atherosclerosis"></span><strong data-dcnode-id="5247"><span data-dcnode-id="5248" instrument_node="">Atherosclerosis</span></strong><span class="ez-toc-section-end" data-dcnode-id="5246"></span></h3><span data-dcnode-id="5244" instrument_node="">
</span><p data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">White blood cells will mobilize to heal blood vessels damaged by poor kidney function. As a result, plaque will form on the arterial wall. Just like with regular blood vessels atherosclerosis can occur in the kidneys.&nbsp;</span></p><span data-dcnode-id="5241" instrument_node="">
</span><p data-dcnode-id="5236"><span data-dcnode-id="5240" instrument_node="">Atherosclerosis </span><a data-dcnode-id="5238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3844144/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3844144/'); return false;"><span data-dcnode-id="5239" instrument_node="">affected</span></a><span data-dcnode-id="5237" instrument_node=""> 50% of patients with stage 3 kidney disease. People with an eGFR value below 60 mL/min are at risk for cardiovascular disease.</span></p><span data-dcnode-id="5235" instrument_node="">
</span><p data-dcnode-id="5231"><a data-dcnode-id="5233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165'); return false;"><span data-dcnode-id="5234" instrument_node="">Risk factors</span></a><span data-dcnode-id="5232" instrument_node=""> for atherosclerosis include</span></p><span data-dcnode-id="5230" instrument_node="">
</span><ul data-dcnode-id="5209"><li data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">Hypertension</span></li><li data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">High cholesterol</span></li><li data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">Diabetes</span></li><li data-dcnode-id="5222"><span data-dcnode-id="5223" instrument_node="">Age</span></li><li data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">Being a smoker</span></li><li data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">Metabolic acidosis</span></li><li data-dcnode-id="5216"><span data-dcnode-id="5217" instrument_node="">Calcium and phosphate dysfunction</span></li><li data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">Excessive blood clotting</span></li><li data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">Inflammation</span></li><li data-dcnode-id="5210"><span data-dcnode-id="5211" instrument_node="">Oxidative Stress&nbsp;</span></li></ul><span data-dcnode-id="5208" instrument_node="">
</span><h3 data-dcnode-id="5203"><span class="ez-toc-section" data-dcnode-id="5207" id="Electrolyte_Disorders_Salt_and_Water_Retention"></span><strong data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">Electrolyte Disorders (Salt and Water Retention)</span></strong><span class="ez-toc-section-end" data-dcnode-id="5204"></span></h3><span data-dcnode-id="5202" instrument_node="">
</span><p data-dcnode-id="5194"><span data-dcnode-id="5201" instrument_node="">In CKD often there are </span><a data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5757582/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5757582/'); return false;"><span data-dcnode-id="5200" instrument_node="">imbalances</span></a><span data-dcnode-id="5198" instrument_node=""> in fluid and electrolytes. These minerals are in the blood. They </span><a data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes" onclick="javascript:window.open('https://www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes'); return false;"><span data-dcnode-id="5197" instrument_node="">regulate</span></a><span data-dcnode-id="5195" instrument_node=""> acid balance along with nerve and muscle function</span></p><span data-dcnode-id="5193" instrument_node="">
</span><p data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">They consist of&nbsp;</span></p><span data-dcnode-id="5190" instrument_node="">
</span><ul data-dcnode-id="5174"><li data-dcnode-id="5187"><a data-dcnode-id="5188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-phosphates-role-in-the-body%23%3A~%3Atext%3DIn%2520the%2520body%252C%2520almost%2520all%2Cin%2520the%2520body%2520is%2520uncharged." onclick="javascript:window.open('https://www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-phosphates-role-in-the-body#:~:text=In%20the%20body%2C%20almost%20all,in%20the%20body%20is%20uncharged.'); return false;"><span data-dcnode-id="5189" instrument_node="">Phosphorus</span></a></li><li data-dcnode-id="5184"><a data-dcnode-id="5185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes" onclick="javascript:window.open('https://www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes'); return false;"><span data-dcnode-id="5186" instrument_node="">Potassium</span></a></li><li data-dcnode-id="5181"><a data-dcnode-id="5182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes" onclick="javascript:window.open('https://www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes'); return false;"><span data-dcnode-id="5183" instrument_node="">Sodium</span></a></li><li data-dcnode-id="5178"><a data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes" onclick="javascript:window.open('https://www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes'); return false;"><span data-dcnode-id="5180" instrument_node="">Calcium</span></a></li><li data-dcnode-id="5175"><a data-dcnode-id="5176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes" onclick="javascript:window.open('https://www.merckmanuals.com/home/hormonal-and-metabolic-disorders/electrolyte-balance/overview-of-electrolytes'); return false;"><span data-dcnode-id="5177" instrument_node="">Magnesium</span></a></li></ul><span data-dcnode-id="5173" instrument_node="">
</span><p data-dcnode-id="5169"><a data-dcnode-id="5171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5757582/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5757582/'); return false;"><span data-dcnode-id="5172" instrument_node="">Hyperkalemia</span></a><span data-dcnode-id="5170" instrument_node=""> is the most common electrolyte disorder in CKD. This is when there is too much potassium in the blood.&nbsp;</span></p><span data-dcnode-id="5168" instrument_node="">
</span><p data-dcnode-id="5163"><span data-dcnode-id="5167" instrument_node="">As kidney function wanes, they become unable to regulate water. As a consequence, </span><a data-dcnode-id="5165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5757582/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5757582/'); return false;"><span data-dcnode-id="5166" instrument_node="">disturbances</span></a><span data-dcnode-id="5164" instrument_node=""> in sodium will also occur. A risk for a sodium imbalance is prevalent in stage 3 of CKD.&nbsp;</span></p><span data-dcnode-id="5162" instrument_node="">
</span><p data-dcnode-id="5157"><span data-dcnode-id="5161" instrument_node="">Having </span><a data-dcnode-id="5159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/'); return false;"><span data-dcnode-id="5160" instrument_node="">both too little and too much sodium</span></a><span data-dcnode-id="5158" instrument_node=""> has been seen in stage 3 CKD. The most common occurrence is excess sodium. Why this happens is not exactly certain.&nbsp;</span></p><span data-dcnode-id="5156" instrument_node="">
</span><p data-dcnode-id="5152"><a data-dcnode-id="5154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/fluid-restriction-in-ckd/"><span data-dcnode-id="5155" instrument_node="">Fluid retention</span></a><span data-dcnode-id="5153" instrument_node=""> causes the following to happen</span></p><span data-dcnode-id="5151" instrument_node="">
</span><ul data-dcnode-id="5144"><li data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">Swelling in the hands, arms, feet, and ankles</span></li><li data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">Hypertension</span></li><li data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">Cardiovascular disease especially LVH</span></li></ul><span data-dcnode-id="5143" instrument_node="">
</span><p data-dcnode-id="5138"><span data-dcnode-id="5142" instrument_node="">Altered levels of </span><a data-dcnode-id="5140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5141" instrument_node="">sodium, calcium, and magnesium</span></a><span data-dcnode-id="5139" instrument_node=""> can harm the nervous system and may cause brain dysfunction.</span></p><span data-dcnode-id="5137" instrument_node="">
</span><p data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">Mineral disturbances tend to worsen as CKD progresses so managing it now is important to prolong your health. Electrolyte disorders can also contribute to uremia.</span></p><span data-dcnode-id="5134" instrument_node="">
</span><h3 data-dcnode-id="5129"><span class="ez-toc-section" data-dcnode-id="5133" id="Uremia"></span><strong data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">Uremia</span></strong><span class="ez-toc-section-end" data-dcnode-id="5130"></span></h3><span data-dcnode-id="5128" instrument_node="">
</span><p data-dcnode-id="5118"><span data-dcnode-id="5127" instrument_node="">The word “uremia” means urine in the blood.</span><strong data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node=""> </span></strong><a data-dcnode-id="5123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK441859/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK441859/'); return false;"><span data-dcnode-id="5124" instrument_node="">Uremia</span></a><span data-dcnode-id="5122" instrument_node=""> occurs when there is declining renal function. Normally common in renal failure, uremia may also manifest in </span><a data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/21325868/" onclick="javascript:window.open('https://pubmed.ncbi.nlm.nih.gov/21325868/'); return false;"><span data-dcnode-id="5121" instrument_node="">stage 3 kidney disease</span></a><span data-dcnode-id="5119" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5117" instrument_node="">
</span><p data-dcnode-id="5109"><span data-dcnode-id="5116" instrument_node="">As the kidneys decline they become unable to properly filter wastes. Urine metabolites and other toxins </span><a data-dcnode-id="5114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK441859/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/books/NBK441859/'); return false;"><span data-dcnode-id="5115" instrument_node="">buildup</span></a><span data-dcnode-id="5113" instrument_node=""> in the blood. </span><a data-dcnode-id="5111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/'); return false;"><span data-dcnode-id="5112" instrument_node="">Symptoms</span></a><span data-dcnode-id="5110" instrument_node=""> of uremia include&nbsp;</span></p><span data-dcnode-id="5108" instrument_node="">
</span><ul data-dcnode-id="5089"><li data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">Loss of appetite and anorexia</span></li><li data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">Fatigue</span></li><li data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">Extreme weight and muscle loss</span></li><li data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">Itching</span></li><li data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">Nausea</span></li><li data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">Restless leg syndrome</span></li><li data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">Sleep disturbances</span></li><li data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">Sexual dysfunction</span></li><li data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">Brain fog&nbsp;</span></li></ul><span data-dcnode-id="5088" instrument_node="">
</span><p data-dcnode-id="5081"><a data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5087" instrument_node="">Uremia</span></a><span data-dcnode-id="5085" instrument_node=""> can also damage the central nervous system. </span><a data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5084" instrument_node="">Uremic neuropathy</span></a><span data-dcnode-id="5082" instrument_node=""> can occur as a result. It causes a loss of sensation in the limbs.&nbsp;</span></p><span data-dcnode-id="5080" instrument_node="">
</span><p data-dcnode-id="5072"><span data-dcnode-id="5079" instrument_node="">Uremia is also responsible for </span><a data-dcnode-id="5077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5078" instrument_node="">brain damage</span></a><span data-dcnode-id="5076" instrument_node=""> and may affect cognition. Toxic compounds like </span><a data-dcnode-id="5074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5102165/'); return false;"><span data-dcnode-id="5075" instrument_node="">cystatin-C</span></a><span data-dcnode-id="5073" instrument_node=""> can cause amyloid plaque to form in the brain. Reduced brain function can result from high levels of this compound.&nbsp;</span></p><span data-dcnode-id="5071" instrument_node="">
</span><p data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">There are also indirect effects of uremia. These include:</span></p><span data-dcnode-id="5068" instrument_node="">
</span><ul data-dcnode-id="5061"><li data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">Inflammation</span></li><li data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">Blood vessel damage</span></li><li data-dcnode-id="5062"><span data-dcnode-id="5063" instrument_node="">Atherosclerosis</span></li></ul><span data-dcnode-id="5060" instrument_node="">
</span><h3 data-dcnode-id="5055"><span class="ez-toc-section" data-dcnode-id="5059" id="Metabolic_Acidosis"></span><strong data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">Metabolic Acidosis</span></strong><span class="ez-toc-section-end" data-dcnode-id="5056"></span></h3><span data-dcnode-id="5054" instrument_node="">
</span><p data-dcnode-id="5049"><span data-dcnode-id="5053" instrument_node="">As kidney function declines, they lose the ability to neutralize the acid in the body. Too much acid puts the body at risk for </span><a data-dcnode-id="5051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6341007/'); return false;"><span data-dcnode-id="5052" instrument_node="">metabolic acidosis</span></a><span data-dcnode-id="5050" instrument_node="">. High levels of acid are harmful. If unmanaged this condition can lead to</span></p><span data-dcnode-id="5048" instrument_node="">
</span><ul data-dcnode-id="5039"><li data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">Muscle breakdown</span></li><li data-dcnode-id="5044"><span data-dcnode-id="5045" instrument_node="">Poor endocrine hormone function</span></li><li data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">Low pituitary function</span></li><li data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">Bone disease</span></li></ul><span data-dcnode-id="5038" instrument_node="">
</span><p data-dcnode-id="5035"><a data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantpoweredkidneys.com/pral/"><span data-dcnode-id="5037" instrument_node="">Learn more about metabolic acidosis in this article about potential renal acid load here.</span></a></p><span data-dcnode-id="5034" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="5024"><picture class="wp-image-3388" data-dcnode-id="5028"><span data-dcnode-id="5033" instrument_node="">
