</span><span data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Categories: </span></span><a class="" data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinary-practice.com/category/canine-medicine-and-surgery" title="Canine medicine and surgery"><span data-dcnode-id="1056" instrument_node="">Canine medicine and surgery</span></a><a class="" data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinary-practice.com/category/small-animal" title="Small animal"><span data-dcnode-id="1054" instrument_node="">Small animal</span></a><a class="" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinary-practice.com/category/small-animal-clinical" title="Small Animal Clinical"><span data-dcnode-id="1052" instrument_node="">Small Animal Clinical</span></a><span data-dcnode-id="1050" instrument_node=""> </span></div><span data-dcnode-id="1048" instrument_node="">

</span><section class="entry-content col-12" data-dcnode-id="815"><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">The urinary tract of the dog is complex and the potential for problems is large with varied clinical symptoms including dysuria, stranguria, haematuria, pollakiuria and increased time to urinate (Shaer, 2010). Symptoms can be caused by many issues, including congenital defects, neoplasia, trauma, infection and/or uroliths. </span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1037" instrument_node="">As with cats, the most common urinary tract condition in dogs is cystitis. Figures from Lulich </span><em data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">et al</span></em><span data-dcnode-id="1034" instrument_node="">. (2000) attributed 40 percent of urinary tract conditions to cystitis, 24 percent to incontinence and 18 percent to “other causes”. Uroliths were attributed to 18 percent of cases. A 2017 analysis of over 75,000 uroliths submitted to the Canadian Urolith Centre over a 16-year period found that calcium oxalate and struvite were the two most common stones seen, account-ing for 81 percent of all stones analysed (see </span><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Figure 1</span></strong><span data-dcnode-id="1031" instrument_node="">).</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The same study also noted that medium and large breeds were most at risk of struvite stones, which are most often the result of a urinary tract infection, and small breeds were more at risk of developing calcium oxalate stones.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="1022"><img data-dcnode-id="1025" data-mfp-src="https://www.veterinary-practice.com/wp-content/uploads/2019/06/Small-Animal-Nutrition-Uroliths-1.PNG" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinary-practice.com/wp-content/uploads/2019/06/Small-Animal-Nutrition-Uroliths-1.PNG&amp;raw"><figcaption data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">FIGURE (1) Uroliths by type seen at the Canadian Urolith Centre between 1998 and 2014 (from Houston et al., 2017)</span></figcaption></figure><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">According to Moore (2007), although the physical appearance of many uroliths can give a good indication of the composition of the stone, different stone types do form in a wide variety of shapes, sizes and colours. Additionally, each calculus may have up to four different layers; from inside to out, these are: the nidus, the stone, the shell and surface crystals. Each layer could be composed of different mineral types and therefore, the external appearance of a calculus rarely gives an indication of the full composition of the entire urolith, the very centre of which (the nidus) is the key to accurate diagnosis and treatment.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1017" instrument_node="">The nidus could be quite different from the bulk of the stone. For this reason, when sending a stone for analysis, it is recommended to use a laboratory which will use a combination of structural and morphological tests to determine the exact composition of the urolith (Basiri </span><em data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">et al.</span></em><span data-dcnode-id="1014" instrument_node="">, 2012).</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Using X-ray to determine the physical appearance of uroliths is also not 100 percent reliable as it can’t always detect them and if it does, the shape might be misleading. It’s possible to find multiple crystal types in one bladder so identifying the composition of one specific type of crystal is an unreliable indicator of the composition of a urolith, since crystals present could be completely different from the composition of a stone taken from the same bladder, no crystals may be seen, or multiple crystal types might be found in the same urine sample.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><h2 data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Urinalysis</span></h2><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1005" instrument_node="">It’s preferred to use a first-morning sample for analysis because it is most concentrated. For a detailed quantitative analysis, a 24-hour sample should be taken. If it’s not possible to carry out urinalysis within 20 to 30 minutes of the sample being taken, the urine can be refrigerated and stored for up to six hours before the validity of results is compromised (Padilla </span><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">et al</span></em><span data-dcnode-id="1002" instrument_node="">., 1981; Hesse and Neiger, 2004). The refrigerated urine should be brought to room temperature and thoroughly mixed before analysis. If crystals are observed in stored samples, this should be validated by re-evaluation of a fresh urine sample (Albasan </span><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">et al</span></em><span data-dcnode-id="999" instrument_node="">., 2003).</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">The optimum sampling method is cystocentesis, but if examining a free catch sample brought in by the owner, it is important to establish when the sample was taken. Low quantities of crystals are normally present in urine; the risk of crystals forming spontaneously increases with storage time and changes (including cellular disintegration, bacterial growth and pH changes) are more pronounced the longer the storage time and the greater the temperature fluctuations (Archer, 2005). It is important to note that post-prandial urine is usually alkaline: the “alkaline tide” occurs while acid is being secreted into the gastric juice. Stress also alters urine pH; respiratory alkalosis due to hyperventilation can raise urine pH (Chew, 2004).</span></p><span data-dcnode-id="994" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="990"><img data-dcnode-id="993" data-mfp-src="https://www.veterinary-practice.com/wp-content/uploads/2019/06/Small-Animal-Nutrition-Uroliths-2.PNG" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinary-practice.com/wp-content/uploads/2019/06/Small-Animal-Nutrition-Uroliths-2.PNG&amp;raw"><figcaption data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">FIGURE (2) Relative supersaturation can be usedto measure the risk of struvite or oxalate crystal formation within a bladder</span></figcaption></figure><span data-dcnode-id="989" instrument_node="">
</span><h2 data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Relative supersaturation</span></h2><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">Relative supersaturation (RSS; </span><strong data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Figure 2</span></strong><span data-dcnode-id="982" instrument_node="">) is a method pioneered by Royal Canin to measure the risk of struvite or oxalate crystal formation within a bladder, in animals fed any given diet. Each crystal has a specific saturation level below which the environment within the bladder makes it unlikely that crystals will form. RSS takes into account 12 parameters including the pH of the urine, the mineral content (specifically measuring five positive and five negative ions) and the volume of urine produced by feeding the specific diet.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">When feeding a dog (or cat) that has crystals in the bladder, the RSS level needs to be undersaturated to dissolve struvite crystals and prevent them reforming, and to prevent calcium oxalate reforming crystals once they have been removed. In healthy animals, or once the bladder is completely free of crystals, a diet with metastable-supersaturation levels can be fed.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">Feeding a diet which causes oversaturation (also known as labile supersaturation) will result in spontaneous crystallisation if the animal is predisposed. Houston </span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">et al.</span></em><span data-dcnode-id="973" instrument_node=""> (2017) found various predisposing factors, such as breed, gender, neutered status and potentially weight, although body condition scores were not available for most of the 75,000+ submissions.</span></p><span data-dcnode-id="971" instrument_node="">
</span><h2 data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Struvite</span></h2><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="967" instrument_node="">Struvite calculi, composed of magnesium ammonium phosphate, are sometimes referred to as urease, infection-induced, phosphatic and triple phosphate stones. Struvite grow in an alkaline environment and it is possible to dissolve them by feeding a specially designed diet (Krawiec </span><em data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">et al</span></em><span data-dcnode-id="964" instrument_node="">., 1984; Smith </span><em data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">et al</span></em><span data-dcnode-id="961" instrument_node="">., 2001).</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">Struvite is usually associated with an infection so it’s imperative to correctly diagnose and treat with appropriate antibiotics alongside appropriate dietary management (Rinkardt and Houston, 2004). Since it can take up to six weeks to dissolve a struvite stone, antibiotics should be prescribed for one month after the stone is dissolved to prevent recurrent infections, as bacteria are continually released into the bladder during the dissolution process. If stones are surgically removed, then antibiotics are recommended for at least three weeks post-operatively. According to Lulich </span><em data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">et al.</span></em><span data-dcnode-id="955" instrument_node=""> (2016), parameters for measurement are:</span></p><span data-dcnode-id="953" instrument_node="">
</span><ul data-dcnode-id="945"><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Urine pH of &lt;6.5</span></li><span data-dcnode-id="949" instrument_node="">
</span><li data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Urine specific gravity (SG) &lt;1.025 (or &lt;1.020 for recurrent cases)</span></li><span data-dcnode-id="946" instrument_node="">
</span></ul><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">Also important in the management of struvite stones is to increase urine turnover, thereby increasing urine dilution. This can be achieved by feeding a diet with elevated sodium levels (Buckley </span><em data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">et al</span></em><span data-dcnode-id="940" instrument_node="">., 2011). Struvite stones can be prevented from returning after removal or dissolution by feeding a diet which creates a high water turnover of slightly acidic urine and one in which mineral levels have been manipulated to reduce the risk of recurrence.</span></p><span data-dcnode-id="938" instrument_node="">
</span><div data-dcnode-id="934"><p class="site-ad clearfix" data-dcnode-id="935" id="vp-ad-in-content vp-ad-in-content-sponsored"><span data-dcnode-id="936" instrument_node="">
</span></p></div><p data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">Uroliths can comprise several different types and it is not uncommon to find struvite mixed with calcium oxalate. Fortunately, it is possible to manage struvite and oxalate with one diet because, although pH does affect calcium excretion, it has no impact on the relative saturation levels for calcium oxalate in urine (Queau </span><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">et al</span></em><span data-dcnode-id="930" instrument_node="">., 2013).</span></p><span data-dcnode-id="928" instrument_node="">
</span><h2 data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Calcium oxalate</span></h2><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="924" instrument_node="">In contrast to struvite, pure calcium oxalate uroliths (</span><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Figure 3</span></strong><span data-dcnode-id="921" instrument_node="">) are rarely associated with infection, so tend not to require antibiotics. Also, unlike struvite, calcium oxalate uroliths are more commonly found in male dogs and the most commonly affected breeds are the Miniature Schnauzer and other small breeds such as the Lhasa Apso, Bichon Frise and Yorkshire Terrier (Case </span><em data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">et al</span></em><span data-dcnode-id="918" instrument_node="">., 2011).</span></p><span data-dcnode-id="916" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="912"><img data-dcnode-id="915" data-mfp-src="https://www.veterinary-practice.com/wp-content/uploads/2019/06/Small-Animal-Nutrition-Uroliths-3.PNG" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinary-practice.com/wp-content/uploads/2019/06/Small-Animal-Nutrition-Uroliths-3.PNG&amp;raw"><figcaption data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">FIGURE (3) Radiograph showing calcium oxalate stones in the bladder of a Chihuahua x Jack Russell Terrier</span></figcaption></figure><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="910" instrument_node="">Although uncommon, hypercalcaemia is seen in animals with primary hyperparathyroidism, pseudohyperparathyroidism, malignant lymphoma and secondary hyperparathyroidism (Lulich </span><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">et al</span></em><span data-dcnode-id="907" instrument_node="">., 1992); hypercalcaemia is also associated with increased urine calcium excretion.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">There is a 10-fold increased risk of dogs developing calcium oxalate if they have hyperadrenocorticism compared with dogs without the condition (Hess </span><em data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">et al</span></em><span data-dcnode-id="901" instrument_node="">., 1998) and it is surmised that prompt diagnosis and treatment of hyperadrenocorticism may decrease prevalence of calcium-containing uroliths in dogs.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Once calcium oxalate crystals or stones have formed, a diet should be fed that has adapted calcium levels and maintains the appropriate Ca:P ratio and controlled levels of vitamin D. It would also be desirable to control the levels of magnesium and phosphorus, which are oxalate precursors. As with struvite, providing a diet which increases water turnover through the bladder is important and this can be done by feeding either a wet diet or a dry diet with adapted sodium levels to encourage increased water intake.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Measurement parameters are (according to ACVIM 2016 recommendations): urine pH &gt;6.5 and urine SG &lt;1.025 (&lt;1.020 in recurrent cases). Serum calcium levels should also be monitored. It may also be worth noting that human foods such as chocolate, nuts, beans, sweet potato, wheat germ, spinach and rhubarb are high in oxalic acid, although absorption does vary depending on the food and which other foods they are fed in combination with (Liebman and Al-Wahsh, 2011), so for dogs fed with home-prepared diets, a conversation around this is warranted.</span></p><span data-dcnode-id="893" instrument_node="">
</span><h2 data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Ammonium urate</span></h2><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">Dalmatians are homozygous for the recessive gene leading to defective uric acid metabolism, so only 30 to 40 percent of uric acid is metabolised to soluble allantoin, which is the end product of purine catabolism; this results in a build-up of uric acid and leads to the formation of ammonium urate stones (Bannasch </span><em data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">et al</span></em><span data-dcnode-id="886" instrument_node="">., 2008). In unaffected dogs, 90 percent of uric acid is metabolised.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">Dalmatians are the most common breed affected by the metabolic stone, ammonium urate. Other breeds can also be affected; these include, most commonly, American and English Bulldogs, Black Russian Terriers and Giant Schnauzers, all of which have a 37 percent increased risk of developing urate compared with mixed breeds (Houston </span><em data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">et al</span></em><span data-dcnode-id="880" instrument_node="">., 2017).</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="877" instrument_node="">Since ammonium urate formation is a genetic problem, it cannot be cured and there is always a risk of recurrence. A 2017 study by Westropp </span><em data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">et al</span></em><span data-dcnode-id="874" instrument_node="">. found that feeding a diet with moderate levels of protein (18 to 20 percent as fed) with low-purine protein sources can reduce the risk of recurrence. This is best achieved using non-meat protein sources, such as egg or wheat, and particularly avoiding beef protein – with added water for urine dilution, since a diet should also be lowered in sodium. It is also useful for a diet to include an alkalising agent. Interestingly, Albasan </span><em data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">et al</span></em><span data-dcnode-id="871" instrument_node="">. (2005) found that there was a significantly higher risk in male Dalmatians and concluded that long-term protocols to reduce the risk of recurrence might not actually be necessary in females.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Measurement parameters:</span></p><span data-dcnode-id="866" instrument_node="">
</span><ul data-dcnode-id="858"><span data-dcnode-id="865" instrument_node="">
</span><li data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Urine pH: &gt;6.8 to 7</span></li><span data-dcnode-id="862" instrument_node="">
</span><li data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Urine SG: &lt;1.035 (&lt;1.025 in recurrent cases)</span></li><span data-dcnode-id="859" instrument_node="">
</span></ul><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">As noted by Lulich </span><em data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">et al</span></em><span data-dcnode-id="853" instrument_node="">. (2016), it is possible to dissolve urate stones within four weeks if fed the appropriate diet alongside administration of a xanthine oxidase inhibitor (ie allopurinol). They also state that where the urate is related to a liver condition, such as an uncorrected portosystemic shunt, dissolution is not possible because allopurinol is contraindicated in these cases.</span></p><span data-dcnode-id="851" instrument_node="">
</span><h3 data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Case of a six-year-old male (entire) dalmatian with urate stones</span></h3><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="847" instrument_node="">This dog presented with a history of occasional whimpering followed by nibbling at his prepuce. Urination was normal. His prepuce showed saliva staining and mild dermatitis but otherwise there were no abnormalities except that he was slightly underweight. Two months later, bloody urine was found in the owner’s kitchen but still no history of straining or discomfort noted during micturition. A culture of a discharge from the penis was done and balanoposthitis was treated with antibiotics. After another eight weeks, the dog presented with the same symptoms but now urine wasn’t flowing normally. Urinalysis showed a specific gravity of 1.031, pH 5.5 and frequent ammonium urate crystals. A contrast urethrogram showed narrowing of the urethra, consistent with chronic urate stone lodgement. According to a study by Bartges </span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">et al</span></em><span data-dcnode-id="844" instrument_node="">. (1994), Dalmatians with uroliths are over 200 times more likely to be diagnosed with ammonium urate (</span><strong data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Figure 4</span></strong><span data-dcnode-id="841" instrument_node="">) than any other stone. Management of the condition was first the removal of the stones, then the dog was placed on a low-purine diet for life.</span></p><span data-dcnode-id="839" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="835"><img data-dcnode-id="838" data-mfp-src="https://www.veterinary-practice.com/wp-content/uploads/2019/06/Small-Animal-Nutrition-Uroliths-4.PNG" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinary-practice.com/wp-content/uploads/2019/06/Small-Animal-Nutrition-Uroliths-4.PNG&amp;raw"><figcaption data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">FIGURE (4) Radiograph of ultrasound showing urate gravel in a Dalmatian</span></figcaption></figure><span data-dcnode-id="834" instrument_node="">
</span><h2 data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Other canine uroliths</span></h2><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="830" instrument_node="">Other canine uroliths include cysteine, which most commonly affect Deerhounds (Houston </span><em data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">et al</span></em><span data-dcnode-id="827" instrument_node="">., 2017), and xanthine, silica and calcium phosphate carbonate, which are all fairly rare. Dogs can also suffer with bacterial urinary tract infections, very often concurrent with diabetes mellitus or hyperadrenocorticism (Forrester </span><em data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">et al</span></em><span data-dcnode-id="824" instrument_node="">., 1999), and as already mentioned, this can lead to urolith formation, particularly struvite.</span></p><span data-dcnode-id="822" instrument_node="">
</span><h2 data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Summary</span></h2><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">The causes of urolith formation are varied and complex or idiopathic and, in all cases, specific nutritional management is valuable and recommended. In the case of ammonium urate, dietary changes should be lifelong. Many patients will have a recurrence and the most effective way to avoid this is by feeding a diet with a low RSS level for both struvite and oxalate for the rest of their lives. Dogs of different genders, lifestyles and breeds may be more or less predisposed; understanding this gives one a better chance of choosing an appropriate treatment and feeding protocol for ongoing patient management.</span></p><span data-dcnode-id="816" instrument_node="">
</span></section><span data-dcnode-id="814" instrument_node="">
