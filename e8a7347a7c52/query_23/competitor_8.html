</span><h3 class="space-20-bottom" data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">Food4Health Campaign</span></h3><span data-dcnode-id="4712" instrument_node="">
</span><p class="space-40-bottom d-print-none" data-dcnode-id="4701"><span data-dcnode-id="4711" instrument_node="">Many of us hear routinely from those who say they simply don’t know what they should be eating. When you’re exposed to a barrage of conflicting views from different ‘experts’, authorities and organisations, it’s no surprise if you feel confused and more inclined to put your head in the sand. </span><br data-dcnode-id="4710"><br data-dcnode-id="4709"><span data-dcnode-id="4708" instrument_node="">Amongst this maze of conflicting information, many people are then more likely to revert to eating according to government guidelines. But it’s this very advice, including the recommendation to depend on starchy carbohydrates as our main energy source, while reducing the intake of healthy fats, that’s contributing to the rapid spiral in chronic diseases. These include obesity, type 2 diabetes, coronary heart disease and even some forms of cancer, now the main killer diseases in most societies. </span><br data-dcnode-id="4707"><br data-dcnode-id="4706"><span data-dcnode-id="4705" instrument_node="">Government guidelines are based on outdated or flawed science.</span><br data-dcnode-id="4704"><br data-dcnode-id="4703"><span data-dcnode-id="4702" instrument_node="">That's where our Food4Health guidelines come in. Informed by the latest developments in nutritional science, and the experience of clinicians and citizens all over the world, we provide you with advice, guidance and information, that can help you, your family and your friends, eat in ways that have the capacity to optimise your health.</span></p><span data-dcnode-id="4700" instrument_node="">

</span><h2 class="color-theme" data-dcnode-id="4525" id="user-heading-1"><span data-dcnode-id="4526" instrument_node="">The ANH-Intl Food4Health campaign aims to:</span></h2><span data-dcnode-id="4524" instrument_node="">
</span><ul data-dcnode-id="4506"><span data-dcnode-id="4523" instrument_node="">
</span><li data-dcnode-id="4520"><strong data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">Educate about what healthy&nbsp;eating patterns look like, so you can make the right choices</span></strong></li><span data-dcnode-id="4519" instrument_node="">
</span><li data-dcnode-id="4516"><strong data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">Encourage you to take responsibility for your health by using wholesome, natural, nutrient-dense foods, food ingredients and concentrated nutrients</span></strong></li><span data-dcnode-id="4515" instrument_node="">
</span><li data-dcnode-id="4512"><strong data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">Motivate you to combine healthy food choices with with other lifestyle approaches that will help to maintain good health</span></strong></li><span data-dcnode-id="4511" instrument_node="">
</span><li data-dcnode-id="4508"><strong data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">Help you to reduce or eliminate your dependency on pharmaceutical drugs as the primary means of healthcare.</span></strong></li><span data-dcnode-id="4507" instrument_node="">
</span></ul><span data-dcnode-id="4505" instrument_node="">
</span><p data-dcnode-id="4499"><br data-dcnode-id="4504"><em data-dcnode-id="4500"><strong data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">Disclaimer: </span></strong><span data-dcnode-id="4501" instrument_node="">The information provided in this campaign is not a substitute for medical advice. If you suffer from any health condition, please seek the support and guidance of a suitably qualified and experienced health professional.</span></em></p><span data-dcnode-id="4498" instrument_node="">
</span><h2 data-dcnode-id="4496" id="user-heading-2"><span data-dcnode-id="4497" instrument_node="">Our Food4Health guidelines incorporate 8 values</span></h2><span data-dcnode-id="4495" instrument_node="">
</span><ol data-dcnode-id="4466"><span data-dcnode-id="4494" instrument_node="">
</span><li data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">We need to reduce consumption patterns of foods that are products of the industrial food system, including: junk foods; ultra-processed foods; foods containing artificial additives; foods that are of low nutrient-density, and; animal products from animals with poor welfare standards or those fed on imported foodstuffs that are inconsistent with their natural diets</span></li><span data-dcnode-id="4491" instrument_node="">
</span><li data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">Whole foods produced in agro-ecological production systems need to be made accessible and affordable to all</span></li><span data-dcnode-id="4488" instrument_node="">
</span><li data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">We need to prioritise the consumption of home-prepared foods</span></li><span data-dcnode-id="4485" instrument_node="">
</span><li data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">We should eat non-starchy vegetables in a ratio that exceeds fruit by a ratio of at least 3:1</span></li><span data-dcnode-id="4482" instrument_node="">
</span><li data-dcnode-id="4477"><span data-dcnode-id="4481" instrument_node="">We should avoid </span><a data-anchor="#allergens" data-dcnode-id="4479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.food.gov.uk/safety-hygiene/food-allergy-and-intolerance%23allergens" rel="noopener" target="_blank"><span data-dcnode-id="4480" instrument_node="">allergens</span></a><span data-dcnode-id="4478" instrument_node=""> in our diets as far as possible, especially if bloating is experienced after eating or there is evidence of systemic inflammatory issues (e.g. type 2 diabetes, obesity, heart disease, cancer, arthritis, Alzheimer’s)</span></li><span data-dcnode-id="4476" instrument_node="">
</span><li data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">We need to focus on dietary diversity, nutrient quality and density, not on calorie counting</span></li><span data-dcnode-id="4473" instrument_node="">
</span><li data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">Those prone to metabolic diseases like obesity or type 2 diabetes should engage in intermittent fasting and minimise snacking</span></li><span data-dcnode-id="4470" instrument_node="">
</span><li data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">We need to minimise our reliance on refined vegetable seed oils that tend to contribute to inflammation in the body</span></li><span data-dcnode-id="4467" instrument_node="">
</span></ol><span data-dcnode-id="4465" instrument_node="">
</span><h2 data-dcnode-id="4463" id="user-heading-3"><span data-dcnode-id="4464" instrument_node="">Healthful eating guidelines for everyone</span></h2><span data-dcnode-id="4462" instrument_node="">
</span><p data-dcnode-id="4457"><span data-dcnode-id="4461" instrument_node="">Our adult and children Food4Health guidelines,&nbsp;</span><a data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anhinternational.org/2018/05/30/food4health-2018-update/" rel="noopener" target="_blank"><span data-dcnode-id="4460" instrument_node="">updated</span></a><span data-dcnode-id="4458" instrument_node="">&nbsp;in May 2018, provide advice on how we might combine foods in a way that delivers the nutrients required to support not only our energy needs, but also the 135 or so metabolic pathways and 12 body systems. The approach we adopt in our guidelines is about using the most relevant and emerging science that can be helpful in avoiding the metabolic conditions, imbalanced gut microbiome and persistent low-grade inflammation that underpin the chronic diseases that now run rampant in society.</span></p><span data-dcnode-id="4456" instrument_node="">
</span><p data-dcnode-id="4451"><span data-dcnode-id="4455" instrument_node="">Both guidelines are available as downloads (below), and you may use the content as you like provided you always clearly attribute it to Alliance for Natural Health International, including the date and a link to the original content. As well as being backed up by&nbsp;supporting articles&nbsp;and&nbsp;</span><a data-dcnode-id="4453" data-udi="umb://document/86a7de1583314880b4b8a3c0490713c8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anhinternational.org/resources/documents/selected-references_food4health-guidelines/" rel="noopener" target="_blank" title="170724 Selected references_Food4Health guidelines"><span data-dcnode-id="4454" instrument_node="">scientific references</span></a><span data-dcnode-id="4452" instrument_node="">, we also like to think of our Food4Health guidelines as a longevity 'plate', which are:</span></p><span data-dcnode-id="4450" instrument_node="">
</span><p data-dcnode-id="4436"><span data-dcnode-id="4449" instrument_node="">- Largely unprocessed</span><br data-dcnode-id="4448"><span data-dcnode-id="4447" instrument_node="">- Relatively low carb/high complex carb</span><br data-dcnode-id="4446"><span data-dcnode-id="4445" instrument_node="">- Low glycaemic</span><br data-dcnode-id="4444"><span data-dcnode-id="4443" instrument_node="">- Moderately high fat</span><br data-dcnode-id="4442"><span data-dcnode-id="4441" instrument_node="">- High protein</span><br data-dcnode-id="4440"><span data-dcnode-id="4439" instrument_node="">- Anti-inflammatory</span><br data-dcnode-id="4438"><span data-dcnode-id="4437" instrument_node="">- Pro-mitochondrial (energy)</span></p><span data-dcnode-id="4435" instrument_node="">
</span><h2 data-dcnode-id="4433" id="user-heading-4"><span data-dcnode-id="4434" instrument_node="">Food4Health Guidelines</span></h2><span data-dcnode-id="4432" instrument_node="">
</span><p class="info-box color-theme" data-dcnode-id="4429"><strong data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">CLICK ON GUIDES TO ENLARGE AND DOWNLOAD</span></strong></p><span data-dcnode-id="4428" instrument_node="">
</span><h3 data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">For adults &amp; children over 6&nbsp;&nbsp; For young children aged 1-6</span></h3><span data-dcnode-id="4425" instrument_node="">
