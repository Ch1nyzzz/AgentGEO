data-udi="umb://document/7ca43a241f6440e880054f2f0794bdbc" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anhinternational.org/videos/the-obesity-fix-part-1/" rel="noopener" target="_blank" title="The Obesity Fix: Part 1"><span data-dcnode-id="3922" instrument_node="">The Obesity Fix Part 1</span></a></td></tr><tr data-dcnode-id="3908"><td data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">&nbsp;</span></td><td data-dcnode-id="3910"><a data-dcnode-id="3911" data-udi="umb://document/0d2add66a52b4d05a6ad0912318398b6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anhinternational.org/videos/the-obesity-fix-part-2/" rel="noopener" target="_blank" title="The Obesity Fix Part 2"><span data-dcnode-id="3912" instrument_node="">The Obesity Fix Part 2</span></a></td></tr></tbody></table></div><span data-dcnode-id="3902" instrument_node="">
</span><h2 data-dcnode-id="3900" id="user-heading-12"><span data-dcnode-id="3901" instrument_node="">Campaign Summary</span></h2><span data-dcnode-id="3899" instrument_node="">
</span><ul data-dcnode-id="3893"><span data-dcnode-id="3898" instrument_node="">
</span><li data-dcnode-id="3895"><strong data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Alongside the spread of agri-business, our food supply is now largely in the grip of the large corporations.&nbsp; With the increase in food processing and the growth of supermarket control of food marketing, has come a large decline in the quality and nutrient value of our global food supply.</span></strong></li><span data-dcnode-id="3894" instrument_node="">
</span></ul><span data-dcnode-id="3892" instrument_node="">
</span><ul data-dcnode-id="3886"><span data-dcnode-id="3891" instrument_node="">
</span><li data-dcnode-id="3888"><strong data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">The increasing reliance of food producers on artificial fertilizers, herbicides and pesticides is benefiting the major chemical industries, but is undermining our health and damaging vital eco-systems on which we all depend for our survival.</span></strong></li><span data-dcnode-id="3887" instrument_node="">
</span></ul><span data-dcnode-id="3885" instrument_node="">
</span><ul data-dcnode-id="3879"><span data-dcnode-id="3884" instrument_node="">
</span><li data-dcnode-id="3881"><strong data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">These trends are being reinforced by international guidelines on food and food supplements, developed through the Codex Alimentarius Commission, which will have world-wide impact.</span></strong></li><span data-dcnode-id="3880" instrument_node="">
</span></ul><span data-dcnode-id="3878" instrument_node="">
</span><ul data-dcnode-id="3872"><span data-dcnode-id="3877" instrument_node="">
</span><li data-dcnode-id="3874"><strong data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">Chronic illnesses and degenerative conditions have reached epidemic proportions.&nbsp; However, the majority can be successfully mediated by diet and lifestyle changes.&nbsp; Governments and policy makers are doing little to turn the tide on our modern, unhealthy, de-natured diet and lifestyle choices.&nbsp; Treatments are almost solely focused on the use of medication – to the benefit of Big Pharma and the detriment of most others.</span></strong></li><span data-dcnode-id="3873" instrument_node="">
</span></ul><span data-dcnode-id="3871" instrument_node="">
</span><ul data-dcnode-id="3865"><span data-dcnode-id="3870" instrument_node="">
</span><li data-dcnode-id="3867"><strong data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">Over the last 50 years the levels of key minerals within fruits and vegetables in the UK alone, have declined by up to 70%. We need to re-examine our relationship both to food and the natural world in order to reclaim our health and the earth that we depend on.</span></strong></li><span data-dcnode-id="3866" instrument_node="">
</span></ul><span data-dcnode-id="3864" instrument_node="">
</span><h2 data-dcnode-id="3862" id="user-heading-13"><span data-dcnode-id="3863" instrument_node="">Corporate control of our food</span></h2><span data-dcnode-id="3861" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Over the last half century we have seen an unprecedented shift in the farming systems that produce the majority of our food. The majority of us are now dependent on massive, agri-business farming systems, which are in turn dependent on seeds, pesticides and machinery—all of which are controlled and supplied by some of the largest corporations the world has yet seen.&nbsp; Our diets have become over simplified and largely grain-based, which apart from the lack of nutritional diversity, is causing an unprecedented impact on our health.</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3853"><span data-dcnode-id="3857" instrument_node="">Food has become a global commodity and is now subject to international guidelines developed through the&nbsp;</span><a data-dcnode-id="3855" data-udi="umb://document/3fd22f0eadd640eba375b2e4d8832370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anhinternational.org/campaigns/anh-intl-campaigns/codex-alimentarius/" rel="noopener" target="_blank" title="Codex Alimentarius"><span data-dcnode-id="3856" instrument_node="">Codex Alimentarius Commission</span></a><span data-dcnode-id="3854" instrument_node="">. These guidelines favour the international trade of processed, low quality foods by transnational corporations. These foods are a very significant contributor to the increasing rates of degenerative disease, from cancer to heart disease, and diabetes to obesity. This is a stark contrast from the small-holder systems that relied on locally-produced seed to provide wholesome wholefoods—the system that met the subsistence needs of our ancestors for the vast majority of the 10,000 years since agriculture was first recorded.</span></p><span data-dcnode-id="3852" instrument_node="">
</span><p data-dcnode-id="3843"><span data-dcnode-id="3851" instrument_node="">Filmmaker Marie-Monique Robin’s documentary, released in France in March 2008 and still very relevant, called&nbsp;“</span><em data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">The World According to Monsanto</span></em><span data-dcnode-id="3848" instrument_node="">” details the troubling past of one of the world’s biggest agrochemical and seed companies, Monsanto—a company that appears to be controlling our food supply to a greater extent than any other single entity on the earth today</span><strong data-dcnode-id="3845"><em data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">.&nbsp;</span></em></strong><span data-dcnode-id="3844" instrument_node="">Based on a painstaking investigation, this documentary pieces together the story of Monsanto, a century-old corporation with a controversial past and today’s leader in genetically modified crops.&nbsp; Monsanto claims it wants to solve world hunger and protect the environment, but its quest for market supremacy is to the detriment of global food security and environmental stability.</span></p><span data-dcnode-id="3842" instrument_node="">
</span><h2 data-dcnode-id="3840" id="user-heading-14"><span data-dcnode-id="3841" instrument_node="">Food or drugs for health—it’s your choice</span></h2><span data-dcnode-id="3839" instrument_node="">
</span><p data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Given that it is now recognised by all health authorities around the world that diet and lifestyle are the primary factors in all major chronic diseases, it beggar’s belief that the medical establishment still remains relatively uneducated and uninformed on this subject and continues to peddle drugs as the primary treatment regimen.</span></p><span data-dcnode-id="3836" instrument_node="">
</span><p data-dcnode-id="3828"><span data-dcnode-id="3835" instrument_node="">The Food</span><em data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">4</span></em><span data-dcnode-id="3832" instrument_node="">Health campaign aims to stimulate greater emphasis on the use of foods and other lifestyle approaches for preventative healthcare, rather than exerting the effort and the money on an already diseased and toxin-laden body.&nbsp; If there’s one thing all the health statistics agree on—this is not&nbsp;</span><a data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anhcampaign.org/anhnew/campaigns/sustainable-healthcare"><span data-dcnode-id="3831" instrument_node="">sustainable</span></a><span data-dcnode-id="3829" instrument_node="">.</span></p><span data-dcnode-id="3827" instrument_node="">
</span><p data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">We live in an era where chronic diseases like coronary heart disease (CVD), cancer, diabetes and obesity, are storming ahead as the leading causes of premature death.&nbsp; The key feature of all these diseases is that they have an incontrovertible relationship to diet and lifestyle. This means that lifestyle risk factors such as diet, nutrition, exercise, stress levels, alcohol consumption and smoking have a powerful influence on the health of a nation.&nbsp; And little to nothing is being done to educate people about healthy eating and lifestyle choices.</span></p><span data-dcnode-id="3824" instrument_node="">
</span><p data-dcnode-id="3816"><span data-dcnode-id="3823" instrument_node="">Despite what we are constantly being told, we may be living longer in statistical terms, but our morbidity rates (the rates at which we are living with illness) are increasing dramatically.&nbsp; Interestingly, these statistics don’t make it into the mainstream press as readily as the so-called survival rates! Depending on exactly which figures you are looking at, and which countries they emanate from, there is a suggestion that we may have reached a point where we are already starting to see a decline in life expectancy in countries like the UK and USA.&nbsp; For a list of countries with decreasing expectancy click&nbsp;</span><a data-dcnode-id="3821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nationmaster.com/graph/hea_lif_exp_at_bir_tot_pop-life-expectancy-birth-total-population"><span data-dcnode-id="3822" instrument_node="">here</span></a><span data-dcnode-id="3820" instrument_node="">&nbsp;and for a list of countries showing the number of morbidity free years click</span><a data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nationmaster.com/graph/hea_hea_lif_exp_at_bir_yea_tot_pop-expectancy-birth-years-total-population"><span data-dcnode-id="3819" instrument_node="">&nbsp;here</span></a><span data-dcnode-id="3817" instrument_node="">.</span></p><span data-dcnode-id="3815" instrument_node="">
</span><p data-dcnode-id="3812"><br data-dcnode-id="3814"><span data-dcnode-id="3813" instrument_node="">Over the last 50 years the levels of key minerals within fruits and vegetables in the UK alone, have declined by up to 70%.&nbsp; Whilst dietary surveys show that large sectors of the population are deficient in particular vitamins—e.g. C, D, K—or minerals—e.g. selenium, zinc, magnesium—despite the growth of the organic fruit and vegetable sectors, and the increased availability of ‘fresh’ fruits and vegetables.&nbsp; The harsh reality is that even an apparently ‘balanced diet’ today will often leave you deficient in particular nutrients and your immune system less than fully primed to handle both toxic and microbiological assaults. Worse still, the typical children’s diet is so bad in the western world, that unless we see profound changes over the next few years, we can expect to see an explosion of cancer, CHD and other degenerative diseases unlike anything we have experienced to date.</span></p><span data-dcnode-id="3811" instrument_node="">
</span><p data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Our immune systems and self-healing mechanisms are crying out for us to:</span></p><span data-dcnode-id="3808" instrument_node="">
</span><ul data-dcnode-id="3779"><span data-dcnode-id="3807" instrument_node="">
</span><li data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Rekindle our connection to nature and all things natural</span></li><span data-dcnode-id="3804" instrument_node="">
</span><li data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">Remember what it was to eat food that was fresh and nutrient dense</span></li><span data-dcnode-id="3801" instrument_node="">
</span><li data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">Give some real focus to educating our children about food and nutrition as it isn’t happening in schools and colleges anymore</span></li><span data-dcnode-id="3798" instrument_node="">
</span><li data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">Return to good old-fashioned home cooking from non-processed raw ingredients and make it a feature of every household</span></li><span data-dcnode-id="3795" instrument_node="">
</span><li data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Support our local and organic farmers by buying from farmer’s markets and farm shops</span></li><span data-dcnode-id="3792" instrument_node="">
</span><li data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Get down on our knees and make contact with that stuff we call earth! Think about growing some of your own food or herbs—even if you live in a 10th floor apartment, it’s remarkable what you can grow in pots on the window ledge!</span></li><span data-dcnode-id="3789" instrument_node="">
</span><li data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">Get active and make sure we move our bodies on a daily basis.&nbsp; It’s not all about exercising madly in a gym.&nbsp; Get out in nature, walk barefoot, feel the grass underfoot, breath fresh air.&nbsp; 20 minutes a day of moderate to intense activity will do wonders for our health</span></li><span data-dcnode-id="3786" instrument_node="">
</span><li data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">Remember how important sleep is and make sure we get 6-8 hours a night minimum</span></li><span data-dcnode-id="3783" instrument_node="">
</span><li data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Understand it’s not all about our bodies – if our minds are not at peace we can never be truly healthy.&nbsp; Take some ‘me-time’, laugh more, do what you love and love what you do.</span></li><span data-dcnode-id="3780" instrument_node="">
</span></ul><span data-dcnode-id="3778" instrument_node="">
</span><p data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">The disassociation from nature and our natural roots has to come to an abrupt end if we are to reclaim our health and have an influence on the future health of our nations.</span></p><span data-dcnode-id="3775" instrument_node="">
</span><p data-dcnode-id="3770"><span data-dcnode-id="3774" instrument_node="">That’s why you have to tell people about the Food</span><em data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">4</span></em><span data-dcnode-id="3771" instrument_node="">Health campaign!</span></p><span data-dcnode-id="3769" instrument_node="">
</span><p data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">Buying local produce from a farmers’ market on a regular basis makes a big contribution to your own health as well as to the system that provides your food</span></p><span data-dcnode-id="3766" instrument_node="">
</span><p data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">Do you want your kids to have food—or drugs?</span></p><span data-dcnode-id="3763" instrument_node="">
</span><p data-dcnode-id="3758"><span data-dcnode-id="3762" instrument_node="">See the trailer of Kevin Miller’s stunning documentary&nbsp;</span><em data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">Generation RX</span></em><span data-dcnode-id="3759" instrument_node="">&nbsp;below—and decide for yourself.</span></p><span data-dcnode-id="3757" instrument_node="">
</span><p data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3754" instrument_node="">
</span><p data-dcnode-id="3717"><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="3718" frameborder="0" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/xehHwkPpevk%3Ffeature%3Doembed&amp;raw" width="320"><html data-cast-api-enabled="true" data-dcnode-id="3720" dir="ltr" lang="en"><head data-dcnode-id="3729"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="3750" name="viewport"/><link data-dcnode-id="3745" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="MPO5cG7mBuWwsZFQn8gmSA" rel="stylesheet"/><title data-dcnode-id="3732">YouTube</title><link data-dcnode-id="3731" href="https://www.youtube.com/watch?v=xehHwkPpevk" rel="canonical"/><link data-dcnode-id="3730" data-loaded="true" href="https://www.youtube.com/s/player/534c466c/www-player.css" id="css-335067421" nonce="DlJtQlI8lSlOkRiYhx13+w" rel="stylesheet"/></meta></head><body class="date-20220426 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="3721" dir="ltr"><div data-dcnode-id="3728" id="player" style="width: 100%; height: 100%;"></div><noscript data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=xehHwkPpevk" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="3716" instrument_node="">
</span><h2 data-dcnode-id="3714" id="user-heading-15"><span data-dcnode-id="3715" instrument_node="">ANH-Intl Dietary Guidelines for Better Health</span></h2><span data-dcnode-id="3713" instrument_node="">
</span><p data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Some people have difficulty complying with very detailed and specific dietary recommendations. As a result, we have developed looser guidelines that provide more general indications for diet and lifestyle, that are informed by the latest scientific views.</span></p><span data-dcnode-id="3710" instrument_node="">
</span><h3 data-dcnode-id="3707"><strong data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">Guideline 1</span></strong></h3><span data-dcnode-id="3706" instrument_node="">
</span><p data-dcnode-id="3699"><strong data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">Consume at least seven portions of fresh fruit and vegetables</span></strong><span data-dcnode-id="3703" instrument_node="">&nbsp;(which equates to roughly 400 to 600 g) a day, every day. This recommendation derives from guidelines to consumers developed by the United States National Cancer Institute and American Institute for Cancer Research which stipulate&nbsp;</span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15235216%3Fitool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_RVDocSum%26ordinalpos%3D2"><span data-dcnode-id="3702" instrument_node="">five to nine servings per day</span></a><span data-dcnode-id="3700" instrument_node="">.</span></p><span data-dcnode-id="3698" instrument_node="">
</span><p data-dcnode-id="3693"><span data-dcnode-id="3697" instrument_node="">Fruit and vegetables contain beneficial fibre, phytonutrients, antioxidants, vitamins and minerals, and eating a good amount (whilst at the same time ensuring that protein intake is not too high) can also help ensure net metabolic alkalinity, which is important for maintaining bone strength, and&nbsp;</span><a data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15817873%3Fitool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_RVDocSum%26ordinalpos%3D51"><span data-dcnode-id="3696" instrument_node="">preventing osteoporosis</span></a><span data-dcnode-id="3694" instrument_node="">.</span></p><span data-dcnode-id="3692" instrument_node="">
</span><p data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Focus on selecting diverse types of fruit and vegetables—don’t always have the same types.&nbsp; Diversity is very important to ensure you get a good mix of different types of nutrients.&nbsp; Broccoli is an extremely healthy vegetable, but don’t only eat broccoli every day, to the exclusion of other vegetables.</span></p><span data-dcnode-id="3689" instrument_node="">
</span><p data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">Remember to ‘eat a rainbow’ everyday.&nbsp; Focus on mixing lots of different colours too: dark greens, oranges, reds, light greens, yellows, and so on.&nbsp; These natural colours are actually comprised of different nutrients, many of which have cancer protective properties.&nbsp; Red foods contain lycopene (a carotenoid), which is associated with a reduction in cancer risk, especially prostate cancer.&nbsp; Yellow and orange foods also contain different blends of powerful natural carotenoids, a group of some 400-500 naturally-occurring substances with cancer-fighting properties.&nbsp; Green foods like broccoli, kale and Brussels sprouts contain glucosinolates, which are associated with decreased cancer risk.&nbsp; White-green foods, such as garlic and onions, contain allyl sulphides that also appear to be important to your anticancer armoury.&nbsp; Finally, purple and dark blue berries contain highly beneficial anthocyanins.</span></p><span data-dcnode-id="3686" instrument_node="">
</span><p data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">Eat home-prepared food as often as you can and don’t overcook or over-steam your vegetables and certainly don’t microwave them.&nbsp; This type of cooking breaks down a lot of the enzymes and other nutrients.&nbsp; It also damages the ‘life energy’ within the food.</span></p><span data-dcnode-id="3683" instrument_node="">
</span><p data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">There has been some concern recently about consumption of high levels of the natural fruit sugars (fructose) contained in fruit, and increased risk of diabetes. This concern is of course a valid one, though the risks are generally associated more with fruit juices, particularly concentrates, and fructose-based sweeteners such as high fructose corn syrups.&nbsp; The inclusion of a few portions of fruit as part of a well balanced diet is not associated with risk of either diabetes or obesity, especially if you choose fruits with a low glycaemic load.&nbsp; Glycaemic load refers to the amount that a food will raise your blood sugar after you’ve eaten it.</span></p><span data-dcnode-id="3680" instrument_node="">
</span><p data-dcnode-id="3671"><span data-dcnode-id="3679" instrument_node="">The conclusions of researchers in the article: ‘</span><em data-dcnode-id="3676"><a data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ajcn.org/cgi/content/full/88/5/1189%3Fmaxtoshow%3D%26HITS%3D%26hits%3D%26RESULTFORMAT%3D1%26andorexacttitle%3Dand%26fulltext%3Dfructose%2Bdiabetes%2Bgabriela%26andorexactfulltext%3Dand%26searchid%3D1%26FIRSTINDEX%3D0%26sortspec%3Drelevance%26resourcetype%3DHWCIT"><span data-dcnode-id="3678" instrument_node="">How safe is fructose for persons with or without diabetes</span></a></em><span data-dcnode-id="3675" instrument_node="">?’ (</span><em data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">American Journal of Clinical Nutrition</span></em><span data-dcnode-id="3672" instrument_node="">) is that obesity and diabetes rates were low when total fructose intake was in the range of 25 – 40 g/d.&nbsp; As a guide, a medium sized apple has around 6 g of fructose if you eat the skin, whereas 3 dates contain around 31 g.&nbsp; Choosing your fruits carefully is important as the body has no satiety system for fructose.&nbsp; This means your body won’t signal you when you’ve eaten too much.&nbsp; Fructose metabolism is also very heavy work for the liver and uses a lot of energy.&nbsp; All in all, whether you’re at risk of getting diabetes or not, more than 25-40 g/d of fructose is not good for your body.</span></p><span data-dcnode-id="3670" instrument_node="">
</span><p data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">Fruits that are lower in sugar are those such as, apples, avocados, tomatoes, lemons, limes, rhubarb, blackberries, raspberries and cranberries.&nbsp; Whilst some vegetables can be fairly high in sugar, such as corn, carrots, beets, peas, plantains, winter squashes and parsnips and should therefore be limited.</span></p><span data-dcnode-id="3667" instrument_node="">
</span><h3 data-dcnode-id="3664"><strong data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Guideline 2</span></strong></h3><span data-dcnode-id="3663" instrument_node="">
</span><p data-dcnode-id="3659"><strong data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Consume complex, rather than simple, carbohydrates.</span></strong><span data-dcnode-id="3660" instrument_node="">&nbsp; Use a Glycaemic Index (GI) or better still, a Glycaemic Load (GL) chart and select moderate to low glycaemic ‘carbs’ whenever you can.&nbsp; Don’t consume white bread, go for whole grain and seed breads.&nbsp; Once grains are refined, they’ve lost up to 80% of their vitamin and mineral content.</span></p><span data-dcnode-id="3658" instrument_node="">
</span><p data-dcnode-id="3653"><span data-dcnode-id="3657" instrument_node="">Click&nbsp;</span><a data-dcnode-id="3655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.carbs-information.com/glycemic-load.htm"><span data-dcnode-id="3656" instrument_node="">here</span></a><span data-dcnode-id="3654" instrument_node="">&nbsp;for GL values of food types.</span></p><span data-dcnode-id="3652" instrument_node="">
</span><p data-dcnode-id="3647"><span data-dcnode-id="3651" instrument_node="">Grains are a relative newcomer to the human diet, and wheat and other gluten containing grains are problematic to many. However, agriculture has been around since approximately 8000 BC, and the most nutritious whole forms of grain, such as&nbsp;</span><a data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19878856%3Fitool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_RVDocSum%26ordinalpos%3D2"><span data-dcnode-id="3650" instrument_node="">quinoa</span></a><span data-dcnode-id="3648" instrument_node="">, are in a different league from the highly processed junk foods foisted on us by the big food corporations. Whole, minimally processed, organic, gluten-free forms of grain can be enjoyed as part of a healthy nutritious diet, although ideally these would be varied, and should not dominate the diet. &nbsp;Aim for around 15% of your plate for grains and remember that even though these are complex carbohydrates, they are starchy carbs and still end up contributing to an overall increase in blood sugar.</span></p><span data-dcnode-id="3646" instrument_node="">
</span><p data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">Independent nutrition experts today would not routinely recommend dietary restrictions in complex carbohydrates, which would therefore restrict intake of vegetables and fruits.&nbsp; Such restrictions became popular in the late 1990s/ early 2000s, with the arrival of the controversial Atkins diet.</span></p><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3635"><span data-dcnode-id="3642" instrument_node="">Vegetables and fruit, according to S. Boyd Eaton, M.D., one of the foremost authorities on paleolithic (prehistoric) diets, are believed to have accounted for approximately 50% of the hunter-gatherers diet, and probably included a wide variety of fruits, roots, legumes, seeds and other non-cereal plants.&nbsp; Such wholefoods, particularly the vegetable and fruit forms which are lower in sugar, should perhaps&nbsp;</span><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19741188%3Fitool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_RVDocSum%26ordinalpos%3D11"><span data-dcnode-id="3641" instrument_node="">ideally</span></a><span data-dcnode-id="3639" instrument_node="">&nbsp;form the main part of the diet today, also. They are crucial for their&nbsp;</span><a data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11010932%3Fordinalpos%3D1%26itool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_SingleItemSupl.Pubmed_Discovery_RA%26linkpos%3D2%26log%24%3Drelatedarticles%26logdbfrom%3Dpubmed"><span data-dcnode-id="3638" instrument_node="">fibre</span></a><span data-dcnode-id="3636" instrument_node="">, high potassium, alkaline promoting properties, anti-inflammatory effects as well as for the important and diverse health-giving properties of their phytonutrient constituents.</span></p><span data-dcnode-id="3634" instrument_node="">
</span><h3 data-dcnode-id="3631"><strong data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">Guideline 3</span></strong></h3><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3626"><strong data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">Take your protein from lean meats, fish, nuts, seeds and vegetables</span></strong><span data-dcnode-id="3627" instrument_node="">, such as peas, beans and non-GMO/organic soya products (e.g. tofu, tempeh), depending on your preferences.&nbsp; Tofu and tempeh, consumed in large quantities by the Japanese and South-East Asians, and now widely available in UK supermarkets, are good sources of phytoestrogens and contribute to reduced cancer risk, moderation of post-menopausal symptoms in women and reduced LDL cholesterol.&nbsp; These vegetable protein sources are also virtually fat-free.&nbsp; What you should also try to do is avoid fatty, non-organic meats that deliver saturated fats and have accumulated toxic chemicals:</span></p><span data-dcnode-id="3625" instrument_node="">
</span><p data-dcnode-id="3617"><span data-dcnode-id="3624" instrument_node="">There is increasing evidence that high cholesterol is not actually the ‘guilty party’ in heart and artery disease, but that it just happens to be found ‘at the scene of the crime’.&nbsp; Both&nbsp;</span><a data-dcnode-id="3622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18990318%3Fordinalpos%3D1%26itool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_DefaultReportPanel.Pubmed_RVDocSum"><span data-dcnode-id="3623" instrument_node="">high homocysteine</span></a><span data-dcnode-id="3621" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19803405%3Fitool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_RVDocSum%26ordinalpos%3D6"><span data-dcnode-id="3620" instrument_node="">inflammation of the arteries</span></a><span data-dcnode-id="3618" instrument_node="">&nbsp;are being increasingly considered the true culprits. Therefore, reducing inflammation by avoiding refined foods, increasing fruit and vegetables as well as avoiding an excess of saturated fat and trans fats, and successfully balancing omega 6 and omega 3 fats could more important than ever.&nbsp; Reducing inflammation in this way may also protect against other chronic diseases, including cancer and arthritis. This is also the reason we do not encourage consumption of dairy fats, although eggs are indeed a good nutrient source.</span></p><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3611"><span data-dcnode-id="3615" instrument_node="">Although our hunter-gatherer predecessors are very likely to have eaten all of the fat and the lean meat of the wild animals they killed, these too are a far cry from the ‘artificially’ fattened up domestic farm animals of today.&nbsp; Today’s supermarket meat fat perhaps represents the undesirable and cruel profit-driven motives of our meat and food industries.&nbsp; Wild animals eat a more natural diet that ensures that their meat is higher in omega 3 fats, whilst no-one can really be sure about what was in diets of the farm animal’s served up for us today.&nbsp; One thing we do know is that&nbsp;</span><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.food.gov.uk/business-guidance/gm-in-animal-feed"><span data-dcnode-id="3614" instrument_node="">approx 85%</span></a><span data-dcnode-id="3612" instrument_node="">&nbsp;of compounded animal feed currently used in Europe consists of genetically modified grains.&nbsp; Choose organic and grass fed meat, poultry and dairy options wherever possible.</span></p><span data-dcnode-id="3610" instrument_node="">
</span><p data-dcnode-id="3605"><span data-dcnode-id="3609" instrument_node="">Finally, it is known that dioxins and other contaminants such as PCBs&nbsp;</span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3282759/"><span data-dcnode-id="3608" instrument_node="">accumulate</span></a><span data-dcnode-id="3606" instrument_node="">&nbsp;in animal fat. These are products of the chlorination and other industries, the incineration of waste, and the widespread use of herbicides.</span></p><span data-dcnode-id="3604" instrument_node="">
</span><h3 data-dcnode-id="3601"><strong data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">Guideline 4</span></strong></h3><span data-dcnode-id="3600" instrument_node="">
</span><p data-dcnode-id="3596"><strong data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">Fats are good for you, as long as they are the right type.</span></strong><span data-dcnode-id="3597" instrument_node="">&nbsp; They should especially come from plants (notably nuts and seeds) and fish, rather than from farm animals.&nbsp; They should also not be processed. &nbsp;The monounsaturated fats, like extra virgin olive oil, and the polyunsaturated omega-3 oils (the best sources of which are&nbsp;open water, non-polluted oily fish and flax seeds) are well known to be very good for you. Don’t scrimp on these healthy fats, they are a wonderful energy source and contain nutrients, like essential fatty acids, that are very good for you.</span></p><span data-dcnode-id="3595" instrument_node="">
</span><p data-dcnode-id="3587"><span data-dcnode-id="3594" instrument_node="">Omega-6 polyunsaturated oils (found in nuts and seeds, sometimes along with smaller amounts of omega-3 oils) are also beneficial (provided that the nuts and seeds are not stale or rancid), but should not dominate the diet.&nbsp; Evidence points to a&nbsp;</span><a data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12442909"><span data-dcnode-id="3593" instrument_node="">low ‘ideal ratio’</span></a><span data-dcnode-id="3591" instrument_node="">&nbsp;of omega-6 to omega-3 fats.&nbsp; It is likely to be between about 1:1 to 4:1. The ratio tends to be over 15:1 in the typical Western diet, and this appears to&nbsp;</span><a data-dcnode-id="3589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19202384%3Fitool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_RVDocSum%26ordinalpos%3D2"><span data-dcnode-id="3590" instrument_node="">promote inflammation</span></a><span data-dcnode-id="3588" instrument_node="">&nbsp;and chronic disease. This is because omega-6 fats, which are more commonly available in foods than omega-3 oils, are actually able to imbalance fatty acid metabolism and disturb the pathways needed to dampen down inflammation.&nbsp; Inflammation in the body is associated with all chronic diseases as well as conditions like arthritis, depression, psoriasis, and blood clots.</span></p><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3581"><span data-dcnode-id="3585" instrument_node="">Polyunsaturated oils should be used in salad dressings etc, and should not be heated. Once they reach a certain temperature, their numerous ‘double bonds’ become mis-shapen or ‘trans’.&nbsp; Trans fats are harmful fat molecules, unable to serve any useful purpose in the body.&nbsp; They can damage health, are associated with breast cancer, can promote inflammation and are banned from food products in some countries.&nbsp; Monounsaturated fats such as olive oil, though still damaged by high temperatures, are a safer option, as they contain only one ‘double bond’ on each molecule that may become ‘trans’.&nbsp; Trans fats (and hydrogenated fats – also proinflammatory) are typically found in many processed foods, fries, and bakery products, pies and confectionery.&nbsp; Try also to avoid&nbsp;</span><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19202384%3Fitool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_RVDocSum%26ordinalpos%3D2"><span data-dcnode-id="3584" instrument_node="">pro-inflammatory</span></a><span data-dcnode-id="3582" instrument_node="">&nbsp;saturated fats in cheap and processed meats.</span></p><span data-dcnode-id="3580" instrument_node="">
</span><p data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">Medium chain triglycerides (which occur in high amounts in coconut oil) are also, of course, another very important group of health-promoting fats. They are valuable as an easily digested and absorbed, and metabolically stimulating energy source, but are not associated with insulin production or the laying down of more than very small amounts of body fat. &nbsp;Coconut oil is great for cooking.</span></p><span data-dcnode-id="3577" instrument_node="">
</span><p data-dcnode-id="3572"><span data-dcnode-id="3576" instrument_node="">Finally, phospholipids are another type of fat compound, and a major component of cell membranes and myelin sheaths surrounding nerve cells.&nbsp; Soy lecithin is a useful source of the phospholipids, phosphatidylcholine and phosphotidylserine, although these differ slightly from those found in animal sources.&nbsp; Despite this, lecithin has various&nbsp;</span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15628593"><span data-dcnode-id="3575" instrument_node="">health benefits</span></a><span data-dcnode-id="3573" instrument_node="">, including those of memory and brain function.&nbsp; Lecithin can be usefully sprinkled on various foods such as salads.</span></p><span data-dcnode-id="3571" instrument_node="">
</span><p data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">Fat soluble vitamins may be obtained from fish and fish oils, eggs, and to a certain extent from the fat traces in lean meat.</span></p><span data-dcnode-id="3568" instrument_node="">
</span><h3 data-dcnode-id="3565"><strong data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">Guideline 5</span></strong></h3><span data-dcnode-id="3564" instrument_node="">
</span><p data-dcnode-id="3559"><strong data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">Consume as much organic and farm-fresh food as your budget&nbsp;</span></strong><span data-dcnode-id="3561" instrument_node="">will allow. When it comes to prioritising, ensure that whenever you are dealing with fatty foods, such as meats and dairy—as well as salad vegetables and fruits, go for organic.&nbsp; This helps to reduce your chemical load.&nbsp; Another benefit of certified organic foods is that crops must be grown in the soil, so you get uptake of trace and ultra-trace minerals.&nbsp; Many people don’t realise that a large amount of the non-organic salad produce bought in supermarkets is grown hydroponically in water containing a very limited range of nutrients.&nbsp; Such crops, for example tomatoes, peppers (capsicums) and cucumbers, won’t have ever touched soil!</span><a data-dcnode-id="3560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anhinternational.org/campaign/food4health/%23Top_of_page"></a></p><span data-dcnode-id="3558" instrument_node="">
</span><h3 data-dcnode-id="3555"><strong data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">Guideline 6</span></strong></h3><span data-dcnode-id="3554" instrument_node="">
</span><p data-dcnode-id="3550"><strong data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Take high quality supplements to fill the nutritional gap</span></strong><span data-dcnode-id="3551" instrument_node="">&nbsp;between your foods and the levels and types of nutrients required for optimum health.&nbsp; The micronutrients that most people are low in include specific vitamins, minerals and plant nutrients, as well as Omega-3 fatty acids, as found in oily, cold water fish and high quality fish oil or plant-based oil supplements.</span></p><span data-dcnode-id="3549" instrument_node="">
</span><p data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">When taking vitamins and minerals, try to, as far as possible, rely on food-form vitamins and minerals as these are in the same form to the nutrients in natural foods to which are bodies are adapted.</span></p><span data-dcnode-id="3546" instrument_node="">
</span><p data-dcnode-id="3541"><span data-dcnode-id="3545" instrument_node="">High dosages of nutrients, best taken under the direction of a qualified nutritional or functional medicine therapist, can be very helpful to restore normal physiological functions and good health.&nbsp; High dose nutritional therapy is however&nbsp;</span><a data-dcnode-id="3543" data-udi="umb://document/b02e9bb7dbc648a5aac8db71c3f87552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/campaigns/anh-intl-campaigns/health-choice/" rel="noopener" target="_blank" title="Health Choice"><span data-dcnode-id="3544" instrument_node="">heavily under attack by regulators</span></a><span data-dcnode-id="3542" instrument_node="">, especially in Europe, but increasingly this is a worrying global trend.</span></p><span data-dcnode-id="3540" instrument_node="">
</span><p data-dcnode-id="3535"><span data-dcnode-id="3539" instrument_node="">Renowned medical doctor and nutritionist, Dr Emanuel Cheraskin, of Alabama University Medical School,&nbsp;</span><a data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.science.edu/CheraskinPaper/CheraskinPaper.pdf"><span data-dcnode-id="3538" instrument_node="">proposed Suggested Optimal Nutritional Allowances (SONAs)</span></a><span data-dcnode-id="3536" instrument_node="">&nbsp;in place of Recommended Daily Allowances (RDAs) as early as the 1980s.</span></p><span data-dcnode-id="3534" instrument_node="">
</span><p data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">SONAs for some common vitamins, minerals and cofactors are given below:</span></p><span data-dcnode-id="3531" instrument_node="">
</span><p data-dcnode-id="3526"><span data-dcnode-id="3530" instrument_node="">Along with his colleague, WM Ringsdorf, Cheraskin also found decades ago that nutritional requirements increase substantially as we age (e.g.&nbsp;Cheraskin and Ringsdorf,&nbsp;Risk Factors in the Aging Process,&nbsp;</span><em data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">The Journal of the Royal Society for the Promotion of Health,&nbsp;</span></em><span data-dcnode-id="3527" instrument_node="">1973; 93: 302-304).&nbsp; Is it any surprise that the over-50s are some of the most enthusiastic consumers of vitamins?</span></p><span data-dcnode-id="3525" instrument_node="">
</span><p data-dcnode-id="3516"><strong data-dcnode-id="3517"><span data-dcnode-id="3524" instrument_node="">For further information on the scientific case for supplementation,&nbsp;</span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anhinternational.org/wp-content/uploads/2009/12/061121-The-case-for-nutritional-supplementation.pdf"><span data-dcnode-id="3523" instrument_node="">download an article</span></a><span data-dcnode-id="3521" instrument_node="">&nbsp;by Dr Robert Verkerk entitled the&nbsp;</span><em data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">‘The case for nutritional supplementation’</span></em><span data-dcnode-id="3518" instrument_node="">.</span></strong></p><span data-dcnode-id="3515" instrument_node="">
</span><h2 data-dcnode-id="3513" id="user-heading-16"><span data-dcnode-id="3514" instrument_node="">Some Dietary Guidelines for Pregnancy and Lactation</span></h2><span data-dcnode-id="3512" instrument_node="">
</span><p data-dcnode-id="3507"><span data-dcnode-id="3511" instrument_node="">We produced these guidelines as part of ANH-Intl’s contribution to the ‘</span><em data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">You and your family: Your pregnancy guide</span></em><span data-dcnode-id="3508" instrument_node="">‘ Winter/Spring 2010 publication that was produced in association with the Royal College of Obstetricians and Gynaecologists.</span></p><span data-dcnode-id="3506" instrument_node="">
</span><p data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">Generally, the ‘Dietary Guidelines for Better Health’ also apply to pregnancy and lactation, but there are also some further key points and guidelines to keep in mind. The good news is that when pregnant, the body becomes more efficient at absorbing nutrients.&nbsp; Nevertheless, it is vitally important to prevent any nutrient deficiencies, and to eat a nutritionally rich, balanced and varied diet, as well as to ensure sufficient intake of clean, uncontaminated (and non-fluoridated) water.</span></p><span data-dcnode-id="3503" instrument_node="">
</span><h3 data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">Vitamins and minerals</span></h3><span data-dcnode-id="3500" instrument_node="">
</span><p data-dcnode-id="3492"><span data-dcnode-id="3499" instrument_node="">Vitamin and mineral supplements, particularly those comprised of food-derived vitamins and minerals, are beneficial to take during pregnancy and lactation.&nbsp; By and large the levels should not exceed upper or guidance levels set by the UK Expert Committee on Vitamins and Minerals, although there are exceptions to this given the use, in places, of&nbsp;</span><a data-dcnode-id="3497" data-udi="umb://document/2f27b1626dcc4f62a4e64a6a11717b02" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/campaigns/anh-intl-campaigns/good-science/" rel="noopener" target="_blank" title="Good Science"><span data-dcnode-id="3498" instrument_node="">flawed science</span></a><span data-dcnode-id="3496" instrument_node="">.&nbsp; Supplementing with a good, natural&nbsp;</span><a data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//journals.lww.com/co-obgyn/Abstract/2006/12000/Nutritional_supplements_in_pregnancy__commercial.12.aspx"><span data-dcnode-id="3495" instrument_node="">multivitamin and mineral</span></a><span data-dcnode-id="3493" instrument_node="">&nbsp;product is a sensible way to offset general micronutrient deficiencies that are surprisingly common in the modern Western diet.&nbsp; These deficiencies, if severe enough, can be responsible for a variety of problems with mother and baby. Examples are given below:</span></p><span data-dcnode-id="3491" instrument_node="">
</span><p data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">Nutritional preparations for pregnancy should begin at least several months before conception, if possible.</span></p><span data-dcnode-id="3488" instrument_node="">
</span><p data-dcnode-id="3485"><strong data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">The importance of folates / folic acid</span></strong></p><span data-dcnode-id="3484" instrument_node="">
</span><p data-dcnode-id="3473"><span data-dcnode-id="3483" instrument_node="">A deficiency of folate is well known to be associated with increased risk of neural tube defects (such as spina bifida) in the first month of pregnancy.&nbsp; Leafy green vegetables, oranges, asparagus, beans and peas are all natural sources of folate, and these are the&nbsp;</span><a data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anhinternational.org/news/researchers-confirm-natures-folates-best-for-baby"><span data-dcnode-id="3482" instrument_node="">ideal source</span></a><span data-dcnode-id="3480" instrument_node="">&nbsp;for a developing baby.&nbsp; However, most&nbsp;</span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.patient.co.uk/showdoc/27000504/"><span data-dcnode-id="3479" instrument_node="">GPs recommend</span></a><span data-dcnode-id="3477" instrument_node="">&nbsp;400 micrograms daily of folic acid for women of childbearing age, with higher levels for women at particular risk of giving birth to an infant with neural tube defects.&nbsp; Folic acid is however a synthetic supplement, but it has become an important means of ensuring that babies are not born with such defects. There are&nbsp;</span><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anhinternational.org/news/another-question-mark-over-mandatory-food-fortification-with-synthetic-folic-acid"><span data-dcnode-id="3476" instrument_node="">apparent dangers</span></a><span data-dcnode-id="3474" instrument_node="">&nbsp;with consuming too much synthetic folic acid, and it appears that the risks increase with age.</span></p><span data-dcnode-id="3472" instrument_node="">
</span><p data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">Leafy greens do not tend to be the most popular food group in the diet, so supplementation is often needed.&nbsp; It is best to try to consume 1-1.5 mg of folate in the forms in which it naturally occurs in green leaved vegetables (5-methyltetrahydrofolate (5-MTHF) or calcium-L-methylfolate and folinic acid), although such supplements are harder to find and may be only available through a clinical nutritionist or nutritional therapist.&nbsp; Failing this, taking a supplement which delivers 400 mcg daily of folic acid will do.&nbsp; Folates are important before, throughout pregnancy, and during lactation, as are all the B vitamins.</span></p><span data-dcnode-id="3469" instrument_node="">
</span><p data-dcnode-id="3466"><strong data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">Oily fish: Fish oils</span></strong></p><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3460"><span data-dcnode-id="3464" instrument_node="">Fish oils contain the important Omega 3 fatty acids, docosahexaenoic acid (DHA) and eicosapentaenoic acid (EPA), essential for a baby’s brain and motor development.&nbsp; Sufficient sources are therefore important not only in pregnancy, but also during lactation.&nbsp; However, it is&nbsp;</span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/conditions/pregnancy-and-baby/foods-to-avoid-pregnant/"><span data-dcnode-id="3463" instrument_node="">recommended</span></a><span data-dcnode-id="3461" instrument_node="">&nbsp;that pregnant women, and those women and girls who plan to become pregnant in the future, do not consume more than 2 portions (portion = 140g) of oily fish (e.g. salmon, mackerel, swordfish, trout) per week.&nbsp; This is because these varieties may contain low levels of pollutants such as dioxins and polychlorinated biphenyls (PCBs).&nbsp; These may build up in the body over time. Swordfish and tuna (including canned tuna) may also contain high levels of mercury, and these types of fish may therefore need to be limited to one portion per week.</span></p><span data-dcnode-id="3459" instrument_node="">
</span><p data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">It may be helpful to eat smaller species of fish, such as sardines, since these fish will tend to contain lower levels of pollutants.&nbsp; Decontaminated fish oil supplements are a popular alternative source, although higher than recommended daily amounts are likely to thin the blood and interfere with blood clotting.&nbsp; Cod liver oil is not suitable because of the high levels of vitamin A (retinol) that it contains.&nbsp; High levels of vitamin A have been found to increase the risk of developmental defects.&nbsp; Flaxseed oil is a vegetarian source of alpha-linoleic acid (ALA), from which the body can make its own DHA and EPA, although this metabolic process may be inefficient in some people. &nbsp;It’s always best to take omega 3 fish oils to ensure sufficient intake of EPA and DHA.</span></p><span data-dcnode-id="3456" instrument_node="">
</span><p data-dcnode-id="3453"><strong data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Avoiding sugar ‘lows’ and ‘highs’</span></strong></p><span data-dcnode-id="3452" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3451" instrument_node="">Keep blood sugar levels ‘in balance’ by choosing complex carbohydrates (e.g. unprocessed, whole vegetables and fruit, brown rice, brown flour, unrefined carbohydrates such as oats and whole grains), rather than refined (white) carbs, sugary foods and high fructose drinks.&nbsp; Combine carbohydrate intake with a little protein, and eat little and often, rather than leave long gaps between large meals. Benefits of balancing blood sugar may include: reduced risk of nausea and morning sickness, reduced risk of constipation and high blood pressure /&nbsp;</span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18636070%3Fordinalpos%3D1%26itool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_SingleItemSupl.Pubmed_Discovery_RA%26linkpos%3D1%26log%24%3Drelatedarticles%26logdbfrom%3Dpubmed"><span data-dcnode-id="3450" instrument_node="">pre eclampsia</span></a><span data-dcnode-id="3448" instrument_node="">,&nbsp;a more efficient immune system, and reduced risk of excessive weight gain.</span></p><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3443"><strong data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Vitamin D and calcium needs</span></strong></p><span data-dcnode-id="3442" instrument_node="">
</span><p data-dcnode-id="3437"><span data-dcnode-id="3441" instrument_node="">Calcium is required for the development of the baby’s bones and teeth, and is particularly important during the third trimester.&nbsp;&nbsp;</span><a data-dcnode-id="3439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18689394%3Fordinalpos%3D1%26itool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_SingleItemSupl.Pubmed_Discovery_RA%26linkpos%3D3%26log%24%3Drelatedreviews%26logdbfrom%3Dpubmed"><span data-dcnode-id="3440" instrument_node="">Recent research</span></a><span data-dcnode-id="3438" instrument_node="">&nbsp;indicates that, by and large, there is no additional dietary calcium requirement for pregnant women, since intestinal calcium absorption normally increases during pregnancy sufficiently to provide all the baby’s calcium needs.</span></p><span data-dcnode-id="3436" instrument_node="">
</span><p data-dcnode-id="3428"><span data-dcnode-id="3435" instrument_node="">Vitamin D assists with calcium absorption, but has many other very important beneficial effects for mother and baby, including, as shown in a </span><a data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4365419/"><span data-dcnode-id="3434" instrument_node="">US study</span></a><span data-dcnode-id="3432" instrument_node="">, the prevention of preterm labour/births and infections.&nbsp; However, this vitamin is often deficient as a result of inadequate exposure of the skin to sunlight. Existing RDAs for vitamin D (5 mcg/day = 200 IU) are woefully inadequate for those not regularly exposed to sunlight. Leading vitamin D researchers such as Dr Bruce Hollis and Dr Reihold Vieth advocate at least 100 mcg (4,000 IU) daily.&nbsp; The researchers of the above-mentioned&nbsp;</span><a data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.telegraph.co.uk/health/healthnews/7656620/Large-dose-of-vitamin-D-in-pregnancy-cuts-premature-births-research.html"><span data-dcnode-id="3431" instrument_node="">US study</span></a><span data-dcnode-id="3429" instrument_node="">, led by Carol L. Wagner MD, also recommend&nbsp;4,000 IU per day for all pregnant women.</span></p><span data-dcnode-id="3427" instrument_node="">
</span><p data-dcnode-id="3422"><span data-dcnode-id="3426" instrument_node="">A 2004&nbsp;</span><a data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ajcn.org/cgi/content/full/79/5/717"><span data-dcnode-id="3425" instrument_node="">review</span></a><span data-dcnode-id="3423" instrument_node="">&nbsp;by Hollis and Wagner (Division of Neonatology, Department of Pediatrics, Medical University of South Carolina, Charleston) on the vitamin D requirements during pregnancy and lactation put this into context.</span></p><span data-dcnode-id="3421" instrument_node="">
</span><p data-dcnode-id="3416"><span data-dcnode-id="3420" instrument_node="">During lactation, there is a normal loss of maternal bone mineral density, but this is restored after weaning, once again apparently&nbsp;</span><a data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/20051486%3Fitool%3DEntrezSystem2.PEntrez.Pubmed.Pubmed_ResultsPanel.Pubmed_RVDocSum%26ordinalpos%3D1"><span data-dcnode-id="3419" instrument_node="">independently</span></a><span data-dcnode-id="3417" instrument_node="">&nbsp;of calcium and vitamin D status.</span></p><span data-dcnode-id="3415" instrument_node="">
</span><p data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">For those who choose not to eat dairy, good sources of calcium include: nuts (especially almonds), green vegetables such as brocoli, curly kale, okra, watercress, spinach, died apricots and figs, oily fish, pulses, sesame seeds, and tofu.</span></p><span data-dcnode-id="3412" instrument_node="">
</span><p data-dcnode-id="3409"><strong data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Magnesium needs</span></strong></p><span data-dcnode-id="3408" instrument_node="">
</span><p data-dcnode-id="3400"><span data-dcnode-id="3407" instrument_node="">The mineral magnesium is involved in over 300 basic processes or functions within the body. It is vital in the formation of bone and of proteins, for cell replication, and in energy production.&nbsp; This means it is essential during&nbsp;</span><a data-dcnode-id="3405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mgwater.com/preg.shtml"><span data-dcnode-id="3406" instrument_node="">pregnancy</span></a><span data-dcnode-id="3404" instrument_node="">.&nbsp; It is crucial for&nbsp;</span><a data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19160238"><span data-dcnode-id="3403" instrument_node="">protecting the developing brain</span></a><span data-dcnode-id="3401" instrument_node="">, particularly for those at risk from preterm birth.</span></p><span data-dcnode-id="3399" instrument_node="">
</span><p data-dcnode-id="3391"><span data-dcnode-id="3398" instrument_node="">Magnesium is essential for the&nbsp;</span><a data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15692166"><span data-dcnode-id="3397" instrument_node="">relaxation of muscle</span></a><span data-dcnode-id="3395" instrument_node="">, which means that it also plays a crucial part in regulating blood pressure, blood flow, and heart function.&nbsp; Low magnesium levels are a recognised marker in the&nbsp;</span><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4590970/"><span data-dcnode-id="3394" instrument_node="">prevention of premature labour</span></a><span data-dcnode-id="3392" instrument_node="">, and it appears that this is due to the mineral’s relaxing effect on the womb, and its ability to inhibit early contractions.</span></p><span data-dcnode-id="3390" instrument_node="">
</span><p data-dcnode-id="3385"><span data-dcnode-id="3389" instrument_node="">Deficiency of this essential mineral is rampant. Results from year 1 (2008/2009) of the&nbsp;</span><a data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/national-diet-and-nutrition-survey-headline-results-from-years-1-and-2-combined-of-the-rolling-programme-2008-9-2009-10"><span data-dcnode-id="3388" instrument_node="">UK National Diet and Nutrition Survey (NDNS) Rolling Program</span></a><span data-dcnode-id="3386" instrument_node="">&nbsp;give the mean intake for women of childbearing age as 189mg (the RDA is 350mg).&nbsp; More worryingly, 46% of 11-18 year old females consume a diet which delivers magnesium below the Lower Reference Nutrient Intake (LRNI: the amount sufficient for only about 2.5% of that particular group). Foods rich in magnesium include: green leafy vegetables, nuts and seeds, whole grains, fish and meat, beans and artichokes.</span></p><span data-dcnode-id="3384" instrument_node="">
</span><p data-dcnode-id="3381"><strong data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Iron needs</span></strong></p><span data-dcnode-id="3380" instrument_node="">
</span><p data-dcnode-id="3375"><span data-dcnode-id="3379" instrument_node="">The need for iron tends to increase during the third trimester, when the foetus is building up its iron stores, and due to the increased maternal blood volume.&nbsp; It is at this time that maternal anaemia may develop, and a ferrous (iron) sulphate supplement is then likely to be recommended by a doctor.&nbsp; This form of iron is often associated with constipation, a condition which is better avoided during pregnancy. Ferrous bisglycinate is an effective and gentle alternative form of iron, which is just as&nbsp;</span><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17572803"><span data-dcnode-id="3378" instrument_node="">effective</span></a><span data-dcnode-id="3376" instrument_node="">&nbsp;at approximately one tenth of the dose recommended for ferrous sulphate, and generally tends to be free of side effects.&nbsp; Iron supplements, other than plant-derived liquid ones specifically intended for pregnancy, should not generally be used in pregnancy unless an iron deficiency is found to be developing or present.</span></p><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">It may, however, be a good idea to include good sources of iron in the diet during pregnancy and lactation, and to ensure that plenty of vitamin C is also available. Not only will vitamin C assist in the absorption of iron from the diet, but it will also protect the maternal circulatory system and ensure tissue integrity.&nbsp; Good sources of iron include: dark leafy greens, legumes, dried fruits, wholegrains, pulses, legumes, meat and fish.&nbsp; Good quality plant-sourced iron supplements can also be bought from most health stores.</span></p><span data-dcnode-id="3371" instrument_node="">
</span><p data-dcnode-id="3368"><strong data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Foods and other substances to avoid during pregnancy</span></strong></p><span data-dcnode-id="3367" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">It is important to avoid the following foods during pregnancy: soft and blue cheese (may contain listeria or other harmful microorganisms), green potatoes (contains toxic solanine), liver (contains excess vitamin A), shellfish, raw fish (may contain parasites), cured meats (contain nitrates and other preservatives),&nbsp;pate (may contain listeria or salmonella), unpasteurised milk (may contain a high load of bacteria), peanuts (contain lectins and aflatoxins, or may be associated with allergy in infants).</span></p><span data-dcnode-id="3364" instrument_node="">
</span><ul data-dcnode-id="3341"><span data-dcnode-id="3363" instrument_node="">
</span><li data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">Ready-to-eat, packaged salad may occasionally be contaminated with listeria</span></li><span data-dcnode-id="3360" instrument_node="">
</span><li data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">It is also important to store and cook eggs, meat and poultry properly (to avoid toxoplasmosis or salmonella poisoning)</span></li><span data-dcnode-id="3357" instrument_node="">
</span><li data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Alcohol may damage a baby’s development at any stage</span></li><span data-dcnode-id="3354" instrument_node="">
</span><li data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">Avoid all sources of cigarette and other smoke</span></li><span data-dcnode-id="3351" instrument_node="">
</span><li data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Avoid all recreational drugs, including caffeine</span></li><span data-dcnode-id="3348" instrument_node="">
</span><li data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">Avoid exposure to environmental or household chemicals, toxins and fumes</span></li><span data-dcnode-id="3345" instrument_node="">
</span><li data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Consume organic foods or those grown free from synthetic pesticides where possible.</span></li><span data-dcnode-id="3342" instrument_node="">
</span></ul><span data-dcnode-id="3340" instrument_node="">
</span><p data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Specific substances best avoided include: most synthetic chemicals, lead, anaesthetics (if possible), laxatives, X-rays, cleaning products, paint, lacquers, petrol, aerosols, glue, pesticides, hair dyes, plastics, aluminium foil, saccharin, aspartame (Splenda®), food additives and preservatives, as well as, unless advised specifically by your health professional, over the counter medications. Statin drugs, for example, have been shown to be teratogenic i.e. they have been found to harm the developing foetus.</span></p><span data-dcnode-id="3337" instrument_node="">
</span><p data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">It is important to avoid herbs and herbal products during pregnancy unless recommended by a qualified herbalist, or other experienced health practitioner. Some herbal products (advised for use by a qualified herbal practitioner) can be used very successfully and safely to treat mastitis while the baby continues breast feeding, so avoiding the use of antibiotics and the discontinuation of breastfeeding.</span></p><span data-dcnode-id="3334" instrument_node="">
</span><p data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">Lemon or ginger tea may be helpful to alleviate nausea.</span></p><span data-dcnode-id="3331" instrument_node="">
</span><p data-dcnode-id="3328"><strong data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Some lifestyle guidelines for pregnancy</span></strong></p><span data-dcnode-id="3327" instrument_node="">
</span><p data-dcnode-id="3323"><span data-dcnode-id="3326" instrument_node="">Gentle exercise (maximum of 140 heartbeats per minute) such as walking, cycling or swimming in chlorine-free environments (e.g. salt water pools, ozone-treated pools, ocean etc) is a great idea unless any of the following apply:-</span><br data-dcnode-id="3325"><span data-dcnode-id="3324" instrument_node="">There is any sign of bleeding associated with the pregnancy, pregnancy-induced high blood pressure or pregnancy-induced asthma is present, there is a history of previous miscarriage or a history of pre-term labour.</span></p><span data-dcnode-id="3322" instrument_node="">
</span><p data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">Yoga may also be very beneficial, but there are certain positions which are not recommended during pregnancy (seek advice from a qualified instructor or reliable source).</span></p><span data-dcnode-id="3319" instrument_node="">
</span><p data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">It is important to set aside regular times for relaxation, and to ensure adequate sleep.</span></p><span data-dcnode-id="3316" instrument_node="">
</span><p data-dcnode-id="3313"><strong data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">Additional points about lactation</span></strong></p><span data-dcnode-id="3312" instrument_node="">
</span><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">During lactation, there is an increased need by the mother, of calories, protein, vitamins and minerals.&nbsp; It is important during this time, to eat a full, varied and healthy diet, and to avoid rapid weight loss.</span></p><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3305"><span data-dcnode-id="3308" instrument_node="">If bottle-feeding, do not use fluoridated water to make up the feed.&nbsp; Be wary of using bottles that may be contaminated with&nbsp;</span><a data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anhinternational.org/2008/11/02/fda-forced-to-do-u-turn-on-plasticiser-bpa/"><span data-dcnode-id="3307" instrument_node="">Bisphenol A</span></a></p><span data-dcnode-id="3304" instrument_node="">
</span><h2 data-dcnode-id="3301" id="user-heading-17"><a data-dcnode-id="3303" id="articles"></a><span data-dcnode-id="3302" instrument_node="">Related articles</span></h2><span data-dcnode-id="3300" instrument_node="">
