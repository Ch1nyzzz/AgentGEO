</span><h1 data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Give Your Dog the Very Best With a Foolproof System for Making Customized, Nutritionally Balanced, Fresh Homemade Pet Food</span></h1><span data-dcnode-id="2115" instrument_node="">
</span><h2 data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Veterinarians often frown upon homemade diets because, much of the time, they’re not nutritionally balanced. Getting them right can be tricky and time-consuming. Now, there’s a simple, foolproof way to create nutritionally balanced, fresh homemade meals, designed exclusively for your dog’s needs.</span></h2><span data-dcnode-id="2112" instrument_node="">

</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Do you remember the famous story from Aesop’s fables about the dog and his bone?</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">The happy hound was merrily carrying his bone home from the butcher when he came to a bridge. In the middle of the bridge, he stopped and looked into the water. He saw his own reflection, but thought it was another dog…with a bigger bone.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Craving the bigger bone, he opened his mouth to seize it. But in the same motion, his own bone slipped into the river, and he lost both the bone he had and the one he hoped to get.</span></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">While the traditional moral of the story is to be content with what you have, there’s another moral here for pet parents who want to transition their dog from commercial processed food to fresh homemade food.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">In reaching for that “bigger bone” of a healthier diet for your furry friend, there’s a risk of getting the nutritional balance wrong, causing you to lose the few benefits your dog got from the processed food and creating new problems.</span></p><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2052" instrument_node="">Since you’re thinking about switching to a fresh, homemade diet, you already know that feeding your dog means more than just filling her belly. You want the best foods to help your pet </span><em data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">thrive and not just survive</span></em><span data-dcnode-id="2049" instrument_node="">.</span></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">But when you decide to make the switch to feeding fresh food, putting it together in a nutritionally balanced meal that your pet will eat can be overwhelming.</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">You don’t want to lose the convenience and basic nutritional balance of the old kibble – the “bone” you currently have – and at the same time not get the healthier, more nutritious diet you’re reaching for – the “bigger bone.”</span></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Fortunately for pet parents, the “bigger bone” of a fresh, homemade diet is not just a reflection in the river. It’s real, and you can have it.</span></p><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">With an entire system to take the guesswork out of preparing nutritionally balanced fresh meals, your dog can enjoy the benefits and taste of fresh food while you rest easy knowing she is getting all the nutrients she needs.</span></p><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">First, let’s take a closer look at how you’re currently feeding your dog...</span></p><span data-dcnode-id="2032" instrument_node="">
</span><figure class="extended center" data-dcnode-id="2027"><span data-dcnode-id="2031" instrument_node="">
</span><div data-dcnode-id="2029"><img alt="Dog with bone" class="rs-wide" data-dcnode-id="2030" data-src="//media.mercolamarket.com/assets/images/meal-mix/dog-with-bone.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/healthypets/meal-mix&amp;raw"></div><span data-dcnode-id="2028" instrument_node="">

</span><h3 data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Today’s Pet Food Diets – Rated From Best to Worst</span></h3><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Recently, I rated all of the different types of pet food diets available today in big box stores, grocery stores and small, independent pet food stores. Here’s my list, from best to worst, starting with my absolute favorite type of pet food:</span></p><span data-dcnode-id="2020" instrument_node="">
</span><ol class="numstyle" data-dcnode-id="1955"><span data-dcnode-id="2019" instrument_node="">
</span><li data-dcnode-id="2016"><strong data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Balanced raw, fresh homemade diet</span></strong></li><span data-dcnode-id="2015" instrument_node="">
</span><li data-dcnode-id="2011"><strong data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Commercially available raw diet</span></strong><span data-dcnode-id="2012" instrument_node=""> (found in the freezer section of your small, specialty pet store)</span></li><span data-dcnode-id="2010" instrument_node="">
</span><li data-dcnode-id="2007"><strong data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Balanced cooked, homemade diet</span></strong></li><span data-dcnode-id="2006" instrument_node="">
</span><li data-dcnode-id="2003"><strong data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Dehydrated or freeze-dried food</span></strong></li><span data-dcnode-id="2002" instrument_node="">
</span><li data-dcnode-id="1998"><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Human-grade canned food</span></strong><span data-dcnode-id="1999" instrument_node=""> (The label must say the ingredients are human grade, or they are not.)</span></li><span data-dcnode-id="1997" instrument_node="">
</span><li data-dcnode-id="1993"><strong data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Human-grade dry food</span></strong><span data-dcnode-id="1994" instrument_node=""> (It must state human grade to ensure it doesn’t contain low-quality rendered by-products.)</span></li><span data-dcnode-id="1992" instrument_node="">
</span><li data-dcnode-id="1988"><strong data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Super premium canned food</span></strong><span data-dcnode-id="1989" instrument_node=""> (found at big box pet supply stores)</span></li><span data-dcnode-id="1987" instrument_node="">
</span><li data-dcnode-id="1983"><strong data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Super premium dry food</span></strong><span data-dcnode-id="1984" instrument_node=""> (found at big box pet supply stores)</span></li><span data-dcnode-id="1982" instrument_node="">
</span><li data-dcnode-id="1978"><strong data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Veterinarian-recommended canned food</span></strong><span data-dcnode-id="1979" instrument_node=""> (purchased at your vet’s office or clinic)</span></li><span data-dcnode-id="1977" instrument_node="">
</span><li data-dcnode-id="1973"><strong data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Veterinarian-recommended dry food</span></strong><span data-dcnode-id="1974" instrument_node=""> (purchased at your vet’s office or clinic)</span></li><span data-dcnode-id="1972" instrument_node="">
</span><li data-dcnode-id="1969"><strong data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Grocery store-brand canned food</span></strong></li><span data-dcnode-id="1968" instrument_node="">
</span><li data-dcnode-id="1965"><strong data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Grocery store-brand dry food</span></strong></li><span data-dcnode-id="1964" instrument_node="">
</span><li data-dcnode-id="1961"><strong data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Semi-moist pouched food</span></strong></li><span data-dcnode-id="1960" instrument_node="">
</span><li data-dcnode-id="1957"><strong data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">An unbalanced homemade diet – raw or cooked</span></strong></li><span data-dcnode-id="1956" instrument_node="">
</span></ol><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">While many of these types of foods may be super convenient, they don’t necessarily provide the biologically appropriate, food-based nutrients necessary to maintain vibrant health in your dog.</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">As you make decisions about how to feed your canine companion, it’s important to educate yourself about all of the options.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><h3 data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">What Pet Food Makers Don’t Want You to Know About the Food You’re Feeding Your Pet</span></h3><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Most pet owners have little idea of what they are actually feeding their pets when they buy processed pet food.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1941" instrument_node="">Whether it’s dried kibble, canned food, dehydrated or frozen food, the trendy, artfully designed packaging provides few </span><em data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">accurate</span></em><span data-dcnode-id="1938" instrument_node=""> clues.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1935" instrument_node="">Here’s the truth about </span><em data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">most pet foods on the market today:</span></em></p><span data-dcnode-id="1931" instrument_node="">
</span><p data-dcnode-id="1928"><strong data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Less than one percent is human-grade, GMO-free and organic with free-range or ethically sourced meats.</span></strong></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Pet parents are also unlikely to know these other closely held secrets about processed pet food…</span></p><span data-dcnode-id="1924" instrument_node="">
</span><ul class="bullet" data-dcnode-id="1872"><span data-dcnode-id="1923" instrument_node="">
</span><li data-dcnode-id="1919"><strong data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Leftover and recycled food waste</span></strong><span data-dcnode-id="1920" instrument_node=""> from the human food industry is used to make most pet foods.</span></li><span data-dcnode-id="1918" instrument_node="">
</span><li data-dcnode-id="1914"><strong data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Pet food is heated, on average, four times</span></strong><span data-dcnode-id="1915" instrument_node=""> during processing, significantly depleting its nutritional content.</span></li><span data-dcnode-id="1913" instrument_node="">
</span><li data-dcnode-id="1909"><strong data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Carcinogenic byproducts</span></strong><span data-dcnode-id="1910" instrument_node="">, such as heterocyclic amines, acrylamides and AGEs (advanced glycation end products) can result from the high-heat processing typically used to make commercial pet food.</span></li><span data-dcnode-id="1908" instrument_node="">
</span><li data-dcnode-id="1904"><strong data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Cheaper, feed-grade forms of nutrients</span></strong><span data-dcnode-id="1905" instrument_node=""> common in the animal feed industry – such as sulfates and oxides – are added to bring the food up to standard.</span></li><span data-dcnode-id="1903" instrument_node="">
</span><li data-dcnode-id="1899"><strong data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Nutrients degrade quickly</span></strong><span data-dcnode-id="1900" instrument_node="">, especially enzymes and B vitamins, even in the freezer.</span></li><span data-dcnode-id="1898" instrument_node="">
</span><li data-dcnode-id="1894"><strong data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">At only 12% moisture</span></strong><span data-dcnode-id="1895" instrument_node="">, dry food falls short of the 70% moisture in fresh food, which is needed to prevent organ stress and dysfunction.</span></li><span data-dcnode-id="1893" instrument_node="">
</span><li data-dcnode-id="1889"><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Heavy metals, glyphosate, phthalates, flame retardants, BPA and pentobarbital (pet euthanasia solution)</span></strong><span data-dcnode-id="1890" instrument_node=""> have all been found recently in a variety of commercial pet foods, triggering frequent recalls.</span></li><span data-dcnode-id="1888" instrument_node="">
</span><li data-dcnode-id="1884"><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Additives</span></strong><span data-dcnode-id="1885" instrument_node=""> such as chemical preservatives, artificial colors, dyes, rendered fats and fillers are typically used in processed foods.</span></li><span data-dcnode-id="1883" instrument_node="">
</span><li data-dcnode-id="1879"><strong data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Palatability enhancers</span></strong><span data-dcnode-id="1880" instrument_node=""> are often added to trick pets into eating food that isn’t biologically correct for them.</span></li><span data-dcnode-id="1878" instrument_node="">
</span><li data-dcnode-id="1874"><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Sitting on store shelves for months to years</span></strong><span data-dcnode-id="1875" instrument_node=""> before you buy it, any remaining nutrients in commercial pet food are often seriously degraded by the time you buy it.</span></li><span data-dcnode-id="1873" instrument_node="">
</span></ul><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">It’s no wonder these dark truths about highly processed pet food aren’t widely advertised. These facts don’t inspire confidence, and pet parents want better for their furry family member.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><figure class="extended center" data-dcnode-id="1863"><span data-dcnode-id="1867" instrument_node="">
</span><div data-dcnode-id="1865"><img alt="Dog with empty bowl" class="rs-wide" data-dcnode-id="1866" data-src="//media.mercolamarket.com/assets/images/meal-mix/dog-with-empty-bowl.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/healthypets/meal-mix&amp;raw"></div><span data-dcnode-id="1864" instrument_node="">
</span></figure><span data-dcnode-id="1862" instrument_node="">
</span><h3 data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">What’s on Your Plate Isn’t Necessarily What’s Best for Your Dog</span></h3><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1858" instrument_node="">Many owners are shocked to find any type of homemade diet at the bottom of my list. How could a homemade diet be the </span><em data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">worst food you can feed your pet?</span></em></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1853" instrument_node="">After all, it’s fresh, it gives your dog variety and you’re controlling everything that goes into it. How can it possibly be </span><em data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">worse than grocery store kibble?</span></em></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">A lot of pet owners love sharing their meals with their dog. They believe they’re giving their pet better nutrition than what comes in a bag, box or can.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">I certainly see this in my practice – an increasing number of well-meaning but misguided pet owners think they're doing the right thing by serving their pet, say, a chicken breast and a few vegetables and calling it a day.</span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Clearly, “homemade” means different things to different people.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">Sometimes, pet parents take “homemade” to mean a little bit of everything </span><em data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">they</span></em><span data-dcnode-id="1836" instrument_node=""> eat. Or many of my raw feeding clients assume feeding a rotation of several different meats, bones and organs will provide “balance over time.”</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Unfortunately, research shows this rarely ever happens.</span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1825"><strong data-dcnode-id="1826"><span data-dcnode-id="1830" instrument_node="">Nutritionally </span><em data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">unbalanced</span></em><span data-dcnode-id="1827" instrument_node=""> food, even homemade, can lead to serious health problems for any pet.</span></strong></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">As a practicing veterinarian, I see dogs with endocrine and skeletal issues, and even organ degeneration, because they’re not receiving a diet properly balanced with the essentials, like trace minerals, omega fatty acids and calcium.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Because of these increasingly common scenarios – along with misinformation from commercial pet food makers – fresh homemade diets, especially raw diets, have been “black-listed” by many veterinarians.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">I recognized this dilemma early on. With my passion for biologically appropriate fresh food for pets, I set out to find an easy and convenient way to help owners prepare affordable and nutritionally balanced homemade meals for their adult dogs.</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">I’m excited to tell you about it. Here’s a little more background about what makes it so beneficial...</span></p><span data-dcnode-id="1812" instrument_node="">
</span><h3 data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">An Important Reason to Take Control of What Goes Into Your Pet’s Food</span></h3><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1808" instrument_node="">Over the last century, the pet food industry has convinced owners to feed pets highly processed diets that sustain life. However, these foods don’t necessarily </span><em data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">nourish </span></em><span data-dcnode-id="1805" instrument_node="">pets as nature intended.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1802" instrument_node="">Processed pet food is a relatively recent development in the long evolutionary history of canines. Dogs evolved to eat fresh food, even after branching off from </span><em data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Canis lupus</span></em><span data-dcnode-id="1799" instrument_node=""> (gray wolf) thousands of years ago.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">In fact, the first bag of commercial dog food came on the scene less than 100 years ago, and while dogs are amazingly resilient, I believe what we’re feeding them today is nothing less than nutritional abuse.</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Because dogs are so adaptable, they have the ability to consume species-inappropriate foods but not without consequences…</span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">One other significant factor that many people don’t consider is the quality of today’s soils. Food can only be as healthy as the soil in which it is grown. Nutritionally depleted soil yields nutritionally depleted food.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">And our soils today are appallingly depleted.</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1784" instrument_node="">Organically grown food is certainly better than conventional but only in terms of fewer chemicals entering your pet’s body. Using organically grown food for your pet’s meals is </span><em data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">not</span></em><span data-dcnode-id="1781" instrument_node=""> a guarantee that it has all the nutrients she needs.</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1778" instrument_node="">When you make your own food with wholesome ingredients – and appropriate supplemental vitamins and minerals – you’re in control. You know what your dog </span><em data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">is</span></em><span data-dcnode-id="1775" instrument_node=""> getting, and what he </span><em data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">is not</span></em><span data-dcnode-id="1772" instrument_node="">.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><figure class="extended center" data-dcnode-id="1765"><span data-dcnode-id="1769" instrument_node="">
</span><div data-dcnode-id="1767"><img alt="Raw Chicken meat" class="rs-wide" data-dcnode-id="1768" data-src="//media.mercolamarket.com/assets/images/meal-mix/raw-chicken-meat.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/healthypets/meal-mix&amp;raw"></div><span data-dcnode-id="1766" instrument_node="">

</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Yet, when recommending a raw, fresh homemade diet that is species-appropriate, I can’t stress this enough...</span></p><span data-dcnode-id="1726" instrument_node="">

</span><div class="faq" data-dcnode-id="572"><h5 data-dcnode-id="876"><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Frequently Asked Questions</span></strong></h5><span data-dcnode-id="875" instrument_node="">
</span><ol class="accordion" data-accordion="" data-dcnode-id="573"><span data-dcnode-id="874" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="860"><a class="button radius" data-dcnode-id="871" href="#panel1a"><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">1. Do I need to use the Recipe Creator every time I prepare a meal with Meal Mix?</span></strong></a><span data-dcnode-id="870" instrument_node="">
</span><div class="content" data-dcnode-id="862" id="panel1a"><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">Yes. The recipes you receive from the </span><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Recipe Creator</span></strong><span data-dcnode-id="865" instrument_node=""> are designed specifically for your dog and meet his unique needs based on weight and activity level. It’s the only way you can know for sure that you’re preparing a nutritionally balanced meal for your dog.</span></p><span data-dcnode-id="863" instrument_node="">
</span></div><span data-dcnode-id="861" instrument_node="">
</span></li><span data-dcnode-id="859" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="845"><a class="button radius" data-dcnode-id="856" href="#panel2a"><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">2. Why do the recipes call for supplemental krill or fish oil?</span></strong></a><span data-dcnode-id="855" instrument_node="">
</span><div class="content" data-dcnode-id="847" id="panel2a"><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">Krill or fish oil is needed to meet EPA and DHA requirements. Because it’s impossible to keep the delicate essential fatty acids stable in a powdered mix, we don’t include it in the </span><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Meal Mix </span></strong><span data-dcnode-id="850" instrument_node="">supplement. To remain viable, these critical fats should be added right before the meal is served. You can choose any marine-sourced oil, such as sardine, anchovy, krill or salmon oil, and rotating oils is a great choice as well. Flax oil and other vegetable sources of omega-3 fatty acids do not provide adequate amounts of DHA or EPA.</span></p><span data-dcnode-id="848" instrument_node="">
</span></div><span data-dcnode-id="846" instrument_node="">
</span></li><span data-dcnode-id="844" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="833"><a class="button radius" data-dcnode-id="841" href="#panel3a"><strong data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">3. Why are you suggesting adding in a vegetable oil like hempseed if I only feed my dog red meat meals?</span></strong></a><span data-dcnode-id="840" instrument_node="">
</span><div class="content" data-dcnode-id="835" id="panel3a"><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">To add the missing omega-6 essential fatty acids missing from red meats. Poultry is a rich source of omega-6 fatty acids, so if you are rotating between red meats and poultry, this addition isn’t necessary. If you don’t want to feed (or can’t feed) poultry, then adding in a source of omega-6 fatty acids is necessary. Our recommended type of omega-6 oil is hempseed oil, but you can use other sources such as walnut, sunflower or safflower oil if you wish.</span></p><span data-dcnode-id="836" instrument_node="">
</span></div><span data-dcnode-id="834" instrument_node="">
</span></li><span data-dcnode-id="832" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="821"><a class="button radius" data-dcnode-id="829" href="#panel4a"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">4. Why do I have to use lean meats?</span></strong></a><span data-dcnode-id="828" instrument_node="">
</span><div class="content" data-dcnode-id="823" id="panel4a"><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Usually the cheaper the meat, the higher the fat content. Fat is a great energy source for dogs, but it displaces other key nutrients needed for health maintenance and disease recovery. Essential minerals are in the protein, not the fat. Using fattier meats than what’s recommended means there won’t be enough amino acids and essential minerals in the diet, which is dangerous and unhealthy over time.</span></p><span data-dcnode-id="824" instrument_node="">
</span></div><span data-dcnode-id="822" instrument_node="">
</span></li><span data-dcnode-id="820" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="809"><a class="button radius" data-dcnode-id="817" href="#panel5a"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">5. Why can’t I use this with my growing puppy?</span></strong></a><span data-dcnode-id="816" instrument_node="">
</span><div class="content" data-dcnode-id="811" id="panel5a"><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Puppies have different nutritional requirements at different ages of growth. This formula does not account for these different needs. It has been created to meet adult dog’s nutritional requirements only.</span></p><span data-dcnode-id="812" instrument_node="">
</span></div><span data-dcnode-id="810" instrument_node="">
</span></li><span data-dcnode-id="808" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="794"><a class="button radius" data-dcnode-id="805" href="#panel6a"><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">6. I can only afford to feed one fresh meal a day, now what?</span></strong></a><span data-dcnode-id="804" instrument_node="">
</span><div class="content" data-dcnode-id="796" id="panel6a"><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">No problem. Feed as many fresh meals as you can afford. If you feed your dog 14 meals a week and you can afford to make half of those fresh, that’s a 50% improvement in your dog’s overall nutritional intake, which will provide valuable health benefits over time.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">If your budget allows you to feed just two homemade meals a week, you might want to consider dividing the meals into snack-size portions and feeding a little bit every day as training treats or on top of your pet’s processed food, which you then reduce in portion size to account for the fresh food being added.</span></p><span data-dcnode-id="797" instrument_node="">
</span></div><span data-dcnode-id="795" instrument_node="">
</span></li><span data-dcnode-id="793" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="776"><a class="button radius" data-dcnode-id="790" href="#panel7a"><strong data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">7. Are there risks to feeding a raw food diet?</span></strong></a><span data-dcnode-id="789" instrument_node="">
</span><div class="content" data-dcnode-id="778" id="panel7a"><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">A quick search of the FDA recall website reveals there are potential risks to feeding all types of dog foods, including raw food. We recommend discussing your pet’s nutrition with a vet who understands fresh food to find out what type of food, amount and feeding frequency is best for your dog.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Most vets discourage raw meat diets if the patient has undergone GI surgery within the last month or has a white blood cell count that is below normal (indicating immunosuppression). Additionally, some oncologists recommend a cooked food diet for dogs undergoing chemotherapy, and then allow a return to raw food after treatment, provided they were eating it before.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">If you and your vet decide a cooked meal is best for your dog, you can still use Meal Mix. It will supply the necessary nutrients to make the food complete and balanced. A lightly cooked balanced fresh food diet is still superior to any store-bought foods.</span></p><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="777" instrument_node="">
</span></li><span data-dcnode-id="775" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="764"><a class="button radius" data-dcnode-id="772" href="#panel8a"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">8. Can I give cooked vegetables, and are there any I should avoid?</span></strong></a><span data-dcnode-id="771" instrument_node="">
</span><div class="content" data-dcnode-id="766" id="panel8a"><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Yes, this is a popular feeding approach. Some nutrient levels actually increase after gentle steaming (such as lycopene levels in tomatoes). Please avoid using onions as they are toxic to dogs. If you add potatoes, make sure you remove any sprouted “eyes” as they are also toxic to dogs.</span></p><span data-dcnode-id="767" instrument_node="">
</span></div><span data-dcnode-id="765" instrument_node="">
</span></li><span data-dcnode-id="763" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="752"><a class="button radius" data-dcnode-id="760" href="#panel9a"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">9. Can I add fruit, and what fruits should I avoid?</span></strong></a><span data-dcnode-id="759" instrument_node="">
</span><div class="content" data-dcnode-id="754" id="panel9a"><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Fruit can be included. We recommend berries (blueberries, raspberries, blackberries) because they’re loaded with beneficial antioxidants for dogs. Pits must be removed from fruits before feeding. Avoid starfruit and rhubarb.</span></p><span data-dcnode-id="755" instrument_node="">
</span></div><span data-dcnode-id="753" instrument_node="">
</span></li><span data-dcnode-id="751" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="716"><a class="button radius" data-dcnode-id="748" href="#panel10a"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">10. I’ve heard certain dogs must avoid several other foods besides onions? Is this true?</span></strong></a><span data-dcnode-id="747" instrument_node="">
</span><div class="content" data-dcnode-id="718" id="panel10a"><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">If you have a healthy dog, then follow your grandma’s advice and feed a little bit of all of them, except onions. Here’s what we know about some vegetables and other produce:</span></p><span data-dcnode-id="743" instrument_node="">
</span><ul class="bullet" data-dcnode-id="720"><span data-dcnode-id="742" instrument_node="">
</span><li class="btm-line" data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Soy and yams have phytoestrogens. Soy is most always genetically engineered and contains anti-nutrients which may be harmful for your dog.</span></li><span data-dcnode-id="739" instrument_node="">
</span><li class="btm-line" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Cruciferous veggies – such as broccoli and cauliflower –can be goitrogenic, which means they can negatively affect your dog’s thyroid health if fed exclusively.</span></li><span data-dcnode-id="736" instrument_node="">
</span><li class="btm-line" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Vegetables have different oxalate concentrations, so some dogs predisposed to certain bladder stones do best avoiding high oxalate veggies, such as spinach and beets.</span></li><span data-dcnode-id="733" instrument_node="">
</span><li class="btm-line" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">The lectins in legumes can lead to gastric upset and leaky gut.</span></li><span data-dcnode-id="730" instrument_node="">
</span><li class="btm-line" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Non-organic wheat, bulgur, spelt, barley, rye and oats contain at least some gluten (you can avoid traces of gluten by buying gluten free oats). When these grains are non-organic they often contain glyphosate, a likely carcinogenic herbicide.</span></li><span data-dcnode-id="727" instrument_node="">
</span><li class="btm-line" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Some vegetables are sky high on the glycemic index, such as corn and potatoes, while some are very low. Better choices for your dog’s metabolic health include asparagus, dark green leafy vegetables, green beans and zucchini.</span></li><span data-dcnode-id="724" instrument_node="">
</span><li class="btm-line" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">All mushrooms that are safe for people are safe and even medicinal for pets. Mushrooms that are toxic to people are also toxic to dogs.</span></li><span data-dcnode-id="721" instrument_node="">
</span></ul><span data-dcnode-id="719" instrument_node="">
</span></div><span data-dcnode-id="717" instrument_node="">
</span></li><span data-dcnode-id="715" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="701"><a class="button radius" data-dcnode-id="712" href="#panel11a"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">11. What if I only want to feed meat (no added fresh veggies or a starch)?</span></strong></a><span data-dcnode-id="711" instrument_node="">
</span><div class="content" data-dcnode-id="703" id="panel11a"><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">The meal is still balanced, but your dog will not get any fiber or roughage, food-based phytonutrients or enzymes present in fresh produce. Research shows dogs consuming a meat-only diet have a less diverse microbiome than dogs fed vegetable matter.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Nature intended dogs to eat small amounts of vegetables. Dogs’ wild ancestors naturally consumed the vegetables in the stomachs of their prey. This is why small amounts of vegetables are recommended.</span></p><span data-dcnode-id="704" instrument_node="">
</span></div><span data-dcnode-id="702" instrument_node="">
</span></li><span data-dcnode-id="700" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="689"><a class="button radius" data-dcnode-id="697" href="#panel12a"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">12. If grains are unnecessary for dogs, why would I add them to my dog’s food?</span></strong></a><span data-dcnode-id="696" instrument_node="">
</span><div class="content" data-dcnode-id="691" id="panel12a"><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Grains are typically added to reduce cost. Many people are able to afford fresh meals by offsetting some of the more expensive meats with other foods, such as grains, legumes or potatoes. A fresh diet that includes these foods is more nourishing than a processed diet. Some animals have medical issues that require them to consume a lower protein diet or higher fiber diet. As always, choose organic whenever possible to minimize traces of the damaging herbicide glyphosate.</span></p><span data-dcnode-id="692" instrument_node="">
</span></div><span data-dcnode-id="690" instrument_node="">
</span></li><span data-dcnode-id="688" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="677"><a class="button radius" data-dcnode-id="685" href="#panel13a"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">13. How much should I feed my dog?</span></strong></a><span data-dcnode-id="684" instrument_node="">
</span><div class="content" data-dcnode-id="679" id="panel13a"><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">See the Suggested Feeding Directions located at the bottom of each recipe page found in the Recipe Creator. Note that depending on your pet’s weight and activity level, the recipe may yield less than the suggested feeding for your dog. In this case, double or triple the recipe amount for a higher yield, and refrigerate the excess portion for the next meal.</span></p><span data-dcnode-id="680" instrument_node="">
</span></div><span data-dcnode-id="678" instrument_node="">
</span></li><span data-dcnode-id="676" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="650"><a class="button radius" data-dcnode-id="673" href="#panel14a"><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">14. How do I transition my dog onto fresh food?</span></strong></a><span data-dcnode-id="672" instrument_node="">
</span><div class="content" data-dcnode-id="652" id="panel14a"><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">There are many ways to transition your dog, but no one way works for every dog. To know if you’re transitioning your dog too fast or too slow, watch your dogs’ stools. Here are my general guidelines:</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The first step is to make a batch of food. You can calculate how much your dog needs to eat on a daily basis and divide the food into daily portions. Keep a few days in the refrigerator, and freeze the rest. We recommend making only the amount of food your pet will eat within two weeks.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">If you have a finicky dog or a dog with a sensitive stomach, the “slow trick” is recommended: Remove 5% of your dog’s old food and replace it with the same amount (5%) of new food. Watch your pet’s stools. They may become soft for a day, but they should firm back up.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">If stools are normal, replace 10% old food with 10% new food, and watch stools. Continue replacing old food with new food until your dog is transitioned completely onto their new food. If stools soften, simply continue feeding the same ratio of new and old food until the bowels balance themselves, then proceed with the transition schedule.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Another option is to divide up one freshly prepared meal and give the food as treats throughout the day, then feed him his regular food for the evening meal, or, vice versa, feed their old food for breakfast, then use their new food as treats for the remaining part of the day. Continue this for several days until stools are normal, and then discontinue old food entirely.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Some super finicky and sensitive dogs may prefer the food cooked, initially, as cooking releases an amazing aroma that dogs find irresistible. If you wean your dog onto cooked meals and then would like to wean them onto raw food, gradually cook the food less and less.</span></p><span data-dcnode-id="653" instrument_node="">
</span></div><span data-dcnode-id="651" instrument_node="">
</span></li><span data-dcnode-id="649" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="638"><a class="button radius" data-dcnode-id="646" href="#panel15a"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">15. Do I need to stop other supplements?</span></strong></a><span data-dcnode-id="645" instrument_node="">
</span><div class="content" data-dcnode-id="640" id="panel15a"><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">If you’re now adding certain nutrients (such as calcium or vitamin D) to your dog’s homemade meals as a means of balancing the diet, then yes, you should discontinue these supplements. Meal Mix provides all the required nutrients conveniently in one packet. Continue using probiotics, enzymes, joint or eye supplement, ubiquinol, astaxanthin or medications from your vet.</span></p><span data-dcnode-id="641" instrument_node="">
</span></div><span data-dcnode-id="639" instrument_node="">
</span></li><span data-dcnode-id="637" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="626"><a class="button radius" data-dcnode-id="634" href="#panel16a"><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">16. Can I increase or decrease the amount of ingredients listed?</span></strong></a><span data-dcnode-id="633" instrument_node="">
</span><div class="content" data-dcnode-id="628" id="panel16a"><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Do not increase or decrease single ingredients in the recipes. This can create nutritional imbalance. If you desire a higher recipe yield, double or triple the entire recipe. This will increase the amount of food while maintaining the carefully calculated nutritional balance.</span></p><span data-dcnode-id="629" instrument_node="">
</span></div><span data-dcnode-id="627" instrument_node="">
</span></li><span data-dcnode-id="625" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="611"><a class="button radius" data-dcnode-id="622" href="#panel17a"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">17. I am specifying which ingredients I want, but receive too few recipes. How can I access more recipes on the Recipe Creator?</span></strong></a><span data-dcnode-id="621" instrument_node="">
</span><div class="content" data-dcnode-id="613" id="panel17a"><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="619" instrument_node="">If too few recipes are displaying after filtering the ingredients, choose your desired meat and skip to </span><em data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Create Recipe</span></em><span data-dcnode-id="616" instrument_node="">. All the recipes containing that specific meat will display on the page.</span></p><span data-dcnode-id="614" instrument_node="">
</span></div><span data-dcnode-id="612" instrument_node="">
</span></li><span data-dcnode-id="610" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="599"><a class="button radius" data-dcnode-id="607" href="#panel18a"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">18. Can I use vegetables in season even though there aren’t any recipes on the Recipe Creator with the seasonal vegetables I am looking for?</span></strong></a><span data-dcnode-id="606" instrument_node="">
</span><div class="content" data-dcnode-id="601" id="panel18a"><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Yes, you can use your desired seasonal vegetable following the “Any Vegetable” recipes. These recipes will list “Any Vegetable” in the ingredient list and can easily be found by selecting “Any Vegetable” when choosing your vegetable option in the Recipe Creator.</span></p><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
</span></li><span data-dcnode-id="598" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="587"><a class="button radius" data-dcnode-id="595" href="#panel19a"><strong data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">19. What is the purpose of the Meal Mix being in packets? Why isn’t it available in bulk?</span></strong></a><span data-dcnode-id="594" instrument_node="">
</span><div class="content" data-dcnode-id="589" id="panel19a"><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">The individual Meal Mix packets are perfectly measured to provide the appropriate amount of vitamins and minerals to add to the recipes in order to create a nutritionally balanced meal. Just as getting too little of a vitamin can cause deficiencies, too much of a vitamin can cause health problems, and AAFCO has recommended maximum daily intakes for these vitamins. For this reason, Meal Mix packets should not be added to commercial pet food or recipes other than those found on the Recipe Creator, as this could cause a nutrient imbalance over time. Additionally, using a different amount of Meal Mix other than what is directed in the Recipe Creator is not advised for the same reason.</span></p><span data-dcnode-id="590" instrument_node="">
</span></div><span data-dcnode-id="588" instrument_node="">
</span></li><span data-dcnode-id="586" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="575"><a class="button radius" data-dcnode-id="583" href="#panel20a"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">20. How do I use Meal Mix if I’m also feeding a commercial pet food once a day?</span></strong></a><span data-dcnode-id="582" instrument_node="">
</span><div class="content" data-dcnode-id="577" id="panel20a"><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Take the daily recommended amount of kibble found on the bag, or directed by your veterinarian, and cut it in half; then take the Suggested Feeding Amount listed on your Meal Mix Recipe and cut that in half as well. Commercial pet food and Meal Mix recipes can be fed together, or separately throughout the day. Alternate ratios can also be used, such as feeding one-third of the recommended amount of commercial food and two-thirds of the recommended amount of a Meal Mix recipe each day.</span></p><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">
</span></li><span data-dcnode-id="574" instrument_node="">
</span></ol></div><span data-dcnode-id="571" instrument_node="">
</span></div><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span></div><span data-dcnode-id="565" instrument_node="">
</span></div><span data-dcnode-id="563" instrument_node="">
</span></div><span data-dcnode-id="561" instrument_node="">
</span></div><span data-dcnode-id="559" instrument_node="">
</span></div><span data-dcnode-id="557" instrument_node="">
</span></section><span data-dcnode-id="555" instrument_node="">
</span><div class="row" data-dcnode-id="548"><span data-dcnode-id="554" instrument_node="">
</span><div class="columns" data-dcnode-id="550"><span data-dcnode-id="553" instrument_node="">
</span><br data-dcnode-id="552"><span data-dcnode-id="551" instrument_node="">
