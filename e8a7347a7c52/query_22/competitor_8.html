data-dcnode-id="2330"><img alt="Assortment of fresh vegetables - tomatoes, radishes, eggplant, beets, peppers, garlic, onion, spinach. On a dark background, top view" class="img atom-image aligncenter size-large wp-image-64498 hoverZoomLink" data-dcnode-id="2331" data-image-source="
        https://cdn.algaecal.com/cdn-cgi/image/width=1920,fit=scale-down,format=auto/wp-content/uploads/iStock-588993546.jpg?c=202102280819" data-image-source-original="" data-v-f8dacd3e="" height="685" imgalt="" imgheight="auto" imgsource="" imgwidth="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.algaecal.com/cdn-cgi/image/width%3D1920%2Cfit%3Dscale-down%2Cformat%3Dauto/wp-content/uploads/iStock-588993546.jpg%3Fc%3D202102280819&amp;raw" width="1024"></p><span data-dcnode-id="2329" instrument_node=""> </span><p data-dcnode-id="2324"><span data-dcnode-id="2328" instrument_node="">Calcium is the most abundant mineral in our body and it plays several critical roles — yet only </span><a data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2838624/" rel="noopener" target="_blank"><span data-dcnode-id="2327" instrument_node="">32% of adults</span></a><span data-dcnode-id="2325" instrument_node=""> in the US are getting enough through their diet!</span></p><span data-dcnode-id="2323" instrument_node=""> </span><p data-dcnode-id="2318"><span data-dcnode-id="2322" instrument_node="">It’s not just osteoporosis you have to worry about if you don’t get adequate calcium. Calcium also plays vital roles in </span><a data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/definitive-mineral-manual-vegetarians/chapter-1-why-fuss-over-minerals/"><span data-dcnode-id="2321" instrument_node="">cell, nerve, hormone, blood and muscle</span></a><span data-dcnode-id="2319" instrument_node=""> functions.</span></p><span data-dcnode-id="2317" instrument_node=""> </span><p data-dcnode-id="2314"><strong data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">How do you get enough?</span></strong></p><span data-dcnode-id="2313" instrument_node=""> </span><p data-dcnode-id="2302"><span data-dcnode-id="2312" instrument_node="">Including as many calcium-rich foods in your daily diet will provide your body with the base it needs to stay healthy and strong. However, if you are already experiencing bone loss, supplementing with </span><a data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/products/algaecal-plus/"><span data-dcnode-id="2311" instrument_node="">a clinically supported calcium supplement</span></a><span data-dcnode-id="2309" instrument_node=""> will be beneficial to make up for any shortfall from your diet. In fact, the Standard American Diet (SAD) only provides about 300–600 mg of calcium per day, which is a gross cry from the recommended 1,200 mg per day of calcium for </span><a data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/factsheets/Calcium-HealthProfessional/" rel="noopener" target="_blank"><span data-dcnode-id="2308" instrument_node="">women 51 years old</span></a><span data-dcnode-id="2306" instrument_node=""> and older. So ensuring you’re getting enough calcium every day from </span><em data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">all sources</span></em><span data-dcnode-id="2303" instrument_node="">&nbsp;is crucial.</span></p><span data-dcnode-id="2301" instrument_node=""> </span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">So, discover what foods you’re missing out on! This complete guide offers everything you need to know about the top sources of calcium from animals and plants including dairy, fish, leafy vegetables, legumes, nuts, and seeds. The list is provided in order from the best choices — and it may surprise you.</span></p><span data-dcnode-id="2298" instrument_node=""> </span><p data-dcnode-id="2295"><strong data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Bonus: We’ve got a free, printable calcium-rich foods shopping list for ata-dcnode-id="1973" data-v-2020dc21=""><td data-dcnode-id="1980" data-v-2020dc21=""><span data-dcnode-id="1981" instrument_node="">Oranges, navel</span></td><td data-dcnode-id="1977" data-v-2020dc21=""><span data-dcnode-id="1978" instrument_node="">43 mg</span></td><td data-dcnode-id="1974" data-v-2020dc21=""><span data-dcnode-id="1975" instrument_node="">100 g</span></td></tr></tbody></table><span data-dcnode-id="1970" instrument_node=""> </span><p data-dcnode-id="1964"><em data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">* Calcium Fortified: Unfortunately, you can’t rely on juices and milks fortified with calcium.</span></em><span data-dcnode-id="1967" instrument_node=""> </span><a data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/expert-insights/video-lara-pizzorno-calcium-fortified-beverages/"><span data-dcnode-id="1966" instrument_node="">Are Calcium Fortified Beverages a Good Source of Supplemental Calcium?</span></a></p><span data-dcnode-id="1963" instrument_node=""> </span><p data-dcnode-id="1953"><em data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">** Soy: There has been some confusion about soy and its effects on health. To clear up that confusion, see</span></em><span data-dcnode-id="1960" instrument_node=""> “</span><a data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.huffingtonpost.com/2014/07/15/soy-myths_n_5571272.html" rel="noopener" target="_blank"><span data-dcnode-id="1959" instrument_node="">5 Myths About Soy You Probably Still Believe</span></a><span data-dcnode-id="1957" instrument_node="">” and “</span><a data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/expert-insights/latest-research-shows-soy-foods-help-prevent-bone-loss/"><span data-dcnode-id="1956" instrument_node="">Soy Helps Prevent Bone Loss</span></a><span data-dcnode-id="1954" instrument_node="">“.</span></p><span data-dcnode-id="1952" instrument_node=""> </span><div class="blog-numbers" data-dcnode-id="1440"><h4 data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Algas Calcareas Marine Algae (AlgaeCal Plus), 720 mg/4 capsules</span></h4><span data-dcnode-id="1949" instrument_node=""> </span><p data-dcnode-id="1938"><span data-dcnode-id="1948" instrument_node="">One of the biggest health secrets of the sea is a little known South American algae called </span><em data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Lithothamnion superpositum</span></em><span data-dcnode-id="1945" instrument_node=""> (or </span><a data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/algaecal-ingredients/algae-calcium/algas-calcareas/"><span data-dcnode-id="1944" instrument_node="">Algas calcareas</span></a><span data-dcnode-id="1942" instrument_node=""> as the locals call it). It may not be a food source you’re familiar with, but this</span><a data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/products/bone-builder-pack/"><span data-dcnode-id="1941" instrument_node=""> marine algae that we call “AlgaeCal”</span></a><span data-dcnode-id="1939" instrument_node=""> is so calcium-dense that it tops the charts for calcium foods!</span></p><span data-dcnode-id="1937" instrument_node=""> </span><p data-dcnode-id="1929"><span data-dcnode-id="1936" instrument_node="">This small ocean plant is milled into a nutritious whole-food powder that offers your entire daily supplemental calcium needs in four capsules. AlgaeCal naturally contains not just plant-based calcium, but magnesium, zinc, boron, vanadium, and other bone-supporting minerals. In fact, it contains all 13 of the necessary minerals for bone building in proper amounts to work synergistically together. This may be why its unsurpassed clinical results have the research community baffled. Tests show it is even better absorbed by our bodies than the common foods in the list shown here. Research shows that it not only increases intake of easily absorbed calcium, but it can boost your bone density. In fact, </span><a data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/research/"><span data-dcnode-id="1935" instrument_node="">clinical studies</span></a><span data-dcnode-id="1933" instrument_node=""> show 80-year-old women</span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/products/bone-builder-pack/"><span data-dcnode-id="1932" instrument_node=""> increasing bone density with this marine algae</span></a><span data-dcnode-id="1930" instrument_node="">… in just six months!</span></p><span data-dcnode-id="1928" instrument_node=""> </span><h4 data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Blackstrap Molasses, 400 mg/2 tbsp.</span></h4><span data-dcnode-id="1925" instrument_node=""> </span><p data-dcnode-id="1920"><span data-dcnode-id="1924" instrument_node="">Blackstrap molasses is made from boiling sugar cane syrup. Essentially, it’s a concentrated byproduct of making white sugar. It’s also where all the nutritional value is. &nbsp;</span><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/497038/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1923" instrument_node="">Blackstrap molasses</span></a><span data-dcnode-id="1921" instrument_node=""> is darker and richer in flavor than regular molasses. It also boasts an impressive 400 mg of calcium for every two tablespoons and offers the optimum calcium-magnesium ratio to help with calcium absorption. It also provides copper, an important mineral for hair growth.</span></p><span data-dcnode-id="1919" instrument_node=""> </span><p data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Unlike sugar, blackstrap molasses has a moderate glycemic index so may be better for diabetics. It can also soften stools and increases regularity. Not to mention, it’s a flavorful addition to many dishes, from gingerbread to baked beans.</span></p><span data-dcnode-id="1916" instrument_node=""> </span><p data-dcnode-id="1914"><img alt="non dairy milk" class="img atom-image aligncenter size-large wp-image-64508 hoverZoomLink" data-dcnode-id="1915" data-image-source="
        https://cdn.algaecal.com/cdn-cgi/image/width=1920,fit=scale-down,format=auto/wp-content/uploads/50539150_ml-1024x683.jpg?c=202102280819" data-image-source-original="" data-v-f8dacd3e="" height="683" imgalt="" imgheight="auto" imgsource="" imgwidth="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.algaecal.com/cdn-cgi/image/width%3D1920%2Cfit%3Dscale-down%2Cformat%3Dauto/wp-content/uploads/50539150_ml-1024x683.jpg%3Fc%3D202102280819&amp;raw" width="1024"></p><span data-dcnode-id="1913" instrument_node=""> </span><h4 data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Nut Milks, 101–516 mg/1 cup</span></h4><span data-dcnode-id="1910" instrument_node=""> </span><p data-dcnode-id="1902"><span data-dcnode-id="1909" instrument_node="">Non-dairy milks — sometimes branded as “mylk” — can be made from almonds, cashews, coconuts, hazelnuts, hemp, oats, and rice. While they are a great tasting alternative for anyone looking to cut out dairy products, </span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/calcium/milk/"><span data-dcnode-id="1908" instrument_node="">they may not pack the same nutritional punch as traditional dairy</span></a><span data-dcnode-id="1906" instrument_node="">. In terms of nutritional value, </span><a data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/%3Fterm%3Dsinghal%252C%2Bbaker%252C%2Bmilk" rel="noopener" target="_blank"><span data-dcnode-id="1905" instrument_node="">a recent study</span></a><span data-dcnode-id="1903" instrument_node=""> found that plant-based beverages vary widely and are not an adequate protein or calcium alternative. Whole nuts (almonds, cashews) lose most of their protein and calcium during processing, both by being diluted with water and having the pulp removed.</span></p><span data-dcnode-id="1901" instrument_node=""> </span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">That being said, many non-dairy milks are still high in nutrients thanks to being fortified during the manufacturing process.</span></p><span data-dcnode-id="1898" instrument_node=""> </span><p data-dcnode-id="1891"><span data-dcnode-id="1897" instrument_node="">Bone Health Expert Lara Pizzorno, author of </span><em data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Your Bones,</span></em><span data-dcnode-id="1894" instrument_node=""> weighs in on the subject in her video and blog post: </span><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/expert-insights/video-lara-pizzorno-calcium-fortified-beverages/"><span data-dcnode-id="1893" instrument_node="">Calcium Fortified Beverages: A Good Source of Supplemental Calcium?</span></a></p><span data-dcnode-id="1890" instrument_node=""> </span><h4 data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Soy/Rice Milk, 300/283 mg/1 cup</span></h4><span data-dcnode-id="1887" instrument_node=""> </span><p data-dcnode-id="1884"><em data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">More than 90% of soy is genetically modified in the United States. If you include soy products in your diet, make sure they are organic as this means it will also be non-GMO (non-genetically modified organisms).</span></em></p><span data-dcnode-id="1883" instrument_node=""> </span><p data-dcnode-id="1876"><a data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/1097542/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1882" instrument_node="">Soy milk</span></a><span data-dcnode-id="1880" instrument_node=""> is a great option for people who are lactose intolerant. It is made by soaking dried soybeans, grinding them in water, boiling the mixture, and filtering out the gritty residue to leave a milk-like substance. </span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/calcium/milk/"><span data-dcnode-id="1879" instrument_node="">Soy milk contains very little calcium naturally</span></a><span data-dcnode-id="1877" instrument_node="">, but some brands contain 300 mg (30% RDI) of calcium per cup because the manufacturer fortifies it with calcium citrate and calcium carbonate. This milk substitute has lost some of its trend appeal in favor of nut milk, but is still a nutritious alternative.</span></p><span data-dcnode-id="1875" instrument_node=""> </span><p data-dcnode-id="1869"><span data-dcnode-id="1874" instrument_node="">Rice milk&nbsp;is a naturally sweet alternative to cow’s milk. Rice milk is made by blending partially milled rice with water. And during this process, the carbohydrates in the rice break down into sugars. That’s where the sweetness comes from! </span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/171942/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1873" instrument_node="">A cup of rice milk provides 283 mg of calcium</span></a><span data-dcnode-id="1870" style="font-size: 1.125rem;"><span data-dcnode-id="1871" instrument_node="">.</span></span></p><span data-dcnode-id="1868" instrument_node=""> </span><h4 data-dcnode-id="1865"><span data-dcnode-id="1866" style="color: inherit; font-family: inherit; font-size: 1.40625rem; font-weight: bold;"><span data-dcnode-id="1867" instrument_node="">Poppy Seeds 1438 mg/100 g</span></span></h4><span data-dcnode-id="1864" instrument_node=""> </span><p data-dcnode-id="1860"><span data-dcnode-id="1863" instrument_node="">You may recognize this next one from baked classics like the lemon poppy seed muffin and the everything bagel. That’s right, we’re talking about poppy seeds. These little seeds have a penchant for getting stuck in your teeth, but add a delightful crunch and texture to baked goods — both as a main player and as a garnish. And these little specs are surprisingly high in calcium. Just one tablespoon will net you </span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/171330/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1862" instrument_node="">13% of your daily recommended intake of calcium.</span></a></p><span data-dcnode-id="1859" instrument_node=""> </span><p data-dcnode-id="1854"><span data-dcnode-id="1858" instrument_node="">One thing to keep in mind is the poppy seed’s connection to opiates. While most of the </span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19901868" rel="noopener" target="_blank"><span data-dcnode-id="1857" instrument_node="">seed’s opiate content is destroyed during cooking</span></a><span data-dcnode-id="1855" instrument_node="">, it’s recommended people consume no more than one teaspoon for every seven pounds of body weight. Just to be safe!</span></p><span data-dcnode-id="1853" instrument_node=""> </span><h4 data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Sesame Seeds, 975 mg/100 g</span></h4><span data-dcnode-id="1850" instrument_node=""> </span><p data-dcnode-id="1845"><span data-dcnode-id="1849" instrument_node="">Sesame seeds may be the oldest condiment known to man, tracing all the way back to ancient Egypt. “Open sesame,” a famous phrase coined in the Ali Baba story from </span><em data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">One Thousand and One Nights</span></em><span data-dcnode-id="1846" instrument_node="">, describes the sesame seed pod that bursts open when it reaches maturity.</span></p><span data-dcnode-id="1844" instrument_node=""> </span><p data-dcnode-id="1835"><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/170150/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1843" instrument_node="">Sesame seeds</span></a><span data-dcnode-id="1841" instrument_node="">&nbsp;contain a whopping 88 mg of calcium in a single tablespoon. They’re also a source of other minerals, including copper, iron, and manganese. Sesame seeds are commonly found in tahini, hummus, salad dressings, Sesame Snaps, and of course, sprinkled on white bread. Sesame seed oil is a pantry staple because it’s exceptionally resistant to rancidity. Sesame seeds may also help lower blood pressure and </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/expert-insights/the-top-5-effective-and-natural-remedies-for-inflammation/"><span data-dcnode-id="1840" instrument_node="">reduce inflammation</span></a><span data-dcnode-id="1838" instrument_node=""> due to their lignans and antioxidants, and is a source of fiber when unhulled.&nbsp;</span><em data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">*Sesame allergies are on the rise, so if this is a new ingredient for you, caution is advised.</span></em></p><span data-dcnode-id="1834" instrument_node=""> </span><h4 data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Chia Seeds, 631 mg/100g</span></h4><span data-dcnode-id="1831" instrument_node=""> </span><p data-dcnode-id="1824"><span data-dcnode-id="1830" instrument_node="">They may not look like much, but chia seeds are a real nutrient powerhouse! The chia seed comes from the </span><em data-dcnode-id="1828" style="font-size: 1.125rem;"><span data-dcnode-id="1829" instrument_node="">Salvia </span></em><span data-dcnode-id="1827" instrument_node="">hispanica</span><span data-dcnode-id="1825" style="font-size: 1.125rem;"><span data-dcnode-id="1826" instrument_node="">, a flowering plant in the mint family that’s native to Central America.&nbsp;</span></span></p><span data-dcnode-id="1823" instrument_node=""> </span><p data-dcnode-id="1816"><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/170554/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1822" instrument_node="">Chia seeds are high in dietary fiber, calcium, and manganese</span></a><span data-dcnode-id="1820" instrument_node=""> among other nutrients. Plus, they’re absolutely delicious! The seeds are pretty small to begin with, but when you place them in a&nbsp;liquid they&nbsp;expand and take on a gel-like quality. Some people compare the texture of chia once they’ve expanded to tapioca. If you want to try chia seeds but aren’t sure how to utilize them in the kitchen, try our </span><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/expert-insights/bone-healthy-recipe-vanilla-chia-pudding/"><span data-dcnode-id="1819" instrument_node="">bone-healthy mango and chia pudding</span></a><span data-dcnode-id="1817" instrument_node="">. Healthy has never tasted so good!</span></p><span data-dcnode-id="1815" instrument_node=""> </span><p data-dcnode-id="1813"><img alt="tahini with sesame seed" class="img atom-image aligncenter size-large wp-image-64504 hoverZoomLink" data-dcnode-id="1814" data-image-source="
        https://cdn.algaecal.com/cdn-cgi/image/width=1920,fit=scale-down,format=auto/wp-content/uploads/55800577_ml-1024x683.jpg?c=202102280819" data-image-source-original="" data-v-f8dacd3e="" height="683" imgalt="" imgheight="auto" imgsource="" imgwidth="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.algaecal.com/cdn-cgi/image/width%3D1920%2Cfit%3Dscale-down%2Cformat%3Dauto/wp-content/uploads/55800577_ml-1024x683.jpg%3Fc%3D202102280819&amp;raw" width="1024"></p><span data-dcnode-id="1812" instrument_node=""> </span><h4 data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Tahini, 426 mg/100 g</span></h4><span data-dcnode-id="1809" instrument_node=""> </span><p data-dcnode-id="1801"><span data-dcnode-id="1808" instrument_node="">Tahini is a spread made from toasted sesame seeds. It’s a rich addition to North African, Greek, and Middle Eastern food. Even if you haven’t used it in cooking, you’ve probably eaten it in hummus, baba ganoush, or tahini-based salad dressings. </span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21842753" rel="noopener" target="_blank"><span data-dcnode-id="1807" instrument_node="">It is high in healthy fat</span></a><span data-dcnode-id="1805" instrument_node=""> and high in calories, but loaded with protein. And just </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/170189/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1804" instrument_node="">two tablespoons</span></a><span data-dcnode-id="1802" instrument_node=""> gives you 128 mg of calcium in addition to thiamin, magnesium, and iron.</span></p><span data-dcnode-id="1800" instrument_node=""> </span><h4 data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Almonds/Almond Butter, 264/347 mg per 100 g</span></h4><span data-dcnode-id="1797" instrument_node=""> </span><p data-dcnode-id="1793"><span data-dcnode-id="1796" instrument_node="">Grabbing a small handful of almonds every day will net great benefits: healthy fats (especially when raw), protein, magnesium, and, yes, calcium. Of all nuts,</span><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nutritiondata.self.com/facts/nut-and-seed-products/3085/2" rel="noopener" target="_blank"><span data-dcnode-id="1795" instrument_node=""> almonds are the highest in calcium.</span></a></p><span data-dcnode-id="1792" instrument_node=""> </span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Almonds have been called the most nutritionally dense nut, but are still low in calories. The nut that keeps on giving, almonds also contain lots of potassium, vitamin E, and fiber.</span></p><span data-dcnode-id="1789" instrument_node=""> </span><p data-dcnode-id="1781"><span data-dcnode-id="1788" instrument_node="">Although almonds originated in the Middle East, California’s almond groves are now the largest managed pollination event in the world, with almost </span><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.npr.org/2017/03/09/519500033/bees-travel-cross-country-for-the-california-almond-harvest" rel="noopener" target="_blank"><span data-dcnode-id="1787" instrument_node="">one million hives</span></a><span data-dcnode-id="1785" instrument_node=""> (half of all US beehives) brought there in February to pollinate trees to produce almonds. Consider making your own fresh almond milk, or grind your own butter. It’s surprisingly easy and delightfully tasty! Just check out our post on </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/expert-insights/how-to-make-your-own-nut-butter/"><span data-dcnode-id="1784" instrument_node="">How to Make Your Own Nut Butter</span></a><span data-dcnode-id="1782" instrument_node="">.</span></p><span data-dcnode-id="1780" instrument_node=""> </span><p data-dcnode-id="1775"><span data-dcnode-id="1779" instrument_node="">Almond butter has the nutritional edge over peanut butter in terms of vitamins and minerals. Per serving, it provides more than double the vitamin E, more calcium, and more magnesium. A </span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/339460/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1778" instrument_node="">tablespoon of almond butter</span></a><span data-dcnode-id="1776" instrument_node=""> delivers 55 mg of calcium and 45 mg of magnesium. That’s more than 10% of your daily needs.</span></p><span data-dcnode-id="1774" instrument_node=""> </span><p data-dcnode-id="1769"><span data-dcnode-id="1773" instrument_node="">To discover more nutritional information about almonds, plus some amazing health benefits and recipe ideas, </span><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/calcium/foods/almonds/"><span data-dcnode-id="1772" instrument_node="">check out our designated almond page</span></a><span data-dcnode-id="1770" instrument_node="">.</span></p><span data-dcnode-id="1768" instrument_node=""> </span><h4 data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Kale, 254 mg/100 g</span></h4><span data-dcnode-id="1765" instrument_node=""> </span><p data-dcnode-id="1754"><span data-dcnode-id="1764" instrument_node="">Kale is more than a colorful substitute for lettuce. It’s a nutrient-rich superfood! 100 g of&nbsp;</span><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/168421/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1763" instrument_node="">kale</span></a><span data-dcnode-id="1761" instrument_node="">&nbsp;provides a substantial 254 mg of calcium! Plus, kale is chock-full of vitamin C and is also one of the best food sources of vitamin K1, which is important for blood clotting. Vitamin K1 differs from </span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/algaecal-ingredients/vitamin-k2/"><span data-dcnode-id="1760" instrument_node="">vitamin K2</span></a><span data-dcnode-id="1758" instrument_node="">, which is known for its ability to activate proteins in the body. K2 is found in fermented soy products and some animal products and has been shown to crucial for bone health and </span><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karger.com/Article/Abstract/75344" rel="noopener" target="_blank"><span data-dcnode-id="1757" instrument_node="">osteoporosis</span></a><span data-dcnode-id="1755" instrument_node="">.</span></p><span data-dcnode-id="1753" instrument_node=""> </span><p data-dcnode-id="1749"><span data-dcnode-id="1752" instrument_node="">If you find kale bitter and fibrous when raw, try baby kale for salads and smoothies and stick to sautéeing or grilling for curly or dinosaur kale. As a bonus, kale’s calcium is not damaged by cooking. In fact, heating releases more calcium, which is held back by the presence of oxalic acid. </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/calcium/foods/kale/"><span data-dcnode-id="1751" instrument_node="">Click here to discover more about the calcium in kale, as well as some amazing health benefits!</span></a></p><span data-dcnode-id="1748" instrument_node=""> </span><h4 data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Collard Greens, 210 mg/100g</span></h4><span data-dcnode-id="1745" instrument_node=""> </span><p data-dcnode-id="1741"><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/169996/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1744" instrument_node="">Cooked collard greens </span></a><span data-dcnode-id="1742" instrument_node="">serve up a substantial amount of your daily calcium needs in a single cup. Although this southern cooking staple is traditionally cooked with not-so-healthy amounts of butter and bacon, collard greens also taste great sautéed with a little olive oil and garlic. Steam your greens until they’re soft but still bright to keep from losing nutrients in the cooking process. This will also help prevent the unpleasant sulfur smell that comes along with overcooking.</span></p><span data-dcnode-id="1740" instrument_node=""> </span><p data-dcnode-id="1732"><span data-dcnode-id="1739" instrument_node="">While you may not want to smell sulfur, it’s good to eat! Thanks to its sulfur compounds, collard greens may actually your </span><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/annonc/article/23/8/2198/136316/Cruciferous-vegetables-and-cancer-risk-in-a" rel="noopener" target="_blank"><span data-dcnode-id="1738" instrument_node="">risk of cancer</span></a><span data-dcnode-id="1736" instrument_node="">. It’s antioxidant properties in the form of alpha-lipoic acid also </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3921613/" rel="noopener" target="_blank"><span data-dcnode-id="1735" instrument_node="">helps liver function</span></a><span data-dcnode-id="1733" instrument_node="">.</span></p><span data-dcnode-id="1731" instrument_node=""> </span><h4 data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Amaranth Grain and Leaves, 159–209 mg/100 g</span></h4><span data-dcnode-id="1728" instrument_node=""> </span><p data-dcnode-id="1717"><span data-dcnode-id="1727" instrument_node="">Certainly lesser-known than many other grains, </span><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/170682/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1726" instrument_node="">amaranth</span></a><span data-dcnode-id="1724" instrument_node=""> is a highly underappreciated super grain. Originally cultivated hundreds of years ago by the Aztecs, amaranth is a delicious </span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.webmd.com/healthy-recipe-doctor/2011/03/amaranth-super-grain.html" rel="noopener" target="_blank"><span data-dcnode-id="1723" instrument_node="">gluten-free grain that’s brimming with protein and fiber</span></a><span data-dcnode-id="1721" instrument_node="">. It also boasts impressive rates of vitamin B6, calcium, iron, magnesium, phosphorus, and manganese. Amaranth can be served as a whole grain or ground into a gluten-free flour. Its </span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/168385/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1720" instrument_node="">leaves</span></a><span data-dcnode-id="1718" instrument_node=""> are also edible and can be eaten like any other dark, leafy green.</span></p><span data-dcnode-id="1716" instrument_node=""> </span><h4 data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Turnip Greens, 188 mg/100 g</span></h4><span data-dcnode-id="1713" instrument_node=""> </span><p data-dcnode-id="1708"><span data-dcnode-id="1712" instrument_node="">You may have eaten the root, but have you ever eaten the leaves of turnips? Like other dark leafy vegetables, </span><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC540477/pdf/plntphys00387-0021.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1711" instrument_node="">turnip greens are an excellent source of vitamin K1, beta-carotene, vitamin C, and calcium</span></a><span data-dcnode-id="1709" instrument_node="">.</span></p><span data-dcnode-id="1707" instrument_node=""> </span><p data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">While it may not get the same kind of press as other cruciferous greens like kale and broccoli, </span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/554544/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1705" instrument_node="">turnip greens</span></a><span data-dcnode-id="1703" instrument_node=""> actually max out the Aggregate Nutrient Density Index (ANDI) scale with 1,000 points. The ANDI scale measures the nutrients and disease-fighting potential of foods.</span></p><span data-dcnode-id="1701" instrument_node=""> </span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">From turnip-green pesto to spicy pan-fried greens, there are dozens of recipes for them on the internet. And with 42 mg of natural salt for every cup of turnip greens, they practically season themselves!</span></p><span data-dcnode-id="1698" instrument_node=""> </span><h3 data-dcnode-id="1696"><img alt="Tofu - magnesium rich food" class="img atom-image aligncenter size-large wp-image-61437 hoverZoomLink" data-dcnode-id="1697" data-image-source="
        https://cdn.algaecal.com/cdn-cgi/image/width=1920,fit=scale-down,format=auto/wp-content/uploads/shutterstock_366957596-1024x683.jpg?c=202102280819" data-image-source-original="" data-v-f8dacd3e="" height="683" imgalt="" imgheight="auto" imgsource="" imgwidth="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.algaecal.com/cdn-cgi/image/width%3D1920%2Cfit%3Dscale-down%2Cformat%3Dauto/wp-content/uploads/shutterstock_366957596-1024x683.jpg%3Fc%3D202102280819&amp;raw" width="1024"></h3><span data-dcnode-id="1695" instrument_node=""> </span><h4 data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Tofu, 176–350 mg of calcium/ 100 g</span></h4><span data-dcnode-id="1692" instrument_node=""> </span><p data-dcnode-id="1684"><span data-dcnode-id="1691" instrument_node="">Tofu, or bean curd, is made by curdling and coagulating heated soy milk and then pressing the curds into spongy blocks. It’s not only popular in Asian dishes, but also in West African cuisine. It was first made in China in 300 BCE. Processing affects the calcium content considerably. Many brands are made using calcium sulfate as a coagulant (sometimes referred to as </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/172476/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1690" instrument_node="">calcium-set tofu</span></a><span data-dcnode-id="1688" instrument_node="">) which increases the calcium content. Calcium-set tofu contains up to 350 mg of calcium per 100 g serving compared to </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/411177/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1687" instrument_node="">176 mg</span></a><span data-dcnode-id="1685" instrument_node=""> of calcium in traditional tofu.</span></p><span data-dcnode-id="1683" instrument_node=""> </span><p data-dcnode-id="1678"><span data-dcnode-id="1682" instrument_node="">Tofu is an incredibly versatile product and is able to take on flavors of other ingredients when cooking or marinating. It also comes in a variety of textures so it can be used in anything from soups and desserts to dinner entrees. Check out our </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/calcium/foods/tofu/"><span data-dcnode-id="1681" instrument_node="">dedicated “Calcium in Tofu” page</span></a><span data-dcnode-id="1679" instrument_node=""> for more nutritional information and some great recipe ideas!</span></p><span data-dcnode-id="1677" instrument_node=""> </span><h4 data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Dried Figs, 162 mg of calcium / 100 g</span></h4><span data-dcnode-id="1674" instrument_node=""> </span><p data-dcnode-id="1662"><span data-dcnode-id="1673" instrument_node="">Originally hailing from western Asia and the Middle East, </span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/326905/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1672" instrument_node="">dried figs</span></a><span data-dcnode-id="1670" instrument_node=""> have been enjoyed as a sweet treat for centuries. On top of being a source of calcium, figs are rich in fiber and potassium. Thanks to all that potassium, figs have been </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whfoods.com/genpage.php%3Ftname%3Dfoodspice%26dbid%3D24" rel="noopener" target="_blank"><span data-dcnode-id="1669" instrument_node="">shown beneficial in helping to lower high blood pressure</span></a><span data-dcnode-id="1667" instrument_node="">. Figs can be enjoyed in sweet or savory dishes, and make a beautiful addition to any charcuterie plate. Check out our </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/calcium/foods/figs/" style="font-size: 1.125rem;"><span data-dcnode-id="1666" instrument_node="">“Figs and Calcium” page</span></a><span data-dcnode-id="1663" style="font-size: 1.125rem;"><span data-dcnode-id="1664" instrument_node=""> for more nutritional information about figs, and a fascinating fact to impress your friends with!</span></span></p><span data-dcnode-id="1661" instrument_node=""> </span><p data-dcnode-id="1659"><img alt="Kale Salad with cranberries and dressing" class="img atom-image aligncenter size-large wp-image-63308 hoverZoomLink" data-dcnode-id="1660" data-image-source="
        https://cdn.algaecal.com/cdn-cgi/image/width=1920,fit=scale-down,format=auto/wp-content/uploads/shutterstock_554839747-1024x683.jpg?c=202102280819" data-image-source-original="" data-v-f8dacd3e="" height="683" imgalt="" imgheight="auto" imgsource="" imgwidth="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.algaecal.com/cdn-cgi/image/width%3D1920%2Cfit%3Dscale-down%2Cformat%3Dauto/wp-content/uploads/shutterstock_554839747-1024x683.jpg%3Fc%3D202102280819&amp;raw" width="1024"></p><span data-dcnode-id="1658" instrument_node=""> </span><h4 data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Soybeans, 145 mg/100 g</span></h4><span data-dcnode-id="1655" instrument_node=""> </span><p data-dcnode-id="1650"><span data-dcnode-id="1654" instrument_node="">Edamame are immature </span><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/170530/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1653" instrument_node="">soybeans</span></a><span data-dcnode-id="1651" instrument_node=""> in the pod, and are among the few non-animal foods that are said to be a complete protein. That means edamame beans contains all nine essential amino acids that the body needs, just like meat does. You’ll get 261 mg of calcium in every cup of edamame. Soybeans are also rich in fiber with approximately eight grams in every cup. They’re best eaten lightly steamed with a little salt. But don’t eat the pod though, just the beans inside.</span></p><span data-dcnode-id="1649" instrument_node=""> </span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Edamame has been eaten in China and Japan for thousands of years, not only because it’s a nutritional powerhouse, but because it is one of the sweetest tasting beans</span></p><span data-dcnode-id="1646" instrument_node=""> </span><h4 data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Soy Yogurt, Plain, 132 mg/100 g</span></h4><span data-dcnode-id="1643" instrument_node=""> </span><p data-dcnode-id="1635"><span data-dcnode-id="1642" instrument_node="">Soy yogurt manufacturers add live bacterial cultures to a base made from soybeans and blend the mixture with water and sugar. They use bacteria grown on milk protein or on a vegetable medium to produce soy yogurt. </span><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livestrong.com/article/425207-soy-yogurt-vs-regular-yogurt/" rel="noopener" target="_blank"><span data-dcnode-id="1641" instrument_node="">Comparing dairy yogurt to soy</span></a><span data-dcnode-id="1639" instrument_node="">, both provide protein and calcium. A serving of </span><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/175227/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1638" instrument_node="">plain soy yogur</span></a><span data-dcnode-id="1636" instrument_node="">t contains 6 g protein — about half as much as you’d get from traditional cow’s milk yogurt — and 40% RDI for calcium when soy is fortified with tricalcium phosphate or calcium carbonate. This is about the same amount of calcium that is naturally occurring in a cup of whole fat milk.</span></p><span data-dcnode-id="1634" instrument_node=""> </span><p data-dcnode-id="1632"><img alt="mustard greens as a calcium rich food" class="img atom-image aligncenter size-large wp-image-64511 hoverZoomLink" data-dcnode-id="1633" data-image-source="
        https://cdn.algaecal.com/cdn-cgi/image/width=1920,fit=scale-down,format=auto/wp-content/uploads/shutterstock_287448248-1024x683.jpg?c=202102280819" data-image-source-original="" data-v-f8dacd3e="" height="683" imgalt="" imgheight="auto" imgsource="" imgwidth="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.algaecal.com/cdn-cgi/image/width%3D1920%2Cfit%3Dscale-down%2Cformat%3Dauto/wp-content/uploads/shutterstock_287448248-1024x683.jpg%3Fc%3D202102280819&amp;raw" width="1024"></p><span data-dcnode-id="1631" instrument_node=""> </span><h4 data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Mustard Greens, 118 mg/100 g</span></h4><span data-dcnode-id="1628" instrument_node=""> </span><p data-dcnode-id="1621"><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/169257/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1627" instrument_node="">Mustard greens</span></a><span data-dcnode-id="1625" instrument_node=""> are often added to gourmet salad blends, offering a natural spiciness to other raw greens. They can also be sautéed, and the spiciness can be reduced by adding vinegar or lemon juice to the pan. Like all leafy greens, mustard greens contain a wide variety of potent anti-aging antioxidants and lots of </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/10495448" rel="noopener" target="_blank"><span data-dcnode-id="1624" instrument_node="">detoxifying chlorophyll</span></a><span data-dcnode-id="1622" instrument_node="">. A cup of cooked mustard greens also contains 165 mg of calcium and significant amounts of vitamin K1 and potassium.</span></p><span data-dcnode-id="1620" instrument_node=""> </span><p data-dcnode-id="1618"><img alt="seasoned tempeh dish" class="img atom-image aligncenter size-large wp-image-64509 hoverZoomLink" data-dcnode-id="1619" data-image-source="
        https://cdn.algaecal.com/cdn-cgi/image/width=1920,fit=scale-down,format=auto/wp-content/uploads/shutterstock_539929405-1024x683.jpg?c=202102280819" data-image-source-original="" data-v-f8dacd3e="" height="683" imgalt="" imgheight="auto" imgsource="" imgwidth="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.algaecal.com/cdn-cgi/image/width%3D1920%2Cfit%3Dscale-down%2Cformat%3Dauto/wp-content/uploads/shutterstock_539929405-1024x683.jpg%3Fc%3D202102280819&amp;raw" width="1024"></p><span data-dcnode-id="1617" instrument_node=""> </span><h4 data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Tempeh, 111 mg /100 g</span></h4><span data-dcnode-id="1614" instrument_node=""> </span><p data-dcnode-id="1606"><span data-dcnode-id="1613" instrument_node="">The unique way that tempeh is made from soybeans was passed from Indonesians to the Chinese way back in 1000 CE. </span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whfoods.com/genpage.php%3Ftname%3Dfoodspice%26dbid%3D126" rel="noopener" target="_blank"><span data-dcnode-id="1612" instrument_node="">Tempeh</span></a><span data-dcnode-id="1610" instrument_node=""> is a whole food made by fermenting cooked soybeans for several days with the help of mold (</span><em data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Rhizopus oligosporus</span></em><span data-dcnode-id="1607" instrument_node="">). It’s chewy, brown, and has a slightly sweet, nutty flavor. It’s also firmer and less watery than unfermented tofu. Tempeh is highly nutritious, with more protein and fiber than tofu, and is less processed because it’s made using traditional methods.</span></p><span data-dcnode-id="1605" instrument_node=""> </span><p data-dcnode-id="1598"><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/174272/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1604" instrument_node="">Tempeh is high in calcium (1 cup has 184 mg)</span></a><span data-dcnode-id="1602" instrument_node=""> and other minerals and is high in cancer-preventing isoflavones. The most important difference between tofu and tempeh is the fermentation process that breaks down the phytates, anti-nutrients found in soy. It makes soy proteins and minerals more digestible. A </span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19995131" rel="noopener" target="_blank"><span data-dcnode-id="1601" instrument_node="">2010 study</span></a><span data-dcnode-id="1599" instrument_node=""> showed that the calcium from tempeh is as well absorbed as calcium from cow’s milk.</span></p><span data-dcnode-id="1597" instrument_node=""> </span><h4 data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Broccoli Raab, 108 mg/ 100 g</span></h4><span data-dcnode-id="1594" instrument_node=""> </span><p data-dcnode-id="1586"><span data-dcnode-id="1593" instrument_node="">Despite its name, </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thekitchn.com/whats-the-difference-between-broccoli-broccolini-broccoli-rabe-and-chinese-broccoli-227025" rel="noopener" target="_blank"><span data-dcnode-id="1592" instrument_node="">broccoli raab isn’t actually related to broccoli</span></a><span data-dcnode-id="1590" instrument_node="">. Surprisingly, it’s closer to the turnip. If you’re unfamiliar with this particular vegetable, treat it like you would any bitter, leafy green — like mustard or turnip greens. This lesser-known, deceivingly-named vegetable is popular in Italian cuisine. </span><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/170381/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1589" instrument_node="">On top of the 108 mg of calcium</span></a><span data-dcnode-id="1587" instrument_node="">, you’ll get in every 100 g of raab, you’ll also get 34% of your daily recommended amount of vitamin C, 27% of your iron, and an astounding 187% of your vitamin K.</span></p><span data-dcnode-id="1585" instrument_node=""> </span><h4 data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Bok Choy, 93 mg/100 g</span></h4><span data-dcnode-id="1582" instrument_node=""> </span><p data-dcnode-id="1577"><span data-dcnode-id="1581" instrument_node="">Bok choy or Chinese white cabbage is a cruciferous vegetable like Brussels sprouts and broccoli. It has been cultivated in China for thousands of years and ranks sixth on the ANDI scale. </span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drfuhrman.com/library/eat-to-live-blog/128/andi-food-scores-rating-the-nutrient-density-of-foods" rel="noopener" target="_blank"><span data-dcnode-id="1580" instrument_node="">ANDI</span></a><span data-dcnode-id="1578" instrument_node=""> rates foods not only for vitamins and minerals but for antioxidants.</span></p><span data-dcnode-id="1576" instrument_node=""> </span><p data-dcnode-id="1571"><span data-dcnode-id="1575" instrument_node="">A one-cup serving of </span><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/170391/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1574" instrument_node="">cooked bok choy</span></a><span data-dcnode-id="1572" instrument_node=""> contains 158 mg of calcium and 631 mg of potassium. Other nutrients include zinc, copper, manganese, selenium, B vitamins, beta-carotene, and vitamin K. Stir-fry bok choy with olive oil, teriyaki sauce, and fresh garlic for a healthy side dish to a meal.</span></p><span data-dcnode-id="1570" instrument_node=""> </span><h4 data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Rhubarb, 86 mg/ 100 g</span></h4><span data-dcnode-id="1567" instrument_node=""> </span><p data-dcnode-id="1560"><span data-dcnode-id="1566" instrument_node="">Like our friend the chia seed, rhubarb has a little bit of almost everything. </span><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/167758/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1565" instrument_node="">Vitamins B, C, and K, manganese, and of course, calcium</span></a><span data-dcnode-id="1563" instrument_node="">, are just the tip of the nutritional iceberg. Where it really shines is in its natural sweetness when stewed or added to a pie, and it’s high fiber content.</span><br data-dcnode-id="1562"><span data-dcnode-id="1561" instrument_node="">
Rhubarb’s vitamin K and calcium content is great for bone health and preventing osteoporosis. Looks like a slice of pie could be better for you than you thought!</span></p><span data-dcnode-id="1559" instrument_node=""> </span><p data-dcnode-id="1557"><img alt="vegan calcium sources - okra" class="img atom-image aligncenter size-full wp-image-38053" data-dcnode-id="1558" data-image-source="
        https://cdn.algaecal.com/cdn-cgi/image/width=1920,fit=scale-down,format=auto/wp-content/uploads/Okra1.jpg?c=202102280819" data-image-source-original="" data-v-f8dacd3e="" height="565" imgalt="" imgheight="auto" imgsource="" imgwidth="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.algaecal.com/cdn-cgi/image/width%3D1920%2Cfit%3Dscale-down%2Cformat%3Dauto/wp-content/uploads/Okra1.jpg%3Fc%3D202102280819&amp;raw" width="847"></p><span data-dcnode-id="1556" instrument_node=""> </span><h4 data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Okra, 77 mg/100 g</span></h4><span data-dcnode-id="1553" instrument_node=""> </span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Although Asia, Ethiopia, and West Africa all claim to have introduced this calcium-rich flowering plant, its name derives from Nigeria. It’s also known as ladies’ fingers, bhindi, and bamia, but it is most famous in North America in Cajun and Creole cooking. Roast, sautée, or grill to bring out the flavor and preserve the texture. Boiling can make okra slimy and unpleasant.</span></p><span data-dcnode-id="1550" instrument_node=""> </span><p data-dcnode-id="1540"><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/169261/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1549" instrument_node="">Okra</span></a><span data-dcnode-id="1547" instrument_node=""> is a nightshade vegetable, like eggplant and potato, in addition to being an edible flowering hibiscus. </span><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//extension.illinois.edu/veggies/okra.cfm" rel="noopener" target="_blank"><span data-dcnode-id="1546" instrument_node="">Okra has numerous health benefits</span></a><span data-dcnode-id="1544" instrument_node="">, and much of its nutrition is in its soluble fiber. In addition to having calcium, it’s high in vitamin B6, folate, and potassium. It has been studied especially for its </span><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.omicsonline.org/open-access/nutritional-quality-and-health-benefits-of-okra-abelmoschus-esculentusa-review-2157-7110-1000458.php%3Faid%3D54850" rel="noopener" target="_blank"><span data-dcnode-id="1543" instrument_node="">heart health benefits </span></a><span data-dcnode-id="1541" instrument_node="">due to its fiber and pectin.</span></p><span data-dcnode-id="1539" instrument_node=""> </span><h4 data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">&nbsp;Navy Beans, 69 mg/100 g</span></h4><span data-dcnode-id="1536" instrument_node=""> </span><p data-dcnode-id="1528"><span data-dcnode-id="1535" instrument_node="">A generous serving of this camping favorite could pack as much as 62 mg of calcium! And you thought it was just comfort food. Most beans are high in calcium, but if you want to boost your baked beans recipe, use </span><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/398670/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1534" instrument_node="">white beans</span></a><span data-dcnode-id="1532" instrument_node=""> (126 mg calcium per cup) or </span><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/173746/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1531" instrument_node="">navy beans</span></a><span data-dcnode-id="1529" instrument_node=""> (126 mg calcium per cup).</span></p><span data-dcnode-id="1527" instrument_node=""> </span><p data-dcnode-id="1523"><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/calcium/foods/beans/"><span data-dcnode-id="1526" instrument_node="">Navy beans</span></a><span data-dcnode-id="1524" instrument_node=""> are a type of kidney bean also known as Yankee bean, named because it was an important source of food to the Navy during the 19th century. Navy beans are also a good source of fiber, which aids elimination, lowers blood cholesterol, and may improve heart health.</span></p><span data-dcnode-id="1522" instrument_node=""> </span><h4 data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Oats, 58 mg/ 100 g</span></h4><span data-dcnode-id="1519" instrument_node=""> </span><p data-dcnode-id="1514"><span data-dcnode-id="1518" instrument_node="">A bowl of warm oatmeal with brown sugar and cream has been a breakfast classic for generations, but did you know this&nbsp;simple meal is packed with whole grain nutrients? Manganese, selenium, iron, and a ton of fiber are rounded out with a </span><a data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/168872/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1517" instrument_node="">healthy dose of bone-friendly calcium</span></a><span data-dcnode-id="1515" instrument_node="">.</span></p><span data-dcnode-id="1513" instrument_node=""> </span><p data-dcnode-id="1508"><span data-dcnode-id="1512" instrument_node="">Rolled oats are much </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4325078/" rel="noopener" target="_blank"><span data-dcnode-id="1511" instrument_node="">higher in lipids than other cereal grains</span></a><span data-dcnode-id="1509" instrument_node="">. Lipids are an excellent source of energy and unsaturated fatty acids. The vitamin E content in oats is also hugely important because of the antioxidant’s ability to destroy free radicals that can lead to cancer, arthritis, and cataracts.</span></p><span data-dcnode-id="1507" instrument_node=""> </span><h4 data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Broccoli, 47 mg/100 g</span></h4><span data-dcnode-id="1504" instrument_node=""> </span><p data-dcnode-id="1496"><span data-dcnode-id="1503" instrument_node="">While it may not be your kids’ favorite side dish, broccoli goes head to head with dairy products for the amount of calcium per serving. </span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/170379/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1502" instrument_node="">A cup of chopped broccoli provides 43 mg of calcium</span></a><span data-dcnode-id="1500" instrument_node="">. This cruciferous vegetable is famous for its immune-boosting, </span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4103733/" rel="noopener" target="_blank"><span data-dcnode-id="1499" instrument_node="">anti-inflammatory</span></a><span data-dcnode-id="1497" instrument_node="">, and cancer-preventing properties.</span></p><span data-dcnode-id="1495" instrument_node=""> </span><p data-dcnode-id="1491"><span data-dcnode-id="1494" instrument_node="">Have you heard about roasted broccoli florets? Similar to the culinary favorite roasted cauliflower, you can roast broccoli for an intensely sweet flavor. Toss chopped florets in olive oil and sprinkle with salt, pepper, and minced garlic, and roast at 375 degrees, turning once or twice so they don’t burn. </span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/calcium/foods/broccoli/"><span data-dcnode-id="1493" instrument_node="">Click here for more information about the calcium content of broccoli and some amazing health benefits too.</span></a></p><span data-dcnode-id="1490" instrument_node=""> </span><h4 data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Quinoa, 47 mg/ 100 g</span></h4><span data-dcnode-id="1487" instrument_node=""> </span><p data-dcnode-id="1479"><span data-dcnode-id="1486" instrument_node="">Quinoa is a traditional food of South American indigenous peoples and has been </span><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4957693/" rel="noopener" target="_blank"><span data-dcnode-id="1485" instrument_node="">used medicinally to treat wounds and to promote digestion.</span></a><span data-dcnode-id="1483" instrument_node=""> Nowadays, </span><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/168874/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1482" instrument_node="">quinoa</span></a><span data-dcnode-id="1480" instrument_node=""> is better known as a super grain that’s packed with amino acids, fiber, calcium, and a dozen other vitamins and minerals.</span></p><span data-dcnode-id="1478" instrument_node=""> </span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Quinoa can be prepared as a rice-style grain, puffed into a cereal, baked into bread and muffins, and even used as a bean or barley substitute in soups. It may be hard to pronounce, but it’s easy to find a place for it in your pantry!</span></p><span data-dcnode-id="1475" instrument_node=""> </span><h4 data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Cannellini Beans 46 mg/ 100 g</span></h4><span data-dcnode-id="1472" instrument_node=""> </span><p data-dcnode-id="1461"><span data-dcnode-id="1471" instrument_node="">Cannellini beans are a variant of the white kidney bean. They’re bigger than your average kidney bean and are </span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/551175/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1470" instrument_node="">largely valued for their fiber and protein content</span></a><span data-dcnode-id="1468" instrument_node="">. Cannellini beans are also the star of our </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/expert-insights/white-bean-spinach-soup/"><span data-dcnode-id="1467" instrument_node="">10-minute white bean, spinach, and parmesan soup</span></a><span data-dcnode-id="1465" instrument_node="">. These high fiber legumes have also been linked to a </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whfoods.com/genpage.php%3Ftname%3Dfoodspice%26dbid%3D87" rel="noopener" target="_blank"><span data-dcnode-id="1464" instrument_node="">reduced risk of heart disease</span></a><span data-dcnode-id="1462" instrument_node="">, so you can enjoy a side of good health with your soup!</span></p><span data-dcnode-id="1460" instrument_node=""> </span><p data-dcnode-id="1456"><span data-dcnode-id="1459" instrument_node="">Did you know there are three types of bean, in particular, that offer a large amount of calcium? Discover them all on our </span><a data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/calcium/foods/beans/"><span data-dcnode-id="1458" instrument_node="">“Calcium-Rich Beans” page.</span></a></p><span data-dcnode-id="1455" instrument_node=""> </span><h4 data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Oranges, navel, 43 mg/100 g</span></h4><span data-dcnode-id="1452" instrument_node=""> </span><p data-dcnode-id="1444"><span data-dcnode-id="1451" instrument_node="">The saying really should have been “an orange a day keeps the doctor away.” With a single orange being able to provide upwards of</span><a data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/169917/nutrients" rel="noopener" target="_blank"><span data-dcnode-id="1450" instrument_node=""> 200% of your daily vitamin C requirement</span></a><span data-dcnode-id="1448" instrument_node="">, this simple little fruit is packed with nutrients. Vitamin C’s antioxidant properties mean this fruit will work to protect you against cell-damaging free radicals. Citrus fruits have also been linked with </span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whfoods.com/genpage.php%3Ftname%3Dfoodspice%26dbid%3D37" rel="noopener" target="_blank"><span data-dcnode-id="1447" instrument_node="">helping prevent certain cancers and cardiovascular disease</span></a><span data-dcnode-id="1445" instrument_node="">.</span></p><span data-dcnode-id="1443" instrument_node=""> </span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Oranges are also a great source of calcium and iron, and juice concentrates are often fortified with additional calcium to give you even more bang for your buck.</span></p></div><span data-dcnode-id="1439" instrument_node=""> </span><h2 data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">The Top 18 Animal-Based Sources of Calcium</span></h2><span data-dcnode-id="1436" instrument_node=""> </span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Humans have been eating dairy products for over 7,000 years.</span></p><span data-dcnode-id="1433" instrument_node=""> </span><p data-dcnode-id="1426"><span data-dcnode-id="1432" instrument_node="">According to research, </span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/news/pottery-shards-put-a-date-on-africa-s-dairying-1.10863%23/ref-link-2" rel="noopener" target="_blank"><span data-dcnode-id="1431" instrument_node="">yogurt was the first milk product eaten</span></a><span data-dcnode-id="1429" instrument_node="">, and began in North Africa and Europe, initiating a genetic change to digest and absorb it. Dairy is still a great option for those who tolerate it and choose to eat it. The controversy over whether it is good for your bones is clarified here: </span><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.algaecal.com/expert-insights/debunking-the-milk-and-osteoporosis-myth/"><span data-dcnode-id="1428" instrument_node="">Debunking the Milk and Osteoporosis Myth </span></a></p><span data-dcnode-id="1425" instrument_node=""> </span><p data-dcnode-id="1420"><span data-dcnode-id="1424" instrument_node="">Dairy foods — milk, cheese, yogurt, butter, whey protein — have been </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milk.procon.org/view.timeline.php%3FtimelineID%3D000018" rel="noopener" target="_blank"><span data-dcnode-id="1423" instrument_node="">promoted by governments</span></a><span data-dcnode-id="1421" instrument_node=""> for their calcium content since the 1940s. Canada’s Food Guide and the US’s Food Pyramid emphasize dairy as an entire food group partly for this reason. How much calcium can you get from dairy and other animal-based products? Take a look at the list below (from highest to lowest in calcium).</span></p><span data-dcnode-id="1419" instrument_node=""> </span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Here, we offer a little more information about the best animal sources:</span></p><span data-dcnode-id="1416" instrument_node=""> </span><span data-dcnode-id="1413" instrument_node=""> </span><span data-dcnode-id="1410" instrument_node=""> </span><span data-dcnode-id="1405" instrument_node=""> </span><span data-dcnode-id="1402" instrument_node=""> </span><span -id="1341" instrument_node="">300 mg</span></td><td data-dcnode-id="1337" data-v-2020dc21=""><span data-dcnode-id="1338" instrument_node="">1 cup</span></td></tr><tr data-dcnode-id="1326" data-v-2020dc21=""><td data-dcnode-id="1333" data-v-2020dc21=""><span data-dcnode-id="1334" instrument_node="">Yogurt</span></td><td data-dcnode-id="1330" data-v-2020dc21=""><span data-dcnode-id="1331" instrument_node="">285-448mg</span></td><td data-dcnode-id="1327" data-v-2020dc21=""><span data-dcnode-id="1328" instrument_node="">1&nbsp; cup</span></td></tr><tr data-dcnode-id="1316" data-v-2020dc21=""><td data-dcnode-id="1323" data-v-2020dc21=""><span data-dcnode-id="1324" instrument_node="">Sockeye salmon, canned with bones</span></td><td data-dcnode-id="1320" data-v-2020dc21=""><span data-dcnode-id="1321" instrument_node="">239 mg</span></td><td data-dcnode-id="1317" data-v-2020dc21=""><span data-dcnode-id="1318" instrument_node="">100g</span></td></tr><tr data-dcnode-id="1306" data-v-2020dc21=""><td data-dcnode-id="1313" data-v-2020dc21=""><span data-dcnode-id="1314" instrument_node="">Cottage Cheese</span></td><td data-dcnode-id="1310" data-v-2020dc21=""><span data-dcnode-id="1311" instrument_node="">88 mg</span></td><td data-dcnode-id="1307" data-v-2020dc21=""><span data-dcnode-id="1308" instrument_node="">100 g</span></td></tr><tr data-dcnode-id="1296" data-v-2020dc21=""><td data-dcnode-id="1303" data-v-2020dc21=""><span data-dcnode-id="1304" instrument_node="">Chicken Feet</span></td><td data-dcnode-id="1300" data-v-2020dc21=""><span data-dcnode-id="1301" instrument_node="">88 mg</span></td><td data-dcnode-id="1297" data-v-2020dc21=""><span data-dcnode-id="1298" instrument_node="">100 g</span></td></tr><tr data-dcnode-id="1286" data-v-2020dc21=""><td data-dcnode-id="1293" data-v-2020dc21=""><span data-dcnode-id="1294" instrument_node="">Mackerel</span></td><td data-dcnode-id="1290" data-v-2020dc21=""><span data-dcnode-id="1291" instrument_node="">71 mg</span></td><td data-
