node-id="403" instrument_node="">Books</span></span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-370" data-dcnode-id="396" id="menu-item-370"><a data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//essiacfacts.com/buying-essiac-tea-in-bulk/"><span class="menu-text" data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Buy</span></span></a></li><li class="fusion-custom-menu-item fusion-main-menu-search" data-dcnode-id="393"><a class="fusion-main-menu-icon" data-dcnode-id="395"></a><div class="fusion-custom-menu-item-contents" data-dcnode-id="394"></div></li></ul></div><div class="fusion-mobile-nav-holder" data-dcnode-id="390"></div></div></div></div><div class="fusion-clearfix" data-dcnode-id="386"></div></div><div data-dcnode-id="384" id="sliders-container"></div><div class="fusion-page-title-bar fusion-page-title-bar-none fusion-page-title-bar-left" data-dcnode-id="378"><div class="fusion-page-title-row" data-dcnode-id="379"><div class="fusion-page-title-wrapper" data-dcnode-id="380"><div class="fusion-page-title-captions" data-dcnode-id="381"><h1 class="entry-title" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Turkey Rhubarb for Health</span></h1></div></div></div></div><div class="clearfix" data-dcnode-id="57" id="main" style=""><div class="fusion-row" data-dcnode-id="58" style=""><div data-dcnode-id="204" id="content" style="float: left;"><div class="post post-212 type-post status-publish format-standard has-post-thumbnail hentry category-herbs" data-dcnode-id="205" id="post-212"><h2 class="entry-title" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Turkey Rhubarb for Health</span></h2><div class="post-content" data-dcnode-id="302"><p data-dcnode-id="369"><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">
</span><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">
</span><br data-dcnode-id="371"><span data-dcnode-id="370" instrument_node=""> </span></p><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">While the stalks of rhubarb plants are commonly used for food in various parts of the world, the roots of the turkey rhubarb (rheum palmatum) plant have been one of the most widely used herbs in Chinese traditional and alternative/complementary medicine for centuries. It is used for a variety of health conditions, including:</span></p><ul data-dcnode-id="350"><li data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Cancer</span></li><li data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Menopausal symptoms</span></li><li data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Gastrointestinal Disturbances</span></li><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Hypertension</span></li><li data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">High cholesterol</span></li><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Peptic ulcers</span></li><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Burns</span></li><li data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Fever</span></li></ul><h2 data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">How does it work?</span></h2><p data-dcnode-id="343"><span data-dcnode-id="347" instrument_node="">The ability of turkey rhubarb root to help alleviate the symptoms of these conditions is derived from the various biochemical compounds that can be extracted from the plant. These molecules include </span><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17022020"><span data-dcnode-id="346" instrument_node="">anthraquinones</span></a><span data-dcnode-id="344" instrument_node="">, tannins, calcium oxalate, and fatty acids, among others.</span></p><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">The anthraquinones and tannins have antioxidant and anti-inflammatory effects, while the anthraquinones, in particular, are vital to rhubarb’s role in adjunctive cancer treatment, as discussed later. Regarding use for gastrointestinal upset, rhubarb can be used to treat either diarrhea or constipation, due to its differential dose-dependent effects. At very low doses, the tannins in rhubarb cause constipation, which is helpful for those with diarrhea; on the other side, the metabolites of certain anthraquinones cause gastrointestinal motility and thus diarrhea, which explains rhubarb root’s usefulness for constipated individuals.</span></p><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Interestingly, relief of menopausal symptoms is the most research-supported use of rhubarb root. A randomized, double-blinded, placebo-controlled clinical trial published in 2006 followed 109 perimenopausal women for 12 weeks after beginning a regimen of rhubarb; results showed significant decreases in menopausal symptoms, especially the frequency and severity of hot flashes.</span></p><p data-dcnode-id="337"><img alt="turkey rhubarb" class="aligncenter size-full wp-image-1538" data-dcnode-id="338" height="471" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//essiacfacts.com/wp-content/uploads/2015/03/turkey-rhubarb-1.jpg&amp;raw" width="500"></p><h2 data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Anti-Cancer Properties of Turkish Rhubarb Root</span></h2><p data-dcnode-id="327"><span data-dcnode-id="334" instrument_node="">Several of the molecules available from rhubarb root have potential effects on cancer cells. These effects have been observed on cells in the laboratory and in mice, but not in humans with active disease. As stated, the general anti-inflammatory and antioxidant effects of anthraquinones and tannins have cancer-fighting roles. In addition, though, anthraquinones have specific tumor cell killing capabilities. The most highly concentrated anthraquinone in rhubarb root, </span><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emodin"><span data-dcnode-id="333" instrument_node="">emodin</span></a><span data-dcnode-id="331" instrument_node="">, prevents cell-cycle progression and induces cell death in cancer cells, with preference for cancer cells over healthy cells. Emodin has also been said to prevent cancer metastasis or spreading of cancer to different organs. Another anthraquinone in rhubarb root, </span><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scielo.br/scielo.php%3Fpid%3DS0100-879X2012001100009%26script%3Dsci_arttext"><span data-dcnode-id="330" instrument_node="">rhein</span></a><span data-dcnode-id="328" instrument_node="">, inhibits glucose uptake in cancer cells and alters cancer cells’ cell membranes to induce death. Anthraquinones also can reduce radiation-induced lung damage while improving lung function in patients with lung cancer.</span></p><p data-dcnode-id="322"><span data-dcnode-id="326" instrument_node="">And while rhubarb has reported cancer-fighting abilities as an individual herb, it is also a component of the popular alternative cancer treatment </span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//essiacfacts.com/" title="Essiac Tea: Frequently Asked Questions"><span data-dcnode-id="325" instrument_node="">Essiac tea</span></a><span data-dcnode-id="323" instrument_node="">, along with sheep sorrel, burdock root, and slippery elm bark.</span></p><p data-dcnode-id="315"><br data-dcnode-id="321"><span data-dcnode-id="320" instrument_node="">
</span><br data-dcnode-id="319"><span data-dcnode-id="318" instrument_node="">
</span><br data-dcnode-id="317"><span data-dcnode-id="316" instrument_node=""> </span></p><h2 data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Side Effects &amp; Warnings</span></h2><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">In general, rhubarb root is considered safe in moderate doses. Side effects of rhubarb root include abdominal discomfort, nausea/vomiting, diarrhea, severe allergic reaction, and kidney and liver damage. If diarrhea is severe, dangerously low levels of potassium can occur.</span></p><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Rhubarb root can also interact with different medications prescribed by a physician. Digoxin, a drug used for heart failure, can lower levels of potassium. Since rhubarb can also lead to low potassium via its laxative effect, one must exercise particular caution when using rhubarb in conjunction with digoxin. Also, rhubarb increases the activity of certain liver enzymes that are involved in the metabolism of a variety of medications, including some antibiotics, cholesterol-lowering medications, antihistamines, and some drugs used for cancer and transplant patients.</span></p><h2 data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Contraindications</span></h2><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">As rhubarb root contains high levels of oxalic acid, those with history of kidney stones should refrain from using this herb. Alternatively, though, one can purchase commercial rhubarb products that have been processed to remove oxalic acid. There is also no maximum safe dose that can be recommended for pregnant or breastfeeding women, children, or people with significant liver or kidney disease. Pregnant women should especially avoid rhubarb supplementation because it can cause uterine contractions. In addition, rhubarb has some estrogen-like activity and should be used with caution in people with estrogen-responsive cancers, such as breast cancer.</span></p><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Turkish Rhubarb root is one of the most commonly used herbal supplements and has been used for a variety of medical conditions since ancient times. But though it is regarded as generally safe, it remains important to educate oneself about the potential side effects and contraindications to using rhubarb root, as with all nutritional supplements.</span></p></div><div class="fusion-meta-info" data-dcnode-id="280"><div class="fusion-meta-info-wrapper" data-dcnode-id="281"><span data-dcnode-id="301" instrument_node="">
