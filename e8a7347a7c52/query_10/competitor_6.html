data-dcnode-id="7923"><span data-dcnode-id="7924" instrument_node="">December 2021</span></span><span data-dcnode-id="7922" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="7914" instrument_node="">
</span><p data-dcnode-id="7870"><span data-dcnode-id="7913" instrument_node="">Antioxidants are used as </span><a data-dcnode-id="7911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_additive" title="Food additive"><span data-dcnode-id="7912" instrument_node="">food additives</span></a><span data-dcnode-id="7910" instrument_node=""> to help </span><a data-dcnode-id="7908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Preservative" title="Preservative"><span data-dcnode-id="7909" instrument_node="">guard against food deterioration</span></a><span data-dcnode-id="7907" instrument_node="">. Exposure to oxygen and sunlight are the two main factors in the oxidation of food, so food is preserved by keeping in the dark and sealing it in containers or even coating it in wax, as with cucumbers. However, as oxygen is also important for plant </span><a data-dcnode-id="7905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Respiration_%28physiology%29" title="Respiration (physiology)"><span data-dcnode-id="7906" instrument_node="">respiration</span></a><span data-dcnode-id="7904" instrument_node="">, storing plant materials in </span><a data-dcnode-id="7902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anaerobic_organism%23Metabolism" title="Anaerobic organism"><span data-dcnode-id="7903" instrument_node="">anaerobic</span></a><span data-dcnode-id="7901" instrument_node=""> conditions produces unpleasant flavors and unappealing colors.</span><sup class="reference" data-dcnode-id="7898" id="cite_ref-135"><a data-dcnode-id="7899" href="#cite_note-135"><span data-dcnode-id="7900" instrument_node="">[135]</span></a></sup><span data-dcnode-id="7897" instrument_node=""> Consequently, packaging of fresh fruits and vegetables contains an ~8% oxygen atmosphere. Antioxidants are an especially important class of preservatives as, unlike bacterial or </span><a data-dcnode-id="7895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fungus" title="Fungus"><span data-dcnode-id="7896" instrument_node="">fungal</span></a><span data-dcnode-id="7894" instrument_node=""> spoilage, oxidation reactions still occur relatively rapidly in frozen or refrigerated food.</span><sup class="reference" data-dcnode-id="7891" id="cite_ref-136"><a data-dcnode-id="7892" href="#cite_note-136"><span data-dcnode-id="7893" instrument_node="">[136]</span></a></sup><span data-dcnode-id="7890" instrument_node=""> These preservatives include natural antioxidants such as ascorbic acid (AA, E300) and tocopherols (E306), as well as synthetic antioxidants such as </span><a data-dcnode-id="7888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Propyl_gallate" title="Propyl gallate"><span data-dcnode-id="7889" instrument_node="">propyl gallate</span></a><span data-dcnode-id="7887" instrument_node=""> (PG, E310), </span><a data-dcnode-id="7885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tert-Butylhydroquinone" title="Tert-Butylhydroquinone"><span data-dcnode-id="7886" instrument_node="">tertiary butylhydroquinone</span></a><span data-dcnode-id="7884" instrument_node=""> (TBHQ), </span><a data-dcnode-id="7882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Butylated_hydroxyanisole" title="Butylated hydroxyanisole"><span data-dcnode-id="7883" instrument_node="">butylated hydroxyanisole</span></a><span data-dcnode-id="7881" instrument_node=""> (BHA, E320) and </span><a data-dcnode-id="7879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Butylated_hydroxytoluene" title="Butylated hydroxytoluene"><span data-dcnode-id="7880" instrument_node="">butylated hydroxytoluene</span></a><span data-dcnode-id="7878" instrument_node=""> (BHT, E321).</span><sup class="reference" data-dcnode-id="7875" id="cite_ref-137"><a data-dcnode-id="7876" href="#cite_note-137"><span data-dcnode-id="7877" instrument_node="">[137]</span></a></sup><sup class="reference" data-dcnode-id="7872" id="cite_ref-138"><a data-dcnode-id="7873" href="#cite_note-138"><span data-dcnode-id="7874" instrument_node="">[138]</span></a></sup><span data-dcnode-id="7871" instrument_node="">
</span></p><p data-dcnode-id="7831"><span data-dcnode-id="7869" instrument_node="">The most common molecules attacked by oxidation are unsaturated fats; oxidation causes them to turn </span><a data-dcnode-id="7867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rancidification" title="Rancidification"><span data-dcnode-id="7868" instrument_node="">rancid</span></a><span data-dcnode-id="7866" instrument_node="">.</span><sup class="reference" data-dcnode-id="7863" id="cite_ref-139"><a data-dcnode-id="7864" href="#cite_note-139"><span data-dcnode-id="7865" instrument_node="">[139]</span></a></sup><span data-dcnode-id="7862" instrument_node=""> Since oxidized lipids are often discolored and usually have unpleasant tastes such as metallic or </span><a data-dcnode-id="7860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sulfur" title="Sulfur"><span data-dcnode-id="7861" instrument_node="">sulfurous</span></a><span data-dcnode-id="7859" instrument_node=""> flavors, it is important to avoid oxidation in fat-rich foods. Thus, these foods are rarely preserved by drying; instead, they are preserved by </span><a class="mw-redirect" data-dcnode-id="7857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smoking_%28cooking_technique%29" title="Smoking (cooking technique)"><span data-dcnode-id="7858" instrument_node="">smoking</span></a><span data-dcnode-id="7856" instrument_node="">, </span><a data-dcnode-id="7854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salting_%28food%29" title="Salting (food)"><span data-dcnode-id="7855" instrument_node="">salting</span></a><span data-dcnode-id="7853" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="7851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fermentation_%28food%29" title="Fermentation (food)"><span data-dcnode-id="7852" instrument_node="">fermenting</span></a><span data-dcnode-id="7850" instrument_node="">. Even less fatty foods such as fruits are sprayed with sulfurous antioxidants prior to air drying. Oxidation is often catalyzed by metals, which is why fats such as butter should never be wrapped in </span><a data-dcnode-id="7848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aluminium_foil" title="Aluminium foil"><span data-dcnode-id="7849" instrument_node="">aluminium foil</span></a><span data-dcnode-id="7847" instrument_node=""> or kept in metal containers. Some fatty foods such as olive oil are partially protected from oxidation by their natural content of antioxidants, but remain sensitive to photooxidation.</span><sup class="reference" data-dcnode-id="7844" id="cite_ref-140"><a data-dcnode-id="7845" href="#cite_note-140"><span data-dcnode-id="7846" instrument_node="">[140]</span></a></sup><span data-dcnode-id="7843" instrument_node=""> Antioxidant preservatives are also added to fat based cosmetics such as lipstick and </span><a data-dcnode-id="7841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moisturizer" title="Moisturizer"><span data-dcnode-id="7842" instrument_node="">moisturizers</span></a><span data-dcnode-id="7840" instrument_node=""> to prevent rancidity.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7833" style="white-space:nowrap;"><span data-dcnode-id="7839" instrument_node="">[</span><i data-dcnode-id="7835"><a data-dcnode-id="7836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7837" title="This claim needs references to reliable sources. (January 2021)"><span data-dcnode-id="7838" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7834" instrument_node="">]</span></sup><span data-dcnode-id="7832" instrument_node="">
</span></p><span data-dcnode-id="7830" instrument_node="">
</span><h3 data-dcnode-id="7820"><span class="mw-headline" data-dcnode-id="7828" id="Industrial_uses"><span data-dcnode-id="7829" instrument_node="">Industrial uses</span></span><span class="mw-editsection" data-dcnode-id="7821"><span class="mw-editsection-bracket" data-dcnode-id="7826"><span data-dcnode-id="7827" instrument_node="">[</span></span><a data-dcnode-id="7824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D17" title="Edit section: Industrial uses"><span data-dcnode-id="7825" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7822"><span data-dcnode-id="7823" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7819" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7804"><div class="thumbinner" data-dcnode-id="7805" style="width:252px;"><a class="image" data-dcnode-id="7817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAntioxidant.png"><img alt="" class="thumbimage" data-dcnode-id="7818" data-file-height="941" data-file-width="1437" decoding="async" height="164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/49/Antioxidant.png/250px-Antioxidant.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/49/Antioxidant.png/375px-Antioxidant.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/49/Antioxidant.png/500px-Antioxidant.png 2x" width="250"></a><span data-dcnode-id="7816" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7806"><div class="magnify" data-dcnode-id="7814"><a class="internal" data-dcnode-id="7815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAntioxidant.png" title="Enlarge"></a></div><span data-dcnode-id="7813" instrument_node="">Substituted </span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phenols" title="Phenols"><span data-dcnode-id="7812" instrument_node="">phenols</span></a><span data-dcnode-id="7810" instrument_node=""> and derivatives of </span><a data-dcnode-id="7808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/P-Phenylenediamine" title="P-Phenylenediamine"><span data-dcnode-id="7809" instrument_node="">phenylenediamine</span></a><span data-dcnode-id="7807" instrument_node=""> are common antioxidants used to inhibit gum formation in gasoline (petrol).</span></div></div></div><span data-dcnode-id="7803" instrument_node="">
</span><p data-dcnode-id="7784"><span data-dcnode-id="7802" instrument_node="">Antioxidants are frequently added to industrial products. A common use is as </span><a class="mw-redirect" data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gasoline_additive" title="Gasoline additive"><span data-dcnode-id="7801" instrument_node="">stabilizers</span></a><span data-dcnode-id="7799" instrument_node=""> in </span><a data-dcnode-id="7797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fuel" title="Fuel"><span data-dcnode-id="7798" instrument_node="">fuels</span></a><span data-dcnode-id="7796" instrument_node=""> and </span><a data-dcnode-id="7794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lubricant" title="Lubricant"><span data-dcnode-id="7795" instrument_node="">lubricants</span></a><span data-dcnode-id="7793" instrument_node=""> to prevent oxidation, and in gasolines to prevent the polymerization that leads to the formation of engine-fouling residues.</span><sup class="reference" data-dcnode-id="7790" id="cite_ref-141"><a data-dcnode-id="7791" href="#cite_note-141"><span data-dcnode-id="7792" instrument_node="">[141]</span></a></sup><span data-dcnode-id="7789" instrument_node=""> In 2014, the worldwide market for natural and synthetic antioxidants was US$2.25 billion with a forecast of growth to $3.25 billion by 2020.</span><sup class="reference" data-dcnode-id="7786" id="cite_ref-142"><a data-dcnode-id="7787" href="#cite_note-142"><span data-dcnode-id="7788" instrument_node="">[142]</span></a></sup><span data-dcnode-id="7785" instrument_node="">
</span></p><p data-dcnode-id="7713"><span data-dcnode-id="7783" instrument_node="">Antioxidant </span><a data-dcnode-id="7781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polymer_stabilizers" title="Polymer stabilizers"><span data-dcnode-id="7782" instrument_node="">polymer stabilizers</span></a><span data-dcnode-id="7780" instrument_node=""> are widely used to prevent the degradation of </span><a data-dcnode-id="7778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polymer" title="Polymer"><span data-dcnode-id="7779" instrument_node="">polymers</span></a><span data-dcnode-id="7777" instrument_node=""> such as rubbers, plastics and </span><a data-dcnode-id="7775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adhesive" title="Adhesive"><span data-dcnode-id="7776" instrument_node="">adhesives</span></a><span data-dcnode-id="7774" instrument_node=""> that causes a loss of strength and flexibility in these materials.</span><sup class="reference" data-dcnode-id="7771" id="cite_ref-143"><a data-dcnode-id="7772" href="#cite_note-143"><span data-dcnode-id="7773" instrument_node="">[143]</span></a></sup><span data-dcnode-id="7770" instrument_node=""> Polymers containing </span><a data-dcnode-id="7768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Double_bond" title="Double bond"><span data-dcnode-id="7769" instrument_node="">double bonds</span></a><span data-dcnode-id="7767" instrument_node=""> in their main chains, such as </span><a data-dcnode-id="7765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_rubber" title="Natural rubber"><span data-dcnode-id="7766" instrument_node="">natural rubber</span></a><span data-dcnode-id="7764" instrument_node=""> and </span><a data-dcnode-id="7762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polybutadiene" title="Polybutadiene"><span data-dcnode-id="7763" instrument_node="">polybutadiene</span></a><span data-dcnode-id="7761" instrument_node="">, are especially susceptible to </span><a class="mw-redirect" data-dcnode-id="7759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxidation" title="Oxidation"><span data-dcnode-id="7760" instrument_node="">oxidation</span></a><span data-dcnode-id="7758" instrument_node=""> and </span><a data-dcnode-id="7756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ozonolysis" title="Ozonolysis"><span data-dcnode-id="7757" instrument_node="">ozonolysis</span></a><span data-dcnode-id="7755" instrument_node="">. They can be protected by </span><a data-dcnode-id="7753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antiozonant" title="Antiozonant"><span data-dcnode-id="7754" instrument_node="">antiozonants</span></a><span data-dcnode-id="7752" instrument_node="">. Solid polymer products start to crack on exposed surfaces as the material degrades and the chains break. The mode of cracking varies between oxygen and </span><a data-dcnode-id="7750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ozone" title="Ozone"><span data-dcnode-id="7751" instrument_node="">ozone</span></a><span data-dcnode-id="7749" instrument_node=""> attack, the former causing a "crazy paving" effect, while ozone attack produces deeper cracks aligned at right angles to the tensile strain in the product. Oxidation and </span><a class="mw-redirect" data-dcnode-id="7747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UV_degradation" title="UV degradation"><span data-dcnode-id="7748" instrument_node="">UV degradation</span></a><span data-dcnode-id="7746" instrument_node=""> are also frequently linked, mainly because </span><a class="mw-redirect" data-dcnode-id="7744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UV_radiation" title="UV radiation"><span data-dcnode-id="7745" instrument_node="">UV radiation</span></a><span data-dcnode-id="7743" instrument_node=""> creates free radicals by bond breakage. The free radicals then react with oxygen to produce </span><a class="mw-redirect" data-dcnode-id="7741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peroxy" title="Peroxy"><span data-dcnode-id="7742" instrument_node="">peroxy</span></a><span data-dcnode-id="7740" instrument_node=""> radicals which cause yet further damage, often in a </span><a data-dcnode-id="7738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chain_reaction" title="Chain reaction"><span data-dcnode-id="7739" instrument_node="">chain reaction</span></a><span data-dcnode-id="7737" instrument_node="">. Other polymers susceptible to oxidation include </span><a data-dcnode-id="7735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polypropylene" title="Polypropylene"><span data-dcnode-id="7736" instrument_node="">polypropylene</span></a><span data-dcnode-id="7734" instrument_node=""> and </span><a data-dcnode-id="7732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyethylene" title="Polyethylene"><span data-dcnode-id="7733" instrument_node="">polyethylene</span></a><span data-dcnode-id="7731" instrument_node="">. The former is more sensitive owing to the presence of </span><a class="mw-redirect" data-dcnode-id="7729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secondary_carbon_atom" title="Secondary carbon atom"><span data-dcnode-id="7730" instrument_node="">secondary carbon atoms</span></a><span data-dcnode-id="7728" instrument_node=""> present in every repeat unit. Attack occurs at this point because the free radical formed is more stable than one formed on a </span><a class="mw-redirect" data-dcnode-id="7726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primary_carbon_atom" title="Primary carbon atom"><span data-dcnode-id="7727" instrument_node="">primary carbon atom</span></a><span data-dcnode-id="7725" instrument_node="">. Oxidation of polyethylene tends to occur at weak links in the chain, such as branch points in </span><a data-dcnode-id="7723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Low-density_polyethylene" title="Low-density polyethylene"><span data-dcnode-id="7724" instrument_node="">low-density polyethylene</span></a><span data-dcnode-id="7722" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7715" style="white-space:nowrap;"><span data-dcnode-id="7721" instrument_node="">[</span><i data-dcnode-id="7717"><a data-dcnode-id="7718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7719" title="This claim needs references to reliable sources. (January 2021)"><span data-dcnode-id="7720" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7716" instrument_node="">]</span></sup><span data-dcnode-id="7714" instrument_node="">
</span></p><span data-dcnode-id="7712" instrument_node="">

</span><p data-dcnode-id="7541"><span data-dcnode-id="7557" instrument_node="">Antioxidant vitamins are found in vegetables, fruits, eggs, legumes and nuts. Vitamins A, C, and E can be destroyed by long-term storage or prolonged cooking.</span><sup class="reference" data-dcnode-id="7554" id="cite_ref-145"><a data-dcnode-id="7555" href="#cite_note-145"><span data-dcnode-id="7556" instrument_node="">[145]</span></a></sup><span data-dcnode-id="7553" instrument_node=""> The effects of cooking and food processing are complex, as these processes can also increase the </span><a data-dcnode-id="7551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bioavailability" title="Bioavailability"><span data-dcnode-id="7552" instrument_node="">bioavailability</span></a><span data-dcnode-id="7550" instrument_node=""> of antioxidants, such as some carotenoids in vegetables.</span><sup class="reference" data-dcnode-id="7547" id="cite_ref-146"><a data-dcnode-id="7548" href="#cite_note-146"><span data-dcnode-id="7549" instrument_node="">[146]</span></a></sup><span data-dcnode-id="7546" instrument_node=""> Processed food contains fewer antioxidant vitamins than fresh and uncooked foods, as preparation exposes food to heat and oxygen.</span><sup class="reference" data-dcnode-id="7543" id="cite_ref-147"><a data-dcnode-id="7544" href="#cite_note-147"><span data-dcnode-id="7545" instrument_node="">[147]</span></a></sup><span data-dcnode-id="7542" instrument_node="">

</span></td></tr></tbody></table><span data-dcnode-id="7475" instrument_node="">
</span><p data-dcnode-id="7436"><span data-dcnode-id="7474" instrument_node="">Other antioxidants are not obtained from the diet, but instead are made in the body. For example, </span><a data-dcnode-id="7472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubiquinol" title="Ubiquinol"><span data-dcnode-id="7473" instrument_node="">ubiquinol</span></a><span data-dcnode-id="7471" instrument_node=""> (coenzyme Q) is poorly absorbed from the gut and is made through the </span><a data-dcnode-id="7469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mevalonate_pathway" title="Mevalonate pathway"><span data-dcnode-id="7470" instrument_node="">mevalonate pathway</span></a><span data-dcnode-id="7468" instrument_node="">.</span><sup class="reference" data-dcnode-id="7465" id="cite_ref-Turunen_63-1"><a data-dcnode-id="7466" href="#cite_note-Turunen-63"><span data-dcnode-id="7467" instrument_node="">[63]</span></a></sup><span data-dcnode-id="7464" instrument_node=""> Another example is </span><a data-dcnode-id="7462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione" title="Glutathione"><span data-dcnode-id="7463" instrument_node="">glutathione</span></a><span data-dcnode-id="7461" instrument_node="">, which is made from amino acids. As any glutathione in the gut is broken down to free cysteine, </span><a data-dcnode-id="7459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glycine" title="Glycine"><span data-dcnode-id="7460" instrument_node="">glycine</span></a><span data-dcnode-id="7458" instrument_node=""> and </span><a data-dcnode-id="7456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutamic_acid" title="Glutamic acid"><span data-dcnode-id="7457" instrument_node="">glutamic acid</span></a><span data-dcnode-id="7455" instrument_node=""> before being absorbed, even large oral intake has little effect on the concentration of glutathione in the body.</span><sup class="reference" data-dcnode-id="7452" id="cite_ref-150"><a data-dcnode-id="7453" href="#cite_note-150"><span data-dcnode-id="7454" instrument_node="">[150]</span></a></sup><sup class="reference" data-dcnode-id="7449" id="cite_ref-151"><a data-dcnode-id="7450" href="#cite_note-151"><span data-dcnode-id="7451" instrument_node="">[151]</span></a></sup><span data-dcnode-id="7448" instrument_node=""> Although large amounts of sulfur-containing amino acids such as </span><a data-dcnode-id="7446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acetylcysteine" title="Acetylcysteine"><span data-dcnode-id="7447" instrument_node="">acetylcysteine</span></a><span data-dcnode-id="7445" instrument_node=""> can increase glutathione,</span><sup class="reference" data-dcnode-id="7442" id="cite_ref-Dodd_152-0"><a data-dcnode-id="7443" href="#cite_note-Dodd-152"><span data-dcnode-id="7444" instrument_node="">[152]</span></a></sup><span data-dcnode-id="7441" instrument_node=""> no evidence exists that eating high levels of these glutathione precursors is beneficial for healthy adults.</span><sup class="reference" data-dcnode-id="7438" id="cite_ref-153"><a data-dcnode-id="7439" href="#cite_note-153"><span data-dcnode-id="7440" instrument_node="">[153]</span></a></sup><span data-dcnode-id="7437" instrument_node="">
</span></p><span data-dcnode-id="7435" instrument_node="">
</span><h3 data-dcnode-id="7425"><span class="mw-headline" data-dcnode-id="7433" id="Measurement_and_invalidation_of_ORAC"><span data-dcnode-id="7434" instrument_node="">Measurement and invalidation of ORAC</span></span><span class="mw-editsection" data-dcnode-id="7426"><span class="mw-editsection-bracket" data-dcnode-id="7431"><span data-dcnode-id="7432" instrument_node="">[</span></span><a data-dcnode-id="7429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D19" title="Edit section: Measurement and invalidation of ORAC"><span data-dcnode-id="7430" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7427"><span data-dcnode-id="7428" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7424" instrument_node="">
</span><p data-dcnode-id="7385"><span data-dcnode-id="7423" instrument_node="">Measurement of polyphenol and carotenoid content in food is not a straightforward process, as antioxidants collectively are a diverse group of compounds with different reactivities to various reactive oxygen species. In </span><a data-dcnode-id="7421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_science" title="Food science"><span data-dcnode-id="7422" instrument_node="">food science</span></a><span data-dcnode-id="7420" instrument_node=""> analyses in vitro, the </span><a data-dcnode-id="7418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxygen_radical_absorbance_capacity" title="Oxygen radical absorbance capacity"><span data-dcnode-id="7419" instrument_node="">oxygen radical absorbance capacity</span></a><span data-dcnode-id="7417" instrument_node=""> (ORAC) was once an industry standard for estimating antioxidant strength of whole foods, juices and food additives, mainly from the presence of </span><a data-dcnode-id="7415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyphenol" title="Polyphenol"><span data-dcnode-id="7416" instrument_node="">polyphenols</span></a><span data-dcnode-id="7414" instrument_node="">.</span><sup class="reference" data-dcnode-id="7411" id="cite_ref-154"><a data-dcnode-id="7412" href="#cite_note-154"><span data-dcnode-id="7413" instrument_node="">[154]</span></a></sup><sup class="reference" data-dcnode-id="7408" id="cite_ref-155"><a data-dcnode-id="7409" href="#cite_note-155"><span data-dcnode-id="7410" instrument_node="">[155]</span></a></sup><span data-dcnode-id="7407" instrument_node=""> Earlier measurements and ratings by the </span><a data-dcnode-id="7405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_Agriculture" title="United States Department of Agriculture"><span data-dcnode-id="7406" instrument_node="">United States Department of Agriculture</span></a><span data-dcnode-id="7404" instrument_node=""> were withdrawn in 2012 as biologically irrelevant to human health, referring to an absence of physiological evidence for polyphenols having antioxidant properties </span><i data-dcnode-id="7401"><a data-dcnode-id="7402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In_vivo" title="In vivo"><span data-dcnode-id="7403" instrument_node="">in vivo</span></a></i><span data-dcnode-id="7400" instrument_node="">.</span><sup class="reference" data-dcnode-id="7397" id="cite_ref-USDAx_156-0"><a data-dcnode-id="7398" href="#cite_note-USDAx-156"><span data-dcnode-id="7399" instrument_node="">[156]</span></a></sup><span data-dcnode-id="7396" instrument_node=""> Consequently, the ORAC method, derived only from </span><i data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">in vitro</span></i><span data-dcnode-id="7393" instrument_node=""> experiments, is no longer considered relevant to human diets or </span><a data-dcnode-id="7391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biology" title="Biology"><span data-dcnode-id="7392" instrument_node="">biology</span></a><span data-dcnode-id="7390" instrument_node="">, as of 2010.</span><sup class="reference" data-dcnode-id="7387" id="cite_ref-USDAx_156-1"><a data-dcnode-id="7388" href="#cite_note-USDAx-156"><span data-dcnode-id="7389" instrument_node="">[156]</span></a></sup><span data-dcnode-id="7386" instrument_node="">
</span></p><p data-dcnode-id="7373"><span data-dcnode-id="7384" instrument_node="">Alternative in vitro measurements of antioxidant content in foods – also based on the presence of polyphenols – include the </span><a class="mw-redirect" data-dcnode-id="7382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Folin-Ciocalteu_reagent" title="Folin-Ciocalteu reagent"><span data-dcnode-id="7383" instrument_node="">Folin-Ciocalteu reagent</span></a><span data-dcnode-id="7381" instrument_node="">, and the </span><a data-dcnode-id="7379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trolox_equivalent_antioxidant_capacity" title="Trolox equivalent antioxidant capacity"><span data-dcnode-id="7380" instrument_node="">Trolox equivalent antioxidant capacity</span></a><span data-dcnode-id="7378" instrument_node=""> assay.</span><sup class="reference" data-dcnode-id="7375" id="cite_ref-157"><a data-dcnode-id="7376" href="#cite_note-157"><span data-dcnode-id="7377" instrument_node="">[157]</span></a></sup><span data-dcnode-id="7374" instrument_node="">
</span></p><span data-dcnode-id="7372" instrument_node="">
</span><h2 data-dcnode-id="7362"><span class="mw-headline" data-dcnode-id="7370" id="History"><span data-dcnode-id="7371" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="7363"><span class="mw-editsection-bracket" data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">[</span></span><a data-dcnode-id="7366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D20" title="Edit section: History"><span data-dcnode-id="7367" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7364"><span data-dcnode-id="7365" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7361" instrument_node="">
</span><p data-dcnode-id="7312"><span data-dcnode-id="7360" instrument_node="">As part of their adaptation from marine life, terrestrial plants began producing non-marine antioxidants such as </span><a class="mw-redirect" data-dcnode-id="7358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ascorbic_acid" title="Ascorbic acid"><span data-dcnode-id="7359" instrument_node="">ascorbic acid</span></a><span data-dcnode-id="7357" instrument_node=""> (</span><a data-dcnode-id="7355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_C" title="Vitamin C"><span data-dcnode-id="7356" instrument_node="">vitamin C</span></a><span data-dcnode-id="7354" instrument_node="">), </span><a data-dcnode-id="7352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyphenol" title="Polyphenol"><span data-dcnode-id="7353" instrument_node="">polyphenols</span></a><span data-dcnode-id="7351" instrument_node=""> and </span><a data-dcnode-id="7349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tocopherol" title="Tocopherol"><span data-dcnode-id="7350" instrument_node="">tocopherols</span></a><span data-dcnode-id="7348" instrument_node="">. The evolution of </span><a class="mw-redirect" data-dcnode-id="7346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angiosperm" title="Angiosperm"><span data-dcnode-id="7347" instrument_node="">angiosperm</span></a><span data-dcnode-id="7345" instrument_node=""> plants between 50 and 200 million years ago resulted in the development of many antioxidant pigments&nbsp;– particularly during the </span><a data-dcnode-id="7343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jurassic" title="Jurassic"><span data-dcnode-id="7344" instrument_node="">Jurassic</span></a><span data-dcnode-id="7342" instrument_node=""> period&nbsp;– as chemical defences against </span><a data-dcnode-id="7340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reactive_oxygen_species" title="Reactive oxygen species"><span data-dcnode-id="7341" instrument_node="">reactive oxygen species</span></a><span data-dcnode-id="7339" instrument_node=""> that are byproducts of </span><a data-dcnode-id="7337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photosynthesis" title="Photosynthesis"><span data-dcnode-id="7338" instrument_node="">photosynthesis</span></a><span data-dcnode-id="7336" instrument_node="">.</span><sup class="reference" data-dcnode-id="7333" id="cite_ref-158"><a data-dcnode-id="7334" href="#cite_note-158"><span data-dcnode-id="7335" instrument_node="">[158]</span></a></sup><span data-dcnode-id="7332" instrument_node=""> Originally, the term antioxidant specifically referred to a chemical that prevented the consumption of oxygen. In the late 19th and early 20th centuries, extensive study concentrated on the use of antioxidants in important industrial processes, such as the prevention of metal </span><a data-dcnode-id="7330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corrosion" title="Corrosion"><span data-dcnode-id="7331" instrument_node="">corrosion</span></a><span data-dcnode-id="7329" instrument_node="">, the </span><a data-dcnode-id="7327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sulfur_vulcanization" title="Sulfur vulcanization"><span data-dcnode-id="7328" instrument_node="">vulcanization</span></a><span data-dcnode-id="7326" instrument_node=""> of rubber, and the </span><a data-dcnode-id="7324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polymerization" title="Polymerization"><span data-dcnode-id="7325" instrument_node="">polymerization</span></a><span data-dcnode-id="7323" instrument_node=""> of fuels in the </span><a data-dcnode-id="7321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fouling" title="Fouling"><span data-dcnode-id="7322" instrument_node="">fouling</span></a><span data-dcnode-id="7320" instrument_node=""> of </span><a data-dcnode-id="7318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_combustion_engine" title="Internal combustion engine"><span data-dcnode-id="7319" instrument_node="">internal combustion engines</span></a><span data-dcnode-id="7317" instrument_node="">.</span><sup class="reference" data-dcnode-id="7314" id="cite_ref-159"><a data-dcnode-id="7315" href="#cite_note-159"><span data-dcnode-id="7316" instrument_node="">[159]</span></a></sup><span data-dcnode-id="7313" instrument_node="">
</span></p><p data-dcnode-id="7261"><span data-dcnode-id="7311" instrument_node="">Early research on the role of antioxidants in biology focused on their use in preventing the oxidation of </span><a class="mw-redirect" data-dcnode-id="7309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unsaturated_fat" title="Unsaturated fat"><span data-dcnode-id="7310" instrument_node="">unsaturated fats</span></a><span data-dcnode-id="7308" instrument_node="">, which is the cause of </span><a class="mw-redirect" data-dcnode-id="7306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rancidity" title="Rancidity"><span data-dcnode-id="7307" instrument_node="">rancidity</span></a><span data-dcnode-id="7305" instrument_node="">.</span><sup class="reference" data-dcnode-id="7302" id="cite_ref-160"><a data-dcnode-id="7303" href="#cite_note-160"><span data-dcnode-id="7304" instrument_node="">[160]</span></a></sup><span data-dcnode-id="7301" instrument_node=""> Antioxidant activity could be measured simply by placing the fat in a closed container with oxygen and measuring the rate of oxygen consumption. However, it was the identification of </span><a data-dcnode-id="7299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_C" title="Vitamin C"><span data-dcnode-id="7300" instrument_node="">vitamins C</span></a><span data-dcnode-id="7298" instrument_node=""> and </span><a data-dcnode-id="7296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_E" title="Vitamin E"><span data-dcnode-id="7297" instrument_node="">E</span></a><span data-dcnode-id="7295" instrument_node=""> as antioxidants that revolutionized the field and led to the realization of the importance of antioxidants in the biochemistry of </span><a data-dcnode-id="7293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organism" title="Organism"><span data-dcnode-id="7294" instrument_node="">living organisms</span></a><span data-dcnode-id="7292" instrument_node="">.</span><sup class="reference" data-dcnode-id="7289" id="cite_ref-161"><a data-dcnode-id="7290" href="#cite_note-161"><span data-dcnode-id="7291" instrument_node="">[161]</span></a></sup><sup class="reference" data-dcnode-id="7286" id="cite_ref-162"><a data-dcnode-id="7287" href="#cite_note-162"><span data-dcnode-id="7288" instrument_node="">[162]</span></a></sup><span data-dcnode-id="7285" instrument_node=""> The possible </span><a class="mw-redirect" data-dcnode-id="7283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mechanisms_of_action" title="Mechanisms of action"><span data-dcnode-id="7284" instrument_node="">mechanisms of action</span></a><span data-dcnode-id="7282" instrument_node=""> of antioxidants were first explored when it was recognized that a substance with anti-oxidative activity is likely to be one that is itself readily oxidized.</span><sup class="reference" data-dcnode-id="7279" id="cite_ref-163"><a data-dcnode-id="7280" href="#cite_note-163"><span data-dcnode-id="7281" instrument_node="">[163]</span></a></sup><span data-dcnode-id="7278" instrument_node=""> Research into how </span><a data-dcnode-id="7276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_E" title="Vitamin E"><span data-dcnode-id="7277" instrument_node="">vitamin E</span></a><span data-dcnode-id="7275" instrument_node=""> prevents the process of </span><a data-dcnode-id="7273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lipid_peroxidation" title="Lipid peroxidation"><span data-dcnode-id="7274" instrument_node="">lipid peroxidation</span></a><span data-dcnode-id="7272" instrument_node=""> led to the identification of antioxidants as reducing agents that prevent oxidative reactions, often by </span><a data-dcnode-id="7270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scavenger_%28chemistry%29" title="Scavenger (chemistry)"><span data-dcnode-id="7271" instrument_node="">scavenging</span></a><span data-dcnode-id="7269" instrument_node=""> </span><a data-dcnode-id="7267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reactive_oxygen_species" title="Reactive oxygen species"><span data-dcnode-id="7268" instrument_node="">reactive oxygen species</span></a><span data-dcnode-id="7266" instrument_node=""> before they can damage cells.</span><sup class="reference" data-dcnode-id="7263" id="cite_ref-164"><a data-dcnode-id="7264" href="#cite_note-164"><span data-dcnode-id="7265" instrument_node="">[164]</span></a></sup><span data-dcnode-id="7262" instrument_node="">
</span></p><span data-dcnode-id="7260" instrument_node="">
