</span><div class="thumb tright" data-dcnode-id="10292"><div class="thumbinner" data-dcnode-id="10293" style="width:252px;"><a class="image" data-dcnode-id="10301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGlutathione-skeletal.svg"><img alt="" class="thumbimage" data-dcnode-id="10302" data-file-height="160" data-file-width="512" decoding="async" height="78" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Glutathione-skeletal.svg/250px-Glutathione-skeletal.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Glutathione-skeletal.svg/375px-Glutathione-skeletal.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Glutathione-skeletal.svg/500px-Glutathione-skeletal.svg.png 2x" width="250"></a><span data-dcnode-id="10300" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="10294"><div class="magnify" data-dcnode-id="10298"><a class="internal" data-dcnode-id="10299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGlutathione-skeletal.svg" title="Enlarge"></a></div><span data-dcnode-id="10297" instrument_node="">Structure of the antioxidant, </span><a data-dcnode-id="10295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione" title="Glutathione"><span data-dcnode-id="10296" instrument_node="">glutathione</span></a></div></div></div><span data-dcnode-id="10291" instrument_node="">
</span><p data-dcnode-id="10257"><b data-dcnode-id="10289"><span data-dcnode-id="10290" instrument_node="">Antioxidants</span></b><span data-dcnode-id="10288" instrument_node=""> are </span><a data-dcnode-id="10286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemical_compound" title="Chemical compound"><span data-dcnode-id="10287" instrument_node="">compounds</span></a><span data-dcnode-id="10285" instrument_node=""> that inhibit </span><a data-dcnode-id="10283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redox" title="Redox"><span data-dcnode-id="10284" instrument_node="">oxidation</span></a><span data-dcnode-id="10282" instrument_node="">, a </span><a data-dcnode-id="10280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemical_reaction" title="Chemical reaction"><span data-dcnode-id="10281" instrument_node="">chemical reaction</span></a><span data-dcnode-id="10279" instrument_node=""> that can produce </span><a data-dcnode-id="10277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radical_%28chemistry%29" title="Radical (chemistry)"><span data-dcnode-id="10278" instrument_node="">free radicals</span></a><span data-dcnode-id="10276" instrument_node=""> and </span><a data-dcnode-id="10274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chain_reaction" title="Chain reaction"><span data-dcnode-id="10275" instrument_node="">chain reactions</span></a><span data-dcnode-id="10273" instrument_node=""> that may damage the </span><a data-dcnode-id="10271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cell_%28biology%29" title="Cell (biology)"><span data-dcnode-id="10272" instrument_node="">cells</span></a><span data-dcnode-id="10270" instrument_node=""> of organisms. Antioxidants such as </span><a data-dcnode-id="10268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thiol" title="Thiol"><span data-dcnode-id="10269" instrument_node="">thiols</span></a><span data-dcnode-id="10267" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="10265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ascorbic_acid" title="Ascorbic acid"><span data-dcnode-id="10266" instrument_node="">ascorbic acid</span></a><span data-dcnode-id="10264" instrument_node=""> (vitamin C) may act to inhibit these reactions. To balance </span><a data-dcnode-id="10262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxidative_stress" title="Oxidative stress"><span data-dcnode-id="10263" instrument_node="">oxidative stress</span></a><span data-dcnode-id="10261" instrument_node="">, plants and animals maintain complex systems of overlapping antioxidants, such as </span><a data-dcnode-id="10259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione" title="Glutathione"><span data-dcnode-id="10260" instrument_node="">glutathione</span></a><span data-dcnode-id="10258" instrument_node="">.
</span></p><p data-dcnode-id="10218"><span data-dcnode-id="10256" instrument_node="">The only </span><a data-dcnode-id="10254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diet_%28nutrition%29" title="Diet (nutrition)"><span data-dcnode-id="10255" instrument_node="">dietary</span></a><span data-dcnode-id="10253" instrument_node=""> antioxidants are </span><a data-dcnode-id="10251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin" title="Vitamin"><span data-dcnode-id="10252" instrument_node="">vitamins</span></a><span data-dcnode-id="10250" instrument_node=""> </span><a data-dcnode-id="10248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_A" title="Vitamin A"><span data-dcnode-id="10249" instrument_node="">A</span></a><span data-dcnode-id="10247" instrument_node="">, </span><a data-dcnode-id="10245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_C" title="Vitamin C"><span data-dcnode-id="10246" instrument_node="">C</span></a><span data-dcnode-id="10244" instrument_node="">, and </span><a data-dcnode-id="10242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_E" title="Vitamin E"><span data-dcnode-id="10243" instrument_node="">E</span></a><span data-dcnode-id="10241" instrument_node="">. The term </span><i data-dcnode-id="10239"><span data-dcnode-id="10240" instrument_node="">antioxidant</span></i><span data-dcnode-id="10238" instrument_node=""> is also used for </span><a class="mw-redirect" data-dcnode-id="10236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_chemical" title="Industrial chemical"><span data-dcnode-id="10237" instrument_node="">industrial chemicals</span></a><span data-dcnode-id="10235" instrument_node=""> added during manufacturing to prevent oxidation in </span><a data-dcnode-id="10233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Synthetic_rubber" title="Synthetic rubber"><span data-dcnode-id="10234" instrument_node="">synthetic rubber</span></a><span data-dcnode-id="10232" instrument_node="">, </span><a data-dcnode-id="10230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plastic" title="Plastic"><span data-dcnode-id="10231" instrument_node="">plastics</span></a><span data-dcnode-id="10229" instrument_node="">, and fuels, or as </span><a data-dcnode-id="10227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Preservative" title="Preservative"><span data-dcnode-id="10228" instrument_node="">preservatives</span></a><span data-dcnode-id="10226" instrument_node=""> in food and </span><a data-dcnode-id="10224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmetics" title="Cosmetics"><span data-dcnode-id="10225" instrument_node="">cosmetics</span></a><span data-dcnode-id="10223" instrument_node="">.</span><sup class="reference" data-dcnode-id="10220" id="cite_ref-Ullmann_1-0"><a data-dcnode-id="10221" href="#cite_note-Ullmann-1"><span data-dcnode-id="10222" instrument_node="">[1]</span></a></sup><span data-dcnode-id="10219" instrument_node="">
</span></p><p data-dcnode-id="10154"><span data-dcnode-id="10217" instrument_node="">While </span><a data-dcnode-id="10215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fruit" title="Fruit"><span data-dcnode-id="10216" instrument_node="">fruits</span></a><span data-dcnode-id="10214" instrument_node=""> and </span><a data-dcnode-id="10212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vegetable" title="Vegetable"><span data-dcnode-id="10213" instrument_node="">vegetables</span></a><span data-dcnode-id="10211" instrument_node=""> are rich sources of antioxidant vitamins and can be part of a </span><a data-dcnode-id="10209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Healthy_diet" title="Healthy diet"><span data-dcnode-id="10210" instrument_node="">healthy diet</span></a><span data-dcnode-id="10208" instrument_node="">, there is no clear evidence to indicate that plant-food consumption confers health benefits specifically because of antioxidant vitamins in such foods.</span><sup class="reference" data-dcnode-id="10205" id="cite_ref-nih_2-0"><a data-dcnode-id="10206" href="#cite_note-nih-2"><span data-dcnode-id="10207" instrument_node="">[2]</span></a></sup><span data-dcnode-id="10204" instrument_node=""> </span><a data-dcnode-id="10202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dietary_supplement" title="Dietary supplement"><span data-dcnode-id="10203" instrument_node="">Dietary supplements</span></a><span data-dcnode-id="10201" instrument_node=""> marketed as antioxidants have not been shown to improve health or prevent disease in humans.</span><sup class="reference" data-dcnode-id="10198" id="cite_ref-nih_2-1"><a data-dcnode-id="10199" href="#cite_note-nih-2"><span data-dcnode-id="10200" instrument_node="">[2]</span></a></sup><span data-dcnode-id="10197" instrument_node=""> According to some studies, supplements of </span><a class="mw-redirect" data-dcnode-id="10195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beta-carotene" title="Beta-carotene"><span data-dcnode-id="10196" instrument_node="">beta-carotene</span></a><span data-dcnode-id="10194" instrument_node="">, vitamin A, and vitamin E have no positive effect on </span><a data-dcnode-id="10192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mortality_rate" title="Mortality rate"><span data-dcnode-id="10193" instrument_node="">mortality rate</span></a><sup class="reference" data-dcnode-id="10189" id="cite_ref-3"><a data-dcnode-id="10190" href="#cite_note-3"><span data-dcnode-id="10191" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="10186" id="cite_ref-4"><a data-dcnode-id="10187" href="#cite_note-4"><span data-dcnode-id="10188" instrument_node="">[4]</span></a></sup><span data-dcnode-id="10185" instrument_node=""> or </span><a data-dcnode-id="10183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer" title="Cancer"><span data-dcnode-id="10184" instrument_node="">cancer</span></a><span data-dcnode-id="10182" instrument_node=""> risk.</span><sup class="reference" data-dcnode-id="10179" id="cite_ref-5"><a data-dcnode-id="10180" href="#cite_note-5"><span data-dcnode-id="10181" instrument_node="">[5]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="10172" style="white-space:nowrap;"><span data-dcnode-id="10178" instrument_node="">[</span><i data-dcnode-id="10174"><a data-dcnode-id="10175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="10176" title="Updated version https://www.ncbi.nlm.nih.gov/pubmed/32130738 (May 2020)"><span data-dcnode-id="10177" instrument_node="">needs update</span></span></a></i><span data-dcnode-id="10173" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="10169" id="cite_ref-6"><a data-dcnode-id="10170" href="#cite_note-6"><span data-dcnode-id="10171" instrument_node="">[6]</span></a></sup><span data-dcnode-id="10168" instrument_node=""> Additionally, supplementation with </span><a data-dcnode-id="10166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selenium" title="Selenium"><span data-dcnode-id="10167" instrument_node="">selenium</span></a><span data-dcnode-id="10165" instrument_node=""> or vitamin E does not reduce the risk of </span><a data-dcnode-id="10163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cardiovascular_disease" title="Cardiovascular disease"><span data-dcnode-id="10164" instrument_node="">cardiovascular disease</span></a><span data-dcnode-id="10162" instrument_node="">.</span><sup class="reference" data-dcnode-id="10159" id="cite_ref-7"><a data-dcnode-id="10160" href="#cite_note-7"><span data-dcnode-id="10161" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="10156" id="cite_ref-8"><a data-dcnode-id="10157" href="#cite_note-8"><span data-dcnode-id="10158" instrument_node="">[8]</span></a></sup><span data-dcnode-id="10155" instrument_node="">

</span><h3 data-dcnode-id="9916"><span class="mw-headline" data-dcnode-id="9924" id="Relation_to_diet"><span data-dcnode-id="9925" instrument_node="">Relation to diet</span></span><span class="mw-editsection" data-dcnode-id="9917"><span class="mw-editsection-bracket" data-dcnode-id="9922"><span data-dcnode-id="9923" instrument_node="">[</span></span><a data-dcnode-id="9920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D2" title="Edit section: Relation to diet"><span data-dcnode-id="9921" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9918"><span data-dcnode-id="9919" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9915" instrument_node="">
</span><p data-dcnode-id="9870"><span data-dcnode-id="9914" instrument_node="">Although certain levels of antioxidant </span><a class="mw-redirect" data-dcnode-id="9912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamins" title="Vitamins"><span data-dcnode-id="9913" instrument_node="">vitamins</span></a><span data-dcnode-id="9911" instrument_node=""> in the diet are required for good health, there is still considerable debate on whether antioxidant-rich foods or supplements have anti-disease activity. Moreover, if they are actually beneficial, it is unknown which antioxidants are health-promoting in the diet and in what amounts beyond typical dietary intake.</span><sup class="reference" data-dcnode-id="9908" id="cite_ref-Stanner_9-0"><a data-dcnode-id="9909" href="#cite_note-Stanner-9"><span data-dcnode-id="9910" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="9905" id="cite_ref-Shenkin_10-0"><a data-dcnode-id="9906" href="#cite_note-Shenkin-10"><span data-dcnode-id="9907" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="9902" id="cite_ref-11"><a data-dcnode-id="9903" href="#cite_note-11"><span data-dcnode-id="9904" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9901" instrument_node=""> Some authors dispute the hypothesis that antioxidant vitamins could prevent chronic diseases,</span><sup class="reference" data-dcnode-id="9898" id="cite_ref-Stanner_9-1"><a data-dcnode-id="9899" href="#cite_note-Stanner-9"><span data-dcnode-id="9900" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="9895" id="cite_ref-12"><a data-dcnode-id="9896" href="#cite_note-12"><span data-dcnode-id="9897" instrument_node="">[12]</span></a></sup><span data-dcnode-id="9894" instrument_node=""> and some declare that the hypothesis is unproven and misguided.</span><sup class="reference" data-dcnode-id="9891" id="cite_ref-Hail_13-0"><a data-dcnode-id="9892" href="#cite_note-Hail-13"><span data-dcnode-id="9893" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9890" instrument_node=""> </span><a data-dcnode-id="9888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyphenol" title="Polyphenol"><span data-dcnode-id="9889" instrument_node="">Polyphenols</span></a><span data-dcnode-id="9887" instrument_node="">, which have antioxidant properties </span><a data-dcnode-id="9885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In_vitro" title="In vitro"><span data-dcnode-id="9886" instrument_node="">in vitro</span></a><span data-dcnode-id="9884" instrument_node="">, have unknown antioxidant activity </span><a data-dcnode-id="9882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In_vivo" title="In vivo"><span data-dcnode-id="9883" instrument_node="">in vivo</span></a><span data-dcnode-id="9881" instrument_node=""> due to extensive </span><a data-dcnode-id="9879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metabolism" title="Metabolism"><span data-dcnode-id="9880" instrument_node="">metabolism</span></a><span data-dcnode-id="9878" instrument_node=""> following digestion and little </span><a data-dcnode-id="9876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clinical_research" title="Clinical research"><span data-dcnode-id="9877" instrument_node="">clinical evidence</span></a><span data-dcnode-id="9875" instrument_node=""> of efficacy.</span><sup class="reference" data-dcnode-id="9872" id="cite_ref-lpi_14-0"><a data-dcnode-id="9873" href="#cite_note-lpi-14"><span data-dcnode-id="9874" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9871" instrument_node="">
</span></p><span data-dcnode-id="9869" instrument_node="">
</span><h3 data-dcnode-id="9859"><span class="mw-headline" data-dcnode-id="9867" id="Interactions"><span data-dcnode-id="9868" instrument_node="">Interactions</span></span><span class="mw-editsection" data-dcnode-id="9860"><span class="mw-editsection-bracket" data-dcnode-id="9865"><span data-dcnode-id="9866" instrument_node="">[</span></span><a data-dcnode-id="9863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D3" title="Edit section: Interactions"><span data-dcnode-id="9864" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9861"><span data-dcnode-id="9862" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9858" instrument_node="">
</span><p data-dcnode-id="9846"><span data-dcnode-id="9857" instrument_node="">Common pharmaceuticals (and supplements) with antioxidant properties may interfere with the efficacy of certain </span><a class="mw-redirect" data-dcnode-id="9855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anticancer" title="Anticancer"><span data-dcnode-id="9856" instrument_node="">anticancer</span></a><span data-dcnode-id="9854" instrument_node=""> medication and </span><a data-dcnode-id="9852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiation_therapy" title="Radiation therapy"><span data-dcnode-id="9853" instrument_node="">radiation therapy</span></a><span data-dcnode-id="9851" instrument_node="">.</span><sup class="reference" data-dcnode-id="9848" id="cite_ref-Lemmo,_W_Potential_interactions_of_prescription_and_over-the-counter_medications_having_antioxidant_capabilities_with_radiation_and_chemotherapy_2014_15-0"><a data-dcnode-id="9849" href="#cite_note-Lemmo,_W_Potential_interactions_of_prescription_and_over-the-counter_medications_having_antioxidant_capabilities_with_radiation_and_chemotherapy_2014-15"><span data-dcnode-id="9850" instrument_node="">[15]</span></a></sup><span data-dcnode-id="9847" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="9816"><div class="thumbinner" data-dcnode-id="9817" style="width:222px;"><a class="image" data-dcnode-id="9825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APhytate.svg"><img alt="" class="thumbimage" data-dcnode-id="9826" data-file-height="524" data-file-width="512" decoding="async" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/75/Phytate.svg/220px-Phytate.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/75/Phytate.svg/330px-Phytate.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/75/Phytate.svg/440px-Phytate.svg.png 2x" width="220"></a><span data-dcnode-id="9824" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9818"><div class="magnify" data-dcnode-id="9822"><a class="internal" data-dcnode-id="9823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APhytate.svg" title="Enlarge"></a></div><span data-dcnode-id="9821" instrument_node="">Structure of the metal chelator </span><a data-dcnode-id="9819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phytic_acid" title="Phytic acid"><span data-dcnode-id="9820" instrument_node="">phytic acid</span></a></div></div></div><span data-dcnode-id="9815" instrument_node="">
</span><p data-dcnode-id="9768"><span data-dcnode-id="9814" instrument_node="">Relatively strong reducing acids can have </span><a data-dcnode-id="9812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antinutrient" title="Antinutrient"><span data-dcnode-id="9813" instrument_node="">antinutrient</span></a><span data-dcnode-id="9811" instrument_node=""> effects by binding to </span><a class="mw-redirect" data-dcnode-id="9809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dietary_mineral" title="Dietary mineral"><span data-dcnode-id="9810" instrument_node="">dietary minerals</span></a><span data-dcnode-id="9808" instrument_node=""> such as </span><a data-dcnode-id="9806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron" title="Iron"><span data-dcnode-id="9807" instrument_node="">iron</span></a><span data-dcnode-id="9805" instrument_node=""> and </span><a data-dcnode-id="9803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zinc" title="Zinc"><span data-dcnode-id="9804" instrument_node="">zinc</span></a><span data-dcnode-id="9802" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="9800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_gastrointestinal_tract" title="Human gastrointestinal tract"><span data-dcnode-id="9801" instrument_node="">gastrointestinal tract</span></a><span data-dcnode-id="9799" instrument_node=""> and preventing them from being absorbed.</span><sup class="reference" data-dcnode-id="9796" id="cite_ref-16"><a data-dcnode-id="9797" href="#cite_note-16"><span data-dcnode-id="9798" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9795" instrument_node=""> Examples are </span><a data-dcnode-id="9793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxalic_acid" title="Oxalic acid"><span data-dcnode-id="9794" instrument_node="">oxalic acid</span></a><span data-dcnode-id="9792" instrument_node="">, </span><a data-dcnode-id="9790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tannin" title="Tannin"><span data-dcnode-id="9791" instrument_node="">tannins</span></a><span data-dcnode-id="9789" instrument_node=""> and </span><a data-dcnode-id="9787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phytic_acid" title="Phytic acid"><span data-dcnode-id="9788" instrument_node="">phytic acid</span></a><span data-dcnode-id="9786" instrument_node="">, which are high in plant-based diets.</span><sup class="reference" data-dcnode-id="9783" id="cite_ref-17"><a data-dcnode-id="9784" href="#cite_note-17"><span data-dcnode-id="9785" instrument_node="">[17]</span></a></sup><span data-dcnode-id="9782" instrument_node=""> </span><a data-dcnode-id="9780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calcium" title="Calcium"><span data-dcnode-id="9781" instrument_node="">Calcium</span></a><span data-dcnode-id="9779" instrument_node=""> and iron deficiencies are not uncommon in diets in </span><a data-dcnode-id="9777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Developing_country" title="Developing country"><span data-dcnode-id="9778" instrument_node="">developing countries</span></a><span data-dcnode-id="9776" instrument_node=""> where less meat is eaten and there is high consumption of phytic acid from beans and unleavened </span><a data-dcnode-id="9774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whole_grain" title="Whole grain"><span data-dcnode-id="9775" instrument_node="">whole grain</span></a><span data-dcnode-id="9773" instrument_node=""> bread. However, germination, soaking, or microbial fermentation are all household strategies that reduce the phytate and polyphenol content of unrefined cereal. Increases in Fe, Zn and Ca absorption have been reported in adults fed dephytinized cereals compared with cereals containing their native phytate.</span><sup class="reference" data-dcnode-id="9770" id="cite_ref-18"><a data-dcnode-id="9771" href="#cite_note-18"><span data-dcnode-id="9772" instrument_node="">[18]</span></a></sup><span data-dcnode-id="9769" instrument_node="">

</span></td></tr></tbody></table><span data-dcnode-id="9692" instrument_node="">
</span><p data-dcnode-id="9618"><span data-dcnode-id="9691" instrument_node="">High doses of some antioxidants may have harmful long-term effects. The </span><i data-dcnode-id="9684"><a class="mw-redirect" data-dcnode-id="9689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beta-Carotene" title="Beta-Carotene"><span data-dcnode-id="9690" instrument_node="">Beta-Carotene</span></a><span data-dcnode-id="9688" instrument_node=""> and </span><a data-dcnode-id="9686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retinol" title="Retinol"><span data-dcnode-id="9687" instrument_node="">Retinol</span></a><span data-dcnode-id="9685" instrument_node=""> Efficacy Trial</span></i><span data-dcnode-id="9683" instrument_node=""> (CARET) study of lung cancer patients found that smokers given supplements containing beta-carotene and vitamin A had increased rates of lung cancer.</span><sup class="reference" data-dcnode-id="9680" id="cite_ref-22"><a data-dcnode-id="9681" href="#cite_note-22"><span data-dcnode-id="9682" instrument_node="">[22]</span></a></sup><span data-dcnode-id="9679" instrument_node=""> Subsequent studies confirmed these adverse effects.</span><sup class="reference" data-dcnode-id="9676" id="cite_ref-23"><a data-dcnode-id="9677" href="#cite_note-23"><span data-dcnode-id="9678" instrument_node="">[23]</span></a></sup><span data-dcnode-id="9675" instrument_node=""> These harmful effects may also be seen in non-smokers, as one </span><a data-dcnode-id="9673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meta-analysis" title="Meta-analysis"><span data-dcnode-id="9674" instrument_node="">meta-analysis</span></a><span data-dcnode-id="9672" instrument_node=""> including data from approximately 230,000 patients showed that β-carotene, vitamin A or vitamin E supplementation is associated with increased mortality, but saw no significant effect from vitamin C.</span><sup class="reference" data-dcnode-id="9669" id="cite_ref-Bjelakovic_24-0"><a data-dcnode-id="9670" href="#cite_note-Bjelakovic-24"><span data-dcnode-id="9671" instrument_node="">[24]</span></a></sup><span data-dcnode-id="9668" instrument_node=""> No health risk was seen when all the randomized controlled studies were examined together, but an increase in mortality was detected when only high-quality and low-bias risk trials were examined separately.</span><sup class="reference" data-dcnode-id="9665" id="cite_ref-Bj2012_25-0"><a data-dcnode-id="9666" href="#cite_note-Bj2012-25"><span data-dcnode-id="9667" instrument_node="">[25]</span></a></sup><span data-dcnode-id="9664" instrument_node=""> As the majority of these low-bias trials dealt with either </span><a data-dcnode-id="9662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_age" title="Old age"><span data-dcnode-id="9663" instrument_node="">elderly people</span></a><span data-dcnode-id="9661" instrument_node="">, or people with disease, these results may not apply to the general population.</span><sup class="reference" data-dcnode-id="9658" id="cite_ref-26"><a data-dcnode-id="9659" href="#cite_note-26"><span data-dcnode-id="9660" instrument_node="">[26]</span></a></sup><span data-dcnode-id="9657" instrument_node=""> This meta-analysis was later repeated and extended by the same authors, confirming the previous results.</span><sup class="reference" data-dcnode-id="9654" id="cite_ref-Bj2012_25-1"><a data-dcnode-id="9655" href="#cite_note-Bj2012-25"><span data-dcnode-id="9656" instrument_node="">[25]</span></a></sup><span data-dcnode-id="9653" instrument_node=""> These two publications are consistent with some previous meta-analyses that also suggested that vitamin E supplementation increased mortality,</span><sup class="reference" data-dcnode-id="9650" id="cite_ref-27"><a data-dcnode-id="9651" href="#cite_note-27"><span data-dcnode-id="9652" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9649" instrument_node=""> and that antioxidant supplements increased the risk of </span><a data-dcnode-id="9647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colorectal_cancer" title="Colorectal cancer"><span data-dcnode-id="9648" instrument_node="">colon cancer</span></a><span data-dcnode-id="9646" instrument_node="">.</span><sup class="reference" data-dcnode-id="9643" id="cite_ref-Bjelakovic_G_2036_28-0"><a data-dcnode-id="9644" href="#cite_note-Bjelakovic_G_2036-28"><span data-dcnode-id="9645" instrument_node="">[28]</span></a></sup><span data-dcnode-id="9642" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="9640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beta-carotene" title="Beta-carotene"><span data-dcnode-id="9641" instrument_node="">Beta-carotene</span></a><span data-dcnode-id="9639" instrument_node=""> may also increase </span><a data-dcnode-id="9637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lung_cancer" title="Lung cancer"><span data-dcnode-id="9638" instrument_node="">lung cancer</span></a><span data-dcnode-id="9636" instrument_node="">.</span><sup class="reference" data-dcnode-id="9633" id="cite_ref-Bjelakovic_G_2036_28-1"><a data-dcnode-id="9634" href="#cite_note-Bjelakovic_G_2036-28"><span data-dcnode-id="9635" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="9630" id="cite_ref-29"><a data-dcnode-id="9631" href="#cite_note-29"><span data-dcnode-id="9632" instrument_node="">[29]</span></a></sup><span data-dcnode-id="9629" instrument_node=""> Overall, the large number of clinical trials carried out on antioxidant supplements suggest that either these products have no effect on health, or that they cause a small increase in mortality in elderly or vulnerable populations.</span><sup class="reference" data-dcnode-id="9626" id="cite_ref-Stanner_9-2"><a data-dcnode-id="9627" href="#cite_note-Stanner-9"><span data-dcnode-id="9628" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="9623" id="cite_ref-Shenkin_10-1"><a data-dcnode-id="9624" href="#cite_note-Shenkin-10"><span data-dcnode-id="9625" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="9620" id="cite_ref-Bjelakovic_24-1"><a data-dcnode-id="9621" href="#cite_note-Bjelakovic-24"><span data-dcnode-id="9622" instrument_node="">[24]</span></a></sup><span data-dcnode-id="9619" instrument_node="">
</span></p><span data-dcnode-id="9617" instrument_node="">
</span><h2 data-dcnode-id="9607"><span class="mw-headline" data-dcnode-id="9615" id="Oxidative_challenge_in_biology"><span data-dcnode-id="9616" instrument_node="">Oxidative challenge in biology</span></span><span class="mw-editsection" data-dcnode-id="9608"><span class="mw-editsection-bracket" data-dcnode-id="9613"><span data-dcnode-id="9614" instrument_node="">[</span></span><a data-dcnode-id="9611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D5" title="Edit section: Oxidative challenge in biology"><span data-dcnode-id="9612" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9609"><span data-dcnode-id="9610" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9606" instrument_node="">
</span><link data-dcnode-id="9605" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9601" role="note"><span data-dcnode-id="9604" instrument_node="">Further information: </span><a data-dcnode-id="9602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxidative_stress" title="Oxidative stress"><span data-dcnode-id="9603" instrument_node="">Oxidative stress</span></a></div><span data-dcnode-id="9600" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9585"><div class="thumbinner" data-dcnode-id="9586" style="width:222px;"><a class="image" data-dcnode-id="9598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AL-ascorbic-acid-3D-balls.png"><img alt="" class="thumbimage" data-dcnode-id="9599" data-file-height="1024" data-file-width="1100" decoding="async" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/da/L-ascorbic-acid-3D-balls.png/220px-L-ascorbic-acid-3D-balls.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/da/L-ascorbic-acid-3D-balls.png/330px-L-ascorbic-acid-3D-balls.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/da/L-ascorbic-acid-3D-balls.png/440px-L-ascorbic-acid-3D-balls.png 2x" width="220"></a><span data-dcnode-id="9597" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9587"><div class="magnify" data-dcnode-id="9595"><a class="internal" data-dcnode-id="9596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AL-ascorbic-acid-3D-balls.png" title="Enlarge"></a></div><span data-dcnode-id="9594" instrument_node="">The structure of the antioxidant </span><a data-dcnode-id="9592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin" title="Vitamin"><span data-dcnode-id="9593" instrument_node="">vitamin</span></a><span data-dcnode-id="9591" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="9589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ascorbic_acid" title="Ascorbic acid"><span data-dcnode-id="9590" instrument_node="">ascorbic acid</span></a><span data-dcnode-id="9588" instrument_node=""> (vitamin C)</span></div></div></div><span data-dcnode-id="9584" instrument_node="">
</span><p data-dcnode-id="9527"><span data-dcnode-id="9583" instrument_node="">A </span><a data-dcnode-id="9581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paradox" title="Paradox"><span data-dcnode-id="9582" instrument_node="">paradox</span></a><span data-dcnode-id="9580" instrument_node=""> in </span><a data-dcnode-id="9578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metabolism" title="Metabolism"><span data-dcnode-id="9579" instrument_node="">metabolism</span></a><span data-dcnode-id="9577" instrument_node=""> is that, while the vast majority of complex </span><a data-dcnode-id="9575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life" title="Life"><span data-dcnode-id="9576" instrument_node="">life on Earth</span></a><span data-dcnode-id="9574" instrument_node=""> requires </span><a data-dcnode-id="9572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxygen" title="Oxygen"><span data-dcnode-id="9573" instrument_node="">oxygen</span></a><span data-dcnode-id="9571" instrument_node=""> for its existence, oxygen is a highly reactive element that damages living organisms by producing </span><a data-dcnode-id="9569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reactive_oxygen_species" title="Reactive oxygen species"><span data-dcnode-id="9570" instrument_node="">reactive oxygen species</span></a><span data-dcnode-id="9568" instrument_node="">.</span><sup class="reference" data-dcnode-id="9565" id="cite_ref-Davies_30-0"><a data-dcnode-id="9566" href="#cite_note-Davies-30"><span data-dcnode-id="9567" instrument_node="">[30]</span></a></sup><span data-dcnode-id="9564" instrument_node=""> Consequently, organisms contain a complex network of antioxidant </span><a data-dcnode-id="9562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metabolite" title="Metabolite"><span data-dcnode-id="9563" instrument_node="">metabolites</span></a><span data-dcnode-id="9561" instrument_node=""> and </span><a data-dcnode-id="9559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enzyme" title="Enzyme"><span data-dcnode-id="9560" instrument_node="">enzymes</span></a><span data-dcnode-id="9558" instrument_node=""> that work together to prevent oxidative damage to cellular components such as </span><a data-dcnode-id="9556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DNA" title="DNA"><span data-dcnode-id="9557" instrument_node="">DNA</span></a><span data-dcnode-id="9555" instrument_node="">, </span><a data-dcnode-id="9553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protein" title="Protein"><span data-dcnode-id="9554" instrument_node="">proteins</span></a><span data-dcnode-id="9552" instrument_node=""> and </span><a data-dcnode-id="9550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lipid" title="Lipid"><span data-dcnode-id="9551" instrument_node="">lipids</span></a><span data-dcnode-id="9549" instrument_node="">.</span><sup class="reference" data-dcnode-id="9546" id="cite_ref-Sies_31-0"><a data-dcnode-id="9547" href="#cite_note-Sies-31"><span data-dcnode-id="9548" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="9543" id="cite_ref-Vertuani_32-0"><a data-dcnode-id="9544" href="#cite_note-Vertuani-32"><span data-dcnode-id="9545" instrument_node="">[32]</span></a></sup><span data-dcnode-id="9542" instrument_node=""> In general, antioxidant systems either prevent these reactive species from being formed, or remove them before they can damage vital components of the cell.</span><sup class="reference" data-dcnode-id="9539" id="cite_ref-Davies_30-1"><a data-dcnode-id="9540" href="#cite_note-Davies-30"><span data-dcnode-id="9541" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="9536" id="cite_ref-Sies_31-1"><a data-dcnode-id="9537" href="#cite_note-Sies-31"><span data-dcnode-id="9538" instrument_node="">[31]</span></a></sup><span data-dcnode-id="9535" instrument_node=""> However, reactive oxygen species also have useful cellular functions, such as </span><a class="mw-redirect" data-dcnode-id="9533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redox_signaling" title="Redox signaling"><span data-dcnode-id="9534" instrument_node="">redox signaling</span></a><span data-dcnode-id="9532" instrument_node="">. Thus, the function of antioxidant systems is not to remove oxidants entirely, but instead to keep them at an optimum level.</span><sup class="reference" data-dcnode-id="9529" id="cite_ref-33"><a data-dcnode-id="9530" href="#cite_note-33"><span data-dcnode-id="9531" instrument_node="">[33]</span></a></sup><span data-dcnode-id="9528" instrument_node="">
</span></p><p data-dcnode-id="9452"><span data-dcnode-id="9526" instrument_node="">The reactive oxygen species produced in cells include </span><a data-dcnode-id="9524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrogen_peroxide" title="Hydrogen peroxide"><span data-dcnode-id="9525" instrument_node="">hydrogen peroxide</span></a><span data-dcnode-id="9523" instrument_node=""> (H</span><sub data-dcnode-id="9521"><span data-dcnode-id="9522" instrument_node="">2</span></sub><span data-dcnode-id="9520" instrument_node="">O</span><sub data-dcnode-id="9518"><span data-dcnode-id="9519" instrument_node="">2</span></sub><span data-dcnode-id="9517" instrument_node="">), </span><a data-dcnode-id="9515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypochlorous_acid" title="Hypochlorous acid"><span data-dcnode-id="9516" instrument_node="">hypochlorous acid</span></a><span data-dcnode-id="9514" instrument_node=""> (HClO), and </span><a class="mw-redirect" data-dcnode-id="9512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_radical" title="Free radical"><span data-dcnode-id="9513" instrument_node="">free radicals</span></a><span data-dcnode-id="9511" instrument_node=""> such as the </span><a data-dcnode-id="9509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydroxyl_radical" title="Hydroxyl radical"><span data-dcnode-id="9510" instrument_node="">hydroxyl radical</span></a><span data-dcnode-id="9508" instrument_node=""> (·OH) and the </span><a data-dcnode-id="9506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superoxide" title="Superoxide"><span data-dcnode-id="9507" instrument_node="">superoxide anion</span></a><span data-dcnode-id="9505" instrument_node=""> (O</span><sub data-dcnode-id="9503"><span data-dcnode-id="9504" instrument_node="">2</span></sub><sup data-dcnode-id="9501"><span data-dcnode-id="9502" instrument_node="">−</span></sup><span data-dcnode-id="9500" instrument_node="">).</span><sup class="reference" data-dcnode-id="9497" id="cite_ref-emfafb_34-0"><a data-dcnode-id="9498" href="#cite_note-emfafb-34"><span data-dcnode-id="9499" instrument_node="">[34]</span></a></sup><span data-dcnode-id="9496" instrument_node=""> The hydroxyl radical is particularly unstable and will react rapidly and non-specifically with most biological molecules. This species is produced from hydrogen peroxide in </span><a data-dcnode-id="9494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catalysis" title="Catalysis"><span data-dcnode-id="9495" instrument_node="">metal-catalyzed</span></a><span data-dcnode-id="9493" instrument_node=""> redox reactions such as the </span><a class="mw-redirect" data-dcnode-id="9491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fenton_reaction" title="Fenton reaction"><span data-dcnode-id="9492" instrument_node="">Fenton reaction</span></a><span data-dcnode-id="9490" instrument_node="">.</span><sup class="reference" data-dcnode-id="9487" id="cite_ref-ReferenceA_35-0"><a data-dcnode-id="9488" href="#cite_note-ReferenceA-35"><span data-dcnode-id="9489" instrument_node="">[35]</span></a></sup><span data-dcnode-id="9486" instrument_node=""> These oxidants can damage cells by starting chemical chain reactions such as </span><a data-dcnode-id="9484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lipid_peroxidation" title="Lipid peroxidation"><span data-dcnode-id="9485" instrument_node="">lipid peroxidation</span></a><span data-dcnode-id="9483" instrument_node="">, or by oxidizing DNA or proteins.</span><sup class="reference" data-dcnode-id="9480" id="cite_ref-Sies_31-2"><a data-dcnode-id="9481" href="#cite_note-Sies-31"><span data-dcnode-id="9482" instrument_node="">[31]</span></a></sup><span data-dcnode-id="9479" instrument_node=""> Damage to DNA can cause </span><a data-dcnode-id="9477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mutation" title="Mutation"><span data-dcnode-id="9478" instrument_node="">mutations</span></a><span data-dcnode-id="9476" instrument_node=""> and possibly cancer, if not reversed by </span><a data-dcnode-id="9474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DNA_repair" title="DNA repair"><span data-dcnode-id="9475" instrument_node="">DNA repair</span></a><span data-dcnode-id="9473" instrument_node=""> mechanisms,</span><sup class="reference" data-dcnode-id="9470" id="cite_ref-36"><a data-dcnode-id="9471" href="#cite_note-36"><span data-dcnode-id="9472" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="9467" id="cite_ref-37"><a data-dcnode-id="9468" href="#cite_note-37"><span data-dcnode-id="9469" instrument_node="">[37]</span></a></sup><span data-dcnode-id="9466" instrument_node=""> while damage to </span><a data-dcnode-id="9464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protein" title="Protein"><span data-dcnode-id="9465" instrument_node="">proteins</span></a><span data-dcnode-id="9463" instrument_node=""> causes enzyme inhibition, </span><a data-dcnode-id="9461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denaturation_%28biochemistry%29" title="Denaturation (biochemistry)"><span data-dcnode-id="9462" instrument_node="">denaturation</span></a><span data-dcnode-id="9460" instrument_node=""> and </span><a data-dcnode-id="9458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proteasome" title="Proteasome"><span data-dcnode-id="9459" instrument_node="">protein degradation</span></a><span data-dcnode-id="9457" instrument_node="">.</span><sup class="reference" data-dcnode-id="9454" id="cite_ref-38"><a data-dcnode-id="9455" href="#cite_note-38"><span data-dcnode-id="9456" instrument_node="">[38]</span></a></sup><span data-dcnode-id="9453" instrument_node="">
</span></p><p data-dcnode-id="9358"><span data-dcnode-id="9451" instrument_node="">The use of oxygen as part of the process for generating metabolic energy produces reactive oxygen species.</span><sup class="reference" data-dcnode-id="9448" id="cite_ref-Raha_39-0"><a data-dcnode-id="9449" href="#cite_note-Raha-39"><span data-dcnode-id="9450" instrument_node="">[39]</span></a></sup><span data-dcnode-id="9447" instrument_node=""> In this process, the superoxide anion is produced as a </span><a data-dcnode-id="9445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/By-product" title="By-product"><span data-dcnode-id="9446" instrument_node="">by-product</span></a><span data-dcnode-id="9444" instrument_node=""> of several steps in the </span><a data-dcnode-id="9442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electron_transport_chain" title="Electron transport chain"><span data-dcnode-id="9443" instrument_node="">electron transport chain</span></a><span data-dcnode-id="9441" instrument_node="">.</span><sup class="reference" data-dcnode-id="9438" id="cite_ref-40"><a data-dcnode-id="9439" href="#cite_note-40"><span data-dcnode-id="9440" instrument_node="">[40]</span></a></sup><span data-dcnode-id="9437" instrument_node=""> Particularly important is the reduction of </span><a class="mw-redirect" data-dcnode-id="9435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coenzyme_Q" title="Coenzyme Q"><span data-dcnode-id="9436" instrument_node="">coenzyme Q</span></a><span data-dcnode-id="9434" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="9432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Complex_III" title="Complex III"><span data-dcnode-id="9433" instrument_node="">complex III</span></a><span data-dcnode-id="9431" instrument_node="">, since a highly reactive free radical is formed as an intermediate (Q</span><b data-dcnode-id="9429"><span data-dcnode-id="9430" instrument_node="">·</span></b><sup data-dcnode-id="9427"><span data-dcnode-id="9428" instrument_node="">−</span></sup><span data-dcnode-id="9426" instrument_node="">). This unstable intermediate can lead to electron "leakage", when electrons jump directly to oxygen and form the superoxide anion, instead of moving through the normal series of well-controlled reactions of the electron transport chain.</span><sup class="reference" data-dcnode-id="9423" id="cite_ref-41"><a data-dcnode-id="9424" href="#cite_note-41"><span data-dcnode-id="9425" instrument_node="">[41]</span></a></sup><span data-dcnode-id="9422" instrument_node=""> Peroxide is also produced from the oxidation of reduced </span><a data-dcnode-id="9420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flavoprotein" title="Flavoprotein"><span data-dcnode-id="9421" instrument_node="">flavoproteins</span></a><span data-dcnode-id="9419" instrument_node="">, such as </span><a class="mw-redirect" data-dcnode-id="9417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Complex_I" title="Complex I"><span data-dcnode-id="9418" instrument_node="">complex I</span></a><span data-dcnode-id="9416" instrument_node="">.</span><sup class="reference" data-dcnode-id="9413" id="cite_ref-42"><a data-dcnode-id="9414" href="#cite_note-42"><span data-dcnode-id="9415" instrument_node="">[42]</span></a></sup><span data-dcnode-id="9412" instrument_node=""> However, although these enzymes can produce oxidants, the relative importance of the electron transfer chain to other processes that generate peroxide is unclear.</span><sup class="reference" data-dcnode-id="9409" id="cite_ref-43"><a data-dcnode-id="9410" href="#cite_note-43"><span data-dcnode-id="9411" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="9406" id="cite_ref-Pathways_Ofoxidativedamage_44-0"><a data-dcnode-id="9407" href="#cite_note-Pathways_Ofoxidativedamage-44"><span data-dcnode-id="9408" instrument_node="">[44]</span></a></sup><span data-dcnode-id="9405" instrument_node=""> In plants, </span><a data-dcnode-id="9403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Algae" title="Algae"><span data-dcnode-id="9404" instrument_node="">algae</span></a><span data-dcnode-id="9402" instrument_node="">, and </span><a data-dcnode-id="9400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyanobacteria" title="Cyanobacteria"><span data-dcnode-id="9401" instrument_node="">cyanobacteria</span></a><span data-dcnode-id="9399" instrument_node="">, reactive oxygen species are also produced during </span><a data-dcnode-id="9397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photosynthesis" title="Photosynthesis"><span data-dcnode-id="9398" instrument_node="">photosynthesis</span></a><span data-dcnode-id="9396" instrument_node="">,</span><sup class="reference" data-dcnode-id="9393" id="cite_ref-45"><a data-dcnode-id="9394" href="#cite_note-45"><span data-dcnode-id="9395" instrument_node="">[45]</span></a></sup><span data-dcnode-id="9392" instrument_node=""> particularly under conditions of high </span><a data-dcnode-id="9390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irradiance" title="Irradiance"><span data-dcnode-id="9391" instrument_node="">light intensity</span></a><span data-dcnode-id="9389" instrument_node="">.</span><sup class="reference" data-dcnode-id="9386" id="cite_ref-46"><a data-dcnode-id="9387" href="#cite_note-46"><span data-dcnode-id="9388" instrument_node="">[46]</span></a></sup><span data-dcnode-id="9385" instrument_node=""> This effect is partly offset by the involvement of </span><a data-dcnode-id="9383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carotenoid" title="Carotenoid"><span data-dcnode-id="9384" instrument_node="">carotenoids</span></a><span data-dcnode-id="9382" instrument_node=""> in </span><a data-dcnode-id="9380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photoinhibition" title="Photoinhibition"><span data-dcnode-id="9381" instrument_node="">photoinhibition</span></a><span data-dcnode-id="9379" instrument_node="">, and in algae and cyanobacteria, by large amount of </span><a data-dcnode-id="9377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iodide" title="Iodide"><span data-dcnode-id="9378" instrument_node="">iodide</span></a><span data-dcnode-id="9376" instrument_node=""> and </span><a data-dcnode-id="9374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selenium" title="Selenium"><span data-dcnode-id="9375" instrument_node="">selenium</span></a><span data-dcnode-id="9373" instrument_node="">,</span><sup class="reference" data-dcnode-id="9370" id="cite_ref-47"><a data-dcnode-id="9371" href="#cite_note-47"><span data-dcnode-id="9372" instrument_node="">[47]</span></a></sup><span data-dcnode-id="9369" instrument_node=""> which involves these antioxidants reacting with over-reduced forms of the </span><a data-dcnode-id="9367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photosynthetic_reaction_centre" title="Photosynthetic reaction centre"><span data-dcnode-id="9368" instrument_node="">photosynthetic reaction centres</span></a><span data-dcnode-id="9366" instrument_node=""> to prevent the production of reactive oxygen species.</span><sup class="reference" data-dcnode-id="9363" id="cite_ref-48"><a data-dcnode-id="9364" href="#cite_note-48"><span data-dcnode-id="9365" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="9360" id="cite_ref-49"><a data-dcnode-id="9361" href="#cite_note-49"><span data-dcnode-id="9362" instrument_node="">[49]</span></a></sup><span data-dcnode-id="9359" instrument_node="">
</span></p><span data-dcnode-id="9357" instrument_node="">
</span><h2 data-dcnode-id="9347"><span class="mw-headline" data-dcnode-id="9355" id="Examples_of_bioactive_antioxidant_compounds"><span data-dcnode-id="9356" instrument_node="">Examples of bioactive antioxidant compounds</span></span><span class="mw-editsection" data-dcnode-id="9348"><span class="mw-editsection-bracket" data-dcnode-id="9353"><span data-dcnode-id="9354" instrument_node="">[</span></span><a data-dcnode-id="9351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D6" title="Edit section: Examples of bioactive antioxidant compounds"><span data-dcnode-id="9352" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9349"><span data-dcnode-id="9350" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9346" instrument_node="">
</span><p data-dcnode-id="9296"><span data-dcnode-id="9345" instrument_node="">Antioxidants are classified into two broad divisions, depending on whether they are soluble in water (</span><a data-dcnode-id="9343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrophile" title="Hydrophile"><span data-dcnode-id="9344" instrument_node="">hydrophilic</span></a><span data-dcnode-id="9342" instrument_node="">) or in lipids (</span><a data-dcnode-id="9340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lipophilicity" title="Lipophilicity"><span data-dcnode-id="9341" instrument_node="">lipophilic</span></a><span data-dcnode-id="9339" instrument_node="">). In general, water-soluble antioxidants react with oxidants in the cell </span><a data-dcnode-id="9337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cytosol" title="Cytosol"><span data-dcnode-id="9338" instrument_node="">cytosol</span></a><span data-dcnode-id="9336" instrument_node=""> and the </span><a data-dcnode-id="9334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blood_plasma" title="Blood plasma"><span data-dcnode-id="9335" instrument_node="">blood plasma</span></a><span data-dcnode-id="9333" instrument_node="">, while lipid-soluble antioxidants protect </span><a data-dcnode-id="9331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cell_membrane" title="Cell membrane"><span data-dcnode-id="9332" instrument_node="">cell membranes</span></a><span data-dcnode-id="9330" instrument_node=""> from </span><a data-dcnode-id="9328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lipid_peroxidation" title="Lipid peroxidation"><span data-dcnode-id="9329" instrument_node="">lipid peroxidation</span></a><span data-dcnode-id="9327" instrument_node="">.</span><sup class="reference" data-dcnode-id="9324" id="cite_ref-Sies_31-3"><a data-dcnode-id="9325" href="#cite_note-Sies-31"><span data-dcnode-id="9326" instrument_node="">[31]</span></a></sup><span data-dcnode-id="9323" instrument_node=""> These compounds may be synthesized in the body or obtained from the diet.</span><sup class="reference" data-dcnode-id="9320" id="cite_ref-Vertuani_32-1"><a data-dcnode-id="9321" href="#cite_note-Vertuani-32"><span data-dcnode-id="9322" instrument_node="">[32]</span></a></sup><span data-dcnode-id="9319" instrument_node=""> The different antioxidants are present at a wide range of concentrations in </span><a class="mw-redirect" data-dcnode-id="9317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bodily_fluid" title="Bodily fluid"><span data-dcnode-id="9318" instrument_node="">body fluids</span></a><span data-dcnode-id="9316" instrument_node=""> and tissues, with some such as </span><a data-dcnode-id="9314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione" title="Glutathione"><span data-dcnode-id="9315" instrument_node="">glutathione</span></a><span data-dcnode-id="9313" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="9311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubiquinone" title="Ubiquinone"><span data-dcnode-id="9312" instrument_node="">ubiquinone</span></a><span data-dcnode-id="9310" instrument_node=""> mostly present within cells, while others such as </span><a data-dcnode-id="9308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uric_acid" title="Uric acid"><span data-dcnode-id="9309" instrument_node="">uric acid</span></a><span data-dcnode-id="9307" instrument_node=""> are more evenly distributed (see table below). Some antioxidants are only found in a few organisms and these compounds can be important in </span><a data-dcnode-id="9305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pathogen" title="Pathogen"><span data-dcnode-id="9306" instrument_node="">pathogens</span></a><span data-dcnode-id="9304" instrument_node=""> and can be </span><a data-dcnode-id="9302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virulence_factor" title="Virulence factor"><span data-dcnode-id="9303" instrument_node="">virulence factors</span></a><span data-dcnode-id="9301" instrument_node="">.</span><sup class="reference" data-dcnode-id="9298" id="cite_ref-50"><a data-dcnode-id="9299" href="#cite_note-50"><span data-dcnode-id="9300" instrument_node="">[50]</span></a></sup><span data-dcnode-id="9297" instrument_node="">
</span></p><p data-dcnode-id="9276"><span data-dcnode-id="9295" instrument_node="">The relative importance and interactions between these different antioxidants is a very complex question, with the various antioxidant compounds and antioxidant enzyme systems having </span><a data-dcnode-id="9293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Synergy" title="Synergy"><span data-dcnode-id="9294" instrument_node="">synergistic</span></a><span data-dcnode-id="9292" instrument_node=""> and interdependent effects on one another.</span><sup class="reference" data-dcnode-id="9289" id="cite_ref-51"><a data-dcnode-id="9290" href="#cite_note-51"><span data-dcnode-id="9291" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="9286" id="cite_ref-52"><a data-dcnode-id="9287" href="#cite_note-52"><span data-dcnode-id="9288" instrument_node="">[52]</span></a></sup><span data-dcnode-id="9285" instrument_node=""> The action of one antioxidant may therefore depend on the proper function of other members of the antioxidant system.</span><sup class="reference" data-dcnode-id="9282" id="cite_ref-Vertuani_32-2"><a data-dcnode-id="9283" href="#cite_note-Vertuani-32"><span data-dcnode-id="9284" instrument_node="">[32]</span></a></sup><span data-dcnode-id="9281" instrument_node=""> The amount of protection provided by any one antioxidant will also depend on its concentration, its reactivity towards the particular reactive oxygen species being considered, and the status of the antioxidants with which it interacts.</span><sup class="reference" data-dcnode-id="9278" id="cite_ref-Vertuani_32-3"><a data-dcnode-id="9279" href="#cite_note-Vertuani-32"><span data-dcnode-id="9280" instrument_node="">[32]</span></a></sup><span data-dcnode-id="9277" instrument_node="">
</span></p><p data-dcnode-id="9243"><span data-dcnode-id="9275" instrument_node="">Some compounds contribute to antioxidant defense by </span><a data-dcnode-id="9273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chelation" title="Chelation"><span data-dcnode-id="9274" instrument_node="">chelating</span></a><span data-dcnode-id="9272" instrument_node=""> </span><a data-dcnode-id="9270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transition_metal" title="Transition metal"><span data-dcnode-id="9271" instrument_node="">transition metals</span></a><span data-dcnode-id="9269" instrument_node=""> and preventing them from catalyzing the production of free radicals in the cell. Particularly important is the ability to sequester iron, which is the function of </span><a data-dcnode-id="9267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron-binding_proteins" title="Iron-binding proteins"><span data-dcnode-id="9268" instrument_node="">iron-binding proteins</span></a><span data-dcnode-id="9266" instrument_node=""> such as </span><a data-dcnode-id="9264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transferrin" title="Transferrin"><span data-dcnode-id="9265" instrument_node="">transferrin</span></a><span data-dcnode-id="9263" instrument_node=""> and </span><a data-dcnode-id="9261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ferritin" title="Ferritin"><span data-dcnode-id="9262" instrument_node="">ferritin</span></a><span data-dcnode-id="9260" instrument_node="">.</span><sup class="reference" data-dcnode-id="9257" id="cite_ref-Pathways_Ofoxidativedamage_44-1"><a data-dcnode-id="9258" href="#cite_note-Pathways_Ofoxidativedamage-44"><span data-dcnode-id="9259" instrument_node="">[44]</span></a></sup><span data-dcnode-id="9256" instrument_node=""> </span><a data-dcnode-id="9254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selenium" title="Selenium"><span data-dcnode-id="9255" instrument_node="">Selenium</span></a><span data-dcnode-id="9253" instrument_node=""> and </span><a data-dcnode-id="9251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zinc" title="Zinc"><span data-dcnode-id="9252" instrument_node="">zinc</span></a><span data-dcnode-id="9250" instrument_node=""> are commonly referred to as </span><i data-dcnode-id="9248"><span data-dcnode-id="9249" instrument_node="">antioxidant minerals</span></i><span data-dcnode-id="9247" instrument_node="">, but these </span><a data-dcnode-id="9245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemical_element" title="Chemical element"><span data-dcnode-id="9246" instrument_node="">chemical elements</span></a><span data-dcnode-id="9244" instrument_node=""> have no antioxidant action themselves, and are instead required for the activity of antioxidant enzymes.
