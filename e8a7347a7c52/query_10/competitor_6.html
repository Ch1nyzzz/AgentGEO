</span><h3 data-dcnode-id="9027"><span class="mw-headline" data-dcnode-id="9035" id="Uric_acid"><span data-dcnode-id="9036" instrument_node="">Uric acid</span></span><span class="mw-editsection" data-dcnode-id="9028"><span class="mw-editsection-bracket" data-dcnode-id="9033"><span data-dcnode-id="9034" instrument_node="">[</span></span><a data-dcnode-id="9031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D7" title="Edit section: Uric acid"><span data-dcnode-id="9032" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9029"><span data-dcnode-id="9030" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9026" instrument_node="">
</span><p data-dcnode-id="8976"><span data-dcnode-id="9025" instrument_node="">Uric acid is by far the highest concentration antioxidant in human blood. Uric acid (UA) is an antioxidant oxypurine produced from </span><a data-dcnode-id="9023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xanthine" title="Xanthine"><span data-dcnode-id="9024" instrument_node="">xanthine</span></a><span data-dcnode-id="9022" instrument_node=""> by the enzyme </span><a data-dcnode-id="9020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xanthine_oxidase" title="Xanthine oxidase"><span data-dcnode-id="9021" instrument_node="">xanthine oxidase</span></a><span data-dcnode-id="9019" instrument_node="">, and is an intermediate product of </span><a data-dcnode-id="9017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Purine" title="Purine"><span data-dcnode-id="9018" instrument_node="">purine</span></a><span data-dcnode-id="9016" instrument_node=""> metabolism.</span><sup class="reference" data-dcnode-id="9013" id="cite_ref-Enomoto2005_64-0"><a data-dcnode-id="9014" href="#cite_note-Enomoto2005-64"><span data-dcnode-id="9015" instrument_node="">[64]</span></a></sup><span data-dcnode-id="9012" instrument_node=""> In almost all land animals, </span><a data-dcnode-id="9010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urate_oxidase" title="Urate oxidase"><span data-dcnode-id="9011" instrument_node="">urate oxidase</span></a><span data-dcnode-id="9009" instrument_node=""> further catalyzes the oxidation of uric acid to </span><a data-dcnode-id="9007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allantoin" title="Allantoin"><span data-dcnode-id="9008" instrument_node="">allantoin</span></a><span data-dcnode-id="9006" instrument_node="">,</span><sup class="reference" data-dcnode-id="9003" id="cite_ref-Wu1989_65-0"><a data-dcnode-id="9004" href="#cite_note-Wu1989-65"><span data-dcnode-id="9005" instrument_node="">[65]</span></a></sup><span data-dcnode-id="9002" instrument_node=""> but in humans and most higher primates, the urate oxidase gene is nonfunctional, so that UA is not further broken down.</span><sup class="reference" data-dcnode-id="8999" id="cite_ref-Wu1989_65-1"><a data-dcnode-id="9000" href="#cite_note-Wu1989-65"><span data-dcnode-id="9001" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="8996" id="cite_ref-Wu1992_66-0"><a data-dcnode-id="8997" href="#cite_note-Wu1992-66"><span data-dcnode-id="8998" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8995" instrument_node=""> The evolutionary reasons for this loss of urate conversion to allantoin remain the topic of active speculation.</span><sup class="reference" data-dcnode-id="8992" id="cite_ref-Alvarez2010_67-0"><a data-dcnode-id="8993" href="#cite_note-Alvarez2010-67"><span data-dcnode-id="8994" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="8989" id="cite_ref-Watanabe2002_68-0"><a data-dcnode-id="8990" href="#cite_note-Watanabe2002-68"><span data-dcnode-id="8991" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8988" instrument_node=""> The antioxidant effects of uric acid have led researchers to suggest this mutation was beneficial to early primates and humans.</span><sup class="reference" data-dcnode-id="8985" id="cite_ref-Watanabe2002_68-1"><a data-dcnode-id="8986" href="#cite_note-Watanabe2002-68"><span data-dcnode-id="8987" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="8982" id="cite_ref-Johnson2010_69-0"><a data-dcnode-id="8983" href="#cite_note-Johnson2010-69"><span data-dcnode-id="8984" instrument_node="">[69]</span></a></sup><span data-dcnode-id="8981" instrument_node=""> Studies of high altitude acclimatization support the hypothesis that urate acts as an antioxidant by mitigating the oxidative stress caused by high-altitude hypoxia.</span><sup class="reference" data-dcnode-id="8978" id="cite_ref-Baillie2007_70-0"><a data-dcnode-id="8979" href="#cite_note-Baillie2007-70"><span data-dcnode-id="8980" instrument_node="">[70]</span></a></sup><span data-dcnode-id="8977" instrument_node="">
</span></p><p data-dcnode-id="8919"><a data-dcnode-id="8974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uric_acid" title="Uric acid"><span data-dcnode-id="8975" instrument_node="">Uric acid</span></a><span data-dcnode-id="8973" instrument_node=""> has the highest concentration of any blood antioxidant</span><sup class="reference" data-dcnode-id="8970" id="cite_ref-Glantzounis_58-1"><a data-dcnode-id="8971" href="#cite_note-Glantzounis-58"><span data-dcnode-id="8972" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8969" instrument_node=""> and provides over half of the total antioxidant capacity of human serum.</span><sup class="reference" data-dcnode-id="8966" id="cite_ref-71"><a data-dcnode-id="8967" href="#cite_note-71"><span data-dcnode-id="8968" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8965" instrument_node=""> Uric acid's antioxidant activities are also complex, given that it does not react with some oxidants, such as </span><a data-dcnode-id="8963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superoxide" title="Superoxide"><span data-dcnode-id="8964" instrument_node="">superoxide</span></a><span data-dcnode-id="8962" instrument_node="">, but does act against </span><a data-dcnode-id="8960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peroxynitrite" title="Peroxynitrite"><span data-dcnode-id="8961" instrument_node="">peroxynitrite</span></a><span data-dcnode-id="8959" instrument_node="">,</span><sup class="reference" data-dcnode-id="8956" id="cite_ref-Sautin2008_72-0"><a data-dcnode-id="8957" href="#cite_note-Sautin2008-72"><span data-dcnode-id="8958" instrument_node="">[72]</span></a></sup><span data-dcnode-id="8955" instrument_node=""> </span><a data-dcnode-id="8953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peroxide" title="Peroxide"><span data-dcnode-id="8954" instrument_node="">peroxides</span></a><span data-dcnode-id="8952" instrument_node="">, and </span><a data-dcnode-id="8950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypochlorous_acid" title="Hypochlorous acid"><span data-dcnode-id="8951" instrument_node="">hypochlorous acid</span></a><span data-dcnode-id="8949" instrument_node="">.</span><sup class="reference" data-dcnode-id="8946" id="cite_ref-Enomoto2005_64-1"><a data-dcnode-id="8947" href="#cite_note-Enomoto2005-64"><span data-dcnode-id="8948" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8945" instrument_node=""> Concerns over elevated UA's contribution to </span><a data-dcnode-id="8943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gout" title="Gout"><span data-dcnode-id="8944" instrument_node="">gout</span></a><span data-dcnode-id="8942" instrument_node=""> must be considered one of many risk factors.</span><sup class="reference" data-dcnode-id="8939" id="cite_ref-Eggebeen2007_73-0"><a data-dcnode-id="8940" href="#cite_note-Eggebeen2007-73"><span data-dcnode-id="8941" instrument_node="">[73]</span></a></sup><span data-dcnode-id="8938" instrument_node=""> By itself, UA-related risk of gout at high levels (415–530 μmol/L) is only 0.5% per year with an increase to 4.5% per year at UA </span><a data-dcnode-id="8936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supersaturation" title="Supersaturation"><span data-dcnode-id="8937" instrument_node="">supersaturation levels</span></a><span data-dcnode-id="8935" instrument_node=""> (535+ μmol/L).</span><sup class="reference" data-dcnode-id="8932" id="cite_ref-Campion1987_74-0"><a data-dcnode-id="8933" href="#cite_note-Campion1987-74"><span data-dcnode-id="8934" instrument_node="">[74]</span></a></sup><span data-dcnode-id="8931" instrument_node=""> Many of these aforementioned studies determined UA's antioxidant actions within normal physiological levels,</span><sup class="reference" data-dcnode-id="8928" id="cite_ref-Baillie2007_70-1"><a data-dcnode-id="8929" href="#cite_note-Baillie2007-70"><span data-dcnode-id="8930" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="8925" id="cite_ref-Sautin2008_72-1"><a data-dcnode-id="8926" href="#cite_note-Sautin2008-72"><span data-dcnode-id="8927" instrument_node="">[72]</span></a></sup><span data-dcnode-id="8924" instrument_node=""> and some found antioxidant activity at levels as high as 285 μmol/L.</span><sup class="reference" data-dcnode-id="8921" id="cite_ref-Nazarewicz2007_75-0"><a data-dcnode-id="8922" href="#cite_note-Nazarewicz2007-75"><span data-dcnode-id="8923" instrument_node="">[75]</span></a></sup><span data-dcnode-id="8920" instrument_node="">
</span></p><span data-dcnode-id="8918" instrument_node="">
</span><h3 data-dcnode-id="8908"><span class="mw-headline" data-dcnode-id="8916" id="Vitamin_C"><span data-dcnode-id="8917" instrument_node="">Vitamin C</span></span><span class="mw-editsection" data-dcnode-id="8909"><span class="mw-editsection-bracket" data-dcnode-id="8914"><span data-dcnode-id="8915" instrument_node="">[</span></span><a data-dcnode-id="8912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D8" title="Edit section: Vitamin C"><span data-dcnode-id="8913" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8910"><span data-dcnode-id="8911" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8907" instrument_node="">
</span><p data-dcnode-id="8811"><a class="mw-redirect" data-dcnode-id="8905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ascorbic_acid" title="Ascorbic acid"><span data-dcnode-id="8906" instrument_node="">Ascorbic acid</span></a><span data-dcnode-id="8904" instrument_node=""> or </span><a data-dcnode-id="8902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_C" title="Vitamin C"><span data-dcnode-id="8903" instrument_node="">vitamin C</span></a><span data-dcnode-id="8901" instrument_node=""> is a </span><a data-dcnode-id="8899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monosaccharide" title="Monosaccharide"><span data-dcnode-id="8900" instrument_node="">monosaccharide</span></a><span data-dcnode-id="8898" instrument_node=""> oxidation-reduction (</span><a data-dcnode-id="8896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redox" title="Redox"><span data-dcnode-id="8897" instrument_node="">redox</span></a><span data-dcnode-id="8895" instrument_node="">) </span><a class="mw-redirect" data-dcnode-id="8893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catalyst" title="Catalyst"><span data-dcnode-id="8894" instrument_node="">catalyst</span></a><span data-dcnode-id="8892" instrument_node=""> found in both animals and plants.</span><sup class="reference" data-dcnode-id="8889" id="cite_ref-lpi2018_76-0"><a data-dcnode-id="8890" href="#cite_note-lpi2018-76"><span data-dcnode-id="8891" instrument_node="">[76]</span></a></sup><span data-dcnode-id="8888" instrument_node=""> As one of the enzymes needed to make ascorbic acid has been lost by </span><a data-dcnode-id="8886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mutation" title="Mutation"><span data-dcnode-id="8887" instrument_node="">mutation</span></a><span data-dcnode-id="8885" instrument_node=""> during </span><a data-dcnode-id="8883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primate" title="Primate"><span data-dcnode-id="8884" instrument_node="">primate</span></a><span data-dcnode-id="8882" instrument_node=""> </span><a data-dcnode-id="8880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evolution" title="Evolution"><span data-dcnode-id="8881" instrument_node="">evolution</span></a><span data-dcnode-id="8879" instrument_node="">, humans must obtain it from their diet; it is therefore a dietary vitamin.</span><sup class="reference" data-dcnode-id="8876" id="cite_ref-lpi2018_76-1"><a data-dcnode-id="8877" href="#cite_note-lpi2018-76"><span data-dcnode-id="8878" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="8873" id="cite_ref-77"><a data-dcnode-id="8874" href="#cite_note-77"><span data-dcnode-id="8875" instrument_node="">[77]</span></a></sup><span data-dcnode-id="8872" instrument_node=""> Most other animals are able to produce this compound in their bodies and do not require it in their diets.</span><sup class="reference" data-dcnode-id="8869" id="cite_ref-78"><a data-dcnode-id="8870" href="#cite_note-78"><span data-dcnode-id="8871" instrument_node="">[78]</span></a></sup><span data-dcnode-id="8868" instrument_node=""> Ascorbic acid is required for the conversion of the </span><a data-dcnode-id="8866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collagen%23Collagen_I_formation" title="Collagen"><span data-dcnode-id="8867" instrument_node="">procollagen</span></a><span data-dcnode-id="8865" instrument_node=""> to </span><a data-dcnode-id="8863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collagen" title="Collagen"><span data-dcnode-id="8864" instrument_node="">collagen</span></a><span data-dcnode-id="8862" instrument_node=""> by oxidizing </span><a data-dcnode-id="8860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proline" title="Proline"><span data-dcnode-id="8861" instrument_node="">proline</span></a><span data-dcnode-id="8859" instrument_node=""> residues to </span><a data-dcnode-id="8857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydroxyproline" title="Hydroxyproline"><span data-dcnode-id="8858" instrument_node="">hydroxyproline</span></a><span data-dcnode-id="8856" instrument_node="">.</span><sup class="reference" data-dcnode-id="8853" id="cite_ref-lpi2018_76-2"><a data-dcnode-id="8854" href="#cite_note-lpi2018-76"><span data-dcnode-id="8855" instrument_node="">[76]</span></a></sup><span data-dcnode-id="8852" instrument_node=""> In other cells, it is maintained in its reduced form by reaction with glutathione, which can be catalysed by </span><a class="mw-redirect" data-dcnode-id="8850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protein_disulfide_isomerase" title="Protein disulfide isomerase"><span data-dcnode-id="8851" instrument_node="">protein disulfide isomerase</span></a><span data-dcnode-id="8849" instrument_node=""> and </span><a data-dcnode-id="8847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutaredoxin" title="Glutaredoxin"><span data-dcnode-id="8848" instrument_node="">glutaredoxins</span></a><span data-dcnode-id="8846" instrument_node="">.</span><sup class="reference" data-dcnode-id="8843" id="cite_ref-MeisterA_79-0"><a data-dcnode-id="8844" href="#cite_note-MeisterA-79"><span data-dcnode-id="8845" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="8840" id="cite_ref-80"><a data-dcnode-id="8841" href="#cite_note-80"><span data-dcnode-id="8842" instrument_node="">[80]</span></a></sup><span data-dcnode-id="8839" instrument_node=""> Ascorbic acid is a redox catalyst which can reduce, and thereby neutralize, reactive oxygen species such as hydrogen peroxide.</span><sup class="reference" data-dcnode-id="8836" id="cite_ref-lpi2018_76-3"><a data-dcnode-id="8837" href="#cite_note-lpi2018-76"><span data-dcnode-id="8838" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="8833" id="cite_ref-81"><a data-dcnode-id="8834" href="#cite_note-81"><span data-dcnode-id="8835" instrument_node="">[81]</span></a></sup><span data-dcnode-id="8832" instrument_node=""> In addition to its direct antioxidant effects, ascorbic acid is also a </span><a class="mw-redirect" data-dcnode-id="8830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Substrate_%28biochemistry%29" title="Substrate (biochemistry)"><span data-dcnode-id="8831" instrument_node="">substrate</span></a><span data-dcnode-id="8829" instrument_node=""> for the redox enzyme </span><a data-dcnode-id="8827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ascorbate_peroxidase" title="Ascorbate peroxidase"><span data-dcnode-id="8828" instrument_node="">ascorbate peroxidase</span></a><span data-dcnode-id="8826" instrument_node="">, a function that is used in stress resistance in plants.</span><sup class="reference" data-dcnode-id="8823" id="cite_ref-82"><a data-dcnode-id="8824" href="#cite_note-82"><span data-dcnode-id="8825" instrument_node="">[82]</span></a></sup><span data-dcnode-id="8822" instrument_node=""> Ascorbic acid is present at high levels in all parts of plants and can reach concentrations of 20&nbsp;</span><a class="mw-redirect" data-dcnode-id="8820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Millimolar" title="Millimolar"><span data-dcnode-id="8821" instrument_node="">millimolar</span></a><span data-dcnode-id="8819" instrument_node=""> in </span><a data-dcnode-id="8817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chloroplast" title="Chloroplast"><span data-dcnode-id="8818" instrument_node="">chloroplasts</span></a><span data-dcnode-id="8816" instrument_node="">.</span><sup class="reference" data-dcnode-id="8813" id="cite_ref-83"><a data-dcnode-id="8814" href="#cite_note-83"><span data-dcnode-id="8815" instrument_node="">[83]</span></a></sup><span data-dcnode-id="8812" instrument_node="">
</span></p><span data-dcnode-id="8810" instrument_node="">
</span><h3 data-dcnode-id="8800"><span class="mw-headline" data-dcnode-id="8808" id="Glutathione"><span data-dcnode-id="8809" instrument_node="">Glutathione</span></span><span class="mw-editsection" data-dcnode-id="8801"><span class="mw-editsection-bracket" data-dcnode-id="8806"><span data-dcnode-id="8807" instrument_node="">[</span></span><a data-dcnode-id="8804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D9" title="Edit section: Glutathione"><span data-dcnode-id="8805" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8802"><span data-dcnode-id="8803" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8799" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8787"><div class="thumbinner" data-dcnode-id="8788" style="width:222px;"><a class="image" data-dcnode-id="8797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALipid_peroxidation.svg"><img alt="" class="thumbimage" data-dcnode-id="8798" data-file-height="1425" data-file-width="1690" decoding="async" height="186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Lipid_peroxidation.svg/220px-Lipid_peroxidation.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Lipid_peroxidation.svg/330px-Lipid_peroxidation.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Lipid_peroxidation.svg/440px-Lipid_peroxidation.svg.png 2x" width="220"></a><span data-dcnode-id="8796" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8789"><div class="magnify" data-dcnode-id="8794"><a class="internal" data-dcnode-id="8795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALipid_peroxidation.svg" title="Enlarge"></a></div><span data-dcnode-id="8793" instrument_node="">The </span><a data-dcnode-id="8791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radical_%28chemistry%29" title="Radical (chemistry)"><span data-dcnode-id="8792" instrument_node="">free radical</span></a><span data-dcnode-id="8790" instrument_node=""> mechanism of lipid peroxidation</span></div></div></div><span data-dcnode-id="8786" instrument_node="">
</span><p data-dcnode-id="8704"><a data-dcnode-id="8784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione" title="Glutathione"><span data-dcnode-id="8785" instrument_node="">Glutathione</span></a><span data-dcnode-id="8783" instrument_node=""> is a </span><a data-dcnode-id="8781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cysteine" title="Cysteine"><span data-dcnode-id="8782" instrument_node="">cysteine</span></a><span data-dcnode-id="8780" instrument_node="">-containing </span><a data-dcnode-id="8778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peptide" title="Peptide"><span data-dcnode-id="8779" instrument_node="">peptide</span></a><span data-dcnode-id="8777" instrument_node=""> found in most forms of aerobic life.</span><sup class="reference" data-dcnode-id="8774" id="cite_ref-MeisterB_84-0"><a data-dcnode-id="8775" href="#cite_note-MeisterB-84"><span data-dcnode-id="8776" instrument_node="">[84]</span></a></sup><span data-dcnode-id="8773" instrument_node=""> It is not required in the diet and is instead synthesized in cells from its constituent </span><a data-dcnode-id="8771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amino_acid" title="Amino acid"><span data-dcnode-id="8772" instrument_node="">amino acids</span></a><span data-dcnode-id="8770" instrument_node="">.</span><sup class="reference" data-dcnode-id="8767" id="cite_ref-85"><a data-dcnode-id="8768" href="#cite_note-85"><span data-dcnode-id="8769" instrument_node="">[85]</span></a></sup><span data-dcnode-id="8766" instrument_node=""> Glutathione has antioxidant properties since the </span><a data-dcnode-id="8764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thiol" title="Thiol"><span data-dcnode-id="8765" instrument_node="">thiol</span></a><span data-dcnode-id="8763" instrument_node=""> group in its </span><a data-dcnode-id="8761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cysteine" title="Cysteine"><span data-dcnode-id="8762" instrument_node="">cysteine</span></a><span data-dcnode-id="8760" instrument_node=""> </span><a data-dcnode-id="8758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moiety_%28chemistry%29" title="Moiety (chemistry)"><span data-dcnode-id="8759" instrument_node="">moiety</span></a><span data-dcnode-id="8757" instrument_node=""> is a reducing agent and can be reversibly oxidized and reduced. In cells, glutathione is maintained in the reduced form by the enzyme </span><a data-dcnode-id="8755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione_reductase" title="Glutathione reductase"><span data-dcnode-id="8756" instrument_node="">glutathione reductase</span></a><span data-dcnode-id="8754" instrument_node=""> and in turn reduces other metabolites and enzyme systems, such as ascorbate in the </span><a data-dcnode-id="8752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione-ascorbate_cycle" title="Glutathione-ascorbate cycle"><span data-dcnode-id="8753" instrument_node="">glutathione-ascorbate cycle</span></a><span data-dcnode-id="8751" instrument_node="">, </span><a data-dcnode-id="8749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione_peroxidase" title="Glutathione peroxidase"><span data-dcnode-id="8750" instrument_node="">glutathione peroxidases</span></a><span data-dcnode-id="8748" instrument_node=""> and </span><a data-dcnode-id="8746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutaredoxin" title="Glutaredoxin"><span data-dcnode-id="8747" instrument_node="">glutaredoxins</span></a><span data-dcnode-id="8745" instrument_node="">, as well as reacting directly with oxidants.</span><sup class="reference" data-dcnode-id="8742" id="cite_ref-MeisterA_79-1"><a data-dcnode-id="8743" href="#cite_note-MeisterA-79"><span data-dcnode-id="8744" instrument_node="">[79]</span></a></sup><span data-dcnode-id="8741" instrument_node=""> Due to its high concentration and its central role in maintaining the cell's redox state, glutathione is one of the most important cellular antioxidants.</span><sup class="reference" data-dcnode-id="8738" id="cite_ref-MeisterB_84-1"><a data-dcnode-id="8739" href="#cite_note-MeisterB-84"><span data-dcnode-id="8740" instrument_node="">[84]</span></a></sup><span data-dcnode-id="8737" instrument_node=""> In some organisms glutathione is replaced by other thiols, such as by </span><a data-dcnode-id="8735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mycothiol" title="Mycothiol"><span data-dcnode-id="8736" instrument_node="">mycothiol</span></a><span data-dcnode-id="8734" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="8732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Actinomycete" title="Actinomycete"><span data-dcnode-id="8733" instrument_node="">Actinomycetes</span></a><span data-dcnode-id="8731" instrument_node="">, </span><a data-dcnode-id="8729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bacillithiol" title="Bacillithiol"><span data-dcnode-id="8730" instrument_node="">bacillithiol</span></a><span data-dcnode-id="8728" instrument_node=""> in some </span><a data-dcnode-id="8726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gram-positive_bacteria" title="Gram-positive bacteria"><span data-dcnode-id="8727" instrument_node="">Gram-positive bacteria</span></a><span data-dcnode-id="8725" instrument_node="">,</span><sup class="reference" data-dcnode-id="8722" id="cite_ref-pmid20308541_86-0"><a data-dcnode-id="8723" href="#cite_note-pmid20308541-86"><span data-dcnode-id="8724" instrument_node="">[86]</span></a></sup><sup class="reference" data-dcnode-id="8719" id="cite_ref-Newton_87-0"><a data-dcnode-id="8720" href="#cite_note-Newton-87"><span data-dcnode-id="8721" instrument_node="">[87]</span></a></sup><span data-dcnode-id="8718" instrument_node=""> or by </span><a data-dcnode-id="8716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trypanothione" title="Trypanothione"><span data-dcnode-id="8717" instrument_node="">trypanothione</span></a><span data-dcnode-id="8715" instrument_node=""> in the </span><a data-dcnode-id="8713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kinetoplastida" title="Kinetoplastida"><span data-dcnode-id="8714" instrument_node="">Kinetoplastids</span></a><span data-dcnode-id="8712" instrument_node="">.</span><sup class="reference" data-dcnode-id="8709" id="cite_ref-88"><a data-dcnode-id="8710" href="#cite_note-88"><span data-dcnode-id="8711" instrument_node="">[88]</span></a></sup><sup class="reference" data-dcnode-id="8706" id="cite_ref-89"><a data-dcnode-id="8707" href="#cite_note-89"><span data-dcnode-id="8708" instrument_node="">[89]</span></a></sup><span data-dcnode-id="8705" instrument_node="">
</span></p><span data-dcnode-id="8703" instrument_node="">
</span><h3 data-dcnode-id="8693"><span class="mw-headline" data-dcnode-id="8701" id="Vitamin_E"><span data-dcnode-id="8702" instrument_node="">Vitamin E</span></span><span class="mw-editsection" data-dcnode-id="8694"><span class="mw-editsection-bracket" data-dcnode-id="8699"><span data-dcnode-id="8700" instrument_node="">[</span></span><a data-dcnode-id="8697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D10" title="Edit section: Vitamin E"><span data-dcnode-id="8698" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8695"><span data-dcnode-id="8696" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8692" instrument_node="">
</span><p data-dcnode-id="8665"><a data-dcnode-id="8690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamin_E" title="Vitamin E"><span data-dcnode-id="8691" instrument_node="">Vitamin E</span></a><span data-dcnode-id="8689" instrument_node=""> is the collective name for a set of eight related </span><a data-dcnode-id="8687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tocopherol" title="Tocopherol"><span data-dcnode-id="8688" instrument_node="">tocopherols</span></a><span data-dcnode-id="8686" instrument_node=""> and </span><a data-dcnode-id="8684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tocotrienol" title="Tocotrienol"><span data-dcnode-id="8685" instrument_node="">tocotrienols</span></a><span data-dcnode-id="8683" instrument_node="">, which are </span><a class="mw-redirect" data-dcnode-id="8681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fat-soluble" title="Fat-soluble"><span data-dcnode-id="8682" instrument_node="">fat-soluble</span></a><span data-dcnode-id="8680" instrument_node=""> vitamins with antioxidant properties.</span><sup class="reference" data-dcnode-id="8677" id="cite_ref-Herrera_90-0"><a data-dcnode-id="8678" href="#cite_note-Herrera-90"><span data-dcnode-id="8679" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="8674" id="cite_ref-91"><a data-dcnode-id="8675" href="#cite_note-91"><span data-dcnode-id="8676" instrument_node="">[91]</span></a></sup><span data-dcnode-id="8673" instrument_node=""> Of these, α-tocopherol has been most studied as it has the highest </span><a data-dcnode-id="8671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bioavailability" title="Bioavailability"><span data-dcnode-id="8672" instrument_node="">bioavailability</span></a><span data-dcnode-id="8670" instrument_node="">, with the body preferentially absorbing and metabolising this form.</span><sup class="reference" data-dcnode-id="8667" id="cite_ref-Brigelius_92-0"><a data-dcnode-id="8668" href="#cite_note-Brigelius-92"><span data-dcnode-id="8669" instrument_node="">[92]</span></a></sup><span data-dcnode-id="8666" instrument_node="">
</span></p><p data-dcnode-id="8645"><span data-dcnode-id="8664" instrument_node="">It has been claimed that the α-tocopherol form is the most important lipid-soluble antioxidant, and that it protects membranes from oxidation by reacting with lipid radicals produced in the lipid peroxidation chain reaction.</span><sup class="reference" data-dcnode-id="8661" id="cite_ref-Herrera_90-1"><a data-dcnode-id="8662" href="#cite_note-Herrera-90"><span data-dcnode-id="8663" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="8658" id="cite_ref-93"><a data-dcnode-id="8659" href="#cite_note-93"><span data-dcnode-id="8660" instrument_node="">[93]</span></a></sup><span data-dcnode-id="8657" instrument_node=""> This removes the free radical intermediates and prevents the propagation reaction from continuing. This reaction produces oxidised α-tocopheroxyl radicals that can be recycled back to the active reduced form through reduction by other antioxidants, such as ascorbate, retinol or ubiquinol.</span><sup class="reference" data-dcnode-id="8654" id="cite_ref-94"><a data-dcnode-id="8655" href="#cite_note-94"><span data-dcnode-id="8656" instrument_node="">[94]</span></a></sup><span data-dcnode-id="8653" instrument_node=""> This is in line with findings showing that α-tocopherol, but not water-soluble antioxidants, efficiently protects glutathione peroxidase 4 (</span><a data-dcnode-id="8651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GPX4" title="GPX4"><span data-dcnode-id="8652" instrument_node="">GPX4</span></a><span data-dcnode-id="8650" instrument_node="">)-deficient cells from cell death.</span><sup class="reference" data-dcnode-id="8647" id="cite_ref-95"><a data-dcnode-id="8648" href="#cite_note-95"><span data-dcnode-id="8649" instrument_node="">[95]</span></a></sup><span data-dcnode-id="8646" instrument_node=""> GPx4 is the only known enzyme that efficiently reduces lipid-hydroperoxides within biological membranes.
</span></p><p data-dcnode-id="8609"><span data-dcnode-id="8644" instrument_node="">However, the roles and importance of the various forms of vitamin E are presently unclear,</span><sup class="reference" data-dcnode-id="8641" id="cite_ref-96"><a data-dcnode-id="8642" href="#cite_note-96"><span data-dcnode-id="8643" instrument_node="">[96]</span></a></sup><sup class="reference" data-dcnode-id="8638" id="cite_ref-97"><a data-dcnode-id="8639" href="#cite_note-97"><span data-dcnode-id="8640" instrument_node="">[97]</span></a></sup><span data-dcnode-id="8637" instrument_node=""> and it has even been suggested that the most important function of α-tocopherol is as a </span><a data-dcnode-id="8635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cell_signaling" title="Cell signaling"><span data-dcnode-id="8636" instrument_node="">signaling molecule</span></a><span data-dcnode-id="8634" instrument_node="">, with this molecule having no significant role in antioxidant metabolism.</span><sup class="reference" data-dcnode-id="8631" id="cite_ref-Azzi_98-0"><a data-dcnode-id="8632" href="#cite_note-Azzi-98"><span data-dcnode-id="8633" instrument_node="">[98]</span></a></sup><sup class="reference" data-dcnode-id="8628" id="cite_ref-99"><a data-dcnode-id="8629" href="#cite_note-99"><span data-dcnode-id="8630" instrument_node="">[99]</span></a></sup><span data-dcnode-id="8627" instrument_node=""> The functions of the other forms of vitamin E are even less well understood, although γ-tocopherol is a </span><a data-dcnode-id="8625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nucleophile" title="Nucleophile"><span data-dcnode-id="8626" instrument_node="">nucleophile</span></a><span data-dcnode-id="8624" instrument_node=""> that may react with </span><a data-dcnode-id="8622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electrophile" title="Electrophile"><span data-dcnode-id="8623" instrument_node="">electrophilic</span></a><span data-dcnode-id="8621" instrument_node=""> mutagens,</span><sup class="reference" data-dcnode-id="8618" id="cite_ref-Brigelius_92-1"><a data-dcnode-id="8619" href="#cite_note-Brigelius-92"><span data-dcnode-id="8620" instrument_node="">[92]</span></a></sup><span data-dcnode-id="8617" instrument_node=""> and tocotrienols may be important in protecting </span><a data-dcnode-id="8615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neuron" title="Neuron"><span data-dcnode-id="8616" instrument_node="">neurons</span></a><span data-dcnode-id="8614" instrument_node=""> from damage.</span><sup class="reference" data-dcnode-id="8611" id="cite_ref-100"><a data-dcnode-id="8612" href="#cite_note-100"><span data-dcnode-id="8613" instrument_node="">[100]</span></a></sup><span data-dcnode-id="8610" instrument_node="">
</span></p><span data-dcnode-id="8608" instrument_node="">
</span><h2 data-dcnode-id="8598"><span class="mw-headline" data-dcnode-id="8606" id="Pro-oxidant_activities"><span data-dcnode-id="8607" instrument_node="">Pro-oxidant activities</span></span><span class="mw-editsection" data-dcnode-id="8599"><span class="mw-editsection-bracket" data-dcnode-id="8604"><span data-dcnode-id="8605" instrument_node="">[</span></span><a data-dcnode-id="8602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D11" title="Edit section: Pro-oxidant activities"><span data-dcnode-id="8603" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8600"><span data-dcnode-id="8601" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8597" instrument_node="">
</span><link data-dcnode-id="8596" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8592" role="note"><span data-dcnode-id="8595" instrument_node="">Further information: </span><a data-dcnode-id="8593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pro-oxidant" title="Pro-oxidant"><span data-dcnode-id="8594" instrument_node="">Pro-oxidant</span></a></div><span data-dcnode-id="8591" instrument_node="">
</span><p data-dcnode-id="8575"><span data-dcnode-id="8590" instrument_node="">Antioxidants that are reducing agents can also act as pro-oxidants. For example, vitamin C has antioxidant activity when it reduces oxidizing substances such as hydrogen peroxide;</span><sup class="reference" data-dcnode-id="8587" id="cite_ref-101"><a data-dcnode-id="8588" href="#cite_note-101"><span data-dcnode-id="8589" instrument_node="">[101]</span></a></sup><span data-dcnode-id="8586" instrument_node=""> however, it will also reduce metal ions that generate free radicals through the </span><a data-dcnode-id="8584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fenton%2527s_reagent" title="Fenton's reagent"><span data-dcnode-id="8585" instrument_node="">Fenton reaction</span></a><span data-dcnode-id="8583" instrument_node="">.</span><sup class="reference" data-dcnode-id="8580" id="cite_ref-ReferenceA_35-1"><a data-dcnode-id="8581" href="#cite_note-ReferenceA-35"><span data-dcnode-id="8582" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="8577" id="cite_ref-Carr_102-0"><a data-dcnode-id="8578" href="#cite_note-Carr-102"><span data-dcnode-id="8579" instrument_node="">[102]</span></a></sup><span data-dcnode-id="8576" instrument_node="">
</span></p><span data-dcnode-id="8574" instrument_node="">

</span><p data-dcnode-id="8538"><span data-dcnode-id="8543" instrument_node="">The relative importance of the antioxidant and pro-oxidant activities of antioxidants is an area of current research, but vitamin C, which exerts its effects as a vitamin by oxidizing polypeptides, appears to have a mostly antioxidant action in the human body.</span><sup class="reference" data-dcnode-id="8540" id="cite_ref-Carr_102-1"><a data-dcnode-id="8541" href="#cite_note-Carr-102"><span data-dcnode-id="8542" instrument_node="">[102]</span></a></sup><span data-dcnode-id="8539" instrument_node="">

</span></span><img alt="{\displaystyle {\ce {{\underset {Oxygen}{O2}}->{\underset {Superoxide}{*O2^{-}}}->[{\ce {Superoxide \atop dismutase}}]{\underset {Hydrogen \atop peroxide}{H2O2}}->[{\ce {Peroxidases \atop catalase}}]{\underset {Water}{H2O}}}}}" aria-hidden="true" class="mwe-math-fallback-image-inline" data-dcnode-id="8309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikimedia.org/api/rest_v1/media/math/render/svg/8feecd26377be56b431d182ea9a398ab6b5d3b7f&amp;raw" style="vertical-align: -4.338ex; margin-top: -0.428ex; width:48.872ex; height:9.009ex;"></span></div><div class="thumbcaption" data-dcnode-id="8305"><span data-dcnode-id="8306" instrument_node="">Enzymatic pathway&nbsp;for detoxification of reactive oxygen species</span></div></div></div><span data-dcnode-id="8302" instrument_node="">
</span><p data-dcnode-id="8283"><span data-dcnode-id="8301" instrument_node="">As with the chemical antioxidants, cells are protected against oxidative stress by an interacting network of antioxidant enzymes.</span><sup class="reference" data-dcnode-id="8298" id="cite_ref-Davies_30-2"><a data-dcnode-id="8299" href="#cite_note-Davies-30"><span data-dcnode-id="8300" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="8295" id="cite_ref-Sies_31-4"><a data-dcnode-id="8296" href="#cite_note-Sies-31"><span data-dcnode-id="8297" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8294" instrument_node=""> Here, the superoxide released by processes such as </span><a data-dcnode-id="8292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxidative_phosphorylation" title="Oxidative phosphorylation"><span data-dcnode-id="8293" instrument_node="">oxidative phosphorylation</span></a><span data-dcnode-id="8291" instrument_node=""> is first converted to hydrogen peroxide and then further reduced to give water. This detoxification pathway is the result of multiple enzymes, with superoxide dismutases catalysing the first step and then catalases and various peroxidases removing hydrogen peroxide. As with antioxidant metabolites, the contributions of these enzymes to antioxidant defenses can be hard to separate from one another, but the generation of </span><a data-dcnode-id="8289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genetically_modified_organism" title="Genetically modified organism"><span data-dcnode-id="8290" instrument_node="">transgenic mice</span></a><span data-dcnode-id="8288" instrument_node=""> lacking just one antioxidant enzyme can be informative.</span><sup class="reference" data-dcnode-id="8285" id="cite_ref-Magnenat_103-0"><a data-dcnode-id="8286" href="#cite_note-Magnenat-103"><span data-dcnode-id="8287" instrument_node="">[103]</span></a></sup><span data-dcnode-id="8284" instrument_node="">
</span></p><span data-dcnode-id="8282" instrument_node="">
</span><h3 data-dcnode-id="8271"><span data-dcnode-id="8281" id="Superoxide_dismutase.2C_catalase.2C_and_peroxiredoxins"></span><span class="mw-headline" data-dcnode-id="8279" id="Superoxide_dismutase,_catalase,_and_peroxiredoxins"><span data-dcnode-id="8280" instrument_node="">Superoxide dismutase, catalase, and peroxiredoxins</span></span><span class="mw-editsection" data-dcnode-id="8272"><span class="mw-editsection-bracket" data-dcnode-id="8277"><span data-dcnode-id="8278" instrument_node="">[</span></span><a data-dcnode-id="8275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D13" title="Edit section: Superoxide dismutase, catalase, and peroxiredoxins"><span data-dcnode-id="8276" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8273"><span data-dcnode-id="8274" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8270" instrument_node="">
</span><p data-dcnode-id="8205"><a data-dcnode-id="8268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superoxide_dismutase" title="Superoxide dismutase"><span data-dcnode-id="8269" instrument_node="">Superoxide dismutases</span></a><span data-dcnode-id="8267" instrument_node=""> (SODs) are a class of closely related enzymes that catalyze the breakdown of the superoxide anion into oxygen and hydrogen peroxide.</span><sup class="reference" data-dcnode-id="8264" id="cite_ref-104"><a data-dcnode-id="8265" href="#cite_note-104"><span data-dcnode-id="8266" instrument_node="">[104]</span></a></sup><sup class="reference" data-dcnode-id="8261" id="cite_ref-Bannister_105-0"><a data-dcnode-id="8262" href="#cite_note-Bannister-105"><span data-dcnode-id="8263" instrument_node="">[105]</span></a></sup><span data-dcnode-id="8260" instrument_node=""> SOD enzymes are present in almost all aerobic cells and in extracellular fluids.</span><sup class="reference" data-dcnode-id="8257" id="cite_ref-106"><a data-dcnode-id="8258" href="#cite_note-106"><span data-dcnode-id="8259" instrument_node="">[106]</span></a></sup><span data-dcnode-id="8256" instrument_node=""> Superoxide dismutase enzymes contain metal ion cofactors that, depending on the isozyme, can be copper, zinc, </span><a data-dcnode-id="8254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manganese" title="Manganese"><span data-dcnode-id="8255" instrument_node="">manganese</span></a><span data-dcnode-id="8253" instrument_node=""> or iron. In humans, the copper/zinc SOD is present in the </span><a data-dcnode-id="8251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cytosol" title="Cytosol"><span data-dcnode-id="8252" instrument_node="">cytosol</span></a><span data-dcnode-id="8250" instrument_node="">, while manganese SOD is present in the </span><a data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mitochondrion" title="Mitochondrion"><span data-dcnode-id="8249" instrument_node="">mitochondrion</span></a><span data-dcnode-id="8247" instrument_node="">.</span><sup class="reference" data-dcnode-id="8244" id="cite_ref-Bannister_105-1"><a data-dcnode-id="8245" href="#cite_note-Bannister-105"><span data-dcnode-id="8246" instrument_node="">[105]</span></a></sup><span data-dcnode-id="8243" instrument_node=""> There also exists a third form of SOD in </span><a data-dcnode-id="8241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extracellular_fluid" title="Extracellular fluid"><span data-dcnode-id="8242" instrument_node="">extracellular fluids</span></a><span data-dcnode-id="8240" instrument_node="">, which contains copper and zinc in its active sites.</span><sup class="reference" data-dcnode-id="8237" id="cite_ref-107"><a data-dcnode-id="8238" href="#cite_note-107"><span data-dcnode-id="8239" instrument_node="">[107]</span></a></sup><span data-dcnode-id="8236" instrument_node=""> The mitochondrial isozyme seems to be the most biologically important of these three, since mice lacking this enzyme die soon after birth.</span><sup class="reference" data-dcnode-id="8233" id="cite_ref-108"><a data-dcnode-id="8234" href="#cite_note-108"><span data-dcnode-id="8235" instrument_node="">[108]</span></a></sup><span data-dcnode-id="8232" instrument_node=""> In contrast, the mice lacking copper/zinc SOD (Sod1) are viable but have numerous pathologies and a reduced lifespan (see article on </span><a data-dcnode-id="8230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superoxide" title="Superoxide"><span data-dcnode-id="8231" instrument_node="">superoxide</span></a><span data-dcnode-id="8229" instrument_node="">), while mice without the extracellular SOD have minimal defects (sensitive to </span><a data-dcnode-id="8227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyperoxia" title="Hyperoxia"><span data-dcnode-id="8228" instrument_node="">hyperoxia</span></a><span data-dcnode-id="8226" instrument_node="">).</span><sup class="reference" data-dcnode-id="8223" id="cite_ref-Magnenat_103-1"><a data-dcnode-id="8224" href="#cite_note-Magnenat-103"><span data-dcnode-id="8225" instrument_node="">[103]</span></a></sup><sup class="reference" data-dcnode-id="8220" id="cite_ref-109"><a data-dcnode-id="8221" href="#cite_note-109"><span data-dcnode-id="8222" instrument_node="">[109]</span></a></sup><span data-dcnode-id="8219" instrument_node=""> In plants, SOD isozymes are present in the cytosol and mitochondria, with an iron SOD found in </span><a data-dcnode-id="8217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chloroplast" title="Chloroplast"><span data-dcnode-id="8218" instrument_node="">chloroplasts</span></a><span data-dcnode-id="8216" instrument_node=""> that is absent from </span><a data-dcnode-id="8214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vertebrate" title="Vertebrate"><span data-dcnode-id="8215" instrument_node="">vertebrates</span></a><span data-dcnode-id="8213" instrument_node=""> and </span><a data-dcnode-id="8211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yeast" title="Yeast"><span data-dcnode-id="8212" instrument_node="">yeast</span></a><span data-dcnode-id="8210" instrument_node="">.</span><sup class="reference" data-dcnode-id="8207" id="cite_ref-110"><a data-dcnode-id="8208" href="#cite_note-110"><span data-dcnode-id="8209" instrument_node="">[110]</span></a></sup><span data-dcnode-id="8206" instrument_node="">
</span></p><p data-dcnode-id="8164"><a data-dcnode-id="8203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catalase" title="Catalase"><span data-dcnode-id="8204" instrument_node="">Catalases</span></a><span data-dcnode-id="8202" instrument_node=""> are enzymes that catalyse the conversion of hydrogen peroxide to water and oxygen, using either an iron or manganese cofactor.</span><sup class="reference" data-dcnode-id="8199" id="cite_ref-111"><a data-dcnode-id="8200" href="#cite_note-111"><span data-dcnode-id="8201" instrument_node="">[111]</span></a></sup><sup class="reference" data-dcnode-id="8196" id="cite_ref-112"><a data-dcnode-id="8197" href="#cite_note-112"><span data-dcnode-id="8198" instrument_node="">[112]</span></a></sup><span data-dcnode-id="8195" instrument_node=""> This protein is localized to </span><a data-dcnode-id="8193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peroxisome" title="Peroxisome"><span data-dcnode-id="8194" instrument_node="">peroxisomes</span></a><span data-dcnode-id="8192" instrument_node=""> in most </span><a data-dcnode-id="8190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eukaryote" title="Eukaryote"><span data-dcnode-id="8191" instrument_node="">eukaryotic</span></a><span data-dcnode-id="8189" instrument_node=""> cells.</span><sup class="reference" data-dcnode-id="8186" id="cite_ref-113"><a data-dcnode-id="8187" href="#cite_note-113"><span data-dcnode-id="8188" instrument_node="">[113]</span></a></sup><span data-dcnode-id="8185" instrument_node=""> Catalase is an unusual enzyme since, although hydrogen peroxide is its only substrate, it follows a </span><a data-dcnode-id="8183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enzyme_kinetics" title="Enzyme kinetics"><span data-dcnode-id="8184" instrument_node="">ping-pong mechanism</span></a><span data-dcnode-id="8182" instrument_node="">. Here, its cofactor is oxidised by one molecule of hydrogen peroxide and then regenerated by transferring the bound oxygen to a second molecule of substrate.</span><sup class="reference" data-dcnode-id="8179" id="cite_ref-114"><a data-dcnode-id="8180" href="#cite_note-114"><span data-dcnode-id="8181" instrument_node="">[114]</span></a></sup><span data-dcnode-id="8178" instrument_node=""> Despite its apparent importance in hydrogen peroxide removal, humans with genetic deficiency of catalase&nbsp;— "</span><a class="mw-redirect" data-dcnode-id="8176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acatalasemia" title="Acatalasemia"><span data-dcnode-id="8177" instrument_node="">acatalasemia</span></a><span data-dcnode-id="8175" instrument_node="">"&nbsp;— or mice </span><a data-dcnode-id="8173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genetic_engineering" title="Genetic engineering"><span data-dcnode-id="8174" instrument_node="">genetically engineered</span></a><span data-dcnode-id="8172" instrument_node=""> to lack catalase completely, suffer few ill effects.</span><sup class="reference" data-dcnode-id="8169" id="cite_ref-115"><a data-dcnode-id="8170" href="#cite_note-115"><span data-dcnode-id="8171" instrument_node="">[115]</span></a></sup><sup class="reference" data-dcnode-id="8166" id="cite_ref-116"><a data-dcnode-id="8167" href="#cite_note-116"><span data-dcnode-id="8168" instrument_node="">[116]</span></a></sup><span data-dcnode-id="8165" instrument_node="">
</span></p><span data-dcnode-id="8163" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8140"><div class="thumbinner" data-dcnode-id="8141" style="width:222px;"><a class="image" data-dcnode-id="8161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APeroxiredoxin.png"><img alt="" class="thumbimage" data-dcnode-id="8162" data-file-height="599" data-file-width="629" decoding="async" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Peroxiredoxin.png/220px-Peroxiredoxin.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Peroxiredoxin.png/330px-Peroxiredoxin.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Peroxiredoxin.png/440px-Peroxiredoxin.png 2x" width="220"></a><span data-dcnode-id="8160" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8142"><div class="magnify" data-dcnode-id="8158"><a class="internal" data-dcnode-id="8159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APeroxiredoxin.png" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="8156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quaternary_structure" title="Quaternary structure"><span data-dcnode-id="8157" instrument_node="">Decameric</span></a><span data-dcnode-id="8155" instrument_node=""> structure of AhpC, a </span><a class="mw-redirect" data-dcnode-id="8153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bacterial" title="Bacterial"><span data-dcnode-id="8154" instrument_node="">bacterial</span></a><span data-dcnode-id="8152" instrument_node=""> 2-cysteine </span><a data-dcnode-id="8150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peroxiredoxin" title="Peroxiredoxin"><span data-dcnode-id="8151" instrument_node="">peroxiredoxin</span></a><span data-dcnode-id="8149" instrument_node=""> from </span><i data-dcnode-id="8146"><a data-dcnode-id="8147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salmonella_enterica" title="Salmonella enterica"><span data-dcnode-id="8148" instrument_node="">Salmonella typhimurium</span></a></i><sup class="reference" data-dcnode-id="8143" id="cite_ref-117"><a data-dcnode-id="8144" href="#cite_note-117"><span data-dcnode-id="8145" instrument_node="">[117]</span></a></sup></div></div></div><span data-dcnode-id="8139" instrument_node="">
</span><p data-dcnode-id="8091"><a data-dcnode-id="8137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peroxiredoxin" title="Peroxiredoxin"><span data-dcnode-id="8138" instrument_node="">Peroxiredoxins</span></a><span data-dcnode-id="8136" instrument_node=""> are peroxidases that catalyze the reduction of hydrogen peroxide, </span><a class="mw-redirect" data-dcnode-id="8134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organic_peroxide" title="Organic peroxide"><span data-dcnode-id="8135" instrument_node="">organic hydroperoxides</span></a><span data-dcnode-id="8133" instrument_node="">, as well as </span><a data-dcnode-id="8131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peroxynitrite" title="Peroxynitrite"><span data-dcnode-id="8132" instrument_node="">peroxynitrite</span></a><span data-dcnode-id="8130" instrument_node="">.</span><sup class="reference" data-dcnode-id="8127" id="cite_ref-118"><a data-dcnode-id="8128" href="#cite_note-118"><span data-dcnode-id="8129" instrument_node="">[118]</span></a></sup><span data-dcnode-id="8126" instrument_node=""> They are divided into three classes: typical 2-cysteine peroxiredoxins; atypical 2-cysteine peroxiredoxins; and 1-cysteine peroxiredoxins.</span><sup class="reference" data-dcnode-id="8123" id="cite_ref-119"><a data-dcnode-id="8124" href="#cite_note-119"><span data-dcnode-id="8125" instrument_node="">[119]</span></a></sup><span data-dcnode-id="8122" instrument_node=""> These enzymes share the same basic catalytic mechanism, in which a redox-active cysteine (the peroxidatic cysteine) in the </span><a data-dcnode-id="8120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_site" title="Active site"><span data-dcnode-id="8121" instrument_node="">active site</span></a><span data-dcnode-id="8119" instrument_node=""> is oxidized to a </span><a data-dcnode-id="8117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sulfenic_acid" title="Sulfenic acid"><span data-dcnode-id="8118" instrument_node="">sulfenic acid</span></a><span data-dcnode-id="8116" instrument_node=""> by the peroxide substrate.</span><sup class="reference" data-dcnode-id="8113" id="cite_ref-120"><a data-dcnode-id="8114" href="#cite_note-120"><span data-dcnode-id="8115" instrument_node="">[120]</span></a></sup><span data-dcnode-id="8112" instrument_node=""> Over-oxidation of this cysteine residue in peroxiredoxins inactivates these enzymes, but this can be reversed by the action of </span><a data-dcnode-id="8110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sulfiredoxin" title="Sulfiredoxin"><span data-dcnode-id="8111" instrument_node="">sulfiredoxin</span></a><span data-dcnode-id="8109" instrument_node="">.</span><sup class="reference" data-dcnode-id="8106" id="cite_ref-121"><a data-dcnode-id="8107" href="#cite_note-121"><span data-dcnode-id="8108" instrument_node="">[121]</span></a></sup><span data-dcnode-id="8105" instrument_node=""> Peroxiredoxins seem to be important in antioxidant metabolism, as mice lacking peroxiredoxin 1 or 2 have shortened lifespan and suffer from </span><a class="mw-redirect" data-dcnode-id="8103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hemolytic_anaemia" title="Hemolytic anaemia"><span data-dcnode-id="8104" instrument_node="">hemolytic anaemia</span></a><span data-dcnode-id="8102" instrument_node="">, while plants use peroxiredoxins to remove hydrogen peroxide generated in chloroplasts.</span><sup class="reference" data-dcnode-id="8099" id="cite_ref-122"><a data-dcnode-id="8100" href="#cite_note-122"><span data-dcnode-id="8101" instrument_node="">[122]</span></a></sup><sup class="reference" data-dcnode-id="8096" id="cite_ref-123"><a data-dcnode-id="8097" href="#cite_note-123"><span data-dcnode-id="8098" instrument_node="">[123]</span></a></sup><sup class="reference" data-dcnode-id="8093" id="cite_ref-124"><a data-dcnode-id="8094" href="#cite_note-124"><span data-dcnode-id="8095" instrument_node="">[124]</span></a></sup><span data-dcnode-id="8092" instrument_node="">
</span></p><span data-dcnode-id="8090" instrument_node="">
</span><h3 data-dcnode-id="8080"><span class="mw-headline" data-dcnode-id="8088" id="Thioredoxin_and_glutathione_systems"><span data-dcnode-id="8089" instrument_node="">Thioredoxin and glutathione systems</span></span><span class="mw-editsection" data-dcnode-id="8081"><span class="mw-editsection-bracket" data-dcnode-id="8086"><span data-dcnode-id="8087" instrument_node="">[</span></span><a data-dcnode-id="8084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D14" title="Edit section: Thioredoxin and glutathione systems"><span data-dcnode-id="8085" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8082"><span data-dcnode-id="8083" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8079" instrument_node="">
</span><p data-dcnode-id="8032"><span data-dcnode-id="8078" instrument_node="">The </span><a data-dcnode-id="8076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thioredoxin" title="Thioredoxin"><span data-dcnode-id="8077" instrument_node="">thioredoxin</span></a><span data-dcnode-id="8075" instrument_node=""> system contains the 12-k</span><a class="mw-redirect" data-dcnode-id="8073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomic_mass_unit" title="Atomic mass unit"><span data-dcnode-id="8074" instrument_node="">Da</span></a><span data-dcnode-id="8072" instrument_node=""> protein thioredoxin and its companion </span><a data-dcnode-id="8070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thioredoxin_reductase" title="Thioredoxin reductase"><span data-dcnode-id="8071" instrument_node="">thioredoxin reductase</span></a><span data-dcnode-id="8069" instrument_node="">.</span><sup class="reference" data-dcnode-id="8066" id="cite_ref-125"><a data-dcnode-id="8067" href="#cite_note-125"><span data-dcnode-id="8068" instrument_node="">[125]</span></a></sup><span data-dcnode-id="8065" instrument_node=""> Proteins related to thioredoxin are present in all sequenced organisms. Plants, such as </span><i data-dcnode-id="8061"><a data-dcnode-id="8063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabidopsis_thaliana" title="Arabidopsis thaliana"><span data-dcnode-id="8064" instrument_node="">Arabidopsis thaliana</span></a><span data-dcnode-id="8062" instrument_node="">,</span></i><span data-dcnode-id="8060" instrument_node=""> have a particularly great diversity of isoforms.</span><sup class="reference" data-dcnode-id="8057" id="cite_ref-126"><a data-dcnode-id="8058" href="#cite_note-126"><span data-dcnode-id="8059" instrument_node="">[126]</span></a></sup><span data-dcnode-id="8056" instrument_node=""> The active site of thioredoxin consists of two </span><a data-dcnode-id="8054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vicinal_%28chemistry%29" title="Vicinal (chemistry)"><span data-dcnode-id="8055" instrument_node="">neighboring</span></a><span data-dcnode-id="8053" instrument_node=""> cysteines, as part of a highly conserved CXXC </span><a data-dcnode-id="8051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sequence_motif" title="Sequence motif"><span data-dcnode-id="8052" instrument_node="">motif</span></a><span data-dcnode-id="8050" instrument_node="">, that can cycle between an active dithiol form (reduced) and an oxidized </span><a data-dcnode-id="8048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disulfide" title="Disulfide"><span data-dcnode-id="8049" instrument_node="">disulfide</span></a><span data-dcnode-id="8047" instrument_node=""> form. In its active state, thioredoxin acts as an efficient reducing agent, scavenging reactive oxygen species and maintaining other proteins in their reduced state.</span><sup class="reference" data-dcnode-id="8044" id="cite_ref-127"><a data-dcnode-id="8045" href="#cite_note-127"><span data-dcnode-id="8046" instrument_node="">[127]</span></a></sup><span data-dcnode-id="8043" instrument_node=""> After being oxidized, the active thioredoxin is regenerated by the action of thioredoxin reductase, using </span><a class="mw-redirect" data-dcnode-id="8041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NADPH" title="NADPH"><span data-dcnode-id="8042" instrument_node="">NADPH</span></a><span data-dcnode-id="8040" instrument_node=""> as an </span><a data-dcnode-id="8038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electron_donor" title="Electron donor"><span data-dcnode-id="8039" instrument_node="">electron donor</span></a><span data-dcnode-id="8037" instrument_node="">.</span><sup class="reference" data-dcnode-id="8034" id="cite_ref-128"><a data-dcnode-id="8035" href="#cite_note-128"><span data-dcnode-id="8036" instrument_node="">[128]</span></a></sup><span data-dcnode-id="8033" instrument_node="">
</span></p><p data-dcnode-id="7969"><span data-dcnode-id="8031" instrument_node="">The </span><a data-dcnode-id="8029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione" title="Glutathione"><span data-dcnode-id="8030" instrument_node="">glutathione</span></a><span data-dcnode-id="8028" instrument_node=""> system includes glutathione, </span><a data-dcnode-id="8026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione_reductase" title="Glutathione reductase"><span data-dcnode-id="8027" instrument_node="">glutathione reductase</span></a><span data-dcnode-id="8025" instrument_node="">, </span><a data-dcnode-id="8023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione_peroxidase" title="Glutathione peroxidase"><span data-dcnode-id="8024" instrument_node="">glutathione peroxidases</span></a><span data-dcnode-id="8022" instrument_node="">, and </span><a data-dcnode-id="8017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glutathione_S-transferase" title="Glutathione S-transferase"><span data-dcnode-id="8021" instrument_node="">glutathione </span><i data-dcnode-id="8019"><span data-dcnode-id="8020" instrument_node="">S</span></i><span data-dcnode-id="8018" instrument_node="">-transferases</span></a><span data-dcnode-id="8016" instrument_node="">.</span><sup class="reference" data-dcnode-id="8013" id="cite_ref-MeisterB_84-2"><a data-dcnode-id="8014" href="#cite_note-MeisterB-84"><span data-dcnode-id="8015" instrument_node="">[84]</span></a></sup><span data-dcnode-id="8012" instrument_node=""> This system is found in animals, plants and microorganisms.</span><sup class="reference" data-dcnode-id="8009" id="cite_ref-MeisterB_84-3"><a data-dcnode-id="8010" href="#cite_note-MeisterB-84"><span data-dcnode-id="8011" instrument_node="">[84]</span></a></sup><sup class="reference" data-dcnode-id="8006" id="cite_ref-129"><a data-dcnode-id="8007" href="#cite_note-129"><span data-dcnode-id="8008" instrument_node="">[129]</span></a></sup><span data-dcnode-id="8005" instrument_node=""> Glutathione peroxidase is an enzyme containing four </span><a data-dcnode-id="8003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selenium" title="Selenium"><span data-dcnode-id="8004" instrument_node="">selenium</span></a><span data-dcnode-id="8002" instrument_node="">-</span><a data-dcnode-id="8000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cofactor_%28biochemistry%29" title="Cofactor (biochemistry)"><span data-dcnode-id="8001" instrument_node="">cofactors</span></a><span data-dcnode-id="7999" instrument_node=""> that catalyzes the breakdown of hydrogen peroxide and organic hydroperoxides. There are at least four different glutathione peroxidase </span><a data-dcnode-id="7997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isozyme" title="Isozyme"><span data-dcnode-id="7998" instrument_node="">isozymes</span></a><span data-dcnode-id="7996" instrument_node=""> in animals.</span><sup class="reference" data-dcnode-id="7993" id="cite_ref-130"><a data-dcnode-id="7994" href="#cite_note-130"><span data-dcnode-id="7995" instrument_node="">[130]</span></a></sup><span data-dcnode-id="7992" instrument_node=""> Glutathione peroxidase 1 is the most abundant and is a very efficient scavenger of hydrogen peroxide, while glutathione peroxidase 4 is most active with lipid hydroperoxides. Surprisingly, glutathione peroxidase 1 is dispensable, as mice lacking this enzyme have normal lifespans,</span><sup class="reference" data-dcnode-id="7989" id="cite_ref-131"><a data-dcnode-id="7990" href="#cite_note-131"><span data-dcnode-id="7991" instrument_node="">[131]</span></a></sup><span data-dcnode-id="7988" instrument_node=""> but they are hypersensitive to induced oxidative stress.</span><sup class="reference" data-dcnode-id="7985" id="cite_ref-132"><a data-dcnode-id="7986" href="#cite_note-132"><span data-dcnode-id="7987" instrument_node="">[132]</span></a></sup><span data-dcnode-id="7984" instrument_node=""> In addition, the glutathione </span><i data-dcnode-id="7982"><span data-dcnode-id="7983" instrument_node="">S</span></i><span data-dcnode-id="7981" instrument_node="">-transferases show high activity with lipid peroxides.</span><sup class="reference" data-dcnode-id="7978" id="cite_ref-133"><a data-dcnode-id="7979" href="#cite_note-133"><span data-dcnode-id="7980" instrument_node="">[133]</span></a></sup><span data-dcnode-id="7977" instrument_node=""> These enzymes are at particularly high levels in the liver and also serve in </span><a data-dcnode-id="7975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detoxification" title="Detoxification"><span data-dcnode-id="7976" instrument_node="">detoxification</span></a><span data-dcnode-id="7974" instrument_node=""> metabolism.</span><sup class="reference" data-dcnode-id="7971" id="cite_ref-134"><a data-dcnode-id="7972" href="#cite_note-134"><span data-dcnode-id="7973" instrument_node="">[134]</span></a></sup><span data-dcnode-id="7970" instrument_node="">
</span></p><span data-dcnode-id="7968" instrument_node="">
</span><h2 data-dcnode-id="7958"><span class="mw-headline" data-dcnode-id="7966" id="Uses_in_technology"><span data-dcnode-id="7967" instrument_node="">Uses in technology</span></span><span class="mw-editsection" data-dcnode-id="7959"><span class="mw-editsection-bracket" data-dcnode-id="7964"><span data-dcnode-id="7965" instrument_node="">[</span></span><a data-dcnode-id="7962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D15" title="Edit section: Uses in technology"><span data-dcnode-id="7963" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7960"><span data-dcnode-id="7961" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7957" instrument_node="">
</span><h3 data-dcnode-id="7947"><span class="mw-headline" data-dcnode-id="7955" id="Food_preservatives"><span data-dcnode-id="7956" instrument_node="">Food preservatives</span></span><span class="mw-editsection" data-dcnode-id="7948"><span class="mw-editsection-bracket" data-dcnode-id="7953"><span data-dcnode-id="7954" instrument_node="">[</span></span><a data-dcnode-id="7951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAntioxidant%26action%3Dedit%26section%3D16" title="Edit section: Food preservatives"><span data-dcnode-id="7952" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7949"><span data-dcnode-id="7950" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7946" instrument_node="">
