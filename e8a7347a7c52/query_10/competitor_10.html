</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">If you’re looking for crowd-pleaser desserts for picnics or any other get-togethers, Rhubarb and Pear Crumble is a perfect choice. It’s sweet, tart, and crunchy and loaded with nutritious vitamins and antioxidants. The best part? It’s also super quick and simple. A perfect way to celebrate rhubarb season!</span></p><span data-dcnode-id="932" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="927"><figure class="aligncenter size-large is-resized" data-dcnode-id="928"><img alt="A serving of dessert in a brown dish, sitting on a blue and white napkin. Delicious!" class="wp-image-11152 entered lazyloaded" data-dcnode-id="931" data-lazy-src="https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble07-684x1024.jpg" data-ll-status="loaded" data-pin-description="A serving of dessert in a brown dish, sitting on a blue and white napkin. Delicious!" data-pin-title="Rhubarb and Pear Crumble" height="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble07-684x1024.jpg&amp;raw" width="404"><noscript data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">&lt;img src="https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble07-684x1024.jpg" alt="A serving of dessert in a brown dish, sitting on a blue and white napkin. Delicious!" class="wp-image-11152" width="404" height="600"/&gt;</span></noscript></figure></div><span data-dcnode-id="926" instrument_node="">
</span><h2 data-dcnode-id="922"><strong data-dcnode-id="923"><em data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">FRUIT CRUMBLE DESSERTS = Good Ingredients and Easy To Make!</span></em></strong></h2><span data-dcnode-id="921" instrument_node="">
</span><h2 data-dcnode-id="918"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">RHUBARB AND PEAR CRUMBLE</span></strong></h2><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">This rhubarb and pear dessert is as simple as it is delicious. The pears and rhubarb mesh perfectly with the nut crumble topping. It’s also super rich in antioxidants and fiber.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Here’s a super fun fact! Did you know that rhubarb dried roots were mainly used for medicine for thousands of years? It was later on when the edible stalks were prepared as food like how we folks use it today. It is a very good source of vitamin K1 and moderately high in vitamin C. </span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">But be careful, the leaves are poisionus to humans and pets!</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Pears are also filled with fiber and protein. And with other nutritious ingredients in this crumble, what’s better than a delightful combo of delicious and healthy!</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="904" instrument_node="">Also, if you’ve ever wondered (like me, before I looked into it!), what the differences were between a fruit crumble, fruit crisp, fruit betty, etc, I wrote a cool article on </span><strong data-dcnode-id="901"><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thesaltypot.com/baked-fruit-desserts-whats-a-crisp-crumble-pan-dowdy-etc/"><span data-dcnode-id="903" instrument_node="">what the differences were between all these delicious desserts</span></a></strong><span data-dcnode-id="900" instrument_node="">. I mean, what is a pandowdy?? Read the article to find out!</span></p><span data-dcnode-id="898" instrument_node="">

</span><h2 data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">WHAT YOU’LL NEED</span></h2><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Here are the ingredients I used for this delicious rhubarb crumble:</span></p><span data-dcnode-id="879" instrument_node="">
</span><ul data-dcnode-id="856"><li data-dcnode-id="875"><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Rhubarb &amp; Pears:</span></strong><span data-dcnode-id="876" instrument_node=""> Fresh rhubarb is preferred for this recipe, but you can certainly use frozen rhubarb with good results. Also, the pears you use should be very ripe. </span></li><li data-dcnode-id="871"><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Brown Sugar:</span></strong><span data-dcnode-id="872" instrument_node=""> You need a sweetener for this recipe, so I used brown sugar. However, you can also use white sugar or a granulated alternative sweetener if you prefer. Just be sure to make adjustments to the measurements accordingly.</span></li><li data-dcnode-id="867"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Walnuts:</span></strong><span data-dcnode-id="868" instrument_node=""> If walnuts are not available, you can also use pecans instead.</span></li><li data-dcnode-id="864"><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Flour</span></strong></li><li data-dcnode-id="860"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Butter</span></strong><span data-dcnode-id="861" instrument_node="">: If you use salted butter, you can omit the salt in the recipe. </span></li><li data-dcnode-id="857"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Salt</span></strong></li></ul><span data-dcnode-id="855" instrument_node="">

</span><h2 data-dcnode-id="839"><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">HOW TO MAKE THIS FRUIT DESSERT</span></strong></h2><span data-dcnode-id="838" instrument_node="">
</span><ol data-dcnode-id="829"><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">First, dice up rhubarb and pears. Then add brown sugar and mix.</span></li><li data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">In a different bowl, mix together flour, butter, sugar, and salt to make the crumble.&nbsp;</span></li><li data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Add walnuts.</span></li><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">After, you can now place the fruit into the baking dish, top it with the crumble mixture and bake!</span></li></ol><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Super easy! You can look at our full directions on the printable recipe card below.</span></p><span data-dcnode-id="825" instrument_node="">

</span><h2 data-dcnode-id="809"><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">STORAGE IDEAS</span></strong></h2><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="807" instrument_node="">Generally, you can put this rhubarb and pear crumble in the fridge for up to 4 days, but you can also keep it frozen after cooking and it can last up until 3 months! Just like my </span><strong data-dcnode-id="804"><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thesaltypot.com/summertime-sour-cherry-crisp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="806" instrument_node="">Summertime Sour Cherry Crisp</span></a></strong><span data-dcnode-id="803" instrument_node="">, place it well in a freezer-friendly container, then thaw before serving. </span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">You can also freeze this pear crumble in portioned sizes which makes it perfect for individual eating. </span></p><span data-dcnode-id="798" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="793"><figure class="aligncenter size-large is-resized" data-dcnode-id="794"><img alt="A closer up photo of the individual portioned out dessert. There is some whipped cream served on top and a spoon sitting next to the bowl. " class="wp-image-11162 entered lazyloaded" data-dcnode-id="797" data-lazy-sizes="(max-width: 404px) 100vw, 404px" data-lazy-src="https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-684x1024.jpg" data-lazy-srcset="https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-684x1024.jpg 684w, https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-200x300.jpg 200w, https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-150x225.jpg 150w, https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08.jpg 801w" data-ll-status="loaded" data-pin-description="A closer up photo of the individual portioned out dessert. There is some whipped cream served on top and a spoon sitting next to the bowl. " data-pin-title="Rhubarb and Pear Crumble" height="604" sizes="(max-width: 404px) 100vw, 404px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-684x1024.jpg&amp;raw" srcset="https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-684x1024.jpg 684w, https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-200x300.jpg 200w, https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-150x225.jpg 150w, https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08.jpg 801w" width="404"><noscript data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">&lt;img src="https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-684x1024.jpg" alt="A closer up photo of the individual portioned out dessert. There is some whipped cream served on top and a spoon sitting next to the bowl. " class="wp-image-11162" width="404" height="604" srcset="https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-684x1024.jpg 684w, https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-200x300.jpg 200w, https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08-150x225.jpg 150w, https://thesaltypot.com/wp-content/uploads/2021/05/Rhubarb-and-Pear-Crumble08.jpg 801w" sizes="(max-width: 404px) 100vw, 404px" /&gt;</span></noscript></figure></div><span data-dcnode-id="792" instrument_node="">
</span><h2 data-dcnode-id="789"><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Can I freeze this uncooked?</span></strong></h2><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="787" instrument_node="">Yes! Just like my </span><strong data-dcnode-id="784"><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thesaltypot.com/peach-blueberry-crisp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="786" instrument_node="">Peach and Blueberry Crisp</span></a></strong><span data-dcnode-id="783" instrument_node="">, you want to be sure to use a freezer-to-oven-friendly baking dish and cover it well. With this, you can make ahead and freeze for up to 3 months.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">After, you can take it out of the freezer and bake for an extra 30 minutes and serve.</span></p><span data-dcnode-id="778" instrument_node="">

</span><h2 data-dcnode-id="769"><strong data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">COOKING TIPS</span></strong></h2><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Here are some handy cooking tips:</span></p><span data-dcnode-id="765" instrument_node="">
</span><ol data-dcnode-id="758"><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">For nuts, you can use pecans instead of walnuts.</span></li><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">If you want the dessert a bit more tart, you can add more rhubarb by 1/4 cup and/or cut back the sugar.</span></li><li data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Adding finely diced candied ginger would lend yummy new flavors to the dessert. </span></li></ol><span data-dcnode-id="757" instrument_node="">

</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Sweet and tart, this rhubarb and pear crumble makes a perfect easy to make summertime dessert.</span></p><span data-dcnode-id="677" instrument_node="">

</span><div class="mv-create-target mv-create-primary-unit" data-dcnode-id="661"><div class="mv_slot_target" data-dcnode-id="662" data-slot="recipe"></div></div><span data-dcnode-id="660" instrument_node=""> </span><div class="mv-create-ingredients" data-dcnode-id="616"><span data-dcnode-id="659" instrument_node="">
</span><h3 class="mv-create-ingredients-title mv-create-title-secondary" data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Ingredients</span></h3><span data-dcnode-id="656" instrument_node="">
</span><ul data-dcnode-id="618"><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">
						FILLING: 					</span></li><span data-dcnode-id="652" instrument_node="">
</span><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">
						1 c Rhubarb, diced					</span></li><span data-dcnode-id="649" instrument_node="">
</span><li data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">
						3c Pears, ripe, cores and stems removed, diced					</span></li><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">
						1/2c brown sugar					</span></li><span data-dcnode-id="643" instrument_node="">
</span><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">
						1 tsp vanilla					</span></li><span data-dcnode-id="640" instrument_node="">
</span><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">
</span></li><span data-dcnode-id="637" instrument_node="">
</span><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">
						TOPPING:					</span></li><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">
						1c Flour					</span></li><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">
						1/4c Brown sugar					</span></li><span data-dcnode-id="628" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">
						1/3c Butter, cold, cubed into 1/2" cubes					</span></li><span data-dcnode-id="625" instrument_node="">
</span><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">
						1/4c Walnut pieces (small pieces about the size of peppercorns)					</span></li><span data-dcnode-id="622" instrument_node="">
</span><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">
						dash salt (1/4 tsp)					</span></li><span data-dcnode-id="619" instrument_node="">
</span></ul><span data-dcnode-id="617" instrument_node="">
</span></div><span data-dcnode-id="615" instrument_node="">
</span><div class="mv-create-after-supplies-unit mv-create-target mv-create-content-unit" data-dcnode-id="614"></div><span data-dcnode-id="613" instrument_node=""> </span><div class="mv-create-hands-free" data-dcnode-id="612"></div><span data-dcnode-id="611" instrument_node="">
</span><div class="mv-create-instructions" data-dcnode-id="584"><span data-dcnode-id="610" instrument_node="">
</span><h3 class="mv-create-instructions-title mv-create-title-secondary" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Instructions</span></h3><span data-dcnode-id="607" instrument_node="">
</span><ol data-dcnode-id="586"><li data-dcnode-id="605" id="mv_create_307_1"><span data-dcnode-id="606" instrument_node="">Preheat the oven to 350</span></li><li data-dcnode-id="603" id="mv_create_307_2"><span data-dcnode-id="604" instrument_node="">In a bowl, combine the rhubarb, pears, brown sugar, and vanilla. Set aside.</span></li><li data-dcnode-id="601" id="mv_create_307_3"><span data-dcnode-id="602" instrument_node="">In another bowl, combine the flour, brown sugar, and salt. </span></li><li data-dcnode-id="599" id="mv_create_307_4"><span data-dcnode-id="600" instrument_node="">Add the butter. Cut in the butter with a pastry cutter, two knives, or just use your fingers as I did. The mixture should look rustic with the butter in pieces about the size of a pea (or smaller). </span></li><li data-dcnode-id="597" id="mv_create_307_5"><span data-dcnode-id="598" instrument_node="">Add in the walnut pieces and combine.</span></li><li data-dcnode-id="595" id="mv_create_307_6"><span data-dcnode-id="596" instrument_node="">Grease an 8x8 pan or line it with parchment paper for easy cleanup. </span></li><li data-dcnode-id="593" id="mv_create_307_7"><span data-dcnode-id="594" instrument_node="">Transfer the pear mixture into the pan as evenly as possible. </span></li><li data-dcnode-id="591" id="mv_create_307_8"><span data-dcnode-id="592" instrument_node="">Spoon over the flour mixture to ensure an even distribution of the topping.</span></li><li data-dcnode-id="589" id="mv_create_307_9"><span data-dcnode-id="590" instrument_node="">Bake in the oven for 35-40 minutes or until the topping is golden and the fruit is bubbly.</span></li><li data-dcnode-id="587" id="mv_create_307_10"><span data-dcnode-id="588" instrument_node="">Enjoy! </span></li></ol><span data-dcnode-id="585" instrument_node=""> </span></div><span data-dcnode-id="583" instrument_node="">
</span><div class="mv-create-notes" data-dcnode-id="566"><span data-dcnode-id="582" instrument_node="">
</span><h3 class="mv-create-notes-title mv-create-title-secondary" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Notes</span></h3><span data-dcnode-id="579" instrument_node="">
</span><div class="mv-create-notes-content" data-dcnode-id="568"><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="577"></p><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">I left the peel on the pears because I like the extra nutrition. Just be sure to wash the pears before you use them or buy organic. </span></p><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">You can use pecans instead of walnuts. I had walnuts on hand, and pears and walnuts are best friends. </span></p><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">You can also use an 8x8 or 9x9 square pan for this recipe. I wouldn't go much bigger than that. </span></p><p data-dcnode-id="570"></p><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span></div><span data-dcnode-id="565" instrument_node="">
