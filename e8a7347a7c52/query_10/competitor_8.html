</span><meta content="Antimicrobial and Antioxidant Properties of Total Polyphenols of Anchusa italica Retz" data-dcnode-id="10521" name="title"><span data-dcnode-id="10520" instrument_node="">
</span><meta content="Anchusa italica Retz has been used for a long time in phytotherapy. The aim of the present study was to determine the antioxidant and antibacterial activities of extracts from the leaves and roots of Anchusa italica Retz. We first determined the content of phenolic compounds and flavonoids using Folin&amp;ndash;Ciocalteu reagents and aluminum chloride (AlCl3). The antioxidant activity was determined using three methods: reducing power (FRAP), 2.2-diphenyl-1-picrylhydrazyl (DPPH), total antioxidant capacity (TAC). The antimicrobial activity was investigated against four strains of Escherichia coli, two strains of Klebsiella pneumoniae and coagulase-negative Staphylococcus, and one fungal strain of Candida albicans. The results showed that the root extract was rich in polyphenols (43.29 mg GAE/g extract), while the leave extract was rich in flavonoids (28.88 mg QE/g extract). The FRAP assay showed a strong iron reduction capacity for the root extract (IC50 of 0.11 &amp;micro;g/mL) in comparison to ascorbic acid (IC50 of 0.121 &amp;micro;g/mL). The DPPH test determined an IC50 of 0.11 &amp;micro;g/mL for the root extract and an IC50 of 0.14 &amp;micro;g/mL for the leaf extract. These values are low compared to those for ascorbic acid (IC50 of 0.16 &amp;micro;g/mL) and BHT (IC50 0.20 &amp;micro;g/mL). The TAC values of the leaf and root extracts were 0.51 and 0.98 mg AAE/g extract, respectively. In vitro, the extract showed inhibitory activity against all strains studied, with diameters of zones of inhibition in the range of 11.00&amp;ndash;16.00 mm for the root extract and 11.67&amp;ndash;14.33 mm for the leaf extract. The minimum inhibitory concentration was recorded for the leaf extract against E. coli (ATB:57), corresponding to 5 mg/mL. Overall, this research indicates that the extracts of Anchusa italica Retz roots and leaves exert significant antioxidant and antibacterial activities, probably because of the high content of flavonoids and polyphenols." data-dcnode-id="10519" name="description"><span data-dcnode-id="10518" instrument_node="">

</span><meta content="Anchusa italica Retz has been used for a long time in phytotherapy. The aim of the present study was to determine the antioxidant and antibacterial activities of extracts from the leaves and roots of Anchusa italica Retz. We first determined the content of phenolic compounds and flavonoids using Folin&amp;ndash;Ciocalteu reagents and aluminum chloride (AlCl3). The antioxidant activity was determined using three methods: reducing power (FRAP), 2.2-diphenyl-1-picrylhydrazyl (DPPH), total antioxidant capacity (TAC). The antimicrobial activity was investigated against four strains of Escherichia coli, two strains of Klebsiella pneumoniae and coagulase-negative Staphylococcus, and one fungal strain of Candida albicans. The results showed that the root extract was rich in polyphenols (43.29 mg GAE/g extract), while the leave extract was rich in flavonoids (28.88 mg QE/g extract). The FRAP assay showed a strong iron reduction capacity for the root extract (IC50 of 0.11 &amp;micro;g/mL) in comparison to ascorbic acid (IC50 of 0.121 &amp;micro;g/mL). The DPPH test determined an IC50 of 0.11 &amp;micro;g/mL for the root extract and an IC50 of 0.14 &amp;micro;g/mL for the leaf extract. These values are low compared to those for ascorbic acid (IC50 of 0.16 &amp;micro;g/mL) and BHT (IC50 0.20 &amp;micro;g/mL). The TAC values of the leaf and root extracts were 0.51 and 0.98 mg AAE/g extract, respectively. In vitro, the extract showed inhibitory activity against all strains studied, with diameters of zones of inhibition in the range of 11.00&amp;ndash;16.00 mm for the root extract and 11.67&amp;ndash;14.33 mm for the leaf extract. The minimum inhibitory concentration was recorded for the leaf extract against E. coli (ATB:57), corresponding to 5 mg/mL. Overall, this research indicates that the extracts of Anchusa italica Retz roots and leaves exert significant antioxidant and antibacterial activities, probably because of the high content of flavonoids and polyphenols." data-dcnode-id="10475" name="dc.description"><span data-dcnode-id="10474" instrument_node="">

</span><meta content="Antimicrobial and Antioxidant Properties of Total Polyphenols of Anchusa italica Retz" data-dcnode-id="10371" property="og:title"><span data-dcnode-id="10370" instrument_node="">
</span><meta content="Anchusa italica Retz has been used for a long time in phytotherapy. The aim of the present study was to determine the antioxidant and antibacterial activities of extracts from the leaves and roots of Anchusa italica Retz. We first determined the content of phenolic compounds and flavonoids using Folin&amp;ndash;Ciocalteu reagents and aluminum chloride (AlCl3). The antioxidant activity was determined using three methods: reducing power (FRAP), 2.2-diphenyl-1-picrylhydrazyl (DPPH), total antioxidant capacity (TAC). The antimicrobial activity was investigated against four strains of Escherichia coli, two strains of Klebsiella pneumoniae and coagulase-negative Staphylococcus, and one fungal strain of Candida albicans. The results showed that the root extract was rich in polyphenols (43.29 mg GAE/g extract), while the leave extract was rich in flavonoids (28.88 mg QE/g extract). The FRAP assay showed a strong iron reduction capacity for the root extract (IC50 of 0.11 &amp;micro;g/mL) in comparison to ascorbic acid (IC50 of 0.121 &amp;micro;g/mL). The DPPH test determined an IC50 of 0.11 &amp;micro;g/mL for the root extract and an IC50 of 0.14 &amp;micro;g/mL for the leaf extract. These values are low compared to those for ascorbic acid (IC50 of 0.16 &amp;micro;g/mL) and BHT (IC50 0.20 &amp;micro;g/mL). The TAC values of the leaf and root extracts were 0.51 and 0.98 mg AAE/g extract, respectively. In vitro, the extract showed inhibitory activity against all strains studied, with diameters of zones of inhibition in the range of 11.00&amp;ndash;16.00 mm for the root extract and 11.67&amp;ndash;14.33 mm for the leaf extract. The minimum inhibitory concentration was recorded for the leaf extract against E. coli (ATB:57), corresponding to 5 mg/mL. Overall, this research indicates that the extracts of Anchusa italica Retz roots and leaves exert significant antioxidant and antibacterial activities, probably because of the high content of flavonoids and polyphenols." data-dcnode-id="10369" property="og:description"><span data-dcnode-id="10368" instrument_node="">

permission is required to reuse all or part of the article published by MDPI, including figures and tables. For
articles published under an open access Creative Common CC BY license, any part of the article may be reused without
permission provided that the original article is clearly cited.

</span><p data-dcnode-id="10040"><span data-dcnode-id="10041" instrument_node="">

Papers are submitted upon individual invitation or recommendation by the scientific editors and undergo peer review
prior to publication.
</span></p><span data-dcnode-id="10039" instrument_node="">
</span><p data-dcnode-id="10037"><span data-dcnode-id="10038" instrument_node="">

several techniques or approaches, or a comprehensive review paper with concise and precise updates on the latest
progress in the field that systematically reviews the most exciting advances in scientific literature. This type of
paper provides an outlook on future directions of research or possible applications.
</span></p><span data-dcnode-id="10036" instrument_node="">

interesting to authors, or important in this field. The aim is to provide a snapshot of some of the most exciting work
published in the various research areas of the journal.

</span><h2 data-dcnode-id="6170" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6171" instrument_node="">Abstract</span></h2><span data-dcnode-id="6169" instrument_node="">
</span></div><span data-dcnode-id="6167" instrument_node="">
</span><div class="art-abstract in-tab hypothesis_container" data-dcnode-id="6120"><span data-dcnode-id="6166" instrument_node="">
</span><span class="html-italic" data-dcnode-id="6164"><span data-dcnode-id="6165" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="6163" instrument_node=""> Retz has been used for a long time in phytotherapy. The aim of the present study was to determine the antioxidant and antibacterial activities of extracts from the leaves and roots of </span><span class="html-italic" data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="6160" instrument_node=""> Retz. We first determined the content of phenolic compounds and flavonoids using Folin–Ciocalteu reagents and aluminum chloride (AlCl</span><sub data-dcnode-id="6158"><span data-dcnode-id="6159" instrument_node="">3</span></sub><span data-dcnode-id="6157" instrument_node="">). The antioxidant activity was determined using three methods: reducing power (FRAP), 2.2-diphenyl-1-picrylhydrazyl (DPPH), total antioxidant capacity (TAC). The antimicrobial activity was investigated against four strains of </span><span class="html-italic" data-dcnode-id="6155"><span data-dcnode-id="6156" instrument_node="">Escherichia coli,</span></span><span data-dcnode-id="6154" instrument_node=""> two strains of </span><span class="html-italic" data-dcnode-id="6152"><span data-dcnode-id="6153" instrument_node="">Klebsiella pneumoniae</span></span><span data-dcnode-id="6151" instrument_node=""> and coagulase-negative </span><span class="html-italic" data-dcnode-id="6149"><span data-dcnode-id="6150" instrument_node="">Staphylococcus,</span></span><span data-dcnode-id="6148" instrument_node=""> and one fungal strain of </span><span class="html-italic" data-dcnode-id="6146"><span data-dcnode-id="6147" instrument_node="">Candida albicans.</span></span><span data-dcnode-id="6145" instrument_node=""> The results showed that the root extract was rich in polyphenols (43.29 mg GAE/g extract), while the leave extract was rich in flavonoids (28.88 mg QE/g extract). The FRAP assay showed a strong iron reduction capacity for the root extract (IC</span><sub data-dcnode-id="6143"><span data-dcnode-id="6144" instrument_node="">50</span></sub><span data-dcnode-id="6142" instrument_node=""> of 0.11 µg/mL) in comparison to ascorbic acid (IC</span><sub data-dcnode-id="6140"><span data-dcnode-id="6141" instrument_node="">50</span></sub><span data-dcnode-id="6139" instrument_node=""> of 0.121 µg/mL). The DPPH test determined an IC</span><sub data-dcnode-id="6137"><span data-dcnode-id="6138" instrument_node="">50</span></sub><span data-dcnode-id="6136" instrument_node=""> of 0.11 µg/mL for the root extract and an IC</span><sub data-dcnode-id="6134"><span data-dcnode-id="6135" instrument_node="">50</span></sub><span data-dcnode-id="6133" instrument_node=""> of 0.14 µg/mL for the leaf extract. These values are low compared to those for ascorbic acid (IC</span><sub data-dcnode-id="6131"><span data-dcnode-id="6132" instrument_node="">50</span></sub><span data-dcnode-id="6130" instrument_node=""> of 0.16 µg/mL) and BHT (IC</span><sub data-dcnode-id="6128"><span data-dcnode-id="6129" instrument_node="">50</span></sub><span data-dcnode-id="6127" instrument_node=""> 0.20 µg/mL). The TAC values of the leaf and root extracts were 0.51 and 0.98 mg AAE/g extract, respectively. In vitro, the extract showed inhibitory activity against all strains studied, with diameters of zones of inhibition in the range of 11.00–16.00 mm for the root extract and 11.67–14.33 mm for the leaf extract. The minimum inhibitory concentration was recorded for the leaf extract against </span><span class="html-italic" data-dcnode-id="6125"><span data-dcnode-id="6126" instrument_node="">E. coli</span></span><span data-dcnode-id="6124" instrument_node=""> (ATB:57), corresponding to 5 mg/mL. Overall, this research indicates that the extracts of </span><span class="html-italic" data-dcnode-id="6122"><span data-dcnode-id="6123" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="6121" instrument_node=""> Retz roots and leaves exert significant antioxidant and antibacterial activities, probably because of the high content of flavonoids and polyphenols.
</span></div><span data-dcnode-id="6119" instrument_node="">
</span><div class="art-keywords in-tab hypothesis_container" data-dcnode-id="6091"><em data-dcnode-id="6117"><span data-dcnode-id="6118" instrument_node="">Keywords: </span></em><span data-dcnode-id="6116" instrument_node="">

</span><span data-dcnode-id="6093"><span data-dcnode-id="6110" instrument_node=""> </span><a data-dcnode-id="6106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/search%3Fq%3DAnchusa%2520italica%2520Retz"><i data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">Anchusa italica</span></i><span data-dcnode-id="6107" instrument_node=""> Retz</span></a><span data-dcnode-id="6105" instrument_node="">; </span><a data-dcnode-id="6103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/search%3Fq%3Dpolyphenols"><span data-dcnode-id="6104" instrument_node="">polyphenols</span></a><span data-dcnode-id="6102" instrument_node="">; </span><a data-dcnode-id="6100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/search%3Fq%3Dflavonoids"><span data-dcnode-id="6101" instrument_node="">flavonoids</span></a><span data-dcnode-id="6099" instrument_node="">; </span><a data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/search%3Fq%3Dantioxidant"><span data-dcnode-id="6098" instrument_node="">antioxidant</span></a><span data-dcnode-id="6096" instrument_node="">; </span><a data-dcnode-id="6094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/search%3Fq%3Dantibacterial"><span data-dcnode-id="6095" instrument_node="">antibacterial</span></a></span><span data-dcnode-id="6092" instrument_node="">

</span><div class="html-body" data-dcnode-id="5305"><span data-dcnode-id="6083" instrument_node="">
</span><section data-dcnode-id="5989" id="sec1-molecules-27-00416" type="intro"><h2 data-dcnode-id="6081" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6082" instrument_node=""> 1. Introduction</span></h2><div class="html-p" data-dcnode-id="5995"><span data-dcnode-id="6080" instrument_node="">Aromatic and medicinal plants have been traditionally used in phytotherapy [</span><a class="html-bibr" data-dcnode-id="6078" href="#B1-molecules-27-00416" title=""><span data-dcnode-id="6079" instrument_node="">1</span></a><span data-dcnode-id="6077" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6075" href="#B2-molecules-27-00416" title=""><span data-dcnode-id="6076" instrument_node="">2</span></a><span data-dcnode-id="6074" instrument_node="">]. Plants are a rich reservoir of active molecules that are used in the production of medicines around the world [</span><a class="html-bibr" data-dcnode-id="6072" href="#B3-molecules-27-00416" title=""><span data-dcnode-id="6073" instrument_node="">3</span></a><span data-dcnode-id="6071" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6069" href="#B4-molecules-27-00416" title=""><span data-dcnode-id="6070" instrument_node="">4</span></a><span data-dcnode-id="6068" instrument_node="">]. They contain a diversity of phytochemical compounds (polyphenols, flavonoids, tannins, terpenes, etc.) [</span><a class="html-bibr" data-dcnode-id="6066" href="#B5-molecules-27-00416" title=""><span data-dcnode-id="6067" instrument_node="">5</span></a><span data-dcnode-id="6065" instrument_node="">]. These phytochemicals are responsible for the biological activities of plants, including their antifungal, antioxidant, and antibacterial properties [</span><a class="html-bibr" data-dcnode-id="6063" href="#B6-molecules-27-00416" title=""><span data-dcnode-id="6064" instrument_node="">6</span></a><span data-dcnode-id="6062" instrument_node="">] </span><span class="html-italic" data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="6059" instrument_node=""> Retz is a perennial plant bearing flowers [</span><a class="html-bibr" data-dcnode-id="6057" href="#B7-molecules-27-00416" title=""><span data-dcnode-id="6058" instrument_node="">7</span></a><span data-dcnode-id="6056" instrument_node="">]. Kurds used this plant in food preparation; it was also used as an antitussive, depurative, diuretic, and anti-inflammatory. The flower is harvested and dried for further use. The plant is rich in the alkaloid cynoglossine, which is known for its carcinogenic and paralyzing effects [</span><a class="html-bibr" data-dcnode-id="6054" href="#B8-molecules-27-00416" title=""><span data-dcnode-id="6055" instrument_node="">8</span></a><span data-dcnode-id="6053" instrument_node="">]. The flowers of the plant have been traditionally used as a tonic for children and also lower heart rate [</span><a class="html-bibr" data-dcnode-id="6051" href="#B9-molecules-27-00416" title=""><span data-dcnode-id="6052" instrument_node="">9</span></a><span data-dcnode-id="6050" instrument_node="">]. This plant is also used to treat cerebrovascular and cardiovascular diseases and diabetes [</span><a class="html-bibr" data-dcnode-id="6048" href="#B10-molecules-27-00416" title=""><span data-dcnode-id="6049" instrument_node="">10</span></a><span data-dcnode-id="6047" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6045" href="#B11-molecules-27-00416" title=""><span data-dcnode-id="6046" instrument_node="">11</span></a><span data-dcnode-id="6044" instrument_node="">]. Many studies have shown its anti-inflammatory, neuroprotective and antioxidants activities [</span><a class="html-bibr" data-dcnode-id="6042" href="#B4-molecules-27-00416" title=""><span data-dcnode-id="6043" instrument_node="">4</span></a><span data-dcnode-id="6041" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6039" href="#B12-molecules-27-00416" title=""><span data-dcnode-id="6040" instrument_node="">12</span></a><span data-dcnode-id="6038" instrument_node="">]. Plants are an important source of phenolic compounds, which are known for their antibacterial properties and can have applications as natural preservatives either in the food field or in the cosmetic field [</span><a class="html-bibr" data-dcnode-id="6036" href="#B4-molecules-27-00416" title=""><span data-dcnode-id="6037" instrument_node="">4</span></a><span data-dcnode-id="6035" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6033" href="#B12-molecules-27-00416" title=""><span data-dcnode-id="6034" instrument_node="">12</span></a><span data-dcnode-id="6032" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6030" href="#B13-molecules-27-00416" title=""><span data-dcnode-id="6031" instrument_node="">13</span></a><span data-dcnode-id="6029" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6027" href="#B14-molecules-27-00416" title=""><span data-dcnode-id="6028" instrument_node="">14</span></a><span data-dcnode-id="6026" instrument_node="">]. Previous chemical studies have shown that </span><span class="html-italic" data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">Anchusa italic</span></span><span data-dcnode-id="6023" instrument_node=""> Retz is rich in polyphenols, flavonoids, saponins, tannins, vitamin E [</span><a class="html-bibr" data-dcnode-id="6021" href="#B15-molecules-27-00416" title=""><span data-dcnode-id="6022" instrument_node="">15</span></a><span data-dcnode-id="6020" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6018" href="#B16-molecules-27-00416" title=""><span data-dcnode-id="6019" instrument_node="">16</span></a><span data-dcnode-id="6017" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6015" href="#B17-molecules-27-00416" title=""><span data-dcnode-id="6016" instrument_node="">17</span></a><span data-dcnode-id="6014" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6012" href="#B18-molecules-27-00416" title=""><span data-dcnode-id="6013" instrument_node="">18</span></a><span data-dcnode-id="6011" instrument_node="">]. The seeds of the plant are rich in saturated fatty acids, unsaturated fatty acids, and alkaloids [</span><a class="html-bibr" data-dcnode-id="6009" href="#B19-molecules-27-00416" title=""><span data-dcnode-id="6010" instrument_node="">19</span></a><span data-dcnode-id="6008" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6006" href="#B20-molecules-27-00416" title=""><span data-dcnode-id="6007" instrument_node="">20</span></a><span data-dcnode-id="6005" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6003" href="#B21-molecules-27-00416" title=""><span data-dcnode-id="6004" instrument_node="">21</span></a><span data-dcnode-id="6002" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6000" href="#B22-molecules-27-00416" title=""><span data-dcnode-id="6001" instrument_node="">22</span></a><span data-dcnode-id="5999" instrument_node="">]. However, the antioxidant and antimicrobial activities of extracts of </span><span class="html-italic" data-dcnode-id="5997"><span data-dcnode-id="5998" instrument_node="">Anchusa italic</span></span><span data-dcnode-id="5996" instrument_node=""> Retz have not been studied. In Morocco, to our knowledge, there are no studies carried out on this plant.</span></div><div class="html-p" data-dcnode-id="5990"><span data-dcnode-id="5994" instrument_node="">The aim of this research was to determine the antioxidant and antibacterial activiies of extracts of the plant </span><span class="html-italic" data-dcnode-id="5992"><span data-dcnode-id="5993" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5991" instrument_node=""> Retz.</span></div></section><section data-dcnode-id="5516" id="sec2-molecules-27-00416" type="results"><h2 data-dcnode-id="5987" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5988" instrument_node=""> 2. Results and Discussion</span></h2><section data-dcnode-id="5920" id="sec2dot1-molecules-27-00416" type=""><h4 class="html-italic" data-dcnode-id="5985" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5986" instrument_node=""> 2.1. Phenolic and Flavonoids Content</span></h4><div class="html-p" data-dcnode-id="5972"><span data-dcnode-id="5984" instrument_node="">Polyphenol levels were obtained from the linear regression equation of the gallic acid calibration curve y = 0.0056x + 0.0063 and </span><span class="html-italic" data-dcnode-id="5982"><span data-dcnode-id="5983" instrument_node="">R</span></span><sup data-dcnode-id="5980"><span data-dcnode-id="5981" instrument_node="">2</span></sup><span data-dcnode-id="5979" instrument_node=""> = 0.9981 and are expressed as milligrams of gallic acid equivalent per gram of extract (mg GAE/g extract). The results indicated a statistically significant difference (</span><span class="html-italic" data-dcnode-id="5977"><span data-dcnode-id="5978" instrument_node="">p</span></span><span data-dcnode-id="5976" instrument_node=""> &lt; 0.05) between the average phenol contents of two plants extracts, as shown in </span><a class="html-fig html-figpopup" data-dcnode-id="5974" href="#fig_body_display_molecules-27-00416-f001"><span data-dcnode-id="5975" instrument_node="">Figure 1</span></a><span data-dcnode-id="5973" instrument_node="">. The phenolic content of the roots extracts was 43.29 ± 1.12 mg GAE/g extract, while the polyphenol content in the leaves was 36.9 mg GAE/g extract.</span></div><div class="html-fig-wrap" data-dcnode-id="5951" id="molecules-27-00416-f001"><span data-dcnode-id="5971" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="5962"><span data-dcnode-id="5970" instrument_node="">

Histogram of polyphenol and flavonoid content of extracts of Anchusa italic Retz. Sta-tistically significant differences between the means are indicated by a and b (</span><span class="html-italic" data-dcnode-id="5955"><span data-dcnode-id="5956" instrument_node="">p</span></span><span data-dcnode-id="5954" instrument_node=""> &lt; 0.05).

</span></div><span data-dcnode-id="5952" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="5934"><span data-dcnode-id="5950" instrument_node="">The polyphenols yields were lower than those found by another study [</span><a class="html-bibr" data-dcnode-id="5948" href="#B21-molecules-27-00416" title=""><span data-dcnode-id="5949" instrument_node="">21</span></a><span data-dcnode-id="5947" instrument_node="">]. Other research found that the total polyphenol content of </span><span class="html-italic" data-dcnode-id="5945"><span data-dcnode-id="5946" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5944" instrument_node=""> was 16.2 in a methanolic extract and 12.3 in an aqueous extract (gallic acid equivalents per g dry weight) [</span><a class="html-bibr" data-dcnode-id="5942" href="#B22-molecules-27-00416" title=""><span data-dcnode-id="5943" instrument_node="">22</span></a><span data-dcnode-id="5941" instrument_node="">]. This amount varies quantitatively and qualitatively from one plant to another, and this can be attributed to meteorological and petrographic changes, the harvesting season, and the vegetative stage of the plant, as well as the extraction methods used [</span><a class="html-bibr" data-dcnode-id="5939" href="#B23-molecules-27-00416" title=""><span data-dcnode-id="5940" instrument_node="">23</span></a><span data-dcnode-id="5938" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5936" href="#B24-molecules-27-00416" title=""><span data-dcnode-id="5937" instrument_node="">24</span></a><span data-dcnode-id="5935" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="5921"><span data-dcnode-id="5933" instrument_node="">The flavonoids content was determined from the calibration curve of quercetin: y = 0.0019x + 0.0558 and </span><span class="html-italic" data-dcnode-id="5931"><span data-dcnode-id="5932" instrument_node="">R</span></span><sup data-dcnode-id="5929"><span data-dcnode-id="5930" instrument_node="">2</span></sup><span data-dcnode-id="5928" instrument_node=""> = 0.9844 and expressed in mg EQ/g extract. Our results indicated that the flavonoid content in the roots was 20.29 ± 3.29 mg EQ/g extract and that in the leaves was 28.88 ± 5.28 mg EQ/g extract (</span><a class="html-fig html-figpopup" data-dcnode-id="5926" href="#fig_body_display_molecules-27-00416-f001"><span data-dcnode-id="5927" instrument_node="">Figure 1</span></a><span data-dcnode-id="5925" instrument_node="">). Previous studies found that phenolic compounds, including flavonoids, possess strong antioxidant activity and exert health benefits [</span><a class="html-bibr" data-dcnode-id="5923" href="#B25-molecules-27-00416" title=""><span data-dcnode-id="5924" instrument_node="">25</span></a><span data-dcnode-id="5922" instrument_node="">].</span></div></section><section data-dcnode-id="5733" id="sec2dot2-molecules-27-00416" type=""><h4 class="html-italic" data-dcnode-id="5918" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5919" instrument_node=""> 2.2. Antioxidant Activity</span></h4><section data-dcnode-id="5863" id="sec2dot2dot1-molecules-27-00416" type=""><h4 class="" data-dcnode-id="5916" data-nested="3" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5917" instrument_node=""> 2.2.1. Reducing Power Test</span></h4><div class="html-p" data-dcnode-id="5896"><span data-dcnode-id="5915" instrument_node="">The IC</span><sub data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">50</span></sub><span data-dcnode-id="5912" instrument_node=""> values in </span><a class="html-table html-tablepopup" data-dcnode-id="5910" href="#table_body_display_molecules-27-00416-t001"><span data-dcnode-id="5911" instrument_node="">Table 1</span></a><span data-dcnode-id="5909" instrument_node=""> indicated a statistically significant difference (</span><span class="html-italic" data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">p</span></span><span data-dcnode-id="5906" instrument_node=""> &lt; 0.05) between the antioxidant activity (FRAP) of the two plant extracts and that of the natural antioxidants ascorbic acid and BHT. The root extract showed a significantly superior antioxidant activity (0.11 ± 0.01 µg/mL) compared to the leaf extract (1.44 ± 0.06 µg/mL) and the reference ascorbic acid (0.12 ± 0.01 µg/mL), but a lower antioxidant activity compared to BHT (0.034 ± 0.00 µg/mL). This indicates that the extracts of </span><span class="html-italic" data-dcnode-id="5904"><span data-dcnode-id="5905" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5903" instrument_node=""> have important antioxidant characteristics. Metals ions are necessary for the functioning of biochemical and physiological cellular processes but, at the same time, may cause lipid peroxidation, tissue damage, and oxidative stress when their levels re not regulated [</span><a class="html-bibr" data-dcnode-id="5901" href="#B26-molecules-27-00416" title=""><span data-dcnode-id="5902" instrument_node="">26</span></a><span data-dcnode-id="5900" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5898" href="#B27-molecules-27-00416" title=""><span data-dcnode-id="5899" instrument_node="">27</span></a><span data-dcnode-id="5897" instrument_node="">].</span></div><div class="html-table-wrap" data-dcnode-id="5872" id="molecules-27-00416-t001"><div class="html-table_wrap_discription" data-dcnode-id="5885"><span data-dcnode-id="5895" instrument_node="">
</span><b data-dcnode-id="5893"><span data-dcnode-id="5894" instrument_node="">Table 1.</span></b><span data-dcnode-id="5892" instrument_node="">
IC</span><sub data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">50</span></sub><span data-dcnode-id="5889" instrument_node=""> (50% effective concentration) of ascorbic acid, BHT, and extracts of </span><span class="html-italic" data-dcnode-id="5887"><span data-dcnode-id="5888" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5886" instrument_node="">, using the FRAP method.
</span></div><span data-dcnode-id="5884" instrument_node="">
</span><div class="html-table_wrap_td" data-dcnode-id="5875"><span data-dcnode-id="5883" instrument_node="">

</span><img alt="Table" data-dcnode-id="5881" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/img/table.png&amp;raw"><span data-dcnode-id="5880" instrument_node="">
</span><a class="html-expand html-tablepopup" data-dcnode-id="5879" href="#table_body_display_molecules-27-00416-t001"></a><span data-dcnode-id="5878" instrument_node="">

</span></div><span data-dcnode-id="5874" instrument_node="">
</span><span data-dcnode-id="5873" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="5864"><span data-dcnode-id="5871" instrument_node="">Previous research has demonstrated that various flavonoids have antioxidant properties. They can chelate metal ions, the catalysts of the Fenton reaction [</span><a class="html-bibr" data-dcnode-id="5869" href="#B28-molecules-27-00416" title=""><span data-dcnode-id="5870" instrument_node="">28</span></a><span data-dcnode-id="5868" instrument_node="">]. Polyphenolic compounds are powerful reducers, and their presence in the examined extracts could have contributed to the FRAP [</span><a class="html-bibr" data-dcnode-id="5866" href="#B29-molecules-27-00416" title=""><span data-dcnode-id="5867" instrument_node="">29</span></a><span data-dcnode-id="5865" instrument_node="">].</span></div></section><section data-dcnode-id="5799" id="sec2dot2dot2-molecules-27-00416" type=""><h4 class="" data-dcnode-id="5861" data-nested="3" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5862" instrument_node=""> 2.2.2. Scavenging of the Free Radical DPPH</span></h4><div class="html-p" data-dcnode-id="5838"><span data-dcnode-id="5860" instrument_node="">In the DPPH assay, the IC</span><sub data-dcnode-id="5858"><span data-dcnode-id="5859" instrument_node="">50</span></sub><span data-dcnode-id="5857" instrument_node=""> value of the root extract of </span><span class="html-italic" data-dcnode-id="5855"><span data-dcnode-id="5856" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5854" instrument_node=""> Retz was 0.11 ± 0.00 µg/mL and that of the leaf extract was 0.14 ± 0.01 µg/mL (</span><a class="html-table html-tablepopup" data-dcnode-id="5852" href="#table_body_display_molecules-27-00416-t002"><span data-dcnode-id="5853" instrument_node="">Table 2</span></a><span data-dcnode-id="5851" instrument_node="">). The DPPH IC</span><sub data-dcnode-id="5849"><span data-dcnode-id="5850" instrument_node="">50</span></sub><span data-dcnode-id="5848" instrument_node=""> value for vitamin C was approximately 0.16 ± 0.01 µg/mL, and those for BHT and quercetin were 0.2 ± 0.00 µg/mL and 0.05 ± 0.00 µg/mL, respectively. These results indicate that the radical scavenging capacity of the root extract of </span><span class="html-italic" data-dcnode-id="5846"><span data-dcnode-id="5847" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5845" instrument_node=""> is superior to those of vitamin C, BHT, and the leaf extract, but inferior to that of the natural antioxidant quercetin. The statistical analysis of the antioxidant test for the two plant extracts showed a statistically significant differences (</span><span class="html-italic" data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">p</span></span><span data-dcnode-id="5842" instrument_node=""> &lt; 0.05), as can be seen in </span><a class="html-table html-tablepopup" data-dcnode-id="5840" href="#table_body_display_molecules-27-00416-t002"><span data-dcnode-id="5841" instrument_node="">Table 2</span></a><span data-dcnode-id="5839" instrument_node="">.</span></div><div class="html-table-wrap" data-dcnode-id="5817" id="molecules-27-00416-t002"><div class="html-table_wrap_discription" data-dcnode-id="5830"><span data-dcnode-id="5837" instrument_node="">
</span><b data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">Table 2.</span></b><span data-dcnode-id="5834" instrument_node="">
Values IC</span><sub data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">50</span></sub><span data-dcnode-id="5831" instrument_node=""> from the DPPH test.
</span></div><span data-dcnode-id="5829" instrument_node="">

</span><span data-dcnode-id="5818" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="5800"><span data-dcnode-id="5816" instrument_node="">Previous studies reported that the IC</span><sub data-dcnode-id="5814"><span data-dcnode-id="5815" instrument_node="">50</span></sub><span data-dcnode-id="5813" instrument_node=""> value of the free radical scavenging activity on DPPH for </span><span class="html-italic" data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5810" instrument_node=""> Retz was 84 µg/mL [</span><a class="html-bibr" data-dcnode-id="5808" href="#B21-molecules-27-00416" title=""><span data-dcnode-id="5809" instrument_node="">21</span></a><span data-dcnode-id="5807" instrument_node="">]. This supports our finding that our extracts are powerful antioxidants. Previous studies indicated that butanol present in </span><span class="html-italic" data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5804" instrument_node=""> and two of triterpene compounds isolated by Kuruüzüm–Uz et al. [</span><a class="html-bibr" data-dcnode-id="5802" href="#B30-molecules-27-00416" title=""><span data-dcnode-id="5803" instrument_node="">30</span></a><span data-dcnode-id="5801" instrument_node="">] have strong antioxidant activity against DPPH.</span></div></section><section data-dcnode-id="5734" id="sec2dot2dot3-molecules-27-00416" type=""><h4 class="" data-dcnode-id="5797" data-nested="3" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5798" instrument_node=""> 2.2.3. Total Antioxidant Capacity </span></h4><div class="html-p" data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">The total antioxidant capacity was measured using ascorbic acid at different concentration to obtain an ascorbic acid calibration curve; we expressed the antioxidant capacity of the extracts in milligrams of ascorbic acid equivalent per gram of sample (mg AAE/g extract).</span></div><div class="html-p" data-dcnode-id="5790"><span data-dcnode-id="5794" instrument_node="">The root extract of the studied plant showed a very strong total antioxidant capacity of 0.98 ± 0.28 mg AAE/g extract with respect to the leaf extract, which showed a total antioxidant activity of about 0.51 ± 0.01 mg AAE/g extract (</span><a class="html-table html-tablepopup" data-dcnode-id="5792" href="#table_body_display_molecules-27-00416-t003"><span data-dcnode-id="5793" instrument_node="">Table 3</span></a><span data-dcnode-id="5791" instrument_node="">).</span></div><div class="html-table-wrap" data-dcnode-id="5769" id="molecules-27-00416-t003"><div class="html-table_wrap_discription" data-dcnode-id="5782"><span data-dcnode-id="5789" instrument_node="">
</span><b data-dcnode-id="5787"><span data-dcnode-id="5788" instrument_node="">Table 3.</span></b><span data-dcnode-id="5786" instrument_node="">
Total antioxidant capacity of the two extracts of </span><span class="html-italic" data-dcnode-id="5784"><span data-dcnode-id="5785" instrument_node="">A. italica</span></span><span data-dcnode-id="5783" instrument_node=""> Retz.
</span></div><span data-dcnode-id="5781" instrument_node="">

</span></div><div class="html-p" data-dcnode-id="5752"><span data-dcnode-id="5768" instrument_node="">Recent studies have shown that phenolic compounds, in particular flavonoids, are powerful antioxidants [</span><a class="html-bibr" data-dcnode-id="5766" href="#B31-molecules-27-00416" title=""><span data-dcnode-id="5767" instrument_node="">31</span></a><span data-dcnode-id="5765" instrument_node="">]. The antioxidant activity of flavonoids results from the elimination, chelation, and scavenging of free radicals, the inhibition of oxidases, and the chelation of iron ions [</span><a class="html-bibr" data-dcnode-id="5763" href="#B32-molecules-27-00416" title=""><span data-dcnode-id="5764" instrument_node="">32</span></a><span data-dcnode-id="5762" instrument_node="">]. HPLC–MS chromatographic analysis showed that the plant </span><span class="html-italic" data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5759" instrument_node=""> is rich in flavonoids including rutin, quercetin, kaempferol, naringenin, hesperidin [</span><a class="html-bibr" data-dcnode-id="5757" href="#B17-molecules-27-00416" title=""><span data-dcnode-id="5758" instrument_node="">17</span></a><span data-dcnode-id="5756" instrument_node="">]. Other studies have shown that rutin exhibited antioxidant activity in all three antioxidant tests, i.e., DPPH radical scavenging, reducing power, total antioxidant activity; our results confirm these previous findings [</span><a class="html-bibr" data-dcnode-id="5754" href="#B33-molecules-27-00416" title=""><span data-dcnode-id="5755" instrument_node="">33</span></a><span data-dcnode-id="5753" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="5735"><span data-dcnode-id="5751" instrument_node="">The antioxidant activity of </span><span class="html-italic" data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">Anchusa</span></span><span data-dcnode-id="5748" instrument_node=""> spp. is well demonstrated in the literature. In fact, </span><span class="html-italic" data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">Anchusa azurea</span></span><span data-dcnode-id="5745" instrument_node=""> and </span><span class="html-italic" data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">Anchusa officinalis</span></span><span data-dcnode-id="5742" instrument_node=""> have shown antioxidant activity as DPPH radical scavengers [</span><a class="html-bibr" data-dcnode-id="5740" href="#B34-molecules-27-00416" title=""><span data-dcnode-id="5741" instrument_node="">34</span></a><span data-dcnode-id="5739" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5737" href="#B35-molecules-27-00416" title=""><span data-dcnode-id="5738" instrument_node="">35</span></a><span data-dcnode-id="5736" instrument_node="">].</span></div></section></section><section data-dcnode-id="5517" id="sec2dot3-molecules-27-00416" type=""><h4 class="html-italic" data-dcnode-id="5731" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5732" instrument_node=""> 2.3. Antimicrobial Studies</span></h4><section data-dcnode-id="5518" id="DeterminationoftheAntimicrobialActivityoftheExtracts" type=""><h4 class="" data-dcnode-id="5729" data-nested="3" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5730" instrument_node=""> Determination of the Antimicrobial Activity of the Extracts</span></h4><div class="html-p" data-dcnode-id="5718"><span data-dcnode-id="5728" instrument_node="">Antimicrobial testing of leaves and roots samples of </span><span class="html-italic" data-dcnode-id="5726"><span data-dcnode-id="5727" instrument_node="">A. italica</span></span><span data-dcnode-id="5725" instrument_node=""> Retz against selected bacterial strains was carried out by using the solid medium disk and microdilution assay. The inhibition zones and the minimum inhibitory concentration of the two extracts are presented in </span><a class="html-table html-tablepopup" data-dcnode-id="5723" href="#table_body_display_molecules-27-00416-t004"><span data-dcnode-id="5724" instrument_node="">Table 4</span></a><span data-dcnode-id="5722" instrument_node=""> and </span><a class="html-table html-tablepopup" data-dcnode-id="5720" href="#table_body_display_molecules-27-00416-t005"><span data-dcnode-id="5721" instrument_node="">Table 5</span></a><span data-dcnode-id="5719" instrument_node="">.</span></div><div class="html-table-wrap" data-dcnode-id="5697" id="molecules-27-00416-t004"><div class="html-table_wrap_discription" data-dcnode-id="5710"><span data-dcnode-id="5717" instrument_node="">
</span><b data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">Table 4.</span></b><span data-dcnode-id="5714" instrument_node="">
Diameter of inhibition zones of </span><span class="html-italic" data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5711" instrument_node=""> Retz extracts.

The minimum inhibitory concentration (MIC) of </span><span class="html-italic" data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5690" instrument_node=""> Retz extracts.

</span><span data-dcnode-id="5677" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="5620"><span data-dcnode-id="5675" instrument_node="">As far as we know, the antimicrobial activity of extracts from the roots and leaves of </span><span class="html-italic" data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5672" instrument_node=""> Retz has not been studied. As per the results of the diameter of inhibition zones (DIZ) presented in </span><a class="html-table html-tablepopup" data-dcnode-id="5670" href="#table_body_display_molecules-27-00416-t004"><span data-dcnode-id="5671" instrument_node="">Table 4</span></a><span data-dcnode-id="5669" instrument_node="">, the extracts showed moderate antibacterial activity against all eight strains studied (</span><span class="html-italic" data-dcnode-id="5667"><span data-dcnode-id="5668" instrument_node="">E. coli</span></span><span data-dcnode-id="5666" instrument_node=""> (ATB: 97) BGM, </span><span class="html-italic" data-dcnode-id="5664"><span data-dcnode-id="5665" instrument_node="">E. coli</span></span><span data-dcnode-id="5663" instrument_node=""> (ATB: 57) B6N, </span><span class="html-italic" data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">E. coli</span></span><span data-dcnode-id="5660" instrument_node=""> (ESBL), </span><span class="html-italic" data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">E. coli</span></span><span data-dcnode-id="5657" instrument_node=""> sensible, </span><span class="html-italic" data-dcnode-id="5655"><span data-dcnode-id="5656" instrument_node="">K. pneumoniae</span></span><span data-dcnode-id="5654" instrument_node=""> (ESBL-KP), </span><span class="html-italic" data-dcnode-id="5652"><span data-dcnode-id="5653" instrument_node="">K. pneumoniae</span></span><span data-dcnode-id="5651" instrument_node=""> sensible, coagulase-negative </span><span class="html-italic" data-dcnode-id="5649"><span data-dcnode-id="5650" instrument_node="">staphylococci</span></span><span data-dcnode-id="5648" instrument_node=""> and </span><span class="html-italic" data-dcnode-id="5646"><span data-dcnode-id="5647" instrument_node="">C. albicans</span></span><span data-dcnode-id="5645" instrument_node="">), with diameters of inhibition zones ranging from 11 to 16 mm. The largest zones of inhibition were found for coagulase-negative </span><span class="html-italic" data-dcnode-id="5643"><span data-dcnode-id="5644" instrument_node="">staphylococci</span></span><span data-dcnode-id="5642" instrument_node=""> (16.00 ± 1.00 mm) in the presence of the root extract and the leaf extract (13.67 ± 1.15 mm), followed by </span><span class="html-italic" data-dcnode-id="5640"><span data-dcnode-id="5641" instrument_node="">E. coli</span></span><span data-dcnode-id="5639" instrument_node=""> (ATB: 97) BGM, with an inhibition zone for the root extract of 15.00 ± 1.00 mm and for the leaf extract of 12.33 ± 1.15 mm, and then by </span><span class="html-italic" data-dcnode-id="5637"><span data-dcnode-id="5638" instrument_node="">E. coli</span></span><span data-dcnode-id="5636" instrument_node=""> sensible, with inhibition diameters for the root and leaf extracts of 13.67 ± 0.58 mm and 14.33 ± 0.58 mm, respectively, followed by </span><span class="html-italic" data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">C. albicans</span></span><span data-dcnode-id="5633" instrument_node="">, </span><span class="html-italic" data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">E. coli</span></span><span data-dcnode-id="5630" instrument_node=""> (ATB: 57) B6N, </span><span class="html-italic" data-dcnode-id="5628"><span data-dcnode-id="5629" instrument_node="">E. coli</span></span><span data-dcnode-id="5627" instrument_node=""> (ESBL), </span><span class="html-italic" data-dcnode-id="5625"><span data-dcnode-id="5626" instrument_node="">K. pneumoniae</span></span><span data-dcnode-id="5624" instrument_node="">, and lastly </span><span class="html-italic" data-dcnode-id="5622"><span data-dcnode-id="5623" instrument_node="">K. pneumoniae</span></span><span data-dcnode-id="5621" instrument_node=""> (ESBL-KP).</span></div><div class="html-p" data-dcnode-id="5591"><span data-dcnode-id="5619" instrument_node="">A shown in </span><a class="html-table html-tablepopup" data-dcnode-id="5617" href="#table_body_display_molecules-27-00416-t005"><span data-dcnode-id="5618" instrument_node="">Table 5</span></a><span data-dcnode-id="5616" instrument_node="">, we found that only 5 mg/mL of leaf extracts was sufficient to stop the growth of </span><span class="html-italic" data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node="">E. coli</span></span><span data-dcnode-id="5613" instrument_node=""> (ATB: 57) B6N, while 10.00 mg/mL extracts was needed to stop the growth of </span><span class="html-italic" data-dcnode-id="5611"><span data-dcnode-id="5612" instrument_node="">E. coli</span></span><span data-dcnode-id="5610" instrument_node=""> (ATB: 97), coagulase-negative </span><span class="html-italic" data-dcnode-id="5608"><span data-dcnode-id="5609" instrument_node="">staphylococci</span></span><span data-dcnode-id="5607" instrument_node="">, </span><span class="html-italic" data-dcnode-id="5605"><span data-dcnode-id="5606" instrument_node="">E. coli</span></span><span data-dcnode-id="5604" instrument_node=""> (ESBL), and </span><span class="html-italic" data-dcnode-id="5602"><span data-dcnode-id="5603" instrument_node="">E. coli</span></span><span data-dcnode-id="5601" instrument_node=""> sensible. On the other hand, </span><span class="html-italic" data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">C. albicans</span></span><span data-dcnode-id="5598" instrument_node="">, </span><span class="html-italic" data-dcnode-id="5596"><span data-dcnode-id="5597" instrument_node="">K. pneumoniae</span></span><span data-dcnode-id="5595" instrument_node=""> (ESBL-KP), and </span><span class="html-italic" data-dcnode-id="5593"><span data-dcnode-id="5594" instrument_node="">K. pneumoniae</span></span><span data-dcnode-id="5592" instrument_node=""> sensible (KPS) were inhibited by the leaf and root extracts with MIC of 20.00 mg/mL.</span></div><div class="html-p" data-dcnode-id="5571"><span data-dcnode-id="5590" instrument_node="">Previous studies have shown that the extracts of </span><span class="html-italic" data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5587" instrument_node=""> Retz showed a significant antibacterial activity against </span><span class="html-italic" data-dcnode-id="5585"><span data-dcnode-id="5586" instrument_node="">E. coli</span></span><span data-dcnode-id="5584" instrument_node="">, </span><span class="html-italic" data-dcnode-id="5582"><span data-dcnode-id="5583" instrument_node="">Bacillus</span></span><span data-dcnode-id="5581" instrument_node=""> sp., </span><span class="html-italic" data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">S. aureus</span></span><span data-dcnode-id="5578" instrument_node="">, </span><span class="html-italic" data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">P. Aeruginosa</span></span><span data-dcnode-id="5575" instrument_node="">) [</span><a class="html-bibr" data-dcnode-id="5573" href="#B3-molecules-27-00416" title=""><span data-dcnode-id="5574" instrument_node="">3</span></a><span data-dcnode-id="5572" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="5542"><span data-dcnode-id="5570" instrument_node="">The most studied plants seem to contain compounds of phenolic nature, especially essential oils, flavonoids, and terpenoids. These compounds have been known for their antimicrobial activity [</span><a class="html-bibr" data-dcnode-id="5568" href="#B36-molecules-27-00416" title=""><span data-dcnode-id="5569" instrument_node="">36</span></a><span data-dcnode-id="5567" instrument_node="">]. The antibacterial properties of phenolic compounds have been well demonstrated in other previous studies [</span><a class="html-bibr" data-dcnode-id="5565" href="#B37-molecules-27-00416" title=""><span data-dcnode-id="5566" instrument_node="">37</span></a><span data-dcnode-id="5564" instrument_node="">]. HPLC chromatographic analysis showed that the plant </span><span class="html-italic" data-dcnode-id="5562"><span data-dcnode-id="5563" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5561" instrument_node=""> is rich in caffeic acid, rutin and astragaline [</span><a class="html-bibr" data-dcnode-id="5559" href="#B38-molecules-27-00416" title=""><span data-dcnode-id="5560" instrument_node="">38</span></a><span data-dcnode-id="5558" instrument_node="">]. The antibacterial activity of caffeic acid has been well demonstrated in previous research [</span><a class="html-bibr" data-dcnode-id="5556" href="#B37-molecules-27-00416" title=""><span data-dcnode-id="5557" instrument_node="">37</span></a><span data-dcnode-id="5555" instrument_node="">]. Phenolic compounds exert their antimicrobial activity at the cellular level either by modifying the rigidity of the cell wall, the permeability of the cell membrane, or various intracellular functions induced through the formation of hydrogen bonds with enzymes [</span><a class="html-bibr" data-dcnode-id="5553" href="#B39-molecules-27-00416" title=""><span data-dcnode-id="5554" instrument_node="">39</span></a><span data-dcnode-id="5552" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5550" href="#B40-molecules-27-00416" title=""><span data-dcnode-id="5551" instrument_node="">40</span></a><span data-dcnode-id="5549" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5547" href="#B41-molecules-27-00416" title=""><span data-dcnode-id="5548" instrument_node="">41</span></a><span data-dcnode-id="5546" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5544" href="#B42-molecules-27-00416" title=""><span data-dcnode-id="5545" instrument_node="">42</span></a><span data-dcnode-id="5543" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="5519"><span data-dcnode-id="5541" instrument_node="">Previous research has shown that </span><span class="html-italic" data-dcnode-id="5539"><span data-dcnode-id="5540" instrument_node="">Anchusa</span></span><span data-dcnode-id="5538" instrument_node=""> spp. have antibacterial activity. In fact, the extract of aerial parts of </span><span class="html-italic" data-dcnode-id="5536"><span data-dcnode-id="5537" instrument_node="">Anchusa azurea</span></span><span data-dcnode-id="5535" instrument_node=""> showed an inhibitory effect on 11 bacteria, including </span><span class="html-italic" data-dcnode-id="5533"><span data-dcnode-id="5534" instrument_node="">Escherichia coli, Klebsiella pneumonia</span></span><span data-dcnode-id="5532" instrument_node="">, and </span><span class="html-italic" data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node="">Staphylococcus aureus</span></span><span data-dcnode-id="5529" instrument_node=""> [</span><a class="html-bibr" data-dcnode-id="5527" href="#B40-molecules-27-00416" title=""><span data-dcnode-id="5528" instrument_node="">40</span></a><span data-dcnode-id="5526" instrument_node="">]. On the other hand, </span><span class="html-italic" data-dcnode-id="5524"><span data-dcnode-id="5525" instrument_node="">Anchusa strigosa</span></span><span data-dcnode-id="5523" instrument_node=""> has shown strong antibacterial activity against Gram-negative and Gram-positive bacterial strains [</span><a class="html-bibr" data-dcnode-id="5521" href="#B12-molecules-27-00416" title=""><span data-dcnode-id="5522" instrument_node="">12</span></a><span data-dcnode-id="5520" instrument_node="">].</span></div></section></section></section><section data-dcnode-id="5318" id="sec3-molecules-27-00416" type=""><h2 data-dcnode-id="5514" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5515" instrument_node=""> 3. Materials and Methods</span></h2><section data-dcnode-id="5506" id="sec3dot1-molecules-27-00416" type=""><h4 class="html-italic" data-dcnode-id="5512" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5513" instrument_node=""> 3.1. Plant Material</span></h4><div class="html-p" data-dcnode-id="5507"><span data-dcnode-id="5511" instrument_node="">The plant parts used in this study, including the roots and leaves of </span><span class="html-italic" data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5508" instrument_node=""> Retz, were collected in the region of MoulayYacoub, Morocco, during the autumn period from November to December 2020. After harvesting, the plant material was washed with water, dried at 30 °C, then crushed and stored in boxes. A hydro–ethanolic extract of the plant was prepared by maceration using 30% distilled water and 70% ethanol for 10% plant powder (mass/volume). After filtration, the filtrate was concentrated by evaporation of the solvent, using a rotary evaporator under partial vacuum at 40 °C, and the dry extract was stored until further use.</span></div></section><section data-dcnode-id="5487" id="sec3dot2-molecules-27-00416" type=""><h4 class="html-italic" data-dcnode-id="5504" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5505" instrument_node=""> 3.2. Determination of the Phenolic Content</span></h4><div class="html-p" data-dcnode-id="5488"><span data-dcnode-id="5503" instrument_node="">The phenolic content was determined according to the Folin–Ciocalteu protocol with some modifications by using the gallic acid standard [</span><a class="html-bibr" data-dcnode-id="5501" href="#B41-molecules-27-00416" title=""><span data-dcnode-id="5502" instrument_node="">41</span></a><span data-dcnode-id="5500" instrument_node="">]. In this test, 0.2 mL of Folin–Ciocalteu reagent was added to 4 mL of 2% Na</span><sub data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">2</span></sub><span data-dcnode-id="5497" instrument_node="">CO</span><sub data-dcnode-id="5495"><span data-dcnode-id="5496" instrument_node="">3</span></sub><span data-dcnode-id="5494" instrument_node=""> and 0.2 mL of plant extracts. After half an hour, the determination of the absorbance of the solution was carried out using a spectrophotometer at 760 nm, and the phenolic content was calculated using the equation of the calibration range established with gallic acid, i.e., y = 0.0001x + 0.0627 and </span><span class="html-italic" data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">R</span></span><sup data-dcnode-id="5490"><span data-dcnode-id="5491" instrument_node="">2</span></sup><span data-dcnode-id="5489" instrument_node=""> = 0.8694.</span></div></section><section data-dcnode-id="5471" id="sec3dot3-molecules-27-00416" type=""><h4 class="html-italic" data-dcnode-id="5485" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5486" instrument_node=""> 3.3. Determination of the Flavonoid Content </span></h4><div class="html-p" data-dcnode-id="5472"><span data-dcnode-id="5484" instrument_node="">The quantification of flavonoids was carried out according to the following protocol [</span><a class="html-bibr" data-dcnode-id="5482" href="#B42-molecules-27-00416" title=""><span data-dcnode-id="5483" instrument_node="">42</span></a><span data-dcnode-id="5481" instrument_node="">], with slight modifications. We added 2 mL of the extract to 0.2 mL of 10% AlCl</span><sub data-dcnode-id="5479"><span data-dcnode-id="5480" instrument_node="">3</span></sub><span data-dcnode-id="5478" instrument_node="">, 0.2 mL of 1 M potassium acetate, and 7.6 mL of ethanol. After 40 min, the absorbance was determined by spectrophotometry at 430 nm, and the flavonoid content was determined using the equation of the calibration range established with quercetin, i.e., y = 0.0019x + 0.0558 and </span><span class="html-italic" data-dcnode-id="5476"><span data-dcnode-id="5477" instrument_node="">R</span></span><sup data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">2</span></sup><span data-dcnode-id="5473" instrument_node=""> = 0.9844.</span></div></section><section data-dcnode-id="5404" id="sec3dot4-molecules-27-00416" type=""><h4 class="html-italic" data-dcnode-id="5469" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5470" instrument_node=""> 3.4. Antioxidant Tests </span></h4><section data-dcnode-id="5446" id="sec3dot4dot1-molecules-27-00416" type=""><h4 class="" data-dcnode-id="5467" data-nested="3" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5468" instrument_node=""> 3.4.1. Reducing Power Test </span></h4><div class="html-p" data-dcnode-id="5447"><span data-dcnode-id="5466" instrument_node="">The reducing power test was performed according to the following protocol [</span><a class="html-bibr" data-dcnode-id="5464" href="#B43-molecules-27-00416" title=""><span data-dcnode-id="5465" instrument_node="">43</span></a><span data-dcnode-id="5463" instrument_node="">]. We added 750 µL of ferricyanide of potassium [K</span><sub data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">3</span></sub><span data-dcnode-id="5460" instrument_node="">Fe(CN)</span><sub data-dcnode-id="5458"><span data-dcnode-id="5459" instrument_node="">6</span></sub><span data-dcnode-id="5457" instrument_node="">] 1% to 750 µL phosphate buffer (0.2 M: pH = 6.6) and 1.5 mL of </span><span class="html-italic" data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5454" instrument_node=""> samples previously prepared in methanol at a concentration of 10 mg/mL. The mixtures were incubated in a water bath for 20 min at 50 °C. Then, 150 µL of FeCl</span><sub data-dcnode-id="5452"><span data-dcnode-id="5453" instrument_node="">3</span></sub><span data-dcnode-id="5451" instrument_node=""> (1%), 750 µL of aqueous solution of TAC (10%), and 750 µL of distilled water were added to the prepared solution. The absorbance of the solution was determined using a spectrophotometer at 700 nm, in comparison to a solution containing all the above components except the plants extracts (negative control). The result was expressed as 50% effective concentration (IC</span><sub data-dcnode-id="5449"><span data-dcnode-id="5450" instrument_node="">50</span></sub><span data-dcnode-id="5448" instrument_node="">), i.e., the concentration of antioxidant needed to have an optical density of 0.5.</span></div></section><section data-dcnode-id="5413" id="sec3dot4dot2-molecules-27-00416" type=""><h4 class="" data-dcnode-id="5444" data-nested="3" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5445" instrument_node=""> 3.4.2. Free Radical Scavenging Capacity </span></h4><div class="html-p" data-dcnode-id="5425"><span data-dcnode-id="5443" instrument_node="">The determination of (2,2-diphenyl-1-picrylhydrazyl) was performed according to the following protocol [</span><a class="html-bibr" data-dcnode-id="5441" href="#B44-molecules-27-00416" title=""><span data-dcnode-id="5442" instrument_node="">44</span></a><span data-dcnode-id="5440" instrument_node="">]. We mixed 200 µL of each series dilution of the two extracts with 750 µL of DPPH (0.004%). After half an hour in the dark, the absorbance of the mixtures was determined at 517 nm. The following equation was used to calculate the percent inhibition (PI):
</span><div class="html-disp-formula-info" data-dcnode-id="5426" id=""><span data-dcnode-id="5439" instrument_node="">
</span><div class="f" data-dcnode-id="5431"><span data-dcnode-id="5438" instrument_node="">
PI(%) = ((A</span><sub data-dcnode-id="5436"><span data-dcnode-id="5437" instrument_node="">0</span></sub><span data-dcnode-id="5435" instrument_node=""> − A)/A</span><sub data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">0</span></sub><span data-dcnode-id="5432" instrument_node="">) × 100.
</span></div><span data-dcnode-id="5430" instrument_node="">
</span><div class="l" data-dcnode-id="5428"><span data-dcnode-id="5429" instrument_node="">
</span></div><span data-dcnode-id="5427" instrument_node="">
</span></div></div><div class="html-p" data-dcnode-id="5414"><ul class="html-simple" data-dcnode-id="5415"><li data-dcnode-id="5419"><div class="html-p" data-dcnode-id="5420"><span data-dcnode-id="5424" instrument_node="">A</span><sub data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node="">0</span></sub><span data-dcnode-id="5421" instrument_node="">: Absorbance of the solution (DPPH) without the extracts.</span></div></li><li data-dcnode-id="5416"><div class="html-p" data-dcnode-id="5417"><span data-dcnode-id="5418" instrument_node="">A: Absorbance of the solution (DPPH) with the extracts. </span></div></li></ul></div></section><section data-dcnode-id="5405" id="sec3dot4dot3-molecules-27-00416" type=""><h4 class="" data-dcnode-id="5411" data-nested="3" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5412" instrument_node=""> 3.4.3. Total Antioxidant Capacity</span></h4><div class="html-p" data-dcnode-id="5406"><span data-dcnode-id="5410" instrument_node="">The antioxidant test (TAC) was determined by the following protocol [</span><a class="html-bibr" data-dcnode-id="5408" href="#B45-molecules-27-00416" title=""><span data-dcnode-id="5409" instrument_node="">45</span></a><span data-dcnode-id="5407" instrument_node="">]. We added 1 mL of a prepared solution (4 mM ammonium molybdate, 28 mM sodium phosphate, 0.6 M acid sulphuric) to 25 µL of the extract studied. Then, the reaction mixture was incubated in a water bath for half hour at 95 °C. The absorbance of the solution was determined at 695 nm using a negative control containing 25 µL of methanol in place of the extracts. TAC was expressed as mg AAE/g extract. A standard curve was prepared using ascorbic acid.</span></div></section></section><section data-dcnode-id="5327" id="sec3dot5-molecules-27-00416" type=""><h4 class="html-italic" data-dcnode-id="5402" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5403" instrument_node=""> 3.5. Antimicrobial Activity of Anchusa italica Retz</span></h4><div class="html-p" data-dcnode-id="5373"><span data-dcnode-id="5401" instrument_node="">The antimicrobial activity was investigated against eight bacterial strains: </span><span class="html-italic" data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">Escherichia coli</span></span><span data-dcnode-id="5398" instrument_node=""> (ATB: 57) B6N, </span><span class="html-italic" data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">Escherichia coli</span></span><span data-dcnode-id="5395" instrument_node=""> (ATB: 97) BGM, </span><span class="html-italic" data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">Escherichia coli</span></span><span data-dcnode-id="5392" instrument_node=""> sensible, </span><span class="html-italic" data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">Klebsiella pneumoniae</span></span><span data-dcnode-id="5389" instrument_node=""> (ESBL-KP), </span><span class="html-italic" data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">Klebsiella pneumoniae</span></span><span data-dcnode-id="5386" instrument_node=""> sensible, and coagulase-negative </span><span class="html-italic" data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">staphylococci</span></span><span data-dcnode-id="5383" instrument_node=""> (CoNS) and one yeast strain, i.e., </span><span class="html-italic" data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">Candida albicans</span></span><span data-dcnode-id="5380" instrument_node="">. The tested microorganisms were obtained from the microbiology laboratory FMP-Fez. Bacterial suspensions were obtained by picking colonies from 24 h cultures. The prepared cultures were stored in MH agar at 4 °C. In a sterile solution (0.9% NaCl), the colonies were suspended and then shaken for 15 s. The density was set at 0.5 turbidity (equivalent to 1–5 × 10</span><sup data-dcnode-id="5378"><span data-dcnode-id="5379" instrument_node="">8</span></sup><span data-dcnode-id="5377" instrument_node=""> CFU/mL) [</span><a class="html-bibr" data-dcnode-id="5375" href="#B46-molecules-27-00416" title=""><span data-dcnode-id="5376" instrument_node="">46</span></a><span data-dcnode-id="5374" instrument_node="">].</span></div><section data-dcnode-id="5342" id="sec3dot5dot1-molecules-27-00416" type=""><h4 class="" data-dcnode-id="5371" data-nested="3" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5372" instrument_node=""> 3.5.1. Agar Disk Diffusion</span></h4><div class="html-p" data-dcnode-id="5357"><span data-dcnode-id="5370" instrument_node="">This test is based on the following method described by Sadiq et al. [</span><a class="html-bibr" data-dcnode-id="5368" href="#B44-molecules-27-00416" title=""><span data-dcnode-id="5369" instrument_node="">44</span></a><span data-dcnode-id="5367" instrument_node="">], with a slight modification. MH agar plates were prepared from standardized bacterial suspensions (10</span><sup data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">8</span></sup><span data-dcnode-id="5364" instrument_node=""> CFU/mL) and inoculated by swabbing. Then, Whatman paper discs (6 mm) were placed on the surface of the pre-inoculated agar. Then, each disk was soaked in 20 µL of 50 mg/mL extract of </span><span class="html-italic" data-dcnode-id="5362"><span data-dcnode-id="5363" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5361" instrument_node=""> diluted in dimethyl sulfoxide (DMSO), at a concentration of 4 mg/L. A disk containing DMSO was placed in the middle of each Petri dish and was used as a negative control. Afterwards, the plates were incubated for 24 h at 37 °C, and the diameters of the inhibition zones were measured. The studied bacteria were classified as resistant or sensitive to the extracts based on the diameter of the inhibition zones (DIZ) as follows [</span><a class="html-bibr" data-dcnode-id="5359" href="#B47-molecules-27-00416" title=""><span data-dcnode-id="5360" instrument_node="">47</span></a><span data-dcnode-id="5358" instrument_node="">]:</span></div><div class="html-p" data-dcnode-id="5343"><ul class="html-disc" data-dcnode-id="5344"><li data-dcnode-id="5354"><div class="html-p" data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">Not sensitive: DIZ was lower than 8 mm</span></div></li><li data-dcnode-id="5351"><div class="html-p" data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">Sensitive: DIZ was between 9 and 14 mm</span></div></li><li data-dcnode-id="5348"><div class="html-p" data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">Very sensitive: DIZ was between 15 and 19 mm</span></div></li><li data-dcnode-id="5345"><div class="html-p" data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">Extremely sensitive: DIZ was superior then 20 mm</span></div></li></ul></div></section><section data-dcnode-id="5328" id="sec3dot5dot2-molecules-27-00416" type=""><h4 class="" data-dcnode-id="5340" data-nested="3" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5341" instrument_node=""> 3.5.2. Minimum Inhibitory Concentration (MIC)</span></h4><div class="html-p" data-dcnode-id="5329"><span data-dcnode-id="5339" instrument_node="">The determination of MIC values was performed by microdilution tests in 96-well plates using NCCLS standards [</span><a class="html-bibr" data-dcnode-id="5337" href="#B48-molecules-27-00416" title=""><span data-dcnode-id="5338" instrument_node="">48</span></a><span data-dcnode-id="5336" instrument_node="">], with slight modifications. Extracts from the roots and leaves of </span><span class="html-italic" data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5333" instrument_node=""> were prepared in sterile hemolysis tubes using DMSO. The final concentrations of the extracts in the wells were obtained by successive 1:1 dilutions in a mixture of Mueller Hinton (MH) broth, reaching values between 0.039 and 20 mg/mL. Then, 50 µL of microbial suspensions was mixed with 50 µL of MH broth, and 50 µL of extract solutions at different concentrations was added to determine the MIC values. After incubating the plates for 18 h at 37 °C, 40 µL of 0.5% triphenyl tetrazolium chloride was added to each well. The MIC value was determined in the basis of the lowest concentration that did not produce a red color [</span><a class="html-bibr" data-dcnode-id="5331" href="#B46-molecules-27-00416" title=""><span data-dcnode-id="5332" instrument_node="">46</span></a><span data-dcnode-id="5330" instrument_node="">].</span></div></section></section><section data-dcnode-id="5319" id="sec3dot6-molecules-27-00416" type=""><h4 class="html-italic" data-dcnode-id="5325" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5326" instrument_node=""> 3.6. Statistical Analysis</span></h4><div class="html-p" data-dcnode-id="5320"><span data-dcnode-id="5324" instrument_node="">Values in this study are presented as means ± standard deviations. Student’s t-test and one-way ANOVA were used to analyze the differences between the experimental data. The significance of changes in DPPH and FRAP was determined by the Tuckey test as a post hoc test. Significance for all tests was established at </span><span class="html-italic" data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">p</span></span><span data-dcnode-id="5321" instrument_node=""> &lt; 0.05 using Minitab 19.1 software (LLC, New York, NY, USA).</span></div></section></section><section data-dcnode-id="5307" id="sec4-molecules-27-00416" type="conclusions"><h2 data-dcnode-id="5316" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5317" instrument_node=""> 4. Conclusions</span></h2><div class="html-p" data-dcnode-id="5308"><span data-dcnode-id="5315" instrument_node="">The results of this work showed that the extracts of leaves and roots of </span><span class="html-italic" data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5312" instrument_node=""> Retz are rich in compounds with antioxidant and antimicrobial properties. More study is needed to support the antioxidant and antibacterial activities of </span><span class="html-italic" data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">Anchusa italica</span></span><span data-dcnode-id="5309" instrument_node=""> Retz extracts, which can have several applications in phytotherapy and pharmaceutical therapy to treat human diseases and as preservatives for raw foods. Based on this study, further research is needed for the purification and chemical identification of active molecules with biological properties contained in these extracts. </span></div></section><span data-dcnode-id="5306" instrument_node="">

</span><a data-dcnode-id="846" href="mailto:?&amp;subject=From%20MDPI:%20%22Antimicrobial%20and%20Antioxidant%20Properties%20of%20Total%20Polyphenols%20of%20Anchusa%20italica%20Retz%22&amp;body=https://www.mdpi.com/1441834:%0A%0AAntimicrobial%20and%20Antioxidant%20Properties%20of%20Total%20Polyphenols%20of%20Anchusa%20italica%20Retz%0A%0AAnchusa%20italica%20Retz%20has%20been%20used%20for%20a%20long%20time%20in%20phytotherapy.%20The%20aim%20of%20the%20present%20study%20was%20to%20determine%20the%20antioxidant%20and%20antibacterial%20activities%20of%20extracts%20from%20the%20leaves%20and%20roots%20of%20Anchusa%20italica%20Retz.%20We%20first%20determined%20the%20content%20of%20phenolic%20compounds%20and%20flavonoids%20using%20Folin%E2%80%93Ciocalteu%20reagents%20and%20aluminum%20chloride%20(AlCl3).%20The%20antioxidant%20activity%20was%20determined%20using%20three%20methods:%20reducing%20power%20(FRAP)%2C%202.2-diphenyl-1-picrylhydrazyl%20(DPPH)%2C%20total%20antioxidant%20capacity%20(TAC).%20The%20antimicrobial%20activity%20was%20investigated%20against%20four%20strains%20of%20Escherichia%20coli%2C%20two%20strains%20of%20Klebsiella%20pneumoniae%20and%20coagulase-negative%20Staphylococcus%2C%20and%20one%20fungal%20strain%20of%20Candida%20albicans.%20The%20results%20showed%20that%20the%20root%20extract%20was%20rich%20in%20polyphenols%20(43.29%20mg%20GAE%2Fg%20extract)%2C%20while%20the%20leave%20extract%20was%20rich%20in%20flavonoids%20(28.88%20mg%20QE%2Fg%20extract).%20The%20FRAP%20assay%20showed%20a%20strong%20iron%20reduction%20capacity%20for%20the%20root%20extract%20(IC50%20of%200.11%20%C2%B5g%2FmL)%20in%20comparison%20to%20ascorbic%20acid%20(IC50%20of%200.121%20%C2%B5g%2FmL).%20The%20DPPH%20test%20determined%20an%20IC50%20of%200.11%20%C2%B5g%2FmL%20for%20the%20root%20extract%20and%20an%20IC50%20of%200.14%20%C2%B5g%2FmL%20for%20the%20leaf%20extract.%20These%20values%20are%20low%20compared%20to%20those%20for%20ascorbic%20acid%5B...%5D" title="Email"><span data-dcnode-id=
