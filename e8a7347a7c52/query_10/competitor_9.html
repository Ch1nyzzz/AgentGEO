</span><div data-dcnode-id="1007"><span data-dcnode-id="1008"><span data-dcnode-id="1009"><span data-dcnode-id="1022" instrument_node="">Stalks of </span><b data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">rhubarb and celery</span></b><span data-dcnode-id="1019" instrument_node=""> side by side certainly look as though they should be </span><b data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">related</span></b><span data-dcnode-id="1016" instrument_node="">, but in fact the two vegetables are not even cousins. </span><b data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Celery</span></b><span data-dcnode-id="1013" instrument_node=""> belongs to the parsnip family, Umbelliferae, while </span><b data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">rhubarb</span></b><span data-dcnode-id="1010" instrument_node=""> belongs to the buckwheat family, Polygonaceae.</span></span></span></div><span data-dcnode-id="1006" instrument_node="">Read rest </span><a class="lc" data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//treehozz.com/goto/268308" rel="nofollow" target="_blank"><span data-dcnode-id="1005" instrument_node="">of the answer</span></a><span data-dcnode-id="1003" instrument_node="">.</span><br data-dcnode-id="1002"><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">

</span><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node=""> Keeping this in view,  what is rhubarb related to?</span><p data-dcnode-id="979"><span data-dcnode-id="980"><span data-dcnode-id="981"><b data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Rhubarb</span></b><span data-dcnode-id="991" instrument_node=""> is a vegetable with a unique taste that makes it a favorite in many pies and desserts. </span><b data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Rhubarb</span></b><span data-dcnode-id="988" instrument_node=""> is often commonly mistaken to be a fruit but </span><b data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">rhubarb</span></b><span data-dcnode-id="985" instrument_node=""> is actually a close relative of garden sorrel, and is therefore a member of the vegetable family. </span><b data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Rhubarb</span></b><span data-dcnode-id="982" instrument_node=""> is rich in vitamin C and dietary fiber.</span></span></span></p><p data-dcnode-id="954"><span data-dcnode-id="978" instrument_node="">Subsequently, question is,  when should you not eat rhubarb?  </span><span data-dcnode-id="974"><b data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Rhubarb</span></b><span data-dcnode-id="975" instrument_node=""> Stalks Become Toxic in Summer</span></span><span data-dcnode-id="973" instrument_node=""> </span><span data-dcnode-id="955"><span data-dcnode-id="956"><span data-dcnode-id="972" instrument_node="">There are two good reasons </span><b data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">not to eat</span></b><span data-dcnode-id="969" instrument_node=""> them in summer. They tend </span><b data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">to</span></b><span data-dcnode-id="966" instrument_node=""> get woody in late summer and </span><b data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">don't</span></b><span data-dcnode-id="963" instrument_node=""> taste as good. If </span><b data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">you</span></b><span data-dcnode-id="960" instrument_node=""> harvest too many stalks in spring, the plant needs some leaves </span><b data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">to</span></b><span data-dcnode-id="957" instrument_node=""> grow food for next years crop.</span></span></span></p><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">  are rhubarb leaves poisonous?</span></p><p data-dcnode-id="936"><span data-dcnode-id="951" instrument_node=""> </span><span data-dcnode-id="937"><span data-dcnode-id="938"><b data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Rhubarb leaves</span></b><span data-dcnode-id="948" instrument_node=""> contain </span><b data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">poisonous</span></b><span data-dcnode-id="945" instrument_node=""> substances, including oxalic acid, a nephrotoxin in many plants. Humans have been poisoned after ingesting the </span><b data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">leaves</span></b><span data-dcnode-id="942" instrument_node="">, a particular problem during World War I when the </span><b data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">leaves</span></b><span data-dcnode-id="939" instrument_node=""> were mistakenly recommended as a food source in Britain.</span></span></span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Why is it safe to eat rhubarb stalks but not rhubarb leaves when they both contain a poisonous acid?</span></p><p data-dcnode-id="895"><span data-dcnode-id="896"><span data-dcnode-id="897"><b data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Rhubarb stems contain</span></b><span data-dcnode-id="931" instrument_node=""> much less oxalic </span><b data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">acid</span></b><span data-dcnode-id="928" instrument_node=""> than the </span><b data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">leaves</span></b><span data-dcnode-id="925" instrument_node="">, </span><b data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">and</span></b><span data-dcnode-id="922" instrument_node=""> little or </span><b data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">no</span></b><span data-dcnode-id="919" instrument_node=""> anthraquinone. So, </span><b data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">they are safe to eat</span></b><span data-dcnode-id="916" instrument_node=""> in reasonable quantities, </span><b data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">and</span></b><span data-dcnode-id="913" instrument_node=""> provide vitamins A </span><b data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">and</span></b><span data-dcnode-id="910" instrument_node=""> C. </span><b data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">But eating</span></b><span data-dcnode-id="907" instrument_node=""> too much </span><b data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">rhubarb</span></b><span data-dcnode-id="904" instrument_node=""> too often might </span><b data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">not</span></b><span data-dcnode-id="901" instrument_node=""> be a good idea because of possible stress to kidneys </span><b data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">and</span></b><span data-dcnode-id="898" instrument_node=""> inflammation of joints.</span></span></span></p><span data-dcnode-id="894" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="893" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="892" instrument_node="">
