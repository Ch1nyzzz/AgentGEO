</span><div data-dcnode-id="1431" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="1418"><aside class="css-0 css-0" data-dcnode-id="1419"><div data-dcnode-id="1420"><div class="css-10gx9pb" data-dcnode-id="1421" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1423"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1422" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1383"><span data-dcnode-id="1416" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1412"><div data-dcnode-id="1413"><a class="chartbeat-section" data-dcnode-id="1414" name="what-it-is"><span data-dcnode-id="1415" instrument_node=""> What is rhubarb?</span></a></div></h2><p data-dcnode-id="1407"><span data-dcnode-id="1411" instrument_node="">Rhubarb is renowned for its sour taste and thick stalks, which are usually cooked with </span><a class="content-link css-5r4717" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/too-much-sugar"><span data-dcnode-id="1410" instrument_node="">sugar</span></a><span data-dcnode-id="1408" instrument_node="">.</span></p><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">The stalks range in color from red to pink to pale green and have a consistency that’s similar to celery.</span></p><p data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node="">This </span><a class="content-link css-5r4717" data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/14-healthiest-vegetables-on-earth"><span data-dcnode-id="1403" instrument_node="">vegetable</span></a><span data-dcnode-id="1401" instrument_node=""> requires cold winters to grow. As a result, it’s mainly found in mountainous and temperate regions around the world, especially in Northeast Asia. It’s also a common garden plant in North America and Northern Europe.</span></p><p data-dcnode-id="1395"><span data-dcnode-id="1399" instrument_node="">Several varieties and species exist. In the West, the most common variety is called culinary or garden rhubarb (</span><em data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Rheum x hybridum)</span></em><span data-dcnode-id="1396" instrument_node="">.</span></p><blockquote class="css-pc7ote" data-dcnode-id="1390"><strong data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">SUMMARY </span></strong><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Rhubarb is a vegetable grown for its thick, sour stalks, which are usually eaten after being cooked with sugar.</span></p></blockquote><div class="css-1cg0byz" data-dcnode-id="1384"><aside class="css-0 css-0" data-dcnode-id="1385"><div data-dcnode-id="1386"><div class="css-az6x7v" data-dcnode-id="1387" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1389"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="1388" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1306"><span data-dcnode-id="1382" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1378"><div data-dcnode-id="1379"><a class="chartbeat-section" data-dcnode-id="1380" name="uses"><span data-dcnode-id="1381" instrument_node=""> How is it used?</span></a></div></h2><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Rhubarb is an unusual vegetable because it’s very sour and slightly sweet.</span></p><p data-dcnode-id="1363"><span data-dcnode-id="1375" instrument_node="">In fact, it’s easily mistaken for a fruit. Adding to the confusion, rhubarb is officially classified as a </span><a class="content-link css-5r4717" data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/is-fruit-good-or-bad-for-your-health"><span data-dcnode-id="1374" instrument_node="">fruit</span></a><span data-dcnode-id="1372" instrument_node=""> by the U.S. Department of Agriculture (USDA) (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1365" rationale="Governmental authority" source="USDA Food Composition Databases"><a class="content-link css-5r4717" data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ndb.nal.usda.gov/ndb/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1371" instrument_node="">1</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1368"><span class="sro" data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1366"></span></hl-trusted-source><span data-dcnode-id="1364" instrument_node="">).</span></p><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Due to its sour taste, it’s rarely eaten raw. Instead, it’s normally cooked — either sweetened with sugar or used as an ingredient.</span></p><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">It wasn’t until the 18th century, when sugar became cheap and readily available, that rhubarb became a popular food.</span></p><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Before that, it was mainly used medicinally. In fact, its dried roots have been utilized in traditional Chinese medicine for thousands of years.</span></p><p data-dcnode-id="1352"><span data-dcnode-id="1356" instrument_node="">Only the stalks are eaten, most commonly in sweet soups, jams, sauces, pies, tarts, crumbles, </span><a class="content-link css-5r4717" data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/alcohol-good-or-bad"><span data-dcnode-id="1355" instrument_node="">cocktails</span></a><span data-dcnode-id="1353" instrument_node="">, and rhubarb wine.</span></p><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">As sweet rhubarb pies are a traditional dessert in the United Kingdom and North America, this vegetable is sometimes called “pie plant.”</span></p><blockquote class="css-pc7ote" data-dcnode-id="1345"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">SUMMARY </span></strong><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Rhubarb is a vegetable often categorized as a fruit. Due to its sourness, it’s regularly sugared for use in jams and desserts.</span></p></blockquote><div data-dcnode-id="1313" id="me39cc12c-3de0-47b9-b199-eead8408058f"><div data-dcnode-id="1314"><form data-dcnode-id="1315" novalidate=""><div data-dcnode-id="1316"><section class="css-11k39sg" data-dcnode-id="1317"><div class="css-1x6oboy" data-dcnode-id="1344"></div><div class="css-rp3d6" data-dcnode-id="1319"><div class="css-nafh3i" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">HEALTHLINE NEWSLETTER</span></div><div class="css-kp58b2" data-dcnode-id="1337"><div class="css-104k5nf" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Get wellness tips to help you meet your next milestone</span></div><p class="css-1cr3nkl" data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Ready to level up healthy living? Go that extra mile and supplement the steps you’re already taking with the latest news and popular tools in our twice-weekly Wellness Wire newsletter.</span></p></div><div class="css-8nu43k" data-dcnode-id="1320"><div data-dcnode-id="1321"><div class="css-12wslxx" data-dcnode-id="1327"><div class="css-11eiosp" data-dcnode-id="1332"><div class="css-1rr4qq7" data-dcnode-id="1333"><div class="css-qddt1o" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="1334" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-c6f4e9" data-dcnode-id="1328" type="submit"><span class="css-14ktbsh" data-dcnode-id="1329"><span class="css-1huyk6v" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">SIGN UP NOW</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">Your </span><a class="css-1pule1j" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1325" instrument_node="">privacy</span></a><span data-dcnode-id="1323" instrument_node=""> is important to us</span></p></div></div></div><div class="css-1tuviqo" data-dcnode-id="1318"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="1307"><aside class="css-0 css-0" data-dcnode-id="1308"><div data-dcnode-id="1309"><div class="css-10gx9pb" data-dcnode-id="1310" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1312"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="1311" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1206"><span data-dcnode-id="1305" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1301"><div data-dcnode-id="1302"><a class="chartbeat-section" data-dcnode-id="1303" name="nutrition"><span data-dcnode-id="1304" instrument_node=""> Nutrient content of rhubarb</span></a></div></h2><p data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">Rhubarb is not especially rich in essential nutrients, and its </span><a class="content-link css-5r4717" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/how-many-calories-per-day"><span data-dcnode-id="1299" instrument_node="">calorie</span></a><span data-dcnode-id="1297" instrument_node=""> content is low.</span></p><p data-dcnode-id="1278"><span data-dcnode-id="1295" instrument_node="">However, it is a very good source of vitamin K1, providing around 26–37% of the Daily Value (DV) in a 3.5-ounce (100-gram) serving depending on whether it’s cooked (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1288" rationale="Highly respected food and nutrition database from the United States Department of Agriculture,Governmental authority" source="FoodData Central"><a class="content-link css-5r4717" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/167758/nutrients" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1294" instrument_node="">2</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1291"><span class="sro" data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1289"></span></hl-trusted-source><span data-dcnode-id="1287" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1280" rationale="Highly respected food and nutrition database from the United States Department of Agriculture,Governmental authority" source="FoodData Central"><a class="content-link css-5r4717" data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/168169/nutrients" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1286" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1283"><span class="sro" data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1281"></span></hl-trusted-source><span data-dcnode-id="1279" instrument_node="">).</span></p><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Like other fruits and vegetables, it’s also high in fiber, providing similar amounts as oranges, apples, or celery.</span></p><p data-dcnode-id="1266"><span data-dcnode-id="1275" instrument_node="">A 3.5-ounce (100-gram) serving of cooked rhubarb with added sugar contains (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1268" rationale="Highly respected food and nutrition database from the United States Department of Agriculture,Governmental authority" source="FoodData Central"><a class="content-link css-5r4717" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/168169/nutrients" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1274" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1271"><span class="sro" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1269"></span></hl-trusted-source><span data-dcnode-id="1267" instrument_node="">):</span></p><ul data-dcnode-id="1229"><li data-dcnode-id="1262"><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Calories:</span></strong><span data-dcnode-id="1263" instrument_node=""> 116</span></li><li data-dcnode-id="1258"><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Carbs:</span></strong><span data-dcnode-id="1259" instrument_node=""> 31.2 grams</span></li><li data-dcnode-id="1254"><strong data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Fiber:</span></strong><span data-dcnode-id="1255" instrument_node=""> 2 grams</span></li><li data-dcnode-id="1250"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Protein:</span></strong><span data-dcnode-id="1251" instrument_node=""> 0.4 grams</span></li><li data-dcnode-id="1246"><strong data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Vitamin K1:</span></strong><span data-dcnode-id="1247" instrument_node=""> 26% of the DV</span></li><li data-dcnode-id="1242"><strong data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Calcium:</span></strong><span data-dcnode-id="1243" instrument_node=""> 15% of the DV</span></li><li data-dcnode-id="1238"><strong data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Vitamin C: </span></strong><span data-dcnode-id="1239" instrument_node="">6% of the DV</span></li><li data-dcnode-id="1234"><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Potassium:</span></strong><span data-dcnode-id="1235" instrument_node=""> 3% of the DV</span></li><li data-dcnode-id="1230"><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Folate:</span></strong><span data-dcnode-id="1231" instrument_node=""> 1% of the DV</span></li></ul><p data-dcnode-id="1216"><span data-dcnode-id="1228" instrument_node="">Although there are decent amounts of calcium in rhubarb, it’s mainly in the form of the </span><a class="content-link css-5r4717" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/how-to-reduce-antinutrients"><span data-dcnode-id="1227" instrument_node="">antinutrient</span></a><span data-dcnode-id="1225" instrument_node=""> calcium oxalate. In this form, your body can’t absorb it efficiently (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1218" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/2801588" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1224" instrument_node="">4</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1221"><span class="sro" data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1219"></span></hl-trusted-source><span data-dcnode-id="1217" instrument_node="">).</span></p><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">It is also moderately high in vitamin C, boasting 6% of the DV in a 3.5-ounce (100-gram) serving.</span></p><blockquote class="css-pc7ote" data-dcnode-id="1209"><strong data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">SUMMARY </span></strong><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">A 3.5-ounce (100-gram) serving of cooked rhubarb provides 26% of the DV for vitamin K1. It’s also a good source of fiber. Otherwise, it’s not a significant source of essential nutrients.</span></p></blockquote><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="1208" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="1207" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="1110"><span data-dcnode-id="1205" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1201"><div data-dcnode-id="1202"><a class="chartbeat-section" data-dcnode-id="1203" name="benefits"><span data-dcnode-id="1204" instrument_node=""> Health benefits of rhubarb</span></a></div></h2><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Studies on the health benefits of rhubarb are limited.</span></p><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">However, a few studies have examined the effects of isolated rhubarb stalk components, such as its fiber.</span></p><h3 data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">May lower cholesterol levels</span></h3><p data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">Rhubarb stalks are a good source of </span><a class="content-link css-5r4717" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/why-is-fiber-good-for-you"><span data-dcnode-id="1193" instrument_node="">fiber</span></a><span data-dcnode-id="1191" instrument_node="">, which may affect your cholesterol.</span></p><p data-dcnode-id="1177"><span data-dcnode-id="1189" instrument_node="">In one controlled study, men with high levels ate 27 grams of rhubarb-stalk fiber every day for a month. Their total cholesterol dropped by 8% and their LDL (bad) </span><a class="content-link css-5r4717" data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/how-to-lower-cholesterol"><span data-dcnode-id="1188" instrument_node="">cholesterol</span></a><span data-dcnode-id="1186" instrument_node=""> by 9% (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1179" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/9430089" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1185" instrument_node="">5</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1182"><span class="sro" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1180"></span></hl-trusted-source><span data-dcnode-id="1178" instrument_node="">).</span></p><p data-dcnode-id="1167"><span data-dcnode-id="1176" instrument_node="">This beneficial effect is not exclusive to rhubarb fiber. Many other fiber sources are equally effective (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1169" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/9925120" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1175" instrument_node="">6</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1172"><span class="sro" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1170"></span></hl-trusted-source><span data-dcnode-id="1168" instrument_node="">).</span></p><h3 data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Provides antioxidants</span></h3><p data-dcnode-id="1160"><span data-dcnode-id="1164" instrument_node="">Rhubarb is also a rich source of </span><a class="content-link css-5r4717" data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/foods-high-in-antioxidants"><span data-dcnode-id="1163" instrument_node="">antioxidants</span></a><span data-dcnode-id="1161" instrument_node="">.</span></p><p data-dcnode-id="1147"><span data-dcnode-id="1159" instrument_node="">One study suggests that its total polyphenol content may be even higher than that of </span><a class="content-link css-5r4717" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/10-proven-benefits-of-kale"><span data-dcnode-id="1158" instrument_node="">kale</span></a><span data-dcnode-id="1156" instrument_node=""> (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1149" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-5r4717" data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1111/j.1365-2621.2012.03174.x/abstract" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1155" instrument_node="">7</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1152"><span class="sro" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1150"></span></hl-trusted-source><span data-dcnode-id="1148" instrument_node="">).</span></p><p data-dcnode-id="1134"><span data-dcnode-id="1146" instrument_node="">The antioxidants in rhubarb include anthocyanins, which are responsible for its red color and thought to provide health benefits. Rhubarb is also high in proanthocyanidins, also known as condensed tannins (</span><a class="content-link css-5r4717" data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tandfonline.com/doi/abs/10.1080/14620316.1999.11511064" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1145" instrument_node="">8</span></a><span data-dcnode-id="1143" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1136" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22129334" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1142" instrument_node="">9</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1139"><span class="sro" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1137"></span></hl-trusted-source><span data-dcnode-id="1135" instrument_node="">).</span></p><p data-dcnode-id="1116"><span data-dcnode-id="1133" instrument_node="">These antioxidants may be responsible for some of the health benefits of fruits, red wine, and cocoa (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1126" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19722709" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1132" instrument_node="">10</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1129"><span class="sro" data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1127"></span></hl-trusted-source><span data-dcnode-id="1125" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1118" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/20232344" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1124" instrument_node="">11</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1121"><span class="sro" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1119"></span></hl-trusted-source><span data-dcnode-id="1117" instrument_node="">).</span></p><blockquote class="css-pc7ote" data-dcnode-id="1111"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">SUMMARY </span></strong><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Rhubarb is a good source of fiber and antioxidants. Studies show that rhubarb fiber may lower cholesterol, but research on its health benefits is otherwise limited.</span></p></blockquote></div><div class="css-0" data-dcnode-id="1078"><span data-dcnode-id="1109" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1105"><div data-dcnode-id="1106"><a class="chartbeat-section" data-dcnode-id="1107" name="sour-taste"><span data-dcnode-id="1108" instrument_node=""> Why does it taste sour?</span></a></div></h2><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Rhubarb is probably the most sour-tasting vegetable you can find.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1102" instrument_node="">Its acidity is mainly due to its high levels of malic and </span><a class="content-link css-5r4717" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/oxalate-good-or-bad"><span data-dcnode-id="1101" instrument_node="">oxalic acid</span></a><span data-dcnode-id="1099" instrument_node="">. Malic acid is one of the most abundant acids in plants and contributes to the sour taste of many fruits and vegetables (</span><a class="content-link css-5r4717" data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tandfonline.com/doi/abs/10.1080/14620316.1999.11511064" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1098" instrument_node="">8</span></a><span data-dcnode-id="1096" instrument_node="">).</span></p><p data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">Interestingly, growing rhubarb in darkness makes it less sour and more tender. This variety is known as forced rhubarb, which is grown in spring or late </span><a class="content-link css-5r4717" data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/healthiest-winter-vegetables"><span data-dcnode-id="1093" instrument_node="">winter</span></a><span data-dcnode-id="1091" instrument_node="">.</span></p><blockquote class="css-pc7ote" data-dcnode-id="1085"><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">SUMMARY </span></strong><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Rhubarb is exceptionally sour, making it hard to eat raw or without sugar. The sour taste is mainly due to malic acid and oxalic acid — though forced rhubarb is much less sour than other varieties.</span></p></blockquote><div class="css-20w1gi" data-dcnode-id="1079"><aside class="css-0 css-0" data-dcnode-id="1080"><div data-dcnode-id="1081"><div class="css-1sq15os" data-dcnode-id="1082" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1084"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="1083" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="973"><span data-dcnode-id="1077" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1073"><div data-dcnode-id="1074"><a class="chartbeat-section" data-dcnode-id="1075" name="side-effects"><span data-dcnode-id="1076" instrument_node=""> Safety and side effects</span></a></div></h2><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Rhubarb is among the richest dietary sources of calcium oxalate, the most common form of oxalic acid in plants.</span></p><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">In fact, according to folk tradition, rhubarb should not be harvested past late June, as oxalic acid levels are said to rise from spring to summer.</span></p><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">This substance is particularly abundant in the leaves, but the stalks may also contain high amounts, depending on the variety.</span></p><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Too much calcium oxalate can lead to hyperoxaluria, a serious condition characterized by the accumulation of calcium oxalate crystals in various organs.</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1064" instrument_node="">These crystals may form </span><a class="content-link css-5r4717" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/kidney-stone-remedies"><span data-dcnode-id="1063" instrument_node="">kidney stones</span></a><span data-dcnode-id="1061" instrument_node="">. Sustained hyperoxaluria can lead to kidney failure (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1054" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23110375" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1060" instrument_node="">12</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1057"><span class="sro" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1055"></span></hl-trusted-source><span data-dcnode-id="1053" instrument_node="">).</span></p><p data-dcnode-id="1042"><span data-dcnode-id="1051" instrument_node="">Not everyone responds to dietary oxalate in the same way. Some people are genetically predisposed to health problems associated with oxalates (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1044" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17020415" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1050" instrument_node="">13</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1047"><span class="sro" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1045"></span></hl-trusted-source><span data-dcnode-id="1043" instrument_node="">).</span></p><p data-dcnode-id="1030"><a class="content-link css-5r4717" data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/vitamin-b6-deficiency-symptoms"><span data-dcnode-id="1041" instrument_node="">Vitamin B6 deficiency</span></a><span data-dcnode-id="1039" instrument_node=""> and high vitamin C intake may also increase your risk (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1032" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21603151" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1038" instrument_node="">14</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1035"><span class="sro" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1033"></span></hl-trusted-source><span data-dcnode-id="1031" instrument_node="">).</span></p><p data-dcnode-id="1009"><span data-dcnode-id="1029" instrument_node="">Additionally, growing evidence suggests this problem is worse for those who lack certain beneficial gut bacteria. Interestingly, some gut bacteria, such as </span><em data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Oxalobacter formigenes</span></em><span data-dcnode-id="1026" instrument_node="">, degrade and neutralize dietary oxalates (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1019" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23536130" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1025" instrument_node="">15</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1022"><span class="sro" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1020"></span></hl-trusted-source><span data-dcnode-id="1018" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1011" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19021605" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1017" instrument_node="">16</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1014"><span class="sro" data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1012"></span></hl-trusted-source><span data-dcnode-id="1010" instrument_node="">).</span></p><p data-dcnode-id="980"><span data-dcnode-id="1008" instrument_node="">Although reports of rhubarb poisoning are rare, make sure you consume it in moderation and avoid the leaves. What’s more, cooking your rhubarb may reduce its oxalate content by 30–87% (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1001" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/1288268" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1007" instrument_node="">17</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1004"><span class="sro" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1002"></span></hl-trusted-source><span data-dcnode-id="1000" instrument_node="">, </span><a class="content-link css-5r4717" data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/ency/article/002876.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="999" instrument_node="">18</span></a><span data-dcnode-id="997" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="990" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/13836748" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="996" instrument_node="">19</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="993"><span class="sro" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="991"></span></hl-trusted-source><span data-dcnode-id="989" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="982" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15826055" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="988" instrument_node="">20</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="985"><span class="sro" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="983"></span></hl-trusted-source><span data-dcnode-id="981" instrument_node="">).</span></p><blockquote class="css-pc7ote" data-dcnode-id="975"><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">SUMMARY </span></strong><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Rhubarb may be high in oxalates and should be eaten in moderation. Notably, cooking reduces its levels of oxalates. Make sure to avoid the leaves.</span></p></blockquote><div data-dcnode-id="974" id="threequarter-of-article"></div></div><div class="css-0" data-dcnode-id="944"><span data-dcnode-id="972" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="968"><div data-dcnode-id="969"><a class="chartbeat-section" data-dcnode-id="970" name="cooking-tips"><span data-dcnode-id="971" instrument_node=""> How to cook rhubarb</span></a></div></h2><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Rhubarb can be eaten in a number of ways. It is usually used in jams and desserts, which contain plenty of added sugar.</span></p><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">That said, it’s easy to use in low-sugar recipes — or even cooked with no sugar at all.</span></p><p data-dcnode-id="956"><span data-dcnode-id="963" instrument_node="">A few creative ideas include rhubarb </span><a class="content-link css-5r4717" data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/healthy-salad-toppings"><span data-dcnode-id="962" instrument_node="">salad</span></a><span data-dcnode-id="960" instrument_node=""> and healthy rhubarb crumble. You can also add this vegetable or its jam to your morning </span><a class="content-link css-5r4717" data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/9-benefits-oats-oatmeal"><span data-dcnode-id="959" instrument_node="">oatmeal</span></a><span data-dcnode-id="957" instrument_node="">.</span></p><blockquote class="css-pc7ote" data-dcnode-id="951"><strong data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">SUMMARY </span></strong><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Rhubarb is a popular ingredient in crumbles, pies, and jams — foods that are usually loaded with sugar. However, you can also find rhubarb recipes with little or no added sugar.</span></p></blockquote><div class="css-umsscj" data-dcnode-id="945"><aside class="css-0 css-0" data-dcnode-id="946"><div data-dcnode-id="947"><div class="css-10gx9pb" data-dcnode-id="948" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="950"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline20" data-dcnode-id="949" id="inline20__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="924"><span data-dcnode-id="943" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="939"><div data-dcnode-id="940"><a class="chartbeat-section" data-dcnode-id="941" name="bottom-line"><span data-dcnode-id="942" instrument_node=""> The bottom line</span></a></div></h2><p data-dcnode-id="934"><span data-dcnode-id="938" instrument_node="">Rhubarb is a unique vegetable that people use in </span><a class="content-link css-5r4717" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/cooking-nutrient-content"><span data-dcnode-id="937" instrument_node="">cooking and baking</span></a><span data-dcnode-id="935" instrument_node="">.</span></p><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Since it may be high in oxalate, you should avoid eating too much of it and try to select stalks from low-oxalate varieties. If you are prone to kidney stones, it might be best to avoid rhubarb altogether.</span></p><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">On the bright side, rhubarb is a good source of antioxidants, </span><a class="content-link css-5r4717" data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/foods-high-in-vitamin-k"><span data-dcnode-id="930" instrument_node="">vitamin K</span></a><span data-dcnode-id="928" instrument_node="">, and fiber.</span></p><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Additionally, its sour taste makes it a perfect ingredient in jams, crumbles, pies, and other desserts.</span></p></div></article><div data-dcnode-id="919" id="mc0ff4d1b-513f-442f-83a1-3e7d073b0bfb"><div data-dcnode-id="920"><div class="myFinance-widget myFinance-ad-unit" data-campaign="healthline nutrition mpls" data-dcnode-id="921" data-sub-id="othernutrition_hl_bot_us_nutritionwidget_38031" data-widget-id="65addbff-4c8d-4c31-bd80-106f9d3994f0"><iframe class="myFinance-iframe" data-dcnode-id="922" data-loaded="0" data-src="https://inline.healthline.com/r/ssr/65addbff-4c8d-4c31-bd80-106f9d3994f0?utm_campaign=healthline+nutrition+mpls&amp;utm_medium=embed&amp;selector=%23mc0ff4d1b-513f-442f-83a1-3e7d073b0bfb+%3E+div+%3E+div&amp;csid=b4fb4070-7f43-46eb-8015-7b9226ecc621&amp;caid=1f3a8356-54bd-4376-b5be-ad768a9aba83&amp;ciid=e723fcb5-0418-4ca4-9b02-5ec3c5ac792b&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;cxsid=0bdcdf1d-fed0-4635-b521-ec1716487aae&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vbnV0cml0aW9uL3JodWJhcmI%3D&amp;_mfuuid_=9f928dc1-0cfa-40ab-b6a9-aeae662f40ad&amp;width=584&amp;subId=othernutrition_hl_bot_us_nutritionwidget_38031" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/r/ssr/65addbff-4c8d-4c31-bd80-106f9d3994f0%3Futm_campaign%3Dhealthline%2Bnutrition%2Bmpls%26utm_medium%3Dembed%26selector%3D%2523mc0ff4d1b-513f-442f-83a1-3e7d073b0bfb%2B%253E%2Bdiv%2B%253E%2Bdiv%26csid%3Db4fb4070-7f43-46eb-8015-7b9226ecc621%26caid%3D1f3a8356-54bd-4376-b5be-ad768a9aba83%26ciid%3De723fcb5-0418-4ca4-9b02-5ec3c5ac792b%26tenant%3Dwk_1Tqf7EYzOKyxm4Gvq042rU0Uky0%26srckey%3Dsrc_1Tqf7BF96WTbG5QbUndHWIgKoFo%26cxsid%3D0bdcdf1d-fed0-46
