</span><h2 data-dcnode-id="1784" style="text-align: center;"><span data-dcnode-id="1785" instrument_node="">Easy Homemade Rhubarb Crisp</span></h2><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Rhubarb is too often combined with other fruit like strawberries, and I think it's a shame. There is a time and a place for that, but it isn't a must. This rhubarb crisp with no other fruit really highlights the unique qualities in rhubarb without hiding it with other flavors. It's sweet with just a bit of tang that makes it a perfect dessert. The richness from the butter and pecans go along great with the tart fruit. There are no dry parts to this crisp either because you melt the butter and stir it right in. That's my little secret for the perfect crisp.</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">I think some people are weirded out by rhubarb, but I'm here to tell you that it is awesome! Mine just popped out of the ground and has about 6 inches worth of curly leaves coming out of the ground. Crisp is always my first choice when it comes to rhubarb desserts. It's simple to make and people are always really surprised at just how delicious it is once they try it, rhubarb lover or not!</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1768"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-45376 size-full entered lazyloading" data-dcnode-id="1771"><img alt="collage image of how to make homemade rhubarb crisp" class="lazyloaded" data-dcnode-id="1776" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp.jpg" data-lazy-srcset="https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp.jpg 900w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp-600x871.jpg 600w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp-207x300.jpg 207w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp-705x1024.jpg 705w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp-768x1115.jpg 768w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp-560x813.jpg 560w" data-ll-status="loaded" data-pin-description="Homemade Rhubarb Crisp with oatmeal topping. Baked to perfection, this is one of my favorite rhubarb recipes! It's perfect with ice cream on top. #rhubarb #springdessert #rhubarbrecipes" data-pin-media="https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp.jpg" data-pin-title="Homemade Rhubarb Crisp" height="1307" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp.jpg&amp;raw" srcset="https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp.jpg 900w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp-600x871.jpg 600w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp-207x300.jpg 207w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/rhubarb-crisp-705x1024.jpg 705w, https://www.blessthismessplease.com/wp-content/uploads/2 </span><h2 data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">What is Rhubarb?</span></h2><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">It's tart, like a tart cherry (which is so good in baking) but it cooks down a lot. It's one of my favorite easy go-to perennials on our farm, and I look forward to it every spring. And fun fact, it's super high in vitamin C. We like to eat it raw like celery with a bit of salt on it when we aren't turning it into our favorite rhubarb desserts.</span></p><span data-dcnode-id="1761" instrument_node="">
</span><h2 data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Is Rhubarb Poisonous?</span></h2><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Fun fact... rhubarb leaves are poisonous. While it would take ingesting roughly 10 pounds of leaves to kill an average-size adult, small amounts will make you sick. Be sure to keep livestock and chickens out of your rhubarb patch, too -- it's not good for them either. Have no fear; the stalks are just fine.</span></p><span data-dcnode-id="1755" instrument_node="">

</span><h2 data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Recipe Ingredients:</span></h2><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Rhubarb crisp is so simple. For the fruit part, you'll need:</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1735"><strong data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Chopped rhubarb:&nbsp;</span></strong><span data-dcnode-id="1736" instrument_node="">Of course, this is the star of the show! You can use any type you have available to you.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1730"><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Sugar:&nbsp;</span></strong><span data-dcnode-id="1731" instrument_node="">Sugars sweetens the tart fruit.</span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1725"><strong data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Cornstarch:&nbsp;</span></strong><span data-dcnode-id="1726" instrument_node="">This will thicken the fruit mixture so it's more gooey than runny, in the most delicious way!</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">And for the topping, you'll need:</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1717"><strong data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Brown sugar:&nbsp;</span></strong><span data-dcnode-id="1718" instrument_node="">Brown sugar allows the crisp to almost caramelize and get really pretty and golden.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1712"><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">White sugar:&nbsp;</span></strong><span data-dcnode-id="1713" instrument_node="">White sugar adds another element of sweet.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1707"><strong data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Flour:&nbsp;</span></strong><span data-dcnode-id="1708" instrument_node="">Flour holds everything together and thickens the topping like a crunchy crust.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1702"><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Oats:&nbsp;</span></strong><span data-dcnode-id="1703" instrument_node="">The oats will add a nice textured element.</span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1697"><strong data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Pecans:&nbsp;</span></strong><span data-dcnode-id="1698" instrument_node="">Pecans are optional, or you can use another favorite nut like walnuts.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1692"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Vanilla:&nbsp;</span></strong><span data-dcnode-id="1693" instrument_node="">Vanilla brings a soothing warmth to the sweet and tart flavors.</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1687"><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Melted butter:&nbsp;</span></strong><span data-dcnode-id="1688" instrument_node="">Melted butter acts as the liquid that turns the crust into a batter that crisps up nicely as it bakes.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1677"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-45370 size-full entered lazyloading" data-dcnode-id="1680"><img alt="mixing bowl with chopped pecans brown sugar and oats" class="lazyloaded" data-dcnode-id="1685" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4.jpg" data-lazy-srcset="https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4.jpg 900w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4-600x900.jpg 600w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4-200x300.jpg 200w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4-683x1024.jpg 683w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4-768x1152.jpg 768w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4-560x840.jpg 560w" data-ll-status="loaded" data-pin-description="Homemade Rhubarb Crisp with oatmeal topping. Baked to perfection, this is one of my favorite rhubarb recipes! It's perfect with ice cream on top. #rhubarb #springdessert #rhubarbrecipes" data-pin-media="https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4.jpg" data-pin-title="Rhubarb Crisp" height="1350" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4.jpg&amp;raw" srcset="https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4.jpg 900w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4-600x900.jpg 600w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4-200x300.jpg 200w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-4-683x1024.jpg 683w, https://www.blessthismessplease.com/wp </span><h2 data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">How to Make Rhubarb Crisp:</span></h2><span data-dcnode-id="1673" instrument_node="">
</span><ol data-dcnode-id="1650"><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Preheat oven to 375 degrees F. Spray 8x8-inch baking dish or 4-6 individual ramekins with cooking spray.</span></li><span data-dcnode-id="1669" instrument_node="">
</span><li data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Combine chopped rhubarb, sugar, and cornstarch, and stir to combine.</span></li><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Combine the sugars, flour, oats, and pecans in another bowl; stir with fork to combine.</span></li><span data-dcnode-id="1663" instrument_node="">
</span><li data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Add vanilla and melted butter; stir until no dry powder is left.</span></li><span data-dcnode-id="1660" instrument_node="">
</span><li data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Place rhubarb mixture in your baking dish. Place the crisp topping on top of the rhubarb in the dish.</span></li><span data-dcnode-id="1657" instrument_node="">
</span><li data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Cook for 18 to 24 minutes.</span></li><span data-dcnode-id="1654" instrument_node="">
</span><li data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Let the crisp cool for 5 minutes before serving hot.</span></li><span data-dcnode-id="1651" instrument_node="">
</span></ol><span data-dcnode-id="1649" instrument_node="">

rfect with ice cream on top. #rhubarb #springdessert #rhubarbrecipes" srcset="https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-15.jpg 900w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-15-600x900.jpg 600w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-15-200x300.jpg 200w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-15-683x1024.jpg 683w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-15-768x1152.jpg 768w, https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-15-560x840.jpg 560w" sizes="(max-width: 900px) 100vw, 900px" data-pin-media="https://www.blessthismessplease.com/wp-content/uploads/2015/02/Rhubarb-Crisp-15.jpg"&gt;</span></noscript><p></p><span data-dcnode-id="1639" instrument_node="">
</span><h2 data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Tips for the Best Rhubarb Crisp:</span></h2><span data-dcnode-id="1636" instrument_node="">
</span><ul data-dcnode-id="1609"><span data-dcnode-id="1635" instrument_node="">
</span><li data-dcnode-id="1631"><strong data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Melt the butter:</span></strong><span data-dcnode-id="1632" instrument_node=""> My trick to making the best crisp on the block is to melt the butter and then stir it into the oat mixture. This means that you'll never have any dry pockets of oats and flour and it bakes up extra crispy.</span></li><span data-dcnode-id="1630" instrument_node="">
</span><li data-dcnode-id="1626"><strong data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Use any kind of rhubarb:</span></strong><span data-dcnode-id="1627" instrument_node=""> Rhubarb comes in lots of varieties. You'll generally see red rhubarb, but it also comes in green. All of them taste pretty similar, so just use what you can find.</span></li><span data-dcnode-id="1625" instrument_node="">
</span><li data-dcnode-id="1621"><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Search for rhubarb in spring:</span></strong><span data-dcnode-id="1622" instrument_node=""> New to the rhubarb scene? Look for it at the farmers marker in mid to late spring. It's normally one of the first bits of produce you'll find.</span></li><span data-dcnode-id="1620" instrument_node="">
</span><li data-dcnode-id="1616"><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Bake in individual ramekins or an 8x8 baking dish:</span></strong><span data-dcnode-id="1617" instrument_node=""> I love serving rhubarb crisp in individual ramekins with a scoop of ice cream on top, but you can also make this recipe in an 8x8 baking dish. Do what you have! Individual is just fun, though, right?</span></li><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1611"><strong data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Leave out pecans or sub another nut:</span></strong><span data-dcnode-id="1612" instrument_node=""> Not a fan of pecans? Leave them out or sub another nut. I think they are SO good in this crisp.</span></li><span data-dcnode-id="1610" instrument_node="">
</span></ul><span data-dcnode-id="1608" instrument_node="">
</span><h2 data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Serving Suggestions:</span></h2><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">This is a delicious dessert on its own, or to take it up a notch, pair with fresh whipped cream or vanilla bean ice cream!</span></p><span data-dcnode-id="1602" instrument_node="">
</span><h2 data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">How to Store a Crisp:</span></h2><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Rhubarb crisp is best served the day it's made. If you want to store any leftovers, let it cool completely, cover tightly with an airtight lid or plastic wrap, and store in the fridge for up to 4 days. Reheat in the oven at 350 degrees F. for 10 minutes.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1593" instrument_node="">

</span><div class="tasty-recipes-description-body" data-dcnode-id="1349" data-tasty-recipes-customization="body-color.color"><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Homemade rhubarb crisp with oatmeal topping. Baked to perfection, this is one of my favorite rhubarb recipes! It's perfect with ice cream on top.</span></p><span data-dcnode-id="1350" instrument_node="">

</span><p data-dcnode-id="1314"><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">For the Fruit:</span></strong></p><span data-dcnode-id="1313" instrument_node="">
</span><ul data-dcnode-id="1296"><span data-dcnode-id="1312" instrument_node="">
</span><li data-dcnode-id="1308"><span data-amount="2.5" data-dcnode-id="1310" data-unit="cup"><span data-dcnode-id="1311" instrument_node="">2 ½ cups</span></span><span data-dcnode-id="1309" instrument_node=""> chopped Rhubarb</span></li><span data-dcnode-id="1307" instrument_node="">

</span></ul><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1292"><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">For the Crisp Topping:</span></strong></p><span data-dcnode-id="1291" instrument_node="">

</span><li data-dcnode-id="1286"><span data-amount="0.25" data-dcnode-id="1288" data-unit="cup"><span data-dcnode-id="1289" instrument_node="">¼ cup</span></span><span data-dcnode-id="1287" instrument_node=""> brown sugar</span></li><span data-dcnode-id="1285" instrument_node="">
</span><li data-dcnode-id="1281"><span data-amount="0.25" data-dcnode-id="1283" data-unit="cup"><span data-dcnode-id="1284" instrument_node="">¼ cup</span></span><span data-dcnode-id="1282" instrument_node=""> granulated sugar</span></li><span data-dcnode-id="1280" instrument_node="">
</span><li data-dcnode-id="1276"><span data-amount="0.33333333333333" data-dcnode-id="1278" data-unit="cup"><span data-dcnode-id="1279" instrument_node="">⅓ cup</span></span><span data-dcnode-id="1277" instrument_node=""> flour</span></li><span data-dcnode-id="1275" instrument_node="">
</span><li data-dcnode-id="1271"><span data-amount="1" data-dcnode-id="1273" data-unit="cup"><span data-dcnode-id="1274" instrument_node="">1 cup</span></span><span data-dcnode-id="1272" instrument_node=""> old fashioned oats</span></li><span data-dcnode-id="1270" instrument_node="">
</span><li data-dcnode-id="1266"><span data-amount="0.5" data-dcnode-id="1268" data-unit="cup"><span data-dcnode-id="1269" instrument_node="">½ cup</span></span><span data-dcnode-id="1267" instrument_node=""> pecans, chopped</span></li><span data-dcnode-id="1265" instrument_node="">

</span><h3 data-dcnode-id="1243" data-tasty-recipes-customization="h3-color.color h3-transform.text-transform"><span data-dcnode-id="1244" instrument_node="">Instructions</span></h3><span data-dcnode-id="1242" instrument_node="">
</span></div><span data-dcnode-id="1240" instrument_node="">
</span><div data-dcnode-id="1217" data-tasty-recipes-customization="body-color.color"><span data-dcnode-id="1239" instrument_node="">
</span><ol data-dcnode-id="1219"><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1236" id="instruction-step-1"><span data-dcnode-id="1237" instrument_node="">Preheat your oven to 375 degrees F. Lightly spray an 8x8-inch square baking dish or individual ramekins (4 to 6 of them, depending on how big of a serving you want in each) with cooking spray. Set aside.</span></li><span data-dcnode-id="1235" instrument_node="">
</span><li data-dcnode-id="1233" id="instruction-step-2"><span data-dcnode-id="1234" instrument_node="">In a medium bowl, combine the chopped rhubarb, sugar, and cornstarch, and stir to combine.</span></li><span data-dcnode-id="1232" instrument_node="">
</span><li data-dcnode-id="1230" id="instruction-step-3"><span data-dcnode-id="1231" instrument_node="">In a second medium bowl, combine the sugars, flour, oats, and pecans. Stir with a fork to combine.</span></li><span data-dcnode-id="1229" instrument_node="">
</span><li data-dcnode-id="1227" id="instruction-step-4"><span data-dcnode-id="1228" instrument_node="">Add the vanilla and melted butter, and stir until no dry powder is left.</span></li><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1224" id="instruction-step-5"><span data-dcnode-id="1225" instrument_node="">Stir the rhubarb and sugar again and then place it in your baking dish, or divide it evenly among the ramekins. Place the crisp topping on top of the rhubarb in the dish. If you used ramekins, place them on a baking sheet and then transfer them to the hot oven, or put the baking dish straight into the oven. Cook for 18 to 24 minutes, until the crisp is lightly browned and the rhubarb is bubbling around the edges.</span></li><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1221" id="instruction-step-6"><span data-dcnode-id="1222" instrument_node="">Let the crisp cool for 5 minutes before serving hot with ice cream or fresh whipped cream.</span></li><span data-dcnode-id="1220" instrument_node="">
</span></ol><span data-dcnode-id="1218" instrument_node="">
</span></div><span data-dcnode-id="1216" instrument_node="">

</span><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">This crisp is best enjoyed the same day.</span></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">You can use red or green rhubarb for this recipe.</span></li><span data-dcnode-id="1202" instrument_node="">
