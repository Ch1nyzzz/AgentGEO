</span><p data-dcnode-id="13074"><span data-dcnode-id="13078" instrument_node="">I was looking for something different to do with rhubarb when I came across a fruited pudding cake recipe in the </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="13076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B000T4FSV8/ref%3Das_li_ss_tl%3Fie%3DUTF8%26linkCode%3Dsl1%26tag%3Dcommosensehom-20%26linkId%3D0822d685e4dfacecd212b48bc0d193b8" rel="noreferrer noopener nofollow sponsored" target="_blank"><span data-dcnode-id="13077" instrument_node="">Favorite Recipes of America – Desserts cookbook</span></a><span data-dcnode-id="13075" instrument_node=""> from 1968. </span></p><span data-dcnode-id="13073" instrument_node="">
</span><p data-dcnode-id="13071"><span data-dcnode-id="13072" instrument_node="">The original recipe calls for “any fruit, fresh or canned”, so I figured “Why not rhubarb?” &nbsp;Thus, this old fashioned rhubarb pudding cake was born.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="13070" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="13069" instrument_node="">
</span><p data-dcnode-id="13067"><span data-dcnode-id="13068" instrument_node="">The recipe is quite sweet, even with the tartness of rhubarb. You can cut back on the sugar if you like. </span></p><div class="adthrive" data-dcnode-id="13065" id="cls-video-container-ln5C8jmi" style="min-height: 549px;"><div data-dcnode-id="13066"></div></div><span data-dcnode-id="13064" instrument_node="">
</span><p data-dcnode-id="13062"><span data-dcnode-id="13063" instrument_node="">This rhubarb pudding cake recipe has a delicate sugar crust, and rich custard pudding bottom. It's super easy to make using fresh or frozen rhubarb, and can also be made gluten free.</span></p><span data-dcnode-id="13061" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="13057"><img alt="Rhubarb Pudding Cake on a white plate" class="wp-image-36951 entered lazyloaded" data-dcnode-id="13060" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2.jpg" data-lazy-srcset="https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2.jpg 1000w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-300x300.jpg 300w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-100x100.jpg 100w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-600x600.jpg 600w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-150x150.jpg 150w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-768x768.jpg 768w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-225x225.jpg 225w" data-ll-status="loaded" data-pin-nopin="true" height="1000" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2.jpg&amp;raw" srcset="https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2.jpg 1000w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-300x300.jpg 300w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-100x100.jpg 100w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-600x600.jpg 600w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-150x150.jpg 150w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-768x768.jpg 768w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-225x225.jpg 225w" width="1000"><noscript data-dcnode-id="13058"><span data-dcnode-id="13059" instrument_node="">&lt;img width="1000" height="1000" data-pin-nopin="true" src="https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2.jpg" alt="Rhubarb Pudding Cake on a white plate" class="wp-image-36951" srcset="https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2.jpg 1000w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-300x300.jpg 300w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-100x100.jpg 100w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-600x600.jpg 600w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-150x150.jpg 150w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-768x768.jpg 768w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-2-225x225.jpg 225w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript></figure><span data-dcnode-id="13056" instrument_node="">
</span><span data-dcnode-id="13055" id="more-1592"></span><span data-dcnode-id="13054" instrument_node="">
</span><p data-dcnode-id="13052"><span data-dcnode-id="13053" instrument_node="">The boys are not huge rhubarb fans, but they love this recipe. This is the sort of thing my grandmother would have made. I hope you and your family enjoy it, too.</span></p><span data-dcnode-id="13051" instrument_node="">
</span><div class="no_bullets" data-dcnode-id="13019" id="toc_container"><p class="toc_title" data-dcnode-id="13043"><span data-dcnode-id="13050" instrument_node="">Contents</span><span data-dcnode-id="13049" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="13044"><span data-dcnode-id="13048" instrument_node="">[</span><a data-dcnode-id="13046" href="#"><span data-dcnode-id="13047" instrument_node="">Hide</span></a><span data-dcnode-id="13045" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="13020"><li data-dcnode-id="13040"><a data-dcnode-id="13041" href="#Old_Fashioned_Rhubarb_Pudding_Cake_Recipe"><span data-dcnode-id="13042" instrument_node="">Old Fashioned Rhubarb Pudding Cake Recipe</span></a></li><li data-dcnode-id="13024"><a data-dcnode-id="13038" href="#Old_Fashioned_Rhubarb_Pudding_Cake"><span data-dcnode-id="13039" instrument_node="">Old Fashioned Rhubarb Pudding Cake</span></a><ul data-dcnode-id="13025"><li data-dcnode-id="13035"><a data-dcnode-id="13036" href="#Ingredients"><span data-dcnode-id="13037" instrument_node="">Ingredients</span></a></li><li data-dcnode-id="13032"><a data-dcnode-id="13033" href="#Instructions"><span data-dcnode-id="13034" instrument_node="">Instructions</span></a></li><li data-dcnode-id="13029"><a data-dcnode-id="13030" href="#Notes"><span data-dcnode-id="13031" instrument_node="">Notes</span></a></li><li data-dcnode-id="13026"><a data-dcnode-id="13027" href="#Did_you_make_this_recipe"><span data-dcnode-id="13028" instrument_node="">Did you make this recipe?</span></a></li></ul></li><li data-dcnode-id="13021"><a data-dcnode-id="13022" href="#More_Rhubarb_Recipes_to_Enjoy"><span data-dcnode-id="13023" instrument_node="">More Rhubarb Recipes to Enjoy</span></a></li></ul></div><span data-dcnode-id="13018" instrument_node="">
</span><h2 data-dcnode-id="13015"><span data-dcnode-id="13016" id="Old_Fashioned_Rhubarb_Pudding_Cake_Recipe"><span data-dcnode-id="13017" instrument_node="">Old Fashioned Rhubarb Pudding Cake Recipe</span></span></h2><span data-dcnode-id="13014" instrument_node="">
</span><p data-dcnode-id="13011"><strong data-dcnode-id="13012"><span data-dcnode-id="13013" instrument_node="">Ingredients</span></strong></p><span data-dcnode-id="13010" instrument_node="">
</span><ul data-dcnode-id="12983"><li data-dcnode-id="13008"><span data-dcnode-id="13009" instrument_node="">2 cups of rhubarb, chopped</span></li><li data-dcnode-id="13006"><span data-dcnode-id="13007" instrument_node="">1 3/4 cup sugar, divided</span></li><li data-dcnode-id="13004"><span data-dcnode-id="13005" instrument_node="">3 tablespoons butter, softened</span></li><li data-dcnode-id="13002"><span data-dcnode-id="13003" instrument_node="">1 teaspoon baking powder</span></li><li data-dcnode-id="13000"><span data-dcnode-id="13001" instrument_node="">1/4 teaspoon salt</span></li><li data-dcnode-id="12998"><span data-dcnode-id="12999" instrument_node="">1/2 cup milk</span></li><li data-dcnode-id="12994"><span data-dcnode-id="12997" instrument_node="">1/2 teaspoon </span><a class="ek-link ek-link ek-link" data-dcnode-id="12995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commonsensehome.com/how-to-make-homemade-extracts/"><span data-dcnode-id="12996" instrument_node="">vanilla extract</span></a></li><li data-dcnode-id="12990"><span data-dcnode-id="12993" instrument_node="">1/2 teaspoon </span><a class="ek-link ek-link" data-dcnode-id="12991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commonsensehome.com/how-to-make-homemade-extracts/"><span data-dcnode-id="12992" instrument_node="">almond extract</span></a></li><li data-dcnode-id="12988"><span data-dcnode-id="12989" instrument_node="">1 cup sifted flour</span></li><li data-dcnode-id="12986"><span data-dcnode-id="12987" instrument_node="">1 tablespoon cornstarch</span></li><li data-dcnode-id="12984"><span data-dcnode-id="12985" instrument_node="">2/3 cup boiling water</span></li></ul><span data-dcnode-id="12982" instrument_node="">
</span><p data-dcnode-id="12979"><strong data-dcnode-id="12980"><span data-dcnode-id="12981" instrument_node="">Directions</span></strong></p><span data-dcnode-id="12978" instrument_node="">
</span><p data-dcnode-id="12973"><span data-dcnode-id="12977" instrument_node="">Cover the bottom of an 8 or 9 inch square baking pan with fruit. (I prefer an 8 inch or 9 inch </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="12975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Pyrex-Basics-8-1-Square-quart/dp/B00FN3M59S/ref%3Das_li_ss_tl%3F_encoding%3DUTF8%26pd_rd_i%3DB00FN3M59S%26pd_rd_r%3Df462ffbd-d08c-4be3-a08c-640971d755a7%26pd_rd_w%3DcJGQD%26pd_rd_wg%3DYjncQ%26pf_rd_p%3Decf748b5-e796-4a0d-9a46-406a973ba8da%26pf_rd_r%3DEEJPAYD18J43W16ZG8AG%26refRID%3DEEJPAYD18J43W16ZG8AG%26th%3D1%26linkCode%3Dll1%26tag%3Dcommosensehom-20%26linkId%3D1627d9c0f517fdb020f1360a6b051230%26language%3Den_US" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="12976" instrument_node="">square glass baking dish</span></a><span data-dcnode-id="12974" instrument_node="">. You can also use a deep dish glass pie plate.)</span></p><span data-dcnode-id="12972" instrument_node="">
</span><p data-dcnode-id="12970"><span data-dcnode-id="12971" instrument_node="">Mix 3/4 cup sugar, butter, baking powder, salt, extracts, milk and flour together. Add a little more milk if it is too thick to pour; pour over fruit.</span></p><span data-dcnode-id="12969" instrument_node="">
</span><p data-dcnode-id="12967"><span data-dcnode-id="12968" instrument_node="">Mix remaining sugar and cornstarch in a small bowl; sprinkle over mixture in pan. Pour boiling water over the top. ( I know this sounds strange, but trust me, it works to create a pudding around the rhubarb in the bottom of the pan.)</span></p><span data-dcnode-id="12966" instrument_node="">
</span><p data-dcnode-id="12964"><span data-dcnode-id="12965" instrument_node="">Bake at 375°F for 45 minutes. Yield: 9 servings.</span></p><span data-dcnode-id="12963" instrument_node="">
</span><p data-dcnode-id="12961"><span data-dcnode-id="12962" instrument_node="">The sugar topping creates a glaze on the top of the cake, something like a creme brûlée. It also creates the pudding at the bottom. </span></p><span data-dcnode-id="12960" instrument_node="">
</span><p data-dcnode-id="12958"><span data-dcnode-id="12959" instrument_node="">Serve warm with ice cream, if desired. Or let your rhubarb pudding cake cool a bit, and then slice and invert on a plate. This shows off the pudding. </span></p><span data-dcnode-id="12957" instrument_node="">
</span><p data-dcnode-id="12952"><span data-dcnode-id="12956" instrument_node="">You may also substitute a gluten free flour blend, such as </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="12954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00HGIQJV8/ref%3Das_li_ss_tl%3Fie%3DUTF8%26linkCode%3Dsl1%26tag%3Dcommosensehom-20%26linkId%3D975a2c5fcf3d10f53d1ffe210fca859b" rel="noreferrer noopener nofollow sponsored" target="_blank"><span data-dcnode-id="12955" instrument_node="">Namaste Gluten Free Flour</span></a><span data-dcnode-id="12953" instrument_node="">. With the Namaste flour, I bake an extra ten minutes.</span></p><span data-dcnode-id="12951" instrument_node="">
</span><p data-dcnode-id="12949"><span data-dcnode-id="12950" instrument_node="">Shares and Pins always much appreciated if you enjoy the recipe!</span></p><span data-dcnode-id="12948" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="12937"><figure class="aligncenter" data-dcnode-id="12938"><div class="dpsp-pin-it-wrapper wp-image-36844 entered" data-dcnode-id="12941"><img alt="how to make rhubarb pudding cake step-by-step photos" class="lazyloaded" data-dcnode-id="12947" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-recipe-1x.jpg" data-lazy-srcset="https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-recipe-1x.jpg 600w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-recipe-1x-113x300.jpg 113w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-recipe-1x-384x1024.jpg 384w" data-ll-status="loaded" data-pin-description="This old fashioned rhubarb pudding cake recipe has a delicate sugar crust, and rich pudding bottom. It's easy to make using fresh or frozen rhubarb, and can also be made gluten free." data-pin-title="Rhubarb Pudding Cake (Plus 9 More Yummy Rhubarb Recipes)" height="1600" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-recipe-1x.jpg&amp;raw" srcset="https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-recipe-1x.jpg 600w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-recipe-1x-113x300.jpg 113w, https://commonsensehome.com/wp-content/uploads/2017/03/rhubarb-pudding-cake-recipe-1x-384x1024.jpg 384w" style="" width="600"><span class="dpsp-pin-it-overlay" data-dcnode-id="12946"></span><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="12942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F% </span><li data-dcnode-id="12694" id="instruction-step-1"><span data-dcnode-id="12695" instrument_node="">Cover the bottom of an 8 or 9 inch square pan with fruit. (I prefer an 8 inch or 9 inch square glass baking dish. You could also use a deep dish glass pie plate.)</span></li><span data-dcnode-id="12693" instrument_node="">
</span><li data-dcnode-id="12691" id="instruction-step-2"><span data-dcnode-id="12692" instrument_node="">Mix 3/4 cup sugar, butter, baking powder, salt, extracts, milk and flour together. Add a little more milk if it is too thick to pour; pour over fruit.</span></li><span data-dcnode-id="12690" instrument_node="">
</span><li data-dcnode-id="12688" id="instruction-step-3"><span data-dcnode-id="12689" instrument_node="">Mix remaining sugar and cornstarch in a small bowl; sprinkle over mixture in pan. Pour boiling water gently over the top of the cake.</span></li><span data-dcnode-id="12687" instrument_node="">
</span><li data-dcnode-id="12685" id="instruction-step-4"><span data-dcnode-id="12686" instrument_node="">Bake at 375°F for 45 minutes, a little longer for gluten free flours.</span></li><span data-dcnode-id="12684" instrument_node="">

</span><p data-dcnode-id="9765"><span data-dcnode-id="9766" instrument_node="">My mom did a lot of rhubarb spread, too.  Grandma was more into coffee cakes and such.</span></p><span data-dcnode-id="9764" instrument_node="">
</span><p data-dcnode-id="9762"><span data-dcnode-id="9763" instrument_node="">So far everything I’ve tried just takes the edge off the itching or soothes it for a short time, but I’m going to keep trying internal and external remedies.  While researching, I was surprised to discover how widespread psoriasis is, and how bad it can be for some people.  I even saw a guy on youtube using a Brazilian wax kit to take scales off his legs – ewwwwwwww.  That has to hurt!  There are oral medications that inhibit the immune response, but those have a long list of side effects.  The most commonly recommended treatment by most physicians is steroid cream, but that usually only works for a short time before it flares up again.  This may be a long journey.</span></p><span data-dcnode-id="9761" instrument_node="">
</span><p data-dcnode-id="9759"><span data-dcnode-id="9760" instrument_node="">Glad you enjoyed the newsletter!</span></p><span data-dcnode-id="9758" instrument_node="">

</span><p data-dcnode-id="8234"><span data-dcnode-id="8238" instrument_node="">I think I’d opt for coconut milk over almond milk if you can tolerate it, because of the higher fat content.  As for a butter replacement, ghee would be my first choice if you’re only avoiding lactose, palm shortening if you must avoid all dairy (Tropical Traditions has an organic palm oil that is responsibly raised and harvested, which I reviewed </span><a data-dcnode-id="8236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commonsensehome.com/palm-shortening/"><span data-dcnode-id="8237" instrument_node="">here</span></a><span data-dcnode-id="8235" instrument_node="">).  Coconut oil would be my next choice if you don’t have either of the above, but the other two give a texture more similar to butter, from my experience.</span></p><span data-dcnode-id="8233" instrument_node="">

</span><p data-dcnode-id="7862"><span data-dcnode-id="7865" instrument_node="">Your welcome Laurie and Dawn! I didn’t have white sugar on hand and have been mostly using coconut sugar these days, since I heard it has a lower glycemic index. I think I did use just under 3/4 cup in the batter and just a little bit less than 3/4 cup in the topping ( instead of the 1 cup). So, I just reduced it a little, but I will probably reduce it more next time. It did not seem overly sweet with the amount I used, though. My husband thought it was really good . I would say it definitely has a darker appearance though and I’ve never made it the other way, so not sure if the top is as it should be.  Let me know what you think.</span><br data-dcnode-id="7864"><span data-dcnode-id="7863" instrument_node="">

</span><p data-dcnode-id="6663"><span data-dcnode-id="6664" instrument_node="">I was searching through Pinterest to find a different rhubarb recipe since I have so much from my garden and I found you.  I jumped up off the computer and started making it.  I usually him and haw if I should try a recipe or not, but this was so easy and I had everything else.  Well it just came out of the oven and it looks divine.  Too hot to eat right now but I’m sure it will be like heaven.  I love rhubarb and have other fruits in my garden also.  Strawberries are on their second round and the blackberries are red and getting ripe.  So my next try will either be with blueberries and blackberries or a mixed berry custard dessert.  One thing, I was low on milk and I just had enough, I see that other ladies are substituting, but how about buttermilk?  I have powdered, would that work also?  Thank you for posting and I joined your newsletter, can’t wait to read it.  I never make box cakes, always home made, old fashion and trusted recipes handed down.  I need all the rhubarb recipes I can get my hands on so keep them coming.  Oh my Lord, it is heaven……  I’ll be making another one because this won’t last an hour between me and my two boys.   Thanks again..</span></p><span data-dcnode-id="6662" instrument_node="">

</span><p data-dcnode-id="5121"><span data-dcnode-id="5122" instrument_node="">I just made this with strawberries and rhubarb, myself! I grew up eating “blueberry batter cake” which is essentially the same as this pudding cake with blueberries. I have found, through the years, that frozen fruit sometimes yields more sauce than fresh (which we prefer). I found your recipe after making the change to the blueberry recipe that I have. The recipe differences are the addition of the extracts, 1/4 less sugar for the topping, and 1/4 cup more boiling water. We prefer to pour cream or half and half over the top while it is warm and then eat leftovers the next day cold and straight from the pan. Thanks for sharing. I LOVE rhubarb and am baffled at why so many readers had strange outcomes. I’m wondering if they varied the recipe.</span></p><span data-dcnode-id="5120" instrument_node="">

</span><p data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">I can see why kids would like this as it is more sweet than rhubarb—rhubarb is several flavors down on the list, I’d liken it to a rhubarb flavored cream donut—cream and donut coming on top, then rhubarb.  The recipe notes it could use less sugar—one cup alone for the “crust”—I used larger crystal decorative sugar and that allowed for a lot less sugar.</span></p><span data-dcnode-id="3905" instrument_node="">
</span><p data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">So yes, this is an easy to make and it tastes good but I would think a reworking aimed at bringing forward the tart sense of the rhubarb would make this a great recipe.</span></p><span data-dcnode-id="3902" instrument_node="">

</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Hi all. I baked the rhubarb cake for the 1st time yesterday. Have to say it was delicious. However, I made some modifications: I tripled the rhubarb quantity, cut it into small slices; only used vanilla essence as had no almond; used white sugar for the sponge; used demerara sugar for the topping mixed with baking powder. I thought the sugar/baking powder topping was too much sugar so only scattered half of it over the top. Once baked, absolutely delicious.  Thank you for the recipe.  Wasn’t convinced at first as it sounds a bit unusual but it works.</span></p><span data-dcnode-id="1051" instrument_node="">
