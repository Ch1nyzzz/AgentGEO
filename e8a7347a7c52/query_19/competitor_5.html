</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" id="more-4997"></span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Crumbles (crisps) using seasonal fruit must be one of the simplest and most comforting desserts out there. Rhubarb is perfect in a crumble (crisp) and even avid rhubarb haters change their tune after trying this recipe.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><h3 data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Why is this Rhubarb Crumble (Rhubarb Crisp) so great &amp; serving suggestions</span></h3><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">I absolutely adore this seasonal dessert for it's comforting qualities, combination of textures (soft rhubarb with crunchy topping) and flavours (mixture of sweet and tangy). It makes a perfect desert to follow family Sunday lunch and can be made ahead and cooked as you are enjoying your main meal.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">I don't know about you but I prefer more crumble to fruit ratio so this recipe has got a generous amount of it. Feel free to adjust it as per your liking.</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Even if rhubarb is not usually your thing, this humble crumble (crisp) recipe really transforms it and you really cannot beat it when served with either custard or ice cream! Personally, I love it with a drizzle of cream to mellow the sweetness but the choice is yours!</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1527" instrument_node="">If you're a fan of crumbles, make sure to give my </span><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.joskitchenlarder.com/pear-crumble/"><span data-dcnode-id="1526" instrument_node="">Pear Crumble with Granola Topping</span></a><span data-dcnode-id="1524" instrument_node=""> a go as well!</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1515"></p><div class="dpsp-pin-it-wrapper alignnone size-large wp-image-5051" data-dcnode-id="1516"><img alt="Rhubarb crumble in a bowl and in a dish." class="" data-dcnode-id="1521" data-pin-description="Delicious &amp; easy Rhubarb Crumble (Rhubarb Crisp) makes most divine seasonal dessert. Sweet, tangy and combining different textures it\'s perfect follow-on to any meal. &nbsp;Best served with your choice of cream, ice cream or custard.&nbsp;#rhubarbrecipes #rhubarbcrumble #rhubarbcrisp #dessert" data-pin-title="Easy Rhubarb Crumble (Rhubarb Crisp)" height="1024" loading="lazy" sizes="(max-width: 683px) 100vw, 683px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble2-683x1024.jpg&amp;raw" srcset="https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble2-683x1024.jpg 683w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble2-200x300.jpg 200w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble2-720x1080.jpg 720w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble2-360x540.jpg 360w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble2-180x270.jpg 180w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble2.jpg 724w" style="" width="683"><a aria-label="" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A%252F%252Fwww.joskitchenlarder.com%252Fwp-content%252Fuploads%252F2019%252F05%252FEasy-Rhubarb-Crumble2-683x1024.jpg%26url%3Dhttps%3A%252F%252Fwww.joskitchenlarder.com%252Feasy-rhubarb-crumble-rhubarb-crisp%252F%26is_video%3Dfalse%26description%3DDelicious%2520%2526%2520easy%2520Rhubarb%2520Crumble%2520%28Rhubarb%2520Crisp%29%2520makes%2520most%2520divine%2520seasonal%2520dessert.%2520Sweet%252C%2520tangy%2520and%2520combining%2520different%2520textures%2520it%255C%27s%2520perfect%2520follow-on%2520to%2520any%2520meal.%2520%25C2%25A0Best%2520served%2520with%2520your%2520choice%2520of%2520cream%252C%2520ice%2520cream%2520or%2520custard.%25C2%25A0%2523rhubarbrecipes%2520%2523rhubarbcrumble%2520%2523rhubarbcrisp%2520%2523dessert" rel="noopener" target="_blank" title=""><span class="dpsp-network-icon" data-dcnode-id="1518"><svg data-dcnode-id="1519" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="1520"></path></svg></span></a></div><p></p><span data-dcnode-id="1514" instrument_node="">
</span><h3 data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Preparing rhubarb</span></h3><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Getting your rhubarb ready for crumble couldn't be easier. Simply wash it well and discard any leaves (you don't want to eat them as they are poisonous). Next step would be to simply cut the rhubarb into small chunks/ pieces. Make them as big or as small as you want but try to stay quite uniform. I usually cut them into 1.5cm/0.5inch slices. &nbsp;Mix them with some sugar and pop into your baking dish (any baking dish or even tray will do).</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Just in case you are wondering there is absolutely no need to peel the rhubarb!</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1498"></p><div class="dpsp-pin-it-wrapper alignnone size-large wp-image-5050" data-dcnode-id="1499"><img alt="Rhubarb crumble in a dish." class="" data-dcnode-id="1504" data-pin-description="Delicious &amp; easy Rhubarb Crumble (Rhubarb Crisp) makes most divine seasonal dessert. Sweet, tangy and combining different textures it\'s perfect follow-on to any meal. &nbsp;Best served with your choice of cream, ice cream or custard.&nbsp;#rhubarbrecipes #rhubarbcrumble #rhubarbcrisp #dessert" data-pin-title="Easy Rhubarb Crumble (Rhubarb Crisp)" height="1024" loading="lazy" sizes="(max-width: 683px) 100vw, 683px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble1-683x1024.jpg&amp;raw" srcset="https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble1-683x1024.jpg 683w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble1-200x300.jpg 200w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble1-720x1080.jpg 720w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble1-360x540.jpg 360w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble1-180x270.jpg 180w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble1.jpg 724w" style="" width="683"><a aria-label="" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A%252F%252Fwww.joskitchenlarder.com%252Fwp-content%252Fuploads%252F2019%252F05%252FEasy-Rhubarb-Crumble1-683x1024.jpg%26url%3Dhttps%3A%252F%252Fwww.joskitchenlarder.com%252Feasy-rhubarb-crumble-rhubarb-crisp%252F%26is_video%3Dfalse%26description%3DDelicious%2520%2526%2520easy%2520Rhubarb%2520Crumble%2520%28Rhubarb%2520Crisp%29%2520makes%2520most%2520divine%2520seasonal%2520dessert.%2520Sweet%252C%2520tangy%2520and%2520combining%2520different%2520textures%2520it%255C%27s%2520perfect%2520follow-on%2520to%2520any%2520meal.%2520%25C2%25A0Best%2520served%2520with%2520your%2520choice%2520of%2520cream%252C%2520ice%2520cream%2520or%2520custard.%25C2%25A0%2523rhubarbrecipes%2520%2523rhubarbcrumble%2520%2523rhubarbcrisp%2520%2523dessert" rel="noopener" target="_blank" title=""><span class="dpsp-network-icon" data-dcnode-id="1501"><svg data-dcnode-id="1502" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="1503"></path></svg></span></a></div><p></p><span data-dcnode-id="1497" instrument_node="">
</span><h3 data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Can I use frozen rhubarb?</span></h3><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">This recipe will work with both fresh and frozen rhubarb. If using frozen rhubarb you can either defrost it first (if you got it frozen in one big clump) or if you froze it nicely separated simply use it as you would fresh one. The only difference will be that your crumble (crisp) might take slightly longer to cook (keep a watchful eye on it).</span></p><span data-dcnode-id="1491" instrument_node="">
</span><h3 data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">How to make Rhubarb Crumble (Rhubarb Crisp)?</span></h3><span data-dcnode-id="1488" instrument_node="">
</span><div class="wprm-recipe-instruction-text" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">1. Preheat the oven to 180C/350F/Gas Mark 4 and butter a baking dish you will be using.</span></div><span data-dcnode-id="1485" instrument_node="">
</span><div data-dcnode-id="1484"></div><span data-dcnode-id="1483" instrument_node="">
</span><div class="wprm-recipe-instruction-text" data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">2. Clean and chop your rhubarb into chunky pieces and put it into the baking dish.</span></div><span data-dcnode-id="1480" instrument_node="">
</span><div data-dcnode-id="1479"></div><span data-dcnode-id="1478" instrument_node="">
</span><div class="wprm-recipe-instruction-text" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">3. Sprinkle over demerara sugar and give it a little mix. Make sure your rhubarb chunks are distributed in a nice, even layer.</span></div><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1468"></p><div class="dpsp-pin-it-wrapper alignnone wp-image-5053 size-large" data-dcnode-id="1469"><img alt="Rhubarb pieces in a dish." class="" data-dcnode-id="1474" data-pin-description="Delicious &amp; easy Rhubarb Crumble (Rhubarb Crisp) makes most divine seasonal dessert. Sweet, tangy and combining different textures it\'s perfect follow-on to any meal. &nbsp;Best served with your choice of cream, ice cream or custard.&nbsp;#rhubarbrecipes #rhubarbcrumble #rhubarbcrisp #dessert" data-pin-title="Easy Rhubarb Crumble (Rhubarb Crisp)" height="1024" loading="lazy" sizes="(max-width: 683px) 100vw, 683px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble4-683x1024.jpg&amp;raw" srcset="https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble4-683x1024.jpg 683w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble4-200x300.jpg 200w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble4-720x1080.jpg 720w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble4-360x540.jpg 360w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble4-180x270.jpg 180w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble4.jpg 724w" style="" width="683"><a aria-label="" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A%252F%252Fwww.joskitchenlarder.com%252Fwp-content%252Fuploads%252F2019%252F05%252FEasy-Rhubarb-Crumble4-683x1024.jpg%26url%3Dhttps%3A%252F%252Fwww.joskitchenlarder.com%252Feasy-rhubarb-crumble-rhubarb-crisp%252F%26is_video%3Dfalse%26description%3DDelicious%2520%2526%2520easy </span><div class="wprm-recipe-instruction-text" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">4. If you are using food processor add all the ingredients and pulse gently until you get crumbs like consistency. You can also make this toppping by hand by putting all the ingredients with the exception of butter/spread into a large bowl and giving them a good mix. Add grated cold buter or chunks of baking sperad and work it into the flour mixture until you get crumbs like consistency.</span></div><span data-dcnode-id="1464" instrument_node="">

</span><p data-dcnode-id="1415"></p><div class="dpsp-pin-it-wrapper alignnone size-large wp-image-5056" data-dcnode-id="1416"><img alt="Unbaked rhubarb crumble." class="" data-dcnode-id="1421" data-pin-description="Delicious &amp; easy Rhubarb Crumble (Rhubarb Crisp) makes most divine seasonal dessert. Sweet, tangy and combining different textures it\'s perfect follow-on to any meal. &nbsp;Best served with your choice of cream, ice cream or custard.&nbsp;#rhubarbrecipes #rhubarbcrumble #rhubarbcrisp #dessert" data-pin-title="Easy Rhubarb Crumble (Rhubarb Crisp)" height="1024" loading="lazy" sizes="(max-width: 683px) 100vw, 683px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble7-683x1024.jpg&amp;raw" srcset="https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble7-683x1024.jpg 683w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble7-200x300.jpg 200w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble7-720x1080.jpg 720w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble7-360x540.jpg 360w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble7-180x270.jpg 180w, https://www.joskitchenlarder.com/wp-content/uploads/2019/05/Easy-Rhubarb-Crumble7.jpg 724w" style="" width="683"><a aria-label="" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A%252F%252Fwww.joskitchenlarder.com%252Fwp-content%252Fuploads%252F2019%252F05%252FEasy-Rhubarb-Crumble7-683x1024.jpg%26url%3Dhttps%3A%252F%252Fwww.joskitchenlarder.com%252Feasy-rhubarb-crumble-rhubarb-crisp%252F%26is_video%3Dfalse%26description%3DDelicious%2520%2526%2520easy% </span><h3 data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Storing, freezing &amp; reheating rhubarb crumble (rhubarb crisp)</span></h3><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">If you have any crumble (crisp) leftovers simply keep it on the countertop until cooled them move to the fridge and eat within 3-4 days. I find that reheating in the microwave works a treat (you really don't need long approx. 20-30 seconded per serving will do).</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">When it comes to freezing rhubarb crumble (rhubarb crisp) my advice would be to freeze uncooked fruit and crumble (crisp) topping separately. Firstly, I would freeze prepared rhubarb in a single layer on a baking tray (if you can fit one in your freezer) and without sugar. Once frozen solid, put all the rhubarb chunks into the plastic bag and back into the freezer. &nbsp;As for the topping simply prepare it as per recipe below and pop in the freezer friendly bag.</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">When you are ready to bake your crumble simply place your frozen rhubarb in a single layer in a buttered baking dish and sprinkle over some sugar. Get the bag with frozen crumble (crisp) topping from the freezer and in case it got a bit lumpy simply bang it couple of times against the kitchen counter (or use rolling pin) to separate it a bit. Sprinkle it over the rhubarb and bake in the preheated oven as per the recipe below. You might have to increase the timing slightly.</span></p><span data-dcnode-id="1402" instrument_node="">

</span><div class="wprm-recipe-instructions-container wprm-recipe-4998-instructions-container wprm-block-text-normal" data-dcnode-id="1036" data-recipe="4998"><h3 class="wprm-recipe-header wprm-recipe-instructions-header wprm-block-text-bold wprm-align-left wprm-header-decoration-none" data-dcnode-id="1071" style=""><span data-dcnode-id="1072" instrument_node="">Instructions</span></h3><div class="wprm-recipe-instruction-group" data-dcnode-id="1057"><ul class="wprm-recipe-instructions" data-dcnode-id="1058"><li class="wprm-recipe-instruction" data-dcnode-id="1067" id="wprm-recipe-4998-step-0-0" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1068"><span data-dcnode-id="1069" style="display: block;"><span data-dcnode-id="1070" instrument_node="">Preheat the oven to 180C/350F/Gas Mark 4 and butter a baking dish you will be using.</span></span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1063" id="wprm-recipe-4998-step-0-1" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1064"><span data-dcnode-id="1065" style="display: block;"><span data-dcnode-id="1066" instrument_node="">Clean and chop your rhubarb into chunky pieces and put it into the baking dish.</span></span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1059" id="wprm-recipe-4998-step-0-2" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1060"><span data-dcnode-id="1061" style="display: block;"><span data-dcnode-id="1062" instrument_node="">Sprinkle over demerara sugar and mix it in gently. Make sure your rhubarb chunks are distributed in a nice, even layer.</span></span></div></li></ul></div><div class="wprm-recipe-instruction-group" data-dcnode-id="1037"><h4 class="wprm-recipe-group-name wprm-recipe-instruction-group-name wprm-block-text-bold" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Rhubarb Crumble (Crisp) Topping Instructions</span></h4><ul class="wprm-recipe-instructions" data-dcnode-id="1038"><li class="wprm-recipe-instruction" data-dcnode-id="1051" id="wprm-recipe-4998-step-1-0" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1052"><span data-dcnode-id="1053" style="display: block;"><span data-dcnode-id="1054" instrument_node="">If you are using food processor add all the ingredients and pulse gently until you get crumbs like consistency. You can also make this toppping by hand by putting all the ingredients with the exception of butter/spread into a large bowl and giving them a good mix. Add grated cold buter or chunks of baking sperad and work it into the flour mixture until you get crumbs like consistency.</span></span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1047" id="wprm-recipe-4998-step-1-1" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1048"><span data-dcnode-id="1049" style="display: block;"><span data-dcnode-id="1050" instrument_node="">Sprinkle crumble (crisp) topping over the rhubarb. Feel free to make little clusters if you wish.</span></span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1043" id="wprm-recipe-4998-step-1-2" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1044"><span data-dcnode-id="1045" style="display: block;"><span data-dcnode-id="1046" instrument_node="">Bake in the preheated oven for 30-40 minutes until golden and bubbly.</span></span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1039" id="wprm-recipe-4998-step-1-3" style="list-style-type: decimal;"><div class="wprm-recipe-instruction-text" data-dcnode-id="1040"><span data-dcnode-id="1041" style="display: block;"><span data-dcnode-id="1042" instrument_node="">Enjoy with cream, custard or some ice cream! </span></span></div></li></ul></div></div><span data-dcnode-id="1035" instrument_node="">
