srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2017/03/Rhubarb-Jam-1.jpg?w=932&amp;amp;ssl=1 932w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2017/03/Rhubarb-Jam-1.jpg?resize=259%2C300&amp;amp;ssl=1 259w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2017/03/Rhubarb-Jam-1.jpg?resize=768%2C890&amp;amp;ssl=1 768w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2017/03/Rhubarb-Jam-1.jpg?resize=884%2C1024&amp;amp;ssl=1 884w" sizes="(max-width: 720px) 100vw, 720px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2078" instrument_node="">
</span><h2 data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Don't Eat Rhubarb Leaves</span></h2><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Rhubarb is a perennial garden dweller, and we look forward to its appearance each spring. But, did you know, that the rhubarb leaves, themselves, are poisonous? They contain high levels of a toxic compound called oxalic acid. So, although those leaves may look temptingly like beet tops or Swiss chard, please refrain from eating them.</span></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2068"><img alt="A close up of a jar of jam" class="aligncenter size-full wp-image-11364 entered lazyloaded" data-dcnode-id="2071" data-lazy-sizes="(max-width: 612px) 100vw, 612px" data-lazy-src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-1-of-1.jpg?resize=612%2C601&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-1-of-1.jpg?w=612&amp;ssl=1 612w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-1-of-1.jpg?resize=300%2C295&amp;ssl=1 300w" data-ll-status="loaded" data-pin-description="Rhubarb Jam - No Pectin" data-pin-title="Rhubarb Jam - No Pectin" height="601" sizes="(max-width: 612px) 100vw, 612px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-1-of-1.jpg%3Fresize%3D612%252C601%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-1-of-1.jpg?w=612&amp;ssl=1 612w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-1-of-1.jpg?resize=300%2C295&amp;ssl=1 300w" width="612"><noscript data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">&lt;img class="aligncenter size-full wp-image-11364" src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-1-of-1.jpg?resize=612%2C601&amp;#038;ssl=1" alt="A close up of a jar of jam" width="612" height="601" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-1-of-1.jpg?w=612&amp;amp;ssl=1 612w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-1-of-1.jpg?resize=300%2C295&amp;amp;ssl=1 300w" sizes="(max-width: 612px) 100vw, 612px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2067" instrument_node="">
</span><h2 data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">More About Rhubarb</span></h2><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Did you know Rhubarb is not really a fruit, but actually a vegetable? Like many produce items, how we use them determines whether we think of them as veggies, or as fruits.</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2057"><img alt="A jar of jam in a garden" class="aligncenter size-full wp-image-11366 entered lazyloaded" data-dcnode-id="2060" data-lazy-sizes="(max-width: 720px) 100vw, 720px" data-lazy-src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=720%2C907&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?w=857&amp;ssl=1 857w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=238%2C300&amp;ssl=1 238w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=813%2C1024&amp;ssl=1 813w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=768%2C968&amp;ssl=1 768w" data-ll-status="loaded" data-pin-description="Rhubarb Jam - No Pectin" data-pin-title="Rhubarb Jam - No Pectin" height="781" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg%3Fresize%3D720%252C907%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?w=857&amp;ssl=1 857w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=238%2C300&amp;ssl=1 238w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=813%2C1024&amp;ssl=1 813w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=768%2C968&amp;ssl=1 768w" width="620"><noscript data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">&lt;img class="aligncenter size-full wp-image-11366" src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=720%2C907&amp;#038;ssl=1" alt="A jar of jam in a garden" width="720" height="907" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?w=857&amp;amp;ssl=1 857w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=238%2C300&amp;amp;ssl=1 238w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=813%2C1024&amp;amp;ssl=1 813w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-7.jpg?resize=768%2C968&amp;amp;ssl=1 768w" sizes="(max-width: 720px) 100vw, 720px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2056" instrument_node="">
</span><h2 data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Keep Rhubarb in the Freezer To Enjoy all Year</span></h2><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2052" instrument_node="">A couple of posts ago, I made&nbsp;</span><a data-dcnode-id="2050" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefoodblog.net/strawberry-rhubarb-muffins/" title="Strawberry Rhubarb Muffins"><span data-dcnode-id="2051" instrument_node="">strawberry rhubarb muffins</span></a><span data-dcnode-id="2049" instrument_node="">. I've been wanting to use rhubarb again while it's still in season and growing like crazy. But you don't have to wait, because rhubarb is easy to freeze. Just cut the stalks into 2-inch pieces. Spread the pieces on a parchment-lined baking sheet and freeze until firm. Then transfer them to airtight containers and freeze for up to a year. So if you have a surplus, or just want a winter treat, you can still make this rhubarb jam any time of year.</span></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2046" instrument_node="">And rhubarb is perfect for more than jam! Try a refreshing&nbsp;</span><a data-dcnode-id="2044" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefoodblog.net/rhubarb-gin-tonic-cocktail/"><span data-dcnode-id="2045" instrument_node="">Rhubarb Gin &amp; Tonic Cocktail</span></a><span data-dcnode-id="2043" instrument_node="">, or bake up some of these delicious </span><a data-dcnode-id="2041" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefoodblog.net/rhubarb-blueberry-oatmeal-bars/" rel="noopener noreferrer"><span data-dcnode-id="2042" instrument_node="">Rhubarb Blueberry Oatmeal Bars.</span></a><span data-dcnode-id="2040" instrument_node="">&nbsp; And, if you've never tried&nbsp;</span><a data-dcnode-id="2038" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefoodblog.net/pickled-rhubarb-recipe/"><span data-dcnode-id="2039" instrument_node="">Pickled Rhubarb</span></a><span data-dcnode-id="2037" instrument_node=""> you're missing out!</span></p><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2031"><img alt="A jar of jam sitting in a rhubarb patch" class="aligncenter size-full wp-image-11367 entered lazyloaded" data-dcnode-id="2034" data-lazy-sizes="(max-width: 720px) 100vw, 720px" data-lazy-src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=720%2C480&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?w=1080&amp;ssl=1 1080w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=1024%2C683&amp;ssl=1 1024w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=768%2C512&amp;ssl=1 768w" data-ll-status="loaded" data-pin-description="Rhubarb Jam - No Pectin" data-pin-title="Rhubarb Jam - No Pectin" height="413" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg%3Fresize%3D720%252C480%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?w=1080&amp;ssl=1 1080w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=1024%2C683&amp;ssl=1 1024w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=768%2C512&amp;ssl=1 768w" width="620"><noscript data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">&lt;img class="aligncenter size-full wp-image-11367" src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=720%2C480&amp;#038;ssl=1" alt="A jar of jam sitting in a rhubarb patch" width="720" height="480" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?w=1080&amp;amp;ssl=1 1080w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=300%2C200&amp;amp;ssl=1 300w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=1024%2C683&amp;amp;ssl=1 1024w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2014/05/Rhubarb-Jam-3.jpg?resize=768%2C512&amp;amp;ssl=1 768w" sizes="(max-width: 720px) 100vw, 720px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2030" instrument_node="">
</span><h2 data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Ingredients: Just Sugar &amp; Rhubarb</span></h2><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">This is a super&nbsp;simple recipe. There's no pectin, and there's just enough sugar to let that rhubarb's bright tartness shine. The end result is&nbsp;also versatile. You can use this rhubarb jam on toast or scones, but&nbsp;also with pork, salmon, or with crackers and a sharp spreadable cheese for entertaining. I love it on waffles with strawberries, and you can layer it with custard and nuts for a&nbsp;sublime&nbsp;spring desert. (Recipe coming soon)</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">To get the prettiest colour for your jam, try to use only the pink and bright red stalks. The green stalks taste just as good, but the colour will be a little muddy.</span></p><span data-dcnode-id="2021" instrument_node="">

input aria-label="1 ½ cups sugar" class="wprm-checkbox" data-dcnode-id="1796" id="wprm-checkbox-1" type="checkbox"><label class="wprm-checkbox-label" data-dcnode-id="1793" for="wprm-checkbox-1"><span class="sr-only screen-reader-text wprm-screen-reader-text" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">▢ </span></span></label></span><span class="wprm-recipe-ingredient-amount" data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">1 ½</span></span><span data-dcnode-id="1789" instrument_node=""> </span><span class="wprm-recipe-ingredient-unit" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">cups</span></span><span data-dcnode-id="1786" instrument_node=""> </span><span class="wprm-recipe-ingredient-name" data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">sugar</span></span></li></ul></div><div class="wprm-unit-conversion-container wprm-unit-conversion-container-7495 wprm-unit-conversion-container-links wprm-block-text-normal" data-dcnode-id="1775" style=""><a aria-label="Change unit system to US Customary" class="wprm-unit-conversion wprmpuc-active" data-dcnode-id="1779" data-recipe="7495" data-system="1" href="#" role="button" style=""><span data-dcnode-id="1780" instrument_node="">US Customary</span></a><span data-dcnode-id="1778" instrument_node=""> - </span><a aria-label="Change unit system to Metric" class="wprm-unit-conversion" data-dcnode-id="1776" data-recipe="7495" data-system="2" href="#" role="button" style=""><span data-dcnode-id="1777" instrument_node="">Metric</span></a></div></div><span data-dcnode-id="1773" instrument_node="">
</span><div class="wprm-recipe-instructions-container wprm-recipe-7495-instructions-container wprm-block-text-normal" data-dcnode-id="1750" data-recipe="7495"><h3 class="wprm-recipe-header wprm-recipe-instructions-header wprm-block-text-bold wprm-align-left wprm-header-decoration-none" data-dcnode-id="1771" style=""><span data-dcnode-id="1772" instrument_node="">Instructions</span></h3><div class="wprm-recipe-instruction-group" data-dcnode-id="1751"><ul class="wprm-recipe-instructions" data-dcnode-id="1752"><li class="wprm-recipe-instruction" data-dcnode-id="1767" id="wprm-recipe-7495-step-0-0" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1768" style="margin-bottom: 5px"><span data-dcnode-id="1769" style="display: block;"><span data-dcnode-id="1770" instrument_node="">Put chopped rhubarb and sugar in a glass or stainless steel bowl, stir and allow to sit until the sugar is dissolved and there is lots of juice. This can be overnight in the fridge or several hours on the countertop.</span></span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1764" id="wprm-recipe-7495-step-0-1" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1765" style="margin-bottom: 5px"><span data-dcnode-id="1766" instrument_node="">Put into a stainless steel pot (other pots such as cast iron, enamel, copper, or aluminum will react with the ingredients and discolour the jam) over medium high heat and bring to a boil, stirring occasionally.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1760" id="wprm-recipe-7495-step-0-2" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1761" style="margin-bottom: 5px"><span data-dcnode-id="1762" style="display: block;"><span data-dcnode-id="1763" instrument_node="">&nbsp;Reduce heat to medium-low and continue to cook, stirring occasionally, until the mixture thickens and the rhubarb has broken down, about 30 minutes.&nbsp;</span></span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1756" id="wprm-recipe-7495-step-0-3" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1757" style="margin-bottom: 5px"><span data-dcnode-id="1758" style="display: block;"><span data-dcnode-id="1759" instrument_node="">Let cool, and transfer into jars.</span></span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="1753" id="wprm-recipe-7495-step-0-4" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="1754" style="margin-bottom: 5px"><span data-dcnode-id="1755" instrument_node="">Rhubarb Jam will keep in the fridge for around three weeks. I didn't process this recipe, but it could  be done on a large scale if you have a ton of rhubarb.</span></div></li></ul></div></div><span data-dcnode-id="1749" instrument_node="">
</span><div class="wprm-recipe-notes-container wprm-block-text-normal" data-dcnode-id="1735"><h3 class="wprm-recipe-header wprm-recipe-notes-header wprm-block-text-bold wprm-align-left wprm-header-decoration-none" data-dcnode-id="1747" style=""><span data-dcnode-id="1748" instrument_node="">Notes</span></h3><div class="wprm-recipe-notes" data-dcnode-id="1736"><span data-dcnode-id="1745" style="display: block;"><span data-dcnode-id="1746" instrument_node="">This recipe makes four 250ml (8 oz) If you won't be using up the jam within a month, or want to make a larger amount, process the filled jars with lids and screw banks in a boiling water bath for ten minutes. Allow to cool and ensure that each jar is sealed before storing in a cool dry place. Sealed jars can be stored for up to a year.</span></span><div class="wprm-spacer" data-dcnode-id="1744"></div><span data-dcnode-id="1743" instrument_node="">

</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Thanks for this wonderfully tasty, versatile  jam!  I made it last fall with the last of my rhubarb, and again this spring.  I’m just about to go into the garden to pick another batch.  I put my rhubarb &amp; sugar in my crock pot, let it sit over night, slow cook it the next day, put half through the blender &amp; leave the other half “au natural”.  My son prefers the chunky jam, my husband &amp; I, the thick sauce like type.  We found that it’s really good with chicken (think cranberry sauce &amp; turkey/rhubarb sauce &amp; chicken!). Our daughter-in-law likes it on vanilla ice cream.</span></p><span data-dcnode-id="1511" instrument_node="">
