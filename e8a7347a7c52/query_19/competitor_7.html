</span><div class="entry-content" data-dcnode-id="1321"><div class="wprm-recipe wprm-recipe-snippet wprm-recipe-template-tfb-jump-buttons" data-dcnode-id="1947"><a class="wprm-recipe-jump wprm-recipe-link wprm-jump-to-recipe-shortcode wprm-block-text-normal wprm-recipe-jump-inline-button wprm-recipe-link-inline-button wprm-color-accent" data-dcnode-id="1949" data-recipe="9517" href="#recipe" style="color: #ffffff;background-color: #053f5e;border-color: #333333;border-radius: 3px;padding: 5px 8px;"><span class="wprm-recipe-icon wprm-recipe-jump-icon" data-dcnode-id="1951"><svg data-dcnode-id="1952" height="16" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><g class="nc-icon-wrapper" data-dcnode-id="1953" fill="#ffffff"><path d="M9,2h6c0.6,0,1-0.4,1-1s-0.4-1-1-1H9C8.4,0,8,0.4,8,1S8.4,2,9,2z" data-color="color-2" data-dcnode-id="1956"></path></g></svg><span data-dcnode-id="1955" instrument_node=""> </span><path d="M16,11V5c0-0.6-0.4-1-1-1H9C8.4,4,8,4.4,8,5v6H1.9L12,23.6L22.1,11H16z" data-dcnode-id="1954" fill="#ffffff"></path></span><span data-dcnode-id="1950" instrument_node=""> Jump to Recipe</span></a><span data-dcnode-id="1948" instrument_node="">
</span></div><span data-dcnode-id="1946" data-mobile-size="720" id="dpsp-post-sticky-bar-markup"></span><span data-dcnode-id="1945" data-image-pin-it="false" id="dpsp-post-content-markup"></span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Rhubarb Gin &amp; Tonic is a refreshing way to toast spring's arrival. Since rhubarb is one of the first edibles to show up in the garden every spring, it's fun to come up with new ways to use it, and the start of patio season means cocktails.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1941" instrument_node="">Last month I made a bubbly and delicious </span><a data-dcnode-id="1939" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefoodblog.net/prosecco-margarita-cocktail/" rel="noopener noreferrer"><span data-dcnode-id="1940" instrument_node="">Prosecco Margarita Cocktail</span></a><span data-dcnode-id="1938" instrument_node=""> for Cinco de Mayo. But this month it's all about the rhubarb.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><img alt="Rhubarb Gin &amp; Tonic Cocktail" class="wp-image-9503 size-full" data-dcnode-id="1935" data-pin-description="Rhubarb Gin &amp; Tonic Cocktail" data-pin-title="Rhubarb Gin &amp; Tonic Cocktail" data-skip-lazy="" height="930" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-4-of-6.jpg%3Fresize%3D720%252C1080%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-4-of-6.jpg?w=720&amp;ssl=1 720w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-4-of-6.jpg?resize=200%2C300&amp;ssl=1 200w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-4-of-6.jpg?resize=683%2C1024&amp;ssl=1 683w" width="620"></p><span data-dcnode-id="1933" instrument_node="">
</span><h2 data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Inspiration for a Rhubarb Gin &amp; Tonic Cocktail</span></h2><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">A classic Gin &amp; Tonic, or G&amp;T, is just Gin, Tonic, and Lime. The Gin, with its sweet floral notes, is a perfect partner with lots of tart lime.</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Because rhubarb has it's own unique tartness and taste, I couldn't help but come to the conclusion, that a Rhubarb Gin &amp; Tonic would be perfect.</span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1920"><img alt="A cocktail in a glass with lime" class="wp-image-9505 size-full entered lazyloaded" data-dcnode-id="1923" data-lazy-sizes="(max-width: 720px) 100vw, 720px" data-lazy-src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?resize=720%2C1080&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?w=720&amp;ssl=1 720w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?resize=200%2C300&amp;ssl=1 200w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?resize=683%2C1024&amp;ssl=1 683w" data-ll-status="loaded" data-pin-description="Rhubarb Gin &amp; Tonic Cocktail" data-pin-title="Rhubarb Gin &amp; Tonic Cocktail" height="930" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg%3Fresize%3D720%252C1080%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?w=720&amp;ssl=1 720w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?resize=200%2C300&amp;ssl=1 200w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?resize=683%2C1024&amp;ssl=1 683w" width="620"><noscript data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">&lt;img class="wp-image-9505 size-full" src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?resize=720%2C1080&amp;#038;ssl=1" alt="A cocktail in a glass with lime" width="720" height="1080" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?w=720&amp;amp;ssl=1 720w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?resize=200%2C300&amp;amp;ssl=1 200w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-6-of-6.jpg?resize=683%2C1024&amp;amp;ssl=1 683w" sizes="(max-width: 720px) 100vw, 720px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1919" instrument_node="">
</span><h3 data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Facts About Gin</span></h3><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">England likes to claim Gin as it's national spirit, but it actually originated with the Dutch. And, the biggest drinkers of gin in the world are in the Philippines.</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Distilling gin is always based on juniper, but many other botanicals can be added, which makes gin tasting a bit of a fun adventure.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1906"><img alt="Rhubarb Gin &amp; Tonic Cocktail" class="size-full wp-image-9501 entered lazyloaded" data-dcnode-id="1909" data-lazy-sizes="(max-width: 720px) 100vw, 720px" data-lazy-src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?resize=720%2C1080&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?w=720&amp;ssl=1 720w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?resize=200%2C300&amp;ssl=1 200w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?resize=683%2C1024&amp;ssl=1 683w" data-ll-status="loaded" data-pin-description="Rhubarb Gin &amp; Tonic Cocktail" data-pin-title="Rhubarb Gin &amp; Tonic Cocktail" height="930" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg%3Fresize%3D720%252C1080%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?w=720&amp;ssl=1 720w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?resize=200%2C300&amp;ssl=1 200w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?resize=683%2C1024&amp;ssl=1 683w" width="620"><noscript data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">&lt;img class="size-full wp-image-9501" src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?resize=720%2C1080&amp;#038;ssl=1" alt="Rhubarb Gin &amp;amp; Tonic Cocktail" width="720" height="1080" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?w=720&amp;amp;ssl=1 720w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?resize=200%2C300&amp;amp;ssl=1 200w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-2-of-6.jpg?resize=683%2C1024&amp;amp;ssl=1 683w" sizes="(max-width: 720px) 100vw, 720px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1905" instrument_node="">
</span><h2 data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Gin Botanicals</span></h2><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">There is an amazing variety of different botanicals that may be included in gin. And every one of them gives you a very different gin experience.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Some of the botanicals that you might encounter in your gin are coriander, citrus peel, cinnamon, almond or licorice.</span></p><span data-dcnode-id="1896" instrument_node="">
</span><h2 data-dcnode-id="1892"><img alt="Rhubarb Gin &amp; Tonic" class="size-full wp-image-9502 entered lazyloaded" data-dcnode-id="1895" data-lazy-sizes="(max-width: 720px) 100vw, 720px" data-lazy-src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=720%2C677&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?w=1080&amp;ssl=1 1080w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=300%2C282&amp;ssl=1 300w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=768%2C722&amp;ssl=1 768w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=1024%2C962&amp;ssl=1 1024w" data-ll-status="loaded" data-pin-description="Rhubarb Gin &amp; Tonic Cocktail" data-pin-title="Rhubarb Gin &amp; Tonic Cocktail" height="583" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg%3Fresize%3D720%252C677%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?w=1080&amp;ssl=1 1080w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=300%2C282&amp;ssl=1 300w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=768%2C722&amp;ssl=1 768w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=1024%2C962&amp;ssl=1 1024w" style="background-color: transparent; color: #767676; font-size: 16px;" width="620"><noscript data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">&lt;img class="size-full wp-image-9502" style="background-color: transparent; color: #767676; font-size: 16px;" src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=720%2C677&amp;#038;ssl=1" alt="Rhubarb Gin &amp;amp; Tonic" width="720" height="677" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?w=1080&amp;amp;ssl=1 1080w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=300%2C282&amp;amp;ssl=1 300w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=768%2C722&amp;amp;ssl=1 768w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-3-of-6.jpg?resize=1024%2C962&amp;amp;ssl=1 1024w" sizes="(max-width: 720px) 100vw, 720px" data-recalc-dims="1" /&gt;</span></noscript></h2><span data-dcnode-id="1891" instrument_node="">
</span><h2 data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Gin is for Mixing</span></h2><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Although gin is a versatile ingredient, it's one spirit that you would not want to drink on its own. It is, however, perfect for mixing.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1884" instrument_node="">So it's always great to have a bottle of gin in your home bar, just in case you want to make a Singapore Sling, White Lady, or so many other signature cocktails. Check out this amazing article by </span><a data-dcnode-id="1882" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodrepublic.com/2012/08/23/10-things-you-didnt-know-about-gin/" rel="noopener noreferrer external" target="_blank"><span data-dcnode-id="1883" instrument_node="">Food Republic</span></a><span data-dcnode-id="1881" instrument_node=""> for more info.</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1875"><img alt="Rhubarb Gin &amp; Tonic" class="size-full wp-image-9504 entered lazyloaded" data-dcnode-id="1878" data-lazy-sizes="(max-width: 720px) 100vw, 720px" data-lazy-src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=720%2C978&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?w=795&amp;ssl=1 795w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=221%2C300&amp;ssl=1 221w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=768%2C1043&amp;ssl=1 768w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=754%2C1024&amp;ssl=1 754w" data-ll-status="loaded" data-pin-description="Rhubarb Gin &amp; Tonic Cocktail" data-pin-title="Rhubarb Gin &amp; Tonic Cocktail" height="842" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg%3Fresize%3D720%252C978%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?w=795&amp;ssl=1 795w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=221%2C300&amp;ssl=1 221w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=768%2C1043&amp;ssl=1 768w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=754%2C1024&amp;ssl=1 754w" width="620"><noscript data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">&lt;img class="size-full wp-image-9504" src="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=720%2C978&amp;#038;ssl=1" alt="Rhubarb Gin &amp;amp; Tonic" width="720" height="978" srcset="https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?w=795&amp;amp;ssl=1 795w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=221%2C300&amp;amp;ssl=1 221w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=768%2C1043&amp;amp;ssl=1 768w, https://i0.wp.com/www.thefoodblog.net/wp-content/uploads/2019/05/Rhubarb-GT-5-of-6.jpg?resize=754%2C1024&amp;amp;ssl=1 754w" sizes="(max-width: 720px) 100vw, 720px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1874" instrument_node="">
</span><h2 data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">About Rhubarb</span></h2><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1870" instrument_node="">Rhubarb, although it's treated as a fruit, is actually a vegetable. It's incredibly astringent, so it usually needs a lot of sugar, as in </span><a data-dcnode-id="1868" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefoodblog.net/rhubarb-jam/" rel="noopener noreferrer"><span data-dcnode-id="1869" instrument_node="">Rhubarb Jam</span></a><span data-dcnode-id="1867" instrument_node="">, or is often paired with sweeter fruit, like these </span><a data-dcnode-id="1865" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefoodblog.net/rhubarb-blueberry-oatmeal-bars/" rel="noopener noreferrer"><span data-dcnode-id="1866" instrument_node="">Rhubarb Blueberry Oatmeal Bars</span></a><span data-dcnode-id="1864" instrument_node="">, or&nbsp;</span><a data-dcnode-id="1862" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefoodblog.net/strawberry-rhubarb-muffins/" rel="noopener noreferrer"><span data-dcnode-id="1863" instrument_node="">Strawberry Rhubarb Muffins</span></a><span data-dcnode-id="1861" instrument_node="">.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Rhubarb is a perennial plant that first appears in the Northern Hemisphere in early spring. When harvesting rhubarb, or making this Rhubarb G&amp;T, be sure to cut the leaves from the stalks and discard them, as they are poisonous!</span></p><span data-dcnode-id="1856" instrument_node="">
