pan data-dcnode-id="1819" instrument_node="">Medically reviewed by </span><a class="css-zocu4s" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/reviewers/jillian-kubala-ms-rd-563"><span data-dcnode-id="1818" instrument_node="">Jillian Kubala, MS, RD</span></a><span data-dcnode-id="1816" instrument_node="">, </span><span data-dcnode-id="1815" instrument_node=""></span><span data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Nutrition</span></span></span></div></section><div data-dcnode-id="865"><nav class="css-7u7i0a" data-dcnode-id="1799" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="1800"><li class="css-t753mo" data-dcnode-id="1807"><a class="css-1ggiqr2" data-dcnode-id="1808" href="#oxalic-acid"><span data-dcnode-id="1809" instrument_node="">Oxalic acid</span></a></li><li class="css-t753mo" data-dcnode-id="1804"><a class="css-1ggiqr2" data-dcnode-id="1805" href="#poisoning"><span data-dcnode-id="1806" instrument_node="">Poisoning</span></a></li><li class="css-t753mo" data-dcnode-id="1801"><a class="css-1ggiqr2" data-dcnode-id="1802" href="#bottom-line"><span data-dcnode-id="1803" instrument_node="">Bottom line</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="1253"><div class="css-1u22pos" data-dcnode-id="1512"><span data-dcnode-id="1798" style="font-size:0;line-height:0"></span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Rhubarb is a plant that enjoys cold climates and is found in mountainous and temperate areas of the world like Northeast Asia.</span></p><p data-dcnode-id="1791"><span data-dcnode-id="1795" instrument_node="">The species </span><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Rheum x hybridum </span></em><span data-dcnode-id="1792" instrument_node="">is commonly grown as an edible vegetable across Europe and North America.</span></p><p data-dcnode-id="1781"><span data-dcnode-id="1790" instrument_node="">Although rhubarb is botanically a vegetable, it’s classified as a fruit in the United States (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1783" rationale="Highly respected food and nutrition database from the United States Department of Agriculture,Governmental authority" source="FoodData Central"><a class="content-link css-5r4717" data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fdc.nal.usda.gov/fdc-app.html%23/food-details/167758/nutrients" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1789" instrument_node="">1</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1786"><span class="sro" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1784"></span></hl-trusted-source><span data-dcnode-id="1782" instrument_node="">).</span></p><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">It has long fibrous stalks that range from dark red to pale green. These are often chopped and cooked with sugar due to their very sour taste.</span></p><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Meanwhile, its large dark green leaves look a bit like spinach and are not usually eaten due to fears about them being poisonous or inedible.</span></p><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">This article provides all the information you need on the safety of rhubarb leaves.</span></p><div data-dcnode-id="1762"><figure class="css-yhe8zq" data-dcnode-id="1763"><span class="css-rwmw5v" data-dcnode-id="1764"><span class="css-mjp0j9" data-dcnode-id="1769"><picture class="css-16pk1is" data-dcnode-id="1770"><source data-dcnode-id="1774" media="(min-width: 1190px)" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2020/02/rhubarb-farmers-market-produce-1296x728-header.jpg?w=1575 750w"> </span><div data-dcnode-id="1526" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="1513"><aside class="css-0 css-0" data-dcnode-id="1514"><div data-dcnode-id="1515"><div class="css-10gx9pb" data-dcnode-id="1516" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1518"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1517" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1440"><span data-dcnode-id="1511" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1507"><div data-dcnode-id="1508"><a class="chartbeat-section" data-dcnode-id="1509" name="oxalic-acid"><span data-dcnode-id="1510" instrument_node="">High in oxalic acid</span></a></div></h2><p data-dcnode-id="1502"><span data-dcnode-id="1506" instrument_node="">Rhubarb leaves are considered inedible due to their high concentration of </span><a class="content-link css-5r4717" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/oxalate-good-or-bad"><span data-dcnode-id="1505" instrument_node="">oxalic acid</span></a><span data-dcnode-id="1503" instrument_node="">. In fact, both the stalks and leaves contain oxalic acid, but the leaves have a much higher content.</span></p><p data-dcnode-id="1492"><span data-dcnode-id="1501" instrument_node="">Oxalic acid is a natural substance found in many plants, including leafy greens, fruits, vegetables, nuts, seeds, and cocoa (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1494" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24393738/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1500" instrument_node="">2</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1497"><span class="sro" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1495"></span></hl-trusted-source><span data-dcnode-id="1493" instrument_node="">).</span></p><p data-dcnode-id="1482"><span data-dcnode-id="1491" instrument_node="">Rhubarb contains approximately 570–1,900 mg of oxalate per 3.5 ounces (100 grams). The leaves contain the most oxalate, comprising 0.5–1.0% of the leaf (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1484" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1490" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1487"><span class="sro" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1485"></span></hl-trusted-source><span data-dcnode-id="1483" instrument_node="">).</span></p><p data-dcnode-id="1469"><span data-dcnode-id="1481" instrument_node="">Too much oxalate in the body can lead to a condition known as hyperoxaluria, which is when excess oxalate is excreted in the urine. This can also lead to an accumulation of </span><a class="content-link css-5r4717" data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/calcium-oxalate-crystals"><span data-dcnode-id="1480" instrument_node="">calcium oxalate crystals</span></a><span data-dcnode-id="1478" instrument_node=""> in the organs (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1471" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1477" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1474"><span class="sro" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1472"></span></hl-trusted-source><span data-dcnode-id="1470" instrument_node="">).</span></p><p data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node="">In the kidneys, this can lead to the formation of </span><a class="content-link css-5r4717" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/kidney-stones"><span data-dcnode-id="1467" instrument_node="">kidney stones</span></a><span data-dcnode-id="1465" instrument_node=""> and eventually kidney failure.</span></p><p data-dcnode-id="1454"><span data-dcnode-id="1463" instrument_node="">Symptoms of mild rhubarb leaf poisoning include vomiting and diarrhea that resolve within a few hours. More serious oxalate toxicity causes sore throat, difficulty swallowing, nausea, vomiting (sometimes including blood), diarrhea, and abdominal pain (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1456" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1462" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1459"><span class="sro" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1457"></span></hl-trusted-source><span data-dcnode-id="1455" instrument_node="">).</span></p><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Very serious symptoms include kidney failure, numbness, muscle twitches, and cramps.</span></p><blockquote class="css-pc7ote" data-dcnode-id="1447"><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">summary</span></strong><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Rhubarb leaves contain oxalic acid, which can cause build up in the organs and lead to kidney stones and kidney failure when consumed in high amounts. </span></p></blockquote><div class="css-1cg0byz" data-dcnode-id="1441"><aside class="css-0 css-0" data-dcnode-id="1442"><div data-dcnode-id="1443"><div class="css-az6x7v" data-dcnode-id="1444" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1446"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="1445" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1269"><span data-dcnode-id="1439" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1435"><div data-dcnode-id="1436"><a class="chartbeat-section" data-dcnode-id="1437" name="poisoning"><span data-dcnode-id="1438" instrument_node="">Rhubarb leaf poisoning is rare</span></a></div></h2><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">There are very few reports of either fatal or nonfatal poisoning caused by eating rhubarb leaves.</span></p><p data-dcnode-id="1423"><span data-dcnode-id="1432" instrument_node="">The reported average lethal dose for oxalate is estimated at 170 mg per pound (375 mg per kg) of body weight, which is approximately 26.3 grams for a 154-pound (70-kg) person (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1425" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4220346/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1431" instrument_node="">4</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1428"><span class="sro" data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1426"></span></hl-trusted-source><span data-dcnode-id="1424" instrument_node="">). </span></p><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">This means a person would have to eat between 5.7–11.7 pounds (2.6–5.3 kg) of rhubarb leaves for a potentially lethal dose of oxalate, depending on the concentration of oxalate in the leaf. </span></p><p data-dcnode-id="1395"><span data-dcnode-id="1420" instrument_node="">However, lethal amounts have also been reported at lower intake levels (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1413" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24393738/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1419" instrument_node="">2</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1416"><span class="sro" data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1414"></span></hl-trusted-source><span data-dcnode-id="1412" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1405" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/1288268" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1411" instrument_node="">5</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1408"><span class="sro" data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1406"></span></hl-trusted-source><span data-dcnode-id="1404" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1397" rationale="Governmental authority" source="Centers for Disease Control and Prevention (CDC)"><a class="content-link css-5r4717" data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/niosh/idlh/144627.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1403" instrument_node="">6</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1400"><span class="sro" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1398"></span></hl-trusted-source><span data-dcnode-id="1396" instrument_node="">).</span></p><p data-dcnode-id="1385"><span data-dcnode-id="1394" instrument_node="">During World War I, people were advised to eat rhubarb leaves as a substitute for vegetables that were unavailable at the time, leading to reports of several poisonings and deaths (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1387" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1393" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1390"><span class="sro" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1388"></span></hl-trusted-source><span data-dcnode-id="1386" instrument_node="">). </span></p><p data-dcnode-id="1375"><span data-dcnode-id="1384" instrument_node="">There were also reports of poisonings during the 1960s, but because it’s very uncommon to eat rhubarb leaves, there are no reports of deaths from rhubarb leaves in more recent times (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1377" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/1288268" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1383" instrument_node="">5</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1380"><span class="sro" data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1378"></span></hl-trusted-source><span data-dcnode-id="1376" instrument_node="">). </span></p><p data-dcnode-id="1362"><span data-dcnode-id="1374" instrument_node="">However, there are cases of people developing kidney damage from eating high amounts of </span><a class="content-link css-5r4717" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/rhubarb"><span data-dcnode-id="1373" instrument_node="">rhubarb</span></a><span data-dcnode-id="1371" instrument_node=""> stems, which also contain oxalic acid (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1364" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3504561/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1370" instrument_node="">7</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1367"><span class="sro" data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1365"></span></hl-trusted-source><span data-dcnode-id="1363" instrument_node="">). </span></p><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Additionally, some people are more susceptible to developing kidney stones and kidney damage from oxalates. </span></p><p data-dcnode-id="1323"><span data-dcnode-id="1359" instrument_node="">This includes people with certain genetic conditions, as well as those with existing kidney damage, a high vitamin C intake, or </span><a class="content-link css-5r4717" data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/vitamin-b6-deficiency-symptoms"><span data-dcnode-id="1358" instrument_node="">vitamin B6 deficiency</span></a><span data-dcnode-id="1356" instrument_node=""> (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1349" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3504561/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1355" instrument_node="">7</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1352"><span class="sro" data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1350"></span></hl-trusted-source><span data-dcnode-id="1348" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1341" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23167815" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1347" instrument_node="">8</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1344"><span class="sro" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1342"></span></hl-trusted-source><span data-dcnode-id="1340" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1333" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28435765" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1339" instrument_node="">9</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1336"><span class="sro" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1334"></span></hl-trusted-source><span data-dcnode-id="1332" instrument_node="">, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1325" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18042297" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1331" instrument_node="">10</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1328"><span class="sro" data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1326"></span></hl-trusted-source><span data-dcnode-id="1324" instrument_node="">). </span></p><p data-dcnode-id="1313"><span data-dcnode-id="1322" instrument_node="">It has also been suggested that both fatal and nonfatal rhubarb leaf poisoning may be caused by another substance known as anthraquinone glycosides — not the oxalic acid. However, more research is needed (</span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1315" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1321" instrument_node="">3</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1318"><span class="sro" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1316"></span></hl-trusted-source><span data-dcnode-id="1314" instrument_node="">).</span></p><blockquote class="css-pc7ote" data-dcnode-id="1308"><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">summary</span></strong><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Reports of poisoning from eating rhubarb leaves are very rare. A person would need to eat significant amounts of rhubarb leaves to induce symptoms, although some people may be more susceptible to developing kidney problems from oxalates. </span></p></blockquote><div data-dcnode-id="1276" id="mcdad6cc7-d007-4a74-b9cc-7c41291737de"><div data-dcnode-id="1277"><form data-dcnode-id="1278" pan></p></div></div></div><div class="css-1tuviqo" data-dcnode-id="1281"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="1270"><aside class="css-0 css-0" data-dcnode-id="1271"><div data-dcnode-id="1272"><div class="css-10gx9pb" data-dcnode-id="1273" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1275"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="1274" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1254"><span data-dcnode-id="1268" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1264"><div data-dcnode-id="1265"><a class="chartbeat-section" data-dcnode-id="1266" name="bottom-line"><span data-dcnode-id="1267" instrument_node="">The bottom line</span></a></div></h2><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Rhubarb leaves contain high amounts of oxalic acid, which can cause health problems when eaten in higher amounts. </span></p><p data-dcnode-id="1257"><span data-dcnode-id="1261" instrument_node="">Symptoms of toxicity include mild gastrointestinal symptoms, as well as more serious problems, such as kidney stones and </span><a class="content-link css-5r4717" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/kidney-failure"><span data-dcnode-id="1260" instrument_node="">kidney failure</span></a><span data-dcnode-id="1258" instrument_node="">. </span></p><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Although reports of poisoning are rare, it’s best to avoid eating rhubarb leaves, particularly if you have any condition that increases your risk of kidney stones. </span></p></div></article><div data-dcnode-id="866" id="mcefd59a6-6003-44f5-a6be-573adfd6e508"><div data-dcnode-id="867"><div class="myFinance-widget myFinance-ad-unit" data-campaign="healthline nutrition mpls" data-dcnode-id="868" da
