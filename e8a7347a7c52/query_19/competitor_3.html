</span><p class="entry-meta" data-dcnode-id="2552"><time class="entry-time" data-dcnode-id="2563" datetime="2020-04-25T05:02:47-05:00" itemprop="datePublished"><span data-dcnode-id="2564" instrument_node="">April 25, 2020</span></time><span data-dcnode-id="2562" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="2558" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="entry-author-link" data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishamericanmom.com/author/dublinmolly/" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="2560" itemprop="name"><span data-dcnode-id="2561" instrument_node="">Irish American Mom</span></span></a></span><span data-dcnode-id="2557" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="2554"><a data-dcnode-id="2555" href="#comments"><span data-dcnode-id="2556" instrument_node="">16 Comments</span></a></span><span data-dcnode-id="2553" instrument_node=""> </span></p><div class="disclaimer" data-dcnode-id="2547"><span data-dcnode-id="2551" instrument_node="">This post may contain affiliate sales links. Please see my </span><a data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishamericanmom.com/disclosure/"><span data-dcnode-id="2550" instrument_node="">full disclosure policy</span></a><span data-dcnode-id="2548" instrument_node=""> for details.</span></div></header><div class="entry-content" data-dcnode-id="1375" itemprop="text"><div data-dcnode-id="2543"><div class="adthrive" data-dcnode-id="2544" id="cls-video-container-gemilmLe" style="min-height: 434.75px;"><div data-dcnode-id="2545"></div></div></div><div class="wprm-recipe wprm-recipe-snippet wprm-recipe-template-irish-american-mom-snippet-template" data-dcnode-id="2534"><a class="wprm-recipe-jump wprm-recipe-link wprm-jump-to-recipe-shortcode wprm-block-text-normal wprm-recipe-jump-inline-button wprm-recipe-link-inline-button wprm-color-accent" data-dcnode-id="2535" data-recipe="27515" href="#recipe" style="color: #ffffff;background-color: #1bbb13;border-color: #333333;border-radius: 3px;padding: 5px 8px;"><span class="wprm-recipe-icon wprm-recipe-jump-icon" data-dcnode-id="2537"><svg data-dcnode-id="2538" height="16" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><g class="nc-icon-wrapper" data-dcnode-id="2539" fill="#ffffff"><path d="M9,2h6c0.6,0,1-0.4,1-1s-0.4-1-1-1H9C8.4,0,8,0.4,8,1S8.4,2,9,2z" data-color="color-2" data-dcnode-id="2542"></path></g></svg><span data-dcnode-id="2541" instrument_node=""> </span><path d="M16,11V5c0-0.6-0.4-1-1-1H9C8.4,4,8,4.4,8,5v6H1.9L12,23.6L22.1,11H16z" data-dcnode-id="2540" fill="#ffffff"></path></span><span data-dcnode-id="2536" instrument_node=""> Jump to Recipe</span></a></div><p data-dcnode-id="2531"><strong data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Rhubarb is used extensively in Irish cooking and rhubarb crumble is one of the most popular desserts served in Ireland during the spring and summer months.</span></strong></p><span data-dcnode-id="2530" instrument_node="">
</span><p data-dcnode-id="2525"><span data-dcnode-id="2529" instrument_node="">This truly is comfort food at its finest. It's not a delicate dish, or a pretty dessert. It's a bowl full of tart and sweet crumbly goodness, brought to a whole new level of excellence when smothered in sweet and </span><a data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishamericanmom.com/egg-custard-sauce/"><span data-dcnode-id="2528" instrument_node="">creamy egg custard</span></a><span data-dcnode-id="2526" instrument_node="">.</span></p><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2520"><img alt="Custard sauce pouring from a blue jug over a serving of rhubarb crumble in a bowl" class="aligncenter wp-image-27541 size-full entered lazyloaded" data-dcnode-id="2523" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-720x720.jpg 720w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-360x360.jpg 360w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-180x180.jpg 180w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-768x768.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-500x500.jpg 500w" data-ll-status="loaded" height="800" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert.jpg&amp;raw" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-720x720.jpg 720w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-360x360.jpg 360w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-180x180.jpg 180w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-768x768.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-500x500.jpg 500w" width="800"><noscript data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">&lt;img class="aligncenter wp-image-27541 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert.jpg" alt="Custard sauce pouring from a blue jug over a serving of rhubarb crumble in a bowl" width="800" height="800" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-720x720.jpg 720w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-360x360.jpg 360w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-180x180.jpg 180w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-768x768.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Homemade-rhubarb-crumble-served-with-hot-egg-custard-sauce-is-a-favorite-Irish-dessert-500x500.jpg 500w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2519" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">This is a dessert of my Irish childhood, and what I consider to be a taste of Ireland.</span></p><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">It's usually served warm with custard, even in the summer months. Remember, Irish summers are never as warm as American summers, so nobody has a problem eating a hot dessert in June, July and August in the Emerald Isle.</span></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2509"><strong data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Rhubarb and custard are a heavenly pairing, loved throughout the British Isles.</span></strong></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Rhubarb releases a lot of liquid as it heats. Some cooks like to toss it in corn starch, or cornflour as we say in Ireland, to help absorb the liquid as it cooks. Not me. I like a juicy rhubarb base for this dessert, to soak up into the bottom of the sweet and oaty crumble topping.</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">This slightly sour and pinkish syrup is what I love most about rhubarb crumble.</span></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2498"><img alt="Rhubarb crumble in a blue rimmed white enamel ware casserole" class="aligncenter wp-image-27540 size-full entered lazyloaded" data-dcnode-id="2501" data-lazy-sizes="(max-width: 798px) 100vw, 798px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven.jpg 798w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-768x770.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-500x500.jpg 500w" data-ll-status="loaded" height="800" sizes="(max-width: 798px) 100vw, 798px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven.jpg&amp;raw" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven.jpg 798w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-768x770.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-500x500.jpg 500w" width="798"><noscript data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">&lt;img class="aligncenter wp-image-27540 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven.jpg" alt="Rhubarb crumble in a blue rimmed white enamel ware casserole" width="798" height="800" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven.jpg 798w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-768x770.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-fresh-out-of-the-oven-500x500.jpg 500w" sizes="(max-width: 798px) 100vw, 798px" /&gt;</span></noscript></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2494"><strong data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Now this isn't a photo to wow social media. The edges of the crumble go brown and sticky with caramelized rhubarb juice. </span></strong></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2493" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">I could have taken it out of the oven a little under cooked for this photo shoot, but then I decided it's better to keep it realistic with that lovely sticky, tangy, rhubarb toffee at the edge of the dish.</span></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2485"><strong data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">In America, rhubarb is often paired with strawberries, but traditional Irish rhubarb crumble uses this delicious vegetable all on its own</span></strong><span data-dcnode-id="2486" instrument_node="">.</span></p><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Rhubarb is often referred to as a fruit, but it bears no seeds, so it's technically a vegetable. I believe it does not get the credit it deserves in America, but in Ireland it is a summer staple in most kitchens.</span></p><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">It's served stewed over custard, baked into tarts and even served alongside pork.</span></p><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2475"><strong data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">It grows well in Irish soil. The first rhubarb of the season appears around February, but this is tender, pink, early-season rhubarb that is grown in greenhouses or sheds, away from the harsh winter elements.</span></strong></p><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Outdoor rhubarb first appears in Irish supermarkets or grocery stores around April. It's far thicker and hardier than the early tender variety, but it's the rhubarb of my childhood. So it's time to let the rhubarb cooking begin.</span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2470" instrument_node="">In the past I've shared a delicious </span><a data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishamericanmom.com/apple-crumble-perfect-farm-wife-style/" title="Apple Crumble – Perfect Farm Wife Style"><span data-dcnode-id="2469" instrument_node="">apple crumble recipe</span></a><span data-dcnode-id="2467" instrument_node="">, but it's springtime now. So move over fall cooking, let's give rhubarb a turn to be the star of the show.</span></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2462"><strong data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">And so, without further ado, let's take a look at how I make rhubarb crumble, Irish style.</span></strong></p><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2458" instrument_node="">

</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">&nbsp;</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2437" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2436" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2434" style="font-weight: 400;"><span data-dcnode-id="2435" instrument_node="">Here you’ll find a quick list of what you’ll need for this recipe. </span></span></p><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" style="font-weight: 400;"><span data-dcnode-id="2431" instrument_node="">Check out the printable recipe at the bottom of this post for US and Metric equivalent versions of the recipe. There you can choose the measurement system that works best for you.</span></span></p><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2424"><img alt="Ingredients for Rhubarb Crumble showing chopped rhubarb, butter, oats, flour, water, brown sugar and white sugar" class="aligncenter wp-image-27542 size-full entered lazyloaded" data-dcnode-id="2427" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble-300x215.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble-768x550.jpg 768w" data-ll-status="loaded" height="573" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble.jpg&amp;raw" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble-300x215.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble-768x550.jpg 768w" width="800"><noscript data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">&lt;img class="aligncenter wp-image-27542 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble.jpg" alt="Ingredients for Rhubarb Crumble showing chopped rhubarb, butter, oats, flour, water, brown sugar and white sugar" width="800" height="573" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble-300x215.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Individual-ingredients-required-to-make-rhubarb-crumble-768x550.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Here's what you'll need to make Irish style rhubarb crumble with a flour and oat topping.</span></p><span data-dcnode-id="2420" instrument_node="">
</span><ul data-dcnode-id="2397"><span data-dcnode-id="2419" instrument_node="">
</span><li data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">rhubarb</span></li><span data-dcnode-id="2416" instrument_node="">
</span><li data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">water</span></li><span data-dcnode-id="2413" instrument_node="">
</span><li data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">white sugar</span></li><span data-dcnode-id="2410" instrument_node="">
</span><li data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">flour</span></li><span data-dcnode-id="2407" instrument_node="">
</span><li data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">rolled oats</span></li><span data-dcnode-id="2404" instrument_node="">
</span><li data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">brown sugar</span></li><span data-dcnode-id="2401" instrument_node="">
</span><li data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">butter</span></li><span data-dcnode-id="2398" instrument_node="">
</span></ul><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2393" instrument_node="">
</span><h2 data-dcnode-id="2389"><span data-dcnode-id="2390" style="color: #ff6600;"><strong data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Directions for Rhubarb Crumble:</span></strong></span></h2><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">&nbsp;</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2385" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2382" style="font-weight: 400;"><span data-dcnode-id="2383" instrument_node="">Here you’ll find step-by-step photographic instructions to help you recreate this recipe successfully. There are plenty of tips included along the way. Plus the essential steps are highlighted in bold.</span></span></p><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2376"><img alt="A white enamel ware casserole with a navy blue trim greased with butter" class="aligncenter wp-image-27545 size-full" data-dcnode-id="2379" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble-300x214.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble-768x548.jpg 768w" height="571" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20571'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">&lt;img class="aligncenter wp-image-27545 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble.jpg" alt="A white enamel ware casserole with a navy blue trim greased with butter" width="800" height="571" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble-300x214.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Greasing-an-enamel-ware-pie-dish-to-make-rhubarb-crumble-768x548.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">First let's prepare a baking dish.</span></p><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2369"><strong data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">Use a little butter to grease a 2 quart size casserole.</span></strong></p><span data-dcnode-id="2368" instrument_node="">
</span><p data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">I love to use this enamelware dish from Ireland. It reminds me of the casserole dishes my granny used when making a crumble. For those using the metric system this is a 2 litre size baking dish or pie dish.</span></p><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2362"><strong data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Pre-heat the oven to 375 degrees Fahrenheit.</span></strong></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Next, let's prepare the rhubarb.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2354"><img alt="Three stalks of rhubarb beside chopped pieces of rhubarb and a knife on a chopping board." class="aligncenter wp-image-27543 size-full" data-dcnode-id="2357" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing-768x767.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing-500x500.jpg 500w" height="799" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20799'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">&lt;img class="aligncenter wp-image-27543 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing.jpg" alt="Three stalks of rhubarb beside chopped pieces of rhubarb and a knife on a chopping board." width="800" height="799" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing-768x767.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/How-to-chop-rhubarb-into-bite-size-pieces-for-recipes-and-stewing-500x500.jpg 500w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2353" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2349"><strong data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Trim the tops and bottoms off the rhubarb stalks and discard them.</span></strong></p><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2345"><strong data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Then chop the rhubarb into 1 inch pieces.</span></strong></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2340"><img alt="Sugar being sprinkled over chopped rhubarb in a silver pot" class="aligncenter wp-image-27544 size-full" data-dcnode-id="2343" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble-768x768.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble-500x500.jpg 500w" height="800" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20800'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">&lt;img class="aligncenter wp-image-27544 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble.jpg" alt="Sugar being sprinkled over chopped rhubarb in a silver pot" width="800" height="800" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble-768x768.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Adding-sugar-and-water-to-rhubarb-pieces-in-a-saucepan-to-parboil-it-for-rhubarb-crumble-500x500.jpg 500w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Next, I like to par boil the rhubarb to start the cooking process.</span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2333"><strong data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Add the rhubarb to a large saucepan together with the sugar and the water.</span></strong></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Only a small amount of water is required to start the rhubarb cooking process. Plenty rhubarb juice will be released as the rhubarb heats up and gets tender.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2326"><strong data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Bring the rhubarb to a simmer and cook it for 8 to 10 minutes.</span></strong></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">The rhubarb is ready when it's starting to get tender, but not falling apart. The amount of juice in your rhubarb will determine exactly how long is required for this par-boiling stage.</span></p><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">While the rhubarb is simmering prepare the crumble topping.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2319" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">+</span></p><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2309"><strong data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Add the flour, oats, brown sugar and cubed butter to a large mixing bowl.</span></strong></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2305"><strong data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Use a pastry cutter or the tips of your fingers to rub the butter into the flour, oats and sugar.</span></strong></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">This quickly forms a lovely crumbly topping.</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2297"><img alt="Par-boiled chopped rhubarb in the bottom of a casserole " class="aligncenter wp-image-27547 size-full" data-dcnode-id="2300" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style-300x215.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style-768x549.jpg 768w" height="572" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20572'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">&lt;img class="aligncenter wp-image-27547 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style.jpg" alt="Par-boiled chopped rhubarb in the bottom of a casserole " width="800" height="572" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style-300x215.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Parboiled-rhubarb-in-a-pie-dish-for-the-base-of-rhubarb-crumble-Irish-style-768x549.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2293"><strong data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">Toss the partially cooked rhubarb into the prepared casserole.</span></strong></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Add all the juice that has been released during the simmering process.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2285"><img alt="Pouring an oaty crumble mixture over rhubarb in a casserole" class="aligncenter wp-image-27548 size-full" data-dcnode-id="2288" data-lazy-sizes="(max-width: 799px) 100vw, 799px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble.jpg 799w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble-768x769.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble-500x500.jpg 500w" height="800" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20799%20800'%3E%3C/svg%3E" width="799"><noscript data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">&lt;img class="aligncenter wp-image-27548 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble.jpg" alt="Pouring an oaty crumble mixture over rhubarb in a casserole" width="799" height="800" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble.jpg 799w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble-300x300.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble-90x90.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble-768x769.jpg 768w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Covering-parboiled-rhubarb-with-crumble-topping-to-make-Irish-rhubarb-crumble-500x500.jpg 500w" sizes="(max-width: 799px) 100vw, 799px" /&gt;</span></noscript></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2284" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2280"><strong data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Next, top the rhubarb filling with the crumbly oat topping.</span></strong></p><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2275"><img alt="Uncooked rhubarb crumble with an oat and flour topping in a casserole before cooking" class="aligncenter wp-image-27552 size-full" data-dcnode-id="2278" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking-300x215.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking-768x549.jpg 768w" height="572" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20572'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">&lt;img class="aligncenter wp-image-27552 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking.jpg" alt="Uncooked rhubarb crumble with an oat and flour topping in a casserole before cooking" width="800" height="572" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking-300x215.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-rhubarb-crumble-in-a-casserole-ready-for-baking-768x549.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2271"><strong data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Use the back of a spoon to flatten the crumble to completely cover the rhubarb layer.</span></strong></p><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">For Irish crumble desserts the filling is completely covered with the crumbly topping, unlike American cobblers where the topping can be intermittently spaced over the filling to allow the fruit layer to be seen.</span></p><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2264"><strong data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Bake it in the pre-heated oven for 20 minutes until the top is golden brown.</span></strong></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2259"><img alt="A rhubarb crumble fresh out of the oven with dishcloths to hold the hot surfaces." class="aligncenter wp-image-27549 size-full" data-dcnode-id="2262" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven-300x215.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven-768x549.jpg 768w" height="572" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20572'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">&lt;img class="aligncenter wp-image-27549 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven.jpg" alt="A rhubarb crumble fresh out of the oven with dishcloths to hold the hot surfaces." width="800" height="572" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven-300x215.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/Rhubarb-crumble-removed-from-the-oven-768x549.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2255"><strong data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Cool slightly before serving.</span></strong></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">The rhubarb juice will be very hot, so don't serve it too quickly or you'll burn your tongue.</span></p><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2247"><img alt="A serving of rhubarb crumble in a white bowl beside a casserole dish with a serving of crumble removed" class="aligncenter wp-image-27551 size-full" data-dcnode-id="2250" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble.jpg" data-lazy-srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble-300x214.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble-768x548.jpg 768w" height="571" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20571'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">&lt;img class="aligncenter wp-image-27551 size-full" src="https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble.jpg" alt="A serving of rhubarb crumble in a white bowl beside a casserole dish with a serving of crumble removed" width="800" height="571" srcset="https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble.jpg 800w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble-300x214.jpg 300w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble-90x64.jpg 90w, https://www.irishamericanmom.com/wp-content/uploads/2020/04/A-serving-of-rhubarb-crumble-in-a-bowl-beside-a-freshly-baked-rhubarb-crumble-768x548.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2243"><strong data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Serve warm, making sure each serving has plenty rhubarb and crumble.</span></strong></p><span data-dcnode-id="2242" instrument_node="">

</span><p data-dcnode-id="2229"><span data-dcnode-id="2233" instrument_node="">If you don't have ready made custard and don't feel like </span><a data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishamericanmom.com/egg-custard-sauce/"><span data-dcnode-id="2232" instrument_node="">making it from scratch</span></a><span data-dcnode-id="2230" instrument_node="">, this dessert is also delicious with a dollop of ice cream, or whipped heavy cream. I've even been known to eat a bowl or two with no custard or cream - that's my skinny bowl of crumble (I don't think such a thing exists.)</span></p><span data-dcnode-id="2228" instrument_node="">

</span><span class="comment-author-name" data-dcnode-id="1245" itemprop="name"><span data-dcnode-id="1246" instrument_node="">Terry Johnson</span></span><span data-dcnode-id="1244" instrument_node=""> </span></p><span data-dcnode-id="1242" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="1239"><time class="comment-time" data-dcnode-id="1240" datetime="2020-04-27T22:44:02-05:00" itemprop="datePublished"><span data-dcnode-id="1241" instrument_node="">April 27, 2020 at 10:44 pm</span></time></p><span data-dcnode-id="1238" instrument_node=""> </span></header><span data-dcnode-id="1236" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1225" itemprop="text"><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Ah, rhubarb, IAM. Thanks for sharing the rhubarb recipe. It's good to know the culture of rhubarb is observed in Ireland. We have observed it on our slim acre for years. As one who cultivates the tangy stalk, I'm always on the alert for rhubarb recipes. It is a spring tradition here to celebrate the season and the welcome pucker of fresh rhubarb with my two grandsons. We wander out to the rhubarb patch, and I cut a stalk or two, remove the showy leaves, peel the stalk and then grandsons and I sit in the grass and have a "rhubarb picnic." Both boys love the sour juice, as does their grandad. </span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Strawberry/rhubarb pie is our favorite  rhubarb recipe. Also, strawberry rhubarb sauce..great on vanilla ice cream. Our answer to your "crumble" recipe is rhubarb crisp. I make a point of taking ten or twenty pounds of spring's first crop to our local foodbank for others to enjoy. Can't imagine a vegetable garden without a rhubarb plant.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Now that we're all twiddling our thumbs "sheltering in," I wrote a rhubarb post for my blog, The Valley Ripple (6/28/2010) in which I share an interesting rhubarb experience ("A Rhubarb over Rhubarb") and thought you might be enjoy the piece. Thanks for sharing a gustatory rite of spring with your readers. TMJ</span></p><span data-dcnode-id="1226" instrument_node="">
</span></div><span data-dcnode-id="1224" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="1221"><a aria-label="Reply to Terry Johnson" class="comment-reply-link" data-belowelement="article-comment-328187" data-commentid="328187" data-dcnode-id="1222" data-postid="27536" data-replyto="Reply to Terry Johnson" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishamericanmom.com/rhubarb-crumble/%3Freplytocom%3D328187%23respond" rel="nofollow"><span data-dcnode-id="1223" instrument_node="">Reply</span></a></div><span data-dcnode-id="1220" instrument_node="">

</span><p data-dcnode-id="1195"><span data-dcnode-id="1200" instrument_node="">Hi Terry - Lovely to hear you too are a rhubarb fan. I grew up eating rhubarb all through the spring and summer months in Ireland. There we don't add strawberries like in America, but I agree that they are a perfect pairing. The tartness of rhubarb reminds me of summer. I love custard with stewed rhubarb (no fancy compôte in my house). I even spread it on wholewheat bread, like a jam. Just delicious and perfect with a hint of ginger in the stewed rhubarb.</span><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">
All the best, and thanks for stopping by to share your rhubarb tales.</span><br data-dcnode-id="1197"><span data-dcnode-id="1196" instrument_node="">
Mairéad</span></p><span data-dcnode-id="1194" instrument_node="">
