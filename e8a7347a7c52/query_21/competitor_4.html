</span><h3 data-dcnode-id="1449"><span data-dcnode-id="1450" itemprop="alternativeHeadline"><a class="bookmark" data-dcnode-id="1452" name="Overview"></a><span data-dcnode-id="1451" instrument_node="">Overview</span></span></h3><span data-dcnode-id="1448" instrument_node="">
</span></div><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Rhubarb is a plant. The root and underground stem (rhizome) are used to make medicine.</span></p><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">

Rhubarb is used primarily for digestive complaints including constipation, diarrhea, heartburn, stomach pain, gastrointestinal (GI) bleeding, and preparation for certain GI diagnostic procedures. Some people use rhubarb so they have to strain less during bowel movements; this reduces pain from hemorrhoids or tears in the skin lining the anal canal (anal fissures).</span></p><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">

Rhubarb is sometimes applied to the skin to treat cold sores.</span></p><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">

In food, rhubarb stems are eaten in pie and other recipes. Rhubarb is also used as a flavoring agent.</span></p><h4 data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">How does it work?</span></h4><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Rhubarb contains several chemicals which might help heal cold sores.</span></p><span data-dcnode-id="1432" instrument_node="">
</span></div><span data-dcnode-id="1430" instrument_node="">
</span></div><span data-dcnode-id="1428" instrument_node="">

</span><h3 data-dcnode-id="1396"><span data-dcnode-id="1397" itemprop="alternativeHeadline"><a class="bookmark" data-dcnode-id="1399" name="UsesAndEffectiveness"></a><span data-dcnode-id="1398" instrument_node="">Uses &amp; Effectiveness</span></span></h3><span data-dcnode-id="1395" instrument_node="">
</span></div><span data-dcnode-id="1393" instrument_node="">
</span><h4 data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Possibly Effective for...</span></h4><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1389"></p><ul data-dcnode-id="1370"><li data-dcnode-id="1385"><b data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Stomach bleeding</span></b><span data-dcnode-id="1386" instrument_node="">. Taking rhubarb by mouth as a powder or extract seems to help treat stomach bleeding.</span></li><span data-dcnode-id="1384" instrument_node="">
</span><li data-dcnode-id="1377"><b data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Cold sores</span></b><span data-dcnode-id="1381" instrument_node="">. Applying rhubarb along with sage to herpes cold sores seems to improve healing. It might be as effective as acyclovir (</span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/zovirax-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1380" instrument_node="">Zovirax</span></a><span data-dcnode-id="1378" instrument_node="">) cream.</span></li><span data-dcnode-id="1376" instrument_node="">
</span><li data-dcnode-id="1372"><b data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Kidney failure</span></b><span data-dcnode-id="1373" instrument_node="">. Most research suggests that taking rhubarb extract, with or without captopril, improves kidney function in people with kidney failure.</span></li><span data-dcnode-id="1371" instrument_node="">
</span></ul><p data-dcnode-id="1369"></p><span data-dcnode-id="1368" instrument_node="">
</span><h4 data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Insufficient Evidence to Rate Effectiveness for...</span></h4><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1364"></p><ul data-dcnode-id="1283"><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1359"><b data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Constipation</span></b><span data-dcnode-id="1360" instrument_node="">. Early research suggests that taking rhubarb and Glauber's salt mixture improves constipation.</span></li><span data-dcnode-id="1358" instrument_node="">
</span><li data-dcnode-id="1354"><b data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Gum disease</span></b><span data-dcnode-id="1355" instrument_node="">. Early research suggests that rinsing with a rhubarb extract can help treat gum disease.</span></li><span data-dcnode-id="1353" instrument_node="">
</span><li data-dcnode-id="1349"><b data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Gonorrhea</span></b><span data-dcnode-id="1350" instrument_node="">. Early research suggests that taking tablets that contain rhubarb extract might reduce symptoms of gonorrhea.</span></li><span data-dcnode-id="1348" instrument_node="">
</span><li data-dcnode-id="1344"><b data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">High cholesterol</span></b><span data-dcnode-id="1345" instrument_node="">. Early research suggests that taking rhubarb, alone or with water plantain, can reduce total cholesterol and low-density lipoprotein (LDL or "bad") cholesterol in people with high cholesterol.</span></li><span data-dcnode-id="1343" instrument_node="">
</span><li data-dcnode-id="1339"><b data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Cancer affecting the area behind the nose (nasopharyngeal cancer)</span></b><span data-dcnode-id="1340" instrument_node="">. Early research suggests that taking a specific product containing rhubarb and other herbs (Shenlong) along with radiation therapy does not improve healing in people with nasopharyngeal cancer.</span></li><span data-dcnode-id="1338" instrument_node="">
</span><li data-dcnode-id="1334"><b data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Kidney disease (nephritic syndrome)</span></b><span data-dcnode-id="1335" instrument_node="">. Early research suggests that taking a combination of 10 herbs including rhubarb daily for 3 months might improve kidney function in people with glomerulonephritis.</span></li><span data-dcnode-id="1333" instrument_node="">
</span><li data-dcnode-id="1329"><b data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Nonalcoholic fatty liver disease (NAFLD)</span></b><span data-dcnode-id="1330" instrument_node="">. Early research suggests that taking a specific Chinese herbal medicine containing rhubarb, giant knotweed, dried green orange peel, and dried old orange peel (Danning Pian) might improve liver function in people with non-alcoholic fatty liver disease.</span></li><span data-dcnode-id="1328" instrument_node="">
</span><li data-dcnode-id="1324"><b data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Obesity</span></b><span data-dcnode-id="1325" instrument_node="">. Some early research suggests that taking rhubarb extract 1-3 times daily for up to 3 months might reduce body weight in obese people. However, other research shows that taking rhubarb with other herbs does not reduce weight.</span></li><span data-dcnode-id="1323" instrument_node="">
</span><li data-dcnode-id="1319"><b data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">High blood pressure during pregnancy</span></b><span data-dcnode-id="1320" instrument_node="">. Early research shows that taking rhubarb extract daily starting 28 weeks into pregnancy and continuing until delivery can reduce the risk of high blood pressure during pregnancy.</span></li><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1314"><b data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Life-threatening infection (sepsis)</span></b><span data-dcnode-id="1315" instrument_node="">. Early research suggests that taking rhubarb powder along with standard treatments might help cure and reduce the risk of death from a life-threatening infection called sepsis.</span></li><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1309"><b data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Recovery after surgery</span></b><span data-dcnode-id="1310" instrument_node="">. Early research suggests that adding rhubarb to intravenous (IV) nutrition in people undergoing surgery for stomach cancer can improve recovery.</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1304"><b data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Indigestion</span></b><span data-dcnode-id="1305" instrument_node="">.</span></li><span data-dcnode-id="1303" instrument_node="">
</span><li data-dcnode-id="1299"><b data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Stomach pain</span></b><span data-dcnode-id="1300" instrument_node="">.</span></li><span data-dcnode-id="1298" instrument_node="">
</span><li data-dcnode-id="1294"><b data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Hemorrhoids</span></b><span data-dcnode-id="1295" instrument_node="">.</span></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1289"><b data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Diarrhea</span></b><span data-dcnode-id="1290" instrument_node="">.</span></li><span data-dcnode-id="1288" instrument_node="">
</span><li data-dcnode-id="1284"><b data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Other conditions</span></b><span data-dcnode-id="1285" instrument_node="">.</span></li></ul><span data-dcnode-id="1282" instrument_node="">

More evidence is needed to rate the effectiveness of rhubarb for these uses.</span><p data-dcnode-id="1281"></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1275"><font data-dcnode-id="1276" size="-2"><span data-dcnode-id="1279" instrument_node="">Natural Medicines Comprehensive Database rates effectiveness based on scientific evidence according to the following scale: Effective, Likely Effective, Possibly Effective, Possibly Ineffective, Likely Ineffective, and Insufficient Evidence to Rate </span><a data-dcnode-id="1277" href="#" onclick="NewWindowOpenMenu('https://www.rxlist.com/htmlmsg/natural-medicines.htm', 400, 400);return false;"><span data-dcnode-id="1278" instrument_node="">(detailed description of each of the ratings).</span></a></font></p><span data-dcnode-id="1274" instrument_node="">
</span></div><span data-dcnode-id="1272" instrument_node="">
</span></div><span data-dcnode-id="1270" instrument_node="">
</span></section><span data-dcnode-id="1268" instrument_node="">
</span><section class="pageSection" data-dcnode-id="1216"><span data-dcnode-id="1267" instrument_node="">
</span><div class="apPage" data-dcnode-id="1240" id="apPage"><span data-dcnode-id="1266" instrument_node="">
</span><div class="pgContent" data-dcnode-id="1242"><span data-dcnode-id="1265" instrument_node="">
</span><div data-dcnode-id="1258" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1264" instrument_node="">
</span><h3 data-dcnode-id="1260"><span data-dcnode-id="1261" itemprop="alternativeHeadline"><a class="bookmark" data-dcnode-id="1263" name="SideEffects"></a><span data-dcnode-id="1262" instrument_node="">Side Effects</span></span></h3><span data-dcnode-id="1259" instrument_node="">
</span></div><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1256" instrument_node="">Rhubarb is </span><b data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">LIKELY SAFE</span></b><span data-dcnode-id="1253" instrument_node=""> when the root is consumed as food. It is </span><b data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">POSSIBLY SAFE</span></b><span data-dcnode-id="1250" instrument_node=""> for most adults when taken by mouth in medicinal amounts for up to 3 months.</span></p><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">

Rhubarb can cause some side effects such as stomach and intestinal pain, watery diarrhea, and uterine contractions. Long-term use can result in muscular weakness, bone loss, potassium loss, and irregular heart rhythm.</span></p><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">


There is a report of kidney failure in someone who took a product containing rhubarb. But it's not known for sure if rhubarb was the actual cause of kidney failure.</span></p><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">
</span></p></div><span data-dcnode-id="1241" instrument_node="">

</span><div class="pgContent" data-dcnode-id="1162"><span data-dcnode-id="1212" instrument_node="">
</span><div data-dcnode-id="1205" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1211" instrument_node="">
</span><h3 data-dcnode-id="1207"><span data-dcnode-id="1208" itemprop="alternativeHeadline"><a class="bookmark" data-dcnode-id="1210" name="SpecialPrecautionsWarnings"></a><span data-dcnode-id="1209" instrument_node="">Special Precautions &amp; Warnings</span></span></h3><span data-dcnode-id="1206" instrument_node="">
</span></div><span data-dcnode-id="1204" instrument_node="">
</span><b data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Children</span></b><span data-dcnode-id="1201" instrument_node="">: Rhubarb is </span><b data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">POSSIBLY UNSAFE</span></b><span data-dcnode-id="1198" instrument_node=""> for children. There is one report of a 4-year-old who ate rhubarb leaves and died. Rhubarb leaves contain a lot of oxalic acid, which can be deadly if taken in large enough doses. Because of their small size, children are at highest risk for oxalic poisoning after eating rhubarb leaves.</span><p data-dcnode-id="1197"></p><p data-dcnode-id="1189"><span data-dcnode-id="1196" instrument_node="">
</span><b data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Pregnancy and breast-feeding</span></b><span data-dcnode-id="1193" instrument_node="">: Rhubarb is </span><b data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">POSSIBLY UNSAFE</span></b><span data-dcnode-id="1190" instrument_node=""> when used in amounts greater than those found in foods.</span></p><p data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">
</span><b data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Diarrhea or constipation</span></b><span data-dcnode-id="1185" instrument_node="">: Rhubarb can make diarrhea or constipation worse, depending on the preparation used.</span></p><p data-dcnode-id="1179"><span data-dcnode-id="1183" instrument_node="">
</span><b data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Gastrointestinal (GI) conditions</span></b><span data-dcnode-id="1180" instrument_node="">: Don't take rhubarb if you have a bowel obstruction; appendicitis; unexplained stomach pain; or inflammatory conditions of the intestines including Crohn's disease, colitis, and irritable bowel syndrome (IBS).</span></p><p data-dcnode-id="1174"><span data-dcnode-id="1178" instrument_node="">
</span><b data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Kidney disease</span></b><span data-dcnode-id="1175" instrument_node="">: There is a chemical in rhubarb that might harm the kidneys. In fact, a supplement that contained rhubarb has been linked to one report of kidney failure. If you already have kidney disease, don't risk making it worse by taking rhubarb.</span></p><p data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">
</span><b data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Kidney stones</span></b><span data-dcnode-id="1170" instrument_node="">: Rhubarb contains a chemical that the body can convert into kidney stones. If you have ever had kidney stones, don't take rhubarb.</span></p><p data-dcnode-id="1164"><span data-dcnode-id="1168" instrument_node="">
</span><b data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Liver problems</span></b><span data-dcnode-id="1165" instrument_node="">: Rhubarb can make liver function worse in people who already have liver problems. People who have liver problems should avoid rhubarb.</span></p><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1161" instrument_node="">
</span></div><span data-dcnode-id="1159" instrument_node="">

</span><section class="pageSection" data-dcnode-id="884"><span data-dcnode-id="1156" instrument_node="">
</span><div class="apPage" data-dcnode-id="890" id="apPage"><span data-dcnode-id="1155" instrument_node="">
</span><div class="pgContent" data-dcnode-id="892"><span data-dcnode-id="1154" instrument_node="">
</span><div data-dcnode-id="1147" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1153" instrument_node="">
</span><h3 data-dcnode-id="1149"><span data-dcnode-id="1150" itemprop="alternativeHeadline"><a class="bookmark" data-dcnode-id="1152" name="Interactions"></a><span data-dcnode-id="1151" instrument_node="">Interactions</span></span></h3><span data-dcnode-id="1148" instrument_node="">
</span></div><span data-dcnode-id="1146" instrument_node="">
</span><hr data-dcnode-id="1145"><span data-dcnode-id="1144" instrument_node="">
</span><b data-dcnode-id="1139"><span data-dcnode-id="1143" instrument_node="">Digoxin (</span><a data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/lanoxin-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1142" instrument_node="">Lanoxin</span></a><span data-dcnode-id="1140" instrument_node="">)</span></b><span data-dcnode-id="1138" instrument_node="">Interaction Rating: </span><b data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Moderate</span></b><span data-dcnode-id="1135" instrument_node=""> Be cautious with this combination.Talk with your health provider.</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Rhubarb is a type of laxative called a stimulant laxative. Stimulant laxatives can decrease potassium levels in the body. Low potassium levels can increase the risk of side effects of digoxin (Lanoxin).</span></p><hr data-dcnode-id="1132"><span data-dcnode-id="1131" instrument_node="">
</span><b data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Medications for inflammation (Corticosteroids)</span></b><span data-dcnode-id="1128" instrument_node="">Interaction Rating: </span><b data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Moderate</span></b><span data-dcnode-id="1125" instrument_node=""> Be cautious with this combination.Talk with your health provider.</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Some medications for inflammation can decrease potassium in the body. Rhubarb is a type of laxative that might also decrease potassium in the body. Taking rhubarb along with some medications for inflammation might decrease potassium in the body too much.</span></p><p data-dcnode-id="1100"><span data-dcnode-id="1122" instrument_node="">

Some medications for inflammation include </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/dexamethasone-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1121" instrument_node="">dexamethasone</span></a><span data-dcnode-id="1119" instrument_node=""> (</span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/decadron-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1118" instrument_node="">Decadron</span></a><span data-dcnode-id="1116" instrument_node="">), </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/hydrocortisone-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1115" instrument_node="">hydrocortisone</span></a><span data-dcnode-id="1113" instrument_node=""> (</span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/cortef-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1112" instrument_node="">Cortef</span></a><span data-dcnode-id="1110" instrument_node="">), methylprednisolone (</span><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/medrol-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1109" instrument_node="">Medrol</span></a><span data-dcnode-id="1107" instrument_node="">), </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/prednisone-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1106" instrument_node="">prednisone</span></a><span data-dcnode-id="1104" instrument_node=""> (</span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/deltasone-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1103" instrument_node="">Deltasone</span></a><span data-dcnode-id="1101" instrument_node="">), and others.</span></p><hr data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">
</span><b data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Medications taken by mouth (Oral drugs)</span></b><span data-dcnode-id="1095" instrument_node="">Interaction Rating: </span><b data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Moderate</span></b><span data-dcnode-id="1092" instrument_node=""> Be cautious with this combination.Talk with your health provider.</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Rhubarb is a laxative. Laxatives can decrease how much medicine your body absorbs. Decreasing how much medicine your body absorbs can decrease the effectiveness of your medication.</span></p><hr data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">
</span><b data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Medications that can harm the kidneys (Nephrotoxic drugs)</span></b><span data-dcnode-id="1085" instrument_node="">Interaction Rating: </span><b data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Moderate</span></b><span data-dcnode-id="1082" instrument_node=""> Be cautious with this combination.Talk with your health provider.</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Taking rhubarb might harm the kidneys in some people. Some medications can also harm the kidneys. Taking rhubarb with medications that can harm the kidneys might increase the chance of kidney damage.</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1079" instrument_node="">

Some of these medications that can harm the kidneys include cyclosporine (</span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/neoral-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1078" instrument_node="">Neoral</span></a><span data-dcnode-id="1076" instrument_node="">, </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/sandimmune-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1075" instrument_node="">Sandimmune</span></a><span data-dcnode-id="1073" instrument_node="">); aminoglycosides including amikacin (</span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/amikin-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1072" instrument_node="">Amikin</span></a><span data-dcnode-id="1070" instrument_node="">), gentamicin (Garamycin, </span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/gentak-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1069" instrument_node="">Gentak</span></a><span data-dcnode-id="1067" instrument_node="">, others), and tobramycin (Nebcin, others); nonsteroidal anti-inflammatory drugs (NSAIDs) including </span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/ibuprofen-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1066" instrument_node="">ibuprofen</span></a><span data-dcnode-id="1064" instrument_node=""> (Advil, Motrin, Nuprin, others), indomethacin (</span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/indocin-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1063" instrument_node="">Indocin</span></a><span data-dcnode-id="1061" instrument_node="">), naproxen (Aleve, Anaprox, </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/naprelan-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1060" instrument_node="">Naprelan</span></a><span data-dcnode-id="1058" instrument_node="">, </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/naprosyn-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1057" instrument_node="">Naprosyn</span></a><span data-dcnode-id="1055" instrument_node="">), piroxicam (</span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/feldene-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1054" instrument_node="">Feldene</span></a><span data-dcnode-id="1052" instrument_node="">); and numerous others.</span></p><hr data-dcnode-id="1050"><span data-dcnode-id="1049" instrument_node="">
</span><b data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Medications that can harm the liver (Hepatotoxic drugs)</span></b><span data-dcnode-id="1046" instrument_node="">Interaction Rating: </span><b data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Moderate</span></b><span data-dcnode-id="1043" instrument_node=""> Be cautious with this combination.Talk with your health provider.</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Rhubarb might harm the liver. Taking rhubarb along with medication that might also harm the liver can increase the risk of liver damage. Do not take rhubarb if you are taking a medication that can harm the liver.</span></p><p data-dcnode-id="946"><span data-dcnode-id="1040" instrument_node="">

Some medications that can harm the liver include acarbose (</span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/precose-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1039" instrument_node="">Precose</span></a><span data-dcnode-id="1037" instrument_node="">, Prandase), amiodarone (</span><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/cordarone-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1036" instrument_node="">Cordarone</span></a><span data-dcnode-id="1034" instrument_node="">), atorvastatin (</span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/lipitor-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1033" instrument_node="">Lipitor</span></a><span data-dcnode-id="1031" instrument_node="">), azathioprine (</span><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/imuran-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1030" instrument_node="">Imuran</span></a><span data-dcnode-id="1028" instrument_node="">), carbamazepine (</span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/tegretol-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1027" instrument_node="">Tegretol</span></a><span data-dcnode-id="1025" instrument_node="">), cerivastatin (</span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/baycol-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1024" instrument_node="">Baycol</span></a><span data-dcnode-id="1022" instrument_node="">), diclofenac (</span><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/voltaren-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1021" instrument_node="">Voltaren</span></a><span data-dcnode-id="1019" instrument_node="">), felbamate (</span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/felbatol-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1018" instrument_node="">Felbatol</span></a><span data-dcnode-id="1016" instrument_node="">), </span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/fenofibrate-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1015" instrument_node="">fenofibrate</span></a><span data-dcnode-id="1013" instrument_node=""> (</span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/tricor-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1012" instrument_node="">Tricor</span></a><span data-dcnode-id="1010" instrument_node="">), fluvastatin (</span><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/lescol-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1009" instrument_node="">Lescol</span></a><span data-dcnode-id="1007" instrument_node="">), gemfibrozil (</span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/lopid-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1006" instrument_node="">Lopid</span></a><span data-dcnode-id="1004" instrument_node="">), </span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/isoniazid-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1003" instrument_node="">isoniazid</span></a><span data-dcnode-id="1001" instrument_node="">, itraconazole, (</span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/sporanox-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="1000" instrument_node="">Sporanox</span></a><span data-dcnode-id="998" instrument_node="">), ketoconazole (</span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/nizoral-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="997" instrument_node="">Nizoral</span></a><span data-dcnode-id="995" instrument_node="">), leflunomide (</span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/arava-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="994" instrument_node="">Arava</span></a><span data-dcnode-id="992" instrument_node="">), lovastatin (</span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/mevacor-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="991" instrument_node="">Mevacor</span></a><span data-dcnode-id="989" instrument_node="">), methotrexate (</span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/rheumatrex-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="988" instrument_node="">Rheumatrex</span></a><span data-dcnode-id="986" instrument_node="">), nevirapine (</span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/viramune-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="985" instrument_node="">Viramune</span></a><span data-dcnode-id="983" instrument_node="">), niacin, nitrofurantoin (</span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/macrodantin-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="982" instrument_node="">Macrodantin</span></a><span data-dcnode-id="980" instrument_node="">), pioglitazone (</span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/actos-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="979" instrument_node="">Actos</span></a><span data-dcnode-id="977" instrument_node="">), pravastatin (</span><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/pravachol-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="976" instrument_node="">Pravachol</span></a><span data-dcnode-id="974" instrument_node="">), </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/pyrazinamide-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="973" instrument_node="">pyrazinamide</span></a><span data-dcnode-id="971" instrument_node="">, rifampin (</span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/rifadin-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="970" instrument_node="">Rifadin</span></a><span data-dcnode-id="968" instrument_node="">), ritonavir (</span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/norvir-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="967" instrument_node="">Norvir</span></a><span data-dcnode-id="965" instrument_node="">), rosiglitazone (</span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/avandia-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="964" instrument_node="">Avandia</span></a><span data-dcnode-id="962" instrument_node="">), </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/simvastatin-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="961" instrument_node="">simvastatin</span></a><span data-dcnode-id="959" instrument_node=""> (</span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/zocor-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="958" instrument_node="">Zocor</span></a><span data-dcnode-id="956" instrument_node="">), tacrine (</span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/cognex-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="955" instrument_node="">Cognex</span></a><span data-dcnode-id="953" instrument_node="">), tamoxifen, terbinafine (</span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/lamisil-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="952" instrument_node="">Lamisil</span></a><span data-dcnode-id="950" instrument_node="">), valproic acid, and zileuton (</span><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/zyflo-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="949" instrument_node="">Zyflo</span></a><span data-dcnode-id="947" instrument_node="">).</span></p><hr data-dcnode-id="945"><span data-dcnode-id="944" instrument_node="">
</span><b data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Stimulant laxatives</span></b><span data-dcnode-id="941" instrument_node="">Interaction Rating: </span><b data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Moderate</span></b><span data-dcnode-id="938" instrument_node=""> Be cautious with this combination.Talk with your health provider.</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Rhubarb is a type of laxative called a stimulant laxative. Stimulant laxatives speed up the bowels. Taking rhubarb along with other stimulant laxatives could speed up the bowels too much and cause dehydration and low minerals in the body.</span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">

Some stimulant laxatives include bisacodyl (Correctol, Dulcolax), cascara, castor oil (Purge), senna (Senokot), and others.</span></p><hr data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">
</span><b data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">Warfarin (</span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/coumadin-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="930" instrument_node="">Coumadin</span></a><span data-dcnode-id="928" instrument_node="">)</span></b><span data-dcnode-id="926" instrument_node="">Interaction Rating: </span><b data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Moderate</span></b><span data-dcnode-id="923" instrument_node=""> Be cautious with this combination.Talk with your health provider.</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Rhubarb can work as a laxative. In some people, rhubarb can cause diarrhea. Diarrhea can increase the effects of warfarin and increase the risk of bleeding. If you take warfarin, do not take excessive amounts of rhubarb.</span></p><hr data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
</span><b data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Water pills (Diuretic drugs)</span></b><span data-dcnode-id="916" instrument_node="">Interaction Rating: </span><b data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Moderate</span></b><span data-dcnode-id="913" instrument_node=""> Be cautious with this combination.Talk with your health provider.</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Rhubarb is a laxative. Some laxatives can decrease potassium in the body. "Water pills" can also decrease potassium in the body. Taking rhubarb along with "water pills" might decrease potassium in the body too much.</span></p><p data-dcnode-id="894"><span data-dcnode-id="910" instrument_node="">

Some "water pills" that can decrease potassium include chlorothiazide (</span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/diuril-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="909" instrument_node="">Diuril</span></a><span data-dcnode-id="907" instrument_node="">), chlorthalidone (</span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/thalitone-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="906" instrument_node="">Thalitone</span></a><span data-dcnode-id="904" instrument_node="">), </span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/furosemide-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="903" instrument_node="">furosemide</span></a><span data-dcnode-id="901" instrument_node=""> (</span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/lasix-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="900" instrument_node="">Lasix</span></a><span data-dcnode-id="898" instrument_node="">), hydrochlorothiazide (HCTZ, HydroDiuril, </span><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/microzide-drug.htm" onclick="wmdTrack('embd-lnk');" rel="rx-desc"><span data-dcnode-id="897" instrument_node="">Microzide</span></a><span data-dcnode-id="895" instrument_node="">), and others.</span></p><span data-dcnode-id="893" instrument_node="">

</span><b data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">APPLIED TO THE SKIN</span></b><span data-dcnode-id="866" instrument_node="">:
