</span><div class="comp structured-content article-content expert-content right-rail__offset lock-journey health-sc-page mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1231" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[400, 1400, 1400, 1700, 2000, 2200, 2400, 2600, 2800]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="60" id="health-sc-page_1-0"><span data-dcnode-id="1710" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1705" id="mntl-sc-block_1-0"><span data-dcnode-id="1709" instrument_node="">
Rhubarb is a tart "fruit" and is usually consumed in recipes. The perennial plant is a member of the&nbsp;</span><em data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Polygonaceae</span></em><span data-dcnode-id="1706" instrument_node="">&nbsp;family and is widely grown outside and in hot greenhouses (hothouses).
</span></p><span data-dcnode-id="1704" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1703" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1702" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1697" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1701" instrument_node="">
Technically rhubarb is a vegetable, although it is generally referred to as a fruit because it is used either with fruit or interchangeably with fruit in recipes. Rhubarb pie, rhubarb crisp, rhubarb jams, and even rhubarb-flavored beverages are popular uses. But it is important that only the stalk is used when cooking. Rhubarb leaves contain toxins that are poisonous.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1699" data-id="#citation-10"><span data-dcnode-id="1700" instrument_node="">1</span></span><span data-dcnode-id="1698" instrument_node="">﻿
</span></p><span data-dcnode-id="1696" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1695" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="1694" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1692" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1693" instrument_node="">
Rhubarb can be a healthy addition to your diet because it is naturally low in sugar and high in fiber. Many recipes that include rhubarb are desserts and can sometimes be high in sugar. If you are following an eating plan that monitors sugar or carbohydrates, it is important to examine recipes before preparation.
</span></p><span data-dcnode-id="1691" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1683" id="mntl-sc-block_1-0-5"><div class="comp mntl-native" data-dcnode-id="1684" data-right-rail-index="1" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="1690" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1681" id="toc-rhubarb-nutrition-facts"></span><span data-dcnode-id="1680" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1675" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1679" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node=""> Rhubarb Nutrition Facts </span></span><span data-dcnode-id="1676" instrument_node=""> </span></h2><span data-dcnode-id="1674" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1669" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1673" instrument_node="">
The following nutrition information is provided by the USDA&nbsp;for one cup&nbsp;(122g) of diced rhubarb.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1671" data-id="#citation-9"><span data-dcnode-id="1672" instrument_node="">2</span></span><span data-dcnode-id="1670" instrument_node="">
</span></p><span data-dcnode-id="1668" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1667" id="mntl-sc-block_1-0-8"></div><span data-dcnode-id="1666" instrument_node="">
</span><div class="comp theme-explainer mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1611" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-10"><span data-dcnode-id="1665" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1613" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1664" instrument_node="">
</span><ul data-dcnode-id="1614"><li data-dcnode-id="1657"><strong data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Calories</span></strong><span data-dcnode-id="1661" instrument_node="">:</span><strong data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1658" instrument_node="">26</span></li><li data-dcnode-id="1650"><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Fat</span></strong><span data-dcnode-id="1654" instrument_node="">:</span><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1651" instrument_node="">0.2g</span></li><li data-dcnode-id="1643"><strong data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Sodium</span></strong><span data-dcnode-id="1647" instrument_node="">:</span><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1644" instrument_node="">5mg</span></li><li data-dcnode-id="1636"><strong data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Carbohydrates</span></strong><span data-dcnode-id="1640" instrument_node="">:</span><strong data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1637" instrument_node="">5.5g</span></li><li data-dcnode-id="1629"><strong data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Fiber</span></strong><span data-dcnode-id="1633" instrument_node="">:</span><strong data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1630" instrument_node="">2.2g</span></li><li data-dcnode-id="1622"><strong data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Sugars</span></strong><span data-dcnode-id="1626" instrument_node="">:</span><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1623" instrument_node="">1.3g</span></li><li data-dcnode-id="1615"><strong data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Protein</span></strong><span data-dcnode-id="1619" instrument_node="">:</span><strong data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1616" instrument_node="">1g</span></li></ul></div><span data-dcnode-id="1612" instrument_node="">
</span></div><span data-dcnode-id="1610" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1605" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1609" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node=""> Carbs </span></span><span data-dcnode-id="1606" instrument_node=""> </span></h3><span data-dcnode-id="1604" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1602" id="mntl-sc-block_1-0-13"><span data-dcnode-id="1603" instrument_node="">
Most of the calories in rhubarb come from complex carbohydrates. There are about 5 grams of carbohydrate in a one cup serving, nearly half (2.2 grams) of the carbohydrates come from fiber.
</span></p><span data-dcnode-id="1601" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1600" id="mntl-sc-block_1-0-14"></div><span data-dcnode-id="1599" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1594" id="mntl-sc-block_1-0-15"><span data-dcnode-id="1598" instrument_node="">
You'll also get 1.3 grams of naturally-occurring sugar in a cup of rhubarb. While many of us try to limit our sugar intake, sugars that occur naturally in food are better for your body than those that are added during processing (called </span><a data-component="link" data-dcnode-id="1596" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/find-foods-with-added-sugar-3495474" rel="noopener noreferrer"><span data-dcnode-id="1597" instrument_node="">"added sugars"</span></a><span data-dcnode-id="1595" instrument_node="">)&nbsp;because they come packaged with other important nutrients.
</span></p><span data-dcnode-id="1593" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1592" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="1591" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1589" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1590" instrument_node="">
The glycemic load of rhubarb is low, (anything less than 10 is considered to be low) which means it won't raise your blood sugar quickly. One cup of diced rhubarb is estimated to be 2, while one medium rhubarb stalk is (just over two ounces) is estimated to be 1.
</span></p><span data-dcnode-id="1588" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1587" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="1586" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1581" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1585" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node=""> Fats </span></span><span data-dcnode-id="1582" instrument_node=""> </span></h3><span data-dcnode-id="1580" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1578" id="mntl-sc-block_1-0-21"><span data-dcnode-id="1579" instrument_node="">
There is almost no fat in rhubarb. The small amount of fat is saturated fat (0.065g), polyunsaturated fat (0.121g), and monounsaturated fat (0.048g). You are not likely to consume enough rhubarb for the fat to have a significant impact on your daily intake.
</span></p><span data-dcnode-id="1577" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1576" id="mntl-sc-block_1-0-22"></div><span data-dcnode-id="1575" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1570" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1574" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node=""> Protein </span></span><span data-dcnode-id="1571" instrument_node=""> </span></h3><span data-dcnode-id="1569" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1567" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1568" instrument_node="">
There is a small amount of protein in rhubarb. You'll gain 1 gram of the macronutrient if you consume a full cup.
</span></p><span data-dcnode-id="1566" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1565" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="1564" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1559" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1563" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node=""> Vitamins and Minerals </span></span><span data-dcnode-id="1560" instrument_node=""> </span></h3><span data-dcnode-id="1558" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1550" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1557" instrument_node="">
Rhubarb is an excellent source of&nbsp;</span><a data-component="link" data-dcnode-id="1555" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/supplements-4157013" rel="noopener noreferrer"><span data-dcnode-id="1556" instrument_node="">vitamin K</span></a><span data-dcnode-id="1554" instrument_node="">, providing at least 40% of your daily needs if you consume a full cup. Rhubarb is also a good source of&nbsp;</span><a data-component="link" data-dcnode-id="1552" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/foods-high-in-vitamin-c-2507745" rel="noopener noreferrer"><span data-dcnode-id="1553" instrument_node="">vitamin C</span></a><span data-dcnode-id="1551" instrument_node="">, providing 11% of the daily value set by the Food and Drug Administration per cup.&nbsp;
</span></p><span data-dcnode-id="1549" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1548" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="1547" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1545" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1546" instrument_node="">
Other vitamins in rhubarb include vitamin A (5% of your daily needs), vitamin E, thiamin, riboflavin, niacin, and folate (2% each). There are smaller amounts of vitamin B6 and pantothenic acid.
</span></p><span data-dcnode-id="1544" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1543" id="mntl-sc-block_1-0-32"></div><span data-dcnode-id="1542" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1531" id="mntl-sc-block_1-0-33"><span data-dcnode-id="1541" instrument_node="">
Minerals in rhubarb include </span><a data-component="link" data-dcnode-id="1539" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/health-benefits-of-potassium-2242225" rel="noopener noreferrer"><span data-dcnode-id="1540" instrument_node="">potassium</span></a><span data-dcnode-id="1538" instrument_node=""> and </span><a data-component="link" data-dcnode-id="1536" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/calcium-requirements-and-dietary-sources-2507093" rel="noopener noreferrer"><span data-dcnode-id="1537" instrument_node="">calcium</span></a><span data-dcnode-id="1535" instrument_node=""> (providing about 8% of your daily needs for each) and </span><a data-component="link" data-dcnode-id="1533" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/manganese-requirements-and-dietary-sources-2507095" rel="noopener noreferrer"><span data-dcnode-id="1534" instrument_node="">manganese</span></a><span data-dcnode-id="1532" instrument_node=""> (at least 10% of adults' needs). There are smaller amounts of magnesium, selenium, phosphorus, zinc, copper, and iron.
</span></p><span data-dcnode-id="1530" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1529" id="mntl-sc-block_1-0-34"></div><span data-dcnode-id="1528" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1527" id="toc-health-benefits"></span><span data-dcnode-id="1526" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1521" id="mntl-sc-block_1-0-35"><span data-dcnode-id="1525" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node=""> Health Benefits </span></span><span data-dcnode-id="1522" instrument_node=""> </span></h2><span data-dcnode-id="1520" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1518" id="mntl-sc-block_1-0-36"><span data-dcnode-id="1519" instrument_node="">
Rhubarb can be a delicious addition to both sweet and savory dishes. Nutrients like fiber and vitamin K found in rhubarb may also offer certain health benefits.
</span></p><span data-dcnode-id="1517" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1516" id="mntl-sc-block_1-0-37"></div><span data-dcnode-id="1515" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1510" id="mntl-sc-block_1-0-39"><span data-dcnode-id="1514" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node=""> May Ease Constipation </span></span><span data-dcnode-id="1511" instrument_node=""> </span></h3><span data-dcnode-id="1509" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1504" id="mntl-sc-block_1-0-40"><span data-dcnode-id="1508" instrument_node="">
Foods with fiber help you to maintain a healthy digestive system. Fiber is known to improve fecal bulking, which means that it helps your body create stools to rid itself of waste.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1506" data-id="#citation-1"><span data-dcnode-id="1507" instrument_node="">3</span></span><span data-dcnode-id="1505" instrument_node="">﻿﻿
</span></p><span data-dcnode-id="1503" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1502" id="mntl-sc-block_1-0-41"></div><span data-dcnode-id="1501" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1496" id="mntl-sc-block_1-0-42"><span data-dcnode-id="1500" instrument_node="">
Studies have also shown that improving your dietary fiber intake can increase stool frequency in people with constipation. In order for fiber to be effective, you need to increase your fluid intake. But authors of one study noted that fiber does not necessarily improve stool consistency, decrease laxative use, or ease painful defecation.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1498" data-id="#citation-2"><span data-dcnode-id="1499" instrument_node="">4</span></span><span data-dcnode-id="1497" instrument_node="">﻿﻿
</span></p><span data-dcnode-id="1495" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1494" id="mntl-sc-block_1-0-43"></div><span data-dcnode-id="1493" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1488" id="mntl-sc-block_1-0-45"><span data-dcnode-id="1492" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node=""> Better Heart Health </span></span><span data-dcnode-id="1489" instrument_node=""> </span></h3><span data-dcnode-id="1487" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1485" id="mntl-sc-block_1-0-46"><span data-dcnode-id="1486" instrument_node="">
The fiber in rhubarb may also help you decrease your risk of cardiovascular disease. Diets rich in fiber may boost heart health by helping the body to maintain healthy cholesterol levels.
</span></p><span data-dcnode-id="1484" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1483" id="mntl-sc-block_1-0-47"></div><span data-dcnode-id="1482" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1477" id="mntl-sc-block_1-0-48"><span data-dcnode-id="1481" instrument_node="">
According to the authors of one research review, dietary fiber helps to regulate food ingestion, digestion, absorption, and metabolism which in turn helps to reduce the risk of hyperlipidemia (high concentration of fat in the blood) and hypercholesterolemia (elevated cholesterol levels).</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1479" data-id="#citation-1"><span data-dcnode-id="1480" instrument_node="">3</span></span><span data-dcnode-id="1478" instrument_node="">﻿ Both of these conditions are considered risk factors for cardiovascular disease.
</span></p><span data-dcnode-id="1476" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1475" id="mntl-sc-block_1-0-49"></div><span data-dcnode-id="1474" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1468" id="mntl-sc-block_1-0-51"><span data-dcnode-id="1473" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1470" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/nutrition-basics-overview-4581855" id="mntl-sc-block-featuredlink__link_1-0"><span class="link__wrapper" data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">9 Healthy Foods to Help Lower Cholesterol</span></span></a><span data-dcnode-id="1469" instrument_node="">
</span></div><span data-dcnode-id="1467" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1466" id="mntl-sc-block_1-0-52"></div><span data-dcnode-id="1465" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1460" id="mntl-sc-block_1-0-54"><span data-dcnode-id="1464" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node=""> Decreased Risk of Colon Cancer </span></span><span data-dcnode-id="1461" instrument_node=""> </span></h3><span data-dcnode-id="1459" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1454" id="mntl-sc-block_1-0-55"><span data-dcnode-id="1458" instrument_node="">
Fiber intake and its effects on various forms of cancer have been the subject of many research studies. Colon cancer is a particular area of interest, with substantial research suggesting that a higher intake of dietary fiber is associated with a lower risk of colon cancer.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1456" data-id="#citation-1"><span data-dcnode-id="1457" instrument_node="">3</span></span><span data-dcnode-id="1455" instrument_node="">﻿
</span></p><span data-dcnode-id="1453" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1452" id="mntl-sc-block_1-0-56"></div><span data-dcnode-id="1451" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1446" id="mntl-sc-block_1-0-57"><span data-dcnode-id="1450" instrument_node="">
Authors of one large prospective study involving more than 76,000 participants concluded that individuals consuming the highest intake of dietary fiber have reduced risks of different types of colon cancer (specifically incident colorectal adenoma and distal colon cancer) and that this effect—particularly from cereals and fruit—may begin early in colorectal carcinogenesis.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1448" data-id="#citation-3"><span data-dcnode-id="1449" instrument_node="">5</span></span><span data-dcnode-id="1447" instrument_node="">﻿
</span></p><span data-dcnode-id="1445" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1444" id="mntl-sc-block_1-0-58"></div><span data-dcnode-id="1443" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1438" id="mntl-sc-block_1-0-60"><span data-dcnode-id="1442" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node=""> Improved Metabolic Health </span></span><span data-dcnode-id="1439" instrument_node=""> </span></h3><span data-dcnode-id="1437" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1432" id="mntl-sc-block_1-0-61"><span data-dcnode-id="1436" instrument_node="">
Epidemiological and clinical studies demonstrate that the intake of dietary fiber is inversely related to metabolic conditions such as obesity and type 2 diabetes.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1434" data-id="#citation-4"><span data-dcnode-id="1435" instrument_node="">6</span></span><span data-dcnode-id="1433" instrument_node="">﻿
</span></p><span data-dcnode-id="1431" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1430" id="mntl-sc-block_1-0-62"></div><span data-dcnode-id="1429" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1421" id="mntl-sc-block_1-0-63"><span data-dcnode-id="1428" instrument_node="">
However, even though some study authors specifically note that dietary fiber benefits include the prevention and treatment of type 2 diabetes,</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1426" data-id="#citation-1"><span data-dcnode-id="1427" instrument_node="">3</span></span><span data-dcnode-id="1425" instrument_node="">﻿ the American Diabetes Association cautions people to take the study results with a grain of salt. They write that many studies promoting the health benefits of fiber for those with diabetes are small and limited in scope. They also report that some studies suggest an intake of more than 50 grams of fiber per day, which is unrealistic for many people.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1423" data-id="#citation-5"><span data-dcnode-id="1424" instrument_node="">7</span></span><span data-dcnode-id="1422" instrument_node="">﻿
</span></p><span data-dcnode-id="1420" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1419" id="mntl-sc-block_1-0-64"></div><span data-dcnode-id="1418" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1413" id="mntl-sc-block_1-0-66"><span data-dcnode-id="1417" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node=""> Stronger Bones </span></span><span data-dcnode-id="1414" instrument_node=""> </span></h3><span data-dcnode-id="1412" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1407" id="mntl-sc-block_1-0-67"><span data-dcnode-id="1411" instrument_node="">
There is ongoing research about the impact of vitamin K on bone health, specifically on the prevention of osteoporosis. Osteoporosis is a condition characterized by porous and fragile bones. The National Institutes of Health reports that some, but not all, studies have found an association between a higher vitamin K intake and higher bone mineral density and/or lower hip fracture incidence.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1409" data-id="#citation-6"><span data-dcnode-id="1410" instrument_node="">8</span></span><span data-dcnode-id="1408" instrument_node="">
</span></p><span data-dcnode-id="1406" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1405" id="mntl-sc-block_1-0-68"></div><span data-dcnode-id="1404" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1399" id="mntl-sc-block_1-0-70"><span data-dcnode-id="1403" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node=""> Other Possible Benefits </span></span><span data-dcnode-id="1400" instrument_node=""> </span></h3><span data-dcnode-id="1398" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1396" id="mntl-sc-block_1-0-71"><span data-dcnode-id="1397" instrument_node="">
Some people also use rhubarb medicinally to treat different conditions including:
</span></p><span data-dcnode-id="1395" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1394" id="mntl-sc-block_1-0-72"></div><span data-dcnode-id="1393" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1376" id="mntl-sc-block_1-0-73"><span data-dcnode-id="1392" instrument_node="">
</span><li data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Cancer</span></li><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Constipation</span></li><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Fever</span></li><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Immune suppression</span></li><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Inflammation</span></li><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Microbial infection</span></li><li data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Ulcers</span></li><span data-dcnode-id="1377" instrument_node="">
</span></ul><span data-dcnode-id="1375" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1374" id="mntl-sc-block_1-0-74"></div><span data-dcnode-id="1373" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1368" id="mntl-sc-block_1-0-75"><span data-dcnode-id="1372" instrument_node="">
However, according to the medical experts at Memorial Sloan Kettering Cancer Center, there is not enough evidence to support these uses.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1370" data-id="#citation-7"><span data-dcnode-id="1371" instrument_node="">9</span></span><span data-dcnode-id="1369" instrument_node="">
</span></p><span data-dcnode-id="1367" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1366" id="mntl-sc-block_1-0-76"></div><span data-dcnode-id="1365" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1364" id="toc-allergies"></span><span data-dcnode-id="1363" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1358" id="mntl-sc-block_1-0-77"><span data-dcnode-id="1362" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node=""> Allergies </span></span><span data-dcnode-id="1359" instrument_node=""> </span></h2><span data-dcnode-id="1357" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1355" id="mntl-sc-block_1-0-78"><span data-dcnode-id="1356" instrument_node="">
Published reports of rhubarb allergy are rare.
</span></p><span data-dcnode-id="1354" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1353" id="mntl-sc-block_1-0-79"></div><span data-dcnode-id="1352" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1351" id="toc-adverse-effects"></span><span data-dcnode-id="1350" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1345" id="mntl-sc-block_1-0-80"><span data-dcnode-id="1349" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node=""> Adverse Effects </span></span><span data-dcnode-id="1346" instrument_node=""> </span></h2><span data-dcnode-id="1344" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1339" id="mntl-sc-block_1-0-81"><span data-dcnode-id="1343" instrument_node="">
When rhubarb is consumed as a food, it is likely safe. But because rhubarb has a laxative effect when taken in supplement form, it can make diarrhea worse.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1341" data-id="#citation-8"><span data-dcnode-id="1342" instrument_node="">10</span></span><span data-dcnode-id="1340" instrument_node="">
</span></p><span data-dcnode-id="1338" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1337" id="mntl-sc-block_1-0-82"></div><span data-dcnode-id="1336" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1331" id="mntl-sc-block_1-0-83"><span data-dcnode-id="1335" instrument_node="">
The root and rhizome of rhubarb is likely safe when consumed by adults as a food, but the leaves and possibly the stems are toxic. Rhubarb leaves are known to contain oxalic acid, which can cause kidney issues.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1333" data-id="#citation-8"><span data-dcnode-id="1334" instrument_node="">10</span></span><span data-dcnode-id="1332" instrument_node="">
</span></p><span data-dcnode-id="1330" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1329" id="mntl-sc-block_1-0-84"></div><span data-dcnode-id="1328" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1323" id="mntl-sc-block_1-0-85"><span data-dcnode-id="1327" instrument_node="">
Rhubarb also interacts with certain medications. Patients with&nbsp;hormone-sensitive cancers&nbsp;and those taking cytochrome P450 substrate drugs&nbsp;should avoid rhubarb. If you are taking melatonin, digoxin, cyclosporine, or methotrexate, rhubarb may not be safe.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1325" data-id="#citation-7"><span data-dcnode-id="1326" instrument_node="">9</span></span><span data-dcnode-id="1324" instrument_node=""> Talk to your healthcare provider before consuming rhubarb or using any herbal or medicinal products that contain rhubarb.
</span></p><span data-dcnode-id="1322" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1321" id="mntl-sc-block_1-0-86"></div><span data-dcnode-id="1320" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1318" id="mntl-sc-block_1-0-87"><span data-dcnode-id="1319" instrument_node="">
Lastly, rhubarb is low in carbs but it is usually consumed in recipes with a lot of sugar, so those following low sugar or low carbohydrate diets to manage a medical condition should choose recipes carefully, looking for those that are lower in added sugar.
</span></p><span data-dcnode-id="1317" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1316" id="mntl-sc-block_1-0-88"></div><span data-dcnode-id="1315" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1314" id="toc-varieties"></span><span data-dcnode-id="1313" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1308" id="mntl-sc-block_1-0-89"><span data-dcnode-id="1312" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node=""> Varieties </span></span><span data-dcnode-id="1309" instrument_node=""> </span></h2><span data-dcnode-id="1307" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1305" id="mntl-sc-block_1-0-90"><span data-dcnode-id="1306" instrument_node="">
There are many different varieties of rhubarb, including Canada Red, Cherry Red, Mammoth Red, and Mammoth Green. If you find rhubarb at the grocery store, you may notice a difference in color between varieties. Some are redder and some are more green. The most common variety grown from seed is Victoria.
</span></p><span data-dcnode-id="1304" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1303" id="mntl-sc-block_1-0-91"></div><span data-dcnode-id="1302" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1301" id="toc-when-its-best"></span><span data-dcnode-id="1300" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1295" id="mntl-sc-block_1-0-92"><span data-dcnode-id="1299" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node=""> When It’s Best </span></span><span data-dcnode-id="1296" instrument_node=""> </span></h2><span data-dcnode-id="1294" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1292" id="mntl-sc-block_1-0-93"><span data-dcnode-id="1293" instrument_node="">
Rhubarb is best in the spring and summer, specifically April through June. But you may be able to find it in the store later in the summer or earlier in the spring.
</span></p><span data-dcnode-id="1291" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1290" id="mntl-sc-block_1-0-94"></div><span data-dcnode-id="1289" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1287" id="mntl-sc-block_1-0-95"><span data-dcnode-id="1288" instrument_node="">
Look for firm stalks that are free from blemishes. If leaves are attached, they should not be wilted.
</span></p><span data-dcnode-id="1286" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1285" id="mntl-sc-block_1-0-96"></div><span data-dcnode-id="1284" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1283" id="toc-storage-and-food-safety"></span><span data-dcnode-id="1282" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1277" id="mntl-sc-block_1-0-97"><span data-dcnode-id="1281" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node=""> Storage and Food Safety </span></span><span data-dcnode-id="1278" instrument_node=""> </span></h2><span data-dcnode-id="1276" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1274" id="mntl-sc-block_1-0-98"><span data-dcnode-id="1275" instrument_node="">
When you buy rhubarb, the leaves are almost always removed. If they are not removed, take them off immediately as they are poisonous.
</span></p><span data-dcnode-id="1273" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1272" id="mntl-sc-block_1-0-99"></div><span data-dcnode-id="1271" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1269" id="mntl-sc-block_1-0-100"><span data-dcnode-id="1270" instrument_node="">
If you are not going to use it within a few days, you can store unwashed rhubarb in the refrigerator for up to a week. Simply wrap it in a paper towel and store it in the crisper. If you don't plan to use it in that time, freeze your rhubarb.
</span></p><span data-dcnode-id="1268" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1267" id="mntl-sc-block_1-0-101"></div><span data-dcnode-id="1266" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1264" id="mntl-sc-block_1-0-102"><span data-dcnode-id="1265" instrument_node="">
The best method is flash-freezing. To do this, lay small chunks of rhubarb on a baking sheet and place in the freezer. Once the vegetable becomes frozen solid, place it into individual freezer bags in the amount that you are likely to use in a recipe. Flash freezing prevents the pieces from sticking together and forming a large chunk. Rhubarb may become mushy when thawed.
</span></p><span data-dcnode-id="1263" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1262" id="mntl-sc-block_1-0-103"></div><span data-dcnode-id="1261" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1260" id="toc-how-to-prepare"></span><span data-dcnode-id="1259" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1254" id="mntl-sc-block_1-0-104"><span data-dcnode-id="1258" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node=""> How to Prepare </span></span><span data-dcnode-id="1255" instrument_node=""> </span></h2><span data-dcnode-id="1253" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1251" id="mntl-sc-block_1-0-105"><span data-dcnode-id="1252" instrument_node="">
It was once popular to nibble on the raw stalks of rhubarb (which seemed to grow everywhere) with sprinkles of salt. Doing the same thing with sugar is common in other places. But raw rhubarb is very bitter and hard to chew so it is not recommended.
</span></p><span data-dcnode-id="1250" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1249" id="mntl-sc-block_1-0-106"></div><span data-dcnode-id="1248" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1243" id="mntl-sc-block_1-0-107"><span data-dcnode-id="1247" instrument_node="">
You can stew rhubarb to consume as a dessert. Just cook diced rhubarb with a little water. Add a little cinnamon or nutmeg if desired.&nbsp;When it is soft, sweeten to taste with your favorite sweetener and serve with cream or </span><a data-component="link" data-dcnode-id="1245" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/how-to-make-whipped-cream-2241888" rel="noopener noreferrer"><span data-dcnode-id="1246" instrument_node="">sugar-free whipped cream.</span></a><span data-dcnode-id="1244" instrument_node="">
</span></p><span data-dcnode-id="1242" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1241" id="mntl-sc-block_1-0-108"></div><span data-dcnode-id="1240" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1238" id="mntl-sc-block_1-0-109"><span data-dcnode-id="1239" instrument_node="">
You can also pickle rhubarb. Prepare it&nbsp;as you would other types of pickled fruit or vegetables, such as watermelon rind pickles. Pickled rhubarb makes a tart condiment.
</span></p><span data-dcnode-id="1237" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1236" id="mntl-sc-block_1-0-110"></div><span data-dcnode-id="1235" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1233" id="mntl-sc-block_1-0-111"><span data-dcnode-id="1234" instrument_node="">
If you are making a rich, heavy dish, adding a little cooked minced rhubarb can add a spark.
</span></p><span data-dcnode-id="1232" instrument_node="">
</span></div><span data-dcnode-id="1230" instrument_node="">
