Rhubarb stalks resemble celery with a similar snap, but a decidedly tart flavor. Temper the tang with sugar and this versatile vegetable is good for both sweet and savory dishes ranging from pies to chutneys to soup. The heart-shaped, wide-veined leaves contain oxalic acid, which can be toxic when consumed in large quantities, so discard them before you use or store the stalks.

Rhubarb contains more calcium than a comparable cup of milk, but in a form the body cannot easily absorb. The stalks do,&nbsp;however, provide healthy amounts of vitamins K and C, potassium and manganese, among other vitamins and minerals. Although naturally low in calories, with 20 calories per serving, rhubarb requires sweetening to become palatable for most people. Added sugar raises the calorie count significantly and negates some of the health benefits.
