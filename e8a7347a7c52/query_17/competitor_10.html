</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Traditional Chinese medicine has used rhubarb for thousands of years, as a remedy for gut disorders, liver and kidney disease, poisoning, and more. Modern research has backed up most of these uses but also emphasized important limitations and safety concerns. Read on to learn the rhubarb benefits and dosage + tips to use it safely.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1685" id="more-60219"></span></p><span data-dcnode-id="1683" instrument_node="">
</span><h2 data-dcnode-id="1678"><span data-dcnode-id="1679" id="What_is_Rhubarb"><a data-dcnode-id="1682" id="post-60219-_p1a472e62ho5"></a><strong data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">What is Rhubarb?</span></strong></span></h2><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1676" instrument_node="">Rhubarb is the name used to describe several plant species in the genus </span><em data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Rheum</span></em><span data-dcnode-id="1673" instrument_node="">, native to China, Iran, Turkey, and India. Its underground storage organs – roots and rhizomes – have been used in traditional Chinese medicine since the third millennium BC [</span><a data-dcnode-id="1671" data-ref-link="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28844213" rel="noopener" target="_blank"><span data-dcnode-id="1672" instrument_node="">1</span></a><span data-dcnode-id="1670" instrument_node="">,</span><a data-dcnode-id="1668" data-ref-link="2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16355440" rel="noopener" target="_blank"><span data-dcnode-id="1669" instrument_node=""> 2</span></a><span data-dcnode-id="1667" instrument_node="">,</span><a data-dcnode-id="1665" data-ref-link="3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26171992" rel="noopener" target="_blank"><span data-dcnode-id="1666" instrument_node=""> 3</span></a><span data-dcnode-id="1664" instrument_node="">].</span></p><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1661" instrument_node="">Rhubarb has been traditionally used to heal a wide variety of issues such as</span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/causes-ibs-general-gut-dysfunction/"><span data-dcnode-id="1660" instrument_node=""> constipation</span></a><span data-dcnode-id="1658" instrument_node="">, fever, inflammation, and kidney failure. More recently, it was uncovered that Rhubarb can also alleviate symptoms of menopause and sepsis, a life-threatening response to infection [</span><a data-dcnode-id="1656" data-ref-link="4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5050441/" rel="noopener" target="_blank"><span data-dcnode-id="1657" instrument_node="">4</span></a><span data-dcnode-id="1655" instrument_node="">,</span><a data-dcnode-id="1653" data-ref-link="5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5323438/" rel="noopener" target="_blank"><span data-dcnode-id="1654" instrument_node=""> 5</span></a><span data-dcnode-id="1652" instrument_node="">,</span><a data-dcnode-id="1650" data-ref-link="6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4538976/" rel="noopener" target="_blank"><span data-dcnode-id="1651" instrument_node=""> 6</span></a><span data-dcnode-id="1649" instrument_node="">,</span><a data-dcnode-id="1647" data-ref-link="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener" target="_blank"><span data-dcnode-id="1648" instrument_node=""> 7</span></a><span data-dcnode-id="1646" instrument_node="">].</span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1643" instrument_node="">Rhubarb is known for its very sour, celery-like stalks, which vary in color, from pale pink to pale green. While the stalks can be used for cooking, the leaves are very poisonous. Some common varieties of rhubarb include [</span><a data-dcnode-id="1641" data-ref-link="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28844213" rel="noopener" target="_blank"><span data-dcnode-id="1642" instrument_node="">1</span></a><span data-dcnode-id="1640" instrument_node="">,</span><a data-dcnode-id="1638" data-ref-link="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener" target="_blank"><span data-dcnode-id="1639" instrument_node=""> 7</span></a><span data-dcnode-id="1637" instrument_node="">+]:</span></p><span data-dcnode-id="1635" instrument_node="">
</span><ul data-dcnode-id="1606"><span data-dcnode-id="1634" instrument_node="">
</span><li data-dcnode-id="1626"><span data-dcnode-id="1633" instrument_node="">Chinese rhubarb (</span><em data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Rheum officinale</span></em><span data-dcnode-id="1630" instrument_node=""> or </span><em data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Rheum palmatum</span></em><span data-dcnode-id="1627" instrument_node="">)</span></li><span data-dcnode-id="1625" instrument_node="">
</span><li data-dcnode-id="1620"><span data-dcnode-id="1624" instrument_node="">Garden or culinary rhubarb (</span><em data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Rheum rhabarbarum</span></em><span data-dcnode-id="1621" instrument_node="">)</span></li><span data-dcnode-id="1619" instrument_node="">
</span><li data-dcnode-id="1614"><span data-dcnode-id="1618" instrument_node="">Rhapontic rhubarb or false rhubarb (</span><em data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Rheum rhaponticum </span></em><span data-dcnode-id="1615" instrument_node="">L.)</span></li><span data-dcnode-id="1613" instrument_node="">
</span><li data-dcnode-id="1608"><span data-dcnode-id="1612" instrument_node="">Syrian rhubarb (</span><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Rheum ribes</span></em><span data-dcnode-id="1609" instrument_node=""> L.)</span></li><span data-dcnode-id="1607" instrument_node="">
</span></ul><span data-dcnode-id="1605" instrument_node="">
</span><h3 data-dcnode-id="1600"><span data-dcnode-id="1601" id="Snapshot"><a data-dcnode-id="1604" id="post-60219-_v869lhepol1p"></a><strong data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Snapshot</span></strong></span></h3><span data-dcnode-id="1599" instrument_node="">
</span><h4 data-dcnode-id="1595"><a data-dcnode-id="1598" id="post-60219-_5ktnd6dzimir"></a><strong data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Proponents:</span></strong></h4><span data-dcnode-id="1594" instrument_node="">
</span><ul data-dcnode-id="1574"><span data-dcnode-id="1593" instrument_node="">
</span><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">May help with liver and kidney diseases</span></li><span data-dcnode-id="1590" instrument_node="">
</span><li data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Relieves menopausal symptoms and menstrual pain</span></li><span data-dcnode-id="1587" instrument_node="">
</span><li data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Boosts gut health</span></li><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Helps with sepsis and pesticide poisoning</span></li><span data-dcnode-id="1581" instrument_node="">
</span><li data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">May support stroke recovery</span></li><span data-dcnode-id="1578" instrument_node="">
</span><li data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">May lower cholesterol and blood pressure</span></li><span data-dcnode-id="1575" instrument_node="">
</span></ul><span data-dcnode-id="1573" instrument_node="">
</span><h4 data-dcnode-id="1569"><a data-dcnode-id="1572" id="post-60219-_ctjwbq548n15"></a><strong data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Skeptics:</span></strong></h4><span data-dcnode-id="1568" instrument_node="">
</span><ul data-dcnode-id="1551"><span data-dcnode-id="1567" instrument_node="">
</span><li data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Low-quality clinical evidence</span></li><span data-dcnode-id="1564" instrument_node="">
</span><li data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Mostly studied in China</span></li><span data-dcnode-id="1561" instrument_node="">
</span><li data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">The leaves are toxic</span></li><span data-dcnode-id="1558" instrument_node="">
</span><li data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Can cause diarrhea due to laxative effect</span></li><span data-dcnode-id="1555" instrument_node="">
</span><li data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Not safe for pregnant women</span></li><span data-dcnode-id="1552" instrument_node="">
</span></ul><span data-dcnode-id="1550" instrument_node="">
</span><h3 data-dcnode-id="1545"><span data-dcnode-id="1546" id="Components"><a data-dcnode-id="1549" id="post-60219-_r321zffsefo3"></a><strong data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Components</span></strong></span></h3><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1543" instrument_node="">The most commonly used parts of the plant for medicinal purposes are the</span><strong data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node=""> roots and rhizomes</span></strong><span data-dcnode-id="1540" instrument_node="">, which contain [</span><a data-dcnode-id="1538" data-ref-link="6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4538976/" rel="noopener" target="_blank"><span data-dcnode-id="1539" instrument_node="">6</span></a><span data-dcnode-id="1537" instrument_node="">,</span><a data-dcnode-id="1535" data-ref-link="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener" target="_blank"><span data-dcnode-id="1536" instrument_node=""> 7</span></a><span data-dcnode-id="1534" instrument_node="">+,</span><a data-dcnode-id="1532" data-ref-link="3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26171992" rel="noopener" target="_blank"><span data-dcnode-id="1533" instrument_node=""> 3</span></a><span data-dcnode-id="1531" instrument_node="">+,</span><a data-dcnode-id="1529" data-ref-link="8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5745730/" rel="noopener" target="_blank"><span data-dcnode-id="1530" instrument_node=""> 8</span></a><span data-dcnode-id="1528" instrument_node="">]:</span></p><span data-dcnode-id="1526" instrument_node="">
</span><ul data-dcnode-id="1497"><span data-dcnode-id="1525" instrument_node="">
</span><li data-dcnode-id="1520"><span data-dcnode-id="1524" instrument_node="">Various plant pigments (anthraquinone compounds such as </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/aloe-vera-benefits/"><span data-dcnode-id="1523" instrument_node="">aloe</span></a><span data-dcnode-id="1521" instrument_node="">-emodin, chrysophanol, emodin, and rhein)</span></li><span data-dcnode-id="1519" instrument_node="">
</span><li data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Laxative phenolic compounds (anthraquinone glycosides such as sennosides)</span></li><span data-dcnode-id="1516" instrument_node="">
</span><li data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Antioxidant phenolic compounds (catechins)</span></li><span data-dcnode-id="1513" instrument_node="">
</span><li data-dcnode-id="1508"><span data-dcnode-id="1512" instrument_node="">Other phenolics (naphthalenes, </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/glucose/"><span data-dcnode-id="1511" instrument_node="">glucose</span></a><span data-dcnode-id="1509" instrument_node=""> gallates)</span></li><span data-dcnode-id="1507" instrument_node="">
</span><li data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Polysaccharides (complex sugars)</span></li><span data-dcnode-id="1504" instrument_node="">
</span><li data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Stilbenes</span></li><span data-dcnode-id="1501" instrument_node="">
</span><li data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Tannins</span></li><span data-dcnode-id="1498" instrument_node="">
</span></ul><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1495" instrument_node="">Rhubarb contains </span><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">toxic compounds</span></strong><span data-dcnode-id="1492" instrument_node=""> known as </span><strong data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">salts of oxalic acid/oxalates</span></strong><span data-dcnode-id="1489" instrument_node="">, which are not broken down during cooking. These compounds are highly concentrated in the leaves, which should not be consumed [</span><a data-dcnode-id="1487" data-ref-link="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener" target="_blank"><span data-dcnode-id="1488" instrument_node="">7</span></a><span data-dcnode-id="1486" instrument_node="">].</span></p><span data-dcnode-id="1484" instrument_node="">
</span><h3 data-dcnode-id="1479"><span data-dcnode-id="1480" id="Mechanisms_of_Action"><a data-dcnode-id="1483" id="post-60219-_ky2yupliyxvg"></a><strong data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Mechanisms of Action</span></strong></span></h3><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1462"><strong data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Anthraquinone compounds</span></strong><span data-dcnode-id="1475" instrument_node=""> such as </span><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">sennosides</span></strong><span data-dcnode-id="1472" instrument_node=""> are well-known</span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/natural-laxatives/"><span data-dcnode-id="1471" instrument_node=""> laxatives</span></a><span data-dcnode-id="1469" instrument_node=""> that stimulate bowel movements. These compounds are not absorbed in the intestine and reach the colon unchanged.</span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/gut-bacteria-microbiome/"><span data-dcnode-id="1468" instrument_node=""> Gut bacteria</span></a><span data-dcnode-id="1466" instrument_node=""> then break them down into active metabolites, which reduce the amount of water the colon reabsorbs. This increases the fluid content and volume in the stool, easing constipation [</span><a data-dcnode-id="1464" data-ref-link="3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26171992" rel="noopener" target="_blank"><span data-dcnode-id="1465" instrument_node="">3</span></a><span data-dcnode-id="1463" instrument_node="">].</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1460" instrument_node="">Other anthraquinone compounds such as</span><strong data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node=""> aloe-emodin, emodin, and rhein</span></strong><span data-dcnode-id="1457" instrument_node=""> have antibacterial properties. They may work by disrupting cell membranes of bacteria and their protein and energy production. Aloe-emodin can also act as a laxative [</span><a data-dcnode-id="1455" data-ref-link="8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5745730/" rel="noopener" target="_blank"><span data-dcnode-id="1456" instrument_node="">8</span></a><span data-dcnode-id="1454" instrument_node="">].</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1451" instrument_node="">They can also kill cancer cells and prevent metastasis by blocking excessive cell division [</span><a data-dcnode-id="1449" data-ref-link="8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5745730/" rel="noopener" target="_blank"><span data-dcnode-id="1450" instrument_node="">8</span></a><span data-dcnode-id="1448" instrument_node="">,</span><a data-dcnode-id="1446" data-ref-link="9" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17022020" rel="noopener" target="_blank"><span data-dcnode-id="1447" instrument_node=""> 9</span></a><span data-dcnode-id="1445" instrument_node="">].</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1433"><strong data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Stilbenes</span></strong><span data-dcnode-id="1440" instrument_node=""> contribute to rhubarb’s</span><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/cholesterol/"><span data-dcnode-id="1439" instrument_node=""> cholesterol</span></a><span data-dcnode-id="1437" instrument_node="">-lowering, antioxidant, and liver-protective effects [</span><a data-dcnode-id="1435" data-ref-link="8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5745730/" rel="noopener" target="_blank"><span data-dcnode-id="1436" instrument_node="">8</span></a><span data-dcnode-id="1434" instrument_node="">].</span></p><span data-dcnode-id="1432" instrument_node="">
</span><h2 data-dcnode-id="1427"><span data-dcnode-id="1428" id="Health_Benefits_of_Rhubarb"><a data-dcnode-id="1431" id="post-60219-_il6jz5tnrsqu"></a><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Health Benefits of Rhubarb</span></strong></span></h2><span data-dcnode-id="1426" instrument_node="">
</span><aside class="sh-partner shp-form sponsored sh-et-7388fa" data-dcnode-id="1391"><span data-dcnode-id="1425" instrument_node="">
