</span><h3 data-dcnode-id="1386"><span data-dcnode-id="1387" id="Possibly_Effective"><a data-dcnode-id="1389" id="post-60219-_xz0gnjwx7p91"></a><span data-dcnode-id="1388" instrument_node="">Possibly Effective:</span></span></h3><span data-dcnode-id="1385" instrument_node="">
</span><h3 data-dcnode-id="1380"><span data-dcnode-id="1381" id="1_Liver_Disease"><a data-dcnode-id="1384" id="post-60219-_oi03wpw8xwjo"></a><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">1) Liver Disease</span></strong></span></h3><span data-dcnode-id="1379" instrument_node="">
</span><h4 data-dcnode-id="1375"><a data-dcnode-id="1378" id="post-60219-_gf598n3m3ojv"></a><strong data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Non-Alcoholic Fatty Liver Disease</span></strong></h4><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1373" instrument_node="">In a clinical trial of 232 people, A Chinese herbal medicine containing rhubarb called Danning Pian improved non-alcoholic fatty liver disease symptoms and reduced</span><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/alanine-aminotransferase/"><span data-dcnode-id="1372" instrument_node=""> ALT</span></a><span data-dcnode-id="1370" instrument_node=""> levels, a marker of liver damage [</span><a data-dcnode-id="1368" data-ref-link="10" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15313672" rel="noopener" target="_blank"><span data-dcnode-id="1369" instrument_node="">10</span></a><span data-dcnode-id="1367" instrument_node="">].</span></p><span data-dcnode-id="1365" instrument_node="">
</span><h4 data-dcnode-id="1361"><a data-dcnode-id="1364" id="post-60219-_lfmk7z17kem"></a><strong data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Cirrhotic Ascites</span></strong></h4><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1359" instrument_node="">A very common and serious complication of liver cirrhosis is a buildup of fluid in the abdominal area (cirrhotic ascites). In 92 people, Xiaozhang Tie, a Chinese herbal medication with rhubarb, moderately reduced abdominal swelling and overall symptoms. It was given alongside conventional treatment [</span><a data-dcnode-id="1357" data-ref-link="11" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22107835" rel="noopener" target="_blank"><span data-dcnode-id="1358" instrument_node="">11</span></a><span data-dcnode-id="1356" instrument_node="">].</span></p><span data-dcnode-id="1354" instrument_node="">
</span><h4 data-dcnode-id="1350"><a data-dcnode-id="1353" id="post-60219-_2pmv8gjr9442"></a><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Genetic Disorders of the Liver</span></strong></h4><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1339"><em data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Infantile cholestatic hepatitis syndrome</span></em><span data-dcnode-id="1346" instrument_node=""> is a rare genetic disorder that causes</span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/bile-supplements/"><span data-dcnode-id="1345" instrument_node=""> bile</span></a><span data-dcnode-id="1343" instrument_node=""> build-up in the liver of newborns. Rhubarb was 89% effective at reducing jaundice, yellowish pigmentation of the skin that indicates bile buildup, in 64 infants [</span><a data-dcnode-id="1341" data-ref-link="12" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/10322829" rel="noopener" target="_blank"><span data-dcnode-id="1342" instrument_node="">12</span></a><span data-dcnode-id="1340" instrument_node="">].</span></p><span data-dcnode-id="1338" instrument_node="">
</span><div class="sh-summary" data-dcnode-id="1335"><div class="sh-summary-content" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Rhubarb has the potential to boost liver function, reduce fatty liver, and improve bile flow – alongside conventional treatments.</span></div></div><span data-dcnode-id="1334" instrument_node="">
</span><h3 data-dcnode-id="1329"><span data-dcnode-id="1330" id="2_Kidney_Disease"><a data-dcnode-id="1333" id="post-60219-_i49t12z5q7av"></a><strong data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">2) Kidney Disease</span></strong></span></h3><span data-dcnode-id="1328" instrument_node="">
</span><h4 data-dcnode-id="1325"><a data-dcnode-id="1327" id="post-60219-_wg2iq4ydwb4p"></a><span data-dcnode-id="1326" instrument_node="">Kidney Failure</span></h4><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1323" instrument_node="">In people with chronic kidney failure, levels of blood </span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/causes-of-high-or-low-blood-urea-nitrogen-bun/"><span data-dcnode-id="1322" instrument_node="">urea</span></a><span data-dcnode-id="1320" instrument_node=""> nitrogen (</span><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/causes-of-high-or-low-blood-urea-nitrogen-bun/"><span data-dcnode-id="1319" instrument_node="">BUN</span></a><span data-dcnode-id="1317" instrument_node="">) and</span><a data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/creatinine/"><span data-dcnode-id="1316" instrument_node=""> creatinine</span></a><span data-dcnode-id="1314" instrument_node=""> are often high, as the kidneys struggle to eliminate waste products from the blood. Supplementation with 1 g/day of rhubarb normalized levels of BUN, creatinine, and other waste products in 48 patients [</span><a data-dcnode-id="1312" data-ref-link="13" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/8828358" rel="noopener" target="_blank"><span data-dcnode-id="1313" instrument_node="">13</span></a><span data-dcnode-id="1311" instrument_node="">].</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1308" instrument_node="">Similarly, a Chinese herbal supplement containing rhubarb (Niaodujing) increased the removal of creatinine from the blood in a clinical trial of 105 people with chronic kidney failure [</span><a data-dcnode-id="1306" data-ref-link="14" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/9772612" rel="noopener" target="_blank"><span data-dcnode-id="1307" instrument_node="">14</span></a><span data-dcnode-id="1305" instrument_node="">].</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1302" instrument_node="">Taking another Chinese herbal combination with rhubarb, Rheum E, helped slow the progression of chronic kidney failure in a clinical trial of 30 people. It was effective both alone and in combination with a drug for high blood pressure, captopril [</span><a data-dcnode-id="1300" data-ref-link="15" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/2125252" rel="noopener" target="_blank"><span data-dcnode-id="1301" instrument_node="">15</span></a><span data-dcnode-id="1299" instrument_node="">].</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1296" instrument_node="">In another study, Chinese rhubarb with Captopril also normalized levels of a marker of kidney dysfunction (</span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/interleukin-6/"><span data-dcnode-id="1295" instrument_node="">IL-6</span></a><span data-dcnode-id="1293" instrument_node="">) in the urine of people with chronic kidney failure [</span><a data-dcnode-id="1291" data-ref-link="16" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11783309" rel="noopener" target="_blank"><span data-dcnode-id="1292" instrument_node="">16</span></a><span data-dcnode-id="1290" instrument_node="">].</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1287" instrument_node="">Combined with dialysis, a Chinese medication with rhubarb (Xinqingning) reduced the buildup of toxins in the blood; it helped slow the progression of chronic kidney failure in 57 patients. In 56 people, Baoyuan Dahuang Decoction, a different rhubarb-containing Chinese mixture improved the quality of life in people with chronic kidney failure [</span><a data-dcnode-id="1285" data-ref-link="17" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11789169" rel="noopener" target="_blank"><span data-dcnode-id="1286" instrument_node="">17</span></a><span data-dcnode-id="1284" instrument_node="">,</span><a data-dcnode-id="1282" data-ref-link="18" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/7950208" rel="noopener" target="_blank"><span data-dcnode-id="1283" instrument_node=""> 18</span></a><span data-dcnode-id="1281" instrument_node="">].</span></p><span data-dcnode-id="1279" instrument_node="">
</span><div class="sh-summary" data-dcnode-id="1276"><div class="sh-summary-content" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Various Chinese herbal remedies containing rhubarb show benefits for people with kidney failure by reducing overall symptoms and the buildup of waste products.</span></div></div><span data-dcnode-id="1275" instrument_node="">
</span><h4 data-dcnode-id="1272"><a data-dcnode-id="1274" id="post-60219-_ji0qfut082sh"></a><span data-dcnode-id="1273" instrument_node="">Diabetic Kidney Disease</span></h4><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1270" instrument_node="">Kidney disease is a common complication of diabetes. In 112 patients, rhubarb-containing Chinese herbal mixture (Tangshen Recipe) with</span><a data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/insulin-101/"><span data-dcnode-id="1269" instrument_node=""> insulin</span></a><span data-dcnode-id="1267" instrument_node=""> treatment was equally effective as conventional anti-diabetes drugs [</span><a data-dcnode-id="1265" data-ref-link="19" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21910334" rel="noopener" target="_blank"><span data-dcnode-id="1266" instrument_node="">19</span></a><span data-dcnode-id="1264" instrument_node="">].</span></p><span data-dcnode-id="1262" instrument_node="">
</span><h4 data-dcnode-id="1259"><a data-dcnode-id="1261" id="post-60219-_89s28flzkhsc"></a><span data-dcnode-id="1260" instrument_node="">Kidney Inflammation</span></h4><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1257" instrument_node="">In a clinical trial of 32 people with kidney inflammation, a rhubarb-containing Chinese herbal remedy (Decoction of Qingre Huoxue) added to steroidal anti-inflammatory drugs improved kidney function better than the drugs alone. This remedy may allow for the dosage of steroids to be lowered while achieving equal anti-inflammatory benefits [</span><a data-dcnode-id="1255" data-ref-link="20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15658650" rel="noopener" target="_blank"><span data-dcnode-id="1256" instrument_node="">20</span></a><span data-dcnode-id="1254" instrument_node="">].</span></p><span data-dcnode-id="1252" instrument_node="">
</span><h3 data-dcnode-id="1247"><span data-dcnode-id="1248" id="3_Menopausal_Symptoms"><a data-dcnode-id="1251" id="post-60219-_iokezftn2v19"></a><strong data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">3) Menopausal Symptoms</span></strong></span></h3><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">In a clinical trial of 109 women approaching menopause, a rhapontic rhubarb supplement (ERr 731) reduced improved the quality of life and reduced symptoms such as the frequency and severity of hot flashes. Importantly, this supplement didn’t alter gynecological factors such as uterus health or bleeding [</span><a data-dcnode-id="1243" data-ref-link="21" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16894335" rel="noopener" target="_blank"><span data-dcnode-id="1244" instrument_node="">21</span></a><span data-dcnode-id="1242" instrument_node="">].</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1239" instrument_node="">Two more trials with over 200 women found similar benefits [</span><a data-dcnode-id="1237" data-ref-link="22" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19161045" rel="noopener" target="_blank"><span data-dcnode-id="1238" instrument_node="">22</span></a><span data-dcnode-id="1236" instrument_node="">,</span><a data-dcnode-id="1234" data-ref-link="23" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18978638" rel="noopener" target="_blank"><span data-dcnode-id="1235" instrument_node=""> 23</span></a><span data-dcnode-id="1233" instrument_node="">].</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1230" instrument_node="">ERr 731 also reduced</span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/natural-treatments-anxiety/"><span data-dcnode-id="1229" instrument_node=""> anxiety</span></a><span data-dcnode-id="1227" instrument_node=""> from moderate-severe to slight, aside from reducing hot flashes in another clinical trial of 109 women transitioning to menopause [</span><a data-dcnode-id="1225" data-ref-link="24" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17213754" rel="noopener" target="_blank"><span data-dcnode-id="1226" instrument_node="">24</span></a><span data-dcnode-id="1224" instrument_node="">].</span></p><span data-dcnode-id="1222" instrument_node="">
</span><h3 data-dcnode-id="1217"><span data-dcnode-id="1218" id="4_Pancreas_Inflammation"><a data-dcnode-id="1221" id="post-60219-_gs0xqbb01z5v"></a><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">4) Pancreas Inflammation</span></strong></span></h3><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1215" instrument_node="">According to a meta-analysis of 16 clinical trials with over 900 people, rhubarb used with standard treatment is effective and safe for reducing pancreatic inflammation [</span><a data-dcnode-id="1213" data-ref-link="25" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/29672966" rel="noopener" target="_blank"><span data-dcnode-id="1214" instrument_node="">25</span></a><span data-dcnode-id="1212" instrument_node="">].</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1209" instrument_node="">In a clinical trial of 126 people with severe inflammation of the pancreas, the use of Chinese rhubarb powder (15 g, 1 – 2x/day) with a specific nutrition plan lowered inflammation, disease severity, and liver and kidney damage [</span><a data-dcnode-id="1207" data-ref-link="26" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25225951" rel="noopener" target="_blank"><span data-dcnode-id="1208" instrument_node="">26</span></a><span data-dcnode-id="1206" instrument_node="">].</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1203" instrument_node="">A raw Chinese rhubarb solution (50 g/100 mL) helped reduce pancreas inflammation and abnormally high pancreatic enzyme levels in the blood after endoscopy, in a clinical trial of 500 people [</span><a data-dcnode-id="1201" data-ref-link="27" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28194668" rel="noopener" target="_blank"><span data-dcnode-id="1202" instrument_node="">27</span></a><span data-dcnode-id="1200" instrument_node="">].</span></p><span data-dcnode-id="1198" instrument_node="">
</span><h3 data-dcnode-id="1193"><span data-dcnode-id="1194" id="5_HerbicidePesticide_Poisoning"><a data-dcnode-id="1197" id="post-60219-_xrp1ppawyttu"></a><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">5) Herbicide/Pesticide Poisoning</span></strong></span></h3><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1191" instrument_node="">A meta-analysis of 12 studies concluded that Chinese rhubarb has a beneficial effect on people with pesticide poisoning. The low quality of some studies is a potential drawback to the results [</span><a data-dcnode-id="1189" data-ref-link="28" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26645518" rel="noopener" target="_blank"><span data-dcnode-id="1190" instrument_node="">28</span></a><span data-dcnode-id="1188" instrument_node="">].</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">10 g/day of Chinese rhubarb in combination with other herbs, stomach washing, and clay, was effective for herbicide poisoning. This protocol helped eliminate toxins, reduced their absorption, sped up recovery time, and prevented damage to multiple organs [</span><a data-dcnode-id="1183" data-ref-link="29" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25891453" rel="noopener" target="_blank"><span data-dcnode-id="1184" instrument_node="">29</span></a><span data-dcnode-id="1182" instrument_node="">].</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1179" instrument_node="">Chinese rhubarb combined with mineral powder and blood purification was more effective at treating severe herbicide poisoning than the standard procedure. Rhubarb reduced the duration of the hospital stay and the use of artificial breathing machines, helping the patients recover consciousness more quickly [</span><a data-dcnode-id="1177" data-ref-link="30" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22804945" rel="noopener" target="_blank"><span data-dcnode-id="1178" instrument_node="">30</span></a><span data-dcnode-id="1176" instrument_node="">].</span></p><span data-dcnode-id="1174" instrument_node="">
</span><h3 data-dcnode-id="1169"><span data-dcnode-id="1170" id="6_Gut_Disorders"><a data-dcnode-id="1173" id="post-60219-_qkjhr4urj6l"></a><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">6) Gut Disorders</span></strong></span></h3><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">In a clinical trial of 30 people, Chinese rhubarb (10 g/day, fed nasally 3x/day) added to the normal treatment improved gut function [</span><a data-dcnode-id="1165" data-ref-link="31" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22224253" rel="noopener" target="_blank"><span data-dcnode-id="1166" instrument_node="">31</span></a><span data-dcnode-id="1164" instrument_node="">].</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1161" instrument_node="">In another trial of 89 critically-ill children, a Chinese herbal remedy (Fu’an Liquid) added to conventional drugs successfully reduced gut dysfunction. Even though a greater number of treated children survived, death rates were still high (30%) [</span><a data-dcnode-id="1159" data-ref-link="32" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12584785" rel="noopener" target="_blank"><span data-dcnode-id="1160" instrument_node="">32</span></a><span data-dcnode-id="1158" instrument_node="">].</span></p><span data-dcnode-id="1156" instrument_node="">
</span><h4 data-dcnode-id="1153"><a data-dcnode-id="1155" id="post-60219-_9crphvy3mzfg"></a><span data-dcnode-id="1154" instrument_node="">Infections</span></h4><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">Syrian rhubarb syrup (2.5 – 5 mL) along with an antibiotic (ceftriaxone) reduced fever, diarrhea, and the duration of stomach pain in a clinical trial of 150 children with an intestinal infection. It also reduced the need for anti-fever medication [</span><a data-dcnode-id="1149" data-ref-link="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28844213" rel="noopener" target="_blank"><span data-dcnode-id="1150" instrument_node="">1</span></a><span data-dcnode-id="1148" instrument_node="">].</span></p><span data-dcnode-id="1146" instrument_node="">
</span><h4 data-dcnode-id="1143"><a data-dcnode-id="1145" id="post-60219-_9mcqmymtk8lc"></a><span data-dcnode-id="1144" instrument_node="">Bleeding</span></h4><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">Chinese rhubarb helped stop digestive tract bleeding in a study of 312 hospitalized people [</span><a data-dcnode-id="1139" data-ref-link="33" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/2379297" rel="noopener" target="_blank"><span data-dcnode-id="1140" instrument_node="">33</span></a><span data-dcnode-id="1138" instrument_node="">].</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1135" instrument_node="">In a clinical trial of 60 people with digestive tract bleeding and fever, taking ground Chinese rhubarb (3 g, 3-4x/day) with ground Chinese</span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/ginseng/"><span data-dcnode-id="1134" instrument_node=""> ginseng</span></a><span data-dcnode-id="1132" instrument_node=""> (sanchi powder) boosted recovery. The combination worked by constricting the blood vessels, increasing platelets, improving platelet clumping, and reducing bleeding time [</span><a data-dcnode-id="1130" data-ref-link="34" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16152839" rel="noopener" target="_blank"><span data-dcnode-id="1131" instrument_node="">34</span></a><span data-dcnode-id="1129" instrument_node="">].

</span></p><div data-dcnode-id="1127" id="cbox-0BrRPIu0CUWxXQIC"></div><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1125"></p><span data-dcnode-id="1124" instrument_node="">
</span><h4 data-dcnode-id="1121"><a data-dcnode-id="1123" id="post-60219-_t8zr6fenrbj0"></a><span data-dcnode-id="1122" instrument_node="">Surgery Recovery</span></h4><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1119" instrument_node="">In a clinical trial of 360 people, a Chinese herbal concoction (Dannang Recipe No. 2) helped people undergoing gallbladder removal surgery recover gut functionality more quickly. It also reduced the length of the hospital stay and the need for IV fluids better than just antibiotics (Ceftizoxime sodium or Levofloxacin) [</span><a data-dcnode-id="1117" data-ref-link="35" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19317164" rel="noopener" target="_blank"><span data-dcnode-id="1118" instrument_node="">35</span></a><span data-dcnode-id="1116" instrument_node="">].</span></p><span data-dcnode-id="1114" instrument_node="">
</span><h3 data-dcnode-id="1109"><span data-dcnode-id="1110" id="7_Complications_of_Blood_Poisoning_Sepsis"><a data-dcnode-id="1113" id="post-60219-_8kz3xl1n0hl5"></a><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">7) Complications of Blood Poisoning (Sepsis)</span></strong></span></h3><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node="">In a meta-analysis of 15 clinical trials with 869 patients, rhubarb powder in combination with standard treatment improved gut dysfunction, inflammatory markers, and platelet count but didn’t reduce mortality [</span><a data-dcnode-id="1105" data-ref-link="36" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25617260" rel="noopener" target="_blank"><span data-dcnode-id="1106" instrument_node="">36</span></a><span data-dcnode-id="1104" instrument_node="">].</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1101" instrument_node="">In a study with over 1,000 patients with sepsis, Chinese rhubarb reduced fungal infections, especially when combined with adequate nutrition (via stomach tubes or IV) [</span><a data-dcnode-id="1099" data-ref-link="37" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17376267" rel="noopener" target="_blank"><span data-dcnode-id="1100" instrument_node="">37</span></a><span data-dcnode-id="1098" instrument_node="">].</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1095" instrument_node="">Similarly, 50 mL, 3x/day of a Chinese herbal (Hengyan medicine) used with conventional medication decreased levels of the inflammatory agents IL-6,</span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/il-10/"><span data-dcnode-id="1094" instrument_node=""> IL-10</span></a><span data-dcnode-id="1092" instrument_node="">, and</span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/supplements-lifestyle-factors-influence-tnf-interleukin-6-il-6/"><span data-dcnode-id="1091" instrument_node=""> TNF-α</span></a><span data-dcnode-id="1089" instrument_node=""> in a clinical trial of 45 people with sepsis [</span><a data-dcnode-id="1087" data-ref-link="38" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21315002" rel="noopener" target="_blank"><span data-dcnode-id="1088" instrument_node="">38</span></a><span data-dcnode-id="1086" instrument_node="">].</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1083" instrument_node="">A meta-analysis of 27 animal studies determined Chinese rhubarb may help reduce organ damage from blood poisoning. The benefits possibly derive from its </span><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">antioxidant and anti-inflammatory</span></strong><span data-dcnode-id="1080" instrument_node=""> properties [</span><a data-dcnode-id="1078" data-ref-link="6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4538976/" rel="noopener" target="_blank"><span data-dcnode-id="1079" instrument_node="">6</span></a><span data-dcnode-id="1077" instrument_node="">].</span></p><span data-dcnode-id="1075" instrument_node="">
</span><h3 data-dcnode-id="1070"><span data-dcnode-id="1071" id="8_High_Cholesterol"><a data-dcnode-id="1074" id="post-60219-_tlnck939slcz"></a><strong data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">8) High Cholesterol</span></strong></span></h3><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1068" instrument_node="">Consuming 27 g/day of ground rhubarb stalks reduced total and</span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/ldl-cholesterol/"><span data-dcnode-id="1067" instrument_node=""> LDL cholesterol</span></a><span data-dcnode-id="1065" instrument_node=""> by 8 – 9% in 10 men, but the study lacked a control group [</span><a data-dcnode-id="1063" data-ref-link="39" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/9430089" rel="noopener" target="_blank"><span data-dcnode-id="1064" instrument_node="">39</span></a><span data-dcnode-id="1062" instrument_node="">].</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">Similarly, in a clinical trial of 83 people with clogged arteries, a Chinese rhubarb preparation (50 mg/kg) lowered total and LDL cholesterol and also improved artery health [</span><a data-dcnode-id="1057" data-ref-link="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17708625" rel="noopener" target="_blank"><span data-dcnode-id="1058" instrument_node="">40</span></a><span data-dcnode-id="1056" instrument_node="">].</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1053" instrument_node="">In pregnant women with high blood pressure, Chinese rhubarb reduced levels of</span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/triglycerides/"><span data-dcnode-id="1052" instrument_node=""> triglycerides</span></a><span data-dcnode-id="1050" instrument_node=""> and LDL cholesterol, while increasing levels of</span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/hdl-cholesterol/"><span data-dcnode-id="1049" instrument_node=""> HDL</span></a><span data-dcnode-id="1047" instrument_node=""> cholesterol [</span><a data-dcnode-id="1045" data-ref-link="41" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11783143" rel="noopener" target="_blank"><span data-dcnode-id="1046" instrument_node="">41</span></a><span data-dcnode-id="1044" instrument_node="">].</span></p><span data-dcnode-id="1042" instrument_node="">
</span><h3 data-dcnode-id="1037"><span data-dcnode-id="1038" id="9_High_Blood_Pressure"><a data-dcnode-id="1041" id="post-60219-_38r5z0nbukt0"></a><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">9) High Blood Pressure</span></strong></span></h3><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1035" instrument_node="">A Chinese herbal with rhubarb (Jiangzhuoqinggan) was as effective as the standard drug, irbesartan, at reducing both systolic and diastolic blood pressure [</span><a data-dcnode-id="1033" data-ref-link="42" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23336505" rel="noopener" target="_blank"><span data-dcnode-id="1034" instrument_node="">42</span></a><span data-dcnode-id="1032" instrument_node="">].</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">Pregnancy can temporarily cause high blood pressure. A low dose of Chinese rhubarb (0.75 g/day) was able to reduce the rates of this condition in 333 pregnant women at high risk [</span><a data-dcnode-id="1027" data-ref-link="43" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/7835116" rel="noopener" target="_blank"><span data-dcnode-id="1028" instrument_node="">43</span></a><span data-dcnode-id="1026" instrument_node="">].</span></p><span data-dcnode-id="1024" instrument_node="">
</span><h3 data-dcnode-id="1019"><span data-dcnode-id="1020" id="10_Inflammation"><a data-dcnode-id="1023" id="post-60219-_fg9om4r6eh7a"></a><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">10) Inflammation</span></strong></span></h3><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1005"><em data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Systemic inflammatory response syndrome (SIRS)</span></em><span data-dcnode-id="1015" instrument_node=""> causes widespread inflammation. In 78 people with SIRS, Chinese rhubarb powder added to the conventional treatment helped cure the disease, and reduced organ damage and deaths. It probably acted by lowering inflammatory substances such as </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/supplements-lifestyle-factors-influence-tnf-interleukin-6-il-6/"><span data-dcnode-id="1014" instrument_node="">TNF-alpha</span></a><span data-dcnode-id="1012" instrument_node=""> and </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/c-reactive-protein/"><span data-dcnode-id="1011" instrument_node="">C-reactive protein</span></a><span data-dcnode-id="1009" instrument_node=""> (CRP) [</span><a data-dcnode-id="1007" data-ref-link="44" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12584786" rel="noopener" target="_blank"><span data-dcnode-id="1008" instrument_node="">44</span></a><span data-dcnode-id="1006" instrument_node="">].</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="1003" instrument_node="">Similarly, Chinese rhubarb extract (15 – 20 g, 2x/day) via</span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/enema/"><span data-dcnode-id="1002" instrument_node=""> enema</span></a><span data-dcnode-id="1000" instrument_node=""> or through a stomach tube reduced levels of pro-inflammatory substances in 57 SIRS patients [</span><a data-dcnode-id="998" data-ref-link="45" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26049188" rel="noopener" target="_blank"><span data-dcnode-id="999" instrument_node="">45</span></a><span data-dcnode-id="997" instrument_node="">].</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">In a clinical trial of 56 people, 10% Chinese liquid rhubarb along with conventional treatment lowered key inflammatory markers (CRP and IL-6) in stomach cancer patients [</span><a data-dcnode-id="992" data-ref-link="46" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18386567" rel="noopener" target="_blank"><span data-dcnode-id="993" instrument_node="">46</span></a><span data-dcnode-id="991" instrument_node="">].</span></p><span data-dcnode-id="989" instrument_node="">
</span><h3 data-dcnode-id="984"><span data-dcnode-id="985" id="11_Stroke_Recovery"><a data-dcnode-id="988" id="post-60219-_655sceullybg"></a><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">11) Stroke Recovery</span></strong></span></h3><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="982" instrument_node="">In a meta-analysis of studies with nearly 1,000 participants, Chinese herbal mixtures containing rhubarb, in addition to conventional medication, helped patients recover from strokes by reducing the severity of their post-stroke symptoms [</span><a data-dcnode-id="980" data-ref-link="47" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25453529" rel="noopener" target="_blank"><span data-dcnode-id="981" instrument_node="">47</span></a><span data-dcnode-id="979" instrument_node="">].</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">Rhubarb (5 – 10 g, 2 – 3x/day) given after surgery to stroke patients decreased markers of inflammation (complement 3, complement 4, and hypersensitive C-reactive protein), indicating improved healing [</span><a data-dcnode-id="974" data-ref-link="48" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23646468" rel="noopener" target="_blank"><span data-dcnode-id="975" instrument_node="">48</span></a><span data-dcnode-id="973" instrument_node="">].</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="968"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">The strength of the evidence from these trials is limited by small sample size, varying herbal formulas used, and the high risk of bias. Further research is warranted.</span></strong></p><span data-dcnode-id="967" instrument_node="">
</span><h3 data-dcnode-id="962"><span data-dcnode-id="963" id="12_Mouth_Ulcers_Canker_Sores"><a data-dcnode-id="966" id="post-60219-_r9h6ocd6ccwn"></a><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">12) Mouth Ulcers (Canker Sores)</span></strong></span></h3><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">Chinese rhubarb extract (5%) was moderately effective at speeding the healing from recurring mouth ulcers in a clinical trial of 125 people [</span><a data-dcnode-id="958" data-ref-link="49" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28238332" rel="noopener" target="_blank"><span data-dcnode-id="959" instrument_node="">49</span></a><span data-dcnode-id="957" instrument_node="">].</span></p><span data-dcnode-id="955" instrument_node="">
</span><h3 data-dcnode-id="950"><span data-dcnode-id="951" id="13_Herpes_Sores"><a data-dcnode-id="954" id="post-60219-_xqb452m89vog"></a><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">13) Herpes Sores</span></strong></span></h3><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">In 145 patients, a sage and Chinese rhubarb (23 mg/g) topical cream had a similar efficacy as a common herpes medication (Zovirax) at healing herpes sores [</span><a data-dcnode-id="946" data-ref-link="50" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11799306" rel="noopener" target="_blank"><span data-dcnode-id="947" instrument_node="">50</span></a><span data-dcnode-id="945" instrument_node="">].</span></p><span data-dcnode-id="943" instrument_node="">
</span><h3 data-dcnode-id="939"><span data-dcnode-id="940" id="Insufficient_Evidence"><a data-dcnode-id="942" id="post-60219-_8wlomdtpdwaj"></a><span data-dcnode-id="941" instrument_node="">Insufficient Evidence:</span></span></h3><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="935"><em data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">No valid clinical evidence supports the use of rhubarb for any of the conditions in this section. Below is a summary of up-to-date animal studies, cell-based research, or low-quality clinical trials which should spark further investigation. However, you shouldn’t interpret them as supportive of any health benefit.</span></em></p><span data-dcnode-id="934" instrument_node="">
</span><h3 data-dcnode-id="929"><span data-dcnode-id="930" id="14_Acute_Respiratory_Distress_Syndrome"><a data-dcnode-id="933" id="post-60219-_yy6rghqzxnlu"></a><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">14) Acute Respiratory Distress Syndrome</span></strong></span></h3><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="921"><em data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Acute Respiratory Distress Syndrome</span></em><span data-dcnode-id="925" instrument_node=""> causes serious lung inflammation. In a clinical trial of 80 people with this disease, 30 g/day of Chinese rhubarb was able to reduce fluid buildup in the lungs [</span><a data-dcnode-id="923" data-ref-link="51" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28724041" rel="noopener" target="_blank"><span data-dcnode-id="924" instrument_node="">51</span></a><span data-dcnode-id="922" instrument_node="">].</span></p><span data-dcnode-id="920" instrument_node="">
</span><h3 data-dcnode-id="915"><span data-dcnode-id="916" id="15_Menstrual_Pain"><a data-dcnode-id="919" id="post-60219-_39eg6my05tsi"></a><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">15) Menstrual Pain</span></strong></span></h3><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="913" instrument_node="">In a clinical trial of 45 women, Himalayan rhubarb (1,260 mg, 2x/day) was equally effective at reducing menstrual pain as the painkiller mefenamic acid [</span><a data-dcnode-id="911" data-ref-link="52" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25367691" rel="noopener" target="_blank"><span data-dcnode-id="912" instrument_node="">52</span></a><span data-dcnode-id="910" instrument_node="">].</span></p><span data-dcnode-id="908" instrument_node="">
</span><h3 data-dcnode-id="903"><span data-dcnode-id="904" id="16_Radioprotection"><a data-dcnode-id="907" id="post-60219-_7233l7694rz7"></a><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">16) Radioprotection</span></strong></span></h3><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="901" instrument_node="">Radiotherapy for lung cancer can cause severe adverse effects. In a clinical trial of 80 people, 20 mg/kg rhubarb reduced the incidence of lung toxicity, improved lung function, and reduced levels of inflammatory substances (</span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//selfhacked.com/blog/tgf/"><span data-dcnode-id="900" instrument_node="">TGF-beta</span></a><span data-dcnode-id="898" instrument_node="">1 and IL-6) [</span><a data-dcnode-id="896" data-ref-link="53" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17870203" rel="noopener" target="_blank"><span data-dcnode-id="897" instrument_node="">53</span></a><span data-dcnode-id="895" instrument_node="">].</span></p><span data-dcnode-id="893" instrument_node="">
</span><h3 data-dcnode-id="888"><span data-dcnode-id="889" id="17_Cognitive_Function"><a data-dcnode-id="892" id="post-60219-_yludz2ko75cg"></a><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">17) Cognitive Function</span></strong></span></h3><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">Chinese rhubarb added to a Chinese remedy (Compound Tong Jiang Oral Liquid), improved memory and had antioxidant effects in senile people. However, the study doesn’t reveal crucial details such as sample size [</span><a data-dcnode-id="884" data-ref-link="54" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/10437188" rel="noopener" target="_blank"><span data-dcnode-id="885" instrument_node="">54</span></a><span data-dcnode-id="883" instrument_node="">].</span></p><span data-dcnode-id="881" instrument_node="">
</span><h3 data-dcnode-id="876"><span data-dcnode-id="877" id="18_Weight_Loss"><a data-dcnode-id="880" id="post-60219-_u9nl56q2ieid"></a><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">18) Weight Loss</span></strong></span></h3><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="874" instrument_node="">A traditional Chinese herbal remedy that contains rhubarb (Xin-Ju-Xiao-Gao-Fang) at typical to low doses (10%) helped decrease body weight and</span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/top-tips-for-fixing-insulin-resistance/"><span data-dcnode-id="873" instrument_node=""> insulin resistance</span></a><span data-dcnode-id="871" instrument_node=""> in a clinical trial of 140 obese people [</span><a data-dcnode-id="869" data-ref-link="55" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25406653" rel="noopener" target="_blank"><span data-dcnode-id="870" instrument_node="">55</span></a><span data-dcnode-id="868" instrument_node="">].</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">A similar Chinese herbal remedy (Jiangzhuoqinggan) reduced waist circumference in a clinical trial of 240 people with high blood pressure [</span><a data-dcnode-id="863" data-ref-link="42" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23336505" rel="noopener" target="_blank"><span data-dcnode-id="864" instrument_node="">42</span></a><span data-dcnode-id="862" instrument_node="">].</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="859" instrument_node="">However, two studies on rhubarb or its herbal combinations did find any weight loss benefits [</span><a data-dcnode-id="857" data-ref-link="56" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17472485" rel="noopener" target="_blank"><span data-dcnode-id="858" instrument_node="">56</span></a><span data-dcnode-id="856" instrument_node="">,</span><a data-dcnode-id="854" data-ref-link="57" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16652135" rel="noopener" target="_blank"><span data-dcnode-id="855" instrument_node=""> 57</span></a><span data-dcnode-id="853" instrument_node="">].</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="848"><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">More studies are needed to clarify the conflicting results. At this point, rhubarb can not be recommended as a complementary approach to weight loss</span></strong></p><span data-dcnode-id="847" instrument_node="">
</span><h3 data-dcnode-id="843"><span data-dcnode-id="844" id="Animal_and_Cellular_Research_Lacking_Evidence"><a data-dcnode-id="846" id="post-60219-_5rte1tstzc3u"></a><span data-dcnode-id="845" instrument_node="">Animal and Cellular Research (Lacking Evidence)</span></span></h3><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="839"><em data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">No clinical evidence supports the use of rhubarb for any of the conditions listed in this section. Below is a summary of the existing animal and cell-based studies; they should guide further investigational efforts but should not be interpreted as supportive of any health benefit.</span></em></p><span data-dcnode-id="838" instrument_node="">
</span><h4 data-dcnode-id="835"><a data-dcnode-id="837" id="post-60219-_8inkhb830ovu"></a><span data-dcnode-id="836" instrument_node="">Bacterial Infections</span></h4><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="833" instrument_node="">The anthraquinones in rhubarb have antibacterial properties. One such compound, emodin, is effective against </span><em data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Staphylococcus aureus </span></em><span data-dcnode-id="830" instrument_node="">(even antibiotic-resistant strains), the bacteria that causes staph infections [</span><a data-dcnode-id="828" data-ref-link="8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5745730/" rel="noopener" target="_blank"><span data-dcnode-id="829" instrument_node="">8</span></a><span data-dcnode-id="827" instrument_node="">].</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="824" instrument_node="">In rats, rhubarb extracts cleared an infection of</span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfhacked.com/blog/h-pylori-part-1/"><span data-dcnode-id="823" instrument_node=""> </span><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">H. pylori</span></em></a><span data-dcnode-id="819" instrument_node="">, the bacteria that causes ulcers. The extracts were effective against resistant strains, too [</span><a data-dcnode-id="817" data-ref-link="58" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4087774/" rel="noopener" target="_blank"><span data-dcnode-id="818" instrument_node="">58</span></a><span data-dcnode-id="816" instrument_node="">].</span></p><span data-dcnode-id="814" instrument_node="">
</span><h3 data-dcnode-id="809"><span data-dcnode-id="810" id="Limitations_and_Caveats"><a data-dcnode-id="813" id="post-60219-_da0ju9u22ajy"></a><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Limitations and Caveats</span></strong></span></h3><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="807" instrument_node="">Chinese rhubarb, which the majority of the studies used, is usually combined with other Chinese herbs and medicinal plants. The </span><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">effects of rhubarb alone remain obscure</span></strong><span data-dcnode-id="804" instrument_node="">.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Many of the Chinese rhubarb articles were conducted in China with Chinese people. The same effect might not be observed in other populations.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">The health effects of the other forms of rhubarb have not been studied extensively.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="795" instrument_node="">Four meta-analyses examined rhubarb’s effects on herbicide poisoning, stroke recovery, pancreatic inflammation, and blood poisoning (sepsis). All four analyses noted that the examined studies had </span><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">poor methodological quality</span></strong><span data-dcnode-id="792" instrument_node=""> [</span><a data-dcnode-id="790" data-ref-link="28" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26645518" rel="noopener" target="_blank"><span data-dcnode-id="791" instrument_node="">28</span></a><span data-dcnode-id="789" instrument_node="">, </span><a data-dcnode-id="787" data-ref-link="36" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25617260" rel="noopener" target="_blank"><span data-dcnode-id="788" instrument_node="">36</span></a><span data-dcnode-id="786" instrument_node="">,</span><a data-dcnode-id="784" data-ref-link="47" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25453529" rel="noopener" target="_blank"><span data-dcnode-id="785" instrument_node=""> 47</span></a><span data-dcnode-id="783" instrument_node="">,</span><a data-dcnode-id="781" data-ref-link="25" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/29672966" rel="noopener" target="_blank"><span data-dcnode-id="782" instrument_node=""> 25</span></a><span data-dcnode-id="780" instrument_node="">].</span></p><span data-dcnode-id="778" instrument_node="">
</span><h2 data-dcnode-id="773"><span data-dcnode-id="774" id="Side_Effects_Precautions"><a data-dcnode-id="777" id="post-60219-_2fgvy7aoug9a"></a><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Side Effects &amp; Precautions</span></strong></span></h2><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="764"><em data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">This list does not cover all possible side effects. Contact your doctor or pharmacist if you notice any other side effects. In the US, you may report side effects to the FDA at 1-800-FDA-1088 or at </span></em><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fda.gov/medwatch"><em data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">www.fda.gov/medwatch</span></em></a><em data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">. In Canada, you may report side effects to Health Canada at 1-866-234-2345.</span></em></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="762" instrument_node="">Rhubarb rhizome and root are likely safe in the amounts present in food and possibly safe as nutritional supplements, used in adequate amounts. The reported side effects include [</span><a data-dcnode-id="760" data-ref-link="10" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15313672" rel="noopener" target="_blank"><span data-dcnode-id="761" instrument_node="">10</span></a><span data-dcnode-id="759" instrument_node="">,</span><a data-dcnode-id="757" data-ref-link="3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26171992" rel="noopener" target="_blank"><span data-dcnode-id="758" instrument_node=""> 3</span></a><span data-dcnode-id="756" instrument_node="">]:</span></p><span data-dcnode-id="754" instrument_node="">
</span><ul data-dcnode-id="740"><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Diarrhea</span></li><span data-dcnode-id="750" instrument_node="">
</span><li data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">High liver enzymes</span></li><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Skin rash</span></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Changes in urine color</span></li><span data-dcnode-id="741" instrument_node="">
</span></ul><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="732"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Pregnant women should avoid this herb in all forms due to its potent laxative effect</span></strong><span data-dcnode-id="736" instrument_node=""> [</span><a data-dcnode-id="734" data-ref-link="59" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/30000922" rel="noopener" target="_blank"><span data-dcnode-id="735" instrument_node="">59</span></a><span data-dcnode-id="733" instrument_node="">].</span></p><span data-dcnode-id="731" instrument_node="">
</span><h3 data-dcnode-id="726"><span data-dcnode-id="727" id="Drug_Interactions"><a data-dcnode-id="730" id="post-60219-_pkefe0wltfot"></a><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Drug Interactions</span></strong></span></h3><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="722"><em data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Supplement-drug interactions can be dangerous and, in rare cases, even life-threatening. Always consult your doctor before supplementing and let them know about all drugs and supplements you are using or considering.</span></em></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="720" instrument_node="">Because rhubarb has a laxative effect, please discuss with your doctor before taking it with any medications. Combining it with </span><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">digoxin</span></strong><span data-dcnode-id="717" instrument_node=""> (Lanoxin, Digox), used for treating heart failure, can be especially dangerous [</span><a data-dcnode-id="715" data-ref-link="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3D49kLK--eumEC%26pg%3DPA120%26lpg%3DPA120%26dq%3DDigoxin%2Brhubarb%26source%3Dbl%26ots%3Dgmidzvutdi%26sig%3DACfU3U0TUGFKEKrU26PqZerdTMUMaHdJzg%26hl%3Den%26sa%3DX%26ved%3D2ahUKEwimmrW_p_vfAhWAwMQHHRChC8AQ6AEwDHoECAkQAQ%23v%3Donepage%26q%3DDigoxin%2520rhubarb%26f%3Dfalse" rel="noopener" target="_blank"><span data-dcnode-id="716" instrument_node="">60</span></a><span data-dcnode-id="714" instrument_node="">].</span></p><span data-dcnode-id="712" instrument_node="">
</span><h3 data-dcnode-id="707"><span data-dcnode-id="708" id="Is_Rhubarb_Poisonous"><a data-dcnode-id="711" id="post-60219-_b4frqimgolzz"></a><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Is Rhubarb Poisonous?</span></strong></span></h3><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="705" instrument_node="">While many plants contain oxalates/oxalic acids in varying amounts, </span><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">rhubarb leaves contain very high concentrations of these toxic compounds, making them unsafe for consumption</span></strong><span data-dcnode-id="702" instrument_node="">. However, the stalks are low in oxalates and safe to eat. Both Chinese and common rhubarb, the most common types, are generally considered safe for consumption [</span><a data-dcnode-id="700" data-ref-link="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19446684" rel="noopener" target="_blank"><span data-dcnode-id="701" instrument_node="">7</span></a><span data-dcnode-id="699" instrument_node="">,</span><a data-dcnode-id="697" data-ref-link="59" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/30000922" rel="noopener" target="_blank"><span data-dcnode-id="698" instrument_node=""> 59</span></a><span data-dcnode-id="696" instrument_node="">].</span></p><span data-dcnode-id="694" instrument_node="">
</span><h2 data-dcnode-id="689"><span data-dcnode-id="690" id="Supplementation"><a data-dcnode-id="693" id="post-60219-_qbxaw5bfwtp5"></a><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Supplementation</span></strong></span></h2><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="685"><em data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Rhubarb supplements have not been approved by the FDA for medical use. In general, regulatory bodies aren’t assuring the quality, safety, and efficacy of supplements. Speak with your doctor before supplementing.</span></em></p><span data-dcnode-id="684" instrument_node="">
</span><h3 data-dcnode-id="679"><span data-dcnode-id="680" id="Forms"><a data-dcnode-id="683" id="post-60219-_jk4hu2i4hs97"></a><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Forms</span></strong></span></h3><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="677" instrument_node="">Rhubarb can be found in various forms, usually made from the roots and rhizomes of Chinese rhubarb [</span><a data-dcnode-id="675" data-ref-link="3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26171992" rel="noopener" target="_blank"><span data-dcnode-id="676" instrument_node="">3</span></a><span data-dcnode-id="674" instrument_node="">,</span><a data-dcnode-id="672" data-ref-link="4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5050441/" rel="noopener" target="_blank"><span data-dcnode-id="673" instrument_node=""> 4</span></a><span data-dcnode-id="671" instrument_node="">]:</span></p><span data-dcnode-id="669" instrument_node="">
</span><ul data-dcnode-id="643"><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Capsules/Tablets</span></li><span data-dcnode-id="665" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Powder</span></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Dried root pieces</span></li><span data-dcnode-id="659" instrument_node="">
</span><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Tea</span></li><span data-dcnode-id="656" instrument_node="">
</span><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Tinctures</span></li><span data-dcnode-id="653" instrument_node="">
</span><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Infusions</span></li><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Extracts</span></li><span data-dcnode-id="647" instrument_node="">
</span><li data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Traditional Chinese Medicine combination remedies (most common)</span></li><span data-dcnode-id="644" instrument_node="">
</span></ul><span data-dcnode-id="642" instrument_node="">
</span><h3 data-dcnode-id="637"><span data-dcnode-id="638" id="Dosage"><a data-dcnode-id="641" id="post-60219-_tqr5hqadevre"></a><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Dosage</span></strong></span></h3><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="633"><em data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">The below doses may not apply to you personally. If your doctor suggests using rhubarb, work with them to find the optimal dosage according to your health condition and other factors.</span></em></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="631" instrument_node="">The doses for rhubarb widely vary. Clinical trials used doses ranging </span><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">from 50 mg to 50 g/day, </span></strong><span data-dcnode-id="628" instrument_node="">depending on the disease, type of extract, and other factors.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="625" instrument_node="">For Chinese rhubarb in a crude powder form, a common dosage is </span><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">10-30 g/day</span></strong><span data-dcnode-id="622" instrument_node="">.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">The dosage of ERr 731 (rhapontic rhubarb) is 1 tablet/day.</span></p><span data-dcnode-id="617" instrument_node="">
</span><div class="sh-summary" data-dcnode-id="601"><div class="sh-summary-content" data-dcnode-id="602"><h3 data-dcnode-id="613"><span data-dcnode-id="614" id="Takeaway"><a data-dcnode-id="616" id="post-60219-_keebkpj4qa8y"></a><span data-dcnode-id="615" instrument_node="">Takeaway</span></span></h3><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Rhubarb has been used for centuries and is especially important in Traditional Chinese Medicine (TCM), which considers it a vital remedy for various diseases. Scientific studies have confirmed numerous benefits that range from gut, liver and kidney protection to lowering inflammation and cholesterol. Still, most benefits lack solid clinical evidence.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Chinese rhubarb is often combined with other herbs and dietary changes to achieve synergistic effects in TCM. Common rhubarb may relieve menstrual pain and menopausal symptoms. The parts of rhubarb medicinally used – rhizome and roots – are generally very safe and cause few side effects.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">It’s also important to keep in mind that Rhubarb has laxative action, which is desired in some cases but may cause discomfort in others. The leaves of Rhubarb are toxic and should not be consumed. Pregnant women should avoid it while others should consult their doctor before supplementing.</span></p><span data-dcnode-id="603" instrument_node="">
</span></div></div><span data-dcnode-id="600" instrument_node="">
