acebook" data-dcnode-id="1168" style="background-color: rgb(24, 119, 242); width: 40px; line-height: 40px; height: 40px; background-size: 40px; border-radius: 6px;"><svg aria-hidden="true" data-dcnode-id="1169" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M17.78 27.5V17.008h3.522l.527-4.09h-4.05v-2.61c0-1.182.33-1.99 2.023-1.99h2.166V4.66c-.375-.05-1.66-.16-3.155-.16-3.123 0-5.26 1.905-5.26 5.405v3.016h-3.53v4.09h3.53V27.5h4.223z" data-dcnode-id="1170" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Facebook</span></span></a><a class="a2a_button_linkedin" data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aicr.org/%23linkedin" rel="nofollow noopener" target="_blank" title="LinkedIn"><span class="a2a_svg a2a_s__default a2a_s_linkedin" data-dcnode-id="1162" style="background-color: rgb(0, 123, 181); width: 40px; line-height: 40px; height: 40px; background-size: 40px; border-radius: 6px;"><svg aria-hidden="true" data-dcnode-id="1163" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M6.227 12.61h4.19v13.48h-4.19V12.61zm2.095-6.7a2.43 2.43 0 010 4.86c-1.344 0-2.428-1.09-2.428-2.43s1.084-2.43 2.428-2.43m4.72 6.7h4.02v1.84h.058c.56-1.058 1.927-2.176 3.965-2.176 4.238 0 5.02 2.792 5.02 6.42v7.395h-4.183v-6.56c0-1.564-.03-3.574-2.178-3.574-2.18 0-2.514 1.7-2.514 3.46v6.668h-4.187V12.61z" data-dcnode-id="1164" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">LinkedIn</span></span></a></div></div></div></div></div><div class="cell small-12 medium-auto main-cell" data-dcnode-id="825"><section class="post-content" data-dcnode-id="1097"><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Rhubarb is a colorful and flavorful, yet under-appreciated, vegetable that is at its peak this time of year. Though not common in most people’s diets, this tart plant may offer cancer-preventive properties.</span></p><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">The edible part of the rhubarb plant — the stalk — contains anthocyanins, which yield its bright red color. Anthocyanins are a type of flavonoid found in foods such as berries, red onions, black beans, red grapes and black plums. They act as antioxidants in test tube studies, but in the human body, their protection seems more likely to come from their role in cancer-preventive cell signaling. Anthocyanins have demonstrated protective effects on blood vessels and blood pressure, and recent research suggests that anthocyanins may offer anti-cancer benefits, too.</span></p><p data-dcnode-id="1142"><span data-dcnode-id="1149" instrument_node="">Rhubarb is also a great source of vitamin K</span><sub data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">1</span></sub><span data-dcnode-id="1146" instrument_node="">, which is important for blood clotting and bone health. A half cup of cooked rhubarb provides more than one-third of the recommended dietary intake of vitamin K</span><sub data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">1</span></sub><span data-dcnode-id="1143" instrument_node="">, along with two grams of fiber (which helps prevent colorectal cancer), some calcium and vitamin C.</span></p><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Rhubarb originated in China, where its roots were first harvested and dried for medicinal use. It is now grown either outdoors or in greenhouses in temperate climates throughout northeast Asia, North America and northern Europe. Stalks may be harvested starting in their second growing season. The stalks range in color from green to red and have large, green leaves.</span></p><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">If you grow your own rhubarb, be careful to avoid the leaves, as their high levels of oxalic acid make them poisonous. At lower concentrations, this compound isn’t harmful for most people. But the amount in rhubarb leaves can cause severe vomiting and at very high levels, it could be fatal.</span></p><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Rhubarb is commonly eaten in sweet desserts — most famously known for combining with strawberries in pie — to counterbalance its strong tartness, but don’t be afraid to get creative. Try cooking down chopped rhubarb with a little lemon juice and sugar into a compote to top plain yogurt, oatmeal or goat cheese. Or, bake it into whole-grain muffins in place of another fruit and add a little ginger or cinnamon. For a savory option, chop and add rhubarb to diced red onion, a splash of balsamic vinegar and a little mustard to create a zesty sauce for your favorite fish.</span></p><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">For a refreshing drink without added sugar, try this Rhubarb Orange Refresher made with rhubarb syrup that is reminiscent of a Mexican agua fresca.&nbsp;</span></p><h3 data-dcnode-id="1132" style="text-align: left;"><span data-dcnode-id="1133" instrument_node="">Rhubarb Orange Refresher</span></h3><h5 data-dcnode-id="1129"><strong data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Ingredients:</span></strong></h5><ul data-dcnode-id="1116"><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">3 cups fresh rhubarb, cut crosswise in 1/2-inch slices, about 3/4 lb.</span></li><li data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">4 cups cold water</span></li><li data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">1 cup strawberries, sliced</span></li><li data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">1 cup orange juice</span></li><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">4 mint sprigs, for garnish</span></li><li data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Sweeten to taste with agave, honey or sugar (optional)</span></li></ul><h5 data-dcnode-id="1113"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Directions</span></strong></h5><ol data-dcnode-id="1106"><li data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">In a large, stainless steel or other non-reactive saucepan, combine rhubarb and water. Cover and bring to boil over medium-high heat. Reduce heat and simmer 15 minutes. Set covered pot aside to steep for 10 minutes.</span></li><li data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Set large strainer over bowl. Pour contents of pot into strainer and drain liquid into bowl. Using back of wooden spoon, press very lightly on rhubarb, just to extract liquid that drains easily. Pressing too firmly will make infusion cloudy. Discard pulp. Pour liquid, about 4 cups, into jar or other container, preferably glass, and let sit until room temperature, then cover and refrigerate for up to 2 days.</span></li><li data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">To serve, measure 3 cups rhubarb infusion. Pour 1/2 cup into pitcher, add strawberries, and muddle until combined. Pour in remaining rhubarb infusion and orange juice. Divide among 4 ice-filled, tall glasses. Garnish each glass with mint sprig, if using. For single serving, in a glass, combine 1/4 cup rhubarb infusion with 2 strawberries, and then add remaining 1/2 cup infusion, 1/4 cup orange juice and ice.</span></li></ol><h5 data-dcnode-id="1103"><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Makes 8 servings</span></strong></h5><h5 data-dcnode-id="1100"><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Per Serving: </span></strong></h5><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">30 calories, 0 g total fat, 0 g saturated fat, 7 g carbohydrate, 1 g dietary fiber, 1 g protein, 0 mg sodium</span></p></section><section class="newsletter simple-form" data-dcnode-id="1041"><div class="newsletter-block edit-aicrimpact-title" data-dcnode-id="1042"><h4 data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">AICR Impact</span></h4><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">The American Institute for Cancer Research helps the public understand the relationship between lifestyle, nutrition and cancer risk. We work to prevent cancer through innovative research, community programs and impactful public health initiatives.</span></p><div class="gf_browser_unknown gform_wrapper overlay-submit_wrapper gform_legacy_markup_wrapper" data-dcnode-id="1049" id="gform_wrapper_7"><form action="/resources/blog/health-benefits-of-rhubarb/" class="overlay-submit gform_legacy_markup" data-dcnode-id="1050" enctype="multipart/form-data" id="gform_7" method="post" target="gform_ajax_frame_7"><span data-dcnode-id="1092" instrument_node=""> </span><input class="gforms-pum" data-dcnode-id="1091" type="hidden" value="{&quot;closepopup&quot;:false,&quot;closedelay&quot;:0,&quot;openpopup&quot;:false,&quot;openpopup_id&quot;:0}"><div class="gform_body gform-body" data-dcnode-id="1077"><ul class="gform_fields top_label form_sublabel_below description_below" data-dcnode-id="1078" id="gform_fields_7"><li class="gfield overlay-input input-type-email input-paramname- gfield_contains_required field_sublabel_below field_description_below hidden_label gfield_visibility_visible" data-dcnode-id="1082" data-js-reload="field_7_1" id="field_7_1"><label class="gfield_label" data-dcnode-id="1086" for="input_7_1"><span data-dcnode-id="1090" instrument_node="">Email Address</span><span class="gfield_required" data-dcnode-id="1087"><span class="gfield_required gfield_required_asterisk" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">*</span></span></span></label a-dcnode-id="1004" datetime="2020-05-25"><a data-dcnode-id="1005" href="#comment-5628"><span data-dcnode-id="1006" instrument_node=""> May 25th, 2020 - 10:06am </span></a></time></header><section class="comment_content clearfix" data-dcnode-id="1000"><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Thank you for the encouraging research on rhubarb benefits. It grows well in my farm and now l will inform my friend whovhas colon cancer problems. Keep up the good research.</span></p></section><span data-dcnode-id="999" instrument_node=""> </span><a aria-label="Reply to Rose Makimei from Kenya" class="comment-reply-link" data-belowelement="comment-5628" data-commentid="5628" data-dcnode-id="997" data-postid="22855" data-replyto="Reply to Rose Makimei from Kenya" data-respondelement="respond" href="#comment-5628" rel="nofollow"><span data-dcnode-id="998" instrument_node="">Reply</span></a></article></div></div></li><li class="comment even thread-even depth-1 panel" data-dcnode-id="970"><div class="media-object" data-dcnode-id="971"><div class="media-object-section" data-dcnode-id="988"><span data-dcnode-id="992" instrument_node=""> </span><img alt="" class="avatar avatar-75 photo lazyloaded" data-dcnode-id="991" data-src="https://secure.gravatar.com/avatar/1c416f611ac1c0b73cc1d57d45548853?s=75&amp;d=mm&amp;r=g" data-srcset="https://secure.gravatar.com/avatar/1c416f611ac1c0b73cc1d57d45548853?s=150&amp;d=mm&amp;r=g 2x" decoding="async" height="75" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/1c416f611ac1c0b73cc1d57d45548853%3Fs%3D75%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/1c416f611ac1c0b73cc1d57d45548853?s=150&amp;d=mm&amp;r=g 2x" width="75"><noscript data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">&lt;img alt="" src="https://secure.gravatar.com/avatar/1c416f611ac1c0b73cc1d57d45548853?s=75&amp;#038;d=mm&amp;#038;r=g" srcset="https://secure.gravata
