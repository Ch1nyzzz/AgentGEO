</span><h2 data-dcnode-id="13035"><span data-dcnode-id="13036" instrument_node="">1/4/2022</span></h2><span data-dcnode-id="13034" instrument_node=""> </span><div class="post" data-dcnode-id="12929" id="post-163449"><span data-dcnode-id="13033" instrument_node="">
</span><h3 class="storytitle" data-dcnode-id="13030"><a data-dcnode-id="13031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//patterico.com/2022/01/04/what-if-trumps-coup-had-succeeded/" rel="bookmark" title="What If Trump’s Coup Attempt Had Succeeded?"><span data-dcnode-id="13032" instrument_node="">What If Trump’s Coup Attempt Had Succeeded?</span></a></h3><span data-dcnode-id="13029" instrument_node="">
</span><div class="meta" data-dcnode-id="13009"><span data-dcnode-id="13028" instrument_node="">
                  Filed under:                  </span><a data-dcnode-id="13026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//patterico.com/category/general/" rel="category tag"><span data-dcnode-id="13027" instrument_node="">General</span></a><span data-dcnode-id="13025" instrument_node="">                  —
                  Patterico                  @
                  8:29 am                  
</span><br data-dcnode-id="13024"><span data-dcnode-id="13023" instrument_node="">
</span><br data-dcnode-id="13022"><span data-dcnode-id="13021" instrument_node="">
</span><span data-dcnode-id="13019" instrument_node="">
</span><a class="twitter-share-button" data-count="vertical" data-dcnode-id="13017" data-related="syedbalkhi:Founder of WPBeginner" data-text="What If Trump’s Coup Attempt Had Succeeded?" data-url="http://patterico.com/2022/01/04/what-if-trumps-coup-had-succeeded/" data-via="Patterico" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/share"><span data-dcnode-id="13018" instrument_node="">Tweet</span></a><span data-dcnode-id="13016" instrument_node="">
</span><br data-dcnode-id="13015"><span data-dcnode-id="13014" instrument_node="">
</span><div class="fb-like" data-action="like" data-dcnode-id="13013" data-layout="button" data-share="true" data-show-faces="true" data-size="small"></div><span data-dcnode-id="13012" instrument_node="">
</span><br data-dcnode-id="13011"><span data-dcnode-id="13010" instrument_node="">
</span></div><span data-dcnode-id="13008" instrument_node="">
</span><div class="storycontent" data-dcnode-id="12937"><p data-dcnode-id="13000"><span data-dcnode-id="13007" instrument_node="">At </span><em data-dcnode-id="13005"><span data-dcnode-id="13006" instrument_node="">USA Today</span></em><span data-dcnode-id="13004" instrument_node="">, David Rothkopf </span><a data-dcnode-id="13002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usatoday.com/story/opinion/2022/01/04/jan-6-capitol-attempted-coup-trump/8912294002/%3Fscrolla%3D5eb6d68b7fedc32c19ef33b4" rel="noopener" target="_blank"><span data-dcnode-id="13003" instrument_node="">asks this important question</span></a><span data-dcnode-id="13001" instrument_node=""> and then fumbles on the answer:</span></p><span data-dcnode-id="12999" instrument_node="">
</span><blockquote data-dcnode-id="12987"><p data-dcnode-id="12997"><span data-dcnode-id="12998" instrument_node="">As we approach the first anniversary of the Jan. 6 insurrection on the U.S. Capitol, many questions remain. Among these, one of the most important is, “What if?”</span></p><span data-dcnode-id="12996" instrument_node="">
</span><p data-dcnode-id="12994"><span data-dcnode-id="12995" instrument_node="">What if the coup attempt had succeeded? What if the election results had been overturned? What if Donald Trump were illegally installed for a second term as president of the United States?</span></p><span data-dcnode-id="12993" instrument_node="">
</span><p data-dcnode-id="12991"><span data-dcnode-id="12992" instrument_node="">It could have happened several different ways. Capitol Police officer Eugene Goodman might have been out sick last Jan. 6 and not in place to divert the mob away from fleeing and hiding members of Congress. The Trumpist horde could have found their way to House Speaker Nancy Pelosi, Vice President Mike Pence or other members of Congress and killed or injured them.</span></p><span data-dcnode-id="12990" instrument_node="">
</span><p data-dcnode-id="12988"><span data-dcnode-id="12989" instrument_node="">Had they done so, it might have resulted in postponing the certification of the election and in the ensuing time, despite whatever national outrage was triggered, the former president and his supporters might have engineered politically motivated challenges in key states throwing the election’s results into question.</span></p></blockquote><span data-dcnode-id="12986" instrument_node="">
</span><p data-dcnode-id="12981"><span data-dcnode-id="12985" instrument_node="">Rothkoff, the author of this “what if Trump managed to steal the election” piece, is a Democrat who, like most Democrats nowadays, doesn’t really take the “what if?” question seriously. His biggest concern seems to be that “it is not hard to imagine that within weeks after stealing the election, Trump would have moved quickly to consolidate power and protect himself from challenges.” Just like every president does? His solution is standard Democrat blather about election laws “that will make it harder for tens of millions of Americans – often minority voters and others who tend to vote Democratic – to vote.” This ignores the fact that making it “harder” to vote (like requiring identification, an act that Democrats are convinced is beyond the capability of anyone with dark skin) doesn’t really matter if voters manage to surmount those obstacles, and </span><strong data-dcnode-id="12983"><span data-dcnode-id="12984" instrument_node="">Republicans throw out their votes anyway</span></strong><span data-dcnode-id="12982" instrument_node="">.</span></p><span data-dcnode-id="12980" instrument_node="">
</span><p data-dcnode-id="12976"><em data-dcnode-id="12978"><span data-dcnode-id="12979" instrument_node="">That</span></em><span data-dcnode-id="12977" instrument_node=""> is what Trump tried to do — and the real answer to “what if” he had succeeded is that he would have made it impossible to change power through peaceful means.</span></p><span data-dcnode-id="12975" instrument_node="">
</span><p data-dcnode-id="12972"><strong data-dcnode-id="12973"><span data-dcnode-id="12974" instrument_node="">And that leaves force as the only option left.</span></strong></p><span data-dcnode-id="12971" instrument_node="">
</span><p data-dcnode-id="12969"><span data-dcnode-id="12970" instrument_node="">So the real answer to the question is: if Trump had managed to get himself installed, even though the voters chose someone else, then the citizenry would have been justified in removing him by force, using any means necessary.</span></p><span data-dcnode-id="12968" instrument_node="">
</span><p data-dcnode-id="12966"><span data-dcnode-id="12967" instrument_node="">I have often said that the real issue with the January 6 insurrectionists isn’t that they tried to overtake the government by force, but that their premises were wrong. If they were actually correct that the election had been blatantly stolen, they would have had no other option.</span></p><span data-dcnode-id="12965" instrument_node="">
</span><p data-dcnode-id="12963"><span data-dcnode-id="12964" instrument_node="">That is what happens when elections are no longer a viable way to choose a leader.</span></p><span data-dcnode-id="12962" instrument_node="">
</span><p data-dcnode-id="12960"><span data-dcnode-id="12961" instrument_node="">That is the plain truth, yet people recoil from it. “My lands, but that is a bridge too far! Are you suggesting what I think you are suggesting?”</span></p><span data-dcnode-id="12959" instrument_node="">
</span><p data-dcnode-id="12954"><span data-dcnode-id="12958" instrument_node="">You bet I am. As an analogy, the Russian people would absolutely be justified in deposing Vladimir Putin by force, including (if necessary) through the means you now realize I am actually suggesting. And that is because </span><strong data-dcnode-id="12956"><span data-dcnode-id="12957" instrument_node="">there is no other way to remove Vladimir Putin</span></strong><span data-dcnode-id="12955" instrument_node="">.</span></p><span data-dcnode-id="12953" instrument_node="">
</span><p data-dcnode-id="12951"><span data-dcnode-id="12952" instrument_node="">And if Trump had managed to seize power despite the People choosing someone else, our citizenry would be justified in doing the same.</span></p><span data-dcnode-id="12950" instrument_node="">
</span><p data-dcnode-id="12945"><span data-dcnode-id="12949" instrument_node="">And that is a horrifying thing to say. Which is why I keep (to borrow Jonah Goldberg’s phrase) banging my spoon on my high chair about this issue. It is the most serious issue facing the country. Democrats’ silly little election laws aren’t going to fix it. What is needed is a </span><a data-dcnode-id="12947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalreview.com/2021/06/fixing-the-electoral-count-act-is-a-good-idea/" rel="noopener" target="_blank"><span data-dcnode-id="12948" instrument_node="">serious reform of the Electoral Count Act</span></a><span data-dcnode-id="12946" instrument_node="">.</span></p><span data-dcnode-id="12944" instrument_node="">
</span><p data-dcnode-id="12942"><span data-dcnode-id="12943" instrument_node="">But it’s not going to happen, because partisan Democrats aren’t actually taking the danger seriously.</span></p><span data-dcnode-id="12941" instrument_node="">
</span><p data-dcnode-id="12939"><span data-dcnode-id="12940" instrument_node="">I pray that what I see coming doesn’t actually take place. </span></p><span data-dcnode-id="12938" instrument_node="">
</span></div><span data-dcnode-id="12936" instrument_node="">

</span><li class="comment even thread-even depth-1 author-hash-4c4719" data-dcnode-id="12888" id="comment-2569022"><span data-dcnode-id="12914" instrument_node="">
</span><div class="comment-body" data-dcnode-id="12890" id="div-comment-2569022"><span data-dcnode-id="12913" instrument_node="">
</span><p data-dcnode-id="12911"><span data-dcnode-id="12912" instrument_node="">I’ve said before that I think the most likely outcome is that the Republicans take both houses in 2022 and then help Trump “win” in disregard of actual election results in 2024.</span></p><span data-dcnode-id="12910" instrument_node="">

</span><p data-dcnode-id="12856"><span data-dcnode-id="12857" instrument_node="">The good news is that Trump made sure that there would be no insurrection.</span></p><span data-dcnode-id="12855" instrument_node="">
</span><blockquote data-dcnode-id="12841"><p data-dcnode-id="12853"><span data-dcnode-id="12854" instrument_node=""> On Sunday, January 3, the heads of a half-dozen elite government special operations teams met in Quantico, Virginia, to go over potential threats, contingencies, and plans for the upcoming Joint Session of Congress. The meeting, and the subsequent deployment of these shadowy commandos on January 6, has never before been revealed</span></p><span data-dcnode-id="12852" instrument_node="">
</span><p data-dcnode-id="12850"><span data-dcnode-id="12851" instrument_node="">Right after the New Year, Jeffrey A. Rosen, the acting Attorney General on January 6, approved implementation of long-standing contingency plans dealing with the most extreme possibilities: an attack on President Donald Trump or Vice President Mike Pence, a terrorist attack involving a weapon of mass destruction, and a declaration of measures to implement continuity of government, requiring protection and movement of presidential successors.</span></p><span data-dcnode-id="12849" instrument_node="">
</span><p data-dcnode-id="12847"><span data-dcnode-id="12848" instrument_node="">Rosen made a unilateral decision to take the preparatory steps to deploy Justice Department and so-called “national” forces. There was no formal request from the U.S. Capitol Police, the Secret Service, or the Metropolitan Police Department—in fact, no external request from any agency. The leadership in Justice and the FBI anticipated the worst and decided to act independently, the special operations forces lurking behind the scenes.</span></p><span data-dcnode-id="12846" instrument_node="">
</span><p data-dcnode-id="12843"><a data-dcnode-id="12844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/amp/s/www.newsweek.com/exclusive-secret-commandos-shoot-kill-authority-were-capitol-1661330%253famp%3D1" rel="nofollow"><span data-dcnode-id="12845" instrument_node="">https://www.google.com/amp/s/www.newsweek.com/exclusive-secret-commandos-shoot-kill-authority-were-capitol-1661330%3famp=1</span></a></p><span data-dcnode-id="12842" instrument_node="">
</span></blockquote><span data-dcnode-id="12840" instrument_node="">
</span><p data-dcnode-id="12838"><span data-dcnode-id="12839" instrument_node="">If I was Capitol Police officer Eugene Goodman I’d be pretty torqued that my own department left me hanging out to dry, while the departments under Trump were actually preparing to defend “the movement of presidential successors.”</span></p><span data-dcnode-id="12837" instrument_node="">

</span><p data-dcnode-id="11914"><span data-dcnode-id="11915" instrument_node="">Rosen’s testimony:</span></p><span data-dcnode-id="11913" instrument_node="">
</span><blockquote data-dcnode-id="11900"><p data-dcnode-id="11911"><span data-dcnode-id="11912" instrument_node="">  District of Columbia Mayor Muriel Bowser wrote to Acting Defense Secretary Miller and me that MPD “is prepared for this week’s First Amendment Activities,” and that other than the logistical support of unarmed members of the DC National Guard, DC “has not requested personnel from any other federal law enforcement agencies.” </span></p><span data-dcnode-id="11910" instrument_node="">
</span><p data-dcnode-id="11906"><span data-dcnode-id="11909" instrument_node="">Nonetheless , although not specifically requested by MPD, Capitol Police, or any other agencies, my office directed various DOJ entities to take cautionary steps to alert or pre-position tactical teams if needed for support on January 6. For example, the FBI’s Hostage Rescue team and Render Safe teams were activated; an additional FBI SWAT team from Baltimore was repositioned to Washington, D.C.; ATF Special Response Teams were pre-positioned in Virginia for activation if needed; and USMS Special Operations Group personnel were also pre-positioned in Virginia for deployment if needed.2</span><br data-dcnode-id="11908"><span data-dcnode-id="11907" instrument_node="">
I believe that DOJ reasonably prepared for contingencies ahead of January 6, understanding that there was considerable uncertainty as to how many people would arrive, who those people would be, and precisely what purposes they would pursue. Unlike the police, DOJ had no frontline role with respect to crowd control. The FBI, ATF, DEA, and U.S. Attorneys’ offices, as investigative and prosecuting agencies, are generally not equipped for crowd control. But DOJ took appropriate precautions to have tactical support available if contingencies led to them being called upon.</span></p><span data-dcnode-id="11905" instrument_node="">
</span><p data-dcnode-id="11902"><a data-dcnode-id="11903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oversight.house.gov/sites/democrats.oversight.house.gov/files/Rosen%2520Testimony.pdf" rel="nofollow"><span data-dcnode-id="11904" instrument_node="">https://oversight.house.gov/sites/democrats.oversight.house.gov/files/Rosen%20Testimony.pdf</span></a></p><span data-dcnode-id="11901" instrument_node="">
</span></blockquote><span data-dcnode-id="11899" instrument_node="">

</span><p data-dcnode-id="11801"><a data-dcnode-id="11806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebulwark.com/the-good-coup/" rel="nofollow"><span data-dcnode-id="11807" instrument_node="">The Good Coup</span></a><br data-dcnode-id="11805"><span data-dcnode-id="11804" instrument_node="">
…….</span><br data-dcnode-id="11803"><span data-dcnode-id="11802" instrument_node="">
(Peter Navarro) told with (sic) Rolling Stone in an interview published Monday evening:</span></p><span data-dcnode-id="11800" instrument_node="">
</span><blockquote data-dcnode-id="11791"><p data-dcnode-id="11798"><span data-dcnode-id="11799" instrument_node="">It started flawlessly when [Arizona Rep. Paul] Gosar and [Texas Sen.] Cruz promptly at 1 p.m. called on scrutiny of the Arizona vote. Arizona was one of six battlegrounds: They were Arizona, Georgia, Michigan, Wisconsin, Pennsylvania, and Nevada. And it started flawlessly, but the violence overtook that event. The rest, as they, say is history . . .</span></p><span data-dcnode-id="11797" instrument_node="">
</span><p data-dcnode-id="11795"><span data-dcnode-id="11796" instrument_node="">My role in the whole thing was basically to provide Congress, via my reports, the analytical material they needed to actually make the challenges. And the president himself had distributed Volume One of the report to every member of the House and Senate a week or so earlier. . . .</span></p><span data-dcnode-id="11794" instrument_node="">
</span><p data-dcnode-id="11792"><span data-dcnode-id="11793" instrument_node="">There was a couple of times I walked over to the Oval—both times after I finished a report—and personally handed him one and briefed him on it. In the first case, in front of me, he asked Molly Michael, his assistant, to make sure everybody on the Hill promptly got a copy of it.</span></p></blockquote><span data-dcnode-id="11790" instrument_node="">
</span><p data-dcnode-id="11788"><span data-dcnode-id="11789" instrument_node="">His theory was that the objections would take many hours, and the media would be forced to cover it all, creating pressure to finally send Electoral College votes back to the states for “further review.” Because . . . reasons?</span></p><span data-dcnode-id="11787" instrument_node="">
</span><p data-dcnode-id="11785"><span data-dcnode-id="11786" instrument_node="">At that point, Navarro told Rolling Stone:</span></p><span data-dcnode-id="11784" instrument_node="">
</span><blockquote data-dcnode-id="11778"><p data-dcnode-id="11782"><span data-dcnode-id="11783" instrument_node="">One of two things could happen. They go back there [to the states], they look at it and they say, “Nope. It’s certified.” [The votes] come back, and that would be it. Fair enough.</span></p><span data-dcnode-id="11781" instrument_node="">
</span><p data-dcnode-id="11779"><span data-dcnode-id="11780" instrument_node="">But the more likely scenario based on our assessment of the evidence was that states would withdraw any certification. And the election would be thrown to the House of Representatives. And even though the House is controlled by Democrats, the way votes would be counted in a presidential election decided by the House, Trump would almost certainly win.
</span></p></blockquote><span data-dcnode-id="11777" instrument_node="">
</span><p data-dcnode-id="11775"><span data-dcnode-id="11776" instrument_node="">……..Navarro believes that this version of events clears Trump of any responsibility for the violence on January 6. He writes in his book that he, Bannon, and Trump were “the last three people on God’s good Earth who want to see violence erupt on Capitol Hill” because “it was this violence that finally put an abrupt end to any hope the president had for taking back an election likely stolen from him.”</span></p><span data-dcnode-id="11774" instrument_node="">
</span><p data-dcnode-id="11772"><span data-dcnode-id="11773" instrument_node="">In other words: He, Bannon, and Trump were in the middle of executing a legal coup, which the violent coup attempt foiled. Therefore, he, Bannon and Trump couldn’t possibly be responsible for the violent attempted coup. ……</span></p><span data-dcnode-id="11771" instrument_node="">
</span><p data-dcnode-id="11767"><span data-dcnode-id="11770" instrument_node="">What Navarro is arguing is that he had a good coup in mind. The rioters were trying to do a bad coup. He’s the good guy. The rioters—and, funnily enough, Mike Pence, whom Navarro accuses of “betrayal”—are the bad guys who got in the way of this good coup………</span><br data-dcnode-id="11769"><span data-dcnode-id="11768" instrument_node="">
……….</span></p><span data-dcnode-id="11766" instrument_node="">

</span><p data-dcnode-id="11738"><span data-dcnode-id="11739" instrument_node="">Moving EC allocation to the state legislatures would be less objectionable as it would allow voters an opportunity vote for those legislatures knowing what the process would be. It would be a undemocratic way to determine the EC and given how common gerrymandering has become I think it would be deeply flawed and unjust. But it would at least be honest and transparent. </span></p><span data-dcnode-id="11737" instrument_node="">
</span><p data-dcnode-id="11735"><span data-dcnode-id="11736" instrument_node="">The NVC would be more similar to what the GOP is doing if state legislatures chose to allocate EC votes /after/ the vote was held when they didn’t like the results, and used something other then actual vote totals to determine popular vote.</span></p><span data-dcnode-id="11734" instrument_node="">

</span><p data-dcnode-id="11382"><span data-dcnode-id="11383" instrument_node="">The PVC only matters where the election is very close and the reported popular vote and the reported electoral vote indicate different victors.  </span></p><span data-dcnode-id="11381" instrument_node="">
</span><p data-dcnode-id="11379"><span data-dcnode-id="11380" instrument_node="">Note that the electoral vote in this situation is NOT an accident, despite what they would have you believe.  It was an intentional thing, where the tie-breaker in a close election went to who had the widest support in the states.  It was part of the compromise that created the Senate, giving small (rural) states the power to avoid being run over by big (urban) states.</span></p><span data-dcnode-id="11378" instrument_node="">

</span><p data-dcnode-id="10879"><span data-dcnode-id="10880" instrument_node="">Aphrael,  </span></p><span data-dcnode-id="10878" instrument_node="">
</span><p data-dcnode-id="10876"><span data-dcnode-id="10877" instrument_node="">The system we have no was created with that distrust in mind.  That’s why we have recounts and such.  It is not really in dispute that the 2020 election was conducted differently than previous elections, but did not have new safeguards.</span></p><span data-dcnode-id="10875" instrument_node="">
</span><p data-dcnode-id="10873"><span data-dcnode-id="10874" instrument_node="">For example, in nearly every election up to that point, absentee ballots were uncommon — a few percent of the vote — and methods of validating them and their provenance were based on that small volume.  When you add that to things like partisan ballot harvesting, which have been mostly illegal up to this point for good reason, it is not unreasonable for there to be concerns.  Many things were now outside the control of election officials that were not before.  </span></p><span data-dcnode-id="10872" instrument_node="">
</span><p data-dcnode-id="10870"><span data-dcnode-id="10871" instrument_node="">Please don’t conflate uncertainty with Trump’s use of that uncertainty.  That’s not my point at all.</span></p><span data-dcnode-id="10869" instrument_node="">
</span><p data-dcnode-id="10867"><span data-dcnode-id="10868" instrument_node="">It is clear that some additional controls need to be put in place.</span></p><span data-dcnode-id="10866" instrument_node="">
</span><p data-dcnode-id="10864"><span data-dcnode-id="10865" instrument_node="">I cannot speak to the partisan nature of what individual state “election integrity” laws are doing, but it not impossible that some of these are addressing real concerns.  Some of them might aimed at partisan advantage, too.  Certainly the one in Congress has some obvious partisan aims.  I wish none of that were true, but as we see with reapportionment, legislatures are partisan beasts and it does not seem likely that this can be fixed any time soon.</span></p><span data-dcnode-id="10863" instrument_node="">

</span><div class="comment-body" data-dcnode-id="10411" id="div-comment-2569110"><span data-dcnode-id="10444" instrument_node="">
</span><p data-dcnode-id="10441"><em data-dcnode-id="10442"><span data-dcnode-id="10443" instrument_node="">Widespread absentee voting is a standard practice that has been in increasing use for many electoral cycles now. And yet it’s all of a sudden untrustworthy and must be reduced or eliminated — as far as I can tell, primarily because the people finding it untrustworthy disliked the outcome.</span></em></p><span data-dcnode-id="10440" instrument_node="">
</span><p data-dcnode-id="10438"><span data-dcnode-id="10439" instrument_node="">The states were it was challenged did not have that history.  And before 2020, most early voting was not by mail, at least in urban areas.  Colorado, Oregon, Washington and Utah are all states with remote areas that make mail voting attractive (and it is not true that there have been no disputes there anyway, particularly in Colorado).</span></p><span data-dcnode-id="10437" instrument_node="">
</span><p data-dcnode-id="10435"><span data-dcnode-id="10436" instrument_node="">PA was probably the most troublesome, due to the combined actions and inactions of the legislature, the courts and individual elections officials.  There were no common provenance rules, counting count not start in advance, each county counted ballots their way, and the reporting of the absentee ballots (which I paid careful attention to) was atrocious, at least in PA.  </span></p><span data-dcnode-id="10434" instrument_node="">
</span><p data-dcnode-id="10432"><span data-dcnode-id="10433" instrument_node="">PA officials made a great point to report both votes counted and “ballots still remaining.”  But the “ballots remaining” number kept increasing by large numbers throughout the next few days.  It is not hard to imagine skullduggery there if that what you want to see, and when Trump’s lead kept holding, but the ballots remaining kept growing, the eventual flip of the results left some people in disbelief.</span></p><span data-dcnode-id="10431" instrument_node="">
</span><p data-dcnode-id="10429"><span data-dcnode-id="10430" instrument_node="">And of course, Trump wanted to disbelieve.</span></p><span data-dcnode-id="10428" instrument_node="">

</span><blockquote data-dcnode-id="8627"><p data-dcnode-id="8640"><span data-dcnode-id="8641" instrument_node="">On Tuesday, CBS Mornings co-host Tony Dokoupil and Eurasia Group president Ian Bremmer sounded the alarm over the possibility of Republicans winning big in the 2022 midterm elections, something they hysterically labeled one of “the top global risks” in the year ahead. The pair claimed any GOP victory in the midterms or the 2024 presidential contest would be seen as “illegitimate.”</span></p><span data-dcnode-id="8639" instrument_node="">
</span><p data-dcnode-id="8637"><span data-dcnode-id="8638" instrument_node="">“A new report is detailing what it says are the biggest risks facing the globe in 2022 and the findings may surprise you,” Dokoupil declared. Turning to Bremmer, he touted: “Number three, midterm elections here in the U.S., a top risk for 2022. How come?”</span></p><span data-dcnode-id="8636" instrument_node="">
</span><p data-dcnode-id="8634"><span data-dcnode-id="8635" instrument_node="">In reply, Bremmer wailed:</span></p><span data-dcnode-id="8633" instrument_node="">
</span><p data-dcnode-id="8631"><span data-dcnode-id="8632" instrument_node="">Well, maybe the least of the surprises. This is the most important midterm election in American history. We have January 6 coming up in just a day and as you know, since the profoundly challenged elections of 2020, no lessons have been learned at all in the United States. The country is much more divided and a large number of Americans, 64% in an NPR poll yesterday, say they thought the United States’ democracy was in crisis.</span></p><span data-dcnode-id="8630" instrument_node="">
</span><p data-dcnode-id="8628"><span data-dcnode-id="8629" instrument_node="">He went on to specifically identify the Republican Party as the source of the supposed global threat: “…the United States has an election process that is increasingly broken, increasingly delegitimized. And the midterm elections, especially if you have significant win for a Trump-led Republican Party, means that 2024 is going to be seen as illegitimate and potentially a constitutional crisis.”</span></p></blockquote><span data-dcnode-id="8626" instrument_node="">

</span><p data-dcnode-id="7549"><span data-dcnode-id="7550" instrument_node="">Indeed, and my concerns about changes to the Electoral system argue for this as well.  I’m just not sure how one would change it.  What is the rule for competing slates?</span></p><span data-dcnode-id="7548" instrument_node="">
</span><p data-dcnode-id="7546"><span data-dcnode-id="7547" instrument_node="">Is the state-certified slate to always be accepted?</span></p><span data-dcnode-id="7545" instrument_node="">
</span><p data-dcnode-id="7543"><span data-dcnode-id="7544" instrument_node="">Is the vote of the state’s citizenry to always be respected?</span></p><span data-dcnode-id="7542" instrument_node="">
</span><p data-dcnode-id="7540"><span data-dcnode-id="7541" instrument_node="">Are the state’s courts to have the final say?</span></p><span data-dcnode-id="7539" instrument_node="">
</span><p data-dcnode-id="7537"><span data-dcnode-id="7538" instrument_node="">All of these can be problematical if someone wants to make them that way.  The only good news is that, unlike 1876, everyone has visibility into the process, however distorted by the lens they peer through.</span></p><span data-dcnode-id="7536" instrument_node="">

</span><blockquote data-dcnode-id="7444"><p data-dcnode-id="7445"><span data-dcnode-id="7446" instrument_node="">Whenever any State has held an election for the purpose of choosing electors, and has failed to make a choice on the day prescribed by law, the electors may be appointed on a subsequent day in such a manner as the legislature of such State may direct.”</span></p></blockquote><span data-dcnode-id="7443" instrument_node="">
</span><p data-dcnode-id="7435"><span data-dcnode-id="7442" instrument_node="">It then goes on to describe further limitations on this to avoid sham “failures” of the type Patterico worries about. </span><em data-dcnode-id="7440"><span data-dcnode-id="7441" instrument_node=""> But it in no place describes</span></em><span data-dcnode-id="7439" instrument_node=""> what happens if a State has held an election </span><strong data-dcnode-id="7437"><span data-dcnode-id="7438" instrument_node="">NOT</span></strong><span data-dcnode-id="7436" instrument_node=""> for the purpose of choosing electors, but for some other reason such as the state’s contribution to a national popular vote system that will instead choose electors.</span></p><span data-dcnode-id="7434" instrument_node="">

</span><p data-dcnode-id="7409"><span data-dcnode-id="7410" instrument_node="">More from stalwart Hogan:</span></p><span data-dcnode-id="7408" instrument_node="">
</span><blockquote data-dcnode-id="7388"><p data-dcnode-id="7406"><span data-dcnode-id="7407" instrument_node=""> Hogan said he was scheduled to participate in a call with the White House on Tuesday. He said he would urge President Joe Biden’s administration to increase the distribution of monoclonal antibodies, rapid COVID-19 tests and antiviral pills.</span></p><span data-dcnode-id="7405" instrument_node="">
</span><p data-dcnode-id="7403"><span data-dcnode-id="7404" instrument_node="">Hogan said people need to get back to taking stronger precautions as the omicron variant of COVID-19 surges by “avoiding crowds, keeping your distance, washing your hands and yes, wearing the damn masks.”</span></p><span data-dcnode-id="7402" instrument_node="">
</span><p data-dcnode-id="7400"><span data-dcnode-id="7401" instrument_node="">The governor also said that he is “doing fine” after testing positive for COVID-19 last month. Hogan said he had a 10-day “staycation” in isolation in the basement of the governor’s residence, where he worked and kept in touch with staff.</span></p><span data-dcnode-id="7399" instrument_node="">
</span><p data-dcnode-id="7397"><span data-dcnode-id="7398" instrument_node="">“For me, it was like a pretty bad cold, and that’s because I was fully vaccinated and boosted,” Hogan said, as he continued urging the unvaccinated to get shot and for eligible people to get boosters.</span></p><span data-dcnode-id="7396" instrument_node="">
</span><p data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">The governor also said he received monoclonal antibody treatment early on.</span></p><span data-dcnode-id="7393" instrument_node="">
</span><p data-dcnode-id="7390"><a data-dcnode-id="7391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcwashington.com/news/local/maryland-gov-declares-state-of-emergency-due-to-virus-surge/2926712/" rel="nofollow"><span data-dcnode-id="7392" instrument_node="">https://www.nbcwashington.com/news/local/maryland-gov-declares-state-of-emergency-due-to-virus-surge/2926712/</span></a></p><span data-dcnode-id="7389" instrument_node="">
</span></blockquote><span data-dcnode-id="7387" instrument_node="">
</span><p data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">It was like a bad cold because he was vaccinated and boosted!</span></p><span data-dcnode-id="7384" instrument_node="">
</span><p data-dcnode-id="7382"><span data-dcnode-id="7383" instrument_node="">Oh.. and like with all bad colds he went in for a session of monoclonal antibodies…</span></p><span data-dcnode-id="7381" instrument_node="">
</span><p data-dcnode-id="7379"><span data-dcnode-id="7380" instrument_node="">What a fraud.</span></p><span data-dcnode-id="7378" instrument_node="">

</span><div class="comment-body" data-dcnode-id="6795" id="div-comment-2569282"><span data-dcnode-id="6850" instrument_node="">
</span><p data-dcnode-id="6846"><a data-dcnode-id="6848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frenchpress.thedispatch.com/p/stop-screwing-around-and-reform-the" rel="nofollow"><span data-dcnode-id="6849" instrument_node="">French</span></a><span data-dcnode-id="6847" instrument_node=""> and Patterico are on the same wavelength when it comes to the Electoral Count Act, coming out with posts on the same day on this subject. I’m going to excerpt French’s offering liberally because it’s important, IMO…</span></p><span data-dcnode-id="6845" instrument_node="">
</span><blockquote data-dcnode-id="6826"><p data-dcnode-id="6843"><span data-dcnode-id="6844" instrument_node="">Here’s another example of potential stupidity: If—after everything we’re learning about January 6 and Trump’s effort to steal the election—we don’t reform the Electoral Count Act, we’re idiots. There’s just no other way to say it.</span></p><span data-dcnode-id="6842" instrument_node="">
</span><p data-dcnode-id="6840"><span data-dcnode-id="6841" instrument_node="">If that sounds a bit wonky and weird, the reasoning is easy enough to explain. Congress passed the Electoral Count Act in 1887 as a decade-overdue response to the disputed election of 1876. It’s supposed to provide a mechanism for responding to and resolving disputes in counting and certifying the vote of the Electoral College, and while the overall intent is relatively clear, the language itself is a ridiculous mess. </span></p><span data-dcnode-id="6839" instrument_node="">
</span><p data-dcnode-id="6837"><span data-dcnode-id="6838" instrument_node="">No, really. It is. During Trump’s election contests, Sarah and I spent multiple podcasts referring to the ECA, walking through its sentences, and all too often laughing out loud at its language. Don’t take my word for it. Here’s the key text, quoted in full. And yes, it is just one gigantic paragraph:</span></p><span data-dcnode-id="6836" instrument_node="">
</span><blockquote data-dcnode-id="6833"><p data-dcnode-id="6834"><span data-dcnode-id="6835" instrument_node="">Congress shall be in session on the sixth day of January succeeding every meeting of the electors. The Senate and House of Representatives shall meet in the Hall of the House of Representatives at the hour of 1 o’clock in the afternoon on that day, and the President of the Senate shall be their presiding officer. Two tellers shall be previously appointed on the part of the Senate and two on the part of the House of Representatives, to whom shall be handed, as they are opened by the President of the Senate, all the certificates and papers purporting to be certificates of the electoral votes, which certificates and papers shall be opened, presented, and acted upon in the alphabetical order of the States, beginning with the letter A; and said tellers, having then read the same in the presence and hearing of the two Houses, shall make a list of the votes as they shall appear from the said certificates; and the votes having been ascertained and counted according to the rules in this subchapter provided, the result of the same shall be delivered to the President of the Senate, who shall thereupon announce the state of the vote, which announcement shall be deemed a sufficient declaration of the persons, if any, elected President and Vice President of the United States, and, together with a list of the votes, be entered on the Journals of the two Houses. Upon such reading of any such certificate or paper, the President of the Senate shall call for objections, if any. Every objection shall be made in writing, and shall state clearly and concisely, and without argument, the ground thereof, and shall be signed by at least one Senator and one Member of the House of Representatives before the same shall be received. When all objections so made to any vote or paper from a State shall have been received and read, the Senate shall thereupon withdraw, and such objections shall be submitted to the Senate for its decision; and the Speaker of the House of Representatives shall, in like manner, submit such objections to the House of Representatives for its decision; and no electoral vote or votes from any State which shall have been regularly given by electors whose appointment has been lawfully certified to according to section 6 of this title from which but one return has been received shall be rejected, but the two Houses concurrently may reject the vote or votes when they agree that such vote or votes have not been so regularly given by electors whose appointment has been so certified. If more than one return or paper purporting to be a return from a State shall have been received by the President of the Senate, those votes, and those only, shall be counted which shall have been regularly given by the electors who are shown by the determination mentioned in section 5 of this title to have been appointed, if the determination in said section provided for shall have been made, or by such successors or substitutes, in case of a vacancy in the board of electors so ascertained, as have been appointed to fill such vacancy in the mode provided by the laws of the State; but in case there shall arise the question which of two or more of such State authorities determining what electors have been appointed, as mentioned in section 5 of this title, is the lawful tribunal of such State, the votes regularly given of those electors, and those only, of such State shall be counted whose title as electors the two Houses, acting separately, shall concurrently decide is supported by the decision of such State so authorized by its law; and in such case of more than one return or paper purporting to be a return from a State, if there shall have been no such determination of the question in the State aforesaid, then those votes, and those only, shall be counted which the two Houses shall concurrently decide were cast by lawful electors appointed in accordance with the laws of the State, unless the two Houses, acting separately, shall concurrently decide such votes not to be the lawful votes of the legally appointed electors of such State. But if the two Houses shall disagree in respect of the counting of such votes, then, and in that case, the votes of the electors whose appointment shall have been certified by the executive of the State, under the seal thereof, shall be counted. When the two Houses have voted, they shall immediately again meet, and the presiding officer shall then announce the decision of the questions submitted. No votes or papers from any other State shall be acted upon until the objections previously made to the votes or papers from any State shall have been finally disposed of.</span></p></blockquote><span data-dcnode-id="6832" instrument_node="">
</span><p data-dcnode-id="6830"><span data-dcnode-id="6831" instrument_node="">I apologize for inflicting that on you, but it has to be seen—to be read, if you dare—to be believed. For those keeping score at home, that is a single 809-word paragraph that succeeds mainly in creating multiple points of confusion and empowering frivolous and bad-faith congressional challenges to electoral outcomes.</span></p><span data-dcnode-id="6829" instrument_node="">
</span><p data-dcnode-id="6827"><span data-dcnode-id="6828" instrument_node="">Moreover, we have learned since January 6 that the act’s flaws and ambiguities were the legal cornerstone of Trump’s effort to overturn the election. In an extended interview with Rolling Stone magazine, former Trump adviser Peter Navarro detailed how he and Steve Bannon developed a plan they called the “Green Bay sweep” that was designed to specifically exploit the Electoral Count Act’s objection provisions to engineer (at the very least) a marathon, 24-hour debate about the election outcome that could empower Vice President Pence to delay certification.</span></p></blockquote><span data-dcnode-id="6825" instrument_node="">
</span><p data-dcnode-id="6823"><span data-dcnode-id="6824" instrument_node="">If the law is so badly written that a couple or three hyperpartisan hacks can exploit it for their political advantage, then what better reason to fix it as soon as possible, and the prescriptions are common sense.</span></p><span data-dcnode-id="6822" instrument_node="">
</span><blockquote data-dcnode-id="6813"><p data-dcnode-id="6820"><span data-dcnode-id="6821" instrument_node="">At a minimum, what do we need to do? First, make it crystal clear that the vice president has zero discretion to reject the electoral votes of any state. His or her role should be procedural only, running the joint session of Congress that counts the Electoral College votes.</span></p><span data-dcnode-id="6819" instrument_node="">
</span><p data-dcnode-id="6817"><span data-dcnode-id="6818" instrument_node="">Second, a reformed Electoral Count Act should dramatically raise the threshold for objecting to the electoral votes of any state. Presently it takes just one member of the House and one member of the Senate to initiate a debate about any state. I’d like to see it take a majority of the House and a majority of the Senate to initiate debate and a supermajority of both houses to decertify any electoral votes. </span></p><span data-dcnode-id="6816" instrument_node="">
</span><p data-dcnode-id="6814"><span data-dcnode-id="6815" instrument_node="">Moreover, a reformed Electoral Count Act would narrowly specify the grounds for any congressional decertification. For example, if electors cast votes for a person constitutionally ineligible for the office, or if electors cast votes even if the vote has been set aside for fraud by a court of final jurisdiction. And any reform should provide precise guidance for state certifications, so that there is minimal opportunity for Congress to face so-called “competing” slates of electors.</span></p></blockquote><span data-dcnode-id="6812" instrument_node="">

</span><p data-dcnode-id="6568"><span data-dcnode-id="6569" instrument_node="">Is French only referring to recent events here, or least those within the last 20-odd years?  Because by his argument, the ECA should have thrown presidential elections in to chaos long before then.  This appears more to be an exercise in question-begging over fears of what might be, rather than actual historical fact.</span></p><span data-dcnode-id="6567" instrument_node="">
</span><p data-dcnode-id="6565"><span data-dcnode-id="6566" instrument_node="">And let’s get real here–these arguments that Trump loyalists are positioning themselves to blatantly steal elections are being made by the same Democrat-aligned media Squealers who sound the alarm every time conservatives shake off the doldrums of their “all government is bad” apathy and become politically active, consistently making allusions to the dark curtain of fascism falling, with all the subtlety of a brick.  Because in their mind, anything which doesn’t go down the road of socialism/Marxism is going down the road to fascism.  It’s paranoid, binary, childish, stunted thinking, but that’s been de riguer of the left for at least the last 50 years.</span></p><span data-dcnode-id="6564" instrument_node="">
</span><p data-dcnode-id="6562"><span data-dcnode-id="6563" instrument_node="">These aren’t news reports being made in good faith.  They’re propaganda pieces to get the Democratic base motivated to turn out for Democrats in a mid-term where all the indications are that they are going to get absolutely waxed due to the long-coming backlash against their multi-year woke limpout that’s been gaining momentum since Occupy.  Their side controls the mass media (both news and entertainment), the Tech Trust, the educational complex from Pre-K through the universities, corporate boardrooms, professional sports leagues, the military leadership, the intel agencies, and government bureaucracies from top to bottom, all parroting the neo-Marxist shibboleths cooked up by radical left academics from the last 25-odd years.  </span></p><span data-dcnode-id="6561" instrument_node="">
</span><p data-dcnode-id="6559"><span data-dcnode-id="6560" instrument_node="">But because there’s still a sizable population in this country that doesn’t want them to steamroll their political ideology down everyone’s throat, and because their oppression-obsessed mindset DEMANDS that they be the underdogs even when they control every single one of the nation’s institutions of power and culture, they continue with their dissembling that the country is on the brink and some right-wing dictatorship is going to take over to start unwinding their power gains.</span></p><span data-dcnode-id="6558" instrument_node="">
</span><p data-dcnode-id="6556"><span data-dcnode-id="6557" instrument_node="">Truth be told?  The vast majority of conservatives just want to be left the hell alone, and if it did come down to the country breaking apart, prefer an amicable national divorce or a change to a regionalist framework where the federal government’s role is closer to what it was during the first half of the 19th century.  To the extent that they’re accepting of engaging in a violent conflict, is largely due to the left’s dogged insistence that they’ll be made to obey left-liberal dictats or else.  Ironically, leftists like Fred de Boer and Matt Taibbi recognize this and keep telling their side to back off and let things cool down, but they’re consistently ignored.</span></p><span data-dcnode-id="6555" instrument_node="">
</span><p data-dcnode-id="6553"><span data-dcnode-id="6554" instrument_node="">If the Road War does kick off, it won’t be due to a grassroots effort by Republicans to subvert state elections.  It will be more similar to what happened prior to the Spanish Civil War when the radical left couldn’t keep their will to power in check and finally sparked a backlash.</span></p><span data-dcnode-id="6552" instrument_node="">

</span><p data-dcnode-id="6219"><span data-dcnode-id="6220" instrument_node="">If Trump’s coup had succeeded even on a temporary basis it would have broken our faith in our governmental processes and our government for at least 60 years and maybe for longer, if it didn’t break the country entirely.  It would have put us back into a cultural situation similar to the immediately post civil war period where trust was broken between citizens and even between family members.  We might have gone back to an uneasy reconciliation or it might’ve broken our democracy entirely, it’s too hard to figure out who would have really jumped which way when the rubber hit the road.  (in the aftermath when “nothing” really happened, it’s easy to poopoo the situation for selfish political purposes, so it’s entirely possible that people who currently are saying “no big” and “Trump cool” and “I have questions about the election” would’ve been horrified if they had ACTUALLY been held hostage by the Jan 6 insurrection mob.)  Trump’s attempt goes against the entire foundation of the country as it was laid over 200 years ago and reinforced in (almost) every election since.  What he’s been doing since he lost would break necessary trust systems if he were successful.</span></p><span data-dcnode-id="6218" instrument_node="">
</span><p data-dcnode-id="6216"><span data-dcnode-id="6217" instrument_node="">Kevin’s worry about the NPVC would break different things in a very different way.  It would probably cause a constitutional crisis, but it fits within the national philosophy that we vote for president so I don’t think it would break the country or the system itself, certainly not in the same way, though it would also create a distrust in the system.  </span></p><span data-dcnode-id="6215" instrument_node="">
</span><p data-dcnode-id="6213"><span data-dcnode-id="6214" instrument_node="">However, I also suspect we may be  headed for some kind of change or a crisis in the system regardless.  Right now a presidential vote in a populous state is worth significantly less than a presidential vote in a less populous state and if something doesn’t change in the ways that populations are shifting, that gap will continue to get wider and wider and at some point I think it will be seen as unacceptable to the people in more populous states. Though if climate change does what the more popular models says it could, it may do us a favor on this one and start shifting people north and inland again, IDK.</span></p><span data-dcnode-id="6212" instrument_node="">

</span><p data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">No, it’s not. I see this talking point from left-liberals all the time, and it’s an absolute garbage take of circular reasoning, sour grapes, and sheer entitlement on the level of “our side won the most votes nationwide, so it should have the most representatives!”.  </span></p><span data-dcnode-id="6120" instrument_node="">
</span><p data-dcnode-id="6118"><span data-dcnode-id="6119" instrument_node="">In no universe does Wyoming’s presidential vote hold more worth than California, New York, or Texas.  There’s no such thing as a “per capita” electoral vote–you either win the state or you don’t based on if you win the most votes in that particular state, with the exception of Nebraska and Maine if the candidate gets the most votes but loses certain districts.  </span></p><span data-dcnode-id="6117" instrument_node="">
</span><p data-dcnode-id="6115"><span data-dcnode-id="6116" instrument_node="">It has jack squat to do with “number of people per electoral vote,” and it’s not conservatives’ fault that leftists tend to mass in large urban areas.  Probably because when leftists do end up migrating out to more rural areas, their sheer presence and political smugness tends to exacerbate social fissures in communities where this sort of social conflict is particularly harmful (Bobbi Harlow’s inner monologue in her first appearance in “Bloom County” is the epitome of the left-liberal migrant to small-town America).</span></p><span data-dcnode-id="6114" instrument_node="">
</span><p data-dcnode-id="6111"><em data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node=""> that gap will continue to get wider and wider and at some point I think it will be seen as unacceptable to the people in more populous states. </span></em></p><span data-dcnode-id="6110" instrument_node="">
</span><p data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">The only way Texas starts acting as if North Dakota holds more electoral sway than them is if Texas becomes a reliable Democrat vote in presidential elections again.</span></p><span data-dcnode-id="6107" instrument_node="">

</span><p data-dcnode-id="6082"><span data-dcnode-id="6083" instrument_node="">So, let’s run through the issues here.</span></p><span data-dcnode-id="6081" instrument_node="">
</span><p data-dcnode-id="6079"><span data-dcnode-id="6080" instrument_node="">1.  We are only talking about a close election.  And by close we mean close in the electoral college at this point in time.  </span></p><span data-dcnode-id="6078" instrument_node="">
</span><p data-dcnode-id="6076"><span data-dcnode-id="6077" instrument_node="">2.  Even so, the popular vote is informative.  Trump’s arguments would have fared better had he won the popular vote.  Had Hillary had a reasonable claim in 2016 that could have flipped MI and PA, we would have heard about it, and it would have gotten some traction due to her popular vote win.  Probably not enough, but it would have come up.</span></p><span data-dcnode-id="6075" instrument_node="">
</span><p data-dcnode-id="6073"><span data-dcnode-id="6074" instrument_node="">3.  In this close election, the danger is that some scoundrels who have insinuated themselves into power in one or more narrowly-decided states would seek to RF the process so that the legislature would have to sorrowfully step in.</span></p><span data-dcnode-id="6072" instrument_node="">
</span><p data-dcnode-id="6070"><span data-dcnode-id="6071" instrument_node="">4.  At this point the scoundrels (could be either party) have to get past both the legislature’s massive disinclination to thwart what the voters think was their decision, A governor who may not be on board, as well as the state courts who will have no choice but to step in.  Presumably one of these forces is not composed of rotters.</span></p><span data-dcnode-id="6069" instrument_node="">
</span><p data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">5.  But let’s say they are, and a bogus slate comes to Congress from state X, altering the very close result.</span></p><span data-dcnode-id="6066" instrument_node="">
</span><p data-dcnode-id="6055"><span data-dcnode-id="6065" instrument_node="">6.  Now, Congress has to accept or reject this slate, deciding the election.  Obviously a challenge is made.  Is it reasonable to conclude that 218 Congressfolk and 50 or more Senators are going to agree to this steal?  Everyone knows what the issues are and most people are aware of the facts.  This is not 1876.  They may be lied to about it, and there will be different opinions expressed in the media, but </span><i data-dcnode-id="6063"><span data-dcnode-id="6064" instrument_node="">we have been here before recently</span></i><span data-dcnode-id="6062" instrument_node="">.</span><br data-dcnode-id="6061"><span data-dcnode-id="6060" instrument_node="">
&nbsp;</span><br data-dcnode-id="6059"><span data-dcnode-id="6058" instrument_node="">
&nbsp;</span><br data-dcnode-id="6057"><span data-dcnode-id="6056" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="6054" instrument_node="">
</span><p data-dcnode-id="6052"><span data-dcnode-id="6053" instrument_node="">Florida 2000 was very near this situation.  It is quite likely that there was skullduggery on both sides during the recount, and the ballot design was a piece of crap.  The state supreme court picked a side and was roundly denounced by its own Chief Justice.  The Secretary of State was a clown.  </span></p><span data-dcnode-id="6051" instrument_node="">
</span><p data-dcnode-id="6049"><span data-dcnode-id="6050" instrument_node="">It turned out that the US Supreme Court refused to let the election fail, and we did not have the issue of a legislative slate.  But we might have had one and it still would have been OK, even though Gore won the popular vote.  It might have come out for Gore, too, and that would have been all right (with a different group of grumps).</span></p><span data-dcnode-id="6048" instrument_node="">

</span><div class="comment-body" data-dcnode-id="5926" id="div-comment-2569321"><span data-dcnode-id="5973" instrument_node="">
</span><p data-dcnode-id="5971"><span data-dcnode-id="5972" instrument_node="">With a Popular Vote Compact there are more points of failure.</span></p><span data-dcnode-id="5970" instrument_node="">
</span><p data-dcnode-id="5968"><span data-dcnode-id="5969" instrument_node="">1.  Let’s say that the PVC comes into effect with a final state putting the EV total of signatories to 285.</span></p><span data-dcnode-id="5967" instrument_node="">
</span><p data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">2.  The popular vote is close.  175 million votes cast, and the Democrat leads the popular vote with a margin of 350,000 votes, or 0.2% (roughly JFK’s margin in 1960).  Another million votes to 3rd parties, not that we care.</span></p><span data-dcnode-id="5964" instrument_node="">
</span><p data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">3.  The electoral vote, however is 265-283 the other way.  Of the PVC states, only PA voted for the Republican, everyone else voted identically to their PVC status (K.I.S.S. – obviously there are more complex things that could happen).</span></p><span data-dcnode-id="5961" instrument_node="">
</span><p data-dcnode-id="5959"><span data-dcnode-id="5960" instrument_node="">4.  A lawsuit in PA, alleging that the PVC is an illegal compact, that the legislature did not have the right to alter the form of the election without going through Steps A, B or C, and in any even does not bind the now-GOP legislature.  If it matters, the suit was filed before the election.</span></p><span data-dcnode-id="5958" instrument_node="">
</span><p data-dcnode-id="5956"><span data-dcnode-id="5957" instrument_node="">5.  The state supreme court rules that the PVC was unlawfully passed (e.g. it needed to be an amendment to the state constitution) and orders the Democrat Secretary of State to certify the winner of PA’s own election and empanel the GOP electors.</span></p><span data-dcnode-id="5955" instrument_node="">
</span><p data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">6.  The Secretary of State ignores the order,  and empanels the Democrat slate, as per the PVC, and later certifies their votes, as does the Democrat governor.</span></p><span data-dcnode-id="5952" instrument_node="">
</span><p data-dcnode-id="5950"><span data-dcnode-id="5951" instrument_node="">7.  The GOP slate meets as well, and sends their votes to Congress, with a copy of the state supreme court order.  A narrowly GOP legislature (which tried and failed to rescind the PVC approval)  passes a resolution in favor of the GOP slate.</span></p><span data-dcnode-id="5949" instrument_node="">
</span><p data-dcnode-id="5947"><span data-dcnode-id="5948" instrument_node="">8.  While this is going on, due to the closeness of the vote 23 states being recounts and 28 lawsuits are filed in the rest demanding same.  Since the national popular vote is now part of the equation, even California with an 8 million vote margin is requested to recount recount.</span></p><span data-dcnode-id="5946" instrument_node="">
</span><p data-dcnode-id="5944"><span data-dcnode-id="5945" instrument_node="">Please tell me what Congress should do with these slates, and what effect a recount has on the process.</span></p><span data-dcnode-id="5943" instrument_node="">

</span><p data-dcnode-id="4923"><span data-dcnode-id="4924" instrument_node="">Honest discussions of the type you talk about have been made impossible by Trump. Every discussion is a proxy for the ex-President’s hurt feelings.</span></p><span data-dcnode-id="4922" instrument_node="">

</span><p data-dcnode-id="4885"><span data-dcnode-id="4889" instrument_node="">This Washington Post op-ed, </span><a data-dcnode-id="4887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/opinions/2022/01/04/congress-fix-electoral-count-act/" rel="nofollow"><span data-dcnode-id="4888" instrument_node="">How Congress can fix the Electoral Count Act</span></a><span data-dcnode-id="4886" instrument_node="">, begins with two reasonable principles for a fix.</span></p><span data-dcnode-id="4884" instrument_node="">
</span><blockquote data-dcnode-id="4875"><p data-dcnode-id="4882"><span data-dcnode-id="4883" instrument_node="">We are scholars of election law who span the ideological spectrum but agree on two fundamental principles to help avert potential political upheaval in the aftermath of the 2024 presidential election.</span></p><span data-dcnode-id="4881" instrument_node="">
</span><p data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">First, to avoid a repeat of Jan. 6, or worse, Congress must rewrite the Electoral Count Act, the outmoded 1887 law that governs the certification of the presidential vote. There is a pressing need for a clear set of rules to govern the certification of the presidential vote.</span></p><span data-dcnode-id="4878" instrument_node="">
</span><p data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">Second, this revision should be based on the premise that Congress is not a national recount board or a court for litigating the outcome of presidential elections. It is not the role of Congress to revisit a state’s popular vote tally.</span></p></blockquote><span data-dcnode-id="4874" instrument_node="">
</span><span class="comment-author vcard" data-dcnode-id="4869"><span data-dcnode-id="4873" instrument_node="">

</span><p data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">I appreciate your effort to avoid conflating the 1-6 invasion of the Capitol with Trump’s effort to overturn election results he didn’t like. I have seen no evidence that Trump’s people were involved with the actual riot. Maybe the Commission has something, but I think it would have leaked by now. The Dems really need to watch it on this kind of thing — if they propound a grand conspiracy that the facts do not bear out — they will lose the middle — which will end up dismissing everything as lies. The Big Lie made 1-6 possible. But the Big Liars behind it plotted a bloodless coup, not the 1-6 mess.</span></p><span data-dcnode-id="4845" instrument_node="">
</span><p data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">What we do see is a President who was not as disturbed by the riot as he should have been and one who acted slowly to combat it. This is a dereliction of duty on its own. (The Big Lie is another — but that’s not what the 1-6 Committee is really supposed to be investigating.)</span></p><span data-dcnode-id="4842" instrument_node="">

</span><blockquote data-dcnode-id="4726"><p data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node=""> weren’t all these people unvaccinated when less people died with Covid during the Trump administration? </span></p></blockquote><span data-dcnode-id="4725" instrument_node="">
</span><p data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node=""> One possible partial explanation is that since 2020 we had Delta. </span></p><span data-dcnode-id="4722" instrument_node="">
</span><p data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">But there was another thing. Before Delta hit, and when maybe the worst was Alpha, there was an upsurge in coronavirus cases during late 20920 and early 2021. That could be on Trump, for not pushing and making sure monoclonal antibodies were distributed and used. Vaccination hadn’t yet had a chance to have much of an effect. </span></p><span data-dcnode-id="4719" instrument_node="">
</span><p data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">But the question still is why did it take so long after April, 2020 for cases to increase? Maybe the lockdowns etc worked until people gave them up in part.</span></p><span data-dcnode-id="4716" instrument_node="">

</span><p data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">237. AJ_Liberty (5f05c3) —	1/5/2022 @ 10:59 am </span></p><span data-dcnode-id="4690" instrument_node="">
</span><blockquote data-dcnode-id="4687"><p data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node=""> It REALLY was in Trump’s interest to shut down the riot, which makes it double interesting why he chose to watch it spiral. </span></p></blockquote><span data-dcnode-id="4686" instrument_node="">
</span><p data-dcnode-id="4684"><span data-dcnode-id="4685" instrument_node=""> Two reasons:</span></p><span data-dcnode-id="4683" instrument_node="">
</span><p data-dcnode-id="4678"><span data-dcnode-id="4682" instrument_node="">1. He didn’t believe he could shut it down (and neither do the messages from Laura Ingraham and Sean Hannity indicate that </span><i data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node=""> they </span></i><span data-dcnode-id="4679" instrument_node=""> believed that, let alone “knew” that, as the January 6 committee charged) </span></p><span data-dcnode-id="4677" instrument_node="">
</span><p data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">Issuing a statement condemning the riot was, and would have been, done for its effect on Congress, (and on his own reputation, and he believed also that saying his followers were doing wrong harmed his reputation – he wanted to say the people storming the Capitol building were not his followers, but Antifa militants, but that dog didn’t hunt.) </span></p><span data-dcnode-id="4674" instrument_node="">
</span><p data-dcnode-id="4670"><span data-dcnode-id="4673" instrument_node="">And he also thought he could use requests to condemn it as a bargaining lever with some members of</span><br data-dcnode-id="4672"><span data-dcnode-id="4671" instrument_node="">
Congress..</span></p><span data-dcnode-id="4669" instrument_node="">
</span><p data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">2. He had other priorities – his worry was that Senators and Representatives would back off from objecting to Electoral votes, because they were considering doing so, and they did (they reduced the number of objections from six to two. </span></p><span data-dcnode-id="4666" instrument_node="">
</span><p data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">Trump was pleading with members of Congress, to please not cancel the votes and debates just because of this disruption. They were reconsidering and backing off.</span></p><span data-dcnode-id="4663" instrument_node="">
</span><p data-dcnode-id="4659"><a data-dcnode-id="4661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/02/11/tuberville-pences-evacuation-trump-impeachment-468572" rel="nofollow"><span data-dcnode-id="4662" instrument_node="">https://www.politico.com/news/2021/02/11/tuberville-pences-evacuation-trump-impeachment-468572</span></a><span data-dcnode-id="4660" instrument_node=""> </span></p><span data-dcnode-id="4658" instrument_node="">

</span><blockquote data-dcnode-id="4623"><p data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">If Trump’s coup had succeeded even on a temporary basis it would have broken our faith in our governmental processes and our government for at least 60 years</span></p></blockquote><span data-dcnode-id="4622" instrument_node="">
</span><p data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">It already has, to a great extent. No matter how many investigations and audits end up not finding the massive fraud that partisans were seeking, the Trumpified GOP will keep insisting that the election was rigged and they, aka “real Americans,” were robbed. Lack of evidence is turned into proof of how diabolical the plot was.</span></p><span data-dcnode-id="4619" instrument_node="">
</span><p data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">Trumpers apparently never pause to reflect on the fact that their idol was systematically setting up the “rigged election” narrative long before November 2020. In fact, he did the same, though not as heavily, leading up to the 2016 election. </span></p><span data-dcnode-id="4616" instrument_node="">
</span><p data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">They won’t acknowledge the clear pathological narcissism of their idol, who obviously believes that he could not possibly lose a fair contest, ever. Instead, they turned him into their oracle of truth and patriotic righteousness. Donald Trump loves America more than you (they insist), so his every word and action are an unquestionable guide for all true patriots. If Trump says he was cheated out of reelection, it cannot be otherwise. Evidence is superfluous.</span></p><span data-dcnode-id="4613" instrument_node="">
</span><p data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">The distrust of institutions and hatred of “the establishment” are not Trump’s original creation, of course. But his extreme narcissism and disregard for rules, cloaked in a veneer of shallow patriotism and a transactional leaning toward “average Americans,” gave it a human embodiment who found popular resentments to be the perfect vehicle for boosting his ego into demigod territory. Even some actual elites have decided that stroking Trump’s ego at all times is the way to advance their political or cultural agendas. </span></p><span data-dcnode-id="4610" instrument_node="">
</span><p data-dcnode-id="4605"><span data-dcnode-id="4609" instrument_node="">Donald Trump and the people who anointed him the </span><em data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">ne plus ultra</span></em><span data-dcnode-id="4606" instrument_node=""> of real American patriotism have taken most of a political party into deep animosity toward the system when it doesn’t deliver the results they want, and some are now rather openly saying that violence may be justified as the only way to “fight back.” This may eventually have happened without Trump, but it’s clear that Trump and his fanatical cult accelerated it.</span></p><span data-dcnode-id="4604" instrument_node="">

</span><p data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node=""> This is exactly what the Wall Street Journal said the Republicans should do: </span></p><span data-dcnode-id="4512" instrument_node="">

</span><p data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node=""> By the way, a crucial vote in Congress about a disputed presidential election is not the only thing that could be the basis for a January 6. You could also have it, say, where the issue amounted to whether or not to go to war. Or maybe a Supreme Court appointment, or a vote on packing the court. It depends on whether somebody has stirred up a lot of controversy. </span></p><span data-dcnode-id="4505" instrument_node="">
</span><p data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">But I think the prosecutions and jail sentences (even if for for less than twenty years) will make a repeat of this very hard to organize.</span></p><span data-dcnode-id="4502" instrument_node="">

</span><blockquote data-dcnode-id="4130"><p data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">When violence bursts onto the peaceful human condition, its face is flush with self-assurance, it displays on its banner and proclaims: “I am Violence! Make way, step aside, I will crush you!” But violence ages swiftly, a few years pass—and it is no longer sure of itself. To prop itself up, to appear decent, it will without fail call forth its ally—Lies. For violence has nothing to cover itself with but lies, and lies can only persist through violence. And it is not every day and not on every shoulder that violence brings down its heavy hand: It demands of us only a submission to lies, a daily participation in deceit—and this suffices as our fealty.</span></p><span data-dcnode-id="4135" instrument_node="">
</span><p data-dcnode-id="4131"><span data-dcnode-id="4134" instrument_node="">And therein we find, neglected by us, the simplest, the most accessible key to our liberation: a personal nonparticipation in lies! Even if all is covered by lies, even if all is under their rule, let us resist in the smallest way: Let their rule hold not through me!</span><br data-dcnode-id="4133"><span data-dcnode-id="4132" instrument_node="">

</span><p data-dcnode-id="3669"><span data-dcnode-id="3673" instrument_node=""> I see only one point of confusion: When do the objections get made? After all the Electoral votes have been counted or when a state’s votes are announced. It seems to be the practice that they are to be made when a state is reached. Thus, in 2021, when an objection was made to Arizona, the counting stopped. (the proceedings were recessed because of the penetration of the Capitol building by a mob while the debate on Arizona was going on separately in both houses of Congress. (Peter Navarro, by the way, to show how faulty and amateurish his calculations were, somehow counted the debates </span><b data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node=""> double, </span></b><span data-dcnode-id="3670" instrument_node="">  like the Houses would debate one after the other. So he anticipated 24 hours of live television coverage, not 12. Except that, like a football or a hockey or a basketball game, it actually takes up actually more time than there is on the clock, so he’s more right than wrong after all.)</span></p><span data-dcnode-id="3668" instrument_node="">

</span><p data-dcnode-id="3635"><a data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ajc.com/politics/politics-blog/cobb-gop-cancels-homage-to-treason-for-jan-6-insurrection/A5E5Q7JDSNGZ5GSXSCBQP3KXPI/" rel="nofollow"><span data-dcnode-id="3637" instrument_node="">Cobb (GA) GOP cancels ‘homage to treason’ for Jan. 6 insurrection</span></a></p><span data-dcnode-id="3634" instrument_node="">

</span><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">The way to end gerrymanders, weaken parties and make extremists less common in legislatures is to have multi-representative districts, where vote can only cast one vote.  In such a district where the 2 (or 3 or 4)  top vote-getters are elected, it is nearly impossible to gerrymander as any significant minority can concentrate votes on a particular candidate.  Some of those elected will be towards the center in many districts, and party discipline means little if there’s no handle to control.</span></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Example:  California currently has 40 Senate districts and 80 assembly districts.  Get rid of the assembly districts and join the Senate districts so that there are 20 districts.</span></p><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Then hold an election for the assembly, where the top 4 candidates are elected, and for the state Senate where the top 2 candidates are elected.  The Senate races can be staggered 10 this time, 10 next time.</span></p><span data-dcnode-id="2737" instrument_node="">

</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">“according to their respective Numbers,” =  “based on an equitable number of citizens for each representative.” This is only calculated down to the state level, and qualified by ” but each State shall have at Least one Representative” but even Wyoming has enough of a population so that it would entitled to around 3/4 of a representative in a House of 435 members. The difference between the representation of different states comes from the Senate and the Electoral votes. The small population of some states (and the increased importance of each Senator) makes Senate races more competitive than they would be had they been proportionately divided. Big states sometimes, or often, don’t have competitive Senate races. Kirsten Gillebrand of New York got a pass three times (2010, 2012 and 2018) and we can say the same even about Schumer. (re-election in 2005 and 2010 and 2016)</span></p><span data-dcnode-id="2508" instrument_node="">
