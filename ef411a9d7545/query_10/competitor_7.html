  </span><span class="fs-xs" data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">$552/kg, London Metal Exchange cash spot</span></span></div></div><span data-dcnode-id="2459" instrument_node=""> </span><div class="left owl" data-dcnode-id="2439"><div class="article-small_headline" data-dcnode-id="2452"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">What If You Eat It?</span></h1><span data-dcnode-id="2456" instrument_node=""> </span><span data-dcnode-id="2454" instrument_node=""> </span></div><span data-dcnode-id="2451" instrument_node=""> </span><div class="media owl" data-dcnode-id="2440"><figure class="bloom-figure ratio-figure square" data-dcnode-id="2441"><div class="ratio-wrap" data-dcnode-id="2449" style="padding-top: 100%;"><div data-dcnode-id="2450"></div></div><span data-dcnode-id="2448" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2442"><span data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">A silver pellet.</span></span><span data-dcnode-id="2445" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Photo: SPL/Science Source</span></span></figcaption></figure></div></div><span data-dcnode-id="2438" instrument_node=""> </span><div class="right" data-dcnode-id="2406"><span data-dcnode-id="2436" instrument_node=""> </span><div class="content serif" data-dcnode-id="2407"><ul data-dcnode-id="2408"><li data-dcnode-id="2428"><p data-dcnode-id="2429"><em data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Who eats silver?</span></em><br data-dcnode-id="2433"><span data-dcnode-id="2432" instrument_node="">Colloidal silver—small particles suspended in liquid—was sometimes promoted as a cure-all for hundreds of ailments. But the FDA warned in 1999 that it isn’t safe or effective.</span><br data-dcnode-id="2431"><span data-dcnode-id="2430" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="2427" instrument_node=""> </span><li data-dcnode-id="2419"><p data-dcnode-id="2420"><em data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">What does it taste like?</span></em><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node="">People describe it as being like “water with a faint metallic taste.”</span><br data-dcnode-id="2422"><span data-dcnode-id="2421" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="2418" instrument_node=""> </span><li data-dcnode-id="2409"><p data-dcnode-id="2410"><em data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">What does it do?</span></em><br data-dcnode-id="2415"><span data-dcnode-id="2414" instrument_node="">Overexposure causes a condition called argyria, which turns the skin a bluish purple. </span><span data-dcnode-id="2411" style="white-space: nowrap;"><em data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">—Silvia Killingsworth</span></em></span></p></li></ul></div></div></article></div><div data-dcnode-id="2338" id="cadmium"><article class="article-flowing-box transition-metals" data-dcnode-id="2339"><div class="inline-elements" data-dcnode-id="2399"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2400"><span data-dcnode-id="2403" instrument_node="">Cadmium
  </span><span class="fs-xs" data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">$2.90/kg, metal, U.S. market</span></span></div></div><span data-dcnode-id="2398" instrument_node=""> </span><div class="box" data-dcnode-id="2340"><div class="columns" data-dcnode-id="2341"><h1 class="headline fs-md" data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Of Crabs and Lichen</span></h1><span data-dcnode-id="2395" instrument_node=""> </span><span data-dcnode-id="2393" instrument_node=""> </span><span data-dcnode-id="2391" instrument_node=""> </span><div class="content fs-sm" data-dcnode-id="2342"><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">A selected list of products that made news in 2019 for containing elevated levels of cadmium, a pervasive environmental contaminant that can, with prolonged exposure, cause bone and kidney damage, as well as some cancers:</span></p><span data-dcnode-id="2388" instrument_node=""> </span><ul data-dcnode-id="2385"><li data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Plush pencil cases and cartoon-character backpacks sold on Amazon by third-party vendors; Amazon removed them, issued refunds, and agreed to stronger monitoring protocols</span></li></ul><span data-dcnode-id="2384" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2374"><div class="ratio-wrap" data-dcnode-id="2382" style="padding-top: 66.6818%;"><div data-dcnode-id="2383"></div></div><span data-dcnode-id="2381" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2375"><span data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Blue crab.</span></span><span data-dcnode-id="2378" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Photographer: Prarinya Thonghyad/Alamy</span></span></figcaption></figure><span data-dcnode-id="2373" instrument_node=""> </span><ul data-dcnode-id="2356"><li data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Giant mud and blue swimmer crabs harvested from Lake Macquarie, Australia  </span></li><span data-dcnode-id="2370" instrument_node=""> </span><li data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Faux-pearl buttons found on River Island check-pattern dresses and sleeveless blouses; the label recalled the garments</span></li><span data-dcnode-id="2367" instrument_node=""> </span><li data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Decorative enamels used on a variety of beer, wine, and liquor bottles in the U.K.</span></li><span data-dcnode-id="2364" instrument_node=""> </span><li data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Diatomaceous earth (a soft sedimentary rock) used for filtration in some wine and beer production</span></li><span data-dcnode-id="2361" instrument_node=""> </span><li data-dcnode-id="2357"><em data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Xanthoparmelia scabrosa</span></em><span data-dcnode-id="2358" instrument_node=""> (aka “sexy pavement lichen”), available on Alibaba as a purported performance enhancer for men  </span></li></ul><span data-dcnode-id="2355" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2343"><div class="ratio-wrap" data-dcnode-id="2353" style="padding-top: 88.5329%;"><div data-dcnode-id="2354"></div></div><span data-dcnode-id="2352" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2344"><span data-dcnode-id="2348"><em data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Xanthoparmelia scabrosa</span></em><span data-dcnode-id="2349" instrument_node="">.</span></span><span data-dcnode-id="2347" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Courtesy D.M.Wright/Lichen Herbarium</span></span></figcaption></figure></div></div></div></article></div><div data-dcnode-id="2270" id="indium-tin"><article class="article-large post-transition-metals no-dek" data-dcnode-id="2271"><div class="inline-elements" data-dcnode-id="2329"><div class="inline-element mono with-dot square post-transition-metals" data-dcnode-id="2334"><span data-dcnode-id="2337" instrument_node="">Indium
  </span><span class="fs-xs" data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">$310/kg, free-market price</span></span></div><div class="inline-element mono with-dot square post-transition-metals" data-dcnode-id="2330"><span data-dcnode-id="2333" instrument_node="">Tin
  </span><span class="fs-xs" data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">$16.18/kg, London Metal Exchange cash spot</span></span></div></div><span data-dcnode-id="2328" instrument_node=""> </span><span data-dcnode-id="2326" instrument_node=""> </span><div class="cols owl" data-dcnode-id="2272"><div class="header float-container owl" data-dcnode-id="2318"><h1 class="headline tac fs-lg serifitalic" data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">How Tin Made the World</span></h1><span data-dcnode-id="2323" instrument_node=""> </span><div class="byline" data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">By Matthieu Aikins</span></div><span data-dcnode-id="2320" instrument_node=""> </span></div><span data-dcnode-id="2317" instrument_node=""> </span><div class="content serif" data-dcnode-id="2273"><figure class="bloom-figure ratio-figure portrait float--left" data-dcnode-id="2307"><div class="ratio-wrap" data-dcnode-id="2315" style="padding-top: 125.071%;"><div data-dcnode-id="2316"></div></div><span data-dcnode-id="2314" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2308"><span data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">A bronze ingot from Cyprus.</span></span><span data-dcnode-id="2311" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Courtesy Metropolitan Museum of Art</span></span></figcaption></figure><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">In 1982 a sunken merchant ship from the 14th century B.C. was discovered off the coast of Uluburun, Turkey. Made of cedar and oak, and almost 50 feet long, it was remarkable for the breadth of its cargo. Aboard were goods from at least nine cultures: glass, ebony, elephant ivory, hippopotamus teeth, pine nuts, safflower, pottery, 10 tons of copper—and one ton of tin.</span></p><span data-dcnode-id="2304" instrument_node=""> </span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">The shipwreck demonstrated that trade routes across continents were already flourishing during the Bronze Age, linking cultures thousands of miles apart. Tin was one of the catalysts. The era draws its name from the fourth millennium B.C. discovery by smiths in Mesopotamia and the Iranian Plateau that alloying copper with a second metal made it stronger, easier to cast, and more resistant to corrosion. The earliest bronzes were made with arsenic, but tin’s superior properties—it didn’t give off toxic fumes when heated, for example—eventually made it the favored alloy.</span></p><span data-dcnode-id="2301" instrument_node=""> </span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">The strongest bronzes were only about 10% tin, but the element soon became one of the ancient world’s most precious substances. Bronze tools built the first cities, and bronze weapons destroyed them. During the first battle recorded in detail, at Megiddo (in present-day Israel) circa 1500 B.C., Pharaoh Thutmose III crushed a rebellious Canaanite army using bronze weaponry. In the Iliad, Achilles’ armor is forged from copper and tin by Hephaestus, Greek god of smiths. Classical astrologers associated tin with Jupiter, the mightiest of planets.</span></p><span data-dcnode-id="2298" instrument_node=""> </span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">But tin is rare—30 times less abundant than copper in the Earth’s crust—and unevenly distributed. Where did ancient tin come from? There are no records of major deposits in the northeastern Mediterranean nor in Ancient Egypt. Sumerian texts speak of tin from the east, but there’s no record of its being mined in the Indus Valley Civilization, in present-day Pakistan, either. Even well after the Bronze Age, Herodotus’ Histories spoke of India’s abundant gold, Arabia’s incense and spice, even Ethiopia’s ebony. Yet he could only allude to “Tin Islands, where our tin is brought from,” and about which he knew nothing more.</span></p><span data-dcnode-id="2295" instrument_node=""> </span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">By the first century A.D., some of the picture was being filled out. The Roman Empire had discovered mines in present-day Cornwall and on the Iberian Peninsula that had likely supplied much of Europe and the Mediterranean. Texts and archaeological digs suggest that tin traveled from Afghanistan west to Mesopotamia and southeast to the Indus Valley. But little more was known until recent decades, when scientific techniques began to trace ancient trade networks with greater certainty.</span></p><span data-dcnode-id="2292" instrument_node=""> </span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">By analyzing the proportion of different lead isotopes in ore samples taken from sites known to have been exploited in antiquity, researchers have developed “fingerprints” they can match to the metal in some artifacts. The technique, known as lead isotope analysis, has been around since the 1960s, but it’s been challenging to apply to tin because there are very few Bronze Age samples, and cassiterite, the metal’s primary ore, doesn’t generally contain much lead.</span></p><span data-dcnode-id="2289" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2280"><div class="ratio-wrap" data-dcnode-id="2287" style="padding-top: 85.4667%;"><div data-dcnode-id="2288"></div></div><span data-dcnode-id="2286" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2281"><span data-dcnode-id="2284" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Data: Berger et al 2019</span></span></figcaption></figure><span data-dcnode-id="2279" instrument_node=""> </span><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Recent advances in lead isotope analysis, however, combined with the study of antimony, indium, silver, and other elements, have let researchers link mid-16th century B.C. tin ingots found in Crete with tin deposits in Afghanistan and Tajikistan, and 13th to 14th century ingots from present-day Israel to Cornwall and the Iberian Peninsula. Researchers publishing in the journal PLOS One this year traced the east-to-west shift in tin supply routes to the decline of the Minoan civilization and the rise of the Mycenaeans, who laid the foundations for Classical Greece.</span></p><span data-dcnode-id="2276" instrument_node=""> </span><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">As for the Uluburun shipwreck, the same researchers lamented that its tin ingots were too corroded for reliable analysis. The best they could say, based on the samples’ low concentration of indium, was that the tin likely didn’t come from Cornwall. With improvements in the science, the picture may fill out more—for now all that’s certain is that traders valued it enough to bring it a long way before it met its watery end.</span></p></div></div></article></div><div data-dcnode-id="2223" id="antimony"><article class="article-small metalloids" data-dcnode-id="2224"><div class="inline-elements" data-dcnode-id="2265"><div class="inline-element mono with-dot square metalloids" data-dcnode-id="2266"><span data-dcnode-id="2269" instrument_node="">Antimony
  </span><span class="fs-xs" data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">$8.60/kg, metal</span></span></div></div><span data-dcnode-id="2264" instrument_node=""> </span><div class="left owl" data-dcnode-id="2243"><div class="article-small_headline" data-dcnode-id="2256"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Explosive Liquid Droplets</span></h1><span data-dcnode-id="2261" instrument_node=""> </span><div class="byline dib" data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">By Dimitra Kessenides</span></div><span data-dcnode-id="2258" instrument_node=""> </span></div><span data-dcnode-id="2255" instrument_node=""> </span><div class="media owl" data-dcnode-id="2244"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2245"><div class="ratio-wrap" data-dcnode-id="2253" style="padding-top: 74.95%;"><div data-dcnode-id="2254"></div></div><span data-dcnode-id="2252" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2246"><span data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Three large fireworks demonstrate the brocade effect and, below that, the glitter effect.</span></span><span data-dcnode-id="2249" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Courtesy Thomas H. Handel</span></span></figcaption></figure></div></div><span data-dcnode-id="2242" instrument_node=""> </span><div class="right" data-dcnode-id="2225"><span data-dcnode-id="2240" instrument_node=""> </span><div class="content serif" data-dcnode-id="2226"><p data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Those three words, from a seminal 1978 paper by Nevada biology professor and amateur pyrotechnician Robert Winokur, describe the liquid molten pellets packed with antimony trisulfide that create a glitter effect when ignited. “As the pellets fall through the air, chemistry goes on,” says Winokur, now retired. “Then an array of combustion products are produced by the burning pellet.” There isn’t one magical recipe for the best glitter effect, Winokur says—a typical formula consists of 10% antimony trisulfide, which “increases the delay between the formation of the droplet and the flash reaction.” These days, he adds, a similar effect can be achieved using cheaper, more sulfurous mixes.</span></p><span data-dcnode-id="2237" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2227"><div class="ratio-wrap" data-dcnode-id="2235" style="padding-top: 76.3158%;"><div data-dcnode-id="2236"></div></div><span data-dcnode-id="2234" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2228"><span data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Glitter-effect diagrams.</span></span><span data-dcnode-id="2231" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Courtesy Robert Winokur</span></span></figcaption></figure></div></div></article></div><div data-dcnode-id="2163" id="tellurium"><article class="article-small metalloids" data-dcnode-id="2164"><div class="inline-elements" data-dcnode-id="2218"><div class="inline-element mono with-dot square metalloids" data-dcnode-id="2219"><span data-dcnode-id="2222" instrument_node="">Tellurium
  </span><span class="fs-xs" data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">$50.50/kg, 99% metal, Rotterdam market</span></span></div></div><span data-dcnode-id="2217" instrument_node=""> </span><div class="left owl" data-dcnode-id="2197"><div class="article-small_headline" data-dcnode-id="2210"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">What If You Eat It?</span></h1><span data-dcnode-id="2214" instrument_node=""> </span><span data-dcnode-id="2212" instrument_node=""> </span></div><span data-dcnode-id="2209" instrument_node=""> </span><div class="media owl" data-dcnode-id="2198"><figure class="bloom-figure ratio-figure square" data-dcnode-id="2199"><div class="ratio-wrap" data-dcnode-id="2207" style="padding-top: 100%;"><div data-dcnode-id="2208"></div></div><span data-dcnode-id="2206" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2200"><span data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Tellurium.</span></span><span data-dcnode-id="2203" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Photographer: Bjorn Wylezich/Alamy</span></span></figcaption></figure></div></div><span data-dcnode-id="2196" instrument_node=""> </span><div class="right" data-dcnode-id="2165"><span data-dcnode-id="2194" instrument_node=""> </span><div class="content serif" data-dcnode-id="2166"><ul data-dcnode-id="2167"><li data-dcnode-id="2186"><p data-dcnode-id="2187"><em data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Who eats tellurium?</span></em><br data-dcnode-id="2191"><span data-dcnode-id="2190" instrument_node="">Very few people; it’s more of an occupational hazard for people working in silver refineries.</span><br data-dcnode-id="2189"><span data-dcnode-id="2188" instrument_node="">&nbsp;  </span></p></li><span data-dcnode-id="2185" instrument_node=""> </span><li data-dcnode-id="2177"><p data-dcnode-id="2178"><em data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">What does it taste like?</span></em><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node="">If touched or consumed, the metalloid will instantly metabolize into a compound with a strong garlic smell that can hang around for weeks.</span><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="2176" instrument_node=""> </span><li data-dcnode-id="2168"><p data-dcnode-id="2169"><em data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">What does it do?</span></em><br data-dcnode-id="2173"><span data-dcnode-id="2172" instrument_node="">Tellurium exposure can cause weight loss or drowsiness, and severe poisoning can slow breathing and stop circulation. </span><em data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">—Silvia Killingsworth</span></em></p></li></ul></div></div></article></div><div data-dcnode-id="2160" id="ad9"><div class="dvz-v0-ad" data-dcnode-id="2161"><div class="dvz-v0-ad-div" data-dcnode-id="2162" id="dvz-v0-ad-9"></div></div></div><div data-dcnode-id="2128" id="dissection4"><article class="article-photostat float-container accent invert" data-dcnode-id="2129"><div class="left owl" data-dcnode-id="2141"><div class="inline-elements" data-dcnode-id="2157"><div class="with-dot square mono" data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Composition</span></div></div><span data-dcnode-id="2156" instrument_node=""> </span><div class="header" data-dcnode-id="2149"><h1 class="headline fs-lg di serif" data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Laser</span></h1><span data-dcnode-id="2153" instrument_node=""> </span><span data-dcnode-id="2151" instrument_node=""> </span></div><span data-dcnode-id="2148" instrument_node=""> </span><div class="content sans" data-dcnode-id="2142"><p data-dcnode-id="2143"><span data-dcnode-id="2147" instrument_node="">Lasers are both potent and mundane, high-energy beams that can be used to operate on eyes, precision-cut metal for appliances, and scan bar codes at the corner store. “Light amplification by stimulated emission of radiation” neatly describes how the technology works: Energy is applied to a medium—such as a crystal wafer, liquid solution, or gas—whose particles become stimulated and emit light. Mirrors capture and amplify that light into an intense beam. </span><span data-dcnode-id="2144" style="white-space: nowrap;"><em data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">—E. Tammy Kim</span></em></span></p></div></div><span data-dcnode-id="2140" instrument_node=""> </span><div class="media" data-dcnode-id="2130"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="2131"><div class="ratio-wrap" data-dcnode-id="2138" style="padding-top: 125%;"><div data-dcnode-id="2139"></div></div><span data-dcnode-id="2137" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2132"><span data-dcnode-id="2135" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Photographer: Daniel Shea for Bloomberg Businessweek. Product courtesy Trumpf Lasers</span></span></figcaption></figure></div></article></div><div data-dcnode-id="2092" id="iodine"><article class="article-small halogens" data-dcnode-id="2093"><div class="inline-elements" data-dcnode-id="2124"><div class="inline-element mono with-dot square halogens" data-dcnode-id="2125"><span data-dcnode-id="2127" instrument_node="">Iodine
  </span></div></div><span data-dcnode-id="2123" instrument_node=""> </span><div class="left owl" data-dcnode-id="2104"><div class="article-small_headline" data-dcnode-id="2116"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Salting the Earth</span></h1><span data-dcnode-id="2120" instrument_node=""> </span><span data-dcnode-id="2118" instrument_node=""> </span></div><span data-dcnode-id="2115" instrument_node=""> </span><div class="media owl" data-dcnode-id="2105"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2106"><div class="ratio-wrap" data-dcnode-id="2113" style="padding-top: 90.9333%;"><div data-dcnode-id="2114"></div></div><span data-dcnode-id="2112" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2107"><span data-dcnode-id="2110" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Data: Iodine Global Network</span></span></figcaption></figure></div></div><span data-dcnode-id="2103" instrument_node=""> </span><div class="right" data-dcnode-id="2094"><span data-dcnode-id="2101" instrument_node=""> </span><div class="content serif" data-dcnode-id="2095"><p data-dcnode-id="2096"><span data-dcnode-id="2100" instrument_node="">Even as noniodized sea salts are gaining popularity in the U.S., iodization has been a public-health success story globally—ensuring proper body and brain development and preventing issues such as goiters and hypothyroidism. The Iodine Global Network, an alliance of governments, nongovernmental organizations, and industry partners, estimates that a $1 donation provides enough iodized salt to sustain 100 participants in its programs. </span><span data-dcnode-id="2097" style="white-space: nowrap;"><em data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">—Jeremy Keehn</span></em></span></p></div></div></article></div><div data-dcnode-id="2060" id="xenon"><article class="article-photo noble-gases" data-dcnode-id="2061"><div class="inline-elements" data-dcnode-id="2087"><div class="inline-element mono with-dot square noble-gases" data-dcnode-id="2088"><span data-dcnode-id="2091" instrument_node="">Xenon
  </span><span class="fs-xs" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">$25/liter, 200-liter cylinder</span></span></div></div><span data-dcnode-id="2086" instrument_node=""> </span><div class="header" data-dcnode-id="2074"><h1 class="headline fs-lg di sansitalic" data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">More Hong Kong Lights</span></h1><span data-dcnode-id="2083" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">By Tommy Trenchard</span></div><span data-dcnode-id="2080" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="2075"><span data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Brian Kwok, an assistant professor of design at Hong Kong Polytechnic University, has spent the past six years documenting and working to preserve what remains of the city’s neon lights. He says the government should safeguard the more iconic signs, much as it does other parts of the city’s artistic and cultural heritage. He’s helped develop an interactive map of Hong Kong’s last neon signs and gives walking tours and museum talks to raise awareness of the works. “If nobody documents them, we’ll be losing an important part of our visual culture,” he says. “But we have to do it fast—it’s a race against time.”</span></span><span data-dcnode-id="2077" instrument_node=""> </span></div></div><span data-dcnode-id="2073" instrument_node=""> </span><div class="media" data-dcnode-id="2062"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2063"><div class="ratio-wrap" data-dcnode-id="2071" style="padding-top: 66.7%;"><div data-dcnode-id="2072"></div></div><span data-dcnode-id="2070" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2064"><span data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Xenon emits a bright lavender light. Although rarely used on its own, it’s sometimes combined with other noble gases to create a variety of colored lights. The gas also is used to make strobe lights and flash lighting for cameras.</span></span><span data-dcnode-id="2067" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Photographer: Tommy Trenchard for Bloomberg Businessweek</span></span></figcaption></figure></div></article></div><div data-dcnode-id="1987" id="cesium"><article class="article-medium owl alkali-metals" data-dcnode-id="1988"><div class="inline-elements" data-dcnode-id="2055"><div class="inline-element mono with-dot square alkali-metals" data-dcnode-id="2056"><span data-dcnode-id="2059" instrument_node="">Cesium
  </span><span class="fs-xs" data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">$78,700/kg, 99.98% metal basis</span></span></div></div><span data-dcnode-id="2054" instrument_node=""> </span><div class="header" data-dcnode-id="2046"><h1 class="headline fs-lg di sans" data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Chernobyl in the Food Chain</span></h1><span data-dcnode-id="2051" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">By Aine Quinn</span></div><span data-dcnode-id="2048" instrument_node=""> </span></div><span data-dcnode-id="2045" instrument_node=""> </span><span data-dcnode-id="2043" instrument_node=""> </span><div class="content columns sans" data-dcnode-id="1989"><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Some of the particles released by the 1986 explosion of Reactor 4 at Chernobyl are no longer radioactive, but one isotope, cesium-137, still is. Winds deposited the material on dry ground nearby in Ukraine, Belarus, and Russia after the accident; a toxic cloud carried more as far away as Ireland. Mixed with rain, it soaked into the ground: “The highest depositions occurred where you had the highest rainfall,” says Nick Beresford, a professor at the Centre for Ecology &amp; Hydrology in Lancaster, U.K. Plants and fungi take up cesium from the soil, and if animals eat them, their meat can be contaminated. Consuming a lot of this meat can cause a moderately higher incidence of cancer, though Jim Smith, a University of Portsmouth professor who’s doing crop experiments near the plant, is quick to note that cesium is “not a massive risk” for the people affected, compared with other environmental hazards.</span></p><span data-dcnode-id="2040" instrument_node=""> </span><div data-dcnode-id="2024" style="break-inside: avoid;"><h1 data-dcnode-id="2038" style="clear: both;"><span data-dcnode-id="2039" instrument_node="">Norway</span></h1><span data-dcnode-id="2037" instrument_node=""> </span><figure class="bloom-figure ratio-figure portrait float--right" data-dcnode-id="2028"><div class="ratio-wrap" data-dcnode-id="2035" style="padding-top: 158.273%;"><div data-dcnode-id="2036"></div></div><span data-dcnode-id="2034" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2029"><span data-dcnode-id="2032" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Photo: Alamy</span></span></figcaption></figure><span data-dcnode-id="2027" instrument_node=""> </span><p data-dcnode-id="2025" style="text-indent: 0px; margin-top: 1.3em;"><span data-dcnode-id="2026" instrument_node="">Scientists monitor about 90,000 sheep in more than 30 municipalities during the summer season, taking weekly milk samples from ewes to measure radioactivity. If levels are too high, says Runhild Gjelsvik, a scientist at the Norwegian Radiation and Nuclear Safety Authority, flocks are brought down from the hills and given uncontaminated feed until they can be safely slaughtered. Cesium-137 levels in sheep have dropped steeply since 1986, but they rose last year thanks to an abundance of wild mushrooms.</span></p></div><span data-dcnode-id="2023" instrument_node=""> </span><div data-dcnode-id="2007" style="break-inside: avoid;"><h1 data-dcnode-id="2021" style="clear: both;"><span data-dcnode-id="2022" instrument_node="">Sweden</span></h1><span data-dcnode-id="2020" instrument_node=""> </span><figure class="bloom-figure ratio-figure portrait float--right" data-dcnode-id="2011"><div class="ratio-wrap" data-dcnode-id="2018" style="padding-top: 123.249%;"><div data-dcnode-id="2019"></div></div><span data-dcnode-id="2017" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2012"><span data-dcnode-id="2015" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Photo: Alamy</span></span></figcaption></figure><span data-dcnode-id="2010" instrument_node=""> </span><p data-dcnode-id="2008" style="text-indent: 0px; margin-top: 1.3em;"><span data-dcnode-id="2009" instrument_node="">Hunters can pay up to 800 kronor ($83) to have boars they shot in riskier areas checked before butchering, according to Per Zakariasson from the Swedish Association for Hunting and Wildlife Management. Last year a wild boar in Uppsala County was found to contain more than twice the legal radioactive cesium limit for boar meat. “The anxiety of the people is a problem. It’s a problem when good, fine meat is thrown away,” Zakariasson says. Authorities have also been monitoring radiation levels in reindeer herded by the indigenous Sami people, who eat a lot of the meat.</span></p></div><span data-dcnode-id="2006" instrument_node=""> </span><div data-dcnode-id="1990" style="break-inside: avoid;"><h1 data-dcnode-id="2004" style="clear: both;"><span data-dcnode-id="2005" instrument_node="">Ukraine and Belarus</span></h1><span data-dcnode-id="2003" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape float--right" data-dcnode-id="1994"><div class="ratio-wrap" data-dcnode-id="2001" style="padding-top: 82%;"><div data-dcnode-id="2002"></div></div><span data-dcnode-id="2000" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1995"><span data-dcnode-id="1998" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Photo: Alamy</span></span></figcaption></figure><span data-dcnode-id="1993" instrument_node=""> </span><p data-dcnode-id="1991" style="text-indent: 0px; margin-top: 1.3em;"><span data-dcnode-id="1992" instrument_node="">In the so-called exclusion zones of Ukraine and Belarus, agriculture and forestry remain officially banned, though Smith says recent research shows contamination levels are very diverse. Greenpeace researchers recently found radioactivity levels in milk from some private households and farms in a resettlement area 200 kilometers from the Chernobyl plant were up to six times higher than Ukraine’s legal limit. In 2017, France rejected a shipment of mushrooms from Belarus that showed traces of radioactivity connected to Chernobyl.</span></p></div></div></article></div><div data-dcnode-id="1951" id="barium"><article class="article-small alkaline-earth-metals" data-dcnode-id="1952"><div class="inline-elements" data-dcnode-id="1982"><div class="inline-element mono with-dot square alkaline-earth-metals" data-dcnode-id="1983"><span data-dcnode-id="1986" instrument_node="">Barium
  </span><span class="fs-xs" data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">$62.55/kg, barium sulfate</span></span></div></div><span data-dcnode-id="1981" instrument_node=""> </span><div class="left owl" data-dcnode-id="1960"><div class="article-small_headline" data-dcnode-id="1973"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Swallow Study</span></h1><span data-dcnode-id="1978" instrument_node=""> </span><div class="byline dib" data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">By Silvia Killingsworth</span></div><span data-dcnode-id="1975" instrument_node=""> </span></div><span data-dcnode-id="1972" instrument_node=""> </span><div class="media owl" data-dcnode-id="1961"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="1962"><div class="ratio-wrap" data-dcnode-id="1970" style="padding-top: 85.7727%;"><div data-dcnode-id="1971"></div></div><span data-dcnode-id="1969" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1963"><span data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">A colored barium-swallow X-ray of a 65-year-old’s abdomen shows a gastric ulcer at lower center.</span></span><span data-dcnode-id="1966" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Photo: Zephyr/Science Source</span></span></figcaption></figure></div></div><span data-dcnode-id="1959" instrument_node=""> </span><div class="right" data-dcnode-id="1953"><span data-dcnode-id="1957" instrument_node=""> </span><div class="content serif" data-dcnode-id="1954"><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Should you find yourself in need of a live video X-ray of your upper gastrointestinal tract, you have my sympathies. Bracco Diagnostics Inc. manufactures a product called Varibar, a liquid suspension of barium sulfate that comes in an array of flavors and consistencies: thin liquid, nectar, honey, thin honey, and pudding. None can quite mask the reality of ingesting a chalky, room-temperature drink the consistency of a watery milkshake, but taste isn’t the point. Barium on its own can be toxic to humans, but in this form, it’s insoluble and serves as a contrast agent. It shows up white on the X-ray, allowing a doctor to visualize your digestive tract as you swallow. Just try to keep it down.</span></p></div></div></article></div><div data-dcnode-id="1948" id="ad10"><div class="dvz-v0-ad" data-dcnode-id="1949"><div class="dvz-v0-ad-div" data-dcnode-id="1950" id="dvz-v0-ad-10"></div></div></div><div data-dcnode-id="1872" id="rareearth"><article class="article-photo lanthanides invert" data-dcnode-id="1873"><div class="inline-elements" data-dcnode-id="1899"><div class="inline-element mono with-dot square lanthanides" data-dcnode-id="1944"><span data-dcnode-id="1947" instrument_node="">Lanthanum

v data-dcnode-id="1822" id="thulium"><article class="article-flowing-box lanthanides" data-dcnode-id="1823"><div class="inline-elements" data-dcnode-id="1867"><div class="inline-element mono with-dot square lanthanides" data-dcnode-id="1868"><span data-dcnode-id="1871" instrument_node="">Thulium
  </span><span class="fs-xs" data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">$12,000/kg, 99.95% pure sample on Amazon.com</span></span></div></div><span data-dcnode-id="1866" instrument_node=""> </span><div class="box" data-dcnode-id="1824"><div class="columns" data-dcnode-id="1825"><h1 class="headline fs-md" data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">(Mostly) Useless</span></h1><span data-dcnode-id="1863" instrument_node=""> </span><div class="byline" data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">By Samanth Subramanian</span></div><span data-dcnode-id="1860" instrument_node=""> </span><span data-dcnode-id="1858" instrument_node=""> </span><div class="content fs-sm" data-dcnode-id="1826"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="1848" style="padding-right: 5vw;"><div class="ratio-wrap" data-dcnode-id="1856" style="padding-top: 90.9091%;"><div data-dcnode-id="1857"></div></div><span data-dcnode-id="1855" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1849"><span data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">A sample of the rare-earth metal thulium.</span></span><span data-dcnode-id="1852" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Photo: SLP/Science Source</span></span></figcaption></figure><span data-dcnode-id="1847" instrument_node=""> </span><ul data-dcnode-id="1827"><li data-dcnode-id="1843" style="break-inside: avoid;"><span data-dcnode-id="1845" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em;"><span data-dcnode-id="1846" instrument_node="">What’s it look like?</span></span><span data-dcnode-id="1844" instrument_node="">It’s silvery and shining if preserved in an ampoule of an inert gas such as argon.</span></li><span data-dcnode-id="1842" instrument_node=""> </span><li data-dcnode-id="1838" style="break-inside: avoid;"><span data-dcnode-id="1840" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1841" instrument_node="">Why’s it (mostly) useless?</span></span><span data-dcnode-id="1839" instrument_node="">Thulium occurs at 0.5 parts per million in the Earth’s crust, and it’s difficult and expensive to extract.</span></li><span data-dcnode-id="1837" instrument_node=""> </span><li data-dcnode-id="1833" style="break-inside: avoid;"><span data-dcnode-id="1835" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1836" instrument_node="">What’s it used for?</span></span><span data-dcnode-id="1834" instrument_node="">Arc lights use thulium to provide soft green light. Euro banknotes contain traces of thulium and other elements that fluoresce under ultraviolet light, for security. Max Whitby, founder of Red Green &amp; Blue Co. in London, which sells periodic tables that hold element samples, says he once heard of toothpaste containing thulium, but he hasn’t been able to track down the brand.</span></li><span data-dcnode-id="1832" instrument_node=""> </span><li data-dcnode-id="1828" style="break-inside: avoid;"><span data-dcnode-id="1830" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1831" instrument_node="">Can I get some?</span></span><span data-dcnode-id="1829" instrument_node="">Why yes. A 99.95%-pure gram sample costs $12 on Amazon. A Sunmaster Full Nova 315-watt lamp, which includes not just thulium but dysprosium in its arc element, costs $109.85. A €10 banknote costs €10.</span></li></ul></div></div></div></article></div><div data-dcnode-i   </span><span class="fs-xs" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">$12,860/kg, Engelhard spot</span></span></div></div><span data-dcnode-id="1722" instrument_node=""> </span><div class="media" data-dcnode-id="1711"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="1712"><div class="ratio-wrap" data-dcnode-id="1720" style="padding-top: 66.6818%;"><div data-dcnode-id="1721"></div></div><span data-dcnode-id="1719" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1713"><span data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">An osmium disc.</span></span><span data-dcnode-id="1716" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Photographer: Aaron Wojack for Bloomberg Businessweek</span></span></figcaption></figure></div><span data-dcnode-id="1710" instrument_node=""> </span><h1 class="headline tac serifitalic fs-xl" data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Disco-Dancing German’s Secret Lab Could Disrupt the Diamond Industry</span></h1><span data-dcnode-id="1707" instrument_node=""> </span><div class="header" data-dcnode-id="1697"><div class="byline fs-md" data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">By Austin Carr</span></div><span data-dcnode-id="1704" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="1698"><span data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Ingo Wolf is trying to spark demand for one of the rarest elements on the planet.</span></span><span data-dcnode-id="1701" instrument_node=""> </span><a class="dib with-color with-arrow" data-dcnode-id="1699" data-terminal="NSN PWXHU66JTSE9" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/features/2019-08-28/can-osmium-jewelry-be-more-valuable-than-diamonds"><span data-dcnode-id="1700" instrument_node="">Read Story</span></a></div></div></article></div><div data-dcnode-id="1692" id="ad11"><div class="dvz-v0-ad" data-dcnode-id="1693"><div class="dvz-v0-ad-div" data-dcnode-id="1694" id="dvz-v0-ad-11"></div></div></div><div data-dcnode-id="1637" id="iridium-platinum"><article class="article-medium owl transition-metals" data-dcnode-id="1638"><div class="inline-elements" data-dcnode-id="1683"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="1688"><span data-dcnode-id="1691" instrument_node="">Iridium
