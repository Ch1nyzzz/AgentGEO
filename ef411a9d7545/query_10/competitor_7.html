  </span><span class="fs-xs" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">$27,521/kg, Johnson Matthey spot</span></span></div></div><span data-dcnode-id="1682" instrument_node=""> </span><div class="header" data-dcnode-id="1674"><h1 class="headline fs-lg di sans" data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">More Elements That Go Boom and Bust</span></h1><span data-dcnode-id="1679" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">By Eddie van der Walt</span></div><span data-dcnode-id="1676" instrument_node=""> </span></div><span data-dcnode-id="1673" instrument_node=""> </span><span data-dcnode-id="1671" instrument_node=""> </span><div class="content columns sans" data-dcnode-id="1639"><h1 data-dcnode-id="1669" id="iridium"><span data-dcnode-id="1670" instrument_node="">Iridium</span></h1><span data-dcnode-id="1668" instrument_node=""> </span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">The market for iridium—primarily used in sparkplugs and in crucibles for growing crystals to make light-emitting diodes (LEDs)—is much smaller than those for other platinum-group metals; only 7 tons were consumed in 2018, vs. 214 tons of palladium. But iridium still sees jumps—its price rose 150% from 2010 to early 2011, as use in phones and other tech soared. The price slumped starting in 2013 as recycling met demand from phone manufacturers, then climbed again with rising use in the clean production of other chemicals.</span></p><span data-dcnode-id="1665" instrument_node=""> </span><figure class="bloom-figure ratio-figure wide" data-dcnode-id="1656"><div class="ratio-wrap" data-dcnode-id="1663" style="padding-top: 41.6667%;"><div data-dcnode-id="1664"></div></div><span data-dcnode-id="1662" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1657"><span data-dcnode-id="1660" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Data: Compiled by Bloomberg</span></span></figcaption></figure><span data-dcnode-id="1655" instrument_node=""> </span><h1 data-dcnode-id="1653" id="platinum"><span data-dcnode-id="1654" instrument_node="">Platinum</span></h1><span data-dcnode-id="1652" instrument_node=""> </span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Platinum’s mid-2000s price spike resulted from a shortage caused by increased use in catalytic converters for gasoline and diesel engines. As it reached record highs in early 2008, the financial crisis struck, carmakers reduced their use, and speculators sold off holdings. Shortages returned and prices went up again for a few years until around 2012, when demand for platinum jewelry declined. In 2015, the Volkswagen AG emissions-testing scandal further hurt the weak market for diesel cars, creating more surpluses and lower prices again.</span></p><span data-dcnode-id="1649" instrument_node=""> </span><figure class="bloom-figure ratio-figure wide" data-dcnode-id="1640"><div class="ratio-wrap" data-dcnode-id="1647" style="padding-top: 41.6667%;"><div data-dcnode-id="1648"></div></div><span data-dcnode-id="1646" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1641"><span data-dcnode-id="1644" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Data: Compiled by Bloomberg</span></span></figcaption></figure></div></article></div><div data-dcnode-id="1542" id="gold"><article class="article-photo transition-metals" data-dcnode-id="1543"><div class="inline-elements" data-dcnode-id="1632"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="1633"><span data-dcnode-id="1636" instrument_node="">Gold
  </span><span class="fs-xs" data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">$48,413/kg, London Metal Exchange cash spot</span></span></div></div><span data-dcnode-id="1631" instrument_node=""> </span><div class="header" data-dcnode-id="1619"><h1 class="headline fs-lg di serif" data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Some That Glitters Is Recycled</span></h1><span data-dcnode-id="1628" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Photos and text by Carlotta Cardana</span></div><span data-dcnode-id="1625" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="1620"><span data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">In a twist on the old saying “One man’s trash is another man’s treasure,” the organizing committee of the 2020 Summer Olympics has harnessed the recycling fervor of Japan’s citizenry to source precious metals for the medals that will be awarded at next year’s games. A two-year collection drive that wrapped in March netted almost 79,000 tons of consumer electronics. The labor-intensive process of mining metals from the discarded gadgets has yielded 32 kilograms of gold, 3,500kg of silver, and 2,200kg of copper and zinc—enough to produce more than 5,000 medals.</span></span><span data-dcnode-id="1622" instrument_node=""> </span></div></div><span data-dcnode-id="1618" instrument_node=""> </span><div class="media" data-dcnode-id="1544"><div class="bloom-slider flickity-enabled is-draggable" data-dcnode-id="1545" tabindex="0"><div class="flickity-viewport" data-dcnode-id="1546" style="height: 3709px; touch-action: pan-y;"><div class="flickity-slider" data-dcnode-id="1547" style="left: 0px; transform: translateX(0%);"><div class="slide is-selected" data-dcnode-id="1608" style="position: absolute; left: 0%;"><figure data-dcnode-id="1609"><img data-dcnode-id="1617" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/iI4JThrO3SxU/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iI4JThrO3SxU/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iI4JThrO3SxU/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iI4JThrO3SxU/v0/1500x-1.jpg 2000w"><span data-dcnode-id="1616" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1610"><span data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Unveiled in July, the gold medal designed for the Tokyo Games contains just 6 grams of the precious metal—the minimum required under guidelines issued by the International Olympic Committee. The rest is silver.</span></span><span data-dcnode-id="1613" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Courtesy Tokyo 2020</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="1598" style="position: absolute; left: 242.58%;"><figure data-dcnode-id="1599"><img data-dcnode-id="1607" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/igu5RnfyS5hQ/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/igu5RnfyS5hQ/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/igu5RnfyS5hQ/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/igu5RnfyS5hQ/v0/1500x-1.jpg 2000w"><span data-dcnode-id="1606" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1600"><span data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Yellow collection boxes, like this one at a government building in Tokyo, were installed at post offices and on street corners across Japan.</span></span><span data-dcnode-id="1603" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Photographer: Carlotta Cardana for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="1588" style="position: absolute; left: 725.39%;"><figure data-dcnode-id="1589"><img data-dcnode-id="1597" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/iSOlJrYsEfww/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iSOlJrYsEfww/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iSOlJrYsEfww/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iSOlJrYsEfww/v0/1500x-1.jpg 2000w"><span data-dcnode-id="1596" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1590"><span data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">More than 6.2 million handsets were donated to the Medal Project.</span></span><span data-dcnode-id="1593" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Photographer: Carlotta Cardana for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="1578" style="position: absolute; left: 1208.2%;"><figure data-dcnode-id="1579"><img data-dcnode-id="1587" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/iZlWmNonh.4M/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iZlWmNonh.4M/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iZlWmNonh.4M/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iZlWmNonh.4M/v0/1500x-1.jpg 2000w"><span data-dcnode-id="1586" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1580"><span data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Employees at a facility in Kawasaki owned by Field Environmental Service Inc., one of 50 companies contracted to process the e-waste. A handset’s circuit board contains tiny quantities of precious metals.</span></span><span data-dcnode-id="1583" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Photographer: Carlotta Cardana for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="1568" style="position: absolute; left: 1480.57%;"><figure data-dcnode-id="1569"><img data-dcnode-id="1577" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/ipTaBMXE.7Ak/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/ipTaBMXE.7Ak/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/ipTaBMXE.7Ak/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/ipTaBMXE.7Ak/v0/1500x-1.jpg 2000w"><span data-dcnode-id="1576" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1570"><span data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">A dissected camera and phone on display at a collection station.</span></span><span data-dcnode-id="1573" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Photographer: Carlotta Cardana for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="1558" style="position: absolute; left: 1752.93%;"><figure data-dcnode-id="1559"><img data-dcnode-id="1567" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/iuDAEcI5PDIk/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iuDAEcI5PDIk/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iuDAEcI5PDIk/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iuDAEcI5PDIk/v0/1500x-1.jpg 2000w"><span data-dcnode-id="1566" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1560"><span data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Circuit boards are dunked into chemical solutions that separate gold from other metals. The process is repeated until the desired level of purity—99.9%—is achieved.</span></span><span data-dcnode-id="1563" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Photographer: Carlotta Cardana for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="1548" style="position: absolute; left: 2235.74%;"><figure data-dcnode-id="1549"><img data-dcnode-id="1557" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/iSM91r3Y8MWw/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iSM91r3Y8MWw/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iSM91r3Y8MWw/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iSM91r3Y8MWw/v0/1500x-1.jpg 2000w"><span data-dcnode-id="1556" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1550"><span data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Gold at different stages of the purifying process.</span></span><span data-dcnode-id="1553" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Photographer: Carlotta Cardana for Bloomberg Businessweek</span></span></figcaption></figure></div></div></div></div></div></article></div><div data-dcnode-id="1509" id="mercury"><article class="article-feature owl transition-metals invert" data-dcnode-id="1510"><div class="inline-elements" data-dcnode-id="1537"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="1538"><span data-dcnode-id="1541" instrument_node="">Mercury
  </span><span class="fs-xs" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">$48.85/kg, 99.999% metal, China market</span></span></div></div><span data-dcnode-id="1536" instrument_node=""> </span><div class="media" data-dcnode-id="1525"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="1526"><div class="ratio-wrap" data-dcnode-id="1534" style="padding-top: 72.7273%;"><div data-dcnode-id="1535"></div></div><span data-dcnode-id="1533" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1527"><span data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Images from advertisements for skin-lightening products.</span></span><span data-dcnode-id="1530" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Photo Illustration by 731. Photographs: AP Photo. Getty Images (2)</span></span></figcaption></figure></div><span data-dcnode-id="1524" instrument_node=""> </span><h1 class="headline tac serifitalic fs-xl" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">No One Knows How Many of the World’s Skin-Lightening Creams Are Tainted With Mercury</span></h1><span data-dcnode-id="1521" instrument_node=""> </span><div class="header" data-dcnode-id="1511"><div class="byline fs-md" data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">By Sheridan Prasso and Vernon Silver</span></div><span data-dcnode-id="1518" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="1512"><span data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Tests keep turning up the toxic element, even in products the manufacturers claim are safe.</span></span><span data-dcnode-id="1515" instrument_node=""> </span><a class="dib with-color with-arrow" data-dcnode-id="1513" data-terminal="NSN PWXHUB6KLVRL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/features/2019-08-28/mercury-taints-unknown-number-of-skin-lightening-beauty-creams"><span data-dcnode-id="1514" instrument_node="">Read Story</span></a></div></div></article></div><div data-dcnode-id="1454" id="thallium"><article class="article-flowing-box post-transition-metals" data-dcnode-id="1455"><div class="inline-elements" data-dcnode-id="1504"><div class="inline-element mono with-dot square post-transition-metals" data-dcnode-id="1505"><span data-dcnode-id="1508" instrument_node="">Thallium
  </span><span class="fs-xs" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">$4,000/kg, U.S. market</span></span></div></div><span data-dcnode-id="1503" instrument_node=""> </span><div class="box" data-dcnode-id="1456"><div class="columns" data-dcnode-id="1457"><h1 class="headline fs-md" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">(Mostly) Useless</span></h1><span data-dcnode-id="1500" instrument_node=""> </span><div class="byline" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">By Samanth Subramanian</span></div><span data-dcnode-id="1497" instrument_node=""> </span><span data-dcnode-id="1495" instrument_node=""> </span><div class="content fs-sm" data-dcnode-id="1458"><figure class="bloom-figure ratio-figure square" data-dcnode-id="1486" style="padding-right: 5vw;"><div class="ratio-wrap" data-dcnode-id="1493" style="padding-top: 100%;"><div data-dcnode-id="1494"></div></div><span data-dcnode-id="1492" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1487"><span data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">A vial containing a sample of thallium.</span></span><span data-dcnode-id="1489" instrument_node=""> </span></figcaption></figure><span data-dcnode-id="1485" instrument_node=""> </span><ul data-dcnode-id="1459"><li data-dcnode-id="1481" style="break-inside: avoid;"><span data-dcnode-id="1483" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em;"><span data-dcnode-id="1484" instrument_node="">What’s it look like?</span></span><span data-dcnode-id="1482" instrument_node="">Dull and blue-gray, thallium is so quick to tarnish in air that it must be preserved in oil, and so soft it can be cut with a sharp fingernail.</span></li><span data-dcnode-id="1480" instrument_node=""> </span><li data-dcnode-id="1473" style="break-inside: avoid;"><span data-dcnode-id="1478" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1479" instrument_node="">Why’s it (mostly) useless?</span></span><span data-dcnode-id="1477" instrument_node="">Toxicity. Thallium was a popular rat poison and insecticide ingredient until 1972, when the U.S. government banned its commercial use in rodenticides; other countries followed suit. Thallium is so toxic it can work its way into the body through skin—a property that (spoiler alert!) figures into Agatha Christie’s </span><em data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">The Pale Horse</span></em><span data-dcnode-id="1474" instrument_node="">.</span></li><span data-dcnode-id="1472" instrument_node=""> </span><li data-dcnode-id="1465" style="break-inside: avoid;"><span data-dcnode-id="1470" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1471" instrument_node="">What’s it used for?</span></span><span data-dcnode-id="1469" instrument_node="">Combined with sulfur, it enhances conductivity in products like photoreactive sensors. Combined with oxygen, it enhances refractivity in the glass in digital camera lenses and fiber-optic cables. In cardiac stress tests, a small shot of radioactive Tl-201 lights up heart tissue under a gamma camera. (Until alternatives emerge, thallium is perhaps more fairly described as problematically use</span><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">ful</span></em><span data-dcnode-id="1466" instrument_node="">.)</span></li><span data-dcnode-id="1464" instrument_node=""> </span><li data-dcnode-id="1460" style="break-inside: avoid;"><span data-dcnode-id="1462" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1463" instrument_node="">Can I get some?</span></span><span data-dcnode-id="1461" instrument_node="">Probably. Fewer than 8,000 kilograms of the metal are produced each year, but global coal reserves alone contain an estimated 630 million kilograms. Nova Elements sells small nuggets in an argon-filled capsule for €49.90 ($55.40). Alas, $5 jars of thallium-infused Koremlu crème, which in the 1930s promised to remove superfluous body hair with just a daub, are no longer available. A chief symptom of thallium poisoning, not coincidentally, is hair loss.</span></li></ul></div></div></div></article></div><div data-dcnode-id="1422" id="dissection5"><article class="article-photostat float-container accent invert" data-dcnode-id="1423"><div class="left owl" data-dcnode-id="1435"><div class="inline-elements" data-dcnode-id="1451"><div class="with-dot square mono" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Composition</span></div></div><span data-dcnode-id="1450" instrument_node=""> </span><div class="header" data-dcnode-id="1443"><h1 class="headline fs-lg di serif" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">MRI Machine</span></h1><span data-dcnode-id="1447" instrument_node=""> </span><span data-dcnode-id="1445" instrument_node=""> </span></div><span data-dcnode-id="1442" instrument_node=""> </span><div class="content sans" data-dcnode-id="1436"><p data-dcnode-id="1437"><span data-dcnode-id="1441" instrument_node="">The room-filling magnetic resonance imaging machine, or MRI, is a diagnostic tool used to locate internal injuries and other abnormalities. Giant magnets act upon the hydrogen atoms in the body, spinning the protons in one direction. A radio-frequency current runs through this arrangement, disrupting those protons and, with the help of a computer, measuring the displacement. What results is a 3D image of organs, bones, and tissue. </span><span data-dcnode-id="1438" style="white-space: nowrap;"><em data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">—E. Tammy Kim</span></em></span></p></div></div><span data-dcnode-id="1434" instrument_node=""> </span><div class="media" data-dcnode-id="1424"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="1425"><div class="ratio-wrap" data-dcnode-id="1432" style="padding-top: 125%;"><div data-dcnode-id="1433"></div></div><span data-dcnode-id="1431" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1426"><span data-dcnode-id="1429" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Photographer: Daniel Shea for Bloomberg Businessweek. Product courtesy advanced science research center at the graduate center, CUNY.</span></span></figcaption></figure></div></article></div><div data-dcnode-id="1419" id="ad12"><div class="dvz-v0-ad" data-dcnode-id="1420"><div class="dvz-v0-ad-div" data-dcnode-id="1421" id="dvz-v0-ad-12"></div></div></div><div data-dcnode-id="1292" id="lead"><article class="article-medium owl post-transition-metals" data-dcnode-id="1293"><div class="inline-elements" data-dcnode-id="1414"><div class="inline-element mono with-dot square post-transition-metals" data-dcnode-id="1415"><span data-dcnode-id="1418" instrument_node="">Lead
  </span><span class="fs-xs" data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">$2.06/kg, London Metal Exchange cash spot</span></span></div></div><span data-dcnode-id="1413" instrument_node=""> </span><div class="header" data-dcnode-id="1405"><h1 class="headline fs-lg di" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Lead to Lèad</span></h1><span data-dcnode-id="1410" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">By Danielle Bochove</span></div><span data-dcnode-id="1407" instrument_node=""> </span></div><span data-dcnode-id="1404" instrument_node=""> </span><div class="media" data-dcnode-id="1393"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="1394"><div class="ratio-wrap" data-dcnode-id="1402" style="padding-top: 67.6364%;"><div data-dcnode-id="1403"></div></div><span data-dcnode-id="1401" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1395"><span data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Lead sample.</span></span><span data-dcnode-id="1398" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Photo: Jacana/Science Source</span></span></figcaption></figure></div><span data-dcnode-id="1392" instrument_node=""> </span><div class="content columns serif" data-dcnode-id="1294"><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Element 82 has been blamed for the fall of the Roman Empire and for driving Renaissance artists mad. It’s the stuff of bullets and leaded gasoline. And it’s sparked public health crises in Flint, Mich., and Newark, N.J., in recent years, contaminating water supplies and raising blood lead levels in children who were disproportionately from poor and minority communities.</span></p><span data-dcnode-id="1389" instrument_node=""> </span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">When lead binds with proteins or displaces essential metals in the body, the effects can be catastrophic. “The beauty of lead, for the chemist, is the fact that it can bond in a number of ways,” says Mark Wilson, an assistant professor of chemistry at the University of Toronto. “The danger of lead, for the biologist, is that it can bond in a number of ways.”</span></p><span data-dcnode-id="1386" instrument_node=""> </span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">But as the chemist might point out, lead isn’t all bad. Lead-based linings protect your organs during X-rays and shield the environment from some hazardous materials. Lead makes your crystal wine glasses strong and sparkly and your car battery rechargeable.</span></p><span data-dcnode-id="1383" instrument_node=""> </span><p data-dcnode-id="1378"><span data-dcnode-id="1382" instrument_node="">Its usefulness is partly why it’s been pervasive. When the Lead Industries Association went bankrupt in 2002, citing lack of insurance for litigation, no one was left to speak for the positives. With that in mind, </span><em data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Bloomberg Businessweek</span></em><span data-dcnode-id="1379" instrument_node=""> spoke with Matt Sorrell, creative director of ad agency Wieden + Kennedy, to discuss whether lead’s beneficial uses could in some way redeem it. The interview has been edited for length and clarity.</span></p><span data-dcnode-id="1377" instrument_node=""> </span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1374" instrument_node=""> </span><p data-dcnode-id="1371"><em data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">What would you need to know before taking on lead as a client?</span></em></p><span data-dcnode-id="1370" instrument_node=""> </span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Are you trying to educate people? Or is some lead magnate just trying to clear out a warehouse of the stuff?</span></p><span data-dcnode-id="1367" instrument_node=""> </span><p data-dcnode-id="1364"><em data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Let’s start with a brand refresh and let the sales follow from there.</span></em></p><span data-dcnode-id="1363" instrument_node=""> </span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">In that case, we would want a forward-looking approach. “Lead Is Life.” “Lead With Lead.” “Lead: Try Not to Think About It Too Much.”</span></p><span data-dcnode-id="1360" instrument_node=""> </span><p data-dcnode-id="1357"><em data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">The second one might be tough to understand in print.</span></em></p><span data-dcnode-id="1356" instrument_node=""> </span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Maybe it’s as simple as an accent mark over the “e” or “a” so we get a different pronunciation to make it forward-looking.</span></p><span data-dcnode-id="1353" instrument_node=""> </span><p data-dcnode-id="1350"><em data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Walk us through how you’d pull off “Lead Is Life.”</span></em></p><span data-dcnode-id="1349" instrument_node=""> </span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Lead protects the human body—it protects the genitals of human beings! If you look at it that way, maybe lead creates life.</span></p><span data-dcnode-id="1346" instrument_node=""> </span><p data-dcnode-id="1343"><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">There is a lot that’s positive about lead. It’s cheap and malleable and tough to corrode. Did you know that the universe is always creating more lead?</span></em></p><span data-dcnode-id="1342" instrument_node=""> </span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">I didn’t know that. It’s not going away, so maybe we shouldn’t ignore it.</span></p><span data-dcnode-id="1339" instrument_node=""> </span><p data-dcnode-id="1336"><em data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">It also has the highest atomic number of any stable element. That’s what makes it such a great shield against radiation.</span></em></p><span data-dcnode-id="1335" instrument_node=""> </span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Yeah! It’s got a high score, it’s got a high number, but it’s just on the edge of being super dangerous. A maximum-strength Tylenol kind of vibe.</span></p><span data-dcnode-id="1332" instrument_node=""> </span><p data-dcnode-id="1329"><em data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">There are plenty of examples of problematic products in the history of advertising—such as cigarettes. What’s the downside of acknowledging the dark side of lead even more overtly?</span></em></p><span data-dcnode-id="1328" instrument_node=""> </span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Bad PR in the ad industry.</span></p><span data-dcnode-id="1325" instrument_node=""> </span><p data-dcnode-id="1322"><em data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">But isn’t the ultimate challenge for an agency to persuade people to buy something that’s not good for them?</span></em></p><span data-dcnode-id="1321" instrument_node=""> </span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">To sell the unsellable? It feels like a slimy, old-fashioned way to do it, to me. Marlboro Man and [Joe] Camel are weird pieces of pop culture that wouldn’t have existed if people didn’t put their morals aside.</span></p><span data-dcnode-id="1318" instrument_node=""> </span><p data-dcnode-id="1315"><em data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Are you saying the advertising industry has changed?</span></em></p><span data-dcnode-id="1314" instrument_node=""> </span><p data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">There’s been change on both ends; public knowledge has also changed. (</span><em data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Pauses.</span></em><span data-dcnode-id="1310" instrument_node="">) With information being so readily accessible, people are going to know it’s bad for you. So why hide it? Maybe we embrace it. People do have a kind of doomsday headspace right now. Maybe embracing something that laughs in the face of that could be the way to go? People are into things that are bad for them. “Lead: Expose Yourself.” Or “Lead: Bad to the Bone.” Or “Lead: Hurts So Good.”</span></p><span data-dcnode-id="1308" instrument_node=""> </span><p data-dcnode-id="1305"><em data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Are we talking about award-winning advertising here?</span></em></p><span data-dcnode-id="1304" instrument_node=""> </span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Right now the awards industry is pretty hot on work that takes things to an edgy place and makes people uncomfortable.</span></p><span data-dcnode-id="1301" instrument_node=""> </span><p data-dcnode-id="1298"><em data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Promising. So would you take on lead as a client?</span></em></p><span data-dcnode-id="1297" instrument_node=""> </span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">After reviewing the pros and cons? Absolutely not.</span></p></div></article></div><div data-dcnode-id="1231" id="bismuth"><article class="article-small post-transition-metals" data-dcnode-id="1232"><div class="inline-elements" data-dcnode-id="1287"><div class="inline-element mono with-dot square post-transition-metals" data-dcnode-id="1288"><span data-dcnode-id="1291" instrument_node="">Bismuth
  </span><span class="fs-xs" data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">$10.80/kg, U.S. market</span></span></div></div><span data-dcnode-id="1286" instrument_node=""> </span><div class="left owl" data-dcnode-id="1266"><div class="article-small_headline" data-dcnode-id="1279"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">What If You Eat It?</span></h1><span data-dcnode-id="1283" instrument_node=""> </span><span data-dcnode-id="1281" instrument_node=""> </span></div><span data-dcnode-id="1278" instrument_node=""> </span><div class="media owl" data-dcnode-id="1267"><figure class="bloom-figure ratio-figure square" data-dcnode-id="1268"><div class="ratio-wrap" data-dcnode-id="1276" style="padding-top: 100%;"><div data-dcnode-id="1277"></div></div><span data-dcnode-id="1275" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1269"><span data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Malaysian bismuth.</span></span><span data-dcnode-id="1272" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Photo: Biophoto Assoc/Science Source</span></span></figcaption></figure></div></div><span data-dcnode-id="1265" instrument_node=""> </span><div class="right" data-dcnode-id="1233"><span data-dcnode-id="1263" instrument_node=""> </span><div class="content serif" data-dcnode-id="1234"><ul data-dcnode-id="1235"><li data-dcnode-id="1255"><p data-dcnode-id="1256"><em data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Who eats bismuth?</span></em><br data-dcnode-id="1260"><span data-dcnode-id="1259" instrument_node="">Sufferers of diarrhea, nausea, or upset stomach.</span><br data-dcnode-id="1258"><span data-dcnode-id="1257" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="1254" instrument_node=""> </span><li data-dcnode-id="1246"><p data-dcnode-id="1247"><em data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">What does it taste like?</span></em><br data-dcnode-id="1251"><span data-dcnode-id="1250" instrument_node="">The most common form, Pepto-Bismol, also known as “pink bismuth,” tastes chalky and a bit medicinal.</span><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="1245" instrument_node=""> </span><li data-dcnode-id="1236"><p data-dcnode-id="1237"><em data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">What does it do?</span></em><br data-dcnode-id="1242"><span data-dcnode-id="1241" instrument_node="">The active ingredient, bismuth subsalicylate, is used mostly as an antacid, but it also has anti-inflammatory and bactericidal properties that help with diarrhea. And it can turn your tongue and stool black. </span><span data-dcnode-id="1238" style="white-space: nowrap;"><em data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">—Silvia Killingsworth</span></em></span></p></li></ul></div></div></article></div><div data-dcnode-id="1159" id="polonium"><article class="article-small metalloids" data-dcnode-id="1160"><div class="inline-elements" data-dcnode-id="1226"><div class="inline-element mono with-dot square metalloids" data-dcnode-id="1227"><span data-dcnode-id="1230" instrument_node="">Polonium
  </span><span class="fs-xs" data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">$86, 1-inch radioisotope disk</span></span></div></div><span data-dcnode-id="1225" instrument_node=""> </span><div class="left owl" data-dcnode-id="1205"><div class="article-small_headline" data-dcnode-id="1218"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">What If You Eat It?</span></h1><span data-dcnode-id="1222" instrument_node=""> </span><span data-dcnode-id="1220" instrument_node=""> </span></div><span data-dcnode-id="1217" instrument_node=""> </span><div class="media owl" data-dcnode-id="1206"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="1207"><div class="ratio-wrap" data-dcnode-id="1215" style="padding-top: 67.2727%;"><div data-dcnode-id="1216"></div></div><span data-dcnode-id="1214" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1208"><span data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Polonium.</span></span><span data-dcnode-id="1211" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Photographer: Richard Treptow/Science Source</span></span></figcaption></figure></div></div><span data-dcnode-id="1204" instrument_node=""> </span><div class="right" data-dcnode-id="1161"><span data-dcnode-id="1202" instrument_node=""> </span><div class="content serif" data-dcnode-id="1162"><figure class="bloom-figure ratio-figure portrait float--right" data-dcnode-id="1192"><div class="ratio-wrap" data-dcnode-id="1200" style="padding-top: 125.799%;"><div data-dcnode-id="1201"></div></div><span data-dcnode-id="1199" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1193"><span data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Litvinenko</span></span><span data-dcnode-id="1196" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Photographer: Alistair Fuller/AP</span></span></figcaption></figure><span data-dcnode-id="1191" instrument_node=""> </span><ul data-dcnode-id="1163"><li data-dcnode-id="1183"><p data-dcnode-id="1184"><em data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Who eats polonium?</span></em><br data-dcnode-id="1188"><span data-dcnode-id="1187" instrument_node="">The Russian spy and defector Alexander Litvinenko, in London in 2006.</span><br data-dcnode-id="1186"><span data-dcnode-id="1185" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="1182" instrument_node=""> </span><li data-dcnode-id="1174"><p data-dcnode-id="1175"><em data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">What does it taste like?</span></em><br data-dcnode-id="1179"><span data-dcnode-id="1178" instrument_node="">The tea into which it’s been dissolved.</span><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="1173" instrument_node=""> </span><li data-dcnode-id="1164"><p data-dcnode-id="1165"><em data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">What does it do?</span></em><br data-dcnode-id="1170"><span data-dcnode-id="1169" instrument_node="">Polonium causes fatal radiation exposure. Litvinenko was initially diagnosed with gastroenteritis; within days his blood and bone marrow failed, his hair fell out, and his mucous membranes ulcerated. Eventually, when his organs failed, he fell unconscious and died. </span><span data-dcnode-id="1166" style="white-space: nowrap;"><em data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">—Silvia Killingsworth</span></em></span></p></li></ul></div></div></article></div><div data-dcnode-id="1109" id="astatine"><article class="article-flowing-box halogens" data-dcnode-id="1110"><div class="inline-elements" data-dcnode-id="1154"><div class="inline-element mono with-dot square halogens" data-dcnode-id="1155"><span data-dcnode-id="1158" instrument_node="">Astatine
  </span><span class="fs-xs" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">$39.95, uranium + decay</span></span></div></div><span data-dcnode-id="1153" instrument_node=""> </span><div class="box" data-dcnode-id="1111"><div class="columns" data-dcnode-id="1112"><h1 class="headline fs-md" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">(Mostly) Useless</span></h1><span data-dcnode-id="1150" instrument_node=""> </span><div class="byline" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">By Samanth Subramanian</span></div><span data-dcnode-id="1147" instrument_node=""> </span><span data-dcnode-id="1145" instrument_node=""> </span><div class="content fs-sm" data-dcnode-id="1113"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="1135" style="padding-right: 5vw;"><div class="ratio-wrap" data-dcnode-id="1143" style="padding-top: 79.5455%;"><div data-dcnode-id="1144"></div></div><span data-dcnode-id="1142" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1136"><span data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Uranium is typically found in varying concentrations in an ore called pitchblende, or granite.</span></span><span data-dcnode-id="1139" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Courtesy U.S. DOE</span></span></figcaption></figure><span data-dcnode-id="1134" instrument_node=""> </span><ul data-dcnode-id="1114"><li data-dcnode-id="1130" style="break-inside: avoid;"><span data-dcnode-id="1132" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em;"><span data-dcnode-id="1133" instrument_node="">What’s it look like?</span></span><span data-dcnode-id="1131" instrument_node="">No one knows. The best we can do is examine a shard of uranium ore and imagine the hundred or so atoms that lie somewhere in its decaying mass.</span></li><span data-dcnode-id="1129" instrument_node=""> </span><li data-dcnode-id="1125" style="break-inside: avoid;"><span data-dcnode-id="1127" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1128" instrument_node="">Why’s it (mostly) useless?</span></span><span data-dcnode-id="1126" instrument_node="">If you had a visible quantity, according to the website of the element collector Theodore Gray, “you would be dead, and then it would vanish before your body was cold.” Fortunately, in addition to being wildly radioactive, astatine is the rarest naturally occurring element—fewer than 30 grams are decaying from uranium or thorium in the Earth’s crust at a given time.</span></li><span data-dcnode-id="1124" instrument_node=""> </span><li data-dcnode-id="1120" style="break-inside: avoid;"><span data-dcnode-id="1122" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1123" instrument_node="">What’s it used for?</span></span><span data-dcnode-id="1121" instrument_node="">Scientists are experimenting with an isotope, At-211, whose low-intensity alpha-particle radiation might kill isolated cancer cells while leaving surrounding healthy tissue unscathed.</span></li><span data-dcnode-id="1119" instrument_node=""> </span><li data-dcnode-id="1115" style="break-inside: avoid;"><span data-dcnode-id="1117" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1118" instrument_node="">Can I get some?</span></span><span data-dcnode-id="1116" instrument_node="">Not really. You could buy a sample of uranium ore for $39.95 on Amazon and visualize its decay. But for a truly stimulating mental picture, consider tracking down an early 20th century revigator, a water crock made of ceramic treated with uranium or radium ore. People once thought the radioactivity made the water healthier. It didn’t.</span></li></ul></div></div></div></article></div><div data-dcnode-id="1059" id="radon"><article class="article-flowing-box noble-gases" data-dcnode-id="1060"><div class="inline-elements" data-dcnode-id="1104"><div class="inline-element mono with-dot square noble-gases" data-dcnode-id="1105"><span data-dcnode-id="1108" instrument_node="">Radon
  </span><span class="fs-xs" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">$380/kg, thorium oxide + decay</span></span></div></div><span data-dcnode-id="1103" instrument_node=""> </span><div class="box" data-dcnode-id="1061"><div class="columns" data-dcnode-id="1062"><h1 class="headline fs-md" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">(Mostly) Useless</span></h1><span data-dcnode-id="1100" instrument_node=""> </span><div class="byline" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">By Samanth Subramanian</span></div><span data-dcnode-id="1097" instrument_node=""> </span><span data-dcnode-id="1095" instrument_node=""> </span><div class="content fs-sm" data-dcnode-id="1063"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="1085" style="padding-right: 5vw;"><div class="ratio-wrap" data-dcnode-id="1093" style="padding-top: 66.6818%;"><div data-dcnode-id="1094"></div></div><span data-dcnode-id="1092" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1086"><span data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">An NIH radon test kit.</span></span><span data-dcnode-id="1089" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Courtesy NIH</span></span></figcaption></figure><span data-dcnode-id="1084" instrument_node=""> </span><ul data-dcnode-id="1064"><li data-dcnode-id="1080" style="break-inside: avoid;"><span data-dcnode-id="1082" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em;"><span data-dcnode-id="1083" instrument_node="">What’s it look like?</span></span><span data-dcnode-id="1081" instrument_node="">Nothing. It’s a colorless, odorless gas.</span></li><span data-dcnode-id="1079" instrument_node=""> </span><li data-dcnode-id="1075" style="break-inside: avoid;"><span data-dcnode-id="1077" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1078" instrument_node="">Why’s it (mostly) useless?</span></span><span data-dcnode-id="1076" instrument_node="">Its most stable isotope has a half-life of less than four days, decaying first into polonium and eventually into lead.</span></li><span data-dcnode-id="1074" instrument_node=""> </span><li data-dcnode-id="1070" style="break-inside: avoid;"><span data-dcnode-id="1072" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1073" instrument_node="">What’s it used for?</span></span><span data-dcnode-id="1071" instrument_node="">To locate mineral reserves. Geologists can measure radon content in water and trace it back to deposits of uranium and thorium.</span></li><span data-dcnode-id="1069" instrument_node=""> </span><li data-dcnode-id="1065" style="break-inside: avoid;"><span data-dcnode-id="1067" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1068" instrument_node="">Can I get some?</span></span><span data-dcnode-id="1066" instrument_node="">If you buy a poorly built house. Radon from decaying uranium or thorium in the ground can spread through cracks in the foundation or plumbing; the Environmental Protection Agency says it’s the leading cause of lung cancer in American nonsmokers. Risk takers can also spend $380 for a kilogram of thorium oxide powder on Alibaba.com; pack some into a glass capsule, and a minute quantity of radon will be inside at all times as the thorium decays. Just hope the glass doesn’t break.</span></li></ul></div></div></div></article></div><div data-dcnode-id="1056" id="ad13"><div class="dvz-v0-ad" data-dcnode-id="1057"><div class="dvz-v0-ad-div" data-dcnode-id="1058" id="dvz-v0-ad-13"></div></div></div><div data-dcnode-id="1006" id="francium"><article class="article-flowing-box alkali-metals" data-dcnode-id="1007"><div class="inline-elements" data-dcnode-id="1051"><div class="inline-element mono with-dot square alkali-metals" data-dcnode-id="1052"><span data-dcnode-id="1055" instrument_node="">Francium
  </span><span class="fs-xs" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">$39.95, uranium + decay</span></span></div></div><span data-dcnode-id="1050" instrument_node=""> </span><div class="box" data-dcnode-id="1008"><div class="columns" data-dcnode-id="1009"><h1 class="headline fs-md" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">(Mostly) Useless</span></h1><span data-dcnode-id="1047" instrument_node=""> </span><div class="byline" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">By Samanth Subramanian</span></div><span data-dcnode-id="1044" instrument_node=""> </span><span data-dcnode-id="1042" instrument_node=""> </span><div class="content fs-sm" data-dcnode-id="1010"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="1032" style="padding-right: 5vw;"><div class="ratio-wrap" data-dcnode-id="1040" style="padding-top: 66.4091%;"><div data-dcnode-id="1041"></div></div><span data-dcnode-id="1039" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="1033"><span data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Interior of the Francium Trapping Facility at Triumf, Canada’s national particle accelerator center, in Vancouver.</span></span><span data-dcnode-id="1036" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Photographer: Michael Kossin/FrPNC collaboration</span></span></figcaption></figure><span data-dcnode-id="1031" instrument_node=""> </span><ul data-dcnode-id="1011"><li data-dcnode-id="1027" style="break-inside: avoid;"><span data-dcnode-id="1029" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em;"><span data-dcnode-id="1030" instrument_node="">What’s it look like?</span></span><span data-dcnode-id="1028" instrument_node="">Impossible to say. Given where it appears in the periodic table, scientists suspect francium would look metallic, like other alkalis. But it’s the second-rarest element on Earth, and no one has artificially manufactured more than a few hundred thousand atoms. “If you were ever to look at a piece of pure francium large enough to be visible, it would be the last thing you did,” says Max Whitby of London element-seller Red Green &amp; Blue. “It would explode with the force of a small nuclear bomb.”</span></li><span data-dcnode-id="1026" instrument_node=""> </span><li data-dcnode-id="1022" style="break-inside: avoid;"><span data-dcnode-id="1024" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1025" instrument_node="">Why’s it (mostly) useless?</span></span><span data-dcnode-id="1023" instrument_node="">The most stable form of francium—produced when actinium, already a fleeting trace element in uranium ore, decays in a particular way—has a half-life of just 20 minutes. It’s also intensely radioactive; Marguerite Perey discovered francium in 1939, and she’d set off nearby radiation counters for years afterward. She died, finally, of bone cancer.</span></li><span data-dcnode-id="1021" instrument_node=""> </span><li data-dcnode-id="1017" style="break-inside: avoid;"><span data-dcnode-id="1019" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1020" instrument_node="">What’s it used for?</span></span><span data-dcnode-id="1018" instrument_node="">Pretty much just pub trivia. (“A Western European country has not one but two elements named for it. What are they?” Answer: francium and gallium, the latter after Gaul, the old Roman term for France.) “It can’t even be used as a medical isotope,” Whitby says. “How would you transport it anywhere? You’d have only a few minutes to get it there before it decayed.”</span></li><span data-dcnode-id="1016" instrument_node=""> </span><li data-dcnode-id="1012" style="break-inside: avoid;"><span data-dcnode-id="1014" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="1015" instrument_node="">Can I get some?</span></span><span data-dcnode-id="1013" instrument_node="">Apart from the old trick of imagining the appearance and disappearance of francium atoms inside decaying uranium? No.</span></li></ul></div></div></div></article></div><div data-dcnode-id="961" id="radium"><article class="article-large alkaline-earth-metals invert" data-dcnode-id="962"><div class="inline-elements" data-dcnode-id="1001"><div class="inline-element mono with-dot square alkaline-earth-metals" data-dcnode-id="1002"><span data-dcnode-id="1005" instrument_node="">Radium
  </span><span class="fs-xs" data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">$100m/kg, in 1921</span></span></div></div><span data-dcnode-id="1000" instrument_node=""> </span><div class="half left owl float-container" data-dcnode-id="976"><h1 class="headline tac fs-lg serifitalic" data-dcnode-id="997"><p align="left" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">France Is Still Cleaning Up Marie Curie’s Nuclear Waste</span></p></h1><span data-dcnode-id="996" instrument_node=""> </span><div class="byline" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">By Tara Patel</span></div><span data-dcnode-id="993" instrument_node=""> </span><div class="bloom-dek with-dot" data-dcnode-id="987"><span data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Her lab outside Paris, dubbed Chernobyl on the Seine, is still radioactive nearly a century after her death.</span></span><span data-dcnode-id="990" instrument_node=""> </span><a class="dib with-color with-arrow" data-dcnode-id="988" data-terminal="NSN PWXHUB6JIJUO" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2019-08-28/france-is-still-cleaning-up-marie-curie-s-nuclear-waste"><span data-dcnode-id="989" instrument_node="">Read Story</span></a></div><span data-dcnode-id="986" instrument_node=""> </span><div class="media owl" data-dcnode-id="977"><figure class="bloom-figure ratio-figure wide" data-dcnode-id="978"><div class="ratio-wrap" data-dcnode-id="984" style="padding-top: 0.0833333%;"><div data-dcnode-id="985"></div></div><span data-dcnode-id="983" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="979"><span data-dcnode-id="981" instrument_node=""> </span></figcaption></figure></div></div><span data-dcnode-id="975" instrument_node=""> </span><div class="half right" data-dcnode-id="963"><div class="content serif" data-dcnode-id="964"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="965"><div class="ratio-wrap" data-dcnode-id="973" style="padding-top: 129.412%;"><div data-dcnode-id="974"></div></div><span data-dcnode-id="972" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="966"><span data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Curie at her Paris lab in 1925.</span></span><span data-dcnode-id="969" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Photo: Science Source</span></span></figcaption></figure></div></div></article></div><div data-dcnode-id="911" id="actinium"><article class="article-flowing-box actinides" data-dcnode-id="912"><div class="inline-elements" data-dcnode-id="956"><div class="inline-element mono with-dot square actinides" data-dcnode-id="957"><span data-dcnode-id="960" instrument_node="">Actinium
  </span><span class="fs-xs" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Price on request</span></span></div></div><span data-dcnode-id="955" instrument_node=""> </span><div class="box" data-dcnode-id="913"><div class="columns" data-dcnode-id="914"><h1 class="headline fs-md" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">(Mostly) Useless</span></h1><span data-dcnode-id="952" instrument_node=""> </span><div class="byline" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">By Samanth Subramanian</span></div><span data-dcnode-id="949" instrument_node=""> </span><span data-dcnode-id="947" instrument_node=""> </span><div class="content fs-sm" data-dcnode-id="915"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="937" style="padding-right: 5vw;"><div class="ratio-wrap" data-dcnode-id="945" style="padding-top: 125%;"><div data-dcnode-id="946"></div></div><span data-dcnode-id="944" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="938"><span data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">A sample of actinium-225 at Oak Ridge National Laboratory’s Radiochemical Engineering Development Center.</span></span><span data-dcnode-id="941" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Courtesy Oak Ridge National Laboratory</span></span></figcaption></figure><span data-dcnode-id="936" instrument_node=""> </span><ul data-dcnode-id="916"><li data-dcnode-id="932" style="break-inside: avoid;"><span data-dcnode-id="934" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em;"><span data-dcnode-id="935" instrument_node="">What’s it look like?</span></span><span data-dcnode-id="933" instrument_node="">In daylight, it’s silvery with a leadlike softness; in the dark, it’s surrounded by a pale blue glow.</span></li><span data-dcnode-id="931" instrument_node=""> </span><li data-dcnode-id="927" style="break-inside: avoid;"><span data-dcnode-id="929" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="930" instrument_node="">Why’s it (mostly) useless?</span></span><span data-dcnode-id="928" instrument_node="">It’s frighteningly radioactive, hence the glow.</span></li><span data-dcnode-id="926" instrument_node=""> </span><li data-dcnode-id="922" style="break-inside: avoid;"><span data-dcnode-id="924" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="925" instrument_node="">What’s it used for?</span></span><span data-dcnode-id="923" instrument_node="">Xofigo, a Bayer AG drug that treats prostate cancer, has an active ingredient derived from an actinium isotope. Scientists have filed patents to fight cancers with actinium radionuclides, but these aren’t close to full-fledged treatments yet.</span></li><span data-dcnode-id="921" instrument_node=""> </span><li data-dcnode-id="917" style="break-inside: avoid;"><span data-dcnode-id="919" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="920" instrument_node="">Can I get some?</span></span><span data-dcnode-id="918" instrument_node="">With difficulty. The most stable isotope, Ac-227, has a half-life of about 21 years, but it’s vanishingly rare—a ton of uranium ore contains just a tenth of a milligram. Most of the world’s supply of Ac-227 is produced for research purposes by the Oak Ridge National Laboratory in Tennessee; glass vials of the stuff are available for purchase by special order. Oak Ridge provides prices on request.</span></li></ul></div></div></div></article></div><div data-dcnode-id="880" id="dissection6"><article class="article-photostat float-container accent invert" data-dcnode-id="881"><div class="left owl" data-dcnode-id="893"><div class="inline-elements" data-dcnode-id="908"><div class="with-dot square mono" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Composition</span></div></div><span data-dcnode-id="907" instrument_node=""> </span><div class="header" data-dcnode-id="900"><h1 class="headline fs-lg di serif" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Catalytic Converter</span></h1><span data-dcnode-id="904" instrument_node=""> </span><span data-dcnode-id="902" instrument_node=""> </span></div><span data-dcnode-id="899" instrument_node=""> </span><div class="content sans" data-dcnode-id="894"><p data-dcnode-id="895"><span data-dcnode-id="898" instrument_node="">Four decades ago, this flask-shaped device became standard in cars and trucks. Nondescript on the outside, it transforms the vast majority of poisonous raw engine exhaust into less harmful emissions, without needing additional power. </span><em data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">—E. Tammy Kim</span></em></p></div></div><span data-dcnode-id="892" instrument_node=""> </span><div class="media" data-dcnode-id="882"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="883"><div class="ratio-wrap" data-dcnode-id="890" style="padding-top: 125%;"><div data-dcnode-id="891"></div></div><span data-dcnode-id="889" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="884"><span data-dcnode-id="887" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Photographer: Daniel Shea for Bloomberg Businessweek. Prop stylist: Anna Surbatovich. Product courtesy Magnaflow</span></span></figcaption></figure></div></article></div><div data-dcnode-id="829" id="thorium"><article class="article-small actinides" data-dcnode-id="830"><div class="inline-elements" data-dcnode-id="875"><div class="inline-element mono with-dot square actinides" data-dcnode-id="876"><span data-dcnode-id="879" instrument_node="">Thorium
  </span><span class="fs-xs" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">$72/kg, thorium compounds, India market</span></span></div></div><span data-dcnode-id="874" instrument_node=""> </span><div class="left owl" data-dcnode-id="853"><div class="article-small_headline" data-dcnode-id="866"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Uranium’s Nicer Sister</span></h1><span data-dcnode-id="871" instrument_node=""> </span><div class="byline dib" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">By Stephen Stapczynski</span></div><span data-dcnode-id="868" instrument_node=""> </span></div><span data-dcnode-id="865" instrument_node=""> </span><div class="media owl" data-dcnode-id="854"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="855"><div class="ratio-wrap" data-dcnode-id="863" style="padding-top: 76.5687%;"><div data-dcnode-id="864"></div></div><span data-dcnode-id="862" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="856"><span data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">The Molten Salt Reactor Experiment control room, circa 1965. The experiment achieved its first self-sustaining nuclear reaction on June 1, 1965.</span></span><span data-dcnode-id="859" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Courtesy Oak Ridge National Laboratory</span></span></figcaption></figure></div></div><span data-dcnode-id="852" instrument_node=""> </span><div class="right" data-dcnode-id="831"><span data-dcnode-id="850" instrument_node=""> </span><div class="content serif" data-dcnode-id="832"><h1 data-dcnode-id="848" id="the-problem"><span data-dcnode-id="849" instrument_node="">The Problem</span></h1><span data-dcnode-id="847" instrument_node=""> </span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Nuclear reactors relying on uranium are prone to major accidents, produce waste that’s hard to dispose of safely, and can make fissile material for weapons. </span></p><span data-dcnode-id="844" instrument_node=""> </span><h1 data-dcnode-id="842" id="the-solution"><span data-dcnode-id="843" instrument_node="">The Solution?</span></h1><span data-dcnode-id="841" instrument_node=""> </span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Thorium is more abundant, less radioactive, produces less waste, and can’t be turned into nukes. The leading proposed technology for thorium power, the molten-salt reactor, also operates under normal atmospheric pressure. So, unlike reactors that use water to moderate nuclear reactions inside containment vessels, there’s no chance of pressure building to the point of explosion if a problem occurs. The technology was demonstrated in U.S. labs in the 1960s, and China and France are working on it again, according to the World Nuclear Association.</span></p><span data-dcnode-id="838" instrument_node=""> </span><h1 data-dcnode-id="836" id="the-catch"><span data-dcnode-id="837" instrument_node="">The Catch</span></h1><span data-dcnode-id="835" instrument_node=""> </span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Designing reactors, a challenge to begin with, is that much harder with an unproven fuel.</span></p></div></div></article></div><div data-dcnode-id="826" id="ad14"><div class="dvz-v0-ad" data-dcnode-id="827"><div class="dvz-v0-ad-div" data-dcnode-id="828" id="dvz-v0-ad-14"></div></div></div><div data-dcnode-id="776" id="protactinium"><article class="article-flowing-box actinides" data-dcnode-id="777"><div class="inline-elements" data-dcnode-id="821"><div class="inline-element mono with-dot square actinides" data-dcnode-id="822"><span data-dcnode-id="825" instrument_node="">Protactinium
  </span><span class="fs-xs" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Price not available</span></span></div></div><span data-dcnode-id="820" instrument_node=""> </span><div class="box" data-dcnode-id="778"><div class="columns" data-dcnode-id="779"><h1 class="headline fs-md" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">(Mostly) Useless</span></h1><span data-dcnode-id="817" instrument_node=""> </span><div class="byline" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">By Samanth Subramanian</span></div><span data-dcnode-id="814" instrument_node=""> </span><span data-dcnode-id="812" instrument_node=""> </span><div class="content fs-sm" data-dcnode-id="780"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="802" style="padding-right: 5vw;"><div class="ratio-wrap" data-dcnode-id="810" style="padding-top: 79.4545%;"><div data-dcnode-id="811"></div></div><span data-dcnode-id="809" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="803"><span data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">This sample of protactinium-233 (dark circular area in the photo) was photographed in the light from its own radioactive emission (the lighter area) at the National Reactor Testing Station in Idaho, circa 1969.</span></span><span data-dcnode-id="806" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Courtesy U.S. DOE</span></span></figcaption></figure><span data-dcnode-id="801" instrument_node=""> </span><ul data-dcnode-id="781"><li data-dcnode-id="797" style="break-inside: avoid;"><span data-dcnode-id="799" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em;"><span data-dcnode-id="800" instrument_node="">What’s it look like?</span></span><span data-dcnode-id="798" instrument_node="">In the air it’s bright and silvery for a while before a dark film of oxide gradually creeps over its surface.</span></li><span data-dcnode-id="796" instrument_node=""> </span><li data-dcnode-id="792" style="break-inside: avoid;"><span data-dcnode-id="794" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="795" instrument_node="">Why’s it (mostly) useless?</span></span><span data-dcnode-id="793" instrument_node="">Protactinium’s longest-lasting isotope is quite stable, with a half-life of about 32,700 years, but it’s scarce. In uranium ores, it occurs with a frequency of three parts per million, at most. The world’s stock long consisted mainly of 125 grams the U.K. extracted from 60 tons of spent uranium fuel in 1961. Protactinium is now also derived as a byproduct of thorium fission reactors.</span></li><span data-dcnode-id="791" instrument_node=""> </span><li data-dcnode-id="787" style="break-inside: avoid;"><span data-dcnode-id="789" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="790" instrument_node="">What’s it used for?</span></span><span data-dcnode-id="788" instrument_node="">Practically nothing. Geologists can compare the concentrations of protactinium and thorium to date marine sediment samples, though the method works only for samples less than 175,000 years old.</span></li><span data-dcnode-id="786" instrument_node=""> </span><li data-dcnode-id="782" style="break-inside: avoid;"><span data-dcnode-id="784" style="display: block; text-transform: uppercase; border-bottom: 1px solid rgb(0, 0, 0); padding-bottom: 0.4em; margin-bottom: 0.4em; margin-top: 1.3em;"><span data-dcnode-id="785" instrument_node="">Can I get some?</span></span><span data-dcnode-id="783" instrument_node="">No. Oak Ridge National Laboratory’s sizable catalog of radioactive elements doesn’t even include protactinium.</span></li></ul></div></div></div></article></div><div data-dcnode-id="731" id="uranium"><article class="article-large actinides no-dek" data-dcnode-id="732"><div class="inline-elements" data-dcnode-id="771"><div class="inline-element mono with-dot square actinides" data-dcnode-id="772"><span data-dcnode-id="775" instrument_node="">Uranium
  </span><span class="fs-xs" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">$85.54/kg, average purchase price, U.S. civilian nuclear power reactors</span></span></div></div><span data-dcnode-id="770" instrument_node=""> </span><span data-dcnode-id="768" instrument_node=""> </span><div class="cols owl" data-dcnode-id="733"><div class="header float-container owl" data-dcnode-id="760"><h1 class="headline tac fs-lg serifitalic" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">China ❤️ Fission</span></h1><span data-dcnode-id="765" instrument_node=""> </span><div class="byline" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">By Dan Murtaugh and Stephen Stapczynski</span></div><span data-dcnode-id="762" instrument_node=""> </span></div><span data-dcnode-id="759" instrument_node=""> </span><div class="content serif" data-dcnode-id="734"><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Nuclear power’s once-bright promise of reliable carbon-free electricity has dimmed the past three decades because of escalating costs, problems with new technologies, and the disasters at Chernobyl and Fukushima. But it’s still pretty bright in China. The International Energy Agency expects its nuclear capacity to grow by 111 gigawatts from 2017 to 2040, and the rest of the world’s to drop by 7GW.</span></p><span data-dcnode-id="756" instrument_node=""> </span><p data-dcnode-id="751"><span data-dcnode-id="755" instrument_node="">An obvious question, at least for anyone who’s seen HBO’s miniseries </span><em data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Chernobyl</span></em><span data-dcnode-id="752" instrument_node="">, is whether these ambitions risk a repeat of the crises of the past. China hasn’t had any serious nuclear incidents since its first plant began operating in 1991, and the World Nuclear Association praises it for “unprecedented eagerness to achieve the world’s best standards in nuclear safety.” But a report published last year by Mark Hibbs, a senior fellow in the Carnegie Endowment for International Peace’s Nuclear Policy Program, points to several potential challenges. If China builds too many types of reactors—it’s developing three and experimenting with others, including thorium-fueled ones—regulators could find it hard to set standards and conduct inspections. The country also favors parts from a domestic manufacturing industry focused on low costs, a risk when a typical plant needs 3,000 nuclear-grade valves, 250 pumps, 44 miles of piping, 300 miles of electrical wiring, and 90,000 electrical components. “There is a real possibility that this issue may lead to an accident if not rigorously pursued,” Hibbs writes.</span></p><span data-dcnode-id="750" instrument_node=""> </span><p data-dcnode-id="745"><span data-dcnode-id="749" instrument_node="">Before Fukushima, some estimated that China’s capacity would reach as high as 500 gigawatts, almost five times the current projection. But within a week of a tsunami striking the Japanese nuclear plant, the Chinese government suspended approvals of new nuclear power projects. It later lowered plant-building targets, boosted regulation, and specified that reactor models must feature newer technology to be approved. It again paused approvals in late 2016, though there have been reports the drought will end this year. </span><span data-dcnode-id="746" style="white-space: nowrap;"><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">—With Feifei Shen</span></em></span></p><span data-dcnode-id="744" instrument_node=""> </span><figure class="bloom-figure ratio-figure wide" data-dcnode-id="735"><div class="ratio-wrap" data-dcnode-id="742" style="padding-top: 25.8667%;"><div data-dcnode-id="743"></div></div><span data-dcnode-id="741" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="736"><span data-dcnode-id="739" instrument_node=""> </span><span class="ttu
