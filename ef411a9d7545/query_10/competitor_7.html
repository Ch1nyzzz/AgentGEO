o><span data-dcnode-id="4662" instrument_node=""> </span><div class="video-ui" data-dcnode-id="4660"></div></div></div><span data-dcnode-id="4657" instrument_node=""> </span><figcaption data-dcnode-id="4650"><a class="play-button" data-dcnode-id="4651" href="#"><svg data-dcnode-id="4655" viewBox="0 0 74 86"><polygon data-dcnode-id="4656" points="2,2 72,42 2,84" vector-effect="non-scaling-stroke"></polygon></svg><span data-dcnode-id="4654" instrument_node=""> </span><span data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">Watch Introduction</span></span></a></figcaption></figure><span data-dcnode-id="4648" instrument_node=""> </span><a class="button read-issue" data-dcnode-id="4644" href="#skip-to-main-content"><span data-dcnode-id="4647" instrument_node="">
      Read Issue
      </span><span class="floating dib" data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">↓</span></span></a></div><span data-dcnode-id="4642" instrument_node=""> </span><span data-dcnode-id="4640" instrument_node=""> </span><main class="articles" data-dcnode-id="284"><div data-dcnode-id="4606" id="introduction"><article class="article-intro" data-dcnode-id="4607"><div class="padded" data-dcnode-id="4637"><div class="mono with-dot square" data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">Introduction</span></div></div><span data-dcnode-id="4636" instrument_node=""> </span><h1 class="headline fs-xl tac" data-dcnode-id="4633"><span data-dcnode-id="4634" style="display: block; -webkit-hyphens: none; hyphens: none;"><span data-dcnode-id="4635" instrument_node="">Why the Periodic Table of Elements Is More Important Than Ever</span></span></h1><span data-dcnode-id="4632" instrument_node=""> </span><div class="byline fs-md tac" data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">By Peter Coy</span></div><span data-dcnode-id="4629" instrument_node=""> </span><div class="content serif fs-md" data-dcnode-id="4608"><figure class="bloom-figure ratio-figure portrait float--left" data-dcnode-id="4617"><div class="ratio-wrap" data-dcnode-id="4625" style="padding-top: 136.799%;"><div data-dcnode-id="4626"><img alt="Portrait of Dmitri Mendeleev" data-dcnode-id="4628" sizes="(min-width: 1000px) 45vw, (min-width: 800px) 60vw, 75vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/iTs0ZRejX0Go/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iTs0ZRejX0Go/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iTs0ZRejX0Go/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iTs0ZRejX0Go/v0/1500x-1.jpg 2000w"><span data-dcnode-id="4627" instrument_node=""> </span></div></div><span data-dcnode-id="4624" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4618"><span data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">Dmitri Mendeleev, inventor of the periodic table, circa 1880-82.</span></span><span data-dcnode-id="4621" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">Photographer: Andrei Osipovich Kareli/Alamy</span></span></figcaption></figure><span data-dcnode-id="4616" instrument_node=""> </span><p data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">The inventor Buckminster Fuller once described technological progress as “ephemeralization.” Sunbeams and breezes are replacing coal and oil as energy sources, brands are more important than buildings to corporations, and fiat money has supplanted gold and silver. So it seems reasonable to conclude that the periodic table of elements—that wonky taxonomy of physical stuff such as copper, iron, mercury, and sulfur—is passé, no more relevant than a manual typewriter.</span></p><span data-dcnode-id="4613" instrument_node=""> </span><p data-dcnode-id="4609"><span data-dcnode-id="4612" instrument_node="">Except exactly the opposite is true. Matter still matters. And on the 150th anniversary of the periodic table’s formulation by the Russian chemist Dmitri Mendeleev, it’s more important than it’s ever been. </span><a class="dib with-arrow with-color noble-gases" data-dcnode-id="4610" data-terminal="NSN PWXHTZ6TTDS0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/features/2019-08-28/the-modern-triumph-of-the-periodic-table-of-elements"><span data-dcnode-id="4611" instrument_node=""> Read More</span></a></p></div></article></div><div data-dcnode-id="4569" id="table-150"><article class="article-flowing-box" data-dcnode-id="4570"><span data-dcnode-id="4604" instrument_node=""> </span><div class="box" data-dcnode-id="4571"><div class="columns" data-dcnode-id="4572"><h1 class="headline fs-md" data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">The Periodic Table at 150</span></h1><span data-dcnode-id="4601" instrument_node=""> </span><span data-dcnode-id="4599" instrument_node=""> </span><span data-dcnode-id="4597" instrument_node=""> </span><div class="content fs-sm" data-dcnode-id="4573"><p data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">Scientists have long sought to catalog the known elements: In 1789, Antoine Lavoisier sorted them by their properties. By 1808, John Dalton was listing them by atomic weight. In 1864, John Newlands argued for a law of octaves, asserting that every eighth element had similar attributes. But it took Dmitri Mendeleev to create a genuinely systematic and predictive table. </span></p><span data-dcnode-id="4594" instrument_node=""> </span><p data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">Born in Tobolsk, Siberia, in 1834, the youngest of more than a dozen children, Mendeleev graduated from the Main Pedagogical Institute in St. Petersburg in 1855. He studied chemistry in Heidelberg and Paris, then earned a doctorate back home and became a tenured professor at Saint Petersburg Imperial University. Dissatisfied by existing Russian inorganic chemistry textbooks, he decided to write one himself. </span></p><span data-dcnode-id="4591" instrument_node=""> </span><p data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">The work Mendeleev published beginning in 1869 both laid out the periodicity of the elements and predicted spaces for ones not yet identified. With the discovery of gallium in 1875, scandium in 1879, and germanium in 1886, the theories underlying the table were shown to be true. Increasing scientific acceptance of these theories accelerated research into the material world and its industrial and commercial applications. Mendeleev himself took part in this, investigating processes related to Russian coal, oil, and even cheese production during the country’s fitful drive to modernize. </span></p><span data-dcnode-id="4588" instrument_node=""> </span><p data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">Since his death from influenza in 1907, the table has changed some, but its fundamental organization remains. Each element has a one- or two-letter chemical symbol, usually derived from its common name but sometimes from another language, making gold, for example, “Au” for the Latin aurum. The atomic number tallies the protons in the atom’s nucleus. The standard atomic mass is sometimes given to multiple decimal places, with the number in parentheses if it’s for the longest-lived isotope.</span></p><span data-dcnode-id="4585" instrument_node=""> </span><p data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">The columns depict elements that have similar chemical properties. The alkali metals, shown in the first column on the left, for example, have one electron in their outer shell and therefore tend to bond particularly well with the halogens, in the second column from the right, which have seven electrons in their outer shell and lack the single electron needed to complete it. That’s how we get compounds such as sodium chloride—table salt—and potassium iodide, which helps protect the thyroid from the effects of radiation.</span></p><span data-dcnode-id="4582" instrument_node=""> </span><p data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">The column on the far right shows the noble gases, whose outer electron shells are full, making most of these elements useful in lighting since they won’t react with others. In most periodic tables, the lanthanides and actinides are placed in rows at the bottom to avoid making the table impractically wide.</span></p><span data-dcnode-id="4579" instrument_node=""> </span><p data-dcnode-id="4574"><span data-dcnode-id="4578" instrument_node="">Mendeleev didn’t get everything right: He believed that elements were unique and resisted the idea that they had the same building blocks. He also produced a convoluted case that ether was an element. But he got the basic design right, and that’s why he’s regarded as its inventor today—and why its sesquicentennial is being celebrated as the International Year of the Periodic Table. </span><span data-dcnode-id="4575" style="white-space: nowrap;"><em data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">—Joanna Ossinger</span></em></span></p></div></div></div></article></div><div data-dcnode-id="4504" id="hydrogen"><article class="article-large reactive-nonmetals" data-dcnode-id="4505"><div class="inline-elements" data-dcnode-id="4564"><div class="inline-element mono with-dot square reactive-nonmetals" data-dcnode-id="4565"><span data-dcnode-id="4568" instrument_node="">Hydrogen
  </span><span class="fs-xs" data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">$0.01/liter, 99.95% Grade B gaseous</span></span></div></div><span data-dcnode-id="4563" instrument_node=""> </span><div class="half left owl float-container" data-dcnode-id="4539"><h1 class="headline tac fs-lg serifitalic" data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node="">Getting on the Hydrogen Bus</span></h1><span data-dcnode-id="4560" instrument_node=""> </span><div class="byline" data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">Photographs by Rocco Rorandelli / Text by Jeff Muskus</span></div><span data-dcnode-id="4557" instrument_node=""> </span><div class="bloom-dek with-dot" data-dcnode-id="4552"><span data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">In Europe’s electric vehicle capital, hydrogen fuel might finally have a future.</span></span><span data-dcnode-id="4554" instrument_node=""> </span></div><span data-dcnode-id="4551" instrument_node=""> </span><div class="media owl" data-dcnode-id="4540"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="4541"><div class="ratio-wrap" data-dcnode-id="4549" style="padding-top: 56.25%;"><div data-dcnode-id="4550"></div></div><span data-dcnode-id="4548" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4542"><span data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">The Raggovidda wind farm on the Barents Sea coast.</span></span><span data-dcnode-id="4545" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">Video: Rocco Rorandelli for Bloomberg Businessweek</span></span></figcaption></figure></div></div><span data-dcnode-id="4538" instrument_node=""> </span><div class="half right" data-dcnode-id="4506"><div class="content serif" data-dcnode-id="4507"><figure class="bloom-figure ratio-figure landscape float--right" data-dcnode-id="4528"><div class="ratio-wrap" data-dcnode-id="4536" style="padding-top: 75%;"><div data-dcnode-id="4537"></div></div><span data-dcnode-id="4535" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4529"><span data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">The building for the electrolyzer being constructed close to the port of the town of Berlevag.</span></span><span data-dcnode-id="4532" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">Photographer: Rocco Rorandelli for Bloomberg Businessweek</span></span></figcaption></figure><span data-dcnode-id="4527" instrument_node="">
It may not look like it, but the building under construction to the left, near the Norwegian port of Berlevag, is about to become part of the world’s most efficient wind farm. By early next year, it will house a device called an electrolyzer, which, powered by that Norse wind, will produce hydrogen fuel for a growing army of forklifts, cars, trucks, and buses. A hydrogen station in the Oslo suburb of Hovik will soon be ready to fill them up.

</span><figure class="bloom-figure ratio-figure landscape float--left" data-dcnode-id="4517"><div class="ratio-wrap" data-dcnode-id="4525" style="padding-top: 75%;"><div data-dcnode-id="4526"></div></div><span data-dcnode-id="4524" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4518"><span data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">Hydrogen tanks inside the Scania regional service center of Trondheim.</span></span><span data-dcnode-id="4521" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">Photographer: Rocco Rorandelli for Bloomberg Businessweek</span></span></figcaption></figure><span data-dcnode-id="4516" instrument_node=""> </span><p data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">The hydrogen-battery revolution has been 10 years away for decades now. But Norway, Europe’s No. 1 in electric vehicles, is on track to become a leading adopter of the universe’s most abundant element. Proponents say it will become an essential component of a more environmentally friendly future as a growing supply of renewably generated hydrogen makes the fuel more competitive.</span></p><span data-dcnode-id="4513" instrument_node=""> </span><p data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">One longtime knock on hydrogen fuel has been that fossil fuels are often required to generate it. Not so at the Berlevag wind farm, or in the Norwegian city of Trondheim, where a technician employed by Swedish vehicle manufacturer Scania AB is working with hydrogen electrolyzers and tanks that will be fueled by solar panels. This hydrogen setup will power a fleet of trucks and forklifts being tested for ASKO, a local grocery wholesaler.</span></p><span data-dcnode-id="4510" instrument_node=""> </span><p data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">For now, though, the dirtier forms of hydrogen production remain less than half as expensive as renewable ones. That’s a headache for Norway’s government, which plans to halt sales of fossil-fuel-powered cars by 2025 and expects to have as many as 500,000 hydrogen cars on the road in the country a few years later. At the very least, that would mean a lot more electrolyzers in places like Berlevag.</span></p></div></div></article></div><div data-dcnode-id="4471" id="helium"><article class="article-photo noble-gases invert" data-dcnode-id="4472"><div class="inline-elements" data-dcnode-id="4499"><div class="inline-element mono with-dot square noble-gases" data-dcnode-id="4500"><span data-dcnode-id="4503" instrument_node="">Helium
  </span><span class="fs-xs" data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">$0.95/liter, 200-liter cylinder</span></span></div></div><span data-dcnode-id="4498" instrument_node=""> </span><div class="header" data-dcnode-id="4485"><h1 class="headline fs-lg di serif" data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">We’re Running Out of Helium, and Two Geologists Might Have a Fix</span></h1><span data-dcnode-id="4495" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">By Paul Tullis</span></div><span data-dcnode-id="4492" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="4486"><span data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">MRI machines, fiber-optic cables, and kids’ birthday parties need it. Helium One wants to help.</span></span><span data-dcnode-id="4489" instrument_node=""> </span><a class="dib with-color with-arrow" data-dcnode-id="4487" data-terminal="NSN PWXHU26S9729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/features/2019-08-28/we-re-running-out-of-helium-and-helium-one-might-have-a-fix"><span data-dcnode-id="4488" instrument_node="">Read Story</span></a></div></div><span data-dcnode-id="4484" instrument_node=""> </span><div class="media" data-dcnode-id="4473"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="4474"><div class="ratio-wrap" data-dcnode-id="4482" style="padding-top: 56.25%;"><div data-dcnode-id="4483"></div></div><span data-dcnode-id="4481" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4475"><span data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">Karim Mtili, a geology grad student, collects gas samples in Itumbula, Tanzania.</span></span><span data-dcnode-id="4478" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">Video: Adriane Ohanesian for Bloomberg Businessweek</span></span></figcaption></figure></div></article></div><div data-dcnode-id="4393" id="lithium"><article class="article-medium owl alkali-metals" data-dcnode-id="4394"><div class="inline-elements" data-dcnode-id="4466"><div class="inline-element mono with-dot square alkali-metals" data-dcnode-id="4467"><span data-dcnode-id="4470" instrument_node="">Lithium
  </span><span class="fs-xs" data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">$10.34/kg, 56.5% lithium hydroxide, China market</span></span></div></div><span data-dcnode-id="4465" instrument_node=""> </span><div class="header" data-dcnode-id="4457"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">Storage Wars</span></h1><span data-dcnode-id="4462" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">By Mark Burton</span></div><span data-dcnode-id="4459" instrument_node=""> </span></div><span data-dcnode-id="4456" instrument_node=""> </span><div class="media" data-dcnode-id="4447"><figure class="bloom-figure ratio-figure wide" data-dcnode-id="4448"><div class="ratio-wrap" data-dcnode-id="4454" style="padding-top: 0.0833333%;"><div data-dcnode-id="4455"></div></div><span data-dcnode-id="4453" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4449"><span data-dcnode-id="4451" instrument_node=""> </span></figcaption></figure></div><span data-dcnode-id="4446" instrument_node=""> </span><div class="content columns serif" data-dcnode-id="4395"><p data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">If the 20th century was the age of the internal combustion engine, the 21st belongs to the battery. Within a few decades, batteries will probably be the dominant source of power propelling cars and trucks, and they could even become commonplace in helicopters and planes. Far from their golf cart predecessors, today’s electric vehicles can reach ludicrous speeds while emitting far fewer pollutants than gas guzzlers. They’re also easier to make, and their batteries can be recycled. Carmakers from General Motors Co. to BMW AG are spending billions of dollars to make environmentally friendly transportation a reality. But the effort comes with its own environmental hazards, and pressure is building to ensure the companies are sourcing the critical elements responsibly. It would be all too easy to fall into many of the same traps as the oil industry that EVs are meant to leave behind. In this issue we’ve taken a look at the raw materials in batteries, from lithium to cobalt to zinc, to see how their green credentials compare.</span></p><span data-dcnode-id="4443" instrument_node=""> </span><h1 data-dcnode-id="4441" id="lithium-the-water-guzzler"><span data-dcnode-id="4442" instrument_node="">Lithium: The Water Guzzler</span></h1><span data-dcnode-id="4440" instrument_node=""> </span><hr data-dcnode-id="4439" style="margin: 1em 0px 0.325em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="4413" style="margin: 0px;"><tbody data-dcnode-id="4414"><tr data-dcnode-id="4431"><td data-dcnode-id="4436"><span data-dcnode-id="4437" style="padding-right: 0.65em;"><span data-dcnode-id="4438" instrument_node="">Abundance</span></span></td><td data-dcnode-id="4432"><span data-dcnode-id="4435" instrument_node="">○○○</span><span data-dcnode-id="4433" style="color: rgb(204, 204, 204);"><span data-dcnode-id="4434" instrument_node="">○○</span></span></td></tr><tr data-dcnode-id="4423"><td data-dcnode-id="4428"><span data-dcnode-id="4429" style="padding-right: 0.65em;"><span data-dcnode-id="4430" instrument_node="">Mining practices</span></span></td><td data-dcnode-id="4424"><span data-dcnode-id="4427" instrument_node="">○○</span><span data-dcnode-id="4425" style="color: rgb(204, 204, 204);"><span data-dcnode-id="4426" instrument_node="">○○○</span></span></td></tr><tr data-dcnode-id="4415"><td data-dcnode-id="4420"><span data-dcnode-id="4421" style="padding-right: 0.65em;"><span data-dcnode-id="4422" instrument_node="">Recycling &amp; reuse</span></span></td><td data-dcnode-id="4416"><span data-dcnode-id="4419" instrument_node="">○○○</span><span data-dcnode-id="4417" style="color: rgb(204, 204, 204);"><span data-dcnode-id="4418" instrument_node="">○○</span></span></td></tr></tbody></table><hr data-dcnode-id="4412" style="margin: 0.4em 0px -0.3em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="4411" instrument_node=""> </span><ul data-dcnode-id="4396"><li data-dcnode-id="4407"><em data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">Used in:</span></em><span data-dcnode-id="4408" instrument_node=""> Lithium-ion batteries powering cars, cellphones, and power tools</span></li><span data-dcnode-id="4406" instrument_node=""> </span><li data-dcnode-id="4402"><em data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">What it does:</span></em><span data-dcnode-id="4403" instrument_node=""> Enables energy to pass between the batteries’ positive and negative electrodes</span></li><span data-dcnode-id="4401" instrument_node=""> </span><li data-dcnode-id="4397"><em data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">Achilles’ heel:</span></em><span data-dcnode-id="4398" instrument_node=""> If prices stay low, mining, exploration, and recycling might not be worth the cost. That would leave the industry more reliant on an environmentally riskier method known as brine extraction, which involves pumping underground saltwater reserves and extracting the lithium through evaporation.</span></li></ul></div></article></div><div data-dcnode-id="4390" id="ad1"><div class="dvz-v0-ad" data-dcnode-id="4391"><div class="dvz-v0-ad-div" data-dcnode-id="4392" id="dvz-v0-ad-1"></div></div></div><div data-dcnode-id="4348" id="beryllium"><article class="article-small alkaline-earth-metals" data-dcnode-id="4349"><div class="inline-elements" data-dcnode-id="4385"><div class="inline-element mono with-dot square alkaline-earth-metals" data-dcnode-id="4386"><span data-dcnode-id="4389" instrument_node="">Beryllium
  </span><span class="fs-xs" data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">$500/kg, U.S. market</span></span></div></div><span data-dcnode-id="4384" instrument_node=""> </span><div class="left owl" data-dcnode-id="4363"><div class="article-small_headline" data-dcnode-id="4376"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">A Very High-End Bike</span></h1><span data-dcnode-id="4381" instrument_node=""> </span><div class="byline dib" data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">By Caroline Winter</span></div><span data-dcnode-id="4378" instrument_node=""> </span></div><span data-dcnode-id="4375" instrument_node=""> </span><div class="media owl" data-dcnode-id="4364"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="4365"><div class="ratio-wrap" data-dcnode-id="4373" style="padding-top: 52.4876%;"><div data-dcnode-id="4374"></div></div><span data-dcnode-id="4372" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4366"><span data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">A BE401 mountain bike manufactured by Beyond Bicycles and made with beryllium.</span></span><span data-dcnode-id="4369" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">Courtesy Chris Hinshaw</span></span></figcaption></figure></div></div><span data-dcnode-id="4362" instrument_node=""> </span><div class="right" data-dcnode-id="4350"><span data-dcnode-id="4360" instrument_node=""> </span><div class="content serif" data-dcnode-id="4351"><p data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">Tougher than steel, lighter than aluminum, rather rare, and toxic if inhaled, beryllium is normally reserved for use in such high-tech applications as X-ray machines, spaceships, and nuclear reactors and weapons. </span></p><span data-dcnode-id="4357" instrument_node=""> </span><p data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">But in the 1990s former triathlete Chris Hinshaw spotted a market opportunity: bicycles. His company in San Jose, Beyond Beryllium Fabrications, made about 100 bikes with the metal. Most were built using aluminum-beryllium alloys and sold for about $1,900; ones with weapons-grade beryllium went for as much as $30,000. Customers included baseball star Chili Davis. </span></p><span data-dcnode-id="4354" instrument_node=""> </span><p data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">Hinshaw stopped making beryllium bikes after a few years because his main supplier, a Russian mine and refinery, became unreliable. “When the Soviet Union fell, we realized right away that there wasn’t an infrastructure in place, not only to make product but do it to the standards and expectations set forth in the bicycling industry,” he says.</span></p></div></div></article></div><div data-dcnode-id="4312" id="boron"><article class="article-small metalloids" data-dcnode-id="4313"><div class="inline-elements" data-dcnode-id="4343"><div class="inline-element mono with-dot square metalloids" data-dcnode-id="4344"><span data-dcnode-id="4347" instrument_node="">Boron
  </span><span class="fs-xs" data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">$0.43/kg, average value of U.S. imports</span></span></div></div><span data-dcnode-id="4342" instrument_node=""> </span><div class="left owl" data-dcnode-id="4324"><div class="article-small_headline" data-dcnode-id="4335"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">Total Borons?</span></h1><span data-dcnode-id="4339" instrument_node=""> </span><span data-dcnode-id="4337" instrument_node=""> </span></div><span data-dcnode-id="4334" instrument_node=""> </span><div class="media owl" data-dcnode-id="4325"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="4326"><div class="ratio-wrap" data-dcnode-id="4332" style="padding-top: 131.5%;"><div data-dcnode-id="4333"></div></div><span data-dcnode-id="4331" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4327"><span data-dcnode-id="4329" instrument_node=""> </span></figcaption></figure></div></div><span data-dcnode-id="4323" instrument_node=""> </span><div class="right" data-dcnode-id="4314"><span data-dcnode-id="4321" instrument_node=""> </span><div class="content serif" data-dcnode-id="4315"><p data-dcnode-id="4316"><span data-dcnode-id="4320" instrument_node="">In our Oct. 20, 1956, issue, </span><em data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">BusinessWeek</span></em><span data-dcnode-id="4317" instrument_node=""> predicted “a host of big exciting new uses” for boron, particularly in jet fuel. A few years later, scientists realized that boron-based fuels are highly toxic—and also prone to spontaneously combust. Luckily for us, boron continued to prove useful in a growing array of other products, including laundry detergent, fertilizer, and LCD screens. We wound up being right, just not for the reasons we thought.</span></p></div></div></article></div><div data-dcnode-id="4282" id="carbon"><article class="article-photo reactive-nonmetals" data-dcnode-id="4283"><div class="inline-elements" data-dcnode-id="4307"><div class="inline-element mono with-dot square reactive-nonmetals" data-dcnode-id="4308"><span data-dcnode-id="4311" instrument_node="">Carbon
  </span><span class="fs-xs" data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">$0.11/kg, minimum carbon price recommended by the UN Global Compact</span></span></div></div><span data-dcnode-id="4306" instrument_node=""> </span><div class="header" data-dcnode-id="4294"><h1 class="headline fs-lg di" data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">The Everything Atom</span></h1><span data-dcnode-id="4303" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">By Eric Roston</span></div><span data-dcnode-id="4300" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="4295"><span data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">If chemistry were fair, the 118 elements would distribute themselves evenly among the 154 million substances in the American Chemical Society’s CAS Registry. It’s not. All but about 2 million have a molecular scaffolding of atom No. 6, carbon. It’s the diamond on the ring, and also a good bit of the finger wearing it. Here, by size and date of discovery, are a few mighty molecules brought to you by the letter C.</span></span><span data-dcnode-id="4297" instrument_node=""> </span></div></div><span data-dcnode-id="4293" instrument_node=""> </span><div class="media padded" data-dcnode-id="4284"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="4285"><div class="ratio-wrap" data-dcnode-id="4291" style="padding-top: 69%;"><div data-dcnode-id="4292"></div></div><span data-dcnode-id="4290" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4286"><span data-dcnode-id="4288" instrument_node=""> </span></figcaption></figure></div></article></div><div data-dcnode-id="4226" id="nitrogen"><article class="article-small reactive-nonmetals" data-dcnode-id="4227"><div class="inline-elements" data-dcnode-id="4273"><div class="inline-element mono with-dot square reactive-nonmetals" data-dcnode-id="4278"><span data-dcnode-id="4281" instrument_node="">Nitrogen
  </span><span class="fs-xs" data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">$0.10/kg, 99.99% Grade B liquid</span></span></div><div class="inline-element mono with-dot square reactive-nonmetals" data-dcnode-id="4274"><span data-dcnode-id="4277" instrument_node="">Oxygen
  </span><span class="fs-xs" data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">$0.17/kg, 99.6% Grade A liquid</span></span></div></div><span data-dcnode-id="4272" instrument_node=""> </span><span data-dcnode-id="4270" instrument_node=""> </span><div class="cols owl" data-dcnode-id="4228"><div class="article-small_headline" data-dcnode-id="4262"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">Nitro Pour</span></h1><span data-dcnode-id="4267" instrument_node=""> </span><div class="byline dib" data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">By Kate Krader</span></div><span data-dcnode-id="4264" instrument_node=""> </span></div><span data-dcnode-id="4261" instrument_node=""> </span><div class="content serif" data-dcnode-id="4229"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="4251"><div class="ratio-wrap" data-dcnode-id="4259" style="padding-top: 75%;"><div data-dcnode-id="4260"></div></div><span data-dcnode-id="4258" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4252"><span data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">Nitro cold brew.</span></span><span data-dcnode-id="4255" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">Photo: iStock/Getty Images</span></span></figcaption></figure><span data-dcnode-id="4250" instrument_node=""> </span><p data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">There’s not much that can change how you make a cup of coffee, pumpkin spice notwithstanding. Beans are roasted, ground, and then steeped in water with or without pressure. But in recent years, there’s been a major update to your basic cup of joe: pumping odorless nitrogen gas into brewed coffee to add frothiness and the tiniest hint of sweetness. A good nitro cold brew will look like an inviting beer, with a soft, foamy top. Since the first one flowed from an Austin tap around 2012, according to the most popular origin story, it’s become a staple for coffeeheads and a driver in the $4.1 billion ready-to-drink coffee category.</span></p><span data-dcnode-id="4247" instrument_node=""> </span><p data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">Stumptown Coffee Roasters Inc., the Portland, Ore.-based national chain, first offered cans of nitro brew in 2015 after experimenting with draft versions. With sales of about 2 million cans a year, it’s the company’s fastest-growing product. Early on, says head brewer Brent Wolczynski, “the process was very DIY. We would put cold brew in a keg, hit it with nitrogen at a really high pressure, and just shake it around.”</span></p><span data-dcnode-id="4244" instrument_node=""> </span><p data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">Now the process is the equivalent of a marvelous science experiment: Each can is equipped with a small plastic widget that encloses the nitrogen. Cracking open the can exposes the brew to atmospheric pressure, pushing the nitrogen out and through the coffee. The result is a cascade of tiny bubbles as you pour.</span></p><span data-dcnode-id="4241" instrument_node=""> </span><p data-dcnode-id="4233"><span data-dcnode-id="4240" instrument_node="">La Colombe Coffee Roasters, another premier brand, includes nitrogen’s periodic table mate, oxygen, in its version. The draft latte is made with nitrous oxide (N</span><sub data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">2</span></sub><span data-dcnode-id="4237" instrument_node="">O), a compound more famously known as laughing gas, that’s also used to animate canned whipped cream. A customized valve delivers the kind of foam typically found in a hot latte into the cold beverage. N</span><sub data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">2</span></sub><span data-dcnode-id="4234" instrument_node="">O bubbles last longer than nitro’s and create an extra-creamy texture with a more pronounced sweetness. La Colombe has even patented its can.</span></p><span data-dcnode-id="4232" instrument_node=""> </span><p data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">Another big name in coffee, Starbucks Corp., has announced that its nitro cold brew will be sold on tap nationwide by yearend. No surprise, it will be available in several flavors and finishes, like one with a “cascara cold foam” and another with “sweet cream.” There’ll even be a pumpkin cream cold brew.</span></p></div></div></article></div><div data-dcnode-id="4194" id="dissection1"><article class="article-photostat float-container accent invert" data-dcnode-id="4195"><div class="left owl" data-dcnode-id="4207"><div class="inline-elements" data-dcnode-id="4223"><div class="with-dot square mono" data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">Composition</span></div></div><span data-dcnode-id="4222" instrument_node=""> </span><div class="header" data-dcnode-id="4215"><h1 class="headline fs-lg di serif" data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">Night Vision Binoculars</span></h1><span data-dcnode-id="4219" instrument_node=""> </span><span data-dcnode-id="4217" instrument_node=""> </span></div><span data-dcnode-id="4214" instrument_node=""> </span><div class="content sans" data-dcnode-id="4208"><p data-dcnode-id="4209"><span data-dcnode-id="4213" instrument_node="">Night vision technology has become reliable and widespread, used by everyone from soldiers to birders. Although a digital approach is becoming popular, light intensification remains the industry standard. As moonlight reflected off an object enters these battery-powered binoculars, it passes through the lens into an image-intensifying tube. A photocathode then converts the light into electrons that are amplified by a photomultiplier and directed toward a phosphorescent screen to produce a visible image. </span><span data-dcnode-id="4210" style="white-space: nowrap;"><em data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">—E. Tammy Kim</span></em></span></p></div></div><span data-dcnode-id="4206" instrument_node=""> </span><div class="media" data-dcnode-id="4196"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="4197"><div class="ratio-wrap" data-dcnode-id="4204" style="padding-top: 125%;"><div data-dcnode-id="4205"></div></div><span data-dcnode-id="4203" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4198"><span data-dcnode-id="4201" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">Photographer: Daniel Shea for Bloomberg Businessweek. Prop stylist: Anna Surbatovich. Product courtesy Night Owl Optics, First Texas Products LLC</span></span></figcaption></figure></div></article></div><div data-dcnode-id="4191" id="ad2"><div class="dvz-v0-ad" data-dcnode-id="4192"><div class="dvz-v0-ad-div" data-dcnode-id="4193" id="dvz-v0-ad-2"></div></div></div><div data-dcnode-id="4156" id="fluorine"><article class="article-medium owl halogens invert" data-dcnode-id="4157"><div class="inline-elements" data-dcnode-id="4186"><div class="inline-element mono with-dot square halogens" data-dcnode-id="4187"><span data-dcnode-id="4190" instrument_node="">Fluorine
  </span><span class="fs-xs" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">$1,528/kg, Swix high-fluoro wax</span></span></div></div><span data-dcnode-id="4185" instrument_node=""> </span><div class="header" data-dcnode-id="4172"><h1 class="headline fs-lg di" data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">Cross-Country Skiing’s Dirty Little Fluorinated Secret</span></h1><span data-dcnode-id="4182" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">By Bill Donahue</span></div><span data-dcnode-id="4179" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="4173"><span data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">Professionals and amateurs alike are hooked on fluoro wax, but the EU is banning it.</span></span><span data-dcnode-id="4176" instrument_node=""> </span><a class="dib with-color with-arrow" data-dcnode-id="4174" data-terminal="NSN PWXHU56S9728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2019-08-28/cross-country-skiiers-are-addicted-to-banned-fluoro-wax"><span data-dcnode-id="4175" instrument_node="">Read Story</span></a></div></div><span data-dcnode-id="4171" instrument_node=""> </span><div class="media" data-dcnode-id="4160"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="4161"><div class="ratio-wrap" data-dcnode-id="4169" style="padding-top: 75%;"><div data-dcnode-id="4170"></div></div><span data-dcnode-id="4168" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4162"><span data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">A bar of Swix high fluoro ski wax.</span></span><span data-dcnode-id="4165" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">Photographer: Evan Ortiz for Bloomberg Businessweek</span></span></figcaption></figure></div><span data-dcnode-id="4159" instrument_node=""> </span></article></div><div data-dcnode-id="4124" id="neon"><article class="article-photo noble-gases" data-dcnode-id="4125"><div class="inline-elements" data-dcnode-id="4151"><div class="inline-element mono with-dot square noble-gases" data-dcnode-id="4152"><span data-dcnode-id="4155" instrument_node="">Neon
  </span><span class="fs-xs" data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">$2/liter, 200-liter cylinder</span></span></div></div><span data-dcnode-id="4150" instrument_node=""> </span><div class="header" data-dcnode-id="4138"><h1 class="headline fs-lg di sansitalic" data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">Lights Lights Lights</span></h1><span data-dcnode-id="4147" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Photographs and text by Tommy Trenchard</span></div><span data-dcnode-id="4144" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="4139"><span data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Scientists discovered the presence of neon in the atmosphere at the end of the 19th century. The element and its fellow noble gases—including argon, krypton, and radon—are tasteless, odorless, colorless, and largely unreactive. But when subjected to an electrical charge, they emit various colors. In the 1920s entrepreneurs recognized the advertising potential of this, and within a few years neon signs had started changing the face of the world’s cities. They eventually defined the appearance of iconic locations, such as New York City’s Times Square and the Las Vegas Strip.</span></span><span data-dcnode-id="4141" instrument_node=""> </span></div></div><span data-dcnode-id="4137" instrument_node=""> </span><div class="media" data-dcnode-id="4126"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="4127"><div class="ratio-wrap" data-dcnode-id="4135" style="padding-top: 56.25%;"><div data-dcnode-id="4136"></div></div><span data-dcnode-id="4134" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4128"><span data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">Neon creates the red-and-orange glow most commonly associated with the lights, whose colors depend on the gas, or combination of gases, in the tubes. By the 1970s, Hong Kong had emerged as one of the world’s great neon cities. Signs jostled for placement in its narrow streets as restaurants, clubs, and movie theaters tried to outdo each other in style and size. Read more at argon, krypton, and xenon.</span></span><span data-dcnode-id="4131" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">Video: Tommy Trenchard for Bloomberg Businessweek</span></span></figcaption></figure></div></article></div><div data-dcnode-id="4079" id="sodium"><article class="article-large alkali-metals invert" data-dcnode-id="4080"><div class="inline-elements" data-dcnode-id="4119"><div class="inline-element mono with-dot square alkali-metals" data-dcnode-id="4120"><span data-dcnode-id="4123" instrument_node="">Sodium
  </span><span class="fs-xs" data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">$110/kg, 5-pound bag of Jacobsen pure flake finishing salt</span></span></div></div><span data-dcnode-id="4118" instrument_node=""> </span><div class="half left owl float-container" data-dcnode-id="4094"><h1 class="headline tac fs-lg serifitalic" data-dcnode-id="4115"><span data-dcnode-id="4116" style="display: block; text-align: left;"><span data-dcnode-id="4117" instrument_node="">The Salt King of America</span></span></h1><span data-dcnode-id="4114" instrument_node=""> </span><div class="byline fs-md" data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">By Andrew Zaleski</span></div><span data-dcnode-id="4111" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="4105"><span data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">Ben Jacobsen wants people to think differently about the power of salt.</span></span><span data-dcnode-id="4108" instrument_node=""> </span><a class="dib with-color with-arrow" data-dcnode-id="4106" data-terminal="NSN PWXHU86S9728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/features/2019-08-28/jacobsen-salt-is-bringing-attention-to-sodium-chloride"><span data-dcnode-id="4107" instrument_node="">Read Story</span></a></div><span data-dcnode-id="4104" instrument_node=""> </span><div class="media owl" data-dcnode-id="4095"><figure class="bloom-figure ratio-figure wide" data-dcnode-id="4096"><div class="ratio-wrap" data-dcnode-id="4102" style="padding-top: 0.0833333%;"><div data-dcnode-id="4103"></div></div><span data-dcnode-id="4101" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4097"><span data-dcnode-id="4099" instrument_node=""> </span></figcaption></figure></div></div><span data-dcnode-id="4093" instrument_node=""> </span><div class="half right" data-dcnode-id="4081"><div class="content serif" data-dcnode-id="4082"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="4083"><div class="ratio-wrap" data-dcnode-id="4091" style="padding-top: 133.333%;"><div data-dcnode-id="4092"></div></div><span data-dcnode-id="4090" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4084"><span data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">Ben Jacobsen, founder of Jacobsen Salt Co.</span></span><span data-dcnode-id="4087" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">Photographer: Shawn Records for Bloomberg Businessweek</span></span></figcaption></figure></div></div></article></div><div data-dcnode-id="3983" id="magnesium"><article class="article-large alkaline-earth-metals no-dek" data-dcnode-id="3984"><div class="inline-elements" data-dcnode-id="4074"><div class="inline-element mono with-dot square alkaline-earth-metals" data-dcnode-id="4075"><span data-dcnode-id="4078" instrument_node="">Magnesium
  </span><span class="fs-xs" data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">$4.74/kg, U.S. spot</span></span></div></div><span data-dcnode-id="4073" instrument_node=""> </span><div class="half left owl float-container" data-dcnode-id="4053"><h1 class="headline tac fs-lg sans" data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">Flashback</span></h1><span data-dcnode-id="4070" instrument_node=""> </span><div class="byline" data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">By E. Tammy Kim</span></div><span data-dcnode-id="4067" instrument_node=""> </span><span data-dcnode-id="4065" instrument_node=""> </span><div class="media owl" data-dcnode-id="4054"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="4055"><div class="ratio-wrap" data-dcnode-id="4063" style="padding-top: 78.9091%;"><div data-dcnode-id="4064"></div></div><span data-dcnode-id="4062" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4056"><span data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">Two children in a tenement room, circa 1910.</span></span><span data-dcnode-id="4059" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Photographer: Jessie Tarbox Beals; Courtesy Community Service Society of New York/Rare Book and Manuscript Library/Columbia University</span></span></figcaption></figure></div></div><span data-dcnode-id="4052" instrument_node=""> </span><div class="half right" data-dcnode-id="3985"><div class="content serif" data-dcnode-id="3986"><p data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">Light is and always has been the photographer’s greatest concern. But in the mid-19th century, the task of capturing and creating light was all-consuming. In 1864, Alfred Brothers, the son of an English chemist, began to experiment with a primitive flash—essentially, a metal-burning lamp. </span></p><span data-dcnode-id="4049" instrument_node=""> </span><p data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">The key was magnesium, a remarkably lightweight silvery metal. At No. 12 on the periodic table, toward the top left corner, it’s one of the most common elements on Earth, yet it’s never found in its pure form. On its own, magnesium burns slow and clear and gives off a bright, neutral light—no blue or yellow sheen.</span></p><span data-dcnode-id="4046" instrument_node=""> </span><p data-dcnode-id="4041"><span data-dcnode-id="4045" instrument_node="">Brothers took a chunk of magnesium ore, bathed it in acid, mixed it with salt, burned it, and captured the vaporized condensation. He hammered this purified metal lump into a sheet, then cut it into ribbons that could be lit like candle wicks. He placed this controlled fire next to his enormous, boxy camera and made a portrait in his studio. “Henceforth it will be next to impossible for mortal man to hide himself from the lens of the photographer. Formerly we were safe after sunset, but that is no longer,” a London journalist wrote in the </span><em data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">Standard</span></em><span data-dcnode-id="4042" instrument_node="">. Soon, adventurers such as Charles Piazzi Smyth were taking magnesium on the road to shoot the first scenes of caverns and the insides of the Great Pyramid of Giza. </span></p><span data-dcnode-id="4040" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape float--left" data-dcnode-id="4030"><div class="ratio-wrap" data-dcnode-id="4038" style="padding-top: 50.6818%;"><div data-dcnode-id="4039"></div></div><span data-dcnode-id="4037" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4031"><span data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">Piazzi Smyth: Inside the Great Pyramids.</span></span><span data-dcnode-id="4034" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">Courtesy SSPL/Getty Images</span></span></figcaption></figure><span data-dcnode-id="4029" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape float--left" data-dcnode-id="4019"><div class="ratio-wrap" data-dcnode-id="4027" style="padding-top: 78.9091%;"><div data-dcnode-id="4028"></div></div><span data-dcnode-id="4026" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="4020"><span data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">Family around a piano, New York City, circa 1916.</span></span><span data-dcnode-id="4023" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">Photographer: Jessie Tarbox Beals; Courtesy Community Service Society of New York/Rare Book and Manuscript Library/Columbia University</span></span></figcaption></figure><span data-dcnode-id="4018" instrument_node=""> </span><p data-dcnode-id="4010"><span data-dcnode-id="4017" instrument_node="">By the 1880s, the magnesium flash had leapt from the toolbox of explorers to that of journalists. As the story goes, Jacob Riis, then a photographer for New York’s </span><em data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">Evening Sun</span></em><span data-dcnode-id="4014" instrument_node="">, read an article about a German manufacturer of flash powder and reacted “with an outcry that startled my wife. … A way had been discovered, it ran, to take pictures by flashlight.” Riis acquired a flash gun—which ignites magnesium powder inside a pistol—and took it with him to shoot the dark tenements of New York’s Lower East Side. Without magnesium, there would be no </span><em data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">How the Other Half Lives</span></em><span data-dcnode-id="4011" instrument_node="">.</span></p><span data-dcnode-id="4009" instrument_node=""> </span><p data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">There would also be no tenement pictures from Jessie Tarbox Beals, a schoolteacher-turned-photographer who shot portraits of early 20th century New Yorkers. She was, as historian Kate Flint writes in Flash!, a master of “the surprising illumination of the everyday.” In one especially notable Beals portrait, an unnamed woman sits on a kitchen chair, holding a naked infant in each arm, wearing a flat, tired expression. She and her babies are squeezed among mismatched cribs, a worn apple basket, an iron stove, pots, a kettle, and bottles and plates stacked in open cabinets. A calendar and a rag hang from the wall; the floor is all grimy tile. Has any room ever seen more life?</span></p><span data-dcnode-id="4006" instrument_node=""> </span><p data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">In the decades after Beals’s death in 1942, the magnesium flash evolved only in form. It went from the flash gun to the flashbulb—what we now imagine as a blinding burst in mid-20th century paparazzi shots. Dan Tidwell started out as a photographer in the final days of the magnesium flash. In 1965, at the age of 20, he was hired to document an historic project near Sacramento: the final testing stage of NASA’s Apollo program. Tidwell’s camera of choice was a large-format Graflex 4x5 with a large flashbulb attached to its right side. “It would not be uncommon for that glass bulb to literally explode,” he told me.</span></p><span data-dcnode-id="4003" instrument_node=""> </span><p data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">In one of his pictures, four men in white coveralls and hard hats stand in front of an enormous rocket. At right, a conical mass of wires, pipes, and balloons twists in shades of black and gray. At left, the flash has merged the men’s coveralls, the rocket’s curved body, and the wall of the hangar into a bleached plane.</span></p><span data-dcnode-id="4000" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="3990"><div class="ratio-wrap" data-dcnode-id="3998" style="padding-top: 79.4545%;"><div data-dcnode-id="3999"></div></div><span data-dcnode-id="3997" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3991"><span data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">Apollo tests.</span></span><span data-dcnode-id="3994" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">Photographer: Dan Tidwell</span></span></figcaption></figure><span data-dcnode-id="3989" instrument_node=""> </span><p data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">That flash-shocked aesthetic isn’t so popular these days. (Just one company, Meggaflash, in Ireland, still sells old-fashioned flashbulbs.) In July I attended a wedding in a dusky, jasmine-scented garden in Los Angeles. As soon as the ceremony began, nearly every guest raised her smartphone. Long after nightfall we continued to shoot without a flash, reflecting a shared preference for subtle edges. Only the wedding photographer used the occasional flash to interrupt our inky surroundings. He clicked the device onto the body of his camera and pressed the shutter. There was no acrid explosion or metallic smoke—just the memory of magnesium’s blinding light.</span></p></div></div></article></div><div data-dcnode-id="3952" id="aluminum"><article class="article-photostat float-container accent invert" data-dcnode-id="3953"><div class="left owl" data-dcnode-id="3965"><div class="inline-elements" data-dcnode-id="3978"><div class="inline-element mono with-dot square post-transition-metals" data-dcnode-id="3979"><span data-dcnode-id="3982" instrument_node="">Aluminum
  </span><span class="fs-xs" data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">$2.54/kg, ingot, U.S. market</span></span></div></div><span data-dcnode-id="3977" instrument_node=""> </span><div class="header" data-dcnode-id="3970"><h1 class="headline fs-lg di" data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">Ink Think</span></h1><span data-dcnode-id="3974" instrument_node=""> </span><span data-dcnode-id="3972" instrument_node=""> </span></div><span data-dcnode-id="3969" instrument_node=""> </span><div class="content sans" data-dcnode-id="3966"><p data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">The metallic color shown on this issue’s cover is Pantone 877 C, whose shimmery quality derives from aluminum flakes mixed into the ink.</span></p></div></div><span data-dcnode-id="3964" instrument_node=""> </span><div class="media" data-dcnode-id="3954"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="3955"><div class="ratio-wrap" data-dcnode-id="3962" style="padding-top: 130.797%;"><div data-dcnode-id="3963"></div></div><span data-dcnode-id="3961" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3956"><span data-dcnode-id="3959" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">Photographs for Bloomberg Businessweek by Tommy Trenchard (Neon), Shawn Records (Sodium), Kiliii Yuyan (Neodymium), Carlotta Cardana (Gold), and Christie Hemm Klok (Berkelium)</span></span></figcaption></figure></div></article></div><div data-dcnode-id="3949" id="ad3"><div class="dvz-v0-ad" data-dcnode-id="3950"><div class="dvz-v0-ad-div" data-dcnode-id="3951" id="dvz-v0-ad-3"></div></div></div><div data-dcnode-id="3894" id="silicon"><article class="article-small metalloids" data-dcnode-id="3895"><div class="inline-elements" data-dcnode-id="3944"><div class="inline-element mono with-dot square metalloids" data-dcnode-id="3945"><span data-dcnode-id="3948" instrument_node="">Silicon
  </span><span class="fs-xs" data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">$3.04/kg, silicon metal, U.S. market</span></span></div></div><span data-dcnode-id="3943" instrument_node=""> </span><span data-dcnode-id="3941" instrument_node=""> </span><div class="cols owl" data-dcnode-id="3896"><div class="article-small_headline" data-dcnode-id="3933"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Sand Blasters</span></h1><span data-dcnode-id="3938" instrument_node=""> </span><div class="byline dib" data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">By Drake Bennett</span></div><span data-dcnode-id="3935" instrument_node=""> </span></div><span data-dcnode-id="3932" instrument_node=""> </span><div class="content serif" data-dcnode-id="3897"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="3922"><div class="ratio-wrap" data-dcnode-id="3930" style="padding-top: 66.65%;"><div data-dcnode-id="3931"></div></div><span data-dcnode-id="3929" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3923"><span data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">(From left) Sandcastle sand and frac sand.</span></span><span data-dcnode-id="3926" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">Photo: Getty Images</span></span></figcaption></figure><span data-dcnode-id="3921" instrument_node=""> </span><p data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">In hydraulic fracturing, or fracking, drillers pump a viscous, gritty goo down a well at pressures that splinter the rock beneath, releasing trapped oil and ­natural gas deposits. The resulting channels are kept open using grains of “proppant” suspended in the frac fluid. The most common proppant is sand.</span></p><span data-dcnode-id="3918" instrument_node=""> </span><p data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">Fracking is now the largest consumer of American sand. And not just any sand will do: The best has round, uniform grains and a high silica content that makes it hard enough to withstand being clamped between giant rocks. “The boom in U.S. hydrocarbon production depends on mining millions of tons of sand,” reads a pamphlet from proppant provider Hi-Crush Inc., “and pumping it back into the earth.”</span></p><span data-dcnode-id="3915" instrument_node=""> </span><h1 data-dcnode-id="3913" id="source"><span data-dcnode-id="3914" instrument_node="">Source</span></h1><span data-dcnode-id="3912" instrument_node=""> </span><p data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">The most desirable frac sand comes from the Upper Midwest. Northern White and Ottawa White are particularly prized for their lack of impurities. Freight trains and barges transport the sand south to the Permian Basin and east to the Marcellus Shale. As the industry has grown, drillers trying to reduce transport costs have begun to look closer to fracking sites, excavating lower-quality Oklahoma sand and mining the dunes of West Texas.</span></p><span data-dcnode-id="3909" instrument_node=""> </span><h1 data-dcnode-id="3907" id="mining"><span data-dcnode-id="3908" instrument_node="">Mining</span></h1><span data-dcnode-id="3906" instrument_node=""> </span><p data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">Backhoes and loaders scoop sand up from shallow pits. The grains are washed, sorted for size through filters and centrifuges, then dried in rotating drums. Sometimes the sand is coated with resin to make it stronger.</span></p><span data-dcnode-id="3903" instrument_node=""> </span><h1 data-dcnode-id="3901" id="blending"><span data-dcnode-id="3902" instrument_node="">Blending</span></h1><span data-dcnode-id="3900" instrument_node=""> </span><p data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Drillers store the sand on-site in silos or other containers. When needed, it’s mixed with water, chemicals, and thickeners such as guar gum in giant truck-mounted blenders before being pumped down the well.</span></p></div></div></article></div><div data-dcnode-id="3856" id="phosphorous"><article class="article-medium owl reactive-nonmetals" data-dcnode-id="3857"><div class="inline-elements" data-dcnode-id="3889"><div class="inline-element mono with-dot square reactive-nonmetals" data-dcnode-id="3890"><span data-dcnode-id="3893" instrument_node="">Phosphorus
  </span><span class="fs-xs" data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">$0.07/kg, phosphate rock, f.o.b. (free on board; prices include shipping and loading)</span></span></div></div><span data-dcnode-id="3888" instrument_node=""> </span><div class="header" data-dcnode-id="3880"><h1 class="headline fs-lg di" data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">Conscious Fertilizer</span></h1><span data-dcnode-id="3885" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">By Kate Krader</span></div><span data-dcnode-id="3882" instrument_node=""> </span></div><span data-dcnode-id="3879" instrument_node=""> </span><div class="media" data-dcnode-id="3868"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="3869"><div class="ratio-wrap" data-dcnode-id="3877" style="padding-top: 66.7%;"><div data-dcnode-id="3878"></div></div><span data-dcnode-id="3876" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3870"><span data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">Goats at Stone Barns.</span></span><span data-dcnode-id="3873" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Courtesy Molly M. Peterson/Stone Barns Center for Food &amp; Agriculture</span></span></figcaption></figure></div><span data-dcnode-id="3867" instrument_node=""> </span><div class="content columns serif" data-dcnode-id="3858"><p data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Chemical fertilizer has helped feed the world since it was developed in 1909. But its damage to the Earth has been documented with increasing alarm. The farmers at Stone Barns Center for Food &amp; Agriculture in Tarrytown, N.Y., are leading the way in eco-minded fertilization. On the 400-plus-acre property, donated by the Rockefeller family, cows, sheep, goats, pigs, and hens are rotated around different pastures, as is their manure, a major source of fertilizer. Phosphorus, a key element in the animal droppings, is one of the most carefully monitored on the property, says Stone Barns farm director Jack Algiere. He calls it the steroids of the plant world—combined with nitrogen and potassium, it can turn a humble zucchini into a show-stopping specimen.</span></p><span data-dcnode-id="3864" instrument_node=""> </span><p data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">Dan Barber, a chef and co-owner of the property’s Blue Hill at Stone Barns restaurant, wants to demonstrate that farmers can still profit if they give up what he calls “their single-nutrient obsession” with elements such as phosphorus and nitrogen. Just like too much of anything, excess phosphorus is harmful. Runoff containing the fertilizer blights waterways by stimulating overproduction of algae and weeds.</span></p><span data-dcnode-id="3861" instrument_node=""> </span><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Westchester County, home of Stone Barns, has banned commercial phosphate fertilizer because of the threat it represents to the ecology of the Hudson River. Naturally derived phosphorus is less soluble—and not banned—so Stone Barns is in the clear.</span></p></div></article></div><div data-dcnode-id="3821" id="sulfur"><article class="article-medium owl reactive-nonmetals invert" data-dcnode-id="3822"><div class="inline-elements" data-dcnode-id="3851"><div class="inline-element mono with-dot square reactive-nonmetals" data-dcnode-id="3852"><span data-dcnode-id="3855" instrument_node="">Sulfur
  </span><span class="fs-xs" data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">$0.08/kg, elemental sulfur, f.o.b.</span></span></div></div><span data-dcnode-id="3850" instrument_node=""> </span><div class="header" data-dcnode-id="3837"><h1 class="headline fs-lg di" data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">Sulfur Is the Oil Industry’s Other Problem</span></h1><span data-dcnode-id="3847" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">By Jack Wittels</span></div><span data-dcnode-id="3844" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="3838"><span data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">The noxious byproduct has been linked to acid rain and lung cancer.</span></span><span data-dcnode-id="3841" instrument_node=""> </span><a class="dib with-color with-arrow" data-dcnode-id="3839" data-terminal="NSN PWXHU76TTDS0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2019-08-28/sulfur-is-the-oil-industry-s-other-problem"><span data-dcnode-id="3840" instrument_node="">Read Story</span></a></div></div><span data-dcnode-id="3836" instrument_node=""> </span><div class="media" data-dcnode-id="3825"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="3826"><div class="ratio-wrap" data-dcnode-id="3834" style="padding-top: 66.6818%;"><div data-dcnode-id="3835"></div></div><span data-dcnode-id="3833" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3827"><span data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Sulfur crystals.</span></span><span data-dcnode-id="3830" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">Photographer: Susan E. Degginger/Science Source</span></span></figcaption></figure></div><span data-dcnode-id="3824" instrument_node=""> </span></article></div><div data-dcnode-id="3787" id="chlorine"><article class="article-small halogens" data-dcnode-id="3788"><div class="inline-elements" data-dcnode-id="3816"><div class="inline-element mono with-dot square halogens" data-dcnode-id="3817"><span data-dcnode-id="3820" instrument_node="">Chlorine
  </span><span class="fs-xs" data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">$0.33/kg, liquid contract, U.S. market</span></span></div></div><span data-dcnode-id="3815" instrument_node=""> </span><div class="left owl" data-dcnode-id="3796"><div class="article-small_headline" data-dcnode-id="3808"><h1 class="headline fs-lg di sans" data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">Political Chicken</span></h1><span data-dcnode-id="3812" instrument_node=""> </span><span data-dcnode-id="3810" instrument_node=""> </span></div><span data-dcnode-id="3807" instrument_node=""> </span><div class="media owl" data-dcnode-id="3797"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="3798"><div class="ratio-wrap" data-dcnode-id="3805" style="padding-top: 66.6818%;"><div data-dcnode-id="3806"></div></div><span data-dcnode-id="3804" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3799"><span data-dcnode-id="3802" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">Illustration: Steve Bell</span></span></figcaption></figure></div></div><span data-dcnode-id="3795" instrument_node=""> </span><div class="right" data-dcnode-id="3789"><span data-dcnode-id="3793" instrument_node=""> </span><div class="content serif" data-dcnode-id="3790"><p data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">There was a time—2017—when Brexit seemed to hang on chickens washed in chlorine. The sterilization practice is banned in Europe but common in the U.S., which insisted it wouldn’t sign a trade deal with a post-EU Britain that didn’t include its poultry. Two years, one prime minister, and no Brexit later, the possible arrival of chlorinated birds still rankles “remainers.”</span></p></div></div></article></div><div data-dcnode-id="3712" id="argon"><article class="article-photo noble-gases" data-dcnode-id="3713"><div class="inline-elements" data-dcnode-id="3782"><div class="inline-element mono with-dot square noble-gases" data-dcnode-id="3783"><span data-dcnode-id="3786" instrument_node="">Argon
  </span><span class="fs-xs" data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">$0.48/liter, 200-liter cylinder</span></span></div></div><span data-dcnode-id="3781" instrument_node=""> </span><div class="header" data-dcnode-id="3769"><h1 class="headline fs-lg di sansitalic" data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">More Hong Kong Lights</span></h1><span data-dcnode-id="3778" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">By Tommy Trenchard</span></div><span data-dcnode-id="3775" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="3770"><span data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">The city’s signs have been disappearing by the day. The Hong Kong government has cracked down on signage it says doesn’t comply with building and safety codes. Many business owners replace the removed neon signs with cheaper mass-produced LED lights. Other shopkeepers have chosen to take down their signs because they look dated. “In the ’80s, if you walked down the streets, you’d see neon everywhere,” says Cardin Chan, executive director of the Hong Kong Neon Heritage group. The once-modern aesthetic is now more associated with seedy bars and red-light districts. Streets that once were bathed in neon often carry just a solitary, flickering sign—or none at all.</span></span><span data-dcnode-id="3772" instrument_node=""> </span></div></div><span data-dcnode-id="3768" instrument_node=""> </span><div class="media" data-dcnode-id="3714"><div class="bloom-slider flickity-enabled is-draggable" data-dcnode-id="3715" tabindex="0"><div class="flickity-viewport" data-dcnode-id="3716" style="height: 3709px; touch-action: pan-y;"><div class="flickity-slider" data-dcnode-id="3717" style="left: 0px; transform: translateX(0%);"><div class="slide is-selected" data-dcnode-id="3758" style="position: absolute; left: 0%;"><figure
