><span data-dcnode-id="3755" instrument_node="">A neon sign hangs above the Regency Spa in Yau Ma Tei.</span></span><span data-dcnode-id="3753" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">Photographer: Tommy Trenchard for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="3738" style="position: absolute; left: 1085.84%;"><figure data-dcnode-id="3739"><img data-dcnode-id="3747" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/i38b9LFcPbgo/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/i38b9LFcPbgo/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/i38b9LFcPbgo/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/i38b9LFcPbgo/v0/1500x-1.jpg 2000w"><span data-dcnode-id="3746" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3740"><span data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">Neon lights jostle among LED ones on Portland Street in Kowloon.</span></span><span data-dcnode-id="3743" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">Photographer: Tommy Trenchard for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="3728" style="position: absolute; left: 1628.22%;"><figure data-dcnode-id="3729"><img data-dcnode-id="3737" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/iRfQAfYpvnKM/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iRfQAfYpvnKM/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iRfQAfYpvnKM/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iRfQAfYpvnKM/v0/1500x-1.jpg 2000w"><span data-dcnode-id="3736" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3730"><span data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">A neon sign advertises the Mido Cafe in Yau Ma Tei.</span></span><span data-dcnode-id="3733" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">Photographer: Tommy Trenchard for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="3718" style="position: absolute; left: 2170.61%;"><figure data-dcnode-id="3719"><img data-dcnode-id="3727" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/i43BljjLh3gI/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/i43BljjLh3gI/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/i43BljjLh3gI/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/i43BljjLh3gI/v0/1500x-1.jpg 2000w"><span data-dcnode-id="3726" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3720"><span data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">A half-illuminated neon sign hangs above a street market on Canton Road in Mong Kok. Streets that once were bathed in neon often carry just a solitary, flickering sign—or none at all.</span></span><span data-dcnode-id="3723" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Photographer: Tommy Trenchard for Bloomberg Businessweek</span></span></figcaption></figure></div></div></div></div></div></article></div><div data-dcnode-id="3709" id="ad4"><div class="dvz-v0-ad" data-dcnode-id="3710"><div class="dvz-v0-ad-div" data-dcnode-id="3711" id="dvz-v0-ad-4"></div></div></div><div data-dcnode-id="3672" id="potassium"><article class="article-photo alkali-metals" data-dcnode-id="3673"><div class="inline-elements" data-dcnode-id="3704"><div class="inline-element mono with-dot square alkali-metals" data-dcnode-id="3705"><span data-dcnode-id="3708" instrument_node="">Potassium
  </span><span class="fs-xs" data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">$0.82/kg, potash, f.o.b.</span></span></div></div><span data-dcnode-id="3703" instrument_node=""> </span><div class="header" data-dcnode-id="3686"><h1 class="headline fs-lg di" data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">Potash Mine</span></h1><span data-dcnode-id="3700" instrument_node=""> </span><span data-dcnode-id="3698" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="3687"><span data-dcnode-id="3690"><span data-dcnode-id="3697" instrument_node="">Using drones and advanced cameras, the Canadian artist Edward Burtynsky has captured the grisly beauty of global industry, from clear-cutting and strip mining to the mass slaughter of elephants. This 2017 photo comes from the Uralkali mine in Berezniki, Russia, where the potash salts containing potassium—a key component of commercial fertilizer—are extracted. On Sept. 25, Burtynsky will release his third documentary, </span><em data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Anthropocene: The Human Epoch</span></em><span data-dcnode-id="3694" instrument_node="">, which chronicles humanity’s large-scale and now intractable alteration of the planet. </span><span data-dcnode-id="3691" style="white-space:nowrap;"><em data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">—James Tarmy</span></em></span></span><span data-dcnode-id="3689" instrument_node=""> </span></div></div><span data-dcnode-id="3685" instrument_node=""> </span><div class="media" data-dcnode-id="3674"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="3675"><div class="ratio-wrap" data-dcnode-id="3683" style="padding-top: 75%;"><div data-dcnode-id="3684"></div></div><span data-dcnode-id="3682" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3676"><span data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">Uralkali potash mine in Berezniki, Russia.</span></span><span data-dcnode-id="3679" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">Photographer: Edward Burtynsky; Courtesy Howard Greenberg and Bryce  Wolkowitz Galleries, New York/Nicholas Metivier Gallery, Toronto</span></span></figcaption></figure></div></article></div><div data-dcnode-id="3615" id="calcium"><article class="article-small alkaline-earth-metals" data-dcnode-id="3616"><div class="inline-elements" data-dcnode-id="3667"><div class="inline-element mono with-dot square alkaline-earth-metals" data-dcnode-id="3668"><span data-dcnode-id="3671" instrument_node="">Calcium
  </span><span class="fs-xs" data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">$6.27/kg, China spot</span></span></div></div><span data-dcnode-id="3666" instrument_node=""> </span><div class="left owl" data-dcnode-id="3646"><div class="article-small_headline" data-dcnode-id="3659"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">What If You Eat It?</span></h1><span data-dcnode-id="3663" instrument_node=""> </span><span data-dcnode-id="3661" instrument_node=""> </span></div><span data-dcnode-id="3658" instrument_node=""> </span><div class="media owl" data-dcnode-id="3647"><figure class="bloom-figure ratio-figure square" data-dcnode-id="3648"><div class="ratio-wrap" data-dcnode-id="3656" style="padding-top: 100%;"><div data-dcnode-id="3657"></div></div><span data-dcnode-id="3655" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3649"><span data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">Calcium is a soft, gray alkaline earth metal. It’s the fifth-most abundant element in the Earth’s crust.</span></span><span data-dcnode-id="3652" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">Photographer: Charles D. Winter/Science Source</span></span></figcaption></figure></div></div><span data-dcnode-id="3645" instrument_node=""> </span><div class="right" data-dcnode-id="3617"><span data-dcnode-id="3643" instrument_node=""> </span><div class="content serif" data-dcnode-id="3618"><ul data-dcnode-id="3619"><li data-dcnode-id="3636"><em data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Who eats calcium?</span></em><br data-dcnode-id="3640"><span data-dcnode-id="3639" instrument_node="">Pretty much everyone. Since it’s most prevalent in dairy, vegans have to rely on leafy greens and supplements.</span><br data-dcnode-id="3638"><span data-dcnode-id="3637" instrument_node="">&nbsp;</span></li><span data-dcnode-id="3635" instrument_node=""> </span><li data-dcnode-id="3628"><em data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">What does it taste like?</span></em><br data-dcnode-id="3632"><span data-dcnode-id="3631" instrument_node="">Raw metallic calcium is unstable and highly reactive and would corrode the inside of your mouth. Most of us consume it in one of its chalky salt forms—calcium hydrogen phosphate (as in milk) or calcium carbonate (supplements).</span><br data-dcnode-id="3630"><span data-dcnode-id="3629" instrument_node="">&nbsp;</span></li><span data-dcnode-id="3627" instrument_node=""> </span><li data-dcnode-id="3620"><em data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">What does it do?</span></em><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">Calcium strengthens bones and teeth. If you don’t get enough, you can lose bone mass, leading to osteoporosis. If you get too much, you can become constipated. It may increase the risk of kidney stones as well. </span><em data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">—Silvia Killingsworth</span></em></li></ul></div></div></article></div><div data-dcnode-id="3569" id="scandium"><article class="article-small transition-metals" data-dcnode-id="3570"><div class="inline-elements" data-dcnode-id="3610"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="3611"><span data-dcnode-id="3614" instrument_node="">Scandium
  </span><span class="fs-xs" data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">$5,592/kg, 99.95% total rare-earth mineral, China market</span></span></div></div><span data-dcnode-id="3609" instrument_node=""> </span><span data-dcnode-id="3607" instrument_node=""> </span><div class="cols owl" data-dcnode-id="3571"><div class="article-small_headline" data-dcnode-id="3599"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Coal Comfort</span></h1><span data-dcnode-id="3604" instrument_node=""> </span><div class="byline dib" data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">By Michael Belfiore</span></div><span data-dcnode-id="3601" instrument_node=""> </span></div><span data-dcnode-id="3598" instrument_node=""> </span><div class="content sans" data-dcnode-id="3572"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="3588"><div class="ratio-wrap" data-dcnode-id="3596" style="padding-top: 75%;"><div data-dcnode-id="3597"></div></div><span data-dcnode-id="3595" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3589"><span data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">Duke Energy coal ash ponds in North Carolina.</span></span><span data-dcnode-id="3592" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Photographer: Will Warasila</span></span></figcaption></figure><span data-dcnode-id="3587" instrument_node=""> </span><p data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">U.S. efforts to diversify its supply of rare-earth elements (REEs) have led to an unlikely source: coal. A program begun in 2014 aims to wean the U.S. from its dependence on China for these 17 difficult-to-extract minerals, essential to many high-tech applications including weaponry. “Our current projections are that if high REE extraction efficiencies are achieved, there are sufficient domestic coal-based resources available to supply the U.S. demand,” says Mary Anne Alvin, REE technology manager at the Department of Energy. Managers say the program’s 22 projects piggyback on existing coal mining and consumption and don’t cause additional environmental harm. The major challenge is to develop separation and concentration technologies that can be scaled up to viable commercial operations. Efficiently recovering scandium, a particularly expensive REE, would help achieve that goal. Here are two projects at different ends of coal’s production cycle.</span></p><span data-dcnode-id="3584" instrument_node=""> </span><h1 data-dcnode-id="3582" id="north-dakota-coal-stocks"><span data-dcnode-id="3583" instrument_node="">North Dakota Coal Stocks</span></h1><span data-dcnode-id="3581" instrument_node=""> </span><p data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">This project seeks to capture REEs from lignite, a low-grade coal. Nolan Theaker, technical lead of the University of North Dakota project, says extraction can be easier from lignite than from higher-rank coals. The prototype process crushes, screens, and chemically treats 44 pounds of lignite an hour to produce a third of an ounce of rare-earth oxide products—about 1/100th the amount needed for an electric vehicle motor, according to Theaker. He says the project will advance to half a ton of coal processed per hour for a planned pilot in 2023.</span></p><span data-dcnode-id="3578" instrument_node=""> </span><h1 data-dcnode-id="3576" id="kentucky-coal-ash"><span data-dcnode-id="3577" instrument_node="">Kentucky Coal Ash</span></h1><span data-dcnode-id="3575" instrument_node=""> </span><p data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">The advantage to extracting at the tail end of the process, according to Prakash Joshi, former head of the effort at Andover, Mass.-based Physical Sciences Inc., is that coal ash contains six to 10 times the concentration of REEs as unburned coal. The project’s pilot plant, to be completed in 2020, will wash the glassy matrix containing REEs out of half a ton of ash a day from a power plant in Ford, Ky., then use a chemical process to produce up to 17 ounces of dry material that’s at least 20% scandium and yttrium.</span></p></div></div></article></div><div data-dcnode-id="3537" id="dissection2"><article class="article-photostat float-container accent invert" data-dcnode-id="3538"><div class="left owl" data-dcnode-id="3550"><div class="inline-elements" data-dcnode-id="3566"><div class="with-dot square mono" data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Composition</span></div></div><span data-dcnode-id="3565" instrument_node=""> </span><div class="header" data-dcnode-id="3558"><h1 class="headline fs-lg di serif" data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">Computer Chip</span></h1><span data-dcnode-id="3562" instrument_node=""> </span><span data-dcnode-id="3560" instrument_node=""> </span></div><span data-dcnode-id="3557" instrument_node=""> </span><div class="content sans" data-dcnode-id="3551"><p data-dcnode-id="3552"><span data-dcnode-id="3556" instrument_node="">Silicon Valley gets its name, of course, from element 14, the essential stuff of the computer chip. In the early days of computing, the three parts of a chip—the wafer, or substrate; the transistors layered on top; and the wires connecting to a circuit board—required only a handful of elements. Today, chipmakers draw on a large swath of the periodic table. </span><span data-dcnode-id="3553" style="white-space: nowrap;"><em data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">—E. Tammy Kim</span></em></span></p></div></div><span data-dcnode-id="3549" instrument_node=""> </span><div class="media" data-dcnode-id="3539"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="3540"><div class="ratio-wrap" data-dcnode-id="3547" style="padding-top: 129.412%;"><div data-dcnode-id="3548"></div></div><span data-dcnode-id="3546" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3541"><span data-dcnode-id="3544" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">Photographer: Daniel Shea for Bloomberg Businessweek. Prop stylist: Anna Surbatovich. Product courtesy advanced science research center at the graduate center, CUNY.</span></span></figcaption></figure></div></article></div><div data-dcnode-id="3460" id="titanium"><article class="article-small transition-metals" data-dcnode-id="3461"><div class="inline-elements" data-dcnode-id="3532"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="3533"><span data-dcnode-id="3536" instrument_node="">Titanium
  </span><span class="fs-xs" data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">$9.10/kg, titanium sponge metal</span></span></div></div><span data-dcnode-id="3531" instrument_node=""> </span><span data-dcnode-id="3529" instrument_node=""> </span><div class="cols owl" data-dcnode-id="3462"><div class="article-small_headline" data-dcnode-id="3521"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">Card Creep</span></h1><span data-dcnode-id="3526" instrument_node=""> </span><div class="byline dib" data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">By Jeremy Keehn</span></div><span data-dcnode-id="3523" instrument_node=""> </span></div><span data-dcnode-id="3520" instrument_node=""> </span><div class="content serif" data-dcnode-id="3463"><figure class="bloom-figure ratio-figure landscape float--left" data-dcnode-id="3511"><div class="ratio-wrap" data-dcnode-id="3518" style="padding-top: 76.7917%;"><div data-dcnode-id="3519"></div></div><span data-dcnode-id="3517" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3512"><span data-dcnode-id="3515" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">Courtesy Apple</span></span></figcaption></figure><span data-dcnode-id="3510" instrument_node=""> </span><p data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">“Stronger than steel at high temperatures, titanium got named after the Titans of Greek mythology,” says Bill Nye, aka the Science Guy. “Not only can it take the heat, it can reflect it.” That’s the kind of metal people want to associate themselves with—and the reason why, as the August release of the Apple card showed, titanium is the “it” material for credit cards. Even so, Apple Inc.’s laser-etched version joins a crowded metal-card bandwagon. Review website Credit Card Insider counts 22 on the market, which the companies tout as being made with titanium, or stainless steel (i.e., iron, carbon, and chromium), or even 24K gold.</span></p><span data-dcnode-id="3507" instrument_node=""> </span><p data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">For all the fervor, few are truly pushing the limits of metallurgy. JPMorgan Chase &amp; Co. gets an honorable mention for its J.P. Morgan Reserve card—née the Palladium card and actually made with the platinum-group metals. Other companies might consider the:</span></p><span data-dcnode-id="3504" instrument_node=""> </span><ul data-dcnode-id="3464"><li data-dcnode-id="3498"><span data-dcnode-id="3503" instrument_node="">VANADIUM CARD</span><br data-dcnode-id="3502"><span data-dcnode-id="3501" instrument_node="">A proton above titanium</span><br data-dcnode-id="3500"><span data-dcnode-id="3499" instrument_node="">&nbsp;  </span></li><span data-dcnode-id="3497" instrument_node=""> </span><li data-dcnode-id="3491"><span data-dcnode-id="3496" instrument_node="">TIN CARD</span><br data-dcnode-id="3495"><span data-dcnode-id="3494" instrument_node="">So far ahead of the pack you’re in back</span><br data-dcnode-id="3493"><span data-dcnode-id="3492" instrument_node="">&nbsp;</span></li><span data-dcnode-id="3490" instrument_node=""> </span><li data-dcnode-id="3484"><span data-dcnode-id="3489" instrument_node="">PROMETHIUM CARD</span><br data-dcnode-id="3488"><span data-dcnode-id="3487" instrument_node="">Only the rarest earth will do</span><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node="">&nbsp;</span></li><span data-dcnode-id="3483" instrument_node=""> </span><li data-dcnode-id="3477"><span data-dcnode-id="3482" instrument_node="">TUNGSTEN CARD</span><br data-dcnode-id="3481"><span data-dcnode-id="3480" instrument_node="">The true wolfram of Wall Street</span><br data-dcnode-id="3479"><span data-dcnode-id="3478" instrument_node="">&nbsp;</span></li><span data-dcnode-id="3476" instrument_node=""> </span><li data-dcnode-id="3470"><span data-dcnode-id="3475" instrument_node="">MERCURY CARD</span><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">The ultimate liquid asset</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node="">&nbsp;</span></li><span data-dcnode-id="3469" instrument_node=""> </span><li data-dcnode-id="3465"><span data-dcnode-id="3468" instrument_node="">PLUTONIUM CARD</span><br data-dcnode-id="3467"><span data-dcnode-id="3466" instrument_node="">Simply the bomb</span></li></ul></div></div></article></div><div data-dcnode-id="3457" id="ad5"><div class="dvz-v0-ad" data-dcnode-id="3458"><div class="dvz-v0-ad-div" data-dcnode-id="3459" id="dvz-v0-ad-5"></div></div></div><div data-dcnode-id="3409" id="vanadium"><article class="article-large transition-metals no-dek" data-dcnode-id="3410"><div class="inline-elements" data-dcnode-id="3452"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="3453"><span data-dcnode-id="3456" instrument_node="">Vanadium
  </span><span class="fs-xs" data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">$30.86/kg, vanadium pentoxide</span></span></div></div><span data-dcnode-id="3451" instrument_node=""> </span><div class="half left owl float-container" data-dcnode-id="3431"><h1 class="headline tac fs-lg serifitalic" data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">Ford’s Miracle Metal</span></h1><span data-dcnode-id="3448" instrument_node=""> </span><div class="byline" data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">By Eva Holland</span></div><span data-dcnode-id="3445" instrument_node=""> </span><span data-dcnode-id="3443" instrument_node=""> </span><div class="media owl" data-dcnode-id="3432"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="3433"><div class="ratio-wrap" data-dcnode-id="3441" style="padding-top: 79.9091%;"><div data-dcnode-id="3442"></div></div><span data-dcnode-id="3440" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="3434"><span data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">Ford Model T, 1908.</span></span><span data-dcnode-id="3437" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Courtesy Library of Congress</span></span></figcaption></figure></div></div><span data-dcnode-id="3430" instrument_node=""> </span><div class="half right" data-dcnode-id="3411"><div class="content serif" data-dcnode-id="3412"><p data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">At the turn of a new century, Henry Ford, a two-time automobile-industry failure seeking a third crack, had an idea for a new kind of car. Early models coped with the rugged road conditions of the time through sheer heft, and they were expensive to make and buy. “The greatest need to-day,” Ford wrote in 1906, “is a light, low-priced car.”</span></p><span data-dcnode-id="3427" instrument_node=""> </span><p data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Ford’s account of his eureka moment ran like this: The year before, at a race in Palm Beach, Fla., he’d seen a French driver crash. The vehicle was badly damaged, but its lightweight steel didn’t break. Ford salvaged a part from the wreck to investigate further; the steel, he learned, was a vanadium alloy. Historians are skeptical of the tale—there’s no record of a race in Palm Beach that year, let alone a crash, raising the less romantic possibility that Ford’s engineers read about vanadium steel in trade magazines. However it happened, the discovery was transformative. Ford placed an order for $750,000 (more than $17 million in today’s dollars) worth of vanadium steel with United Steel and the fledgling American Vanadium Co.</span></p><span data-dcnode-id="3424" instrument_node=""> </span><p data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">In October 1908 the first Model T rolled off the line. It was by far the lightest and cheapest car yet, with half its steel parts made using the vanadium alloy and a retail price of $850. An early print ad, showing dozens of children piled on top of one, proclaimed, “Only springs and axles of Vanadium Steel could safely carry such a load as this.” We all know what ensued: Fifteen million Model Ts sold in two decades. Mass production. The dawn of drive-ins and drive-thrus, the rise of the road trip. The interstate. Dean Moriarty. Thelma and Louise. And smog, gridlock, and greenhouse gases.</span></p><span data-dcnode-id="3421" instrument_node=""> </span><p data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">All of it came courtesy of a little-known metal that had been discovered only after a false start. In 1801 a Spanish mineralogist, Andrés Manuel del Río, claimed to have found a new element in a sample of a mineral he called “brown lead,” but his peers convinced him it was just a form of chromium. It was left to a Swedish chemist, Nils Gabriel Sefstrom, to rediscover the element 30 years later and name it after the Norse goddess Vanadis. Known for its stability at high temperatures and across valences, it was initially used to help set black dyes in fabrics and inks. By the turn of the century, it was being used in alloys for tools and dies.</span></p><span data-dcnode-id="3418" instrument_node=""> </span><p data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">After Ford came along, it became everyone’s not-so-secret ingredient. Mixing as little as 0.05% vanadium into a steel alloy can as much as double its strength—thanks, scientists now know, to the fine precipitation of vanadium carbonitrides as the steel cools. This reduces the amount of steel required for a given purpose, making it appealing for railways, rebar, and more.</span></p><span data-dcnode-id="3415" instrument_node=""> </span><p data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">And it’s still essential for automobiles. “The intensity of use of vanadium in cars is only increasing,” says Terry Perles, president of supplier Motiv Metals LLC. “It’s all about government-driven fuel economy standards.” A century ago, a lighter car meant an affordable car. Today it also means a more fuel-efficient one. Perles is excited, too, about the potential for vanadium-based batteries, which promise to reduce carbon emissions by storing vast solar power reserves. There are significant kinks to work out, but the next act for Henry Ford’s wonder metal could be undoing the excesses it helped engender.</span></p></div></div></article></div><div data-dcnode-id="3356" id="chromium-magnesium-iron"><article class="article-large transition-metals invert" data-dcnode-id="3357"><div class="inline-elements" data-dcnode-id="3396"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="3405"><span data-dcnode-id="3408" instrument_node="">Chromium

4, 204, 204);"><span data-dcnode-id="3248" instrument_node="">○○○</span></span></td></tr><tr data-dcnode-id="3237"><td data-dcnode-id="3242"><span data-dcnode-id="3243" style="padding-right: 0.65em;"><span data-dcnode-id="3244" instrument_node="">Recycling &amp; reuse</span></span></td><td data-dcnode-id="3238"><span data-dcnode-id="3241" instrument_node="">○○○</span><span data-dcnode-id="3239" style="color: rgb(204, 204, 204);"><span data-dcnode-id="3240" instrument_node="">○○</span></span></td></tr></tbody></table><hr data-dcnode-id="3234" style="margin: 0.4em 0px -0.3em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="3233" instrument_node=""> </span><ul data-dcnode-id="3218"><li data-dcnode-id="3229"><em data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Used in:</span></em><span data-dcnode-id="3230" instrument_node=""> Lithium-ion battery cathodes.</span></li><span data-dcnode-id="3228" instrument_node=""> </span><li data-dcnode-id="3224"><em data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">What it does:</span></em><span data-dcnode-id="3225" instrument_node=""> Boosts energy density to help electric vehicles travel faster and farther while also allowing battery makers to reduce their dependence on cobalt.</span></li><span data-dcnode-id="3223" instrument_node=""> </span><li data-dcnode-id="3219"><em data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Achilles’ heel:</span></em><span data-dcnode-id="3220" instrument_node=""> Unproven production processes. If miners in Indonesia are unable to bring a steady supply of cheap, battery-grade nickel into production, the market will likely face a severe shortage, which could lead to a dearth of high-nickel batteries broadly believed to be the future of EVs.</span></li></ul><span data-dcnode-id="3217" instrument_node=""> </span><h1 data-dcnode-id="3215" id="copper-the-safe-bet"><span data-dcnode-id="3216" instrument_node="">Copper  instrument_node=""> </span><li data-dcnode-id="3177"><em data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">What it does:</span></em><span data-dcnode-id="3178" instrument_node=""> Copper is the most conductive metal after silver and about one-hundredth of the price.</span></li><span data-dcnode-id="3176" instrument_node=""> </span><li data-dcnode-id="3172"><em data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">Achilles’ heel:</span></em><span data-dcnode-id="3173" instrument_node=""> People who insist climate change isn’t real. If the EV revolution proceeds apace, copper will be needed for whichever types of batteries win out. Electric vehicles require about 80% more copper than fossil fuel-burning cars.</span></li></ul><span data-dcnode-id="3170" instrument_node=""> </span><h1 data-dcnode-id="3168" id="zinc-the-wild-card"><span data-dcnode-id="3169" instrument_node="">Zinc: The Wild Card</span></h1><span data-dcnode-id="3167" instrument_node=""> </span><hr data-dcnode-id="3166" style="margin: 1em 0px 0.325em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="3140" style="margin: 0px;"><tbody data-dcnode-id="3141"><tr data-dcnode-id="3158"><td data-dcnode-id="3163"><span data-dcnode-id="3164" style="padding-right: 0.65em;"><span data-dcnode-id="3165" instrument_node="">Abundance</span></span></td><td data-dcnode-id="3159"><span data-dcnode-id="3162" instrument_node="">○○○</span><span data-dcnode-id="3160" style="color: rgb(204, 204, 204);"><span data-dcnode-id="3161" instrument_node="">○○</span></span></td></tr><tr data-dcnode-id="3150"><td data-dcnode-id="3155"><span data-dcnode-id="3156" style="padding-right: 0.65em;"><span data-dcnode-id="3157" instrument_node="">Mining practices</span></span></td><td data-dcnode-id="3151"><span data-dcnode-id="3154" instrument_node="">○○○</span><span data-dcnode-id="3152" style="color: rgb(204, 204, 204);"><span data-dcnode-id="3153" instrument_node="">○○</span></span></td></tr><tr data-dcnode-id="3142"><td data-dcnode-id="3147"><span data-dcnode-id="3148" style="padding-right: 0.65em;"><span data-dcnode-id="3149" instrument_node="">Recycling &amp; reuse</span></span></td><td data-dcnode-id="3143"><span data-dcnode-id="3146" instrument_node="">○○○</span><span data-dcnode-id="3144" style="color: rgb(204, 204, 204);"><span data-dcnode-id="3145" instrument_node="">○○</span></span></td></tr></tbody></table><hr data-dcnode-id="3139" style="margin: 0.4em 0px -0.3em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="3138" instrument_node=""> </span><ul data-dcnode-id="3123"><li data-dcnode-id="3134"><em data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Used in:</span></em><span data-dcnode-id="3135" instrument_node=""> Zinc-air batteries for renewable energy installations and maybe EVs.</span></li><span data-dcnode-id="3133" instrument_node=""> </span><li data-dcnode-id="3129"><em data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">What it does:</span></em><span data-dcnode-id="3130" instrument_node=""> It’s used in the battery anode and reacts with air during the discharging process, yielding power.</span></li><span data-dcnode-id="3128" instrument_node=""> </span><li data-dcnode-id="3124"><em data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">Achilles’ heel:</span></em><span data-dcnode-id="3125" instrument_node=""> Investment. Billions of dollars continue to pour into the development of lithium-ion batteries, and advances in the incumbent technology are still coming hard and fast. If zinc-air batteries are going to take market share, they’ll need to prove themselves with far less money behind them.</span></li></ul></div></div></article></div><div data-dcnode-id="3076" id="gallium-germanium-arsenic"><article class="article-medium owl post-transition-metals invert" data-dcnode-id="3077"><div class=" span data-dcnode-id="3002" instrument_node="">What does it taste like?</span></em><br data-dcnode-id="3000"><span data-dcnode-id="2999" instrument_node="">It might taste like Brazil nuts, which have the highest concentration of selenium, followed by seafoods and organ meats.</span><br data-dcnode-id="2998"><span data-dcnode-id="2997" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="2994" instrument_node=""> </span><li data-dcnode-id="2985"><p data-dcnode-id="2986"><em data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">What does it do?</span></em><br data-dcnode-id="2991"><span data-dcnode-id="2990" instrument_node="">The mineral is an essential antioxidant. But too much of it can cause selenosis, a condition marked by hair loss, brittle nails, and a metallic taste in the mouth. </span><span data-dcnode-id="2987" style="white-space: nowrap;"><em data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">—Silvia Killingsworth</span></em></span></p></li></ul></div></div></article></div><div data-dcnode-id="2935" id="bromine"><article class="article-large halogens invert" data-dcnode-id="2936"><div class="inline-elements" data-dcnode-id="2975"><div class="inline-element mono with-dot square halogens" data-dcnode-id="2976"><span data-dcnode-id="2979" instrument_node="">Bromine
  </span><span class="fs-xs" data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">$4.40-$5.40/kg, U.S. market</span></span></div></div><span data-dcnode-id="2974" instrument_node=""> </span><div class="half left owl float-container" data-dcnode-id="2950"><h1 class="headline tac fs-lg serifitalic" data-dcnode-id="2971"><span data-dcnode-id="2972" style="display:block;text-align:left;"><span data-dcnode-id="2973" instrument_node="">The Woman Who Got Bromine Out of Kids’ Pajamas Fears It’s Coming Back</span></span></h1><span data-dcnode-id="2970" instrument_node=""> </span><div class="byline fs-md" data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">By Tiffany Kary</span></div><span data-dcnode-id="2967" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="2961"><span data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Chemist Arlene Blum battles a new form of an old foe.</span></span><span data-dcnode-id="2964" instrument_node=""> </span><a class="dib with-color with-arrow" data-dcnode-id="2962" data-terminal="NSN PWXHU26K50XT" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2019-08-28/arlene-blum-s-never-ending-battle-against-bromine"><span data-dcnode-id="2963" instrument_node="">Read Story</span></a></div><span data-dcnode-id="2960" instrument_node=""> </span><div class="media owl" data-dcnode-id="2951"><figure class="bloom-figure ratio-figure wide" data-dcnode-id="2952"><div class="ratio-wrap" data-dcnode-id="2958" style="padding-top: 0.0833333%;"><div data-dcnode-id="2959"></div></div><span data-dcnode-id="2957" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2953"><span data-dcnode-id="2955" instrument_node=""> </span></figcaption></figure></div></div><span data-dcnode-id="2949" instrument_node=""> </span><div class="half right" data-dcnode-id="2937"><div class="content serif" data-dcnode-id="2938"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="2939"><div class="ratio-wrap" data-dcnode-id="2947" style="padding-top: 149.966%;"><div data-dcnode-id="2948"></div></div><span data-dcnode-id="2946" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2940"><span data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Arlene Blum hikes a trail in Tilden Regional Park in Berkeley, Calif.</span></span><span data-dcnode-id="2943" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">Photographer: Rachel Bujalski for Bloomberg Businessweek</span></span></figcaption></figure></div></div></article></div><div data-dcnode-id="2903" id="krypton"><article class="article-photo noble-gases" data-dcnode-id="2904"><div class="inline-elements" data-dcnode-id="2930"><div class="inline-element mono with-dot square noble-gases" data-dcnode-id="2931"><span data-dcnode-id="2934" instrument_node="">Krypton
  </span><span class="fs-xs" data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">$3/liter, 200-liter cylinder</span></span></div></div><span data-dcnode-id="2929" instrument_node=""> </span><div class="header" data-dcnode-id="2917"><h1 class="headline fs-lg di sansitalic" data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">More Hong Kong Lights</span></h1><span data-dcnode-id="2926" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">By Tommy Trenchard</span></div><span data-dcnode-id="2923" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="2918"><span data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Choy Chun Wa, 52, has been working alongside a master neon maker, 78-year-old Wong Kin Wah, for three decades. He mostly focuses on finishing the signs. Choy says he worries constantly that the factory in China that produces the glass tubes will stop making them because of lack of demand. “The future doesn’t look good,” he says. “The biggest threat to our business without a doubt is LEDs.” Wong’s business, in the city’s Mong Kok neighborhood, once included a team of assistants to keep up with demand; in the 1980s he even had a contract to make signs for the local Kentucky Fried Chicken franchises. Today there are fewer than a dozen neon masters like Wong still in business. “I don’t know any young people at all who are doing this work,” Wong says.</span></span><span data-dcnode-id="2920" instrument_node=""> </span></div></div><span data-dcnode-id="2916" instrument_node=""> </span><div class="media" data-dcnode-id="2905"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2906"><div class="ratio-wrap" data-dcnode-id="2914" style="padding-top: 66.7%;"><div data-dcnode-id="2915"></div></div><span data-dcnode-id="2913" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2907"><span data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">Aside from lighting, krypton doesn’t have any commercial uses. It emits a yellow-white color, but the gas isn’t typically used for the color. Krypton is found in airport approach lights and, less frequently, in neon signs.</span></span><span data-dcnode-id="2910" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">Photographer: Tommy Trenchard for Bloomberg Businessweek</span></span></figcaption></figure></div></article></div><div data-dcnode-id="2857" id="rubidium"><article class="article-medium owl alkali-metals" data-dcnode-id="2858"><div class="inline-elements" data-dcnode-id="2898"><div class="inline-element mono with-dot square alkali-metals" data-dcnode-id="2899"><span data-dcnode-id="2902" instrument_node="">Rubidium
  </span><span class="fs-xs" data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">$84,400/kg, 99.75%-grade ampoules</span></span></div></div><span data-dcnode-id="2897" instrument_node=""> </span><div class="header" data-dcnode-id="2890"><h1 class="headline fs-lg di" data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Space Commodity</span></h1><span data-dcnode-id="2894" instrument_node=""> </span><span data-dcnode-id="2892" instrument_node=""> </span></div><span data-dcnode-id="2889" instrument_node=""> </span><span data-dcnode-id="2887" instrument_node=""> </span><div class="content columns serif" data-dcnode-id="2859"><p data-dcnode-id="2882"><span data-dcnode-id="2886" instrument_node="">Late last year a team at the U.S. National Institute for Standards and Technology in Boulder, Colo., recorded a clip of Queen and David Bowie’s </span><em data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Under Pressure</span></em><span data-dcnode-id="2883" instrument_node=""> using excited rubidium and cesium atoms. NIST’s Christopher Holloway says the project grew out of work on atomic sensors, whose potential applications include deep-space communications. In a paper, his team wrote of a desire to inspire others and “help create the future quantum-based workforce.” How, we wondered, might that play out …</span></p><span data-dcnode-id="2881" instrument_node=""> </span><ul data-dcnode-id="2860"><li data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">2020: Atomic-music stans flood Boulder, aka Quantum Valley</span></li><span data-dcnode-id="2878" instrument_node=""> </span><li data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">2030: QV builds vast catalog of “rubstep” songs for aliens</span></li><span data-dcnode-id="2875" instrument_node=""> </span><li data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">2031: Undaunted by lack of market, VCs invest billions</span></li><span data-dcnode-id="2872" instrument_node=""> </span><li data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">2047: Alien contact: Rubstep broadcasts begin</span></li><span data-dcnode-id="2869" instrument_node=""> </span><li data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">2069: Callistock held on Jupiter’s 8th moon; profits soar</span></li><span data-dcnode-id="2866" instrument_node=""> </span><li data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">2099: Teen invents software to distribute rubstep for free</span></li><span data-dcnode-id="2863" instrument_node=""> </span><li data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">2120: Distressed-asset specialists feast on QV’s bones</span></li></ul></div></article></div><div data-dcnode-id="2754" id="strontium"><article class="article-small alkaline-earth-metals" data-dcnode-id="2755"><div class="inline-elements" data-dcnode-id="2852"><div class="inline-element mono with-dot square alkaline-earth-metals" data-dcnode-id="2853"><span data-dcnode-id="2856" instrument_node="">Strontium
  </span><span class="fs-xs" data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">$6.50/kg, 99% strontium metal f.o.b., China market</span></span></div></div><span data-dcnode-id="2851" instrument_node=""> </span><span data-dcnode-id="2849" instrument_node=""> </span><div class="cols owl" data-dcnode-id="2756"><div class="article-small_headline" data-dcnode-id="2841"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Name and Shame</span></h1><span data-dcnode-id="2846" instrument_node=""> </span><div class="byline dib" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">By Dina Bass</span></div><span data-dcnode-id="2843" instrument_node=""> </span></div><span data-dcnode-id="2840" instrument_node=""> </span><div class="content serif" data-dcnode-id="2757"><p data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Five years ago, Microsoft Corp. founded the Microsoft Threat Intelligence Center (MSTIC, pronounced “mystic”) to track so-called advanced persistent threat groups—sophisticated bands of hackers, often linked to nation-states, that aim to steal secrets and money and to disrupt businesses and elections. MSTIC has christened more than 70 of the groups it tracks with the name of an element. For example, the Russian group responsible for the 2016 hack of the Democratic National Committee, elsewhere called Fancy Bear or APT28, is referred to by MSTIC as Strontium. Why elements? “I didn’t want anything particularly cutesy like ‘kitten,’ ” says John Lambert, who founded the team. And though strontium, an alkali metal, is widely used to make fireworks, the names are chosen randomly. It’s not “like all the noble gases map to Iran or anything,” Lambert says. In 2016, Microsoft sued Strontium in a U.S. court, helping it seize more than 100 website domains linked to the group.</span></p><span data-dcnode-id="2837" instrument_node=""> </span><div data-dcnode-id="2818" style="break-inside: avoid;"><h1 data-dcnode-id="2835" style="margin-bottom: 1.3em;"><span data-dcnode-id="2836" instrument_node="">Strontium</span></h1><span data-dcnode-id="2834" instrument_node=""> </span><ul data-dcnode-id="2819"><li data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">aka Fancy Bear, APT28  </span></li><span data-dcnode-id="2831" instrument_node=""> </span><li data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">Linked to: Russia  </span></li><span data-dcnode-id="2828" instrument_node=""> </span><li data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Known attacks on: Governments, media, and NGOs in Germany, South Africa, the U.K., and the U.S.  </span></li><span data-dcnode-id="2825" instrument_node=""> </span><li data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">Recent exploit: Released doping-related International Olympic Committee emails prior to the 2018 Winter Olympics  </span></li><span data-dcnode-id="2822" instrument_node=""> </span><li data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">Elemental similarities: Tarnishes in the open</span></li></ul></div><span data-dcnode-id="2817" instrument_node=""> </span><div data-dcnode-id="2798" style="break-inside: avoid;"><h1 data-dcnode-id="2815" style="margin-bottom: 1.3em;"><span data-dcnode-id="2816" instrument_node="">Phosphorus</span></h1><span data-dcnode-id="2814" instrument_node=""> </span><ul data-dcnode-id="2799"><li data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">aka APT35, Charming Kitten, Ajax Security Team  </span></li><span data-dcnode-id="2811" instrument_node=""> </span><li data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">Linked to: Iran  </span></li><span data-dcnode-id="2808" instrument_node=""> </span><li data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Known attacks on: Political dissidents, media members, NGOs, and governments in Iran, the U.K., and the U.S.  </span></li><span data-dcnode-id="2805" instrument_node=""> </span><li data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Recent exploit: Targeted businesses and government agencies with websites resembling Microsoft and Yahoo ones  </span></li><span data-dcnode-id="2802" instrument_node=""> </span><li data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">Elemental similarities: Can cause severe burns  </span></li></ul></div><span data-dcnode-id="2797" instrument_node=""> </span><div data-dcnode-id="2778" style="break-inside: avoid;"><h1 data-dcnode-id="2795" style="margin-bottom: 1.3em;"><span data-dcnode-id="2796" instrument_node="">Barium</span></h1><span data-dcnode-id="2794" instrument_node=""> </span><ul data-dcnode-id="2779"><li data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">aka Winnti, ShadowHammer, Wicked Panda  </span></li><span data-dcnode-id="2791" instrument_node=""> </span><li data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Linked to: China  </span></li><span data-dcnode-id="2788" instrument_node=""> </span><li data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Known attacks on: Gaming companies, airlines, and hotels in India, Ukraine, and the U.S.  </span></li><span data-dcnode-id="2785" instrument_node=""> </span><li data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Recent exploit: Penetrated a server and inserted a backdoor into an Asus software-update program  </span></li><span data-dcnode-id="2782" instrument_node=""> </span><li data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Elemental similarities: Produces clear view of innards</span></li></ul></div><span data-dcnode-id="2777" instrument_node=""> </span><div data-dcnode-id="2758" style="break-inside: avoid;"><h1 data-dcnode-id="2775" style="margin-bottom: 1.3em;"><span data-dcnode-id="2776" instrument_node="">Thallium</span></h1><span data-dcnode-id="2774" instrument_node=""> </span><ul data-dcnode-id="2759"><li data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">aka Kimsuky, Hydra, BabyShark  </span></li><span data-dcnode-id="2771" instrument_node=""> </span><li data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Linked to: North Korea  </span></li><span data-dcnode-id="2768" instrument_node=""> </span><li data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Known attacks on: Governments, NGOs, and media in Japan, the U.K., and the U.S.  </span></li><span data-dcnode-id="2765" instrument_node=""> </span><li data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Recent exploit: Sent emails tricking users into downloading software that could record login credentials  </span></li><span data-dcnode-id="2762" instrument_node=""> </span><li data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Elemental similarities: Toxic and hard to detect</span></li></ul></div></div></div></article></div><div data-dcnode-id="2751" id="ad7"><div class="dvz-v0-ad" data-dcnode-id="2752"><div class="dvz-v0-ad-div" data-dcnode-id="2753" id="dvz-v0-ad-7"></div></div></div><div data-dcnode-id="2721" id="yttrium"><article class="article-photo transition-metals" data-dcnode-id="2722"><div class="inline-elements" data-dcnode-id="2746"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2747"><span data-dcnode-id="2750" instrument_node="">Yttrium
  </span><span class="fs-xs" data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">$32/kg, metal, Shanghai market</span></span></div></div><span data-dcnode-id="2745" instrument_node=""> </span><div class="header" data-dcnode-id="2734"><h1 class="headline fs-lg di" data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Ore Spot</span></h1><span data-dcnode-id="2742" instrument_node=""> </span><span data-dcnode-id="2740" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="2735"><span data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">At least eight elements, all rare earths, can trace their discovery to this mine in Ytterby, Sweden, photographed in 1910. Four are named for the site: yttrium, terbium, erbium, and ytterbium. The others are gadolinium, holmium, scandium, and thulium.</span></span><span data-dcnode-id="2737" instrument_node=""> </span></div></div><span data-dcnode-id="2733" instrument_node=""> </span><div class="media" data-dcnode-id="2723"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2724"><div class="ratio-wrap" data-dcnode-id="2731" style="padding-top: 73.7727%;"><div data-dcnode-id="2732"></div></div><span data-dcnode-id="2730" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2725"><span data-dcnode-id="2728" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Courtesy Tekniska Museet</span></span></figcaption></figure></div></article></div><div data-dcnode-id="2660" id="zirconium"><article class="article-medium owl transition-metals" data-dcnode-id="2661"><div class="inline-elements" data-dcnode-id="2716"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2717"><span data-dcnode-id="2720" instrument_node="">Zirconium
  </span><span class="fs-xs" data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">$13/kg, unwrought import, China market</span></span></div></div><span data-dcnode-id="2715" instrument_node=""> </span><div class="header" data-dcnode-id="2703"><h1 class="headline fs-lg di serif" data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">The Bombmaking Vintner of Colchagua</span></h1><span data-dcnode-id="2712" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">By Daniela Guzmán</span></div><span data-dcnode-id="2709" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="2704"><span data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Carlos Cardoen sold weapons to Saddam Hussein, then became a renowned winemaker in Chile. The U.S. wants him extradited.</span></span><span data-dcnode-id="2706" instrument_node=""> </span></div></div><span data-dcnode-id="2702" instrument_node=""> </span><div class="media" data-dcnode-id="2691"><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="2692"><div class="ratio-wrap" data-dcnode-id="2700" style="padding-top: 65.65%;"><div data-dcnode-id="2701"></div></div><span data-dcnode-id="2699" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2693"><span data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">The 4th Tactical Fighter Wing ordnance disposal team detonates a cluster bomb during Operation Desert Storm in Iraq.</span></span><span data-dcnode-id="2696" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">Courtesy NARA</span></span></figcaption></figure></div><span data-dcnode-id="2690" instrument_node=""> </span><div class="content columns serif" data-dcnode-id="2662"><p data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">There are certain elements a good winemaker should know. Soil rich in iron, for example, gives merlots and malbecs notes of tobacco, graphite, and mushroom. Calcium and magnesium give pinots the tang of earth, anise, and spices. But there’s another element that Carlos Cardoen, a winemaker in Chile’s bucolic Colchagua Valley, is familiar with for very different reasons.</span></p><span data-dcnode-id="2687" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape float--left" data-dcnode-id="2677"><div class="ratio-wrap" data-dcnode-id="2685" style="padding-top: 92.4084%;"><div data-dcnode-id="2686"></div></div><span data-dcnode-id="2684" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2678"><span data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Cardoen with Hussein.</span></span><span data-dcnode-id="2681" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Courtesy U.S. Department of Commerce</span></span></figcaption></figure><p data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">A civil engineer with a doctorate in metals science, Cardoen started an explosives company in the 1970s meant to serve the mining industry. With regional tensions rising, Chile’s then dictator, Augusto Pinochet, asked him to start making bombs and land mines. Cardoen’s business soon expanded internationally, and Iraqi leader Saddam Hussein became a fan of his zirconium-laced cluster bombs, designed to blow up and burn a target on impact.</span></p><span data-dcnode-id="2674" instrument_node=""> </span><p data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Launched from air or ground, cluster munitions can be bomblets, chemicals, or biological weapons. They can kill indiscriminately across a wide swath of territory, and left undetonated they’re dangerous long after a conflict ends. The Convention on Cluster Munitions, ratified by 120 countries including Chile, prohibits their use, but they were common during Iraq’s wars, responsible for thousands of civilian deaths.</span></p><span data-dcnode-id="2671" instrument_node=""> </span><p data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">In 1993 the U.S. government charged Cardoen with improperly exporting zirconium, effectively confining him to Chile. He continued building his commercial empire there, spanning mining, agriculture, tourism, renewable energy, and, of course, wine. In so doing, he cultivated relationships with politicians and businesspeople of all stripes. Many Chileans hailed him as a hero and visionary after he helped rebuild communities devastated by a massive earthquake in 2010. His once sleepy hometown of Santa Cruz became an international tourist destination, with a luxury hotel, a personally curated history museum, and the winery, renowned for rich and diverse soil that produces grapes such as carménère, cabernet sauvignon, and tempranillo. The wines are branded with names drawn from Chile’s indigenous peoples: Aymara, Mapuche, Rapa Nui.</span></p><span data-dcnode-id="2668" instrument_node=""> </span><p data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">That it’s an idyll for oenophiles is fortunate for Cardoen, now 77, who was placed under house arrest in April after an extradition request by the U.S. He declined to comment on the case, but his longtime lawyer, Juan Pablo Hermosilla, calls it “fragile,” saying the U.S. made the extradition request “simply to keep the red alert valid until he dies.” Hermosilla speculates that Interpol, in renewing the notice last year, told the U.S. it needed to do something to pursue the case—“what they should have done 26 years ago.” He adds, “It shows bad faith. They always knew where Carlos was.”</span></p><span data-dcnode-id="2665" instrument_node=""> </span><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">Some Chileans who’ve been avidly following the saga, however, hope it will close an open wound from the Pinochet era. Rodrigo Avilez, a 47-year-old accountant who grew up under the regime, says the case has brought back bad memories. “Justice is delayed,” he says, “but justice arrives eventually.”</span></p></div></article></div><div data-dcnode-id="2593" id="niobium"><article class="article-photo transition-metals" data-dcnode-id="2594"><div class="inline-elements" data-dcnode-id="2655"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2656"><span data-dcnode-id="2659" instrument_node="">Niobium
  </span><span class="fs-xs" data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">$75.75/kg, 98% China spot</span></span></div></div><span data-dcnode-id="2654" instrument_node=""> </span><div class="header" data-dcnode-id="2640"><h1 class="headline fs-lg di" data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">‘I Dream … That One Day, We’ll Also Have a Niobium Valley’</span></h1><span data-dcnode-id="2651" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Photographs by Júlia Pontés</span></div><span data-dcnode-id="2648" instrument_node=""> </span><div class="bloom-dek with-dot fs-md" data-dcnode-id="2641"><span data-dcnode-id="2644"><span data-dcnode-id="2647" instrument_node="">Last year, Brazil produced almost nine-tenths of the world’s niobium, used primarily in steel alloys for airplanes, cars, and electronics. The country’s president, Jair Bolsonaro, who’s long touted the metal’s economic potential, described his “Niobium Valley” dream in a 2016 promotional video. Photographer Júlia Pontés—who took these shots of a niobium mining operation owned by Companhia Brasileira de Metalurgia e Mineração and Chinese partners in Araxá, in the state of Minas Gerais—researches and documents the vast scale of such projects so people can see the effects of mineral exploration and consumption. A Niobium Valley “could be great only if it primarily aimed,” she says, at “benefit for the community.” Extraction industries, she’s found, have returned limited benefits to Araxá’s people. </span><em data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node=""> —Jeremy Keehn</span></em></span><span data-dcnode-id="2643" instrument_node=""> </span></div></div><span data-dcnode-id="2639" instrument_node=""> </span><div class="media" data-dcnode-id="2595"><div class="bloom-slider flickity-enabled is-draggable" data-dcnode-id="2596" tabindex="0"><div class="flickity-viewport" data-dcnode-id="2597" style="height: 3709px; touch-action: pan-y;"><div class="flickity-slider" data-dcnode-id="2598" style="left: 0px; transform: translateX(0%);"><div class="slide is-selected" data-dcnode-id="2629" style="position: absolute; left: 0%;"><figure data-dcnode-id="2630"><img data-dcnode-id="2638" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/iBeVlwQtKGGI/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iBeVlwQtKGGI/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iBeVlwQtKGGI/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iBeVlwQtKGGI/v0/1500x-1.jpg 2000w"><span data-dcnode-id="2637" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2631"><span data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Pit at a CBMM niobium mining operation in Araxá, Brazil.</span></span><span data-dcnode-id="2634" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Photographer: Júlia Pontés for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="2619" style="position: absolute; left: 482.81%;"><figure data-dcnode-id="2620"><img data-dcnode-id="2628" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/i0cl6RkErxfw/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/i0cl6RkErxfw/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/i0cl6RkErxfw/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/i0cl6RkErxfw/v0/1500x-1.jpg 2000w"><span data-dcnode-id="2627" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2621"><span data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Minerals gathered for processing.</span></span><span data-dcnode-id="2624" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Photographer: Júlia Pontés for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="2609" style="position: absolute; left: 965.63%;"><figure data-dcnode-id="2610"><img data-dcnode-id="2618" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/itplPSL6Wmpw/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/itplPSL6Wmpw/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/itplPSL6Wmpw/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/itplPSL6Wmpw/v0/1500x-1.jpg 2000w"><span data-dcnode-id="2617" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2611"><span data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">Tailings dam.</span></span><span data-dcnode-id="2614" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">Photographer: Júlia Pontés for Bloomberg Businessweek</span></span></figcaption></figure></div><div aria-hidden="true" class="slide" data-dcnode-id="2599" style="position: absolute; left: 1508.01%;"><figure data-dcnode-id="2600"><img data-dcnode-id="2608" sizes="(min-width: 900px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.bwbx.io/images/users/iqjWHBFdfxIU/iQmoeg8_4e5E/v0/500x-1.jpg&amp;raw" srcset="https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iQmoeg8_4e5E/v0/750x-1.jpg 1000w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iQmoeg8_4e5E/v0/1125x-1.jpg 1500w, https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iQmoeg8_4e5E/v0/1500x-1.jpg 2000w"><span data-dcnode-id="2607" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2601"><span data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Niobium processing plant.</span></span><span data-dcnode-id="2604" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Photographer: Júlia Pontés for Bloomberg Businessweek</span></span></figcaption></figure></div></div></div></div></div></article></div><div data-dcnode-id="2549" id="molybdenum-technetium"><article class="article-small transition-metals" data-dcnode-id="2550"><div class="inline-elements" data-dcnode-id="2584"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2589"><span data-dcnode-id="2592" instrument_node="">Molybdenum
  </span><span class="fs-xs" data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">$24.89/kg, London Metal Exchange cash spot</span></span></div><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2585"><span data-dcnode-id="2588" instrument_node="">Technetium
  </span><span class="fs-xs" data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Price not available</span></span></div></div><span data-dcnode-id="2583" instrument_node=""> </span><span data-dcnode-id="2581" instrument_node=""> </span><div class="cols owl" data-dcnode-id="2551"><div class="article-small_headline" data-dcnode-id="2573"><h1 class="headline fs-lg di serifitalic" data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Moly Cow</span></h1><span data-dcnode-id="2578" instrument_node=""> </span><div class="byline dib" data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">By Drake Bennett</span></div><span data-dcnode-id="2575" instrument_node=""> </span></div><span data-dcnode-id="2572" instrument_node=""> </span><div class="content serif" data-dcnode-id="2552"><figure class="bloom-figure ratio-figure portrait" data-dcnode-id="2562"><div class="ratio-wrap" data-dcnode-id="2570" style="padding-top: 111.336%;"><div data-dcnode-id="2571"></div></div><span data-dcnode-id="2569" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2563"><span data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">A NorthStar machine for producing technetium-99m from molybdenum-99.</span></span><span data-dcnode-id="2566" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Courtesy NorthStar</span></span></figcaption></figure><span data-dcnode-id="2561" instrument_node=""> </span><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">These periodic table neighbors are also kin. Molybdenum-99, an unstable isotope with one neutron more than Mo-98 (the element’s most common naturally occurring form), produces the even more unstable technetium-99m. Tc-99m, as it decays, helps doctors see into the human body, emitting gamma rays that are picked up by specialized cameras in cardiac scans, bone scans, and other imaging procedures.</span></p><span data-dcnode-id="2558" instrument_node=""> </span><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Traditionally, this unusual supply chain has required irradiating highly enriched uranium—the stuff of nuclear weapons—in reactors overseas, then shipping back the fast-decaying Mo-99. Last year, NorthStar Medical Radioisotopes LLC got permission from the FDA to make it a new way. Discs of stable molybdenum are irradiated in a nuclear reactor in Columbia, Mo., creating Mo-99 that’s then shipped in tungsten-shielded containers to specialized pharmacies. There, NorthStar machines—earlier devices were dubbed “moly cows”—harvest the Tc-99m.</span></p><span data-dcnode-id="2555" instrument_node=""> </span><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">When a hospital orders a scan, the pharmacy prepares a lead-jacketed syringe with Tc-99m and a cocktail of molecules that will bond to the organ of interest. The isotope’s six-hour half-life ensures that it’s gone from the body in days.</span></p></div></div></article></div><div data-dcnode-id="2468" id="ruthenium-rhodium-palladium"><article class="article-medium owl transition-metals" data-dcnode-id="2469"><div class="inline-elements" data-dcnode-id="2536"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2545"><span data-dcnode-id="2548" instrument_node="">Ruthenium
  </span><span class="fs-xs" data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">$8,819/kg, Johnson Matthey spot</span></span></div><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2541"><span data-dcnode-id="2544" instrument_node="">Rhodium
  </span><span class="fs-xs" data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">$139,509/kg, Johnson Matthey spot</span></span></div><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2537"><span data-dcnode-id="2540" instrument_node="">Palladium
  </span><span class="fs-xs" data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">$47,320/kg, dollar spot</span></span></div></div><span data-dcnode-id="2535" instrument_node=""> </span><div class="header" data-dcnode-id="2527"><h1 class="headline fs-lg di sans" data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Elements That Go Boom and Bust</span></h1><span data-dcnode-id="2532" instrument_node=""> </span><div class="byline dib fs-md" data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">By Eddie van der Walt</span></div><span data-dcnode-id="2529" instrument_node=""> </span></div><span data-dcnode-id="2526" instrument_node=""> </span><span data-dcnode-id="2524" instrument_node=""> </span><div class="content columns sans" data-dcnode-id="2470"><p data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Commodities used in small quantities by giant industries have a tendency to undergo spectacular rallies and crashes, especially if they’re produced as byproducts of another material. Their supply doesn’t correspond directly with changes in demand and so doesn’t respond directly to big changes in technology, consumer appetites, or trade relationships. The result is periods of over- or underproduction, with shifting costs to match.</span></p><span data-dcnode-id="2521" instrument_node=""> </span><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">One such set is the platinum group metals, which include ruthenium, rhodium, palladium, and iridium. Dug up as byproducts of platinum in South Africa and nickel in Russia, they’re coveted for their catalytic properties, notably used in cars to turn toxic material into less harmful gases.</span></p><span data-dcnode-id="2518" instrument_node=""> </span><h1 data-dcnode-id="2516" id="ruthenium"><span data-dcnode-id="2517" instrument_node="">Ruthenium</span></h1><span data-dcnode-id="2515" instrument_node=""> </span><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Around 2005, Toshiba, Western Digital, Seagate Technology and other companies started using more ruthenium to increase storage capacity on hard disk drives. The price soared almost 1,500% in two years, but “thrifting”—using less metal to achieve the same results—wiped out the rise by 2009. In 2016 the cloud-storage boom pushed prices higher again, but it’s now hit a plateau as solid-state PC hard drives, which don’t use ruthenium, gain in popularity.</span></p><span data-dcnode-id="2512" instrument_node=""> </span><figure class="bloom-figure ratio-figure wide" data-dcnode-id="2503"><div class="ratio-wrap" data-dcnode-id="2510" style="padding-top: 41.6667%;"><div data-dcnode-id="2511"></div></div><span data-dcnode-id="2509" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2504"><span data-dcnode-id="2507" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Data: Compiled by Bloomberg</span></span></figcaption></figure><span data-dcnode-id="2502" instrument_node=""> </span><h1 data-dcnode-id="2500" id="rhodium"><span data-dcnode-id="2501" instrument_node="">Rhodium</span></h1><span data-dcnode-id="2499" instrument_node=""> </span><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Rhodium was once a favorite of carmakers, who put it in catalytic converters. But around 2003 they found themselves bidding against Sony Corp. and other manufacturers of flatscreen TVs. The price soared 2,000% in five years, only to crash by 90% when car companies started using less and the global financial crisis struck. There was a short-lived recovery in 2009-10, driven by speculators. Lately, they’re betting that auto executives, despite being burned before, will get back in the game.</span></p><span data-dcnode-id="2496" instrument_node=""> </span><figure class="bloom-figure ratio-figure wide" data-dcnode-id="2487"><div class="ratio-wrap" data-dcnode-id="2494" style="padding-top: 41.6667%;"><div data-dcnode-id="2495"></div></div><span data-dcnode-id="2493" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2488"><span data-dcnode-id="2491" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Data: Compiled by Bloomberg</span></span></figcaption></figure><span data-dcnode-id="2486" instrument_node=""> </span><h1 data-dcnode-id="2484" id="palladium"><span data-dcnode-id="2485" instrument_node="">Palladium</span></h1><span data-dcnode-id="2483" instrument_node=""> </span><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">With palladium significantly cheaper than platinum in the 1990s, automakers started shifting to it for gasoline engines. Supply disruptions in Russia around 2000 led to an acute shortage and a price spike, followed by depressed prices as Soviet-era stockpiles were sold off. Automotive demand grew, and, starting in 2012, the world produced less than it consumed for seven straight years. There was a 60% rise in futures in the past year, the largest among 35 key commodities Bloomberg tracks.</span></p><span data-dcnode-id="2480" instrument_node=""> </span><figure class="bloom-figure ratio-figure wide" data-dcnode-id="2471"><div class="ratio-wrap" data-dcnode-id="2478" style="padding-top: 41.6667%;"><div data-dcnode-id="2479"></div></div><span data-dcnode-id="2477" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="2472"><span data-dcnode-id="2475" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Data: Compiled by Bloomberg</span></span></figcaption></figure></div></article></div><div data-dcnode-id="2465" id="ad8"><div class="dvz-v0-ad" data-dcnode-id="2466"><div class="dvz-v0-ad-div" data-dcnode-id="2467" id="dvz-v0-ad-8"></div></div></div><div data-dcnode-id="2404" id="silver"><article class="article-small transition-metals" data-dcnode-id="2405"><div class="inline-elements" data-dcnode-id="2460"><div class="inline-element mono with-dot square transition-metals" data-dcnode-id="2461"><span data-dcnode-id="2464" instrument_node="">Silver
