iv></div><span data-dcnode-id="594" instrument_node=""> </span><div class="right" data-dcnode-id="287"><span data-dcnode-id="592" instrument_node=""> </span><div class="content serif" data-dcnode-id="288"><h1 data-dcnode-id="590" id="ad"><span data-dcnode-id="591" instrument_node="">Ad</span></h1><span data-dcnode-id="589" instrument_node=""> </span><hr data-dcnode-id="588" style="margin: 1em 0px 0.325em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="586" style="padding-right: 0.65em;"><span data-dcnode-id="587" instrument_node="">Adamantium</span></span><span data-dcnode-id="583" style="padding-right: 0.65em;"><span data-dcnode-id="584" instrument_node="">Marvel Comics</span></span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="580" style="margin: 0px;"><tbody data-dcnode-id="581"><tr data-dcnode-id="585"></tr><tr data-dcnode-id="582"></tr></tbody></table><hr data-dcnode-id="579" style="margin: 0.4em 0px -0.3em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="578" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="569"><div class="ratio-wrap" data-dcnode-id="576" style="padding-top: 66.3636%;"><div data-dcnode-id="577"></div></div><span data-dcnode-id="575" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="570"><span data-dcnode-id="573" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Photo: 20th Century Fox/Everett Collection</span></span></figcaption></figure><span data-dcnode-id="568" instrument_node=""> </span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Practically indestructible, it’s best known as the steel alloy bonded to Wolverine’s skeleton and claws. According to marvel.com, “Wolverine’s mutant healing factor allowed him to survive the process and induced a molecular change in the metal, transforming it into a wholly new metal, named Adamantium Beta.”</span></p><span data-dcnode-id="565" instrument_node=""> </span><h1 data-dcnode-id="563" id="bo"><span data-dcnode-id="564" instrument_node="">Bo</span></h1><span data-dcnode-id="562" instrument_node=""> </span><hr data-dcnode-id="561" style="margin: 1em 0px 0.325em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="559" style="padding-right: 0.65em;"><span data-dcnode-id="560" instrument_node="">Bolognium</span></span><span data-dcnode-id="555" style="padding-right: 0.65em;"><em data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">The Simpsons</span></em></span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="552" style="margin: 0px;"><tbody data-dcnode-id="553"><tr data-dcnode-id="558"></tr><tr data-dcnode-id="554"></tr></tbody></table><hr data-dcnode-id="551" style="margin: 0.4em 0px -0.3em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="550" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="542"><div class="ratio-wrap" data-dcnode-id="548" style="padding-top: 66.3636%;"><div data-dcnode-id="549"></div></div><span data-dcnode-id="547" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="543"><span data-dcnode-id="545" instrument_node=""> </span></figcaption></figure><span data-dcnode-id="541" instrument_node=""> </span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">In “Lisa Gets an ‘A’  ” (1998), bolognium appears on a promotional copy of the periodic table provided to Springfield Elementary by Oscar Mayer. (Mrs. Krabappel: “Now who can tell me the atomic weight of bolognium?” Martin Prince: “Ooh, delicious?” Krabappel: “Correct. I would also accept ‘snacktacular.’ ”)</span></p><span data-dcnode-id="538" instrument_node=""> </span><h1 data-dcnode-id="536" id="bm"><span data-dcnode-id="537" instrument_node="">Bm</span></h1><span data-dcnode-id="535" instrument_node=""> </span><hr data-dcnode-id="534" style="margin: 1em 0px 0.325em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="532" style="padding-right: 0.65em;"><span data-dcnode-id="533" instrument_node="">Bombastium</span></span><span data-dcnode-id="529" style="padding-right: 0.65em;"><span data-dcnode-id="530" instrument_node="">Walt Disney</span></span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="526" style="margin: 0px;"><tbody data-dcnode-id="527"><tr data-dcnode-id="531"></tr><tr data-dcnode-id="528"></tr></tbody></table><hr data-dcnode-id="525" style="margin: 0.4em 0px -0.3em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="524" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="515"><div class="ratio-wrap" data-dcnode-id="522" style="padding-top: 66.3636%;"><div data-dcnode-id="523"></div></div><span data-dcnode-id="521" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="516"><span data-dcnode-id="519" instrument_node=""> </span><span class="ttu credit" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Photo: Walt Disney Company/Everett Collection</span></span></figcaption></figure><span data-dcnode-id="514" instrument_node=""> </span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">In a 1957 comic, Uncle Scrooge forks over a chunk of his fortune for a piece “the size of a large turnip,” according to one synopsis. Nobody knows what it does—only that it must remain frozen. “Terrified that his acquisition will melt before he can make a profit,” the review continues, “Scrooge drags Donald Duck and his nephews on a voyage to the South Pole to safeguard his investment.”</span></p><span data-dcnode-id="511" instrument_node=""> </span><h1 data-dcnode-id="509" id="ct"><span data-dcnode-id="510" instrument_node="">Ct</span></h1><span .3em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="354" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="346"><div class="ratio-wrap" data-dcnode-id="352" style="padding-top: 66.3636%;"><div data-dcnode-id="353"></div></div><span data-dcnode-id="351" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="347"><span data-dcnode-id="349" instrument_node=""> </span></figcaption></figure><span data-dcnode-id="345" instrument_node=""> </span><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">The lightweight, silvery metal is malleable enough to be made into jewelry or orc-resistant armor.</span></p><span data-dcnode-id="342" instrument_node=""> </span><h1 data-dcnode-id="340" id="un"><span data-dcnode-id="341" instrument_node="">Un</span></h1><span data-dcnode-id="339" instrument_node=""> </span><hr data-dcnode-id="338" style="margin: 1em 0px 0.325em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="336" style="padding-right: 0.65em;"><span data-dcnode-id="337" instrument_node="">Unobtanium</span></span><span data-dcnode-id="332" style="padding-right: 0.65em;"><em data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Avatar</span></em></span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="329" style="margin: 0px;"><tbody data-dcnode-id="330"><tr data-dcnode-id="335"></tr><tr data-dcnode-id="331"></tr></tbody></table><hr data-dcnode-id="328" style="margin: 0.4em 0px -0.3em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="327" instrument_node=""> </span><figure class="bloom-figure ratio-figure wide" data-dcnode-id="319"><div class="ratio-wrap" data-dcnode-id="325" style="padding-top: 42.1875%;"><div data-dcnode-id="326"></div></div><span data-dcnode-id="324" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="320"><span data-dcnode-id="322" instrument_node=""> </span></figcaption></figure><span data-dcnode-id="318" instrument_node=""> </span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">The metallic, silver-gray mineral, found on the moon Pandora, is a superconductor worth as much as $40 million per kilogram, according to Avatar Wiki. But it predates the movie as a jokey term for a theoretical substance—with perfect properties for some use—that either doesn’t exist or is impossible to mine for political or technological reasons.</span></p><span data-dcnode-id="315" instrument_node=""> </span><h1 data-dcnode-id="313" id="up"><span data-dcnode-id="314" instrument_node="">Up</span></h1><span data-dcnode-id="312" instrument_node=""> </span><hr data-dcnode-id="311" style="margin: 1em 0px 0.325em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="309" style="padding-right: 0.65em;"><span data-dcnode-id="310" instrument_node="">Upsidaisium</span></span><span data-dcnode-id="305" style="padding-right: 0.65em;"><em data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Rocky and His Friends</span></em></span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="302" style="margin: 0px;"><tbody data-dcnode-id="303"><tr data-dcnode-id="308"></tr><tr data-dcnode-id="304"></tr></tbody></table><hr data-dcnode-id="301" style="margin: 0.4em 0px -0.3em; border: none; height: 1px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="300" instrument_node=""> </span><figure class="bloom-figure ratio-figure landscape" data-dcnode-id="292"><div class="ratio-wrap" data-dcnode-id="298" style="padding-top: 66.3636%;"><div data-dcnode-id="299"></div></div><span data-dcnode-id="297" instrument_node=""> </span><figcaption class="bloom-figcaption" data-dcnode-id="293"><span data-dcnode-id="295" instrument_node=""> </span></figcaption></figure><span data-dcnode-id="291" instrument_node=""> </span><p data-dcnode-id="289"><span data-dcn
