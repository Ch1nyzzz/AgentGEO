</span><div class="entry-author-thumbnail-inner" data-dcnode-id="1285" style="background-image: url(https://149734907.v2.pressablecdn.com/wp-content/uploads/2021/11/c26c5a162ae8fbe35cad9f0957835f2a-96x96.jpg)"><span data-dcnode-id="1286" instrument_node="">

                                                By Ben and Kelly Decker                                            </span></div><span data-dcnode-id="1279" instrument_node="">
</span><div class="entry-date" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">

</span></div><span data-dcnode-id="1274" instrument_node="">
</span></div><span data-dcnode-id="1272" instrument_node="">

</span><div class="entry-content" data-dcnode-id="787"><span data-dcnode-id="1269" instrument_node="">
</span><div class="entry-content-innerold-format" data-dcnode-id="789"><span data-dcnode-id="1268" instrument_node="">
</span><ol data-dcnode-id="1262" start="2016"><span data-dcnode-id="1267" instrument_node="">
</span><li data-dcnode-id="1264"><span data-dcnode-id="1265" style="font-weight: 400;"><span data-dcnode-id="1266" instrument_node=""> What a year.</span></span></li><span data-dcnode-id="1263" instrument_node="">
</span></ol><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1259" style="font-weight: 400;"><span data-dcnode-id="1260" instrument_node="">The Olympics. A Presidential Election. So much noise this year - a colossal communications cacophony. What, then, stood out? The </span></span><b data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">moments</span></b><span data-dcnode-id="1255" style="font-weight: 400;"><span data-dcnode-id="1256" instrument_node="">. </span></span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1251" style="font-weight: 400;"><span data-dcnode-id="1252" instrument_node="">With such a divisive political, economic and social landscape this year, we found that people heard what they wanted to hear, and we also felt it would be more productive to take a new direction. Instead of identifying the </span></span><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/category/top-10-best-and-worst-communicators/"><span data-dcnode-id="1249" style="font-weight: 400;"><span data-dcnode-id="1250" instrument_node="">Top 10 Best and Worst Communicators</span></span></a><span data-dcnode-id="1246" style="font-weight: 400;"><span data-dcnode-id="1247" instrument_node="">, this year, we bring you the Top 10 Communication Moments of 2016, each complete with a “So What?” — the communications lessons we can apply from both the inspiring and insipid, excellence and egos, alike.</span></span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><img alt="flotus_top10moments-2016" class="alignnone size-full wp-image-14028" data-dcnode-id="1243" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/FLOTUS_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1238"><b data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">1. FLOTUS for POTUS: That’s What Many Were Thinking When Michelle Obama Dropped the Mic after her DNC Speech, July 25, 2016</span></b></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1235" style="font-weight: 400;"><span data-dcnode-id="1236" instrument_node="">Dynamic, ambitious, eloquent and relatable to everyone, Michelle Obama is an outstanding communicator. If you weren’t among the 25.7 million watching her </span></span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D4ZNWYqDU948"><span data-dcnode-id="1233" style="font-weight: 400;"><span data-dcnode-id="1234" instrument_node="">speech from the Democratic National Convention</span></span></a><span data-dcnode-id="1230" style="font-weight: 400;"><span data-dcnode-id="1231" instrument_node=""> live, you must watch it. It will give you chills. It stirred emotion with women and men, as she describes how difficult it is to raise great children in a very difficult world – and she did so without preaching. She spoke with compassion and care – to the point where you could feel it. She has a life to which most people can’t relate, yet, she found common ground with people across the country. Michelle Obama </span></span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/lifestyle/style/whats-on-michelle-obamas-mind-sarah-hurwitz-knows-how-to-put-it-in-words/2016/06/13/440d2130-3103-11e6-8ff7-7b6c1998b7a0_story.html"><span data-dcnode-id="1228" style="font-weight: 400;"><span data-dcnode-id="1229" instrument_node="">works so closely with her speechwriter</span></span></a><span data-dcnode-id="1225" style="font-weight: 400;"><span data-dcnode-id="1226" instrument_node="">, Sara Hurwitz, that her speeches have an emotional core that’s authentic to </span></span><i data-dcnode-id="1222"><span data-dcnode-id="1223" style="font-weight: 400;"><span data-dcnode-id="1224" instrument_node="">her. </span></span></i><span data-dcnode-id="1220" style="font-weight: 400;"><span data-dcnode-id="1221" instrument_node="">Michelle Obama’s ability to</span></span><span data-dcnode-id="1219" instrument_node=""> </span><span data-dcnode-id="1217" style="font-weight: 400;"><span data-dcnode-id="1218" instrument_node="">connect with her audience</span></span><span data-dcnode-id="1215" style="font-weight: 400;"><span data-dcnode-id="1216" instrument_node=""> through her authentic emotional vulnerability (spoiler alert: she’s super likable) and powerful vocal conviction is incredible. The most memorable lines, “I wake up every morning in a house built by slaves,” and “When they go low, we go high.” Yes, she practiced for this key moment, and yes, it showed. Best of all – she’s not a one-hit wonder. Time and time again, Michelle Obama is real, </span></span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/begin-with-your-listeners/"><span data-dcnode-id="1213" style="font-weight: 400;"><span data-dcnode-id="1214" instrument_node="">listener-focused</span></span></a><span data-dcnode-id="1210" style="font-weight: 400;"><span data-dcnode-id="1211" instrument_node="">, influencing and inspiring.</span></span></p><span data-dcnode-id="1208" instrument_node="">
</span><blockquote data-dcnode-id="1194"><p data-dcnode-id="1198"><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">So What:</span></strong><span data-dcnode-id="1205" instrument_node=""> Even in a scripted, teleprompter experience, you can speak from the heart by focusing on how you come across through your voice, your </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/face-say-leadership/"><span data-dcnode-id="1204" instrument_node="">facial expressions</span></a><span data-dcnode-id="1202" instrument_node="">, your </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/decline-of-eye-contact-and-how-you-can-correct-it/"><span data-dcnode-id="1201" instrument_node="">eye communication</span></a><span data-dcnode-id="1199" instrument_node=""> and your warmth. Be provocative — and do it with care and thoughtfulness.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">&nbsp;</span></p></blockquote><span data-dcnode-id="1193" instrument_node="">
</span><p align="Left" data-dcnode-id="1191"><img alt="brown_top10moments-2016" class="alignnone size-full wp-image-14026" data-dcnode-id="1192" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/Brown_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" style="font-weight: 400;"><b data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">2. The Voice that Unified the Divided: Dallas Police Chief David Brown’s News Briefing, July 8, 2016</span></b></span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1183" style="font-weight: 400;"><span data-dcnode-id="1184" instrument_node="">It’s easy to grab someone from the limelight who couldn’t handle the pressure. This was completely the opposite. Dallas Police Chief David Brown didn’t want the spotlight – he just wanted support. And peace. Brown stepped up to rally and inspire a community during a time of tragedy. With a </span></span><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJn3wlJ-c-0s%23t%3D7m00s"><span data-dcnode-id="1181" style="font-weight: 400;"><span data-dcnode-id="1182" instrument_node="">strong voice and a steady conviction</span></span></a><span data-dcnode-id="1178" style="font-weight: 400;"><span data-dcnode-id="1179" instrument_node="">, the police chief was able to highlight the weight of the events in Dallas, Texas while inspiring support. His transparency, compassion and vulnerability about how he was personally handling the grief resonated across the nation. He graciously and humbly reminded viewers of the humanity behind the uniform, pulling people in when unity was vital. In a press conference he boldly asked for help; yet because of his conversational cadence and </span></span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/its-called-humble-confidence/"><span data-dcnode-id="1176" style="font-weight: 400;"><span data-dcnode-id="1177" instrument_node="">confident</span></span></a><span data-dcnode-id="1173" style="font-weight: 400;"><span data-dcnode-id="1174" instrument_node=""> posturing, he never once victimized himself or his colleagues amidst the tragedy. Events like this rarely manifest the kind of leadership and greatness that we saw in David Brown – yet they are the times when we need it the most.</span></span></p><span data-dcnode-id="1171" instrument_node="">
</span><blockquote data-dcnode-id="1160"><p data-dcnode-id="1164"><strong data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">So What:</span></strong><span data-dcnode-id="1168" instrument_node=""> When we get cornered, it’s easy to get defensive and attack. Instead, use </span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/lead-better-transparency/"><span data-dcnode-id="1167" instrument_node="">transparency</span></a><span data-dcnode-id="1165" instrument_node=""> to pull people in.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">&nbsp;</span></p></blockquote><span data-dcnode-id="1159" instrument_node="">
</span><p align="Left" data-dcnode-id="1157"><img alt="pdebate_top10moments-2016" class="alignnone size-full wp-image-14033" data-dcnode-id="1158" height="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/PDebate_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1153"><b data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">3. Three Ring Circus at the Highest Stakes: Donald Trump and Hillary Clinton at the Presidential Debates, Sept. 26, Oct. 9 and Oct. 19, 2016</span></b></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1150" style="font-weight: 400;"><span data-dcnode-id="1151" instrument_node="">2016 was the year of the most polarizing two Presidential candidates in history. The three Presidential Debates (</span></span><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D855Am6ovK7s%26t%3D2s"><span data-dcnode-id="1148" style="font-weight: 400;"><span data-dcnode-id="1149" instrument_node="">one</span></span></a><span data-dcnode-id="1145" style="font-weight: 400;"><span data-dcnode-id="1146" instrument_node="">,</span></span><a data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DFRlI2SQ0Ueg%26t%3D3s"><span data-dcnode-id="1144" instrument_node=""> </span><span data-dcnode-id="1142" style="font-weight: 400;"><span data-dcnode-id="1143" instrument_node="">two</span></span></a><span data-dcnode-id="1139" style="font-weight: 400;"><span data-dcnode-id="1140" instrument_node=""> and</span></span><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DsmkyorC5qwc%26t%3D3s"><span data-dcnode-id="1138" instrument_node=""> </span><span data-dcnode-id="1136" style="font-weight: 400;"><span data-dcnode-id="1137" instrument_node="">three</span></span></a><span data-dcnode-id="1133" style="font-weight: 400;"><span data-dcnode-id="1134" instrument_node="">) were the most talked about and the most watched – because it’s hard to turn your head away from a car wreck. They were key communication moments – even if they didn’t have the impact that either candidate wanted. The focus was on the countdown to the debate, whether or not they would shake hands and whether or not the moderators would control or be controlled. Did you try the tactic of putting the sound on mute and just watching the body language </span></span><a data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/09/28/us/politics/trump-clinton-debate-body-language.html"><span data-dcnode-id="1131" style="font-weight: 400;"><span data-dcnode-id="1132" instrument_node="">like this journalist</span></span></a><span data-dcnode-id="1128" style="font-weight: 400;"><span data-dcnode-id="1129" instrument_node="">? Or did you already learn the memorable behaviors by watching&nbsp;</span></span><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D-nQGBZQrtT0"><span data-dcnode-id="1126" style="font-weight: 400;"><span data-dcnode-id="1127" instrument_node="">SNL</span></span></a><span data-dcnode-id="1123" style="font-weight: 400;"><span data-dcnode-id="1124" instrument_node="">? Donald Trump’s dour facial expression (some call it lemon-faced), pouty lips, stage stalking and interruptive manner reflected his arrogance and curtness. Yet his powerful rhetoric resonated with those who were tired of the politically correct style. In contrast, Hillary Clinton’s calm, well-rehearsed answers, prepared platform and puns were peppered with stories that came off as very political. Her serious face with strident gestures inhibited the warmth that many said she had off-camera. Both candidates refused to own up to statements they had made in the past, instead denying and acting deferential in trying to create alternative meanings for their statements. These high stakes debates were...well...kind of a circus. </span></span></p><span data-dcnode-id="1121" instrument_node="">
</span><blockquote data-dcnode-id="1110"><p data-dcnode-id="1114"><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">So What:</span></strong><span data-dcnode-id="1118" instrument_node=""> When you’re asked a question, answer the question directly for what it is. When you have an opportunity to move the needle, be more </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/march-madness-whos-listening/"><span data-dcnode-id="1117" instrument_node="">listener-focused</span></a><span data-dcnode-id="1115" instrument_node=""> (that’s how you can influence).</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">&nbsp;</span></p></blockquote><span data-dcnode-id="1109" instrument_node="">
</span><p align="Left" data-dcnode-id="1107"><img alt="scully_top10moments-2016" class="alignnone size-full wp-image-14035" data-dcnode-id="1108" height="248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/Scully_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1103"><b data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">4. Retiring at the Top of His Game: Vin Scully’s Goodbye Speech at Dodger Stadium, September 23, 2016</span></b></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1100" style="font-weight: 400;"><span data-dcnode-id="1101" instrument_node="">When it comes to modeling the Decker Principles, few do it better. Vin Scully’s </span></span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/i/videos/tweet/779582460887638016"><span data-dcnode-id="1098" style="font-weight: 400;"><span data-dcnode-id="1099" instrument_node="">final speech at Dodger Stadium</span></span></a><span data-dcnode-id="1095" style="font-weight: 400;"><span data-dcnode-id="1096" instrument_node=""> this September was a cherry on top of an incredible career, and it embodied so many of the elements that made him an amazing (and amazingly consistent) communicator every game for 56 years. Vin Scully used </span></span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/ring-humor/"><span data-dcnode-id="1093" style="font-weight: 400;"><span data-dcnode-id="1094" instrument_node="">humor</span></span></a><span data-dcnode-id="1090" style="font-weight: 400;"><span data-dcnode-id="1091" instrument_node=""> and </span></span><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/follow-the-four-commandments-of-storytelling/"><span data-dcnode-id="1088" style="font-weight: 400;"><span data-dcnode-id="1089" instrument_node="">stories</span></span></a><span data-dcnode-id="1085" style="font-weight: 400;"><span data-dcnode-id="1086" instrument_node=""> to create an experience and draw people in. He spoke right to his fans – addressing them directly, identifying their impact on his career and thanking them. This listener-focused message struck gold, helping everyone feel personally connected to him. And much of Vin Scully’s experience also comes </span></span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/the-art-of-storytelling-is-in-the-telling/"><span data-dcnode-id="1083" style="font-weight: 400;"><span data-dcnode-id="1084" instrument_node="">in the telling</span></span></a><span data-dcnode-id="1080" style="font-weight: 400;"><span data-dcnode-id="1081" instrument_node="">, itself, with incredible vocal variety, vocal energy, pausing and oh-so much more. He mixes up his content, adds tons of stories, doesn’t use filler words and really connects with his audience – many of whom were moved to tears. Were you?</span></span></p><span data-dcnode-id="1078" instrument_node="">
</span><blockquote data-dcnode-id="1061"><p data-dcnode-id="1065"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">So What:</span></strong><span data-dcnode-id="1075" instrument_node=""> We can all tweak one or two behaviors to be more like Vin Scully, one of the masters. Try adjusting one at a time – focus first on your vocal energy, then try </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/literally-a-filler-word/"><span data-dcnode-id="1074" instrument_node="">eliminating filler words</span></a><span data-dcnode-id="1072" instrument_node="">, then practice </span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/pause-just-pause/"><span data-dcnode-id="1071" instrument_node="">pausing</span></a><span data-dcnode-id="1069" instrument_node="">, then focus on </span><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/stop-compartmentalizing-find-story-tell/"><span data-dcnode-id="1068" instrument_node="">telling stories</span></a><span data-dcnode-id="1066" instrument_node="">.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">&nbsp;</span></p></blockquote><span data-dcnode-id="1060" instrument_node="">
</span><p align="Left" data-dcnode-id="1058"><img alt="corden_top10moments-2016" class="alignnone size-full wp-image-14027" data-dcnode-id="1059" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/Corden_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1054"><b data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">5. Belting Out Likability: James Corden, Carpool Karaoke (too many to list)</span></b></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1051" style="font-weight: 400;"><span data-dcnode-id="1052" instrument_node="">Unscripted, undeniably </span></span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/authenticity-trumps/"><span data-dcnode-id="1049" style="font-weight: 400;"><span data-dcnode-id="1050" instrument_node="">authentic</span></span></a><span data-dcnode-id="1046" style="font-weight: 400;"><span data-dcnode-id="1047" instrument_node=""> and just plain real - we all love what James Corden brought to 2016. How did he do it? His laughter is infectious, he doesn’t hold back emotion and he is unfiltered. With James Corden, what you see is what you get. His ability to create viral snippets have had lasting power in a world where our attention spans are shorter than ever. There’s a reason he got named as one of the </span></span><a data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/4258291/30-most-influential-people-on-the-internet-2016/"><span data-dcnode-id="1044" style="font-weight: 400;"><span data-dcnode-id="1045" instrument_node="">most influential people on the internet</span></span></a><span data-dcnode-id="1041" style="font-weight: 400;"><span data-dcnode-id="1042" instrument_node="">, that </span></span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//variety.com/2016/tv/news/carpool-karaoke-apple-music-buys-series-1201823423/"><span data-dcnode-id="1039" style="font-weight: 400;"><span data-dcnode-id="1040" instrument_node="">Apple purchased access</span></span></a><span data-dcnode-id="1036" style="font-weight: 400;"><span data-dcnode-id="1037" instrument_node=""> to his viral videos and that he's continuously booked for prominent roles. You can feel his enthusiasm when he talks to people and lets them shine under his spotlight – kind of like </span></span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/top-ten-best-worst-communicators-2014/"><span data-dcnode-id="1034" style="font-weight: 400;"><span data-dcnode-id="1035" instrument_node="">Jimmy Fallon</span></span></a><span data-dcnode-id="1031" style="font-weight: 400;"><span data-dcnode-id="1032" instrument_node="">. With over two billion views, to date, the most-watched of all time is </span></span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DNck6BZga7TQ"><span data-dcnode-id="1029" style="font-weight: 400;"><span data-dcnode-id="1030" instrument_node="">with Adele</span></span></a><span data-dcnode-id="1026" style="font-weight: 400;"><span data-dcnode-id="1027" instrument_node="">, and a few other faves include </span></span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DqQIsdod0LWo"><span data-dcnode-id="1024" style="font-weight: 400;"><span data-dcnode-id="1025" instrument_node="">JLo</span></span></a><span data-dcnode-id="1021" style="font-weight: 400;"><span data-dcnode-id="1022" instrument_node="">, </span></span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DF2SXmzk8ve4"><span data-dcnode-id="1019" style="font-weight: 400;"><span data-dcnode-id="1020" instrument_node="">Gwen Stefani </span></span></a><span data-dcnode-id="1016" style="font-weight: 400;"><span data-dcnode-id="1017" instrument_node="">(pictured above), </span></span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DztWFp63QPj4"><span data-dcnode-id="1014" style="font-weight: 400;"><span data-dcnode-id="1015" instrument_node="">Justin Bieber </span></span></a><span data-dcnode-id="1011" style="font-weight: 400;"><span data-dcnode-id="1012" instrument_node="">and </span></span><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DX5Cfi7U4eL4"><span data-dcnode-id="1009" style="font-weight: 400;"><span data-dcnode-id="1010" instrument_node="">Lady Gaga</span></span></a><span data-dcnode-id="1006" style="font-weight: 400;"><span data-dcnode-id="1007" instrument_node="">. He’s real – and able to go from zero to sixty – from</span></span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DvXrA7pCmgIk"><span data-dcnode-id="1005" instrument_node=""> </span><span data-dcnode-id="1003" style="font-weight: 400;"><span data-dcnode-id="1004" instrument_node="">tragic empathy</span></span></a><span data-dcnode-id="1000" style="font-weight: 400;"><span data-dcnode-id="1001" instrument_node=""> and compassion to enthusiasm. He belts out the hits – and we all want to sing along.</span></span></p><span data-dcnode-id="998" instrument_node="">
</span><blockquote data-dcnode-id="987"><p data-dcnode-id="991"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">So What:</span></strong><span data-dcnode-id="995" instrument_node=""> In our communication coaching and consulting, we often encourage executives to add </span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/lighten-up/"><span data-dcnode-id="994" instrument_node="">lightness.</span></a><span data-dcnode-id="992" instrument_node=""> You don’t have to be serious to be taken seriously. Your audience will connect with your lightness.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">&nbsp;</span></p></blockquote><span data-dcnode-id="986" instrument_node="">
</span><p align="Left" data-dcnode-id="984"><img alt="melania_top10moments-2016" class="alignnone size-full wp-image-14031" data-dcnode-id="985" height="248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/Melania_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="980"><b data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">6. No Flattery in Plagiarism: Melania Trump’s RNC Speech, July 18, 2016 </span></b></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="977" style="font-weight: 400;"><span data-dcnode-id="978" instrument_node="">When Melania Trump spoke to the country during her </span></span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJt_9yb4FSYA%23t%3D1m57s"><span data-dcnode-id="975" style="font-weight: 400;"><span data-dcnode-id="976" instrument_node="">Republican National Convention speech</span></span></a><span data-dcnode-id="972" style="font-weight: 400;"><span data-dcnode-id="973" instrument_node="">, it was a moment that shattered the standards of original content and left us all shaking our heads. Content aside (and no - we do not condone plagiarism), her scripted speech still tanked. Just look at the </span></span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DRcbiGsDMmCM"><span data-dcnode-id="970" style="font-weight: 400;"><span data-dcnode-id="971" instrument_node="">side-by-side</span></span></a><span data-dcnode-id="967" style="font-weight: 400;"><span data-dcnode-id="968" instrument_node=""> difference between her delivery and that of Michelle Obama, who delivered many of the same words four years prior. What does the billionaire's wife bring to the communication experience? Cold and distant might work well in the modeling world, but it doesn’t work well in communications or in efforts to influence. Melania Trump comes across with a serious face, squinty eyes and a skeptical look that doesn’t evoke enough warmth. Plus, we notice her hesitant lack of familiarity with her content – this all makes her seem overly rigid and inauthentic. Sure, she was using a teleprompter, but so was Ivanka Trump, who </span></span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//video.foxnews.com/v/5045837333001/full-speech-ivanka-trump-addresses-the-2016-rnc/%23sp%3Dshow-clips"><span data-dcnode-id="965" style="font-weight: 400;"><span data-dcnode-id="966" instrument_node="">spoke on the same stage</span></span></a><span data-dcnode-id="962" style="font-weight: 400;"><span data-dcnode-id="963" instrument_node=""> with the same teleprompter with much success. Now that she’s the first lady-elect, Melania Trump will need to step it up. </span></span></p><span data-dcnode-id="960" instrument_node="">
</span><blockquote data-dcnode-id="946"><p data-dcnode-id="950"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">So What:</span></strong><span data-dcnode-id="957" instrument_node=""> Emotional connection is created from both content and behaviors. </span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/establishing-executive-presence/"><span data-dcnode-id="956" instrument_node="">Executives</span></a><span data-dcnode-id="954" instrument_node=""> we coach constantly seek to strike the balance between warmth and competence. Competence usually wins, making them appear more rigid vs. connecting. However, research shows that </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2013/07/connect-then-lead"><span data-dcnode-id="953" instrument_node="">warmth is the conduit of influence</span></a><span data-dcnode-id="951" instrument_node="">.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">&nbsp;</span></p></blockquote><span data-dcnode-id="945" instrument_node="">
</span><p align="Left" data-dcnode-id="943"><img alt="lochte_top10moments-2016" class="alignnone size-full wp-image-14030" data-dcnode-id="944" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/Lochte_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="939"><b data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">7. Spurring an International Incident: Ryan Lochte’s Allegations, August 15, 2016 </span></b></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="936" style="font-weight: 400;"><span data-dcnode-id="937" instrument_node="">The mark of Olympians is that they are the best, and they are proud to represent their country. The feeling wasn’t mutual between the United States and Ryan Lochte. He embarrassed fellow Olympians – and our country. We have great expectations for our Olympic athletes - not only in their performance in their sport, but even more importantly in how they represent us. Even before knowing the content is a fib </span></span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D8qyDZQh1UR4"><span data-dcnode-id="934" style="font-weight: 400;"><span data-dcnode-id="935" instrument_node="">his description of the robbery</span></span></a><span data-dcnode-id="931" style="font-weight: 400;"><span data-dcnode-id="932" instrument_node=""> lacks any drama; his details lack support, and his voice is lazy with lots of upspeak. Again, it wasn’t the international incident he caused that landed Ryan Lochte on this list. Sure, his inconsistent and blatant lies were a recipe for Olympic disaster (and the </span></span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/early-lead/wp/2016/08/22/speedo-drops-ryan-lochte-after-rio-olympics-incident/%3Futm_term%3D.cf00420249d9"><span data-dcnode-id="929" style="font-weight: 400;"><span data-dcnode-id="930" instrument_node="">loss of many sponsorship dollars</span></span></a><span data-dcnode-id="926" style="font-weight: 400;"><span data-dcnode-id="927" instrument_node=""> for him). His dismissive communication behaviors earned all of the fallout.</span></span></p><span data-dcnode-id="924" instrument_node="">
</span><blockquote data-dcnode-id="910"><p data-dcnode-id="914"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">So What:</span></strong><span data-dcnode-id="921" instrument_node=""> When you believe something, </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/your-mission-needs-passion/"><span data-dcnode-id="920" instrument_node="">speak with passion</span></a><span data-dcnode-id="918" instrument_node=""> and conviction that are expressed through your </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/crisis-communication-power-voice/"><span data-dcnode-id="917" instrument_node="">vocal variety</span></a><span data-dcnode-id="915" instrument_node="">. It makes a difference as to whether people will believe you and follow you. And telling the truth doesn’t hurt, either.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">&nbsp;</span></p></blockquote><span data-dcnode-id="909" instrument_node="">
</span><p align="Left" data-dcnode-id="907"><img alt="miranda_top10moments-2016" class="alignnone size-full wp-image-14032" data-dcnode-id="908" height="244" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/Miranda_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="903"><b data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">8. The Power of Hamilton: Lin Manuel Miranda’s Tony Awards Acceptance Speech, June 12, 2016 </span></b></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="900" style="font-weight: 400;"><span data-dcnode-id="901" instrument_node="">Creator of Tony Award-winning musicals </span></span><i data-dcnode-id="897"><span data-dcnode-id="898" style="font-weight: 400;"><span data-dcnode-id="899" instrument_node="">In the Heights </span></span></i><span data-dcnode-id="895" style="font-weight: 400;"><span data-dcnode-id="896" instrument_node="">and</span></span><i data-dcnode-id="892"><span data-dcnode-id="893" style="font-weight: 400;"><span data-dcnode-id="894" instrument_node=""> Hamilton, </span></span></i><span data-dcnode-id="890" style="font-weight: 400;"><span data-dcnode-id="891" instrument_node="">Lin Manuel Miranda consistently leaves audiences with a renewed sense of the fact that THEY are part of a bigger story. Even in his </span></span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D6jehrbUGdlE%26t%3D108s"><span data-dcnode-id="888" style="font-weight: 400;"><span data-dcnode-id="889" instrument_node="">Tony Award acceptance speech</span></span></a><span data-dcnode-id="885" style="font-weight: 400;"><span data-dcnode-id="886" instrument_node="">, he used his time in the spotlight to creatively shed light and influence on issues outside of himself – without standing on a soap box. That is communicating to inspire. And the moment stood out because he did it differently than the status quo. Even though it was pre-scripted, he used creativity of verse – a Hamilton approach to the everyday. With an energetic and open expression, his animated passion drew us in right away. And his story, told as a sonnet, about his love for his wife and for humanity resonated so deeply because of his emotion and conviction. No wonder Lin Manuel Miranda took the country by storm.</span></span></p><span data-dcnode-id="883" instrument_node="">
</span><blockquote data-dcnode-id="872"><p data-dcnode-id="876"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">So What:</span></strong><span data-dcnode-id="880" instrument_node=""> At the highest stakes, it’s easy to fall into the trap of </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/the-5-white-lies-about-communication/"><span data-dcnode-id="879" instrument_node="">doing things the way they’ve always been done</span></a><span data-dcnode-id="877" instrument_node="">. Don’t be afraid to take a risk. Be creative and different with your approach, and you will notice a profound impact. The higher the stakes, the more important it is.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">&nbsp;</span></p></blockquote><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><a data-dcnode-id="870" name="sheryl-sandberg"></a></p><span data-dcnode-id="868" instrument_node="">
</span><p align="Left" data-dcnode-id="866"><img alt="sandberg_top10moments-2016" class="alignnone size-full wp-image-14034" data-dcnode-id="867" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/Sandberg_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="858"><b data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">9. Leaning Into Vulnerability: Sheryl Sandberg’s University of California</span></b><span data-dcnode-id="861" style="font-weight: 400;"><span data-dcnode-id="862" instrument_node=""> – </span></span><b data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Berkeley Commencement Speech, May 14, 2016</span></b></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="855" style="font-weight: 400;"><span data-dcnode-id="856" instrument_node="">Everyone handles tough challenges differently, and those who do it best (and publically) expand their messages to be bigger than themselves. An extraordinary example of a message like this was when Sheryl Sandberg, COO of Facebook, stepped up to the podium to deliver her </span></span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Diqm-XEqpayc"><span data-dcnode-id="853" style="font-weight: 400;"><span data-dcnode-id="854" instrument_node="">Commencement Speech at University of California - Berkeley</span></span></a><span data-dcnode-id="850" style="font-weight: 400;"><span data-dcnode-id="851" instrument_node="">. What makes this one of the top moments of the year? The way she vulnerably connects to the audience by revealing intimately personal, specific details about her deep reservoir of sadness and the brutality of loss. Yet, it’s not a sad speech. She gets choked up and vulnerable, and then she quickly brings the tone back to lightness. Sheryl Sandberg uses extremely high emotional connection throughout the speech, bouncing between entertaining, college-specific references of revelry (referencing man buns, dating apps and pizza spots), and inspiring her audience to find gratitude and joy in the hard days while she chokes back tears. Sheryl Sandberg squarely lands at the top of the Inspire quadrant of our </span></span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2015/05/how-to-get-employees-excited-to-do-their-work"><span data-dcnode-id="848" style="font-weight: 400;"><span data-dcnode-id="849" instrument_node="">Communicator’s Roadmap</span></span></a><span data-dcnode-id="845" style="font-weight: 400;"><span data-dcnode-id="846" instrument_node="">. She even concludes her </span></span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/commencement-speech-rock/"><span data-dcnode-id="843" style="font-weight: 400;"><span data-dcnode-id="844" instrument_node="">commencement speech</span></span></a><span data-dcnode-id="840" style="font-weight: 400;"><span data-dcnode-id="841" instrument_node=""> with specific action steps and personal benefits that are targeted directly at her audience. No doubt, if they were listening, she motivated her audience to </span></span><i data-dcnode-id="837"><span data-dcnode-id="838" style="font-weight: 400;"><span data-dcnode-id="839" instrument_node="">want to </span></span></i><span data-dcnode-id="835" style="font-weight: 400;"><span data-dcnode-id="836" instrument_node="">build resilience, speak up, find joy and be bigger than themselves, too.</span></span></p><span data-dcnode-id="833" instrument_node="">
</span><blockquote data-dcnode-id="819"><p data-dcnode-id="823"><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">So What:</span></strong><span data-dcnode-id="830" instrument_node=""> It’s amazing how many leaders and executives guard their personal experiences (wondering, “Who are they to know this about me?”). The more </span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/deal-details/"><span data-dcnode-id="829" instrument_node="">details we share</span></a><span data-dcnode-id="827" instrument_node=""> and the more we show </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/vulnerability-make-it-personal/"><span data-dcnode-id="826" instrument_node="">vulnerability</span></a><span data-dcnode-id="824" instrument_node="">, the more ability we will have to connect, influence and inspire.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">&nbsp;</span></p></blockquote><span data-dcnode-id="818" instrument_node="">
</span><p align="Left" data-dcnode-id="816"><img alt="kaepernick_top10moments-2016" class="alignnone size-full wp-image-14029" data-dcnode-id="817" height="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149734907.v2.pressablecdn.com/wp-content/uploads/2016/12/Kaepernick_Top10Moments-2016.jpg&amp;raw" width="652"></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="812"><b data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">10. The Knee Drop Heard ‘Round the World: Colin Kaepernick’s Interview, August 28, 2016</span></b></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="809" style="font-weight: 400;"><span data-dcnode-id="810" instrument_node="">Are you going to make a point or make a difference? We all have an opportunity and a choice. Colin Kaepernick made a point, but he missed the opportunity to make a difference. He was not prepared to articulate his Point of View, and he missed a massive opportunity to speak with passion and purpose. Of course people would want to know what he was doing! It’s a lesson about what happens in any miscommunication – you mean one thing, and the audience absorbs another. While he’s saying all the right things, his behaviors are defensive&nbsp;</span></span><span data-dcnode-id="808" instrument_node="">and sketchy.</span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abcnews.go.com/GMA/video/nfl-star-colin-kaepernick-speaks-national-anthem-backlash-41713121"><span data-dcnode-id="807" instrument_node=""> Here</span></a><span data-dcnode-id="805" instrument_node=""> (starting at 0:42), he won’t look the interviewer in the eye, his eyes dart all over the place, and he struggles to clarify his point. He’d be more consistent as a communicator if his behavioral skills were stronger. His intentions are good, but the moment didn’t go over as well as he hoped (costing him sponsorships and fans, too).</span></p><span data-dcnode-id="803" instrument_node="">
</span><blockquote data-dcnode-id="795"><p data-dcnode-id="796"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">So What:</span></strong><span data-dcnode-id="800" instrument_node=""> Have a focused </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decker.com/blog/influence-point-of-view/"><span data-dcnode-id="799" instrument_node="">Point of View</span></a><span data-dcnode-id="797" instrument_node=""> about what your audience can do with your message. If you want to make a difference instead of make a point, make sure you have call to action instead of a chance to vent or identify a problem.</span></p></blockquote><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" style="font-weight: 400;"><span data-dcnode-id="793" instrument_node="">What did we miss? Was there another moment that grabbed you in 2016? Was there something else you noticed? Tell us in the comments!</span></span></p><span data-dcnode-id="790" instrument_node="">
</span></div><span data-dcnode-id="788" instrument_node="">
</span></div><span data-dcnode-id="786" instrument_node="">
</span></div><span data-dcnode-id="784" instrument_node="">
</span></div><span data-dcnode-id="782" instrument_node="">
</span></div><span data-dcnode-id="780" instrument_node="">
</span></div><span data-dcnode-id="778" instrument_node="">

</span><div class="comment-content" data-dcnode-id="728"><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="741" instrument_node="">Hello Decker Team,</span><br data-dcnode-id="740"><span data-dcnode-id="739" instrument_node="">
One of the speaking highlights of the year was the eulogy that Billy Crystal gave for the great Muhammad Ali. If you missed it, watch it HERE:</span><br data-dcnode-id="738"><span data-dcnode-id="737" instrument_node="">
</span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foxsports.com/boxing/story/muhammad-ali-funeral-billy-crystal-eulogy-speech-watch-061016" rel="nofollow ugc"><span data-dcnode-id="736" instrument_node="">https://www.foxsports.com/boxing/story/muhammad-ali-funeral-billy-crystal-eulogy-speech-watch-061016</span></a><br data-dcnode-id="734"><span data-dcnode-id="733" instrument_node="">
