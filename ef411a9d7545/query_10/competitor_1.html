</span><li class="import-p" data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">The guy was looking on a website for cars, when a rich coworker asks, “why don’t you just buy the car with cash so you don’t have to make payments?” When the guy told his coworker he couldn’t afford to pay for a car in cash, his rich coworker replied, “Why don’t you just have your parents buy it for you?”</span></li><span data-dcnode-id="3324" instrument_node="">
</span><li class="import-p" data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">“If you’re making $50,000 and your salary gets down to $40,000 and you have to cut, it’s very severe to you. But it’s no less severe to these other people with these big numbers.”</span></li><span data-dcnode-id="3321" instrument_node="">
</span><li class="import-p" data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">“People who don’t have money don’t understand the stress. Could you imagine what it’s like to say I got three kids in private school, I have to think about pulling them out? How do you do that?”</span></li><span data-dcnode-id="3318" instrument_node="">
</span><li class="import-p" data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">“You don’t get the vote if you don’t pay a dollar in taxes. But what I really think is it should be like a corporation. You pay a million dollars, you get a million votes. How’s that?”</span></li><span data-dcnode-id="3315" instrument_node="">
</span></ul><span data-dcnode-id="3313" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">The perspectives illustrated in these statements are ones that most of us cannot easily relate to. The opposite is also true. People who live in the top 1% often have very flawed perceptions of what life is like for those who don’t have piles of money sitting around. Often those in the dominant group (in this case the top 1%) have no conceptualization of what life is like for those in muted groups (the bottom 99%). As such, those in muted groups often have a much clearer perception of reality.</span></p><span data-dcnode-id="3310" instrument_node="">
</span><p class="import-p" data-dcnode-id="3304"><span data-dcnode-id="3309" instrument_node="">Some research in this theory has been done on other subverted groups such as new kids at school.</span><sup class="import-EndnoteReference" data-dcnode-id="3306"><a data-dcnode-id="3307" href="#sdfootnote22sym" id="sdfootnote22anc"><span data-dcnode-id="3308" instrument_node="">22</span></a></sup><span data-dcnode-id="3305" instrument_node=""> They found that it was normative patterns that created a system of subversion in the classroom. When a new student arrived, they inadvertently went against the popular normative habits of the class and, in doing so, ostracized themselves. Other students simultaneously asserted and solidified their dominance while lowering the status of the new student. This same thing can be seen in our male-dominated society. As women seek to make themselves known and heard, they are continually reduced, and male-centric standards are reinforced.</span></p><span data-dcnode-id="3303" instrument_node="">
</span><h3 class="import-CurrentResearchHeading" data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">Research Spotlight</span></h3><span data-dcnode-id="3300" instrument_node="">
</span><p class="import-CurrentResearchText" data-dcnode-id="3297"><img alt="image" class="alignleft" data-dcnode-id="3299" height="144.32px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/app/uploads/sites/246/2021/05/image7-3.jpeg&amp;raw" width="128px"><span data-dcnode-id="3298" instrument_node="">Heather Kissack (2010) focused on the subversion and muting of women in email communication within businesses. She found that women are consistently marginalized and muted in organizational emails in the workplace. This is surprising because it would seem that without the nonverbal cues of face-to-face communication, there would be less muting of women in computer-mediated communication. Unfortunately, in this study, one can see that it is the male-centric verbiage that has created this divide in social and organization status. Even as women attempted to un-mute themselves, they were increasingly muted and subverted.</span></p><span data-dcnode-id="3296" instrument_node="">
</span><p class="import-CurrentResearchText hanging-indent" data-dcnode-id="3286"><span data-dcnode-id="3295" instrument_node="">Kissack, H. (2010). Muted voices: a critical look at e-male in organizations. </span><em data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">Journal of </span></em><em data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">European Industrial Training, 34</span></em><span data-dcnode-id="3290" instrument_node="">(6), 539-551. </span><a class="rId15" data-dcnode-id="3287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/4/blank"><span class="import-Hyperlink" data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">https://doi.org/10.1108/03090591011061211</span></span></a></p><span data-dcnode-id="3285" instrument_node="">
</span><div class="textbox textbox--key-takeaways" data-dcnode-id="3262"><span data-dcnode-id="3284" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3279"><span data-dcnode-id="3283" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">Key Takeaways</span></p><span data-dcnode-id="3280" instrument_node="">
</span></header><span data-dcnode-id="3278" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3264"><span data-dcnode-id="3277" instrument_node="">
</span><ul data-dcnode-id="3266"><span data-dcnode-id="3276" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">Names can impact how we perceive others. It can also impact how we feel about ourselves.</span></li><span data-dcnode-id="3273" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">We can increase affiliation with others through converging our language to others. We can decrease affiliation with others through diverging our language with others.</span></li><span data-dcnode-id="3270" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Sexism and racism can be displayed through our language choices. It is important to be aware of the words we use so that we do not come across as sexist or racist.</span></li><span data-dcnode-id="3267" instrument_node="">
</span></ul><span data-dcnode-id="3265" instrument_node="">
</span></div><span data-dcnode-id="3263" instrument_node="">
</span></div><span data-dcnode-id="3261" instrument_node="">
</span><div class="textbox textbox--exercises" data-dcnode-id="3238"><span data-dcnode-id="3260" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3255"><span data-dcnode-id="3259" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">Exercises</span></p><span data-dcnode-id="3256" instrument_node="">
</span></header><span data-dcnode-id="3254" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3240"><span data-dcnode-id="3253" instrument_node="">
</span><ul data-dcnode-id="3242"><span data-dcnode-id="3252" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">Create a list of names that you have heard that are unique. What makes these names so unique and memorable? Ask friends to give you their perceptions of those names. Does that match with what you think? Why or why not?</span></li><span data-dcnode-id="3249" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Engage in a normal conversation with a friend or family member. Without having them know what you are doing, slowly and subtly converge your communication style to theirs. Record your observations. Then, with the same person, try to diverge your communication style. Re-record your observations. Ask if the person noticed any communication changes. How did it make them feel? How did you feel? Why?</span></li><span data-dcnode-id="3246" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Make a list of all the words in the English language that are sexist or racists. Try to research those words on the Internet and determine how these words are sexists or racists. Then, provide alternatives for these words to be more politically correct.</span></li><span data-dcnode-id="3243" instrument_node="">
</span></ul><span data-dcnode-id="3241" instrument_node="">
</span></div><span data-dcnode-id="3239" instrument_node="">
</span></div><span data-dcnode-id="3237" instrument_node="">
</span><h2 class="import-ah" data-dcnode-id="3234"><a data-dcnode-id="3236" id="_Toc45779746"></a><span data-dcnode-id="3235" instrument_node="">4.4 Types of Language</span></h2><span data-dcnode-id="3233" instrument_node="">
</span><div class="textbox textbox--learning-objectives" data-dcnode-id="3210"><span data-dcnode-id="3232" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3227"><span data-dcnode-id="3231" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Learning Objectives</span></p><span data-dcnode-id="3228" instrument_node="">
</span></header><span data-dcnode-id="3226" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3212"><span data-dcnode-id="3225" instrument_node="">
</span><ol data-dcnode-id="3214"><span data-dcnode-id="3224" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Differentiate between informal and formal language.</span></li><span data-dcnode-id="3221" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">Determine the different types of informal language.</span></li><span data-dcnode-id="3218" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">Understand improper language and biased language.</span></li><span data-dcnode-id="3215" instrument_node="">
</span></ol><span data-dcnode-id="3213" instrument_node="">
</span></div><span data-dcnode-id="3211" instrument_node="">
</span></div><span data-dcnode-id="3209" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">If you read or watch different types of programming, you will probably notice that there is a difference in language use based on the environment, who you are talking to, and the reason for communicating. In this section, we will discuss the different types of language. The types of language used will impact how others view you and if they will view you positively or negatively.</span></p><span data-dcnode-id="3206" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3203"><a data-dcnode-id="3205" id="_Toc45779747"></a><span data-dcnode-id="3204" instrument_node="">Formal vs. Informal Language</span></h3><span data-dcnode-id="3202" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">You probably know by now that how we communicate in different contexts can vary greatly. For example, how you compose a text to your best friend is going to use different grammatical structures and words than when you compose an email to your professor. One of the main reasons for this difference is because of formal and informal language. Table 4.1 provides a general overview of the major differences between formal and informal language.</span></p><span data-dcnode-id="3199" instrument_node="">

</span><table class="grid" data-dcnode-id="3018"><thead data-dcnode-id="3185"><tr data-dcnode-id="3187"><th data-dcnode-id="3193" scope="col"><strong data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">Formal Language</span></strong></th><th data-dcnode-id="3189" scope="col"><strong data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Informal Language</span></strong></th></tr></thead><tbody data-dcnode-id="3020"><tr class="TableGrid-R" data-dcnode-id="3175"><td data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">Used in carefully edited communication.</span></td><td data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Used in impromptu, conversational communication.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3166"><td data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Used in academic or official content.</span></td><td data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Used in everyday communication.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3157"><td data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">The sentence structure is long and complicated.</span></td><td data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">The sentence structure is short, choppy, and improvised.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3148"><td data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">The emphasis is on grammatical correctness.</span></td><td data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">The emphasis is on easily understood messages using everyday phrases.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3139"><td data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Uses the passive voice.</span></td><td data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">Uses the active voice.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3121"><td data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Often communicated from a detached, third person perspective.</span></td><td data-dcnode-id="3123"><span data-dcnode-id="3133" instrument_node="">Perspective is less of a problem (1</span><sup data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">st</span></sup><span data-dcnode-id="3130" instrument_node="">, 2</span><sup data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">nd</span></sup><span data-dcnode-id="3127" instrument_node=""> or 3</span><sup data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">rd</span></sup><span data-dcnode-id="3124" instrument_node="">).</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3112"><td data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Speakers/writers avoid the use of contractions.</span></td><td data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Speakers/writers can actively include contractions.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3103"><td data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Avoid the inclusion of emotionally laden ideas and words.</span></td><td data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">It allows for the inclusion of emotions and empathy.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3094"><td data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Language should be objective.</span></td><td data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Language can be subjective.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3085"><td data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Language should avoid the use of colloquialisms.</span></td><td data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">It’s perfectly appropriate to use colloquialisms.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3076"><td data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Only use an acronym after it has clearly been spelled out once.</span></td><td data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">People use acronyms without always clearly spelling out what it means.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3067"><td data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">All sentences should be complete (clear subjects and verbs).</span></td><td data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Sentences may be incomplete (lacking a clear subject and/or verb).</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3058"><td data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">The use of pronouns should be avoided.</span></td><td data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">The use of personal pronouns is common.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3049"><td data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Avoids artistic languages as much as possible.</span></td><td data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Includes a range of artistic language choices (e.g., alliteration, anaphora, hyperbole, onomatopoeia, etc.).</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3040"><td data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">Arguments are supported by facts and documented research.</span></td><td data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Arguments are supported by personal beliefs and opinions.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3031"><td data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Language is gender neutral.</span></td><td data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Language includes gender references.</span></td></tr><tr class="TableGrid-R" data-dcnode-id="3022"><td data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Avoids the imperative voice.</span></td><td data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">Uses the imperative voice.</span></td></tr></tbody></table><span data-dcnode-id="3017" instrument_node="">
</span><p class="import-FigureName" data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Table 4.1 Formal vs. Informal Language</span></p><span data-dcnode-id="3014" instrument_node="">
</span><h4 class="import-ch" data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Formal Language</span></h4><span data-dcnode-id="3011" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3003"><span data-dcnode-id="3010" instrument_node="">When applying for a job, you will most likely use formal language in your cover letter and resume. </span><span class="import-keyterm" data-dcnode-id="3007"><button aria-describedby="80-612" class="glossary-term" data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Formal language</span></button></span><span data-dcnode-id="3006" instrument_node=""> is</span><a data-dcnode-id="3005" id="_Hlk35154746"></a><span data-dcnode-id="3004" instrument_node=""> official and academic language. You want to appear intelligent and capable, so formal language helps you accomplish those goals. Formal language often occurs when we write. Formal language uses full sentences and is grammatically correct. Formal language is more objective and more complex. Most legal agreements are written in formal language.</span></p><span data-dcnode-id="3002" instrument_node="">
</span><h4 class="import-ch" data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Informal Language</span></h4><span data-dcnode-id="2999" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="2991"><span class="import-keyterm" data-dcnode-id="2995"><button aria-describedby="80-662" class="glossary-term" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Informal language</span></button><span data-dcnode-id="2996" instrument_node=""> </span></span><span data-dcnode-id="2994" instrument_node="">is </span><a data-dcnode-id="2993" id="_Hlk35154760"></a><span data-dcnode-id="2992" instrument_node="">common, everyday language, which might include slang words. It is continuous and casual. We use informal language when we talk to other people. It is more simple. Informal language tends to use more contractions and abbreviations. If you look at your text messages, you will probably see several examples of informal language.</span></p><span data-dcnode-id="2990" instrument_node="">
</span><h5 class="import-dh" data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Jargon</span></h5><span data-dcnode-id="2987" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="2975"><span class="import-keyterm" data-dcnode-id="2984"><button aria-describedby="80-716" class="glossary-term" data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">Jargon</span></button></span><span data-dcnode-id="2983" instrument_node=""> is the specialized or technical language of a specific group or profession that may not be understood by outsiders.</span><sup class="import-EndnoteReference" data-dcnode-id="2980"><a data-dcnode-id="2981" href="#sdfootnote23sym" id="sdfootnote23anc"><span data-dcnode-id="2982" instrument_node="">23</span></a></sup><span data-dcnode-id="2979" instrument_node=""> If you are really into cars or computers, you probably know a lot about the different parts and functions. Jargon is normally used in a specific context and may be understood outside that context. Jargon consists of a specific vocabulary that uses words that only certain people understand. The business world is full of jargon. Joanna Cutrara created a list of 14 commonly heard jargon phrases used in the business world:</span><sup class="import-EndnoteReference" data-dcnode-id="2976"><a data-dcnode-id="2977" href="#sdfootnote24sym" id="sdfootnote24anc"><span data-dcnode-id="2978" instrument_node="">24</span></a></sup></p><span data-dcnode-id="2974" instrument_node="">
</span><ul data-dcnode-id="2933"><span data-dcnode-id="2973" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">Low Hanging Fruit</span></li><span data-dcnode-id="2970" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">Leverage</span></li><span data-dcnode-id="2967" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Open the Kimono</span></li><span data-dcnode-id="2964" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Giving 110%</span></li><span data-dcnode-id="2961" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Out of Pocket</span></li><span data-dcnode-id="2958" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">Drink the Kool-Aid</span></li><span data-dcnode-id="2955" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Bio Break</span></li><span data-dcnode-id="2952" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">Blue Sky Training</span></li><span data-dcnode-id="2949" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Tiger Team</span></li><span data-dcnode-id="2946" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Idea Shower or Thought Shower</span></li><span data-dcnode-id="2943" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">Moving the Goal Post</span></li><span data-dcnode-id="2940" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Drill Down</span></li><span data-dcnode-id="2937" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Gain Traction</span></li><span data-dcnode-id="2934" instrument_node="">
</span></ul><span data-dcnode-id="2932" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">If you’re like us, chances are you’ve heard a few of these jargon phrases in your workplace. Heck, you may have even found yourself using a few of them. Your workplace may even have some specific jargon only used in your organization. Take a minute and think through all of the jargon you hear on an average day.</span></p><span data-dcnode-id="2929" instrument_node="">
</span><h5 class="import-dh" data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Colloquialisms</span></h5><span data-dcnode-id="2926" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="2917"><span class="import-keyterm" data-dcnode-id="2923"><button aria-describedby="80-447" class="glossary-term" data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">Colloquialisms</span></button></span><span data-dcnode-id="2922" instrument_node=""> are the use of informal words in communication.</span><sup class="import-EndnoteReference" data-dcnode-id="2919"><a data-dcnode-id="2920" href="#sdfootnote25sym" id="sdfootnote25anc"><span data-dcnode-id="2921" instrument_node="">25</span></a></sup><span data-dcnode-id="2918" instrument_node=""> Colloquialism varies from region to region. Examples might be “wanna” instead of “want to” or “gonna” instead of “going to.” It shows us how a society uses language in their everyday lives. Here’s a short list of some common colloquialisms you may have used yourself:</span></p><span data-dcnode-id="2916" instrument_node="">
</span><ul data-dcnode-id="2863"><span data-dcnode-id="2915" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">Bamboozle – to deceive</span></li><span data-dcnode-id="2912" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Be blue – to be sad</span></li><span data-dcnode-id="2909" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Beat around the bush – to avoid a specific topic</span></li><span data-dcnode-id="2906" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">Buzz off – go away</span></li><span data-dcnode-id="2903" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Fell through the cracks – to be neglected</span></li><span data-dcnode-id="2900" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">Go bananas, or go nuts – go insane or be very angry</span></li><span data-dcnode-id="2897" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Gobsmacked – shocked</span></li><span data-dcnode-id="2894" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Gonna – going to</span></li><span data-dcnode-id="2891" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Hit a writer’s block – unable to write</span></li><span data-dcnode-id="2888" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">Hit the hay – to go to sleep</span></li><span data-dcnode-id="2885" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Pop into my head – to have a new thought</span></li><span data-dcnode-id="2882" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Sticktoitiveness – to be persistent</span></li><span data-dcnode-id="2879" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Threw me for a loop – to be surprised</span></li><span data-dcnode-id="2876" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Throw someone under the bus – to throw the blame on another person</span></li><span data-dcnode-id="2873" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Wanna – want to</span></li><span data-dcnode-id="2870" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Y’all – you all</span></li><span data-dcnode-id="2867" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Yinz – you all</span></li><span data-dcnode-id="2864" instrument_node="">
</span></ul><span data-dcnode-id="2862" instrument_node="">
</span><h5 class="import-dh" data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">Slang</span></h5><span data-dcnode-id="2859" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="2849"><span class="import-keyterm" data-dcnode-id="2855"><button aria-describedby="80-954" class="glossary-term" data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Slang</span></button><span data-dcnode-id="2856" instrument_node=""> </span></span><span data-dcnode-id="2854" instrument_node="">refers to words that are employed by certain groups, such as young adults and teens.</span><sup class="import-EndnoteReference" data-dcnode-id="2851"><a data-dcnode-id="2852" href="#sdfootnote26sym" id="sdfootnote26anc"><span data-dcnode-id="2853" instrument_node="">26</span></a></sup><span data-dcnode-id="2850" instrument_node=""> Slang is more common when speaking to others rather than written. Slang is often used with people who are similar and have experience with each other. Here is a list of some common slang terms you may use in your day-to-day life:</span></p><span data-dcnode-id="2848" instrument_node="">
</span><ul data-dcnode-id="2810"><span data-dcnode-id="2847" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">BAE (baby / before all else)</span></li><span data-dcnode-id="2844" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">On Fleek (looking perfect)</span></li><span data-dcnode-id="2841" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Bye Felica (saying goodbye to someone you don’t like)</span></li><span data-dcnode-id="2838" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">The Tea (gossip)</span></li><span data-dcnode-id="2835" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Bro (typically a male friend)</span></li><span data-dcnode-id="2832" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Cash (money)</span></li><span data-dcnode-id="2829" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Cheesy (cheap or tacky)</span></li><span data-dcnode-id="2826" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Ship (wanting people to be in a relationship, whether real or fictional)</span></li><span data-dcnode-id="2823" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Frenemy (someone who is both a friend and an enemy)</span></li><span data-dcnode-id="2820" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">Thirsty (being overly eager or desperate)</span></li><span data-dcnode-id="2817" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Throw Shade (to insult another person)</span></li><span data-dcnode-id="2814" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Woke (being acutely aware of social injustice within society)</span></li><span data-dcnode-id="2811" instrument_node="">
</span></ul><span data-dcnode-id="2809" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">How many of these slang words do you use? What other slang words do you find yourself using? When it comes to slang, it’s important to understand that this list is constantly evolving. What is common slang today could be completely passé tomorrow. What’s common slang in the United States is not universal in English speaking countries.</span></p><span data-dcnode-id="2806" instrument_node="">
</span><h5 class="import-dh" data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Idioms</span></h5><span data-dcnode-id="2803" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="2793"><span class="import-keyterm" data-dcnode-id="2799"><button aria-describedby="80-638" class="glossary-term" data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Idioms</span></button><span data-dcnode-id="2800" instrument_node=""> </span></span><span data-dcnode-id="2798" instrument_node="">are expressions or figures of speech whose meaning cannot be understood by looking at the individual words and interpreting them literally.</span><sup class="import-EndnoteReference" data-dcnode-id="2795"><a data-dcnode-id="2796" href="#sdfootnote27sym" id="sdfootnote27anc"><span data-dcnode-id="2797" instrument_node="">27</span></a></sup><span data-dcnode-id="2794" instrument_node=""> Idioms can help amplify messages. Idioms can be used to provide artistic expression. For instance, “knowledge is power!”</span></p><span data-dcnode-id="2792" instrument_node="">
</span><p class="import-p" data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Idioms can be hard to grasp for non-native speakers. As such, many instructors in the English as a Second Language world spend a good deal of time trying to explain idioms to non-native speakers. Table 4.2 presents a wide array of different idioms.</span></p><span data-dcnode-id="2789" instrument_node="">

thrown off the basketball team.</span></td></tr><tr data-dcnode-id="2732"><td data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">a breath of fresh air</span></td><td data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Refreshing/fun. She’s a breath of fresh air.</span></td></tr><tr data-dcnode-id="2723"><td data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">a change of heart</span></td><td data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Change my mind. I’ve had a change of heart.</span></td></tr><tr data-dcnode-id="2714"><td data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">a blessing in disguise</span></td><td data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Something bad that turns out good. Losing his job turned out to be a blessing in disguise.</span></td></tr><tr data-dcnode-id="2705"><td data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">a dead end</span></td><td data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">That’s a dead end job–time to find a new one.</span></td></tr><tr data-dcnode-id="2696"><td data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">a gut feeling</span></td><td data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Feeling in my stomach. I have a gut feeling that everything is going to turn out all right.</span></td></tr><tr data-dcnode-id="2687"><td data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">a matter of opinion</span></td><td data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">It’s a matter of opinion whether eating fried tarantulas is a gourmet treat.</span></td></tr><tr data-dcnode-id="2678"><td data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">a piece of cake</span></td><td data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">That test was a snap–it was a piece of cake. (easy).</span></td></tr><tr data-dcnode-id="2669"><td data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">a ripoff</span></td><td data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">You spent $500 for a watermelon! What a ripoff! You were cheated.</span></td></tr><tr data-dcnode-id="2660"><td data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">a pain in the neck</span></td><td data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">A pest. His little brother is a real pain in the neck.</span></td></tr><tr data-dcnode-id="2651"><td data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">be in hot water</span></td><td data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Be in trouble. If you tell your boss off, you’ll really be in hot water.</span></td></tr><tr data-dcnode-id="2642"><td data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">in the same boat</span></td><td data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">We’re in the same situation. We’re all in the same boat–so be cool.</span></td></tr><tr data-dcnode-id="2633"><td data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">on the same wavelength</span></td><td data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">We have the same ideas and opinions. We’re on the same wavelength.</span></td></tr><tr data-dcnode-id="2624"><td data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">be on the ball</span></td><td data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Very sharp. Very smart. He’s really on the ball.</span></td></tr><tr data-dcnode-id="2615"><td data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">it’s only a matter of time</span></td><td data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Very soon. It’s only a matter of time until his boss realizes that he is the one stealing money from the till.</span></td></tr><tr data-dcnode-id="2606"><td data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">be that as it may</span></td><td data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">As things stand. Be that as it may, I think you should reconsider your decision to move to Antarctica.</span></td></tr><tr data-dcnode-id="2597"><td data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">up in arms</span></td><td data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Really angry. His father was up in arms when he learned that he had crashed his new car.</span></td></tr><tr data-dcnode-id="2588"><td data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">up in the air</span></td><td data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Not sure. Plans are up in the air–we haven’t decided what to do yet.</span></td></tr><tr data-dcnode-id="2579"><td data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">bend over backwards</span></td><td data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Go out of your way. She really bent over backwards to make my stay enjoyable.</span></td></tr><tr data-dcnode-id="2570"><td data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Big deal!</span></td><td data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Not important (sarcastic). Losing an old sock is not a big deal.</span></td></tr><tr data-dcnode-id="2561"><td data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">cost an arm and a leg</span></td><td data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Very expensive. His new Ferrari cost an arm and a leg.</span></td></tr><tr data-dcnode-id="2552"><td data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">cross your fingers</span></td><td data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">For good luck. Cross your fingers that I pass the English exam with flying colors.</span></td></tr><tr data-dcnode-id="2543"><td data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">draw a blank</span></td><td data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">I can’t remember. I drew a blank when I tried to remember his brother’s name.</span></td></tr><tr data-dcnode-id="2534"><td data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Easier said than done</span></td><td data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">More difficult than it seems.</span></td></tr><tr data-dcnode-id="2525"><td data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Am fed up with</span></td><td data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Sick and tired of something. I’m fed up with whining friends who have everything!</span></td></tr><tr data-dcnode-id="2516"><td data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">from scratch</span></td><td data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Make from basic ingredients. Her carrot cake was made from scratch.</span></td></tr><tr data-dcnode-id="2507"><td data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">for the time being</span></td><td data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">For now. For the time being, everything is fine at work.</span></td></tr><tr data-dcnode-id="2498"><td data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">get cold feet</span></td><td data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Feel too scared to do something. John wanted to ask Maria out but he got cold feet and decided not to.</span></td></tr><tr data-dcnode-id="2489"><td data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">get out of the wrong side of the bed</span></td><td data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">In a bad mood. He must have gotten up out of the wrong side of the bed today.</span></td></tr><tr data-dcnode-id="2480"><td data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">get the picture</span></td><td data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Understand. Do you get the picture?</span></td></tr><tr data-dcnode-id="2471"><td data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">get your act together</span></td><td data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Get organized/stop wasting time. You better get your act together or you’re going to fail all your classes.</span></td></tr><tr data-dcnode-id="2462"><td data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">give it a shot</span></td><td data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Try. Why not try bungee jumping. Give it a shot.</span></td></tr><tr data-dcnode-id="2453"><td data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">give him a piece of your mind</span></td><td data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Get angry and tell someone off. If I were you I would give him a piece of your mind.</span></td></tr><tr data-dcnode-id="2444"><td data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">give him the cold shoulder</span></td><td data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Ignore someone. Brett walked right past me without saying a word. He gave me the cold shoulder.</span></td></tr><tr data-dcnode-id="2435"><td data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">go all out</span></td><td data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Do your utmost for someone or something. His parents went all out for his graduation party.</span></td></tr><tr data-dcnode-id="2426"><td data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">go downhill</span></td><td data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Get worse. After he got divorced, everything went downhill.</span></td></tr><tr data-dcnode-id="2417"><td data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">go up in smoke</span></td><td data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Evaporate/disappear. His dreams of being a professional athlete went up in smoke when he broke his leg.</span></td></tr><tr data-dcnode-id="2408"><td data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">have a chip on your shoulder</span></td><td data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">I think you are great. He has such a chip on his shoulder that he hardly ever relates to anyone.</span></td></tr><tr data-dcnode-id="2399"><td data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">had it up to here</span></td><td data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Can’t take any more. I’ve had it up to here with noisy students!</span></td></tr><tr data-dcnode-id="2390"><td data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">mixed feelings</span></td><td data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Positive and negative feelings together. I have very mixed feelings about her marrying a fisherman.</span></td></tr><tr data-dcnode-id="2381"><td data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">second thoughts</span></td><td data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Thinking again about a decision. I’m having second thoughts about trekking in Greenland this summer.</span></td></tr><tr data-dcnode-id="2372"><td data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">throw a fit</span></td><td data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Get really angry. His mother threw a fit when she heard that he lost her iPhone.</span></td></tr><tr data-dcnode-id="2363"><td data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">I’m all ears</span></td><td data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">To listen intently. Tell me about your wedding plans–I’m all ears.</span></td></tr><tr data-dcnode-id="2354"><td data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">in the bag</span></td><td data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Certain. His new job is in the bag. He signed the contract.</span></td></tr><tr data-dcnode-id="2345"><td data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">in the middle of nowhere</span></td><td data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Way out in the country. Their ski chalet is in the middle of nowhere.</span></td></tr><tr data-dcnode-id="2336"><td data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Just my luck!</span></td><td data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Bad luck. Just my luck to lose the winning lottery ticket.</span></td></tr><tr data-dcnode-id="2327"><td data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">keep an eye on</span></td><td data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Watch carefully. Will you keep an eye on my nephew while I walk the dog?</span></td></tr><tr data-dcnode-id="2318"><td data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">bear in mind</span></td><td data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Keep it in mind. Bear in mind, learning a new language isn’t as easy as it seems.</span></td></tr><tr data-dcnode-id="2309"><td data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">learn by heart</span></td><td data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Memorize. You have to learn irregular verbs by heart.</span></td></tr><tr data-dcnode-id="2300"><td data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">let the cat out of the bag</span></td><td data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Spill the beans. Tell a secret. Don’t let the cat out of the bag. Keep his surprise birthday party a secret.</span></td></tr><tr data-dcnode-id="2291"><td data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">make my day</span></td><td data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Make my day great. The guy I have a crush on finally called me. He made my day.</span></td></tr><tr data-dcnode-id="2282"><td data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">miss the point</span></td><td data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Don’t understand the basic meaning. You are missing the point entirely.-.</span></td></tr><tr data-dcnode-id="2273"><td data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">no way</span></td><td data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Impossible. You got all A’s on your exams and you never studied. No way!</span></td></tr><tr data-dcnode-id="2264"><td data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">don’t have a clue</span></td><td data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">I have no idea. I don’t have a clue what the professor was talking about.</span></td></tr><tr data-dcnode-id="2255"><td data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">don’t have the faintest idea</span></td><td data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Don’t understand. I don’t have the faintest idea of what that article was talking about.</span></td></tr><tr data-dcnode-id="2246"><td data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">off the top of my head</span></td><td data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Without thinking. Off the top of my head, I think it’s worth $6 million.</span></td></tr><tr data-dcnode-id="2237"><td data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">on the dot</span></td><td data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Ontime. He arrived at 6 o’clock on the dot.</span></td></tr><tr data-dcnode-id="2228"><td data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">out of sight, out of mind</span></td><td data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">You forget someone you don’t see anymore.</span></td></tr><tr data-dcnode-id="2219"><td data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">out of the blue</span></td><td data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Suddenly. Guess who called me out of the blue?</span></td></tr><tr data-dcnode-id="2210"><td data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">play it by ear</span></td><td data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Make no plans–do things spontaneously. Let’s just play it by ear tonight and see what comes up.</span></td></tr><tr data-dcnode-id="2201"><td data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">pull someone’s leg</span></td><td data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Kid someone. Stop pulling my leg. I know you are kidding!</span></td></tr><tr data-dcnode-id="2192"><td data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">red tape</span></td><td data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Bureaucracy. It’s almost impossible to set up a business in Greece because there is so much red tape.</span></td></tr><tr data-dcnode-id="2183"><td data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">read between the lines</span></td><td data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Understand what is not stated. If you read between the lines, you’ll realize that he is trying to dump you.</span></td></tr><tr data-dcnode-id="2174"><td data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">safe and sound</span></td><td data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Fine. The Boy Scouts returned safe and sound from their camping adventure in Yellowstone National Park.</span></td></tr><tr data-dcnode-id="2165"><td data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">see eye to eye</span></td><td data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Agree. He doesn’t see eye to eye with his parents at all.</span></td></tr><tr data-dcnode-id="2156"><td data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">sour grapes</span></td><td data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Pretend to not want something that you are desperate for. It’s just sour grapes that he is criticizing George’s villa in Italy.</span></td></tr><tr data-dcnode-id="2147"><td data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">slipped my mind</span></td><td data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Forgot. I meant to call you last night, but it slipped my mind.</span></td></tr><tr data-dcnode-id="2138"><td data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">small talk</span></td><td data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Chitchat. It’s important to be able to make small talk when you meet new people for the first time.</span></td></tr><tr data-dcnode-id="2129"><td data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">talk shop</span></td><td data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Talk about work. What a boring evening! Everyone talked shop- and they’re all dog walkers!</span></td></tr><tr data-dcnode-id="2120"><td data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">the icing on the cake</span></td><td data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Something that makes a good thing great. And the icing on the cake was that the movie for which he earned $12 million, also won the Oscar for best picture.</span></td></tr><tr data-dcnode-id="2111"><td data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">the last straw</span></td><td data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">The thing that ruins everything. When my boss asked me to cancel my wedding to complete a project–I said that’s the last straw and I quit!</span></td></tr><tr data-dcnode-id="2102"><td data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">time flies</span></td><td data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Time goes fast. Time flies when you are having fun.</span></td></tr><tr data-dcnode-id="2091"><td data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">you can say that again</span></td><td data-dcnode-id="2093"><span data-dcnode-id="2096" instrument_node="">You agree emphatically. Kanye West is a great singer.</span><br data-dcnode-id="2095"><span data-dcnode-id="2094" instrument_node="">
You can say that again!</span></td></tr><tr data-dcnode-id="2082"><td data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">you name it</span></td><td data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Everything you can think of. This camp has every activity you can think it–like swimming, canoeing, basketball and you name it.</span></td></tr><tr data-dcnode-id="2073"><td data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">wouldn’t be caught dead</span></td><td data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Not even dead would I do something. I wouldn’t be caught dead wearing that dress to the ball.</span></td></tr><tr data-dcnode-id="2064"><td data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">she’s a doll</span></td><td data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Someone really great. Thanks for helping me out. You’re a doll.</span></td></tr><tr data-dcnode-id="2055"><td data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">full of beans</span></td><td data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Lively–usually for a child. Little children are usually full of beans.</span></td></tr><tr data-dcnode-id="2046"><td data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">full of baloney</span></td><td data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Not true. She’s full of baloney–she doesn’t know what she is talking about.</span></td></tr><tr data-dcnode-id="2037"><td data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">like two peas in a pod</span></td><td data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Very similar. His two brothers are like peas in a pod.</span></td></tr><tr data-dcnode-id="2028"><td data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">a piece of cake</span></td><td data-dcnode-id="2030"><span data-dcnode-id="20 8" instrument_node="">Pay lots of money. They paid through the nose to hold their wedding at Buckingham Palace.</span></td></tr><tr data-dcnode-id="1956"><td data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">tongue in cheek</span></td><td data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Being ironic. I meant that tongue in cheek. I was kidding.</span></td></tr><tr data-dcnode-id="1947"><td data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">all thumbs</span></td><td data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Clumsy. He couldn’t put that simple table together–he’s just all thumbs.</span></td></tr><tr data-dcnode-id="1938"><td data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">get off my back</span></td><td data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Leave me alone. Bug off! Get off my back!</span></td></tr><tr data-dcnode-id="1929"><td data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">drive me up a wall</span></td><td data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Drive me crazy. Rude people drive me up a wall.</span></td></tr><tr data-dcnode-id="1920"><td data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">spill the beans</span></td><td data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Tell a secret. Hey, don’t spill the beans. It’s a secret.</span></td></tr><tr data-dcnode-id="1911"><td data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">hit the ceiling</span></td><td data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Blow up. His dad hit the ceiling when he saw his dreadful report card.</span></td></tr><tr data-dcnode-id="1902"><td data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">go fly a kite</span></td><td data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Get lost! Oh, leave me alone! Go fly a kite!</span></td></tr><tr data-dcnode-id="1893"><td data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">dressed to kill</span></td><td data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Dressed in fancy clothes. Cinderella was dressed to kill when she arrived at the ball.</span></td></tr><tr data-dcnode-id="1884"><td data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">in stitches</span></td><td data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Laughing a lot. We were all in stitches when we heard the latest joke.</span></td></tr><tr data-dcnode-id="1875"><td data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">feel like a million dollars</span></td><td data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Feel great. I just slept for 15 hours–I feel like a million dollars.</span></td></tr><tr data-dcnode-id="1866"><td data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">at the end of my rope</span></td><td data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Can’t stand it anymore. The mother of four little children is at the end of her rope.</span></td></tr><tr data-dcnode-id="1857"><td data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">my head is killing me</span></td><td data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Something hurts. My head is killing me–I should take an aspirin.</span></td></tr><tr data-dcnode-id="1848"><td data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">that’s out of the question</span></td><td data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Impossible. Me? Stand up and sing and dance in front of the whole school–out of the question!</span></td></tr><tr data-dcnode-id="1839"><td data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">I’m beat</span></td><td data-dcnode-id="1841"><span data-dcnode-id="1842" instrumen ta-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">see eye to eye</span></td><td data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Agree. I hardly ever see eye to eye with my parents.</span></td></tr><tr data-dcnode-id="1621"><td data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">It’s about time</span></td><td data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">It’s time. It’s about time you started your homework–it’s midnight!</span></td></tr><tr data-dcnode-id="1612"><td data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">pays peanuts</span></td><td data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Pays hardly anything. This job pays peanuts–$1 an hour!.</span></td></tr><tr data-dcnode-id="1603"><td data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">sleep like a log</span></td><td data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Sleep soundly. Last night I slept like a log and didn’t hear the thunderstorm at all.</span></td></tr><tr data-dcnode-id="1594"><td data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">ace</span></td><td data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Do great. I aced the math test. I got 100%.</span></td></tr><tr data-dcnode-id="1585"><td data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">easy as pie</span></td><td data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Super easy. The English test was as easy as pie.</span></td></tr><tr data-dcnode-id="1576"><td data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">blabbermouth</span></td><td data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Someone who tells secrets. Don’t tell Sophie your secrets or the whole town will know them.</span></td></tr><tr data-dcnode-id="1567"><td data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">don’t bug me</span></td><td data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Don’t bother me. Don’t bug me–I’m busy.</span></td></tr><tr data-dcnode-id="1558"><td data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">by the skin of my teeth</span></td><td data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Barely manage something. I passed the geography test by the skin of my teeth.</span></td></tr><tr data-dcnode-id="1549"><td data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">can’t make head nor tail of</span></td><td data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">I can’t understand. I can’t make head nor tail of this math chapter.</span></td></tr><tr data-dcnode-id="1540"><td data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">cool as a cucumber</span></td><td data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Very calm. The policeman was cool as a cucumber when he persuaded the man not to jump off the Brooklyn Bridge.</span></td></tr></tbody></table><span data-dcnode-id="1535" instrument_node="">

</span><h5 class="import-dh" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Clichés</span></h5><span data-dcnode-id="1529" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1520"><span class="import-keyterm" data-dcnode-id="1526"><button aria-describedby="80-429" class="glossary-term" data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Cliché</span></button></span><span data-dcnode-id="1525" instrument_node=""> is an idea or expression that has been so overused that it has lost its original meaning.</span><sup class="import-EndnoteReference" data-dcnode-id="1522"><a data-dcnode-id="1523" href="#sdfootnote28sym" id="sdfootnote28anc"><span data-dcnode-id="1524" instrument_node="">28</span></a></sup><span data-dcnode-id="1521" instrument_node=""> Clichés are common and can often be heard. For instance, “light as a feather” or “happily ever after” are common clichés. They are important because they express ideas and thoughts that are popular in everyday use. They are prevalent in advertisements, television, and literature.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="1516"><a data-dcnode-id="1518" id="_Toc45779748"></a><span data-dcnode-id="1517" instrument_node="">Improper Language</span></h3><span data-dcnode-id="1515" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1509"><span data-dcnode-id="1514" instrument_node="">Improper language is not proper, correct, or applicable in certain situations.</span><sup class="import-EndnoteReference" data-dcnode-id="1511"><a data-dcnode-id="1512" href="#sdfootnote29sym" id="sdfootnote29anc"><span data-dcnode-id="1513" instrument_node="">29</span></a></sup><span data-dcnode-id="1510" instrument_node=""> There are two different types of improper language: vulgarity and cursing. First, vulgarity includes language that is offensive or lacks good taste. Often, vulgar is lewd or obscene. Second, cursing is language that includes evil, doom, misfortune on a person or group. It can also include curse or profane words. People might differ in their perceptions about improper language.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="1505"><a data-dcnode-id="1507" id="_Toc45779749"></a><span data-dcnode-id="1506" instrument_node="">Biased Language</span></h3><span data-dcnode-id="1504" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1495"><span class="import-keyterm" data-dcnode-id="1501"><button aria-describedby="80-415" class="glossary-term" data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Biased language</span></button></span><span data-dcnode-id="1500" instrument_node=""> is language that shows preference in favor of or against a certain point-of-view, shows prejudice, or is demeaning to others.</span><sup class="import-EndnoteReference" data-dcnode-id="1497"><a data-dcnode-id="1498" href="#sdfootnote30sym" id="sdfootnote30anc"><span data-dcnode-id="1499" instrument_node="">30</span></a></sup><span data-dcnode-id="1496" instrument_node=""> Bias in language is uneven or unbalanced. Examples of this may include “mankind” as opposed to “humanity.”</span></p><span data-dcnode-id="1494" instrument_node="">
