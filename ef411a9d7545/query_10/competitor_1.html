ion/chapter/2/"><span data-dcnode-id="4088" instrument_node="">Chapter 2: Overview of Interpersonal Communication</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4079" id="toc-chapter-68"><div class="toc__title__container" data-dcnode-id="4080"><p class="toc__title" data-dcnode-id="4081"><a data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/3/"><span data-dcnode-id="4083" instrument_node="">Chapter 3: Intrapersonal Communication</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty toc__selected" data-dcnode-id="4074" id="toc-chapter-80"><div class="toc__title__container" data-dcnode-id="4075"><p class="toc__title" data-dcnode-id="4076"><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/4/"><span data-dcnode-id="4078" instrument_node="">Chapter 4: Verbal Elements of Communication</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4069" id="toc-chapter-91"><div class="toc__title__container" data-dcnode-id="4070"><p class="toc__title" data-dcnode-id="4071"><a data-dcnode-id="4072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/5/"><span data-dcnode-id="4073" instrument_node="">Chapter 5: Nonverbal Communication</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4064" id="toc-chapter-96"><div class="toc__title__container" data-dcnode-id="4065"><p class="toc__title" data-dcnode-id="4066"><a data-dcnode-id="4067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/6/"><span data-dcnode-id="4068" instrument_node="">Chapter 6: Cultural and Environmental Factors in Interpersonal Communication</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4059" id="toc-chapter-106"><div class="toc__title__container" data-dcnode-id="4060"><p class="toc__title" data-dcnode-id="4061"><a data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/7/"><span data-dcnode-id="4063" instrument_node="">Chapter 7: Talking and Listening</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4054" id="toc-chapter-237"><div class="toc__title__container" data-dcnode-id="4055"><p class="toc__title" data-dcnode-id="4056"><a data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/8/"><span data-dcnode-id="4058" instrument_node="">Chapter 8: Building and Maintaining Relationships</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4049" id="toc-chapter-122"><div class="toc__title__container" data-dcnode-id="4050"><p class="toc__title" data-dcnode-id="4051"><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/9/"><span data-dcnode-id="4053" instrument_node="">Chapter 9: Conflict in Relationships</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4044" id="toc-chapter-251"><div class="toc__title__container" data-dcnode-id="4045"><p class="toc__title" data-dcnode-id="4046"><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/10/"><span data-dcnode-id="4048" instrument_node="">Chapter 10: Friendship Relationships</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4039" id="toc-chapter-271"><div class="toc__title__container" data-dcnode-id="4040"><p class="toc__title" data-dcnode-id="4041"><a data-dcnode-id="4042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/11/"><span data-dcnode-id="4043" instrument_node="">Chapter 11: Family &amp; Marriage Relationships</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4034" id="toc-chapter-291"><div class="toc__title__container" data-dcnode-id="4035"><p class="toc__title" data-dcnode-id="4036"><a data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/12/"><span data-dcnode-id="4038" instrument_node="">Chapter 12: Interpersonal Communication in Mediated Contexts</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4029" id="toc-chapter-310"><div class="toc__title__container" data-dcnode-id="4030"><p class="toc__title" data-dcnode-id="4031"><a data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/13/"><span data-dcnode-id="4033" instrument_node="">Chapter 13: Interpersonal Relationships at Work</span></a></p></div></li><li class="toc__chapter standard toc__chapter--empty" data-dcnode-id="4024" id="toc-chapter-179"><div class="toc__title__container" data-dcnode-id="4025"><p class="toc__title" data-dcnode-id="4026"><a data-dcnode-id="4027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/14/"><span data-dcnode-id="4028" instrument_node="">Chapter 14: The Dark Side of Interpersonal Communication</span></a></p></div></li></ol></li><span data-dcnode-id="4021" instrument_node=""> </span><li class="toc__back-matter glossary toc__back-matter--empty" data-dcnode-id="4016" id="toc-back-matter-1133"><div class="toc__title__container" data-dcnode-id="4017"><p class="toc__title" data-dcnode-id="4018"><a data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/back-matter/glossary/"><span data-dcnode-id="4020" instrument_node="">Glossary</span></a></p></div></li><li class="toc__back-matter appendix toc__back-matter--empty" data-dcnode-id="4011" id="toc-back-matter-6"><div class="toc__title__container" data-dcnode-id="4012"><p class="toc__title" data-dcnode-id="4013"><a data-dcnode-id="4014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/back-matter/answer-keys/"><span data-dcnode-id="4015" instrument_node="">Answer Keys</span></a></p></div></li><li class="toc__back-matter about-the-author toc__back-matter--empty" data-dcnode-id="4006" id="toc-back-matter-330"><div class="toc__title__container" data-dcnode-id="4007"><p class="toc__title" data-dcnode-id="4008"><a data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/back-matter/about-the-authors/"><span data-dcnode-id="4010" instrument_node="">About the Authors</span></a></p></div></li></ol><span data-dcnode-id="4004" instrument_node=""> </span><span data-dcnode-id="4002" instrument_node="">

</span><h1 class="reading-header__title" data-dcnode-id="3995"><a data-dcnode-id="3996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/" rel="home" title="Go to the cover page of Interpersonal Communication"><span data-dcnode-id="3997" instrument_node="">Interpersonal Communication</span></a></h1><span data-dcnode-id="3994" instrument_node="">

</span><main data-dcnode-id="90" id="main"><span data-dcnode-id="3984" instrument_node="">
</span><div class="site-content" data-dcnode-id="175" id="content" tabindex="-1"><span data-dcnode-id="3983" instrument_node="">
</span><section class="standard post-80 chapter type-chapter status-publish hentry focusable" data-dcnode-id="177" data-type="chapter" tabindex="-1"><span data-dcnode-id="3982" instrument_node="">
</span><header data-dcnode-id="3977"><span data-dcnode-id="3981" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">
			Chapter 4: Verbal Elements of Communication		</span></h1><span data-dcnode-id="3978" instrument_node="">
</span></header><span data-dcnode-id="3976" instrument_node="">
</span><div class="__UNKNOWN__" data-dcnode-id="643"><span data-dcnode-id="3975" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">Have you ever said something that someone else misinterpreted as something else? Some of the most common problems in interpersonal communication stem from the use of language. For instance, two students, Kelly and James, are texting each other. Kelly texts James about meeting for dinner, and James texts “K” instead of “okay.” Kelly is worried because she thinks James is mad. She wonders why he texted “K” instead of “k,” “ok,” “yes” or “okay.” James was in a hurry, and he just texted in caps because he was excited to see Kelly.</span></p><span data-dcnode-id="3972" instrument_node="">
</span><p class="import-p" data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">This example gives us an understanding of how language can influence how our perceptions. Kelly and James had two different perceptions of the same event. One person was worried, and the other person was excited. Chapter 4 examines verbal communication because we know that words are powerful. The words that we use can impact how other people perceive us and how to perceive others.</span></p><span data-dcnode-id="3969" instrument_node="">
</span><p class="import-p" data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Language is a system of human communication using a particular form of spoken or written words or other symbols. Language consists of the use of words in a structured way. Language helps us understand others’ wants, needs, and desires. Language can help create connections, but it can also pull us apart. Language is so vital to communication. Imagine if you never learned a language; how would you be able to function? Without language, how could you develop meaningful connections with others? Language allows us to express ourselves and obtain our goals.</span></p><span data-dcnode-id="3966" instrument_node="">
</span><p class="import-p" data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">Language is the most important element in human communication. Language is made up of words, which are arbitrary symbols. In this chapter, we will learn about how words work, the functions of language, and how to improve verbal communication.</span></p><span data-dcnode-id="3963" instrument_node="">
</span><h2 class="import-ah" data-dcnode-id="3960"><a data-dcnode-id="3962" id="_Toc45779724"></a><span data-dcnode-id="3961" instrument_node="">4.1 How Words Work</span></h2><span data-dcnode-id="3959" instrument_node="">
</span><div class="textbox textbox--learning-objectives" data-dcnode-id="3936"><span data-dcnode-id="3958" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3953"><span data-dcnode-id="3957" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Learning Objectives</span></p><span data-dcnode-id="3954" instrument_node="">
</span></header><span data-dcnode-id="3952" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3938"><span data-dcnode-id="3951" instrument_node="">
</span><ol data-dcnode-id="3940"><span data-dcnode-id="3950" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">Discover how words have different rules.</span></li><span data-dcnode-id="3947" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">Determine the level of abstraction.</span></li><span data-dcnode-id="3944" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">Comprehend the concept of metamessages.</span></li><span data-dcnode-id="3941" instrument_node="">
</span></ol><span data-dcnode-id="3939" instrument_node="">
</span></div><span data-dcnode-id="3937" instrument_node="">
</span></div><span data-dcnode-id="3935" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3929"><span data-dcnode-id="3934" instrument_node="">One person might call a shopping cart a buggy, and another person might call it a cart. There are several ways to say you would like a beverage, such as, “liquid refresher,” “soda,” “Coke,” “pop,” “refreshment,” or “drink.” A pacifier for a baby is sometimes called a “paci,” “binkie,” “sookie,” or “mute button.” Linguist Robin Tolmach Lakoff asks, “How can something that is physically just puffs of air, a mere stand-in for reality, have the power to change us and our world?”</span><sup class="import-enref" data-dcnode-id="3931"><a data-dcnode-id="3932" href="#sdfootnote1sym" id="sdfootnote1anc"><span data-dcnode-id="3933" instrument_node="">1</span></a></sup><span data-dcnode-id="3930" instrument_node=""> This example illustrates that meanings are in people, and words don’t necessarily represent what they mean.</span></p><span data-dcnode-id="3928" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3925"><a data-dcnode-id="3927" id="_Toc45779725"></a><span data-dcnode-id="3926" instrument_node="">Words and Meaning</span></h3><span data-dcnode-id="3924" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3919"><span data-dcnode-id="3923" instrument_node="">Words can have different rules to help us understand the meaning. There are three rules: semantic, syntactic, and pragmatic.</span><sup class="import-EndnoteReference" data-dcnode-id="3920"><a data-dcnode-id="3921" href="#sdfootnote2sym" id="sdfootnote2anc"><span data-dcnode-id="3922" instrument_node="">2</span></a></sup></p><span data-dcnode-id="3918" instrument_node="">
</span><h4 class="import-ch" data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">Semantic Rules</span></h4><span data-dcnode-id="3915" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">First, semantic rules are the dictionary definition of the word. However, the meaning can change based on the context in which it is used. For instance, the word fly by itself does not mean anything. It makes more sense if we put the word into a context by saying things like, “There is a fly on the wall;” “I will fly to Dallas tomorrow;” “That girl is so fly;” or “The fly on your pants is open!” We would not be able to communicate with others if we did not have semantic rules.</span></p><span data-dcnode-id="3912" instrument_node="">
</span><p class="import-p" data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">A cute example of this is about a third-grade teacher who asked about a period. One male student in her class went on and on about how girls have monthly periods, but he did not realize that the teacher meant the use of periods for punctuation at the end of a sentence. Hence, semantic rules need to be understood to avoid embarrassment or misunderstandings.</span></p><span data-dcnode-id="3909" instrument_node="">
</span><h4 class="import-ch" data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">Syntactic Rules</span></h4><span data-dcnode-id="3906" instrument_node="">
</span><p class="import-p" data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">Second, syntactic rules govern how we help guide the words we use. Syntactic rules can refer to the use of grammar, structure, and punctuation to help effectively convey our ideas. For instance, we can say “Where are you” as opposed to “where you are,” which can convey a different meaning and have different perceptions. The same thing can happen when you don’t place a comma in the right place. The comma can make a big difference in how people understand a message.</span></p><span data-dcnode-id="3903" instrument_node="">
</span><p class="import-p" data-dcnode-id="3898"><span data-dcnode-id="3902" instrument_node="">A great example of how syntactic rules is the </span><em data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Star Wars </span></em><span data-dcnode-id="3899" instrument_node="">character, Yoda, who often speaks with different rules. He has said, “Named must be your fear before banish it you can” and “Happens to every guy sometimes this does.” This example illustrates that syntactic rules can vary based on culture or background.</span></p><span data-dcnode-id="3897" instrument_node="">
</span><p class="import-p" data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">Another example is Figure 4.1. In this case, we learn the importance that a comma can make in written in language. In the first instance, “Let’s eat grandma!” is quite different than the second one, “Let’s eat, grandma!” The first implies cannibalism and the second a family dinner. As the image says, punctuation saves lives.</span></p><span data-dcnode-id="3894" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3890" style="width: 336px"><img alt="Two sentences: &quot;Let's eat Grandma&quot; and &quot;Let's eat, Grandma&quot; and a label pointing to the comma in the second sentence saying &quot;Punctuation saves lives&quot;" class="" data-dcnode-id="3893" height="336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/app/uploads/sites/246/2021/05/image1-3.jpeg&amp;raw" width="336"><figcaption class="wp-caption-text" data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">Figure 4.1 Commas Matter</span></figcaption></figure><span data-dcnode-id="3889" instrument_node="">
</span><h4 class="import-ch" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Pragmatic Rules</span></h4><span data-dcnode-id="3886" instrument_node="">
</span><p class="import-p" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Third, pragmatic rules help us interpret messages by analyzing the interaction completely. We need to consider the words used, how they are stated, our relationship with the speaker, and the objectives of our communication. For instance, the words “I want to see you now” would mean different things if the speaker was your boss versus your lover. One could be a positive connotation, and another might be a negative one. The same holds true for humor. If we know that the other person understands and appreciates sarcasm, we might be more likely to engage in that behavior and perceive it differently from someone who takes every word literally.</span></p><span data-dcnode-id="3883" instrument_node="">
</span><p class="import-p" data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">Most pragmatic rules are based on culture and experience. For instance, the term “Netflix and chill” often means that two people will hook up. Imagine someone from a different country who did not know what this meant; they would be shocked if they thought they were going to watch Netflix with the other person and just relax. Another example would be “Want to have a drink?”, which usually infers an alcoholic beverage. Another way of saying this might be to say, “Would you like something to drink?” The second sentence does not imply that the drink has to contain alcohol.</span></p><span data-dcnode-id="3880" instrument_node="">
</span><p class="import-p" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">It is common for people to text in capital letters when they are angry or excited. You would interpret the text differently if the text was not in capital letters. For instance, “I love you” might be perceived differently from “I LOVE YOU!!!” Thus, when communicating with others, you should also realize that pragmatic rules can impact the message.</span></p><span data-dcnode-id="3877" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3874"><a data-dcnode-id="3876" id="_Toc45779726"></a><span data-dcnode-id="3875" instrument_node="">Words Create Reality</span></h3><span data-dcnode-id="3873" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Language helps to create reality. Often, humans will label their experiences. For instance, the word “success” has different interpretations depending on your perceptions. Success to you might be a certain type of car or a certain amount of income. However, for someone else, success might be the freedom to do what they love or to travel to exotic places. Success might mean something different based on your background or your culture.</span></p><span data-dcnode-id="3870" instrument_node="">
</span><p class="import-p" data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">Another example might be the word “intimacy.” Intimacy to one person might be something similar to love, but to another person, it might be the psychological connection that you feel to another person. Words can impact a person’s reality of what they believe and feel.</span></p><span data-dcnode-id="3867" instrument_node="">
</span><p class="import-p" data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">If a child complains that they don’t feel loved, but the parents/guardians argue that they continuously show affection by giving hugs and doing fun shared activities, who would you believe? The child might say that they never heard their parents/guardians say the word love, and hence, they don’t feel love. So, when we argue that words can create a person’s reality, that is what we mean. Specific words can make a difference in how a person will receive the message. That is why certain rhetoricians and politicians will spend hours looking for the right word to capture the true essence of a message. A personal trainer might be careful to use the word “overweight” as opposed to “fat,” because it just sounds drastically different. At Disney world, they call their employees “cast members” rather than workers, because it gives a perception that each person has a part in helping to run the show. Even on a resume, you might select words that set you apart from the other applicants. For instance, if you were a cook, you might say “culinary artist.” It gives the impression that you weren’t just cooking food, you were making masterpieces with food. Words matter, and how they are used will make a difference.</span></p><span data-dcnode-id="3864" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3861"><a data-dcnode-id="3863" id="_Toc45779727"></a><span data-dcnode-id="3862" instrument_node="">Words Reflect Attitudes</span></h3><span data-dcnode-id="3860" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">When we first fall in love with someone, we will use positive adjectives to describe that person. However, if you have fallen out of love with that person, you might use negative or neutral words to describe that same person. Words can reflect attitudes. Some people can label one experience as pleasant and another person can have the opposite experience. This difference is because words reflect our attitudes about things. If a person has positive emotions towards another, they might say that that person is funny, mature, and thrifty. However, if the person has negative feelings or attitudes towards that same person, they might describe them has childish, old, and cheap. These words can give a connotation about how the person perceives them.</span></p><span data-dcnode-id="3857" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3854"><a data-dcnode-id="3856" id="_Toc45779728"></a><span data-dcnode-id="3855" instrument_node="">Level of Abstraction</span></h3><span data-dcnode-id="3853" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3847"><span data-dcnode-id="3852" instrument_node="">When we think of language, it can be pretty </span><span class="import-keyterm" data-dcnode-id="3849"><button aria-describedby="80-348" class="glossary-term" data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">abstract</span></button></span><span data-dcnode-id="3848" instrument_node="">. For example, when we say something is “interesting,” it can be positive or negative. That is what we mean when we say that language is abstract. Language can be very specific. You can tell someone specific things to help them better understand what you are trying to say by using specific and concrete examples. For instance, if you say, “You are a jerk!”, the person who receives that message might get pretty angry and wonder why you said that statement. To be clear, it might be better to say something like, “When you slammed that door in my face this morning, it really upset me, and I didn’t think that behavior was appropriate.” The second statement is more descriptive.</span></p><span data-dcnode-id="3846" instrument_node="">
</span><p class="import-p" data-dcnode-id="3836"><span data-dcnode-id="3845" instrument_node="">In 1941, linguist S.I. Hayakawa created what is called the </span><span class="import-keyterm" data-dcnode-id="3842"><button aria-describedby="80-350" class="glossary-term" data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">abstraction ladder</span></button></span><span data-dcnode-id="3841" instrument_node=""> (Figure 4.2).</span><sup class="import-EndnoteReference" data-dcnode-id="3838"><a data-dcnode-id="3839" href="#sdfootnote3sym" id="sdfootnote3anc"><span data-dcnode-id="3840" instrument_node="">3</span></a></sup><span data-dcnode-id="3837" instrument_node=""> The abstraction ladder starts abstract at the top, while the bottom rung and is very concrete. In Figure 4.2, we’ve shown how you can go from abstract ideas (e.g., information) through various levels of more concrete ideas down to the most concrete idea (e.g., interpersonal communication). Ideally, you can see that as we move down the ladder, the topic becomes more fine-tuned and concrete.</span></p><span data-dcnode-id="3835" instrument_node="">
</span><p class="import-p" data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">In our daily lives, we tend to use high levels of abstraction all the time. For instance, growing up, your parents/guardians probably helped you with homework, cleaning, cooking, and transporting you from one event to another. Yet, we don’t typically say thank you to everything; we might make a general comment, such as a thank you rather than saying, “Thank you so much for helping me with my math homework and helping me figure out how to solve for the volume of spheres.” It takes too long to say that, so people tend to be abstract. However, abstraction can cause problems if you don’t provide enough description.</span></p><span data-dcnode-id="3832" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3828" style="width: 1430px"><img alt="A list of words with the top labeled abstract and the bottom concrete. From the top: Information, research, academic fields, humanities and social sciences, communication studies, interpersonal communication." data-dcnode-id="3831" height="782" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/app/uploads/sites/246/2021/05/image2-3.jpeg&amp;raw" width="1430"><figcaption class="wp-caption-text" data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">Figure 4.2 Abstraction Ladder</span></figcaption></figure><span data-dcnode-id="3827" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3824"><a data-dcnode-id="3826" id="_Toc45779729"></a><span data-dcnode-id="3825" instrument_node="">Metamessages</span></h3><span data-dcnode-id="3823" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3813"><span data-dcnode-id="3822" instrument_node="">Metacommunication is known as communication about communication.</span><sup class="import-EndnoteReference" data-dcnode-id="3819"><a data-dcnode-id="3820" href="#sdfootnote4sym" id="sdfootnote4anc"><span data-dcnode-id="3821" instrument_node="">4</span></a></sup><span data-dcnode-id="3818" instrument_node=""> Yet, </span><span class="import-keyterm" data-dcnode-id="3815"><button aria-describedby="80-770" class="glossary-term" data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">metamessages</span></button></span><span data-dcnode-id="3814" instrument_node=""> are relationship messages that are sent among people who they communicate. These messages can be verbal, nonverbal, direct, or indirect. For instance, if you see two friends just talking about what they did last weekend, they are also sending metamessages as they talk. Metamessages can convey affection, appreciation, disgust, ridicule, scorn, or contempt. Every time you send messages to others, notice the metamessages that they might be sending you. Do they seem upset or annoyed with certain things that you say? In this book, we want to stress the importance of mindfulness when speaking. You may not realize what metamessages you are sending out to others.</span></p><span data-dcnode-id="3812" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3808" style="width: 1430px"><img alt="two figures with thought bubbles, one picturing a ring, and one says &quot;I'm sorry&quot;" data-dcnode-id="3811" height="781" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/app/uploads/sites/246/2021/05/image3-3.jpeg&amp;raw" width="1430"><figcaption class="wp-caption-text" data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Figure 4.3 Perception is Key</span></figcaption></figure><span data-dcnode-id="3807" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3804"><a data-dcnode-id="3806" id="_Toc45779730"></a><span data-dcnode-id="3805" instrument_node="">Words and Meanings</span></h3><span data-dcnode-id="3803" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3797"><span data-dcnode-id="3802" instrument_node="">Words can have denotative meanings or connotative meanings. In this section, we will learn about the differences and the triangle of meaning.</span><sup class="import-EndnoteReference" data-dcnode-id="3799"><a data-dcnode-id="3800" href="#sdfootnote5sym" id="sdfootnote5anc"><span data-dcnode-id="3801" instrument_node="">5</span></a></sup><span data-dcnode-id="3798" instrument_node=""> Researchers by the names of Ogden and Richards noticed that misunderstandings occur when people associate different meanings with the same message. Their model (Figure 4.4) illustrates that there is an indirect association between a word and the actual referent or thing it represents.</span></p><span data-dcnode-id="3796" instrument_node="">
</span><p class="import-p" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">As you can see, when you hear the word “dog,” it conjures up meaning for different people. The word “dog” itself is a symbol and signifier, or sound elements or other linguistic symbols that represents an underlying concept or meaning. When we hear the word “dog,” it is what we call the “signified,” or the meaning or idea expressed when someone hears the word. In this case, maybe you have a dog, and you really see that dog as your best friend, or, as in my case, you call him your little “cuddle monster” because he always wants to be connected to you at all times. Again, our meaning that we attach to the symbol is still separate from the physical entity itself. In this case, there is a real dog named Teddy, who is the referent, or the physical thing that a word or phrase denotes or stands for.</span></p><span data-dcnode-id="3793" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3789" style="width: 1430px"><img alt="A line runs from the word &quot;Dog&quot; to a drawing of a puppy and the name &quot;Teddy&quot;. &quot;Dog&quot; is labeled &quot;word/symbol signifier&quot; and &quot;Teddy&quot; is labeled &quot;referent/object&quot;. The line is annotated with &quot;symbolizes&quot; &quot;Cuddle Monster/Best Friend: Though/ reference signified&quot; &quot;refers to&quot; pointing to the picture of the puppy." data-dcnode-id="3792" height="1430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/app/uploads/sites/246/2021/05/image4-3.jpeg&amp;raw" width="1430"><figcaption class="wp-caption-text" data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Figure 4.4 Signifier, Signified, and Referent</span></figcaption></figure><span data-dcnode-id="3788" instrument_node="">
</span><p class="import-p" data-dcnode-id="3782"><span data-dcnode-id="3787" instrument_node="">Words can have a </span><span class="import-keyterm" data-dcnode-id="3784"><button aria-describedby="80-505" class="glossary-term" data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">denotative</span></button></span><span data-dcnode-id="3783" instrument_node=""> meaning, which is the dictionary definition. These are words that most people are familiar with, and they all can agree on the understanding of that word. If you asked a person what a car or a phone is, they would most likely know what you are talking about when you use those words.</span></p><span data-dcnode-id="3781" instrument_node="">
</span><p class="import-p" data-dcnode-id="3775"><span data-dcnode-id="3780" instrument_node="">Words can have a </span><span class="import-keyterm" data-dcnode-id="3777"><button aria-describedby="80-483" class="glossary-term" data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">connotative</span></button></span><span data-dcnode-id="3776" instrument_node=""> meaning, which is a subjective definition of the word. The word might mean something different from what you meant. For example, you may hear someone referring to their baby. You could fairly safely assume that the person is referring to their infant, but just as easily they could be referring to a significant other.</span></p><span data-dcnode-id="3774" instrument_node="">
</span><div class="textbox textbox--key-takeaways" data-dcnode-id="3751"><span data-dcnode-id="3773" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3768"><span data-dcnode-id="3772" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">Key Takeaways</span></p><span data-dcnode-id="3769" instrument_node="">
</span></header><span data-dcnode-id="3767" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3753"><span data-dcnode-id="3766" instrument_node="">
</span><ul data-dcnode-id="3755"><span data-dcnode-id="3765" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">Words have denotative and connotative meanings. Denotations are the dictionary definition, and connotations are what the words imply.</span></li><span data-dcnode-id="3762" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">Sometimes confusion occurs because people are too abstract in their language. To be clear and concise in language, you need to be descriptive and specific as possible.</span></li><span data-dcnode-id="3759" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">Metamessages involves several meanings and can be conveyed nonverbally and verbally.</span></li><span data-dcnode-id="3756" instrument_node="">
</span></ul><span data-dcnode-id="3754" instrument_node="">
</span></div><span data-dcnode-id="3752" instrument_node="">
</span></div><span data-dcnode-id="3750" instrument_node="">
</span><div class="textbox textbox--exercises" data-dcnode-id="3727"><span data-dcnode-id="3749" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3744"><span data-dcnode-id="3748" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">Exercises</span></p><span data-dcnode-id="3745" instrument_node="">
</span></header><span data-dcnode-id="3743" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3729"><span data-dcnode-id="3742" instrument_node="">
</span><ul data-dcnode-id="3731"><span data-dcnode-id="3741" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Create an example of an abstraction ladder of how communication can range from general to very specific.</span></li><span data-dcnode-id="3738" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">Denotative and Connotative Ability. In groups, find ten random words from the dictionary and ask everyone to write down at least five connotations of each of the words. Then, compare your lists. Discuss the similarities and differences between your word choices.</span></li><span data-dcnode-id="3735" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">Create a metamessages love board. As a class, make a list of all the ways you could tell someone you love them. Then, discuss how your metamessages might cause some misunderstandings or confusion.</span></li><span data-dcnode-id="3732" instrument_node="">
</span></ul><span data-dcnode-id="3730" instrument_node="">
</span></div><span data-dcnode-id="3728" instrument_node="">
</span></div><span data-dcnode-id="3726" instrument_node="">
</span><h2 class="import-ah" data-dcnode-id="3723"><a data-dcnode-id="3725" id="_Toc45779732"></a><span data-dcnode-id="3724" instrument_node="">4.2 Functions of Language</span></h2><span data-dcnode-id="3722" instrument_node="">
</span><div class="textbox textbox--learning-objectives" data-dcnode-id="3699"><span data-dcnode-id="3721" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3716"><span data-dcnode-id="3720" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">Learning Objectives</span></p><span data-dcnode-id="3717" instrument_node="">
</span></header><span data-dcnode-id="3715" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3701"><span data-dcnode-id="3714" instrument_node="">
</span><ol data-dcnode-id="3703"><span data-dcnode-id="3713" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Distinguish the differences between instrumental and regulatory functions.</span></li><span data-dcnode-id="3710" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">Appreciate the interactional and imaginative functions of language.</span></li><span data-dcnode-id="3707" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Examine the personal, ritual, and cultural functions of language.</span></li><span data-dcnode-id="3704" instrument_node="">
</span></ol><span data-dcnode-id="3702" instrument_node="">
</span></div><span data-dcnode-id="3700" instrument_node="">
</span></div><span data-dcnode-id="3698" instrument_node="">
</span><p class="import-LearningOutcome" data-dcnode-id="3690"><span data-dcnode-id="3696" style="text-indent: 0pt; font-size: 1em;"><span data-dcnode-id="3697" instrument_node="">Based on research examining how children learn language, it was found that children are trying to create “meaning potential.”</span></span><sup class="import-enref" data-dcnode-id="3693"><a data-dcnode-id="3694" href="#sdfootnote6sym" id="sdfootnote6anc"><span data-dcnode-id="3695" instrument_node="">6</span></a></sup><span data-dcnode-id="3691" style="text-indent: 0pt; font-size: 1em;"><span data-dcnode-id="3692" instrument_node=""> In other words, children learn language so they can understand and be understood by others. As children age, language serves different functions.</span></span></p><span data-dcnode-id="3689" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3686"><a data-dcnode-id="3688" id="_Toc45779733"></a><span data-dcnode-id="3687" instrument_node="">Instrumental and Regulatory Functions</span></h3><span data-dcnode-id="3685" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Children will typically communicate in a fashion that lets parents/guardians know what they want to do. When children are born, parents/guardians have to figure out if the child is hungry, thirsty, dirty, or sick. Later, when the child acquires language, the child can let the parent/guardian know what they want by using simple words like “eat” or “drink.”</span></p><span data-dcnode-id="3682" instrument_node="">
</span><p class="import-p" data-dcnode-id="3674"><span class="import-keyterm" data-dcnode-id="3679"><button aria-describedby="80-672" class="glossary-term" data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">Instrumental functions</span></button></span><span data-dcnode-id="3678" instrument_node=""> use language to fulfill a need. In </span><a data-dcnode-id="3676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/interpersonalcommunication/chapter/2/"><span data-dcnode-id="3677" instrument_node="">Chapter 2</span></a><span data-dcnode-id="3675" instrument_node="">, we learned about Maslow’s Hierarchy of Needs. For us to meet our needs, we need to use language that other people understand.</span></p><span data-dcnode-id="3673" instrument_node="">
</span><p class="import-p" data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Language can help us define what we can or cannot do. Often, you might see campaigns that say “Don’t drink and drive” or “Don’t text and drive” to help control behaviors while driving.</span></p><span data-dcnode-id="3670" instrument_node="">
</span><p class="import-p" data-dcnode-id="3664"><span class="import-keyterm" data-dcnode-id="3666"><button aria-describedby="80-864" class="glossary-term" data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">Regulatory functions</span></button><span data-dcnode-id="3667" instrument_node=""> </span></span><span data-dcnode-id="3665" instrument_node="">of language are to influence the behaviors of others through requests, rules, or persuasion. These functions do not necessarily coincide with our needs. These might be advertisements that tell us to eat healthier or exercise more using specific products.</span></p><span data-dcnode-id="3663" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3660"><a data-dcnode-id="3662" id="_Toc45779734"></a><span data-dcnode-id="3661" instrument_node="">Interactional and Imaginative Functions</span></h3><span data-dcnode-id="3659" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3654"><span class="import-keyterm" data-dcnode-id="3656"><button aria-describedby="80-688" class="glossary-term" data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">Interactional functions</span></button></span><span data-dcnode-id="3655" instrument_node=""> of language are used to help maintain or develop the relationship. Interactional functions also help to alleviate the interaction. Examples might include “Thank you,” “Please,” or “I care about you.”</span></p><span data-dcnode-id="3653" instrument_node="">
</span><p class="import-p" data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Imaginative functions of language help to create imaginary constructs and tell stories. This use of fantasy usually occurs in play or leisure activities. People who roleplay in video games will sometimes engage in imaginative functions to help their character be more effective and persuasive.</span></p><span data-dcnode-id="3650" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3647"><a data-dcnode-id="3649" id="_Toc45779735"></a><span data-dcnode-id="3648" instrument_node="">Personal Functions</span></h3><span data-dcnode-id="3646" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3640"><span data-dcnode-id="3645" instrument_node="">Next, we have </span><span class="import-keyterm" data-dcnode-id="3642"><button aria-describedby="80-814" class="glossary-term" data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">personal functions</span></button></span><span data-dcnode-id="3641" instrument_node="">, or the use of language to help you form your identity or sense of self. In job interviews, people are asked, “how do you describe yourself?” For some people, this is a challenging question because it showcases what makes you who you are. The words you pick, as opposed to others, can help define who you are.</span></p><span data-dcnode-id="3639" instrument_node="">
</span><p class="import-p" data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">Perhaps someone told you that you were funny. You never realized that you were funny until that person told you. Because they used the word “funny” as opposed to “silly” or “crazy,” it caused you to have perceptions about yourself. This example illustrates how words serve as a personal function for us. Personal functions of language are used to express identity, feelings, and options.</span></p><span data-dcnode-id="3636" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3633"><a data-dcnode-id="3635" id="_Toc45779737"></a><span data-dcnode-id="3634" instrument_node="">Heuristic and Representational Functions</span></h3><span data-dcnode-id="3632" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3626"><span data-dcnode-id="3631" instrument_node="">The </span><span class="import-keyterm" data-dcnode-id="3628"><button aria-describedby="80-628" class="glossary-term" data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">heuristic function</span></button></span><span data-dcnode-id="3627" instrument_node=""> of language is used to learn, discover, and explore. The heuristic function could include asking several questions during a lecture or adding commentary to a child’s behavior. Another example might be “What is that tractor doing?” or “why is the cat sleeping?”</span></p><span data-dcnode-id="3625" instrument_node="">
</span><p class="import-p" data-dcnode-id="3620"><span class="import-keyterm" data-dcnode-id="3622"><button aria-describedby="80-888" class="glossary-term" data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">Representational functions</span></button></span><span data-dcnode-id="3621" instrument_node=""> of language are used to request or relay information. These statements are straightforward. They do not seek for an explanation. For instance, “my cat is asleep” or “the kitchen light isn’t working.”</span></p><span data-dcnode-id="3619" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3616"><a data-dcnode-id="3618" id="_Toc45779738"></a><span data-dcnode-id="3617" instrument_node="">Cultural Functions</span></h3><span data-dcnode-id="3615" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3605"><span data-dcnode-id="3614" instrument_node="">We know a lot about a culture based on the language that the members of the group speak.</span><sup class="import-EndnoteReference" data-dcnode-id="3611"><a data-dcnode-id="3612" href="#sdfootnote7sym" id="sdfootnote7anc"><span data-dcnode-id="3613" instrument_node="">7</span></a></sup><span data-dcnode-id="3610" instrument_node=""> Some words exist in other languages, but we do not have them in English. For instance, in China, there are five different words for shame, but in the English language, we only have one word for shame. Anthropologist Franz Boas studied the Inuit people of Baffin Island, Canada, in the late 1800s and noted that they had many different words for “snow.” In fact, it’s become a myth over the years that the Inuit have 50 different words for snow. In reality, as Laura Kelly points out, there are a number of Inuit languages, so this myth is problematic because it attempts to generalize to all of them.</span><sup class="import-EndnoteReference" data-dcnode-id="3607"><a data-dcnode-id="3608" href="#sdfootnote8sym" id="sdfootnote8anc"><span data-dcnode-id="3609" instrument_node="">8</span></a></sup><span data-dcnode-id="3606" instrument_node=""> Instead, the Eskimo-Aleut language tends to have long, complicated words that describe ideas; whereas, in English, we’d have a sentence to say the same thing. As such, the Eskimo-Aleut language probably has 100s of different words that can describe snow.</span></p><span data-dcnode-id="3604" instrument_node="">
</span><p class="import-p" data-dcnode-id="3595"><span data-dcnode-id="3603" instrument_node="">Analyzing the Hopi Native American language, Edward Sapir and Benjamin Lee Whorf discovered that there is not a difference between nouns and verbs.</span><sup class="import-EndnoteReference" data-dcnode-id="3600"><a data-dcnode-id="3601" href="#sdfootnote9sym" id="sdfootnote9anc"><span data-dcnode-id="3602" instrument_node="">9</span></a></sup><span data-dcnode-id="3599" instrument_node=""> To the Hopi people, their language showcases how their world and perceptions of the world are always in constant flux. The Hopi believe that everything is evolving and changing. Their conceptualization of the world is that there is continuous time. As Whorf wrote, “After a long and careful analysis the Hopi language is seen to contain no words, grammatical forms, construction or expressions that refer directly to what we call ‘time’, or to past, present or future.”</span><sup class="import-EndnoteReference" data-dcnode-id="3596"><a data-dcnode-id="3597" href="#sdfootnote10sym" id="sdfootnote10anc"><span data-dcnode-id="3598" instrument_node="">10</span></a></sup></p><span data-dcnode-id="3594" instrument_node="">
</span><p class="import-p" data-dcnode-id="3575"><span data-dcnode-id="3593" instrument_node="">A very popular theory that helps us understand how culture and language coexist is the </span><span class="import-l-rus" data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Sapir-</span></span><span class="import-l-rus" data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Worf</span></span><span class="import-l-rus" data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node=""> hypothesis</span></span><span data-dcnode-id="3586" instrument_node="">.</span><sup data-dcnode-id="3582"><span class="import-EndnoteReference" data-dcnode-id="3583"><a data-dcnode-id="3584" href="#sdfootnote11sym" id="sdfootnote11anc"><span data-dcnode-id="3585" instrument_node="">11</span></a></span></sup><span data-dcnode-id="3581" instrument_node=""> </span><span class="import-l-rus" data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">Edward Sapir and Benjamin Lee Whorf created this hypothesis to help us understand cultural differences in language use. The theory </span></span><span data-dcnode-id="3578" instrument_node="">suggests that language impacts perceptions by showing a culture’s worldview. The hypothesis is also seen as </span><span class="import-l-rus" data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">linguistic determinism, which is the perspective that language influences our thoughts.</span></span></p><span data-dcnode-id="3574" instrument_node="">
</span><p class="import-p" data-dcnode-id="3569"><span class="import-l-rus" data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">Sometimes, language has special rooted characteristics or linguistic relativity. Language can express not only our thoughts but our feelings as well. Language does not only represent things, but also how we feel about things. For instance, in the United States, most houses will have backyards. In Japan, due to limited space, most houses do not have backyards, and thus, it is not represented in their language. To the Japanese, they do not understand the concept of a backyard, and they don’t have a word for a backyard. All in all, language helps to describe our world and how we understand our world</span></span><span class="import-l-rus" data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">.</span></span></p><span data-dcnode-id="3568" instrument_node="">
</span><div class="textbox textbox--key-takeaways" data-dcnode-id="3545"><span data-dcnode-id="3567" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3562"><span data-dcnode-id="3566" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">Key Takeaways</span></p><span data-dcnode-id="3563" instrument_node="">
</span></header><span data-dcnode-id="3561" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3547"><span data-dcnode-id="3560" instrument_node="">
</span><ul data-dcnode-id="3549"><span data-dcnode-id="3559" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Instrumental functions explain that language can help us accomplish tasks, and regulatory function explains that language can help us control behavior.</span></li><span data-dcnode-id="3556" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">Interactional functions help us maintain information, and imaginative functions allow us to create worlds with others.</span></li><span data-dcnode-id="3553" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">When we talk with others, language can be personal, ritual, or cultural. Personal functions help us identify ourselves. Ritual functions of language involve words that we routinely say to others, such as “hello” or “goodbye.” Cultural functions of language help use describe the worldview or perspectives of culture.</span></li><span data-dcnode-id="3550" instrument_node="">
</span></ul><span data-dcnode-id="3548" instrument_node="">
</span></div><span data-dcnode-id="3546" instrument_node="">
</span></div><span data-dcnode-id="3544" instrument_node="">
</span><div class="textbox textbox--exercises" data-dcnode-id="3521"><span data-dcnode-id="3543" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3538"><span data-dcnode-id="3542" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">Exercises</span></p><span data-dcnode-id="3539" instrument_node="">
</span></header><span data-dcnode-id="3537" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3523"><span data-dcnode-id="3536" instrument_node="">
</span><ul data-dcnode-id="3525"><span data-dcnode-id="3535" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">Watch a clip of your favorite TV show and record how many statements are regulatory versus instrumental. Why do you think these differences exist? Do you think it would differ depending on the program? Why?</span></li><span data-dcnode-id="3532" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">Ask several classmates to describe themselves. Then, randomly read a set of descriptions to another classmate and ask them to identify who this person is. Discover if these personal characteristics are viewed by others or not. Determine why these differences might exist.</span></li><span data-dcnode-id="3529" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">Create a list of words that exist in English but are not found in other languages. Then, create a list of words that exist in other languages but not in English. Determine why those words might not exist in English or other cultures.</span></li><span data-dcnode-id="3526" instrument_node="">
</span></ul><span data-dcnode-id="3524" instrument_node="">
</span></div><span data-dcnode-id="3522" instrument_node="">
</span></div><span data-dcnode-id="3520" instrument_node="">
</span><h2 class="import-hd" data-dcnode-id="3517"><a data-dcnode-id="3519" id="_Toc45779740"></a><span data-dcnode-id="3518" instrument_node="">4.3 The Impact of Language</span></h2><span data-dcnode-id="3516" instrument_node="">
</span><div class="textbox textbox--learning-objectives" data-dcnode-id="3493"><span data-dcnode-id="3515" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="3510"><span data-dcnode-id="3514" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">Learning Objectives</span></p><span data-dcnode-id="3511" instrument_node="">
</span></header><span data-dcnode-id="3509" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="3495"><span data-dcnode-id="3508" instrument_node="">
</span><ol data-dcnode-id="3497"><span data-dcnode-id="3507" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">Understand how naming and identity can influence perceptions.</span></li><span data-dcnode-id="3504" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">Comprehend how language can impact affiliation with others.</span></li><span data-dcnode-id="3501" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Identify the difference between sexist and racist language.</span></li><span data-dcnode-id="3498" instrument_node="">
</span></ol><span data-dcnode-id="3496" instrument_node="">
</span></div><span data-dcnode-id="3494" instrument_node="">
</span></div><span data-dcnode-id="3492" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">By now, you can see that language influences how we make sense of the world. In this section, we will understand some of the ways that language can impact our perceptions and possibly our behavior. To be effective communicators, we need to realize the different ways that language can be significant and instrumental.</span></p><span data-dcnode-id="3489" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3486"><a data-dcnode-id="3488" id="_Toc45779741"></a><span data-dcnode-id="3487" instrument_node="">Naming and Identity</span></h3><span data-dcnode-id="3485" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3479"><span data-dcnode-id="3484" instrument_node="">New parents/guardians typically spend a great deal of time trying to pick just the right name for their newborn. We know that names can impact other people’s perceptions.</span><sup class="import-EndnoteReference" data-dcnode-id="3481"><a data-dcnode-id="3482" href="#sdfootnote12sym" id="sdfootnote12anc"><span data-dcnode-id="3483" instrument_node="">12</span></a></sup><span data-dcnode-id="3480" instrument_node=""> Our names impact how we feel and how we behave. For instance, if you heard that someone was named Stacy, you might think that person was female, nice, and friendly, and you would be surprised if that person turned out to be male, mean, and aggressive.</span></p><span data-dcnode-id="3478" instrument_node="">
</span><p class="import-p" data-dcnode-id="3469"><span data-dcnode-id="3477" instrument_node="">People with unusual names tend to have more emotional distress than those with common names.</span><sup class="import-EndnoteReference" data-dcnode-id="3474"><a data-dcnode-id="3475" href="#sdfootnote13sym" id="sdfootnote13anc"><span data-dcnode-id="3476" instrument_node="">13</span></a></sup><span data-dcnode-id="3473" instrument_node=""> Names impact our identity because others will typically have negative perceptions of unusual names or unique spellings of names. Names can change over time and can gain acceptance. For instance, the name Madison was not even considered a female first name until the movie “Splash” in the 1980s.</span><sup class="import-EndnoteReference" data-dcnode-id="3470"><a data-dcnode-id="3471" href="#sdfootnote14sym" id="sdfootnote14anc"><span data-dcnode-id="3472" instrument_node="">14</span></a></sup></p><span data-dcnode-id="3468" instrument_node="">
</span><p class="import-p" data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Some names are very distinctive, which also makes them memorable and recognizable. Think about musical artists or celebrities with unique names. It helps you remember them, and it helps you distinguish that person from others.</span></p><span data-dcnode-id="3465" instrument_node="">
</span><p class="import-p" data-dcnode-id="3456"><span data-dcnode-id="3464" instrument_node="">Some of the names encompass some cultural or ethnic identity. In the popular book, </span><em data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">Freakonomics,</span></em><span data-dcnode-id="3461" instrument_node=""> the authors showed a relationship between names and socioeconomic status.</span><sup class="import-EndnoteReference" data-dcnode-id="3458"><a data-dcnode-id="3459" href="#sdfootnote15sym" id="sdfootnote15anc"><span data-dcnode-id="3460" instrument_node="">15</span></a></sup><span data-dcnode-id="3457" instrument_node=""> They discover that a popular name usually starts with high socioeconomic families, and then it becomes popular with lower socioeconomic families. Hence, it is very conceivable to determine the socioeconomic status of people you associate with based on their birth date and name. Figure 4.5 shows some of the more popular baby names for girls and boys, along with names that are non-binary.</span></p><span data-dcnode-id="3455" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3451" style="width: 1430px"><img alt="Popular male names: Liam, Noah, William, James, Oliver, Benjamin, Elijah, Lucas, Mason, Logan. Female names: Emma, Olivia, Ava, Isabella, Sophia, Charlotte, Mia, Amelia, Harper, Evelyn. Non binary names: Sam, Alex, Emery, Corey, Ari, Cameron, Frankie, Remi, River, and Skyler." data-dcnode-id="3454" height="959" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/app/uploads/sites/246/2021/05/image5-3.jpeg&amp;raw" width="1430"><figcaption class="wp-caption-text" data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Figure 4.5 Popular Baby Names</span></figcaption></figure><span data-dcnode-id="3450" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3447"><a data-dcnode-id="3449" id="_Toc45779742"></a><span data-dcnode-id="3448" instrument_node="">Affiliation</span></h3><span data-dcnode-id="3446" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3435"><span data-dcnode-id="3445" instrument_node="">When we want others to associate with us or have an </span><span class="import-keyterm" data-dcnode-id="3441"><button aria-describedby="80-366" class="glossary-term" data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">affiliation</span></button><span data-dcnode-id="3442" instrument_node=""> </span></span><span data-dcnode-id="3440" instrument_node="">with us, we might change the way we speak and the words we use. All of those things can impact how other people relate to us. Researchers found that when potential romantic partners employed the same word choices regarding pronouns and prepositions, then interest also increased. At the same time, couples that used similar word choices when texting each other significantly increased their relationship duration.</span><sup class="import-EndnoteReference" data-dcnode-id="3437"><a data-dcnode-id="3438" href="#sdfootnote16sym" id="sdfootnote16anc"><span data-dcnode-id="3439" instrument_node="">16</span></a></sup><span data-dcnode-id="3436" instrument_node=""> This study implies that we often inadvertently mimic other people’s use of language when we focus on what they say.</span></p><span data-dcnode-id="3434" instrument_node="">
</span><p class="import-p" data-dcnode-id="3420"><span data-dcnode-id="3433" instrument_node="">If you have been in a romantic relationship for a long period, you might create special expressions or jargon for the other person, and that specialized vocabulary can create greater closeness and understanding. The same line of thinking occurs for groups in a gang or persons in the military. If we adapt to the other person’s communication style or </span><span class="import-keyterm" data-dcnode-id="3430"><button aria-describedby="80-491" class="glossary-term" data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">converge</span></button></span><span data-dcnode-id="3429" instrument_node="">, then we can also impact perceptions of affiliation. Research has shown that people who have similar speech also have more positive feelings for each other.</span><sup class="import-EndnoteReference" data-dcnode-id="3426"><a data-dcnode-id="3427" href="#sdfootnote17sym" id="sdfootnote17anc"><span data-dcnode-id="3428" instrument_node="">17</span></a></sup><span data-dcnode-id="3425" instrument_node=""> However, speech can also work in the opposite direction when we </span><span class="import-keyterm" data-dcnode-id="3422"><button aria-describedby="80-529" class="glossary-term" data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">diverge</span></button></span><span data-dcnode-id="3421" instrument_node="">, or when we communicate in a very different fashion. For instance, a group from another culture might speak the same dialect, even though they can speak English, in order to create distance and privacy from others.</span></p><span data-dcnode-id="3419" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3416"><a data-dcnode-id="3418" id="_Toc45779743"></a><span data-dcnode-id="3417" instrument_node="">Sexism and Racism</span></h3><span data-dcnode-id="3415" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3408"><span data-dcnode-id="3414" instrument_node="">Before discussing the concepts of sexism and racism, we must understand the term “bias.” </span><span class="import-keyterm" data-dcnode-id="3410"><button aria-describedby="80-412" class="glossary-term" data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">Bias</span></button><span data-dcnode-id="3411" instrument_node=""> </span></span><span data-dcnode-id="3409" instrument_node="">is an attitude that is not objective or balanced, prejudiced, or the use of words that intentionally or unintentionally offend people or express an unfair attitude concerning a person’s race, ethnicity, sexual orientation, age, disability, or illness. We’ll explore more on the issue of biased language later in this chapter.</span></p><span data-dcnode-id="3407" instrument_node="">
</span><p class="import-p" data-dcnode-id="3391"><span class="import-keyterm" data-dcnode-id="3404"><button aria-describedby="80-936" class="glossary-term" data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">Sexism</span></button></span><span data-dcnode-id="3403" instrument_node=""> or bias against others based on their sex can come across in language. </span><span class="import-keyterm" data-dcnode-id="3400"><button aria-describedby="80-938" class="glossary-term" data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">Sexist language</span></button></span><span data-dcnode-id="3399" instrument_node=""> can be defined as “words, phrases, and expressions that unnecessarily differentiate between females and males or exclude, trivialize, or diminish either sex.”</span><sup class="import-EndnoteReference" data-dcnode-id="3396"><a data-dcnode-id="3397" href="#sdfootnote18sym" id="sdfootnote18anc"><span data-dcnode-id="3398" instrument_node="">18</span></a></sup><span data-dcnode-id="3395" instrument_node=""> Language can impact how we feel about ourselves and others. For instance, there is a magazine called </span><em data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">Working Mother</span></em><span data-dcnode-id="3392" instrument_node="">, but there is not one called “Working Father.” Even though the reality is that many men who work also have families and are fathers, there are no words that tend to distinguish them from other working men. Whereas, women are distinguished when they both work and are mothers compared to other women who solely work and also compared to women who are solely mothers and/or wives.</span></p><span data-dcnode-id="3390" instrument_node="">
</span><p class="import-p" data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">Think about how language has changed over the years. We used to have occupations that were highly male-dominated in the workplace and had words to describe them. For instance, policemen, firemen, and chairmen are now police officers, firefighters, and chairpersons. The same can also be said for some female-dominated occupations. For instance, stewardess, secretary, and waitress have been changed to include males and are often called flight attendants, office assistants, and servers. Thus, to eliminate sexism, we need to be cautious of the word choices we use when talking with others. Sexist language will impact perceptions, and people might be swayed about a person’s capability based on the word choices.</span></p><span data-dcnode-id="3387" instrument_node="">
</span><p class="import-p" data-dcnode-id="3376"><span data-dcnode-id="3386" instrument_node="">Similarly,</span><span class="import-keyterm" data-dcnode-id="3382"><span data-dcnode-id="3385" instrument_node=""> </span><button aria-describedby="80-850" class="glossary-term" data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">racism</span></button></span><span data-dcnode-id="3381" instrument_node=""> is the bias people have towards others of a different race. </span><span class="import-keyterm" data-dcnode-id="3378"><button aria-describedby="80-852" class="glossary-term" data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">Racist language</span></button></span><span data-dcnode-id="3377" instrument_node=""> conveys that a racial group is superior or better than another race. Some words in English have racial connotations. Aaron Smith-McLallen, Blair T. Johnson, John Dovidio, and Adam Pearson wrote:</span></p><span data-dcnode-id="3375" instrument_node="">
</span><blockquote data-dcnode-id="3367"><span data-dcnode-id="3374" instrument_node="">
</span><p class="import-p" data-dcnode-id="3369"><span data-dcnode-id="3373" instrument_node="">In the United States and many other cultures, the color white often carries more positive connotations than the color black… Terms such as “Black Monday,” “Black Plague”, “black cats” and the “black market” all have negative connotations, and literature, television, and movies have traditionally portrayed heroes in white and villains in black. The empirical work of John E. Williams and others throughout the 1960s demonstrated that these positive and negative associations with the colors black and white, independent of any explicit connection to race, were evident among Black and White children as young as 3 years old … as well as adults.</span><sup class="import-EndnoteReference" data-dcnode-id="3370"><a data-dcnode-id="3371" href="#sdfootnote19sym" id="sdfootnote19anc"><span data-dcnode-id="3372" instrument_node="">19</span></a></sup></p><span data-dcnode-id="3368" instrument_node="">
</span></blockquote><span data-dcnode-id="3366" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">Currently, there is an ongoing debate in the United States about whether President Trump’s use of the phrase “Chinese Virus” when referring to the coronavirus is racially insensitive. The argument for its racial insensitivity is that the President is specifically using the term as an “other” technique to allow his followers to place blame on Chinese people for the coronavirus. Unsurprisingly, as a result of the use of the phase “Chinese Virus,” there have been numerous violent attacks against individuals of Asian descent within the United States. Notice that we don’t say people of Chinese descent here. The people that are generally inflamed by this rhetoric don’t take the time to distinguish among people they label as “other.”</span></p><span data-dcnode-id="3363" instrument_node="">
</span><p class="import-p" data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">It is important to note that many words do not imply any type of sexual or racial connotations. However, some people might use it to make judgments or expectations of others. For example, when describing a bad learning experience, the student might say “Black professor” or “female student” as opposed to just saying the student and professor argued. These descriptors can be problematic and sometimes not even necessary in the conversation. When using those types of words, it can create slight factors of sexism/racism.</span></p><span data-dcnode-id="3360" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="3357"><a data-dcnode-id="3359" id="_Toc45779744"></a><span data-dcnode-id="3358" instrument_node="">Muted Group Theory</span></h3><span data-dcnode-id="3356" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="3346"><span data-dcnode-id="3355" instrument_node="">Muted group theory was initially developed to explain the way humans, specifically men and women, communicate.</span><sup class="import-EndnoteReference" data-dcnode-id="3352"><a data-dcnode-id="3353" href="#sdfootnote20sym" id="sdfootnote20anc"><span data-dcnode-id="3354" instrument_node="">20</span></a></sup><span data-dcnode-id="3351" instrument_node=""> The theory claims that man-made communication is, just that, “man”-made. Similar to standpoint theory, muted group theory argues that the dominant members of society, typically men, create a language and system of communication that subverts or reduces other groups, specifically women. Muted group theory has been described as feminist theory, and even this nomenclature is a great example of the claims that the theory is making.</span><sup class="import-EndnoteReference" data-dcnode-id="3348"><a data-dcnode-id="3349" href="#sdfootnote21sym" id="sdfootnote21anc"><span data-dcnode-id="3350" instrument_node="">21</span></a></sup><span data-dcnode-id="3347" instrument_node=""> The term “feminist” exists in a male-dominated culture and language and connotes a negative conception of that which it is used to describe. Even the fact that there is not a popular term used to describe those who fight for the rights and equal status of men, points to the fact that there is a problem. The word “feminist” exists because it deviates from what is perceived as the “norm.” Even the terminology we use to describe women, and a theory that calls attention to their subversion, we see as even more subversion.</span></p><span data-dcnode-id="3345" instrument_node="">
</span><p class="import-p" data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Figure 4.6 represents the basic conceptualization of muted group theory. The blue circle represents the dominant group, and the solid arrow points to their perception of reality. Meanwhile, the pink circle represents the muted group, and the dashed line represents their perception of reality. Often what happens in society is that the dominant group’s perception of reality is just seen as reality. As such, the muted group’s perception of reality is seen as less than or more fanciful than the dominant group’s perception. In reality, the muted group often sees things that really do exist in a society that the dominant group either cannot see or chooses not to see based on its position in society as the dominant group.</span></p><span data-dcnode-id="3342" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3338" style="width: 447px"><img alt="a circle labeled Dominant Group pointing to a triangle labeled Perception of Reality; on the right another circle is labeled Muted group with a dotted line pointing to the triangle." class="" data-dcnode-id="3341" height="385" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/app/uploads/sites/246/2021/05/image6-2.jpeg&amp;raw" width="447"><figcaption class="wp-caption-text" data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Figure 4.6 Muted Group Theory</span></figcaption></figure><span data-dcnode-id="3337" instrument_node="">
</span><p class="import-p" data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">One area in our society where we can examine muted group theory is about socioeconomic status. Here are just a few statements that wealthy people have made:</span></p><span data-dcnode-id="3334" instrument_node="">
</span><ul data-dcnode-id="3314"><span data-dcnode-id="3333" instrument_node="">
</span><li class="import-p" data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">When talking about a couple planning their wedding, “I feel sorry for them, because they have a budget.”</span></li><span data-dcnode-id="3330" instrument_node="">
</span><li class="import-p" data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">“What do you mean, you don’t know if you should get them? Whenever I want new clothes, I just ask my daddy for the money card.”</span></li><span data-dcnode-id="3327" instrument_node="">
