</span><p class="import-p" data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">One specific type of biased language is called spin, or the manipulation of language to achieve the most positive interpretation of words, to gain political advantage, or to deceive others. In essence, people utilizing spin can make language choices that frame themselves or their clients in a positive way.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="1321"><a data-dcnode-id="1323" id="_Toc45779750"></a><span data-dcnode-id="1322" instrument_node="">Ambiguous Language</span></h3><span data-dcnode-id="1320" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1315"><span class="import-keyterm" data-dcnode-id="1317"><button aria-describedby="80-372" class="glossary-term" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Ambiguous language</span></button></span><span data-dcnode-id="1316" instrument_node=""> is language that can have various meanings. Google Jay Leno’s headlines videos. Sometimes he uses advertisements that are very abstract. For instance, there is a restaurant ad that says, “People are our best ingredient!” What comes to mind when you hear that? Are they actually using people in their food? Or do they mean their customer service is what makes their restaurant notable? When we are trying to communicate with others, it is important that we are clear in our language. We need others to know exactly what we mean and not imply meaning. That is why you need to make sure that you don’t use ambiguous language.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="1311"><a data-dcnode-id="1313" id="_Toc45779751"></a><span data-dcnode-id="1312" instrument_node="">Euphemisms</span></h3><span data-dcnode-id="1310" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1305"><span class="import-keyterm" data-dcnode-id="1307"><button aria-describedby="80-577" class="glossary-term" data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Euphemisms</span></button></span><span data-dcnode-id="1306" instrument_node=""> also make language unclear. People use euphemisms as a means of saying something more politely or less bluntly. For instance, instead of telling your parents/guardians that you failed a test, you might say that you did sub-optimal. People use euphemisms because it sounds better, and it seems like a better way to express how they feel. People use euphemisms all the time. For instance, instead of saying this person died, they might say the person passed away. Instead of saying that someone farted, you might say someone passed gas.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="1301"><a data-dcnode-id="1303" id="_Toc45779752"></a><span data-dcnode-id="1302" instrument_node="">Relative Language</span></h3><span data-dcnode-id="1300" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1295"><span class="import-keyterm" data-dcnode-id="1297"><button aria-describedby="80-884" class="glossary-term" data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Relative language</span></button></span><span data-dcnode-id="1296" instrument_node=""> depends on the person communicating. People’s backgrounds vary. Hence, their perspectives will vary. I know a college professor that complains about her salary. However, other college professors would love to have a salary like hers. In other words, our language is based on our perception of our experiences. For instance, if someone asked you what would be your ideal salary, would it be based on your previous salary? Your parents? Your friends? Language is relative because of that reason. If I said, “Let’s go eat at an expensive restaurant,” what would be expensive for you? For some person, it would be $50, for another, $20, for someone else it might be $10, and yet there might be someone who would say $5 is expensive!</span></p><span data-dcnode-id="1294" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Static Evaluation</span></h3><span data-dcnode-id="1291" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1285"><span data-dcnode-id="1290" instrument_node="">Often times, we think that people and things do not change, but they do change. If you ever watch afternoon talk shows, you might see people who go through amazing transformations, perhaps through weight loss, a makeover, or surgery or some sort. These people changed. </span><span class="import-keyterm" data-dcnode-id="1287"><button aria-describedby="80-980" class="glossary-term" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Static evaluation</span></button></span><span data-dcnode-id="1286" instrument_node=""> states that things are not constant. Things vary over time, and our language should be representative of that change. For instance, Max is bad. It is important to note that Max might be bad at one time or may have displayed bad behavior, but it may not represent how Max will be in the future.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><h2 class="import-MindfulnessActivity" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Mindfulness Activity</span></h2><span data-dcnode-id="1281" instrument_node="">
</span><p class="import-MindfulnessActivityText" data-dcnode-id="1278"><img alt="image" class="alignleft" data-dcnode-id="1280" height="128px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milnepublishing.geneseo.edu/app/uploads/sites/246/2021/05/image8-5.jpeg&amp;raw" width="128px"><span data-dcnode-id="1279" instrument_node="">For the entire day, we want you to take a minute to pause before you text or email someone. When we text or email someone, we typically just put our thoughts together in a quick fashion. Take a second to decide how you plan to use your words. Think about which words would be best to get our message across effectively. After you have typed your message, take another few minutes to reread the message. Be mindful of how others might interpret your message. Would they read it at face value, or would they misinterpret the message because there is a lack of nonverbal messages? Do you need to add emojis or GIFS to change how the message is conveyed?</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p class="import-MindfulnessActivityText" data-dcnode-id="1271"><span data-dcnode-id="1276" instrument_node="">Researchers have found that when college students can address their emotions and are mindful of their feelings, it can enhance written communication with others.</span><sup class="import-EndnoteReference" data-dcnode-id="1273"><a data-dcnode-id="1274" href="#sdfootnote31sym" id="sdfootnote31anc"><span data-dcnode-id="1275" instrument_node="">31</span></a></sup><span data-dcnode-id="1272" instrument_node=""> After doing this activity, try to be more mindful of the things that you send to other people.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><div class="textbox textbox--key-takeaways" data-dcnode-id="1250"><span data-dcnode-id="1269" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="1264"><span data-dcnode-id="1268" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Key Takeaways</span></p><span data-dcnode-id="1265" instrument_node="">
</span></header><span data-dcnode-id="1263" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="1252"><span data-dcnode-id="1262" instrument_node="">
</span><ul data-dcnode-id="1254"><span data-dcnode-id="1261" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Formal language is more careful and more mannered than everyday speech, whereas informal language is appropriate in casual conversation.</span></li><span data-dcnode-id="1258" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Informal language includes (1) Jargon, or technical language; (2) Colloquialism, or informal expressions; (3) Slang, or nonstandard language; (4) Idioms, or expressions or figures of speech; (5) clichés, or sayings that are overused and predictable.</span></li><span data-dcnode-id="1255" instrument_node="">
</span></ul><span data-dcnode-id="1253" instrument_node="">
</span></div><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">
</span><div class="textbox textbox--exercises" data-dcnode-id="1226"><span data-dcnode-id="1248" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="1243"><span data-dcnode-id="1247" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Exercises</span></p><span data-dcnode-id="1244" instrument_node="">
</span></header><span data-dcnode-id="1242" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="1228"><span data-dcnode-id="1241" instrument_node="">
</span><ul data-dcnode-id="1230"><span data-dcnode-id="1240" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Create a list of jargon or slang words that you use and what they mean. Determine if there are differences between how words are used now compared to the past.</span></li><span data-dcnode-id="1237" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Create a list of colloquialisms or idioms. Find an international student and see if these words make sense. What was confusing or unclear?</span></li><span data-dcnode-id="1234" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Find clichés that are used in other cultures. Determine if you can find an American equivalent of each cliché.</span></li><span data-dcnode-id="1231" instrument_node="">
</span></ul><span data-dcnode-id="1229" instrument_node="">
</span></div><span data-dcnode-id="1227" instrument_node="">
</span></div><span data-dcnode-id="1225" instrument_node="">
</span><h2 class="import-ah" data-dcnode-id="1222"><a data-dcnode-id="1224" id="_Toc45779754"></a><span data-dcnode-id="1223" instrument_node="">4.5 Improving Verbal Communication</span></h2><span data-dcnode-id="1221" instrument_node="">
</span><div class="textbox textbox--learning-objectives" data-dcnode-id="1198"><span data-dcnode-id="1220" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Learning Objectives</span></p><span data-dcnode-id="1216" instrument_node="">
</span></header><span data-dcnode-id="1214" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="1200"><span data-dcnode-id="1213" instrument_node="">
</span><ol data-dcnode-id="1202"><span data-dcnode-id="1212" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Examine ways to improve your vocabulary.</span></li><span data-dcnode-id="1209" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Increase your awareness and adaptation of language.</span></li><span data-dcnode-id="1206" instrument_node="">
</span><li class="import-LearningOutcomeList" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Realize the importance of checking for understanding.</span></li><span data-dcnode-id="1203" instrument_node="">
</span></ol><span data-dcnode-id="1201" instrument_node="">
</span></div><span data-dcnode-id="1199" instrument_node="">
</span></div><span data-dcnode-id="1197" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">In this chapter, you have learned the importance of language. In this last section, we will discuss ways to improve your verbal communication skills. To be a great interpersonal communicator, it is extremely important that you also know how to use language in the most effective way.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="1191"><a data-dcnode-id="1193" id="_Toc45779755"></a><span data-dcnode-id="1192" instrument_node="">Improving Language Skills</span></h3><span data-dcnode-id="1190" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1184"><span data-dcnode-id="1189" instrument_node="">From an early age, you probably had words that you used most frequently because you were familiar with those words. As you get older and become more educated, your vocabulary has probably expanded to help you become more successful. Language is used to help express our feelings, intentions, and comprehension of others.</span><sup class="import-EndnoteReference" data-dcnode-id="1186"><a data-dcnode-id="1187" href="#sdfootnote32sym" id="sdfootnote32anc"><span data-dcnode-id="1188" instrument_node="">32</span></a></sup><span data-dcnode-id="1185" instrument_node=""> An extensive vocabulary is a keen predictor of someone’s social status, education, and profession. Whether you like it or not, the words we use and the grammatical structure of how we use those words can impact our standing in school, work, and society. Here are some tips to help you improve your vocabulary.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><h4 class="import-ch" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Use Repetition</span></h4><span data-dcnode-id="1180" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">First, be sure to use repetition. To become familiar with a word, you need to see it over and over again. Besides, you need to use it in conversations over and over again. The more times you repeat the word, the more likely you will memorize it, and it will become part of your daily repertoire.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><h4 class="import-ch" data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Group Similar Words Together</span></h4><span data-dcnode-id="1174" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Second, group similar words together. You should never learn vocabulary by looking at a list of words. Think of words as different pieces of a jigsaw puzzle. It doesn’t make sense to look at each piece of the puzzle individually. Rather, you need to fit them together to see the whole picture. The same thing should occur with words. You should memorize words that have similarities in some way. For instance, create a vocabulary around a theme, such as music, or an adjective, such as beautiful.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><h4 class="import-ch" data-dcnode-id="1168"><span class="import-keyterm" data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Build Your Vocabulary</span></span></h4><span data-dcnode-id="1167" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1160"><span data-dcnode-id="1166" instrument_node="">Third, it is essential to make vocabulary that is personal to you. </span><a data-dcnode-id="1165" id="_Hlk35156519"></a><span class="import-keyterm" data-dcnode-id="1162"><button aria-describedby="80-1048" class="glossary-term" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Vocabulary</span></button></span><span data-dcnode-id="1161" instrument_node=""> can be defined as all the words understood by a person or group of people. As early as four months, a baby can start to distinguish between language sounds and other sounds. According to David Crystal, language acquisition happens quite rapidly:</span></p><span data-dcnode-id="1159" instrument_node="">
</span><ul data-dcnode-id="1145"><span data-dcnode-id="1158" instrument_node="">
</span><li class="import-p-0" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">By age 2, people can recognize and speak 200 words.</span></li><span data-dcnode-id="1155" instrument_node="">
</span><li class="import-p-0" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">By age 3, people can recognize and speak about 2000 words.</span></li><span data-dcnode-id="1152" instrument_node="">
</span><li class="import-p-0" data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">By age 5, people can recognize and speak about 4,000 words.</span><sup class="import-EndnoteReference" data-dcnode-id="1148"><a data-dcnode-id="1149" href="#sdfootnote33sym" id="sdfootnote33anc"><span data-dcnode-id="1150" instrument_node="">33</span></a></sup></li><span data-dcnode-id="1146" instrument_node="">
</span></ul><span data-dcnode-id="1144" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">That means your average infant to toddler is learning three to four new words every day. Infants are hardwired to learn a language. If you want to ensure your child can speak multiple languages, it’s best to expose them to multiple languages during this crucial developmental cycle. Even though we start as infants, we continue to improve our vocabularies right through middle age:</span></p><span data-dcnode-id="1141" instrument_node="">
</span><ul data-dcnode-id="1121"><span data-dcnode-id="1140" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Most adult native test-takers range from 20,000–35,000 words</span></li><span data-dcnode-id="1137" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Average native test-takers of age 8 already know 10,000 words</span></li><span data-dcnode-id="1134" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Average native test-takers of age 4 already know 5,000 words</span></li><span data-dcnode-id="1131" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Adult native test-takers learn almost 1 new word a day until middle age</span></li><span data-dcnode-id="1128" instrument_node="">
</span><li class="import-BulletedList" data-dcnode-id="1123"><span data-dcnode-id="1127" instrument_node="">Adult test-taker vocabulary growth basically stops at middle age</span><sup class="import-EndnoteReference" data-dcnode-id="1124"><a data-dcnode-id="1125" href="#sdfootnote34sym" id="sdfootnote34anc"><span data-dcnode-id="1126" instrument_node="">34</span></a></sup></li><span data-dcnode-id="1122" instrument_node="">
</span></ul><span data-dcnode-id="1120" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">As you can see, most native English-speaking adults have fairly substantial vocabularies, but we do see a drop in new language acquisition as people enter into their middle age. As such, it’s important to keep learning.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p class="import-p" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">One way to keep learning is to find words that have meaning for you. If you have ever heard a story about survival from someone who has gone through something life-changing, they probably used words that touched you and helped you to connect to the story. In the same fashion, you should find words that can relate to your story. When we find words that have personal meaning to us, we can use those words more effectively in our own vocabulary. Here are some essential tips for building your vocabulary:</span></p><span data-dcnode-id="1114" instrument_node="">
</span><ol data-dcnode-id="1094"><span data-dcnode-id="1113" instrument_node="">
</span><li class="import-NumberedList0" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Keep a journal of words you don’t know.</span></li><span data-dcnode-id="1110" instrument_node="">
</span><li class="import-NumberedList0" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">If you don’t know a word, look it up in a dictionary.</span></li><span data-dcnode-id="1107" instrument_node="">
</span><li class="import-NumberedList0" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Learn to recognize both Latin and Greek roots of words.</span></li><span data-dcnode-id="1104" instrument_node="">
</span><li class="import-NumberedList0" data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Play vocabulary games (e.g., anagrams, Boggle, crossword puzzles, scrabble, etc.).</span></li><span data-dcnode-id="1101" instrument_node="">
</span><li class="import-NumberedList0" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Make synonym and antonym word lists.</span></li><span data-dcnode-id="1098" instrument_node="">
</span><li class="import-NumberedList0" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Take a writing and/or editing course.</span></li><span data-dcnode-id="1095" instrument_node="">
</span></ol><span data-dcnode-id="1093" instrument_node="">
</span><h4 class="import-ch" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Read</span></h4><span data-dcnode-id="1090" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Lastly, you should read regularly. It doesn’t matter what you read. As long as you are reading, you will probably come across words that you are unfamiliar with. When you do come across a word you don’t know, take the time to look it up. This practice is especially important when reading academic works because they are often full of ten-thousand-dollar words. Next time you read and run across a word that you don’t know, be sure to find the definition so that you can comprehend what is being said.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p class="import-p" data-dcnode-id="1079"><span data-dcnode-id="1086" instrument_node="">We would also recommend reading articles and books that stretch you. Don’t just read books like the </span><em data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Twilight</span></em><span data-dcnode-id="1083" instrument_node=""> and </span><em data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Harry Potter</span></em><span data-dcnode-id="1080" instrument_node=""> because those are written on a junior high or middle-school reading level.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="1075"><a data-dcnode-id="1077" id="_Toc45779756"></a><span data-dcnode-id="1076" instrument_node="">Increase Your Awareness and Adaptation of Language</span></h3><span data-dcnode-id="1074" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1060"><span data-dcnode-id="1073" instrument_node="">After learning to improve your vocabulary, it’s also important to increase language awareness and adaptation. When we talk about </span><span class="import-keyterm" data-dcnode-id="1070"><button aria-describedby="80-726" class="glossary-term" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">language awareness</span></button></span><span data-dcnode-id="1069" instrument_node="">, we are referring to a person’s ability to be mindful and sensitive to all functions and forms of language.</span><sup class="import-EndnoteReference" data-dcnode-id="1066"><a data-dcnode-id="1067" href="#sdfootnote35sym" id="sdfootnote35anc"><span data-dcnode-id="1068" instrument_node="">35</span></a></sup><span data-dcnode-id="1065" instrument_node=""> For our purposes, we define </span><span class="import-keyterm" data-dcnode-id="1062"><button aria-describedby="80-724" class="glossary-term" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">language adaptation</span></button></span><span data-dcnode-id="1061" instrument_node=""> as the ability to alter one’s linguistic choices in a communicatively competent manner. As such, it’s not just about being aware of language that leads to effective interpersonal interactions, but our ability to adapt our linguistic choices with different people to maximize the effectiveness of our interpersonal communication.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p class="import-p" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">There are a couple of ways that people can increase their language awareness and adaptation. The first way is to engage in meaningful interpersonal communication with someone different from you. This person can be from a different country or different region of the country from you. When you speak to someone very different from you, you might notice how they use language differently or how they prefer certain words over others.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p class="import-p" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Another way might be to watch a foreign film. Check out different international films that have been nominated for an Academy Award. Most of them will be dubbed in English or have English subtitles. Pay attention to how the characters communicate with each other to create meaning. Does it give you an appreciation for how you speak?</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p class="import-p" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Lastly, spend some time with a small child, preferably under the age of five. Pay attention to how the child communicates with you versus others (e.g., their friends, parents/guardians, siblings). Children under five are still acquiring words and learning to talk. When you communicate with someone who has a very limited vocabulary, it might help you see how you can adapt your language so that they will understand you.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><h3 class="import-bh" data-dcnode-id="1047"><a data-dcnode-id="1049" id="_Toc45779757"></a><span data-dcnode-id="1048" instrument_node="">Check for Understanding</span></h3><span data-dcnode-id="1046" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="1040"><span data-dcnode-id="1045" instrument_node="">As a speaker, you want to know that the receiver of your message understood what you said. This concept is also known as checking for understanding or verifying what has been said is also understood.</span><sup class="import-EndnoteReference" data-dcnode-id="1042"><a data-dcnode-id="1043" href="#sdfootnote36sym" id="sdfootnote36anc"><span data-dcnode-id="1044" instrument_node="">36</span></a></sup><span data-dcnode-id="1041" instrument_node=""> Even if a person is smiling and nodding at you when you talk, it does not necessarily mean that they are paying attention to everything. They might be trying to be polite and/or friendly. The best way to check for understanding is to use the acronym: TAP. Think of communication like a tap dance; if you don’t hear any tapping, would it really be a tap dance? The same thing can be applied to communication. Did you communicate if the other person didn’t understand you or get what you were trying to say?</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p class="import-p" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">First, the T in TAP means to talk first. In other words, you explicitly present all the content. As you are talking, you are also trying to make sure that the other person is listening to you talk.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p class="import-p" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Second, the A in TAP stands for ask questions. After you talked to the person, try to ask specific questions. Rather than saying, “did you hear me?” or “were you listening, which are both yes/no questions, it would be more beneficial to ask, “what did I just say?” or “what did you hear me say?”</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p class="import-p" data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Third, the P in TAP means to be prepared to listen. Listen carefully to what the other person says. It is during this phase that you can see if they understood your message. Was the message correct? What emotions are they displaying after you said the message and asked questions? If we don’t ask questions, then we can’t be sure that the message was received effectively.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><div class="textbox textbox--key-takeaways" data-dcnode-id="1007"><span data-dcnode-id="1029" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Key Takeaways</span></p><span data-dcnode-id="1025" instrument_node="">
</span></header><span data-dcnode-id="1023" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="1009"><span data-dcnode-id="1022" instrument_node="">
</span><ul data-dcnode-id="1011"><span data-dcnode-id="1021" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">The first part of this section provided several different ways to help you improve vocabulary (e.g., use repetition, group like words together, build your vocabulary, and read).</span></li><span data-dcnode-id="1018" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Further and increase awareness (a person’s ability to be mindful and sensitive to all functions and forms of language) and adaptation of language (the ability to alter one’s linguistic choices in a communicatively competent manner).</span></li><span data-dcnode-id="1015" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">It’s important to remember the three basic steps to ensure understanding: T (talk first), A (ask questions), and P (prepare to listen).</span></li><span data-dcnode-id="1012" instrument_node="">
</span></ul><span data-dcnode-id="1010" instrument_node="">
</span></div><span data-dcnode-id="1008" instrument_node="">
</span></div><span data-dcnode-id="1006" instrument_node="">
</span><div class="textbox textbox--exercises" data-dcnode-id="975"><span data-dcnode-id="1005" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="1000"><span data-dcnode-id="1004" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Exercises</span></p><span data-dcnode-id="1001" instrument_node="">
</span></header><span data-dcnode-id="999" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="977"><span data-dcnode-id="998" instrument_node="">
</span><ul data-dcnode-id="979"><span data-dcnode-id="997" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Go through the various key terms within this chapter. Did you know all of the definitions before reading this chapter? Which terms did you find difficult to understand? Why?</span></li><span data-dcnode-id="994" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="984"><span data-dcnode-id="993" instrument_node="">Read a speech from either </span><a class="rId18" data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vsotd.com/"><span class="import-Hyperlink" data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Vital Speeches of the Day</span></span></a><span data-dcnode-id="989" instrument_node=""> or </span><a class="rId19" data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanrhetoric.com/"><span class="import-Hyperlink" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">American Rhetoric</span></span></a><span data-dcnode-id="985" instrument_node="">. After reading/watching a speech, find a video where the speaker was interviewed. Watch how the speaker sounds when both giving a speech and when answering questions. Analyze the speaker’s use of both language awareness and adaptation.</span></li><span data-dcnode-id="983" instrument_node="">
</span><li class="import-KeyTakeawayExerciseList" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Find someone who does not speak English as their first language. During your interaction with that person, put into practice the TAP Method for understanding. How easy was it for you to understand this other person? Why? How did it feel to use the TAP method? Were you effective during your interpersonal interaction? Why?</span></li><span data-dcnode-id="980" instrument_node="">
</span></ul><span data-dcnode-id="978" instrument_node="">
</span></div><span data-dcnode-id="976" instrument_node="">
</span></div><span data-dcnode-id="974" instrument_node="">
</span><div class="textbox textbox--examples" data-dcnode-id="668"><span data-dcnode-id="973" instrument_node="">
</span><header class="textbox__header" data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">
</span><p class="textbox__title" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Key Terms</span></p><span data-dcnode-id="969" instrument_node="">
</span></header><span data-dcnode-id="967" instrument_node="">
</span><div class="textbox__content" data-dcnode-id="670"><span data-dcnode-id="966" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="963"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">abstract</span></strong></p><span data-dcnode-id="962" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Refers to words that relate to ideas or concepts that exist only in your mind and do not represent a tangible object.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="956"><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">abstraction ladder</span></strong></p><span data-dcnode-id="955" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">A diagram that explains the process of abstraction.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="949"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">affiliation</span></strong></p><span data-dcnode-id="948" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">A connection or association with others.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="942"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">ambiguous language</span></strong></p><span data-dcnode-id="941" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Language that has multiple meanings.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="935"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">bias</span></strong></p><span data-dcnode-id="934" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">An attitude that is not objective or balanced, prejudiced, or the use of words that intentionally or unintentionally offend people or express an unfair attitude concerning a person’s race, ethnicity, sexual orientation, age, disability, or illness.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="928"><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">biased language</span></strong></p><span data-dcnode-id="927" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Language that shows preference in favor of or against a certain point-of-view, shows prejudice, or is demeaning to others.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="921"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">buzz word</span></strong></p><span data-dcnode-id="920" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Informal word or jargon used among a particular group of people.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="914"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">cliché</span></strong></p><span data-dcnode-id="913" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Expression that has been so overused that it has lost its original meaning.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="907"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">colloquialism</span></strong></p><span data-dcnode-id="906" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Informal expression used in casual conversation that is often specific to certain dialects or geographic regions of a country.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="900"><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">connotation</span></strong></p><span data-dcnode-id="899" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">What a word suggests or implies; connotations give words their emotional impact.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="893"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">converge</span></strong></p><span data-dcnode-id="892" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Adapting your communication style to the speaker to be similar.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="886"><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">denotation</span></strong></p><span data-dcnode-id="885" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">The dictionary definition or descriptive meaning of a word.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="879"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">discourse</span></strong></p><span data-dcnode-id="878" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Spoken or written discussion of a subject.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="872"><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">diverge</span></strong></p><span data-dcnode-id="871" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Adapting your communication style to the speaker to be drastically different.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="865"><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">euphemism</span></strong></p><span data-dcnode-id="864" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Replacing blunt words with more polite words.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="858"><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">formal language</span></strong></p><span data-dcnode-id="857" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Official or academic language.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="851"><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">heuristic function</span></strong></p><span data-dcnode-id="850" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">The use of language to explore and investigate the world, solve problems, and learn from your discoveries and experiences.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="844"><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">idiom</span></strong></p><span data-dcnode-id="843" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="840"><a data-dcnode-id="842" id="_Hlk34934062"></a><span data-dcnode-id="841" instrument_node="">Expression or figure of speech whose meaning cannot be understood by looking at the individual words and interpreting them literally.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="836"><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">imaginative function</span></strong></p><span data-dcnode-id="835" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">The use of language to play with ideas that do not exist in the real-world.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="829"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">informal language</span></strong></p><span data-dcnode-id="828" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Common, everyday language people use during most interpersonal interactions.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="822"><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">instrumental function</span></strong></p><span data-dcnode-id="821" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">The use of language as a means for meeting your needs, manipulating and controlling your environment, and expressing your feelings.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="815"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">interactional function</span></strong></p><span data-dcnode-id="814" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">The use of language to help you form and maintain relationships.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="808"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">jargon</span></strong></p><span data-dcnode-id="807" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">The specialized or technical language of a specific group or profession that may not be understood by outsiders.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="801"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">language</span></strong></p><span data-dcnode-id="800" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">A system of human communication using a particular form of spoken or written words or other symbols.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="794"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">language adaptation</span></strong></p><span data-dcnode-id="793" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">The ability to alter one’s linguistic choices in a communicatively competent manner</span></p><span data-dcnode-id="790" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="787"><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">language awareness</span></strong></p><span data-dcnode-id="786" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">a person’s ability to be mindful and sensitive to all functions and forms of language.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="780"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">linguistic determinism</span></strong></p><span data-dcnode-id="779" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">The perspective that language influences thoughts.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="773"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">linguistic relativity</span></strong></p><span data-dcnode-id="772" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The view that language contains special characteristics.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="766"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">metamessage</span></strong></p><span data-dcnode-id="765" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">The meaning beyond the words themselves.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="759"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">personal function</span></strong></p><span data-dcnode-id="758" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">The use of language to help you form your identity or sense of self.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="752"><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">racism</span></strong></p><span data-dcnode-id="751" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">bias against others on the basis of their race or ethnicity.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="745"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">racist language</span></strong></p><span data-dcnode-id="744" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Language that demeans or insults people based on their race or ethnicity.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="738"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">regulatory function</span></strong></p><span data-dcnode-id="737" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">The use of language to control behavior.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="731"><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">relative language</span></strong></p><span data-dcnode-id="730" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Language that gains understanding by comparison.</span></p><span data-dcnode-id="727" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="724"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">representational function</span></strong></p><span data-dcnode-id="723" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The use of language to represent objects and ideas and to express your thoughts.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="717"><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Sapir-Whorf hypothesis</span></strong></p><span data-dcnode-id="716" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">A theory that suggests that language impacts perceptions. Language is ascertained by the perceived reality of a culture.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="710"><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">sexism</span></strong></p><span data-dcnode-id="709" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Bias of others based on their biological sex.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="703"><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">sexist language</span></strong></p><span data-dcnode-id="702" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Language that excludes individuals on the basis of gender or shows a bias toward or against people due to their gender.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="696"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">slang</span></strong></p><span data-dcnode-id="695" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">The nonstandard language of a particular culture or subculture.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="689"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">spin</span></strong></p><span data-dcnode-id="688" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">The manipulation of language to achieve the most positive interpretation of words, to gain political advantage, or to deceive others.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="682"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">static evaluation</span></strong></p><span data-dcnode-id="681" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Language shows that people and things change.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p class="import-glosterm" data-dcnode-id="675"><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">vocabulary</span></strong></p><span data-dcnode-id="674" instrument_node="">
</span><p class="import-glosdef" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">All the words understood by a person or group of people.</span></p><span data-dcnode-id="671" instrument_node="">
</span></div><span data-dcnode-id="669" instrument_node="">
</span></div><span data-dcnode-id="667" instrument_node="">
</span><h2 class="import-ah" data-dcnode-id="664"><a data-dcnode-id="666" id="_Toc45779759"></a><span data-dcnode-id="665" instrument_node="">Chapter Wrap-Up</span></h2><span data-dcnode-id="663" instrument_node="">
</span><p class="import-p-0" data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">In this chapter, we discussed the importance of verbal communication. To be an effective verbal communicator, it is necessary to understand that the words you use convey meanings that you might intentionally or unintentionally communicate to others. However, the meaning of language can vary from person to person.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p class="import-p" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">This chapter also discusses the various rules of language. Verbal communication serves many purposes and works to clarify the meaning of nonverbal communication. The type of language that you use can impact how others will see you.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p class="import-p" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Finally, this chapter discusses the subcategories of verbal communication. The subcategories of verbal communication allow us to understand how misunderstandings might occur if language is not used effectively.</span></p><span data-dcnode-id="654" instrument_node="">
</span><h2 class="import-ah" data-dcnode-id="651"><a data-dcnode-id="653" id="_Toc45779760"></a><span data-dcnode-id="652" instrument_node="">4.7 Chapter Exercises</span></h2><span data-dcnode-id="650" instrument_node="">
</span><h3 class="import-RealWorldCase" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Real-World Case Study</span></h3><span data-dcnode-id="647" instrument_node="">

</span><div data-dcnode-id="333" id="sdfootnote33sym"><a data-dcnode-id="335" href="#sdfootnote33anc"><span data-dcnode-id="336" instrument_node="">33</span></a><span data-dcnode-id="334" instrument_node=""> Crystal, D. (2006). How language works: How babies babble, words change meaning, and languages live or die. Harry N. Abrams.</span></div><span data-dcnode-id="332" instrument_node="">
</span><div data-dcnode-id="328" id="sdfootnote34sym"><a data-dcnode-id="330" href="#sdfootnote34anc"><span data-dcnode-id="331" instrument_node="">34</span></a><span data-dcnode-id="329" instrument_node=""> G., R. L. (2013, May 29). Vocabulary size: Lexical facts. The Economist. https://www.economist.com/johnson/2013/05/29/lexical-facts</span></div><span data-dcnode-id="327" instrument_node="">
</span><div data-dcnode-id="323" id="sdfootnote35sym"><a data-dcnode-id="325" href="#sdfootnote35anc"><span data-dcnode-id="326" instrument_node="">35</span></a><span data-dcnode-id="324" instrument_node=""> Svalberg, A. M. (2007). Language awareness and language learning.&nbsp;Language Teaching,&nbsp;40(4), 287-308. https://doi.org/10.1017/S0261444807004491</span></div><span data-dcnode-id="322" instrument_node="">
</span><div data-dcnode-id="318" id="sdfootnote36sym"><a data-dcnode-id="320" href="#sdfootnote36anc"><span data-dcnode-id="321" instrument_node="">36</span></a><span data-dcnode-id="319" instrument_node=""> Rauschenbach, J. (1994). Checking for student understanding: Four techniques. Journal of Physical Education, Recreation &amp; Dance, 65(4), 60-63. https://doi.org/10.1080/07303084.1994.10606900</span></div><span data-dcnode-id="317" instrument_node="">
</span></div><span data-dcnode-id="315" instrument_node="">
</span><div class="glossary" data-dcnode-id="178"><div class="glossary__tooltip" data-dcnode-id="311" hidden="" id="80-348"><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Refers to words that relate to ideas or concepts that exist only in your mind and do not represent a tangible object.</span></p><span data-dcnode-id="312" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="307" hidden="" id="80-350"><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">A diagram that explains the process of abstraction.</span></p><span data-dcnode-id="308" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="303" hidden="" id="80-770"><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">The meaning beyond the words themselves.</span></p><span data-dcnode-id="304" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="299" hidden="" id="80-505"><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Definitions for words commonly found in dictionaries.</span></p><span data-dcnode-id="300" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="295" hidden="" id="80-483"><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">The emotions or associations a person makes when exposed to a symbol.</span></p><span data-dcnode-id="296" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="291" hidden="" id="80-672"><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">The use of language as a means for meeting your needs, manipulating and controlling your environment, and expressing your feelings.</span></p><span data-dcnode-id="292" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="287" hidden="" id="80-864"><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">The use of language to control behavior.</span></p><span data-dcnode-id="288" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="283" hidden="" id="80-688"><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">The use of language to help you form and maintain relationships.</span></p><span data-dcnode-id="284" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="279" hidden="" id="80-814"><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">The use of language to help you form your identity or sense of self.</span></p><span data-dcnode-id="280" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="275" hidden="" id="80-628"><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">The use of language to explore and investigate the world, solve problems, and learn from your discoveries and experiences.</span></p><span data-dcnode-id="276" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="271" hidden="" id="80-888"><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">The use of language to represent objects and ideas and to express your thoughts.</span></p><span data-dcnode-id="272" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="267" hidden="" id="80-366"><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">A connection or association with others.</span></p><span data-dcnode-id="268" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="263" hidden="" id="80-491"><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Adapting your communication style to the speaker to be similar.</span></p><span data-dcnode-id="264" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="259" hidden="" id="80-529"><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Adapting your communication style to the speaker to be drastically different.</span></p><span data-dcnode-id="260" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="255" hidden="" id="80-412"><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">An attitude that is not objective or balanced, prejudiced, or the&nbsp;use of words that intentionally or unintentionally offend people or express an unfair attitude concerning a person’s race, ethnicity, sexual orientation, age, disability, or illness.</span></p><span data-dcnode-id="256" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="251" hidden="" id="80-936"><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Bias of others based on their biological sex.</span></p><span data-dcnode-id="252" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="247" hidden="" id="80-938"><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Language that excludes individuals on the basis of gender or shows a bias toward or against people due to their gender.</span></p><span data-dcnode-id="248" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="243" hidden="" id="80-850"><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Bias against others on the basis of their race or ethnicity.</span></p><span data-dcnode-id="244" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="239" hidden="" id="80-852"><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Language that demeans or insults people based on their race or ethnicity.</span></p><span data-dcnode-id="240" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="235" hidden="" id="80-612"><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Specific writing and spoken style that adheres to strict conventions of grammar that uses complex sentences, full words, and third-person pronouns.</span></p><span data-dcnode-id="236" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="231" hidden="" id="80-662"><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Specific writing and spoken style that is more colloquial or common in tone; contains simple, direct sentences; uses contractions and abbreviations; and allows for a more personal approach that includes emotional displays.</span></p><span data-dcnode-id="232" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="227" hidden="" id="80-716"><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">The specialized or technical language particular to a specific profession, occupation, or group that is either meaningless or difficult for outsiders to understand.</span></p><span data-dcnode-id="228" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="223" hidden="" id="80-447"><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Informal expression used in casual conversation that is often specific to certain dialects or geographic regions of a country.</span></p><span data-dcnode-id="224" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="219" hidden="" id="80-954"><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">The nonstandard language of a particular culture or subculture.</span></p><span data-dcnode-id="220" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="215" hidden="" id="80-638"><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Expression or figure of speech whose meaning cannot be understood by looking at the individual words and interpreting them literally.</span></p><span data-dcnode-id="216" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="211" hidden="" id="80-429"><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Expression that has been so overused that it has lost its original meaning.</span></p><span data-dcnode-id="212" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="207" hidden="" id="80-415"><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Language that shows preference in favor of or against a certain point-of-view, shows prejudice, or is demeaning to others.</span></p><span data-dcnode-id="208" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="203" hidden="" id="80-372"><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Language that has multiple meanings.</span></p><span data-dcnode-id="204" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="199" hidden="" id="80-577"><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Replacing blunt words with more polite words.</span></p><span data-dcnode-id="200" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="195" hidden="" id="80-884"><p data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Language that gains understanding by comparison.</span></p><span data-dcnode-id="196" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="191" hidden="" id="80-980"><p data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Language shows that people and things change.</span></p><span data-dcnode-id="192" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="187" hidden="" id="80-1048"><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">All the words understood by a person or group of people.</span></p><span data-dcnode-id="188" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="183" hidden="" id="80-726"><p data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">a person’s ability to be mindful and sensitive to all functions and forms of language.</span></p><span data-dcnode-id="184" instrument_node="">
</span></div><div class="glossary__tooltip" data-dcnode-id="179" hidden="" id="80-724"><p data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">The ability to alter one’s linguistic choices in a communicatively competent manner</span></p><span data-dcnode-id="180" instrument_node="">
</span></div></div></section><span data-dcnode-id="176" instrument_node="">
