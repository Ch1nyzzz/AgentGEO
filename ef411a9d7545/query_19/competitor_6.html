</span><meta content="This article analyses international conflicts through defining and discussing narrative practices. We distinguish various sites where clashes of narratives materialise and specific narrative practices are performed: in traditional diplomacy, in public diplomacy and in the media. We reach three conclusions: narratives influence all aspects of diplomatic practice, including strategic negotiations in secret talks and public engagements; state and non-state actors’ practices enact narratives and the growing interconnectedness can fosters clashes of narratives; in crafting and performing political narratives, diplomats and non-state actors refer extensively to legal norms and international law exploiting them as elements of narration. At a theoretical level, we incorporate practice theory into narrative analysis and vice versa, building a bridge between the practice turn and the linguistic turn in constructivist thinking. To illustrate, we analyse the Crimean crisis in February and March 2014 that opposed Russia and Ukraine and its Western supporters." data-dcnode-id="2898" name="dc.description"><span data-dcnode-id="2897" instrument_node="">

</span><meta content="Narrative practice in international politics and diplomacy: the case of the Crimean crisis - Journal of International Relations and Development" data-dcnode-id="2676" property="og:title"><span data-dcnode-id="2675" instrument_node="">
</span><meta content="This article analyses international conflicts through defining and discussing narrative practices. We distinguish various sites where clashes of narratives materialise and specific narrative practices are performed: in traditional diplomacy, in public diplomacy and in the media. We reach three conclusions: narratives influence all aspects of diplomatic practice, including strategic negotiations in secret talks and public engagements; state and non-state actors’ practices enact narratives and the growing interconnectedness can fosters clashes of narratives; in crafting and performing political narratives, diplomats and non-state actors refer extensively to legal norms and international law exploiting them as elements of narration. At a theoretical level, we incorporate practice theory into narrative analysis and vice versa, building a bridge between the practice turn and the linguistic turn in constructivist thinking. To illustrate, we analyse the Crimean crisis in February and March 2014 that opposed Russia and Ukraine and its Western supporters." data-dcnode-id="2674" property="og:description"><span data-dcnode-id="2673" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="886" data-track-component="article body"><span data-dcnode-id="2240" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2230" data-gtm-vis-first-on-screen-50443292_562="1616" data-gtm-vis-first-on-screen-50443292_563="1616" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1616" data-gtm-vis-recent-on-screen-50443292_563="1616" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2231" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2238" id="Abs1"><span data-dcnode-id="2239" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2232" id="Abs1-content"><p data-dcnode-id="2233"><span data-dcnode-id="2237" instrument_node="">This article analyses international conflicts through defining and discussing narrative practices. We distinguish various sites where clashes of narratives materialise and specific narrative practices are performed: in traditional diplomacy, in public diplomacy and in the media. We reach three conclusions: narratives influence all aspects of diplomatic practice, including strategic negotiations in secret talks and public engagements; state and non-state actors’ practices enact narratives and the growing interconnectedness can fosters clashes of narratives; in crafting and performing political narratives, diplomats and non-state actors refer extensively to legal norms and international law exploiting them as elements of narration. At a theoretical level, we incorporate practice theory into narrative analysis and </span><i data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">vice versa</span></i><span data-dcnode-id="2234" instrument_node="">, building a bridge between the practice turn and the linguistic turn in constructivist thinking. To illustrate, we analyse the Crimean crisis in February and March 2014 that opposed Russia and Ukraine and its Western supporters.</span></p></div></div></section><span data-dcnode-id="2229" instrument_node="">
</span><div class="c-article-section__content c-article-section__content--separator" data-dcnode-id="2217"><span data-dcnode-id="2228" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="2219"><div class="c-blockquote__body" data-dcnode-id="2220"><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2226" instrument_node="">You may object that it is not a trial at all; you are quite right, for it is only a trial if I recognize it as such. Franz Kafka, </span><i data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">The Trial</span></i><span data-dcnode-id="2223" instrument_node="">
</span></p><span data-dcnode-id="2221" instrument_node="">
</span></div></blockquote><span data-dcnode-id="2218" instrument_node="">
</span></div><section data-dcnode-id="2116" data-gtm-vis-first-on-screen-50443292_562="1616" data-gtm-vis-first-on-screen-50443292_563="1616" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1616" data-gtm-vis-recent-on-screen-50443292_563="1616" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2117" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2215" id="Sec1"><span data-dcnode-id="2216" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2118" id="Sec1-content"><p data-dcnode-id="2210"><span data-dcnode-id="2214" instrument_node="">Narratives convey meaning by providing sense to politically significant events, intentions and actions. Narratives can be framed positively or negatively; for example, a particular group of people could be named terrorists or freedom fighters depending on the narrator’s position, interests, beliefs and relationships. Telling stories ‘is not a simple representation of a pre-existing reality’, but rather produces ‘a certain way of perceiving the world which privileges certain interests over others’ (</span><a aria-label="Reference Mumby 1987" data-dcnode-id="2212" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d137308082e347" title="Mumby, Dennis (1987) ‘The Political Function of Narrative in Organizations’, Communication Monographs 54(2): 113–27."><span data-dcnode-id="2213" instrument_node="">Mumby 1987</span></a><span data-dcnode-id="2211" instrument_node="">: 114). Narratives are thus selective by definition, always in competition with other narratives which emphasise or omit different elements of reality to frame events in a specific way. Dominant narratives marginalise other narratives, while new narratives can emerge and become dominant.</span></p><p data-dcnode-id="2187"><span data-dcnode-id="2209" instrument_node="">In this article, we focus on the processes through which clashes of narratives develop at the international level, with the Crimea crisis as a case study. IR scholars so far studied the influence or creation of international or states’ biographical narratives (e.g., </span><a aria-label="Reference Ringmar 1996" data-dcnode-id="2207" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d137308082e353" title="Ringmar, Eric (1996) Identity, Interest and Action: A Cultural Explanation of Sweden’s Intervention in the Thirty Years War, Cambridge: Cambridge University Press."><span data-dcnode-id="2208" instrument_node="">Ringmar 1996</span></a><span data-dcnode-id="2206" instrument_node="">; </span><a aria-label="Reference Banerjee 1998" data-dcnode-id="2204" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d137308082e356" title="Banerjee, Sanjoy (1998) ‘Narratives and Interaction: A Constitutive Theory of Interaction and the Case of the All-India Muslim League’, European Journal of International Relations 4(2): 178–203."><span data-dcnode-id="2205" instrument_node="">Banerjee 1998</span></a><span data-dcnode-id="2203" instrument_node="">; </span><a aria-label="Reference Barnett 1999" data-dcnode-id="2201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d137308082e359" title="Barnett, Michael (1999) ‘Culture, Strategy and Foreign Policy Change: Israel’s Road to Oslo’, European Journal of International Relations 1(5): 5–36."><span data-dcnode-id="2202" instrument_node="">Barnett 1999</span></a><span data-dcnode-id="2200" instrument_node="">; </span><a aria-label="Reference Browning 2008" data-dcnode-id="2198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d137308082e362" title="Browning, Christopher S. (2008) Constructivism, Narrative and Foreign Policy Analysis. A Case Study of Finland, Bern: Peter Lang."><span data-dcnode-id="2199" instrument_node="">Browning 2008</span></a><span data-dcnode-id="2197" instrument_node="">; </span><a aria-label="Reference Steele 2008" data-dcnode-id="2195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d137308082e365" title="Steele, Brent (2008) Ontological Security in International Relations: Self-identity and the IR State, London: Routledge."><span data-dcnode-id="2196" instrument_node="">Steele 2008</span></a><span data-dcnode-id="2194" instrument_node="">; </span><a aria-label="Reference Berenskoetter 2014" data-dcnode-id="2192" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d137308082e369" title="Berenskoetter, Felix (2014) ‘Parameters of a National Biography’, European Journal of International Relations 20(1): 262–288."><span data-dcnode-id="2193" instrument_node="">Berenskoetter 2014</span></a><span data-dcnode-id="2191" instrument_node="">). To complement these analyses, we move from narratives as structures to narratives as practices. We consider the processes of narrative building, management and performance as a set of social practices constitutive of international politics. This focus on what we label </span><i data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">narrative practices</span></i><span data-dcnode-id="2188" instrument_node=""> allows us to analyse how international actors manage clashes of political narratives. We thus look at the various ways in which international actors develop contested narratives. This, in turn, gives insights on how and why some narratives are dominant and some contested.</span></p><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Narration requires agency. The principal narrative makers in politics are politicians and political groups whose public speeches and performances aim to give meaning to past and future events through storytelling. In international politics, both collective diplomatic organisation agencies (such as foreign ministries and embassies) and individual agents (like government officials or diplomats) also fulfil this role. Diplomats thus occupy a central place in the narrative encounters of the international: they not only present their governments’ political narratives to foreign interlocutors and audiences but also adapt and manage them in particular situations. Narrative is instrumental for presenting a state’s case, achieving political goals, building coalitions and developing and maintaining relationships. Most importantly, narratives are used as instruments of political reasoning and persuasion. When diplomats write reports, engage with foreign officials and public, discuss interests and positions of their states, negotiate a treaty, they are consistently reproducing, reinforcing and adapting existing narratives.</span></p><p data-dcnode-id="2180"><span data-dcnode-id="2184" instrument_node="">Our article contributes to bridging two trends in constructivist thinking, and advances both of them. For some years now, proponents of the linguistic turn have been opposed to proponents of the practice turn. The former pay attention to texts and discourses, whereas the later focus on practice as a bodily engagement of actors with the world. As useful as this distinction might be to understand the fundamental aspects of the individuals’ everyday engagement with the world, we contend that it creates a conceptual shortcoming in the way both practices and narratives are conceived. As </span><a aria-label="Reference Autesserre (2014" data-dcnode-id="2182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d137308082e380" title="Autesserre, Severine (2014) Peaceland. Conflict Resolution and the Everyday Politics of International Intervention, New York: Cambridge University Press."><span data-dcnode-id="2183" instrument_node="">Autesserre (2014</span></a><span data-dcnode-id="2181" instrument_node="">: 34–35) put it, ‘narratives constantly interact with practices. To begin with, some narratives emerge from practices. […] Furthermore, practices make possible and sustain dominant narratives already in existence […]. Conversely, existing dominant narratives also enable and justify specific practices’.</span></p><p data-dcnode-id="2172"><span data-dcnode-id="2179" instrument_node="">The concept of narrative practice captures this interrelation. With this concept, we answer </span><a aria-label="Reference Neumann’s (2002" data-dcnode-id="2177" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d137308082e387" title="Neumann, Iver (2002) ‘Returning Practice to the Linguistic Turn: The Case of Diplomacy’, Millennium: Journal of International Studies 31(3): 627–51."><span data-dcnode-id="2178" instrument_node="">Neumann’s (2002</span></a><span data-dcnode-id="2176" instrument_node="">: 628) call to understand dynamics in international politics and diplomacy through a study of social action that emphasises both ‘narrative discourse and discursive practices’ (also see </span><a aria-label="Reference Hansen 2011" data-dcnode-id="2174" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d137308082e390" title="Hansen, Lene (2011) ‘Performing Practices: A Postructuralist Analysis of the Muhammad Cartoon Crisis’, in Emanuel Adler and Vincent Pouliot eds, International Practices, 280–309, Cambridge: Cambridge University Press."><span data-dcnode-id="2175" instrument_node="">Hansen 2011</span></a><span data-dcnode-id="2173" instrument_node="">). On the one hand, narratives inform practices, a point sometimes overlooked by practice-turners focusing on the bodily and material performance of practices. As we shall illustrate below, international actors act in particular ways because they believe in certain narratives. On the other hand, narratives are produced by the bodily performance of actors. Narratives are more than texts and discourses — they are performed by flesh and blood people through their practice, a point sometimes overlooked by linguistic-turners. The practice of speech making at the UN Security Council (UNSC), for instance, embodies the narratives that are created, recreated and socially performed in this site. Put differently, the practice of storytelling and the stories that are told are the two sides of the same coin.</span></p><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Our study contributes to the much needed theorisation of diplomatic practices. The idea that international actors act according to narratives has rarely been used to understand micro-level practices in diplomatic spaces. In particular, analysts of public diplomacy have only recently begun to produce theoretically grounded works. We study three sets of narrative practice here: those associated with traditional diplomacy (secret meetings, top-level negotiations and third-party interventions); those associated with public diplomacy (public speech making, media interviews and diplomats’ interaction with civil society); and non-state actors’ practices influencing international politics (especially media reporting).</span></p><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">We focus on diplomats’ and non-state actors’ practices during international tensions over Crimea in February and March 2014. The reasoning behind our choice is straightforward: it is a ‘pure’ case of narrative conflict, ideal for studying the processes through which international narratives are clashing. Many international conflicts of narratives are accompanied by a war fought by militaries on a battlefield — the two world wars, the Israeli–Palestinian conflict, and the tensions in eastern Ukraine after the Crimean crisis. However, military forces played a part in the Crimean crisis primarily to impress or threaten for symbolic purposes. The verbal opposition between Russia, on the one hand, and Ukraine and the West on the other, was almost entirely constitutive of the conflict — even though, of course, there is no doubt that this verbal opposition had real material (and dramatic) consequences on people in Ukraine, Russia and the whole of Europe. Put differently, this conflict revolves almost exclusively around the meaning and sense given to specific events and expectations by narrative makers in Russia, Ukraine and the West. As a consequence, narrative management by politicians and diplomats became central in the conflict.</span></p><p data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node="">We contend that one needs to look at narrative practice to make sense of the crisis. </span><a aria-label="Reference Allison (2014)" data-dcnode-id="2165" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d137308082e400" title="Allison, Roy (2014) ‘Russian ‘Deniable’ ‘Intervention in Ukraine: How and Why Russia Broke the Rules’, International Affairs 90(6): 1255–1297."><span data-dcnode-id="2166" instrument_node="">Allison (2014)</span></a><span data-dcnode-id="2164" instrument_node=""> has pointed to three possible explanations of Russia’s conduct in Crimea and eastern Ukraine focusing on (1) its geopolitical and strategic goals, (2) Russian identity, and (3) domestic politics and regime consolidation in Russia. Our article underlines the role of the identity-related political narratives in the construction of international politics and diplomatic behaviour, but it does not reject geopolitical or domestic-political determinants and consequences in the Crimean crisis. Geopolitical and political factors shape states’ behaviour by putting it into some discursive and ideational schemata. The convincing power of geopolitical narration in particular is often based on its simplicity and common sensicality. But geopolitical discourse makes sense only when it is related to the actor’s sense of self and fundamental — identity-making — narratives. In other words, geopolitical explanation itself exists in a certain narrative context and expresses a particular way of political narration. The conflicting narrations of the events in Crimea aggravated the existing geopolitical dimension of the Russian-Western historical controversies.</span></p><p data-dcnode-id="2143"><span data-dcnode-id="2162" instrument_node="">Our method is based on an analysis of narratives and narrative practices accessed through their discursive/textual traces</span><sup data-dcnode-id="2157"><a data-dcnode-id="2158" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Footnote </span></span><span data-dcnode-id="2159" instrument_node="">1</span></a></sup><span data-dcnode-id="2156" instrument_node=""> and bodily performances. Contrary to other practice theory analyses, we did not rely on interviews or participant observation to gather data about the narrative practices we study. Practices point to implicit knowledge and tacit understanding and, as Bueger has made clear, ‘for praxiography, explicit knowledge — such as norms or rules — and articulated meaning — for instance through speech — are of secondary relevance’ (</span><a aria-label="Reference Bueger and Gadinger 2014" data-dcnode-id="2154" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d137308082e418" title="Bueger, Christian and Frank Gadinger (2014) International Practice Theory: New Perspectives, Basingstoke: Palgrave Macmillan."><span data-dcnode-id="2155" instrument_node="">Bueger and Gadinger 2014</span></a><span data-dcnode-id="2153" instrument_node="">: 386). On the other hand, discourses and speeches — as Bueger himself admits — are artefacts of the tacit knowledge and background assumptions of those who perform them. As </span><a aria-label="Reference Pouliot (2013)" data-dcnode-id="2151" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d137308082e421" title="Pouliot, Vincent (2013) ‘Methodology: Putting Practice Theory in Practice’, in Rebecca Adler-Nissen ed., Bourdieu in International Relations, 45–58, London and New York: Routledge."><span data-dcnode-id="2152" instrument_node="">Pouliot (2013)</span></a><span data-dcnode-id="2150" instrument_node=""> explains , what diplomats say (in the interviews or publicly) and what they mean (as reconstructed by the analyst) are connected in different ways. Through rhetoric, the prevailing ‘common sense’ and policy decisions are linked (</span><a aria-label="Reference Krebs and Jackson 2007" data-dcnode-id="2148" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d137308082e424" title="Krebs, Ronald and Patrick Thaddeus Jackson (2007) ‘Twisting Tongues and Twisting Arms: The Power of Political Rhetoric’, European Journal of International Relations 13(1): 35–66."><span data-dcnode-id="2149" instrument_node="">Krebs and Jackson 2007</span></a><span data-dcnode-id="2147" instrument_node="">; </span><a aria-label="Reference Hansen 2011" data-dcnode-id="2145" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d137308082e427" title="Hansen, Lene (2011) ‘Performing Practices: A Postructuralist Analysis of the Muhammad Cartoon Crisis’, in Emanuel Adler and Vincent Pouliot eds, International Practices, 280–309, Cambridge: Cambridge University Press."><span data-dcnode-id="2146" instrument_node="">Hansen 2011</span></a><span data-dcnode-id="2144" instrument_node="">).</span></p><p data-dcnode-id="2135"><span data-dcnode-id="2142" instrument_node="">Narratives structure the meaning of the foreign policy practitioners’ actions. On the one hand, speech making is a reflexive and manipulative practice. As Miskimmon, O’Loughlin and Roselle state, political leaders can use narratives strategically for creating a common sense understanding of the past, the present and the future, and legitimising contestable policy actions. In this context, ‘strategic narratives’ are crafted by political actors to shape the behaviour of domestic and international actors, manage expectations, change the discursive environment and influence the behaviour of others (</span><a aria-label="Reference Miskimmon et al. 2013" data-dcnode-id="2140" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d137308082e433" title="Miskimmon, Alister, Ben O’Loughlin and Laura Roselle (2013) Strategic Narratives: Communication Power and the New World Order, New York: Routledge."><span data-dcnode-id="2141" instrument_node="">Miskimmon et al. 2013</span></a><span data-dcnode-id="2139" instrument_node="">). Yet, this does not mean that agents do not believe some aspects of the broad narrative they develop, even if they reflect strategically about how they (re)present it. As </span><a aria-label="Reference Hopf (2002" data-dcnode-id="2137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d137308082e436" title="Hopf, Ted (2002) Social Construction of International Politics: Identities &amp; Foreign Policies, Moscow, 1955 and 1999, Ithaca: Cornell University Press."><span data-dcnode-id="2138" instrument_node="">Hopf (2002</span></a><span data-dcnode-id="2136" instrument_node="">: 37) put it, ‘every foreign policy decision maker is as much a member of the social cognitive structure that characterizes her society as any average citizen’. They make others believe in these narratives, which in turn shape their practices. This cannot be a secondary concern for practice theorists.</span></p><p data-dcnode-id="2121"><span data-dcnode-id="2134" instrument_node="">We use the UNSC speeches to analyse the clash of narratives between Russia and the West and Ukraine. These speeches could be written by diplomats in the field or in the capital, and they are usually the result of a joint effort of the policymakers and diplomats in the capital and those who represent a country in international organisations or embassies.</span><sup data-dcnode-id="2129"><a data-dcnode-id="2130" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Footnote </span></span><span data-dcnode-id="2131" instrument_node="">2</span></a></sup><span data-dcnode-id="2128" instrument_node=""> Considering the content of diplomatic speeches, we pay attention to the contextual factors as well. In the case of the UNSC speeches, the venue, the significance of the event, the presence of high-level representatives from many countries, formal dress code, the media attention and the established rules of procedure affect diplomatic behaviour and speech performances. That is why, to analyse the diplomats’ speeches at the UNSC meeting as narrative practices, we researched both the texts and video records of the debates.</span><sup data-dcnode-id="2123"><a data-dcnode-id="2124" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Footnote </span></span><span data-dcnode-id="2125" instrument_node="">3</span></a></sup><span data-dcnode-id="2122" instrument_node="">
</span></p><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">In this article, we first outline the nature of narrative practice and its role in international conflict. Then we examine the crisis in Crimea in February and March 2014 as a narrative conflict. Drawing on this case, we finally discuss narrative practices in the three sites already mentioned.</span></p></div></div></section><section data-dcnode-id="2035" data-title="Narrative practice in international conflict"><div class="c-article-section" data-dcnode-id="2036" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2114" id="Sec2"><span data-dcnode-id="2115" instrument_node="">Narrative practice in international conflict</span></h2><div class="c-article-section__content" data-dcnode-id="2037" id="Sec2-content"><p data-dcnode-id="2100"><span data-dcnode-id="2113" instrument_node="">Narratives mobilise masses: soldiers, citizens, voters, demonstrators, decision makers, diplomats — any human being — do particular things because they believe in some narratives and reject others. As </span><a aria-label="Reference Sarbin (1986" data-dcnode-id="2111" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d137308082e482" title="Sarbin, Theodore R., ed. (1986) ‘The Narrative as a Root Metaphor for Psychology’, in, Narrative Psychology: The Storied Nature of Human Conduct, 3–21, New York: Praeger."><span data-dcnode-id="2112" instrument_node="">Sarbin (1986</span></a><span data-dcnode-id="2110" instrument_node="">: 8) pointed out, ‘human beings think, perceive, imagine, and make moral choices according to narrative structures’. They play ‘a critical role in the construction of political behaviour’ (</span><a aria-label="Reference Patterson and Monroe 1998" data-dcnode-id="2108" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d137308082e485" title="Patterson, Molly and Kristen R. Monroe (1998) ‘Narrative in Political Science’, Annual Review of Political Science 1(1): 315–31."><span data-dcnode-id="2109" instrument_node="">Patterson and Monroe 1998</span></a><span data-dcnode-id="2107" instrument_node="">: 315–16). This is true for collective actors, as well and narratives can change the politics of coalitions within international organisations. They influence votes in the UN General Assembly or the UNSC, particularly during conflict. For example, the intervention in Libya in March 2011 was narrated as a humanitarian intervention by Western politicians and diplomats (</span><a aria-label="Reference Adler-Nissen and Pouliot 2014" data-dcnode-id="2105" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d137308082e488" title="Adler-Nissen, Rebecca and Vincent Pouliot (2014) ‘Power in Practice: Negotiating the International Intervention in Libya’, European Journal of International Relations 20(4): 889–911."><span data-dcnode-id="2106" instrument_node="">Adler-Nissen and Pouliot 2014</span></a><span data-dcnode-id="2104" instrument_node="">). Because they are embedded in certain narratives, images can become icons that impact world politics (</span><a aria-label="Reference Hansen 2015" data-dcnode-id="2102" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d137308082e491" title="Hansen, Lene (2015) ‘How Images Make World Politics: International Icons and the Case of Abu Ghraib’, Review of International Studies 41(2): 263–288."><span data-dcnode-id="2103" instrument_node="">Hansen 2015</span></a><span data-dcnode-id="2101" instrument_node="">). People facing unexpected or extraordinary situations rely on their existing beliefs to make sense of these new events. In these kinds of politically heated and time-sensitive situations, narratives mobilise international actors around specific issues and legitimise a particular course of actions and policies.</span></p><p data-dcnode-id="2089"><span data-dcnode-id="2099" instrument_node="">The prevailing narratives never work in isolation and are always in competition with other narratives. </span><a aria-label="Reference Autesserre (2014)" data-dcnode-id="2097" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d137308082e497" title="Autesserre, Severine (2014) Peaceland. Conflict Resolution and the Everyday Politics of International Intervention, New York: Cambridge University Press."><span data-dcnode-id="2098" instrument_node="">Autesserre (2014)</span></a><span data-dcnode-id="2096" instrument_node=""> has analysed how the daily routines, habits and narratives of those who participate in international peace interventions undermine peace-building effectiveness, and marginalise other — potentially more effective — narratives. In his study of the ontology of political community, </span><a aria-label="Reference Berenskoetter (2014)" data-dcnode-id="2094" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d137308082e500" title="Berenskoetter, Felix (2014) ‘Parameters of a National Biography’, European Journal of International Relations 20(1): 262–288."><span data-dcnode-id="2095" instrument_node="">Berenskoetter (2014)</span></a><span data-dcnode-id="2093" instrument_node=""> identifies the parameters of the biographical narrative that define the nation-state. Other scholars focus on the battle of narratives between groups that have different national roles in conceptions of their country (</span><a aria-label="Reference Wehner and Thies 2014" data-dcnode-id="2091" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d137308082e503" title="Wehner, Leslie and Cameron Thies (2014) ‘Role Theory, Narratives, and Interpretation: The Domestic Contestation of Roles’, International Studies Review 16(3): 411–36."><span data-dcnode-id="2092" instrument_node="">Wehner and Thies 2014</span></a><span data-dcnode-id="2090" instrument_node="">).</span></p><p data-dcnode-id="2084"><span data-dcnode-id="2088" instrument_node="">This is especially the case of international conflicts — they generally come with a conflict of narratives, with different states’ framing of the same political event or situation contradicting one another. Indeed, actions need to correspond with one’s sense of self and other, as well as with the associated narratives (</span><a aria-label="Reference Faizullaev 2006" data-dcnode-id="2086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d137308082e509" title="Faizullaev, Alisher (2006) ‘Diplomacy and Self’, Diplomacy and Statecraft 17(3): 497–522."><span data-dcnode-id="2087" instrument_node="">Faizullaev 2006</span></a><span data-dcnode-id="2085" instrument_node="">). Involvement in a conflict is associated with a narrative that makes sense of this conflict and renders it coherent with the existing narratives. International conflicts thus require dealing with narratives in opposition to one another. This is why international conflicts cannot be separated from the conflicts of identities manifested in political narratives.</span></p><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">International conflicts are thus generally fought on two fronts: on the actual battlefield of soldiers and weapons and on the narrative battlefield of words, speeches as well as different forms of symbolic interactions and other non-military practices. One of the most visible clashes of international political narratives of the recent years occurred during the Geneva II Conference on Syria in January 2014. The Syrian Foreign Minister Walid al-Moallem and Ahmed al-Jarba, president of the opposing Syrian National Coalition, presented totally different and highly contradictory accounts of the civil war in this country. The parties had very little common ground on which to overcome their differences and reach agreement. In the context of these extremely contested narratives, diplomacy at the conference could achieve very little progress.</span></p><p data-dcnode-id="2077"><span data-dcnode-id="2081" instrument_node="">There are two reasons that stakes are high in any conflict between narratives. First, narratives are identity-related stories, so struggles over narration are struggles over identity (</span><a aria-label="Reference Somers and Gibson 1994" data-dcnode-id="2079" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d137308082e518" title="Somers, Margaret and Gloria Gibson (1994) ‘Reclaiming the Epistemological ‘Other’: Narrative and the Social Construction of Identity’, in Craig Calhoun ed., Social Theory and Politics of Identity, 37–99, Oxford: Blackwell."><span data-dcnode-id="2080" instrument_node="">Somers and Gibson 1994</span></a><span data-dcnode-id="2078" instrument_node="">). Narrative conflict threatens the interests, credibility, reputations and identities or ‘selves’ of the conflicting parties. No party wants alien narratives imposed or their identities challenged. Second, narratives are among the most fundamental sources of legitimacy on the international scene. An action that is coherent with the dominant narratives will be perceived as legitimate; an action contradicting the prevalent narratives will be seen as illegitimate. For example, all conflicting sides can appeal to international law — an arguably dominant international discursive construct that can be used in building narratives, and which other narratives need to integrate or address in order to be seen as legitimate. These logics make sense of the politics of narratives: to render legitimate an action and win support, politicians and diplomats show that it coheres with or complements the existing dominant narratives, both at national and international levels.</span></p><p data-dcnode-id="2072"><span data-dcnode-id="2076" instrument_node="">Clashes of narratives result in different outcomes: one narrative may clearly win; narratives may hybridise into forms acceptable for both sides, more or less; or the narrative battle can continue unresolved. Hybridisation may take surprising forms, depending on the context: </span><a aria-label="Reference Renner and Spencer (2013)" data-dcnode-id="2074" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d137308082e524" title="Renner, Judith and Alexander Spencer (2013) ‘De-antagonising the Other: Changing Constructions of the Taliban and the Possibility of Reconciliation’, Global Society 27(4): 475–96."><span data-dcnode-id="2075" instrument_node="">Renner and Spencer (2013)</span></a><span data-dcnode-id="2073" instrument_node=""> show that some reconciliation between the Taliban and the West became a possibility because antagonistic narratives changed through a discursive decoupling between the Taliban and Al Qaeda. Narrative conflict management often leads to the reframing of contesting narratives.</span></p><p data-dcnode-id="2046"><span data-dcnode-id="2071" instrument_node="">Here we contribute to the study of conflicts of narratives by moving narrative analysis in a new direction. Our practice theory-inspired theoretical lenses look at ‘socially meaningful patterns of action’ (</span><a aria-label="Reference Adler and Pouliot 2011" data-dcnode-id="2069" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d137308082e530" title="Adler, Emanuel and Vincent Pouliot, eds (2011) ‘International Practices: Introduction and Framework’, in, International Practices, 3–35, Cambridge: Cambridge University Press."><span data-dcnode-id="2070" instrument_node="">Adler and Pouliot 2011</span></a><span data-dcnode-id="2068" instrument_node="">: 6) — that is, actors’ activities and routines (</span><a aria-label="Reference Neumann 2012" data-dcnode-id="2066" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d137308082e533" title="Neumann, Iver (2012) At Home with the Diplomats: Inside a European Foreign Ministry, Ithaca: Cornell University Press."><span data-dcnode-id="2067" instrument_node="">Neumann 2012</span></a><span data-dcnode-id="2065" instrument_node="">; </span><a aria-label="Reference Pouliot and Cornut 2015" data-dcnode-id="2063" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d137308082e536" title="Pouliot, Vincent and Jérémie Cornut (2015) ‘Practice Theory and the Study of Diplomacy: A Research Agenda’, Cooperation and Conflict 50(3): 297–315."><span data-dcnode-id="2064" instrument_node="">Pouliot and Cornut 2015</span></a><span data-dcnode-id="2062" instrument_node="">; </span><a aria-label="Reference Cornut 2015b" data-dcnode-id="2060" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d137308082e539" title="Cornut, Jérémie (2015b) The Practice Turn in International Relations Theory, in Robert A. Denemark, ed. The International Studies Encyclopedia, International Studies Association Online."><span data-dcnode-id="2061" instrument_node="">Cornut 2015b</span></a><span data-dcnode-id="2059" instrument_node="">). As </span><a aria-label="Reference Adler and Pouliot (2011" data-dcnode-id="2057" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d137308082e542" title="Adler, Emanuel and Vincent Pouliot, eds (2011) ‘International Practices: Introduction and Framework’, in, International Practices, 3–35, Cambridge: Cambridge University Press."><span data-dcnode-id="2058" instrument_node="">Adler and Pouliot (2011</span></a><span data-dcnode-id="2056" instrument_node="">: 7–8) have pointed out, practice is a ‘performance’, and ‘it tends to be </span><i data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">patterned</span></i><span data-dcnode-id="2053" instrument_node="">’, ‘more or less </span><i data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">competent</span></i><span data-dcnode-id="2050" instrument_node=""> in a socially meaningful and recognizable way’, and ‘rests on </span><i data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">background knowledge</span></i><span data-dcnode-id="2047" instrument_node="">’. Narratives as discursive structures inform narrative practices when practitioners (diplomats or other actors) perform them as part of their meaningful activities. Analysing narrative practices during diplomatic deadlock — that is, the production of contesting stories by diplomats and non-state actors in their socially meaningful performances — thus helps to better understand both discursive and behavioural aspects of international conflicts.</span></p><p data-dcnode-id="2038"><span data-dcnode-id="2045" instrument_node="">This approach also contributes to developing international practice theory. As </span><a aria-label="Reference Hansen (2011)" data-dcnode-id="2043" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d137308082e558" title="Hansen, Lene (2011) ‘Performing Practices: A Postructuralist Analysis of the Muhammad Cartoon Crisis’, in Emanuel Adler and Vincent Pouliot eds, International Practices, 280–309, Cambridge: Cambridge University Press."><span data-dcnode-id="2044" instrument_node="">Hansen (2011)</span></a><span data-dcnode-id="2042" instrument_node=""> puts it, there is always a gap between general practices and their specific enactment in a determinate socio-political context. Diplomats’ mental disposition and background assumptions — the ‘sediment of individual and collective trajectories’ (</span><a aria-label="Reference Pouliot 2008" data-dcnode-id="2040" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d137308082e561" title="Pouliot, Vincent (2008) ‘The Logic of Practicality: A Theory of Practice of Security Communities’, International Organization 62(2): 257–88."><span data-dcnode-id="2041" instrument_node="">Pouliot 2008</span></a><span data-dcnode-id="2039" instrument_node="">: 273) — are informed by specific narratives. In turn, the strategies and habits of practitioners both shape and are shaped by these narratives. For instance, due to the existing narratives, a ‘real’ negotiation is never a perfect instantiation of abstract negotiation practices. Actors whose narratives frame one another as friends or allies adopt specific cooperative practices; actors whose narratives frame one another as rivals or enemies adopt specific uncooperative practices. This shows that practices are inherently unstable. Narrative analysis makes sense of this instability and allows practice theorists to grasp the specificities of the practice they study.</span></p></div></div></section><section data-dcnode-id="1925" data-title="The crisis in Crimea as a conflict of narratives"><div class="c-article-section" data-dcnode-id="1926" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2033" id="Sec3"><span data-dcnode-id="2034" instrument_node="">The crisis in Crimea as a conflict of narratives</span></h2><div class="c-article-section__content" data-dcnode-id="1927" id="Sec3-content"><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">In November 2013, Ukrainian President Viktor Yanukovych abruptly decided against signing an association agreement with the European Union, and instead sought financial support from Russia. This change in policy created significant social tensions within Ukraine. The growing public discontent was fuelled further by Western politicians, some of whom showed physical support for demonstrations against the policy shift by going directly to Maidan — the public square in Kiev which served as the headquarters of the opposition to Yanukovych. On 21 February, 2014, the Ukrainian government and opposition signed an agreement facilitated by international mediators, agreeing to change the country’s constitution and hold an early presidential election. However, the next few days saw Yanukovych ousted from power and fleeing to Russia.</span></p><p data-dcnode-id="2017"><span data-dcnode-id="2030" instrument_node="">This tumult caused further unrest in Crimea, a province on a south-eastern peninsula with a majority ethnic Russian population — and one of the main Russian-speaking ‘beached diasporas’ studied by </span><a aria-label="Reference Laitin (1998)" data-dcnode-id="2028" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d137308082e574" title="Laitin, David (1998) Identity in Formation. The Russian-Speaking Populations in the New Abroad, Ithaca: Cornell University Press."><span data-dcnode-id="2029" instrument_node="">Laitin (1998)</span></a><span data-dcnode-id="2027" instrument_node="">. Following requests for intervention by this Russian-identifying population, the Russian Parliament’s upper house authorised President Putin to use military force in Ukraine. In this tense situation, a referendum for Crimean independence was hastily set-up and won by pro-Russian forces on 16 March, 2014. Some Russian military, acting in Crimea as local self-defence forces, backed this referendum. Crimea then sought and received formal accession to membership in the Russian Federation. Western governments decried the moves as a ‘Russian annexation of Crimea’, ‘contrary to Ukrainian law’ and a violation of international law, of the Constitution of Ukraine, and of the United Nations Charter.</span><sup data-dcnode-id="2022"><a data-dcnode-id="2023" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Footnote </span></span><span data-dcnode-id="2024" instrument_node="">4</span></a></sup><span data-dcnode-id="2021" instrument_node=""> Russia, meanwhile, considered the referendum to be ‘free’, ‘fair’, ‘transparent’ and ‘in full compliance with democratic procedures and international norms’ (</span><a aria-label="Reference Putin 2014" data-dcnode-id="2019" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d137308082e590" title="Putin, Vladimir (2014) Address by President of the Russian Federation from 18 March. The Website of the President of Russia, 
                    http://eng.kremlin.ru/news/6889
                    
                  , last accessed 15 July, 2014."><span data-dcnode-id="2020" instrument_node="">Putin 2014</span></a><span data-dcnode-id="2018" instrument_node="">).</span></p><p data-dcnode-id="2006"><span data-dcnode-id="2016" instrument_node="">To present the narratives involved, we use the method proposed by </span><a aria-label="Reference Shenhav (2005)" data-dcnode-id="2014" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d137308082e596" title="Shenhav, Shaul R. (2005) ‘Thin and Thick Narrative Analysis. On the Question of Defining and Analyzing Political Narratives’, Narrative Inquiry 15(1): 75–99."><span data-dcnode-id="2015" instrument_node="">Shenhav (2005)</span></a><span data-dcnode-id="2013" instrument_node=""> with a particular attention to narrative performances. Building on Geertz’s distinction between ‘thin description’ and ‘thick description’ (</span><a aria-label="Reference Geertz 1994" data-dcnode-id="2011" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d137308082e599" title="Geertz, Clifford (1994) ‘Thick Description: Toward an Interpretive Theory of Culture’, in Lee McIntyre ed., Reading in the Philosophy of Social Science, 213–231, Cambridge: Cambridge University Press."><span data-dcnode-id="2012" instrument_node="">Geertz 1994</span></a><span data-dcnode-id="2010" instrument_node="">), Shenhav considers that a narrative should be analysed through its textual traces. The purpose is to identify a thin narrative, a thick narrative and the connection between the two. These two levels parallel a common distinction in practice theory methodology: the thin narrative corresponds to ‘what diplomats talk about’, and the thick narrative is ‘what diplomats talk from’. The goal of the researcher is to reconstruct the latter through a structured analysis of the former (</span><a aria-label="Reference Pouliot 2013" data-dcnode-id="2008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d137308082e602" title="Pouliot, Vincent (2013) ‘Methodology: Putting Practice Theory in Practice’, in Rebecca Adler-Nissen ed., Bourdieu in International Relations, 45–58, London and New York: Routledge."><span data-dcnode-id="2009" instrument_node="">Pouliot 2013</span></a><span data-dcnode-id="2007" instrument_node="">: 51).</span></p><p data-dcnode-id="1998"><span data-dcnode-id="2005" instrument_node="">Speeches are not just presentations of prepared texts but also patterned and nuanced social performances. Although these speeches may appear just as political discourse, for the performing practitioner they are also a meaningful social action based on their background knowledge, habits, personality, strategies and past experiences. For instance, even the tone of a diplomatic speech can be meaningful — the speech performance makes a difference in the whole political narration process. During negotiations, diplomats pay attention not only to what their counterparts say but also to their emotional cues, including the tone of speech, gestures and body language (</span><a aria-label="Reference Wong 2016" data-dcnode-id="2003" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d137308082e608" title="Wong, Seanon (2016) ‘Emotions and the Communication of Intentions in Face-to-Face Diplomacy’, European Journal of International Relations 22(1): 144–167."><span data-dcnode-id="2004" instrument_node="">Wong 2016</span></a><span data-dcnode-id="2002" instrument_node="">). Personal effectiveness of a speaker can hide some flaws of the presented narrative and </span><i data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">vice versa</span></i><span data-dcnode-id="1999" instrument_node="">: A good story can somehow compensate for the shortcomings of the narrator’s behaviour. The efficiency of a narrative practice depends on both the credibility of the story and the storyteller’s performance. This performance is part of the management of narratives itself. Speakers also need to take into account previous speeches and the latest happenings. Doing so, they have to follow their governments’ instructions but they can also develop or modify the prepared text as a response to the actual situation on the ground. In sum, those who deliver speeches perform a specific practice which contains the elements of narration. As such, they are narrative makers on their own.</span></p><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">In analysing diplomatic narratives, we should, therefore, consider not only their textual side but also their performative aspects. A practical need — for example, the necessity of supporting a particular political point or an ally’s stance — may necessitate underlining certain aspects of the narrative, or bringing new structural (discursive) elements to the story. On the other hand, the narrative building itself may instigate particular behavioural patterns, for instance, emotional or calm performance. Speech act comprises both discursive and non-discursive elements, and narrative practice represents the accumulation of both.</span></p><p data-dcnode-id="1979"><span data-dcnode-id="1995" instrument_node="">Our analytical starting point is a public session of the UNSC debating the Crimea on 1 March, 2014. Building on only one speech does not undermine our investigation: as the analysis below will illustrate, ‘even a brief, unpolished political text can contain multiple layers of meanings, representing the diverse elements of the political sphere to which the speaker relates’ (</span><a aria-label="Reference Shenhav 2005" data-dcnode-id="1993" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d137308082e620" title="Shenhav, Shaul R. (2005) ‘Thin and Thick Narrative Analysis. On the Question of Defining and Analyzing Political Narratives’, Narrative Inquiry 15(1): 75–99."><span data-dcnode-id="1994" instrument_node="">Shenhav 2005</span></a><span data-dcnode-id="1992" instrument_node="">: 95).</span><sup data-dcnode-id="1987"><a data-dcnode-id="1988" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Footnote </span></span><span data-dcnode-id="1989" instrument_node="">5</span></a></sup><span data-dcnode-id="1986" instrument_node=""> This public session of the UNSC was an obvious choice: the session occurred at a turning point in the crisis, the day after President Vladimir Putin obtained authorisation from the Russian Duma to use force in Ukraine.</span><sup data-dcnode-id="1981"><a data-dcnode-id="1982" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Footnote </span></span><span data-dcnode-id="1983" instrument_node="">6</span></a></sup><span data-dcnode-id="1980" instrument_node=""> During this session, the deputy UN Secretary-General and representatives from Ukraine, Russia, the United States, the United Kingdom and France each made brief speeches in which they presented their interpretation of the crisis. There are few better places than the UNSC to promote one’s narrative and criticise others. Statements were delivered during a public session, with these performances closely and widely observed and commented upon, magnifying their impact. Moreover, these speeches influenced and responded to one another, providing a rather uncommon example of a narrative battle being waged publicly with diplomats face to face.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1977" id="Sec4"><span data-dcnode-id="1978" instrument_node="">Thin analysis of the UNSC public session</span></h3><p data-dcnode-id="1972"><span data-dcnode-id="1976" instrument_node="">The atmosphere of the UNSC meeting on 1 March, 2014 was quite tensed and that was reflected in the facial expressions and closed body languages of the confronting speakers. All speakers had prepared texts but some of them, especially the Russian representative, delivered their messages partly by not reading the text. This public session — the 7124th meeting of the UNSC — is constituted by six statements. Each of these statements provided one interpretation of the events, with great similarities between the last three by representatives of the United States, the United Kingdom and France. These statements shared the same internal structure, each having four main components and almost unanimously presenting these components in the same order. They all began with a description of some recent events; the events were then characterised in a specific way; norms seen to be violated were identified and reaffirmed and finally, in their closing remarks, the speakers called for specific actions. </span><a data-dcnode-id="1974" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1975" instrument_node="">Table 1</span></a><span data-dcnode-id="1973" instrument_node=""> presents a synoptic view of the four narratives.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1957" data-test="inline-table" id="table-1"><figure data-dcnode-id="1958"><figcaption class="c-article-table__figcaption" data-dcnode-id="1969"><b data-dcnode-id="1970" data-test="table-caption" id="Tab1"><span data-dcnode-id="1971" instrument_node="">Table 1 Synoptic table of the conflicting narratives</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1959"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1960" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/jird.2016.6/tables/1" rel="nofollow"><span data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1961" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1962" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1963" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1966" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1965" fill-rule="evenodd"></path><span data-dcnode-id="1964" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1955" instrument_node="">In his depiction, the Russian diplomat described the new government in Ukraine as consisting of radical revolutionaries and highlighted the government’s illegitimacy, the threat to Russian-speaking population in Ukraine (particularly in Crimea) and the need to defend them. He emphasised the legitimacy of the Crimean referendum while condemning Western governments’ interference in Ukraine’s domestic and international policies, which he pointed to as a destabilising influence in the country. He also stressed the failure of the agreement between President Yanukovich and the opposition signed on 21 February, 2014, and reiterated the desire for Ukraine to establish a national unity government. Nearly the mirror image, the Western diplomats’ narratives were constructed around the legitimacy of Ukraine’s new government, the danger of Russian military intervention, Russia’s broken commitment to protect the sovereignty, territorial integrity and independence of Ukraine according to the Budapest Memorandum</span><sup data-dcnode-id="1950"><a data-dcnode-id="1951" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Footnote </span></span><span data-dcnode-id="1952" instrument_node="">7</span></a></sup><span data-dcnode-id="1949" instrument_node=""> and the illegality of the referendum in Crimea.</span></p><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">It is imperative to look at which facts and events were emphasised or omitted in each narrative. One striking difference apparent in the speeches is that the Russian statement was much longer than the other five. This stems from a difference in the chronology of the events, as Russia began its narrative further back in time. Before commenting on the specific topic of the meeting — the decision to authorise the use of force — the Russian diplomat wove his retelling of the decision into a longer narrative beginning with Yanukovych’s election and his illegal removal. Likewise, the Ukrainian representative did not mention the troubles in Crimea or the request sent to Russia by the Crimean Prime Minister, because these facts undermined his narrative. For Ukraine and the West, the elements to emphasise were the Russian decision to use force; for Russia, it was Kiev’s attempts to replace the Crimean regional government.</span></p><p data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">The conflict of narratives at this thin level is also about the characterisation of Russia’s decision. For Ukraine, it was an act of aggression; for Russia, it was an act of assistance to restore peace; for the West, an intervention with no legal standing.</span></p><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">At this level of analysis, the devil is sometimes in the details and word choices are critical. For example, the Russian diplomat explained: ‘What I heard in [the Ukrainian] statement was a number of terms characterizing the situation in Ukraine and the actions of the Russian Federation to which we cannot agree at all. […] I draw the Council’s attention to the fact that [the request sent by the President of Russia to the Federation Council] says “on the territory of Ukraine” — not “against Ukraine”, as my Ukrainian colleague said’. Labels are particularly interesting: Crimea is referred to by the Ukrainian representative as the ‘Crimean peninsula’; for Russia, it is the ‘Autonomous Republic of Crimea’. The representative of the UN also used this second label, but most of the time he used the neutral designation of ‘Crimea’.</span></p><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">This comparison gives some indication about the nature of the conflict of narratives. It also shows the UN channelling its role as a mediator of narrative: the UN Deputy Secretary-General’s speech drew on some elements and facts emphasised in both conflicting narratives. It did not seek to characterise Russia’s decision as legal or illegal, nor specifically mentioned any norm potentially violated by this decision. The UN representative’s narrative simply reaffirmed general norms and values of peace and respect of territorial sovereignty and integrity, without casting any aspersions about their violation.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1938" id="Sec5"><span data-dcnode-id="1939" instrument_node="">Thick analysis of the UNSC public session</span></h3><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">The dominant Russian narratives were constructed around a motif that the West has constantly tried to enlarge its sphere of influence at the expense of Russia, violating NATO’s commitment that it would not expand east of a unified Germany. Kosovo’s Western-backed independence from Serbia was seen as a further example of the increasingly anti-Russian policies as the West took advantage of Russia’s weakness throughout the 1990s. With Russia now feeling itself restored as a great power with a higher status in the international hierarchy, it sought to be recognised as such.</span></p><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">In this context, Russian officials apparently felt that the recent revolution in Ukraine came about at the hands of armed ultranationalists and criminals. Thus, the new Ukrainian government was essentially the illegitimate result of an illegal coup. They accused Western governments of supporting this anti-constitutional takeover and failing to fulfil their obligations under the agreement of 21 February, 2014, while blaming Ukrainian ultranationalists for aggravating ethnic tensions. They maintained that President Yanucovich was the only legitimate President of Ukraine, while painting the new government as acting under the influence of radicals and fascists. The central part of this narrative was a stated need to defend the Russian population in Crimea, particularly once the legitimate authorities in Crimea requested assistance. Russian authorities denied the presence of Russian troops in Crimea beyond what had been previously agreed to and welcomed a referendum in that region on its independence, while Russian public opinion appeared to believe in this official narrative overwhelmingly and support it.</span></p><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">The dominant Western political narratives saw Russia as a formerly powerful state that lost its influence in the world after the collapse of the Soviet Union. With more pronounced turns towards authoritarianism under Vladimir Putin, Russia, in Western narratives, does not hesitate to use violent means against enemies, both domestic and international, and pays little heed to human rights norms. Russia’s 2008 war in Georgia and support for autocratic regimes like Bashar al-Assad’s Syria are seen as evidence of a continued lack of respect for international norms.</span></p><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">It was in this context that the crisis in Ukraine was seen as a demonstration of the popular will for radical change from a corrupt, ineffective (and Kremlin-affiliated) government. According to the Western views, a new and legitimate government emerged in Ukraine. This manifestation of the will of the Ukrainian people was to be respected. Western governments and public opinion denied the veracity of threats to Russian population in Crimea, accused Russia of illegal occupation, and voiced support for the territorial integrity of the country. For Western politicians and the majority of the media and observers, it was obvious that Russia had deployed its military in Crimea in violation of international law. In this context, the Western governments considered Russian behaviour to be unacceptable and the referendum in Crimea illegitimate. In the Western narrative, democratic development in Ukraine opened new opportunities for Ukrainians to effectively govern their country and become a prosperous nation. On the contrary, the Russian leadership was blamed for using the situation in Ukraine to pursue neo-imperialist ambitions, with concerns over Russia’s possible intent to go further into eastern Ukraine.</span></p><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">The Ukrainian government’s narratives were close to those of its Western counterparts. The Russian moves in the Crimea were considered acts of aggression, while the Maidan demonstrations, protest movements, and the new government were depicted as parts of a process of purification necessary for the creation of a modern and democratic state. Ukrainian authorities denied any credible threat to the Russian population in Crimea, and demanded instead the Russian troops’ withdrawal from that region. They expressed their commitment to preserve independence and territorial integrity of Ukraine.</span></p></div></div></section><section data-dcnode-id="1709" data-title="Making sense of the diplomatic deadlock"><div class="c-article-section" data-dcnode-id="1710" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1923" id="Sec6"><span data-dcnode-id="1924" instrument_node="">Making sense of the diplomatic deadlock</span></h2><div class="c-article-section__content" data-dcnode-id="1711" id="Sec6-content"><p data-dcnode-id="1918"><span data-dcnode-id="1922" instrument_node="">In the line of our practice theory lenses, this section does not focus on the outcome of diplomatic (narrative) battles, but on the processes that constituted these battles (</span><a aria-label="Reference Pouliot 2013" data-dcnode-id="1920" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d137308082e873" title="Pouliot, Vincent (2013) ‘Methodology: Putting Practice Theory in Practice’, in Rebecca Adler-Nissen ed., Bourdieu in International Relations, 45–58, London and New York: Routledge."><span data-dcnode-id="1921" instrument_node="">Pouliot 2013</span></a><span data-dcnode-id="1919" instrument_node="">). How does a clash of narratives lead to diplomatic deadlock? Various diplomatic practices enacted and performed incommensurable political narratives, leading to this deadlock. We focus here on three sites where Russia, the West and Ukraine advanced incompatible stories against one another. This illustrates how what can be called a ‘narrative entrapment’ works in practice.</span></p><p data-dcnode-id="1910"><span data-dcnode-id="1917" instrument_node="">Drawing on the thick and thin analyses of the narrative conflict in Crimea above, this section does three things in particular. First, we demonstrate that narratives pervaded all aspects of the management of the crisis by diplomats, decision makers and non-state actors. In the three sites under study, actors’ background assumptions, constraints and strategies, both embedded in and constitutive of specific practices, informed and were informed by the clash of narratives identified in the previous section. Second, in line with </span><a aria-label="Reference Hansen’s (2011)" data-dcnode-id="1915" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d137308082e879" title="Hansen, Lene (2011) ‘Performing Practices: A Postructuralist Analysis of the Muhammad Cartoon Crisis’, in Emanuel Adler and Vincent Pouliot eds, International Practices, 280–309, Cambridge: Cambridge University Press."><span data-dcnode-id="1916" instrument_node="">Hansen’s (2011)</span></a><span data-dcnode-id="1914" instrument_node=""> analysis of international practices, we identify how, during the Crimean crisis, general diplomatic practices (secret talks, public diplomacy, etc.) were performed in specific ways because of the narratives involved. We also indicate some features of the (international) legal ‘politico-epistemic domain’ within which these practices were constituted. Third, complementing </span><a aria-label="Reference Adler-Nissen and Pouliot’s (2014)" data-dcnode-id="1912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d137308082e882" title="Adler-Nissen, Rebecca and Vincent Pouliot (2014) ‘Power in Practice: Negotiating the International Intervention in Libya’, European Journal of International Relations 20(4): 889–911."><span data-dcnode-id="1913" instrument_node="">Adler-Nissen and Pouliot’s (2014)</span></a><span data-dcnode-id="1911" instrument_node=""> demonstration of the importance for the intervention in Libya of the everyday moves and attempts to appear competent by NATO and the UN ambassadors, we show that a competent practice is also a practice that enacts determinate narratives. Day-to-day practical competence is not only a matter of individual strategies of distinction and influence; it also depends on diplomats’ enactment of specific collective narratives that fit the general expectations of those in the name of whom they speak as well as their audiences.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1908" id="Sec7"><span data-dcnode-id="1909" instrument_node="">The failure of secret negotiations</span></h3><p data-dcnode-id="1894"><span data-dcnode-id="1907" instrument_node="">Diplomatic negotiation is about finding a common ground between divergent interests, values and identities (</span><a aria-label="Reference Faizullaev 2014" data-dcnode-id="1905" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d137308082e892" title="Faizullaev, Alisher (2014) ‘Diplomatic Interactions and Negotiations’, Negotiation Journal 30(3): 275–299."><span data-dcnode-id="1906" instrument_node="">Faizullaev 2014</span></a><span data-dcnode-id="1904" instrument_node="">). In the Crimean case, there were several attempts to negotiate a way out of the crisis. The talks between the Russian Foreign Minister Sergei Lavrov and the US Secretary of State John Kerry at the Russian ambassador’s residence in Paris on 30 March, 2014, had been widely advertised and the claims of each side during these talks leaked to the press. For Russia, the solution for Ukraine was a federal architecture that would give extensive power to Russian-speaking regions of Ukraine. It also requested a pledge by Kiev not to seek NATO membership and guarantees about the future of Transnistria — another bone of contention between Russia and the West, at the Moldovan border (</span><a aria-label="Reference Tisdall 2014" data-dcnode-id="1902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d137308082e895" title="Tisdall, Simon (2014) ‘Russia Sets Tough Conditions for Diplomatic Solution in Crimea’. The Guardian 30 March, 
                    http://www.theguardian.com/world/2014/mar/30/russia-ukraine-john-kerry-sergei-lavrov-paris
                    
                  , accessed 15 July, 2014."><span data-dcnode-id="1903" instrument_node="">Tisdall 2014</span></a><span data-dcnode-id="1901" instrument_node="">). On the other side, the West asked Russia to withdraw its forces from Crimea, disarm irregular forces in Crimea, pull out some of its military on the Crimean border, respect the territorial integrity of Ukraine and support national polls to elect a new president and government in Ukraine (</span><a aria-label="Reference Gordon and MacFarquhar 2014" data-dcnode-id="1899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d137308082e898" title="Gordon, Michael and Neil MacFarquhar (2014) ‘Promises of Diplomacy but No Advances in Ukraine Talks’. The New York Times 30 March, 
                    http://www.nytimes.com/2014/03/31/world/europe/kerry-and-russian-counterpart-meet-on-ukraine-crisis.html?_r=0
                    
                  , accessed 15 July, 2014)."><span data-dcnode-id="1900" instrument_node="">Gordon and MacFarquhar 2014</span></a><span data-dcnode-id="1898" instrument_node="">; </span><a aria-label="Reference Londoño 2014" data-dcnode-id="1896" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d137308082e901" title="Londoño, Ernesto (2014) ‘Obama Calls on Russia to Withdraw its Troops from Ukraine’s Border’. The Washington Post 28 March, 
                    http://www.washingtonpost.com/world/national-security/obama-calls-on-russia-to-withdraw-its-troops-from-ukraines-border/2014/03/28/83834ae2-b6a8-11e3-b84e-897d3d12b816_story.html
                    
                  , 15 July, 2014."><span data-dcnode-id="1897" instrument_node="">Londoño 2014</span></a><span data-dcnode-id="1895" instrument_node="">).</span></p><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">During these talks, diplomats not only negotiated strategic interests; they also discussed and negotiated narratives. In the course of the negotiations, diplomats translated their own narrative into specific political claims that applied to the problems at hand. Each part made claims that were coherent with its own narratives: Russia felt that it is its duty to protect the Russian-speaking minority threatened by an illegitimate government; the West and Ukraine considered Russian’s involvement in Crimea as illegitimate interference. They also rejected one another’s claims: for Western and Ukrainian diplomats, Russia’s requests were seen as an externally sponsored partitioning of Ukraine, and a violation of its freedom to conclude international treaties; for Russian diplomats, Western and Ukrainian requests were viewed as a violation of the will of the Crimean people, and a threat to them.</span></p><p data-dcnode-id="1887"><span data-dcnode-id="1891" instrument_node="">Diplomats need to have some shared understanding of narratives to be able to negotiate them. To solve complicated problems, the negotiating parties need to sit at the same table: this is a symbolic gesture with practical consequences that indicate the willingness of each part to at least discuss with the other, that is, speak the same language, and, metaphorically, live on the same narrative planet. Coming to the negotiation table supposes some shared meaning between the conflicting parties (</span><a aria-label="Reference Faizullaev 2013" data-dcnode-id="1889" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d137308082e909" title="Faizullaev, Alisher (2013) ‘Diplomacy and Sym
