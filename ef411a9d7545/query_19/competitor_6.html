bolism’, The Hague Journal of Diplomacy 8(2): 91–114."><span data-dcnode-id="1890" instrument_node="">Faizullaev 2013</span></a><span data-dcnode-id="1888" instrument_node="">). On the contrary, during the talks on Crimea, the mere idea of negotiating was not evident as Russia did not recognise the government in Kiev and did not engage in direct talks with Ukraine.</span></p><p data-dcnode-id="1879"><span data-dcnode-id="1886" instrument_node="">Russian claims were unacceptable for Ukraine and the West, and </span><i data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">vice versa</span></i><span data-dcnode-id="1883" instrument_node="">, because they were incompatible with their narratives. It, therefore, comes as no surprise that the Kerry–Lavrov meeting in Paris was unsuccessful. Each party labelled the other’s demands as unreasonable and unacceptable: the narratives of each country were clashing to an extent where no compromise was possible. Talks between German Chancellor Angela Merkel and Russian President Vladimir Putin earlier in March had the same results as Merkel concluded that Putin ‘seems to be in another world’ (</span><a aria-label="Reference Traynor and Wintour 2014" data-dcnode-id="1881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d137308082e918" title="Traynor, Ian and Patrick Wintour (2014) ‘Ukraine Crisis: Vladimir Putin has Lost the Plot, says German Chancellor’. The Guardian 3 March, 
                    http://www.theguardian.com/world/2014/mar/03/ukraine-vladimir-putin-angela-merkel-russian
                    
                   (last accessed 15 July, 2014)."><span data-dcnode-id="1882" instrument_node="">Traynor and Wintour 2014</span></a><span data-dcnode-id="1880" instrument_node="">) — a blunt but adequate description of how it is to negotiate narratives that do not overlap.</span></p><p data-dcnode-id="1874"><span data-dcnode-id="1878" instrument_node="">This illustrates the specific constraining power of narratives on undisclosed diplomatic talks: diplomats can negotiate at several levels, or with multiple issues at the same time. The developments on the ground in Crimea mingled with each country’s definition of self, its history and how it narrated itself. Negotiators had to manage all these layers at the same time. Not only specific interests in Crimea but the whole position of each country in the international system and its identity were at stake. This is why status and prestige matters: the status granted to each state should be coherent with how this state narrates itself and how it sees itself in the eyes of the others. Not only were geopolitical, geostrategic or economic interests involved but also Russia’s status in the international system. The crisis took on a life outside itself, fitting into a broader narrative of ‘Moscow’s relentless quest for equal status’ with the West (</span><a aria-label="Reference Neumann and Pouliot 2011" data-dcnode-id="1876" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d137308082e925" title="Neumann, Iver and Vincent Pouliot (2011) ‘Untimely Russia: Hysteresis in Russian-Western Relations Over the Past Millennium’, Security Studies 20(1): 105–37."><span data-dcnode-id="1877" instrument_node="">Neumann and Pouliot 2011</span></a><span data-dcnode-id="1875" instrument_node="">: 105).</span></p><p data-dcnode-id="1863"><span data-dcnode-id="1873" instrument_node="">In the course of narrative negotiations, diplomats need to do more than just promote their political narratives and interests. They have to analyse and translate foreign narratives as well. As ‘professional strangers’ (</span><a aria-label="Reference Sofer 1997" data-dcnode-id="1871" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d137308082e931" title="Sofer, Sasson (1997) ‘The Diplomat as a Stranger’, Diplomacy and Statecraft 8(3): 179–86."><span data-dcnode-id="1872" instrument_node="">Sofer 1997</span></a><span data-dcnode-id="1870" instrument_node="">) they are uniquely placed to understand how foreign governments see the world, how they interpret their place in it, and what motivates them. Usually they are familiar with the culture, people, history and dominant political narratives of the foreign country (</span><a aria-label="Reference Cornut 2015a" data-dcnode-id="1868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d137308082e934" title="Cornut, Jérémie (2015a) ‘To Be a Diplomat Abroad: Diplomatic Practice at Embassies’, Cooperation and Conflict 50(3): 385–401."><span data-dcnode-id="1869" instrument_node="">Cornut 2015a</span></a><span data-dcnode-id="1867" instrument_node="">). There are obvious strategic reasons to do so: Faced with a crisis or decision, foreign leaders and diplomats tend to react based not only on ‘rational’ analyses and judgments, but also on perceptions shaped by narratives. This can make behaviour predictable to some extent. As </span><a aria-label="Reference Bacon (2012" data-dcnode-id="1865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d137308082e937" title="Bacon, Edwin (2012) ‘Public Political Narratives: Developing a Neglected Source through the Exploratory Case of Russia in the Putin-Medvedev Era’, Political Studies 60(4): 768–786."><span data-dcnode-id="1866" instrument_node="">Bacon (2012</span></a><span data-dcnode-id="1864" instrument_node="">: 769) put it, ‘the techniques of narrative analysis provide […] predictive insights into a polity’. Diplomats need to understand how the other country sees the world. This enables them to anticipate its claims and understand which are too essential to be negotiated and which can be the basis for a compromise. Understanding the dominant political narratives of a host country is thus an important part of diplomatic preparedness for secret talks.</span></p><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Standard practices of diplomatic negotiations imply that diplomats are able to see through the eyes of the other, and find a solution to the crisis through secret talks; yet, because of the clash of narratives, the negotiations over Crimea reached a deadlock and diplomats from each side were unable to find a common ground. In the course of the negotiations, there were apparently few concerns about how acceptable each claim was for the other’s narrative, which points to a possible failure of diplomats in performing competently their role as translators of the narrative of the other. Part of the explanation of how and why these events turned into a crisis lies in this gap between general and specific practices of secret talks.</span></p><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">In sum, during the Crimea crisis, diplomats and decision makers practiced secret talks. They followed the usual ways of doing these talks: key decision makers and top-level diplomats met behind closed door and negotiated a way out of the crisis that corresponded to their strategic and geopolitical interests. Yet, the clash of narratives between Russia and Ukraine, and the West influenced these talks profoundly and made them difficult: Russia did not agree to negotiate directly with the Ukrainian government and no compromise was found. The talks were a failure. This illustrates how narratives inform practices of diplomatic negotiation, as well as the inherent instability of practices and performances provoked by narratives.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1857" id="Sec8"><span data-dcnode-id="1858" instrument_node="">Public diplomacy and narrative practice</span></h3><p data-dcnode-id="1852"><span data-dcnode-id="1856" instrument_node="">Public diplomacy practices — the task for diplomats to publicly promote the views of their governments and serve their narratives — had a pronounced significance during the Crimean crisis. Diplomats not only negotiate a way out in secret talks, but they also try to convince the public and foreign leaders that their story is true, hoping that if their story wins, the other will yield. Diplomats serve the narratives of their governments in efforts to win hearts and minds. They may appear publicly to explain and justify actions and intentions of their country, contest or challenge unfavourable interpretations, and question or criticise their opponents’ behaviour. That is why, as </span><a aria-label="Reference Scott (2011" data-dcnode-id="1854" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d137308082e952" title="Scott, Biljana (2011) ‘Skills of the Public Diplomat: Language, Narrative and Allegiance’, in Ali Fischer and Scott Lucas eds, Trials of Engagement: The Future of US Public Diplomacy, 231–50, Leiden and Boston: Martinus Nijhoff Publishers."><span data-dcnode-id="1855" instrument_node="">Scott (2011</span></a><span data-dcnode-id="1853" instrument_node="">: 242) has remarked, public diplomats have to pay close attention to the power of narratives, improve their story-telling skills in order to persuade others, and be sensitive to the narratives of their interlocutors.</span></p><p data-dcnode-id="1847"><span data-dcnode-id="1851" instrument_node="">This is how involved parties contest one another for the favour of the world’s public opinions. Attracting the support of these opinions legitimates acts concordant with these sympathised narratives. In such a ‘struggle over the meaning’ (</span><a aria-label="Reference Pouliot 2010" data-dcnode-id="1849" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d137308082e958" title="Pouliot, Vincent (2010) International Security in Practice: The Politics of NATO — Russia Diplomacy, New York: Cambridge University Press."><span data-dcnode-id="1850" instrument_node="">Pouliot 2010</span></a><span data-dcnode-id="1848" instrument_node="">: 245), diplomats may use media interviews, op-ed articles, public statements and speeches as well as private conversations, persuasion, lobbying and other means of wielding influence. Recently they have begun to use the internet — both through websites and social media — and stay up-to-date with modern powerful tools of narrative building.</span></p><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">In their public narrative practices, politicians and diplomats have to deal with both foreign and domestic audiences. They manage political narratives at both the international and national levels. As the concerns and interests of these constituencies are not always similar, narrative practitioners need to balance carefully between the sensibilities and priorities of the two groups.</span></p><p data-dcnode-id="1840"><span data-dcnode-id="1844" instrument_node="">For the foreign audience, political narratives have to refer, first of all, to internationally accepted norms and values. This explains why, in crafting political narratives, diplomats refer extensively to legal norms and international law. International law is exploited as a fundamental referent of narration — a ‘justificatory discourse’ that has meaning within the ‘interpretive community’ (</span><a aria-label="Reference Johnstone 2003" data-dcnode-id="1842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d137308082e966" title="Johnstone, Ian (2003) ‘Security Council Deliberations: The Power of the Better Argument’, European Journal of International Law 14(3): 437–480."><span data-dcnode-id="1843" instrument_node="">Johnstone 2003</span></a><span data-dcnode-id="1841" instrument_node="">) of international diplomats. When discussing Crimea, both Russian and Western diplomats placed international law and legal norms — though with different interpretations — in the centre of their narratives earmarked for the world community. In a situation of public confrontation, diplomatic management of political narratives carries with it the burden of demonstrating the state’s goodwill and compliance with international law and norms of behaviour.</span></p><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Narratives intended for domestic audiences need to connect primarily with the nation’s fundamental social and political ideas. In general, for domestic audiences, Western narratives emphasised themes like human rights, government accountability, and Russia’s neo-imperialistic ambitions. Russia’s domestic narratives produced by politicians, diplomats and others sought to connect to notions of historical justice, national self-esteem and the ‘Russian world’ with its unique place and historical mission pitted against the West’s aggressive attempts to push Russia back.</span></p><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Distinctions between the two audiences should not be overestimated. Modern diplomatic practices, especially public speech actions, blur the lines between inside and outside or domestic and foreign policies. The public narratives presented by diplomats often aim at influencing both foreign and domestic audiences. Western diplomats painted Russia as the aggressor, the annexation of Crimea a violation of international law, and its referendum a fraud. Russia was accused of ignoring both international law and its previous obligations. For Russian diplomats, the change of the Ukrainian government and Western interference were illegitimate, and self-determination for the predominantly Russian population of Crimea was a fundamental right recognised by international law. In their political narratives, Russian diplomats defended the right of their country to protect the Russian-speaking populations in Ukraine. In each of these cases, diplomats wanted to reach both domestic and international audiences.</span></p><p data-dcnode-id="1822"><span data-dcnode-id="1835" instrument_node="">To reach their audiences, both sides presented internally cohesive stories by referring to legal arguments — as </span><a aria-label="Reference Hansen (2011)" data-dcnode-id="1833" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d137308082e977" title="Hansen, Lene (2011) ‘Performing Practices: A Postructuralist Analysis of the Muhammad Cartoon Crisis’, in Emanuel Adler and Vincent Pouliot eds, International Practices, 280–309, Cambridge: Cambridge University Press."><span data-dcnode-id="1834" instrument_node="">Hansen (2011)</span></a><span data-dcnode-id="1832" instrument_node=""> puts it, they both agreed to situate the crisis within an (international) legal politico-epistemic domain, even if they disagreed on important aspects within this legal framework. For example, Russia repeatedly mentioned that the West agreed to hold a referendum for Kosovo’s independence, but condemned the Crimean referendum. According to Russian views, this perception of unequal treatment contradicted norms of fairness and equality for states, implying that what is acceptable for one country should be acceptable for all others. The West insisted that the Kosovo case was unique (</span><a aria-label="Reference Berg and Mölder 2014" data-dcnode-id="1830" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d137308082e980" title="Berg, Eiki and Martin Mölder (2014) ‘‘When “Blurring” becomes the Norm and Secession is Justified as the Exception: Revisiting EU and Russian Discourses in the Common Neighbourhood’’, Journal of International Relations and Development 17(4): 469–488."><span data-dcnode-id="1831" instrument_node="">Berg and Mölder 2014</span></a><span data-dcnode-id="1829" instrument_node="">) and could not be compared with the Crimean case as thousands of Albanians had been killed in Kosovo while the West argued there was no credible comparable threat to the Russian population. For this reason, hastily organised and militarily controlled referendum in Crimea was illegitimate in Western narratives. As </span><a aria-label="Reference Allison (2014" data-dcnode-id="1827" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d137308082e983" title="Allison, Roy (2014) ‘Russian ‘Deniable’ ‘Intervention in Ukraine: How and Why Russia Broke the Rules’, International Affairs 90(6): 1255–1297."><span data-dcnode-id="1828" instrument_node="">Allison (2014</span></a><span data-dcnode-id="1826" instrument_node="">: 1295) has pointed out, ‘in a rule-based system legal rhetoric matters, and […] the contestation of legal interpretations frames international diplomacy’. Legal rhetoric is a discursive process which ‘frames what is considered legitimate’, including the legal basis for military intervention and the context of ‘self-determination’, and such a persuasion and deliberation are most prominently conducted in the UNSC (</span><i data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">ibid.</span></i><span data-dcnode-id="1823" instrument_node="">: 1258).</span></p><p data-dcnode-id="1811"><span data-dcnode-id="1821" instrument_node="">Appeals to law, legality, legitimacy and rights are at the centre of political narrative building and debates for the involved parties, even though each side emphasises the elements most coherent with its own narrative. </span><a data-dcnode-id="1819" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1820" instrument_node="">Table 2</span></a><span data-dcnode-id="1818" instrument_node=""> shows the number of occurrences of key legal concepts in diplomatic speeches during the UNSC meetings No. 7124, 7125, 7134, 7138 and 7144 by country.</span><sup data-dcnode-id="1813"><a data-dcnode-id="1814" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Footnote </span></span><span data-dcnode-id="1815" instrument_node="">8</span></a></sup><span data-dcnode-id="1812" instrument_node=""> They heavily appealed to ‘international law’, ‘legal norms’; ‘agreements’, ‘legality’ and ‘legitimacy’, and these issues appeared as the essential elements of the plot development. Russia never mentioned the Budapest Memorandum but much more frequently referred to constitutional matters. Russia also pointed extensively to the ‘21 February Agreement’. But the opponents criticised Russia for not supporting and signing this agreement at the time of its conclusion.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1796" data-test="inline-table" id="table-2"><figure data-dcnode-id="1797"><figcaption class="c-article-table__figcaption" data-dcnode-id="1808"><b data-dcnode-id="1809" data-test="table-caption" id="Tab2"><span data-dcnode-id="1810" instrument_node="">Table 2 Key argumentative concepts used in five UNSC public meetings (word count)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1798"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="1799" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/jird.2016.6/tables/2" rel="nofollow"><span data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1800" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1801" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1802" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1805" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1804" fill-rule="evenodd"></path><span data-dcnode-id="1803" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">In this legal politico-epistemic domain, to undermine an opposing narrative, diplomats often tried to show that its proponents had an unduly partisan perception of the facts, or that their actions and words contradicted one another. Each contending party considered its own narrative to be supported by ‘the facts’, and that of the other to be hypocritical. The US representative at the UN said as much during the emergency session inspected above, announcing that ‘[Russian] Actions speak louder than [Russian] words’.</span></p><p data-dcnode-id="1785"><span data-dcnode-id="1792" instrument_node="">Yet, narratives are always of a ‘constructed nature’ (</span><a aria-label="Reference Bruner 1987" data-dcnode-id="1790" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d137308082e1268" title="Bruner, Jerome (1987) ‘Life as Narrative’, Social Research 54(1): 11–32."><span data-dcnode-id="1791" instrument_node="">Bruner 1987</span></a><span data-dcnode-id="1789" instrument_node="">). Political narratives are typically assembled from selectively taken or accentuated pieces of reality. That is why, from the perspective of narrative analysis, it makes little sense to discuss whether or not narratives are true and coherent with facts. Narratives constantly create and recreate that what agents treat as reality. Narratives are real as long as they are believed to be so. The power of narratives constructed in speech depends not on the degree to which they represent reality but on their cohesion with the existing narratives (and thus the existing ‘realities’), and the extent to which people believe in them. For instance, </span><a aria-label="Reference Spencer (2014)" data-dcnode-id="1787" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d137308082e1271" title="Spencer, Alexander (2014) ‘Romantic Stories of the Pirate in IARRRH: The Failure of Linking Piracy and Terrorism Narratives in Germany’, International Studies Perspectives 15(3): 297–312."><span data-dcnode-id="1788" instrument_node="">Spencer (2014)</span></a><span data-dcnode-id="1786" instrument_node=""> shows that the attempt to link piracy and terrorism were largely a failure because piracy was already narrated positively through romanticised stories. In the course of the Crimea crisis, it is clear that contesting the ‘truth’ of a narrative is but a part of another narrative.</span></p><p data-dcnode-id="1771"><span data-dcnode-id="1784" instrument_node="">This contributes further to the debate about differences between public diplomacy and propaganda. According to some authors, public diplomacy is a genuine dialogue which contains both speaking and listening, while propaganda is primarily a manipulative act aimed at achieving persuasive goals even by deceptive means (</span><a aria-label="Reference Melissen 2005" data-dcnode-id="1782" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d137308082e1278" title="Melissen, Jan, ed. (2005) ‘The New Public Diplomacy: Between Theory and Practice’, in, The New Public Diplomacy. Soft Power in International Relations, 3–27, Basingstoke: Palgrave Macmillan."><span data-dcnode-id="1783" instrument_node="">Melissen 2005</span></a><span data-dcnode-id="1781" instrument_node="">; </span><a aria-label="Reference Cull 2008" data-dcnode-id="1779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d137308082e1281" title="Cull, Nicholas (2008) ‘Diplomacy: Taxonomies and Histories’, The ANNALS of the American Academy of Political and Social Science 616(1): 31–54."><span data-dcnode-id="1780" instrument_node="">Cull 2008</span></a><span data-dcnode-id="1778" instrument_node="">). Others do not see a fundamental difference between public diplomacy and propaganda (</span><a aria-label="Reference Holbrooke 2001" data-dcnode-id="1776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d137308082e1284" title="Holbrooke, Richard (2001) ‘Get the Message Out’. The Washington Post 28 October, 
                    http://www.washingtonpost.com/wp-dyn/content/article/2010/12/13/AR2010121305410.html
                    
                  , accessed 15 July, 2014)."><span data-dcnode-id="1777" instrument_node="">Holbrooke 2001</span></a><span data-dcnode-id="1775" instrument_node="">; </span><a aria-label="Reference Berridge 2010" data-dcnode-id="1773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d137308082e1287" title="Berridge, Geoffrey (2010) Diplomacy: Theory and Practice, 4th edn. Houndmills and New York: Palgrave Macmillan."><span data-dcnode-id="1774" instrument_node="">Berridge 2010</span></a><span data-dcnode-id="1772" instrument_node="">). In our analysis, narratives play an important role in both propaganda and genuine dialogue. They may wrap dangerous ideas in attractive verbal shells, or deliver peaceful messages to foreign audiences. However, propaganda is mostly a ‘one way’ narrative whose use of narrative techniques tends to ignore the other side’s narratives. On the contrary, genuine dialogue uses a ‘two-way narrative’ structure requiring understanding and engagement with the opposing narratives. When public diplomacy fails at this engagement, it becomes simply propaganda.</span></p><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">In sum, in the crisis over Crimea, diplomats constantly performed public diplomacy practices through public speech making, media interviews and public debates. Confronted with a deadlock, they tried to change the other’s preferences and claims by undermining its narrative and promoting their own narrative, in particular through appeals to international law. The proliferation of communication technologies made this narrative management all the more integral to their activities. Owing to the clash of narratives, these attempts were unsuccessful and, in fact, strengthened each narrative, reinforcing the deadlock rather than overcoming it. This is also because, in their successive narrative battles, diplomats do not fight alone: the deadlock was accentuated further by the intrusion of non-state actors in the game of narrative diplomacy.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1767" id="Sec9"><span data-dcnode-id="1768" instrument_node="">The media and the deadlock</span></h3><p data-dcnode-id="1762"><span data-dcnode-id="1766" instrument_node="">The process of political narration involves not only diplomats, politicians and governmental actors but also the media, civil society, non-governmental organisations and private actors — all of whom are constantly feeding domestic and international narratives. Non-state actors participate actively in international politics through the building and management of political narratives that serve some actors and challenge others. International non-governmental organisations may condemn human rights violations in some countries or pressure certain governments to sign and ratify specific international treaties through building or supporting particular political narratives. Meanwhile, media reporting on events can reach domestic and international audiences, bolstering specific narratives and marginalising others. They ‘fram[e] news into narratives that use familiar reference points to help audiences make sense of information in ways that are familiar’ (</span><a aria-label="Reference Dyczok 2015" data-dcnode-id="1764" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d137308082e1301" title="Dyczok, Marta (2015) ‘The Ukraine Story in Western Media’, in Agnieszka Pikulicka-Wilczewska and Richard Sakwa eds, Ukraine and Russia: People, Politics, Propaganda and Perspectives, 197–205, Bristol: E-International Relations publishing."><span data-dcnode-id="1765" instrument_node="">Dyczok 2015</span></a><span data-dcnode-id="1763" instrument_node="">: 204). These narrative practices of non-traditional actors are in constant interaction with those of diplomats.</span></p><p data-dcnode-id="1748"><span data-dcnode-id="1761" instrument_node="">In the Crimean conflict of narratives, the media as narrative makers increased the tensions: in general, they served their respective state’s political narratives, particularly in Russia where the press is closely monitored by the state (</span><a aria-label="Reference McKenzie 2014" data-dcnode-id="1759" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d137308082e1307" title="McKenzie, Brent (2014) ‘The Crisis in Crimea — ‘Voices’ From Canada: A Qualitative Study’, Journal of Eastern European and Central Asian Research 1(2): 1–6."><span data-dcnode-id="1760" instrument_node="">McKenzie 2014</span></a><span data-dcnode-id="1758" instrument_node="">; </span><a aria-label="Reference Cottieroa et al. 2015" data-dcnode-id="1756" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d137308082e1310" title="Cottiero, Christina, Katherine Kucharski, Evgenia Olimpieva and Robert W. Orttung (2015) ‘War of Words: The Impact of Russian State Television on the Russian Internet’, Nationalities Papers: The Journal of Nationalism and Ethnicity 43(4): 533–555."><span data-dcnode-id="1757" instrument_node="">Cottieroa et al. 2015</span></a><span data-dcnode-id="1755" instrument_node="">; </span><a aria-label="Reference Dyczok 2015" data-dcnode-id="1753" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d137308082e1313" title="Dyczok, Marta (2015) ‘The Ukraine Story in Western Media’, in Agnieszka Pikulicka-Wilczewska and Richard Sakwa eds, Ukraine and Russia: People, Politics, Propaganda and Perspectives, 197–205, Bristol: E-International Relations publishing."><span data-dcnode-id="1754" instrument_node="">Dyczok 2015</span></a><span data-dcnode-id="1752" instrument_node="">; </span><a aria-label="Reference Hutchings and Szostek 2015" data-dcnode-id="1750" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d137308082e1316" title="Hutchings, Stephen and Joanna Szostek (2015) ‘Dominant Narratives in Russian Political and Media Discourse during the Ukraine Crisis’, in Agnieszka Pikulicka-Wilczewska and Richard Sakwa eds, Ukraine and Russia: People, Politics, Propaganda and Perspectives, 183–196, Bristol: E-International Relations publishing."><span data-dcnode-id="1751" instrument_node="">Hutchings and Szostek 2015</span></a><span data-dcnode-id="1749" instrument_node="">). The media, to a large extent, did not contribute to understanding the other side’s narratives. Political narratives of the conflicting parties got additional impact from the media and public opinion, and that contributed to the escalation of the international narrative struggle.</span></p><p data-dcnode-id="1731"><span data-dcnode-id="1747" instrument_node="">This escalation becomes clear when we look at how the others’ narratives were portrayed. The representations of other narratives are generally exaggerated and distorted visions that promote simplistic views of the other. For instance, as </span><a aria-label="Reference Dyczok (2015" data-dcnode-id="1745" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d137308082e1322" title="Dyczok, Marta (2015) ‘The Ukraine Story in Western Media’, in Agnieszka Pikulicka-Wilczewska and Richard Sakwa eds, Ukraine and Russia: People, Politics, Propaganda and Perspectives, 197–205, Bristol: E-International Relations publishing."><span data-dcnode-id="1746" instrument_node="">Dyczok (2015</span></a><span data-dcnode-id="1744" instrument_node="">: 201) explains, ‘many mixed messages reached [Western] audiences’, and confusion about what exactly was going on often prevailed in Western media. In this context, ‘often the Ukraine story was reported in easily recognisable portrayals of protesters </span><i data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">vs</span></i><span data-dcnode-id="1741" instrument_node=""> police, East </span><i data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">vs</span></i><span data-dcnode-id="1738" instrument_node=""> West, a new Cold War’ (</span><i data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">ibid.</span></i><span data-dcnode-id="1735" instrument_node="">: 204). The complexity of the situation, and the necessity to be ‘clear and understandable’ in ‘3 minutes’ — the usual time for an interview — rarely opened spaces for a complex narration of the crisis (</span><i data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">ibid.</span></i><span data-dcnode-id="1732" instrument_node="">: 198). As a consequence, few heterodox voices were able to make the public grasp the complexity of foreign narratives.</span></p><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Often, each narrative attributed no plausibility to the other: to the Western politicians, diplomats and most ordinary people, the Russian narrative was obviously a cover. And to Russians, the Western narrative was also evidently a façade. Rather puzzlingly, no one wanted to believe that the others truly believed in their own narratives, and yet everyone truly believed in their own. Whenever one party became aware of the others’ narratives, it was immediately interpreted as a false front. Narratives have such a powerful and polarising effect because they touch people’s identities, convictions, dispositions and emotions. This makes deadlocks even more unbridgeable.</span></p><p data-dcnode-id="1718"><span data-dcnode-id="1728" instrument_node="">The Crimean crisis thus illustrates a surprising phenomenon: instead of contributing to one common and global narrative, the proliferation of the media and means of communication witnessed in recent times reinforces the opposition between divergent narratives. It is commonly held that, due to the increased interdependence and access in the world, and the expansion of communication technologies, inner and outer narratives become more unified. For </span><a aria-label="Reference Melissen (2005" data-dcnode-id="1726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d137308082e1343" title="Melissen, Jan, ed. (2005) ‘The New Public Diplomacy: Between Theory and Practice’, in, The New Public Diplomacy. Soft Power in International Relations, 3–27, Basingstoke: Palgrave Macmillan."><span data-dcnode-id="1727" instrument_node="">Melissen (2005</span></a><span data-dcnode-id="1725" instrument_node="">: 13), ‘the “interconnected” realities of global relationships [mean that …] the domestic and foreign dimensions of engagement with “the public” are more connected than ever before’. </span><a aria-label="Reference Mitzen (2005" data-dcnode-id="1723" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d137308082e1346" title="Mitzen, Jennifer (2005) ‘Reading Habermas in Anarchy: Multilateral Diplomacy and Global Public Spheres’, American Political Science Review 99(3): 401–17."><span data-dcnode-id="1724" instrument_node="">Mitzen (2005</span></a><span data-dcnode-id="1722" instrument_node="">: 401), influenced by her Habermasian reading of anarchy, considers that ‘multilateral diplomacy — “talk” and argument among states — legitimate state action’, particularly when these talks are public. In some circumstances, what she has called the ‘forum effects of talk’ (</span><i data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">ibid.</span></i><span data-dcnode-id="1719" instrument_node="">: 411–12) might indeed create a shared normative order. Yet, the crisis over Crimea shows that the competition for attention between contending narratives and the proliferation of public discourses, and means of communication also produce divisions and entrenched opposition.</span></p><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Interconnectedness does not necessarily favour exchanges, dialogue and, in the end, a common understanding — even when those who debate and negotiate in international organisations consider not only the prevailing narratives at home, but also how to present their narratives to foreign politicians, diplomats and public. This was evident in the emergency session of the UNSC. Diplomats spoke with one another, presenting and contesting their views in front of an international audience, and communication technologies simulcast these exchanges of views all over the world, with narratives also clearly reaching ‘domestic’ audiences. Yet, the narratives’ deep roots in individual and collective identity led people to listen to and believe stories that fit with their identities rather than stories that questioned them. The proliferation of discourses did not create one global narrative: on the contrary, the UNSC emergency session shows that incompatible narratives get reinforced as they are disseminated to different publics all over the world.</span></p><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Moreover, interconnectedness accentuates further the impact of prestige considerations in negotiations, which often make public compromising over narratives very difficult. No international actors want to compromise their ‘self’ publicly. This is why public narrative debates in diplomacy generally produce scant results, serving more often to merely reinforce the existing (conflict of) narratives. Sometimes this leads diplomats to negotiate narratives privately ‘behind closed doors’, which provides more opportunities to compromise or build joint narratives. Yet, narratives discussed privately will need to be made public at some point. Going public with newly developed narratives requires a careful management of them at both international and national levels, taking into account the self-definitions of each actor and the prestige considerations these imply.</span></p><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">In sum, media narrative practices during the Crimean crisis amplified the clash of narratives. Far from rectifying this clash, global interconnectedness allowed for the dissemination of opposed narratives that nurtured it. This is because narratives are interpreted within existing systems of beliefs by diplomats, decision makers, journalists and people alike. When they are incompatible with the existing beliefs they are labelled blatant propaganda, confirming and reinforcing one’s own subjective narrative. This also explains why the Crimean crisis reached a profound deadlock.</span></p></div></div></section><section data-dcnode-id="1685" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1686" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1707" id="Sec10"><span data-dcnode-id="1708" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1687" id="Sec10-content"><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Narratives cannot be separated from the processes that enact them and put them in competition with other narratives. Scaling down the analysis of narratives to practitioners and their practices, our practice theory approach to the crisis in Crimea thus focused on the processes through which narratives compete at the international level. To study these processes, we identified practitioners’ background assumptions, strategies and constraints constitutive of specific narrative practice in secret talks, in public diplomacy, and in media reports during the crisis. In each of these sites, competing narratives have been shown to be determinant: they informed strategic and geopolitical interests negotiated in secret talks; they gave sense to the rhetorical use of international law in public diplomacy and they explained why interconnectedness fostered rather than reduced misunderstandings. In turn, the practices performed in these sites were constitutive of the clash of narratives itself — this clash did not exist independently of the narrative practice studied.</span></p><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">This study shows that, in their relations with foreign counterparts and publics during international conflict, diplomats and non-state actors act as narrative practitioners. Practices of media reporting may contribute to the clash of narratives; diplomats may feed narratives with supporting information, translate foreign narratives to their superiors and go public to promote their own narratives and affect foreign audiences. They may debate and negotiate to forge a common narrative that would put an end to a crisis. In practice, these different roles and functions are often entwined. Diplomats may feed, analyse, translate, serve, confront and negotiate narratives simultaneously.</span></p><p data-dcnode-id="1695"><span data-dcnode-id="1702" instrument_node="">At a theoretical level, this illustrates the value added by a focus on narrative practices. It is crucial not to create ‘a new dualism’ between narratives and practices (</span><a aria-label="Reference Bueger and Gadinger 2014" data-dcnode-id="1700" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d137308082e1372" title="Bueger, Christian and Frank Gadinger (2014) International Practice Theory: New Perspectives, Basingstoke: Palgrave Macmillan."><span data-dcnode-id="1701" instrument_node="">Bueger and Gadinger 2014</span></a><span data-dcnode-id="1699" instrument_node="">: 43). Narratives inform practices and practices embody narratives: what people have in their mind and what their bodies do are mutually constitutive. Our framework is thus able to grasp the dynamics that practice theory or narrative analysis taken separately cannot understand. On the one hand, complementing the existing analyses of practices, it shows that practitioners perform </span><i data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">specific</span></i><span data-dcnode-id="1696" instrument_node=""> practices (rather than general ones) in a determinate narrative context. On the other hand, complementing the existing analyses of narratives, it provides insights into how and why some narratives come to dominate international politics while others are marginalised.</span></p><p data-dcnode-id="1690"><span data-dcnode-id="1694" instrument_node="">This also contributes to a better understanding of diplomacy. Scholars of diplomacy usually analyse secret diplomacy, public diplomacy, and non-state diplomacy separately. When they think about their relationship, it is only in terms of reciprocal influence of one on the others. Here we take these distinctive logics into account within a coherent theoretical framework. As </span><a aria-label="Reference Hansen (2011" data-dcnode-id="1692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d137308082e1381" title="Hansen, Lene (2011) ‘Performing Practices: A Postructuralist Analysis of the Muhammad Cartoon Crisis’, in Emanuel Adler and Vincent Pouliot eds, International Practices, 280–309, Cambridge: Cambridge University Press."><span data-dcnode-id="1693" instrument_node="">Hansen (2011</span></a><span data-dcnode-id="1691" instrument_node="">: 290) explains, thanks to the study of practice, ‘the question of whether states or non-state actors are more important can be turned into the study of how “practitioners” (broadly conceived) perform within and constitute politico-epistemic domains. This reformulation lets the unfolding of practices, rather than a predetermined definition of who counts as actors, structure the analysis’. State and non-state actors identified in the various sites studied here have their own specificities. Yet, in each of their own field(s), they are narrative practitioners.</span></p><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">In the Crimean case, diplomatic negotiations failed because the crisis was not only a conflict over incompatible interests or about different interpretations of international laws, but between conflicting narratives and the resulting practices of narrative management. Both privately and publicly, the contending parties did not speak the same language, and were never on the same wavelength. Our study shows that, despite the wide possibilities of exchange of narratives in a globalised world, if political narratives are too far apart, each side tends to ignore the other’s stories. They inhabit different worlds and disagree about very basic facts. Because they talk past one another, lacking a minimum of common frames, through their respective practices, all involved parties create strong homogeneous blocks of interpretation. In such a situation, diplomatic deadlock is the most probable outcome.</span></p></div></div></section><span data-dcnode-id="1684" instrument_node="">
</span><section data-dcnode-id="1625" data-title="Notes"><div class="c-article-section" data-dcnode-id="1626" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1682" id="notes"><span data-dcnode-id="1683" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1627" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1628"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1672" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1673"><p data-dcnode-id="1674"><span data-dcnode-id="1681" instrument_node="">‘Narrative’ and ‘discourse’ have some essential differences. ‘A discourse is a unit of utterance: it is something written or spoken that is larger than a sentence’ (</span><a aria-label="Reference Polkinghorne 1988" data-dcnode-id="1679" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d137308082e410" title="Polkinghorne, Donald (1988) Narrative Knowing and the Human Sciences, New York: State University of New York Press."><span data-dcnode-id="1680" instrument_node="">Polkinghorne 1988</span></a><span data-dcnode-id="1678" instrument_node="">: 31). But narrative is a story, ‘an account of connected sequence of human happenings’ (</span><a aria-label="Reference Roberts 2001" data-dcnode-id="1676" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d137308082e413" title="Roberts, Geoffrey, ed. (2001) ‘Introduction: The History and Narrative Debate, 1960–2000’, in, The History and Narrative Reader, 1–22, New York: Routledge."><span data-dcnode-id="1677" instrument_node="">Roberts 2001</span></a><span data-dcnode-id="1675" instrument_node="">: 16). Any narrative is a discourse but not all discourses are narratives. Discourse becomes a narrative when it acquires a plot, a connected sequence of happenings and an actor. Discourse represents a linguistic or rhetorical phenomenon, narrative epitomises a specific type of linguistic reality where the actor — narrator — plays a role, and narrative practice embodies a meaningful social action. Accordingly, narrative analysis, in contrast to discourse analysis, is focused on the presentation of an internally connected, holistic and meaningful story by someone. For understanding narratives, it is important to understand not only the plot and the sequential development of event but also the identity and self of the actor in the context of its relations with others.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1665" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1666"><p data-dcnode-id="1667"><span data-dcnode-id="1671" instrument_node="">On speech making by diplomats, see </span><a aria-label="Reference Neumann (2012)" data-dcnode-id="1669" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d137308082e447" title="Neumann, Iver (2012) At Home with the Diplomats: Inside a European Foreign Ministry, Ithaca: Cornell University Press."><span data-dcnode-id="1670" instrument_node="">Neumann (2012)</span></a><span data-dcnode-id="1668" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="1655" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="1656"><p data-dcnode-id="1657"><span data-dcnode-id="1664" instrument_node="">The transcripts of this and other public sessions of the UNSC meetings on the Crimean crisis are available at the United Nations Dag Hammarskjöld Library’s Website, </span><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/depts/dhl/resguide/scact2014_en.shtml"><span data-dcnode-id="1663" instrument_node="">http://www.un.org/depts/dhl/resguide/scact2014_en.shtml</span></a><span data-dcnode-id="1661" instrument_node=""> (last access on 15 July, 2014). A video record of the 7124th meeting of the UNSC is available on the UN Web TV at </span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//webtv.un.org/watch/ukraine-security-council-7124th-meeting/3277299647001"><span data-dcnode-id="1660" instrument_node="">http://webtv.un.org/watch/ukraine-security-council-7124th-meeting/3277299647001</span></a><span data-dcnode-id="1658" instrument_node=""> (last accessed 10 May, 2014).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="1648" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="1649"><p data-dcnode-id="1650"><span data-dcnode-id="1654" instrument_node="">Statement of G-7 Leaders on Ukraine from 12 March, 2014. The White House Website: </span><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whitehouse.gov/the-press-office/2014/03/12/statement-g-7-leaders-ukraine"><span data-dcnode-id="1653" instrument_node="">http://www.whitehouse.gov/the-press-office/2014/03/12/statement-g-7-leaders-ukraine</span></a><span data-dcnode-id="1651" instrument_node=""> (last accessed 15 July, 2014).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="1644" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="1645"><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Shenhav himself has applied this method to a speech by Ariel Sharon.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="1640" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="1641"><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">In February and March 2014, seven meetings of the UNSC on the situation in Ukraine were held in New York: on 28 February (7123rd meeting); 1 March (7124th meeting); 3 March (7125th meeting); 10 March (7131st meeting); 13 March (7134th meeting); 15 March (7138th meeting) and 19 March (7144th meeting). Two of them (7123 and 7131) were closed, and the other five were public. Some meetings were particularly long: 7125th — 2 hours and 5 min, 7134th — 2 hours, 7138th — 1 hour and 15 min, and 7144th — 2 hours. Although it only lasted 35 min, we chose to focus on the 7124th meeting because it set up the tone of the public discussion on the Crimea crisis in the UNSC and introduced some key concepts of narration.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="1633" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="1634"><p data-dcnode-id="1635"><span data-dcnode-id="1639" instrument_node="">The Memorandum on Security Assurances in connection with Ukraine’s accession to the Treaty on the Non-Proliferation of Nuclear Weapons was signed by Ukraine, the Russian Federation, the United Kingdom of Great Britain and Northern Ireland, and the United States of America in Budapest, Hungary, on 5 December, 1994. Available at the website of the Permanent Mission of Poland to the UN Office and International Organisations in Vienna </span><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msz.gov.pl/en/p/wiedenobwe_at_s_en/news/memorandum_on_security_assurances_in_connection_with_ukraine_s_accession_to_the_treaty_on_the_npt"><span data-dcnode-id="1638" instrument_node="">https://www.msz.gov.pl/en/p/wiedenobwe_at_s_en/news/memorandum_on_security_assurances_in_connection_with_ukraine_s_accession_to_the_treaty_on_the_npt</span></a><span data-dcnode-id="1636" instrument_node=""> (last accessed 15 July, 2014).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="1629" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="1630"><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">We analysed the speeches of the representatives of France, Russia, Ukraine, the United Kingdom and the United States. They are the key countries who set the tone of the narrative contest in the first public meeting of the UNSC on the Crimean crisis (although the representatives of some other states, too, made interventions in the last four meetings in this series).</span></p></div></li></ol></div></div></section><div data-dcnode-id="1062" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1063" data-title="References"><div class="c-article-section" data-dcnode-id="1064" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1623" id="Bib1"><span data-dcnode-id="1624" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1065" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1066"><ul class="c-article-references" data-dcnode-id="1076"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="1613"><p class="c-article-references__text" data-dcnode-id="1621" id="ref-CR1"><span data-dcnode-id="1622" instrument_node="">Adler, Emanuel and Vincent Pouliot, eds (2011) ‘International Practices: Introduction and Framework’, in, International Practices, 3–35, Cambridge: Cambridge University Press.</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="1614"><a aria-label="Chapter reference 1" data-dcnode-id="1619" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A/
