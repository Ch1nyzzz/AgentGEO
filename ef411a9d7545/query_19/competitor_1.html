</span><span class="icon-marker" data-dcnode-id="455"></span><span class="svgcon-icon-paper svg" data-dcnode-id="454" data-grunticon-embed=""></span><span data-dcnode-id="453" instrument_node=""> </span><h1 class="the-h3" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">
        The 10th International Conference on Business, International Relations and Diplomacy (ICOBIRD), Jakarta 5-6 October 2021    </span></h1><span data-dcnode-id="450" instrument_node="">
</span><p class="block-description" data-dcnode-id="449"></p></div><span data-dcnode-id="447" instrument_node="">
</span><div class="wp-content the-640" data-dcnode-id="72"><span data-dcnode-id="446" instrument_node="">
</span><h1 data-dcnode-id="441" style="text-align: center"><span data-dcnode-id="445" instrument_node="">CALL FOR PAPER </span><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">EXTENDED</span></strong><span data-dcnode-id="442" instrument_node=""> TO 10 AUGUST 2021</span></h1><span data-dcnode-id="440" instrument_node="">
</span><h1 data-dcnode-id="437"><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ir.binus.ac.id/icobird-2021-revised-1/" rel="attachment wp-att-10508"><img alt="" class="aligncenter size-full wp-image-10508" data-dcnode-id="439" height="1919" loading="lazy" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ir.binus.ac.id/files/2021/08/ICOBIRD-2021-Revised-1.png&amp;raw" srcset="https://ir.binus.ac.id/files/2021/08/ICOBIRD-2021-Revised-1.png 1440w, https://ir.binus.ac.id/files/2021/08/ICOBIRD-2021-Revised-1-640x853.png 640w, https://ir.binus.ac.id/files/2021/08/ICOBIRD-2021-Revised-1-1200x1599.png 1200w, https://ir.binus.ac.id/files/2021/08/ICOBIRD-2021-Revised-1-1153x1536.png 1153w, https://ir.binus.ac.id/files/2021/08/ICOBIRD-2021-Revised-1-480x640.png 480w, https://ir.binus.ac.id/files/2021/08/ICOBIRD-2021-Revised-1-768x1023.png 768w, https://ir.binus.ac.id/files/2021/08/ICOBIRD-2021-Revised-1-1024x1365.png 1024w" width="1440"></a></h1><span data-dcnode-id="436" instrument_node="">
</span><h3 data-dcnode-id="433" style="text-align: justify"><b data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Overview</span></b></h3><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430" style="text-align: justify"><span data-dcnode-id="431" instrument_node="">This year marks a decade of International Conference on Business, International Relations, and Diplomacy (ICOBIRD). The conference has been organised by the Department of International Relations at Bina Nusantara (BINUS) University as part of BINUS Joint International Conference (BJIC). The year of 2021 also marks a year on the COVID-19 pandemic, a health crisis that has brought multiple effects on almost all lines of international politics.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427" style="text-align: justify"><span data-dcnode-id="428" instrument_node="">On one hand, illiberal turn and the rise of populism in democracy are troubling developments that occur in multiple countries today. On the other hand, public diplomacy and foreign policy had been changing to adapt with these shared challenges in mitigating the spread of the disease. International business chains, in particular, have been disrupted due to lockdown policies in numerous countries. Furthermore, regionalism and global health governance are under scrutiny as to how these forums should ensure access to vaccines. The global architecture might require countries to change their strategic approach in dealing with pandemic as a human security threat.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="421" style="text-align: justify"><span data-dcnode-id="425" instrument_node="">With this background, the 10th International Conference on Business, International Relations, and Diplomacy (ICOBIRD) will be held online under the theme </span><b data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">“Surviving the Pandemic and the Shift in Global Architecture”</span></b><span data-dcnode-id="422" instrument_node="">. This conference offers rigorous and readable examinations of a wide range of international politics which are both of academic interest and policy relevance. It invites authors across the globe to submit their papers which engage with ICOBIRD’s core theme and topics.</span></p><span data-dcnode-id="420" instrument_node="">
</span><h3 data-dcnode-id="417" style="text-align: justify"><b data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Aims and Scope</span></b></h3><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414" style="text-align: justify"><span data-dcnode-id="415" instrument_node="">ICOBIRD 2021 aims to strengthen social sciences epistemic communities in Indonesia. It re-emphasises the importance of supporting scholars to conduct high-quality research and to publish their works in scholarly journals. Hence, the conference will be supported by convenors and discussants in each panel session.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411" style="text-align: justify"><span data-dcnode-id="412" instrument_node="">The convener’s primary responsibility is to serve as the organiser and administrator of the collaboration, and to carry out the preliminary and follow-up tasks that ensure the panel proceeds smoothly. Meanwhile, the discussants provide insights into each presenter’s value by distilling the central arguments, commenting on the methods, suggesting what implications have the most value, and providing a measure of peer review.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408" style="text-align: justify"><span data-dcnode-id="409" instrument_node="">ICOBIRD 2021 also aspires to collaborate with the Indonesian Association of International Relations Studies (AIHII), therefore we intend to invite scholars from AIHII to become co-convenors in respective topics. As the scope of the conference is international, we aim to receive submissions from both Indonesia and overseas.</span></p><span data-dcnode-id="407" instrument_node="">
</span><h3 data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Topics</span></h3><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402" style="text-align: justify"><span data-dcnode-id="403" instrument_node="">The papers can be theoretical or based on empirical case studies from any states or regions in the world. The topics will include but not limited to:</span></p><span data-dcnode-id="401" instrument_node="">
</span><ul data-dcnode-id="384"><span data-dcnode-id="400" instrument_node="">
</span><li data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">ASEAN&nbsp; and Regionalism</span></li><span data-dcnode-id="397" instrument_node="">
</span><li data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Global Governance and Multilateralism</span></li><span data-dcnode-id="394" instrument_node="">
</span><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Gender and Intersectionality in World Politics</span></li><span data-dcnode-id="391" instrument_node="">
</span><li data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Security, Diplomacy, and Foreign Policy Studies</span></li><span data-dcnode-id="388" instrument_node="">
</span><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">International Business and Non-Conventional/Contemporary Issues</span></li><span data-dcnode-id="385" instrument_node="">
</span></ul><span data-dcnode-id="383" instrument_node="">

</span><h3 data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Publishing with ICOBIRD 2021: step-by-step</span></h3><span data-dcnode-id="139" instrument_node="">
</span><h4 data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">1. Find a panel</span></h4><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">Find out which panel that could be best suited for publishing your research. ICOBIRD 2021 has five panels:</span></p><span data-dcnode-id="133" instrument_node="">
</span><ol data-dcnode-id="116"><span data-dcnode-id="132" instrument_node="">
</span><li data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">ASEAN and Regionalism</span></li><span data-dcnode-id="129" instrument_node="">

</span><li data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">International Business/Non-Conventional/Contemporary Issues</span></li><span data-dcnode-id="117" instrument_node="">
</span></ol><span data-dcnode-id="115" instrument_node="">
</span><h4 data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">2. Prepare your paper for submission</span></h4><span data-dcnode-id="112" instrument_node="">
</span><p data-dcnode-id="108" style="text-align: left"><span data-dcnode-id="111" instrument_node="">Download ICOBIRD 2021 Instruction for Author based on journals table here: </span><a data-dcnode-id="109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bit.ly/ICOBIRD2021--Instruction_Author"><span data-dcnode-id="110" instrument_node="">http://bit.ly/ICOBIRD2021–Instruction_Author</span></a></p><span data-dcnode-id="107" instrument_node="">
</span><p data-dcnode-id="105" style="text-align: justify"><span data-dcnode-id="106" instrument_node="">Please consult with the panel and respective journal links that outline the essential steps in preparing a paper. It is very important that you stick to the specific “guide for authors” of the journal to which you are submitting. This can be found on the journal’s home page.</span></p><span data-dcnode-id="104" instrument_node="">
</span><h4 data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">3. Submit and revise</span></h4><span data-dcnode-id="101" instrument_node="">
</span><p data-dcnode-id="97"><span data-dcnode-id="100" instrument_node="">You can submit your manuscript using ICOBIRD 2021 online systems: </span><a data-dcnode-id="98" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bit.ly/ICOBIRD2021--Submission"><span data-dcnode-id="99" instrument_node="">http://bit.ly/ICOBIRD2021–Submission</span></a></p><span data-dcnode-id="96" instrument_node="">
</span><p data-dcnode-id="94" style="text-align: justify"><span data-dcnode-id="95" instrument_node="">Once submitted, your paper will be considered by the editors and if it passes initial screening, it will be sent for peer review by experts in your selected panel. If deemed unsuitable for publication in ICOBIRD 2021, the editors will notify the screening result as soon as possible.</span></p><span data-dcnode-id="93" instrument_node="">
</span><h4 data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">4. Track your research</span></h4><span data-dcnode-id="90" instrument_node="">
</span><p data-dcnode-id="88" style="text-align: justify"><span data-dcnode-id="89" instrument_node="">You can track the status of your submitted paper online. The system you use to track your submission will be the same system to which you submitted. Use the reference number you received after submission to track your submission.</span></p><span data-dcnode-id="87" instrument_node="">
