</span><div class="vc_single_image-wrapper vc_box_border_grey" data-dcnode-id="565"><img alt="" class="vc_single_image-img attachment-full" data-dcnode-id="566" height="285" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artscimedia.case.edu/wp-content/uploads/sites/81/2018/12/12235331/newbanner.jpg&amp;raw" srcset="https://artscimedia.case.edu/wp-content/uploads/sites/81/2018/12/12235331/newbanner.jpg 960w, https://artscimedia.case.edu/wp-content/uploads/sites/81/2018/12/12235331/newbanner-300x89.jpg 300w, https://artscimedia.case.edu/wp-content/uploads/sites/81/2018/12/12235331/newbanner-768x228.jpg 768w" width="960"></div><span data-dcnode-id="564" instrument_node="">

</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="521"><span data-dcnode-id="559" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="523"><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="555"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Welcome to the International Studies Program! Our program offers an undergraduate major and a community for students, alumni, faculty, and staff interested in foreign countries, cultures, and issues.</span></strong></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">By completing a major in International Studies, students develop expertise in a region of the world, including one of its languages, and in a transnational topic.&nbsp; They also become familiar with a variety of international issues and frameworks.&nbsp; They use this expertise and knowledge to understand and analyze the dynamics and complexity of the human world.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">The International Studies major is useful for careers in the arts, business, engineering, government, health, law, media, and the nonprofit sector, among other fields. Recent alumni work at Accenture, Catholic Relief Services, Goldman Sachs, the Immigrant Defense Project, Massachusetts General Hospital, The Nature Conservancy, Northrop Grumman Corporation, RAND Corporation, the U.S. Attorney’s Office, the U.S. Department of Defense, and the U.S. Department of State. Our alumni also have completed graduate degrees at various institutions, including Harvard Law School and the London School of Economics and Political Science. Recent alumni have served in the U.S. Peace Corps and have won the Princeton in Africa Fellowship and Fulbright award.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="547" instrument_node="">The program connects majors and faculty with international interests through our newsletter of&nbsp;</span><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//artsci.case.edu/international-studies/current-announcements/"><span data-dcnode-id="546" instrument_node="">events and opportunities</span></a><span data-dcnode-id="544" instrument_node="">, our&nbsp;</span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//artsci.case.edu/international-studies/cwru-courses-with-international-content/"><span data-dcnode-id="543" instrument_node="">lists of courses with international content</span></a><span data-dcnode-id="541" instrument_node="">, our&nbsp;</span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//artsci.case.edu/international-studies/major-requirements/study-abroad/%231546531453901-4dfff65b-5fec"><span data-dcnode-id="540" instrument_node="">study abroad map</span></a><span data-dcnode-id="538" instrument_node="">, and our&nbsp;</span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//artsci.case.edu/international-studies/faculty-with-international-interests/"><span data-dcnode-id="537" instrument_node="">directory of CWRU faculty</span></a><span data-dcnode-id="535" instrument_node="">&nbsp;teaching and conducting research on international topics.&nbsp; Our majors and alumni interact through our&nbsp;</span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//artsci.case.edu/international-studies/major-alumni-network/international-studies-mentoring-program/"><span data-dcnode-id="534" instrument_node="">mentoring program</span></a><span data-dcnode-id="532" instrument_node="">,&nbsp;</span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chat
