</span><h1 class="title is-spaced is-centered is-white" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">
          More Dialing, More Weirdness
        </span></h1><span data-dcnode-id="754" instrument_node="">
</span><h2 class="subtitle is-spaced" data-dcnode-id="752" itemprop="description"><span data-dcnode-id="753" instrument_node="">
          There are lots more weird phone numbers out there—and some of them have pretty fascinating stories. Read on to learn more about the vintage phone system.
        </span></h2><span data-dcnode-id="751" instrument_node="">

n data-dcnode-id="713" instrument_node="">,             </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tedium.co/tag/telephones/"><span data-dcnode-id="712" instrument_node="">telephones</span></a><span data-dcnode-id="710" instrument_node="">,             </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tedium.co/tag/time-numbers/"><span data-dcnode-id="709" instrument_node="">time numbers</span></a><span data-dcnode-id="707" instrument_node="">,             </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tedium.co/tag/weird-phone-numbers/"><span data-dcnode-id="706" instrument_node="">weird phone numbers</span></a><span data-dcnode-id="704" instrument_node="">

</span><div class="md-whitebox" data-dcnode-id="614"><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="629"><span class="md-big" data-dcnode-id="630"><strong data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Today in Tedium:</span></strong><span data-dcnode-id="636" instrument_node=""> Almost exactly a year ago, we wrote up a lengthy piece on </span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tedium.co/2016/07/05/weird-telephone-numbers/"><span data-dcnode-id="635" instrument_node="">weird telephone numbers</span></a><span data-dcnode-id="633" instrument_node="">. This piece has been a sleeper hit of sorts in Tedium history. Many of our pieces, if they do gain steam, tend to pick up within a week of writing. Not this one. Instead, the piece went to the top of Google for dozens of variations on the search term “weird phone numbers,” “creepy phone numbers,” and so on. As a result, it is now by far the most popular piece we’ve ever published. Which means it’s probably a good idea to do a follow-up—because you guys like weird numbers. Tonight’s issue dials up the weirdness. Again. </span><em data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">— Ernie @ Tedium</span></em></span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="616"><strong data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">P.S.:</span></strong><span data-dcnode-id="625" instrument_node=""> </span><em data-dcnode-id="617"><span data-dcnode-id="624" instrument_node="">A quick shout-out tonight to Patreon supporter Brian Christie of the knowledge-sharing tech firm </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//brainsy.com/"><span data-dcnode-id="623" instrument_node="">Brainsy</span></a><span data-dcnode-id="621" instrument_node="">. Here’s </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DuyXXW9i0O5k%26feature%3Dyoutu.be"><span data-dcnode-id="620" instrument_node="">what his company is working on</span></a><span data-dcnode-id="618" instrument_node=""> these days. Thanks for the support!</span></em></p><span data-dcnode-id="615" instrument_node="">
</span></div><span data-dcnode-id="613" instrument_node="">
</span><span data-dcnode-id="610" instrument_node="">
</span><div class="md-adbox" data-dcnode-id="583"><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="606"><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//museumhack.com/tours/"><img alt="Museum Hack #2" class="lazyloaded" data-dcnode-id="608" data-src="https://images.tedium.co/uploads/museum2.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.tedium.co/uploads/museum2.jpg&amp;raw"></a></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="596"><strong data-dcnode-id="602"><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//museumhack.com/tours/"><span data-dcnode-id="604" instrument_node="">Are you in NYC, San Francisco, Chicago, Los Angeles or Washington DC?</span></a></strong><span data-dcnode-id="601" instrument_node=""> We do unconventional tours at the best museums in your city. It’s kind of like the tedium for museums. We don’t talk about the most famous paintings or the newest collection, </span><strong data-dcnode-id="598"><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//museumhack.com/tours/"><span data-dcnode-id="600" instrument_node="">we find the esoteric stories</span></a></strong><span data-dcnode-id="597" instrument_node=""> that make even the “boring art” amazing.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="585"><span class="md-small" data-dcnode-id="586"><span data-dcnode-id="594" instrument_node="">Today’s issue is sponsored by </span><strong data-dcnode-id="591"><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//museumhack.com/tours/"><span data-dcnode-id="593" instrument_node="">Museum Hack</span></a></strong><span data-dcnode-id="590" instrument_node="">. (</span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tedium.co/advertising/"><span data-dcnode-id="589" instrument_node="">You can sponsor us, too</span></a><span data-dcnode-id="587" instrument_node="">.)</span></span></p><span data-dcnode-id="584" instrument_node="">
</span></div><span data-dcnode-id="582" instrument_node="">
</span><div class="md-redbox" data-dcnode-id="561"><span data-dcnode-id="581" instrument_node="">
</span><div class="md-quote" data-dcnode-id="577"><h3 data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">“I read an announcement and the engineer said, ‘That’s great, but you’re three-tenths of a second off.’ I knew what to do with two or three seconds, but he was talking in tenths. Timing is absolutely crucial.”</span></h3><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="563"><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">— Jane Barbe,</span></strong><span data-dcnode-id="573" instrument_node=""> one of the most well-known voices in telephone history, </span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newspapers.com/clip/11957996/florida_today/"><span data-dcnode-id="572" instrument_node="">discussing her 1963 audition</span></a><span data-dcnode-id="570" instrument_node=""> with Audichron, the firm behind the talking clocks that were long in use for phone systems around the world. Barbe got the gig, and soon became incredibly well known for </span><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DjXhc0YZbxzI"><span data-dcnode-id="569" instrument_node="">her dulcet tones</span></a><span data-dcnode-id="567" instrument_node="">, which told you what the time was, or told you that you had dialed the wrong number. Barbe, who died in 2003, was most associated with the Bell telephone system, while a colleague of hers, the </span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DmTmvyOjvpf8"><span data-dcnode-id="566" instrument_node="">slightly-more-nasally-voiced</span></a><span data-dcnode-id="564" instrument_node=""> Pat Fleet—who is more closely associated with AT&amp;T—has continued to carry the torch of telephone voice actors.</span></p><span data-dcnode-id="562" instrument_node="">
</span></div><span data-dcnode-id="560" instrument_node="">
</span><div class="md-whitebox" data-dcnode-id="476"><span data-dcnode-id="559" instrument_node="">
</span><div class="fluid-width-video-wrapper" data-dcnode-id="557" style="padding-top: 56.25%;"><iframe allowfullscreen="" class="lazyloaded" data-dcnode-id="558" data-src="https://www.youtube.com/embed/GbgOpxQXIfA" frameborder="0"></iframe></div><span data-dcnode-id="556" instrument_node="">
</span><h3 data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">The forgotten advertising roots of Audichron, the company that specialized in “talking clocks”</span></h3><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">The great gift that Audichron brought to the American public was a phone number that could help you set your clocks. This was not always an easy task, of course. There was a period in which setting a clock required a whole lot of guesswork.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">And in the pre-automation days, the telephone operator was the one stuck answering the question. This was frustrating, and telephone companies struggled with this task. In one notable example, Vermont’s </span><em data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Middlebury Register</span></em><span data-dcnode-id="546" instrument_node=""> featured a 1918 announcement ad from the New England Telephone and Telegraph Company emphasizing that telephone operators would no longer accept calls simply asking for the time of day.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="543" instrument_node="">“For such information 100,000 calls are made daily in New England, the bulk of such calls coming naturally at times when it is most difficult to handle them,” </span><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newspapers.com/clip/11979350/telephone_operators_wont_answer_the/"><span data-dcnode-id="542" instrument_node="">general manager W.R. Driver wrote</span></a><span data-dcnode-id="540" instrument_node="">.</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Ernest Esclangon, the director of the Paris Observatory in the 1920s and 1930s, faced a similar problem. Because of what the observatory did, it tended to have a very accurate time, one that was the standard-bearer for the entire country. As a result, people would constantly call it up, asking what time it currently was. This would constantly jam the single telephone line at the observatory, talking away from the actual goal of the observatory: Astronomical research.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">But Esclangon had a better solution to the problem than Driver. Rather than discourage the calls, </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.obspm.fr/the-first-speaking-clock-3163.html%3Flang%3Den"><span data-dcnode-id="533" instrument_node="">he automated the answers</span></a><span data-dcnode-id="531" instrument_node="">, coming up with a system that accurately described the time based on when people would call.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="528" instrument_node="">“Controlled by one of the master clocks of the Paris observatory, the talking clock always speaks with authority,” </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3DXOIDAAAAMBAJ%26pg%3DPA460"><em data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Popular Mechanics</span></em><span data-dcnode-id="525" instrument_node=""> reported in 1932</span></a><span data-dcnode-id="523" instrument_node="">.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">This proved an immensely useful service for the public, and when it finally was launched for public consumption in 1933, the service successfully accepted 20,000 calls on its first day—despite the fact that 140,000 people called. People really wanted to know what time it was.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">And it was only a matter of time, of course, before the United States received a service with a similar intent. And that service was run by Audichron, a company launched by a Georgia man named John Franklin.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Franklin, however, had an entrepreneurial spirit to him—he was competing with Coca-Cola at the time. It just turned out that his drink was called “Tick Tock Ginger Ale,” making it a good fit with anything time-related. Before the early ’30s, this mostly meant advertising near large outdoor clocks. </span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><img alt="Coca-Cola" class="lazyload" data-dcnode-id="511" data-src="http://images.tedium.co/2017/06/0627_phone.jpg"></p><span data-dcnode-id="509" instrument_node="">
</span><p class="md-caption" data-dcnode-id="503"><em data-dcnode-id="504"><span data-dcnode-id="508" instrument_node="">If you can’t beat ’em, sell ’em ad space. (</span><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newspapers.com/clip/11982546/audicrhon_clock_sponsored_by_cocacola/"><span data-dcnode-id="507" instrument_node="">Asheville Citizen-Times</span></a><span data-dcnode-id="505" instrument_node="">)</span></em></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="501" instrument_node="">But Audichron was a different beast entirely. And the success with the model ensured he would quickly leave the ginger ale behind. As author Sonny Kleinfeld explained in </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/1378397.The_Biggest_Company_on_Earth"><span data-dcnode-id="500" instrument_node="">his 1981 book </span><em data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">The Biggest Company on Earth : A Profile of AT&amp;T</span></em></a><span data-dcnode-id="496" instrument_node="">, Franklin shrewdly used his machines for telling time as advertising fodder for all kinds of companies—including a former rival:</span></p><span data-dcnode-id="494" instrument_node="">
</span><blockquote data-dcnode-id="487"><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Initially, Franklin rented his time machines to local businesses. They would order additional phone lines from the phone company, hook up the time machines to them, and then devise promotional campaigns tied to the Time of Day. One of Franklin’s first clients was the Coca-Cola Company. The machines were an immediate hit, and Franklin had no trouble wooing an avalanche of customers. People called in swarms. It seemed that nobody knew what time it was. Seeing all this action, the phone company shrewdly mentioned to Franklin that, by the way, it would be very happy to buy his machines and install them in its central offices.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Nope, nope, nope, Franklin said. He wasn’t about to sell any of his time machines. He knew they were gold mines.</span></p><span data-dcnode-id="488" instrument_node="">
</span></blockquote><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Those gold mines eventually led straight through to Jane Barbe, Pat Fleet, and numerous other voice actors that defined the modern telephone era.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="482" instrument_node="">By the 1970s, </span><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1976/09/14/archives/dialaphone-system-has-southern-roots-dialaphone-has-southern-roots.html"><span data-dcnode-id="481" instrument_node="">the company had expanded its reach</span></a><span data-dcnode-id="479" instrument_node=""> by offering numerous services in a dial-up format, from weather to stocks. But the buzz wouldn’t last.</span></p><span data-dcnode-id="477" instrument_node="">
</span></div><span data-dcnode-id="475" instrument_node="">
</span><div class="md-graybox" data-dcnode-id="421"><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><img alt="Rotary phone" class="lazyload" data-dcnode-id="473" data-src="http://images.tedium.co/2017/06/0627_phoneb.jpg"></p><span data-dcnode-id="471" instrument_node="">
</span><p class="md-caption" data-dcnode-id="465"><em data-dcnode-id="466"><span data-dcnode-id="470" instrument_node="">(</span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/en/telephone-phone-vintage-antique-167068/"><span data-dcnode-id="469" instrument_node="">PDPics/Pixabay</span></a><span data-dcnode-id="467" instrument_node="">)</span></em></p><span data-dcnode-id="464" instrument_node="">
</span><h3 data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Five unusual phone numbers that you probably haven’t called before</span></h3><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="453"><em data-dcnode-id="454"><strong data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Editor’s note:</span></strong><span data-dcnode-id="458" instrument_node=""> As I said in </span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tedium.co/2016/07/05/weird-telephone-numbers/"><span data-dcnode-id="457" instrument_node="">the last article</span></a><span data-dcnode-id="455" instrument_node="">, please don’t be idiots with these numbers … and keep in mind that numbers sometimes stop working.</span></em></p><span data-dcnode-id="452" instrument_node="">
</span><ol data-dcnode-id="423"><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="447"><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">(909) 390-0003:</span></strong><span data-dcnode-id="448" instrument_node=""> If you dial this number and say hello, the phone will say hello back. This number is designed as an “echo number,” and is a good way to test the clarity of your VOIP calls.</span></li><span data-dcnode-id="446" instrument_node="">
</span><li data-dcnode-id="442"><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">(202) 965-9970:</span></strong><span data-dcnode-id="443" instrument_node=""> “You have just deactivated this feature.” What feature have you deactivated? Beats me.</span></li><span data-dcnode-id="441" instrument_node="">
</span><li data-dcnode-id="435"><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">(718) 238-9901:</span></strong><span data-dcnode-id="438" instrument_node=""> This is a standard verification code number, commonly used in the phone industry, but this Brooklyn-based number comes with an interesting twist—the guy in the message is talking in an Elvis voice. </span><em data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Thankyouverymuch.</span></em></li><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="430"><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">(509) 248-0036:</span></strong><span data-dcnode-id="431" instrument_node=""> “Your call has been completed. However, the party you are calling is not receiving calls at this time.” This would be the world’s most diplomatic voicemail intro to have after you’ve broken up with someone.</span></li><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="425"><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">(212) 255-9901:</span></strong><span data-dcnode-id="426" instrument_node=""> “Thank you for calling Amalgamated Bank. Due to Year 2000 testing and system maintenance, the system will be unavailable from 5 p.m. to 9 p.m.” Should I tell them, or do you want to?</span></li><span data-dcnode-id="424" instrument_node="">
</span></ol><span data-dcnode-id="422" instrument_node="">
</span></div><span data-dcnode-id="420" instrument_node="">
</span><div class="md-whitebox" data-dcnode-id="332"><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><img alt="Fax Toy" class="lazyload" data-dcnode-id="418" data-src="http://images.tedium.co/2017/06/0627_fax.jpg"></p><span data-dcnode-id="416" instrument_node="">
</span><p class="md-caption" data-dcnode-id="413"><em data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">A recently shared test page on Fax Toy. As of press time, half the images are criticizing CNN.</span></em></p><span data-dcnode-id="412" instrument_node="">
</span><h3 data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The website that quietly brings goofy faxes to the web</span></h3><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="408" instrument_node="">You have to wonder if </span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faxtoy.net/"><span data-dcnode-id="407" instrument_node="">the website FaxToy.net</span></a><span data-dcnode-id="405" instrument_node="">—a rudimentary online outpost that effectively displays anything that’s faxed to the numbers 1-855-330-1239 or 1-213-294-2943—should be a barren wasteland, an unused part of the internet that reflects an earlier era. It’s reminiscent of some of the earliest attempts at of internet memedom, having much in common with </span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hampsterdance.com/classics/originaldance.htm"><span data-dcnode-id="404" instrument_node="">Hampster Dance</span></a><span data-dcnode-id="402" instrument_node=""> or one of Jonah Peretti’s early </span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blackpeopleloveus.com/"><span data-dcnode-id="401" instrument_node="">online</span></a><span data-dcnode-id="399" instrument_node=""> </span><a data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shey.net/niked.html"><span data-dcnode-id="398" instrument_node="">experiments</span></a><span data-dcnode-id="396" instrument_node="">. Since the content is user-generated, it also feels a bit like </span><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//postsecret.com/"><span data-dcnode-id="395" instrument_node="">PostSecret</span></a><span data-dcnode-id="393" instrument_node="">.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="390" instrument_node="">It doesn’t look like the kind of website people should be thinking about at all. (It rarely gets social media shares of any kind.) But when I loaded up FaxToy.net this morning, something surprising hit me in the face: </span><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faxtoy.net/page/fax-JAvxWU"><span data-dcnode-id="389" instrument_node="">A meme about a news story</span></a><span data-dcnode-id="387" instrument_node=""> that happened </span><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thehill.com/homenews/media/339632-new-okeefe-video-shows-cnn-producer-calling-russia-coverage-mostly-bullshit"><span data-dcnode-id="386" instrument_node="">literally today</span></a><span data-dcnode-id="384" instrument_node="">.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">So how the heck did this happen? Turns out that this is the project of a guy named Kevin Savetz, a guy who has been interested in the concept of combining the internet with faxing since </span><em data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">1993</span></em><span data-dcnode-id="378" instrument_node="">.</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="375" instrument_node="">“My thing with faxes started in 1993 or on Usenet,” Savetz explained in an email. “I maintained the alt.internet.services FAQ list. A few people asked how to send faxes from e-mail, so I had a Q&amp;A about that in the document. Eventually I pulled that out </span><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.faqs.org/faqs/internet-services/fax-faq/"><span data-dcnode-id="374" instrument_node="">into its own FAQ file</span></a><span data-dcnode-id="372" instrument_node=""> called ‘FAQ: How can I send a fax from the Internet?’”</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">From there, it created something of an interest in the topic. Despite faxes quickly becoming usurped by the internet in general, Savetz found new ways to embrace them. At the tail end of 2005, he launched the little site FaxToy.net, with the goal of turning faxes into something of a two-way medium online.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">“There was at one point a zillion years ago a tool that let you receive web pages via fax—you enter the URL on the keypad, like yahoo.com would be 82466266 and your fax machine would ring and send you a picture of that web page,” he explained. “But I wasn’t aware of a way to do the opposite—send faxes to a web page.”</span></p><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="363" instrument_node="">So he created it—registering the domain on December 12, 2005, and soon coding the tool. At the time, the site did get some initial notice </span><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chris.pirillo.com/2005/12/15/fax-toy/"><span data-dcnode-id="362" instrument_node="">in the form of a blog post</span></a><span data-dcnode-id="360" instrument_node=""> by noted geek Chris Pirillo. But these days, it lingers, mostly unwatched by the internet at large. I can only find a small number of people that have ever tweeted about it.</span></p><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="357" instrument_node="">So why keep it going? As it turns out, Savetz has a business reason for leaving FaxToy alive! His company, </span><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savetzpublishing.com/"><span data-dcnode-id="356" instrument_node="">Savetz Publishing</span></a><span data-dcnode-id="354" instrument_node="">, makes printable forms and business resources, and he also runs </span><a data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//faxzero.com/"><span data-dcnode-id="353" instrument_node="">a service called FaxZero</span></a><span data-dcnode-id="351" instrument_node="">, which allows you to send faxes through the internet—for free with FaxZero branding, for pay without. So technically, you can send a FaxZero fax to FaxToy. (And plenty likely have! FaxZero has sent more than 15 million faxes since 2006.)</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><img alt="Fax drawing" class="lazyload" data-dcnode-id="348" data-src="http://images.tedium.co/2017/06/0627_fax2.jpg"></p><span data-dcnode-id="346" instrument_node="">
</span><p class="md-caption" data-dcnode-id="343"><em data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Savetz says he’s a big fan of the hand-drawn faxes.</span></em></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">The site, at this point, lives with limited human moderation—some things aren’t allowed, generally, but mostly it’s a bit of a free-for-all. (Savetz estimates that on an average day, it gets between 90 and 100 faxes.) And it does have some usefulness, as a way to confirm your fax machine is working properly. A number of faxes tend to be tests. But strangely, Savetz notes, the site has a quietly anonymous fan base.</span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">“Occasional and one-time users who google ‘how to test my fax machine’ find it, test their machine a few times, then move on,” he explained. “But there seems to be a regular community—people who send a fax every day, or a few times a week, for months or years. The site pretty much runs itself, and I’ll sometimes check on it after weeks of ignoring it to find all sorts of goofiness going on.”</span></p><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Maybe a few more people might fax, now that they know FaxToy exists.</span></p><span data-dcnode-id="333" instrument_node="">
</span></div><span data-dcnode-id="331" instrument_node="">
</span><div class="md-graybox" data-dcnode-id="292"><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="326"><strong data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">We once asked a whole lot</span></strong><span data-dcnode-id="327" instrument_node=""> of the telephone system. This was a system that was required to help us acquire and distribute limited amounts of information through incredibly primitive means—and, for much of that time, to do it all with a friendly voice.</span></p><span data-dcnode-id="325" instrument_node="">
</span><div class="fluid-width-video-wrapper" data-dcnode-id="323" style="padding-top: 56.25%;"><iframe allowfullscreen="" class="lazyload" data-dcnode-id="324" data-src="https://www.youtube.com/embed/jXhc0YZbxzI" frameborder="0"></iframe></div><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">In many ways, Jane Barbe and Pat Fleet, among others, were the one modest layer of humanity we got when trying to convince a dumb machine to interact with us.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Eventually, we figured out new ways to make information more approachable. We eventually figured out how to bring the machines into our homes, without the extra layer of abstraction we previously used.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="315" instrument_node="">And that meant we generally no longer needed a “time number,” a tool that disappeared at the municipal level about a decade ago. Barbe and Fleet’s voices still sound familiar—there will always be error messages—but they probably won’t be at the peak of their pop-culture appreciation like they once were. (Worth noting: While Barbe, whose voice was heard more than 40 million times a day, </span><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//articles.latimes.com/2003/jul/27/local/me-barbe27"><span data-dcnode-id="314" instrument_node="">died more than a decade ago</span></a><span data-dcnode-id="312" instrument_node="">. Fleet is still with us.)</span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="309" instrument_node="">But while we largely lost the talking time clock as well as its advertising-driven reason to exist, at least one number sticks around. </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/technology/archive/2016/06/remember-when-you-could-call-the-time/488273/"><em data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">The Atlantic</span></em><span data-dcnode-id="306" instrument_node=""> notes</span></a><span data-dcnode-id="304" instrument_node=""> that the U.S. Naval Observatory still draws in as many as 3 million calls per year, from people around the country, simply interested in the time. For what it loses as a municipal resource, it gains as an authoritative resource.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">The voice on the end of that number—(202) 762-1401—is male, but professional and pleasant. (He has a name, too. It’s Fred Covington.)</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">In 30 years, we’re going to wonder about the voices of our AI assistants the way we currently do about the anonymous voices that define our modern phone system.</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Maybe they’ll tell us the time, but that, for better or for worse, will only be the starting point.</span></p><span data-dcnode-id="293" instrument_node="">
</span></div><p data-dcnode-id="291"></p><span data-dcnode-id="290" instrument_node="">
</span></div><span data-dcnode-id="288" instrument_node="">
</span><div class="authorbox" data-dcnode-id="264" itemprop="articleBody"><span data-dcnode-id="287" instrument_node="">

</span><h4 data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Your time was just wasted by Ernie Smith</span></h4><span data-dcnode-id="277" instrument_node="">
