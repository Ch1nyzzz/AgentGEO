</span><span class="byline" data-dcnode-id="402"><span data-dcnode-id="407" instrument_node="">by </span><span class="author vcard" data-dcnode-id="403" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepopularlist.com/author/editor/" itemprop="url" rel="author" title="View all posts by Susan Dorling"><span class="author-name" data-dcnode-id="405" itemprop="name"><span data-dcnode-id="406" instrument_node="">Susan Dorling</span></span></a></span></span></div></header><div class="featured-image page-header-image-single" data-dcnode-id="397"><span data-dcnode-id="399" instrument_node="">
</span><img alt="" class="attachment-medium size-medium lazy loaded" data-dcnode-id="398" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://thepopularlist.com/wp-content/uploads/2020/09/shutterstock_537133447-e1572865612855-300x200.jpg" data-srcset="https://thepopularlist.com/wp-content/uploads/2020/09/shutterstock_537133447-e1572865612855-300x200.jpg 300w, https://thepopularlist.com/wp-content/uploads/2020/09/shutterstock_537133447-e1572865612855.jpg 700w" data-was-processed="true" height="200" itemprop="image" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepopularlist.com/wp-content/uploads/2020/09/shutterstock_537133447-e1572865612855-300x200.jpg&amp;raw" srcset="https://thepopularlist.com/wp-content/uploads/2020/09/shutterstock_537133447-e1572865612855-300x200.jpg 300w, https://thepopularlist.com/wp-content/uploads/2020/09/shutterstock_537133447-e1572865612855.jpg 700w" width="300"></div><div class="entry-content" data-dcnode-id="137" itemprop="text"><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Let’s
agree:</span></p><p data-dcnode-id="391"><strong data-dcnode-id="392"><em data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Talking to famous personalities on the phone is a pipe dream for most people.</span></em></strong></p><p data-dcnode-id="387"><span data-dcnode-id="390" instrument_node="">But what if
we told you, that calling some of the most famous people on the planet is </span><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">actually
possible?</span></strong></p><p data-dcnode-id="383"><span data-dcnode-id="386" instrument_node="">As crazy as
it sounds, some famous people have actually made their phone numbers available
to the public, </span><strong data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">you just don’t know it yet!</span></strong></p><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Although most
of these calls are usually attended by their assistants, there’s still a chance
that they might actually connect you to the celebrity themselves if they’re available
and willing.</span></p><p data-dcnode-id="377"><span data-dcnode-id="380" instrument_node="">And for
most people, that’s a chance they’re willing to take. </span><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">After all, what’ve you
got to lose!</span></strong></p><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">So, if you’re
ready, let’s dig into this list!</span></p><h2 data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">1. The Pope</span></h2><div class="wp-block-image" data-dcnode-id="370"><figure class="aligncenter" data-dcnode-id="371"><img alt="" class="wp-image-3192 lazy error" data-dcnode-id="372" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_163361345-e1572865624546.jpg" data-was-processed="true" height="467" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepopularlist.com/wp-content/uploads/2019/11/shutterstock_163361345-e1572865624546.jpg&amp;raw" width="700"></figure></div><p data-dcnode-id="366"><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Best known for? </span></strong><span data-dcnode-id="367" instrument_node="">The Leader of the worldwide Catholic Church and head of Vatican State.</span></p><blockquote class="wp-block-quote" data-dcnode-id="363"><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Would you take the opportunity to call one of the holiest figures in the world?</span></p></blockquote><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">It’s a surprise to some people that the Pope is always just a phone call away. The Pope, who is the head of the Vatican, presumes the role of the leader of the worldwide catholic church. This title brings with itself major responsibilities, which include maintaining religious and diplomatic relationships with over 100 countries around the world. Most of the time, the Pope is traveling to different destinations around the world, delivering liturgies, talking to world leaders and strengthening political relationships. Despite the busy schedule, the Pope’s phone number is available if in case they want to have a talk. However, there’s a very slim chance that the pope will actually pick up the call himself. So, you’ll probably be connected to one of his assistants or secretaries.</span></p><p data-dcnode-id="357"><strong data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Phone:</span></strong><span data-dcnode-id="358" instrument_node=""> +390-669-888-1022</span></p><div class="adthrive" data-dcnode-id="355" id="cls-video-container-74mlGyjC" style="min-height: 354.375px;"><div data-dcnode-id="356"></div></div><h2 data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">2.&nbsp;Donald Trump</span></h2><div class="wp-block-image" data-dcnode-id="350"><figure class="aligncenter" data-dcnode-id="351"><img alt="" class="wp-image-3191 lazy error" data-dcnode-id="352" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_537133447-e1572865612855.jpg" data-was-processed="true" height="467" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepopularlist.com/wp-content/uploads/2019/11/shutterstock_537133447-e1572865612855.jpg&amp;raw" width="700"></figure></div><p data-dcnode-id="343"><strong data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Best
known for? </span></strong><span data-dcnode-id="347" instrument_node="">45</span><sup data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">th</span></sup><span data-dcnode-id="344" instrument_node="">
President of the United States and former host of ‘The Apprentice’.</span></p><blockquote class="wp-block-quote" data-dcnode-id="340"><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Did you know it’s possible to ring the president of one of the most powerful countries in the world?</span></p></blockquote><p data-dcnode-id="335"><span data-dcnode-id="339" instrument_node="">Donald
Trump might be a controversial president, but his New York office phone number
is still accessible to all. Before he entered politics, Donald Trump was
already quite well known due to his real estate family business and TV show.
During the 2016 presidential race, Donald Trump ran a much controversial
election campaign and successfully assumed the role of the 45</span><sup data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">th</span></sup><span data-dcnode-id="336" instrument_node="">
President of the United States. He now runs multiple ventures and has a net
worth of $3.1 billion according to Forbes. And now, you can give him a call
anytime you come up with an idea to make America great again!</span></p><p data-dcnode-id="331"><strong data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Phone: +</span></strong><span data-dcnode-id="332" instrument_node="">917-756-8000</span></p><h2 data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">3. Queen Elizabeth</span></h2><div class="wp-block-image" data-dcnode-id="326"><figure class="aligncenter" data-dcnode-id="327"><img alt="" class="wp-image-3193 lazy error" data-dcnode-id="328" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_114857485-e1572865661125.jpg" data-was-processed="true" height="466" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepopularlist.com/wp-content/uploads/2019/11/shutterstock_114857485-e1572865661125.jpg&amp;raw" width="701"></figure></div><p data-dcnode-id="322"><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Best
known for? </span></strong><span data-dcnode-id="323" instrument_node="">Head of
the Commonwealth and all its Realms.</span></p><blockquote class="wp-block-quote" data-dcnode-id="319"><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">The Queen of the Commonwealth might seem unreachable, but surprisingly her phone number’s available to everyone!</span></p></blockquote><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Her Royal
Highness Queen Elizabeth II certainly needs no introduction. She’s the current
British Monarch and the head of state of all the Commonwealth states and all its
realms. But not just that, she’s also the longest-living and longest-reigning
British monarch and one of the most popular and well-known personalities in the
world. It’s no secret that the Queen is a very busy person; meeting heads of
states, taking diplomatic trips, presenting awards and honors, and a bunch of
other stuff. Although it’s rather rare that she actually attends one a call
herself, you can give it a shot at the Buckingham Palace’s office number.</span></p><p data-dcnode-id="313"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Phone: </span></strong><span data-dcnode-id="314" instrument_node="">+44 020 7930 4832</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="312" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">4. Bill Gates</span></h2><div class="wp-block-image" data-dcnode-id="307"><figure class="aligncenter" data-dcnode-id="308"><img alt="" class="wp-image-3190 lazy error" data-dcnode-id="309" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_155863793-e1572865602564.jpg" data-was-processed="true" height="467" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepopularlist.com/wp-content/uploads/2019/11/shutterstock_155863793-e1572865602564.jpg&amp;raw" width="700"></figure></div><p data-dcnode-id="303"><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Best
known for? </span></strong><span data-dcnode-id="304" instrument_node="">Founder
and former CEO of Microsoft.</span></p><blockquote class="wp-block-quote" data-dcnode-id="297"><p data-dcnode-id="298"><span data-dcnode-id="302" instrument_node="">Wonder what it would be like to have a conversation with the 2</span><sup data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">nd</span></sup><span data-dcnode-id="299" instrument_node=""> richest man in the world?</span></p></blockquote><p data-dcnode-id="292"><span data-dcnode-id="296" instrument_node="">It is
possible now through his Bill &amp; Melinda Gates Foundation phone number.
Although most people see Bill as someone who’s constantly juggling between the
first and second positions for the richest person on the planet, he’s also one
of the most influential personalities in the world. He built a trillion-dollar
company from a small garage and his company, Microsoft, is rightfully one of
the most impactful tech companies of the 21</span><sup data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">st</span></sup><span data-dcnode-id="293" instrument_node=""> century. Now retired,
Bill and his wife Melinda own the largest private foundation in the world with
over $50 billion in assets to help provide education and healthcare to
poverty-stricken countries across the globe.</span></p><p data-dcnode-id="288"><strong data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Phone: </span></strong><span data-dcnode-id="289" instrument_node="">+206-709-3400</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="287" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">5. Oprah Winfrey</span></h2><div class="wp-block-image" data-dcnode-id="282"><figure class="aligncenter" data-dcnode-id="283"><img alt="" class="wp-image-3189 lazy error" data-dcnode-id="284" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_451356202-e1572865589211.jpg" data-was-processed="true" height="522" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepopularlist.com/wp-content/uploads/2019/11/shutterstock_451356202-e1572865589211.jpg&amp;raw" width="699"></figure></div><p data-dcnode-id="278"><strong data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Best
known for?</span></strong><span data-dcnode-id="279" instrument_node=""> Producer
and Host of ‘The Oprah Winfrey Show’.</span></p><blockquote class="wp-block-quote" data-dcnode-id="275"><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Can you believe that the great ‘Lady O’ can be reached through her studio phone number?</span></p></blockquote><p data-dcnode-id="270"><span data-dcnode-id="274" instrument_node="">Us neither. Oprah Winfrey is perhaps the most well-known name in the entertainment industry, and for good reasons. She is perhaps best known for her highly acclaimed TV show, The Oprah Winfrey Show. It is called the highest-rated television show of its kind in history and ran on TV for a period of 25 years. Despite coming from a fairly poor background and suffering from some really rough circumstances from an early age, Oprah fought through it all and established herself as arguably the most influential woman in the world. She also became North America’s first black multi-billionaire and the richest African-American of the 20</span><sup data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">th</span></sup><span data-dcnode-id="271" instrument_node=""> century. She’s known for making huge contributions to multiple foundations that help protect the environment and provide better healthcare and education to children.</span></p><p data-dcnode-id="266"><strong data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Phone:</span></strong><span data-dcnode-id="267" instrument_node=""> 312-633-1182</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="265" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">6.&nbsp;Dalai Lama</span></h2><div class="wp-block-image" data-dcnode-id="260"><figure class="aligncenter" data-dcnode-id="261"><img alt="" class="wp-image-3188 lazy error" data-dcnode-id="262" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_503428498-e1572865814270.jpg" data-was-processed="true" height="430" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepopularlist.com/wp-content/uploads/2019/11/shutterstock_503428498-e1572865814270.jpg&amp;raw" width="701"></figure></div><p data-dcnode-id="256"><strong data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Best
known for? </span></strong><span data-dcnode-id="257" instrument_node="">The Spiritual
Leader of the Tibetan Buddhists.</span></p><blockquote class="wp-block-quote" data-dcnode-id="253"><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Would you consider having a chat with one of the most well-known religious personalities in the world?</span></p></blockquote><p data-dcnode-id="248"><span data-dcnode-id="252" instrument_node="">If you do, the phone number of the Dalai Lama’s office is always available to you. The Dalai Lama is the spiritual and religious leader of the Tibetan Buddhists, somewhat similar to what the Pope is to the Christians around the world. Before the Chinese government took control of Tibet in 1959, the Dalai Lama used to govern the country. Now, the current Dalai Lama travels around the world speaking in public talks that draw thousand at a time. He is also an author and has written multiple books on Buddhism and its teachings. Also, while the 14</span><sup data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">th</span></sup><span data-dcnode-id="249" instrument_node=""> Dalai Lama was forced to flee to India after the takeover by the Chinese government, he actively fights for the rights of the Tibetan Buddhists and strives to make Tibet an independent state.</span></p><p data-dcnode-id="243"><span data-dcnode-id="247" instrument_node="">&nbsp;</span><strong data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Phone: +</span></strong><span data-dcnode-id="244" instrument_node="">91-1892-221343</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="242" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">7.&nbsp;Santa Claus</span></h2><div class="wp-block-image" data-dcnode-id="237"><figure class="aligncenter" data-dcnode-id="238"><img alt="" class="wp-image-3186 lazy" data-dcnode-id="239" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_156220142-e1572865558395.jpg" height="466" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20699%20466'%3E%3C/svg%3E" width="699"></figure></div><p data-dcnode-id="233"><strong data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Best known for? </span></strong><span data-dcnode-id="234" instrument_node="">A legendary figure who brings gifts to children on Christmas.</span></p><blockquote class="wp-block-quote" data-dcnode-id="230"><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Couldn’t get your kids to meet Santa during this Christmas season?</span></p></blockquote><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Well, you could always ring him on his phone number. During Christmas, you can find Santa in almost every major shopping mall or toy store. Sometimes, he’s out on the streets ringing Christmas bells collecting funds for deprived children. But if this Christmas season you couldn’t get Santa to meet and tell your little ones how good they’ve been the whole year, there’s always an option to get them to talk to him personally on the phone. FreeConferenceCall.com provides a phone number on which Santa Claus will pick up and talk to your children. He will also leave a message which your children can listen to and even share with others. Meeting Santa just got a whole lot easy!</span></p><p data-dcnode-id="224"><strong data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Phone: </span></strong><span data-dcnode-id="225" instrument_node="">+1-605-313-4000</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="223" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">8.&nbsp;Tiger Woods</span></h2><div class="wp-block-image" data-dcnode-id="218"><figure class="aligncenter" data-dcnode-id="219"><img alt="" class="wp-image-3187 lazy" data-dcnode-id="220" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_152723171-e1572865569339.jpg" height="467" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20467'%3E%3C/svg%3E" width="700"></figure></div><p data-dcnode-id="214"><strong data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">Best
known for? </span></strong><span data-dcnode-id="215" instrument_node="">One of
the Greatest Golfers in History.</span></p><blockquote class="wp-block-quote" data-dcnode-id="211"><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Want to get some game improvement tips from one of the greatest golfers of all time?</span></p></blockquote><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Although there’s a very slim chance that he’ll personally pick up your phone call, you could always try your luck at getting a text message through. Tiger Woods is one of the best golfers in history and a very familiar name in the world of sports. His entrance into the spotlight was after he became the youngest and first African-American to win the U.S. Masters Tournament in 1997. Since then, he has 13 major tournaments and has been named Player of the Year 10 times over a period of 12 years. After suffering from family problems and some knee issues that forced him into having multiple surgeries, Woods became a target of the media often appearing in headlines. His breakthrough came in 2019 when he won the 2019 Masters after 11 years of no wins. As of yet, he’s tied with Sam Snead for the most wins on the PGA tour with both having won 82.</span></p><p data-dcnode-id="205"><strong data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Phone: +</span></strong><span data-dcnode-id="206" instrument_node="">904-285-3700</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="204" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">9. Barack Obama</span></h2><div class="wp-block-image" data-dcnode-id="199"><figure class="aligncenter" data-dcnode-id="200"><img alt="" class="wp-image-3185 lazy" data-dcnode-id="201" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_182560871-e1572865541679.jpg" height="455" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20455'%3E%3C/svg%3E" width="700"></figure></div><p data-dcnode-id="192"><strong data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Best known for? </span></strong><span data-dcnode-id="196" instrument_node="">The first African-American and 44</span><sup data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">th</span></sup><span data-dcnode-id="193" instrument_node="">
President of the United States.</span></p><blockquote class="wp-block-quote" data-dcnode-id="186"><p data-dcnode-id="187"><span data-dcnode-id="191" instrument_node="">Would you take the opportunity to talk to one of the most influential presidents of the 21</span><sup data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">st</span></sup><span data-dcnode-id="188" instrument_node=""> century?</span></p></blockquote><p data-dcnode-id="181"><span data-dcnode-id="185" instrument_node="">Barack Obama was the 44</span><sup data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">th</span></sup><span data-dcnode-id="182" instrument_node=""> President of the United States and is probably best known as the first African-American President of the US. Obama was president for two consecutive terms and made some major progress during both his tenures. Perhaps the most recognized achievements of his are the killing of Osama bin Laden, who was the mastermind behind the 9/11 attacks. Another one of his major achievements was the signing of the Iran Nuclear Deal which showed some major signs of progress. The agreement stated that Iran would halt its nuclear development program in return for the U.S. lifting the sanctions they have placed on them for a long time. Although now he’s been replaced by Donald Trump, you can still call him and maybe ask about how he’s settling in after his retirement.</span></p><p data-dcnode-id="177"><strong data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Phone: </span></strong><span data-dcnode-id="178" instrument_node="">+202-456-1111</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="176" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">10. Paul David Hewson (Bono)</span></h2><div class="wp-block-image" data-dcnode-id="171"><figure class="aligncenter" data-dcnode-id="172"><img alt="" class="wp-image-3184 lazy" data-dcnode-id="173" data-src="https://thepopularlist.com/wp-content/uploads/2019/11/shutterstock_505016617-e1572865514395.jpg" height="467" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20467'%3E%3C/svg%3E" width="700"></figure></div><p data-dcnode-id="167"><strong data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Best
known for? </span></strong><span data-dcnode-id="168" instrument_node="">Lead
Vocalist and Lyricist of U2.</span></p><blockquote class="wp-block-quote" data-dcnode-id="164"><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Wonder what you’d discuss with one of the greatest names in rock and roll history?</span></p></blockquote><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Apparently, now you can on Bono’s manager’s office number. Paul David Hewson otherwise known as Bono is the lead vocalist and the lyricist of the legendary rock band U2. Over the course of the band’s amazing history, Bono has received 22 Grammys as a part of the band and is a part of the Rock and Roll Hall of Fame. Besides being known as one of the most influential musicians in rock history, he’s equally popular for his global charity efforts and social activism. He’s raised awareness and has met with several world leaders to collectively work on eradicating poverty and AIDS, especially in Africa. Due to his philanthropic efforts and services to the music industry, he was granted an honorary knighthood by Queen Elizabeth II.</span></p><p data-dcnode-id="158"><strong data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Phone:</span></strong><span data-dcnode-id="159" instrument_node=""> +01-6777330</span></p><div class="yarpp yarpp-related yarpp-related-website yarpp-template-list" data-dcnode-id="138"><h3 data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Featured:</span></h3><ol data-dcnode-id="139"><span data-dcnode-id="155" instrument_node="">
