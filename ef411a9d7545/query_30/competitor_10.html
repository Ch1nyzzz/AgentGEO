</span><div class="top_buttons" data-dcnode-id="1069"><ul class="mid-buttons" data-dcnode-id="1070"><li data-dcnode-id="1083"><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/what-is-adst/" id="what-we-do"><img class="main-img" data-dcnode-id="1086" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2019/09/what-we-do.jpg&amp;raw"><img class="hover-img" data-dcnode-id="1085" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2019/09/what-we-do-hover.jpg&amp;raw"></a></li><li data-dcnode-id="1079"><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/oral-history/" id="what-we-do"><img class="main-img" data-dcnode-id="1082" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2019/09/resources.jpg&amp;raw"><img class="hover-img" data-dcnode-id="1081" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2019/09/resources-hover.jpg&amp;raw"></a></li><li data-dcnode-id="1075"><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/donation-page/" id="what-we-do"><img class="main-img" data-dcnode-id="1078" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2019/09/join.jpg&amp;raw"><img class="hover-img" data-dcnode-id="1077" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2019/09/join-hover.jpg&amp;raw"></a></li><li data-dcnode-id="1071"><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/donation-page/" id="what-we-do"><img class="main-img" data-dcnode-id="1074" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2019/09/donate.jpg&amp;raw"><img class="hover-img" data-dcnode-id="1073" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2019/09/donate-hover.jpg&amp;raw"></a></li></ul></div><article class="post default post-16910 type-post status-publish format-standard hentry category-moments tag-diplomats-behaving-badly tag-reagan tag-shultz tag-today-in-history" data-dcnode-id="663" id="post-16910"><span data-dcnode-id="1068" instrument_node="">
</span><section class="main clear" data-dcnode-id="677"><span data-dcnode-id="1067" instrument_node="">
</span><h1 class="title" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">
Alexander Haig’s Fall from Grace	</span></h1><span data-dcnode-id="1064" instrument_node="">
</span><div class="content clear wysiwyg" data-dcnode-id="685"><figure class="full-width-mobile alignright thin" data-dcnode-id="1062" style="width: 200px;"><img alt="" class="wp-image-16916" data-dcnode-id="1063" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2016/06/Alexander-Haig-II.jpg&amp;raw"></figure><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">A highly decorated military leader and influential political figure, Alexander Haig’s career, which included such roles as Supreme Allied Commander to Europe (SACEUR) and Chief of Staff to Presidents Gerald Ford and Richard Nixon, culminated with his appointment as President Ronald Reagan’s Secretary of State on January 22, 1981. As White House staff and Department of State personnel quickly discovered, however, Haig’s wealth of experience did not prepare him for smooth sailing in Washington or abroad.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1057" instrument_node="">Haig’s brash leadership style was met with growing frustration from within the administration.&nbsp; During his one-and-a-half-year stint as Secretary of State, Haig’s approach toward Israel during the Lebanon War of 1982 and the developing dialogue between China and Taiwan over the One-China policy and arms sales helped to seal his fate. After repeated clashes with his colleagues over his operating style, Haig submitted his resignation on June 25, 1982 and was replaced by George Shultz less than a month later.</span><span data-dcnode-id="1056" id="more-16910"></span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Serving in the Executive Secretariat from 1981-1983, Clayton E. McManaway highlighted attempts made by Haig’s contemporaries to humiliate the Secretary into resigning in an interview with Charles Stuart Kennedy in June, 1993.&nbsp; Wat Tyler Cluverius, Director of the Office of Jordan, Syria, Lebanon, and Iraq from 1978-1983, recalled an awkward telephone conversation between Haig and Reagan in an interview with Charles Stuart Kennedy in May, 1990.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">John J. Taylor, Political Counselor in Beijing from 1980-1982, captured the Chinese-Taiwanese dimension of the situation in an interview with Charles Stuart Kennedy in May, 2000.&nbsp; Finally, Robert M. Perito, Special Assistant to the Under Secretary for Political Affairs in 1982, recalled when Haig had resigned and his final duties before Shultz took over.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">You can also read about Haig’s embarrassment after&nbsp;</span></span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/2015/05/recant-and-release-smoking-gun-shoots-blanks/"><span data-dcnode-id="1045" instrument_node="">a Nicaraguan soldier recanted</span></a><span data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node=""> regarding Cuban involvement in El Salvador,&nbsp;his run-in with the ambassador over U.S. policy in </span></span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/2015/01/resigning-over-the-conflict-in-el-salvador/"><span data-dcnode-id="1041" instrument_node="">El Salvador</span></a><span data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">, and his yelling match with an FSO who quit because of </span></span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/2014/11/take-this-job-and-shove-it-mr-kissinger/"><span data-dcnode-id="1037" instrument_node="">disagreements </span></a><span data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">on bombing Cambodia. </span></span><span data-dcnode-id="1033" instrument_node="">Read when Secretary Haig famously declared, </span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/2014/03/al-haig-and-the-reagan-assassination-attempt-im-in-charge-here/" target="_blank"><span data-dcnode-id="1032" instrument_node="">“I’m in charge here” </span></a><span data-dcnode-id="1030" instrument_node="">after the assassination attempt on President Reagan. Go here for other </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/tag/reagan/" target="_blank"><span data-dcnode-id="1029" instrument_node="">Moments dealing with Reagan</span></a><span data-dcnode-id="1027" instrument_node="">.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1022" instrument_node="">
</span><h5 data-dcnode-id="1019"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">“It was a nightmare trip for everyone involved”</span></strong></h5><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1015"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Clayton E. McManaway, Staff Secretariat in the Department of State, 1981-1983</span></strong></p><span data-dcnode-id="1014" instrument_node="">
</span><figure class="full-width-mobile alignleft thin" data-dcnode-id="1012" style="width: 250px;"><img alt="" class="wp-image-16915" data-dcnode-id="1013" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2016/06/Alexander-Haig-I.jpg&amp;raw"></figure><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">McMANAWAY: I was on Reagan’s first trip abroad to Europe in 1982, which was the beginning of the fall of Al Haig. It was a nightmare.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">What I found surprising [was] watching…someone with his experience virtually run the government in the last years of Nixon and failing to form any alliances in the cabinet. Not taking the measure of people around the President before he made recommendations and moves, which got him off to a very bad start….</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">He went alone the whole time he was Secretary. He was a loner. Almost as though he was the one man in town who really understood what really needed to be done and how to do it. I think that didn’t go down very well either.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">[Going to Europe] was a nightmare trip for everybody involved because of the schedule, it was so heavy. I made a couple of advance trips with [Deputy White House Chief of Staff] Mike Deaver and his people and I kept trying to tell them that they were over scheduling the President.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Sure enough, if you remember, he fell asleep when he was talking to the Pope on worldwide TV. It was just too much. We had back-to-back summits. The economic summit and the NATO summit, a visit to the Pope. We were gone ten days. I think I averaged about three hours of sleep a night.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">The signs of an attitude towards Haig started during the advances and planning. Where is Haig in the motorcade? I had to get him in the right place in the motorcade. I had to go to the French to get him from Paris to Versailles, in a French helicopter.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">I learned on one of the advance trips that Reagan was secretly planning an extra day in Paris, going in a day early for a private visit. I was having great difficulty getting adequate space for the staff out at Versailles where the economic summit was going to take place.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">The White House people were being very uncooperative in giving us adequate space and putting us out of touch with the Secretary. We couldn’t support him the way they were setting us up. So I looked around and noticed that the White House had not reserved any hotel space in Paris. I got hold of the embassy housing guy and we went to the [Hotel] Crillon [next door to Embassy Paris] and blocked two floors and I just sat back and waited.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">About a week after we got back to Washington I get this phone call from the White House advance team. “We have a little problem with hotel space in Paris.” So I traded with them. I didn’t need all of the space I had blocked so I gave them Paris space and got adequate space from them out at Versailles. That was the way I had to do it….</span></p><span data-dcnode-id="984" instrument_node="">
</span><h5 data-dcnode-id="981"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">“In my judgment they were just setting him up”</span></strong></h5><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">During the trip it went from protocol questions and logistical problems into substance, foreign policy issues. Repeatedly Haig was being bypassed. He was right there in the room or in the building and [Deputy Secretary of State Bill] Clark was going directly to the President on issues of UN votes…This was before we had a classified fax. The White House had one….</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">In the middle of all this Israel invaded Lebanon. We were at Versailles and we brought </span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/oral-history/fascinating-figures/philip-habib-cursed-is-the-peacemaker/" target="_blank"><span data-dcnode-id="975" instrument_node="">Phil Habib</span></a><span data-dcnode-id="973" instrument_node=""> down from England for a briefing and sent him on his way. Phil correctly predicted they would not stop as they said they were going to stop, and that they were going all the way to Beirut.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">I got a hold of this letter from Reagan to Begin, begging for a ceasefire.</span></p><span data-dcnode-id="968" instrument_node="">
</span><figure class="full-width-mobile alignright thin" data-dcnode-id="966" style="width: 168px;"><img alt="" class="wp-image-16917" data-dcnode-id="967" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2016/06/Jerry-Bremer.jpg&amp;raw"></figure><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">The Secretary of State didn’t know anything about it. He was off at a banquet or something. So I got on the phone to [pictured, Executive Secretary] Jerry Bremer, who was backing us up.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">I say, “Jerry, this letter, it is signed. Do you know anything about it? What am I going to tell the Secretary of State?”</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">He said, “There is no such letter like that.”</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">I say, “Jerry, I am looking at the letter.”</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">He said, “I will be right back to you.”</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">He called Bud McFarlane, who was then the [Deputy National Security Advisor] to Clark. Bud denied it. Jerry called me back and said that there is no such letter.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">I said, “Jerry, God damn it, I am looking at it. I can’t send it to you but I will read it to you. And it is signed.”</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">And Jerry, of course, blew his stack and got back to Bud who finally admitted the letter had gone out. I had to go and show it to the Secretary of State when he got back and tell him it had already gone out. A major foreign policy issue in the midst of warfare. And it just kept on happening.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">In my judgment they were just setting him up. Haig had occasionally threatened to resign and they set him up.….</span></p><span data-dcnode-id="938" instrument_node="">
</span><h5 data-dcnode-id="935"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">“These series of events were not accidental”</span></strong></h5><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">I found myself wandering around about 3 or 4 in the morning in Windsor Castle looking for the Secretary of State and bumping into Deaver in his pajamas. I thought for a while it was a replay of Macbeth or something.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">It is really unreal because I had on the other end of the phone [Under Secretary of State for Political Affairs</span><span data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">&nbsp;</span></span><span data-dcnode-id="927" instrument_node="">Larry] Eagleburger and Bremer screaming at me that the UN was about to take a vote and did the Secretary know anything about it. I had to say that I didn’t know where the Secretary of State is, that I couldn’t find him.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">“What do you mean you don’t know where he is? You had goddamn better find out where he is and get him to this phone.”</span></p><span data-dcnode-id="922" instrument_node="">
</span><figure class="full-width-mobile alignleft thin" data-dcnode-id="920" style="width: 347px;"><img alt="" class="wp-image-16911" data-dcnode-id="921" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2016/06/Windsor-Castle.jpg&amp;raw"></figure><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">As staff we weren’t quartered in Windsor Castle, Haig and Woody Goldberg, his assistant, were. I remember at 3 or 4 in the morning, Haig and I looking at each other and Haig saying, “What the hell is going on?”</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">I think it dawned on both of us at the same time that this was not an accident. These series of events were not accidental. This was a deliberate strategy that Clark and Deaver had decided on to get rid of Haig….</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">These guys from California were Californians. They were easy going and Haig comes into a room and sparks would start flying and he sits down at a table in a meeting and it is all wham, bang….</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">So this had been building for a while. I think they finally decided this was a good opportunity to really humiliate him in front of his staff.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">On one occasion they were at the same banquet table when Clark goes over and whispers in the President’s ear and goes off and made a major foreign policy decision and doesn’t even tell the Secretary of State. Doesn’t even tell him, much less involve him in the discussion….</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">[Clark] would go directly to the President with them and cut out the Secretary of State. The basic plan was that you drive this man nuts and he will come in and resign.</span></p><span data-dcnode-id="901" instrument_node="">
</span><h5 data-dcnode-id="898"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">“Haig was already in deep trouble with the advisers around the President, whom he used to call ‘Neanderthals’”</span></strong></h5><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="894"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Wat Tyler Cluverius, Director, Office of Jordan, Syria, Lebanon, and Iraq, 1978-1983</span></strong></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">CLUVERIUS: &nbsp;I got my instructions — Do not see the Israelis, send your delegation home and, to me, you will join the President and the Secretary in Europe. They were on the Paris-London-Bonn tour, President Reagan was.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">And of course, Haig was with the President and they had no Middle East guy in the entourage so I was told to immediately catch up the next morning and the Embassy was to get me a ticket. To get me to London, I had missed the Paris portion. I was to catch up in Windsor and then join the Secretary and the party and go on to Bonn….</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Haig had called me out of the hotel in Bad Godesberg to go to this castle which was about 40 minutes away. And of course there was lots of phoning going on; obviously, I didn’t know anything about what was passing between Haig and [Ambassador to Israel] Sam Lewis in Tel Aviv, [Prime Minister Menachem] Begin.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">Of course the Israelis at the time were still pushing the idea, the fiction that this was a limited intervention….Of course [Defense Minister </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/2014/01/ariel-sharons-smear-campaign-against-the-u-s-ambassador/" target="_blank"><span data-dcnode-id="882" instrument_node="">Ariel] Sharon</span></a><span data-dcnode-id="880" instrument_node=""> had been deceiving, probably Begin himself, and was really pushing to engage the Syrians regardless of the public statements of intent.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Haig was very excited, very excitable about trying to put this thing back together again. He wanted to send off some rather ill-considered cables which he told me to write. I tried to write them so that they’d look proper on the record, so to speak.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">He went upstairs at one point. Came back down and said he’d talked to Begin on the phone. Everything was alright, he had certain assurances, no thanks to anybody else. He, Al Haig, had done it.</span></p><span data-dcnode-id="872" instrument_node="">
</span><figure class="full-width-mobile alignright thin" data-dcnode-id="870" style="width: 326px;"><img alt="" class="wp-image-16919" data-dcnode-id="871" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2016/06/Ronald-Reagan.jpg&amp;raw"></figure><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">He then wanted to talk to the President. The Secret Service had told him the President was asleep. He said, “I don’t give a damn, I want to talk to him.” This must have been after midnight, sometime between 12 and 1:30-2.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">He was telling the President he had talked to Begin. The Israelis were giving him assurances on this and that. He was the only guy the President had who knew what he was doing. Then he called from a dining room which was the command post for the Secretary, and at this hour there was just me and this one staff aide.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">There were some sliding doors, on the other side of which were a couple of late-night secretaries. They couldn’t really hear what was going on in this room, fortunately. He even asked one of them to come in and dictated a note which he said he wanted to pin to the pillow of the National Security Adviser, Bill Clark….</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">He was really imparting that he, Al Haig, had fixed it. He was the only one who could possibly have done so.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Ultimately, of course, he was wrong anyway; it didn’t work out that way. I think everybody could hear the little rumblings in the background. I think Haig was already in very deep trouble with the White House and with the advisers around the President, whom Al Haig used to call “Neanderthals.”</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">I think this whole thing was just a bitter piece of a much larger set of unhappiness both with the Reagan people with Al Haig not being a team player and all of that, and Al Haig with them….</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">I thought either the President was about to give up foreign policy to a Secretary of State or he was going to have to fire the guy.</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">And it was serious enough that at the end of the evening, the one other person in the room, the staff aide, we agreed that we would keep this one under our hats for a decade or so.</span></p><span data-dcnode-id="845" instrument_node="">
</span><h5 data-dcnode-id="842"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Opposition to Haig on Taiwan Arms Sales&nbsp; </span></strong></h5><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="838"><strong data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">John J. Taylor, Political Counselor, Beijing, China, (1980-1982)</span></strong></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">TAYLOR: At some point, possibly this was in 1981, Haig sent a memo to President Reagan that underscored the strategic importance of the China relationship. In this memo, a copy of which I saw, Haig argued that </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/2013/12/the-u-s-recognizes-communist-china-not-taiwan-january-1-1979/" target="_blank"><span data-dcnode-id="835" instrument_node="">Carter had messed up the Taiwan </span></a><span data-dcnode-id="833" instrument_node="">arms sales issue at the time of recognition and had thus threatened the critical geopolitical connection begun by Nixon.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">The suggestion was that flexibility on the arms sales question was critically required because Carter (not Reagan) had stirred up the matter and provoked the Chinese. In May 1982, as the negotiations seemed to have run into a dead-end, Reagan signed letters to the three top Chinese leaders (Deng, Zhao, and Hu Yaobang) — an extraordinary, probably unique presidential gesture.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">These letters strongly reaffirmed America’s commitment to the one-China principle and recognized “the significance” of Peking’s 1981 nine-point proposal to Taiwan for unification.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Most importantly, in the letter to Zhao, Reagan wrote that in the context of progress toward a peaceful solution of the Taiwan-mainland issue, “there would naturally be a decrease in the need for arms by Taiwan.”</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Whether Bill Clark at the NSC saw these letters in draft is uncertain but they laid the foundation for the agreed upon communiqué.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Vice President George Bush then made a visit to Peking in May, where he had a long talk with Deng Xiaoping, which carried over into a Chinese feast for lunch. The elderly Deng tossed back four or five “gan bei’s” of high octane maotai. Bush tossed down one or two shots and thereafter only touched the liquid to his lips.</span></p><span data-dcnode-id="816" instrument_node="">
</span><figure class="full-width-mobile alignleft thin" data-dcnode-id="814" style="width: 294px;"><img alt="" class="wp-image-11136" data-dcnode-id="815" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2015/05/china-taiwan-e1432834722433.jpg&amp;raw"></figure><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Bush’s views were similar to those of Haig: we could restrict without any specifics whatsoever our future arms sales to Taiwan but only if China agreed that this action would be linked to China’s strong commitment to a peaceful resolution.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">At one point in the meeting, Bush said that no one in the Administration saw such sales “going on forever.” When Bush returned to Washington, he was helpful in the final maneuvering that squirmed through a final draft accord.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">About this time, Paul Wolfowitz, who was head of Policy Planning at State, sent a memo to Haig strongly opposing the communiqué. Haig ignored the complaint, but by this time pro-Taiwan Congressmen as well as officials in the White House were becoming worried that the negotiations would seriously restrict our arms sales to Taiwan and end up pressuring the Government in Taipei into negotiations with Peking on reunification. Wolfowitz was in their camp….</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Haig’s tactical reason for pursuing the Communiqué was simply to get over the current imbroglio with Peking. The dispute had its roots in Reagan’s remarks about Taiwan during the presidential campaign. These remarks had put pressure on Deng Xiaoping within the Chinese leadership to address the issue.</span></p><span data-dcnode-id="801" instrument_node="">
</span><h5 data-dcnode-id="798"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">“Conservatives in the White House and in Congress were upset with Haig over a number of foreign policy issues”</span></strong></h5><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">The </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/2014/12/the-soviet-invasion-of-afghanistan-december-1979/" target="_blank"><span data-dcnode-id="795" instrument_node="">Soviet invasion of Afghanistan </span></a><span data-dcnode-id="793" instrument_node="">had reinvigorated America’s strategic interests in close ties to China, and thus the contretemps was also an opportunity for Deng to settle the issue on an acceptable basis. For Haig there was also, I believed at the time, a profound strategic reason to settle the issue. Most of his “China hands” agreed with him….</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">In 1981, Chiang Ching-kuo, President of the Republic of China on Taiwan, sent a message to the incoming chief of the American “unofficial” mission in Taipei, Jim Lilley, a former CIA officer who was close to George Bush. The message said that Chiang’s major goals for the future were: democratization, Taiwanization, and “development of working relations with China.”</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Politically and personally, Chiang was deeply committed to the principle of One-China. Thus it appeared that while Chiang wanted as strong a hand as possible in dealing with Peking, he in fact intended at some point to begin direct talks.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Conservatives in the White House and in Congress were upset with Haig over a number of foreign policy issues, including the Middle East and the proposed Soviet-West European pipeline. The proposed communiqué with Peking on arms sales to Taiwan was another cause of their rising discontent.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">The White House Senior staff, including James Baker, [Attorney General Ed] Meese, and Deaver did not at all like Haig’s aggressive and sometimes imperial style. Goldwater sped out to Taipei in early June. From a ranking Taiwan official, I later learned that Goldwater had personally reassured Chiang Ching-kuo that, as [Singaporean Prime Minister] Lee Kuan Yew had informed him the previous year, Taiwan would receive “some sort of advanced aircraft” that would meet Taiwan’s needs.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">In addition, the Senator very likely told Ching-kuo that he need not worry about the forthcoming US-PRC communiqué. On June 23, Goldwater informed Reagan that Haig had lied to him (Reagan) about the communiqué.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Reagan, who hated firing people, called in the Secretary and abruptly asked for his resignation. Haig agreed but said he would stay on until his replacement was confirmed. The amenable President agreed.</span></p><span data-dcnode-id="773" instrument_node="">
</span><h5 data-dcnode-id="767"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">“Wake everybody up.</span></strong><span data-dcnode-id="770" instrument_node=""> </span><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">We’re going home.&nbsp; Al Haig just resigned.”</span></strong></h5><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="763"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Robert M. Perito, Special Assistant to the Under Secretary for Political Affairs, 1982</span></strong></p><span data-dcnode-id="762" instrument_node="">
</span><figure class="full-width-mobile alignright thin" data-dcnode-id="760" style="width: 182px;"><img alt="" class="wp-image-16912" data-dcnode-id="761" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2016/06/Walter-Stoessel.jpg&amp;raw"></figure><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="758" instrument_node="">PERITO: There was tension, which resulted in Haig’s resignation. I accompanied [pictured, Deputy Secretary of State Walter] Stoessel when he represented the U.S. at the annual ASEAN and </span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/2015/06/no-nukes-for-new-zealand-breakdown-of-the-anzus-treaty/" target="_blank"><span data-dcnode-id="757" instrument_node="">ANZUS</span></a><span data-dcnode-id="755" instrument_node=""> [Australia, New Zealand, U.S. Security Treaty] conferences because Haig did not want to go. Again we were given a USAF [U.S. Air Force] special aircraft and left for Singapore via the Philippines. We had an extraordinary experience in the Philippines. We called on President [Ferdinand] Marcos and met Imelda, were wined and dined, and stayed in a gorgeous house….</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">After Singapore, we attended the ANZUS conference in Australia, stopped in New Zealand and flew to Pago Pago in American Samoa, the setting for the Broadway show ‘South Pacific.’ We stopped there overnight and then were supposed to go to Hawaii and then home. Stoessel stayed at the governor’s mansion in Pago Pago. I stayed in a motel down the road.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">The next morning about five o’clock someone pounded on my door. I opened the door, and there standing in a torrential rainstorm was the Secretariat representative on the trip. He said, “Get up. Al Haig is trying to call Stoessel and he can’t get through to the governor’s mansion. We’ve got to go up there and get Stoessel to call State.”</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">When we arrived at the mansion, the governor was in the kitchen in his pajamas. He said Stoessel was in the bedroom. I walked into the bedroom. Stoessel was in bed talking on the phone.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">I’ll never forget the conversation. I only heard Stoessel’s part, which went “Al? What do you mean, Al? Come on, don’t kid around, Al? What do you mean you’re resigning, Al? Don’t do it, Al? Al? What’s going on there?”</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">The conversation went on like that for a few more minutes.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Then Stoessel said, “All right, if that’s what you’re going to do.” He hung up the phone, looked at me and said, “Wake everybody up. We’re going home. Al Haig just resigned.”</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">I went downstairs, woke up the air crew, which had planned to spend the day at the beach, and explained that Haig had resigned, Stoessel was Acting Secretary of State and we had to return to Washington.</span></p><span data-dcnode-id="732" instrument_node="">
</span><h5 data-dcnode-id="729"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">“It felt like there had been a coup”</span></strong></h5><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">We stopped in Hawaii only long enough to refuel and talk to the CINC-PAC [Commander n Chief, Pacific Command] commander who had no additional information about what was happening in Washington. We landed at Andrews Air Force Base at night, it was raining, the place was deserted, and ours was the only aircraft.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">We were met by a State Department van and a car for Stoessel. There was no one to greet us; no news; we had no idea what was happening. It felt like there had been a coup.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">We got in the car, and Stoessel said, “Let’s go to the Department and find out what’s happening.” We did.&nbsp; Al Haig had turned in his resignation….</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">But Haig didn’t leave. His resignation was accepted by the President, but no replacement was named and Haig continued to come to the office and function as the Secretary of State.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">This was a very critical period. A full-scale Israeli attack on the Palestinians in Lebanon had reached Beirut. The Israeli army had encircled the city, trapped the Palestinians inside and were threatening to annihilate them, including Yasser Arafat. The U.S. embassy in Beirut was shelled continuously. Ambassador Philip Habib was in Beirut as the U.S. negotiator.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Officially Stoessel was the Acting Secretary of State, but Al Haig was still there and still making decisions. We were involved in trying to figure out how to save the Palestinians from being annihilated by the Israelis.</span></p><span data-dcnode-id="710" instrument_node="">
</span><figure class="full-width-mobile alignleft thin" data-dcnode-id="708" style="width: 343px;"><img alt="" class="wp-image-16918" data-dcnode-id="709" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adst.org/wp-content/uploads/2016/06/wintergreen-resort.jpg&amp;raw"></figure><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">On the July Fourth holiday, Haig went on vacation to Wintergreen [the famous resort in the Blue Ridge mountains in Virginia]. The Department was closed, but Stoessel and I were in the office. Phil Habib was on the phone calling Stoessel from the ambassador’s residence in Beirut to tell him about the latest twists in the negotiations between the Palestinians and the Israelis.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">You could hear the shells exploding around the building.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Habib stopped every so often to say, “I can’t talk. I’ve got to get down. The shelling is too heavy.”</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Stoessel was on the phone with Habib. I was sitting across the room on another telephone with Haig’s assistant who was standing beside a tennis court at Wintergreen where Haig was playing tennis. Between artillery bursts, Habib would talk with Stoessel who would give me the message. I would speak to Haig’s assistant who would wait until Haig finished his serve to pass along the message. The assistant would give me Haig’s reply; I would tell Stoessel who would tell Habib. The conversation went on in this manner for 45 minutes.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">As it turned out, this exchange was one of Haig’s last acts as Secretary of State. George Shultz had been announced. Stoessel asked Shultz to tell Haig his time as Secretary was over.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Haig did not come back to the Department after his vacation.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">&nbsp;</span></p><span data-dcnode-id="686" instrument_node="">
</span></div><span data-dcnode-id="684" instrument_node="">
