ted_States_sidebar" title="Template talk:History of the United States sidebar"><abbr data-dcnode-id="5789" title="Discuss this template"><span data-dcnode-id="5790" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="5783"><a class="external text" data-dcnode-id="5784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3AHistory_of_the_United_States_sidebar%26action%3Dedit"><abbr data-dcnode-id="5785" title="Edit this template"><span data-dcnode-id="5786" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="5776" instrument_node="">

</span><p data-dcnode-id="5755"><span data-dcnode-id="5768" instrument_node="">The </span><a data-dcnode-id="5766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diplomatic_history" title="Diplomatic history"><span data-dcnode-id="5767" instrument_node="">diplomatic history</span></a><span data-dcnode-id="5765" instrument_node=""> of the United States oscillated among three positions: </span><a data-dcnode-id="5763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isolationism" title="Isolationism"><span data-dcnode-id="5764" instrument_node="">isolation from diplomatic entanglements of other (typically European) nations</span></a><span data-dcnode-id="5762" instrument_node=""> (but with economic connections to the world); alliances with European and other military partners; and </span><a data-dcnode-id="5760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unilateralism" title="Unilateralism"><span data-dcnode-id="5761" instrument_node="">unilateralism</span></a><span data-dcnode-id="5759" instrument_node="">, or operating on its own sovereign policy decisions. The US always was large in terms of area, but its population was small, only 4 million in 1790. </span><a data-dcnode-id="5757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demographics_of_the_United_States" title="Demographics of the United States"><span data-dcnode-id="5758" instrument_node="">Population growth was rapid</span></a><span data-dcnode-id="5756" instrument_node="">, reaching 7.2 million in 1810, 32 million in 1860, 76 million in 1900, 132 million in 1940, and 316 million in 2013.  Economic growth in terms of overall GDP was even faster. However, the nation's military strength was quite limited in peacetime before 1940.
</span></p><span data-dcnode-id="5754" instrument_node="">
</span><link data-dcnode-id="5753" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable plainlinks" data-dcnode-id="5742" role="note"><span data-dcnode-id="5752" instrument_node="">This is a </span><a data-dcnode-id="5750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AWikiProject_Lists%23Incomplete_lists" title="Wikipedia:WikiProject Lists"><span data-dcnode-id="5751" instrument_node="">dynamic list</span></a><span data-dcnode-id="5749" instrument_node=""> and may never be able to satisfy particular standards for completeness. You can help by </span><a class="external text" data-dcnode-id="5747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTimeline_of_United_States_diplomatic_history%26action%3Dedit"><span data-dcnode-id="5748" instrument_node="">adding missing items</span></a><span data-dcnode-id="5746" instrument_node=""> with </span><a data-dcnode-id="5744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AReliable_sources" title="Wikipedia:Reliable sources"><span data-dcnode-id="5745" instrument_node="">reliable sources</span></a><span data-dcnode-id="5743" instrument_node="">.</span></div><span data-dcnode-id="5741" instrument_node="">

</span><h2 data-dcnode-id="5633"><span class="mw-headline" data-dcnode-id="5641" id="18th_century"><span data-dcnode-id="5642" instrument_node="">18th century</span></span><span class="mw-editsection" data-dcnode-id="5634"><span class="mw-editsection-bracket" data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">[</span></span><a data-dcnode-id="5637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTimeline_of_United_States_diplomatic_history%26action%3Dedit%26section%3D1" title="Edit section: 18th century"><span data-dcnode-id="5638" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5632" instrument_node="">
</span><ul data-dcnode-id="5371"><li data-dcnode-id="5609"><span data-dcnode-id="5631" instrument_node="">1721 – </span><a class="new" data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreaty_with_South_Carolina%26action%3Dedit%26redlink%3D1" title="Treaty with South Carolina (page does not exist)"><span data-dcnode-id="5630" instrument_node="">Treaty with South Carolina</span></a><span data-dcnode-id="5628" instrument_node=""> established with the </span><a data-dcnode-id="5626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cherokee" title="Cherokee"><span data-dcnode-id="5627" instrument_node="">Cherokee</span></a><span data-dcnode-id="5625" instrument_node=""> and the </span><a data-dcnode-id="5623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_South_Carolina" title="Province of South Carolina"><span data-dcnode-id="5624" instrument_node="">Province of South Carolina</span></a><span data-dcnode-id="5622" instrument_node=""> which ceded land between the </span><a data-dcnode-id="5620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Santee_River" title="Santee River"><span data-dcnode-id="5621" instrument_node="">Santee</span></a><span data-dcnode-id="5619" instrument_node="">, </span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saluda_River" title="Saluda River"><span data-dcnode-id="5618" instrument_node="">Saluda</span></a><span data-dcnode-id="5616" instrument_node="">, and </span><a data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edisto_River" title="Edisto River"><span data-dcnode-id="5615" instrument_node="">Edisto Rivers</span></a><span data-dcnode-id="5613" instrument_node=""> to the </span><a data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_South_Carolina" title="Province of South Carolina"><span data-dcnode-id="5612" instrument_node="">Province of South Carolina</span></a><span data-dcnode-id="5610" instrument_node="">.</span></li><span data-dcnode-id="5608" instrument_node="">
</span><li data-dcnode-id="5601"><span data-dcnode-id="5607" instrument_node="">1727 – </span><a class="mw-redirect" data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikwasi%23Treaty_of_1727" title="Nikwasi"><span data-dcnode-id="5606" instrument_node="">Treaty of Nikwasi</span></a><span data-dcnode-id="5604" instrument_node=""> established a trade agreement between the Cherokee and the </span><a data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_North_Carolina" title="Province of North Carolina"><span data-dcnode-id="5603" instrument_node="">Province of North Carolina</span></a></li><span data-dcnode-id="5600" instrument_node="">
</span><li data-dcnode-id="5574"><span data-dcnode-id="5599" instrument_node="">1754 – In response to disputes between the </span><a data-dcnode-id="5597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_New_York" title="Province of New York"><span data-dcnode-id="5598" instrument_node="">Province of New York</span></a><span data-dcnode-id="5596" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="5594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iroquois_confederacy" title="Iroquois confederacy"><span data-dcnode-id="5595" instrument_node="">Iroquois Confederacy</span></a><span data-dcnode-id="5593" instrument_node=""> </span><a data-dcnode-id="5591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Franklin" title="Benjamin Franklin"><span data-dcnode-id="5592" instrument_node="">Benjamin Franklin</span></a><span data-dcnode-id="5590" instrument_node=""> proposes the </span><a data-dcnode-id="5588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albany_Plan" title="Albany Plan"><span data-dcnode-id="5589" instrument_node="">Albany Plan of Union</span></a><span data-dcnode-id="5587" instrument_node="">, which would establish a </span><a class="mw-redirect" data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_government" title="Federal government"><span data-dcnode-id="5586" instrument_node="">federal government</span></a><span data-dcnode-id="5584" instrument_node=""> for eleven of the colonies in </span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_North_America" title="British North America"><span data-dcnode-id="5583" instrument_node="">British North America</span></a><span data-dcnode-id="5581" instrument_node=""> to adjudicate colonial territorial disputes and diplomatic policy towards </span><a data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Native_Americans_in_the_United_States" title="Native Americans in the United States"><span data-dcnode-id="5580" instrument_node="">Native Americans</span></a><span data-dcnode-id="5578" instrument_node="">; it is rejected by most of the colonial governments.</span><sup class="reference" data-dcnode-id="5575" id="cite_ref-1"><a data-dcnode-id="5576" href="#cite_note-1"><span data-dcnode-id="5577" instrument_node="">[1]</span></a></sup></li><span data-dcnode-id="5573" instrument_node="">
</span><li data-dcnode-id="5562"><span data-dcnode-id="5572" instrument_node="">1761 – </span><a class="new" data-dcnode-id="5570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreaty_of_Long-Island-on-the-Holston%26action%3Dedit%26redlink%3D1" title="Treaty of Long-Island-on-the-Holston (page does not exist)"><span data-dcnode-id="5571" instrument_node="">Treaty of Long-Island-on-the-Holston</span></a><span data-dcnode-id="5569" instrument_node=""> established with the Cherokee and the </span><a data-dcnode-id="5567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colony_of_Virginia" title="Colony of Virginia"><span data-dcnode-id="5568" instrument_node="">Colony of Virginia</span></a><span data-dcnode-id="5566" instrument_node=""> which ended the </span><a data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Cherokee_War" title="Anglo-Cherokee War"><span data-dcnode-id="5565" instrument_node="">Anglo-Cherokee war</span></a><span data-dcnode-id="5563" instrument_node=""> with the colony.</span></li><span data-dcnode-id="5561" instrument_node="">
</span><li data-dcnode-id="5553"><span data-dcnode-id="5560" instrument_node="">1762 – </span><a class="new" data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreaty_of_Charlestown%26action%3Dedit%26redlink%3D1" title="Treaty of Charlestown (page does not exist)"><span data-dcnode-id="5559" instrument_node="">Treaty of Charlestown</span></a><span data-dcnode-id="5557" instrument_node=""> established with the Cherokee and the </span><a data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_South_Carolina" title="Province of South Carolina"><span data-dcnode-id="5556" instrument_node="">Province of South Carolina</span></a><span data-dcnode-id="5554" instrument_node=""> which ended the Anglo-Cherokee war with the colony.</span></li><span data-dcnode-id="5552" instrument_node="">
</span><li data-dcnode-id="5541"><span data-dcnode-id="5551" instrument_node="">1774 – The Thirteen Colonies convene the </span><a data-dcnode-id="5549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Continental_Congress" title="First Continental Congress"><span data-dcnode-id="5550" instrument_node="">First Continental Congress</span></a><span data-dcnode-id="5548" instrument_node=""> and adopt a boycott of British goods and embargo on American exports in protest of the </span><a data-dcnode-id="5546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intolerable_Acts" title="Intolerable Acts"><span data-dcnode-id="5547" instrument_node="">Intolerable Acts</span></a><span data-dcnode-id="5545" instrument_node="">.</span><sup class="reference" data-dcnode-id="5542" id="cite_ref-2"><a data-dcnode-id="5543" href="#cite_note-2"><span data-dcnode-id="5544" instrument_node="">[2]</span></a></sup></li><span data-dcnode-id="5540" instrument_node="">
</span><li data-dcnode-id="5526"><span data-dcnode-id="5539" instrument_node="">1775 – Regular troops of the </span><a data-dcnode-id="5537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Army" title="British Army"><span data-dcnode-id="5538" instrument_node="">British Army</span></a><span data-dcnode-id="5536" instrument_node=""> and </span><a data-dcnode-id="5534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minutemen" title="Minutemen"><span data-dcnode-id="5535" instrument_node="">minutemen</span></a><span data-dcnode-id="5533" instrument_node=""> of colonial militias exchange fire at the </span><a data-dcnode-id="5531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battles_of_Lexington_and_Concord" title="Battles of Lexington and Concord"><span data-dcnode-id="5532" instrument_node="">Battles of Lexington and Concord</span></a><span data-dcnode-id="5530" instrument_node="">, beginning the </span><a data-dcnode-id="5528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Revolutionary_War" title="American Revolutionary War"><span data-dcnode-id="5529" instrument_node="">American Revolutionary War</span></a><span data-dcnode-id="5527" instrument_node="">.</span></li><span data-dcnode-id="5525" instrument_node="">
</span><li data-dcnode-id="5508"><span data-dcnode-id="5524" instrument_node="">1775 – The </span><a data-dcnode-id="5522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Continental_Congress" title="Second Continental Congress"><span data-dcnode-id="5523" instrument_node="">Second Continental Congress</span></a><span data-dcnode-id="5521" instrument_node=""> sends the </span><a data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olive_Branch_Petition" title="Olive Branch Petition"><span data-dcnode-id="5520" instrument_node="">Olive Branch Petition</span></a><span data-dcnode-id="5518" instrument_node=""> to King </span><a data-dcnode-id="5516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_III" title="George III"><span data-dcnode-id="5517" instrument_node="">George III</span></a><span data-dcnode-id="5515" instrument_node=""> pleading their loyalty to the </span><a class="mw-redirect" data-dcnode-id="5513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Crown" title="British Crown"><span data-dcnode-id="5514" instrument_node="">British Crown</span></a><span data-dcnode-id="5512" instrument_node="">; it is ignored and the King issues the </span><a data-dcnode-id="5510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proclamation_of_Rebellion" title="Proclamation of Rebellion"><span data-dcnode-id="5511" instrument_node="">Proclamation of Rebellion</span></a><span data-dcnode-id="5509" instrument_node="">.</span></li><span data-dcnode-id="5507" instrument_node="">
</span><li data-dcnode-id="5499"><span data-dcnode-id="5506" instrument_node="">1776 – </span><a data-dcnode-id="5504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thirteen_Colonies" title="Thirteen Colonies"><span data-dcnode-id="5505" instrument_node="">Thirteen Colonies</span></a><span data-dcnode-id="5503" instrument_node=""> declared independence as the United States of America on July 2; </span><a data-dcnode-id="5501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Declaration_of_Independence" title="United States Declaration of Independence"><span data-dcnode-id="5502" instrument_node="">Declaration of Independence</span></a><span data-dcnode-id="5500" instrument_node=""> adopted on July 4</span></li><span data-dcnode-id="5498" instrument_node="">
</span><li data-dcnode-id="5484"><span data-dcnode-id="5497" instrument_node="">1776 – Three commissioners sent to Europe to negotiate treaties. The </span><a data-dcnode-id="5495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_of_Great_Britain" title="Parliament of Great Britain"><span data-dcnode-id="5496" instrument_node="">British Parliament</span></a><span data-dcnode-id="5494" instrument_node=""> bans trade with the Thirteen Colonies, and the Second Continental Congress responds by opening American ports to all foreign vessels except from Great Britain. The Second Continental Congress also adopts the </span><a data-dcnode-id="5492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Model_Treaty" title="Model Treaty"><span data-dcnode-id="5493" instrument_node="">Model Treaty</span></a><span data-dcnode-id="5491" instrument_node=""> as a template for any future trade agreements with European countries such as </span><a data-dcnode-id="5489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_France" title="Kingdom of France"><span data-dcnode-id="5490" instrument_node="">France</span></a><span data-dcnode-id="5488" instrument_node=""> and </span><a data-dcnode-id="5486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish_Empire" title="Spanish Empire"><span data-dcnode-id="5487" instrument_node="">Spain</span></a><span data-dcnode-id="5485" instrument_node="">.</span></li><span data-dcnode-id="5483" instrument_node="">
</span><li data-dcnode-id="5475"><span data-dcnode-id="5482" instrument_node="">1776 – </span><a data-dcnode-id="5480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Watertown" title="Treaty of Watertown"><span data-dcnode-id="5481" instrument_node="">Treaty of Watertown</span></a><span data-dcnode-id="5479" instrument_node="">, the first treaty by the independent United States, is signed establishing a military alliance with the </span><a data-dcnode-id="5477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mi%25EA%259E%258Ckmaq" title="Miꞌkmaq"><span data-dcnode-id="5478" instrument_node="">Miꞌkmaq</span></a><span data-dcnode-id="5476" instrument_node="">.</span></li><span data-dcnode-id="5474" instrument_node="">
</span><li data-dcnode-id="5458"><span data-dcnode-id="5473" instrument_node="">1777 – European officers recruited to </span><a data-dcnode-id="5471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Continental_Army" title="Continental Army"><span data-dcnode-id="5472" instrument_node="">Continental Army</span></a><span data-dcnode-id="5470" instrument_node="">, including </span><a data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gilbert_du_Motier%2C_Marquis_de_Lafayette" title="Gilbert du Motier, Marquis de Lafayette"><span data-dcnode-id="5469" instrument_node="">Marquis de Lafayette</span></a><span data-dcnode-id="5467" instrument_node="">, </span><a data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johann_de_Kalb" title="Johann de Kalb"><span data-dcnode-id="5466" instrument_node="">Johann de Kalb</span></a><span data-dcnode-id="5464" instrument_node="">, </span><a data-dcnode-id="5462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Friedrich_Wilhelm_von_Steuben" title="Friedrich Wilhelm von Steuben"><span data-dcnode-id="5463" instrument_node="">Friedrich Wilhelm von Steuben</span></a><span data-dcnode-id="5461" instrument_node="">, and </span><a data-dcnode-id="5459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tadeusz_Ko%25C5%259Bciuszko" title="Tadeusz Kościuszko"><span data-dcnode-id="5460" instrument_node="">Tadeusz Kościuszko</span></a></li><span data-dcnode-id="5457" instrument_node="">
</span><li data-dcnode-id="5440"><span data-dcnode-id="5456" instrument_node="">1777 – </span><a data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Dewitt%2527s_Corner" title="Treaty of Dewitt's Corner"><span data-dcnode-id="5455" instrument_node="">Treaty of Dewitt's Corner</span></a><span data-dcnode-id="5453" instrument_node=""> between the </span><a data-dcnode-id="5451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overhill_Cherokee" title="Overhill Cherokee"><span data-dcnode-id="5452" instrument_node="">Overhill Cherokee</span></a><span data-dcnode-id="5450" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="5448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_of_South_Carolina" title="State of South Carolina"><span data-dcnode-id="5449" instrument_node="">State of South Carolina</span></a><span data-dcnode-id="5447" instrument_node=""> which ceded the lands of the Cherokee Lower Towns in the State of </span><a data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Carolina" title="South Carolina"><span data-dcnode-id="5446" instrument_node="">South Carolina</span></a><span data-dcnode-id="5444" instrument_node="">, except for a narrow strip of what is now </span><a data-dcnode-id="5442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oconee_County%2C_South_Carolina" title="Oconee County, South Carolina"><span data-dcnode-id="5443" instrument_node="">Oconee County</span></a><span data-dcnode-id="5441" instrument_node="">.</span></li><span data-dcnode-id="5439" instrument_node="">
</span><li data-dcnode-id="5432"><span data-dcnode-id="5438" instrument_node="">1777 – France decides to recognize America in December after </span><a class="mw-redirect" data-dcnode-id="5436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Saratoga" title="Battle of Saratoga"><span data-dcnode-id="5437" instrument_node="">victory</span></a><span data-dcnode-id="5435" instrument_node=""> at </span><a data-dcnode-id="5433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saratoga%2C_New_York" title="Saratoga, New York"><span data-dcnode-id="5434" instrument_node="">Saratoga, New York</span></a></li><span data-dcnode-id="5431" instrument_node="">
</span><li data-dcnode-id="5423"><span data-dcnode-id="5430" instrument_node="">1778 – </span><a data-dcnode-id="5428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Alliance_%281778%29" title="Treaty of Alliance (1778)"><span data-dcnode-id="5429" instrument_node="">Treaty of Alliance with France</span></a><span data-dcnode-id="5427" instrument_node="">. Negotiated by </span><a data-dcnode-id="5425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Franklin" title="Benjamin Franklin"><span data-dcnode-id="5426" instrument_node="">Benjamin Franklin</span></a><span data-dcnode-id="5424" instrument_node="">, the US and France agreed to a military alliance; France sends naval and land forces, and much-needed munitions.</span></li><span data-dcnode-id="5422" instrument_node="">

</span><ul data-dcnode-id="4013"><li data-dcnode-id="4205"><span data-dcnode-id="4215" instrument_node="">1901 – </span><a data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hay%25E2%2580%2593Pauncefote_Treaty" title="Hay–Pauncefote Treaty"><span data-dcnode-id="4214" instrument_node="">Hay–Pauncefote Treaty</span></a><span data-dcnode-id="4212" instrument_node="">. American agreement with Great Britain nullifying </span><a data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clayton%25E2%2580%2593Bulwer_Treaty" title="Clayton–Bulwer Treaty"><span data-dcnode-id="4211" instrument_node="">Clayton–Bulwer Treaty</span></a><span data-dcnode-id="4209" instrument_node=""> of 1850; guarantee of open passage for any nation through proposed </span><a data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panama_Canal" title="Panama Canal"><span data-dcnode-id="4208" instrument_node="">Panama Canal</span></a><span data-dcnode-id="4206" instrument_node="">.</span></li><span data-dcnode-id="4204" instrument_node="">

</span><li data-dcnode-id="3178"><span data-dcnode-id="3197" instrument_node="">1961 – </span><a data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Checkpoint_Charlie" title="Checkpoint Charlie"><span data-dcnode-id="3196" instrument_node="">Berlin Crisis</span></a><span data-dcnode-id="3194" instrument_node="">. Soviets give </span><a class="mw-redirect" data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Democratic_Republic" title="German Democratic Republic"><span data-dcnode-id="3193" instrument_node="">East Germany</span></a><span data-dcnode-id="3191" instrument_node=""> control over </span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Berlin" title="East Berlin"><span data-dcnode-id="3190" instrument_node="">East Berlin</span></a><span data-dcnode-id="3188" instrument_node="">; in August the </span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Wall" title="Berlin Wall"><span data-dcnode-id="3187" instrument_node="">Berlin Wall</span></a><span data-dcnode-id="3185" instrument_node=""> is built to stem the wave of refugees escaping to the Western side. Kennedy proclaims  "</span><a data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ich_bin_ein_Berliner" title="Ich bin ein Berliner"><span data-dcnode-id="3184" instrument_node="">Ich bin ein Berliner</span></a><span data-dcnode-id="3182" instrument_node="">" ("I am a citizen of Berlin") to cheering </span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Berlin" title="West Berlin"><span data-dcnode-id="3181" instrument_node="">West Berliners</span></a><span data-dcnode-id="3179" instrument_node="">.</span></li><span data-dcnode-id="3177" instrument_node="">
</span><li data-dcnode-id="3172"><span data-dcnode-id="3176" instrument_node="">1962 – </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organization_of_American_States" title="Organization of American States"><span data-dcnode-id="3175" instrument_node="">Organization of American States</span></a><span data-dcnode-id="3173" instrument_node=""> (OAS) excludes Cuba, sets up trade embargo; dropped in 1975.</span></li><span data-dcnode-id="3171" instrument_node="">
</span><li data-dcnode-id="3160"><span data-dcnode-id="3170" instrument_node="">1962 – </span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Missile_Crisis" title="Cuban Missile Crisis"><span data-dcnode-id="3169" instrument_node="">Cuban Missile Crisis</span></a><span data-dcnode-id="3167" instrument_node="">. </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_F._Kennedy" title="John F. Kennedy"><span data-dcnode-id="3166" instrument_node="">John F. Kennedy</span></a><span data-dcnode-id="3164" instrument_node=""> on October 22 announces that there exist Soviet missiles in </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="3163" instrument_node="">Cuba</span></a><span data-dcnode-id="3161" instrument_node=""> and demanded their removal while imposing an air-sea blockade. Soviet missiles are withdrawn on condition that America will not invade Cuba.</span></li><span data-dcnode-id="3159" instrument_node="">
</span><li data-dcnode-id="3154"><span data-dcnode-id="3158" instrument_node="">1963 – </span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partial_Nuclear_Test_Ban_Treaty" title="Partial Nuclear Test Ban Treaty"><span data-dcnode-id="3157" instrument_node="">Partial Nuclear Test Ban Treaty</span></a><span data-dcnode-id="3155" instrument_node="">. US and the Soviet Union agreed not to conduct nuclear tests in space, in the atmosphere or underwater. Underground tests permitted; signed by 100 nations, excluding France and the People's Republic of China.</span></li><span data-dcnode-id="3153" instrument_node="">
</span><li data-dcnode-id="3148"><span data-dcnode-id="3152" instrument_node="">November 1963 – Kennedy </span><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination_of_John_F._Kennedy" title="Assassination of John F. Kennedy"><span data-dcnode-id="3151" instrument_node="">Assassinated</span></a><span data-dcnode-id="3149" instrument_node="">.</span></li><span data-dcnode-id="3147" instrument_node="">
</span><li data-dcnode-id="3139"><span data-dcnode-id="3146" instrument_node="">1964 – </span><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_of_Tonkin_Resolution" title="Gulf of Tonkin Resolution"><span data-dcnode-id="3145" instrument_node="">Gulf of Tonkin Resolution</span></a><span data-dcnode-id="3143" instrument_node=""> gives President </span><a data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyndon_B._Johnson" title="Lyndon B. Johnson"><span data-dcnode-id="3142" instrument_node="">Lyndon B. Johnson</span></a><span data-dcnode-id="3140" instrument_node=""> Congressional approval to act in Vietnam; repealed in 1970.</span></li><span data-dcnode-id="3138" instrument_node="">
</span><li data-dcnode-id="3133"><span data-dcnode-id="3137" instrument_node="">1965 – Intervention in </span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dominican_Republic" title="Dominican Republic"><span data-dcnode-id="3136" instrument_node="">Dominican Republic</span></a><span data-dcnode-id="3134" instrument_node="">.</span></li><span data-dcnode-id="3132" instrument_node="">
</span><li data-dcnode-id="3124"><span data-dcnode-id="3131" instrument_node="">1967 – In response to the construction of a Soviet </span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-ballistic_missile" title="Anti-ballistic missile"><span data-dcnode-id="3130" instrument_node="">anti-ballistic missile</span></a><span data-dcnode-id="3128" instrument_node=""> system around Moscow the </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glassboro_Summit_Conference" title="Glassboro Summit Conference"><span data-dcnode-id="3127" instrument_node="">Glassboro Summit Conference</span></a><span data-dcnode-id="3125" instrument_node=""> is convened.</span></li><span data-dcnode-id="3123" instrument_node="">
</span><li data-dcnode-id="3118"><span data-dcnode-id="3122" instrument_node="">1968 – </span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tet_Offensive" title="Tet Offensive"><span data-dcnode-id="3121" instrument_node="">Tet Offensive</span></a><span data-dcnode-id="3119" instrument_node=""> in Vietnam causes political crisis at home.</span></li></ul><span data-dcnode-id="3116" instrument_node="">
</span><dl data-dcnode-id="3107"><dd data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">— November 1 The first "accelerated pacification" of launching land reforms in South Vietnam intended to persuade South Vietnamese peasants not to support the Viet Cong is launched; a success.</span></dd><span data-dcnode-id="3113" instrument_node="">
</span><dd data-dcnode-id="3108"><span data-dcnode-id="3112" instrument_node="">— The United States signs the </span><a data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_the_Non-Proliferation_of_Nuclear_Weapons" title="Treaty on the Non-Proliferation of Nuclear Weapons"><span data-dcnode-id="3111" instrument_node="">Treaty on the Non-Proliferation of Nuclear Weapons</span></a><span data-dcnode-id="3109" instrument_node="">.</span></dd></dl><span data-dcnode-id="3106" instrument_node="">
</span><ul data-dcnode-id="3097"><li data-dcnode-id="3098"><span data-dcnode-id="3105" instrument_node="">1969 – </span><a data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="3104" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="3102" instrument_node=""> as president and </span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Kissinger" title="Henry Kissinger"><span data-dcnode-id="3101" instrument_node="">Henry Kissinger</span></a><span data-dcnode-id="3099" instrument_node=""> as his National Security Advisor; Kissinger serves as Secretary of State 1973–77.</span></li></ul><span data-dcnode-id="3096" instrument_node="">
</span><dl data-dcnode-id="3028"><dd data-dcnode-id="3078"><span data-dcnode-id="3095" instrument_node="">— January 28 Nixon launches policy of </span><a data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnamization" title="Vietnamization"><span data-dcnode-id="3094" instrument_node="">Vietnamization</span></a><span data-dcnode-id="3092" instrument_node="">, in which American ground troops in Vietnam were to be steadily reduced and the American role was to provide military training, equipment, and air support for the </span><a data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Vietnam_Military_Forces" title="Republic of Vietnam Military Forces"><span data-dcnode-id="3091" instrument_node="">South Vietnamese military</span></a><span data-dcnode-id="3089" instrument_node="">. Vietnamization was intended to reduce American losses in Vietnam, and thus reduce the domestic pressure for a total withdrawal of American forces. At the same time Nixon intensified the war by beginning </span><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Menu" title="Operation Menu"><span data-dcnode-id="3088" instrument_node="">Operation Menu</span></a><span data-dcnode-id="3086" instrument_node="">, the secret bombing of </span><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambodia" title="Cambodia"><span data-dcnode-id="3085" instrument_node="">Cambodia</span></a><span data-dcnode-id="3083" instrument_node="">.</span><sup class="reference" data-dcnode-id="3080" id="cite_ref-40"><a data-dcnode-id="3081" href="#cite_note-40"><span data-dcnode-id="3082" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3079" instrument_node=""> Nixon's aim in Vietnam is to force a Korean War-type armistice, which requires that the war go on until Hanoi agreed to the American terms while at the same time forcing Nixon to deflect pressure from domestic anti-war protests. With the same aim of achieving an armistice that would allow South Vietnam to continue to exist, Nixon begins a policy of seeking better relations with the Soviet Union and China, hoping those two states would reduce, if not end their arm supplies to North Vietnam in return for better relations with Washington, and thus forcing Hanoi to accept peace on American terms.</span></dd><span data-dcnode-id="3077" instrument_node="">
</span><dd data-dcnode-id="3072"><span data-dcnode-id="3076" instrument_node="">— February Following the success of the first "accelerated pacification" and the </span><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phoenix_Program" title="Phoenix Program"><span data-dcnode-id="3075" instrument_node="">Phoenix Program</span></a><span data-dcnode-id="3073" instrument_node=""> of "neutralizing" (i.e. assassinating) Viet Cong operatives, Nixon applies strong pressure for more "accelerated pacification" campaigns and the Phoenix Program killings in South Vietnam as a part of the effort at breaking the Viet Cong. For Nixon, "accelerated pacification" and the Phoenix Program killings both have the effect of weakening the Viet Cong without the use of American troops, which serves to achieve both his aims of reducing American forces and applying pressure for the Vietnamese Communists to accept peace on American terms.</span></dd><span data-dcnode-id="3071" instrument_node="">
</span><dd data-dcnode-id="3066"><span data-dcnode-id="3070" instrument_node="">— March 8 President Nasser of Egypt launches the </span><a data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_Attrition" title="War of Attrition"><span data-dcnode-id="3069" instrument_node="">War of Attrition</span></a><span data-dcnode-id="3067" instrument_node=""> against Israel. The US supports Israel while the Soviet Union supports Egypt.</span></dd><span data-dcnode-id="3065" instrument_node="">
</span><dd data-dcnode-id="3060"><span data-dcnode-id="3064" instrument_node="">— July 25 Nixon announces the </span><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nixon_Doctrine" title="Nixon Doctrine"><span data-dcnode-id="3063" instrument_node="">Nixon Doctrine</span></a><span data-dcnode-id="3061" instrument_node=""> in which Nixon warns that the United States will not go to any lengths to defend its allies, especially in Asia, and henceforth American allies must do more for their own defense. The doctrine is especially aimed at South Vietnam and is intended to pressure the South Vietnamese government to do a more effective job of fighting the Communists.</span></dd><span data-dcnode-id="3059" instrument_node="">
</span><dd data-dcnode-id="3053"><span data-dcnode-id="3058" instrument_node="">— July Nixon visits Pakistan and meets with the Pakistani President General Agha Yahya Khan, tells him that he wants to use Pakistan as an intermediary for talks with China.</span><sup class="reference" data-dcnode-id="3055" id="cite_ref-University_of_California_41-0"><a data-dcnode-id="3056" href="#cite_note-University_of_California-41"><span data-dcnode-id="3057" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3054" instrument_node=""> Yahya Khan agrees to Nixon's request.</span></dd><span data-dcnode-id="3052" instrument_node="">
</span><dd data-dcnode-id="3047"><span data-dcnode-id="3051" instrument_node="">— September 9 Walter Stoessel, the American ambassador to Poland is ordered by Nixon to make contacts with Chinese diplomats in an informal way.</span><sup class="reference" data-dcnode-id="3048" id="cite_ref-University_of_California_41-1"><a data-dcnode-id="3049" href="#cite_note-University_of_California-41"><span data-dcnode-id="3050" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="3046" instrument_node="">
</span><dd data-dcnode-id="3038"><span data-dcnode-id="3045" instrument_node="">— October 16 Pakistani ambassador to the United States </span><a data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agha_Hilaly" title="Agha Hilaly"><span data-dcnode-id="3044" instrument_node="">Agha Hilaly</span></a><span data-dcnode-id="3042" instrument_node=""> tells Kissinger that President Yahya is going to visit China early the next year, and is there any message that Kissinger would like Yahya to pass on to Mao.</span><sup class="reference" data-dcnode-id="3039" id="cite_ref-University_of_California_41-2"><a data-dcnode-id="3040" href="#cite_note-University_of_California-41"><span data-dcnode-id="3041" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="3037" instrument_node="">
</span><dd data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">— November 3 Nixon gives a TV speech claiming that there was a "silent majority" supporting his Vietnam policies, states that he needs some more time for his policies to work, denounces anti-war protestors as a threat to world peace, and asks for the support of the "silent majority" to help him "to end the war in a way that we could win the peace."</span></dd><span data-dcnode-id="3034" instrument_node="">
</span><dd data-dcnode-id="3029"><span data-dcnode-id="3033" instrument_node="">— November 17 The </span><a data-dcnode-id="3031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategic_Arms_Limitation_Talks" title="Strategic Arms Limitation Talks"><span data-dcnode-id="3032" instrument_node="">Strategic Arms Limitation Talks</span></a><span data-dcnode-id="3030" instrument_node=""> begin.</span></dd></dl><span data-dcnode-id="3027" instrument_node="">
</span><ul data-dcnode-id="3024"><li data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">1970</span></li></ul><span data-dcnode-id="3023" instrument_node="">
</span><dl data-dcnode-id="2978"><dd data-dcnode-id="3018"><span data-dcnode-id="3022" instrument_node="">— February 23 Hilaly tells Kissinger that after Yahya's visit to Beijing that the Chinese were interested in the American offer, but did not want to negotiate from a position of weakness.</span><sup class="reference" data-dcnode-id="3019" id="cite_ref-University_of_California_41-3"><a data-dcnode-id="3020" href="#cite_note-University_of_California-41"><span data-dcnode-id="3021" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="3017" instrument_node="">
</span><dd data-dcnode-id="3012"><span data-dcnode-id="3016" instrument_node="">— March Under the "accelerated pacification", more than million hectares of land have been redistributed in American-encouraged land reform in South Vietnam.</span><sup class="reference" data-dcnode-id="3013" id="cite_ref-42"><a data-dcnode-id="3014" href="#cite_note-42"><span data-dcnode-id="3015" instrument_node="">[42]</span></a></sup></dd><span data-dcnode-id="3011" instrument_node="">
</span><dd data-dcnode-id="3003"><span data-dcnode-id="3010" instrument_node="">— March 7 </span><a data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chiang_Kai-shek" title="Chiang Kai-shek"><span data-dcnode-id="3009" instrument_node="">Chiang Kai-shek</span></a><span data-dcnode-id="3007" instrument_node=""> who has heard reports of Sino-American talks in Warsaw writes to Nixon to protest.</span><sup class="reference" data-dcnode-id="3004" id="cite_ref-University_of_California_41-4"><a data-dcnode-id="3005" href="#cite_note-University_of_California-41"><span data-dcnode-id="3006" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="3002" instrument_node="">
</span><dd data-dcnode-id="2997"><span data-dcnode-id="3001" instrument_node="">— April 29 Nixon orders the </span><a class="mw-redirect" data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambodian_Campaign" title="Cambodian Campaign"><span data-dcnode-id="3000" instrument_node="">Cambodian Incursion</span></a><span data-dcnode-id="2998" instrument_node="">. American and South Vietnamese force invade eastern provinces of Cambodia with the aim of clearing out the Viet Cong/North Vietnamese forces based there. Sparks much protest in the United States.</span></dd><span data-dcnode-id="2996" instrument_node="">
</span><dd data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">— June By this point in the War of Attrition between Israel and Egypt, there are regular clashes occurring between Israel and Soviet forces in Egypt, leading to fears that this might cause a world war, which in turn leads to strong pressure for a ceasefire.</span></dd><span data-dcnode-id="2993" instrument_node="">
</span><dd data-dcnode-id="2988"><span data-dcnode-id="2992" instrument_node="">— October 25 During a Pakistani-American summit, President Nixon asks President Yahya to pass on another message to Beijing about the American wish for rapprochement with China.</span><sup class="reference" data-dcnode-id="2989" id="cite_ref-University_of_California_41-5"><a data-dcnode-id="2990" href="#cite_note-University_of_California-41"><span data-dcnode-id="2991" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="2987" instrument_node="">
</span><dd data-dcnode-id="2979"><span data-dcnode-id="2986" instrument_node="">— October 31 Kissinger meets with Romanian President </span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicolae_Ceau%25C8%2599escu" title="Nicolae Ceaușescu"><span data-dcnode-id="2985" instrument_node="">Nicolae Ceaușescu</span></a><span data-dcnode-id="2983" instrument_node=""> and asks him to pass on a message to China that the US wishes for a normalization of relations with the People's Republic of China.</span><sup class="reference" data-dcnode-id="2980" id="cite_ref-University_of_California_41-6"><a data-dcnode-id="2981" href="#cite_note-University_of_California-41"><span data-dcnode-id="2982" instrument_node="">[41]</span></a></sup></dd></dl><span data-dcnode-id="2977" instrument_node="">
</span><ul data-dcnode-id="2974"><li data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">1971</span></li></ul><span data-dcnode-id="2973" instrument_node="">
</span><dl data-dcnode-id="2848"><dd data-dcnode-id="2964"><span data-dcnode-id="2972" instrument_node="">— January 12 </span><a data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corneliu_Bogdan" title="Corneliu Bogdan"><span data-dcnode-id="2971" instrument_node="">Corneliu Bogdan</span></a><span data-dcnode-id="2969" instrument_node="">, the Romanian ambassador to the US tells Kissinger that Ceaușescu has passed on the American message, and that for Mao, normalization would be possible if the US would end the "occupation" of Taiwan as Mao calls American support for Taiwan.</span><sup class="reference" data-dcnode-id="2966" id="cite_ref-University_of_California_41-7"><a data-dcnode-id="2967" href="#cite_note-University_of_California-41"><span data-dcnode-id="2968" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2965" instrument_node=""> This poses a major problem for Nixon as allow China to take Taiwan would greatly damage America's image and pose domestic problems.</span></dd><span data-dcnode-id="2963" instrument_node="">
</span><dd data-dcnode-id="2958"><span data-dcnode-id="2962" instrument_node="">— March 4 Nixon gives press conference, and warns that better Sino-American relations cannot come at the expense of Taiwan.</span><sup class="reference" data-dcnode-id="2959" id="cite_ref-University_of_California_41-8"><a data-dcnode-id="2960" href="#cite_note-University_of_California-41"><span data-dcnode-id="2961" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="2957" instrument_node="">
</span><dd data-dcnode-id="2933"><span data-dcnode-id="2956" instrument_node="">— March 26 Pakistan launches </span><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Searchlight" title="Operation Searchlight"><span data-dcnode-id="2955" instrument_node="">Operation Searchlight</span></a><span data-dcnode-id="2953" instrument_node=""> intended by President Agha Yahya Khan to crush the </span><a data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Awami_League" title="Awami League"><span data-dcnode-id="2952" instrument_node="">Awami League</span></a><span data-dcnode-id="2950" instrument_node=""> in </span><a data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Pakistan" title="East Pakistan"><span data-dcnode-id="2949" instrument_node="">East Pakistan</span></a><span data-dcnode-id="2947" instrument_node="">, and to eliminate the </span><i data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">intelligentsia</span></i><span data-dcnode-id="2944" instrument_node="">, political class and </span><a data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hinduism_in_Bangladesh" title="Hinduism in Bangladesh"><span data-dcnode-id="2943" instrument_node="">Hindu minority of East Pakistan</span></a><span data-dcnode-id="2941" instrument_node="">.</span><sup class="reference" data-dcnode-id="2938" id="cite_ref-Blood_meridian_43-0"><a data-dcnode-id="2939" href="#cite_note-Blood_meridian-43"><span data-dcnode-id="2940" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2937" instrument_node="">  As General Yahya is a key conduit in the talks between the US and China, the Nixon administration does not protest Operation Searchlight as it fears this might offend General Yahya, as part of its marked "tilt" towards Pakistan.</span><sup class="reference" data-dcnode-id="2934" id="cite_ref-Blood_meridian_43-1"><a data-dcnode-id="2935" href="#cite_note-Blood_meridian-43"><span data-dcnode-id="2936" instrument_node="">[43]</span></a></sup></dd><span data-dcnode-id="2932" instrument_node="">
</span><dd data-dcnode-id="2917"><span data-dcnode-id="2931" instrument_node="">— April 6 The Blood telegram sent by </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Archer_Blood" title="Archer Blood"><span data-dcnode-id="2930" instrument_node="">Archer Blood</span></a><span data-dcnode-id="2928" instrument_node="">, the American consul in </span><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dhaka" title="Dhaka"><span data-dcnode-id="2927" instrument_node="">Dhaka</span></a><span data-dcnode-id="2925" instrument_node=""> and 20 other diplomats protesting the Nixon administration's silence about the Pakistani government's repression in East Pakistan and what the telegram argues is a campaign of genocide by the government against the Hindu minority in East Pakistan.</span><sup class="reference" data-dcnode-id="2922" id="cite_ref-Blood_meridian_43-2"><a data-dcnode-id="2923" href="#cite_note-Blood_meridian-43"><span data-dcnode-id="2924" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2921" instrument_node=""> The Blood telegram does not affect American policy towards Pakistan, and effectively cuts the career of Blood and the other diplomats.</span><sup class="reference" data-dcnode-id="2918" id="cite_ref-Blood_meridian_43-3"><a data-dcnode-id="2919" href="#cite_note-Blood_meridian-43"><span data-dcnode-id="2920" instrument_node="">[43]</span></a></sup></dd><span data-dcnode-id="2916" instrument_node="">
</span><dd data-dcnode-id="2904"><span data-dcnode-id="2915" instrument_node="">— April 14 </span><a data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ping-pong_diplomacy" title="Ping-pong diplomacy"><span data-dcnode-id="2914" instrument_node="">Ping-pong diplomacy</span></a><span data-dcnode-id="2912" instrument_node="">. The American table tennis team is allowed to visit China, causes a sensation.</span><sup class="reference" data-dcnode-id="2909" id="cite_ref-University_of_California_41-9"><a data-dcnode-id="2910" href="#cite_note-University_of_California-41"><span data-dcnode-id="2911" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2908" instrument_node=""> During a phone conversation, Kissinger says "It's a tragedy that it has to happen to Chiang at the end of his life but we have to be cold about it", to which Nixon replies "We have to do what's best for us".</span><sup class="reference" data-dcnode-id="2905" id="cite_ref-University_of_California_41-10"><a data-dcnode-id="2906" href="#cite_note-University_of_California-41"><span data-dcnode-id="2907" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="2903" instrument_node="">
</span><dd data-dcnode-id="2895"><span data-dcnode-id="2902" instrument_node="">— April 21 Pakistani President Yahya informs Nixon that he had spoken with </span><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhou_Enlai" title="Zhou Enlai"><span data-dcnode-id="2901" instrument_node="">Zhou Enlai</span></a><span data-dcnode-id="2899" instrument_node="">, and that the Chinese wished for a senior American envoy to make a secret visit to Beijing.</span><sup class="reference" data-dcnode-id="2896" id="cite_ref-University_of_California_41-11"><a data-dcnode-id="2897" href="#cite_note-University_of_California-41"><span data-dcnode-id="2898" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="2894" instrument_node="">
</span><dd data-dcnode-id="2889"><span data-dcnode-id="2893" instrument_node="">— April 27 About the Chinese offer of a secret American envoy to visit Beijing, Kissinger tells Nixon that "If we get this thing working, we will end Vietnam this year."</span><sup class="reference" data-dcnode-id="2890" id="cite_ref-University_of_California_41-12"><a data-dcnode-id="2891" href="#cite_note-University_of_California-41"><span data-dcnode-id="2892" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="2888" instrument_node="">
</span><dd data-dcnode-id="2870"><span data-dcnode-id="2887" instrument_node="">— July 9 Kissinger visits </span><a data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamabad" title="Islamabad"><span data-dcnode-id="2886" instrument_node="">Islamabad, Pakistan</span></a><span data-dcnode-id="2884" instrument_node="">, and from there goes on to a secret trip to Beijing to meet </span><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhou_Enlai" title="Zhou Enlai"><span data-dcnode-id="2883" instrument_node="">Zhou Enlai</span></a><span data-dcnode-id="2881" instrument_node=""> and </span><a data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong" title="Mao Zedong"><span data-dcnode-id="2880" instrument_node="">Mao Zedong</span></a><span data-dcnode-id="2878" instrument_node="">.</span><sup class="reference" data-dcnode-id="2875" id="cite_ref-University_of_California_41-13"><a data-dcnode-id="2876" href="#cite_note-University_of_California-41"><span data-dcnode-id="2877" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2874" instrument_node=""> During the secret summit in Beijing, it is agreed that President Nixon will visit China the next year.</span><sup class="reference" data-dcnode-id="2871" id="cite_ref-University_of_California_41-14"><a data-dcnode-id="2872" href="#cite_note-University_of_California-41"><span data-dcnode-id="2873" instrument_node="">[41]</span></a></sup></dd><span data-dcnode-id="2869" instrument_node="">
</span><dd data-dcnode-id="2864"><span data-dcnode-id="2868" instrument_node="">— December 3 </span><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indo-Pakistani_War_of_1971" title="Indo-Pakistani War of 1971"><span data-dcnode-id="2867" instrument_node="">Indo-Pakistani war</span></a><span data-dcnode-id="2865" instrument_node=""> begins. The US supports Pakistan while the Soviet Union supports India.</span></dd><span data-dcnode-id="2863" instrument_node="">
</span><dd data-dcnode-id="2855"><span data-dcnode-id="2862" instrument_node="">— December 11 Nixon orders </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Task_Force_74" title="Task Force 74"><span data-dcnode-id="2861" instrument_node="">Task Force 74</span></a><span data-dcnode-id="2859" instrument_node=""> to the </span><a data-dcnode-id="2857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bay_of_Bengal" title="Bay of Bengal"><span data-dcnode-id="2858" instrument_node="">Bay of Bengal</span></a><span data-dcnode-id="2856" instrument_node=""> in an attempt to intimidate India into accepting a ceasefire before the Indians defeat Pakistan.</span></dd><span data-dcnode-id="2854" instrument_node="">
</span><dd data-dcnode-id="2849"><span data-dcnode-id="2853" instrument_node="">— December 16 The war ends in Pakistan's defeat. Nixon fails in his efforts preserve Pakistan's unity, and East Pakistan secedes as the independent </span><a data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangladesh" title="Bangladesh"><span data-dcnode-id="2852" instrument_node="">People's Republic of Bangladesh</span></a><span data-dcnode-id="2850" instrument_node="">.</span></dd></dl><span data-dcnode-id="2847" instrument_node="">
</span><ul data-dcnode-id="2844"><li data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">1972 –</span></li></ul><span data-dcnode-id="2843" instrument_node="">
</span><dl data-dcnode-id="2789"><dd data-dcnode-id="2832"><span data-dcnode-id="2842" instrument_node="">— February 21 </span><a class="mw-redirect" data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1972_Nixon_visit_to_China" title="1972 Nixon visit to China"><span data-dcnode-id="2841" instrument_node="">Nixon visits China</span></a><span data-dcnode-id="2839" instrument_node="">, and at the end of the trip the United States and China issue the </span><a data-dcnode-id="2837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai_Communiqu%25C3%25A9" title="Shanghai Communiqué"><span data-dcnode-id="2838" instrument_node="">Shanghai Communiqué</span></a><span data-dcnode-id="2836" instrument_node=""> endorsing the </span><a class="mw-redirect" data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One-China_policy" title="One-China policy"><span data-dcnode-id="2835" instrument_node="">One-China policy</span></a><span data-dcnode-id="2833" instrument_node="">. Nixon in Beijing opens era of détente with China.</span></dd><span data-dcnode-id="2831" instrument_node="">
</span><dd data-dcnode-id="2826"><span data-dcnode-id="2830" instrument_node="">— May 9 Nixon orders </span><a data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Linebacker" title="Operation Linebacker"><span data-dcnode-id="2829" instrument_node="">Operation Linebacker</span></a><span data-dcnode-id="2827" instrument_node=""> with the aiming of destroying North Vietnam's logistical capacity.</span></dd><span data-dcnode-id="2825" instrument_node="">
</span><dd data-dcnode-id="2817"><span data-dcnode-id="2824" instrument_node="">— May 22 </span><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow_Summit_%281972%29" title="Moscow Summit (1972)"><span data-dcnode-id="2823" instrument_node="">Moscow summit</span></a><span data-dcnode-id="2821" instrument_node="">. Nixon in Moscow opens era of détente with Soviet Union; </span><a data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategic_Arms_Limitation_Talks" title="Strategic Arms Limitation Talks"><span data-dcnode-id="2820" instrument_node="">SALT I</span></a><span data-dcnode-id="2818" instrument_node="">.</span></dd><span data-dcnode-id="2816" instrument_node="">
</span><dd data-dcnode-id="2811"><span data-dcnode-id="2815" instrument_node="">— June 3 </span><a data-dcnode-id="2813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_Power_Agreement_on_Berlin" title="Four Power Agreement on Berlin"><span data-dcnode-id="2814" instrument_node="">Quadripartite Agreement</span></a><span data-dcnode-id="2812" instrument_node=""> governing the status of Berlin.</span></dd><span data-dcnode-id="2810" instrument_node="">
</span><dd data-dcnode-id="2805"><span data-dcnode-id="2809" instrument_node="">— October 8 Kissinger meets with the North Vietnamese negotiator </span><a class="mw-redirect" data-dcnode-id="2807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Duc_Tho" title="Le Duc Tho"><span data-dcnode-id="2808" instrument_node="">Le Duc Tho</span></a><span data-dcnode-id="2806" instrument_node=""> in Paris for peace talks to end the Vietnam War, and initially the talks go well.</span></dd><span data-dcnode-id="2804" instrument_node="">
</span><dd data-dcnode-id="2799"><span data-dcnode-id="2803" instrument_node="">— October 18 President </span><a class="mw-redirect" data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nguyen_Van_Thieu" title="Nguyen Van Thieu"><span data-dcnode-id="2802" instrument_node="">Nguyen Van Thieu</span></a><span data-dcnode-id="2800" instrument_node=""> of South Vietnam rejects the proposed Paris peace agreement, complaining that Kissinger had not consulted him.</span></dd><span data-dcnode-id="2798" instrument_node="">
</span><dd data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">— December 17 Paris peace talks break down.</span></dd><span data-dcnode-id="2795" instrument_node="">
</span><dd data-dcnode-id="2790"><span data-dcnode-id="2794" instrument_node="">— December 18 Nixon orders </span><a data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Linebacker_II" title="Operation Linebacker II"><span data-dcnode-id="2793" instrument_node="">"Christmas Bombings"</span></a><span data-dcnode-id="2791" instrument_node=""> against North Vietnam following the breakdown in the Paris peace talks.</span></dd></dl><span data-dcnode-id="2788" instrument_node="">
</span><ul data-dcnode-id="2785"><li data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">1973 –</span></li></ul><span data-dcnode-id="2784" instrument_node="">
</span><dl data-dcnode-id="2748"><dd data-dcnode-id="2776"><span data-dcnode-id="2783" instrument_node="">— 27 January </span><a data-dcnode-id="2781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Peace_Accords" title="Paris Peace Accords"><span data-dcnode-id="2782" instrument_node="">Paris Peace Accords</span></a><span data-dcnode-id="2780" instrument_node=""> ends the American </span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="2779" instrument_node="">war</span></a><span data-dcnode-id="2777" instrument_node=""> in Vietnam; POW's returned in March.</span></dd><span data-dcnode-id="2775" instrument_node="">
</span><dd data-dcnode-id="2770"><span data-dcnode-id="2774" instrument_node="">— October 6 </span><a data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yom_Kippur_War" title="Yom Kippur War"><span data-dcnode-id="2773" instrument_node="">October War</span></a><span data-dcnode-id="2771" instrument_node=""> begins with a surprise attack on Israel by Egypt and Syria. The US supports Israel while the Soviet Union supports Egypt and Syria.</span></dd><span data-dcnode-id="2769" instrument_node="">
</span><dd data-dcnode-id="2764"><span data-dcnode-id="2768" instrument_node="">— October 12 Nixon orders </span><a data-dcnode-id="2766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Nickel_Grass" title="Operation Nickel Grass"><span data-dcnode-id="2767" instrument_node="">Operation Nickel Grass</span></a><span data-dcnode-id="2765" instrument_node="">, a major American effort to supply Israel with weapons to make good the IDF's heavy initial losses.</span></dd><span data-dcnode-id="2763" instrument_node="">
</span><dd data-dcnode-id="2755"><span data-dcnode-id="2762" instrument_node="">— October 20 </span><a data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1973_oil_crisis" title="1973 oil crisis"><span data-dcnode-id="2761" instrument_node="">Arab oil embargo</span></a><span data-dcnode-id="2759" instrument_node=""> led by King </span><a data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Faisal_of_Saudi_Arabia" title="Faisal of Saudi Arabia"><span data-dcnode-id="2758" instrument_node="">Faisal of Saudi Arabia</span></a><span data-dcnode-id="2756" instrument_node=""> against the US and other Western nations begins as punishment for support of Israel. The oil embargo sparks major inflation in the United States.</span></dd><span data-dcnode-id="2754" instrument_node="">
</span><dd data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">— October 24 The Soviet Union announces that it will send troops to Egypt, which in turn leads Kissinger to warn that the United States will send troops to fight the Soviet forces deployed to Egypt. Nixon places the United States military on DEFCON 3, one of the highest states of alert. The Soviets back down.</span></dd><span data-dcnode-id="2751" instrument_node="">
</span><dd data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">— October 25 A ceasefire brokered by the US and the Soviet Union ends the October War.</span></dd></dl><span data-dcnode-id="2747" instrument_node="">

</span></p><span data-dcnode-id="2744" instrument_node="">
</span><dl data-dcnode-id="2723"><dd data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">— January 18 Under an American disengagement plan negotiated by Kissinger, Israeli forces pull back from the Suez Canal.</span></dd><span data-dcnode-id="2741" instrument_node="">
</span><dd data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">— March 17 Arab oil embargo against the West ends.</span></dd><span data-dcnode-id="2738" instrument_node="">
