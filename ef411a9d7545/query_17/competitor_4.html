duction/_116571432_trump-rushmore-cps.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/5B79/production/_116571432_trump-rushmore-cps.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1128"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1129"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1130"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">At noon on Wednesday, President Donald Trump's term will end. It's been a whirlwind four years, so what might the legacy be of such a history-making president?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1124"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1125"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">There's a lot to consider, so we asked the experts to break it down for us.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1119"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1120"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1121"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Responses have been edited for length and clarity.</span></i></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="1111"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="1112"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="1113"><span class="ssrcss-1lzg1d-Placeholder e16icw910" data-dcnode-id="1114"><span data-dcnode-id="1115"><img alt="Short presentational grey line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="1118" height="57.614403600900225" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" width="1536"><noscript data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">&lt;img alt="Short presentational grey line" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" src="https://ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg" width="1536" height="57.614403600900225" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="1107"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="1108" id="His-relationship-with-altright" tabindex="-1"><span data-dcnode-id="1109" role="text"><span data-dcnode-id="1110" instrument_node="">'His relationship with alt-right'</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1102"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1103"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1104"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Matthew Continetti is a fellow at the American Enterprise Institute, focusing on the development of the Republican Party and the American conservative movement.</span></i></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1097"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1098"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1099"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">What's Trump's key legacy?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1093"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1094"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Donald Trump will be remembered as the first president to be impeached twice. He fed the myth that the election was stolen, summoned his supporters to Washington to protest the certification of the Electoral College vote, told them that only through strength could they take back their country, and stood by as they stormed the US Capitol and interfered in the operation of constitutional government. </span></p></div></div><div data-dcnode-id="1092" id="piano-inline1"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1088"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1089"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">When historians write about his presidency, they will do so through the lens of the riot. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1084"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1085"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">They will focus on Trump's tortured relationship with the alt-right, his atrocious handling of the deadly Charlottesville protest in 2017, the rise in violent right-wing extremism during his tenure in office, and the viral spread of malevolent conspiracy theories that he encouraged. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="unordered-list-block" data-dcnode-id="1074"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1075"><div class="ssrcss-1o5f7ft-BulletListContainer e5tfeyi0" data-dcnode-id="1076"><ul data-dcnode-id="1077" role="list"><li data-dcnode-id="1081"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/magazine-37021991"><span data-dcnode-id="1083" instrument_node="">Trump’s shock troops: Who are the ‘alt-right’?</span></a></li><li data-dcnode-id="1078"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/av/world-us-canada-55664406"><span data-dcnode-id="1080" instrument_node="">'US far-right is furious at impeachment'</span></a></li></ul></div></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1069"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1070"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1071"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">What else stands out to you?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1065"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1066"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">If Donald Trump had followed the example of his predecessors and conceded power graciously and peacefully, he would have been remembered as a disruptive but consequential populist leader.</span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="1053"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="1054"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="1055"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="1060"><span data-dcnode-id="1061"><img alt="Trump addresses supporters on the South Lawn" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="1064" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 976w" width="976"><noscript data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">&lt;img alt="Trump addresses supporters on the South Lawn" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/0077/production/_116491100_gettyimages-1228998163.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="1056" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Image source, </span></span><span data-dcnode-id="1057" instrument_node="">Getty Images</span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1049"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1050"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">A president who, before the pandemic, presided over an economic boom, re-oriented America's opinion of China, removed terrorist leaders from the battlefield, revamped the space program, secured an originalist (conservative) majority on the US Supreme Court, and authorised Operation Warp Speed to produce a Covid-19 vaccine in record time. </span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="1041"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="1042"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="1043"><span class="ssrcss-1lzg1d-Placeholder e16icw910" data-dcnode-id="1044"><span data-dcnode-id="1045"><img alt="Short presentational grey line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="1048" height="57.614403600900225" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" width="1536"><noscript data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">&lt;img alt="Short presentational grey line" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" src="https://ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg" width="1536" height="57.614403600900225" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="1037"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="1038" id="A-surrender-of-global-leadership" tabindex="-1"><span data-dcnode-id="1039" role="text"><span data-dcnode-id="1040" instrument_node="">'A surrender of global leadership'</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1032"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1033"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1034"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Laura Belmonte is a history professor and dean of the Virginia Tech College of Liberal Arts and Human Sciences. She is a foreign relations specialist and author of books on cultural diplomacy.</span></i></p></div></div><div data-dcnode-id="1031" id="piano-inline2"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1026"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1027"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1028"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">What's Trump's key legacy?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1022"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1023"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">His attempt to surrender global leadership and replace it with a more inward-looking, fortress-like mentality. I don't think it succeeded, but the question is how profound has the damage to America's international reputation been - and that remains to be seen.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1018"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1019"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">The moment I found jaw-dropping was the press conference he had with Vladimir Putin in 2018 in Helsinki, where he took Putin's side over US intelligence in regard to Russian interference in the election.  </span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="1006"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="1007"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="1008"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="1013"><span data-dcnode-id="1014"><img alt="Donald Trump and Vladimir Putin" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="1017" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 976w" width="976"><noscript data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">&lt;img alt="Donald Trump and Vladimir Putin" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/182CB/production/_116491099_gettyimages-1000192826.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="1009" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Image source, </span></span><span data-dcnode-id="1010" instrument_node="">Getty Images</span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1002"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1003"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">I can't think of another episode of a president siding full force with a non-democratic society adversary. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="998"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="999"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">It's also very emblematic of a larger assault on any number of multilateral institutions and treaties and frameworks that Trump has unleashed, like the withdrawal from the Paris climate accord, the withdrawal of the Iranian nuclear framework. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="993"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="994"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="995"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">What else stands out to you?</span></b></p></div></div><div data-dcnode-id="992" id="piano-inline3"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="988"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="989"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Trump's applauding Turkish President Recep Tayyip Erdogan and Brazilian President Jair Bolsonaro and meeting with North Korea's Kim Jong Un, really turning himself inside out to align the US with regimes that are the antithesis of values that the US says it wants to promote. That is something that I think was really quite distinctive.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="984"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="985"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Another aspect is extricating the US from any really assertive role in promoting human rights throughout the world, and changing the content of the annual human rights reports from the State Department and not including many topics, like LGBT equality, for instance.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="unordered-list-block" data-dcnode-id="977"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="978"><div class="ssrcss-1o5f7ft-BulletListContainer e5tfeyi0" data-dcnode-id="979"><ul data-dcnode-id="980" role="list"><li data-dcnode-id="981"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-us-canada-55708411"><span data-dcnode-id="983" instrument_node="">Melania’s jacket and nine other defining images</span></a></li></ul></div></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="969"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="970"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="971"><span class="ssrcss-1lzg1d-Placeholder e16icw910" data-dcnode-id="972"><span data-dcnode-id="973"><img alt="Short presentational grey line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="976" height="57.614403600900225" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" width="1536"><noscript data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">&lt;img alt="Short presentational grey line" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" src="https://ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg" width="1536" height="57.614403600900225" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="965"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="966" id="Putting-democracy-to-the-test" tabindex="-1"><span data-dcnode-id="967" role="text"><span data-dcnode-id="968" instrument_node="">'Putting democracy to the test'</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="960"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="961"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="962"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Kathryn Brownell is a history professor at Purdue University, focusing on the relationships between media, politics, and popular culture, with an emphasis on the American presidency.</span></i></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="955"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="956"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="957"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">What's Trump's key legacy?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="951"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="952"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Broadly speaking: Donald Trump, and his enablers in the Republican Party and conservative media, have put American democracy to the test in an unprecedented way. As a historian who studies the intersection of media and the presidency, it is truly striking the ways in which he has convinced millions of people that his fabricated version of events is true. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="unordered-list-block" data-dcnode-id="944"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="945"><div class="ssrcss-1o5f7ft-BulletListContainer e5tfeyi0" data-dcnode-id="946"><ul data-dcnode-id="947" role="list"><li data-dcnode-id="948"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-us-canada-55656836"><span data-dcnode-id="950" instrument_node="">'Three quarters of Trump voters believe he won'</span></a></li></ul></div></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="940"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="941"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">What happened on 6 January at the US Capitol is a culmination of over four years during which President Trump actively advanced misinformation. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="936"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="937"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Just as Watergate and the impeachment inquiry dominated historical interpretations of Richard Nixon's legacy for decades, I do think that this particular post-election moment will be at the forefront of historical assessments of his presidency.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="931"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="932"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="933"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">What else stands out to you?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="927"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="928"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Kellyanne Conway's first introduction of the notion of "alternative facts" just days into the Trump administration when disputing the size of the inaugural crowds between Trump and Barack Obama. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="923"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="924"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Presidents across the 20th Century have increasingly used sophisticated measures to spin interpretation of policies and events in favourable ways and to control the media narrative of their administrations. But the assertion that the administration had a right to its own alternative facts went far beyond spin, ultimately foreshadowing the ways in which the Trump administration would govern by misinformation. </span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="911"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="912"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="913"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="918"><span data-dcnode-id="919"><img alt="Donald Trump" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="922" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 976w" width="976"><noscript data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">&lt;img alt="Donald Trump" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/2787/production/_116491101_gettyimages-1229221468.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="914" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Image source, </span></span><span data-dcnode-id="915" instrument_node="">Getty Images</span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="907"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="908"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Trump harnessed the power of social media and blurred the lines between entertainment and politics in ways that allowed him to bypass critics and connect directly to his supporters in an unfiltered way. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="903"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="904"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Franklin Roosevelt, John F Kennedy, and Ronald Reagan also used new media and a celebrity style to connect directly to the people in this unfiltered way, ultimately transforming expectations and operations of the presidency that paved the path for Trump.</span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="895"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="896"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="897"><span class="ssrcss-1lzg1d-Placeholder e16icw910" data-dcnode-id="898"><span data-dcnode-id="899"><img alt="Short presentational grey line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="902" height="57.614403600900225" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" width="1536"><noscript data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">&lt;img alt="Short presentational grey line" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" src="https://ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg" width="1536" height="57.614403600900225" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="891"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="892" id="Reshaping-the-judiciary" tabindex="-1"><span data-dcnode-id="893" role="text"><span data-dcnode-id="894" instrument_node="">'Reshaping the judiciary'</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="886"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="887"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="888"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Mary Frances Berry is a professor of American history and social thought at the University of Pennsylvania, focusing on legal history and social policy. From 1980 to 2004, she was a member of the US Commission on Civil Rights.</span></i></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="881"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="882"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="883"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">What's Trump's key legacy?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="877"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="878"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">In what he did with judges, Trump has made a long lasting change over the next 20 years, 30 years in how policies will stand up to legal tests and how they're able to be implemented - no matter what any particular president or administration proposes. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="873"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="874"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">The courts are controlled by the Republican appointees. Sometimes judges surprise us, but for the most part, the historical evidence is that they pretty much do what their politics and their backgrounds say they will do.</span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="856"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="857"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="863"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="868"><span data-dcnode-id="869"><img alt="Trump applauds newly sworn in Supreme Court Justice pick Amy Coney Barrett" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="872" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 976w" width="976"><noscript data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">&lt;img alt="Trump applauds newly sworn in Supreme Court Justice pick Amy Coney Barrett" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/4E97/production/_116491102_gettyimages-1282407390.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="864" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Image source, </span></span><span data-dcnode-id="865" instrument_node="">Getty Images</span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="858"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="859" spacing="6"><span data-dcnode-id="860" instrument_node="">Trump applauds his newly sworn in Supreme Court Justice Amy Coney Barrett</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="851"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="852"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="853"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">What else stands out to you?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="844"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="845"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="846"><span data-dcnode-id="850" instrument_node="">When he supported that package of measures that helped particular people in the black community, </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-us-canada-46613564"><span data-dcnode-id="849" instrument_node="">like First Step</span></a><span data-dcnode-id="847" instrument_node="">, pardoning people at the same time that he supported an amendment in the appropriations bill that gave a whole bunch of money to historically black colleges and universities for the first time. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="840"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="841"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">He put all of these things together, as well as having the first stimulus programme making sure that black businessman and entrepreneurs get some of those loans they've had trouble getting before.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="836"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="837"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">The effect of all of that, which we will see over time, was in the midterms, a lot more young black men voted for Trump than before. And if that's a trend, it may help the Republican party.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="unordered-list-block" data-dcnode-id="829"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="830"><div class="ssrcss-1o5f7ft-BulletListContainer e5tfeyi0" data-dcnode-id="831"><ul data-dcnode-id="832" role="list"><li data-dcnode-id="833"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-us-canada-54972389"><span data-dcnode-id="835" instrument_node="">Minority voters who changed their minds about Trump</span></a></li></ul></div></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="825"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="826"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Trump also made egregious comments about black people and other people of colour, tried to have protests against police abuse disrupted and in other ways appealed to his white supremacist base.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="821"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="822"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">His lasting impact on race relations depends on what the Biden administration does on policy, and on healing and how long the pandemic and economic downturn lasts.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="unordered-list-block" data-dcnode-id="811"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="812"><div class="ssrcss-1o5f7ft-BulletListContainer e5tfeyi0" data-dcnode-id="813"><ul data-dcnode-id="814" role="list"><li data-dcnode-id="818"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-us-canada-52245690"><span data-dcnode-id="820" instrument_node="">Why are African Americans hit so hard by virus?</span></a></li><li data-dcnode-id="815"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-us-canada-48993211"><span data-dcnode-id="817" instrument_node="">Trump racism row: BBC audiences on being told to 'go home'</span></a></li></ul></div></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="803"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="804"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="805"><span class="ssrcss-1lzg1d-Placeholder e16icw910" data-dcnode-id="806"><span data-dcnode-id="807"><img alt="Short presentational grey line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="810" height="57.614403600900225" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" width="1536"><noscript data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">&lt;img alt="Short presentational grey line" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" src="https://ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg" width="1536" height="57.614403600900225" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="799"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="800" id="Contesting-the-2020-election" tabindex="-1"><span data-dcnode-id="801" role="text"><span data-dcnode-id="802" instrument_node="">'Contesting the 2020 election'</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="794"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="795"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="796"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Margaret O'Mara is history professor at the University of Washington, focusing on the political, economic, and metropolitan history of the modern US.</span></i></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="789"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="790"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="791"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">What's Trump's key legacy?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="785"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="786"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Contesting a very constitutionally and numerically clear election victory by Joe Biden. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="781"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="782"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">We've had plenty of really unpleasant transitions. Herbert Hoover was incredibly unpleasant about his loss, but he still rode in that car down Pennsylvania Avenue at inauguration. He didn't talk to Franklin Roosevelt the whole time, but there still was a peaceful transfer of power.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="777"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="778"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Trump is a manifestation of political forces that have been in motion for a half century or more. A culmination of what was not only going on in the Republican party, but also the Democratic party and more broadly in American politics - a kind of disillusionment with government and institutions and expertise.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="772"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="773"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="774"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">What else stands out to you?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="768"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="769"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Trump is exceptional in many ways, but one of the things that really makes him stand out is that he is one of the rare presidents who was elected without having held any elected office before.</span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="756"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="757"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="758"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="763"><span data-dcnode-id="764"><img alt="Trump and his cabinet in 2017" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="767" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 976w" width="976"><noscript data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">&lt;img alt="Trump and his cabinet in 2017" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/F68F/production/_116491136_gettyimages-861982866.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="759" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Image source, </span></span><span data-dcnode-id="760" instrument_node="">Getty Images</span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="752"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="753"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Trump may go away, but there is this great frustration with the establishment, broadly defined. When you feel powerless, you vote for someone who's promising to do everything differently and Trump indeed did that. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="748"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="749"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">A presidency is also made by the people that the president appoints, and a great deal of experienced Republican hands were not invited to join the administration the first go round. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="744"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="745"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Over time, his administration has diminished to a band of loyalists who are really not very experienced and are ideologically uninterested in wise governance of the bureaucracy. What has happened within the bowels of the bureaucracy is going to be a slow slog to rebuild. </span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="736"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="737"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="738"><span class="ssrcss-1lzg1d-Placeholder e16icw910" data-dcnode-id="739"><span data-dcnode-id="740"><img alt="Short presentational grey line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="743" height="57.614403600900225" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" width="1536"><noscript data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">&lt;img alt="Short presentational grey line" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg 976w" src="https://ichef.bbci.co.uk/news/1536/cpsprodpb/FB9C/production/_90021446_grey_line_new.jpg" width="1536" height="57.614403600900225" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="732"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="733" id="Standing-up-to-China" tabindex="-1"><span data-dcnode-id="734" role="text"><span data-dcnode-id="735" instrument_node="">'Standing up to China'</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="727"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="728"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="729"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Saikrishna Prakash is a University of Virginia Law School professor focusing on constitutional law, foreign relations law and presidential powers.</span></i></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="722"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="723"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="724"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">What's Trump's key legacy?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="718"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="719"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">The last gasps of his administration are the most consequential, as he exerts a control over his most devoted followers and he's talking about running again.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="714"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="715"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">He forced people to consider what the presidency has become in a way that wasn't true I think either during the Bush or Obama administrations. Issues like the 25th Amendment and impeachment hasn't been thought of since Bill Clinton, really.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="710"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="711"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">It's possible that people now when they think of the presidency are perhaps going to adopt a different stance going forward, knowing that someone like Trump could come along.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="706"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="707"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">It's possible that Congress will delegate less to the president and take away some authority. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="701"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="702"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="703"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">What else stands out to you?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="697"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="698"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">The president has demonstrated that there's a constituency who's opposed to a lot of these trade deals and that there are people willing to vote for those who will either extricate us from these trade deals or "make them fairer". </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="693"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="694"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">The president has also suggested that China has been taking advantage of the United States in ways that are deleterious to our economic and national security - and I think there's a consensus behind this view. No one wants to be accused of being soft on China, whereas no one cares if you're "soft" on Canada, right? </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="689"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="690"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">I think people are going to fall all over themselves to be tougher or at least say they're tougher on China.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="685"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="686"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Domestically the president had a populous tone to him. It wasn't ever fully realised in his policies, but we see more Republicans adopting populist ideas.</span></p></div></div><div class="ssrcss-5i1hhv-LinksComponentWrapper e1xue1i83" data-component="links-block" data-dcnode-id="591"><section class="ssrcss-msolhr-LinksWrapper e3eyuya4" data-dcnode-id="592"><div class="ssrcss-1lqqmgw-LinksHeadingWrapper e3eyuya3" data-dcnode-id="682"><h2 class="ssrcss-axlwsg-StyledHeading e1fj1fc10" data-dcnode-id="683"><span data-dc
