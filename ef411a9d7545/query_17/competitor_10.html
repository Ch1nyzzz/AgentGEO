 Chinese nationalism focuses on public attitudes and foreign policy making (Weiss </span><a aria-label="Reference 2014" data-dcnode-id="1715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d122429764e889" title="Weiss, Jessica Chen. 2014. Powerful Patriots: Nationalist Protest in China’s Foreign Relations. Oxford: Oxford University Press."><span data-dcnode-id="1716" instrument_node="">2014</span></a><span data-dcnode-id="1714" instrument_node="">; Sinkkonen </span><a aria-label="Reference 2013" data-dcnode-id="1712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d122429764e892" title="Sinkkonen, Elina. 2013. Nationalism, Patriotism, and Foreign Policy Attitudes among Chinese University Students. The China Quarterly 216: 1045–1063."><span data-dcnode-id="1713" instrument_node="">2013</span></a><span data-dcnode-id="1711" instrument_node="">). For Chinese leaders, the politics of nationalism are more complicated and have both domestic and foreign targets. President Xi Jinping envisions China and the global community as sharing a common destiny and expects China to play a positive and active leadership role in global governance. In Xi’s vision of the Chinese dream, China will exercise responsibility in producing more public goods, including harmonious interactions between humans and nature (Bhattacharya </span><a aria-label="Reference 2019" data-dcnode-id="1709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d122429764e895" title="Bhattacharya, Abanti. 2019. Chinese Nationalism Under Xi Jinping Revisited. India Quarterly: A Journal of International Affairs 75(2): 245–252."><span data-dcnode-id="1710" instrument_node="">2019</span></a><span data-dcnode-id="1708" instrument_node="">). Thus, Xi is under pressure to end the trade war and reassert China’s growing leadership role in international relations.</span></p><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">This vision of China’s role in global governance, along with China’s visible benefits from participation in the global economic system, most notably with the USA, are key factors balancing against the bitter feelings Chinese harbor toward the Trump administration for disrespectful treatment during the course of trade negotiations. China and the USA have different political and ideological belief systems. China is an outsider to the global security network, which features a US-led alliance network. These differences will be difficult to eliminate in the short term, and for this reason trade relations increasingly appear risky. When these factors become dormant, trade issues will be easier to resolve. Of course, increasing global economic benefits would ease trade hostilities, but the slowdown in global growth due to the COVID-19 pandemic limits the ability of both China and the USA to soften in their trade positions. A number of uncertainties remain for both countries regarding the role nationalism plays in trade relationships. In the USA, domestic politics are polarized, and there are problems in economic recovery. In China, there are concerns in the process of domestic political development as to whether the Open Door and economic reform policies should continue. Too, there is the question of China’s identity as a responsible global actor. Thus, China counteracts US aggression in the trade war, not only to protect its economic interests but also to assert power to international audiences.</span></p></div></div></section><section data-dcnode-id="1667" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1668" id="Sec13-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1700" id="Sec13"><span data-dcnode-id="1701" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1669" id="Sec13-content"><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Although the Trump administration initiated the trade war, China has retaliated with tit-for-tat measures and exerted a great deal of power to protect its economic and political interests and its burgeoning leadership role in global affairs. Both sides’ participation in the conflict rests on several nationalist factors. In the USA, President Trump has pushed to wean the country off foreign sources of oil and other natural resources and has promised to bring manufacturing jobs back to the Rust Belt and other areas. Both of these agenda items have led to economic nationalist and protectionist steps and to the weakening of the US–China trade relationship. In this context, Trump and other high-level administrators have used xenophobic rhetoric in an attempt to blame China for US economic ills. The rhetoric ramped up at the onset of the COVID-19 pandemic (and in the year of a presidential election campaign). For the Trump administration, the pandemic was an opportunity to further blame China for domestic economic problems long in the making. Initially surprised at the high tariffs imposed on its goods, China has stood up to US pressure, in part owing to its identity of being historically marginalized and its desire to continue to grow economically and politically on the world stage.</span></p><p data-dcnode-id="1672"><span data-dcnode-id="1697" instrument_node="">What have been the effects of the US–China trade conflict? It has led to higher consumer prices, lower corporate profits, unstable markets, and slower economic growth (Norland </span><a aria-label="Reference 2020" data-dcnode-id="1695" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d122429764e914" title="Norland, Erik. Trade War Costs to Consumers, Companies and Nations. Financial Times, June 20, 2020."><span data-dcnode-id="1696" instrument_node="">2020</span></a><span data-dcnode-id="1694" instrument_node="">; Ungarino </span><a aria-label="Reference 2019" data-dcnode-id="1692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d122429764e917" title="Ungarino, Rebecca. As Trump’s Trade War Escalates to ‘New Heights. Business Insider, August 24, 2019."><span data-dcnode-id="1693" instrument_node="">2019</span></a><span data-dcnode-id="1691" instrument_node="">; Lawder </span><a aria-label="Reference 2020" data-dcnode-id="1689" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d122429764e920" title="Lawder, David. Drag from Trump’s Trade Wars Continues to Ripple through U.S. Economy. Reuters, January 14, 2020."><span data-dcnode-id="1690" instrument_node="">2020</span></a><span data-dcnode-id="1688" instrument_node="">). One analysis shows how President Trump’s tweets related to the trade conflict have adversely affected the stock market (Burggraf et al. </span><a aria-label="Reference 2019" data-dcnode-id="1686" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d122429764e923" title="Burggraf, Tobias, Ralf Fendel, and Toan Luu Duc Huyn. 2019. Political News and Stock Prices. Applied Economics Letters 27(18): 1485–1488."><span data-dcnode-id="1687" instrument_node="">2019</span></a><span data-dcnode-id="1685" instrument_node="">). Account deficits and manufacturing decline in the USA are the result of low savings, high labor costs, and rising service sectors rather than imports from China (Sheng et al. </span><a aria-label="Reference 2019" data-dcnode-id="1683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d122429764e926" title="Sheng, Liugang, Hongyan Zhao, and Jing Zhao. 2019. Why Will Trump Lose the Trade War? China Economic Journal 12(2): 137–159."><span data-dcnode-id="1684" instrument_node="">2019</span></a><span data-dcnode-id="1682" instrument_node="">). Of greater alarm, the trade war has exacerbated account deficits and eroded the USA’s comparative advantage in the technological sector and human capital by pressuring China to invest in high technology industries (Sheng et al. </span><a aria-label="Reference 2019" data-dcnode-id="1680" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d122429764e930" title="Sheng, Liugang, Hongyan Zhao, and Jing Zhao. 2019. Why Will Trump Lose the Trade War? China Economic Journal 12(2): 137–159."><span data-dcnode-id="1681" instrument_node="">2019</span></a><span data-dcnode-id="1679" instrument_node="">). Moreover, deficit reductions have not promoted economic growth (Moosa </span><a aria-label="Reference 2020" data-dcnode-id="1677" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d122429764e933" title="Moosa, Imad A. 2020. The Thucydides Trap as an Alternative Explanation for the US–China Trade War. Global Journal of Emerging Market Economies."><span data-dcnode-id="1678" instrument_node="">2020</span></a><span data-dcnode-id="1676" instrument_node="">), and the trade deficit reduction with China will likely lead to deficits with other countries (Lai </span><a aria-label="Reference 2019" data-dcnode-id="1674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d122429764e936" title="Lai, Edwin L.-C. 2019. The US–China Trade War, the American Public Opinions, and Its Effects on China. Economic and Political Studies 7(2): 169–184."><span data-dcnode-id="1675" instrument_node="">2019</span></a><span data-dcnode-id="1673" instrument_node="">). It appears that the USA will not reduce its trade deficit with China, and even if it could do so, the USA will not achieve strong economic progress but instead develop deficits with other countries.</span></p><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">The Trump administration, as long as it is in power, will likely not let up in its pressure toward China. Its othering of China continues to be relevant as long as the USA continues to maintain unsatisfactory wages and societal interruptions owing to the pandemic. Although the USA has legitimate reasons for pressuring China, the country is also a convenient target for domestic grievances. Although China would prefer to return to the status quo, it will resist and counterattack US actions to both prevent economic decline and showcase power to domestic and foreign audiences.</span></p></div></div></section><span data-dcnode-id="1666" instrument_node="">
