</span><p data-dcnode-id="2600"><span data-contrast="none" data-dcnode-id="2603"><span data-dcnode-id="2610" instrument_node="">It has been seven months since 20 January 2021, when </span><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/insights/the-biden-presidency-what-how" rel="noopener" target="_blank"><span data-dcnode-id="2609" instrument_node="">President Joe Biden was sworn in</span></a><span data-dcnode-id="2607" instrument_node=""> while former president </span><a data-dcnode-id="2605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/us/how-trump-lost-his-war-on-fdi"><span data-dcnode-id="2606" instrument_node="">Donald Trump stomped back to Florida</span></a><span data-dcnode-id="2604" instrument_node="">, adamantly protesting his defeat in the November election. The media circus and concerning protests may have diminished since January 2021, but the scrutiny over the US’s ongoing polarised politics continues. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2586"><span data-contrast="auto" data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">S</span></span><span data-contrast="none" data-dcnode-id="2589"><span data-dcnode-id="2596" instrument_node="">o, what can be gleaned from Biden’s first seven months in the White House and how does it stack up against Trump’s reign? </span><em data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Investment Monitor</span></em><span data-dcnode-id="2593" instrument_node=""> spoke with political and economic experts to investigate </span><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investmentmonitor.ai/analysis/biden-trump-international-relations-trade"><span data-dcnode-id="2592" instrument_node="">Biden’s impact so far and whether a Trumpless country really is better off</span></a><span data-dcnode-id="2590" instrument_node="">.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2585" instrument_node="">
</span><h2 aria-level="2" data-dcnode-id="2580"><span data-contrast="none" data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">How Biden inherited a pandemic </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:40,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">and a country divided</span></span></h2><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2574"><span data-contrast="none" data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Throughout 2020 and 2021, the Covid-19 pandemic has dominated the global economy, and Biden’s presidency has had to contend with this. Even before the electoral vote in November 2020, it was clear that Covid-19 was shining an unforgiving spotlight on Trump, and his perceived inability to handle the pandemic in an effective manner proved crucial to his chances of re-election.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">&nbsp;</span></span></p><div class="c-related-articles" data-dcnode-id="2503" data-position="4" id="relatedArticles"><span data-dcnode-id="2573" instrument_node="">

</span><p data-dcnode-id="2170"><span data-contrast="none" data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">As of 10 August 2021, the US Covid death count has risen to approximately 614,000, according to the Centers for Disease Control and Prevention Covid Data Tracker. On Biden’s inauguration day, the US Covid death count was approximately 437,500. The downward trend in Covid deaths began on 13 January, and then the rate of death continued to considerably slow after Biden took office.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2166"><span data-contrast="none" data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Of course, number tracking aside, Covid-19 also presented numerous economic challenges. Dr Alexis Crow, head of geopolitical risk at PwC, explains that Biden prioritised people over economy in his initial handling of Covid-19.</span></span></p><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">&nbsp;</span></p><div data-dcnode-id="2162" id="slot-two"></div><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2156"><span data-contrast="none" data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">“Having assumed the presidency in the middle of a spike in Covid-19 cases across the US, Biden designated relief as a clear priority, prior to implementing measures for economic recovery," she says. "Also consistent with his campaign trail promises, Biden has pursued an inclusive economic policy, to help households whose livelihoods have been exacerbated by the Covid-19 crisis.”</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2147"><span data-contrast="none" data-dcnode-id="2150"><span data-dcnode-id="2154" instrument_node="">Upon entering the White House in January, Biden was quick to report to the media that </span><a data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/business-activities/manufacturing/covid-vaccine-regions-left-behind"><span data-dcnode-id="2153" instrument_node="">vaccine distribution</span></a><span data-dcnode-id="2151" instrument_node=""> was in "worse shape than we anticipated". Furthermore, a number of high-level White House officials such as Chief of Staff Ron Klain and adviser Cedric Richmond reported that Biden’s White House had been given no plan or blueprint to follow by Trump’s administration.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2146" instrument_node="">
</span><h2 data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Biden targets reversing Trump policies</span></h2><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2138"><span data-contrast="none" data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">If Covid-19 was to be a baptism by fire, Biden came into office with alacrity. On his first and second day as president, Biden had put forward one proclamation, three memos, stopped the US’s withdrawal from the World Health Organisation (WHO) and had actioned ten executive orders around Covid-19. Two of these were direct reversals of Trump’s policy.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2137" instrument_node="">

ent_node="">:</span></span><span data-dcnode-id="1890" instrument_node=""> </span><span class="source" data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">The White House, Federal Register</span></span><span data-dcnode-id="1887" instrument_node=""></span><span data-dcnode-id="1886" instrument_node=""></span></span><span data-dcnode-id="1884" instrument_node=""> </span></span><span data-dcnode-id="1882" instrument_node=""> </span></div><div class="footer-center" data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node=""> </span></div><div class="footer-right" data-dcnode-id="1868"><span data-dcnode-id="1878" instrument_node=""> </span><span class="footer-block logo-block" data-dcnode-id="1870"><span data-dcnode-id="1877" instrument_node=""> </span><span class="block-inner" data-dcnode-id="1872"><img data-dcnode-id="1876" height="10" src="https://static.dwcdn.net/custom/themes/new-statesman-investment-monitor/InvestmentMonitor_logo.png"/><span data-dcnode-id="1875" instrument_node=""> </span><span data-dcnode-id="1874" instrument_node=""></span><span data-dcnode-id="1873" instrument_node=""></span></span><span data-dcnode-id="1871" instrument_node=""> </span></span><span data-dcnode-id="1869" instrument_node=""> </span></div></div><span data-dcnode-id="1866" instrument_node=""> </span><span data-dcnode-id="1865" instrument_node=""></span><span data-dcnode-id="1864" instrument_node=""> </span><div class="dw-after-body" data-dcnode-id="1863"></div><span data-dcnode-id="1862" instrument_node=""> </span><span data-dcnode-id="1859" instrument_node="">
</span><span data-dcnode-id="1858" instrument_node=""></span></div><img alt="" aria-hidden="true" data-dcnode-id="1853" height="1" src="https://stats.datawrapper.de/xMO8v/datawrapper.gif?r=https%3A//www.investmentmonitor.ai/" style="position: absolute; top: 0px;" width="1"/></body></html></iframe></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1834"><span data-contrast="none" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">In fact, Covid-19 has seen the highest number of executive actions out of a plethora of priority issues in the White House. More recently, according to CNBC, Biden’s approval rating of his handling of Covid-19 has dropped from 62% in April 2021 to 53% in August 2021. Despite this decrease, Biden’s overall job approval rating was sitting at 48% in August 2021, which is higher than Trump’s approval ratings ever were.&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1833" instrument_node="">
</span><blockquote class="pullquote" data-dcnode-id="1824"><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1831" instrument_node="">As we segue from relief to recovery, it will be interesting to see which measures coming out of the various fiscal stimulus and relief packages will actually be long-lasting. </span><span data-dcnode-id="1827" style="font-size: 12pt;"><strong data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Dr Alexis Crow,</span></strong><span data-dcnode-id="1828" instrument_node=""> PwC</span></span></p><span data-dcnode-id="1825" instrument_node="">
</span></blockquote><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1818"><span data-contrast="none" data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">With vaccinations steadily rolling out across the US population, Biden has been turning his attention to the economic fallout.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1809"><span data-contrast="none" data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Duncan Edwards, chief executive of C-suite networking group BritishAmerican Business, highlights that Trump put the economic recovery wheels in motion during his presidency.</span></span><span data-dcnode-id="1814" instrument_node=""> </span><span data-contrast="none" data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">“Throughout 2020, the US government provided enormous financial stimulus to businesses, municipalities and directly to consumers," he says. "In the first eight months of the Biden administration, this Covid-related stimulus has continued with the $1.9trn stimulus bill, the American Rescue Plan Act, signed on March 11.”</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1801"><span data-contrast="none" data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Whilst Biden continues to strategise around stimulating the economy, Edwards adds: </span></span><span data-contrast="none" data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">“We have no way of knowing what a Trump administration would have done regarding further stimulus had it won the election.”</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1792"><span data-contrast="none" data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Crow muses on whether these relief and stimulus strategies could stretch further than Covid-19 to address long-term issues for the US.</span></span><span data-dcnode-id="1797" instrument_node=""> </span><span data-contrast="none" data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">“As we segue from relief to recovery, it will be interesting to see which measures coming out of the various fiscal stimulus and relief packages will actually be long-lasting, and therefore addressing structural inequalities such as affordable childcare and housing, rather than just targeted relief from the ongoing pandemic,” she says.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1784"><span data-contrast="none" data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">As Biden navigates the country's way out of a pandemic, what can be garnered about his intentions for the US economy? How will Biden keep his promises to the deprived while building a robust and lucrative business environment among</span></span><span data-contrast="none" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">&nbsp;the rubble of a post-Covid market?</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1783" instrument_node="">
</span><h2 data-dcnode-id="1778"><span data-contrast="none" data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Biden’s $3trn plan</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">&nbsp;</span></span></h2><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1769"><span data-contrast="none" data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">Biden’s approach to federal spending is tenacious. His investment strategy spanning infrastructure, education, healthcare, </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/us/how-will-biden-deliver-on-esg-pledges" rel="noopener" target="_blank"><span data-dcnode-id="1775" instrument_node="">climate change</span></a><span data-dcnode-id="1773" instrument_node=""> and more would see federal spending at its highest sustained level since the Second World War.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1762"><span data-contrast="none" data-dcnode-id="1763"><span data-dcnode-id="1767" instrument_node="">A significant part of Biden’s strategy is improving infrastructure. </span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/us/can-bidens-infrastructure-plan-meet-high-expectations" rel="noopener" target="_blank"><span data-dcnode-id="1766" instrument_node="">Biden’s infrastructure investment bill</span></a><span data-dcnode-id="1764" instrument_node="">, which was passed by the US Senate in August 2021, demonstrated rare agreement between Republicans and Democrats with a 69-30 vote in favour of the bill.&nbsp;</span></span></p><span data-dcnode-id="1761" instrument_node="">
</span><blockquote class="pullquote" data-dcnode-id="1752"><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1759" instrument_node="">The investment in infrastructure was way overdue. It is something that Trump talked about, but it never happened. </span><span data-dcnode-id="1755" style="font-size: 12pt;"><strong data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Dennis J Donovan,</span></strong><span data-dcnode-id="1756" instrument_node=""> Wadley Donovan Gutshaw Consulting</span></span></p><span data-dcnode-id="1753" instrument_node="">
</span></blockquote><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1746"><span data-contrast="none" data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Senate Minority Leader Mitch McConnell said at the passing of the bill that the deal proved that “both sides of the political aisle can still come together around common sense solutions”.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1740"><span data-contrast="none" data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Dennis J Donovan, principal at advisory firm Wadley Donovan Gutshaw Consulting, welcomes this development, saying: “The investment in infrastructure was way overdue. It is something that Trump talked about, but it never happened. This is really needed.”</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1734"><span data-contrast="none" data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">The infrastructure bill, which will see hundreds of billions of dollars spent on upgrading the US's transport systems, is just one branch of Biden’s spending strategy. Biden’s overall budget request would see total spending rise to $8.2trn by 2031, with a deficit in excess of $1.3trn running throughout the next decade.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1728"><span data-contrast="none" data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">This strategy forms part of a two-pronged agenda to not only upgrade the US's infrastructure, but to bolster the country’s social safety net as detailed in his American Jobs and American Families plans. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1727" instrument_node="">
</span><h2 data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">What about the debt?</span></h2><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1715"><span data-contrast="none" data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Biden inherited substantial debt and deficit from the Trump administration. Despite promises to reduce the national debt, Trump, the self-proclaimed ‘king of debt’, instigated tax cuts that caused an expansive gap –</span></span><span data-contrast="none" data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node=""> with the national debt rising by&nbsp;almost $7.8trn –</span></span><span data-contrast="none" data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node=""> creating the third-biggest deficit increase of any presidential administration.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1707"><span data-contrast="none" data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Unlike Trump, Biden has raised taxes in a move that Donovan says is typical for Democrats. He</span></span><span data-contrast="none" data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node=""> believes that a more balanced approach would work better for investors: “They have got to meet somewhere in the middle. This proposed increase of payroll tax on [earnings of more than] $400,000 – 12.4% – is misguided and should never be passed. That is unnecessarily taking money from people who have earned it.”</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1699"><span data-contrast="none" data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">For such a rigorous spending plan though, Edwards believes that tax rises are inevitable if there is to be meaningful progress on long-term issues facing the US. </span></span><span data-contrast="none" data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">“The ambition for this administration is to increase federal spending across a range of initiatives and to pay for much of this by increasing corporate income taxes from 21% to 28% and to increase personal income tax for everyone earning more than $400,000 per year by increasing the rates of income, payroll and capital gains taxes," he says. "None of this has yet happened and the next few months will be crucial.”</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1698" instrument_node="">
</span><h2 aria-level="2" data-dcnode-id="1693"><span data-contrast="none" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">The American factory</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:40,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">&nbsp;</span></span></h2><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1687"><span data-contrast="none" data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Alongside improvements to infrastructure, Biden is also championing a robust industrial policy for the US. Like Trump before him, Biden is embracing a ‘buy America’ ideology.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1680"><span data-contrast="none" data-dcnode-id="1681"><span data-dcnode-id="1685" instrument_node="">Crow explains the impact this has had on </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/global/what-is-fdi"><span data-dcnode-id="1684" instrument_node="">foreign direct investment (FDI)</span></a><span data-dcnode-id="1682" instrument_node="">. </span></span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1676"><span data-contrast="none" data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">“In terms of similarities [between Biden and Trump], even prior to the pandemic, both administrations have in common a focus on ‘buy American’, with policies designed towards US procurement of US goods and services," she says. "Accordingly, multinational corporations from across the globe have stepped up their FDI to the US and bolstered their current manufacturing and employment bases, both during Trump’s presidency as well as in the initial months of the Biden administration.”</span></span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1664"><span data-contrast="none" data-dcnode-id="1667"><span data-dcnode-id="1674" instrument_node="">When it comes to bolstering </span><a data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/business-activities/manufacturing/joe-biden-and-the-future-of-us-manufacturing" rel="noopener" target="_blank"><span data-dcnode-id="1673" instrument_node="">the US manufacturing sector</span></a><span data-dcnode-id="1671" instrument_node=""> and its supply chains, there are a number of long-standing issues to be addressed. First, the US suffers from a </span><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/global/fdi-drivers-and-the-quest-for-talent"><span data-dcnode-id="1670" instrument_node="">skills gap</span></a><span data-dcnode-id="1668" instrument_node="">, of which Donovan says:</span></span><span data-contrast="none" data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node=""> “Companies are going to require more automation and technology, because you have to reduce the labour content, and that means a higher skill level." He adds that finding locations that cater to a company's needs for not just physical infrastructure but also these ever-changing labour requirements will be a challenge.&nbsp;</span></span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1658"><span data-contrast="none" data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">As part of his $2.3tn infrastructure plan, Biden has proposed $100bn for workforce development programmes for underserved groups and high school students. Alongside this he has proposed a $40bn investment into a dislocated workers programme and a further $12bn into more general workforce development.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1652"><span data-contrast="none" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">In contrast, Trump’s administration launched it’s ‘Find Something New’ campaign, which saw Ivanka Trump touting that there was “more than one path to a new career”. This campaign was widely criticised on social media, with many users questioning whether the daughter of a multi-millionaire was the right person to deliver such a message. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1651" instrument_node="">
</span><h2 data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Biden's tech challenge</span></h2><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1640"><span data-contrast="none" data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">Alongside the skills gap, another challenge that Biden is facing is the requirements of advanced technology. His infrastructure strategy proposes sizable investments in broadband expansion ($100bn), </span><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/analysis/europe-overpowers-china-in-ev-production-charge"><span data-dcnode-id="1646" instrument_node="">electric vehicles</span></a><span data-dcnode-id="1644" instrument_node=""> ($174bn), technology research and development ($180bn) and a new office designed to monitor supply chains ($100bn). </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1639" instrument_node="">
</span><blockquote class="pullquote" data-dcnode-id="1630"><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1637" instrument_node="">While many had hoped for a new chapter with the Biden administration, thus far, Biden appears keen to continue the decoupling process [with China]. </span><span data-dcnode-id="1633" style="font-size: 12pt;"><strong data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Dr Sultan Salem,</span></strong><span data-dcnode-id="1634" instrument_node=""> University of Birmingham</span></span></p><span data-dcnode-id="1631" instrument_node="">
</span></blockquote><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1621"><span data-contrast="none" data-dcnode-id="1624"><span data-dcnode-id="1628" instrument_node="">There is also a proposed $300m investment in critical technology, of which Donovan says: “[This] will create a lot of jobs and jump-start our business start-ups and business expansion in clean energy, electric vehicle </span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/business-activities/automotive/batteries-are-bad-for-the-environment"><span data-dcnode-id="1627" instrument_node="">battery technologies</span></a><span data-dcnode-id="1625" instrument_node=""> and artificial intelligence. That is a good thing.”</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1612"><span data-contrast="none" data-dcnode-id="1615"><span data-dcnode-id="1619" instrument_node="">Biden is clearly focused upon investing in the US's industrial policy, particularly when it comes to technology. In comparison, Trump had unveiled plans in August 2020 for a $1bn investment designed to "maintain US dominance as a global tech leader". This investment was designed to support research in </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/tech/five-ways-quantum-computing-will-change-the-world"><span data-dcnode-id="1618" instrument_node="">quantum computing</span></a><span data-dcnode-id="1616" instrument_node=""> and artificial intelligence. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1606"><span data-contrast="none" data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">However, Trump’s $1bn proposal is tiny when compared with Biden’s colossal spending plans. Biden will now, however, face the challenge of balancing large investments to address long-standing problems and the opposition that comes with any raising of taxes.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1597"><span data-contrast="none" data-dcnode-id="1600"><span data-dcnode-id="1604" instrument_node="">Another area that will have a huge impact upon the US's industrial policy is the </span><a data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/us/tiktok-tensions-china-antipathy-us"><span data-dcnode-id="1603" instrument_node="">ongoing tension with China</span></a><span data-dcnode-id="1601" instrument_node="">. On this matter, Dr Sultan Salem of the department of economics at the University of Birmingham in the UK says: </span></span><span data-contrast="none" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">“Trump incentivised US multinational companies to move out of China. As such, the US outflow of FDI to China declined. While many had hoped for a new chapter with the Biden administration, thus far, Biden appears keen to continue the decoupling process."</span></span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1585"><span data-contrast="none" data-dcnode-id="1588"><span data-dcnode-id="1595" instrument_node="">“In terms of the manufacturing sector, China seems to be losing out to its neighbouring countries, such as </span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/vietnam/the-state-of-play-fdi-in-vietnam"><span data-dcnode-id="1594" instrument_node="">Vietnam</span></a><span data-dcnode-id="1592" instrument_node=""> and </span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investmentmonitor.ai/manufacturing/the-state-of-play-fdi-in-indonesia"><span data-dcnode-id="1591" instrument_node="">Indonesia</span></a><span data-dcnode-id="1589" instrument_node="">. However, in terms of other sectors, particularly technology, companies from other developed economies are keen to invest in China and fill the void left by multinational firms from the US and other G7 countries.”</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1577"><span data-contrast="none" data-dcnode-id="1580"><span data-dcnode-id="1583" instrument_node="">Of course, the relationship between US and China covers more than just industrial policy, so </span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investmentmonitor.ai/analysis/biden-trump-international-relations-trade"><span data-dcnode-id="1582" instrument_node="">how exactly do Biden and Trump’s approaches differ?</span></a></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1576" instrument_node="">
</span><h2 data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Biden’s approach to China is both old and new</span></h2><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1568"><span data-contrast="none" data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">A lot has been said in recent months of the similarities between Trump and Biden in terms of foreign policy. In short: while it seems that the US’s rhetoric has changed under Biden, the substance has not. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1562"><span data-contrast="none" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">This seems particularly true when it comes to China. For example, Biden has not revoked Trump’s spree of tariffs, as the below chart shows. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1282"><iframe aria-label="chart" data-dcnode-id="1285" frameborder="0" height="400" id="datawrapper-chart-rz8ko" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datawrapper.dwcdn.net/rz8ko/15/&amp;raw" style="width: 0px; border: none; min-width: 100% !important; overflow: hidden; height: 391.333px;" title="Trump's tariffs have not stopped with Biden"><html data-dcnode-id="1287" lang="en"><head data-dcnode-id="1543"><meta charset="utf-8"><meta charset="utf-8" data-dcnode-id="1559"/><meta content="noindex, nofollow" data-dcnode-id="1558" name="robots"/><meta content="width=device-width, initial-scale=1.0" data-dcnode-id="1557" name="viewport"/><title data-dcnode-id="1553">Trump's tariffs have not stopped with Biden</title><meta content="" data-dcnode-id="1550" name="description"/><span data-dcnode-id="1548" instrument_node=""></span><link data-dcnode-id="1547" href="https://api.datawrapper.de/v3/oembed?url=https://datawrapper.dwcdn.net/rz8ko/15/&amp;format=json" rel="alternate" title="oEmbed" type="application/json+oembed"/><span data-dcnode-id="1546" instrument_node=""></span></meta></head><body data-dcnode-id="1288"><div class="dw-chart chart vis-height-fit theme-new-statesman-investment-monitor vis-d3-scatter-plot" data-dcnode-id="1299" id="__svelte-dw"><span data-dcnode-id="1542" instrument_node=""> </span><div class="dw-chart-header" data-dcnode-id="1525" id="header"><div class="block hr-block" data-dcnode-id="1535" style=""><span data-dcnode-id="1541" instrument_node=""> </span><span class="block-inner" data-dcnode-id="1539"><hr class="dw-line" data-dcnode-id="1540" style="border-width: 0px 0px 1px; border-top-style: initial; border-right-style: initial; border-left-style: initial; border-top-color: initial; border-right-color: initial; border-left-color: initial; border-image: initial; border-bottom-style: solid; border-bottom-color: rgb(221, 221, 221); margin: 0px 0px 10px;"/></span><span data ><span data-dcnode-id="1311" instrument_node=""> </span></div></div><span data-dcnode-id="1308" instrument_node=""> </span><span data-dcnode-id="1307" instrument_node=""></span><span data-dcnode-id="1306" instrument_node=""> </span><div class="dw-after-body" data-dcnode-id="1305"></div><span data-dcnode-id="1304" instrument_node=""> </span><span data-dcnode-id="1301" instrument_node="">
</span><span data-dcnode-id="1300" instrument_node=""></span></div><img alt="" aria-hidden="true" data-dcnode-id="1295" height="1" src="https://stats.datawrapper.de/rz8ko/datawrapper.gif?r=https%3A//www.investmentmonitor.ai/" style="position: absolute; top: 0px;" width="1"/></body></html></iframe></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1276"><span data-contrast="none" data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">“Although the tone might be less inflammatory, the Biden administration has clearly continued a policy of suspicion over China, and continues to voice concern over the ‘imbalanced’ economic relationship between the two countries,” says Crow at PwC.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1270"><span data-contrast="none" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">A 'strategic competition' with China, as practised by Trump, remains the guiding principle. However, within this framework, Biden appears to want to avoid knee-jerk tariffs, for example, and adopt less overtly aggressive tactics. Indeed, the new administration has not issued any new tariffs on China. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1269" instrument_node="">
</span><blockquote class="pullquote" data-dcnode-id="1261"><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1267" instrument_node="">Although the tone might be less inflammatory, the Biden administration has clearly continued a policy of suspicion over China. </span><span data-dcnode-id="1264" style="font-size: 12pt;"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Dr Alexis Crow</span></strong></span></p><span data-dcnode-id="1262" instrument_node="">
</span></blockquote><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1250"><span data-contrast="none" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Biden’s China approach is perhaps best summarised by US Secretary of State Antony Blinken’s </span></span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/a-foreign-policy-for-the-american-people/%23%3A~%3Atext%3DOur%2520relationship%2520with%2520China%2520will%2Cadversarial%2520when%2520it%2520must%2520be.%26text%3DIt%2520requires%2520standing%2520up%2520for%2Cact%2520with%2520even%2520greater%2520impunity."><span data-contrast="none" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">statement</span></span></a><span data-contrast="none" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">&nbsp;that the US must be “competitive when it should be, collaborative when it can be, and adversarial when it must be”.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1244"><span data-contrast="none" data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">While Trump’s era was defined by isolationism, Biden has already reignited the multilateralism and collaborative spirit of yore, such as engaging in shuttle diplomacy with its allies around the Asia-Pacific region (most notably through a potential digital trade agreement). </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1238"><span data-contrast="none" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">“These efforts at regional cohesion mark a departure from the previous administration, but also have evinced a greater strain on the relationship between Washington and Beijing, with Beijing’s warnings to the US of creating an ‘encirclement’ around China,” says Crow. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1232"><span data-contrast="none" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">“The courting of ties with allies across the Indo-Pacific region is likely to create a more welcoming environment for inbound FDI into the US from countries such as Japan – and indeed we have seen evidence in this.”</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1221"><span data-contrast="none" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Meanwhile, Biden's continued confrontational approach towards China will impact </span></span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/china/covid-19-death-blow-us-china-fdi"><span data-contrast="none" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">FDI flows between the two superpowers</span></span></a><span data-contrast="none" data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node=""> in the coming years. “The Biden administration is escalating the [slowdown in US companies investing in China] by seemingly going back on the 'One China' policy and landing military jets in Taiwan. In short, Biden’s policies will further polarise global FDI,” says Salem. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1213"><span data-contrast="none" data-dcnode-id="1216"><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investmentmonitor.ai/analysis/biden-trump-international-relations-trade"><span data-dcnode-id="1219" instrument_node="">A better understanding of Biden’s future China approach</span></a><span data-dcnode-id="1217" instrument_node=""> will be elucidated this autumn with the release of the White House’s much-anticipated US-China strategy, which spans diplomatic, security, trade and tech policy. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1207"><span data-contrast="none" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">It is worth remembering that, in the immediate aftermath of his election victory, Biden’s focus has been on domestic issues, namely dealing with Covid-19, which has given him a window to push forward a transformative agenda. This explains why the president has put foreign policy on the backburner and, beyond the all-important China problem, has been relatively quiet on topics such as Russia and the Middle East. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1206" instrument_node="">
</span><h2 data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">A restoration of ties with old allies?</span></h2><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1193"><span data-contrast="none" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">For most of Europe, the election of Biden came as a huge relief given his commitments to maintaining the US's strong alliances with the continent. </span></span><span data-contrast="none" data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">Indeed, Biden rapidly rejoined the Paris Agreement and WHO, made </span><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/insights/globalisation-saved-the-world-covid-vaccine"><span data-dcnode-id="1199" instrument_node="">the US a member of the Covax vaccine programme</span></a><span data-dcnode-id="1197" instrument_node="">, rejoined the UN Human Rights Council, and underlined the US’s commitment to Nato.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1041"><iframe aria-label="Column Chart" data-dcnode-id="1044" frameborder="0" height="400" id="datawrapper-chart-IJyh9" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datawrapper.dwcdn.net/IJyh9/2/&amp;raw" style="width: 0px; border: none; min-width: 100% !important; overflow: hidden; height: 397px;" title="Biden leads in executive actions"><html data-dcnode-id="1046" lang="en"><head data-dcnode-id="1174"><meta charset="utf-8"><meta charset="utf-8" data-dcnode-id="1190"/><meta content="noindex, nofollow" data-dcnode-id="1189" name="robots"/><meta content="width=device-width, initial-scale=1.0" data-dcnode-id="1188" name="viewport"/><title data-dcnode-id="1184">Biden leads in executive actions</title><meta content="Number of signed executive orders and memorandums until 30 April of the first year in office" data-dcnode-id="1181" name="description"/><span data-dcnode-id="1179" instrument_node=""></span><link data-dcnode-id="1178" href="https://api.datawrapper.de/v3/oembed?url=https://datawrapper.dwcdn.net/IJyh9/2/&amp;format=json" rel="alternate" title="oEmbed" type="application/json+oembed"/><span data-dcnode-id="1177" instrument_node=""></span></meta></head><body data-dcnode-id="1047"><div class="dw-chart chart vis-height-fit theme-new-statesman-investment-monitor vis-column-chart" data-dcnode-id="1058" id="__svelte-dw"><span data-dcnode-id="1173" instrument_node=""> </span><div class="dw-chart-header" data-dcnode-id="1148" id="header"><div class="block hr-block" data-dcnode-id="1166" style=""><span data-dcnode-id="1172" instrument_node=""> </span><span class="block-inner" data-dcnode-id="1170"><hr class="dw-line" data-dcnode-id="1171" style="border-width: 0px 0px 1px; border-top-style: initial; border-right-style: initial; border-left-style: initial; border-top-color: initial; border-right-color: initial; border-left-color: initial; border-image: initial; border-bottom-style: solid; border-bottom-color: rgb(221, 221, 221); margin: 0px 0px 10px;"/></span><span data-dcnode-id="1169" instrument_node=""> </span><span data-dcnode-id="1168" instrument_node=""></span><span data-dcnode-id="1167" instrument_node=""> </span></div><span data-dcnode-id="1165" instrument_node=""></span><h1 class="block headline-block" data-dcnode-id="1158"><span data-dcnode-id="1164" instrument_node=""> </span><span class="block-inner" data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Biden leads in executive actions</span></span><span data-dcnode-id="1161" instrument_node=""> </span><span data-dcnode-id="1160" instrument_node=""></span><span data-dcnode-id="1159" instrument_node=""> </span></h1><span data-dcnode-id="1157" instrument_node=""></span><p class="block description-block" data-dcnode-id="1150"><span data-dcnode-id="1156" instrument_node=""> </span><span class="block-inner" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Number of signed executive orders and memorandums until 30 April of the first year in office</span></span><span data-dcnode-id="1153" instrument_node=""> </span><span data-dcnode-id="1152" instrument_node=""></span><span data-dcnode-id="1151" instrument_node=""> </span></p><span data-dcnode-id="1149" instrument_node=""></span></div><span data-dcnode-id="1147" instrument_node=""></span><span data-dcnode-id="1146" instrument_node=""> </span><span data-dcnode-id="1145" instrument_node=""></span><span data-dcnode-id="1144" instrument_node=""></span><span data-dcnode-id="1143" instrument_node=""> </span><span data-dcnode-id="1142" instrument_node=""> </span><div aria-hidden="false" class="dw-chart-body content-below-chart vis-height-fit column-chart" data-dcnode-id="1101" id="chart" style="position: relative; height: 251px;"><svg data-dcnode-id="1128" height="255" width="600"><g data-dcnode-id="1130"><g class="container" data-dcnode-id="1131"><g class="grid below" data-dcnode-id="1141"></g><g class="columns" data-dcnode-id="1136"><rect class="column" data-dcnode-id="1140"></rect><rect class="column" data-dcnode-id="1139"></rect><rect class="column" data-dcnode-id="1138"></rect><rect class="column" data-dcnode-id="1137"></rect></g><g class="grid above" data-dcnode-id="1133"><g class="y-base-lines grid-y datawrapper-IJyh9-n2qvu0" data-dcnode-id="1134"><line data-dcnode-id="1135" transform="translate(0,209)" x1="600"></line></g></g><g class="axes" data-dcnode-id="1132"></g></g></g><rect class="bgRect" data-dcnode-id="1129" height="253" style="fill: rgba(0, 0, 0, 0);" width="600"></rect></svg><div class="labels value" data-dcnode-id="1115"><div class="label value outline" data-dcnode-id="1125"><span data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">52</span></span></div><div class="label value outline" data-dcnode-id="1122"><span data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">39</span></span></div><div class="label value outline" data-dcnode-id="1119"><span data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">34</span></span></div><div class="label value outline" data-dcnode-id="1116"><span data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">13</span></span></div></div><div class="labels series" data-dcnode-id="1102"><div class="label series" data-dcnode-id="1112"><span data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Biden</span></span></div><div class="label series" data-dcnode-id="1109"><span data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Trump</span></span></div><div class="label series" data-dcnode-id="1106"><span data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Obama</span></span></div><div class="label series" data-dcnode-id="1103"><span data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Bush</span></span></div></div></div><span data-dcnode-id="1100" instrument_node=""> </span><span data-dcnode-id="1099" instrument_node=""> </span><span data-dcnode-id="1098" instrument_node=""></span><span data-dcnode-id="1097" instrument_node=""> </span><div class="dw-chart-footer" data-dcnode-id="1068" id="footer"><div class="footer-left" data-dcnode-id="1082"><span data-dcnode-id="1096" instrument_node=""> </span><span class="footer-block source-block" data-dcnode-id="1084"><span data-dcnode-id="1095" instrument_node=""> </span><span class="block-inner" data-dcnode-id="1086"><span class="source-caption" data-dcnode-id="1092"><span data-dcnode-id="1094" instrument_node="">Source</span><span data-dcnode-id="1093" instrument_node="">:</span></span><span data-dcnode-id="1091" instrument_node=""> </span><span class="source" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">The White House, Federal Register</span></span><span data-dcnode-id="1088" instrument_node=""></span><span data-dcnode-id="1087" instrument_node=""></span></span><span data-dcnode-id="1085" instrument_node=""> </span></span><span data-dcnode-id="1083" instrument_node=""> </span></div><div class="footer-center" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node=""> </span></div><div class="footer-right" data-dcnode-id="1069"><span data-dcnode-id="1079" instrument_node=""> </span><span class="footer-block logo-block" data-dcnode-id="1071"><span data-dcnode-id="1078" instrument_node=""> </span><span class="block-inner" data-dcnode-id="1073"><img data-dcnode-id="1077" height="10" src="https://static.dwcdn.net/custom/themes/new-statesman-investment-monitor/InvestmentMonitor_logo.png"/><span data-dcnode-id="1076" instrument_node=""> </span><span data-dcnode-id="1075" instrument_node=""></span><span data-dcnode-id="1074" instrument_node=""></span></span><span data-dcnode-id="1072" instrument_node=""> </span></span><span data-dcnode-id="1070" instrument_node=""> </span></div></div><span data-dcnode-id="1067" instrument_node=""> </span><span data-dcnode-id="1066" instrument_node=""></span><span data-dcnode-id="1065" instrument_node=""> </span><div class="dw-after-body" data-dcnode-id="1064"></div><span data-dcnode-id="1063" instrument_node=""> </span><span data-dcnode-id="1060" instrument_node="">
</span><span data-dcnode-id="1059" instrument_node=""></span></div><img alt="" aria-hidden="true" data-dcnode-id="1054" height="1" src="https://stats.datawrapper.de/IJyh9/datawrapper.gif?r=https%3A//www.investmentmonitor.ai/" style="position: absolute; top: 0px;" width="1"/></body></html></iframe></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1035"><span data-contrast="none" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">“Biden made it clear throughout his campaign that he would pursue a policy of healing transatlantic ties," says Crow. "This has manifested and borne fruit with the cessation of the tariffs related to the dispute on subsidies for aviation and is underpinned by working groups such as the EU-US Trade Technology Council. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1034" instrument_node="">
</span><blockquote class="pullquote" data-dcnode-id="1026"><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">While the Americans and its East Asian allies – Japan and to a lesser extent South Korea – seem set to decouple with China, the situation is decidedly more mixed with Europe and other Western countries. </span><span data-dcnode-id="1029" style="font-size: 12pt;"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Dr Sultan Salem</span></strong></span></p><span data-dcnode-id="1027" instrument_node="">
</span></blockquote><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1022"><span data-contrast="none" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">“Biden’s policies on transatlantic cohesion stand at odds from the previous administration. Indeed, in light of increased tariffs imposed on Europe, the EU actually deepened trade ties with China, and stepped up export capacity to the mainland. [This new approach] will likely foster a more welcoming environment for FDI [to the US] from European countries such as Germany and the Netherlands.”&nbsp;</span></span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1011"><span data-contrast="none" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">The US-China struggle has put the EU in a very awkward position, given that the bloc’s economic health is dependent on strong export performance – and China is now its main export market. This has already led to friction between the US and EU over the latter’s increased economic relations with China, namely through the </span></span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/insights/china-the-way-to-a-european-renaissance-or-a-threat-to-the-future"><span data-contrast="none" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Comprehensive Agreement on Investment</span></span></a><span data-contrast="none" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">. Simultaneously, the EU continues to stand by the US in acknowledging the global threat posed by Beijing. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1005"><span data-contrast="none" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">“While the Americans and its East Asian allies – Japan and to a lesser extent South Korea – seem set to decouple with China, the situation is decidedly more mixed with Europe and other Western countries,” says Salem.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="999"><span data-contrast="none" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">When it comes to the environment, however, the US and the EU have never been more aligned.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="993"><span data-contrast="none" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">“Biden’s campaign trail commitments to accelerate the energy transition in the US, to move the country towards a target of net zero by no later than 2050, and to rejoin the global stage in leadership on climate change mitigation, stand at odds with Trump’s policies," says Crow. "Biden’s first few days in office resulted in several executive orders which supported this environmental agenda, such as calling for a moratorium on drilling of oil in federal lands.”&nbsp; </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="992" instrument_node="">
</span><h2 data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Biden restoring calm to the US's FDI markets</span></h2><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="981"><span data-contrast="none" data-dcnode-id="984"><span data-dcnode-id="988" instrument_node="">Biden’s departure from </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/us/how-trump-lost-his-war-on-fdi" rel="noopener" target="_blank"><span data-dcnode-id="987" instrument_node="">Trump’s unpredictable and disruptive modus operandi</span></a><span data-dcnode-id="985" instrument_node=""> has been a relief for foreign investors. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="975"><span data-contrast="none" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">“It has been encouraging to see Biden reaffirm the value of FDI to the US's economy – first addressing the SelectUSA Investment Summit in June and then issuing an open investment policy statement days later,” says Nancy McLernon, president and CEO of the Global Business Alliance, a trade association representing the interests of foreign investors in the US.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="969"><span data-contrast="none" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">“And throughout the administration, we have seen key cabinet officials underscore the importance of working with our country's friends and allies to confront the challenges before us. All of those actions are a welcome change from a more isolationist approach emanating from Washington during the previous four years. That said, it is critical that the Biden administration’s multilateral message guides its policy implementation moving forward." </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="956"><span data-contrast="none" data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Although FDI into the US did not majorly decrease under Trump, it was deterred by </span></span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/business-activities/manufacturing/in-conversation-with-the-global-business-alliances-hugh-welsh"><span data-contrast="none" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">fears that non-US companies would be discriminated against</span></span></a><span data-contrast="none" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">.&nbsp;</span></span><span data-contrast="none" data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">The era of Biden, therefore, is expected to prompt an increase in foreign investment. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="942"><span data-contrast="none" data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">A big </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/us/biden-wont-solve-us-fdi-woes" rel="noopener" target="_blank"><span data-dcnode-id="953" instrument_node="">impact of Biden on FDI</span></a><span data-dcnode-id="951" instrument_node=""> concerns the environment and renewable energy. Trump’s solar tariffs and his policies regarding methane standards were a major barrier to foreign investment. Meanwhile, huge sums of capital have </span></span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investmentmonitor.ai/us/how-would-a-biden-presidency-impact-foreign-investment"><span data-contrast="none" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">been waiting to invest in infrastructure</span></span></a><span data-contrast="none" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">, meaning Biden’s plans here have plenty of support. </span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="936"><span data-contrast="none" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Although Trump’s domestic policies (especially the tax related ones) may have benefitted large US multinationals, his overall impact on the world of FDI was detrimental – and catastrophic for the battle against climate change. Biden, by contrast, has brought some much-needed sense and sensibility.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Although Biden has upheld some of Trump's foreign policy legacies, especially with regards to China, he has ushered in a return to the norms of multilateralism. His focus, however, has been on national affairs. In this, Biden has repealed much of Trump's handiwork and taken bold, new action with regards to Covid-19, taxes and infrastructure spending – to name but a few.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="931"></p><span data-dcnode-id="930" instrument_node="">
