 an unreasonable ask’, given how Trump ‘feels’ about McCain.</span><sup data-dcnode-id="2406"><span class="xrefLink" data-dcnode-id="2409" id="jumplink-fn96"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2407" data-google-interstitial="false" data-open="fn96" href="javascript:;" reveal-id="fn96"><span data-dcnode-id="2408" instrument_node="">96</span></a></sup><span data-dcnode-id="2405" instrument_node=""> Over time, Trump's staffers and supporters have subtly shifted their defence of the president. In his first year in office, they would note that he was an unorthodox president learning on the job. Now they merely say that he is an unorthodox president. A year after the notorious op-ed claiming that adult staffers could restrain Trump, that same official acknowledged: ‘Americans should not take comfort in knowing whether there are so-called adults in the room. We are not bulwarks against the president and shouldn't be counted upon to keep him in check.’</span><sup data-dcnode-id="2401"><span class="xrefLink" data-dcnode-id="2404" id="jumplink-fn97"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2402" data-google-interstitial="false" data-open="fn97" href="javascript:;" reveal-id="fn97"><span data-dcnode-id="2403" instrument_node="">97</span></a></sup></p><p class="chapter-para" data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Not only are the formal guardrails weakened; so are the more informal ones. Longstanding norms designed to regulate political behaviour have faded. Even before Trump, rising levels of partisanship had permitted politicians on both sides of the party divide to raise the level of vitriol expressed towards the opposing party. Trump's very election eviscerated many of the norms of political behaviour. He shot to prominence in far-right Republican circles, after all, by questioning whether Barack Obama was born in the United States.</span></p><p class="chapter-para" data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">As president, he has been unconstrained by the traditional norms of the presidency. On his first full day in office, Trump delivered what amounted to a campaign speech at CIA headquarters, a clear breach of protocol. In his first week he issued an executive order codifying the travel ban without consulting any of the relevant cabinet departments. He fired James Comey despite a tradition of FBI directors staying on from one administration to the next. He fired his first chief of staff and secretary of state via Twitter. The formal press conference and daily White House briefings have been effectively discontinued; daily briefings at the Pentagon and the State Department have also been curtailed. Trump's use of presidential pardons has deviated widely from past practice. In particular, he has repeatedly intervened in the military justice system to pardon convicted war criminals despite opposition from Pentagon officials. His withdrawal of the United States from multiple international agreements is perfectly legal, but departs significantly from past diplomatic practice.</span></p><p class="chapter-para" data-dcnode-id="2385"><span data-dcnode-id="2395" instrument_node="">A president's agenda-setting power comes as much from rhetoric as from executive action, wielded by boosting preferred issues to the head of the political queue.</span><sup data-dcnode-id="2391"><span class="xrefLink" data-dcnode-id="2394" id="jumplink-fn98"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2392" data-google-interstitial="false" data-open="fn98" href="javascript:;" reveal-id="fn98"><span data-dcnode-id="2393" instrument_node="">98</span></a></sup><span data-dcnode-id="2390" instrument_node=""> President Trump's ability to set the political agenda has not waned; indeed, he has succeeded in dominating the conversation since he was inaugurated more than any of his predecessors. He has declared the entire mainstream media to be the ‘enemy of the people’ and labelled his political opponents as ‘treasonous’ on multiple occasions. Terms like ‘deep state’ and ‘fake news’ are not only common political parlance in the United States; these terms have gone global as well. Trump dissembles so frequently about so many things that Americans have become inured to his false claims. As the political theorist Jacob T. Levy observes, ‘Trump's speech, his especially outrageous and transparent lies, are words that have shaped the world: demonstrations of power, attempts to undermine the existence of shared belief in truth and facts’.</span><sup data-dcnode-id="2386"><span class="xrefLink" data-dcnode-id="2389" id="jumplink-fn99"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2387" data-google-interstitial="false" data-open="fn99" href="javascript:;" reveal-id="fn99"><span data-dcnode-id="2388" instrument_node="">99</span></a></sup></p><p class="chapter-para" data-dcnode-id="2369"><span data-dcnode-id="2384" instrument_node="">The nature of Trump's discourse—divisive, angry, infantile—has exacerbated pre-existing divisions within the United States.</span><sup data-dcnode-id="2380"><span class="xrefLink" data-dcnode-id="2383" id="jumplink-fn100"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2381" data-google-interstitial="false" data-open="fn100" href="javascript:;" reveal-id="fn100"><span data-dcnode-id="2382" instrument_node="">100</span></a></sup><span data-dcnode-id="2379" instrument_node=""> As Peter Baker concludes, ‘the old-fashioned idea that a president, once reaching office, should at least pretend to be the leader of all the people these days seems so, well, old-fashioned. Mr Trump does not bother with the pretense. He is speaking to his people, not the people.’</span><sup data-dcnode-id="2375"><span class="xrefLink" data-dcnode-id="2378" id="jumplink-fn101"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2376" data-google-interstitial="false" data-open="fn101" href="javascript:;" reveal-id="fn101"><span data-dcnode-id="2377" instrument_node="">101</span></a></sup><span data-dcnode-id="2374" instrument_node=""> Trump's rhetoric has not only eviscerated existing norms about political discourse, it has salted the earth.</span><sup data-dcnode-id="2370"><span class="xrefLink" data-dcnode-id="2373" id="jumplink-fn102"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2371" data-google-interstitial="false" data-open="fn102" href="javascript:;" reveal-id="fn102"><span data-dcnode-id="2372" instrument_node="">102</span></a></sup></p><p class="chapter-para" data-dcnode-id="2357"><span data-dcnode-id="2368" instrument_node="">In this one area, Trump's psychology has enabled him to go further than his predecessors to undermine informal institutions. Indeed, as Ezra Klein pointed out during the 2016 campaign, Trump's lack of shame was a political asset: ‘He has the reality television star's ability to operate entirely without shame, and that permits him to operate entirely without restraint … [It] allows him to go where others won't, to say what others can't, to do what others wouldn't.’</span><sup data-dcnode-id="2364"><span class="xrefLink" data-dcnode-id="2367" id="jumplink-fn103"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2365" data-google-interstitial="false" data-open="fn103" href="javascript:;" reveal-id="fn103"><span data-dcnode-id="2366" instrument_node="">103</span></a></sup><span data-dcnode-id="2363" instrument_node=""> Justin Amash, once a Republican, now an independent representative, echoed that sentiment after Trump was inaugurated: ‘Most people feel shame when they do or say something wrong, especially when it's so public. The president feels comfortable saying two things that are completely contradictory in one sentence … It gives him this superpower that other people don't have.’</span><sup data-dcnode-id="2359"><span class="xrefLink" data-dcnode-id="2362" id="jumplink-fn104"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2360" data-google-interstitial="false" data-open="fn104" href="javascript:;" reveal-id="fn104"><span data-dcnode-id="2361" instrument_node="">104</span></a></sup><span data-dcnode-id="2358" instrument_node=""> In other words, Trump's toddler-like psychological traits have enabled him to act in a more unconstrained manner than more mature leaders.</span></p><span data-dcnode-id="2356" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2354" data-legacy-id="sec5" id="200388996" scrollto-destination="200388996"><span data-dcnode-id="2355" instrument_node="">The institutional legacy of Donald Trump</span></h2><span data-dcnode-id="2353" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Prior moments of the imperial presidency—the Civil War, Watergate—have triggered blowback that restored congressional power. Proponents of the persuasive presidency hypothesis may suggest that this could happen in reaction to Trump; indeed, since the 2018 midterm elections the House of Representatives has attempted to ratchet up oversight. Trump's successor might attempt to restore the guardrails.</span></p><p class="chapter-para" data-dcnode-id="2344"><span data-dcnode-id="2350" instrument_node="">Such a perspective underestimates the continuing and lasting damage Trump's presidency may wreak on the United States. For one thing, Trump has paid a small political price for his transgressions because he maintains the devoted support of partisan Republicans. In a polarized age, Donald Trump's immaturity has barely affected his standing within his party; indeed, his style of temper tantrums and unchecked impulses is now embraced by Republicans as ‘unorthodox’. He has consistently polled close to 90 per cent approval among Republican voters. One survey in March 2019 revealed that 78 per cent of Fox News viewers believed that Trump has been the most successful president in American history.</span><sup data-dcnode-id="2346"><span class="xrefLink" data-dcnode-id="2349" id="jumplink-fn105"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2347" data-google-interstitial="false" data-open="fn105" href="javascript:;" reveal-id="fn105"><span data-dcnode-id="2348" instrument_node="">105</span></a></sup><span data-dcnode-id="2345" instrument_node=""> The midterm elections forced out many of the moderate Republican members of Congress, such as Mark Sanford, who were willing to speak out against him. Others, such as Bob Corker and Jeff Flake, declined to run again. Trump can count on party loyalists in Congress to block measures that would constrain or reverse presidential overreach.</span></p><p class="chapter-para" data-dcnode-id="2337"><span data-dcnode-id="2343" instrument_node="">The other pillars of Republican power have fallen in line behind Trump. Self-proclaimed ‘institutionalists’ such as Senate majority leader Mitch McConnell went along with Trump's decision in March 2019 to declare a state of emergency at the southern border, even though that move undercut the authority of the legislative branch. As Tim Alberta concluded, ‘if the first year of Donald Trump's term witnessed a president adapting to the philosophies of his party, the second year saw a party bending to the will, and the whims, of its president’.</span><sup data-dcnode-id="2339"><span class="xrefLink" data-dcnode-id="2342" id="jumplink-fn106"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2340" data-google-interstitial="false" data-open="fn106" href="javascript:;" reveal-id="fn106"><span data-dcnode-id="2341" instrument_node="">106</span></a></sup><span data-dcnode-id="2338" instrument_node=""> As long as he is president, the Republican Party is Trump's party. Even though he has been impeached, the party-line vote in the House will enable Trump to continue to act without constraint with little fear of political retribution.</span></p><p class="chapter-para" data-dcnode-id="2330"><span data-dcnode-id="2336" instrument_node="">The other lasting scar will be the carnage wrought in American foreign policy. At the end of his first year in office, Susan Glasser noted: ‘Seasoned diplomats who have seen Trump up close throw around words like “catastrophic,” “terrifying,” “incompetent” and “dangerous.”’ She continued: ‘I listened to a group of sober policy wonks debate whether Trump was merely a “laughingstock” or something more dangerous. Virtually all of those from whom I've heard this kind of ranting are leaders from close allies and partners of the United States.’</span><sup data-dcnode-id="2332"><span class="xrefLink" data-dcnode-id="2335" id="jumplink-fn107"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2333" data-google-interstitial="false" data-open="fn107" href="javascript:;" reveal-id="fn107"><span data-dcnode-id="2334" instrument_node="">107</span></a></sup><span data-dcnode-id="2331" instrument_node=""> Henry Kissinger, who had praised Trump immediately after the 2016 election, was scathing in his assessment less than three years later:</span></p><blockquote data-dcnode-id="2323"><p class="chapter-para" data-dcnode-id="2324"><span data-dcnode-id="2329" instrument_node="">The entire foreign policy is based on a single unstable individual's reaction to perceptions of slights or flattery. If someone says something nice about him, they are our friend; if they say something unkind, if they don't kiss the ring, they are our enemy.</span><sup data-dcnode-id="2325"><span class="xrefLink" data-dcnode-id="2328" id="jumplink-fn108"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2326" data-google-interstitial="false" data-open="fn108" href="javascript:;" reveal-id="fn108"><span data-dcnode-id="2327" instrument_node="">108</span></a></sup></p></blockquote><p class="chapter-para" data-dcnode-id="2316"><span data-dcnode-id="2322" instrument_node="">Key US allies are now questioning the viability of longstanding alliances such as NATO. Polling data show that whatever soft power the United States possessed has dissipated under Trump.</span><sup data-dcnode-id="2318"><span class="xrefLink" data-dcnode-id="2321" id="jumplink-fn109"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2319" data-google-interstitial="false" data-open="fn109" href="javascript:;" reveal-id="fn109"><span data-dcnode-id="2320" instrument_node="">109</span></a></sup><span data-dcnode-id="2317" instrument_node=""> It is unsurprising that the UN General Assembly laughed at Trump's suggestion in 2018 that his administration had accomplished more than that of almost any prior US president.</span></p><p class="chapter-para" data-dcnode-id="2305"><span data-dcnode-id="2315" instrument_node="">Trump's damage to America's standing in the world will last longer than is commonly appreciated. Presidents execute more and more policies through executive action alone. Presidents can countermand or abrogate pre-existing executive agreements. Party polarization has eroded the notion that politicians need to govern from the centre.</span><sup data-dcnode-id="2311"><span class="xrefLink" data-dcnode-id="2314" id="jumplink-fn110"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2312" data-google-interstitial="false" data-open="fn110" href="javascript:;" reveal-id="fn110"><span data-dcnode-id="2313" instrument_node="">110</span></a></sup><span data-dcnode-id="2310" instrument_node=""> The alternation of presidents from the extremes of the American political spectrum will give each incumbent an incentive to reverse his or her predecessor's policies. Grand strategy could follow the pattern of the ‘Mexico City’ policy, in which Republican and Democratic presidents flip-flop rules governing support for foreign family planning NGOs on party lines. The combination of worn-down guardrails and presidents emerging from the extremes of the political spectrum could fling US foreign policy between ultra-conservative and ultra-liberal approaches. In such a political climate, the credibility of US commitments ceases to matter. Sustainable grand strategy becomes impossible.</span><sup data-dcnode-id="2306"><span class="xrefLink" data-dcnode-id="2309" id="jumplink-fn111"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2307" data-google-interstitial="false" data-open="fn111" href="javascript:;" reveal-id="fn111"><span data-dcnode-id="2308" instrument_node="">111</span></a></sup></p><p class="chapter-para" data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Trump's presidency helps to explain the debate among American politics scholars about the relative power of the office. His inability to get much done through traditional means bolsters Neustadt's argument that the presidency is a weak institution that relies primarily on persuasion. On the other hand, Trump's foreign policy tantrums, power grabs, destruction of government organizations, evisceration of political norms and cowing of the Republican Party establishment illuminate the awesome scope of the modern president's powers.</span></p><p class="chapter-para" data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">For decades, political architects in both major parties had worked at building the presidency into the most powerful position in the world. As polarization gripped Congress, the president was viewed as the last adult in the room. And then someone with the emotional maturity of a small child was elected to that office. Each of the guardrails checking presidential power had eroded before Trump was elected president. Under the 45th president, they have almost completely disappeared. As president, Donald Trump has acted like many toddlers: he is bad at building structures, but fantastic at making a complete mess of existing ones.</span></p><span data-dcnode-id="2300" instrument_node=""> </span><h2 class="backfootnotegroup-title js-splitscreen-backfootnotegroup-title" data-dcnode-id="2298" id="200389006" scrollto-destination="200389006"><span data-dcnode-id="2299" instrument_node="">Footnotes</span></h2><span data-dcnode-id="2297" instrument_node="">
</span><div class="footnote" content-id="fn1" data-dcnode-id="2286"><span class="fn" data-dcnode-id="2287"><span class="label fn-label" data-dcnode-id="2294"><span class="end-note-link" data-dcnode-id="2295" data-fn-id="fn1" rel="nofollow"><span data-dcnode-id="2296" instrument_node="">1</span></span></span><div class="footnote-content" data-dcnode-id="2288"><p class="footnote-compatibility" data-dcnode-id="2289"><span data-dcnode-id="2293" instrument_node="">Daniel Byman and Kenneth Pollack, ‘Let us now praise great men: bringing the statesman back in’, </span><em data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">International Security</span></em><span data-dcnode-id="2290" instrument_node=""> 25: 4, 2001, pp. 107–46.</span></p></div></span></div><div class="footnote" content-id="fn2" data-dcnode-id="2269"><span class="fn" data-dcnode-id="2270"><span class="label fn-label" data-dcnode-id="2283"><span class="end-note-link" data-dcnode-id="2284" data-fn-id="fn2" rel="nofollow"><span data-dcnode-id="2285" instrument_node="">2</span></span></span><div class="footnote-content" data-dcnode-id="2271"><p class="footnote-compatibility" data-dcnode-id="2272"><span data-dcnode-id="2282" instrument_node="">Robert Jervis, ‘Do leaders matter and how would we know?’, </span><em data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Security Studies</span></em><span data-dcnode-id="2279" instrument_node=""> 22: 2, 2013, pp. 153–79; Joseph Nye, </span><em data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Presidential leadership and the creation of the American era</span></em><span data-dcnode-id="2276" instrument_node=""> (Princeton: Princeton University Press, 2013); Elizabeth Saunders, ‘No substitute for experience: presidents, advisers, and information in group decision-making’, </span><em data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">International Organization</span></em><span data-dcnode-id="2273" instrument_node=""> 71: suppl., 2017, pp. S219–47.</span></p></div></span></div><div class="footnote" content-id="fn3" data-dcnode-id="2258"><span class="fn" data-dcnode-id="2259"><span class="label fn-label" data-dcnode-id="2266"><span class="end-note-link" data-dcnode-id="2267" data-fn-id="fn3" rel="nofollow"><span data-dcnode-id="2268" instrument_node="">3</span></span></span><div class="footnote-content" data-dcnode-id="2260"><p class="footnote-compatibility" data-dcnode-id="2261"><span data-dcnode-id="2265" instrument_node="">See e.g. Allan Dafoe and Devin Caughey, ‘Honor and war: southern US presidents and the effects of concern for reputation’, </span><em data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">World Politics</span></em><span data-dcnode-id="2262" instrument_node=""> 68: 2, 2016, pp. 341–81.</span></p></div></span></div><div class="footnote" content-id="fn4" data-dcnode-id="2244"><span class="fn" data-dcnode-id="2245"><span class="label fn-label" data-dcnode-id="2255"><span class="end-note-link" data-dcnode-id="2256" data-fn-id="fn4" rel="nofollow"><span data-dcnode-id="2257" instrument_node="">4</span></span></span><div class="footnote-content" data-dcnode-id="2246"><p class="footnote-compatibility" data-dcnode-id="2247"><span data-dcnode-id="2254" instrument_node="">Joseph S. Nye, Jr, ‘The rise and fall of US hegemony from Wilson to Trump’, </span><em data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">International Affairs</span></em><span data-dcnode-id="2251" instrument_node=""> 95: 1, Jan. 2019, pp. 63–80; Peter Trubowitz and Peter Harris, ‘The end of the American century? Slow erosion of the domestic sources of usable power’, </span><em data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">International Affairs</span></em><span data-dcnode-id="2248" instrument_node=""> 95: 3, May 2019, pp. 619–40.</span></p></div></span></div><div class="footnote" content-id="fn5" data-dcnode-id="2233"><span class="fn" data-dcnode-id="2234"><span class="label fn-label" data-dcnode-id="2241"><span class="end-note-link" data-dcnode-id="2242" data-fn-id="fn5" rel="nofollow"><span data-dcnode-id="2243" instrument_node="">5</span></span></span><div class="footnote-content" data-dcnode-id="2235"><p class="footnote-compatibility" data-dcnode-id="2236"><span data-dcnode-id="2240" instrument_node="">Richard Neustadt, </span><em data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Presidential power and the modern presidents</span></em><span data-dcnode-id="2237" instrument_node=""> (New York: Free Press, 1990).</span></p></div></span></div><div class="footnote" content-id="fn6" data-dcnode-id="2213"><span class="fn" data-dcnode-id="2214"><span class="label fn-label" data-dcnode-id="2230"><span class="end-note-link" data-dcnode-id="2231" data-fn-id="fn6" rel="nofollow"><span data-dcnode-id="2232" instrument_node="">6</span></span></span><div class="footnote-content" data-dcnode-id="2215"><p class="footnote-compatibility" data-dcnode-id="2216"><span data-dcnode-id="2229" instrument_node="">Matthew Glassman, ‘Donald Trump is a dangerously weak president’, </span><em data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Vox</span></em><span data-dcnode-id="2226" instrument_node="">, 27 Dec. 2017; David Lewis, Patrick Bernhard and Emily You, ‘President Trump as manager: reflections on the first year’, </span><em data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Presidential Studies Quarterly</span></em><span data-dcnode-id="2223" instrument_node=""> 48: 3, 2018, pp. 480–501; Corey Robin, ‘Why has it taken so long to see Trump's weaknesses?’, </span><em data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">New York</span></em><span data-dcnode-id="2220" instrument_node="">, 20 Feb. 2019. See also Susan Hennessey and Benjamin Wittes, </span><em data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Unmaking the presidency: Donald Trump's war on the world's most powerful office</span></em><span data-dcnode-id="2217" instrument_node=""> (New York: Farrar, Straus and Giroux, 2020).</span></p></div></span></div><div class="footnote" content-id="fn7" data-dcnode-id="2202"><span class="fn" data-dcnode-id="2203"><span class="label fn-label" data-dcnode-id="2210"><span class="end-note-link" data-dcnode-id="2211" data-fn-id="fn7" rel="nofollow"><span data-dcnode-id="2212" instrument_node="">7</span></span></span><div class="footnote-content" data-dcnode-id="2204"><p class="footnote-compatibility" data-dcnode-id="2205"><span data-dcnode-id="2209" instrument_node="">Arthur Schlesinger, Jr, </span><em data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">The imperial presidency</span></em><span data-dcnode-id="2206" instrument_node="">, 3rd edn (Boston: Houghton Mifflin, 2004).</span></p></div></span></div><div class="footnote" content-id="fn8" data-dcnode-id="2191"><span class="fn" data-dcnode-id="2192"><span class="label fn-label" data-dcnode-id="2199"><span class="end-note-link" data-dcnode-id="2200" data-fn-id="fn8" rel="nofollow"><span data-dcnode-id="2201" instrument_node="">8</span></span></span><div class="footnote-content" data-dcnode-id="2193"><p class="footnote-compatibility" data-dcnode-id="2194"><span data-dcnode-id="2198" instrument_node="">Kevin Kruse and Julian Zelizer, ‘Have we had enough of the imperial presidency yet?’, </span><em data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">New York Times</span></em><span data-dcnode-id="2195" instrument_node="">, 8 Jan. 2019.</span></p></div></span></div><div class="footnote" content-id="fn9" data-dcnode-id="2177"><span class="fn" data-dcnode-id="2178"><span class="label fn-label" data-dcnode-id="2188"><span class="end-note-link" data-dcnode-id="2189" data-fn-id="fn9" rel="nofollow"><span data-dcnode-id="2190" instrument_node="">9</span></span></span><div class="footnote-content" data-dcnode-i
