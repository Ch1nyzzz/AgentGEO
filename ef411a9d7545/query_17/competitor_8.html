</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="3027" id="200388943" scrollto-destination="200388943"><span data-dcnode-id="3028" instrument_node="">Abstract</span></h2><span data-dcnode-id="3026" instrument_node="">
</span><section class="abstract" data-dcnode-id="3023"><p class="chapter-para" data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">There has been a renaissance in the study of how the backgrounds of individual leaders affect foreign policy outcomes. Donald Trump's presidency highlights the limits of this approach. Trump's psychology is so unique, and so akin to that of a small child, that studying his background alone is insufficient to explain his decision-making. The evidence for this characterization of Trump's leadership comes not from his political opponents, but his allies, staffers and subordinates. Trump's lack of impulse control, short attention span and frequent temper tantrums have all undercut his effectiveness as president as compared to his predecessors. Nonetheless, the 45th president helps to clarify ongoing debates in American politics about the relative strength of the presidency as an institution. In particular, the powers of the presidency have become so enhanced that even comparatively weak and inexperienced leaders can execute dramatic policy shifts. The formal checks on presidential power, from the legislative, judicial and executive branches have all eroded. Similarly, the informal checks on the presidency had also degraded before Trump's inauguration. This article uses Trump's presidency—and his severe limitations as a decision-maker—to highlight the ways in which even a weak leader can affect change by holding a powerful office.</span></p></section><span data-dcnode-id="3022" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="2999"><div class="article-metadata-taxonomies" data-dcnode-id="3008"><span data-dcnode-id="3021" instrument_node="">
</span><div class="article-metadata" data-dcnode-id="3010"><span data-dcnode-id="3020" instrument_node="">
</span><div class="article-metadata-taxonomies-title" data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Subject</span></div><span data-dcnode-id="3017" instrument_node="">
</span><a data-dcnode-id="3015" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ia/search-results%3Fpage%3D1%26tax%3Diaffai/1"><span data-dcnode-id="3016" instrument_node="">International Relations Theory</span></a><span data-dcnode-id="3014" instrument_node="">
</span><a data-dcnode-id="3012" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ia/search-results%3Fpage%3D1%26tax%3Diaffai/11"><span data-dcnode-id="3013" instrument_node="">Americas</span></a><span data-dcnode-id="3011" instrument_node="">
</span></div><span data-dcnode-id="3009" instrument_node="">
</span></div><div class="article-metadata-tocSections" data-dcnode-id="3000"><span data-dcnode-id="3007" instrument_node="">
</span><div class="article-metadata-tocSections-title" data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">Issue Section:</span></div><span data-dcnode-id="3004" instrument_node="">
</span><a data-dcnode-id="3002" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ia/search-results%3Ff_TocHeadingTitle%3DOriginal%2BArticles"><span data-dcnode-id="3003" instrument_node="">Original Articles</span></a><span data-dcnode-id="3001" instrument_node="">
</span></div></div><span data-dcnode-id="2998" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2982"><span data-dcnode-id="2997" instrument_node="">Scholars have been implored to bring the statesman back into the study of international relations since the beginning of this century.</span><sup data-dcnode-id="2993"><span class="xrefLink" data-dcnode-id="2996" id="jumplink-fn1"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2994" data-google-interstitial="false" data-open="fn1" href="javascript:;" reveal-id="fn1"><span data-dcnode-id="2995" instrument_node="">1</span></a></sup><span data-dcnode-id="2992" instrument_node=""> Over the past decade there has been a renaissance in the study of how the individual backgrounds of leaders affect their approach to foreign policy.</span><sup data-dcnode-id="2988"><span class="xrefLink" data-dcnode-id="2991" id="jumplink-fn2"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2989" data-google-interstitial="false" data-open="fn2" href="javascript:;" reveal-id="fn2"><span data-dcnode-id="2990" instrument_node="">2</span></a></sup><span data-dcnode-id="2987" instrument_node=""> The dominant trend in this line of research has been to identify observable and verifiable aspects of an individual leader's biography—gender, prior military experience, pathway to power—to see if those traits have a persistent effect on their behaviour.</span><sup data-dcnode-id="2983"><span class="xrefLink" data-dcnode-id="2986" id="jumplink-fn3"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2984" data-google-interstitial="false" data-open="fn3" href="javascript:;" reveal-id="fn3"><span data-dcnode-id="2985" instrument_node="">3</span></a></sup></p><p class="chapter-para" data-dcnode-id="2975"><span data-dcnode-id="2981" instrument_node="">The election of Donald Trump has supercharged this research programme. The presidency of so unorthodox a leader provides a natural experiment by which to test a variety of questions about American politics and American foreign policy.</span><sup data-dcnode-id="2977"><span class="xrefLink" data-dcnode-id="2980" id="jumplink-fn4"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2978" data-google-interstitial="false" data-open="fn4" href="javascript:;" reveal-id="fn4"><span data-dcnode-id="2979" instrument_node="">4</span></a></sup><span data-dcnode-id="2976" instrument_node=""> Some observers have followed the trend identified above, explaining Trump's style of leadership through reference to his background. However, in the case of the 45th president this standard approach has two major limitations. First, Trump's background alone cannot explain his style of political leadership. Even a cursory examination of the Trump literature reveals a peculiarity unique to this president: almost all his biographers, even his acolytes, describe him in terms one would use for a toddler. He offers the greatest example of pervasive developmental delay in American political history. Trump's individual psychology is sufficiently unique to require a highly focused analysis of his immature psychological traits.</span></p><p class="chapter-para" data-dcnode-id="2963"><span data-dcnode-id="2974" instrument_node="">Second, an exclusive focus on the individual is insufficient to explain Trump's effect on American politics and policy. It is equally important to examine how Trump's psychology intersects with larger institutional forces that predate his arrival on the political stage. For example, what does Donald Trump reveal about the current strength of the presidency as a political institution compared to the past? From Richard Neustadt on, political scientists have traditionally argued that the US presidency is a fundamentally weak institution.</span><sup data-dcnode-id="2970"><span class="xrefLink" data-dcnode-id="2973" id="jumplink-fn5"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2971" data-google-interstitial="false" data-open="fn5" href="javascript:;" reveal-id="fn5"><span data-dcnode-id="2972" instrument_node="">5</span></a></sup><span data-dcnode-id="2969" instrument_node=""> Many current political scientists argue that Trump is a weak president compared to his predecessors.</span><sup data-dcnode-id="2965"><span class="xrefLink" data-dcnode-id="2968" id="jumplink-fn6"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2966" data-google-interstitial="false" data-open="fn6" href="javascript:;" reveal-id="fn6"><span data-dcnode-id="2967" instrument_node="">6</span></a></sup><span data-dcnode-id="2964" instrument_node=""> They have a case to make. By conventional standards, Trump's durable policy accomplishments have been meagre. He is only the third US president to be impeached.</span></p><p class="chapter-para" data-dcnode-id="2944"><span data-dcnode-id="2962" instrument_node="">At the same time, however, Arthur Schlesinger's </span><em data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Imperial presidency</span></em><span data-dcnode-id="2959" instrument_node=""> reminds us that in the postwar era the norm has been an empowered chief executive.</span><sup data-dcnode-id="2955"><span class="xrefLink" data-dcnode-id="2958" id="jumplink-fn7"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2956" data-google-interstitial="false" data-open="fn7" href="javascript:;" reveal-id="fn7"><span data-dcnode-id="2957" instrument_node="">7</span></a></sup><span data-dcnode-id="2954" instrument_node=""> Schlesinger's successors suggest that Trump has expanded the scope of presidential power beyond that of his predecessors.</span><sup data-dcnode-id="2950"><span class="xrefLink" data-dcnode-id="2953" id="jumplink-fn8"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2951" data-google-interstitial="false" data-open="fn8" href="javascript:;" reveal-id="fn8"><span data-dcnode-id="2952" instrument_node="">8</span></a></sup><span data-dcnode-id="2949" instrument_node=""> Examples range from an accelerated pace of treaty withdrawals through reliance on acting officials in his cabinet to using states of emergency to bypass Congress. This debate within American politics has also affected debates about Trump's influence on American foreign policy.</span><sup data-dcnode-id="2945"><span class="xrefLink" data-dcnode-id="2948" id="jumplink-fn9"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2946" data-google-interstitial="false" data-open="fn9" href="javascript:;" reveal-id="fn9"><span data-dcnode-id="2947" instrument_node="">9</span></a></sup></p><p class="chapter-para" data-dcnode-id="2933"><span data-dcnode-id="2943" instrument_node="">President Trump himself has been on both sides of this debate. He has complained repeatedly about ‘presidential harassment’ from Democrats and the mainstream media. Five months into office, he claimed: ‘No politician in history, and I say this with great surety, has been treated worse or more unfairly.’</span><sup data-dcnode-id="2939"><span class="xrefLink" data-dcnode-id="2942" id="jumplink-fn10"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2940" data-google-interstitial="false" data-open="fn10" href="javascript:;" reveal-id="fn10"><span data-dcnode-id="2941" instrument_node="">10</span></a></sup><span data-dcnode-id="2938" instrument_node=""> At the same time, he has also bragged about his constitutional powers, claiming in June 2019 that ‘Article II allows me to do whatever I want’.</span><sup data-dcnode-id="2934"><span class="xrefLink" data-dcnode-id="2937" id="jumplink-fn11"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2935" data-google-interstitial="false" data-open="fn11" href="javascript:;" reveal-id="fn11"><span data-dcnode-id="2936" instrument_node="">11</span></a></sup></p><p class="chapter-para" data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">These contrasting views of presidential power can be reconciled by understanding how Trump's psychological characteristics interact with the growing prerogatives of the US presidency. What makes Trump unique as a president is how much his individual psychology degrades his ability to be a conventionally effective president. Evidence for this comes from his supporters far more than his critics. Trump's staffers, subordinates, cabinet officers, fellow Republicans on Capitol Hill, and longstanding treaty allies of the United States trying to ingratiate themselves with this president have all characterized him as possessing the maturity of a petulant child rather than a man in his seventies. Psychological tropes such as a quick temper, short attention span and poor impulse control hamper Trump's political leadership.</span></p><p class="chapter-para" data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">At the same time, however, constraints on the presidency have been severely eroded in recent decades, enabling even a comparatively weak leader to be a powerful president. Trump assumed the office at the zenith of its power, and his willingness to flout norms has empowered the office even further. For half a century, Trump's predecessors have expanded the powers of the presidency at the expense of countervailing institutions. Trump himself has attempted massive executive branch power grabs, but the underlying trends eroding formal and informal constraints on the president long predate his inauguration. They make the existence of a president with Trump's peculiar psychology far more worrisome now than it would have been even amid the heightened tensions of the Cold War. Crudely put, Trump is a weak man who occupies a powerful office, and the power of the office demands that greater attention be paid to Trump's unique psychology.</span></p><span data-dcnode-id="2928" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2926" data-legacy-id="sec1" id="200388952" scrollto-destination="200388952"><span data-dcnode-id="2927" instrument_node="">The Toddler-in-Chief</span></h2><span data-dcnode-id="2925" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">All US presidents must cope with a political caricature painted by the opposition party, with its inevitable focus on their least desirable qualities. Republicans depicted Barack Obama as an aloof, out-of-touch intellectual. Democrats characterized George W. Bush as an incurious simpleton, the puppet of craftier politicians. Both depictions possessed some small grains of truth. Two things are striking about Trump's caricature. First, in contrast to his predecessors, he is lampooned as a toddler. Second, the primary actors feeding this analogy are the president's political allies.</span></p><p class="chapter-para" data-dcnode-id="2912"><span data-dcnode-id="2922" instrument_node="">To be sure, Trump's political opponents have also deployed this metaphor. In December 2018, Senate minority leader Chuck Schumer accused Trump of throwing a ‘temper tantrum’ when a bi-partisan appropriations bill contained no new funding for a wall along the US–Mexico border. Speaker of the House Nancy Pelosi also blasted Trump for his obduracy during the 2018–19 government shutdown, telling reporters: ‘I'm the mother of five, grandmother of nine. I know a temper tantrum when I see one.’</span><sup data-dcnode-id="2918"><span class="xrefLink" data-dcnode-id="2921" id="jumplink-fn12"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2919" data-google-interstitial="false" data-open="fn12" href="javascript:;" reveal-id="fn12"><span data-dcnode-id="2920" instrument_node="">12</span></a></sup><span data-dcnode-id="2917" instrument_node=""> A few months later, Pelosi said that Trump has a short attention span as well as a ‘lack of knowledge of the subjects at hand’.</span><sup data-dcnode-id="2913"><span class="xrefLink" data-dcnode-id="2916" id="jumplink-fn13"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2914" data-google-interstitial="false" data-open="fn13" href="javascript:;" reveal-id="fn13"><span data-dcnode-id="2915" instrument_node="">13</span></a></sup></p><p class="chapter-para" data-dcnode-id="2898"><span data-dcnode-id="2911" instrument_node="">What is startling, however, is the frequency with which Trump himself, his subordinates and his supporters talk about him as if he were a small child. The president has made it clear that he is not the most mature of individuals. Trump told one biographer: ‘When I look at myself in the first grade and I look at myself now, I'm basically the same. The temperament is not that different.’</span><sup data-dcnode-id="2907"><span class="xrefLink" data-dcnode-id="2910" id="jumplink-fn14"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2908" data-google-interstitial="false" data-open="fn14" href="javascript:;" reveal-id="fn14"><span data-dcnode-id="2909" instrument_node="">14</span></a></sup><span data-dcnode-id="2906" instrument_node=""> Most of his other biographers make a similar point: he has experienced little emotional or psychological development since he was young. Tim O'Brien, the author of </span><em data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">TrumpNation: the art of being the Donald</span></em><span data-dcnode-id="2903" instrument_node="">, warned after Trump's election that ‘we now have somebody who's going to sit in the Oval Office who is lacking in a lot of adult restraints and in mature emotions’.</span><sup data-dcnode-id="2899"><span class="xrefLink" data-dcnode-id="2902" id="jumplink-fn15"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2900" data-google-interstitial="false" data-open="fn15" href="javascript:;" reveal-id="fn15"><span data-dcnode-id="2901" instrument_node="">15</span></a></sup></p><p class="chapter-para" data-dcnode-id="2874"><span data-dcnode-id="2897" instrument_node="">His subordinates and supporters have characterized him in a similar way. One person described advance work for Trump's first NATO summit as ‘preparing to deal with a child—someone with a short attention span and mood who has no knowledge of NATO, no interest in in-depth policy issues, nothing’.</span><sup data-dcnode-id="2893"><span class="xrefLink" data-dcnode-id="2896" id="jumplink-fn16"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2894" data-google-interstitial="false" data-open="fn16" href="javascript:;" reveal-id="fn16"><span data-dcnode-id="2895" instrument_node="">16</span></a></sup><span data-dcnode-id="2892" instrument_node=""> A Trump White House staffer described one dubious press release as an action designed solely to appease the president, ‘the equivalent of giving a sick, screaming baby whiskey instead of taking them to the doctor and actually solving the problem’.</span><sup data-dcnode-id="2888"><span class="xrefLink" data-dcnode-id="2891" id="jumplink-fn17"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2889" data-google-interstitial="false" data-open="fn17" href="javascript:;" reveal-id="fn17"><span data-dcnode-id="2890" instrument_node="">17</span></a></sup><span data-dcnode-id="2887" instrument_node=""> Both Secretary of Defense James Mattis and White House Chief of Staff John Kelly told officials that they viewed their jobs as being ‘babysitter’ to the president.</span><sup data-dcnode-id="2883"><span class="xrefLink" data-dcnode-id="2886" id="jumplink-fn18"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2884" data-google-interstitial="false" data-open="fn18" href="javascript:;" reveal-id="fn18"><span data-dcnode-id="2885" instrument_node="">18</span></a></sup><span data-dcnode-id="2882" instrument_node=""> Perhaps the most notorious example of a Trump official comparing him to a toddler appeared in an anonymous </span><em data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">New York Times</span></em><span data-dcnode-id="2879" instrument_node=""> op-ed of 5 September 2018. The author does not explicitly say that the president is a toddler, but the implication is clear. Describing Trump's leadership style as ‘impetuous, adversarial, petty and ineffective’, the writer notes that ‘it may be cold comfort in this chaotic era, but Americans should know that there are adults in the room. We fully recognize what is happening. And we are trying to do what's right even when Donald Trump won't.’</span><sup data-dcnode-id="2875"><span class="xrefLink" data-dcnode-id="2878" id="jumplink-fn19"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2876" data-google-interstitial="false" data-open="fn19" href="javascript:;" reveal-id="fn19"><span data-dcnode-id="2877" instrument_node="">19</span></a></sup></p><p class="chapter-para" data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">Several of the quotes in the preceding paragraph are from anonymous sources. There are, however, plenty of on-the-record statements from prominent Trump supporters that make him sound like a rambunctious two-year-old:</span></p><ul class="bullet" data-dcnode-id="2819"><li data-dcnode-id="2865"><p class="chapter-para" data-dcnode-id="2866"><span data-dcnode-id="2871" instrument_node="">Former Speaker of the House Newt Gingrich: ‘There are parts of Trump that are almost impossible to manage.’</span><sup data-dcnode-id="2867"><span class="xrefLink" data-dcnode-id="2870" id="jumplink-fn20"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2868" data-google-interstitial="false" data-open="fn20" href="javascript:;" reveal-id="fn20"><span data-dcnode-id="2869" instrument_node="">20</span></a></sup></p></li><li data-dcnode-id="2858"><p class="chapter-para" data-dcnode-id="2859"><span data-dcnode-id="2864" instrument_node="">White House chief strategist Steve Bannon: ‘I'm sick of being a wet nurse for a 71 year old.’</span><sup data-dcnode-id="2860"><span class="xrefLink" data-dcnode-id="2863" id="jumplink-fn21"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2861" data-google-interstitial="false" data-open="fn21" href="javascript:;" reveal-id="fn21"><span data-dcnode-id="2862" instrument_node="">21</span></a></sup></p></li><li data-dcnode-id="2851"><p class="chapter-para" data-dcnode-id="2852"><span data-dcnode-id="2857" instrument_node="">US Senator Bob Corker: ‘It's a shame the White House has become an adult day care center.’</span><sup data-dcnode-id="2853"><span class="xrefLink" data-dcnode-id="2856" id="jumplink-fn22"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2854" data-google-interstitial="false" data-open="fn22" href="javascript:;" reveal-id="fn22"><span data-dcnode-id="2855" instrument_node="">22</span></a></sup></p></li><li data-dcnode-id="2844"><p class="chapter-para" data-dcnode-id="2845"><span data-dcnode-id="2850" instrument_node="">Newsmax CEO and long-time Trump friend Christopher Ruddy: ‘This is Donald Trump's personality. He just has to respond. He's been so emotional … It takes a toll on him, and the way he deals with it is to lash out.’</span><sup data-dcnode-id="2846"><span class="xrefLink" data-dcnode-id="2849" id="jumplink-fn23"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2847" data-google-interstitial="false" data-open="fn23" href="javascript:;" reveal-id="fn23"><span data-dcnode-id="2848" instrument_node="">23</span></a></sup></p></li><li data-dcnode-id="2837"><p class="chapter-para" data-dcnode-id="2838"><span data-dcnode-id="2843" instrument_node="">Fox News' Tucker Carlson: ‘I've come to believe that Trump's role is not as a conventional president who promises to get certain things achieved to the Congress and then does. I don't think he's capable. I don't think he's capable of sustained focus. I don't think he understands the system.’</span><sup data-dcnode-id="2839"><span class="xrefLink" data-dcnode-id="2842" id="jumplink-fn24"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2840" data-google-interstitial="false" data-open="fn24" href="javascript:;" reveal-id="fn24"><span data-dcnode-id="2841" instrument_node="">24</span></a></sup></p></li><li data-dcnode-id="2830"><p class="chapter-para" data-dcnode-id="2831"><span data-dcnode-id="2836" instrument_node="">US Senator Lindsey Graham: ‘The president's been—he can be a handful—that's just the way it is.’</span><sup data-dcnode-id="2832"><span class="xrefLink" data-dcnode-id="2835" id="jumplink-fn25"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2833" data-google-interstitial="false" data-open="fn25" href="javascript:;" reveal-id="fn25"><span data-dcnode-id="2834" instrument_node="">25</span></a></sup></p></li><li data-dcnode-id="2820"><p class="chapter-para" data-dcnode-id="2821"><span data-dcnode-id="2829" instrument_node="">Former Speaker of the House Paul Ryan: ‘I'm telling you he didn't know </span><em data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">anything</span></em><span data-dcnode-id="2826" instrument_node=""> about government … I wanted to scold him all the time.’</span><sup data-dcnode-id="2822"><span class="xrefLink" data-dcnode-id="2825" id="jumplink-fn26"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2823" data-google-interstitial="false" data-open="fn26" href="javascript:;" reveal-id="fn26"><span data-dcnode-id="2824" instrument_node="">26</span></a></sup></p></li></ul><p class="chapter-para" data-dcnode-id="2798"><span data-dcnode-id="2818" instrument_node="">Trump subordinates make similar statements under oath. The Mueller Report confirms that when Trump aides have testified under penalty of perjury, they frequently characterize the president as possessing the emotional and intellectual maturity of a small boy. White House chief of staff Reince Priebus told Mueller's investigators that when Trump was angry at his national security advisor Michael Flynn he would pretend that Flynn was not in the room.</span><sup data-dcnode-id="2814"><span class="xrefLink" data-dcnode-id="2817" id="jumplink-fn27"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2815" data-google-interstitial="false" data-open="fn27" href="javascript:;" reveal-id="fn27"><span data-dcnode-id="2816" instrument_node="">27</span></a></sup><span data-dcnode-id="2813" instrument_node=""> Chris Christie, Steve Bannon and White House counsel Don McGahn all testified that Trump made requests that were ‘nonsensical’, ‘ridiculous’ or ‘silly’.</span><sup data-dcnode-id="2809"><span class="xrefLink" data-dcnode-id="2812" id="jumplink-fn28"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2810" data-google-interstitial="false" data-open="fn28" href="javascript:;" reveal-id="fn28"><span data-dcnode-id="2811" instrument_node="">28</span></a></sup><span data-dcnode-id="2808" instrument_node=""> Bannon and McGahn, along with National Security Administration head Mike Rogers and White House communications director Hope Hicks, all described the president having temper tantrums when informed of bad news.</span><sup data-dcnode-id="2804"><span class="xrefLink" data-dcnode-id="2807" id="jumplink-fn29"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2805" data-google-interstitial="false" data-open="fn29" href="javascript:;" reveal-id="fn29"><span data-dcnode-id="2806" instrument_node="">29</span></a></sup><span data-dcnode-id="2803" instrument_node=""> Multiple Trump administration officials described similar toddler-like behaviour in their depositions to the House impeachment inquiry.</span><sup data-dcnode-id="2799"><span class="xrefLink" data-dcnode-id="2802" id="jumplink-fn30"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2800" data-google-interstitial="false" data-open="fn30" href="javascript:;" reveal-id="fn30"><span data-dcnode-id="2801" instrument_node="">30</span></a></sup></p><p class="chapter-para" data-dcnode-id="2779"><span data-dcnode-id="2797" instrument_node="">Classified diplomatic cables from the British Ambassador to the United States leaked to a British tabloid newspaper paint a similar picture. Writing to the Foreign Office, Sir Kim Darroch characterized Trump as ‘inept’ and ‘incompetent’. He advised his superiors that in speaking to the 45th president, ‘you need to start praising him for something that he's done recently’ and that ‘you need to make your points simple, even blunt’. He further warned: ‘There is no filter.’</span><sup data-dcnode-id="2793"><span class="xrefLink" data-dcnode-id="2796" id="jumplink-fn31"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2794" data-google-interstitial="false" data-open="fn31" href="javascript:;" reveal-id="fn31"><span data-dcnode-id="2795" instrument_node="">31</span></a></sup><span data-dcnode-id="2792" instrument_node=""> Darroch's assessment was based on his own frequent interactions with Trump's coterie of advisers. Other diplomats based in Washington confirmed that his judgements matched those expressed in cables they had dispatched to their own home countries.</span><sup data-dcnode-id="2788"><span class="xrefLink" data-dcnode-id="2791" id="jumplink-fn32"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2789" data-google-interstitial="false" data-open="fn32" href="javascript:;" reveal-id="fn32"><span data-dcnode-id="2790" instrument_node="">32</span></a></sup><span data-dcnode-id="2787" instrument_node=""> In response, Trump insulted Darroch repeatedly and then declared him </span><em data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">persona non grata</span></em><span data-dcnode-id="2784" instrument_node=""> via Twitter.</span><sup data-dcnode-id="2780"><span class="xrefLink" data-dcnode-id="2783" id="jumplink-fn33"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2781" data-google-interstitial="false" data-open="fn33" href="javascript:;" reveal-id="fn33"><span data-dcnode-id="2782" instrument_node="">33</span></a></sup></p><span data-dcnode-id="2778" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2776" data-legacy-id="sec2" id="200388961" scrollto-destination="200388961"><span data-dcnode-id="2777" instrument_node="">How Trump's psychology hampers his presidency</span></h2><span data-dcnode-id="2775" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2759"><span data-dcnode-id="2774" instrument_node="">Three of Trump's most prominent psychological traits have badly impaired his decision-making abilities: his temper tantrums, his short attention span and his poor impulse control.</span><sup data-dcnode-id="2770"><span class="xrefLink" data-dcnode-id="2773" id="jumplink-fn34"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2771" data-google-interstitial="false" data-open="fn34" href="javascript:;" reveal-id="fn34"><span data-dcnode-id="2772" instrument_node="">34</span></a></sup><span data-dcnode-id="2769" instrument_node=""> Trump does not stand out from other presidents because he gets furious. He stands out in how frequently his temper emerges, and how frequently it has sabotaged his administration. Press coverage yields an abundance of examples. President Trump once yelled at Chief of Staff John Kelly so viciously that Kelly told his staff that ‘he had never been spoken to like that during 35 years of serving his country’. He screamed at Attorney General Jeff Sessions so loudly that Sessions later described the incident as ‘the most humiliating experience in decades of public life’. The president rang up National Security Advisor H. R. McMaster once for the sole purpose of screaming at him.</span><sup data-dcnode-id="2765"><span class="xrefLink" data-dcnode-id="2768" id="jumplink-fn35"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2766" data-google-interstitial="false" data-open="fn35" href="javascript:;" reveal-id="fn35"><span data-dcnode-id="2767" instrument_node="">35</span></a></sup><span data-dcnode-id="2764" instrument_node=""> Contemporaneous reporting suggests that Trump's decision to kill Iranian General Qasem Soleimani was based on an irate reaction to TV footage showing the US Embassy in Baghdad being breached by Iranian-backed mobs.</span><sup data-dcnode-id="2760"><span class="xrefLink" data-dcnode-id="2763" id="jumplink-fn36"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2761" data-google-interstitial="false" data-open="fn36" href="javascript:;" reveal-id="fn36"><span data-dcnode-id="2762" instrument_node="">36</span></a></sup></p><p class="chapter-para" data-dcnode-id="2743"><span data-dcnode-id="2758" instrument_node="">Trump's temper tantrums have led to poor decision-making and pathological staff strategies for coping with it. Anger leads to short-term, impulsive decision-making that might feel good in the moment but leads to disastrous consequences soon afterwards. Angry outbursts make negotiations more costly and conflict escalation more likely.</span><sup data-dcnode-id="2754"><span class="xrefLink" data-dcnode-id="2757" id="jumplink-fn37"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2755" data-google-interstitial="false" data-open="fn37" href="javascript:;" reveal-id="fn37"><span data-dcnode-id="2756" instrument_node="">37</span></a></sup><span data-dcnode-id="2753" instrument_node=""> Trump's inability to secure significant concessions in trade agreements and arms control treaties reflects this dynamic. The president's out-of-control temper has caused staffers to delay or shorten their own travels, as well as those of the president, in order to avoid setting him off.</span><sup data-dcnode-id="2749"><span class="xrefLink" data-dcnode-id="2752" id="jumplink-fn38"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2750" data-google-interstitial="false" data-open="fn38" href="javascript:;" reveal-id="fn38"><span data-dcnode-id="2751" instrument_node="">38</span></a></sup><span data-dcnode-id="2748" instrument_node=""> Most disturbingly, his temper has clearly distorted the selection of information with which his staff provide him, on anything from political analysis to national security. For example, his intelligence briefings have been skewed to avoid presenting him with information that contradicts his public statements, to ensure that he does not get angry.</span><sup data-dcnode-id="2744"><span class="xrefLink" data-dcnode-id="2747" id="jumplink-fn39"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2745" data-google-interstitial="false" data-open="fn39" href="javascript:;" reveal-id="fn39"><span data-dcnode-id="2746" instrument_node="">39</span></a></sup></p><p class="chapter-para" data-dcnode-id="2726"><span data-dcnode-id="2742" instrument_node="">The 45th president is also handicapped by a short attention span. Trump biographers have repeatedly stressed this aspect of his behaviour. One warned that Trump ‘doesn't have the attention span’ to handle the day-to-day rigours of the presidency.</span><sup data-dcnode-id="2738"><span class="xrefLink" data-dcnode-id="2741" id="jumplink-fn40"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2739" data-google-interstitial="false" data-open="fn40" href="javascript:;" reveal-id="fn40"><span data-dcnode-id="2740" instrument_node="">40</span></a></sup><span data-dcnode-id="2737" instrument_node=""> Another said: ‘The reason he gets surprised by these political problems is because he's not detail-oriented. He has a really short attention span, and he's profoundly impatient.’</span><sup data-dcnode-id="2733"><span class="xrefLink" data-dcnode-id="2736" id="jumplink-fn41"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2734" data-google-interstitial="false" data-open="fn41" href="javascript:;" reveal-id="fn41"><span data-dcnode-id="2735" instrument_node="">41</span></a></sup><span data-dcnode-id="2732" instrument_node=""> Political allies and subordinates have confirmed this trait. Republican Senator Charles Grassley told reporters: ‘I'm not sure if you talk to him face to face, he hears everything you say.’</span><sup data-dcnode-id="2728"><span class="xrefLink" data-dcnode-id="2731" id="jumplink-fn42"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2729" data-google-interstitial="false" data-open="fn42" href="javascript:;" reveal-id="fn42"><span data-dcnode-id="2730" instrument_node="">42</span></a></sup><span data-dcnode-id="2727" instrument_node=""> Gary Cohn, Trump's first chief economic adviser, complained:</span></p><blockquote data-dcnode-id="2719"><p class="chapter-para" data-dcnode-id="2720"><span data-dcnode-id="2725" instrument_node="">It's pointless to prepare a meaningful, substantive briefing for the president that's organized, where you have a bunch of slides. Because you know he's never going to listen. We're never going to get through it. He's going to get through the first 10 minutes and then he's going to want to start talking about some other topic.</span><sup data-dcnode-id="2721"><span class="xrefLink" data-dcnode-id="2724" id="jumplink-fn43"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2722" data-google-interstitial="false" data-open="fn43" href="javascript:;" reveal-id="fn43"><span data-dcnode-id="2723" instrument_node="">43</span></a></sup></p></blockquote><p class="chapter-para" data-dcnode-id="2702"><span data-dcnode-id="2718" instrument_node="">On the global stage, Trump's inability to sit still and focus damages the standing of the United States in two ways. First, his short attention span means he can miss nuanced shifts in another country's position on an issue. Second, his restlessness can often lead to violations of diplomatic protocol, which are viewed as a sign of disrespect by other foreign leaders.</span><sup data-dcnode-id="2714"><span class="xrefLink" data-dcnode-id="2717" id="jumplink-fn44"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2715" data-google-interstitial="false" data-open="fn44" href="javascript:;" reveal-id="fn44"><span data-dcnode-id="2716" instrument_node="">44</span></a></sup><span data-dcnode-id="2713" instrument_node=""> The problem is compounded by his knowledge deficits.</span><sup data-dcnode-id="2709"><span class="xrefLink" data-dcnode-id="2712" id="jumplink-fn45"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2710" data-google-interstitial="false" data-open="fn45" href="javascript:;" reveal-id="fn45"><span data-dcnode-id="2711" instrument_node="">45</span></a></sup><span data-dcnode-id="2708" instrument_node=""> Because he lacks basic background information, his policy briefings would, all else being equal, have to be longer than normal, thereby guaranteeing that Trump's attention will wander before receiving all the necessary information. Furthermore, without an ability to sustain focus, it is easy for bureaucratic actors to delay implementation of an idea to see if the president's attention shifts elsewhere. Indeed, Trump's White House staff have repeatedly used delaying tactics in response to direct orders.</span><sup data-dcnode-id="2704"><span class="xrefLink" data-dcnode-id="2707" id="jumplink-fn46"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2705" data-google-interstitial="false" data-open="fn46" href="javascript:;" reveal-id="fn46"><span data-dcnode-id="2706" instrument_node="">46</span></a></sup><span data-dcnode-id="2703" instrument_node=""> A repeated theme of this administration is the president's desire to do something, followed by staff inaction, followed by a tweet announcing a shift in policy, followed by staff confusion about what to do in response, followed by uncertainty about whether Trump will pursue his line or not. The result is a series of policy announcements that generate poor follow-through and bad implementation.</span></p><p class="chapter-para" data-dcnode-id="2687"><span data-dcnode-id="2701" instrument_node="">Trump also suffers from poor impulse control. One biographer, Tim O'Brien, observes that Trump ‘doesn't regulate his own emotions, he's not a disciplined thinker’.</span><sup data-dcnode-id="2697"><span class="xrefLink" data-dcnode-id="2700" id="jumplink-fn47"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2698" data-google-interstitial="false" data-open="fn47" href="javascript:;" reveal-id="fn47"><span data-dcnode-id="2699" instrument_node="">47</span></a></sup><span data-dcnode-id="2696" instrument_node=""> Indeed, Trump's trust in his own instincts and impulses is so strong that it has profoundly shaped how his White House operates. Trump disdains any form of strategic planning. As one of his advisers explained, ‘He gets frustrated when there </span><em data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">is</span></em><span data-dcnode-id="2693" instrument_node=""> a plan. He's not a guy who likes a plan … There's an animosity towards planning, and there's a desire to pick fights that have nothing to do with us.’</span><sup data-dcnode-id="2689"><span class="xrefLink" data-dcnode-id="2692" id="jumplink-fn48"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2690" data-google-interstitial="false" data-open="fn48" href="javascript:;" reveal-id="fn48"><span data-dcnode-id="2691" instrument_node="">48</span></a></sup><span data-dcnode-id="2688" instrument_node=""> Rex Tillerson, Trump's first secretary of state, explained the difficulties he encountered in advising the president:</span></p><blockquote data-dcnode-id="2680"><p class="chapter-para" data-dcnode-id="2681"><span data-dcnode-id="2686" instrument_node="">What was challenging for me coming from the disciplined, highly process-oriented ExxonMobil corporation, to go to work for a man who is pretty undisciplined, doesn't like to read, doesn't read briefing reports, doesn't like to get into the details of a lot of things, but rather just kind of says, ‘This is what I believe.’</span><sup data-dcnode-id="2682"><span class="xrefLink" data-dcnode-id="2685" id="jumplink-fn49"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2683" data-google-interstitial="false" data-open="fn49" href="javascript:;" reveal-id="fn49"><span data-dcnode-id="2684" instrument_node="">49</span></a></sup></p></blockquote><p class="chapter-para" data-dcnode-id="2674"><span data-dcnode-id="2679" instrument_node="">Many of Trump's high-profile decisions—withdrawing forces from Syria, launching a trade war with China, threatening to close the border with Mexico—were made impulsively.</span><sup data-dcnode-id="2675"><span class="xrefLink" data-dcnode-id="2678" id="jumplink-fn50"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2676" data-google-interstitial="false" data-open="fn50" href="javascript:;" reveal-id="fn50"><span data-dcnode-id="2677" instrument_node="">50</span></a></sup></p><p class="chapter-para" data-dcnode-id="2653"><span data-dcnode-id="2673" instrument_node="">The negative effects of poor impulse control on political leadership are clear. Emotional impulses can cloud cost–benefit analyses, a fact that has debilitated even the most successful presidents.</span><sup data-dcnode-id="2669"><span class="xrefLink" data-dcnode-id="2672" id="jumplink-fn51"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2670" data-google-interstitial="false" data-open="fn51" href="javascript:;" reveal-id="fn51"><span data-dcnode-id="2671" instrument_node="">51</span></a></sup><span data-dcnode-id="2668" instrument_node=""> Perhaps the most important reason not to act on impulse is that such moves undercut a leader's ability to make credible commitments. In politics and foreign policy, a leader's word matters a great deal. Contrary to folk wisdom, leaders rarely lie in world politics, because they do not want to damage their reputation in international negotiations.</span><sup data-dcnode-id="2664"><span class="xrefLink" data-dcnode-id="2667" id="jumplink-fn52"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2665" data-google-interstitial="false" data-open="fn52" href="javascript:;" reveal-id="fn52"><span data-dcnode-id="2666" instrument_node="">52</span></a></sup><span data-dcnode-id="2663" instrument_node=""> Little wonder, then, that global surveys show that far more people distrust Trump than they do Vladimir Putin or Xi Jinping.</span><sup data-dcnode-id="2659"><span class="xrefLink" data-dcnode-id="2662" id="jumplink-fn53"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2660" data-google-interstitial="false" data-open="fn53" href="javascript:;" reveal-id="fn53"><span data-dcnode-id="2661" instrument_node="">53</span></a></sup><span data-dcnode-id="2658" instrument_node=""> Trump's impulse control has been so poor that foreign diplomats have learned to discount many of his threats. As one Mexican diplomat put it, ‘He has shown us that what's black at 9 a.m. can be gray at 3 p.m. and white at 7 p.m.’</span><sup data-dcnode-id="2654"><span class="xrefLink" data-dcnode-id="2657" id="jumplink-fn54"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2655" data-google-interstitial="false" data-open="fn54" href="javascript:;" reveal-id="fn54"><span data-dcnode-id="2656" instrument_node="">54</span></a></sup></p><span data-dcnode-id="2652" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2650" data-legacy-id="sec3" id="200388971" scrollto-destination="200388971"><span data-dcnode-id="2651" instrument_node="">Is Trump a weak president?</span></h2><span data-dcnode-id="2649" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">The combination of Trump's political inexperience, temper tantrums, poor impulse control and short attention span has impaired his presidency. These psychological traits help to explain why numerous political scientists claim that Trump's policy accomplishments have been meagre compared to those of past presidents.</span></p><p class="chapter-para" data-dcnode-id="2636"><span data-dcnode-id="2646" instrument_node="">Despite Republican control over both houses of Congress during the first two years of his presidency, Trump was able during this period to secure the passage of only one significant piece of legislation: the tax bill. He failed in his efforts to get Congress to provide appreciable funding for his border wall with Mexico. Federal bureaucrats resisted the president's ethically dubious orders by using leaks, delays, memos, dissent channels, whistleblowing, official complaints and congressional testimony.</span><sup data-dcnode-id="2642"><span class="xrefLink" data-dcnode-id="2645" id="jumplink-fn55"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2643" data-google-interstitial="false" data-open="fn55" href="javascript:;" reveal-id="fn55"><span data-dcnode-id="2644" instrument_node="">55</span></a></sup><span data-dcnode-id="2641" instrument_node=""> Even on policies where the Trump administration has been perceived as doing something, it has been ineffective.</span><sup data-dcnode-id="2637"><span class="xrefLink" data-dcnode-id="2640" id="jumplink-fn56"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2638" data-google-interstitial="false" data-open="fn56" href="javascript:;" reveal-id="fn56"><span data-dcnode-id="2639" instrument_node="">56</span></a></sup></p><p class="chapter-para" data-dcnode-id="2630"><span data-dcnode-id="2635" instrument_node="">In foreign affairs, Trump's biggest success has been the defeat of Islamic State in Iraq and Syria; but that was achieved only through continuation of a strategy mapped out under the Obama administration. His fitful efforts to withdraw US forces from Syria led to sufficient pushback from the military to allow for a residual force to remain. A US official likened the Defense Department's effort to persuade Trump to keep some US troops in Syria to ‘feeding a baby its medicine in yogurt or applesauce’.</span><sup data-dcnode-id="2631"><span class="xrefLink" data-dcnode-id="2634" id="jumplink-fn57"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2632" data-google-interstitial="false" data-open="fn57" href="javascript:;" reveal-id="fn57"><span data-dcnode-id="2633" instrument_node="">57</span></a></sup></p><p class="chapter-para" data-dcnode-id="2618"><span data-dcnode-id="2629" instrument_node="">Trump has failed to convert US leverage into appreciable gains in either trade deals or arms control agreements. His trade wars have cost the US economy more than the stimulus provided by the 2017 tax cuts and contributed to a manufacturing recession in 2019.</span><sup data-dcnode-id="2625"><span class="xrefLink" data-dcnode-id="2628" id="jumplink-fn58"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2626" data-google-interstitial="false" data-open="fn58" href="javascript:;" reveal-id="fn58"><span data-dcnode-id="2627" instrument_node="">58</span></a></sup><span data-dcnode-id="2624" instrument_node=""> None of his administration's ‘maximum pressure’ campaigns have yielded any concessions.</span><sup data-dcnode-id="2620"><span class="xrefLink" data-dcnode-id="2623" id="jumplink-fn59"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2621" data-google-interstitial="false" data-open="fn59" href="javascript:;" reveal-id="fn59"><span data-dcnode-id="2622" instrument_node="">59</span></a></sup><span data-dcnode-id="2619" instrument_node=""> His hard-line policies on immigration have not stemmed the tide of Central American families crossing the southern border to seek asylum. His one truly disruptive initiative, a series of summits with North Korean leader Kim Jong-un, has produced more symbolism than security.</span></p><p class="chapter-para" data-dcnode-id="2592"><span data-dcnode-id="2617" instrument_node="">Trump has also failed to persuade the American people of the rightness of his policies. Despite a crescendo in rhetoric from the administration about the threat posed by unchecked immigration, in 2018 Gallup found a record-high 75 per cent of Americans believing immigration to be a good thing for the United States.</span><sup data-dcnode-id="2613"><span class="xrefLink" data-dcnode-id="2616" id="jumplink-fn60"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2614" data-google-interstitial="false" data-open="fn60" href="javascript:;" reveal-id="fn60"><span data-dcnode-id="2615" instrument_node="">60</span></a></sup><span data-dcnode-id="2612" instrument_node=""> The following year, despite the president's protectionist rhetoric, Gallup found public support for free trade at 74 per cent, the highest level in the past 25 years.</span><sup data-dcnode-id="2608"><span class="xrefLink" data-dcnode-id="2611" id="jumplink-fn61"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2609" data-google-interstitial="false" data-open="fn61" href="javascript:;" reveal-id="fn61"><span data-dcnode-id="2610" instrument_node="">61</span></a></sup><span data-dcnode-id="2607" instrument_node=""> Polling on Trump's most high-profile policy moves confirms their unpopularity. Either pluralities or majorities oppose the tariffs that were implemented in 2018. Majorities disagree with Trump's tweeted claim that ‘trade wars are good, and easy to win’.</span><sup data-dcnode-id="2603"><span class="xrefLink" data-dcnode-id="2606" id="jumplink-fn62"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2604" data-google-interstitial="false" data-open="fn62" href="javascript:;" reveal-id="fn62"><span data-dcnode-id="2605" instrument_node="">62</span></a></sup><span data-dcnode-id="2602" instrument_node=""> CNN found that Americans preferred by 63 per cent to 25 per cent maintaining good relations with allies to imposing tariffs. Nearly two-thirds of Americans—65 per cent—believed that other world leaders did not respect Trump.</span><sup data-dcnode-id="2598"><span class="xrefLink" data-dcnode-id="2601" id="jumplink-fn63"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2599" data-google-interstitial="false" data-open="fn63" href="javascript:;" reveal-id="fn63"><span data-dcnode-id="2600" instrument_node="">63</span></a></sup><span data-dcnode-id="2597" instrument_node=""> If Neustadt is correct in his view that the chief power of the presidency is the ability to persuade, then Donald Trump has been a weak, ineffectual president.</span><sup data-dcnode-id="2593"><span class="xrefLink" data-dcnode-id="2596" id="jumplink-fn64"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2594" data-google-interstitial="false" data-open="fn64" href="javascript:;" reveal-id="fn64"><span data-dcnode-id="2595" instrument_node="">64</span></a></sup></p><p class="chapter-para" data-dcnode-id="2578"><span data-dcnode-id="2591" instrument_node="">An ongoing theme as his presidency has progressed is that fewer people fear him on social media. In March 2019 the </span><em data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">New York Times</span></em><span data-dcnode-id="2588" instrument_node=""> reported that US-based companies had learned that Trump's threats were empty: ‘The president's scattershot attention span has diminished his power to persuade the business world to bend to his will … once fearsome tweet storms have devolved into ephemeral annoyances.’</span><sup data-dcnode-id="2584"><span class="xrefLink" data-dcnode-id="2587" id="jumplink-fn65"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2585" data-google-interstitial="false" data-open="fn65" href="javascript:;" reveal-id="fn65"><span data-dcnode-id="2586" instrument_node="">65</span></a></sup><span data-dcnode-id="2583" instrument_node=""> Foreign diplomats have had the same reaction to Trump's threatening tweets; the best thing to do is ignore them because they do not amount to much.</span><sup data-dcnode-id="2579"><span class="xrefLink" data-dcnode-id="2582" id="jumplink-fn66"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2580" data-google-interstitial="false" data-open="fn66" href="javascript:;" reveal-id="fn66"><span data-dcnode-id="2581" instrument_node="">66</span></a></sup></p><p class="chapter-para" data-dcnode-id="2571"><span data-dcnode-id="2577" instrument_node="">All of this is consistent with the perception that Trump possesses specific psychological traits that impair his presidency. The president's poor impulse control and temper tantrums render him incapable of credibly committing to any bargaining position; and this, in turn, has hampered his ability to negotiate with everyone, from Angela Merkel to the Taliban.</span><sup data-dcnode-id="2573"><span class="xrefLink" data-dcnode-id="2576" id="jumplink-fn67"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2574" data-google-interstitial="false" data-open="fn67" href="javascript:;" reveal-id="fn67"><span data-dcnode-id="2575" instrument_node="">67</span></a></sup><span data-dcnode-id="2572" instrument_node=""> Threats of coercion are only effective if they are credible. Deals to settle disputes are unobtainable unless the president of the United States can follow through on pledges. Because other actors perceive Trump as possessing the constancy of a toddler, they see correspondingly less need to comply with his dictates.</span></p><p class="chapter-para" data-dcnode-id="2550"><span data-dcnode-id="2570" instrument_node="">Trump's cognitive constraints intersect the institutional constraints that all modern US presidents have faced. A constellation of formal institutions, informal institutions, laws and social norms have accumulated to function as a straitjacket on any holder of the office. The constitution explicitly gave the president very few unilateral powers and endowed the congressional and judicial branches with considerable abilities to check presidential overreach.</span><sup data-dcnode-id="2566"><span class="xrefLink" data-dcnode-id="2569" id="jumplink-fn68"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2567" data-google-interstitial="false" data-open="fn68" href="javascript:;" reveal-id="fn68"><span data-dcnode-id="2568" instrument_node="">68</span></a></sup><span data-dcnode-id="2565" instrument_node=""> Scholars of American political development stress the erosion of patronage power and the rise of civil service protections as additional checks on presidential caprice.</span><sup data-dcnode-id="2561"><span class="xrefLink" data-dcnode-id="2564" id="jumplink-fn69"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2562" data-google-interstitial="false" data-open="fn69" href="javascript:;" reveal-id="fn69"><span data-dcnode-id="2563" instrument_node="">69</span></a></sup><span data-dcnode-id="2560" instrument_node=""> Beyond black-letter constitutional law and statutory restrictions, a welter of norms have emerged to restrict the power of the presidency. Presidents have long been expected to behave in accordance with unspoken standards and customs. Some political scientists describe these practices as ‘informal institutions’: unwritten but socially shared rules that are created, communicated and enforced outside legal frameworks and official channels.</span><sup data-dcnode-id="2556"><span class="xrefLink" data-dcnode-id="2559" id="jumplink-fn70"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2557" data-google-interstitial="false" data-open="fn70" href="javascript:;" reveal-id="fn70"><span data-dcnode-id="2558" instrument_node="">70</span></a></sup><span data-dcnode-id="2555" instrument_node=""> The combination of legal restrictions, bureaucratic autonomy and informal institutions explains why Barack Obama said immediately after the 2016 election: ‘One of the things you discover about being president is that there are all these rules and norms and laws and you've got to pay attention to them. And the people who work for you are also subject to those rules and norms.’</span><sup data-dcnode-id="2551"><span class="xrefLink" data-dcnode-id="2554" id="jumplink-fn71"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2552" data-google-interstitial="false" data-open="fn71" href="javascript:;" reveal-id="fn71"><span data-dcnode-id="2553" instrument_node="">71</span></a></sup></p><p class="chapter-para" data-dcnode-id="2539"><span data-dcnode-id="2549" instrument_node="">It is because of the accumulation of all these constraints that so many political scholars have argued that the presidency is a fundamentally weak institution. As noted above, Richard Neustadt argued that the president's chief power was the ability to persuade other actors to act in accordance with presidential preferences. Without the ability to persuade, Neustadt concluded, the president's powers were feeble: ‘In form all Presidents are leaders nowadays. In fact this guarantees no more than that they will be clerks.’</span><sup data-dcnode-id="2545"><span class="xrefLink" data-dcnode-id="2548" id="jumplink-fn72"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2546" data-google-interstitial="false" data-open="fn72" href="javascript:;" reveal-id="fn72"><span data-dcnode-id="2547" instrument_node="">72</span></a></sup><span data-dcnode-id="2544" instrument_node=""> Successive generations of scholars have echoed this point. William Howell and Terry Moe, for example, argued in 2016 that ‘the Constitution sees to it—purposely, by design—that [presidents] are significantly limited in the formal powers they wield and heavily constrained by the checks and balances formally imposed by the other branches.’</span><sup data-dcnode-id="2540"><span class="xrefLink" data-dcnode-id="2543" id="jumplink-fn73"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2541" data-google-interstitial="false" data-open="fn73" href="javascript:;" reveal-id="fn73"><span data-dcnode-id="2542" instrument_node="">73</span></a></sup></p><span data-dcnode-id="2538" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2536" data-legacy-id="sec4" id="200388981" scrollto-destination="200388981"><span data-dcnode-id="2537" instrument_node="">The imperial presidency in the twenty-first century</span></h2><span data-dcnode-id="2535" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2524"><span data-dcnode-id="2534" instrument_node="">Trump's individual psychology has undeniably hampered his ability to achieve policy goals, compared to past presidents. At the same time, the Trump presidency has also revealed the empowered nature of the office. Over the past century and more, the White House has amassed an increasing array of formal and informal powers, and Trump has been the beneficiary of these prerogatives. As the head of the executive branch, the president has at his disposal several ways of acting without consulting the other branches of government. These include executive orders, executive agreements, presidential proclamations, presidential memoranda, signed statements and national security directives.</span><sup data-dcnode-id="2530"><span class="xrefLink" data-dcnode-id="2533" id="jumplink-fn74"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2531" data-google-interstitial="false" data-open="fn74" href="javascript:;" reveal-id="fn74"><span data-dcnode-id="2532" instrument_node="">74</span></a></sup><span data-dcnode-id="2529" instrument_node=""> As American history has unfolded, presidents have availed themselves of these forms of direct action at an accelerating rate. William Howell concludes: ‘The president's powers of unilateral action exert just as much influence over public policy, and in some cases more, than the formal powers that presidency scholars have examined so carefully.’</span><sup data-dcnode-id="2525"><span class="xrefLink" data-dcnode-id="2528" id="jumplink-fn75"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2526" data-google-interstitial="false" data-open="fn75" href="javascript:;" reveal-id="fn75"><span data-dcnode-id="2527" instrument_node="">75</span></a></sup></p><p class="chapter-para" data-dcnode-id="2498"><span data-dcnode-id="2523" instrument_node="">Another reason for the erosion of constitutional checks and balances is that the other branches of government have voluntarily ceded authority to the executive branch. This has been most evident in foreign relations. Indeed, this was the wellspring of Arthur Schlesinger's concerns about an ‘imperial presidency’: ‘Confronted by presidential initiatives in foreign affairs, Congress and the courts, along with the press and the citizenry, often lack confidence in their own information and judgement and are likely to be intimidated by executive authority.’</span><sup data-dcnode-id="2519"><span class="xrefLink" data-dcnode-id="2522" id="jumplink-fn76"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2520" data-google-interstitial="false" data-open="fn76" href="javascript:;" reveal-id="fn76"><span data-dcnode-id="2521" instrument_node="">76</span></a></sup><span data-dcnode-id="2518" instrument_node=""> Congress has not formally declared war since 1942; but that has not stopped presidents from using military force dozens of times since then. Presidents have relied on the 2001 Authorization for Use of Military Force passed in the wake of the 9/11 attacks to authorize the use of force in Somalia, Syria and Yemen; Trump used it to kill Soleimani. The vast system of alliances has further empowered the president to deploy military forces without consulting Congress.</span><sup data-dcnode-id="2514"><span class="xrefLink" data-dcnode-id="2517" id="jumplink-fn77"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2515" data-google-interstitial="false" data-open="fn77" href="javascript:;" reveal-id="fn77"><span data-dcnode-id="2516" instrument_node="">77</span></a></sup><span data-dcnode-id="2513" instrument_node=""> Congress has demonstrated neither the will nor the capacity to claw back those powers.</span><sup data-dcnode-id="2509"><span class="xrefLink" data-dcnode-id="2512" id="jumplink-fn78"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2510" data-google-interstitial="false" data-open="fn78" href="javascript:;" reveal-id="fn78"><span data-dcnode-id="2511" instrument_node="">78</span></a></sup><span data-dcnode-id="2508" instrument_node=""> Similarly, after passing the disastrous 1930 Smoot–Hawley tariff that helped to trigger the Great Depression, Congress decided it could not responsibly execute its constitutional responsibilities on trade.</span><sup data-dcnode-id="2504"><span class="xrefLink" data-dcnode-id="2507" id="jumplink-fn79"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2505" data-google-interstitial="false" data-open="fn79" href="javascript:;" reveal-id="fn79"><span data-dcnode-id="2506" instrument_node="">79</span></a></sup><span data-dcnode-id="2503" instrument_node=""> Over the ensuing decades, it delegated many of those powers to the president. Polarization has further debilitated congressional power. Political scientists have found that presidents are both more able and more likely to act unilaterally when the legislative branch is paralysed by party division.</span><sup data-dcnode-id="2499"><span class="xrefLink" data-dcnode-id="2502" id="jumplink-fn80"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2500" data-google-interstitial="false" data-open="fn80" href="javascript:;" reveal-id="fn80"><span data-dcnode-id="2501" instrument_node="">80</span></a></sup></p><p class="chapter-para" data-dcnode-id="2491"><span data-dcnode-id="2497" instrument_node="">Foreign policy is the arena in which the powers of the other branches of government have receded the most. President Trump has used his authority to withdraw from a panoply of international treaties ranging from the Trans-Pacific Partnership to the Iranian nuclear deal to the Intermediate Nuclear Forces treaty. On trade, he has used his legal prerogatives to impose significant tariffs on a wide range of allies and adversaries. His administration imposed a travel ban on entry to the United States from several Muslim-majority countries, an action that has advanced neither American interests nor American values. His administration has overhauled a plethora of immigration policies to make them more restrictive,</span><sup data-dcnode-id="2493"><span class="xrefLink" data-dcnode-id="2496" id="jumplink-fn81"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2494" data-google-interstitial="false" data-open="fn81" href="javascript:;" reveal-id="fn81"><span data-dcnode-id="2495" instrument_node="">81</span></a></sup><span data-dcnode-id="2492" instrument_node=""> with effects including the separation of migrant families seeking asylum in the United States. He declared a ban on transgender people serving in the military. In each of these cases, Congress has been unable to restrain the president, and the Supreme Court has eventually sided with the Trump administration.</span></p><p class="chapter-para" data-dcnode-id="2479"><span data-dcnode-id="2490" instrument_node="">Ironically, before he was president, Trump repeatedly criticized Obama for executive branch overreach; and yet each year he has been in office, Trump has issued more executive orders than Obama.</span><sup data-dcnode-id="2486"><span class="xrefLink" data-dcnode-id="2489" id="jumplink-fn82"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2487" data-google-interstitial="false" data-open="fn82" href="javascript:;" reveal-id="fn82"><span data-dcnode-id="2488" instrument_node="">82</span></a></sup><span data-dcnode-id="2485" instrument_node=""> He is also enamoured of declaring states of emergency because these afford him greater power.</span><sup data-dcnode-id="2481"><span class="xrefLink" data-dcnode-id="2484" id="jumplink-fn83"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2482" data-google-interstitial="false" data-open="fn83" href="javascript:;" reveal-id="fn83"><span data-dcnode-id="2483" instrument_node="">83</span></a></sup><span data-dcnode-id="2480" instrument_node=""> For example, he used his declaration of a state of emergency along the southern border to justify an unprecedented reallocation of Defense Department funds to pay for construction of a wall after Congress refused to fund it.</span></p><p class="chapter-para" data-dcnode-id="2467"><span data-dcnode-id="2478" instrument_node="">Trump has resisted congressional oversight on every level, repeatedly ordering executive agencies to rebuff valid legislative requests for documents and testimony.</span><sup data-dcnode-id="2474"><span class="xrefLink" data-dcnode-id="2477" id="jumplink-fn84"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2475" data-google-interstitial="false" data-open="fn84" href="javascript:;" reveal-id="fn84"><span data-dcnode-id="2476" instrument_node="">84</span></a></sup><span data-dcnode-id="2473" instrument_node=""> Congress has responded by taking Trump to court, but the judiciary has proved to be a weak constraint on a presidency making full use of its powers. The courts demonstrated considerable deference to the executive branch long before Trump came on the political scene. In part, this is a matter of preserving their perceived power. Judges have no enforcement capabilities, relying on the executive branch. They are therefore understandably reluctant to referee disputes between the congressional and executive branches. They have developed legal rationales, such as the political questions doctrine, to avoid hearing challenges to the president. Analyses of judicial rulings on questions of executive branch overreach reveal that the courts have largely refrained from directly confronting the president; when they do rule on challenges to presidential power, they side with the president more than 80 per cent of the time.</span><sup data-dcnode-id="2469"><span class="xrefLink" data-dcnode-id="2472" id="jumplink-fn85"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2470" data-google-interstitial="false" data-open="fn85" href="javascript:;" reveal-id="fn85"><span data-dcnode-id="2471" instrument_node="">85</span></a></sup><span data-dcnode-id="2468" instrument_node=""> Furthermore, even when federal courts have ruled against the president, they have done so in as narrow a manner as possible. The result has been that the president has amassed significant levers of power subject to fewer checks and balances than Americans commonly realize.</span></p><p class="chapter-para" data-dcnode-id="2461"><span data-dcnode-id="2466" instrument_node="">In these efforts at resisting congressional and judicial constraints, Trump has been aided by conservative lawyers advancing a particularly strong version of unitary executive theory. This theory argues that the legislative and judicial branches should not interfere with presidential actions within the executive branch. In a speech of November 2019 to the Federalist Society, Attorney General William Barr asserted executive branch dominance in foreign affairs despite explicit provisions conferring powers over war and trade to Congress, claiming: ‘The Constitution generally vested authority over [foreign affairs] in the Executive.’</span><sup data-dcnode-id="2462"><span class="xrefLink" data-dcnode-id="2465" id="jumplink-fn86"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2463" data-google-interstitial="false" data-open="fn86" href="javascript:;" reveal-id="fn86"><span data-dcnode-id="2464" instrument_node="">86</span></a></sup></p><p class="chapter-para" data-dcnode-id="2450"><span data-dcnode-id="2460" instrument_node="">A similar story can be told with respect to executive branch constraints on the presidency. The autonomy of the federal bureaucracy was under assault well before the Toddler-in-Chief was inaugurated. Beginning with the Nixon administration, successive presidents learned how to shape the permanent bureaucracy in accordance with their policy preferences.</span><sup data-dcnode-id="2456"><span class="xrefLink" data-dcnode-id="2459" id="jumplink-fn87"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2457" data-google-interstitial="false" data-open="fn87" href="javascript:;" reveal-id="fn87"><span data-dcnode-id="2458" instrument_node="">87</span></a></sup><span data-dcnode-id="2455" instrument_node=""> One month into the Trump administration, White House adviser Steve Bannon proclaimed a daily war aimed at the ‘deconstruction of the administrative state’.</span><sup data-dcnode-id="2451"><span class="xrefLink" data-dcnode-id="2454" id="jumplink-fn88"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2452" data-google-interstitial="false" data-open="fn88" href="javascript:;" reveal-id="fn88"><span data-dcnode-id="2453" instrument_node="">88</span></a></sup></p><p class="chapter-para" data-dcnode-id="2414"><span data-dcnode-id="2449" instrument_node="">The State Department is the cabinet agency that has suffered the most from this destruction. The attacks on the foreign service have been unrelenting. In the first week of the Trump administration, the ‘Muslim travel ban’ triggered a State Department dissent channel memo that garnered more than 1,000 signatures. The dissent channel was established precisely to protect diplomats who were making an argument contrary to existing US foreign policy. Nonetheless, in response, White House Press Secretary Sean Spicer said: ‘These career bureaucrats have a problem with it? I think they should either get with the program or they can go.’</span><sup data-dcnode-id="2445"><span class="xrefLink" data-dcnode-id="2448" id="jumplink-fn89"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2446" data-google-interstitial="false" data-open="fn89" href="javascript:;" reveal-id="fn89"><span data-dcnode-id="2447" instrument_node="">89</span></a></sup><span data-dcnode-id="2444" instrument_node=""> The White House quickly forced several senior career ambassadors out of their positions, a move labelled the ‘Mahogany Row massacre’.</span><sup data-dcnode-id="2440"><span class="xrefLink" data-dcnode-id="2443" id="jumplink-fn90"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2441" data-google-interstitial="false" data-open="fn90" href="javascript:;" reveal-id="fn90"><span data-dcnode-id="2442" instrument_node="">90</span></a></sup><span data-dcnode-id="2439" instrument_node=""> One diplomat was told that a Trump appointee would oppose any foreign service officers applying for leadership positions unless they passed the ‘Breitbart test’, referring to the online outlet that espouses populist nationalism.</span><sup data-dcnode-id="2435"><span class="xrefLink" data-dcnode-id="2438" id="jumplink-fn91"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2436" data-google-interstitial="false" data-open="fn91" href="javascript:;" reveal-id="fn91"><span data-dcnode-id="2437" instrument_node="">91</span></a></sup><span data-dcnode-id="2434" instrument_node=""> Another diplomat was fired just for mentioning President Obama in a speech.</span><sup data-dcnode-id="2430"><span class="xrefLink" data-dcnode-id="2433" id="jumplink-fn92"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2431" data-google-interstitial="false" data-open="fn92" href="javascript:;" reveal-id="fn92"><span data-dcnode-id="2432" instrument_node="">92</span></a></sup><span data-dcnode-id="2429" instrument_node=""> The State Department's inspector general concluded that political appointees took punitive actions towards diplomats deemed insufficiently loyal to Trump.</span><sup data-dcnode-id="2425"><span class="xrefLink" data-dcnode-id="2428" id="jumplink-fn93"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2426" data-google-interstitial="false" data-open="fn93" href="javascript:;" reveal-id="fn93"><span data-dcnode-id="2427" instrument_node="">93</span></a></sup><span data-dcnode-id="2424" instrument_node=""> These attacks have eroded the influence of career professionals and triggered an exodus of senior personnel.</span><sup data-dcnode-id="2420"><span class="xrefLink" data-dcnode-id="2423" id="jumplink-fn94"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2421" data-google-interstitial="false" data-open="fn94" href="javascript:;" reveal-id="fn94"><span data-dcnode-id="2422" instrument_node="">94</span></a></sup><span data-dcnode-id="2419" instrument_node=""> However, when asked in the autumn of 2017 about the dearth of State Department officials, Trump replied: ‘Let me tell you, the one that matters is me. I'm the only one that matters, because when it comes to it, that's what the policy is going to be.’</span><sup data-dcnode-id="2415"><span class="xrefLink" data-dcnode-id="2418" id="jumplink-fn95"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2416" data-google-interstitial="false" data-open="fn95" href="javascript:;" reveal-id="fn95"><span data-dcnode-id="2417" instrument_node="">95</span></a></sup></p><p class="chapter-para" data-dcnode-id="2400"><span data-dcnode-id="2413" instrument_node="">For all the claims made in 2017 that the ‘adults in the room’ would rein in Trump's more capricious policy moves, his staff no longer serve as a significant constraint on the president. Instead, they are enablers, reverse engineering policies and providing justifications for Trump's worst impulses. Trump's acting chief of staff Mick Mulvaney rationalized a White House advance staffer's request to keep the USS </span><em data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">John McCain</span></em><span data-dcnode-id="2410" instrument_node=""> hidden from Trump's view during a May 2019 visit to Japan as ‘not
