jE1/photo-by-drew-angerergetty-imagesjpg.jpg 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_1240/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.jpg 1240w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_700/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.jpg 700w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_1400/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.jpg 1400w" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)"><img alt="Donald Trump" class="m-detail--tml-image m-image" data-dcnode-id="1133" data-src="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_700/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.jpg" decoding="async" height="3648" itemprop="contentUrl url" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/.image/t_share/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.jpg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="5472"></picture></a><div class="m-detail--tml-image-wrapper" data-dcnode-id="1129" style="max-width:5472px; min-width:0px;"><div class="m-detail--tml-image-container" data-dcnode-id="1130" style="padding-top: 67%"></div></div></phoenix-picture><figcaption data-dcnode-id="1118"><p class="tml-image--caption" data-dcnode-id="1122" itemprop="caption"><span data-dcnode-id="1123" instrument_node="">Donald Trump</span></p><p class="tml-image--attribution" data-dcnode-id="1119" itemprop="author"><span data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Photo: Drew Angerer/Getty Images</span></span></p></figcaption></figure></div><h3 data-dcnode-id="1114" id="death-of-abu-bakr-al-baghdadi"><span data-dcnode-id="1115" instrument_node="">Death of Abu Bakr al-Baghdadi</span></h3><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">In late October 2019, Trump announced that the leader of the Islamic State, Abu Bakr al-Baghdadi, was dead following a daring American commando raid in Syria. According to the president, the militant leader was chased to the end of an underground tunnel, "whimpering and crying and screaming all the way," before detonating a suicide vest. The announcement came amid the controversy over the withdrawal of troops from the region, with critics pointing to the American military presence and intelligence contributions from Kurdish allies as factors that led to the success of the mission.</span></p><h2 data-dcnode-id="1110" id="trade-war"><span data-dcnode-id="1111" instrument_node="">Trade War</span></h2><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">On March 1, 2018, after the conclusion of a Commerce Department investigation, Trump announced that he was imposing tariffs of 25 percent on steel imports and 10 percent on aluminum. He ultimately granted temporary exemptions as he sought to renegotiate deals.</span></p><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">His actions resulted in new agreements with South Korea and multiple South American countries to restrain their metal exports. Talks with China, the E.U. and the border countries stalled. In late May, the administration announced that it was moving forward with all tariffs.</span></p><p data-dcnode-id="1098"><span data-dcnode-id="1105" instrument_node="">The move drew a harsh response from the E.U., Canada and Mexico, which announced retaliatory measures. With Canadian Prime Minister </span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/justin-trudeau"><span data-dcnode-id="1104" instrument_node="">Justin Trudeau</span></a><span data-dcnode-id="1102" instrument_node=""> condemning Trump's "unacceptable actions" and French President </span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/emmanuel-macron-050817"><span data-dcnode-id="1101" instrument_node="">Emmanuel Macron</span></a><span data-dcnode-id="1099" instrument_node=""> threatening to isolate the U.S. from the Group of 7, the president faced a frosty reception at the G-7 summit in Quebec in June. </span></p><p data-dcnode-id="1093"><span data-dcnode-id="1097" instrument_node="">He ultimately left the summit early, making headlines on the way out by announcing he would not sign a communique between the seven nations and taking shots at Trudeau on Twitter. In July, Trump again had harsh words for allies at the NATO summit in Brussels, Belgium, including accusations that Germany was "captive" to Russia for its dependence on Russian natural gas, and followed with criticism of U.K. Prime Minister </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/theresa-may-071116"><span data-dcnode-id="1096" instrument_node="">Theresa May</span></a><span data-dcnode-id="1094" instrument_node=""> for her handling of Brexit.</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Back home, the president attempted to head off the political fallout of a potentially costly trade war with the announcement that the administration would provide up to $12 billion in emergency relief funds for U.S. farmers. The following summer, the administration revealed details for a new, $16 billion aid package for struggling farmers.&nbsp;</span></p><h2 data-dcnode-id="1089" id="china"><span data-dcnode-id="1090" instrument_node="">China</span></h2><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">In April 2018, the Trump administration announced it was adding a 25 percent tariff on more than 1,000 Chinese products to penalize the country for its trade practices. He granted temporary exemptions to negotiate a deal. In late May, he moved forward with a tax on $34 billion worth of Chinese goods that went into effect in July.</span></p><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">The trade war with China escalated in May 2019, when the president gave the go-ahead to raise tariffs to 25 percent on $200 billion worth of Chinese goods. The increase came as the two countries were attempting to hammer out terms for a new trade deal.</span></p><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">The following month, after Trump used the threat of tariffs to obtain expanded border-security measures from Mexico, the president turned his attention back to China with the suggestion that another $300 billion in Chinese goods would be taxed should trade talks continue to stall. He announced a 5 percent hike in late August and threatened another 5 percent increase by October, before agreeing to delay the latter as he continued to push for an all-encompassing trade deal.</span></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">In October, the president gushed about the "very substantial phase one deal" reached with China, saying a final agreement on matters related to intellectual property, financial services and agriculture would take three to five weeks to put in place. Signed in mid-January 2020, the deal included commitments from China to purchase an additional $200 billion of U.S. products over the next two years and to refrain from currency manipulation and intellectual property theft.</span></p><h3 data-dcnode-id="1079" id="taiwan"><span data-dcnode-id="1080" instrument_node="">Taiwan</span></h3><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">In June 2019, Trump announced that the U.S. would be selling more than $2 billion in tanks and military equipment to Taiwan, one of its largest sales in recent years. The move added tension to China’s relationship with the U.S. The U.S. is the largest supplier of arms to Taiwan, which could help stave off an eventual invasion of Taiwan by the Chinese military. </span></p><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">The U.S. does not officially recognize Taiwan, a de facto independent island that the communist Chinese government plans to bring back under its control, with force if necessary. However, U.S. officials see Taiwan as an important counterweight to China in the region and have expressed concern about China’s actions toward Taiwan. In 2018, to the ire of Chinese officials, the Pentagon began ordering naval ships to sail through the Taiwan Strait as a show of military power.</span></p><h2 data-dcnode-id="1073" id="israel-and-the-recognition-of-jerusalem"><span data-dcnode-id="1074" instrument_node="">Israel and the Recognition of Jerusalem</span></h2><p data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">On December 6, 2017, Trump announced that the U.S. was formally recognizing Jerusalem as the capital of </span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/middle-east/history-of-israel" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1071" instrument_node="">Israel</span></a><span data-dcnode-id="1069" instrument_node="">, and would move the American embassy there from its current location in Tel Aviv. The declaration broke decades of precedent, in which the U.S. refused to take sides in the conflict between Israelis and Palestinians over territorial rights to the city.</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Fulfilling one of his campaign pledges, Trump referred to the move as "a long overdue step to advance the peace process," noting it "would be folly to assume that repeating the exact same formula would now produce a different or better result." He also stressed that the move would not interfere with any proposals for a two-state solution.</span></p><p data-dcnode-id="1061"><span data-dcnode-id="1065" instrument_node="">The announcement was praised by Israeli Prime Minister </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/benjamin-netanyahu-9421908"><span data-dcnode-id="1064" instrument_node="">Benjamin Netanyahu</span></a><span data-dcnode-id="1062" instrument_node=""> but not as warmly received by American allies France, Britain and Germany, which called it disruptive to the peace process. Leaders of the predominantly Muslim countries Saudi Arabia, Turkey, Jordan, Egypt and Lebanon all condemned the move, while Palestinian President Mahmoud Abbas said the U.S. could no longer be considered a mediator in the region.</span></p><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">On December 21, the U.N. General Assembly voted 128 to 9 to demand that the U.S. rescind its formal recognition of Jerusalem. Britain, France, Germany and Japan all voted for the resolution, though others, like Australia and Canada, abstained from the symbolic vote.</span></p><p data-dcnode-id="1054"><span data-dcnode-id="1058" instrument_node="">After dispatching Vice President </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/mike-pence-071416"><span data-dcnode-id="1057" instrument_node="">Mike Pence</span></a><span data-dcnode-id="1055" instrument_node=""> to help smooth things over with Arab leaders in the Middle East, Trump sought to reestablish ties with American allies at the World Economic Forum in Davos, Switzerland, in January 2018. He praised U.K. Prime Minister May and enjoyed a friendly meeting with Netanyahu, though he also took a shot at the Palestinian Authority for refusing to meet with Pence.</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Continuing with a recalibrated approach to relations with its Middle Eastern ally, the Trump administration announced&nbsp;in November 2019&nbsp;that it no longer considered Israeli settlements in the West Bank to be illegal under international law.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">A few weeks later, the president sought to bolster support among American Jews by signing an executive order aimed at cracking down on anti-Semitism at college campuses. The order effectively allowed the government to recognize Judaism as both a race or nationality and religion, empowering the Education Department to withhold funding from&nbsp;college or educational programs accused of discriminatory actions against Jews.</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">In January 2020, Trump revealed his "deal of the century" proposal for a two-state solution. His plan envisioned Jerusalem remaining the capital of Israel, with Palestinians getting their own capital in the eastern part of the city, and the authority for Israel to move forward with annexing its West Bank settlements. The proposal was quickly rejected by Palestinians, with Abbas dismissing it as the "slap of the century." In September 2020, Trump presided over the signing of accords between Israel, Bahrain and the United Arab Emirates, in which the two Arab countries normalized relations with Israel.</span></p><h2 data-dcnode-id="1046" id="iran"><span data-dcnode-id="1047" instrument_node="">Iran</span></h2><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">In May 2018, over the objections of European allies, Trump announced that he was withdrawing the U.S. from the Iran nuclear deal enacted by his predecessor and reimposing sanctions on the Middle Eastern country.</span></p><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">The announcement initially drew a tepid response from Iran, but President Hassan Rouhani had stronger words on the issue while addressing diplomats in July, noting that "war with Iran is the mother of all wars" and warning his American counterpart to "not play with the lion's tail, because you will regret it eternally."</span></p><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">That seemingly enraged Trump, who fired off an all-caps tweet addressed to Rouhani: "Never, ever threaten the United States again or you will suffer consequences the likes of which few throughout history have ever suffered before," he wrote. "We are no longer a country that will stand for your demented words of violence &amp; death. Be cautious!"</span></p><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Tensions mounted again by April 2019, when the Trump administration announced it would no longer grant economic exemptions to the five countries — China, India, Japan, South Korea and Turkey — which had been permitted to buy oil from Iran. Several oil tankers were subsequently attacked near the Strait of Hormuz, with the U.S. holding Iran responsible for the brazen actions.</span></p><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">In June 2019, the Iranian military shot down an American drone over contested airspace. Trump said he was minutes away from ordering a strike in retaliation, before electing to impose new sanctions instead.</span></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">In late December, after an American civilian contractor was killed in a rocket attack on an Iraqi base, the U.S. carried out military strikes against an Iranian-backed militia deemed responsible for the attack. After protesters responded by breaching the outer wall of the U.S. Embassy in Iraq, the animosity escalated with the&nbsp;death of General Qassem Soleimani, Iran's top security and intelligence commander, in a drone strike authorized by President Trump.</span></p><h2 data-dcnode-id="1032" id="cuba-and-travel-restrictions"><span data-dcnode-id="1033" instrument_node="">Cuba and Travel Restrictions</span></h2><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">To pressure Cuba’s communist government to reform and end its support for Venezuelan President Nicolas Maduro, Trump tightened travel restrictions to Cuba in April 2019. </span></p><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">&nbsp;In June 2019, Trump announced that the State Department would no longer allow private or public ships and aircraft to visit Cuba. The U.S. will also no longer allow “people-to-people” educational travel, which previously proved to be a popular travel exemption. Tourist groups may still be able to get around the ban by applying one of the other 11 travel exemptions that are still allowed. In September 2020, Trump announced new sanctions aimed at curtailing U.S. travel to Cuba.</span></p><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">President Obama loosened travel restrictions to Cuba following decades of detente between the countries, initiating a short-lived travel boom to the area.</span></p><h2 data-dcnode-id="1024" id="charlottesville-rally"><span data-dcnode-id="1025" instrument_node="">Charlottesville Rally</span></h2><p data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node="">On August 12, 2017, a group of white nationalists in Charlottesville, Virgina, gathered for a “Unite the Right” rally to protest the removal of a statue of Confederate general </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/robert-e-lee-9377163"><span data-dcnode-id="1022" instrument_node="">Robert E. Lee</span></a><span data-dcnode-id="1020" instrument_node="">. People in favor of removing the statue felt that it was a symbol implicitly endorsing white supremacy, while the protesters believed removing it was an attempt at erasing history. </span></p><p data-dcnode-id="1014"><span data-dcnode-id="1018" instrument_node="">The rally attracted </span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/ku-klux-klan" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1017" instrument_node="">Ku Klux Klan</span></a><span data-dcnode-id="1015" instrument_node=""> and neo-Nazis, including former KKK leader David Duke, who told reporters that the protesters were “going to fulfill the promises of Donald Trump” to “take our country back.” </span></p><p data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">When counter-protesters arrived, the demonstration turned violent with racial slurs, pushing and brawling. Then a car, driven by a man who appeared to show marching earlier that day alongside Neo-Nazis in a </span><em data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">CNN</span></em><span data-dcnode-id="1010" instrument_node=""> photo plowed into the crowd, killing a 32-year-old counter-protester and injuring at least 19 others.</span></p><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">In comments that day, Trump did not specifically criticize the white nationalists and blamed “hatred, bigotry and violence on many sides.” Two days later, following criticism about his refusal to denounce hate groups, Trump delivered a speech at the White House. “Racism is evil. And those who cause violence in its name are criminals and thugs, including the K.K.K., neo-Nazis, white supremacists and other hate groups that are repugnant to everything we hold dear as Americans,” he said. </span></p><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">However, the same day, Kevin Plank, the head of Under Armour, and Kenneth C. Frazier, the African American head of Merck Pharmaceuticals, announced they were resigning from the president’s American Manufacturing Council in reaction to the events. Trump tweeted: “Now that Ken Frazier of Merck Pharma has resigned from President’s Manufacturing Council, he will have more time to LOWER RIPOFF DRUG PRICES!” The next day, Trump reaffirmed his initial comments, telling reporters: “I think there is blame on both sides.”</span></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">On September 15, Trump re-defended his comments after meeting with Republican Sen. Tim Scott of South Carolina: "I think especially in light of the advent of antifa, if you look at what's going on there, you know, you have some pretty bad dudes on the other side also. And essentially that's what I said." (Antifa is an anti-fascist protest movement that sometimes uses violent tactics to defend against neo-Nazis and white supremacists.) </span></p><h2 data-dcnode-id="1001" id="trump-and-obama"><span data-dcnode-id="1002" instrument_node="">Trump and Obama</span></h2><h3 data-dcnode-id="999" id="birther-controversy"><span data-dcnode-id="1000" instrument_node="">“Birther” Controversy</span></h3><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Beginning in early 2011, Trump expressed doubts about the validity of Obama’s birth country to media outlets. To quell the staunch outcry from birtherists, Obama eventually released his birth certificate in April 2011, verifying that he was born in the United States. Regardless, Trump continued to be a vocal critic of President Obama—not only regarding his place of birth, but also on a variety of his policies.</span></p><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">In 2013, Trump tweeted that a Hawaiian State Health Director, who died of cardiac arrhythmia following a plane crash, was somehow connected to a cover-up of President Obama's birth certificate. In 2016, as he began to clinch his own nomination as the GOP candidate for president, Trump toned down his stance, telling CNN, “I have my own theory on Obama. Someday I will write a book.”</span></p><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Later that fall, feeling pressure from his campaign advisors to put the conspiracy theory to rest as part of a strategy to appeal to minority voters, Trump issued a statement: "President Barack Obama was born in the United States, period.” At the same time, he also blamed his presidential rival, Hillary Clinton, and her campaign for starting the birther controversy.</span></p><h3 data-dcnode-id="991" id="wiretapping-allegations"><span data-dcnode-id="992" instrument_node="">Wiretapping Allegations</span></h3><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">On March 4, 2017, without citing specific evidence, Trump released a series of tweets accusing former President Obama of wiretapping the campaign headquarters at Trump Tower before the election.</span></p><p data-dcnode-id="984"><span data-dcnode-id="988" instrument_node="">FBI Director </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/james-comey-051217"><span data-dcnode-id="987" instrument_node="">James Comey</span></a><span data-dcnode-id="985" instrument_node=""> asked the Justice Department to issue a statement refuting Trump’s allegation, while the White House called for a congressional investigation into Trump’s claims. </span></p><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">On March 16, 2017, bipartisan leaders from the Senate Intelligence Committee said there was no evidence to support the president’s claim that Trump Tower had been wiretapped. On March 20, 2017, Comey addressed the wiretapping allegations, saying that he had “no information that supports those tweets and we have looked carefully inside the FBI.” </span></p><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Comey also confirmed that the FBI was investigating the Russian government's efforts to interfere in the 2016 presidential election, including links and coordination between individuals associated with the Trump campaign and the Russian government as well as whether any crimes were committed.</span></p><h2 data-dcnode-id="978" id="comey-and-trump"><span data-dcnode-id="979" instrument_node="">Comey and Trump</span></h2><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">On May 9, 2017, Trump abruptly fired Comey, who was in the midst of leading the investigation into whether any Trump advisers colluded with Russia to influence the outcome of the presidential election. </span></p><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">The president said he based his decision on recommendations from Attorney General Sessions and Deputy Attorney General Rod Rosenstein, who asserted that Comey should be dismissed over his handling of the investigation of Hillary Clinton's use of a private email server while she was secretary of state.</span></p><p data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">The announcement sent shockwaves throughout the government, with critics comparing Comey's dismissal to the 1973 "Saturday Night Massacre" when President Richard Nixon fired Archibald Cox, the special prosecutor investigating the </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/1970s/watergate" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="972" instrument_node="">Watergate scandal</span></a><span data-dcnode-id="970" instrument_node=""> which eventually led to Nixon's resignation.</span></p><p data-dcnode-id="964"><span data-dcnode-id="968" instrument_node="">Democratic Senate Minority Leader </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/chuck-schumer-111816"><span data-dcnode-id="967" instrument_node="">Charles Schumer</span></a><span data-dcnode-id="965" instrument_node=""> told reporters at a press conference that “every American will rightly suspect that the decision to fire Director Comey was part of a cover-up.” </span></p><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Trump later told reporters at the White House that he had fired Comey “because he wasn’t doing a good job,” and he told Lester Holt in an NBC News interview that his decision was not solely based on recommendations from Sessions and Rosenstein. "Regardless of the recommendation, I was going to fire Comey," the president told Holt in the televised interview.</span></p><p data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">There was more fallout a week after Comey's firing when the </span><em data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">New York Times</span></em><span data-dcnode-id="958" instrument_node=""> reported that Trump had asked Comey to shut down the investigation into former national security adviser Michael Flynn. </span></p><p data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">According to the </span><em data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">New York Times, </span></em><span data-dcnode-id="953" instrument_node="">Comey wrote in a memo that the president told him in a meeting a day after Flynn resigned: "I hope you can see your way clear to letting this go, to letting Flynn go. He is a good guy. I hope you can let this go." The White House denied this claim in a statement.</span></p><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">On June 8, Comey made a highly anticipated appearance before the Senate Intelligence Committee. He accused Trump of lying to the public about the nature of his tenure and dismissal, noting that he believed he was fired to affect the FBI probe into Russia's influence in the 2016 election.</span></p><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="930"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="931" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="942"><a data-dcnode-id="945"><picture class="is-waiting-to-load" data-dcnode-id="946"><source data-dcnode-id="949" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_380/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.webp 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_620/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.webp 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1240/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.webp 1240w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_700/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.webp 700w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1400/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.webp 1400w" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)" type="image/webp"><source data-dcnode-id="948" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_380/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.jpg 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_620/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.jpg 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_1240/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.jpg 1240w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_700/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.jpg 700w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_1400/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.jpg 1400w" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)"><img alt="Barron Trump Photo" class="m-detail--tml-image m-image" data-dcnode-id="947" data-src="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_700/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.jpg" decoding="async" height="2000" itemprop="contentUrl url" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/.image/t_share/MTUxODYzMjQ4Njc5ODcxNjE0/gettyimages-877137998.jpg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="3000"></picture></a><div class="m-detail--tml-image-wrapper" data-dcnode-id="943" style="max-width:3000px; min-width:0px;"><div class="m-detail--tml-image-container" data-dcnode-id="944" style="padding-top: 67%"></div></div></phoenix-picture><figcaption data-dcnode-id="932"><p class="tml-image--caption" data-dcnode-id="936" itemprop="caption"><span data-dcnode-id="937" instrument_node="">Barron Trump joins his father U.S. President Donald Trump as he makes remarks before pardoning the National Thanksgiving Turkey with National Turkey Federation Chairman Carl Wittenburg and his family in the Rose Garden at the White House November 21, 2017, in Washington, D.C.</span></p><p class="tml-image--attribution" data-dcnode-id="933" itemprop="author"><span data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Photo: Chip Somodevilla/Getty Images</span></span></p></figcaption></figure></div><h2 data-dcnode-id="928" id="mueller-investigation-of-donald-trump"><span data-dcnode-id="929" instrument_node="">Mueller Investigation of Donald Trump</span></h2><p data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">On May 17, 2017, Deputy Attorney General Rosenstein selected </span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/robert-mueller-241110"><span data-dcnode-id="926" instrument_node="">Robert Mueller</span></a><span data-dcnode-id="924" instrument_node="">, former federal prosecutor and FBI director, to serve as a special counsel to lead the investigation into Russian meddling in the 2016 presidential election and possible ties to the Trump campaign. </span></p><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">On March 24, 2019, two days after Mueller closed his investigation by submitting a report to Attorney General Barr, the AG summarized the report's content in a letter to congressional leaders. He wrote that there was no evidence of collusion between the Trump campaign and Russian agents, but noted the special counsel's wording about whether the president obstructed justice: "while this report does not conclude that the president committed a crime, it also does not exonerate him." Nonetheless, Trump declared complete exoneration, disparaging the 22-month investigation as an "illegal takedown that failed."</span></p><p data-dcnode-id="916"><span data-dcnode-id="920" instrument_node="">On October 30, 2018, Mueller announced the first indictments of his investigation, ensnaring former Trump campaign chairman </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/paul-manafort-121417"><span data-dcnode-id="919" instrument_node="">Paul Manafort</span></a><span data-dcnode-id="917" instrument_node=""> and his associate Rick Gates on charges of tax fraud, money laundering and foreign lobbying violations. On December 1, Flynn pleaded guilty to one count of lying to the FBI and said he was cooperating with Mueller's team.</span></p><p data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">In January 2018, news surfaced that Mueller was seeking an interview with Trump to inquire about his dismissal of Comey and Flynn, among other topics. The president publicly welcomed that idea, saying he was "looking forward to it." Days later the </span><em data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">New York Times</span></em><span data-dcnode-id="912" instrument_node=""> reported that Trump had sought to fire Mueller the previous June, before backing off when the White House counsel protested.</span></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">In early February, the president gave the go-ahead for House Republicans to release a controversial memo that summarized the FBI's attempts to obtain a warrant to wiretap former Trump campaign associate Carter Page. According to the memo, the FBI and DOJ had relied on information from an infamous dossier, whose author was commissioned by the Democratic Party to dig up dirt on Trump. House Democrats countered that the memo left out important information to make it seem that the FBI was biased against Trump, thereby discrediting the bureau's involvement in the Mueller probe.</span></p><p data-dcnode-id="904"><span data-dcnode-id="908" instrument_node="">In April, </span><em data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">The Times</span></em><span data-dcnode-id="905" instrument_node=""> obtained and published a list of four dozen questions that Mueller hoped to ask Trump, ranging from the president's contacts with Manafort to his understanding of the June 2016 meeting at Trump Tower conducted by his oldest son, to the intentions behind some of his tweets as related to possible obstruction of justice. Ultimately, the president never sat down for face-to-face questioning by Mueller, instead of submitting written responses.</span></p><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Mueller’s report was released in March 2019, finding no evidence of collusion but offering obtuse language on whether the president obstructed justice. The furor over the report didn't die down, particularly since the redacted version that was released raised more questions about obstruction and whether Barr was attempting to shield the president from congressional scrutiny. </span></p><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">In May 2019, after Trump exerted executive privilege to block the release of the unredacted report. The House Judiciary Committee voted to recommend that the House hold the attorney general in contempt of Congress.</span></p><h2 data-dcnode-id="898" id="trump-and-stormy-daniels"><span data-dcnode-id="899" instrument_node="">Trump and Stormy Daniels </span></h2><p data-dcnode-id="893"><span data-dcnode-id="897" instrument_node="">Adult-film star Stephanie Clifford, known by her stage name of </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/stormy-daniels"><span data-dcnode-id="896" instrument_node="">Stormy Daniels</span></a><span data-dcnode-id="894" instrument_node="">, reportedly signed a nondisclosure agreement just before the 2016 election to remain silent on her affair with Trump. </span></p><p data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">After the </span><em data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Wall Street Journal</span></em><span data-dcnode-id="889" instrument_node=""> reported on the situation in early 2018, the Daniels saga became part of the news cycle, leading to a much-publicized appearance on Jimmy Kimmel's late-night show in which she played coy on the issue. </span></p><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">In February 2018, Trump's longtime personal lawyer, Michael Cohen, admitted to paying Daniels $130,000 out of his own pocket, though he did not say what the payment was for. In March, Daniels broke her silence on the subject, insisting that the nondisclosure agreement was invalid because Trump had never signed it.</span></p><p data-dcnode-id="878"><span data-dcnode-id="885" instrument_node="">Late March brought a </span><em data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">60 Minutes</span></em><span data-dcnode-id="882" instrument_node=""> interview with Daniels, in which she described her alleged tryst with Trump, as well as a parking lot encounter with an unknown man who warned her to stop discussing the affair in public. The piece aired shortly after a televised interview with another alleged Trump mistress, former </span><em data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Playboy</span></em><span data-dcnode-id="879" instrument_node=""> model Karen McDougal, who said she had fallen in love with Trump during their time together.</span></p><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The president delivered his first public remarks on the issue aboard Air Force One in early April, saying he knew nothing about the payment to Daniels. When asked why Cohen felt compelled to shell out $130,000 for what the White House was calling false allegations, Trump responded, "Michael's my attorney, and you'll have to ask Michael."</span></p><p data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">Later in the month, McDougal reached a settlement with American Media Inc (AMI) that allowed her to speak freely about her alleged affair with Trump. The model had signed $150,000 deal in 2016 that gave AMI's </span><em data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">The National Enquirer</span></em><span data-dcnode-id="872" instrument_node=""> exclusive story rights, though the tabloid never reported on the matter. Under terms of the new contract, McDougal was allowed to keep the $150,000, though she would have to share the profits if she sold or licensed the story to a new party.</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Shortly afterward, Daniels filed a defamation lawsuit against the president, after he dismissed a composite sketch of a man who allegedly confronted her in a parking lot as a "con job." The suit claimed that Trump had recklessly accused her of being a liar and breaking the law, resulting in more than $75,000 in damages.</span></p><h3 data-dcnode-id="867" id="michael-cohen-investigation"><span data-dcnode-id="868" instrument_node="">Michael Cohen Investigation</span></h3><p data-dcnode-id="862"><span data-dcnode-id="866" instrument_node="">In July 2018, Trump’s former personal lawyer </span><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/michael-cohen"><span data-dcnode-id="865" instrument_node="">Michael Cohen</span></a><span data-dcnode-id="863" instrument_node=""> found himself under investigation by the U.S. Attorney's Office for the Southern District of New York. He released a two-year-old secret recording of a conversation with Trump about payments to AMI for the McDougal story, indicating that the president was aware of the situation dating back to his days as a candidate. </span></p><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">The issue magnified in August, when Cohen accepted a deal to plead guilty to eight criminal charges, two of which, he said, came at the president's instigation to violate campaign laws and issue hush payments. Trump's former personal lawyer was sentenced to three years in prison that December. </span></p><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The following February, Cohen appeared before the House Oversight Committee in a televised hearing to testify to an array of Trump's infractions. Along with insisting that his ex-boss knew ahead of time about the Trump Tower meeting with Russians and the WikiLeaks dump of DNC emails, both of which came in mid-2016, he supplied checks as evidence of the president's reimbursement of his payment to Stormy Daniels. </span></p><h3 data-dcnode-id="856" id="inaugural-committee"><span data-dcnode-id="857" instrument_node="">Inaugural Committee</span></h3><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">In February 2019, the U.S. Attorney’s Office in the Southern District of New York issued a subpoena to Trump’s inaugural committee, seeking a collection of documents that included bank accounts of committee members and names of donors, vendors and contractors. </span></p><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">The committee grew out of investigations into Michael Cohen. It was believed that prosecutors were investigating crimes related to conspiracy to defraud the United States, false statements and money laundering.</span></p><h2 data-dcnode-id="850" id="sexual-assault-and-rape-accusations"><span data-dcnode-id="851" instrument_node="">Sexual Assault and Rape Accusations</span></h2><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">As of June 2019, a total of 16 women have accused Trump of sexual assault. He has denied all accusations.</span></p><h3 data-dcnode-id="846" id="e-jean-carroll-sexual-assault-accusations"><span data-dcnode-id="847" instrument_node="">E. Jean Carroll Sexual Assault Accusations</span></h3><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">In June 2019, New York journalist E. Jean Carroll accused Trump of sexually assaulting her in 1996 at the upscale Manhattan department store Bergdorf Goodman. Carroll says Trump approached her as she was leaving the building and asked for her help buying a gift for a female friend. He led her upstairs to the lingerie department, and, after a bit of banter, pinned her in the dressing room, pulled down her tights and sexually assaulted her, according to Carroll’s account.</span></p><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">When the alleged assault was over, Carroll called her friend, author Lisa Birnbach, to describe the encounter. Birnbach told journalists at </span><em data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">The New York Times</span></em><span data-dcnode-id="840" instrument_node=""> that she told Carroll that she was raped and should call the police. A couple of days later, Carroll told her friend Carol Martin, a TV host, who advised her to remain silent. Ultimately, Carroll says she blamed herself for going into the dressing room with Trump. </span></p><p data-dcnode-id="827"><span data-dcnode-id="838" instrument_node="">Carroll never publicly discussed her story until more than two decades later, when she described the alleged rape in her 2019 memoir, </span><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">What Do We Need Men For?</span></em><span data-dcnode-id="835" instrument_node=""> An excerpt was published in advance of the release date in a&nbsp;</span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecut.com/2019/06/donald-trump-assault-e-jean-carroll-other-hideous-men.html" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><em data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">New York Magazine </span></em><span data-dcnode-id="832" instrument_node="">article</span></a><em data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">.</span></em><span data-dcnode-id="828" instrument_node=""> </span></p><p data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">Trump initially said he had “never met” Carroll. When a photograph surfaced of the two shaking hands, he said he had “no idea who she is” and </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-us-canada-48727972" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="825" instrument_node="">called her accusation</span></a><span data-dcnode-id="823" instrument_node=""> “fiction” designed to sell her new book.</span></p><h3 data-dcnode-id="820" id="access-hollywood-controversy"><span data-dcnode-id="821" instrument_node="">'Access Hollywood' Controversy</span></h3><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">On October 7, 2016, just two days before the second presidential debate between Trump and Clinton, the Republican presidential nominee was embroiled in another scandal when the </span><em data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Washington Post </span></em><span data-dcnode-id="816" instrument_node="">released a 2005 recording in which he lewdly described kissing and groping women, and trying to have sex with then-married television personality Nancy O’Dell. </span></p><p data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">The three-minute recording captured Trump speaking to Billy Bush, co-anchor of </span><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Access Hollywood</span></em><span data-dcnode-id="811" instrument_node="">, as they prepared to meet soap opera actress Arianne Zucker for a segment of the show. </span></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">"I’ve gotta use some Tic Tacs, just in case I start kissing her,” Trump said in the recording which was caught on a microphone that had not been turned off. “You know I’m automatically attracted to beautiful — I just start kissing them. It’s like a magnet. Just kiss. I don’t even wait. And when you’re a star they let you do it. You can do anything." He also said that because of his celebrity status he could grab women by their genitals.</span></p><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">In response, Trump released a statement saying: “This was locker room banter, a private conversation that took place many years ago. Bill Clinton has said far worse to me on the golf course — not even close. I apologize if anyone was offended.”</span></p><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Trump later posted a videotaped apology on Facebook in which he said: “I’ve never said I’m a perfect person, nor pretended to be someone that I’m not. I’ve said and done things I regret, and the words released today on this more than a decade-old video are one of them. Anyone who knows me knows these words don’t reflect who I am. I said it, I was wrong, and I apologize.”</span></p><p data-dcnode-id="799"><span data-dcnode-id="803" instrument_node="">The backlash was immediate with some top Republicans, including Senators </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/john-mccain-9542249"><span data-dcnode-id="802" instrument_node="">John McCain</span></a><span data-dcnode-id="800" instrument_node="">, Kelly Ayotte, Mike Crapo, Shelley Moore Capito and Martha Roby, who withdrew their support for Trump. House Speaker Ryan reportedly told fellow GOP lawmakers that he would not campaign with or defend the presidential candidate. </span></p><p data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">Some GOP critics also called for Trump to withdraw from the race, including former Secretary of State </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biography.com/people/condoleezza-rice-9456857"><span data-dcnode-id="797" instrument_node="">Condoleezza Rice</span></a><span data-dcnode-id="795" instrument_node="">. Trump remained defiant, tweeting that he would stay in the race.</span></p><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Around the same time as the video leak, numerous women began speaking publicly about their past experiences with Trump, alleging he had either sexually assaulted or harassed them based on their looks.</span></p><h2 data-dcnode-id="790" id="pressuring-ukraine-and-whistleblower-complaint"><span data-dcnode-id="791" instrument_node="">Pressuring Ukraine and Whistleblower Complaint</span></h2><p data-dcnode-id="782"><span data-dcnode-id="789" instrument_node="">In September 2019, </span><em data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">The Washington Post</span></em><span data-dcnode-id="786" instrument_node=""> reported that Trump had ordered the withholding of nearly $400 million in military aid to Ukraine in mid-July, one week before a phone call in which he urged Ukrainian president Volodymyr Zelensky to investigate Hunter Biden, the son of 2020 presidential candidate </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/political-figure/joe-biden"><span data-dcnode-id="785" instrument_node="">Joe Biden</span></a><span data-dcnode-id="783" instrument_node="">. This tied into reports of a whistleblower complaint from the intelligence community regarding communications between Trump and Ukraine, and the failure of the acting director of national intelligence, Joseph Maguire, to relay the complaint to Congress.</span></p><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Trump admitted to discussing Joe and Hunter Biden with Zelensky, and even released a transcript of their conversation, though he denied that he withheld the military aid as a means for pressuring his counterpart into digging up dirt on a political rival. He later doubled down on his assertion that the Bidens needed to be investigated, calling for the Chinese government to do so.</span></p><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">In October, as House Democrats attempted to secure testimony from the unidentified whistleblower, reports surfaced of another individual with first-hand knowledge of several allegations noted in the complaint. William B.&nbsp;Taylor Jr., the acting U.S. ambassador to Ukraine, soon defied State Department orders to share his recollection of events with investigators and corroborate the claims of quid pro quo.&nbsp;He was followed by Alexander Vindman, the top Ukraine expert on the National Security Council, who reportedly confirmed that he was on the phone call between Trump and Zelensky and was concerned that the demand to investigate the Bidens would jeopardize U.S.-Ukraine relations.</span></p><h2 data-dcnode-id="776" id="impeachment-and-acquittal"><span data-dcnode-id="777" instrument_node="">Impeachment and Acquittal</span></h2><p data-dcnode-id="768"><span data-dcnode-id="775" instrument_node="">By the time Mueller’s special counsel investigation into Trump ended in March 2019, some Democrats were calling for the initiation of impeachment proceedings, including 2020 Democratic presidential hopefuls </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/political-figure/kamala-harris"><span data-dcnode-id="774" instrument_node="">Kamala Harris</span></a><span data-dcnode-id="772" instrument_node=""> and </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/political-figure/cory-booker"><span data-dcnode-id="771" instrument_node="">Cory Booker</span></a><span data-dcnode-id="769" instrument_node="">.</span></p><p data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">Calls for impeachment grew after Mueller held a press conference regarding his report in May 2019. Mueller said he could not clear the President of obstruction of justice but declined to pursue impeachment, leaving Democrats to decide if Trump’s conduct should be investigated for impeachable offenses. However, House Judiciary Committee Chair Jerry Nadler and House Speaker </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/political-figure/nancy-pelosi"><span data-dcnode-id="766" instrument_node="">Nancy Pelosi</span></a><span data-dcnode-id="764" instrument_node=""> were not in favor of pursuing impeachment.</span></p><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">In July 2019, after the House voted to condemn Trump for his Twitter comments about four congresswomen of color, Democrat Al Green of Texas filed a resolution to launch impeachment proceedings against the president. With most of his Democratic colleagues not yet ready to make the plunge, the resolution was defeated by a 332-to-95 vote.</span></p><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">The tide turned with the reports of Trump pressuring the Ukrainian president to investigate Joe and Hunter Biden and the administration's attempt to conceal the whistleblower complaint. On September 24, 2019, Pelosi announced that the House was launching a formal impeachment inquiry against Trump.</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">On October 31, following five weeks of investigations and interviews, the House voted 232-196 to approve a resolution that established rules for the impeachment process. All but two Democrats and the House's lone independent voted for the measure, while Republicans were unanimous in their opposition.</span></p><p data-dcnode-id="752"><span data-dcnode-id="756" instrument_node="">Impeachment hearings commenced on November 13 with testimony from Taylor and another State Department official, as Trump was busy meeting with President </span><a data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/political-figure/recep-tayyip-erdogan"><span data-dcnode-id="755" instrument_node="">Recep Tayyip Erdogan</span></a><span data-dcnode-id="753" instrument_node=""> of Turkey. The following week, Gordon Sondland, the U.S. ambassador to the European Union, provided more testimony about what he said was a clear case of quid pro quo, noting that Vice President Pence, Secretary of State Pompeo and other top administration officials were aware of Trump's pressure campaign.</span></p><p data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">On December 10, 2019, House Democrats announced they were moving forward with two articles of impeachment, charging Trump with abuse of power and obstruction of Congress. Eight days later, the House again voted almost entirely along party lines for the two articles, making Trump&nbsp;the third U.S. president to be impeached by the House, after Andrew Johnson, in 1868, and Bill Clinton, in 1998; </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/us-president/richard-nixon"><span data-dcnode-id="750" instrument_node="">President Richard Nixon resigned</span></a><span data-dcnode-id="748" instrument_node=""> before he could be impeached.</span></p><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">The Senate trial formally began on January 21, 2020, with seven House Democrat impeachment managers arguing their case of Trump's abuses against the president's legal defense that everything was valid. Although former national security adviser John Bolton lurked as a potential wild card, following reports that his upcoming book revealed more evidence of Trump tying Ukraine aid to political investigations, his account became irrelevant when the Senate voted against allowing additional witnesses on January 31.
</span></p><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">The impeachment saga came to an end on February 5, 2020, when the Senate voted along party lines to acquit President Trump on both charges. Mitt Romney, now senator of Utah, was the lone Republican to vote to convict on the charge of abuse of power.</span></p><h2 data-dcnode-id="741" id="coronavirus"><span data-dcnode-id="742" instrument_node="">Coronavirus</span></h2><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">After taking a victory lap for beating back the impeachment attempt, Trump faced a new challenge with the emergence of the novel coronavirus from China. The White House initially requested $2.5 billion in emergency funding to deal with the outbreak, a reflection of the president's belief that the threat wasn't particularly dire, though lawmakers on both sides of the aisle suggested that number was too low.
</span></p><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">On February 26, 2020, the same day that the 60th known coronavirus patient was recorded in the U.S., Trump announced that Vice President Pence would lead the administration's response to the health crisis. "We're very, very ready for this," the president said. "The risk to the American people remains very low."</span></p><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Despite his reassurances, the situation continued to escalate in the coming weeks as the World Health Organization declared the outbreak a pandemic and major American sports leagues suspended their seasons. On March 13, one day after stocks suffered the biggest daily drop since Black Monday of 1987,&nbsp;the president announced that he was declaring a national emergency to free up $50 billion in federal resources to combat the health crisis.</span></p><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">On March 18, Trump pushed out the Families First Coronavirus Response Act, which provided paid sick leave for some workers, funding for food assistance programs, expanded unemployment benefits and free diagnostic testing. He followed by signing a $2 trillion relief bill on March 27, which established a $500 billion government lending program and allocated funds for both hospitals and individual taxpayers.</span></p><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Facing criticism for his handling of the situation, on April 14, the president announced that he was suspending funding to the WHO for "severely mismanaging and covering up the spread of the coronavirus." The following week, he signed an executive order that halted the issuance of green cards for 60 days — with exemptions for medical workers and family members of U.S. citizens — in order&nbsp;to protect American workers during the pandemic.</span></p><p data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">Trump at times clashed with&nbsp;</span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/scientist/anthony-fauci"><span data-dcnode-id="729" instrument_node="">Dr. Anthony Fauci</span></a><span data-dcnode-id="727" instrument_node="">, director of the&nbsp;National Institute of Allergy and Infectious Diseases (NIAID), who sought to reel in the president's ambitions for reopening the country as quickly as possible. In May, after Fauci told the Senate that some schools wouldn't be ready to safely welcome back students in the fall, Trump decried that analysis as&nbsp;"not an acceptable answer."</span></p><p data-dcnode-id="721"><span data-dcnode-id="725" instrument_node="">On October 2, 2020, President Trump revealed that he and wife Melania had both tested positive for COVID-19. Later that day he was transferred to&nbsp;Walter Reed National Military Medical Center, after feeling “fatigued," </span><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2020/10/02/politics/president-donald-trump-walter-reed-coronavirus/index.html" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="724" instrument_node="">according</span></a><span data-dcnode-id="722" instrument_node=""> to&nbsp;his physician. He left the hospital on October 5.&nbsp;Son Barron was also tested and initially tested negative, but it was revealed weeks later that a second test came back positive.</span></p><h2 data-dcnode-id="719" id="social-media-executive-order"><span data-dcnode-id="720" instrument_node="">Social Media Executive Order</span></h2><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Known for his frequent use of Twitter to promote his agenda and attack critics, Trump came under fire in May 2020 for retweeting claims that former congressman turned MSNBC host Joe Scarborough had killed one of the staffers. Around that time, the president delivered a series of tweets alleging that mail-in voting would lead to widespread fraud, prompting Twitter to add fact-checking links to two of his posts.
</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">After accusing the social media platform of trying to censor him and "interfering" in the 2020 election, Trump signed an executive order that called for new regulations under Section 230 of the Communications Decency Act of 1996 (CDA) to remove statutory liability protections and cut federal funding for Twitter, Facebook and other tech companies that engage in censorship and political conduct.</span></p><h2 data-dcnode-id="713" id="2020-reelection-campaign"><span data-dcnode-id="714" instrument_node="">2020 Reelection Campaign</span></h2><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">On June 18, 2019, Trump launched his 2020 reelection bid with one of his patented rallies at the 20,000-seat Amway Center in Orlando, Florida.</span></p><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Along with extolling his economic record, the president whipped his supporters into a frenzy by lashing out at the special counsel "witch hunt" and his political enemies, adding that his new slogan would be "Keep America Great."</span></p><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">"We are going to keep on working," he declared. "We are going to keep on fighting. And we are going to keep on winning, winning, winning."</span></p><h2 data-dcnode-id="705" id="presidential-debates-with-biden"><span data-dcnode-id="706" instrument_node="">Presidential Debates With Biden</span></h2><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Trump's first debate against Democratic challenger Biden on September 29, 2020, was largely criticized as a chaotic event, with the president repeatedly talking over both his opponent and debate moderator Chris Wallace. Trump commanded the conversation on several issues, including his defense of nominating a Supreme Court justice so close to Election Day and his stance on law and order, though he was also chided for his tepid denunciation of a far-right extremist group and his personal attacks on Biden's son.</span></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">A second debate was scheduled for October 15, but after Trump declined to do a virtual debate, town halls for both candidates were scheduled instead.</span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Returning for the final debate on October 22, with microphones often muted to prevent interruptions, a more restrained Trump depicted the coronavirus as under control, defended his environmental record and relationship with Kim Jong-un and touted his progress on criminal justice reform. The president also maintained his attacks on the Biden family's business dealings and his opponent's failures with the Obama administration, calling him "all talk and no action."</span></p><h2 data-dcnode-id="697" id="2020-election-defeat"><span data-dcnode-id="698" instrument_node="">2020 Election Defeat</span></h2><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Although most national polls had Trump well behind Biden heading into election day, the president looked to be on solid footing as he claimed the crucial state of Florida and jumped out to a lead in other battleground states. However, the race began tipping in Biden's favor as the mail-in ballots gradually added up, prompting the president to lash out about the process and the launch of lawsuits designed to challenge the results in Pennsylvania, Michigan, Nevada and Georgia.</span></p><p data-dcnode-id="687"><span data-dcnode-id="694" instrument_node="">On November 7, 2020, four days after election day, Biden was declared as the 46th president-elect after winning Pennsylvania, making Trump the first president to lose his reelection bid since </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/us-president/george-hw-bush"><span data-dcnode-id="693" instrument_node="">George H.W. Bush</span></a><span data-dcnode-id="691" instrument_node=""> in 1992. Trump refused to concede in a subsequent statement, pointing to the ongoing litigation while </span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/election-2020-joe-biden-donald-trump-elections-c809d17b5cd34048e1a5e9bbb4b73cb7" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="690" instrument_node="">noting</span></a><span data-dcnode-id="688" instrument_node=""> that "this election is far from over."</span></p><p data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">On December 14, 2020, all 538 electors in the Electoral College </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/electoral-college-votes-joe-biden-victory/" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="685" instrument_node="">cast their vote</span></a><span data-dcnode-id="683" instrument_node="">, formalizing Biden’s victory over President Trump in the 2020 presidential election. Biden received 306 votes and Trump received 232.&nbsp;</span></p><p data-dcnode-id="674"><span data-dcnode-id="681" instrument_node="">His lawsuits gaining little to no traction in courts around the country, the president continued seeking out ways to change the outcome of the election. On January 2, 2021, he </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/politics/trump-raffensperger-call-georgia-vote/2021/01/03/d45acb92-4dc4-11eb-bda4-615aaefd0555_story.html" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="680" instrument_node="">urged</span></a><span data-dcnode-id="678" instrument_node=""> Georgia Secretary of State Brad Raffensperger to "find" the nearly 12,000 votes needed to overcome the deficit in the state to Biden. Additionally, with a few loyal senators and dozens of House Republicans announcing their plans to object during the congressional certification of Biden's Electoral College win on January 6, 2021, Trump </span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2021/01/06/mike-pence-rejects-trumps-call-to-overturn-biden-election.html" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="677" instrument_node="">ratcheted up the pressure</span></a><span data-dcnode-id="675" instrument_node=""> on Pence, as president of the Senate, to reject the votes from contested states.</span></p><h2 data-dcnode-id="672" id="capitol-siege-twitter-ban-and-second-impeachment"><span data-dcnode-id="673" instrument_node="">Capitol Siege, Twitter Ban and Second Impeachment</span></h2><p data-dcnode-id="667"><span data-dcnode-id="671" instrument_node="">On January 6, the president held a rally in which he declared that he would "never concede" and exhorted supporters to march to the Capitol building nearby. The supporters </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/01/06/us/politics/congress-gop-subvert-election.html" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="670" instrument_node="">promptly stormed</span></a><span data-dcnode-id="668" instrument_node=""> the Capitol and fought with police, at one point taking over the Senate chamber as lawmakers were evacuated for their safety.</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">"These are the things and events that happen when a sacred landslide election victory is so unceremoniously &amp; viciously stripped away from great patriots who have been badly &amp; unfairly treated for so long," Trump tweeted, adding, "Go home with love &amp; in peace. Remember this day forever!"</span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Law enforcement reclaimed control of the complex at about 6 p.m., following the chaos that had resulted in four deaths, more than 50 arrests and the declaration of a public emergency by Washington, D.C., Mayor Muriel Bowser. Congress soon reconvened, its session continuing well past midnight as some members continued voicing their concerns about the election results.</span></p><p data-dcnode-id="652"><span data-dcnode-id="662" instrument_node="">At just after 3:40 a.m. on January 7, Vice President Pence </span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/live-updates/electoral-college-vote-count-biden-victory/" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="661" instrument_node="">formally declared</span></a><span data-dcnode-id="659" instrument_node=""> Biden the winner of the election. His social media accounts </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/01/07/technology/facebook-trump-ban.html" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="658" instrument_node="">temporarily suspended</span></a><span data-dcnode-id="656" instrument_node=""> because of the riots, Trump issued a </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/01/06/us/politics/congress-gop-subvert-election.html" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="655" instrument_node="">statement</span></a><span data-dcnode-id="653" instrument_node=""> shortly afterward which read: "Even though I totally disagree with the outcome of the election, and the facts bear me out, nevertheless there will be an orderly transition on January 20th."</span></p><p data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">Later that day, Trump posted a </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/realDonaldTrump/status/1347334804052844550" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="650" instrument_node="">video</span></a><span data-dcnode-id="648" instrument_node=""> on his Twiter addressing the "heinous attacks" on the Capitol and also conceded the election.&nbsp;“We have just been through an intense election and emotions are high. But now tempers must be cooled and calm restored. We must get on with the business of America," he said. “Now Congress has certified the results. A new administration will be inaugurated on January 20. My focus now turns to ensuring a smooth, orderly and seamless transition of power. This moment calls for healing and reconciliation.”</span></p><p data-dcnode-id="639"><span data-dcnode-id="646" instrument_node="">Trump later </span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/realDonaldTrump/status/1347569870578266115" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="645" instrument_node="">tweeted</span></a><span data-dcnode-id="643" instrument_node=""> that he will not attend Biden's inauguration. On January 6, Trump's Twitter account was temporarily suspended. Two days later, Twitter announced a </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/technology/2021/01/11/trump-banned-social-media/" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="642" instrument_node="">permanent ban</span></a><span data-dcnode-id="640" instrument_node=""> on his account and several other social media platforms, such as Facebook and Instagram, followed suit.</span></p><p data-dcnode-id="631"><span data-dcnode-id="638" instrument_node="">On January 13, the majority of the House </span><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/live/2021/01/13/us/trump-impeachment" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="637" instrument_node="">voted to impeach</span></a><span data-dcnode-id="635" instrument_node=""> Trump for a second time for "incitement of insurrection," making him the first president in history to be impeached twice. On February 13, Trump was </span><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/02/13/us/politics/trump-impeachment.html" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="634" instrument_node="">acquitted</span></a><span data-dcnode-id="632" instrument_node="">, with the Senate voting 57-43.&nbsp;</span></p><h2 data-dcnode-id="629" id="farewell-address"><span data-dcnode-id="630" instrument_node="">Farewell Address</span></h2><p data-dcnode-id="621"><span data-dcnode-id="628" instrument_node="">On January 19, 2021, Trump released a farewell video on his final day as president.&nbsp;"Four years ago, I came to Washington as the only true outsider ever to win the presidency. I had not spent my career as a politician, but as a builder looking at open skylines and imagining infinite possibilities. I ran for President because I knew there were towering new summits for America just waiting to be scaled. I knew the potential for our nation was boundless as long as we put America first," he </span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefings-statements/remarks-president-trump-farewell-address-nation/" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="627" instrument_node="">said</span></a><span data-dcnode-id="625" instrument_node="">&nbsp;in the almost </span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D6h5_d3DUdR4" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="624" instrument_node="">20-minute speech</span></a><span data-dcnode-id="622" instrument_node="">.&nbsp;"So I left behind my former life and stepped into a very difficult arena, but an arena nevertheless, with all sorts of potential if properly done. America had given me so much, and I wanted to give something back."&nbsp;</span></p><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="618" id=""></h2></section><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-25" data-dcnode-id="614"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-25" data-dcnode-id="615" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-ca
