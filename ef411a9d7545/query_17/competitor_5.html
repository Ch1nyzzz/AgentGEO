e-id="2296" instrument_node="">&nbsp;on November 8, 2016, to become the 45th president of the United States. Four years later, Trump </span><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/joe-biden-wins-white-house-ap-fd58df73aa677acb74fce2a69adb71f9" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2295" instrument_node="">lost his bid for reelection</span></a><span data-dcnode-id="2293" instrument_node=""> to former vice president&nbsp;</span><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/political-figure/joe-biden"><span data-dcnode-id="2292" instrument_node="">Joe Biden</span></a><span data-dcnode-id="2290" instrument_node="">.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="2286"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="2287" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-8c8c0a5d6613419a817845037f15c983&quot;,&quot;visClasses&quo ata-dcnode-id="2261" instrument_node=""> in 1964. He transferred to the Wharton School of Finance at the </span><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upenn.edu/" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2260" instrument_node="">University of Pennsylvania</span></a><span data-dcnode-id="2258" instrument_node=""> two years later and graduated in 1968 with a degree in economics.</span></p><p data-dcnode-id="2252"><span data-dcnode-id="2256" instrument_node="">During his years at college, Trump worked at his father’s real estate business during the summer. He also secured education deferments for the draft for the </span><a data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/vietnam-war/vietnam-war-history" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2255" instrument_node="">Vietnam War</span></a><span data-dcnode-id="2253" instrument_node=""> and ultimately a 1-Y medical deferment after he graduated.</span></p><h2 data-dcnode-id="2250" id="parents-and-siblings"><span data-dcnode-id="2251" instrument_node="">Parents and Siblings</span></h2><h3 data-dcnode-id="2248" id="father"><span data-dcnode-id="2249" instrument_node="">Father</span></h3><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Trump’s father, Frederick Trump, was a builder and real estate developer who specialized in constructing and operating middle-income apartments in Queens, Staten Island and Brooklyn. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="2243"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="2244" data-zone-count="26"><phoenix-ad class="m-ad not-size-a &quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2239"></phoenix-ad></div></aside><h3 data-dcnode-id="2235" id="mother"><span data-dcnode-id="2236" instrument_node="">Mother</span></h3><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Trump’s mother, Mary MacLeod, immigrated from Tong, Scotland, in 1929 at the age of 17. She and Fred Trump married in 1936. The couple settled in Jamaica, Queens, a neighborhood that was, at the time, filled with Western European immigrants. As the family’s wealth increased, Mary became a New York socialite and philanthropist. </span></p><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Fred died in 1999, and Mary passed away the following year.</span></p><h3 data-dcnode-id="2229" id="siblings"><span data-dcnode-id="2230" instrument_node="">Siblings</span></h3><p data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Trump is the fourth of five children. </span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="2224"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="2225" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Tha a-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Fred Trump Jr. </span></strong><span data-dcnode-id="2217" instrument_node="">worked briefly with his father and then became a pilot. He struggled with alcohol and died in 1981 at the age of 43, prompting Donald to announce that he never drinks alcohol or take drugs. "He had a profound impact on my life, because you never know where you're going to end up," Trump said.</span></li><li data-dcnode-id="2212"><strong data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Elizabeth Trump Grau</span></strong><span data-dcnode-id="2213" instrument_node=""> is a retired banker who is married to film producer James Grau.</span></li><li data-dcnode-id="2208"><strong data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Robert Trump</span></strong><span data-dcnode-id="2209" instrument_node="">&nbsp;was Donald’s younger brother who spent much of his career working for the family company. He died in 2020, aged 71.</span></li></ul><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="2187"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="2188" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="2199"><a data-dcnode-id="2202"><picture class="is-loaded" data-dcnode-id="2203"><source data-dcnode-id="2206" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)" srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_380/MTYxOTk4NDYzMzgxMjg0MTQy/-donald-trump-and-father-fred-trump-at-opening-of-wollman-rink-photo-by-dennis-carusony-daily-news-archive-via-getty-images.webp 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_620/MTYxOTk4NDYzMzgxMjg0MTQy/-donald-trump-and-father-fred-trump-at-opening-of-wollman-rink-photo-by-dennis-carusony-daily-news-archive-via-getty-images.webp 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_ ir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/melania-trump-812016"><span data-dcnode-id="2181" instrument_node="">Melania Trump</span></a><span data-dcnode-id="2179" instrument_node=""> (née Knauss), who is more than 23 years his junior. In January 2005, the couple married in a highly-publicized and lavish wedding. Among the many celebrity guests at the wedding were Hillary Clinton and former President </span><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/bill-clinton-9251236"><span data-dcnode-id="2178" instrument_node="">Bill Clinton</span></a><span data-dcnode-id="2176" instrument_node="">. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="2172"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="2173" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-d2ab00393b2245518cbb6e332f4e30b2&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&qu 059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2158"></phoenix-ad></div></aside><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">The couple had three children together: Donald Trump Jr., Ivanka and Eric. They went through a highly publicized divorce that was finalized in 1992.</span></p><h3 data-dcnode-id="2152" id="marla-maples"><span data-dcnode-id="2153" instrument_node="">Marla Maples</span></h3><p data-dcnode-id="2147"><span data-dcnode-id="2151" instrument_node="">In 1993 Trump married his second wife, </span><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/marla-maples-113017"><span data-dcnode-id="2150" instrument_node="">Marla Maples</span></a><span data-dcnode-id="2148" instrument_node="">, an actress with whom he had been involved for some time and already had a daughter, Tiffany.</span></p><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Trump would ultimately file for a highly publicized divorce from Maples in 1997, which became final in June 1999. A prenuptial agreement allotted $2 million to Maples.</span></p><h2 data-dcnode-id="2143" id="children"><span data-dcnode-id="2144" instrument_node="">Children</span></h2><p data-dcnode-id="2135"><span data-dcnode-id="2142" instrument_node="">Trump has five children. He and his first wife, Ivana Trump, had three children together: </span><a data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/donald-trump-jr-020317"><span data-dcnode-id="2141" instrument_node="">Donald Trump Jr.</span></a><span data-dcnode-id="2139" instrument_node="">, born in 1977; </span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/ivanka-trump-7192016"><span data-dcnode-id="2138" instrument_node="">Ivanka Trump</span></a><span data-dcnode-id="2136" instrument_node="">, born in 1981, and Eric Trump, born in 1984. Trump and his second wife, Marla Maples, had daughter Tiffany Trump in 1993. And current wife Melania Trump gave birth to Trump’s youngest child, Barron William Trump, in March 2006. </span></p><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Trump's sons — Donald Jr. and Eric— work as executive vice presidents for The Trump Organization. They took over the family business while their father serves as president. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="2130"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="2131" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-0f1939d128684bde8b6faba8e7b617d1&quot;,&quot;visClasses&quot;:[&quot;not-size-a ett.jpg 1400w"><img alt="Ivana Trump, Eric Trump, Donald Trump, and Ivanka Trump as they sit at a table at the Mar-a-Lago in 1998" class="m-detail--tml-image m-image" data-dcnode-id="2113" data-src="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_700/MTYxOTk4NDg4NjE0MjE3MzQx/trump-her-son-eric-trump-her-former-husband-businessman-donald-trump-and-her-daughter-ivanka-trump-as-they-sit-at-a-table-at-the-mar-a-lago-estate-palm-beach-florida-1998-photo-by-davidoff-studiosgett.jpg" decoding="async" height="3250" itemprop="contentUrl url" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/.image/t_share/MTYxOTk4NDg4NjE0MjE3MzQx/trump-her-son-eric-trump-her-former-husband-businessman-donald-trump-and-her-daughter-ivanka-trump-as-they-sit-at-a-table-at-the-mar-a-lago-estate-palm-beach-florida-1998-photo-by-davidoff-studiosgett.jpg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="4858"></picture></a><div class="m-detail--tml-image-wrapper" data-dcnode-id="2109" style="max-width:4858px; min-width:0px;"><div class="m-detail--tml-image-container" data-dcnode-id="2110" style="padding-top: 67%"></div></div></phoenix-picture><figcaption data-dcnode-id="2098"><p class="tml-image--caption" data-dcnode-id="2102" itemprop="caption"><span data-dcnode-id="2103" instrument_node="">Ivana Trump, Eric Trump, Donald Trump and Ivanka Trump as they sit at a table at the Mar-a-Lago in 1998</span></p><p class="tml-image--attribution" data-dcnode-id="2099" itemprop="author"><span data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Photo: Davidoff Studios/Getty Images</span></span></p></figcaption></figure></div><h2 data-dcnode-id="2094" id="trump-s-real-estate-and-businesses"><span data-dcnode-id="2095" instrument_node="">Trump’s Real Estate and Businesses</span></h2><p data-dcnode-id="2086"><span data-dcnode-id="2093" instrument_node="">Trump followed his father into a career in real estate development, bringing his grander ambitions to the family business. Trump’s business ventures include The Trump Organization, Trump Tower, casinos in Atlantic City and television franchises like </span><em data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">The Apprentice </span></em><span data-dcnode-id="2090" instrument_node="">and </span><em data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Miss Universe</span></em><span data-dcnode-id="2087" instrument_node="">. Trump has business deals with the Javits Center and the Grand Hyatt New York, as well as other real estate ventures in New York City, Florida and Los Angeles.&nbsp;</span></p><p data-dcnode-id="2079"><span data-dcnode-id="2085" instrument_node="">Federal income disclosure forms Trump filed in 2017 list Trump's golf courses, including Trump National Doral and Mar-a-Lago in Florida, as earning about half of his income. Other financial ventures include aircraft, merchandise and royalties from his two books, </span><em data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">The Art of the Deal</span></em><span data-dcnode-id="2082" instrument_node="">&nbsp;and&nbsp;</span><em data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Crippled America: How to Make America Great Again.</span></em></p><h2 data-dcnode-id="2077" id="the-art-of-the-deal"><span data-dcnode-id="2078" instrument_node="">The Art of the Deal</span></h2><p data-dcnode-id="2072"><span data-dcnode-id="2076" instrument_node="">In 1987, Trump published the book </span><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">The Art of the Deal</span></em><span data-dcnode-id="2073" instrument_node="">, co-authored with Tony Schwartz. In the book, Trump describes how he successfully makes business deals.</span></p><p data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">“I DON’T do it for the money. I’ve got enough, much more than I’ll ever need. I do it to do it. Deals are my art form,” Trump wrote.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="2067"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="2068" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-a6fbc3df312243168542becff962e441&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-4&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;4&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&q se,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;5&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-9e1371f2c3084f559cf7c90c80e497f3&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2060"></phoenix-ad></div></aside><p data-dcnode-id="2053"><span data-dcnode-id="2057" instrument_node="">The book made the </span><em data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">New York Times </span></em><span data-dcnode-id="2054" instrument_node="">best-seller list, although the number of copies sold has been debated; sales have been estimated at between 1 to 4 million copies to-date.&nbsp;Schwartz later became an outspoken critic of the book and of Trump, saying he felt remorseful for helping make the president “more appealing than he is.”</span></p><h2 data-dcnode-id="2051" id="wealth"><span data-dcnode-id="2052" instrument_node="">Wealth </span></h2><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Over the years, Trump’s net worth have been a subject of public debate. Because Trump has not publicly released his tax returns, it’s not possible to definitively determine his wealth in the past or today. However, Trump valued his businesses at least $1.37 billion on his 2017 federal financial disclosure form, published by the Office of Government Ethics. Trump’s 2018 disclosure form put his revenue for the year at a minimum of $434 million from all sources.</span></p><p data-dcnode-id="2044"><span data-dcnode-id="2048" instrument_node="">In 1990, Trump asserted his own net worth in the neighborhood of $1.5 billion. At the time, the real estate market was in decline, reducing the value of and income from Trump's empire.&nbsp;The </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trump.com/" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2047" instrument_node="">Trump Organization</span></a><span data-dcnode-id="2045" instrument_node=""> required a massive infusion of loans to keep it from collapsing, a situation that raised questions as to whether the corporation could survive bankruptcy. Some observers saw Trump's decline as symbolic of many of the business, economic and social excesses that had arisen in the 1980s.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="2041"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="2042" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for w ="2039" instrument_node="">investigation by</span><em data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node=""> The New York Times</span></em></a><span data-dcnode-id="2035" instrument_node=""> of 10 years of Trump’s tax information found that between 1985 and 1994, his businesses lost money every year. The newspaper calculated that Trump’s businesses suffered $1.17 billion in losses over the decade.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="2031"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="2032" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-6754154dcccf4f0dbe2b15f035416e59&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-5&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot; ns during the election, and he has not to date. It was the first time a major party candidate had not released such information to the public before a presidential election since Richard Nixon in 1972. </span></p><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">After Democrats regained control of the House with the 2018 elections, Trump again faced calls to release his tax returns. In April 2019, Congressman Richard Neal, chairman of the House Ways and Means Committee, requested six years' worth of the president's personal and business tax returns from the IRS. Treasury Secretary Steve Mnuchin rejected the request, as well as Neal's follow-up subpoena for the documents.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-7" data-dcnode-id="2008"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-7" data-dcnode-id="2009" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-1e15ae469e19481e9fcac545a482aa08&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot uot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1999"></phoenix-ad></div></aside><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">In September 2019, Manhattan District Attorney Cyrus Vance Jr. subpoenaed the accounting firm Mazars USA for Trump's personal and corporate tax returns dating back to 2011, prompting a challenge from the president's lawyers. A Manhattan federal district judge dismissed Trump's lawsuit in October, though the U.S. Circuit Court of Appeals for the 2nd Circuit agreed to temporarily delay enforcement of the subpoena while considering arguments in the case. A few days later, that same appeals court rejected Trump's bid to block another subpoena issued to Mazars USA, this one from the House Committee on Oversight and Reform.</span></p><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">After the U.S. Supreme Court agreed to hear arguments over whether the president could block the disclosure of his financial information to congressional committees and the Manhattan district attorney in December 2019, the cases were presented to the Court the following May.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-8" data-dcnode-id="1990"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-8" data-dcnode-id="1991" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_leg onald-trump-taxes.html%3Faction%3Dclick%26module%3DTop%2520Stories%26pgtype%3DHomepage" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1988" instrument_node="">The New York Times</span></a></em><span data-dcnode-id="1985" instrument_node=""> reported that Trump paid just $750 in federal income taxes in 2016 and 2017, and paid nothing in income taxes in 10 of the previous 15 years. A lawyer for the Trump Organization replied that "most, if not all, of the facts appear to be inaccurate" in the </span><em data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Times </span></em><span data-dcnode-id="1982" instrument_node="">report.</span></p><h2 data-dcnode-id="1979" id="lawsuits-and-investigations"><span data-dcnode-id="1980" instrument_node="">Lawsuits and Investigations</span></h2><h3 data-dcnode-id="1977" id="fair-housing-act-discrimination-trial"><span data-dcnode-id="1978" instrument_node="">Fair Housing Act Discrimination Trial</span></h3><p data-dcnode-id="1969"><span data-dcnode-id="1976" instrument_node="">In 1973, the federal government filed a complaint against Trump, his father and their company alleging that they had discriminated against tenants and potential tenants based on their race, a violation of the </span><a data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/black-history/fair-housing-act" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1975" instrument_node="">Fair Housing Act</span></a><span data-dcnode-id="1973" instrument_node="">, which is part of the </span><a data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/black-history/civil-rights-act" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1972" instrument_node="">Civil Rights Act</span></a><span data-dcnode-id="1970" instrument_node=""> of 1968. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-7" data-dcnode-id="1966"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-7" data-dcnode-id="1967" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-211d2c550f744cf192c4b0fd0b557ac1&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-7&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;7&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;flu ue}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1962"></phoenix-ad></div></aside><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">After a lengthy legal battle, the case was settled in 1975. As part of the agreement, the Trump company had to train employees about the Fair Housing Act and inform the community about its fair housing practices. </span></p><p data-dcnode-id="1953"><span data-dcnode-id="1957" instrument_node="">Trump wrote about the resolution of the case in his 1987 memoir </span><em data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Art of the Deal</span></em><span data-dcnode-id="1954" instrument_node="">: "In the end, the government couldn’t prove its case, and we ended up taking a minor settlement without admitting any guilt."</span></p><h3 data-dcnode-id="1951" id="trump-university"><span data-dcnode-id="1952" instrument_node="">Trump University</span></h3><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">In 2005, Trump launched his for-profit Trump University, offering classes in real estate and acquiring and managing wealth. The venture had been under scrutiny almost since its inception and at the time of his 2015 presidential bid, it remained the subject of multiple lawsuits. </span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-9" data-dcnode-id="1946"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-9" data-dcnode-id="1947" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHt quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1948"></phoenix-ad></div></aside><p data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">In the cases, claimants accused Trump of fraud, false advertising and breach of contract. Controversy about the suits made headlines when Trump suggested that U.S. District Court Judge Gonzalo Curiel could not be impartial in overseeing two class action cases because of his Mexican heritage.</span></p><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">On November 18, 2016, Trump, who had previously vowed to take the matter to trial, settled three of the lawsuits for $25 million without admission of liability. In a statement from New York Attorney General Eric Schneiderman, he called the settlement, “a stunning reversal by Trump and a major victory for the over 6,000 victims of his fraudulent university.”</span></p><h3 data-dcnode-id="1940" id="donald-j-trump-foundation"><span data-dcnode-id="1941" instrument_node="">Donald J. Trump Foundation</span></h3><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Later, in a separate incident related to Trump University, it was reported that Florida Attorney General Pam Bondi decided not to join the existing New York fraud lawsuit. This came just days after she had received a sizable campaign donation from the Donald J. Trump Foundation, which was founded in 1988 as a private charity organization designed to make donations to nonprofit groups. In November 2016, it was reported that Bondi's name was on Trump's list as a possible U.S. Attorney General contender.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="1935"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="1936" data-zone-count="26"><phoenix-ad class "1931"></phoenix-ad></div></aside><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">As a result of the improper donation to Bondi's campaign, Trump was required to pay the IRS a penalty and his foundation came under scrutiny about the use of its funds for non-charitable activities. According to tax records, The Trump Foundation itself was found to have received no charitable gifts from Trump since 2008, and that all donations since that time had come from outside contributors.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-10" data-dcnode-id="1924"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-10" data-dcnode-id="1925" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-38bd709da6dc49479a8544ecc3a0b6f3&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-10&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{ -id="1911"><span data-dcnode-id="1915" instrument_node="">By 2009, Trump had switched back to the Republican party, although he registered as an Independent in 2011 to allow for a potential run in the following year’s presidential election. He finally returned to the Republican party to endorse </span><a data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/political-figure/mitt-romney"><span data-dcnode-id="1914" instrument_node="">Mitt Romney</span></a><span data-dcnode-id="1912" instrument_node="">’s 2012 presidential run and has remained a Republican since.&nbsp;</span></p><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="1891"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="1892" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="1903"><a data-dcnode-id="1906"><picture class="is-waiting-to-load" data-dcnode-id="1907"><source data-dcnode-id="1910" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_380/MTQyODM4MjUxMDgwNjU2NjY4/gettyimages-610599016jpg.webp 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_620/MTQyODM4MjUxMDgwNjU2NjY4/gettyimages-610599016jpg.webp 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1240/MTQyODM4MjUxMDgwNjU2NjY4/gettyimages-610599016jpg.webp 1240w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_700/MTQyODM4MjUxMDgwNjU2NjY4/gettyimages-610599016jpg.webp 700w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1400/MTQyODM4MjUxMDgwNjU2NjY4/gettyimages-610599016jpg.webp 1400w" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)" type="image/webp"><source data-dcnode-id="1909" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_380/MTQyODM4MjUxMDgwNjU2NjY4/gettyimages-610599016jpg.jpg 380w, htt t_node="">Photo: Pool/Getty Images</span></span></p></figcaption></figure></div><h2 data-dcnode-id="1889" id="2016-presidential-campaign-vs-clinton"><span data-dcnode-id="1890" instrument_node="">2016 Presidential Campaign vs. Clinton</span></h2><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Trump became the official Republican nominee for president in the 2016 presidential election against Democrat Clinton. Defying polls and media projections, he won the majority of electoral college votes in a stunning victory on November 8, 2016. Despite losing the popular vote to Hillary Clinton by almost 2.9 million votes, Trump's electoral win — 306 electoral college votes to Clinton's 232 — clinched his victory as the 45th president of the United States.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-9" data-dcnode-id="1884"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-9" data-dcnode-id="1885" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-8ca415370f194eb78cc30ea7215471fe&quot;,&quot; &quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-7e998a3e5661471cbea46af351b0c58e&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-11&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;11&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;11&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-7e998a3e5661471cbea46af351b0c58e&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1877"></phoenix-ad></div></aside><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">After one of the most contentious presidential races in U.S. history, Trump's rise to the office of president was considered a resounding rejection of establishment politics by blue-collar and working-class Americans. </span></p><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">In his victory speech, Trump said: “I pledge to every citizen of our land that I will be president for all Americans." About his supporters, he said: "As I’ve said from the beginning, ours was not a campaign, but rather an incredible and great movement made up of millions of hard-working men and women who love their country and want a better, brighter future for themselves and for their families.”</span></p><h3 data-dcnode-id="1869" id="election-platforms"><span data-dcnode-id="1870" instrument_node="">Election Platforms</span></h3><p data-dcnode-id="1864"><span data-dcnode-id="1868" instrument_node="">On July 21, 2016, Trump accepted the presidential nomination at the Republican National Convention in Cleveland. In his speech, he outlined the issues he would tackle as president, including violence in America, the economy, immigration, trade, terrorism, and the appointment of </span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-government/supreme-court-facts" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1867" instrument_node="">Supreme Court</span></a><span data-dcnode-id="1865" instrument_node=""> justices.</span></p><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">On immigration, he said: “We are going to build a great border wall to stop illegal immigration, to stop the gangs and the violence, and to stop the drugs from pouring into our communities.” </span></p><p data-dcnode-id="1857"><span data-dcnode-id="1861" instrument_node="">He also promised supporters that he would renegotiate trade deals, reduce taxes and government regulations, repeal the Affordable Care Act (otherwise known as Obamacare), defend </span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/united-states-constitution/2nd-amendment" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1860" instrument_node="">Second Amendment</span></a><span data-dcnode-id="1858" instrument_node=""> gun rights, and “rebuild our depleted military,” asking the countries the U.S. is protecting "to pay their fair share."</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-12" data-dcnode-id="1854"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-12" data-dcnode-id="1855" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-0ce13a65cb434bb8a6aba7321e106bac&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-12&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;12&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;stan },{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1837"></phoenix-ad></div></aside><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">In his inaugural speech on January 20th, Trump sent a populist message that he would put the American people above politics. “What truly matters is not which party controls our government, but whether our government is controlled by the people,” he said. “January 20, 2017, will be remembered as the day the people became the rulers of this nation again.”</span></p><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">He went on to paint a bleak picture of an America that had failed many of its citizens, describing families trapped in poverty, an ineffective education system, and crime, drugs and gangs. “This American carnage stops right here and stops right now," he said.</span></p><p data-dcnode-id="1826"><span data-dcnode-id="1830" instrument_node="">The day after Trump's inauguration, millions of protesters demonstrated across the United States and around the world. The </span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/this-day-in-history/womens-march" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1829" instrument_node="">Women's March</span></a><span data-dcnode-id="1827" instrument_node=""> on Washington drew over half a million people to protest Trump's stance on a variety of issues ranging from immigration to environmental protection.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-13" data-dcnode-id="1823"><div class="m-in-content-ad not-size-b not-size-c n node="">First 100 Days</span></h2><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">The first 100 days of Trump’s presidency lasted from January 20, 2017, until April 29, 2017. In the first days of his presidency, Trump issued a number of back-to-back executive orders to make good on some of his campaign promises, as well as several orders aimed at rolling back policies and regulations that were put into place during the Obama administration. </span></p><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Several of Trump’s key policies that got rolling during Trump’s first 100 days in office included his first Supreme Court nomination; steps toward building a wall on the Mexico border; a travel ban for several predominantly Muslim countries; the first moves to dismantle the Affordable Care Act; and the U.S. withdrawal from the Paris Climate Agreement.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-11" data-dcnode-id="1794"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-11" data-dcnode-id="1795" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:fal nstrument_node="">Dodd-Frank Act</span></a><span data-dcnode-id="1782" instrument_node="">, created by the Obama administration and passed by Congress after the financial crisis of 2008. And he called for a lifetime foreign-lobbying ban for members of his administration and a five-year ban for all other lobbyings.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-14" data-dcnode-id="1778"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-14" data-dcnode-id="1779" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-2b4ece63105b42c5bbed0e9db93cd4cb&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-14&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;14&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;14&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-2b4ece63105b42c5bbed0e9db93cd4cb&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1780"></phoenix-ad></div></aside><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">On March 16, 2017, the president released his proposed budget. The budget outlined his plans for increased spending for the military, veterans affairs and national security, including building a wall on the border with Mexico. </span></p><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">It also made drastic cuts to many government agencies including the Environmental Protection Agency and the State Department, as well as the elimination of the National Endowment for the Arts, the National Endowment for the Humanities, funding for the Corporation for Public Broadcasting and the Community Development Block Grant program which supports Meals on Wheels. These cuts proved controversial, however, and much of this funding was restored.</span></p><h2 data-dcnode-id="1772" id="trump-s-supreme-court-nominations"><span data-dcnode-id="1773" instrument_node="">Trump's Supreme Court Nominations</span></h2><p data-dcnode-id="1761"><span data-dcnode-id="1771" instrument_node="">Trump has nominated three Supreme Court Justices: </span><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/neil-gorsuch-020617"><span data-dcnode-id="1770" instrument_node="">Neil Gorsuch</span></a><span data-dcnode-id="1768" instrument_node="">, </span><a data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/brett-kavanaugh"><span data-dcnode-id="1767" instrument_node="">Brett Kavanaugh</span></a><span data-dcnode-id="1765" instrument_node="">&nbsp;and </span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/law-figure/amy-coney-barrett"><span data-dcnode-id="1764" instrument_node="">Amy Coney Barrett</span></a><span data-dcnode-id="1762" instrument_node="">.</span></p><h3 data-dcnode-id="1759" id="neil-gorsuch"><span data-dcnode-id="1760" instrument_node="">Neil Gorsuch</span></h3><p data-dcnode-id="1754"><span data-dcnode-id="1758" instrument_node="">On January 31, 2017, Trump nominated Judge Gorsuch to the Supreme Court. The 49-year-old conservative judge was appointed by President </span><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biography.com/people/george-w-bush-9232768"><span data-dcnode-id="1757" instrument_node="">George W. Bush</span></a><span data-dcnode-id="1755" instrument_node=""> to the United States Court of Appeals for the 10th Circuit in Denver. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1751"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1752" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adClose quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-9ee5297fa03846e6bb135e4a7862967a&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-12&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;12&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;12&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-9ee5297fa03846e6bb135e4a7862967a&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1747"></phoenix-ad></div></aside><p data-dcnode-id="1737"><span data-dcnode-id="1744" instrument_node="">Judge Gorsuch was educated at Columbia, Harvard and Oxford and clerked for Justices Byron White and </span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biography.com/people/anthony-kennedy-9362868"><span data-dcnode-id="1743" instrument_node="">Anthony Kennedy</span></a><span data-dcnode-id="1741" instrument_node="">. The nomination came after Merrick Garland, President Obama's nominee to replace the late </span><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/antonin-scalia-9473091"><span data-dcnode-id="1740" instrument_node="">Antonin Scalia</span></a><span data-dcnode-id="1738" instrument_node="">, was denied a confirmation hearing by Senate Republicans.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-15" data-dcnode-id="1734"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-15" data-dcnode-id="1735" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-d9890ce8fdc74a0e884db696645de080&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-15&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;15&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;15&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-d9890ce8fdc74a0e884db696645de080&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1736"></phoenix-ad></div></aside><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">As Gorsuch's legal philosophy was considered to be similar to Scalia's, the choice drew strong praise from the conservative side of the aisle. "Millions of voters said this was the single most important issue for them when they voted for me for president," Trump said. "I am a man of my word. Today I am keeping another promise to the American people by nominating Neil Gorsuch to the Supreme Court."</span></p><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">After Gorsuch gave three days of testimony before the Senate Judiciary Committee in March, the Senate convened on April 6 to advance his nomination. Democrats mostly held firm to deny the 60 votes necessary to proceed, resulting in the first successful partisan filibuster of a Supreme Court nominee. </span></p><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">But Republicans quickly countered with another historic move, invoking the "nuclear option" to lower the threshold for advancing Supreme Court nominations from 60 votes to a simple majority of 50. On April 7, Gorsuch was confirmed by the Senate to become the 113th justice of the Supreme Court.</span></p><h3 data-dcnode-id="1726" id="brett-kavanaugh"><span data-dcnode-id="1727" instrument_node="">Brett Kavanaugh</span></h3><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">On July 9, 2018, Trump nominated&nbsp;Kavanaugh following the retirement of Justice Kennedy. A textualist and originalist in the mold of Scalia, the nomination continued the rightward push of the Supreme Court. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-13" data-dcnode-id="1721"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-13" data-dcnode-id="1722" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;: se,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-759d2291f2bc442e941afcadbec66e11&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-16&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;16&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;16&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-759d2291f2bc442e941afcadbec66e11&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1712"></phoenix-ad></div></aside><h3 data-dcnode-id="1708" id="amy-coney-barrett"><span data-dcnode-id="1709" instrument_node="">Amy Coney Barrett</span></h3><p data-dcnode-id="1703"><span data-dcnode-id="1707" instrument_node="">Following the death of liberal favorite </span><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/law-figure/ruth-bader-ginsburg"><span data-dcnode-id="1706" instrument_node="">Ruth Bader Ginsburg</span></a><span data-dcnode-id="1704" instrument_node="">, Trump nominated conservative Judge Barrett, from the U.S. Court of Appeals for the Seventh Circuit, on September 26, 2020.</span></p><h2 data-dcnode-id="1701" id="climate-change"><span data-dcnode-id="1702" instrument_node="">Climate Change </span></h2><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">During the 2016 presidential election, Trump called climate change a “hoax.” He later recanted, saying, "I don't think it's a hoax, I think there's probably a difference."</span></p><p data-dcnode-id="1694"><span data-dcnode-id="1698" instrument_node="">However, in an October 2018 interview on </span><em data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Fox News,</span></em><span data-dcnode-id="1695" instrument_node=""> Trump accused climate scientists of having a “political agenda” and said that he was unconvinced that humans were responsible for rising temperatures.</span></p><p data-dcnode-id="1689"><span data-dcnode-id="1693" instrument_node="">In November 2018, </span><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nca2018.globalchange.gov/" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1692" instrument_node="">The Fourth National Climate Assessment</span></a><span data-dcnode-id="1690" instrument_node="">, compiled by 13 federal agencies including the EPA and Department of Energy, found that, left unchecked, climate change would be catastrophic for the U.S. economy. Trump told reporters, "I don't believe it."</span></p><p data-dcnode-id="1684"><span data-dcnode-id="1688" instrument_node="">In June 2019, Trump met with </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/royalty/prince-charles"><span data-dcnode-id="1687" instrument_node="">Prince Charles</span></a><span data-dcnode-id="1685" instrument_node=""> and reportedly discussed climate change at length. In an interview with British TV host Piers Morgan, Trump said "I believe that there is a change in weather and I think it changes both ways...It used to be called global warming, that wasn't working, then it was called climate change and now actually it is called extreme weather."</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-14" data-dcnode-id="1681"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-14" data-dcnode-id="1682" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-c ement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-468bc0e067fc478a8f4e87ccd47d7c2a&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-17&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;17&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;17&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-468bc0e067fc478a8f4e87ccd47d7c2a&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1674"></phoenix-ad></div></aside><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Trump later told ITV’s Good Morning Britain that he pushed back Prince Charles’ suggestions that the United States do more to combat climate change, saying that the U.S. “now has among the cleanest climates there are based on all statistics.”</span></p><h3 data-dcnode-id="1668" id="paris-climate-agreement"><span data-dcnode-id="1669" instrument_node="">Paris Climate Agreement</span></h3><p data-dcnode-id="1663"><span data-dcnode-id="1667" instrument_node="">On June 1, 2017, Trump withdrew from the 2015 Paris Climate Agreement, which President Obama had joined along with the leaders of 195 other countries. The accord requires all participating nations to reduce greenhouse gas emissions in an effort to curb </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/natural-disasters-and-environment/history-of-climate-change" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1666" instrument_node="">climate change</span></a><span data-dcnode-id="1664" instrument_node=""> over the ensuing century and also to allocate resources for the research and development of alternative energy sources. </span></p><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">With Trump’s decision, the United States joined Syria and Nicaragua as the only three countries to reject the accord. However, Nicaragua eventually joined the Paris Climate Agreement months later.</span></p><h3 data-dcnode-id="1659" id="oil-extraction"><span data-dcnode-id="1660" instrument_node="">Oil Extraction</span></h3><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Soon after taking office, Trump revived the controversial Keystone XL and Dakota Access Pipelines to transfer oil extracted in Canada and North Dakota. The pipelines had been halted by President Obama following protests from environmental and Native American groups. </span></p><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Trump owned shares of Energy Transfer Partners, the company in charge of construction of the Dakota Access Pipeline, but sold his stake in the company in December 2016. Energy Transfer Partners CEO Kelcy Warren also contributed to Trump’s presidential campaign, raising concerns over conflict of interest.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-15" data-dcnode-id="1652"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-15" data-dcnode-id="1653" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-610f6b31d4a14c9cabf4af1de2a47def&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-15&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;15&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quo
