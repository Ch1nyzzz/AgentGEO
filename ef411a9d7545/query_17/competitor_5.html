In August 2019, the Trump administration announced it was overhauling the Endangered Species Act. This included changes to legislation that gave the government increased discretion over matters of climate change and economic cost when determining whether a species should be protected.</span></p><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="1615"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="1616" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="1627"><a data-dcnode-id="1630"><picture class="is-waiting-to-load" data-dcnode-id="1631"><source data-dcnode-id="1634" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_380/MTYzMjc0ODg1Nzg1NzI0MzAz/donald-trump-photo-by-scott-olsongetty-images.webp 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_620/MTYzMjc0ODg1Nzg1NzI0MzAz/donald-trump-photo-by-scott-olsongetty-images.webp 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1240/MTYzMjc0ODg1Nzg1NzI0MzAz/donald-trump-photo-by-scott-olsongetty-images.webp 1240w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_700/MTYzMjc0ODg1Nzg1NzI0MzAz/donald-trump-photo-by-scott-olsongetty-images.webp 700w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1400/MTYzMjc0ODg1Nzg1NzI0MzAz/donald-trump-photo-by-scott-olsongetty-images.webp 1400w" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)" type="image/webp"><source data-dcnode-id="1633" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_380/MTYzMjc0ODg1Nzg1NzI0MzAz/donald-trump-photo-by-scott-olsongetty-images.jpg 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_620/MTYzMjc0ODg1Nzg1NzI0MzAz/donald-trump-photo-by-scott-olsongetty-images.jpg 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_ "">One of Trump’s first executive orders in office was calling on federal agencies to "waive, defer, grant exemptions from, or delay" aspects of the Affordable Care Act to minimize financial burden on states, insurers and individuals.</span></p><p data-dcnode-id="1606"><span data-dcnode-id="1610" instrument_node="">On March 7, 2017, House Republicans, led by Speaker </span><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/political-figure/paul-ryan"><span data-dcnode-id="1609" instrument_node="">Paul Ryan</span></a><span data-dcnode-id="1607" instrument_node="">, introduced the American Health Care Act, a plan to repeal and replace the Affordable Care Act (ACA). However, the controversial bill ultimately didn't have enough Republican votes and was withdrawn a few weeks later, representing a major legislative setback for Speaker Ryan and Trump.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-16" data-dcnode-id="1603"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-16" data-dcnode-id="1604" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstr ;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;19&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-f4cad76ff0ca4498aa1c27c91e9ef145&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1599"></phoenix-ad></div></aside><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">After intense negotiations among party factions, a new Republican health care plan was brought to a vote in the House of Representatives on May 4, 2017, and passed by a slim margin of 217 to 213. That passed the buck to the Senate. </span></p><p data-dcnode-id="1590"><span data-dcnode-id="1594" instrument_node="">Almost immediately after a draft was unveiled on June 22, conservative senators such as Ted Cruz declared they could not support the bill's failure to significantly lower premiums, while moderates like Susan Collins voiced concerns over its steep cuts to Medicaid. On June 27, Senate Majority Leader </span><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/mitch-mcconnell-120216"><span data-dcnode-id="1593" instrument_node="">Mitch McConnell</span></a><span data-dcnode-id="1591" instrument_node=""> elected to delay his planned vote for the bill. When the third, so-called “skinny repeal,” bill finally went to a vote on in the Senate July 28, it failed by three votes.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-c not-size-d" data-ad-group="in_content-16" data-dcnode-id="1587"><div class="m-in-content-ad not-size-a not-size-c not-size-d" data-ad-group="in_content-16" data-dcnode-id="1588" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-36f4bd6aa3b14930b418727210d3207e&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-16&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;16&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&q node-id="1574"></phoenix-ad></div></aside><h3 data-dcnode-id="1570" id="birth-control-mandate"><span data-dcnode-id="1571" instrument_node="">Birth Control Mandate</span></h3><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">On October 6, 2017, the Trump administration announced a rollback of the birth control mandate put in place by the Obama administration’s Affordable Care Act, which required insurers to cover birth control at no cost without copayments as a preventive service. For years, the mandate was threatened by lawsuits from conservative and religious groups. </span></p><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">The Trump administration said the new exemption applied to any employer that objects to covering contraception services on the basis of “sincerely held religious beliefs or moral convictions.” The change is in line with Trump’s promises as a candidate to ensure that religious groups “are not bullied by the federal government because of their religious beliefs.” </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-c not-size-d" data-ad-group="in_content-17" data-dcnode-id="1563"><div class="m-in-content-ad not-size-a not-size-c not-size-d" data-ad-group="in_content-17" data-dcnode-id="1564" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-8f1ceafa22f140c28289f0fb49efbd23&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-17&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;17&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;17&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-8f1ceafa22f140c28289f0fb49efbd23&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1565"></phoenix-ad></div></aside><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Opponents of the measure said that it could potentially affect hundreds of thousands of women and that access to affordable contraception in the mandate provided prevents unintended pregnancies and saves women’s lives.</span></p><h2 data-dcnode-id="1559" id="abortion"><span data-dcnode-id="1560" instrument_node="">Abortion</span></h2><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">As president, Trump has said that he is “strongly pro-life” and wants to ban all abortions except in cases of rape, incest or when a woman’s life is in danger. He has supported bans on abortions after 20 weeks of pregnancy and has cited his appointments of conservative Supreme Court judges Gorsuch and Kavanaugh as helping to make abortion laws in some states more restrictive.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-21" data-dcnode-id="1554"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-21" data-dcnode-id="1555" data-zone-count="26"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-04f1a9857f294f7abf3b1f01b49ed210&quot;,&quot;visClasses&quot;:[&quo ="">The initial outline did not specify which income ranges would fall under those brackets. The plan also proposed to lower the corporate tax rate from 35 to 15 percent, eliminate the alternative minimum tax and estate tax, and simplify the process for filing tax returns. The proposal did not address how the tax cuts might reduce federal revenue and increase debt.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-c not-size-d" data-ad-group="in_content-18" data-dcnode-id="1535"><div class="m-in-content-ad not-size-a not-size-c not-size-d" data-ad-group="in_content-18" data-dcnode-id="1536" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-6b9426e97d134d569c2aa392959c0ab8&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-18&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&q ;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1532"></phoenix-ad></div></aside><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Among other measures, the Senate bill called for the slashing of the corporate tax rate from 35 to 20 percent, doubling personal deductions and ending the Obamacare mandate. It also included a controversial provision that allowed for "unborn children" to be named as beneficiaries of college savings accounts, which critics called an attempt to support the pro-life movement. Despite estimates by the Congressional Budget Office that the bill would cost $1.5 trillion over a decade, GOP senators insisted that charges would be offset by a growing economy.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-19" data-dcnode-id="1525"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-19" data-dcnode-id="1526" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstrea ry Stoneman Douglas High School in Parkland, Florida, which left a total of 17 students and faculty dead, sparked a strong response from Trump. </span></p><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">He ordered the Justice Department to issue regulations banning bump stocks and suggested he was willing to consider a range of measures, from strengthening background checks to raising the minimum age for buying rifles. He also backed an NRA-fueled proposal for arming teachers, which drew backlash from many in the profession.</span></p><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">The president remained invested in the issue even as the usual cycle of outrage began diminishing: In a televised February 28 meeting with lawmakers, he called for gun control legislation that would expand background checks to gun shows and internet transactions, secure schools and restrict sales for some young adults. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="1477"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="1478" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-4c4ce84e73b74dca9a75ada2bf2f70c1&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-21&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;21&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;D&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;21&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-4c4ce84e73b74dca9a75ada2bf2f70c1&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1479"></phoenix-ad></div></aside><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-d" data-ad-group="in_content-21" data-dcnode-id="1474"><div class="m-in-content-ad not-size-a not-size-b not-size-d" data-ad-group="in_content-21" data-dcnode-id="1475" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-d m-in-cont showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1476"></phoenix-ad></div></aside><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">At one point he called out Pennsylvania Senator Pat Toomey for being "afraid of the NRA," and at another, he suggested that authorities should seize guns from mentally ill or other potentially dangerous people without first going to court. "I like taking the guns early," he said. "Take the guns first, go through due process second."</span></p><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">His stances seemingly stunned the Republican lawmakers at the meeting, as well as the NRA, which previously considered the president as a strong supporter. Within a few days, Trump was walking back his proposal to raise the age limit and mainly pushing for arming select teachers.</span></p><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">In June 2019, Trump said he would “think about” a ban on gun silencers following the deaths of a dozen people, who were killed by a gunman at the Virginia Beach Municipal Center. Two months later, after back-to-back mass shootings in El Paso, Texas, and Dayton, Ohio, the president suggested tying expanded background checks to immigration reform legislation.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-c not-size-d" data-ad-group="in_content-21" data-dcnode-id="1465"><div class="m-in-content-ad not-size-a not-size-c not-size-d" data-ad-group="in_content-21" data-dcnode-id="1466" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay& Ohio.&nbsp;</span></p><p class="tml-image--attribution" data-dcnode-id="1448" itemprop="author"><span data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Photo: Chip Somodevilla/Getty Images</span></span></p></figcaption></figure></div><h2 data-dcnode-id="1443" id="trump-and-mexico"><span data-dcnode-id="1444" instrument_node="">Trump and Mexico </span></h2><h3 data-dcnode-id="1441" id="border-wall"><span data-dcnode-id="1442" instrument_node="">Border Wall</span></h3><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Trump issued an executive order to build a wall at the United States’ border with Mexico. In his first televised interview as president, Trump said the initial construction of the wall would be funded by U.S. taxpayer dollars, but that Mexico would reimburse the U.S. “100 percent” in a plan to be negotiated and might include a suggested import tax on Mexican goods. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-22" data-dcnode-id="1436"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-22" data-dcnode-id="1437" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;override " data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1435"></phoenix-ad></div></aside><p data-dcnode-id="1428"><span data-dcnode-id="1432" instrument_node="">In response to the new administration's stance on a border wall, Mexican President </span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/enrique-pena-nieto-091815"><span data-dcnode-id="1431" instrument_node="">Enrique Peña Nieto</span></a><span data-dcnode-id="1429" instrument_node=""> canceled a planned visit to meet with Trump. "Mexico does not believe in walls," the Mexican president said in a video statement. "I've said time again; Mexico will not pay for any wall." </span></p><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">After funding for the wall failed to materialize, from either Mexico or Congress, Trump in April 2018 announced that he would reinforce security along the U.S. border with Mexico by using American troops because of the "horrible, unsafe laws" that left the country vulnerable. The following day, the president signed a proclamation that directed National Guard troops to the U.S.-Mexico border. </span></p><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">The Department of Homeland Security said that the deployment would be in coordination with governors, that the troops would "support federal law enforcement personnel, including [Customs and Border Protection]," and that federal immigration authorities would "direct enforcement efforts." </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-c not-size-d" data-ad-group="in_content-22" data-dcnode-id="1421"><div class="m-in-content-ad not-size-a not-size-c not-size-d" data-ad-group="in_content-22" data-dcnode-id="1422" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-bea00a9e14aa4e05945ac2c065ae27f5&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-22&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;22&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;22&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-bea00a9e14aa4e05945ac2c065ae27f5&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1423"></phoenix-ad></div></aside><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">In December 2018, shortly before a newly elected Democratic majority was set to take control of the House, Trump announced he would not sign a bill to fund the government unless Congress allocated $5.7 billion toward building his long-promised border wall. With Democrats refusing to give in to his demand, a partial government shutdown ensued for a record 35 days, until all sides agreed to another attempt at striking a compromise.</span></p><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">On February 14, 2019, one day before the deadline, Congress passed a $333 billion spending package that allocated $1.375 billion for 55 miles of steel-post fencing. After indicating that he would sign the bill, the President made good on his threat to declare a national emergency the following day, enabling him to funnel $3.6 billion slated for military construction projects toward building the wall.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-23" data-dcnode-id="1414"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-23" data-dcnode-id="1415 ot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;23&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;C&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;23&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-0ae3e452153f46bc9fa82c2fdd774608&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1413"></phoenix-ad></div></aside><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">In response, a coalition of 16 states filed a lawsuit that challenged Trump's power to circumvent Congress on this issue.</span></p><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">"Contrary to the will of Congress, the president has used the pretext of a manufactured 'crisis' of unlawful immigration to declare a national emergency and redirect federal dollars appropriated for drug interdiction, military construction and law enforcement initiatives toward building a wall on the United States-Mexico border," the lawsuit said.</span></p><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">After the House voted for a resolution to overturn the national emergency declaration in late February, the Senate followed suit on March 14 when 12 Republican senators joined a united Democratic side to vote for the resolution. Trump promptly issued the first veto of his presidency the following day, calling the resolution a "vote against reality."</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-c not-size-d" data-ad-group="in_content-23" data-dcnode-id="1402"><div class="m-in-content-ad not-size-a not-size-c not-size-d" data-ad-group="in_content-23" data-dcnode-id="1403" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-ba41efa7aa0e48f8b7bfd562a74b2c7b&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-23&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;23&quot;,&quot;isOutstream&quot;:false,& wound through immigration courts. </span></p><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">A furor ensued after reports surfaced that nearly 2,000 children had been separated from their parents over a six-week period that ended in May 2018, compounded by photos of toddlers crying in cages. Trump initially deflected blame for the situation, insisting it resulted from the efforts of predecessors and political opponents. "The Democrats are forcing the breakup of families at the Border with their horrible and cruel legislative agenda," he tweeted.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-24" data-dcnode-id="1391"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-24" data-dcnode-id="1392" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-c10edb178e9f411ca0ac318ef23f406c&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&qu quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-2fe29cfb2eae49118f31117760d34d69&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-24&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;24&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;C&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;24&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-2fe29cfb2eae49118f31117760d34d69&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1390"></phoenix-ad></div></aside><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">The president ultimately caved to pressure from the bad PR, and on June 20 he signed an executive order that directed the Department of Homeland Security to keep families together. </span></p><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">"I didn’t like the sight or the feeling of families being separated," he said, adding that it remained important to have "zero tolerance for people that enter our country illegally" and for Congress to find a permanent solution to the problem. In the meantime, the DHS essentially revived the "catch-and-release" system that the zero-tolerance policy was meant to eradicate while dealing with the logistics of reuniting families.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-c not-size-d" data-ad-group="in_content-24" data-dcnode-id="1381"><div class="m-in-content-ad not-size-a not-size-c not-size-d" data-ad-group="in_content-24" data-dcnode-id="1382" data-zone-count="26"><phoenix-ad class="m-ad not-size-a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-20254d834ecf450b95e723467128a0a4&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-24&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;24&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;24&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-20254d834ecf450b95e723467128a0a4&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/us-president&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1383"></phoenix-ad></div></aside><h2 data-dcnode-id="1379" id="travel-ban"><span data-dcnode-id="1380" instrument_node="">Travel Ban</span></h2><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">President Trump signed one of his most controversial executive orders on January 27, 2017, calling for "extreme vetting" to "keep radical Islamic terrorists out of the United States of America." The president's executive order was put into effect immediately, and refugees and immigrants from seven predominantly Muslim countries traveling to the U.S. were detained at U.S. airports. </span></p><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">The order called for a ban on immigrants from Iraq, Syria, Iran, Sudan, Libya, Somalia and Yemen for at least 90 days, temporarily suspended the entry of refugees for 120 days and barred Syrian refugees indefinitely. In an interview with the Christian Broadcasting Network, Trump also said he would give priority to Christian refugees trying to gain entry into the United States.</span></p><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">After facing multiple legal hurdles, Trump signed a revised executive order on March 6, 2017, calling for a 90-day ban on travelers from six predominantly Muslim countries including Sudan, Syria, Iran, Libya, Somalia and Yemen. Iraq, which was included in the original executive order, was removed from the list. </span></p><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Travelers from the six listed countries, who hold green cards or have valid visas as of the signing of the order, will not be affected. Religious minorities would not get special preference, as was outlined in the original order, and an indefinite ban on Syrian refugees was reduced to 120 days.</span></p><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">On March 15, just hours before the revised ban was going to be put into effect, Derrick Watson, a federal judge in Hawaii, issued a temporary nationwide restraining order in a ruling that stated the executive order did not prove that a ban would protect the country from terrorism and that it was “issued with a purpose to disfavor a particular religion, in spite of its stated, religiously neutral purpose.” At a rally in Nashville, Trump responded to the ruling, saying: "This is, in the opinion of many, an unprecedented judicial overreach.”</span></p><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Judge Theodore D. Chuang of Maryland also blocked the ban the following day, and in subsequent months, the ban was impeded in decisions handed down by the U.S. Court of Appeals for the Fourth Circuit in Richmond, Virginia, and the Ninth U.S. Circuit Court of Appeals once again.</span></p><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">However, on June 26, 2017, Trump won a partial victory when the Supreme Court announced it was allowing the controversial ban to go into effect for foreign nationals who lacked a "bona fide relationship with any person or entity in the United States." The court agreed to hear oral arguments for the case in October, but with the 90-to-120-day timeline in place for the administration to conduct its reviews, it was believed the case would be rendered moot by that point.</span></p><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">On September 24, 2017, Trump issued a new presidential proclamation, which permanently bans travel to the United States for most citizens from seven countries. Most were on the original list, including Iran, Libya, Syria, Yemen, Somalia, while the new order included Chad, North Korea and some citizens of Venezuela (certain government officials and their families). The tweak did little to pacify critics, who argued that the order was still heavily biased toward Islam. </span></p><p data-dcnode-id="1358"><span data-dcnode-id="1362" instrument_node="">“The fact that Trump has added North Korea — with few visitors to the U.S. — and a few government officials from Venezuela doesn’t obfuscate the real fact that the administration’s order is still a Muslim ban,” said Anthony D. Romero, the executive director of the </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/gay-rights/aclu" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1361" instrument_node="">American Civil Liberties Union</span></a><span data-dcnode-id="1359" instrument_node="">. </span></p><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">On October 10, the Supreme Court canceled a planned hearing on an appeal of the original travel ban. On October 17, the day before the order was to take effect, Judge Watson of Hawaii issued a nationwide order freezing the Trump administration’s new travel ban, writing that the order was a “poor fit for the issues regarding the sharing of ‘public-safety and terrorism-related information that the president identifies.”</span></p><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">On December 4, 2017, the Supreme Court allowed the third version of the Trump administration’s travel ban to go into effect despite the ongoing legal challenges. The court’s orders urged appeals courts to determine as quickly as possible whether the ban was lawful.</span></p><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Under the ruling, the administration could fully enforce its new restrictions on travel from eight nations, six of them predominantly Muslim. Citizens of Iran, Libya, Syria, Yemen, Somalia, Chad and North Korea, along with some groups of people from Venezuela, would be unable to emigrate to the United States permanently, with many barred from also working, studying or vacationing in the country.</span></p><p data-dcnode-id="1344"><span data-dcnode-id="1351" instrument_node="">On June 26, 2018, the Supreme Court upheld the president's travel ban by a 5-4 vote. Writing for the majority, Chief Justice John Roberts said that Trump had the executive authority to make national security judgments in the realm of immigration, regardless of his previous statements about Islam. In a sharply worded dissent, Justice </span><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/sonia-sotomayor-453906"><span data-dcnode-id="1350" instrument_node="">Sonia Sotomayor</span></a><span data-dcnode-id="1348" instrument_node=""> said that the outcome was equivalent to that of </span><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Korematsu v. United States</span></em><span data-dcnode-id="1345" instrument_node="">, which permitted the detention of Japanese-Americans during World War II.</span></p><h3 data-dcnode-id="1342" id="public-charge-rule"><span data-dcnode-id="1343" instrument_node="">'Public Charge' Rule</span></h3><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">
In August 2019, the Trump administration unveiled a new regulation designed to weed out immigrants who would potentially require government assistance. Known as the "public charge" rule, for people who are dependent on Medicaid, food stamps and other benefits, the policy tightened requirements for legal immigrants seeking to become permanent residents by focusing on factors like education, assets, resources and financial status.</span></p><h2 data-dcnode-id="1338" id="trump-and-north-korea"><span data-dcnode-id="1339" instrument_node="">Trump and North Korea</span></h2><h3 data-dcnode-id="1336" id="nuclear-weapons-and-economic-sanctions"><span data-dcnode-id="1337" instrument_node="">Nuclear Weapons and Economic Sanctions</span></h3><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">In early August 2017, intelligence experts confirmed that North Korea successfully produced a miniaturized nuclear warhead that fits inside its missiles, putting it one step closer to becoming a nuclear power. Around the same time, the North Korean state news agency said they were "examining the operational plan" to strike areas around the U.S. territory of Guam with medium-to-long-range strategic ballistic missiles. </span></p><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">U.S. experts estimated North Korea’s nuclear warheads at 60 and that the country could soon have an intercontinental ballistic missile capable of reaching the United States. Trump responded that North Korea would be met with “fire and fury” if the threats continued and that the U.S. military was “locked and loaded.”</span></p><p data-dcnode-id="1324"><span data-dcnode-id="1331" instrument_node="">On August 15, Korean leader </span><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/kim-jong-un-21125351"><span data-dcnode-id="1330" instrument_node="">Kim Jong-un</span></a><span data-dcnode-id="1328" instrument_node=""> said he’d "watch a little more the foolish and stupid conduct of the Yankees," which Trump tweeted was “a very wise and well reasoned decision.” However on August 20, North Korea warned that the U.S. was risking an "uncontrollable phase of a nuclear war" by following through with military drills with </span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/korea/south-korea" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1327" instrument_node="">South Korea</span></a><span data-dcnode-id="1325" instrument_node="">.</span></p><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">On August 28, North Korea launched a missile over Japan. The following day, Trump said “all options were on the table.” At the United Nations General Assembly on September 19, Trump pejoratively called Kim Jong-un “Rocketman” and said he would “totally destroy” North Korea if it threatened the United States or its allies, hours after the group voted to enact additional sanctions against the country. </span></p><p data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node="">Two days later, Trump widened American economic sanctions; three days later North Korea threatened to shoot down American airplanes even if they were not in its airspace, calling Trump’s comments “a declaration of war.” A week later, Secretary of State </span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/rex-tillerson-020217"><span data-dcnode-id="1320" instrument_node="">Rex Tillerson</span></a><span data-dcnode-id="1318" instrument_node=""> said the U.S. and North Korea were in “direct communication” and looking for a non-militarized path forward.</span></p><p data-dcnode-id="1312"><span data-dcnode-id="1316" instrument_node="">On October 20, CIA Director </span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/mike-pompeo-121317"><span data-dcnode-id="1315" instrument_node="">Mike Pompeo</span></a><span data-dcnode-id="1313" instrument_node=""> warned that North Korea was in the "final step" of being able to strike mainland America with nuclear warheads and the U.S. should react accordingly. Some foreign policy experts were concerned that war between the U.S. and North Korea was increasingly possible.</span></p><section class="m-in-content-recommendation m-detail--in-content-recommendation m-detail--body-reset mm-component-stack--is-body-item" data-dcnode-id="1235" style="--title_size_a_font_size:25;--title_size_b_font_size:24;--title_size_c_font_size:25;"><div class="m-detail--recommendation-scroll-hint" data-dcnode-id="1309"><span data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Scroll to Continue</span></span></div><div class="m-component-header m-component-stack--header mm-component-header--is-incontent-rec" data-dcnode-id="1305"><div class="m-component-header--container mm-component-header--size-fit" data-dcnode-id="1306"><h2 aria-level="2" class="m-component-header--title" data-dcnode-id="1307" role="heading"><span data-dcnode-id="1308" instrument_node="">READ NEXT</span></h2></div></div><div data-dcnode-id="1236"><section class="m-card-group mm-card-group--in-content" data-dcnode-id="1237"><phoenix-non-personalized-recommendations-tracking class="m-card-group--content l-grid lm-grid--density-standard lm-grid--standard-cards" config="{&quot;isInContentRecommendation&quot;:true,&quot;siteBasePath&quot;:null,&quot;size&quot;:3,&quot;widgetName&quot;:&quot;tempestn_in-content-rec_biography_person-page_title-not-found-see-more-1&quot;}" data-dcnode-id="1238"><div class="l-grid--item" data-dcnode-id="1283"><phoenix-super-link data-dcnode-id="1284" href="/political-figure/martha-mitchell" onclick="return window.phoenixTrackR a-dcnode-id="1241" index="2" role="article"><div class="m-card--media" data-dcnode-id="1252"><a class="m-card--image-link" data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/writer/ocean-vuong" onclick="return phoenixTrackClickEvent(this, event);" phx-track-id="Image" rel="" tabindex="-1" title="Ocean Vuong"><phoenix-picture data-dcnode-id="1254"><picture class="is-waiting-to-load" data-dcnode-id="1256"><source data-dcnode-id="1259" data-srcset="https://www.biography.com/.image/ar_16:9%2Cc_fill%2Ccs_srgb%2Cg_faces:center%2Cq_auto:good%2Cw_320/MTg4NzM3MDA4ODQyNDUwNjc2/gettyimages-1181898836.webp 320w, https://www.biography.com/.image/ar_16:9%2Cc_fill%2Ccs_srgb%2Cg_faces:center%2Cq_auto:good%2Cw_640/MTg4NzM3MDA4ODQyNDUwNjc2/gettyimages-1181898836.webp 640w, https://www.biography.com/.image/ar_16:9%2Cc_fill%2Ccs_srgb%2Cg_faces:center%2Cq_auto:good%2Cw_960/MTg4NzM3MDA4ODQyNDUwNjc2/gettyimages-1181898836.webp 960w" media="(min-width: 0px)" sizes="320px" type="image/webp"><source data-dcnode-id="1258" data-srcset="https://www.biography.com/.image/ar_16:9%2Cc_fill%2Ccs_srgb%2Cfl_progressive%2Cg_faces:center%2Cq_auto:good%2Cw_320/MTg4NzM3MDA4ODQyNDUwNjc2/gettyimages-1181898836.jpg 320w, https://www.biography.com/.image/ar_16:9%2Cc_fill%2Ccs_srgb%2Cfl_progressive%2Cg_faces:center%2Cq_auto:good%2Cw_640/MTg4NzM3MDA4ODQyNDUwNjc2/gettyimages-1181898836.jpg 640w, https://www.biography.com/.image/ar_16:9%2Cc_fill%2Ccs_srgb%2Cfl_progressive%2Cg_faces:center%2Cq_auto:good%2Cw_960/MTg4NzM3MDA4ODQyNDUwNjc2/gettyimages-1181898836.jpg 960w" media="(min-width: 0px)" sizes="320px"><img alt="GettyImages-1181898836" class="m-card--image-element" data-dcnode-id="1257" decoding="async" nopin="true" sizes="320px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/.image/ar_16%3A9%252Cc_fill%252Ccs_srgb%252Cfl_progressive%252Cg_faces%3Acenter%252Cq_auto%3Agood%252Cw_620/MTg4NzM3MDA4ODQyNDUwNjc2/gettyimages-1181898836.jpg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></picture><div class="m-card--image-aspect-ratio-pusher" data-dcnode-id="1255"></div></phoenix-picture></a></div><div class="m-card--content" data-dcnode-id="1242"><phoenix-ellipsis class="m-ellipsis m-card--header" data-dcnode-id="1248"><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/writer/ocean-vuong" onclick="return phoenixTrackClickEvent(this, event, 'click', 'phx-track-id', false) &amp;&amp; window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" oncontextmenu="return window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" phx-track-id="Title" rel=""><h2 aria-level="2" class="m-ellipsis--text m-card--header-text" data-dcnode-id="1250" role="heading"><span data-dcnode-id="1251" instrument_node="">Ocean Vuong</span></h2></a></phoenix-ellipsis><div class="m-card--metadata" data-dcnode-id="1243"><div class="m-card--metadata-a" data-dcnode-id="1244"><span class="mm-card-metadata-slot" data-dcnode-id="1245"><span class="mm-card--metadata-text" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">(1988–)</span></span></span></div></div></div></phoenix-card></phoenix-super-link></div></phoenix-non-personalized-recommendations-tracking></section></div></section><h3 data-dcnode-id="1233" id="summits-with-kim-jong-un"><span data-dcnode-id="1234" instrument_node="">Summits With Kim Jong-un</span></h3><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Following the 2018 Winter Olympics in PyeongChang, South Korea, during which North Korea made a show of unity with the host country, its officials also relayed interest in opening up communications with Washington. Trump leaped at the opportunity, announcing that he was willing to sit down with Kim.</span></p><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">On June 12, 2018, Trump and Kim met at the secluded Capella resort in Singapore, marking the first such encounter between a sitting U.S. president and North Korean leader. The two held private talks with their interpreters, before expanding the meeting to include such top staffers as Pompeo (now U.S. secretary of state), National Security Adviser John Bolton and White House Chief of Staff John Kelly.</span></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Afterward, in a televised ceremony, the leaders signed a joint statement in which Trump "committed to provide security guarantees" to North Korea and Kim "reaffirmed his firm and unwavering commitment to complete denuclearization of the Korean Peninsula." Although their talks marked an early step in a diplomatic process that some predicted could take years to complete, the president said he believed denuclearization on the peninsula would begin "very quickly."</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">"We're very proud of what took place today," Trump said. "I think our whole relationship with North Korea and the Korean Peninsula is going to be a very much different situation than it has in the past."</span></p><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">On February 27, 2019, the two men met for a second summit, at the Metropole hotel in Hanoi, Vietnam, to discuss the next steps in denuclearization. Said Trump to his counterpart: "I think you will have a tremendous future with your country — a great leader. And I look forward to watching it happen and helping it to happen."</span></p><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">However, negotiations abruptly ended the second day, after North Korea reportedly asked for sanctions to be lifted in exchange for dismantling its main nuclear facility but not all elements of its weapons program. "Sometimes you have to walk," the president said, before adding that things concluded on good terms.</span></p><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">On June 30, 2019, Trump became the&nbsp;first sitting U.S. president to set foot in North Korea when he met with Kim for informal discussions at the Demilitarized Zone between the two countries on the Korean peninsula. Trump later said that he and&nbsp;Kim had agreed to designate negotiators to resume denuclearization talks in the coming weeks.&nbsp;</span></p><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="1199"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="1200" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="1211"><a data-dcnode-id="1214"><picture class="is-waiting-to-load" data-dcnode-id="1215"><source data-dcnode-id="1218" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_380/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.webp 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_620/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.webp 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1240/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.webp 1240w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_700/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.webp 700w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1400/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.webp 1400w" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)" type="image/webp"><source data-dcnode-id="1217" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_380/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.jpg 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_620/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.jpg 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_1240/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.jpg 1240w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_700/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.jpg 700w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_1400/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.jpg 1400w" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)"><img alt="Donald Trump Photo" class="m-detail--tml-image m-image" data-dcnode-id="1216" data-src="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_700/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.jpg" decoding="async" height="2403" itemprop="contentUrl url" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/.image/t_share/MTQyODM4MjQ4NjY0NzM3NTY0/gettyimages-587970702jpg.jpg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="3600"></picture></a><div class="m-detail--tml-image-wrapper" data-dcnode-id="1212" style="max-width:3600px; min-width:0px;"><div class="m-detail--tml-image-container" data-dcnode-id="1213" style="padding-top: 67%"></div></div></phoenix-picture><figcaption data-dcnode-id="1201"><p class="tml-image--caption" data-dcnode-id="1205" itemprop="caption"><span data-dcnode-id="1206" instrument_node="">Donald Trump speaking at a campaign rally at Winnacunnet High School in Hampton, New Hampshire on August 14, 2015</span></p><p class="tml-image--attribution" data-dcnode-id="1202" itemprop="author"><span data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Photo: Rick Friedman/rickfriedman.com/Corbis via Getty Images</span></span></p></figcaption></figure></div><h2 data-dcnode-id="1197" id="trump-and-russia"><span data-dcnode-id="1198" instrument_node="">Trump and Russia</span></h2><h3 data-dcnode-id="1195" id="russian-hacking-in-the-2016-election"><span data-dcnode-id="1196" instrument_node="">Russian Hacking in the 2016 Election</span></h3><p data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">Throughout the 2016 presidential election, Trump vehemently denied allegations he had a relationship with Russian President </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tempest.saymedia.com/people/vladimir-putin-9448807" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1193" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="1191" instrument_node=""> and was tied to the hacking of the DNC emails. </span></p><p data-dcnode-id="1182"><span data-dcnode-id="1189" instrument_node="">In January 2017, a U.S. intelligence report prepared by the </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-government/history-of-the-cia" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1188" instrument_node="">CIA</span></a><span data-dcnode-id="1186" instrument_node="">, </span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-government/fbi" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1185" instrument_node="">FBI</span></a><span data-dcnode-id="1183" instrument_node=""> and NSA concluded that Putin had ordered a campaign to influence the U.S. election. “Russia’s goals were to undermine public faith in the U.S. democratic process, denigrate Secretary Clinton, and harm her electability and potential presidency. We further assess Putin and the Russian Government developed a clear preference for President-elect Trump," the report said.</span></p><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Prior to the release of the report, President-elect Trump had cast doubt on Russian interference and the intelligence community’s assessment. Trump received an intelligence briefing on the matter, and in his first press conference as president-elect on January 11, he acknowledged Russia’s interference. </span></p><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">However, in subsequent comments he again refused to condemn Russia for such activity, notably saying on multiple occasions that he believed Putin's denials.</span></p><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">In March 2018, the Trump administration formally acknowledged the charges by issuing sanctions on 19 Russians for interference in the 2016 presidential election and alleged cyberattacks. Treasury Secretary Steven Mnuchin delivered the announcement, with the president remaining silent on the matter.</span></p><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">In July, days before Trump was to meet with Putin in Finland, Deputy Attorney General Rod Rosenstein announced additional charges against 12 Russian intelligence officers accused of hacking the DNC and the Clinton campaign.</span></p><h3 data-dcnode-id="1172" id="meeting-with-putin"><span data-dcnode-id="1173" instrument_node="">Meeting With Putin</span></h3><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">The White House announced that Trump would hold his first formal discussions with Russian President Putin in Helsinki, Finland, on July 16, 2018. </span></p><p data-dcnode-id="1165"><span data-dcnode-id="1169" instrument_node="">The two men met on the heels of Trump's heavily scrutinized summit with </span><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/cold-war/formation-of-nato-and-warsaw-pact" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1168" instrument_node="">NATO</span></a><span data-dcnode-id="1166" instrument_node=""> leaders, and shortly after the Justice Department announced the indictment of 12 Russian operatives for interfering in the 2016 U.S. presidential election. </span></p><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Prompted to address the issue of election hacking in a joint news conference for the two leaders, Trump refused to point a finger at his counterpart. "I think we've all been foolish. I think we're all to blame," he said, adding that "President Putin was extremely strong and powerful in his denial today."</span></p><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">The comments drew a harsh response stateside, with several notable Republicans joining their Democratic colleagues to question why the president was siding with Putin over his intelligence agencies. Senator McCain called it "one of the most disgraceful performances by an American president in memory," and even Trump ally Newt Gingrich weighed in with strong words, tweeting, "It is the most serious mistake of his presidency and must be corrected — immediately."</span></p><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Trump sought to quiet the furor after returning to the White House, insisting that he had misspoken when saying he didn't see why Russia should be blamed and reminding that he has "on numerous occasions noted our intelligence findings that Russians attempted to interfere in our elections," though he again suggested that other parties could be responsible. </span></p><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Around that time, it was revealed that Trump had instructed Bolton, his national security adviser, to invite Putin to the White House that autumn, news that caught Director of National Intelligence Dan Coats off guard. Bolton soon disclosed that he would postpone the invitation until the conclusion of the special counsel investigation into Russian meddling in the 2016 U.S. presidential election.</span></p><h3 data-dcnode-id="1155" id="russian-sanctions"><span data-dcnode-id="1156" instrument_node="">Russian Sanctions</span></h3><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Despite Trump's overtures to Putin, his administration in February 2019 announced the suspension of the Intermediate-Range Nuclear Forces Treaty with Russia, due to the Eastern power's repeated violations of the agreement. The announcement gave Russia 180 days to comply with terms before U.S. withdrawal from the treaty would be completed.</span></p><h2 data-dcnode-id="1151" id="syria"><span data-dcnode-id="1152" instrument_node="">Syria&nbsp;</span></h2><p data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">On April 6, 2017, Trump ordered a military strike, to which he had tweeted opposition to when Obama was in office, on a Syrian government airfield. The strike was in response to a chemical attack by Syrian president </span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/bashar-al-assad-20878575"><span data-dcnode-id="1149" instrument_node="">Bashar al-Assad</span></a><span data-dcnode-id="1147" instrument_node=""> on Syrian civilians that had led to the horrific deaths of dozens of men, women and children. </span></p><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Navy destroyers fired 59 Tomahawk missiles at Shayrat airfield, from where the attack was launched. It was the first direct military action by the United States against Syrian military forces during the country's ongoing civil war.</span></p><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">One year later, evidence surfaced of another chemical attack on Syrians, with dozens reported dead in the rebel-held city of Douma. Although Syria and its ally, Russia, referred to the situation as a "hoax" perpetrated by terrorists, Trump wasn't having it: "Russia vows to shoot down any and all missiles fired at Syria. Get ready Russia, because they will be coming," he tweeted, adding, "You shouldn't be partners with a Gas Killing Animal who kills his people and enjoys it!"</span></p><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">The U.S. subsequently joined forces with Britain and France for coordinated strikes on Syria early in the morning of April 14, 2018. Larger than the previous year's operation, this one hit two chemical weapons facilities and a scientific research center. Afterward, the president took to Twitter to thank his military allies for their efforts, declaring, "Mission Accomplished!"</span></p><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">In December 2018, Trump announced that U.S. military troops would be pulled from Syria, before changing his mind when that decision was denounced as one that would primarily benefit Assad and his government's main ally, Russia. However, the president reversed course again the following October by ordering U.S. troops withdrawn from northeast Syria to clear the way for a Turkish military operation, one that could threaten American-backed Kurdish insurgents in the area.
</span></p><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">
Again drawing a sharp response from critics, the president made his case on Twitter by arguing it was time to get out of Syria and let other nations in the region "figure the situation out," adding that he would respond forcefully if Turkey did anything "off limits." Shortly afterward, he announced he was imposing sanctions on Turkey for a military offensive that was "endangering civilians and threatening peace, security, and stability in the region."</span></p><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="1116"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="1117" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="1128"><a data-dcnode-id="1131"><picture class="is-waiting-to-load" data-dcnode-id="1132"><source data-dcnode-id="1135" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_380/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.webp 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_620/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.webp 620w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1240/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.webp 1240w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_700/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.webp 700w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1400/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.webp 1400w" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)" type="image/webp"><source data-dcnode-id="1134" data-srcset="https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_380/MTUzMTg2MTcxMDg0NjEyNjE1/photo-by-drew-angerergetty-imagesjpg.jpg 380w, https://www.biography.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_620/MTUzMTg2MTcxMDg0NjEyN
