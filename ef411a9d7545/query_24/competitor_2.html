</span></div></div></div><h3 class="is-style-article-section" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Origin</span></h3><span data-dcnode-id="1109" instrument_node=""> </span><div class="single-body card-body rich-text" data-component="content-body" data-dcnode-id="865"><span data-dcnode-id="1108" instrument_node="">
</span><meta content="text/html; charset=utf-8" data-dcnode-id="1107" http-equiv="Content-Type"><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">An anecdote about Donald Trump and his outsized U.S. flag and pole neatly encapsulated what so many people found either most appealing or most distasteful about the business magnate and 2016 Republican presidential candidate: to some he was the no-nonsense take-charge type who had the power and influence to thwart those who would insist on allowing the enforcement of petty rules or “political correctness” impede the progress of business and the course of “making America great again”; to others he was a wealthy blowhard who thought the rules didn’t apply to him and habitually bullied others into submission to feed his lust for self-aggrandizement and self-enrichment:</span></p><span data-dcnode-id="1104" instrument_node="">
</span><blockquote data-dcnode-id="1101"><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">
When Trump purchased and rebuilt Mar-A-Lago the Grand mansion and estate in Palm beach, Florida he got into a dispute with the city, who are well known for being strict on zoning regulations. Trump put up a 50 foot flag pole even though 30 foot is the maximum allowed. The city imposed a 1,000 dollar fine per day. While Trump and the city argued back and forth, finally when the fine had reached 120,000 dollars Trump proposed a solution. He would donate that amount to veterans organizations, would move the flag and pole to a different location in front of the mansion and would only use a 30 foot flag pole. The city agreed. So Trump brought in the company who does Golf course construction had them build a 20 foot high grassy hill and put a 30 foot flag pole on top of it.
</span></p></blockquote><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1099" instrument_node="">The basic facts are these: In 1985, Donald Trump paid $10 million for </span><span data-dcnode-id="1097" style="white-space: nowrap"><span data-dcnode-id="1098" instrument_node="">Mar-A-Lago,</span></span><span data-dcnode-id="1096" instrument_node=""> the name of the Marjorie Merriweather Post estate in Palm Beach, Florida.  On </span><span data-dcnode-id="1094" style="white-space: nowrap"><span data-dcnode-id="1095" instrument_node="">3 October</span></span><span data-dcnode-id="1093" instrument_node=""> 2006, Trump had an outsized American flag (variously described as being either </span><span data-dcnode-id="1091" style="white-space: nowrap"><span data-dcnode-id="1092" instrument_node="">15×25 feet</span></span><span data-dcnode-id="1090" instrument_node=""> or </span><span data-dcnode-id="1088" style="white-space: nowrap"><span data-dcnode-id="1089" instrument_node="">20×30 feet</span></span><span data-dcnode-id="1087" instrument_node="">) installed on an </span><span data-dcnode-id="1085" style="white-space: nowrap"><span data-dcnode-id="1086" instrument_node="">80-foot-</span></span><span data-dcnode-id="1084" instrument_node="">high flagpole at </span><span data-dcnode-id="1082" style="white-space: nowrap"><span data-dcnode-id="1083" instrument_node="">Mar-a-Lago,</span></span><span data-dcnode-id="1081" instrument_node=""> in violation of local zoning regulations that established a maximum size of </span><span data-dcnode-id="1079" style="white-space: nowrap"><span data-dcnode-id="1080" instrument_node="">4×6 feet</span></span><span data-dcnode-id="1078" instrument_node=""> for flags and a maximum height of </span><span data-dcnode-id="1076" style="white-space: nowrap"><span data-dcnode-id="1077" instrument_node="">42 feet</span></span><span data-dcnode-id="1075" instrument_node=""> for flagpoles.  Trump put up his regulation-violating flag and pole without obtaining either a building permit permit or a variance from local authorities, and the Palm Beach town council accordingly fined him $1,250 (or, in some accounts, $250) for every day the flag remained in place (apparently citing him only for the pole but not the flag itself). Trump in turn filed a </span><span data-dcnode-id="1073" style="white-space: nowrap"><span data-dcnode-id="1074" instrument_node="">$25 million</span></span><span data-dcnode-id="1072" instrument_node=""> lawsuit against Palm Beach, claiming that the town was selectively enforcing its rules (by not fining other properties that were flying flags in violation of town ordinances) and infringing his constitutional right to free speech.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node="">Six months later the two sides finally reached an agreement during “secret, court-ordered negotiations,” with the town agreeing to waive all fines against Trump for his code-busting flagpole and to “review its ordinances and codes dealing with flagpoles and flags during the next zoning season,” and Trump agreeing to drop his lawsuit, lower the height of his flagpole from 80 to </span><span data-dcnode-id="1067" style="white-space: nowrap"><span data-dcnode-id="1068" instrument_node="">70 feet,</span></span><span data-dcnode-id="1066" instrument_node=""> obtain a permit for the pole and move it farther inland, and donate $100,000 “to charities dealing with Iraq War Veterans, [the] American Flag, or the local VA hospital.”   </span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1063" instrument_node="">So, the anecdote reproduced above is true in its broad strokes, although all of the numbers it cites (dollar amounts and dimensions) are inaccurate, the issue was resolved via court-ordered mediation (not by Trump’s “proposing a solution”), and the money Trump agreed to donate to settle the matter went to organizations selected by both sides (although Trump had previously stated that if he won his </span><span data-dcnode-id="1061" style="white-space: nowrap"><span data-dcnode-id="1062" instrument_node="">15×25 feet</span></span><span data-dcnode-id="1060" instrument_node=""> or </span><span data-dcnode-id="1058" style="white-space: nowrap"><span data-dcnode-id="1059" instrument_node="">$25 million</span></span><span data-dcnode-id="1057" instrument_node=""> lawsuit, the proceeds would go to military members returning from Iraq). </span></p><div class="smg-zone smg-zone-post-body-1" data-dcnode-id="1037" id="smg-zone-post-body-1"><div class="smg-zone-group smg-zone-group-single-body-1" data-dcnode-id="1038"><div class="smg-zone-widget smg-zone-widget-ads-placement" data-dcnode-id="1039"><span data-dcnode-id="1055" instrument_node=""> </span><div class="PlacementWrapper smg-placement" data-ad-placement-id="post-body-1" data-dcnode-id="1041"><span data-dcnode-id="1054" instrument_node="">
</span><div class="Placement-placeholder is-hidden" data-dcnode-id="1050"><span data-dcnode-id="1053" instrument_node="">
</span><div class="Placement-loader" data-dcnode-id="1052"></div><span data-dcnode-id="1051" instrument_node="">
</span></div><span data-dcnode-id="1049" instrument_node="">
</span><div class="Placement" data-dcnode-id="1043"><span data-dcnode-id="1046" instrument_node="">
</span><zeus-ad aria-hidden="true" data-adunitpath="/{{gamId}}/{{slotId}}" data-dcnode-id="1045" data-json="{&quot;targeting&quot;:{&quot;zeus_rendercount&quot;:&quot;1&quot;,&quot;zeus_slot&quot;:&quot;zeus_post-body-1.init.dsk&quot;}}" data-refresh="true" data-renderbehavior="lazy" data-slot="/1005222/post-body-1" id="zeus_post-body-1" style="margin: auto; width: 1px; display: block;"></zeus-ad><span data-dcnode-id="1044" instrument_node="">
</span></div><span data-dcnode-id="1042" instrument_node="">
</span></div><span data-dcnode-id="1040" instrument_node="">
</span></div></div></div><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1035" instrument_node="">However, the New York state attorney general later </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-trump-trump-foundation/new-york-sues-trump-and-his-charity-over-self-dealing-idUSKBN1JA26G" target="su"><span data-dcnode-id="1034" instrument_node="">sued</span></a><span data-dcnode-id="1032" instrument_node=""> Trump for paying the fine through his nonprofit Donald J. Trump Foundation instead of from his personal finances:</span></p><span data-dcnode-id="1030" instrument_node="">
</span><blockquote data-dcnode-id="1024"><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">
The New York state attorney general sued U.S. President Donald Trump, three of his children and his foundation, saying he illegally used the nonprofit as a personal “checkbook” for his own benefit, including his 2016 presidential campaign.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Another $100,000 went to another charity in 2007 to settle a legal dispute over a flagpole erected in violation of local ordinances at Mar-a-Lago, Trump’s private club and sometime residence in Palm Beach, Florida.
</span></p></blockquote><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1022" instrument_node=""> We also haven’t been able to verify whether Trump connived to maintain (or even exceed) the height of the original pole by installing a </span><span data-dcnode-id="1020" style="white-space: nowrap"><span data-dcnode-id="1021" instrument_node="">10-foot-</span></span><span data-dcnode-id="1019" instrument_node="">shorter pole on a </span><span data-dcnode-id="1017" style="white-space: nowrap"><span data-dcnode-id="1018" instrument_node="">20-foot-</span></span><span data-dcnode-id="1016" instrument_node="">high hill — pictures of the estate show the flagpole rising from a mound, but the height of the mound is difficult to estimate from photographs:</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p class="el-img Media-wrapper Media-paragraph" data-dcnode-id="1012"><img class="Media--image" data-dcnode-id="1013" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snopes.com/uploads/2015/09/trumpflag.jpg&amp;raw"></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Trump’s lawsuit maintained that he couldn’t bring his flag and pole into compliance with regulations because  “A smaller flag and pole on Mar-A-Lago’s property would be lost given its massive size, look silly instead of make a statement, and most importantly would fail to appropriately express the magnitude of Donald J. Trump’s and the Club’s members’ patriotism.” In his statements to the news media at the time he typically framed the issue as being one of his standing up to anti-American, anti-flag, anti-patriotic forces, while acknowledging that he hadn’t even bothered applying for a permit first (because he didn’t think he’d get one) and stating that he didn’t believe rules should apply to the American flag (and therefore to him in this instance):</span></p><span data-dcnode-id="1008" instrument_node="">
</span><blockquote data-dcnode-id="988"><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">
“Well, I put up an American flag on the front of the </span><span data-dcnode-id="1005" style="white-space: nowrap"><span data-dcnode-id="1006" instrument_node="">Mar-a-Lago</span></span><span data-dcnode-id="1004" instrument_node=""> Club, which is a great house, probably the greatest house in America that I turned into a private club very successfully in Palm Beach, Florida. And the flag is very proudly waving, and the town wants me to take it down. Because they say I put it up without a permit and, frankly, had I gone to the town for a permit they wouldn’t have given it to me, probably. But more importantly, I say that you don’t need a permit to put up the American flag.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">I don’t think they know what their beef is. I’m not sure they really understand what their beef is. They don’t talk about the flag. They only talk about the flagpole because they’re afraid politically to mention the word flag and the American flag and take it down.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">And I’ll say it’s probably one of the most popular things I’ve ever done because we’ve had hundreds and hundreds of letters and thousands of requests for everything supporting the flag. Everybody wants it. Everybody wants it up. But the town wants me to take down the American flag, and I told them I’m not doing that.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">This is probably the wealthiest town — it is the wealthiest town in America, in the United States, and frankly it’s a town that wants me to take down a flag and they shouldn’t be asking for that.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="992" instrument_node="">So it’s been a very, very problematic situation. I’ll be responding to them very shortly. And you know, I’m a big — I’m a very patriotic guy. I’m very proud of the country, and I don’t want to take down the American flag. And I don’t believe you need permits to put up the American flag.”</span><br data-dcnode-id="991"><span data-dcnode-id="990" instrument_node="">
</span></p></blockquote><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">Long-time </span><i data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Palm Beach Post</span></i><span data-dcnode-id="983" instrument_node=""> correspondent Frank Cerabino opined that the Palm Beach flag brouhaha had little or nothing to do with patriotism, but rather was part of a pattern of Trump’s using lawsuits to bend local authorities to his will — dredging up excuses to sue them for exorbitant amounts of money, then offering to drop the suits in exchange for agreements that provide him with significant business advantages:</span></p><span data-dcnode-id="981" instrument_node="">
</span><blockquote data-dcnode-id="902"><p data-dcnode-id="976"><span data-dcnode-id="980" instrument_node="">
Oh, he knew what he was doing. Trump, after all, had been fighting with the town poohbahs from the very moment he’d crashed into the complacent, clubby world of Palm Beach to buy </span><span data-dcnode-id="978" style="white-space: nowrap"><span data-dcnode-id="979" instrument_node="">Mar-a-Lago,</span></span><span data-dcnode-id="977" instrument_node=""> which turned out to be one of those great deals he couldn’t afford. </span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Trump knew from experience that Palm Beach was a stickler for adherence to its ordinances. He had once paid a $5,000 fine to the town for replacing a section of dead hedges with replacements that weren’t quite tall enough.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">But Trump had bigger changes in mind than merely out-flagging his neighbors. He was plainly inviting a lawsuit. The town council took the bait, citing the oversized pole and flag as violations of the town code, and fining Trump $250 a day for every day they remained on the estate.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="968" instrument_node="">Tucked into his patriotic posturing was a completely unrelated legal matter that he made part of his multi-million lawsuit: a complaint about the town code that requires large commercial enterprises to be “town serving.” The town requires proof from local businesses that at least </span><span data-dcnode-id="966" style="white-space: nowrap"><span data-dcnode-id="967" instrument_node="">50 percent</span></span><span data-dcnode-id="965" instrument_node=""> of their business comes from town residents. So, for example, when Neiman Marcus opened on Worth Avenue in Palm Beach, it was allowed to do so by promising that it would only advertise in the town’s newspaper, and not in publications that circulated to shoppers who don’t live on the island.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">For Trump, eliminating the “town serving” requirement would mean that he could offer more memberships to his </span><span data-dcnode-id="960" style="white-space: nowrap"><span data-dcnode-id="961" instrument_node="">Mar-a-Lago</span></span><span data-dcnode-id="959" instrument_node=""> social club to people who had no connection to Palm Beach, making it easier for him to keep his club full. Softening up the town on the flag issue to pursue some other angle was a classic Trump move. Though he has yet to get this particular exemption waived, Palm Beach has learned from experience that Trump’s lawsuits are never settled, just dormant. One of his Palm Beach lawyers said recently that the “town serving” issue is still unresolved and ripe for more litigation.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="956" instrument_node="">Trump [initially] couldn’t afford [to maintain] </span><span data-dcnode-id="954" style="white-space: nowrap"><span data-dcnode-id="955" instrument_node="">Mar-a-Lago</span></span><span data-dcnode-id="953" instrument_node=""> as a single family home. His proposed solution was to chop his National Historic Landmark into something he called Mansions of </span><span data-dcnode-id="951" style="white-space: nowrap"><span data-dcnode-id="952" instrument_node="">Mar-a-Lago,</span></span><span data-dcnode-id="950" instrument_node=""> a development that would put a public road through the middle of the estate, which would lead to the 10 mini-mansions he would build on the property, including one on the front lawn.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">The Palm Beach Town Council shot down all of Trump’s proposed changes to the property, even when he reduced his mini-mansion plans from 10 to seven. Instead, they encouraged him to find a buyer if he couldn’t afford to keep the estate intact. When the town’s government refused to bend to his demands, Trump sued. The lawsuit against the Town of Palm Beach, which would prove to be not his last, would eventually cause his neighbors to lawyer up against him.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="944" instrument_node="">After his Mansions of </span><span data-dcnode-id="942" style="white-space: nowrap"><span data-dcnode-id="943" instrument_node="">Mar-a-Lago</span></span><span data-dcnode-id="941" instrument_node=""> plan was rejected, Trump found another way to salvage his stake in </span><span data-dcnode-id="939" style="white-space: nowrap"><span data-dcnode-id="940" instrument_node="">Mar-a-Lago.</span></span><span data-dcnode-id="938" instrument_node=""> He offered to drop his lawsuit if council members allowed him to convert his estate into a new private club on the island. The </span><span data-dcnode-id="936" style="white-space: nowrap"><span data-dcnode-id="937" instrument_node="">Mar-a-Lago</span></span><span data-dcnode-id="935" instrument_node=""> Club.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="932" instrument_node="">While Trump was playing defense against the town’s constant attempt to rein him in, he went on the attack against the county and its airport. Airlines routinely used a flight path in and out of Palm Beach International Airport in nearby West Palm Beach that brought the planes directly over </span><span data-dcnode-id="930" style="white-space: nowrap"><span data-dcnode-id="931" instrument_node="">Mar-a-Lago.</span></span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">This didn’t sit well with Trump, who argued that the noise and fumes were ruining his investment, and that the decent thing for the county to do was to move the airport farther west. Trump had been arguing this for years, to no avail, while calling the airport director Bruce Pelly, among other things, a “moron” and “the worst airport director in the country.”</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="924" instrument_node="">It turned out to be a useful gripe for Trump, one that he could turn into a new business opportunity, because just south of the airport was 214 acres of vacant scrub land owned by Palm Beach County, land he wanted. So Trump sued the county for </span><span data-dcnode-id="922" style="white-space: nowrap"><span data-dcnode-id="923" instrument_node="">$75 million</span></span><span data-dcnode-id="921" instrument_node=""> over the airport noise, then negotiated to drop that lawsuit in exchange for the county giving him a </span><span data-dcnode-id="919" style="white-space: nowrap"><span data-dcnode-id="920" instrument_node="">75-year</span></span><span data-dcnode-id="918" instrument_node=""> lease on the nearby property for $438,000 a year.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="915" instrument_node="">That land became the Trump International Golf Club, a </span><span data-dcnode-id="913" style="white-space: nowrap"><span data-dcnode-id="914" instrument_node="">$40 million,</span></span><span data-dcnode-id="912" instrument_node=""> </span><span data-dcnode-id="910" style="white-space: nowrap"><span data-dcnode-id="911" instrument_node="">18-hole,</span></span><span data-dcnode-id="909" instrument_node=""> Jim Fazio-designed course that imported nearly </span><span data-dcnode-id="907" style="white-space: nowrap"><span data-dcnode-id="908" instrument_node="">2 million</span></span><span data-dcnode-id="906" instrument_node=""> cubic yards of dirt to transform the flat scrub land into hilly terrain with waterfalls, rock formations, and a clubhouse four stories above sea level.</span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">
</span></p></blockquote><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="900" instrument_node="">This wasn’t the only instance of flagpole bickering in Trump’s past.  He also reached a (non-court) settlement with local government in 2014 after having raised Old Glory on a </span><span data-dcnode-id="898" style="white-space: nowrap"><span data-dcnode-id="899" instrument_node="">70-foot</span></span><span data-dcnode-id="897" instrument_node=""> flagpole at the Trump National Golf Course in Rancho Palos Verdes, California, without obtaining a permit first: </span></p><span data-dcnode-id="895" instrument_node="">
</span><blockquote data-dcnode-id="867"><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">
Signaling a possible resolution to Donald Trump’s running flag feud, the California Coastal Commission said the mogul’s oversized Old Glory can stay — as long as Rancho Palos Verdes revises its municipal height rules.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="891" instrument_node="">While not the victory city officials had hoped for, the decision allows for a way forward to legally allow the </span><span data-dcnode-id="889" style="white-space: nowrap"><span data-dcnode-id="890" instrument_node="">70-foot-tall</span></span><span data-dcnode-id="888" instrument_node=""> flagpole, which was hoisted without a permit nearly 10 years ago.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="885" instrument_node="">Having gained the support of much of the coastal city — as well as two City Councils through the years — the flag now likely can get formal state approval provided the city amends its Local Coastal Program that currently limits structure heights to </span><span data-dcnode-id="883" style="white-space: nowrap"><span data-dcnode-id="884" instrument_node="">26 feet.</span></span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">“I’m disappointed at the Trump Organization for putting up that flag without adhering to the rule of law,” said Coastal Commissioner Wendy Mitchell. </span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="877" instrument_node="">Commission staff members had recommended that the flagpole be reduced in height to </span><span data-dcnode-id="875" style="white-space: nowrap"><span data-dcnode-id="876" instrument_node="">26 feet</span></span><span data-dcnode-id="874" instrument_node=""> and moved closer to the clubhouse on the </span><span data-dcnode-id="872" style="white-space: nowrap"><span data-dcnode-id="873" instrument_node="">240-acre</span></span><span data-dcnode-id="871" instrument_node=""> Trump National Golf Course property.</span><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">
</span></p></blockquote><span data-dcnode-id="866" instrument_node="">
</span></div><span data-dcnode-id="864" instrument_node="">
