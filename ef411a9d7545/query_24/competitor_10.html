</span><h2 data-dcnode-id="3206"><span class="mw-headline" data-dcnode-id="3214" id="Background"><span data-dcnode-id="3215" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="3207"><span class="mw-editsection-bracket" data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">[</span></span><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="3211" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3205" instrument_node="">
</span><p data-dcnode-id="3153"><span data-dcnode-id="3204" instrument_node="">Polish President </span><a data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrzej_Duda" title="Andrzej Duda"><span data-dcnode-id="3203" instrument_node="">Andrzej Duda</span></a><span data-dcnode-id="3201" instrument_node=""> invited Donald Trump to visit months ago before the event.</span><sup class="reference" data-dcnode-id="3198" id="cite_ref-2"><a data-dcnode-id="3199" href="#cite_note-2"><span data-dcnode-id="3200" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3197" instrument_node=""> Trump was to attend the </span><a data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2017_G20_Hamburg_summit" title="2017 G20 Hamburg summit"><span data-dcnode-id="3196" instrument_node="">2017 G20 Hamburg summit</span></a><span data-dcnode-id="3194" instrument_node=""> and planned a visit to Poland ahead of it. He and the First Lady </span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melania_Trump" title="Melania Trump"><span data-dcnode-id="3193" instrument_node="">Melania Trump</span></a><span data-dcnode-id="3191" instrument_node="">
arrived at Warsaw Chopin Airport on July 5, 2017, and the Polish Foreign Affairs Minister </span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Witold_Waszczykowski" title="Witold Waszczykowski"><span data-dcnode-id="3190" instrument_node="">Witold Waszczykowski</span></a><span data-dcnode-id="3188" instrument_node=""> greeted them.</span><sup class="reference" data-dcnode-id="3185" id="cite_ref-3"><a data-dcnode-id="3186" href="#cite_note-3"><span data-dcnode-id="3187" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3184" instrument_node=""> On the next day, Trump met with the president of Poland Andrzej Duda and the president of </span><a data-dcnode-id="3182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatia" title="Croatia"><span data-dcnode-id="3183" instrument_node="">Croatia</span></a><span data-dcnode-id="3181" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kolinda_Grabar-Kitarovic" title="Kolinda Grabar-Kitarovic"><span data-dcnode-id="3180" instrument_node="">Kolinda Grabar-Kitarovic</span></a><span data-dcnode-id="3178" instrument_node="">. At the same time, he participated at the second summit of the </span><a data-dcnode-id="3176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three_Seas_Initiative" title="Three Seas Initiative"><span data-dcnode-id="3177" instrument_node="">Three Seas Initiative</span></a><span data-dcnode-id="3175" instrument_node=""> in Warsaw, Poland.</span><sup class="reference" data-dcnode-id="3172" id="cite_ref-4"><a data-dcnode-id="3173" href="#cite_note-4"><span data-dcnode-id="3174" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3171" instrument_node=""> On June 29, 2017, General </span><a class="mw-redirect" data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H.R._McMaster" title="H.R. McMaster"><span data-dcnode-id="3170" instrument_node="">H.R. McMaster</span></a><span data-dcnode-id="3168" instrument_node=""> explained Trump's upcoming trip to Poland with several objectives. In his statement, the visit in Poland was going to strengthen American alliances, demonstrate the United States and Europe's commitment to liberty and the rule of law, reinforce the common understanding of threats, respond to Russia's destabilizing activity, expand economic opportunity on the energy market, and address the environmental issue.</span><sup class="reference" data-dcnode-id="3165" id="cite_ref-5"><a data-dcnode-id="3166" href="#cite_note-5"><span data-dcnode-id="3167" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3164" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jaroslaw_Kaczynski" title="Jaroslaw Kaczynski"><span data-dcnode-id="3163" instrument_node="">Jaroslaw Kaczynski</span></a><span data-dcnode-id="3161" instrument_node="">, the head of the </span><a class="mw-redirect" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PiS" title="PiS"><span data-dcnode-id="3160" instrument_node="">PiS</span></a><span data-dcnode-id="3158" instrument_node=""> political party foresaw Mr. Trump's visit to be a "new success" for the country. Trump was also expecting a warmer welcome in Warsaw, Poland due to the Poles' supports of his presidency.</span><sup class="reference" data-dcnode-id="3155" id="cite_ref-6"><a data-dcnode-id="3156" href="#cite_note-6"><span data-dcnode-id="3157" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3154" instrument_node="">
</span></p><span data-dcnode-id="3152" instrument_node="">
</span><h2 data-dcnode-id="3142"><span class="mw-headline" data-dcnode-id="3150" id="Location"><span data-dcnode-id="3151" instrument_node="">Location</span></span><span class="mw-editsection" data-dcnode-id="3143"><span class="mw-editsection-bracket" data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">[</span></span><a data-dcnode-id="3146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D2" title="Edit section: Location"><span data-dcnode-id="3147" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3141" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3132"><div class="thumbinner" data-dcnode-id="3133" style="width:275px;"><a class="image" data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUprising_monument.jpg"><img alt="Warsaw Uprising Monument" class="thumbimage" data-dcnode-id="3140" data-file-height="640" data-file-width="853" decoding="async" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/76/Uprising_monument.jpg/273px-Uprising_monument.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/76/Uprising_monument.jpg/410px-Uprising_monument.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/76/Uprising_monument.jpg/546px-Uprising_monument.jpg 2x" width="273"></a><span data-dcnode-id="3138" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3134"><div class="magnify" data-dcnode-id="3136"><a class="internal" data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUprising_monument.jpg" title="Enlarge"></a></div><span data-dcnode-id="3135" instrument_node="">Warsaw Uprising Monument</span></div></div></div><span data-dcnode-id="3131" instrument_node="">
</span><p data-dcnode-id="3120"><span data-dcnode-id="3130" instrument_node="">The event took place at </span><a data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Uprising_Monument" title="Warsaw Uprising Monument"><span data-dcnode-id="3129" instrument_node="">Warsaw Uprising Monument</span></a><span data-dcnode-id="3127" instrument_node=""> at Krasinski Square, in Warsaw. The Warsaw Uprising Monument was dedicated to the </span><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Uprising" title="Warsaw Uprising"><span data-dcnode-id="3126" instrument_node="">Warsaw Uprising</span></a><span data-dcnode-id="3124" instrument_node=""> of 1944. While in Warsaw, Trump stayed at the Warsaw </span><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marriott_International" title="Marriott International"><span data-dcnode-id="3123" instrument_node="">Marriott</span></a><span data-dcnode-id="3121" instrument_node=""> Hotel.
</span></p><span data-dcnode-id="3119" instrument_node="">
</span><h2 data-dcnode-id="3109"><span class="mw-headline" data-dcnode-id="3117" id="Preparation"><span data-dcnode-id="3118" instrument_node="">Preparation</span></span><span class="mw-editsection" data-dcnode-id="3110"><span class="mw-editsection-bracket" data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">[</span></span><a data-dcnode-id="3113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D3" title="Edit section: Preparation"><span data-dcnode-id="3114" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3108" instrument_node="">
</span><p data-dcnode-id="3092"><span data-dcnode-id="3107" instrument_node="">Donald Trump was planned to stop in Poland before the </span><a class="mw-redirect" data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G20_summit" title="G20 summit"><span data-dcnode-id="3106" instrument_node="">G20 summit</span></a><span data-dcnode-id="3104" instrument_node=""> in </span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="3103" instrument_node="">Germany</span></a><span data-dcnode-id="3101" instrument_node="">. Before the event, Poland set up a stage at the downtown Warsaw square for the event and deployed security in preparing for the U.S. president's visit. There were colorful posters on the streets to invite people to attend the event and hung signs showing traffic diversions that indicated the place where Trump would stay during his visit to Warsaw.</span><sup class="reference" data-dcnode-id="3098" id="cite_ref-7"><a data-dcnode-id="3099" href="#cite_note-7"><span data-dcnode-id="3100" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3097" instrument_node=""> Ruling politicians and pro-government activists also planned to bus in groups of people to attend the event for ensuring a warm welcome for Trump.</span><sup class="reference" data-dcnode-id="3094" id="cite_ref-8"><a data-dcnode-id="3095" href="#cite_note-8"><span data-dcnode-id="3096" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3093" instrument_node="">
</span></p><span data-dcnode-id="3091" instrument_node="">
</span><h2 data-dcnode-id="3081"><span class="mw-headline" data-dcnode-id="3089" id="Contents_and_delivery"><span data-dcnode-id="3090" instrument_node="">Contents and delivery</span></span><span class="mw-editsection" data-dcnode-id="3082"><span class="mw-editsection-bracket" data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">[</span></span><a data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D4" title="Edit section: Contents and delivery"><span data-dcnode-id="3086" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3080" instrument_node="">
</span><h3 data-dcnode-id="3070"><span class="mw-headline" data-dcnode-id="3078" id="Energy_trade_deal"><span data-dcnode-id="3079" instrument_node="">Energy trade deal</span></span><span class="mw-editsection" data-dcnode-id="3071"><span class="mw-editsection-bracket" data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">[</span></span><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D5" title="Edit section: Energy trade deal"><span data-dcnode-id="3075" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3063"><span data-dcnode-id="3068" instrument_node="">Donald Trump began his speech by proclaiming America's eagerness to consolidate the partnership with Poland. He called for stronger trade and commerce ties between the two countries and pledged to provide alternative energy to address Poland's reliance on a sole energy supplier.</span><sup class="reference" data-dcnode-id="3065" id="cite_ref-Whitehouse_1-1"><a data-dcnode-id="3066" href="#cite_note-Whitehouse-1"><span data-dcnode-id="3067" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3064" instrument_node="">
</span></p><p data-dcnode-id="3053"><span data-dcnode-id="3062" instrument_node="">Trade between the United States and Poland has risen steadily over the past few years,</span><sup class="reference" data-dcnode-id="3059" id="cite_ref-9"><a data-dcnode-id="3060" href="#cite_note-9"><span data-dcnode-id="3061" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3058" instrument_node=""> and Trump's speech shows his commitment to continuing to push for economic progress between the two countries. Trump was signaling a move to reduce Poland's dependence on Russia since it had been importing Russian gas as a primary energy source. On June 7, the United States initiated an action to send Poland its first natural gas, which was said to be the turning point in Poland's efforts to end its reliance on Russian coal. So both the move and the speech directly challenged Russia's dominant position in the European gas markets</span><sup class="reference" data-dcnode-id="3055" id="cite_ref-10"><a data-dcnode-id="3056" href="#cite_note-10"><span data-dcnode-id="3057" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3054" instrument_node=""> while announcing the US economic alliance with Poland.
</span></p><span data-dcnode-id="3052" instrument_node="">
</span><h3 data-dcnode-id="3042"><span class="mw-headline" data-dcnode-id="3050" id="Remembrance_and_praise"><span data-dcnode-id="3051" instrument_node="">Remembrance and praise</span></span><span class="mw-editsection" data-dcnode-id="3043"><span class="mw-editsection-bracket" data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">[</span></span><a data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D6" title="Edit section: Remembrance and praise"><span data-dcnode-id="3047" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3041" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3040" instrument_node="">Trump spoke highly of the spirit of the Polish for defending the freedom and independence of the country several times at the speech, notably the unity of Poles against the oppression of </span><a data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="3039" instrument_node="">communism</span></a><span data-dcnode-id="3037" instrument_node="">. He applauded the Poles' prevailing spiritual determination, and recalled the gather of the Poles in 1979 that created the famous chant: "We want God."</span><sup class="reference" data-dcnode-id="3034" id="cite_ref-Whitehouse_1-2"><a data-dcnode-id="3035" href="#cite_note-Whitehouse-1"><span data-dcnode-id="3036" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3033" instrument_node="">
</span></p><p data-dcnode-id="3021"><span data-dcnode-id="3031" instrument_node="">The incident was evoked by </span><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pope_John_Paul_II" title="Pope John Paul II"><span data-dcnode-id="3030" instrument_node="">Pope John Paul II</span></a><span data-dcnode-id="3028" instrument_node=""> in his return to Poland when he gave the speech to more than a million Polish people that shook the position of the </span><a class="mw-redirect" data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atheistic" title="Atheistic"><span data-dcnode-id="3027" instrument_node="">atheistic</span></a><span data-dcnode-id="3025" instrument_node=""> communists in Poland. The event created a series of solidarity movement until the </span><a data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fall_of_the_Berlin_Wall" title="Fall of the Berlin Wall"><span data-dcnode-id="3024" instrument_node="">fall of the Berlin Wall</span></a><span data-dcnode-id="3022" instrument_node=""> in 1989.
</span></p><span data-dcnode-id="3020" instrument_node="">
</span><h3 data-dcnode-id="3010"><span class="mw-headline" data-dcnode-id="3018" id="Concerns_about_terrorism"><span data-dcnode-id="3019" instrument_node="">Concerns about terrorism</span></span><span class="mw-editsection" data-dcnode-id="3011"><span class="mw-editsection-bracket" data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">[</span></span><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D7" title="Edit section: Concerns about terrorism"><span data-dcnode-id="3015" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="3003"><span data-dcnode-id="3008" instrument_node="">While communism no longer poses a threat to Western civilization, another radical ideology is still threatening the Western harmony, Trump said. Referring to the terrorist attacks on the United States and Europe, he declared the resolution to stop the spread of terrorism and extremism under the threat of "radical Islamic terror."</span><sup class="reference" data-dcnode-id="3005" id="cite_ref-Whitehouse_1-3"><a data-dcnode-id="3006" href="#cite_note-Whitehouse-1"><span data-dcnode-id="3007" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3004" instrument_node="">
</span></p><p data-dcnode-id="2890"><span data-dcnode-id="3002" instrument_node="">Ongoing wars in the </span><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East" title="Middle East"><span data-dcnode-id="3001" instrument_node="">Middle East</span></a><span data-dcnode-id="2999" instrument_node=""> have led to large numbers of </span><a data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee" title="Refugee"><span data-dcnode-id="2998" instrument_node="">refugee</span></a><span data-dcnode-id="2996" instrument_node=""> seeking asylum, and European countries were the primary recipients. Since the </span><a data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="2995" instrument_node="">European Union</span></a><span data-dcnode-id="2993" instrument_node=""> members were required to accept the Quotas of Migrants to alleviate the burden of the main landing sites for the migrants,</span><sup class="reference" data-dcnode-id="2990" id="cite_ref-11"><a data-dcnode-id="2991" href="#cite_note-11"><span data-dcnode-id="2992" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2989" instrument_node=""> refugees were swarming into the member states (including </span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malta" title="Malta"><span data-dcnode-id="2988" instrument_node="">Malta</span></a><span data-dcnode-id="2986" instrument_node="">, </span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finland" title="Finland"><span data-dcnode-id="2985" instrument_node="">Finland</span></a><span data-dcnode-id="2983" instrument_node="">, </span><a data-dcnode-id="2981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ireland" title="Ireland"><span data-dcnode-id="2982" instrument_node="">Ireland</span></a><span data-dcnode-id="2980" instrument_node="">, </span><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luxembourg" title="Luxembourg"><span data-dcnode-id="2979" instrument_node="">Luxembourg</span></a><span data-dcnode-id="2977" instrument_node="">, </span><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvia" title="Latvia"><span data-dcnode-id="2976" instrument_node="">Latvia</span></a><span data-dcnode-id="2974" instrument_node="">, </span><a data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuania" title="Lithuania"><span data-dcnode-id="2973" instrument_node="">Lithuania</span></a><span data-dcnode-id="2971" instrument_node="">, </span><a data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sweden" title="Sweden"><span data-dcnode-id="2970" instrument_node="">Sweden</span></a><span data-dcnode-id="2968" instrument_node="">, </span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portugal" title="Portugal"><span data-dcnode-id="2967" instrument_node="">Portugal</span></a><span data-dcnode-id="2965" instrument_node="">, </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" title="Estonia"><span data-dcnode-id="2964" instrument_node="">Estonia</span></a><span data-dcnode-id="2962" instrument_node="">, </span><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyprus" title="Cyprus"><span data-dcnode-id="2961" instrument_node="">Cyprus</span></a><span data-dcnode-id="2959" instrument_node="">, </span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="2958" instrument_node="">Netherlands</span></a><span data-dcnode-id="2956" instrument_node="">, </span><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovenia" title="Slovenia"><span data-dcnode-id="2955" instrument_node="">Slovenia</span></a><span data-dcnode-id="2953" instrument_node="">, </span><a data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="2952" instrument_node="">Germany</span></a><span data-dcnode-id="2950" instrument_node="">, </span><a data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgium" title="Belgium"><span data-dcnode-id="2949" instrument_node="">Belgium</span></a><span data-dcnode-id="2947" instrument_node="">, </span><a data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="2946" instrument_node="">France</span></a><span data-dcnode-id="2944" instrument_node="">, </span><a data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romania" title="Romania"><span data-dcnode-id="2943" instrument_node="">Romania</span></a><span data-dcnode-id="2941" instrument_node="">, </span><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="2940" instrument_node="">Spain</span></a><span data-dcnode-id="2938" instrument_node="">, </span><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatia" title="Croatia"><span data-dcnode-id="2937" instrument_node="">Croatia</span></a><span data-dcnode-id="2935" instrument_node="">, </span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bulgaria" title="Bulgaria"><span data-dcnode-id="2934" instrument_node="">Bulgaria</span></a><span data-dcnode-id="2932" instrument_node="">, </span><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovakia" title="Slovakia"><span data-dcnode-id="2931" instrument_node="">Slovakia</span></a><span data-dcnode-id="2929" instrument_node="">, </span><a data-dcnode-id="2927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria" title="Austria"><span data-dcnode-id="2928" instrument_node="">Austria</span></a><span data-dcnode-id="2926" instrument_node="">, </span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norway" title="Norway"><span data-dcnode-id="2925" instrument_node="">Norway</span></a><span data-dcnode-id="2923" instrument_node="">, </span><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Switzerland" title="Switzerland"><span data-dcnode-id="2922" instrument_node="">Switzerland</span></a><span data-dcnode-id="2920" instrument_node="">, and </span><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liechtenstein" title="Liechtenstein"><span data-dcnode-id="2919" instrument_node="">Liechtenstein</span></a><span data-dcnode-id="2917" instrument_node="">)</span><sup class="reference" data-dcnode-id="2914" id="cite_ref-12"><a data-dcnode-id="2915" href="#cite_note-12"><span data-dcnode-id="2916" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2913" instrument_node=""> that later caused the refugee crisis. However, </span><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poland" title="Poland"><span data-dcnode-id="2912" instrument_node="">Poland</span></a><span data-dcnode-id="2910" instrument_node="">, </span><a data-dcnode-id="2908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungary" title="Hungary"><span data-dcnode-id="2909" instrument_node="">Hungary</span></a><span data-dcnode-id="2907" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czechia" title="Czechia"><span data-dcnode-id="2906" instrument_node="">Czechia</span></a><span data-dcnode-id="2904" instrument_node=""> has refused to accept the refugee quotas and rarely admit any asylum-seekers.</span><sup class="reference" data-dcnode-id="2901" id="cite_ref-13"><a data-dcnode-id="2902" href="#cite_note-13"><span data-dcnode-id="2903" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2900" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jaroslaw_Kaczy%25C5%2584ski" title="Jaroslaw Kaczyński"><span data-dcnode-id="2899" instrument_node="">Jaroslaw Kaczyński</span></a><span data-dcnode-id="2897" instrument_node="">, the leader of the ruling </span><a data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law_and_Justice" title="Law and Justice"><span data-dcnode-id="2896" instrument_node="">Law and Justice</span></a><span data-dcnode-id="2894" instrument_node=""> party, had explained to the public that a part of asylum seekers may cause destruction to the safety and culture of the country. Trump, during his presidency, shares the same political views with the party, which Trump himself further endorsed the approach by encouraging the member states of the </span><a data-dcnode-id="2892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="2893" instrument_node="">NATO</span></a><span data-dcnode-id="2891" instrument_node=""> (North Atlantic Treaty Organization) to demonstrate the belief in the future of the Western survival.
</span></p><span data-dcnode-id="2889" instrument_node="">
</span><h3 data-dcnode-id="2878"><span data-dcnode-id="2888" id="Concerns_about_Russia.27s_activities"></span><span class="mw-headline" data-dcnode-id="2886" id="Concerns_about_Russia's_activities"><span data-dcnode-id="2887" instrument_node="">Concerns about Russia's activities</span></span><span class="mw-editsection" data-dcnode-id="2879"><span class="mw-editsection-bracket" data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">[</span></span><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D8" title="Edit section: Concerns about Russia's activities"><span data-dcnode-id="2883" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2877" instrument_node="">
</span><p data-dcnode-id="2859"><span data-dcnode-id="2876" instrument_node="">Trump also said the United States and Poland held mutual values and commitment against </span><a data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="2875" instrument_node="">Russia</span></a><span data-dcnode-id="2873" instrument_node="">'s actions and destabilizing activities that supported the hostile regimes including </span><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syria" title="Syria"><span data-dcnode-id="2872" instrument_node="">Syria</span></a><span data-dcnode-id="2870" instrument_node=""> and </span><a data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="2869" instrument_node="">Iran</span></a><span data-dcnode-id="2867" instrument_node="">.</span><sup class="reference" data-dcnode-id="2864" id="cite_ref-Whitehouse_1-4"><a data-dcnode-id="2865" href="#cite_note-Whitehouse-1"><span data-dcnode-id="2866" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="2861" id="cite_ref-14"><a data-dcnode-id="2862" href="#cite_note-14"><span data-dcnode-id="2863" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2860" instrument_node="">
</span></p><p data-dcnode-id="2836"><span data-dcnode-id="2858" instrument_node="">The U.S. claimed to aim at ceasing the activities of </span><a class="mw-redirect" data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_State_of_Iraq_and_the_Levant" title="Islamic State of Iraq and the Levant"><span data-dcnode-id="2857" instrument_node="">Islamic State</span></a><span data-dcnode-id="2855" instrument_node=""> (IS) in Syria. On the other hand, Russia supported the </span><a class="mw-redirect" data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assad" title="Assad"><span data-dcnode-id="2854" instrument_node="">Assad</span></a><span data-dcnode-id="2852" instrument_node=""> to secure its military influence in the region.</span><sup class="reference" data-dcnode-id="2849" id="cite_ref-15"><a data-dcnode-id="2850" href="#cite_note-15"><span data-dcnode-id="2851" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2848" instrument_node=""> There were also speculations suggested that Russia allied with Assad to safeguard the </span><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran%25E2%2580%2593Iraq%25E2%2580%2593Syria_pipeline" title="Iran–Iraq–Syria pipeline"><span data-dcnode-id="2847" instrument_node="">Iran–Iraq–Syria pipeline</span></a><span data-dcnode-id="2845" instrument_node="">, and remain control over the European gas market.</span><sup class="reference" data-dcnode-id="2842" id="cite_ref-16"><a data-dcnode-id="2843" href="#cite_note-16"><span data-dcnode-id="2844" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2841" instrument_node=""> The conflict thus drew the separated standpoint between the western countries and Russia as Trump demonstrated. Trump also incidentally spoke of "the steady creep of government bureaucracy" that "drains the vitality and wealth of the people."</span><sup class="reference" data-dcnode-id="2838" id="cite_ref-Whitehouse_1-5"><a data-dcnode-id="2839" href="#cite_note-Whitehouse-1"><span data-dcnode-id="2840" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2837" instrument_node="">
</span></p><span data-dcnode-id="2835" instrument_node="">
</span><h3 data-dcnode-id="2825"><span class="mw-headline" data-dcnode-id="2833" id="Stress_on_mutual_defense"><span data-dcnode-id="2834" instrument_node="">Stress on mutual defense</span></span><span class="mw-editsection" data-dcnode-id="2826"><span class="mw-editsection-bracket" data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">[</span></span><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D9" title="Edit section: Stress on mutual defense"><span data-dcnode-id="2830" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2824" instrument_node="">
</span><p data-dcnode-id="2812"><span data-dcnode-id="2823" instrument_node="">Trump also expressed his support of the Article 5, the </span><a class="mw-redirect" data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_defense" title="Collective defense"><span data-dcnode-id="2822" instrument_node="">collective defense</span></a><span data-dcnode-id="2820" instrument_node=""> commitment of the </span><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="2819" instrument_node="">NATO</span></a><span data-dcnode-id="2817" instrument_node="">.</span><sup class="reference" data-dcnode-id="2814" id="cite_ref-Whitehouse_1-6"><a data-dcnode-id="2815" href="#cite_note-Whitehouse-1"><span data-dcnode-id="2816" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2813" instrument_node="">
</span></p><p data-dcnode-id="2806"><span data-dcnode-id="2811" instrument_node="">According to the collective defense-Article 5, an attack against one ally is considered an attack against all allies.</span><sup class="reference" data-dcnode-id="2808" id="cite_ref-17"><a data-dcnode-id="2809" href="#cite_note-17"><span data-dcnode-id="2810" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2807" instrument_node="">
</span></p><span data-dcnode-id="2805" instrument_node="">
</span><h2 data-dcnode-id="2795"><span class="mw-headline" data-dcnode-id="2803" id="Reception"><span data-dcnode-id="2804" instrument_node="">Reception</span></span><span class="mw-editsection" data-dcnode-id="2796"><span class="mw-editsection-bracket" data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">[</span></span><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D10" title="Edit section: Reception"><span data-dcnode-id="2800" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2794" instrument_node="">
</span><p data-dcnode-id="2777"><span data-dcnode-id="2793" instrument_node="">On the day of the given speech, Trump received various responses from different media outlets. </span><i data-dcnode-id="2790"><a data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wall_Street_Journal" title="The Wall Street Journal"><span data-dcnode-id="2792" instrument_node="">The Wall Street Journal</span></a></i><span data-dcnode-id="2789" instrument_node=""> remarked, "Mr. Trump finally offered the core of what could become a governing philosophy. It is a determined and affirmative defense of the Western tradition."</span><sup class="reference" data-dcnode-id="2786" id="cite_ref-18"><a data-dcnode-id="2787" href="#cite_note-18"><span data-dcnode-id="2788" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2785" instrument_node=""> The next day, </span><a data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marc_Thiessen" title="Marc Thiessen"><span data-dcnode-id="2784" instrument_node="">Marc Thiessen</span></a><span data-dcnode-id="2782" instrument_node=""> from AEIdeas commented positively, "Donald Trump's speech in Warsaw's Krasinski Square was the best of his presidency, and one that any American could take pride in," he said, "He needs more moments like this."</span><sup class="reference" data-dcnode-id="2779" id="cite_ref-19"><a data-dcnode-id="2780" href="#cite_note-19"><span data-dcnode-id="2781" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2778" instrument_node="">
</span></p><p data-dcnode-id="2743"><a data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jonathan_Capehart" title="Jonathan Capehart"><span data-dcnode-id="2776" instrument_node="">Jonathan Capehart</span></a><span data-dcnode-id="2774" instrument_node="">, an editorial board member of </span><i data-dcnode-id="2771"><a data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Washington_Post" title="The Washington Post"><span data-dcnode-id="2773" instrument_node="">The Washington Post</span></a></i><span data-dcnode-id="2770" instrument_node=""> had a more critical response, which he titled Trump's speech a "white-nationalist dog whistles."</span><sup class="reference" data-dcnode-id="2767" id="cite_ref-20"><a data-dcnode-id="2768" href="#cite_note-20"><span data-dcnode-id="2769" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2766" instrument_node=""> David Smith from </span><i data-dcnode-id="2763"><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Guardian" title="The Guardian"><span data-dcnode-id="2765" instrument_node="">The Guardian</span></a></i><span data-dcnode-id="2762" instrument_node=""> regarded that "his attempt to set out a Trump doctrine will be remembered not for a quotable zinger but for muddled thinking and dark nativism." He also noted that Trump's rare criticism of president of Russia </span><a data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="2761" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="2759" instrument_node=""> was to "please Republican hawks at home."</span><sup class="reference" data-dcnode-id="2756" id="cite_ref-21"><a data-dcnode-id="2757" href="#cite_note-21"><span data-dcnode-id="2758" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2755" instrument_node=""> </span><a data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Beinart" title="Peter Beinart"><span data-dcnode-id="2754" instrument_node="">Peter Beinart</span></a><span data-dcnode-id="2752" instrument_node=""> from </span><i data-dcnode-id="2749"><a data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Atlantic" title="The Atlantic"><span data-dcnode-id="2751" instrument_node="">The Atlantic</span></a></i><span data-dcnode-id="2748" instrument_node=""> critically commented on Trump's Western values, which the term only depicted the white and Christian rather than the essence of the nation: "Trump's sentence only makes sense as a statement of racial and religious paranoia."</span><sup class="reference" data-dcnode-id="2745" id="cite_ref-22"><a data-dcnode-id="2746" href="#cite_note-22"><span data-dcnode-id="2747" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2744" instrument_node="">
</span></p><span data-dcnode-id="2742" instrument_node="">
</span><h2 data-dcnode-id="2732"><span class="mw-headline" data-dcnode-id="2740" id="Audience"><span data-dcnode-id="2741" instrument_node="">Audience</span></span><span class="mw-editsection" data-dcnode-id="2733"><span class="mw-editsection-bracket" data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">[</span></span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D11" title="Edit section: Audience"><span data-dcnode-id="2737" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2731" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2722"><div class="thumbinner" data-dcnode-id="2723" style="width:322px;"><a class="image" data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Trump%2527s_Trip_to_Poland_%2835706151191%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="2730" data-file-height="800" data-file-width="1200" decoding="async" height="213" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/President_Trump%2527s_Trip_to_Poland_%252835706151191%2529.jpg/320px-President_Trump%2527s_Trip_to_Poland_%252835706151191%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/President_Trump%27s_Trip_to_Poland_%2835706151191%29.jpg/480px-President_Trump%27s_Trip_to_Poland_%2835706151191%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/ce/President_Trump%27s_Trip_to_Poland_%2835706151191%29.jpg/640px-President_Trump%27s_Trip_to_Poland_%2835706151191%29.jpg 2x" width="320"></a><span data-dcnode-id="2728" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2724"><div class="magnify" data-dcnode-id="2726"><a class="internal" data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Trump%2527s_Trip_to_Poland_%2835706151191%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="2725" instrument_node="">The crowds attending the event in Poland</span></div></div></div><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2720" instrument_node="">During the speech, the crowd at the square were chanting with the slogan of "DONALD TRUMP" that interrupted the speech several times (see </span><a class="external text" data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DAdpgw93_DfE" rel="nofollow"><span data-dcnode-id="2719" instrument_node="">video of the speech</span></a><span data-dcnode-id="2717" instrument_node="">). However, there was opposition against Trump's arrival in Warsaw on that day. Polish women gathered together wearing the costume inspired by </span><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Atwood" title="Margaret Atwood"><span data-dcnode-id="2716" instrument_node="">Margaret Atwood</span></a><span data-dcnode-id="2714" instrument_node="">'s 1985 </span><a class="mw-redirect" data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feminist" title="Feminist"><span data-dcnode-id="2713" instrument_node="">feminist</span></a><span data-dcnode-id="2711" instrument_node=""> novel </span><i data-dcnode-id="2708"><a data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Handmaid%2527s_Tale" title="The Handmaid's Tale"><span data-dcnode-id="2710" instrument_node="">The Handmaid's Tale</span></a></i><span data-dcnode-id="2707" instrument_node=""> to protest Trump's </span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexism" title="Sexism"><span data-dcnode-id="2706" instrument_node="">sexism</span></a><span data-dcnode-id="2704" instrument_node="">. They held up signs written with "DUMB TRUMP" to show opposition.</span><sup class="reference" data-dcnode-id="2701" id="cite_ref-23"><a data-dcnode-id="2702" href="#cite_note-23"><span data-dcnode-id="2703" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2700" instrument_node="">
</span></p><span data-dcnode-id="2698" instrument_node="">
</span><h2 data-dcnode-id="2688"><span class="mw-headline" data-dcnode-id="2696" id="Former_U.S._presidential_visits_to_Poland"><span data-dcnode-id="2697" instrument_node="">Former U.S. presidential visits to Poland</span></span><span class="mw-editsection" data-dcnode-id="2689"><span class="mw-editsection-bracket" data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">[</span></span><a data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D12" title="Edit section: Former U.S. presidential visits to Poland"><span data-dcnode-id="2693" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2687" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2686" instrument_node="">Donald Trump's arrival marked the eighth U.S. presidential visit to Poland. In May 1972, </span><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="2685" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="2683" instrument_node=""> became the first U.S. president to visit Poland. Nixon arrived at Warsaw to deliver a speech when Poland was still controlled by the </span><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polish_United_Workers%2527_Party" title="Polish United Workers' Party"><span data-dcnode-id="2682" instrument_node="">Polish United Workers' Party</span></a><span data-dcnode-id="2680" instrument_node="">.</span><sup class="reference" data-dcnode-id="2677" id="cite_ref-24"><a data-dcnode-id="2678" href="#cite_note-24"><span data-dcnode-id="2679" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2676" instrument_node=""> The visit paved the way for trade exchanges and U.S. loans for Poland.</span><sup class="reference" data-dcnode-id="2673" id="cite_ref-visits_25-0"><a data-dcnode-id="2674" href="#cite_note-visits-25"><span data-dcnode-id="2675" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2672" instrument_node=""> </span><a data-dcnode-id="2670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerald_Ford" title="Gerald Ford"><span data-dcnode-id="2671" instrument_node="">Gerald Ford</span></a><span data-dcnode-id="2669" instrument_node=""> visited Warsaw and </span><a class="mw-redirect" data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Krakow" title="Krakow"><span data-dcnode-id="2668" instrument_node="">Krakow</span></a><span data-dcnode-id="2666" instrument_node=""> in July 1975 to acknowledge the development of the U.S.-Poland relationship.</span><sup class="reference" data-dcnode-id="2663" id="cite_ref-26"><a data-dcnode-id="2664" href="#cite_note-26"><span data-dcnode-id="2665" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2662" instrument_node=""> </span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jimmy_Carter" title="Jimmy Carter"><span data-dcnode-id="2661" instrument_node="">Jimmy Carter</span></a><span data-dcnode-id="2659" instrument_node=""> visited Poland in 1977 on one of his first foreign trip as president.</span><sup class="reference" data-dcnode-id="2656" id="cite_ref-27"><a data-dcnode-id="2657" href="#cite_note-27"><span data-dcnode-id="2658" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2655" instrument_node=""> </span><a data-dcnode-id="2653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_H._W._Bush" title="George H. W. Bush"><span data-dcnode-id="2654" instrument_node="">George H. W. Bush</span></a><span data-dcnode-id="2652" instrument_node=""> visited Poland in July 1989 to congratulate Poland overthrowing communists.</span><sup class="reference" data-dcnode-id="2649" id="cite_ref-visits_25-1"><a data-dcnode-id="2650" href="#cite_note-visits-25"><span data-dcnode-id="2651" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="2646" id="cite_ref-28"><a data-dcnode-id="2647" href="#cite_note-28"><span data-dcnode-id="2648" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2645" instrument_node=""> In succession, Bill Clinton, George W. Bush, and Barack Obama had made their visits to Poland.</span><sup class="reference" data-dcnode-id="2642" id="cite_ref-visits_25-2"><a data-dcnode-id="2643" href="#cite_note-visits-25"><span data-dcnode-id="2644" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2641" instrument_node="">
</span></p><span data-dcnode-id="2639" instrument_node="">
</span><h2 data-dcnode-id="2629"><span class="mw-headline" data-dcnode-id="2637" id="Aftermath"><span data-dcnode-id="2638" instrument_node="">Aftermath</span></span><span class="mw-editsection" data-dcnode-id="2630"><span class="mw-editsection-bracket" data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">[</span></span><a data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDonald_Trump%2527s_speech_in_Warsaw%2C_Poland%26action%3Dedit%26section%3D13" title="Edit section: Aftermath"><span data-dcnode-id="2634" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2627" instrument_node="">In November 2017, the Polish state-owned energy company </span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PGNiG" title="PGNiG"><span data-dcnode-id="2626" instrument_node="">PGNiG</span></a><span data-dcnode-id="2624" instrument_node=""> signed a 5-year deal to import liquified natural gas (LNG) from the United States.</span><sup class="reference" data-dcnode-id="2621" id="cite_ref-29"><a data-dcnode-id="2622" href="#cite_note-29"><span data-dcnode-id="2623" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2620" instrument_node=""> In October 2018, the company further signed a long-term deal to import up to 2 million tonnes of LNG from the United States annually over 20 years.</span><sup class="reference" data-dcnode-id="2617" id="cite_ref-30"><a data-dcnode-id="2618" href="#cite_note-30"><span data-dcnode-id="2619" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2616" instrument_node=""> The CEO of PGNiG Piotr Wozniak believed the deal is more beneficial than buying gas from Russia.</span><sup class="reference" data-dcnode-id="2613" id="cite_ref-31"><a data-dcnode-id="2614" href="#cite_note-31"><span data-dcnode-id="2615" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2612" instrument_node="">
</span></p><p data-dcnode-id="2599"><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_Poland" title="President of Poland"><span data-dcnode-id="2610" instrument_node="">President of Poland</span></a><span data-dcnode-id="2608" instrument_node=""> Andrzej Duda visited the White House to attend a joint press conference with Donald Trump in November 2018, and they discussed about a plan of establishing a U.S. military base in Poland.</span><sup class="reference" data-dcnode-id="2605" id="cite_ref-32"><a data-dcnode-id="2606" href="#cite_note-32"><span data-dcnode-id="2607" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2604" instrument_node=""> Poland also offered to contribute more than $2 billion to support this project.</span><sup class="reference" data-dcnode-id="2601" id="cite_ref-33"><a data-dcnode-id="2602" href="#cite_note-33"><span data-dcnode-id="2603" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2600" instrument_node="">
</span></p><span data-dcnode-id="2598" instrument_node="">
