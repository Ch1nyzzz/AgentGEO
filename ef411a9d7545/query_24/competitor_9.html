					Please note that the posts on The Blogs are contributed by third parties. The opinions, facts and any media content in them are presented solely by the authors, and neither The Times of Israel nor its partners assume any responsibility for them. Please contact us in case of abuse. In case of abuse,
					</span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">
</span><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timesofisrael.com/contact/report-post/%3Furl%3Dhttps%3A//blogs.timesofisrael.com/donald-trumps-nonsense/" target="_blank"><span data-dcnode-id="637" instrument_node="">Report this post.</span></a><span data-dcnode-id="635" instrument_node="">

</span><div class="block cols4" data-dcnode-id="441"><span data-dcnode-id="628" instrument_node="">
</span><div class="article-content" data-dcnode-id="556"><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Donald Trump, the ex-US president, thinks he has a license to spew nonsense. From his mouth of late have gushed out an astonishing number of statements divorced from reality.
</span></p><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Last week, he lambasted Benjamin Netanyahu, the former Israeli prime minister, as an ingrate. Netanyahu offended Trump because he was performing his duty. He had the gall to congratulate Joe Biden on his victory in the last presidential election. Given to foul language, Trump dismissed Netanyahu in a few choice words. “I haven’t spoke to him since,” he said. “Fuck him.”
</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Most recently, he claimed that American Jews do not care about Israel and that Israel has lost its “absolute power” in the US Congress.
		</span></p><div data-dcnode-id="616" id="gpt-passback" style="margin-bottom:26px;"><span data-dcnode-id="620" instrument_node="">
</span><span data-dcnode-id="617" instrument_node="">
</span></div><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Trump made these absurd comments in exclusive interviews with the Israeli journalist Barak Ravid, the author of &nbsp;Trump’s Peace, a book about his central role in brokering the Abraham accords, the normalization agreements Israel signed with the United Arab Emirates, Bahrain, Sudan and Morocco in 2020.
</span></p><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Often speaking in a disjointed stream of consciousness style, Trump said, “The Jewish people in the United States either don’t like Israel or care about Israel. I mean, look at The New York Times, The New York Times hates Israel, hates them. And they’re Jewish people that run The New York Times. I mean the Sulzberger family.”
</span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">“There are people in this country that are Jewish — no longer love Israel,” he added. “I’ll tell you, the evangelical Christians love Israel more than Jews in this country.”
</span></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">On what basis does he draw these sweeping conclusions? The fact of the matter is that the vast majority of Jews in the United States are emotionally and mentally attached to Israel, their justified critiques of misguided Israeli policies notwithstanding.
</span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">There are certainly Jewish Americans, most likely on the left, whom Israel has alienated to the point that they support the Boycott, Divestment and Sanctions movement and endorse a binational state in place of Israel. But they are definitely in a minority and do not represent mainstream Jewish opinion.
</span></p><p data-dcnode-id="601"><span data-dcnode-id="604" instrument_node="">Trump has a problem grasping why three-quarters of American Jews generally vote for the Democratic Party rather than his own Republican Party. He believes that Jews should be beholden to him and the Republican Party because he moved the U.S. embassy from Tel Aviv to Jerusalem and recognized Israel’s sovereignty over the disputed Golan Heights.
    </span><span data-dcnode-id="602" instrument_node="">
</span></p><div class="banner-placeholder Blogs_InContent_1" data-dcnode-id="590"><span data-dcnode-id="600" instrument_node="">
</span><span class="banner-label" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Advertisement</span></span><span data-dcnode-id="597" instrument_node="">
</span><div class="banner Blogs_InContent_1" data-aa-adunit="/3933714/TOI_Desktop/Blogs_InContent_1" data-aaad="true" data-dcnode-id="592" id="div-gpt-ad-Blogs_InContent_1"><span data-dcnode-id="596" instrument_node="">
</span><span data-dcnode-id="593" instrument_node="">
</span></div><span data-dcnode-id="591" instrument_node="">
</span></div><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">What he fails to understand is that most American Jewish voters are interested not only in Israel, but in an assortment of other issues that have a bearing on their lives.
</span></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">As for his remarks about The New York Times, they are simply untrue. The Times, in its editorials over the years, has been critical of Israel. But can legitimate criticism be equated with hatred? Not at all.
</span></p><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Since Trump often speaks disparagingly of the “failing” New York Times, he is hardly an objective observer. He dislikes The New York Times with a passion because it did not back his presidential campaign and sometimes ridiculed his domestic and foreign policy agenda.
</span></p><p data-dcnode-id="579"><span data-dcnode-id="582" instrument_node="">Taken together, Trump’s commentaries about American Jews are baseless and unfounded. They cannot be regarded seriously.
    </span><span data-dcnode-id="580" instrument_node="">
</span></p><div class="banner-placeholder Blogs_InContent_2" data-dcnode-id="568"><span data-dcnode-id="578" instrument_node="">
</span><span class="banner-label" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Advertisement</span></span><span data-dcnode-id="575" instrument_node="">
</span><div class="banner Blogs_InContent_2" data-aa-adunit="/3933714/TOI_Desktop/Blogs_InContent_2" data-aaad="true" data-dcnode-id="570" id="div-gpt-ad-Blogs_InContent_2"><span data-dcnode-id="574" instrument_node="">
</span><span data-dcnode-id="571" instrument_node="">
</span></div><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Trump also stumbled badly when he declared, “It used to be that Israel had absolute power over Congress. And today, I think it’s the exact opposite.”
</span></p><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Only antisemites and ignoramuses would share Trump’s skewed view of Israel’s supposed clout on Capitol Hill. Israel certainly is influential in the House of Representatives and the Senate, but not for the reasons its enemies and detractors advance.
</span></p><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">The United States and Israel usually share common values and goals, and strategically, Israel is the United States’ chief ally in the Middle East. It is mainly for these reasons that Israel enjoys bipartisan support in Congress.
</span></p><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Yet Israel does not, as Trump falsely claims, wield “absolute power over Congress.” Israel has gone down to defeat in quite a few battles in Congress in the past several decades. Today, despite all of Israel’s lobbying efforts, a congressional bill to replenish Israel’s Iron Dome anti-missile defence system is still in limbo thanks to Rand Paul, a Republican senator from Kentucky.
</span></p><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Trump’s ruminations about Israel and American Jews simply do not stand up to scrutiny. It would be better if he remains silent. Better still, he should fade away like an old soldier.
		</span></p></div><span data-dcnode-id="555" instrument_node="">
