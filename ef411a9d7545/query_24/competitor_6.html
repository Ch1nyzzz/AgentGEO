</span><div class="l-main" data-dcnode-id="475"><span data-dcnode-id="725" instrument_node="">
</span><div class="panel-pane pane-node-body" data-dcnode-id="500"><span data-dcnode-id="724" instrument_node="">
</span><div class="pane-content" data-dcnode-id="502"><span data-dcnode-id="723" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="504"><div class="field-items" data-dcnode-id="505"><div class="field-item even" data-dcnode-id="506" property="content:encoded"><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Few of the many unexpected intellectual twists and turns of the early post-9/11 years of the Bush administration were quite so unexpected—or quite so twisty and turny—as the sudden return to prominence of the pre-war German jurist and legal theorist Carl Schmitt. Schmitt was, to put it mildly, not a reputable figure. His earlier fame, or infamy, emanated from his opportunistic use of his own scholarship to shore up the legal foundations of the Nazi state.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Faced with an administration responding harshly to perceived security threats under an aggressive view of wartime executive power, many commentators on the left and in the civil liberties community looked at George W. Bush and thought they saw the face of the wolf. And when they looked for the mind of the wolf into whose face they imagined themselves staring, they found Schmitt.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Schmitt is most well-known for his theory of the “state of exception,” under whose aegis the sovereign power can choose to act outside the structure of law. As he wrote presciently in 1922, the “sovereign is he who decides on the exception.”</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="713" instrument_node="">After September 2001, Schmitt’s terse, almost aphoristic formulation of sovereignty was much passed around by the literati and legal academics as a summary statement of the Bush administration’s perceived shift toward emergency power at the expense of the proper functioning of the rule of law. In 2005, the leftist Italian philosopher Giorgio Agamben further secured Schmitt’s position as the accidental prophet of the post-9/11 age in his book </span><em data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">State of Exception, </span></em><span data-dcnode-id="710" instrument_node="">which turned to the Bush administration as an example of how Schmitt’s exception would inevitably expand to swallow law whole. Agamben’s take on Schmitt was </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nybooks.com/articles/2011/10/13/after-september-11-our-state-exception/"><span data-dcnode-id="709" instrument_node="">widely cited</span></a><span data-dcnode-id="707" instrument_node=""> as a call to alarm among commentators concerned about a perceived shift toward a state of exception in American politics.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="704" instrument_node="">Schmitt was trendy again—and not just on the left or among critical theorists. His ideas touched on a newly live wire; citations to his work in legal journals </span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//legalhistoryblog.blogspot.com/2011/02/schmitt-and-post-911-legal-thought.html"><span data-dcnode-id="703" instrument_node="">soared</span></a><span data-dcnode-id="701" instrument_node=""> in the years after 9/11. A decade later, he still spoke for something in the zeitgeist, to the point where Eric Posner and Adrian Vermeule could mischievously declare their intellectual allegiance not to James Madison but to Schmitt in their </span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Executive-Unbound-After-Madisonian-Republic/dp/0199765332"><span data-dcnode-id="700" instrument_node="">volume in defense of expansive executive power</span></a><span data-dcnode-id="698" instrument_node="">.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">The nightmares of those who thought they saw Schmitt in the form of George W. Bush turned out to be what John Ashcroft might have </span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/archive/ag/testimony/2001/1206transcriptsenatejudiciarycommittee.htm"><span data-dcnode-id="694" instrument_node="">called</span></a><span data-dcnode-id="692" instrument_node=""> “phantoms of lost liberty.” Certainly, the Bush administration saw an intentional turn toward an aggressive view of executive power, and the shape of law in the post-9/11 world has changed from the prelapsarian age. But the fundamental structure of the rule of law itself has remained standing.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Our new President-elect, Donald Trump, now poses an interesting problem for the Schmittian revival: have we now, eight years after Bush left office, elected our first Schmittian President? The lingering concern over Bush’s perceived Schmittian tendencies may make it more challenging to present this question with the rigor it actually merits. The crucial bit of that Aesop fable about the boy who cried wolf, after all, is that the wolf actually does show up at the end.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">So is Trump the Schmittian wolf that Bush was not? And by crying Schmitt about Bush, did those in the civil liberties community and aligned with the left inadvertently make it more difficult to take seriously cries of Schmitt about Trump? Having blurred the distinction between behavior that’s truly outside law versus behavior that disrupts or degrades law, it’s now crucially important that we reaffirm that distinction with care and honesty.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">The core of Schmitt’s </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books/about/Political_Theology.html%3Fid%3DwPkMd81Y0qUC%26source%3Dkp_cover"><span data-dcnode-id="682" instrument_node="">argument</span></a><span data-dcnode-id="680" instrument_node=""> is that a political order centered on the rule of law must sooner or later come face to face with the problem of the exception, a situation that is essentially inchoate but can be approximated as one of dire emergency or “extreme peril” to the state. Because the form of the exception can’t be anticipated or defined, Schmitt argued, no law or structure of law can predict what powers will be needed by the government to grapple with the emergency that exception represents. Despite the regimentation of law, he contended, there ultimately must exist a figure whose power it is to determine the existence of the exception and who obtains “principally unlimited authority” after having declared that state.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Whatever the force of law’s attempt to constrain power, Schmitt argued, sooner or later everything will all come down to the moment of individual decision on the part of the Schmittian sovereign—a decision that can’t be anticipated or regulated in any way. And so, if we listen to Schmitt, do we find the potential for absolute dictatorship lurking at the heart of the rule of law.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Agamben and other legal theorists and writers saw President Bush as attempting to fit himself into the mold of Schmitt’s sovereign, declaring the United States as in a state of exception within which the normal rule of law no longer had force and the executive branch gained unilateral authority to take measures that would previously would have been unthinkable. And as the post-9/11 state of exception drew on through the years with no sign of ending, Agamben’s thesis on the state of exception as entirely consuming law and the state maintained its hold.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="671" instrument_node="">Here, for example, is </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/State-Exception-Giorgio-Agamben/dp/0226009254"><span data-dcnode-id="670" instrument_node="">Agamben on Guantanamo and military commissions</span></a><span data-dcnode-id="668" instrument_node="">:</span></p><span data-dcnode-id="666" instrument_node="">
</span><blockquote data-dcnode-id="662"><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">What is new about President Bush’s order [of November 13, 2001, authorizing indefinite detention and trial by military commissions in the conflict with the Taliban and al-Qaeda] is that it radically erases any legal status of the individual, thus producing a legally unnamable and unclassifiable being. Not only do the Taliban captured in Afghanistan not enjoy the status of POWs as defined by the Geneva Convention, they do not even have the status of persons charged with a crime according to American laws. Neither prisoners nor persons accused, but simply “detainees,” they are the object of a pure de facto rule, of a detention that is indefinite not only in the temporal sense but in its very nature as well, since it is entirely removed from the law and from judicial oversight.</span></p><span data-dcnode-id="663" instrument_node="">
</span></blockquote><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="660" instrument_node="">Agamben wrote this in 2005. And in 2006, the Supreme Court proved him wrong—both about the legal status of detainees and about George W. Bush’s Schmittian character. That year, the Court handed down </span><em data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Hamdan v. Rumsfeld, </span></em><span data-dcnode-id="657" instrument_node="">affirming the application of Common Article 3 of the Geneva Conventions to detainees at Guantanamo and rejecting the Bush administration’s argument that military necessity—or as Schmitt might say, the existence of a state of exception—justified Salim Hamdan’s trial by military commission in the absence of clear congressional authorization.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="654" instrument_node="">The ruling dealt a blow to a Schmittian reading of the post-9/11 United States as in a state of exception: the Court’s insistence on a limit to military necessity was a declaration both that the state of exception has certain characteristics on the basis of which any given declaration of exception can be judged as accurate or inaccurate, and that the courts are competent to make that judgment. More important for present purposes, however, is how Bush reacted to the ruling. As an administration official quoted in the </span><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Washington Post </span></em><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/wp-dyn/content/article/2006/07/11/AR2006071100094.html"><span data-dcnode-id="651" instrument_node="">put it</span></a><span data-dcnode-id="649" instrument_node="">:</span></p><span data-dcnode-id="647" instrument_node="">
</span><blockquote data-dcnode-id="640"><p data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">"We strongly believe that terrorists picked up off the battlefield—who don't represent a nation, revel in killing the innocent, and refuse to wear uniforms—do not qualify for protections under Geneva," White House counselor Dan Bartlett said. "Five members of the Supreme Court disagreed. </span><em data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">As the president said, we will comply with the ruling.</span></em><span data-dcnode-id="643" instrument_node="">" (emphasis added)</span></p><span data-dcnode-id="641" instrument_node="">
</span></blockquote><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="638" instrument_node="">The spokesman for a truly Schmittian ruler would never have added that last pivotal sentence. And </span><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Hamdan </span></em><span data-dcnode-id="635" instrument_node="">is only one example among many</span><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">. </span></em><span data-dcnode-id="632" instrument_node="">While the Bush administration may have contorted law and pushed legal and constitutional interpretations past their reasonable limit, when the courts pushed back, the administration always yielded. And while there might have been doubt as to whether the courts would assert themselves against the executive, there was never doubt that that the executive would accept the authority of the courts if and when they did so.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">To say that a President ultimately accepts restraint is, obviously, not high praise. And by arguing that the Bush administration at its highest ebb of fixation on executive power never came close to Schmitt’s vision of the sovereign exception, I don’t mean to offer a defense, let alone an endorsement, of any of the policies of that period. Rather, I’m drawing a distinction between an executive branch that relied on expansive understandings of Article II of the Constitution and one that bears a real risk of paying no attention to the Constitution whatsoever—and, moreover, of denying the authority of any other institution to check it.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">Jack Goldsmith, for example, has </span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Terror-Presidency-Judgment-Inside-Administration/dp/039333533X"><span data-dcnode-id="625" instrument_node="">argued</span></a><span data-dcnode-id="623" instrument_node=""> that the Bush administration was not lawless but rather obsessed with law, to the point where “the question ‘What should we do?’ so often collapsed into the question ‘What can we lawfully do?’” In his view, it was exactly this obsession with legal fine print—rather than a desire to act outside law altogether, as a Schmittian President would—that accounted for the administration’s tendency to “act to the edges of the law.”</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="620" instrument_node="">In contrast, Trump has given us genuine reason for concern that he may actually represent the Schmittian nightmare feared by many on the left and in the civil libertarian community after 9/11. His offhand campaign promise to House Republicans to uphold the Constitution’s </span><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/volokh-conspiracy/wp/2016/07/07/trump-wants-to-protect-article-xii-of-the-constitution/%3Futm_term%3D.5ce62de87dd4"><span data-dcnode-id="619" instrument_node="">nonexistent Article XII</span></a><span data-dcnode-id="617" instrument_node=""> raised concern at the time over his lack of textual knowledge of the document, but even this isn’t the important thing. Not every President has had detailed textual knowledge of the Constitution, though most have been better at glossing over that fact than has Trump. What’s key is Trump’s apparent lack of understanding of the document’s significance and power as the bedrock of democracy and the rule of law—an understanding that normally commits the President to behaving in a constitutional fashion by heeding the good-faith advice of legal counsel.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="614" instrument_node="">Trump, on the other hand, has displayed precious little respect for these underlying constitutional principles: recall his </span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2016/10/20/us/politics/presidential-debate.html"><span data-dcnode-id="613" instrument_node="">hedging</span></a><span data-dcnode-id="611" instrument_node=""> on whether he would accept the results of the election, and his eventual </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2016/10/21/us/politics/campaign-election-trump-clinton.html"><span data-dcnode-id="610" instrument_node="">declaration</span></a><span data-dcnode-id="608" instrument_node=""> that he would do so “if I win.” And to paraphrase an astute acquaintance I spoke to in the days after the election, while Trump might want to be a good President for the American people, he has shown no sign of wanting to be a good participant in the American system of governance. Her comments were echoed recently by Representative Justin Amash (R-MI), who </span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thehill.com/homenews/house/308533-gop-rep-trump-has-extra-constitutional-view-of-presidency"><span data-dcnode-id="607" instrument_node="">criticized</span></a><span data-dcnode-id="605" instrument_node=""> Trump for his “extra-constitutional” view of the presidency: “I think he just views the job [of the presidency as] … outside the Constitution,” Amash said. “I don’t think our framework [of law] in this country really comes into play when he’s thinking about how the job should operate.”</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="602" instrument_node="">Amash’s formulation is apt: think of Trump’s </span><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2016/11/23/us/politics/trump-new-york-times-interview-transcript.html%3F_r%3D0"><span data-dcnode-id="601" instrument_node="">statement</span></a><span data-dcnode-id="599" instrument_node=""> to the </span><em data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">New York Times </span></em><span data-dcnode-id="596" instrument_node="">that “the president can’t have a conflict of interest,” and therefore can’t be in violation of the Emoluments Clause. As many have noted, it’s hard not to hear the echoes of Nixon’s infamous declaration, “When the President does it, that means it is not illegal.”</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">“Extra-constitutional” is also a good way of describing Carl Schmitt’s sovereign power, which is not exactly above the law but, rather, outside it. The sovereign determines when law applies and to whom, and the sovereign’s decision is unreviewable by the courts or any other actor because it exists outside the structure of legal review entirely.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">So let’s consider the case that Trump might be the real Schmittian. You can see hints of such an extra-constitutional self-understanding not only in Trump’s apparent lack of respect for the Emoluments Clause, but also in his contempt for the work of the courts. Consider his attacks during the campaign on Judge Gonzalo Curiel, the federal judge hearing the Trump University fraud case. Trump </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politifact.com/wisconsin/article/2016/jun/08/donald-trumps-racial-comments-about-judge-trump-un/"><span data-dcnode-id="589" instrument_node="">described</span></a><span data-dcnode-id="587" instrument_node=""> Curiel as a “hater,” saying that the judge’s Mexican heritage made it impossible for him to preside objectively over the case. Even when pushed to apologize, Trump declared instead that “I feel justified in questioning whether I am receiving a fair trial." To put it mildly, this is not the kind of behavior we expect from our leaders toward the courts: American officials, and even those running for public office, don’t usually take it upon themselves to declare whether or not a duly appointed judge is appropriate to hear their cases.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">And then there’s Trump’s bizarre disregard for the legal protections of criminal procedure. We saw this most conspicuously in his </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.com/story/2016/08/trump-clinton-guilty-227349"><span data-dcnode-id="583" instrument_node="">insistence</span></a><span data-dcnode-id="581" instrument_node=""> on Hillary Clinton’s guilt in the matter of her private email server on the simple grounds that “everybody knows she’s guilty” and his unwillingness to admit the legitimacy of an independent FBI investigation which cleared her of wrongdoing. He appears to have abandoned his threats to prosecute Clinton in recent weeks, but without ever acknowledging that forcing the FBI to reopen the investigation would have called integrity of the Bureau’s function as an arm of law enforcement into serious question.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="578" instrument_node="">On that note, it’s also worth considering Trump’s </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//time.com/time-person-of-the-year-2016-donald-trump/%3Fiid%3Dbuttonrecirc"><span data-dcnode-id="577" instrument_node="">stated</span></a><span data-dcnode-id="575" instrument_node=""> </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2016/12/03/world/asia/philippines-rodrigo-duterte-donald-trump.html"><span data-dcnode-id="574" instrument_node="">admiration</span></a><span data-dcnode-id="572" instrument_node=""> for Philippine President Rodrigo Duterte’s brutal antidrug campaign, which has resulted in an enormous number of extrajudicial killings by police. There’s no criminal procedure here, just the presumption of guilt and an execution. This is very close to Schmitt, by way of Agamben: the power of the sovereign is to remove the protections of law from the subject while still retaining the use of law as an instrument of brute force. (Agamben calls this “</span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Homo-Sacer-Sovereign-Meridian-Aesthetics/dp/0804732183"><span data-dcnode-id="571" instrument_node="">bare life</span></a><span data-dcnode-id="569" instrument_node="">,” stripped of the ability to participate in politics.)</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="566" instrument_node="">And there’s Trump’s bullshit. In a previous essay, I </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lawfareblog.com/bullshit-and-oath-office-lol-nothing-matters-presidency"><span data-dcnode-id="565" instrument_node="">argued</span></a><span data-dcnode-id="563" instrument_node=""> that Trump is a bullshitter in the technical sense as </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stoa.org.uk/topics/bullshit/pdf/on-bullshit.pdf"><span data-dcnode-id="562" instrument_node="">described</span></a><span data-dcnode-id="560" instrument_node=""> by philosopher Harry Frankfurt: he tells falsehoods not to obscure the truth, but because he doesn’t care what the truth is. In Frankfurt’s words, Trump is “indifferen[t] to how things really are”; his bullshit denies that “there are indeed facts that are in some way determinable or knowable” and that “there is a difference between getting things wrong and getting them right, and that it is at least occasionally possible to tell the difference.” I argued that, as a bulshitter, Trump will be foundationally incapable of honoring the presidential oath of office and the Take Care Clause of the Constitution, both of which require him to “faithfully execute” the duties of office and the laws of the nation, because he lacks the respect for truth, law, and meaning to which the oath commits him.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Trump’s bullshit is also intimately connected with his possible role as an extra-constitutional, Schmittian President. In the mouth of the President, bullshit represents an approach to meaning that is functionally identical to that of a sovereign unconstrained by law: He makes up his own reality, unconstrained by anybody or anything.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Bullshit places the speaker outside usual systems of evaluating truth and meaning, just like the exception places the sovereign outside the space of law. In both cases, the person in question (let’s call him Donald J. Trump) locates himself beyond the authorities that usually govern human activity in order to determine whether or not those authorities have any power. Bullshit, like the declaration of the state of exception, can’t be verified or constrained: Trump can always simply deny the veracity of the facts used to point out his falsehoods, just as the sovereign can deny the existence of a “normal” versus exceptional state of affairs by fiat. And in its destruction of shared meaning, bullshit, like Schmitt’s theories, is hostile to democracy: absent a mutual language with which to communicate with each other and come to agreement, the only tactic left is to compel agreement through force.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The character of a person who habitually peddles bullshit and the character of a person who lacks a foundational respect for the Constitution and the rule of law to the point of perhaps considering the office of the President as “extra-constitutional” are, if not identical, at least very closely related.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">That being said, to raise the question of whether Trump is a Schmittian is not to answer it. And there are at least some reasons to doubt the premise.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="545" instrument_node="">First off, while bullshit may be a necessary ingredient for a Schmittian leader, it’s far from sufficient. Dismantling the rule of law is hard work. Schmitt’s sovereign must come equipped not only with a finely tuned ability to bullshit but also with a certain </span><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Will_to_Power_%28manuscript%29"><span data-dcnode-id="544" instrument_node="">strength of will</span></a><span data-dcnode-id="542" instrument_node="">.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">As the clock ticks down to the inauguration, many of our arguments over Donald Trump boil down to whether he has this strength of will or not. To what extent is he acting impulsively or being manipulated, and to what extent is he a canny operator who’s figured out exactly how to game the system? Political scientist Yascha Mounk </span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.fm/series/slates-trumpcast/the-good-fight"><span data-dcnode-id="538" instrument_node="">recently made a similar point</span></a><span data-dcnode-id="536" instrument_node="">, noting that while Trump appears to have similar illiberal instincts as other right-wing populists engaged in systematic anti-democratic efforts around the world (such as Hungary’s Viktor Orbán and Poland’s Jarosław Kaczyński), it’s not yet clear whether Trump is consciously aware of those instincts as contributing to a broader illiberal project.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">So maybe Trump is just a bullshitter, rather than a Schmittian bullshitter. In this scenario, we may be headed for something much closer to a Berlusconi </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nybooks.com/daily/2016/11/10/trump-election-autocracy-rules-for-survival/"><span data-dcnode-id="532" instrument_node="">than a Putin</span></a><span data-dcnode-id="530" instrument_node="">: four to eight years of cheerful vulgarity and the degradation of political norms in the service of grift, but not a wholesale attack on the rule of law as such. On this view, Trump’s behavior toward Clinton and Judge Curiel, while certainly appalling, is far less sinister—just a lashing-out at those who had upset him. The wolf’s bark is worse than his bite.</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">And there’s a case for this with Trump. While he yapped about Curiel, after all, he never showed any serious intention of not accepting the legitimacy of Curiel’s rulings as the proceedings went on; indeed, he eventually settled the case. And while he once made noises about reinvestigating Clinton, he’s quieted on this in recent weeks and hasn’t moved to reopen the investigation.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">But in my view, much of the anxiety about Trump and the rule of law is really anxiety about how and whether the rule of law can adequately constrain a would-be Schmittian. Faced with a person who genuinely regards himself as outside of the legal system, perhaps the law ultimately is very little. Perhaps it’s everything. Or perhaps it is a major factor, but can only function adequately in conversation with the robust political norms and sense of civic decency over which Trump has so assiduously trod.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">The work of Schmitt and those who follow him is necessarily focused on the changing geography of the exception: not only what and who lies inside or outside the structure of law and the realm of permissible force, but also what happens when those boundaries shift. Trump’s transformation of the office of the President into a Schmittian entity may not be a binary question of the executive as either unambiguously inside or outside law; Trump might instead move toward Schmittianism in a process of edge case after edge case, over the course of which legal constraints on the presidency would be weakened, degraded, and eventually entirely destroyed. Indeed, it was fear of exactly this liminal creep that led many onlookers to cry wolf under the Bush administration. We inevitably return to Justice Jackson’s </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casetext.com/case/toyosaburo-korematsu-v-united-states-2"><span data-dcnode-id="520" instrument_node="">warning </span></a><span data-dcnode-id="518" instrument_node="">of legally validated claims of executive power as a “loaded weapon, ready for the hand of any authority that can bring forward a plausible claim of an urgent need. Every repetition imbeds that principle more deeply in our law and thinking and expands it to new purposes.”</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="515" instrument_node="">Jackson made his famous warning in his dissent to </span><em data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Korematsu</span></em><span data-dcnode-id="512" instrument_node="">, a case that has lately been on </span><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.npr.org/sections/codeswitch/2016/11/17/502442853/renewed-support-for-muslim-registry-called-abhorrent"><span data-dcnode-id="511" instrument_node="">many of our minds</span></a><span data-dcnode-id="509" instrument_node="">. His dissent is an odd creature, hedging its bets in order to finally take the position that the case before the Justice lies, in a sense, outside law: it’s both an argument for deference to the executive in times of emergency and a refusal to tarnish law by granting legal imprimatur to the military’s ugly actions. That imprimatur is the loaded gun, a reminder not only of law’s power but also of its limit.</span></p><span data-dcnode-id="507" instrument_node="">
</span></div></div></div><span data-dcnode-id="503" instrument_node=""> </span></div><span data-dcnode-id="501" instrument_node="">

</span><div class="author_info__picture" data-dcnode-id="466"><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lawfareblog.com/contributors/qjurecic"><img alt="Quinta Jurecic" data-dcnode-id="468" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lawfareblog.com/sites/default/files/styles/thumbnail/public/pictures/picture-435-1517246650.png%3Fitok%3DdSUFpS1h&amp;raw" title="Quinta Jurecic" typeof="foaf:Image" width="100"></a></div><span data-dcnode-id="465" instrument_node="">

</span><div class="author_info__bio" data-dcnode-id="456"><span data-dcnode-id="463" instrument_node="">
        Quinta Jurecic is a fellow in Governance Studies at the Brookings Institution and a senior editor at </span><i data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Lawfare</span></i><span data-dcnode-id="460" instrument_node="">. She previously served as </span><i data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Lawfare's</span></i><span data-dcnode-id="457" instrument_node=""> managing editor and as an editorial writer for the Washington Post.       </span></div><span data-dcnode-id="455" instrument_node="">
