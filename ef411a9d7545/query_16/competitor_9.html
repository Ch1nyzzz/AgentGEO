</span><div class="content-text" data-dcnode-id="7666" id="135329"><p data-dcnode-id="7668"><span data-dcnode-id="7672" instrument_node="">In his </span><a data-dcnode-id="7670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/inaugural-address"><span data-dcnode-id="7671" instrument_node="">inaugural address</span></a><span data-dcnode-id="7669" instrument_node="">, President Donald J. Trump announces an America First approach to foreign policy and trade, which centers on reducing U.S. trade deficits and rebalancing burden sharing within alliances. Trump promises to “unite the civilized world against radical Islamic terrorism” and emphasizes that “it is the right of all nations to put their own interests first.”</span></p><span data-dcnode-id="7667" instrument_node="">

</span><div class="content-headline" data-dcnode-id="7403" id="135332"><span data-dcnode-id="7404" instrument_node="">Travel Ban</span></div><span data-dcnode-id="7402" instrument_node="">
</span></div><span data-dcnode-id="7400" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="7393"><span data-dcnode-id="7399" instrument_node="">
</span><div class="content-text" data-dcnode-id="7395" id="135332"><p data-dcnode-id="7397"><span data-dcnode-id="7398" instrument_node="">The president signs an executive order banning nationals of six Muslim-majority countries from traveling to the United States for ninety days. The order, later amended to include an additional two countries, also indefinitely freezes refugee intake from Syria. Days later, a federal judge in Washington State blocks part of the order, beginning a series of judicial challenges. That same week,&nbsp;Trump signs two other executive orders concerning immigration. One directs federal funds to the construction of a wall along the U.S.-Mexico border, and the other bars so-called sanctuary cities from receiving federal grants.</span></p><span data-dcnode-id="7396" instrument_node="">

</span></div><span data-dcnode-id="7266" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="7256"><span data-dcnode-id="7265" instrument_node="">
</span><div class="content-text" data-dcnode-id="7258" id="135333"><p data-dcnode-id="7260"><span data-dcnode-id="7264" instrument_node="">In retaliation for Syrian President Bashar al-Assad’s </span><a data-dcnode-id="7262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/interview/will-syria-yield-chemical-weapons-ban"><span data-dcnode-id="7263" instrument_node="">use of the chemical weapon</span></a><span data-dcnode-id="7261" instrument_node=""> sarin in an attack against civilians, Trump authorizes a limited cruise missile strike on the regime-controlled Shayrat Air Base. U.S.-sponsored measures against the regime at the UN Security Council are blocked by Russia, part of a long-running trend.</span></p><span data-dcnode-id="7259" instrument_node="">

</span><div class="content-headline" data-dcnode-id="6995" id="135335"><span data-dcnode-id="6996" instrument_node="">Trump Goes Abroad</span></div><span data-dcnode-id="6994" instrument_node="">
</span></div><span data-dcnode-id="6992" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="6982"><span data-dcnode-id="6991" instrument_node="">
</span><div class="content-text" data-dcnode-id="6984" id="135335"><p data-dcnode-id="6986"><span data-dcnode-id="6990" instrument_node="">Trump makes his first trip abroad as president, traveling to Saudi Arabia, Israel, the West Bank, Italy, Vatican City, Belgium, and Italy. He attends a summit in Riyadh with leaders from more than fifty Arab- and Muslim-majority nations, where he delivers a speech calling on the Muslim world to unite against terrorism. In Brussels, </span><a data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/the-press-office/2017/05/25/remarks-president-trump-nato-unveiling-article-5-and-berlin-wall"><span data-dcnode-id="6989" instrument_node="">Trump addresses</span></a><span data-dcnode-id="6987" instrument_node=""> North Atlantic Treaty Organization (NATO) heads of state and government, calling on each of them to “finally contribute their fair share” to the alliance. He does not, however, explicitly state his support for NATO’s Article 5 mutual defense clause. In Italy, Trump participates in the Group of Seven (G7) meeting, where the United States joins a joint declaration on fighting protectionism but withholds its support from one reaffirming the Paris climate accord.</span></p><span data-dcnode-id="6985" instrument_node="">
</span></div><span data-dcnode-id="6983" instrument_node="">

</span><div class="content-headline" data-dcnode-id="6858" id="135336"><span data-dcnode-id="6859" instrument_node="">Leaving the Paris Agreement</span></div><span data-dcnode-id="6857" instrument_node="">
</span></div><span data-dcnode-id="6855" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="6846"><span data-dcnode-id="6854" instrument_node="">
</span><div class="content-text" data-dcnode-id="6848" id="135336"><p data-dcnode-id="6850"><a data-dcnode-id="6852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/the-press-office/2017/06/01/statement-president-trump-paris-climate-accord"><span data-dcnode-id="6853" instrument_node="">In a speech</span></a><span data-dcnode-id="6851" instrument_node="">, Trump announces that the United States will withdraw from the 2015 Paris climate accord, another agreement negotiated by Obama. Trump criticizes the 195-country agreement, under which the United States would have voluntarily limited its carbon emissions, for constricting U.S. sovereignty, harming American workers, and disadvantaging the United States economically.</span></p><span data-dcnode-id="6849" instrument_node="">

</span><div class="content-headline" data-dcnode-id="6588" id="135338"><span data-dcnode-id="6589" instrument_node="">Rolling Back Ties With Cuba</span></div><span data-dcnode-id="6587" instrument_node="">
</span></div><span data-dcnode-id="6585" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="6578"><span data-dcnode-id="6584" instrument_node="">
</span><div class="content-text" data-dcnode-id="6580" id="135338"><p data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">Trump announces a partial rollback of the Obama administration’s rapprochement with Cuba. Under the newly announced guidelines, the United States will reinstate restrictions on travel and trade with Cuba without severing diplomatic ties. In September 2017, the Trump administration reduces the U.S. embassy staff in Havana by half.</span></p><span data-dcnode-id="6581" instrument_node="">

</span><div class="content content-bottom" data-dcnode-id="6441"><span data-dcnode-id="6450" instrument_node="">
</span><div class="content-text" data-dcnode-id="6443" id="135339"><p data-dcnode-id="6445"><span data-dcnode-id="6449" instrument_node="">In a visit to Warsaw, Trump </span><a data-dcnode-id="6447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/the-press-office/2017/07/06/remarks-president-trump-people-poland-july-6-2017"><span data-dcnode-id="6448" instrument_node="">delivers an address</span></a><span data-dcnode-id="6446" instrument_node=""> in which he emphasizes a civilizational struggle for the West and, for the first time, explicitly references NATO’s mutual defense clause. In Germany, Trump attends the Group of Twenty leaders’ meeting, where he meets for the first time as president with Russian President Vladimir Putin. The meeting is highly anticipated amid ongoing investigations into Russian interference in the 2016 U.S. elections.</span></p><span data-dcnode-id="6444" instrument_node="">

</span></div><span data-dcnode-id="6180" instrument_node="">

</span><div class="content-text" data-dcnode-id="5901" id="135343"><p data-dcnode-id="5903"><span data-dcnode-id="5907" instrument_node="">Trump, </span><a data-dcnode-id="5905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/the-press-office/2017/09/19/remarks-president-trump-72nd-session-united-nations-general-assembly"><span data-dcnode-id="5906" instrument_node="">addressing the UN General Assembly</span></a><span data-dcnode-id="5904" instrument_node=""> for the first time, threatens to “totally destroy” North Korea if the United States is “forced to defend itself or its allies.” Echoing his inaugural address, Trump emphasizes sovereignty and tells the gathered world leaders that the United States does “not seek to impose our way of life on anyone, but rather to let it shine as an example for everyone to watch.”</span></p><span data-dcnode-id="5902" instrument_node="">

</span><div class="content-text" data-dcnode-id="5767" id="135344"><p data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">After months of deliberation, Trump announces that he will not recertify Iran’s compliance with the 2015 Joint Comprehensive Plan of Action to Congress (JCPOA), saying that Iran’s behavior violates the spirit of the agreement. Trump does not take steps to abrogate the JCPOA; instead, he asks Congress to deliberate on reimposing sanctions.</span></p><span data-dcnode-id="5768" instrument_node="">

</span><div class="content-headline" data-dcnode-id="5641" id="135345"><span data-dcnode-id="5642" instrument_node="">Trump Goes to Asia</span></div><span data-dcnode-id="5640" instrument_node="">
</span></div><span data-dcnode-id="5638" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="5631"><span data-dcnode-id="5637" instrument_node="">
</span><div class="content-text" data-dcnode-id="5633" id="135345"><p data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node="">Trump travels to Japan, South Korea, China, Vietnam, and the Philippines on his longest trip yet. In addition to introducing a new vision for U.S. involvement in the “Indo-Pacific,” North Korea and trade dominate the agenda. In Vietnam, Trump attends the Asia-Pacific Economic Cooperation summit and delivers an address reinforcing his America First vision on trade. In Manila, on the sidelines of the Association of Southeast Asian Nations summits, officials from the United States, Japan, Australia, and India convene a quadrilateral meeting of like-minded democracies with concerns about China’s rise.</span></p><span data-dcnode-id="5634" instrument_node="">
</span></div><span data-dcnode-id="5632" instrument_node="">

</span><div class="content-text" data-dcnode-id="5362" id="143272"><p data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">The administration releases a series of strategy documents, including ones on national security and defense, both of which highlight China and Russia as major strategic competitors. Soon after, it releases its Nuclear Posture Review (NPR), which calls for the creation of two new nuclear missiles for submarines. The NPR also broadens the circumstances under which the United States may use nuclear weapons to encompass cyberattacks.</span></p><span data-dcnode-id="5363" instrument_node="">

</span></div><span data-dcnode-id="5099" instrument_node="">

</span><div class="content-text" data-dcnode-id="5094" id="143275"><p data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">Trump accepts an invitation from Kim to meet for what would be the first summit between a sitting U.S. president and his North Korean counterpart. South Korean National Security Advisor Chun Eui-yong, in Washington, D.C., announces Trump’s decision to accept the invitation. The Trump administration says the summit will be an opportunity to discuss the denuclearization of North Korea.</span></p><span data-dcnode-id="5095" instrument_node="">

</span><div class="content-headline" data-dcnode-id="4968" id="152368"><span data-dcnode-id="4969" instrument_node="">U.S.-China Trade War</span></div><span data-dcnode-id="4967" instrument_node="">
</span></div><span data-dcnode-id="4965" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="4958"><span data-dcnode-id="4964" instrument_node="">
</span><div class="content-text" data-dcnode-id="4960" id="152368"><p data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">In early April, China imposes retaliatory tariffs on U.S. products worth about $3 billion, escalating a trade war between the world’s two largest economies. By November, the United States has levied tariffs on $250 billion worth of Chinese goods, while China has imposed tariffs on $110 billion worth of U.S. products. At the Group of Twenty summit in Buenos Aires in early December, Trump and Chinese President Xi Jinping agree to a cease-fire, as well as to strike a broader trade agreement within ninety days.</span></p><span data-dcnode-id="4961" instrument_node="">

</span><time class="content-dates" data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">May 8, 2018</span></time><span data-dcnode-id="4565" instrument_node="">
</span><div class="content-headline" data-dcnode-id="4563" id="143277"><span data-dcnode-id="4564" instrument_node="">Withdrawal From Iran Nuclear Agreement</span></div><span data-dcnode-id="4562" instrument_node="">
</span></div><span data-dcnode-id="4560" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="4547"><span data-dcnode-id="4559" instrument_node="">
</span><div class="content-text" data-dcnode-id="4549" id="143277"><p data-dcnode-id="4551"><span data-dcnode-id="4558" instrument_node="">The president announces the U.S. withdrawal from the Joint Comprehensive Plan of Action (JCPOA), the 2015 agreement on </span><a data-dcnode-id="4556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/impact-iran-nuclear-agreement"><span data-dcnode-id="4557" instrument_node="">Iran’s nuclear program</span></a><span data-dcnode-id="4555" instrument_node="">. Trump says it did not sufficiently curb the country’s civilian nuclear program or its regional aggression. Without citing any material Iranian violations, Trump announces that the United States will reinstate </span><a data-dcnode-id="4553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/article/return-us-sanctions-iran-what-know"><span data-dcnode-id="4554" instrument_node="">two sets of sanctions</span></a><span data-dcnode-id="4552" instrument_node=""> on Iran that had been waived with the deal’s implementation; they will take effect in August and November and range from aircraft imports to oil and petroleum product exports.</span></p><span data-dcnode-id="4550" instrument_node="">
</span></div><span data-dcnode-id="4548" instrument_node="">
</span></div><span data-dcnode-id="4546" instrument_node="">

</span></div><span data-dcnode-id="4149" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="4139"><span data-dcnode-id="4148" instrument_node="">
</span><div class="content-text" data-dcnode-id="4141" id="152372"><p data-dcnode-id="4143"><span data-dcnode-id="4147" instrument_node="">Ambassador Nikki Haley announces that the United States will withdraw from the Human Rights Council, citing “</span><a data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2018/06/19/621435225/u-s-announces-its-withdrawal-from-u-n-s-human-rights-council"><span data-dcnode-id="4146" instrument_node="">a chronic bias against Israel</span></a><span data-dcnode-id="4144" instrument_node="">” and the human rights abuses of various sitting members, which include China and Venezuela.</span></p><span data-dcnode-id="4142" instrument_node="">
</span></div><span data-dcnode-id="4140" instrument_node="">

</span><div class="content-headline" data-dcnode-id="4015" id="152373"><span data-dcnode-id="4016" instrument_node="">Trump-Putin Summit in Helsinki</span></div><span data-dcnode-id="4014" instrument_node="">
</span></div><span data-dcnode-id="4012" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="4002"><span data-dcnode-id="4011" instrument_node="">
</span><div class="content-text" data-dcnode-id="4004" id="152373"><p data-dcnode-id="4006"><span data-dcnode-id="4010" instrument_node="">Trump and Putin meet in Helsinki for a two-hour meeting behind closed doors, accompanied only by two interpreters. Though the leaders claim to discuss the Syrian civil war, the&nbsp;</span><a data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/uncertain-future-inf-treaty"><span data-dcnode-id="4009" instrument_node="">Intermediate-Range Nuclear Forces Treaty</span></a><span data-dcnode-id="4007" instrument_node="">, and Russia’s encroachment on Ukraine, the substance of their discussion remains largely unknown. The meeting culminates in a press conference during which Trump casts doubt on U.S. intelligence agencies’ conclusion that Russia meddled in the 2016 presidential election.</span></p><span data-dcnode-id="4005" instrument_node="">
</span></div><span data-dcnode-id="4003" instrument_node="">

</span><div class="content-headline" data-dcnode-id="3878" id="152374"><span data-dcnode-id="3879" instrument_node="">A New NAFTA</span></div><span data-dcnode-id="3877" instrument_node="">

</span><div class="content content-bottom" data-dcnode-id="3868"><span data-dcnode-id="3874" instrument_node="">
</span><div class="content-text" data-dcnode-id="3870" id="152374"><p data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">The United States, Canada, and Mexico settle on a number of changes to NAFTA, renaming it the United States-Mexico-Canada Agreement. The trade deal contains new labor stipulations, stronger protections for U.S. intellectual property, and higher standards for the auto industry, including rules of origin and minimum wage hikes that benefit American manufacturers.</span></p><span data-dcnode-id="3871" instrument_node="">

</span><div class="content-text" data-dcnode-id="3733" id="152375"><p data-dcnode-id="3735"><span data-dcnode-id="3739" instrument_node="">In early October, Jamal Khashoggi, a dissident Saudi journalist and </span><em data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Washington Post </span></em><span data-dcnode-id="3736" instrument_node="">columnist, is assassinated inside the Saudi consulate in Istanbul. As evidence incriminating Crown Prince Mohammed bin Salman mounts, Trump expresses support for the Saudi leadership, touting Saudi Arabia as a major U.S. regional partner, oil supplier, and purchaser of U.S. arms. The decision draws backlash from U.S. allies and Congress.</span></p><span data-dcnode-id="3734" instrument_node="">

</span><div class="content-headline" data-dcnode-id="3607" id="240197"><span data-dcnode-id="3608" instrument_node="">U.S. Troops to Leave Syria and Afghanistan</span></div><span data-dcnode-id="3606" instrument_node="">
</span></div><span data-dcnode-id="3604" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="3591"><span data-dcnode-id="3603" instrument_node="">
</span><div class="content-text" data-dcnode-id="3593" id="240197"><p data-dcnode-id="3595"><span data-dcnode-id="3602" instrument_node="">Trump announces the United States&nbsp;</span><a data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/us-news/2018/dec/19/us-troops-syria-withdrawal-trump"><span data-dcnode-id="3601" instrument_node="">will withdraw</span></a><span data-dcnode-id="3599" instrument_node="">&nbsp;all of its more than two thousand troops from Syria, though he doesn’t specify a timeline. He asks the Pentagon to come up with a plan to withdraw half of those serving in Afghanistan as well. Many Democrats and Republicans in Congress call the decision precipitous, and Mattis&nbsp;</span><a data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/world/national-security/trump-announces-mattis-will-leave-as-defense-secretary-at-the-end-of-february/2018/12/20/e1a846ee-e147-11e8-ab2c-b31dcd53ca6b_story.html"><span data-dcnode-id="3598" instrument_node="">offers his resignation</span></a><span data-dcnode-id="3596" instrument_node="">&nbsp;the next day, saying the president deserves a secretary “better aligned” with his views.</span></p><span data-dcnode-id="3594" instrument_node="">
</span></div><span data-dcnode-id="3592" instrument_node="">

</span><time class="content-dates" data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">January 23, 2019</span></time><span data-dcnode-id="3469" instrument_node="">
</span><div class="content-headline" data-dcnode-id="3467" id="240199"><span data-dcnode-id="3468" instrument_node="">Picking Sides in Venezuela</span></div><span data-dcnode-id="3466" instrument_node="">
</span></div><span data-dcnode-id="3464" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="3448"><span data-dcnode-id="3463" instrument_node="">
</span><div class="content-text" data-dcnode-id="3450" id="240199"><p data-dcnode-id="3452"><span data-dcnode-id="3462" instrument_node="">The White House recognizes Venezuelan opposition leader Juan Guaido as the </span><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2019/01/23/politics/trump-juan-guaido-venezuela/index.html"><span data-dcnode-id="3461" instrument_node="">nation’s interim president</span></a><span data-dcnode-id="3459" instrument_node="">, joining more than fifty other countries that consider the 2018 reelection of Nicolas Maduro illegitimate. As Venezuela </span><a data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/venezuela-crisis"><span data-dcnode-id="3458" instrument_node="">continues to struggle</span></a><span data-dcnode-id="3456" instrument_node=""> with hyperinflation, shortages of basic goods, and a </span><a data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/venezuelan-exodus"><span data-dcnode-id="3455" instrument_node="">refugee crisis</span></a><span data-dcnode-id="3453" instrument_node="">, Washington’s attempts to send humanitarian aid are blocked at the border. Trump refuses to rule out military action against Maduro and later imposes sanctions.</span></p><span data-dcnode-id="3451" instrument_node="">
</span></div><span data-dcnode-id="3449" instrument_node="">

</span><div class="content content-bottom" data-dcnode-id="3308"><span data-dcnode-id="3320" instrument_node="">
</span><div class="content-text" data-dcnode-id="3310" id="240200"><p data-dcnode-id="3312"><span data-dcnode-id="3319" instrument_node="">A fight with Congress over Trump’s demand for $5.7 billion for a wall along the southern U.S. border ends after a </span><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2019/01/government-shutdown-timeline-190121191642933.html"><span data-dcnode-id="3318" instrument_node="">thirty-five-day shutdown</span></a><span data-dcnode-id="3316" instrument_node=""> of the federal government, the longest ever. When Congress rejects the funding request, the president declares a national emergency in February, allowing him to divert funding from other sources, including the military. Trump issues </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/story/2019/03/15/trump-veto-national-emergency-1223285"><span data-dcnode-id="3315" instrument_node="">his first veto</span></a><span data-dcnode-id="3313" instrument_node=""> to block a congressional resolution that would have prevented the move.</span></p><span data-dcnode-id="3311" instrument_node="">

</span></div><span data-dcnode-id="3181" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="3165"><span data-dcnode-id="3180" instrument_node="">
</span><div class="content-text" data-dcnode-id="3167" id="240201"><p data-dcnode-id="3169"><span data-dcnode-id="3179" instrument_node="">As trade talks break down, the United States raises tariffs on </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/timeline/us-relations-china%23e200366"><span data-dcnode-id="3178" instrument_node="">$200 billion worth</span></a><span data-dcnode-id="3176" instrument_node=""> of Chinese goods from 10 to 25 percent, leading China to retaliate in kind. In the following months, the Trump administration </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//markets.businessinsider.com/news/stocks/trump-us-china-trade-war-timeline-of-everything-thats-happened-2019-8-1028474486%235"><span data-dcnode-id="3175" instrument_node="">also imposes</span></a><span data-dcnode-id="3173" instrument_node=""> new restrictions on Chinese telecom firms, labels China a currency manipulator, and </span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/can-presidents-block-investment-china"><span data-dcnode-id="3172" instrument_node="">threatens to halt</span></a><span data-dcnode-id="3170" instrument_node=""> all private U.S. investment in China. Trump’s plan to raise tariffs on an additional $300 billion worth of Chinese goods is, however, put on hold.</span></p><span data-dcnode-id="3168" instrument_node="">

</span><div class="content-headline" data-dcnode-id="3041" id="240222"><span data-dcnode-id="3042" instrument_node="">Trump Walks Back Iran Strike </span></div><span data-dcnode-id="3040" instrument_node="">
</span></div><span data-dcnode-id="3038" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="3025"><span data-dcnode-id="3037" instrument_node="">
</span><div class="content-text" data-dcnode-id="3027" id="240222"><p data-dcnode-id="3029"><span data-dcnode-id="3036" instrument_node="">In the wake of an Iranian downing of a U.S. drone, Trump </span><a data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/06/20/world/middleeast/iran-us-drone.html%3Fmodule%3Dinline"><span data-dcnode-id="3035" instrument_node="">authorizes military action</span></a><span data-dcnode-id="3033" instrument_node=""> on Iranian targets, but calls off the operation at the last moment. The incident comes after months of rising tensions, including increased U.S. sanctions on Iran for violating the terms of a 2015 nuclear deal and Iranian threats to </span><a data-dcnode-id="3031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/strait-hormuz-us-iran-maritime-flash-point"><span data-dcnode-id="3032" instrument_node="">shut down the Strait of Hormuz</span></a><span data-dcnode-id="3030" instrument_node="">, a crucial global shipping lane.</span></p><span data-dcnode-id="3028" instrument_node="">
</span></div><span data-dcnode-id="3026" instrument_node="">

</span><div class="content content-bottom" data-dcnode-id="2885"><span data-dcnode-id="2897" instrument_node="">
</span><div class="content-text" data-dcnode-id="2887" id="240223"><p data-dcnode-id="2889"><span data-dcnode-id="2896" instrument_node="">Trump becomes the first sitting U.S. president </span><a data-dcnode-id="2894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2019/06/29/politics/kim-jong-un-donald-trump-dmz-north-korea/index.html"><span data-dcnode-id="2895" instrument_node="">to set foot in North Korea</span></a><span data-dcnode-id="2893" instrument_node="">, crossing the Demilitarized Zone for a brief meeting with Kim. Coming months after a </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apnews.com/b8ce3d0483d84348ba3d952e1300f4e1"><span data-dcnode-id="2892" instrument_node="">February summit</span></a><span data-dcnode-id="2890" instrument_node=""> in Vietnam collapsed almost as soon as it began, neither side offers concrete concessions and North Korea soon resumes missile tests.</span></p><span data-dcnode-id="2888" instrument_node="">

</span><div class="content-headline" data-dcnode-id="2761" id="240224"><span data-dcnode-id="2762" instrument_node="">Changing the Asylum Rules</span></div><span data-dcnode-id="2760" instrument_node="">
</span></div><span data-dcnode-id="2758" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="2739"><span data-dcnode-id="2757" instrument_node="">
</span><div class="content-text" data-dcnode-id="2741" id="240224"><p data-dcnode-id="2743"><span data-dcnode-id="2756" instrument_node="">Trump announces a “</span><a data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/can-safe-third-country-agreements-resolve-asylum-crisis"><span data-dcnode-id="2755" instrument_node="">safe third country</span></a><span data-dcnode-id="2753" instrument_node="">” agreement with Guatemala that would require asylum seekers to remain there, rather than wait in the United States while their claims are processed, or face deportation. The deal is challenged in Guatemalan court, but </span><a data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/2019/9/26/20870768/trump-agreement-honduras-guatemala-el-salvador-explained"><span data-dcnode-id="2752" instrument_node="">similar arrangements</span></a><span data-dcnode-id="2750" instrument_node=""> with El Salvador and Honduras are soon announced. The moves come after Trump issues new rules that asylum seekers in Mexico </span><a data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhs.gov/news/2019/01/24/migrant-protection-protocols"><span data-dcnode-id="2749" instrument_node="">must remain there</span></a><span data-dcnode-id="2747" instrument_node=""> and uses the threat of tariffs to </span><a data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2019/07/13/740009105/how-mexico-beefs-up-immigration-enforcement-to-meet-trumps-terms"><span data-dcnode-id="2746" instrument_node="">pressure Mexico</span></a><span data-dcnode-id="2744" instrument_node=""> to step up its own border security efforts.</span></p><span data-dcnode-id="2742" instrument_node="">
</span></div><span data-dcnode-id="2740" instrument_node="">

</span></div><span data-dcnode-id="2612" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="2596"><span data-dcnode-id="2611" instrument_node="">
</span><div class="content-text" data-dcnode-id="2598" id="240225"><p data-dcnode-id="2600"><span data-dcnode-id="2610" instrument_node="">Trump </span><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2019/sep/09/taliban-trump-afghanistan-us-talks-election-violence"><span data-dcnode-id="2609" instrument_node="">declares an end</span></a><span data-dcnode-id="2607" instrument_node=""> to Afghan peace talks, calling off a planned meeting of warring parties, including Taliban representatives, at Camp David. A preliminary agreement had reportedly </span><a data-dcnode-id="2605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/can-us-taliban-peace-talks-end-war-afghanistan"><span data-dcnode-id="2606" instrument_node="">revolved around a pledge</span></a><span data-dcnode-id="2604" instrument_node=""> by the Taliban to keep terrorists out of Afghanistan in exchange for a cease-fire and full withdrawal of Western military forces. In October, the Pentagon says two thousand U.S. troops have already </span><a data-dcnode-id="2602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.militarytimes.com/news/your-military/2019/10/21/us-has-already-pulled-2000-troops-from-afghanistan-gen-austin-miller-says/"><span data-dcnode-id="2603" instrument_node="">been withdrawn</span></a><span data-dcnode-id="2601" instrument_node="">, leaving some twelve thousand remaining.</span></p><span data-dcnode-id="2599" instrument_node="">
</span></div><span data-dcnode-id="2597" instrument_node="">

</span><time class="content-dates" data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">October 6, 2019</span></time><span data-dcnode-id="2334" instrument_node="">
</span><div class="content-headline" data-dcnode-id="2332" id="240227"><span data-dcnode-id="2333" instrument_node="">Withdrawal From Northern Syria</span></div><span data-dcnode-id="2331" instrument_node="">
</span></div><span data-dcnode-id="2329" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="2313"><span data-dcnode-id="2328" instrument_node="">
</span><div class="content-text" data-dcnode-id="2315" id="240227"><p data-dcnode-id="2317"><span data-dcnode-id="2327" instrument_node="">In the&nbsp;</span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/politics/national-security/chaos-syria-washington-after-trump-call-erdogan-unleashed-turkish-military-n1063516"><span data-dcnode-id="2326" instrument_node="">wake of a call</span></a><span data-dcnode-id="2324" instrument_node="">&nbsp;with Turkish President Recep Tayyip Erdogan, Trump abruptly decides to withdraw all remaining U.S. troops from Kurdish-controlled northern Syria. Two days later, Turkish troops&nbsp;</span><a data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/10/09/world/middleeast/turkey-attacks-syria.html%3Fmodule%3Dinline"><span data-dcnode-id="2323" instrument_node="">invade Syria</span></a><span data-dcnode-id="2321" instrument_node="">&nbsp;to combat Kurdish groups, which Ankara labels terrorists, and the Kurds seek protection from Assad’s regime and his Russian allies. The Trump administration responds with sanctions on Turkey, a NATO ally, leading to&nbsp;</span><a data-dcnode-id="2319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/10/23/us/politics/trump-syria-turkey-ceasefire.html%3Faction%3Dclick%26module%3DTop%2520Stories%26pgtype%3DHomepage"><span data-dcnode-id="2320" instrument_node="">talks for a permanent cease-fire</span></a><span data-dcnode-id="2318" instrument_node="">. The deal allows the Syrian Kurds to evacuate and divides control of the territory along the Syria-Turkey border among Turkish, Russian, and Syrian government forces.</span></p><span data-dcnode-id="2316" instrument_node="">
</span></div><span data-dcnode-id="2314" instrument_node="">
</span></div><span data-dcnode-id="2312" instrument_node="">

</span><div class="content-headline" data-dcnode-id="2189" id="240228"><span data-dcnode-id="2190" instrument_node="">Additional Support for Saudi Arabia</span></div><span data-dcnode-id="2188" instrument_node="">
</span></div><span data-dcnode-id="2186" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="2170"><span data-dcnode-id="2185" instrument_node="">
</span><div class="content-text" data-dcnode-id="2172" id="240228"><p data-dcnode-id="2174"><span data-dcnode-id="2184" instrument_node="">In the wake of a September attack on Saudi oil facilities that </span><a data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2019/09/18/761985624/saudi-arabia-says-iran-unquestionably-sponsored-attack-on-oil-facilities"><span data-dcnode-id="2183" instrument_node="">Riyadh blames on Iran</span></a><span data-dcnode-id="2181" instrument_node="">, Trump reinforces the kingdom with three thousand U.S. troops as well as fighter jets and missile technology. The show of support comes several months after bipartisan efforts in Congress to end Washington’s backing of Saudi Arabia’s war in Yemen forced Trump to veto bills that </span><a data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/04/16/us/politics/trump-veto-yemen.html"><span data-dcnode-id="2180" instrument_node="">would have ended</span></a><span data-dcnode-id="2178" instrument_node=""> U.S. involvement in the war and </span><a data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2019/07/24/politics/saudi-arms-sale-resolutions-trump-veto/index.html"><span data-dcnode-id="2177" instrument_node="">blocked U.S. arms sales</span></a><span data-dcnode-id="2175" instrument_node=""> to Riyadh.</span></p><span data-dcnode-id="2173" instrument_node="">
</span></div><span data-dcnode-id="2171" instrument_node="">
</span></div><span data-dcnode-id="2169" instrument_node="">

</span><div class="content-text" data-dcnode-id="2032" id="240229"><p data-dcnode-id="2034"><span data-dcnode-id="2041" instrument_node="">Trump announces that the leader of the self-proclaimed Islamic State, Abu Bakr al-Baghdadi, </span><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/10/27/us/politics/isis-leader-al-baghdadi-dead.html%3Fmodule%3Dinline"><span data-dcnode-id="2040" instrument_node="">has been killed</span></a><span data-dcnode-id="2038" instrument_node=""> by U.S. forces. His immediate successor is also killed in a separate raid. Baghdadi, who once controlled thousands of square miles of territory across the Middle East, was in hiding in northern Syria, eight months after the Islamic State </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/u-s-backed-force-says-islamic-states-caliphate-destroyed-in-syria-11553322489"><span data-dcnode-id="2037" instrument_node="">lost the last remnant</span></a><span data-dcnode-id="2035" instrument_node=""> of its caliphate in Syria.</span></p><span data-dcnode-id="2033" instrument_node="">
</span></div><span data-dcnode-id="2031" instrument_node="">

</span><div class="content-headline" data-dcnode-id="1906" id="256771"><span data-dcnode-id="1907" instrument_node="">Drone Strike on Soleimani</span></div><span data-dcnode-id="1905" instrument_node="">
</span></div><span data-dcnode-id="1903" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="1890"><span data-dcnode-id="1902" instrument_node="">
</span><div class="content-text" data-dcnode-id="1892" id="256771"><p data-dcnode-id="1894"><span data-dcnode-id="1901" instrument_node="">A U.S. drone strike kills Qasem Soleimani, commander of the Iranian Islamic Revolutionary Guard Corps’ elite Quds Force, in Baghdad. The Pentagon links Soleimani to </span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/12/31/world/middleeast/baghdad-protesters-us-embassy.html"><span data-dcnode-id="1900" instrument_node="">violent demonstrations at the U.S. embassy</span></a><span data-dcnode-id="1898" instrument_node=""> in Baghdad, as well as the deaths of hundreds of American and allied troops in the region. Though Trump says he ordered the strike “</span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehill.com/homenews/administration/476700-trump-says-iranian-commander-was-killed-to-stop-a-war"><span data-dcnode-id="1897" instrument_node="">to stop a war</span></a><span data-dcnode-id="1895" instrument_node="">,” Soleimani’s killing raises fears of further escalation. Tehran retaliates by firing missiles at two Iraqi bases hosting U.S. soldiers, prompting Washington to impose new sanctions on Iran.</span></p><span data-dcnode-id="1893" instrument_node="">
</span></div><span data-dcnode-id="1891" instrument_node="">

</span><div class="content-headline" data-dcnode-id="1766" id="256772"><span data-dcnode-id="1767" instrument_node="">A New Mideast Peace Plan</span></div><span data-dcnode-id="1765" instrument_node="">
</span></div><span data-dcnode-id="1763" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="1747"><span data-dcnode-id="1762" instrument_node="">
</span><div class="content-text" data-dcnode-id="1749" id="256772"><p data-dcnode-id="1751"><span data-dcnode-id="1761" instrument_node="">In a joint White House appearance, Trump and Israeli Prime Minister Benjamin Netanyahu announce a new plan to end decades of Israeli-Palestinian conflict. Analysts say the deal, developed without Palestinian input, </span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/01/29/world/middleeast/trump-peace-plan-explained.html"><span data-dcnode-id="1760" instrument_node="">favors Israel</span></a><span data-dcnode-id="1758" instrument_node=""> by awarding it large portions of the West Bank and Jerusalem, and by weakening long-standing U.S. support for a fully autonomous Palestinian state. Palestinian leaders roundly reject the proposal, which is </span><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2020/02/arab-league-holds-emergency-meeting-trump-plan-200201105251740.html"><span data-dcnode-id="1757" instrument_node="">opposed by most Arab states</span></a><span data-dcnode-id="1755" instrument_node=""> and </span><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dw.com/en/germany-europe-react-to-trumps-middle-east-peace-plan/a-52182434"><span data-dcnode-id="1754" instrument_node="">received ambivalently</span></a><span data-dcnode-id="1752" instrument_node=""> by European countries.</span></p><span data-dcnode-id="1750" instrument_node="">
</span></div><span data-dcnode-id="1748" instrument_node="">
</span></div><span data-dcnode-id="1746" instrument_node="">
</span></section><span data-dcnode-id="1744" instrument_node="">

</span><div class="content-headline" data-dcnode-id="1620" id="276313"><span data-dcnode-id="1621" instrument_node="">Trump’s Acquittal</span></div><span data-dcnode-id="1619" instrument_node="">
</span></div><span data-dcnode-id="1617" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="1604"><span data-dcnode-id="1616" instrument_node="">
</span><div class="content-text" data-dcnode-id="1606" id="276313"><p data-dcnode-id="1608"><span data-dcnode-id="1615" instrument_node="">In a 52–48 vote, the U.S. Senate </span><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/02/05/us/politics/trump-acquitted-impeachment.html"><span data-dcnode-id="1614" instrument_node="">acquits Trump</span></a><span data-dcnode-id="1612" instrument_node=""> of a charge of abuse of power centered on allegations he pressured the Ukrainian government to investigate his political opponents. The Senate also finds him not guilty of obstructing the congressional investigation into the matter. The vote comes less than a month after the House of Representatives impeached Trump, the third presidential impeachment in the nation’s history. While </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2020/05/22/volodymyr-zelensky-ukraine-president-one-year-impeachment-anniversary/"><span data-dcnode-id="1611" instrument_node="">U.S. military aid</span></a><span data-dcnode-id="1609" instrument_node=""> for Ukraine continues, many Ukrainians worry that the impeachment weakens bilateral ties as a Russia-backed insurgency in eastern Ukraine persists.</span></p><span data-dcnode-id="1607" instrument_node="">
</span></div><span data-dcnode-id="1605" instrument_node="">

</span></div><span data-dcnode-id="1477" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="1464"><span data-dcnode-id="1476" instrument_node="">
</span><div class="content-text" data-dcnode-id="1466" id="276314"><p data-dcnode-id="1468"><span data-dcnode-id="1475" instrument_node="">U.S. and Taliban officials </span><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/us-taliban-peace-deal-agreement-afghanistan-war"><span data-dcnode-id="1474" instrument_node="">ink a deal</span></a><span data-dcnode-id="1472" instrument_node=""> to begin reducing hostilities, heralded as a major step in the long-drawn-out effort to end Afghanistan’s eighteen-year war. In exchange for a withdrawal of U.S. troops within fourteen months, the Taliban agrees to open talks with the Afghan government and prevent terrorist groups from using Afghanistan to attack the United States or its allies. The agreement also calls for a permanent cease-fire to be worked out during intra-Afghan negotiations. Some experts see the deal as one-sided and question whether the Taliban will follow through on its </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/blog/order-from-chaos/2020/03/05/the-us-taliban-peace-deal-a-road-to-nowhere/"><span data-dcnode-id="1471" instrument_node="">ill-defined commitments</span></a><span data-dcnode-id="1469" instrument_node="">.</span></p><span data-dcnode-id="1467" instrument_node="">

</span><div class="content-headline" data-dcnode-id="1340" id="276315"><span data-dcnode-id="1341" instrument_node="">National Emergency Over Coronavirus</span></div><span data-dcnode-id="1339" instrument_node="">
</span></div><span data-dcnode-id="1337" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="1324"><span data-dcnode-id="1336" instrument_node="">
</span><div class="content-text" data-dcnode-id="1326" id="276315"><p data-dcnode-id="1328"><span data-dcnode-id="1335" instrument_node="">After initially downplaying the risk of a new coronavirus disease, COVID-19, Trump declares a </span><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lawfareblog.com/whats-trumps-national-emergency-announcement-covid-19"><span data-dcnode-id="1334" instrument_node="">national emergency</span></a><span data-dcnode-id="1332" instrument_node=""> as cases balloon. The move unlocks roughly $50 billion in federal funding and allows the loosening of some regulations on health-care providers. Trump also announces new efforts to boost coronavirus testing, after what many see as an anemic </span><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/article/us-trump-coronavirus-response-covid19-agencies-in-charge"><span data-dcnode-id="1331" instrument_node="">federal response</span></a><span data-dcnode-id="1329" instrument_node="">, and later signs more than $2 trillion in economic stimulus legislation. Trump increasingly blames China, where the virus originated, for misleading the world and threatens retaliation.</span></p><span data-dcnode-id="1327" instrument_node="">
</span></div><span data-dcnode-id="1325" instrument_node="">

</span><div class="content-headline" data-dcnode-id="1200" id="299331"><span data-dcnode-id="1201" instrument_node="">COVID-19’s Diplomatic Fallout</span></div><span data-dcnode-id="1199" instrument_node="">
</span></div><span data-dcnode-id="1197" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="1184"><span data-dcnode-id="1196" instrument_node="">
</span><div class="content-text" data-dcnode-id="1186" id="299331"><p data-dcnode-id="1188"><span data-dcnode-id="1195" instrument_node="">The coronavirus pandemic disrupts U.S. diplomacy, including by causing the postponement of the G7 summit, which the United States was set to host. U.S. programs such as the Peace Corps are forced to </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peacecorps.gov/news/library/peace-corps-announces-suspension-volunteer-activities-evacuations-due-covid-19/"><span data-dcnode-id="1194" instrument_node="">halt global operations</span></a><span data-dcnode-id="1192" instrument_node="">. Geopolitical competition, including U.S.-China tensions, hamstrings a multilateral coronavirus response, experts say. At the UN General Assembly annual debate, held virtually for the first time, due to the coronavirus, </span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefings-statements/remarks-president-trump-75th-session-united-nations-general-assembly/"><span data-dcnode-id="1191" instrument_node="">Trump again blames China</span></a><span data-dcnode-id="1189" instrument_node=""> for the pandemic and accuses it of environmental pollution and trade abuses.</span></p><span data-dcnode-id="1187" instrument_node="">
</span></div><span data-dcnode-id="1185" instrument_node="">

</span><time class="content-dates" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">July 6, 2020</span></time><span data-dcnode-id="1062" instrument_node="">
</span><div class="content-headline" data-dcnode-id="1060" id="299332"><span data-dcnode-id="1061" instrument_node="">WHO Withdrawal Notice</span></div><span data-dcnode-id="1059" instrument_node="">
</span></div><span data-dcnode-id="1057" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="1041"><span data-dcnode-id="1056" instrument_node="">
</span><div class="content-text" data-dcnode-id="1043" id="299332"><p data-dcnode-id="1045"><span data-dcnode-id="1055" instrument_node="">The Trump administration formally notifies the United Nations that the United States </span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/sg/en/content/sg/note-correspondents/2020-07-07/note-correspondents-answer-questions-regarding-the-world-health-organization"><span data-dcnode-id="1054" instrument_node="">will cut ties</span></a><span data-dcnode-id="1052" instrument_node=""> with the World Health Organization (WHO), which it helped found, effective July 2021. Trump previously accused the UN agency of misleading the world about the threat of COVID-19 under pressure from China; he </span><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefings-statements/remarks-president-trump-actions-china/"><span data-dcnode-id="1051" instrument_node="">had also announced</span></a><span data-dcnode-id="1049" instrument_node=""> the redirection of U.S. funding, the WHO’s largest source of financial support. In September, the United States </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/sections/coronavirus-live-updates/2020/09/02/908711419/u-s-wont-join-who-led-coronavirus-vaccine-effort-white-house-says"><span data-dcnode-id="1048" instrument_node="">refuses to join</span></a><span data-dcnode-id="1046" instrument_node=""> a WHO-led global initiative, known as the COVID-19 Vaccine Global Access Facility (COVAX Facility), to develop, manufacture, and distribute a COVID-19 vaccine.</span></p><span data-dcnode-id="1044" instrument_node="">
</span></div><span data-dcnode-id="1042" instrument_node="">
</span></div><span data-dcnode-id="1040" instrument_node="">
</span></section><span data-dcnode-id="1038" instrument_node="">

</span><div class="content-headline" data-dcnode-id="917" id="299333"><span data-dcnode-id="918" instrument_node="">Drawdown of Troops in Germany</span></div><span data-dcnode-id="916" instrument_node="">
</span></div><span data-dcnode-id="914" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="901"><span data-dcnode-id="913" instrument_node="">
</span><div class="content-text" data-dcnode-id="903" id="299333"><p data-dcnode-id="905"><span data-dcnode-id="912" instrument_node="">Defense Secretary Mark T. Esper says the United States plans to withdraw nearly twelve thousand troops stationed in Germany—about one-third of the total U.S. force there—and the head of U.S. European Command announces that force’s headquarters will be relocated from Stuttgart to Mons, Belgium. Esper </span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.defense.gov/Newsroom/Transcripts/Transcript/Article/2292996/department-of-defense-senior-leaders-brief-reporters-on-european-force-posture/"><span data-dcnode-id="911" instrument_node="">says the moves</span></a><span data-dcnode-id="909" instrument_node=""> will strengthen NATO, enhance efforts to deter Russia, and boost strategic flexibility; Trump says it is a response to </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/how-us-military-pivoting-europe"><span data-dcnode-id="908" instrument_node="">Germany not upholding</span></a><span data-dcnode-id="906" instrument_node=""> its financial commitments to NATO.&nbsp;</span></p><span data-dcnode-id="904" instrument_node="">
</span></div><span data-dcnode-id="902" instrument_node="">
</span></div><span data-dcnode-id="900" instrument_node="">

</span><div class="content-headline" data-dcnode-id="777" id="299334"><span data-dcnode-id="778" instrument_node="">Arab-Israeli Normalization Deals</span></div><span data-dcnode-id="776" instrument_node="">
</span></div><span data-dcnode-id="774" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="761"><span data-dcnode-id="773" instrument_node="">
</span><div class="content-text" data-dcnode-id="763" id="299334"><p data-dcnode-id="765"><span data-dcnode-id="772" instrument_node="">In a September ceremony at the White House, Israeli Prime Minister Benjamin Netanyahu signs U.S.-brokered agreements to normalize relations with Bahrain and the United Arab Emirates. Trump heralds the event as the “dawn of a new Middle East.” Experts say the deals </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/whats-behind-new-israel-uae-peace-deal"><span data-dcnode-id="771" instrument_node="">further unite</span></a><span data-dcnode-id="769" instrument_node=""> Israel and Arab Gulf states against Iran, while Palestinian leaders decry them as a betrayal. In the following months, Trump announces that Sudan and Morocco will also begin rapprochements with Israel. In exchange, the United States grants Sudan financial assistance and delists it as a state sponsor of terrorism. It also </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/what-moroccos-agreement-israel-means-wider-middle-east"><span data-dcnode-id="768" instrument_node="">recognizes Morocco’s claim</span></a><span data-dcnode-id="766" instrument_node=""> to the disputed region of Western Sahara.</span></p><span data-dcnode-id="764" instrument_node="">

</span><div class="content-headline" data-dcnode-id="637" id="299335"><span data-dcnode-id="638" instrument_node="">Refugee Cap Reaches Record Low</span></div><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="634" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="618"><span data-dcnode-id="633" instrument_node="">
</span><div class="content-text" data-dcnode-id="620" id="299335"><p data-dcnode-id="622"><span data-dcnode-id="632" instrument_node="">The State Department announces a plan to slash refugee admissions to a maximum of fifteen thousand people in the 2021 fiscal year, the lowest level in the </span><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/us-news/2020/oct/01/trump-refugee-admissions-immigration"><span data-dcnode-id="631" instrument_node="">four-decade history</span></a><span data-dcnode-id="629" instrument_node=""> of modern U.S. refugee resettlement. It cites prioritizing </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/transmission-of-the-presidents-report-to-congress-on-the-proposed-refugee-admissions-for-fiscal-year-2021/"><span data-dcnode-id="628" instrument_node="">Americans’ safety and well-being</span></a><span data-dcnode-id="626" instrument_node=""> amid the pandemic, among other factors, as a reason for the move. Trump’s response to the novel coronavirus reinforces his </span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/us-immigration-debate-0"><span data-dcnode-id="625" instrument_node="">restrictive immigration policy</span></a><span data-dcnode-id="623" instrument_node="">. Since March, the administration has temporarily halted refugee resettlement, effectively shuttered the asylum system, and blocked many foreign worker visas and green cards.</span></p><span data-dcnode-id="621" instrument_node="">
</span></div><span data-dcnode-id="619" instrument_node="">

</span><time class="content-dates" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">November 9, 2020</span></time><span data-dcnode-id="496" instrument_node="">
</span><div class="content-headline" data-dcnode-id="494" id="321867"><span data-dcnode-id="495" instrument_node="">Defense Department Shake-Up</span></div><span data-dcnode-id="493" instrument_node="">
</span></div><span data-dcnode-id="491" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="481"><span data-dcnode-id="490" instrument_node="">
</span><div class="content-text" data-dcnode-id="483" id="321867"><p data-dcnode-id="485"><span data-dcnode-id="489" instrument_node="">Days after losing reelection to Biden, Trump announces Esper’s termination as defense secretary on Twitter. Several other top Pentagon officials resign following Esper’s removal and are replaced by perceived White House loyalists. The reshuffle </span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/us-news/2020/nov/11/downright-dangerous-democrat-alarm-as-trump-stacks-pentagon-with-loyalists"><span data-dcnode-id="488" instrument_node="">raises alarm among Democrats</span></a><span data-dcnode-id="486" instrument_node=""> about security risks amid a presidential transition. Christopher C. Miller, director of the National Counterterrorism Center, is named acting defense secretary. Meanwhile, Trump’s refusal to recognize Biden’s victory stymies information sharing and other coordination on national security issues with the Biden transition team.&nbsp;</span></p><span data-dcnode-id="484" instrument_node="">
</span></div><span data-dcnode-id="482" instrument_node="">

</span><div class="content-headline" data-dcnode-id="357" id="321868"><span data-dcnode-id="358" instrument_node="">Open Skies Withdrawal</span></div><span data-dcnode-id="356" instrument_node="">
</span></div><span data-dcnode-id="354" instrument_node="">
</span><div class="content content-bottom" data-dcnode-id="344"><span data-dcnode-id="353" instrument_node="">
</span><div class="content-text" data-dcnode-id="346" id="321868"><p data-dcnode-id="348"><span data-dcnode-id="352" instrument_node="">The United States formally exits the Treaty on Open Skies, which experts see as a setback to international arms control efforts. The withdrawal, which faced domestic and international opposition, comes six months after Pompeo </span><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/open-skies-another-dying-arms-control-agreement"><span data-dcnode-id="351" instrument_node="">announced it</span></a><span data-dcnode-id="349" instrument_node="">, citing Russian noncompliance. In force since 2002, the treaty allows member countries to surveil each other’s military installations and activities on short notice via flyovers by unarmed aircraft. Signatories also share the information they gather with other states party to the deal. Weeks after the U.S. exit, Russia announces it will also withdraw from the treaty.</span></p><span data-dcnode-id="347" instrument_node="">

</span><div class="content-text" data-dcnode-id="209" id="321869"><p data-dcnode-id="211"><span data-dcnode-id="215" instrument_node="">A pro-Trump mob, </span><a data-dcnode-id="213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/1/11/full-transcript-donald-trump-january-6-incendiary-speech"><span data-dcnode-id="214" instrument_node="">egged on</span></a><span data-dcnode-id="212" instrument_node=""> by the president, storms the Capitol Building and disrupts legislators meeting to certify President-Elect Biden’s victory. The breach of the Capitol leaves five people dead and forces lawmakers to take cover for hours. While continuing to claim electoral victory, Trump calls his pre-insurrection remarks “totally appropriate,” and he criticizes efforts to impeach him a second time as a “continuation of the greatest witch hunt in the history of politics.” Many world leaders condemn the uprising as an attack on democracy, affirm their support for Biden’s presidency, and urge an orderly transition of power. Some governments also point to the insurrection as evidence of hypocrisy in the United States’ portrayal of itself as a standard-bearer for democracy.</span></p><span data-dcnode-id="210" instrument_node="">
