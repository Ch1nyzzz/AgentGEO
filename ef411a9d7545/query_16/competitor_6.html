conExternalLink-gugldc ejGhix social-icons__link social-icons__link--print" data-dcnode-id="592" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;#&quot;}" href="#" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="593"><svg class="icon icon-print" data-dcnode-id="594" fill="none" height="16" viewBox="0 0 17 16" width="17" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="598">Print</title><rect class="background" data-dcnode-id="597" fill="black" height="5" stroke="white" width="8" x="4.5" y="0.5"></rect><rect data-dcnode-id="596" fill="white" height="9" width="17" y="4"></rect><rect class="background" data-dcnode-id="595" fill="black" height="5" stroke="white" width="8" x="4.5" y="10.5"></rect></svg></div></a></li><li class="SocialIconsListItem-hYmGVl fTRdpd social-icons__list-item social-icons__list-item--bookmark social-icons__list-item--circular thinner" data-dcnode-id="583" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;BookmarkIcon&quot;}" data-in-view="{&quot;pattern&quot;:&quot;BookmarkIcon&quot;}" data-include-experiments="true"><a aria-label="Save story. Press Enter to save this story for later. Press Escape to dismiss tooltip." class="external-link SocialIconExternalLink-gugldc rgIHQ social-icons__link social-icons__link--bookmark" data-dcnode-id="584" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;#&quot;}" href="#" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="585"><svg class="icon icon-bookmark" data-dcnode-id="586" fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="589">Save Story</title><path class="icon-bookmark-fill" d="M20 23.9508L12.5 19.7312L5 23.9508V2.95081H14V3.93211H6V22.1845L12.5 18.5536L19 22.1845V8.83866H20V23.9508Z" data-dcnode-id="588" fill="black"></path><path class="icon-bookmark-stroke" d="M23 3H20V0H19V3H16V4H19V7H20V4H23V3Z" data-dcnode-id="587" fill="black"></path></svg></div></a></li><div class="AlertWrapper-dYgLvk eckTvm" data-dcnode-id="578" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;Alert&quot;}" data-in-view="{&quot;pattern&quot;:&quot;Alert&quot;}" data-include-experiments="true" role="tooltip"><div aria-hidden="true" class="AlertArrow-dBbxeu lczlv alert-arrow" data-dcnode-id="582" role="presentation"></div><div class="BaseWrap-sc-TURhJ BaseText-fFzBQt AlertMessage-kUrqmw dvHCmL iUpuJk bRWbOB alert-message" data-dcnode-id="579"><div data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Save this story for later.</span></div></div></div></ul></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="574"></div></div></aside></header></div><div class="ArticlePageContentBackGround-eCrksR jtzOWH" data-attribute-verso-pattern="article-body" data-dcnode-id="404"><div class="ArticlePageChunksContent-hqHLaf cyochf" data-dcnode-id="410" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-include-experiments="true"><div class="ArticlePageChunks-lglntq hOuAQM" data-dcnode-id="411" data-testid="ArticlePageChunks"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="500"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="509"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="510" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="511"><p class="has-dropcap has-dropcap__lead-standard-heading" data-dcnode-id="565"><span data-dcnode-id="569" instrument_node="">In a barren corner of the Golan Heights, some forty miles southwest of Damascus, stands a massive, gold-lettered sign. This is Trump Heights, an Israeli township named to commemorate </span><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/tag/donald-trump"><span data-dcnode-id="568" instrument_node="">Donald Trump</span></a><span data-dcnode-id="566" instrument_node="">’s recognition of Israeli sovereignty of the area, which was seized from Syria in 1967. In the summer of 2019, Prime Minister Benjamin Netanyahu unveiled the new locality in a camera-ready event that also included David Friedman, the pro-settler U.S. Ambassador to Israel, waxing on about Trump belonging to a “small cadre of Israeli heroes.” A year and a half later, the town stands vacant; by the end of January, twenty families are slated to move into temporary housing there.</span></p><p class="paywall" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">An outsized Trump sign in a disputed, far-flung hamlet may not be a bad metaphor for the outgoing President’s legacy in Israel, which is heavy on ceremony. “The American policy in Israel is totally symbolic,” Alon Pinkas, a former consul-general for Israel in New York, told me, likening much of it to “foam on the water.” Then again, in Israel, symbolism matters. When Trump recognized Jerusalem as the capital of Israel, he in effect quashed the possibility that East Jerusalem would ever belong to a Palestinian state. When he moved the U.S. Embassy from Tel Aviv to Jerusalem, in 2018, he signalled the abandonment of even the pretense of good-faith negotiations with the Palestinians.</span></p><p class="paywall" data-dcnode-id="552"><span data-dcnode-id="562" instrument_node="">Rather than use the prospect of these gestures as an incentive for Netanyahu to adopt a comprehensive peace plan in the region, Trump simply made them. Similarly, in recent months, when the U.S. brokered normalization accords between Israel and </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/daily-comment/the-israel-uae-deal-may-boost-both-economies-but-its-also-another-netanyahu-ploy"><span data-dcnode-id="561" instrument_node="">the United Arab Emirates</span></a><span data-dcnode-id="559" instrument_node="">, Bahrain, Sudan, and, most recently, Morocco, Trump allowed Israel to reap the rewards of diplomatic relations with these Arab countries in exchange for shelving Netanyahu’s extremist plan for annexing part of the occupied West Bank. For years, Israel had carried on back-channel diplomacy with these countries, but their relations had not been formalized because of the countries’ insistence on advancing Palestinian statehood. Now, officially, Israel has vowed to shelve its annexation plan. Unofficially, the Trump Administration agreed to once-unthinkable measures that made the normalization accords lucrative for these Arab countries. For the U.A.E., most notably, there was a proposed arms deal worth twenty-three billion dollars, which includes the sale of fifty stealth F-35 fighter jets. “Netanyahu got everything he wanted from Trump,” Amit Segal, the chief political analyst for Israel’s Channel 12, told me. Trump’s alignment with Netanyahu has been so total that, ahead of the U.S. election, sixty-three per cent of Israelis supported Trump, and only seventeen per cent supported </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/tag/joe-biden"><span data-dcnode-id="558" instrument_node="">Joe Biden</span></a><span data-dcnode-id="556" instrument_node="">, according to a November poll by the Israel Democracy Institute. If Israel were a U.S. state, it would be the “reddest state in the Union,” a column in the left-leaning newspaper </span><em data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Haaretz</span></em><span data-dcnode-id="553" instrument_node=""> noted.</span></p><p class="paywall" data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">Scroll through the Twitter feeds of some of Netanyahu’s most ardent proponents and you could be forgiven for thinking that you’ve landed on the Hebrew accounts of Sean Hannity or Tucker Carlson. “Honorable President Trump. Thank you for all you’ve done to make America great and powerful,” Shimon Riklin, an analyst for Channel 20, which has been described as “Israel’s Fox News,” said. Three weeks after the U.S. election, Yinon Magal, a well-known pundit and former right-wing lawmaker, told Israeli radio, “We still pray for a miracle that Donald, son of Fred, will win the election.” On Sunday, after a mob of Trump supporters </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/our-columnists/this-violent-insurrection-is-what-trump-wanted"><span data-dcnode-id="550" instrument_node="">stormed</span></a><span data-dcnode-id="548" instrument_node=""> the U.S. Capitol, Gadi Taub, a right-wing commentator, began his weekly podcast by saying, “It’s really scary!” before clarifying that he was referring to the President being banned from Twitter. “It’s Stalinist in atmosphere,” he decried. “They didn’t ban anyone from Antifa!”</span></p><p class="paywall" data-dcnode-id="539"><span data-dcnode-id="546" instrument_node="">Perhaps nowhere is Israeli Trumpism more flagrant than in the pages of </span><em data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Israel Hayom</span></em><span data-dcnode-id="543" instrument_node=""> (“Israel Today”), a free daily newspaper that fawningly promotes Netanyahu’s interests. </span><em data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Israel Hayom</span></em><span data-dcnode-id="540" instrument_node=""> was founded in 2007 by Sheldon Adelson, a U.S. casino mogul and munificent Republican donor, and his Israeli wife, Miriam. (Shortly after the publication of this piece, it was reported that Adelson had died, on Monday night, at the age of eighty-seven.) On the eve of the U.S. election, Miriam Adelson published a front-page column titled “Don’t Be Afraid.” In it, she wrote, “I hope and believe with all my heart that the vote tally will show that most Americans want a second term for Trump.” On Sunday, in the wake of the attack on the Capitol, the newspaper claimed, “Ahead of the inauguration, the Democrats and the media want Trump’s head.”</span></p><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="536" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="538"></div><div class="journey-unit" data-dcnode-id="537"></div></div><p class="paywall" data-dcnode-id="531"><span data-dcnode-id="535" instrument_node="">“When I look at Trump, I see, first of all, a powerful man,” Boaz Bismuth, the editor-in-chief of </span><em data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Israel Hayom</span></em><span data-dcnode-id="532" instrument_node="">, told me recently. “I liked him from the very beginning.” Parallels between Trumpism and what’s known in Israel as Bibism are unmistakable: an outward contempt for—and inward obsession with—the media; a disdain for cultural élites and elements of a so-called deep state; racist incitement (Netanyahu: “Arab voters are coming out in droves”; Trump: “These aren’t people. These are animals”); and a brand of nationalist populism that has similarly taken root in countries as far flung as India, Hungary, and Brazil.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="530" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">A large part of the Israeli right’s affinity for Trump stems from his willingness to countenance new settlements in the West Bank while ignoring the Palestinians who live there. “Every building plan that had been placed in front of me was approved; under Obama, we didn’t even dare to dream about it,” one settler leader said, during a joint prayer for Trump in Hebron, a few days before the U.S. election. The right also appreciates the Trump Administration’s broader disregard for the Palestinians. When Trump announced a peace plan for Israel and Palestine—his so-called “deal of the century” in the region—without even briefing the Palestinians, he seemingly wished them out of existence. In response, Mahmoud Abbas, the President of the Palestinian Authority, called Trump’s plan the “slap of the century.” The irony is that, despite getting all it could wish for under Trump, the Israeli hard right still rejected his “deal.” It opposed the mention of a Palestinian state—even a shrunken one that would have no security autonomy and would be pockmarked by Jewish settlements.</span></p><p class="paywall" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Bismuth believes that, if Trump had won a second term, he would have allowed Israel to annex West Bank settlements—or, in Bismuth’s words, to “recognize our sovereignty over Judea and Samaria.” He also credits Trump with making the Gulf states effectively choose Israel over Palestine. “Israel shouldn’t be the mistress in the Arab world—Israel should be the wife. And Trump helped us become the wife,” he said. The way Bismuth sees it, “We suddenly have an American President who says, ‘Wait a minute, you’re actually O.K. Your success, your existence, your ability to thrive doesn’t have to depend on the Palestinians.’&nbsp;”</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="514" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"><figure class="VideoFigure-hZUgyy jbuRMw" data-dcnode-id="515" data-testid="cne-interlude-container"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeHeader-bqgsPm eTiIvU bBIcIl gJspkd" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Video From The New Yorker</span></p><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA InterludeTitleLink-bfxTQh eTiIvU hPdaTG iYqWCq csoDwQ" data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/video/watch/throwing-shade-through-crosswords" rel="noopener noreferrer" target="_blank"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeTitle-bLsuTB eTiIvU eHlqFt jGCXEq" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node=""> Throwing Shade Through Crosswords</span></p></a><figure class="CneVideoEmbedFigure-bJIZil iOHMUe cne-video-embed" data-dcnode-id="516"><div data-dcnode-id="517" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="519" id="878b1bb0-fa58-7ce3-107a-ebc69e09666c" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;position:relative;transition:height 300ms ease-in-out;vertical-align:top;width:100%;"><iframe allowfullscreen="true" allowtransparency="true" data-dcnode-id="520" frameborder="0" msallowfullscreen="true" scrolling="no" style="height:1px !important;left:0px;min-height:100%;min-width:100%;position:absolute;top:0px;width:1px !important;" title="Video Player"></iframe></div></div></figure></figure></div><p class="paywall" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Other Israelis, including former senior officials in Israel’s security establishment, warn that excluding the Palestinians from those regional diplomatic settlements will have dire consequences—for the Palestinians and also for the future of Israel. “You can’t remove the Palestinian issue. It’s a huge mistake,” Amos Gilead, a retired major general in military intelligence who heads the Institute for Policy and Strategy at the Interdisciplinary Center Herzliya, told me. “If our relationship with them collapses—if we take over, or if they become part of our state—we won’t have a Jewish and democratic state.” Pinkas, the former diplomat, added, “Once the P.R. display is over, the ones who are left with the Palestinian issue are us. Not the Emiratis, not the Bahrainis, not the Omanis, and not the Americans. We’re left with three and a half million Palestinians. Whoever thinks that not solving the issue is an accomplishment, good luck to them.”</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="501"><aside class="PersistentAsideWrapper-OTtoN iRwLFv persistent-aside" data-dcnode-id="502" data-testid="PersistentAsideWrapper" style="position: absolute; top: 475.609px; height: 5716.72px;"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="503"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="505"><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="506" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="508"></div><div class="journey-unit" data-dcnode-id="507"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="504"></div></div></aside></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="499"></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="463"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="468"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="469" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="470"><p class="paywall" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">News of the planned U.S. sale of advanced weapons to the U.A.E. was revealed only after the normalization agreement was announced; Netanyahu claimed not to have known about it, although reports indicate that he did. Gilead, the retired general, welcomed the accord but called the sale of F-35s “a violation of a sacred principle,” which states that the U.S. will uphold Israel’s qualitative edge in the region. “If the U.S. sold it to them, it can sell it to others,” Gilead said, of the Emiratis. “Can anyone guarantee that won’t happen?”</span></p><p class="paywall" data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">Uzi Arad, a former national-security adviser to Netanyahu who has since become a critic, said that Trump’s efforts in the region had been “wasted” on the wrong gestures. Instead of recognizing Jerusalem as the country’s capital, Arad said, Trump could have fulfilled a much more urgent need by countering the entrenchment of Iranian forces in Syria. Most crucially, Trump chose to walk away from the </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/our-columnists/biden-faces-a-minefield-in-new-diplomacy-with-iran"><span data-dcnode-id="495" instrument_node="">nuclear agreement with Iran</span></a><span data-dcnode-id="493" instrument_node=""> negotiated under Barack Obama. We now know that Iran has since enriched uranium to twelve times the level permitted in the agreement. Arad said, “The so-called great achievement of going hand in hand with America in leaving the agreement looked like a honeymoon, but a honeymoon that leads where?”</span></p><p class="paywall" data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Trump’s reversal on the Iran deal seemed intended to undo Obama’s legacy; Israelis often speak about Obama with similar hostility. As Bismuth put it, “With Trump it was ‘America First,’ and under Obama it was ‘Iran First,’ so how can I not prefer Trump?” I’ve heard several theories floated as to why Obama—who secured the largest military-aid package to Israel in the history of both countries—remains a target of such antagonism in Israel. One theory involves a deep suspicion spurred by his middle name, Hussein, which is often highlighted by the Israeli conservative press, and by his decision, early in his Presidency, to make Egypt among his first foreign destinations. Another theory rests on matters of temperament, on Obama’s projection of cool aloofness in a country where emotions run high. Certainly, his decision in his first year to pressure Israel to end settlement construction  inflamed Netanyahu and his ministers. They, in turn, signalled to the public that they believed the Obama Administration was hostile not toward their hard-line policy but toward Israel writ large.</span></p><p class="paywall" data-dcnode-id="482"><span data-dcnode-id="489" instrument_node="">When Netanyahu </span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/news-desk/netanyahu-and-obama-the-two-realities"><span data-dcnode-id="488" instrument_node="">went before Congress</span></a><span data-dcnode-id="486" instrument_node="">, in 2015, and spoke against Obama’s Iran deal, the fault line between Israelis and Jewish Americans became publicly visible for the first time. By now, it’s an abyss. An Associated Press poll showed that sixty-eight per cent of Jewish Americans voted for Biden, whereas thirty per cent voted for Trump. A poll taken by the progressive pro-Israel lobby J Street showed a larger gap: seventy-seven per cent for Biden and twenty-one per cent for Trump—almost the exact opposite of the preferences of Israelis. According to Jeremy Ben-Ami, the president of J Street, the divide between American and Israeli Jews is also reflected in a chasm </span><em data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">within</span></em><span data-dcnode-id="483" instrument_node=""> American Jewry. “The local Jewish population, no matter where they live, are dividing into these two camps, one being much more ethno-nationalist and religious and one being much more humanist and liberal,” he told me. In the U.S., the humanist view is rapidly rising, but “in Israel it’s becoming the inverse.” Partly as a result, Israel is no longer the priority that it once was for Jewish Americans, and the formerly tight-knit communities are drifting apart. Netanyahu’s American support now relies on an unlikely alliance of Orthodox Jews and evangelical Christians. This has produced several surreal moments, such as the ceremony that marked the opening of the U.S. Embassy in Jerusalem, which featured a televangelist who had once said that the Holocaust was simply God’s way to get the Jewish people to return to Israel.</span></p><p class="paywall" data-dcnode-id="477"><span data-dcnode-id="481" instrument_node="">If Obama, with his intellectual probity and soaring rhetoric, fared so miserably in Israeli public opinion, perhaps Biden, who displays little of the above, can avoid a similar fate. The Israeli pundits I spoke to believe that Biden’s at-times-excessive warmth and his penchant for speaking off the cuff—the very traits that made his campaign jittery about gaffes—could go a long way with Israelis. (The fact that all three of his children married Jews—“A remarkably Jewish family,” as the </span><em data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Jewish Chronicle</span></em><span data-dcnode-id="478" instrument_node=""> put it—doesn’t hurt, either.) Arad, Netanyahu’s former national-security adviser, recalled a visit he made to the White House, as part of the Prime Minister’s delegation, in 2010. He was walking down a corridor alongside the former Vice-President, “and he’s tall, and he has his arm around me,” Arad recalled. At one point, Biden turned to him and, according to Arad, said, “Uzi, remember that I’m your best fucking friend here.” Arad appreciated the gesture, which he took to mean that “Obama was technical toward Israel,” while Biden would be “more sympathetic.”</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-2 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="476" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="471"><span data-dcnode-id="475" instrument_node="">In Biden’s choice for Secretary of State, too, there is potential for a rapprochement between the Democratic Party and conservative Israelis. </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/magazine/2020/12/14/a-dad-rocker-in-the-state-department"><span data-dcnode-id="474" instrument_node="">Antony Blinken</span></a><span data-dcnode-id="472" instrument_node="">, who served as deputy  national-security adviser during the Obama Administration, is said to be responsible for securing the replenishment of Israel’s antimissile system during an offensive it launched in Gaza in 2014. As Blinken likes to tell it, he received a late-night call from the Israeli Ambassador to the U.S., Ron Dermer, who urged him to fund more interceptors. Blinken rushed to the Oval Office, where Obama, with Biden by his side, reportedly told him, “Get it done.” Steve Israel, a member of the Defense Subcommittee of the Appropriations Committee at the time, told me that congressional approval of the funding “went faster than anything I’ve seen.”</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="464"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="465"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="467"></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="466"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="462"></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="412"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="420"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="421" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="422"><p class="paywall" data-dcnode-id="457"><span data-dcnode-id="461" instrument_node="">Yet Blinken’s and Biden’s close ties with Israel might be a moot point, at least for now. In the midst of a </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/tag/coronavirus"><span data-dcnode-id="460" instrument_node="">global pandemic</span></a><span data-dcnode-id="458" instrument_node="">, the U.S. has shattered alliances to repair and a tanking economy to turn around; Israel likely won’t be high on the President-elect’s agenda, particularly as it is heading toward yet another election, in March—its fourth in two years. Even if Netanyahu wins reëlection (he is currently favored in the polls), Biden may be understandably wary of meaningful gestures. Biden no doubt remembers the sting of a visit he made to Israel in 2010, when he was blindsided by the announcement that Netanyahu’s government would expand settlement construction in East Jerusalem. As Martin Indyk, a veteran U.S. envoy in the region, wrote on Twitter, after Netanyahu mentioned his long acquaintance with Biden, “It’s true that Netanyahu has known Biden for nearly forty years. But it’s also true that Biden has known Netanyahu for nearly forty years.”</span></p><hr class="paywall" data-dcnode-id="456"><h2 class="paywall" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Read More About the Presidential Transition</span></h2><ul class="paywall" data-dcnode-id="423"><li data-dcnode-id="449"><span data-dcnode-id="453" instrument_node="">Donald Trump has survived impeachment, twenty-six sexual-misconduct accusations, and thousands of lawsuits. </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/magazine/2020/11/09/why-trump-cant-afford-to-lose%3Fitm_content%3Dfooter-recirc"><span data-dcnode-id="452" instrument_node="">His luck may well end</span></a><span data-dcnode-id="450" instrument_node=""> now that Joe Biden is the next President.</span></li><li data-dcnode-id="444"><span data-dcnode-id="448" instrument_node="">With litigation unlikely to change the outcome of the election, Republicans are looking to </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/our-columnists/how-far-could-republicans-take-trumps-claims-of-election-fraud%3Fitm_content%3Dfooter-recirc"><span data-dcnode-id="447" instrument_node="">strategies that might remain</span></a><span data-dcnode-id="445" instrument_node=""> even after rebuffs both at the polls and in court.</span></li><li data-dcnode-id="439"><span data-dcnode-id="443" instrument_node="">With the Trump Presidency ending, we need to talk about how to prevent the </span><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/our-columnists/why-america-needs-a-reckoning-with-the-trump-era%3Fitm_content%3Dfooter-recirc"><span data-dcnode-id="442" instrument_node="">moral injuries of the past four years</span></a><span data-dcnode-id="440" instrument_node=""> from happening again.</span></li><li data-dcnode-id="434"><span data-dcnode-id="438" instrument_node="">If 2020 has demonstrated anything, it is the need to rebalance the economy to benefit the working class. There are </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/our-columnists/joe-biden-must-be-a-president-for-americas-workers%3Fitm_content%3Dfooter-recirc"><span data-dcnode-id="437" instrument_node="">many ways</span></a><span data-dcnode-id="435" instrument_node=""> a Biden Administration can start.</span></li><li data-dcnode-id="429"><span data-dcnode-id="433" instrument_node="">Trump is being forced to give up his attempt to overturn the election. But his efforts to </span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/magazine/2020/12/07/the-cost-of-trumps-assault-on-the-press-and-the-truth%3Fitm_content%3Dfooter-recirc"><span data-dcnode-id="432" instrument_node="">build an alternative reality</span></a><span data-dcnode-id="430" instrument_node=""> around himself will continue.</span></li><li data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">Sign up for our </span><a data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/newsletter/daily%3Fitm_content%3Dfooter-recirc"><span data-dcnode-id="427" instrument_node="">daily newsletter</span></a><span data-dcnode-id="425" instrument_node=""> for insight and analysis from our reporters and columnists.</span></li></ul></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="413"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="414"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="416"><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="417" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="419"></div><div class="journey-unit" data-dcnode-id="418"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="415"></div></div></div></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ContentWrapperGrid-haXkHn diFmFK grid-layout--adrail narrow wide-adrail" data-dcnode-id="405"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="406"><div class="body body__container" data-dcnode-id="407"><div class="container container--body" data-dcnode-id="408"><div class="container--body-inner" data-dcnode-id="409"></div></div></div></div></div></div></article><div class="RowWrapper-egDQBE hVsKfd MultiPackageBaseRow-iwuYBt MultiPackageRow-dRSwkr eLoWFJ hLrdNp" data-dcnode-id="402" data-journey-hook="row-content"></div><div class="ContentFooterWrapper-eNmbwu bjhwHS ArticlePageContentFooterGrid-eSAGeW leZXBF" data-dcnode-id="235" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;ContentFooter&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ContentFooter&quot;}" data-include-experiments="true"><div class="RowWrapper-egDQBE hVsKfd" data-dcnode-id="399"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 grid-layout--adrail narrow wide-adrail" data-dcnode-id="400"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="401"></div><
