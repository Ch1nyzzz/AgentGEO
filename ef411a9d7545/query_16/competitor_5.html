ation</span></a></li></ul><ul class="list-unstyled" data-dcnode-id="1048" data-level="h2"><li data-dcnode-id="1049" data-target="#ref344664"><a class="w-100" data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Donald-Trump/Russia-investigation%23ref344664"><span data-dcnode-id="1051" instrument_node="">Other investigations</span></a></li></ul><ul class="list-unstyled" data-dcnode-id="1044" data-level="h2"><li data-dcnode-id="1045" data-target="#ref337770"><a class="w-100" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Donald-Trump/Health-care"><span data-dcnode-id="1047" instrument_node="">Health care</span></a></li></ul><ul class="list-unstyled" data-dcnode-id="1040" data-level="h2"><li data-dcnode-id="1041" data-target="#ref337771"><a class="w-100" data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Donald-Trump/Health-care%23ref337771"><span data-dcnode-id="1043" instrument_node="">Environmental policy</span></a></li></ul><ul class="list-unstyled" data-dcnode-id="1036" data-level="h2"><li class="spy-active" data-dcnode-id="1037" data-target="#ref340723"><a class="w-100" data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Donald-Trump/Foreign-relations"><span data-dcnode-id="1039" instrument_node="">Foreign relations</span></a></li></ul><ul class="list-unstyled" data-dcnode-id="1032" data-level="h2"><li data-dcnode-id="1033" data-target="#ref344665"><a class="w-100" data-dcnode-id="1034" href="#ref344665"><span data-dcnode-id="1035" instrument_node="">Ukraine scandal</span></a></li></ul><ul class="list-unstyled" data-dcnode-id="1028" data-level="h2"><li data-dcnode-id="1029" data-target="#ref347168"><a class="w-100" data-dcnode-id="1030" href="#ref347168"><span dat </span><span class="marker before-article" data-dcnode-id="906"></span><section data-dcnode-id="90" data-level="1" id="ref"><div class="md-sentinel--spy-target" data-dcnode-id="905"></div><section data-dcnode-id="771" data-has-spy="true" data-level="2" id="ref340723"><span data-dcnode-id="904" instrument_node=""> </span><h1 class="h2" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Foreign relations of Donald Trump</span></h1><p class="topic-paragraph" data-dcnode-id="872"><span data-dcnode-id="901" instrument_node="">A major theme of Trump’s presidential campaign was his view that the </span><a class="md-crosslink autoxref" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/United-States"><span data-dcnode-id="900" instrument_node="">United States</span></a><span data-dcnode-id="898" instrument_node=""> had long been treated unfairly or taken advantage of by other countries, including by some traditional U.S. allies, and that under Obama’s leadership the United States had </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="896" data-term="ceased" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/ceased"><span data-dcnode-id="897" instrument_node="">ceased</span></a><span data-dcnode-id="895" instrument_node=""> to be respected in world affairs. In numerous speeches, tweets, and interviews, he threatened to impose </span><a class="md-crosslink" data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/tariff"><span data-dcnode-id="894" instrument_node="">tariffs</span></a><span data-dcnode-id="892" instrument_node=""> on countries that engaged in what he deemed unfair trade practices; harshly criticized the </span><span data-dcnode-id="891" id="ref1261366"></span><a class="md-crosslink" data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/World-Trade-Organization"><span data-dcnode-id="890" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="888" instrument_node=""> (WTO); and promised to renegotiate NAFTA (the </span><span data-dcnode-id="887" id="ref1261364"></span><a class="md-crosslink" data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/North-American-Free-Trade-Agreement"><span data-dcnode-id="886" instrument_node="">North American Free Trade Agreement</span></a><span data-dcnode-id="884" instrument_node="">), which he called “the worst trade deal” the United States had ever signed. He also criticized NATO (the </span><span data-dcnode-id="883" id="ref1261365"></span><a class="md-crosslink" data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/North-Atlantic-Treaty-Organization"><span data-dcnode-id="882" instrument_node="">North Atlantic Treaty Organization</span></a><span data-dcnode-id="880" instrument_node="">), dismissing the alliance as “obsolete” but also insisting that other NATO countries devote more of their budgets to defense spending. In January 2017 he withdrew the United States from the </span><span data-dcnode-id="879" id="ref1261367"></span><a class="md-crosslink" data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Trans-Pacific-Partnership"><span data-dcnode-id="878" instrument_node="">Trans-Pacific Partnership</span></a><span data-dcnode-id="876" instrument_node="">, a regional trade agreement between 12 Pacific Rim countries that had been a major </span><a class="md-crosslink autoxref" data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/foreign-policy"><span data-dcnode-id="875" instrument_node="">foreign policy</span></a><span data-dcnode-id="873" instrument_node=""> achievement of the Obama administration. (Trump’s action was largely symbolic, however, because Congress had never ratified the treaty.)</span></p><span class="marker p1" data-dcnode-id="870"></span><span class="marker AM1 am-inline" data-dcnode-id="868"></span><span class="marker MOD1 mod-inline" data-dcnode-id="866"></span><span data-dcnode-id="865" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="835"><span data-dcnode-id="864" instrument_node="">In January and March 2018 the Trump administration announced steep tariffs on imports of solar panels (worth $8.5 billion per year) and washing machines (worth $1 billion), aimed particularly at </span><a class="md-crosslink" data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/China"><span data-dcnode-id="863" instrument_node="">China</span></a><span data-dcnode-id="861" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/South-Korea"><span data-dcnode-id="860" instrument_node="">South Korea</span></a><span data-dcnode-id="858" instrument_node="">, and on imports of </span><a class="md-crosslink" data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/aluminum"><span data-dcnode-id="857" instrument_node="">aluminum</span></a><span data-dcnode-id="855" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/steel"><span data-dcnode-id="854" instrument_node="">steel</span></a><span data-dcnode-id="852" instrument_node=""> (worth $48 billion) made in several countries, most of them U.S. allies (initial exemptions from the aluminum and steel duties granted to </span><a class="md-crosslink" data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Canada"><span data-dcnode-id="851" instrument_node="">Canada</span></a><span data-dcnode-id="849" instrument_node="">, the </span><a class="md-crosslink autoxref" data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/European-Union"><span data-dcnode-id="848" instrument_node="">European Union</span></a><span data-dcnode-id="846" instrument_node=""> [EU], and </span><a class="md-crosslink" data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Mexico"><span data-dcnode-id="845" instrument_node="">Mexico</span></a><span data-dcnode-id="843" instrument_node=""> were lifted in June). Dismissing warnings and </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="841" data-term="criticisms" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/criticisms"><span data-dcnode-id="842" instrument_node="">criticisms</span></a><span data-dcnode-id="840" instrument_node=""> from economists and business leaders that the tariffs could ignite a </span><span data-dcnode-id="839" id="ref1261368"></span><a class="md-crosslink" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/trade-war"><span data-dcnode-id="838" instrument_node="">trade war</span></a><span data-dcnode-id="836" instrument_node="">, Trump insisted in a tweet that “trade wars are good, and easy to win.” In April China imposed retaliatory tariffs on a variety of U.S. goods worth $2.4 billion annually, approximately the dollar amount of Chinese aluminum and steel imports affected by the Trump tariffs. The EU followed suit in June with tariffs on U.S. imports valued at $3.2 billion, as did Canada in July with tariffs on $12.8 billion of U.S. goods. Following its official finding that the Chinese had engaged in unfair trade practices, in June the Trump administration announced plans for tariffs on an additional $50 billion of dollars worth of Chinese products, prompting China to announce comparable duties. Threats and counterthreats of additional tariffs soon followed, and by July the two countries were engaged in a full-blown trade war.</span></p><span class="marker p2" data-dcnode-id="833"></span><span class="marker AM2 am-inline" data-dcnode-id="831"></span><span class="marker MOD2 mod-inline" data-dcnode-id="829"></span><span data-dcnode-id="828" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="788"><span data-dcnode-id="827" instrument_node="">Trump’s tariffs and his </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="825" data-term="antipathy" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/antipathy"><span data-dcnode-id="826" instrument_node="">antipathy</span></a><span data-dcnode-id="824" instrument_node=""> to the WTO overshadowed the meeting in early June of the </span><a class="md-crosslink" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Group-of-Eight"><span data-dcnode-id="823" instrument_node="">Group of 7</span></a><span data-dcnode-id="821" instrument_node=""> in </span><a class="md-crosslink" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Quebec-province"><span data-dcnode-id="820" instrument_node="">Quebec</span></a><span data-dcnode-id="818" instrument_node="">, Canada, which was marked by tense disagreement between Trump and other G7 leaders over language regarding free trade in the meeting’s final communiqué, usually a bland formality. Following Trump’s early departure from the meeting, Canadian Prime Minister </span><span data-dcnode-id="817" id="ref1261370"></span><a class="md-crosslink" data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Justin-Trudeau"><span data-dcnode-id="816" instrument_node="">Justin Trudeau</span></a><span data-dcnode-id="814" instrument_node=""> </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="812" data-term="reiterated" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/reiterated"><span data-dcnode-id="813" instrument_node="">reiterated</span></a><span data-dcnode-id="811" instrument_node=""> his </span><a class="md-crosslink autoxref" data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/nation-state"><span data-dcnode-id="810" instrument_node="">country’s</span></a><span data-dcnode-id="808" instrument_node=""> reluctant determination to respond in kind to Trump’s tariffs on aluminum and steel. Reacting to Trudeau’s remarks from a flight to </span><a class="md-crosslink" data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Singapore"><span data-dcnode-id="807" instrument_node="">Singapore</span></a><span data-dcnode-id="805" instrument_node=""> aboard </span><a class="md-crosslink autoxref" data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Air-Force-One"><span data-dcnode-id="804" instrument_node="">Air Force One</span></a><span data-dcnode-id="802" instrument_node="">, Trump </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="800" data-term="withdrew" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/withdrew"><span data-dcnode-id="801" instrument_node="">withdrew</span></a><span data-dcnode-id="799" instrument_node=""> his endorsement of the communiqué and called Trudeau “dishonest &amp; weak.” In Singapore Trump held a historic meeting with North Korean leader </span><span data-dcnode-id="798" id="ref1261372"></span><a class="md-crosslink" data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Kim-Jong-Eun"><span data-dcnode-id="797" instrument_node="">Kim Jong-Un</span></a><span data-dcnode-id="795" instrument_node="">, the first face-to-face encounter between sitting leaders of the two countries. Although Trump declared after the meeting that “there is no longer a Nuclear Threat from </span><a class="md-crosslink autoxref" data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/North-Korea"><span data-dcnode-id="794" instrument_node="">North Korea</span></a><span data-dcnode-id="792" instrument_node="">,” it was unclear what concrete commitments North Korea had made to nuclear disarmament. In July Trump attended the annual summit meeting of NATO in </span><a class="md-crosslink" data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Brussels"><span data-dcnode-id="791" instrument_node="">Brussels</span></a><span data-dcnode-id="789" instrument_node="">, where in a speech he called other NATO countries “delinquent” and insisted that they increase their defense spending “immediately.” The meeting ended with a joint communiqué in which member countries agreed to continue their efforts to devote 2 percent of their GDP to defense spending by 2024, a goal they had agreed to in 2014.</span></p><span class="marker p3" data-dcnode-id="786"></span><span class="marker AM3 am-inline" data-dcnode-id="784"></span><span class="marker MOD3 mod-inline" data-dcnode-id="782"></span><span data-dcnode-id="781" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">In May 2018 Trump announced the withdrawal of the United States from a 2015 agreement between Iran and five major powers that had limited Iran’s uranium-enrichment activities and required it to submit to frequent international inspections of its nuclear facilities in return for the lifting of economic sanctions. After the United States killed Iran’s highest-ranking security and intelligence official in a drone strike ordered by Trump, Iran announced in January 2020 that it would no longer observe the treaty-imposed restrictions on its enrichment activities, though it stopped short of formally exiting the agreement.</span></p><span class="marker p4" data-dcnode-id="777"></span><span class="marker AM4 am-inline" data-dcnode-id="775"></span><span class="marker MOD4 mod-inline" data-dcnode-id="773"></span><span data-dcnode-id="772" instrument_node=""> </span></section><span data-dcnode-id="770" instrument_node=""> </span><div class="md-sentinel--spy-target" data-dcnode-id="769"></div><section data-dcnode-id="688" data-has-spy="true" data-level="2" id="ref344665"><span data-dcnode-id="768" instrument_node=""> </span><h2 class="h2" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Ukraine scandal</span></h2><span data-dcnode-id="764" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="735"><span data-dcnode-id="763" instrument_node="">In August 2019 an anonymous </span><span data-dcnode-id="762" id="ref1284110"></span><a class="md-crosslink" data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/whistleblower"><span data-dcnode-id="761" instrument_node="">whistleblower</span></a><span data-dcnode-id="759" instrument_node="">, later determined to be an official of the CIA, filed a complaint with the inspector general of the U.S. intelligence </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="757" data-term="community" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/community"><span data-dcnode-id="758" instrument_node="">community</span></a><span data-dcnode-id="756" instrument_node="">, Michael Atkinson, alleging that in a July 25 phone call with the newly elected </span><a class="md-crosslink autoxref" data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/president-government-official"><span data-dcnode-id="755" instrument_node="">president</span></a><span data-dcnode-id="753" instrument_node=""> of Ukraine, </span><span data-dcnode-id="752" id="ref1284111"></span><a class="md-crosslink" data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Volodymyr-Zelensky"><span data-dcnode-id="751" instrument_node="">Volodymyr Zelensky</span></a><span data-dcnode-id="749" instrument_node="">, Trump had attempted to extort a promise from Zelensky to interfere in the 2020 U.S. presidential </span><a class="md-crosslink autoxref" data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/election-political-science"><span data-dcnode-id="748" instrument_node="">election</span></a><span data-dcnode-id="746" instrument_node=""> on Trump’s behalf. Specifically, according to the complaint, Trump strongly implied that some $400 million in congressionally </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="744" data-term="mandated" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/mandated"><span data-dcnode-id="745" instrument_node="">mandated</span></a><span data-dcnode-id="743" instrument_node=""> security assistance to Ukraine would not be provided unless Zelensky carried out two requests, which Trump introduced by saying, “I would like you to do us a favor though….” The first request was that Zelensky search for a computer server used by the Democratic National Committee that supposedly had been hidden in Ukraine after the Internet security firm </span><span data-dcnode-id="742" id="ref1294767"></span><a class="md-crosslink" data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/CrowdStrike"><span data-dcnode-id="741" instrument_node="">CrowdStrike</span></a><span data-dcnode-id="739" instrument_node=""> determined in 2016 that it had been broken into by hackers based in Russia. According to the CrowdStrike </span><a class="md-crosslink autoxref" data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/conspiracy-theory"><span data-dcnode-id="738" instrument_node="">conspiracy theory</span></a><span data-dcnode-id="736" instrument_node="">, which originated as a disinformation campaign by Russia, the missing server contained evidence that the hackers were in fact Ukrainian and that Democrats and CrowdStrike had conspired to falsely blame Russia for interfering in the 2016 presidential election.</span></p><span class="marker p5" data-dcnode-id="733"></span><span class="marker AM5 am-inline" data-dcnode-id="731"></span><span class="marker MOD5 mod-inline" data-dcnode-id="729"></span><span data-dcnode-id="728" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="720"><span data-dcnode-id="727" instrument_node="">The second request was that Zelensky investigate Biden’s allegedly corrupt motive for pressuring the Ukrainian government in 2015, while Biden was serving as vice president in the Obama administration, to fire the country’s prosecutor general, Viktor Shokin. According to the Burisma </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="725" data-term="conspiracy" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/conspiracy"><span data-dcnode-id="726" instrument_node="">conspiracy</span></a><span data-dcnode-id="724" instrument_node=""> theory, as it came to be known, Biden called for Shokin’s removal only in order to halt an investigation of the Ukrainian energy company Burisma Holdings, Ltd., that threatened to uncover wrongdoing by Biden’s son Hunter, who was then serving on the company’s board of directors. No serious evidence of wrongdoing by Biden or his son was ever produced, however. In his phone conversation, Trump also repeatedly suggested to Zelensky that in planning or conducting the requested investigations he deal directly with Attorney General Barr and Trump’s personal attorney </span><a class="md-crosslink" data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Rudy-Giuliani"><span data-dcnode-id="723" instrument_node="">Rudy Giuliani</span></a><span data-dcnode-id="721" instrument_node="">.</span></p><span class="marker p6" data-dcnode-id="718"></span><span class="marker AM6 am-inline" data-dcnode-id="716"></span><span class="marker MOD6 mod-inline" data-dcnode-id="714"></span><span data-dcnode-id="713" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="696"><span data-dcnode-id="712" instrument_node="">In September 2019, after the press began reporting that Trump’s conversation with Zelensky may have involved a “quid pro quo,” the aid to Ukraine was finally released, and the </span><a class="md-crosslink autoxref" data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/White-House-Washington-DC"><span data-dcnode-id="711" instrument_node="">White House</span></a><span data-dcnode-id="709" instrument_node=""> later issued what it called a “rough transcript” of the phone call, which nevertheless did not support Trump’s assertion that there had been no quid pro quo. Later that month Pelosi changed her stance on the impeachment question, announcing that Trump’s attempt to extort a foreign leader to interfere in a U.S. election </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="707" data-term="constituted" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/constituted"><span data-dcnode-id="708" instrument_node="">constituted</span></a><span data-dcnode-id="706" instrument_node=""> a betrayal of his oath of office and therefore warranted a formal impeachment inquiry. In testimony before the House Intelligence Committee and later the House Judiciary Committee, career civil servants in the </span><a class="md-crosslink autoxref" data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/US-Department-of-State"><span data-dcnode-id="705" instrument_node="">State Department</span></a><span data-dcnode-id="703" instrument_node=""> and other witnesses confirmed the outlines of the whistleblower’s account of Trump’s phone call and further indicated that Trump had been attempting to conduct what amounted to a separate “back channel” foreign policy through Giuliani, Barr, and others. In December the Judiciary Committee drafted two articles of impeachment against Trump, one for abuse of power and the other for obstruction of Congress. Those articles were adopted in two party-line votes by the entire House on December 18, making Trump the third president in U.S. history to be impeached. Trump was acquitted by the Senate in February 2020 after a majority of senators voted to find him not guilty on both charges. For additional discussion, </span><em data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">see</span></em><span data-dcnode-id="700" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Ukraine-scandal"><span data-dcnode-id="699" instrument_node="">Ukraine scandal</span></a><span data-dcnode-id="697" instrument_node="">.</span></p><span class="marker p7" data-dcnode-id="694"></span><span class="marker AM7 am-inline" data-dcnode-id="692"></span><span class="marker MOD7 mod-inline" data-dcnode-id="690"></span><span data-dcnode-id="689" instrument_node=""> </span></section><span data-dcnode-id="687" instrument_node=""> </span><div class="md-sentinel--spy-target" data-dcnode-id="686"></div><section data-dcnode-id="536" data-has-spy="true" data-level="2" id="ref347168"><span data-dcnode-id="685" instrument_node=""> </span><h2 class="h2" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">COVID-19 pandemic</span></h2><span data-dcnode-id="681" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="667"><span data-dcnode-id="680" instrument_node="">In January 2020 the </span><a class="md-crosslink" data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/World-Health-Organization"><span data-dcnode-id="679" instrument_node="">World Health Organization</span></a><span data-dcnode-id="677" instrument_node=""> (WHO) declared the continuing spread of COVID-19—a deadly and highly </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="675" data-term="contagious" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/contagious"><span data-dcnode-id="676" instrument_node="">contagious</span></a><span data-dcnode-id="674" instrument_node=""> respiratory illness caused by a new form of the </span><a class="md-crosslink" data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/coronavirus-virus-group"><span data-dcnode-id="673" instrument_node="">coronavirus</span></a><span data-dcnode-id="671" instrument_node=""> known as novel coronavirus, or coronavirus-2 (SARS-CoV-2)—to be a global health emergency. First reported in the Chinese city of Wuhan in December 2019, the virus soon spread throughout China and then to Europe, the United States, and other regions, prompting WHO to announce in March 2020 that COVID-19 had become a global </span><a class="md-crosslink" data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/pandemic"><span data-dcnode-id="670" instrument_node="">pandemic</span></a><span data-dcnode-id="668" instrument_node="">. At that time there were more than 118,000 confirmed cases of COVID-19 worldwide and nearly 4,300 deaths. By year’s end those numbers had reached approximately 83 million and 1.8 million, respectively.</span></p><span class="marker p8" data-dcnode-id="665"></span><span class="marker AM8 am-inline" data-dcnode-id="663"></span><span class="marker MOD8 mod-inline" data-dcnode-id="661"></span><span data-dcnode-id="660" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Soon after the first known case in the United States was identified in mid-January 2020, Trump was privately informed by officials within his administration that the pandemic could result in massive numbers of American deaths and severe damage to the U.S. economy. Those warnings were repeated to Trump for several weeks through February and early March as the numbers of positive tests for the coronavirus and confirmed cases of COVID-19 in the country continued to rise.</span></p><span class="marker p9" data-dcnode-id="656"></span><span class="marker AM9 am-inline" data-dcnode-id="654"></span><span class="marker MOD9 mod-inline" data-dcnode-id="652"></span><span data-dcnode-id="651" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="634"><span data-dcnode-id="650" instrument_node="">At the end of January Trump imposed a partial entry ban on foreign travelers who had recently visited China. However, he initially neglected to </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="648" data-term="implement" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/implement"><span data-dcnode-id="649" instrument_node="">implement</span></a><span data-dcnode-id="647" instrument_node=""> the aggressive measures that had been recommended to him to slow the spread of the coronavirus and reduce the number of likely deaths. Such proposals included increasing the country’s testing capacity and developing a national strategy for testing, contact tracing, and quarantining; using his authority under the </span><a class="md-crosslink" data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Defense-Production-Act"><span data-dcnode-id="646" instrument_node="">Defense Production Act</span></a><span data-dcnode-id="644" instrument_node=""> (DPA) of 1950 to increase production of personal protective equipment (PPE) for medical personnel and ventilators for critically ill patients; establishing a national purchasing and distribution system to </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="642" data-term="allocate" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/allocate"><span data-dcnode-id="643" instrument_node="">allocate</span></a><span data-dcnode-id="641" instrument_node=""> PPE and ventilators to states and localities according to need; and issuing national science-based guidelines for closing businesses and schools, social distancing, mask wearing, and other safety measures. In many of his public statements, Trump downplayed the threat posed by the pandemic, the extent of its spread in the United States, and the severity of COVID-19 itself. In other statements, some made in tweets and at press briefings in April following meetings of the White House coronavirus task force (first </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="639" data-term="convened" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/convened"><span data-dcnode-id="640" instrument_node="">convened</span></a><span data-dcnode-id="638" instrument_node=""> in late January), he promoted supposed </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="636" data-term="alternative" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/alternative"><span data-dcnode-id="637" instrument_node="">alternative</span></a><span data-dcnode-id="635" instrument_node=""> remedies for the virus that were known to be ineffective, unproved, or even deadly, and he made other false claims that expert members of the task force were obliged to contradict.</span></p><span class="marker p10" data-dcnode-id="632"></span><span class="marker AM10 am-inline" data-dcnode-id="630"></span><span class="marker MOD10 mod-inline" data-dcnode-id="628"></span><span data-dcnode-id="627" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="616"><span data-dcnode-id="626" instrument_node="">After WHO’s global pandemic announcement, Trump declared a national emergency, suspended travel to the United States from several European countries, and recommended that Americans practice social distancing for the remainder of March (he later extended that period to April 30). At the end of March he </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="624" data-term="invoked" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/invoked"><span data-dcnode-id="625" instrument_node="">invoked</span></a><span data-dcnode-id="623" instrument_node=""> the DPA to officially direct the automobile manufacturer </span><a class="md-crosslink" data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/General-Motors-Corporation"><span data-dcnode-id="622" instrument_node="">General Motors</span></a><span data-dcnode-id="620" instrument_node=""> to produce ventilators. By then, many states had already closed businesses and schools, restricted public gatherings, issued stay-at-home orders, and mandated mask wearing in public spaces. States and individual hospitals were also redoubling their efforts to find increasingly </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="618" data-term="scarce" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/scarce"><span data-dcnode-id="619" instrument_node="">scarce</span></a><span data-dcnode-id="617" instrument_node=""> ventilators and respirators after Trump told state governors in a conference call that they should make their own arrangements to obtain such equipment.</span></p><span class="marker p11" data-dcnode-id="614"></span><span class="marker AM11 am-inline" data-dcnode-id="612"></span><span class="marker MOD11 mod-inline" data-dcnode-id="610"></span><span data-dcnode-id="609" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="601"><span data-dcnode-id="608" instrument_node="">The widespread business closings and the shift to work-from-home arrangements in some industries resulted in massive layoffs, eventually producing </span><a class="md-crosslink" data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/unemployment"><span data-dcnode-id="607" instrument_node="">unemployment</span></a><span data-dcnode-id="605" instrument_node=""> levels not seen since the early 1930s and a deep recession. In late March Congress passed, and Trump signed into law, a $2.2 trillion economic relief package, the CARES (Coronavirus Aid, Relief, and Economic Security) Act, that included a loan program for small businesses, an increase in unemployment benefits through July, one-time direct payments to households, increased funding for food-stamp and child-nutrition programs, and financial aid to state and local governments, which had been overwhelmed by unemployment claims and </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="603" data-term="unprecedented" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/unprecedented"><span data-dcnode-id="604" instrument_node="">unprecedented</span></a><span data-dcnode-id="602" instrument_node=""> demands for emergency services. Two months later the Democratic-controlled House of Representatives adopted a more extensive ($3 trillion) relief measure, the HEROES (Health and Economic Recovery Omnibus Emergency Solutions) Act, whose provisions included a vote-by-mail option in all federal elections beginning in November and additional funding for the U.S. Postal Service, which was then handling greatly increased numbers of mail-in (or absentee) ballots cast by primary-election voters wishing to avoid exposure to the coronavirus in voting lines and polling stations. Senate Republicans, however, refused to take up the measure, in part because it failed to protect reopened businesses against potential lawsuits by workers who contracted COVID-19 on the job. In late December, after several months of inaction, Congress finally passed scaled-back relief legislation, including a modest temporary increase in unemployment benefits.</span></p><span class="marker p12" data-dcnode-id="599"></span><span class="marker AM12 am-inline" data-dcnode-id="597"></span><span class="marker MOD12 mod-inline" data-dcnode-id="595"></span><span data-dcnode-id="594" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="568"><span data-dcnode-id="593" instrument_node="">Through the spring and summer, while occasionally acknowledging the real scope and seriousness of the pandemic, Trump continued to predict the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="591" data-term="imminent" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/imminent"><span data-dcnode-id="592" instrument_node="">imminent</span></a><span data-dcnode-id="590" instrument_node=""> disappearance of the coronavirus; to dispute or misrepresent official numbers of positive tests, confirmed cases, and deaths in the United States; to promote conspiracy theories that attributed high official numbers to a variety of patently false causes; and to criticize </span><a class="md-crosslink autoxref" data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/public-health"><span data-dcnode-id="589" instrument_node="">public health</span></a><span data-dcnode-id="587" instrument_node=""> officials whose </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="585" data-term="assessments" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/assessments"><span data-dcnode-id="586" instrument_node="">assessments</span></a><span data-dcnode-id="584" instrument_node=""> or recommendations did not reflect positively on his leadership. In April and May, as the numbers of new COVID-19 cases and deaths nationwide began to plateau, Trump pushed the states to quickly </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="582" data-term="rescind" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/rescind"><span data-dcnode-id="583" instrument_node="">rescind</span></a><span data-dcnode-id="581" instrument_node=""> the public health measures that had helped to slow the spread of the coronavirus, portraying state-imposed business closings and especially mask </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="579" data-term="mandates" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/mandates"><span data-dcnode-id="580" instrument_node="">mandates</span></a><span data-dcnode-id="578" instrument_node=""> as violations of economic freedom and </span><a class="md-crosslink autoxref" data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/liberty-human-rights"><span data-dcnode-id="577" instrument_node="">individual liberty</span></a><span data-dcnode-id="575" instrument_node="">. Trump’s misrepresentations inspired many of his supporters to hold anti-lockdown demonstrations and to flout state and local mask-wearing orders and limits on public gatherings. Trump’s own refusal to wear a mask in public, a pointed signal of his </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="573" data-term="contempt" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/contempt"><span data-dcnode-id="574" instrument_node="">contempt</span></a><span data-dcnode-id="572" instrument_node=""> for such regulations, led many of his supporters, including several Republican governors and lawmakers, to regard the refusal to wear a mask in public as a kind of political statement—an expression of </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="570" data-term="allegiance" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/allegiance"><span data-dcnode-id="571" instrument_node="">allegiance</span></a><span data-dcnode-id="569" instrument_node=""> to Trump and the Republican Party.</span></p><span class="marker p13" data-dcnode-id="566"></span><span class="marker AM13 am-inline" data-dcnode-id="564"></span><span class="marker MOD13 mod-inline" data-dcnode-id="562"></span><span data-dcnode-id="561" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">In May and June the governors of several states, mostly in the South, responded to Trump’s pressure by relaxing or lifting pandemic-related restrictions—in particular, mask-wearing orders. Partly as a result of those premature changes, a second surge of the pandemic—a spike in positive test rates and in numbers of COVID-19 cases, hospitalizations, and deaths—occurred in those and a few other states, forcing governors to reimpose restrictions they had declared unnecessary only a few weeks before.</span></p><span class="marker p14" data-dcnode-id="557"></span><span class="marker AM14 am-inline" data-dcnode-id="555"></span><span class="marker MOD14 mod-inline" data-dcnode-id="553"></span><span data-dcnode-id="552" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="544"><span data-dcnode-id="551" instrument_node="">In early October, during the final weeks of his presidential campaign, Trump himself tested positive for the coronavirus and developed COVID-19. He was admitted to </span><a class="md-crosslink autoxref" data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Walter-Reed"><span data-dcnode-id="550" instrument_node="">Walter Reed</span></a><span data-dcnode-id="548" instrument_node=""> Medical Center in Bethesda, Maryland, with respiratory </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="546" data-term="symptoms" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/symptoms"><span data-dcnode-id="547" instrument_node="">symptoms</span></a><span data-dcnode-id="545" instrument_node=""> and was reportedly treated there with advanced experimental drugs unavailable to almost all other Americans. Released at his insistence after only three days, he eventually resumed his campaign rallies before mostly unmasked supporters in several states. As before, Trump declined to wear a mask in public. Meanwhile, a third surge of the pandemic, which experts had warned would be far more deadly than the second, had begun. By early November more than 9.5 million Americans had developed COVID-19 and more than 225,000 had died of the illness.</span></p><span class="marker p15" data-dcnode-id="542"></span><span class="marker AM15 am-inline" data-dcnode-id="540"></span><span class="marker MOD15 mod-inline" data-dcnode-id="538"></span><span data-dcnode-id="537" instrument_node=""> </span></section><span data-dcnode-id="535" instrument_node=""> </span><div class="md-sentinel--spy-target" data-dcnode-id="534"></div><section data-dcnode-id="250" data-has-spy="true" data-level="2" id="ref347169"><span data-dcnode-id="533" instrument_node=""> </span><h2 class="h2" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Presidential election of 2020</span></h2><span data-dcnode-id="529" instrument_node=""> </span><span data-dcnode-id="528" data-level="2" id="ref347169"></span><div class="md-sentinel--spy-target" data-dcnode-id="527"></div><section data-dcnode-id="379" data-has-spy="true" data-level="3" id="ref347170"><span data-dcnode-id="526" instrument_node=""> </span><h2 class="h3" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Campaigns and litigation</span></h2><span data-dcnode-id="522" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="502"><span data-dcnode-id="521" instrument_node="">Facing no serious challengers in the Republican presidential primaries of 2020, Trump became the party’s presumptive nominee in March, having by then collected the minimum number of </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="519" data-term="delegates" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/delegates"><span data-dcnode-id="520" instrument_node="">delegates</span></a><span data-dcnode-id="518" instrument_node=""> necessary to win the nomination. He was formally nominated at the Republican Party’s national convention in late August. In an unusual decision, the </span><a class="md-crosslink autoxref" data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Republican-National-Committee"><span data-dcnode-id="517" instrument_node="">Republican National Committee</span></a><span data-dcnode-id="515" instrument_node=""> declined to write a platform for the 2020 election, instead adopting the same platform it had issued in 2016 (despite its dated criticisms of the “current” president) with an accompanying resolution declaring that “the Republican Party has and will continue to enthusiastically support the President’s America-first agenda.” Shortly before the start of the Republican convention, the Trump campaign released a list of Trump’s “core priorities” for a second term, including “Create 10 Million New Jobs in 10 Months,” “Develop a [COVID-19] Vaccine by The End of 2020,” “Return to Normal in 2021,” “Protect Social Security and Medicare,” “Bring Violent Extremist Groups Like ANTIFA to Justice,” and “Require New Immigrants to Be Able to Support Themselves Financially.” Throughout his campaign Trump also kept up a steady stream of insults and name-calling aimed at Biden, who became the Democratic Party’s presumptive presidential nominee in April and was formally nominated at his party’s national convention in mid-August. Biden promised that as president he would, among other things, bring the COVID-19 pandemic under control, reverse Trump’s policies on immigration and the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="513" data-term="environment" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/environment"><span data-dcnode-id="514" instrument_node="">environment</span></a><span data-dcnode-id="512" instrument_node="">, repair the country’s frayed relations with foreign allies, repeal the 2017 corporate tax cut, strengthen </span><a class="md-crosslink" data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/voting-rights"><span data-dcnode-id="511" instrument_node="">voting rights</span></a><span data-dcnode-id="509" instrument_node="">, and expand access to </span><a class="md-crosslink" data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/health-insurance"><span data-dcnode-id="508" instrument_node="">health insurance</span></a><span data-dcnode-id="506" instrument_node=""> under </span><a class="md-crosslink autoxref" data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Patient-Protection-and-Affordable-Care-Act"><span data-dcnode-id="505" instrument_node="">Obamacare</span></a><span data-dcnode-id="503" instrument_node="">.</span></p><span class="marker p16" data-dcnode-id="500"></span><span class="marker AM16 am-inline" data-dcnode-id="498"></span><span class="marker MOD16 mod-inline" data-dcnode-id="496"></span><span data-dcnode-id="495" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The COVID-19 pandemic was understandably a dominant issue in the election. Biden accused Trump of ignoring the early spread of the illness in the United States, mismanaging the nation’s pandemic response, and resisting appropriate input and leadership from government scientific and health experts. Trump, for his part, initially accused Democrats of perpetrating a “hoax” by exaggerating the extent of infection and the danger of the illness. Through the remainder of his campaign, he continued to allege that Biden and other Democrats were overstating the severity of the health crisis for political advantage. A parallel issue was the adequacy of pandemic-related economic relief for individuals, businesses, and state and local governments.</span></p><span class="marker p17" data-dcnode-id="491"></span><span class="marker AM17 am-inline" data-dcnode-id="489"></span><span class="marker MOD17 mod-inline" data-dcnode-id="487"></span><span data-dcnode-id="486" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="481"><span data-dcnode-id="485" instrument_node="">The </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="483" data-term="pandemic" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/pandemic"><span data-dcnode-id="484" instrument_node="">pandemic</span></a><span data-dcnode-id="482" instrument_node=""> also prompted governors and election officials in several states to postpone primary elections or to implement changes in election procedures to enable voters to cast their ballots safely. Such changes included extending voter registration deadlines and early voting periods; loosening or eliminating requirements for obtaining or casting mail-in ballots, which millions of voters were expected to use as an alternative to in-person voting; authorizing the use of drop boxes for returning mail-in ballots; and extending postelection deadlines for receipt of mail-in ballots, whose delivery was expected to be slowed by postal service delays and overwhelming demand. A smaller but still significant number of states declined to change their election procedures or did so in ways that arguably made voting more difficult or less safe than in other states. In October 2020, for example, the Republican governor of Texas, Greg Abbott, issued a directive that limited mail-in ballot drop boxes to one per county.</span></p><span class="marker p18" data-dcnode-id="479"></span><span class="marker AM18 am-inline" data-dcnode-id="477"></span><span class="marker MOD18 mod-inline" data-dcnode-id="475"></span><span data-dcnode-id="474" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="460"><span data-dcnode-id="473" instrument_node="">Pandemic-related changes to state election procedures were intensively litigated. Some were adopted in response to orders issued by federal or state courts, whose rulings were then </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="471" data-term="upheld" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/upheld"><span data-dcnode-id="472" instrument_node="">upheld</span></a><span data-dcnode-id="470" instrument_node=""> or struck down on appeal; others were initiated by state authorities and then challenged in the courts. In general, challenges to such changes were lodged by Republican election and government officials, state Republican parties and the Republican National Committee, and the Trump campaign, usually on the grounds that the changes usurped the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="468" data-term="constitutional" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/constitutional"><span data-dcnode-id="469" instrument_node="">constitutional</span></a><span data-dcnode-id="467" instrument_node=""> authority of state legislatures to establish electoral laws and procedures or that they invited voter fraud (none of the suits, however, presented any evidence of significant fraud). Democrats generally defended the changes as both constitutional and necessary to ensure the opportunity to vote amid an extraordinary public health emergency; they also </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="465" data-term="alleged" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/alleged"><span data-dcnode-id="466" instrument_node="">alleged</span></a><span data-dcnode-id="464" instrument_node=""> that Republican opposition to the changes amounted to a form of </span><a class="md-crosslink" data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/voter-suppression"><span data-dcnode-id="463" instrument_node="">voter suppression</span></a><span data-dcnode-id="461" instrument_node=""> that could unfairly turn the election in Trump’s favour in swing states. In all, more than 300 election-related lawsuits were filed by both Democrats and Republicans prior to election day. The vast majority of Republican challenges were eventually dismissed.</span></p><span class="marker p19" data-dcnode-id="458"></span><span class="marker AM19 am-inline" data-dcnode-id="456"></span><span class="marker MOD19 mod-inline" data-dcnode-id="454"></span><span data-dcnode-id="453" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="442"><span data-dcnode-id="452" instrument_node="">Underlying the strategies of both parties was the accurate perception that Democratic voters were more likely to use mail-in ballots than Republican voters. Trump’s oft-repeated but baseless claim that mail-in voting was rife with fraud and abuse only magnified Democratic concerns about alleged Republican voter suppression. So too did the appointment in May 2020 of a new postmaster general, </span><span data-dcnode-id="451" id="ref1294769"></span><span data-dcnode-id="450" instrument_node="">Louis DeJoy, a major Trump donor, who immediately </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="448" data-term="implemented" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/implemented"><span data-dcnode-id="449" instrument_node="">implemented</span></a><span data-dcnode-id="447" instrument_node=""> service cuts and other operational changes in the </span><span data-dcnode-id="446" id="ref1294770"></span><a class="md-crosslink" data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/postal-system/National-postal-systems%23ref15431"><span data-dcnode-id="445" instrument_node="">U.S. postal system</span></a><span data-dcnode-id="443" instrument_node=""> that slowed mail delivery throughout the country.</span></p><span class="marker p20" data-dcnode-id="440"></span><span class="marker AM20 am-inline" data-dcnode-id="438"></span><span class="marker MOD20 mod-inline" data-dcnode-id="436"></span><span data-dcnode-id="435" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="423"><span data-dcnode-id="434" instrument_node="">Trump’s attacks on mail-in voting and on the postal service itself were one element of a broader </span><span data-dcnode-id="433" id="ref1294771"></span><a class="md-crosslink" data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/big-lie"><span data-dcnode-id="432" instrument_node="">accusation</span></a><span data-dcnode-id="430" instrument_node=""> that he had emphasized during the 2016 presidential campaign and continued in the 2020 campaign and beyond: that the November election would be “rigged” by Democrats, resulting in “the most INACCURATE &amp; FRAUDULENT Election in history,” as he stated in a July 2020 tweet. In dozens of other tweets and at numerous campaign rallies, interviews, and press encounters, Trump claimed that thousands of mail-in ballots would be stolen or </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="428" data-term="forged" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/forged"><span data-dcnode-id="429" instrument_node="">forged</span></a><span data-dcnode-id="427" instrument_node=""> by foreign countries and that Democratic election officials would neglect to send mail-in ballots to Republicans and would commit election fraud by intentionally miscounting mail-in ballots. In the summer and fall of 2020 Trump notably refused to commit himself to accepting a Biden victory in November, which seemed likely, given Biden’s consistent and sizable lead over Trump in nationwide opinion polls. Trump insisted, to the contrary, that the only way the Democrats could win would be through fraud, at one point suggesting in a tweet that the election should be delayed “until people can properly, securely and safely vote???” On other occasions he asserted that he should be permitted to extend his first term to make up for the distraction of the </span><a class="md-crosslink" data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Donald-Trump/Russia-investigation%23ref337769"><span data-dcnode-id="426" instrument_node="">Russia investigation</span></a><span data-dcnode-id="424" instrument_node="">.</span></p><span class="marker p21" data-dcnode-id="421"></span><span class="marker AM21 am-inline" data-dcnode-id="419"></span><span class="marker MOD21 mod-inline" data-dcnode-id="417"></span><span data-dcnode-id="416" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="402"><span data-dcnode-id="415" instrument_node="">Trump’s promotion of what amounted to a conspiracy theory of Democratic vote rigging prompted </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="413" data-term="criticism" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/criticism"><span data-dcnode-id="414" instrument_node="">criticism</span></a><span data-dcnode-id="412" instrument_node=""> and varying levels of concern among Democrats as well as Trump’s </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="410" data-term="conservative" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/conservative"><span data-dcnode-id="411" instrument_node="">conservative</span></a><span data-dcnode-id="409" instrument_node=""> critics, including a small but vocal minority of Republican pundits and journalists. Some believed that Trump was merely setting the stage for a face-saving end to his presidency; others speculated that he would use lawsuits alleging election fraud in a dubious strategy to invalidate mail-in votes in swing states or to delay certification of state elections long enough to enable Republican-controlled state legislatures to take the extreme (albeit constitutional) step of replacing slates of pro-Biden electors chosen by voters with the legislatures’ own slates of pro-Trump electors. Still others feared a scenario in which Trump would simply refuse to leave office, provoking a constitutional crisis in which (in a worst-case scenario) the U.S. military would become involved. An </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="407" data-term="abiding" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/abiding"><span data-dcnode-id="408" instrument_node="">abiding</span></a><span data-dcnode-id="406" instrument_node=""> and widely shared concern, particularly among historians and political scholars, was that Trump’s apparent conspiracy mongering would undermine Americans’ trust in democratic institutions. American </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="404" data-term="democracy" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/democracy"><span data-dcnode-id="405" instrument_node="">democracy</span></a><span data-dcnode-id="403" instrument_node=""> would be severely damaged, they argued, if a significant segment of either major party consistently refused to accept defeat in elections for president or any other high office.</span></p><span class="marker p22" data-dcnode-id="400"></span><span class="marker AM22 am-inline" data-dcnode-id="398"></span><span class="marker MOD22 mod-inline" data-dcnode-id="396"></span><span data-dcnode-id="395" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="387"><span data-dcnode-id="394" instrument_node="">The 2020 presidential election was unique and historic for the vast number of voters who cast ballots—whether in person or via mail, whether through early voting or on election day—and consequently for the vote totals of both the winning and losing candidates, Biden and Trump, respectively. Trump ultimately received more than 74 million votes and Biden more than 81 million—the latter figure being the highest for any presidential candidate in U.S. history. On the eve of the election, Trump continued to trail Biden in opinion polls in most swing states, though by thinner margins than in polls the previous summer. As voting proceeded, however, it became clear that the vote totals in some states would be far closer than polls had indicated. For a few days after election day (November 3), the outcome remained uncertain, in part because of the vast number of mail-in ballots (more than 65 million nationwide), which naturally took longer to count than in-person ballots. On November 7 the </span><a class="md-crosslink" data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Associated-Press"><span data-dcnode-id="393" instrument_node="">Associated Press</span></a><span data-dcnode-id="391" instrument_node=""> and the major U.S. television networks called the election for Biden, who, in their analysis, had by then secured 270 electoral votes, the minimum number needed to win the presidency. The eventual vote of the </span><a class="md-crosslink autoxref" data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/electoral-college"><span data-dcnode-id="390" instrument_node="">electoral college</span></a><span data-dcnode-id="388" instrument_node="">, which took place on December 14, was 306 for Biden and 232 for Trump.</span></p><span class="marker p23" data-dcnode-id="385"></span><span class="marker AM23 am-inline" data-dcnode-id="383"></span><span class="marker MOD23 mod-inline" data-dcnode-id="381"></span><span data-dcnode-id="380" instrument_node=""> </span></section><span data-dcnode-id="378" instrument_node=""> </span><span data-dcnode-id="377" data-level="2" id="ref347169"></span><div class="md-sentinel--spy-target" data-dcnode-id="376"></div><section data-dcnode-id="252" data-has-spy="true" data-level="3" id="ref347171"><span data-dcnode-id="375" instrument_node=""> </span><h2 class="h3" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Aftermath</span></h2><span data-dcnode-id="371" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="363"><span data-dcnode-id="370" instrument_node="">At a press </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="368" data-term="encounter" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/encounter"><span data-dcnode-id="369" instrument_node="">encounter</span></a><span data-dcnode-id="367" instrument_node=""> in the early morning of November 4, Trump declared himself the winner of the election and denounced the counting of mail-in ballots as a “fraud on the American people.” During the next several weeks he continually accused Biden and the Democrats of having stolen the presidential election and repeated far-fetched conspiracy theories about ballot stuffing, dead voters, and </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="365" data-term="malicious" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/malicious"><span data-dcnode-id="366" instrument_node="">malicious</span></a><span data-dcnode-id="364" instrument_node=""> voting-machine software that had deleted or changed millions of votes for Trump. In addition, he personally pressured election officials and other authorities in Michigan, Georgia, and Pennsylvania to delay certifying or to overturn elections in their states and later attacked those among them who declined to cooperate.</span></p><span class="marker p24" data-dcnode-id="361"></span><span class="marker AM24 am-inline" data-dcnode-id="359"></span><span class="marker MOD24 mod-inline" data-dcnode-id="357"></span><span data-dcnode-id="356" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="351"><span data-dcnode-id="355" instrument_node="">Although nearly all preelection Republican lawsuits had been dismissed, Trump and his allies mounted scores of new challenges on similar grounds. As those efforts also failed, the Trump campaign conceived a more ambitious legal strategy. In late November a team of Trump-supporting lawyers </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="353" data-term="drafted" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/drafted"><span data-dcnode-id="354" instrument_node="">drafted</span></a><span data-dcnode-id="352" instrument_node=""> a complaint designed to be submitted directly to the Supreme Court on the basis of its original jurisdiction in cases involving disputes between the states. Eventually filed by Texas Attorney General Ken Paxton in early December, the complaint alleged that pandemic-related changes to electoral procedures in four swing states that had voted for Biden—Pennsylvania, Georgia, Michigan, and Wisconsin—were illegal and unconstitutional and had so increased the potential for voter fraud that Biden’s victories in those states must be overturned. On December 11 the Court tersely dismissed the suit for lack of standing.</span></p><span class="marker p25" data-dcnode-id="349"></span><span class="marker AM25 am-inline" data-dcnode-id="347"></span><span class="marker MOD25 mod-inline" data-dcnode-id="345"></span><span data-dcnode-id="344" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="336"><span data-dcnode-id="343" instrument_node="">Trump’s legal efforts were ultimately unsuccessful, but his postelection narrative of election fraud and conspiracy, thematically continuous with the false claims of vote rigging that he had been making for months, was accepted by his base of dedicated supporters. Even the less </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="341" data-term="ardent" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/ardent"><span data-dcnode-id="342" instrument_node="">ardent</span></a><span data-dcnode-id="340" instrument_node=""> among Trump voters were sympathetic to the notion that Biden had somehow cheated to win the presidential election. According to an </span><a class="md-crosslink autoxref" data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/public-opinion-poll"><span data-dcnode-id="339" instrument_node="">opinion poll</span></a><span data-dcnode-id="337" instrument_node=""> taken in mid-November, more than 50 percent of all Republicans believed that Trump had “rightfully” won the election; another poll, in December, found that 77 percent of Republicans believed that there had been widespread election fraud.</span></p><span class="marker p26" data-dcnode-id="334"></span><span class="marker AM26 am-inline" data-dcnode-id="332"></span><span class="marker MOD26 mod-inline" data-dcnode-id="330"></span><span data-dcnode-id="329" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="321"><span data-dcnode-id="328" instrument_node="">As vote counting continued, various groups of radicalized Trump supporters quickly coalesced around the idea that forceful protests and even violent direct action were necessary and justified to stop the counting of fraudulent ballots and prevent Biden from taking office. A short-lived </span><a class="md-crosslink" data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Facebook"><span data-dcnode-id="327" instrument_node="">Facebook</span></a><span data-dcnode-id="325" instrument_node=""> group calling itself “Stop the Steal” was created on November 4 and grew to some 320,000 members in less than 24 hours before the social media company shut it down because of posts containing disinformation and calls for violence. Stop the Steal enthusiasts soon migrated to other (renamed) Facebook groups and other social media </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="323" data-term="venues" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/venues"><span data-dcnode-id="324" instrument_node="">venues</span></a><span data-dcnode-id="322" instrument_node="">, where they repeated and elaborated conspiracy theories about the election and organized on-the-ground demonstrations in several cities, including at polling stations where supposedly fraudulent vote counting was underway.</span></p><span class="marker p27" data-dcnode-id="319"></span><span class="marker AM27 am-inline" data-dcnode-id="317"></span><span class="marker MOD27 mod-inline" data-dcnode-id="315"></span><span data-dcnode-id="314" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="306"><span data-dcnode-id="313" instrument_node="">After the electors from each state cast their votes for president and vice president on December 14, giving Biden an electoral college victory of 306 to 232, Trump and his allies, as well as leaders of Stop the Steal and other pro-Trump groups across the country, turned their attention to the last, formal step in the election of a U.S. president, the ceremonial opening and counting of the electoral votes of each state in a joint session of </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="311" data-term="Congress" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/Congress"><span data-dcnode-id="312" instrument_node="">Congress</span></a><span data-dcnode-id="310" instrument_node=""> presided over by the vice president, </span><a class="md-crosslink autoxref" data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Mike-Pence"><span data-dcnode-id="309" instrument_node="">Mike Pence</span></a><span data-dcnode-id="307" instrument_node="">, on January 6. Some Trump allies reportedly advised the president, incorrectly, that the vice president’s role in the ceremony entailed that Pence would have the constitutional authority to determine which slate of electors, Democratic or Republican, to accept from any given state. A federal lawsuit seeking a judgment to that effect, filed in late December by Texas Republican Rep. Louie Gohmert, was dismissed for lack of standing.</span></p><span class="marker p28" data-dcnode-id="304"></span><span class="marker AM28 am-inline" data-dcnode-id="302"></span><span class="marker MOD28 mod-inline" data-dcnode-id="300"></span><span data-dcnode-id="299" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="291"><span data-dcnode-id="298" instrument_node="">Meanwhile, in several tweets beginning in mid-December, Trump encouraged his supporters to attend a rally—initially planned by a pro-Trump group, Women for America First—in Washington, D.C., on January 6 to protest Congress’s confirmation of Biden’s victory. In one of the tweets, Trump stated, “Be there, will be wild!” At the rally, held at a public park near the White House, a crowd of thousands, including members of </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="296" data-term="white supremacist" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/white%2520supremacist"><span data-dcnode-id="297" instrument_node="">white supremacist</span></a><span data-dcnode-id="295" instrument_node=""> and right-wing militia groups, listened to speeches by Trump’s attorney Rudy Giuliani and Trump’s sons Donald, Jr., and Eric, among others. In his own address to the crowd, Trump repeated well-worn falsehoods and conspiracy theories about election fraud, called on Pence to block Congress’s confirmation of the electoral college vote—declaring that, if Pence failed to act, the rally crowd would not let the confirmation take place (“We’re just not going to let that happen”)—encouraged the crowd to “walk down Pennsylvania Avenue” to the Capitol building, and urged his audience to “fight like hell” or “you’re not going to have a country anymore.” Although Trump did not explicitly direct those in attendance to commit illegal acts, his generally </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="293" data-term="incendiary" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/incendiary"><span data-dcnode-id="294" instrument_node="">incendiary</span></a><span data-dcnode-id="292" instrument_node=""> language suggested to at least some of his supporters that they would be justified in violently attacking Congress to prevent Biden’s victory.</span></p><span class="marker p29" data-dcnode-id="289"></span><span class="marker AM29 am-inline" data-dcnode-id="287"></span><span class="marker MOD29 mod-inline" data-dcnode-id="285"></span><span data-dcnode-id="284" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="272"><span data-dcnode-id="283" instrument_node="">Even before Trump finished his address, a violent mob began </span><span data-dcnode-id="282" id="ref1292966"></span><a class="md-crosslink" data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/United-States-Capitol-attack-of-2021"><span data-dcnode-id="281" instrument_node="">storming the perimeter of the Capitol building</span></a><span data-dcnode-id="279" instrument_node="">, where the House and Senate were then debating a doomed challenge by Republican lawmakers to the slate of electors from Arizona, which had voted for Biden. The mob grew larger as more people arrived from the rally at which Trump had spoken. Capitol police were quickly overwhelmed, and for the next several hours rioters vandalized and looted various parts of the complex, including the Senate chamber and the offices of Democratic House Speaker </span><a class="md-crosslink autoxref" data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Nancy-Pelosi"><span data-dcnode-id="278" instrument_node="">Nancy Pelosi</span></a><span data-dcnode-id="276" instrument_node=""> and others. One rioter was shot and killed by police, and four others, including a Capitol police officer, later died of injuries </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="274" data-term="sustained" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/sustained"><span data-dcnode-id="275" instrument_node="">sustained</span></a><span data-dcnode-id="273" instrument_node=""> in the assault. After the complex was cleared that evening, Congress resumed the confirmation process, and Biden was certified as the winner of the presidential election of 2020 in the early morning hours of January 7. On January 8 Trump was permanently banned from Twitter for having posted tweets before, during, and after the assault that the company deemed to be in violation of its policy against glorification of violence.</span></p><span class="marker p30" data-dcnode-id="270"></span><span class="marker AM30 am-inline" data-dcnode-id="268"></span><span class="marker MOD30 mod-inline" data-dcnode-id="266"></span><span data-dcnode-id="265" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="260"><span data-dcnode-id="264" instrument_node="">Less than one week later the House of Representatives, by a vote of 232 to 197, adopted a single article of impeachment against Trump for “incitement of insurrection,” making him the first president in U.S. history to be </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="262" data-term="impeached" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/impeached"><span data-dcnode-id="263" instrument_node="">impeached</span></a><span data-dcnode-id="261" instrument_node=""> twice. At his Senate trial in February, which beg
