an three weeks after he left office on January 20, there was some debate about whether the Senate could try a president who was no longer in office. Trump was ultimately acquitted after only 57 senators, 10 short of the required two-thirds majority, voted to find him guilty.</span></p><span class="marker p31" data-dcnode-id="258"></span><span class="marker AM31 am-inline" data-dcnode-id="256"></span><span class="marker MOD31 mod-inline" data-dcnode-id="254"></span><span data-dcnode-id="253" instrument_node=""> </span></section><span data-dcnode-id="251" instrument_node=""> </span></section><span data-dcnode-id="249" instrument_node=""> </span><div class="md-sentinel--spy-target" data-dcnode-id="248"></div><section data-dcnode-id="92" data-has-spy="true" data-level="2" id="ref340724"><span data-dcnode-id="247" instrument_node=""> </span><h2 class="h2" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Style and rhetoric</span></h2><span data-dcnode-id="243" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="218"><span data-dcnode-id="242" instrument_node="">Trump’s personal style was unusual, if not unique, among national political figures in modern U.S. history. In part reflecting his experiences as a prominent figure in the </span><a class="md-crosslink autoxref" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/New-York-state"><span data-dcnode-id="241" instrument_node="">New York</span></a><span data-dcnode-id="239" instrument_node=""> real estate industry, Trump was fiercely competitive as well as intensely concerned with demonstrating his success and accomplishments to others. Indeed, from the very beginning of his career, he </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="237" data-term="cultivated" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/cultivated"><span data-dcnode-id="238" instrument_node="">cultivated</span></a><span data-dcnode-id="236" instrument_node=""> and cherished his reputation as a shrewd businessman, an image that often aided him in his real estate dealings and which he eventually exploited as a brand beginning in the 1990s. That concern, however, was accompanied by an unusual sensitivity to criticism and a tendency to retaliate harshly against those who, in his view, had betrayed him or treated him unfairly. His longtime mentor, friend, and legal adviser </span><span data-dcnode-id="235" id="ref1284120"></span><a class="md-crosslink" data-dcnode-id="233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Roy-Cohn"><span data-dcnode-id="234" instrument_node="">Roy Cohn</span></a><span data-dcnode-id="232" instrument_node=""> (who had assisted </span><a class="md-crosslink" data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Joseph-McCarthy"><span data-dcnode-id="231" instrument_node="">Joseph McCarthy</span></a><span data-dcnode-id="229" instrument_node="">’s investigations of alleged </span><a class="md-crosslink" data-dcnode-id="227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/communism"><span data-dcnode-id="228" instrument_node="">communist</span></a><span data-dcnode-id="226" instrument_node=""> subversion in the U.S. government in the 1950s) had encouraged him in the latter regard, </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="224" data-term="counseling" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/counseling"><span data-dcnode-id="225" instrument_node="">counseling</span></a><span data-dcnode-id="223" instrument_node=""> him on numerous occasions never to apologize (because it is a sign of weakness) and always to hit back harder than you are hit, as Trump put the lesson in </span><em data-dcnode-id="220"><span data-dcnode-id="222" id="ref1284119"></span><span data-dcnode-id="221" instrument_node="">The Art of the Deal</span></em><span data-dcnode-id="219" instrument_node="">. As he declared in a tweet in 2012, “When someone attacks me, I always attack back…except 100x more. This has nothing to do with a tirade but rather, a way of life!”</span></p><span class="marker p32" data-dcnode-id="216"></span><span class="marker AM32 am-inline" data-dcnode-id="214"></span><span class="marker MOD32 mod-inline" data-dcnode-id="212"></span><span data-dcnode-id="211" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="180"><span data-dcnode-id="210" instrument_node="">In keeping with his </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="208" data-term="bellicose" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/bellicose"><span data-dcnode-id="209" instrument_node="">bellicose</span></a><span data-dcnode-id="207" instrument_node=""> and confrontational style, Trump in his business career characteristically used blunt language as a weapon against his rivals and adversaries, pointedly insulting or belittling them in the press in retaliation for their real or perceived slights. Perhaps surprisingly, Trump did not significantly alter his style or temper his </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="205" data-term="rhetoric" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/rhetoric"><span data-dcnode-id="206" instrument_node="">rhetoric</span></a><span data-dcnode-id="204" instrument_node=""> upon his entry into politics, notwithstanding the conventional view that success in politics is necessarily a matter of persuasion and compromise rather than “hitting back harder.” The advent of </span><span data-dcnode-id="203" id="ref1261373"></span><a class="md-crosslink" data-dcnode-id="201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Twitter"><span data-dcnode-id="202" instrument_node="">Twitter</span></a><span data-dcnode-id="200" instrument_node=""> in 2006 eventually gave Trump (who joined the service in 2009) a larger platform for his unfiltered political comments, once he began regularly tweeting about politics in about 2011. During the presidential primaries and in the 2015–16 election campaign, Trump frequently used his Twitter account, which had more than 40 million followers, to angrily attack individual Democrats, his Republican rivals and critics, members of the news media, and others in comments that were widely perceived as aggressive, boastful, petty, </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="198" data-term="vindictive" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/vindictive"><span data-dcnode-id="199" instrument_node="">vindictive</span></a><span data-dcnode-id="197" instrument_node="">, juvenile, and vulgar. Trump similarly declined to filter himself in speeches, once even mocking the physical disability of a reporter he disliked. Another unique feature of Trump’s rhetoric was the extremely large number of his public statements that were shown to be false or misleading by the press or by independent fact-checking organizations (</span><a class="md-crosslink" data-dcnode-id="194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/The-Washington-Post"><em data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">The Washington Post</span></em></a><span data-dcnode-id="193" instrument_node=""> counted more than 30,500 such claims during Trump’s presidency). Although Trump’s detractors, including some in the </span><a class="md-crosslink" data-dcnode-id="191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Republican-Party"><span data-dcnode-id="192" instrument_node="">Republican Party</span></a><span data-dcnode-id="190" instrument_node="">, </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="188" data-term="admonished" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/admonished"><span data-dcnode-id="189" instrument_node="">admonished</span></a><span data-dcnode-id="187" instrument_node=""> him for what they considered his undignified behaviour, their criticism only provoked him to make fresh attacks. Despite some speculation after his election that the weight of the presidential office and his eventual need for </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="185" data-term="tangible" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/tangible"><span data-dcnode-id="186" instrument_node="">tangible</span></a><span data-dcnode-id="184" instrument_node=""> political and diplomatic successes would lead him to adopt a more conventional demeanour, his confrontational style and rhetoric continued unchanged during his presidency, and indeed the targets of his abuse only expanded. Trump’s frequent expressions of contempt for Democrats, along with his general unwillingness to compromise with Democratic leaders in Congress, considerably worsened partisan divisions in American politics, according to many analysts. In any event, Trump certainly distinguished himself from previous U.S. presidents by his heavy use of social media. He was the first president to rely on Twitter as a primary means of communication with his political supporters and the press, using it even as a </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="182" data-term="venue" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/venue"><span data-dcnode-id="183" instrument_node="">venue</span></a><span data-dcnode-id="181" instrument_node=""> for semi-official presidential statements.</span></p><span class="marker p33" data-dcnode-id="178"></span><span class="marker AM33 am-inline" data-dcnode-id="176"></span><span class="marker MOD33 mod-inline" data-dcnode-id="174"></span><span data-dcnode-id="173" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="146"><span data-dcnode-id="172" instrument_node="">Trump’s rhetoric also raised serious concerns among members of both parties about its potential damage to Americans’ faith in democratic institutions, particularly freedom of the press and the </span><a class="md-crosslink" data-dcnode-id="170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/rule-of-law"><span data-dcnode-id="171" instrument_node="">rule of law</span></a><span data-dcnode-id="169" instrument_node="">. From early in his presidential campaign, Trump dismissed unfavourable press reports about him as “fake news,” implying that the news organizations in question knowingly published falsehoods. After his election Trump frequently condemned most major news organizations as “the enemy of the American people,” a phrase reminiscent of </span><a class="md-crosslink" data-dcnode-id="167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/totalitarianism"><span data-dcnode-id="168" instrument_node="">totalitarian</span></a><span data-dcnode-id="166" instrument_node=""> societies. The effect of his accusations was to </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="164" data-term="engender" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/engender"><span data-dcnode-id="165" instrument_node="">engender</span></a><span data-dcnode-id="163" instrument_node=""> distrust and hostility among his supporters toward major media outlets other than </span><span data-dcnode-id="162" id="ref1284118"></span><a class="md-crosslink" data-dcnode-id="160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Fox-News-Channel"><span data-dcnode-id="161" instrument_node="">Fox News</span></a><span data-dcnode-id="159" instrument_node="">, which generally supported Trump in its reporting and which he regularly watched. Many political scientists and media scholars also pointed to more general problems, claiming that Trump’s efforts to portray the press as untrustworthy had created broad confusion and uncertainty among the electorate about what was true—or even a passive and resigned attitude about the possibility of ever knowing what was true. They also worried that Trump’s rhetoric would so diminish public confidence in the press that it would cease to serve effectively as a check on governmental power, the role that the founders of the country had </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="157" data-term="envisioned" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/envisioned"><span data-dcnode-id="158" instrument_node="">envisioned</span></a><span data-dcnode-id="156" instrument_node=""> for it. </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="154" data-term="Analogous" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/Analogous"><span data-dcnode-id="155" instrument_node="">Analogous</span></a><span data-dcnode-id="153" instrument_node=""> concerns were raised about Trump’s treatment of his perceived enemies in the </span><a class="md-crosslink autoxref" data-dcnode-id="151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Federal-Bureau-of-Investigation"><span data-dcnode-id="152" instrument_node="">FBI</span></a><span data-dcnode-id="150" instrument_node="">, the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="148" data-term="Justice" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/Justice"><span data-dcnode-id="149" instrument_node="">Justice</span></a><span data-dcnode-id="147" instrument_node=""> Department, and the judiciary. His rhetoric, critics feared, would encourage some people to view those traditionally apolitical and independent institutions as untrustworthy and incapable of carrying out their responsibilities objectively and impartially.</span></p><span class="marker p34" data-dcnode-id="144"></span><span class="marker AM34 am-inline" data-dcnode-id="142"></span><span class="marker MOD34 mod-inline" data-dcnode-id="140"></span><span data-dcnode-id="139" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="100"><span data-dcnode-id="138" instrument_node="">Another controversial feature of Trump’s rhetoric, one that drew especially heavy criticism from </span><a class="md-crosslink autoxref" data-dcnode-id="136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/civil-rights"><span data-dcnode-id="137" instrument_node="">civil rights</span></a><span data-dcnode-id="135" instrument_node=""> organizations, was his regular appeals to racist </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="133" data-term="stereotypes" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/stereotypes"><span data-dcnode-id="134" instrument_node="">stereotypes</span></a><span data-dcnode-id="132" instrument_node="">, his frequent </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="130" data-term="indulgence" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/indulgence"><span data-dcnode-id="131" instrument_node="">indulgence</span></a><span data-dcnode-id="129" instrument_node=""> in racist slurs aimed at non-European minority and immigrant groups, and his refusal to consistently condemn violence aimed at minorities, including several acts of </span><a class="md-crosslink" data-dcnode-id="127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Police-Brutality-in-the-United-States-2064580"><span data-dcnode-id="128" instrument_node="">police brutality</span></a><span data-dcnode-id="126" instrument_node=""> against African Americans that prompted large protests in cities across the United States in the summer of 2020 (</span><em data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">see</span></em><span data-dcnode-id="123" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Black-Lives-Matter"><span data-dcnode-id="122" instrument_node="">Black Lives Matter</span></a><span data-dcnode-id="120" instrument_node="">). Indeed, Trump repeatedly mischaracterized the mostly peaceful demonstrations against police brutality and for racial justice as mob violence by anarchist thugs. Trump’s detractors condemned him for such behaviour and warned that he was stirring up racial </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="118" data-term="animosities" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/animosities"><span data-dcnode-id="119" instrument_node="">animosities</span></a><span data-dcnode-id="117" instrument_node=""> among his supporters and other Americans and encouraging those who already harboured such </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="115" data-term="prejudices" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/prejudices"><span data-dcnode-id="116" instrument_node="">prejudices</span></a><span data-dcnode-id="114" instrument_node=""> to express them more freely in public or even to act on them violently. In the final months of the 2016 presidential campaign, in the period shortly after Trump’s election, and during the first three years of Trump’s presidency, there were notable increases in </span><span data-dcnode-id="113" id="ref1280424"></span><a class="md-crosslink" data-dcnode-id="111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/hate-crime"><span data-dcnode-id="112" instrument_node="">hate crimes</span></a><span data-dcnode-id="110" instrument_node=""> throughout the country—ranging from vandalism and assaults to bomb threats and mass shootings—particularly against Jews, Muslims, African Americans, Latinos, and LGBTQ persons, as indicated in various studies, including the FBI’s annual </span><a class="md-crosslink autoxref" data-dcnode-id="108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/hate-crime"><span data-dcnode-id="109" instrument_node="">hate crime</span></a><span data-dcnode-id="107" instrument_node=""> report. Although the validity and </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="105" data-term="implications" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/implications"><span data-dcnode-id="106" instrument_node="">implications</span></a><span data-dcnode-id="104" instrument_node=""> of such statistics were disputed, many researchers and journalists agreed that Trump’s rhetoric had changed the country’s </span><a class="md-crosslink autoxref" data-dcnode-id="102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/political-culture"><span data-dcnode-id="103" instrument_node="">political culture</span></a><span data-dcnode-id="101" instrument_node=""> by making the public expression of hate-based and extremist attitudes more acceptable. Trump himself, meanwhile, denied that his speeches had had any such effect, proclaiming on more than one occasion that he was “the least racist person” in the world.</span></p><span class="marker p35" data-dcnode-id="98"></span><span class="marker AM35 am-inline" data-dcnode-id="96"></span><span class="marker MOD35 mod-inline" data-dcnode-id="94"></span><span data-dcnode-id="93" instrument_node=""> </span></section><span data-dcnode-id="91" instrument_node=""> </span></section><span data-dcnode-id="89" instrument_node=""> </span><span class="md-signature" data-dcnode-id="86"><a data-dcnode-id="87" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/editor/brian-duignan/6469"><span data-dcnode-id="88" instrument_node="">Brian Duignan</span></a></span><span data-dcnode-id="85" instrument_node=""> </span><span class="marker end-of-content" data-dcnode-id="83"></span><span class="marker after-article" data-dcnode-id="81"></span></div><span data-dcnode-id="79" instrument_node="">
