</span><h1 class="jeg_post_title" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">What Was Donald Trump’s GPA?</span></h1><span data-dcnode-id="1424" instrument_node="">
</span><div class="jeg_meta_container" data-dcnode-id="1399"><div class="jeg_post_meta jeg_post_meta_1" data-dcnode-id="1401"><span data-dcnode-id="1423" instrument_node="">
</span><div class="meta_left" data-dcnode-id="1406"><span data-dcnode-id="1422" instrument_node="">
</span><div class="jeg_meta_author" data-dcnode-id="1414"><span data-dcnode-id="1421" instrument_node="">
</span><span class="meta_text" data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">by</span></span><span data-dcnode-id="1418" instrument_node="">
</span><a data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//celebanswers.com/author/sandrar/"><span data-dcnode-id="1417" instrument_node="">Sandra Robinson</span></a><span data-dcnode-id="1415" instrument_node=""> </span></div><span data-dcnode-id="1413" instrument_node="">
</span><div class="jeg_meta_date" data-dcnode-id="1408"><span data-dcnode-id="1412" instrument_node="">
</span><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//celebanswers.com/what-was-donald-trumps-gpa/"><span data-dcnode-id="1411" instrument_node="">2021/03/23</span></a><span data-dcnode-id="1409" instrument_node="">

</span><div class="jeg_ad jeg_article jnews_content_top_ads" data-dcnode-id="1394"><div class="ads-wrapper" data-dcnode-id="1395"></div></div><span data-dcnode-id="1393" instrument_node="">

</span><div class="jeg_share_button share-float jeg_sticky_share clearfix share-monocrhome" data-dcnode-id="1388" style="position: relative; overflow: visible; box-sizing: border-box; min-height: 1px;"><span data-dcnode-id="1391" instrument_node="">
</span><div class="jegStickyHolder" data-dcnode-id="1389"><div class="theiaStickySidebar" data-dcnode-id="1390" style="padding-top: 0px; padding-bottom: 1px; position: static;"></div></div></div><span data-dcnode-id="1387" instrument_node="">
</span><div class="content-inner" data-dcnode-id="268"><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1382"><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//celebanswers.com/category/donald-trump/"><span data-dcnode-id="1385" instrument_node="">Donald Trump</span></a><span data-dcnode-id="1383" instrument_node=""> is an all-American businessman, media personality, and real estate tycoon who served as the president of the United States from the years 2017 to 2021. He is known for his divisive views on political topics, outlandish personal beliefs, unprovoked Twitter rants, and for keeping his educational achievements — or lack thereof — a closely guarded secret.&nbsp;&nbsp;</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1378"><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Based on the fact that he did not graduate with honors from the Wharton School of the University of Pennsylvania, Donald Trump had a GPA of 3.40 or lower. The 45th president of the United States has threatened legal action against any of his former schools that dare speak of his GPA or SAT scores.</span></strong></p><span data-dcnode-id="1377" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1373"><img alt="" class="wp-image-12137" data-dcnode-id="1376" data-pin-no-hover="true" height="682" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//celebanswers.com/wp-content/uploads/2021/03/shutterstock_180961934-1024x682.jpg&amp;raw" srcset="https://celebanswers.com/wp-content/uploads/2021/03/shutterstock_180961934-1024x682.jpg 1024w, https://celebanswers.com/wp-content/uploads/2021/03/shutterstock_180961934-300x200.jpg 300w, https://celebanswers.com/wp-content/uploads/2021/03/shutterstock_180961934-768x511.jpg 768w, https://celebanswers.com/wp-content/uploads/2021/03/shutterstock_180961934-1536x1022.jpg 1536w, https://celebanswers.com/wp-content/uploads/2021/03/shutterstock_180961934-2048x1363.jpg 2048w, https://celebanswers.com/wp-content/uploads/2021/03/shutterstock_180961934-750x499.jpg 750w, https://celebanswers.com/wp-content/uploads/2021/03/shutterstock_180961934-1140x759.jpg 1140w" width="1024"><figcaption data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Donald Trump | Christopher Halloran / Shutterstock.com</span></figcaption></figure><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1371" instrument_node="">Donald has often boasted about his attendance at the Wharton School of the University of Pennsylvania and has claimed that he is “like, really smart”, and has even </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abcnews.go.com/Politics/president-trump-called-smart-six-times-before/story%3Fid%3D52209712" rel="noopener" target="_blank"><span data-dcnode-id="1370" instrument_node="">described his level of intelligence</span></a><span data-dcnode-id="1368" instrument_node=""> as “not smart, but genius…and a very stable genius at that”. But is the 45th president of the United States really as smart as he would very much like for you to believe?&nbsp;</span></p><span data-dcnode-id="1366" instrument_node="">
</span><h2 data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Donald Trump’s GPA</span></h2><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Donald claims that he graduated from the Wharton School at the University of Pennsylvania first in his class, but this is simply untrue and decidedly far-fetched. In reality, Donald didn’t even graduate with honors.&nbsp;</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Since the Wharton School bases honors on GPA alone, Donald’s GPA had to have been a 3.40 or lower. His exact GPA will never be revealed as his former lawyer, Michael Cohen, admitted to threatening all of Donald’s high schools, colleges, and even the College Board with legal action if his academic records were ever released to the public.</span></p><div class="jnews_inline_related_post_wrapper right" data-dcnode-id="1266"><span data-dcnode-id="1357" instrument_node="">

</span><h2 data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Donald Trump’s Schooling&nbsp;</span></h2><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Donald’s educational journey started at Kew-Forest School, a private school in Queens, New York, which he attended from kindergarten through to the seventh grade. By the time he turned 13 years old, his behavior had become unruly and his family sent him away to the New York Military Academy private boarding school.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">His father, Fred Trump, </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/trump-high-school-photos-2017-3%3FIR%3DT" rel="noopener" target="_blank"><span data-dcnode-id="1046" instrument_node="">defended his decision</span></a><span data-dcnode-id="1044" instrument_node=""> to send Donald to boarding school by saying that he hoped “the discipline of the school would channel his energy in a positive manner.” While a student at the New York Military Academy, Donald was voted as the “Ladies Man” of his class, was a member of the soccer team, the bowling team, the basketball team, and was the captain of the baseball team.&nbsp;&nbsp;</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">In 1964, Donald was rejected from the University of Southern California and instead enrolled at Fordham University as his sister Maryanne said “that’s where he got in”. During his two-year stint at the school, he played squash and dodged a military draft before </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fordhamobserver.com/30994/news/inside-trumps-days-at-fordham/" rel="noopener" target="_blank"><span data-dcnode-id="1040" instrument_node="">transferring to the University of Pennsylvania</span></a><span data-dcnode-id="1038" instrument_node=""> because “I decided that as long as I had to be in college, I might as well test myself against the best.”</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Donald graduated from the Wharton School of the University of Pennsylvania in May of 1968 with a Bachelor of Science in Economics, with a specialty in finance. It is widely believed that Donald only got into the school because his brother’s best friend, James A. Nolan, was the admissions officer at the time.&nbsp;</span></p><span data-dcnode-id="1033" instrument_node="">

</span><h2 data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Donald Trump on Education</span></h2><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">Though he may be somewhat ashamed of his own educational achievements, Donald has made numerous contributions to education as a whole. He has been </span><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fordhaminstitute.org/national/commentary/president-donald-trump-quotes-about-education" rel="noopener" target="_blank"><span data-dcnode-id="803" instrument_node="">quoted</span></a><span data-dcnode-id="801" instrument_node=""> saying “we need to fix our broken education system!”, “our schools aren’t safe, our kids aren’t learning”, and “Comprehensive education dissolves the lines between knowing too much and knowing too little on a variety of subjects — subjects that are necessary for success.”&nbsp;</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">Though it was far from his primary priority, Donald did spend some of his time as president passing education policy amendments to better the education system as well as the children of America. During his time in office, Trump </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/celeb/donald_trump_education.htm" rel="noopener" target="_blank"><span data-dcnode-id="797" instrument_node="">publicly opposed</span></a><span data-dcnode-id="795" instrument_node=""> the Department of Education, as well as programs that “take decisions away from parents” including Common Core, Race to the Top, and No Child Left Behind.&nbsp;</span></p><span data-dcnode-id="793" instrument_node="">
