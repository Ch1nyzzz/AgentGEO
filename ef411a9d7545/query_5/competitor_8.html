</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">The 2020 election cycle is coming to an end: on Tuesday Americans will cast their votes (if they haven't already done it by mail). 2020 in itself was quite unpredictable. One thing for certain is that social media played a major role in the elections this year.&nbsp;</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1566" instrument_node="">The global pandemic pushed more and more of our&nbsp;activities to the online realm, and presidential election campaigns&nbsp;were not an exception.&nbsp;The coronavirus pandemic has forced candidates off the campaign trail and turned the 2020 presidential race into a social media one. All the canvassing and rallying had to be moved to social media, candidates' websites, and apps. The team who tackled this task better&nbsp;has a bigger chance of&nbsp;winning. We've already </span><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/blog/who-will-win-elections-2020/" target="_blank"><span data-dcnode-id="1565" instrument_node="">tried to predict the winner based on social listening data</span></a><span data-dcnode-id="1563" instrument_node="">, but we haven't done a proper social media strategy examination.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1560" instrument_node="">We at Awario love a good social media marketing analysis: we wrote about the </span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/blog/effective-marketing-campaigns-2019/"><span data-dcnode-id="1559" instrument_node="">best social media campaigns</span></a><span data-dcnode-id="1557" instrument_node=""> and the </span><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/blog/social-issues-marketing/"><span data-dcnode-id="1556" instrument_node="">most controversial social media campaigns</span></a><span data-dcnode-id="1554" instrument_node=""> multiple times. Both Biden and Trump put a lot of effort into winning over&nbsp;their respective opponent. Social media marketers could learn a lot from these two, especially, how to adapt your digital marketing to such a formidable change as a global pandemic.&nbsp;</span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">We analyzed the social media strategies of Joe Biden and Donald Trump and derived valuable tips that can be applied to any social media marketing campaign.&nbsp;We broke down how the candidates used their own social media channels, influencers,&nbsp;advertising and other social media marketing channels to convince people to tick off their names in the ballot. Whether you're a social media manager in a small digital agency or a man&nbsp;who is going to represent one of the most powerful countries in the world, these tips will be extremely helpful.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1546"><span class="token-widget" data-dcnode-id="1547"><span class="token-data" data-dcnode-id="1548"></span></span></p><div class="article__width" data-dcnode-id="1504"><span data-dcnode-id="1545" instrument_node="">

</span><p data-dcnode-id="1502"></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Obviously, the main goal of both candidates is the same — to convince more people to vote for them. However, the conditions with which Biden and Trump started their social media campaigns are rather different. You'll see that while they sometimes used similar tactics at first glance, the two&nbsp;campaigns differ in messaging, how they were conveyed, and what channels were used. Both campaigns are also invaluable learning sources for social media marketers!</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">So without further ado, let's start with the Democratic candidate Joe Biden.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><h2 data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Joe Biden: social media campaign analysis</span></h2><span data-dcnode-id="1492" instrument_node="">

</span><p data-dcnode-id="1425"></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1423" instrument_node="">When doing </span><a data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/blog/social-listening-competitor-analysis/"><span data-dcnode-id="1422" instrument_node="">competitor analysis</span></a><span data-dcnode-id="1420" instrument_node=""> on social media, the first and most obvious thing to do is to compare the number of followers. If we compare Joe Biden's initial reach with Trump, it was much smaller.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Trump had&nbsp;more than&nbsp;30 million followers on Facebook&nbsp;and&nbsp;85 million on Twitter, while Biden had&nbsp;just under&nbsp;3 million on Facebook&nbsp;and&nbsp;just over 9 million&nbsp;on Twitter. As you see, the challenge posed to Biden was to grow his audience and at the same time reach as many people as he could without an existent social media following.&nbsp;</span></p><span data-dcnode-id="1415" instrument_node="">
</span><div class="article__width" data-dcnode-id="1400"><span data-dcnode-id="1414" instrument_node="">
</span><blockquote class="blockquote" data-dcnode-id="1402"><span data-dcnode-id="1413" instrument_node="">
</span><div class="blockquote__text" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">“Vice President Biden and Trump have very different challenges right now. Trump needs to hold his base ... and Vice President Biden needs to define and in a lot of ways introduce himself to you new voters, and potential supporters.”</span></div><span data-dcnode-id="1410" instrument_node="">
</span><div class="blockquote__author" data-dcnode-id="1404"><span data-dcnode-id="1409" instrument_node="">
</span><div data-dcnode-id="1406"><b data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Tara McGowan, former digital director for the Democratic super PAC Priorities USA</span></b></div><span data-dcnode-id="1405" instrument_node="">
</span></div><span data-dcnode-id="1403" instrument_node="">
</span></blockquote><span data-dcnode-id="1401" instrument_node="">
</span></div><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">Just as everyone else, Biden had to adjust his strategy to the new COVID-19 reality. Hundreds of Biden volunteers participated in a training program focused on digital organizing and creating online content that bolsters Biden's message. Ryan Wright, a Biden volunteer in northwest Ohio, participated in the training and said the campaign was focused on converting the foot soldiers who would normally be phone-banking and knocking on doors into </span><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">digital </span></strong><span data-dcnode-id="1395" instrument_node="">organizers who can make contacts with people in their neighborhoods and communities.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">The message the campaign staff decided to focus on was the one of love and positivity.&nbsp;Here's an example of one of the videos made for social media that highlight Biden's positive qualities, whereas&nbsp;Trump's videos mainly focus on the disadvantages of his opponents.</span></p><span data-dcnode-id="1390" instrument_node="">

</span><h3 data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Main channels&nbsp;</span></h3><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Twitter, Instagram, Facebook, TikTok, YouTube, Cameo, online games, Reddit.&nbsp;</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Given his relatively small pool of followers, Biden had to use all the channels available to him to quickly spread his message. In addition to using his own social media platforms, his team decided to focus&nbsp;heavily on influencers.&nbsp;</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Lis Smith, the social media strategist, wrote that Biden must be "digitally omnipresent" -- with Biden supporters and celebrities blanketing local media and social networks. That, Smith wrote, would allow Biden -- whose own social media channels feature relatively small followings -- to reach broader audiences via more popular channels. "He can appeal to very different fan bases; celebrity supporters like them can bring the campaign's message to nontraditional and nonpolitical outlets that might otherwise be disinclined to get into the weeds of an election -- sports-talk radio, Top 40 stations, and gossip sites," Smith wrote.&nbsp;</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Biden’s outreach goes beyond mainstream apps as well. In September, the campaign debuted Biden-Harris campaign signs in Animal Crossing, the&nbsp;video game that became wildly popular on social media&nbsp;at the start of the pandemic. Some celebrities, like Andy Cohen and Dulé Hill, are fundraising for the campaign on Cameo, the video app, which allows users to post fan-requested video messages in exchange for donations.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><div class="article-image article__width" data-dcnode-id="1135"><noscript data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">&lt;img class="article-image__img" src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/animal%20crossing%20biden.jpg" srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-450x.jpg 450w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-700x.jpg 700w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-950x.jpg 950w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-1200x.jpg 1200w" width="1200" height="800" alt="" decoding="async" sizes="(max-width: 450px) 200px, (max-width: 700px) 450px, (max-width: 950px) 700px, 1200px"&gt;</span></noscript><img alt="" class="article-image__img lazyloaded" data-dcnode-id="1140" data-sizes="(max-width: 450px) 200px, (max-width: 700px) 450px, (max-width: 950px) 700px, 1200px" data-src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/animal%20crossing%20biden.jpg" data-srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-450x.jpg 450w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-700x.jpg 700w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-950x.jpg 950w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-1200x.jpg 1200w" decoding="async" height="800" sizes="(max-width: 450px) 200px, (max-width: 700px) 450px, (max-width: 950px) 700px, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/upload/blog/elections-campaign-social-media-analysis/animal%2520crossing%2520biden.jpg&amp;raw" srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-450x.jpg 450w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-700x.jpg 700w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-950x.jpg 950w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/animal-crossing-biden-1200x.jpg 1200w" width="1200"><span data-dcnode-id="1139" instrument_node="">
</span><div class="caption" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Biden's campaign messaging in Animal Crossing</span></div><span data-dcnode-id="1136" instrument_node="">
</span></div><span data-dcnode-id="1134" instrument_node="">
</span><h4 data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Takeaway lesson:</span></h4><span data-dcnode-id="1131" instrument_node="">
</span><div class="article__width" data-dcnode-id="1114"><span data-dcnode-id="1130" instrument_node="">
</span><ul class="unordered-list" data-dcnode-id="1116"><span data-dcnode-id="1129" instrument_node="">
</span><li data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Find what makes you different and make it your brand. Biden didn't try to take Trump's smear tactics but instead turned his campaign in a completely different direction.</span></p><span data-dcnode-id="1125" instrument_node="">
</span></li><span data-dcnode-id="1123" instrument_node="">
</span><li data-dcnode-id="1118"><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Use every channel that is available to you, but don't forget about the specifics of their respective audience. Messages transferred on Facebook and in Animal Crossing are not the same since the audience is different.</span></p><span data-dcnode-id="1119" instrument_node="">
</span></li><span data-dcnode-id="1117" instrument_node="">
</span></ul><span data-dcnode-id="1115" instrument_node="">
</span></div><span data-dcnode-id="1113" instrument_node="">
</span><h3 data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Influencers</span></h3><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Thus,&nbsp;one of the main channels the campaign used to reach voters were influencers of different size: from real-life celebrities&nbsp;to nano-influencers.&nbsp;“We’re bringing their fan base into the campaign,” explains Adrienne&nbsp;Elrod, Biden's digital strategist. “And that is really allowing us to be more specific and more targeted in our approach and in our reach.”</span></p><span data-dcnode-id="1107" instrument_node="">
</span><div class="general__container article__width" data-dcnode-id="1099"><span data-dcnode-id="1106" instrument_node="">
</span><div class="color__container block-grey" data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">According to researchers from the University of Texas, nano-influencers are people who might have just a few thousand followers but speak to a very specific community, for example, an animal rights activist or a mommy blogger.</span></p><span data-dcnode-id="1102" instrument_node="">
</span></div><span data-dcnode-id="1100" instrument_node="">
</span></div><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">The influencers who collaborated on the campaign could be divided into several categories:</span></p><span data-dcnode-id="1095" instrument_node="">
</span><div class="article__width" data-dcnode-id="1078"><span data-dcnode-id="1094" instrument_node="">
</span><ul class="unordered-list" data-dcnode-id="1080"><span data-dcnode-id="1093" instrument_node="">
</span><li data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Celebrities (Ariana Grande, Dwayne the Rock Johnson, and so on)</span></li><span data-dcnode-id="1090" instrument_node="">
</span><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Internet macro-influencers with several hundred million followers, most of them are lifestyle bloggers or content producers.&nbsp;</span></li><span data-dcnode-id="1087" instrument_node="">
</span><li data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Micro- and nano-influencers speaking to a specific community.</span></li><span data-dcnode-id="1084" instrument_node="">
</span><li data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Big left-wing meme pages.</span></li><span data-dcnode-id="1081" instrument_node="">
</span></ul><span data-dcnode-id="1079" instrument_node="">
</span></div><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">One of the formats Biden's team developed allows influencers' followers to learn more about the candidate: He sits at home in a casual milieu, while the influencer asks him open-ended questions that allow Biden to talk off the cuff about any given topic. These interviews are often streamed on Instagram Live, but they also pop up on Facebook and YouTube.&nbsp;While they are not quite advertisements or endorsement videos, they’re not journalism, either. The goal appears to be as simple as engaging with influencers, people who have credibility with particular audiences, and getting those influencers’ audiences thinking about Biden.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1073" instrument_node="">As for popular meme pages, Occupy Democrats became an alternative to the right-wing social media ecosystem that ardently promotes Trump.&nbsp;In the past three months, Biden’s official campaign page has gotten about 8.5 million interactions (reactions, shares, and comments) on posts mentioning Trump, according to data from the Facebook-owned tool </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/recode/21419328/facebook-conservative-bias-right-wing-crowdtangle-election" target="_blank"><span data-dcnode-id="1072" instrument_node="">CrowdTangle</span></a><span data-dcnode-id="1070" instrument_node="">. In comparison, Occupy Democrats has gotten almost 90 million interactions on posts mentioning Trump. The page is not directly managed by&nbsp;Biden's team, but, in the words of the page's founder Rafael Rivero,&nbsp;he’s “plugged in” with the Biden campaign.&nbsp;</span></p><span data-dcnode-id="1068" instrument_node="">
</span><h4 data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Takeaway lessons:</span></h4><span data-dcnode-id="1065" instrument_node="">
</span><div class="article__width" data-dcnode-id="1054"><span data-dcnode-id="1064" instrument_node="">
</span><ul class="unordered-list" data-dcnode-id="1056"><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">If your own social media channels are relatively small, you can turn to influencers to expand your outreach.</span></li><span data-dcnode-id="1060" instrument_node="">
</span><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Influencers come in different sizes and forms: depending on your target audience you may work with nano-influencers who will be much more effective than Internet celebrities and save your budget.&nbsp;</span></li><span data-dcnode-id="1057" instrument_node="">
</span></ul><span data-dcnode-id="1055" instrument_node="">
</span></div><span data-dcnode-id="1053" instrument_node="">
</span><h3 data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Advertising</span></h3><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">The Democratic candidate's team spent about $60 million on digital ads, including&nbsp;about $9&nbsp;million on Facebook ads.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><div class="article-image article__width" data-dcnode-id="1043"><noscript data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">&lt;img class="article-image__img" src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/biden%20facebook%20ads.jpg" srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/biden-facebook-ads-303x.jpg 303w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/biden-facebook-ads-553x.jpg 553w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/biden-facebook-ads-803x.jpg 803w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/biden-facebook-ads-1053x.jpg 1053w" width="1053" height="359" alt="" decoding="async" sizes="(max-width: 303px) 53px, (max-width: 553px) 303px, (max-width: 803px) 553px, 1053px"&gt;</span></noscript><img alt="" class="article-image__img lazyload" data-dcnode-id="1044" data-sizes="(max-width: 303px) 53px, (max-width: 553px) 303px, (max-width: 803px) 553px, 1053px" data-src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/biden%20facebook%20ads.jpg" data-srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/biden-facebook-ads-303x.jpg 303w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/biden-facebook-ads-553x.jpg 553w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/biden-facebook-ads-803x.jpg 803w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/biden-facebook-ads-1053x.jpg 1053w" decoding="async" height="359" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/upload/blog/elections-campaign-social-media-analysis/biden%2520facebook%2520ads.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201800%201818%22%3E%3C/svg%3E" width="1053"></div><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Biden's ads, just like his organic social media posts, mostly focus on his program showing him in a positive light and sharing personal experience. For example, in this ad campaign centered around healthcare, Biden talks about the car accident that took the lives of his wife and daughter and left his two sons injured. He emphasizes how the existing healthcare system helped his sons.&nbsp;</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1002"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1003" frameborder="0" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Qzj2mo2Q57I&amp;raw" width="560"><html data-cast-api-enabled="true" data-dcnode-id="1005" dir="ltr" lang="en"><head data-dcnode-id="1014"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="1035" name="viewport"/><link data-dcnode-id="1030" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="ILfhPuGhREcA9IqH66xn/A" rel="stylesheet"/><title data-dcnode-id="1017">YouTube</title><link data-dcnode-id="1016" href="https://www.youtube.com/watch?v=Qzj2mo2Q57I" rel="canonical"/><link data-dcnode-id="1015" data-loaded="true" href="https://www.youtube.com/s/player/534c466c/www-player.css" id="css-335067421" nonce="L+Q826Fl+buB48F46oHNfA" rel="stylesheet"/></meta></head><body class="date-20220423 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="1006" dir="ltr"><div data-dcnode-id="1013" id="player" style="width: 100%; height: 100%;"></div><noscript data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=Qzj2mo2Q57I" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">On Facebook, the candidate is targeting older people, which is a smart move: the elderly are more likely to vote, but also the younger audience neglects Facebook in favour of other platforms.&nbsp;</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">The leader of the Democrats has a clear strategy in place: Target older people, those aged 45 and above. According to Bully Pulpit Interactive, the Democratic communications firm, roughly half of their audience has been in the 45–64 age range. An estimated 32.7% has reached users aged 65 and up.&nbsp;&nbsp;His opponent is producing similar results. Another notable difference is that&nbsp;Biden’s campaign targets women at roughly 3 to 2 – for every $2 they spend on men, they spend $3 on women. Biden’s spending reflects the Democratic Party’s gender dynamics. Women are&nbsp;more likely to identify as Democrat&nbsp;than Republican.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Nearly all of Trump’s and Biden’s campaigns’ online advertising involves some sort of call to action, urging the ad’s viewers to do something – such as give money, sign a petition, answer a poll, sign up to get emails, or watch the latest video ad. Between June 1 and September 13 Biden’s calls to action cost $25.2 million, or 67% of his online ad spending.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Overall, Biden's campaign used demographic and&nbsp;geographic data to make sure they reach voters with specific messages catered to their demographic group.&nbsp;</span></p><span data-dcnode-id="989" instrument_node="">
</span><h4 data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Takeaway lessons:&nbsp;</span></h4><span data-dcnode-id="986" instrument_node="">
</span><div class="article__width" data-dcnode-id="963"><span data-dcnode-id="985" instrument_node="">
</span><ul class="unordered-list" data-dcnode-id="965"><span data-dcnode-id="984" instrument_node="">
</span><li data-dcnode-id="973"><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="982" instrument_node="">Know </span><strong data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">your </span></strong><span data-dcnode-id="979" instrument_node="">audience and the </span><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">platforms</span></strong><span data-dcnode-id="976" instrument_node="">' audiences. It doesn't make sense to use Facebook to reach Zoomers with your ads because they simply don't use it anymore. Use the plethora of targeting options social media provide to deliver specific ads to specific audiences.</span></p><span data-dcnode-id="974" instrument_node="">
</span></li><span data-dcnode-id="972" instrument_node="">
</span><li data-dcnode-id="967"><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Don't forget about CTA! Your ads should encourage people to take action, go to your website, make a purchase, or register to vote.&nbsp;</span></p><span data-dcnode-id="968" instrument_node="">
</span></li><span data-dcnode-id="966" instrument_node="">
</span></ul><span data-dcnode-id="964" instrument_node="">
</span></div><span data-dcnode-id="962" instrument_node="">
</span><h2 data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Donald Trump: social media campaign analysis</span></h2><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="955"><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Main hashtags: </span></strong><span data-dcnode-id="956" instrument_node="">#trump2020&nbsp;#voterepublican&nbsp;#maga #kag #maga2020 #kaga2020</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="947"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Social media mentions:&nbsp;</span></strong><span data-dcnode-id="951" instrument_node="">5.2 million since June 1 (according to </span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/"><span data-dcnode-id="950" instrument_node="">Awario</span></a><span data-dcnode-id="948" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">If&nbsp;this election cycle was a running competition, Trump would probably be starting about 200 meters ahead of Joe Biden. You've already caught the mention of a vast network of right-wing personalities, accounts, and channels built&nbsp;on social media in this blog post. This network is Donald Trump's main bargaining chip in his social media campaign, but it's not the only one.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">In addition to that, Trump's digital team boasts more than 100 staffers and has been active since 2016, raising funds, engaging with their supporters, and overall excelling in social media. Moreover, social media platforms work to Trump's advantage: the algorithms give preference to sensational posts that evoke a lot of emotions, and a lot of right-wing content matches this description perfectly.&nbsp;</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">On an average day, President Donald Trump sends about 14 posts to the 28 million Facebook followers of his campaign account. His Democratic rival, Joe Biden, delivers about half that many posts to an audience of just 2 million. The president has spent years cultivating a digital “army” of meme makers and political influencers who retweet campaign messages hundreds of times daily.&nbsp;</span></p><span data-dcnode-id="937" instrument_node="">
</span><h3 data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Main channels</span></h3><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Twitter, Instagram, Facebook, TikTok, YouTube, Cameo, online games, Reddit, Official Trump 2020 App, Twitch.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">This would mean that the president has this social media election campaign in a bag, but there are some caveats. Perhaps, the main obstacle to social media success is the social media platforms themselves. Donald Trump loves Twitter, but the feeling is not really mutual — his tweets are regularly marked as misinformation or hateful content by Twitter's safety and fact-checking departments. The same goes for Facebook and Instagram, although&nbsp;the president uses them much more sparingly.&nbsp;</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">This was one of the reasons why Trump's team decided to concentrate on their own app that aggregates all the social media content, website, and video in one place. The app is social in nature — it's not just a feed with content. You can find and connect to other Trump supporters on there.&nbsp;</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">The app is integrated with social media and gamified: you get points for sharing and engaging with Trump's social media posts. You can later exchange these points for campaign merch or even a photo with the president, but we all know that </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/blog/gamification/"><span data-dcnode-id="923" instrument_node="">gamification works</span></a><span data-dcnode-id="921" instrument_node=""> even when there's no valuable prize to win.&nbsp;</span></p><span data-dcnode-id="919" instrument_node="">
</span><div class="article-image article__width" data-dcnode-id="915"><noscript data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">&lt;img class="article-image__img" src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/email_notifications.png" srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/email_notifications-499x.png 499w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/email_notifications-749x.png 749w" width="749" height="482" alt="" decoding="async" sizes="(max-width: 499px) 249px, 749px"&gt;</span></noscript><img alt="" class="article-image__img lazyload" data-dcnode-id="916" data-sizes="(max-width: 499px) 249px, 749px" data-src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/email_notifications.png" data-srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/email_notifications-499x.png 499w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/email_notifications-749x.png 749w" decoding="async" height="482" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/upload/blog/elections-campaign-social-media-analysis/email_notifications.png&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201800%201818%22%3E%3C/svg%3E" width="749"></div><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="913" instrument_node="">One of the journalists investigating pro-Trump Facebook </span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vox.com/recode/21419328/facebook-conservative-bias-right-wing-crowdtangle-election" target="_blank"><span data-dcnode-id="912" instrument_node="">pointed out</span></a><span data-dcnode-id="910" instrument_node=""> how closed from the other sources this network is. With the app, the team is trying to create a whole different world, concentrating everything politics-related in one place managed by Trump's digital team.</span></p><span data-dcnode-id="908" instrument_node="">
</span><h4 data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Takeaway lessons:&nbsp;</span></h4><span data-dcnode-id="905" instrument_node="">
</span><div class="article__width" data-dcnode-id="891"><span data-dcnode-id="904" instrument_node="">
</span><ul class="unordered-list" data-dcnode-id="893"><span data-dcnode-id="903" instrument_node="">
</span><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Create your own social media community. Ideally, your followers should feel like they are in a like-minded community&nbsp;when they join your Facebook group or go to your Instagram profile.&nbsp;</span></li><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">Gamify your social media! Of course, not all brands have the resources to create a stand-alone app to consolidate all our customers, but you can </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/blog/how-to-host-a-social-media-contest/"><span data-dcnode-id="898" instrument_node="">host social media contests</span></a><span data-dcnode-id="896" instrument_node=""> from time to time as an alternative.</span></li><span data-dcnode-id="894" instrument_node="">
</span></ul><span data-dcnode-id="892" instrument_node="">
</span></div><span data-dcnode-id="890" instrument_node="">
</span><h3 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Influencers</span></h3><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Donald Trump didn't have to develop a brand new influencer marketing strategy for this campaign since he already had a pool of notable right-wing personalities amplifying his messages. Additionally, Trump is a macro-influencer in his own right: his posts are seen by millions of people. However, he did take some efforts to reach new audience.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">The focal point of Trump's social media campaign is Team Trump Online! which is a nightly live broadcast streamed on Facebook, Twitter, Instagram, and Twitch. The president himself is a rare host of the stream, instead, it's usually hosted by a plethora of influencers and politicians including Trump's daughter-in-law Lara, Mile Pence, Ben Shapiro, and others.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">Trump is actively encouraging his network of influencers to create more content, and I'm not just talking about big names. He frequently retweets meme accounts and smaller influencers to boost their posts.&nbsp;The president’s steady retweets of everyday users helps fans feel connected to him, </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/32eb6933d8229902f3954115529977bb" target="_blank"><span data-dcnode-id="879" instrument_node="">says </span></a><span data-dcnode-id="877" instrument_node="">Logan Cook, a Kansas internet meme maker whose work Trump has regularly promoted on his social media accounts.&nbsp;“President Trump’s team, they’re blending in with social media culture,” said Cook.</span></p><span data-dcnode-id="875" instrument_node="">
</span><div class="article-image article__width" data-dcnode-id="867"><noscript data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">&lt;img class="article-image__img" src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/trump%20retweet.jpg" srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/trump-retweet-342x.jpg 342w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/trump-retweet-592x.jpg 592w" width="592" height="555" alt="" decoding="async" sizes="(max-width: 342px) 92px, 592px"&gt;</span></noscript><img alt="" class="article-image__img lazyload" data-dcnode-id="872" data-sizes="(max-width: 342px) 92px, 592px" data-src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/trump%20retweet.jpg" data-srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/trump-retweet-342x.jpg 342w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/trump-retweet-592x.jpg 592w" decoding="async" height="555" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/upload/blog/elections-campaign-social-media-analysis/trump%2520retweet.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201800%201818%22%3E%3C/svg%3E" width="592"><span data-dcnode-id="871" instrument_node="">
</span><div class="caption" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Trump's network retweeting a social media user with less than 20,000 followers</span></div><span data-dcnode-id="868" instrument_node="">
</span></div><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Besides, Trump is actively using platforms popular with younger audiences such as TikTok where you can find "hype houses" that unite several major TikTok influencers: the Conservative Hype House has 1.5 million followers and the Republican Hype House has nearly 900,000.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Overall, Donald Trump's influencer strategy relies on this above-mentioned network of influential conservatives but also amplified the voices of smaller social media users who create pro-Trump content.&nbsp;</span></p><span data-dcnode-id="860" instrument_node="">
</span><h4 data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Takeaway lessons:</span></h4><span data-dcnode-id="857" instrument_node="">
</span><div class="article__width" data-dcnode-id="843"><span data-dcnode-id="856" instrument_node="">
</span><ul class="unordered-list" data-dcnode-id="845"><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">Building relationships with social media influencers requires time. To create as powerful of a network as Trump's you need to contribute a lot of time to </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/blog/how-to-market-through-influencers/"><span data-dcnode-id="853" instrument_node="">influencer marketing</span></a><span data-dcnode-id="851" instrument_node="">.&nbsp;</span></li><span data-dcnode-id="849" instrument_node="">
</span><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Engage with your audience. As you see, Trump's followers do appreciate how much he engages with his supporters. Even when you're not trying to win a presidential race, engaging with your audience gives you many brownie points.&nbsp;</span></li><span data-dcnode-id="846" instrument_node="">
</span></ul><span data-dcnode-id="844" instrument_node="">
</span></div><span data-dcnode-id="842" instrument_node="">
</span><h3 data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Advertising</span></h3><span data-dcnode-id="839" instrument_node="">
</span><div class="article-image article__width" data-dcnode-id="831"><noscript data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">&lt;img class="article-image__img" src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/trump%20facebook%20ad%20spending.jpg" srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/trump-facebook-ad-spending-422x.jpg 422w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/trump-facebook-ad-spending-672x.jpg 672w" width="672" height="215" alt="" decoding="async" sizes="(max-width: 422px) 172px, 672px"&gt;</span></noscript><img alt="" class="article-image__img lazyload" data-dcnode-id="836" data-sizes="(max-width: 422px) 172px, 672px" data-src="https://awario.com/upload/blog/elections-campaign-social-media-analysis/trump%20facebook%20ad%20spending.jpg" data-srcset="https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/trump-facebook-ad-spending-422x.jpg 422w, https://awario.com/generated-images/upload/blog/elections-campaign-social-media-analysis/compressed/trump-facebook-ad-spending-672x.jpg 672w" decoding="async" height="215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awario.com/upload/blog/elections-campaign-social-media-analysis/trump%2520facebook%2520ad%2520spending.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201800%201818%22%3E%3C/svg%3E" width="672"><span data-dcnode-id="835" instrument_node="">
</span><div class="caption" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">How much Donald Trump's team spent on Facebook Ads.</span></div><span data-dcnode-id="832" instrument_node="">
</span></div><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="829" instrument_node="">Here's official data from Facebook's </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/ads/library/%3Factive_status%3Dall%26ad_type%3Dpolitical_and_issue_ads%26country%3DUS%26sort_data%255Bdirection%255D%3Ddesc%26sort_data%255Bmode%255D%3Drelevancy_monthly_grouped" target="_blank"><span data-dcnode-id="828" instrument_node="">Ad Library</span></a><span data-dcnode-id="826" instrument_node=""> on how much he spent on advertising.&nbsp;</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">While Democrats decided to promote a positive message centered around their candidate, Trump's team used a lot of negative and fear-based tactics in their ads and organic posts. An&nbsp;analysis&nbsp;of the content and targeting of Trump presidential campaign ads by </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2020campaigntracker.com/" target="_blank"><span data-dcnode-id="822" instrument_node="">Bully Pulpit Interactive</span></a><span data-dcnode-id="820" instrument_node="">, a Democratic digital campaigning firm that has built an&nbsp;interactive tool&nbsp;to compare spending across campaigns, found that&nbsp;more than half (54%) of Trump’s ads have mentioned immigration issues and nearly half (44%) are targeting voters over the age of 65.&nbsp;</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">The ads convey a sense of urgency. We can highlight some notable features:&nbsp;</span></p><span data-dcnode-id="815" instrument_node="">
</span><div class="article__width" data-dcnode-id="804"><span data-dcnode-id="814" instrument_node="">
</span><ul class="unordered-list" data-dcnode-id="806"><span data-dcnode-id="813" instrument_node="">
</span><li data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Each ad had several versions. Overall, there were more than 200 variations of one of the ads with minor changes targeted at different groups running on Facebook.</span></li><span data-dcnode-id="810" instrument_node="">
</span><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Trump's team&nbsp;targeted older Facebook users. As I mentioned above, both candidates are skewing older when it comes to Facebook ads.&nbsp;</span></li><span data-dcnode-id="807" instrument_node="">
</span></ul><span data-dcnode-id="805" instrument_node="">
</span></div><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">What's also interesting, is that the ads were launched a year ago, preparing social media users even before Trump's candidacy was announced.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">In general,&nbsp;such features reveal more about what topics and communication styles resonate with Trump voters on Facebook.</span></p><span data-dcnode-id="797" instrument_node="">
</span><h4 data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Takeaway lessons:</span></h4><span data-dcnode-id="794" instrument_node="">
</span><div class="article__width" data-dcnode-id="783"><span data-dcnode-id="793" instrument_node="">
</span><ul class="unordered-list" data-dcnode-id="785"><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Sometimes appealing to fear pays off. If you're convinced that your audience is more likely to react to a negative message than a positive one, design your ads accordingly.</span></li><span data-dcnode-id="789" instrument_node="">
</span><li data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Micro-targeting is credited for winning Trump elections in 2016, and his digital team is still using this tool. Altered versions of your ads catered to different buyer personas can bring you more conversions.&nbsp;</span></li><span data-dcnode-id="786" instrument_node="">
</span></ul><span data-dcnode-id="784" instrument_node="">
</span></div><span data-dcnode-id="782" instrument_node="">
</span><hr class="article__width" data-dcnode-id="781"><span data-dcnode-id="780" instrument_node="">
</span><h2 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">In conclusion</span></h2><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">The digital teams of the two presidential candidates designed vastly different campaigns, even though they sometimes used similar&nbsp;methods such as influencer marketing and micro-targeting. For all we know, these elections will&nbsp;show which social media strategy turned out to be more effective. So here's one more reason to anticipate the results for social media strategists!</span></p><span data-dcnode-id="774" instrument_node="">
