</span><h1 class="field--title" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Trump, social media and the first Twitter-based Presidency</span></h1><div class="field--minutes-to-read" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">12 minutes to read</span></div><div class="group--details" data-dcnode-id="779"><div class="field--content-type" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Article</span></div><div class="field--author-full-name" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Jordan Hollinger </span></div><div class="field--publish-date" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">07/05/2018</span></div></div><span data-dcnode-id="778" instrument_node=""> </span></header><span data-dcnode-id="776" instrument_node="">
</span></div><span data-dcnode-id="774" instrument_node="">
</span><div class="ds-center clearfix" data-dcnode-id="472"><span data-dcnode-id="773" instrument_node="">
</span><div class="group--actions" data-dcnode-id="749"><div class="field--addthis" data-dcnode-id="754"><div addthis:title="Trump, social media and the first Twitter-based Presidency - Diggit Magazine" addthis:url="https://www.diggitmagazine.com/articles/Trump-Twitter-Based-Presidency" class="addthis_toolbox addthis_default_style addthis_32x32_style" data-dcnode-id="756"><a class="addthis_button_facebook" data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.addthis.com/bookmark.php%3Fv%3D300"></a><span data-dcnode-id="771" instrument_node="">
</span><a class="addthis_button_twitter" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.addthis.com/bookmark.php%3Fv%3D300"></a><span data-dcnode-id="769" instrument_node="">
</span><a class="addthis_button_reddit" data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.addthis.com/bookmark.php%3Fv%3D300"></a><span data-dcnode-id="767" instrument_node="">

</span><a class="addthis_button_linkedin" data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.addthis.com/bookmark.php%3Fv%3D300"></a><span data-dcnode-id="763" instrument_node="">

</span><a class="addthis_button_email" data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.addthis.com/bookmark.php%3Fv%3D300"></a><span data-dcnode-id="759" instrument_node="">
</span><a class="addthis_button_addthis" data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.addthis.com/bookmark.php%3Fv%3D300"></a><span data-dcnode-id="757" instrument_node="">
</span></div><span data-dcnode-id="755" instrument_node="">
</span></div><div class="field--print-button" data-dcnode-id="750"><a data-dcnode-id="751" href="#" onclick="window.print();return false"><span class="element-invisible" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Print</span></span></a></div></div><div class="field--body" data-dcnode-id="474"><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The most unique feature of the first Twitter-based presidency&nbsp;in the United States is the intense and unprecedented use of the internet as a political tool.&nbsp;This article&nbsp;will discuss how the Trump presidency and its supporters&nbsp;utilize social media, such as&nbsp;Facebook and Twitter, to&nbsp;assert influence.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Just as with all other aspects of modern life, the internet is quickly becoming interwoven into political campaigns, creating a new form of “smart” politics. However, this rapid adoption of the internet is not seamless; rules and norms for campaigns’ online presence have not yet been widely standardized, as some campaigns express a significantly stronger online presence than others. We see specifically from&nbsp;the Trump campaign the possibility of what can be achieved from utilizing social media and the internet for partisan gain. Therefore, in analyzing&nbsp;the characteristics of Trump’s online presence, we can more fully understand the nature of politics in the internet era.</span></p><span data-dcnode-id="743" instrument_node="">
</span><h2 data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">The Twitter-based presidency and globalized social media&nbsp;</span></h2><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">In this article, I will analyze how the abstract, anonymous nature of the internet&nbsp;allows for propaganda and politicized information to be more individualized and to be spread wider than previously possible. An important underlying theme of this article&nbsp;is the impact of globalization in modern culture. Perhaps the single most influential aspect in bringing about this impact is the internet – a tool which connects individuals and ideas to a degree never before possible. The globalization of ideas is a necessary step for the success of Trump’s campaign, as&nbsp;its ability to rapidly and constantly connect with the American public is the single most important reason for his popularity and ultimate success; in fact, it is by the political&nbsp;nature of social media&nbsp;sites that Trumps' popularity and public influence could grow so rapidly, through the nascent Internet Democracy.&nbsp;</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">From Trump's hyper-active social media presence, we see a novel political relationship between Trump and his followers. By the very nature of social media, the visibility&nbsp;of a post is inherently related to popularity, to the amount of likes, retweets, and views. Due to this intimate connection between public popularity and the influence and presence of Trump's medium of choice, we can see the beginning of a new, arguably more "democratic" mode of political dissemination.&nbsp;This emergent phenomenon of political communication thereby creates a political system in which&nbsp;political discourse is now effectively produced by citizens at large, for the people determine for themselves what political figures and ideologies are deemed worthy of popularity through the largely democratic process of voting through likes and retweets. Trump's campaign is truly innovative for this reason, then; the factual nature of his policies aside, Trump's 2016 campaign&nbsp;has paved the way for a more interconnected form of democracy - one all politicians must account for in the modern era.&nbsp;&nbsp;</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">In addition to the general theme of globalization, the modern political sphere is largely influenced by the structure of social media sites. The concept of “shareability” is&nbsp;easily manipulated by&nbsp;pro-Trump pages and advertisements,</span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//edition.cnn.com/2017/10/03/politics/russian-facebook-ads-michigan-wisconsin/index.html" target="_blank"><span data-dcnode-id="732" instrument_node=""> resulting in extremely fine-tuned patterns designed to target voters in particular regions with the most potential impact</span></a><span data-dcnode-id="730" instrument_node="">.. Trump also highlighted the importance of constantly remaining online. By posting multiple times daily, Trump and his opinions are constantly “trending,” continuously reinforcing his strong online influence. This shows that not only is it highly beneficial for candidates to have an active online presence, but also that, by tailoring the campaign specifically to best utilize social media, the benefits are ready for the taking.</span></p><span data-dcnode-id="728" instrument_node="">
</span><blockquote data-dcnode-id="725"><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">
By posting multiple times daily, Trump and his opinions are constantly “trending,” continuously reinforcing his strong online influence.
</span></p></blockquote><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="723" instrument_node="">Before we begin to analyze the impact of globalized social media in American domestic politics, we first should recognize the influence of foreign governments and actors. Following the results of the 2016 election, </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/12/09/us/obama-russia-election-hack.html%3Fmtrref%3Dundefined" target="_blank"><span data-dcnode-id="722" instrument_node="">American authorities have concluded “with high confidence” that Russian agents worked to help Donald Trump defeat Hillary Clinton</span></a><span data-dcnode-id="720" instrument_node="">. These actions included the hacking of both the Democratic and Republican National Committees as well as the purchase of advertisements and other online postings on social media throughout the election cycle. Russian influence was not limited to America, however; both French and German officials have reported similar attempts by Russia to exert influence during the most recent election. </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/testimonies/the-impact-of-russian-interference-on-germanys-2017-elections/" target="_blank"><span data-dcnode-id="719" instrument_node="">In the words of Constanze Stelzenmüller</span></a><span data-dcnode-id="717" instrument_node="">:&nbsp;</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="712"><em data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">“By striking at Europe and the United States at the same time, [Russian-based] interference appears to be geared towards undermining the effectiveness and cohesion of the Western alliance as such—and at the legitimacy of the West as a normative force upholding a global order based on universal rules rather than might alone”&nbsp;</span></em></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">As this evidence implies, Russian influence is widespread and focused: the efforts by Kremlin officials to engender disunity and establish pro-Russian regimes are felt worldwide. However, this paper will not focus on clarifying Russian efforts at manipulation, as that topic alone could fill books. &nbsp;&nbsp;Instead, we will merely pinpoint the medium through which this influence is spread and the manner in which President Trump has adopted these tactics. In that light, we first will briefly discuss the history of the internet as a medium for political discourse and advertisement. We will then turn to the Trump campaign specifically to see how the campaign adopted these tactics in order to better understand the reasons why Trump’s social media presence was vital in his victory. Lastly, we will briefly touch on the question of Trump’s continued social media presence, attempting to answer the questions implicated by the world’s first Twitter-based presidency – the epitome of the globalized internet era.</span></p><span data-dcnode-id="708" instrument_node="">
</span><h2 data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Political Advertisement and the Internet</span></h2><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="704" instrument_node="">Since the start of the 21st cenury, the internet has rapidly evolved as a battleground for political advertisement. Leading up to the presidential election in 2000, Dick Morris, the chief strategists for then-President Clinton’s election in 1996, cited the intertwining of politics and the internet as inevitable, saying that </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.firstmonday.org/ojs/index.php/fm/article/view/818/727" target="_blank"><em data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">“the Internet will be the Congress. The Internet will be the Parliament. The Internet will be the election”</span></em></a><span data-dcnode-id="700" instrument_node=""> . Then in 2008, Obama’s use of e-mail and social media to mobilize support is often cited as a key aspect in his victory. </span><em data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">“Were it not for the internet,</span></em><span data-dcnode-id="697" instrument_node="">” Arianna Huffington contends, </span><em data-dcnode-id="693"><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bits.blogs.nytimes.com/2008/11/07/how-obamas-internet-campaign-changed-politics" target="_blank"><span data-dcnode-id="696" instrument_node="">“Barack Obama would not be president. Were it not for the Internet, Barack Obama would not have been the nominee"</span></a><span data-dcnode-id="694" instrument_node="">&nbsp;</span></em><span data-dcnode-id="692" instrument_node="">. In previous campaigns, where information was unable to spread instantaneously as is the case in recent elections, raising grassroots support among large groups of people nationwide required intense ground work by massive organizations of people.&nbsp;</span></p><span data-dcnode-id="690" instrument_node="">
</span><blockquote data-dcnode-id="684"><p data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">
</span><em data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">"The Internet will be the Congress. The Internet will be the Parliament. The Internet will be the election.” (Dick Morris)</span></em><span data-dcnode-id="686" instrument_node="">
</span></p></blockquote><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="682" instrument_node="">In the Internet era, however, that information is spread exponentially faster – and significantly cheaper. By the end of the 2008 election, it has been estimated that official campaign videos posted by the Obama campaign</span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bits.blogs.nytimes.com/2008/11/07/how-obamas-internet-campaign-changed-politics/" target="_blank"><span data-dcnode-id="681" instrument_node=""> on YouTube were watched for over 14 million hours, which would have cost an estimated $47 million to broadcast as advertisements on television</span></a><span data-dcnode-id="679" instrument_node="">. The Internet is increasingly becoming a medium through which political discourse and campaigning is not only acceptable but expected, resulting in what experts have labelled a “Kennedy moment.”&nbsp;</span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bits.blogs.nytimes.com/2008/11/07/how-obamas-internet-campaign-changed-politics/" target="_blank"><em data-dcnode-id="677"><span data-dcnode-id="678" instrument_node=""> “Just like Kennedy brought in the Television presidency,” political advisor Joe Trippi said following the 2008 election, “I think we’re about to see the first wired, connected, networked presidency”</span></em></a><span data-dcnode-id="675" instrument_node="">. In the Obama presidency, the United States and indeed the world saw for the first time the impact of internet-infused government.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="672" instrument_node="">Yet in 2016, America has met with the natural result of an ever increasing dependency on the internet and social media. Hailing himself as “modern day presidential,” Trump’s success and popularity is largely due to his internet presence. In the months leading up to the presidential election, it was reported that </span><em data-dcnode-id="668"><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fortune.com/2016/10/30/trump-voter-supression-operations/" target="_blank"><span data-dcnode-id="671" instrument_node="">“as much as 45% of Trump’s campaign budget in a given month [was] devoted to digital outreach and research</span></a><span data-dcnode-id="669" instrument_node="">”</span></em><span data-dcnode-id="667" instrument_node="">. This funding was primarily spent on surveys and voter identification, used towards developing one of the most robust assortments of political Big Data in America. Bloomberg has cited the value of Trump’s voter information database at as much as $100 million, leading Trump’s campaign digital director to surmise that the information allowed the Trump administration to </span><em data-dcnode-id="663"><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2016-10-27/inside-the-trump-bunker-with-12-days-to-go" target="_blank"><span data-dcnode-id="666" instrument_node="">“own the future of the Republican Party</span></a><span data-dcnode-id="664" instrument_node="">”</span></em><span data-dcnode-id="662" instrument_node="">. This collection of information does not include the more provocative – and therefore more “shareable” aspect of Trump’s online candidacy however: his use of social media to spread influence in the form of attack ads and fake news.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="659"></p><div class="media media-element-container media-default" data-dcnode-id="646"><div class="file file-inline-image file-image-jpeg view-mode-default ds-reset clearfix" data-dcnode-id="648"><span data-dcnode-id="658" instrument_node="">
</span><div class="group--image-wrapper" data-dcnode-id="652"><img alt="" class="media-element file-default" data-dcnode-id="657" data-delta="6" height="415" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.diggitmagazine.com/sites/default/files/styles/inline_image/public/trump%2520graph_2.jpg%3Fitok%3DUU1SoAwM&amp;raw" typeof="foaf:Image" width="900"><div class="field--image-copyright" data-dcnode-id="653"><span data-dcnode-id="656" instrument_node="">© </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.huffingtonpost.com/2016-11-10-1478778339-7798685-GAMgraph1.jpg"><span data-dcnode-id="655" instrument_node="">http://images.huffingtonpost.com/2016-11-10-1478778339-7798685-GAMgraph1...</span></a></div></div><p class="caption" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Trump's ability to seize control of the public attention is shown here.  He rapidly overtook Clinton in social media presence, solidifying his presence and validating his political identity.</span></p><span data-dcnode-id="649" instrument_node="">
</span></div><span data-dcnode-id="647" instrument_node="">
</span></div><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="644" instrument_node="">Trump’s social media presence is perhaps the single most important aspect of his candidacy. </span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/business/technology/russian-operatives-used-facebook-ads-to-exploit-divisions-over-black-political-activism-and-muslims/2017/09/25/4a011242-a21b-11e7-ade1-76d061d56efa_story.html%3Futm_term%3D.4b7b420a0d54" target="_blank"><span data-dcnode-id="643" instrument_node="">On Facebook alone, Pro-Trump advocates purchased at least $100,000 worth of advertisements prior to the November election</span></a><span data-dcnode-id="641" instrument_node="">. A f</span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2017/11/19/opinion/facebook-regulation-incentive.html%3Frref%3Dcollection%252Fnewseventcollection%252Frussian-election-hacking" target="_blank"><span data-dcnode-id="640" instrument_node="">ormer Facebook official estimates that this was enough to reach at least 126 million Americans</span></a><span data-dcnode-id="638" instrument_node="">. Facebook itself willingly offers to political campaigns its own sales staff, who are trained to “</span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/business/technology/russian-operatives-used-facebook-ads-to-exploit-divisions-over-black-political-activism-and-muslims/2017/09/25/4a011242-a21b-11e7-ade1-76d061d56efa_story.html%3Futm_term%3D.4b7b420a0d54" target="_blank"><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">assist campaigns in spreading their messages, increasing engagement and getting immediate feedback on how they are performing”</span></em></a><span data-dcnode-id="634" instrument_node="">. Trump utilized this highly effective service to maximize his Facebook presence, while the Clinton campaign</span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/business/technology/russian-operatives-used-facebook-ads-to-exploit-divisions-over-black-political-activism-and-muslims/2017/09/25/4a011242-a21b-11e7-ade1-76d061d56efa_story.html%3Futm_term%3D.4b7b420a0d54" target="_blank"><span data-dcnode-id="633" instrument_node=""> did not seek the assistance of Facebook officials, instead opting to rely upon her own social media experts</span></a><span data-dcnode-id="631" instrument_node="">.&nbsp;Not only is Trump more engaged online then, but he is more tactical, using every opportunity to gain an edge that other, more traditional candidates eschew.</span></p><span data-dcnode-id="629" instrument_node="">
</span><blockquote data-dcnode-id="623"><p data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">
</span><em data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Trump’s social media presence is perhaps the single most important aspect of his candidacy.</span></em><span data-dcnode-id="625" instrument_node="">
</span></p></blockquote><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="621" instrument_node="">In addition to encouraging action among his supporters, Trump also actively worked to limit his opposition through social media. </span><em data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">“We have three major voter suppression operations under way</span></em><span data-dcnode-id="618" instrument_node="">,” a Trump official boasted, aiming the Trump social media behemoth at lowering the voter turnout of key Clinton factions: </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2016-10-27/inside-the-trump-bunker-with-12-days-to-go" target="_blank"><em data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">white liberals, young women, and African Americans</span></em></a><span data-dcnode-id="614" instrument_node="">. Posting advertisements that played off Sanders supporters’ disinterest in Clinton and that emphasized Bill Clinton’s history of sexual misconduct, the Trump campaign focused its efforts on lessening support for Clinton just as much as raising his own influence. By utilizing Facebook as a means to spread his influence and assert his political presence, Trump managed to reach far more voters than possible under traditional methods of political advertising.</span></p><span data-dcnode-id="612" instrument_node="">
</span><h2 data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">A Twitter-based Presidency</span></h2><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">If Obama’s use of the internet was a Kennedy moment in that it validated a new medium through which presidential hopefuls can acceptably engage, then Trump’s use of Twitter is itself an equally significant breakthrough for social media in politics. A completely novel medium in the political sphere, Twitter as a social medium allows the president to connect personally with supporters, decry opponents, and express policy options, all in one space. This all-inclusive discursive medium provides Trump with constant access to individuals as well as institutions, allowing him to avoid directly addressing the more traditional forms of media, such as newspapers, radio, and television with which he is often at odds. This hyper-connectivity has had a tremendous impact on how the presidency as a public office is able to assert influence and command attention, creating a news sphere that is completely fixated on every tweet the president writes.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="605" instrument_node="">An avid user of Twitter long before his most recent bid for the presidency, Trump has developed a highly individualized voice through his Twitter feed, one that is strengthened by the sheer output of tweets and the greatly repetitive and self-referential nature of his tweets. Since winning the election on November 9, 2016, Trump has tweeted on his personal account, </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trumptwitterarchive.com/" target="_blank"><em data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">"@realDonaldTrump", over 2550 times, averaging approximately 6.7 tweets per day</span></em></a><span data-dcnode-id="601" instrument_node="">. He frequently repeats similar phrases and keywords in large amounts, solidifying the communal understanding of his supporters and enemies alike.&nbsp;</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="598" instrument_node="">One of his favorite phrases, </span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trumptwitterarchive.com/archive/fake%2520news%2520%257C%257C%2520fakenews%2520%257C%257C%2520fake%2520media/ttff/1-19-2017_" target="_blank"><em data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">“fake news,” has been repeated over 150 times in his first year as president alone</span></em></a><span data-dcnode-id="594" instrument_node="">. He mentioned Obamacare and the push to “repeal and replace” his predecessor’s signature policy achievement at least 98 times in the span from his inauguration on January 20, 2017 to July 7; he has likewise </span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.nl/president-trump-twitter-by-subject-2017-7/%3Finternational%3Dtrue%26r%3DUS" target="_blank"><span data-dcnode-id="593" instrument_node="">tweeted concerning the Russia scandal 99 times in the same timespan</span></a><span data-dcnode-id="591" instrument_node="">. Interestingly enough, approximately </span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.nl/president-trump-twitter-by-subject-2017-7/%3Finternational%3Dtrue%26r%3DUS" target="_blank"><span data-dcnode-id="590" instrument_node="">41% of his tweets since inauguration have been between 5 and 9 in the morning</span></a><span data-dcnode-id="588" instrument_node="">, implying the president often starts his day with Twitter – and in big doses.&nbsp;</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="582"><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.nl/president-trump-twitter-by-subject-2017-7/%3Finternational%3Dtrue%26r%3DUS" target="_blank"><span data-dcnode-id="585" instrument_node="">In fact, only two days passed in the first six months of his presidency without a single tweet, while his maximum output peaked at as many as 16 in one day</span></a><span data-dcnode-id="583" instrument_node="">. What these statistics show us is that Trump relies heavily upon his Twitter account to connect with the nation and that he is in his natural element within the website’s community. No other president has so thoroughly dominated the press as Trump manages to do, largely because of his extremely active posting habits and his bombastic writing traits.</span></p><span data-dcnode-id="581" instrument_node="">
</span><blockquote data-dcnode-id="575"><p data-dcnode-id="576"><span data-dcnode-id="580" instrument_node="">
</span><em data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">No other president has so thoroughly dominated the press as Trump manages to do, largely because of his extremely active posting habits and his bombastic writing traits.</span></em><span data-dcnode-id="577" instrument_node="">
</span></p></blockquote><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Looking beyond these statistics to the actual substance of Trump’s tweets, we can see he regularly uses his Twitter account as a tether for trial balloons and other policy-related issues. On October 7, 2017, Trump wrote:</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="568"><em data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">"Presidents and their administrations have been talking to North Korea for 25 years, agreements made and massive amounts of money paid ... hasn't worked, agreements violated before the ink was dry, makings fools of U.S. negotiators. Sorry, but only one thing will work!"</span></em></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="566" instrument_node="">This blatant attempt at saber-rattling – combined with a purposefully enigmatic remark at the end – is a prime example of Trump playing the media to his advantage. When asked what he meant by this cryptic yet overtly aggressive message, Trump merely replied that “</span><em data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">you’ll figure that out pretty soon.”</span></em><span data-dcnode-id="563" instrument_node="">&nbsp; The press, including both the internet and more traditional media, was left to sort out the meaning of the president’s statement on Twitter, raising the question </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/post-politics/wp/2017/10/07/trump-on-north-korea-sorry-but-only-one-thing-will-work/%3Futm_term%3D.931bf0e5a143" target="_blank"><span data-dcnode-id="562" instrument_node="">as to whether the president was willing to go so far as to instigate war through his personal Twitter page</span></a><span data-dcnode-id="560" instrument_node="">. Regardless of his words’ effect, Trump’s only concern is ensuring his shareability. So long as he’s being talked about, he’s winning.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Another example of how Trump emphasizes popularity is through hyperbolic claims of his own successes and overly-dramatic accusations against his enemies. On November 26, 2017, Trump wrote:</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="554"></p><div class="media media-element-container media-default" data-dcnode-id="541"><div class="file file-inline-image file-image-png view-mode-default ds-reset clearfix" data-dcnode-id="543"><span data-dcnode-id="553" instrument_node="">
</span><div class="group--image-wrapper" data-dcnode-id="547"><img alt="" class="media-element file-default" data-dcnode-id="552" data-delta="5" height="451" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.diggitmagazine.com/sites/default/files/styles/inline_image/public/trump%2520first%2520day.png%3Fitok%3DafkRR8j3&amp;raw" typeof="foaf:Image" width="900"><div class="field--image-copyright" data-dcnode-id="548"><span data-dcnode-id="551" instrument_node="">© </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//info.nct.news/wp-content/uploads/2017/11/Screen-Shot-2017-11-26-at-6.22.49-PM.png"><span data-dcnode-id="550" instrument_node="">http://info.nct.news/wp-content/uploads/2017/11/Screen-Shot-2017-11-26-a...</span></a></div></div><p class="caption" data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Repeating similar messages frequently serves to reinforce Trump's messages: here, his distaste for political rivals and an emphasis on his own successfulness</span></p><span data-dcnode-id="544" instrument_node="">
</span></div><span data-dcnode-id="542" instrument_node="">
</span></div><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="539" instrument_node="">Trump’s use of dramatic phrases like “phony” and “losing” to describe his opponents while simultaneously claiming to “</span><em data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">have possible done more than any 10 month President”</span></em><span data-dcnode-id="536" instrument_node=""> shows how Trump strives to maintain media dominance, never conceding weakness nor granting points. His tweets are also oftentimes accompanied with self-aggrandizing pictures and videos from his supporters, such </span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DlelgIgnhf0U" target="_blank"><span data-dcnode-id="535" instrument_node="">as this scandalous tweet of him body-slamming someone with CNN’s logo superimposed on the person’s face</span></a><span data-dcnode-id="533" instrument_node="">. This tweet perfectly showcases Trump’s relationship with traditional and social media. His expression of disdain for traditional media is coupled with his bombastic, influential capabilities through social media, driving the discussion both on- and off-line for days following the incident before ignoring the tweet, its goal of media domination achieved.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="530" instrument_node="">Perhaps the most iconic of his tweets that highlight Trump’s ability to drive the media-sphere from his fingertips, the infamous “Covfefe” tweet was deleted within hours, yet in that short timespan became Trump’s third-most retweeted post of 2017 (</span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2017/12/20/571617079/a-year-of-the-trump-presidency-in-tweets" target="_blank"><span data-dcnode-id="529" instrument_node="">15</span></a><span data-dcnode-id="527" instrument_node="">). The 6 words, not even a complete sentence, were posted by the President on May 31, 2017:</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="524"></p><div class="media media-element-container media-default" data-dcnode-id="511"><div class="file file-inline-image file-image-jpeg view-mode-default ds-reset clearfix" data-dcnode-id="513"><span data-dcnode-id="523" instrument_node="">
</span><div class="group--image-wrapper" data-dcnode-id="517"><img alt="" class="media-element file-default" data-dcnode-id="522" data-delta="4" height="506" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.diggitmagazine.com/sites/default/files/styles/inline_image/public/covfefe_3.jpg%3Fitok%3DWPO3pHRp&amp;raw" typeof="foaf:Image" width="900"><div class="field--image-copyright" data-dcnode-id="518"><span data-dcnode-id="521" instrument_node="">© </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cdn.cnn.com/cnnnext/dam/assets/170531121403-trump-covfefe-tweet-screengrab-super-tease.jpg"><span data-dcnode-id="520" instrument_node="">http://cdn.cnn.com/cnnnext/dam/assets/170531121403-trump-covfefe-tweet-s...</span></a></div></div><p class="caption" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Trump's emphasis on constant, repetitive postings supersedes any level fact-checking, or even spelling.</span></p><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span></div><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Obviously another attack at his opponents in traditional media, the comical misspelling only further served Trump’s desire to spread his message, as evidenced by the massive levels of retweets the post received. Even when Trump makes a mistake, he succeeds in remaining highly shareable. This is why this tweet highlights Trump’s ability to succeed in the internet era: he is everywhere, even without trying.</span></p><span data-dcnode-id="507" instrument_node="">
</span><h2 data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Trump, the first Twitter-based President</span></h2><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Trump’s presence as the first Twitter-based Presidency is no fluke. His social media presence is intentional and strategic, his posts – while individually senseless – are collectively incredibly shareable. This is what matters in politics in the internet era, a candidate’s ability to enter the household through televisions, computers, cell phones, and more. While it is difficult to view Trump as successful in the political realms that traditionally have shaped the presidency, his continued success is owed largely to his ability to navigate the modern globalized world. However the rest of his presidency develops, at least one aspect will remain constant: Trump’s active online presence is not only definitive of his presidency but no doubt will shape and inspire all subsequent national elections for as long as social media can reign supreme.</span></p><span data-dcnode-id="501" instrument_node="">
</span><h3 data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Images</span></h3><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="497" instrument_node="">Title Cover:&nbsp;</span><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news24-d50.kxcdn.com/media/uploads/2016/11/13/social-cover.JPG" target="_blank"><span data-dcnode-id="496" instrument_node="">http://news24-d50.kxcdn.com/media/uploads/2016/11/13/social-cover.JPG</span></a></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="492" instrument_node="">Figure 1:&nbsp;</span><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.huffingtonpost.com/2016-11-10-1478778339-7798685-GAMgraph1.jpg" target="_blank"><span data-dcnode-id="491" instrument_node="">http://images.huffingtonpost.com/2016-11-10-1478778339-7798685-GAMgraph1.jpg</span></a></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="487" instrument_node="">Figure 2:&nbsp;</span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//info.nct.news/wp-content/uploads/2017/11/Screen-Shot-2017-11-26-at-6.22.49-PM.png" target="_blank"><span data-dcnode-id="486" instrument_node="">http://info.nct.news/wp-content/uploads/2017/11/Screen-Shot-2017-11-26-at-6.22.49-PM.png</span></a></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="482" instrument_node="">Figure 3:&nbsp;</span><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cdn.cnn.com/cnnnext/dam/assets/170531121403-trump-covfefe-tweet-screengrab-super-tease.jpg" target="_blank"><span data-dcnode-id="481" instrument_node="">http://cdn.cnn.com/cnnnext/dam/assets/170531121403-trump-covfefe-tweet-screengrab-super-tease.jpg</span></a></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">&nbsp;</span></p><span data-dcnode-id="475" instrument_node="">

      Content ID    </span></h2><span data-dcnode-id="432" instrument_node="">
