</span></div><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">The thaw continued in the years that followed. The Obama administration further loosened restrictions on remittances and travel, as well as trade, telecommunications, and financial services. It also removed Cuba’s designation as a terrorism sponsor, a major obstacle to normalization. The two governments reopened their embassies, a move met with widespread public support in both countries, and negotiated a </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fas.org/sgp/crs/row/R45657.pdf" target="_blank" title="spate of bilateral agreements"><span data-dcnode-id="872" instrument_node="">spate of bilateral agreements</span></a><span data-dcnode-id="870" instrument_node=""> [PDF].</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="867" instrument_node="">In early 2016, Obama took another significant step toward normalization, visiting Havana in what was the first trip to Cuba by a sitting U.S. president since Calvin Coolidge in 1928. In a </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamawhitehouse.archives.gov/the-press-office/2016/03/22/remarks-president-obama-people-cuba" target="_blank" title="keynote address"><span data-dcnode-id="866" instrument_node="">keynote address</span></a><span data-dcnode-id="864" instrument_node=""> broadcast live, with Raul Castro sitting in the audience, Obama urged both countries to press on with reforms. The Cuban government should continue political and economic liberalization, and the U.S. Congress should lift the trade embargo, he said. Later that year, U.S. commercial airlines </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/09/01/world/americas/cuba-us-first-flight-jetblue.html" target="_blank" title="began offering service"><span data-dcnode-id="863" instrument_node="">began offering service</span></a><span data-dcnode-id="861" instrument_node=""> between the countries for the first time in more than fifty years.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="858" instrument_node="">Days before leaving office in January 2017, Obama repealed the Clinton-era “</span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhs.gov/sites/default/files/publications/DHS%2520Fact%2520Sheet%2520FINAL.pdf" target="_blank" title="wet foot, dry foot"><span data-dcnode-id="857" instrument_node="">wet foot, dry foot</span></a><span data-dcnode-id="855" instrument_node="">” policy [PDF], which allowed Cubans who came to the United States illegally to pursue permanent residency. The move, which the Cuban government welcomed, brought the U.S. government’s treatment of Cubans in line with its handling of other unauthorized immigrants.</span></p><span data-dcnode-id="853" instrument_node="">
</span><h2 data-dcnode-id="850" id="chapter-title-0-6"><b data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">What policy changes did President Trump make?</span></b></h2><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The death of Fidel Castro and the election of Trump in 2016 rekindled debates over U.S.-Cuba policy. While in office, Trump followed through on campaign pledges to reverse course on much of the Obama administration’s thaw with Cuba.</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="845" instrument_node="">In 2017, the Trump administration prohibited commerce with businesses controlled by or operating on behalf of the Cuban military, intelligence agencies, and security services. It also banned Americans from traveling to Cuba individually for educational and cultural exchanges. Months later, the administration said it would pull most of its embassy staff from Havana after American and Canadian diplomatic workers suffered unexplained injuries, including hearing loss and cognitive impairment. Many of the U.S. embassy’s functions, including the processing of most visas, were suspended. The Cuban government denied involvement in the mysterious attacks and </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dw.com/en/cuba-urges-us-not-to-shutter-embassy-following-health-attacks-on-diplomats/a-40700560" target="_blank" title="urged the United States"><span data-dcnode-id="844" instrument_node="">urged the United States</span></a><span data-dcnode-id="842" instrument_node=""> not to cut diplomatic ties. (The U.S. National Academies of Sciences, Engineering, and Medicine found that directed, pulsed radio-frequency energy was the </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalacademies.org/news/2020/12/new-report-assesses-illnesses-among-us-government-personnel-and-their-families-at-overseas-embassies" target="_blank" title="most plausible explanation"><span data-dcnode-id="841" instrument_node="">most plausible explanation</span></a><span data-dcnode-id="839" instrument_node=""> for the injuries among those it considered.)&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Washington turned up its pressure on Havana in 2019, when it began allowing U.S. nationals to sue entities that traffic in or benefit from property confiscated by the Cuban regime. Congress provided for this in the Helms-Burton Act, but past U.S. presidents had routinely waived the provision. Canada and the European Union, both major foreign investors in Cuba, condemned the move as a violation of international law and pledged to protect their companies by fighting the decision through the World Trade Organization.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">In addition to ending almost all individual travel to the island, Trump banned group educational exchanges in 2019. His administration prohibited cruise ships and other vessels from sailing between the United States and Cuba, and banned U.S. flights to Cuban cities other than Havana. It also suspended private charter flights to Havana and barred U.S. travelers from staying at hundreds of establishments linked to the Cuban government or Communist Party. (Americans have long sidestepped travel restrictions by flying to Cuba through other countries, including Mexico.) Administration officials framed the travel bans as an effort to keep tourism dollars out of Cuban government coffers. The White House further targeted Cuba’s finances by curbing remittances and imposing economic sanctions. In 2018, the United Nations estimated that U.S. trade restrictions had cost Cuba </span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-cuba-economy-un/us-trade-embargo-has-cost-cuba-130-billion-un-says-idUSKBN1IA00T" target="_blank" title="more than $130 billion"><span data-dcnode-id="832" instrument_node="">more than $130 billion</span></a><span data-dcnode-id="830" instrument_node=""> since the embargo began. That same year, Raul Castro’s hand-picked successor, Miguel Diaz-Canel, took office as president.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="827" instrument_node="">Meanwhile, the Trump administration grew increasingly wary of </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/in-brief/maduros-allies-who-backs-venezuelan-regime" target="_blank" title="Cuba’s close ties"><span data-dcnode-id="826" instrument_node="">Cuba’s close ties</span></a><span data-dcnode-id="824" instrument_node=""> with the embattled socialist regime in Venezuela. In 2018, National Security Advisor John Bolton characterized Cuba, Nicaragua, and Venezuela as a “troika of tyranny,” blaming their governments for massive human suffering and regional instability. The Trump administration sought to staunch the flow of </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/venezuela-crisis" target="_blank" title="oil from Venezuela"><span data-dcnode-id="823" instrument_node="">oil from Venezuela</span></a><span data-dcnode-id="821" instrument_node=""> to Cuba by sanctioning shipping firms and Cuba’s state oil company. It also banned Cuban officials from entering the United States for their alleged complicity in Venezuela’s </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/countries/americas/venezuela/report-venezuela/" target="_blank" title="human rights abuse"><span data-dcnode-id="820" instrument_node="">human rights abuse</span></a><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/countries/americas/venezuela/" target="_blank" title="s"><span data-dcnode-id="818" instrument_node="">s</span></a><span data-dcnode-id="816" instrument_node="">.</span></p><span data-dcnode-id="814" instrument_node="">
</span><h2 data-dcnode-id="812" id="chapter-title-0-7" style="line-height:1.38; margin-top:24px; margin-bottom:8px"><span data-dcnode-id="813" instrument_node="">Where does the Biden administration stand on Cuba?</span></h2><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="810" instrument_node="">As a candidate, Joe Biden pledged to reverse Trump’s policies on Cuba, which he said did not advance human rights and democracy. After taking office, the Biden administration said it hoped to eventually </span><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latimes.com/politics/story/2021-02-12/biden-resume-remittances-travel-to-cuba" target="_blank" title="lift remittance restrictions"><span data-dcnode-id="809" instrument_node="">lift remittance restrictions</span></a><span data-dcnode-id="807" instrument_node=""> and enable Americans to travel to Cuba, and it began a review of other Trump administration actions. (As of November 2021, remittance restrictions still have not been lifted.) It also appointed a high-level official to oversee the State Department’s response to the unexplained injuries U.S. diplomats sustained in Cuba. Yet, the White House stated that reorienting U.S. policy toward Cuba was not among Biden’s highest priorities.&nbsp;</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">Meanwhile, Havana has made some economic reforms, including easing restrictions on private businesses and unifying its dual currencies. It also </span><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.miamiherald.com/news/nation-world/world/americas/cuba/article250373721.html" target="_blank" title="expressed openness"><span data-dcnode-id="803" instrument_node="">expressed openness</span></a><span data-dcnode-id="801" instrument_node=""> to Cuban American investors. In April 2021, Diaz-Canel replaced Raul Castro as the first secretary of the Communist Party, ending decades of leadership by the Castro family.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">However, the prospects for&nbsp;rapprochement faced new hurdles following the July outbreak of nationwide protests, Cuba’s largest in nearly three decades. Demonstrators said they were reacting to </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/07/12/world/americas/cuba-protests-usa.html" target="_blank" title="worsening economic conditions"><span data-dcnode-id="797" instrument_node="">worsening economic conditions</span></a><span data-dcnode-id="795" instrument_node="">, including power outages, shortages of food and medicine, and spiking inflation. Analysts attribute these woes to a combination of U.S. restrictions, government mismanagement, and a nearly 90 percent drop in foreign currency due to a pandemic-related collapse in tourism. Cuba’s leaders responded by blaming foreign provocateurs, arresting protest organizers, and clamping down on internet and social media access across the island.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="792" instrument_node="">Biden </span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/statements-releases/2021/07/12/statement-by-president-joseph-r-biden-jr-on-protests-in-cuba/" target="_blank" title="called on"><span data-dcnode-id="791" instrument_node="">called on</span></a><span data-dcnode-id="789" instrument_node=""> the regime to respect Cubans’ rights to protest and “freely determine their own future,” and his administration </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latimes.com/world-nation/story/2021-07-30/u-s-sets-new-cuba-sanctions-as-biden-meets-with-cuban-american-leaders" target="_blank" title="imposed new sanctions"><span data-dcnode-id="788" instrument_node="">imposed new sanctions</span></a><span data-dcnode-id="786" instrument_node=""> on several Cuban officials, including high-level members of the national police. But the administration is facing political pressure to formulate a more forceful response. Many congressional Democrats </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-cuba-usa-exclusive/exclusive-u-s-house-democrats-urge-biden-to-revert-to-obama-era-cuba-detente-idUSKBN2AV1HS" target="_blank" title="have argued"><span data-dcnode-id="785" instrument_node="">have argued</span></a><span data-dcnode-id="783" instrument_node=""> that Washington should help ameliorate Cuba’s humanitarian crisis by reducing restrictions on travel, removing </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acere.org/mcgovern-dear-colleague/" target="_blank" title="restrictions on remittances"><span data-dcnode-id="782" instrument_node="">restrictions on remittances</span></a><span data-dcnode-id="780" instrument_node="">, and restaffing the U.S. embassy in Havana. At the same time, some influential policymakers, including Senator Marco Rubio (R-FL), have </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rubio.senate.gov/public/_cache/files/ab158776-5f00-43c6-897f-dcaf43f55aba/C919503C9CD9E39C4FA8BDC6FE398F29.07.12.21-senator-rubio-to-biden-re-cuba.pdf" target="_blank" title="pressed Biden"><span data-dcnode-id="779" instrument_node="">pressed Biden</span></a><span data-dcnode-id="777" instrument_node=""> [PDF] to expand Trump-era sanctions, bolster Cuban internet access, and warn Havana against encouraging mass migration to the United States.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">The protest movement has so far failed to expand. A </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/americas/cuba-reopens-doors-tourism-threat-protests-looms-2021-11-15/" target="_blank" title="pro-democracy demonstration"><span data-dcnode-id="773" instrument_node="">pro-democracy demonstration</span></a><span data-dcnode-id="771" instrument_node=""> scheduled for November 15—the day the island reopened to international tourists—saw virtually no turnout, as police had preemptively detained hundreds of dissidents days before. More than five hundred people are still being held for participating in the July protests, which Cuban authorities maintain were a U.S.-backed attempt to overthrow the Diaz-Canel government.&nbsp;</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="768" instrument_node="">Many analysts say the administration will likely be careful to avoid playing into Havana’s claims that Washington is fomenting dissent. “It is a </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/07/12/biden-cuba-response-499400" target="_blank" title="balancing act for Biden"><span data-dcnode-id="767" instrument_node="">balancing act for Biden</span></a><span data-dcnode-id="765" instrument_node=""> in the end,” Latin America expert Eric Farnsworth told </span><em data-dcnode-id="763" style="font-style:italic"><span data-dcnode-id="764" instrument_node="">Politico</span></em><span data-dcnode-id="762" instrument_node="">, “to come out in support of democracy...without creating difficulties for the protestors.”</span></p></div><span data-dcnode-id="759" instrument_node="">
</span></div><span data-dcnode-id="757" instrument_node="">
</span><div class="resources" data-dcnode-id="713"><span data-dcnode-id="756" instrument_node="">
</span><h2 class="resources__title" data-dcnode-id="754" id="chapter-title-0-8"><span data-dcnode-id="755" instrument_node="">Recommended Resources</span></h2><span data-dcnode-id="753" instrument_node="">
</span><div class="resources__description" data-dcnode-id="715"><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">Latin American expert Kezia McKeague spoke with panelists to discuss the outbreak of protests in Cuba and what’s next for the island at this </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/event/whats-next-cuba"><span data-dcnode-id="751" instrument_node="">August 2021 event</span></a><span data-dcnode-id="749" instrument_node="">.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">The Congressional Research Service explains how the Trump administration reshaped </span><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fas.org/sgp/crs/row/IF10045.pdf"><span data-dcnode-id="745" instrument_node="">U.S. policy toward Cuba</span></a><span data-dcnode-id="743" instrument_node=""> [PDF].</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="740" instrument_node="">The </span><em data-dcnode-id="738" style="font-style:italic"><span data-dcnode-id="739" instrument_node="">New Yorker </span></em><span data-dcnode-id="737" instrument_node="">explores the </span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/magazine/2018/11/19/the-mystery-of-the-havana-syndrome"><span data-dcnode-id="736" instrument_node="">mysterious injuries</span></a><span data-dcnode-id="734" instrument_node=""> that afflicted U.S. and Canadian personnel in Cuba.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="731" instrument_node="">For </span><em data-dcnode-id="729" style="font-style:italic"><span data-dcnode-id="730" instrument_node="">Foreign Affairs</span></em><span data-dcnode-id="728" instrument_node="">, Richard E. Feinberg analyzes U.S.-Cuba ties under Obama and Trump, and explains how Biden can </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/articles/cuba/2021-02-05/return-detente-cuba"><span data-dcnode-id="727" instrument_node="">restore the countries’ détente</span></a><span data-dcnode-id="725" instrument_node="">.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="722" instrument_node="">In her book </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/cuba/cuba-everyone-needs-know/p19379"><em data-dcnode-id="720" style="font-style:italic"><span data-dcnode-id="721" instrument_node="">Cuba: What Everyone Needs to Know</span></em></a><span data-dcnode-id="718" instrument_node="">, Julia Sweig offers a guide to the island’s politics, its relationship with the United States, and its shifting role in the world.</span></p><span data-dcnode-id="716" instrument_node="">
