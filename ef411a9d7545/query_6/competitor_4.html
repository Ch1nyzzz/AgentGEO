        Hillman is the senior fellow for trade and international political economy at CFR, specializing in U.S. trade policy, the law and politics of the World Trade Organization, international organizations, and Brexit.  She has had a distinguished career in public service, having served as a member of the WTO Appellate Body, Commissioner at the U.S. International Trade Commission, General Counsel and Ambassador/Chief Textiles Negotiator at USTR, and legislative director for U.S. Senator Terry Sanford (NC).  
      </span></p><span data-dcnode-id="1488" instrument_node="">

</span><h2 class="expert-bio__main-title" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Expert Bio</span></h2><span data-dcnode-id="1462" instrument_node="">
</span><div class="expert-bio__main-body" data-dcnode-id="1415"><span data-dcnode-id="1461" instrument_node="">
</span><div class="body-content" data-dcnode-id="1417"><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Jennifer A. Hillman is a senior fellow for trade and international political economy at the Council on Foreign Relations (CFR), specializing in U.S. trade policy, the law and politics of the World Trade Organization (WTO), international organizations, and Brexit. &nbsp;&nbsp;</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1457" instrument_node="">Hillman is a professor of practice at the Georgetown University Law Center, teaching the lead courses in international business and international trade, along with a practicum on international trade and investment law that gave students the opportunity to resolve real-world problems for developing country governments and a wide variety of NGOs. She recently published&nbsp;</span><em data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Getting to Brexit: Legal Aspects of the Process of the UK’s Withdrawal from the EU </span></em><span data-dcnode-id="1454" instrument_node="">(IIEL 2018) and </span><em data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Legal Aspects of Brexit:&nbsp;Implications of the United Kingdom’s Decision to Withdraw from the European Union (</span></em><span data-dcnode-id="1451" instrument_node="">IIEL 2017).&nbsp;She also co-authored the leading casebook on trade, </span><em data-dcnode-id="1446"><span data-dcnode-id="1450" instrument_node="">International Trade Law, 3</span><sup data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">rd</span></sup><span data-dcnode-id="1447" instrument_node=""> ed.</span></em><span data-dcnode-id="1445" instrument_node="">, Wolters Kluwer (2016).&nbsp;Additional writings have covered climate change, carbon taxes, the trade war with China, and reforms to the WTO.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Hillman has had a distinguished career in public service. In 2012, she completed her term as one of seven members serving on the WTO's&nbsp;highest court, its Appellate Body. Hillman also has in-depth experience adjudicating antidumping, countervailing duty, patent and safeguards cases along with conducting numerous studies of the economics of trade policy and trade agreements as a result of her service as a Commissioner at the United States International Trade Commission.&nbsp;Through her work as the General Counsel at the Office of the United States Trade Representative, Hillman was involved in all litigation matters in which the United States was a party or third party in disputes before panels of the NAFTA or the WTO and in addressing the intersection between trade policy, trade law, and foreign policy.&nbsp;She negotiated bilateral agreements with forty-five&nbsp;countries while serving as USTR’s Ambassador and Chief Textiles Negotiator and was the legislative director and counsel to U.S. Senator Terry Sanford of North Carolina before joining USTR.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Hillman was a partner in the law firm of Cassidy Levy Kent, a senior transatlantic fellow for the German Marshall Fund of the United States, president of the Trade Policy Forum, and a member of the selection panel for the Harry S. Truman Scholarship Foundation.&nbsp; She serves on the board of visitors at the Sanford School of Public Policy at Duke University and is a graduate of the Harvard Law School and Duke University. In 2021, she was the recipient of the Lifetime Achievement Award from the&nbsp;Association of Women in International Trade.&nbsp;</span></p><span data-dcnode-id="1437" instrument_node="">
