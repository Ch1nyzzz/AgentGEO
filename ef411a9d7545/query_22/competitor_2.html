</span><span data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">lots of knowledge</span></span><span data-dcnode-id="1717" instrument_node="">
</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1713" data-hook="review-date"><span data-dcnode-id="1714" instrument_node="">Reviewed in the United States on January 2, 2022</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1710"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1711" data-hook="avp-badge-linkless"><span data-dcnode-id="1712" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1650"><span class="a-size-base review-text" data-dcnode-id="1651" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1652" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1659" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1709" instrument_node="">
</span><span data-dcnode-id="1661"><span data-dcnode-id="1708" instrument_node="">
  The amazing thing about Kissinger is that he's still around and still writing, with a new book planned</span><br data-dcnode-id="1707"><span data-dcnode-id="1706" instrument_node="">for May. I recommend his books On China, World Order, and A World Restored (?). Here in Diplomacy</span><br data-dcnode-id="1705"><span data-dcnode-id="1704" instrument_node="">he makes a sweeping study of history, going back to the Holy Roman Empire. He goes through major</span><br data-dcnode-id="1703"><span data-dcnode-id="1702" instrument_node="">turning points like the Peace of Westphalia (1648), the Congress of Vienna (after 1815), and the Treaty</span><br data-dcnode-id="1701"><span data-dcnode-id="1700" instrument_node="">of Versailles (1918-19). These key moments helped to forge the balance of power and the world order</span><br data-dcnode-id="1699"><span data-dcnode-id="1698" instrument_node="">of the modern nation state. There are many figures like Cardinal Richelieu, Napoleon, Metternich</span><br data-dcnode-id="1697"><span data-dcnode-id="1696" instrument_node="">and Bismarck.</span><br data-dcnode-id="1695"><br data-dcnode-id="1694"><span data-dcnode-id="1693" instrument_node="">Being from the Old World, Kissinger has more of an instinctive knowledge of obscure events from long</span><br data-dcnode-id="1692"><span data-dcnode-id="1691" instrument_node="">ago, and how they have parallels in contemporary current events. Europeans tended to have more of</span><br data-dcnode-id="1690"><span data-dcnode-id="1689" instrument_node="">a realist view of the need for the balance of power to maintain peace, while Americans have an idealistic</span><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node="">sense of encouraging democracy and human rights around the world. Kissinger contrasts the idealistic</span><br data-dcnode-id="1686"><span data-dcnode-id="1685" instrument_node="">Wilsonianism with the more realist views of Teddy Roosevelt. Although Nixon became less popular than</span><br data-dcnode-id="1684"><span data-dcnode-id="1683" instrument_node="">TR, he had a similar brilliance in understanding the balance of power. But for most of the 20th century,</span><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node="">idealism clearly won out over realism, with figures like JFK and Reagan. Once again, I don't understand</span><br data-dcnode-id="1680"><span data-dcnode-id="1679" instrument_node="">why Kissinger is viewed as an amoral strategist. He clearly is seeking peace, but comes from an Old</span><br data-dcnode-id="1678"><span data-dcnode-id="1677" instrument_node="">Europe view of the balance of power, based on deep knowledge of history.</span><br data-dcnode-id="1676"><br data-dcnode-id="1675"><span data-dcnode-id="1674" instrument_node="">Kissinger gives an insightful psychoanalysis of Stalin and Hitler, along with laudatory studies of FDR</span><br data-dcnode-id="1673"><span data-dcnode-id="1672" instrument_node="">and Churchill. Then there's a lengthy discussion of the diplomacy of the Cold War. As an intellectual,</span><br data-dcnode-id="1671"><span data-dcnode-id="1670" instrument_node="">Kissinger tends to underestimate Reagan, but there's little doubt that his diplomacy worked. The</span><br data-dcnode-id="1669"><span data-dcnode-id="1668" instrument_node="">history continues right to the New World Order of Bush 41 and the beginning of the Clinton</span><br data-dcnode-id="1667"><span data-dcnode-id="1666" instrument_node="">administration. Many disagree with Kissinger, but the breadth and scope of his knowledge of the</span><br data-dcnode-id="1665"><span data-dcnode-id="1664" instrument_node="">subject almost requires that one go through his book learning and life experience, if you want to</span><br data-dcnode-id="1663"><span data-dcnode-id="1662" instrument_node="">learn about diplomacy.
</span></span><span data-dcnode-id="1660" instrument_node="">

/i></a><span class="a-letter-space" data-dcnode-id="1609"></span><a class="a-size-base a-link-normal review-title a-color-base review-title-content a-text-bold" data-dcnode-id="1604" data-hook="review-title" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.com/gp/customer-reviews/R3BRUK024YME3O%3FASIN%3DB08Z5LSZ78"><span data-dcnode-id="1608" instrument_node="">
</span><span data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The History of Peace</span></span><span data-dcnode-id="1605" instrument_node="">
</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1601" data-hook="review-date"><span data-dcnode-id="1602" instrument_node="">Reviewed in the United States on November 12, 2019</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1598"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1599" data-hook="avp-badge-linkless"><span data-dcnode-id="1600" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1575"><span class="a-size-base review-text" data-dcnode-id="1576" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1577" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1584" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1597" instrument_node="">
</span><span data-dcnode-id="1586"><span data-dcnode-id="1596" instrument_node="">
  The study of history often seems to be preoccupied with war.  Henry Kissinger corrects the imbalance with his authoritative account of the people who ended wars and preserved the peace, from the time of Napoleon to end of the Cold War.  The book is dedicated “to the men and women of the Foreign Service.”</span><br data-dcnode-id="1595"><br data-dcnode-id="1594"><span data-dcnode-id="1593" instrument_node="">He starts with the Peace of Westphalia and the Congress of Vienna, which pacified Europe for more than one hundred years.  In the twentieth century, he is obliged to recount more wars, which he attributes to failures of the Wilsonian approach, and then the mixed success of Kennan’s containment theory.</span><br data-dcnode-id="1592"><br data-dcnode-id="1591"><span data-dcnode-id="1590" instrument_node="">Kissinger obviously prefers realpolitik, and he mocks the “theological” and “psychological” schools of international relations.  He nonetheless admires the United States for its idealistic approach, conceding that no other approach is compatible with America’s core values.</span><br data-dcnode-id="1589"><br data-dcnode-id="1588"><span data-dcnode-id="1587" instrument_node="">The material on New World Order feels dated, but still a good analysis considering the book came out in 1994.  As a history book, Diplomacy amply demonstrates the importance of studying how peace has been maintained in the past, that we may have more of it in future.
</span></span><span data-dcnode-id="1585" instrument_node="">

</span><span data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">
  The book itself is a 5 star. The Kindle version, because it leaves out 12 pages of maps, I rate at 2 stars. It is really annoying to buy a book and then find out you've been short changed. The seller should be required to inform the buyer that the Kindle version has been abridged. However, Kissinger's exposition of the history of diplomacy is brilliant, and as the length of the book suggests, exhaustive. Though he seems to be self-serving at points, it detracts little from the whole. I found it particularly interesting how a nation's history and culture serve as guides for their foreign policy. One might even conclude that without a national identity there can be no coherent foreign policy. For example, the new German nation which Bismarck had cobbled together could not formulate a policy to deal with the events leading to WWI. Also, Kissinger's description of Woodrow Wilson's insistence on replacing self-interest as a basis for foreign alliances with collective security and a moral judgement, helps a lot in understanding today's mess.

</span><span data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">
  I read this in the summer of 1994, right on the heels of passing of Dr. Kissinger’s boss (former President Richard M. Nixon, that is; I had the honour &amp; pleasure of being a volunteer staff assistant at Mr. Nixon’s funeral), in-between my freshman and sophomore year at the USC School of International Relations. It was one of the all-time most influential and memorable books on foreign policy and history I’ve ever read. I especially appreciated the author’s writings on the Korean and Vietnam Wars, challenging the existing left-wing academia paradigms on both wars.

</span><span data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">USA-biased Machiavellian case-studies</span></span><span data-dcnode-id="1299" instrument_node="">
</span></span></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1295" data-hook="review-date"><span data-dcnode-id="1296" instrument_node="">Reviewed in the United Kingdom on April 19, 2021</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1292"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1293" data-hook="avp-badge-linkless"><span data-dcnode-id="1294" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1246"><span class="a-size-base review-text" data-dcnode-id="1247" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1248" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1255" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1291" instrument_node="">
</span><span data-dcnode-id="1257"><span data-dcnode-id="1290" instrument_node="">
  I ve read the entire book for college. this is way more of a "history" book, rather than a "diplomacy" book.</span><br data-dcnode-id="1289"><br data-dcnode-id="1288"><span data-dcnode-id="1287" instrument_node="">ABOUT THE WRITING</span><br data-dcnode-id="1286"><span data-dcnode-id="1285" instrument_node="">Kissinger writes in a beautiful language, but tends to get repetitive and too wordy. This is a hard book to read, not because it's complicated, but because it can get a real drag.</span><br data-dcnode-id="1284"><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">ABOUT THE CONTENT - SMALL PICTURE</span><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">This book progressively becomes extremely (conservative) USA biased. Certain 21st century morals are completely absent from Kissinger's mind (this is obviously excusable, let's not get anachronistic, just saying). One may only look at Kissinger's implied opinion about the cause of Castlereagh's suicide; then go find out, through modern sources, the real cause.</span><br data-dcnode-id="1279"><br data-dcnode-id="1278"><span data-dcnode-id="1277" instrument_node="">The most important problem is (though I may be pro-usa in all the cold-war shenanigans) the book is extremely USA biased. I have to repeat this. You need another book to read in parallel, to have a more complete picture. USSR always looks evil and moronic, while USA idealistic and, though flawed, heroic. For example, in the Reagan chapter, one may easily notice how Kissinger praises all rhetoric of Reagan as being visionary and genuine; and a couple of pages later, all USSR rhetoric is considered ruthless propaganda.</span><br data-dcnode-id="1276"><br data-dcnode-id="1275"><span data-dcnode-id="1274" instrument_node="">ABOUT CONTENT - BIG PICTURE</span><br data-dcnode-id="1273"><span data-dcnode-id="1272" instrument_node="">you thought diplomacy was about friendship and compromise? THINK AGAIN. see how Kissinger clearly, though implicitly, is an avid fan of all historically ruthless politicians, starting from Richelieu. See how diplomacy is used for manipulation of others with a completely Machiavellian mentality. See how Metternich is praised for creating a Holy Alliance between blue-blooded monarchs, to quell liberal and nationalistic uprisings during the 19th century (the monarchs found commonality in wanting to keep their power from the peasants, and Kissinger thinks that's good because there was peace)! see how Reagan is praised for being completely two-faced, apparently completely friendly in private with USSR leadership, and vehemently hostile when addressing the USA public. See, as I ve said, apparently the entire USSR leadership was always a bunch of sinister buffoons; whereas USA was all about defending democracy.</span><br data-dcnode-id="1271"><br data-dcnode-id="1270"><span data-dcnode-id="1269" instrument_node="">See how the entire international-political world is filled with snakes.</span><br data-dcnode-id="1268"><br data-dcnode-id="1267"><span data-dcnode-id="1266" instrument_node="">but be careful not to forget who wrote this book.</span><br data-dcnode-id="1265"><br data-dcnode-id="1264"><span data-dcnode-id="1263" instrument_node="">CONCLUSION</span><br data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">good history lesson, that teaches you in-depth some important historicopolitical concepts (such as realpolitik). Don't expect to read any practical methodologies of diplomacy.</span><br data-dcnode-id="1260"><br data-dcnode-id="1259"><span data-dcnode-id="1258" instrument_node="">but again NEVER FORGET who wrote this book. Thus, read it with your USA-conservative-POV goggles on.
</span></span><span data-dcnode-id="1256" instrument_node="">
</span></div><div class="a-expander-header a-expander-partial-collapse-header" data-dcnode-id="1249" style="opacity: 1; display: block;"><div class="a-expander-content-fade" data-dcnode-id="1254"></div><a aria-expanded="false" aria-label="Toggle full review text" class="a-declarative" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="1250" data-hook="expand-collapse-read-more-less" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="1253"></i><span class="a-expander-prompt" data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Read more</span></span></a></div></div></span></div><div class="a-row review-comments cr-vote-action-bar" data-dcnode-id="1233" data-hook="review-comments"><span class="cr-vote" data-dcnode-id="1241" data-hook="review-voting-widget"><span data-dcnode-id="1245" instrument_node="">

</span><span data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">A "history book" that is just as much about today's global politics</span></span><span data-dcnode-id="1212" instrument_node="">
</span></span></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1208" data-hook="review-date"><span data-dcnode-id="1209" instrument_node="">Reviewed in the United Kingdom on September 26, 2019</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1205"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1206" data-hook="avp-badge-linkless"><span data-dcnode-id="1207" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1189"><span class="a-size-base review-text" data-dcnode-id="1190" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1191" style="max-height:300px"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1198" data-hook="review-collapsed"><span data-dcnode-id="1204" instrument_node="">
</span><span data-dcnode-id="1200"><span data-dcnode-id="1203" instrument_node="">
