TRdpd social-icons__list-item social-icons__list-item--bookmark social-icons__list-item--circular thinner" data-dcnode-id="1016" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;BookmarkIcon&quot;}" data-in-view="{&quot;pattern&quot;:&quot;BookmarkIcon&quot;}" data-include-experiments="true"><a aria-label="Save story. Press Enter to save this story for later. Press Escape to dismiss tooltip." class="external-link SocialIconExternalLink-gugldc rgIHQ social-icons__link social-icons__link--bookmark" data-dcnode-id="1017" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;#&quot;}" href="#" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="1018"><svg class="icon icon-bookmark" data-dcnode-id="1019" fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="1022">Save Story</title><path class="icon-bookmark-fill" d="M20 23.9508L12.5 19.7312L5 23.9508V2.95081H14V3.93211H6V22.1845L12.5 18.5536L19 22.1845V8.83866H20V23.9508Z" data-dcnode-id="1021" fill="black"></path><path class="icon-bookmark-stroke" d="M23 3H20V0H19V3H16V4H19V7H20V4H23V3Z" data-dcnode-id="1020" fill="black"></path></svg></div></a></li><div class="AlertWrapper-dYgLvk eckTvm" data-dcnode-id="1011" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;Alert&quot;}" data-in-view="{&quot;pattern&quot;:&quot;Alert&quot;}" data-include-experiments="true" role="tooltip"><div aria-hidden="true" class="AlertArrow-dBbxeu lczlv alert-arrow" data-dcnode-id="1015" role="presentation"></div><div class="BaseWrap-sc-TURhJ BaseText-fFzBQt AlertMessage-kUrqmw dvHCmL iUpuJk bRWbOB alert-message" data-dcnode-id="1012"><div data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Save this story for later.</span></div></div></div></ul></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="1007"></div></div></aside></header></div><div class="ArticlePageContentBackGround-eCrksR jtzOWH" data-attribute-verso-pattern="article-body" data-dcnode-id="459"><div class="LightboxWrapper-bgKpQJ jYtxfY" data-dcnode-id="465"><div class="ArticlePageChunksContent-hqHLaf cyochf" data-dcnode-id="466" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-include-experiments="true"><div class="ArticlePageChunks-lglntq hOuAQM" data-dcnode-id="467" data-testid="ArticlePageChunks"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="896"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="905"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="906" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="907"><p class="has-dropcap has-dropcap__lead-standard-heading" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Heydar Aliyev Prospekti, a broad avenue in Baku, the capital of Azerbaijan, connects the airport to the city. The road is meant to highlight Baku’s recent modernization, and it is lined with sleek new buildings. The Heydar Aliyev Center, an undulating wave of concrete and glass, was designed by Zaha Hadid. The state oil company is housed in a twisting glass tower, and the headquarters of the state water company looks like a giant water droplet. “It’s like Potemkin,” my translator told me. “It’s only the buildings right next to the road.” Behind the gleaming structures stand decaying Soviet-era apartment blocks, with clothes hanging out of windows and wallboards exposed by fallen brickwork.</span></p><p class="paywall" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">As you approach the city center, a tower at the end of the avenue looms in front of you. Thirty-three stories high and curved to resemble a sail, the building was clearly inspired by the Burj Al Arab Hotel, in Dubai, but it is boxier and less elegant. When I visited Baku, in December, five enormous white letters glowed at the top of the tower: T-R-U-M-P.</span></p><p class="paywall" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">The building, a five-star hotel and residence called the Trump International Hotel &amp; Tower Baku, has never opened, though from the road it looks ready to welcome the public. Reaching the property is surprisingly difficult; the tower stands amid a welter of on-ramps, off-ramps, and overpasses. During the nine days I was in town, I went to the site half a dozen times, and on each occasion I had a comical exchange with a taxi-driver who had no idea which combination of turns would lead to the building’s entrance.</span></p><p class="paywall" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">The more time I spent in the neighborhood, the more I wondered how the hotel could have been imagined as a viable business. The development was conceived, in 2008, as a high-end apartment building. In 2012, after Donald Trump’s company, the Trump Organization, signed multiple contracts with the Azerbaijani developers behind the project, plans were made to transform the tower into an “ultra-luxury property.” According to a Trump Organization press release, a hotel with “expansive guest rooms” would occupy the first thirteen floors; higher stories would feature residences with “spectacular views of the city and Caspian Sea.” For an expensive hotel, the Trump Tower Baku is in an oddly unglamorous location: the underdeveloped eastern end of downtown, which is dominated by train tracks and is miles from the main business district, on the west side of the city. Across the street from the hotel is a discount shopping center; the area is filled with narrow, dingy shops and hookah bars. Other hotels nearby are low-budget options: at the AYF Palace, most rooms are forty-two dollars a night. There are no upscale restaurants or shops. Any guests of the Trump Tower Baku would likely feel marooned.</span></p><p class="paywall" data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">The timing of the project was also curious. By 2014, when the Trump Organization publicly announced that it was helping to turn the tower into a hotel, a construction boom in Baku had ended, and the occupancy rate for luxury hotels in the city hovered around thirty-five per cent. Jan deRoos, of Cornell University, who is an expert in hotel finance, told me that the developer of a five-star hotel typically must demonstrate that the project will maintain an average occupancy rate of at least sixty per cent for ten years. There is a long-term master plan to develop the area around the Trump Tower Baku, but if it is implemented the hotel will be surrounded for years by noisy construction projects, making it even less appealing to travellers desiring a luxurious experience—especially considering that there are many established hotels on the city’s seaside promenade. There, an executive from ExxonMobil or the Israeli cell-phone industry can stay at the Four Seasons, which occupies a limestone building that evokes a French colonial palace, or at the J. W. Marriott </span><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Absheron</span></em><span data-dcnode-id="991" instrument_node=""> Baku, which has an outdoor terrace overlooking the water. Tiffany, Ralph Lauren, and Armani are among the dozens of companies that have boutiques along the promenade.</span></p><p class="paywall" data-dcnode-id="985"><span data-dcnode-id="989" instrument_node="">A former top official in Azerbaijan’s Ministry of Tourism says that, when he learned of the Trump hotel project, he asked himself, “Why would someone put a luxury hotel there? Nobody who can afford to stay there would want to be in </span><em data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">that</span></em><span data-dcnode-id="986" instrument_node=""> neighborhood.”</span></p><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="982" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="984"></div><div class="journey-unit" data-dcnode-id="983"></div></div><p class="paywall" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">The Azerbaijanis behind the project were close relatives of Ziya Mammadov, the Transportation Minister and one of the country’s wealthiest and most powerful oligarchs. According to the Transparency International Corruption Perceptions Index, Azerbaijan is among the most corrupt nations in the world. Its President, Ilham Aliyev, the son of the former President Heydar Aliyev, recently appointed his wife to be Vice-President. Ziya Mammadov became the Transportation Minister in 2002, around the time that the regime began receiving enormous profits from government-owned oil reserves in the Caspian Sea. At the time of the hotel deal, Mammadov, a career government official, had a salary of about twelve thousand dollars, but he was a billionaire.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="979" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">The Trump Tower Baku originally had a construction budget of a hundred and ninety-five million dollars, but it went through multiple revisions, and the cost ended up being much higher. The tower was designed by a local architect, and in its original incarnation it had an ungainly roof that suggested the spikes of a crown. A London-based architecture firm, Mixity, redesigned the building, softening its edges and eliminating the ornamental roof. By the time the Trump team officially joined the project, in May, 2012, many condominium residences had already been completed; at the insistence of Trump Organization staffers, most of the building’s interior was gutted and rebuilt, and several elevators were added.</span></p><p class="paywall" data-dcnode-id="969"><span data-dcnode-id="976" instrument_node="">After Donald Trump became a candidate for President, in 2015, </span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Mother Jones</span></em><span data-dcnode-id="973" instrument_node="">, the Associated Press, the Washington </span><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Post</span></em><span data-dcnode-id="970" instrument_node="">, and other publications ran articles that raised questions about his involvement in the Baku project. These reports cited a series of cables sent from the U.S. Embassy in Azerbaijan in 2009 and 2010, which were made public by WikiLeaks. In one of the cables, a U.S. diplomat described Ziya Mammadov as “notoriously corrupt even for Azerbaijan.” The Trump Organization’s chief legal officer, Alan Garten, told reporters that the Baku hotel project raised no ethical issues for Donald Trump, because his company had never engaged directly with Mammadov.</span></p><div class="GenericCalloutWrapper-XXWD jHTPqP callout--has-top-border" data-dcnode-id="927" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-in-view="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-include-experiments="true" data-te rtoons&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//condenaststore.com/conde-nast-brand/cartoons" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="936"><svg class="icon icon-shopping" data-dcnode-id="937" focusable="false" height="18" viewBox="0 0 24 18" width="24" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="942">Shopping</title><g data-dcnode-id="938" fill="none" fill-rule="evenodd"><path d="M20 16a2 2 0 1 1-3.999.001A2 2 0 0 1 20 16" data-dcnode-id="941" fill="#D4D4D4"></path><path class="stroke-only" d="M0 1h4.36L8 12l12.952-3.364L22 4.273H5.238" data-dcnode-id="940" stroke="#D4D4D4" stroke-width="2" style="fill:none !important"></path><path d="M12 16a2 2 0 1 1-3.999.001A2 2 0 0 1 12 16M21 8l-4.714 2L8 12 6 4h16z" data-dcnode-id="939" fill="#D4D4D4"></path></g></svg></div></a></li></ul></div></div></span></div></figure></div><p class="paywall" data-dcnode-id="922"><span data-dcnode-id="926" instrument_node="">According to Garten, Trump played a passive role in the development of the property: he was “merely a licensor” who allowed his famous name to be used by a company headed by Ziya Mammadov’s son, Anar, a young entrepreneur. It’s not clear how much money Trump made from the licensing agreement, although in his limited public filings he has reported receiving $2.8 million. (The Trump Organization shared documents that showed an additional payment of two and a half million dollars, in 2012, but declined to disclose any other payments.) Trump also had signed a contract to manage the hotel once it opened, for an undisclosed fee tied to the hotel’s performance. The Washington </span><em data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Post</span></em><span data-dcnode-id="923" instrument_node=""> published Garten’s description of the deal, and reported that Donald Trump had “invested virtually no money in the project while selling the rights to use his name and holding the contract to manage the property.”</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="910" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"><figure class="VideoFigure-hZUgyy jbuRMw" data-dcnode-id="911" data-testid="cne-interlude-container"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeHeader-bqgsPm eTiIvU bBIcIl gJspkd" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Video From The New Yorker</span></p><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA InterludeTitleLink-bfxTQh eTiIvU hPdaTG iYqWCq csoDwQ" data-dcnode-id="917" rel="noopener noreferrer" target="_blank"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeTitle-bLsuTB eTiIvU eHlqFt jGCXEq" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">&nbsp;</span></p></a><figure class="CneVideoEmbedFigure-bJIZil iOHMUe cne-video-embed" data-dcnode-id="912"><div data-dcnode-id="913" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="915" id="83b5ded8-9540-b086-b2a4-83ab271474f" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;position:relative;transition:height 300ms ease-in-out;vertical-align:top;width:100%;"><iframe allowfullscreen="true" allowtransparency="true" data-dcnode-id="916" frameborder="0" msallowfullscreen="true" scrolling="no" style="height:1px !important;left:0px;min-height:100%;min-width:100%;position:absolute;top:0px;width:1px !important;" title="Video Player"></iframe></div></div></figure></figure></div><p class="paywall" data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">A month after Trump was elected President, Garten announced that the Trump Organization had severed its ties with the hotel project, describing the decision to CNN as little more than “housecleaning.” I was in Baku at the time, and it had become clear that the Trump Organization’s story of the hotel was incomplete and inaccurate. Trump’s company had made the deal not just with Anar Mammadov but also with Ziya’s brother Elton—an influential member of the Azerbaijani parliament. Elton signed the contracts, and in an interview he confirmed that he founded Baku XXI Century, the company that owns the Trump Tower Baku. When he was asked who owns Baku XXI Century, he called it a “commercial secret” but added that he “controlled all its operations” until 2015, when he cut ties to the company. Elton denied having used his political position for profit.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="897"><aside class="PersistentAsideWrapper-OTtoN iRwLFv persistent-aside" data-dcnode-id="898" data-testid="PersistentAsideWrapper" style="position: absolute; top: 636.609px; height: 6547.45px;"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="899"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="901"><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="902" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="904"></div><div class="journey-unit" data-dcnode-id="903"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="900"></div></div></aside></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="895"></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="845"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="850"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="851" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="852"><p class="paywall" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">An Azerbaijani lawyer who worked on the project revealed to me that the Trump Organization had not just licensed the family name; it also had signed a technical-services agreement in which it promised to help its partner meet Trump design standards. Technical-services agreements are often nominal addenda to licensing deals. Major hospitality brands compile exhaustive specifications for licensed hotels, and tend to approve design elements remotely; a foreign site is visited only occasionally. But in the case of Trump Tower Baku the oversight appears to have been extensive. The Azerbaijani lawyer told me, “We were always following their instructions. We were in constant contact with the Trump Organization. They approved the smallest details.” He said that Trump staff visited Baku at least monthly to give the go-ahead for the next round of work orders. Trump designers went to Turkey to vet the furniture and fabrics acquired there. The hotel’s main designer, Pierre Baillargeon, and several contractors told me that they had visited the Trump Organization headquarters, in New York, to secure approval for their plans.</span></p><p class="paywall" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Ivanka Trump was the most senior Trump Organization official on the Baku project. In October, 2014, she visited the city to tour the site and offer advice. An executive at Mace, the London-based construction firm that oversaw the tower’s conversion to a hotel, met with Ivanka in Baku and New York. He told me, “She had very strong feelings, not just about the design but about the back of the hotel—landscaping, everything.” The Azerbaijani lawyer said, “Ivanka personally approved everything.” A subcontractor noted that Ivanka’s team was particular about wood panelling: it chose an expensive Macassar ebony, from Indonesia, for the ceiling of the lobby. The ballroom doors were to be made of book-matched panels of walnut. On her Web site, Ivanka posted a photograph of herself wearing a hard hat inside the half-completed hotel. A caption reads, “Ivanka has overseen the development of Trump International Hotel &amp; Tower Baku since its inception, and she recently returned from a trip to the fascinating city in Azerbaijan to check in on the project’s progress.” (Ivanka Trump declined requests to discuss the Baku project.)</span></p><p class="paywall" data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Jan deRoos, the Cornell professor, developed branded-hotel properties before entering academia. He told me that the degree of the Trump Organization’s involvement in the Baku property was atypical. “That’s very, very intense,” he said.</span></p><p class="paywall" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">The sustained back-and-forth between the Trump Organization and the Mammadovs has legal significance. If parties involved in the Trump Tower Baku project participated in any illegal financial conduct, and if the Trump Organization exerted a degree of control over the project, the company could be vulnerable to criminal prosecution. Tom Fox, a Houston lawyer who specializes in anti-corruption compliance, said, “It’s a problem if you’re making a profit off of someone else’s corrupt conduct.” Moreover, recent case law has established that licensors take on a greater legal burden when they assume roles normally reserved for developers. The Trump Organization’s unusually deep engagement with Baku XXI Century suggests that it had the opportunity and the responsibility to monitor it for corruption.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-2 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="886" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Before signing a deal with a foreign partner, American companies, including major hotel chains, conduct risk assessments and background checks that take a close look at the country, the prospective partner, and the people involved. Countless accounting and law firms perform this service, as do many specialized investigation companies; a baseline report normally costs between ten thousand and twenty-five thousand dollars. A senior executive at one of the largest American hotel chains, who asked for anonymity because he feared reprisal from the Trump Administration, said, “We wouldn’t look at due diligence as a burden. There certainly is a cost to doing it, especially in higher-risk places. But it’s as much an investment in the protection of that brand. It’s money well spent.”</span></p><p class="paywall" data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">Alan Garten told me that the Trump Organization had commissioned a risk assessment for the Baku deal, but declined to name the company that had performed it. The Washington </span><em data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Post</span></em><span data-dcnode-id="880" instrument_node=""> article on the Baku project reported that, according to Garten, the Trump Organization had undertaken “extensive due diligence” before making the hotel deal and had not discovered “any red flags.”</span></p><p class="paywall" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">But the Mammadov family, in addition to its reputation for corruption, has a troubling connection that any proper risk assessment should have unearthed: for years, it has been financially entangled with an Iranian family tied to the Iranian Revolutionary Guard Corps, the ideologically driven military force. In 2008, the year that the tower was announced, Ziya Mammadov, in his role as Transportation Minister, awarded a series of multimillion-dollar contracts to Azarpassillo, an Iranian construction company. Keyumars Darvishi, its chairman, fought in the Iran-Iraq War. After the war, he became the head of Raman, an Iranian construction firm that is controlled by the Revolutionary Guard. The U.S. government has regularly accused the Guard of criminal activity, including drug trafficking, sponsoring terrorism abroad, and money laundering. Reuters recently reported that the Trump Administration was poised to officially condemn the Revolutionary Guard as a terrorist organization.</span></p><p class="paywall" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">I asked Garten how deeply the Trump Organization had looked into the Mammadov family’s political connections. Had it been concerned that Elton Mammadov, as a sitting member of parliament, might exploit his power to benefit the project? How much money had Ziya Mammadov invested in Elton’s company? Garten noted that he didn’t oversee the due-diligence process. “The people who did are no longer at the company,” he said. “I can’t tell you what was done in this situation.” He would not identify the former employees. When I asked him to provide documentation of due diligence, he said that he couldn’t share it with me, because “it’s confidential and privileged.”</span></p><div class="GenericCalloutWrapper-XXWD gtaVxD callout--has-top-border" data-dcnode-id="859" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-in-view="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-include-experiments="true" data-testid="GenericCallout"><figure class="AssetEmbedWrapper-iLfYbx iclJOW asset-embed" data-dcnode-id="860"><div class="AssetEmbedAssetContainer-fogSSF kRpSOB asset-embed__asset-container" data-dcnode-id="870"><span class="SpanWrapper-kGGzGm fCMktE responsive-asset AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="871"><picture class="ResponsiveImagePicture-jIKgcS fJlKfN AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset responsive-image responsive-image--expandable" data-dcnode-id="872" style="height: 264px;"><noscript data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">&lt;img alt="A 2014 Instagram post of Ivanka Trump at the Baku tower." class="ResponsiveImageContainer-dlOMGF dnUTOP responsive-image__image" src="https://media.newyorker.com/photos/59097ef21c7a8e33fb390896/master/w_1600%2Cc_limit/170313_r29543_rd.jpg" srcSet="https://media.newyorker.com/photos/59097ef21c7a8e33fb390896/master/w_120,c_limit/170313_r29543_rd.jpg 120w, https://media.newyorker.com/photos/59097ef21c7a8e33fb390896/master/w_240,c_limit/170313_r29543_rd.jpg 240w, https://media.newyorker.com/photos/59097ef21c7a8e33fb390896/master/w_320,c_limit/170313_r29543_rd.jpg 320w, https://media.newyorker.com/photos/59097ef21c7a8e33fb390896/master/w_640,c_limit/170313_r29543_rd.jpg 640w, https://media.newyorker.com/photos/59097ef21c7a8e33fb390896/master/w_960,c_limit/170313_r29543_rd.jpg 960w, https://media.newyorker.com/photos/59097ef21c7a8e33fb390896/master/w_1280,c_limit/170313_r29543_rd.jpg 1280w, https://media.newyorker.com/photos/59097ef21c7a8e33fb390896/master/w_1600,c_limit/170313_r29543_rd.jpg 1600w" sizes="100vw"/&gt;</span></noscript></picture></span></div><div class="CaptionWrapper-brisHk hqrsSC caption AssetEmbedCaption-eXYFag gJkEYz asset-embed__caption" data-dcnode-id="861" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;Caption&quot;}" data-in-view="{&quot;pattern&quot;:&quot;Caption&quot;}" data-include-experiments="true"><span class="BaseWrap-sc-TURhJ BaseText-fFzBQt CaptionText-cOFJqa eTiIvU fYICFM hTa-dbB caption__text" data-dcnode-id="864"><p data-dcnode-id="866"><span data-dcnode-id="869" instrument_node="">A 2014 Instagram post of Ivanka Trump at the Baku tower. </span><em data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Photo Illustration by The New Yorker</span></em></p><span data-dcnode-id="865" instrument_node="">
</span></span><span class="BaseWrap-sc-TURhJ BaseText-fFzBQt CaptionCredit-cTdqxu eTiIvU eCQuey fXWSOn caption__credit" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Photo Illustration by The New Yorker</span></span></div></figure></div><p class="has-dropcap has-dropcap__lead-standard-heading paywall" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">No evidence has surfaced showing that Donald Trump, or any of his employees involved in the Baku deal, actively participated in bribery, money laundering, or other illegal behavior. But the Trump Organization may have broken the law in its work with the Mammadov family. The Foreign Corrupt Practices Act, passed in 1977, forbade American companies from participating in a scheme to reward a foreign government official in exchange for material benefit or preferential treatment. The law even made it a crime for an American company to unknowingly benefit from a partner’s corruption if it could have discovered illicit activity but avoided doing so. This closed what was known as the “head in the sand” loophole.</span></p><p class="paywall" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">As a result, American companies must examine potential foreign partners very carefully before making deals with them. I recently spoke with Alexandra Wrage, who runs Trace International, a consortium of three hundred corporations that do business overseas. Trace helps these firms avoid violating the F.C.P.A., and it has a division that can be hired by individual clients to assess potential foreign partners. To comply with the law, Wrage noted, an American company must remain vigilant even after a contract is signed, monitoring its foreign partner to be sure that nobody involved is engaging in bribery or other improprieties.</span></p><p class="paywall" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Wrage pointed out that corrupt government leaders often use their children or their siblings to distance themselves from illicit projects. Such an official creates a company in the relative’s name which appears to be independent but is controlled by the official. To lessen the likelihood of an F.C.P.A. violation when working with a company that is owned by a child or a sibling of a government minister, Wrage told me, “you’d need to show that the child has real expertise, real ability to do the work.” Otherwise, Wrage said, “the assumption is that they are a partner entirely because of their ability to use their parent’s power.” Before Elton Mammadov became a member of parliament, in 2000, he was a maintenance engineer who had no experience in real-estate development. When the Trump Organization joined the Baku project, it barred a Mammadov-owned company from doing construction work, because it was deemed incompetent.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="846"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="847"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="849"></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="848"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="844"></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="736"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="744"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="745" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="746"><p class="paywall" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Wrage said that a U.S. company looking to make a deal with a foreign partner should be confident that the partner has a reasonable likelihood of making a profit from the venture. If the project seems almost guaranteed to lose money, it could well be a bribery scheme or some other criminal operation. The partner also should uphold modern accounting standards.</span></p><p class="paywall" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">“It’s simple,” she said. “Will money flow through this business because it offers a compelling product at a decent price, or will the money come because of an illicit relationship with someone who uses their power?”</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-3 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="839" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Wrage told me that, in 2009, an American entrepreneur was successfully prosecuted for his part in a corruption conspiracy in Azerbaijan. Frederic Bourke, the co-founder of Dooney &amp; Bourke, the handbag company, had invested in a project in which a foreign partner paid bribes to Azerbaijani government officials and their family members. Bourke was sentenced to a year in prison for violating the F.C.P.A.; he appealed the conviction, claiming ignorance of the corruption. Two years later, the U.S. Court of Appeals for the Second Circuit upheld the conviction, saying that, regardless of whether he had known about the bribes, “the testimony at trial demonstrated that Bourke was aware of how pervasive corruption was in Azerbaijan.” The F.C.P.A., they said, also criminalized “conscious avoidance”—a deliberate effort to remain in the dark about any transgressions a foreign partner might be involved in. After Bourke’s conviction, Wrage said, U.S. companies were well aware of the dangers of making careless deals in Azerbaijan.</span></p><p class="paywall" data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">Even a cursory look at the Mammadovs suggests that they are not ideal partners for an American business. Four years before the Trump Organization announced the Baku deal, WikiLeaks released the U.S. diplomatic cables indicating that the family was corrupt; one cable mentioned the Mammadovs’ link to Iran’s Revolutionary Guard. In 2013, Radio Free Europe/Radio Liberty and the Organized Crime and Corruption Reporting Project investigated the Mammadov family’s corruption and published well-documented exposés. Six months before the hotel announcement, </span><em data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="833" instrument_node=""> ran an article titled “The Corleones of the Caspian,” which suggested that the Mammadovs had exploited Ziya’s position as Transportation Minister to make their fortunes.</span></p><p class="paywall" data-dcnode-id="824"><span data-dcnode-id="831" instrument_node="">The Radio Free Europe/Radio Liberty investigation revealed that Baku XXI Century, the company controlled by Elton, had at least two other stakeholders. One of them was a company called </span><em class="small" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">zqan</span></em><span data-dcnode-id="828" instrument_node="">, an acronym for the family members of the Transportation Minister: Ziya Mammadov; Qanira, his wife; Anar, his son; and Nigar, his daughter. Anar is the official head of </span><em class="small" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">zqan</span></em><span data-dcnode-id="825" instrument_node="">. Another stakeholder in Baku XXI Century was the Baghlan Group, a company run by an Azerbaijani businessman who is known to be close to Ziya Mammadov.</span></p><p class="paywall" data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">Baku XXI Century, </span><em class="small" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">zqan,</span></em><span data-dcnode-id="820" instrument_node=""> and Baghlan have so many overlapping interests that they often seem to operate as a single concern. According to the Radio Free Europe/Radio Liberty investigation, the companies all prospered largely through contracts with the Transportation Ministry. The Trump Tower Baku complex was built partly on land controlled by the ministry. A Baghlan subsidiary received a contract from the ministry to import a thousand London-style cabs to Baku. Soon afterward, ministry inspectors began preventing competing taxi services from parking in the city center or at subway stops. Another new rule required all taxi owners to pay taxes and license fees at the Bank of Azerbaijan, a private entity that at the time was owned jointly by Anar Mammadov and Baghlan.</span></p><p class="paywall" data-dcnode-id="811"><span data-dcnode-id="818" instrument_node="">Anar’s net worth has been estimated at a billion dollars, but he is not a self-made man. According to the Associated Press, </span><em class="small" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">zqan</span></em><span data-dcnode-id="815" instrument_node=""> was founded in 2000, when he was in his late teens. He began studying in England that year, and remained there until 2005; during that period, the company that he ostensibly ran experienced explosive growth. Trump Organization officials, as well as others familiar with the Baku project, told me that during the tower’s construction Anar was barely involved, and was often travelling abroad. (He flies on a Gulfstream G450 private jet.) An American who did business in Azerbaijan told me, “It’s common knowledge there that Ziya Mammadov controls </span><em class="small" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">zqan</span></em><span data-dcnode-id="812" instrument_node="">.”</span></p><p class="paywall" data-dcnode-id="806"><span data-dcnode-id="810" instrument_node="">One of the cables sent in 2010 by the U.S. Embassy in Baku noted that, “with so much of the nation’s oil wealth being poured into road construction,” the Mammadovs had become disproportionately powerful in Azerbaijan. Another cable suggested that Ziya controlled </span><em class="small" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">zqan</span></em><span data-dcnode-id="807" instrument_node="">, the country’s “largest commercial development company.” This cable described Ziya as being the object of “many allegations from Azerbaijani contacts of creative corrupt practices.”</span></p><p class="has-dropcap has-dropcap__lead-standard-heading paywall" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Much of the land occupied by the Trump Tower Baku complex was once packed with houses. In 2011, residents received letters from the local government authority informing them that their homes were to be demolished to make way for a project of crucial government significance. Thirty families were evicted. One resident, Minaye Azizova, told me that the government gave her eighteen thousand dollars in compensation for a home that, by her estimation, was worth five times as much. After she discovered that her home had been condemned so that Baku XXI Century could build a luxury tower, she sued the government.</span></p><div class="GenericCalloutWrapper-XXWD jHTPqP callout--has-top-border" data-dcnode-id="756" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-in-view="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-include-experiments="true" data-testid="GenericCallout"><figure class="AssetEmbedWrapper-iLfYbx iclJOW asset-embed" data-dcnode-id="757"><div class="AssetEmbedAssetContainer-fogSSF kRpSOB asset-embed__asset-container" data-dcnode-id="758"><span class="SpanWrapper-kGGzGm fCMktE responsive-asset AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="759"><div class="ResponsiveCartoonWrapper-eLBWjY daafso responsive-cartoon AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="760" data-testid="responsive-cartoon"><a class="external-link responsive-cartoon__image-link" data-dcnode-id="800" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.newyorker.com/cartoon/a20693&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/cartoon/a20693" rel="nofollow noopener" target="_blank"><picture class="ResponsiveImagePicture-jIKgcS fArnhQ ResponsiveCartoonImage-gtSRRg kqqNOz responsive-cartoon__image responsive-image" data-dcnode-id="801" style="height: 218px;"><noscript data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">&lt;img alt="“Turns out the sound of the squeaky toy was coming from inside the house.”" class="ResponsiveImageContainer-dlOMGF dnUTOP responsive-image__image" src="https://media.newyorker.com/cartoons/593b68cf1f743c6ee49a577c/master/w_1600%2Cc_limit/170313_a20693.jpg" srcSet="https://media.newyorker.com/cartoons/593b68cf1f743c6ee49a577c/master/w_120,c_limit/170313_a20693.jpg 120w, https://media.newyorker.com/cartoons/593b68cf1f743c6ee49a577c/master/w_240,c_limit/170313_a20693.jpg 240w, https://media.newyorker.com/cartoons/593b68cf1f743c6ee49a577c/master/w_320,c_limit/170313_a20693.jpg 320w, https://media.newyorker.com/cartoons/593b68cf1f743c6ee49a577c/master/w_640,c_limit/170313_a20693.jpg 640w, https://media.newyorker.com/cartoons/593b68cf1f743c6ee49a577c/master/w_960,c_limit/170313_a20693.jpg 960w, https://media.newyorker.com/cartoons/593b68cf1f743c6ee49a577c/master/w_1280,c_limit/170313_a20693.jpg 1280w, https://media.newyorker.com/cartoons/593b68cf1f743c6ee49a577c/master/w_1600,c_limit/170313_a20693.jpg 1600w" sizes="100vw"/&gt;</span></noscript></picture></a><div class="CaptionWrapper-brisHk hqrsSC caption ResponsiveCartoonCaption-fIJtV ljuEym responsive-cartoon__caption" data-dcnode-id="794" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;Caption&quot;}" data-in-view="{&quot;pattern&quot;:&quot;Caption&quot;}" data-include-experiments="true"><span class="BaseWrap-sc-TURhJ BaseText-fFzBQt CaptionText-cOFJqa eTiIvU fYICFM wOCFN caption__text" data-dcnode-id="795"><span data-dcnode-id="799" instrument_node="">“Turns out the sound of the squeaky toy was coming from </span><em class="underline" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">inside</span></em><span data-dcnode-id="796" instrument_node=""> the house.”</span></span></div><div class="SocialIconsWrapper-ixWYBx eavmKn social-icons social-icons--standard ResponsiveCartoonIcons-bdGpxX UTsQD responsive-cartoon__social-icons" data-dcnode-id="761" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;SocialIcons&quot;}" data-in-view="{&quot;pattern&quot;:&quot;SocialIcons&quot;}" data-include-experiments="true"><ul class="SocialIconsList-NTOMk kKiupF social-icons__list" data-dcnode-id="762"><li class="SocialIconsListItem-hYmGVl brmqHp social-icons__list-item social-icons__list-item--facebook social-icons__list-item--standard thinner" data-dcnode-id="787"><a aria-label="Share on Facebook" class="external-link SocialIconExternalLink-gugldc YWqLt social-icons__link social-icons__link--facebook" data-dcnode-id="788" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.facebook.com/dialog/feed?&amp;display=popup&amp;caption=&amp;app_id=1147169538698836&amp;link=https%3A%2F%2Fwww.newyorker.com%2Fcartoon%2Fa20693%3Futm_source%3Dfacebook%26utm_medium%3Dsocial%26utm_campaign%3Donsite-share%26utm_brand%3Dthe-new-yorker%26utm_social-type%3Dearned&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.co dcnode-id="777"></path></svg></div></a></li><li class="SocialIconsListItem-hYmGVl brmqHp social-icons__list-item social-icons__list-item--store social-icons__list-item--standard thinner" data-dcnode-id="763"><a aria-label="Get in store" class="external-link SocialIconExternalLink-gugldc YWqLt social-icons__link social-icons__link--store" data-dcnode-id="764" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://condenaststore.com/conde-nast-brand/cartoons&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//condenaststore.com/conde-nast-brand/cartoons" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="765"><svg class="icon icon-shopping" data-dcnode-id="766" focusable="false" height="18" viewBox="0 0 24 18" width="24" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="771">Shopping</title><g data-dcnode-id="767" fill="none" fill-rule="evenodd"><path d="M20 16a2 2 0 1 1-3.999.001A2 2 0 0 1 20 16" data-dcnode-id="770" fill="#D4D4D4"></path><path class="stroke-only" d="M0 1h4.36L8 12l12.952-3.364L22 4.273H5.238" data-dcnode-id="769" stroke="#D4D4D4" stroke-width="2" style="fill:none !important"></path><path d="M12 16a2 2 0 1 1-3.999.001A2 2 0 0 1 12 16M21 8l-4.714 2L8 12 6 4h16z" data-dcnode-id="768" fill="#D4D4D4"></path></g></svg></div></a></li></ul></div></div></span></div></figure></div><p class="paywall" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Construction of the building began in 2008. I have spoken with more than a dozen contractors who worked on it. Some of them described behavior that seemed nakedly corrupt. Frank McDonald, an Englishman who has had a long career doing construction jobs in developing countries, performed extensive work on the building’s interior. He told me that his firm was always paid in cash, and that he witnessed other contractors being paid in the same way. At the offices of Anar Mammadov’s company, he said, “they would give us a giant pile of cash,” adding, “I got a hundred and eighty thousand dollars one time, which I fit into my laptop bag, and two hundred thousand dollars another time.” Once, a colleague of his picked up a payment of two million dollars. “He needed to bring a big duffelbag,” McDonald recalled. The Azerbaijani lawyer confirmed that some contractors on the Baku tower were paid in cash.</span></p><p class="paywall" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Two people who worked on the Trump Tower Baku told me that bribes were paid. Much of the graft was routine: Azerbaijani tax officials, government inspectors, and customs officers showed up occasionally to pick up envelopes of cash.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-4 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="751" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">The executive at Mace, the construction firm, told me that the Mammadovs handled payments and all interactions with the Azerbaijani government. “Were people bribed?” he said. “I don’t know. Maybe. We didn’t check.” (A spokesman for Mace said that the firm was “not involved” in any corruption.)</span></p><p class="paywall" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Pierre Baillargeon, the architect whom the Mammadovs hired to alter the tower’s original design, is a Canadian who runs a studio in London. He has often worked in parts of the world known for corruption, including Sudan and Syria, and has done several projects in Azerbaijan. In a phone interview, Baillargeon said that he knew nothing about corruption and was “just a designer.” I asked him why he thought the hotel had been built in such an inhospitable part of Baku. “Every project has detractors,” he said. When I asked him if he had seen large payments being made in cash, he hung up. (He did not respond to later calls.)</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="737"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="738"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="740"><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="741" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="743"></div><div class="journey-unit" data-dcnode-id="742"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="739"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="735"></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="654"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="659"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="660" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="661"><p class="paywall" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Alan Garten, the Trump Organization lawyer, did not deny that there was corruption involved in the project. “I’m not going to sit here and defend the Mammadovs,” he said. But, from a legal standpoint, he argued, the Trump Organization was blameless. In his opinion, the Foreign Corrupt Practices Act doesn’t apply to the Baku deal, even if corruption occurred. “We didn’t own it,” he said of the hotel. “We had no equity. We didn’t control the project. The flow of funds is in the wrong direction.” He added, “We did not pay any money to anyone. Therefore, it could not be a violation of the F.C.P.A.”</span></p><p class="paywall" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">“No, that’s just wrong,” Jessica Tillipman, an assistant dean at George Washington University Law School, who specializes in the F.C.P.A., said. “You can’t go into business deals in Azerbaijan assuming that you are immune from the F.C.P.A.” She added, “Nor can you escape liability by looking the other way. The entire Baku deal is a giant red flag—the direct involvement of foreign government officials and their relatives in Azerbaijan with ties to the Iranian Revolutionary Guard. Corruption warning signs are rarely more obvious.”</span></p><p class="paywall" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Tillipman explained that the F.C.P.A. defines corruption as “the payment of money or anything of value” to a foreign official. Last year, JPMorgan Chase agreed to pay two hundred and sixty-four million dollars to settle charges that it had violated the F.C.P.A.; the bank had given jobs and internships to relatives and friends of government officials in Asia. Tillipman, along with several other F.C.P.A. experts, told me that the Trump Organization had clearly provided things of value in the Baku deal: its famous brand, its command of the luxury market, its extensive technical advice.</span></p><p class="paywall" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">In May, 2012, the month the Baku deal was finalized, the F.C.P.A. was evidently on Donald Trump’s mind. In a phone-in appearance on CNBC, he expressed frustration with the law. “Every other country goes into these places and they do what they have to do,” he said. “It’s a horrible law and it should be changed.” If American companies refused to give bribes, he said, “you’ll do business nowhere.” He continued, “There is one answer—go to your room, close the door, go to sleep, and don’t do any deals, because that’s the only way. The only way you’re going to do it is the other way.”</span></p><p class="paywall" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">It is unclear how the Trump Administration plans to approach F.C.P.A. enforcement. Jay Clayton, Trump’s choice to run the Securities and Exchange Commission, co-authored a paper in 2011 arguing that American companies were at a severe disadvantage because of the U.S. government’s “singular strategy of zealous enforcement.” But Jeff Sessions, the new Attorney General, told the Senate Judiciary Committee during his confirmation hearings that he will continue to uphold the F.C.P.A.</span></p><p class="has-dropcap has-dropcap__lead-standard-heading paywall" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">After 9/11, prosecuting financial corruption acquired new political importance. The C.I.A. and other intelligence services came to believe that preventing illicit money from flowing through the global financial system was a necessary tactic in preventing future terrorist attacks, and the U.S. led an international effort to enforce financial transparency. Banks and other financial entities were required to vet their clients aggressively and to report any suspicious activity. Prosecutions for money laundering, bribery, and other financial crimes rose significantly. In 2000, the government launched three prosecutions under the F.C.P.A. Last year, it initiated fifty-four.</span></p><p class="paywall" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Investigators of financial fraud like to say that government corruption, money laundering, and other illicit behavior often form a “nexus” with even more troubling activity, such as financing terrorism and developing weapons of mass destruction. This appears to be true in the Baku deal. As the Mammadovs were preparing to build the tower, the family patriarch, Ziya, was cementing his financial relationship with the Darvishis, the Iranian family with ties to the country’s Revolutionary Guard.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-5 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="720" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="715"><span data-dcnode-id="719" instrument_node="">At least three Darvishis—the brothers Habil, Kamal, and Keyumars—appear to be associates of the Guard. In Farsi press accounts, Habil, who runs the Tehran Metro Company, is referred to as a </span><em data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">sardar</span></em><span data-dcnode-id="716" instrument_node="">, a term for a senior officer in the Revolutionary Guard. A cable sent on March 6, 2009, from the U.S. Embassy in Baku described Kamal as having formerly run “an alleged Revolutionary Guard-controlled business in Iran.” The company, called Nasr, developed and acquired instruments, guidance systems, and specialty metals needed to build ballistic missiles. In 2007, Nasr was sanctioned by the U.S. for its role in Iran’s effort to develop nuclear missiles.</span></p><p class="paywall" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">The cable said that Kamal and Keyumars were frequent visitors to Azerbaijan; Kamal had recently established “a close business relationship/friendship” with Ziya Mammadov, and, with Mammadov’s assistance, had been awarded “at least eight major road construction and rehabilitation contracts, including contracts for construction of the Baku-Iranian Astara highway.” (Keyumars also seems to have been involved in these deals.) The cable added, “We assume Mammedov [sic] is a silent partner in these contracts.”</span></p><div class="GenericCalloutWrapper-XXWD jHTPqP callout--has-top-border" data-dcnode-id="668" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-in-view="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-include-experiments="true" data-testid="GenericCallout"><figure class="AssetEmbedWrapper-iLfYbx iclJOW asset-embed" data-dcnode-id="669"><div class="AssetEmbedAssetContainer-fogSSF kRpSOB asset-embed__asset-container" data-dcnode-id="670"><span class="SpanWrapper-kGGzGm fCMktE responsive-asset AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="671"><div class="ResponsiveCartoonWrapper-eLBWjY daafso responsive-cartoon AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="672" data-testid="responsive-cartoon"><a class="external-link responsive-cartoon__image-link" data-dcnode-id="709" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.newyorker.com/cartoon/dator-2011-01-10&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/cartoon/dator-2011-01-10" rel="nofollow noopener" target="_blank"><picture class="ResponsiveImagePicture-jIKgcS fArnhQ ResponsiveCartoonImage-gtSRRg kqqNOz responsive-cartoon__image responsive-image" data-dcnode-id="710" style="height: 166px;"><noscript data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">&lt;img alt="“Does the No. 1 stop here and does that go to Penn Station and can I get a train there to Philadelphia and then how do I..." class="ResponsiveImageContainer-dlOMGF dnUTOP responsive-image__image" src="https://media.newyorker.com/cartoons/593b68d11f743c6ee49a5780/master/w_1600%2Cc_limit/170313_dator-2011-01-10.jpg" srcSet="https://media.newyorker.com/cartoons/593b68d11f743c6ee49a5780/master/w_120,c_limit/170313_dator-2011- ce%3Donsite-share%26utm_medium%3Demail%26utm_campaign%3Donsite-share%26utm_brand%3Dthe-new-yorker&quot;}" href="mailto:?subject=&amp;body=https%3A%2F%2Fwww.newyorker.com%2Fcartoon%2Fdator-2011-01-10%3Futm_source%3Donsite-share%26utm_medium%3Demail%26utm_campaign%3Donsite-share%26utm_brand%3Dthe-new-yorker" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="687"><svg class="icon icon-email" data-dcnode-id="688" focusable="false" height="13" viewBox="0 0 17.3 13" width="17.3" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="690">Email</title><path d="M0 .776V13h17.333V.776L8.67 8.931 0 .776z M.756 0L8.67 7.443 16.578 0H.756z" data-dcnode-id="689"></path></svg></div></a></li><li class="SocialIconsListItem-hYmGVl brmqHp social-icons__list-item social-icons__list-item--store social-icons__list-item--standard thinner" data-dcnode-id="675"><a aria-label="Get in store" class="external-link SocialIconExternalLink-gugldc YWqLt social-icons__link social-icons__link--store" data-dcnode-id="676" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://condenaststore.com/conde-nast-brand/cartoons&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//condenaststore.com/conde-nast-brand/cartoons" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="677"><svg class="icon icon-shopping" data-dcnode-id="678" focusable="false" height="18" viewBox="0 0 24 18" width="24" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="683">Shopping</title><g data-dcnode-id="679" fill="none" fill-rule="evenodd"><path d="M20 16a2 2 0 1 1-3.999.001A2 2 0 0 1 20 16" data-dcnode-id="682" fill="#D4D4D4"></path><path class="stroke-only" d="M0 1h4.36L8 12l12.952-3.364L22 4.273H5.238" data-dcnode-id="681" stroke="#D4D4D4" stroke-width="2" style="fill:none !important"></path><path d="M12 16a2 2 0 1 1-3.999.001A2 2 0 0 1 12 16M21 8l-4.714 2L8 12 6 4h16z" data-dcnode-id="680" fill="#D4D4D4"></path></g></svg></div></a></li></ul></div></div></span></div></figure></div><p class="paywall" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Iran has two militaries. The Iranian Army is a conventional force whose mission is to protect the country. The Revolutionary Guard is an independent force of about a hundred and fifty thousand soldiers, whose duty is to protect the country’s Islamic system and to preserve the power of the Supreme Leader, Ayatollah Ali Khamenei. The Revolutionary Guard has its own air force and navy, and it has a unit known as the Quds Force, which the United States has identified as a major supporter of Hezbollah and other international terrorist groups. The Guard has developed a shadow economy within Iran to fund its activities and expand its power. It controls all official border crossings and runs several unofficial ports, solely for its own use. The Revolutionary Guard smuggles into the country everything from consumer goods blocked by sanctions to drugs. It also owns seemingly legitimate companies in construction, energy, telecommunications, auto manufacturing, and banking. According to the United States Institute of Peace, the Guard is linked “to dozens, perhaps even hundreds, of companies that appear to be private in nature but are run by [Revolutionary Guard] veterans.”</span></p><p class="paywall" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">J. Matthew McInnis, an Iran expert at the American Enterprise Institute, who served as a consultant to Michael Flynn when Flynn was the head of the Defense Intelligence Agency, told me that owners of Revolutionary Guard-related businesses often become rich. But there is a catch: from time to time, they should expect to be asked to serve the needs of the Guard. “When the Revolutionary Guard says, ‘We need to move some illicit stuff,’ or ‘We need new parts for our missiles,’ they reach out to these guys,” McInnis explained. “It’s a soft network that can do all sorts of things that are very hard to trace.”</span></p><p class="paywall" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Keyumars Darvishi once ran Raman, a construction firm that is owned by the Islamic Revolution Mostazafan Foundation. According to the United Nations, the foundation is a major financial arm of the Revolutionary Guard. Keyumars left Raman to run Azarpassillo, the putatively independent construction company that received multiple road contracts in Azerbaijan. According to Azarpassillo’s Web site, it was incorporated in 2008. In recent years, Keyumars has also served as the acting director of the Tehran Metro Company, filling in for his brother Habil.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="655"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="656"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="658"></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="657"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="653"></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="581"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="589"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="590" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="591"><p class="paywall" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Mehrzad Boroujerdi, a political scientist at Syracuse University, who studies the political, economic, and military élite of Iran, said, “It looks like Azarpassillo is a front organization for the Revolutionary Guard.” He found it inconceivable that Keyumars Darvishi, after working for years in a company controlled by the Revolutionary Guard, would quit, raise large amounts of capital on his own, and then become the head of a fully independent company that competed against Revolutionary Guard fronts for contracts. Khatam Al-Anbia, an Iranian construction giant that is controlled by the Guard and is under U.S. sanctions, has subcontracted Azarpassillo on at least two major infrastructure projects in Iran. The Tehran Metro Company is also involved in both projects. McInnis told me, “If you see a connection with Khatam Al-Anbia, you would assume the connections to the Revolutionary Guard are there. The suspicion of Azarpassillo being a front company is certainly worth investigating. It would fit a normal pattern.”</span></p><p class="paywall" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Alan Garten told me that the Trump Organization checks to see if potential Trump partners are on “watch lists and sanctions lists,” and that the company knew nothing of Ziya Mammadov’s relationship to the Darvishis until 2015, when it learned that “certain principals associated with the developer may have had some association with some problematic entities.” And yet, by that point, the U.S. Embassy cables had been online for four years. Garten insisted that the Trump Organization still has no idea if the association between the Mammadovs and the Darvishis is real, or if it’s simply an allegation “spread by the media.” I recently spoke with Allison Melia, who until 2015 was one of the C.I.A.’s lead analysts of Iran’s economy; she now works for the Crumpton Group, a strategic advisory firm whose services include conducting due diligence for companies. She told me that her team could have compiled a dossier on the Mammadovs and their connection to the Revolutionary Guard in “a couple of days.” She said that any reputable investigative firm conducting a risk assessment would have advised a U.S. company to avoid a deal with a family connected to the Revolutionary Guard.</span></p><p class="paywall" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">The U.S. has imposed various sanctions on Iran since the Islamic Revolution, in 1979. In recent years, U.S. and international efforts have focussed on isolating Iran from the global financial system, in order to prevent it from funding terrorist groups and contributing to worldwide instability. In 2015, the U.N., spurred by the Obama Administration, reached an agreement with Iran, and lifted some sanctions in return for a slowdown of the country’s nuclear program. However, according to the Congressional Research Service, many sanctions against Iran remain in effect, because of the country’s “support for terrorism, its human-rights abuses, its interference in specified countries in the region, and its missile and advanced-conventional-weapons programs.” In December, 2015, the U.S. House of Representatives imposed additional sanctions on the Revolutionary Guard and its associated businesses.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-6 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="646" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">American companies must insure that they are not receiving funds that originated with any sanctioned entity. Ignorance is not a defense, especially if there is ample warning that a foreign partner could have a link to such an entity. Most firms, upon hearing of even a slight chance of Iranian involvement, conduct due diligence that is much more extensive than what is typical for F.C.P.A. compliance. Erich Ferrari, an attorney who specializes in sanctions-related legal cases, said that before the Trump Organization cashed any checks it should have been certain of “the source of the funds”—“not only the bank it was remitted from but how the Mammadovs actually earned the money they paid.” He said of the Baku deal, “It takes a lot to shock a lawyer, but I’ve had very few clients do so little due diligence.”</span></p><p class="has-dropcap has-dropcap__lead-standard-heading paywall" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The nexus between the Mammadovs and the Darvishis suggests both opportunism and desperation. Ziya Mammadov is sixty-four, and in recent years the family’s position in Azerbaijan has begun to weaken. President Aliyev has systematically isolated, and then fired, longtime members of the regime in order to make way for his own cronies. From 2008 to 2014, Ziya Mammadov, perhaps fearing his ejection from political office, vastly increased his personal wealth.</span></p><p class="paywall" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">During the same period, mounting international sanctions made it far more difficult for Iran to sell oil abroad, receive foreign funds, and import products. International banks became increasingly reluctant to accept funds from businesses owned by the Revolutionary Guard, severely limiting its ability to support allies such as Hezbollah and the Syrian government. At a moment when Iran was struggling to find ways to send money outside the country, Keyumars Darvishi joined Azarpassillo and began making one deal after another in Azerbaijan.</span></p><p class="paywall" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Ziya Mammadov apparently had complete discretion with regard to Azarpassillo’s projects. On April 6, 2007, Anne Derse, then the U.S. Ambassador to Azerbaijan, wrote in a cable that Charles Redman, at the time a senior vice-president for the American construction firm Bechtel, had recently met with Ziya Mammadov. Redman was looking for business, and knew that Azerbaijan was planning several major new roads. Bechtel could build them, he said, at an average cost of six million dollars per kilometre. Mammadov complained to him that this was too expensive. Bechtel ended up building nothing. Instead, much of the roadwork was done by Azarpassillo—at a much higher cost. According to a 2012 report by Azerbaijan’s Center for Economic and Social Development, an independent think tank, road construction during Mammadov’s tenure was “the most expensive in the world,” costing an average of eighteen million dollars per kilometre. (Derse declined to comment; Redman did not respond to e-mails.)</span></p><div class="GenericCalloutWrapper-XXWD jHTPqP callout--has-top-border" data-dcnode-id="596" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-in-view="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-include-experiments="true" data-testid="GenericCallout"><figure class="AssetEmbedWrapper-iLfYbx iclJOW asset-embed" data-dcnode-id="597"><div class="AssetEmbedAssetContainer-fogSSF kRpSOB asset-embed__asset-container" data-dcnode-id="598"><span class="SpanWrapper-kGGzGm fCMktE responsive-asset AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="599"><div class="ResponsiveCartoonWrapper-eLBWjY daafso responsive-cartoon AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="600" data-testid="responsive-cartoon"><a class="external-link responsive-cartoon__image-link" data-dcnode-id="634" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.newyorker.com/cartoon/finck-2015-07-20&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/cartoon/finck-2015-07-20" rel="nofollow noopener" target="_blank"><picture class="
