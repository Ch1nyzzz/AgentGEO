%26utm_brand%3Dthe-new-yorker&quot;}" href="mailto:?subject=&amp;body=https%3A%2F%2Fwww.newyorker.com%2Fcartoon%2Ffinck-2015-07-20%3Futm_source%3Donsite-share%26utm_medium%3Demail%26utm_campaign%3Donsite-share%26utm_brand%3Dthe-new-yorker" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="615"><svg class="icon icon-email" data-dcnode-id="616" focusable="false" height="13" viewBox="0 0 17.3 13" width="17.3" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="618">Email</title><path d="M0 .776V13h17.333V.776L8.67 8.931 0 .776z M.756 0L8.67 7.443 16.578 0H.756z" data-dcnode-id="617"></path></svg></div></a></li><li class="SocialIconsListItem-hYmGVl brmqHp social-icons__list-item social-icons__list-item--store social-icons__list-item--standard thinner" data-dcnode-id="603"><a aria-label="Get in store" class="external-link SocialIconExternalLink-gugldc YWqLt social-icons__link social-icons__link--store" data-dcnode-id="604" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://condenaststore.com/conde-nast-brand/cartoons&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//condenaststore.com/conde-nast-brand/cartoons" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="605"><svg class="icon icon-shopping" data-dcnode-id="606" focusable="false" height="18" viewBox="0 0 24 18" width="24" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="611">Shopping</title><g data-dcnode-id="607" fill="none" fill-rule="evenodd"><path d="M20 16a2 2 0 1 1-3.999.001A2 2 0 0 1 20 16" data-dcnode-id="610" fill="#D4D4D4"></path><path class="stroke-only" d="M0 1h4.36L8 12l12.952-3.364L22 4.273H5.238" data-dcnode-id="609" stroke="#D4D4D4" stroke-width="2" style="fill:none !important"></path><path d="M12 16a2 2 0 1 1-3.999.001A2 2 0 0 1 12 16M21 8l-4.714 2L8 12 6 4h16z" data-dcnode-id="608" fill="#D4D4D4"></path></g></svg></div></a></li></ul></div></div></span></div></figure></div><p class="paywall" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">The available evidence strongly suggests that Ziya Mammadov conspired with an agent of the Revolutionary Guard to make overpriced deals that would enrich them both while allowing them to flout prohibitions against money laundering and to circumvent sanctions against Iran. Based on Ziya Mammadov’s past, it seems reasonable to assume that his main motive was profit. Like most Azerbaijanis, he is a secular Shiite Muslim, and he has no known ties to hard-line factions in Iran. Why did the Darvishis want to work with the Mammadovs? It might have caught their attention that the Mammadovs had their own private bank—one that had unfettered access to the global financial system.</span></p><p class="paywall" data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">While Azarpassillo was making deals with the Transportation Ministry, the Mammadovs were investing heavily in a series of large construction projects. Money launderers love construction projects. They attract legitimate funds from governments and private investors, and they require frequent payouts to legitimate subcontractors: cement factories, lumberyards, glass manufacturers, craftsmen. In the Trump Tower Baku project, money was going in and out of the U.S., the United Kingdom, Turkey, Romania, the United Arab Emirates, and several other countries. With such projects, it can be exceedingly difficult to detect the spread of illicit funds.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="582"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="583"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="585"><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="586" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="588"></div><div class="journey-unit" data-dcnode-id="587"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="584"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="580"></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="499"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="504"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="505" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="506"><p class="paywall" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">At the same time, the Mammadovs’ money was flowing through holding companies in offshore banking centers. According to leaked documents in the Panama Papers, companies controlled by the family have opened accounts in such places as the Bahamas, the British Virgin Islands, and Panama. The shell companies that list Mammadovs as beneficiaries or officers have bland names such as Trans-European Leasing Group and 1st Rate Investment, and many of them are owned by other shell companies.</span></p><p class="paywall" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">In 2009, a year after Baku XXI Century began building the tower, the company opened the Baku International Bus Terminal, an enormous station that includes a shopping mall and a hotel. During this period, the Mammadov family also began building a hotel, a golf course, and a spa in the mountains north of Baku.</span></p><p class="paywall" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Meanwhile, the Mammadovs spent lavishly on themselves. Ziya built a mansion in one of the most expensive neighborhoods of Baku, and, on the beach, a villa whose walls are decorated to resemble ancient Egyptian bas-reliefs. Elton’s son, Aynar, became famous for having a collection of expensive cars, including a Ferrari, a Maserati, and a Lamborghini. Anar began using the Gulfstream G450, which typically costs forty-one million dollars, and bought a seven-bedroom home in London. He also spent millions of dollars on an effort to promote Azerbaijan in Washington, D.C., hosting galas for members of Congress and other powerful figures. A former associate of the Trump Organization told me that in 2012, on one of Anar’s trips to America, he visited Trump Tower, in New York, to meet with Donald Trump and company executives. (The Trump Organization would not confirm the visit.) Around this time, the contracts for the Baku project were issued.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-7 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="573" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Between 2004 and 2014, Mammadov family businesses spent more than half a billion dollars on large construction projects. They also poured money into a major construction-materials company, an insurance firm, and a new headquarters. It’s not clear how the Mammadovs funded such enormous investments while spending so much on themselves. They may have received loans, or secretly owned profitable businesses that supported the flurry of spending. Another explanation is that some of the investment money came from the Revolutionary Guard, through Azarpassillo.</span></p><p class="paywall" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Calls and e-mails to Azarpassillo, the Iranian Mission to the U.N., and the Azerbaijani government were not returned. Ziya and Anar Mammadov did not respond to requests for comment. Donald Trump has not addressed the Baku deal since becoming President. A Department of Justice spokesperson would not comment on the possibility of its investigating the Trump Tower Baku deal. The White House declined to comment.</span></p><p class="has-dropcap has-dropcap__lead-standard-heading paywall" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">If, as Alan Garten told me, the Trump Organization learned in 2015 about “the possibility” that the Mammadovs had ties to the Revolutionary Guard, it is striking that the company did not end the Baku deal until December, 2016. During this period, Garten told me, the Trump Organization never asked its Azerbaijani partners about the Iranian Revolutionary Guard, but it did send several default notices for late payments.</span></p><p class="paywall" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Throughout the Presidential campaign, Trump was in business with someone that his company knew was likely a partner with the Iranian Revolutionary Guard. In a March, 2016, speech before the American Israel Public Affairs Committee, Trump said that his “No.&nbsp;1 priority is to dismantle the disastrous deal with Iran.” Calling Iran the “biggest sponsor of terrorism around the world,” he promised, “We will work to dismantle that reach—believe me, believe me.” In the speech, Trump lamented that Iran had been allowed to develop new long-range ballistic missiles. According to Iran Watch, an organization that monitors Iran’s military capabilities, much of the technology to make the missiles was provided by Nasr, the company once run by Kamal Darvishi.</span></p><p class="paywall" data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">I asked Garten why the Trump Organization hadn’t cancelled the Baku contract in 2015. He said that there was “no rush,” because “the project had already stalled and was showing no signs of moving forward.” The Azerbaijani lawyer who worked on the project has seen the hotel’s interior, and told me that it is almost finished. In an interview with the magazine </span><em data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Baku</span></em><span data-dcnode-id="561" instrument_node="">, published in April, 2015, Ivanka Trump said that she was eager to enjoy the hotel’s “huge spa area,” and promised that the hotel would open “in June.”</span></p><p class="paywall" data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Moreover, Garten said, the Trump Organization had signed binding contracts with the Mammadovs and couldn’t simply abandon its agreements. But Jessica Tillipman, the law-school assistant dean, told me, “You can’t violate sanctions just because you have a contract with someone.” According to Erich Ferrari, the lawyer who specializes in sanctions, companies that learn of a possible sanctions violation typically commission a “look-back” investigation that “reviews all payments you received, to make sure they didn’t originate with a sanctioned entity.” He added, “All the big four accounting companies do them routinely.” The Trump Organization did not commission a look-back.</span></p><p class="paywall" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">The Baku deal appears to be the second time that the Trump Organization has turned a blind eye to U.S. efforts to sanction Iran. In 1998, when Donald Trump purchased the General Motors Building, in Manhattan, he inherited as a tenant Iran’s Bank Melli. The following year, the Treasury Department listed Bank Melli as an institution that was “owned or controlled” by the government of Iran and that was covered by U.S. sanctions. (The department later labelled Bank Melli one of the primary financial institutions through which Iran was funnelling money to finance terrorism and to develop weapons of mass destruction.) The Trump Organization kept Bank Melli as a tenant for four more years before terminating the lease.</span></p><div class="GenericCalloutWrapper-XXWD jHTPqP callout--has-top-border" data-dcnode-id="511" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-in-view="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-include-experiments="true" data-testid="GenericCallout"><figure class="AssetEmbedWrapper-iLfYbx iclJOW asset-embed" data-dcnode-id="512"><div class="AssetEmbedAssetContainer-fogSSF kRpSOB asset-embed__asset-container" data-dcnode-id="513"><span class="SpanWrapper-kGGzGm fCMktE responsive-asset AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="514"><div class="ResponsiveCartoonWrapper-eLBWjY daafso responsive-cartoon AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="515" data-testid="responsive-cartoon"><a class="external-link responsive-cartoon__image-link" data-dcnode-id="552" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.newyorker.com/cartoon/smaller-2012-01-30&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/cartoon/smaller-2012-01-30" rel="nofollow noopener" target="_blank"><picture class="ResponsiveImagePicture-jIKgcS fArnhQ ResponsiveCartoonImage-gtSRRg kqqNOz responsive-cartoon__image responsive-image" data-dcnode-id="553" style="height: 164px;"><noscript data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">&lt;img alt="“He says he loves me but he still uses his first wifes birthday as his password.”" class="ResponsiveImageContainer-dlOMGF dnUTOP responsive-image__image" src="https://media.newyorker.com/cartoons/593b68d5edb25442b234e931/master/w_1600%2Cc_limit/170313_smaller-2 ject=&amp;body=https%3A%2F%2Fwww.newyorker.com%2Fcartoon%2Fsmaller-2012-01-30%3Futm_source%3Donsite-share%26utm_medium%3Demail%26utm_campaign%3Donsite-share%26utm_brand%3Dthe-new-yorker&quot;}" href="mailto:?subject=&amp;body=https%3A%2F%2Fwww.newyorker.com%2Fcartoon%2Fsmaller-2012-01-30%3Futm_source%3Donsite-share%26utm_medium%3Demail%26utm_campaign%3Donsite-share%26utm_brand%3Dthe-new-yorker" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="530"><svg class="icon icon-email" data-dcnode-id="531" focusable="false" height="13" viewBox="0 0 17.3 13" width="17.3" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="533">Email</title><path d="M0 .776V13h17.333V.776L8.67 8.931 0 .776z M.756 0L8.67 7.443 16.578 0H.756z" data-dcnode-id="532"></path></svg></div></a></li><li class="SocialIconsListItem-hYmGVl brmqHp social-icons__list-item social-icons__list-item--store social-icons__list-item--standard thinner" data-dcnode-id="518"><a aria-label="Get in store" class="external-link SocialIconExternalLink-gugldc YWqLt social-icons__link social-icons__link--store" data-dcnode-id="519" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://condenaststore.com/conde-nast-brand/cartoons&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//condenaststore.com/conde-nast-brand/cartoons" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="520"><svg class="icon icon-shopping" data-dcnode-id="521" focusable="false" height="18" viewBox="0 0 24 18" width="24" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="526">Shopping</title><g data-dcnode-id="522" fill="none" fill-rule="evenodd"><path d="M20 16a2 2 0 1 1-3.999.001A2 2 0 0 1 20 16" data-dcnode-id="525" fill="#D4D4D4"></path><path class="stroke-only" d="M0 1h4.36L8 12l12.952-3.364L22 4.273H5.238" data-dcnode-id="524" stroke="#D4D4D4" stroke-width="2" style="fill:none !important"></path><path d="M12 16a2 2 0 1 1-3.999.001A2 2 0 0 1 12 16M21 8l-4.714 2L8 12 6 4h16z" data-dcnode-id="523" fill="#D4D4D4"></path></g></svg></div></a></li></ul></div></div></span></div></figure></div><p class="paywall" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">The Baku project is hardly the only instance in which the Trump Organization has been associated with a controversial deal. The Trump Taj Mahal casino, which opened in Atlantic City in 1990, was repeatedly fined for violating anti-money-laundering laws, up until its collapse, late last year. According to ProPublica, Trump projects in India, Uruguay, Georgia, Indonesia, and the Philippines have involved government officials or people with close ties to powerful political figures. A few years ago, the Trump Organization abandoned a project in Beijing after its Chinese partner became embroiled in a corruption scandal. In December, the Trump Organization withdrew from a hotel project in Rio de Janeiro after it was revealed to be part of a major bribery investigation. Ricardo Ayres, a Brazilian state legislator, told Bloomberg, “It’s curious that the Trumps didn’t seem to know that their biggest deal in Brazil was bankrolled by shady investors.” But, given the Trump Organization’s track record, it seems reasonable to ask whether one of the things it was selling to foreign partners was a willingness to ignore signs of corruption.</span></p><p class="paywall" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">To this day, the Trump Organization has not provided satisfying answers to the most basic questions about the Baku deal: who owns Baku XXI Century, the company with which they signed the contracts; the origin of the funds with which Baku XXI Century paid the Trump Organization; whether the Mammadovs used their political power to benefit themselves and the Trump Organization; and whether the Mammadovs used money obtained from the Iranian Revolutionary Guard to fund the Trump Tower Baku.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="500"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="501"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="503"></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="502"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="498"></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="468"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="476"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="477" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="478"><p class="paywall" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">At one point, Garten allowed me to review the Trump Organization’s original contract with the Mammadovs. It authorizes the company to order an independent audit of Baku XXI Century’s financial records at any time—a provision likely included to insure that the Mammadovs didn’t hide profits that were supposed to be shared with the Trump Organization. Such an audit could well have exposed illicit activity. Garten refused to say if an audit had been conducted.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-8 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="495" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">In dealing with the Mammadovs, the Trump Organization seems to have taken them entirely at their word. Garten pointed me to a provision in one contract in which Anar Mammadov represented himself as the sole owner of Baku XXI Century. Given that Elton Mammadov told me that he controlled the company, and that its ownership was a “commercial secret,” what proof did the Trump Organization have that Anar’s claim was true? Garten could not say.</span></p><p class="paywall" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Garten has been the company’s chief legal officer only since January. His predecessor was Jason Greenblatt, whose name appeared on the contract I reviewed. Greenblatt was in charge of the Trump Organization’s due diligence and contracting work. He is now employed at the White House, as the President’s special representative for international negotiations. He did not respond to repeated requests for comment.</span></p><p class="paywall" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">In recent months, American officials have expressed concern that Trump Administration figures might be blackmailed by foreign entities. U.S. law-enforcement investigators and congressional staffers have probed claims that Russian government officials possess compromising information about President Trump, which might be used to blackmail him. (The President maintains that there is no such information.) In January, the Department of Justice informed the White House that Michael Flynn—then the national-security adviser—was vulnerable to being blackmailed by the Russians because he had lied about having spoken with the Russian Ambassador. Flynn subsequently resigned.</span></p><p class="paywall" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">In Azerbaijan, the power and the influence of the Mammadovs has declined sharply. Elton lost his seat in parliament in 2015. In February, Ziya was abruptly removed from his ministry. Anar has settled in London, an associate of his told me, and is living on a fraction of his former wealth. Meanwhile, in Iran, government officials are likely facing additional sanctions on the Iranian Revolutionary Guard. If the Mammadovs or powerful Iranians have evidence that the Trump Organization broke laws, they might be tempted to exploit it.</span></p><p class="paywall" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">The best way to determine if a crime was committed in the Baku deal would be a federal investigation, which could use the power of subpoena and international legal tools to obtain access to the contracts, the due diligence, internal e-mails, and financial documents. The Department of Justice routinely sends investigators to other countries to pursue possible F.C.P.A. and sanctions violations.</span></p><p class="paywall" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Senator Sherrod Brown, of Ohio, who is the ranking Democratic member of the Committee on Banking, Housing, and Urban Affairs, said, in an e-mail, that a federal investigation was warranted: “The Trump Organization’s Baku project shows the lack of ‘extreme vetting’ Mr. Trump applied to his own business dealings in corruption-plagued regimes around the globe.&nbsp;.&nbsp;.&nbsp;. Congress—and the Trump Administration itself—has a duty to examine whether the President or his family is exposed to terrorist financing, sanctions, money laundering, and other imprudent associations through their business holdings and connections.”</span></p><p class="paywall" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">More than a dozen lawyers with experience in F.C.P.A. prosecution expressed surprise at the Trump Organization’s seemingly lax approach to vetting its foreign partners. But, when I asked a former Trump Organization executive if the Baku deal had seemed unusual, he laughed. “No deal there seems unusual, as long as a check is attached,” he said.&nbsp;♦</span></p><p class="paywall" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">An earlier version of this article misspelled the name of the J. W. Marriott hotel in Baku.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="469"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="470"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="472"><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="473" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="475"></div><div class="journey-unit" data-dcnode-id="474"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="471"></div></div></div></div></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ContentWrapperGrid-haXkHn diFmFK grid-layout--adrail narrow wide-adrail" data-dcnode-id="460"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="461"><div class="body body__container" data-dcnode-id="462"><div class="container container--body" data-dcnode-id="463"><div class="container--body-inner" data-dcnode-id="464"></div></div></div></div></div></div></article><div class="RowWrapper-egDQBE hVsKfd MultiPackageBaseRow-iwuYBt MultiPackageRow-dRSwkr eLoWFJ hLrdNp" data-dcnode-id="457" data-journey-hook="row-content"></div><div class="ContentFooterWrapper-eNmbwu bjhwHS ArticlePageContentFooterGrid-eSAGeW leZXBF" data-dcnode-id="237" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;ContentFooter&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ContentFooter&quot;}" data-include-experiments="true"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 grid-lay
