uth Carolina" coords="265,131,286,150,299,134,285,127,268,127" data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/south-carolina/" shape="poly"><area alt="South Dakota" coords="129,42,128,67,173,72,173,46" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/south-dakota/" shape="poly"><area alt="Tennessee" coords="220,122,273,116,257,131,216,136" data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/tennessee/" shape="poly"><area alt="Texas" coords="130,123,149,126,150,140,169,146,188,147,194,178,170,195,165,206,171,214,152,209,151,198,138,181,130,178,128,188,101,159,129,161" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/texas/" shape="poly"><area alt="Utah" coords="66,70,58,110,93,116,96,81,83,81,82,73" data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/utah/" shape="poly"><area alt="Vermont" coords="321,33,319,53,314,56,311,35" data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/vermont/" shape="poly"><area alt="Virginia" coords="268,106,262,116,311,109,299,90,292,90,279,106" data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/virginia/" shape="poly"><area alt="Washington" coords="16,3,17,18,23,27,54,32,60,8,30,2" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/washington/" shape="poly"><area alt="West Virginia" coords="275,87,263,102,267,107,279,106,292,89" data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/west-virginia/" shape="poly"><area alt="Wisconsin" coords="198,37,197,51,209,71,228,71,228,51,223,41,206,36" data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/wisconsin/" shape="poly"><area alt="Wyoming" coords="88,46,84,79,127,83,127,51" data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internationalrelationsedu.org/wyoming/" shape="poly"></map></div></div></div></div><h2 data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Applied International Relations</span></h2><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Professionals skilled in international relations possess expertise in the humanistic and social scientific disciplines, which include:</span></p><ul data-dcnode-id="874"><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Global ethics</span></li><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Languages</span></li><li data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Transnational studies</span></li><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Moral and political philosophy</span></li></ul><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Graduates of international relations degree programs are able to apply their scholarly training and proven skillset to such areas as:</span></p><ul data-dcnode-id="841"><li data-dcnode-id="867"><strong data-dcnode-id="869"><em data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Project Management</span></em></strong><span data-dcnode-id="868" instrument_node="">: International project management, from nonprofit organizations to government agencies, requires professionals who understand the nuanced intricacies of international project collaboration.</span></li><li data-dcnode-id="862"><strong data-dcnode-id="864"><em data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Policy Analysis: </span></em></strong><span data-dcnode-id="863" instrument_node="">Policy analysis requires professionals who are able to analyze international issues and communicate their findings to select audiences.</span></li><li data-dcnode-id="857"><strong data-dcnode-id="859"><em data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Trade and Economic Development: </span></em></strong><span data-dcnode-id="858" instrument_node="">Governments and NGOs alike require international relations specialists skilled in trade and economic development, as well as the trends and challenges associated with the global economy and global development. Their work may involve everything from overseeing humanitarian aid projects to encouraging the growth of mutually beneficial trade relationships.</span></li><li data-dcnode-id="852"><strong data-dcnode-id="854"><em data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Global Communications: </span></em></strong><span data-dcnode-id="853" instrument_node="">Professionals in global communications must possess an understanding of the impact of global technology and intercultural knowledge in order to effectively manage communications projects and the companies engaged in this type of work.</span></li><li data-dcnode-id="847"><strong data-dcnode-id="849"><em data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">International Finance: </span></em></strong><span data-dcnode-id="848" instrument_node="">International finance provides a unique insight into areas such as foreign monetary systems, international exchanges and trading platforms, as well as foreign economies and emerging markets.</span></li><li data-dcnode-id="842"><strong data-dcnode-id="844"><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Advocacy: </span></em></strong><span data-dcnode-id="843" instrument_node="">International relations graduates possess the skills to serve as advocates for a wide variety of international issues, such as the environment, human rights, and public health.</span></li></ul><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Bachelor’s Degrees in International Relations</span></h2><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Bachelor’s degree programs in international relations prepare students to pursue entry-level careers in government, business, journalism, law, humanitarian organizations, and consulting firms. They also prepare students to pursue graduate studies in international relations or political science.</span></p><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Bachelor’s degree programs in international relations may be offered as accelerated programs, distance-learning programs, and part-time programs. Many schools that offer these programs provide study abroad opportunities through collaborations with foreign universities.</span></p><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Among the variations on the international relations major at the undergraduate level are:</span></p><ul data-dcnode-id="822"><li data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">International Relations and Diplomacy</span></li><li data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">International Affairs</span></li><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">International Studies</span></li><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">International Studies and Global Affairs</span></li></ul><p data-dcnode-id="818"><strong data-dcnode-id="819"><em data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Program Concentrations and Coursework</span></em></strong></p><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">At the undergraduate level, these programs introduce students to international political, economic, and social issues through a comprehensive core grounded in political science, history, and social science, among others.</span></p><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Core coursework found in international relations programs at the undergraduate level include:</span></p><ul data-dcnode-id="791"><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">History of international relations</span></li><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Introduction to political science</span></li><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Political theory</span></li><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Organizational management</span></li><li data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Introduction to economics</span></li><li data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Aid, development, and social entrepreneurship</span></li><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Comparative politics</span></li><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Research methods in international relationships</span></li><li data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">International law</span></li><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">International political economy</span></li><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Diplomacy and foreign policy</span></li></ul><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Programs offering an international relations major often allow students to select a minor concentration so as to become proficient in a foreign language, specialize in particular area of practice, or develop expertise in a particular region of the world:</span></p><p data-dcnode-id="786"><em data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Regional concentrations:</span></em></p><ul data-dcnode-id="775"><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Asia</span></li><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Africa</span></li><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Latin America</span></li><li data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Europe</span></li><li data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Middle East</span></li></ul><p data-dcnode-id="772"><em data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Functional concentrations:</span></em></p><ul data-dcnode-id="753"><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">International political economy</span></li><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">War and peace</span></li><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Environment and development</span></li><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Foreign policy</span></li><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">International security</span></li><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">International business and economics</span></li><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Global environmental issues</span></li><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Global public health</span></li><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Contemporary cultures and societies</span></li></ul><p data-dcnode-id="749"><strong data-dcnode-id="750"><em data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Study Abroad and Internship Opportunities</span></em></strong></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Schools of international studies often partner with foreign universities to better facilitate study abroad opportunities and/or internships. In addition to classroom study, these undergraduate programs in international relations include case studies, debates and on-site visits, among other opportunities.</span></p><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Students of bachelor’s degree programs in international relations often pursue volunteer/internship experiences in such organizations as:</span></p><p data-dcnode-id="742"><em data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Nonprofit Sector</span></em></p><ul data-dcnode-id="733"><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Peace Corps</span></li><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">World Vision International</span></li><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">World Wildlife Fund</span></li><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">The Heritage Foundation</span></li></ul><p data-dcnode-id="730"><em data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Federal Government</span></em></p><ul data-dcnode-id="721"><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">S. Department of Commerce</span></li><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">S. Department of Defense</span></li><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">S. International Trade Commission</span></li><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">S. Agency for International Development</span></li></ul><p data-dcnode-id="718"><em data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Multilateral Sector</span></em></p><ul data-dcnode-id="709"><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">World Bank</span></li><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">United Nations</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">International Finance Corporation</span></li><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">International Monetary Fund</span></li></ul><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Master’s Degrees in International Relations</span></h2><p data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">Master’s degree programs in international relations are multidisciplinary, policy-oriented programs aimed at producing 21</span><sup data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">st</span></sup><span data-dcnode-id="701" instrument_node=""> century leaders. Students in these programs learn about global processes related to diplomacy, economic development and humanitarian aid, along with at least one theme of global significance as determined by the concentration they select.</span></p><p data-dcnode-id="696"><strong data-dcnode-id="697"><em data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Program Structure</span></em></strong></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Traditional master’s programs in international relations consist of two years of full-time study, although a few institutions offer accelerated programs that are completed in one year of full-time study. Others offer students the option of studying at a partner school in another country, and many encourage internships and overseas job opportunities during course breaks.</span></p><span data-dcnode-id="693" instrument_node=""> </span><div class="school-button school-button-thru" data-dcnode-id="676"><div data-dcnode-id="677" id="div-626558f9df1fb" name="div-626558f9df1fb"><span data-dcnode-id="691" instrument_node=""> </span><div class="action-button-root-container" data-dcnode-id="680"><a data-dcnode-id="684" onclick="gotoActionButtonFunnelPage()" rel="nofollow sponsored"><div class="action-button-cta-container actionBtnBGColor" data-dcnode-id="685"><div class="ctaTitle-text actionBtnTextColor" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">FIND SCHOOLS</span></div></div></a><div class="action-button-sponsored-content-container" data-dcnode-id="681"><div class="action-button-sponsored-content-container-text" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Sponsored Content</span></div></div></div></div></div><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">A number of international relations master’s degree programs are for mid-career professionals who already possess significant experience in the field. These programs, often called executive master’s degree programs, allow for part-time/flexible scheduling, designed to cater to working professionals.</span></p><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">The name of the master’s degree program in international relations will largely depend on the institution offering it. Just a few variations on international relations majors available at the graduate level s include:</span></p><ul data-dcnode-id="652"><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Foreign Service</span></li><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Global Affairs and Management</span></li><li data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">International Relations and Development</span></li><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">International Service</span></li><li data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">International Studies</span></li><li data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">International Affairs</span></li><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Global Studies and International Relations</span></li><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">International Affairs</span></li><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Diplomacy</span></li></ul><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">The study of international relations at the master’s level may also be combined with other disciplines. A number of dual-degree options exist, many of which are the result of collaborative efforts with partner schools:</span></p><ul data-dcnode-id="639"><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Master of Arts in International Relations/Master of Business Administration (MA/MBA)</span></li><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Master of Arts in International Relations/Juris Doctor (MA/JD)</span></li><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Master of Arts in International Relations/Master of Science in Public Health (MA/MSPH)</span></li><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Master of Arts in International Relations/Master of Public Affairs (MA/MPA)</span></li><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Master of Arts in International Relations/Master of Theological Studies (MA/MTS)</span></li></ul><p data-dcnode-id="635"><strong data-dcnode-id="636"><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Program Concentrations and Coursework</span></em></strong></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">The core coursework of a master’s degree in international relations covers the fundamentals of international relations theory and provides students with an advanced understanding of the workings of the global economy.</span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">The core of an international relations program includes study in:</span></p><ul data-dcnode-id="612"><li data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">History and theory of international affairs</span></li><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Economic policy and analysis</span></li><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Laws and regulations governing international organizations</span></li><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Leadership and ethics</span></li><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Economic policy and analysis</span></li><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Globalization</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Negotiation and conflict resolution</span></li><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Quantitative and research methods</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Policy development, implementation, and analysis</span></li></ul><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Because international relations is a broad, interdisciplinary field, master’s degree programs allow students to explore areas of study within the field by choosing one or more tracks, or concentrations. International relations concentrations allow students to develop substantive research, management, and policy-oriented knowledge in such areas as:</span></p><ul data-dcnode-id="583"><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Peace and Conflict Resolution</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">International Trade and Finance</span></li><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">International Security</span></li><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">International Politics and Diplomacy</span></li><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">International Political Economy</span></li><li data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">International Management</span></li><li data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">International Law and Organizations</span></li><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">International Health Policy</span></li><li data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">International Environmental Policy</span></li><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">International Development</span></li><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">International Communication</span></li><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Human Rights/Social Justice</span></li><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Comparative and Regional Studies</span></li></ul><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Many larger graduate schools also offer students the opportunity to select electives that would allow them to further specialize their education in such areas as:</span></p><ul data-dcnode-id="566"><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Trade and investment</span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Money and finance</span></li><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">International politics</span></li><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Comparative and regional studies</span></li><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">S. foreign policy</span></li><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">International business</span></li><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Regional or country-specific studies (Africa, Middle East, Europe, etc.)</span></li></ul><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Master’s degrees in international relations generally culminate in a capstone project or thesis. A capstone project consists of a paper and presentation that addresses a real-world international relations issue. A thesis, on the other hand, is an extensive research paper that covers an in-depth issue related to the area of concentration.</span></p><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">It is also common for graduate schools to strongly recommend international work or volunteer experience during the course of the program. Many programs offer fellowship opportunities to study abroad, both during and after college.</span></p><h2 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Doctoral Studies in International Relations</span></h2><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">PhD programs prepare students for international relations careers in teaching, research, or government. In addition to core coursework, these graduate programs require written and oral examinations and the successful completion and defense of a dissertation.</span></p><span data-dcnode-id="557" instrument_node=""> </span><div class="school-button school-button-thru" data-dcnode-id="540"><div data-dcnode-id="541" id="div-626558fa0aa4b" name="div-626558fa0aa4b"><span data-dcnode-id="555" instrument_node=""> </span><div class="action-button-root-container" data-dcnode-id="544"><a data-dcnode-id="548" onclick="gotoActionButtonFunnelPage()" rel="nofollow sponsored"><div class="action-button-cta-container actionBtnBGColor" data-dcnode-id="549"><div class="ctaTitle-text actionBtnTextColor" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">FIND SCHOOLS</span></div></div></a><div class="action-button-sponsored-content-container" data-dcnode-id="545"><div class="action-button-sponsored-content-container-text" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Sponsored Content</span></div></div></div></div></div><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">External fellowships are sources of funding for many PhD programs in international relations. Many programs also provide full funding. These competitive programs provide tuition for all admitted students and provide them with stipends for living expenses for the duration of their doctoral studies, which typically take between four and six years.</span></p><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">PhD programs in international relations include:</span></p><ul data-dcnode-id="522"><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">PhD in International Relations</span></li><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">PhD in Sustainable Development</span></li><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">PhD in Public Affairs</span></li><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">PhD in Political Science, with a focus on international relations</span></li><li data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">PhD in International Studies</span></li><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">PhD in International Development Studies</span></li></ul><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Resources for Students of International Studies</span></h2><ul data-dcnode-id="502"><li data-dcnode-id="515"><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.apsia.org/" rel="noopener" target="_blank&quot;"><span data-dcnode-id="517" instrument_node="">Association
