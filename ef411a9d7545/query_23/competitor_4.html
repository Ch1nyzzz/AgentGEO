a class="soliloquy-pager-link" data-dcnode-id="1481" data-slide-index="12" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/" tabindex="0"><span data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">13</span></span></a></div><div class="soliloquy-pager-item" data-dcnode-id="1476"><a class="soliloquy-pager-link" data-dcnode-id="1477" data-slide-index="13" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/" tabindex="0"><span data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">14</span></span></a></div></div><div aria-controls="soliloquy-container-19323" aria-label="carousel buttons" class="soliloquy-controls-direction" data-dcnode-id="1470"><a aria-label="previous" class="soliloquy-prev" data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/" tabindex="0"><span data-dcnode-id="1474"></span></a><a aria-label="next" class="soliloquy-next" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/" tabindex="0"><span data-dcnode-id="1472"></span></a></div></div></div></div><noscript data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">&lt;style type="text/css"&gt;#soliloquy-container-19323{opacity:1}&lt;/style&gt;</span></noscript><span data-dcnode-id="1464" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1448"><br data-dcnode-id="1463"><strong data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">We</span></strong><span data-dcnode-id="1460" instrument_node=""> </span><strong data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">connect New Mexico and the world by engaging and inspiring global citizens through dialogue, education, and cross-cultural exchange. </span></strong><span data-dcnode-id="1457" instrument_node="">We promote an in-depth understanding of globalization — including the responsibilities of the global citizen — and U.S. foreign policy through </span><a data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/community-education-program/"><span data-dcnode-id="1456" instrument_node="">our community education</span></a><span data-dcnode-id="1454" instrument_node=""> and </span><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/education-programs/"><span data-dcnode-id="1453" instrument_node="">high school/college education programs</span></a><span data-dcnode-id="1451" instrument_node="">. We envision a community in which New Mexicans, through cross-cultural exchange, engagement, and education, act as global citizens, applying a firm knowledge of global economics, politics, cultures, and leaders for the betterment of Santa Fe, New Mexico, the United States, and the globe. </span><br data-dcnode-id="1450"><br data-dcnode-id="1449"></p><span data-dcnode-id="1447" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1440"><span data-dcnode-id="1446" instrument_node="">Through our partnership with the U.S. State Department, </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/visitor-programs/"><span data-dcnode-id="1445" instrument_node="">we welcomed over 400 international visitors to northern New Mexico</span></a><span data-dcnode-id="1443" instrument_node=""> in 2019—and continue to welcome them virtually, via Zoom. We connect ideas with action, with a membership of former ambassadors, foreign service officers, executives, and an engaged public seeking insight into these complex times.</span><br data-dcnode-id="1442"><br data-dcnode-id="1441"></p><span data-dcnode-id="1439" instrument_node="">

</span><h2 data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Announcements</span></h2><span data-dcnode-id="914" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">
</span><p class="has-text-color has-background has-very-light-gray-background-color" data-dcnode-id="907" style="color:#36769f;font-size:24px"><em data-dcnode-id="909"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">CIR has a new Executive Director!</span></strong></em><br data-dcnode-id="908"></p><span data-dcnode-id="906" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="900"><figure class="alignright is-resized" data-dcnode-id="901"><img alt="" data-dcnode-id="905" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mcusercontent.com/005a65d58def264f66df909f2/images/e9f16c53-7728-1c61-efa4-0231e8b7c614.jpeg&amp;raw" width="168"><figcaption data-dcnode-id="902"><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Lisa A. Ellis</span></strong></figcaption></figure></div><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="898" instrument_node=""> </span><em data-dcnode-id="895"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">A Message from Ambassador Mark Asquino</span></strong></em><br data-dcnode-id="894"><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">I am pleased to announce that </span><strong data-dcnode-id="889"><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/wp-content/uploads/2022/02/Lisa-Ellis-ED-Press-Release-2.14.22.pdf"><span data-dcnode-id="891" instrument_node="">Lisa Ellis</span></a></strong><span data-dcnode-id="888" instrument_node=""> has been appointed by the Board of Directors as CIR’s new Executive Director, beginning on February 22. </span><br data-dcnode-id="887"><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">Lisa is a highly experienced, global strategic communications, fundraising and non-profit leader. During her distinguished career she has had numerous leadership positions including at Colorado College, The TIDES Foundation, The International Medical Corps, The International Center for Journalists and The Freedom Forum. Earlier in her career, Lisa worked at the Voice of America’s USSR Division, and spent two years on an excursion assignment at the U.S. Embassy in Moscow.&nbsp; &nbsp; </span><br data-dcnode-id="884"><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">Lisa and I first met in the early 1990’s when we both were at the U.S. Information Agency. Back then, I was on my way to the U.S. Embassy in Bucharest as the new cultural attaché and Lisa was working on programming for Central and Eastern Europe. Even at that early stage in her career, she was dedicated to strengthening democratic institutions, nurturing a free media, supporting international exchanges and educating future leaders. </span><br data-dcnode-id="881"><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">Lisa is a resident of Santa Fe and earned her B.A. in Russian Area Studies at Colorado College as well as an M.A in Journalism from the University of Maryland. She has worked in some 40 countries around the globe, and has a wealth of experience in communications, philanthropy and international education. I am confident that Lisa will provide CIR with innovative and dynamic leadership.&nbsp; &nbsp; </span><br data-dcnode-id="878"><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">Please join me in giving a hearty welcome to Lisa Ellis as our new Executive Director! </span><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/wp-content/uploads/2022/02/Lisa-Ellis-ED-Press-Release-2.14.22.pdf"><span data-dcnode-id="875" instrument_node="">Click here to learn more about Lisa Ellis.</span></a><br data-dcnode-id="873"></p><span data-dcnode-id="871" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">
</span><h2 data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Calendar of Upcoming Events</span></h2><span data-dcnode-id="866" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="846"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">BOOK TALK WITH BEN RHODES </span></strong><br data-dcnode-id="863"><strong data-dcnode-id="860"><em data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">After the Fall: The Rise of Authoritarianism in the World We’ve Made</span></em></strong><br data-dcnode-id="859"><strong data-dcnode-id="855"><span data-dcnode-id="858" instrument_node="">Thursday, May 5 </span><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node="">7:00pm MT</span></strong><br data-dcnode-id="854"><em data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">CIR members – $25 / non-members – $35</span></em><br data-dcnode-id="851"><br data-dcnode-id="850"><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfcir.org/livestreams-and-in-person-events/"><span data-dcnode-id="849" instrument_node="">All details here</span></a><span data-dcnode-id="847" instrument_node=""> </span></p><span data-dcnode-id="845" instrument_node="">
