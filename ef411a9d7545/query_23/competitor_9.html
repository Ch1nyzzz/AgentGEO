</span></div><h2 data-dcnode-id="1114" id="chapter-title-0-2"><span data-dcnode-id="1115" instrument_node="">How did NAFTA affect the U.S. economy?</span></h2><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">In the years since NAFTA, trade between the United States and its North American neighbors more than tripled, growing more rapidly than U.S. trade with the rest of the world. Canada and Mexico are the two largest destinations for U.S. exports, accounting for more than one-third of the total. Most </span><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fas.org/sgp/crs/row/R42965.pdf" target="_blank" title="conclude"><span data-dcnode-id="1111" instrument_node="">estimates conclude</span></a><span data-dcnode-id="1109" instrument_node="">&nbsp;[PDF] that the deal increased U.S. gross domestic product (GDP) by less than 0.5 percent, an addition of up to $80 billion to the U.S. economy upon full implementation, or several billion dollars of added growth per year.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1106" instrument_node="">Such upsides of trade often escape notice, because although the costs are&nbsp;</span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2016/03/16/business/economy/on-trade-angry-voters-have-a-point.html%3Fversion%3Dmeter%2Bat%2B0%26module%3Dmeter-Links%26pgtype%3Darticle%26contentId%3D%26mediaId%3D%26referrer%3D%26priority%3Dtrue%26action%3Dclick%26contentCollection%3Dmeter-links-click" target="_blank" title="highly concentrated"><span data-dcnode-id="1105" instrument_node="">highly concentrated</span></a><span data-dcnode-id="1103" instrument_node="">&nbsp;in specific industries such as auto manufacturing, the benefits of a deal such as NAFTA are distributed widely across society. NAFTA supporters&nbsp;</span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/articles/canada/2013-12-06/naftas-economic-upsides" target="_blank" title="estimate that"><span data-dcnode-id="1102" instrument_node="">estimate that</span></a><span data-dcnode-id="1100" instrument_node="">&nbsp;some fourteen million U.S. jobs rely on trade with Canada or Mexico, and that the&nbsp;</span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//piie.com/blogs/realtime-economic-issues-watch/nafta-rejoinder-us-effects-are-clearly-positive-most-workers" target="_blank" title="nearly two hundred thousand"><span data-dcnode-id="1099" instrument_node="">nearly two hundred thousand</span></a><span data-dcnode-id="1097" instrument_node="">&nbsp;export-related jobs created annually by the pact pay&nbsp;15 to 20 percent more on average than the jobs that were lost.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1094" instrument_node="">On the other hand, critics of the deal argue that it was&nbsp;to blame for job losses and wage stagnation in the United States, driven by low-wage competition, companies&nbsp;</span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2016/03/20/business/economy/carrier-workers-see-costs-not-benefits-of-global-trade.html%3F_r%3D1" target="_blank" title="moving production"><span data-dcnode-id="1093" instrument_node="">moving production</span></a><span data-dcnode-id="1091" instrument_node="">&nbsp;to Mexico to lower costs, and a widening trade deficit. The Center for Economic and Policy Research’s (CEPR)&nbsp;</span><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/roomfordebate/2013/11/24/what-weve-learned-from-nafta/nafta-lowered-wages-as-it-was-supposed-to-do" target="_blank" title="Dean Baker"><span data-dcnode-id="1090" instrument_node="">Dean Baker</span></a><span data-dcnode-id="1088" instrument_node="">&nbsp;and the Economic Policy Institute’s </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epi.org/people/robert-e-scott/" target="_blank" title="Robert Scott"><span data-dcnode-id="1087" instrument_node="">Robert Scott</span></a><span data-dcnode-id="1085" instrument_node=""> argue that the surge of imports after NAFTA caused a loss of up to six hundred thousand U.S. jobs over two decades, though they admit that some of this import growth would likely have happened even without NAFTA.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1082" instrument_node="">Many workers and labor leaders </span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2016/03/20/business/economy/carrier-workers-see-costs-not-benefits-of-global-trade.html%3F_r%3D2" target="_blank" title="blame trade"><span data-dcnode-id="1081" instrument_node="">blame trade agreements</span></a><span data-dcnode-id="1079" instrument_node=""> such as NAFTA for the decline in U.S. manufacturing jobs. The U.S. auto sector&nbsp;</span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//piie.com/publications/policy-briefs/nafta-20-misleading-charges-and-positive-achievements" target="_blank" title="lost some 350,000 jobs"><span data-dcnode-id="1078" instrument_node="">lost some 350,000 jobs</span></a><span data-dcnode-id="1076" instrument_node="">&nbsp;since 1994—a third of the industry—while Mexican auto sector employment spiked from 120,000 to 550,000 workers.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1073" instrument_node="">But other economists, including Gary Clyde Hufbauer and Cathleen Cimino-Isaacs of the Peterson Institute for International Economics (PIIE), have emphasized that increased trade&nbsp;produces&nbsp;overall gains for the U.S. economy. Some jobs are lost due to imports, but others are created, and consumers benefit significantly from falling prices and often improved quality of goods. Their&nbsp;</span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//piie.com/publications/policy-briefs/nafta-20-misleading-charges-and-positive-achievements" target="_blank" title="2014 PIIE study of NAFTA’s effects"><span data-dcnode-id="1072" instrument_node="">2014 PIIE study of NAFTA’s effects</span></a><span data-dcnode-id="1070" instrument_node="">&nbsp;found a net loss of about fifteen thousand jobs per year due to the pact—but&nbsp;</span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//piie.com/blogs/realtime-economic-issues-watch/nafta-rejoinder-us-effects-are-clearly-positive-most-workers" target="_blank" title="gains roughly"><span data-dcnode-id="1069" instrument_node="">gains of roughly $450,000</span></a><span data-dcnode-id="1067" instrument_node="">&nbsp;for each job lost, in the form of higher productivity and lower consumer prices.&nbsp;</span></p><span data-dcnode-id="1065" instrument_node="">
</span><div data-dcnode-id="1061"><a class="colorbox" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.cfr.org/sites/default/files/image/2020/12/NAFTA-BGR-Timeline-1300x920_1.jpg" target="_blank" title=""><img alt="NAFTA Timeline " class="lazyload" data-dcnode-id="1064" data-entity-type="" data-entity-uuid="" data-src="//cdn.cfr.org/sites/default/files/image/2020/12/NAFTA-BGR-Timeline-1300x920_1.jpg" height="446" width="630"><span data-dcnode-id="1063" instrument_node=""> </span></a></div><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">Additionally, many economists assert that the recent troubles of U.S. manufacturing have little to do with NAFTA, arguing that domestic manufacturing was under stress decades before the treaty. Research by David Autor, David Dorn, and Gordon Hanson&nbsp;</span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nber.org/papers/w21906.pdf" target="_blank" title="published in January 2016 found"><span data-dcnode-id="1058" instrument_node="">published in 2016</span></a><span data-dcnode-id="1056" instrument_node="">&nbsp;[PDF] found that competition with China has had a much bigger negative impact on U.S. jobs since 2001, when China joined the WTO. Hanson, an economist and trade expert at the University of California, San Diego (UCSD), says that the steepest decline in manufacturing jobs—seventeen million to eleven million between 2000 and 2010—is mostly attributable to trade with China and underlying technological changes. “China is at the top of the list in terms of the employment impacts that we found since 2000, with technology second, and NAFTA far less important,” he says.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">In fact, NAFTA helped the U.S. auto sector compete with China, says Hanson. By contributing to the development of cross-border supply chains, NAFTA lowered costs, increased productivity, and improved U.S. competitiveness. This meant shedding some jobs in the United States as positions moved to Mexico, he says, but without the pact, even more could </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2016/03/30/business/economy/nafta-may-have-saved-many-autoworkers-jobs.html%3F_r%3D0" target="_blank" title="otherwise been lost"><span data-dcnode-id="1052" instrument_node="">have been lost</span></a><span data-dcnode-id="1050" instrument_node="">. “Because Mexico is so close, you can have a regional industry cluster where goods can go back and forth. The manufacturing industries in the three countries can be very integrated,” Hanson says. These linkages, which have given U.S. automakers an advantage over China, would be much more difficult to achieve without NAFTA’s tariff reductions and protections for intellectual property.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">CFR’s Edward Alden says that anxiety over trade deals has grown because wages&nbsp;</span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.cfr.org/renewing-america/2016/04/05/what-the-trade-and-minimum-wage-debates-have-in-common/" target="_blank" title="haven’t kept pace"><span data-dcnode-id="1046" instrument_node="">haven’t kept pace</span></a><span data-dcnode-id="1044" instrument_node="">&nbsp;with labor productivity while income inequality has risen. To some extent, he says, trade deals have hastened the pace of these changes in that they have “reinforced the globalization of the American economy.”</span></p><span data-dcnode-id="1042" instrument_node="">
</span><h2 data-dcnode-id="1040" id="chapter-title-0-3"><span data-dcnode-id="1041" instrument_node="">How did it affect&nbsp;the Mexican economy?</span></h2><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1038" instrument_node="">NAFTA boosted Mexican farm exports to the United States, which have&nbsp;</span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.economist.com/world/la/displaystory.cfm%3Fstory_id%3D10566845" target="_blank" title="tripled since NAFTA’s implementation"><span data-dcnode-id="1037" instrument_node="">tripled since the pact’s implementation</span></a><span data-dcnode-id="1035" instrument_node="">. Hundreds of thousands of auto manufacturing jobs have also been created in the country, and&nbsp;</span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fas.org/sgp/crs/row/R42965.pdf" target="_blank" title="most studies have found"><span data-dcnode-id="1034" instrument_node="">most studies have found</span></a><span data-dcnode-id="1032" instrument_node="">&nbsp;[PDF] that the agreement increased productivity and lowered consumer prices in Mexico.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1029" instrument_node="">The pact catalyzed Mexico’s transition from one of the world’s most protectionist economies to one of the most open to trade. Mexico had reduced many of its trade barriers upon joining the&nbsp;</span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wto.org/english/thewto_e/whatis_e/inbrief_e/inbr01_e.htm" target="_blank" title="General Agreement on Tariffs and Trade (GATT)"><span data-dcnode-id="1028" instrument_node="">General Agreement on Tariffs and Trade (GATT)</span></a><span data-dcnode-id="1026" instrument_node="">, the precursor to the WTO, in 1986, but still had a&nbsp;</span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usitc.gov/publications/332/pub2353.pdf" target="_blank" title="pre-NAFTA average tariff level"><span data-dcnode-id="1025" instrument_node="">pre-NAFTA average tariff level</span></a><span data-dcnode-id="1023" instrument_node="">&nbsp;[PDF] of 10 percent.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1020" instrument_node="">Mexican policymakers saw NAFTA as an opportunity to both accelerate and lock in these&nbsp;</span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/economics/08/north-american-free-trade-agreement.asp" target="_blank" title="hard won reforms"><span data-dcnode-id="1019" instrument_node="">hard-won reforms</span></a><span data-dcnode-id="1017" instrument_node="">&nbsp;of the Mexican economy. In addition to liberalizing trade, Mexico’s leaders reduced public debt, introduced a balanced-budget rule, stabilized inflation, and built up the country’s foreign reserves. So although Mexico </span><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fas.org/sgp/crs/row/R41402.pdf" target="_blank" title="hard hit"><span data-dcnode-id="1016" instrument_node="">was hard hit</span></a><span data-dcnode-id="1014" instrument_node="">&nbsp;[PDF] by the 2008 financial crisis due to its dependence on exports to the U.S. market—the next year, Mexican exports to the United States fell 17 percent and its economy contracted by over 6 percent—its economy bounced back relatively quickly, returning to growth in 2010.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1011" instrument_node="">But Mexico’s NAFTA experience suffered from disparities between the promises of some of its supporters—that the pact would deliver rapid growth, raise wages, and reduce emigration—and the deal’s outcomes. Between 1993 and 2013, a period when Latin America was&nbsp;</span><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americasquarterly.org/content/latin-american-growth-slowdown" target="_blank" title="undergoing a major expansion"><span data-dcnode-id="1010" instrument_node="">undergoing a major economic expansion</span></a><span data-dcnode-id="1008" instrument_node="">, Mexico’s economy grew at an average rate of just 1.3 percent yearly. Poverty </span><a data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.economist.com/news/briefing/21592631-two-decades-ago-north-american-free-trade-agreement-got-flying-start-then-it" target="_blank" title="remains"><span data-dcnode-id="1007" instrument_node="">remains</span></a><span data-dcnode-id="1005" instrument_node="">&nbsp;at the same levels as in 1994. And the expected convergence of U.S. and Mexican wages&nbsp;</span><a data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cgdev.org/blog/us-mexico-wage-gap-has-grown-not-shrunk-under-nafta-awkward" target="_blank" title="didn’t happen"><span data-dcnode-id="1004" instrument_node="">didn’t happen</span></a><span data-dcnode-id="1002" instrument_node="">, with Mexico’s per capita income </span><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/articles/canada/2013-12-06/naftas-mixed-record" target="_blank" title="annual average"><span data-dcnode-id="1001" instrument_node="">rising at an average</span></a><span data-dcnode-id="999" instrument_node="">&nbsp;of just 1.2 percent annually in that period—far slower than Latin American countries such as Brazil, Chile, and Peru.</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="996" instrument_node="">Unemployment&nbsp;</span><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/roomfordebate/2013/11/24/what-weve-learned-from-nafta/under-nafta-mexico-suffered-and-the-united-states-felt-its-pain" target="_blank" title="also rose"><span data-dcnode-id="995" instrument_node="">also rose</span></a><span data-dcnode-id="993" instrument_node="">, which some economists have blamed on NAFTA for exposing Mexican farmers, especially corn producers, to competition from heavily subsidized U.S. agriculture. A study led by CEPR economist Mark Weisbrot estimated that NAFTA put almost&nbsp;</span><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cepr.net/documents/nafta-20-years-2014-02.pdf" target="_blank" title="two million small-scale Mexican farmers"><span data-dcnode-id="992" instrument_node="">two million small-scale Mexican farmers</span></a><span data-dcnode-id="990" instrument_node="">&nbsp;[PDF] out of work, in turn driving illegal migration to the United States. (Migration to the United States, both legal and illegal,&nbsp;more than doubled&nbsp;after 1994, peaking in 2007. The flow reversed after 2008, as more Mexican-born immigrants began&nbsp;</span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewhispanic.org/2015/11/19/more-mexicans-leaving-than-coming-to-the-u-s/" target="_blank" title="leaving the country than arriving"><span data-dcnode-id="989" instrument_node="">leaving the United States than arriving</span></a><span data-dcnode-id="987" instrument_node="">.)</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="984" instrument_node="">Many analysts explain these divergent outcomes by pointing to the “</span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mckinsey.com/global-themes/americas/a-tale-of-two-mexicos" target="_blank" title="two-speed"><span data-dcnode-id="983" instrument_node="">two-speed</span></a><span data-dcnode-id="981" instrument_node="">” nature of Mexico’s economy, in which NAFTA drove the growth of foreign investment, high-tech manufacturing, and rising wages in the industrial north, while the largely agrarian south remained detached from this new economy. University of Pennsylvania economist&nbsp;</span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//knowledge.wharton.upenn.edu/article/nafta-20-years-later-benefits-outweigh-costs/" target="_blank" title="economist Mauro Guillen argues"><span data-dcnode-id="980" instrument_node="">Mauro Guillen has argued</span></a><span data-dcnode-id="978" instrument_node=""> that Mexico’s rising inequality stemmed from NAFTA-oriented workers in the north gaining much higher wages from trade-related activity.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="975" instrument_node="">Ultimately, many experts say, Mexico’s recent economic performance has been affected by non-NAFTA factors. The 1994 devaluation of the peso drove Mexican exports, while competition with China’s&nbsp;</span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//repositorio.cepal.org/bitstream/handle/11362/37000/RVI110DusselGallagher_en.pdf" target="_blank" title="low-cost manufacturing sector"><span data-dcnode-id="974" instrument_node="">low-cost manufacturing sector</span></a><span data-dcnode-id="972" instrument_node="">&nbsp;[PDF] likely depressed growth. Unrelated public policies, such as land reform, made it easier for farmers to sell their land and emigrate. UCSD’s Hanson&nbsp;</span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gps.ucsd.edu/_files/faculty/hanson/hanson_publication_it_mexico.pdf" target="_blank" title="has argued"><span data-dcnode-id="971" instrument_node="">has argued</span></a><span data-dcnode-id="969" instrument_node="">&nbsp;[PDF] that&nbsp;Mexico’s struggles have largely domestic causes: poorly developed credit markets, a large and low-productivity informal sector, and dysfunctional regulation.</span></p><span data-dcnode-id="967" instrument_node="">
</span><h2 data-dcnode-id="965" id="chapter-title-0-4"><span data-dcnode-id="966" instrument_node="">What&nbsp;was the&nbsp;impact&nbsp;on Canada?</span></h2><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">Canada saw strong gains in cross-border investment in the NAFTA era: Since 1993, U.S. and Mexican investments in Canada have tripled. U.S. investment, which accounts for more than half of Canada’s FDI stock,&nbsp;</span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fas.org/sgp/crs/row/R42965.pdf" target="_blank" title="grew from"><span data-dcnode-id="962" instrument_node="">grew from</span></a><span data-dcnode-id="960" instrument_node="">&nbsp;[PDF] $70 billion in 1993 to more than $368 billion in 2013.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="957" instrument_node="">However, the most consequential aspect for Canada—opening its economy to the United States, by far Canada’s largest trading partner—predated NAFTA, with 1989 entry into force of the&nbsp;Canada-U.S. Free Trade Agreement (CUSFTA). Overall Canada-U.S. trade increased rapidly in the wake of Canada’s trade liberalization. Post-NAFTA, Canadian exports to the United States&nbsp;</span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fas.org/sgp/crs/row/R42965.pdf" target="_blank" title="grew"><span data-dcnode-id="956" instrument_node="">grew from</span></a><span data-dcnode-id="954" instrument_node="">&nbsp;[PDF] $110 billion to $346 billion; imports from the United States grew by almost the same amount.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Agriculture, in particular, saw a boost. Canada is the leading importer of U.S. agricultural products, and Canadian agricultural trade with the United States has more than tripled since 1994, as did Canada’s total agriculture exports to NAFTA partners.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">Neither the worst fears of Canada’s trade opponents—that opening to trade would gut the country’s manufacturing sector—nor the highest hopes of NAFTA’s advocates—that it would spark a rapid increase in productivity—came to pass. Canadian manufacturing employment held steady, but the productivity gap between the Canadian and U.S. economies wasn’t closed: by 2017, Canada’s labor productivity remained at&nbsp;</span><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fas.org/sgp/crs/row/R42965.pdf" target="_blank" title="72 percent"><span data-dcnode-id="947" instrument_node="">72 percent</span></a><span data-dcnode-id="945" instrument_node="">&nbsp;[PDF] of U.S. levels.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="942" instrument_node="">Overall, Canada became more dependent on trade with the United States, relying on its southern neighbor for 75 percent of its exports. Other high-income countries tend to be much more diversified, rarely relying on a single partner for more than 20 percent. U.S. presidents have long shared warm relationships with Canadian prime ministers, but Trump has not hesitated to use this dependence as leverage. In the course of USMCA talks, he </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/1613e3f4ea774d4aab7a7fd76b714ec2" target="_blank" title="threatened new tariffs"><span data-dcnode-id="941" instrument_node="">threatened new tariffs</span></a><span data-dcnode-id="939" instrument_node=""> on Canadian auto parts if Ottawa did not agree to trade concessions.</span></p><span data-dcnode-id="937" instrument_node="">
</span><h2 data-dcnode-id="935" id="chapter-title-0-5"><span data-dcnode-id="936" instrument_node="">What’s next for North American trade?</span></h2><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">NAFTA was long a political target. In 2008, then presidential candidate Barack Obama responded to widespread trade skepticism among the Democratic base by promising to renegotiate NAFTA to include tougher labor and environmental standards. The Obama administration sought to address the issues with NAFTA in negotiations for the </span><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/what-trans-pacific-partnership-tpp" target="_blank" title="Trans-Pacific Partnership"><span data-dcnode-id="932" instrument_node="">Trans-Pacific Partnership</span></a><span data-dcnode-id="930" instrument_node="">, a massive trade deal with eleven other countries including Canada and Mexico. The TPP was deeply unpopular—Hillary Clinton ultimately came out against the deal during her 2016 presidential run—and President Trump withdrew the United States from the TPP in one of his first acts in office.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">During the 2016 presidential campaign, both Trump and Senator Bernie Sanders, an independent, criticized NAFTA for bringing U.S. job losses. After entering office, Trump opened renegotiations to get a “better deal” for the United States. Trade remains a hot-button issue, with candidates </span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/election2020/candidate-tracker/trade" target="_blank" title="in the 2020 race"><span data-dcnode-id="926" instrument_node="">in the 2020 race</span></a><span data-dcnode-id="924" instrument_node=""> divided over whether to support the USMCA.</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">Much of the debate among policy experts has centered on how to mitigate the negative effects of deals such as NAFTA, including whether to compensate workers who lose their jobs or provide retraining programs to help them transition to new industries.&nbsp;Experts say programs such as the U.S. </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dol.gov/general/topic/training/tradeact" target="_blank" title="Trade Adjustment Assistance (TAA)"><span data-dcnode-id="920" instrument_node="">Trade Adjustment Assistance (TAA)</span></a><span data-dcnode-id="918" instrument_node="">, which helps workers pay for education or training to find new jobs, could help quell anger directed at trade liberalization.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">Many economists argue that current TAA funding levels are&nbsp;</span><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bloomberg.com/politics/articles/2016-05-11/few-u-s-workers-receive-federal-assistance-for-trade-deal-cosequences" target="_blank" title="far from sufficient"><span data-dcnode-id="914" instrument_node="">far from sufficient</span></a><span data-dcnode-id="912" instrument_node="">&nbsp;to address the increase in trade-related job losses.&nbsp;“There are pockets that have felt lots of pain,” says Hanson. “The existence of those pockets highlights our policy failures in helping regions and individuals adjust to the impact of globalization.”</span></p><span data-dcnode-id="910" instrument_node="">
</span><div class="pullquote embedded_small" data-dcnode-id="846" id="pullquote-24574"><span data-dcnode-id="909" instrument_node="">
</span><figure class="pullquote__container" data-dcnode-id="848"><span data-dcnode-id="908" instrument_node="">
</span><blockquote class="pullquote__quote" data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">
</span><span class="pullquote__quote-content" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">“There are pockets that have felt lots of pain. The existence of those pockets highlights our policy failures.”</span></span><span data-dcnode-id="904" instrument_node="">
</span></blockquote><span data-dcnode-id="902" instrument_node="">
</span><figcaption class="pullquote__author" data-dcnode-id="894"><span data-dcnode-id="901" instrument_node="">
</span><span class="pullquote__author-name" data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Professor Gordon Hanson</span></span><span data-dcnode-id="898" instrument_node="">, </span><span class="pullquote__author-meta" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">UC San Diego</span></span><span data-dcnode-id="895" instrument_node=""> </span></figcaption><span data-dcnode-id="893" instrument_node="">

</span></div><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="844" instrument_node="">Eschewing these policy proposals, Trump instead made good on his campaign promise to renegotiate NAFTA. He used tariffs as bargaining leverage throughout the process, applying&nbsp;</span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/risks-us-steel-and-aluminum-tariffs" target="_blank" title="import tariffs on steel and aluminum"><span data-dcnode-id="843" instrument_node="">import tariffs on steel and aluminum</span></a><span data-dcnode-id="841" instrument_node="">&nbsp;in early 2018 and threatening to do the same with automobiles. Trump’s demands included more access to Canada’s highly protected dairy market, better labor protections, dispute resolution reform, and new rules for digital commerce.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="838" instrument_node="">In late 2019, the Trump administration won support from congressional Democrats for the USMCA after agreeing to incorporate stronger labor enforcement. In the updated pact, the parties&nbsp;</span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2018-10-01/cars-cows-and-a-crisis-averted-highlights-of-a-new-nafta-deal" target="_blank" title="settled on a number of changes"><span data-dcnode-id="837" instrument_node="">settled on a number of changes</span></a><span data-dcnode-id="835" instrument_node="">: Rules of origin for the auto industry were tightened, requiring 75 percent of each vehicle to originate in the member countries, up from 62.5 percent; and new labor stipulations were added, requiring 40 percent of each vehicle to come from factories paying at least $16 per hour. A proposed expansion of intellectual property protections for U.S. pharmaceuticals—long a red line for U.S. trade negotiators—was sacrificed.&nbsp;The USMCA also significantly scales back the </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/how-are-trade-disputes-resolved" target="_blank" title="controversial investor-state dispute settlement mechanism"><span data-dcnode-id="834" instrument_node="">controversial investor-state dispute settlement mechanism</span></a><span data-dcnode-id="832" instrument_node="">, eliminating it entirely with Canada and limiting it to certain sectors with Mexico, including oil and gas and telecommunications.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="829" instrument_node="">As part of the deal, Canada agreed to allow more access to its dairy market and won several concessions in return. The USMCA will keep the&nbsp;</span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/how-are-trade-disputes-resolved" target="_blank" title="Chapter 19 dispute panel"><span data-dcnode-id="828" instrument_node="">Chapter 19 dispute panel</span></a><span data-dcnode-id="826" instrument_node="">, which Canada relies on to shield it from U.S. trade remedies. It also avoided a proposed five-year sunset clause, instead using a sixteen-year time frame with a review after six years.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="823" instrument_node="">In early 2020, the U.S. Congress approved the USMCA with large bipartisan majorities in both chambers, and the deal entered into force on July 1. Yet </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cato.org/blog/protectionist-love-child-labor-left-nationalist-right" target="_blank" title="some critics have complained"><span data-dcnode-id="822" instrument_node="">some critics have complained</span></a><span data-dcnode-id="820" instrument_node=""> that the new rules of origin and minimum wage requirements are onerous and amount to government-managed trade. CFR’s Alden was more sanguine, saying the administration can take credit for </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/blog/usmca-breakthrough-new-us-trade-consensus-and-what-it-means-world" target="_blank" title="restoring bipartisanship"><span data-dcnode-id="819" instrument_node="">restoring bipartisanship</span></a><span data-dcnode-id="817" instrument_node=""> to U.S. trade policy. He warns, however, that “if this new hybrid of Trumpian nationalism and Democratic progressivism is what it now takes to do trade deals with the United States, there may be very few takers.”</span></p></div><span data-dcnode-id="814" instrument_node="">
</span></div><span data-dcnode-id="812" instrument_node="">
</span><div class="resources" data-dcnode-id="757"><span data-dcnode-id="811" instrument_node="">
</span><h2 class="resources__title" data-dcnode-id="809" id="chapter-title-0-6"><span data-dcnode-id="810" instrument_node="">Recommended Resources</span></h2><span data-dcnode-id="808" instrument_node="">
</span><div class="resources__description" data-dcnode-id="759"><p data-dcnode-id="803"><span data-dcnode-id="807" instrument_node="">This 2017&nbsp;</span><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fas.org/sgp/crs/row/R42965.pdf" target="_blank"><span data-dcnode-id="806" instrument_node="">Congressional Research Service report</span></a><span data-dcnode-id="804" instrument_node="">&nbsp;[PDF] explains the history of NAFTA and its effects over twenty years.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="801" instrument_node="">Economists&nbsp;David Autor, David Dorn, and Gordon Hanson weigh the impacts of trade with China and Mexico on the U.S. labor market in this&nbsp;</span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nber.org/papers/w21906.pdf"><span data-dcnode-id="800" instrument_node="">2016 paper</span></a><span data-dcnode-id="798" instrument_node=""> [PDF] for the National Bureau of Economic Research.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="795" instrument_node="">In&nbsp;</span><em data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Foreign Affairs</span></em><span data-dcnode-id="792" instrument_node="">, former U.S. Trade Representative Carla Hills explains the&nbsp;</span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.foreignaffairs.com/articles/140348/carla-a-hills/naftas-economic-upsides"><span data-dcnode-id="791" instrument_node="">economic upsides of NAFTA from the U.S. perspective</span></a><span data-dcnode-id="789" instrument_node="">. The issue also includes essays on views from&nbsp;</span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.foreignaffairs.com/articles/140351/jorge-g-castaneda/naftas-mixed-record"><span data-dcnode-id="788" instrument_node="">Mexico</span></a><span data-dcnode-id="786" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.foreignaffairs.com/articles/140350/michael-wilson/naftas-unfinished-business"><span data-dcnode-id="785" instrument_node="">Canada</span></a><span data-dcnode-id="783" instrument_node="">.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="780" instrument_node="">The&nbsp;</span><em data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Economist</span></em><span data-dcnode-id="777" instrument_node="">&nbsp;examines NAFTA’s progress after two decades in&nbsp;</span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.economist.com/news/briefing/21592631-two-decades-ago-north-american-free-trade-agreement-got-flying-start-then-it"><span data-dcnode-id="776" instrument_node="">this 2014 report</span></a><span data-dcnode-id="774" instrument_node="">.</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">This&nbsp;</span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//knowledge.wharton.upenn.edu/article/nafta-20-years-later-benefits-outweigh-costs/"><span data-dcnode-id="770" instrument_node="">2014 analysis</span></a><span data-dcnode-id="768" instrument_node="">&nbsp;from the University of Pennsylvania’s Wharton School evaluates the costs and benefits of NAFTA for the U.S. and Mexican economies.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">Claims on both side of the NAFTA debate have been overblown, argue experts in this&nbsp;</span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//piie.com/sites/default/files/publications/pb/pb14-13.pdf"><span data-dcnode-id="764" instrument_node="">2014 report</span></a><span data-dcnode-id="762" instrument_node="">&nbsp;[PDF] by the Peterson Institute for International Economics.</span></p><span data-dcnode-id="760" instrument_node="">
