</span></div><div class="col-md-3 columns" data-dcnode-id="744"><div class="simple-column" data-dcnode-id="753"><p data-dcnode-id="755"><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ifair.eu/impact-groups-en/future-of-the-international-monetary-system/"><span data-dcnode-id="758" instrument_node=""> </span><img alt="Future of the International Monetary System" class="aligncenter size-kode-blog-size wp-image-8534" data-dcnode-id="757" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ifair.eu/wordpress/wp-content/uploads/2020/05/worldmap_money_web-01-1.jpeg&amp;raw" width="450"></a></p><span data-dcnode-id="754" instrument_node="">
</span></div><div class="simple-column" data-dcnode-id="745"><h3 data-dcnode-id="750"><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ifair.eu/impact-groups-en/future-of-the-international-monetary-system/" target="_self" title="Future of the International Monetary System"><span data-dcnode-id="752" instrument_node="">Future of the International Monetary System</span></a></h3><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">	The Impact Group Future of the International Monetary System wants to raise awareness about those structures of the international monetary system and make knowledge available to a broader population. We want to bridge the gap between academic research and the process by which public opinion is formed and democratic positions are adopted.</span></p><span data-dcnode-id="746" instrument_node="">

</span></div><div class="simple-column" data-dcnode-id="730"><h3 data-dcnode-id="735"><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ifair.eu/impact-groups-en/diplomacy-and-democracy/" target="_self" title="Diplomacy and Democracy"><span data-dcnode-id="737" instrument_node="">Diplomacy and Democracy</span></a></h3><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">	The Impact Group Diplomacy and Democracy aims at discussing the relationship between diplomacy, transparency and democracy. The project intends to motivate young people interested in international politics to think about questions outside their curriculum as they need to be part of the discussions surrounding the concept of global democracy. </span></p><span data-dcnode-id="731" instrument_node="">

</span></div><div class="simple-column" data-dcnode-id="715"><h3 data-dcnode-id="720"><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ifair.eu/impact-groups-en/lacalytics/" target="_self" title="LACalytics"><span data-dcnode-id="722" instrument_node="">LACalytics</span></a></h3><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The Impact Group LACalytics brings together young people from the EU and Latin America to discuss current issues and publish co-authored articles in bi-regional tandems. We offer a platform for students and young professionals to exchange views and knowledge about politics, economics, social life as well as international relations in both regions.</span></p><span data-dcnode-id="716" instrument_node="">
