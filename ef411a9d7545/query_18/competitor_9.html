</span><p data-dcnode-id="341"><strong data-dcnode-id="342"><span data-dcnode-id="345" instrument_node="">Full Issue PDF: </span><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.shu.edu/journalofdiplomacy/files/2022/02/The-Era-of-Dis-and-Misinformation-Volume-XXII-No.1.pdf"><span data-dcnode-id="344" instrument_node="">The Era of Dis-and-Misinformation Volume XXII, Number 1</span></a></strong></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="337"><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.shu.edu/journalofdiplomacy/files/2022/02/The-Era-of-Dis-and-Misinformation-Volume-XXII-No.1.pdf"><img alt="" class="alignnone size-medium wp-image-5543" data-dcnode-id="339" height="300" loading="lazy" sizes="(max-width: 237px) 100vw, 237px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.shu.edu/journalofdiplomacy/files/2022/02/journalcover-237x300.jpg&amp;raw" srcset="https://blogs.shu.edu/journalofdiplomacy/files/2022/02/journalcover-237x300.jpg 237w, https://blogs.shu.edu/journalofdiplomacy/files/2022/02/journalcover.jpg 392w" width="237"></a></p><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="333"><strong data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Letter from the Editors</span></strong></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330" style="text-align: left"><span data-dcnode-id="331" instrument_node="">As the world continues to recover from the devastating fallout of the COVID-19 pandemic, navigating the harms of misinformation and disinformation remain at the forefront of global conversations on paving the path forward. Preventing the dissemination of false information—particularly during a time where the ways in which we engage with information environments have fundamentally changed—is increasingly complex. Social media platforms have enabled users to not only engage with media but become distributors of it themselves.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327" style="text-align: left"><span data-dcnode-id="328" instrument_node="">When coupled with bad actors, limited repercussions, and poor content regulation, social networks are easily weaponized. At all scales of governance misinformation and disinformation campaigns pose a multidimensional threat. In Myanmar and China, disinformation campaigns were leveraged to target minority groups, while in Central and Eastern Europe, they serve as the cornerstone of destabilizing operations between adversarial states. In yet another facet, countries like Turkey, China, Russia, and Iran have embraced digital authoritarianism and restrict policies on internet accessibility under the pretext of stemming the spread of “fake news.”</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324" style="text-align: left"><span data-dcnode-id="325" instrument_node="">This year’s issue seeks to shed light on the nature of these evolving threats from a variety of innovative and understudied perspectives. This issue explores the causes and effects of the spread of misinformation and disinformation throughout different parts of the world and will be timely for years to come given the ever-increasing role and breadth of new technologies infiltrating people’s everyday lives.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="322" instrument_node="">Sincerely,</span><br data-dcnode-id="321"><span data-dcnode-id="320" instrument_node="">
Nicole Kalczynski</span><br data-dcnode-id="319"><span data-dcnode-id="318" instrument_node="">
Editor-in-Chief</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="315" instrument_node="">Rebecca Blaser</span><br data-dcnode-id="314"><span data-dcnode-id="313" instrument_node="">
Deputy Editor-in-Chief</span></p><span data-dcnode-id="311" instrument_node="">
</span><hr data-dcnode-id="310"><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="306"><strong data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Volume XXI: Spring/Summer 2020</span></strong></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="300"><strong data-dcnode-id="301"><span data-dcnode-id="304" instrument_node="">Full Issue PDF: </span><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.shu.edu/journalofdiplomacy/files/2020/07/Human-Rights-An-Uprising-Volume-XXI-Number-2.pdf"><span data-dcnode-id="303" instrument_node="">Human Rights An Uprising Volume XXI, Number 2</span></a></strong></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="296"><a data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.shu.edu/journalofdiplomacy/files/2020/07/Journal-of-Diplomacy_Human-Rights_An-Uprising-issue_Cover.png"><img alt="" class="alignnone size-medium wp-image-5218" data-dcnode-id="298" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.shu.edu/journalofdiplomacy/files/2020/07/Journal-of-Diplomacy_Human-Rights_An-Uprising-issue_Cover-200x300.png&amp;raw" srcset="https://blogs.shu.edu/journalofdiplomacy/files/2020/07/Journal-of-Diplomacy_Human-Rights_An-Uprising-issue_Cover-200x300.png 200w, https://blogs.shu.edu/journalofdiplomacy/files/2020/07/Journal-of-Diplomacy_Human-Rights_An-Uprising-issue_Cover.png 432w" width="200"></a></p><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="292"><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Letter from the Editor</span></strong></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">For centuries, protests have been used to mobilize citizenry in efforts to bring about sweeping change in different parts of the world. Protestors have protested to convey their discontent, to demand a moral response, and to speak truth to power. In 2010, anti government protests in Egypt inspired similar uprisings in other Arab countries, which became known as the Arab Spring. This year, the killings of Ahmaud Arbery, Breonna Taylor, and George Floyd have led people in the US and across the world to march against racism and police brutality. Despite a global pandemic, thousands have taken to the streets to demand justice for Black lives, demonstrating that the principle of equality, a common moral good, is worth risking both health and life.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">“Human Rights: An Uprising,” the second issue of our twenty-first volume, sheds light not only on the right to protest itself, but the human rights that have inspired them. Mahmood Monshipouri explores the variations and similarities in contemporary protest while discussing the Black Lives Matter movement. Joudie Roure addresses gender-based violence and LGBTQI rights in Puerto Rico, especially the murder of trans women. Debra DeLaet explains the importance of soft law approaches in making progress toward the realization of gender-based human rights and LGBTQI rights. Randolph Persaud and Jackson Yoder apply the concept of homo sacer to examine differential rights within two key areas: migrants/refugees/asylum seekers in Europe and the effects of COVID-19 on African Americans in the US. Nicholas McMurry argues that the right to be heard is developing in human rights law as expounded in the practice of the UN treaty bodies. Kathleen Mahoney discusses Indigenous rights in Canada. Morten Andersen argues that an investigation of the relationship between corruption and human rights is best viewed as a framework of socially constructed norms, political power, and the complex interrelation of political, legal, economic, and social systems. Finally, David Johnson writes about the origins, causes, and contemporary implications of extrajudicial killings in the Philippines.</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">This issue sheds light on the strata of protests and human rights. It further affirms the growing political salience of human rights and the power of social movements to overcome the tyranny of exclusion, greed, and special interests which have always undermined them.</span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="281" instrument_node="">Sincerely,</span><br data-dcnode-id="280"><span data-dcnode-id="279" instrument_node="">
Sushant Naidu</span><br data-dcnode-id="278"><span data-dcnode-id="277" instrument_node="">
Editor-in-Chief</span></p><span data-dcnode-id="275" instrument_node="">
</span><hr data-dcnode-id="274"><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="270"><strong data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Volume XXI: Fall/Winter 2019</span></strong></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="264"><strong data-dcnode-id="265"><span data-dcnode-id="268" instrument_node="">Full Issue PDF: </span><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.shu.edu/journalofdiplomacy/files/2020/03/Diversity-in-International-Relations-Volume-XXI-Number-1.pdf"><span data-dcnode-id="267" instrument_node="">Diversity in International Relations, Volume XXI, Number 1</span></a></strong></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="260"><a data-dcnode-id="261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.shu.edu/journalofdiplomacy/files/2020/03/Cover-Diversity-in-International-Relations.jpg"><img alt="" class="alignnone wp-image-5144" data-dcnode-id="262" height="303" loading="lazy" sizes="(max-width: 202px) 100vw, 202px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.shu.edu/journalofdiplomacy/files/2020/03/Cover-Diversity-in-International-Relations.jpg&amp;raw" srcset="https://blogs.shu.edu/journalofdiplomacy/files/2020/03/Cover-Diversity-in-International-Relations.jpg 853w, https://blogs.shu.edu/journalofdiplomacy/files/2020/03/Cover-Diversity-in-International-Relations-200x300.jpg 200w, https://blogs.shu.edu/journalofdiplomacy/files/2020/03/Cover-Diversity-in-International-Relations-682x1024.jpg 682w, https://blogs.shu.edu/journalofdiplomacy/files/2020/03/Cover-Diversity-in-International-Relations-768x1152.jpg 768w" width="202"></a></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="256"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Letter from the Editor</span></strong></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Diversity and Inclusion are terms that are commonplace across various industries, including the hiring practices of corporations and in representation at educational institutions. We see diversity and representation play an important role in the democratic nomination race for the 2020 U.S. presidential election, sometimes mentioned only to gain political advantage. Diversity, in terms of whose story gets told and whose doesn’t, is a theme that is woven throughout a variety of global issues, but often takes a backseat to the bigger news stories that tend to dominate media outlets. Yet, diversity or lack thereof is often implicated upon closer examination of global issues.</span></p><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Climate change, development, violent conflict, terrorism, human rights violations, reform of global governance, and problems of democratic representation throughout the globe are closely tied to issues of diversity. Increasingly, questions of diversity and inclusion present a pathway to solutions to many of these problems. For the 21st volume of the Journal, we wished to showcase and champion diversity and representation in academia by bringing the voices of diverse writers and less familiar topics to our readers.</span></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">This issue features three articles on indigenous rights. Sheelagh Daniels-Mayes and Kristina Sehlin MacNeil write on the concept of diplomacy, focusing primarily on the lesser recognized diplomacies of First Peoples in Australia and Sweden. Priscila Ribeiro Prado Barros posits that the growing involvement of Indigenous Peoples in Brazil, in the defense of their own affairs, have triggered the emergence of a new organizing logic, which considers rights as more important than territorial authority. Finally, Erica Neeganagwedgin examines the Canadian federal government’s 1969 Statement of the Government on Indian Policy and the recent Indigenous Rights Framework that the Canadian government introduced in 2018.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">The remaining three articles discuss diversity in employment at the UN, the issue of ethnic diversity in the two Sudans, and how international law affects refugees in the Caribbean. Harold Heredia discusses the importance of diversity at the UN as stated in the organization’s charter in Article 101. Luka Kuol examines the case of the two Sudans to argue that ethnic diversity can become a curse when there is a governance deficit that is manifested in social contracts and systems of government that abhor and detest diversity. Westmin James’ article asserts that both international treaty law and customary international law may appropriately aid constitutional interpretation and can protect asylum seekers or refugees from being repatriated to their home country.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Our strong desire to provide a platform for less familiar topics was the driving force behind the creation of this issue. We hope you enjoy this issue and the diverse topics that it touches on.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="239" instrument_node="">Sincerely,</span><br data-dcnode-id="238"><span data-dcnode-id="237" instrument_node="">
Sushant Naidu</span><br data-dcnode-id="236"><span data-dcnode-id="235" instrument_node="">
Editor-in-Chief</span></p><span data-dcnode-id="233" instrument_node="">
