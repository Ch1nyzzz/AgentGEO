</span><h2 class="page_title" data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">
				Meridian Diplomacy Forum            </span></h2><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Diplomacy is an everchanging artform that shifts with the times and the needs of a nation. Meridian’s annual Diplomacy Forum explores trends and challenges in U.S. and international statecraft.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><h3 data-dcnode-id="1174" style="text-align: left;"><span data-dcnode-id="1175" instrument_node="">2022 Diplomacy Forum - Statecraft in the New Frontiers: Ocean, Arctic and Space</span></h3><span data-dcnode-id="1173" instrument_node="">
</span><h5 data-dcnode-id="1168" style="text-align: left;"><strong data-dcnode-id="1169"><span data-dcnode-id="1172" instrument_node="">Tuesday, April 12, 2022 </span><em data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">(Hybrid In-Person and Virtual Program)</span></em></strong></h5><span data-dcnode-id="1167" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1160" style="margin: 0in; vertical-align: baseline;"><span class="normaltextrun" data-dcnode-id="1164"><span data-dcnode-id="1165" style="font-family: 'Arial',sans-serif; color: black;"><span data-dcnode-id="1166" instrument_node="">Science and technological innovation are decreasing the barriers of entry to space, while climate change is expanding the operability of the Arctic and renewing focus on our oceans. Each of these frontiers offer exciting opportunities to improve and support humankind. At the same time, national and corporate interests are bound to collide with the participation of more state and nonstate actors.</span></span></span><span class="eop" data-dcnode-id="1161"><span data-dcnode-id="1162" style="font-family: 'Arial',sans-serif; color: black;"><span data-dcnode-id="1163" instrument_node="">&nbsp;</span></span></span></p><span data-dcnode-id="1159" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1156" style="margin: 0in; vertical-align: baseline;"><span data-dcnode-id="1157" style="font-size: 9.0pt; font-family: 'Segoe UI',sans-serif;"><span data-dcnode-id="1158" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1155" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1146" style="margin: 0in; vertical-align: baseline; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; white-space: pre-wrap; font-kerning: none;"><span class="normaltextrun" data-dcnode-id="1150"><span data-dcnode-id="1153" style="font-family: 'Arial',sans-serif; color: black;"><span data-dcnode-id="1154" instrument_node="">Diplomacy is paramount to establish a set of norms to maintain order and avoid conflict. The 2022 Meridian Diplomacy Forum will explore international relations and the shifting global order in these arenas of limited sovereignty. American and international diplomats, military officials, business leaders and academic experts will examine how the United States and other nations are utilizing traditional and modern diplomatic tools to tackle these complexities and challenges</span></span><span data-dcnode-id="1151" style="color: black;"><span data-dcnode-id="1152" instrument_node="">.</span></span></span><span class="eop" data-dcnode-id="1147"><span data-dcnode-id="1148" style="color: black;"><span data-dcnode-id="1149" instrument_node="">&nbsp;</span></span></span></p><span data-dcnode-id="1145" instrument_node="">
</span><h5 data-dcnode-id="1142"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Solution Sessions</span></strong></h5><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1138"><strong data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Ocean Alliances and Governance: A Rising Tide for Maritime Diplomacy&nbsp; </span></strong></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1134"><em data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Oceans cover 70% of the Earth’s surface, house 80% of the planet’s life and carry 90% of globally traded goods. Oceans are also a whale of an ally in combating climate change as they absorb 25% of all carbon dioxide emissions and capture 90% of the additional heat generated from those emissions. While maritime issues have failed to surface on the world stage in recent years, a sea change may be underway. President Emmanuel Macron recently announced a new coalition to deliver a global high seas treaty for marine conservation, and the UN will host its first ocean conference in over five years this summer. This session will wade into how nations are employing “blue diplomacy” to tackle issues from pollution and overfishing to piracy and shipping constraints. It will also explore the state of U.S. maritime leadership, while detailing the responsibilities of the State Department and other agencies regarding oceanic security, boundaries, and scientific research.</span></em></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1130"><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Breaking the Ice: The Emerging Landscape for Arctic Diplomacy</span></strong></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1126"><em data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Eroding coastlines, thawing permafrost, and disappearing sea ice in the Arctic are giving way to new shipping routes and greater access to ports as well as oil, gas, and critical minerals. Conversely, the longtime spirit of cooperation and peace among some Arctic governments is growing increasingly frosty. Many nations, including the United States, are turning to their militaries and making bellicose moves to safeguard their interests in the region and forecast their ambitions. This session will explore how U.S. Arctic Policy can balance the Biden Administration’s increasing environmental and anti-climate change agenda on one hand with important security and economic interests on the other. It will also make the case for expanding science diplomacy, while showcasing successful applications of economic and public diplomacy.</span></em></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1122"><strong data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Universal Appeal: The Astronomical Need for Modern Space Diplomacy </span></strong></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1118"><em data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Sustained international cooperation and harmony in space has led to scientific and technological breakthroughs, strengthened natural disaster response, and now may support efforts to combat climate change. Today, space activity is greatly accelerating by both nation-states and private enterprise for commercial, security and scientific purposes. The potential for future conflict is skyrocketing as nation-states develop an array of counterspace weapons, while increased traffic may lead to collision with satellites and harmful space debris. The global governance system remains limited and antiquated, with many calling for modernization of the Outer Space Treaty. Diplomacy is needed to establish international regulations and norms of responsible behavior commensurate with today’s opportunities and challenges. This segment will address the call for U.S. leadership to work with other nations to modernize the global governance system to maintain peace and comradery in space, while fostering an environment supportive of commercialization and private sector innovation.&nbsp;&nbsp;&nbsp;&nbsp;</span></em></p><span data-dcnode-id="1117" instrument_node="">

                        </span><a aria-label="More information, Opens in a new window" class="privacy-notice-link" data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cookiepedia.co.uk/giving-consent-to-cookies" target="_blank"><span data-dcnode-id="364" instrument_node="">More information</span></a></div><div class="ot-sdk-row" data-dcnode-id="358" id="accept-recommended-container"><div class="ot-sdk-column" data-dcnode-id="359"><button class="button-theme" data-dcnode-id="360" id="accept-recommended-btn-handler"><span data-dcnode-id="361" instrument_node="">Allow All</span></button></div></div><section class="ot-sdk-row category-group" data-dcnode-id="236" id="cookie-preferences"><h3 data-dcnode-id="356" id="manage-cookies-text"><span data-dcnode-id="357" instrument_node=""> Manage Consent Preferences</span></h3><div class="accordion-text category-item" data-dcnode-id="335" data-optanongroupid="C0003"><h4 class="category-header" data-dcnode-id="353" id="ot-header-id-C0003"><span data-dcnode-id="354" instrument_node="">Functional Cookies</span></h4><div class="ot-switch ot-toggle" data-dcnode-id="342"><input aria-checked="false" aria-controls="ot-desc-id-C0003" aria-labelledby="ot-header-id-C0003" class="switch-checkbox category-switch-handler" data-dcnode-id="351" data-optanongroupid="C0003" id="ot-group-id-C0003" name="ot-group-id-C0003" role="switch" type="checkbox"><span data-dcnode-id="350" instrument_node=""> </span><label class="ot-switch-label" data-dcnode-id="343" for="ot-group-id-C0003"><span class="ot-switch-inner" data-dcnode-id="349"></span><span data-dcnode-id="348" instrument_node=""> </span><span class="ot-switch-nob" data-dcnode-id="347"></span><span data-dcnode-id="346" instrument_node=""> </span><span class="label-text" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Functional Cookies</span></span></label></div><p class="ot-category-desc" data-dcnode-id="339" id="ot-desc-id-C0003"><span data-dcnode-id="340" instrument_node="">These cookies enable the website to provide enhanced functionality and personalisation. They may be set by us or by third party providers whose services we have added to our pages. &nbsp; &nbsp;If you do not allow these cookies then some or all of these services may not function properly.</span></p></div><div class="accordion-text category-item" data-dcnode-id="314" data-optanongroupid="C0005"><h4 class="category-header" data-dcnode-id="332" id="ot-header-id-C0005"><span data-dcnode-id="333" instrument_node="">Social Media Cookies</span></h4><div class="ot-switch ot-toggle" data-dcnode-id="321"><input aria-checked="false" aria-controls="ot-desc-id-C0005" aria-labelledby="ot-header-id-C0005" class="switch-checkbox category-switch-handler" data-dcnode-id="330" data-optanongroupid="C0005" id="ot-group-id-C0005" name="ot-group-id-C0005" role="switch" type="checkbox"><span data-dcnode-id="329" instrument_node=""> </span><label class="ot-switch-label" data-dcnode-id="322" for="ot-group-id-C0005"><span class="ot-switch-inner" data-dcnode-id="328"></span><span data-dcnode-id="327" instrument_node=""> </span><span class="ot-switch-nob" data-dcnode-id="326"></span><span data-dcnode-id="325" instrument_node=""> </span><span class="label-text" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Social Media Cookies</span></span></label></div><p class="ot-category-desc" data-dcnode-id="318" id="ot-desc-id-C0005"><span data-dcnode-id="319" instrument_node="">These cookies are set by a range of social media services that we have added to the site to enable you to share our content with your friends and networks. They are capable of tracking your browser across other sites and building up a profile of your interests. This may impact the content and messages you see on other websites you visit. &nbsp; &nbsp;If you do not allow these cookies you may not be able to use or see these sharing tools.</span></p></div><div class="accordion-text category-item" data-dcnode-id="293" data-optanongroupid="C0004"><h4 class="category-header" data-dcnode-id="311" id="ot-header-id-C0004"><span data-dcnode-id="312" instrument_node="">Targeting Cookies</span></h4><div class="ot-switch ot-toggle" data-dcnode-id="300"><input aria-checked="false" aria-controls="ot-desc-id-C0004" aria-labelledby="ot-header-id-C0004" class="switch-checkbox category-switch-handler" data-dcnode-id="309" data-optanongroupid="C0004" id="ot-group-id-C0004" name="ot-group-id-C0004" role="switch" type="checkbox"><span data-dcnode-id="308" instrument_node=""> </span><label class="ot-switch-label" data-dcnode-id="301" for="ot-group-id-C0004"><span class="ot-switch-inner" data-dcnode-id="307"></span><span data-dcnode-id="306" instrument_node=""> </span><span class="ot-switch-nob" data-dcnode-id="305"></span><span data-dcnode-id="304" instrument_node=""> </span><span class="label-text" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Targeting Cookies</span></span></label></div><p class="ot-category-desc" data-dcnode-id="297" id="ot-desc-id-C0004"><span data-dcnode-id="298" instrument_node="">These cookies may be set through our site by our advertising partners. They may be used by those companies to build a profile of your interests and show you relevant adverts on other sites. &nbsp; &nbsp;They do not store directly personal information, but are based on uniquely identifying your browser and internet device. If you do not allow these cookies, you will experience less targeted advertising.</span></p></div><div class="accordion-text category-item" data-dcnode-id="272" data-optanongroupid="C0002"><h4 class="category-header" data-dcnode-id="290" id="ot-header-id-C0002"><span data-dcnode-id="291" instrument_node="">Performance Cookies</span></h4><div class="ot-switch ot-toggle" data-dcnode-id="279"><input aria-checked="false" aria-controls="ot-desc-id-C0002" aria-labelledby="ot-header-id-C0002" class="switch-checkbox cat
