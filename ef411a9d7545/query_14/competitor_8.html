</span></p><p data-dcnode-id="7084"><span data-dcnode-id="7096" instrument_node="">Scholars have noted that online communities have especially gained prominence among users like e-patients and victim-survivors of </span><a data-dcnode-id="7094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abuse" title="Abuse"><span data-dcnode-id="7095" instrument_node="">abuse</span></a><span data-dcnode-id="7093" instrument_node="">.</span><sup class="reference" data-dcnode-id="7090" id="cite_ref-49"><a data-dcnode-id="7091" href="#cite_note-49"><span data-dcnode-id="7092" instrument_node="">[49]</span></a></sup><span data-dcnode-id="7089" instrument_node=""> Within online health and support groups respectively, members have been able to find others who share similar experiences, receive advice and emotional support, and record their own narrative.</span><sup class="reference" data-dcnode-id="7086" id="cite_ref-50"><a data-dcnode-id="7087" href="#cite_note-50"><span data-dcnode-id="7088" instrument_node="">[50]</span></a></sup><span data-dcnode-id="7085" instrument_node="">
</span></p><p data-dcnode-id="7047"><span data-dcnode-id="7083" instrument_node="">
However, online communities face issues with online harassment in the form of </span><a data-dcnode-id="7081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet_troll" title="Internet troll"><span data-dcnode-id="7082" instrument_node="">trolling</span></a><span data-dcnode-id="7080" instrument_node="">, </span><a data-dcnode-id="7078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyberbullying" title="Cyberbullying"><span data-dcnode-id="7079" instrument_node="">cyberbullying</span></a><span data-dcnode-id="7077" instrument_node="">, and </span><a data-dcnode-id="7075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hate_speech" title="Hate speech"><span data-dcnode-id="7076" instrument_node="">hate speech</span></a><span data-dcnode-id="7074" instrument_node="">.</span><sup class="reference" data-dcnode-id="7071" id="cite_ref-51"><a data-dcnode-id="7072" href="#cite_note-51"><span data-dcnode-id="7073" instrument_node="">[51]</span></a></sup><span data-dcnode-id="7070" instrument_node=""> According to the Pew Research Center, 41% of Americans have experienced some form of online harassment with 75% of these experiences occurring over social media.</span><sup class="reference" data-dcnode-id="7067" id="cite_ref-52"><a data-dcnode-id="7068" href="#cite_note-52"><span data-dcnode-id="7069" instrument_node="">[52]</span></a></sup><span data-dcnode-id="7066" instrument_node=""> Another area of concern is the influence of algorithms on delineating the online communities a user comes in contact with. Personalizing algorithms can tailor a user's experience to their analytically determined preference, which creates a "</span><a data-dcnode-id="7064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Filter_bubble" title="Filter bubble"><span data-dcnode-id="7065" instrument_node="">filter bubble</span></a><span data-dcnode-id="7063" instrument_node="">". The user loses agency in content accessibility and information dissemination when these bubbles are created.</span><sup class="reference" data-dcnode-id="7060" id="cite_ref-53"><a data-dcnode-id="7061" href="#cite_note-53"><span data-dcnode-id="7062" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="7057" id="cite_ref-54"><a data-dcnode-id="7058" href="#cite_note-54"><span data-dcnode-id="7059" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7056" instrument_node=""> The loss of agency can lead to polarization, but recent research indicates that individual level polarization is rare.</span><sup class="reference" data-dcnode-id="7053" id="cite_ref-:15_55-0"><a data-dcnode-id="7054" href="#cite_note-:15-55"><span data-dcnode-id="7055" instrument_node="">[55]</span></a></sup><span data-dcnode-id="7052" instrument_node=""> Most polarization is due to the influx of users with extreme views that can encourage users to move towards partisan fringes from "gateway communities".</span><sup class="reference" data-dcnode-id="7049" id="cite_ref-:15_55-1"><a data-dcnode-id="7050" href="#cite_note-:15-55"><span data-dcnode-id="7051" instrument_node="">[55]</span></a></sup><span data-dcnode-id="7048" instrument_node=""> In summary, online communities support community but in rare cases can support polarization. </span></p><div class="thumb tright" data-dcnode-id="7035"><div class="thumbinner" data-dcnode-id="7036" style="width:475px;"><a class="image" data-dcnode-id="7045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AInstagram_Filters_2011.jpg"><img alt="" class="thumbimage" data-dcnode-id="7046" data-file-height="750" data-file-width="1500" decoding="async" height="237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Instagram_Filters_2011.jpg/473px-Instagram_Filters_2011.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Instagram_Filters_2011.jpg/710px-Instagram_Filters_2011.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Instagram_Filters_2011.jpg/946px-Instagram_Filters_2011.jpg 2x" width="473"></a><span data-dcnode-id="7044" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7037"><div class="magnify" data-dcnode-id="7042"><a class="internal" data-dcnode-id="7043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AInstagram_Filters_2011.jpg" title="Enlarge"></a></div><span data-dcnode-id="7041" instrument_node="">A demonstration of subtle </span><a data-dcnode-id="7039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Instagram" title="Instagram"><span data-dcnode-id="7040" instrument_node="">Instagram</span></a><span data-dcnode-id="7038" instrument_node=""> filters and how radically they can change image perception.</span></div></div></div><span data-dcnode-id="7034" instrument_node="">
</span><h4 data-dcnode-id="7024"><span class="mw-headline" data-dcnode-id="7032" id="Social_media"><span data-dcnode-id="7033" instrument_node="">Social media</span></span><span class="mw-editsection" data-dcnode-id="7025"><span class="mw-editsection-bracket" data-dcnode-id="7030"><span data-dcnode-id="7031" instrument_node="">[</span></span><a data-dcnode-id="7028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D18" title="Edit section: Social media"><span data-dcnode-id="7029" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7026"><span data-dcnode-id="7027" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7023" instrument_node="">
</span><p data-dcnode-id="7011"><a data-dcnode-id="7021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_media" title="Social media"><span data-dcnode-id="7022" instrument_node="">Social media</span></a><span data-dcnode-id="7020" instrument_node=""> makes human connection formal, manageable, and profitable to social media companies.</span><sup class="reference" data-dcnode-id="7017" id="cite_ref-:35_56-0"><a data-dcnode-id="7018" href="#cite_note-:35-56"><span data-dcnode-id="7019" instrument_node="">[56]</span></a></sup><span data-dcnode-id="7016" instrument_node=""> The technology that promotes this human connection is not human, but automated. As people use social media and form their experiences on the platforms to meet their interests, the technology also affects how the users interact with each other and the world.</span><sup class="reference" data-dcnode-id="7013" id="cite_ref-:35_56-1"><a data-dcnode-id="7014" href="#cite_note-:35-56"><span data-dcnode-id="7015" instrument_node="">[56]</span></a></sup><span data-dcnode-id="7012" instrument_node="">
</span></p><p data-dcnode-id="6993"><span data-dcnode-id="7010" instrument_node="">Social media also allows for the weaving of "offline and online communities into integrated movements".</span><sup class="reference" data-dcnode-id="7007" id="cite_ref-Olson_772–787_57-0"><a data-dcnode-id="7008" href="#cite_note-Olson_772%E2%80%93787-57"><span data-dcnode-id="7009" instrument_node="">[57]</span></a></sup><span data-dcnode-id="7006" instrument_node=""> Users' actions, such as liking, commenting, sending, retweeting or saving a post, contribute to the algorithmic customization of their personalized content.</span><sup class="reference" data-dcnode-id="7003" id="cite_ref-Swart_205630512110088_58-0"><a data-dcnode-id="7004" href="#cite_note-Swart_205630512110088-58"><span data-dcnode-id="7005" instrument_node="">[58]</span></a></sup><span data-dcnode-id="7002" instrument_node=""> Ultimately, the reach social media has is determined by these algorithms.</span><sup class="reference" data-dcnode-id="6999" id="cite_ref-Swart_205630512110088_58-1"><a data-dcnode-id="7000" href="#cite_note-Swart_205630512110088-58"><span data-dcnode-id="7001" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6998" instrument_node="">  Social media also offers various image altering tools that can impact image perception – making the platform less human and more automated.</span><sup class="reference" data-dcnode-id="6995" id="cite_ref-59"><a data-dcnode-id="6996" href="#cite_note-59"><span data-dcnode-id="6997" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6994" instrument_node="">
</span></p><span data-dcnode-id="6992" instrument_node="">
</span><h5 data-dcnode-id="6982"><span class="mw-headline" data-dcnode-id="6990" id="Digital_activism"><span data-dcnode-id="6991" instrument_node="">Digital activism</span></span><span class="mw-editsection" data-dcnode-id="6983"><span class="mw-editsection-bracket" data-dcnode-id="6988"><span data-dcnode-id="6989" instrument_node="">[</span></span><a data-dcnode-id="6986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D19" title="Edit section: Digital activism"><span data-dcnode-id="6987" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6984"><span data-dcnode-id="6985" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6981" instrument_node="">
</span><p data-dcnode-id="6955"><span data-dcnode-id="6980" instrument_node="">Digital activism serves an agenda-setting function as it can influence mainstream media and news outlets. </span><a data-dcnode-id="6978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hashtag" title="Hashtag"><span data-dcnode-id="6979" instrument_node="">Hashtags</span></a><span data-dcnode-id="6977" instrument_node="">, which curate posts with similar themes and ideas into a central location on a digital platform, aid in bringing exposure to social and political issues. These hashtags, specifically the subsequent discussions they create, put pressure on private institutions and governments to address these issues, as can be seen with movements like #CripTheVote,</span><sup class="reference" data-dcnode-id="6974" id="cite_ref-60"><a data-dcnode-id="6975" href="#cite_note-60"><span data-dcnode-id="6976" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6973" instrument_node=""> </span><a data-dcnode-id="6971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chibok_schoolgirls_kidnapping" title="Chibok schoolgirls kidnapping"><span data-dcnode-id="6972" instrument_node="">#BringBackOurGirls</span></a><span data-dcnode-id="6970" instrument_node="">,</span><sup class="reference" data-dcnode-id="6967" id="cite_ref-Olson_772–787_57-1"><a data-dcnode-id="6968" href="#cite_note-Olson_772%E2%80%93787-57"><span data-dcnode-id="6969" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6966" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="6964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Me_Too_movement" title="Me Too movement"><span data-dcnode-id="6965" instrument_node="">#MeToo</span></a><span data-dcnode-id="6963" instrument_node="">. Many recent social movements have originated on </span><a data-dcnode-id="6961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twitter" title="Twitter"><span data-dcnode-id="6962" instrument_node="">Twitter</span></a><span data-dcnode-id="6960" instrument_node="">, as Twitter Topic Networks provide a framework for online community organizing.</span><sup class="reference" data-dcnode-id="6957" id="cite_ref-Olson_772–787_57-2"><a data-dcnode-id="6958" href="#cite_note-Olson_772%E2%80%93787-57"><span data-dcnode-id="6959" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6956" instrument_node="">
</span></p><span data-dcnode-id="6954" instrument_node="">
</span><h5 data-dcnode-id="6944"><span class="mw-headline" data-dcnode-id="6952" id="Influencers_and_content_creators"><span data-dcnode-id="6953" instrument_node="">Influencers and content creators</span></span><span class="mw-editsection" data-dcnode-id="6945"><span class="mw-editsection-bracket" data-dcnode-id="6950"><span data-dcnode-id="6951" instrument_node="">[</span></span><a data-dcnode-id="6948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D20" title="Edit section: Influencers and content creators"><span data-dcnode-id="6949" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6943" instrument_node="">
</span><p data-dcnode-id="6921"><span data-dcnode-id="6942" instrument_node="">As social media is increasingly becoming more available, the </span><a class="mw-redirect" data-dcnode-id="6940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Influencer" title="Influencer"><span data-dcnode-id="6941" instrument_node="">influencer</span></a><span data-dcnode-id="6939" instrument_node="">/</span><a data-dcnode-id="6937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Content_creation" title="Content creation"><span data-dcnode-id="6938" instrument_node="">content creator</span></a><span data-dcnode-id="6936" instrument_node=""> position has also become recognized as a profession. With such a large and rapid consumer presence on social media, it creates both a helpful and overwhelming source of consumer information for advertisers.</span><sup class="reference" data-dcnode-id="6933" id="cite_ref-:38_61-0"><a data-dcnode-id="6934" href="#cite_note-:38-61"><span data-dcnode-id="6935" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6932" instrument_node=""> There is substantial potential to identify "market mavens" on social media due to </span><a data-dcnode-id="6930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fandom" title="Fandom"><span data-dcnode-id="6931" instrument_node="">fandom</span></a><span data-dcnode-id="6929" instrument_node=""> culture and the nature of influencer/content creator followings.</span><sup class="reference" data-dcnode-id="6926" id="cite_ref-:38_61-1"><a data-dcnode-id="6927" href="#cite_note-:38-61"><span data-dcnode-id="6928" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6925" instrument_node=""> Social media has opened up business opportunities for corporations to employ </span><a data-dcnode-id="6923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Influencer_marketing" title="Influencer marketing"><span data-dcnode-id="6924" instrument_node="">influencer marketing</span></a><span data-dcnode-id="6922" instrument_node="">, where they can more easily find suitable influencers to advertise their products to their viewers.
</span></p><span data-dcnode-id="6920" instrument_node="">
</span><h4 data-dcnode-id="6910"><span class="mw-headline" data-dcnode-id="6918" id="Online_learning"><span data-dcnode-id="6919" instrument_node="">Online learning</span></span><span class="mw-editsection" data-dcnode-id="6911"><span class="mw-editsection-bracket" data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">[</span></span><a data-dcnode-id="6914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D21" title="Edit section: Online learning"><span data-dcnode-id="6915" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6912"><span data-dcnode-id="6913" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6909" instrument_node="">
</span><p data-dcnode-id="6891"><span data-dcnode-id="6908" instrument_node="">Although online learning existed previously, amidst the COVID-19 pandemic the prevalence of online learning increased.</span><sup class="reference" data-dcnode-id="6905" id="cite_ref-62"><a data-dcnode-id="6906" href="#cite_note-62"><span data-dcnode-id="6907" instrument_node="">[62]</span></a></sup><span data-dcnode-id="6904" instrument_node=""> These online learning platforms are known as e-learning management systems (ELMS) and they allow both students and teachers access to a shared, digital space, which includes classroom resources, assignments, discussions, and social networking through direct messaging and email.</span><sup class="reference" data-dcnode-id="6901" id="cite_ref-63"><a data-dcnode-id="6902" href="#cite_note-63"><span data-dcnode-id="6903" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6900" instrument_node=""> Although socialization is a component of e-learning management systems, not all students utilize these resources, rather they focus on the lecturer as the primary resource of knowledge.</span><sup class="reference" data-dcnode-id="6897" id="cite_ref-64"><a data-dcnode-id="6898" href="#cite_note-64"><span data-dcnode-id="6899" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6896" instrument_node=""> The long-term effects of emergency online learning, which many turned to during the height of the pandemic, is ongoing; however, one study concluded that students' "motivation, self-efficacy, and cognitive engagement decreased after the transition.</span><sup class="reference" data-dcnode-id="6893" id="cite_ref-65"><a data-dcnode-id="6894" href="#cite_note-65"><span data-dcnode-id="6895" instrument_node="">[65]</span></a></sup><span data-dcnode-id="6892" instrument_node="">"
</span></p><span data-dcnode-id="6890" instrument_node="">
</span><h3 data-dcnode-id="6880"><span class="mw-headline" data-dcnode-id="6888" id="Interactive_media"><span data-dcnode-id="6889" instrument_node="">Interactive media</span></span><span class="mw-editsection" data-dcnode-id="6881"><span class="mw-editsection-bracket" data-dcnode-id="6886"><span data-dcnode-id="6887" instrument_node="">[</span></span><a data-dcnode-id="6884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D22" title="Edit section: Interactive media"><span data-dcnode-id="6885" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6882"><span data-dcnode-id="6883" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6879" instrument_node="">
</span><h4 data-dcnode-id="6869"><span class="mw-headline" data-dcnode-id="6877" id="Video_games"><span data-dcnode-id="6878" instrument_node="">Video games</span></span><span class="mw-editsection" data-dcnode-id="6870"><span class="mw-editsection-bracket" data-dcnode-id="6875"><span data-dcnode-id="6876" instrument_node="">[</span></span><a data-dcnode-id="6873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D23" title="Edit section: Video games"><span data-dcnode-id="6874" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6871"><span data-dcnode-id="6872" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6868" instrument_node="">
</span><p data-dcnode-id="6832"><span data-dcnode-id="6867" instrument_node="">The procedural and interactive nature of </span><a data-dcnode-id="6865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game" title="Video game"><span data-dcnode-id="6866" instrument_node="">video games</span></a><span data-dcnode-id="6864" instrument_node=""> leads them to be rich examples of </span><a data-dcnode-id="6862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Procedural_rhetoric" title="Procedural rhetoric"><span data-dcnode-id="6863" instrument_node="">procedural rhetoric</span></a><span data-dcnode-id="6861" instrument_node="">.</span><sup class="reference" data-dcnode-id="6858" id="cite_ref-:26_66-0"><a data-dcnode-id="6859" href="#cite_note-:26-66"><span data-dcnode-id="6860" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6857" instrument_node=""> This rhetoric can range from games designed to bolster children's learning to challenging one's assumptions of the world around them.</span><sup class="reference" data-dcnode-id="6854" id="cite_ref-67"><a data-dcnode-id="6855" href="#cite_note-67"><span data-dcnode-id="6856" instrument_node="">[67]</span></a></sup><span data-dcnode-id="6853" instrument_node=""> An educational video game developed for students at the </span><a data-dcnode-id="6851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Texas_at_Austin" title="University of Texas at Austin"><span data-dcnode-id="6852" instrument_node="">University of Texas at Austin</span></a><span data-dcnode-id="6850" instrument_node="">, titled </span><i data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">Rhetorical Peaks</span></i><span data-dcnode-id="6847" instrument_node="">, was made with the goal of examining rhetoric's procedural nature and to capture the constantly changing contexts of rhetoric.</span><sup class="reference" data-dcnode-id="6844" id="cite_ref-68"><a data-dcnode-id="6845" href="#cite_note-68"><span data-dcnode-id="6846" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="6841" id="cite_ref-:26_66-1"><a data-dcnode-id="6842" href="#cite_note-:26-66"><span data-dcnode-id="6843" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6840" instrument_node=""> The </span><a data-dcnode-id="6838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonlinear_gameplay" title="Nonlinear gameplay"><span data-dcnode-id="6839" instrument_node="">open-ended</span></a><span data-dcnode-id="6837" instrument_node=""> nature of the game as well as the developer's intent on playing the game within a classroom setting encouraged collaboration among students and for them to develop their own interpretations on the game's plot based on vague clues, ultimately helping them to realize that there must be a willingness to change between lines of thought and to work within and past limits in understanding rhetoric.</span><sup class="reference" data-dcnode-id="6834" id="cite_ref-:26_66-2"><a data-dcnode-id="6835" href="#cite_note-:26-66"><span data-dcnode-id="6836" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6833" instrument_node="">
</span></p><span data-dcnode-id="6831" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6822"><div class="thumbinner" data-dcnode-id="6823" style="width:222px;"><a class="image" data-dcnode-id="6829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AXbox_Live_logo.svg"><img alt="" class="thumbimage" data-dcnode-id="6830" data-file-height="86" data-file-width="512" decoding="async" height="37" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Xbox_Live_logo.svg/220px-Xbox_Live_logo.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Xbox_Live_logo.svg/330px-Xbox_Live_logo.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Xbox_Live_logo.svg/440px-Xbox_Live_logo.svg.png 2x" width="220"></a><span data-dcnode-id="6828" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6824"><div class="magnify" data-dcnode-id="6826"><a class="internal" data-dcnode-id="6827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AXbox_Live_logo.svg" title="Enlarge"></a></div><span data-dcnode-id="6825" instrument_node="">Xbox Live, an example of virtual communication between real life and online friends that is embedded in the gaming console.</span></div></div></div><span data-dcnode-id="6821" instrument_node="">
</span><p data-dcnode-id="6795"><span data-dcnode-id="6820" instrument_node="">In mainstream gaming, each game has its own set of language which help shape the way information is transferred between players in their community.</span><sup class="reference" data-dcnode-id="6817" id="cite_ref-69"><a data-dcnode-id="6818" href="#cite_note-69"><span data-dcnode-id="6819" instrument_node="">[69]</span></a></sup><span data-dcnode-id="6816" instrument_node=""> With the popularization of </span><a data-dcnode-id="6814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Online_game" title="Online game"><span data-dcnode-id="6815" instrument_node="">online gaming</span></a><span data-dcnode-id="6813" instrument_node=""> - including games such as </span><a data-dcnode-id="6811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Call_of_Duty" title="Call of Duty"><span data-dcnode-id="6812" instrument_node="">Call of Duty</span></a><span data-dcnode-id="6810" instrument_node="">, </span><a data-dcnode-id="6808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Legends" title="League of Legends"><span data-dcnode-id="6809" instrument_node="">League of Legends</span></a><span data-dcnode-id="6807" instrument_node="">, and many more - players have been able to communicate with one another that creates their own rhetoric within the established world of the game, which allows players to influence and be influenced by the other gamers around them.</span><sup class="reference" data-dcnode-id="6804" id="cite_ref-70"><a data-dcnode-id="6805" href="#cite_note-70"><span data-dcnode-id="6806" instrument_node="">[70]</span></a></sup><span data-dcnode-id="6803" instrument_node=""> Another well known game called </span><a data-dcnode-id="6801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detroit%3A_Become_Human" title="Detroit: Become Human"><span data-dcnode-id="6802" instrument_node="">Detroit: Become Human</span></a><span data-dcnode-id="6800" instrument_node=""> has another way of encouraging digital rhetoric within the gaming community. This decision based video game gives the player the power to create their own story that deals with gender, race, and sexuality. This futuristic message of a human to machine relationship caused discussion due to the difficult moral decisions being made while playing. At the end, there are surveys to take to see others opinions about certain decisions around the world.</span><sup class="reference" data-dcnode-id="6797" id="cite_ref-71"><a data-dcnode-id="6798" href="#cite_note-71"><span data-dcnode-id="6799" instrument_node="">[71]</span></a></sup><span data-dcnode-id="6796" instrument_node="">
</span></p><span data-dcnode-id="6794" instrument_node="">
</span><h4 data-dcnode-id="6784"><span class="mw-headline" data-dcnode-id="6792" id="Mobile_applications"><span data-dcnode-id="6793" instrument_node="">Mobile applications</span></span><span class="mw-editsection" data-dcnode-id="6785"><span class="mw-editsection-bracket" data-dcnode-id="6790"><span data-dcnode-id="6791" instrument_node="">[</span></span><a data-dcnode-id="6788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D24" title="Edit section: Mobile applications"><span data-dcnode-id="6789" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6786"><span data-dcnode-id="6787" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6783" instrument_node="">
</span><p data-dcnode-id="6767"><a data-dcnode-id="6781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobile_app" title="Mobile app"><span data-dcnode-id="6782" instrument_node="">Mobile applications</span></a><span data-dcnode-id="6780" instrument_node=""> are computer programs designed specifically for mobile devices, such as phones or tablets. Mobile applications cater to a wide range of audiences and needs. There are apps for social media, employment, education, etc. Mobile apps allow for a "cultural hybridity of habit" which allows anyone to stay connected with anyone, anywhere.</span><sup class="reference" data-dcnode-id="6777" id="cite_ref-:12_72-0"><a data-dcnode-id="6778" href="#cite_note-:12-72"><span data-dcnode-id="6779" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6776" instrument_node="">  Due to this, there is always access to changing cultures and lifestyles, since there are so many different apps available to research or publish work.</span><sup class="reference" data-dcnode-id="6773" id="cite_ref-:12_72-1"><a data-dcnode-id="6774" href="#cite_note-:12-72"><span data-dcnode-id="6775" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6772" instrument_node="">  Furthermore, mobile apps allow individual users to manage many aspects of their lives while allowing the apps themselves to be able to continue to largely change and upgrade socially.</span><sup class="reference" data-dcnode-id="6769" id="cite_ref-73"><a data-dcnode-id="6770" href="#cite_note-73"><span data-dcnode-id="6771" instrument_node="">[73]</span></a></sup><span data-dcnode-id="6768" instrument_node="">
</span></p><span data-dcnode-id="6766" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6757"><div class="thumbinner" data-dcnode-id="6758" style="width:222px;"><a class="image" data-dcnode-id="6764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATandberg_Image_Gallery_-_telepresence-t3-side-view-hires.jpg"><img alt="" class="thumbimage" data-dcnode-id="6765" data-file-height="2360" data-file-width="3696" decoding="async" height="140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Tandberg_Image_Gallery_-_telepresence-t3-side-view-hires.jpg/220px-Tandberg_Image_Gallery_-_telepresence-t3-side-view-hires.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Tandberg_Image_Gallery_-_telepresence-t3-side-view-hires.jpg/330px-Tandberg_Image_Gallery_-_telepresence-t3-side-view-hires.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Tandberg_Image_Gallery_-_telepresence-t3-side-view-hires.jpg/440px-Tandberg_Image_Gallery_-_telepresence-t3-side-view-hires.jpg 2x" width="220"></a><span data-dcnode-id="6763" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6759"><div class="magnify" data-dcnode-id="6761"><a class="internal" data-dcnode-id="6762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATandberg_Image_Gallery_-_telepresence-t3-side-view-hires.jpg" title="Enlarge"></a></div><span data-dcnode-id="6760" instrument_node="">Telepresence utilized in a professional setting for meetings.</span></div></div></div><span data-dcnode-id="6756" instrument_node="">
</span><p data-dcnode-id="6750"><span data-dcnode-id="6755" instrument_node="">Mobility of information poses challenges to user interface, notably the small screen and keys, in comparison to larger counterparts such as laptops and PC's. However, it also has the advantage of heightening physical interactivity with touch, and presents experiences with multiple senses in this way. With these varying factors, mobile applications must identify how they can successfully create user interfaces that motivate trust, reliability, and helpful UX/UI design.</span><sup class="reference" data-dcnode-id="6752" id="cite_ref-74"><a data-dcnode-id="6753" href="#cite_note-74"><span data-dcnode-id="6754" instrument_node="">[74]</span></a></sup><span data-dcnode-id="6751" instrument_node="">
</span></p><span data-dcnode-id="6749" instrument_node="">
</span><h4 data-dcnode-id="6739"><span class="mw-headline" data-dcnode-id="6747" id="Immersive_media"><span data-dcnode-id="6748" instrument_node="">Immersive media</span></span><span class="mw-editsection" data-dcnode-id="6740"><span class="mw-editsection-bracket" data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">[</span></span><a data-dcnode-id="6743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D25" title="Edit section: Immersive media"><span data-dcnode-id="6744" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6741"><span data-dcnode-id="6742" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6738" instrument_node="">
</span><p data-dcnode-id="6719"><span data-dcnode-id="6737" instrument_node="">Emerging immersive technologies such as </span><a data-dcnode-id="6735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virtual_reality" title="Virtual reality"><span data-dcnode-id="6736" instrument_node="">virtual reality</span></a><span data-dcnode-id="6734" instrument_node=""> removes the visual presence of devices and mimics emotional experiences.</span><sup class="reference" data-dcnode-id="6731" id="cite_ref-:37_75-0"><a data-dcnode-id="6732" href="#cite_note-:37-75"><span data-dcnode-id="6733" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6730" instrument_node=""> User immersion into virtual reality includes simulated real-life communication; virtual reality provides the illusion of being somewhere the body physically is not, which contributes to widespread communication that reaches the point of </span><a data-dcnode-id="6728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telepresence" title="Telepresence"><span data-dcnode-id="6729" instrument_node="">telepresence</span></a><span data-dcnode-id="6727" instrument_node=""> and </span><a data-dcnode-id="6725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telexistence" title="Telexistence"><span data-dcnode-id="6726" instrument_node="">telexistence</span></a><span data-dcnode-id="6724" instrument_node="">.</span><sup class="reference" data-dcnode-id="6721" id="cite_ref-:37_75-1"><a data-dcnode-id="6722" href="#cite_note-:37-75"><span data-dcnode-id="6723" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6720" instrument_node="">
</span></p><span data-dcnode-id="6718" instrument_node="">
</span><h2 data-dcnode-id="6708"><span class="mw-headline" data-dcnode-id="6716" id="Critical_approaches"><span data-dcnode-id="6717" instrument_node="">Critical approaches</span></span><span class="mw-editsection" data-dcnode-id="6709"><span class="mw-editsection-bracket" data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">[</span></span><a data-dcnode-id="6712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D26" title="Edit section: Critical approaches"><span data-dcnode-id="6713" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6710"><span data-dcnode-id="6711" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6707" instrument_node="">
</span><h3 data-dcnode-id="6697"><span class="mw-headline" data-dcnode-id="6705" id="Technofeminism"><span data-dcnode-id="6706" instrument_node="">Technofeminism</span></span><span class="mw-editsection" data-dcnode-id="6698"><span class="mw-editsection-bracket" data-dcnode-id="6703"><span data-dcnode-id="6704" instrument_node="">[</span></span><a data-dcnode-id="6701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D27" title="Edit section: Technofeminism"><span data-dcnode-id="6702" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6699"><span data-dcnode-id="6700" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6696" instrument_node="">
</span><p data-dcnode-id="6625"><span data-dcnode-id="6695" instrument_node="">Digital rhetoric gives a platform to technofeminism, a concept that brings together the intersections of </span><a data-dcnode-id="6693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender" title="Gender"><span data-dcnode-id="6694" instrument_node="">gender</span></a><span data-dcnode-id="6692" instrument_node="">, </span><a data-dcnode-id="6690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capitalism" title="Capitalism"><span data-dcnode-id="6691" instrument_node="">capitalism</span></a><span data-dcnode-id="6689" instrument_node="">, and </span><a data-dcnode-id="6687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Technology" title="Technology"><span data-dcnode-id="6688" instrument_node="">technology</span></a><span data-dcnode-id="6686" instrument_node="">.</span><sup class="reference" data-dcnode-id="6683" id="cite_ref-:11_76-0"><a data-dcnode-id="6684" href="#cite_note-:11-76"><span data-dcnode-id="6685" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6682" instrument_node="">  Technofeminism advocates for equality for women in technology-heavy fields and researches the relationship between women and their devices. </span><a data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intersectionality" title="Intersectionality"><span data-dcnode-id="6681" instrument_node="">Intersectionality</span></a><span data-dcnode-id="6679" instrument_node=""> is a term coined by </span><a data-dcnode-id="6677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kimberl%25C3%25A9_Crenshaw" title="Kimberlé Crenshaw"><span data-dcnode-id="6678" instrument_node="">Kimberlé Crenshaw</span></a><span data-dcnode-id="6676" instrument_node=""> that recognizes the societal </span><a data-dcnode-id="6674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Injustice" title="Injustice"><span data-dcnode-id="6675" instrument_node="">injustices</span></a><span data-dcnode-id="6673" instrument_node=""> based on our identities.</span><sup class="reference" data-dcnode-id="6670" id="cite_ref-:11_76-1"><a data-dcnode-id="6671" href="#cite_note-:11-76"><span data-dcnode-id="6672" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6669" instrument_node="">  It is often challenging for women to navigate finding and interacting in digital spaces without </span><a data-dcnode-id="6667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harassment" title="Harassment"><span data-dcnode-id="6668" instrument_node="">harassment</span></a><span data-dcnode-id="6666" instrument_node=""> or gender biases.</span><sup class="reference" data-dcnode-id="6663" id="cite_ref-:10_77-0"><a data-dcnode-id="6664" href="#cite_note-:10-77"><span data-dcnode-id="6665" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6662" instrument_node="">  There is an importance of </span><a data-dcnode-id="6660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet_activism" title="Internet activism"><span data-dcnode-id="6661" instrument_node="">digital activism</span></a><span data-dcnode-id="6659" instrument_node=""> for unrepresented communities, such as </span><a data-dcnode-id="6657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender_variance" title="Gender variance"><span data-dcnode-id="6658" instrument_node="">gender non-conforming</span></a><span data-dcnode-id="6656" instrument_node=""> and </span><a data-dcnode-id="6654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transgender" title="Transgender"><span data-dcnode-id="6655" instrument_node="">transgender</span></a><span data-dcnode-id="6653" instrument_node=""> folx of all races, </span><a data-dcnode-id="6651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disability" title="Disability"><span data-dcnode-id="6652" instrument_node="">disabled</span></a><span data-dcnode-id="6650" instrument_node=""> folx, and </span><a data-dcnode-id="6648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Person_of_color" title="Person of color"><span data-dcnode-id="6649" instrument_node="">people of color</span></a><span data-dcnode-id="6647" instrument_node="">.</span><sup class="reference" data-dcnode-id="6644" id="cite_ref-:10_77-1"><a data-dcnode-id="6645" href="#cite_note-:10-77"><span data-dcnode-id="6646" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6643" instrument_node="">  In the journal </span><i data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">Computers and Composition</span></i><span data-dcnode-id="6640" instrument_node=""> only five articles explicitly use the term </span><a data-dcnode-id="6638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intersectionality" title="Intersectionality"><span data-dcnode-id="6639" instrument_node="">intersectionality</span></a><span data-dcnode-id="6637" instrument_node=""> or technofeminism.</span><sup class="reference" data-dcnode-id="6634" id="cite_ref-:11_76-2"><a data-dcnode-id="6635" href="#cite_note-:11-76"><span data-dcnode-id="6636" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6633" instrument_node=""> Technofeminism and </span><a data-dcnode-id="6631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intersectionality" title="Intersectionality"><span data-dcnode-id="6632" instrument_node="">intersectionality</span></a><span data-dcnode-id="6630" instrument_node=""> are still not very prevalent when developing new technologies and research.</span><sup class="reference" data-dcnode-id="6627" id="cite_ref-:11_76-3"><a data-dcnode-id="6628" href="#cite_note-:11-76"><span data-dcnode-id="6629" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6626" instrument_node="">
</span></p><span data-dcnode-id="6624" instrument_node="">
</span><h3 data-dcnode-id="6614"><span class="mw-headline" data-dcnode-id="6622" id="Digital_cultural_rhetoric"><span data-dcnode-id="6623" instrument_node="">Digital cultural rhetoric</span></span><span class="mw-editsection" data-dcnode-id="6615"><span class="mw-editsection-bracket" data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">[</span></span><a data-dcnode-id="6618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D28" title="Edit section: Digital cultural rhetoric"><span data-dcnode-id="6619" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6616"><span data-dcnode-id="6617" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6613" instrument_node="">
</span><p data-dcnode-id="6587"><span data-dcnode-id="6612" instrument_node="">The expansion of the internet has increased, digital media or rhetoric can be used to represent or identify a culture.</span><sup class="reference" data-dcnode-id="6609" id="cite_ref-Eyman2015_2-2"><a data-dcnode-id="6610" href="#cite_note-Eyman2015-2"><span data-dcnode-id="6611" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6608" instrument_node=""> Scholars have studied how digital rhetoric is affected by one's personal factors, such as </span><a data-dcnode-id="6606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Race_and_ethnicity_in_the_United_States" title="Race and ethnicity in the United States"><span data-dcnode-id="6607" instrument_node="">race</span></a><span data-dcnode-id="6605" instrument_node="">, </span><a data-dcnode-id="6603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religion" title="Religion"><span data-dcnode-id="6604" instrument_node="">religion</span></a><span data-dcnode-id="6602" instrument_node=""> and sexuality. Due to these factors, people utilize different tools and absorb information differently. Digital culture has created the need for specialized communities on the web. Computer-mediated communities such as </span><a data-dcnode-id="6600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reddit" title="Reddit"><span data-dcnode-id="6601" instrument_node="">Reddit</span></a><span data-dcnode-id="6599" instrument_node=""> can give a voice to these specialized communities. One can experience and converse with other like-minded people on the web via comment sections and shared online migration.</span><sup class="reference" data-dcnode-id="6596" id="cite_ref-78"><a data-dcnode-id="6597" href="#cite_note-78"><span data-dcnode-id="6598" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6595" instrument_node=""> The creation of digital cultural rhetoric has allowed for the use of online </span><a data-dcnode-id="6593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slang" title="Slang"><span data-dcnode-id="6594" instrument_node="">slang</span></a><span data-dcnode-id="6592" instrument_node=""> that other communities may not be aware of. Online communities that explore digital cultural rhetoric allow users to discover their social identity, and confront stereotypes that they were once confronted with.</span><sup class="reference" data-dcnode-id="6589" id="cite_ref-79"><a data-dcnode-id="6590" href="#cite_note-79"><span data-dcnode-id="6591" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6588" instrument_node="">
</span></p><span data-dcnode-id="6586" instrument_node="">
</span><h3 data-dcnode-id="6576"><span class="mw-headline" data-dcnode-id="6584" id="Embodiment"><span data-dcnode-id="6585" instrument_node="">Embodiment</span></span><span class="mw-editsection" data-dcnode-id="6577"><span class="mw-editsection-bracket" data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">[</span></span><a data-dcnode-id="6580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D29" title="Edit section: Embodiment"><span data-dcnode-id="6581" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6578"><span data-dcnode-id="6579" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6575" instrument_node="">
</span><p data-dcnode-id="6565"><span data-dcnode-id="6574" instrument_node="">One subset of digital cultural rhetoric is embodiment—which is the idea that every person has a unique relationship with technology based on their unique set of identities. Studying the relationship between bodies and technology is one way that digital rhetoricians are able to promote equal access and opportunity within the digital sphere.</span><sup class="reference" data-dcnode-id="6571" id="cite_ref-:31_10-1"><a data-dcnode-id="6572" href="#cite_note-:31-10"><span data-dcnode-id="6573" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6570" instrument_node=""> Since technology is considered to be an extension of the real world, users are also shaped by the experiences they have in digital spaces. The artificial interactions that occur in online environments allow users to exist in a way that is additive to their mere human experience.</span><sup class="reference" data-dcnode-id="6567" id="cite_ref-80"><a data-dcnode-id="6568" href="#cite_note-80"><span data-dcnode-id="6569" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6566" instrument_node="">
</span></p><span data-dcnode-id="6564" instrument_node="">
</span><h3 data-dcnode-id="6554"><span class="mw-headline" data-dcnode-id="6562" id="Pedagogy"><span data-dcnode-id="6563" instrument_node="">Pedagogy</span></span><span class="mw-editsection" data-dcnode-id="6555"><span class="mw-editsection-bracket" data-dcnode-id="6560"><span data-dcnode-id="6561" instrument_node="">[</span></span><a data-dcnode-id="6558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D30" title="Edit section: Pedagogy"><span data-dcnode-id="6559" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6556"><span data-dcnode-id="6557" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6553" instrument_node="">
</span><p data-dcnode-id="6538"><span data-dcnode-id="6552" instrument_node="">With digital rhetoric becoming increasingly present, </span><a data-dcnode-id="6550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedagogy" title="Pedagogy"><span data-dcnode-id="6551" instrument_node="">pedagogical</span></a><span data-dcnode-id="6549" instrument_node=""> approaches have been proposed by scholars to teach digital rhetoric in the classroom. Courses in digital rhetoric study the </span><a data-dcnode-id="6547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intersectionality" title="Intersectionality"><span data-dcnode-id="6548" instrument_node="">intersectionality</span></a><span data-dcnode-id="6546" instrument_node=""> between users and digital material, as well as how different </span><a data-dcnode-id="6544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demography" title="Demography"><span data-dcnode-id="6545" instrument_node="">backgrounds</span></a><span data-dcnode-id="6543" instrument_node=""> such as age, ethnicity, gender and more can affect these interactions.</span><sup class="reference" data-dcnode-id="6540" id="cite_ref-:1_81-0"><a data-dcnode-id="6541" href="#cite_note-:1-81"><span data-dcnode-id="6542" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6539" instrument_node="">
</span></p><span data-dcnode-id="6537" instrument_node="">
</span><h4 data-dcnode-id="6527"><span class="mw-headline" data-dcnode-id="6535" id="Higher_education"><span data-dcnode-id="6536" instrument_node="">Higher education</span></span><span class="mw-editsection" data-dcnode-id="6528"><span class="mw-editsection-bracket" data-dcnode-id="6533"><span data-dcnode-id="6534" instrument_node="">[</span></span><a data-dcnode-id="6531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D31" title="Edit section: Higher education"><span data-dcnode-id="6532" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6529"><span data-dcnode-id="6530" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6526" instrument_node="">
</span><p data-dcnode-id="6476"><span data-dcnode-id="6525" instrument_node="">Several scholars teach digital rhetoric courses at universities in the US, although their approaches vary considerably.</span><sup class="reference" data-dcnode-id="6522" id="cite_ref-Eyman2015_2-3"><a data-dcnode-id="6523" href="#cite_note-Eyman2015-2"><span data-dcnode-id="6524" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6521" instrument_node=""> Jeff Grabill,</span><sup class="reference" data-dcnode-id="6518" id="cite_ref-:21_82-0"><a data-dcnode-id="6519" href="#cite_note-:21-82"><span data-dcnode-id="6520" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6517" instrument_node=""> a scholar with a background in English, education, and technology, encourages his contemporaries to find a bridge between the scholarly field of digital rhetoric and its implementation. Cheryl Ball</span><sup class="reference" data-dcnode-id="6514" id="cite_ref-:25_83-0"><a data-dcnode-id="6515" href="#cite_note-:25-83"><span data-dcnode-id="6516" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6513" instrument_node=""> specializes in areas that consist of </span><a data-dcnode-id="6511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multimodality" title="Multimodality"><span data-dcnode-id="6512" instrument_node="">multimodal</span></a><span data-dcnode-id="6510" instrument_node=""> </span><a data-dcnode-id="6508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Composition_studies" title="Composition studies"><span data-dcnode-id="6509" instrument_node="">composition</span></a><span data-dcnode-id="6507" instrument_node=""> and </span><a data-dcnode-id="6505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Editing" title="Editing"><span data-dcnode-id="6506" instrument_node="">editing</span></a><span data-dcnode-id="6504" instrument_node=""> practices, digital media scholarship, </span><a data-dcnode-id="6502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_publishing" title="Electronic publishing"><span data-dcnode-id="6503" instrument_node="">digital publishing</span></a><span data-dcnode-id="6501" instrument_node="">, and university writing </span><a data-dcnode-id="6499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedagogy" title="Pedagogy"><span data-dcnode-id="6500" instrument_node="">pedagogy</span></a><span data-dcnode-id="6498" instrument_node="">. Ball teaches students to write and compose multimodal texts by analyzing rhetorical options and choosing the most appropriate genres, </span><a data-dcnode-id="6496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Technology" title="Technology"><span data-dcnode-id="6497" instrument_node="">technologies</span></a><span data-dcnode-id="6495" instrument_node="">, media, and modes for a particular situation. Multimodality also influenced Elizabeth Losh et al.'s work </span><i data-dcnode-id="6493"><span data-dcnode-id="6494" instrument_node="">Understanding Rhetoric: A Graphic Guide to Writing</span></i><span data-dcnode-id="6492" instrument_node="">, which emphasizes engaging the </span><a data-dcnode-id="6490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comics" title="Comics"><span data-dcnode-id="6491" instrument_node="">comic</span></a><span data-dcnode-id="6489" instrument_node=""> form of literacy.</span><sup class="reference" data-dcnode-id="6486" id="cite_ref-:28_84-0"><a data-dcnode-id="6487" href="#cite_note-:28-84"><span data-dcnode-id="6488" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6485" instrument_node=""> A similar approach also inspired Melanie Gagich to alter the curriculum of her first-year English course completely, aiming to redefine digital projects as rigorous academic assignments and teach her students necessary audience analysis skills.</span><sup class="reference" data-dcnode-id="6482" id="cite_ref-:39_85-0"><a data-dcnode-id="6483" href="#cite_note-:39-85"><span data-dcnode-id="6484" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6481" instrument_node=""> Such a design ultimately allowed students in Gagich's classroom to develop their creativity and confidence as writers.</span><sup class="reference" data-dcnode-id="6478" id="cite_ref-:39_85-1"><a data-dcnode-id="6479" href="#cite_note-:39-85"><span data-dcnode-id="6480" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6477" instrument_node="">
</span></p><p data-dcnode-id="6460"><span data-dcnode-id="6475" instrument_node="">In another approach, Douglas Eyman recommends a course in web authoring and </span><a data-dcnode-id="6473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Web_design" title="Web design"><span data-dcnode-id="6474" instrument_node="">design</span></a><span data-dcnode-id="6472" instrument_node=""> that provides undergraduates more practical instruction in the production and rhetorical understanding of digital texts. Moreover, he explains that web authoring and design for digital rhetoric instruction provides opportunities for students to learn fundamentals of web writing and design conventions, rules and procedures.</span><sup class="reference" data-dcnode-id="6469" id="cite_ref-:27_86-0"><a data-dcnode-id="6470" href="#cite_note-:27-86"><span data-dcnode-id="6471" instrument_node="">[86]</span></a></sup><span data-dcnode-id="6468" instrument_node=""> Similarly, Collin Bjork argues that "integrating digital rhetoric with </span><a data-dcnode-id="6466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Usability_testing" title="Usability testing"><span data-dcnode-id="6467" instrument_node="">usability testing</span></a><span data-dcnode-id="6465" instrument_node=""> can help researchers cultivate a more complex understanding of how students, instructors, and interfaces interact in OWI."</span><sup class="reference" data-dcnode-id="6462" id="cite_ref-:29_87-0"><a data-dcnode-id="6463" href="#cite_note-:29-87"><span data-dcnode-id="6464" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6461" instrument_node="">
</span></p><p data-dcnode-id="6432"><span data-dcnode-id="6459" instrument_node="">Other scholars focus more on the relationship between digital rhetoric and social impact. Scholars Lori Beth De Hertogh et al. and Angela Haas have published materials discussing intersectionality and digital rhetoric, arguing that the two are inseparable and classes covering digital rhetoric must also explore intersectionality.</span><sup class="reference" data-dcnode-id="6456" id="cite_ref-:31_10-2"><a data-dcnode-id="6457" href="#cite_note-:31-10"><span data-dcnode-id="6458" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="6453" id="cite_ref-:11_76-4"><a data-dcnode-id="6454" href="#cite_note-:11-76"><span data-dcnode-id="6455" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6452" instrument_node=""> Lauren Malone has also analyzed the relationship between identity and teaching digital rhetoric through research on QTPoC (Queer and Trans People of Color)'s online engagement.</span><sup class="reference" data-dcnode-id="6449" id="cite_ref-:40_88-0"><a data-dcnode-id="6450" href="#cite_note-:40-88"><span data-dcnode-id="6451" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6448" instrument_node=""> From this research, Malone created a series of steps for digital rhetoric instructors to take in order to foster inclusivity within their classroom</span><sup class="reference" data-dcnode-id="6445" id="cite_ref-:40_88-1"><a data-dcnode-id="6446" href="#cite_note-:40-88"><span data-dcnode-id="6447" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6444" instrument_node=""> Finally, scholar Melanie Kill actively introduces digital rhetoric to college-aged students, arguing for the importance of editing </span><a data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia" title="Wikipedia"><span data-dcnode-id="6443" instrument_node="">Wikipedia</span></a><span data-dcnode-id="6441" instrument_node=""> and capitalizing on their privilege of education and access to materials.</span><sup class="reference" data-dcnode-id="6438" id="cite_ref-:30_89-0"><a data-dcnode-id="6439" href="#cite_note-:30-89"><span data-dcnode-id="6440" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6437" instrument_node=""> Similar to De Hertogh et al. and Haas, Kill believes an education in digital rhetoric serves all students, as it facilitates positive social change.</span><sup class="reference" data-dcnode-id="6434" id="cite_ref-:30_89-1"><a data-dcnode-id="6435" href="#cite_note-:30-89"><span data-dcnode-id="6436" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6433" instrument_node="">
</span></p><span data-dcnode-id="6431" instrument_node="">
</span><h4 data-dcnode-id="6421"><span class="mw-headline" data-dcnode-id="6429" id="K-12"><span data-dcnode-id="6430" instrument_node="">K-12</span></span><span class="mw-editsection" data-dcnode-id="6422"><span class="mw-editsection-bracket" data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">[</span></span><a data-dcnode-id="6425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D32" title="Edit section: K-12"><span data-dcnode-id="6426" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6423"><span data-dcnode-id="6424" instrument_node="">]</span></span></span></h4><p data-dcnode-id="6412"><span data-dcnode-id="6420" instrument_node="">
Many educational systems are framed so that students actively participate in technological systems as designers of digital rhetoric, not passive users.</span><sup class="reference" data-dcnode-id="6417" id="cite_ref-:41_1-1"><a data-dcnode-id="6418" href="#cite_note-:41-1"><span data-dcnode-id="6419" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6416" instrument_node=""> There are three core goals students have identified for their coursework: building their own digital space, learning all aspects of digital rhetoric (including the theory, technology, and uses), and applying it in their own lives. The ecological system generated by the interactions of students with classmates, digital media, and other individuals is the basis of "interconnected" rhetorical processes and shared digital work.</span><sup class="reference" data-dcnode-id="6413" id="cite_ref-:41_1-2"><a data-dcnode-id="6414" href="#cite_note-:41-1"><span data-dcnode-id="6415" instrument_node="">[1]</span></a></sup></p><div class="thumb tright" data-dcnode-id="6403"><div class="thumbinner" data-dcnode-id="6404" style="width:335px;"><a class="image" data-dcnode-id="6410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVideoGame.jpg"><img alt="" class="thumbimage" data-dcnode-id="6411" data-file-height="1504" data-file-width="2185" decoding="async" height="229" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/87/VideoGame.jpg/333px-VideoGame.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/87/VideoGame.jpg/500px-VideoGame.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/87/VideoGame.jpg/666px-VideoGame.jpg 2x" width="333"></a><span data-dcnode-id="6409" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6405"><div class="magnify" data-dcnode-id="6407"><a class="internal" data-dcnode-id="6408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVideoGame.jpg" title="Enlarge"></a></div><span data-dcnode-id="6406" instrument_node="">Code for a computer video game</span></div></div></div><span data-dcnode-id="6402" instrument_node="">
</span><p data-dcnode-id="6383"><span data-dcnode-id="6401" instrument_node="">Video games are one avenue students learn to design the rhetoric and code underlying their technological systems. Video game use has evolved rapidly since the 1980s, and current video games have been incorporated into education.</span><sup class="reference" data-dcnode-id="6398" id="cite_ref-:36_90-0"><a data-dcnode-id="6399" href="#cite_note-:36-90"><span data-dcnode-id="6400" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6397" instrument_node=""> Scholar </span><a data-dcnode-id="6395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ian_Bogost" title="Ian Bogost"><span data-dcnode-id="6396" instrument_node="">Ian Bogost</span></a><span data-dcnode-id="6394" instrument_node=""> suggests that </span><a data-dcnode-id="6392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game" title="Video game"><span data-dcnode-id="6393" instrument_node="">video games</span></a><span data-dcnode-id="6391" instrument_node=""> can be utilized in a multitude of subjects to be studied as models of our non-digital world. Specifically, they note that video games could be used as an "entry point" for students that may not have been interested in </span><a data-dcnode-id="6389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_science" title="Computer science"><span data-dcnode-id="6390" instrument_node="">computer science</span></a><span data-dcnode-id="6388" instrument_node=""> to enter that field. Games and game technology enhance learning by operating at the "outer and growing edge of a player’s competence".</span><sup class="reference" data-dcnode-id="6385" id="cite_ref-91"><a data-dcnode-id="6386" href="#cite_note-91"><span data-dcnode-id="6387" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6384" instrument_node=""> Games challenge students at levels that cause frustration but preserve motivation to solve the challenge at this edge.
</span></p><p data-dcnode-id="6364"><a data-dcnode-id="6381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ian_Bogost" title="Ian Bogost"><span data-dcnode-id="6382" instrument_node="">Ian Bogost</span></a><span data-dcnode-id="6380" instrument_node=""> also notes that video games can be taught as rhetorical and expressive in nature, allowing children to model their experiences through programming. When dissected, the ethics and rhetoric in video games' computational systems is exposed.</span><sup class="reference" data-dcnode-id="6377" id="cite_ref-92"><a data-dcnode-id="6378" href="#cite_note-92"><span data-dcnode-id="6379" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6376" instrument_node=""> Analysis of video games as an interactive&nbsp;medium reveals the underlying rhetoric through the performative activity of the player.</span><sup class="reference" data-dcnode-id="6373" id="cite_ref-:36_90-1"><a data-dcnode-id="6374" href="#cite_note-:36-90"><span data-dcnode-id="6375" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6372" instrument_node=""> Recognition of procedural rhetoric through course studies reflects how these mediums can augment politics, advertisement, and information.</span><sup class="reference" data-dcnode-id="6369" id="cite_ref-:36_90-2"><a data-dcnode-id="6370" href="#cite_note-:36-90"><span data-dcnode-id="6371" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6368" instrument_node=""> To help address the rhetoric in video game code, scholar Collin Bjork makes a series of recommendations for integrating digital rhetoric with </span><a data-dcnode-id="6366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Usability_testing" title="Usability testing"><span data-dcnode-id="6367" instrument_node="">usability testing</span></a><span data-dcnode-id="6365" instrument_node=""> in online writing instruction.
</span></p><p data-dcnode-id="6350"><span data-dcnode-id="6363" instrument_node="">Some scholars have also identified specific practices for digital rhetoric instruction in pre-collegiate classrooms. As Douglas Eyman points out, students require agency when learning digital rhetoric, meaning instructors designing lessons must allow students to interact with the technology directly and enact change on the design.</span><sup class="reference" data-dcnode-id="6360" id="cite_ref-:41_1-3"><a data-dcnode-id="6361" href="#cite_note-:41-1"><span data-dcnode-id="6362" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6359" instrument_node=""> This is consistent with discoveries by other professors, who claim one of the primary goals of students in a digital rhetoric classroom is to create space for themselves, connections with peers, and deeply understand its significance.</span><sup class="reference" data-dcnode-id="6356" id="cite_ref-:1_81-1"><a data-dcnode-id="6357" href="#cite_note-:1-81"><span data-dcnode-id="6358" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6355" instrument_node=""> These interpersonal connections reflect a "thick correlation between digitalization and empowering pedagogy".</span><sup class="reference" data-dcnode-id="6352" id="cite_ref-93"><a data-dcnode-id="6353" href="#cite_note-93"><span data-dcnode-id="6354" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6351" instrument_node="">
</span></p><p data-dcnode-id="6346"><b data-dcnode-id="6348"><span data-dcnode-id="6349" instrument_node="">Pre-K</span></b><span data-dcnode-id="6347" instrument_node="">
</span></p><p data-dcnode-id="6340"><span data-dcnode-id="6345" instrument_node="">The United States Government's Office of Educational Technology has emphasized four guiding principles when using technology with early learners.</span><sup class="reference" data-dcnode-id="6342" id="cite_ref-:7_94-0"><a data-dcnode-id="6343" href="#cite_note-:7-94"><span data-dcnode-id="6344" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6341" instrument_node="">
</span></p><span data-dcnode-id="6339" instrument_node="">
</span><ol data-dcnode-id="6327"><li data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">When used appropriately technology can be a tool for learning</span></li><span data-dcnode-id="6336" instrument_node="">
</span><li data-dcnode-id="6334"><span data-dcnode-id="6335" instrument_node="">The use of technology should allow for increased access to learning opportunities for all children</span></li><span data-dcnode-id="6333" instrument_node="">
</span><li data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">Technology can be used strengthen relationships between children and their families, early educators and friends</span></li><span data-dcnode-id="6330" instrument_node="">
</span><li data-dcnode-id="6328"><span data-dcnode-id="6329" instrument_node="">Technology is most effective when early learners are interacting with adults and peers. Adults can also supervise children online for said effectiveness.</span></li></ol><span data-dcnode-id="6326" instrument_node="">
</span><p data-dcnode-id="6320"><span data-dcnode-id="6325" instrument_node="">Despite these four pillars most studies conclude that learning technology for children under the age of two is not beneficial. If you must have your young child use technology it is best that the technology is used to promote relationship development, for instance video chat software to connect with loved ones at a distance.</span><sup class="reference" data-dcnode-id="6322" id="cite_ref-:7_94-1"><a data-dcnode-id="6323" href="#cite_note-:7-94"><span data-dcnode-id="6324" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6321" instrument_node="">
</span></p><span data-dcnode-id="6319" instrument_node="">
</span><h3 data-dcnode-id="6309"><span class="mw-headline" data-dcnode-id="6317" id="Digital_rhetoric_as_a_field_of_study"><span data-dcnode-id="6318" instrument_node="">Digital rhetoric as a field of study</span></span><span class="mw-editsection" data-dcnode-id="6310"><span class="mw-editsection-bracket" data-dcnode-id="6315"><span data-dcnode-id="6316" instrument_node="">[</span></span><a data-dcnode-id="6313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D33" title="Edit section: Digital rhetoric as a field of study"><span data-dcnode-id="6314" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6311"><span data-dcnode-id="6312" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6308" instrument_node="">
</span><p data-dcnode-id="6290"><span data-dcnode-id="6307" instrument_node="">In 2009, rhetorician </span><a data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Losh" title="Elizabeth Losh"><span data-dcnode-id="6306" instrument_node="">Elizabeth Losh</span></a><sup class="reference" data-dcnode-id="6302" id="cite_ref-:5_95-0"><a data-dcnode-id="6303" href="#cite_note-:5-95"><span data-dcnode-id="6304" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6301" instrument_node=""> offered this four-part </span><a data-dcnode-id="6299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Definition" title="Definition"><span data-dcnode-id="6300" instrument_node="">definition</span></a><span data-dcnode-id="6298" instrument_node=""> of digital rhetoric in her book, </span><i data-dcnode-id="6296"><span data-dcnode-id="6297" instrument_node="">Virtualpolitik</span></i><span data-dcnode-id="6295" instrument_node="">:</span><sup class="reference" data-dcnode-id="6292" id="cite_ref-96"><a data-dcnode-id="6293" href="#cite_note-96"><span data-dcnode-id="6294" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6291" instrument_node="">
</span></p><span data-dcnode-id="6289" instrument_node="">
</span><ol data-dcnode-id="6242"><li data-dcnode-id="6284"><span data-dcnode-id="6288" instrument_node="">The conventions of new digital </span><a data-dcnode-id="6286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genre" title="Genre"><span data-dcnode-id="6287" instrument_node="">genres</span></a><span data-dcnode-id="6285" instrument_node=""> that are used for everyday discourse, as well as for special occasions, in average people's lives.</span></li><span data-dcnode-id="6283" instrument_node="">
</span><li data-dcnode-id="6261"><a data-dcnode-id="6281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_rhetoric" title="Public rhetoric"><span data-dcnode-id="6282" instrument_node="">Public rhetoric</span></a><span data-dcnode-id="6280" instrument_node="">, often in the form of </span><a data-dcnode-id="6278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politics" title="Politics"><span data-dcnode-id="6279" instrument_node="">political</span></a><span data-dcnode-id="6277" instrument_node=""> messages from </span><a data-dcnode-id="6275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institution" title="Institution"><span data-dcnode-id="6276" instrument_node="">government institutions</span></a><span data-dcnode-id="6274" instrument_node="">, that is represented or recorded through </span><a data-dcnode-id="6272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_electronics" title="Digital electronics"><span data-dcnode-id="6273" instrument_node="">digital technology</span></a><span data-dcnode-id="6271" instrument_node=""> and </span><a data-dcnode-id="6269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissemination" title="Dissemination"><span data-dcnode-id="6270" instrument_node="">disseminated</span></a><span data-dcnode-id="6268" instrument_node=""> via </span><a data-dcnode-id="6266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronics" title="Electronics"><span data-dcnode-id="6267" instrument_node="">electronically</span></a><span data-dcnode-id="6265" instrument_node=""> distributed </span><a data-dcnode-id="6263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_network" title="Computer network"><span data-dcnode-id="6264" instrument_node="">networks</span></a><span data-dcnode-id="6262" instrument_node="">.</span></li><span data-dcnode-id="6260" instrument_node="">
</span><li data-dcnode-id="6255"><span data-dcnode-id="6259" instrument_node="">The emerging scholarly </span><a class="mw-redirect" data-dcnode-id="6257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Discipline_%28academia%29" title="Discipline (academia)"><span data-dcnode-id="6258" instrument_node="">discipline</span></a><span data-dcnode-id="6256" instrument_node=""> concerned with the rhetorical interpretation of computer-generated media as objects of study.</span></li><span data-dcnode-id="6254" instrument_node="">
