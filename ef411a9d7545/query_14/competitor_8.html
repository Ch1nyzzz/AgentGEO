</span><li data-dcnode-id="6243"><span data-dcnode-id="6253" instrument_node="">Mathematical theories of communication from the field of </span><a data-dcnode-id="6251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_science" title="Information science"><span data-dcnode-id="6252" instrument_node="">information science</span></a><span data-dcnode-id="6250" instrument_node="">, many of which attempt to quantify the amount of uncertainty in a given </span><a data-dcnode-id="6248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linguistics" title="Linguistics"><span data-dcnode-id="6249" instrument_node="">linguistic</span></a><span data-dcnode-id="6247" instrument_node=""> exchange or the likely paths through which messages travel.</span><sup class="reference" data-dcnode-id="6244" id="cite_ref-97"><a data-dcnode-id="6245" href="#cite_note-97"><span data-dcnode-id="6246" instrument_node="">[97]</span></a></sup></li></ol><span data-dcnode-id="6241" instrument_node="">
</span><p data-dcnode-id="6235"><span data-dcnode-id="6240" instrument_node="">Losh's definition demonstrates that digital rhetoric is a field that relies on different methods to study various types of information, such as code, text, visuals, videos, and so on.</span><sup class="reference" data-dcnode-id="6237" id="cite_ref-:5_95-1"><a data-dcnode-id="6238" href="#cite_note-:5-95"><span data-dcnode-id="6239" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6236" instrument_node="">
</span></p><p data-dcnode-id="6205"><span data-dcnode-id="6234" instrument_node="">Douglas Eyman suggests that classical theories can be mapped onto digital media but a larger academic focus should be placed on the "extension of rhetorical theory".</span><sup class="reference" data-dcnode-id="6231" id="cite_ref-:6_98-0"><a data-dcnode-id="6232" href="#cite_note-:6-98"><span data-dcnode-id="6233" instrument_node="">[98]</span></a></sup><span data-dcnode-id="6230" instrument_node=""> Careers in developing and analyzing the rhetoric in code a prominent field of study. A journal established in 1985, Computers and Composition, focuses on computers communication and has considered the use of "rhetoric as their conceptual framework" and the digital rhetoric in software development.</span><sup class="reference" data-dcnode-id="6227" id="cite_ref-:6_98-1"><a data-dcnode-id="6228" href="#cite_note-:6-98"><span data-dcnode-id="6229" instrument_node="">[98]</span></a></sup><span data-dcnode-id="6226" instrument_node=""> Moreover,  digital rhetoric is a tool by which different cultures can continue to facilitate their longstanding cultural traditions. In his book, </span><i data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">Digital Griots: African American Rhetoric in a Multimedia Age</span></i><span data-dcnode-id="6223" instrument_node="">,  </span><a class="new" data-dcnode-id="6221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdam_J._Banks%26action%3Dedit%26redlink%3D1" title="Adam J. Banks (page does not exist)"><span data-dcnode-id="6222" instrument_node="">Adam J. Banks</span></a><span data-dcnode-id="6220" instrument_node=""> states that modern day storytellers, like stand-up comics and spoken word poets, give African American rhetoric a flexible approach that is still true to tradition.</span><sup class="reference" data-dcnode-id="6217" id="cite_ref-99"><a data-dcnode-id="6218" href="#cite_note-99"><span data-dcnode-id="6219" instrument_node="">[99]</span></a></sup><span data-dcnode-id="6216" instrument_node=""> While digital rhetoric can be used to facilitate traditions, select cultures face several practical application issues. </span><a data-dcnode-id="6214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radhika_Gajjala" title="Radhika Gajjala"><span data-dcnode-id="6215" instrument_node="">Radhika Gajjala</span></a><span data-dcnode-id="6213" instrument_node="">, professor at the </span><a data-dcnode-id="6211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Pittsburgh" title="University of Pittsburgh"><span data-dcnode-id="6212" instrument_node="">University of Pittsburgh</span></a><span data-dcnode-id="6210" instrument_node="">, writes that South Asian cyber feminists face issues with regards to building their web presence.</span><sup class="reference" data-dcnode-id="6207" id="cite_ref-100"><a data-dcnode-id="6208" href="#cite_note-100"><span data-dcnode-id="6209" instrument_node="">[100]</span></a></sup><span data-dcnode-id="6206" instrument_node=""> Studies on how digital rhetoric implicates various topics are ongoing and encompass many fields.
</span></p><span data-dcnode-id="6204" instrument_node="">
</span><h2 data-dcnode-id="6194"><span class="mw-headline" data-dcnode-id="6202" id="Social_issues"><span data-dcnode-id="6203" instrument_node="">Social issues</span></span><span class="mw-editsection" data-dcnode-id="6195"><span class="mw-editsection-bracket" data-dcnode-id="6200"><span data-dcnode-id="6201" instrument_node="">[</span></span><a data-dcnode-id="6198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D34" title="Edit section: Social issues"><span data-dcnode-id="6199" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6196"><span data-dcnode-id="6197" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6193" instrument_node="">
</span><h3 data-dcnode-id="6183"><span class="mw-headline" data-dcnode-id="6191" id="Access"><span data-dcnode-id="6192" instrument_node="">Access</span></span><span class="mw-editsection" data-dcnode-id="6184"><span class="mw-editsection-bracket" data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">[</span></span><a data-dcnode-id="6187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D35" title="Edit section: Access"><span data-dcnode-id="6188" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6185"><span data-dcnode-id="6186" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6182" instrument_node="">
</span><p data-dcnode-id="6128"><span data-dcnode-id="6181" instrument_node="">Referred to as the </span><a data-dcnode-id="6179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_divide" title="Digital divide"><span data-dcnode-id="6180" instrument_node="">digital divide</span></a><span data-dcnode-id="6178" instrument_node="">, issues of </span><a data-dcnode-id="6176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_inequality" title="Economic inequality"><span data-dcnode-id="6177" instrument_node="">economic</span></a><span data-dcnode-id="6175" instrument_node=""> access and user-level access are recurring issues in digital rhetoric.</span><sup class="reference" data-dcnode-id="6172" id="cite_ref-101"><a data-dcnode-id="6173" href="#cite_note-101"><span data-dcnode-id="6174" instrument_node="">[101]</span></a></sup><span data-dcnode-id="6171" instrument_node=""> These issues show up most prevalently in </span><a data-dcnode-id="6169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computers_and_writing" title="Computers and writing"><span data-dcnode-id="6170" instrument_node="">computers and writing</span></a><span data-dcnode-id="6168" instrument_node=""> circles though the digital divide impacts a multitude of online forums, user bases, and communities. A lack of access can refer to inequality in obtaining information, means of communication, and opportunities. For many that teach digital rhetoric in schools and universities, student access to technologies at home and in school is an operative concern.</span><sup class="reference" data-dcnode-id="6165" id="cite_ref-102"><a data-dcnode-id="6166" href="#cite_note-102"><span data-dcnode-id="6167" instrument_node="">[102]</span></a></sup><span data-dcnode-id="6164" instrument_node=""> There is some debate about whether </span><a data-dcnode-id="6162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobile_device" title="Mobile device"><span data-dcnode-id="6163" instrument_node="">mobile computing devices</span></a><span data-dcnode-id="6161" instrument_node=""> like smartphones make technology access more equitable.</span><sup class="reference" data-dcnode-id="6158" id="cite_ref-103"><a data-dcnode-id="6159" href="#cite_note-103"><span data-dcnode-id="6160" instrument_node="">[103]</span></a></sup><span data-dcnode-id="6157" instrument_node=""> In addition, the socioeconomic divide that is created due to accessibility is a major factor of digital rhetoric. For instance, </span><a class="external text" data-dcnode-id="6155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nih.gov/" rel="nofollow"><span data-dcnode-id="6156" instrument_node="">NIH</span></a><span data-dcnode-id="6154" instrument_node=""> researcher and a professor of education at Stanford University, </span><a data-dcnode-id="6152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linda_Darling-Hammond" title="Linda Darling-Hammond"><span data-dcnode-id="6153" instrument_node="">Linda Darling-Hammond</span></a><span data-dcnode-id="6151" instrument_node=""> discusses the lack of educational resources that children of color in America face.</span><sup class="reference" data-dcnode-id="6148" id="cite_ref-:3_104-0"><a data-dcnode-id="6149" href="#cite_note-:3-104"><span data-dcnode-id="6150" instrument_node="">[104]</span></a></sup><span data-dcnode-id="6147" instrument_node=""> Further, </span><a class="new" data-dcnode-id="6145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAngela_M._Haas%26action%3Dedit%26redlink%3D1" title="Angela M. Haas (page does not exist)"><span data-dcnode-id="6146" instrument_node="">Angela M. Haas</span></a><span data-dcnode-id="6144" instrument_node="">, author of </span><i data-dcnode-id="6142"><span data-dcnode-id="6143" instrument_node="">"Wampum as Hypertext: An American Indian Intellectual Tradition of Multimedia Theory and Practice"</span></i><span data-dcnode-id="6141" instrument_node="">, describes access in a more theoretical way. Her text explains that through access one can connect a physical body with the digital space.</span><sup class="reference" data-dcnode-id="6138" id="cite_ref-Wampum_as_Hypertext:_An_American_In_105-0"><a data-dcnode-id="6139" href="#cite_note-Wampum_as_Hypertext:_An_American_In-105"><span data-dcnode-id="6140" instrument_node="">[105]</span></a></sup><span data-dcnode-id="6137" instrument_node=""> Technology diffusion can also a contributing factor, which refers to how the market for new technology changes over time and how that influences technology use and production across society.</span><sup class="reference" data-dcnode-id="6134" id="cite_ref-106"><a data-dcnode-id="6135" href="#cite_note-106"><span data-dcnode-id="6136" instrument_node="">[106]</span></a></sup><span data-dcnode-id="6133" instrument_node="">&nbsp; Studies conducted by scholar Sunil Wattal conclude that technology diffusion mimics social class status.&nbsp;As such, technology diffusion varies from community to community, making it a much greater challenge to ensure access equity across classes. These examples preface the topic that access encompasses every aspect of ones life and must be perceived as such. If accessibility is not resolved at a foundational level then social discrimination will be further perpetuated.</span><sup class="reference" data-dcnode-id="6130" id="cite_ref-:3_104-1"><a data-dcnode-id="6131" href="#cite_note-:3-104"><span data-dcnode-id="6132" instrument_node="">[104]</span></a></sup><span data-dcnode-id="6129" instrument_node="">
</span></p><span data-dcnode-id="6127" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6118"><div class="thumbinner" data-dcnode-id="6119" style="width:222px;"><a class="image" data-dcnode-id="6125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APaywall_Example.svg"><img alt="" class="thumbimage" data-dcnode-id="6126" data-file-height="370" data-file-width="512" decoding="async" height="159" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Paywall_Example.svg/220px-Paywall_Example.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Paywall_Example.svg/330px-Paywall_Example.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Paywall_Example.svg/440px-Paywall_Example.svg.png 2x" width="220"></a><span data-dcnode-id="6124" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6120"><div class="magnify" data-dcnode-id="6122"><a class="internal" data-dcnode-id="6123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APaywall_Example.svg" title="Enlarge"></a></div><span data-dcnode-id="6121" instrument_node="">An example of a paywall from a news site.</span></div></div></div><span data-dcnode-id="6117" instrument_node="">
</span><p data-dcnode-id="6094"><span data-dcnode-id="6116" instrument_node="">Another issue of access comes in the form of </span><a data-dcnode-id="6114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paywall" title="Paywall"><span data-dcnode-id="6115" instrument_node="">paywalls</span></a><span data-dcnode-id="6113" instrument_node="">, which can be a major hindrance for education and reduce accessibility to many educational tools and materials. This practice can increase barriers to scholarship and limit information that is </span><a data-dcnode-id="6111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_access" title="Open access"><span data-dcnode-id="6112" instrument_node="">open access</span></a><span data-dcnode-id="6110" instrument_node="">.</span><sup class="reference" data-dcnode-id="6107" id="cite_ref-:2_107-0"><a data-dcnode-id="6108" href="#cite_note-:2-107"><span data-dcnode-id="6109" instrument_node="">[107]</span></a></sup><span data-dcnode-id="6106" instrument_node=""> This industry has gotten flack for its long history of monopolizing the publishing market and forcing universities to pay over $11 million annually for access to certain works.</span><sup class="reference" data-dcnode-id="6103" id="cite_ref-:2_107-1"><a data-dcnode-id="6104" href="#cite_note-:2-107"><span data-dcnode-id="6105" instrument_node="">[107]</span></a></sup><span data-dcnode-id="6102" instrument_node=""> </span><a data-dcnode-id="6100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_access" title="Open access"><span data-dcnode-id="6101" instrument_node="">Open access</span></a><span data-dcnode-id="6099" instrument_node=""> has removed the barriers of fees associated with accessing a work and the restrictions of copyright and licensing. The matter of eliminating fees is most prevalent to digital rhetoric because it allows for more equal access to works. Open access and digital rhetoric do not eliminate copyright, but they eliminate restrictions by giving authors the choice to maintain their right to copy and distribute their materials however they choose, or they may turn the rights over to a specific journal. Digital rhetoric involves works that are found online and open access is allowing more people to be able to reach these works.</span><sup class="reference" data-dcnode-id="6096" id="cite_ref-108"><a data-dcnode-id="6097" href="#cite_note-108"><span data-dcnode-id="6098" instrument_node="">[108]</span></a></sup><span data-dcnode-id="6095" instrument_node="">
</span></p><span data-dcnode-id="6093" instrument_node="">
</span><h3 data-dcnode-id="6083"><span class="mw-headline" data-dcnode-id="6091" id="Politics"><span data-dcnode-id="6092" instrument_node="">Politics</span></span><span class="mw-editsection" data-dcnode-id="6084"><span class="mw-editsection-bracket" data-dcnode-id="6089"><span data-dcnode-id="6090" instrument_node="">[</span></span><a data-dcnode-id="6087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D36" title="Edit section: Politics"><span data-dcnode-id="6088" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6085"><span data-dcnode-id="6086" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6082" instrument_node="">
</span><p data-dcnode-id="6063"><span data-dcnode-id="6081" instrument_node="">The increase in </span><a data-dcnode-id="6079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digitization" title="Digitization"><span data-dcnode-id="6080" instrument_node="">digitalization</span></a><span data-dcnode-id="6078" instrument_node=""> of media has amplified the importance influence of digital rhetoric in politics, as this digitalization has introduced a new, more direct relationship between politicians and the citizenry. Digital communication platforms and </span><a class="mw-redirect" data-dcnode-id="6076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_social_networking_websites" title="List of social networking websites"><span data-dcnode-id="6077" instrument_node="">social networking sites</span></a><span data-dcnode-id="6075" instrument_node=""> allow citizens to share information and engage in debate with other people of similar or distinct political </span><a data-dcnode-id="6073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ideology" title="Ideology"><span data-dcnode-id="6074" instrument_node="">ideologies</span></a><span data-dcnode-id="6072" instrument_node="">, which have been shown to influence and predict the political behavior of individuals outside the digital world.</span><sup class="reference" data-dcnode-id="6069" id="cite_ref-109"><a data-dcnode-id="6070" href="#cite_note-109"><span data-dcnode-id="6071" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6068" instrument_node=""> Politicians have been known to use digital rhetoric as a persuasive tool to communicate information to citizens. Reciprocally, digital rhetoric has enabled increasing political participation amongst citizens. Theoretical research on digital rhetoric in politics has attributed the increase of political participation to three models: the motivation model, the learning model, and the attitude model.</span><sup class="reference" data-dcnode-id="6065" id="cite_ref-:16_110-0"><a data-dcnode-id="6066" href="#cite_note-:16-110"><span data-dcnode-id="6067" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6064" instrument_node="">
</span></p><span data-dcnode-id="6062" instrument_node="">
</span><ul data-dcnode-id="6044"><li data-dcnode-id="6057"><span data-dcnode-id="6061" instrument_node="">The motivation model proposes that digital rhetoric has decreased the opportunity costs of participating in politics since it makes information readily available to the people.</span><sup class="reference" data-dcnode-id="6058" id="cite_ref-:16_110-1"><a data-dcnode-id="6059" href="#cite_note-:16-110"><span data-dcnode-id="6060" instrument_node="">[110]</span></a></sup></li><span data-dcnode-id="6056" instrument_node="">
</span><li data-dcnode-id="6051"><span data-dcnode-id="6055" instrument_node="">The learning model established the increase in political participation to the vast amount of political information available on the internet which increases the inclusion of the citizens in the political process.</span><sup class="reference" data-dcnode-id="6052" id="cite_ref-:16_110-2"><a data-dcnode-id="6053" href="#cite_note-:16-110"><span data-dcnode-id="6054" instrument_node="">[110]</span></a></sup></li><span data-dcnode-id="6050" instrument_node="">
</span><li data-dcnode-id="6045"><span data-dcnode-id="6049" instrument_node="">The attitude model extended from the previous two by suggesting that digital rhetoric has changed the perception of citizens towards politics, particularly by providing interactive tools that allow people to engage in the political process.</span><sup class="reference" data-dcnode-id="6046" id="cite_ref-:16_110-3"><a data-dcnode-id="6047" href="#cite_note-:16-110"><span data-dcnode-id="6048" instrument_node="">[110]</span></a></sup></li></ul><span data-dcnode-id="6043" instrument_node="">
</span><h3 data-dcnode-id="6033"><span class="mw-headline" data-dcnode-id="6041" id="Online_harassment"><span data-dcnode-id="6042" instrument_node="">Online harassment</span></span><span class="mw-editsection" data-dcnode-id="6034"><span class="mw-editsection-bracket" data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">[</span></span><a data-dcnode-id="6037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D37" title="Edit section: Online harassment"><span data-dcnode-id="6038" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6035"><span data-dcnode-id="6036" instrument_node="">]</span></span></span></h3><p data-dcnode-id="6020"><span data-dcnode-id="6032" instrument_node="">
Online harassment has steadily been on the rise since the rise of social media. As the number of platforms meant for communicating have increased, so has the a digital rhetoric that includes an abundance of bullying.</span><sup class="reference" data-dcnode-id="6029" id="cite_ref-111"><a data-dcnode-id="6030" href="#cite_note-111"><span data-dcnode-id="6031" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6028" instrument_node=""> Analysis linked cyberbullying-specific behaviors, including perpetration and victimization, to a number of detrimental psychosocial outcomes. The trend of people posting about the characters and their lifestyles reinforces the iconography of stereotypes (such as "hillbillies"), which is successful because of the way in which the rhetoric of difference is a naturalized component of the ethnic and racial identity.</span><sup class="reference" data-dcnode-id="6025" id="cite_ref-112"><a data-dcnode-id="6026" href="#cite_note-112"><span data-dcnode-id="6027" instrument_node="">[112]</span></a></sup><span data-dcnode-id="6024" instrument_node="">  These issues led the first Cyberbullying Prevention campaign, STOMP Out Bullying, to launch itself in 2005. Like the abundance of campaigns that would form in the next fifteen years, it focuses on creating cyberbullying awareness and reducing and preventing bullying.</span><sup class="reference" data-dcnode-id="6021" id="cite_ref-113"><a data-dcnode-id="6022" href="#cite_note-113"><span data-dcnode-id="6023" instrument_node="">[113]</span></a></sup></p><div class="thumb tright" data-dcnode-id="6011"><div class="thumbinner" data-dcnode-id="6012" style="width:222px;"><a class="image" data-dcnode-id="6018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASw-face-swap.png"><img alt="" class="thumbimage" data-dcnode-id="6019" data-file-height="578" data-file-width="1060" decoding="async" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Sw-face-swap.png/220px-Sw-face-swap.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Sw-face-swap.png/330px-Sw-face-swap.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Sw-face-swap.png/440px-Sw-face-swap.png 2x" width="220"></a><span data-dcnode-id="6017" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6013"><div class="magnify" data-dcnode-id="6015"><a class="internal" data-dcnode-id="6016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASw-face-swap.png" title="Enlarge"></a></div><span data-dcnode-id="6014" instrument_node="">An example of a deepfake where the face of Isaac Newton (bottom left corner) is supplied with that of another person using machine learning and artificial intelligence.</span></div></div></div><p data-dcnode-id="5988"><span data-dcnode-id="6010" instrument_node="">The challenge with social media has increased since the rise of '</span><a data-dcnode-id="6008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancel_culture" title="Cancel culture"><span data-dcnode-id="6009" instrument_node="">cancel culture</span></a><span data-dcnode-id="6007" instrument_node="">', which aims to end the career of a culprit through any means possible, mainly the boycott of their works.</span><sup class="reference" data-dcnode-id="6004" id="cite_ref-114"><a data-dcnode-id="6005" href="#cite_note-114"><span data-dcnode-id="6006" instrument_node="">[114]</span></a></sup><span data-dcnode-id="6003" instrument_node=""> There is a limited number of characters to convey the message, (ex: Twitter's 280 character limit)</span><sup class="reference" data-dcnode-id="6000" id="cite_ref-115"><a data-dcnode-id="6001" href="#cite_note-115"><span data-dcnode-id="6002" instrument_node="">[115]</span></a></sup><span data-dcnode-id="5999" instrument_node=""> so messages in digital rhetoric tend to be scarcely explained, allowing stereotypes to flourish. Erika Sparby theorized that the ability to be anonymous and use </span><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pseudonym" title="Pseudonym"><span data-dcnode-id="5998" instrument_node="">pseudonyms</span></a><span data-dcnode-id="5996" instrument_node=""> or </span><a data-dcnode-id="5994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avatar_%28computing%29" title="Avatar (computing)"><span data-dcnode-id="5995" instrument_node="">avatars</span></a><span data-dcnode-id="5993" instrument_node=""> on social media gives users more confidence to address either someone or something in a negative light.</span><sup class="reference" data-dcnode-id="5990" id="cite_ref-Sparby_116-0"><a data-dcnode-id="5991" href="#cite_note-Sparby-116"><span data-dcnode-id="5992" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5989" instrument_node="">
</span></p><p data-dcnode-id="5974"><span data-dcnode-id="5987" instrument_node="">More recently, techniques utilizing machine learning and artificial intelligence have become popular in synthesizing fake, realistic videos of people whose faces are swapped out with others people's faces. These kinds of videos, originally referred to as "deepfakes" by one user in the popular chatting forum Reddit, can be created by easily obtainable and simple software, inciting concerns that people may use the software to blackmail or bully people online.</span><sup class="reference" data-dcnode-id="5984" id="cite_ref-117"><a data-dcnode-id="5985" href="#cite_note-117"><span data-dcnode-id="5986" instrument_node="">[117]</span></a></sup><span data-dcnode-id="5983" instrument_node=""> A large quantity of images containing faces are required to create a deepfake. In addition, specific types of characteristics, such as different exposure and color levels, need to be consistent to make a realistic video. However, given the vast amounts of photos of people publicly available on the internet from social media sites, there is concern about the extent to which people can use deepfakes as a bullying tactic. There have already been multiple incidents of this kind of harassment being used to bully people, one notable one involving a mother who used deepfake software to frame a few of her daughter's classmates at school by producing fake videos of them in pornographic videos.</span><sup class="reference" data-dcnode-id="5980" id="cite_ref-118"><a data-dcnode-id="5981" href="#cite_note-118"><span data-dcnode-id="5982" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5979" instrument_node=""> Due to AI and machine learning being relatively new sub fields of  computer science and mathematics, there has not been enough time for deepfake video detection technologies to mature, and are so far only detectable using the human eye to spot irregularities in movement of the people in the videos.</span><sup class="reference" data-dcnode-id="5976" id="cite_ref-119"><a data-dcnode-id="5977" href="#cite_note-119"><span data-dcnode-id="5978" instrument_node="">[119]</span></a></sup><span data-dcnode-id="5975" instrument_node="">
</span></p><span data-dcnode-id="5973" instrument_node="">
</span><h3 data-dcnode-id="5963"><span class="mw-headline" data-dcnode-id="5971" id="Misinformation_and_disinformation"><span data-dcnode-id="5972" instrument_node="">Misinformation and disinformation</span></span><span class="mw-editsection" data-dcnode-id="5964"><span class="mw-editsection-bracket" data-dcnode-id="5969"><span data-dcnode-id="5970" instrument_node="">[</span></span><a data-dcnode-id="5967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D38" title="Edit section: Misinformation and disinformation"><span data-dcnode-id="5968" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5962" instrument_node="">
</span><p data-dcnode-id="5947"><span data-dcnode-id="5961" instrument_node="">While digital rhetoric can often be used to persuade, in some cases, it is used to spread false and inaccurate information. The proliferation of illegitimate information over the internet has given rise to the term </span><a data-dcnode-id="5959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Misinformation" title="Misinformation"><span data-dcnode-id="5960" instrument_node="">misinformation</span></a><span data-dcnode-id="5958" instrument_node="">, which is defined as the spread of false claims that may or may not be intended to mislead others. This is not to be confused with </span><a data-dcnode-id="5956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disinformation" title="Disinformation"><span data-dcnode-id="5957" instrument_node="">disinformation</span></a><span data-dcnode-id="5955" instrument_node="">, which is illegitimate or inaccurate information that is spread with the intent to mislead others. Both misinformation and disinformation have had detrimental impacts on the knowledge, perceptions, and, in some cases, actions of many susceptible individuals. Social media specifically has greatly impacted the spread of false information.</span><sup class="reference" data-dcnode-id="5952" id="cite_ref-120"><a data-dcnode-id="5953" href="#cite_note-120"><span data-dcnode-id="5954" instrument_node="">[120]</span></a></sup><span data-dcnode-id="5951" instrument_node=""> Scientific facts, such as the damaging environmental impacts of </span><a class="mw-redirect" data-dcnode-id="5949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_warming" title="Global warming"><span data-dcnode-id="5950" instrument_node="">global warming</span></a><span data-dcnode-id="5948" instrument_node="">, now come into question on a daily basis.  
</span></p><span data-dcnode-id="5946" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5934"><div class="thumbinner" data-dcnode-id="5935" style="width:222px;"><a class="image" data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AScreenshot_of_suspended_account_realDonaldTrump_on_Twitter_2020-01-09.png"><img alt="" class="thumbimage" data-dcnode-id="5945" data-file-height="421" data-file-width="614" decoding="async" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/15/Screenshot_of_suspended_account_realDonaldTrump_on_Twitter_2020-01-09.png/220px-Screenshot_of_suspended_account_realDonaldTrump_on_Twitter_2020-01-09.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/15/Screenshot_of_suspended_account_realDonaldTrump_on_Twitter_2020-01-09.png/330px-Screenshot_of_suspended_account_realDonaldTrump_on_Twitter_2020-01-09.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/15/Screenshot_of_suspended_account_realDonaldTrump_on_Twitter_2020-01-09.png/440px-Screenshot_of_suspended_account_realDonaldTrump_on_Twitter_2020-01-09.png 2x" width="220"></a><span data-dcnode-id="5943" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5936"><div class="magnify" data-dcnode-id="5941"><a class="internal" data-dcnode-id="5942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AScreenshot_of_suspended_account_realDonaldTrump_on_Twitter_2020-01-09.png" title="Enlarge"></a></div><span data-dcnode-id="5940" instrument_node="">Donald Trump's </span><a data-dcnode-id="5938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twitter" title="Twitter"><span data-dcnode-id="5939" instrument_node="">Twitter</span></a><span data-dcnode-id="5937" instrument_node=""> account permanently suspended in January 2020.</span></div></div></div><span data-dcnode-id="5933" instrument_node="">
</span><p data-dcnode-id="5854"><span data-dcnode-id="5932" instrument_node="">Social media has contributed to the proliferation of misinformation/disinformation because of its viral and largely unfiltered nature.  Everyday users have the power to join and perpetuate a narrative that could be entirely false.  In recent years, the term "</span><a data-dcnode-id="5930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fake_news" title="Fake news"><span data-dcnode-id="5931" instrument_node="">fake news</span></a><span data-dcnode-id="5929" instrument_node="">"— used synonymously with misinformation— has been highly popularized and politicized in digital spaces.</span><sup class="reference" data-dcnode-id="5926" id="cite_ref-121"><a data-dcnode-id="5927" href="#cite_note-121"><span data-dcnode-id="5928" instrument_node="">[121]</span></a></sup><span data-dcnode-id="5925" instrument_node="">  The effects of misinformation were further on display during the United States' </span><a data-dcnode-id="5923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_presidential_election" title="2020 United States presidential election"><span data-dcnode-id="5924" instrument_node="">2020 presidential election</span></a><span data-dcnode-id="5922" instrument_node="">, where social media usage had an impact on </span><a data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="5921" instrument_node="">Congress</span></a><span data-dcnode-id="5919" instrument_node="">.</span><sup class="reference" data-dcnode-id="5916" id="cite_ref-122"><a data-dcnode-id="5917" href="#cite_note-122"><span data-dcnode-id="5918" instrument_node="">[122]</span></a></sup><span data-dcnode-id="5915" instrument_node=""> Starting as early as April 2020, then-President </span><a data-dcnode-id="5913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="5914" instrument_node="">Donald Trump</span></a><span data-dcnode-id="5912" instrument_node=""> tweeted about the dangers of widespread mail </span><a data-dcnode-id="5910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_fraud" title="Electoral fraud"><span data-dcnode-id="5911" instrument_node="">voting fraud</span></a><sup class="reference" data-dcnode-id="5907" id="cite_ref-:19_123-0"><a data-dcnode-id="5908" href="#cite_note-:19-123"><span data-dcnode-id="5909" instrument_node="">[123]</span></a></sup><span data-dcnode-id="5906" instrument_node=""> even though studies have shown that mail voting fraud is rare and the dangers are negligible.</span><sup class="reference" data-dcnode-id="5903" id="cite_ref-124"><a data-dcnode-id="5904" href="#cite_note-124"><span data-dcnode-id="5905" instrument_node="">[124]</span></a></sup><span data-dcnode-id="5902" instrument_node=""> Even after losing the election, Trump continued to use </span><a data-dcnode-id="5900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twitter" title="Twitter"><span data-dcnode-id="5901" instrument_node="">Twitter</span></a><span data-dcnode-id="5899" instrument_node=""> as his main platform to speak about rigged elections, mail-in </span><a class="mw-redirect" data-dcnode-id="5897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_fraud" title="Voter fraud"><span data-dcnode-id="5898" instrument_node="">voter fraud</span></a><span data-dcnode-id="5896" instrument_node="">, and other proven falsehoods.</span><sup class="reference" data-dcnode-id="5893" id="cite_ref-:19_123-1"><a data-dcnode-id="5894" href="#cite_note-:19-123"><span data-dcnode-id="5895" instrument_node="">[123]</span></a></sup><span data-dcnode-id="5892" instrument_node=""> On January 6, 2021, </span><a data-dcnode-id="5890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="5891" instrument_node="">Congress</span></a><span data-dcnode-id="5889" instrument_node=""> was set to certify the results of the 2020 election whilst a rally of Trump supporters were protesting the election results based on Trump's claims of fraud. This assembly of his supporters quickly turned violent, as a mob </span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021_United_States_Capitol_attack" title="2021 United States Capitol attack"><span data-dcnode-id="5888" instrument_node="">stormed the Capitol</span></a><span data-dcnode-id="5886" instrument_node=""> with the intent to overturn election results.</span><sup class="reference" data-dcnode-id="5883" id="cite_ref-:20_125-0"><a data-dcnode-id="5884" href="#cite_note-:20-125"><span data-dcnode-id="5885" instrument_node="">[125]</span></a></sup><span data-dcnode-id="5882" instrument_node=""> The insurrection, which killed five people,</span><sup class="reference" data-dcnode-id="5879" id="cite_ref-126"><a data-dcnode-id="5880" href="#cite_note-126"><span data-dcnode-id="5881" instrument_node="">[126]</span></a></sup><span data-dcnode-id="5878" instrument_node=""> was the culmination of Trump's long thread of disinformation spread on social media. As a result, Trump was permanently suspended from </span><a data-dcnode-id="5876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twitter" title="Twitter"><span data-dcnode-id="5877" instrument_node="">Twitter</span></a><span data-dcnode-id="5875" instrument_node=""> two days later because his involvement in the insurrection violated Twitter's terms and conditions regarding the "glorification of violence".</span><sup class="reference" data-dcnode-id="5872" id="cite_ref-127"><a data-dcnode-id="5873" href="#cite_note-127"><span data-dcnode-id="5874" instrument_node="">[127]</span></a></sup><span data-dcnode-id="5871" instrument_node=""> Alongside being suspend from other major social media sites such as </span><a data-dcnode-id="5869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Facebook" title="Facebook"><span data-dcnode-id="5870" instrument_node="">Facebook</span></a><span data-dcnode-id="5868" instrument_node=""> and </span><a data-dcnode-id="5866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/YouTube" title="YouTube"><span data-dcnode-id="5867" instrument_node="">YouTube</span></a><span data-dcnode-id="5865" instrument_node="">,</span><sup class="reference" data-dcnode-id="5862" id="cite_ref-128"><a data-dcnode-id="5863" href="#cite_note-128"><span data-dcnode-id="5864" instrument_node="">[128]</span></a></sup><span data-dcnode-id="5861" instrument_node=""> Trump was impeached by the House of Representatives because of his incitement of the </span><a class="mw-redirect" data-dcnode-id="5859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021_storming_of_the_United_States_Capitol" title="2021 storming of the United States Capitol"><span data-dcnode-id="5860" instrument_node="">insurrection</span></a><span data-dcnode-id="5858" instrument_node="">. This incident started a heated debate about social media companies' abilities to limit free speech, but ultimately, these companies are still private businesses who are allowed to determine their own </span><a class="mw-redirect" data-dcnode-id="5856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terms_and_conditions" title="Terms and conditions"><span data-dcnode-id="5857" instrument_node="">terms and conditions</span></a><span data-dcnode-id="5855" instrument_node=""> as they see fit, which users must agree to in order to use these platforms in the first place.
</span></p><span data-dcnode-id="5853" instrument_node="">
</span><h3 data-dcnode-id="5843"><span class="mw-headline" data-dcnode-id="5851" id="Legitimacy"><span data-dcnode-id="5852" instrument_node="">Legitimacy</span></span><span class="mw-editsection" data-dcnode-id="5844"><span class="mw-editsection-bracket" data-dcnode-id="5849"><span data-dcnode-id="5850" instrument_node="">[</span></span><a data-dcnode-id="5847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D39" title="Edit section: Legitimacy"><span data-dcnode-id="5848" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5845"><span data-dcnode-id="5846" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5842" instrument_node="">
</span><p data-dcnode-id="5795"><span data-dcnode-id="5841" instrument_node="">There is controversy regarding the innovative nature of digital rhetoric. Arguments opposed to legitimizing web text are Platonically based, in that they reject the new form of </span><a data-dcnode-id="5839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scholarly_method" title="Scholarly method"><span data-dcnode-id="5840" instrument_node="">scholarship</span></a><span data-dcnode-id="5838" instrument_node="">—web text, and praise the old form—print, in the same way that oral communication was originally favored over written communication.</span><sup class="reference" data-dcnode-id="5835" id="cite_ref-129"><a data-dcnode-id="5836" href="#cite_note-129"><span data-dcnode-id="5837" instrument_node="">[129]</span></a></sup><span data-dcnode-id="5834" instrument_node=""> Originally some traditionalists did not regard online </span><a data-dcnode-id="5832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_access" title="Open access"><span data-dcnode-id="5833" instrument_node="">open-access</span></a><span data-dcnode-id="5831" instrument_node=""> journals with the same legitimacy as print journals for this reason; however, digital arenas have become the primary place for disseminating academic information in many areas of scholarship.</span><sup class="reference" data-dcnode-id="5828" id="cite_ref-130"><a data-dcnode-id="5829" href="#cite_note-130"><span data-dcnode-id="5830" instrument_node="">[130]</span></a></sup><span data-dcnode-id="5827" instrument_node=""> Modern scholars struggle to "claim academic legitimacy" in these new media forms, as the tendency of </span><a data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedagogy" title="Pedagogy"><span data-dcnode-id="5826" instrument_node="">pedagogy</span></a><span data-dcnode-id="5824" instrument_node=""> is to write about a subject rather than actively work in it.</span><sup class="reference" data-dcnode-id="5821" id="cite_ref-131"><a data-dcnode-id="5822" href="#cite_note-131"><span data-dcnode-id="5823" instrument_node="">[131]</span></a></sup><span data-dcnode-id="5820" instrument_node=""> Within the past decade, more scholarly texts have been openly accessible, which provides an innovative way for students to gain access to textual materials online for free, in the way that many </span><a data-dcnode-id="5818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academic_journal" title="Academic journal"><span data-dcnode-id="5819" instrument_node="">scholarly journals</span></a><span data-dcnode-id="5817" instrument_node=""> like </span><i data-dcnode-id="5814"><a data-dcnode-id="5815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kairos_%28journal%29" title="Kairos (journal)"><span data-dcnode-id="5816" instrument_node="">Kairos</span></a></i><span data-dcnode-id="5813" instrument_node="">,</span><sup class="reference" data-dcnode-id="5810" id="cite_ref-132"><a data-dcnode-id="5811" href="#cite_note-132"><span data-dcnode-id="5812" instrument_node="">[132]</span></a></sup><span data-dcnode-id="5809" instrument_node=""> </span><i data-dcnode-id="5807"><span data-dcnode-id="5808" instrument_node="">Harlot of the Arts</span></i><span data-dcnode-id="5806" instrument_node="">,</span><sup class="reference" data-dcnode-id="5803" id="cite_ref-133"><a data-dcnode-id="5804" href="#cite_note-133"><span data-dcnode-id="5805" instrument_node="">[133]</span></a></sup><span data-dcnode-id="5802" instrument_node=""> and </span><i data-dcnode-id="5800"><span data-dcnode-id="5801" instrument_node="">Enculturation</span></i><sup class="reference" data-dcnode-id="5797" id="cite_ref-134"><a data-dcnode-id="5798" href="#cite_note-134"><span data-dcnode-id="5799" instrument_node="">[134]</span></a></sup><span data-dcnode-id="5796" instrument_node=""> are already available through open access.
</span></p><span data-dcnode-id="5794" instrument_node="">
</span><h3 data-dcnode-id="5784"><span class="mw-headline" data-dcnode-id="5792" id="COVID-19_pandemic"><span data-dcnode-id="5793" instrument_node="">COVID-19 pandemic</span></span><span class="mw-editsection" data-dcnode-id="5785"><span class="mw-editsection-bracket" data-dcnode-id="5790"><span data-dcnode-id="5791" instrument_node="">[</span></span><a data-dcnode-id="5788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D40" title="Edit section: COVID-19 pandemic"><span data-dcnode-id="5789" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5786"><span data-dcnode-id="5787" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5783" instrument_node="">
</span><p data-dcnode-id="5743"><span data-dcnode-id="5782" instrument_node="">Most recently, the persistence of the </span><a data-dcnode-id="5780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="5781" instrument_node="">global COVID-19 pandemic</span></a><span data-dcnode-id="5779" instrument_node=""> since 2020 has changed both physical and digital spaces. This global change has profoundly affected many aspects of human existence. The resulting isolation and economic shutdowns complicated existing issues and created a new set of globalized challenges as it "imposed" a change to the "</span><a data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychosocial" title="Psychosocial"><span data-dcnode-id="5778" instrument_node="">psychosocial</span></a><span data-dcnode-id="5776" instrument_node=""> environment".</span><sup class="reference" data-dcnode-id="5773" id="cite_ref-135"><a data-dcnode-id="5774" href="#cite_note-135"><span data-dcnode-id="5775" instrument_node="">[135]</span></a></sup><span data-dcnode-id="5772" instrument_node=""> The virus has forced the majority of individuals with internet access to depend on technology in order to remain connected to the outside world, and on a larger scale, global economies have become reliant on transitioning business to digital platforms. Also, the pandemic forced schools across the globe to switch to an "online only" approach. By March 25, 2020, all school systems in the </span><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="5771" instrument_node="">United States</span></a><span data-dcnode-id="5769" instrument_node=""> closed indefinitely.</span><sup class="reference" data-dcnode-id="5766" id="cite_ref-136"><a data-dcnode-id="5767" href="#cite_note-136"><span data-dcnode-id="5768" instrument_node="">[136]</span></a></sup><span data-dcnode-id="5765" instrument_node=""> In search of a platform to host online learning, many schools incorporated popular video chat service </span><a data-dcnode-id="5763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zoom_Video_Communications" title="Zoom Video Communications"><span data-dcnode-id="5764" instrument_node="">Zoom</span></a><span data-dcnode-id="5762" instrument_node=""> as their method of providing socially distant instruction. In April 2020, Zoom was hosting over 300 million daily meetings, as opposed to 10 million in December 2019.</span><sup class="reference" data-dcnode-id="5759" id="cite_ref-137"><a data-dcnode-id="5760" href="#cite_note-137"><span data-dcnode-id="5761" instrument_node="">[137]</span></a></sup><span data-dcnode-id="5758" instrument_node=""> While some may view online learning as a drop in education quality,</span><sup class="reference" data-dcnode-id="5755" id="cite_ref-138"><a data-dcnode-id="5756" href="#cite_note-138"><span data-dcnode-id="5757" instrument_node="">[138]</span></a></sup><span data-dcnode-id="5754" instrument_node=""> the shift to online learning demonstrated the current state of accessibility to digital information while promoting the use of digital learning through Zoom meetings, </span><a data-dcnode-id="5752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/YouTube" title="YouTube"><span data-dcnode-id="5753" instrument_node="">YouTube</span></a><span data-dcnode-id="5751" instrument_node=""> videos, and broadcasting systems such as </span><a class="mw-redirect" data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_Broadcaster_Software" title="Open Broadcaster Software"><span data-dcnode-id="5750" instrument_node="">Open Broadcaster Software</span></a><span data-dcnode-id="5748" instrument_node="">.</span><sup class="reference" data-dcnode-id="5745" id="cite_ref-139"><a data-dcnode-id="5746" href="#cite_note-139"><span data-dcnode-id="5747" instrument_node="">[139]</span></a></sup><span data-dcnode-id="5744" instrument_node=""> However, there have also been questions about whether or not the switch to online learning has also had detrimental impacts on students, and it has been difficult to transition younger students in particular to completely online models of learning.
</span></p><p data-dcnode-id="5708"><span data-dcnode-id="5742" instrument_node="">The pandemic has also contributed to creating misleading rhetoric in online spaced. Heightened public health concerns combined with the accessibility of social media led to both misinformation and disinformation regarding </span><a data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coronavirus" title="Coronavirus"><span data-dcnode-id="5741" instrument_node="">COVID-19</span></a><span data-dcnode-id="5739" instrument_node=""> to spread rapidly. Some people online theorized that the deadly virus could be cured upon the ingestion of bleach, while others believed the disease to have been intentionally started by </span><a data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="5738" instrument_node="">China</span></a><span data-dcnode-id="5736" instrument_node=""> in an attempt to take over the world.</span><sup class="reference" data-dcnode-id="5733" id="cite_ref-:17_140-0"><a data-dcnode-id="5734" href="#cite_note-:17-140"><span data-dcnode-id="5735" instrument_node="">[140]</span></a></sup><span data-dcnode-id="5732" instrument_node=""> Trump also supported taking </span><a data-dcnode-id="5730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydroxychloroquine" title="Hydroxychloroquine"><span data-dcnode-id="5731" instrument_node="">Hydroxychloroquine</span></a><span data-dcnode-id="5729" instrument_node=""> to prevent the contraction of </span><a data-dcnode-id="5727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coronavirus" title="Coronavirus"><span data-dcnode-id="5728" instrument_node="">COVID-19</span></a><span data-dcnode-id="5726" instrument_node="">.</span><sup class="reference" data-dcnode-id="5723" id="cite_ref-141"><a data-dcnode-id="5724" href="#cite_note-141"><span data-dcnode-id="5725" instrument_node="">[141]</span></a></sup><span data-dcnode-id="5722" instrument_node=""> The </span><a data-dcnode-id="5720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Health_Organization" title="World Health Organization"><span data-dcnode-id="5721" instrument_node="">World Health Organization (WHO)</span></a><span data-dcnode-id="5719" instrument_node=""> has advised on numerous occasions that the drug has no signs of preventing the spread of the virus. Despite their illegitimate nature, these conspiracy theories have spread rapidly in digital spaces. As a result, the </span><a data-dcnode-id="5717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Health_Organization" title="World Health Organization"><span data-dcnode-id="5718" instrument_node="">WHO</span></a><span data-dcnode-id="5716" instrument_node=""> declared the proliferation of misinformation regarding the virus an "</span><a data-dcnode-id="5714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infodemic" title="Infodemic"><span data-dcnode-id="5715" instrument_node="">infodemic</span></a><span data-dcnode-id="5713" instrument_node="">".</span><sup class="reference" data-dcnode-id="5710" id="cite_ref-:17_140-1"><a data-dcnode-id="5711" href="#cite_note-:17-140"><span data-dcnode-id="5712" instrument_node="">[140]</span></a></sup><span data-dcnode-id="5709" instrument_node=""> This label caused most social media sites to strengthen their policies relating to false information, but many misleading claims still slip through the cracks.
</span></p><span data-dcnode-id="5707" instrument_node="">
