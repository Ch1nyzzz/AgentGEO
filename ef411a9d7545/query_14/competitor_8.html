</span><div class="thumb tright" data-dcnode-id="8296"><div class="thumbinner" data-dcnode-id="8297" style="width:302px;"><a class="image" data-dcnode-id="8306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADigital_Rhetoric.jpg"><img alt="" class="thumbimage" data-dcnode-id="8307" data-file-height="4000" data-file-width="6000" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Digital_Rhetoric.jpg/300px-Digital_Rhetoric.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Digital_Rhetoric.jpg/450px-Digital_Rhetoric.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Digital_Rhetoric.jpg/600px-Digital_Rhetoric.jpg 2x" width="300"></a><span data-dcnode-id="8305" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8298"><div class="magnify" data-dcnode-id="8303"><a class="internal" data-dcnode-id="8304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADigital_Rhetoric.jpg" title="Enlarge"></a></div><span data-dcnode-id="8302" instrument_node="">Digital rhetoric is an extension of human communication-- taking place in a digital sphere.</span><sup class="reference" data-dcnode-id="8299" id="cite_ref-:41_1-0"><a data-dcnode-id="8300" href="#cite_note-:41-1"><span data-dcnode-id="8301" instrument_node="">[1]</span></a></sup></div></div></div><p data-dcnode-id="8279"><span data-dcnode-id="8295" instrument_node="">Digital rhetoric can be generally defined as communication that exists in the digital sphere. As such, digital rhetoric can be expressed in many different forms—including but not limited to text, images, videos, and software.</span><sup class="reference" data-dcnode-id="8292" id="cite_ref-Eyman2015_2-0"><a data-dcnode-id="8293" href="#cite_note-Eyman2015-2"><span data-dcnode-id="8294" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8291" instrument_node=""> Due to the increasingly mediated nature of our contemporary society, there are no longer clear distinctions between digital and non-digital environments.</span><sup class="reference" data-dcnode-id="8288" id="cite_ref-3"><a data-dcnode-id="8289" href="#cite_note-3"><span data-dcnode-id="8290" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8287" instrument_node=""> This has led to an expansion of the scope of </span><b data-dcnode-id="8285"><span data-dcnode-id="8286" instrument_node="">digital rhetoric</span></b><span data-dcnode-id="8284" instrument_node=""> as there is a need to account for the increased fluidity with which humans interact with technology.</span><sup class="reference" data-dcnode-id="8281" id="cite_ref-Boyle_251–259_4-0"><a data-dcnode-id="8282" href="#cite_note-Boyle_251%E2%80%93259-4"><span data-dcnode-id="8283" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8280" instrument_node="">
</span></p><p data-dcnode-id="8263"><span data-dcnode-id="8278" instrument_node="">Evolving definitions suggest that digital rhetoric has held various meanings to different </span><a data-dcnode-id="8276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scholar" title="Scholar"><span data-dcnode-id="8277" instrument_node="">scholars</span></a><span data-dcnode-id="8275" instrument_node=""> over time.</span><sup class="reference" data-dcnode-id="8272" id="cite_ref-eyman2015_5-0"><a data-dcnode-id="8273" href="#cite_note-eyman2015-5"><span data-dcnode-id="8274" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8271" instrument_node=""> Similarly, digital rhetoric can take on a variety of meanings based on what is being analyzed—which depends on the concept, forms or objects of study, or rhetorical approach. Digital rhetoric can also be analyzed through many lenses that reflect different </span><a data-dcnode-id="8269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_movement" title="Social movement"><span data-dcnode-id="8270" instrument_node="">social movements</span></a><span data-dcnode-id="8268" instrument_node="">.</span><sup class="reference" data-dcnode-id="8265" id="cite_ref-6"><a data-dcnode-id="8266" href="#cite_note-6"><span data-dcnode-id="8267" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8264" instrument_node=""> Approaching this area of study through different the lens of varying social issues allows the reach of digital rhetoric to expand far beyond the individualistic encounters one has with technology.
</span></p><span data-dcnode-id="8262" instrument_node="">

</span><h2 data-dcnode-id="7860"><span class="mw-headline" data-dcnode-id="7868" id="Definition"><span data-dcnode-id="7869" instrument_node="">Definition</span></span><span class="mw-editsection" data-dcnode-id="7861"><span class="mw-editsection-bracket" data-dcnode-id="7866"><span data-dcnode-id="7867" instrument_node="">[</span></span><a data-dcnode-id="7864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D1" title="Edit section: Definition"><span data-dcnode-id="7865" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7862"><span data-dcnode-id="7863" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7859" instrument_node="">
</span><h3 data-dcnode-id="7848"><span data-dcnode-id="7858" id="Evolving_definition_of_.27digital_rhetoric.27"></span><span class="mw-headline" data-dcnode-id="7856" id="Evolving_definition_of_'digital_rhetoric'"><span data-dcnode-id="7857" instrument_node="">Evolving definition of 'digital rhetoric'</span></span><span class="mw-editsection" data-dcnode-id="7849"><span class="mw-editsection-bracket" data-dcnode-id="7854"><span data-dcnode-id="7855" instrument_node="">[</span></span><a data-dcnode-id="7852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D2" title="Edit section: Evolving definition of 'digital rhetoric'"><span data-dcnode-id="7853" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7850"><span data-dcnode-id="7851" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7847" instrument_node="">
</span><p data-dcnode-id="7841"><span data-dcnode-id="7846" instrument_node="">The following subsections detail the evolving definition 'digital rhetoric' as a term since its creation in 1989.</span><sup class="reference" data-dcnode-id="7843" id="cite_ref-:33_7-0"><a data-dcnode-id="7844" href="#cite_note-:33-7"><span data-dcnode-id="7845" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7842" instrument_node="">
</span></p><span data-dcnode-id="7840" instrument_node="">
</span><h4 data-dcnode-id="7829"><span data-dcnode-id="7839" id="Early_definitions_.281989_-_2015.29"></span><span class="mw-headline" data-dcnode-id="7837" id="Early_definitions_(1989_-_2015)"><span data-dcnode-id="7838" instrument_node="">Early definitions (1989 - 2015)</span></span><span class="mw-editsection" data-dcnode-id="7830"><span class="mw-editsection-bracket" data-dcnode-id="7835"><span data-dcnode-id="7836" instrument_node="">[</span></span><a data-dcnode-id="7833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D3" title="Edit section: Early definitions (1989 - 2015)"><span data-dcnode-id="7834" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7831"><span data-dcnode-id="7832" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7828" instrument_node="">
</span><p data-dcnode-id="7806"><span data-dcnode-id="7827" instrument_node="">The term </span><em data-dcnode-id="7825"><span data-dcnode-id="7826" instrument_node="">digital rhetoric</span></em><span data-dcnode-id="7824" instrument_node=""> was coined by </span><a data-dcnode-id="7822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhetoric" title="Rhetoric"><span data-dcnode-id="7823" instrument_node="">rhetorician</span></a><span data-dcnode-id="7821" instrument_node=""> </span><a data-dcnode-id="7819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_A._Lanham" title="Richard A. Lanham"><span data-dcnode-id="7820" instrument_node="">Richard A. Lanham</span></a><span data-dcnode-id="7818" instrument_node=""> in a lecture he delivered in 1989 </span><sup class="reference" data-dcnode-id="7815" id="cite_ref-:33_7-1"><a data-dcnode-id="7816" href="#cite_note-:33-7"><span data-dcnode-id="7817" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7814" instrument_node=""> and first formally put into words in his 1993 essay collection, </span><i data-dcnode-id="7812"><span data-dcnode-id="7813" instrument_node="">The Electronic Word: Democracy, Technology, and the Arts</span></i><span data-dcnode-id="7811" instrument_node="">.</span><sup class="reference" data-dcnode-id="7808" id="cite_ref-8"><a data-dcnode-id="7809" href="#cite_note-8"><span data-dcnode-id="7810" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7807" instrument_node="">
</span></p><span data-dcnode-id="7805" instrument_node="">
</span><h4 data-dcnode-id="7794"><span data-dcnode-id="7804" id="Recent_scholarship_.282015_-_Present.29"></span><span class="mw-headline" data-dcnode-id="7802" id="Recent_scholarship_(2015_-_Present)"><span data-dcnode-id="7803" instrument_node="">Recent scholarship (2015 - Present)</span></span><span class="mw-editsection" data-dcnode-id="7795"><span class="mw-editsection-bracket" data-dcnode-id="7800"><span data-dcnode-id="7801" instrument_node="">[</span></span><a data-dcnode-id="7798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D4" title="Edit section: Recent scholarship (2015 - Present)"><span data-dcnode-id="7799" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7796"><span data-dcnode-id="7797" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7793" instrument_node="">
</span><p data-dcnode-id="7778"><span data-dcnode-id="7792" instrument_node="">Drawing influence from Lanham and Losh, Douglas Eyman offered his own definition of digital rhetoric in his 2015 book </span><i data-dcnode-id="7790"><span data-dcnode-id="7791" instrument_node="">Digital Rhetoric: Theory, Method, Practice.</span></i><span data-dcnode-id="7789" instrument_node=""> Eyman said digital rhetoric is "the application of rhetorical theory (as analytic method or </span><a data-dcnode-id="7787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heuristic" title="Heuristic"><span data-dcnode-id="7788" instrument_node="">heuristic</span></a><span data-dcnode-id="7786" instrument_node=""> for production) to digital texts and performances".</span><sup class="reference" data-dcnode-id="7783" id="cite_ref-:0_9-0"><a data-dcnode-id="7784" href="#cite_note-:0-9"><span data-dcnode-id="7785" instrument_node="">[9]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7780"><span data-dcnode-id="7781" title="Page / location: 44"><span data-dcnode-id="7782" instrument_node="">: 44 </span></span></sup><span data-dcnode-id="7779" instrument_node="">
</span></p><p data-dcnode-id="7743"><span data-dcnode-id="7777" instrument_node="">Eyman's definition demonstrates that digital rhetoric can be applied  as an analytic method for digital texts and as a heuristic for production offering rhetorical questions that a composer can use to create digital texts.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7770" style="white-space:nowrap;"><span data-dcnode-id="7776" instrument_node="">[</span><i data-dcnode-id="7772"><a data-dcnode-id="7773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7774" title="This claim needs references to reliable sources. (March 2019)"><span data-dcnode-id="7775" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7771" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="7767" id="cite_ref-:0_9-1"><a data-dcnode-id="7768" href="#cite_note-:0-9"><span data-dcnode-id="7769" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7766" instrument_node=""> Eyman categorized the emerging field of digital rhetoric as </span><a data-dcnode-id="7764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interdisciplinarity" title="Interdisciplinarity"><span data-dcnode-id="7765" instrument_node="">interdisciplinary</span></a><span data-dcnode-id="7763" instrument_node=""> in nature, enriched by related fields such as, but not limited to: </span><a data-dcnode-id="7761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_literacy" title="Digital literacy"><span data-dcnode-id="7762" instrument_node="">digital literacy</span></a><span data-dcnode-id="7760" instrument_node="">, </span><a data-dcnode-id="7758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visual_rhetoric" title="Visual rhetoric"><span data-dcnode-id="7759" instrument_node="">visual rhetoric</span></a><span data-dcnode-id="7757" instrument_node="">, </span><a data-dcnode-id="7755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_media" title="New media"><span data-dcnode-id="7756" instrument_node="">new media</span></a><span data-dcnode-id="7754" instrument_node="">, </span><a data-dcnode-id="7752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human%25E2%2580%2593computer_interaction" title="Human–computer interaction"><span data-dcnode-id="7753" instrument_node="">human-computer interaction</span></a><span data-dcnode-id="7751" instrument_node=""> and </span><a data-dcnode-id="7749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Critical_code_studies" title="Critical code studies"><span data-dcnode-id="7750" instrument_node="">critical code studies</span></a><span data-dcnode-id="7748" instrument_node="">.</span><sup class="reference" data-dcnode-id="7745" id="cite_ref-:0_9-2"><a data-dcnode-id="7746" href="#cite_note-:0-9"><span data-dcnode-id="7747" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7744" instrument_node="">
</span></p><p data-dcnode-id="7733"><span data-dcnode-id="7742" instrument_node="">In 2018, rhetorician Angela Haas offered her own definition of digital rhetoric, defining it as "the digital negotiation of information – and its historical, social, economic, and political contexts and influences – to affect change".</span><sup class="reference" data-dcnode-id="7739" id="cite_ref-:31_10-0"><a data-dcnode-id="7740" href="#cite_note-:31-10"><span data-dcnode-id="7741" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7738" instrument_node=""> Haas emphasized that digital rhetoric does not solely apply to text-based items—it can also apply to image-based or system-based items. In other words, any form of communication that occurs in the digital sphere can be counted as digital rhetoric under Haas' definition.</span><sup class="reference" data-dcnode-id="7735" id="cite_ref-11"><a data-dcnode-id="7736" href="#cite_note-11"><span data-dcnode-id="7737" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7734" instrument_node="">
</span></p><span data-dcnode-id="7732" instrument_node="">
</span><h3 data-dcnode-id="7722"><span class="mw-headline" data-dcnode-id="7730" id="Other_definitions"><span data-dcnode-id="7731" instrument_node="">Other definitions</span></span><span class="mw-editsection" data-dcnode-id="7723"><span class="mw-editsection-bracket" data-dcnode-id="7728"><span data-dcnode-id="7729" instrument_node="">[</span></span><a data-dcnode-id="7726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D5" title="Edit section: Other definitions"><span data-dcnode-id="7727" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7724"><span data-dcnode-id="7725" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7721" instrument_node="">
</span><p data-dcnode-id="7711"><span data-dcnode-id="7720" instrument_node="">Contrary to past conceptions, the definition of rhetoric can no longer be confined to simply the sending and receiving of messages to persuade or impart knowledge. While this represents a primarily ancient Western view of rhetoric, Arthur Smith of UCLA explains that the ancient rhetoric of many cultures, such as African rhetoric, existed independent of Western influence.</span><sup class="reference" data-dcnode-id="7717" id="cite_ref-12"><a data-dcnode-id="7718" href="#cite_note-12"><span data-dcnode-id="7719" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7716" instrument_node=""> Today, rhetoric encompasses all forms of discourse that serve any given purpose within specific contexts, while also simultaneously being shaped by those contexts.</span><sup class="reference" data-dcnode-id="7713" id="cite_ref-13"><a data-dcnode-id="7714" href="#cite_note-13"><span data-dcnode-id="7715" instrument_node="">[13]</span></a></sup><span data-dcnode-id="7712" instrument_node="">
</span></p><p data-dcnode-id="7702"><span data-dcnode-id="7710" instrument_node="">Some scholars interpret this rhetorical discourse with greater focus on the digital aspect. Casey Boyle, James Brown Jr., and Steph Ceraso claim that "the digital" is no longer just one of the many different tools that can be used to enhance traditional </span><a data-dcnode-id="7708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhetoric" title="Rhetoric"><span data-dcnode-id="7709" instrument_node="">rhetoric</span></a><span data-dcnode-id="7707" instrument_node="">, but an "ambient condition" that encompasses our everyday lives. In other words, as technology becomes more and more ubiquitous, the lines between traditional and digital rhetoric will start to blur. In addition, Boyle et al. emphasize the idea that both technology and rhetoric can influence and transform each other.</span><sup class="reference" data-dcnode-id="7704" id="cite_ref-Boyle_251–259_4-1"><a data-dcnode-id="7705" href="#cite_note-Boyle_251%E2%80%93259-4"><span data-dcnode-id="7706" instrument_node="">[4]</span></a></sup><span data-dcnode-id="7703" instrument_node="">
</span></p><span data-dcnode-id="7701" instrument_node="">
</span><h2 data-dcnode-id="7691"><span class="mw-headline" data-dcnode-id="7699" id="Concepts"><span data-dcnode-id="7700" instrument_node="">Concepts</span></span><span class="mw-editsection" data-dcnode-id="7692"><span class="mw-editsection-bracket" data-dcnode-id="7697"><span data-dcnode-id="7698" instrument_node="">[</span></span><a data-dcnode-id="7695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D6" title="Edit section: Concepts"><span data-dcnode-id="7696" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7693"><span data-dcnode-id="7694" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7690" instrument_node="">
</span><h3 data-dcnode-id="7680"><span class="mw-headline" data-dcnode-id="7688" id="Circulation"><span data-dcnode-id="7689" instrument_node="">Circulation</span></span><span class="mw-editsection" data-dcnode-id="7681"><span class="mw-editsection-bracket" data-dcnode-id="7686"><span data-dcnode-id="7687" instrument_node="">[</span></span><a data-dcnode-id="7684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D7" title="Edit section: Circulation"><span data-dcnode-id="7685" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7682"><span data-dcnode-id="7683" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7679" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7670"><div class="thumbinner" data-dcnode-id="7671" style="width:222px;"><a class="image" data-dcnode-id="7677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWikipedia-logo-v2-en_6m_articles_270_white.png"><img alt="Wikipedia's globe logo with a red banner across the bottom that says, &quot;6,000,000 articles,&quot; and below that Wikipedia's motto, &quot;The free encyclopedia.&quot;" class="thumbimage" data-dcnode-id="7678" data-file-height="310" data-file-width="270" decoding="async" height="253" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/56/Wikipedia-logo-v2-en_6m_articles_270_white.png/220px-Wikipedia-logo-v2-en_6m_articles_270_white.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/5/56/Wikipedia-logo-v2-en_6m_articles_270_white.png 1.5x" width="220"></a><span data-dcnode-id="7676" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7672"><div class="magnify" data-dcnode-id="7674"><a class="internal" data-dcnode-id="7675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWikipedia-logo-v2-en_6m_articles_270_white.png" title="Enlarge"></a></div><span data-dcnode-id="7673" instrument_node="">As an example of circulation, Wikipedia is an online encyclopedia that relies on collaborative rhetorical contribution.</span></div></div></div><span data-dcnode-id="7669" instrument_node="">
</span><p data-dcnode-id="7662"><a data-dcnode-id="7667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhetorical_circulation" title="Rhetorical circulation"><span data-dcnode-id="7668" instrument_node="">Circulation</span></a><span data-dcnode-id="7666" instrument_node=""> theorizes the ways that text and discourse moves through time and space, and any kind of media can be circulated. A new form of communication is composed, created, and distributed through digital technologies. Media scholar </span><a data-dcnode-id="7664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Jenkins" title="Henry Jenkins"><span data-dcnode-id="7665" instrument_node="">Henry Jenkins</span></a><span data-dcnode-id="7663" instrument_node=""> explains there is a shift from distribution to circulation, which signals a move toward an increasingly participatory model of culture in which people shape, share, re-frame and remix media content in ways not previously possible within the traditional rhetorical formats like print. The various concepts of circulation include:
</span></p><span data-dcnode-id="7661" instrument_node="">
</span><ul data-dcnode-id="7611"><li data-dcnode-id="7647"><i data-dcnode-id="7659"><span data-dcnode-id="7660" instrument_node="">Collaboration</span></i><span data-dcnode-id="7658" instrument_node=""> – Digital rhetoric has taken on a very collaborative nature through the use of digital platforms. Sites such as YouTube and Wikipedia involve opportunity for "new forms of collaborative production".</span><sup class="reference" data-dcnode-id="7655" id="cite_ref-:8_14-0"><a data-dcnode-id="7656" href="#cite_note-:8-14"><span data-dcnode-id="7657" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7654" instrument_node=""> Digital platforms have created opportunities for more people to enact and create, as digital platforms open doors for collaborative communication that can occur synchronously, asynchronously, over far distances, and across multiple disciplines and professions.</span><sup class="reference" data-dcnode-id="7651" id="cite_ref-:8_14-1"><a data-dcnode-id="7652" href="#cite_note-:8-14"><span data-dcnode-id="7653" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="7648" id="cite_ref-:13_15-0"><a data-dcnode-id="7649" href="#cite_note-:13-15"><span data-dcnode-id="7650" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="7646" instrument_node="">
</span><li data-dcnode-id="7635"><i data-dcnode-id="7644"><span data-dcnode-id="7645" instrument_node="">Crowdsourcing</span></i><span data-dcnode-id="7643" instrument_node=""> – Daren Brabham describes the concept of crowdsourcing as the use of modern technology to collaborate, create, and solve problems collectively.</span><sup class="reference" data-dcnode-id="7640" id="cite_ref-16"><a data-dcnode-id="7641" href="#cite_note-16"><span data-dcnode-id="7642" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7639" instrument_node=""> However, </span><a data-dcnode-id="7637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethics" title="Ethics"><span data-dcnode-id="7638" instrument_node="">ethical</span></a><span data-dcnode-id="7636" instrument_node=""> concerns have been raised as well while engaging in crowdsourcing without a clear set of compensation practices or protections in place to secure information.</span></li><span data-dcnode-id="7634" instrument_node="">
</span><li data-dcnode-id="7612"><i data-dcnode-id="7632"><span data-dcnode-id="7633" instrument_node="">Delivery</span></i><span data-dcnode-id="7631" instrument_node=""> – Whereas rhetoric once relied largely on oral methods, the rise of digital technologies allows rhetoric to be delivered in new "electronic forms of discourse".</span><sup class="reference" data-dcnode-id="7628" id="cite_ref-:14_17-0"><a data-dcnode-id="7629" href="#cite_note-:14-17"><span data-dcnode-id="7630" instrument_node="">[17]</span></a></sup><span data-dcnode-id="7627" instrument_node=""> Acts and modes of communication can be represented digitally by combining multiple different forms of media into a composite helping to create an easy user experience .</span><sup class="reference" data-dcnode-id="7624" id="cite_ref-:18_18-0"><a data-dcnode-id="7625" href="#cite_note-:18-18"><span data-dcnode-id="7626" instrument_node="">[18]</span></a></sup><span data-dcnode-id="7623" instrument_node=""> The growing popularity of the internet </span><a data-dcnode-id="7621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meme" title="Meme"><span data-dcnode-id="7622" instrument_node="">meme</span></a><span data-dcnode-id="7620" instrument_node=""> is an example of combining, circulating, and delivering media in a collaborative effort through file sharing. Although memes are sent through microtransactions - they often can have a macro large scale impact.</span><sup class="reference" data-dcnode-id="7617" id="cite_ref-Shifman_2014_19-0"><a data-dcnode-id="7618" href="#cite_note-Shifman_2014-19"><span data-dcnode-id="7619" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7616" instrument_node=""> Another form of unique rhetorical delivery is the online encyclopedia which traditionally have been print form based primarily on text and images. However, modern technological developments now enable encyclopedias to integrate sound, animation, video, algorithmic search functions, and high-level productions into a cohesive multimedia experience as part of their new forms of digital rhetoric.</span><sup class="reference" data-dcnode-id="7613" id="cite_ref-:18_18-1"><a data-dcnode-id="7614" href="#cite_note-:18-18"><span data-dcnode-id="7615" instrument_node="">[18]</span></a></sup></li></ul><span data-dcnode-id="7610" instrument_node="">
</span><h3 data-dcnode-id="7600"><span class="mw-headline" data-dcnode-id="7608" id="Critical_literacy"><span data-dcnode-id="7609" instrument_node="">Critical literacy</span></span><span class="mw-editsection" data-dcnode-id="7601"><span class="mw-editsection-bracket" data-dcnode-id="7606"><span data-dcnode-id="7607" instrument_node="">[</span></span><a data-dcnode-id="7604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D8" title="Edit section: Critical literacy"><span data-dcnode-id="7605" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7602"><span data-dcnode-id="7603" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7599" instrument_node="">
</span><p data-dcnode-id="7569"><a data-dcnode-id="7597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Critical_literacy" title="Critical literacy"><span data-dcnode-id="7598" instrument_node="">Critical literacy</span></a><span data-dcnode-id="7596" instrument_node=""> is a line of thought that assumes all texts are </span><a data-dcnode-id="7594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bias" title="Bias"><span data-dcnode-id="7595" instrument_node="">biased</span></a><span data-dcnode-id="7593" instrument_node="">.</span><sup class="reference" data-dcnode-id="7590" id="cite_ref-20"><a data-dcnode-id="7591" href="#cite_note-20"><span data-dcnode-id="7592" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7589" instrument_node=""> For example, a study conducted at the Indiana University in Bloomington used algorithms to assess 14 million Twitter messages containing statements about the 2016 U.S. presidential campaign and election. They found that from May 2016 to March 2017, </span><a data-dcnode-id="7587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_bot" title="Social bot"><span data-dcnode-id="7588" instrument_node="">social bots</span></a><span data-dcnode-id="7586" instrument_node=""> were responsible for causing approximately 389,000 unsupported political claims to go viral.</span><sup class="reference" data-dcnode-id="7583" id="cite_ref-21"><a data-dcnode-id="7584" href="#cite_note-21"><span data-dcnode-id="7585" instrument_node="">[21]</span></a></sup><span data-dcnode-id="7582" instrument_node=""> Further, critical literacy can also be defined as a communicative tool to lead to social change and promote social action by using a critical lens when approaching social-political topics.</span><sup class="reference" data-dcnode-id="7579" id="cite_ref-22"><a data-dcnode-id="7580" href="#cite_note-22"><span data-dcnode-id="7581" instrument_node="">[22]</span></a></sup><span data-dcnode-id="7578" instrument_node=""> Since so much information is thrust at a digital audience, it's important for those who are being inundated with so much information develop the tools necessary to process and critically examine the works surrounding our topics of interest - and topics unknown.</span><sup class="reference" data-dcnode-id="7575" id="cite_ref-23"><a data-dcnode-id="7576" href="#cite_note-23"><span data-dcnode-id="7577" instrument_node="">[23]</span></a></sup><span data-dcnode-id="7574" instrument_node=""> In an essay on Critical Literacy in writing, the University of Melbourne states that it's important to develop these skills through reading and asking what texts are trying to accomplish, leaving it up to the reader to decide how ideas are interpreted.</span><sup class="reference" data-dcnode-id="7571" id="cite_ref-24"><a data-dcnode-id="7572" href="#cite_note-24"><span data-dcnode-id="7573" instrument_node="">[24]</span></a></sup><span data-dcnode-id="7570" instrument_node="">
</span></p><span data-dcnode-id="7568" instrument_node="">
</span><h3 data-dcnode-id="7558"><span class="mw-headline" data-dcnode-id="7566" id="Interactivity"><span data-dcnode-id="7567" instrument_node="">Interactivity</span></span><span class="mw-editsection" data-dcnode-id="7559"><span class="mw-editsection-bracket" data-dcnode-id="7564"><span data-dcnode-id="7565" instrument_node="">[</span></span><a data-dcnode-id="7562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D9" title="Edit section: Interactivity"><span data-dcnode-id="7563" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7560"><span data-dcnode-id="7561" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7557" instrument_node="">
</span><p data-dcnode-id="7548"><span data-dcnode-id="7556" instrument_node="">In regards to digital rhetoric, </span><a data-dcnode-id="7554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interactivity" title="Interactivity"><span data-dcnode-id="7555" instrument_node="">interactivity</span></a><span data-dcnode-id="7553" instrument_node=""> can be defined as the ways in which readers connect to and communicate with digital texts. For example, readers have the ability to like, share, repost, comment on, and remix online content. These simple interactions allow writers, scholars, and content creators to get a better idea of how their work is affecting their audience.</span><sup class="reference" data-dcnode-id="7550" id="cite_ref-:9_25-0"><a data-dcnode-id="7551" href="#cite_note-:9-25"><span data-dcnode-id="7552" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7549" instrument_node="">
</span></p><p data-dcnode-id="7546"><span data-dcnode-id="7547" instrument_node="">Ways communicators promote interactivity consist of the following:
</span></p><span data-dcnode-id="7545" instrument_node="">
</span><ul data-dcnode-id="7514"><li data-dcnode-id="7540"><i data-dcnode-id="7542"><a data-dcnode-id="7543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mind_share" title="Mind share"><span data-dcnode-id="7544" instrument_node="">Mind sharing</span></a></i><span data-dcnode-id="7541" instrument_node=""> is a way to get collective intelligence—crowd wisdom that is comparable to expert wisdom. The methodology consists of taking a consensus from the crowd—the answer that most minds are suggesting is the best answer. If it's a numeric question (like guessing the weight of an ox), it's a calculated average or median. If it's an open question (like "what car should I buy?"), it's the most common answer.</span></li><span data-dcnode-id="7539" instrument_node="">
</span><li data-dcnode-id="7531"><i data-dcnode-id="7536"><a data-dcnode-id="7537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multimodality" title="Multimodality"><span data-dcnode-id="7538" instrument_node="">Multimodality</span></a></i><span data-dcnode-id="7535" instrument_node=""> is a form of communication that uses multiple methods (or modes) to inform audiences of an idea. It can involve a mix of written text, pictures, audio, or videos. Online journals often embrace multimodality in their issues and articles by publishing works that use more than just written text to communicate the message. While the digital turn in rhetoric and composition has encouraged more discussion, theorization, and </span><a data-dcnode-id="7533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedagogy" title="Pedagogy"><span data-dcnode-id="7534" instrument_node="">pedagogical</span></a><span data-dcnode-id="7532" instrument_node=""> application of multimodality and multimodal texts, the history of the field demonstrates a continuous concern with multimodal communication beginning with classical rhetoric's concern with delivery, gesture, and memory. All writing and all communication is, theoretically, multimodal.</span></li><span data-dcnode-id="7530" instrument_node="">
</span><li data-dcnode-id="7515"><i data-dcnode-id="7527"><a data-dcnode-id="7528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Remix_culture" title="Remix culture"><span data-dcnode-id="7529" instrument_node="">Remix</span></a></i><span data-dcnode-id="7526" instrument_node=""> is a method of digital rhetoric that manipulates and transforms an original work to convey a new message. The use of remix can help the creator make an argument by connecting seemingly unrelated ideas into a convincing whole. As modern technology develops, self-publication sites such as: YouTube, SoundCloud, and </span><a data-dcnode-id="7524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WordPress" title="WordPress"><span data-dcnode-id="7525" instrument_node="">WordPress</span></a><span data-dcnode-id="7523" instrument_node=""> have stimulated remix culture, allowing for easier creation and dissemination of reworked content. Unlike appropriation, which is the use and potential recontextualization of existing material without significant modification, remix is defined in Kairos as "the process of taking old pieces of text, images, sounds, and video and stitching them together to form a new product".</span><sup class="reference" data-dcnode-id="7520" id="cite_ref-26"><a data-dcnode-id="7521" href="#cite_note-26"><span data-dcnode-id="7522" instrument_node="">[26]</span></a></sup><span data-dcnode-id="7519" instrument_node=""> A popular example of remixing is the creation and sharing of </span><a data-dcnode-id="7517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meme" title="Meme"><span data-dcnode-id="7518" instrument_node="">memes</span></a><span data-dcnode-id="7516" instrument_node="">.</span></li></ul><span data-dcnode-id="7513" instrument_node="">
</span><h3 data-dcnode-id="7503"><span class="mw-headline" data-dcnode-id="7511" id="Procedural_rhetoric"><span data-dcnode-id="7512" instrument_node="">Procedural rhetoric</span></span><span class="mw-editsection" data-dcnode-id="7504"><span class="mw-editsection-bracket" data-dcnode-id="7509"><span data-dcnode-id="7510" instrument_node="">[</span></span><a data-dcnode-id="7507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D10" title="Edit section: Procedural rhetoric"><span data-dcnode-id="7508" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7505"><span data-dcnode-id="7506" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7502" instrument_node="">
</span><p data-dcnode-id="7459"><a data-dcnode-id="7500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Procedural_rhetoric" title="Procedural rhetoric"><span data-dcnode-id="7501" instrument_node="">Procedural rhetoric</span></a><span data-dcnode-id="7499" instrument_node=""> is </span><a data-dcnode-id="7497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhetoric" title="Rhetoric"><span data-dcnode-id="7498" instrument_node="">rhetoric</span></a><span data-dcnode-id="7496" instrument_node=""> formed through processes or practices.</span><sup class="reference" data-dcnode-id="7493" id="cite_ref-:23_27-0"><a data-dcnode-id="7494" href="#cite_note-:23-27"><span data-dcnode-id="7495" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7492" instrument_node=""> Some scholars view </span><a data-dcnode-id="7490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game" title="Video game"><span data-dcnode-id="7491" instrument_node="">video games</span></a><span data-dcnode-id="7489" instrument_node=""> as one of these processes through which rhetoric can be formed.</span><sup class="reference" data-dcnode-id="7486" id="cite_ref-:23_27-1"><a data-dcnode-id="7487" href="#cite_note-:23-27"><span data-dcnode-id="7488" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="7483" id="cite_ref-:24_28-0"><a data-dcnode-id="7484" href="#cite_note-:24-28"><span data-dcnode-id="7485" instrument_node="">[28]</span></a></sup><span data-dcnode-id="7482" instrument_node=""> For example, </span><a class="mw-redirect" data-dcnode-id="7480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludology" title="Ludology"><span data-dcnode-id="7481" instrument_node="">Ludology</span></a><span data-dcnode-id="7479" instrument_node=""> scholar and game designer </span><a data-dcnode-id="7477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gonzalo_Frasca" title="Gonzalo Frasca"><span data-dcnode-id="7478" instrument_node="">Gonzalo Frasca</span></a><span data-dcnode-id="7476" instrument_node=""> poses that the simulation-nature of computers and video games offers a "natural medium for modeling reality and fiction".</span><sup class="reference" data-dcnode-id="7473" id="cite_ref-:24_28-1"><a data-dcnode-id="7474" href="#cite_note-:24-28"><span data-dcnode-id="7475" instrument_node="">[28]</span></a></sup><span data-dcnode-id="7472" instrument_node=""> Therefore, according to Frasca, video games can take on a new form of digital rhetoric in which reality is mimicked but also created for the future.</span><sup class="reference" data-dcnode-id="7469" id="cite_ref-:24_28-2"><a data-dcnode-id="7470" href="#cite_note-:24-28"><span data-dcnode-id="7471" instrument_node="">[28]</span></a></sup><span data-dcnode-id="7468" instrument_node=""> Similarly, scholar Ian Bogost argues that video games can serve as models for how 'real-world' cultural and social systems operate.</span><sup class="reference" data-dcnode-id="7465" id="cite_ref-:23_27-2"><a data-dcnode-id="7466" href="#cite_note-:23-27"><span data-dcnode-id="7467" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7464" instrument_node=""> They also argue for the necessity of literacy in playing video games as this allows players to challenge (and ultimately accept or reject) the rhetorical standpoints of these games.</span><sup class="reference" data-dcnode-id="7461" id="cite_ref-:23_27-3"><a data-dcnode-id="7462" href="#cite_note-:23-27"><span data-dcnode-id="7463" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7460" instrument_node="">
</span></p><span data-dcnode-id="7458" instrument_node="">
</span><h3 data-dcnode-id="7448"><span class="mw-headline" data-dcnode-id="7456" id="Rhetorical_velocity"><span data-dcnode-id="7457" instrument_node="">Rhetorical velocity</span></span><span class="mw-editsection" data-dcnode-id="7449"><span class="mw-editsection-bracket" data-dcnode-id="7454"><span data-dcnode-id="7455" instrument_node="">[</span></span><a data-dcnode-id="7452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D11" title="Edit section: Rhetorical velocity"><span data-dcnode-id="7453" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7450"><span data-dcnode-id="7451" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7447" instrument_node="">
</span><p data-dcnode-id="7417"><a data-dcnode-id="7445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhetorical_velocity" title="Rhetorical velocity"><span data-dcnode-id="7446" instrument_node="">Rhetorical velocity</span></a><span data-dcnode-id="7444" instrument_node=""> is the concept of authors writing in a way in which they are able to predict how their work might be recomposed. Digital rhetoric is often labelled using </span><a data-dcnode-id="7442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tag_%28metadata%29" title="Tag (metadata)"><span data-dcnode-id="7443" instrument_node="">tags</span></a><span data-dcnode-id="7441" instrument_node="">, for example, which are keywords that readers can type into </span><a class="mw-redirect" data-dcnode-id="7439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Web_search_engine" title="Web search engine"><span data-dcnode-id="7440" instrument_node="">search engines</span></a><span data-dcnode-id="7438" instrument_node=""> in order to help them find, view, and share relevant texts and information. These tags can be found on </span><a data-dcnode-id="7436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blog" title="Blog"><span data-dcnode-id="7437" instrument_node="">blog</span></a><span data-dcnode-id="7435" instrument_node=""> posts, news articles, </span><a data-dcnode-id="7433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academic_journal" title="Academic journal"><span data-dcnode-id="7434" instrument_node="">scholarly journals</span></a><span data-dcnode-id="7432" instrument_node="">, and more. Tagging allows writers, scholars, and content creators to organize their work and make it more accessible and understandable to readers.</span><sup class="reference" data-dcnode-id="7429" id="cite_ref-:9_25-1"><a data-dcnode-id="7430" href="#cite_note-:9-25"><span data-dcnode-id="7431" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7428" instrument_node=""> Therefore, it is important for them to be able to predict how their audience will recompose their works. Jim Ridolfo and Danielle DeVoss first coined this idea in 2009 when they describe </span><a data-dcnode-id="7426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhetorical_velocity" title="Rhetorical velocity"><span data-dcnode-id="7427" instrument_node="">rhetorical velocity</span></a><span data-dcnode-id="7425" instrument_node=""> as "a conscious rhetorical concern for distance, travel, speed, and time, pertaining specifically to theorizing instances of strategic </span><a data-dcnode-id="7423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Appropriation_of_knowledge" title="Appropriation of knowledge"><span data-dcnode-id="7424" instrument_node="">appropriation</span></a><span data-dcnode-id="7422" instrument_node=""> by a third party".</span><sup class="reference" data-dcnode-id="7419" id="cite_ref-29"><a data-dcnode-id="7420" href="#cite_note-29"><span data-dcnode-id="7421" instrument_node="">[29]</span></a></sup><span data-dcnode-id="7418" instrument_node="">
</span></p><p data-dcnode-id="7402"><span data-dcnode-id="7416" instrument_node="">Appropriation carries both positive and negative </span><a data-dcnode-id="7414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Connotation" title="Connotation"><span data-dcnode-id="7415" instrument_node="">connotations</span></a><span data-dcnode-id="7413" instrument_node=""> for rhetorical velocity. In some ways, appropriation is a tool that can be used for the reapplication of outdated ideas to make them better. In other ways, appropriation is seen as a threat to creative and cultural identities. </span><a data-dcnode-id="7411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_media" title="Social media"><span data-dcnode-id="7412" instrument_node="">Social media</span></a><span data-dcnode-id="7410" instrument_node=""> receives the bulk of this scrutiny due to the lack of </span><a data-dcnode-id="7408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Education" title="Education"><span data-dcnode-id="7409" instrument_node="">education</span></a><span data-dcnode-id="7407" instrument_node=""> of its users. Most "contributors are often unaware of what they are contributing",</span><sup class="reference" data-dcnode-id="7404" id="cite_ref-30"><a data-dcnode-id="7405" href="#cite_note-30"><span data-dcnode-id="7406" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7403" instrument_node=""> which perpetuates the negative connotation. Many scholars in digital rhetoric explore this topic and its effects on society such as Jessica Reyman, Amy Hea, and Johndan Johnson-Eilola.
</span></p><span data-dcnode-id="7401" instrument_node="">
</span><h3 data-dcnode-id="7391"><span class="mw-headline" data-dcnode-id="7399" id="Visual_rhetoric"><span data-dcnode-id="7400" instrument_node="">Visual rhetoric</span></span><span class="mw-editsection" data-dcnode-id="7392"><span class="mw-editsection-bracket" data-dcnode-id="7397"><span data-dcnode-id="7398" instrument_node="">[</span></span><a data-dcnode-id="7395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D12" title="Edit section: Visual rhetoric"><span data-dcnode-id="7396" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7393"><span data-dcnode-id="7394" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7390" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7381"><div class="thumbinner" data-dcnode-id="7382" style="width:216px;"><a class="image" data-dcnode-id="7388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AExample_of_modern_internet_meme.jpg"><img alt="" class="thumbimage" data-dcnode-id="7389" data-file-height="398" data-file-width="520" decoding="async" height="164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Example_of_modern_internet_meme.jpg/214px-Example_of_modern_internet_meme.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Example_of_modern_internet_meme.jpg/321px-Example_of_modern_internet_meme.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Example_of_modern_internet_meme.jpg/428px-Example_of_modern_internet_meme.jpg 2x" width="214"></a><span data-dcnode-id="7387" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7383"><div class="magnify" data-dcnode-id="7385"><a class="internal" data-dcnode-id="7386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AExample_of_modern_internet_meme.jpg" title="Enlarge"></a></div><span data-dcnode-id="7384" instrument_node="">First, an "initial" meme is created to illustrate some joke or idea.</span></div></div></div><span data-dcnode-id="7380" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7371"><div class="thumbinner" data-dcnode-id="7372" style="width:158px;"><a class="image" data-dcnode-id="7378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmoji_u270a.svg"><img alt="" class="thumbimage" data-dcnode-id="7379" data-file-height="128" data-file-width="128" decoding="async" height="156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Emoji_u270a.svg/156px-Emoji_u270a.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Emoji_u270a.svg/234px-Emoji_u270a.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Emoji_u270a.svg/312px-Emoji_u270a.svg.png 2x" width="156"></a><span data-dcnode-id="7377" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7373"><div class="magnify" data-dcnode-id="7375"><a class="internal" data-dcnode-id="7376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmoji_u270a.svg" title="Enlarge"></a></div><span data-dcnode-id="7374" instrument_node="">The "default" skin tone for emojis is yellow.</span></div></div></div><p data-dcnode-id="7331"><span data-dcnode-id="7370" instrument_node="">
Digital rhetoric often invokes </span><a data-dcnode-id="7368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visual_rhetoric" title="Visual rhetoric"><span data-dcnode-id="7369" instrument_node="">visual rhetoric</span></a><span data-dcnode-id="7367" instrument_node=""> due to digital rhetoric's reliance on visuals.</span><sup class="reference" data-dcnode-id="7364" id="cite_ref-Eyman2015_2-1"><a data-dcnode-id="7365" href="#cite_note-Eyman2015-2"><span data-dcnode-id="7366" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7363" instrument_node=""> Charles Hill states that images "do not necessarily have to portray an object, or even a class of objects, that exists or ever did exist" to remain impactful.</span><sup class="reference" data-dcnode-id="7360" id="cite_ref-31"><a data-dcnode-id="7361" href="#cite_note-31"><span data-dcnode-id="7362" instrument_node="">[31]</span></a></sup><span data-dcnode-id="7359" instrument_node=""> However, the use of imagery for rhetorical purposes in digital spaces can't always be easily differentiated from "traditional" physical visual mediums. As such, approaching this concept requires a careful analysis of the viewer, situational, and visual contexts involved.</span><sup class="reference" data-dcnode-id="7356" id="cite_ref-32"><a data-dcnode-id="7357" href="#cite_note-32"><span data-dcnode-id="7358" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7355" instrument_node="">  A prominent part of this concept is its intersection of perspective with technology, as computers allow users to create a curated view for online space. </span><a data-dcnode-id="7353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_media" title="Social media"><span data-dcnode-id="7354" instrument_node="">Social media</span></a><span data-dcnode-id="7352" instrument_node=""> platforms like </span><a data-dcnode-id="7350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Instagram" title="Instagram"><span data-dcnode-id="7351" instrument_node="">Instagram</span></a><span data-dcnode-id="7349" instrument_node="">,</span><sup class="reference" data-dcnode-id="7346" id="cite_ref-33"><a data-dcnode-id="7347" href="#cite_note-33"><span data-dcnode-id="7348" instrument_node="">[33]</span></a></sup><span data-dcnode-id="7345" instrument_node=""> incredibly realistic </span><a data-dcnode-id="7343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deepfake" title="Deepfake"><span data-dcnode-id="7344" instrument_node="">deepfakes</span></a><span data-dcnode-id="7342" instrument_node="">,</span><sup class="reference" data-dcnode-id="7339" id="cite_ref-34"><a data-dcnode-id="7340" href="#cite_note-34"><span data-dcnode-id="7341" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7338" instrument_node=""> editing software like </span><a data-dcnode-id="7336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adobe_Photoshop" title="Adobe Photoshop"><span data-dcnode-id="7337" instrument_node="">Photoshop</span></a><span data-dcnode-id="7335" instrument_node="">, and even behind-the-scenes preference </span><a data-dcnode-id="7333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Algorithm" title="Algorithm"><span data-dcnode-id="7334" instrument_node="">algorithms</span></a><span data-dcnode-id="7332" instrument_node=""> all illustrate how the tactile-visual internet heavily relies on and adapts principles of visual rhetoric.</span></p><div class="thumb tleft" data-dcnode-id="7322"><div class="thumbinner" data-dcnode-id="7323" style="width:216px;"><a class="image" data-dcnode-id="7329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADeepfryed_internet_meme.png"><img alt="" class="thumbimage" data-dcnode-id="7330" data-file-height="397" data-file-width="520" decoding="async" height="163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Deepfryed_internet_meme.png/214px-Deepfryed_internet_meme.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Deepfryed_internet_meme.png/321px-Deepfryed_internet_meme.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Deepfryed_internet_meme.png/428px-Deepfryed_internet_meme.png 2x" width="214"></a><span data-dcnode-id="7328" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7324"><div class="magnify" data-dcnode-id="7326"><a class="internal" data-dcnode-id="7327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADeepfryed_internet_meme.png" title="Enlarge"></a></div><span data-dcnode-id="7325" instrument_node="">Then, another user modifies the original to illustrate their own idea; in this image, a "deep fried" effect is added to distort the image.</span></div></div></div><span data-dcnode-id="7321" instrument_node="">
</span><p data-dcnode-id="7305"><span data-dcnode-id="7320" instrument_node="">Digitally-produced art is a significant way users express themselves on technological platforms; the unique intersection of text and image has given rise to new rhetorical language through the modification of slang and ingroup language.</span><sup class="reference" data-dcnode-id="7317" id="cite_ref-35"><a data-dcnode-id="7318" href="#cite_note-35"><span data-dcnode-id="7319" instrument_node="">[35]</span></a></sup><span data-dcnode-id="7316" instrument_node=""> In particular, the culturally-specific and nuanced use of pop culture references through </span><a data-dcnode-id="7314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet_meme" title="Internet meme"><span data-dcnode-id="7315" instrument_node="">internet memes</span></a><span data-dcnode-id="7313" instrument_node=""> have gradually built upon themselves to create complex, highly flexible, and internet-specific (or even platform-specific) dialects of speech.</span><sup class="reference" data-dcnode-id="7310" id="cite_ref-36"><a data-dcnode-id="7311" href="#cite_note-36"><span data-dcnode-id="7312" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7309" instrument_node=""> Through popularity-based </span><a data-dcnode-id="7307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_selection" title="Natural selection"><span data-dcnode-id="7308" instrument_node="">natural selection</span></a><span data-dcnode-id="7306" instrument_node="">, edits of commonly accepted meme templates fuel the cycle of rhetorical creation.
</span></p><p data-dcnode-id="7286"><span data-dcnode-id="7304" instrument_node="">Digital-visual rhetoric doesn't only rely on intentional manipulation. Sometimes, meanings can arise from unexpected places and otherwise-overlooked features. For example, </span><a data-dcnode-id="7302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emoji" title="Emoji"><span data-dcnode-id="7303" instrument_node="">emojis</span></a><span data-dcnode-id="7301" instrument_node="">, or simple graphic images included in most texting applications, can carry heavy consequences by permeating daily communication. Varying skin tones provided (or excluded) by developers for emojis may perpetuate preexisting racial biases of </span><a class="mw-redirect" data-dcnode-id="7299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colorism" title="Colorism"><span data-dcnode-id="7300" instrument_node="">colorism</span></a><span data-dcnode-id="7298" instrument_node="">.</span><sup class="reference" data-dcnode-id="7295" id="cite_ref-:4_37-0"><a data-dcnode-id="7296" href="#cite_note-:4-37"><span data-dcnode-id="7297" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7294" instrument_node=""> Even otherwise-innocuous images of peaches and eggplants are regular stand-ins for genital regions; they can be both harmless modes of flirtation and even tools for </span><a data-dcnode-id="7292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_harassment" title="Sexual harassment"><span data-dcnode-id="7293" instrument_node="">sexually harassing</span></a><span data-dcnode-id="7291" instrument_node=""> women online when sent en masse.</span><sup class="reference" data-dcnode-id="7288" id="cite_ref-:4_37-1"><a data-dcnode-id="7289" href="#cite_note-:4-37"><span data-dcnode-id="7290" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7287" instrument_node="">
</span></p><p data-dcnode-id="7234"><span data-dcnode-id="7285" instrument_node="">The concept of the </span><a data-dcnode-id="7283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avatar_%28computing%29" title="Avatar (computing)"><span data-dcnode-id="7284" instrument_node="">avatar</span></a><span data-dcnode-id="7282" instrument_node=""> can also aid understanding of visual rhetoric's deeply personal impact, particularly when using James E. Porter's definition of the avatar as an extended "virtual body."</span><sup class="reference" data-dcnode-id="7279" id="cite_ref-Porter_38-0"><a data-dcnode-id="7280" href="#cite_note-Porter-38"><span data-dcnode-id="7281" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7278" instrument_node=""> While scholars such as Beth Kolko hoped for an equitable online world free of physical barriers, </span><a data-dcnode-id="7276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_issue" title="Social issue"><span data-dcnode-id="7277" instrument_node="">social issues</span></a><span data-dcnode-id="7275" instrument_node=""> still persist in digital realms, such as </span><a class="mw-redirect" data-dcnode-id="7273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender_discrimination" title="Gender discrimination"><span data-dcnode-id="7274" instrument_node="">gender discrimination</span></a><span data-dcnode-id="7272" instrument_node=""> and </span><a data-dcnode-id="7270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Racism" title="Racism"><span data-dcnode-id="7271" instrument_node="">racism</span></a><span data-dcnode-id="7269" instrument_node="">.</span><sup class="reference" data-dcnode-id="7266" id="cite_ref-Kolko_39-0"><a data-dcnode-id="7267" href="#cite_note-Kolko-39"><span data-dcnode-id="7268" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7265" instrument_node=""> For example, Victoria Woolums found that, in the video game </span><a data-dcnode-id="7263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_of_Warcraft" title="World of Warcraft"><span data-dcnode-id="7264" instrument_node="">World of Warcraft</span></a><span data-dcnode-id="7262" instrument_node="">, an avatar's gender identity instigated </span><a data-dcnode-id="7260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bias" title="Bias"><span data-dcnode-id="7261" instrument_node="">bias</span></a><span data-dcnode-id="7259" instrument_node=""> from other characters even though an avatar's </span><a data-dcnode-id="7257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender_identity" title="Gender identity"><span data-dcnode-id="7258" instrument_node="">gender identity</span></a><span data-dcnode-id="7256" instrument_node=""> may not be physically accurate to its user.</span><sup class="reference" data-dcnode-id="7253" id="cite_ref-40"><a data-dcnode-id="7254" href="#cite_note-40"><span data-dcnode-id="7255" instrument_node="">[40]</span></a></sup><span data-dcnode-id="7252" instrument_node=""> These relationships are further complicated by the varying degrees of anonymity characterizing inter-user communications in online spaces. While the possibility of true privacy can be facilitated by impersonal avatars, they are still personal manifestations of a user's self in the context of digital spaces.</span><sup class="reference" data-dcnode-id="7249" id="cite_ref-:22_41-0"><a data-dcnode-id="7250" href="#cite_note-:22-41"><span data-dcnode-id="7251" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7248" instrument_node=""> Furthermore, the tools available to curate and express these are platform-dependent and ripe for both liberation and exploitation. Be it 2014's </span><a data-dcnode-id="7246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamergate_%28harassment_campaign%29" title="Gamergate (harassment campaign)"><span data-dcnode-id="7247" instrument_node="">Gamergate</span></a><span data-dcnode-id="7245" instrument_node=""> or the more recent debates regarding social media </span><a data-dcnode-id="7243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet_celebrity" title="Internet celebrity"><span data-dcnode-id="7244" instrument_node="">influencer</span></a><span data-dcnode-id="7242" instrument_node=""> culture and their portrayals of impossible and computer-edited </span><a data-dcnode-id="7240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Body_image" title="Body image"><span data-dcnode-id="7241" instrument_node="">body image</span></a><span data-dcnode-id="7239" instrument_node="">, self-presentation is heavily mediated by accessibility to and mastery of online avatars.</span><sup class="reference" data-dcnode-id="7236" id="cite_ref-:22_41-1"><a data-dcnode-id="7237" href="#cite_note-:22-41"><span data-dcnode-id="7238" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7235" instrument_node="">
</span></p><span data-dcnode-id="7233" instrument_node="">
</span><h2 data-dcnode-id="7223"><span class="mw-headline" data-dcnode-id="7231" id="Forms_and_Objects_of_Study"><span data-dcnode-id="7232" instrument_node="">Forms and Objects of Study</span></span><span class="mw-editsection" data-dcnode-id="7224"><span class="mw-editsection-bracket" data-dcnode-id="7229"><span data-dcnode-id="7230" instrument_node="">[</span></span><a data-dcnode-id="7227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D13" title="Edit section: Forms and Objects of Study"><span data-dcnode-id="7228" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7225"><span data-dcnode-id="7226" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7222" instrument_node="">
</span><h3 data-dcnode-id="7212"><span class="mw-headline" data-dcnode-id="7220" id="Infrastructure"><span data-dcnode-id="7221" instrument_node="">Infrastructure</span></span><span class="mw-editsection" data-dcnode-id="7213"><span class="mw-editsection-bracket" data-dcnode-id="7218"><span data-dcnode-id="7219" instrument_node="">[</span></span><a data-dcnode-id="7216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D14" title="Edit section: Infrastructure"><span data-dcnode-id="7217" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7214"><span data-dcnode-id="7215" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7211" instrument_node="">
</span><p data-dcnode-id="7197"><span data-dcnode-id="7210" instrument_node="">Information infrastructure is the invisible force that organizes the public's information on the internet.</span><sup class="reference" data-dcnode-id="7207" id="cite_ref-Johnson_42-0"><a data-dcnode-id="7208" href="#cite_note-Johnson-42"><span data-dcnode-id="7209" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7206" instrument_node=""> Essentially, information infrastructure is what impacts how and what the public accesses on the internet.</span><sup class="reference" data-dcnode-id="7203" id="cite_ref-Johnson_42-1"><a data-dcnode-id="7204" href="#cite_note-Johnson-42"><span data-dcnode-id="7205" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7202" instrument_node=""> Databases and search engines are information infrastructure as they play a large role in access to and dissemination of information. Information Infrastructure often consists of algorithms and metadata standards, which curate the information presented to the public.</span><sup class="reference" data-dcnode-id="7199" id="cite_ref-43"><a data-dcnode-id="7200" href="#cite_note-43"><span data-dcnode-id="7201" instrument_node="">[43]</span></a></sup><span data-dcnode-id="7198" instrument_node="">
</span></p><span data-dcnode-id="7196" instrument_node="">
</span><h4 data-dcnode-id="7186"><span class="mw-headline" data-dcnode-id="7194" id="Software"><span data-dcnode-id="7195" instrument_node="">Software</span></span><span class="mw-editsection" data-dcnode-id="7187"><span class="mw-editsection-bracket" data-dcnode-id="7192"><span data-dcnode-id="7193" instrument_node="">[</span></span><a data-dcnode-id="7190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D15" title="Edit section: Software"><span data-dcnode-id="7191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7188"><span data-dcnode-id="7189" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7185" instrument_node="">
</span><p data-dcnode-id="7149"><a data-dcnode-id="7183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_programming" title="Computer programming"><span data-dcnode-id="7184" instrument_node="">Coding</span></a><span data-dcnode-id="7182" instrument_node=""> and </span><a data-dcnode-id="7180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Software" title="Software"><span data-dcnode-id="7181" instrument_node="">software</span></a><span data-dcnode-id="7179" instrument_node=""> engineering are not often recognized as rhetorical writing practices, but in the process of writing </span><a data-dcnode-id="7177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Code" title="Code"><span data-dcnode-id="7178" instrument_node="">code</span></a><span data-dcnode-id="7176" instrument_node="">, people instruct machines to "make arguments and judgments and address audiences both mechanic and human."</span><sup class="reference" data-dcnode-id="7173" id="cite_ref-:34_44-0"><a data-dcnode-id="7174" href="#cite_note-:34-44"><span data-dcnode-id="7175" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7172" instrument_node=""> Technologies themselves can be viewed as rhetorical </span><a data-dcnode-id="7170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genre" title="Genre"><span data-dcnode-id="7171" instrument_node="">genres</span></a><span data-dcnode-id="7169" instrument_node="">, simultaneously guiding users' experiences and communication with each other and being shaped and improved through humans use.</span><sup class="reference" data-dcnode-id="7166" id="cite_ref-:32_45-0"><a data-dcnode-id="7167" href="#cite_note-:32-45"><span data-dcnode-id="7168" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7165" instrument_node=""> Choices baked into software that are invisible to users impact the user experience and reveal information about the priorities of the software engineers.</span><sup class="reference" data-dcnode-id="7162" id="cite_ref-46"><a data-dcnode-id="7163" href="#cite_note-46"><span data-dcnode-id="7164" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7161" instrument_node=""> For instance, while </span><a data-dcnode-id="7159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Facebook" title="Facebook"><span data-dcnode-id="7160" instrument_node="">Facebook</span></a><span data-dcnode-id="7158" instrument_node=""> allows users to choose over 50 gender identities to display on their public profile, an investigation into the social media's software revealed that users are filtered into the male-female gender binary within the database for targeted advertising purposes.</span><sup class="reference" data-dcnode-id="7155" id="cite_ref-47"><a data-dcnode-id="7156" href="#cite_note-47"><span data-dcnode-id="7157" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7154" instrument_node=""> For another example, pieces of software called bittorrent trackers facilitate the massive distribution of information on Wikipedia.</span><sup class="reference" data-dcnode-id="7151" id="cite_ref-:32_45-1"><a data-dcnode-id="7152" href="#cite_note-:32-45"><span data-dcnode-id="7153" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7150" instrument_node=""> Software facilitates the collective rhetorical action of this encyclopedia.
</span></p><p data-dcnode-id="7140"><span data-dcnode-id="7148" instrument_node="">The field of </span><a data-dcnode-id="7146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Software_studies" title="Software studies"><span data-dcnode-id="7147" instrument_node="">software studies</span></a><span data-dcnode-id="7145" instrument_node=""> encourages the investigation into and recognition of software's impacts on people and culture.</span><sup class="reference" data-dcnode-id="7142" id="cite_ref-:34_44-1"><a data-dcnode-id="7143" href="#cite_note-:34-44"><span data-dcnode-id="7144" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7141" instrument_node="">
</span></p><span data-dcnode-id="7139" instrument_node="">
</span><h3 data-dcnode-id="7129"><span class="mw-headline" data-dcnode-id="7137" id="People"><span data-dcnode-id="7138" instrument_node="">People</span></span><span class="mw-editsection" data-dcnode-id="7130"><span class="mw-editsection-bracket" data-dcnode-id="7135"><span data-dcnode-id="7136" instrument_node="">[</span></span><a data-dcnode-id="7133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D16" title="Edit section: People"><span data-dcnode-id="7134" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7131"><span data-dcnode-id="7132" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7128" instrument_node="">
</span><h4 data-dcnode-id="7118"><span class="mw-headline" data-dcnode-id="7126" id="Online_communities"><span data-dcnode-id="7127" instrument_node="">Online communities</span></span><span class="mw-editsection" data-dcnode-id="7119"><span class="mw-editsection-bracket" data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">[</span></span><a data-dcnode-id="7122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDigital_rhetoric%26action%3Dedit%26section%3D17" title="Edit section: Online communities"><span data-dcnode-id="7123" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7120"><span data-dcnode-id="7121" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7117" instrument_node="">
</span><p data-dcnode-id="7097"><a class="mw-redirect" data-dcnode-id="7115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Online_communities" title="Online communities"><span data-dcnode-id="7116" instrument_node="">Online communities</span></a><span data-dcnode-id="7114" instrument_node=""> are groups of people with a common interests that interact and engage over the Internet. Many online communities are found within social networking sites, online forums, and chat rooms, such as </span><a data-dcnode-id="7112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Facebook" title="Facebook"><span data-dcnode-id="7113" instrument_node="">Facebook</span></a><span data-dcnode-id="7111" instrument_node="">, </span><a data-dcnode-id="7109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twitter" title="Twitter"><span data-dcnode-id="7110" instrument_node="">Twitter</span></a><span data-dcnode-id="7108" instrument_node="">, </span><a data-dcnode-id="7106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reddit" title="Reddit"><span data-dcnode-id="7107" instrument_node="">Reddit</span></a><span data-dcnode-id="7105" instrument_node="">, </span><a data-dcnode-id="7103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/4chan" title="4chan"><span data-dcnode-id="7104" instrument_node="">4chan</span></a><span data-dcnode-id="7102" instrument_node="">, etc., where members can share and discuss information and inquiries.</span><sup class="reference" data-dcnode-id="7099" id="cite_ref-48"><a data-dcnode-id="7100" href="#cite_note-48"><span data-dcnode-id="7101" instrument_node="">[48]</span></a></sup><span data-dcnode-id="7098" instrument_node=""> These online spaces often establish their own rules, norms, and culture, and in some cases, users will adopt community-specific terminology or phrases.
