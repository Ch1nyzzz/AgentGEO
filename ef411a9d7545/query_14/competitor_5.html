</span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1896"><p class="tml-image--caption" data-dcnode-id="1900" itemprop="caption"><span data-dcnode-id="1901" instrument_node="">Donald Trump in his prime</span></p><p class="tml-image--attribution" data-dcnode-id="1897" itemprop="author"><span data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Google Images</span></span></p></figcaption></figure></div><h2 data-dcnode-id="1892" id="like-fred-trump-like-son"><span data-dcnode-id="1893" instrument_node="">Like Fred Trump Like Son</span></h2><h3 data-dcnode-id="1889" id="the-influence-of-donald-s-father-fred-trump"><strong data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">The Influence of Donald's Father, Fred Trump</span></strong></h3><p data-dcnode-id="1883"><span data-dcnode-id="1888" instrument_node="">Donald studied and admired his father, Fred Trump. He witnessed first hand that Fred Trump commanded respect through his intelligence and business savvy. Fred grew up in Queens, and his own father was also an entrepreneur, but he died when Fred was only 13. Fred once told </span><em data-dcnode-id="1885"><a data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vanityfair.com/magazine/2015/07/donald-ivana-trump-divorce-prenup-marie-brenner" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1887" instrument_node="">Vanity Fair</span></a></em><span data-dcnode-id="1884" instrument_node=""> that his family was so poor that his mother had to take up stitching to keep them going. Fred Trump never complained about his sad circumstances, instead, like a good old fashioned American, he began laboring hard while honing his talent and leadership nature to not only put food on the table but to keep his entire family comfortable. Fred looked around at what was happening in the world and came up with an original idea. He began designing and building prefab garages while he was still in high school—a brilliant move in a time when the automobile was becoming a staple in every household, but most homes that existed were built without garages, many homes had a storage shed that could only hold a wagon to pull by horses. Fred Trump was a born entrepreneur. He sold the units for a major profit for himself and a reasonable price for the customers. At the age of 15, he was too young to sign checks, so he formed a business with his mother called E. Trump &amp; Son and she signed the checks for him.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="1880"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="1881" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;], </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1815"><p class="tml-image--caption" data-dcnode-id="1819" itemprop="caption"><span data-dcnode-id="1820" instrument_node="">Donald Trump: master promoter and marketing genius</span></p><p class="tml-image--attribution" data-dcnode-id="1816" itemprop="author"><span data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Google Images</span></span></p></figcaption></figure></div><h2 data-dcnode-id="1811" id="donald-s-dream"><span data-dcnode-id="1812" instrument_node="">Donald's Dream </span></h2><h3 data-dcnode-id="1808" id="his-ambition-for-wealth"><strong data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">His Ambition for Wealth</span></strong></h3><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Donald Trump could have easily settled into obscurity by riding his father's coat tails. He could have had an easy and stress free life, but Trump is made of something entirely different from the average man. It states clearly in Art of The Deal, Donald Trump's first book, "I do it to do it". Trump was pointing out that he does not do all the things he does for money because he could have easily retired in great wealth long ago, Donald is driven to accomplish for the sake of accomplishment alone. Great credit is due to Donald for taking the ball and running with it. These days it is all too common from those who still watch CNN to cry that he was lucky and, therefore, should not be given credit for his success. Trump was fortunate that he had a father like Fred Trump to observe and act as role model. However, the truth is that most children who are born to wealth achieve neither Trump's name recognition nor net worth. Donald Trump has made a lot more money than his father had ever dreamed of, which says a lot about the younger Trump's work ethic and dedication.</span></p><aside class="m-in-content-ad-row l-inline not-size-a ndown.com/celebrities&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1718"></phoenix-ad></div></aside><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">In the early '70s, Ivana was married to a fellow skier, but the marriage was later reported to be in name only so as to help Ivana attain citizenship and keep the communist leaders off her tail. She met Trump in New York while promoting the Olympic Games.</span></p><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">After dating for a year, Donald and Ivana married on Easter Sunday in 1977. It was a grand and lavish ceremony that became the major society event of the decade. After their wedding, the Trumps were a solid business team, taking on major projects such as the construction of the Grand Hyatt Hotel and Trump Plaza, and just one year after their marriage, Donald Trump Jr. was born. The couple would eventually have three children together who would grow up to be solid and accomplished citizens just like their parents. </span></p><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Donald Trump was both handsome and wealthy at this time of his life, but, even more important to a young lady like Ivana, he had a heart and regularly helped out people in need. Trump's good deeds in the 70s were admirable, but not very news worthy due to he not being a celebrity yet, but young Donald Trump would periodically be moved by stories of poor people losing their homes and take great delight in stopping the banks from foreclosing by paying off their mortgages for them. He would have mortgage burning ceremonies in which the whole neighborhood would become involved.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c"  the stories and the photos of Marla with Donald on the covers of all the gossip magazines.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="1498"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="1499" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90& d Marla and the two had a child they named Tiffany, after Tiffany &amp; Co. The new marriage was not a happy one, and this time in his life was perhaps Trump's lowest point. He had been married to a great woman but wanted to have his cake and eat it too, believing that he could have an affair while continuing his marriage to Ivana. Trump was forced to learn a valuable lesson. He lost his reputation as a respectable businessman and was viewed from that point on as a man who would use his wealth just to cheat on his wife. It seems only Bill Clinton or a Kennedy can get away with being a cheat and live with no regrets.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-7" data-dcnode-id="1423"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-7" data-dcnode-id="1424" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot ite&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-b4f06d094b3c43e8ac43faddbfecd12a&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-8&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;8&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;8&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-b4f06d094b3c43e8ac43faddbfecd12a&quot;,&quot;adUnitPath&quot;:&quot;/88059007/reelrundown.com/celebrities&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1416"></phoenix-ad></div></aside><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">If it bothered Trump that his image had been forever damaged he did not let it show. He just went with the flow and decided to profit on the new image that he was now facing. No matter what happens Donald does not waste any time. He takes the ball and runs with it. For some time thereafter, he was notorious. He was a guy who had cheated on his beautiful family with a beauty queen and then divorced his wife to marry this girl. He used this reckless reputation in commercials for insurance companies and money was coming in faster than ever.</span></p><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">It has been stated in the media that Donald Trump went bankrupt somewhere in this time. These are stories that make people buy magazines but this is simply not true. During the early '90s, he went into debt by several million on some of his ventures. The media had a field day as it loves to elaborate on misfortune more than it likes to give credit where credit is due. The public considered Donald Trump to be cocky and arrogant during his relationship with Marla Maples, and it was published that he himself was bankrupt which would sell by exciting people into thinking that a rich person can just simply fall from grace and have to get a job at McDonald's. Trump is a self made billionaire and when one has that kind of talent it simply does not disappear. Wealthy people frequently have losing deals. They are always in a state of winning and losing. Sometimes what looks like a bad investment is just a tax write off to offset other ventures that art doing well. Trump's success did take a dip during a stormy period. It's one thing to play arrogant to the cameras and quite another to actually believe that wealth comes easily. Donald Trump put his nose to the grindstone and focused on rebuilding his wealth. Friends of Donald have said that he regretted cheating on Ivana and marrying Marla, but Trump would never state anything like this to the press because he has a daughter with Marla whom he loves dearly. Donald did not wallow in his mistakes, he continued to rebuild and learn valuable lessons from his life experiences.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dc p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">The couple divorced in 1999. It has been speculated that Marla was seeing another man, Michael Mailer, for about one year before she and Donald divorced. What is known for a fact is that she had met Mailer while performing a bit part in a movie he was directing in 1998, and they announced their engagement several months after her divorce. Unfortunately, Mailer broke off the engagement and married someone else.</span></p><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">After Marla married Trump, she was set for life. She would walk away from her saga with "The Donald" as a multi-millionairess and the mother of Tiffany, heir to the Donald Trump estate. What's more, she also would walk away as a celebrity; Marla is regularly asked to do television interviews about her relationship with Trump.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-10" data-dcnode-id="1382"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-10" data-dcnode-id="1383" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-fec9b8959cff4 ara left A.J. soon after meeting Mr. Trump. Not only was Donald a powerful and exciting suitor, but he possessed some traits that Kara found fascinating. Unlike many beautiful women who are attracted to modeling, Kara was also interested in business and entrepreneurship. She and Donald could talk for hours about the subject and Kara knew that she could learn something useful from every conversation she had with her exciting new boyfriend.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="1304"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="1305" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-1ebebd3d397e4e5cb205c66ac3a85500&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-11&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;11&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;11&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-1ebebd3d397e4e5cb205c66ac3a85500&quot;,&quot;adUnitPath&quot;:&quot;/88059007/reelrundown.com/celebrities&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1306"></phoenix-ad></div></aside><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">It is unclear why the couple did not continue with their relationship. It could be that Kara was too ambitious in her own right to live with Donald, that Donald did not wish to pair himself with yet another model/actress for the long haul, or, even more likely, that Donald had someone else on his mind. Radio show host, Howard Stearn was interested in the love triangle of A.J, Trump and Kara, so he arranged for her to be on his show to talk about it in what would become an embarrassing and awkward situation for Kara Young because Donald told listeners that he and Kara were no longer together. Either way, Kara went on to become a respected Fox News correspondent and Trump took his millions and moved on.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-10" data-dcnode-id="1299"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-10" da  packed it in and just thrown in the towel.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-13" data-dcnode-id="1136"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-13" data-dcnode-id="1137" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&qu ng in 2016. Because the Obama Presidency was so disastrous, there was a healthy silent majority who were open to what America was in need of, basically the exact opposite of what Obama brought.  Barack Obama never built anything himself or held down any normal jobs, just as the Kennedys had always have never really done anything. After Americans were hit with more expense than ever they were no longer naive about politicians touting socialism, and "free healthcare". They wanted a system that would make sense and they were no longer going to fall for the democrats telling the same story over and over. That the Republican running is a racist. Obama and the Kennedy's were not looking good after eight years of a struggling economy and healthcare in tangles.  Americans were suspicious of democrats and their ability to truly lead real people. During the Obama administration it was apparent that Obama care would cost Americans not only a fortune, but some of their own freedom. Also, race relations were at an all time low, not to mention the economy was just chugging along. Many hard-working Americans simply did not relate to Obama at all. Trump, on the other hand, has had to fight to get permits, he's gone through the rigors of hiring employees, and has created thousands of jobs and many businesses.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-14" data-dcnode-id="1112"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-14" data-dcnode-id="1113" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&q nd desperate as they do all they can to undermine him, but, they are up against something bigger than they are, they are up against President Donald Trump; the man who can make America Great Again.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-18" data-dcnode-id="1082"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-18" data-dcnode-id="1083" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-6d3a18e9f743487791a615c1140111d2&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-18&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;18&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&qu data-dcnode-id="828" instrument_node="">Birther Trump is our last best hope to save America and do what Obama has done.  As a former political-junkie and GOP activist I have finally come to see the light. Republicans are in effect Nazis. Democrats are commies. Betwixt them both you see they are making socialism the worldwide economic system. About 1968 the global-elite launched a scheme to cheapen U.S. made goods and heap praise on Japanese-made automobiles, motorcycles, stereos and other electronics. They used the left-leaning unions to continually demand higher wages for doing less and less work and thereby producing inferior products. Remember when AMF took over Harley-Davidson? Remember when Chicago-made Schwinn was the best quality bicycle and Timex watches could "take a licking and keep on ticking"? Mergers were supposedly required so stockholders could get windfalls and suddenly industry was laden with grossly overpaid CEOs. Many manufacturers were moved overseas where labor was cheap, safety standards much lower and profits much higher. The gist of it was to destroy unions and prop up developing and third-world nations. Slowly us consumers bought into it literally. Try finding "Made in USA" on any product in Target, Walmart or Shopko today! Obama has said he was sympathetic to their cause but that "unions are standing in the way of globalization ". I contend that both the Republicans and the Democrats are reading from the exact same script for their New World Order.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-23" data-dcnode-id="824"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-23" data-dcnode-id="825" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseB ata-dcnode-id="814"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Experienced</span></strong><span data-dcnode-id="815" instrument_node=""> on October 31, 2015:</span></p><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Trump has never said anything racist, or insulting towards foreigners/Mexicans. It is amazing how much manipulation power the liberal media has. I have heard all my left wing friends talk about how Trump has said negative things about Mexicans and then when I listen to just what Donald says, there is no evidence of it. Its the talking heads saying, "wow, those comments are racist" that get the less informed or low intellect people to think negative thoughts. If Trump were president he would do a much better job that Obama, that's for sure. Its just a matter of, are people willing to ignore the liberal lies and be accepting of a real person above a puppet politician like Killery or Bernie.</span></p><p data-dcnode-id="808"><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Roger Dunn</span></strong><span data-dcnode-id="809" instrument_node=""> on October 31, 2015:</span></p><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">My last of three marriages is wonderful beyond measure. I have learned tough lessons over the years. America needs a sound decision maker and leader who is not beholden to political donors and who learns from mistakes. Donald Trump will become a powerful and effective President of the United States who will defend us against our enemies and restore our economic strength.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-24" data-dcnode-id="803"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-24" data-dcnode-id="804" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&q ertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="799"></phoenix-ad></div></aside><p data-dcnode-id="793"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Demas W Jasper</span></strong><span data-dcnode-id="794" instrument_node=""> from Today's America and The World Beyond on October 20, 2015:</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Well written and reassuring (in case Trump is elected.)  With any luck he is finally married to someone who will be satisfied to stick around for the long haul, or at least until the glory days are over.</span></p><p data-dcnode-id="787"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Gunny Cracker</span></strong><span data-dcnode-id="788" instrument_node=""> from Elkhorn, WI on September 28, 2015:</span></p><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">At least birther Trump is a "natural-born" citizen.  He's not a gay, Moslem, commie either.  And he isn't owned by Skull&amp;Bones.</span></p><p data-dcnode-id="781"><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">GlendaGoodWitch (author)</span></strong><span data-dcnode-id="782" instrument_node=""> from California on September 21, 2015:</span></p><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Thank you Dana Tate.</span></p><p data-dcnode-id="775"><strong data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Dana Tate</span></strong><span data-dcnode-id="776" instrument_node=""> from LOS ANGELES on September 21, 2015:</span></p><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">I was very impressed by this article.  It is well-written and very in-depth.</span></p><p data-dcnode-id="769"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">jam</span></strong><span data-dcnode-id="770" instrument_node=""> on September 20, 2015:</span></p><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">I am speechless after what I have read about Mr trump</span></p><p data-dcnode-id="763"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">GlendaGoodWitch (author)</span></strong><span data-dcnode-id="764" instrument_node=""> from California on September 17, 2015:</span></p><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Mizbejabbers- Sounds like you have been nipping on the MSNBC Kool-aid.  No, Trump is not for taking women's rights away.  I get so frustrated with liberals because I wonder I'f they actually believe the things they say.  There are NO politicians who want to take away women's rights.   Let's stick with reality. Women have rights,  and they have had all rights for 100 years.  John D rockefeller ' s children had a female doctor in the 1860's, . No, women didn't have the vote yet, but they had plenty of rights over and above in Europe,  where they were not permitted to watch a boxing match.</span></p><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">My family left Europe,  and I am not concerned with what they think of Trump.   I don't want to vote- what Europe wants.  Europe has nothing on the United States,  that's why people want to come here.</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">If we listen to Europe we will be taxed into oblivion as they are.  No thanks.</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">This is exactly how the Democrats have succeeded in destroying our middle class.   They keep people thinking about stupid things,  like; " which candidate hates women?"  "He's against illegal immigrants, doesn't that mean he's a racist? ".</span></p><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Tune out of the main stream media,  it's big money democrats who don't care about women,  the middle class, or the future of this country.</span></p><p data-dcnode-id="749"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Gunny Cracker</span></strong><span data-dcnode-id="750" instrument_node=""> from Elkhorn, WI on September 17, 2015:</span></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Birther Trump is our last hope to restore America.  He is our best hope to get this Kenyan-born usurper into Portsmouth to await a firing squad of U.S. Marines.</span></p><p data-dcnode-id="743"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Doris James MizBejabbers</span></strong><span data-dcnode-id="744" instrument_node=""> from Beautiful South on September 17, 2015:</span></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Talk over the Internet says that Europe is scared to death of Trump. He says he "loves women," but he's still for taking away women's rights.</span></p><p data-dcnode-id="737"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">McKenna Meyers</span></strong><span data-dcnode-id="738" instrument_node=""> on September 16, 2015:</span></p><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Interesting information about Trump. We, as a country, seem to be all over the place with what we want -- Donald Trump, Bernie Sanders, Ben Carson -- but unified in that we want major change -- no more politics as usual. I heard that Jeb Bush is in my neck of the woods -- Portland -- for private fundraising events for his campaign and SuperPac. I'm so sick and tired of Big Money corrupting our politics. I'm for anyone who can stop that!</span></p><p data-dcnode-id="731"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Repairman</span></strong><span data-dcnode-id="732" instrument_node=""> on August 28, 2015:</span></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Trump will give us more than a career politician. Not only will he fix a few things( and break a couple of others) but he will give a show we want to watch. Maybe even a little pride in America.</span></p><p data-dcnode-id="725"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">TIna</span></strong><span data-dcnode-id="726" instrument_node=""> on August 28, 2015:</span></p><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">In Slovenia, there are a lot of photos of young Melania, as well as information about hery boyfriends etc. So the reporters should just find that on Slovenian internet pages :) She also has breast implants because she was practically without breasts before...</span></p><p data-dcnode-id="719"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">BRENDA</span></strong><span data-dcnode-id="720" instrument_node=""> on August 25, 2015:</span></p><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">WE NEED A STRONG PRESIDENT[ WHAT HAS OBAMA DONE ?]</span></p><p data-dcnode-id="713"><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Gunny Cracker</span></strong><span data-dcnode-id="714" instrument_node=""> from Elkhorn, WI on July 06, 2015:</span></p><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Birther Trump reminds me of wise old King Solomon in the book of Ecclesiastes.</span></p><p data-dcnode-id="707"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Stuart</span></strong><span data-dcnode-id="708" instrument_node=""> from Santa Barbara, CA on July 05, 2015:</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Great article you mentioned a lot about Donald Trump that I had no Idea about. Glad I looked into this one.</span></p><p data-dcnode-id="701"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Gunny Cracker</span></strong><span data-dcnode-id="702" instrument_node=""> from Elkhorn, WI on July 03, 2015:</span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Lying is Obama's native-tongue just like his father...the devil.</span></p><p data-dcnode-id="695"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">GlendaGoodWitch (author)</span></strong><span data-dcnode-id="696" instrument_node=""> from California on July 03, 2015:</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">That's right. Obviously NBC has a problem with with the truth too. Donald could never be elected president because he tells it bluntly. Our current president does nothing but tell lies and walk a politically correct line, that is what Americans want at this point.</span></p><p data-dcnode-id="689"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Gunny Cracker</span></strong><span data-dcnode-id="690" instrument_node=""> from Elkhorn, WI on July 02, 2015:</span></p><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Donald Trump knows Obama was born in Kenya. That is the ONLY real problem, liberals, RINOs, the Illuminati and the lame-stream media have against The Donald. They fear he will broadcast the truth about this treasonous usurper and Antichrist Obama. Sheriff Joe Arpaio, Alan Keyes, Rep. Paul Ryan &amp; the Clintons know it too.</span></p></div><div class="m-detail--sponsor" data-dcnode-id="685"></div><footer class="m-detail--footer" data-dcnode-id="668"><div class="m-detail--meta" data-dcnode-id="683"><div class="m-description--list" data-dcnode-id="684"></div></div><aside class="m-detail--author-box" data-dcnode-id="669"><div class="m-detail--author-content" data-dcnode-id="670"><div class="m-detail--author-byline" data-dcnode-id="677"><div class="m-detail--author-byline-label" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">By</span></div><span data-dcnode-id="680" instrument_node=""> </span><a data-dcnode-id="678" href="https:
